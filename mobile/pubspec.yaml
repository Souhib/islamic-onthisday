name: iotd_mobile
description: "Islamic On This Day — one verified historical event from Islamic history per day."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — Riverpod 2 + generator (mirrors LaTabdhir).
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Networking — Dio + Retrofit, generated from web/openapi.json.
  dio: ^5.4.0
  retrofit: ^4.4.2

  # i18n — Slang. Same posture as LaTabdhir: JSON files → generated dart.
  slang: ^4.11.2
  slang_flutter: ^4.11.0

  # Routing.
  go_router: ^17.0.1

  # Code generation runtime.
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Storage.
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0

  # Notifications — local scheduling only in V1, no FCM.
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.0

  # Home-screen widgets — phase 4.
  home_widget: ^0.7.0

  # Observability — gated on SENTRY_DSN at runtime.
  sentry_flutter: ^9.7.0

  # Env file resolution + utilities.
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  url_launcher: ^6.2.0
  cached_network_image: ^3.3.0
  equatable: ^2.0.5
  app_links: ^7.0.0
  get_it: ^9.2.0

  # Fonts — Cormorant Garamond / Inter Tight / JetBrains Mono / Amiri are
  # fetched on first launch and cached locally. Avoids committing TTF binaries.
  google_fonts: ^6.2.1
  marionette_flutter: ^0.5.0
  dio_cache_interceptor: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation.
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.7.0
  slang_build_runner: ^4.11.0
  retrofit_generator: ^10.2.1

  # OpenAPI client generation from web/openapi.json.
  swagger_parser: ^1.5.0

  # Linting.
  flutter_lints: ^6.0.0

  # Testing.
  mocktail: ^1.0.0

  # Icon + splash generation.
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

# Slang i18n configuration.
slang:
  input_directory: lib/i18n
  output_directory: lib/i18n/generated
  base_locale: en
  fallback_strategy: base_locale
  input_file_pattern: .i18n.json
  output_format: multiple_files
  key_case: snake
  key_map_case: camel
  flat_map: false
  translate_var: t
  enum_name: AppLocale
  translation_class_visibility: public

# Swagger parser — points at the same openapi.json the web client uses.
swagger_parser:
  schema_path: ../web/openapi.json
  output_directory: lib/api/generated
  name: iotd_api
  language: dart
  json_serializer: json_serializable
  root_client: true
  root_client_name: IotdClient
  client_postfix: Client
  export_file: true
  put_clients_in_folder: true
  original_http_response: false
  replacement_rules:
    - pattern: "^ApiV1"
      replacement: ""

flutter:
  uses-material-design: true
