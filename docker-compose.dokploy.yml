# Dokploy deployment for thaqafa.
# App-only compose — Dokploy provides Traefik + Let's Encrypt at the edge.

name: thaqafa

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  # Single source of truth for both content (events / lessons / observances
  # — rebuilt from YAML on every backend container start) and user data
  # (accounts, bookmarks, tokens — never touched by the pipeline thanks to
  # ``CONTENT_TABLE_NAMES`` allowlist). The named volume keeps user rows
  # alive across redeploys.
  db:
    container_name: thaqafa-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: thaqafa
      POSTGRES_USER: thaqafa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in the Dokploy env (generate one with secrets.token_urlsafe).}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thaqafa -d thaqafa"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 10
    networks:
      - internal
    logging: *default-logging
    restart: always

  # ─── Backend API ─────────────────────────────────────────────
  backend:
    container_name: thaqafa-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
      args:
        FRONTEND_URL: ${FRONTEND_URL:-https://news.majlisna.app}
    depends_on:
      db:
        condition: service_healthy
    environment:
      THAQAFA_ENV: production
      HOST: 0.0.0.0
      PORT: 5111
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_SERIALIZE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://news.majlisna.app}
      SENTRY_DSN: ${SENTRY_DSN:-}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      # Bare URL — backend normalises to ``+asyncpg``, pipeline normalises
      # to ``+psycopg``. Same connection, different drivers.
      DATABASE_URL: postgresql://thaqafa:${POSTGRES_PASSWORD}@db:5432/thaqafa
      # 32+ random bytes — generate with `python -c 'import secrets; print(secrets.token_urlsafe(48))'`.
      # Compose refuses to start without an explicit value here, by design:
      # the dev fallback `dev-only-change-me` would silently sign tokens
      # that any local checkout could forge.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required in the Dokploy env (generate one with secrets.token_urlsafe).}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-30}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-30}
      # Resend transactional email. Empty key = no-op (logs the would-be
      # send and returns); set in Dokploy env to actually send password
      # reset emails. Piggybacks on the verified ``majlisna.app`` Resend
      # domain — see CLAUDE.md "Email" section.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-noreply@majlisna.app}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Thaqafa}
      FRONTEND_URL: ${FRONTEND_URL:-https://news.majlisna.app}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5111/api/v1/health').read()"]
      interval: 30s
      timeout: 5s
      # First boot runs ``pipeline.build`` against postgres before the API
      # starts (~70-90s for the YAML ingest + Qur'an extracts fetch).
      # ``start_period`` covers that window so Dokploy doesn't kill the
      # container during legitimate startup.
      start_period: 180s
      retries: 3
    ports:
      - "38591:5111"
    networks:
      - internal
      - dokploy-network
    logging: *default-logging
    restart: always

  # ─── Frontend SPA ────────────────────────────────────────────
  frontend:
    container_name: thaqafa-frontend
    build:
      context: .
      dockerfile: web/Dockerfile
      target: production
      args:
        FRONTEND_URL: ${FRONTEND_URL:-https://news.majlisna.app}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_UMAMI_URL: ${VITE_UMAMI_URL:-}
        VITE_UMAMI_WEBSITE_ID: ${VITE_UMAMI_WEBSITE_ID:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    ports:
      - "31773:80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.thaqafa-frontend.rule=Host(`${DOMAIN:-news.majlisna.app}`)"
      - "traefik.http.routers.thaqafa-frontend.entrypoints=web,websecure"
      - "traefik.http.routers.thaqafa-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.thaqafa-frontend.loadbalancer.server.port=80"
    networks:
      - internal
      - dokploy-network
    logging: *default-logging
    restart: always

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  # User data persistence. Content tables are dropped + recreated by the
  # pipeline on every backend container start; everything else (accounts,
  # bookmarks, password-reset / email-verify tokens) survives redeploys.
  postgres_data:
    name: thaqafa-postgres-data
