# Wave 87 of curated event additions (2026-04-27).
# Ottoman naval and Mediterranean events of the sixteenth century: the
# rise of Ottoman sea-power under Khayr al-Dīn Barbarossa Pasha (a Sunni
# Ottoman corsair–admiral originally from Lesbos who entered the
# imperial service of Süleymān al-Qānūnī as kapudan-ı deryā), the
# Mediterranean fleet's principal victories (Preveza 945 AH, Djerba
# 967 AH), western-Mediterranean conquests (Algiers 935 AH, Tripoli
# 958 AH), the Indian-Ocean rivalry with Portugal (Süleymān Pasha
# al-Khādim's Yemen campaign 945 AH; Selmān Reʾīs's earlier death in
# the Red-Sea theatre 934 AH), and the Aceh–Ottoman alliance against
# the Portuguese in Sumatra (976 AH). Already covered in earlier
# waves and intentionally not duplicated: Battle of Lepanto (1571),
# Great Siege of Malta (1565), Ottoman conquest of Cyprus (1571).
# Sources used are limited to those present in sources.yaml; the
# principal anchors are Ibn al-ʿImād's *Shadharāt al-Dhahab*
# (year-by-year chronicle through 1000 AH) and the *Encyclopaedia of
# Islam* second edition; the editorial compilation key cross-checks
# attested Gregorian dates against standard scholarship (Inalcık,
# Imber, Finkel, Brummett, Casale, Hess). All Hijri dates derived by
# tabular conversion from the attested Gregorian date may differ by
# 1–2 days from the local-sighting Hijri given in some Ottoman
# chronicles. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # KHAYR AL-DĪN BARBAROSSA AND THE WESTERN MEDITERRANEAN
  # =========================================================================

  - slug: ottoman-conquest-of-algiers-1529
    category: conquest
    title_en: Ottoman Conquest of Algiers — Khayr al-Dīn Takes the Peñón
    title_ar: الفتح العثماني للجزائر — خير الدين بربروس يأخذ صخرة بنيون
    title_fr: Conquête ottomane d'Alger — Khayr al-Dīn s'empare du Peñón
    description_en: |
      Khayr al-Dīn Barbarossa, Ottoman governor (beylerbey) of
      Algiers, stormed the small fortified Spanish island of the
      Peñón d'Alger that had blockaded the harbour of Algiers for
      twenty years. After a fifteen-day bombardment the garrison
      under Martín de Vargas surrendered; Khayr al-Dīn levelled the
      fortress and used its stones to build the great mole that
      joined the islet to the mainland and created the modern
      Algiers harbour. The capture removed the last Christian
      foothold on the central Maghribī coast and consolidated the
      Ottoman provincial regime in Algiers that Khayr al-Dīn and
      his elder brother ʿArūj had begun to assemble in 1516. Sultan
      Süleymān al-Qānūnī had formally accepted Algiers as an
      Ottoman *eyālet* in 922 AH/1516, sending Janissaries and the
      banner, but Khayr al-Dīn's reduction of the Peñón made
      Ottoman sovereignty over the western Mediterranean's southern
      shore an operational reality.
    description_ar: |
      اقتحم خير الدين بربروس باشا، بكلربك الجزائر العثماني،
      جزيرة البنيون الإسبانية الصغيرة المحصَّنة التي ظلت
      عشرين سنة تخنق ميناء مدينة الجزائر. وبعد قصف خمسة عشر
      يوماً سلمت الحامية بقيادة مارتين دي بارغاس، فهدم خير الدين
      الحصن واستعمل حجارته في بناء الرصيف الكبير الذي وصل
      الجزيرة الصغيرة بالبر، وأنشأ ميناء الجزائر الحديث. أزال
      الفتح آخر موطئ قدم مسيحي على الساحل المغاربي الأوسط،
      ووطّد النظام الولاياتي العثماني في الجزائر الذي كان
      خير الدين وأخوه الأكبر عروج قد بدآ في تأسيسه سنة ٩٢٢ هـ
      (١٥١٦ م). وكان السلطان سليمان القانوني قد قبل الجزائر
      ولايةً عثمانية رسمياً سنة ٩٢٢ هـ، وبعث إليها الإنكشارية
      والسنجق، إلا أنّ سحق خير الدين لقلعة البنيون هو الذي
      حوّل السيادة العثمانية على الساحل الجنوبي للحوض الغربي
      للمتوسط حقيقةً عملية.
    description_fr: |
      Khayr al-Dīn Barbarossa, gouverneur (beylerbey) ottoman
      d'Alger, prit d'assaut la petite île fortifiée espagnole
      du Peñón d'Alger qui bloquait le port d'Alger depuis vingt
      ans. Après quinze jours de bombardement, la garnison de
      Martín de Vargas capitula; Khayr al-Dīn rasa la forteresse
      et en utilisa les pierres pour bâtir la grande jetée
      reliant l'îlot au continent — créant ainsi le port moderne
      d'Alger. La prise effaçait le dernier point d'appui chrétien
      sur la côte centro-maghrébine et consolidait le régime
      provincial ottoman d'Alger que Khayr al-Dīn et son frère
      aîné ʿArūj avaient commencé à mettre en place dès 1516.
      Le sultan Soliman al-Qānūnī avait accepté formellement
      Alger comme *eyālet* ottoman en 922 H / 1516, envoyant
      janissaires et bannière; la réduction du Peñón par Khayr
      al-Dīn fit toutefois de la souveraineté ottomane sur la
      rive méridionale de la Méditerranée occidentale une
      réalité opérationnelle.
    canonical_hijri: {year: 935, month: 9, day: 9, precision: day}
    canonical_gregorian: {date: 1529-05-27, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Khayr al-Dīn Pasha' dates the storming and surrender of the Peñón d'Alger to 27 May 1529 (Ramaḍān 935 AH) after a fifteen-day siege."
      - source_key: editorial
        notes: "Cross-checked against Hess, *The Forgotten Frontier*, ch. 4, and Inalcık, *The Ottoman Empire: The Classical Age*, both of whom attest 27 May 1529 for the capture of the Peñón and the consolidation of the Ottoman beylerbeylik of Algiers."
    people: [[suleiman-the-magnificent, ruler], [khayr-al-din-barbarossa, leader]]
    tags: [ottoman, algiers, khayr-al-din, barbarossa, naval, mediterranean, spain]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # SELMĀN REʾĪS — THE RED SEA AND THE INDIAN OCEAN
  # =========================================================================

  - slug: death-of-selman-reis
    category: ruler_death
    title_en: Death of Selmān Reʾīs — Ottoman Admiral of the Red Sea
    title_ar: وفاة سلمان رئيس — أميرال البحر الأحمر العثماني
    title_fr: Mort de Selmān Reʾīs — amiral ottoman de la mer Rouge
    description_en: |
      Selmān Reʾīs (Sulaymān al-Raʾīs), the first Ottoman
      admiral of the Red Sea fleet, was assassinated by his
      lieutenant Muṣṭafā Bayrām at Tihāma on the Yemeni coast
      after a quarrel over the proceeds of his Indian-Ocean
      raids. A former Mamluk naval officer who entered the
      Ottoman service after Selīm I's conquest of Egypt in 922
      AH / 1517, Selmān had commanded the Jeddah-based fleet,
      raided the Portuguese-allied Ethiopian coast, and submitted
      to the Porte the famous *Layiḥa* memorandum on the strategic
      necessity of building Ottoman sea-power in the Indian
      Ocean against Portugal — the document that shaped Süleymān
      Pasha al-Khādim's later Yemen campaign and the Ottoman
      Indian-Ocean policy of the rest of the century. His
      killing left the Red Sea fleet leaderless until Süleymān
      Pasha al-Khādim assumed strategic direction of the
      southern theatre a decade later.
    description_ar: |
      اغتال نائبُه مصطفى بيرام الأميرالَ سلمان رئيس (سليمان
      الرئيس)، أوّلَ أميرال للأسطول العثماني في البحر الأحمر،
      على ساحل تهامة في اليمن، إثر خلاف على غنائم غزواته في
      المحيط الهندي. كان سلمان ضابطاً بحرياً مملوكياً سابقاً
      دخل الخدمة العثمانية بعد فتح سليم الأول لمصر سنة ٩٢٢ هـ
      (١٥١٧ م)، وقاد الأسطول من جدة، وأغار على ساحل الحبشة
      الموالي للبرتغاليين، ورفع إلى الباب العالي «لائحته»
      الشهيرة في ضرورة بناء قوة بحرية عثمانية في المحيط
      الهندي في وجه البرتغاليين — وهي الوثيقة التي صاغت حملة
      سليمان باشا الخادم اليمنية اللاحقة، والسياسة العثمانية
      في المحيط الهندي طوال بقية القرن. وترك مقتلُه أسطول
      البحر الأحمر بلا قيادة إلى أن تولّى سليمان باشا الخادم
      الإشرافَ الاستراتيجي على المسرح الجنوبي بعد عقد من الزمن.
    description_fr: |
      Selmān Reʾīs (Sulaymān al-Raʾīs), premier amiral ottoman
      de la flotte de la mer Rouge, fut assassiné par son
      lieutenant Muṣṭafā Bayrām à Tihāma, sur la côte yéménite,
      à la suite d'une querelle sur le partage des dépouilles
      de ses raids dans l'océan Indien. Ancien officier de
      marine mamelouk passé au service ottoman après la conquête
      de l'Égypte par Selīm Ier en 922 H / 1517, Selmān avait
      commandé la flotte basée à Djedda, attaqué les côtes
      éthiopiennes alliées des Portugais, et présenté à la
      Sublime Porte son célèbre *Layiḥa* sur la nécessité
      stratégique de bâtir une puissance navale ottomane dans
      l'océan Indien contre le Portugal — document qui inspira
      la campagne yéménite de Süleymān Pasha al-Khādim et la
      politique indo-océanique ottomane du reste du siècle. Sa
      mort laissa la flotte de la mer Rouge sans chef jusqu'à
      ce que Süleymān Pasha al-Khādim prît la direction
      stratégique du théâtre méridional une décennie plus tard.
    canonical_hijri: {year: 934, precision: year}
    canonical_gregorian: {date: 1528-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Selmān Reʾīs' attests his assassination by Muṣṭafā Bayrām at Tihāma in 934 AH / 1528 CE; the *Layiḥa* memorandum is preserved in the Ottoman archives and edited by Lutfi Paşa."
      - source_key: editorial
        notes: "Cross-checked against Casale, *The Ottoman Age of Exploration*, ch. 1, and Brummett, *Ottoman Seapower and Levantine Diplomacy*, both of whom date Selmān's death to 1528 in the Yemeni Tihāma."
    people: [[selman-reis, leader]]
    tags: [ottoman, naval, red-sea, indian-ocean, yemen, portugal]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # BATTLE OF PREVEZA — KHAYR AL-DĪN AT THE GULF OF ARTA
  # =========================================================================

  - slug: battle-of-preveza
    category: battle
    title_en: Battle of Preveza — Khayr al-Dīn Defeats the Holy League
    title_ar: معركة بريفيزا — خير الدين يهزم العصبة المسيحية المقدسة
    title_fr: Bataille de Préveza — Khayr al-Dīn défait la Sainte Ligue
    description_en: |
      Khayr al-Dīn Barbarossa, kapudan-ı deryā of the Ottoman
      imperial fleet, decisively defeated the combined Holy
      League fleet of Charles V, Pope Paul III, and the Republic
      of Venice — commanded by the Genoese admiral Andrea Doria —
      at the entrance to the Gulf of Arta on the western Greek
      coast, near the Ottoman port of Preveza. Holding his
      galleys close to the Ottoman shore in a tight formation,
      Khayr al-Dīn refused Doria's attempts to draw him out into
      open water and exploited the becalming of the Christian
      sailing-galleons to engage them piecemeal under oars. The
      League fleet broke and withdrew to Corfu after losing some
      ten ships and over three thousand men with no comparable
      Ottoman loss. Preveza established Ottoman naval supremacy
      in the eastern and central Mediterranean for the next
      generation; the supremacy held — through the conquest of
      Cyprus — until the reverse at Lepanto thirty-three years
      later.
    description_ar: |
      هزم خير الدين بربروس باشا، قبودان درياي الأسطول
      الإمبراطوري العثماني، أسطول العصبة المسيحية المقدسة
      المؤلف من قوات الإمبراطور كارلوس الخامس والبابا بولس
      الثالث وجمهورية البندقية، بقيادة الأميرال الجنوي أندريا
      دوريا، عند مدخل خليج آرتا قرب ميناء بريفيزا العثماني
      على الساحل اليوناني الغربي. أبقى خير الدين سفنه الشراعية
      وقواربه قريبةً من الساحل العثماني في تشكيل متراصّ، فرفض
      محاولات دوريا استدراجه إلى عرض البحر، واستفاد من سكون
      الريح الذي شلّ السفن الشراعية المسيحية ليشتبك بها على
      دفعات بقواربه المجدافية. انهارت قوات العصبة وانسحبت إلى
      كورفو بعد أن خسرت نحو عشر سفن وأكثر من ثلاثة آلاف رجل،
      بلا خسارة مماثلة من الجانب العثماني. أرست بريفيزا التفوق
      البحري العثماني في شرق المتوسط ووسطه جيلاً كاملاً، وظلّ
      هذا التفوق — حتى فتح قبرص — قائماً إلى أن قُلب في معركة
      ليبانتو بعد ثلاثة وثلاثين عاماً.
    description_fr: |
      Khayr al-Dīn Barbarossa, kapudan-ı deryā de la flotte
      impériale ottomane, défit de manière décisive la flotte
      combinée de la Sainte Ligue de Charles Quint, du pape
      Paul III et de la République de Venise — commandée par
      l'amiral génois Andrea Doria — à l'entrée du golfe d'Arta,
      sur la côte occidentale de la Grèce, près du port ottoman
      de Préveza. Maintenant ses galères en formation serrée
      près de la côte ottomane, Khayr al-Dīn refusa les
      tentatives de Doria de l'attirer en haute mer et exploita
      l'accalmie du vent qui paralysa les galions chrétiens à
      voiles pour les engager par fragments à la rame. La flotte
      de la Ligue rompit et se replia sur Corfou, ayant perdu
      une dizaine de navires et plus de trois mille hommes,
      sans perte ottomane comparable. Préveza établit la
      suprématie navale ottomane sur la Méditerranée orientale
      et centrale pour une génération entière; cette suprématie
      — qui permit la conquête de Chypre — perdurerait jusqu'au
      revers de Lépante, trente-trois ans plus tard.
    canonical_hijri: {year: 945, month: 4, day: 23, precision: day}
    canonical_gregorian: {date: 1538-09-28, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Khayr al-Dīn Pasha' dates the battle of Preveza to 28 September 1538 (Rabīʿ II 945 AH); a related entry under 'Andrea Doria' confirms the date and the Ottoman victory."
      - source_key: editorial
        notes: "Cross-checked against Inalcık, *The Ottoman Empire: The Classical Age*, and Imber, *The Ottoman Empire 1300–1650*, both of whom attest 28 September 1538 as the day of the battle."
    people: [[suleiman-the-magnificent, ruler], [khayr-al-din-barbarossa, leader]]
    tags: [ottoman, battle, naval, preveza, khayr-al-din, mediterranean, holy-league, venice]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # SÜLEYMĀN PASHA AL-KHĀDIM — YEMEN AND THE INDIAN OCEAN
  # =========================================================================

  - slug: ottoman-conquest-of-yemen-1538
    category: conquest
    title_en: Ottoman Conquest of Yemen — Süleymān Pasha al-Khādim's Indian-Ocean Campaign
    title_ar: الفتح العثماني الأول لليمن — حملة سليمان باشا الخادم في المحيط الهندي
    title_fr: Première conquête ottomane du Yémen — campagne indo-océanique de Süleymān Pasha al-Khādim
    description_en: |
      Süleymān Pasha al-Khādim, the elderly eunuch governor of
      Egypt, sailed from Suez at the head of an Ottoman fleet
      of seventy-six ships and twenty thousand troops, bound
      ostensibly for the relief of the Sultanate of Gujarat
      against the Portuguese in India. En route through the
      Red Sea Süleymān Pasha occupied Aden by stratagem in
      Jumādā I 945 AH (August 1538), executing the Ṭāhirid
      sultan ʿĀmir ibn Dāwūd whom he had invited aboard for
      a banquet, and incorporated the city into the Ottoman
      state as the kernel of the new *eyālet* of Yemen. The
      subsequent siege of Diu in Gujarat that autumn failed and
      the fleet returned to Suez in 946 AH, but the Yemen
      annexation held: by the time of Süleymān Pasha's
      successor Özdemir Pasha (964 AH/1557) the *eyālet* of
      Yemen extended over Sanaa and the Tihāma, anchoring
      Ottoman power on the Indian-Ocean rim for the next
      century.
    description_ar: |
      أبحر سليمان باشا الخادم، الوزير الخصيّ المُسِنّ والي مصر،
      من السويس على رأس أسطول عثماني من ست وسبعين سفينة
      وعشرين ألف جندي، ظاهرُه نجدة سلطنة كجرات في الهند ضد
      البرتغاليين. في طريقه عبر البحر الأحمر، احتلّ سليمان
      باشا عدن بحيلة في جمادى الأولى سنة ٩٤٥ هـ (آب/أغسطس
      ١٥٣٨ م) فأعدم السلطان الطاهري عامر بن داود الذي كان قد
      دعاه إلى وليمة على ظهر سفينته، وضمّ المدينةَ إلى الدولة
      العثمانية نواةً لولاية اليمن الجديدة. وأخفق الحصار التالي
      لمدينة ديو في كجرات في الخريف فعاد الأسطول إلى السويس
      سنة ٩٤٦ هـ، إلا أن ضمّ اليمن دام: ومع ولاية خلَفه أوزدمير
      باشا (٩٦٤ هـ / ١٥٥٧ م) امتدّت ولاية اليمن العثمانية
      على صنعاء وتهامة، فثبّتت السلطان العثماني على شفير
      المحيط الهندي طوال القرن التالي.
    description_fr: |
      Süleymān Pasha al-Khādim, le vieil eunuque gouverneur
      d'Égypte, prit la mer depuis Suez à la tête d'une flotte
      ottomane de soixante-seize navires et vingt mille
      soldats, ostensiblement destinée à secourir le sultanat
      du Gujarat contre les Portugais en Inde. En route à
      travers la mer Rouge, Süleymān Pasha occupa Aden par
      stratagème en Jumādā I 945 H (août 1538), faisant exécuter
      le sultan ṭāhiride ʿĀmir ibn Dāwūd qu'il avait convié à
      un banquet à bord, et intégra la ville à l'État ottoman
      comme noyau du nouvel *eyālet* du Yémen. Le siège
      ultérieur de Diu au Gujarat, à l'automne, échoua et la
      flotte rentra à Suez en 946 H; l'annexion du Yémen tint
      cependant: à l'époque du successeur de Süleymān Pasha,
      Özdemir Pasha (964 H / 1557), l'*eyālet* du Yémen
      s'étendait sur Sanaa et la Tihāma, ancrant la puissance
      ottomane sur la rive de l'océan Indien pour tout le
      siècle suivant.
    canonical_hijri: {year: 945, month: 5, precision: month}
    canonical_gregorian: {date: 1538-08-01, precision: month, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 articles 'Süleymān Pasha al-Khādim', 'al-Yaman', and 'ʿAdan' place the Ottoman occupation of Aden and execution of ʿĀmir ibn Dāwūd in Jumādā I 945 AH (August 1538), opening the *eyālet* of Yemen."
      - source_key: editorial
        notes: "Cross-checked against Casale, *The Ottoman Age of Exploration*, ch. 2, and Inalcık, *The Ottoman Empire: The Classical Age*, both of whom attest the August 1538 capture of Aden as the foundation of Ottoman Yemen."
    people: [[suleiman-the-magnificent, ruler], [suleyman-pasha-al-khadim, leader]]
    tags: [ottoman, yemen, aden, indian-ocean, naval, gujarat, portugal]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # DEATHS — KHAYR AL-DĪN, SÜLEYMĀN PASHA AL-KHĀDIM
  # =========================================================================

  - slug: death-of-khayr-al-din-barbarossa
    category: ruler_death
    title_en: Death of Khayr al-Dīn Barbarossa Pasha — Kapudan-ı Deryā of Süleymān al-Qānūnī
    title_ar: وفاة خير الدين بربروس باشا — قبودان درياي العثمانيين
    title_fr: Mort de Khayr al-Dīn Barbarossa Pasha — kapudan-ı deryā de Soliman al-Qānūnī
    description_en: |
      Khayr al-Dīn Barbarossa Pasha, beylerbey of the Ottoman
      Mediterranean fleet and architect of the Ottoman naval
      ascendancy that ran from Algiers (935 AH) through Preveza
      (945 AH) to the joint Franco-Ottoman wintering at Toulon
      (950 AH), died in his palace in Beşiktaş on the European
      shore of the Bosphorus. He was buried in the *türbe* he
      had built for himself outside his Beşiktaş mosque, designed
      by the architect Sinan, where his sea-side tomb still
      stands. Sultan Süleymān al-Qānūnī's vizier Lutfi Pasha
      composed the famous epitaph: *Khayr al-Dīn the rāʾis
      [admiral] was the master of the sea*. His son Ḥasan Pasha
      and his lieutenant Turgut Reʾīs (Dragut) inherited the
      operational command of Ottoman naval power; the
      institutional structure of the imperial fleet under
      a kapudan-ı deryā that he had consolidated would persist
      for the next three centuries.
    description_ar: |
      توفي خير الدين بربروس باشا، أمير البحر العثماني وقبودان
      دريا الأسطول الإمبراطوري في المتوسط، وباني الصعود البحري
      العثماني الممتدّ من فتح الجزائر (٩٣٥ هـ) إلى معركة
      بريفيزا (٩٤٥ هـ) ومرسى الأسطول العثماني المشترك مع
      فرنسا في طولون (٩٥٠ هـ)، في قصره في بشكطاش على الساحل
      الأوروبي للبسفور. ودُفن في التربة التي أعدّها لنفسه عند
      جامعه ببشكطاش بتصميم المعمار سنان، وما زال ضريحه قائماً
      على شاطئ البحر هناك. وكتب لطفي باشا وزير السلطان سليمان
      القانوني مرثيته الشهيرة: «مات رئيس البحر، خير الدين، سيد
      البحر». وورث ابنُه حسن باشا ونائبُه طورغوت رئيس (دراغوت)
      القيادةَ التنفيذية للأسطول، أما البنية المؤسسية للأسطول
      الإمبراطوري تحت قبودان دريا التي رسّخها هو فقد دامت
      ثلاثة قرون تالية.
    description_fr: |
      Khayr al-Dīn Barbarossa Pasha, beylerbey de la flotte
      ottomane de Méditerranée et architecte de l'ascendance
      navale ottomane allant d'Alger (935 H) à Préveza (945 H),
      jusqu'à l'hivernage conjoint franco-ottoman à Toulon (950
      H), mourut dans son palais de Beşiktaş, sur la rive
      européenne du Bosphore. Il fut inhumé dans le *türbe*
      qu'il s'était fait construire à côté de sa mosquée de
      Beşiktaş — œuvre de l'architecte Sinan —, où son tombeau,
      au bord de la mer, subsiste encore. Le grand vizir de
      Soliman al-Qānūnī, Lutfi Pasha, composa la célèbre
      épitaphe: « Khayr al-Dīn le rāʾis [amiral] était le maître
      de la mer ». Son fils Ḥasan Pasha et son lieutenant Turgut
      Reʾīs (Dragut) héritèrent du commandement opérationnel de
      la puissance navale ottomane; l'architecture institutionnelle
      de la flotte impériale autour d'un kapudan-ı deryā qu'il
      avait consolidée subsisterait trois siècles encore.
    canonical_hijri: {year: 953, month: 4, day: 24, precision: day}
    canonical_gregorian: {date: 1546-07-04, precision: day, method: attested}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
        notes: "Ibn al-ʿImād's *Shadharāt al-Dhahab*, under 953 AH, records the death of Khayr al-Dīn Pasha (Barbarossa), beylerbey of the Ottoman fleet."
      - source_key: ei2
        notes: "EI2 article 'Khayr al-Dīn Pasha' dates the death to 4 July 1546 (Rabīʿ II 953 AH) at his Beşiktaş palace; the burial in the Sinan-designed türbe is well attested."
      - source_key: editorial
        notes: "Cross-checked against Inalcık and Imber; the Beşiktaş türbe still stands as a public monument."
    people: [[suleiman-the-magnificent, ruler], [khayr-al-din-barbarossa, deceased]]
    tags: [ottoman, khayr-al-din, barbarossa, naval, kapudan-i-derya, death, beshiktash]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-suleyman-pasha-al-khadim
    category: ruler_death
    title_en: Death of Süleymān Pasha al-Khādim — Conqueror of Yemen and Grand Vizier
    title_ar: وفاة سليمان باشا الخادم — فاتح اليمن والصدر الأعظم
    title_fr: Mort de Süleymān Pasha al-Khādim — conquérant du Yémen et grand vizir
    description_en: |
      Süleymān Pasha al-Khādim, the eunuch general and
      governor of Egypt who had conquered Aden and opened the
      Ottoman *eyālet* of Yemen in 945 AH (1538), died in
      Constantinople, where he had retired from the grand
      vizierate (he had served briefly as Süleymān al-Qānūnī's
      grand vizier, 947–948 AH / 1541–1542). His career
      spanned the consolidation of Ottoman Egypt under Selīm
      I, the long Egyptian vizirate during which he expanded
      al-Azhar's holdings, the southern fleet that anchored
      Ottoman Yemen against the Portuguese, and a final brief
      grand-vizierate. He was buried in his Constantinople
      mosque-complex; his Yemen settlement held for the next
      sixty years until the Qāsimī revolt expelled the Ottoman
      *eyālet* (1045 AH / 1635).
    description_ar: |
      توفي سليمان باشا الخادم، القائد الخصيّ ووالي مصر الذي
      كان قد فتح عدن وافتتح ولاية اليمن العثمانية سنة ٩٤٥ هـ
      (١٥٣٨ م)، في القسطنطينية بعد أن اعتزل الصدارة العظمى
      (تولّاها فترة قصيرة في عهد سليمان القانوني، ٩٤٧–٩٤٨ هـ /
      ١٥٤١–١٥٤٢ م). وامتدّت سيرتُه على توطيد مصر العثمانية في
      عهد سليم الأول، ثم على ولايته الطويلة في مصر التي وسّع
      فيها أوقاف الجامع الأزهر، ثم على الأسطول الجنوبي الذي
      ثبّت اليمن العثماني في وجه البرتغاليين، وأخيراً على
      صدارة عظمى قصيرة. ودُفن في مسجده وكليّته في القسطنطينية،
      أما تسوية اليمن التي عقدها فقد دامت ستين سنة إلى أن
      أخرجت ثورةُ القاسميين الولايةَ العثمانية سنة ١٠٤٥ هـ
      (١٦٣٥ م).
    description_fr: |
      Süleymān Pasha al-Khādim, général eunuque et gouverneur
      d'Égypte qui avait conquis Aden et ouvert l'*eyālet*
      ottoman du Yémen en 945 H (1538), mourut à Constantinople,
      où il s'était retiré du grand vizirat — qu'il avait
      brièvement exercé sous Soliman al-Qānūnī (947–948 H /
      1541–1542). Sa carrière couvre la consolidation de
      l'Égypte ottomane sous Selīm Ier, le long vizirat
      égyptien durant lequel il étendit les biens de waqf
      d'al-Azhar, la flotte méridionale qui ancra l'autorité
      ottomane au Yémen face aux Portugais, et un bref grand
      vizirat final. Il fut inhumé dans son ensemble mosquée-
      *külliye* de Constantinople; son règlement yéménite tint
      soixante années avant que la révolte qāsimite ne chassât
      l'*eyālet* ottoman (1045 H / 1635).
    canonical_hijri: {year: 954, precision: year}
    canonical_gregorian: {date: 1547-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
        notes: "Ibn al-ʿImād's *Shadharāt al-Dhahab*, under 954 AH, records the death of Süleymān Pasha al-Khādim, former vizier and conqueror of Aden."
      - source_key: ei2
        notes: "EI2 article 'Süleymān Pasha al-Khādim' attests his death at Constantinople in 954 AH / 1547 CE; his vizirate dates and Yemen campaign are confirmed in the same article."
      - source_key: editorial
        notes: "Cross-checked against Casale, *The Ottoman Age of Exploration*, ch. 2."
    people: [[suleiman-the-magnificent, ruler], [suleyman-pasha-al-khadim, deceased]]
    tags: [ottoman, naval, yemen, egypt, grand-vizier, death]
