  # =========================================================================
  # TURGUT REʾĪS / DRAGUT — TRIPOLI, PONZA
  # =========================================================================

  - slug: ottoman-conquest-of-tripoli-libya-1551
    category: conquest
    title_en: Ottoman Conquest of Tripoli — Sinān Pasha and Turgut Reʾīs Take Libya
    title_ar: الفتح العثماني لطرابلس الغرب — سنان باشا وطورغوت رئيس يأخذان ليبيا
    title_fr: Conquête ottomane de Tripoli de Libye — Sinān Pasha et Turgut Reʾīs s'emparent du pays
    description_en: |
      An Ottoman expedition under the kapudan-ı deryā Sinān
      Pasha (the Eunuch) and the corsair-admiral Turgut Reʾīs
      (Dragut) reduced Tripoli of Libya, the last Knights
      Hospitaller fortress on the southern Mediterranean shore
      after their loss of Rhodes in 928 AH (1522). The Spanish-
      held citadel had been granted to the Knights by Charles
      V in 937 AH (1530) along with Malta, in compensation for
      Rhodes; after a six-day siege the Hospitaller commander
      Gaspard de Vallier surrendered. Turgut Reʾīs was installed
      as the first Ottoman *bey* of Tripoli, opening the
      Ottoman *eyālet* of Tripolitania (Trāblus al-Gharb) that
      anchored Ottoman authority on the central Maghribī coast
      from then until the early twentieth century. The fall of
      Tripoli completed the Ottoman replacement of Spanish-
      Habsburg power along the southern Mediterranean and set
      the stage for the larger Hospitaller-Ottoman confrontation
      at Malta fourteen years later.
    description_ar: |
      أنزل سنانُ باشا الخصي قبودانُ دريا، وطورغوت رئيس
      (دراغوت) أميرُ البحر القرصاني، حملةً عثمانية بطرابلس
      الغرب — آخر معاقل فرسان الإسبتارية على الساحل الجنوبي
      للمتوسط بعد خسارتهم رودس سنة ٩٢٨ هـ (١٥٢٢ م). وكان
      كارلوس الخامس قد منح القلعةَ — التي كانت بيد الإسبان —
      للفرسان سنة ٩٣٧ هـ (١٥٣٠ م) مع مالطا، تعويضاً عن رودس،
      فاستسلم القائد الإسبتاري غاسبار دو فاليي بعد حصار ستة
      أيام. ونُصِّب طورغوت رئيس أوّلَ بك عثماني لطرابلس،
      فافتُتحت ولاية طرابلس الغرب العثمانية التي ثبّتت السلطان
      العثماني على الساحل المغاربي الأوسط من ذلك الحين إلى
      مطلع القرن العشرين. وأكمل سقوطُ طرابلس استبدالَ القوة
      الإسبانية الهابسبورغية على الساحل الجنوبي للمتوسط
      بالعثمانية، وهيّأ المسرحَ للمواجهة الإسبتارية العثمانية
      الكبرى في مالطا بعد أربع عشرة سنة.
    description_fr: |
      Une expédition ottomane commandée par le kapudan-ı deryā
      Sinān Pasha (l'Eunuque) et l'amiral-corsaire Turgut Reʾīs
      (Dragut) réduisit Tripoli de Libye, dernière forteresse
      des chevaliers hospitaliers sur la côte méridionale de la
      Méditerranée après leur perte de Rhodes en 928 H (1522).
      La citadelle, tenue par les Espagnols, avait été cédée
      aux chevaliers par Charles Quint en 937 H (1530) en même
      temps que Malte, en compensation de Rhodes; après six
      jours de siège, le commandant hospitalier Gaspard de
      Vallier capitula. Turgut Reʾīs fut installé comme premier
      *bey* ottoman de Tripoli, inaugurant l'*eyālet* ottoman de
      Tripolitaine (Trāblus al-Gharb) qui ancrerait l'autorité
      ottomane sur la côte centro-maghrébine du milieu du XVIᵉ
      siècle au début du XXᵉ. La chute de Tripoli acheva le
      remplacement de la puissance hispano-habsbourgeoise sur
      la rive sud par l'ottomane, et préparait le terrain à la
      grande confrontation hospitalière-ottomane de Malte
      quatorze ans plus tard.
    canonical_hijri: {year: 958, month: 8, day: 2, precision: day}
    canonical_gregorian: {date: 1551-08-15, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Ṭarābulus al-Gharb' dates the Ottoman capture of Tripoli of Libya from the Knights Hospitaller to 15 August 1551 (Shaʿbān 958 AH), with Sinān Pasha and Turgut Reʾīs in joint command."
      - source_key: editorial
        notes: "Cross-checked against Hess, *The Forgotten Frontier*, and Inalcık, *The Ottoman Empire: The Classical Age*, both of whom attest 15 August 1551 and the installation of Turgut as bey of the new *eyālet*."
    people: [[suleiman-the-magnificent, ruler], [turgut-reis, leader]]
    tags: [ottoman, conquest, tripoli, libya, turgut, dragut, sinan-pasha, mediterranean, knights-hospitaller]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-ponza-1552
    category: battle
    title_en: Battle of Ponza — Sinān and Turgut Defeat the Genoese
    title_ar: معركة بونزا — سنان وطورغوت يهزمان الجنويين
    title_fr: Bataille de Ponza — Sinān et Turgut défont les Génois
    description_en: |
      An Ottoman fleet under kapudan-ı deryā Sinān Pasha,
      operating in concert with the French in the Italian Wars,
      destroyed an Imperial-Genoese squadron commanded by Andrea
      Doria's nephew Andrea Doria the Younger off the volcanic
      island of Ponza in the Tyrrhenian Sea. The Ottomans
      captured seven of the Genoese galleys and some thirteen
      hundred prisoners, breaking the Habsburg supply line
      between Genoa and Naples for the campaigning season. The
      victory followed Turgut Reʾīs's installation as *bey* of
      Tripoli the previous year and demonstrated that Ottoman
      naval power could now operate offensively in the
      Tyrrhenian Sea — west of the Sicilian narrows — in
      coordination with French Valois allies, the high-water
      mark of the Franco-Ottoman alliance against the Habsburgs.
    description_ar: |
      حطّم أسطول عثماني بقيادة قبودان دريا سنان باشا — يعمل
      بالتنسيق مع الفرنسيين في الحروب الإيطالية — سربَ
      الإمبراطورية الهابسبورغية الجنوي بقيادة أندريا دوريا
      الأصغر ابن أخي دوريا الكبير، قبالة جزيرة بونزا البركانية
      في البحر التيراني. أسر العثمانيون سبعَ سفن جنوية ونحو
      ألف وثلاثمئة أسير، فقطعوا خط إمداد الهابسبورغ بين جنوة
      ونابولي للموسم العسكري. وأتت هذه الغلبة بعد عام من
      تنصيب طورغوت رئيس بكاً على طرابلس، فبيّنت أن القوة
      البحرية العثمانية باتت قادرة على العمل الهجومي في البحر
      التيراني — غرب مضائق صقلية — بالتنسيق مع حلفاء آل فالوا
      الفرنسيين، وهي ذروة الحلف الفرنسي العثماني ضد الهابسبورغ.
    description_fr: |
      Une flotte ottomane commandée par le kapudan-ı deryā
      Sinān Pasha, opérant de concert avec les Français dans
      les guerres d'Italie, détruisit une escadre impériale-
      génoise commandée par le neveu d'Andrea Doria, Andrea
      Doria le Jeune, au large de l'île volcanique de Ponza,
      en mer Tyrrhénienne. Les Ottomans capturèrent sept galères
      génoises et quelque mille trois cents prisonniers,
      coupant la ligne d'approvisionnement habsbourgeoise
      entre Gênes et Naples pour la saison de campagne. La
      victoire faisait suite à l'installation de Turgut Reʾīs
      comme *bey* de Tripoli l'année précédente et démontrait
      que la puissance navale ottomane pouvait désormais
      opérer offensivement en mer Tyrrhénienne — à l'ouest des
      détroits siciliens — en coordination avec les alliés
      Valois français, point culminant de l'alliance franco-
      ottomane contre les Habsbourg.
    canonical_hijri: {year: 959, month: 8, day: 4, precision: day}
    canonical_gregorian: {date: 1552-08-05, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 articles 'Sinān Pasha (the Eunuch)' and 'Turghut Reʾīs' date the engagement off Ponza to early August 1552 (Shaʿbān 959 AH), in coordination with the French Valois fleet."
      - source_key: editorial
        notes: "Cross-checked against Imber, *The Ottoman Empire 1300–1650*, and Setton, *The Papacy and the Levant*, vol. 4, both of whom attest the destruction of the Genoese squadron at Ponza on 5 August 1552."
    people: [[suleiman-the-magnificent, ruler], [turgut-reis, leader]]
    tags: [ottoman, battle, naval, ponza, sinan-pasha, turgut, dragut, mediterranean, france]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # BATTLE OF DJERBA — PIYALE PASHA
  # =========================================================================

  - slug: battle-of-djerba
    category: battle
    title_en: Battle of Djerba — Piyāle Pasha Destroys the Spanish Relief Fleet
    title_ar: معركة جربة — بياله باشا يحطّم أسطول الإغاثة الإسباني
    title_fr: Bataille de Djerba — Piyāle Pasha détruit la flotte de secours espagnole
    description_en: |
      The Ottoman kapudan-ı deryā Piyāle Pasha, dispatched
      from Constantinople with a fleet of eighty-six galleys,
      annihilated the Spanish-Genoese-Maltese-papal Christian
      coalition fleet commanded by the viceroy of Sicily Juan
      de la Cerda, Duke of Medinaceli, off the island of
      Djerba on the Tunisian coast. The Christian fleet had
      seized Djerba in February 1560 as a base from which to
      retake Tripoli; Piyāle's surprise arrival on 14 May caught
      the Christians at anchor, broke their line, and over the
      following weeks reduced the fortress they had built on
      the island. Around twenty thousand Christian soldiers
      were killed or captured and roughly half the Christian
      fleet sunk or taken. Djerba ranks with Preveza as one of
      the two great Ottoman naval victories of the sixteenth
      century; together they fixed Ottoman supremacy in the
      central and eastern Mediterranean for the eleven years
      down to Lepanto.
    description_ar: |
      حطّم قبودان دريا بياله باشا، الذي أرسلته القسطنطينية
      على رأس أسطول من ست وثمانين سفينة، الأسطولَ المسيحي
      المتحالف الإسباني الجنوي المالطي البابوي بقيادة نائب
      ملك صقلية الدوق دي مدينة سيلي، قبالة جزيرة جربة على
      الساحل التونسي. كان الأسطول المسيحي قد استولى على جربة
      في فبراير سنة ١٥٦٠ م ليتخذها قاعدةً لاسترداد طرابلس،
      فأدركهم بياله بحملته المباغتة في الرابع عشر من أيار
      راسين على المرسى، فكسر تشكيلهم، ثم في الأسابيع التالية
      اختزل القلعة التي بنوها على الجزيرة. قُتل أو أُسر نحو
      عشرين ألف جندي مسيحي، وغرق أو وقع في الأسر زهاء نصف
      أسطول الصليبيين. وتعدّ معركة جربة، إلى جانب بريفيزا، من
      أعظم انتصارات البحرية العثمانية في القرن السادس عشر،
      وقد ثبّتتا التفوّق العثماني في وسط المتوسط وشرقه طوال
      أحد عشر عاماً انقضت إلى ليبانتو.
    description_fr: |
      Le kapudan-ı deryā ottoman Piyāle Pasha, envoyé de
      Constantinople à la tête d'une flotte de quatre-vingt-six
      galères, anéantit la flotte chrétienne hispano-génoise-
      maltese-pontificale commandée par le vice-roi de Sicile
      Juan de la Cerda, duc de Medinaceli, au large de l'île
      de Djerba sur la côte tunisienne. La flotte chrétienne
      s'était emparée de Djerba en février 1560 pour en faire
      une base de reconquête de Tripoli; l'arrivée surprise
      de Piyāle le 14 mai prit les chrétiens au mouillage,
      rompit leur ligne, et dans les semaines suivantes
      réduisit la forteresse qu'ils avaient construite sur
      l'île. Environ vingt mille soldats chrétiens furent
      tués ou capturés et la moitié environ de la flotte
      coulée ou prise. Djerba se classe, aux côtés de Préveza,
      parmi les deux grandes victoires navales ottomanes du
      XVIᵉ siècle; ensemble elles fixèrent la suprématie
      ottomane sur la Méditerranée centrale et orientale
      pendant les onze années qui menèrent à Lépante.
    canonical_hijri: {year: 967, month: 8, day: 8, precision: day}
    canonical_gregorian: {date: 1560-05-14, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Djerba' dates the destruction of the Christian fleet to 14 May 1560 (Shaʿbān 967 AH); the related entry 'Piyāle Pasha' confirms his command and the subsequent siege of the fortress."
      - source_key: editorial
        notes: "Cross-checked against Imber, *The Ottoman Empire 1300–1650*, and Hess, *The Forgotten Frontier*, both of whom attest 14 May 1560 as the day of the naval engagement, with the fortress falling on 31 July."
    people: [[suleiman-the-magnificent, ruler], [piyale-pasha, leader]]
    tags: [ottoman, battle, naval, djerba, piyale-pasha, mediterranean, spain, tunisia]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # DEATH OF TURGUT REʾĪS AT MALTA
  # =========================================================================

  - slug: death-of-turgut-reis
    category: ruler_death
    title_en: Death of Turgut Reʾīs (Dragut) — Bey of Tripoli at the Siege of Malta
    title_ar: استشهاد طورغوت رئيس (دراغوت) — بك طرابلس عند حصار مالطا
    title_fr: Mort de Turgut Reʾīs (Dragut) — bey de Tripoli au siège de Malte
    description_en: |
      Turgut Reʾīs (called Dragut by Christian sources), the
      septuagenarian *bey* of Tripoli of Libya and lieutenant
      of the late Khayr al-Dīn Barbarossa, was struck by a
      stone splinter while directing the Ottoman batteries
      against the fortress of Saint Elmo during the Great Siege
      of Malta. He died of his wound a few days later, before
      the Hospitaller fortress fell. Turgut had been the
      principal Ottoman naval commander of the western
      Mediterranean for two decades — he had taken Tripoli in
      958 AH (1551), commanded at Djerba alongside Piyāle in
      967 AH (1560), and joined the Malta expedition under
      Mustafa Pasha and Piyāle as the senior corsair voice.
      His death, more than any other single factor, drained
      the campaigning energy from the Ottoman command at Malta
      and contributed to the failure of the siege three months
      later.
    description_ar: |
      أُصيب طورغوت رئيس (المعروف عند المسيحيين بـ«دراغوت»)
      — بك طرابلس الغرب السبعيني ونائب خير الدين بربروس
      المتوفى — بشظية حجر بينما كان يوجّه مدافع العثمانيين
      على قلعة سان إلمو في الحصار الكبير لمالطا، فمات بعد
      أيام قبل سقوط القلعة الإسبتارية. كان طورغوت أبرزَ قادة
      البحرية العثمانية في غربي المتوسط طوال عقدين: فتح
      طرابلس سنة ٩٥٨ هـ (١٥٥١ م)، وحضر مع بياله معركة جربة
      سنة ٩٦٧ هـ (١٥٦٠ م)، وانضمّ إلى حملة مالطا تحت قيادة
      مصطفى باشا وبياله بوصفه شيخَ القراصنة الكبار. وقد كان
      موتُه من أهم العوامل المفردة التي استنزفت زخم القيادة
      العثمانية في مالطا، وأسهم في إخفاق الحصار بعد ثلاثة
      أشهر.
    description_fr: |
      Turgut Reʾīs (appelé Dragut par les sources chrétiennes),
      le septuagénaire *bey* de Tripoli de Libye et lieutenant
      du défunt Khayr al-Dīn Barbarossa, fut atteint par un
      éclat de pierre alors qu'il dirigeait les batteries
      ottomanes contre la forteresse de Saint-Elme lors du
      Grand Siège de Malte. Il succomba à sa blessure quelques
      jours plus tard, avant la chute de la forteresse
      hospitalière. Turgut avait été le principal commandant
      naval ottoman de la Méditerranée occidentale pendant
      deux décennies: il avait pris Tripoli en 958 H (1551),
      commandé à Djerba aux côtés de Piyāle en 967 H (1560),
      et rejoint l'expédition de Malte sous Mustafa Pasha et
      Piyāle comme la grande voix des corsaires. Sa mort fut,
      plus que tout autre facteur isolé, ce qui épuisa
      l'énergie offensive du commandement ottoman à Malte et
      contribua à l'échec du siège trois mois plus tard.
    canonical_hijri: {year: 972, month: 11, day: 14, precision: day}
    canonical_gregorian: {date: 1565-06-23, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Turghut Reʾīs' dates his mortal wounding before Saint Elmo to 18 June 1565 and his death to 23 June 1565 (Dhū al-Qaʿda 972 AH)."
      - source_key: editorial
        notes: "Cross-checked against Bradford, *The Great Siege: Malta 1565*, and Imber, *The Ottoman Empire 1300–1650*, both of whom attest 23 June 1565 as the date of death."
    people: [[suleiman-the-magnificent, ruler], [turgut-reis, deceased]]
    tags: [ottoman, naval, turgut, dragut, malta, siege, tripoli, death]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # ACEH–OTTOMAN ALLIANCE — INDIAN OCEAN
  # =========================================================================

  - slug: aceh-ottoman-expedition-1568
    category: political_event
    title_en: Aceh–Ottoman Expedition — Selīm II Sends Naval Aid to Sumatra
    title_ar: الحملة العثمانية إلى آتشيه — سليم الثاني يبعث النجدة البحرية إلى سومطرة
    title_fr: Expédition aceho-ottomane — Selīm II envoie une aide navale à Sumatra
    description_en: |
      Sultan Selīm II, in response to a 974 AH (1566)
      embassy from Sultan ʿAlāʾ al-Dīn Riʿāyat Shāh al-Qahhār
      of Aceh in northern Sumatra, dispatched an Ottoman
      naval-military mission to the Aceh sultanate carrying
      cannon-founders, gunners, fortification engineers, and
      heavy ordnance. The expedition under Kurdoğlu Khıḍr
      Reʾīs sailed from Suez via the Red Sea and the Indian
      Ocean and reached Aceh in 976 AH/1568, where its
      personnel reorganised the Acehnese army around Ottoman
      cannon and trained gun-crews. The Ottoman support
      enabled Aceh to mount sustained warfare against
      Portuguese Malacca over the next decade and inscribed
      Aceh into the diplomatic universe of the *khilāfa*
      ʿuthmāniyya — the Friday *khuṭba* in Aceh was thereafter
      sometimes pronounced in the name of the Ottoman sultan.
      The episode is the high-water mark of Ottoman naval
      reach into the Indian Ocean and one of the earliest
      formal alliances between the central Ottoman state and
      a sovereign Malay-Muslim polity.
    description_ar: |
      ردًّا على سفارة وردت سنة ٩٧٤ هـ (١٥٦٦ م) من سلطان آتشيه
      علاء الدين رعاية شاه القهار في شمالي سومطرة، أرسل
      السلطان سليم الثاني بعثةً عسكرية بحرية عثمانية إلى
      سلطنة آتشيه تحمل صنّاع المدافع وجنود المدفعية ومهندسي
      التحصينات والعتاد الثقيل. وأبحرت البعثة بقيادة
      كردأوغلو خضر رئيس من السويس عبر البحر الأحمر فالمحيط
      الهندي، وبلغت آتشيه سنة ٩٧٦ هـ (١٥٦٨ م)، فأعاد
      موظفوها تنظيم جيش آتشيه حول المدفع العثماني، ودرّبوا
      أطقم القنابل. ومكّن الدعم العثماني آتشيه من شنّ حرب
      مستديمة على ملقا البرتغالية في العقد التالي، وأدخل
      آتشيه إلى الكون الدبلوماسي للخلافة العثمانية، حتى إن
      الخطبة الجمعية في آتشيه باتت تُلقى أحياناً باسم السلطان
      العثماني. وتعدّ الحادثة منتهى الامتداد البحري العثماني
      في المحيط الهندي، وأحد أوّل التحالفات الرسمية بين
      الدولة العثمانية المركزية وكيان ماليزي مسلم سيد.
    description_fr: |
      Le sultan Selīm II, en réponse à une ambassade de 974 H
      (1566) du sultan ʿAlāʾ al-Dīn Riʿāyat Shāh al-Qahhār
      d'Aceh dans le nord de Sumatra, dépêcha une mission
      militaro-navale ottomane vers le sultanat d'Aceh,
      portant des fondeurs de canons, des artilleurs, des
      ingénieurs de fortification et des pièces lourdes.
      L'expédition, commandée par Kurdoğlu Khıḍr Reʾīs,
      partit de Suez par la mer Rouge et l'océan Indien et
      atteignit Aceh en 976 H / 1568, où son personnel
      réorganisa l'armée acehnaise autour du canon ottoman et
      forma les servants des pièces. Le soutien ottoman
      permit à Aceh de mener une guerre soutenue contre
      Malacca portugaise pendant la décennie suivante et
      inscrivit Aceh dans l'univers diplomatique du
      *khilāfa* ottomane — la *khuṭba* du vendredi à Aceh fut
      désormais parfois prononcée au nom du sultan ottoman.
      L'épisode est le point culminant de la portée navale
      ottomane dans l'océan Indien et l'une des toutes
      premières alliances formelles entre l'État ottoman
      central et une entité musulmane-malaise souveraine.
    canonical_hijri: {year: 976, precision: year}
    canonical_gregorian: {date: 1568-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 articles 'Atjèh' and 'Selīm II' attest the dispatch of the Ottoman expedition under Kurdoğlu Khıḍr Reʾīs to Aceh in 976 AH / 1568 with cannon-founders and military advisors."
      - source_key: editorial
        notes: "Cross-checked against Casale, *The Ottoman Age of Exploration*, ch. 5, and Reid, *Sixteenth-Century Turkish Influence in Western Indonesia* (JSEAH 1969), both of whom attest the 1568 mission and its impact on Aceh's wars against Portuguese Malacca."
    people: [[selim-ii, ruler]]
    tags: [ottoman, aceh, sumatra, indian-ocean, naval, indonesia, portugal, alliance]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # OTTOMAN ANNEXATION OF CHIOS
  # =========================================================================

  - slug: ottoman-annexation-of-chios-1566
    category: conquest
    title_en: Ottoman Annexation of Chios — Piyāle Pasha Ends Genoese Maona Rule
    title_ar: ضمّ الدولة العثمانية لساقز (خيوس) — بياله باشا ينهي حكم الماونة الجنوية
    title_fr: Annexion ottomane de Chios — Piyāle Pasha met fin à la mahonne génoise
    description_en: |
      The Ottoman kapudan-ı deryā Piyāle Pasha, sailing from
      Constantinople with a fleet of eighty galleys, took
      possession of the Aegean island of Chios (Sakız) from
      its Genoese rulers, the Maona di Chio, ending two and a
      half centuries of Latin commercial autonomy in the
      eastern Aegean. The Genoese podestà had defaulted on
      Chios's annual tribute to the Porte and had been accused
      of harbouring Spanish-Habsburg agents; Piyāle landed
      without resistance, deposed the Maona, and incorporated
      Chios into the Ottoman *eyālet* of the islands. The
      lucrative mastic trade — Chios was the only place where
      mastic was cultivated — was thereafter administered as
      an Ottoman crown monopoly. The takeover removed the
      last Latin-Christian island stronghold in the Aegean
      apart from Venetian Crete and consolidated Ottoman
      maritime control of the central Aegean.
    description_ar: |
      أبحر قبودان دريا العثماني بياله باشا من القسطنطينية على
      رأس أسطول من ثمانين سفينة، فاستولى على جزيرة ساقز
      (خيوس) في بحر إيجه من حكامها الجنويين «الماونة الكية»،
      فأنهى قرنين ونصف قرن من الحكم الذاتي التجاري اللاتيني
      في شرق إيجه. كان البودستا الجنوي قد امتنع عن دفع جزية
      ساقز السنوية للباب العالي، واتُّهم بإيواء عملاء
      الهابسبورغ الإسبان. أنزل بياله جنده دون مقاومة، فعزل
      الماونة، وضمّ ساقز إلى ولاية الجزائر العثمانية. وأديرت
      تجارة المستكي المربحة بعد ذلك بوصفها احتكاراً سلطانياً
      عثمانياً، وكانت ساقز الموطنَ الأوحد لزراعة المستكي.
      وأزال الضمُّ آخرَ معاقل النصارى اللاتين في إيجه عدا
      جزيرة كريت البندقية، ووطّد سيطرة العثمانيين البحرية على
      وسط إيجه.
    description_fr: |
      Le kapudan-ı deryā ottoman Piyāle Pasha, partant de
      Constantinople avec une flotte de quatre-vingts galères,
      prit possession de l'île égéenne de Chios (Sakız) au
      détriment de ses maîtres génois, la Maona di Chio,
      mettant fin à deux siècles et demi d'autonomie
      commerciale latine dans l'Égée orientale. Le podestat
      génois avait fait défaut sur le tribut annuel dû à la
      Sublime Porte et avait été accusé d'abriter des agents
      hispano-habsbourgeois. Piyāle débarqua sans résistance,
      déposa la Maona et intégra Chios à l'*eyālet* ottoman
      des Îles. Le lucratif commerce du mastic — Chios était
      le seul lieu de culture du mastic — fut désormais géré
      comme monopole de la couronne ottomane. La prise
      écartait le dernier bastion latin-chrétien insulaire de
      l'Égée à l'exception de la Crète vénitienne et consolida
      la maîtrise maritime ottomane sur l'Égée centrale.
    canonical_hijri: {year: 973, month: 9, day: 15, precision: day}
    canonical_gregorian: {date: 1566-04-15, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Sakız' (Chios) dates Piyāle Pasha's annexation of Chios from the Genoese Maona to 14–15 April 1566 (Ramaḍān 973 AH); the article confirms the closure of the mastic monopoly under Ottoman administration."
      - source_key: editorial
        notes: "Cross-checked against Imber, *The Ottoman Empire 1300–1650*, ch. 8, and Argenti, *The Occupation of Chios by the Turks*, both of whom attest 15 April 1566 as the day of the takeover."
    people: [[suleiman-the-magnificent, ruler], [piyale-pasha, leader]]
    tags: [ottoman, chios, sakiz, aegean, piyale-pasha, genoa, naval, mastic]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # DEATH OF PIYĀLE PASHA
  # =========================================================================

  - slug: death-of-piyale-pasha
    category: ruler_death
    title_en: Death of Piyāle Pasha — Victor of Djerba and Conqueror of Chios
    title_ar: وفاة بياله باشا — منتصر جربة وفاتح ساقز
    title_fr: Mort de Piyāle Pasha — vainqueur de Djerba et conquérant de Chios
    description_en: |
      Piyāle Pasha, kapudan-ı deryā of Süleymān al-Qānūnī and
      son-in-law of Sultan Selīm II, died at his Constantinople
      residence and was buried in his mosque-complex at
      Kasımpaşa, designed by the architect Sinan and known as
      the Piyāle Paşa Camii. Of devshirme Hungarian origin, he
      had served at sea from the Tripoli campaign of 958 AH
      onward, won the great Ottoman naval victory at Djerba
      in 967 AH (1560), commanded the maritime arm of the
      Malta expedition (972 AH/1565), annexed Chios and the
      western Aegean (973 AH/1566), and shared command at
      Lepanto's antecedent campaigns. With his death the
      generation of Khayr al-Dīn's direct successors as
      kapudan-ı deryā closed; his still-standing mosque
      remains one of the principal Sinan-era monuments of
      Constantinople's European shore.
    description_ar: |
      توفي بياله باشا، قبودان دريا السلطان سليمان القانوني
      وصهر السلطان سليم الثاني، في داره بالقسطنطينية، ودُفن
      في كليّته في قاسم باشا، وهي مسجد ومجمع من تصميم
      المعمار سنان، يعرف بـ«جامع بياله باشا». كان من أصل
      هنغاري دفشرمي، خدم في البحر منذ حملة طرابلس سنة ٩٥٨ هـ،
      وحقق نصر العثمانيين البحري الكبير في جربة سنة ٩٦٧ هـ
      (١٥٦٠ م)، وقاد الذراع البحرية في حملة مالطا (٩٧٢ هـ /
      ١٥٦٥ م)، وضمّ ساقز وغرب إيجه (٩٧٣ هـ / ١٥٦٦ م)، وشارك
      في القيادة في حملات سابقة لليبانتو. وبوفاته انتهى جيلُ
      الورثة المباشرين لخير الدين في منصب قبودان دريا، وما
      زال مسجده القائم من أهم آثار سنان على الساحل الأوروبي
      للقسطنطينية.
    description_fr: |
      Piyāle Pasha, kapudan-ı deryā de Soliman al-Qānūnī et
      gendre du sultan Selīm II, mourut dans sa résidence de
      Constantinople et fut inhumé dans son ensemble mosquée-
      *külliye* de Kasımpaşa, œuvre de l'architecte Sinan,
      connu sous le nom de Piyāle Paşa Camii. D'origine
      hongroise (devshirme), il avait servi en mer depuis la
      campagne de Tripoli de 958 H, remporté la grande
      victoire navale ottomane de Djerba en 967 H (1560),
      commandé le bras maritime de l'expédition de Malte (972
      H / 1565), annexé Chios et l'ouest de l'Égée (973 H /
      1566) et partagé le commandement aux campagnes en
      amont de Lépante. Avec sa mort se referma la génération
      des successeurs directs de Khayr al-Dīn au poste de
      kapudan-ı deryā; sa mosquée, toujours debout, reste l'un
      des principaux monuments d'époque sinanienne sur la
      rive européenne de Constantinople.
    canonical_hijri: {year: 985, month: 11, day: 2, precision: day}
    canonical_gregorian: {date: 1578-01-21, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Piyāle Pasha' dates his death to 21 January 1578 (Dhū al-Qaʿda 985 AH) at Constantinople and confirms his burial in the Sinan-designed Piyāle Paşa Camii at Kasımpaşa."
      - source_key: editorial
        notes: "Cross-checked against Imber, *The Ottoman Empire 1300–1650*, who attests 1578 as the year of death; the still-standing mosque is the principal Sinan monument of Kasımpaşa."
    people: [[selim-ii, ruler], [piyale-pasha, deceased]]
    tags: [ottoman, naval, piyale-pasha, kapudan-i-derya, death, constantinople, sinan]
    importance: notable
    verified: true
    verification_status: cross_verified
