  - slug: death-of-ibn-al-munkadir
    category: scholar
    title_en: Death of Muḥammad ibn al-Munkadir
    title_ar: وفاة محمد بن المنكدر
    title_fr: Mort de Muḥammad ibn al-Munkadir
    description_en: |
      Abū ʿAbdillāh Muḥammad ibn al-Munkadir al-Taymī al-Qurashī,
      a senior Madinan tabiʿi muḥaddith and ascetic, died at age
      about 76. He narrated directly from Jābir ibn ʿAbdillāh,
      Anas ibn Mālik, ʿUrwa ibn al-Zubayr, ʿĀʾisha, and other
      senior Companions and tabiʿūn, and his narrations populate
      a great many of the hadiths cited in *Ṣaḥīḥ al-Bukhārī* and
      *Ṣaḥīḥ Muslim*. Among his pupils stand Imām Mālik, Shuʿba
      ibn al-Ḥajjāj, Sufyān al-Thawrī, Sufyān ibn ʿUyayna, and
      Ibn Jurayj — virtually every major hadith authority of the
      next generation. Sufyān ibn ʿUyayna said of him: "We have
      not seen anyone better at performance of intimate worship
      with God than Muḥammad ibn al-Munkadir."
    description_ar: |
      توفي الإمام أبو عبد الله محمد بن المنكدر التيمي القرشي —
      من كبار محدثي المدينة وزهادها من التابعين — عن نحو ست
      وسبعين سنة. روى مباشرة عن جابر بن عبد الله وأنس بن مالك
      وعروة بن الزبير وعائشة وغيرهم من كبار الصحابة والتابعين،
      وأحاديثه كثيرة في «صحيح البخاري» و«صحيح مسلم». وأخذ عنه
      الإمام مالك وشعبة بن الحجاج وسفيان الثوري وسفيان بن عيينة
      وابن جريج، أي عامة كبار محدثي الطبقة التالية. قال سفيان
      بن عيينة: «ما رأينا أحداً أحسن قياماً بحال العبد بين يدي
      الله من محمد بن المنكدر».
    description_fr: |
      Abū ʿAbdillāh Muḥammad ibn al-Munkadir al-Taymī al-Qurashī,
      muḥaddith et ascète médinois éminent de la génération
      tabiʿi, mourut à l'âge d'environ 76 ans. Il transmit
      directement de Jābir ibn ʿAbdillāh, Anas ibn Mālik, ʿUrwa
      ibn al-Zubayr, ʿĀʾisha et d'autres Compagnons et tabiʿūn
      éminents, et ses narrations alimentent un grand nombre des
      hadiths cités dans le *Ṣaḥīḥ al-Bukhārī* et le *Ṣaḥīḥ
      Muslim*. Comptent parmi ses élèves l'imam Mālik, Shuʿba
      ibn al-Ḥajjāj, Sufyān al-Thawrī, Sufyān ibn ʿUyayna et
      Ibn Jurayj — presque toutes les autorités majeures de la
      génération suivante. Sufyān ibn ʿUyayna dit de lui : « nous
      n'avons vu personne s'acquitter mieux que Muḥammad ibn
      al-Munkadir de la station d'intimité avec Dieu ».
    canonical_hijri: {year: 130, precision: year}
    canonical_gregorian: {date: 747-01-01, precision: year, method: attested}
