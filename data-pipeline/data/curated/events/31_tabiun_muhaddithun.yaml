  - slug: death-of-amr-ibn-dinar
    category: scholar
    title_en: Death of ʿAmr ibn Dīnār al-Makkī
    title_ar: وفاة عمرو بن دينار المكي
    title_fr: Mort de ʿAmr ibn Dīnār al-Makkī
    description_en: |
      Abū Muḥammad ʿAmr ibn Dīnār al-Jumaḥī al-Makkī, the leading
      Meccan tabiʿi muḥaddith of his generation and mufti of Mecca,
      died at age about 80. Of mawlā lineage to the Banū Jumaḥ,
      he transmitted directly from Ibn ʿAbbās, Ibn ʿUmar, Jābir
      ibn ʿAbdillāh, Abū Hurayra, and other senior Companions ra,
      and was a key relay-point for Meccan ʿilm. Among his pupils
      stand Sufyān ibn ʿUyayna — who took most of his teaching
      programme from him — Shuʿba, Mālik, and Ibn Jurayj. Shuʿba
      said: "I have not seen anyone like ʿAmr ibn Dīnār"; al-Dhahabī
      ranks him "the imam, the ḥāfiẓ, the master of the people of
      Mecca." His succession in the office of Meccan mufti passed
      to Ibn Abī Najīḥ.
    description_ar: |
      توفي الإمام أبو محمد عمرو بن دينار الجمحي المكي — كبير محدثي
      مكة من التابعين ومفتيها — عن نحو ثمانين سنة. كان من موالي
      بني جمح، وروى مباشرة عن ابن عباس وابن عمر وجابر بن عبد الله
      وأبي هريرة وغيرهم من كبار الصحابة رضي الله عنهم، فكان من
      أعمدة العلم بمكة. وأخذ عنه سفيان بن عيينة فحمل عنه عامة
      علمه، وأخذ عنه شعبة ومالك وابن جريج. قال شعبة: «ما رأيت
      مثل عمرو بن دينار»، وعدّه الذهبي «الإمام الحافظ، شيخ أهل
      مكة». وانتقلت إفتاء مكة من بعده إلى ابن أبي نجيح.
    description_fr: |
      Abū Muḥammad ʿAmr ibn Dīnār al-Jumaḥī al-Makkī, le
      muḥaddith mecquois tabiʿi le plus éminent de sa génération
      et mufti de La Mecque, mourut à l'âge d'environ 80 ans.
      D'ascendance d'affranchi des Banū Jumaḥ, il transmit
      directement d'Ibn ʿAbbās, d'Ibn ʿUmar, de Jābir ibn
      ʿAbdillāh, d'Abū Hurayra et d'autres Compagnons éminents
      ra, et fut un relais central de la science mecquoise.
      Comptent parmi ses élèves Sufyān ibn ʿUyayna — qui prit
      de lui l'essentiel de son programme d'enseignement —
      Shuʿba, Mālik et Ibn Jurayj. Shuʿba dit : « je n'ai vu
      personne comme ʿAmr ibn Dīnār » ; al-Dhahabī le tient pour
      « l'imam, le ḥāfiẓ, le maître des gens de La Mecque ». La
      charge d'iftāʾ mecquois passa après lui à Ibn Abī Najīḥ.
