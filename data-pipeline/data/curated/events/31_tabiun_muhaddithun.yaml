  - slug: death-of-hammad-ibn-abi-sulayman
    category: scholar
    title_en: Death of Ḥammād ibn Abī Sulaymān
    title_ar: وفاة حماد بن أبي سليمان
    title_fr: Mort de Ḥammād ibn Abī Sulaymān
    description_en: |
      Abū Ismāʿīl Ḥammād ibn Abī Sulaymān al-Ashʿarī, the foremost
      Kufan jurist of the second tabiʿi generation and the direct
      teacher of Imām Abū Ḥanīfa, died in Kufa. He was the principal
      student of Ibrāhīm al-Nakhaʿī and inherited from him the Kufan
      legal tradition that runs back through ʿAlqama and al-Aswad to
      Ibn Masʿūd ra. Abū Ḥanīfa studied under him for eighteen years
      until Ḥammād's death, after which he succeeded him in the
      teaching circle and built the Ḥanafī madhhab on its
      foundations. Sufyān al-Thawrī and Shuʿba ibn al-Ḥajjāj also
      transmitted hadith from him, and his narrations appear in the
      Six Books. Al-Dhahabī describes him as "the imam, the jurist
      of Iraq."
    description_ar: |
      توفي الإمام أبو إسماعيل حماد بن أبي سليمان الأشعري — كبير
      فقهاء الكوفة في طبقته الثانية من التابعين وشيخ الإمام أبي
      حنيفة المباشر — بالكوفة. وكان الكبير من أصحاب إبراهيم
      النخعي، فورث عنه فقه أهل العراق المتسلسل من علقمة والأسود
      عن ابن مسعود رضي الله عنه. لازمه الإمام أبو حنيفة ثماني عشرة
      سنة إلى وفاته، فجلس مكانه في حلقة الكوفة وبنى المذهب الحنفي
      على أصوله. وأخذ عنه أيضاً سفيان الثوري وشعبة بن الحجاج،
      وحديثه في الكتب الستة. قال عنه الذهبي: «الإمام، فقيه
      العراق».
    description_fr: |
      Abū Ismāʿīl Ḥammād ibn Abī Sulaymān al-Ashʿarī, le plus grand
      juriste kufien de la seconde génération tabiʿi et maître
      direct de l'imam Abū Ḥanīfa, mourut à Kufa. Il fut l'élève
      principal d'Ibrāhīm al-Nakhaʿī et hérita par lui de la
      tradition juridique kufienne remontant par ʿAlqama et al-Aswad
      jusqu'à Ibn Masʿūd ra. Abū Ḥanīfa étudia auprès de lui dix-huit
      années jusqu'à sa mort, lui succéda dans le cercle
      d'enseignement et bâtit l'école hanafite sur ses fondations.
      Sufyān al-Thawrī et Shuʿba ibn al-Ḥajjāj transmirent également
      le hadith de lui, et ses narrations figurent dans les Six
      Livres. Al-Dhahabī le décrit comme « l'imam, le juriste de
      l'Irak ».
