  - slug: death-of-yahya-ibn-said-al-ansari
    category: scholar
    title_en: Death of Yaḥyā ibn Saʿīd al-Anṣārī
    title_ar: وفاة يحيى بن سعيد الأنصاري
    title_fr: Mort de Yaḥyā ibn Saʿīd al-Anṣārī
    description_en: |
      Abū Saʿīd Yaḥyā ibn Saʿīd ibn Qays al-Anṣārī, the senior
      tabiʿi muḥaddith of Medina and qāḍī of the city in his time,
      died at age about 70. He met a number of senior Companions —
      Anas ibn Mālik, al-Sāʾib ibn Yazīd, Abū Umāma — and his
      narrations are accepted across all six canonical collections.
      He was the principal hadith teacher of Imām Mālik, who
      transmitted some 110 hadith from him in the *Muwaṭṭaʾ*; among
      his other pupils stand al-Layth ibn Saʿd, Sufyān al-Thawrī,
      Sufyān ibn ʿUyayna, and ʿAbdullāh ibn al-Mubārak. Aḥmad ibn
      Ḥanbal placed him "above al-Zuhrī in precision," and Yaḥyā
      ibn Maʿīn said simply: "trustworthy, no defect can attach to
      his narrations."
    description_ar: |
      توفي الإمام أبو سعيد يحيى بن سعيد بن قيس الأنصاري — كبير
      محدثي المدينة من التابعين وقاضيها في عصره — عن نحو سبعين
      سنة. لقي جماعة من الصحابة، منهم أنس بن مالك والسائب بن يزيد
      وأبو أمامة، وأحاديثه في الكتب الستة جميعاً. وهو شيخ الإمام
      مالك في الحديث، روى عنه في «الموطأ» نحو مئة وعشرة أحاديث،
      ومن تلاميذه الليث بن سعد وسفيان الثوري وسفيان بن عيينة
      وعبد الله بن المبارك. قدّمه الإمام أحمد على الزهري في
      الإتقان، وقال يحيى بن معين: «ثقة، لا يُتعلَّق عليه برواية».
    description_fr: |
      Abū Saʿīd Yaḥyā ibn Saʿīd ibn Qays al-Anṣārī, le muḥaddith
      tabiʿi le plus important de Médine et qāḍī de la ville en
      son temps, mourut à l'âge d'environ 70 ans. Il rencontra
      plusieurs Compagnons éminents — Anas ibn Mālik, al-Sāʾib
      ibn Yazīd, Abū Umāma — et ses transmissions sont reçues
      dans les six recueils canoniques. Il fut le maître de
      hadith principal de l'imam Mālik, qui transmit de lui
      environ 110 hadiths dans le *Muwaṭṭaʾ* ; comptent aussi
      parmi ses élèves al-Layth ibn Saʿd, Sufyān al-Thawrī,
      Sufyān ibn ʿUyayna et ʿAbdullāh ibn al-Mubārak. Aḥmad ibn
      Ḥanbal le plaça « au-dessus d'al-Zuhrī en précision », et
      Yaḥyā ibn Maʿīn dit simplement : « digne de confiance, on
      ne peut rien reprocher à ses narrations ».
