  - slug: death-of-tawus-ibn-kaysan
    category: scholar
    title_en: Death of Ṭāwūs ibn Kaysān al-Yamānī
    title_ar: وفاة طاووس بن كيسان اليماني
    title_fr: Mort de Ṭāwūs ibn Kaysān al-Yamānī
    description_en: |
      Abū ʿAbd al-Raḥmān Ṭāwūs ibn Kaysān al-Yamānī, the foremost
      Yemeni tabiʿi and the most distinguished student of Ibn ʿAbbās
      ra in tafsir for the southern peninsula, died on the days of
      tashrīq during ḥajj at age about 90 and was buried at
      Muzdalifa. Through Ṭāwūs the Yemeni school inherited the
      Qurʾānic exegesis of "the interpreter of the Qurʾān"
      (*tarjumān al-Qurʾān*) — Ibn ʿAbbās ra — alongside which he
      transmitted from ʿĀʾisha, Abū Hurayra, Zayd ibn Thābit, and
      others among the senior Companions. Ibn ʿAbbās said of him:
      "I think Ṭāwūs is among the people of Paradise." His son
      ʿAbdullāh inherited the family's scholarly mantle in Yemen.
    description_ar: |
      توفي الإمام أبو عبد الرحمن طاووس بن كيسان اليماني — كبير تابعي
      اليمن وأبرز أصحاب ابن عباس رضي الله عنه في التفسير في جنوب
      الجزيرة — في أيام التشريق وهو حاج، عن نحو تسعين سنة، ودُفن
      بالمزدلفة. ورث اليمن من خلال طاووس تفسير «ترجمان القرآن» ابن
      عباس رضي الله عنه، ولقي عائشة وأبا هريرة وزيد بن ثابت وغيرهم
      من كبار الصحابة. قال عنه ابن عباس: «إني لأظنه من أهل الجنة».
      وورث ابنه عبد الله رئاسة العلم في أهل اليمن من بعده.
    description_fr: |
      Abū ʿAbd al-Raḥmān Ṭāwūs ibn Kaysān al-Yamānī, le plus
      éminent tabiʿi yéménite et le disciple le plus distingué
      d'Ibn ʿAbbās ra en tafsir pour la péninsule méridionale,
      mourut durant les jours de tashrīq pendant le ḥajj à l'âge
      d'environ 90 ans, et fut enterré à Muzdalifa. Par Ṭāwūs,
      l'école yéménite hérita de l'exégèse coranique de
      « l'interprète du Coran » (*tarjumān al-Qurʾān*) — Ibn ʿAbbās
      ra — outre les transmissions qu'il reçut d'ʿĀʾisha, Abū
      Hurayra, Zayd ibn Thābit et d'autres Compagnons majeurs.
      Ibn ʿAbbās dit de lui : « je le crois parmi les gens du
      Paradis ». Son fils ʿAbdullāh hérita du flambeau scientifique
      familial au Yémen.
