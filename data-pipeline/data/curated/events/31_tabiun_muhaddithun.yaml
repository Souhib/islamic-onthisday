# Wave 18 of curated event additions (2026-04-27).
# 12 foundational tabi'un muḥaddithūn and jurists across the major centres
# of early Islamic learning — Kufa, Basra, Mecca, Medina, Yemen — all
# attested in al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ*, Ibn Saʿd's *Ṭabaqāt
# al-Kabīr*, and the wafayāt literature. Each is the principal teacher,
# isnād-anchor, or proto-codifier of one of the regional schools that fed
# into the four Sunni madhāhib and the Six Books. Tabi'un are *not*
# sahaba, so no `is_sahabi: true` and no `image_blocked_reason` here.
# Trilingual (en/ar/fr); year-precision dominates as classical sources
# generally fix only the wafat year for this generation.

events:
  # =========================================================================
  # FOUNDATIONAL TABI'UN MUḤADDITHŪN AND JURISTS
  # =========================================================================

  - slug: death-of-ibrahim-al-nakhai
    category: scholar
    title_en: Death of Ibrāhīm al-Nakhaʿī
    title_ar: وفاة إبراهيم النخعي
    title_fr: Mort d'Ibrāhīm al-Nakhaʿī
    description_en: |
      Ibrāhīm ibn Yazīd al-Nakhaʿī, the foremost Kufan jurist of his
      generation and the lynchpin of the Iraqi school of independent
      legal reasoning (*raʾy*), died at age about 49. He was the nephew
      and student of al-Aswad ibn Yazīd al-Nakhaʿī and ʿAlqama ibn
      Qays, both major students of Ibn Masʿūd ra, through whom he
      inherited the Kufan fiqh tradition. His own student Ḥammād ibn
      Abī Sulaymān taught Imām Abū Ḥanīfa, making the chain
      Ibn Masʿūd → ʿAlqama → Ibrāhīm al-Nakhaʿī → Ḥammād → Abū Ḥanīfa
      the foundational lineage of the Ḥanafī madhhab. Al-Shaʿbī said:
      "What he leaves behind is greater than what he takes from us."
    description_ar: |
      توفي الإمام إبراهيم بن يزيد النخعي — كبير فقهاء الكوفة في عصره
      وعمود مدرسة العراق في الفقه بالرأي — عن نحو تسع وأربعين سنة. وكان
      ابن أخت الأسود بن يزيد النخعي وتلميذ علقمة بن قيس، وكلاهما من كبار
      أصحاب ابن مسعود رضي الله عنه، فورث منهما فقه الكوفة. وعنه أخذ
      حماد بن أبي سليمان شيخ الإمام أبي حنيفة، فكان الإسناد:
      «ابن مسعود → علقمة → إبراهيم النخعي → حماد → أبو حنيفة»
      هو السلسلة الأصلية للمذهب الحنفي. قال الشعبي: «ما خلَّفه أعظمُ
      مما أخذ منا».
    description_fr: |
      Ibrāhīm ibn Yazīd al-Nakhaʿī, le plus grand juriste de Kufa de
      sa génération et la clef de voûte de l'école irakienne du
      raisonnement juridique indépendant (*raʾy*), mourut à l'âge
      d'environ 49 ans. Neveu et disciple d'al-Aswad ibn Yazīd
      al-Nakhaʿī et d'ʿAlqama ibn Qays, eux-mêmes principaux élèves
      d'Ibn Masʿūd ra, il hérita par eux de la tradition fiqh kufienne.
      Son propre élève Ḥammād ibn Abī Sulaymān fut le maître de
      l'imam Abū Ḥanīfa, faisant de la chaîne
      Ibn Masʿūd → ʿAlqama → Ibrāhīm al-Nakhaʿī → Ḥammād → Abū Ḥanīfa
      la lignée fondatrice de l'école hanafite. Al-Shaʿbī dit de lui :
      « ce qu'il laisse derrière est plus grand que ce qu'il prend
      de nous ».
