  - slug: death-of-ayyub-al-sakhtiyani
    category: scholar
    title_en: Death of Ayyūb al-Sakhtiyānī
    title_ar: وفاة أيوب السختياني
    title_fr: Mort d'Ayyūb al-Sakhtiyānī
    description_en: |
      Abū Bakr Ayyūb ibn Abī Tamīma Kaysān al-Sakhtiyānī, the
      foremost Basran tabiʿi muḥaddith of his generation, died
      during the plague of Basra at age about 65. He was a
      principal student of al-Ḥasan al-Baṣrī, Ibn Sīrīn, and
      ʿAṭāʾ ibn Abī Rabāḥ, and the chief teacher of Ḥammād ibn
      Zayd, Sufyān al-Thawrī, Shuʿba, and Imām Mālik — every one
      of them transmits from him in the canonical collections.
      Imām al-Shāfiʿī called him "the foremost imam of Basra in
      his time," and Mālik named him simply "the master of the
      youth of the East." Al-Dhahabī ranks him among the very
      first Basran scholars to make Sunna the unambiguous norm
      against the rising kalām currents.
    description_ar: |
      توفي الإمام أبو بكر أيوب بن أبي تميمة كيسان السختياني —
      كبير محدثي البصرة من التابعين في عصره — في طاعون البصرة
      عن نحو خمس وستين سنة. وكان كبير أصحاب الحسن البصري وابن
      سيرين وعطاء بن أبي رباح، وشيخ حماد بن زيد وسفيان الثوري
      وشعبة والإمام مالك، يروون عنه جميعاً في الكتب الستة. قال
      عنه الإمام الشافعي: «أيوب إمام أهل البصرة في زمانه»،
      وقال مالك: «هو سيد فتيان أهل المشرق». ويعدّه الذهبي من
      أوائل علماء البصرة الذين كرّسوا السنة عَلَماً ظاهراً في
      مواجهة تيارات الكلام الصاعدة.
    description_fr: |
      Abū Bakr Ayyūb ibn Abī Tamīma Kaysān al-Sakhtiyānī, le
      muḥaddith tabiʿi de Bassora le plus éminent de sa
      génération, mourut durant la peste de Bassora à l'âge
      d'environ 65 ans. Il fut un disciple principal d'al-Ḥasan
      al-Baṣrī, d'Ibn Sīrīn et d'ʿAṭāʾ ibn Abī Rabāḥ, et le
      maître en chef de Ḥammād ibn Zayd, de Sufyān al-Thawrī,
      de Shuʿba et de l'imam Mālik — tous transmettent de lui
      dans les recueils canoniques. L'imam al-Shāfiʿī l'appela
      « l'imam principal de Bassora en son temps », et Mālik
      simplement « le maître des jeunes gens de l'Orient ».
      Al-Dhahabī le range parmi les tout premiers savants
      bassorites à avoir établi la Sunna comme norme indubitable
      contre les courants kalām naissants.
