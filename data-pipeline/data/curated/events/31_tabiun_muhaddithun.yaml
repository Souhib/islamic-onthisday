  - slug: death-of-ibn-jurayj
    category: scholar
    title_en: Death of Ibn Jurayj (ʿAbd al-Malik ibn ʿAbd al-ʿAzīz)
    title_ar: وفاة ابن جريج (عبد الملك بن عبد العزيز)
    title_fr: Mort d'Ibn Jurayj (ʿAbd al-Malik ibn ʿAbd al-ʿAzīz)
    description_en: |
      Abū al-Walīd ʿAbd al-Malik ibn ʿAbd al-ʿAzīz ibn Jurayj, the
      first scholar of Mecca to systematically compile hadith into
      written collections (*muṣannafāt*) and the foundational link
      between the Meccan and Medinan transmission chains, died on
      11 Dhū al-Ḥijja at age about 70. He was the principal student
      of ʿAṭāʾ ibn Abī Rabāḥ — through whom he inherited the school
      of Ibn ʿAbbās ra — and the chief teacher of Sufyān ibn ʿUyayna
      and ʿAbd al-Razzāq al-Ṣanʿānī. Al-Dhahabī calls him "the imam
      of the people of the Sacred Sanctuary" (*imām ahl al-ḥaram*).
      Aḥmad ibn Ḥanbal said: "Ibn Jurayj was the first to author
      books in Islam." His mawlā lineage was Roman-Greek, attesting
      the cosmopolitan composition of early Meccan scholarship.
    description_ar: |
      توفي الإمام أبو الوليد عبد الملك بن عبد العزيز بن جريج — أول من
      صنّف الحديث في مكة تصنيفاً منهجياً، وحلقة الوصل الأساسية بين
      أسانيد مكة والمدينة — في الحادي عشر من ذي الحجة عن نحو سبعين
      سنة. وكان كبير أصحاب عطاء بن أبي رباح، الذي ورث عنه فقه ابن عباس
      رضي الله عنه، وشيخ سفيان بن عيينة وعبد الرزاق الصنعاني. وصفه
      الذهبي بأنه «إمام أهل الحرم»، وقال عنه الإمام أحمد: «أول من
      صنّف الكتب في الإسلام ابن جريج». وكان رومي الأصل بالولاء، مما
      يشهد بسعة المنبت العلمي بمكة في صدر الإسلام.
    description_fr: |
      Abū al-Walīd ʿAbd al-Malik ibn ʿAbd al-ʿAzīz ibn Jurayj,
      premier savant de La Mecque à compiler systématiquement le
      hadith en recueils écrits (*muṣannafāt*) et chaînon fondateur
      entre les chaînes de transmission mecquoise et médinoise,
      mourut le 11 Dhū al-Ḥijja à l'âge d'environ 70 ans. Il fut
      le disciple principal de ʿAṭāʾ ibn Abī Rabāḥ — par qui il
      hérita de l'école d'Ibn ʿAbbās ra — et le maître en chef de
      Sufyān ibn ʿUyayna et de ʿAbd al-Razzāq al-Ṣanʿānī. Al-Dhahabī
      l'appelle « l'imam des gens du Sanctuaire sacré ». Aḥmad ibn
      Ḥanbal dit : « Ibn Jurayj fut le premier à composer des livres
      en Islam ». Son ascendance d'affranchi gréco-romain atteste du
      cosmopolitisme de l'érudition mecquoise primitive.
    canonical_hijri: {year: 150, month: 12, day: 11, precision: day}
    canonical_gregorian: {date: 768-01-11, precision: day, method: tabular_conversion}
