  - slug: death-of-al-araj
    category: scholar
    title_en: Death of al-Aʿraj (ʿAbd al-Raḥmān ibn Hurmuz)
    title_ar: وفاة الأعرج (عبد الرحمن بن هرمز)
    title_fr: Mort d'al-Aʿraj (ʿAbd al-Raḥmān ibn Hurmuz)
    description_en: |
      Abū Dāwūd ʿAbd al-Raḥmān ibn Hurmuz al-Aʿraj, the senior
      Madinan Qurʾān reciter and muḥaddith of his generation, died
      in Alexandria after settling there. Of mawlā lineage to the
      Banū Hāshim, he was a direct narrator from Abū Hurayra and
      Abū Saʿīd al-Khudrī ra, and one of the most prolific
      transmitters of Abū Hurayra's hadiths preserved in the Six
      Books. Imām Mālik considered him a foundational teacher and
      transmitted from him in the *Muwaṭṭaʾ*; classical biographers
      number him among the early codifiers of Arabic philological
      method, including the elaboration of vocalisation rules
      (*shakl*) for the Qurʾānic text. Al-Dhahabī describes him as
      "the imam, the master reciter, the muḥaddith."
    description_ar: |
      توفي الإمام أبو داود عبد الرحمن بن هرمز الأعرج — كبير قراء
      المدينة ومحدثيها في عصره — بالإسكندرية بعد أن سكنها. كان
      من موالي بني هاشم، وروى مباشرة عن أبي هريرة وأبي سعيد
      الخدري رضي الله عنهما، وهو من أكثر الناس رواية لحديث أبي
      هريرة في الكتب الستة. وعدّه الإمام مالك من شيوخه الأوائل
      وروى عنه في «الموطأ»، ويذكر أهل التراجم أنه ممن وضع أصول
      علم العربية، ومنها قواعد شكل المصحف. قال عنه الذهبي:
      «الإمام، المقرئ، المحدّث».
    description_fr: |
      Abū Dāwūd ʿAbd al-Raḥmān ibn Hurmuz al-Aʿraj, le récitant
      coranique et muḥaddith médinois le plus important de sa
      génération, mourut à Alexandrie après s'y être installé.
      D'ascendance d'affranchi des Banū Hāshim, il fut un
      transmetteur direct d'Abū Hurayra et d'Abū Saʿīd al-Khudrī
      ra, et l'un des plus prolifiques relayeurs des hadiths
      d'Abū Hurayra conservés dans les Six Livres. L'imam Mālik
      le compta parmi ses maîtres fondateurs et transmit de lui
      dans le *Muwaṭṭaʾ* ; les biographes classiques le rangent
      parmi les premiers codificateurs de la méthode philologique
      arabe, dont les règles de vocalisation (*shakl*) du texte
      coranique. Al-Dhahabī le décrit comme « l'imam, le maître
      récitant, le muḥaddith ».
