  - slug: death-of-mamar-ibn-rashid
    category: scholar
    title_en: Death of Maʿmar ibn Rāshid
    title_ar: وفاة معمر بن راشد
    title_fr: Mort de Maʿmar ibn Rāshid
    description_en: |
      Abū ʿUrwa Maʿmar ibn Rāshid al-Azdī, originally of Basra and
      long settled in Yemen, the leading muḥaddith of Sanaa in his
      time and one of the earliest systematic compilers of hadith
      collections (*muṣannafāt*), died in Sanaa at age about 58.
      He transmitted from al-Zuhrī, Qatāda, ʿAmr ibn Dīnār, Ayyūb
      al-Sakhtiyānī, and other senior tabiʿūn, and was the
      principal teacher of ʿAbd al-Razzāq al-Ṣanʿānī, whose
      monumental *al-Muṣannaf* preserves Maʿmar's hadith corpus
      almost in its entirety. His own *Jāmiʿ Maʿmar ibn Rāshid*
      survives as an appendix of ʿAbd al-Razzāq's compilation,
      one of the earliest extant hadith books in Islam. Al-Dhahabī
      ranks him among the very foundation-stones of Yemeni hadith
      scholarship.
    description_ar: |
      توفي الإمام أبو عروة معمر بن راشد الأزدي — بصري الأصل،
      صنعاني الدار، كبير محدثي صنعاء في عصره ومن أوائل من صنّف
      الحديث تصنيفاً منهجياً — بصنعاء عن نحو ثمانٍ وخمسين سنة.
      روى عن الزهري وقتادة وعمرو بن دينار وأيوب السختياني وغيرهم
      من كبار التابعين، وكان شيخ عبد الرزاق الصنعاني الذي حفظ
      «مصنفه» الكبير عامة حديث معمر. وأما «جامع معمر بن راشد»
      نفسه فقد بقي ملحقاً بمصنف عبد الرزاق، وهو من أقدم كتب
      الحديث الباقية في الإسلام. وعدّه الذهبي من أصول علم الحديث
      بأهل اليمن.
    description_fr: |
      Abū ʿUrwa Maʿmar ibn Rāshid al-Azdī, bassorite d'origine
      et établi de longue date au Yémen, muḥaddith principal de
      Sanaa en son temps et l'un des premiers compilateurs
      systématiques de recueils de hadiths (*muṣannafāt*),
      mourut à Sanaa à l'âge d'environ 58 ans. Il transmit
      d'al-Zuhrī, de Qatāda, de ʿAmr ibn Dīnār, d'Ayyūb
      al-Sakhtiyānī et d'autres tabiʿūn éminents, et fut le
      maître principal de ʿAbd al-Razzāq al-Ṣanʿānī, dont le
      monumental *al-Muṣannaf* préserve presque intégralement
      le corpus de hadiths de Maʿmar. Son propre *Jāmiʿ Maʿmar
      ibn Rāshid* survit en appendice de la compilation d'ʿAbd
      al-Razzāq, l'un des plus anciens livres de hadith islamiques
      conservés. Al-Dhahabī le tient pour une pierre de
      fondation de l'érudition hadithienne yéménite.
