  - slug: death-of-al-amash
    category: scholar
    title_en: Death of al-Aʿmash (Sulaymān ibn Mihrān)
    title_ar: وفاة الأعمش (سليمان بن مهران)
    title_fr: Mort d'al-Aʿmash (Sulaymān ibn Mihrān)
    description_en: |
      Abū Muḥammad Sulaymān ibn Mihrān al-Asadī al-Kāhilī, known as
      al-Aʿmash ("the bleary-eyed"), the leading muḥaddith of Kufa in
      his generation and a quintessential master of the *isnād*, died
      in Rabīʿ al-Awwal at age about 88. His narrations populate every
      one of the Six Books, and he was the principal teacher of
      Sufyān al-Thawrī and Shuʿba ibn al-Ḥajjāj — the two pillars of
      Iraqi hadith criticism. Yaḥyā ibn Maʿīn called him "the most
      precise narrator in Kufa," and al-Dhahabī describes him as
      "the master of Qurʾān recitation, hadith, and Sunna in his time."
      His memory was so renowned that Sufyān al-Thawrī said of him:
      "I have not seen anyone retain hadith like al-Aʿmash."
    description_ar: |
      توفي الإمام أبو محمد سليمان بن مهران الأسدي الكاهلي المعروف بالأعمش
      — شيخ المحدثين بالكوفة في عصره وأحد كبار حفاظ الإسناد — في شهر
      ربيع الأول عن نحو ثمانٍ وثمانين سنة. وحديثه في الكتب الستة جميعاً،
      وعنه أخذ سفيان الثوري وشعبة بن الحجاج، وهما عمود نقد الحديث في
      العراق. قال يحيى بن معين: «هو أتقن أهل الكوفة»، وقال عنه الذهبي:
      «شيخ القرآن والحديث والسنة في زمانه». واشتهر بقوة الحفظ، حتى قال
      عنه سفيان الثوري: «ما رأيت أحفظ للحديث من الأعمش».
    description_fr: |
      Abū Muḥammad Sulaymān ibn Mihrān al-Asadī al-Kāhilī, dit
      al-Aʿmash (« le chassieux »), le plus grand muḥaddith de Kufa
      de sa génération et maître emblématique de la science de
      l'*isnād*, mourut au mois de Rabīʿ al-Awwal à l'âge d'environ
      88 ans. Ses transmissions peuplent chacun des Six Livres ; il
      fut le maître principal de Sufyān al-Thawrī et de Shuʿba ibn
      al-Ḥajjāj, les deux piliers de la critique du hadith en Irak.
      Yaḥyā ibn Maʿīn le nomma « le plus précis des transmetteurs de
      Kufa », et al-Dhahabī le décrit comme « le maître du Coran, du
      hadith et de la Sunna en son temps ». Sa mémoire était si
      réputée que Sufyān al-Thawrī dit de lui : « je n'ai vu personne
      retenir le hadith comme al-Aʿmash ».
    canonical_hijri: {year: 148, month: 3, precision: month}
    canonical_gregorian: {date: 765-05-01, precision: month, method: tabular_conversion}
