  - slug: death-of-abdullah-ibn-awn
    category: scholar
    title_en: Death of ʿAbdullāh ibn ʿAwn
    title_ar: وفاة عبد الله بن عون
    title_fr: Mort de ʿAbdullāh ibn ʿAwn
    description_en: |
      Abū ʿAwn ʿAbdullāh ibn ʿAwn ibn Arṭabān al-Muzanī al-Baṣrī,
      a leading Basran tabiʿi-tabiʿi muḥaddith and proverbial
      exemplar of *zuhd* in the Basran scholarly milieu, died at
      age about 86. He transmitted from al-Ḥasan al-Baṣrī, Ibn
      Sīrīn, al-Shaʿbī, and Mujāhid, and his pupils included
      Sufyān al-Thawrī, Shuʿba, Ḥammād ibn Zayd, and ʿAbdullāh ibn
      al-Mubārak. Aḥmad ibn Ḥanbal said: "I have not seen the like
      of ʿAbdullāh ibn ʿAwn"; Yaḥyā ibn Maʿīn declared him
      "trustworthy, the imam." His pious withdrawal from the
      governing courts and refusal to take state stipends became
      the touchstone of Basran scholarly independence cited across
      classical biography.
    description_ar: |
      توفي الإمام أبو عون عبد الله بن عون بن أرطبان المزني البصري
      — كبير محدثي البصرة في طبقة تابعي التابعين والمضرب به المثل
      في الزهد في وسط البصرة العلمي — عن نحو ست وثمانين سنة. روى
      عن الحسن البصري وابن سيرين والشعبي ومجاهد، وأخذ عنه سفيان
      الثوري وشعبة وحماد بن زيد وعبد الله بن المبارك. قال الإمام
      أحمد: «ما رأيت مثل عبد الله بن عون»، وقال يحيى بن معين:
      «ثقة إمام». واشتهر بانعزاله عن الأمراء وامتناعه من عطاء
      السلطان، فصار رمزاً لاستقلال علماء البصرة في كتب التراجم
      الكلاسيكية.
    description_fr: |
      Abū ʿAwn ʿAbdullāh ibn ʿAwn ibn Arṭabān al-Muzanī al-Baṣrī,
      muḥaddith bassorite éminent de la génération des tabiʿi
      al-tabiʿīn et exemple proverbial de *zuhd* dans le milieu
      savant de Bassora, mourut à l'âge d'environ 86 ans. Il
      transmit d'al-Ḥasan al-Baṣrī, d'Ibn Sīrīn, d'al-Shaʿbī et
      de Mujāhid, et ses élèves comprenaient Sufyān al-Thawrī,
      Shuʿba, Ḥammād ibn Zayd et ʿAbdullāh ibn al-Mubārak. Aḥmad
      ibn Ḥanbal dit : « je n'ai pas vu pareil à ʿAbdullāh ibn
      ʿAwn » ; Yaḥyā ibn Maʿīn déclara : « digne de confiance,
      l'imam ». Son retrait pieux des cours gouvernantes et son
      refus des stipendes étatiques devinrent la pierre de touche
      de l'indépendance des savants bassorites, citée à travers
      la biographie classique.
