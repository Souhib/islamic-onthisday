  - slug: death-of-muhammad-bin-ali-al-sanusi
    category: scholar_death
    title_en: Death of Muḥammad ibn ʿAlī al-Sanūsī — Founder of the Sanūsiyya
    title_ar: وفاة محمد بن علي السنوسي — مؤسس الطريقة السنوسية
    title_fr: Mort de Muḥammad ibn ʿAlī al-Sanūsī — fondateur de la Sanūsiyya
    description_en: |
      Muḥammad ibn ʿAlī al-Sanūsī, the Algerian-born Sunni
      Mālikī scholar who founded the Sanūsiyya tariqa in
      Mecca in 1259 AH and later established its permanent
      centre at Jaghbūb in the Libyan desert, died in 1276 AH
      (~1859 CE) at about age seventy-five. Born near
      Mustaghanim in Algeria around 1201 AH (1787 CE), he
      studied with Aḥmad ibn Idrīs al-Fāsī in Mecca and
      absorbed the Idrīsī reformist emphasis on direct
      engagement with Qurʾān and Sunnah. The Sanūsiyya he
      built became the dominant Sunni religious and political
      force in Cyrenaica, establishing zāwiyas (lodges) across
      the Sahara that combined religious education with trade
      and tribal mediation. His grandson Muḥammad Idrīs would
      become the first king of an independent Libya in 1951.
    description_ar: |
      توفي محمد بن علي السنوسي — العالم المالكي السني
      الجزائري المولد الذي أسس الطريقة السنوسية بمكة
      سنة ١٢٥٩ هـ ثم أنشأ مركزها الدائم بجغبوب في
      الصحراء الليبية — سنة ١٢٧٦ هـ (~١٨٥٩ م) عن نحو
      خمس وسبعين سنة. وُلد بقرب مستغانم بالجزائر نحو
      سنة ١٢٠١ هـ (١٧٨٧ م)، وتتلمذ على أحمد بن إدريس
      الفاسي بمكة واستوعب الإدريسي التأكيد الإصلاحي
      على الاشتغال المباشر بالقرآن والسنة. وصارت
      السنوسية التي بناها القوة الدينية والسياسية
      السنية المهيمنة في برقة، إذ أنشأت زوايا في أنحاء
      الصحراء جمعت بين التعليم الديني والتجارة
      والوساطة القبلية. وصار حفيده محمد إدريس أول
      ملك لليبيا المستقلة سنة ١٩٥١.
    description_fr: |
      Muḥammad ibn ʿAlī al-Sanūsī, savant mālikite sunnite né
      en Algérie qui fonda la ṭarīqa Sanūsiyya à La Mecque
      en 1259 H et établit ensuite son centre permanent à
      Jaghbūb dans le désert libyen, mourut en 1276 H
      (~1859 EC) à l'âge d'environ soixante-quinze ans. Né
      près de Mostaganem en Algérie vers 1201 H (1787 EC),
      il étudia auprès d'Aḥmad ibn Idrīs al-Fāsī à La Mecque
      et absorba l'accent idrīsī réformiste sur l'engagement
      direct avec le Coran et la Sunna. La Sanūsiyya qu'il
      construisit devint la force religieuse et politique
      sunnite dominante en Cyrénaïque, établissant des zāwiyas
      à travers le Sahara qui combinaient éducation religieuse,
      commerce et médiation tribale. Son petit-fils Muḥammad
      Idrīs deviendrait le premier roi d'une Libye indépendante
      en 1951.
