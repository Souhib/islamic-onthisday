  - slug: death-of-umar-al-mukhtar
    category: scholar_death
    title_en: Martyrdom of ʿUmar al-Mukhtār — Lion of the Desert
    title_ar: استشهاد عمر المختار — أسد الصحراء
    title_fr: Martyre de ʿUmar al-Mukhtār — le Lion du Désert
    description_en: |
      ʿUmar al-Mukhtār ibn Muḥammad al-Khaḍrāwī, the Libyan
      Sanūsī shaykh and guerrilla commander who led the armed
      resistance against Italian colonial occupation of Libya
      for nearly twenty years, was captured and executed by
      hanging at Solūq on 16 September 1931 CE (4 Rabīʿ al-
      Awwal 1350 AH) at about age seventy-three. Born in the
      town of Janzūr near Tobruk around 1277 AH (1861 CE), he
      memorised the Qurʾān in childhood and studied at the
      Sanūsī zāwiyas of Jaghbūb and Kufra before being
      appointed shaykh of the al-Qardabiyya zāwiya. When
      Italy invaded Libya in 1911 he took up arms, and for
      two decades his band of horsemen harassed Italian
      columns across the Cyrenaican desert, becoming a symbol
      of Muslim resistance to European colonialism across the
      Arab and African worlds. His final words before the
      gallows — reported in Arabic and Italian sources alike —
      were "We do not surrender, we win or we die."
    description_ar: |
      أُعدم شنقاً الشيخ السنوسي الليبي عمر المختار بن محمد
      الخضراوي — قائد المقاومة المسلحة ضد الاحتلال
      الإيطالي لليبيا قرابة عشرين عاماً — بسلوق يوم
      ١٦ سبتمبر ١٩٣١ م (الموافق ٤ ربيع الأول سنة ١٣٥٠ هـ)
      عن نحو ثلاث وسبعين سنة. وُلد ببلدة جنزور قرب طبرق
      نحو سنة ١٢٧٧ هـ (١٨٦١ م)، وحفظ القرآن في الصغر
      وتتلمذ في زوايا السنوسية بجغبوب والكفرة قبل أن
      يُعين شيخاً لزاوية القرضابية. ولما غزت إيطاليا
      ليبيا سنة ١٩١١ حمل السلاح، وطوال عقدين كان
      فرسانه يضايقون الأعمدة الإيطالية في صحراء برقة،
      فصار رمزاً للمقاومة الإسلامية ضد الاستعمار
      الأوروبي في العالم العربي والأفريقي. وكانت كلماته
      الأخيرة قبل المشنقة — كما وردت في المصادر
      العربية والإيطالية على حد سواء — "لا نستسلم،
      ننتصر أو نموت."
    description_fr: |
      ʿUmar al-Mukhtār ibn Muḥammad al-Khaḍrāwī, shaykh
      sanūsī libyen et commandant de guérilla qui dirigea la
      résistance armée contre l'occupation coloniale italienne
      de la Libye pendant près de vingt ans, fut capturé et
      exécuté par pendaison à Solūq le 16 septembre 1931 EC
      (4 Rabīʿ al-Awwal 1350 H) à l'âge d'environ soixante-
      treize ans. Né dans la ville de Janzūr près de Tobrouk
      vers 1277 H (1861 EC), il mémorisa le Coran dans son
      enfance et étudia dans les zāwiyas sanūsiyya de
      Jaghbūb et Kufra avant d'être nommé shaykh de la
      zāwiya al-Qardabiyya. Lorsque l'Italie envahit la
      Libye en 1911, il prit les armes, et pendant deux
      décennies sa troupe de cavaliers harcela les colonnes
      italiennes à travers le désert de Cyrénaïque, devenant
      un symbole de la résistance musulmane au colonialisme
      européen dans les mondes arabe et africain. Ses
      derniers mots avant la potence — rapportés dans les
      sources arabes et italiennes — furent : « Nous ne nous
      rendons pas, nous vainquons ou nous mourons. »
