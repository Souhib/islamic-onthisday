  - slug: death-of-muhammad-al-mahdi-al-sanusi
    category: scholar_death
    title_en: Death of Muḥammad al-Mahdī al-Sanūsī — Sanūsiyya Leader and North African Resistance
    title_ar: وفاة محمد المهدي السنوسي — زعيم السنوسية والمقاومة في شمال أفريقيا
    title_fr: Mort de Muḥammad al-Mahdī al-Sanūsī — chef de la Sanūsiyya et de la résistance nord-africaine
    description_en: |
      Muḥammad al-Mahdī ibn Muḥammad al-Sanūsī, the second
      leader of the Sanūsiyya tariqa and the grandson of its
      founder, died in 1320 AH (~1902 CE) after a reign of
      forty-two years in which he transformed the order from a
      regional Sufi network into a pan-Saharan political and
      military power. Under his leadership the Sanūsiyya
      established zāwiyas from Tripoli to Lake Chad and from
      the Fezzan to the Sudanese border, creating a trade and
      communication network that rivalled the Ottoman
      administration in the region. When French expansion in
      the Sahara and Italian colonisation of Libya threatened
      Muslim autonomy, al-Mahdī organised armed resistance
      from the desert strongholds, making the Sanūsiyya the
      first modern Muslim movement to wage sustained guerrilla
      war against European colonialism in Africa.
    description_ar: |
      توفي محمد المهدي بن محمد السنوسي — الزعيم الثاني
      للطريقة السنوسية وحفيد مؤسسها — سنة ١٣٢٠ هـ
      (~١٩٠٢ م) بعد قيادة امتدت اثنين وأربعين عاماً
      حوّل فيها الزاوية من شبكة صوفية إقليمية إلى قوة
      سياسية وعسكرية ساحلية صحراوية. وتحت قيادته أنشأت
      السنوسية زوايا من طرابلس إلى تشاد ومن فزان إلى
      الحدود السودانية، مؤسسة شبكة تجارة واتصالات نافست
      الإدارة العثمانية في الإقليم. وعندما هدد التوسع
      الفرنسي في الصحراء والاستعمار الإيطالي لليبيا
      الاستقلال الإسلامي، نظّر المهدي المقاومة المسلحة
      من معاقل الصحراء، مما جعل السنوسية أول حركة
      إسلامية حديثة تشن حرب عصابات مستمرة ضد الاستعمار
      الأوروبي في أفريقيا.
    description_fr: |
      Muḥammad al-Mahdī ibn Muḥammad al-Sanūsī, deuxième
      chef de la ṭarīqa Sanūsiyya et petit-fils de son
      fondateur, mourut en 1320 H (~1902 EC) après un règne
      de quarante-deux ans au cours duquel il transforma
      l'ordre d'un réseau soufi régional en une puissance
      politique et militaire panafricaine sahélienne. Sous
      son leadership, la Sanūsiyya établit des zāwiyas de
      Tripoli au lac Tchad et du Fezzan à la frontière
      soudanaise, créant un réseau de commerce et de
      communication qui rivalisait avec l'administration
      ottomane de la région. Lorsque l'expansion française
      dans le Sahara et la colonisation italienne de la Libye
      menacèrent l'autonomie musulmane, al-Mahdī organisa la
      résistance armée depuis les bastions du désert, faisant
      de la Sanūsiyya le premier mouvement musulman moderne
      à mener une guérilla soutenue contre le colonialisme
      européen en Afrique.
    canonical_hijri: {year: 1320, precision: year}
    canonical_gregorian: {date: 1902-01-01, precision: year, method: tabular_conversion}
