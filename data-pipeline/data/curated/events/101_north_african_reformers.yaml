# Wave 101 of curated event additions (2026-04-29).
# North African Sunni reformers — the Idrīsiyya and Sanūsiyya movements
# and the Libyan resistance against Italian colonialism.
# All figures are mainstream Sunni Mālikī-Ashʿarī or Mālikī-Sufi,
# historically significant across the Maghrib, and pass the Ibn Battuta
# test for educated Muslims.
#
# Already in dataset (NOT duplicated here):
#   - death-of-al-sanusi (895 AH / 1490 CE) — the Tlemcen theologian,
#     *not* the Sanūsiyya founder (different person, different century).
#
# Sources: EI2 articles on Sanūsiyya, Idrīsiyya, and ʿUmar al-Mukhtār;
# modern biographical references for 20th-century figures. Where
# day-precision is firmly attested in modern historical records it is
# used; otherwise year-precision. Trilingual en/ar/fr throughout.

events:
  - slug: death-of-ahmad-ibn-idris-al-fasi
    category: scholar_death
    title_en: Death of Aḥmad ibn Idrīs al-Fāsī — Founder of the Idrīsiyya
    title_ar: وفاة أحمد بن إدريس الفاسي — مؤسس الطريقة الإدريسية
    title_fr: Mort d'Aḥmad ibn Idrīs al-Fāsī — fondateur de l'Idrīsiyya
    description_en: |
      Aḥmad ibn Idrīs al-Fāsī, the Moroccan-born Sunni Mālikī
      scholar and Sufi shaykh who founded the Idrīsiyya tariqa
      — a reformist Sufi movement that sought to restore direct
      study of Qurʾān and hadith above taqlīd of later Sufi
      authorities — died in 1252 AH (~1837 CE) at about age
      sixty-five. Born near Fez around 1187 AH (1773 CE), he
      studied Mālikī fiqh and Ashʿarī theology in the Qarawiyyīn
      before travelling to Egypt, the Hijaz, and Yemen, where he
      taught a circle of students who would carry his message
      across the Muslim world. His disciples founded the
      Khatmiyya in the Sudan, the Rashīdiyya in Somalia and the
      Hijaz, and the Sanūsiyya in Libya — making his spiritual
      network one of the most widely distributed Sunni reform
      movements of the nineteenth century.
    description_ar: |
      توفي أحمد بن إدريس الفاسي — العالم السني المالكي
      المغربي المولد والشيخ الصوفي الذي أسس الطريقة
      الإدريسية — حركة صوفية إصلاحية سعت إلى إعادة
      دراسة القرآن والحديث المباشرة فوق التقليد للسلف
      الصوفي — سنة ١٢٥٢ هـ (~١٨٣٧ م) عن نحو خمس وستين
      سنة. وُلد بفاس نحو سنة ١١٨٧ هـ (١٧٧٣ م)، وتتلمذ
      على الفقه المالكي والكلام الأشعري بالقرويين
      قبل أن يسافر إلى مصر والحجاز واليمن، حيث درّس حلقة
      من الطلاب حملوا رسالته في أنحاء العالم الإسلامي.
      فأسس تلامذته الختمية في السودان، والرشيدية في
      الصومال والحجاز، والسنوسية في ليبيا — مما جعل
      شبكته الروحية من أكثر الحركات الإصلاحية السنية
      انتشاراً في القرن التاسع عشر.
    description_fr: |
      Aḥmad ibn Idrīs al-Fāsī, savant sunnite mālikite né au
      Maroc et shaykh soufi qui fonda la ṭarīqa Idrīsiyya —
      un mouvement soufi réformiste qui chercha à restaurer
      l'étude directe du Coran et du hadith au-dessus du
      taqlīd des autorités soufies ultérieures — mourut en
      1252 H (~1837 EC) à l'âge d'environ soixante-cinq ans.
      Né près de Fès vers 1187 H (1773 EC), il étudia le fiqh
      mālikite et la théologie ashʿarite à la Qarawiyyīn avant
      de voyager en Égypte, au Hijaz et au Yémen, où il
      enseigna à un cercle d'étudiants qui porteraient son
      message à travers le monde musulman. Ses disciples
      fondèrent la Khatmiyya au Soudan, la Rashīdiyya en
      Somalie et au Hijaz, et la Sanūsiyya en Libye — faisant
      de son réseau spirituel l'un des mouvements de réforme
      sunnite les plus largement répandus du 19e siècle.
