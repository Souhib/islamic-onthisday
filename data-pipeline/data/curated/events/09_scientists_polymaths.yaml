  - slug: death-of-al-kashi
    category: scholar_death
    title_en: Death of Jamshid al-Kashi — Astronomer at Samarqand
    title_ar: وفاة جمشيد الكاشي
    title_fr: Décès de Jamshīd al-Kāshī
    description_en: |
      The greatest mathematical astronomer of the late Timurid period,
      working at Ulugh Beg's observatory in Samarqand. In his "Risala
      al-Muhitiyya" he computed pi to 16 decimal places — a precision
      that would not be exceeded in Europe for over a century. His
      "Miftah al-Hisab" (Key of Arithmetic) introduced decimal fractions
      to the Islamic mathematical tradition. He died a few weeks after
      completing Ulugh Beg's star catalogue.
    description_ar: |
      أعظم فلكيي الرياضيات في أواخر العهد التيموري، وعمل في مرصد ألغ بيك
      بسمرقند. حسب في "الرسالة المحيطية" قيمة الدائرة (π) بدقّة ست عشرة
      منزلة عشرية، وهي دقّة لم تُتجاوز في أوروبا قرناً ونيّفاً. وأدخل
      كتابه "مفتاح الحساب" الكسور العشرية إلى التقليد الرياضي الإسلامي.
      توفي بعد أسابيع قليلة من إتمامه فهرس النجوم لألغ بيك.
    description_fr: |
      Le plus grand astronome mathématicien de la fin de la période
      timouride, qui travailla à l'observatoire d'Ulugh Beg à Samarcande.
      Dans sa "Risāla al-Muḥīṭiyya" il calcula pi à seize décimales — une
      précision qui ne fut dépassée en Europe que plus d'un siècle plus
      tard. Son "Miftāḥ al-Ḥisāb" (Clé du calcul) introduisit les
      fractions décimales dans la tradition mathématique islamique. Il
      mourut quelques semaines après avoir achevé le catalogue stellaire
      d'Ulugh Beg.
    canonical_hijri: {year: 832, month: 9, day: 19, precision: day}
    canonical_gregorian: {date: 1429-06-22, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Death attested 22 June 1429 CE at Samarqand (Wikipedia, history-of-science references)."
    source_url: https://en.wikipedia.org/wiki/Jamshid_al-Kashi
    people: [[jamshid-al-kashi, died]]
    tags: [timurid, scientist, mathematics, astronomy, samarqand]
    importance: notable
    verified: true

  - slug: death-of-ulugh-beg
    category: scholar_death
    title_en: Assassination of Ulugh Beg — Astronomer-King
    title_ar: اغتيال ألغ بيك
    title_fr: Assassinat d'Ulugh Beg
    description_en: |
      Timurid ruler of Central Asia and one of the most accomplished
      observational astronomers of any era. His observatory at Samarqand —
      whose 40-metre sextant remains partially intact today — produced
      the "Zij-i Sultani" catalogue of 1,018 fixed stars, superseding
      Ptolemy's for the first time since antiquity. After a brief and
      troubled reign, he was killed on his son's orders en route to
      pilgrimage. The observatory was demolished within decades.
    description_ar: |
      حاكم تيموري في آسيا الوسطى وأحد أبرز الفلكيين الرصديين في تاريخ
      الإسلام. أنتج مرصده بسمرقند — الذي لا يزال سدسه ذو الأربعين متراً
      قائماً جزئياً إلى اليوم — جدول "زيج سلطاني" الذي يضمّ ألفاً وثمانية
      عشر نجماً ثابتاً، فتجاوز جدول بطليموس لأوّل مرّة منذ العصور القديمة.
      بعد حكم قصير ومضطرب، قُتل بأمر ابنه وهو في طريقه إلى الحج، ثم هُدم
      المرصد بعد سنوات.
    description_fr: |
      Souverain timouride d'Asie centrale et l'un des plus grands
      astronomes observationnels de toutes les époques. Son observatoire
      de Samarcande — dont le sextant de quarante mètres demeure en
      partie intact aujourd'hui — produisit le catalogue "Zīj-i Sulṭānī"
      de mille dix-huit étoiles fixes, surpassant celui de Ptolémée pour
      la première fois depuis l'Antiquité. Après un règne bref et
      tourmenté, il fut tué sur ordre de son fils alors qu'il se rendait
      au pèlerinage. L'observatoire fut démoli quelques décennies plus
      tard.
    canonical_hijri: {year: 853, month: 9, day: 10, precision: day}
    canonical_gregorian: {date: 1449-10-27, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Assassination attested 27 October 1449 CE near Samarqand."
    source_url: https://en.wikipedia.org/wiki/Ulugh_Beg
    people: [[ulugh-beg, died]]
    tags: [timurid, ruler, scientist, astronomy, samarqand, assassination]
    importance: notable
    verified: true

  - slug: death-of-ibn-battuta
    category: scholar_death
    title_en: Death of Ibn Battuta — The Traveller of Islam
    title_ar: وفاة ابن بطوطة
    title_fr: Décès d'Ibn Baṭṭūṭa
    description_en: |
      The Tangier-born jurist who, in 29 years of travel (1325-1354),
      covered approximately 120,000 kilometres across Africa, Asia, and
      Europe — more than any pre-modern traveller. Dictated to Ibn Juzayy
      in Fez, his "Rihla" records encounters from Mali to China, with
      detailed observations on Muslim communities, rulers, and scholarly
      life across the Islamic world at its late-medieval peak. He served
      as qadi in the Maldives and Delhi. Died in the Maghreb shortly
      after completing the Rihla.
    description_ar: |
      الفقيه الطنجاوي الذي قطع في تسع وعشرين سنة من السفر (725-755 هـ /
      1325-1354 م) نحو مئة وعشرين ألف كيلومتر عبر أفريقيا وآسيا وأوروبا —
      أكثر من أي رحّالة في عصور ما قبل الحداثة. أملى كتابه "الرحلة" على
      ابن جزي بفاس، فدوّن لقاءاته من مالي إلى الصين، مع وصف دقيق للمجتمعات
      المسلمة والحكّام والحياة العلمية في العالم الإسلامي في أوج العصر
      الوسيط. تولّى القضاء في المالديف ودلهي. توفي بالمغرب بُعيد إتمام
      الرحلة.
    description_fr: |
      Juriste né à Tanger qui, en vingt-neuf ans de voyage (1325-1354),
      parcourut environ cent vingt mille kilomètres à travers l'Afrique,
      l'Asie et l'Europe — davantage qu'aucun voyageur prémoderne. Dicté
      à Ibn Juzayy à Fès, son "Riḥla" rapporte des rencontres allant du
      Mali à la Chine, avec des observations détaillées sur les
      communautés musulmanes, les souverains et la vie savante à travers
      le monde islamique à son apogée médiévale tardive. Il fut qāḍī aux
      Maldives et à Delhi. Décédé au Maghreb peu après l'achèvement de
      la Riḥla.
    canonical_hijri: {year: 770, precision: year}
    canonical_gregorian: {date: 1368-01-01, precision: year, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Death year traditionally given as 770 AH (1368/69 CE) at Marrakesh; precise day not attested."
    source_url: https://en.wikipedia.org/wiki/Ibn_Battuta
    people: [[ibn-battuta, died]]
    tags: [marinid, scholar, traveler, morocco]
    importance: notable
    verified: true
