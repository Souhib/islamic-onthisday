# Muslim scientists and polymaths whose death dates are well-attested in
# classical biographical dictionaries or modern scholarship.

events:
  - slug: death-of-al-zahrawi
    category: scholar_death
    title_en: Death of Abu al-Qasim al-Zahrawi (Abulcasis)
    title_ar: وفاة أبي القاسم الزهراوي
    title_fr: Décès d'Abū al-Qāsim al-Zahrāwī (Abulcasis)
    description_en: |
      The father of modern surgery. His thirty-volume "Kitab al-Tasrif
      li-man 'Ajiza 'an al-Ta'lif" — translated into Latin as "Liber
      Servitoris" — was the standard European medical and surgical
      reference for five centuries. He invented over 200 surgical
      instruments, many still recognisable today, and gave the first
      detailed description of haemophilia. Died in Cordoba.
    description_ar: |
      أبو الجراحة الحديثة. كان كتابه "التصريف لمن عجز عن التأليف" المؤلف
      من ثلاثين مجلداً — والمترجم إلى اللاتينية باسم "Liber Servitoris" —
      المرجع الطبي والجراحي الأوروبي المعتمد لمدة خمسة قرون. ابتكر أكثر
      من مئتي أداة جراحية، لا يزال كثير منها يُستعمل إلى اليوم، وقدّم أوّل
      وصف مفصّل لمرض الناعور (الهيموفيليا). توفي بقرطبة.
    description_fr: |
      Le père de la chirurgie moderne. Son ouvrage en trente volumes
      "Kitāb al-Taṣrīf li-man ʿAjiza ʿan al-Taʾlīf" — traduit en latin
      sous le titre "Liber Servitoris" — fut la référence médicale et
      chirurgicale européenne pendant cinq siècles. Il inventa plus de
      deux cents instruments chirurgicaux, dont beaucoup demeurent
      reconnaissables aujourd'hui, et livra la première description
      détaillée de l'hémophilie. Décédé à Cordoue.
    canonical_hijri: {year: 404, precision: year}
    canonical_gregorian: {date: 1013-01-01, precision: year, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    source_url: https://en.wikipedia.org/wiki/Al-Zahrawi
    people: [[al-zahrawi, died]]
    tags: [al-andalus, scientist, medicine, surgery, cordoba]
    importance: notable
    verified: true

  - slug: death-of-ibn-al-nafis
    category: scholar_death
    title_en: Death of Ibn al-Nafis — Discoverer of Pulmonary Circulation
    title_ar: وفاة ابن النفيس
    title_fr: Décès d'Ibn al-Nafīs
    description_en: |
      Damascus-born physician who served as head of the Mansuri hospital
      in Cairo. In his "Sharh Tashrih al-Qanun" he correctly described
      the pulmonary circulation of the blood — three centuries before
      Michael Servetus and William Harvey reached the same conclusion in
      Europe. His "Kitab al-Shamil fi al-Sina'a al-Tibbiyya" was planned
      in 300 volumes; 80 were completed. Died in Cairo.
    description_ar: |
      طبيب وُلد بدمشق وتولّى رئاسة البيمارستان المنصوري بالقاهرة. وصف في
      كتابه "شرح تشريح القانون" الدورة الدموية الصغرى وصفاً صحيحاً، قبل
      أن يصل إلى الاستنتاج نفسه ميشيل سرفيتوس ووليام هارفي في أوروبا
      بثلاثة قرون. وكان قد خطّط لكتاب "الشامل في الصناعة الطبية" في ثلاثمئة
      مجلد، أتمّ منها ثمانين. توفي بالقاهرة.
    description_fr: |
      Médecin né à Damas, chef de l'hôpital al-Manṣūrī au Caire. Dans son
      "Sharḥ Tashrīḥ al-Qānūn", il décrivit correctement la circulation
      pulmonaire du sang — trois siècles avant que Michel Servet et
      William Harvey ne parviennent à la même conclusion en Europe. Son
      "Kitāb al-Shāmil fī al-Ṣināʿa al-Ṭibbiyya" était projeté en trois
      cents volumes ; quatre-vingts furent achevés. Décédé au Caire.
    canonical_hijri: {year: 687, precision: year}
    canonical_gregorian: {date: 1288-01-01, precision: year, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Death year 687 AH (1288/89 CE) is attested. Day-precise dating not confirmed across Sunni biographical sources; year-precision retained."
    source_url: https://en.wikipedia.org/wiki/Ibn_al-Nafis
    people: [[ibn-al-nafis, died]]
    tags: [mamluk, scientist, medicine, cairo, anatomy]
    importance: notable
    verified: true

  - slug: death-of-al-idrisi
    category: scholar_death
    title_en: Death of Muhammad al-Idrisi — The Geographer
    title_ar: وفاة الإدريسي
    title_fr: Décès de Muḥammad al-Idrīsī
    description_en: |
      The author of "Kitab Nuzhat al-Mushtaq" (the Book of Pleasant
      Journeys into Faraway Lands) and the silver planisphere commissioned
      by King Roger II of Sicily — the most accurate map of the world
      produced for its time, and the standard European cartographic
      reference for three centuries. He combined Islamic geographical
      knowledge with direct interviews of travellers and sailors at the
      Norman court of Palermo. Died at Ceuta.
    description_ar: |
      مؤلف "نزهة المشتاق في اختراق الآفاق" وصاحب الكرة الفضية التي صُنعت
      للملك روجر الثاني ملك صقلية — أدقّ خريطة للعالم في زمانها، وظلّت
      المرجع الأوروبي الجغرافي ثلاثة قرون. جمع بين علوم الجغرافيا الإسلامية
      ومقابلاته المباشرة للرحّالين والملاحين في البلاط النورماندي بباليرمو.
      توفي بسبتة.
    description_fr: |
      Auteur du "Kitāb Nuzhat al-Mushtāq" (Livre des promenades de celui
      qui désire parcourir les contrées lointaines) et du planisphère
      d'argent commandé par le roi Roger II de Sicile — la carte du
      monde la plus précise de son temps et la référence cartographique
      européenne pendant trois siècles. Il combina le savoir géographique
      islamique avec les entretiens directs des voyageurs et des marins
      à la cour normande de Palerme. Décédé à Ceuta.
    canonical_hijri: {year: 560, precision: year}
    canonical_gregorian: {date: 1165-01-01, precision: year, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    source_url: https://en.wikipedia.org/wiki/Muhammad_al-Idrisi
    people: [[al-idrisi, died]]
    tags: [al-andalus, sicily, scientist, geography]
    importance: notable
    verified: true

  - slug: death-of-al-jazari
    category: scholar_death
    title_en: Death of al-Jazari — The Engineer of Automata
    title_ar: وفاة الجزري
    title_fr: Décès d'al-Jazarī
    description_en: |
      The Artuqid court engineer whose "Kitab fi Ma'rifat al-Hiyal al-
      Handasiyya" — the "Book of Knowledge of Ingenious Mechanical
      Devices" — described fifty mechanical inventions with detailed
      engineering drawings. These included the earliest known crankshaft,
      the camshaft, segmental gears, and automated water-raising devices.
      His sophistication in mechanical control anticipated the industrial
      engineering of the modern era by five hundred years.
    description_ar: |
      مهندس البلاط الأرتقي ومؤلف "كتاب في معرفة الحيل الهندسية" الذي وصف
      فيه خمسين اختراعاً ميكانيكياً مع رسوم هندسية دقيقة، منها أقدم عمود
      مرفقي معروف، وعمود الكامة، والمسننات القطاعية، وآلات رفع المياه
      ذاتية الحركة. سبق براعة تحكّمه الميكانيكي الهندسةَ الصناعية الحديثة
      بخمسمئة سنة.
    description_fr: |
      Ingénieur de la cour artuqide dont le "Kitāb fī Maʿrifat al-Ḥiyal
      al-Handasiyya" — le "Livre de la connaissance des dispositifs
      mécaniques ingénieux" — décrivit cinquante inventions mécaniques
      avec des dessins d'ingénierie détaillés. On y trouve le plus ancien
      vilebrequin connu, l'arbre à cames, des engrenages segmentés et des
      dispositifs automatisés d'élévation de l'eau. Sa maîtrise du
      contrôle mécanique anticipa l'ingénierie industrielle moderne de
      cinq cents ans.
    canonical_hijri: {year: 602, precision: year}
    canonical_gregorian: {date: 1206-01-01, precision: year, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    source_url: https://en.wikipedia.org/wiki/Ismail_al-Jazari
    people: [[al-jazari, died]]
    tags: [ayyubid, scientist, engineering, mesopotamia]
    importance: notable
