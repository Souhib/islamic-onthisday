  - slug: founding-of-malacca-sultanate
    category: founding
    title_en: Founding of the Malacca Sultanate as a Muslim State
    title_ar: تأسيس سلطنة ملقا دولةً إسلامية
    title_fr: Fondation du Sultanat de Malacca comme État musulman
    description_en: |
      Around 824 AH / 1414 CE the ruler of the new entrepôt at
      the mouth of the Bertam River — known in Malay tradition
      as Parameswara, the former king of Singapura who had fled
      after the sack of his city in 1398 — converted to Islam
      and took the throne-name Iskandar Shāh, marking the
      decisive transition of Malacca to a Muslim sultanate.
      Founded as a settlement *c.* 1400 CE, Malacca within a
      generation became the principal trading state of the
      Strait, the regional sponsor of Islamic learning across
      the Malay world, and the political-cultural model later
      copied by Aceh, Patani, Brunei, and the East-Indonesian
      sultanates. The Portuguese conquered Malacca in 1511, but
      its religious and literary legacy — including the codified
      Malay courtly Islam preserved in the *Sejarah Melayu* —
      shaped the region for centuries.
    description_ar: |
      نحو سنة ٨٢٤ هـ (الموافق ١٤١٤ ميلادي) أعلن صاحب الميناء
      الحديث عند مصبّ نهر «برتام» — الذي تذكره الأَخبار
      الملايوية باسم «براميسوارا»، الملك السابق ل«سَنغافورا»
      الفارَّ بعد سقوط مدينته سنة ١٣٩٨ ميلادي — إسلامه واتخذ
      لقب «إسكندر شاه»، فتحوّلت ملقا تحوّلاً قاطعاً إلى
      سلطنة إسلامية. تأسست المدينة قرابة سنة ١٤٠٠ ميلادي،
      وفي جيل واحد صارت ملقا قبلة التجارة في «بُغَاز ملقا»،
      وراعية العلم الإسلامي في عموم أرض الملايو، والنموذج
      السياسي والمدني الذي حاكاه لاحقاً سلاطين آشي وفطاني
      وبروناي وسلاطين شرق إندونيسيا. وفتحها البرتغاليون سنة
      ١٥١١ ميلادي، لكن ميراثها الديني والأدبي — ومنه إسلام
      البلاط الملايوي المُكوَّد في «شجرة الملايو» (Sejarah
      Melayu) — صاغ المنطقة قروناً بعدها.
      
      The founding date is contested: Tomé Pires's Portuguese-era account places it ~1396 CE; *Sejarah Melayu* gives ~1400-1414; modern historiography (Wolters, Andaya) settles on circa 1400-1414. We use 824 AH (≈1414 CE) as the classical-tradition modal year while flagging the dispute.
      
      تاريخ التأسيس محل خلاف: روايات عصر البرتغاليين عند توميه بيريش ترجعه إلى نحو ١٣٩٦ ميلادي؛ ويذكر «سجاره ميلايو» نحو ١٤٠٠-١٤١٤ ميلادي؛ والتاريخ الحديث (وولتر وأنداي) يستقر على ١٤٠٠-١٤١٤. ونستعمل هنا سنة ٨٢٤ هـ (أي نحو ١٤١٤ ميلادي) بوصفها السنة الأكثر تواتراً في التراث الكلاسيكي مع تنبيه الخلاف.
    description_fr: |
      Vers 824 H / 1414 EC, le souverain du nouvel entrepôt
      situé à l'embouchure de la rivière Bertam — connu dans
      la tradition malaise sous le nom de Parameswara, ancien
      roi de Singapura qui avait fui après le sac de sa cité
      en 1398 — se convertit à l'islam et prit le nom royal
      d'Iskandar Shāh, marquant la transition décisive de
      Malacca en sultanat musulman. Fondée comme implantation
      *vers* 1400 EC, Malacca devint en une génération l'État
      commercial principal du détroit, le mécène régional du
      savoir islamique dans tout le monde malais, et le modèle
      politico-culturel imité plus tard par Aceh, Patani, le
      Brunei et les sultanats d'Indonésie orientale. Les
      Portugais conquirent Malacca en 1511, mais son héritage
      religieux et littéraire — y compris l'islam de cour
      malais codifié dans la *Sejarah Melayu* — façonna la
      région pendant des siècles.
    canonical_hijri: {year: 824, precision: year}
    canonical_gregorian: {date: 1414-01-01, precision: year, method: attested}
    disputed: true
    dispute_about: date
