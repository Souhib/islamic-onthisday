  - slug: founding-of-aceh-sultanate
    category: founding
    title_en: Founding of the Aceh Sultanate
    title_ar: تأسيس سلطنة آشي
    title_fr: Fondation du Sultanat d'Aceh
    description_en: |
      The Sultanate of Aceh on the northern tip of Sumatra was
      founded in the late ninth-Hijri / late fifteenth-CE
      century — Indonesian historiography commonly dates the
      foundation to about 885 AH / 1480 CE, while ʿAlī Mughāyat
      Shāh (r. 1514-1530 CE) is credited with consolidating it
      into a major regional power in the early sixteenth century
      by absorbing the older sultanates of Pedir and Pasai. The
      first major Indonesian sultanate of the sixteenth century,
      Aceh became the principal Sunni Shafi'i polity of the
      Malay-Indonesian archipelago — a key node on the spice and
      pilgrim routes between the Indian Ocean and the Strait, a
      patron of the great Acehnese Sufi-scholarly succession of
      Hamzah Fansūrī, al-Rānīrī, al-Sinkilī, and an early
      diplomatic correspondent of the Ottoman Sublime Porte.
      Aceh was honoured in regional usage as *Serambi Mekkah*,
      "the Verandah of Mecca."
    description_ar: |
      تأسست سلطنة آشي على رأس سومطرة الشمالي في أواخر القرن
      التاسع الهجري / أواخر الخامس عشر الميلادي — يؤرخ تاريخ
      إندونيسيا الحديث تأسيسها نحو سنة ٨٨٥ هـ (الموافق ١٤٨٠
      ميلادي)، فيما يُنسب إلى السلطان علي مغايث شاه (حكم بين
      ١٥١٤ و١٥٣٠ ميلادي) توحيدها بضمّ سلطنتي «بِدير» و«بَسَي»
      الأقدم وإقامتها قوّةً إقليميةً في أوائل القرن السادس
      عشر. وكانت أول سلطنة إندونيسية كبرى في القرن السادس
      عشر، فصارت آشي الدولة الشافعية السنية الكبرى في
      الأرخبيل الملايوي الإندونيسي، وعقدةً رئيسة على طرق
      البخور والحج بين المحيط الهندي و«بُغَاز ملقا»،
      وراعية حلقة آشي العلمية الكبرى من حمزة الفنصوري ونور
      الدين الرانيري وعبد الرؤوف السنكلي، ومن أوائل من
      راسل الباب العالي العثماني دبلوماسياً. واشتُهرت آشي
      عند أهل المنطقة باسم «شُرفة مكة» (Serambi Mekkah).
    description_fr: |
      Le Sultanat d'Aceh, à la pointe nord de Sumatra, fut
      fondé à la fin du IXe siècle hégirien / fin du XVe
      siècle EC — l'historiographie indonésienne situe
      communément sa fondation vers 885 H / 1480 EC, tandis
      que ʿAlī Mughāyat Shāh (r. 1514-1530 EC) est crédité
      de l'avoir consolidé en une puissance régionale majeure
      au début du XVIe siècle en absorbant les anciens
      sultanats de Pedir et de Pasai. Premier grand sultanat
      indonésien du XVIe siècle, Aceh devint la principale
      polity sunnite shafi'ite de l'archipel malais-
      indonésien — un nœud clé sur les routes des épices et
      du pèlerinage entre l'océan Indien et le détroit, un
      mécène de la grande succession savante-soufie acehnaise
      de Hamzah Fansūrī, al-Rānīrī, al-Sinkilī, et un
      correspondant diplomatique précoce de la Sublime Porte
      ottomane. Aceh fut honorée dans l'usage régional comme
      *Serambi Mekkah*, « la Véranda de La Mecque ».
