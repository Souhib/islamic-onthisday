  - slug: death-of-muhammad-arshad-al-banjari
    category: scholar
    title_en: Death of Muḥammad Arshad al-Banjārī — Author of Sabīl al-Muhtadīn
    title_ar: وفاة محمد أرشد البنجاري — مؤلف «سبيل المهتدين»
    title_fr: Mort de Muḥammad Arshad al-Banjārī — auteur de Sabīl al-Muhtadīn
    description_en: |
      Muḥammad Arshad ibn ʿAbd Allāh al-Banjārī — Sunni Shafi'i
      scholar of the Banjar Sultanate in southern Borneo
      (Kalimantan), author of *Sabīl al-Muhtadīn lil-Tafaqquh fī
      Amr al-Dīn*, the most influential Malay-language Shafi'i
      *fiqh* manual of the eighteenth and nineteenth centuries —
      died at Martapura in 1227 AH / 1812 CE at age about 102.
      Sent by the Banjar court for advanced study, he spent some
      thirty years in Mecca and Medina before returning to
      Borneo around 1772. His Malay translation-and-adaptation
      of al-Ramlī's *Nihāyat al-Muḥtāj* (i.e. *Sabīl al-Muhtadīn*)
      systematised Shafi'i fiqh for the Malay-Indonesian reading
      public and remained a core seminary text from the
      Sumatran coast through Patani and Kelantan well into the
      twentieth century. His students seeded the chains of
      Shafi'i learning across Banjar, Brunei, and the Malay
      Peninsula.
    description_ar: |
      توفي الإمام محمد أرشد بن عبد الله البنجاري — العالم
      السني على المذهب الشافعي في سلطنة بنجار بجنوب بورنيو
      («كاليمنتان»)، مؤلف «سبيل المهتدين للتفقه في أمر الدين»،
      أعظم متون الفقه الشافعي بالملايوية في القرنين الثامن
      عشر والتاسع عشر — بـ«مرتفور» سنة ١٢٢٧ هـ (الموافق ١٨١٢
      ميلادي) عن نحو مئة وسنتين. وأرسلته بلاط بنجار للتحصيل،
      فأقام بمكة والمدينة قرابة ثلاثين سنة، ثم عاد إلى بورنيو
      نحو سنة ١١٨٦ هـ (الموافق ١٧٧٢ ميلادي). و«سبيل
      المهتدين» الذي ترجم فيه «نهاية المحتاج» للرملي وأعاد
      صياغته بالملايوية قعّد فقه أهل الشافعية لقراء الملايو
      والإندونيسيين وظل من المتون المعتمدة في المعاهد من
      ساحل سومطرة إلى فطاني وكلنتن إلى منتصف القرن العشرين.
      وعلى يديه تكونت سلاسل التحصيل الشافعي عبر بنجار وبروناي
      وشبه جزيرة الملايو.
    description_fr: |
      Muḥammad Arshad ibn ʿAbd Allāh al-Banjārī — savant
      sunnite shafi'ite du Sultanat de Banjar dans le sud de
      Bornéo (Kalimantan), auteur de *Sabīl al-Muhtadīn lil-
      Tafaqquh fī Amr al-Dīn*, le manuel de *fiqh* shafi'ite en
      malais le plus influent des XVIIIe et XIXe siècles —
      mourut à Martapura en 1227 H / 1812 EC à l'âge d'environ
      102 ans. Envoyé par la cour de Banjar pour ses études
      avancées, il passa quelque trente ans à La Mecque et à
      Médine avant de revenir à Bornéo vers 1772. Sa
      traduction-adaptation malaise de la *Nihāyat al-Muḥtāj*
      d'al-Ramlī (*Sabīl al-Muhtadīn*) systématisa le fiqh
      shafi'ite pour le public lettré malais-indonésien et
      demeura un texte central de séminaire depuis la côte de
      Sumatra jusqu'à Patani et Kelantan bien avant le milieu
      du XXe siècle. Ses élèves ensemencèrent les chaînes de
      l'apprentissage shafi'ite à travers Banjar, le Brunei et
      la péninsule malaise.
    canonical_hijri: {year: 1227, precision: year}
    canonical_gregorian: {date: 1812-01-01, precision: year, method: attested}
