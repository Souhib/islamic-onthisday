  - slug: death-of-abd-al-rauf-al-sinkili
    category: scholar
    title_en: Death of ʿAbd al-Raʾūf al-Sinkilī — Mufti of Aceh
    title_ar: وفاة عبد الرؤوف السنكلي — مفتي آشي
    title_fr: Mort de ʿAbd al-Raʾūf al-Sinkilī — mufti d'Aceh
    description_en: |
      ʿAbd al-Raʾūf ibn ʿAlī al-Sinkilī al-Fanṣūrī — Acehnese Sunni
      Shafi'i scholar, mufti of the Sultanate of Aceh under the
      four successive sultanas of the late seventeenth century, and
      the principal Malay-archipelago Sufi master of the
      Shaṭṭāriyya order in his generation — died at Kuala Aceh in
      1105 AH / 1693 CE at age about 73. After more than nineteen
      years of study in the Hijaz under Aḥmad al-Qushāshī and
      Ibrāhīm al-Kūrānī of Medina, he returned to Aceh and produced
      the first complete Malay translation-and-tafsīr of the Qurʾān,
      *Tarjumān al-Mustafīd* (a Malay rendering substantially based
      on Tafsīr al-Bayḍāwī with material from al-Khāzin and al-
      Jalālayn). His Malay manuals on fiqh and Sufism remained
      reference texts in Acehnese, Banjarese, and Patani teaching
      circles for two centuries. His tomb at Deah Raya outside
      Banda Aceh is locally venerated as the *Tomb of Syiah Kuala*.
    description_ar: |
      توفي الشيخ عبد الرؤوف بن علي السنكلي الفنصوري — العالم
      السني الآشي على المذهب الشافعي، مفتي سلطنة آشي في عهد
      السلطانات الأربع المتعاقبات في أواخر القرن السابع عشر،
      وكبير شيوخ الطريقة الشطارية في جزر الملايو في جيله —
      ب«قُوَالا آشي» سنة ١١٠٥ هـ (الموافق ١٦٩٣ ميلادي) عن نحو
      ثلاث وسبعين سنة. درس بالحجاز ما يزيد على تسع عشرة سنة على
      الإمامين أحمد القشاشي وإبراهيم الكوراني المدني، ثم عاد إلى
      آشي فأخرج أول ترجمة وتفسير كامل للقرآن الكريم بالملايوية،
      «ترجمان المستفيد» (نقل ملايوي اعتمد جوهرياً على «تفسير
      البيضاوي» مع زيادات من «لباب التأويل» للخازن و«الجلالين»).
      ومتونه بالملايوية في الفقه والتصوف ظلت مراجع التدريس عند
      أهل آشي وبنجار وفطاني قرنين كاملين. وضريحه ب«ضياء راية»
      في ضواحي «بَنْدَرْ آشي» مزار يُعرف ب«ضريح شيَخ كوالا».
    description_fr: |
      ʿAbd al-Raʾūf ibn ʿAlī al-Sinkilī al-Fanṣūrī — savant
      sunnite shafi'ite acehnais, mufti du Sultanat d'Aceh sous
      les quatre sultanes successives de la fin du XVIIe siècle,
      et principal maître soufi shaṭṭārī de l'archipel malais de
      sa génération — mourut à Kuala Aceh en 1105 H / 1693 EC à
      l'âge d'environ 73 ans. Après plus de dix-neuf ans d'études
      au Hijaz auprès d'Aḥmad al-Qushāshī et d'Ibrāhīm al-Kūrānī
      de Médine, il revint à Aceh et produisit la première
      traduction-tafsīr complète du Coran en malais, *Tarjumān
      al-Mustafīd* (un rendu malais substantiellement fondé sur
      le *Tafsīr al-Bayḍāwī*, complété par des éléments d'al-
      Khāzin et des *Jalālayn*). Ses manuels malais de fiqh et de
      soufisme restèrent des textes de référence dans les cercles
      d'enseignement acehnais, banjarais et patani pendant deux
      siècles. Son tombeau de Deah Raya, en périphérie de Banda
      Aceh, est localement vénéré comme le *Tomb of Syiah Kuala*.
    canonical_hijri: {year: 1105, precision: year}
    canonical_gregorian: {date: 1693-01-01, precision: year, method: attested}
