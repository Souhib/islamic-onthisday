  - slug: death-of-sunan-ampel
    category: scholar
    title_en: Death of Sunan Ampel — Walisongo of Surabaya
    title_ar: وفاة السنن أمبيل — أحد ولي سَنغا (الأولياء التسعة)
    title_fr: Mort de Sunan Ampel — Walisongo de Surabaya
    description_en: |
      Raden Rahmat, known to Javanese tradition as Sunan Ampel —
      one of the *Walisongo* (Wali Sanga, the "Nine Saints" of
      Java), founder of the Ampel pesantren in Surabaya, and the
      central figure of the second generation of Javanese Islamic
      mission — died at Surabaya in about 885 AH / 1481 CE. He
      was of Champa origin (present-day central Vietnam) and is
      counted in Javanese tradition as the elder of the Walisongo
      circle, the teacher of Sunan Bonang, Sunan Drajat, Sunan
      Giri, and several others. His tomb in the Ampel mosque
      complex remains one of the most-visited Sunni pilgrimage
      sites in Indonesia. The Walisongo are the foundational
      figures of Javanese Islam in standard Javanese chronicles
      (*Babad Tanah Jawi*) and modern academic historiography
      (M.C. Ricklefs, A.H. Johns, Azyumardi Azra).
    description_ar: |
      توفي الراذن رحمة، المعروف في التراث الجاوي ب«سنن أمبيل»
      — أحد التسعة (Walisongo) الذين يُنسب إليهم إسلام أرض جاوة،
      مؤسس معهد «أمبيل» (pesantren) ب«سورابايا»، وقطب الجيل
      الثاني من علماء الدعوة الجاوية — ب«سورابايا» نحو سنة
      ٨٨٥ هـ (الموافق ١٤٨١ ميلادي). أصله من «تشامبا» (وسط
      الفيتنام اليوم)، ويُعدّ في التراث الجاوي شيخ حلقة «والي
      سَنغا»، وأستاذ سنن بونانغ وسنن دراجات وسنن غيري وعدد من
      أقرانه. وضريحه في رحاب جامع أمبيل من أكثر مزارات السنة
      شهرةً في إندونيسيا. والتسعة (Walisongo) هم آباء الإسلام
      الجاوي عند الإجماع في الأَخبار الجاوية الكلاسيكية «بَبَدْ
      تَنَه جاوي» وعند المؤرخين المعاصرين (ريكليفس، جونز،
      أزرى).
    description_fr: |
      Raden Rahmat, connu dans la tradition javanaise sous le
      nom de Sunan Ampel — l'un des *Walisongo* (Wali Sanga,
      les « Neuf Saints » de Java), fondateur du *pesantren*
      d'Ampel à Surabaya, et figure centrale de la seconde
      génération de la mission islamique javanaise — mourut à
      Surabaya vers 885 H / 1481 EC. Il était d'origine
      champa (centre du Vietnam actuel) et est considéré dans
      la tradition javanaise comme l'aîné du cercle des
      Walisongo, maître de Sunan Bonang, Sunan Drajat, Sunan
      Giri et de plusieurs autres. Son tombeau dans le complexe
      de la mosquée d'Ampel demeure l'un des lieux de pèlerinage
      sunnite les plus visités d'Indonésie. Les Walisongo sont
      les figures fondatrices de l'islam javanais dans les
      chroniques javanaises classiques (*Babad Tanah Jawi*) et
      dans l'historiographie académique moderne (M.C. Ricklefs,
      A.H. Johns, Azyumardi Azra).
    canonical_hijri: {year: 885, precision: year}
    canonical_gregorian: {date: 1481-01-01, precision: year, method: attested}
