  - slug: death-of-ahmad-dahlan
    category: scholar
    title_en: Death of Aḥmad Dahlān — Founder of Muhammadiyah
    title_ar: وفاة أحمد دحلان — مؤسس «المحمدية»
    title_fr: Mort d'Aḥmad Dahlān — fondateur de la Muhammadiyah
    description_en: |
      Muḥammad Darwīsh, known after his return from Mecca as
      Kyai Hajji Aḥmad Dahlān — Indonesian Sunni Shafi'i
      scholar of Yogyakarta, student in Mecca of Aḥmad al-
      Khaṭīb al-Minangkabawī and the Sunni reformist circle
      shaped by ʿAbduh and Riḍā, and founder on 18 November
      1912 CE of *Muhammadiyah*, the largest modernist Sunni
      mass-movement of Indonesia — died at Yogyakarta on 23
      February 1923 CE (7 Rajab 1341 AH) at age 54. He led
      Muhammadiyah from its founding until his death; the
      organisation he created built networks of schools,
      orphanages, hospitals, and women's wings (*ʿĀʾisyiyyah*)
      across the archipelago and remains one of the two
      pillars of organised Sunni Islam in twenty-first-
      century Indonesia, with tens of millions of members.
    description_ar: |
      توفي محمد درويش، المعروف بعد عودته من مكة المكرمة
      ب«الكياي الحاج أحمد دحلان» — العالم السني الإندونيسي
      على المذهب الشافعي من «يوغياكرتا»، تلميذ الإمام أحمد
      الخطيب المنانكباوي بمكة وحلقة الإصلاح السني المتأثرة
      بمدرسة الشيخ محمد عبده والشيخ محمد رشيد رضا، ومؤسس
      «المحمدية» يوم ١٨ نوفمبر ١٩١٢ ميلادي، أكبر حركة
      تجديدية سنية شعبية في إندونيسيا — ب«يوغياكرتا» يوم
      ٢٣ فيفري ١٩٢٣ ميلادي (الموافق ٧ رجب سنة ١٣٤١ هـ) عن أربع
      وخمسين سنة. وقاد «المحمدية» من تأسيسها إلى وفاته،
      فبنت الجمعية شبكات من المدارس ودور الأيتام والمستشفيات
      وأقسام النساء («العائشية») في عموم الأرخبيل، وهي إلى
      اليوم أحد ركني الإسلام السني المنظَّم في إندونيسيا في
      القرن الحادي والعشرين بعشرات الملايين من المنخرطين.
    description_fr: |
      Muḥammad Darwīsh, connu après son retour de La Mecque
      sous le nom de Kyai Hajji Aḥmad Dahlān — savant
      sunnite shafi'ite indonésien de Yogyakarta, élève à
      La Mecque d'Aḥmad al-Khaṭīb al-Minangkabawī et du
      cercle réformiste sunnite façonné par ʿAbduh et Riḍā,
      et fondateur le 18 novembre 1912 EC de la
      *Muhammadiyah*, le plus grand mouvement de masse
      sunnite moderniste d'Indonésie — mourut à Yogyakarta
      le 23 février 1923 EC (7 Rajab 1341 H) à l'âge de 54 ans.
      Il dirigea la Muhammadiyah depuis sa fondation
      jusqu'à sa mort; l'organisation qu'il créa bâtit des
      réseaux d'écoles, d'orphelinats, d'hôpitaux et de
      sections féminines (*ʿĀʾisyiyyah*) à travers tout
      l'archipel, et demeure l'un des deux piliers de
      l'islam sunnite organisé dans l'Indonésie du XXIe
      siècle, avec des dizaines de millions de membres.
