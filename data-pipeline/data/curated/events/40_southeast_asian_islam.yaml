  - slug: death-of-hashim-asyari
    category: scholar
    title_en: Death of Hāshim Asyʿarī — Founder of Nahdlatul Ulama
    title_ar: وفاة هاشم أشعري — مؤسس «نهضة العلماء»
    title_fr: Mort de Hāshim Asyʿarī — fondateur de la Nahdlatul Ulama
    description_en: |
      Muḥammad Hāshim Asyʿarī — Javanese Sunni Shafi'i scholar
      of Jombang, leading muḥaddith of his generation in the
      Indonesian archipelago, student in Mecca of Aḥmad al-
      Khaṭīb al-Minangkabawī, founder of the Tebuireng
      pesantren in 1899, and founder on 31 January 1926 CE
      of *Nahdlatul Ulama* (NU) — the largest traditionalist
      Sunni mass-organisation of the modern Muslim world —
      died at Tebuireng on 25 July 1947 CE (7 Ramaḍān 1366 AH) at age
      71. He led NU from its founding until his death; he
      had earlier issued the celebrated *Resolusi Jihad* of
      October 1945 calling on Muslims to defend the new
      Indonesian Republic against the returning Dutch. The
      movement he founded today claims tens of millions of
      affiliated members across the archipelago and a
      national network of pesantren preserving the classical
      Shafi'i and Ashʿarī curriculum.
    description_ar: |
      توفي الإمام محمد هاشم أشعري — العالم السني الجاوي
      الإندونيسي على المذهب الشافعي من «جومبانغ»، كبير
      محدثي الأرخبيل في جيله، تلميذ الإمام أحمد الخطيب
      المنانكباوي بمكة، مؤسس معهد «تيبو إيرنغ» (pesantren)
      سنة ١٨٩٩ ميلادي، ومؤسس «نهضة العلماء» يوم ٣١ جانفي
      ١٩٢٦ ميلادي — أكبر حركة سنية تقليدية شعبية في العالم
      الإسلامي الحديث — ب«تيبو إيرنغ» يوم ٢٥ جويلية
      ١٩٤٧ ميلادي (الموافق ٧ رمضان سنة ١٣٦٦ هـ) عن إحدى وسبعين
      سنة. وقاد «نهضة العلماء» من تأسيسها إلى وفاته، وكان
      قد أصدر قبل ذلك «قرار الجهاد» (Resolusi Jihad)
      الشهير في أكتوبر ١٩٤٥ ميلادي يدعو فيه المسلمين إلى
      الدفاع عن جمهورية إندونيسيا الفتية في وجه عودة
      الهولنديين. والحركة التي أسسها يدين بها اليوم
      عشرات الملايين في عموم الأرخبيل، وتحفظ شبكتها
      الوطنية من المعاهد منهج الشافعية والأشعرية الكلاسيكي.
    description_fr: |
      Muḥammad Hāshim Asyʿarī — savant sunnite shafi'ite
      javanais de Jombang, principal muḥaddith de sa
      génération dans l'archipel indonésien, élève à La
      Mecque d'Aḥmad al-Khaṭīb al-Minangkabawī, fondateur
      du *pesantren* de Tebuireng en 1899, et fondateur le
      31 janvier 1926 EC de la *Nahdlatul Ulama* (NU) — la
      plus grande organisation de masse sunnite
      traditionaliste du monde musulman moderne — mourut à
      Tebuireng le 25 juillet 1947 EC (7 Ramaḍān 1366 H) à l'âge de
      71 ans. Il dirigea la NU depuis sa fondation jusqu'à
      sa mort; il avait auparavant émis la célèbre
      *Resolusi Jihad* d'octobre 1945 appelant les
      musulmans à défendre la jeune République d'Indonésie
      contre le retour des Néerlandais. Le mouvement qu'il
      fonda compte aujourd'hui des dizaines de millions
      de membres affiliés à travers l'archipel et un
      réseau national de *pesantren* préservant le
      curriculum shafi'ite et ashʿarī classique.
