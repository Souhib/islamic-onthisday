  - slug: death-of-yusuf-al-maqassari
    category: scholar
    title_en: Death of Yūsuf al-Maqassārī — Sulawesi Sufi Exiled to the Cape
    title_ar: وفاة الشيخ يوسف المقصري — صوفي سُلَوَيسي مَنفي إلى الكاب
    title_fr: Mort de Yūsuf al-Maqassārī — soufi de Sulawesi exilé au Cap
    description_en: |
      Yūsuf ibn ʿAbd Allāh Abū al-Maḥāsin al-Tāj al-Khalwatī
      al-Maqassārī — Sunni Shafi'i scholar of noble Makassar
      descent, master of the Khalwatī Sufi order trained in the
      Hijaz, and prisoner-exile of the Dutch East India Company
      — died at Zandvliet farm in the Cape of Good Hope on 23
      May 1699 CE (23 Dhū al-Qaʿda 1110 AH) at age 72. He had spent more than
      twenty years in the Hijaz studying with the same circle of
      Medinese Sunni Sufi masters that trained al-Sinkilī, then
      returned to lead resistance against Dutch expansion at
      Banten in west Java alongside Sultan Ageng Tirtayasa.
      Captured in 1683 CE, he was deported first to Ceylon and
      then in 1694 CE to the Cape. He is honoured as a
      foundational figure of South African Islam: the Cape Malay
      community treats him as their patron saint, and his tomb
      at Macassar (Faure) outside Cape Town remains one of the
      *kramats* (saint shrines) ringing the city.
    description_ar: |
      توفي الشيخ يوسف بن عبد الله أبو المحاسن التاج الخلواتي
      المقصري — العالم السني السُلَوَيسي على المذهب الشافعي من
      أكابر بيوتات مكاسر، شيخ الطريقة الخلوتية في جيله من تلامذة
      الحرمين، والمنفي عند شركة الهند الشرقية الهولندية — في
      مزرعة «زانتْفليت» بـ«رأس الرجاء الصالح» يوم ٢٣ ماي ١٦٩٩
      ميلادي (الموافق ٢٣ ذي القعدة سنة ١١١٠ هـ) عن اثنتين
      وسبعين سنة. درس
      بالحجاز ما يزيد على عشرين سنة على نفس حلقة شيوخ التصوف
      السني المدنيين الذين تخرّج عليهم السنكلي، ثم عاد إلى جاوة
      فقاد المقاومة في «بانتن» على غربها مع السلطان أكَنغ
      تيرتاياسا في وجه التوسع الهولندي. وقُبض عليه سنة ١٦٨٣
      ميلادي، ونُفي أولاً إلى سيلان ثم سنة ١٦٩٤ ميلادي إلى رأس
      الرجاء الصالح. وهو يُعدّ مؤسس الإسلام في جنوب أفريقيا:
      جالية «كاب ملايو» تتخذه شفيعها، وضريحه في «مكاسر» (فور)
      من ضواحي كيب تاون من «الكرامات» الكبرى المحيطة بالمدينة.
    description_fr: |
      Yūsuf ibn ʿAbd Allāh Abū al-Maḥāsin al-Tāj al-Khalwatī
      al-Maqassārī — savant sunnite shafi'ite de noble descendance
      makassaraise, maître de l'ordre soufi khalwatī formé au
      Hijaz, et prisonnier-exilé de la Compagnie néerlandaise
      des Indes orientales — mourut à la ferme Zandvliet, au
      cap de Bonne-Espérance, le 23 mai 1699 EC (23 Dhū al-
      Qaʿda 1110 H) à l'âge de 72 ans. Il avait passé plus de vingt ans au Hijaz
      à étudier auprès du même cercle de maîtres soufis sunnites
      médinois qui forma al-Sinkilī, puis était rentré à Banten,
      dans l'ouest de Java, pour mener la résistance contre
      l'expansion néerlandaise aux côtés du sultan Ageng
      Tirtayasa. Capturé en 1683, il fut déporté d'abord à Ceylan
      puis en 1694 au Cap. Il est honoré comme une figure
      fondatrice de l'islam sud-africain : la communauté
      Cape Malay le considère comme son saint patron, et son
      tombeau à Macassar (Faure), en périphérie du Cap, demeure
      l'un des *kramats* (sanctuaires de saints) qui ceinturent
      la ville.
    canonical_hijri: {year: 1110, month: 11, day: 23, precision: day}
    canonical_gregorian: {date: 1699-05-23, precision: day, method: attested}
