  - slug: death-of-nur-al-din-al-raniri
    category: scholar
    title_en: Death of Nūr al-Dīn al-Rānīrī — Aceh Sunni Reformer
    title_ar: وفاة نور الدين الرانيري — المصلح السني في سلطنة آشي
    title_fr: Mort de Nūr al-Dīn al-Rānīrī — réformateur sunnite d'Aceh
    description_en: |
      Nūr al-Dīn ibn ʿAlī al-Rānīrī — Hadrami-Gujarati Sunni Shafi'i
      scholar, *shaykh al-Islām* of the Sultanate of Aceh under
      Sultan Iskandar Thānī (r. 1636-1641 CE) and Sultana Ṣafiyyat
      al-Dīn, and the leading critic of Hamzah Fansūrī's
      *waḥdat al-wujūd* line in the Malay-speaking world — died at
      his birthplace Rander in Gujarat in 1068 AH / 1658 CE. Coming
      from the Hadrami scholarly diaspora trained in the Sunni
      tradition of southern Arabia and the Indian Ocean, he served
      Aceh from about 1637 to 1644 before returning to India. His
      Malay-language *Bustān al-Salāṭīn* ("Garden of Kings") is one
      of the major Malay historical-political works of the
      seventeenth century, and his polemics — most famously
      *Tibyān fī Maʿrifat al-Adyān* — defined the boundaries of
      orthodox Sunni Sufism in Acehnese court Islam.
    description_ar: |
      توفي الشيخ نور الدين بن علي الرانيري — العالم السني الحضرمي
      الجوجراتي على المذهب الشافعي، شيخ الإسلام في سلطنة آشي في
      عهد السلطان إسكندر الثاني (حكم بين ١٦٣٦ و١٦٤١ ميلادي) ثم
      السلطانة صفية الدين، وكبير ناقدي مشرب «وحدة الوجود» الذي
      شاع عند حمزة الفنصوري في الأوساط الملايوية — في موطن
      ولادته «رَنْدير» بجوجرات سنة ١٠٦٨ هـ (الموافق ١٦٥٨
      ميلادي). وكان من شتات علماء حضرموت الذين تخرجوا على تراث
      أهل السنة بجنوب جزيرة العرب وحوض المحيط الهندي، خدم آشي بين
      نحو سنة ١٦٣٧ ومنتصف العقد الموالي قبل أن يعود إلى الهند.
      وكتابه بالملايوية «بستان السلاطين» من أكبر مصنفات التاريخ
      السياسي الملايوي في القرن السابع عشر، ومؤلفه «التبيان في
      معرفة الأديان» قعّد حدود التصوف السني في فقه أهل آشي.
    description_fr: |
      Nūr al-Dīn ibn ʿAlī al-Rānīrī — savant sunnite shafi'ite
      d'origine hadramie-gujaratie, *shaykh al-islām* du Sultanat
      d'Aceh sous le sultan Iskandar Thānī (r. 1636-1641 EC) et la
      sultane Ṣafiyyat al-Dīn, et principal critique de la ligne
      de la *waḥdat al-wujūd* de Hamzah Fansūrī dans le monde
      malayophone — mourut sur son lieu de naissance, Rander dans
      le Gujarat, en 1068 H / 1658 EC. Issu de la diaspora savante
      hadramie formée dans la tradition sunnite du sud de l'Arabie
      et de l'océan Indien, il servit Aceh d'environ 1637 à 1644
      avant de retourner en Inde. Son *Bustān al-Salāṭīn* (« Le
      jardin des rois ») en malais est l'un des grands ouvrages
      historico-politiques malais du XVIIe siècle, et ses
      polémiques — au premier rang desquelles *Tibyān fī Maʿrifat
      al-Adyān* — fixèrent les limites du soufisme sunnite
      orthodoxe dans l'islam de cour acehnais.
    canonical_hijri: {year: 1068, precision: year}
    canonical_gregorian: {date: 1658-01-01, precision: year, method: attested}
