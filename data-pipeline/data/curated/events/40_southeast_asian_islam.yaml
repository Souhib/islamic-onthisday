  - slug: death-of-ahmad-al-khatib-al-minangkabawi
    category: scholar
    title_en: Death of Aḥmad al-Khaṭīb al-Minangkabawī — Imām of Mecca's Shafi'is
    title_ar: وفاة أحمد الخطيب المنانكباوي — إمام الشافعية في مكة
    title_fr: Mort d'Aḥmad al-Khaṭīb al-Minangkabawī — imām des shafi'ites de La Mecque
    description_en: |
      Aḥmad ibn ʿAbd al-Laṭīf al-Khaṭīb al-Minangkabawī — Sunni
      Shafi'i scholar of Minangkabau (West Sumatra) origin, head
      (*imām*) of the Shafi'i school at the Holy Mosque of Mecca
      under the late Ottoman Hijaz, and a central teaching node
      between Mecca and the Indonesian archipelago — died at
      Mecca on 9 October 1915 CE (late 1333 AH) at age about 55.
      Born in West Sumatra, sent to Mecca for study as a young
      man, he never returned to the archipelago, but his Mecca
      circle taught the next generation of Indonesian Sunni
      reformers and traditionalists alike: among his students
      were Aḥmad Dahlān (founder of Muhammadiyah), Hāshim Asyʿarī
      (founder of Nahdlatul Ulama), ʿAbd al-Karīm Amrullāh, and
      a long line of Minangkabau, Acehnese, and Javanese
      ʿulamāʾ. Some Indonesian sources record his death-year as
      1334 AH; the conversion is at the boundary of the two
      Hijri years.
    description_ar: |
      توفي الإمام أحمد بن عبد اللطيف الخطيب المنانكباوي —
      العالم السني الشافعي السومطري المنانكبائي، إمام
      الشافعية بالمسجد الحرام في مكة المكرمة في أواخر العصر
      العثماني بالحجاز، وقطب التواصل التعليمي بين الحرمين
      والأرخبيل الإندونيسي — بمكة المكرمة يوم ٩ أكتوبر ١٩١٥
      ميلادي (في أواخر سنة ١٣٣٣ هـ) عن نحو خمس وخمسين سنة.
      وُلد بسومطرة الغربية، وأُرسل لمكة شاباً، فلم يعد إلى
      الأرخبيل قط، لكن مجلسه بمكة درّس الجيل التالي من علماء
      أهل السنة الإندونيسيين على اختلاف اتجاهاتهم بين الإصلاح
      والتقليد: من تلامذته أحمد دحلان (مؤسس «المحمدية»)، وهاشم
      أشعري (مؤسس «نهضة العلماء»)، وعبد الكريم أمر الله، وعدد
      كبير من علماء المنانكباو وآشي وجاوة. وبعض المصادر
      الإندونيسية تذكر سنة وفاته ١٣٣٤ هـ، وهو على حد التحويل
      بين السنتين الهجريتين.
    description_fr: |
      Aḥmad ibn ʿAbd al-Laṭīf al-Khaṭīb al-Minangkabawī —
      savant sunnite shafi'ite d'origine minangkabau (Sumatra
      occidental), chef (*imām*) de l'école shafi'ite à la
      Mosquée sacrée de La Mecque sous la fin du Hijaz ottoman,
      et nœud d'enseignement central entre La Mecque et
      l'archipel indonésien — mourut à La Mecque le 9 octobre
      1915 EC (fin 1333 H) à l'âge d'environ 55 ans. Né à
      Sumatra occidental, envoyé à La Mecque jeune homme, il
      ne retourna jamais à l'archipel, mais son cercle
      mecquois forma la génération suivante de réformateurs
      comme de traditionalistes sunnites indonésiens : parmi
      ses élèves figurent Aḥmad Dahlān (fondateur de la
      Muhammadiyah), Hāshim Asyʿarī (fondateur de la Nahdlatul
      Ulama), ʿAbd al-Karīm Amrullāh, ainsi qu'une longue
      lignée de *ʿulamāʾ* minangkabaus, acehnais et javanais.
      Certaines sources indonésiennes situent sa mort en 1334 H;
      la conversion se trouve à la frontière des deux années
      hégiriennes.
    canonical_hijri: {year: 1333, month: 11, day: 30, precision: day}
    canonical_gregorian: {date: 1915-10-09, precision: day, method: attested}
