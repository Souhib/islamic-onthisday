  - slug: death-of-sunan-kalijaga
    category: scholar
    title_en: Death of Sunan Kalijaga — Walisongo of Java
    title_ar: وفاة السنن كاليجاغا — من والي سَنغا الجاويين
    title_fr: Mort de Sunan Kalijaga — Walisongo de Java
    description_en: |
      Raden Mas Said, known in Javanese tradition as Sunan
      Kalijaga — one of the *Walisongo* (Wali Sanga) credited
      with the Islamisation of Java in the early sixteenth
      century, distinctive among the Nine Saints for his use of
      indigenous Javanese cultural forms (the *gamelan*
      orchestra and *wayang* shadow-puppet theatre) as vehicles
      for *daʿwa* — died at Kadilangu near Demak around the
      early sixteenth century. Javanese tradition gives a death
      around 927 AH / 1521 CE; some modern reconstructions
      from regional chronicles propose a slightly earlier
      year. He was traditionally a younger contemporary of
      Sunan Ampel and is associated in Javanese chronicles
      with the founding of the Demak Sultanate and with the
      adaptation of the popular *Mahābhārata*-derived wayang
      cycles to a Sunni Muslim moral framework.
    description_ar: |
      توفي الراذن ماس سعيد، المعروف عند الجاويين ب«سنن
      كاليجاغا» — أحد «والي سنغا» (Walisongo) الذين يُنسب
      إليهم إسلام جاوة في أوائل القرن السادس عشر الميلادي،
      ومميَّز عنهم باستعماله الفنون الجاوية المتوارثة
      («جاملان» و«وايانغ» مسرح الظل) أداةً للدعوة — ب«كاديلانغو»
      من ضواحي «دَماك» نحو أوائل القرن السادس عشر الميلادي.
      ويذكر التراث الجاوي وفاته نحو سنة ٩٢٧ هـ (الموافق
      ١٥٢١ ميلادي)، وبعض الباحثين المعاصرين يقترح من
      المصادر الإقليمية سنةً أقدم بقليل. وكان في تقدير
      التراث الجاوي من معاصري سنن أمبيل من جيله، ويُنسب إليه
      إسهام في تأسيس سلطنة دَماك، وفي إعادة صياغة دورات
      «وايانغ» المستلهمة من «المهابهارتا» في إطار أخلاقي
      سني.
      
      Javanese chronicles (*Babad Tanah Jawi*) give traditional dates ranging widely from late 9th-century Hijri (early-mid 16th century CE); we follow the Babad's modal attestation of ~927 AH (1521 CE) while noting that the dating of all the Walisongo is approximate Javanese-tradition rather than strict classical-Sunni source attestation.
      
      تذكر المخطوطات الجاوية («بابد تانه جاوي») تواريخ تقليدية تتراوح بين أواخر القرن التاسع الهجري ومنتصف القرن السادس عشر الميلادي؛ ونتبع هنا الرواية الأكثر تواتراً في «بابد تانه جاوي» بنحو ٩٢٧ هـ (١٥٢١ ميلادي)، مع التنبيه أن تأريخ «الأولياء التسعة» جميعاً تقريبي يتبع التراث الجاوي لا روايات كلاسيكية سنية محققة.
    description_fr: |
      Raden Mas Said, connu dans la tradition javanaise sous
      le nom de Sunan Kalijaga — l'un des *Walisongo* (Wali
      Sanga) crédités de l'islamisation de Java au début du
      XVIe siècle, distinct au sein des Neuf Saints par son
      usage des formes culturelles javanaises autochtones
      (l'orchestre *gamelan* et le théâtre d'ombres *wayang*)
      comme véhicules de la *daʿwa* — mourut à Kadilangu, près
      de Demak, vers le début du XVIe siècle. La tradition
      javanaise situe sa mort vers 927 H / 1521 EC; certaines
      reconstructions modernes à partir de chroniques
      régionales proposent une année légèrement antérieure.
      Il fut traditionnellement un cadet de Sunan Ampel et
      est associé dans les chroniques javanaises à la
      fondation du Sultanat de Demak ainsi qu'à l'adaptation
      des cycles populaires *wayang* d'inspiration
      *Mahābhārata* à un cadre moral sunnite.
    canonical_hijri: {year: 927, precision: year}
    canonical_gregorian: {date: 1521-01-01, precision: year, method: attested}
    disputed: true
    dispute_about: date
