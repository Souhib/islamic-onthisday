# Wave 27 of curated event additions (2026-04-27).
# Southeast Asian Sunni Muslim history — Indonesia, Malaysia, Brunei. The
# Malay-Indonesian Islamic world has its own scholarly genealogy linking the
# Acehnese coast through Mecca, Medina, and the Hadrami diaspora to Java,
# Sulawesi, and Borneo. Three categories: (i) Aceh-Sumatran scholars
# (Hamzah Fansūrī, al-Rānīrī, al-Sinkilī), (ii) the Malay-archipelago
# eighteenth- and nineteenth-century chain of Mecca-trained Shafi'i
# masters (Yūsuf al-Maqassārī, al-Banjārī, al-Khaṭīb al-Minangkabawī),
# (iii) the Javanese Walisongo and the early-modern Malay sultanates
# (Aceh, Malacca), and (iv) the founders of twentieth-century Indonesian
# Sunni mass movements (Hāshim Asyʿarī of NU, Aḥmad Dahlān of
# Muhammadiyah). All Sunni mainstream Shafi'i figures attested in EI2 +
# modern Indonesian/Malay biographical references and the standard
# academic historiography of Southeast Asian Islam (M.C. Ricklefs,
# A.H. Johns, Azyumardi Azra). None are sahaba; none carry hadith refs.
# Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # ACEH-SUMATRAN SCHOLARS — THE FANSŪRĪ–RĀNĪRĪ–SINKILĪ SUCCESSION
  # =========================================================================

  - slug: death-of-hamzah-fansuri
    category: scholar
    title_en: Death of Hamzah Fansūrī — Pioneer of Malay Sufi Poetry
    title_ar: وفاة حمزة الفنصوري — رائد الشعر الصوفي بالملايوية
    title_fr: Mort de Hamzah Fansūrī — pionnier de la poésie soufie malaise
    description_en: |
      Hamzah Fansūrī — Acehnese Sufi poet writing in Malay, founder of
      the syair verse form in Malay literature, and the earliest known
      author to use Malay as a vehicle for systematic Sufi metaphysics
      — died around 999 AH / 1590 CE. The exact place and date of his
      death are uncertain across the surviving sources; an inscription
      in Mecca proposed by some twentieth-century scholars has been
      contested. His Malay treatises (*Asrār al-ʿĀrifīn*, *Sharāb
      al-ʿĀshiqīn*) and his quatrains drew on Ibn al-ʿArabī's
      vocabulary of *waḥdat al-wujūd* and circulated widely in the
      Sumatran courts. A generation later his readings were sharply
      critiqued as heterodox by the Hadrami-trained reformer
      Nūr al-Dīn al-Rānīrī under Sultan Iskandar Thānī of Aceh. He
      remains foundational for the formation of Malay-language
      Islamic literature.
    description_ar: |
      توفي حمزة الفنصوري — الشاعر الصوفي الآشي الذي كتب بالملايوية،
      ومؤسس قالب «الشعر» (sjair) في الأدب الملايوي، وأقدم مصنف
      معروف اتخذ الملايوية لساناً للعرفان الصوفي في تنظير منهجي —
      نحو سنة ٩٩٩ هـ (الموافق ١٥٩٠ ميلادي تقريباً). ومكان وفاته
      وتاريخها بدقة غير ثابتين عند المصادر المحفوظة؛ ونقش في مكة
      أُقترح تأريخاً لقبره عند بعض الباحثين في القرن العشرين قد
      وقع فيه خلاف. ورسائله بالملايوية «أسرار العارفين» و«شراب
      العاشقين» وشعره من الرباعيات استمدت من معجم الشيخ ابن العربي
      في «وحدة الوجود»، وانتشرت في بلاطات سومطرة. وفي الجيل التالي
      نُقد قراؤه نقداً شديداً عند المصلح الحضرمي نور الدين
      الرانيري في عهد سلطان آشي إسكندر الثاني. وهو ركن أساسي في
      تشكل الأدب الإسلامي بلغة الملايو.
      
      His death year is genuinely contested in Indonesian scholarship: classical Acehnese chronicles give 999 AH (1590 CE) as the dominant date, while a minority position based on textual evidence and his polemical exchanges with al-Rānīrī (who died 1068 AH) suggests he survived into the early 17th century. We follow the classical 999 AH attestation while acknowledging the dispute.
      
      سنة وفاته محل نزاع حقيقي في الدراسات الإندونيسية: تذكر السجلات الأتشيهية الكلاسيكية ٩٩٩ هـ (١٥٩٠ ميلادي) بوصفها التاريخ الأرجح، في حين يقترح قول أقل بناءً على دلائل نصية ومساجلاته مع الرانيري (المتوفى ١٠٦٨ هـ) أنه عاش إلى مطلع القرن السابع عشر. ونتبع هنا الرواية الكلاسيكية بسنة ٩٩٩ هـ مع الإقرار بالخلاف.
    description_fr: |
      Hamzah Fansūrī — poète soufi acehnais écrivant en malais,
      fondateur de la forme versifiée *syair* dans la littérature
      malaise, et le plus ancien auteur connu à avoir utilisé le
      malais comme véhicule d'une métaphysique soufie systématique —
      mourut vers 999 H / 1590 EC. Le lieu et la date exacts de sa
      mort restent incertains à travers les sources survivantes ;
      une inscription mecquoise proposée par certains chercheurs du
      XXe siècle a été contestée. Ses traités en malais (*Asrār
      al-ʿĀrifīn*, *Sharāb al-ʿĀshiqīn*) et ses quatrains
      puisaient dans le vocabulaire d'Ibn al-ʿArabī sur la *waḥdat
      al-wujūd* et circulèrent largement dans les cours
      sumatranaises. Une génération plus tard, ses lectures furent
      vivement critiquées comme hétérodoxes par le réformateur
      d'origine hadramie Nūr al-Dīn al-Rānīrī sous le sultan
      Iskandar Thānī d'Aceh. Il demeure fondamental pour la
      formation de la littérature islamique en langue malaise.
    canonical_hijri: {year: 999, precision: year}
    canonical_gregorian: {date: 1590-01-01, precision: year, method: attested}
    disputed: true
    dispute_about: date
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
