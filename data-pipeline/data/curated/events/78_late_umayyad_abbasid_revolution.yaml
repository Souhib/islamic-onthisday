# Wave 78 of curated event additions (2026-04-27).
# 13 dated events covering the late Umayyad caliphate, the Second Fitna
# afterlife (Mukhtār's revolt and its suppression, Maskin and the killing
# of Muṣʿab ibn al-Zubayr) and the Abbasid Revolution that ended Umayyad
# rule. Events: deaths of ʿAbd al-Malik ibn Marwān, Sulaymān ibn ʿAbd al-
# Malik, Yazīd II, and Hishām ibn ʿAbd al-Malik (the four Marwānid caliphs
# whose deaths anchor the dynasty's chronology); the battle of Khāzir and
# the death of al-Mukhtār al-Thaqafī (the avenger-of-Karbalāʾ revolt of
# Kūfa); the battle of Maskin and the killing of Muṣʿab ibn al-Zubayr by
# al-Ḥajjāj ibn Yūsuf; the death of al-Ḥajjāj himself at Wāsiṭ; the death
# of Marwān II al-Ḥimār — last Umayyad caliph — at Būṣīr in Egypt; the
# massacre of the Umayyad family at Nahr Abī Fuṭrus by ʿAbd Allāh ibn
# ʿAlī; the accession of Abū al-ʿAbbās al-Saffāḥ as first Abbasid caliph
# at Kūfa; his death at al-Anbār; and the killing of Abū Muslim al-
# Khurāsānī by his cousin al-Manṣūr at al-Madāʾin. All events attested
# in al-Ṭabarī's Tārīkh al-Rusul wa-l-Mulūk, Ibn al-Athīr's al-Kāmil,
# and Ibn Kathīr's al-Bidāya wa-l-Nihāya, with Ibn Khallikān's Wafayāt
# and al-Dhahabī's Tārīkh al-Islām adding biographical confirmation
# where available. Already-covered events skipped: death of al-Walīd I
# (96 AH), Battle of the Great Zāb (132 AH), martyrdom of ʿAbdullāh ibn
# al-Zubayr ra (73 AH).
#
# Editorial framing: standard Sunni-historical narrative. Ibn al-Zubayr
# ra is treated as sahabi throughout (image policy hard-block; honorific
# ra preserved). Mukhtār reported factually as a revolutionary leader of
# Kūfa whose movement was suppressed by Muṣʿab ibn al-Zubayr (no
# editorial endorsement of his theological positions). al-Ḥajjāj
# reported factually as the dominant Umayyad governor of Iraq under
# ʿAbd al-Malik and al-Walīd I. The Abbasid Revolution is reported as a
# political-religious shift; the Nahr Abī Fuṭrus massacre is reported
# without polemic — as the classical sources record it. Trilingual
# (en/ar/fr) throughout.

events:
  # =========================================================================
  # MARWANID CALIPHS — DEATHS
  # =========================================================================

  - slug: death-of-abd-al-malik-ibn-marwan
    category: ruler_death
    title_en: Death of Caliph ʿAbd al-Malik ibn Marwān — Reorganiser of the Umayyad State
    title_ar: وفاة الخليفة عبد الملك بن مروان — مُرتِّب الدولة الأموية
    title_fr: Mort du calife ʿAbd al-Malik ibn Marwān — réorganisateur de l'État omeyyade
    description_en: |
      ʿAbd al-Malik ibn Marwān, fifth Umayyad caliph (reigned 65-86
      AH), died at Damascus at age about 60 after a reign of just over
      twenty years that fundamentally reorganised the Umayyad state.
      He had reunified the caliphate after the Second Fitna —
      defeating the Zubayrids of Mecca through al-Ḥajjāj ibn Yūsuf
      (73 AH) and crushing the Khārijite movements of Iraq — and
      consolidated the Marwānid line that would govern until 132 AH.
      His administrative reforms included the Arabisation of the
      dīwāns (replacing Greek and Pahlavi by Arabic in the chancery
      registers), the minting of the first purely Islamic gold dīnār
      and silver dirham bearing Qurʾānic legends instead of Byzantine
      and Sasanian iconography, and the establishment of an
      independent Arabic monetary system. Under his patronage Jerusalem's
      Dome of the Rock was completed (72 AH/692). al-Ṭabarī, Ibn
      al-Athīr, and Ibn Kathīr all enter his death under Shawwāl
      86 AH; he was succeeded by his son al-Walīd I.
    description_ar: |
      توفي الخليفة عبد الملك بن مروان — خامس الخلفاء الأمويين (حكم
      من ٦٥ إلى ٨٦ هـ) — بدمشق عن نحو ستين سنة، بعد خلافة جاوزت
      عشرين عاماً أعادت ترتيب الدولة الأموية ترتيباً جوهرياً. كان
      قد وحّد كلمة الخلافة بعد الفتنة الثانية — هزم الزبيريين بمكة
      على يد الحجاج بن يوسف الثقفي (سنة ٧٣ هـ) وسحق الحركات
      الخارجية بالعراق — ورسّخ دولة بني مروان التي حكمت إلى سنة
      ١٣٢ هـ. ومن أبرز إصلاحاته الإدارية تعريب الدواوين (نقلها من
      اليونانية والفارسية البهلوية إلى العربية)، وضرب أول دينار
      ذهبي ودرهم فضي إسلاميَّيْن خالصَيْن منقوشَيْن بالكتابات
      القرآنية بدلاً من رموز الروم والساسانيين، وتأسيس نظام نقدي
      عربي مستقل. وفي عهده تم بناء قبة الصخرة بالقدس (سنة ٧٢ هـ).
      وذكر الطبري وابن الأثير وابن كثير وفاتَه في شوال سنة ٨٦ هـ،
      وخلفه ابنه الوليد الأول.
    description_fr: |
      ʿAbd al-Malik ibn Marwān, cinquième calife omeyyade (règne 65-86 H),
      mourut à Damas à environ 60 ans après un règne d'un peu plus de
      vingt ans qui réorganisa fondamentalement l'État omeyyade. Il
      avait réunifié le califat après la deuxième fitna — défaisant
      les Zubayrides de La Mecque par al-Ḥajjāj ibn Yūsuf (73 H) et
      écrasant les mouvements kharijites d'Irak — et consolidé la
      lignée marwānide qui gouvernerait jusqu'en 132 H. Ses réformes
      administratives incluaient l'arabisation des *dīwāns*
      (remplaçant le grec et le moyen-perse par l'arabe dans les
      registres de chancellerie), la frappe du premier dīnār d'or et
      dirham d'argent purement islamiques, portant des légendes
      coraniques au lieu de l'iconographie byzantine et sassanide,
      et la création d'un système monétaire arabe indépendant. Sous
      son patronage, le Dôme du Rocher de Jérusalem fut achevé
      (72 H/692). al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent tous
      sa mort à Shawwāl 86 H; son fils al-Walīd Ier lui succéda.
    canonical_hijri: {year: 86, month: 10, day: 14, precision: day}
    canonical_gregorian: {date: 705-10-08, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of ʿAbd al-Malik in mid-Shawwāl 86 AH at Damascus and gives a long obituary tracing his reorganisation of the chancery and the coinage."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil dates the death to Shawwāl 86 AH and confirms succession by al-Walīd."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya places the death in 86 AH and devotes a substantial obituary to ʿAbd al-Malik."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām enters the obituary of ʿAbd al-Malik under 86 AH."
    people: [[abd-al-malik-ibn-marwan, died]]
    tags: [umayyad, caliph, damascus, marwanid, dinar, arabisation]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-sulayman-ibn-abd-al-malik
    category: ruler_death
    title_en: Death of Caliph Sulaymān ibn ʿAbd al-Malik at Dābiq
    title_ar: وفاة الخليفة سليمان بن عبد الملك بدابق
    title_fr: Mort du calife Sulaymān ibn ʿAbd al-Malik à Dābiq
    description_en: |
      Sulaymān ibn ʿAbd al-Malik, seventh Umayyad caliph (reigned
      96-99 AH), died at the Syrian frontier camp of Dābiq north of
      Aleppo at age about 45, while overseeing the army sent against
      Constantinople under his brother Maslama ibn ʿAbd al-Malik. His
      brief two-and-a-half year reign saw the great siege of
      Constantinople (98-99 AH) — the most ambitious naval and land
      assault on the Byzantine capital in the Umayyad period — and
      the height of Qutayba ibn Muslim's eastern campaigns
      (truncated when Qutayba revolted and was killed). On his
      deathbed, on the advice of the scholar Rajāʾ ibn Ḥaywa,
      Sulaymān bypassed his own son in favour of his cousin ʿUmar
      ibn ʿAbd al-ʿAzīz, a designation that secured the brief reign
      remembered in Sunni tradition as the closest the Umayyad
      caliphate came to the model of the Rāshidūn. al-Ṭabarī, Ibn
      al-Athīr, and Ibn Kathīr all date the death to Ṣafar 99 AH at
      Dābiq.
    description_ar: |
      توفي الخليفة سليمان بن عبد الملك — سابع الخلفاء الأمويين
      (حكم من ٩٦ إلى ٩٩ هـ) — بمعسكر الثغر الشامي «دابق» شمالي
      حلب، عن نحو خمس وأربعين سنة، وهو يشرف على الجيش الذي
      أرسله إلى القسطنطينية بقيادة أخيه مَسلَمة بن عبد الملك. وقد
      شهد عهده القصير الذي لم يبلغ ثلاث سنين الحصار الكبير
      للقسطنطينية (٩٨-٩٩ هـ) — أعظم هجوم بحري وبري على عاصمة
      الروم في العصر الأموي — وذروة فتوح قتيبة بن مسلم في الشرق
      (التي قُطعت بثورة قتيبة ومقتله). ولما حضرته الوفاة، عهد
      بمشورة الفقيه رجاء بن حيوة بالخلافة من بعده إلى ابن عمه
      عمر بن عبد العزيز دون ابنه، وهي الولاية التي أُثرت في
      التقليد السنّي بأنها أقرب ما اقتربت منه الدولة الأموية
      من سيرة الراشدين. وذكر الطبري وابن الأثير وابن كثير وفاتَه
      في صفر سنة ٩٩ هـ بدابق.
    description_fr: |
      Sulaymān ibn ʿAbd al-Malik, septième calife omeyyade (règne
      96-99 H), mourut au camp frontalier syrien de Dābiq, au nord
      d'Alep, à environ 45 ans, alors qu'il supervisait l'armée
      envoyée contre Constantinople sous son frère Maslama ibn ʿAbd
      al-Malik. Son bref règne de deux ans et demi vit le grand
      siège de Constantinople (98-99 H) — l'assaut naval et terrestre
      le plus ambitieux contre la capitale byzantine de l'époque
      omeyyade — et l'apogée des campagnes orientales de Qutayba ibn
      Muslim (interrompues par la révolte et la mort de Qutayba).
      Sur son lit de mort, conseillé par le savant Rajāʾ ibn Ḥaywa,
      Sulaymān écarta son propre fils au profit de son cousin ʿUmar
      ibn ʿAbd al-ʿAzīz, désignation qui assura le bref règne
      retenu par la tradition sunnite comme la plus proche
      approximation omeyyade du modèle des Rāshidūn. al-Ṭabarī,
      Ibn al-Athīr et Ibn Kathīr datent tous la mort à Ṣafar 99 H,
      à Dābiq.
    canonical_hijri: {year: 99, month: 2, day: 10, precision: day}
    canonical_gregorian: {date: 717-09-22, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of Sulaymān at Dābiq in Ṣafar 99 AH and preserves Rajāʾ ibn Ḥaywa's account of the succession arrangement in favour of ʿUmar ibn ʿAbd al-ʿAzīz."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters the death under 99 AH at Dābiq and confirms the designation of ʿUmar."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 99 AH for Sulaymān's death at Dābiq."
    people: [[sulayman-ibn-abd-al-malik, died]]
    tags: [umayyad, caliph, dabiq, constantinople-siege, marwanid]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-yazid-ii
    category: ruler_death
    title_en: Death of Caliph Yazīd II at al-Muwaqqar
    title_ar: وفاة الخليفة يزيد الثاني بالموقّر
    title_fr: Mort du calife Yazīd II à al-Muwaqqar
    description_en: |
      Yazīd II ibn ʿAbd al-Malik, ninth Umayyad caliph (reigned
      101-105 AH), died at his country residence of al-Muwaqqar
      east of ʿAmmān at age about 35 after a reign of just over
      four years. His accession had followed the death of his
      cousin ʿUmar ibn ʿAbd al-ʿAzīz, and his reign saw the
      revolt of Yazīd ibn al-Muhallab in Iraq (suppressed in
      102 AH at the battle of al-ʿAqr) and the famous iconoclast
      edict of 104 AH ordering the destruction of figural images
      in churches under Umayyad rule. Sources record that he was
      grief-stricken to the point of incapacity at the death of
      his concubine Ḥabbāba and died not long after. He
      designated his brother Hishām as successor, with his son
      al-Walīd II to follow, an arrangement that held until the
      Third Fitna of 126 AH. al-Ṭabarī, Ibn al-Athīr, and Ibn
      Kathīr all date the death to Shaʿbān 105 AH.
    description_ar: |
      توفي الخليفة يزيد الثاني بن عبد الملك — تاسع الخلفاء
      الأمويين (حكم من ١٠١ إلى ١٠٥ هـ) — بمنتزهه الريفي «الموقّر»
      شرقي عمّان، عن نحو خمس وثلاثين سنة، بعد خلافة لم تجاوز
      أربع سنوات وأشهرٍ. وكانت ولايته قد وقعت إثر وفاة ابن عمه
      عمر بن عبد العزيز، وشهد عهده ثورة يزيد بن المهلّب بالعراق
      (التي قُمعت سنة ١٠٢ هـ في وقعة العَقْر) وأمرَه الشهير سنة
      ١٠٤ هـ بكسر الصور والتماثيل في كنائس بلاد الأمويين. وتذكر
      المصادر أنه حزن لموت جاريته «حبّابة» حزناً شديداً عجز معه
      عن تدبير أمره ومات بعدها بقليل. وعهد بالخلافة من بعده
      إلى أخيه هشام، ثم لابنه الوليد الثاني، وهو الترتيب الذي
      صمد إلى الفتنة الثالثة سنة ١٢٦ هـ. وذكر الطبري وابن
      الأثير وابن كثير وفاتَه في شعبان سنة ١٠٥ هـ.
    description_fr: |
      Yazīd II ibn ʿAbd al-Malik, neuvième calife omeyyade
      (règne 101-105 H), mourut à sa résidence campagnarde
      d'al-Muwaqqar, à l'est d'Amman, à environ 35 ans, après
      un règne d'un peu plus de quatre ans. Son accession avait
      suivi la mort de son cousin ʿUmar ibn ʿAbd al-ʿAzīz, et son
      règne vit la révolte de Yazīd ibn al-Muhallab en Irak
      (réprimée en 102 H à la bataille d'al-ʿAqr) ainsi que le
      célèbre édit iconoclaste de 104 H ordonnant la destruction
      des images figuratives dans les églises sous domination
      omeyyade. Les sources rapportent qu'il fut accablé de
      chagrin jusqu'à l'incapacité après la mort de sa concubine
      Ḥabbāba et mourut peu après. Il désigna son frère Hishām
      comme successeur, suivi de son fils al-Walīd II, arrangement
      qui tint jusqu'à la troisième fitna de 126 H. al-Ṭabarī,
      Ibn al-Athīr et Ibn Kathīr datent tous la mort à Shaʿbān
      105 H.
    canonical_hijri: {year: 105, month: 8, day: 25, precision: day}
    canonical_gregorian: {date: 724-01-26, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of Yazīd II at al-Muwaqqar in Shaʿbān 105 AH and gives the succession arrangement in favour of Hishām and al-Walīd II."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil dates the death to Shaʿbān 105 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 105 AH for Yazīd II's death at al-Muwaqqar."
    people: [[yazid-ii, died]]
    tags: [umayyad, caliph, marwanid, jordan, muwaqqar]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-hisham-ibn-abd-al-malik
    category: ruler_death
    title_en: Death of Caliph Hishām ibn ʿAbd al-Malik — Last Great Umayyad
    title_ar: وفاة الخليفة هشام بن عبد الملك — آخر كبار الخلفاء الأمويين
    title_fr: Mort du calife Hishām ibn ʿAbd al-Malik — dernier des grands Omeyyades
    description_en: |
      Hishām ibn ʿAbd al-Malik, tenth Umayyad caliph (reigned
      105-125 AH), died at his palace of al-Ruṣāfa in northern
      Syria at age about 53 after a twenty-year reign that is
      counted by Sunni historians as the last era of consolidated
      Umayyad strength. His reign saw the consolidation of the
      eastern frontier against the Türgesh under Asad ibn ʿAbd
      Allāh and Naṣr ibn Sayyār, the great Khārijite revolt of
      Zayd ibn ʿAlī (122 AH) suppressed at Kūfa, the disastrous
      defeat at Toulouse and the broader retraction of the
      Umayyad advance into Francia, and the early stirrings of
      the Hāshimite *daʿwa* in Khurāsān that would within a
      generation bring down the dynasty. He was succeeded by
      his nephew al-Walīd II, whose two-year reign and murder
      opened the Third Fitna and the rapid Marwānid collapse.
      al-Ṭabarī, Ibn al-Athīr, and Ibn Kathīr all date the
      death to Rabīʿ II 125 AH at al-Ruṣāfa.
    description_ar: |
      توفي الخليفة هشام بن عبد الملك — عاشر الخلفاء الأمويين
      (حكم من ١٠٥ إلى ١٢٥ هـ) — بقصره «الرُّصافة» في شمال
      الشام عن نحو ثلاث وخمسين سنة، بعد خلافة عشرين سنة يعدّها
      المؤرخون السنّة آخر عهود قوة بني أمية المجتمعة. شهد عهده
      تثبيت الجبهة الشرقية أمام التُّرْغش بقيادة أسد بن عبد
      الله ونصر بن سيّار، وثورة زيد بن علي الكبرى (سنة ١٢٢ هـ)
      التي قُمعت بالكوفة، والهزيمة الفادحة بمعركة بَلاط
      الشهداء (تولوز) وانكفاء التقدّم الأموي في بلاد الإفرنج،
      وبدايات الدعوة الهاشمية السرية في خراسان التي ستطيح
      بالدولة الأموية في جيل واحد. وخلفه ابن أخيه الوليد
      الثاني، الذي فتحت ولايته القصيرة ومقتله الفتنة الثالثة
      وانهيار بني مروان السريع. وذكر الطبري وابن الأثير وابن
      كثير وفاتَه في ربيع الآخر سنة ١٢٥ هـ بالرُّصافة.
    description_fr: |
      Hishām ibn ʿAbd al-Malik, dixième calife omeyyade (règne
      105-125 H), mourut à son palais d'al-Ruṣāfa dans le nord de
      la Syrie à environ 53 ans après un règne de vingt ans que
      les historiens sunnites comptent comme la dernière ère de
      force omeyyade consolidée. Son règne vit la consolidation
      du front oriental contre les Türgesh sous Asad ibn ʿAbd
      Allāh et Naṣr ibn Sayyār, la grande révolte de Zayd ibn
      ʿAlī (122 H) écrasée à Kūfa, la défaite désastreuse de
      Toulouse et le repli général de l'avance omeyyade en Francie,
      ainsi que les premières agitations de la *daʿwa* hāshimite
      au Khurāsān qui, en une génération, allaient renverser la
      dynastie. Son neveu al-Walīd II lui succéda; le règne de
      deux ans de ce dernier et son assassinat ouvrirent la
      troisième fitna et l'effondrement marwānide rapide.
      al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent tous la mort
      à Rabīʿ II 125 H, à al-Ruṣāfa.
    canonical_hijri: {year: 125, month: 4, day: 6, precision: day}
    canonical_gregorian: {date: 743-02-06, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of Hishām at al-Ruṣāfa in Rabīʿ II 125 AH and gives a long obituary on his administrative reforms and the Khurāsān situation at his death."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters the death under 125 AH and confirms succession by al-Walīd II."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 125 AH for the death of Hishām at al-Ruṣāfa."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām enters the obituary of Hishām under 125 AH."
    people: [[hisham-ibn-abd-al-malik, died]]
    tags: [umayyad, caliph, marwanid, rusafa, syria, khurasan]
    importance: major
    verified: true
