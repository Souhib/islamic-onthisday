  - slug: battle-of-khazir
    category: battle
    title_en: Battle of Khāzir — Mukhtār's Forces Defeat the Killers of al-Ḥusayn ra
    title_ar: معركة الخازر — أتباع المختار يهزمون قَتَلَة الحسين رضي الله عنه
    title_fr: Bataille de Khāzir — les forces d'al-Mukhtār défont les tueurs d'al-Ḥusayn ra
    description_en: |
      On the banks of the Khāzir river east of Mosul, the Kūfan
      army of al-Mukhtār ibn Abī ʿUbayd al-Thaqafī under his
      general Ibrāhīm ibn al-Ashtar al-Nakhaʿī decisively defeated
      the Umayyad Syrian army under ʿUbayd Allāh ibn Ziyād —
      the governor who had ordered the killing of al-Ḥusayn ibn
      ʿAlī ra at Karbalāʾ in 61 AH. ʿUbayd Allāh was killed in
      the battle, along with the Umayyad commanders Ḥuṣayn ibn
      Numayr (the same who had besieged Mecca and the Kaʿba
      in 64 AH) and Shuraḥbīl ibn Dhī al-Kalāʿ. al-Mukhtār had
      proclaimed his revolt at Kūfa in 66 AH on the banner of
      vengeance for the *ahl al-bayt* and the killing of
      al-Ḥusayn; the Khāzir victory eliminated most of those
      directly responsible for Karbalāʾ. The battle is dated by
      al-Ṭabarī to ʿĀshūrāʾ — 10 Muḥarram 67 AH — six years to
      the day after Karbalāʾ, a coincidence the early historians
      do not fail to note.
    description_ar: |
      على ضفاف نهر الخازر شرقي الموصل هزم جيشُ الكوفة بقيادة
      إبراهيم بن الأشتر النخعي — قائد المختار بن أبي عبيد
      الثقفي — جيشَ الشام الأموي بقيادة عبيد الله بن زياد —
      الوالي الذي أمر بقتل الحسين بن علي رضي الله عنه بكربلاء
      سنة ٦١ هـ — هزيمةً قاضية. وقُتل عبيد الله في المعركة، ومعه
      القادة الأمويون حُصين بن نُمَير (الذي كان قد حاصر مكة
      والكعبة سنة ٦٤ هـ) وشُرَحْبيل بن ذي الكَلاع. وكان المختار
      قد أعلن ثورته بالكوفة سنة ٦٦ هـ تحت راية الانتقام لأهل
      البيت ولدم الحسين، فصفّى نصرُ الخازر معظم الضالعين
      مباشرةً في كربلاء. وأرخ الطبري المعركة بعاشوراء — ١٠
      المحرم سنة ٦٧ هـ — بعد ست سنين من كربلاء بيومٍ واحد،
      وهي مصادفة لم يفت المؤرخين الأوائل أن يسجّلوها.
    description_fr: |
      Sur les rives du fleuve Khāzir à l'est de Mossoul, l'armée
      kūfienne d'al-Mukhtār ibn Abī ʿUbayd al-Thaqafī, sous son
      général Ibrāhīm ibn al-Ashtar al-Nakhaʿī, défit de manière
      décisive l'armée syrienne omeyyade d'ʿUbayd Allāh ibn
      Ziyād — le gouverneur qui avait ordonné le meurtre d'al-
      Ḥusayn ibn ʿAlī ra à Karbalāʾ en 61 H. ʿUbayd Allāh fut
      tué dans la bataille, ainsi que les commandants omeyyades
      Ḥuṣayn ibn Numayr (celui-là même qui avait assiégé La
      Mecque et la Kaʿba en 64 H) et Shuraḥbīl ibn Dhī al-Kalāʿ.
      al-Mukhtār avait proclamé sa révolte à Kūfa en 66 H sous
      la bannière de la vengeance pour les *ahl al-bayt* et
      pour le sang d'al-Ḥusayn; la victoire de Khāzir élimina
      la plupart des responsables directs de Karbalāʾ.
      al-Ṭabarī date la bataille à ʿĀshūrāʾ — le 10 Muḥarram
      67 H — six ans après Karbalāʾ jour pour jour, coïncidence
      que les premiers historiens ne manquent pas de relever.
    canonical_hijri: {year: 67, month: 1, day: 10, precision: day}
    canonical_gregorian: {date: 686-08-06, precision: day, method: tabular_conversion}
