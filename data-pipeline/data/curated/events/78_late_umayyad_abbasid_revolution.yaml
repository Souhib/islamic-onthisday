      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the battle under 67 AH and confirms Ibrāhīm al-Ashtar's victory and the killing of Ibn Ziyād."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya places the battle on the banks of the Khāzir on 10 Muḥarram 67 AH."
