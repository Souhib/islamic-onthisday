  - slug: death-of-marwan-ii-al-himar
    category: ruler_death
    title_en: Death of Marwān II al-Ḥimār — Last Umayyad Caliph
    title_ar: مقتل مروان بن محمد الحمار — آخر خلفاء بني أمية
    title_fr: Mort de Marwān II al-Ḥimār — dernier calife omeyyade
    description_en: |
      Marwān II ibn Muḥammad — the last Umayyad caliph
      (reigned 127-132 AH), known as al-Ḥimār ("the Donkey",
      a sobriquet of endurance rather than insult, given to
      him for his proverbial steadfastness on the battlefield) —
      was killed at Būṣīr Qūrīdis in the Fayyūm region of
      Egypt at age about 60, three months after his decisive
      defeat at the battle of the Greater Zāb. After the Zāb
      he had fled westward through Syria, finding the Umayyad
      cities closing their gates, and crossed into Egypt
      hoping to reach Ifrīqiya; an Abbasid pursuit detachment
      under Abū ʿAwn ʿAbd al-Malik ibn Yazīd, sent by ʿAbd
      Allāh ibn ʿAlī, caught him at Būṣīr where he was killed
      in the night of his arrival. With his death the Umayyad
      caliphate of Damascus — founded by Muʿāwiya in 41 AH —
      came to an end after ninety-one years. His head was sent
      to al-Saffāḥ at Kūfa. al-Ṭabarī, Ibn al-Athīr, and Ibn
      Kathīr all date the killing to Dhū al-Ḥijja 132 AH at
      Būṣīr.
    description_ar: |
      قُتل مروان بن محمد — آخر خلفاء بني أمية (حكم من ١٢٧
      إلى ١٣٢ هـ)، الملقّب بـ«الحمار» (لقب صبرٍ على القتال
      لا شتيمةٍ، أُطلق عليه لمضربيّته في الثبات في الحرب) —
      ببُوصير قوريدس بناحية الفيّوم بمصر، عن نحو ستين سنة،
      بعد ثلاثة أشهر من هزيمته الحاسمة في معركة الزاب
      الأكبر. كان قد فرّ بعد الزاب غرباً عبر بلاد الشام
      فوجد مدن الأمويين تغلق أبوابها دونه، ثم اجتاز إلى
      مصر يطمع في الوصول إلى إفريقية، فأدركته كتيبة
      المطاردة العباسية بقيادة أبي عون عبد الملك بن يزيد
      التي أرسلها عبد الله بن علي، فقتلته ببُوصير في ليلة
      وصوله. وبموته انتهت الخلافة الأموية بدمشق — التي
      أسسها معاوية رضي الله عنه سنة ٤١ هـ — بعد إحدى
      وتسعين سنة. وأُرسل رأسه إلى السفّاح بالكوفة. وأرّخ
      الطبري وابن الأثير وابن كثير قتلَه في ذي الحجة سنة
      ١٣٢ هـ بُبوصير.
    description_fr: |
      Marwān II ibn Muḥammad — le dernier calife omeyyade
      (règne 127-132 H), surnommé al-Ḥimār (« l'Âne », sobriquet
      d'endurance et non d'insulte, qu'il reçut pour sa
      proverbiale fermeté au combat) — fut tué à Būṣīr Qūrīdis
      dans la région du Fayyūm en Égypte, à environ 60 ans,
      trois mois après sa défaite décisive à la bataille du
      Grand Zāb. Après le Zāb, il avait fui vers l'ouest à
      travers la Syrie, trouvant les villes omeyyades fermant
      leurs portes devant lui, et était passé en Égypte espérant
      atteindre l'Ifrīqiya; un détachement de poursuite
      abbasside sous Abū ʿAwn ʿAbd al-Malik ibn Yazīd, envoyé
      par ʿAbd Allāh ibn ʿAlī, le rattrapa à Būṣīr où il fut tué
      la nuit même de son arrivée. Avec sa mort, le califat
      omeyyade de Damas — fondé par Muʿāwiya en 41 H — prit fin
      après quatre-vingt-onze ans. Sa tête fut envoyée à al-
      Saffāḥ à Kūfa. al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr
      datent tous la mort à Dhū al-Ḥijja 132 H, à Būṣīr.
    canonical_hijri: {year: 132, month: 12, day: 27, precision: day}
    canonical_gregorian: {date: 750-08-06, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives a long narrative of Marwān II's flight from the Greater Zāb to Egypt and his killing at Būṣīr in Dhū al-Ḥijja 132 AH."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the death under 132 AH at Būṣīr and confirms Abū ʿAwn as the responsible commander."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 132 AH for the death of Marwān II at Būṣīr in the Fayyūm."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām enters the death of Marwān II under 132 AH."
    people: [[marwan-ii, died], [abdullah-ibn-ali, leader]]
    tags: [umayyad, marwan-ii, egypt, busir, abbasid-revolution, fayyum]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: massacre-umayyads-nahr-abi-futrus
    category: political_event
    title_en: Killing of the Umayyad Family at Nahr Abī Fuṭrus
    title_ar: مقتلة بني أمية على نهر أبي فُطرس
    title_fr: Massacre des Omeyyades sur le Nahr Abī Fuṭrus
    description_en: |
      ʿAbd Allāh ibn ʿAlī, paternal uncle of caliph al-Saffāḥ
      and the Abbasid commander who had taken Damascus and
      pursued the surviving Umayyad princes through Palestine,
      assembled around eighty members of the Umayyad family at
      a banquet at Nahr Abī Fuṭrus (Antipatris, the river later
      called the Yarkon, north-east of Yāfā) and ordered them
      killed. The act eliminated the male line of the Umayyad
      dynasty in the central provinces; only the young ʿAbd
      al-Raḥmān ibn Muʿāwiya ibn Hishām escaped, fleeing
      ultimately to al-Andalus where he founded the Umayyad
      Emirate of Cordoba in 138 AH. al-Ṭabarī preserves the
      classical narrative of the banquet and includes the
      report that the bodies were left where they fell, with
      hides spread over them on which the Abbasid soldiers
      ate. The event is recorded by the classical Sunni
      historians without polemic but with marked sobriety;
      Ibn Kathīr notes that some of those killed were
      blameless of any accusation against the dynasty. The
      massacre fixed the political ruthlessness of the new
      regime in the Sunni historical memory.
    description_ar: |
      جمع عبد الله بن علي — عمّ الخليفة السفّاح والقائد العباسي
      الذي افتتح دمشق وتعقّب أمراء بني أمية الناجين عبر فلسطين —
      نحو ثمانين رجلاً من بني أمية في وليمة على نهر أبي فُطرس
      (أَنْطِيبَطْرِس، وهو النهر المعروف لاحقاً بـ«اليَرْكون»
      شمال شرقي يافا) وأمر بقتلهم. وأنهى ذلك العملُ الذكورَ
      من بني أمية في الأقاليم المركزية إنهاءً تامّاً، فلم
      ينج إلا الفتى عبد الرحمن بن معاوية بن هشام، الذي فرّ
      آخر الأمر إلى الأندلس فأسس بها إمارة بني أمية بقرطبة
      سنة ١٣٨ هـ. ويحفظ الطبري الرواية الكلاسيكية للوليمة،
      ويضمّنها أن الجثث تُركت على وجه الأرض حيث سقطت، وفُرشت
      عليها الأنطاع التي أكل عليها جند العباسيين. ويسجّل
      المؤرخون السنّة الكلاسيكيون الحادثةَ بلا جدل، غير أن
      ابن كثير يلمح إلى أن في القتلى من لم يكن في يده ذنب
      يستحق به الدم. وثبّتت المقتلةُ في الذاكرة التاريخية
      السنّية صورةَ صرامة العهد الجديد.
    description_fr: |
      ʿAbd Allāh ibn ʿAlī — oncle paternel du calife al-Saffāḥ
      et commandant abbasside qui avait pris Damas et poursuivi
      les princes omeyyades survivants à travers la Palestine —
      réunit environ quatre-vingts membres de la famille
      omeyyade à un banquet sur le Nahr Abī Fuṭrus (Antipatris,
      le fleuve appelé ensuite Yarkon, au nord-est de Jaffa) et
      les fit massacrer. L'acte élimina la lignée masculine de
      la dynastie omeyyade dans les provinces centrales; seul
      le jeune ʿAbd al-Raḥmān ibn Muʿāwiya ibn Hishām échappa,
      fuyant finalement en al-Andalus où il fonda l'émirat
      omeyyade de Cordoue en 138 H. al-Ṭabarī conserve le récit
      classique du banquet et inclut le rapport que les corps
      furent laissés où ils étaient tombés, avec des peaux
      étendues sur eux sur lesquelles les soldats abbassides
      mangèrent. L'événement est consigné par les historiens
      sunnites classiques sans polémique mais avec une sobriété
      marquée; Ibn Kathīr note que certains des tués étaient
      sans charge précise contre la dynastie. Le massacre
      fixa dans la mémoire historique sunnite la rigueur
      politique du nouveau régime.
    canonical_hijri: {year: 132, precision: year}
    canonical_gregorian: {date: 750-06-25, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives the narrative of the killing of the Umayyads at Nahr Abī Fuṭrus under 132 AH and preserves multiple eyewitness accounts of the banquet."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the killing of the Umayyads under 132 AH and names ʿAbd Allāh ibn ʿAlī as the commander."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 132 AH for the killing at Nahr Abī Fuṭrus and remarks on the case of those killed without specific charge."
    people: [[abdullah-ibn-ali, leader]]
    tags: [abbasid-revolution, umayyad, palestine, abdullah-ibn-ali, antipatris, nahr-abi-futrus]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-saffah
    category: ruler_death
    title_en: Death of al-Saffāḥ at al-Anbār
    title_ar: وفاة الخليفة أبي العباس السفّاح بالأنبار
    title_fr: Mort d'al-Saffāḥ à al-Anbār
    description_en: |
      Abū al-ʿAbbās al-Saffāḥ, first Abbasid caliph (reigned
      132-136 AH), died of smallpox at his residence at al-
      Anbār on the Euphrates — the city he had chosen as the
      provisional Abbasid capital pending the foundation of a
      permanent seat — at age about 33. His four-year reign
      had consolidated the Abbasid takeover after the killing
      of Marwān II: it saw the suppression of the
      remaining Umayyad partisans in Syria and Egypt, the
      establishment of central authority over Khurāsān
      through Abū Muslim, the killing of Abū Salama al-
      Khallāl (the Hāshimite agent who had hesitated to give
      the *bayʿa* to al-Saffāḥ), and a defensive war on the
      Caspian frontier. He had designated his brother Abū
      Jaʿfar al-Manṣūr as successor, with their nephew ʿĪsā
      ibn Mūsā to follow. al-Saffāḥ was the only Abbasid
      caliph buried at al-Anbār. al-Ṭabarī, Ibn al-Athīr,
      and Ibn Kathīr all date the death to Dhū al-Ḥijja
      136 AH at al-Anbār.
    description_ar: |
      توفي الخليفة أبو العباس السفّاح — أول خلفاء بني العباس
      (حكم من ١٣٢ إلى ١٣٦ هـ) — بمرض الجدري في داره بالأنبار
      على الفرات، وهي المدينة التي اتخذها عاصمةً موقّتة
      للدولة الجديدة ريثما يُؤسَّس مَقَرٌّ دائم — عن نحو ثلاث
      وثلاثين سنة. شهدت ولايته القصيرة استقرار الأمر للعباسيين
      بعد مقتل مروان الثاني: قمع بقايا الأمويين في الشام
      ومصر، وبسط السلطة المركزية على خراسان من خلال أبي مسلم،
      ومقتل أبي سَلَمة الخلّال (داعية الهاشمية الذي تردّد في
      البيعة للسفّاح)، وحرب الدفاع على ثغر الديلم. وكان قد
      عهد بالخلافة من بعده إلى أخيه أبي جعفر المنصور، ثم
      لابن أخيه عيسى بن موسى. وتفرّد السفّاح بأنه الوحيد من
      خلفاء بني العباس الذي دفن بالأنبار. وأرخ الطبري وابن
      الأثير وابن كثير وفاتَه في ذي الحجة سنة ١٣٦ هـ بالأنبار.
    description_fr: |
      Abū al-ʿAbbās al-Saffāḥ, premier calife abbasside (règne
      132-136 H), mourut de la variole à sa résidence d'al-
      Anbār sur l'Euphrate — la ville qu'il avait choisie comme
      capitale provisoire abbasside en attendant la fondation
      d'un siège permanent — à environ 33 ans. Son règne de
      quatre ans avait consolidé la prise de pouvoir abbasside
      après la mort de Marwān II : il vit la répression des
      partisans omeyyades subsistants en Syrie et en Égypte,
      l'établissement de l'autorité centrale sur le Khurāsān
      par Abū Muslim, l'exécution d'Abū Salama al-Khallāl
      (l'agent hāshimite qui avait hésité à donner la *bayʿa*
      à al-Saffāḥ), et une guerre défensive sur la frontière
      caspienne. Il avait désigné son frère Abū Jaʿfar
      al-Manṣūr comme successeur, suivi de leur neveu ʿĪsā ibn
      Mūsā. al-Saffāḥ fut le seul calife abbasside enterré à
      al-Anbār. al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent
      tous la mort à Dhū al-Ḥijja 136 H, à al-Anbār.
    canonical_hijri: {year: 136, month: 12, day: 13, precision: day}
    canonical_gregorian: {date: 754-06-09, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of al-Saffāḥ from smallpox at al-Anbār in Dhū al-Ḥijja 136 AH and gives the succession arrangement in favour of al-Manṣūr."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil dates the death to Dhū al-Ḥijja 136 AH and confirms al-Anbār as the place."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 136 AH for al-Saffāḥ's death at al-Anbār."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ confirms 136 AH for the death and gives the standard biographical account."
    people: [[al-saffah, died]]
    tags: [abbasid, caliph, anbar, saffah, smallpox]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: killing-of-abu-muslim-al-khurasani
    category: assassination
    title_en: Killing of Abū Muslim al-Khurāsānī by al-Manṣūr
    title_ar: مقتل أبي مسلم الخراساني على يد المنصور
    title_fr: Mort d'Abū Muslim al-Khurāsānī tué par al-Manṣūr
    description_en: |
      Abū Muslim ʿAbd al-Raḥmān ibn Muslim al-Khurāsānī — the
      Khurāsānī revolutionary who had led the Hāshimite
      *daʿwa* and the Black-Bannered armies that had brought
      down the Umayyads at the Greater Zāb in 132 AH — was
      summoned to the camp of caliph al-Manṣūr at al-Madāʾin
      (Ctesiphon) on the Tigris and killed there at age about
      37. After al-Saffāḥ's death and al-Manṣūr's accession,
      Abū Muslim's independent military authority in
      Khurāsān had become an unsupportable threat to the new
      caliph; al-Manṣūr lured him from Khurāsān on the
      pretext of an audience and a settlement of accounts,
      then had him struck down in the audience tent by ʿUthmān
      ibn Nahīk and other commanders. al-Ṭabarī preserves the
      famous exchange in which Abū Muslim invokes his services
      to the dynasty and al-Manṣūr replies that the dynasty
      precisely could no longer tolerate them. The killing
      provoked a series of revolts in Khurāsān (the Sunbād
      revolt of 137-138 AH; the *Muslimiyya* and the *Rāwandiyya*),
      but al-Manṣūr's Iraqi base held. al-Ṭabarī, Ibn al-Athīr,
      and Ibn Kathīr all date the killing to Shaʿbān 137 AH at
      al-Madāʾin.
    description_ar: |
      قُتل أبو مسلم عبد الرحمن بن مسلم الخراساني — صاحب الدعوة
      الهاشمية وقائد الجيوش ذات الرايات السود التي أطاحت
      ببني أمية يوم الزاب الأكبر سنة ١٣٢ هـ — في معسكر
      الخليفة المنصور بالمدائن (طيسفون) على دجلة، عن نحو
      سبع وثلاثين سنة. كان نفوذُ أبي مسلم العسكري المستقل
      بخراسان قد صار بعد وفاة السفّاح وبيعة المنصور تهديداً
      لا يحتمله الخليفة الجديد؛ فاستدعاه المنصور من خراسان
      بحجة اللقاء وتصفية الحسابات، ثم قتله في خيمة المجلس
      على يد عثمان بن نَهيك وغيره من القوّاد. ويحفظ الطبري
      المحاورة الشهيرة بينهما، يحتجّ فيها أبو مسلم بصنيعه
      للدولة فيجيبه المنصور بأن الدولة لذلك بعينه لم تعد
      تحتمله. وأشعلت قتلتُه ثورات متعاقبة في خراسان (سُنباذ
      سنة ١٣٧-١٣٨ هـ، والمسلمية، والراوندية)، غير أن قاعدة
      المنصور العراقية ثبتت. وأرخ الطبري وابن الأثير وابن
      كثير قتلَه في شعبان سنة ١٣٧ هـ بالمدائن.
    description_fr: |
      Abū Muslim ʿAbd al-Raḥmān ibn Muslim al-Khurāsānī — le
      révolutionnaire khurāsānien qui avait mené la *daʿwa*
      hāshimite et les armées aux bannières noires qui
      renversèrent les Omeyyades au Grand Zāb en 132 H — fut
      convoqué au camp du calife al-Manṣūr à al-Madāʾin
      (Ctésiphon) sur le Tigre et y fut tué à environ 37 ans.
      Après la mort d'al-Saffāḥ et l'accession d'al-Manṣūr,
      l'autorité militaire indépendante d'Abū Muslim au
      Khurāsān était devenue une menace insoutenable pour le
      nouveau calife; al-Manṣūr l'attira du Khurāsān sous
      prétexte d'audience et de règlement de comptes, puis le
      fit abattre dans la tente d'audience par ʿUthmān ibn
      Nahīk et d'autres commandants. al-Ṭabarī conserve le
      dialogue célèbre dans lequel Abū Muslim invoque ses
      services à la dynastie et al-Manṣūr répond que la
      dynastie précisément ne pouvait plus les tolérer. Le
      meurtre provoqua une série de révoltes au Khurāsān
      (la révolte de Sunbād en 137-138 H, la *Muslimiyya*,
      la *Rāwandiyya*), mais la base irakienne d'al-Manṣūr
      tint. al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent tous
      la mort à Shaʿbān 137 H, à al-Madāʾin.
