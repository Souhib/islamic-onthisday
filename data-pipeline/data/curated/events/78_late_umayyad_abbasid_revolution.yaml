  - slug: death-of-al-mukhtar-al-thaqafi
    category: political_event
    title_en: Death of al-Mukhtār al-Thaqafī at Kūfa
    title_ar: مقتل المختار بن أبي عبيد الثقفي بالكوفة
    title_fr: Mort d'al-Mukhtār ibn Abī ʿUbayd al-Thaqafī à Kūfa
    description_en: |
      al-Mukhtār ibn Abī ʿUbayd al-Thaqafī, the Kūfan
      revolutionary leader who had taken over Kūfa in 66 AH on
      the banner of avenging al-Ḥusayn ibn ʿAlī ra and the
      *ahl al-bayt*, was killed at the *qaṣr* (citadel) of Kūfa
      after a four-month siege by the Zubayrid army under
      Muṣʿab ibn al-Zubayr — brother of the rival caliph
      ʿAbdullāh ibn al-Zubayr ra at Mecca. After the Khāzir
      victory the previous year, al-Mukhtār's movement had
      drawn a heterogeneous coalition of Iraqi *mawālī*,
      Hāshimite sympathisers, and avengers of Karbalāʾ; but
      his theological positions (variously characterised by the
      classical sources, none of them favourable) and his
      execution of those Kūfan notables he held responsible for
      Karbalāʾ alienated the Kūfan elite. Muṣʿab marched on Kūfa,
      besieged the *qaṣr*, and killed al-Mukhtār in the fighting.
      al-Ṭabarī enters the death under 14 Ramaḍān 67 AH; he
      preserves both the conflicting characterisations of al-
      Mukhtār and the Sunni juristic verdict that the man was
      a usurper outside the legitimate authority of the caliphate.
    description_ar: |
      قُتل المختار بن أبي عبيد الثقفي — زعيم ثورة الكوفة الذي
      استولى على الكوفة سنة ٦٦ هـ تحت راية الأخذ بثأر الحسين
      بن علي رضي الله عنه وأهل البيت — بقصر الكوفة بعد حصارٍ
      مدته أربعة أشهر ضربه عليه جيش الزبيريين بقيادة مصعب بن
      الزبير، أخي الخليفة المنازع عبد الله بن الزبير رضي الله
      عنه بمكة. كانت حركةُ المختار قد جمعت في إثر نصر الخازر
      في العام السابق ائتلافاً متباين الأركان من موالي
      العراق، والمتشيعين لبني هاشم، والآخذين بثأر كربلاء، لكن
      مواقفه العقدية (التي تُروى في المصادر الكلاسيكية روايات
      متعددة، لا واحدة منها بإيجاب) وإعدامه لأشراف الكوفة الذين
      رآهم مسؤولين عن كربلاء أبعد عنه أعيانَ المصر. فسار مصعب
      إلى الكوفة وحاصر القصر، فقتله في القتال. وذكر الطبري وفاتَه
      في الرابع عشر من رمضان سنة ٦٧ هـ، ويحفظ في كتابه روايتين
      متخالفتين في وصف المختار، وكذلك حكم فقهاء أهل السنة
      بأنه خرج عن السلطة الشرعية للخلافة فقاتل عليها قتال
      المُستَأثر.
    description_fr: |
      al-Mukhtār ibn Abī ʿUbayd al-Thaqafī, le chef révolutionnaire
      kūfien qui s'était emparé de Kūfa en 66 H sous la bannière
      de la vengeance d'al-Ḥusayn ibn ʿAlī ra et des *ahl al-bayt*,
      fut tué au *qaṣr* (citadelle) de Kūfa après un siège de
      quatre mois mené par l'armée zubayride sous Muṣʿab ibn
      al-Zubayr — frère du calife rival ʿAbdullāh ibn al-Zubayr
      ra à La Mecque. Après la victoire de Khāzir l'année
      précédente, le mouvement d'al-Mukhtār avait rassemblé une
      coalition hétérogène de *mawālī* irakiens, de sympathisants
      hāshimites et de vengeurs de Karbalāʾ; mais ses positions
      théologiques (diversement caractérisées par les sources
      classiques, aucune favorablement) et l'exécution des
      notables kūfiens qu'il tenait pour responsables de
      Karbalāʾ aliénèrent l'élite de la ville. Muṣʿab marcha sur
      Kūfa, assiégea le *qaṣr*, et tua al-Mukhtār dans le combat.
      al-Ṭabarī place la mort au 14 Ramaḍān 67 H; il conserve
      à la fois les caractérisations divergentes d'al-Mukhtār
      et le verdict juridique sunnite selon lequel l'homme était
      un usurpateur hors de l'autorité légitime du califat.
    canonical_hijri: {year: 67, month: 9, day: 14, precision: day}
    canonical_gregorian: {date: 687-04-03, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the killing of al-Mukhtār at Kūfa on 14 Ramaḍān 67 AH after Muṣʿab's four-month siege of the qaṣr."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the killing under 67 AH and confirms Muṣʿab as the responsible commander."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 67 AH for the end of al-Mukhtār at the qaṣr of Kūfa."
    people: [[al-mukhtar-al-thaqafi, died], [musab-ibn-al-zubayr, leader]]
