  # =========================================================================
  # END OF THE ZUBAYRID CALIPHATE — MASKIN
  # =========================================================================

  - slug: battle-of-maskin-and-death-of-musab-ibn-al-zubayr
    category: battle
    title_en: Battle of Maskin and Killing of Muṣʿab ibn al-Zubayr
    title_ar: معركة مَسكِن ومقتل مصعب بن الزبير
    title_fr: Bataille de Maskin et mort de Muṣʿab ibn al-Zubayr
    description_en: |
      On the plain of Maskin (also written *Dayr al-Jāthalīq*)
      on the Dujayl canal north of Baghdad, the Umayyad caliph
      ʿAbd al-Malik ibn Marwān personally led his Syrian army
      against the Zubayrid forces of Muṣʿab ibn al-Zubayr,
      governor of Iraq for his brother the caliph ʿAbdullāh ibn
      al-Zubayr ra at Mecca. ʿAbd al-Malik had bought off most
      of Muṣʿab's commanders before the battle; Muṣʿab fought on
      with a small remnant after his own son ʿĪsā was killed
      beside him and was finally cut down. His head was sent to
      ʿAbd al-Malik. With Muṣʿab's death, Iraq passed under
      Umayyad control and the way was open for al-Ḥajjāj ibn
      Yūsuf's siege of Mecca and the killing of ʿAbdullāh ibn
      al-Zubayr ra the following year. al-Ṭabarī, Ibn al-Athīr,
      and Ibn Kathīr all date the battle to Jumādā I 72 AH.
      Muṣʿab is remembered in classical sources as a man of
      conspicuous personal courage; his refusal to flee at
      Maskin became proverbial.
    description_ar: |
      في سهل «مَسكِن» (ويُقال: دير الجاثَلِيق) على نهر الدُّجَيل
      شمالي بغداد، قاد الخليفة الأموي عبد الملك بن مروان بنفسه
      جيشَه الشامي على جيش الزبيريين بقيادة مصعب بن الزبير
      والي العراق لأخيه الخليفة عبد الله بن الزبير رضي الله
      عنه بمكة. وكان عبد الملك قد استمال أكثر قوّاد مصعب قبل
      اللقاء؛ فحارب مصعب بمن بقي معه من القلة بعد أن قُتل
      ابنه عيسى إلى جنبه، فسقط شهيداً، فأُتي برأسه إلى عبد
      الملك. وبموته انتقل العراق إلى الأمويين، وانفتح الطريق
      لحصار الحجاج بن يوسف الثقفي مكةَ ومقتل عبد الله بن
      الزبير رضي الله عنه في العام التالي. وأرخ الطبري وابن
      الأثير وابن كثير المعركة بجمادى الأولى سنة ٧٢ هـ. ويُذكر
      مصعب في المصادر الكلاسيكية مضرب المثل في الشجاعة الفردية،
      حتى صار رفضُه الفرار يوم مَسكِن مَثَلاً سائراً.
    description_fr: |
      Dans la plaine de Maskin (aussi écrite *Dayr al-Jāthalīq*)
      sur le canal Dujayl, au nord de Baghdād, le calife
      omeyyade ʿAbd al-Malik ibn Marwān conduisit personnellement
      son armée syrienne contre les forces zubayrides de Muṣʿab
      ibn al-Zubayr, gouverneur d'Irak pour son frère le calife
      ʿAbdullāh ibn al-Zubayr ra à La Mecque. ʿAbd al-Malik avait
      acheté la plupart des commandants de Muṣʿab avant la
      bataille; Muṣʿab combattit avec un petit reste après que
      son fils ʿĪsā fut tué à ses côtés, et finit par tomber.
      Sa tête fut envoyée à ʿAbd al-Malik. Avec la mort de
      Muṣʿab, l'Irak passa sous contrôle omeyyade et la voie fut
      ouverte au siège de La Mecque par al-Ḥajjāj ibn Yūsuf et
      à la mort d'ʿAbdullāh ibn al-Zubayr ra l'année suivante.
      al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent tous la
      bataille à Jumādā I 72 H. Muṣʿab est rappelé par les
      sources classiques comme un homme d'un courage personnel
      remarquable; son refus de fuir à Maskin devint proverbial.
    canonical_hijri: {year: 72, month: 5, day: 13, precision: day}
    canonical_gregorian: {date: 691-10-04, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives a long narrative of the battle of Maskin in Jumādā I 72 AH and the killing of Muṣʿab ibn al-Zubayr; he preserves multiple eyewitness accounts of Muṣʿab's last stand."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the battle under 72 AH and confirms ʿAbd al-Malik as the personal commander."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya places the battle and Muṣʿab's death in 72 AH at Maskin on the Dujayl."
    people: [[musab-ibn-al-zubayr, died], [abd-al-malik-ibn-marwan, leader]]
    tags: [second-fitna, maskin, zubayrid, abd-al-malik, musab, dujayl]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # AL-ḤAJJĀJ IBN YŪSUF — DEATH AT WĀSIṬ
  # =========================================================================

  - slug: death-of-al-hajjaj-ibn-yusuf
    category: ruler_death
    title_en: Death of al-Ḥajjāj ibn Yūsuf at Wāsiṭ
    title_ar: وفاة الحجاج بن يوسف الثقفي بواسط
    title_fr: Mort d'al-Ḥajjāj ibn Yūsuf à Wāsiṭ
    description_en: |
      al-Ḥajjāj ibn Yūsuf al-Thaqafī, governor of Iraq and the
      east for caliphs ʿAbd al-Malik ibn Marwān and al-Walīd I,
      died at his administrative capital of Wāsiṭ — the city he
      himself had founded in 83 AH between Kūfa and Baṣra to
      house his Syrian garrison — at age about 54. His
      twenty-year governorship had reorganised the eastern
      caliphate after the Second Fitna: he had besieged Mecca
      and killed ʿAbdullāh ibn al-Zubayr ra in 73 AH; pacified
      Iraq through measures the classical sources record as
      famously severe, including the suppression of Ibn al-
      Ashʿath's revolt at Dayr al-Jamājim in 83 AH; reformed
      the dīwāns and the agricultural assessment of the Sawād;
      and pushed the eastern frontier under Qutayba ibn Muslim
      into Transoxiana and under Muḥammad ibn al-Qāsim into
      Sindh. Sunni tradition is divided on his legacy — Ibn
      Khallikān preserves the famous saying of ʿUmar ibn ʿAbd
      al-ʿAzīz that "if every nation came forward with its
      worst, and we came forward with al-Ḥajjāj, we would
      surpass them" — but his administrative competence is
      universally acknowledged. al-Ṭabarī, Ibn al-Athīr, and
      Ibn Kathīr all date the death to Shawwāl 95 AH at Wāsiṭ.
    description_ar: |
      توفي الحجاج بن يوسف الثقفي — والي العراق والمشرق
      للخليفتين عبد الملك بن مروان والوليد الأول — بحاضرته
      «واسط» التي بناها بنفسه سنة ٨٣ هـ بين الكوفة والبصرة
      ليُسكن فيها جنده الشامي، عن نحو أربع وخمسين سنة. شهد
      عهده الذي ناهز عشرين سنة في الولاية إعادة ترتيب الخلافة
      المشرقية بعد الفتنة الثانية: حاصر مكة وقتل عبد الله بن
      الزبير رضي الله عنه سنة ٧٣ هـ، وضبط العراق بإجراءات تشتهر
      في المصادر الكلاسيكية بشدّتها، ومنها قمع ثورة ابن
      الأشعث في دير الجماجم سنة ٨٣ هـ، وأصلح الدواوين وخراج
      السواد، ودفع الجبهة الشرقية بقوّاده قتيبة بن مسلم في
      ما وراء النهر ومحمد بن القاسم في السند. وانقسم تقليد
      أهل السنة في حكمه — ينقل ابن خلّكان قول عمر بن عبد
      العزيز المشهور: «لو جاءت كلُّ أمة بخبيثها وجئنا بالحجاج
      لغلبناهم» — غير أن كفاءته الإدارية مجمَع عليها. وأرخ
      الطبري وابن الأثير وابن كثير وفاتَه في شوال سنة ٩٥ هـ
      بواسط.
    description_fr: |
      al-Ḥajjāj ibn Yūsuf al-Thaqafī, gouverneur d'Irak et de
      l'Orient pour les califes ʿAbd al-Malik ibn Marwān et
      al-Walīd Ier, mourut à sa capitale administrative de
      Wāsiṭ — la ville qu'il avait lui-même fondée en 83 H
      entre Kūfa et Baṣra pour loger sa garnison syrienne — à
      environ 54 ans. Ses vingt ans de gouvernement avaient
      réorganisé le califat oriental après la deuxième fitna:
      il avait assiégé La Mecque et tué ʿAbdullāh ibn al-Zubayr
      ra en 73 H; pacifié l'Irak par des mesures que les sources
      classiques rapportent pour leur sévérité célèbre, y
      compris la répression de la révolte d'Ibn al-Ashʿath à
      Dayr al-Jamājim en 83 H; réformé les *dīwāns* et
      l'assiette fiscale du Sawād; et poussé la frontière
      orientale sous Qutayba ibn Muslim jusqu'en Transoxiane,
      et sous Muḥammad ibn al-Qāsim jusqu'au Sindh. La
      tradition sunnite est partagée sur son héritage — Ibn
      Khallikān conserve le mot célèbre d'ʿUmar ibn ʿAbd
      al-ʿAzīz : « si chaque nation venait avec son pire et que
      nous venions avec al-Ḥajjāj, nous les surpasserions » —
      mais sa compétence administrative est unanimement
      reconnue. al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent
      tous la mort à Shawwāl 95 H, à Wāsiṭ.
    canonical_hijri: {year: 95, month: 10, day: 14, precision: day}
    canonical_gregorian: {date: 714-06-30, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of al-Ḥajjāj at Wāsiṭ in Shawwāl 95 AH and gives a long obituary on his governorship and the conquests under his command."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil dates the death to Shawwāl 95 AH at Wāsiṭ."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 95 AH for al-Ḥajjāj's death at Wāsiṭ."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān contains the standard biographical entry on al-Ḥajjāj and dates his death to Shawwāl 95 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām enters the obituary of al-Ḥajjāj under 95 AH."
    people: [[al-hajjaj-ibn-yusuf, died]]
    tags: [umayyad, governor, iraq, wasit, hajjaj, thaqif]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # ABBASID REVOLUTION — END OF THE UMAYYAD CALIPHATE
  # =========================================================================

  - slug: accession-of-al-saffah
    category: political_event
    title_en: Accession of al-Saffāḥ — First Abbasid Caliph at Kūfa
    title_ar: بيعة أبي العباس السفّاح بالكوفة — أول خلفاء بني العباس
    title_fr: Accession d'al-Saffāḥ — premier calife abbasside à Kūfa
    description_en: |
      Abū al-ʿAbbās ʿAbd Allāh ibn Muḥammad al-Saffāḥ, of the
      Hāshimite house through his great-grandfather al-ʿAbbās
      ibn ʿAbd al-Muṭṭalib (uncle of the Prophet ﷺ), was given
      the *bayʿa* as the first Abbasid caliph in the central
      mosque of Kūfa, where he was concealed at the house of
      Abū Salama al-Khallāl. The acclamation followed the
      Khurāsānī revolt led by Abū Muslim al-Khurāsānī under the
      black banners of the Hāshimite *daʿwa* and the
      consecutive defeats of Marwān II's commanders at Nihāwand
      and the Greater Zāb that were still to come. Al-Saffāḥ
      delivered his accession sermon at Kūfa with his uncle
      Dāwūd ibn ʿAlī following him on the *minbar* — the speech
      that gave the dynasty's first programme is preserved in
      al-Ṭabarī. The transfer from the Sufyānid-Marwānid
      Umayyad caliphate of Damascus to the Abbasid caliphate
      of Iraq was the fundamental political shift of early
      Islamic history. al-Ṭabarī, Ibn al-Athīr, and Ibn Kathīr
      all date the *bayʿa* to Rabīʿ II 132 AH at Kūfa.
    description_ar: |
      بويع أبو العباس عبد الله بن محمد السفّاح — من البيت
      الهاشمي عبر جدّه الأكبر العباس بن عبد المطلب عمّ النبي
      ﷺ — بالخلافة في المسجد الجامع بالكوفة، أولَ خلفاء بني
      العباس، وكان قبل البيعة مختفياً في دار أبي سلَمة الخلّال.
      جاءت البيعة في إثر ثورة الخراسانية بقيادة أبي مسلم
      الخراساني تحت الرايات السود لدعوة الهاشميين، وقد سبقت
      هزائم قوّاد مروان الثاني المتتالية بنهاوند وبالزاب
      الأكبر التي ستأتي بعد. وألقى السفّاح خطبة البيعة بالكوفة
      وعمُّه داود بن علي على المنبر إلى جنبه — وهي الخطبة
      التي تضمّنت أول برنامج للدولة الجديدة، وقد حُفظت في
      «تاريخ الطبري». وانتقال الخلافة من بني أمية بدمشق إلى
      بني العباس بالعراق كان التحوّل السياسي الجوهري في صدر
      تاريخ الإسلام. وأرّخ الطبري وابن الأثير وابن كثير البيعة
      بشهر ربيع الآخر سنة ١٣٢ هـ بالكوفة.
    description_fr: |
      Abū al-ʿAbbās ʿAbd Allāh ibn Muḥammad al-Saffāḥ, de la
      maison hāshimite par son arrière-grand-père al-ʿAbbās
      ibn ʿAbd al-Muṭṭalib (oncle du Prophète ﷺ), reçut la
      *bayʿa* comme premier calife abbasside dans la grande
      mosquée de Kūfa, où il était dissimulé chez Abū Salama
      al-Khallāl. L'acclamation suivait la révolte khurāsānienne
      menée par Abū Muslim al-Khurāsānī sous les bannières
      noires de la *daʿwa* hāshimite, et précédait les défaites
      successives des commandants de Marwān II à Nihāwand et
      au Grand Zāb encore à venir. al-Saffāḥ prononça son
      sermon d'investiture à Kūfa, son oncle Dāwūd ibn ʿAlī
      lui succédant sur le *minbar* — discours préservé dans
      al-Ṭabarī, qui donna le premier programme de la dynastie.
      Le transfert du califat omeyyade sufyānide-marwānide de
      Damas au califat abbasside d'Irak fut le bouleversement
      politique fondamental du premier siècle de l'islam.
      al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr datent tous la
      *bayʿa* à Rabīʿ II 132 H, à Kūfa.
    canonical_hijri: {year: 132, month: 4, day: 12, precision: day}
    canonical_gregorian: {date: 749-11-28, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives a long narrative of the bayʿa to al-Saffāḥ at Kūfa in Rabīʿ II 132 AH and preserves the text of his accession sermon."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil dates the bayʿa to Rabīʿ II 132 AH and confirms Abū Salama al-Khallāl's role."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya places the bayʿa in 132 AH at Kūfa as the founding act of the Abbasid caliphate."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ opens the Abbasid section with al-Saffāḥ's bayʿa in 132 AH."
    people: [[al-saffah, leader]]
