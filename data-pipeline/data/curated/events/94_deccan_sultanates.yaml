  - slug: death-of-ahmad-shah-i-wali-bahmani
    category: ruler_death
    title_en: Death of Aḥmad Shāh I Walī Bahmanī — Mover of the Capital to Bīdar
    title_ar: وفاة أحمد شاه الأول الولي البهمني — ناقل العاصمة إلى بيدر
    title_fr: Mort d'Aḥmad Shāh I Walī Bahmanī — qui transféra la capitale à Bīdar
    description_en: |
      Aḥmad Shāh I "Walī" Bahmanī — ninth sultan of the Bahmanī
      line, remembered with the honorific *al-Walī* ("the
      friend of God") for his patronage of Sufi shaykhs and
      scholarship — died at Bīdar in 839 AH (1436 CE) after a
      fourteen-year reign. He had moved the dynastic capital
      from Aḥsanābād-Gulbarga to Muḥammadābād-Bīdar around
      829 AH (1426 CE), commissioned the great Bīdar fort and
      its mosques, and brought to his court the Persian Sufi
      master Sayyid Muḥammad Gēsū Darāz of the Chishtī order
      (whom he settled at Gulbarga). The classical Indo-Persian
      chronicles fix the year of his death (839 AH); some
      modern reconstructions give 28 Shaʿbān 839 AH but EI2
      treats this as approximate. He was succeeded by his son
      ʿAlāʾ al-Dīn Aḥmad Shāh II, under whom the Bahmanī
      court reached the apogee of its Persianate cultural
      patronage.
    description_ar: |
      توفي أحمد شاه الأول البهمني الملقب بـ«الولي» — تاسع سلاطين
      البيت البهمني، اشتُهر بلقب «الولي» تكريماً لرعايته شيوخ
      الصوفية والعلماء — في «بيدر» سنة ٨٣٩ هـ (الموافق ١٤٣٦
      ميلادي) بعد حكم دام أربع عشرة سنة. وكان قد نقل عاصمة
      الدولة من «أحسن آباد كلبركه» إلى «محمدآباد بيدر» نحو
      سنة ٨٢٩ هـ (١٤٢٦ ميلادي)، وعمر قلعة بيدر الكبرى ومساجدها،
      واستقدم إلى بلاطه شيخ الطريقة الجشتية الفارسي السيد
      محمد گيسو دراز فأسكنه كلبركه. والمصادر الهندية الفارسية
      الكلاسيكية تثبت سنة وفاته (٨٣٩ هـ)؛ وبعض التحقيقات
      الحديثة يحدد التاريخ في ٢٨ شعبان من السنة لكن دائرة
      المعارف الإسلامية تعدّه تقريباً. وخلفه ابنه علاء الدين
      أحمد شاه الثاني، وفي عهده بلغت الرعاية الفارسية البهمنية
      للثقافة قمتها.
    description_fr: |
      Aḥmad Shāh I « Walī » Bahmanī — neuvième sultan de la
      lignée bahmanide, célébré avec l'honorifique *al-Walī*
      (« l'ami de Dieu ») pour son patronage des shaykhs
      soufis et de l'érudition — mourut à Bīdar en 839 H
      (1436 EC) après un règne de quatorze ans. Il avait
      transféré la capitale dynastique d'Aḥsanābād-Gulbarga
      à Muḥammadābād-Bīdar vers 829 H (1426 EC), commandé la
      grande forteresse de Bīdar et ses mosquées, et amené à
      sa cour le maître soufi persan Sayyid Muḥammad Gēsū
      Darāz, de l'ordre chishtī (qu'il établit à Gulbarga).
      Les chroniques indo-persanes classiques fixent l'année
      de sa mort (839 H); certaines reconstructions modernes
      donnent le 28 Shaʿbān 839 H mais l'EI2 considère cela
      comme approximatif. Lui succéda son fils ʿAlāʾ al-Dīn
      Aḥmad Shāh II, sous le règne duquel la cour bahmanide
      atteignit l'apogée de son patronage culturel persan.
