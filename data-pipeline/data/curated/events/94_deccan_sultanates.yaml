# Wave 23 of curated event additions (2026-04-27).
# The Deccan sultanates of South India — Bahmanī (Sunni, 1347-1518), Bijapur
# ʿĀdil Shāhī (initially Sunni under Yūsuf ʿĀdil, Twelver from Ibrāhīm I in
# the 1530s, oscillating thereafter), Golconda Quṭb Shāhī (Twelver throughout
# from late-Bahmani succession in 1496), and the Mughal absorption of the
# two surviving sultanates by Aurangzeb in 1097-1098 AH. Twelve dated events:
# (i) the founding and consolidation of the Bahmanī Sultanate by ʿAlāʾ al-Dīn
# Bahman Shāh and his son Aḥmad Shāh I Walī; (ii) the career of the great
# Bahmani vizier-scholar Maḥmūd Gāwān, executed in 886 AH and remembered
# through his madrasa at Bīdar still standing today; (iii) the founding of
# the ʿĀdil Shāhī and Quṭb Shāhī succession states from the Bahmani
# fragmentation, and the death of Yūsuf ʿĀdil Shāh; (iv) the Battle of
# Talikota in 972 AH, the joint Deccan-sultans victory over Vijayanagara
# that reshaped the politics of South India for a century; (v) the death of
# Muḥammad Qulī Quṭb Shāh, founder of Hyderabad in 1591 CE; (vi) the death
# of Ibrāhīm ʿĀdil Shāh II, builder of the Ibrāhīm Rauẓa at Bijapur and
# patron of the great Sunni Deccan-Persian scholarly culture his court
# preserved; (vii) Aurangzeb's annexation of Bijapur (1097 AH) and Golconda
# (1098 AH) — the two campaigns that destroyed the last Deccan sultanates
# and bound the Mughal empire to the Deccan permanently.
#
# Editorial note (per project EDITORIAL.md rule 8): the Quṭb Shāhīs were
# Twelver Shia from their founding; the ʿĀdil Shāhīs oscillated between
# Sunni (Yūsuf, Ismāʿīl) and Twelver (Ibrāhīm I, ʿAlī I, Ibrāhīm II's late
# reign) tendencies depending on the ruler. Their inclusion here is strictly
# factual and political-historical — the dataset does not endorse the Twelver
# imāmate doctrine and does not include their fiqh/aqida/doctrinal works as
# canonical references. They appear as rulers in shared political-historical
# events (founding states, battles, Mughal absorption) on the same footing
# as the Sunni-Hanafi Bahmanīs and the Sunni-Hanafi Mughals who absorbed
# them. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # BAHMANĪ SULTANATE — FOUNDING AND CONSOLIDATION
  # =========================================================================

  - slug: founding-of-bahmani-sultanate
    category: dynastic_founding
    title_en: Founding of the Bahmanī Sultanate by ʿAlāʾ al-Dīn Bahman Shāh
    title_ar: قيام دولة البهمنية على يد علاء الدين بهمن شاه
    title_fr: Fondation du sultanat bahmanide par ʿAlāʾ al-Dīn Bahman Shāh
    description_en: |
      ʿAlāʾ al-Dīn Ḥasan Bahman Shāh — Turkic-Persian Muslim
      commander in the Deccan service of the Tughluq emperor
      Muḥammad ibn Tughluq of Delhi — broke with the Tughluq
      throne after the collapse of Muḥammad's relocation of the
      Delhi capital to Daulatabad and the consequent unrest of
      the Deccan amīrs. Acclaimed at Daulatabad by the rebel
      *amīrān-i ṣadah* (the "amīrs of the hundred", the regional
      Tughluq garrison commanders), he was crowned at the
      Bahmani capital of Aḥsanābād-Gulbarga on 24 Rabīʿ al-Thānī
      748 AH (3 August 1347 CE) and took the regnal name
      Bahman Shāh. The new Sunni-Hanafi sultanate he founded —
      claiming descent from the legendary Persian king Bahman —
      governed central and eastern Deccan from Gulbarga (later
      Bīdar) for the next 170 years, projecting Persianate
      court culture, Sunni jurisprudence, and Indo-Persian
      poetry across the south of the subcontinent. Its
      eventual fragmentation in the early sixteenth century
      gave rise to the five Deccan succession sultanates
      (Bijapur, Golconda, Ahmadnagar, Berar, Bīdar).
    description_ar: |
      انشقّ علاء الدين حسن بهمن شاه — القائد التركي الفارسي
      المسلم في خدمة السلطان التغلقي محمد بن تغلق صاحب دلهي،
      وكان والياً في الدكن — على عرش التغلقيين بعد انهيار
      تجربة محمد بن تغلق في نقل العاصمة من دلهي إلى دولت آباد
      وما تبعه من اضطراب أمراء الدكن. وبايعه «أمراء الصدة»
      (أمراء المئة، قادة حاميات التغلقيين الإقليمية المتمردون)
      في دولت آباد، فتُوّج في عاصمة الدولة البهمنية «أحسن
      آباد كلبركه» يوم ٢٤ ربيع الآخر سنة ٧٤٨ هـ (الموافق
      ٣ أوت ١٣٤٧ ميلادي)، واتخذ لقبه الملكي «بهمن شاه». وحكمت
      الدولة البهمنية الجديدة — وهي دولة سنية حنفية تنتسب إلى
      الملك الفارسي القديم بهمن — وسط الدكن وشرقها من كلبركه
      ثم من بيدر مدة قرابة مئة وسبعين سنة، ونشرت في جنوب شبه
      القارة الهندية ثقافة البلاط الفارسية والفقه السني الحنفي
      والشعر الهندي الفارسي. وعند تفككها في أوائل القرن السادس
      عشر الميلادي قامت على أنقاضها دول الدكن الخمس الخلف
      (بيجاپور، گولكندة، أحمدنغر، برار، بيدر).
    description_fr: |
      ʿAlāʾ al-Dīn Ḥasan Bahman Shāh — commandant musulman
      turco-persan au service du sultan tughluq de Delhi
      Muḥammad ibn Tughluq dans le Deccan — rompit avec le
      trône tughluq après l'effondrement de la translation par
      Muḥammad de la capitale de Delhi à Daulatabad et l'agitation
      qui s'ensuivit chez les *amīrs* du Deccan. Acclamé à
      Daulatabad par les *amīrān-i ṣadah* (« émirs des cent »,
      commandants rebelles des garnisons régionales tughluqes),
      il fut couronné dans la capitale bahmanide
      d'Aḥsanābād-Gulbarga le 24 Rabīʿ al-Thānī 748 H (3 août
      1347 EC) et prit le nom de règne Bahman Shāh. Le nouveau
      sultanat sunnite-hanafite qu'il fonda — revendiquant la
      descendance du roi perse légendaire Bahman — gouverna le
      centre et l'est du Deccan depuis Gulbarga (plus tard
      Bīdar) pendant les 170 années suivantes, projetant la
      culture de cour persane, la jurisprudence sunnite et la
      poésie indo-persane à travers le sud du sous-continent.
      Sa fragmentation au début du XVIe siècle donna naissance
      aux cinq sultanats successeurs du Deccan (Bijapur,
      Golconde, Ahmadnagar, Berar, Bīdar).
