  - slug: death-of-yusuf-adil-shah
    category: ruler_death
    title_en: Death of Yūsuf ʿĀdil Shāh — Founder of the Bijapur Sultanate
    title_ar: وفاة يوسف العادل شاه — مؤسس دولة بيجاپور
    title_fr: Mort de Yūsuf ʿĀdil Shāh — fondateur du sultanat de Bijapur
    description_en: |
      Yūsuf ʿĀdil Shāh — founder of the Bijapur ʿĀdil Shāhī
      sultanate and patron of Persian-Indo court culture in
      the western Deccan — died at Bijapur in 916 AH (1510 CE)
      after a twenty-year reign. His final years were
      dominated by the wars against Vijayanagara and the
      first contact with the Portuguese, who had taken Goa
      from his governor in 915 AH (1510 CE) shortly before
      his death. He left a young son Ismāʿīl ʿĀdil Shāh
      under the regency of Kamāl Khān, a transition that
      precipitated the early-sixteenth-century factional
      contests at Bijapur. The classical Indo-Persian
      chronicles (Firishta in particular) preserve the year
      of his death (916 AH) and the political context but
      not a fixed day. The two Sunni-leaning ʿĀdil Shāhī
      generations — Yūsuf and Ismāʿīl — gave way under
      Ibrāhīm I (r. 941-965 AH) to a court that adopted
      Twelver Shia ritual; the dynasty oscillated thereafter
      depending on the ruler.
    description_ar: |
      توفي يوسف العادل شاه — مؤسس دولة بيجاپور العادلية
      وراعي الثقافة الهندية الفارسية في الدكن الغربي — ببيجاپور
      سنة ٩١٦ هـ (الموافق ١٥١٠ ميلادي) بعد حكم دام عشرين سنة.
      وغلب على سنواته الأخيرة حروب فيجاينگر وأول احتكاك
      بالبرتغاليين الذين كانوا قد انتزعوا «گوا» من واليه قبيل
      وفاته بقليل سنة ٩١٥ هـ (الموافق ١٥١٠ ميلادي). وترك
      ابناً صغيراً هو إسماعيل العادل شاه تحت وصاية كمال خان،
      فأشعل ذلك التحوّل الفتنَ الحزبية في بيجاپور في أوائل
      القرن السادس عشر. والمصادر الهندية الفارسية الكلاسيكية
      (فرشته على الخصوص) تثبت سنة وفاته (٩١٦ هـ) والسياق
      السياسي ولا تثبت اليوم. وانتهى عهد الجيلين الأولين
      السنيي الميل من العادل شاهيين — يوسف وإسماعيل — إلى
      عهد إبراهيم الأول (٩٤١-٩٦٥ هـ) الذي تبنى بلاطه طقوس
      الإمامية الإثنا عشرية، وتذبذبت الدولة بعد ذلك بحسب
      السلطان.
    description_fr: |
      Yūsuf ʿĀdil Shāh — fondateur du sultanat ʿādilshāhide
      de Bijapur et patron de la culture de cour
      indo-persane dans le Deccan occidental — mourut à
      Bijapur en 916 H (1510 EC) après un règne de vingt
      ans. Ses dernières années furent dominées par les
      guerres contre Vijayanagara et le premier contact avec
      les Portugais, qui avaient pris Goa à son gouverneur
      en 915 H (1510 EC) peu avant sa mort. Il laissa un
      jeune fils Ismāʿīl ʿĀdil Shāh sous la régence de Kamāl
      Khān, transition qui précipita les contestations
      factionnelles du début du XVIe siècle à Bijapur. Les
      chroniques indo-persanes classiques (Firishta en
      particulier) conservent l'année de sa mort (916 H) et
      le contexte politique, mais pas un jour fixé. Les deux
      générations ʿādilshāhides à tendance sunnite — Yūsuf
      et Ismāʿīl — cédèrent sous Ibrāhīm I (r. 941-965 H)
      à une cour qui adopta le rituel chiite duodécimain;
      la dynastie oscilla ensuite selon le souverain.
    canonical_hijri: {year: 916, precision: year}
    canonical_gregorian: {date: 1510-01-01, precision: year, method: tabular_conversion}
