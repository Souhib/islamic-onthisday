  - slug: death-of-ibrahim-adil-shah-ii
    category: ruler_death
    title_en: Death of Ibrāhīm ʿĀdil Shāh II — Builder of the Ibrāhīm Rauẓa
    title_ar: وفاة إبراهيم العادل شاه الثاني — باني روضة إبراهيم ببيجاپور
    title_fr: Mort d'Ibrāhīm ʿĀdil Shāh II — bâtisseur de l'Ibrāhīm Rauẓa
    description_en: |
      Ibrāhīm ʿĀdil Shāh II — sixth sultan of the Bijapur
      ʿĀdil Shāhī line, patron of the great phase of Deccan
      architecture and Indo-Persian-Marathi-Sanskrit musical
      culture, and author of the bilingual Persian-Marathi
      song-book *Kitāb-i Nawras* — died at Bijapur in
      1037 AH (1627 CE) after a forty-eight-year reign,
      one of the longest of any Deccan sultan. His Bijapur
      court was unusually plural — Sunni, Twelver Shia,
      Hindu, and Christian (Portuguese Jesuit) figures
      alike served at his palace and on his diplomatic
      missions — and his major monument, the Ibrāhīm Rauẓa
      mausoleum complex, remains one of the great surviving
      monuments of ʿĀdil Shāhī architecture. He was
      succeeded by his son Muḥammad ʿĀdil Shāh, who would
      build the colossal Gol Gumbaz mausoleum at Bijapur.
      The Indo-Persian chronicles (Firishta especially)
      preserve the year of his death (1037 AH); the
      classical sources are not day-precise, and we follow
      EI2 in giving the year only.
    description_ar: |
      توفي إبراهيم العادل شاه الثاني — سادس سلاطين بيت
      العادل شاهيين ببيجاپور، راعي الطور الأكبر للعمارة
      الدكنية وثقافة الموسيقى الهندية الفارسية المراثية
      السنسكريتية، ومؤلف مجموعة الأغاني الفارسية المراثية
      «كتاب نَوْرَس» — ببيجاپور سنة ١٠٣٧ هـ (الموافق ١٦٢٧
      ميلادي) بعد حكم دام ثمان وأربعين سنة، وهو من أطول
      سلاطين الدكن حكماً. وكان بلاط بيجاپور في عهده استثنائياً
      في تنوّعه — يخدمه السنة والإمامية والهندوس والنصارى من
      اليسوعيين البرتغاليين على السواء في القصر وفي بعثاته
      الدبلوماسية — وأكبر آثاره ضريحه المعروف بـ«روضة
      إبراهيم»، ومن أكبر ما بقي من العمارة العادل شاهية. وخلفه
      على الملك ابنه محمد العادل شاه، باني ضريح «گول گُمْبَذ»
      الضخم ببيجاپور. والمصادر الهندية الفارسية الكلاسيكية
      (فرشته على الخصوص) تثبت سنة وفاته (١٠٣٧ هـ)؛ ولا
      تحدد المصادر الكلاسيكية اليوم بدقة، فاكتفينا تبعاً
      لدائرة المعارف الإسلامية بالسنة وحدها.
    description_fr: |
      Ibrāhīm ʿĀdil Shāh II — sixième sultan de la lignée
      ʿādilshāhide de Bijapur, patron de la grande phase de
      l'architecture deccanide et de la culture musicale
      indo-perso-marathi-sanskrite, et auteur du recueil de
      chants bilingue persan-marathi *Kitāb-i Nawras* —
      mourut à Bijapur en 1037 H (1627 EC) après un règne
      de quarante-huit ans, l'un des plus longs de tous les
      sultans du Deccan. Sa cour de Bijapur était d'une
      pluralité inhabituelle — Sunnites, chiites
      duodécimains, Hindous et Chrétiens (jésuites
      portugais) servirent dans son palais et dans ses
      missions diplomatiques — et son monument majeur, le
      complexe funéraire de l'Ibrāhīm Rauẓa, demeure l'un
      des grands monuments survivants de l'architecture
      ʿādilshāhide. Lui succéda son fils Muḥammad ʿĀdil
      Shāh, bâtisseur du colossal mausolée Gol Gumbaz à
      Bijapur. Les chroniques indo-persanes (Firishta en
      particulier) conservent l'année de sa mort (1037 H);
      les sources classiques ne sont pas précises au jour,
      et nous suivons l'EI2 en ne donnant que l'année.
    canonical_hijri: {year: 1037, precision: year}
    canonical_gregorian: {date: 1627-01-01, precision: year, method: tabular_conversion}
