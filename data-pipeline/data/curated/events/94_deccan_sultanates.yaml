  # =========================================================================
  # ʿĀDIL SHĀHĪ AND QUṬB SHĀHĪ — FOUNDING SUCCESSION SULTANATES
  # =========================================================================

  - slug: founding-of-bijapur-adil-shahi
    category: dynastic_founding
    title_en: Founding of the Bijapur ʿĀdil Shāhī Sultanate by Yūsuf ʿĀdil Shāh
    title_ar: قيام دولة بيجاپور العادلية على يد يوسف العادل شاه
    title_fr: Fondation du sultanat ʿādilshāhide de Bijapur par Yūsuf ʿĀdil Shāh
    description_en: |
      Yūsuf ʿĀdil Khān — Persian-origin Bahmanī provincial
      governor (*ṭarafdār*) of the western Bijapur province
      since the 1480s — declared independence from the
      decaying Bahmanī court at Bīdar in 895 AH (1490 CE),
      striking coin and reading the *khuṭba* in his own name
      and taking the regnal title ʿĀdil Shāh. The new
      sultanate, governed from Bijapur for the next two
      centuries, took its place alongside Ahmadnagar and
      Berar (also founded c. 895 AH from Bahmanī provinces)
      and later Golconda (901 AH) and Bīdar as the five
      Deccan succession states. Yūsuf himself was a Sunni
      and a poet in Persian and Turkish; the early ʿĀdil
      Shāhī court was Sunni-leaning, though his successors
      Ibrāhīm I and ʿAlī I would later patronise Twelver
      Shia practice in court ritual. The dynasty endured
      until Aurangzeb's annexation of Bijapur in 1097 AH
      (1686 CE).
    description_ar: |
      أعلن يوسف العادل خان — والي البهمنيين («طرفدار») على
      إقليم بيجاپور الغربي منذ ثمانينيات القرن الخامس عشر
      الميلادي وهو فارسي الأصل — استقلاله عن البلاط
      البهمني المتهاوي ببيدر سنة ٨٩٥ هـ (الموافق ١٤٩٠
      ميلادي)، فضرب السكة وقُرئت له الخطبة باسمه واتخذ
      اللقب الملكي «العادل شاه». وحكمت الدولة الجديدة من
      بيجاپور قرابة قرنين، فقامت إلى جنب أحمدنغر وبرار
      (اللتين قامتا أيضاً نحو ٨٩٥ هـ على أنقاض ولايات
      الدولة البهمنية) ثم گولكندة (٩٠١ هـ) وبيدر، فصارت
      خمسة من «دول الدكن الخلف». وكان يوسف نفسه سنياً
      وشاعراً بالفارسية والتركية؛ وكان البلاط العادلشاهي
      الأول ميّالاً إلى أهل السنة، وإن رعى من خلفه
      إبراهيم الأول وعلي الأول الشعائر الإمامية الإثنا
      عشرية في طقوس البلاط. وبقيت الدولة قائمة إلى أن
      ضمّها أورنكزيب سنة ١٠٩٧ هـ (١٦٨٦ ميلادي).
    description_fr: |
      Yūsuf ʿĀdil Khān — gouverneur provincial bahmanide
      (*ṭarafdār*) de la province occidentale de Bijapur
      depuis les années 1480, d'origine persane — déclara
      son indépendance de la cour bahmanide déclinante de
      Bīdar en 895 H (1490 EC), frappa monnaie et fit lire
      la *khuṭba* en son nom, prenant le titre régalien de
      ʿĀdil Shāh. Le nouveau sultanat, gouverné depuis
      Bijapur pendant les deux siècles suivants, prit place
      aux côtés d'Ahmadnagar et de Berar (également fondés
      vers 895 H sur des provinces bahmanides) puis de
      Golconde (901 H) et de Bīdar comme cinq États
      successeurs du Deccan. Yūsuf lui-même était sunnite
      et poète en persan et en turc; la cour ʿādilshāhide
      primitive penchait sunnite, bien que ses successeurs
      Ibrāhīm I et ʿAlī I patroneraient plus tard la
      pratique chiite duodécimaine dans le rituel de cour.
      La dynastie subsista jusqu'à l'annexion de Bijapur
      par Aurangzeb en 1097 H (1686 EC).
    canonical_hijri: {year: 895, precision: year}
