  - slug: founding-of-golconda-qutb-shahi
    category: dynastic_founding
    title_en: Founding of the Golconda Quṭb Shāhī Sultanate by Sulṭān Qulī
    title_ar: قيام دولة گولكندة القطب الشاهية على يد سلطان قلي
    title_fr: Fondation du sultanat quṭbshāhide de Golconde par Sulṭān Qulī
    description_en: |
      Sulṭān Qulī Quṭb-ul-Mulk — Bahmanī provincial governor
      (*ṭarafdār*) of Tilingānā with seat at Golconda fortress
      since 901 AH (1496 CE), and a Turkmen Qara Qoyunlu émigré
      from Hamadan in Persia — declared the formal independence
      of his Tilingānā governorate from the Bahmanī court of
      Bīdar in 901 AH (1496 CE), founding the Quṭb Shāhī line
      that would govern the eastern Deccan for the next 191
      years. The new sultanate took the dramatic Golconda
      fortress as its capital and later (after 1591 CE) the
      newly-built city of Hyderabad. The Quṭb Shāhīs were
      Twelver Shia from their founding and remained so —
      the dataset notes this strictly factually, framing
      their state as a political-historical Deccan sultanate
      among others without endorsing the Twelver imāmate
      doctrine. The dynasty endured until Aurangzeb's
      annexation of Golconda in 1098 AH (1687 CE).
    description_ar: |
      أعلن سلطان قلي قطب الملك — والي البهمنيين («طرفدار»)
      على إقليم تلنگانا والمعتصم بقلعة گولكندة منذ سنة
      ٩٠١ هـ (الموافق ١٤٩٦ ميلادي)، وهو تركماني من قراقويونلو
      مهاجر من همذان في فارس — استقلاله الرسمي عن البلاط
      البهمني ببيدر سنة ٩٠١ هـ (الموافق ١٤٩٦ ميلادي)،
      فأسس البيت القطب شاهي الذي حكم شرق الدكن مئة وإحدى
      وتسعين سنة. واتخذت الدولة الجديدة قلعة گولكندة الفخمة
      عاصمةً لها، ثم (بعد ١٥٩١ ميلادي) المدينةَ الحديثةَ
      التأسيس حيدرآباد. وكان القطب شاهيون اثني عشريين منذ
      التأسيس وحتى السقوط — وتُسجِّل هذه الموسوعة ذلك
      تاريخياً صرفاً، إذ يُؤطَّر بيتهم على أنه دولة دكنية
      سياسية تاريخية كباقي دول الدكن من غير إقرار للعقيدة
      الإمامية في إمامة الأئمة. وبقيت الدولة قائمة إلى أن
      ضمّها أورنكزيب سنة ١٠٩٨ هـ (١٦٨٧ ميلادي).
    description_fr: |
      Sulṭān Qulī Quṭb-ul-Mulk — gouverneur provincial
      bahmanide (*ṭarafdār*) du Tilingānā depuis le fort de
      Golconde à partir de 901 H (1496 EC), Turkmène
      Qara Qoyunlu émigré de Hamadān en Perse — déclara
      l'indépendance formelle de son gouvernorat du
      Tilingānā de la cour bahmanide de Bīdar en 901 H
      (1496 EC), fondant la lignée quṭbshāhide qui
      gouvernerait le Deccan oriental pendant les 191 années
      suivantes. Le nouveau sultanat prit la forteresse
      spectaculaire de Golconde comme capitale, puis (après
      1591 EC) la ville nouvellement édifiée d'Hyderabad.
      Les Quṭb Shāhī étaient chiites duodécimains depuis
      leur fondation et le restèrent — la base de données
      le note de manière strictement factuelle, encadrant
      leur État comme un sultanat deccanien
      politico-historique parmi d'autres sans endosser la
      doctrine de l'imāmat duodécimain. La dynastie subsista
      jusqu'à l'annexion de Golconde par Aurangzeb en 1098 H
      (1687 EC).
