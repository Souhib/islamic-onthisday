  # =========================================================================
  # BAHMANĪ SULTANATE — VIZIER-SCHOLAR
  # =========================================================================

  - slug: execution-of-mahmud-gawan
    category: scholar
    title_en: Execution of Maḥmūd Gāwān — Bahmanī Vizier-Scholar of Bīdar
    title_ar: مقتل محمود گاوان — وزير الدولة البهمنية وعالمها ببيدر
    title_fr: Exécution de Maḥmūd Gāwān — vizir-savant bahmanide de Bīdar
    description_en: |
      Khwāja ʿImād al-Dīn Maḥmūd Gāwān al-Gīlānī — Persian
      Sunni-Shāfiʿī merchant, scholar of Arabic and Islamic
      sciences, vizier (*malik al-tujjār* and later
      *wakīl al-salṭanat*) of the Bahmanī sultans Humāyūn,
      Niẓām Shāh, and Muḥammad Shāh III for nearly forty
      years — was executed at Bīdar on 5 Ṣafar 886 AH
      (5 April 1481 CE) at the age of 78. He had stabilised
      the sultanate's finances, codified its provincial
      administration into eight subdivided *ṭarafs*,
      conducted Bahmanī campaigns against Vijayanagara and
      the Konkan, and corresponded with Sunni scholars of
      Cairo, Mecca, Khurasan, and Anatolia. He founded the
      *Madrasa-i Maḥmūd Gāwān* at Bīdar (878 AH / 1473 CE) —
      a monumental Persianate three-storey madrasa whose
      surviving partial structure remains one of the great
      monuments of Bahmanī architecture. Falsely accused of
      treason via a forged letter to Vijayanagara by Deccan
      court rivals, he was put to death by the young
      Sultan Muḥammad Shāh III; the sultan reportedly
      regretted the execution within weeks. His murder
      precipitated the dynastic fragmentation that would
      give rise to the five succession sultanates.
    description_ar: |
      قُتل خواجه عماد الدين محمود گاوان الجيلاني — التاجر
      السني الشافعي الفارسي، عالم العربية والعلوم الإسلامية،
      وزير الدولة البهمنية في عهد سلاطينها همايون ونظام شاه
      ومحمد شاه الثالث («ملك التجار» ثم «وكيل السلطنة»)
      قرابة أربعين سنة — في «بيدر» يوم ٥ صفر سنة ٨٨٦ هـ
      (الموافق ٥ أفريل ١٤٨١ ميلادي) عن ثمان وسبعين سنة. وكان
      قد أحكم إدارة الخزينة، وقعّد الإدارة الإقليمية على
      ثمانية أطراف، وقاد حملات البهمنيين على فيجاينگر وساحل
      الكنكن، وراسل علماء أهل السنة في القاهرة ومكة
      وخراسان والأناضول. وأسس «مدرسة محمود گاوان» في بيدر
      سنة ٨٧٨ هـ (الموافق ١٤٧٣ ميلادي)، وهي صرح فارسي ضخم
      من ثلاث طبقات، وما تبقى منها إلى اليوم من أكبر آثار
      العمارة البهمنية. واتُّهم زوراً بالخيانة عن طريق رسالة
      مزوّرة إلى فيجاينگر دبّرها له خصومه في البلاط، فأمر
      السلطان محمد شاه الثالث الفتى بقتله؛ ويُقال إن السلطان
      ندم على الفعلة بعد أسابيع. ومقتله عجّل بتفكك الدولة
      الذي ستقوم على أنقاضه دول الدكن الخمس.
    description_fr: |
      Khwāja ʿImād al-Dīn Maḥmūd Gāwān al-Gīlānī —
      marchand sunnite-shāfiʿite persan, savant en arabe
      et en sciences islamiques, vizir (*malik al-tujjār*
      puis *wakīl al-salṭanat*) des sultans bahmanides
      Humāyūn, Niẓām Shāh et Muḥammad Shāh III pendant
      près de quarante ans — fut exécuté à Bīdar le 5
      Ṣafar 886 H (5 avril 1481 EC) à l'âge de 78 ans. Il
      avait stabilisé les finances du sultanat, codifié
      son administration provinciale en huit *ṭarafs*
      subdivisés, conduit les campagnes bahmanides contre
      Vijayanagara et le Konkan, et entretenu une
      correspondance avec les savants sunnites du Caire,
      de La Mecque, du Khurāsān et de l'Anatolie. Il
      fonda la *Madrasa-i Maḥmūd Gāwān* à Bīdar (878 H /
      1473 EC), monumentale madrasa persane à trois étages
      dont la structure partielle subsistante demeure l'un
      des grands monuments de l'architecture bahmanide.
      Faussement accusé de trahison par une lettre forgée
      à Vijayanagara par des rivaux de cour, il fut mis
      à mort par le jeune sultan Muḥammad Shāh III; le
      sultan aurait regretté l'exécution en quelques
      semaines. Son meurtre précipita la fragmentation
      dynastique qui donnerait naissance aux cinq
      sultanats successeurs.
    canonical_hijri: {year: 886, month: 2, day: 5, precision: day}
    canonical_gregorian: {date: 1481-04-05, precision: day, method: attested}
