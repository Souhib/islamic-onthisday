  # =========================================================================
  # MUGHAL ANNEXATION — END OF THE DECCAN SULTANATES
  # =========================================================================

  - slug: mughal-annexation-of-bijapur
    category: conquest
    title_en: Mughal Annexation of Bijapur by Aurangzeb
    title_ar: ضمّ المغول لبيجاپور في عهد أورنكزيب
    title_fr: Annexion de Bijapur par Aurangzeb
    description_en: |
      The Mughal emperor Aurangzeb ʿĀlamgīr — campaigning
      personally in the Deccan since 1090 AH (1681 CE) — laid
      siege to the Bijapur citadel from Muḥarram 1097 AH
      (December 1685 CE) and forced its surrender on
      27 Dhū al-Qaʿda 1097 AH (12 September 1686 CE) after
      eight months of investment. The last sultan, Sikandar
      ʿĀdil Shāh, was taken prisoner and removed to Daulatabad
      where he would die in 1112 AH (1700 CE), and the
      sultanate of Bijapur was annexed to the Mughal empire
      after 197 years of independent existence (895-1097 AH /
      1490-1686 CE). The annexation removed the western
      Deccan as an organised political entity, brought the
      ʿĀdil Shāhī territories formally under Mughal
      administration, and freed Aurangzeb to turn his entire
      Deccan force against Quṭb Shāhī Golconda the following
      year. The conquest, alongside the Golconda campaign,
      marks the territorial maximum of the Mughal empire
      but also the beginning of the long Mughal-Maratha war
      that would consume Aurangzeb's last twenty years.
    description_ar: |
      ضرب الإمبراطور المغولي أورنكزيب عالمگير — وكان قد نزل
      شخصياً في الدكن منذ سنة ١٠٩٠ هـ (الموافق ١٦٨١ ميلادي) —
      الحصار على قلعة بيجاپور من محرم سنة ١٠٩٧ هـ (الموافق
      ديسمبر ١٦٨٥ ميلادي)، ثم اضطر السلطان آخر العادل
      شاهيين سكندر شاه إلى الاستسلام في ٢٧ ذي القعدة سنة
      ١٠٩٧ هـ (الموافق ١٢ سبتمبر ١٦٨٦ ميلادي) بعد ثمانية
      أشهر من الحصار. وأُسر السلطان وسيق إلى دولت آباد، فمات
      هناك سنة ١١١٢ هـ (الموافق ١٧٠٠ ميلادي)، وضُمّت دولة
      بيجاپور إلى الإمبراطورية المغولية بعد ١٩٧ سنة من
      الاستقلال (٨٩٥-١٠٩٧ هـ، الموافق ١٤٩٠-١٦٨٦ ميلادي).
      وأسقط ضمُّها الدكنَ الغربيَّ كياناً سياسياً منظماً، ووضع
      ولاية العادل شاهيين رسمياً تحت الإدارة المغولية، وفرّغ
      أورنكزيب جيشه الدكني كله للزحف على گولكندة القطب شاهية
      في السنة التالية. والفتح إلى جنب حملة گولكندة يمثّل
      أقصى اتساع للإمبراطورية المغولية، لكنه يمثّل أيضاً
      بداية الحرب المغولية المراثية الطويلة التي ستستهلك آخر
      عشرين سنة من حكم أورنكزيب.
    description_fr: |
      L'empereur moghol Aurangzeb ʿĀlamgīr — qui menait
      personnellement campagne dans le Deccan depuis 1090 H
      (1681 EC) — assiégea la citadelle de Bijapur à partir
      de Muḥarram 1097 H (décembre 1685 EC) et força sa
      reddition le 27 Dhū al-Qaʿda 1097 H (12 septembre 1686
      EC) après huit mois d'investissement. Le dernier
      sultan, Sikandar ʿĀdil Shāh, fut fait prisonnier et
      transféré à Daulatabad où il mourrait en 1112 H
      (1700 EC), et le sultanat de Bijapur fut annexé à
      l'empire moghol après 197 ans d'existence indépendante
      (895-1097 H / 1490-1686 EC). L'annexion supprima le
      Deccan occidental en tant qu'entité politique
      organisée, plaça les territoires ʿādilshāhides
      formellement sous l'administration moghole, et libéra
      Aurangzeb pour tourner toute sa force deccanide contre
      la Golconde quṭbshāhide l'année suivante. La conquête,
      aux côtés de la campagne de Golconde, marque le
      maximum territorial de l'empire moghol mais aussi le
      début de la longue guerre mogholo-marathe qui
      consumerait les vingt dernières années d'Aurangzeb.
    canonical_hijri: {year: 1097, month: 11, day: 27, precision: day}
    canonical_gregorian: {date: 1686-09-12, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    tags: [india, deccan, mughal, bijapur, adil-shahi, aurangzeb, conquest, sikandar-adil-shah]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Siege_of_Bijapur"

  - slug: mughal-annexation-of-golconda
    category: conquest
    title_en: Mughal Annexation of Golconda by Aurangzeb
    title_ar: ضمّ المغول لگولكندة في عهد أورنكزيب
    title_fr: Annexion de Golconde par Aurangzeb
    description_en: |
      A year after Bijapur, the Mughal emperor Aurangzeb
      ʿĀlamgīr concluded his Deccan annexation programme by
      forcing the surrender of the Golconda fortress on
      21 Dhū al-Ḥijja 1098 AH (28 September 1687 CE) after
      an eight-month siege that began in Rabīʿ al-Awwal
      1098 AH (January 1687 CE). The last sultan, Abū
      al-Ḥasan Tānā Shāh — captured when an officer betrayed
      a sally-port in the citadel wall to the besiegers —
      was taken prisoner and held at Daulatabad until his
      death there in 1110 AH (1699 CE). The Quṭb Shāhī
      sultanate of Golconda, founded in 901 AH, was thus
      extinguished after 196 years of independent existence
      (901-1098 AH / 1496-1687 CE). With its annexation
      Aurangzeb formally incorporated Hyderabad and the
      eastern Deccan into the Mughal empire and reached the
      territorial maximum of Mughal rule. The Deccan
      campaigns had however cost the empire two decades of
      sustained warfare and accelerated the Maratha
      ascendancy that would dismember the Mughal state in
      the eighteenth century.
    description_ar: |
      بعد عام من فتح بيجاپور، ختم الإمبراطور المغولي أورنكزيب
      عالمگير حملته على ضمّ الدكن باضطرار قلعة گولكندة
      الكبرى إلى الاستسلام يوم ٢١ ذي الحجة سنة ١٠٩٨ هـ
      (الموافق ٢٨ سبتمبر ١٦٨٧ ميلادي) بعد حصار دام ثمانية
      أشهر بدأ في ربيع الأول سنة ١٠٩٨ هـ (الموافق جانفي
      ١٦٨٧ ميلادي). وأُسر السلطان آخر القطب شاهيين أبو الحسن
      «تَانَا شَاه» — لما خان أحد ضباطه فدلّ المحاصرين على
      ثغرة في سور القلعة — فسيق إلى دولت آباد فمات هناك
      سنة ١١١٠ هـ (الموافق ١٦٩٩ ميلادي). وانطفأت دولة
      گولكندة القطب شاهية المؤسسة سنة ٩٠١ هـ بعد ١٩٦ سنة من
      الاستقلال (٩٠١-١٠٩٨ هـ، الموافق ١٤٩٦-١٦٨٧ ميلادي).
      وأَلْحَقَ بضمّها أورنكزيب رسمياً حيدرآباد وشرق الدكن
      بالإمبراطورية المغولية، وبلغت بذلك الإمبراطورية أقصى
      اتساعها الإقليمي. على أن حملات الدكن أفقدت الدولة
      عقدين من الحرب المتواصلة، وعجّلت بصعود المراثة الذي
      سيمزق الدولة المغولية في القرن الثامن عشر.
    description_fr: |
      Un an après Bijapur, l'empereur moghol Aurangzeb
      ʿĀlamgīr conclut son programme d'annexion du Deccan
      en forçant la reddition de la forteresse de Golconde
      le 21 Dhū al-Ḥijja 1098 H (28 septembre 1687 EC)
      après un siège de huit mois entamé en Rabīʿ al-Awwal
      1098 H (janvier 1687 EC). Le dernier sultan, Abū
      al-Ḥasan Tānā Shāh — capturé lorsqu'un officier
      trahit une poterne dans la muraille de la citadelle
      en faveur des assiégeants — fut fait prisonnier et
      détenu à Daulatabad jusqu'à sa mort là-bas en 1110 H
      (1699 EC). Le sultanat quṭbshāhide de Golconde, fondé
      en 901 H, fut ainsi éteint après 196 ans d'existence
      indépendante (901-1098 H / 1496-1687 EC). Avec son
      annexion, Aurangzeb incorpora formellement Hyderabad
      et le Deccan oriental à l'empire moghol et atteignit
      le maximum territorial de la domination moghole. Les
      campagnes du Deccan avaient cependant coûté à l'empire
      deux décennies de guerre soutenue et accéléré
      l'ascension marathe qui démembrerait l'État moghol au
      XVIIIe siècle.
    canonical_hijri: {year: 1098, month: 12, day: 21, precision: day}
    canonical_gregorian: {date: 1687-09-28, precision: day, method: attested}
