  - slug: death-of-ala-al-din-bahman-shah
    category: ruler_death
    title_en: Death of ʿAlāʾ al-Dīn Bahman Shāh — Founder of the Bahmanī Sultanate
    title_ar: وفاة علاء الدين بهمن شاه — مؤسس الدولة البهمنية
    title_fr: Mort de ʿAlāʾ al-Dīn Bahman Shāh — fondateur du sultanat bahmanide
    description_en: |
      ʿAlāʾ al-Dīn Ḥasan Bahman Shāh — first sultan of the
      Bahmanī line and founder of the dynasty that would govern
      the central Deccan for nearly two centuries — died at
      Aḥsanābād-Gulbarga in 759 AH (1358 CE) after an eleven-year
      reign. He had organised the new sultanate into four
      administrative provinces (*ṭarafs*: Daulatabad, Berar,
      Bīdar, Gulbarga), each under a powerful provincial
      governor — a structure that would later prove the seed of
      the dynasty's fifteenth-century fragmentation as the
      provincial *ṭarafdārs* asserted independence. The
      classical Sunni Indo-Persian chronicles preserve the year
      of his death (759 AH) consistently; the precise day is
      not unambiguously fixed and we follow EI2 + the modern
      editions of Firishta in attesting only the year. He was
      succeeded by his son Muḥammad Shāh I, who would face
      the first major Vijayanagara wars of the dynasty.
    description_ar: |
      توفي علاء الدين حسن بهمن شاه — أول سلاطين البيت البهمني
      ومؤسس الدولة التي حكمت وسط الدكن قرابة قرنين — في عاصمته
      «أحسن آباد كلبركه» سنة ٧٥٩ هـ (الموافق ١٣٥٨ ميلادي) بعد
      حكم دام إحدى عشرة سنة. وقد قسّم دولته الجديدة على أربعة
      أقاليم إدارية («طرف»: دولت آباد، برار، بيدر، كلبركه) يلي
      كلاً منها وال قوي — وهو نظام سيظهر لاحقاً أنه بذرة تفكك
      الدولة في القرن الخامس عشر إذ ادّعى ولاة الأطراف
      («طرفداران») الاستقلال. والمصادر السنية الكلاسيكية
      الهندية الفارسية تتفق على سنة وفاته (٧٥٩ هـ) ولا يثبت
      اليوم الدقيق فيها، فاكتفينا تبعاً لدائرة المعارف الإسلامية
      وطبعات «تاريخ فرشته» الحديثة بالسنة وحدها. وخلفه على
      الملك ابنه محمد شاه الأول الذي خاض أول حروب البهمنيين
      الكبرى مع دولة فيجاينگر.
    description_fr: |
      ʿAlāʾ al-Dīn Ḥasan Bahman Shāh — premier sultan de la
      lignée bahmanide et fondateur de la dynastie qui
      gouvernerait le Deccan central pendant près de deux
      siècles — mourut à Aḥsanābād-Gulbarga en 759 H (1358 EC)
      après un règne de onze ans. Il avait organisé le nouveau
      sultanat en quatre provinces administratives (*ṭarafs* :
      Daulatabad, Berar, Bīdar, Gulbarga), chacune sous un
      puissant gouverneur provincial — une structure qui
      s'avérerait plus tard la semence de la fragmentation
      dynastique du XVe siècle, lorsque les *ṭarafdārs*
      provinciaux s'affirmèrent indépendants. Les chroniques
      indo-persanes sunnites classiques conservent l'année de
      sa mort (759 H) de manière concordante; le jour précis
      n'est pas fixé sans ambiguïté et nous suivons l'EI2 et
      les éditions modernes de Firishta en n'attestant que
      l'année. Lui succéda son fils Muḥammad Shāh I, qui
      affronterait les premières grandes guerres bahmanides
      contre Vijayanagara.
