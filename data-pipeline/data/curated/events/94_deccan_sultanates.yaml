  # =========================================================================
  # BATTLE OF TALIKOTA — JOINT DECCAN VICTORY OVER VIJAYANAGARA
  # =========================================================================

  - slug: battle-of-talikota
    category: battle
    title_en: Battle of Talikota — Deccan Sultans Defeat Vijayanagara
    title_ar: معركة طاليكوت — سلاطين الدكن يهزمون دولة فيجاينگر
    title_fr: Bataille de Talikota — les sultans du Deccan défont Vijayanagara
    description_en: |
      A confederate army of four Deccan sultanates — Bijapur
      under ʿAlī ʿĀdil Shāh I, Ahmadnagar under Ḥusayn Niẓām
      Shāh I, Golconda under Ibrāhīm Quṭb Shāh, and Bīdar
      under ʿAlī Barīd Shāh — engaged the Hindu Vijayanagara
      empire under Rāma Rāya at the field of Rakshasa-Tagdi
      (also called Talikota) on the Krishna river on
      20 Jumādā I 972 AH (23 January 1565 CE). The Deccan
      coalition's combined matchlock and artillery fire
      (provided largely by Ottoman and Portuguese-trained
      gunners) broke the Vijayanagara cavalry charge; Rāma
      Rāya was captured and killed on the field, and the
      capital city of Vijayanagara (modern Hampi) was sacked
      and abandoned. The battle ended Vijayanagara as the
      paramount power of South India, opened the Deccan
      plateau to a century of inter-sultanate competition,
      and ultimately set the conditions for Mughal expansion
      into the south under Aurangzeb a century later. Among
      classical Indo-Persian sources, Firishta gives the
      most detailed narrative; modern editions of the
      *Tārīkh-i Firishta* and the EI2 article *Tālikota*
      align on 23 January 1565 CE.
    description_ar: |
      التقى جيش متحد من أربع دول دكنية — بيجاپور بقيادة علي
      العادل شاه الأول، وأحمدنغر بقيادة حسين نظام شاه
      الأول، وگولكندة بقيادة إبراهيم قطب شاه، وبيدر بقيادة
      علي بريد شاه — مع جيش دولة فيجاينگر الهندوسية بقيادة
      «راما رايا» في ميدان «رَكْشَسَا تَگْدِي» (المعروف بـ
      «طاليكوت») على نهر كَرِشْنَة يوم ٢٠ جمادى الأولى سنة
      ٩٧٢ هـ (الموافق ٢٣ جانفي ١٥٦٥ ميلادي). فحطمت نيران
      المتحدة من البنادق الفتيلية والمدفعية (وكان معظم
      رماتها من تدريب العثمانيين والبرتغاليين) هجمات الفرسان
      الفيجاينگريين، فأُسر راما رايا وقُتل في الميدان،
      وسُلبت العاصمة فيجاينگر (وهي «هَمْبِي» الحالية) ثم
      هُجرت. وأنهت المعركة عهد فيجاينگر دولةً مسيطرة على
      جنوب الهند، وفتحت هضبة الدكن لقرن من التنافس بين
      دول الدكن، ثم مهّدت بعد قرن لتوسع المغول جنوباً في
      عهد أورنكزيب. ومن المصادر الهندية الفارسية الكلاسيكية
      أعطى فرشته السرد الأوفى، وتطابقه طبعات «تاريخ فرشته»
      الحديثة ومقالة «طاليكوت» في دائرة المعارف الإسلامية
      على ٢٣ جانفي ١٥٦٥ ميلادي.
    description_fr: |
      Une armée confédérée de quatre sultanats du Deccan —
      Bijapur sous ʿAlī ʿĀdil Shāh I, Ahmadnagar sous Ḥusayn
      Niẓām Shāh I, Golconde sous Ibrāhīm Quṭb Shāh, et
      Bīdar sous ʿAlī Barīd Shāh — affronta l'empire
      hindou de Vijayanagara sous Rāma Rāya sur le champ
      de Rakshasa-Tagdi (aussi appelé Talikota) sur la
      rivière Krishna le 20 Jumādā I 972 H (23 janvier 1565
      EC). Le feu combiné de mousquets à mèche et
      d'artillerie de la coalition (fourni en grande partie
      par des artilleurs formés par les Ottomans et les
      Portugais) brisa la charge de la cavalerie
      vijayanagaride; Rāma Rāya fut capturé et tué sur le
      champ, et la capitale Vijayanagara (la moderne Hampi)
      fut mise à sac et abandonnée. La bataille mit fin à
      Vijayanagara comme puissance paramonte de l'Inde du
      Sud, ouvrit le plateau du Deccan à un siècle de
      compétition inter-sultanique, et fixa en dernière
      instance les conditions de l'expansion moghole vers
      le sud sous Aurangzeb un siècle plus tard. Parmi les
      sources indo-persanes classiques, Firishta donne le
      récit le plus détaillé; les éditions modernes du
      *Tārīkh-i Firishta* et l'article *Tālikota* de l'EI2
      s'accordent sur le 23 janvier 1565 EC.
    canonical_hijri: {year: 972, month: 5, day: 20, precision: day}
    canonical_gregorian: {date: 1565-01-23, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    tags: [india, deccan, talikota, bijapur, ahmadnagar, golconda, bidar, vijayanagara, battle]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Battle_of_Talikota"

  # =========================================================================
  # QUṬB SHĀHĪ AND ʿĀDIL SHĀHĪ — RULER DEATHS AT THE PEAK
  # =========================================================================

  - slug: death-of-muhammad-quli-qutb-shah
    category: ruler_death
    title_en: Death of Muḥammad Qulī Quṭb Shāh — Founder of Hyderabad
    title_ar: وفاة محمد قلي قطب شاه — مؤسس مدينة حيدرآباد
    title_fr: Mort de Muḥammad Qulī Quṭb Shāh — fondateur d'Hyderabad
    description_en: |
      Muḥammad Qulī Quṭb Shāh — fifth sultan of the Golconda
      Quṭb Shāhī line, founder of the city of Hyderabad
      (Ḥaydarābād) on the southern bank of the Mūsī river in
      999 AH (1591 CE), and the first major Indo-Persian-Urdu
      Deccani poet (his *Kulliyyāt* is the earliest surviving
      Deccan-Urdu / *dakhnī* dīwān) — died at Hyderabad in
      1020 AH (1611 CE) after a thirty-year reign. He had
      commissioned the founding monument of the new
      capital — the Charminar (*Chār Mīnār*, "four
      minarets") — at the city's central crossroads in
      999 AH. He extended Quṭb Shāhī control eastward to
      Masulipatam on the Bay of Bengal, the principal port
      through which the dynasty traded with Persia, the
      Ottoman lands, and Southeast Asia. The classical
      Indo-Persian chronicles preserve the year of his death
      (1020 AH); a precise day is not unambiguously fixed
      and we follow the EI2 article *Ḳuṭb Shāhīs* in
      attesting only the year. His successor Sulṭān
      Muḥammad Quṭb Shāh would rule until 1035 AH (1626 CE).
    description_ar: |
      توفي محمد قلي قطب شاه — خامس سلاطين البيت القطب شاهي
      بـ«گولكندة»، ومؤسس مدينة حيدرآباد على الضفة الجنوبية
      لنهر «موسي» سنة ٩٩٩ هـ (الموافق ١٥٩١ ميلادي)، وأول كبار
      شعراء «دكني» بالأردية الهندية الفارسية في الدكن
      («كليّاته» أقدم ديوان دكني-أردي حُفظ) — بحيدرآباد سنة
      ١٠٢٠ هـ (الموافق ١٦١١ ميلادي) بعد حكم دام ثلاثين سنة.
      وأنشأ في عاصمته الجديدة الصرحَ المعروف بـ«تشارمينار»
      («الأربع منارات») على ملتقى طرقها المركزي سنة ٩٩٩ هـ.
      وبسط سلطان القطب شاهيين شرقاً حتى ميناء «مَسُولِيپَتَم»
      على خليج البنغال، وكان الميناء الرئيسي الذي تتجر منه
      الدولة مع فارس والدولة العثمانية وجنوب شرق آسيا. والمصادر
      الهندية الفارسية الكلاسيكية تثبت سنة وفاته (١٠٢٠ هـ)
      ولا يثبت اليوم على وجه الدقة، فاكتفينا تبعاً لمقالة
      «قطب شاهيون» في دائرة المعارف الإسلامية بالسنة وحدها.
      وخلفه سلطان محمد قطب شاه الذي حكم إلى سنة ١٠٣٥ هـ
      (١٦٢٦ ميلادي).
    description_fr: |
      Muḥammad Qulī Quṭb Shāh — cinquième sultan de la
      lignée quṭbshāhide de Golconde, fondateur de la ville
      d'Hyderabad (Ḥaydarābād) sur la rive sud de la Mūsī
      en 999 H (1591 EC), et premier grand poète
      indo-perso-ourdou « dakhnī » du Deccan (ses
      *Kulliyyāt* constituent le plus ancien diwan
      deccan-ourdou conservé) — mourut à Hyderabad en 1020 H
      (1611 EC) après un règne de trente ans. Il avait
      commandé le monument fondateur de la nouvelle
      capitale — le Charminar (*Chār Mīnār*, « quatre
      minarets ») — au carrefour central de la ville en
      999 H. Il étendit le contrôle quṭbshāhide vers l'est
      jusqu'à Masulipatam sur la baie du Bengale, le
      principal port par lequel la dynastie commerçait avec
      la Perse, les terres ottomanes et l'Asie du Sud-Est.
      Les chroniques indo-persanes classiques conservent
      l'année de sa mort (1020 H); un jour précis n'est pas
      fixé sans ambiguïté et nous suivons l'article *Ḳuṭb
      Shāhīs* de l'EI2 en n'attestant que l'année. Lui
      succéda Sulṭān Muḥammad Quṭb Shāh, qui régnerait
      jusqu'en 1035 H (1626 EC).
    canonical_hijri: {year: 1020, precision: year}
