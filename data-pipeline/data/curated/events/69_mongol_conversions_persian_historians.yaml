# Wave 69 of curated event additions (2026-04-27).
# Mongol conversions to Islam and the Persian-historian chroniclers
# who recorded that transformation. The arc covered here is the
# central political-religious shift of the 7th–8th centuries AH:
# the Chinggisid khanates that had razed Baghdad in 656 AH/1258
# converted to Islam within decades, and the Persian secretarial
# class produced a new historiographical literature in Persian
# (rather than Arabic) under their patronage.
#
# Coverage:
#   1. Conversion of Berke Khan (Golden Horde, ~655 AH/1257) — first
#      Chinggisid khan to convert.
#   2. Death of Berke Khan (665 AH/1267).
#   3. Conversion of Ghazan Khan (Ilkhanate, 19 Shaʿbān 694 AH/4
#      July 1295) — declared Islam state religion of the Ilkhanate.
#   4. Death of Ghazan Khan (11 Shawwāl 703 AH/17 May 1304).
#   5. Conversion of Öljeitü (705 AH/1305) — initially Sunni Ḥanafī,
#      later turned Twelver Shia (~709 AH/1310). Reported factually.
#   6. Death of Öljeitü (16 Dhū al-Ḥijja 716 AH/16 Dec 1316).
#   7. Death of Abū Saʿīd Bahādur Khan (13 Rabīʿ II 736 AH/1 Dec
#      1335) — last unified Ilkhan; Ilkhanate fragments after.
#   8. Death of ʿAṭāʾ Malik al-Juwaynī al-historian (681 AH/1283) —
#      *Tārīkh-i Jahāngushāy*; distinct from Imām al-Ḥaramayn
#      al-Juwaynī (d. 478 AH).
#   9. Execution of Rashīd al-Dīn Hamadhānī (30 Jumādā I 718 AH/18
#      July 1318) — vizier of Ghazan and Öljeitü; *Jāmiʿ
#      al-Tawārīkh* (the first attempt at universal history).
#  10. Death of Hamd Allāh Mustawfī Qazwīnī (~750 AH/1349) —
#      *Tārīkh-i Guzīda*; distinct from Zakariyyā al-Qazwīnī the
#      cosmographer (d. 682 AH).
#  11. Death of Banākatī (730 AH/1330) — *Tārīkh-i Banākatī*.
#  12. Death of Abū al-Faḍl al-Bayhaqī Persian historian (470
#      AH/1077) — *Tārīkh-i Bayhaqī*; distinct from the muḥaddith
#      Abū Bakr al-Bayhaqī (d. 458 AH).
#
# Editorial framing:
#   - Berke and Ghazan converted to Sunni Islam — well-attested in
#     Ibn Kathīr, al-Dhahabī, the *Mukhtaṣar* of Abū al-Fidāʾ, and
#     EI2; this is treated as the central fact.
#   - Öljeitü's later Twelver-Shia turn (after a brief Sunni
#     Ḥanafī phase under Niẓām al-Dīn ʿAbd al-Malik al-Marāgha'ī)
#     is reported factually because the classical Sunni sources
#     report it factually — al-Dhahabī notes the shift with regret
#     but records the political fact rather than polemicising.
#   - The Persian-historian chroniclers under Mongol patronage are
#     mostly Sunni-aligned (al-Juwaynī, Banākatī, Mustawfī,
#     al-Bayhaqī). Rashīd al-Dīn was Jewish-born, converted to
#     Islam ~700 AH; Sunni biographical tradition treats him as a
#     Muslim convert who served two Muslim Ilkhāns.
#
# Sources: All entries attested in classical Sunni sources — Ibn
# Kathīr's *al-Bidāya wa-l-Nihāya*, al-Dhahabī's *Tārīkh al-Islām*,
# Ibn Ḥajar's *al-Durar al-Kāmina* (for 8th AH century figures) —
# plus EI2 for modern academic confirmation. Date precision honours
# the source-attested level: day-precision where the Persian
# chroniclers and the *Durar* converge; year only where the sources
# only attest a year. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # GOLDEN HORDE — BERKE KHAN
  # =========================================================================

  - slug: conversion-of-berke-khan
    category: conversion
    title_en: Conversion of Berke Khan to Islam — First Muslim Chinggisid Khan
    title_ar: إسلام بركة خان — أول الخانات الجنكيزيين إسلاماً
    title_fr: Conversion de Berke Khan à l'islam — premier khan tchinggisside musulman
    description_en: |
      Berke Khan, grandson of Chinggis Khan and ruler of the Golden
      Horde (the Jochid ulus, north of the Caspian and Black Seas),
      converted to Sunni Islam at Bukhārā around 655 AH (1257 CE),
      becoming the first Chinggisid khan to embrace the religion
      of the empires his line had conquered. Classical sources —
      Ibn Kathīr, al-Dhahabī, Ibn Khaldūn — record his conversion
      at the hands of the Sufi shaykh Sayf al-Dīn al-Bākharzī of
      Bukhārā (a successor of Najm al-Dīn al-Kubrā). His
      conversion was politically consequential: when his cousin
      Hulagu sacked Baghdad in 656 AH and killed the last ʿAbbāsid
      caliph al-Mustaʿṣim, Berke broke openly with the Ilkhanid
      branch over the slaughter of the Muslim caliph and the city,
      forming an alliance with the Mamlūk sultan Baybars against
      the Ilkhanid Mongols. The intra-Mongol war between Golden
      Horde and Ilkhanate, opening at the Caucasus in 660 AH, was
      the first Chinggisid civil war and was framed by Berke in
      explicitly Islamic terms — a Muslim khan checking a pagan
      khan's destruction of the Muslim heartlands. Some sources
      place Berke's initial Islamic adherence earlier (the
      Mamlūk-Egyptian envoys to him in 660 AH already address
      him as a Muslim sovereign), but the public-conversion
      tradition under al-Bākharzī is the one preserved in the
      Sunni biographical literature.
    description_ar: |
      أسلم بَرَكة خان — حفيد جنكيز خان وحاكم القبيلة الذهبية (يولوس
      جوجي، شمالي بحر قزوين والبحر الأسود) — على يد الشيخ سيف
      الدين الباخرزي البخاري (من خلفاء نجم الدين الكبرى) ببخارى
      قُرابة سنة ٦٥٥ هـ، فكان أولَ الخانات الجنكيزيين دخولاً في
      دين الأمم التي فتحها جدّه. وتسجِّل المصادر الكلاسيكية —
      ابن كثير، والذهبي، وابن خلدون — إسلامَه على يد الباخرزي
      ببخارى. وكان لإسلامه أثرٌ سياسي بالغ: لمّا اقتحم ابنُ عمه
      هولاكو بغداد سنة ٦٥٦ هـ وقتل آخر الخلفاء العباسيين
      المستعصم، انفصل بركة عن فرع الإيلخان علناً منكِراً مذبحةَ
      الخليفة المسلم وعاصمة الخلافة، وتحالف مع السلطان المملوكي
      الظاهر بيبرس في الشام على المغول الإيلخان، فاندلعت سنة ٦٦٠
      هـ في القفقاس أولُ حربٍ أهلية بين الفرعين الجنكيزيَّين، صاغها
      بركة صياغة إسلاميةً صريحة: خانٌ مسلم يكبح خاناً وثنياً عن
      تدمير ديار الإسلام. وتُشير مصادرُ أخرى إلى أن إسلامه
      الفعلي أسبقُ من ذلك (إذ خاطبه رسل المماليك في مصر سنة
      ٦٦٠ هـ بصفته سلطاناً مسلماً)، لكنَّ روايةَ الإشهار على
      يد الباخرزي هي المحفوظة في كتب التراجم السنية.
    description_fr: |
      Berke Khan, petit-fils de Gengis Khan et souverain de la
      Horde d'Or (l'*ulus* jouchide, au nord de la Caspienne et de
      la mer Noire), se convertit à l'islam sunnite à Boukhara
      vers 655 H (1257 EC), devenant le premier khan tchinggisside
      à embrasser la religion des empires que sa lignée avait
      conquis. Les sources classiques — Ibn Kathīr, al-Dhahabī,
      Ibn Khaldūn — rapportent sa conversion entre les mains du
      cheikh soufi Sayf al-Dīn al-Bākharzī de Boukhara (un
      successeur de Najm al-Dīn al-Kubrā). Sa conversion eut des
      conséquences politiques majeures : quand son cousin Hulagu
      mit Bagdad à sac en 656 H et tua le dernier calife
      ʿabbāsside al-Mustaʿṣim, Berke rompit ouvertement avec la
      branche ilkhānide en raison du massacre du calife musulman
      et de la ville, formant une alliance avec le sultan mamelouk
      Baybars contre les Mongols ilkhānides. La guerre intra-mongole
      entre Horde d'Or et Ilkhānat, ouverte au Caucase en 660 H,
      fut la première guerre civile tchinggisside et fut formulée
      par Berke en termes explicitement islamiques — un khan
      musulman freinant la destruction des terres islamiques par
      un khan païen. Certaines sources placent l'adhésion
      islamique initiale de Berke plus tôt (les envoyés mamelouks
      d'Égypte s'adressaient déjà à lui comme à un souverain
      musulman en 660 H), mais la tradition de la conversion
      publique sous al-Bākharzī est celle conservée dans la
      littérature biographique sunnite.
    canonical_hijri: {year: 655, precision: year}
    canonical_gregorian: {date: 1257-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya records Berke's Islam at the hands of Sayf al-Dīn al-Bākharzī of Bukhārā and the consequent break with Hulagu over the sack of Baghdad."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī notes Berke as the first Mongol khan to embrace Islam and his alliance with the Mamlūks against Hulagu."
      - source_key: ei2
        notes: "EI2 'Berke' confirms the conversion at Bukhārā under al-Bākharzī and dates the public adherence to ~655 AH; some sources push earlier."
    tags: [mongol, golden-horde, jochid, conversion, sunni, bukhara, bakharzi, baybars]
    importance: major
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date

  - slug: death-of-berke-khan
    category: ruler_death
    title_en: Death of Berke Khan — End of the First Muslim Chinggisid Reign
    title_ar: وفاة بركة خان — نهاية أول حكم جنكيزي مسلم
    title_fr: Mort de Berke Khan — fin du premier règne tchinggisside musulman
    description_en: |
      Berke Khan, the first Chinggisid ruler to embrace Islam and
      khan of the Golden Horde, died in 665 AH (1266–1267 CE)
      while on campaign in the Caucasus against the Ilkhanid
      Mongols of his cousin Hulagu's line. His death came in the
      midst of the Berke–Hulagu war — the intra-Chinggisid civil
      war that Berke had framed as a defence of Muslim lands
      against the Ilkhanid pagan khans who had destroyed Baghdad
      in 656 AH. He was succeeded by Möngke-Temür, his nephew, who
      did not embrace Islam personally but maintained the Mamlūk
      alliance and tolerated the Muslim communities of the Volga
      and Crimea. The full Islamisation of the Golden Horde would
      follow only with the conversion of Özbeg Khan in 712 AH
      (1313 CE) — a generation after Berke. The classical Sunni
      sources record Berke's death without day-precision; Ibn
      Kathīr enters the obituary under the events of 665 AH.
    description_ar: |
      توفي بَرَكة خان — أوّل الخانات الجنكيزيين إسلاماً وحاكم
      القبيلة الذهبية — سنة ٦٦٥ هـ (١٢٦٦–١٢٦٧ م)، وهو في حملة
      على القفقاس في حرب الفرع الإيلخاني المغولي، أبناء عمّه من
      ذرية هولاكو. وجاء موته في خِضَم الحرب البَركة–الهولاكوية،
      تلك الفتنة الجنكيزية الداخلية التي صاغها بركة بصفتها دفاعاً
      عن ديار الإسلام في وجه الخانات الإيلخانيين الوثنيين الذين
      دمّروا بغداد سنة ٦٥٦ هـ. وخلفه ابنُ أخيه مَنكَوتَمُر، الذي
      لم يدخل في الإسلام لنفسه، لكنه حافظ على تحالف المماليك
      وأبقى الجاليات الإسلامية في الفولغا والقرم آمنةً. ولن يكتمل
      أسلمةُ القبيلة الذهبية كلها إلا مع إسلام أزبَك خان سنة
      ٧١٢ هـ (١٣١٣ م) — أي بعد جيل من بركة. ولم تعيِّن المصادر
      السنية الكلاسيكية يوماً بعينه لوفاته؛ يُدخل ابن كثير ترجمته
      في حوادث سنة ٦٦٥ هـ.
    description_fr: |
      Berke Khan, premier souverain tchinggisside à embrasser
      l'islam et khan de la Horde d'Or, mourut en 665 H
      (1266–1267 EC) alors qu'il était en campagne au Caucase
      contre les Mongols ilkhānides issus de la lignée de son
      cousin Hulagu. Sa mort survint au cœur de la guerre
      Berke–Hulagu — la guerre civile intra-tchinggisside que
      Berke avait formulée comme une défense des terres musulmanes
      contre les khans ilkhānides païens qui avaient détruit
      Bagdad en 656 H. Lui succéda Möngke-Temür, son neveu, qui
      n'embrassa pas personnellement l'islam mais maintint
      l'alliance mamelouke et toléra les communautés musulmanes
      de la Volga et de Crimée. L'islamisation complète de la
      Horde d'Or ne suivrait qu'avec la conversion d'Özbeg Khan
      en 712 H (1313 EC) — une génération après Berke. Les
      sources sunnites classiques rapportent la mort de Berke
      sans précision journalière ; Ibn Kathīr inscrit la nécrologie
      sous les événements de 665 H.
    canonical_hijri: {year: 665, precision: year}
    canonical_gregorian: {date: 1267-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr enters the death of Berke Khan under the events of 665 AH and notes the Caucasus campaign context."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Berke among the obituaries of 665 AH."
      - source_key: ei2
        notes: "EI2 'Berke' places the death in 665 AH/1266–67."
    tags: [mongol, golden-horde, jochid, ruler_death, sunni, baybars]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # ILKHANATE — GHAZAN KHAN
  # =========================================================================

  - slug: conversion-of-ghazan-khan
    category: conversion
    title_en: Conversion of Ghazan Khan to Islam — Islam as Ilkhanid State Religion
    title_ar: إسلام غازان خان — جعلُ الإسلام دينَ الدولة الإيلخانية
    title_fr: Conversion de Ghazan Khan à l'islam — l'islam religion d'État ilkhānide
    description_en: |
      Maḥmūd Ghazan ibn Arghūn — Ilkhanid prince and great-grandson
      of Hulagu, the Mongol who had destroyed Baghdad in 656 AH
      — converted to Sunni Islam on 19 Shaʿbān 694 AH (4 July
      1295 CE) at Lār near Tehran on the eve of his march on the
      Ilkhanid throne against Baydū. The conversion was performed
      at the hands of Shaykh Ṣadr al-Dīn Ibrāhīm Ḥammū'ī, son of
      the Kubrawī Sufi master Saʿd al-Dīn al-Ḥammū'ī. Within weeks
      Ghazan defeated and killed Baydū and entered Tabrīz as
      Ilkhān; he then declared Islam the state religion of the
      Ilkhanate, ordered the destruction of Buddhist temples,
      Christian churches, and Jewish synagogues that had been
      established under his predecessors (a measure later
      moderated under court pressure to a tolerance for *dhimmī*
      worship), restored the *jizya* on non-Muslims, and adopted
      the name Maḥmūd. His vizier Rashīd al-Dīn Hamadhānī — a
      Jewish convert to Islam — would compose the *Jāmiʿ
      al-Tawārīkh* under his patronage; his finance minister
      Saʿd al-Dīn Sāwajī would conduct the major fiscal reform of
      the Ilkhanate. Classical Sunni sources record Ghazan's
      Islam as the closing of the seventh-century AH catastrophe
      that had begun with Baghdad's fall: thirty-seven years
      after the sack, the Mongol khan of Iraq and Iran prayed in
      the same direction as the Muslims his great-grandfather had
      slaughtered.
    description_ar: |
      أسلم محمود غازان بن أرغون — الأمير الإيلخاني، حفيد حفيد
      هولاكو الذي دمّر بغداد سنة ٦٥٦ هـ — في ١٩ شعبان ٦٩٤ هـ
      (٤ يوليوز ١٢٩٥ م) بـ«لار» قُرب طهران، عشيّةَ زحفِه على
      عرش الإيلخان متقدماً على بايدو. وأسلم على يد الشيخ صدر
      الدين إبراهيم الحَمُّوئي، ابن شيخ الكُبراوية سعد الدين
      الحَمُّوئي. وفي أسابيع هزم غازان بايدو وقتله ودخل تبريز
      إيلخاناً، ثم أعلن الإسلام ديناً للدولة الإيلخانية، وأمر
      بهدم معابد البوذية وكنائس النصارى وكنُس اليهود التي قامت
      في عهد أسلافه (أمرٌ خُفِّف لاحقاً بضغط البلاط ليُتاحَ
      لأهل الذمة عبادتهم في كنائسهم وكنُسهم)، وأعاد الجزية على
      غير المسلمين، وتسمَّى «محمود». ونظم له وزيرُه رشيد الدين
      الهَمَذاني — اليهودي الذي أسلم — «جامع التواريخ»؛ وأصلح
      له ناظر ماليّته سعد الدين الساوجي ماليّةَ الإيلخانيّة
      إصلاحاً كبيراً. وتسجِّل المصادر السنية الكلاسيكية إسلامَ
      غازان بصفته خاتمةَ كارثة القرن السابع التي بدأت بسقوط
      بغداد: فبعد سبع وثلاثين سنة من المذبحة، صار خانُ المغول
      على العراق والعجم يصلّي إلى نفس قبلة المسلمين الذين
      ذبحهم جدّ جدّه.
    description_fr: |
      Maḥmūd Ghazan ibn Arghūn — prince ilkhānide, arrière-petit-fils
      de Hulagu, le Mongol qui avait détruit Bagdad en 656 H —
      se convertit à l'islam sunnite le 19 Shaʿbān 694 H (4
      juillet 1295 EC) à Lār, près de Téhéran, à la veille de sa
      marche sur le trône ilkhānide contre Baydū. La conversion
      fut effectuée entre les mains du cheikh Ṣadr al-Dīn Ibrāhīm
      Ḥammū'ī, fils du maître soufi kubrawī Saʿd al-Dīn al-Ḥammū'ī.
      En quelques semaines, Ghazan défit et tua Baydū et entra à
      Tabrīz comme Ilkhān ; il proclama alors l'islam religion
      d'État de l'Ilkhānat, ordonna la destruction des temples
      bouddhiques, des églises chrétiennes et des synagogues
      juives établies sous ses prédécesseurs (mesure plus tard
      modérée, sous la pression de la cour, en une tolérance du
      culte *dhimmī*), rétablit la *jizya* sur les non-musulmans,
      et prit le nom de Maḥmūd. Son vizir Rashīd al-Dīn Hamadhānī
      — un juif converti à l'islam — composerait sous son
      patronage le *Jāmiʿ al-Tawārīkh* ; son ministre des finances
      Saʿd al-Dīn Sāwajī mènerait la grande réforme fiscale de
      l'Ilkhānat. Les sources sunnites classiques retiennent
      l'islam de Ghazan comme la clôture de la catastrophe du
      VIIe siècle de l'hégire qui s'était ouverte avec la chute
      de Bagdad : trente-sept ans après le sac, le khan mongol de
      l'Iraq et de l'Iran priait dans la même direction que les
      musulmans que son arrière-grand-père avait massacrés.
    canonical_hijri: {year: 694, month: 8, day: 19, precision: day}
    canonical_gregorian: {date: 1295-07-04, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr enters Ghazan's Islam in 694 AH and details the consequent declaration of Islam as state religion."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records Ghazan's conversion at the hands of Ṣadr al-Dīn al-Ḥammū'ī and the imposition of Sunni Islam across the Ilkhanate."
      - source_key: ei2
        notes: "EI2 'Ghāzān' confirms the day-precision of 19 Shaʿbān 694 AH and the role of the Kubrawī shaykh."
    tags: [mongol, ilkhanate, conversion, sunni, ghazan, hammuiyya, kubrawiyya, tabriz]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-ghazan-khan
    category: ruler_death
    title_en: Death of Ghazan Khan — End of the Reign That Made Iran Muslim Again
    title_ar: وفاة غازان خان — انقضاء الحكم الذي أعاد إيران إلى الإسلام
    title_fr: Mort de Ghazan Khan — fin du règne qui rendit l'Iran musulman
    description_en: |
      Maḥmūd Ghazan, seventh Ilkhān of Iran and Iraq, died at
      Qazwīn on 11 Shawwāl 703 AH (17 May 1304 CE) at the age of
      thirty-three after a nine-year reign. He had spent the
      previous winter campaigning against the Mamlūks at Marj
      al-Ṣuffar (in the Ḥawrān, south of Damascus, Ramaḍān 702 AH)
      where his army had been defeated by the Mamlūk sultan
      al-Nāṣir Muḥammad — the only Ilkhanid–Mamlūk encounter that
      ended in Mamlūk victory after Ghazan's earlier conquests of
      Damascus in 699 AH. He left no surviving son and was
      succeeded by his brother Muḥammad Khudābanda, later styled
      Öljeitü. Ghazan's nine-year reign reshaped the Ilkhanate:
      Islam was the state religion, Persian replaced Mongol as
      the language of the chancery, the *Jāmiʿ al-Tawārīkh* of
      Rashīd al-Dīn was begun, the great endowment-quarter at
      Sham (the *Shanb-i Ghāzān*) outside Tabrīz was built, and
      the fiscal reforms of Saʿd al-Dīn Sāwajī had stabilised the
      ruined Iranian agrarian economy. Classical Sunni sources —
      Ibn Kathīr above all — frame him as the Mongol khan who
      undid, by conversion, the catastrophe his great-grandfather
      had inflicted by conquest.
    description_ar: |
      توفي محمود غازان — سابع خانات الإيلخان على إيران والعراق —
      بقَزوين في ١١ شوال ٧٠٣ هـ (١٧ مايو ١٣٠٤ م) عن ثلاث وثلاثين
      سنة بعد ولاية تسع سنوات. وكان قد قضى الشتاء الفائت في حملة
      على المماليك بمَرج الصُّفَّر (بحوران جنوب دمشق، في رمضان
      ٧٠٢ هـ) هُزم فيها جيشُه على يد السلطان المملوكي الناصر
      محمد بن قلاوون — وهي اللقاءُ الإيلخانيُّ المملوكيُّ
      الوحيد الذي انتهى بنصر المماليك بعد فتوحات غازان لدمشق
      سنة ٦٩٩ هـ. ولم يخلِّف ولداً، فخلفه أخوه محمد خدابنده، المعروف
      لاحقاً بـ«أُلْجايْتُو». وقد أعادت ولاية غازان التسعُ صياغةَ
      الإيلخانية: الإسلامُ ديناً للدولة، والفارسيةُ بديلاً من
      المغولية في ديوان الإنشاء، و«جامع التواريخ» للهَمَذاني
      مبدوءٌ تأليفُه، و«شَنب غازان» ـ ضاحية الأوقاف الكبرى ـ خارجَ
      تبريز مبنيٌّ، وإصلاحاتُ ساوجي المالية قد ثبَّتت الاقتصاد
      الزراعي الإيراني المنهَك. وتسجِّل المصادر السنية الكلاسيكية
      — ابن كثير في مقدمتها — أنه الخان المغولي الذي نقضَ
      بإسلامه الكارثةَ التي ألحقها جدُّ جدّه بفتحه.
    description_fr: |
      Maḥmūd Ghazan, septième Ilkhān d'Iran et d'Iraq, mourut à
      Qazwīn le 11 Shawwāl 703 H (17 mai 1304 EC) à l'âge de
      trente-trois ans, après un règne de neuf ans. Il avait passé
      l'hiver précédent en campagne contre les Mamelouks à Marj
      al-Ṣuffar (dans le Ḥawrān, au sud de Damas, Ramaḍān 702 H)
      où son armée avait été défaite par le sultan mamelouk
      al-Nāṣir Muḥammad — la seule rencontre ilkhānido-mamelouke
      qui s'acheva par une victoire mamelouke après les conquêtes
      antérieures de Damas par Ghazan en 699 H. N'ayant pas laissé
      de fils survivant, il fut succédé par son frère Muḥammad
      Khudābanda, plus tard appelé Öljeitü. Le règne de neuf ans
      de Ghazan reconfigura l'Ilkhānat : l'islam comme religion
      d'État, le persan remplaçant le mongol comme langue de la
      chancellerie, le *Jāmiʿ al-Tawārīkh* de Rashīd al-Dīn
      commencé, le grand quartier d'awqāf de Shām (le *Shanb-i
      Ghāzān*) hors de Tabrīz construit, et les réformes fiscales
      de Saʿd al-Dīn Sāwajī ayant stabilisé l'économie agraire
      iranienne dévastée. Les sources sunnites classiques —
      Ibn Kathīr au premier chef — le retiennent comme le khan
      mongol qui défit par sa conversion la catastrophe que son
      arrière-grand-père avait infligée par sa conquête.
    canonical_hijri: {year: 703, month: 10, day: 11, precision: day}
    canonical_gregorian: {date: 1304-05-17, precision: day, method: tabular_conversion}
