  - slug: death-of-abu-al-fadl-al-bayhaqi-historian
    category: scholar_death
    title_en: Death of Abū al-Faḍl al-Bayhaqī — Persian Historian of *Tārīkh-i Bayhaqī*
    title_ar: وفاة أبي الفضل البيهقي المؤرخ — صاحب «تاريخ بيهقي»
    title_fr: Mort d'Abū al-Faḍl al-Bayhaqī — historien persan du *Tārīkh-i Bayhaqī*
    description_en: |
      Abū al-Faḍl Muḥammad ibn al-Ḥusayn al-Bayhaqī — Persian
      Ghaznavid court secretary and historian — died at Bayhaq
      (modern Sabzevār in Khurāsān) in 470 AH (1077 CE), aged
      about seventy-two. He is to be sharply distinguished from
      his contemporary the muḥaddith Abū Bakr Aḥmad ibn al-Ḥusayn
      al-Bayhaqī (d. 458 AH/1066), the Sunni-Shāfiʿī hadith
      compiler of the *Sunan al-Kubrā* — the two were unrelated
      and worked in different fields. The historian Bayhaqī
      served in the Ghaznavid chancery from the time of Maḥmūd
      of Ghazna (r. 388–421 AH) through that of his sons Masʿūd I
      and Mawdūd, completing nearly thirty years of secretarial
      service before retirement. His *Tārīkh-i Masʿūdī* — also
      called *Tārīkh-i Bayhaqī* and originally a thirty-volume
      history of the entire Ghaznavid dynasty (of which only the
      central section, on the reign of Masʿūd I, six volumes
      surviving, has come down to us) — is one of the masterpieces
      of medieval Persian prose and the earliest detailed
      eyewitness chronicle of a Persianate Sunni dynasty. The
      surviving books cover the years 422–432 AH from inside the
      Ghaznavid bureaucracy, including the disastrous campaigns
      against the Seljuks culminating at Dandanaqān in 431 AH
      and Masʿūd's deposition and murder. The work's literary
      quality — close-grained anecdote, ethical reflection, and
      precise civil-service detail — set the standard for later
      Persian historiography down to the Mongol-era chroniclers
      above.
    description_ar: |
      توفي أبو الفضل محمد بن الحسين البيهقي — كاتب الديوان
      الغزنوي والمؤرخ الفارسي — ببَيهَق (سَبزَوار اليوم بخراسان)
      سنة ٤٧٠ هـ (١٠٧٧ م) عن نحو اثنتين وسبعين سنة. وهو غيرُ
      أبي بكر أحمد بن الحسين البيهقي (ت ٤٥٨ هـ/١٠٦٦ م)
      المحدِّث السني الشافعي صاحب «السنن الكبرى» — وكان
      الرجلان معاصرَين لكنهما لا تربطهما صلة قرابة ولا اشتغالٍ
      بفنٍّ واحد. وكان البيهقي المؤرخ قد عمل في ديوان الإنشاء
      الغزنوي من عهد محمود الغزنوي (من ٣٨٨ إلى ٤٢١ هـ) مروراً
      بعهدَي ابنيه مسعود الأول ومودود، فقضى نحو ثلاثين سنة في
      خدمة الإنشاء قبل اعتزاله. و«تاريخ مسعودي» — المسمَّى أيضاً
      «تاريخ بيهقي»، وهو في الأصل تاريخ في ثلاثين مجلداً للدولة
      الغزنوية كلها (لم يبقَ منه إلا الستة المجلدات الوسطى في
      عهد مسعود الأول) — من روائع النثر الفارسي الوسيط، وأقدم
      تاريخٍ مفصَّلٍ شاهدِ عيان لدولة سنية فارسية. وتغطي المجلدات
      الباقية السنوات من ٤٢٢ إلى ٤٣٢ هـ من داخل البيروقراطية
      الغزنوية، ومنها الحملاتُ المشؤومة على السلاجقة وذروتُها
      بدندانقان سنة ٤٣١ هـ، وخلعُ مسعود ومقتله. وأرسَت دقائقُ
      عمله الأدبية — السرد القصصي الدقيق، والتأمل الأخلاقي،
      وضبط تفاصيل الديوان — معياراً لمن لحقه من المؤرخين
      الفارسيين حتى مؤرخي العصر المغولي المذكورين أعلاه.
    description_fr: |
      Abū al-Faḍl Muḥammad ibn al-Ḥusayn al-Bayhaqī — secrétaire
      ghaznavide à la chancellerie et historien persan — mourut à
      Bayhaq (Sabzevār actuelle au Khurāsān) en 470 H (1077 EC),
      à l'âge d'environ soixante-douze ans. Il est à distinguer
      strictement de son contemporain le muḥaddith Abū Bakr
      Aḥmad ibn al-Ḥusayn al-Bayhaqī (m. 458 H/1066), le
      compilateur de hadiths sunnite-shāfiʿī des *Sunan al-Kubrā*
      — les deux hommes n'étaient pas apparentés et travaillaient
      dans des domaines différents. Bayhaqī l'historien servit à
      la chancellerie ghaznavide depuis le temps de Maḥmūd de
      Ghazna (r. 388–421 H) jusqu'à celui de ses fils Masʿūd I
      et Mawdūd, accomplissant près de trente ans de service de
      secrétariat avant la retraite. Son *Tārīkh-i Masʿūdī* —
      également appelé *Tārīkh-i Bayhaqī* et à l'origine une
      histoire en trente volumes de toute la dynastie ghaznavide
      (dont seule la section centrale, sur le règne de Masʿūd I,
      en six volumes survivants, est parvenue jusqu'à nous) — est
      l'un des chefs-d'œuvre de la prose persane médiévale et la
      première chronique détaillée de témoin oculaire d'une
      dynastie sunnite persanisée. Les livres survivants couvrent
      les années 422–432 H depuis l'intérieur de la bureaucratie
      ghaznavide, y compris les campagnes désastreuses contre les
      Seljoukides culminant à Dandanaqān en 431 H et la
      déposition et l'assassinat de Masʿūd. La qualité littéraire
      de l'œuvre — anecdote finement ciselée, réflexion éthique
      et détail précis de l'administration — établit la norme
      pour l'historiographie persane ultérieure jusqu'aux
      chroniqueurs de l'époque mongole évoqués plus haut.
