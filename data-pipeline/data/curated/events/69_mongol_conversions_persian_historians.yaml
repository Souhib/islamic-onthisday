  # =========================================================================
  # ILKHANATE — ÖLJEITÜ
  # =========================================================================

  - slug: conversion-of-oljeitu
    category: conversion
    title_en: Conversion of Öljeitü to Islam — Sunni Ḥanafī Then Twelver Shia
    title_ar: إسلام أُلْجايْتُو — حنفياً سنياً ثم تشيُّعاً اثنا عشريّاً
    title_fr: Conversion d'Öljeitü à l'islam — sunnite ḥanafī puis chiite duodécimain
    description_en: |
      Muḥammad Khudābanda ibn Arghūn — younger brother of Ghazan
      Khan and his successor as eighth Ilkhān — was baptised
      Christian as a child (his Buddhist mother had become a
      Nestorian Christian under Arghūn), embraced Sunni Ḥanafī
      Islam in 705 AH (1305 CE) on his accession at Tabrīz, and
      later turned Twelver Shia around 709 AH (1310 CE) under the
      influence of the *ʿālim* al-ʿAllāma al-Ḥillī (a Twelver
      jurist of Iraq, no relation to the Sunni biographical
      al-Ḥillīs). He is recorded under the regnal name *Öljeitü*
      ("blessed") and the laqab *Khudābanda* ("servant of God").
      Classical Sunni sources — Ibn Kathīr, al-Dhahabī, Ibn Ḥajar
      — note the shift to Twelver adherence factually but
      critically; al-Dhahabī enters his obituary with regret over
      "his innovation in religion at the end" while preserving
      his role as the patron of Rashīd al-Dīn's *Jāmiʿ
      al-Tawārīkh* and the founder of the new royal capital at
      Sulṭāniyya. The Sunni–Shia oscillation across his reign is
      the most striking instance of post-conversion Mongol
      religious volatility; under his son Abū Saʿīd the Ilkhanate
      would return to Sunni adherence. Date precision: 705 AH for
      the initial Sunni Islam is well-attested; the Twelver shift
      is variously placed between 707 and 709 AH.
    description_ar: |
      محمد خدابنده بن أرغون — أخو غازان خان الأصغر، وخليفته
      ثامنَ خانات الإيلخان — عُمِّد نصرانياً في طفولته (إذ كانت
      أمُّه البوذية قد تنصّرت نسطورية في عهد أبيه أرغون)، ثم
      أسلم سنياً حنفيّاً سنة ٧٠٥ هـ (١٣٠٥ م) عند توليته العرش
      بتبريز، ثم تحوّل إلى التشيع الإمامي الاثني عشري قُرابة سنة
      ٧٠٩ هـ (١٣١٠ م) بتأثير العَلَّامة الحلّي (فقيه الإمامية في
      العراق، لا يمتُّ إلى آل الحلّي عند أهل السنة بصلة). ويُسجَّل
      باسمه السلطاني «أُلْجايْتُو» (المبارك) ولقبه «خدابنده»
      (عبد الله). وتسجِّل المصادر السنية الكلاسيكية — ابن كثير،
      والذهبي، وابن حجر — تحوّلَه إلى المذهب الإمامي تسجيلاً
      وقائعياً مع نقدٍ صريح؛ ويُدخل الذهبي ترجمته بأسف من «بدعته
      في الدين أخيراً»، مع حفظ دوره راعياً لـ«جامع التواريخ»
      للهَمَذاني ومؤسساً عاصمةً ملكية جديدة بسلطانية. والتأرجح
      السني–الشيعي في عهده هو أبرز نموذج للتقلب الديني المغولي
      بعد الإسلام؛ وستعود الإيلخانية في عهد ابنه أبي سعيد إلى
      المذهب السني. ودقّةُ التاريخ: سنة ٧٠٥ هـ لإسلامه السني
      الأول مُحقَّقة بإجماع، أما تحوّله الشيعي فيُروى بين سنتي
      ٧٠٧ و ٧٠٩ هـ.
    description_fr: |
      Muḥammad Khudābanda ibn Arghūn — frère cadet de Ghazan Khan
      et son successeur au titre de huitième Ilkhān — fut baptisé
      chrétien dans l'enfance (sa mère bouddhiste s'étant convertie
      au christianisme nestorien sous Arghūn), embrassa l'islam
      sunnite ḥanafī en 705 H (1305 EC) à son accession à Tabrīz,
      puis se tourna vers le chiisme duodécimain vers 709 H
      (1310 EC) sous l'influence de l'*ʿallāma* al-Ḥillī (un
      juriste duodécimain d'Iraq, sans lien avec les al-Ḥillī
      sunnites). Il est consigné sous le nom régnal *Öljeitü*
      (« le béni ») et le laqab *Khudābanda* (« serviteur de
      Dieu »). Les sources sunnites classiques — Ibn Kathīr,
      al-Dhahabī, Ibn Ḥajar — relèvent le passage à l'adhésion
      duodécimaine de manière factuelle mais critique ; al-Dhahabī
      ouvre sa nécrologie avec regret pour « son innovation
      religieuse à la fin », tout en préservant son rôle de
      mécène du *Jāmiʿ al-Tawārīkh* de Rashīd al-Dīn et de
      fondateur de la nouvelle capitale royale à Sulṭāniyya.
      L'oscillation sunnite–chiite à travers son règne est
      l'instance la plus frappante de la volatilité religieuse
      mongole post-conversion ; sous son fils Abū Saʿīd,
      l'Ilkhānat reviendrait à l'adhésion sunnite. Précision
      temporelle : 705 H pour l'islam sunnite initial est bien
      attesté ; le glissement duodécimain est diversement situé
      entre 707 et 709 H.
    canonical_hijri: {year: 705, precision: year}
    canonical_gregorian: {date: 1305-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr records Öljeitü's accession and Sunni Ḥanafī Islam in 705 AH and the later turn to Twelver adherence under al-Ḥillī's influence."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī notes both phases — initial Sunni Islam in 705 AH and the later Imāmī shift — with critical framing of the latter."
      - source_key: ei2
        notes: "EI2 'Ūljaytū' confirms the 705 AH conversion and the chronology of the Twelver shift."
    tags: [mongol, ilkhanate, conversion, oljeitu, hanafi, twelver, sultaniyya]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-oljeitu
    category: ruler_death
    title_en: Death of Öljeitü — Patron of Sulṭāniyya and the *Jāmiʿ al-Tawārīkh*
    title_ar: وفاة أُلْجايْتُو — راعي سلطانيّة و«جامع التواريخ»
    title_fr: Mort d'Öljeitü — mécène de Sulṭāniyya et du *Jāmiʿ al-Tawārīkh*
    description_en: |
      Muḥammad Khudābanda Öljeitü, eighth Ilkhān, died at
      Sulṭāniyya — the new royal capital he had built halfway
      between Qazwīn and Zanjān — on 16 Dhū al-Ḥijja 716 AH (16
      December 1316 CE), aged thirty-six, after a thirteen-year
      reign. His mausoleum at Sulṭāniyya, completed in 712 AH and
      crowned by the largest brick dome in the Islamic east before
      the Ottoman age (over fifty metres in span, glazed in
      turquoise faience), survives intact and is the architectural
      monument of his reign. He had completed the patronage of
      Rashīd al-Dīn's *Jāmiʿ al-Tawārīkh* — the universal history
      that included sections on the Mongols, the Chinese, the
      Indians and the Franks alongside the standard Islamic
      narrative — and had presided over the apogee of the
      Persian-language administrative culture that would carry
      forward into the Timurid and early Safavid periods. He was
      succeeded by his twelve-year-old son Abū Saʿīd Bahādur Khan,
      under the regency of the amīr Chūbān; the boy-Ilkhān would
      restore Sunni adherence as the state religion. Classical
      Sunni sources record the day-precision under the events of
      Dhū al-Ḥijja 716 AH.
    description_ar: |
      توفي محمد خدابنده «أُلْجايْتُو» — ثامن الإيلخانات — بسلطانية،
      العاصمة الملكية الجديدة التي بناها بين قَزوين وزنجان، في
      ١٦ ذي الحجة ٧١٦ هـ (١٦ ديسمبر ١٣١٦ م) عن ست وثلاثين سنة
      بعد ولاية ثلاث عشرة سنة. وقُبَّتُه بسلطانية، التي أُكملت سنة
      ٧١٢ هـ وكانت أعظمَ قبّة آجُرّيّة في المشرق الإسلامي قبل العصر
      العثماني (يبلغ قُطرُها خمسين متراً، مكسوّةٌ بالقاشاني الفيروزي
      اللون)، ما زالت قائمةً، وهي شاهدةُ ولايته العمرانية. وكان قد
      أتمَّ رعايةَ «جامع التواريخ» للهَمَذاني — التاريخ الجامع الذي
      ضمَّ المغولَ والصِّينيين والهنود والفرنج إلى السرد الإسلامي
      المعتاد — وأشرف على ذروة ثقافة الديوان الإيرانية الفارسية
      التي ستستمر إلى عصر التيموريين وبدايات الصفويين. وخلفه ابنُه
      أبو سعيد بهادر خان وله اثنتا عشرة سنة، تحت وصاية الأمير
      «جوبان» («چوبان»)، وهو الإيلخان الصبيُّ الذي سيعيد المذهبَ
      السني ديناً للدولة. وتسجِّل المصادر السنية الكلاسيكية الدقّةَ
      اليومية في حوادث ذي الحجة ٧١٦ هـ.
    description_fr: |
      Muḥammad Khudābanda Öljeitü, huitième Ilkhān, mourut à
      Sulṭāniyya — la nouvelle capitale royale qu'il avait
      construite à mi-chemin entre Qazwīn et Zanjān — le 16 Dhū
      al-Ḥijja 716 H (16 décembre 1316 EC), à l'âge de
      trente-six ans, après treize ans de règne. Son mausolée à
      Sulṭāniyya, achevé en 712 H et couronné de la plus grande
      coupole de brique de l'Orient islamique avant l'époque
      ottomane (plus de cinquante mètres de portée, glaçurée de
      faïence turquoise), subsiste intact et constitue le
      monument architectural de son règne. Il avait achevé le
      mécénat du *Jāmiʿ al-Tawārīkh* de Rashīd al-Dīn —
      l'histoire universelle qui incluait des sections sur les
      Mongols, les Chinois, les Indiens et les Francs aux côtés
      du récit islamique standard — et avait présidé à l'apogée
      de la culture administrative persane qui se prolongerait
      dans la période timouride et au début safavide. Lui succéda
      son fils Abū Saʿīd Bahādur Khan, âgé de douze ans, sous la
      régence de l'émir Chūbān ; le jeune Ilkhān restaurerait
      l'adhésion sunnite comme religion d'État. Les sources
      sunnites classiques rapportent la précision journalière
      sous les événements de Dhū al-Ḥijja 716 H.
    canonical_hijri: {year: 716, month: 12, day: 16, precision: day}
    canonical_gregorian: {date: 1316-12-16, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr enters the death of Öljeitü under Dhū al-Ḥijja 716 AH at Sulṭāniyya."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Öljeitü among the obituaries of 716 AH."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's al-Durar al-Kāmina (8th AH century notables) gives the biographical entry with the day-precision."
      - source_key: ei2
        notes: "EI2 'Ūljaytū' confirms 16 Dhū al-Ḥijja 716 AH/16 December 1316 at Sulṭāniyya."
    tags: [mongol, ilkhanate, ruler_death, oljeitu, sultaniyya, mausoleum]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # ILKHANATE — LAST UNIFIED ILKHĀN
  # =========================================================================

  - slug: death-of-abu-said-bahadur-khan
    category: ruler_death
    title_en: Death of Abū Saʿīd Bahādur Khan — End of the Unified Ilkhanate
    title_ar: وفاة أبي سعيد بهادر خان — نهاية الإيلخانية الموحَّدة
    title_fr: Mort d'Abū Saʿīd Bahādur Khan — fin de l'Ilkhānat unifié
    description_en: |
      Abū Saʿīd ibn Öljeitü Bahādur Khan, ninth and last unified
      Ilkhān of Iran and Iraq, died on 13 Rabīʿ II 736 AH (1
      December 1335 CE) at Qarābāgh in Arrān (modern-day eastern
      Anatolia / western Azerbaijan), aged thirty, while
      campaigning against the Golden Horde under Özbeg Khan. He
      had ascended at twelve in 716 AH under the regency of the
      amīr Chūbān, executed Chūbān in 728 AH after a thirteen-year
      regency, and ruled directly thereafter. His reign restored
      Sunni adherence as the state religion of the Ilkhanate
      (reversing his father Öljeitü's Twelver turn), maintained
      the Mamlūk peace concluded in 723 AH, and oversaw the
      operation of the Tabrīz–Sulṭāniyya court under the
      historian-vizier Ghiyāth al-Dīn Muḥammad — son of Rashīd
      al-Dīn — until that vizier's execution in 736 AH at Abū
      Saʿīd's own death-date. He left no son. The Ilkhanate
      fragmented immediately into rival successor states (the
      Jalāyirid sultanate at Baghdad, the Chūbānid amīrate in
      Azerbaijan, the Sarbadār state in Khurāsān, the Muẓaffarid
      dynasty in Fars), none of which claimed the universal
      Ilkhanid title. Classical Sunni sources mark his death as
      the end of the Ilkhanate proper.
    description_ar: |
      توفي أبو سعيد بن أُلْجايْتُو بهادر خان — تاسع الإيلخانات
      وآخرُ من جمع المُلكَ على إيران والعراق — في ١٣ ربيع الآخر
      ٧٣٦ هـ (١ ديسمبر ١٣٣٥ م) بقَرَه‌باغ بأرّان (في شرقي تركيا
      وغربي أذربيجان اليوم) عن ثلاثين سنة، وهو في حملة على
      القبيلة الذهبية في عهد أزبَك خان. وكان قد تولى وله ثنتا
      عشرة سنة سنة ٧١٦ هـ تحت وصاية الأمير «جوبان»، ثم قتل
      جوبان سنة ٧٢٨ هـ بعد وصايةٍ امتدت ثلاث عشرة سنة، وحكم
      لنفسه من بعدُ مباشرةً. وأعادت ولايته المذهبَ السني ديناً
      للدولة الإيلخانيّة (نقضاً لتشيُّع أبيه)، وحفظت السلامَ
      المملوكي الذي عُقد سنة ٧٢٣ هـ، وأشرفت على عمل بلاطَي
      تبريز وسلطانيّة في وزارة المؤرخ غياث الدين محمد — ابن
      رشيد الدين الهَمَذاني — حتى قُتل الوزير سنة ٧٣٦ هـ في يوم
      وفاة الإيلخان نفسه. ولم يخلِّف ولداً، فانقسمت الإيلخانية
      من فورها إلى دويلات متنافسة: السلطنة الجلائرية ببغداد،
      وإمارة آل جوبان («چوبان») بأذربيجان، ودولة السربَدارية
      بخراسان، والدولة المظفَّريّة بفارس، ولم تطالب أيٌّ منها
      بلقب الإيلخان الجامع. وتسجِّل المصادر السنية الكلاسيكية
      موتَه نهايةً للإيلخانية الموحَّدة فعلاً.
    description_fr: |
      Abū Saʿīd ibn Öljeitü Bahādur Khan, neuvième et dernier
      Ilkhān unifié d'Iran et d'Iraq, mourut le 13 Rabīʿ II 736 H
      (1er décembre 1335 EC) à Qarābāgh en Arrān (dans l'est de
      la Turquie et l'ouest de l'Azerbaïdjan actuels), à l'âge
      de trente ans, alors qu'il était en campagne contre la
      Horde d'Or d'Özbeg Khan. Il était monté sur le trône à
      douze ans en 716 H sous la régence de l'émir Chūbān, avait
      exécuté Chūbān en 728 H après treize ans de régence, et
      régna directement par la suite. Son règne restaura l'adhésion
      sunnite comme religion d'État de l'Ilkhānat (renversant le
      tournant duodécimain de son père Öljeitü), maintint la paix
      mamelouke conclue en 723 H, et présida au fonctionnement de
      la cour Tabrīz–Sulṭāniyya sous le vizirat de l'historien
      Ghiyāth al-Dīn Muḥammad — fils de Rashīd al-Dīn — jusqu'à
      l'exécution du vizir en 736 H le jour même de la mort de
      l'Ilkhān. N'ayant pas laissé de fils, l'Ilkhānat se
      fragmenta aussitôt en États successeurs rivaux (sultanat
      jalāyiride à Bagdad, émirat chūbānide en Azerbaïdjan, État
      sarbadār au Khurāsān, dynastie muẓaffaride en Fars), dont
      aucun ne revendiqua le titre universel ilkhānide. Les
      sources sunnites classiques retiennent sa mort comme la
      fin de l'Ilkhānat proprement dit.
    canonical_hijri: {year: 736, month: 4, day: 13, precision: day}
    canonical_gregorian: {date: 1335-12-01, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr enters the death of Abū Saʿīd in 736 AH at Qarābāgh and the consequent fragmentation of the Ilkhanate."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Abū Saʿīd among the obituaries of 736 AH (al-Dhahabī himself died in 748 AH)."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's al-Durar al-Kāmina gives the biographical entry with the day-precision and details the Sunni-restoration aspect."
      - source_key: ei2
        notes: "EI2 'Abū Saʿīd Bahādur Khan' confirms 13 Rabīʿ II 736 AH/1 December 1335 at Qarābāgh."
