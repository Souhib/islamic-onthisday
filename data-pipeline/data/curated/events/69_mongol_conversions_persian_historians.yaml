    canonical_gregorian: {date: 1077-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the death of the Ghaznavid secretary-historian Abū al-Faḍl al-Bayhaqī in 470 AH and notes the multi-volume Persian chronicle."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Abū al-Faḍl al-Bayhaqī (the historian, distinct from the muḥaddith) among the obituaries of 470 AH."
      - source_key: ei2
        notes: "EI2 'Bayhaḳī, Abū al-Faḍl' confirms 470 AH/1077 and details the Tārīkh-i Masʿūdī as the masterpiece of early Persian historical prose."
