      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Ghazan among the obituaries of 703 AH."
      - source_key: ei2
        notes: "EI2 'Ghāzān' confirms 11 Shawwāl 703 AH/17 May 1304 at Qazwīn."
