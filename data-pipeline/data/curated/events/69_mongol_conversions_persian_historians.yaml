  # =========================================================================
  # PERSIAN HISTORIANS UNDER MONGOL PATRONAGE
  # =========================================================================

  - slug: death-of-ata-malik-al-juwayni-historian
    category: scholar_death
    title_en: Death of ʿAṭāʾ Malik al-Juwaynī — Author of *Tārīkh-i Jahāngushāy*
    title_ar: وفاة عطاء ملك الجويني المؤرخ — صاحب «تاريخ جهانگشاي»
    title_fr: Mort de ʿAṭāʾ Malik al-Juwaynī — auteur du *Tārīkh-i Jahāngushāy*
    description_en: |
      ʿAlāʾ al-Dīn ʿAṭāʾ Malik ibn Muḥammad al-Juwaynī — Persian
      secretary in the Mongol service who served as governor of
      Baghdad under Hulagu and his successors for over twenty
      years (657–681 AH) — died at Mūghān (in Azerbaijan) in
      681 AH (1283 CE) aged about fifty-seven, distinct from his
      Sunni-Shāfiʿī namesake Imām al-Ḥaramayn al-Juwaynī (d. 478
      AH), the Ashʿarī jurist of Nīshāpūr. His *Tārīkh-i Jahāngushāy*
      ("History of the World-Conqueror") composed in Persian
      between 650 and 658 AH at Hulagu's encampment, narrates in
      three volumes the rise of Chinggis Khan, the Khwarazmshāh
      campaign, and the Ismāʿīlī state of Alamūt — the last of
      which he had personally witnessed the destruction of in
      654 AH at Hulagu's side. The chronicle is the principal
      contemporary Muslim source for the Mongol conquests
      (alongside Ibn al-Athīr's earlier and shorter account in
      Arabic) and is unique in giving the perspective of an
      Iranian Muslim official inside the Mongol administration.
      Despite long service to the pagan Ilkhāns, Juwaynī remained
      a practising Sunni Muslim throughout; he was tortured to
      death after political enemies (chiefly the rival vizier
      Majd al-Mulk) levelled embezzlement charges against him at
      Hulagu's son Abagha's court and the matter was finally
      resolved against him under Aḥmad Tegüder.
    description_ar: |
      توفي علاء الدين عطاء ملك بن محمد الجويني — الكاتب الفارسي في
      الديوان المغولي، وكان والياً على بغداد للإيلخان وخلفائه أكثر
      من عشرين سنة (٦٥٧–٦٨١ هـ) — بمَوغان (في أذربيجان) سنة ٦٨١
      هـ (١٢٨٣ م) عن نحو سبع وخمسين سنة، وهو غيرُ سميِّه إمام
      الحرمين الجويني الشافعي الأشعري (ت ٤٧٨ هـ) إمام الفقه
      السني في نيسابور. ولـ«تاريخ جهانگشاي» (تاريخ فاتح العالم)،
      الذي صنّفه بالفارسية بين سنتي ٦٥٠ و ٦٥٨ هـ في معسكر
      هولاكو، رواية ثلاثية الأجزاء لظهور جنكيز خان، وحملة
      الخوارزمشاه، ودولة الإسماعيلية بألموت — وقد شهد عطاءُ ملك
      نهاية الأخيرة بنفسه سنة ٦٥٤ هـ بصُحبة هولاكو. وهذا التاريخ
      هو المصدر المعاصر المسلم الرئيس لفتوحات المغول (مع رواية
      ابن الأثير الأعجل والأقصر بالعربية)، وهو فريدٌ في تقديم
      وجهة نظر موظف مسلم إيراني داخل الإدارة المغولية. ومع طول
      خدمته للإيلخانات الوثنيين، بقي الجويني مسلماً سنياً عاملاً
      بدينه؛ وعُذِّب حتى الموت بعد أن وجَّه إليه خصومُه السياسيون
      (وعلى رأسهم الوزير المنافس مجد الملك) تهماً بالاختلاس في
      بلاط الإيلخان أبَغا بن هولاكو، ثم بُتَّ في الأمر ضدّه نهائياً
      في عهد أحمد تَكُودار.
    description_fr: |
      ʿAlāʾ al-Dīn ʿAṭāʾ Malik ibn Muḥammad al-Juwaynī — secrétaire
      persan au service mongol qui servit comme gouverneur de
      Bagdad sous Hulagu et ses successeurs pendant plus de vingt
      ans (657–681 H) — mourut à Mūghān (en Azerbaïdjan) en 681 H
      (1283 EC) à l'âge d'environ cinquante-sept ans, à distinguer
      de son homonyme sunnite-shāfiʿī Imām al-Ḥaramayn al-Juwaynī
      (m. 478 H), le juriste ashʿarī de Nīshāpūr. Son *Tārīkh-i
      Jahāngushāy* (« Histoire du Conquérant du monde »), composé
      en persan entre 650 et 658 H au campement de Hulagu, narre
      en trois volumes l'ascension de Gengis Khan, la campagne du
      Khwārazmshāh et l'État ismaélien d'Alamūt — dont il avait
      personnellement assisté à la destruction en 654 H aux côtés
      de Hulagu. La chronique est la principale source musulmane
      contemporaine sur les conquêtes mongoles (aux côtés du
      récit antérieur et plus bref d'Ibn al-Athīr en arabe) et
      est unique en donnant la perspective d'un fonctionnaire
      musulman iranien à l'intérieur de l'administration mongole.
      Malgré son long service auprès des Ilkhāns païens, Juwaynī
      demeura un musulman sunnite pratiquant tout au long de sa
      vie ; il fut torturé à mort après que ses ennemis politiques
      (au premier chef le vizir rival Majd al-Mulk) l'eurent
      accusé de détournement de fonds à la cour d'Abagha, fils
      de Hulagu, et que l'affaire eut été tranchée contre lui
      sous Aḥmad Tegüder.
    canonical_hijri: {year: 681, precision: year}
    canonical_gregorian: {date: 1283-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "al-Dhahabī enters ʿAṭāʾ Malik al-Juwaynī (the historian-secretary, distinct from Imām al-Ḥaramayn) among the obituaries of 681 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the death of the Mongol-era governor-historian Juwaynī in 681 AH and notes the Tārīkh-i Jahāngushāy."
      - source_key: ei2
        notes: "EI2 'D̲j̲uwaynī, ʿAlāʾ al-Dīn' confirms 681 AH/1283 and details the chronicle and its place in the Mongol-era Persian historiography."
    tags: [mongol-era, ilkhanid, persian-historian, jahangushay, scholar_death, baghdad]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: execution-of-rashid-al-din-hamadhani
    category: political_event
    title_en: Execution of Rashīd al-Dīn Hamadhānī — Vizier-Historian of *Jāmiʿ al-Tawārīkh*
    title_ar: مقتل رشيد الدين الهَمَذاني — وزير «جامع التواريخ» ومؤرخه
    title_fr: Exécution de Rashīd al-Dīn Hamadhānī — vizir et historien du *Jāmiʿ al-Tawārīkh*
    description_en: |
      Rashīd al-Dīn Faḍl Allāh ibn ʿImād al-Dawla Abū al-Khayr
      ibn Muwaffaq al-Dawla al-Hamadhānī — Persian historian,
      polymath, physician, and Ilkhanid vizier — was executed at
      Sulṭāniyya on 30 Jumādā I 718 AH (18 July 1318 CE), aged
      about seventy-one. Born to a Jewish family of Hamadhān, he
      had converted to Islam in his thirties and risen in
      Ilkhanid service first as court physician to Abagha, then
      as vizier under Ghazan and Öljeitü from 697 AH onward. His
      *Jāmiʿ al-Tawārīkh* ("Compendium of Chronicles"), commissioned
      by Ghazan and completed under Öljeitü in 710 AH, was the
      first attempt at a true universal history in Islamic
      historiography — covering the Mongols, the Turks, the
      Chinese (with information drawn from Mongol and Chinese
      informants at the Ilkhanid court), the Indians, the Jews,
      and the Christians alongside the standard Islamic narrative,
      illustrated in lavish manuscript copies (the Edinburgh and
      Khalili fragments survive). Under Abū Saʿīd's regency he
      was charged with poisoning Öljeitü; the charge was almost
      certainly engineered by his rival the vizier Tāj al-Dīn
      ʿAlī Shāh. Rashīd al-Dīn was beheaded together with his son
      and his head sent for ten days through the streets of
      Tabrīz; his vast endowed quarter at Tabrīz (the *Rabʿ-i
      Rashīdī*) was confiscated. His grandson Ghiyāth al-Dīn
      Muḥammad would serve as Abū Saʿīd's vizier in turn until
      his own execution in 736 AH.
    description_ar: |
      قُتل رشيد الدين فضل الله بن عماد الدولة أبي الخير بن موفق
      الدولة الهَمَذاني — المؤرخ الفارسي، والموسوعيُّ الطبيبُ
      الوزير الإيلخاني — بسلطانية في ٣٠ جمادى الأولى ٧١٨ هـ (١٨
      يوليوز ١٣١٨ م) عن نحو إحدى وسبعين سنة. وُلد لأسرةٍ يهودية
      من أهل هَمَذان، فأسلم في ثلاثينياته، وترقّى في الديوان
      الإيلخاني طبيباً للبلاط في عهد أبَغا، ثم وزيراً لغازان
      وأُلْجايْتُو من سنة ٦٩٧ هـ. وكان «جامع التواريخ» الذي كلَّفه به
      غازان وأكمله في عهد أُلْجايْتُو سنة ٧١٠ هـ أوّلَ محاولةٍ
      لتاريخ عالمي حقّ في علم التاريخ الإسلامي — يضمّ المغولَ،
      والأتراك، والصينيين (بمعلومات من مخبرين مغول وصينيين في
      البلاط الإيلخاني)، والهنود، واليهود، والنصارى إلى السرد
      الإسلامي المعتاد، مزدانةً نسخُه الأصلية بالمنمنمات الفاخرة
      (وما تزال شذرات «أدنبره» و«مكتبة الخليلي» شاهدةً على ذلك).
      وفي عهد وصاية أبي سعيد رُمي بتسميم أُلْجايْتُو — تهمة كاد
      أن يدبّرها يقيناً منافسُه الوزيرُ تاج الدين علي شاه — فقُطعت
      رأسه ورأسُ ابنه، وطيف برأسه عشرة أيام في شوارع تبريز،
      وصودرت ضاحيتُه الموقوفة الواسعة في تبريز («الرَّبع
      الرشيدي»). وسيتولى حفيدُه غياث الدين محمد وزارةَ أبي سعيد
      من بعدُ، إلى أن قُتل بدوره سنة ٧٣٦ هـ.
    description_fr: |
      Rashīd al-Dīn Faḍl Allāh ibn ʿImād al-Dawla Abū al-Khayr ibn
      Muwaffaq al-Dawla al-Hamadhānī — historien persan, polymathe,
      médecin et vizir ilkhānide — fut exécuté à Sulṭāniyya le 30
      Jumādā I 718 H (18 juillet 1318 EC), à l'âge d'environ
      soixante et onze ans. Né dans une famille juive de Hamadhān,
      il s'était converti à l'islam dans la trentaine et s'était
      élevé dans le service ilkhānide d'abord comme médecin de
      cour sous Abagha, puis comme vizir sous Ghazan et Öljeitü à
      partir de 697 H. Son *Jāmiʿ al-Tawārīkh* (« Recueil des
      chroniques »), commandé par Ghazan et achevé sous Öljeitü
      en 710 H, fut la première tentative d'une véritable histoire
      universelle dans l'historiographie islamique — couvrant les
      Mongols, les Turcs, les Chinois (avec des informations
      tirées d'informateurs mongols et chinois à la cour
      ilkhānide), les Indiens, les Juifs et les Chrétiens aux
      côtés du récit islamique standard, illustré dans de
      somptueuses copies manuscrites (les fragments d'Édimbourg
      et de la Khalili Collection subsistent). Sous la régence
      d'Abū Saʿīd, il fut accusé d'avoir empoisonné Öljeitü ;
      l'accusation fut presque certainement orchestrée par son
      rival le vizir Tāj al-Dīn ʿAlī Shāh. Rashīd al-Dīn fut
      décapité avec son fils et sa tête promenée dix jours dans
      les rues de Tabrīz ; son vaste quartier d'awqāf à Tabrīz
      (le *Rabʿ-i Rashīdī*) fut confisqué. Son petit-fils
      Ghiyāth al-Dīn Muḥammad servirait à son tour comme vizir
      d'Abū Saʿīd jusqu'à sa propre exécution en 736 H.
    canonical_hijri: {year: 718, month: 5, day: 30, precision: day}
    canonical_gregorian: {date: 1318-07-18, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya enters the execution of Rashīd al-Dīn Hamadhānī under the events of 718 AH and notes the political background."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's al-Durar al-Kāmina (8th AH century notables) gives the biographical entry with the day-precision."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Rashīd al-Dīn among the obituaries of 718 AH."
      - source_key: ei2
        notes: "EI2 'Rashīd al-Dīn Ṭabīb' confirms 30 Jumādā I 718 AH/18 July 1318 at Sulṭāniyya."
    tags: [mongol-era, ilkhanid, persian-historian, jami-al-tawarikh, vizier, execution]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-hamdallah-mustawfi-qazwini
    category: scholar_death
    title_en: Death of Hamd Allāh Mustawfī Qazwīnī — Author of *Tārīkh-i Guzīda*
    title_ar: وفاة حمد الله المستوفي القزويني — صاحب «تاريخ گزيده»
    title_fr: Mort de Hamd Allāh Mustawfī Qazwīnī — auteur du *Tārīkh-i Guzīda*
    description_en: |
      Hamd Allāh ibn Abī Bakr ibn Aḥmad al-Mustawfī al-Qazwīnī —
      Persian historian, geographer, and Ilkhanid fiscal
      administrator (his title *Mustawfī* meaning "fiscal
      controller") — died around 750 AH (1349 CE) at Qazwīn,
      distinct from Zakariyyā al-Qazwīnī the cosmographer (d. 682
      AH/1283), author of *ʿAjāʾib al-Makhlūqāt*. He served in the
      financial administration of the Ilkhanate under Rashīd
      al-Dīn Hamadhānī and continued under Abū Saʿīd. His
      principal works are three: the *Tārīkh-i Guzīda*
      ("Selected History"), a Persian universal chronicle
      completed in 730 AH and dedicated to Ghiyāth al-Dīn
      Muḥammad (Rashīd al-Din's son) — a digest of Islamic and
      Iranian history from creation to his own day; the
      *Nuzhat al-Qulūb* ("Recreation of Hearts"), a
      cosmographical-geographical work completed around 740 AH
      that is a primary source for the medieval geography of
      Iran, Mesopotamia, the Caucasus, and Anatolia; and the
      *Ẓafarnāma*, a 75,000-line Persian verse continuation of
      Firdawsī's *Shāhnāma* covering Islamic history. His
      precision on tax registers and post-stages makes the
      *Nuzhat al-Qulūb* one of the great quantitative documents
      of medieval Iranian history.
    description_ar: |
      توفي حمد الله بن أبي بكر بن أحمد المستوفي القزويني —
      المؤرخ والجغرافي الفارسي والمستوفي (الناظر المالي) في
      الديوان الإيلخاني — قُرابة سنة ٧٥٠ هـ (١٣٤٩ م) بقَزوين،
      وهو غيرُ زكريا القزويني الكوسموغرافي (ت ٦٨٢ هـ/١٢٨٣ م)
      صاحب «عجائب المخلوقات». وكان قد خدم في الديوان المالي
      الإيلخاني تحت رشيد الدين الهَمَذاني، واستمر في خدمته في
      عهد أبي سعيد. وأمَّاتُ مؤلَّفاته ثلاث: «تاريخ گزيده» — تاريخٌ
      فارسي عام أتمَّه سنة ٧٣٠ هـ وأهداه لغياث الدين محمد ابن
      رشيد الدين، خلاصةً للتاريخ الإسلامي والإيراني من بدء الخلق
      إلى يومه؛ و«نزهة القلوب» — كتاب جغرافي–كوسموغرافي أتمَّه
      نحو سنة ٧٤٠ هـ، وهو من المصادر الأولى للجغرافيا الوسيطة
      لإيران والعراق والقفقاس وأناضولية؛ و«ظفرنامة» — منظومة
      فارسية في خمسةٍ وسبعين ألف بيت، تمديدٌ لـ«شاهنامة» الفردوسي
      تتناول التاريخ الإسلامي. ودقّتُه في سجلات الضرائب ومحطات
      البريد جعلت «نزهة القلوب» من أعظم الوثائق الكميَّة لتاريخ
      إيران الوسيط.
    description_fr: |
      Hamd Allāh ibn Abī Bakr ibn Aḥmad al-Mustawfī al-Qazwīnī —
      historien et géographe persan, et fonctionnaire fiscal
      ilkhānide (son titre de *Mustawfī* signifiant « contrôleur
      fiscal ») — mourut vers 750 H (1349 EC) à Qazwīn ; à
      distinguer de Zakariyyā al-Qazwīnī le cosmographe (m. 682
      H/1283), auteur des *ʿAjāʾib al-Makhlūqāt*. Il avait servi
      dans l'administration financière de l'Ilkhānat sous Rashīd
      al-Dīn Hamadhānī, puis continua sous Abū Saʿīd. Ses œuvres
      principales sont au nombre de trois : le *Tārīkh-i Guzīda*
      (« Histoire choisie »), chronique universelle persane
      achevée en 730 H et dédiée à Ghiyāth al-Dīn Muḥammad (le
      fils de Rashīd al-Dīn) — un précis d'histoire islamique et
      iranienne depuis la création jusqu'à son temps ; le
      *Nuzhat al-Qulūb* (« Récréation des cœurs »), ouvrage
      cosmographique et géographique achevé vers 740 H qui est
      l'une des sources premières de la géographie médiévale de
      l'Iran, de la Mésopotamie, du Caucase et de l'Anatolie ; et
      le *Ẓafarnāma*, un poème persan de 75 000 vers prolongeant
      le *Shāhnāma* de Firdawsī et couvrant l'histoire islamique.
      Sa précision sur les registres fiscaux et les relais
      postaux fait du *Nuzhat al-Qulūb* l'un des grands documents
      quantitatifs de l'histoire iranienne médiévale.
    canonical_hijri: {year: 750, precision: year}
    canonical_gregorian: {date: 1349-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar's al-Durar al-Kāmina enters Hamd Allāh Mustawfī (the Qazwīnī historian-mustawfī, distinct from the cosmographer Zakariyyā) among the 8th AH century notables; year-only attestation."
      - source_key: ei2
        notes: "EI2 'Ḥamd Allāh al-Mustawfī al-Ḳazwīnī' confirms ~750 AH/c. 1349 and details the three principal works."
    tags: [mongol-era, ilkhanid, persian-historian, geographer, mustawfi, qazwin, scholar_death]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-banakati
    category: scholar_death
    title_en: Death of Banākatī — Author of *Tārīkh-i Banākatī*
    title_ar: وفاة البَناكَتي — صاحب «تاريخ بَناكَتي»
    title_fr: Mort de Banākatī — auteur du *Tārīkh-i Banākatī*
    description_en: |
      Abū Sulaymān Dāwūd ibn Tāj al-Dīn Abī al-Faḍl Muḥammad
      al-Banākatī — Persian historian and *malik al-shuʿarāʾ*
      (court poet laureate) of Ghazan Khan, named for his birth
      town Banākat on the Syr Darya in Transoxiana — died around
      730 AH (1330 CE). His *Rawḍat ulī al-Albāb fī Maʿrifat
      al-Tawārīkh wa-l-Ansāb* — popularly known simply as
      *Tārīkh-i Banākatī* — completed in 717 AH and dedicated to
      Abū Saʿīd Bahādur Khan, is a one-volume Persian universal
      history that is essentially a compact recension of Rashīd
      al-Dīn's *Jāmiʿ al-Tawārīkh* with additional material from
      Juwaynī's *Jahāngushāy* and from the author's own time at
      court. Though Banākatī's work has often been treated as
      derivative, it preserves source material from now-lost
      Ilkhanid documents, has its own distinctive arrangement
      (chronological by world region rather than dynasty), and is
      a primary witness for Ghazan's literary court. Banākatī is
      also remembered for his poetry in Persian and for being
      among the cultural figures who signalled the maturation of
      Persian as the chancery language of the Ilkhanid–early-post-
      Ilkhanid order.
    description_ar: |
      توفي أبو سليمان داود بن تاج الدين أبي الفضل محمد البَناكَتي
      — المؤرخ الفارسي و«ملك الشعراء» في بلاط غازان خان، نسبةً
      إلى بلدته «بَناكَت» على نهر سَيحون بما وراء النهر — قُرابة
      سنة ٧٣٠ هـ (١٣٣٠ م). و«روضة أولي الألباب في معرفة
      التواريخ والأنساب» — المعروف باختصار «تاريخ بَناكَتي» —
      أتمَّه سنة ٧١٧ هـ وأهداه لأبي سعيد بهادر خان، وهو تاريخ
      فارسي عالمي في مجلَّد واحد، تركيز ومختصرٌ لـ«جامع التواريخ»
      للهَمَذاني، مع زيادات من «جهانگشاي» الجويني ومن مشاهدات
      المؤلف نفسه في البلاط. ومع أن أعمال البَناكَتي عُدّت في
      الغالب فرعية تابعة، فإنها تحفظ موادَّ من وثائق إيلخانية
      ضائعة، ولها ترتيبها المميز (زمنيٌّ على مبدأ الإقليم لا
      السلالة)، وهي شاهد أوّل على بلاط غازان الأدبي. وذُكر
      البَناكَتي أيضاً بشعره الفارسي، وبكونه من رموز نضج اللغة
      الفارسية لساناً ديوانياً للنظام الإيلخاني وما بعده مباشرةً.
    description_fr: |
      Abū Sulaymān Dāwūd ibn Tāj al-Dīn Abī al-Faḍl Muḥammad
      al-Banākatī — historien persan et *malik al-shuʿarāʾ*
      (poète laureat de cour) de Ghazan Khan, nommé d'après sa
      ville natale de Banākat sur le Syr-Daria en Transoxiane —
      mourut vers 730 H (1330 EC). Son *Rawḍat ulī al-Albāb fī
      Maʿrifat al-Tawārīkh wa-l-Ansāb* — populairement connu
      simplement sous le nom de *Tārīkh-i Banākatī* — achevé en
      717 H et dédié à Abū Saʿīd Bahādur Khan, est une histoire
      universelle persane en un seul volume qui est essentiellement
      une recension compacte du *Jāmiʿ al-Tawārīkh* de Rashīd
      al-Dīn, avec un apport supplémentaire du *Jahāngushāy* de
      Juwaynī et des observations de l'auteur lui-même à la cour.
      Bien que l'œuvre de Banākatī ait souvent été considérée
      comme dérivative, elle préserve du matériel source provenant
      de documents ilkhānides aujourd'hui perdus, possède un
      arrangement distinctif qui lui est propre (chronologique
      par région du monde plutôt que par dynastie) et est un
      témoin de premier plan de la cour littéraire de Ghazan.
      Banākatī est également retenu pour sa poésie persane et
      pour avoir été l'une des figures culturelles signalant la
      maturation du persan comme langue de chancellerie de
      l'ordre ilkhānide et de l'immédiat post-ilkhānide.
    canonical_hijri: {year: 730, precision: year}
    canonical_gregorian: {date: 1330-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar's al-Durar al-Kāmina enters Banākatī among the 8th AH century notables; year-only attestation around 730 AH."
      - source_key: ei2
        notes: "EI2 'Banākatī' confirms ~730 AH/1330 and the Tārīkh-i Banākatī as a Persian universal history derivative of the Jāmiʿ al-Tawārīkh."
