  # =========================================================================
  # CONQUEST OF EGYPT AND TRANSLATIO IMPERII (358 AH)
  # =========================================================================

  - slug: jawhar-conquers-egypt
    category: conquest
    title_en: Conquest of Egypt by Jawhar al-Ṣiqillī
    title_ar: فتح جوهر الصقلي مصر
    title_fr: Conquête de l'Égypte par Jawhar al-Ṣiqillī
    description_en: |
      Jawhar ibn ʿAbd Allāh al-Ṣiqillī, freedman commander of
      the Fatimid armies under caliph al-Muʿizz li-Dīn Allāh,
      entered Fusṭāṭ at the head of an army of approximately
      one hundred thousand North African and Kutāma Berber
      troops, ending the Ikhshīdid amirate and bringing Egypt
      into the Fatimid caliphate. The campaign — long planned
      under al-Muʿizz and his vizier Yaʿqūb ibn Killis — had
      crossed nearly two thousand miles from the Maghreb,
      negotiated a peaceful surrender with the Ikhshīdid
      vizier Abū al-Faḍl Jaʿfar ibn al-Furāt, and entered
      Fusṭāṭ without a major battle. Jawhar's *amān* (safe-
      conduct) protected the Sunni populace and confirmed the
      *ahl al-dhimma* in their existing rights, but altered
      the ʿAbbāsid khuṭba of the city to name al-Muʿizz
      al-Faṭimid as caliph, signalling the formal *translatio
      imperii* from Sunni to Fatimid sovereignty. Within weeks
      Jawhar would lay out the foundations of a new royal
      city, al-Qāhira, north of Fusṭāṭ; al-Azhar's foundation
      followed the next year. Classical sources (Ibn al-Athīr,
      al-Dhahabī, Ibn Kathīr) treat the conquest as one of the
      decisive political turning-points of the fourth Hijri
      century.
    description_ar: |
      دخل جوهر بن عبد الله الصقلي — مولى المعز لدين الله
      وقائد جيوش الدولة الفاطمية — مدينة «الفسطاط» على رأس
      جيش يقارب مائة ألف مقاتل من البربر الكتاميين وأهل شمال
      أفريقيا، فأنهى دخوله إمارةَ الإخشيديين، وأدخل مصر في
      الخلافة الفاطمية. وكانت الحملة — المعدّة من قبل في
      عهد المعز ووزيره يعقوب بن كِلِّس — قد قطعت قرابة
      الألفي ميل من المغرب، وتفاوضت على استسلام سلمي مع
      وزير الإخشيديين أبي الفضل جعفر بن الفرات، ودخلت
      الفسطاط دون قتال كبير. وحفظ الأمان الذي أصدره جوهر
      دماء أهل السنة وحقوقهم، وثبّت أهل الذمّة على ما
      كانوا عليه، غير أنه غيّر خطبة المدينة العباسية
      فجعلها للمعز الفاطمي خليفةً، إعلاناً برسوّ السلطة
      من الشرعية السنّية إلى الشرعية الفاطمية. وفي
      أسابيع وضع جوهر أساس مدينة ملكية جديدة شمال
      الفسطاط هي «القاهرة»، وتلاها في العام التالي
      تأسيس «الأزهر». ويصف المؤرخون الكلاسيكيون (ابن
      الأثير والذهبي وابن كثير) هذه الفتحَ من أعظم
      المنعطفات السياسية في القرن الرابع الهجري.
    description_fr: |
      Jawhar ibn ʿAbd Allāh al-Ṣiqillī, affranchi commandant
      les armées fātimides sous le calife al-Muʿizz li-Dīn
      Allāh, entra à Fusṭāṭ à la tête d'une armée d'environ
      cent mille hommes — Berbères Kutāma et Maghrébins —,
      mettant fin à l'émirat ikhshīdide et faisant entrer
      l'Égypte dans le califat fātimide. Préparée de longue
      date par al-Muʿizz et son vizir Yaʿqūb ibn Killis, la
      campagne avait franchi près de trois mille kilomètres
      depuis le Maghreb, négocié une reddition pacifique
      avec le vizir ikhshīdide Abū al-Faḍl Jaʿfar ibn al-Furāt
      et pénétré dans Fusṭāṭ sans bataille majeure. L'*amān*
      (sauf-conduit) délivré par Jawhar protégea la population
      sunnite et confirma les *ahl al-dhimma* dans leurs
      droits existants, mais modifia la khuṭba ʿabbāsside de
      la ville pour y proclamer al-Muʿizz le Fātimide comme
      calife, signalant le *translatio imperii* formel de la
      souveraineté sunnite à la souveraineté fātimide. En
      quelques semaines Jawhar tracerait les fondations d'une
      nouvelle ville royale, al-Qāhira, au nord de Fusṭāṭ;
      la fondation d'al-Azhar suivrait l'année suivante. Les
      sources classiques (Ibn al-Athīr, al-Dhahabī, Ibn Kathīr)
      tiennent la conquête pour l'un des tournants politiques
      décisifs du IVᵉ siècle hégirien.
    canonical_hijri: {year: 358, month: 8, day: 17, precision: day}
    canonical_gregorian: {date: 969-07-11, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates Jawhar's entry into Fusṭāṭ to Shaʿbān 358 AH and quotes the text of his amān."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya enters the conquest of Egypt under 358 AH and describes the change of khuṭba."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms 358 AH for the Fatimid takeover of Egypt and the entry of Jawhar."
    people: [[jawhar-al-siqilli, leader], [al-muizz-li-din-allah, leader]]
    tags: [fatimid, conquest, egypt, fustat, jawhar, ikhshidid]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # FATIMID HIGH NOON IN EGYPT (365-487 AH)
  # =========================================================================

  - slug: death-of-al-muizz-li-din-allah
    category: ruler_death
    title_en: Death of al-Muʿizz li-Dīn Allāh — Founder of Fatimid Egypt
    title_ar: وفاة المعز لدين الله — مؤسس الدولة الفاطمية بمصر
    title_fr: Mort d'al-Muʿizz li-Dīn Allāh — fondateur de l'Égypte fātimide
    description_en: |
      Abū Tamīm Maʿadd al-Muʿizz li-Dīn Allāh, fourth Fatimid
      caliph, died at Cairo at age about 45, three years after
      moving the Fatimid capital from al-Manṣūriyya in
      Ifrīqiya to the new royal city built by Jawhar al-
      Ṣiqillī north of Fusṭāṭ. His twenty-three-year reign
      represents the apex of Fatimid expansion: the conquest
      of Egypt by Jawhar in 358 AH, the foundation of al-
      Qāhira, the establishment of al-Azhar (mosque-college
      from 361 AH), the first khuṭba in the new Fatimid
      capital naming him as caliph (362 AH), and the assertion
      of Fatimid claims as far as Mecca and Medina, where the
      khuṭba was changed in his name. He was succeeded by his
      son al-ʿAzīz bi-Allāh. Classical Sunni historians treat
      him as the most consequential of the Fatimid caliphs
      after the founder al-Mahdī; al-Maqrīzī's *al-Khiṭaṭ*
      preserves a detailed eyewitness account of the
      ceremonial transfer of the dynasty's coffers from
      al-Manṣūriyya to Cairo.
    description_ar: |
      توفي أبو تميم معدّ «المعز لدين الله» — رابع الخلفاء
      الفاطميين — بالقاهرة عن نحو خمس وأربعين سنة، بعد
      ثلاث سنين من نقل عاصمة الفاطميين من «المنصورية»
      بإفريقية إلى المدينة الملكية الجديدة التي بناها
      جوهر الصقلي شمالي الفسطاط. ويمثّل عهده الذي امتدّ
      ثلاثاً وعشرين سنة ذروةَ التوسع الفاطمي: فتح مصر
      على يد جوهر سنة ٣٥٨ هـ، وتأسيس «القاهرة»، وإقامة
      «الأزهر» جامعاً ومدرسة منذ ٣٦١ هـ، وأول خطبة في
      العاصمة الفاطمية الجديدة باسمه خليفةً (٣٦٢ هـ)،
      وامتداد الدعوة الفاطمية إلى الحرمين الشريفين حيث
      غُيّرت الخطبة باسمه. وخلفه ابنه «العزيز بالله».
      ويعدّه المؤرخون الكلاسيكيون من أهل السنة أعظم
      الخلفاء الفاطميين بعد المؤسس المهدي؛ ويحفظ
      «الخِطط» للمقريزي رواية شاهد عيان مفصّلة عن نقل
      الموكب الخلافي وخزائن الدولة من المنصورية إلى
      القاهرة.
    description_fr: |
      Abū Tamīm Maʿadd al-Muʿizz li-Dīn Allāh, quatrième
      calife fātimide, mourut au Caire vers quarante-cinq
      ans, trois ans après avoir transféré la capitale
      fātimide d'al-Manṣūriyya, en Ifrīqiya, vers la
      nouvelle ville royale bâtie par Jawhar al-Ṣiqillī
      au nord de Fusṭāṭ. Son règne de vingt-trois ans
      représente l'apogée de l'expansion fātimide : la
      conquête de l'Égypte par Jawhar en 358 H, la
      fondation d'al-Qāhira, l'établissement d'al-Azhar
      comme mosquée-collège dès 361 H, la première khuṭba
      dans la nouvelle capitale fātimide en son nom (362 H),
      et l'extension des prétentions fātimides jusqu'à La
      Mecque et Médine, où la khuṭba fut modifiée à son nom.
      Lui succéda son fils al-ʿAzīz bi-Allāh. Les historiens
      sunnites classiques le tiennent pour le plus
      déterminant des califes fātimides après le fondateur
      al-Mahdī; les *Khiṭaṭ* d'al-Maqrīzī conservent un
      récit de témoin oculaire détaillé du transfert
      cérémoniel des coffres dynastiques d'al-Manṣūriyya
      au Caire.
