  - slug: death-of-al-mustansir-fatimid
    category: ruler_death
    title_en: Death of al-Mustanṣir bi-Allāh — Longest Fatimid Reign
    title_ar: وفاة المستنصر بالله — أطول عهود الفاطميين
    title_fr: Mort d'al-Mustanṣir bi-Allāh — le plus long règne fātimide
    description_en: |
      Abū Tamīm Maʿadd al-Mustanṣir bi-Allāh, eighth Fatimid
      caliph, died at Cairo after a sixty-year reign — the
      longest in Fatimid history and one of the longest
      reigns in any medieval Islamic dynasty — at age about
      66. His tenure spanned the high noon of Fatimid Egypt
      and its catastrophic mid-century crisis: the *al-shidda
      al-ʿuẓmā* ("the great hardship") of c. 457-466 AH, an
      eight-year famine and breakdown of central authority
      that emptied Cairo of food and population; the
      collapse of Fatimid claims in North Africa after the
      Zīrid renunciation of allegiance and the Hilālī
      invasion of Ifrīqiya; the loss of Sicily to the
      Normans; and finally the rescue of the dynasty by the
      Armenian general Badr al-Jamālī, summoned from Acre in
      466 AH, who restored order and made the vizierate
      effectively hereditary in his family. Al-Mustanṣir's
      death precipitated the Nizārī-Mustaʿlī schism the
      following year. Classical sources treat his reign as
      the turning-point in Fatimid history.
    description_ar: |
      توفي أبو تميم معدّ «المستنصر بالله» — ثامن الخلفاء
      الفاطميين — بالقاهرة بعد ستين سنة من الحكم، وهي
      أطول عهود الفاطميين، ومن أطول عهود حكام الإسلام
      في القرون الوسطى، عن نحو ست وستين سنة. وقد جمع
      عهده ذروةَ الدولة الفاطمية بمصر وأزمتها المنتصفية
      الكارثية: «الشدّة العظمى» (نحو ٤٥٧-٤٦٦ هـ) — وهي
      مجاعة ثماني سنين وانهيار للسلطة المركزية أفرغت
      القاهرة من الطعام والسكان — وانهيار الولاء الفاطمي
      في شمال أفريقيا بعد قطع الزِّيريين الخطبةَ
      وزحف بني هلال على إفريقية، وضياع صقلية بأيدي
      النورمان، ثم إنقاذ الدولة بالأمير الأرمني بدر
      الجَمَالي الذي استدعاه من عكا سنة ٤٦٦ هـ، فأعاد
      النظام وجعل الوزارة عملياً وراثة في بيته. وأشعلت
      وفاة المستنصر فتنةَ النزارية والمستعلية في العام
      التالي. ويعدّ المؤرخون الكلاسيكيون عهدَه نقطة
      تحوّل في تاريخ الفاطميين.
    description_fr: |
      Abū Tamīm Maʿadd al-Mustanṣir bi-Allāh, huitième
      calife fātimide, mourut au Caire après soixante ans
      de règne — le plus long de l'histoire fātimide et
      l'un des plus longs des dynasties islamiques
      médiévales — vers soixante-six ans. Son temps couvre
      l'apogée de l'Égypte fātimide et sa crise médiane
      catastrophique : la *al-shidda al-ʿuẓmā* (« grande
      détresse ») de ca. 457-466 H, famine de huit années
      et effondrement de l'autorité centrale qui vida le
      Caire de nourriture et de population; l'effondrement
      des allégeances fātimides en Afrique du Nord après
      la rupture zīride et l'invasion hilālienne de
      l'Ifrīqiya; la perte de la Sicile au profit des
      Normands; et enfin le sauvetage de la dynastie par
      le général arménien Badr al-Jamālī, mandé d'Acre en
      466 H, qui rétablit l'ordre et rendit le vizirat
      effectivement héréditaire dans sa famille. La mort
      d'al-Mustanṣir précipita le schisme nizārī-mustaʿlī
      l'année suivante. Les sources classiques voient
      son règne comme le pivot de l'histoire fātimide.
