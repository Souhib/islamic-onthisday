    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-zahir-fatimid
    category: ruler_death
    title_en: Death of al-Ẓāhir li-Iʿzāz Dīn Allāh
    title_ar: وفاة الظاهر لإعزاز دين الله
    title_fr: Mort d'al-Ẓāhir li-Iʿzāz Dīn Allāh
    description_en: |
      Abū al-Ḥasan ʿAlī al-Ẓāhir li-Iʿzāz Dīn Allāh, seventh
      Fatimid caliph and son of al-Ḥākim, died at Cairo at
      age about 32, after a sixteen-year reign that began
      under the regency of his powerful aunt Sitt al-Mulk
      and continued through severe famines and political
      reversals in Syria. His reign saw the loss of effective
      Fatimid control over significant portions of Syria to
      Byzantine and resurgent Arab tribal pressure, and the
      famine of 414-416 AH that classical historians describe
      as one of the worst in Egyptian memory. Civil
      administration shifted decisively into the hands of the
      vizierate, particularly under the Christian convert
      vizier Abū al-Qāsim ʿAlī al-Jarjarāʾī. He was succeeded
      by his seven-year-old son al-Mustanṣir bi-Allāh, whose
      sixty-year reign would be the longest in Fatimid history
      and would witness the dynasty's slow collapse.
    description_ar: |
      توفي أبو الحسن علي «الظاهر لإعزاز دين الله» — سابع
      الخلفاء الفاطميين وابن الحاكم — بالقاهرة عن نحو
      اثنتين وثلاثين سنة، بعد عهد دام ست عشرة سنة بدأ
      تحت نيابة عمته القوية «ست الملك» واستمرّ خلال
      مجاعات شديدة ونكسات سياسية بالشام. وشهد عهده
      ضياع السلطة الفاطمية الفعلية على أجزاء واسعة من
      الشام بضغط البيزنطيين وقبائل العرب الصاعدة،
      ومجاعة سنة ٤١٤-٤١٦ هـ التي يصفها المؤرخون
      الكلاسيكيون بأشدّ ما عرفته مصر في الذاكرة. وانتقل
      تدبير الإدارة المدنية انتقالاً قاطعاً إلى وزارة
      الدولة، خاصةً في عهد الوزير المتنصّر سابقاً أبي
      القاسم علي الجَرْجَرائي. وخلفه ابنه «المستنصر
      بالله» وهو في السابعة من عمره، فكان عهده الذي امتدّ
      ستين سنة أطول عهود الفاطميين، وفيه شهدت الدولة
      تدهورها البطيء.
    description_fr: |
      Abū al-Ḥasan ʿAlī al-Ẓāhir li-Iʿzāz Dīn Allāh, septième
      calife fātimide et fils d'al-Ḥākim, mourut au Caire
      vers trente-deux ans, après un règne de seize ans qui
      commença sous la régence de sa puissante tante Sitt
      al-Mulk et se poursuivit dans de sévères famines et
      des reculs politiques en Syrie. Son règne vit la
      perte du contrôle fātimide effectif sur des parts
      significatives de la Syrie face à la pression
      byzantine et à la résurgence des tribus arabes, et
      la famine de 414-416 H que les historiens classiques
      décrivent parmi les pires de la mémoire égyptienne.
      L'administration civile passa définitivement aux
      mains du vizirat, notamment sous le vizir Abū al-
      Qāsim ʿAlī al-Jarjarāʾī, ancien chrétien converti.
      Lui succéda son fils al-Mustanṣir bi-Allāh, âgé de
      sept ans, dont le règne de soixante ans serait le
      plus long de l'histoire fātimide et témoignerait du
      lent effondrement de la dynastie.
    canonical_hijri: {year: 427, month: 8, day: 15, precision: day}
    canonical_gregorian: {date: 1036-06-19, precision: day, method: tabular_conversion}
