      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Ẓāhir under Shaʿbān 427 AH at Cairo."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms 427 AH for the death of al-Ẓāhir and the accession of the seven-year-old al-Mustanṣir."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the obituary under 427 AH."
