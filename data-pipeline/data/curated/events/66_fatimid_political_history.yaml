  # =========================================================================
  # NIZARI-MUSTA'LI SCHISM (488 AH)
  # =========================================================================

  - slug: nizari-mustali-schism
    category: political_event
    title_en: Nizārī-Mustaʿlī Schism — Death of Nizār ibn al-Mustanṣir
    title_ar: الفتنة النزارية المستعلية — مقتل نزار بن المستنصر
    title_fr: Schisme nizārī-mustaʿlī — mort de Nizār ibn al-Mustanṣir
    description_en: |
      Within months of al-Mustanṣir's death the Fatimid
      caliphate split irreparably over the succession. The
      eldest son and long-designated heir Nizār was set
      aside in favour of his younger brother Aḥmad, who took
      the regnal title al-Mustaʿlī bi-Allāh, by the powerful
      vizier al-Afḍal Shāhanshāh ibn Badr al-Jamālī, whose
      sister was al-Mustaʿlī's wife. Nizār fled to Alexandria,
      raised a revolt, was defeated, and was taken to Cairo
      and walled up alive in 488 AH. The Persian Ismāʿīlī
      missionary Ḥasan-i Ṣabbāḥ, master of the fortress of
      Alamūt in northern Iran, repudiated the Cairo line and
      declared his allegiance to Nizār's hidden son: this
      breach founded the Nizārī branch (the *Ḥashīshiyya* or
      "Assassins" of Latin sources) as a doctrinally and
      politically autonomous Ismāʿīlī community independent
      of Cairo, while the Mustaʿlī line continued to govern
      Egypt. Classical Sunni historians (Ibn al-Athīr, Ibn
      Khallikān) describe the schism as the political
      dénouement of the Fatimid project.
    description_ar: |
      انشقّت الخلافة الفاطمية انشقاقاً لا يندمل في غضون
      أشهر من وفاة المستنصر بسبب الخلاف على الخلافة. أُقصي
      الابن الأكبر ووليّ العهد القديم «نزار» لصالح أخيه
      الأصغر «أحمد» الذي تلقّب بـ«المستعلي بالله»، بفعل
      الوزير القوي «الأفضل شاهنشاه» بن بدر الجمالي،
      الذي كانت أخته زوجَ المستعلي. ففرّ نزار إلى
      الإسكندرية فأقام ثورة، فهُزم، فحُمل إلى القاهرة
      فبُني عليه حائط حياً سنة ٤٨٨ هـ. ورفض الداعي
      الإسماعيلي الفارسي «حسن الصبّاح» — صاحب قلعة
      «أَلَموت» بشمال إيران — السلطة القاهرية، وأعلن
      الولاء لابن نزار المستور: فصار هذا الانشقاق
      تأسيساً للفرع النزاري (الذي عرف عند الإفرنج
      بـ«الحشاشين») جماعةً إسماعيلية مستقلّة عقدياً
      وسياسياً عن القاهرة، فيما واصل خط المستعلية حكم
      مصر. ويصف المؤرخون الكلاسيكيون السنّة (ابن الأثير
      وابن خلكان) هذا الانشقاقَ خاتمةَ المشروع
      الفاطمي السياسية.
    description_fr: |
      En quelques mois de la mort d'al-Mustanṣir, le
      califat fātimide se brisa de façon irrémédiable sur
      la succession. Le fils aîné et héritier de longue
      date Nizār fut écarté au profit de son frère cadet
      Aḥmad, qui prit le titre régnal d'al-Mustaʿlī bi-
      Allāh, par le puissant vizir al-Afḍal Shāhanshāh
      ibn Badr al-Jamālī, dont la sœur était l'épouse
      d'al-Mustaʿlī. Nizār s'enfuit à Alexandrie, leva
      une révolte, fut défait et conduit au Caire, où il
      fut emmuré vivant en 488 H. Le missionnaire
      ismāʿīlien persan Ḥasan-i Ṣabbāḥ, maître de la
      forteresse d'Alamūt en Iran du Nord, répudia la
      ligne du Caire et proclama son allégeance au fils
      caché de Nizār : cette rupture fonda la branche
      nizārī (les *Ḥashīshiyya* ou « Assassins » des
      sources latines) comme communauté ismāʿīlienne
      doctrinalement et politiquement autonome, tandis
      que la ligne mustaʿlī continuait à gouverner
      l'Égypte. Les historiens sunnites classiques (Ibn
      al-Athīr, Ibn Khallikān) tiennent ce schisme pour
      le dénouement politique du projet fātimide.
    canonical_hijri: {year: 488, precision: year}
    canonical_gregorian: {date: 1095-01-12, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters Nizār's revolt at Alexandria, his defeat, and his death by being walled up alive in Cairo under 488 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms 488 AH for the death of Nizār and the consolidation of al-Mustaʿlī's rule."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān gives the standard biographical entry on Nizār and the circumstances of his execution."
    people: [[nizar-ibn-al-mustansir, died], [al-afdal-shahanshah, leader]]
    tags: [fatimid, schism, nizari, mustali, alamut, egypt]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # LATE FATIMID DECLINE (524-567 AH)
  # =========================================================================

  - slug: assassination-of-al-amir-fatimid
    category: ruler_death
    title_en: Assassination of al-Āmir bi-Aḥkām Allāh
    title_ar: اغتيال الآمر بأحكام الله
    title_fr: Assassinat d'al-Āmir bi-Aḥkām Allāh
    description_en: |
      Abū ʿAlī al-Manṣūr al-Āmir bi-Aḥkām Allāh, tenth
      Fatimid caliph, was killed by Nizārī Ismāʿīlī agents
      on the bridge of al-Rawḍa in Cairo, at age about 34
      after a twenty-nine-year reign. The assassins were
      avenging his and his father al-Mustaʿlī's exclusion
      of Nizār from the succession three decades earlier
      and the consolidation of the Mustaʿlī Ṭayyibī rival
      tradition. His murder precipitated a constitutional
      crisis: he left no son of suitable age, and his
      cousin ʿAbd al-Majīd was elevated as regent for the
      caliph's posthumous infant son, then proclaimed
      caliph in his own right as al-Ḥāfiẓ li-Dīn Allāh —
      a transition that broke the principle of *naṣṣ*
      (designation) underlying Ismāʿīlī legitimacy and
      provoked the Ṭayyibī secession in Yemen. Classical
      historians (Ibn al-Athīr, Ibn Khallikān) describe
      the assassination as the beginning of the open
      collapse of the Fatimid state, which would last
      another forty years before Saladin's abolition of
      the dynasty.
    description_ar: |
      اغتال الفدائيون النزاريون الإسماعيليون أبا علي
      المنصور «الآمر بأحكام الله» — عاشر الخلفاء
      الفاطميين — على جسر «الرَّوضة» بالقاهرة، عن نحو
      أربع وثلاثين سنة، بعد عهد دام تسعاً وعشرين سنة.
      ثأر القتلة لإقصائه وإقصاء أبيه المستعلي «نزار»
      عن ولاية العهد قبل ثلاثة عقود، ولترسيخ خط
      المستعلية الطيّبية الخصم. وأشعل قتلُه أزمةً
      دستورية: لم يخلّف ابناً في سنّ يصلح للحكم،
      فرُفع ابن عمه «عبد المجيد» ولياً على ابنه الوليد
      بعد وفاته، ثم بويع خليفةً باسم «الحافظ لدين الله»
      — وهو انتقال خرق مبدأ «النصّ» الذي تقوم عليه
      شرعية الإسماعيلية، وأدّى إلى انشقاق «الطيّبية»
      في اليمن. ويصف المؤرخون الكلاسيكيون (ابن الأثير
      وابن خلكان) هذا الاغتيال ببداية الانهيار العلني
      للدولة الفاطمية، التي ستستمرّ بعد ذلك أربعين
      سنة أخرى قبل أن يلغيها صلاح الدين.
    description_fr: |
      Abū ʿAlī al-Manṣūr al-Āmir bi-Aḥkām Allāh, dixième
      calife fātimide, fut tué par des agents ismāʿīliens
      nizārīs sur le pont d'al-Rawḍa au Caire, vers
      trente-quatre ans, après un règne de vingt-neuf
      ans. Les assassins vengeaient son exclusion et celle
      de son père al-Mustaʿlī de Nizār de la succession
      trois décennies plus tôt, et la consolidation du
      courant mustaʿlī ṭayyibī rival. Son meurtre
      précipita une crise constitutionnelle : il ne
      laissait aucun fils en âge de régner; son cousin
      ʿAbd al-Majīd fut élevé comme régent de l'enfant
      posthume du calife, puis proclamé calife à part
      entière sous le nom d'al-Ḥāfiẓ li-Dīn Allāh —
      transition qui rompait le principe du *naṣṣ*
      (désignation) fondant la légitimité ismāʿīlienne
      et qui provoqua la sécession ṭayyibī au Yémen. Les
      historiens classiques (Ibn al-Athīr, Ibn Khallikān)
      décrivent l'assassinat comme le commencement de
      l'effondrement ouvert de l'État fātimide, qui
      durerait encore quarante ans avant l'abolition
      par Saladin.
    canonical_hijri: {year: 524, month: 11, day: 4, precision: day}
    canonical_gregorian: {date: 1130-10-16, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates the assassination of al-Āmir to Dhū al-Qaʿda 524 AH at the bridge of al-Rawḍa and identifies the killers as Nizārī fidāʾīs."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms 524 AH for the assassination."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān gives the biographical entry on al-Āmir and the circumstances of his death."
    people: [[al-amir-fatimid, died]]
    tags: [fatimid, caliph, assassination, nizari, cairo, tayyibi-schism]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: saladin-abolishes-fatimid-khutba
    category: political_event
    title_en: Saladin Abolishes the Fatimid Khuṭba in Cairo
    title_ar: صلاح الدين يلغي الخطبة الفاطمية بالقاهرة
    title_fr: Saladin abolit la khuṭba fātimide au Caire
    description_en: |
      Ṣalāḥ al-Dīn Yūsuf ibn Ayyūb (Saladin), vizier of
      the dying Fatimid caliph al-ʿĀḍid, ordered the
      khuṭba in the mosques of Cairo to be pronounced in
      the name of the Sunni Abbasid caliph al-Mustaḍīʾ at
      Baghdad rather than in the name of the Fatimid
      caliph, formally ending two centuries of Ismāʿīlī
      Fatimid sovereignty in Egypt. Saladin had risen to
      the Egyptian vizierate in 564 AH after the death of
      his uncle Shīrkūh, who had taken Cairo on behalf
      of the Zangid sultan Nūr al-Dīn Maḥmūd. Over the
      following four years he had progressively dismantled
      the Fatimid administrative apparatus, dispersed the
      Sūdānī palace guard after a failed coup, and
      established a Sunni juridical and educational
      infrastructure of madrasas teaching the four Sunni
      schools. The change of khuṭba on this Friday was
      the formal liturgical act of restoration of Sunni
      sovereignty over Egypt. Al-ʿĀḍid was already
      mortally ill — classical sources record that he
      died three days later — and Saladin took care that
      he was not informed of the change of khuṭba.
    description_ar: |
      أمر صلاح الدين يوسف بن أيوب — وزير الخليفة الفاطمي
      «العاضد» المحتضر — أن تُقام الخطبة في مساجد
      القاهرة باسم الخليفة العباسي السني «المستضيء»
      ببغداد بدلاً من اسم الخليفة الفاطمي، فأنهى رسمياً
      قرنين من السلطة الفاطمية الإسماعيلية بمصر. وكان
      صلاح الدين قد ارتقى إلى وزارة مصر سنة ٥٦٤ هـ بعد
      وفاة عمه «أسد الدين شيركوه» الذي ملك القاهرة
      نيابةً عن السلطان الزنكي «نور الدين محمود». وفي
      السنوات الأربع التالية فكّك أركان الإدارة
      الفاطمية تدريجياً، وفرّق حرس القصر «السودان» بعد
      محاولة انقلابهم الفاشلة، وأقام بنية مذهبية
      وتعليمية سنّية من المدارس التي تدرّس المذاهب
      السنّية الأربعة. وكان تغيير الخطبة في هذه الجمعة
      هو الفعل الشعائري الرسمي لاستعادة سيادة السنّة
      على مصر. وكان العاضد قد مرض مرض الموت — وتذكر
      المصادر الكلاسيكية أنه توفي بعد ثلاثة أيام —
      فحرص صلاح الدين على ألا يُخبَر بتغيير الخطبة.
    description_fr: |
      Ṣalāḥ al-Dīn Yūsuf ibn Ayyūb (Saladin), vizir du
      calife fātimide al-ʿĀḍid agonisant, ordonna que la
      khuṭba dans les mosquées du Caire fût prononcée au
      nom du calife sunnite abbasside al-Mustaḍīʾ à
      Baghdād plutôt qu'au nom du calife fātimide,
      mettant formellement fin à deux siècles de
      souveraineté fātimide ismāʿīlienne en Égypte.
      Saladin était parvenu au vizirat égyptien en 564 H
      après la mort de son oncle Shīrkūh, qui avait pris
      le Caire au nom du sultan zangide Nūr al-Dīn
      Maḥmūd. Au cours des quatre années suivantes il
      avait progressivement démantelé l'appareil
      administratif fātimide, dispersé la garde
      palatine soudanaise après un coup d'État manqué,
      et instauré une infrastructure juridique et
      éducative sunnite de madrasas enseignant les quatre
      écoles sunnites. Le changement de khuṭba ce
      vendredi fut l'acte liturgique formel de la
      restauration de la souveraineté sunnite sur
      l'Égypte. Al-ʿĀḍid était déjà mourant — les
      sources classiques rapportent qu'il mourut trois
      jours plus tard — et Saladin veilla à ce qu'il ne
      fût pas informé du changement de khuṭba.
    canonical_hijri: {year: 567, month: 1, day: 7, precision: day}
    canonical_gregorian: {date: 1171-09-17, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates Saladin's restoration of the Abbasid khuṭba in Cairo to the first Friday of Muḥarram 567 AH (7 Muḥarram)."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms 567 AH for the abolition of the Fatimid khuṭba and the formal end of the Fatimid caliphate."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the change of khuṭba in Cairo under 567 AH."
    people: [[salahuddin-al-ayyubi, leader], [al-adid-fatimid, subject]]
    tags: [fatimid, ayyubid, saladin, cairo, khutba, sunni-restoration]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-adid-last-fatimid
    category: ruler_death
    title_en: Death of al-ʿĀḍid li-Dīn Allāh — Last Fatimid Caliph
    title_ar: وفاة العاضد لدين الله — آخر الخلفاء الفاطميين
    title_fr: Mort d'al-ʿĀḍid li-Dīn Allāh — dernier calife fātimide
    description_en: |
      Abū Muḥammad ʿAbd Allāh al-ʿĀḍid li-Dīn Allāh,
      fourteenth and last Fatimid caliph, died at the
      Fatimid palace in Cairo at age about 21, three days
      after his vizier Ṣalāḥ al-Dīn (Saladin) had ordered
      the abolition of the Fatimid khuṭba in favour of the
      Sunni Abbasid caliph al-Mustaḍīʾ. Classical sources
      report that he died unaware of the change, his
      family having been instructed to conceal the news;
      Saladin himself attended the deathbed. With his
      death the Fatimid caliphate formally ended after
      262 years from the proclamation of al-Mahdī ʿUbayd
      Allāh in Ifrīqiya. Saladin took the caliph's
      surviving relatives into protective custody at the
      former palace, separated the Fatimid men and women
      to extinguish the line, and integrated Egypt into
      the Ayyūbid sultanate as a Sunni province nominally
      acknowledging Abbasid suzerainty. Ibn al-Athīr and
      Ibn Khallikān give the standard accounts; al-
      Maqrīzī's *Ittiʿāẓ al-Ḥunafāʾ* preserves the
      detailed eyewitness chronicle of the Fatimid
      collapse.
    description_ar: |
      توفي أبو محمد عبد الله «العاضد لدين الله» — الرابع
      عشر والأخير من الخلفاء الفاطميين — بقصر الفاطميين
      بالقاهرة عن نحو إحدى وعشرين سنة، بعد ثلاثة أيام
      من أمر وزيره صلاح الدين بإلغاء الخطبة الفاطمية
      لصالح الخليفة العباسي السنّي «المستضيء». وتذكر
      المصادر الكلاسيكية أنه توفي وهو لا يعلم بالتغيير،
      وقد أمر أهله بكتمان الخبر عنه، وحضر صلاح الدين
      نفسه فراش وفاته. وبموته انتهت الخلافة الفاطمية
      رسمياً بعد مائتين واثنتين وستين سنة من مبايعة
      المهدي عبيد الله بإفريقية. واستبقى صلاح الدين
      من بقي من أهل البيت الفاطمي في حراسة بالقصر
      السابق، وعزل ذكورهم عن إناثهم لإنهاء النسل،
      وأدمج مصر في السلطنة الأيوبية ولايةً سنّية
      تعترف بالسيادة العباسية اسماً. ويسرد ابن الأثير
      وابن خلكان الرواية المعهودة، ويحفظ المقريزي
      في «اتعاظ الحنفاء» الرواية الشاهدة المفصّلة
      لانهيار الفاطميين.
    description_fr: |
      Abū Muḥammad ʿAbd Allāh al-ʿĀḍid li-Dīn Allāh,
      quatorzième et dernier calife fātimide, mourut au
      palais fātimide du Caire vers vingt et un ans,
      trois jours après que son vizir Ṣalāḥ al-Dīn
      (Saladin) eut ordonné l'abolition de la khuṭba
      fātimide au profit du calife sunnite abbasside al-
      Mustaḍīʾ. Les sources classiques rapportent qu'il
      mourut sans connaître le changement, sa famille
      ayant reçu l'ordre de lui en cacher la nouvelle;
      Saladin lui-même assista au lit de mort. Avec sa
      mort, le califat fātimide prit formellement fin
      après deux cent soixante-deux ans depuis la
      proclamation d'al-Mahdī ʿUbayd Allāh en Ifrīqiya.
      Saladin plaça les proches survivants du calife en
      garde au palais ancien, sépara les hommes et les
      femmes fātimides pour éteindre la lignée, et
      intégra l'Égypte au sultanat ayyoubide comme
      province sunnite reconnaissant nominalement la
      suzeraineté abbasside. Ibn al-Athīr et Ibn
      Khallikān donnent les récits standards; l'*Ittiʿāẓ
      al-Ḥunafāʾ* d'al-Maqrīzī conserve la chronique
      circonstanciée et oculaire de l'effondrement
      fātimide.
    canonical_hijri: {year: 567, month: 1, day: 10, precision: day}
    canonical_gregorian: {date: 1171-09-20, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates the death of al-ʿĀḍid to Muḥarram 567 AH and reports that he died three days after the change of khuṭba."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān gives the standard biographical entry on al-ʿĀḍid as the last Fatimid caliph and confirms 567 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the obituary of al-ʿĀḍid under 567 AH and the formal end of the Fatimid caliphate."
    people: [[al-adid-fatimid, died], [salahuddin-al-ayyubi, leader]]
