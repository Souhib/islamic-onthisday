  - slug: disappearance-of-al-hakim-fatimid
    category: ruler_death
    title_en: Disappearance of al-Ḥākim bi-Amr Allāh
    title_ar: اختفاء الحاكم بأمر الله
    title_fr: Disparition d'al-Ḥākim bi-Amr Allāh
    description_en: |
      Abū ʿAlī al-Manṣūr al-Ḥākim bi-Amr Allāh, sixth Fatimid
      caliph, vanished without trace during one of his
      customary nocturnal rides on the Muqaṭṭam hills outside
      Cairo. He was about 36 years old and had reigned for
      twenty-five years. His donkey was found bloodstained
      and his garments slashed; his body was never recovered.
      Classical sources report widespread rumours of
      assassination at the instigation of his sister Sitt al-
      Mulk, who immediately assumed the regency for his
      successor al-Ẓāhir, but admit that no certainty was
      ever achieved. His reign had been marked by
      extraordinary measures — the destruction of the Church
      of the Holy Sepulchre in Jerusalem in 400 AH that would
      become a precipitating cause of the First Crusade
      ninety years later, severe sumptuary laws against
      Christians and Jews, the prohibition of certain foods
      and customs, and a long oscillation between leniency
      and severity that classical historians (Ibn al-Athīr,
      Ibn Khallikān, al-Dhahabī) describe with striking
      ambivalence. He was succeeded by his teenage nephew
      al-Ẓāhir under the regency of Sitt al-Mulk.
    description_ar: |
      اختفى أبو علي المنصور «الحاكم بأمر الله» — سادس
      الخلفاء الفاطميين — بلا أثر في إحدى رحلاته الليلية
      المعتادة على جبل المقطّم خارج القاهرة، وهو في
      السادسة والثلاثين من عمره وقد حكم خمساً وعشرين
      سنة. ووُجد حماره ملطّخاً بالدم وثيابه مقطّعة، ولم
      يُعثر على جثمانه. وتورد المصادر الكلاسيكية شائعات
      واسعة باغتياله بإيعاز من أخته «ست الملك» التي
      تولّت في الحال نيابةَ خلفه الظاهر، لكنها تعترف
      بأن اليقين لم يتحقق. وقد امتاز عهده بإجراءات شاذّة
      — هدم كنيسة القيامة بالقدس سنة ٤٠٠ هـ التي ستصير
      من ذرائع الحملة الصليبية الأولى بعد تسعين سنة،
      وقوانين تمييزية صارمة على النصارى واليهود، ومنع
      أطعمة وعادات بعينها، وتأرجح طويل بين تشديد ولين
      وصفه المؤرخون الكلاسيكيون (ابن الأثير وابن خلكان
      والذهبي) بازدواجية لافتة. وخلفه ابن أخيه الفتى
      الظاهر تحت نيابة ست الملك.
    description_fr: |
      Abū ʿAlī al-Manṣūr al-Ḥākim bi-Amr Allāh, sixième
      calife fātimide, disparut sans trace au cours d'une
      de ses promenades nocturnes coutumières sur le
      Muqaṭṭam, hors du Caire. Il était âgé d'environ
      trente-six ans et avait régné vingt-cinq ans. Son
      âne fut retrouvé taché de sang et ses vêtements
      lacérés; son corps ne fut jamais découvert. Les
      sources classiques rapportent les rumeurs largement
      répandues d'un assassinat à l'instigation de sa
      sœur Sitt al-Mulk, qui assuma aussitôt la régence
      pour son successeur al-Ẓāhir, mais admettent
      qu'aucune certitude ne fut jamais atteinte. Son
      règne fut marqué par des mesures extraordinaires —
      la destruction de l'église du Saint-Sépulcre à
      Jérusalem en 400 H, qui deviendrait quatre-vingt-
      dix ans plus tard l'une des causes de la première
      croisade, des lois somptuaires sévères contre
      chrétiens et juifs, la prohibition de certains
      aliments et coutumes, et une longue oscillation
      entre indulgence et rigueur que les historiens
      classiques (Ibn al-Athīr, Ibn Khallikān, al-Dhahabī)
      décrivent avec une ambivalence frappante. Lui
      succéda son neveu adolescent al-Ẓāhir sous la
      régence de Sitt al-Mulk.
    canonical_hijri: {year: 411, month: 10, day: 27, precision: day}
    canonical_gregorian: {date: 1021-02-19, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates the disappearance of al-Ḥākim to Shawwāl 411 AH and reports the rumours of assassination."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān gives the standard biographical entry on al-Ḥākim and the circumstances of his disappearance."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the disappearance under 411 AH and discusses the contested explanations."
