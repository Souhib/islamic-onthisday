# Wave 66 of curated event additions (2026-04-27).
# 13 dated events of Fatimid political history (297-567 AH / 909-1171 CE).
# Covers: deaths of the first three Fatimid caliphs (al-Mahdī, al-Qāʾim,
# al-Manṣūr); the conquest of Egypt by Jawhar al-Ṣiqillī (358 AH);
# deaths of al-Muʿizz, al-ʿAzīz, al-Ẓāhir, al-Mustanṣir; the disappearance
# of al-Ḥākim; the Nizārī-Mustaʿlī schism (488 AH); the assassination of
# al-Āmir; the abolition of the Fatimid khuṭba in Cairo by Saladin
# (7 Muḥarram 567 AH); and the death of the last Fatimid caliph al-ʿĀḍid
# (567 AH/1171). Editorial framing is Sunni-scope and factual: the
# Fatimids were an Ismāʿīlī Shia caliphate whose political role in Egypt
# is shared Islamic heritage. The dynasty's claim to ʿAlid descent through
# Ismāʿīl ibn Jaʿfar is contested in Sunni heresiography (al-Maqrīzī
# preserves both the Fatimid and the Sunni-rejectionist positions);
# accordingly all Fatimid caliphs in this file carry is_ahl_al_bayt: false.
# Saladin's restoration of the Sunni Abbasid khuṭba in Cairo is reported
# as historical fact. Al-Ḥākim's disappearance is reported factually
# without Druze-doctrinal framing. All events attested in classical Sunni
# sources (Ibn al-Athīr al-Kāmil, Ibn Kathīr al-Bidāya wa-l-Nihāya, al-
# Dhahabī Tārīkh al-Islām, Ibn Khallikān Wafayāt al-Aʿyān, Ibn al-ʿImād
# Shadharāt al-Dhahab). Trilingual (en/ar/fr).

events:
  # =========================================================================
  # FOUNDING-ERA CALIPHS (IFRĪQIYA, 297-341 AH)
  # =========================================================================

  - slug: death-of-al-mahdi-ubayd-allah-fatimid
    category: ruler_death
    title_en: Death of al-Mahdī ʿUbayd Allāh — First Fatimid Caliph
    title_ar: وفاة المهدي عبيد الله — أول الخلفاء الفاطميين
    title_fr: Mort d'al-Mahdī ʿUbayd Allāh — premier calife fātimide
    description_en: |
      Saʿīd ibn al-Ḥusayn, who took the regnal title al-Mahdī
      bi-Allāh on his proclamation as caliph at Raqqāda in
      Ifrīqiya in 297 AH, died at his new capital al-Mahdiyya
      on the Tunisian coast at age about 63. His twenty-five-
      year reign founded the Fatimid caliphate as a third
      universal Islamic claim against the Sunni Abbasids of
      Baghdad and the Sunni Umayyads of Cordoba: he had emerged
      from concealment in Salamiyya in northern Syria, fled
      across North Africa with his agent Abū ʿAbd Allāh al-Shīʿī,
      defeated the Aghlabid emirs of Qayrawān, and built the
      fortified port of al-Mahdiyya as a maritime capital. His
      genealogical claim — descent from ʿAlī ibn Abī Ṭālib
      through Ismāʿīl ibn Jaʿfar — was contested by Abbasid
      jurists in a famous repudiation circulated under caliph
      al-Qādir; classical Sunni heresiography (Ibn al-Athīr,
      Ibn Khallikān, Ibn Kathīr) generally followed the
      rejectionist view, while preserving the Fatimid self-
      narrative. He was succeeded by his son al-Qāʾim.
    description_ar: |
      توفي سعيد بن الحسين الذي تلقّب بـ«المهدي بالله» يوم
      مبايعته بالخلافة في «رَقّادة» بإفريقية سنة ٢٩٧ هـ —
      عاصمته الجديدة «المهدية» على ساحل تونس عن نحو ثلاث
      وستين سنة. وأسّس عهده الذي امتدّ خمساً وعشرين سنة
      الخلافةَ الفاطمية دعوى عالمية ثالثة في مقابل الخلافة
      العباسية السنّية ببغداد والخلافة الأموية السنّية
      بقرطبة: خرج من سترته في «سَلَمية» بشمال الشام،
      وفرّ عبر شمال أفريقيا مع داعيه أبي عبد الله الشيعي،
      وأطاح بأمراء الأغالبة في القيروان، وبنى ميناء
      «المهدية» المحصّن عاصمةً بحرية. وقد طعن الفقهاء
      العباسيون في دعواه النسبية — وهي الانتساب إلى علي بن
      أبي طالب عبر إسماعيل بن جعفر — في «المحضر القادري»
      المشهور الذي صدر في عهد الخليفة القادر؛ ومالت كتب
      المقالات السنّية الكلاسيكية (ابن الأثير وابن خلكان
      وابن كثير) إلى ردّ النسب مع نقل الرواية الفاطمية
      ذاتها. وخلفه ابنه القائم.
    description_fr: |
      Saʿīd ibn al-Ḥusayn, qui prit le titre régnal d'al-Mahdī
      bi-Allāh lors de sa proclamation comme calife à Raqqāda
      en Ifrīqiya en 297 H, mourut dans sa nouvelle capitale
      al-Mahdiyya, sur la côte tunisienne, vers soixante-trois
      ans. Son règne de vingt-cinq ans fonda le califat
      fātimide comme troisième prétention islamique universelle
      face au califat sunnite abbasside de Baghdād et au
      califat sunnite umayyade de Cordoue : sorti de la
      dissimulation à Salamiyya, en Syrie du Nord, il franchit
      l'Afrique du Nord avec son dāʿī Abū ʿAbd Allāh al-Shīʿī,
      renversa les émirs aghlabides de Qayrawān et bâtit le
      port fortifié d'al-Mahdiyya comme capitale maritime. Sa
      revendication généalogique — descendance d'ʿAlī ibn Abī
      Ṭālib par Ismāʿīl ibn Jaʿfar — fut contestée par les
      juristes abbassides dans la fameuse répudiation circulée
      sous le calife al-Qādir; l'hérésiographie sunnite
      classique (Ibn al-Athīr, Ibn Khallikān, Ibn Kathīr) suivit
      en général la position négationniste tout en conservant
      le récit fātimide lui-même. Lui succéda son fils al-Qāʾim.
    canonical_hijri: {year: 322, month: 3, precision: month}
    canonical_gregorian: {date: 934-03-04, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Mahdī ʿUbayd Allāh in Rabīʿ al-Awwal 322 AH; classical sources differ within that month on the day."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya places his death under 322 AH and discusses the contested genealogy."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the death of al-Mahdī under 322 AH."
    people: [[ubayd-allah-al-mahdi, died]]
    tags: [fatimid, caliph, ifriqiya, mahdiyya, ismaili]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-qaim-fatimid
    category: ruler_death
    title_en: Death of al-Qāʾim bi-Amr Allāh — Second Fatimid Caliph
    title_ar: وفاة القائم بأمر الله — ثاني الخلفاء الفاطميين
    title_fr: Mort d'al-Qāʾim bi-Amr Allāh — deuxième calife fātimide
    description_en: |
      Abū al-Qāsim Muḥammad al-Qāʾim bi-Amr Allāh, second
      Fatimid caliph and son of al-Mahdī ʿUbayd Allāh, died at
      al-Mahdiyya during the prolonged Khārijī revolt of Abū
      Yazīd Makhlad ibn Kaydād — known as ṣāḥib al-ḥimār ("the
      man on the donkey") — that had besieged the Fatimid
      capital itself. His twelve-year reign saw the consolidation
      of Fatimid administrative institutions in Ifrīqiya, an
      abortive maritime expedition against Egypt, and the
      Khārijī insurgency that very nearly destroyed the
      dynasty before its outward expansion. Classical Sunni
      historians treat the war against Abū Yazīd as one of the
      most violent episodes of tenth-century North African
      history; al-Qāʾim's death during the siege was concealed
      by his son and successor al-Manṣūr until the rebellion
      had been broken. He was succeeded by al-Manṣūr bi-Naṣr
      Allāh.
    description_ar: |
      توفي أبو القاسم محمد «القائم بأمر الله» — ثاني الخلفاء
      الفاطميين وابن المهدي عبيد الله — بالمهدية في خضمّ
      ثورة الخارجي أبي يزيد مَخْلَد بن كَيْداد المعروف
      بـ«صاحب الحمار» التي حاصرت العاصمة الفاطمية ذاتها.
      وشهد عهده الذي امتدّ اثنتي عشرة سنة استحكام مؤسسات
      الدولة الفاطمية الإدارية بإفريقية، وحملة بحرية مخفقة
      على مصر، وفتنة الخوارج التي كادت تطيح بالدولة قبل
      توسعها الخارجي. ويعدّ المؤرخون الكلاسيكيون من أهل
      السنة حربَ أبي يزيد من أعنف فصول تاريخ شمال أفريقيا
      في القرن الرابع الهجري؛ وكتم ابنُه وخلفه المنصور
      وفاةَ القائم أثناء الحصار حتى انكسرت الفتنة. وخلفه
      المنصور بنصر الله.
    description_fr: |
      Abū al-Qāsim Muḥammad al-Qāʾim bi-Amr Allāh, deuxième
      calife fātimide et fils d'al-Mahdī ʿUbayd Allāh, mourut
      à al-Mahdiyya en pleine révolte kharijite prolongée
      d'Abū Yazīd Makhlad ibn Kaydād — surnommé ṣāḥib al-ḥimār
      (« l'homme à l'âne ») — qui avait assiégé la capitale
      fātimide même. Son règne de douze ans vit la consolidation
      des institutions administratives fātimides en Ifrīqiya,
      une expédition maritime avortée contre l'Égypte, et
      l'insurrection kharijite qui faillit anéantir la
      dynastie avant son expansion extérieure. Les historiens
      sunnites classiques tiennent la guerre contre Abū Yazīd
      pour l'un des épisodes les plus violents de l'histoire
      nord-africaine du IVᵉ siècle hégirien; la mort d'al-Qāʾim
      pendant le siège fut cachée par son fils et successeur
      al-Manṣūr jusqu'à ce que la révolte fût brisée. Lui
      succéda al-Manṣūr bi-Naṣr Allāh.
    canonical_hijri: {year: 334, month: 10, day: 13, precision: day}
    canonical_gregorian: {date: 946-05-23, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Qāʾim under Shawwāl 334 AH and notes its concealment until the defeat of Abū Yazīd."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 334 AH for al-Qāʾim's death and the war with Abū Yazīd."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records his death under 334 AH."
    people: [[al-qaim-fatimid, died]]
    tags: [fatimid, caliph, ifriqiya, mahdiyya, kharijite]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-mansur-fatimid
    category: ruler_death
    title_en: Death of al-Manṣūr bi-Naṣr Allāh — Third Fatimid Caliph
    title_ar: وفاة المنصور بنصر الله — ثالث الخلفاء الفاطميين
    title_fr: Mort d'al-Manṣūr bi-Naṣr Allāh — troisième calife fātimide
    description_en: |
      Abū al-Ṭāhir Ismāʿīl al-Manṣūr bi-Naṣr Allāh, third
      Fatimid caliph, died at his new capital al-Manṣūriyya
      near Qayrawān at age about 39, after a brief seven-year
      reign. He had assumed the caliphate during the siege of
      al-Mahdiyya by the Khārijī rebel Abū Yazīd, kept his
      father al-Qāʾim's death secret, and personally led the
      counter-offensive that broke the rebellion in 336 AH —
      pursuing Abū Yazīd into the Aurès mountains until his
      capture and execution. The new royal city of al-
      Manṣūriyya, built on the site of the decisive battle,
      took its name from his caliphal title. His son and
      successor al-Muʿizz li-Dīn Allāh would within fifteen
      years move the Fatimid capital from Ifrīqiya to Egypt
      after the conquest of 358 AH. Classical sources praise
      al-Manṣūr's military skill while noting the brevity of
      his reign.
    description_ar: |
      توفي أبو الطاهر إسماعيل «المنصور بنصر الله» — ثالث
      الخلفاء الفاطميين — بعاصمته الجديدة «المنصورية» قرب
      القيروان عن نحو تسع وثلاثين سنة، بعد عهد قصير دام
      سبع سنين. تولّى الخلافة في أثناء حصار الخارجي أبي
      يزيد للمهدية، وكتم وفاة أبيه القائم، وقاد بنفسه
      الحملة المضادة التي كسرت الفتنة سنة ٣٣٦ هـ — ولاحق
      أبا يزيد إلى جبال الأوراس حتى أُسر وقُتل. وأخذت
      المدينة الملكية الجديدة «المنصورية» التي بُنيت على
      موضع المعركة الحاسمة اسمَها من لقبه الخلافي. وكان
      ابنه وخلفه «المعز لدين الله» سينقل خلال خمس عشرة
      سنة عاصمةَ الفاطميين من إفريقية إلى مصر بعد فتحها
      سنة ٣٥٨ هـ. ويثني المؤرخون الكلاسيكيون على بأسه
      العسكري مع التنبيه على قصر مدّته.
    description_fr: |
      Abū al-Ṭāhir Ismāʿīl al-Manṣūr bi-Naṣr Allāh, troisième
      calife fātimide, mourut dans sa nouvelle capitale
      al-Manṣūriyya, près de Qayrawān, vers trente-neuf ans,
      après un bref règne de sept ans. Il avait pris le
      califat pendant le siège d'al-Mahdiyya par le rebelle
      kharijite Abū Yazīd, tenu secrète la mort de son père
      al-Qāʾim et conduit personnellement la contre-offensive
      qui brisa la révolte en 336 H — poursuivant Abū Yazīd
      dans les Aurès jusqu'à sa capture et son exécution. La
      nouvelle ville royale d'al-Manṣūriyya, bâtie sur le
      site de la bataille décisive, tira son nom de son
      titre califal. Son fils et successeur al-Muʿizz li-Dīn
      Allāh transférerait en moins de quinze ans la capitale
      fātimide d'Ifrīqiya en Égypte, après la conquête de 358 H.
      Les sources classiques louent son habileté militaire
      tout en relevant la brièveté de son règne.
    canonical_hijri: {year: 341, month: 10, precision: month}
    canonical_gregorian: {date: 953-03-23, precision: month, method: tabular_conversion}
    claims:
