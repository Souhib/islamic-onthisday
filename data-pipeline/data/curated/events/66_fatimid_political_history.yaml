  - slug: death-of-al-aziz-fatimid
    category: ruler_death
    title_en: Death of al-ʿAzīz bi-Allāh — Fifth Fatimid Caliph
    title_ar: وفاة العزيز بالله — خامس الخلفاء الفاطميين
    title_fr: Mort d'al-ʿAzīz bi-Allāh — cinquième calife fātimide
    description_en: |
      Abū Manṣūr Nizār al-ʿAzīz bi-Allāh, fifth Fatimid
      caliph and son of al-Muʿizz, died at Bilbays in the
      Nile Delta at age about 41 while preparing a campaign
      into Syria against the resurgent Hamdānid amirs and
      Byzantine pressure on Aleppo. His twenty-one-year
      reign was the high point of Fatimid Egypt: military
      consolidation in Syria up to the gates of Aleppo and
      Damascus, naval expansion in the Mediterranean,
      religious tolerance toward the substantial Sunni
      majority of Egypt and the Christian and Jewish
      communities — his Christian vizier ʿĪsā ibn Nasṭūrus
      and Jewish notables held high office — and the
      flourishing of al-Azhar as a centre of Ismāʿīlī
      learning. Classical sources note his moderation,
      contrasting it sharply with the troubled reign of his
      son and successor al-Ḥākim. He was buried at the
      Fatimid mausoleum (*Turbat al-Zaʿfarān*) in Cairo.
    description_ar: |
      توفي أبو منصور نزار «العزيز بالله» — خامس الخلفاء
      الفاطميين وابن المعز — في «بِلبَيس» بدلتا النيل عن
      نحو إحدى وأربعين سنة، وهو يستعدّ لحملة على الشام
      ضدّ بقايا الحمدانيين والضغط البيزنطي على حلب.
      وكان عهده الذي امتدّ إحدى وعشرين سنة ذروةَ الدولة
      الفاطمية بمصر: ضبط الشام حتى أبواب حلب ودمشق،
      وتوسعاً بحرياً في المتوسط، وتسامحاً دينياً مع
      الأكثرية السنّية بمصر والمجتمعات المسيحية واليهودية
      — كان وزيره النصراني عيسى بن نَسْطورَس وسائر
      الوجهاء اليهود يتولّون كبار المناصب — وازدهار
      الأزهر مركزاً للعلم الإسماعيلي. ويذكر المؤرخون
      الكلاسيكيون اعتداله مقابلاً عهد ابنه وخلفه الحاكم
      المضطرب. ودفن في «تربة الزعفران» مدفن الفاطميين
      بالقاهرة.
    description_fr: |
      Abū Manṣūr Nizār al-ʿAzīz bi-Allāh, cinquième calife
      fātimide et fils d'al-Muʿizz, mourut à Bilbays, dans
      le delta du Nil, vers quarante et un ans, alors qu'il
      préparait une campagne en Syrie contre les émirs
      hamdānides résurgents et la pression byzantine sur
      Alep. Son règne de vingt et un ans fut l'apogée de
      l'Égypte fātimide : consolidation militaire en Syrie
      jusqu'aux portes d'Alep et de Damas, expansion navale
      en Méditerranée, tolérance religieuse envers la
      majorité sunnite d'Égypte et envers les communautés
      chrétienne et juive — son vizir chrétien ʿĪsā ibn
      Nasṭūrus et plusieurs notables juifs occupaient de
      hautes fonctions — et essor d'al-Azhar comme centre
      de savoir ismaʿilien. Les sources classiques notent
      sa modération, qu'elles opposent au règne troublé de
      son fils et successeur al-Ḥākim. Il fut enterré au
      mausolée fātimide (*Turbat al-Zaʿfarān*) du Caire.
    canonical_hijri: {year: 386, month: 9, day: 28, precision: day}
    canonical_gregorian: {date: 996-10-19, precision: day, method: tabular_conversion}
