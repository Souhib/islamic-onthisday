      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms 341 AH for al-Manṣūr's death."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the death of al-Manṣūr under 341 AH."
