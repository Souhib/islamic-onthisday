  - slug: death-of-al-kalabadhi
    category: scholar_death
    title_en: Death of Abū Bakr al-Kalābādhī — author of *al-Taʿarruf li-Madhhab Ahl al-Taṣawwuf*
    title_ar: وفاة أبي بكر الكلاباذي — صاحب «التعرف لمذهب أهل التصوف»
    title_fr: Mort d'Abū Bakr al-Kalābādhī — auteur d'*al-Taʿarruf li-Madhhab Ahl al-Taṣawwuf*
    description_en: |
      Abū Bakr Muḥammad ibn Isḥāq al-Kalābādhī al-Bukhārī — Sunni
      Ḥanafī Transoxanian Sufi of Bukhārā, author of *al-Taʿarruf
      li-Madhhab Ahl al-Taṣawwuf* (Introduction to the Doctrine of
      the Sufis) and of *Baḥr al-Fawāʾid* (a kalām-inflected
      hadith commentary on aspects of doctrine and ethics) — died
      in Bukhārā. The classical sources differ between 380 AH and
      384 AH; al-Dhahabī in *Tārīkh al-Islām* records the matter
      with the alternative dates noted, and modern scholarship
      (EI2 art. 'al-Kalābādhī') leans to the earlier 380 AH date,
      which we adopt as canonical with the 384 AH alternative
      flagged. *al-Taʿarruf* is the second of the great early
      Sufi compendia (after al-Sarrāj's *Lumaʿ*): a five-part
      manual that opens with a Sunni statement of *ʿaqīda* in the
      ahl al-Sunna mould, then catalogues the technical vocabulary
      of taṣawwuf (states, stations, terminology of the path) and
      concludes with the *karāmāt* of the saints and the etiquette
      of the disciple. It became one of the standard textbooks of
      Bukhāran and broader Transoxanian Sufism through to the
      Mongol period.
    description_ar: |
      توفي أبو بكر محمد بن إسحاق الكلاباذي البخاري — حنفي ما وراء
      نهري سني صوفي ببخارى، صاحب «التعرف لمذهب أهل التصوف» و«بحر
      الفوائد» (شرح حديثي ذو نَفَسٍ كلامي في مسائل العقيدة
      والأخلاق) — ببخارى. واختلفت المصادر الكلاسيكية بين سنة ٣٨٠
      هـ وسنة ٣٨٤ هـ؛ ذكر الذهبي في «تاريخ الإسلام» الخلاف، ويرجح
      البحث الحديث (مادة «الكلاباذي» في «دائرة المعارف الإسلامية»
      الطبعة الثانية) سنة ٣٨٠ هـ، فنعتمدها قولاً قانونياً ونُشير
      إلى ٣٨٤ هـ بديلاً. و«التعرف» الكتاب الثاني من كبار
      المصنفات الصوفية المبكرة (بعد «اللُّمَع» للسرّاج): مرشد في
      خمسة أقسام، يفتتح بمقالة في عقيدة أهل السنة، ثم يعرّف
      مصطلحات التصوف الفنية (الأحوال والمقامات وألفاظ الطريق)،
      ويختم بكرامات الأولياء وآداب المريد. وصار من المتون
      المعتمدة في تصوف بخارى وما وراء النهر إلى العصر المغولي.
    description_fr: |
      Abū Bakr Muḥammad ibn Isḥāq al-Kalābādhī al-Bukhārī —
      ḥanafīte sunnite transoxanien de Boukhara, auteur d'*al-Taʿarruf
      li-Madhhab Ahl al-Taṣawwuf* (Introduction à la doctrine
      des soufis) et du *Baḥr al-Fawāʾid* (commentaire de hadiths
      à orientation kalāmique sur des questions de doctrine et
      d'éthique) — mourut à Boukhara. Les sources classiques
      hésitent entre 380 H et 384 H ; al-Dhahabī dans le *Tārīkh
      al-Islām* mentionne les deux dates, et la recherche moderne
      (article 'al-Kalābādhī' de l'EI2) penche pour la date la
      plus ancienne de 380 H, que nous adoptons comme canonique
      en signalant 384 H en alternative. *al-Taʿarruf* est le
      deuxième des grands compendiums soufis anciens (après le
      *Lumaʿ* d'al-Sarrāj) : manuel en cinq parties qui s'ouvre
      par une profession d'*ʿaqīda* dans le moule ahl al-Sunna,
      catalogue ensuite le vocabulaire technique du *taṣawwuf*
      (états, stations, terminologie de la voie) et s'achève sur
      les *karāmāt* des saints et l'étiquette du disciple. Il
      devint l'un des manuels classiques du soufisme boukharien
      et transoxanien plus largement, jusqu'à la période mongole.
    canonical_hijri: {year: 380, precision: year}
    canonical_gregorian: {date: 990-01-01, precision: year, method: tabular_conversion}
