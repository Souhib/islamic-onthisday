# Wave 30 of curated event additions (2026-04-27).
# The great Sufi compilers and Sufi-influenced figures of Sunni
# taṣawwuf — the systematic theorists, hagiographers, and authors
# of foundational Sufi manuals from the late 4th to early 7th
# centuries AH. Together they form the literary backbone of
# mainstream Sunni Sufism: al-Sarrāj's *al-Lumaʿ* and al-Kalābādhī's
# *al-Taʿarruf* (the first systematic defences of Sufism within
# Sunnism), Abū Ṭālib al-Makkī's *Qūt al-Qulūb* (al-Ghazālī's most
# important predecessor), Abū Nuʿaym's *Ḥilyat al-Awliyāʾ* (the
# largest hagiographical compendium of the early ascetics),
# al-Niffārī's *al-Mawāqif*, ʿAbd Allāh al-Anṣārī al-Harawī's
# *Manāzil al-Sāʾirīn* (the Hanbali-Sufi staging of the path), and
# Aḥmad al-Ghazālī's *Sawāniḥ* (the brother of al-Ghazālī).
#
# Two figures whose executions are part of the historical record
# are reported factually, without endorsing or condemning their
# theology, in line with the project's editorial policy: Yaḥyā
# al-Suhrawardī al-Maqtūl ("the Slain"), founder of the
# Ishrāqī (Illuminationist) school, executed at Aleppo in 587 AH
# on the order of al-Ẓāhir Ghāzī under pressure from a circle of
# jurists; and ʿAyn al-Quḍāt al-Hamadhānī, executed in Hamadhān in
# 525 AH. Their inclusion is biographical, not doctrinal: the
# events themselves are well attested in the classical Sunni
# biographical canon (Ibn Khallikān, al-Dhahabī, Ibn Kathīr).
#
# Already covered elsewhere and intentionally not duplicated here:
# Najm al-Dīn al-Kubrā (file 34, *death-of-najm-al-din-al-kubra*),
# Abū al-Najīb al-Suhrawardī and ʿUmar Shihāb al-Dīn al-Suhrawardī
# (file 34). Yaḥyā al-Suhrawardī al-Maqtūl is a *distinct* figure
# from the Suhrawardiyya ṭarīqa lineage and is included here for
# the first time.
#
# Date attestation in the classical canon: most figures are
# year-precise; al-Niffārī's death is contested between 354 AH
# and a later date (we use 354 AH following the majority);
# al-Kalābādhī's death falls between 380 AH and 384 AH (we use
# 380 AH); ʿAyn al-Quḍāt's execution in 525 AH and Yaḥyā
# al-Suhrawardī's in 5 Rajab 587 AH are both well attested by
# Ibn Khallikān and al-Dhahabī to the day.
#
# Coverage in the classical Sunni biographical canon: al-Dhahabī
# (*Siyar Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām*), Ibn Khallikān
# (*Wafayāt al-Aʿyān*), Ibn Kathīr (*al-Bidāya wa al-Nihāya*),
# Ibn ʿImād (*Shadharāt al-Dhahab*), and EI2 supplement where
# editorial framing is needed. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # 4th CENTURY AH — the great compilers: al-Niffārī, Ibn Khafīf,
  # al-Sarrāj, al-Kalābādhī, Abū Ṭālib al-Makkī
  # =========================================================================

  - slug: death-of-ibn-khafif-al-shirazi
    category: scholar_death
    title_en: Death of Ibn Khafīf al-Shīrāzī — founder of the Khafīfiyya Sufi school of Shīrāz
    title_ar: وفاة ابن خفيف الشيرازي — مؤسس مدرسة الخفيفية الصوفية بشيراز
    title_fr: Mort d'Ibn Khafīf al-Shīrāzī — fondateur de l'école khafīfīe de Shīrāz
    description_en: |
      Abū ʿAbd Allāh Muḥammad ibn Khafīf al-Ḍabbī al-Shīrāzī —
      Persian Sunni Shāfiʿī Sufi master of Shīrāz, hadith
      transmitter, and the figure to whom the classical Sufi
      *ṭabaqāt* tradition attributes the founding of the
      Khafīfiyya school that anchored mystical practice within
      strict Shāfiʿī observance — died in Shīrāz in 371 AH at an
      advanced age. The date is reported by al-Dhahabī in *Siyar
      Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām*, by Ibn Khallikān in
      *Wafayāt al-Aʿyān*, and by Ibn ʿImād in *Shadharāt al-Dhahab*.
      He had studied with the disciples of al-Junayd al-Baghdādī
      and with Ruwaym, and his pupil al-Daylamī's *Sīrat al-Shaykh
      al-Kabīr Ibn Khafīf* is one of the earliest single-figure
      Sufi biographies in Arabic. Al-Hujwīrī's *Kashf al-Maḥjūb*
      treats him as the model of the Sufi-jurist who "did not
      relax a single point of the *sharīʿa*", and his teaching is
      cited extensively by al-Qushayrī in *al-Risāla* and by
      al-Sulamī in *Ṭabaqāt al-Ṣūfiyya* as a touchstone for the
      compatibility of *taṣawwuf* with Shāfiʿī hadith-based piety.
    description_ar: |
      توفي أبو عبد الله محمد بن خفيف الضبي الشيرازي — فارسي شافعي
      سني، شيخ صوفية شيراز، ومن رجال الحديث، وإليه تنسب كتب طبقات
      الصوفية الكلاسيكية تأسيسَ «الخفيفية» التي رسّخت العمل الصوفي
      ضمن الالتزام الصارم بمذهب الشافعي — بشيراز سنة ٣٧١ هـ عن
      عمر طويل. وقد أثبت هذه السنة الذهبي في «سير أعلام النبلاء»
      و«تاريخ الإسلام»، وابن خلكان في «وفيات الأعيان»، وابن العماد
      في «شذرات الذهب». وكان قد أخذ عن أصحاب الجنيد البغدادي وعن
      رويم، وكتاب تلميذه الديلمي «سيرة الشيخ الكبير ابن خفيف» من
      أقدم تراجم العَلَم الفرد في التراث الصوفي العربي. وعدّه
      الهجويري في «كشف المحجوب» نموذج الفقيه الصوفي الذي «لم
      يَدَع مسألة من مسائل الشريعة»، ونقل عنه القشيري في «الرسالة»
      والسلمي في «طبقات الصوفية» نقلاً مستفيضاً، بوصفه ميزاناً
      للوفاق بين التصوف والورع الشافعي المبني على الحديث.
    description_fr: |
      Abū ʿAbd Allāh Muḥammad ibn Khafīf al-Ḍabbī al-Shīrāzī —
      Persan sunnite shāfiʿīte, maître soufi de Shīrāz,
      transmetteur de hadiths, et figure à laquelle la tradition
      classique des *ṭabaqāt* soufies attribue la fondation de
      l'école khafīfīe qui ancra la pratique mystique dans la
      stricte observance shāfiʿīte — mourut à Shīrāz en 371 H à
      un âge avancé. La date est donnée par al-Dhahabī dans les
      *Siyar Aʿlām al-Nubalāʾ* et le *Tārīkh al-Islām*, par Ibn
      Khallikān dans les *Wafayāt al-Aʿyān* et par Ibn ʿImād dans
      les *Shadharāt al-Dhahab*. Il avait étudié auprès des
      disciples d'al-Junayd al-Baghdādī et auprès de Ruwaym, et
      la *Sīrat al-Shaykh al-Kabīr Ibn Khafīf* de son disciple
      al-Daylamī compte parmi les premières biographies soufies
      individuelles en arabe. Le *Kashf al-Maḥjūb* d'al-Hujwīrī
      le tient pour le modèle du soufi-juriste qui « n'a pas
      relâché un seul point de la *sharīʿa* » ; son enseignement
      est cité abondamment par al-Qushayrī dans la *Risāla* et
      par al-Sulamī dans les *Ṭabaqāt al-Ṣūfiyya* comme pierre
      de touche de la compatibilité du *taṣawwuf* avec la piété
      shāfiʿīte fondée sur le hadith.
