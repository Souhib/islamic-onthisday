  - slug: death-of-al-niffari
    category: scholar_death
    title_en: Death of al-Niffārī — author of *al-Mawāqif wa-al-Mukhāṭabāt*
    title_ar: وفاة النِّفَّري — صاحب «المواقف والمخاطبات»
    title_fr: Mort d'al-Niffārī — auteur d'*al-Mawāqif wa-al-Mukhāṭabāt*
    description_en: |
      Muḥammad ibn ʿAbd al-Jabbār ibn al-Ḥasan al-Niffārī — Iraqi
      Sunni Sufi of Niffar (in the marshland between Kūfa and
      Baṣra) and author of *Kitāb al-Mawāqif wa-al-Mukhāṭabāt*
      (The Book of Stayings and Addresses), one of the most
      distinctive works of early Sufi prose in Arabic — died,
      according to the majority position adopted by EI2 and the
      modern critical edition of A. J. Arberry following the
      classical biographical material, in or around 354 AH;
      al-Dhahabī in *Tārīkh al-Islām* notes the date as uncertain
      and some traditions place him later in the second half of
      the 4th century. We follow the 354 AH majority. He travelled
      between Iraq, Syria, and Egypt and is reported to have died
      in the Egyptian countryside; the *Mawāqif*, recovered and
      transmitted by his grandson ʿAlī al-Niffārī and provided
      with a classical Sunni commentary by ʿAfīf al-Dīn al-Tilimsānī,
      records the experiential "stayings" (*mawāqif*) of his path
      in the form of intimate divine addresses, a form that became
      a structural reference for later Andalusi-Egyptian Sufi
      writing (Ibn al-ʿArabī's *Kitāb al-Mawāqif* is a deliberate
      genre echo).
    description_ar: |
      توفي محمد بن عبد الجبار بن الحسن النِّفَّري — صوفي عراقي
      سني من نِفَّر (في سواد ما بين الكوفة والبصرة)، صاحب «كتاب
      المواقف والمخاطبات»، من أبدع آثار النثر الصوفي العربي في
      القرن الرابع — قرابة سنة ٣٥٤ هـ على القول الأرجح الذي يجمع
      عليه «الإسلام في عهده» في «دائرة المعارف الإسلامية» الطبعة
      الثانية ومحقق الكتاب الحديث آرثر آربري متابعةً للمصادر
      الكلاسيكية، وأشار الذهبي في «تاريخ الإسلام» إلى الإشكال في
      تاريخ وفاته، وذكر بعضهم تأريخاً متأخراً في النصف الثاني من
      القرن الرابع. ونحن نأخذ بالقول الأرجح وهو ٣٥٤ هـ. وقد طاف
      بين العراق والشام ومصر، ويُذكَر أنه توفي في ريف مصر؛
      و«المواقف»، التي رواها عنه حفيدُه علي النِّفَّري وشرحها على
      وفق التلقي السني عفيف الدين التلمساني، تسجل «المواقف»
      التجريبية لمسلكه في صورة خطابات إلهية حميمة، صار شكلها
      مرجعاً بنيوياً للكتابة الصوفية الأندلسية المصرية اللاحقة
      (و«كتاب المواقف» لابن العربي صدى نوعي مقصود).
    description_fr: |
      Muḥammad ibn ʿAbd al-Jabbār ibn al-Ḥasan al-Niffārī — soufi
      sunnite irakien de Niffar (région marécageuse entre Kūfa et
      Baṣra) et auteur du *Kitāb al-Mawāqif wa-al-Mukhāṭabāt*
      (Le Livre des Stations et Adresses), l'une des œuvres les
      plus singulières de la prose soufie arabe des débuts —
      mourut, selon la position majoritaire adoptée par l'EI2 et
      par l'édition critique moderne d'A. J. Arberry à la suite
      de la documentation biographique classique, autour de
      354 H ; al-Dhahabī dans le *Tārīkh al-Islām* note l'incertitude
      de la date et certaines traditions le placent plus tard dans
      la seconde moitié du IVᵉ siècle. Nous retenons 354 H comme
      position majoritaire. Il voyagea entre l'Iraq, la Syrie et
      l'Égypte et serait mort dans la campagne égyptienne ; les
      *Mawāqif*, recueillies et transmises par son petit-fils ʿAlī
      al-Niffārī et munies d'un commentaire sunnite classique par
      ʿAfīf al-Dīn al-Tilimsānī, consignent les « stations »
      expérientielles (*mawāqif*) de sa voie sous la forme
      d'adresses divines intimes — forme devenue référence
      structurelle pour l'écriture soufie andalouse-égyptienne
      ultérieure (le *Kitāb al-Mawāqif* d'Ibn al-ʿArabī est un
      écho générique délibéré).
    canonical_hijri: {year: 354, precision: year}
    canonical_gregorian: {date: 965-01-01, precision: year, method: tabular_conversion}
