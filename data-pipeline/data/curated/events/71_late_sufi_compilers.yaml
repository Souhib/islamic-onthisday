  - slug: death-of-al-ansari-al-harawi
    category: scholar_death
    title_en: Death of ʿAbd Allāh al-Anṣārī al-Harawī — Hanbali-Sufi shaykh, author of *Manāzil al-Sāʾirīn*
    title_ar: وفاة عبد الله الأنصاري الهروي — شيخ الإسلام الحنبلي الصوفي وصاحب «منازل السائرين»
    title_fr: Mort de ʿAbd Allāh al-Anṣārī al-Harawī — shaykh ḥanbalī-soufi, auteur des *Manāzil al-Sāʾirīn*
    description_en: |
      Abū Ismāʿīl ʿAbd Allāh ibn Muḥammad al-Anṣārī al-Harawī,
      known as *Shaykh al-Islām al-Anṣārī* — Khurāsānī Sunni
      Ḥanbalī jurist, hadith transmitter, ascetic, and the great
      Hanbali-Sufi voice of fifth-century AH Herat — died at
      Herat in 481 AH, the date reported by al-Dhahabī in *Siyar
      Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām*, by Ibn Kathīr in
      *al-Bidāya*, and by Ibn ʿImād in *Shadharāt al-Dhahab*. He
      compiled in Persian the celebrated *Munājāt* (Intimate
      Discourses) and in Arabic *Manāzil al-Sāʾirīn ilā al-Ḥaqq
      al-Mubīn* (The Stations of the Wayfarers), a one-hundred-
      stage map of the spiritual path divided into ten decades
      from awakening to *tawḥīd* — a text Ibn Qayyim al-Jawziyya
      would later make the structural backbone of his *Madārij
      al-Sālikīn* and Ibn Taymiyya would treat with respect even
      while raising questions about specific formulations. He
      withstood several mihna-style trials at the hands of
      pro-Ashʿarī authorities of Herat for his uncompromising
      Athari creed, was repeatedly imprisoned and exiled, and
      returned each time. The dual legacy — strict Ahl al-Ḥadīth
      ʿaqīda and rigorous Sufi practice — places him at the
      Hanbali-Sufi confluence the Iraqi tradition would inherit
      through ʿAbd al-Qādir al-Jīlānī.
    description_ar: |
      توفي أبو إسماعيل عبد الله بن محمد الأنصاري الهروي، المعروف
      بـ«شيخ الإسلام الأنصاري» — خراساني سني حنبلي، فقيه ومحدث
      وزاهد، ومن أكبر أصوات التيار الحنبلي الصوفي بهراة في
      القرن الخامس الهجري — بهراة سنة ٤٨١ هـ، وهي السنة التي
      أثبتها الذهبي في «سير أعلام النبلاء» و«تاريخ الإسلام»،
      وابن كثير في «البداية والنهاية»، وابن العماد في «شذرات
      الذهب». وصنّف بالفارسية «المناجاة» الشهيرة، وبالعربية
      «منازل السائرين إلى الحق المبين»، خريطة في مئة منزلة من
      اليقظة إلى التوحيد، مقسمة على عشرة أقسام كل منها عشرُ
      منازل — وهو الكتاب الذي سيتخذه ابن قيم الجوزية بعدُ هيكلاً
      بنيوياً لـ«مدارج السالكين»، ويُعامله شيخ الإسلام ابن تيمية
      باحترام مع تنبيه على بعض عباراته. وقد امتُحن مرات في هراة
      من ولاة على الأشعرية بسبب عقيدته الأثرية الصارمة، وحُبس
      ونُفي مراراً وعاد إلى مَنبره في كل مرة. ويجمع تراثُه
      المزدوج — عقيدة أهل الحديث الصارمة وعمل الصوفية الجاد —
      في ملتقى المذهب الحنبلي والتصوف الذي ورّثه التيار العراقي
      عبر عبد القادر الجيلاني.
    description_fr: |
      Abū Ismāʿīl ʿAbd Allāh ibn Muḥammad al-Anṣārī al-Harawī,
      dit *Shaykh al-Islām al-Anṣārī* — khurāsānien sunnite
      ḥanbalīte, juriste, transmetteur de hadiths et ascète, et
      la grande voix ḥanbalīte-soufie de Hérat au Vᵉ siècle de
      l'Hégire — mourut à Hérat en 481 H, date donnée par
      al-Dhahabī dans les *Siyar Aʿlām al-Nubalāʾ* et le *Tārīkh
      al-Islām*, par Ibn Kathīr dans *al-Bidāya* et par Ibn ʿImād
      dans les *Shadharāt al-Dhahab*. Il composa en persan les
      célèbres *Munājāt* (Entretiens intimes) et en arabe les
      *Manāzil al-Sāʾirīn ilā al-Ḥaqq al-Mubīn* (Les Stations
      des cheminants vers le Vrai manifeste), carte en cent
      stations du chemin spirituel divisée en dix décades de
      l'éveil au *tawḥīd* — texte qu'Ibn Qayyim al-Jawziyya
      ferait plus tard l'épine dorsale structurelle de ses
      *Madārij al-Sālikīn* et qu'Ibn Taymiyya traiterait avec
      respect tout en interrogeant certaines formulations. Il
      subit plusieurs *miḥan* aux mains des autorités pro-ashʿarīes
      de Hérat pour son credo athari intransigeant, fut
      emprisonné et exilé à plusieurs reprises et revint chaque
      fois. Le double héritage — *ʿaqīda* ahl al-Ḥadīth stricte
      et discipline soufie rigoureuse — le situe au confluent
      ḥanbalī-soufi dont la tradition irakienne héritera par
      ʿAbd al-Qādir al-Jīlānī.
