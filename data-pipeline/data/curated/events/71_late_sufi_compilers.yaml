  - slug: death-of-abu-nuaym-al-isfahani
    category: scholar_death
    title_en: Death of Abū Nuʿaym al-Iṣfahānī — author of *Ḥilyat al-Awliyāʾ wa-Ṭabaqāt al-Aṣfiyāʾ*
    title_ar: وفاة أبي نُعيم الأصبهاني — صاحب «حلية الأولياء وطبقات الأصفياء»
    title_fr: Mort d'Abū Nuʿaym al-Iṣfahānī — auteur de la *Ḥilyat al-Awliyāʾ wa-Ṭabaqāt al-Aṣfiyāʾ*
    description_en: |
      Abū Nuʿaym Aḥmad ibn ʿAbd Allāh al-Iṣfahānī — Persian Sunni
      Shāfiʿī muḥaddith, eminent ḥāfiẓ of his generation, and
      author of *Ḥilyat al-Awliyāʾ wa-Ṭabaqāt al-Aṣfiyāʾ* (The
      Adornment of the Saints and the Generations of the Elect),
      the largest and most influential hagiographical compendium
      of the early ascetics and Sufis to come down to us — died
      in Iṣfahān in 430 AH, the date on which al-Dhahabī (*Siyar
      Aʿlām al-Nubalāʾ*), Ibn Khallikān (*Wafayāt al-Aʿyān*), Ibn
      Kathīr (*al-Bidāya*) and Ibn ʿImād (*Shadharāt al-Dhahab*)
      all converge. The *Ḥilya* runs to ten volumes in modern
      print and proceeds biographically from the four Rāshidūn
      caliphs through the Companions of the Prophet ﷺ and the
      tābiʿūn and on to the Sufi shaykhs of the early fourth
      century AH, with a detailed apparatus of full chains of
      transmission for sayings and reports — its method is that
      of a hadith critic applied to ascetic and gnomic material.
      It is the largest single quarry from which subsequent Sunni
      Sufi compilers (al-Qushayrī, al-Hujwīrī, al-Sulamī's later
      revisers, and al-Ghazālī in *Iḥyāʾ ʿUlūm al-Dīn*) drew
      their narratives of the early generations.
    description_ar: |
      توفي أبو نُعيم أحمد بن عبد الله الأصبهاني — فارسي شافعي
      سني، حافظ زمانه ومن كبار المحدثين، صاحب «حلية الأولياء
      وطبقات الأصفياء»، أكبر ما وصل إلينا من جوامع تراجم الزهاد
      والصوفية الأوائل وأشدها أثراً — بأصبهان سنة ٤٣٠ هـ، وعلى
      هذه السنة اتفاق الذهبي في «سير أعلام النبلاء»، وابن خلكان
      في «وفيات الأعيان»، وابن كثير في «البداية والنهاية»، وابن
      العماد في «شذرات الذهب». و«الحلية» في عشرة مجلدات في
      الطبعات الحديثة، مرتبة على التراجم: تبدأ بالخلفاء الراشدين
      الأربعة، ثم الصحابة رضي الله عنهم، ثم التابعين، إلى مشايخ
      الصوفية في صدر القرن الرابع الهجري، بجهاز أسانيد كامل
      للأقوال والآثار — منهجها منهج محدث في التراث الزهدي
      والحِكَمي. وهي أعظم منجم استمد منه مَن جاء بعد من جامعي
      التراث الصوفي السني (القشيري والهجويري وتلامذة السلمي
      اللاحقون والغزالي في «إحياء علوم الدين») قصصَ الأولين.
    description_fr: |
      Abū Nuʿaym Aḥmad ibn ʿAbd Allāh al-Iṣfahānī — Persan
      sunnite shāfiʿīte, *muḥaddith* éminent et *ḥāfiẓ* de sa
      génération, auteur de la *Ḥilyat al-Awliyāʾ wa-Ṭabaqāt
      al-Aṣfiyāʾ* (La Parure des saints et les Générations des
      élus), la plus volumineuse et la plus influente des
      compilations hagiographiques sur les premiers ascètes et
      soufis qui nous soit parvenue — mourut à Iṣfahān en 430 H,
      date sur laquelle convergent al-Dhahabī (*Siyar Aʿlām
      al-Nubalāʾ*), Ibn Khallikān (*Wafayāt al-Aʿyān*), Ibn
      Kathīr (*al-Bidāya*) et Ibn ʿImād (*Shadharāt al-Dhahab*).
      La *Ḥilya* compte dix volumes dans son impression moderne
      et procède biographiquement des quatre califes Rāshidūn
      aux Compagnons du Prophète ﷺ et aux *tābiʿūn*, jusqu'aux
      maîtres soufis du début du IVᵉ siècle de l'Hégire, avec
      un appareil détaillé de chaînes de transmission pour
      paroles et récits — sa méthode est celle d'un critique du
      hadith appliquée à un matériau ascétique et gnomique.
      C'est la plus vaste carrière à laquelle les compilateurs
      soufis sunnites ultérieurs (al-Qushayrī, al-Hujwīrī, les
      réviseurs ultérieurs d'al-Sulamī et al-Ghazālī dans
      l'*Iḥyāʾ ʿUlūm al-Dīn*) ont puisé leurs récits des
      premières générations.
    canonical_hijri: {year: 430, precision: year}
    canonical_gregorian: {date: 1038-01-01, precision: year, method: tabular_conversion}
