  - slug: death-of-abu-talib-al-makki
    category: scholar_death
    title_en: Death of Abū Ṭālib al-Makkī — author of *Qūt al-Qulūb*, predecessor of al-Ghazālī's *Iḥyāʾ*
    title_ar: وفاة أبي طالب المكي — صاحب «قوت القلوب» وَوَزرُ الغزالي في «الإحياء»
    title_fr: Mort d'Abū Ṭālib al-Makkī — auteur du *Qūt al-Qulūb*, prédécesseur de l'*Iḥyāʾ* d'al-Ghazālī
    description_en: |
      Abū Ṭālib Muḥammad ibn ʿAlī al-Makkī al-Ḥārithī — Sunni
      Mālikī (with significant Shāfiʿī engagement) ascetic
      theologian, hadith-saturated mystic, and author of *Qūt
      al-Qulūb fī Muʿāmalat al-Maḥbūb wa-Waṣf Ṭarīq al-Murīd ilā
      Maqām al-Tawḥīd* (The Nourishment of Hearts), perhaps the
      single most important predecessor of al-Ghazālī's *Iḥyāʾ
      ʿUlūm al-Dīn* — died in Baghdad in 386 AH, the date
      reported by al-Dhahabī in *Siyar Aʿlām al-Nubalāʾ* and
      *Tārīkh al-Islām*, by Ibn Khallikān in *Wafayāt al-Aʿyān*,
      and by Ibn Kathīr in *al-Bidāya wa al-Nihāya*. *Qūt al-Qulūb*
      is a thirty-three-section synthesis of *fiqh al-ʿibādāt*,
      hadith-based ethics, the disciplines of the heart, the
      grades of love and gratitude, and the doctrine of *ʿilm
      al-yaqīn* — the source-text from which al-Ghazālī's
      *Iḥyāʾ* draws its quartered architecture and a remarkable
      proportion of its actual material. Al-Dhahabī notes that
      al-Makkī's later years included a period of Baghdadi
      controversy when remarks on the divine attributes attributed
      to him drew criticism; the criticism is preserved in the
      sources without further elaboration here, and his ethical
      and ascetic legacy through *Qūt al-Qulūb* remained the
      mainstream Sunni reception.
    description_ar: |
      توفي أبو طالب محمد بن علي المكي الحارثي — عالم سني مالكي
      (مع اشتغال ملحوظ بالشافعية) زاهد متكلم، صوفي مشبع بالحديث،
      صاحب «قوت القلوب في معاملة المحبوب ووصف طريق المريد إلى
      مقام التوحيد»، ولعله أهم مَن سبق الإمام الغزالي في «إحياء
      علوم الدين» — ببغداد سنة ٣٨٦ هـ، وهي السنة التي أثبتها
      الذهبي في «سير أعلام النبلاء» و«تاريخ الإسلام»، وابن خلكان
      في «وفيات الأعيان»، وابن كثير في «البداية والنهاية». و«قوت
      القلوب» مصنف في ثلاثة وثلاثين فصلاً يجمع بين فقه العبادات،
      والأخلاق المبنية على الحديث، ورياضات القلب، ودرجات المحبة
      والشكر، وعقيدة علم اليقين — وهو الكتاب الذي استمدّ منه
      الغزالي في «الإحياء» تقسيمه الرباعي ونسبة لافتة من مواده
      الفعلية. وأشار الذهبي إلى وقوع كلامٍ في أواخر عمره ببغداد
      انتقدت فيه عبارات نُسبت إليه في الصفات الإلهية؛ ومحفوظ هذا
      الانتقاد في المصادر بلا تفصيل ههنا، وظل تَلقيه الأخلاقي
      الزهدي عبر «قوت القلوب» هو السائد في التيار السني العام.
    description_fr: |
      Abū Ṭālib Muḥammad ibn ʿAlī al-Makkī al-Ḥārithī — théologien
      ascète sunnite mālikīte (avec un engagement shāfiʿīte
      notable), mystique imprégné de hadiths et auteur du *Qūt
      al-Qulūb fī Muʿāmalat al-Maḥbūb wa-Waṣf Ṭarīq al-Murīd ilā
      Maqām al-Tawḥīd* (La Nourriture des cœurs), sans doute le
      plus important des prédécesseurs de l'*Iḥyāʾ ʿUlūm al-Dīn*
      d'al-Ghazālī — mourut à Bagdad en 386 H, date donnée par
      al-Dhahabī dans les *Siyar Aʿlām al-Nubalāʾ* et le *Tārīkh
      al-Islām*, par Ibn Khallikān dans les *Wafayāt al-Aʿyān*
      et par Ibn Kathīr dans *al-Bidāya wa al-Nihāya*. Le *Qūt
      al-Qulūb* est une synthèse en trente-trois sections de
      *fiqh al-ʿibādāt*, d'éthique fondée sur le hadith, des
      disciplines du cœur, des degrés de l'amour et de la
      gratitude, et de la doctrine de *ʿilm al-yaqīn* — le
      texte-source dont l'*Iḥyāʾ* d'al-Ghazālī tire son
      architecture quaternaire et une part remarquable de sa
      matière effective. Al-Dhahabī signale que ses dernières
      années à Bagdad connurent une controverse où des propos sur
      les attributs divins qui lui étaient attribués furent
      critiqués ; cette critique est conservée par les sources
      sans plus de détail ici, tandis que son héritage éthique et
      ascétique par le *Qūt al-Qulūb* est demeuré la réception
      courante du sunnisme général.
    canonical_hijri: {year: 386, precision: year}
    canonical_gregorian: {date: 996-01-01, precision: year, method: tabular_conversion}
