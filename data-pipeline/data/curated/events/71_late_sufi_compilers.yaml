      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Tārīkh al-Islām attests c. 354 AH while flagging chronological uncertainty."
      - source_key: ei2
        notes: "EI2 art. 'al-Niffārī' adopts c. 354 AH following Arberry's edition of the *Mawāqif*."
