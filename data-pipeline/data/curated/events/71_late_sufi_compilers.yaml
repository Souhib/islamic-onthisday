  - slug: death-of-abu-nasr-al-sarraj
    category: scholar_death
    title_en: Death of Abū Naṣr al-Sarrāj al-Ṭūsī — author of *Kitāb al-Lumaʿ fī al-Taṣawwuf*
    title_ar: وفاة أبي نصر السرّاج الطوسي — صاحب «كتاب اللُّمَع في التصوف»
    title_fr: Mort d'Abū Naṣr al-Sarrāj al-Ṭūsī — auteur du *Kitāb al-Lumaʿ fī al-Taṣawwuf*
    description_en: |
      Abū Naṣr ʿAbd Allāh ibn ʿAlī al-Sarrāj al-Ṭūsī — Khurāsānī
      Sunni Sufi master of Ṭūs and author of *Kitāb al-Lumaʿ fī
      al-Taṣawwuf* (The Book of Sparks on Sufism), the earliest
      systematic Sunni defence and exposition of taṣawwuf as a
      science compatible with Qurʾan, Sunna, and the consensus of
      the *muḥaddithūn* and *fuqahāʾ* — died in Ṭūs in 378 AH, the
      date reported by al-Dhahabī in *Siyar Aʿlām al-Nubalāʾ* and
      *Tārīkh al-Islām*, by Ibn Kathīr in *al-Bidāya wa al-Nihāya*,
      and by Ibn ʿImād in *Shadharāt al-Dhahab*. The *Lumaʿ* opens
      with a defence of the term *Ṣūfī* against its critics,
      systematises the relationship between the Sufi station and
      the prescriptions of the *sharīʿa*, and rehearses sayings of
      the early ascetics from Ḥasan al-Baṣrī through al-Junayd
      al-Baghdādī within an explicit ahl al-Sunna framework. It
      became the structural template for the great fifth- and
      sixth-century AH compendia: al-Kalābādhī's *al-Taʿarruf*,
      Abū Ṭālib al-Makkī's *Qūt al-Qulūb*, al-Qushayrī's
      *al-Risāla*, and (by extension) al-Ghazālī's *Iḥyāʾ ʿUlūm
      al-Dīn*.
    description_ar: |
      توفي أبو نصر عبد الله بن علي السرّاج الطوسي — خراساني سني،
      من شيوخ صوفية طوس، صاحب «كتاب اللُّمَع في التصوف»، أقدم
      تأصيل سني منهجي لعلم التصوف بوصفه علماً موافقاً للكتاب
      والسنة وإجماع المحدثين والفقهاء — بطوس سنة ٣٧٨ هـ، وهي
      السنة التي أثبتها الذهبي في «سير أعلام النبلاء» و«تاريخ
      الإسلام»، وابن كثير في «البداية والنهاية»، وابن العماد في
      «شذرات الذهب». و«اللُّمَع» يفتتح بالدفاع عن لفظ «الصوفي»
      أمام منتقديه، ويؤسّس العلاقة بين المقام الصوفي وأحكام
      الشريعة، ويسرد أقوال الزهاد الأوائل من الحسن البصري إلى
      الجنيد البغدادي ضمن إطار سني صريح لأهل السنة. وصار النموذج
      البنائي للمصنفات الكبرى في القرنين الخامس والسادس: «التعرف»
      للكلاباذي، و«قوت القلوب» لأبي طالب المكي، و«الرسالة» للقشيري،
      و(امتداداً) «إحياء علوم الدين» للغزالي.
    description_fr: |
      Abū Naṣr ʿAbd Allāh ibn ʿAlī al-Sarrāj al-Ṭūsī — maître
      soufi sunnite khurāsānien de Ṭūs et auteur du *Kitāb
      al-Lumaʿ fī al-Taṣawwuf* (Le Livre des Étincelles sur le
      Soufisme), première défense et exposition systématique
      sunnite du *taṣawwuf* comme science conforme au Coran, à la
      Sunna et au consensus des *muḥaddithūn* et des *fuqahāʾ* —
      mourut à Ṭūs en 378 H, date donnée par al-Dhahabī dans les
      *Siyar Aʿlām al-Nubalāʾ* et le *Tārīkh al-Islām*, par Ibn
      Kathīr dans *al-Bidāya wa al-Nihāya* et par Ibn ʿImād dans
      les *Shadharāt al-Dhahab*. Le *Lumaʿ* s'ouvre par une
      défense du terme *Ṣūfī* face à ses détracteurs, systématise
      la relation entre la station soufie et les prescriptions de
      la *sharīʿa*, et reprend les paroles des premiers ascètes
      d'al-Ḥasan al-Baṣrī à al-Junayd al-Baghdādī dans un cadre
      ahl al-Sunna explicite. Il devint le modèle structurel des
      grandes compilations des Vᵉ et VIᵉ siècles : *al-Taʿarruf*
      d'al-Kalābādhī, *Qūt al-Qulūb* d'Abū Ṭālib al-Makkī, la
      *Risāla* d'al-Qushayrī et, par extension, l'*Iḥyāʾ ʿUlūm
      al-Dīn* d'al-Ghazālī.
