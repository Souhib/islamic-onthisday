  - slug: death-of-ibn-mawdud-al-mawsili
    category: scholar_death
    title_en: Death of Ibn Mawdūd al-Mawṣilī — Author of *al-Ikhtiyār*
    title_ar: وفاة ابن مودود الموصلي — صاحب «الاختيار لتعليل المختار»
    title_fr: Mort d'Ibn Mawdūd al-Mawṣilī — auteur d'*al-Ikhtiyār*
    description_en: |
      ʿAbd Allāh ibn Maḥmūd ibn Mawdūd al-Mawṣilī, leading Hanafi
      jurist of Mosul and Baghdad in the second half of the
      seventh century AH and author of *al-Mukhtār li-l-Fatwā*
      together with its self-commentary *al-Ikhtiyār li-Taʿlīl
      al-Mukhtār*, died in Baghdad. *al-Mukhtār* is among the
      four canonical Hanafi *mutūn* of the late-classical
      curriculum (alongside *al-Wiqāya*, *al-Kanz*, and
      *al-Mukhtaṣar* of al-Qudūrī); his *Ikhtiyār* opens each
      ruling, then justifies it from the school's authorities,
      making it one of the most pedagogically transparent of
      Hanafi *furūʿ* references and a backbone of madrasa
      instruction from the Mamluk lands to the Indian
      subcontinent. Ibn al-ʿImād records his death in
      *Shadharāt al-Dhahab* under 683 AH; EI2 corroborates and
      gives the standard biographical sketch.
    description_ar: |
      توفي الإمام عبد الله بن محمود بن مودود الموصلي — كبير
      فقهاء الحنفية بالموصل وبغداد في النصف الثاني من القرن
      السابع الهجري، ومصنف «المختار للفتوى» وشرحه الذاتي
      «الاختيار لتعليل المختار» — ببغداد. و«المختار» من المتون
      الحنفية الأربعة المعتمدة في المذهب في أواخر العصر
      الكلاسيكي (مع «الوقاية» و«الكنز» و«مختصر القدوري»)؛ وأما
      «الاختيار» فإنه يصدّر بكل مسألة، ثم يعقّب بتعليلها من كلام
      أصحاب المذهب، فصار من أكثر مراجع المذهب الحنفي بياناً في
      تدريس فروعه من بلاد المماليك إلى الهند. أرّخ ابن العماد
      وفاته في «شذرات الذهب» سنة ثلاث وثمانين وستمئة، وأقرّه
      على ذلك «دائرة المعارف الإسلامية» وضبطت ترجمته.
    description_fr: |
      ʿAbd Allāh ibn Maḥmūd ibn Mawdūd al-Mawṣilī, principal
      juriste hanafite de Mossoul et Bagdad de la seconde
      moitié du VIIᵉ siècle de l'Hégire et auteur d'*al-
      Mukhtār li-l-Fatwā* avec son auto-commentaire *al-Ikhtiyār
      li-Taʿlīl al-Mukhtār*, mourut à Bagdad. *al-Mukhtār* fait
      partie des quatre *mutūn* hanafites canoniques du cursus
      tardo-classique (avec *al-Wiqāya*, *al-Kanz* et *al-
      Mukhtaṣar* d'al-Qudūrī); son *Ikhtiyār* ouvre chaque
      règle puis la justifie depuis les autorités de l'école,
      ce qui en fait l'une des références hanafites de *furūʿ*
      les plus pédagogiquement transparentes et une colonne
      vertébrale de l'enseignement en madrasa des terres
      mameloukes au sous-continent indien. Ibn al-ʿImād
      consigne sa mort dans *Shadharāt al-Dhahab* à l'année
      683 H; l'EI2 corrobore et fournit la notice biographique
      standard.
    canonical_hijri: {year: 683, precision: year}
    canonical_gregorian: {date: 1284-01-01, precision: year, method: attested}
