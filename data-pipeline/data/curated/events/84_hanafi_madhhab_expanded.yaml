  - slug: death-of-mulla-khusraw
    category: scholar_death
    title_en: Death of Mullā Khusraw — Ottoman Shaykh al-Islām and Author of *Durar al-Ḥukkām*
    title_ar: وفاة مُلَّا خُسرَو — شيخ الإسلام العثماني ومصنف «درر الحكام»
    title_fr: Mort de Mullā Khusraw — Cheikh al-Islām ottoman et auteur de *Durar al-Ḥukkām*
    description_en: |
      Muḥammad ibn Farāmurz ibn ʿAlī, known as Mullā Khusraw, the
      shaykh al-Islām of the early Ottoman state under Meḥmed II
      (al-Fātiḥ) and the foremost Hanafi codifier of the Ottoman
      learned establishment, died in Constantinople. His *Durar
      al-Ḥukkām fī Sharḥ Ghurar al-Aḥkām* — a self-commentary on
      his own *Ghurar al-Aḥkām* matn — and the parallel *Mirʾāt
      al-Uṣūl Sharḥ Mirqāt al-Wuṣūl* on uṣūl al-fiqh became the
      standard reference texts of Ottoman madrasa instruction in
      Hanafi *furūʿ* and *uṣūl*, holding that position from the
      conquest of Constantinople through the imperial-Ottoman
      centuries. Mehmed II so revered him that he is said to have
      called him "the ʿAbū Ḥanīfa of his age." Ibn al-ʿImād
      records his death in *Shadharāt al-Dhahab* under 885 AH;
      EI2 corroborates and gives the standard biographical
      sketch.
    description_ar: |
      توفي العلامة محمد بن فرامرز بن علي — المعروف بـ«مُلَّا
      خُسرَو» — شيخ الإسلام في الدولة العثمانية الفتية في عهد
      السلطان محمد الفاتح، وكبير مقنّني المذهب الحنفي في
      مؤسسة العلم العثمانية — بإستانبول. وكتابه «درر الحكام
      في شرح غرر الأحكام» شرحاً ذاتيّاً لمتنه «غرر الأحكام»،
      وكتابه الموازي «مرآة الأصول شرح مرقاة الوصول» في أصول
      الفقه، صارا من المراجع المعتمدة في مدارس الدولة
      العثمانية في فروع الحنفية وأصولها، وحُفظت لهما هذه
      المنزلة من فتح إستانبول إلى أواخر العصر الإمبراطوري.
      وكان السلطان محمد الفاتح يعظّمه حتى يُقال إنه دعاه
      «أبا حنيفة زمانه». أرّخ ابن العماد وفاته في «شذرات
      الذهب» سنة خمس وثمانين وثمانمئة، وأقرّه على ذلك «دائرة
      المعارف الإسلامية» وضبطت ترجمته.
    description_fr: |
      Muḥammad ibn Farāmurz ibn ʿAlī, connu sous le nom de
      Mullā Khusraw, le *shaykh al-Islām* de l'État ottoman
      naissant sous Mehmed II (al-Fātiḥ) et le principal
      codificateur hanafite de l'établissement savant ottoman,
      mourut à Constantinople. Son *Durar al-Ḥukkām fī Sharḥ
      Ghurar al-Aḥkām* — un auto-commentaire de son propre
      *matn* *Ghurar al-Aḥkām* — et le parallèle *Mirʾāt al-
      Uṣūl Sharḥ Mirqāt al-Wuṣūl* en *uṣūl al-fiqh* devinrent
      les textes de référence standard de l'enseignement
      ottoman en madrasa pour les *furūʿ* et l'*uṣūl*
      hanafites, conservant cette position de la conquête de
      Constantinople jusqu'aux derniers siècles impériaux
      ottomans. Mehmed II le vénérait au point qu'on dit
      qu'il l'aurait appelé « l'Abū Ḥanīfa de son temps ».
      Ibn al-ʿImād consigne sa mort dans *Shadharāt al-
      Dhahab* à l'année 885 H; l'EI2 corrobore et fournit la
      notice biographique standard.
