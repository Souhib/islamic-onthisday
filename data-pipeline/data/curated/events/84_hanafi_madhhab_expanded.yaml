  - slug: death-of-al-hasiri
    category: scholar_death
    title_en: Death of al-Ḥaṣīrī — Hanafi Jurist of Damascus
    title_ar: وفاة الحَصِيري — فقيه الحنفية بدمشق
    title_fr: Mort d'al-Ḥaṣīrī — juriste hanafite de Damas
    description_en: |
      Jamāl al-Dīn Maḥmūd ibn Aḥmad al-Ḥaṣīrī al-Bukhārī,
      leading Hanafi jurist of seventh-century AH Damascus and
      author of *al-Tahdhīb fī al-Farāʾiḍ* and the major
      *al-Wajīz fī Furūʿ al-Hanafiyya* (also titled *al-Hāwī*),
      died in Damascus. Born in Bukhara and trained in the
      Transoxanian Hanafi tradition of Ibn Māza and his circle,
      he settled in Damascus where he held the chief Hanafi
      teaching post in the city through the late-Ayyubid period
      and trained a generation of Damascene Hanafis whose
      students would in turn fill the school's Mamluk
      establishment. Ibn Khallikān gives a notice in *Wafayāt
      al-Aʿyān*; Ibn al-ʿImād confirms in *Shadharāt al-Dhahab*
      under 636 AH.
    description_ar: |
      توفي الإمام جمال الدين محمود بن أحمد الحَصِيري البخاري —
      كبير فقهاء الحنفية بدمشق في القرن السابع الهجري، ومصنف
      «التهذيب في الفرائض» و«الوجيز في فروع الحنفية» المعروف
      بـ«الحاوي» — بدمشق. ولد ببخارى وتفقّه على طريقة الحنفية
      ما وراء النهرية في حلقة بني مازة، ثم استقرّ بدمشق
      وتولّى رئاسة تدريس الحنفية فيها في أواخر العهد الأيوبي،
      وتخرّج عليه طبقة من حنفية الشام يأتي بعدهم تلامذتهم في
      دواوين المذهب المملوكية. ترجم له ابن خلكان في «وفيات
      الأعيان»، وأرّخ ابن العماد وفاته في «شذرات الذهب» سنة
      ست وثلاثين وستمئة.
    description_fr: |
      Jamāl al-Dīn Maḥmūd ibn Aḥmad al-Ḥaṣīrī al-Bukhārī,
      principal juriste hanafite de Damas du VIIᵉ siècle de
      l'Hégire et auteur d'*al-Tahdhīb fī al-Farāʾiḍ* et du
      majeur *al-Wajīz fī Furūʿ al-Hanafiyya* (aussi intitulé
      *al-Hāwī*), mourut à Damas. Né à Boukhara et formé dans
      la tradition hanafite transoxanienne d'Ibn Māza et de
      son cercle, il s'installa à Damas où il occupa le poste
      principal d'enseignement hanafite de la ville à la fin
      de la période ayyoubide et forma une génération de
      hanafites damascènes dont les élèves rempliraient à leur
      tour l'établissement mamelouk de l'école. Ibn Khallikān
      donne une notice dans *Wafayāt al-Aʿyān*; Ibn al-ʿImād
      confirme dans *Shadharāt al-Dhahab* à l'année 636 H.
    canonical_hijri: {year: 636, precision: year}
    canonical_gregorian: {date: 1238-01-01, precision: year, method: attested}
