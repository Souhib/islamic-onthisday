  # 6TH C. AH — THE TRANSOXANIAN GIANTS
  # =========================================================================

  - slug: death-of-al-sadr-al-shahid
    category: scholar_death
    title_en: Death of al-Ṣadr al-Shahīd Ḥusām al-Dīn ʿUmar — Hanafi Imām of Bukhara
    title_ar: وفاة الصدر الشهيد حُسام الدين عمر — إمام الحنفية ببخارى
    title_fr: Mort d'al-Ṣadr al-Shahīd Ḥusām al-Dīn ʿUmar — imām hanafite de Boukhara
    description_en: |
      Ḥusām al-Dīn ʿUmar ibn ʿAbd al-ʿAzīz ibn Māza al-Bukhārī,
      known as al-Ṣadr al-Shahīd, head of the Hanafi school in
      Bukhara and son of the celebrated *al-Ṣadr al-Shahīd*'s
      father Burhān al-Dīn ibn Māza, was killed at the battle
      of the Qatwān steppe (north of Samarqand) when the Qara
      Khitay defeated the Seljuq sulṭān Sanjar — a catastrophe
      that opened Transoxiana to non-Muslim rule and gave him
      the epithet *al-Shahīd* ("the martyr"). He composed
      *Sharḥ al-Jāmiʿ al-Ṣaghīr* (a major commentary on al-
      Shaybānī's *al-Jāmiʿ al-Ṣaghīr*), *al-Fatāwā al-Ṣughrā*
      and *al-Fatāwā al-Kubrā*, and *al-Wāqiʿāt al-Ḥusāmiyya* —
      foundational works in the Bukharan-Hanafi *fatāwā* genre
      that would feed into al-Marghīnānī's *Hidāya* in the next
      generation. Ibn Khallikān gives the standard biographical
      notice in *Wafayāt al-Aʿyān*; Ibn al-ʿImād confirms the
      death year in *Shadharāt al-Dhahab*.
    description_ar: |
      استُشهد الإمام حُسام الدين عمر بن عبد العزيز بن مازَة
      البخاري — المعروف بالصدر الشهيد، إمام الحنفية ببخارى
      وابن الإمام الكبير برهان الدين ابن مازة — في وقعة
      «قَطوان» شمال سمرقند يوم انتصر فيها قراخطاي على السلطان
      السلجوقي سَنجَر، وكانت الواقعة فاتحة افتتاح ما وراء
      النهر بأيدي حكم غير مسلم، فعرف بـ«الشهيد». صنّف «شرح
      الجامع الصغير» على «الجامع الصغير» للشيباني، و«الفتاوى
      الصغرى» و«الفتاوى الكبرى»، و«الواقعات الحُسامية» — وهي
      أصول في فن الفتاوى البخارية الحنفية التي صبّت في
      «الهداية» للمرغيناني في الجيل التالي. أعطاه ابن خلكان
      ترجمة معتبرة في «وفيات الأعيان»، وأرّخ ابن العماد وفاته
      في «شذرات الذهب».
    description_fr: |
      Ḥusām al-Dīn ʿUmar ibn ʿAbd al-ʿAzīz ibn Māza al-Bukhārī,
      connu comme al-Ṣadr al-Shahīd, chef de l'école hanafite
      à Boukhara et fils du célèbre Burhān al-Dīn ibn Māza,
      fut tué à la bataille de la steppe de Qaṭwān (au nord de
      Samarcande) lorsque les Qarakhitaï défirent le sultan
      seldjoukide Sanjar — une catastrophe qui ouvrit la
      Transoxiane à un pouvoir non musulman et lui valut
      l'épithète *al-Shahīd* (« le martyr »). Il composa
      *Sharḥ al-Jāmiʿ al-Ṣaghīr* (un commentaire majeur du
      *Jāmiʿ al-Ṣaghīr* d'al-Shaybānī), *al-Fatāwā al-Ṣughrā*
      et *al-Fatāwā al-Kubrā*, ainsi qu'*al-Wāqiʿāt al-
      Ḥusāmiyya* — œuvres fondatrices du genre des *fatāwā*
      hanafites boukhariennes qui alimenteront l'*al-Hidāya*
      d'al-Marghīnānī à la génération suivante. Ibn Khallikān
      donne la notice biographique standard dans *Wafayāt al-
      Aʿyān*; Ibn al-ʿImād confirme l'année dans *Shadharāt
      al-Dhahab*.
