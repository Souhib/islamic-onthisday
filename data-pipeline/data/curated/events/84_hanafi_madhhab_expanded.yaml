  - slug: death-of-al-kasani
    category: scholar_death
    title_en: Death of ʿAlāʾ al-Dīn al-Kāsānī — Author of *Badāʾiʿ al-Ṣanāʾiʿ*
    title_ar: وفاة علاء الدين الكاساني — مصنف «بدائع الصنائع»
    title_fr: Mort de ʿAlāʾ al-Dīn al-Kāsānī — auteur de *Badāʾiʿ al-Ṣanāʾiʿ*
    description_en: |
      Abū Bakr ʿAlāʾ al-Dīn ibn Masʿūd al-Kāsānī, leading Hanafi
      jurist of late-sixth-century Aleppo and author of *Badāʾiʿ
      al-Ṣanāʾiʿ fī Tartīb al-Sharāʾiʿ* — the school's most
      systematically organised *furūʿ* encyclopaedia, structured
      not by the standard chapter order but by the legal "causes"
      (*aʿrāḍ*) and rationales of each ruling — died in Aleppo.
      *Badāʾiʿ* was composed as a commentary on his teacher and
      father-in-law al-Samarqandī's *Tuḥfat al-Fuqahāʾ*; the
      famous biographical anecdote (preserved by Ibn Khallikān)
      records that al-Samarqandī gave al-Kāsānī his daughter
      Fāṭima — herself a noted Hanafi jurist — in exchange for
      the completed manuscript, the dowry being "the *Badāʾiʿ*
      itself." Ibn Khallikān treats him in *Wafayāt al-Aʿyān*;
      Ibn al-ʿImād confirms in *Shadharāt al-Dhahab* under 587
      AH.
    description_ar: |
      توفي الإمام أبو بكر علاء الدين بن مسعود الكاساني — كبير
      فقهاء الحنفية بحلب في أواخر القرن السادس الهجري، ومصنف
      «بدائع الصنائع في ترتيب الشرائع» — وهو موسوعة فروع المذهب
      الحنفي المرتبة على طريقة فريدة لا على ترتيب الأبواب
      المعهود، بل على «أعراض» الأحكام وعِللها — بحلب. ألّف
      «البدائع» شرحاً لكتاب شيخه وحَميه السمرقندي «تحفة
      الفقهاء»، وأشهر ما حُكي عنه في كتب التراجم — كما رواه
      ابن خلكان — أن السمرقندي زوّجه ابنته فاطمة — وكانت هي
      نفسها فقيهة حنفية معروفة — على أن يكون مهرها كتاب
      «البدائع». ترجم له ابن خلكان في «وفيات الأعيان»، وأرّخ
      ابن العماد وفاته في «شذرات الذهب» سنة سبع وثمانين
      وخمسمئة.
    description_fr: |
      Abū Bakr ʿAlāʾ al-Dīn ibn Masʿūd al-Kāsānī, principal
      juriste hanafite d'Alep de la fin du VIᵉ siècle de
      l'Hégire et auteur de *Badāʾiʿ al-Ṣanāʾiʿ fī Tartīb al-
      Sharāʾiʿ* — l'encyclopédie hanafite des *furūʿ* la plus
      systématiquement organisée de l'école, structurée non par
      l'ordre standard des chapitres mais par les « causes »
      (*aʿrāḍ*) et raisons de chaque règle — mourut à Alep.
      Les *Badāʾiʿ* furent composés comme commentaire de la
      *Tuḥfat al-Fuqahāʾ* de son maître et beau-père al-
      Samarqandī; la fameuse anecdote biographique (rapportée
      par Ibn Khallikān) raconte qu'al-Samarqandī donna sa
      fille Fāṭima — elle-même juriste hanafite renommée — à
      al-Kāsānī en échange du manuscrit achevé, la dot étant
      « les *Badāʾiʿ* eux-mêmes ». Ibn Khallikān le traite
      dans *Wafayāt al-Aʿyān*; Ibn al-ʿImād confirme dans
      *Shadharāt al-Dhahab* à l'année 587 H.
    canonical_hijri: {year: 587, precision: year}
    canonical_gregorian: {date: 1191-01-01, precision: year, method: attested}
