  - slug: death-of-al-quduri
    category: scholar_death
    title_en: Death of Aḥmad al-Qudūrī — Author of *al-Mukhtaṣar*
    title_ar: وفاة أحمد القدوري — مصنف «المختصر» في فقه الحنفية
    title_fr: Mort d'Aḥmad al-Qudūrī — auteur d'*al-Mukhtaṣar*
    description_en: |
      Abū al-Ḥusayn Aḥmad ibn Muḥammad ibn Aḥmad al-Qudūrī al-
      Baghdādī, foremost Hanafi jurist of Iraq in the first half
      of the fifth century AH and author of *al-Mukhtaṣar* —
      universally known across the Hanafi world simply as
      *Mukhtaṣar al-Qudūrī*, the school's canonical primer of
      *furūʿ* — died in Baghdad at age about sixty-six. His
      *Mukhtaṣar* presents around twelve thousand *masāʾil* in
      a tightly condensed text whose phrasing became the
      standard reference of Hanafi pedagogy from Iraq to
      Khurasan and onward to the Indian subcontinent and the
      Ottoman lands; al-Marghīnānī's later *Bidāyat al-Mubtadī*
      and the four-part *al-Hidāya* take the *Qudūrī* as one of
      their two foundation texts. Ibn Khallikān treats him at
      length in *Wafayāt al-Aʿyān*; al-Dhahabī covers him in
      *Siyar Aʿlām al-Nubalāʾ*.
    description_ar: |
      توفي الإمام أبو الحسين أحمد بن محمد بن أحمد القدوري
      البغدادي — كبير فقهاء الحنفية بالعراق في النصف الأول من
      القرن الخامس الهجري، ومصنف «المختصر» المعروف في عامة
      بلاد الحنفية بـ«مختصر القدوري»، وهو متن المذهب المعتمد
      في تعليم فروعه — ببغداد عن نحو ست وستين سنة. ضمّن
      «المختصر» نحو اثنتي عشرة ألف مسألة في عبارات وجيزة، فصار
      المرجع المعتمد في تدريس الحنفية من العراق إلى خراسان،
      ومن ثَمَّ إلى الهند والأناضول. وعلى «القدوري» مع «الجامع
      الصغير» للشيباني بنى المرغيناني بعدُ كتابه «بداية
      المبتدي» وشرحه الكبير «الهداية». أطال ابن خلكان ترجمته
      في «وفيات الأعيان»، وترجم له الذهبي في «سير أعلام
      النبلاء».
    description_fr: |
      Abū al-Ḥusayn Aḥmad ibn Muḥammad ibn Aḥmad al-Qudūrī
      al-Baghdādī, le plus grand juriste hanafite de l'Irak
      de la première moitié du Vᵉ siècle de l'Hégire et
      auteur d'*al-Mukhtaṣar* — universellement connu dans le
      monde hanafite comme *Mukhtaṣar al-Qudūrī*, le manuel
      canonique de *furūʿ* de l'école — mourut à Bagdad à
      l'âge d'environ soixante-six ans. Son *Mukhtaṣar*
      présente quelque douze mille *masāʾil* dans un texte
      strictement condensé dont les formulations devinrent la
      référence pédagogique standard hanafite de l'Irak au
      Khurasan, puis vers le sous-continent indien et les
      territoires ottomans; *Bidāyat al-Mubtadī* et l'*al-
      Hidāya* en quatre tomes d'al-Marghīnānī prennent le
      *Qudūrī* comme l'un de leurs deux textes fondateurs.
      Ibn Khallikān le traite longuement dans *Wafayāt al-
      Aʿyān*; al-Dhahabī le couvre dans *Siyar Aʿlām al-
      Nubalāʾ*.
