  - slug: death-of-ibn-al-humam
    category: scholar_death
    title_en: Death of Kamāl al-Dīn Ibn al-Humām — Author of *Fatḥ al-Qadīr*
    title_ar: وفاة كمال الدين ابن الهُمام — مصنف «فتح القدير»
    title_fr: Mort de Kamāl al-Dīn Ibn al-Humām — auteur de *Fatḥ al-Qadīr*
    description_en: |
      Kamāl al-Dīn Muḥammad ibn ʿAbd al-Wāḥid Ibn al-Humām al-
      Sīwāsī al-Iskandarī, the foremost Hanafi muḥaqqiq of late-
      Mamluk Egypt and author of *Fatḥ al-Qadīr Sharḥ al-Hidāya*
      — the most analytically rigorous commentary on al-
      Marghīnānī's *al-Hidāya*, in which he routinely revises
      received Hanafi positions on internal evidentiary grounds
      — died in Cairo. He also composed *al-Taḥrīr fī Uṣūl al-
      Fiqh*, an *uṣūl* matn synthesising the Hanafi and Shāfiʿī
      uṣūl traditions whose own commentaries (*al-Taqrīr wa-l-
      Taḥbīr* of his student Ibn Amīr al-Ḥājj, *Taysīr al-
      Taḥrīr* of Amīr Bādshāh) became standard Hanafi uṣūl
      curriculum in their own right, and the celebrated *al-
      Musāyara* in *kalām* which his student al-Qāsim ibn Quṭlū-
      bughā then commented in *al-Musāmara*. Ibn Ḥajar — his
      contemporary — gives a long biographical notice in *al-
      Durar al-Kāmina* and *Inbāʾ al-Ghumr*; Ibn al-ʿImād
      confirms the death year in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام كمال الدين محمد بن عبد الواحد ابن الهُمام
      السيواسي الإسكندري — أكبر محققي الحنفية في مصر في أواخر
      العصر المملوكي، ومصنف «فتح القدير شرح الهداية» — وهو
      أدق شروح «الهداية» تحريراً للمذاهب، إذ يراجع فيه ابن
      الهمام ما يعتمده المتأخرون من أقوال المذهب على ضوء
      الأدلة المذهبية الداخلية فيرجّح ما يظهر له منها —
      بالقاهرة. وله أيضاً «التحرير في أصول الفقه»، وهو متن
      جامع بين أصول الحنفية والشافعية صار شرحه «التقرير
      والتحبير» لتلميذه ابن أمير الحاج و«تيسير التحرير» لأمير
      بادشاه من متون أصول الحنفية المعتمدة بنفسه؛ و«المسايرة»
      المشهورة في علم الكلام، شرحها تلميذه قاسم بن قُطلوبُغا
      في «المسامرة». ترجم له ابن حجر — وكان معاصره — ترجمة
      مطوّلة في «الدرر الكامنة» و«إنباء الغمر»، وأرّخ ابن
      العماد وفاته في «شذرات الذهب».
    description_fr: |
      Kamāl al-Dīn Muḥammad ibn ʿAbd al-Wāḥid Ibn al-Humām al-
      Sīwāsī al-Iskandarī, le plus grand *muḥaqqiq* hanafite
      de l'Égypte de la fin de l'époque mamelouke et auteur
      de *Fatḥ al-Qadīr Sharḥ al-Hidāya* — le commentaire le
      plus analytiquement rigoureux de l'*al-Hidāya* d'al-
      Marghīnānī, dans lequel il révise systématiquement les
      positions hanafites reçues sur des bases probatoires
      internes — mourut au Caire. Il composa également *al-
      Taḥrīr fī Uṣūl al-Fiqh*, un *matn* d'*uṣūl* synthétisant
      les traditions hanafite et shāfiʿite et dont les
      commentaires (*al-Taqrīr wa-l-Taḥbīr* de son élève Ibn
      Amīr al-Ḥājj, *Taysīr al-Taḥrīr* d'Amīr Bādshāh) sont
      eux-mêmes devenus des cursus standards d'*uṣūl*
      hanafite, ainsi que la célèbre *al-Musāyara* en *kalām*
      que son élève al-Qāsim ibn Quṭlūbughā commenta ensuite
      dans *al-Musāmara*. Ibn Ḥajar — son contemporain — donne
      une longue notice biographique dans *al-Durar al-
      Kāmina* et *Inbāʾ al-Ghumr*; Ibn al-ʿImād confirme
      l'année de décès dans *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 861, precision: year}
    canonical_gregorian: {date: 1457-01-01, precision: year, method: attested}
