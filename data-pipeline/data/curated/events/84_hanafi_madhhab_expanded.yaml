  - slug: death-of-fakhr-al-din-al-zaylai
    category: scholar_death
    title_en: Death of Fakhr al-Dīn al-Zaylaʿī — Author of *Tabyīn al-Ḥaqāʾiq*
    title_ar: وفاة فخر الدين الزيلعي — مصنف «تبيين الحقائق»
    title_fr: Mort de Fakhr al-Dīn al-Zaylaʿī — auteur de *Tabyīn al-Ḥaqāʾiq*
    description_en: |
      Fakhr al-Dīn ʿUthmān ibn ʿAlī al-Zaylaʿī, leading Hanafi
      jurist of eighth-century Cairo and author of *Tabyīn al-
      Ḥaqāʾiq Sharḥ Kanz al-Daqāʾiq* — the canonical Mamluk-era
      commentary on al-Nasafī's *Kanz al-Daqāʾiq* and one of
      the four pillar shurūḥ of the school's late-classical
      *furūʿ* tradition — died in Cairo. *Tabyīn al-Ḥaqāʾiq*
      systematically argues each Hanafi ruling from textual
      evidence and the school's authorities, becoming a
      standard reference of Mamluk-period Hanafi instruction
      from Cairo to Anatolia and being printed alongside Ibn
      Nujaym's *al-Baḥr al-Rāʾiq* in many later editions. He is
      to be distinguished from his contemporary the ḥadīth-
      *takhrīj* scholar ʿAbd Allāh ibn Yūsuf al-Zaylaʿī (d. 762
      AH), who was a different person despite the shared nisba.
      Ibn Ḥajar gives a notice in *al-Durar al-Kāmina*; Ibn al-
      ʿImād confirms in *Shadharāt al-Dhahab* under 743 AH.
    description_ar: |
      توفي الإمام فخر الدين عثمان بن علي الزيلعي — كبير فقهاء
      الحنفية بالقاهرة في القرن الثامن الهجري، ومصنف «تبيين
      الحقائق شرح كنز الدقائق» وهو شرح المذهب المعتمد في
      الزمن المملوكي على «كنز الدقائق» للإمام النسفي ومن
      الشروح الأربعة العمدة في فروع المذهب في أواخر العصر
      الكلاسيكي — بالقاهرة. ينظّم «التبيين» مذهب الحنفية على
      الاستدلال بالنصوص وأقوال أئمة المذهب في كل مسألة،
      فصار من المراجع المعتمدة في تدريس الحنفية في زمن
      المماليك من القاهرة إلى الأناضول، ويُطبع في الغالب
      مذيّلاً بحاشية «البحر الرائق» لابن نجيم. ويُفرّق بينه
      وبين مُعاصره عبد الله بن يوسف الزيلعي المتوفى سنة اثنتين
      وستين وسبعمئة، صاحب التخريجات الحديثية، فهما رجلان
      مختلفان وإن اشتركت النسبة. ترجم له ابن حجر في «الدرر
      الكامنة»، وأرّخ ابن العماد وفاته في «شذرات الذهب» سنة
      ثلاث وأربعين وسبعمئة.
    description_fr: |
      Fakhr al-Dīn ʿUthmān ibn ʿAlī al-Zaylaʿī, principal
      juriste hanafite du Caire du VIIIᵉ siècle de l'Hégire
      et auteur de *Tabyīn al-Ḥaqāʾiq Sharḥ Kanz al-Daqāʾiq*
      — le commentaire canonique de l'époque mamelouke sur
      le *Kanz al-Daqāʾiq* d'al-Nasafī et l'un des quatre
      *shurūḥ* piliers de la tradition tardo-classique des
      *furūʿ* de l'école — mourut au Caire. *Tabyīn al-
      Ḥaqāʾiq* argumente systématiquement chaque règle
      hanafite à partir des preuves textuelles et des
      autorités de l'école, devenant une référence standard
      de l'enseignement hanafite mamelouk du Caire à
      l'Anatolie et étant imprimé aux côtés d'*al-Baḥr al-
      Rāʾiq* d'Ibn Nujaym dans de nombreuses éditions
      postérieures. Il faut le distinguer de son contemporain
      le savant de *takhrīj* ḥadīth ʿAbd Allāh ibn Yūsuf al-
      Zaylaʿī (m. 762 H), qui était une autre personne malgré
      la *nisba* partagée. Ibn Ḥajar donne une notice dans
      *al-Durar al-Kāmina*; Ibn al-ʿImād confirme dans
      *Shadharāt al-Dhahab* à l'année 743 H.
    canonical_hijri: {year: 743, precision: year}
    canonical_gregorian: {date: 1342-01-01, precision: year, method: attested}
