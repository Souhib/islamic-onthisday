# Wave 84 of curated event additions (2026-04-27).
# Classical Hanafi madhhab scholars not yet in the dataset —
# the 4th–13th c. AH chain of Hanafi imāms whose mukhtaṣars,
# shurūḥ, fatāwā, and ḥāshiyas constitute the canonical written
# tradition of the school. Selection complements the figures
# already covered in earlier waves (al-Sarakhsī, al-Marghīnānī,
# Ibn Nujaym, al-Ḥaṣkafī, Ibn ʿĀbidīn — see files 06, 32, 68).
#
# Coverage. The Hanafi school's classical literary chain runs:
#   - al-Karkhī (340 AH) — early Iraqi imām, *Mukhtaṣar al-Karkhī*
#   - al-Qudūrī (428 AH) — *al-Mukhtaṣar* (the canonical primer)
#   - al-Ṣadr al-Shahīd (536 AH) — *Sharḥ al-Jāmiʿ al-Ṣaghīr*
#   - al-Kāsānī (587 AH) — *Badāʾiʿ al-Ṣanāʾiʿ*
#   - al-Ḥaṣīrī (636 AH) — *al-Tahdhīb fī al-Farāʾiḍ*
#   - Ibn Mawdūd al-Mawṣilī (683 AH) — *al-Ikhtiyār li-Taʿlīl al-Mukhtār*
#   - al-Zaylaʿī Fakhr al-Dīn (743 AH) — *Tabyīn al-Ḥaqāʾiq*
#   - al-Bābartī Akmal al-Dīn (786 AH) — *al-ʿInāya Sharḥ al-Hidāya*
#   - Ibn al-Humām (861 AH) — *Fatḥ al-Qadīr*
#   - Mullā Khusraw (885 AH) — *Durar al-Ḥukkām*, Ottoman shaykh al-Islām
#   - ʿAbd al-Ḥayy al-Lakhnawī (1304 AH) — Indian Hanafi muḥaddith-faqīh
#
# Sourcing. The classical wafayāt corpus is uneven by period:
# Ibn Khallikān's *Wafayāt* stops at 681 AH, al-Dhahabī's
# *Siyar* and *Tarīkh al-Islām* at 748 AH, Ibn al-ʿImād's
# *Shadharāt al-Dhahab* at 1000 AH. Figures within those windows
# are anchored by whichever classical witnesses cover them; Ibn
# Ḥajar's *al-Durar al-Kāmina* (8th c. AH biographical
# dictionary) is decisive for the 8th-century AH cluster.
# The 13th-century AH Indian Hanafi al-Lakhnawī falls beyond
# the Sunni wafayāt corpus altogether and is anchored by EI2 +
# editorial cross-check, on the same convention as wave 68's
# late-Ottoman entries.
#
# Hadith refs intentionally omitted (no specific narration
# anchors a Hanafi codifier's death). Only source_keys present
# in sources.yaml are used.

events:
  # =========================================================================
  # 4TH–5TH C. AH — THE EARLY IRAQI MUKHTAṢAR-WRITERS
  # =========================================================================

  - slug: death-of-abu-al-hasan-al-karkhi
    category: scholar_death
    title_en: Death of Abū al-Ḥasan al-Karkhī — Early Iraqi Hanafi Imām
    title_ar: وفاة أبي الحسن الكرخي — إمام الحنفية بالعراق
    title_fr: Mort d'Abū al-Ḥasan al-Karkhī — imām hanafite de l'Irak
    description_en: |
      Abū al-Ḥasan ʿUbayd Allāh ibn al-Ḥusayn al-Karkhī, head of
      the Hanafi school in Iraq during the first half of the
      fourth century AH and the figure through whom the chain of
      Hanafi transmission from Abū Yūsuf and al-Shaybānī passed
      to the Baghdad-Iraq school of the next two generations,
      died in Baghdad at age about eighty. His *Mukhtaṣar al-
      Karkhī* — among the earliest condensed Hanafi *furūʿ*
      manuals — became a teaching matn for the school's middle
      period; he is also remembered for his *uṣūl* legacy,
      preserved in the surviving treatise *al-Uṣūl* (a list of
      Hanafi legal-theory maxims that opens later uṣūl works).
      His students al-Jaṣṣāṣ al-Rāzī and al-Qudūrī carried his
      tradition into the next generation. Al-Dhahabī covers him
      in *Siyar Aʿlām al-Nubalāʾ*; Ibn Khallikān gives a notice
      in *Wafayāt al-Aʿyān*; Ibn al-ʿImād confirms the year in
      *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام أبو الحسن عبيد الله بن الحسين الكرخي — إمام
      الحنفية بالعراق في النصف الأول من القرن الرابع الهجري،
      ومن إليه انتهت رياسة المذهب في طبقة عقدت بها سلسلة
      الإسناد المذهبي من أبي يوسف ومحمد بن الحسن الشيباني إلى
      مدرسة بغداد فيما بعد — ببغداد عن نحو ثمانين سنة. وكان
      «مختصر الكرخي» من أوائل المختصرات في فروع المذهب الحنفي،
      فصار من متون التدريس في الطور الأوسط للمذهب. وله أيضاً
      أثر باقٍ في أصول المذهب في رسالته «الأصول» — وهي قائمة
      قواعد أصول الحنفية التي صدّر بها المؤلفون كتبهم في
      الأصول من بعده. وعلى تلامذته كالجصّاص الرازي والقدوري
      دار المذهب في الجيل التالي. ترجم له الذهبي في «سير
      أعلام النبلاء»، وابن خلكان في «وفيات الأعيان»، وأرّخ
      ابن العماد وفاته في «شذرات الذهب».
    description_fr: |
      Abū al-Ḥasan ʿUbayd Allāh ibn al-Ḥusayn al-Karkhī, chef
      de l'école hanafite en Irak durant la première moitié du
      IVᵉ siècle de l'Hégire et figure par laquelle la chaîne
      de transmission hanafite, depuis Abū Yūsuf et al-Shaybānī,
      passa à l'école baghdadienne des deux générations
      suivantes, mourut à Bagdad à l'âge d'environ quatre-
      vingts ans. Son *Mukhtaṣar al-Karkhī* — parmi les
      premiers manuels condensés de *furūʿ* hanafites — devint
      un *matn* d'enseignement pour la période médiane de
      l'école; on le retient aussi pour son legs en *uṣūl*,
      conservé dans le traité *al-Uṣūl* (une liste de maximes
      de théorie juridique hanafite reprise en tête des
      ouvrages d'*uṣūl* postérieurs). Ses élèves al-Jaṣṣāṣ
      al-Rāzī et al-Qudūrī portèrent sa tradition à la
      génération suivante. Al-Dhahabī le traite dans *Siyar
      Aʿlām al-Nubalāʾ*; Ibn Khallikān donne une notice dans
      *Wafayāt al-Aʿyān*; Ibn al-ʿImād confirme l'année dans
      *Shadharāt al-Dhahab*.
