  # =========================================================================
  # 13TH C. AH — INDIAN HANAFI REVIVAL
  # =========================================================================

  - slug: death-of-abd-al-hayy-al-lakhnawi
    category: scholar_death
    title_en: Death of ʿAbd al-Ḥayy al-Lakhnawī — Indian Hanafi Muḥaddith-Faqīh
    title_ar: وفاة عبد الحي اللكنوي — محدث فقيه الحنفية بالهند
    title_fr: Mort de ʿAbd al-Ḥayy al-Lakhnawī — muḥaddith-juriste hanafite de l'Inde
    description_en: |
      Abū al-Ḥasanāt Muḥammad ʿAbd al-Ḥayy ibn ʿAbd al-Ḥalīm al-
      Lakhnawī al-Anṣārī, the foremost Indian Hanafi jurist-
      ḥadīth scholar of the late thirteenth century AH and one
      of the most prolific Hanafi authors of the modern period,
      died at Lucknow at age about thirty-nine. His more than
      one hundred works span hadith, *takhrīj*, fiqh, biography,
      and uṣūl al-fiqh, including *al-Tarīqa al-Muthlā* (a
      lengthy treatise on the place of *taqlīd* in Hanafi
      method), *al-Fawāʾid al-Bahiyya* (a biographical
      dictionary of Hanafi scholars used to this day), *Imām
      al-Kalām fī-mā Yataʿallaq bi-l-Qirāʾa Khalf al-Imām*, and
      his celebrated marginalia (*taʿlīqāt*) on al-Marghīnānī's
      *al-Hidāya* and on the *Muwaṭṭaʾ* of Imām Muḥammad ibn
      al-Ḥasan al-Shaybānī. He died in 1304 AH/1886 CE; the
      attestation falls beyond the close of *Shadharāt al-
      Dhahab*, so the principal Sunni-canonical witness is EI2
      with editorial cross-reference to the Indian Hanafi
      biographical tradition that records him as the
      ʿAllāma of late Lucknow.
    description_ar: |
      توفي العلامة أبو الحسنات محمد عبد الحي بن عبد الحليم
      اللكنوي الأنصاري — كبير محدثي الحنفية وفقهائهم بالهند
      في أواخر القرن الثالث عشر الهجري ومن أكثر علماء
      الحنفية في العصر الحديث تصنيفاً — بلكنو عن نحو تسع
      وثلاثين سنة. وتجاوزت تصانيفه المئة في علوم الحديث
      والتخريج والفقه والتراجم وأصول الفقه، ومنها «الطريقة
      المثلى» — رسالته المطوّلة في موضع التقليد من المذهب
      الحنفي — و«الفوائد البهية» وهو معجم تراجم الحنفية
      المعتمد إلى اليوم، و«إمام الكلام فيما يتعلق بالقراءة
      خلف الإمام»، وتعليقاته المشهورة على «الهداية» للمرغيناني
      وعلى «موطأ» الإمام محمد بن الحسن الشيباني. وفاته رحمه
      الله سنة أربع وثلاثمئة بعد الألف الموافقة سنة ست وثمانين
      وثمانمئة وألف ميلادية، وهي بعد ختام «شذرات الذهب»،
      فالعمدة في توثيقها عند أهل السنة «دائرة المعارف
      الإسلامية» مع ما جرى في تراجم الحنفية بالهند من ذكره
      علاّمة الأمصار في أواخر لكنو.
    description_fr: |
      Abū al-Ḥasanāt Muḥammad ʿAbd al-Ḥayy ibn ʿAbd al-Ḥalīm
      al-Lakhnawī al-Anṣārī, le plus grand savant indien
      hanafite — juriste et muḥaddith — de la fin du XIIIᵉ
      siècle de l'Hégire et l'un des auteurs hanafites les
      plus prolifiques de la période moderne, mourut à Lucknow
      à l'âge d'environ trente-neuf ans. Ses plus de cent
      ouvrages couvrent le ḥadīth, le *takhrīj*, le *fiqh*,
      la biographie et l'*uṣūl al-fiqh*, parmi lesquels *al-
      Tarīqa al-Muthlā* (un long traité sur la place du
      *taqlīd* dans la méthode hanafite), *al-Fawāʾid al-
      Bahiyya* (un dictionnaire biographique des savants
      hanafites encore utilisé aujourd'hui), *Imām al-Kalām
      fī-mā Yataʿallaq bi-l-Qirāʾa Khalf al-Imām*, et ses
      célèbres *taʿlīqāt* sur l'*al-Hidāya* d'al-Marghīnānī et
      sur le *Muwaṭṭaʾ* de l'imām Muḥammad ibn al-Ḥasan al-
      Shaybānī. Il mourut en 1304 H/1886 EC; l'attestation
      étant postérieure à la clôture de *Shadharāt al-
      Dhahab*, le principal témoin canonique sunnite est
      l'EI2, avec un croisement éditorial avec la tradition
      biographique hanafite indienne qui le retient comme la
      ʿallāma du Lucknow tardif.
