  - slug: death-of-al-babarti
    category: scholar_death
    title_en: Death of Akmal al-Dīn al-Bābartī — Author of *al-ʿInāya Sharḥ al-Hidāya*
    title_ar: وفاة أكمل الدين البابرتي — صاحب «العناية شرح الهداية»
    title_fr: Mort d'Akmal al-Dīn al-Bābartī — auteur d'*al-ʿInāya Sharḥ al-Hidāya*
    description_en: |
      Akmal al-Dīn Muḥammad ibn Maḥmūd al-Bābartī, leading
      Hanafi jurist and theologian of eighth-century Cairo and
      author of *al-ʿInāya Sharḥ al-Hidāya* — among the
      foundational commentaries on al-Marghīnānī's *al-Hidāya*
      and a standard component of the school's curriculum
      from his lifetime onward — died in Cairo. He also wrote
      a major *Sharḥ al-Manār* on al-Nasafī's uṣūl matn
      *Manār al-Anwār*, a commentary on Ibn al-Ḥājib's *al-
      Mukhtaṣar* in uṣūl, and a *Sharḥ al-ʿAqīda al-Ṭaḥāwiyya*
      that remains widely consulted. Trained at the Mamluk
      capital in both fiqh and *kalām*, he was one of the
      principal teachers at al-Madrasa al-Ṣarghatmishiyya in
      Cairo and trained a generation of Hanafis whose pupils
      would in turn dominate Mamluk scholarship into the
      ninth century. Ibn Ḥajar gives a long notice in *al-
      Durar al-Kāmina*; Ibn al-ʿImād confirms in *Shadharāt
      al-Dhahab* under 786 AH.
    description_ar: |
      توفي الإمام أكمل الدين محمد بن محمود البابرتي — كبير
      فقهاء الحنفية ومتكلميهم بالقاهرة في القرن الثامن
      الهجري، ومصنف «العناية شرح الهداية» — وهو من الشروح
      الأصول على «الهداية» للمرغيناني، صار من تلاميذه ومن
      بعدهم متناً ثابتاً في مناهج تدريس المذهب — بالقاهرة.
      وله أيضاً «شرح المنار» على «منار الأنوار» للنسفي في
      أصول الفقه، وشرح «مختصر ابن الحاجب» في الأصول، و«شرح
      العقيدة الطحاوية» الذي لا يزال حاضراً في تعاطي العلم.
      تربّى في القاهرة المملوكية على الفقه والكلام معاً، فصار
      من أئمة التدريس بالمدرسة الصرغتمشية، وتخرّج عليه طبقة
      من الحنفية ملأ تلامذتهم دواوين المذهب في القرن التاسع.
      أطال ابن حجر ترجمته في «الدرر الكامنة»، وأرّخ ابن العماد
      وفاته في «شذرات الذهب» سنة ست وثمانين وسبعمئة.
    description_fr: |
      Akmal al-Dīn Muḥammad ibn Maḥmūd al-Bābartī, principal
      juriste hanafite et théologien du Caire du VIIIᵉ siècle
      de l'Hégire et auteur d'*al-ʿInāya Sharḥ al-Hidāya* —
      parmi les commentaires fondateurs de l'*al-Hidāya*
      d'al-Marghīnānī et composante standard du cursus de
      l'école dès son vivant — mourut au Caire. Il écrivit
      également un *Sharḥ al-Manār* majeur sur le *matn*
      d'*uṣūl* d'al-Nasafī, un commentaire sur l'*al-
      Mukhtaṣar* d'Ibn al-Ḥājib en *uṣūl*, et un *Sharḥ al-
      ʿAqīda al-Ṭaḥāwiyya* encore largement consulté. Formé
      dans la capitale mamelouke en *fiqh* et en *kalām*, il
      fut l'un des principaux enseignants à la madrasa al-
      Ṣarghatmishiyya du Caire et forma une génération de
      hanafites dont les élèves domineraient à leur tour
      l'érudition mamelouke jusqu'au IXᵉ siècle. Ibn Ḥajar
      donne une longue notice dans *al-Durar al-Kāmina*;
      Ibn al-ʿImād confirme dans *Shadharāt al-Dhahab* à
      l'année 786 H.
    canonical_hijri: {year: 786, precision: year}
    canonical_gregorian: {date: 1384-01-01, precision: year, method: attested}
