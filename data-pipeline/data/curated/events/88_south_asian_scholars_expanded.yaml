  # =========================================================================
  # MATURĪDĪ RATIONALIST LINE — KHAYRĀBĀD AND 1857
  # =========================================================================

  - slug: death-of-fadl-al-haqq-al-khayrabadi
    category: scholar_death
    title_en: Death of Faḍl al-Ḥaqq al-Khayrābādī — Exiled Mawlānā of 1857
    title_ar: وفاة الفضل الحق الخيرآبادي — مولانا منفي ١٨٥٧
    title_fr: Mort de Faḍl al-Ḥaqq al-Khayrābādī — Mawlānā exilé de 1857
    description_en: |
      Faḍl al-Ḥaqq ibn Faḍl Imām al-Khayrābādī — Indian Sunni
      Hanafi jurist and Maturīdī theologian of the rationalist
      *Khayrābādī* line, distinct from the Walīullāhī ḥadīth
      revival in its emphasis on classical *kalām* and
      *manṭiq* — died in penal exile on the Andaman Islands
      on 12 Ṣafar 1278 AH (19 August 1861 CE), about
      twenty-two months after the British colonial
      authorities transported him to the prison-colony at
      Port Blair. He was about sixty-four. He had issued the
      Friday-sermon fatwa in Delhi in late June 1857
      authorising armed defence of Muslim Delhi against the
      British, and was tried in 1859: his defence was so
      compelling the magistrate began drafting an acquittal
      until al-Khayrābādī himself, refusing to lie, confirmed
      authorship of the fatwa. He authored *al-Thawra al-
      Hindiyya* in Andamans captivity — preserved in Arabic
      and the first Muslim-internal account of the 1857
      rebellion — and earlier *Taḥqīq al-Fatwā fī Ibṭāl al-
      Ṭughwā* refuting the Walīullāhī-line reformists.
    description_ar: |
      توفي العلامة الفضل الحق بن فضل إمام الخيرآبادي —
      الفقيه السني الهندي على المذهب الحنفي، والعالم
      الكلامي على مذهب الماتريدية، من أئمة المنهج
      «الخيرآبادي» العقلي المتميز عن الحركة الحديثية
      الولي اللهية بتأكيده على علم الكلام الكلاسيكي والمنطق
      — في المنفى الجزائي بجزر أندامان يوم ١٢ صفر سنة
      ١٢٧٨ هـ (الموافق ١٩ أوت ١٨٦١ ميلادي)، بعد قرابة
      اثنين وعشرين شهراً من نقله إلى مستعمرة السجن في
      «بور بلير» بأمر السلطات البريطانية الاستعمارية. وقد
      ناهز الرابعة والستين. وكان قد ألقى خطبة الجمعة بدلهي
      أواخر جوان ١٨٥٧ ميلادي وأصدر فتواه بمشروعية الدفاع
      المسلح عن دلهي المسلمة في وجه البريطانيين، فحوكم
      سنة ١٨٥٩: واستحضر دفاعاً قوياً أوشك القاضي معه على
      صياغة الحكم بالبراءة، حتى أبى الخيرآبادي الكذب فأقرّ
      بفتواه. وألّف في الأسر بأندامان «الثورة الهندية»
      بالعربية — أول رواية مسلمة من الداخل لثورة سنة
      ١٢٧٤ هـ — ومن قبلُ ألّف «تحقيق الفتوى في إبطال
      الطغوى» رداً على إصلاحيي المنهج الولي اللهي.
    description_fr: |
      Faḍl al-Ḥaqq ibn Faḍl Imām al-Khayrābādī — juriste
      sunnite indien hanafite et théologien maturīdī de la
      ligne rationaliste *Khayrābādī*, distincte du
      renouveau du hadith walīullāhī par son insistance sur
      le *kalām* et la logique classiques — mourut en exil
      pénitentiaire sur les îles Andaman le 12 Ṣafar 1278 H
      (19 août 1861 EC), environ vingt-deux mois après que
      les autorités coloniales britanniques l'eurent
      transporté à la colonie pénale de Port Blair. Il avait
      environ soixante-quatre ans. Il avait prononcé le
      sermon du vendredi à Delhi à la fin juin 1857
      autorisant la défense armée du Delhi musulman contre
      les Britanniques, et fut jugé en 1859 : sa défense
      fut si convaincante que le magistrat commença à
      rédiger un acquittement, jusqu'à ce qu'al-Khayrābādī,
      refusant de mentir, confirme la paternité de la
      *fatwa*. Il composa en captivité aux Andaman *al-
      Thawra al-Hindiyya* — premier récit musulman-interne
      en arabe de la révolte de 1857 — et auparavant
      *Taḥqīq al-Fatwā fī Ibṭāl al-Ṭughwā* en réfutation
      des réformistes de la ligne walīullāhī.
    canonical_hijri: {year: 1278, month: 2, day: 12, precision: day}
    canonical_gregorian: {date: 1861-08-19, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    people: [[fadl-al-haqq-al-khayrabadi, subject]]
