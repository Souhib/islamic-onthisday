  - slug: death-of-ubaydullah-al-sindhi
    category: scholar_death
    title_en: Death of Mawlānā ʿUbaydullāh al-Sindhī — Silk-Letters Mujāhid
    title_ar: وفاة المولانا عبيد الله السندي — مجاهد الرسائل الحريرية
    title_fr: Mort du Mawlānā ʿUbaydullāh al-Sindhī — mujāhid des Lettres de Soie
    description_en: |
      Mawlānā ʿUbaydullāh al-Sindhī (Buṭā Singh before his
      conversion) — Indian Sunni Hanafi scholar of the
      Deobandī tradition, student of Shaykh al-Hind Maḥmūd
      al-Ḥasan, and one of the principal architects of the
      "Silk Letters" anti-colonial network active across
      the Hijāz, Afghanistan and India during the First
      World War — died near Khanpur in Sindh on 2 Ramaḍān
      1363 AH (21 August 1944 CE) at age seventy-two while
      visiting his daughter. He had spent nearly a quarter
      century in exile after the Silk-Letters network was
      uncovered in 1916: first as foreign minister of the
      *Ḥukūmat-i Muwaqqata* (the provisional Indian
      government in Kabul), then in Soviet Russia and
      Turkey, and ultimately fourteen years in Mecca
      where he composed his commentary on the Qurʾān
      *al-Mawqif al-Maḥmūd* under the influence of Shāh
      Walīullāh's framework. He returned to India in
      1939 and opposed the partition of India.
    description_ar: |
      توفي المولانا عبيد الله السندي (بُٹا سنغ قبل
      إسلامه) — العالم السني الهندي على المذهب الحنفي من
      تراث ديوبند، تلميذ شيخ الهند محمود الحسن، ومن أكبر
      المهندسين لشبكة «الرسائل الحريرية» المناهضة
      للاستعمار الناشطة بين الحجاز وأفغانستان والهند
      خلال الحرب العالمية الأولى — قرب «خانپور» بالسند
      يوم ٢ رمضان سنة ١٣٦٣ هـ (الموافق ٢١ أوت ١٩٤٤
      ميلادي) عن اثنتين وسبعين سنة، أثناء زيارته
      لابنته. وكان قد قضى نحو ربع قرن في المنفى بعد
      اكتشاف شبكة الرسائل الحريرية سنة ١٩١٦ ميلادي:
      وزيراً للخارجية في «حكومت موقتة» (الحكومة الهندية
      المؤقتة بكابل)، ثم في روسيا السوفياتية وتركيا،
      ثم أربع عشرة سنة بمكة المكرمة كتب فيها تفسيره
      «الموقف المحمود» على منهج الشاه ولي الله. وعاد
      إلى الهند سنة ١٩٣٩ ميلادي، فعارض تقسيم الهند.
    description_fr: |
      Mawlānā ʿUbaydullāh al-Sindhī (Buṭā Singh avant sa
      conversion) — savant sunnite indien hanafite de la
      tradition deobandie, élève de Shaykh al-Hind Maḥmūd
      al-Ḥasan, et l'un des principaux architectes du
      réseau anti-colonial des « Lettres de Soie »
      actif entre le Hijāz, l'Afghanistan et l'Inde
      durant la Première Guerre mondiale — mourut près
      de Khanpur dans le Sindh le 2 Ramaḍān 1363 H
      (21 août 1944 EC) à l'âge de soixante-douze ans
      lors d'une visite à sa fille. Il avait passé près
      d'un quart de siècle en exil après la découverte du
      réseau des Lettres de Soie en 1916 : d'abord
      ministre des Affaires étrangères du *Ḥukūmat-i
      Muwaqqata* (gouvernement provisoire indien à
      Kaboul), puis en Russie soviétique et en Turquie,
      enfin quatorze ans à La Mecque où il composa son
      commentaire coranique *al-Mawqif al-Maḥmūd* dans
      le cadre walīullāhī. Il rentra en Inde en 1939
      et s'opposa à la partition de l'Inde.
