# Wave 88 of curated event additions (2026-04-27).
# Further South Asian (Indian / Pakistani / Bangladeshi) Sunni scholars not
# previously in the dataset, complementing 35_indian_subcontinent_scholars.yaml.
# Three layers: (i) the Walīullāhī generation around the brothers of Shāh
# ʿAbd al-ʿAzīz — Shāh ʿAbd al-Qādir and Shāh Rafīʿ al-Dīn — together with
# the Naqshbandī-Mujaddidī Sufi-poet Khwāja Mīr Dard; (ii) the rationalist
# Maturīdī line of Faḍl al-Ḥaqq al-Khayrābādī, exiled to the Andamans for
# his 1857 fatwa; (iii) the Deobandī muḥaddithūn — Khalīl Aḥmad al-
# Sahāranpūrī (sharḥ on Abū Dāwūd), Shabbīr Aḥmad al-ʿUthmānī (sharḥ on
# Muslim and Shaykh al-Islām of Pakistan), Yūsuf al-Bannūrī (sharḥ on
# al-Tirmidhī), Manẓūr al-Nuʿmānī, Sayyid Sulaymān al-Nadwī (co-author of
# *Sīrat al-Nabī*), ʿUbaydullāh al-Sindhī (Silk-Letters), and the Mughal-
# Punjabi jurist Sir Mian Muḥammad Shafīʿ. All eleven are post-1750
# Sunni Hanafi figures attested in modern reference works (EI2 + standard
# biographical literature). None are sahaba; no hadith refs.

events:
  # =========================================================================
  # WALĪULLĀHĪ TRADITION — DELHI BROTHERS AND THE NAQSHBANDĪ POET
  # =========================================================================

  - slug: death-of-khwaja-mir-dard
    category: scholar_death
    title_en: Death of Khwāja Mīr Dard — Naqshbandī Sufi-Poet of Delhi
    title_ar: وفاة الخواجة مير درد — صوفي ديوبند الشاعر الدلهوي
    title_fr: Mort de Khwāja Mīr Dard — soufi-poète naqshbandī de Delhi
    description_en: |
      Khwāja Mīr Dard (Sayyid Khwāja Mīr Muḥammadī Nāṣir, also
      called *Dard*, "pain") — Indian Sunni Sufi-poet of late
      Mughal Delhi, master of the Naqshbandī-Mujaddidī branch
      his father Khwāja Muḥammad Nāṣir ʿAndalīb had founded
      under the name *Ṭarīqa Muḥammadiyya Khāliṣa*, and one
      of the four pillars of Urdu *ghazal* together with Mīr
      Taqī Mīr, Sawdā, and Mīr Ḥasan — died at Delhi in 1199
      AH (1785 CE) at age about sixty-five. Classical sources
      do not preserve a day-precise date, so we record the
      year only. His prose works *ʿIlm al-Kitāb*, *Nāla-yi
      Dard*, *Āh-i Sard* and his Persian and Urdu *dīwāns*
      together set the metaphysical vocabulary of Urdu Sufi
      verse for the next two centuries. He maintained an active
      *khānaqāh* in Delhi through the political collapse of the
      late Mughal court, refusing every offer of patronage from
      the rival powers contesting the city.
    description_ar: |
      توفي الخواجة مير درد — السيد خواجة مير محمدي ناصر،
      الملقب بـ«درد» — صوفي سني هندي شاعر من دلهي المغولية
      المتأخرة، خليفة الفرع النقشبندي المجددي الذي أسسه أبوه
      خواجة محمد ناصر «عندليب» باسم «الطريقة المحمدية الخالصة»،
      وأحد الأركان الأربعة لغزل الأردية مع مير تقي مير وسودا
      ومير حسن — بدلهي سنة ١١٩٩ هـ (الموافق ١٧٨٥ ميلادي)
      عن نحو خمس وستين سنة. ولم تحفظ المصادر الكلاسيكية يوم
      وفاته، فاكتفينا بالسنة. ومصنفاته النثرية «علم الكتاب»
      و«ناله درد» و«آه سرد» وديوانه بالفارسية وآخر بالأردية
      مما قعّد الاصطلاح العرفاني لشعر الأردية الصوفي طوال
      قرنين تاليين. وأقام «خانقاه» نشطة بدلهي خلال انهيار
      البلاط المغولي، رافضاً كل عرض رعاية من القوى المتنازعة
      على المدينة.
    description_fr: |
      Khwāja Mīr Dard (Sayyid Khwāja Mīr Muḥammadī Nāṣir,
      surnommé *Dard*, « la douleur ») — soufi-poète sunnite
      indien du Delhi mogholo-tardif, maître de la branche
      naqshbandī-mujaddidī fondée par son père Khwāja
      Muḥammad Nāṣir ʿAndalīb sous le nom de *Ṭarīqa
      Muḥammadiyya Khāliṣa*, et l'un des quatre piliers du
      *ghazal* ourdou avec Mīr Taqī Mīr, Sawdā et Mīr Ḥasan
      — mourut à Delhi en 1199 H (1785 EC) à l'âge d'environ
      soixante-cinq ans. Les sources classiques ne conservent
      pas de date au jour près; nous n'enregistrons que
      l'année. Ses œuvres en prose *ʿIlm al-Kitāb*, *Nāla-yi
      Dard*, *Āh-i Sard* et ses *dīwāns* persan et ourdou
      fixèrent le vocabulaire métaphysique de la poésie soufie
      ourdoue pour les deux siècles suivants. Il maintint une
      *khānaqāh* active à Delhi pendant l'effondrement
      politique de la cour moghole tardive, refusant toute
      offre de patronage des puissances rivales se disputant
      la ville.
    canonical_hijri: {year: 1199, precision: year}
    canonical_gregorian: {date: 1785-01-01, precision: year, method: tabular_conversion}
