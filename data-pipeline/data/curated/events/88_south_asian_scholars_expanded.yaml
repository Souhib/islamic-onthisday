  - slug: death-of-manzur-numani
    category: scholar_death
    title_en: Death of Muḥammad Manẓūr al-Nuʿmānī — Indian Deobandī Muḥaddith
    title_ar: وفاة محمد منظور النعماني — محدث الديوبندية الهندي
    title_fr: Mort de Muḥammad Manẓūr al-Nuʿmānī — muḥaddith deobandi indien
    description_en: |
      Muḥammad Manẓūr al-Nuʿmānī — Indian Sunni Hanafi
      muḥaddith of the Deobandī tradition, *Shaykh al-
      Ḥadīth* at Dār al-ʿUlūm Nadwat al-ʿUlamāʾ in Lucknow
      and later a member of the governing councils of
      Dār al-ʿUlūm Deoband — died at Lucknow on 26 Dhū al-
      Ḥijja 1417 AH (4 May 1997 CE) at age ninety-one and
      was buried at the ʿAyshbāgh cemetery. He had studied
      hadith at Deoband under Anwar Shāh al-Kashmīrī and
      graduated as the highest-marked student in the
      *dawra-yi ḥadīth* of his year. His Urdu *Maʿārif al-
      Ḥadīth* in eight volumes — a thematically arranged
      ḥadīth manual treating ʿaqīda, ʿibādāt, akhlāq and
      muʿāmalāt for the Urdu reading public — became one
      of the most widely circulated Sunni ḥadīth works in
      twentieth-century South Asia. He worked closely with
      Sayyid Abū al-Ḥasan ʿAlī al-Nadwī as joint editor
      of the journal *al-Furqān*.
    description_ar: |
      توفي العلامة محمد منظور النعماني — محدث سني هندي
      على المذهب الحنفي من تراث ديوبند، شيخ الحديث بدار
      العلوم لندوة العلماء بلكناو، ولاحقاً عضو مجالس
      إدارة دار العلوم ديوبند — بلكناو يوم ٢٦ ذي الحجة
      سنة ١٤١٧ هـ (الموافق ٤ ماي ١٩٩٧ ميلادي) عن إحدى
      وتسعين سنة، ودُفن بمقبرة «عيش باغ». وكان قد درس
      الحديث بديوبند على العلامة أنور شاه الكشميري، وتخرج
      مرتباً الأول في «دورة الحديث» في عام تخرجه. و«معارف
      الحديث» له بالأردية في ثمانية مجلدات — تنظيم
      موضوعي لمتون الحديث في العقيدة والعبادات والأخلاق
      والمعاملات لعموم قراء الأردية — صار من أوسع كتب
      الحديث السنية انتشاراً في شبه القارة الهندية في
      القرن العشرين. وعمل عن قرب مع السيد أبي الحسن علي
      الندوي شريكاً له في تحرير مجلة «الفرقان».
    description_fr: |
      Muḥammad Manẓūr al-Nuʿmānī — muḥaddith sunnite
      indien hanafite de la tradition deobandie, *Shaykh
      al-Ḥadīth* à Dār al-ʿUlūm Nadwat al-ʿUlamāʾ à
      Lucknow et plus tard membre des conseils de
      direction de Dār al-ʿUlūm Deoband — mourut à Lucknow
      le 26 Dhū al-Ḥijja 1417 H (4 mai 1997 EC) à l'âge
      de quatre-vingt-onze ans et fut inhumé au cimetière
      ʿAyshbāgh. Il avait étudié le hadith à Deoband
      auprès d'Anwar Shāh al-Kashmīrī et obtint son
      diplôme avec la meilleure note dans le *dawra-yi
      ḥadīth* de sa promotion. Son *Maʿārif al-Ḥadīth* en
      ourdou en huit volumes — manuel de hadith
      thématiquement organisé traitant de *ʿaqīda*,
      *ʿibādāt*, *akhlāq* et *muʿāmalāt* pour le public
      lettré ourdou — devint l'un des ouvrages sunnites de
      hadith les plus largement diffusés dans l'Asie du
      Sud du XXe siècle. Il travailla étroitement avec
      Sayyid Abū al-Ḥasan ʿAlī al-Nadwī comme co-éditeur
      de la revue *al-Furqān*.
