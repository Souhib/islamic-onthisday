  - slug: death-of-yusuf-al-bannuri
    category: scholar_death
    title_en: Death of Muḥammad Yūsuf al-Bannūrī — Author of *Maʿārif al-Sunan*
    title_ar: وفاة محمد يوسف البنوري — صاحب «معارف السنن»
    title_fr: Mort de Muḥammad Yūsuf al-Bannūrī — auteur des *Maʿārif al-Sunan*
    description_en: |
      Muḥammad Yūsuf ibn Muḥammad Zakariyyā al-Bannūrī —
      Pakistani Sunni Hanafi muḥaddith of the Deobandī
      tradition, principal student of Anwar Shāh al-
      Kashmīrī, founder of *al-Jāmiʿa al-ʿUlūm al-Islāmiyya*
      in Karachi (the seminary later known as *Bannūrī Town*),
      and president of the *Wifāq al-Madāris al-ʿArabiyya*
      union of Pakistani Hanafi seminaries from 1973 — died
      at Rawalpindi on 4 Dhū al-Qaʿda 1397 AH (17 October
      1977 CE) at age sixty-nine, having taken ill while
      attending a meeting of the Islamic Consultative
      Council at Islamabad. His Arabic *Maʿārif al-Sunan
      Sharḥ Sunan al-Tirmidhī* in six volumes — drafted
      from his teacher al-Kashmīrī's lectures on the
      *Jāmiʿ* of Abū ʿĪsā al-Tirmidhī and developed by
      al-Bannūrī through his teaching career — became a
      reference Hanafi-Deobandī commentary on al-
      Tirmidhī's collection.
    description_ar: |
      توفي العلامة محمد يوسف بن محمد زكريا البنوري —
      محدث سني باكستاني على المذهب الحنفي من تراث
      ديوبند، أكبر تلامذة العلامة أنور شاه الكشميري،
      ومؤسس «الجامعة العلوم الإسلامية» بكراتشي
      (المعروفة لاحقاً باسم «بنوري تاون»)، ورئيس «وفاق
      المدارس العربية» اتحاد المدارس الحنفية الباكستانية
      منذ سنة ١٩٧٣ ميلادي — براولپندي يوم ٤ ذي القعدة
      سنة ١٣٩٧ هـ (الموافق ١٧ أكتوبر ١٩٧٧ ميلادي) عن
      تسع وستين سنة، إثر اعتلاله أثناء حضوره اجتماع
      «المجلس الإسلامي الاستشاري» بإسلام آباد. و«معارف
      السنن شرح سنن الترمذي» بالعربية في ستة مجلدات —
      أصلها تقارير على دروس شيخه الكشميري في «الجامع»
      لأبي عيسى الترمذي، طوّرها البنوري في حلقات تدريسه
      — صار من المراجع المعتمدة الحنفية الديوبندية على
      جامع الترمذي.
    description_fr: |
      Muḥammad Yūsuf ibn Muḥammad Zakariyyā al-Bannūrī —
      muḥaddith sunnite pakistanais hanafite de la
      tradition deobandie, élève principal d'Anwar Shāh
      al-Kashmīrī, fondateur de *al-Jāmiʿa al-ʿUlūm al-
      Islāmiyya* à Karachi (le séminaire connu plus tard
      sous le nom de *Bannūrī Town*), et président de la
      *Wifāq al-Madāris al-ʿArabiyya*, fédération des
      séminaires hanafites pakistanais à partir de 1973 —
      mourut à Rawalpindi le 4 Dhū al-Qaʿda 1397 H (17
      octobre 1977 EC) à l'âge de soixante-neuf ans,
      après avoir été pris de malaise lors d'une réunion
      du Conseil consultatif islamique à Islamabad. Ses
      *Maʿārif al-Sunan Sharḥ Sunan al-Tirmidhī* en arabe
      en six volumes — élaborés à partir des cours de son
      maître al-Kashmīrī sur le *Jāmiʿ* d'Abū ʿĪsā al-
      Tirmidhī et développés par al-Bannūrī au cours de
      sa carrière d'enseignement — devinrent un commentaire
      hanafite-deobandi de référence sur la collection
      d'al-Tirmidhī.
