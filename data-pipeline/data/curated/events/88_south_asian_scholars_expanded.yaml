  - slug: death-of-shah-rafi-al-din-al-dihlawi
    category: scholar_death
    title_en: Death of Shāh Rafīʿ al-Dīn al-Dihlawī — Persian Translator of the Qurʾān
    title_ar: وفاة الشاه رفيع الدين الدهلوي — مترجم القرآن إلى الفارسية
    title_fr: Mort de Shāh Rafīʿ al-Dīn al-Dihlawī — traducteur persan du Coran
    description_en: |
      Shāh Rafīʿ al-Dīn ibn Aḥmad al-Dihlawī — Indian Sunni
      Hanafi scholar, third son of Shāh Walīullāh of Delhi
      and younger brother of Shāh ʿAbd al-ʿAzīz and Shāh
      ʿAbd al-Qādir — died at Delhi in 1233 AH (1818 CE).
      Classical sources do not preserve a day-precise date,
      so we record the year only. His most enduring work is
      a complete Persian translation of the Qurʾān,
      complementing his brother Shāh ʿAbd al-Qādir's
      contemporaneous Urdu *Mūḍiḥ al-Qurʾān*: where Shāh ʿAbd
      al-Qādir opened the scripture to the Urdu-reading public,
      Shāh Rafīʿ al-Dīn served the Persian-literate ʿulamāʾ
      of the late Mughal world. He taught at the Walīullāhī
      seminary and produced a number of Arabic *risālas* on
      *uṣūl* and the verification of the *isnād*; his
      brother Shāh ʿAbd al-ʿAzīz cited his rulings in the
      *Fatāwā ʿAzīziyya*.
    description_ar: |
      توفي الشاه رفيع الدين بن أحمد الدهلوي — العالم السني
      الهندي الحنفي، ثالث أبناء الشاه ولي الله الدهلوي،
      وأخو الشاه عبد العزيز والشاه عبد القادر الأصغر —
      بدلهي سنة ١٢٣٣ هـ (الموافق ١٨١٨ ميلادي). ولم تحفظ
      المصادر الكلاسيكية يوم وفاته، فاكتفينا بالسنة. وأخلد
      آثاره ترجمة كاملة للقرآن الكريم بالفارسية، تكمل
      ترجمة أخيه الشاه عبد القادر بالأردية «موضح القرآن»
      المعاصرة لها: حيث فتح الشاه عبد القادر الكتاب على
      قراء الأردية، خدم الشاه رفيع الدين علماء الفارسية في
      عالم المغول المتأخر. ودرّس بمدرسة آل ولي الله، وألّف
      عدداً من الرسائل العربية في أصول الفقه وتحقيق
      الأسانيد، نقل عنه أخوه الشاه عبد العزيز فتاويه في
      «الفتاوى العزيزية».
    description_fr: |
      Shāh Rafīʿ al-Dīn ibn Aḥmad al-Dihlawī — savant sunnite
      indien hanafite, troisième fils de Shāh Walīullāh de
      Delhi et frère cadet de Shāh ʿAbd al-ʿAzīz et de Shāh
      ʿAbd al-Qādir — mourut à Delhi en 1233 H (1818 EC).
      Les sources classiques ne conservent pas de date au
      jour près; nous n'enregistrons que l'année. Son œuvre
      la plus durable est une traduction complète du Coran
      en persan, qui complète la traduction ourdoue
      contemporaine de son frère Shāh ʿAbd al-Qādir, *Mūḍiḥ
      al-Qurʾān*: là où Shāh ʿAbd al-Qādir ouvrait
      l'Écriture au public ourdou, Shāh Rafīʿ al-Dīn
      servait les *ʿulamāʾ* persanophones du monde moghol
      tardif. Il enseigna au séminaire walīullāhī et produisit
      plusieurs *risālas* arabes sur les *uṣūl* et la
      vérification des *isnāds*; son frère Shāh ʿAbd al-ʿAzīz
      cita ses *fatwas* dans les *Fatāwā ʿAzīziyya*.
