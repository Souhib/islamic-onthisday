  # =========================================================================
  # DEOBAND MUḤADDITHŪN — SECOND AND THIRD GENERATION
  # =========================================================================

  - slug: death-of-khalil-ahmad-al-saharanpuri
    category: scholar_death
    title_en: Death of Khalīl Aḥmad al-Sahāranpūrī — Author of *Badhl al-Majhūd*
    title_ar: وفاة خليل أحمد السهارنپوري — صاحب «بذل المجهود»
    title_fr: Mort de Khalīl Aḥmad al-Sahāranpūrī — auteur du *Badhl al-Majhūd*
    description_en: |
      Khalīl Aḥmad ibn Majīd ʿAlī al-Sahāranpūrī — Indian
      Sunni Hanafi muḥaddith of the Deobandī tradition, senior
      teacher of hadith at the Maẓāhir ʿUlūm seminary at
      Saharanpur, and *khalīfa* of Rashīd Aḥmad al-Gangohī
      in the Naqshbandī-Mujaddidī chain — died in Medina on
      Thursday, 16 Rabīʿ al-Ākhira 1346 AH (13 October
      1927 CE) at age seventy-four and was buried in the
      Baqīʿ. He had relocated permanently to the Hijāz on
      his seventh pilgrimage. His twenty-volume Arabic
      *Badhl al-Majhūd fī Ḥall Sunan Abī Dāwūd* — a major
      Hanafi-Deobandī commentary on the *Sunan* of Abū
      Dāwūd al-Sijistānī — has remained a standard
      reference work on that book, dictated to his student
      circle in Medina across the last years of his life.
      He also authored *al-Muhannad ʿalā al-Mufannad*,
      the Deobandī school's authoritative response to
      Aḥmad Riḍā Khān al-Bareilwī's *fatāwā* charging the
      Deobandī ʿulamāʾ with disbelief.
    description_ar: |
      توفي العلامة خليل أحمد بن مجيد علي السهارنپوري —
      محدث سني هندي على المذهب الحنفي من تراث ديوبند،
      كبير شيوخ الحديث بمدرسة «مظاهر العلوم» بسهارنپور،
      وخليفة الإمام رشيد أحمد الجنجوهي في السلسلة
      النقشبندية المجددية — بالمدينة المنورة يوم الخميس
      ١٦ ربيع الآخر سنة ١٣٤٦ هـ (الموافق ١٣ أكتوبر ١٩٢٧
      ميلادي) عن أربع وسبعين سنة، ودُفن بالبقيع. وكان
      قد جاور الحجاز جواراً دائماً منذ حجه السابع. و«بذل
      المجهود في حل سنن أبي داود» في عشرين مجلداً
      بالعربية — شرح حنفي ديوبندي كبير على «سنن» أبي
      داود السجستاني — صار من المراجع الأساسية على
      ذلك الكتاب، أملاه على طلابه بالمدينة المنورة في
      أخريات حياته. وله «المهنّد على المفنّد» جواب أهل
      ديوبند المعتمد على فتاوى الإمام أحمد رضا خان
      البريلوي بتكفيرهم.
    description_fr: |
      Khalīl Aḥmad ibn Majīd ʿAlī al-Sahāranpūrī —
      muḥaddith sunnite indien hanafite de la tradition
      deobandie, enseignant principal du hadith au séminaire
      Maẓāhir ʿUlūm de Saharanpur, et *khalīfa* de Rashīd
      Aḥmad al-Gangohī dans la chaîne naqshbandī-
      mujaddidī — mourut à Médine le jeudi 16 Rabīʿ al-
      Ākhira 1346 H (13 octobre 1927 EC) à l'âge de
      soixante-quatorze ans et fut inhumé au Baqīʿ. Il
      s'était installé définitivement au Hijāz lors de son
      septième pèlerinage. Son *Badhl al-Majhūd fī Ḥall
      Sunan Abī Dāwūd* en vingt volumes en arabe —
      commentaire hanafite-deobandi majeur sur les *Sunan*
      d'Abū Dāwūd al-Sijistānī — est demeuré un ouvrage
      de référence standard sur ce livre, dicté à son
      cercle d'élèves à Médine au cours des dernières
      années de sa vie. Il composa également *al-Muhannad
      ʿalā al-Mufannad*, la réponse autoritative de l'école
      deobandie aux *fatāwā* d'Aḥmad Riḍā Khān al-
      Bareilwī accusant les *ʿulamāʾ* deobandis
      d'incroyance.
