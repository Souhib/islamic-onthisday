  - slug: death-of-shah-abd-al-qadir-al-dihlawi
    category: scholar_death
    title_en: Death of Shāh ʿAbd al-Qādir al-Dihlawī — Author of *Mūḍiḥ al-Qurʾān*
    title_ar: وفاة الشاه عبد القادر الدهلوي — صاحب «موضح القرآن»
    title_fr: Mort de Shāh ʿAbd al-Qādir al-Dihlawī — auteur du *Mūḍiḥ al-Qurʾān*
    description_en: |
      Shāh ʿAbd al-Qādir ibn Aḥmad al-Dihlawī — Indian Sunni
      Hanafi scholar, second son of Shāh Walīullāh of Delhi
      and younger brother of Shāh ʿAbd al-ʿAzīz — died at
      Delhi in 1230 AH (1815 CE) at about sixty. Classical
      Urdu and Arabic biographical literature does not
      preserve a day-precise date, so we record the year
      only. His most enduring contribution is *Mūḍiḥ al-
      Qurʾān*, the first complete translation of the Qurʾān
      into idiomatic Urdu — a project he completed in 1205 AH
      / 1791 CE that opened the recitation and study of
      scripture to Indian Muslims who lacked Arabic. The
      translation, simple in diction and faithful to the
      Walīullāhī exegetical line, became the standard Urdu
      mushaf of the nineteenth century and the basis from
      which dozens of later Urdu translations derived. He
      taught at the Walīullāhī family seminary alongside his
      brothers Shāh ʿAbd al-ʿAzīz and Shāh Rafīʿ al-Dīn.
    description_ar: |
      توفي الشاه عبد القادر بن أحمد الدهلوي — العالم السني
      الهندي الحنفي، ثاني أبناء الشاه ولي الله الدهلوي،
      وأخو الشاه عبد العزيز الأصغر — بدلهي سنة ١٢٣٠ هـ
      (الموافق ١٨١٥ ميلادي) عن نحو ستين سنة. ولم تحفظ
      الكتب البيوغرافية بالأردية والعربية يوم وفاته،
      فاكتفينا بالسنة. وأخلد آثاره «موضح القرآن»، أول
      ترجمة كاملة لمعاني القرآن الكريم بالأردية الفصيحة،
      أتمها سنة ١٢٠٥ هـ (الموافق ١٧٩١ ميلادي)، فأتاحت تلاوة
      الكتاب ودراسته لمن لا يحسن العربية من مسلمي الهند.
      وكانت ترجمة سهلة المفردات أمينة على المنهج الولي
      اللهي في التفسير، فصارت المصحف الأردي المعتمد في
      القرن التاسع عشر، وأساس عشرات الترجمات الأردية
      التالية. ودرّس بمدرسة الأسرة الولي اللهية في دلهي مع
      أخويه الشاه عبد العزيز والشاه رفيع الدين.
    description_fr: |
      Shāh ʿAbd al-Qādir ibn Aḥmad al-Dihlawī — savant
      sunnite indien hanafite, deuxième fils de Shāh
      Walīullāh de Delhi et frère cadet de Shāh ʿAbd al-ʿAzīz
      — mourut à Delhi en 1230 H (1815 EC) à environ
      soixante ans. La littérature biographique classique en
      ourdou et en arabe ne conserve pas de date au jour
      près; nous n'enregistrons que l'année. Sa contribution
      la plus durable est le *Mūḍiḥ al-Qurʾān*, première
      traduction complète du Coran en ourdou idiomatique —
      projet achevé en 1205 H / 1791 EC qui ouvrit la
      récitation et l'étude de l'Écriture aux musulmans
      indiens ne maîtrisant pas l'arabe. Cette traduction,
      simple dans la diction et fidèle à la ligne exégétique
      walīullāhī, devint le mushaf ourdou standard du XIXe
      siècle et la base de dizaines de traductions ourdoues
      ultérieures. Il enseigna au séminaire familial
      walīullāhī aux côtés de ses frères Shāh ʿAbd al-ʿAzīz
      et Shāh Rafīʿ al-Dīn.
