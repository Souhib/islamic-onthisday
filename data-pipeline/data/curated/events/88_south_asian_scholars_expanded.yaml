  - slug: death-of-mian-muhammad-shafi
    category: scholar_death
    title_en: Death of Sir Mian Muḥammad Shafīʿ — Founder of the Muslim League's Punjab Branch
    title_ar: وفاة السير ميان محمد شفيع — مؤسس فرع البنجاب لرابطة المسلمين
    title_fr: Mort de Sir Mian Muḥammad Shafīʿ — fondateur de la branche pendjabie de la Ligue musulmane
    description_en: |
      Sir Mian Muḥammad Shafīʿ — Indian Sunni Hanafi
      barrister of the Punjabi Arāʾīn family of Baghbānpura
      near Lahore, founding figure of the All-India Muslim
      League at the December 1906 Dhaka meeting (he is
      credited with proposing the League's name), founder
      of its Punjab branch in November 1907, member of
      the Viceroy's Executive Council with the education
      portfolio (1919–1924), and senior Muslim
      representative at the 1930–1931 Round Table
      Conferences in London — died at his ancestral home
      in Baghbānpura on 27 Shaʿbān 1350 AH (7 January
      1932 CE) at age sixty-two and was buried in the
      family graveyard there. As Education Member of the
      Viceroy's Council he supervised the legislative
      transformation of the Muḥammadan Anglo-Oriental
      College at Aligarh into Aligarh Muslim University
      under the Aligarh Muslim University Act of 1920;
      his daughter Begum Jahān-Ārā Shāh-Nawāz inherited
      his political role in the Pakistan Movement.
    description_ar: |
      توفي السير ميان محمد شفيع — المحامي السني الهندي
      على المذهب الحنفي، من أسرة الأرائين البنجابية
      ببغبانپوره قرب لاهور، من المؤسسين الأوائل لـ«رابطة
      مسلمي عموم الهند» في اجتماع داكا في ديسمبر ١٩٠٦
      ميلادي (يُنسب إليه اقتراح اسم الرابطة)، ومؤسس
      فرعها البنجابي في نوفمبر ١٩٠٧ ميلادي، وعضو
      المجلس التنفيذي لنائب الملك بحقيبة التعليم
      (١٩١٩-١٩٢٤ ميلادي)، وكبير ممثلي المسلمين في مؤتمري
      المائدة المستديرة بلندن سنتي ١٩٣٠-١٩٣١ ميلادي —
      ببيت أسرته ببغبانپوره يوم ٢٧ شعبان سنة ١٣٥٠ هـ
      (الموافق ٧ جانفي ١٩٣٢ ميلادي) عن اثنتين وستين
      سنة، ودُفن بمقبرة الأسرة هناك. وحين كان عضو
      التعليم في مجلس النائب الملكي أشرف على التحول
      التشريعي لـ«كلية محمدان أنغلو-أورينتل» في عليكره
      إلى «جامعة عليكره الإسلامية» بقانون «جامعة عليكره
      الإسلامية» سنة ١٩٢٠ ميلادي. وورثت دوره السياسي في
      حركة باكستان ابنته بيگم جهاں آرا شاہ نواز.
    description_fr: |
      Sir Mian Muḥammad Shafīʿ — avocat sunnite indien
      hanafite de la famille pendjabie Arāʾīn de
      Baghbānpura près de Lahore, figure fondatrice de la
      Ligue musulmane de toute l'Inde lors de la réunion
      de Dhaka en décembre 1906 (on lui attribue la
      proposition du nom de la Ligue), fondateur de sa
      branche pendjabie en novembre 1907, membre du
      Conseil exécutif du vice-roi avec le portefeuille
      de l'éducation (1919–1924), et représentant musulman
      principal aux Conférences de la Table ronde à
      Londres en 1930–1931 — mourut dans sa maison
      ancestrale de Baghbānpura le 27 Shaʿbān 1350 H
      (7 janvier 1932 EC) à l'âge de soixante-deux ans
      et fut inhumé dans le cimetière familial. Comme
      membre du Conseil chargé de l'éducation, il
      supervisa la transformation législative du
      Muḥammadan Anglo-Oriental College d'Aligarh en
      Aligarh Muslim University par l'Aligarh Muslim
      University Act de 1920; sa fille Begum Jahān-Ārā
      Shāh-Nawāz hérita de son rôle politique dans le
      mouvement pour le Pakistan.
