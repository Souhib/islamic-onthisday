  - slug: death-of-sulayman-al-nadwi
    category: scholar_death
    title_en: Death of Sayyid Sulaymān al-Nadwī — Co-Author of *Sīrat al-Nabī*
    title_ar: وفاة السيد سليمان الندوي — مشارك في «سيرة النبي»
    title_fr: Mort de Sayyid Sulaymān al-Nadwī — co-auteur de la *Sīrat al-Nabī*
    description_en: |
      Sayyid Sulaymān ibn Abī al-Ḥasan al-Nadwī — Indian-
      Pakistani Sunni Hanafi scholar of the Nadwa school,
      foremost student of Shiblī al-Nuʿmānī, founder of
      *Dār al-Muṣannifīn* (the Shiblī Academy) at Aʿẓamgaṛh
      and longtime editor of its Urdu journal *Maʿārif* —
      died at Karachi on 15 Rabīʿ al-Awwal 1373 AH (22
      November 1953 CE) at age sixty-nine, having relocated
      from Bihar to Pakistan in 1950. His best-known work
      is the multi-volume *Sīrat al-Nabī*: Shiblī had
      written the first two volumes before his death in
      1914, and al-Nadwī completed the remaining five
      from his teacher's notes and his own research. The
      *Khuṭbāt-i Madrās* of 1925 — eight Madras lectures
      he delivered on the Prophet's ﷺ life and character
      — was widely translated into Arabic, English and
      Turkish. He was a senior figure in the founding of
      *Jāmiʿa Milliyya Islāmiyya* and advised the
      Constituent Assembly of Pakistan on Islamic
      constitutional matters.
    description_ar: |
      توفي السيد سليمان بن أبي الحسن الندوي — العالم
      السني الهندي-الباكستاني على المذهب الحنفي من تراث
      ندوة العلماء، أكبر تلامذة شبلي النعماني، مؤسس «دار
      المصنفين» (أكاديمية الشبلي) بأعظم گڑھ، ومحرر مجلة
      «معارف» الأردية بها سنين طويلة — بكراتشي يوم ١٥
      ربيع الأول سنة ١٣٧٣ هـ (الموافق ٢٢ نوفمبر ١٩٥٣
      ميلادي) عن تسع وستين سنة، بعد انتقاله من بيهار
      إلى باكستان سنة ١٩٥٠ ميلادي. وأشهر أعماله مجلدات
      «سيرة النبي»: ألّف شبلي مجلديها الأولين قبل وفاته
      سنة ١٩١٤ ميلادي، فأتم الندوي ما تبقى من المجلدات
      الخمسة من تقارير شيخه ودراسته الخاصة. و«خطبات
      مدراس» المؤلفة سنة ١٩٢٥ ميلادي — ثماني محاضرات
      ألقاها بمدراس في سيرة النبي ﷺ وشمائله —
      تُرجمت على نطاق واسع إلى العربية والإنجليزية
      والتركية. وكان من كبار المؤسسين لـ«جامعة الملية
      الإسلامية»، واستشاره المجلس التأسيسي الباكستاني
      في المسائل الدستورية الإسلامية.
    description_fr: |
      Sayyid Sulaymān ibn Abī al-Ḥasan al-Nadwī — savant
      sunnite indo-pakistanais hanafite de l'école de
      Nadwa, principal élève de Shiblī al-Nuʿmānī,
      fondateur de *Dār al-Muṣannifīn* (l'Académie Shiblī)
      à Aʿẓamgaṛh et longtemps rédacteur en chef de sa
      revue ourdoue *Maʿārif* — mourut à Karachi le 15
      Rabīʿ al-Awwal 1373 H (22 novembre 1953 EC) à
      l'âge de soixante-neuf ans, après s'être installé du
      Bihar au Pakistan en 1950. Son œuvre la plus connue
      est la *Sīrat al-Nabī* en plusieurs volumes : Shiblī
      avait écrit les deux premiers volumes avant sa mort
      en 1914, et al-Nadwī compléta les cinq volumes
      restants à partir des notes de son maître et de ses
      propres recherches. Les *Khuṭbāt-i Madrās* de 1925
      — huit conférences prononcées à Madras sur la vie
      et le caractère du Prophète ﷺ — furent largement
      traduites en arabe, anglais et turc. Il fut une
      figure de premier plan dans la fondation de la
      *Jāmiʿa Milliyya Islāmiyya* et conseilla
      l'Assemblée constituante du Pakistan sur les
      questions constitutionnelles islamiques.
    canonical_hijri: {year: 1373, month: 3, day: 15, precision: day}
    canonical_gregorian: {date: 1953-11-22, precision: day, method: attested}
