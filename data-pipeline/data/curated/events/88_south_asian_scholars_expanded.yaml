  - slug: death-of-shabbir-ahmad-al-uthmani
    category: scholar_death
    title_en: Death of Shabbīr Aḥmad al-ʿUthmānī — Author of *Fatḥ al-Mulhim*
    title_ar: وفاة شبير أحمد العثماني — صاحب «فتح الملهم»
    title_fr: Mort de Shabbīr Aḥmad al-ʿUthmānī — auteur du *Fatḥ al-Mulhim*
    description_en: |
      Shabbīr Aḥmad ibn Faḍl al-Raḥmān al-ʿUthmānī — Indian-
      Pakistani Sunni Hanafi muḥaddith of the Deobandī
      tradition, *Shaykh al-Islām* of Pakistan in 1949, and
      principal of Dār al-ʿUlūm Deoband and later Madrasa
      Mazhar-i ʿUlūm — died at Bahawalpur, Pakistan, on 21
      Ṣafar 1369 AH (13 December 1949 CE) at age sixty-two
      and was buried at the Islāmiyya Science College
      grounds in Karachi. His Arabic *Fatḥ al-Mulhim bi-
      Sharḥ Ṣaḥīḥ Muslim* — three volumes published in his
      lifetime — became one of the major modern Sunni
      commentaries on Ṣaḥīḥ Muslim, completed posthumously
      by his student al-Taqī al-ʿUthmānī as *Takmila Fatḥ
      al-Mulhim* in six further volumes. Politically he
      led the Jamʿiyat ʿUlamāʾ-i Islām founded in 1945,
      hoisted the first Pakistani flag in West Pakistan
      with Jinnah and Liaqat Ali Khan in August 1947, and
      pressed the Constituent Assembly to adopt the
      *Qarārdād-i Maqāṣid* (Objectives Resolution) of
      March 1949 — the constitutional declaration that
      Pakistan would be governed in light of the Qurʾān
      and the Sunna.
    description_ar: |
      توفي العلامة شبير أحمد بن فضل الرحمن العثماني —
      محدث سني هندي-باكستاني على المذهب الحنفي من تراث
      ديوبند، شيخ الإسلام في باكستان سنة ١٩٤٩ ميلادي،
      ومدرس دار العلوم ديوبند ثم رئيس مدرسة «مظهر
      العلوم» — ببهاولپور بباكستان يوم ٢١ صفر سنة ١٣٦٩
      هـ (الموافق ١٣ ديسمبر ١٩٤٩ ميلادي) عن اثنتين
      وستين سنة، ودُفن بساحة كلية إسلامية للعلوم بكراتشي.
      و«فتح الملهم بشرح صحيح مسلم» بالعربية — في ثلاثة
      مجلدات نشرت في حياته — صار من أكبر شروح صحيح
      مسلم الحديثة عند أهل السنة، أتمها بعده تلميذه
      محمد تقي العثماني في «تكملة فتح الملهم» في ستة
      مجلدات. وأما سياسياً فقد قاد «جمعية علماء الإسلام»
      التي أُسست سنة ١٩٤٥، ورفع أول علم باكستاني في
      غرب باكستان بحضور محمد علي جناح ولياقت علي خان في
      أوت ١٩٤٧ ميلادي، وحثّ المجلس التأسيسي على تبني
      «قرارداد مقاصد» (قرار الأهداف) في مارس ١٩٤٩ ميلادي
      — وهو الإعلان الدستوري بأن باكستان تُحكم في ضوء
      الكتاب والسنة.
    description_fr: |
      Shabbīr Aḥmad ibn Faḍl al-Raḥmān al-ʿUthmānī —
      muḥaddith sunnite indo-pakistanais hanafite de la
      tradition deobandie, *Shaykh al-Islām* du Pakistan en
      1949, principal de Dār al-ʿUlūm Deoband puis de la
      madrasa Mazhar-i ʿUlūm — mourut à Bahawalpur,
      Pakistan, le 21 Ṣafar 1369 H (13 décembre 1949 EC)
      à l'âge de soixante-deux ans et fut inhumé sur le
      terrain de l'Islāmiyya Science College à Karachi.
      Son *Fatḥ al-Mulhim bi-Sharḥ Ṣaḥīḥ Muslim* en arabe
      — trois volumes publiés de son vivant — devint l'un
      des grands commentaires sunnites modernes de Ṣaḥīḥ
      Muslim, complété à titre posthume par son élève al-
      Taqī al-ʿUthmānī sous le titre *Takmila Fatḥ al-
      Mulhim* en six volumes supplémentaires.
      Politiquement, il dirigea la Jamʿiyat ʿUlamāʾ-i
      Islām fondée en 1945, hissa le premier drapeau
      pakistanais au Pakistan occidental avec Jinnah et
      Liaqat Ali Khan en août 1947, et obtint de
      l'Assemblée constituante l'adoption du *Qarārdād-i
      Maqāṣid* (Résolution sur les objectifs) de mars
      1949 — déclaration constitutionnelle selon laquelle
      le Pakistan serait gouverné à la lumière du Coran
      et de la Sunna.
