  # POST-TIMURID PERSIAN-INDIAN SUFI LITERATURE — Bīdel, Hātif Iṣfahānī
  # =========================================================================

  - slug: death-of-bidel-dehlawi
    category: scholar_death
    title_en: Death of Mīrzā ʿAbd al-Qādir Bīdel — Mughal Sufi Poet of Delhi
    title_ar: وفاة ميرزا عبد القادر بيدل — شاعر التصوف المغولي بدلهي
    title_fr: Mort de Mīrzā ʿAbd al-Qādir Bīdel — poète soufi mughal de Delhi
    description_en: |
      Mīrzā ʿAbd al-Qādir Bīdel Dehlawī — late Mughal Persian-
      language Sunni Sufi poet of Delhi, of Chaghatay-Turkic
      family origin, formed in the Naqshbandī ṭarīqa, and the
      acknowledged master of the *sabk-i hindī* ("Indian style")
      of Persian poetry that flourished in seventeenth- and
      eighteenth-century Mughal India — died at Delhi on
      4 Ṣafar 1133 AH (5 December 1720 CE) at age 76. His
      *Kulliyyāt* of around 147 000 verses — comprising the
      ghazal *Dīwān*, the four *mathnawī*s of the *Muḥīṭ-i
      Aʿẓam*, *Ṭilism-i Ḥayrat*, *Ṭūr-i Maʿrifat*, and *ʿIrfān*,
      and the autobiographical prose *Chahār ʿUnṣur* — became
      the dominant poetic reference for the Persian-language
      cultural sphere of Central Asia, Afghanistan, and
      Tājikistān, where the annual *Bīdelkhwānī* gatherings
      remain the principal living oral-poetic tradition. His
      thought, while difficult and often described as
      "philosophical-Sufi," operates throughout within an
      Akbarian *waḥdat al-wujūd* metaphysics inherited from
      Jāmī.
    description_ar: |
      توفي ميرزا عبد القادر بيدل الدهلوي — شاعرٌ صوفيٌّ سنيٌّ
      فارسي بدلهي في أواخر العصر المغوليّ، من أصلٍ تركيٍّ
      چغطائي، تربى على الطريقة النقشبندية، وعُدّ شيخَ «السبك
      الهندي» في الشعر الفارسي الذي ازدهر بالهند المغولية في
      القرنين الحادي عشر والثاني عشر الهجريَّين — بدلهي يومَ
      الرابع من صفر سنة ١١٣٣ هـ (الموافق ٥ ديسمبر ١٧٢٠ م) عن
      ست وسبعين سنة. وصارت كلياته البالغة نحو مئة وسبعة وأربعين
      ألف بيت — تضم ديوان الغزل، والمثنويات الأربع: «محيط أعظم»
      و«طلسم حيرت» و«طور معرفت» و«عرفان»، والترجمة الذاتية
      المنثورة «چهار عنصر» — المرجعَ الشعري المهيمن على الفضاء
      الثقافي الفارسي بآسيا الوسطى وأفغانستان وطاجيكستان، حيث
      لا تزال جلسات «بيدل‌خواني» السنوية التراثَ الشفاهي الشعريّ
      الأكبرَ الحيّ هناك. وفكره — على عُسره ووصفه كثيراً بأنه
      «صوفيٌّ فلسفيّ» — يدور على ميتافيزياء وحدة الوجود الأكبرية
      الموروثة عن الجامي.
    description_fr: |
      Mīrzā ʿAbd al-Qādir Bīdel Dehlawī — poète soufi sunnite
      de langue persane à Delhi à l'époque mughale tardive,
      d'origine familiale turco-chaghatay, formé dans la
      *ṭarīqa* Naqshbandī, et maître reconnu du *sabk-i hindī*
      (« style indien ») de la poésie persane qui fleurit aux
      XIe et XIIe siècles H dans l'Inde mughale — mourut à
      Delhi le 4 Ṣafar 1133 H (5 décembre 1720 EC) à l'âge de
      76 ans. Ses *Kulliyyāt* d'environ 147 000 vers —
      comprenant le *Dīwān* de ghazals, les quatre *mathnawī*s
      *Muḥīṭ-i Aʿẓam*, *Ṭilism-i Ḥayrat*, *Ṭūr-i Maʿrifat* et
      *ʿIrfān*, et la prose autobiographique *Chahār ʿUnṣur* —
      devinrent la référence poétique dominante pour la sphère
      culturelle de langue persane d'Asie centrale,
      d'Afghanistan et du Tajikistan, où les rassemblements
      annuels *Bīdelkhwānī* demeurent la principale tradition
      orale-poétique vivante. Sa pensée, ardue et souvent
      qualifiée de « philosophico-soufie », opère
      systématiquement dans une métaphysique akbarienne de
      la *waḥdat al-wujūd* héritée de Jāmī.
    canonical_hijri: {year: 1133, month: 2, day: 4, precision: day}
    canonical_gregorian: {date: 1720-12-05, precision: day, method: tabular_conversion}
