  # =========================================================================
  # BOOK-COMPLETION ANCHORS — Saʿdī's Gulistān and Būstān
  # =========================================================================

  - slug: completion-of-saadi-gulistan
    category: scholar_death
    title_en: Completion of Saʿdī's *Gulistān* (Rose Garden)
    title_ar: إتمام «گلستان» سعدي الشيرازي
    title_fr: Achèvement du *Gulistān* (« Roseraie ») de Saʿdī
    description_en: |
      Saʿdī Shīrāzī completed his prose-and-verse Persian
      didactic *Gulistān* (Rose Garden) at Shīrāz in 656 AH
      (1258 CE) — the year, by historical coincidence, of the
      Mongol sack of Baghdad and the end of the ʿAbbāsid
      caliphate — and dedicated it to the Salghurid Atabeg
      Saʿd ibn Abī Bakr of Fārs. Structured in eight chapters
      ("On the Conduct of Kings", "On the Morals of Dervishes",
      "On the Excellence of Contentment", "On the Advantages of
      Silence", "On Love and Youth", "On Weakness and Old Age",
      "On the Effects of Education", "On the Manners of
      Conversation"), the *Gulistān* combines short anecdotes in
      Persian rhymed prose (*sajʿ*) with verse maxims, and was
      composed as a companion to the all-verse *Būstān*
      (Orchard) completed the previous year (655 AH / 1257 CE).
      For seven centuries the *Gulistān* was the single most
      widely read Persian-prose teaching text across the Sunni
      world from the Ottoman *enderūn* schools to the Indian
      Mughal madrasas, transmitting an ethical-Sufi *adab* in
      every Persianate language community.
    description_ar: |
      أتمّ سعدي الشيرازي «گلستان» الفارسي المنثور-المنظوم
      التعليميّ بشيراز سنة ٦٥٦ هـ (الموافقة ١٢٥٨ م) — وهي
      السنة التي شهد فيها التاريخ بالمصادفة سقوطَ بغداد على
      يد المغول وانقضاء الخلافة العباسية — وأهداه إلى الأتابك
      السلغريّ سعد بن أبي بكر صاحب فارس. ويتألّف الكتاب من
      ثمانية أبواب («في سيرة الملوك»، «في أخلاق الدراويش»،
      «في فضيلة القناعة»، «في فوائد الصمت»، «في العشق والشباب»،
      «في الضعف والشيخوخة»، «في آثار التربية»، «في آداب
      المحادثة»)، يجمع بين القصص القصيرة بالنثر الفارسي
      المسجوع وبين الحِكَم المنظومة، وأُلِّف رفيقاً للـ«بوستان»
      المنظوم خالصاً الذي تمّ في السنة السابقة (٦٥٥ هـ /
      ١٢٥٧ م). وقد ظلّ «گلستان» سبعة قرون أكثر النصوص الفارسية
      المنثورة قراءةً في عموم العالم السني، من مدارس
      «الإندرون» العثمانية إلى المدارس المغولية بالهند، يَحمل
      أدباً أخلاقياً صوفيّاً إلى كلّ مجتمعٍ ناطقٍ بالفارسية.
    description_fr: |
      Saʿdī Shīrāzī acheva son *Gulistān* (Roseraie) didactique
      persan en prose-et-vers à Shīrāz en 656 H (1258 EC) —
      année qui, par coïncidence historique, vit le sac mongol
      de Bagdad et la fin du califat ʿabbāside — et le dédia à
      l'Atabeg Salghuride Saʿd ibn Abī Bakr du Fārs. Structuré
      en huit chapitres (« De la conduite des rois », « De la
      morale des derviches », « De l'excellence du contentement »,
      « Des avantages du silence », « De l'amour et de la
      jeunesse », « De la faiblesse et de la vieillesse », « Des
      effets de l'éducation », « Des manières de la conversation »),
      le *Gulistān* combine de courtes anecdotes en prose
      persane rimée (*sajʿ*) avec des maximes en vers, et fut
      composé en pendant du *Būstān* (Verger), entièrement en
      vers, achevé l'année précédente (655 H / 1257 EC).
      Pendant sept siècles le *Gulistān* fut le texte
      d'enseignement persan en prose le plus lu à travers le
      monde sunnite, des écoles *enderūn* ottomanes aux
      madrasas mughales indiennes, transmettant un *adab*
      éthico-soufi à chaque communauté linguistique persanophone.
    canonical_hijri: {year: 656, precision: year}
    canonical_gregorian: {date: 1258-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Gulistān completed 656 AH at Shīrāz, dedicated to Atabeg Saʿd ibn Abī Bakr."
      - source_key: editorial
        notes: "Companion to Būstān (655 AH); foundational Persian prose teaching text."
    people: [[saadi-shirazi, subject]]
    tags: [ilkhanid, mongol, persian, sufi, prose, shiraz, gulistan, atabegs-salghurid, adab]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Gulistan_(book)"
