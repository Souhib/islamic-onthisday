  # =========================================================================
  # MUZAFFARID/TIMURID PERSIAN SUFI POETRY — Ḥāfeẓ, Jāmī
  # =========================================================================

  - slug: death-of-hafez-shirazi
    category: scholar_death
    title_en: Death of Ḥāfeẓ Shīrāzī — Persian Lyric Master
    title_ar: وفاة حافظ الشيرازي — إمام الغزل الفارسي
    title_fr: Mort de Ḥāfeẓ Shīrāzī — maître du ghazal persan
    description_en: |
      Khwāja Shams al-Dīn Muḥammad Ḥāfeẓ Shīrāzī — Persian-
      language Sunni Sufi poet of Shīrāz under the Mongol-
      successor Injuid and Muẓaffarid dynasties of Fārs, hāfiẓ
      of the Qurʾān (whence his sobriquet "Ḥāfeẓ"), and the
      crowning master of the Persian *ghazal* in its lyric-
      Sufi register — died at Shīrāz around 791 or 792 AH
      (~1389-1390 CE). The *Tadhkirat al-Shuʿarāʾ* of Dawlatshāh
      gives 791 AH; the chronogram inscribed on his tomb at
      the Ḥāfeẓiyya in Shīrāz, *kih maṭlaʿ-i naḥshat-i pīr-i
      mā shud*, encodes 791 AH; subsequent biographical and
      academic literature has alternated between 791 and 792 AH.
      We follow 792 AH per the dominant modern scholarly
      reckoning while flagging 791 as well attested. His
      *Dīwān* of around five hundred ghazals — first compiled
      after his death by his disciple Muḥammad Gulandām —
      shaped the lyric-Sufi sensibility of the Persianate world
      from the Ottoman court (where Sulaymān the Magnificent
      maintained a *Dīwān-i Khwāja* on his bedside) to the
      Indian Mughal *qawwālī* repertoire to nineteenth-century
      Iranian devotional life.
    description_ar: |
      توفي خواجه شمس الدين محمد حافظ الشيرازي — شاعرٌ صوفيٌّ
      سني فارسي بشيراز في عهد الإينجو والمظفّريين خلفاء المغول
      على فارس، حافظٌ للقرآن الكريم (ومنه لقبه «حافظ»)، وإمامُ
      الغزل الفارسي في صورته الغزلية-الصوفية — بشيراز نحو سنة
      ٧٩١ أو ٧٩٢ هـ (~١٣٨٩-١٣٩٠ م). ذكرت «تذكرة الشعراء»
      لدولتشاه سنة ٧٩١ هـ، ومادّةُ تاريخ ضريحه بـ«الحافظية»
      بشيراز «كه مطلع نشأت پير ما شد» تنطق بحساب الجُمَّل
      بسنة ٧٩١ هـ؛ وقد تأرجحت الكتب الكلاسيكية والأكاديمية
      اللاحقة بين سنة ٧٩١ و٧٩٢ هـ. ونحن نتابع سنة ٧٩٢ هـ على
      الحساب الأكاديمي الحديث الراجح مع الإشارة إلى ثبوت
      ٧٩١ هـ كذلك. وأرسى ديوانه الذي يبلغ زهاء خمسمئة غزل —
      جمعه بعد وفاته مريده محمد گلندام — الإحساسَ الغزلي-الصوفي
      للعالم الفارسي السعة من البلاط العثماني (حيث كان السلطان
      سليمان القانوني يحفظ «ديوان الخواجه» لدى وسادته) إلى
      ذخيرة القوّالي الهندية المغولية إلى الحياة التعبدية
      الإيرانية في القرن الثالث عشر الهجري.
    description_fr: |
      Khwāja Shams al-Dīn Muḥammad Ḥāfeẓ Shīrāzī — poète soufi
      sunnite de langue persane à Shīrāz sous les dynasties
      Injūides et Muẓaffarides successeures des Mongols au
      Fārs, *ḥāfiẓ* du Coran (d'où son sobriquet « Ḥāfeẓ »),
      et grand maître couronné du *ghazal* persan dans son
      registre lyrique-soufi — mourut à Shīrāz vers 791 ou
      792 H (~1389-1390 EC). La *Tadhkirat al-Shuʿarāʾ* de
      Dawlatshāh donne 791 H ; la chronogramme inscrite sur
      son tombeau à la Ḥāfeẓiyya de Shīrāz, *kih maṭlaʿ-i
      naḥshat-i pīr-i mā shud*, encode 791 H ; la littérature
      biographique et académique ultérieure a alterné entre
      791 et 792 H. Nous suivons 792 H selon le calcul
      académique moderne dominant tout en signalant la bonne
      attestation de 791. Son *Dīwān* d'environ cinq cents
      ghazals — d'abord compilé après sa mort par son disciple
      Muḥammad Gulandām — façonna la sensibilité
      lyrique-soufie du monde persanophone, de la cour
      ottomane (où Soliman le Magnifique gardait un
      *Dīwān-i Khwāja* à son chevet) au répertoire mughal
      du *qawwālī* indien jusqu'à la vie dévotionnelle
      iranienne du XIXe siècle.
