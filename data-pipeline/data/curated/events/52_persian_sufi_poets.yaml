  - slug: death-of-saadi-shirazi
    category: scholar_death
    title_en: Death of Saʿdī Shīrāzī — Author of the *Gulistān* and *Būstān*
    title_ar: وفاة سعدي الشيرازي — صاحب «الگلستان» و«البوستان»
    title_fr: Mort de Saʿdī Shīrāzī — auteur du *Gulistān* et du *Būstān*
    description_en: |
      Abū Muḥammad Mushrif al-Dīn ibn Muṣliḥ al-Dīn Saʿdī Shīrāzī
      — Persian-language Sunni Sufi poet of Shīrāz, trained at
      the Niẓāmiyya of Baghdad under the Suhrawardī chain, and
      acknowledged across the Persian-speaking world for seven
      centuries as the master of practical Sufi *adab* in verse
      and prose — died at Shīrāz around 691 AH (~1292 CE), at
      the reported age of more than ninety. His prose-and-verse
      *Gulistān* (Rose Garden, completed 656 AH / 1258 CE) and
      its companion verse-only *Būstān* (Orchard, completed
      655 AH / 1257 CE), both dedicated to the Salghurid
      Atabegs of Fārs, became — and have remained — the
      foundational Persian-prose teaching texts of Sunni
      ethical-Sufi formation, memorised in *maktab*s from
      Constantinople to Bengal. His *Kulliyyāt* of ghazals
      established the lyric-Sufi mode that Ḥāfeẓ would carry to
      its summit a century later. The death year is given as
      690 AH by some sources and 691 AH by others; we follow
      691 AH per the dominant Persian *tadhkira* tradition and
      EI2.
    description_ar: |
      توفي أبو محمد مشرف الدين بن مصلح الدين سعدي الشيرازي —
      شاعر صوفي سني فارسي من شيراز، تربَّى بنظامية بغداد على
      أيدي السلسلة السهروردية، واعترفت به الأمم الناطقة بالفارسية
      مدى سبعة قرون شيخَ الأدب الصوفي العملي نظماً ونثراً —
      بشيراز نحو سنة ٦٩١ هـ (~١٢٩٢ م) عن عمر يُقال إنه جاوز
      التسعين. وصارت — وما تزال — منظومتاه الكبرى «گلستان»
      المنثور-المنظوم (تمّ تأليفه سنة ٦٥٦ هـ / ١٢٥٨ م) ورفيقها
      «بوستان» المنظوم خالصاً (تمّ سنة ٦٥٥ هـ / ١٢٥٧ م)،
      المهديّان إلى أتابكة فارس السلغريين، النصّين التأسيسيّين
      للتربية الأخلاقية-الصوفية السنية بالفارسية، يحفظهما
      الصبيان في «المكاتب» من القسطنطينية إلى البنغال. وأرسى
      «كلياته» في الغزل النموذجَ الغزلي-الصوفي الذي سيبلغ به
      حافظ ذُروته بعد قرن. وذكرت بعض المصادر سنة ٦٩٠ هـ، ولكنّ
      المتابع لكتب التراجم الفارسية وللطبعات الأكاديمية ودائرة
      المعارف الإسلامية الثانية هي سنة ٦٩١ هـ.
    description_fr: |
      Abū Muḥammad Mushrif al-Dīn ibn Muṣliḥ al-Dīn Saʿdī
      Shīrāzī — poète soufi sunnite de langue persane à Shīrāz,
      formé à la Niẓāmiyya de Bagdad dans la chaîne
      Suhrawardī, et reconnu dans tout le monde persanophone
      pendant sept siècles comme le maître de l'*adab*
      soufi-pratique en vers et en prose — mourut à Shīrāz
      vers 691 H (~1292 EC), à l'âge réputé de plus de
      quatre-vingt-dix ans. Son *Gulistān* (Roseraie, achevé
      656 H / 1258 EC) en prose-et-vers, et son compagnon
      *Būstān* (Verger, achevé 655 H / 1257 EC) entièrement
      versifié, tous deux dédiés aux Atabegs Salghurides du
      Fārs, devinrent — et demeurent — les textes
      d'enseignement persans en prose fondateurs de la
      formation éthico-soufie sunnite, mémorisés dans les
      *maktab* de Constantinople au Bengale. Ses *Kulliyyāt*
      en ghazals établirent le mode lyrique-soufi que Ḥāfeẓ
      porterait à son sommet un siècle plus tard. L'année
      de la mort est donnée comme 690 H par certaines
      sources et 691 H par d'autres ; nous suivons 691 H
      selon la tradition dominante des *tadhkira* persans et
      l'EI2.
    canonical_hijri: {year: 691, precision: year}
    canonical_gregorian: {date: 1292-01-01, precision: year, method: tabular_conversion}
    claims:
