  # DELHI SULTANATE PERSIAN-INDIAN SUFI LITERATURE — Amīr Khusraw, Bū ʿAlī Qalandar
  # =========================================================================

  - slug: death-of-amir-khusraw-dihlawi
    category: scholar_death
    title_en: Death of Amīr Khusraw Dihlawī — *Ṭūṭī of Hind*
    title_ar: وفاة أمير خسرو الدهلوي — «طوطي الهند»
    title_fr: Mort d'Amīr Khusraw Dihlawī — le « *Ṭūṭī* de l'Inde »
    description_en: |
      Yamīn al-Dīn Abū al-Ḥasan Amīr Khusraw Dihlawī — Persian-
      and Hindawi-language Sunni Sufi poet of the Delhi
      Sultanate, principal disciple of Khwāja Niẓām al-Dīn
      Awliyāʾ in the Chishtī ṭarīqa, court poet to seven
      successive sultans of Delhi (from Balban to Ghiyāth al-Dīn
      Tughluq), and the founder of a distinctly Indo-Persian
      poetic register that the *tadhkira* tradition called him
      *Ṭūṭī of Hind* (the Parrot of India) — died at Delhi six
      months after his master, on 18 Shawwāl 725 AH
      (29 September 1325 CE), and was buried at the foot of his
      master's grave at the Niẓām al-Dīn dargāh, where the
      shrine remains a major centre of Sufi-musical *qawwālī*
      practice eight centuries on. He composed his own *Khamsa*
      in answer to Niẓāmī Ganjawī, three Persian historical
      *mathnawī*s on the Khaljī sultans, the Persian-Sufi
      *Nuh Sipihr*, and the corpus of devotional ghazals and
      Hindawi *dohā*s that established the lyric register of
      South Asian Sufi music down to the present.
    description_ar: |
      توفي يمين الدين أبو الحسن أمير خسرو الدهلوي — شاعرٌ صوفي
      سني هندي ناظمٌ بالفارسية والهندوية، أكبرُ مريدي خواجه
      نظام الدين أولياء على الطريقة الجشتية، شاعر سبعةٍ من
      سلاطين دلهي المتعاقبين (من بَلْبَن إلى غياث الدين تغلق)،
      ومؤسّسُ سجِلٍّ شعري هندي-فارسي مميَّز سمّته كتب التراجم
      «طوطي الهند» — بدلهي بعد ستّة أشهر من وفاة شيخه، يومَ
      الثامن عشر من شوّال سنة ٧٢٥ هـ (الموافق ٢٩ سبتمبر ١٣٢٥ م)،
      ودُفن عند قدم قبر شيخه في درغاه نظام الدين بدلهي، ولا
      يزال الضريح بعد ثمانية قرون مركزاً كبيراً لممارسة الموسيقى
      الصوفية «القوّالية». ونظم «خمسته» جواباً على نظامي الكنجوي،
      وثلاثة مثنويات فارسية تاريخية في سلاطين الخلجية، و«نه
      سپهر» الفارسي-الصوفي، ومدوّنة الغزليات التعبدية والـ«دوها»
      الهندوية التي أسّست سجلَّ الموسيقى الصوفية في جنوب آسيا
      إلى اليوم.
    description_fr: |
      Yamīn al-Dīn Abū al-Ḥasan Amīr Khusraw Dihlawī — poète
      soufi sunnite indien de langue persane et hindavī au
      sultanat de Delhi, principal disciple de Khwāja Niẓām
      al-Dīn Awliyāʾ dans la *ṭarīqa* Chishtī, poète de cour
      auprès de sept sultans de Delhi successifs (de Balban à
      Ghiyāth al-Dīn Tughluq), et fondateur d'un registre
      poétique indo-persan distinct que la tradition des
      *tadhkira* lui valut le titre de *Ṭūṭī al-Hind* (le
      Perroquet de l'Inde) — mourut à Delhi six mois après
      son maître, le 18 Shawwāl 725 H (29 septembre 1325 EC),
      et fut enterré au pied de la tombe de son maître au
      *dargāh* Niẓām al-Dīn, où le sanctuaire demeure huit
      siècles plus tard un grand centre de la pratique
      musicale soufie *qawwālī*. Il composa sa propre *Khamsa*
      en réponse à Niẓāmī Ganjawī, trois *mathnawī*s
      historiques persans sur les sultans Khaljīs, le
      *Nuh Sipihr* perso-soufi, et le corpus de ghazals
      dévotionnels et de *dohā* hindavī qui établit le
      registre lyrique de la musique soufie sud-asiatique
      jusqu'à nos jours.
    canonical_hijri: {year: 725, month: 10, day: 18, precision: day}
    canonical_gregorian: {date: 1325-09-29, precision: day, method: tabular_conversion}
