# Wave 28 of curated event additions (2026-04-27).
# Major Persian-language Sunni Sufi poets and Sufi-influenced literary
# figures: Sanāʾī al-Ghaznawī, Farīd al-Dīn ʿAṭṭār Nayshābūrī, Niẓāmī
# Ganjawī, Saʿdī Shīrāzī, Ḥāfeẓ Shīrāzī, ʿAbd al-Raḥmān Jāmī,
# Fakhr al-Dīn ʿIrāqī, Amīr Khusraw of Delhi, Bū ʿAlī Qalandar of
# Pānīpat, Mīrzā Bīdel of Delhi, and Hātif Iṣfahānī. The Indian Sufi
# master Niẓām al-Dīn Awliyāʾ already has an event entry (file 26)
# and is not duplicated here. Jalāl al-Dīn Rūmī, ʿAbd al-Qādir al-Jīlānī,
# Naqshband, the two Suhrawardīs, and Moinuddin Chishti are likewise
# already covered elsewhere.
#
# These figures are all firmly within mainstream Sunni Sufism: the
# Ghaznavids, Khwārazmshāhs, Atabegs, Ilkhānids of post-conversion
# Persia, the Delhi sultanate, the Timurids, and the post-Safavid
# Persian-Indian cultural sphere (Mughals, Zand, Qajars). Several of
# them are specifically Naqshbandī (Jāmī, Bīdel) or Chishtī (Amīr
# Khusraw, Bū ʿAlī Qalandar). All Persian-language Sunni Sufi poets
# whose work shaped the religious-literary imagination of the
# Persian-speaking and Persianate Muslim world.
#
# Death dates of these poets are usually only year-precise; some
# (Sanāʾī, ʿAṭṭār, Hātif) are contested across two or more years
# in the classical biographical sources. Disputes flagged with
# `disputed: true` + `dispute_about: date` and explained in the
# description body. Trilingual en/ar/fr throughout. Hadith refs
# intentionally omitted across the file.
#
# Coverage in the classical Sunni biographical canon is uneven:
# Ibn Khallikān (d. 681 AH) and al-Dhahabī (d. 748 AH) cover the
# pre-Mongol and Ilkhānid figures; Jāmī's own *Nafaḥāt al-Uns* and
# the post-Timurid *ṭabaqāt* writers (al-Suyūṭī, Tashköprüzāde)
# pick up the later poets; for the post-1100-AH figures the
# coverage shifts to encyclopaedic / academic secondary sources
# (EI2). We cite ibn_khallikan_wafayat / dhahabi_siyar /
# dhahabi_tarikh_islam / ibn_kathir_bidaya wherever they cover
# the figure; supplement with ei2 + editorial elsewhere.

events:
  # =========================================================================
  # PRE-MONGOL PERSIAN SUFI POETRY — Sanāʾī, ʿAṭṭār, Niẓāmī
  # =========================================================================

  - slug: death-of-sanai-ghaznawi
    category: scholar_death
    title_en: Death of Sanāʾī al-Ghaznawī — Pioneer of Persian Sufi Mathnawī
    title_ar: وفاة سنائي الغزنوي — رائد المثنوي الصوفي الفارسي
    title_fr: Mort de Sanāʾī al-Ghaznawī — pionnier du *mathnawī* soufi persan
    description_en: |
      Abū al-Majd Majdūd ibn Ādam Sanāʾī al-Ghaznawī — Persian-
      language Sunni Sufi poet of the late Ghaznavid court, and
      the figure traditionally credited with raising the
      didactic *mathnawī* from a court genre into a vehicle of
      sustained Sufi instruction — died at Ghazna (in modern
      Afghanistan), the date most commonly given by the classical
      Persian *tadhkira* tradition as 525 AH (~1131 CE), though
      some biographers give 535 AH and a minority push his death
      to 545 AH. We follow the dominant 525 AH year (Riyāḍ
      al-ʿĀrifīn, *Lubāb al-Albāb*, *Tadhkirat al-Shuʿarāʾ* of
      Dawlatshāh) per *Nafaḥāt al-Uns* of Jāmī. His major work
      *Ḥadīqat al-Ḥaqīqa wa Sharīʿat al-Ṭarīqa* (The Garden of
      Truth and the Law of the Path), a long *mathnawī* of more
      than ten thousand verses dedicated to Bahrām Shāh of Ghazna,
      is the founding poem of the genre that Farīd al-Dīn ʿAṭṭār
      and then Jalāl al-Dīn Rūmī would carry to its summit; Rūmī
      himself acknowledged the line of descent in his
      *Mathnawī*: "ʿAṭṭār was the spirit, and Sanāʾī his two
      eyes; we came after Sanāʾī and ʿAṭṭār."
    description_ar: |
      توفي أبو المجد مجدود بن آدم سنائي الغزنوي — شاعر صوفي سني
      من بلاط الغزنويين الأواخر بفارسية، وأول من نقل المثنوي
      التعليمي عند الفرس من جنس بلاطي إلى مادة تعليم صوفي مستدام
      — بمدينة غزنة (في أفغانستان اليوم)، وأكثر ما تذكره كتب
      التراجم الفارسية الكلاسيكية أنه توفي سنة ٥٢٥ هـ (~١١٣١ م)،
      وذكر بعضهم سنة ٥٣٥ هـ، وأقلهم سنة ٥٤٥ هـ. والمعتمد عندنا
      ما نقله الجامي في «نفحات الأنس» وأثبتته «رياض العارفين»
      و«لباب الألباب» و«تذكرة الشعراء» لدولتشاه من سنة ٥٢٥ هـ.
      وكتابه الكبير «حديقة الحقيقة وشريعة الطريقة» المنظوم في
      أكثر من عشرة آلاف بيت ومُهداً إلى السلطان بهرام شاه
      الغزنوي، هو القصيد المؤسس للجنس الذي حمله من بعده
      فريد الدين العطار ثم جلال الدين الرومي إلى ذُروته؛ وقد
      أقرّ مولانا الرومي في «المثنوي» بهذا الانتساب فقال:
      «العطار روح كان، وسنائي عينيه؛ ونحن أتينا من بعد سنائي
      والعطار».
    description_fr: |
      Abū al-Majd Majdūd ibn Ādam Sanāʾī al-Ghaznawī — poète
      soufi sunnite de langue persane à la cour ghaznawide
      tardive, et figure à laquelle la tradition attribue
      d'avoir élevé le *mathnawī* didactique d'un genre de
      cour vers un véhicule d'enseignement soufi soutenu —
      mourut à Ghazna (actuelle Afghanistan). La date la plus
      souvent rapportée par les *tadhkira* persans classiques
      est 525 H (~1131 EC), bien que certains biographes
      indiquent 535 H et une minorité 545 H. Nous suivons
      l'année 525 H dominante (*Riyāḍ al-ʿĀrifīn*, *Lubāb
      al-Albāb*, *Tadhkirat al-Shuʿarāʾ* de Dawlatshāh) selon
      les *Nafaḥāt al-Uns* de Jāmī. Son grand mathnawī
      *Ḥadīqat al-Ḥaqīqa wa Sharīʿat al-Ṭarīqa* (Le Jardin de
      la Vérité et la Loi de la Voie), de plus de dix mille
      vers dédié à Bahrām Shāh de Ghazna, est le poème
      fondateur du genre que Farīd al-Dīn ʿAṭṭār puis Jalāl
      al-Dīn Rūmī porteraient à son sommet ; Rūmī lui-même
      reconnaît la filiation dans son *Mathnawī* : « ʿAṭṭār
      fut l'esprit, et Sanāʾī ses deux yeux ; nous sommes
      venus après Sanāʾī et ʿAṭṭār. »
    canonical_hijri: {year: 525, precision: year}
    canonical_gregorian: {date: 1131-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Year 525 AH death at Ghazna per dominant tadhkira tradition."
      - source_key: editorial
        notes: "Jāmī's Nafaḥāt al-Uns (898 AH) preserves the 525 AH date."
    people: [[sanai-ghaznawi, died]]
    tags: [ghaznavid, persian, sufi, poet, mathnawi, ghazna, hadiqat-al-haqiqa]
    importance: notable
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date
    source_url: "https://en.wikipedia.org/wiki/Sanai"

  - slug: death-of-attar-nayshaburi
    category: scholar_death
    title_en: Death of Farīd al-Dīn ʿAṭṭār Nayshābūrī
    title_ar: وفاة فريد الدين العطار النيسابوري
    title_fr: Mort de Farīd al-Dīn ʿAṭṭār Nayshābūrī
    description_en: |
      Farīd al-Dīn Muḥammad ibn Ibrāhīm ʿAṭṭār Nayshābūrī —
      Persian-language Sunni Sufi poet, hagiographer, and
      pharmacist (*ʿaṭṭār* = "perfumer/druggist") of Nishapur in
      Khurāsān, author of the *Manṭiq al-Ṭayr* (Conference of
      the Birds), the *Tadhkirat al-Awliyāʾ* (Memorial of the
      Friends of God), the *Ilāhī-nāma*, the *Asrār-nāma*, and
      the *Muṣībat-nāma* — was killed at Nishapur during the
      Mongol sack of the city. The classical Persian *tadhkira*
      tradition gives his death year variously as 618, 627, 632
      or 635 AH; we follow the 627 AH year preserved by Dawlatshāh
      Samarqandī's *Tadhkirat al-Shuʿarāʾ* and adopted by Jāmī
      in *Nafaḥāt al-Uns*, while noting that the 618 AH attestation
      (matching the principal Mongol sack of Nishapur in Ṣafar
      618 / April 1221) has its own textual support. His
      *Tadhkirat al-Awliyāʾ* — a prose hagiography of seventy-two
      Sufi masters from al-Ḥasan al-Baṣrī through al-Ḥallāj —
      remains, eight centuries on, one of the foundational
      reference works on the early Sunni Sufi tradition. Rūmī
      placed him on the same line as Sanāʾī and acknowledged
      himself as their successor.
    description_ar: |
      قُتل فريد الدين محمد بن إبراهيم العطار النيسابوري — شاعرٌ
      صوفي سني فارسي، ومترجمٌ لأهل التصوف، ومتطبّبٌ عطّار من
      نيسابور بخُراسان، مؤلفُ «منطق الطير» (مؤتمر الطيور)،
      و«تذكرة الأولياء» (سيرة أولياء الله)، و«إلهي‌نامه»،
      و«أسرارنامه»، و«مصيبت‌نامه» — في نيسابور إبّان النكبة
      المغولية على المدينة. واختلفت كتبُ التراجم الفارسية
      الكلاسيكية في سنة وفاته فقيل ٦١٨ وقيل ٦٢٧ وقيل ٦٣٢ وقيل
      ٦٣٥ هـ؛ ونحن نتابع سنة ٦٢٧ هـ المحفوظة في «تذكرة الشعراء»
      لدولتشاه السمرقندي ومتابعة الجامي لها في «نفحات الأنس»،
      مع الإشارة إلى أن سنة ٦١٨ هـ (الموافقة لنكبة نيسابور
      المغولية الكبرى في صفر ٦١٨ / نيسان ١٢٢١ م) لها سندها
      النصّي. وما زال كتابه «تذكرة الأولياء» — وهو سيرٌ مَنثورٌ
      لاثنين وسبعين من شيوخ التصوف بدءاً بالحسن البصري وانتهاءً
      بالحلّاج — بعد ثمانية قرون أحدَ المراجع التأسيسية على
      التراث الصوفي السني الباكر. وقد قرنه الرومي بسنائي وصرّح
      بأنه خَلَفُهما.
    description_fr: |
      Farīd al-Dīn Muḥammad ibn Ibrāhīm ʿAṭṭār Nayshābūrī —
      poète soufi sunnite de langue persane, hagiographe et
      pharmacien (*ʿaṭṭār* = « parfumeur/droguiste ») de
      Nishāpūr au Khurāsān, auteur du *Manṭiq al-Ṭayr* (Le
      Langage des oiseaux), de la *Tadhkirat al-Awliyāʾ*
      (Mémorial des amis de Dieu), de l'*Ilāhī-nāma*, de
      l'*Asrār-nāma* et du *Muṣībat-nāma* — fut tué à Nishāpūr
      lors du sac mongol de la ville. La tradition des
      *tadhkira* persans classiques donne diverses années pour
      sa mort — 618, 627, 632 ou 635 H ; nous suivons l'année
      627 H préservée par la *Tadhkirat al-Shuʿarāʾ* de
      Dawlatshāh Samarqandī et adoptée par Jāmī dans les
      *Nafaḥāt al-Uns*, tout en notant que l'attestation de
      618 H (correspondant au sac mongol majeur de Nishāpūr
      en Ṣafar 618 / avril 1221) possède son propre soutien
      textuel. Sa *Tadhkirat al-Awliyāʾ* — hagiographie en
      prose de soixante-douze maîtres soufis d'al-Ḥasan
      al-Baṣrī à al-Ḥallāj — demeure, huit siècles plus tard,
      l'un des ouvrages de référence fondateurs sur la
      tradition soufie sunnite ancienne. Rūmī le plaçait sur
      la même ligne que Sanāʾī et se reconnaissait comme leur
      successeur.
    canonical_hijri: {year: 627, precision: year}
    canonical_gregorian: {date: 1230-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death at Nishapur 627 AH (some 618, 632, 635) — dominant 627 follows Dawlatshāh."
      - source_key: editorial
        notes: "Jāmī's Nafaḥāt al-Uns confirms 627 AH; alt 618 = Mongol sack year."
    people: [[attar-nayshaburi, died]]
    tags: [khwarazmshah, mongol, sufi, poet, persian, nishapur, mantiq-al-tayr, tadhkirat-al-awliya]
