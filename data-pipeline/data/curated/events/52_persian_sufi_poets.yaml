  - slug: death-of-jami
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān Jāmī — Last of the Persian Sufi Classics
    title_ar: وفاة عبد الرحمن الجامي — خاتم الكلاسيكية الصوفية الفارسية
    title_fr: Mort de ʿAbd al-Raḥmān Jāmī — dernier des classiques soufis persans
    description_en: |
      Nūr al-Dīn ʿAbd al-Raḥmān ibn Aḥmad Jāmī — Persian-language
      Sunni Sufi poet, Naqshbandī shaykh, scholar of the
      Akbarian metaphysical tradition, and the figure
      conventionally placed at the close of the classical
      Persian Sufi canon — died at Herāt on 18 Muḥarram 898 AH
      (9 November 1492 CE) at age 81. He was buried at the
      Takiyya-yi Khwāja-yi Aḥrār in Herāt, his master in the
      Naqshbandī ṭarīqa. His prose *Nafaḥāt al-Uns min Ḥaḍarāt
      al-Quds* (a *ṭabaqāt* of more than six hundred Sufi men
      and women extending al-Anṣārī's *Ṭabaqāt al-Ṣūfiyya* into
      the ninth-century-AH present) became the standard
      reference work on the Sufi tradition for the Persian-
      Mughal-Ottoman cultural sphere. His *Haft Awrang* (Seven
      Thrones) — a Khamsa-style sequence of seven *mathnawī*s
      including *Yūsuf u Zulaykhā* and *Salāmān u Absāl* —
      revived the Niẓāmīan romance form within an explicitly
      Akbarian metaphysics, while his *Ashiʿʿat al-Lamaʿāt*
      (a Persian commentary on Fakhr al-Dīn ʿIrāqī's *Lamaʿāt*)
      and his *Lawāʾiḥ* are foundational expositions of *waḥdat
      al-wujūd*.
    description_ar: |
      توفي نور الدين عبد الرحمن بن أحمد الجامي — شاعرٌ صوفيٌّ
      سنيٌّ فارسي، شيخ النقشبندية، عالمٌ بالميتافيزياء الأكبرية،
      والشخصيةُ التي يضعها الاتفاق الكلاسيكي عند خاتم الأدب
      الصوفي الفارسي الكلاسيكي — بهَرَاة يومَ الثامن عشر من
      محرّم سنة ٨٩٨ هـ (الموافق ٩ نوفمبر ١٤٩٢ م) عن إحدى
      وثمانين سنة. ودُفن بـ«تكية الخواجه أحرار» بهَرَاة، شيخه
      النقشبندي. وصارت رسالته المنثورة «نفحات الأنس من حضرات
      القدس» — وهي طبقاتٌ لما يزيد على ستمئة من رجال التصوف
      ونسائه يمد بها كتاب «طبقات الصوفية» للأنصاري إلى زمنه
      التاسع الهجري — المرجع المعتمد على التراث الصوفي للفضاء
      الثقافي الفارسي-المغوليّ-العثماني. وأحيت «هفت أورنگ»
      (السبعة العروش) — وهي خمسة-في-سبع مثنويات منها «يوسف
      وزليخا» و«سلامان وأبسال» — قالبَ الرومانس النظاميّ
      ضمن ميتافيزياء أكبرية صريحة، وألَّف «أشعة اللمعات» شرحاً
      فارسيّاً على «لمعات» فخر الدين العراقي، و«اللوائح» في
      وحدة الوجود.
    description_fr: |
      Nūr al-Dīn ʿAbd al-Raḥmān ibn Aḥmad Jāmī — poète soufi
      sunnite de langue persane, shaykh Naqshbandī, savant de
      la tradition métaphysique akbarienne, et figure
      conventionnellement placée à la clôture du canon
      classique soufi persan — mourut à Herāt le 18 Muḥarram
      898 H (9 novembre 1492 EC) à l'âge de 81 ans. Il fut
      enterré à la Takiyya-yi Khwāja-yi Aḥrār à Herāt, son
      maître dans la *ṭarīqa* Naqshbandī. Sa prose *Nafaḥāt
      al-Uns min Ḥaḍarāt al-Quds* (un *ṭabaqāt* de plus de
      six cents soufis et soufies étendant les *Ṭabaqāt
      al-Ṣūfiyya* d'al-Anṣārī jusqu'au présent du IXe siècle H)
      devint l'ouvrage de référence standard sur la tradition
      soufie pour la sphère culturelle persano-moghole-ottomane.
      Son *Haft Awrang* (Sept Trônes) — une séquence à la
      manière de la *Khamsa* de sept *mathnawī*s comprenant
      *Yūsuf u Zulaykhā* et *Salāmān u Absāl* — fit revivre la
      forme du romance niẓāmīen dans une métaphysique
      akbarienne explicite, tandis que son *Ashiʿʿat al-Lamaʿāt*
      (commentaire persan des *Lamaʿāt* de Fakhr al-Dīn ʿIrāqī)
      et ses *Lawāʾiḥ* sont des expositions fondatrices de la
      *waḥdat al-wujūd*.
    canonical_hijri: {year: 898, month: 1, day: 18, precision: day}
    canonical_gregorian: {date: 1492-11-09, precision: day, method: tabular_conversion}
