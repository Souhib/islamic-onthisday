  - slug: death-of-bu-ali-qalandar-panipati
    category: scholar_death
    title_en: Death of Bū ʿAlī Qalandar Pānīpatī — Indian Chishtī-Qalandarī Saint
    title_ar: وفاة بو علي قلندر الپانيپاتي — وليّ الجشتية القلندرية بالهند
    title_fr: Mort de Bū ʿAlī Qalandar Pānīpatī — saint chishtī-qalandarī indien
    description_en: |
      Sharaf al-Dīn ibn Sālār Bū ʿAlī Qalandar Pānīpatī — Indian
      Sunni Sufi shaykh of Pānīpat in the Delhi Sultanate,
      formed in the Chishtī ṭarīqa and recognised as a
      *qalandarī* contemplative of antinomian devotional
      register, and contemporary of Niẓām al-Dīn Awliyāʾ — died
      at Pānīpat in 724 AH (~1324 CE) at the reported age of
      around eighty. His *masnawī* *Mathnawī-i Bū ʿAlī Qalandar*,
      a Persian Sufi instructional poem in the line of Sanāʾī
      and ʿAṭṭār, and a corpus of Persian Sufi letters preserved
      under the title *Maktūbāt* circulated widely across the
      Delhi Sultanate, the Bahmanid south, and the later Mughal
      Sufi networks. His shrine at Pānīpat became one of the
      five major *qalandarī* shrines of South Asia and remains
      a centre of Punjabi Sufi *samāʿ* observance under the
      Pakistani Auqāf.
    description_ar: |
      توفي شرف الدين بن سالار بو علي قلندر الپانيپاتي — شيخٌ
      صوفيٌّ سني هندي بپانيپات في سلطنة دلهي، تربى على الطريقة
      الجشتية واشتُهر زاهداً «قلندريّاً» بالعَرفان شارد الإطار
      التعبّديّ، ومعاصراً لخواجه نظام الدين أولياء — بپانيپات
      سنة ٧٢٤ هـ (~١٣٢٤ م) عن نحو ثمانين سنة. ودار «مثنوي بو
      علي قلندر» الفارسي — قصيدةٌ صوفية تعليمية على نسق سنائي
      والعطار — ومجموعة من رسائله الفارسية الصوفية المعروفة
      بـ«المكتوبات» في رحاب سلطنة دلهي وجنوب الهند البهمنية
      وشبكات التصوف المغوليّ الكبرى من بعد. وصار ضريحه بپانيپات
      أحد أكبر خمسة أضرحة قلندرية في جنوب آسيا، ولا يزال مركزاً
      للسماع الصوفي البنجابي تحت إدارة أوقاف باكستان.
    description_fr: |
      Sharaf al-Dīn ibn Sālār Bū ʿAlī Qalandar Pānīpatī —
      shaykh soufi sunnite indien de Pānīpat au sultanat de
      Delhi, formé dans la *ṭarīqa* Chishtī et reconnu comme
      contemplatif *qalandarī* à registre dévotionnel
      antinomique, contemporain de Niẓām al-Dīn Awliyāʾ —
      mourut à Pānīpat en 724 H (~1324 EC), à l'âge réputé
      d'environ quatre-vingts ans. Son *Mathnawī-i Bū ʿAlī
      Qalandar* — poème persan d'enseignement soufi dans la
      lignée de Sanāʾī et d'ʿAṭṭār — et un corpus de lettres
      persanes soufies conservées sous le titre *Maktūbāt*
      circulèrent largement dans le sultanat de Delhi, le
      sud Bahmanide, et les réseaux soufis moghols ultérieurs.
      Son sanctuaire à Pānīpat devint l'un des cinq grands
      sanctuaires *qalandarī* de l'Asie du Sud et demeure un
      centre du *samāʿ* soufi punjabi sous l'administration
      des Auqāf pakistanais.
