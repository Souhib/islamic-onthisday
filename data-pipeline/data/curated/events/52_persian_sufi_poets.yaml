  - slug: death-of-nizami-ganjawi
    category: scholar_death
    title_en: Death of Niẓāmī Ganjawī — Author of the Khamsa
    title_ar: وفاة نظامي الكنجوي — صاحب «الخمسة»
    title_fr: Mort de Niẓāmī Ganjawī — auteur de la *Khamsa*
    description_en: |
      Jamāl al-Dīn Abū Muḥammad Ilyās ibn Yūsuf Niẓāmī Ganjawī —
      Persian-language Sunni poet of Ganja (in modern-day
      Azerbaijan, then a city of the Atabeg-controlled Caucasian
      frontier of the Saljūq cultural sphere), author of the
      *Khamsa* (Quintet) of romance and didactic *mathnawī*s —
      *Makhzan al-Asrār* (Treasury of Mysteries), *Khusraw u
      Shīrīn*, *Laylī u Majnūn*, *Haft Paykar* (Seven Beauties),
      and the two-part *Iskandar-nāma* — died at Ganja around
      605 AH (~1209 CE), with sources giving 605, 607 or 614 AH.
      We follow the 605 AH date dominant in the modern
      academic editions and reflected in EI2. Although his work
      is not a Sufi *mathnawī* of the doctrinal type composed by
      Sanāʾī or ʿAṭṭār, every poem of the *Khamsa* opens with
      Sufi-coloured devotional sections and proceeds via
      love-as-knowledge themes that became the dominant idiom of
      Persian Sufi poetry; *Laylī u Majnūn* in particular gave
      Sufi poets across the next seven centuries (most famously
      Jāmī's reworking and Fuẓūlī's Ottoman version) the
      controlling allegory for fanāʾ as the lover's annihilation
      in the beloved.
    description_ar: |
      توفي جمال الدين أبو محمد إلياس بن يوسف نظامي الكنجوي —
      شاعر سني سني فارسي من كَنْجة (في أذربيجان اليوم، وكانت
      حينئذٍ ثغراً قوقازياً تحت الأتابكة في الفضاء الثقافي
      السلجوقي)، صاحب «الخمسة» من المنظومات المثنوية الرومانسية
      والتعليمية — «مخزن الأسرار»، و«خسرو وشيرين»، و«ليلى
      ومجنون»، و«هفت پيكر» (سبعة أبدان جميلة)، و«الاسكندرنامه»
      بقسميه — بكَنْجة نحو سنة ٦٠٥ هـ (~١٢٠٩ م)، وذكر بعض
      المصادر سنة ٦٠٧ أو ٦١٤ هـ. ونحن نتابع سنة ٦٠٥ هـ التي
      تعتمدها الطبعات الأكاديمية الحديثة وتنقلها دائرة المعارف
      الإسلامية الثانية. وعلى أنّ عمله ليس مثنويّاً صوفيّاً
      عقائدياً كمثنويّ سنائي والعطار، إلا أن كل قصيدة من
      «الخمسة» تستفتح بأبواب تعبدية صوفيّة المسحة، وتتقدم بفنّ
      الحب-بوصفه-معرفة الذي صار اللغة المسيطرة على الشعر الصوفي
      الفارسي بعدُ؛ ولا سيما «ليلى ومجنون» التي أعطت شعراء
      التصوف بعده على امتداد سبعة قرون (وأشهرهم نظمها الجامي
      والفضولي العثماني) الرمزَ المهيمن للفناء بوصفه فناءَ
      المحبّ في المحبوب.
    description_fr: |
      Jamāl al-Dīn Abū Muḥammad Ilyās ibn Yūsuf Niẓāmī Ganjawī —
      poète sunnite de langue persane originaire de Ganja
      (actuel Azerbaïdjan, alors ville de la frontière
      caucasienne sous Atabegs dans la sphère culturelle
      saljūqide), auteur de la *Khamsa* (« Quintet ») de
      *mathnawī*s romanesques et didactiques — *Makhzan
      al-Asrār* (Le Trésor des mystères), *Khusraw u Shīrīn*,
      *Laylī u Majnūn*, *Haft Paykar* (Les Sept Beautés) et
      l'*Iskandar-nāma* en deux parties — mourut à Ganja vers
      605 H (~1209 EC), les sources donnant 605, 607 ou 614 H.
      Nous suivons la date de 605 H dominante dans les
      éditions académiques modernes et reflétée par l'EI2. Si
      son œuvre n'est pas un *mathnawī* soufi de type
      doctrinal comme ceux de Sanāʾī ou de ʿAṭṭār, chaque
      poème de la *Khamsa* s'ouvre par des sections dévotionnelles
      à coloration soufie et se développe selon les thèmes de
      l'amour-comme-connaissance qui deviendront la diction
      dominante de la poésie soufie persane ; *Laylī u Majnūn*
      en particulier offrit aux poètes soufis des sept siècles
      suivants (le plus célèbre étant la reprise de Jāmī et la
      version ottomane de Fuẓūlī) l'allégorie maîtresse du
      *fanāʾ* comme anéantissement de l'amant dans l'aimé.
    canonical_hijri: {year: 605, precision: year}
    canonical_gregorian: {date: 1209-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death year 605 AH at Ganja per dominant academic consensus."
      - source_key: editorial
        notes: "Variants 607 / 614 AH attested in some Persian tadhkira."
    people: [[nizami-ganjawi, died]]
    tags: [saljuq, atabegs, persian, poet, ganja, khamsa, sufi-influence, layli-majnun]
