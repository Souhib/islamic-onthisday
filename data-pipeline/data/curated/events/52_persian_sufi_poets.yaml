  - slug: death-of-hatif-isfahani
    category: scholar_death
    title_en: Death of Hātif Iṣfahānī — Persian Sufi Tarjīʿ-band Master
    title_ar: وفاة هاتف الأصفهاني — صاحب الترجيع‌بند الصوفي الفارسي
    title_fr: Mort de Hātif Iṣfahānī — maître du *tarjīʿ-band* soufi persan
    description_en: |
      Sayyid Aḥmad Ḥātif Iṣfahānī — late-Safavid / Zand-era
      Persian-language Sunni Sufi poet of Iṣfahān, of Sayyid
      lineage, physician by trade, and the most-quoted single
      voice of eighteenth-century Persian devotional poetry —
      died at Qum or Iṣfahān around 1198 AH (~1784 CE), with
      some sources giving 1199 AH. He is celebrated above all
      for his *Tarjīʿ-band* of five strophes opening with the
      line *yik-i hast u hīch nīst juz ū* ("There is one and
      nothing is, save Him") — a single concise poem that
      restated the *waḥdat al-wujūd* doctrine of Ibn ʿArabī,
      Jāmī, and Bīdel for a late-Safavid audience and became
      the most-memorised poem in eighteenth-and-nineteenth-
      century Iranian Sufi devotional life. The poem
      enumerates the Christian, Magian, and Muslim seekers
      and brings each to the same affirmation — a literary
      crystallisation of the long Persian Sufi conviction that
      the Beloved is one, however the lover is named.
    description_ar: |
      توفي السيد أحمد هاتف الأصفهاني — شاعرٌ صوفيٌّ سنيٌّ
      فارسيٌّ من إصفهان في أواخر العصر الصفوي وعهد الزنديّة،
      من السلالة العلويّة، طبيبٌ كسبيّاً، وأكثر صوتٍ مفردٍ
      نقلاً في الشعر التعبدي الفارسي بالقرن الثاني عشر الهجري
      — بقُمّ أو بإصفهان نحو سنة ١١٩٨ هـ (~١٧٨٤ م)، وذكر بعض
      المصادر سنة ١١٩٩ هـ. وتُروى عنه قبل كل شيء «ترجيع‌بَند»
      من خمسة مقاطع تستفتح ببيت «يكي هست و هيچ نيست جز او»
      («واحدٌ هو وما من شيءٍ سواه») — قصيدةٌ منفردة موجزة
      أعادت صياغة عقيدة وحدة الوجود لابن عربي والجامي وبيدل
      لجمهور أواخر الصفويّة، وصارت أكثر القصائد حفظاً في
      الحياة التعبدية الإيرانية في القرنين الثاني عشر والثالث
      عشر الهجريّين. وتعدِّد القصيدة طلّابَ الحقّ من النصارى
      والمجوس والمسلمين وتقودهم جميعاً إلى عين الإقرار — تبلوُرٌ
      أدبيٌّ للقناعة الصوفية الفارسية الطويلة بأن المحبوب
      واحدٌ مهما تعدّدت أسماء العاشق.
    description_fr: |
      Sayyid Aḥmad Ḥātif Iṣfahānī — poète soufi sunnite de
      langue persane à Iṣfahān à la fin de l'époque safavide
      et sous les Zand, de lignée Sayyid, médecin de
      profession, et la voix la plus citée de la poésie
      dévotionnelle persane du XVIIIe siècle — mourut à Qum
      ou Iṣfahān vers 1198 H (~1784 EC), certaines sources
      donnant 1199 H. Il est célébré avant tout pour son
      *Tarjīʿ-band* de cinq strophes commençant par le vers
      *yik-i hast u hīch nīst juz ū* (« Un est, et rien n'est
      en dehors de Lui ») — un poème unique et concis qui
      reformula la doctrine de la *waḥdat al-wujūd* d'Ibn
      ʿArabī, de Jāmī et de Bīdel à l'attention d'un public
      safavide tardif et devint le poème le plus mémorisé
      dans la vie dévotionnelle soufie iranienne des XIIe
      et XIIIe siècles H. Le poème énumère les chercheurs
      chrétiens, mages et musulmans et conduit chacun à la
      même affirmation — cristallisation littéraire de la
      longue conviction soufie persane que l'Aimé est un,
      quel que soit le nom donné à l'amant.
    canonical_hijri: {year: 1198, precision: year}
    canonical_gregorian: {date: 1784-01-01, precision: year, method: tabular_conversion}
