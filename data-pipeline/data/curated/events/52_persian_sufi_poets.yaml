        is_canonical: true
        notes: "Death 18 Shawwāl 725 AH at Delhi, six months after Niẓām al-Dīn."
      - source_key: editorial
        notes: "Buried at the dargāh; foundational Chishtī sahib of Hindustan."
    people: [[amir-khusraw, died], [nizam-al-din-awliya, subject]]
