  - slug: death-of-fakhr-al-din-iraqi
    category: scholar_death
    title_en: Death of Fakhr al-Dīn ʿIrāqī — Persian Akbarian Sufi Poet
    title_ar: وفاة فخر الدين العراقي — شاعر التصوف الأكبري الفارسي
    title_fr: Mort de Fakhr al-Dīn ʿIrāqī — poète soufi akbarien persan
    description_en: |
      Fakhr al-Dīn Ibrāhīm ibn Buzurgmihr ʿIrāqī — Persian-
      language Sunni Sufi poet of the Suhrawardī ṭarīqa, raised
      in Hamadhān and trained in India under Bahāʾ al-Dīn Zakariyyā
      Multānī of Multān (the chief Suhrawardī of the subcontinent)
      — died at Damascus on 8 Dhū al-Qaʿda 688 AH (23 November
      1289 CE) and was buried beside Ibn ʿArabī at Mount Qāsiyūn.
      After his master's death he travelled to Konya, sat in the
      circle of Ṣadr al-Dīn al-Qūnawī (Ibn ʿArabī's principal
      pupil), and composed his *Lamaʿāt* — a short Persian prose-
      and-verse treatise of twenty-eight "flashes" articulating
      the *waḥdat al-wujūd* metaphysics of Ibn ʿArabī in the
      lyrical idiom of Persian love poetry. The *Lamaʿāt*, with
      Jāmī's later commentary *Ashiʿʿat al-Lamaʿāt*, became a
      core text of post-thirteenth-century Persian Sufi
      curricula across the Naqshbandiyya, Qādiriyya, and
      Chishtiyya. He served at the end of his life as the
      shaykh of the Suhrawardī khānaqāh in Cairo and Damascus
      under Mamlūk patronage.
    description_ar: |
      توفي فخر الدين إبراهيم بن بزرگمهر العراقي — شاعرٌ صوفيٌّ
      سني فارسيّ من السلسلة السهروردية، نشأ بهَمَذَان وتربّى
      بالهند على يد بهاء الدين زكريا الملتاني (شيخ السهروردية
      الأكبر بشبه القارة الهندية) — بدمشق ليلة الثلاثاء الثامن
      من ذي القعدة سنة ٦٨٨ هـ (الموافق ٢٣ نوفمبر ١٢٨٩ م)،
      ودُفن إلى جوار ابن عربي بسفح قاسيون. وبعد وفاة شيخه
      رحل إلى قونية وجلس في حلقة صدر الدين القونوي (تلميذ
      ابن عربي الكبير) وألَّف «اللمعات» — رسالةً فارسية مختصرة
      منثورة-منظومة في ثمانية وعشرين «ومضة» تنطق بميتافيزياء
      وحدة الوجود الأكبرية في لغة الشعر الفارسي الغزلي. وقد
      صارت «اللمعات» — مع شرح الجامي عليها «أشعة اللمعات» —
      نصّاً جوهرياً في مناهج التصوف الفارسي بعد القرن السابع
      الهجري في كل من النقشبندية والقادرية والجشتية. وانتهى
      به الأمر شيخاً للخانقاه السهروردية بالقاهرة ودمشق تحت
      الرعاية المملوكية.
    description_fr: |
      Fakhr al-Dīn Ibrāhīm ibn Buzurgmihr ʿIrāqī — poète soufi
      sunnite de langue persane de la *ṭarīqa* Suhrawardīyya,
      élevé à Hamadhān et formé en Inde auprès de Bahāʾ al-Dīn
      Zakariyyā Multānī de Multān (le grand maître Suhrawardī
      du sous-continent) — mourut à Damas le 8 Dhū al-Qaʿda 688 H
      (23 novembre 1289 EC) et fut enterré à côté d'Ibn ʿArabī
      au mont Qāsiyūn. Après la mort de son maître il se rendit
      à Konya, prit place dans le cercle de Ṣadr al-Dīn al-Qūnawī
      (principal disciple d'Ibn ʿArabī), et composa ses *Lamaʿāt*
      — court traité persan en prose-et-vers de vingt-huit
      « éclairs » articulant la métaphysique de la *waḥdat
      al-wujūd* d'Ibn ʿArabī dans la diction lyrique de la
      poésie d'amour persane. Les *Lamaʿāt*, avec le commentaire
      ultérieur de Jāmī *Ashiʿʿat al-Lamaʿāt*, devinrent un
      texte central des cursus soufis persans
      post-treizième-siècle dans la Naqshbandīyya, la
      Qādirīyya et la Chishtīyya. Il termina sa vie comme
      shaykh de la *khānaqāh* Suhrawardī au Caire et à Damas
      sous le patronage mamlūk.
    canonical_hijri: {year: 688, month: 11, day: 8, precision: day}
    canonical_gregorian: {date: 1289-11-23, precision: day, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death 8 Dhū al-Qaʿda 688 AH at Damascus, buried Mount Qāsiyūn."
      - source_key: editorial
        notes: "Lamaʿāt + Jāmī's commentary Ashiʿʿat al-Lamaʿāt confirm biography."
