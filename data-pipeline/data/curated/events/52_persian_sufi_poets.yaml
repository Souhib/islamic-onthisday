      - source_key: ei2
        is_canonical: true
        notes: "Death year 1198 AH per dominant academic dating; some sources 1199 AH."
      - source_key: editorial
        notes: "Iṣfahān or Qum the place; Tarjīʿ-band central to Iranian Sufi devotion."
