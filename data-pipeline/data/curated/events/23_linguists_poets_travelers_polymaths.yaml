  - slug: assassination-of-nizam-al-mulk
    category: ruler
    title_en: Assassination of Nizam al-Mulk
    title_ar: اغتيال نظام الملك
    title_fr: Assassinat de Niẓām al-Mulk
    description_en: |
      Niẓam al-Mulk Abu ʿAli al-Hasan ibn ʿAli al-Ṭusi — Persian
      Sunni vizier under the Saljuq sultans Alp Arslan and
      Malikshah, founder of the Niẓamiyya madrasa system across
      the Saljuq empire (the Niẓamiyya of Baghdad being the most
      famous, where al-Ghazali later taught), and author of
      *Siyasatnama* (the foundational Persian treatise on Islamic
      governance) — was assassinated by an Ismaʿili Nizari (one
      of the *ḥashishin* of Alamut) at Ṣiḥna near Nahavand while
      travelling with the sultan's caravan. He was about 76. His
      thirty-year tenure made the Saljuq state the most effective
      Sunni political machine of its century, restoring Sunni
      jurisprudential dominance over the lands the Buyid Shia had
      governed for the previous century. The Niẓamiyya madrasa
      system institutionalised Shafiʿi-Ashʿari training as the
      empire-wide standard for Sunni scholars and provided the
      organisational template for every later madrasa system in
      the Sunni world.
    description_ar: |
      اغتيل الوزير نظام الملك أبو علي الحسن بن علي الطوسي — الفارسي
      السني، وزير سلاطين السلاجقة ألب أرسلان وملكشاه، ومؤسس نظام
      المدارس النظامية في عامة دولة السلاجقة (والنظامية ببغداد
      أشهرها، حيث درّس أبو حامد الغزالي بعد ذلك)، ومصنف «سياست
      نامه» (أصل الفقه السياسي الإسلامي بالفارسية) — على يد فدائي
      من نزارية إسماعيلية «حشاشي» قلعة آلموت في «صحنه» قرب نهاوند
      وهو في موكب السلطان. وقد ناهز السادسة والسبعين. وكانت
      ثلاثيته الوزارية ثلاثين سنة قد جعلت دولة السلاجقة أكثر
      ماكينة سياسية سنية فعالية في قرنها، فأعادت السيادة الفقهية
      السنية على البلاد التي حكمها البويهيون الشيعة قرناً كاملاً.
      وأرست نظامية المدارس النظامية تعليم الفقه الشافعي والعقيدة
      الأشعرية معياراً للدولة كلها لطلبة العلم السنيين، وقدمت
      القالب التنظيمي لكل نظام تعليمي سني تالٍ في العالم الإسلامي.
    description_fr: |
      Niẓām al-Mulk Abu ʿAli al-Ḥasan ibn ʿAli al-Ṭūsī — vizir
      sunnite persan sous les sultans seldjoukides Alp Arslan et
      Malikshāh, fondateur du système des madrasas Niẓāmiyya à
      travers l'empire seldjoukide (la Niẓāmiyya de Bagdad étant
      la plus célèbre, où al-Ghazālī enseigna plus tard), et
      auteur du *Siyāsatnāma* (le traité persan fondateur de la
      gouvernance islamique) — fut assassiné par un Nizārī
      ismaélien (l'un des *ḥashīshīn* d'Alamut) à Ṣiḥna près de
      Nahāvand alors qu'il voyageait avec la caravane du sultan.
      Il avait environ 76 ans. Son mandat de trente ans avait fait
      de l'État seldjoukide la machine politique sunnite la plus
      efficace de son siècle, restaurant la dominance jurisprudentielle
      sunnite sur les terres que les Bouyides chiites avaient
      gouvernées pendant le siècle précédent. Le système des
      madrasas Niẓāmiyya institutionnalisa la formation chāfiʿite-
      ashʿarite comme la norme à l'échelle de l'empire pour les
      savants sunnites et fournit le modèle organisationnel pour
      tout système de madrasas ultérieur dans le monde sunnite.
    canonical_hijri: {year: 485, month: 10, day: 10, precision: day}
