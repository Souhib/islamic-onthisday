  - slug: death-of-sibawayhi
    category: scholar
    title_en: Death of Sibawayhi — Father of Arabic Grammar
    title_ar: وفاة سيبويه — إمام النحو العربي
    title_fr: Mort de Sībawayhi — père de la grammaire arabe
    description_en: |
      Abu Bishr ʿAmr ibn ʿUthman ibn Qanbar al-Farsi, known as
      *Sibawayhi* — Persian-origin grammarian who studied under
      al-Khalil ibn Aḥmad in Basra and authored *al-Kitab*, the
      foundational treatise of Arabic grammar that earned him the
      definite-article epithet *al-imam* across the entire later
      tradition — died, almost certainly in his thirties, at
      Shiraz. *al-Kitab* was the first systematic synchronic
      description of any natural language ever produced; its
      framework of *ʿamal* (governance), *ʾiʿrab* (case
      inflection), and the threefold division of words into
      noun, verb, and particle remains the structure of every
      Arabic grammar manual to this day. The Kufan grammarians
      (al-Kisaʾi and al-Farraʾ) challenged its Basran tradition
      but never displaced *al-Kitab*. Sources differ on his
      death-year between 177, 180, and 188 AH; al-Suyuṭi in
      *Bughyat al-Wuʿat* survives the disagreement.
    description_ar: |
      توفي أبو بشر عمرو بن عثمان بن قنبر الفارسي المعروف بـ«سيبويه»
      — نحوي من أصول فارسية، تلقى عن الخليل بن أحمد الفراهيدي
      بالبصرة، ومصنف «الكتاب»، أصل علم النحو العربي الذي رفعه
      إلى مرتبة «الإمام» المعرف بأل عند جميع المتأخرين — في
      شيراز، وقد ناهز الثلاثين على الأرجح. و«الكتاب» أول وصف منهجي
      آني للغة من اللغات الطبيعية أُلّف على الإطلاق؛ ولا يزال
      هيكله من «العمل» و«الإعراب» وتقسيم الكلمة إلى اسم وفعل وحرف
      هيكل كل متن نحو عربي إلى اليوم. وعارضه نحاة الكوفة (الكسائي
      والفراء) ولم يستطيعوا أن يزيحوه. واختلفت المصادر في سنة
      وفاته بين ١٧٧ و١٨٠ و١٨٨ هـ، واستوعب الخلاف السيوطي في
      «بغية الوعاة».
    description_fr: |
      Abu Bishr ʿAmr ibn ʿUthmān ibn Qanbar al-Fārisī, connu sous
      le nom de *Sībawayhi* — grammairien d'origine persane qui
      étudia sous al-Khalīl ibn Aḥmad à Bassora et rédigea *al-
      Kitāb*, le traité fondateur de la grammaire arabe qui lui
      valut l'épithète à article défini *al-imām* à travers
      toute la tradition ultérieure — mourut, presque certainement
      dans la trentaine, à Shiraz. *al-Kitāb* fut la première
      description synchronique systématique d'une langue naturelle
      jamais produite; son cadre d'*ʿamal* (régence),
      d'*iʿrāb* (flexion casuelle) et la division tripartite des
      mots en nom, verbe et particule reste la structure de chaque
      manuel de grammaire arabe à ce jour. Les grammairiens
      koufiens (al-Kisāʾī et al-Farrāʾ) défièrent sa tradition
      basrienne mais ne déplacèrent jamais *al-Kitāb*. Les sources
      divergent sur son année de mort entre 177, 180 et 188 H;
      al-Suyūṭī dans *Bughyat al-Wuʿāt* recense le désaccord.
    canonical_hijri: {year: 180, precision: year}
    canonical_gregorian: {date: 796-01-01, precision: year, method: attested}
