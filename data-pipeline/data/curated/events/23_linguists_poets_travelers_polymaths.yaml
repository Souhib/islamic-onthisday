  - slug: death-of-ibn-fadl-allah-al-umari
    category: scholar
    title_en: Death of Ibn Faḍl Allah al-ʿUmari
    title_ar: وفاة ابن فضل الله العمري
    title_fr: Mort d'Ibn Faḍl Allāh al-ʿUmarī
    description_en: |
      Shihab al-Din Aḥmad ibn Yaḥya ibn Faḍl Allah al-ʿUmari al-
      Dimashqi — Mamluk-era qadi, head of the chancery (*kitabat
      al-sirr*) under Sultan al-Naṣir Muhammad ibn Qalawun, and
      foremost geographer-encyclopedist of his age — died in
      Damascus during a plague outbreak at age about 49. His
      27-volume *Masalik al-Abṣar fi Mamalik al-Amṣar* is the
      summa of fourteenth-century Islamic geography, ethnography,
      and political organisation: it surveys the lands and
      institutions of the entire known world from West Africa
      (where he records the famous testimony of Mansa Musa's
      Cairo visit and the gold inflation it produced in the
      Mediterranean) through Eurasia to the Mongol khanates of
      China. His chancery manual *al-Taʿrif bi-l-Muṣṭalaḥ al-Sharif*
      codified the formal language and procedures of Mamluk
      diplomatic correspondence and is the principal source for
      the post-1300 Mediterranean diplomatic-history archive.
    description_ar: |
      توفي القاضي شهاب الدين أحمد بن يحيى ابن فضل الله العمري
      الدمشقي — قاضي عصر المماليك، وكاتب السر في عهد السلطان
      الناصر محمد بن قلاوون، وأكبر جغرافيي عصره وموسوعييه — بدمشق
      في جائحة الطاعون عن نحو تسع وأربعين سنة. وكتابه «مسالك
      الأبصار في ممالك الأمصار» في سبعة وعشرين مجلداً موسوعة
      الجغرافيا والإثنوغرافيا والتنظيم السياسي في القرن الثامن
      الهجري: يستعرض بلاد العالم المعروف ومؤسساته من أفريقيا
      الغربية (حيث يسجل شهادته الذائعة عن زيارة منسا موسى للقاهرة
      وتضخم الذهب الذي أنتجته في حوض المتوسط) عبر أوراسيا إلى
      ممالك المغول في الصين. ودليله للديوان «التعريف بالمصطلح
      الشريف» قنّن لغة المراسلات الدبلوماسية المملوكية وإجراءاتها،
      وهو المصدر الأصلي لأرشيف التاريخ الدبلوماسي المتوسطي بعد سنة
      ١٣٠٠ ميلادي.
    description_fr: |
      Shihāb al-Dīn Aḥmad ibn Yaḥyā ibn Faḍl Allāh al-ʿUmarī al-
      Dimashqī — qāḍī d'époque mamelouke, chef de la chancellerie
      (*kitābat al-sirr*) sous le sultan al-Nāṣir Muḥammad ibn
      Qalāwūn, et plus grand géographe-encyclopédiste de son
      âge — mourut à Damas durant une épidémie de peste à l'âge
      d'environ 49 ans. Son *Masālik al-Abṣār fī Mamālik al-
      Amṣār* en 27 volumes est la *summa* de la géographie, de
      l'ethnographie et de l'organisation politique islamiques
      du XIVe siècle : il survoie les terres et les institutions
      du monde connu tout entier depuis l'Afrique de l'Ouest (où
      il consigne le célèbre témoignage de la visite cairote de
      Mansa Mūsā et de l'inflation de l'or qu'elle produisit en
      Méditerranée) à travers l'Eurasie jusqu'aux khanats mongols
      de Chine. Son manuel de chancellerie *al-Taʿrīf bi-l-
      Muṣṭalaḥ al-Sharīf* codifia le langage et les procédures
      formelles de la correspondance diplomatique mamelouke et
      est la source principale de l'archive d'histoire
      diplomatique méditerranéenne post-1300.
