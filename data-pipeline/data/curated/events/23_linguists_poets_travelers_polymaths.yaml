  - slug: death-of-al-subki-taj-al-din
    category: scholar
    title_en: Death of Tāj al-Din al-Subki — Author of Ṭabaqāt al-Shafiʿiyya
    title_ar: وفاة تاج الدين السبكي — صاحب «طبقات الشافعية»
    title_fr: Mort de Tāj al-Dīn al-Subkī — auteur des *Ṭabaqāt al-Shāfiʿiyya*
    description_en: |
      Tāj al-Din ʿAbd al-Wahhab ibn ʿAli al-Subki — Shafiʿi-
      Ashʿari jurist, qadi of Damascus, son of the famed Shafiʿi
      master Taqi al-Din al-Subki, and author of *Ṭabaqat al-
      Shafiʿiyya al-Kubra* (the standard biographical dictionary
      of Shafiʿi scholars from al-Shafiʿi himself to his own
      generation, in ten volumes) — died in Damascus during a
      plague outbreak at age about 44. His *Jamʿ al-Jawamiʿ* in
      Shafiʿi uṣul al-fiqh became the most-read introductory
      manual of legal theory in the entire Sunni world, with
      multiple commentaries (most famously al-Maḥalli's) that
      remain standard reading at al-Azhar to this day. *Muʿid
      al-Niʿam wa-Mubid al-Niqam*, his treatise on the duties of
      different professional and social classes, was the first
      systematic Islamic occupational ethics text. Sources record
      that he died accusing himself before God for accepting the
      qaḍa post under political pressure he believed had
      compromised his independence.
    description_ar: |
      توفي القاضي تاج الدين عبد الوهاب بن علي السبكي — فقيه شافعي
      أشعري، قاضي قضاة دمشق، وابن العالم الشافعي الكبير تقي الدين
      السبكي، ومصنف «طبقات الشافعية الكبرى» (المعجم البيوغرافي
      المعتمد لعلماء الشافعية من الإمام الشافعي إلى جيله نفسه،
      في عشرة مجلدات) — بدمشق في جائحة الطاعون عن نحو أربع
      وأربعين سنة. وكتابه «جمع الجوامع» في أصول الفقه الشافعي
      صار أوسع متون أصول الفقه دراسة في العالم السني، وله شروح
      عدة (أشهرها شرح المحلي) لا تزال مقررة في الأزهر إلى اليوم.
      وكتابه «معيد النعم ومبيد النقم» في واجبات الطبقات المهنية
      والاجتماعية المختلفة هو أول متن منهجي في أخلاق المهن في
      الإسلام. وذكرت المصادر أنه توفي وهو يلوم نفسه أمام الله
      بسبب قبوله القضاء تحت ضغط سياسي رأى أنه أخلّ باستقلاله.
    description_fr: |
      Tāj al-Dīn ʿAbd al-Wahhāb ibn ʿAlī al-Subkī — juriste
      shāfiʿite-ashʿarite, qāḍī de Damas, fils du célèbre maître
      shāfiʿite Taqī al-Dīn al-Subkī, et auteur des *Ṭabaqāt al-
      Shāfiʿiyya al-Kubrā* (le dictionnaire biographique standard
      des savants shāfiʿites depuis al-Shāfiʿī lui-même jusqu'à
      sa propre génération, en dix volumes) — mourut à Damas
      durant une épidémie de peste à l'âge d'environ 44 ans. Son
      *Jamʿ al-Jawāmiʿ* en *uṣūl al-fiqh* shāfiʿite devint le
      manuel introductif de théorie juridique le plus lu dans
      tout le monde sunnite, avec plusieurs commentaires (le plus
      célèbre étant celui d'al-Maḥallī) qui demeurent une lecture
      standard à al-Azhar à ce jour. *Muʿīd al-Niʿam wa-Mubīd al-
      Niqam*, son traité sur les devoirs des différentes classes
      professionnelles et sociales, fut le premier texte
      systématique d'éthique professionnelle islamique. Les
      sources rapportent qu'il mourut en s'accusant devant Dieu
      d'avoir accepté le poste de *qaḍāʾ* sous une pression
      politique qu'il croyait avoir compromis son indépendance.
