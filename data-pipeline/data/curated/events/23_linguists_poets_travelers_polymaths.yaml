  - slug: ibn-fadlan-volga-embassy
    category: rihlah
    title_en: Ibn Faḍlan's Embassy to the Volga Bulgars
    title_ar: سفارة ابن فضلان إلى بلغار الفولغا
    title_fr: Ambassade d'Ibn Faḍlān auprès des Bulgares de la Volga
    description_en: |
      Aḥmad ibn Faḍlan, secretary of an Abbasid embassy dispatched
      by Caliph al-Muqtadir to the Volga Bulgar court of Almish
      Yiltawar (who had requested Muslim instruction and Sharia
      jurists from Baghdad), arrived at the Volga after an eleven-
      month overland crossing from Baghdad through Persia,
      Khwarazm, and the Eurasian steppe. His written report —
      *Risalat Ibn Faḍlan* — preserves the first Arabic-language
      eyewitness account of the Volga Bulghars, the Khazars, the
      Bashkirs, and most famously the Rūs (Viking-era Norse
      traders on the Volga river system, whose ship-burial ritual
      Ibn Faḍlan describes in graphic and reliable detail). The
      Bulghar khaganate formally adopted Islam during this
      embassy, founding the chain of conversions that produced
      the Tatar-Volga Sunni community persisting to today. The
      *Risala* is the single most-cited primary source for early
      Eastern European history.
    description_ar: |
      وصل أحمد بن فضلان كاتب السفارة العباسية التي بعث بها الخليفة
      المقتدر إلى بلاط بلغار الفولغا «أَلْمَش يَلْطَوار» (وكان قد
      طلب من بغداد أن يُرسل إليه فقهاء يُعلِّمونه الإسلام والشريعة)
      إلى الفولغا بعد عبور بري من بغداد عبر فارس وخوارزم وسهول
      أوراسيا أحد عشر شهراً. وحفظ تقريره المكتوب «رسالة ابن فضلان»
      أول وصف عربي من شاهد عيان لبلغار الفولغا والخزر والباشكير،
      وأشهر ذلك وصفه للروس (تجار الفايكنغ النورديين على نظام نهر
      الفولغا)، الذي وصف طقس دفنهم بسفينة وصفاً دقيقاً وموثوقاً.
      واعتنق خاقان البلغار الإسلام رسمياً في هذه السفارة، فأطلق
      سلسلة الاعتناقات التي أنتجت المجتمع التتاري-الفولغي السني
      الباقي إلى اليوم. و«الرسالة» أكثر مصدر أصلي إحالة عليه في
      تاريخ شرق أوروبا الباكر.
    description_fr: |
      Aḥmad ibn Faḍlān, secrétaire d'une ambassade abbasside
      dépêchée par le calife al-Muqtadir auprès de la cour des
      Bulgares de la Volga d'Almish Yiltawar (qui avait demandé
      à Bagdad un enseignement musulman et des juristes de la
      *sharīʿa*), arriva à la Volga après une traversée terrestre
      de onze mois depuis Bagdad à travers la Perse, le Khwarezm
      et la steppe eurasienne. Son rapport écrit — *Risālat Ibn
      Faḍlān* — préserve le premier récit en langue arabe d'un
      témoin oculaire des Bulgares de la Volga, des Khazars, des
      Bachkirs, et plus célèbrement des Rūs (commerçants nordiques
      à l'époque viking sur le système fluvial de la Volga, dont
      Ibn Faḍlān décrit le rituel funéraire en bateau avec un
      détail graphique et fiable). Le khaganat bulgare adopta
      formellement l'Islam durant cette ambassade, fondant la
      chaîne de conversions qui produisit la communauté sunnite
      tatare-volgaïque persistant jusqu'aujourd'hui. La *Risāla*
      est la source primaire la plus citée de l'histoire ancienne
      de l'Europe orientale.
    canonical_hijri: {year: 309, month: 12, precision: month}
    canonical_gregorian: {date: 922-05-01, precision: month, method: tabular_conversion}
