  - slug: death-of-al-ahnaf-ibn-qays
    category: companion
    title_en: Death of al-Aḥnaf ibn Qays — Sage of Tamim
    title_ar: وفاة الأحنف بن قيس — حكيم بني تميم
    title_fr: Mort d'al-Aḥnaf ibn Qays — sage des Banū Tamīm
    description_en: |
      Abu Bahr al-Aḥnaf ibn Qays al-Tamimi — *mukhaḍram*
      Companion (one who lived through both Jahiliyya and Islam),
      conqueror of Khurasan under ʿUthman ra (his expeditions
      took the Muslim banner to Marv, Balkh, and Nishapur for
      the first time), and the leading proverbial figure of
      Arab forbearance (*ḥilm*) in classical literature — died
      in Kufa at age about 70. He was the political authority
      of Banu Tamim during the first fitna; his refusal to take
      sides between ʿAli and Muʿawiya ra at Ṣiffin became a
      reference for principled neutrality. ʿUmar ibn al-Khaṭṭab
      ra had said of him: "He is the sage of his people." The
      Caliph Muʿawiya later said: "I have not flattered al-Aḥnaf
      with my eloquence as I have flattered other men." His
      sayings on patience and statecraft, preserved in al-Jaḥiẓ's
      *al-Bayan wa-l-Tabyin*, became canonical models of Arab
      political wisdom.
    description_ar: |
      توفي أبو بحر الأحنف بن قيس التميمي — مخضرم عاش الجاهلية
      والإسلام، وفاتح خراسان في خلافة عثمان رضي الله عنه (ووصل
      راية المسلمين بفتوحاته إلى مرو وبلخ ونيسابور للمرة الأولى)،
      والمضرب به المثل في الحلم العربي في الأدب الكلاسيكي — بالكوفة
      عن نحو سبعين سنة. وكان السلطان السياسي على بني تميم في
      الفتنة الأولى؛ ورفضه الانحياز بين علي ومعاوية رضي الله
      عنهما في صفين صار مرجعاً في الحياد المبدئي. قال فيه عمر
      رضي الله عنه: «إنه سيد قومه». وقال معاوية رضي الله عنه:
      «ما تملقت الأحنف ببلاغتي كما تملقت سواه». وأقواله في الصبر
      والسياسة المحفوظة في «البيان والتبيين» للجاحظ صارت نماذج
      كلاسيكية في الحكمة السياسية العربية.
    description_fr: |
      Abū Baḥr al-Aḥnaf ibn Qays al-Tamīmī — Compagnon
      *mukhaḍram* (qui vécut à la fois la *Jāhiliyya* et l'Islam),
      conquérant du Khurasan sous ʿUthmān ra (ses expéditions
      portèrent la bannière musulmane à Merv, à Balkh et à
      Nishapur pour la première fois), et la figure proverbiale
      principale de la patience arabe (*ḥilm*) dans la littérature
      classique — mourut à Koufa à l'âge d'environ 70 ans. Il
      fut l'autorité politique des Banū Tamīm durant la première
      *fitna*; son refus de prendre parti entre ʿAlī et Muʿāwiya
      ra à Ṣiffīn devint une référence pour la neutralité de
      principe. ʿUmar ibn al-Khaṭṭāb ra dit de lui : « il est le
      sage de son peuple ». Le calife Muʿāwiya dit plus tard :
      « je n'ai pas flatté al-Aḥnaf de mon éloquence comme j'ai
      flatté d'autres hommes ». Ses paroles sur la patience et
      l'art de gouverner, préservées dans *al-Bayān wa-l-Tabyīn*
      d'al-Jāḥiẓ, devinrent des modèles canoniques de la sagesse
      politique arabe.
    canonical_hijri: {year: 71, precision: year}
    canonical_gregorian: {date: 691-01-01, precision: year, method: attested}
