  - slug: martyrdom-of-said-ibn-jubayr
    category: scholar
    title_en: Martyrdom of Saʿid ibn Jubayr
    title_ar: استشهاد سعيد بن جبير
    title_fr: Martyre de Saʿīd ibn Jubayr
    description_en: |
      Saʿid ibn Jubayr al-Asadi — leading tabiʿi mufassir of
      Kufa, foremost direct student of ʿAbdullah ibn ʿAbbas ra
      after Mujahid, and the scholar called by his fellow
      tabiʿūn *al-jahbadh* ("the keen judge of true and false")
      — was beheaded by al-Hajjaj ibn Yusuf at Wasit at age 49,
      after being captured following the suppression of Ibn al-
      Ashʿath's revolt. al-Hajjaj had pursued him through every
      Umayyad province for ten years; when at last he was brought
      bound to the governor's court, the famous interview
      preserved by Aḥmad and al-Ṭabari ensued — Saʿid serenely
      reciting Q 6:79 ("I have turned my face to the One who
      created the heavens and the earth") and refusing to soften
      his answers — until al-Hajjaj had him executed. al-Hajjaj
      himself died forty days later. The hadith muḥaddithun
      reckon Saʿid one of the seven foundational tabiʿun.
    description_ar: |
      استشهد الإمام سعيد بن جبير الأسدي — كبير مفسري التابعين
      بالكوفة، أعلم تلاميذ ابن عباس رضي الله عنه مباشرة بعد مجاهد،
      والعالم الذي سماه أقرانه من التابعين «الجهبذ» (الناقد المميز
      الصادق من الكاذب) — قتله الحجاج بن يوسف الثقفي بالواسط عن
      تسع وأربعين سنة بعد أسره عقب قمع ثورة ابن الأشعث. وقد كان
      الحجاج يلاحقه في عامة ولايات بني أمية عشر سنين؛ ولما جيء
      به مكبلاً بين يديه دار الحوار المشهور الذي يحفظه أحمد بن
      حنبل والطبري في تاريخه — يتلو سعيد رضي الله عنه قول الله:
      ﴿إِنِّي وَجَّهْتُ وَجْهِيَ لِلَّذِي فَطَرَ السَّمَاوَاتِ
      وَالْأَرْضَ﴾ [الأنعام: ٧٩] في ثبات، رافضاً تليين أجوبته —
      حتى أمر الحجاج بقتله. ومات الحجاج بعد أربعين يوماً. ويعد
      محدثو السنة سعيداً واحداً من سبعة من أصول التابعين.
    description_fr: |
      Saʿīd ibn Jubayr al-Asadī — principal mufassir tabiʿī de
      Koufa, premier élève direct d'ʿAbdullāh ibn ʿAbbās ra après
      Mujāhid, et le savant appelé par ses pairs tābiʿūn
      *al-jahbadh* (« le juge perspicace du vrai et du faux ») —
      fut décapité par al-Ḥajjāj ibn Yūsuf à Wāsiṭ à 49 ans,
      après avoir été capturé suite à la répression de la révolte
      d'Ibn al-Ashʿath. al-Ḥajjāj l'avait poursuivi à travers
      toutes les provinces omeyyades pendant dix ans; lorsqu'on
      l'amena enfin enchaîné à la cour du gouverneur, le célèbre
      entretien préservé par Aḥmad et al-Ṭabarī s'ensuivit —
      Saʿīd récitant sereinement Q 6:79 (« j'ai dirigé mon visage
      vers Celui qui a créé les cieux et la terre ») et refusant
      d'adoucir ses réponses — jusqu'à ce qu'al-Ḥajjāj le fît
      exécuter. al-Ḥajjāj lui-même mourut quarante jours plus
      tard. Les muḥaddithūn du hadith comptent Saʿīd parmi les
      sept tābiʿūn fondateurs.
    canonical_hijri: {year: 95, month: 8, precision: month}
    canonical_gregorian: {date: 714-05-01, precision: month, method: tabular_conversion}
