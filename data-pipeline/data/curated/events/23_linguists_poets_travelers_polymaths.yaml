  - slug: death-of-ibn-ataillah
    category: scholar
    title_en: Death of Ibn ʿAṭaʾillah al-Iskandari — author of al-Ḥikam
    title_ar: وفاة ابن عطاء الله الإسكندري — صاحب «الحكم»
    title_fr: Mort d'Ibn ʿAṭāʾillāh al-Iskandarī — auteur d'al-Ḥikam
    description_en: |
      Tāj al-Din Aḥmad ibn Muhammad ibn ʿAṭaʾillah al-Iskandari
      al-Maliki — Maliki jurist, third shaykh in the spiritual
      lineage of Abu al-Hasan al-Shadhili after Abu al-ʿAbbas al-
      Mursi, and author of *al-Ḥikam al-ʿAṭaʾiyya* (the most
      celebrated short work of Sunni Sufism) — died in Cairo at
      age about 50. *al-Ḥikam* — 264 aphorisms in rhymed prose —
      became second in distribution only to *Qaṣidat al-Burda*
      among medieval Sunni devotional texts; it has more than
      forty classical Arabic commentaries, the most influential
      being those of Aḥmad Zarruq and Ibn ʿAjiba. He defended
      Sunni Sufism against Ibn Taymiyya's critique in a famous
      Cairo public confrontation. His *Laṭaʾif al-Minan* preserves
      the biographies of his Shadhili predecessors; his *Miftaḥ
      al-Falaḥ* is a foundational manual on the etiquette of
      *dhikr*. Through Zarruq, the Ḥikam tradition shaped Maghrebi
      Sufi orthodoxy decisively.
    description_ar: |
      توفي الإمام تاج الدين أحمد بن محمد بن عطاء الله الإسكندري
      المالكي — فقيه مالكي، وثالث المشايخ في سلسلة أبي الحسن
      الشاذلي الروحية بعد أبي العباس المرسي، ومصنف «الحكم العطائية»
      (أشهر متن قصير في التصوف السني) — بالقاهرة عن نحو خمسين
      سنة. و«الحكم» — مئتان وأربع وستون حكمة في النثر المسجوع —
      صارت ثاني أوسع المتون السنية الدينية انتشاراً بعد قصيدة
      البردة؛ ولها أزيد من أربعين شرحاً عربياً كلاسيكياً، أعظمها
      أثراً شرحا أحمد زرّوق وابن عجيبة. وقد دافع رحمه الله عن
      التصوف السني في وجه نقد ابن تيمية في مواجهة عامة شهيرة
      بالقاهرة. وكتابه «لطائف المنن» يحفظ تراجم أسلافه الشاذلية،
      و«مفتاح الفلاح» متن أصل في آداب الذكر. وعبر تلميذه أحمد
      زرّوق صاغ تراث «الحكم» فقه العقيدة الصوفية المغربية صياغة
      حاسمة.
    description_fr: |
      Tāj al-Dīn Aḥmad ibn Muḥammad ibn ʿAṭāʾillāh al-Iskandarī
      al-Mālikī — juriste malikite, troisième shaykh dans la
      lignée spirituelle d'Abū al-Ḥasan al-Shādhilī après Abū
      al-ʿAbbās al-Mursī, et auteur d'*al-Ḥikam al-ʿAṭāʾiyya*
      (l'œuvre courte la plus célèbre du soufisme sunnite) —
      mourut au Caire à l'âge d'environ 50 ans. *al-Ḥikam* —
      264 aphorismes en prose rimée — devint, en distribution,
      seconde après la *Qaṣīdat al-Burda* parmi les textes
      dévotionnels sunnites médiévaux; elle compte plus de
      quarante commentaires arabes classiques, les plus influents
      étant ceux d'Aḥmad Zarrūq et d'Ibn ʿAjība. Il défendit le
      soufisme sunnite contre la critique d'Ibn Taymiyya lors
      d'une célèbre confrontation publique au Caire. Son *Laṭāʾif
      al-Minan* préserve les biographies de ses prédécesseurs
      shādhilīs; son *Miftāḥ al-Falāḥ* est un manuel fondateur
      sur l'étiquette du *dhikr*. À travers Zarrūq, la tradition
      des *Ḥikam* façonna de manière décisive l'orthodoxie soufie
      maghrébine.
    canonical_hijri: {year: 709, month: 11, precision: month}
    canonical_gregorian: {date: 1310-04-01, precision: month, method: tabular_conversion}
