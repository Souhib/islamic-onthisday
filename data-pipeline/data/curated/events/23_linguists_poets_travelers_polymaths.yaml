  - slug: death-of-ibn-al-jawzi
    category: scholar
    title_en: Death of Abu al-Faraj Ibn al-Jawzi
    title_ar: وفاة أبي الفرج ابن الجوزي
    title_fr: Mort d'Abū al-Faraj Ibn al-Jawzī
    description_en: |
      Abu al-Faraj ʿAbd al-Raḥman ibn ʿAli ibn al-Jawzi al-Qurashi
      al-Baghdadi — Hanbali polymath of Baghdad, public preacher
      whose Friday sermons drew tens of thousands, and one of
      the most prolific authors in the entire history of Sunni
      Islam — died in Baghdad at age about 87. His personal
      bibliography exceeds three hundred works in fields ranging
      from tafsir, hadith, fiqh, biography, and asceticism to
      medicine and philology; major surviving titles include the
      universal history *al-Muntaẓam fi Tarikh al-Mulūk wa-l-
      Umam*, the moral encyclopedia *Ṣayd al-Khaṭir*, the hadith
      criticism *al-Mawḍuʿat* (a foundational work flagging
      forged hadiths), and *Talbis Iblis* (an extended polemic
      against innovated practices in popular religion). al-
      Dhahabi described him as "the foremost preacher of the age
      and the most prolific author the world has seen."
    description_ar: |
      توفي الإمام أبو الفرج عبد الرحمن بن علي ابن الجوزي القرشي
      البغدادي — موسوعي حنبلي ببغداد، خطيب جمعة يحضر مجلسه عشرات
      الألوف، ومن أوفر المصنفين على الإطلاق في تاريخ السنة —
      ببغداد عن نحو سبع وثمانين سنة. ويزيد ما صنفه على ثلاث مئة
      كتاب في فنون التفسير والحديث والفقه والتراجم والزهد والطب
      واللغة؛ ومن أبرز ما وصل من كتبه: تاريخه العام «المنتظم في
      تاريخ الملوك والأمم»، وموسوعته الأخلاقية «صيد الخاطر»،
      وكتابه في نقد الحديث «الموضوعات» (وهو من الأصول في تمييز
      الأحاديث المكذوبة)، و«تلبيس إبليس» في النقد الموسع للبدع
      في التدين الشعبي. ووصفه الذهبي بقوله: «شيخ الواعظين في
      عصره، وأكثر المؤلفين في الإسلام تصنيفاً».
    description_fr: |
      Abu al-Faraj ʿAbd al-Raḥmān ibn ʿAlī ibn al-Jawzī al-
      Qurashī al-Baghdādī — polymathe hanbalite de Bagdad,
      prédicateur public dont les sermons du vendredi attiraient
      des dizaines de milliers de personnes, et l'un des auteurs
      les plus prolifiques de toute l'histoire de l'islam sunnite
      — mourut à Bagdad à l'âge d'environ 87 ans. Sa bibliographie
      personnelle dépasse trois cents œuvres dans des domaines
      allant du tafsir, du hadith, du fiqh, de la biographie et
      de l'ascétisme à la médecine et à la philologie; les titres
      majeurs survivants incluent l'histoire universelle *al-
      Muntaẓam fī Tārīkh al-Mulūk wa-l-Umam*, l'encyclopédie
      morale *Ṣayd al-Khāṭir*, l'œuvre de critique du hadith
      *al-Mawḍūʿāt* (ouvrage fondateur signalant les hadiths
      forgés), et *Talbīs Iblīs* (polémique étendue contre les
      pratiques innovées dans la religion populaire). al-Dhahabī
      le décrivit comme « le principal prédicateur de l'époque
      et l'auteur le plus prolifique que le monde ait vu ».
    canonical_hijri: {year: 597, month: 9, day: 12, precision: day}
    canonical_gregorian: {date: 1201-06-16, precision: day, method: tabular_conversion}
