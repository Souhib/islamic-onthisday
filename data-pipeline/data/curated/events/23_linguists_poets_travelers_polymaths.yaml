  - slug: conquest-of-antioch
    category: conquest
    title_en: Muslim Conquest of Antioch
    title_ar: فتح أنطاكية
    title_fr: Conquête musulmane d'Antioche
    description_en: |
      The historic Byzantine city of Antioch (Anṭakiya) — the
      ancient Roman capital of Greater Syria, third in dignity
      after Constantinople and Alexandria, and one of the five
      Byzantine patriarchates — surrendered to the Muslim army
      under Abu ʿUbayda ibn al-Jarrah ra after a brief siege.
      The terms of capitulation followed the precedent of the
      Ḥims and Aleppo treaties: a fixed jizya per adult male in
      exchange for protection of life, property, and churches.
      The fall of Antioch decisively ended Byzantine territorial
      authority in northern Syria; Emperor Heraclius, hearing
      the news, reportedly stopped at Antioch's western gate on
      his retreat into Anatolia, looked back toward Damascus,
      and said the famous farewell: "*Salutation to thee, O
      Syria, the like of thee will not be returned to me.*" The
      city remained in Muslim hands until the First Crusade
      reconquered it in 491 AH (1098 CE).
    description_ar: |
      سلّمت مدينة أنطاكية البيزنطية الأثرية — عاصمة الشام الرومانية
      القديمة، ثالثة المدن في الكرامة بعد القسطنطينية والإسكندرية،
      وإحدى البطريركيات البيزنطية الخمس — للجيش الإسلامي بقيادة
      أبي عبيدة بن الجراح رضي الله عنه بعد حصار قصير. كانت شروط
      الصلح على نموذج صلوحات حمص وحلب: جزية مقدرة على البالغين
      من الرجال في مقابل حقن الدماء وحفظ الأموال والكنائس. وأنهى
      سقوط أنطاكية السيادة البيزنطية الإقليمية في شمال الشام إنهاءً
      حاسماً؛ ولما بلغ الإمبراطور هرقل النبأ توقف عند الباب
      الغربي لأنطاكية في انسحابه إلى الأناضول، فالتفت إلى دمشق
      وقال ودعاه المشهور: «سلام عليك يا سورية، سلاماً لا اجتماع
      بعده». وبقيت المدينة في أيدي المسلمين حتى استرجعها الصليبيون
      في الحملة الأولى سنة ٤٩١ هـ (١٠٩٨ ميلادي).
    description_fr: |
      La cité historique byzantine d'Antioche (Anṭākiya) —
      l'ancienne capitale romaine de la Grande Syrie, troisième
      en dignité après Constantinople et Alexandrie, et l'un des
      cinq patriarcats byzantins — capitula devant l'armée
      musulmane sous Abū ʿUbayda ibn al-Jarrāḥ ra après un bref
      siège. Les termes de la capitulation suivirent le précédent
      des traités de Ḥims et d'Alep : une *jizya* fixe par homme
      adulte en échange de la protection des vies, des biens et
      des églises. La chute d'Antioche mit un terme décisif à
      l'autorité territoriale byzantine en Syrie du Nord;
      l'empereur Héraclius, à la nouvelle, s'arrêta à la porte
      occidentale d'Antioche dans sa retraite vers l'Anatolie,
      regarda vers Damas et dit le célèbre adieu : « salut à toi,
      ô Syrie, le pareil de toi ne me sera plus rendu ». La
      ville demeura entre les mains des musulmans jusqu'à ce
      que la première croisade la reconquière en 491 H (1098 EC).
    canonical_hijri: {year: 17, precision: year}
    canonical_gregorian: {date: 638-01-01, precision: year, method: attested}
