  - slug: death-of-al-birgivi
    category: scholar
    title_en: Death of Imam al-Birgivi — Ottoman Sunni Reformer
    title_ar: وفاة الإمام البركوي — مجدد سني عثماني
    title_fr: Mort de l'imam al-Birgivī — réformateur sunnite ottoman
    description_en: |
      Muhammad ibn Pir ʿAli al-Birgivi al-Rumi — Hanafi-Maturidi
      Ottoman scholar of Anatolian origin who taught at Birgi (his
      eponymous town), the foremost early-modern Ottoman
      revivalist whose campaign against bidʿa and lax religious
      practice anticipated the entire later Sunni reformist
      tradition by 250 years — died at Birgi during a plague
      outbreak. He was about 53. His brief *al-Ṭariqa al-
      Muhammadiyya* — a manual of personal Sunni piety arranged
      around the categories of inward and outward conformity to
      the Sunna — became one of the most-printed and most-
      commented books in Ottoman religious circulation, with a
      special concentration of commentaries during the seventeenth
      and eighteenth century Qadizadeli movement that drew its
      reformist program directly from his work. His Arabic
      grammar *Iẓhar al-Asrar* and his *al-Risala al-Birgiviyya*
      on creed remain Ottoman Hanafi standards.
    description_ar: |
      توفي الإمام محمد بن بير علي البركوي الرومي — عالم حنفي ماتريدي
      عثماني من أصول أناضولية، درّس في «بركي» (المدينة التي نسب
      إليها)، وأكبر المجددين العثمانيين في العصر الحديث المبكر،
      الذي سبق بحملته على البدعة وضعف العمل بالدين تراث الإصلاح
      السني بقرنين ونصف قرن — في «بركي» في جائحة الطاعون عن نحو
      ثلاث وخمسين سنة. وكتابه القصير «الطريقة المحمدية» — متن في
      آداب التقوى السنية الفردية مرتب على أبواب الباطن والظاهر
      من اتباع السنة — صار من أكثر المطبوعات والمشروحات في الدوران
      الديني العثماني، مع تكاثف خاص في الشروح في عصر حركة
      «القاضي زاده» في القرنين السابع عشر والثامن عشر التي أخذت
      برنامجها الإصلاحي مباشرة من عمله. وكتاب البركوي «إظهار
      الأسرار» في النحو ورسالته في العقيدة من المتون العثمانية
      الحنفية المعتمدة.
    description_fr: |
      Muḥammad ibn Pir ʿAli al-Birgivī al-Rūmī — savant ottoman
      hanafite-maturidite d'origine anatolienne qui enseigna à
      Birgi (sa ville éponyme), le plus grand revivaliste
      ottoman du début de l'époque moderne, dont la campagne
      contre la *bidʿa* et la pratique religieuse relâchée
      anticipa de 250 ans toute la tradition réformiste sunnite
      ultérieure — mourut à Birgi durant une épidémie de peste.
      Il avait environ 53 ans. Son bref *al-Ṭarīqa al-
      Muḥammadiyya* — un manuel de piété sunnite personnelle
      arrangé autour des catégories de conformité intérieure et
      extérieure à la Sunna — devint l'un des livres les plus
      imprimés et les plus commentés de la circulation religieuse
      ottomane, avec une concentration particulière de
      commentaires durant le mouvement Qādīzādelī des XVIIe et
      XVIIIe siècles qui tira son programme réformiste
      directement de son œuvre. Sa grammaire arabe *Iẓhār al-
      Asrār* et sa *Risāla al-Birgiviyya* sur le credo demeurent
      des standards hanafites ottomans.
    canonical_hijri: {year: 981, precision: year}
    canonical_gregorian: {date: 1573-01-01, precision: year, method: tabular_conversion}
