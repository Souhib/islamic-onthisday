  - slug: death-of-ebussuud-efendi
    category: scholar
    title_en: Death of Ebussuud Efendi — Ottoman Shaykh ul-Islam
    title_ar: وفاة أبي السعود أفندي — شيخ الإسلام العثماني
    title_fr: Mort d'Ebussuud Efendi — Shaykh ul-Islām ottoman
    description_en: |
      Ebussuud (Abu al-Suʿud) Efendi — Ottoman Hanafi jurist who
      served twenty-eight years as Shaykh ul-Islam (1545-1574 CE)
      under Sulaymān the Magnificent and Selīm II, and the
      scholar who codified the *qanun* of the Ottoman empire by
      reconciling Hanafi fiqh with imperial state law on land
      tenure, taxation, criminal procedure, and waqf — died in
      Istanbul at age about 84. His Qurʾan commentary
      *Irshad al-ʿAql al-Salim* (composed for Sulaymān) is the
      foremost Ottoman Sunni tafsir and remains a standard
      reference. As Shaykh ul-Islam he authored more than a
      thousand fatwas (preserved in the *Maʿruzat*) on every
      matter of imperial governance from coffee-house regulation
      to land surveys; his ruling that the Ottoman ground-rent
      (*muqataʿa*) was Sharia-compliant under iztihadi reasoning
      legitimised the empire's fiscal foundations for the next
      three centuries.
    description_ar: |
      توفي الشيخ أبو السعود أفندي — فقيه حنفي عثماني، شغل منصب
      شيخ الإسلام ثمانياً وعشرين سنة (١٥٤٥-١٥٧٤ ميلادي) في عهدي
      السلطان سليمان القانوني وابنه سليم الثاني، والعالم الذي
      قنن «القانون» العثماني بالتوفيق بين الفقه الحنفي وقانون
      الدولة الإمبراطوري في الإقطاع والضرائب والجزاء والوقف —
      بإسطنبول عن نحو أربع وثمانين سنة. وتفسيره «إرشاد العقل
      السليم» (ألفه للسلطان سليمان) من أكبر تفاسير العثمانيين
      السنية، ولا يزال مرجعاً معتمداً. وأخرج بصفته شيخاً للإسلام
      أكثر من ألف فتوى (محفوظة في «المعروضات») في كل شأن إمبراطوري
      من تنظيم القهوة إلى مسح الأراضي؛ وفتواه بأن خراج الأرض
      العثماني («المقاطعة») موافق للشريعة بالاجتهاد قنّن الأساس
      المالي للإمبراطورية ثلاثة قرون كاملة.
    description_fr: |
      Ebussuud (Abū al-Suʿūd) Efendi — juriste hanafite ottoman
      qui servit vingt-huit ans comme Shaykh ul-Islām (1545-1574
      EC) sous Soliman le Magnifique et Selīm II, et le savant
      qui codifia le *qānūn* de l'Empire ottoman en réconciliant
      le fiqh hanafite avec le droit étatique impérial sur la
      tenure foncière, la taxation, la procédure pénale et le
      waqf — mourut à Istanbul à l'âge d'environ 84 ans. Son
      commentaire coranique *Irshād al-ʿAql al-Salīm* (composé
      pour Soliman) est le plus grand tafsir sunnite ottoman et
      demeure une référence standard. En tant que Shaykh ul-Islām
      il rédigea plus d'un millier de fatwas (préservées dans les
      *Maʿrūzāt*) sur chaque matière de gouvernance impériale
      depuis la régulation des cafés jusqu'aux relevés cadastraux;
      sa décision selon laquelle la rente foncière ottomane
      (*muqāṭaʿa*) était conforme à la *sharīʿa* au titre du
      raisonnement *ijtihādī* légitima les fondations fiscales
      de l'empire pour les trois siècles suivants.
    canonical_hijri: {year: 982, month: 8, day: 5, precision: day}
    canonical_gregorian: {date: 1574-08-23, precision: day, method: tabular_conversion}
