  - slug: death-of-al-khansa
    category: companion
    title_en: Death of al-Khansaʾ ra — Sahabia Poetess
    title_ar: وفاة الخنساء رضي الله عنها — شاعرة الإسلام
    title_fr: Mort d'al-Khansāʾ ra — poétesse compagnonne
    description_en: |
      Tumadir bint ʿAmr al-Sulamiyya, known by her epithet
      *al-Khansaʾ* — pre-Islamic poet whose elegies for her
      brothers Ṣakhr and Muʿawiya raised the *marathi* genre to
      its classical apex, and Companion who embraced Islam in a
      delegation of her tribe Banu Sulaym to the Prophet ﷺ — died
      shortly after losing her four sons at the Battle of
      Qadisiyya in 16 AH. She was about 70. The Prophet ﷺ asked
      her to recite, and as she did he said "Continue, Khunas"
      — using the diminutive of her epithet — and praised her
      eloquence. On the eve of Qadisiyya she had urged her four
      sons to martyrdom; on receiving the news that all four had
      fallen, she said: "Praise be to Allah who has honoured me
      with their martyrdom, and I hope from my Lord to be united
      with them in the abode of His mercy." She is the only
      sahabia universally regarded by classical critics as the
      single greatest woman poet in the Arabic language.
    description_ar: |
      توفيت تماضر بنت عمرو السلمية المعروفة بـ«الخنساء» رضي الله
      عنها — شاعرة جاهلية ومراثيها لأخويها صخر ومعاوية رفعت فن
      الرثاء إلى ذروته الكلاسيكية، والصحابية التي أسلمت في وفد
      من بني سليم وفد على رسول الله ﷺ — بُعيد استشهاد أبنائها
      الأربعة في معركة القادسية سنة ١٦ هـ. وقد ناهزت السبعين.
      وكان النبي ﷺ يطلب منها أن تنشده، فلما أنشدت قال لها:
      «هيه يا خناس!» يصغرها بلقبها، ومدح بلاغتها. وفي ليلة
      القادسية حضّت أبناءها الأربعة على الشهادة؛ فلما بلغها أنهم
      كلهم قد قتلوا قالت: «الحمد لله الذي شرفني بقتلهم، وأرجو
      من ربي أن يجمعني بهم في مستقر رحمته». وهي الصحابية
      الوحيدة التي تطبق كلمة النقاد القدامى على أنها أعظم شاعرة
      في تاريخ اللغة العربية.
    description_fr: |
      Tumāḍir bint ʿAmr al-Sulamiyya, connue sous son épithète
      *al-Khansāʾ* — poétesse préislamique dont les élégies pour
      ses frères Ṣakhr et Muʿāwiya élevèrent le genre des
      *marāthī* à son apogée classique, et Compagne qui embrassa
      l'Islam dans une délégation de sa tribu des Banū Sulaym au
      Prophète ﷺ — mourut peu après la perte de ses quatre fils
      à la bataille de Qādisiyya en 16 H. Elle avait environ
      70 ans. Le Prophète ﷺ lui demandait de réciter, et tandis
      qu'elle s'exécutait il lui disait « continue, Khunās » —
      utilisant le diminutif de son épithète — et louait son
      éloquence. À la veille de Qādisiyya, elle avait pressé ses
      quatre fils au martyre; à la réception de la nouvelle que
      les quatre étaient tombés, elle dit : « louange à Allah qui
      m'a honorée par leur martyre, et j'espère de mon Seigneur
      d'être réunie à eux dans la demeure de Sa miséricorde ».
      Elle est la seule *ṣaḥābiyya* universellement considérée
      par les critiques classiques comme la plus grande poétesse
      de la langue arabe.
    canonical_hijri: {year: 24, precision: year}
    canonical_gregorian: {date: 645-01-01, precision: year, method: attested}
    claims:
