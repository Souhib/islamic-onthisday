  - slug: death-of-al-busiri
    category: scholar
    title_en: Death of al-Buṣiri — author of Qaṣidat al-Burda
    title_ar: وفاة البوصيري — صاحب «قصيدة البردة»
    title_fr: Mort d'al-Būṣīrī — auteur de la *Qaṣīdat al-Burda*
    description_en: |
      Sharaf al-Din Muhammad ibn Saʿid al-Buṣiri al-Sanhaji —
      Maliki Sufi poet of Mamluk Egypt and the author of
      *al-Kawakib al-Durriyya fi Madḥ Khayr al-Bariyya* (universally
      known as *Qaṣidat al-Burda*, "the Mantle Ode"), the most
      celebrated and most widely recited Arabic poem in praise of
      the Prophet ﷺ — died at Alexandria at age about 86. The
      poem's 160 lines have been memorised, set to music,
      inscribed on mosque walls, and recited communally at
      mawlid celebrations across the entire Sunni world for
      seven centuries. al-Buṣiri composed it after seeing the
      Prophet ﷺ in a dream during paralysis from a stroke; he
      reported being healed upon recitation. The poem has more
      than ninety classical Arabic commentaries, the most famous
      being those of Ibn Hajar al-Haytami and al-Bajuri. Critical
      analysis of its prophetological theology has been ongoing
      from Ibn Taymiyya forward, but the poem remains universally
      received in Sunni devotional life.
    description_ar: |
      توفي الإمام شرف الدين محمد بن سعيد البوصيري الصنهاجي — شاعر
      صوفي مالكي من مصر المملوكية، ومصنف «الكواكب الدرية في مدح
      خير البرية» المعروف عند الناس بـ«قصيدة البردة»، أشهر القصائد
      العربية وأكثرها رواية في مدح النبي ﷺ — في الإسكندرية عن نحو
      ست وثمانين سنة. وقد حُفظت أبيات القصيدة المئة والستون
      ولُحنت ونُقشت على جدران المساجد وتُليت في مجالس المولد في
      عامة العالم السني سبعة قرون. ونظمها البوصيري بعد رؤيا
      للنبي ﷺ في نومه إذ كان مصاباً بشلل نصفي، فأخبر أنه شفي بقراءة
      القصيدة. ولها أزيد من تسعين شرحاً عربياً كلاسيكياً، أشهرها
      شرحا ابن حجر الهيتمي والباجوري. وقد دار النقد على تخريجاتها
      العقدية في صفات النبي ﷺ من زمن ابن تيمية فصاعداً، لكن
      القصيدة لا تزال متداولة عامة في الحياة الدينية السنية.
    description_fr: |
      Sharaf al-Dīn Muḥammad ibn Saʿīd al-Būṣīrī al-Ṣanhājī —
      poète soufi malikite de l'Égypte mamelouke et auteur d'*al-
      Kawākib al-Durriyya fī Madḥ Khayr al-Bariyya* (universellement
      connu sous le nom de *Qaṣīdat al-Burda*, « l'Ode au
      Manteau »), le poème arabe le plus célèbre et le plus
      largement récité en éloge du Prophète ﷺ — mourut à
      Alexandrie à l'âge d'environ 86 ans. Les 160 vers du poème
      ont été mémorisés, mis en musique, gravés sur les murs des
      mosquées et récités collectivement lors des célébrations
      du *mawlid* à travers tout le monde sunnite pendant sept
      siècles. al-Būṣīrī le composa après avoir vu le Prophète ﷺ
      en rêve durant une paralysie due à un AVC; il rapporta
      avoir été guéri à la récitation. Le poème compte plus de
      quatre-vingt-dix commentaires arabes classiques, les plus
      célèbres étant ceux d'Ibn Ḥajar al-Haytamī et d'al-Bājūrī.
      L'analyse critique de sa théologie prophétologique se
      poursuit depuis Ibn Taymiyya, mais le poème demeure
      universellement reçu dans la vie dévotionnelle sunnite.
    canonical_hijri: {year: 695, precision: year}
    canonical_gregorian: {date: 1296-01-01, precision: year, method: tabular_conversion}
