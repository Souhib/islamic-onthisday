  - slug: death-of-ibn-jubayr
    category: scholar
    title_en: Death of Ibn Jubayr — Andalusian Traveler
    title_ar: وفاة ابن جبير — رحالة الأندلس
    title_fr: Mort d'Ibn Jubayr — voyageur andalou
    description_en: |
      Abu al-Husayn Muhammad ibn Aḥmad ibn Jubayr al-Kinani al-
      Andalusi — Maliki Andalusian scholar whose three Hajj
      journeys produced the foundational text of Arabic travel
      literature, *Riḥlat Ibn Jubayr* — died in Alexandria at age
      about 71. The first journey (578-581 AH / 1183-1185 CE)
      coincided with the Crusader-Ayyubid wars, and his
      eyewitness reports on Saladin's lands, Crusader-occupied
      Acre, the Sicilian court of William II, and the
      Mediterranean shipping routes are historiographically
      irreplaceable for the period. His descriptions of Mecca
      and Medina, of the rituals of the Hajj as observed in 579
      AH, and of the geography and madrasa system of Damascus
      and Baghdad set the genre conventions that Ibn Baṭṭuṭa
      would inherit and expand 150 years later. The Riḥla
      survived in a single Maghrebi manuscript and remains
      essential reading for the social-historical study of the
      twelfth-century Mediterranean.
    description_ar: |
      توفي الإمام أبو الحسين محمد بن أحمد ابن جبير الكناني الأندلسي
      — فقيه أندلسي على مذهب الإمام مالك، أنتجت رحلاته الثلاث إلى
      الحج النص الأصل في أدب الرحلة العربي «رحلة ابن جبير» — في
      الإسكندرية عن نحو إحدى وسبعين سنة. وكانت رحلته الأولى (٥٧٨-
      ٥٨١ هـ / ١١٨٣-١١٨٥ ميلادي) تواكب حروب الصليبيين والأيوبيين،
      وروايته من شاهد عيان لبلاد صلاح الدين، وعكا تحت الاحتلال
      الصليبي، وبلاط وليم الثاني في صقلية، وطرق الملاحة المتوسطية،
      لا غنى عنها تاريخياً للفترة. أما وصفه لمكة المكرمة والمدينة
      المنورة، ومناسك الحج كما شهدها سنة ٥٧٩ هـ، وجغرافية ومدارس
      دمشق وبغداد، فأرسى تقاليد الفن التي ورثها ابن بطوطة بعده
      بمئة وخمسين سنة. وحفظت «الرحلة» في مخطوط مغربي واحد، ولا
      تزال قراءة لازمة في الدراسة الاجتماعية-التاريخية لمتوسط
      القرن السادس الهجري.
    description_fr: |
      Abu al-Ḥusayn Muḥammad ibn Aḥmad ibn Jubayr al-Kinānī al-
      Andalusī — savant malikite andalou dont les trois voyages
      de Ḥajj produisirent le texte fondateur de la littérature
      de voyage arabe, *Riḥlat Ibn Jubayr* — mourut à Alexandrie
      à l'âge d'environ 71 ans. Le premier voyage (578-581 H /
      1183-1185 EC) coïncida avec les guerres croisé-ayyoubides,
      et ses rapports de témoin oculaire sur les terres de
      Saladin, Acre sous occupation croisée, la cour sicilienne
      de Guillaume II, et les routes de navigation méditerranéennes
      sont historiographiquement irremplaçables pour la période.
      Ses descriptions de La Mecque et de Médine, des rites du
      Ḥajj tels qu'observés en 579 H, et de la géographie et du
      système des madrasas de Damas et de Bagdad fixèrent les
      conventions du genre dont Ibn Baṭṭūṭa hériterait et
      développerait 150 ans plus tard. La *Riḥla* a survécu dans
      un unique manuscrit maghrébin et demeure une lecture
      essentielle pour l'étude sociale et historique de la
      Méditerranée du XIIe siècle.
    canonical_hijri: {year: 614, month: 11, precision: month}
    canonical_gregorian: {date: 1217-11-01, precision: month, method: tabular_conversion}
