        notes: "Sahih al-Bukhari 2942 (Kitab al-Jihad) — banner-of-Khaybar hadith."
        is_canonical: true
      - source_key: muslim_sahih
        notes: "Sahih Muslim 2406 — parallel narration."
      - source_key: ibn_hisham_sira
