  - slug: battle-of-hunayn
    category: battle
    title_en: Battle of Hunayn
    title_ar: غزوة حنين
    title_fr: Bataille de Ḥunayn
    description_en: |
      Two weeks after the conquest of Makkah, the Prophet ﷺ led twelve
      thousand Muslims — the largest force yet assembled — against the
      Hawazin and Thaqif tribes at the valley of Hunayn. The Muslim army was
      initially routed by a surprise ambush. The Prophet ﷺ stood firm with a
      small group of Ansar, called the Muslims back by calling out, "To me,
      O servants of Allah! I am the Messenger of Allah, I am Muhammad ibn
      Abdullah," and turned the battle into a decisive victory. Surah
      al-Tawba 9:25-26 describes this reversal.
    description_fr: |
      Deux semaines après la conquête de La Mecque, le Prophète ﷺ
      mena douze mille musulmans — la plus grande force jamais
      rassemblée — contre les tribus des Hawāzin et de Thaqīf dans
      la vallée de Ḥunayn. L'armée musulmane fut initialement
      déroutée par une embuscade surprise. Le Prophète ﷺ rallia ses
      troupes et la bataille bascula. La sourate al-Tawba 9:25-26 fait
      référence à l'événement, soulignant que la confiance en sa
      force seule mena à l'échec initial.
    description_ar: |
      بعد فتح مكَّة بأسبوعَين، خرج النبي ﷺ بنحو اثني عشرَ ألف مقاتلٍ —
      وهو أكبرُ جيشٍ مسلمٍ يومئذٍ — لِقِتال هَوازنَ وثقيفٍ بوادي
      حُنينٍ. فُوجئ الجيشُ بكمينٍ في أوَّل النهار فانهزم. فثبَّتَ
      النبي ﷺ من بقي معه، فدارت المعركةُ. وأشارت الآيتان من سورة
      التوبة (25-26) إلى الحادثة، مُبيِّنةً أنَّ التَّعويلَ على القوَّة
      وحدها كان سببَ الانكسار الأوَّل.
    canonical_hijri: {year: 8, month: 10, day: 10, precision: day}
    canonical_gregorian: {date: 630-01-31, precision: day, method: attested}
    claims:
      - source_key: bukhari_sahih
        notes: "Narrations on the initial retreat and the Prophet's ﷺ stand."
        is_canonical: true
      - source_key: ibn_hisham_sira
