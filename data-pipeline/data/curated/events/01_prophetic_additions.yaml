    verified: true

  - slug: expedition-of-tabuk
    category: prophetic_era
    title_en: Expedition of Tabuk
    title_ar: غزوة تبوك
    title_fr: Expédition de Tabūk
    description_en: |
      The last expedition led personally by the Prophet ﷺ. Responding to
      reports of Byzantine preparations for an attack on northern Arabia, he
      marched a Muslim army of thirty thousand across the desert in the
      extreme heat of summer to Tabuk. No battle took place — the Byzantine
      forces dispersed — but the Prophet ﷺ received the submission of several
      frontier towns and returned without loss. The story of the three
      Companions, including Ka'b ibn Malik, who failed to join the expedition
      and were boycotted until Allah accepted their repentance is recorded in
      Surah al-Tawba 9:118 and narrated at length by Ka'b himself in Sahih
      al-Bukhari.
    description_fr: |
      La dernière expédition menée personnellement par le Prophète ﷺ.
      En réaction à des rapports sur des préparatifs byzantins
      d'attaque contre l'Arabie septentrionale, il mena une armée
      musulmane de trente mille hommes à travers le désert dans la
      chaleur extrême de l'été jusqu'à Tabūk. Aucune bataille n'eut
      lieu — l'armée byzantine ne se présenta pas. La sourate
      al-Tawba traite extensivement de cette expédition, distinguant
      ceux qui partirent de ceux qui demeurèrent (les hypocrites de
      Médine).
    description_ar: |
      آخرُ غزوةٍ خرج فيها النبي ﷺ بنفسه. فتحرَّك إلى تبوكَ ردًّا على
      ما بَلَغه من تَجَهُّز البيزنطيِّين لمهاجمة شمال الجزيرة العربيَّة،
      بنحو ثلاثين ألف مقاتلٍ في حرٍّ شديدٍ في الصيف. ولم تَقَع
      معركةٌ — فلم يخرج البيزنطيُّون. وتحدَّثت سورة التوبة طويلًا عن
      هذه الغزوة، مُمَيِّزةً بين من خرج وبين من تخلَّف من المنافقين
      بالمدينة.
    canonical_hijri: {year: 9, month: 7, precision: month}
    canonical_gregorian: {date: 630-10-15, precision: month, method: attested}
    claims:
      - source_key: bukhari_sahih
        notes: "Kitab al-Maghazi — the hadith of Ka'b ibn Malik."
        is_canonical: true
      - source_key: ibn_hisham_sira
      - source_key: quran
        notes: "Surah al-Tawba 9:117-118."
    people: [[muhammad, leader]]
    tags: [prophetic-era, expedition, tabuk, rajab, quran-referenced]
