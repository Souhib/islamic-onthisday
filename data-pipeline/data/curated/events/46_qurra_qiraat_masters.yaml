  - slug: death-of-abu-jafar-al-madani
    category: scholar
    title_en: Death of Abū Jaʿfar al-Madanī — qari of Medina (eighth of the ten)
    title_ar: وفاة أبي جعفر المدني — قارئ المدينة (ثامن العشرة)
    title_fr: Mort d'Abū Jaʿfar al-Madanī — récitateur de Médine (huitième des dix)
    description_en: |
      Yazīd ibn al-Qaʿqāʿ al-Makhzūmī al-Madanī, known as Abū Jaʿfar
      — Tābiʿī, the senior qāriʾ of Medina before Nāfiʿ, and the
      eighth of the ten canonical reciters in Ibn al-Jazarī's
      enumeration (the additional three beyond Ibn Mujāhid's seven)
      — died in Medina at age past one hundred. He had recited the
      Qurʾān to Companions including Ibn ʿAbbās, Abū Hurayra, and
      Ibn ʿAyyāsh ra, and was the teacher of Nāfiʿ al-Madanī
      (d. 169 AH), who acknowledged him as his master. His
      recitation is preserved through Ibn Wardān (d. 160 AH) and
      Ibn Jammāz (d. 170 AH). Sources differ on his death-year
      between 130 and 132 AH; we follow the majority position of
      130 AH given by al-Dhahabī in *Siyar Aʿlām al-Nubalāʾ* and
      Ibn Khallikān, while noting that Ibn al-Jazarī's *Ghāyat
      al-Nihāya* records 132 AH from another tradition.
    description_ar: |
      توفي الإمام يزيد بن القعقاع المخزومي المدني، المعروف بأبي جعفر
      — تابعي، وكبير قراء المدينة قبل نافع، وثامن العشرة في ترتيب ابن
      الجزري للقراءات (الثلاثة الزائدة على سبعة ابن مجاهد) — بالمدينة
      المنورة عن أكثر من مئة سنة. وقد قرأ على جماعة من الصحابة منهم
      ابن عباس وأبو هريرة وابن عيّاش رضي الله عنهم، وكان شيخ نافع
      المدني (ت ١٦٩ هـ) الذي قرّ له بالشيخية. ورواية قراءته محفوظة
      عن ابن وردان (ت ١٦٠ هـ) وابن جمّاز (ت ١٧٠ هـ). واختلفت المصادر
      في سنة وفاته بين ١٣٠ و١٣٢ هـ؛ وقد رجّحنا قول الأكثرين بـ ١٣٠ هـ
      كما عند الذهبي في «سير أعلام النبلاء» وابن خلكان، مع الإشارة
      إلى أن ابن الجزري في «غاية النهاية» أورد رواية بـ ١٣٢ هـ.
    description_fr: |
      Yazīd ibn al-Qaʿqāʿ al-Makhzūmī al-Madanī, connu sous le nom
      d'Abū Jaʿfar — *tābiʿī*, principal *qāriʾ* de Médine avant
      Nāfiʿ, et huitième des dix récitateurs canoniques dans
      l'énumération d'Ibn al-Jazarī (les trois supplémentaires aux
      sept d'Ibn Mujāhid) — mourut à Médine à un âge dépassant les
      cent ans. Il avait récité le Coran à des Compagnons dont Ibn
      ʿAbbās, Abū Hurayra et Ibn ʿAyyāsh ra, et fut le maître de
      Nāfiʿ al-Madanī (m. 169 H), qui le reconnaissait pour tel.
      Sa récitation est préservée par Ibn Wardān (m. 160 H) et Ibn
      Jammāz (m. 170 H). Les sources divergent sur son année de
      décès entre 130 et 132 H; nous suivons la position majoritaire
      de 130 H donnée par al-Dhahabī dans *Siyar Aʿlām al-Nubalāʾ*
      et Ibn Khallikān, en notant qu'Ibn al-Jazarī dans *Ghāyat
      al-Nihāya* enregistre 132 H d'après une autre tradition.
    canonical_hijri: {year: 130, precision: year}
    canonical_gregorian: {date: 748-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Siyar Aʿlām al-Nubalāʾ — d. 130 AH (majority)"
      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt al-Aʿyān — confirms 130 AH"
      - source_key: ibn_kathir_bidaya
        notes: "al-Bidāya wa-l-Nihāya — 130 AH; alternative 132 AH noted"
    people: [[abu-jafar-al-madani, subject]]
    tags: [umayyad, qari, qiraat, medina, tabiun, ten-readers]
    importance: notable
    verification_status: cross_verified
    disputed: true
    dispute_about: date

  - slug: death-of-yaqub-al-hadrami
    category: scholar
    title_en: Death of Yaʿqūb al-Ḥaḍramī — qari of Basra (ninth of the ten)
    title_ar: وفاة يعقوب الحضرمي — قارئ البصرة (تاسع العشرة)
    title_fr: Mort de Yaʿqūb al-Ḥaḍramī — récitateur de Bassora (neuvième des dix)
    description_en: |
      Abū Muḥammad Yaʿqūb ibn Isḥāq al-Ḥaḍramī al-Baṣrī — qāriʾ of
      Basra after Abū ʿAmr ibn al-ʿAlāʾ, leading recitation-master
      of his generation, and the ninth of the ten canonical
      reciters in Ibn al-Jazarī's enumeration — died in Basra in
      205 AH at age about 88. His recitation is transmitted through
      Ruwaysh (Muḥammad ibn al-Mutawakkil, d. 238 AH) and Rawḥ ibn
      ʿAbd al-Muʾmin (d. 234 AH), the two canonical narrators of his
      reading. Abū Ḥātim al-Sijistānī said of him: "Yaʿqūb is the
      most knowledgeable person I have met in *qirāʾāt* and the
      Arabic language." His mosque on the bank of the Tigris in
      Basra was the centre of Qurʾanic study in the city for two
      generations after his death.
    description_ar: |
      توفي الإمام أبو محمد يعقوب بن إسحاق الحضرمي البصري — قارئ
      البصرة بعد أبي عمرو بن العلاء، وكبير المقرئين في عصره، وتاسع
      العشرة في ترتيب ابن الجزري للقراءات — بالبصرة سنة ٢٠٥ هـ عن
      نحو ثمانٍ وثمانين سنة. ووصلت قراءته إلينا برواية رويس (محمد بن
      المتوكل، ت ٢٣٨ هـ) وروح بن عبد المؤمن (ت ٢٣٤ هـ)، وهما الراويان
      المعتمدان عنه. وقال أبو حاتم السجستاني: «يعقوب أعلم من رأيت
      بالقراءات وبالعربية». وكان مسجده على شاطئ دجلة بالبصرة قبلةَ
      دراسة القرآن في المدينة جيلين بعده.
    description_fr: |
      Abū Muḥammad Yaʿqūb ibn Isḥāq al-Ḥaḍramī al-Baṣrī — *qāriʾ*
      de Bassora après Abū ʿAmr ibn al-ʿAlāʾ, principal maître de
      récitation de sa génération, et neuvième des dix récitateurs
      canoniques dans l'énumération d'Ibn al-Jazarī — mourut à
      Bassora en 205 H à l'âge d'environ 88 ans. Sa récitation est
      transmise par Ruways (Muḥammad ibn al-Mutawakkil, m. 238 H)
      et Rawḥ ibn ʿAbd al-Muʾmin (m. 234 H), les deux narrateurs
      canoniques de sa lecture. Abū Ḥātim al-Sijistānī dit de lui :
      « Yaʿqūb est l'homme le plus savant que j'aie rencontré en
      *qirāʾāt* et en langue arabe ». Sa mosquée sur la rive du
      Tigre à Bassora fut le centre de l'étude coranique dans la
      ville pendant deux générations après sa mort.
    canonical_hijri: {year: 205, precision: year}
    canonical_gregorian: {date: 820-01-01, precision: year, method: tabular_conversion}
