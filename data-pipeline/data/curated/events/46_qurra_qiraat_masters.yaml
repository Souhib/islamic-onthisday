  - slug: death-of-ibn-al-jazari
    category: scholar
    title_en: Death of Ibn al-Jazarī — author of al-Nashr fī al-Qirāʾāt al-ʿAshr
    title_ar: وفاة ابن الجزري — صاحب «النشر في القراءات العشر»
    title_fr: Mort d'Ibn al-Jazarī — auteur d'al-Nashr fī al-Qirāʾāt al-ʿAshr
    description_en: |
      Shams al-Dīn Abū al-Khayr Muḥammad ibn Muḥammad ibn ʿAlī ibn
      al-Jazarī — Damascene-Egyptian master of the *qirāʾāt*
      sciences, chief qāriʾ of his age, and author of *al-Nashr fī
      al-Qirāʾāt al-ʿAshr* (the comprehensive treatise on the ten
      canonical readings, expanding Ibn Mujāhid's seven by adding
      Abū Jaʿfar al-Madanī, Yaʿqūb al-Ḥaḍramī, and Khalaf al-ʿĀshir)
      and *al-Ṭayyiba*, its 1,015-verse rajaz versification — died
      in Shiraz in Rabīʿ al-Awwal 833 AH at age about 82. He was
      *qāḍī al-quḍāt* and *shaykh al-qurrāʾ* under multiple Mamluk
      and Timurid courts. His work fixed the canon of ten readings
      that has held since: every classical recital tradition since
      his day teaches from his framework. *Ghāyat al-Nihāya fī
      Ṭabaqāt al-Qurrāʾ*, his biographical dictionary of qurrāʾ,
      remains the indispensable reference for the history of the
      Qurʾan recital tradition. He also founded madrasas for
      qirāʾāt instruction in Damascus, Bursa, Shiraz, and elsewhere.
    description_ar: |
      توفي الإمام شمس الدين أبو الخير محمد بن محمد بن علي ابن الجزري
      — كبير علماء القراءات في عصره، شيخ القراء بالشام ومصر، ومصنف
      «النشر في القراءات العشر» (الكتاب الجامع في القراءات العشر، إذ
      أضاف على سبعة ابن مجاهد ثلاثاً: أبا جعفر المدني ويعقوب الحضرمي
      وخلف العاشر) و«الطيبة» منظومتها الرجزية البالغة ١٠١٥ بيتاً —
      بشيراز في ربيع الأول سنة ٨٣٣ هـ عن نحو اثنتين وثمانين سنة.
      وكان قاضي القضاة وشيخ القراء عند سلاطين المماليك وتيمور وأبنائه.
      وحرّر بـ«النشر» كنّ القراءات العشر الذي ظل المعتمد منذ عصره؛
      فكل المدارس الإقرائية الكلاسيكية بعده تعلّم على إطاره. وكتابه
      «غاية النهاية في طبقات القراء» معجم تراجم القراء، وهو المرجع
      الذي لا غنى عنه في تاريخ تراث القراءات. وأنشأ مدارس للإقراء
      بدمشق وبروسة وشيراز وغيرها.
    description_fr: |
      Shams al-Dīn Abū al-Khayr Muḥammad ibn Muḥammad ibn ʿAlī Ibn
      al-Jazarī — maître damascéno-égyptien des sciences des
      *qirāʾāt*, principal *qāriʾ* de son temps, et auteur d'*al-
      Nashr fī al-Qirāʾāt al-ʿAshr* (le traité exhaustif des dix
      lectures canoniques, étendant les sept d'Ibn Mujāhid par
      l'adjonction d'Abū Jaʿfar al-Madanī, Yaʿqūb al-Ḥaḍramī et
      Khalaf al-ʿĀshir) et d'*al-Ṭayyiba*, sa versification rajaz
      en 1 015 vers — mourut à Shiraz en Rabīʿ al-Awwal 833 H à
      l'âge d'environ 82 ans. Il fut *qāḍī al-quḍāt* et *shaykh
      al-qurrāʾ* sous plusieurs cours mameloukes et timourides. Son
      œuvre fixa le canon des dix lectures qui s'est maintenu
      depuis : chaque tradition de récitation classique depuis son
      époque enseigne à partir de son cadre. *Ghāyat al-Nihāya fī
      Ṭabaqāt al-Qurrāʾ*, son dictionnaire biographique des
      *qurrāʾ*, demeure la référence indispensable pour l'histoire
      de la tradition de récitation coranique. Il fonda aussi des
      madrasas d'enseignement des *qirāʾāt* à Damas, Bursa, Shiraz
      et ailleurs.
