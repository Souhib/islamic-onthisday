  # =========================================================================
  # THE CANONICAL NARRATORS (RUWĀT) — ḤAFṢ, SHUʿBA, WARSH, QĀLŪN
  # =========================================================================

  - slug: death-of-hafs-ibn-sulayman
    category: scholar
    title_en: Death of Ḥafṣ ibn Sulaymān — narrator of the dominant Qurʾān reading
    title_ar: وفاة حفص بن سليمان — راوي الرواية الكبرى
    title_fr: Mort de Ḥafṣ ibn Sulaymān — narrateur de la lecture dominante
    description_en: |
      Abū ʿUmar Ḥafṣ ibn Sulaymān al-Asadī al-Kūfī — the canonical
      narrator from ʿĀṣim al-Kūfī (d. 127 AH) whose transmission,
      *Ḥafṣ ʿan ʿĀṣim*, is today the standard Qurʾān reading across
      Egypt, the Levant, Iraq, Turkey, the Indian subcontinent,
      Southeast Asia, and East Africa, and the version printed in
      virtually every Muṣḥaf since the 1924 Egyptian standard
      edition — died in Kufa in 180 AH at age about 90. He was the
      stepson and closest student of ʿĀṣim, who entrusted him with
      the recitation he had received from Abū ʿAbd al-Raḥmān al-
      Sulamī. While Sunni hadith critics graded him weak in
      *isnād*-criticism, his transmission of qirāʾa is universally
      accepted by qirāʾa specialists — the two disciplines applying
      different standards. Sources differ slightly on his death-year
      between 180 and 190 AH; we follow the majority of 180 AH given
      by al-Dhahabī.
    description_ar: |
      توفي الإمام أبو عمر حفص بن سليمان الأسدي الكوفي — راوي رواية
      «حفص عن عاصم» التي هي اليوم النص الرسمي للقرآن في عامة المشرق
      الإسلامي: مصر والشام والعراق وتركيا وشبه القارة الهندية وجنوب
      شرق آسيا وأفريقيا الشرقية، وهي الرواية المعتمدة في كل المصاحف
      المطبوعة منذ المصحف الأميري المصري سنة ١٩٢٤ ميلادي — بالكوفة
      سنة ١٨٠ هـ عن نحو تسعين سنة. وكان ربيب عاصم وأخص تلامذته،
      وأودعه عاصم القراءة التي تلقاها عن أبي عبد الرحمن السلمي.
      ومع أن نقاد الحديث ضعّفوه في الرواية الإسنادية، فإن إقراءه
      للقرآن مقبول قبولاً تاماً عند علماء القراءات، إذ المعياران
      مختلفان. واختلفت المصادر في سنة وفاته بين ١٨٠ و١٩٠ هـ، وأخذنا
      بقول الأكثرين عند الذهبي ١٨٠ هـ.
    description_fr: |
      Abū ʿUmar Ḥafṣ ibn Sulaymān al-Asadī al-Kūfī — narrateur
      canonique d'après ʿĀṣim al-Kūfī (m. 127 H) dont la transmission,
      *Ḥafṣ ʿan ʿĀṣim*, est aujourd'hui la récitation coranique
      standard à travers l'Égypte, le Levant, l'Irak, la Turquie, le
      sous-continent indien, l'Asie du Sud-Est et l'Afrique de l'Est,
      et la version imprimée dans pratiquement chaque *Muṣḥaf* depuis
      l'édition égyptienne standard de 1924 — mourut à Koufa en 180 H
      à l'âge d'environ 90 ans. Il était le beau-fils et l'élève le
      plus proche de ʿĀṣim, qui lui confia la récitation qu'il avait
      reçue d'Abū ʿAbd al-Raḥmān al-Sulamī. Bien que les critiques
      de hadith sunnites l'aient jugé faible en critique d'*isnād*,
      sa transmission de la *qirāʾa* est universellement acceptée par
      les spécialistes du domaine — les deux disciplines appliquant
      des standards différents. Les sources divergent légèrement sur
      son année de décès entre 180 et 190 H; nous suivons la majorité
      de 180 H donnée par al-Dhahabī.
