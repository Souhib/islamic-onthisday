  - slug: death-of-khalaf-al-ashir
    category: scholar
    title_en: Death of Khalaf al-ʿĀshir — qari of Baghdad (tenth of the ten)
    title_ar: وفاة خلف العاشر — قارئ بغداد (عاشر القراء)
    title_fr: Mort de Khalaf al-ʿĀshir — récitateur de Bagdad (dixième lecteur)
    description_en: |
      Abū Muḥammad Khalaf ibn Hishām al-Bazzār al-Baghdādī, called
      *al-ʿĀshir* ("the Tenth") because of his place as the tenth
      and last of the canonical reciters in Ibn al-Jazarī's *Kitāb
      al-Nashr fī al-Qirāʾāt al-ʿAshr* — died in Baghdad in 229 AH
      at age about 80. He had recited under Sulaym (the chief
      transmitter of Ḥamza al-Zayyāt) and adopted from Ḥamza's
      reading what he judged most defensible while differing from
      him in about 120 places, producing his own complete and
      independent canonical reading. His transmitters are Isḥāq
      al-Warrāq (d. 286 AH) and Idrīs ibn ʿAbd al-Karīm al-Ḥaddād
      (d. 292 AH). He was also a noted *muḥaddith* and an associate
      of Aḥmad ibn Ḥanbal.
    description_ar: |
      توفي الإمام أبو محمد خلف بن هشام البزار البغدادي، الملقب بـ«العاشر»
      لكونه عاشر القراء وآخرهم في ترتيب ابن الجزري في «كتاب النشر في
      القراءات العشر» — ببغداد سنة ٢٢٩ هـ عن نحو ثمانين سنة. وكان قد
      قرأ على سُليم (شيخ رواية حمزة الزيات الكبرى) فاختار من قراءة
      حمزة ما رآه أبيَن، وانفرد عنه في نحو مئة وعشرين موضعاً، فأخرج
      من ذلك قراءة مستقلة كاملة معتمدة. ورواه إسحاق الوراق (ت ٢٨٦ هـ)
      وإدريس بن عبد الكريم الحداد (ت ٢٩٢ هـ). وكان أيضاً محدثاً
      معروفاً ومن أصحاب الإمام أحمد بن حنبل.
    description_fr: |
      Abū Muḥammad Khalaf ibn Hishām al-Bazzār al-Baghdādī, surnommé
      *al-ʿĀshir* (« le Dixième ») en raison de sa place de dixième
      et dernier des récitateurs canoniques dans le *Kitāb al-Nashr
      fī al-Qirāʾāt al-ʿAshr* d'Ibn al-Jazarī — mourut à Bagdad en
      229 H à l'âge d'environ 80 ans. Il avait récité auprès de
      Sulaym (le principal transmetteur de Ḥamza al-Zayyāt) et
      retint de la lecture de Ḥamza ce qu'il jugea le plus
      défendable tout en s'en écartant en environ 120 endroits,
      produisant ainsi sa propre lecture canonique complète et
      indépendante. Ses transmetteurs sont Isḥāq al-Warrāq (m. 286 H)
      et Idrīs ibn ʿAbd al-Karīm al-Ḥaddād (m. 292 H). Il fut aussi
      un *muḥaddith* renommé et un compagnon d'Aḥmad ibn Ḥanbal.
    canonical_hijri: {year: 229, precision: year}
    canonical_gregorian: {date: 844-01-01, precision: year, method: tabular_conversion}
