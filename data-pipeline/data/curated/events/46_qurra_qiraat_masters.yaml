  - slug: death-of-ibn-mujahid
    category: scholar
    title_en: Death of Ibn Mujāhid — codifier of the Seven Readings
    title_ar: وفاة ابن مجاهد — مقنّن القراءات السبع
    title_fr: Mort d'Ibn Mujāhid — codificateur des Sept Lectures
    description_en: |
      Abū Bakr Aḥmad ibn Mūsā ibn al-ʿAbbās ibn Mujāhid al-Tamīmī
      al-Baghdādī — leading qāriʾ of Baghdad in his generation and
      the scholar whose *Kitāb al-Sabʿa fī al-Qirāʾāt* fixed the
      seven canonical readings (those of Nāfiʿ al-Madanī, Ibn
      Kathīr al-Makkī, Abū ʿAmr al-Baṣrī, Ibn ʿĀmir al-Shāmī, ʿĀṣim
      al-Kūfī, Ḥamza al-Zayyāt, and al-Kisāʾī) as the universally
      accepted *al-qirāʾāt al-sabʿ* — died in Baghdad in 324 AH at
      age about 79. Before his work, dozens of regional readings
      circulated; *al-Sabʿa* was the consolidating editorial act
      that produced the canon, and every later qirāʾāt manual
      builds on it directly. His selection of one master per major
      Muslim metropolis (Medina, Mecca, Basra, Damascus, Kufa) plus
      two further Kufans (Ḥamza and al-Kisāʾī) established the
      enduring framework. Ibn al-Jazarī's later expansion to ten
      preserves Ibn Mujāhid's seven untouched and adds three further
      readers as a completion rather than a revision.
    description_ar: |
      توفي الإمام أبو بكر أحمد بن موسى بن العباس بن مجاهد التميمي
      البغدادي — كبير قراء بغداد في زمانه، والإمام الذي أحكم في
      «كتاب السبعة في القراءات» القراءات السبع المعتمدة (وهي قراءات
      نافع المدني وابن كثير المكي وأبي عمرو البصري وابن عامر الشامي
      وعاصم الكوفي وحمزة الزيات والكسائي) فصارت هي المعتمدة عند
      الكافة — ببغداد سنة ٣٢٤ هـ عن نحو تسع وسبعين سنة. وقبل عمله
      كانت تشيع عشرات من القراءات الإقليمية؛ فكان «كتاب السبعة»
      الفاصلَ التحريريَ الذي أخرج الكنّ، وعلى أساسه يبني كل من ألف
      في القراءات بعده. واختياره عن كل مصر مصراً واحداً (المدينة
      ومكة والبصرة والشام والكوفة) ثم اثنين آخرين من الكوفة (حمزة
      والكسائي) هو الإطار الراسخ. وتوسع ابن الجزري بعده إلى العشرة
      أبقى السبعة كما هي وضمّ إليها ثلاثةً إكمالاً لا مراجعةً.
    description_fr: |
      Abū Bakr Aḥmad ibn Mūsā ibn al-ʿAbbās ibn Mujāhid al-Tamīmī
      al-Baghdādī — principal *qāriʾ* de Bagdad de sa génération et
      le savant dont le *Kitāb al-Sabʿa fī al-Qirāʾāt* fixa les sept
      lectures canoniques (celles de Nāfiʿ al-Madanī, Ibn Kathīr
      al-Makkī, Abū ʿAmr al-Baṣrī, Ibn ʿĀmir al-Shāmī, ʿĀṣim al-Kūfī,
      Ḥamza al-Zayyāt et al-Kisāʾī) comme les *al-qirāʾāt al-sabʿ*
      universellement acceptées — mourut à Bagdad en 324 H à l'âge
      d'environ 79 ans. Avant son œuvre, des dizaines de lectures
      régionales circulaient; *al-Sabʿa* fut l'acte éditorial
      consolidateur qui produisit le canon, et chaque manuel
      ultérieur de *qirāʾāt* le prolonge directement. Sa sélection
      d'un maître par grande métropole musulmane (Médine, La Mecque,
      Bassora, Damas, Koufa) plus deux autres Koufiens (Ḥamza et
      al-Kisāʾī) établit le cadre durable. L'extension ultérieure
      d'Ibn al-Jazarī à dix préserve les sept d'Ibn Mujāhid
      intactes et leur ajoute trois autres lecteurs comme
      complément plutôt que comme révision.
