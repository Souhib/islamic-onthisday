  - slug: death-of-al-shatibi-qari
    category: scholar
    title_en: Death of al-Shāṭibī al-Qāriʾ — author of al-Shāṭibiyya
    title_ar: وفاة الشاطبي القارئ — صاحب «الشاطبية»
    title_fr: Mort d'al-Shāṭibī al-Qāriʾ — auteur d'al-Shāṭibiyya
    description_en: |
      Abū al-Qāsim al-Qāsim ibn Fīrruh ibn Khalaf al-Ruʿaynī
      al-Shāṭibī al-Andalusī — Andalusi master of the *qirāʾāt*
      sciences, qāriʾ of Cairo in the Ayyubid era, and author of
      *Ḥirz al-Amānī wa-Wajh al-Tahānī* (universally known as
      *al-Shāṭibiyya*), the 1,173-verse rajaz versification of al-
      Dānī's *al-Taysīr* that has been the standard pedagogical
      text of the seven readings everywhere in the Sunni world from
      his day to the present — died in Cairo at age about 52. He
      was a disciple of the Andalusi qāriʾ Abū al-Ḥasan ibn Hudhayl
      and migrated east in middle age, settling in Cairo where he
      taught at al-Madrasa al-Fāḍiliyya (Saladin's vizier al-Qāḍī
      al-Fāḍil's foundation). Every subsequent qāriʾ in the Sunni
      tradition has memorised the *Shāṭibiyya*; commentaries on it
      number in the dozens, including those of Abū Shāma al-
      Maqdisī and al-Sakhāwī. He had been blind from birth.
    description_ar: |
      توفي الإمام أبو القاسم القاسم بن فيرّه بن خلف الرعيني الشاطبي
      الأندلسي — كبير علماء القراءات بالأندلس، قارئ القاهرة في عصر
      الأيوبيين، ومصنف «حرز الأماني ووجه التهاني» (المعروفة بـ«الشاطبية»)،
      المنظومة الرجزية البالغة ١١٧٣ بيتاً، نظمَ بها «التيسير» للداني
      فصارت المتن الدراسي المعتمد للقراءات السبع في كل بلاد أهل السنة
      من عصره إلى اليوم — بالقاهرة عن نحو اثنتين وخمسين سنة. وكان قد
      أخذ القراءة بالأندلس عن أبي الحسن بن هذيل، ثم رحل إلى المشرق
      في كهولته فاستقر بالقاهرة فدرّس بالمدرسة الفاضلية (التي وقفها
      وزير صلاح الدين القاضي الفاضل). ويحفظ «الشاطبية» كل قارئ بعده
      من أهل السنة، وشروحها بالعشرات، منها شروح أبي شامة المقدسي
      والسخاوي. وكان رحمه الله ضريراً منذ ولادته.
    description_fr: |
      Abū al-Qāsim al-Qāsim ibn Fīrruh ibn Khalaf al-Ruʿaynī
      al-Shāṭibī al-Andalusī — maître andalou des sciences des
      *qirāʾāt*, *qāriʾ* du Caire à l'époque ayyoubide, et auteur
      d'*Ḥirz al-Amānī wa-Wajh al-Tahānī* (universellement connu sous
      le nom d'*al-Shāṭibiyya*), la versification rajaz de 1 173
      vers d'*al-Taysīr* d'al-Dānī qui a été le texte pédagogique
      standard des sept lectures dans tout le monde sunnite depuis
      son époque jusqu'à nos jours — mourut au Caire à l'âge
      d'environ 52 ans. Il fut disciple du *qāriʾ* andalou Abū
      al-Ḥasan ibn Hudhayl et émigra vers l'orient à l'âge mûr,
      s'installant au Caire où il enseigna à al-Madrasa al-Fāḍiliyya
      (la fondation du vizir de Saladin, al-Qāḍī al-Fāḍil). Chaque
      *qāriʾ* sunnite ultérieur a mémorisé la *Shāṭibiyya*; ses
      commentaires se comptent par dizaines, dont ceux d'Abū Shāma
      al-Maqdisī et d'al-Sakhāwī. Il était aveugle de naissance.
