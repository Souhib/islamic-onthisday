# Wave 46 of curated event additions (2026-04-27).
# 13 dated events covering the remaining seven and ten qurra' masters,
# their canonical narrators (Ḥafṣ, Shuʿba, Warsh, Qālūn, etc.), and the
# codifiers of the Qira'at canon — Ibn Mujāhid (the seven), al-Dānī
# (Taysīr), al-Shāṭibī (Shāṭibiyya), and Ibn al-Jazarī (Nashr / the ten).
# Each event attested in classical Sunni sources. Trilingual (en/ar/fr).
# Death-year disputes preserved per the Date Uncertainty Protocol.

events:
  # =========================================================================
  # COMPLETING THE SEVEN: IBN ʿĀMIR + ḤAMZA
  # =========================================================================

  - slug: death-of-ibn-amir-al-shami
    category: scholar
    title_en: Death of Ibn ʿĀmir al-Shāmī — qari of Damascus
    title_ar: وفاة ابن عامر الشامي — قارئ دمشق
    title_fr: Mort d'Ibn ʿĀmir al-Shāmī — récitateur de Damas
    description_en: |
      ʿAbdallāh ibn ʿĀmir al-Yaḥṣubī al-Dimashqī — Tābiʿī, qāḍī of
      Damascus under the Umayyad caliph al-Walīd ibn ʿAbd al-Malik,
      and the only one of the seven canonical reciters from the
      Levant — died in Damascus on ʿĀshūrāʾ (10 Muḥarram) 118 AH at
      age about 87. His recitation, transmitted to us through Hishām
      ibn ʿAmmār (d. 245 AH) and Ibn Dhakwān (d. 242 AH), preserves
      the Quranic reading-tradition of Damascus going back through
      Abū al-Dardāʾ and ʿUthmān ibn ʿAffān ra. He was reckoned the
      most authoritative qāriʾ in Greater Syria of his generation
      and led the prayer in the Umayyad Mosque after the death of
      Abū al-Dardāʾ. Ibn Mujāhid (d. 324 AH) included him among the
      seven canonical readers in his foundational *Kitāb al-Sabʿa*.
    description_ar: |
      توفي الإمام عبد الله بن عامر اليحصبي الدمشقي — تابعي وقاضي
      دمشق في عهد الخليفة الأموي الوليد بن عبد الملك، وهو الوحيد من
      القراء السبعة الذي كان من أهل الشام — بدمشق يوم عاشوراء (العاشر
      من المحرم) سنة ١١٨ هـ عن نحو سبع وثمانين سنة. ورواية قراءته
      وصلت إلينا برواية هشام بن عمار (ت ٢٤٥ هـ) وابن ذكوان (ت ٢٤٢ هـ)،
      وهي تحفظ تراث قراءة أهل الشام راجعةً إلى أبي الدرداء وعثمان بن
      عفان رضي الله عنهما. وعدّوه إمام القراءة في الشام في زمانه،
      وأمَّ الناس في الجامع الأموي بعد أبي الدرداء. وأدرجه ابن مجاهد
      (ت ٣٢٤ هـ) ضمن القراء السبعة في «كتاب السبعة» الذي قنّن قراءاتهم.
    description_fr: |
      ʿAbdallāh ibn ʿĀmir al-Yaḥṣubī al-Dimashqī — *tābiʿī*, *qāḍī*
      de Damas sous le calife omeyyade al-Walīd ibn ʿAbd al-Malik, et
      le seul des sept récitateurs canoniques originaire du Levant —
      mourut à Damas le jour de ʿĀshūrāʾ (10 Muḥarram) 118 H à l'âge
      d'environ 87 ans. Sa récitation, transmise jusqu'à nous par
      Hishām ibn ʿAmmār (m. 245 H) et Ibn Dhakwān (m. 242 H),
      conserve la tradition coranique de Damas remontant à Abū
      al-Dardāʾ et ʿUthmān ibn ʿAffān ra. Il fut considéré comme le
      *qāriʾ* le plus autoritaire de la Grande Syrie de sa génération
      et dirigea la prière à la Grande Mosquée des Omeyyades après
      la mort d'Abū al-Dardāʾ. Ibn Mujāhid (m. 324 H) l'inclut parmi
      les sept lecteurs canoniques dans son *Kitāb al-Sabʿa* fondateur.
    canonical_hijri: {year: 118, month: 1, day: 10, precision: day}
    canonical_gregorian: {date: 736-01-30, precision: day, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Siyar Aʿlām al-Nubalāʾ entry — ʿĀshūrāʾ 118 AH"
      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt al-Aʿyān entry"
      - source_key: ibn_kathir_bidaya
        notes: "al-Bidāya wa-l-Nihāya year 118"
    people: [[ibn-amir-al-shami, subject]]
    tags: [umayyad, qari, qiraat, damascus, sham, tabiun]
    importance: notable
    verification_status: cross_verified

  - slug: death-of-hamza-al-zayyat
    category: scholar
    title_en: Death of Ḥamza al-Zayyāt — qari of Kufa
    title_ar: وفاة حمزة الزيات — قارئ الكوفة
    title_fr: Mort de Ḥamza al-Zayyāt — récitateur de Koufa
    description_en: |
      Abū ʿImāra Ḥamza ibn Ḥabīb al-Zayyāt al-Taymī al-Kūfī — one of
      the seven canonical reciters and the great Kufan qāriʾ of his
      generation — died at Ḥulwān in the year 156 AH at age about 76.
      He was called *al-Zayyāt* ("the oil-merchant") because he
      ferried oil between Kufa and Ḥulwān to support his family. His
      recitation is distinguished by its extensive use of *madd*
      (prolongation), *imāla* (vowel-fronting), and *idghām*
      (assimilation), and was transmitted to us principally through
      Khalaf al-Bazzār (d. 229 AH, also the tenth canonical reciter
      in his own right) and Khallād ibn Khālid (d. 220 AH). Imam
      al-Shāfiʿī (d. 204 AH) and Sufyān al-Thawrī (d. 161 AH)
      praised his reading; al-Thawrī said: "Ḥamza al-Zayyāt is the
      most knowledgeable of people in the Book of Allah and its laws
      of inheritance." Sources agree on the year of his death.
    description_ar: |
      توفي الإمام أبو عمارة حمزة بن حبيب الزيات التيمي الكوفي — أحد
      القراء السبعة، وكبير قراء الكوفة في عصره — بحلوان سنة ١٥٦ هـ
      عن نحو ست وسبعين سنة. ولُقِّب بـ«الزيات» لأنه كان يحمل الزيت من
      الكوفة إلى حلوان لإنفاقه على عياله. وتمتاز قراءته بإطالة المد
      والإمالة والإدغام، ووصلت إلينا أساساً برواية خلف بن هشام البزار
      (ت ٢٢٩ هـ، وهو القارئ العاشر بنفسه) وخلاد بن خالد (ت ٢٢٠ هـ).
      وأثنى عليه الإمامان الشافعي (ت ٢٠٤ هـ) وسفيان الثوري (ت ١٦١ هـ)،
      وقال الثوري: «حمزة الزيات أعلم الناس بكتاب الله وفرائضه». وقد
      اتفقت المصادر على سنة وفاته.
    description_fr: |
      Abū ʿImāra Ḥamza ibn Ḥabīb al-Zayyāt al-Taymī al-Kūfī — l'un
      des sept récitateurs canoniques et le grand *qāriʾ* koufien
      de sa génération — mourut à Ḥulwān en l'an 156 H à l'âge
      d'environ 76 ans. Il fut surnommé *al-Zayyāt* (« le marchand
      d'huile ») parce qu'il transportait de l'huile entre Koufa et
      Ḥulwān pour subvenir aux besoins de sa famille. Sa récitation
      se distingue par son usage étendu du *madd* (prolongation), de
      l'*imāla* (antériorisation des voyelles) et de l'*idghām*
      (assimilation), et fut transmise jusqu'à nous principalement
      par Khalaf al-Bazzār (m. 229 H, lui-même dixième récitateur
      canonique) et Khallād ibn Khālid (m. 220 H). L'imam al-Shāfiʿī
      (m. 204 H) et Sufyān al-Thawrī (m. 161 H) louèrent sa lecture;
      al-Thawrī dit : « Ḥamza al-Zayyāt est le plus savant des gens
      dans le Livre d'Allah et ses lois successorales ». Les sources
      s'accordent sur l'année de sa mort.
    canonical_hijri: {year: 156, precision: year}
    canonical_gregorian: {date: 773-01-01, precision: year, method: tabular_conversion}
