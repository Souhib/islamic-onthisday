  - slug: death-of-al-dani-qari
    category: scholar
    title_en: Death of al-Dānī — author of al-Taysīr fī al-Qirāʾāt al-Sabʿ
    title_ar: وفاة الداني — صاحب «التيسير في القراءات السبع»
    title_fr: Mort d'al-Dānī — auteur d'al-Taysīr fī al-Qirāʾāt al-Sabʿ
    description_en: |
      Abū ʿAmr ʿUthmān ibn Saʿīd al-Dānī al-Andalusī — Andalusi
      master of the *qirāʾāt* sciences, qāriʾ of Denia (Daniya) on
      the Levantine coast of al-Andalus, and author of *al-Taysīr
      fī al-Qirāʾāt al-Sabʿ*, the systematic late-classical manual
      of the seven readings that became the basis of all subsequent
      western teaching of qirāʾāt — died in Denia in Shawwāl 444 AH
      at age about 73. *al-Taysīr* re-presented Ibn Mujāhid's seven
      readings with a precision and systematic transmission-tracking
      that allowed students to learn each reading independently with
      its narrators. Two generations later al-Shāṭibī would versify
      *al-Taysīr* as *Ḥirz al-Amānī*, fixing the Dānī tradition into
      memorable verse for every reciter. He also wrote *al-Muqniʿ
      fī Rasm Maṣāḥif al-Amṣār*, the foundational work on Qurʾanic
      orthography.
    description_ar: |
      توفي الإمام أبو عمرو عثمان بن سعيد الداني الأندلسي — كبير علماء
      القراءات بالأندلس، وقارئ دانية في ساحل المشرق الأندلسي، ومصنف
      «التيسير في القراءات السبع»، المتن المنظم في القراءات المعتمد
      في عصره الذي قام عليه التدريس الغربي للقراءات بعده — بدانية
      في شوال سنة ٤٤٤ هـ عن نحو ثلاث وسبعين سنة. وفي «التيسير» قدّم
      الداني قراءات ابن مجاهد السبع تقديماً منهجياً دقيقاً يحفظ
      أسانيدها، فيستطيع الطالب أن يحصّل كل قراءة برواتها مستقلة.
      وبعد جيلين نظمه الشاطبي في «حرز الأماني» فصار التيسير محفوظاً
      بنظمه عند كل القراء. وله أيضاً «المقنع في رسم مصاحف الأمصار»،
      الكتاب الأم في علم الرسم العثماني.
    description_fr: |
      Abū ʿAmr ʿUthmān ibn Saʿīd al-Dānī al-Andalusī — maître
      andalou des sciences des *qirāʾāt*, *qāriʾ* de Denia (*Dāniya*)
      sur la côte levantine d'al-Andalus, et auteur d'*al-Taysīr fī
      al-Qirāʾāt al-Sabʿ*, le manuel systématique de la fin de la
      période classique consacré aux sept lectures qui devint le
      fondement de tout enseignement occidental ultérieur des
      *qirāʾāt* — mourut à Denia en Shawwāl 444 H à l'âge d'environ
      73 ans. *al-Taysīr* présenta de nouveau les sept lectures
      d'Ibn Mujāhid avec une précision et un suivi systématique des
      transmissions qui permettaient aux étudiants d'apprendre
      chaque lecture indépendamment avec ses narrateurs. Deux
      générations plus tard, al-Shāṭibī versifia *al-Taysīr* en
      *Ḥirz al-Amānī*, fixant la tradition dānienne en vers
      mémorables pour tout récitateur. Il composa aussi *al-Muqniʿ
      fī Rasm Maṣāḥif al-Amṣār*, l'ouvrage fondateur sur
      l'orthographe coranique.
