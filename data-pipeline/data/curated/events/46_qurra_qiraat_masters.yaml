  - slug: death-of-shuba-ibn-ayyash
    category: scholar
    title_en: Death of Shuʿba ibn ʿAyyāsh — second narrator of ʿĀṣim's reading
    title_ar: وفاة شعبة بن عياش — الراوي الثاني عن عاصم
    title_fr: Mort de Shuʿba ibn ʿAyyāsh — second narrateur de la lecture de ʿĀṣim
    description_en: |
      Abū Bakr Shuʿba ibn ʿAyyāsh al-Asadī al-Kūfī — the second
      canonical narrator from ʿĀṣim al-Kūfī alongside Ḥafṣ, and one
      of the senior fuqahāʾ and muḥaddiths of Kufa — died in Kufa
      in Jumādā al-Ūlā 193 AH at age about 96. Unlike Ḥafṣ, he was
      classed thoroughly reliable by the *jarḥ wa-taʿdīl* tradition
      and his hadith narrations are in al-Bukhārī, Muslim, and the
      Sunan collections. He was a close student of al-Aʿmash, ʿĀṣim,
      Abū Isḥāq al-Sabīʿī, and other Kufan masters. His transmission
      of ʿĀṣim's reading is preserved in scholarly study today
      though Ḥafṣ's parallel transmission carries the modern liturgy.
      Late in life he stopped issuing fatwas, saying: "I have not
      met a man more cautious in fatwa than I was." Sufyān al-Thawrī
      called him "the most God-fearing of the men of Kufa."
    description_ar: |
      توفي الإمام أبو بكر شعبة بن عياش الأسدي الكوفي — الراوي الثاني
      عن عاصم الكوفي بجانب حفص، ومن كبار فقهاء الكوفة ومحدثيها — في
      الكوفة في جمادى الأولى سنة ١٩٣ هـ عن نحو ست وتسعين سنة. وعلى
      خلاف حفص فقد وثقه أئمة الجرح والتعديل، وروى عنه البخاري ومسلم
      وأصحاب السنن. وكان من خواص الأعمش وعاصم وأبي إسحاق السبيعي
      وغيرهم من شيوخ الكوفة. ورواية شعبة عن عاصم محفوظة في الأسانيد
      المعتمدة وإن كانت رواية حفص عن عاصم هي السائدة في القراءة
      اليوم. وامتنع شعبة في أواخر عمره عن الفتيا قائلاً: «ما رأيت
      أحداً أتحفّظ مني». وقال عنه سفيان الثوري: «هو أتقى الكوفيين».
    description_fr: |
      Abū Bakr Shuʿba ibn ʿAyyāsh al-Asadī al-Kūfī — le second
      narrateur canonique d'après ʿĀṣim al-Kūfī aux côtés de Ḥafṣ,
      et l'un des grands *fuqahāʾ* et *muḥaddiths* de Koufa — mourut
      à Koufa en Jumādā al-Ūlā 193 H à l'âge d'environ 96 ans.
      Contrairement à Ḥafṣ, il fut jugé pleinement fiable par la
      tradition du *jarḥ wa-taʿdīl* et ses transmissions de hadith
      figurent chez al-Bukhārī, Muslim et les *Sunan*. Il fut un
      élève proche d'al-Aʿmash, de ʿĀṣim, d'Abū Isḥāq al-Sabīʿī et
      d'autres maîtres koufiens. Sa transmission de la lecture de
      ʿĀṣim est préservée dans l'étude savante aujourd'hui bien que
      la transmission parallèle de Ḥafṣ porte la liturgie moderne.
      Vers la fin de sa vie, il cessa d'émettre des fatwas en disant :
      « je n'ai pas rencontré un homme plus circonspect que moi en
      *fatwa* ». Sufyān al-Thawrī l'appelait « le plus pieux des
      gens de Koufa ».
