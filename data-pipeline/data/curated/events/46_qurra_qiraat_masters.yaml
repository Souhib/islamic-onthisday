  - slug: death-of-warsh
    category: scholar
    title_en: Death of Warsh — narrator of the dominant Maghrebi reading
    title_ar: وفاة ورش — راوي قراءة المغرب
    title_fr: Mort de Warsh — narrateur de la lecture maghrébine dominante
    description_en: |
      Abū Saʿīd ʿUthmān ibn Saʿīd al-Miṣrī al-Qibṭī, called *Warsh*
      ("Warsh" was a nickname his master Nāfiʿ gave him because of
      a kind of food he ate) — the canonical narrator from Nāfiʿ
      al-Madanī (d. 169 AH) whose transmission, *Warsh ʿan Nāfiʿ*,
      is today the standard Qurʾān reading across the entire Maghreb
      (Morocco, Algeria, Tunisia, Mauritania) and West Africa from
      Senegal to Niger — died in Egypt in Shawwāl 197 AH at age
      about 87. He travelled to Medina to study with Nāfiʿ and
      remained there several years until Nāfiʿ certified him as the
      authoritative transmitter of his reading. He returned to Egypt
      and became the leading qāriʾ of Fusṭāṭ; his transmission was
      carried west with the Berber-Arab armies into Ifrīqiya and the
      Maghreb, where it took permanent root. Warsh's reading is
      distinguished in particular by its consistent *tafkhīm* of the
      *rāʾ* and its full vocalisation of the *hamza*.
    description_ar: |
      توفي الإمام أبو سعيد عثمان بن سعيد المصري القبطي، الملقب بـ«ورش»
      (لقبٌ ألقاه عليه شيخه نافع لطعام كان يأكله) — راوي قراءة
      «ورش عن نافع» التي هي اليوم النص الرسمي للقرآن في عامة المغرب
      الإسلامي: المغرب والجزائر وتونس وموريتانيا، وفي غرب أفريقيا
      من السنغال إلى النيجر — في مصر في شوال سنة ١٩٧ هـ عن نحو سبع
      وثمانين سنة. وكان قد رحل إلى المدينة فأخذ القراءة عن نافع وأقام
      عنده سنين حتى أذن له نافع بالإقراء عنه. ثم رجع إلى مصر فصار
      كبير قراء الفسطاط، وانتقلت روايته غرباً مع جيوش العرب والبربر
      إلى إفريقية والمغرب فاستقرت بهما. وتمتاز قراءة ورش بتفخيم
      الراءات وتحقيق الهمز.
    description_fr: |
      Abū Saʿīd ʿUthmān ibn Saʿīd al-Miṣrī al-Qibṭī, surnommé *Warsh*
      (« Warsh » fut un sobriquet que son maître Nāfiʿ lui donna en
      référence à un mets qu'il consommait) — narrateur canonique
      d'après Nāfiʿ al-Madanī (m. 169 H) dont la transmission, *Warsh
      ʿan Nāfiʿ*, est aujourd'hui la récitation coranique standard
      dans tout le Maghreb (Maroc, Algérie, Tunisie, Mauritanie) et
      l'Afrique de l'Ouest du Sénégal au Niger — mourut en Égypte
      en Shawwāl 197 H à l'âge d'environ 87 ans. Il s'était rendu
      à Médine pour étudier auprès de Nāfiʿ et y demeura plusieurs
      années jusqu'à ce que Nāfiʿ le certifie comme transmetteur
      autorisé de sa lecture. De retour en Égypte, il devint le
      principal *qāriʾ* de Fusṭāṭ; sa transmission fut portée vers
      l'ouest avec les armées arabo-berbères en Ifrīqiya et au
      Maghreb, où elle s'enracina définitivement. La lecture de
      Warsh se distingue notamment par son *tafkhīm* constant du
      *rāʾ* et sa pleine vocalisation du *hamza*.
