  - slug: death-of-qalun
    category: scholar
    title_en: Death of Qālūn — second narrator of Nāfiʿ's reading
    title_ar: وفاة قالون — الراوي الثاني عن نافع
    title_fr: Mort de Qālūn — second narrateur de la lecture de Nāfiʿ
    description_en: |
      Abū Mūsā ʿĪsā ibn Mīnāʾ al-Madanī, called *Qālūn* (a
      nickname his master Nāfiʿ gave him meaning "good" in Greek,
      praising his recitation) — the second canonical narrator
      from Nāfiʿ al-Madanī alongside Warsh, and the qāriʾ of Medina
      after his master — died in Medina in 220 AH at age about 100.
      Nāfiʿ's stepson by marriage, he kept the recitation in
      Medinan circulation while Warsh's parallel transmission
      travelled west to dominate the Maghreb. The *Qālūn ʿan Nāfiʿ*
      reading remains the standard Qurʾān recitation in Libya today
      and is preserved across the qirāʾāt curriculum of every
      classical Sunni institution. He was reportedly hard of hearing
      yet the most exacting reciter of his generation; students
      complained, and he answered: "I have not heard a wrong
      reading from any of you in fifty years."
    description_ar: |
      توفي الإمام أبو موسى عيسى بن مينا المدني، الملقب بـ«قالون»
      (لقبٌ ألقاه عليه شيخه نافع، ومعناه باليونانية الجيد، ثناءً
      على قراءته) — الراوي الثاني عن نافع بجانب ورش، وقارئ المدينة
      بعد شيخه — بالمدينة المنورة سنة ٢٢٠ هـ عن نحو مئة سنة. كان
      ربيبَ نافع، فأبقى القراءة دائرة في المدينة بينما رحلت رواية
      ورش غرباً فسادت بها المغاربة. ولا تزال رواية «قالون عن نافع»
      هي النص المعتمد للقرآن في ليبيا، وهي محفوظة في مناهج علم
      القراءات في كل المعاهد السنية الكلاسيكية. وكان قالون قد ضعف
      سمعه، ومع ذلك كان أدقّ القراء في عصره؛ إذ يشكو إليه طلابه،
      فيقول: «ما سمعت لحناً منكم في خمسين سنة».
    description_fr: |
      Abū Mūsā ʿĪsā ibn Mīnāʾ al-Madanī, surnommé *Qālūn* (un
      sobriquet que son maître Nāfiʿ lui donna, signifiant « bon »
      en grec, en éloge de sa récitation) — second narrateur
      canonique d'après Nāfiʿ al-Madanī aux côtés de Warsh, et
      *qāriʾ* de Médine après son maître — mourut à Médine en 220 H
      à l'âge d'environ 100 ans. Beau-fils de Nāfiʿ par alliance, il
      maintint la récitation en circulation médinoise tandis que la
      transmission parallèle de Warsh voyageait vers l'ouest pour
      dominer le Maghreb. La lecture *Qālūn ʿan Nāfiʿ* demeure
      aujourd'hui la récitation coranique standard en Libye et est
      préservée à travers le cursus des *qirāʾāt* dans toute
      institution sunnite classique. Il était dit-on dur d'oreille,
      pourtant le plus exigeant récitateur de sa génération; les
      étudiants s'en plaignaient, il répondait : « je n'ai pas
      entendu une mauvaise lecture de l'un d'entre vous en cinquante
      ans ».
