  - slug: death-of-humayun
    category: ruler
    title_en: Death of Emperor Humayun
    title_ar: وفاة الإمبراطور همايون
    title_fr: Mort de l'empereur Humāyūn
    description_en: |
      Naṣir al-Din Muhammad Humayun, second Mughal emperor, died
      at Delhi after falling from the steps of his library at the
      Purana Qila when the muezzin's call to prayer caught him
      mid-step and he stooped to honour it. He was 47. His reign
      had been famously interrupted: forced into exile by Sher
      Shah Sūri in 947 AH (1540 CE), he spent fifteen years in
      Persia and Afghanistan before returning to reclaim Delhi
      in 962 AH (1555 CE) — only to die six months later from
      the library accident. His son Akbar, who succeeded him at
      age 13, would consolidate the Mughal restoration into the
      empire that ruled the Indian subcontinent for two and a
      half centuries. Humayun's tomb in Delhi (commissioned by
      his Persian widow Ḥamida Banu Begum) was the architectural
      precursor of the Taj Mahal a century later.
    description_ar: |
      توفي الإمبراطور ناصر الدين محمد همايون — ثاني أباطرة الدولة
      المغولية الإسلامية في الهند — بدلهي بعد سقوطه من سلم مكتبته
      في «بورانا قلعة» إذ ناداه المؤذن للصلاة فاحترم الأذان فانكب
      ساقطاً. وقد ناهز السابعة والأربعين. كان عهده انقطع شهرة:
      أكرهه شير شاه السوري على الفرار إلى المنفى سنة ٩٤٧ هـ (١٥٤٠
      ميلادي)، فأقام خمس عشرة سنة بين بلاد فارس وأفغانستان قبل أن
      يعود لاسترداد دلهي سنة ٩٦٢ هـ (١٥٥٥ ميلادي) — ثم توفي بعد
      ستة أشهر بحادثة المكتبة. وخلفه ابنه أكبر وعمره ثلاث عشرة
      سنة، فثبت استعادة الدولة المغولية إمبراطورية حكمت شبه القارة
      الهندية قرنين ونصف قرن. ومقبرة همايون بدلهي (التي كلفت ببنائها
      أرملته الفارسية حميدة بانو بيغوم) هي السلف المعماري لتاج
      محل بعدها بقرن.
    description_fr: |
      Naṣir al-Dīn Muḥammad Humāyūn, deuxième empereur moghol,
      mourut à Delhi après être tombé des marches de sa bibliothèque
      au Purana Qila lorsque l'appel du muezzin à la prière le
      saisit au milieu d'un pas et qu'il se courba pour l'honorer.
      Il avait 47 ans. Son règne avait été célèbrement interrompu :
      forcé à l'exil par Sher Shah Sūri en 947 H (1540 EC), il
      passa quinze ans en Perse et en Afghanistan avant de revenir
      reconquérir Delhi en 962 H (1555 EC) — pour mourir six
      mois plus tard de l'accident de la bibliothèque. Son fils
      Akbar, qui lui succéda à l'âge de 13 ans, consoliderait la
      restauration moghole dans l'empire qui gouverna le sous-
      continent indien pendant deux siècles et demi. Le tombeau
      de Humāyūn à Delhi (commandé par sa veuve persane Ḥamīda
      Bānū Begum) fut le précurseur architectural du Taj Mahal
      un siècle plus tard.
    canonical_hijri: {year: 963, month: 2, day: 13, precision: day}
    canonical_gregorian: {date: 1556-01-27, precision: day, method: tabular_conversion}
