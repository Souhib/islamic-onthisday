  - slug: death-of-sulayman-ibn-yasar
    category: scholar
    title_en: Death of Sulayman ibn Yasar
    title_ar: وفاة سليمان بن يسار
    title_fr: Mort de Sulaymān ibn Yasār
    description_en: |
      Abu Ayyub Sulayman ibn Yasar al-Hilali — Persian-origin
      mawla of Maymuna bint al-Ḥarith ra (the Mother of the
      Believers), one of the seven jurists of Medina, and brother
      of ʿAṭaʾ ibn Yasar — died in Medina at age about 73. al-
      Zuhri said of him: "He was one of the scholars of this
      community"; Imam Malik called him "one of the foremost
      scholars after Saʿid ibn al-Musayyib." His rulings on
      transactions and family law preserved in al-Muwaṭṭaʾ trace
      the early Madinan ijmaʿ on those questions. He was famed
      for an incident of withholding from sin: a beautiful woman
      offered herself to him while he was a young man on a hajj
      caravan and he wept all night until she fled in shame —
      a story al-Dhahabi cites as illustrating the deepest
      Madinan ascetic standard.
    description_ar: |
      توفي الإمام أبو أيوب سليمان بن يسار الهلالي — مولى ميمونة
      بنت الحارث رضي الله عنها أم المؤمنين، وأحد فقهاء المدينة
      السبعة، وأخو عطاء بن يسار. كان من أصول فارسية. توفي رحمه
      الله بالمدينة عن نحو ثلاث وسبعين سنة. قال عنه الزهري: «كان
      أحد علماء هذه الأمة»، وقال الإمام مالك: «كان أحد العلماء
      في الناس بعد سعيد بن المسيب». وأقواله في المعاملات والأحكام
      والأسرة المحفوظة في «الموطأ» أصل من إجماع المدينة الأول في
      تلك المسائل. واشتهر بحادثة عفته: فقد عرضت عليه نفسها امرأة
      جميلة وهو شاب في قافلة الحج، فبكى ليلته حتى فرت منه خجلاً —
      وهي قصة يوردها الذهبي شاهداً على أدق نموذج للزهد المدني
      الباكر.
    description_fr: |
      Abu Ayyūb Sulaymān ibn Yasār al-Hilālī — *mawlā* d'origine
      persane de Maymūna bint al-Ḥārith ra (la Mère des Croyants),
      l'un des sept jurisconsultes de Médine, et frère d'ʿAṭāʾ
      ibn Yasār — mourut à Médine à l'âge d'environ 73 ans.
      al-Zuhrī dit de lui : « il fut l'un des savants de cette
      communauté »; l'imam Mālik l'appela « l'un des savants les
      plus éminents après Saʿīd ibn al-Musayyib ». Ses décisions
      sur les transactions et le droit familial préservées dans
      al-Muwaṭṭaʾ tracent l'*ijmāʿ* médinois ancien sur ces
      questions. Il était célèbre pour un incident d'abstention
      du péché : une belle femme s'offrit à lui alors qu'il était
      jeune homme dans une caravane de Ḥajj et il pleura toute la
      nuit jusqu'à ce qu'elle s'enfuie de honte — une histoire
      qu'al-Dhahabī cite comme illustrant la norme ascétique
      médinoise la plus profonde.
    canonical_hijri: {year: 107, precision: year}
    canonical_gregorian: {date: 725-01-01, precision: year, method: attested}
