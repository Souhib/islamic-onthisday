# Wave 9 of curated event additions (2026-04-26).
# 4 remaining Madinan fuqaha al-sab'a (completing the seven jurists)
# + 2 mughal emperors + 2 andalusi-maghrebi late scholars
# + 2 senior sahaba + 2 modern revivers + 1 astronomer
# + 2 Umayyad civil-war battles. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # SEVEN JURISTS OF MEDINA — REMAINING FOUR
  # =========================================================================

  - slug: death-of-salim-ibn-abdullah-ibn-umar
    category: scholar
    title_en: Death of Salim ibn ʿAbdullah ibn ʿUmar
    title_ar: وفاة سالم بن عبد الله بن عمر
    title_fr: Mort de Sālim ibn ʿAbdullāh ibn ʿUmar
    description_en: |
      Abu ʿUmar Salim ibn ʿAbdullah ibn ʿUmar ibn al-Khaṭṭab —
      grandson of the Caliph ʿUmar ra through his father ʿAbdullah,
      one of the seven jurists of Medina (*al-fuqahaʾ al-sabʿa*),
      and the foremost Hanbali-line preserver of the Madinan
      hadith tradition through his transmission of his father's
      hadiths from his grandfather — died in Medina at age about
      80. Imam Malik narrated extensively from him; his hadith
      *Salim ʿan abi-hi ʿan jaddi-hi* (Salim from his father from
      his grandfather) is one of the *aṣaḥḥ al-asanid* (most
      reliable chains) in classical hadith methodology, classified
      by al-Bukhari as the strongest single chain reaching ʿUmar
      ibn al-Khaṭṭab ra. Hisham ibn ʿAbd al-Malik consulted him on
      every major matter when in Medina.
    description_ar: |
      توفي الإمام أبو عمر سالم بن عبد الله بن عمر بن الخطاب — حفيد
      أمير المؤمنين عمر بن الخطاب رضي الله عنه من ابنه عبد الله،
      وأحد فقهاء المدينة السبعة، وكبير أهل السنة في حفظ تراث حديث
      المدينة عبر روايته أحاديث أبيه عن جده — بالمدينة المنورة عن
      نحو ثمانين سنة. روى عنه الإمام مالك كثيراً، وحديثه «سالم عن
      أبيه عن جده» من أصح الأسانيد عند المحدثين، وعدّه الإمام
      البخاري أوثق الأسانيد إلى عمر رضي الله عنه. وكان الخليفة
      هشام بن عبد الملك يستشيره في كل أمر مهم إذا قدم المدينة.
    description_fr: |
      Abu ʿUmar Sālim ibn ʿAbdullāh ibn ʿUmar ibn al-Khaṭṭāb —
      petit-fils du calife ʿUmar ra par son père ʿAbdullāh, l'un
      des sept jurisconsultes de Médine (*al-fuqahāʾ al-sabʿa*),
      et le principal préservateur dans la lignée hanbalite de la
      tradition médinoise du hadith par sa transmission des
      hadiths de son père de la part de son grand-père — mourut à
      Médine à l'âge d'environ 80 ans. L'imam Mālik rapporta
      abondamment de lui; son hadith *Sālim ʿan abī-hi ʿan
      jaddi-hi* (Sālim de son père de son grand-père) est l'un
      des *aṣaḥḥ al-asānīd* (chaînes les plus fiables) dans la
      méthodologie classique du hadith, classifié par al-Bukhārī
      comme la chaîne la plus solide remontant à ʿUmar ibn
      al-Khaṭṭāb ra. Hishām ibn ʿAbd al-Malik le consultait sur
      chaque affaire majeure quand il était à Médine.
    canonical_hijri: {year: 106, precision: year}
    canonical_gregorian: {date: 725-01-01, precision: year, method: attested}
