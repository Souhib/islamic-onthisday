  - slug: battle-of-dayr-al-jamajim
    category: battle
    title_en: Battle of Dayr al-Jamajim — Suppression of Ibn al-Ashʿath's Revolt
    title_ar: معركة دير الجماجم — قمع ثورة ابن الأشعث
    title_fr: Bataille de Dayr al-Jamājim — répression de la révolte d'Ibn al-Ashʿath
    description_en: |
      The army of al-Hajjaj ibn Yusuf, governor of the eastern
      provinces under Caliph ʿAbd al-Malik ibn Marwan, defeated
      the rebel forces of ʿAbd al-Rahman ibn al-Ashʿath — at the
      head of a coalition of Iraqi qurraʾ, fuqaha, and disgruntled
      soldiers from the Kufan and Basran armies who had risen
      against al-Hajjaj's harsh rule — at Dayr al-Jamajim near
      Kufa. The battle decided the fate of the *fitnat al-qurraʾ*,
      a revolt that had threatened Umayyad sovereignty over
      Iraq, the Iranian plateau, and Khurasan for two years and
      had drawn senior tabiʿi fuqaha into open opposition
      including ʿAmir al-Shaʿbi and Saʿid ibn Jubayr. After the
      defeat, al-Hajjaj exacted a fearsome reprisal; Saʿid ibn
      Jubayr was eventually captured and executed by al-Hajjaj
      himself. The revolt's suppression cemented al-Hajjaj's
      grip on the East but also deepened the chasm between the
      Umayyad state and the Iraqi religious scholar class.
    description_ar: |
      هزم جيش الحجاج بن يوسف الثقفي والي المشرق للخليفة عبد الملك
      بن مروان جيش ثوار عبد الرحمن بن الأشعث — على رأس تحالف من
      قراء العراق وفقهاء أهلها وجنود من جند الكوفة والبصرة الساخطين
      على حكم الحجاج الجائر — في «دير الجماجم» قرب الكوفة. وحسمت
      المعركة مصير «فتنة القراء»، تلك الثورة التي هددت سلطان
      بني أمية على العراق والإيران الإسلامية وخراسان سنتين، وضمت
      كباراً من فقهاء التابعين منهم عامر الشعبي وسعيد بن جبير.
      وبعد الهزيمة بطش الحجاج ببقية الثوار، وأسر سعيد بن جبير في
      الأخير وقتله الحجاج بنفسه. ورسخ قمع الثورة قبضة الحجاج على
      المشرق وعمّق في الوقت نفسه الفجوة بين دولة بني أمية وطبقة
      العلماء العراقيين.
    description_fr: |
      L'armée d'al-Ḥajjāj ibn Yūsuf, gouverneur des provinces
      orientales sous le calife ʿAbd al-Malik ibn Marwān, défit
      les forces rebelles d'ʿAbd al-Raḥmān ibn al-Ashʿath — à
      la tête d'une coalition de *qurrāʾ* irakiens, de *fuqahāʾ*
      et de soldats mécontents des armées koufiennes et baṣriennes
      qui s'étaient soulevés contre la domination dure d'al-
      Ḥajjāj — à Dayr al-Jamājim près de Koufa. La bataille
      scella le sort de la *fitnat al-qurrāʾ*, une révolte qui
      avait menacé la souveraineté omeyyade sur l'Irak, le
      plateau iranien et le Khurasan pendant deux ans et avait
      attiré dans l'opposition ouverte de hauts *fuqahāʾ tābiʿīn*
      dont ʿĀmir al-Shaʿbī et Saʿīd ibn Jubayr. Après la défaite,
      al-Ḥajjāj exigea de terribles représailles; Saʿīd ibn
      Jubayr fut finalement capturé et exécuté par al-Ḥajjāj
      lui-même. La répression de la révolte cimenta l'emprise
      d'al-Ḥajjāj sur l'Orient mais creusa également le gouffre
      entre l'État omeyyade et la classe des savants religieux
      irakiens.
