  - slug: death-of-kharija-ibn-zayd
    category: scholar
    title_en: Death of Kharija ibn Zayd ibn Thabit
    title_ar: وفاة خارجة بن زيد بن ثابت
    title_fr: Mort de Khārija ibn Zayd ibn Thābit
    description_en: |
      Abu Zayd Kharija ibn Zayd ibn Thabit al-Anṣari — son of the
      Companion Zayd ibn Thabit ra (the Prophet's ﷺ scribe of
      revelation and compiler of the Muṣḥaf), and one of the
      seven jurists of Medina — died in Medina at age about 70.
      He inherited his father's expertise in inheritance law
      (*faraʾiḍ*) and was the senior Madinan authority on the
      subject for thirty years. The fatwas of Medina passed
      through him and his contemporaries among the seven jurists
      to the next generation, where they crystallised under Imam
      Malik into the corpus of *Muwaṭṭaʾ*. His brother Sulayman
      was also a respected jurist of Medina but not of the seven.
    description_ar: |
      توفي الإمام أبو زيد خارجة بن زيد بن ثابت الأنصاري — ابن
      الصحابي زيد بن ثابت رضي الله عنه (كاتب وحي رسول الله ﷺ
      وجامع المصحف الشريف)، وأحد فقهاء المدينة السبعة — بالمدينة
      المنورة عن نحو سبعين سنة. ورث عن أبيه علم الفرائض، فكان
      كبير المدنيين فيه ثلاثين سنة. ومرت فتاوى المدينة عبره وعبر
      قرنائه من فقهاء السبعة إلى الجيل التالي، حيث تبلورت في عصر
      الإمام مالك في كتاب «الموطأ». وكان أخوه سليمان فقيهاً
      مدنياً معتبراً وإن لم يكن من السبعة.
    description_fr: |
      Abu Zayd Khārija ibn Zayd ibn Thābit al-Anṣārī — fils du
      Compagnon Zayd ibn Thābit ra (le scribe de la révélation
      du Prophète ﷺ et compilateur du Muṣḥaf), et l'un des sept
      jurisconsultes de Médine — mourut à Médine à l'âge d'environ
      70 ans. Il hérita de l'expertise de son père dans le droit
      successoral (*farāʾiḍ*) et fut l'autorité médinoise de
      référence sur le sujet pendant trente ans. Les fatwas de
      Médine passèrent à travers lui et ses contemporains parmi
      les sept jurisconsultes à la génération suivante, où elles
      cristallisèrent sous l'imam Mālik dans le corpus du
      *Muwaṭṭaʾ*. Son frère Sulaymān fut aussi un juriste
      médinois respecté mais pas des sept.
    canonical_hijri: {year: 100, precision: year}
    canonical_gregorian: {date: 718-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_sad_tabaqat
      - source_key: ibn_khallikan_wafayat
    people: [[kharija-ibn-zayd, subject], [zayd-ibn-thabit, subject]]
