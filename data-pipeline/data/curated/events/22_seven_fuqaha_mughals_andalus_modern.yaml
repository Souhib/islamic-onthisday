  - slug: battle-of-marj-rahit
    category: battle
    title_en: Battle of Marj Rahit — Marwanid Restoration
    title_ar: معركة مرج راهط — قيام الدولة المروانية
    title_fr: Bataille de Marj Rāhiṭ — restauration marwanide
    description_en: |
      On the plain of Marj Rahit east of Damascus, the Umayyad
      forces under the elderly Marwan ibn al-Ḥakam — pretender
      to the caliphate after the deaths of Yazid I and his son
      Muʿawiya II — defeated the Qaysite tribal coalition under
      al-Ḍaḥḥak ibn Qays al-Fihri (who had supported ʿAbdullah
      ibn al-Zubayr from Damascus). The battle marked the end of
      the Sufyanid Umayyad line and the beginning of the
      Marwanid line that would rule Damascus until the Abbasid
      revolution in 132 AH. It also crystallised the Qays-Yaman
      tribal split that would shape every subsequent Umayyad
      conflict and ultimately contribute to the dynasty's
      collapse. ʿAbd al-Malik ibn Marwan, the future caliph,
      consolidated his father's victory and would reunify the
      caliphate with the death of ʿAbdullah ibn al-Zubayr nine
      years later.
    description_ar: |
      في سهل مرج راهط شرق دمشق هزم الجيش الأموي بقيادة الشيخ
      مروان بن الحكم — المطالب بالخلافة بعد وفاتي يزيد الأول وابنه
      معاوية الثاني — تحالف القبائل القيسية بقيادة الضحاك بن قيس
      الفهري (وقد كان موالياً لعبد الله بن الزبير من دمشق). أطلقت
      المعركة نهاية الفرع السفياني الأموي وبداية الفرع المرواني
      الذي حكم دمشق حتى الثورة العباسية سنة ١٣٢ هـ. كما رسخت
      الانقسام القبلي بين القيسية واليمنية الذي صاغ كل صراعات
      بني أمية اللاحقة وأسهم في نهاية المطاف في انهيار الدولة. وقد
      رسخ عبد الملك بن مروان — الخليفة المقبل — انتصار أبيه ثم
      أعاد توحيد الخلافة بمقتل عبد الله بن الزبير بعد ذلك بتسع
      سنين.
    description_fr: |
      Sur la plaine de Marj Rāhiṭ à l'est de Damas, les forces
      omeyyades sous le vieillard Marwān ibn al-Ḥakam —
      prétendant au califat après les morts de Yazīd Ier et de
      son fils Muʿāwiya II — défirent la coalition tribale
      qaysite sous al-Ḍaḥḥāk ibn Qays al-Fihrī (qui avait
      soutenu ʿAbdallāh ibn al-Zubayr depuis Damas). La bataille
      marqua la fin de la lignée omeyyade sufyanide et le début
      de la lignée marwanide qui gouvernerait Damas jusqu'à la
      révolution abbasside en 132 H. Elle cristallisa également
      la division tribale Qays-Yaman qui façonnerait tous les
      conflits omeyyades ultérieurs et contribuerait finalement
      à l'effondrement de la dynastie. ʿAbd al-Malik ibn Marwān,
      le futur calife, consolida la victoire de son père et
      réunifierait le califat avec la mort d'ʿAbdullāh ibn
      al-Zubayr neuf ans plus tard.
    canonical_hijri: {year: 64, month: 11, day: 18, precision: day}
