  - slug: death-of-al-birjandi
    category: scientist
    title_en: Death of al-Birjandi — Persian astronomer-mathematician
    title_ar: وفاة البرجندي — فلكي ورياضي فارسي
    title_fr: Mort d'al-Birjandī — astronome-mathématicien persan
    description_en: |
      ʿAbd al-ʿAli ibn Muhammad ibn Husayn al-Birjandi — Persian
      Sunni astronomer and mathematician of Khurasan, last great
      heir of the Maragha-Samarqand observational tradition that
      stretched back through Ulugh Beg and al-Tusi — died at
      Mashhad. His commentaries on al-Tusi's *Tadhkira* and on
      al-Kashi's planetary models pushed the *hayʾa* (planetary
      theory) tradition to its furthest mathematical refinement
      before the Ptolemaic framework would be displaced entirely
      in Europe by Copernicus and Kepler. His arguments against
      the rotation of the Earth — defending a stationary-Earth
      cosmology with sophisticated geometric reasoning — were
      taken up by Tycho Brahe in correspondence; al-Birjandi's
      objections to terrestrial motion are the most rigorous
      pre-Copernican Islamic engagement with the question.
    description_ar: |
      توفي الإمام عبد العلي بن محمد بن حسين البرجندي — فلكي ورياضي
      سني فارسي من خراسان، آخر ورثة المدرسة الرصدية المراغية-
      السمرقندية الكبيرة الممتدة عبر أُلُغ بِك ونصير الدين الطوسي —
      بمشهد. وشروحه على «التذكرة» للطوسي وعلى نماذج الكاشي
      الكوكبية دفعت تراث «الهيئة» إلى أقصى مدى من التنقيح الرياضي
      قبل أن يُزاح الإطار البطلمي كلياً في أوروبا على يد كوبرنيكوس
      وكبلر. وحججه ضد دوران الأرض — مدافعاً عن كون الأرض ساكنة
      بحجج هندسية معقدة — تلقفها تيخو براهي في مراسلاته؛ واعتراضات
      البرجندي على حركة الأرض من أدق ما خاضه الإسلاميون قبل
      كوبرنيكوس في هذه المسألة.
    description_fr: |
      ʿAbd al-ʿAlī ibn Muḥammad ibn Ḥusayn al-Birjandī — astronome
      et mathématicien sunnite persan du Khurasan, dernier grand
      héritier de la tradition observationnelle Marāgha-Samarcande
      qui remontait à travers Ulugh Beg et al-Ṭūsī — mourut à
      Mashhad. Ses commentaires sur la *Tadhkira* d'al-Ṭūsī et
      sur les modèles planétaires d'al-Kāshī poussèrent la
      tradition *hayʾa* (théorie planétaire) à son raffinement
      mathématique le plus poussé avant que le cadre ptoléméen
      ne soit entièrement déplacé en Europe par Copernic et
      Kepler. Ses arguments contre la rotation de la Terre —
      défendant une cosmologie de la Terre stationnaire par un
      raisonnement géométrique sophistiqué — furent repris par
      Tycho Brahe en correspondance; les objections d'al-Birjandī
      au mouvement terrestre sont l'engagement islamique pré-
      copernicien le plus rigoureux avec la question.
    canonical_hijri: {year: 934, precision: year}
