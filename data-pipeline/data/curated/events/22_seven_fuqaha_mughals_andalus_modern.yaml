  - slug: death-of-shah-jahan
    category: ruler
    title_en: Death of Emperor Shah Jahan
    title_ar: وفاة الإمبراطور شاه جهان
    title_fr: Mort de l'empereur Shāh Jahān
    description_en: |
      Shihab al-Din Muhammad Shah Jahan, fifth Mughal emperor and
      the patron of the most extensive architectural programme in
      the Islamic world — the Taj Mahal at Agra (for his wife
      Mumtaz Mahal), the Red Fort at Delhi (Lal Qilʿa), the
      Jamiʿ Masjid of Delhi, and the new capital of Shahjahanabad
      — died at the age of 74 in confinement at Agra Fort, where
      his son Aurangzeb had imprisoned him eight years earlier
      after deposing him. He was buried beside Mumtaz Mahal in
      the Taj Mahal. His thirty-year reign (1037-1068 AH /
      1628-1658 CE) is regarded as the cultural apogee of the
      Mughal empire: court Persian poetry, manuscript painting,
      monumental architecture, and the consolidation of Mughal
      sovereignty across the entire Indian subcontinent. His
      removal by Aurangzeb in 1658 CE marked the start of the
      religious-political reorientation toward Sharia-orthodox
      governance under the next reign.
    description_ar: |
      توفي الإمبراطور شهاب الدين محمد شاه جهان — خامس أباطرة
      الدولة المغولية الإسلامية وراعي أوسع برنامج معماري في تاريخ
      العالم الإسلامي: تاج محل بأكره (لزوجه ممتاز محل)، والقلعة
      الحمراء بدلهي، والجامع الكبير بدلهي، والعاصمة الجديدة
      «شاه جهان آباد» — في سجنه بقلعة أكره عن أربع وسبعين سنة،
      حيث كان قد سجنه ابنه أورنجزيب قبل ثماني سنين بعد إقصائه عن
      الحكم. ودفن إلى جوار ممتاز محل في تاج محل. وكان عهده الذي
      امتد ثلاثين سنة (١٠٣٧-١٠٦٨ هـ / ١٦٢٨-١٦٥٨ ميلادي) ذروة
      الحضارة المغولية: شعر البلاط الفارسي، ورسم المخطوطات،
      والعمارة الضخمة، واستقرار السلطة المغولية على عامة شبه
      القارة الهندية. وإقصاؤه على يد أورنجزيب سنة ١٦٥٨ ميلادي
      أعلن بدء التحول الديني-السياسي نحو الحكم على وفق الشريعة
      السنية في العهد التالي.
    description_fr: |
      Shihāb al-Dīn Muḥammad Shāh Jahān, cinquième empereur moghol
      et mécène du plus vaste programme architectural du monde
      islamique — le Taj Mahal à Agra (pour son épouse Mumtaz
      Mahal), le Fort Rouge à Delhi (Lal Qilʿa), la Jāmiʿ Masjid
      de Delhi, et la nouvelle capitale de Shahjahanabad — mourut
      à 74 ans en captivité au Fort d'Agra, où son fils Aurangzeb
      l'avait emprisonné huit ans plus tôt après l'avoir déposé.
      Il fut enterré aux côtés de Mumtaz Mahal dans le Taj Mahal.
      Son règne de trente ans (1037-1068 H / 1628-1658 EC) est
      considéré comme l'apogée culturelle de l'empire moghol :
      poésie persane de cour, peinture de manuscrits, architecture
      monumentale, et consolidation de la souveraineté moghole
      sur l'ensemble du sous-continent indien. Sa déposition par
      Aurangzeb en 1658 EC marqua le début de la réorientation
      religio-politique vers une gouvernance orthodoxe-sharʿique
      sous le règne suivant.
    canonical_hijri: {year: 1076, month: 2, precision: month}
    canonical_gregorian: {date: 1666-01-01, precision: month, method: tabular_conversion}
