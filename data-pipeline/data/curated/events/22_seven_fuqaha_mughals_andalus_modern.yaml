  - slug: death-of-muhammad-ibn-ibrahim-al-al-shaykh
    category: scholar
    title_en: Death of Shaykh Muḥammad ibn Ibrahim Al al-Shaykh
    title_ar: وفاة الشيخ محمد بن إبراهيم آل الشيخ
    title_fr: Mort de Cheikh Muḥammad ibn Ibrāhīm Āl al-Shaykh
    description_en: |
      Muhammad ibn Ibrahim Al al-Shaykh — direct descendant of
      Muhammad ibn ʿAbd al-Wahhab, first Grand Mufti of the
      modern Saudi state (1373-1389 AH / 1953-1969 CE), and
      shaykh of nearly every prominent Saudi scholar of the
      twentieth century including ʿAbd al-ʿAziz ibn Baz, Ibn
      ʿUthaymin, Ibn Jibrin, and ʿAbd al-Razzaq ʿAfifi — died
      in Riyadh at age about 76. As Grand Mufti he established
      the institutional framework of contemporary Saudi religious
      jurisprudence: the Council of Senior Scholars, the
      directorate of religious endowments, the system of state
      mufti offices, and the formal curriculum of the religious
      schools that became the Imam Muhammad ibn Saʿud Islamic
      University. His thirteen-volume *Fatawa wa-Rasaʾil* remains
      the standard reference for modern Saudi Hanbali fiqh.
    description_ar: |
      توفي الشيخ محمد بن إبراهيم آل الشيخ — من ذرية الشيخ محمد بن
      عبد الوهاب رحمه الله، وأول مفتٍ عام للدولة السعودية الحديثة
      (١٣٧٣-١٣٨٩ هـ / ١٩٥٣-١٩٦٩ ميلادي)، وشيخ عامة كبار العلماء
      السعوديين في القرن العشرين منهم عبد العزيز بن باز وابن
      عثيمين وابن جبرين وعبد الرزاق عفيفي — بالرياض عن نحو ست
      وسبعين سنة. وأرسى بصفته مفتياً عاماً البنية المؤسسية للفقه
      الديني السعودي المعاصر: هيئة كبار العلماء، ووزارة الأوقاف،
      ونظام مكاتب المفتي للدولة، والمنهج الرسمي للمعاهد العلمية
      التي صارت جامعة الإمام محمد بن سعود الإسلامية. وما زالت
      «الفتاوى والرسائل» في ثلاثة عشر مجلداً المرجع المعتمد في
      الفقه الحنبلي السعودي الحديث.
    description_fr: |
      Muḥammad ibn Ibrāhīm Āl al-Shaykh — descendant direct de
      Muḥammad ibn ʿAbd al-Wahhāb, premier Grand Mufti de l'État
      saoudien moderne (1373-1389 H / 1953-1969 EC), et maître
      de presque tous les éminents savants saoudiens du XXe
      siècle dont ʿAbd al-ʿAzīz ibn Bāz, Ibn ʿUthaymīn, Ibn
      Jibrīn, et ʿAbd al-Razzāq ʿAfīfī — mourut à Riyad à l'âge
      d'environ 76 ans. En tant que Grand Mufti, il établit le
      cadre institutionnel de la jurisprudence religieuse
      saoudienne contemporaine : le Conseil des Grands Savants,
      la direction des fondations religieuses, le système des
      bureaux des muftis d'État, et le cursus formel des écoles
      religieuses qui devint l'Université islamique Imam
      Muḥammad ibn Saʿūd. Ses *Fatāwā wa-Rasāʾil* en treize
      volumes demeurent la référence standard du fiqh hanbalite
      saoudien moderne.
    canonical_hijri: {year: 1389, month: 12, day: 24, precision: day}
    canonical_gregorian: {date: 1969-12-23, precision: day, method: attested}
