  - slug: death-of-ibn-al-haj-al-abdari
    category: scholar
    title_en: Death of Ibn al-Hajj al-ʿAbdari — author of al-Madkhal
    title_ar: وفاة ابن الحاج العبدري — صاحب «المدخل»
    title_fr: Mort d'Ibn al-Ḥājj al-ʿAbdarī — auteur d'al-Madkhal
    description_en: |
      Abu ʿAbdullah Muhammad ibn Muhammad al-ʿAbdari al-Fāsi al-
      Maliki, known as Ibn al-Ḥajj — Maliki jurist of Fes who
      taught at Cairo, and author of *al-Madkhal* (the
      Introduction), the most extensive Maliki manual on the
      ethics of daily life and the suppression of innovated
      practices (*bidaʿ*) in popular Sunni religiosity — died
      in Cairo at age about 81. *al-Madkhal* in five volumes
      catalogues the local Sunni practices of his Maghrebi-
      Egyptian milieu, distinguishing those rooted in the Sunna
      from those introduced by custom or by foreign syncretism;
      it became the canonical reference for Sunni reformist
      critique of popular religious practice across the Maliki
      world. The work's framework was inherited by later
      Maghrebi reformers from al-Wansharisi to the Salafi
      movement of the nineteenth century.
    description_ar: |
      توفي الإمام أبو عبد الله محمد بن محمد العبدري الفاسي المالكي
      المعروف بـ«ابن الحاج» — فقيه مالكي فاسي درّس بالقاهرة، ومصنف
      «المدخل»، أوسع متن مالكي في آداب الحياة اليومية والقضاء
      على البدع في المسلك الديني الشعبي للسنة — بالقاهرة عن نحو
      إحدى وثمانين سنة. و«المدخل» في خمسة مجلدات يحصي ممارسات أهل
      السنة في زمنه ومحيطه المغاربي-المصري، مميزاً بين ما كان
      منها متأصلاً في السنة وما كان مدخلاً بالعرف أو بالاختلاط
      بغير الإسلام؛ فصار المرجع المعتمد في النقد السني الإصلاحي
      للممارسات الدينية الشعبية في عامة العالم المالكي. وورث
      المصلحون المغاربة بعده هيكل الكتاب من الونشريسي إلى الحركة
      السلفية في القرن التاسع عشر.
    description_fr: |
      Abu ʿAbdullāh Muḥammad ibn Muḥammad al-ʿAbdarī al-Fāsī al-
      Mālikī, connu sous le nom d'Ibn al-Ḥājj — juriste malikite
      de Fès qui enseigna au Caire, et auteur d'*al-Madkhal*
      (l'Introduction), le manuel malikite le plus exhaustif sur
      l'éthique de la vie quotidienne et la suppression des
      pratiques innovées (*bidaʿ*) dans la religiosité sunnite
      populaire — mourut au Caire à l'âge d'environ 81 ans.
      *al-Madkhal* en cinq volumes catalogue les pratiques
      sunnites locales de son milieu maghrébin-égyptien,
      distinguant celles enracinées dans la Sunna de celles
      introduites par la coutume ou le syncrétisme étranger; il
      devint la référence canonique pour la critique réformiste
      sunnite des pratiques religieuses populaires à travers le
      monde malikite. Le cadre de l'ouvrage fut hérité par les
      réformateurs maghrébins ultérieurs, d'al-Wansharīsī au
      mouvement salafi du XIXe siècle.
    canonical_hijri: {year: 737, precision: year}
    canonical_gregorian: {date: 1336-01-01, precision: year, method: tabular_conversion}
