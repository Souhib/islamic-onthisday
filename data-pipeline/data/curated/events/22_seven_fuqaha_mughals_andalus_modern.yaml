  - slug: death-of-al-maqqari
    category: scholar
    title_en: Death of al-Maqqari — author of Nafḥ al-Ṭib
    title_ar: وفاة المقري — صاحب «نفح الطيب»
    title_fr: Mort d'al-Maqqarī — auteur de Nafḥ al-Ṭīb
    description_en: |
      Aḥmad ibn Muhammad al-Maqqari al-Tilimsani — Maliki scholar
      from Tlemcen, qadi of Fes, and author of *Nafḥ al-Ṭib min
      Ghuṣn al-Andalus al-Raṭib* (the Wafted Fragrance from the
      Tender Branch of al-Andalus), the most comprehensive
      single source on the cultural and intellectual history of
      al-Andalus from the conquest to the fall of Granada — died
      in Cairo. He was about 47. *Nafḥ al-Ṭib* runs to ten
      volumes and synthesises hundreds of earlier Andalusian
      sources including dozens that survive only in the
      quotations he preserves; it is the indispensable archive of
      Andalusian poetry, biography, geography, and political
      history. The second half is a biographical celebration of
      his teacher Lisan al-Din ibn al-Khaṭib (the Naṣrid vizier
      of Granada). al-Maqqari's *Azhar al-Riyaḍ* on al-Qaḍi
      ʿIyaḍ is similarly the standard biographical work on that
      subject.
    description_ar: |
      توفي الإمام أحمد بن محمد المقري التلمساني — فقيه مالكي من
      تلمسان، تولى قضاء فاس، ومصنف «نفح الطيب من غصن الأندلس
      الرطيب»، أشمل مصدر منفرد في تاريخ الأندلس الثقافي والفكري
      من الفتح إلى سقوط غرناطة — بالقاهرة عن نحو سبع وأربعين سنة.
      ويبلغ «نفح الطيب» عشرة مجلدات تستوعب مئات المصادر الأندلسية
      السابقة، منها عشرات لم تصل إلينا إلا بنقوله عنها؛ فهو
      الأرشيف الذي لا غنى عنه في الشعر الأندلسي والتراجم والجغرافيا
      والتاريخ السياسي. ونصف الكتاب الثاني تخليد لشيخه لسان الدين
      ابن الخطيب (وزير غرناطة الناصري). وكتاب المقري «أزهار
      الرياض» في القاضي عياض هو أيضاً المرجع البيوغرافي المعتمد
      في القاضي عياض.
    description_fr: |
      Aḥmad ibn Muḥammad al-Maqqarī al-Tilimsānī — savant
      malikite de Tlemcen, qāḍī de Fès, et auteur de *Nafḥ al-Ṭīb
      min Ghuṣn al-Andalus al-Raṭīb* (le Parfum Diffusé de la
      Tendre Branche d'al-Andalus), la source unique la plus
      complète sur l'histoire culturelle et intellectuelle d'al-
      Andalus depuis la conquête jusqu'à la chute de Grenade —
      mourut au Caire. Il avait environ 47 ans. *Nafḥ al-Ṭīb*
      s'étend sur dix volumes et synthétise des centaines de
      sources andalouses antérieures, dont des dizaines qui ne
      survivent que dans les citations qu'il préserve; c'est
      l'archive indispensable de la poésie, de la biographie,
      de la géographie et de l'histoire politique andalouses.
      La seconde moitié est une célébration biographique de son
      maître Lisān al-Dīn ibn al-Khaṭīb (le vizir naṣride de
      Grenade). *Azhār al-Riyāḍ* d'al-Maqqarī sur al-Qāḍī ʿIyāḍ
      est de manière similaire l'ouvrage biographique standard
      sur ce sujet.
