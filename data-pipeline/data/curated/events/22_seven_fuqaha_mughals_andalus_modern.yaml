  - slug: death-of-muhammad-hamidullah
    category: scholar
    title_en: Death of Muhammad Hamidullah
    title_ar: وفاة محمد حميد الله
    title_fr: Mort de Muḥammad Hamidullah
    description_en: |
      Muhammad Hamidullah — Hyderabad-born Sunni scholar trained
      in fiqh, sira, and international law at Osmania, the
      Sorbonne, and the University of Bonn (where he earned a
      doctorate on early Islamic diplomatic relations) — died in
      Jacksonville, Florida, at age 94. He spent most of his life
      in Paris as professor of Islamic studies and translator,
      producing the first complete French translation of the
      Qurʾan with extensive scholarly footnotes (1959), and the
      monumental *Le Prophète de l'Islam* (1959, 1976) which
      remains the standard French-language sira. His
      reconstruction-edition *Saḥifat Hammam ibn Munabbih* (1953)
      proved that the earliest written hadith collection
      antedates al-Bukhari by 250 years, decisively refuting the
      Schacht-Goldziher hypothesis on Western academic terms. He
      lived in voluntary exile from Hyderabad after the 1948
      Indian annexation, refusing both Indian and Pakistani
      passports for life.
    description_ar: |
      توفي الأستاذ محمد حميد الله — عالم سني حيدر آبادي المنشأ،
      تخرج في الفقه والسيرة والقانون الدولي في عثمانية والسوربون
      وجامعة بون (وحاز فيها الدكتوراه على رسالة في العلاقات
      الدبلوماسية في الإسلام الباكر) — في «جاكسونفيل» بفلوريدا عن
      أربع وتسعين سنة. وأقام عمره أكثر بباريس أستاذاً للدراسات
      الإسلامية ومترجماً، فأخرج أول ترجمة فرنسية كاملة للقرآن مع
      حواش علمية مستوعبة (١٩٥٩ ميلادي)، وكتابه «النبي الإسلامي»
      (الفرنسية ١٩٥٩-١٩٧٦) ما زال السيرة النبوية المعتمدة بالفرنسية.
      وتحقيقه «صحيفة همام بن منبه» (١٩٥٣ ميلادي) أثبت أن أول
      مجموعة حديث مكتوبة تسبق البخاري بـ٢٥٠ سنة، فأبطل بذلك
      أطروحة شاخت وغولدزيهر بأكاديمية النقد الغربي بشروطه. وعاش
      منفياً بإرادته من حيدر آباد بعد إلحاقها بالهند سنة ١٩٤٨،
      رافضاً الجواز الهندي والباكستاني عمره كله.
    description_fr: |
      Muḥammad Hamidullah — savant sunnite né à Hyderabad, formé
      en fiqh, sīra et droit international à Osmania, à la
      Sorbonne et à l'Université de Bonn (où il obtint un
      doctorat sur les relations diplomatiques de l'Islam ancien)
      — mourut à Jacksonville, en Floride, à l'âge de 94 ans. Il
      passa la majeure partie de sa vie à Paris comme professeur
      d'études islamiques et traducteur, produisant la première
      traduction française complète du Coran avec des notes
      savantes étendues (1959), et le monumental *Le Prophète
      de l'Islam* (1959, 1976) qui reste la *sīra* standard en
      langue française. Son édition-reconstruction *Ṣaḥīfat
      Hammām ibn Munabbih* (1953) prouva que la plus ancienne
      collection de hadiths écrite précède al-Bukhārī de 250 ans,
      réfutant de manière décisive l'hypothèse Schacht-Goldziher
      en termes académiques occidentaux. Il vécut en exil
      volontaire de Hyderabad après l'annexion indienne de 1948,
      refusant les passeports indien et pakistanais à vie.
