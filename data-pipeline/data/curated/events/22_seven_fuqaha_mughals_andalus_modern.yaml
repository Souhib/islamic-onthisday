  - slug: death-of-al-bara-ibn-azib
    category: companion
    title_en: Death of al-Baraʾ ibn ʿAzib ra
    title_ar: وفاة البراء بن عازب رضي الله عنه
    title_fr: Mort d'al-Barāʾ ibn ʿĀzib ra
    description_en: |
      Abu ʿUmara al-Baraʾ ibn ʿAzib al-Anṣari al-Awsi — Companion
      who took the Prophet ﷺ's pledge at age 15, was rejected as
      too young to fight at Badr but participated from Uḥud
      onward, and was the conqueror who took the Persian city of
      Rayy under ʿUmar ra in 24 AH — died in Kufa at age about
      71, in the same year as Sa'd ibn Abi Waqqāṣ ra. He
      narrated 305 hadiths in the Six Books, several of them
      foundational: his report of the change of qibla from
      Jerusalem to Mecca (Q 2:144) is the principal hadith on
      that topic, as is his report of the Prophet's ﷺ instruction
      that punishment in the grave is real. He had supported
      ʿAli ra at Ṣiffin and Nahrawan, and disengaged from
      politics afterwards; he died on his estate near Kufa.
    description_ar: |
      توفي أبو عمارة البراء بن عازب الأنصاري الأوسي رضي الله عنه —
      الصحابي الذي بايع رسول الله ﷺ وعمره خمس عشرة سنة، فردّه
      النبي ﷺ يوم بدر لصغر سنه ثم شهد ما بعد أحد من الغزوات،
      والفاتح الذي افتتح مدينة الري الفارسية في خلافة عمر بن
      الخطاب رضي الله عنه سنة ٢٤ هـ — بالكوفة عن نحو إحدى وسبعين
      سنة، في السنة نفسها التي مات فيها سعد بن أبي وقاص رضي الله
      عنه. روى ٣٠٥ أحاديث في الكتب الستة، منها أحاديث أصول: حديثه
      في تحويل القبلة من بيت المقدس إلى الكعبة (سورة البقرة:
      ١٤٤) هو الحديث الأصل في هذا الباب، وكذلك حديثه عن النبي ﷺ
      في إثبات عذاب القبر. وكان قد ناصر علياً رضي الله عنه يوم
      صفين والنهروان ثم اعتزل السياسة بعد، وتوفي في ضيعته قرب
      الكوفة.
    description_fr: |
      Abu ʿUmāra al-Barāʾ ibn ʿĀzib al-Anṣārī al-Awsī — Compagnon
      qui prit serment au Prophète ﷺ à l'âge de 15 ans, fut
      refusé comme trop jeune pour combattre à Badr mais participa
      à partir d'Uḥud, et fut le conquérant qui prit la ville
      perse de Rayy sous ʿUmar ra en 24 H — mourut à Koufa à
      l'âge d'environ 71 ans, la même année que Saʿd ibn Abī
      Waqqāṣ ra. Il narra 305 hadiths dans les Six Livres, dont
      plusieurs fondateurs : son rapport sur le changement de
      *qibla* de Jérusalem à La Mecque (Q 2:144) est le hadith
      principal sur ce sujet, comme l'est son rapport de
      l'instruction du Prophète ﷺ que le châtiment dans la tombe
      est réel. Il avait soutenu ʿAli ra à Ṣiffīn et à Nahrawān,
      et se désengagea de la politique par la suite; il mourut
      dans son domaine près de Koufa.
    canonical_hijri: {year: 71, precision: year}
    canonical_gregorian: {date: 690-01-01, precision: year, method: attested}
