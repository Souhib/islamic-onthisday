  - slug: death-of-abu-bakr-ibn-abd-al-rahman
    category: scholar
    title_en: Death of Abu Bakr ibn ʿAbd al-Rahman ibn al-Harith
    title_ar: وفاة أبي بكر بن عبد الرحمن بن الحارث
    title_fr: Mort d'Abu Bakr ibn ʿAbd al-Raḥmān ibn al-Ḥārith
    description_en: |
      Abu Bakr ibn ʿAbd al-Rahman ibn al-Harith ibn Hisham al-
      Makhzumi — last to die of the seven jurists of Medina, son
      of one of ʿUmar's ra senior consultative council members,
      and called *al-rahib* ("the monk") for his asceticism and
      tearful prayer — died in Medina, blind, at age about 73.
      He was a maternal uncle of the Caliph ʿUmar II. His
      narration of the *fatḥ Makka* sermon of the Prophet ﷺ
      (preserved in al-Bukhari) is one of the foundational
      reports on the legal status of Mecca. al-Zuhri said: "I do
      not know that I have ever found anyone with a better grasp
      of judicial precedent than Abu Bakr ibn ʿAbd al-Rahman."
    description_ar: |
      توفي الإمام أبو بكر بن عبد الرحمن بن الحارث بن هشام المخزومي
      — آخر فقهاء المدينة السبعة وفاةً، ابن أحد كبار مستشاري عمر
      رضي الله عنه، الملقب بـ«الراهب» لزهده ودموعه في الصلاة —
      ضريراً بالمدينة المنورة عن نحو ثلاث وسبعين سنة. وهو خال
      الخليفة عمر بن عبد العزيز رحمه الله. وروايته لخطبة فتح مكة
      عند رسول الله ﷺ (المحفوظة في «صحيح البخاري») من الأصول
      الفقهية في حكم مكة. قال الزهري: «ما أعلم أني وجدت أحداً
      أعلم بقضاء سابق من أبي بكر بن عبد الرحمن».
    description_fr: |
      Abu Bakr ibn ʿAbd al-Raḥmān ibn al-Ḥārith ibn Hishām al-
      Makhzūmī — dernier à mourir des sept jurisconsultes de
      Médine, fils de l'un des membres du conseil consultatif
      principal d'ʿUmar ra, et appelé *al-rāhib* (« le moine »)
      pour son ascétisme et ses prières en larmes — mourut à
      Médine, aveugle, à l'âge d'environ 73 ans. Il était oncle
      maternel du calife ʿUmar II. Sa narration du sermon du
      *fatḥ Makka* du Prophète ﷺ (préservée dans al-Bukhārī) est
      l'un des rapports fondateurs sur le statut juridique de
      La Mecque. al-Zuhrī dit : « je ne sache pas avoir jamais
      trouvé quelqu'un avec une meilleure compréhension du
      précédent judiciaire qu'Abū Bakr ibn ʿAbd al-Raḥmān ».
    canonical_hijri: {year: 94, precision: year}
    canonical_gregorian: {date: 712-01-01, precision: year, method: attested}
