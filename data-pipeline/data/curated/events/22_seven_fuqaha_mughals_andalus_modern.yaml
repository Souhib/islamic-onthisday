  - slug: death-of-imran-ibn-husayn
    category: companion
    title_en: Death of ʿImran ibn al-Ḥuṣayn ra
    title_ar: وفاة عمران بن الحصين رضي الله عنه
    title_fr: Mort de ʿImrān ibn al-Ḥuṣayn ra
    description_en: |
      Abu Nujayd ʿImran ibn al-Ḥuṣayn al-Khuzaʿi — Companion who
      embraced Islam in the year of Khaybar (7 AH), governor of
      Basra under ʿUmar ra, and the foremost Companion-jurist of
      Basra after the killing of ʿUthman ra — died at Basra at
      age about 75. He narrated 180 hadiths in the Six Books and
      was praised by ʿUmar ra: "I do not know any one of you
      except him whose tongue does not differ from his heart."
      He suffered chronic illness for thirty years (an unhealing
      side wound from cauterising a wound he had received in
      battle), which he embraced as expiation; the Prophet ﷺ
      had warned him against burning his body, and ʿImran
      narrated this hadith with personal regret. He was a
      neutral during the first fitna and refused to take sides
      between ʿAli and Muʿawiya ra.
    description_ar: |
      توفي أبو نجيد عمران بن الحصين الخزاعي رضي الله عنه — الصحابي
      الذي أسلم عام خيبر سنة سبع للهجرة، ووالي البصرة في خلافة
      عمر بن الخطاب رضي الله عنه، وكبير فقهاء الصحابة بالبصرة بعد
      مقتل عثمان رضي الله عنه — بالبصرة عن نحو خمس وسبعين سنة.
      روى ١٨٠ حديثاً في الكتب الستة، وقال فيه عمر رضي الله عنه:
      «ما أعلم منكم واحداً إلا وفي قلبه شيء غير ما في لسانه إلا
      عمران». وأصابه مرض مزمن ثلاثين سنة (جرح في خاصرته كواه فلم
      يبرأ)، فاحتسبه عند الله؛ وكان النبي ﷺ قد نهاه عن الكي،
      فروى عمران هذا الحديث وفي قلبه أسف على المخالفة. وكان
      رحمه الله محايداً في الفتنة الأولى ولم ينحز إلى علي ولا
      إلى معاوية رضي الله عنهما.
    description_fr: |
      Abu Nujayd ʿImrān ibn al-Ḥuṣayn al-Khuzaʿi — Compagnon qui
      embrassa l'Islam à l'année de Khaybar (7 H), gouverneur de
      Bassora sous ʿUmar ra, et le principal Compagnon-juriste de
      Bassora après le meurtre d'ʿUthmān ra — mourut à Bassora à
      l'âge d'environ 75 ans. Il narra 180 hadiths dans les Six
      Livres et fut loué par ʿUmar ra : « je ne connais aucun
      d'entre vous sinon lui dont la langue ne diffère du cœur ».
      Il souffrit d'une maladie chronique pendant trente ans (une
      blessure de flanc qui ne guérit jamais après cautérisation
      d'une blessure reçue au combat), qu'il embrassa comme
      expiation; le Prophète ﷺ l'avait mis en garde contre la
      cautérisation, et ʿImrān rapporta ce hadith avec un regret
      personnel. Il fut neutre durant la première *fitna* et
      refusa de prendre parti entre ʿAlī et Muʿāwiya ra.
    canonical_hijri: {year: 52, precision: year}
    canonical_gregorian: {date: 672-01-01, precision: year, method: attested}
