    description_en: |
      Habib ibn Aws al-Ta'i, one of the most celebrated of the Abbasid
      poets and the compiler of "al-Hamasa" — the canonical anthology of
      pre-Islamic and early Islamic Arabic martial verse, second only to
      the Mu'allaqat as a source of Arabic linguistic and literary study.
      He served at the courts of al-Mu'tasim and al-Wathiq in Baghdad
      and Samarra before dying at Mosul, where he had been appointed
      postmaster in his final years.
