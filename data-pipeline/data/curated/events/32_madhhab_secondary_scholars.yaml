  - slug: death-of-isa-ibn-aban
    category: scholar
    title_en: Death of ʿĪsā ibn Abān
    title_ar: وفاة عيسى بن أبان
    title_fr: Mort de ʿĪsā ibn Abān
    description_en: |
      ʿĪsā ibn Abān ibn Ṣadaqa, qadi of Basra, leading Hanafi
      theoretician of his generation, and one of the earliest jurists to
      systematise the principles by which the *khabar al-wāḥid*
      (single-chain hadith) is to be admitted or rejected as evidence in
      law, died at Basra. Originally a student of al-Shaybani — and thus
      a second-generation Hanafi — his lost work on the conditions for
      accepting solitary reports is reconstructed at length in later
      Hanafi usul literature, where he is repeatedly cited as the school's
      foundational voice on hadith-based reasoning. He was qadi of Basra
      for over a decade and shaped the Hanafi response to early Shafiʿi
      theory.
    description_ar: |
      توفي القاضي عيسى بن أبان بن صدقة — قاضي البصرة وكبير منظري
      الحنفية في عصره وأحد أوائل الفقهاء الذين قعّدوا الشروط التي
      تُقبل بها أو تُردّ بها رواية الآحاد في الاستدلال الفقهي — بالبصرة.
      تتلمذ على محمد بن الحسن الشيباني، فهو من الطبقة الثانية من
      الحنفية، وكتابه المفقود في شروط قبول خبر الواحد مستفاد على
      الإطالة في كتب أصول الحنفية المتأخرين، حيث يُنقل عنه شاهداً
      مؤسساً للمذهب في الاحتجاج بالحديث. ولي قضاء البصرة بضع عشرة
      سنة، وله أثر بارز في صياغة الجواب الحنفي على نظرية الشافعي
      الناشئة.
    description_fr: |
      ʿĪsā ibn Abān ibn Ṣadaqa, qāḍī de Bassora, principal théoricien
      hanafite de sa génération et l'un des premiers juristes à
      systématiser les principes selon lesquels le *khabar al-wāḥid*
      (hadith à chaîne unique) doit être admis ou rejeté comme preuve
      en droit, mourut à Bassora. D'abord élève d'al-Shaybani — et
      donc hanafite de seconde génération — son ouvrage perdu sur les
      conditions d'acceptation des rapports solitaires est reconstruit
      en détail dans la littérature postérieure d'*uṣūl al-fiqh*
      hanafite, où il est régulièrement cité comme la voix fondatrice
      de l'école sur le raisonnement à partir du hadith. Il fut qāḍī
      de Bassora plus d'une décennie et façonna la réponse hanafite à
      la théorie chafiʿite naissante.
    canonical_hijri: {year: 220, precision: year}
    canonical_gregorian: {date: 835-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: dhahabi_tarikh_islam
    people: [[isa-ibn-aban, subject], [al-shaybani, subject]]
    tags: [hanafi, usul, basra, qadi, abbasid]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Isa_ibn_Aban"
