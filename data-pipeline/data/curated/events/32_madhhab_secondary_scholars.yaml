  - slug: death-of-al-rabi-ibn-sulayman-al-muradi
    category: scholar
    title_en: Death of al-Rabīʿ ibn Sulaymān al-Murādī
    title_ar: وفاة الربيع بن سليمان المرادي
    title_fr: Mort d'al-Rabīʿ ibn Sulaymān al-Murādī
    description_en: |
      Abu Muḥammad al-Rabīʿ ibn Sulaymān al-Murādī, primary transmitter
      of Imam al-Shāfiʿī's late Egyptian-period works — including
      *al-Risāla* (the foundational text of Islamic legal theory) and
      *al-Umm* (his comprehensive fiqh corpus) — died in Cairo at age
      about 96. He served as the muezzin of al-Shāfiʿī's mosque-circle
      in Fusṭāṭ, took down the master's dictation in his last years,
      and afterwards became the chief reference point for Shafi'i fiqh
      in Egypt and the Hijaz. Almost everything classical Shafiʿīs
      cite from al-Shāfiʿī's "new madhhab" (*al-jadīd*) reaches them
      through al-Rabīʿ's recension.
    description_ar: |
      توفي الإمام أبو محمد الربيع بن سليمان المرادي — راوية كتب
      الإمام الشافعي في عصره المصري المتأخر، ومنها «الرسالة» — وهي
      أصل علم أصول الفقه — و«الأم» — وهو ديوانه الفقهي الجامع — عن
      نحو ست وتسعين سنة بالقاهرة. كان مؤذناً للحلقة الشافعية بمسجد
      الفسطاط، وكتب عن الشيخ في أواخر عمره، وصار بعده المرجع الأكبر
      لفقه الشافعية في مصر والحجاز. وعامة ما يحتج به الشافعية المتقدمون
      من «المذهب الجديد» للشافعي إنما بلغهم من رواية الربيع.
    description_fr: |
      Abu Muḥammad al-Rabīʿ ibn Sulaymān al-Murādī, principal
      transmetteur des œuvres de la période égyptienne tardive de
      l'imam al-Shāfiʿī — y compris *al-Risāla* (texte fondateur de la
      théorie juridique islamique) et *al-Umm* (son corpus de *fiqh*
      exhaustif) — mourut au Caire à l'âge d'environ 96 ans. Il fut
      le muezzin du cercle de mosquée d'al-Shāfiʿī à Fusṭāṭ, recueillit
      la dictée du maître durant ses dernières années, et devint
      ensuite la référence centrale pour le *fiqh* chafiʿite en Égypte
      et au Hedjaz. Presque tout ce que les Chafiʿites classiques
      citent du « nouveau *madhhab* » d'al-Shāfiʿī (*al-jadīd*) leur
      parvient par la recension d'al-Rabīʿ.
    canonical_hijri: {year: 270, precision: year}
    canonical_gregorian: {date: 884-01-01, precision: year, method: attested}
