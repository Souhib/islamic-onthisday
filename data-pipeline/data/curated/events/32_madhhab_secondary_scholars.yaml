  - slug: death-of-al-khallal
    category: scholar
    title_en: Death of al-Khallāl
    title_ar: وفاة الخلال
    title_fr: Mort d'al-Khallāl
    description_en: |
      Abu Bakr Aḥmad ibn Muḥammad ibn Hārun al-Khallāl, codifier of the
      Hanbali madhhab through his comprehensive collection of Imam
      Aḥmad's *masāʾil* (legal rulings) gathered from the imam's
      students across Iraq, the Hijaz, and Khurasan, died in Baghdad.
      Where Aḥmad himself had refused to compose a fiqh manual on
      principle — fearing that fixing legal rulings in writing would
      ossify them away from the hadith — al-Khallāl assembled his
      teacher's scattered rulings in a vast multi-volume corpus
      (*al-Jāmiʿ*), establishing the Hanbali madhhab as a true
      *madhhab* with a transmissible legal text. His student Abu Bakr
      al-Khiraqī would distil that corpus into the standard Hanbali
      primer two decades later.
    description_ar: |
      توفي الإمام أبو بكر أحمد بن محمد بن هارون الخلال — مدوّن المذهب
      الحنبلي من خلال كتابه الجامع الذي رتّب فيه «مسائل» الإمام أحمد
      من رواية أصحابه في العراق والحجاز وخراسان — ببغداد. كان الإمام
      أحمد رحمه الله قد امتنع من تصنيف كتاب فقهي مبدئياً، خشية أن
      يُفصل تدوين المسائل عن الحديث، فجاء الخلال فجمع تلك المسائل
      المتفرقة في مدونة ضخمة من نحو عشرين مجلداً وأكثر («الجامع»)،
      وأقام بذلك المذهب الحنبلي مذهباً متلوّاً ذا متن منقول. ولخّصه
      تلميذه أبو بكر الخرقي في «المختصر» بعده بنحو عقدين.
    description_fr: |
      Abū Bakr Aḥmad ibn Muḥammad ibn Hārūn al-Khallāl, codificateur
      du *madhhab* hanbalite à travers sa collection exhaustive des
      *masāʾil* (décisions juridiques) de l'imam Aḥmad rassemblées
      auprès des élèves de l'imam à travers l'Irak, le Hedjaz et le
      Khurasan, mourut à Bagdad. Là où Aḥmad lui-même avait refusé
      par principe de composer un manuel de *fiqh* — craignant qu'une
      fixation écrite des décisions ne les sépare du hadith —
      al-Khallāl rassembla les décisions éparses de son maître en un
      vaste corpus multi-volumes (*al-Jāmiʿ*), établissant le *madhhab*
      hanbalite comme un véritable *madhhab* doté d'un texte juridique
      transmissible. Son élève Abū Bakr al-Khiraqī distillerait ce
      corpus en manuel hanbalite standard deux décennies plus tard.
    canonical_hijri: {year: 311, precision: year}
    canonical_gregorian: {date: 924-01-01, precision: year, method: attested}
