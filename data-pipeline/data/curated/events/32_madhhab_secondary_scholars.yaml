  - slug: death-of-ibn-surayj
    category: scholar
    title_en: Death of Ibn Surayj — "the Second Shāfiʿī"
    title_ar: وفاة ابن سريج — «الشافعي الثاني»
    title_fr: Mort d'Ibn Surayj — « le second Shāfiʿī »
    description_en: |
      Abu al-ʿAbbās Aḥmad ibn ʿUmar Ibn Surayj, qadi of Shiraz and the
      Shafi'i imam of his generation — known to his contemporaries as
      "the second Shāfiʿī" (*al-Shāfiʿī al-thāni*) for the breadth of
      his scholarship and the role he played in defending the school
      against Ẓāhirī and rationalist challenges — died at age about 57.
      He trained virtually the entire generation of Shafi'i imams who
      would dominate the school through the fourth Hijri century,
      including al-Iṣṭakhrī, Abu Isḥāq al-Marwazī, and al-Qaffāl
      al-Shāshī. His debate with the Ẓāhirī master Dāwūd ibn ʿAlī is a
      celebrated chapter of late ninth-century legal history.
    description_ar: |
      توفي الإمام أبو العباس أحمد بن عمر ابن سريج — قاضي شيراز وإمام
      الشافعية في عصره، ولُقّب بـ«الشافعي الثاني» لسعة علمه ولدوره
      في الذبّ عن المذهب أمام مدرسة الظاهرية والمتكلمين — عن نحو
      سبع وخمسين سنة. تخرّج عليه عامة كبار أئمة الشافعية الذين سادوا
      المذهب في القرن الرابع الهجري، منهم الإصطخري وأبو إسحاق المروزي
      والقفّال الشاشي. ومناظرته الإمام داود بن علي الظاهري من المشاهد
      المحفوظة في تاريخ الفقه في أواخر القرن الثالث.
    description_fr: |
      Abū al-ʿAbbās Aḥmad ibn ʿUmar Ibn Surayj, qāḍī de Shiraz et imam
      chafiʿite de sa génération — connu de ses contemporains comme
      « le second Shāfiʿī » (*al-Shāfiʿī al-thānī*) pour l'étendue de
      son savoir et le rôle qu'il joua dans la défense de l'école
      contre les défis ẓāhirites et rationalistes — mourut à l'âge
      d'environ 57 ans. Il forma quasiment toute la génération des
      imams chafiʿites qui domineraient l'école au IVe siècle de
      l'Hégire, dont al-Iṣṭakhrī, Abū Isḥāq al-Marwazī et al-Qaffāl
      al-Shāshī. Son débat avec le maître ẓāhirite Dāwūd ibn ʿAlī
      est un chapitre célèbre de l'histoire juridique de la fin du
      IXe siècle.
    canonical_hijri: {year: 306, precision: year}
    canonical_gregorian: {date: 919-01-01, precision: year, method: attested}
