  - slug: death-of-ashhab-al-qaysi
    category: scholar
    title_en: Death of Ashhab al-Qaysī
    title_ar: وفاة أشهب القيسي
    title_fr: Mort d'Ashhab al-Qaysī
    description_en: |
      Abu ʿAmr Ashhab ibn ʿAbd al-ʿAziz al-Qaysī al-ʿĀmiri, one of the
      four senior Egyptian Mālikīs of the founding generation — alongside
      Ibn al-Qāsim, Ibn Wahb, and al-Mughīra — died in Egypt only
      eighteen days after Imam al-Shāfiʿī, at age about 64. He studied
      in Medina with Mālik ibn Anas and returned to Egypt as the
      pre-eminent local jurist of his generation; al-Shāfiʿī himself,
      while resident in Egypt, is reported to have said: "I have not
      seen anyone more learned in the school of Mālik than Ashhab." His
      lost legal corpus is preserved through citations in Saḥnūn's
      *al-Mudawwana* and the later Egyptian Maliki tradition.
    description_ar: |
      توفي الإمام أبو عمرو أشهب بن عبد العزيز القيسي العامري — أحد
      كبار المالكية المصريين في الطبقة المؤسسة مع ابن القاسم وابن
      وهب والمغيرة — بمصر بعد الإمام الشافعي بثمانية عشر يوماً، عن
      نحو أربع وستين سنة. تفقّه بالمدينة على مالك بن أنس، ورجع إلى
      مصر فكان كبير فقهاء بلده في عصره. وقد قيل إن الإمام الشافعي
      وهو نازل بمصر قال: «ما رأيت أعلم بمذهب مالك من أشهب». ومسائله
      محفوظة من خلال نقول سحنون في «المدونة» وكتب المتأخرين من
      مالكية مصر.
    description_fr: |
      Abū ʿAmr Ashhab ibn ʿAbd al-ʿAzīz al-Qaysī al-ʿĀmirī, l'un des
      quatre malikites égyptiens majeurs de la génération fondatrice —
      aux côtés d'Ibn al-Qāsim, Ibn Wahb et al-Mughīra — mourut en
      Égypte dix-huit jours seulement après l'imam al-Shāfiʿī, à l'âge
      d'environ 64 ans. Il étudia à Médine auprès de Mālik ibn Anas et
      revint en Égypte comme juriste local prééminent de sa génération;
      al-Shāfiʿī lui-même, alors résident d'Égypte, aurait déclaré :
      « je n'ai vu personne de plus savant dans l'école de Mālik
      qu'Ashhab ». Son corpus juridique perdu est conservé à travers
      les citations de Saḥnūn dans *al-Mudawwana* et la tradition
      malikite égyptienne ultérieure.
    canonical_hijri: {year: 204, precision: year}
    canonical_gregorian: {date: 820-01-01, precision: year, method: attested}
    claims:
