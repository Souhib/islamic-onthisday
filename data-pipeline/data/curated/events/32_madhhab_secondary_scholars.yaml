  # SHĀFIʿĪ — EGYPTIAN STUDENTS AND THE GENERATION OF "THE SECOND SHĀFIʿĪ"
  # =========================================================================

  - slug: death-of-al-muzani
    category: scholar
    title_en: Death of al-Muzanī
    title_ar: وفاة المزني
    title_fr: Mort d'al-Muzanī
    description_en: |
      Abu Ibrahim Ismāʿīl ibn Yaḥyā al-Muzanī, foremost Egyptian student
      of Imam al-Shāfiʿī and author of *al-Mukhtaṣar* (the first
      systematic Shafi'i fiqh manual), died in Egypt at age about 89.
      al-Shāfiʿī said of him: "al-Muzanī is the supporter of my school"
      (*nāṣir madhhabī*); his *Mukhtaṣar* served as the foundational
      teaching text of the Shafi'i madhhab for generations and was the
      base on which Abu Iṣḥāq al-Shīrāzī, al-Juwaynī, al-Ghazālī, and
      eventually al-Nawawī built their authoritative summae. al-Muzanī's
      maternal nephew, al-Ṭaḥawī, was originally his Shafi'i student
      before transferring to the Hanafi madhhab.
    description_ar: |
      توفي الإمام أبو إبراهيم إسماعيل بن يحيى المزني — كبير أصحاب
      الإمام الشافعي في مصر ومصنف «المختصر»، وهو أول مختصر منظم في
      فقه الشافعية — بمصر عن نحو تسع وثمانين سنة. قال فيه الشافعي:
      «المزني ناصر مذهبي»، وصار «مختصره» المتن التعليمي الأصلي للمذهب
      الشافعي أجيالاً متتابعة، وعليه بنى أبو إسحاق الشيرازي والجويني
      والغزالي والنووي مختصراتهم المعتمدة. وابن أخت المزني الإمام
      الطحاوي تتلمذ عليه على المذهب الشافعي قبل أن ينتقل إلى المذهب
      الحنفي.
    description_fr: |
      Abu Ibrahim Ismāʿīl ibn Yaḥyā al-Muzanī, le plus éminent élève
      égyptien de l'imam al-Shāfiʿī et auteur d'*al-Mukhtaṣar* (le
      premier manuel de *fiqh* chafiʿite systématique), mourut en
      Égypte à l'âge d'environ 89 ans. al-Shāfiʿī disait de lui :
      « al-Muzanī est le soutien de mon école » (*nāṣir madhhabī*);
      son *Mukhtaṣar* servit de texte d'enseignement fondateur du
      *madhhab* chafiʿite pendant des générations et constitua la base
      sur laquelle Abu Iṣḥāq al-Shīrāzī, al-Juwaynī, al-Ghazālī et
      finalement al-Nawawī bâtirent leurs sommes autoritatives. Le
      neveu maternel d'al-Muzanī, al-Ṭaḥāwī, fut d'abord son élève
      chafiʿite avant de passer à l'école hanafite.
    canonical_hijri: {year: 264, precision: year}
    canonical_gregorian: {date: 878-01-01, precision: year, method: attested}
