  - slug: death-of-abdullah-ibn-ahmad-ibn-hanbal
    category: scholar
    title_en: Death of ʿAbdullāh ibn Aḥmad ibn Ḥanbal
    title_ar: وفاة عبد الله بن أحمد بن حنبل
    title_fr: Mort de ʿAbdullāh ibn Aḥmad ibn Ḥanbal
    description_en: |
      Abu ʿAbd al-Raḥmān ʿAbdullāh ibn Aḥmad ibn Muḥammad ibn Ḥanbal,
      son of the imam and primary transmitter of the *Musnad* — his
      father's monumental hadith collection of roughly 27,000
      narrations arranged by Companion narrator — died in Baghdad at
      age about 77. He compiled and arranged the *Musnad* in the form
      Sunni Islam has received it, and authored the *Kitab al-Sunna*
      (in two recensions, his and that of his son), an early
      pillar of Sunni creedal literature; he also transmitted his
      father's *Masāʾil*, the legal-rulings corpus that became the
      raw material of the Hanbali madhhab.
    description_ar: |
      توفي الإمام أبو عبد الرحمن عبد الله بن أحمد بن محمد بن حنبل —
      ابن الإمام أحمد وراوية «المسند» الذي هو ديوان والده الجامع
      للحديث، يضم نحو سبعة وعشرين ألف حديث مرتبة على مسانيد الصحابة
      — ببغداد عن نحو سبع وسبعين سنة. هو الذي رتّب «المسند» على
      الصورة التي تلقاها أهل السنة، وصنّف «كتاب السنة» الذي هو من
      أصول مصنفات أهل السنة في العقيدة، وروى عن أبيه «المسائل» التي
      هي المادة الخام للمذهب الحنبلي.
    description_fr: |
      Abu ʿAbd al-Raḥmān ʿAbdullāh ibn Aḥmad ibn Muḥammad ibn Ḥanbal,
      fils de l'imam et principal transmetteur du *Musnad* — la
      collection monumentale de hadiths de son père comportant
      environ 27 000 narrations classées par compagnon narrateur —
      mourut à Bagdad à l'âge d'environ 77 ans. Il compila et arrangea
      le *Musnad* dans la forme sous laquelle l'islam sunnite l'a
      reçu, et fut l'auteur du *Kitāb al-Sunna* (en deux recensions,
      la sienne et celle de son fils), pilier précoce de la
      littérature de credo sunnite; il transmit également les
      *Masāʾil* de son père, le corpus de décisions juridiques qui
      devint le matériau brut du *madhhab* hanbalite.
