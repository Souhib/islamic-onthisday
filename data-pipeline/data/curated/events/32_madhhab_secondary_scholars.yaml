  - slug: death-of-al-khiraqi
    category: scholar
    title_en: Death of al-Khiraqī
    title_ar: وفاة الخرقي
    title_fr: Mort d'al-Khiraqī
    description_en: |
      Abu al-Qāsim ʿUmar ibn al-Ḥusayn al-Khiraqī, author of *al-Mukhtaṣar
      al-Khiraqī* — the foundational primer of the Hanbali madhhab and
      the most-commented Hanbali text until Ibn Qudāma's *al-Mughnī*
      (itself, in part, an extended commentary on the *Mukhtaṣar*) —
      died in Damascus, where he had migrated from his native Baghdad
      after the city's troubles. The *Mukhtaṣar* contains roughly two
      thousand legal questions condensed from the *masāʾil* corpus
      al-Khallāl had collected from Imam Aḥmad's students; its
      compactness and precision made it the principal teaching text of
      the school for nearly three centuries.
    description_ar: |
      توفي الإمام أبو القاسم عمر بن الحسين الخرقي — صاحب «المختصر
      الخرقي»، أول مختصر معتمد في المذهب الحنبلي وأكثر متون المذهب
      شرحاً قبل «المغني» للموفق ابن قدامة الذي صنّفه أصلاً شرحاً على
      «المختصر» — بدمشق، بعد أن هاجر إليها من بغداد عقب فتن البلد.
      ويضم «المختصر» نحو ألفي مسألة فقهية، اختصرها الخرقي من «مسائل»
      الإمام أحمد التي جمعها الخلال من أصحاب الإمام، فصار الكتاب
      المتن الأصلي للتدريس في المذهب نحو ثلاثة قرون.
    description_fr: |
      Abu al-Qāsim ʿUmar ibn al-Ḥusayn al-Khiraqī, auteur d'*al-Mukhtaṣar
      al-Khiraqī* — manuel fondateur du *madhhab* hanbalite et texte
      hanbalite le plus commenté jusqu'à l'*al-Mughnī* d'Ibn Qudāma
      (lui-même, en partie, un commentaire étendu du *Mukhtaṣar*) —
      mourut à Damas, où il avait émigré depuis sa Bagdad natale après
      les troubles de la ville. Le *Mukhtaṣar* contient environ deux
      mille questions juridiques condensées du corpus *masāʾil* qu'al-
      Khallāl avait recueilli auprès des élèves de l'imam Aḥmad; sa
      compacité et sa précision en firent le texte d'enseignement
      principal de l'école pendant près de trois siècles.
