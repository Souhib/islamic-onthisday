  - slug: death-of-ismail-ibn-ishaq-al-qadi
    category: scholar
    title_en: Death of Ismāʿīl ibn Isḥāq al-Qāḍī
    title_ar: وفاة إسماعيل بن إسحاق القاضي
    title_fr: Mort d'Ismāʿīl ibn Isḥāq al-Qāḍī
    description_en: |
      Abu Isḥāq Ismāʿīl ibn Isḥāq al-Jahḍamī al-Azdī, qadi of Baghdad
      and the foremost figure in establishing the Maliki madhhab as a
      living school in Iraq, died in Baghdad at age 83. He was qāḍī
      under the Abbasid caliphs al-Mutawakkil and his successors,
      authored *Aḥkam al-Qurʾan* (an early genre-defining work of
      *aḥkām al-Qurʾān* literature) and *al-Mabsuṭ* in Maliki fiqh,
      and trained the generation of jurists who would carry the school
      eastward from its North-African and Hijazi heartlands. His
      patronage in Baghdad gave the Maliki tradition its only extended
      footing in the Abbasid capital.
    description_ar: |
      توفي القاضي أبو إسحاق إسماعيل بن إسحاق الجهضمي الأزدي — قاضي
      بغداد وكبير من أقام للمذهب المالكي حضوراً مدرسياً حياً في
      العراق — ببغداد عن ثلاث وثمانين سنة. ولي القضاء في عهد المتوكل
      وخلفائه من بني العباس، وصنّف كتاب «أحكام القرآن» — وهو من أوائل
      المؤسسات لجنس «أحكام القرآن» — وكتاب «المبسوط» في فقه المالكية،
      وأخرج طبقة من الفقهاء حملوا المذهب من موطنه في شمال أفريقيا
      والحجاز إلى المشرق. ورعايته في بغداد أعطت المذهب المالكي
      الموطئ الوحيد الممتد له في عاصمة الخلافة العباسية.
    description_fr: |
      Abū Isḥāq Ismāʿīl ibn Isḥāq al-Jahḍamī al-Azdī, qāḍī de Bagdad
      et la figure centrale dans l'établissement de l'école malikite
      comme école vivante en Irak, mourut à Bagdad à l'âge de 83 ans.
      Il fut qāḍī sous les califes abbassides al-Mutawakkil et ses
      successeurs, auteur d'*Aḥkām al-Qurʾān* (œuvre fondatrice du
      genre *aḥkām al-Qurʾān*) et d'*al-Mabsūṭ* en *fiqh* malikite, et
      forma la génération de juristes qui porteraient l'école vers
      l'Est depuis ses fiefs nord-africain et hedjazien. Son patronage
      à Bagdad donna à la tradition malikite son seul ancrage prolongé
      dans la capitale abbasside.
    canonical_hijri: {year: 282, precision: year}
    canonical_gregorian: {date: 895-01-01, precision: year, method: attested}
