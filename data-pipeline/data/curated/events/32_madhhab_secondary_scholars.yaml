  - slug: death-of-al-hasan-ibn-ziyad-al-luluyi
    category: scholar
    title_en: Death of al-Ḥasan ibn Ziyād al-Luʾluʾī
    title_ar: وفاة الحسن بن زياد اللؤلؤي
    title_fr: Mort d'al-Ḥasan ibn Ziyād al-Luʾluʾī
    description_en: |
      al-Ḥasan ibn Ziyad al-Luʾluʾi al-Kufi, fourth of the senior Hanafi
      circle around Abu Ḥanifa (after Abu Yusuf, al-Shaybani, and Zufar),
      died at Kufa around age 90. He served as qadi of Kufa, transmitted
      his teacher's positions through works such as *al-Mujarrad* and
      *al-Maʿani fi al-Kalam ʿala Madhhab Abi Ḥanifa*, and was praised
      by later Hanafi biographers for the breadth of his juristic memory.
      Although his rulings are preserved more fully in al-Shaybani's
      compilations than in any independent transmission, he is invoked
      across the Hanafi tradition as a primary witness to Abu Ḥanifa's
      teaching.
    description_ar: |
      توفي الإمام الحسن بن زياد اللؤلؤي الكوفي — رابع كبار أصحاب أبي
      حنيفة بعد أبي يوسف ومحمد بن الحسن وزفر — بالكوفة عن نحو تسعين
      سنة. ولي قضاء الكوفة، ونقل فقه شيخه أبي حنيفة من خلال كتب منها
      «المجرد» و«المعاني في الكلام على مذهب أبي حنيفة»، وأثنى عليه
      المتأخرون من الحنفية بسعة الحفظ في الفقه. وعلى الرغم من أن
      مسائله محفوظة في تصانيف محمد بن الحسن أكثر من تصانيفه المستقلة،
      فإن الحنفية يحتجون به شاهداً أصلياً على تعاليم أبي حنيفة.
    description_fr: |
      al-Ḥasan ibn Ziyād al-Luʾluʾī al-Kūfī, quatrième du cercle hanafite
      principal autour d'Abu Ḥanīfa (après Abu Yusuf, al-Shaybani et
      Zufar), mourut à Kufa à environ 90 ans. Il fut qāḍī de Kufa,
      transmit les positions de son maître à travers des ouvrages tels
      qu'*al-Mujarrad* et *al-Maʿānī fī al-Kalām ʿalā Madhhab Abī Ḥanīfa*,
      et fut loué par les biographes hanafites postérieurs pour
      l'étendue de sa mémoire juridique. Bien que ses décisions soient
      conservées plus complètement dans les compilations d'al-Shaybani
      que dans une transmission indépendante, il est invoqué à travers
      la tradition hanafite comme témoin primaire de l'enseignement
      d'Abu Ḥanīfa.
    canonical_hijri: {year: 204, precision: year}
    canonical_gregorian: {date: 820-01-01, precision: year, method: attested}
