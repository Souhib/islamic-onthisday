  # HANAFI — DIRECT STUDENTS OF ABŪ ḤANĪFA AND CODIFIERS OF USUL
  # =========================================================================

  - slug: death-of-zufar-ibn-al-hudhayl
    category: scholar
    title_en: Death of Zufar ibn al-Hudhayl
    title_ar: وفاة زفر بن الهذيل
    title_fr: Mort de Zufar ibn al-Hudhayl
    description_en: |
      Zufar ibn al-Hudhayl al-ʿAnbari, one of the four senior students of
      Abu Ḥanifa — alongside Abu Yusuf, Muḥammad al-Shaybani, and al-Ḥasan
      ibn Ziyad — and the foremost practitioner of qiyās (juristic
      analogy) within the early Hanafi school, died as qadi of Basra at
      age about 48. While his juristic positions are systematically
      preserved in the *Ẓahir al-Riwaya* corpus of al-Shaybani, Zufar
      composed no surviving works of his own; later Hanafis ranked him
      "the most rigorous in qiyās" of Abu Ḥanifa's circle. He served as
      qadi of Basra under the early Abbasids and trained a generation of
      Iraqi jurists.
    description_ar: |
      توفي زفر بن الهذيل العنبري — أحد كبار أصحاب أبي حنيفة الأربعة
      مع أبي يوسف ومحمد بن الحسن الشيباني والحسن بن زياد، وأشد أهل
      مذهب الحنفية في عصره ضبطاً للقياس — قاضياً للبصرة عن نحو ثمانٍ
      وأربعين سنة. ومسائله محفوظة في كتب «ظاهر الرواية» لمحمد بن
      الحسن، ولم يُؤثَر عنه تصنيف مستقل، غير أن المتأخرين من الحنفية
      عدّوه «أقواهم في القياس» في حلقة أبي حنيفة. ولي قضاء البصرة في
      أوائل العصر العباسي وأخرج طبقة من فقهاء العراق.
    description_fr: |
      Zufar ibn al-Hudhayl al-ʿAnbari, l'un des quatre élèves principaux
      d'Abu Ḥanīfa — aux côtés d'Abu Yusuf, de Muḥammad al-Shaybani et
      d'al-Ḥasan ibn Ziyad — et le plus rigoureux praticien du *qiyās*
      (analogie juridique) au sein de l'école hanafite primitive, mourut
      qāḍī de Bassora à l'âge d'environ 48 ans. Si ses positions
      juridiques sont systématiquement préservées dans le corpus
      *Ẓāhir al-Riwāya* d'al-Shaybani, Zufar ne composa aucune œuvre
      survivante de son cru; les hanafites ultérieurs le rangèrent
      « le plus rigoureux en *qiyās* » du cercle d'Abu Ḥanīfa. Il fut
      qāḍī de Bassora sous les premiers Abbassides et forma une
      génération de juristes irakiens.
    canonical_hijri: {year: 158, precision: year}
    canonical_gregorian: {date: 775-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: ibn_kathir_bidaya
    people: [[zufar-ibn-al-hudhayl, subject], [abu-hanifa, subject]]
