# Wave 19 of curated event additions (2026-04-27).
# Twelve second-tier scholars of the four Sunni madhāhib — direct students
# of the four imams (or codifiers of branch traditions). Three per madhhab:
#   Hanafi: Zufar ibn al-Hudhayl, al-Ḥasan ibn Ziyād al-Luʾluʾī, ʿĪsā ibn Abān.
#   Maliki: Ashhab al-Qaysī, Yaḥyā ibn Yaḥyā al-Laythī, Ismāʿīl ibn Isḥāq al-Qāḍī.
#   Shafi'i: al-Muzanī, al-Rabīʿ ibn Sulaymān al-Murādī, Ibn Surayj.
#   Hanbali: ʿAbdullāh ibn Aḥmad ibn Ḥanbal, al-Khallāl, al-Khiraqī.
# Each event attested in classical Sunni sources (al-Dhahabī Siyar /
# Tārīkh al-Islām, Ibn Khallikān Wafayāt al-Aʿyān, Ibn Kathīr al-Bidāya
# wa-l-Nihāya, Ibn Saʿd Ṭabaqāt). Trilingual (en/ar/fr).

events:
