  - slug: death-of-yahya-ibn-yahya-al-laythi
    category: scholar
    title_en: Death of Yaḥyā ibn Yaḥyā al-Laythī
    title_ar: وفاة يحيى بن يحيى الليثي
    title_fr: Mort de Yaḥyā ibn Yaḥyā al-Laythī
    description_en: |
      Yaḥyā ibn Yaḥyā al-Laythī al-Maṣmūdī, the Andalusi student of
      Mālik ibn Anas whose recension (*riwāya*) of the *Muwaṭṭaʾ* became
      the dominant text of the work in al-Andalus and the Maghrib, died
      in Cordoba at age about 82. After studying in Medina with Mālik
      himself in his final years, he returned to al-Andalus as the
      foremost local authority on Maliki fiqh; under the Umayyad amīr
      al-Ḥakam I and his son ʿAbd al-Raḥmān II he refused the office of
      qāḍī while accepting the position of *muftī* — effectively making
      him the gatekeeper of judicial appointments in the realm. His
      transmission anchored the Western Maliki tradition for the next
      ten centuries.
    description_ar: |
      توفي الإمام يحيى بن يحيى الليثي المصمودي — صاحب رواية «الموطإ»
      التي صارت الأشهر والأعمد في الأندلس والمغرب — بقرطبة عن نحو
      اثنتين وثمانين سنة. تفقّه بالمدينة على مالك بن أنس في أواخر
      حياة الإمام، ثم رجع إلى الأندلس فكان كبير فقهاء بلده في فقه
      المالكية. وفي عهد الأمير الأموي الحكم الأول وابنه عبد الرحمن
      الثاني أبى أن يلي القضاء، ولكنه قبل الإفتاء، فصار في الواقع
      الحاكم على تولية القضاة في المملكة. ورواته نقطة الارتكاز
      للمذهب المالكي الغربي عشرة قرون متتابعة.
    description_fr: |
      Yaḥyā ibn Yaḥyā al-Laythī al-Maṣmūdī, l'élève andalou de Mālik
      ibn Anas dont la recension (*riwāya*) du *Muwaṭṭaʾ* devint le
      texte dominant de l'œuvre en al-Andalus et au Maghreb, mourut à
      Cordoue à l'âge d'environ 82 ans. Après avoir étudié à Médine
      auprès de Mālik lui-même dans ses dernières années, il revint en
      al-Andalus comme l'autorité locale principale en *fiqh* malikite;
      sous l'émir omeyyade al-Ḥakam I et son fils ʿAbd al-Raḥmān II il
      refusa la charge de *qāḍī* tout en acceptant celle de *muftī* —
      ce qui faisait de lui en pratique le gardien des nominations
      judiciaires dans le royaume. Sa transmission ancra la tradition
      malikite occidentale pour les dix siècles suivants.
    canonical_hijri: {year: 234, precision: year}
    canonical_gregorian: {date: 849-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: ibn_kathir_bidaya
    people: [[yahya-ibn-yahya-al-laythi, subject], [malik-ibn-anas, subject]]
