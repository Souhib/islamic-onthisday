# Wave 67 of curated event additions (2026-04-27).
# Burji (Circassian) Mamluk sultanate of Egypt and Syria, 784-922 AH /
# 1382-1517. Includes the late-Bahri transition (death of Lāǧīn 698,
# Mamluk-Mongol clashes at Wādī al-Khaznadār 699 and Shaqḥāb 702),
# the Burji foundational events (Barqūq, Faraj, Tīmūr's sacks of
# Aleppo and Damascus 803), and the dynasty's last figures (al-Muʾayyad
# Shaykh, Barsbāy, Jaqmaq, Qāyt Bāy, Ṭūmān Bāy II).
# All events attested in classical Sunni sources (Ibn Kathīr al-Bidāya,
# Ibn Ḥajar al-Durar al-Kāmina, Ibn al-ʿImād Shadharāt al-Dhahab,
# al-Dhahabī Tārīkh al-Islām, EI2). Trilingual (en/ar/fr).
# Editorial framing: Tīmūr's massacres of civilian Muslim populations
# at Aleppo and Damascus reported factually. Burji Mamluks framed as
# Sunni Ḥanafī/Shāfiʿī patrons whose architectural and scholarly
# patronage left a lasting imprint on Cairo and Damascus.

events:
  # =========================================================================
  # LATE BAHRI TRANSITION — MAMLUK-MONGOL FRONTIER (698-702 AH)
  # =========================================================================

  - slug: battle-of-wadi-al-khaznadar
    category: battle
    title_en: Battle of Wādī al-Khaznadār — Mamlūk Defeat by the Ilkhānid Ghazān
    title_ar: معركة وادي الخازندار — هزيمة المماليك أمام غازان الإيلخاني
    title_fr: Bataille de Wādī al-Khaznadār — défaite mamelouke face à l'ilkhanide Ghāzān
    description_en: |
      The Bahri Mamlūk army under Sultan al-Nāṣir Muḥammad ibn
      Qalāwūn (in his first reign, then aged about fifteen) and
      his viceroys was defeated by the Ilkhānid army of Ghāzān
      Khān at Wādī al-Khaznadār north-east of Ḥimṣ in northern
      Syria. It was the only Mongol field victory over the
      Mamlūks: Ghāzān — who had embraced Islam in 694 AH but
      whose dynastic claim still rested on the legacy of Hülegü
      — overran the Mamlūk centre and the Egyptian army withdrew
      south leaving Damascus exposed. The Ilkhānid army occupied
      Damascus for several months in early 700 AH; Ghāzān
      received the city's notables and Ibn Taymiyya in person at
      the citadel before withdrawing east, the Mongol force
      depleted by the Syrian summer and dynastic emergencies.
      The Mamlūks recovered the city without battle, and Ghāzān's
      successor Öljeitü's invasion three years later would be
      decisively repulsed at Shaqḥāb in 702 AH. Ibn Kathīr —
      himself a Damascene witness as a young man — gives a
      detailed account.
    description_ar: |
      هُزم جيش المماليك البحرية بقيادة السلطان الناصر محمد بن
      قلاوون (في سلطنته الأولى وعمره نحو خمس عشرة سنة) ونوابه
      أمام جيش الإيلخان غازان خان عند وادي الخازندار شمال شرقي
      حمص في شمال الشام. وكانت المعركة الانتصار الميداني الوحيد
      للمغول على المماليك: اخترق غازان — الذي كان قد أسلم سنة
      ٦٩٤ هـ وإن بقيت دعواه السياسية وارثة لإرث هولاكو — قلب
      الجيش المملوكي، فانسحب الجيش المصري جنوباً تاركاً دمشق
      مكشوفة. وأقام جيش الإيلخان بدمشق أشهراً في أوائل سنة
      ٧٠٠ هـ؛ واستقبل غازان أعيان المدينة والشيخ ابن تيمية
      شخصياً في القلعة قبل أن ينسحب شرقاً وقد أعيا جيشَه حرّ
      صيف الشام وأحداث آل بيته. واستعاد المماليك المدينة بلا
      قتال، وستُهزم بعد ثلاث سنوات حملةُ خليفته أولجايتو في
      شقحب سنة ٧٠٢ هـ هزيمةً قاطعة. ويفصِّل ابن كثير الوقائع
      وقد كان شاهداً دمشقياً عليها صبيّاً.
    description_fr: |
      L'armée mamelouke baḥrī sous le sultan al-Nāṣir Muḥammad
      ibn Qalāwūn (alors dans son premier règne, âgé d'environ
      quinze ans) et ses vice-rois fut défaite par l'armée
      ilkhanide de Ghāzān Khān à Wādī al-Khaznadār au nord-est
      de Ḥimṣ dans le nord de la Syrie. Ce fut la seule victoire
      mongole en bataille rangée sur les Mamelouks : Ghāzān —
      qui avait embrassé l'islam en 694 H, bien que sa
      revendication dynastique reposât toujours sur l'héritage
      de Hülegü — enfonça le centre mamelouk et l'armée
      égyptienne se replia vers le sud, laissant Damas
      exposée. L'armée ilkhanide occupa Damas pendant plusieurs
      mois au début de 700 H; Ghāzān reçut en personne les
      notables de la ville et Ibn Taymiyya à la citadelle avant
      de se retirer vers l'est, la force mongole étant épuisée
      par l'été syrien et les crises dynastiques. Les Mamelouks
      récupérèrent la ville sans combat, et l'invasion de son
      successeur Öljeitü trois ans plus tard serait
      décisivement repoussée à Shaqḥāb en 702 H. Ibn Kathīr —
      lui-même témoin damascène jeune homme — en donne un
      récit détaillé.
    canonical_hijri: {year: 699, month: 12, day: 27, precision: day}
    canonical_gregorian: {date: 1299-12-22, precision: day, method: attested}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya gives the date 27 Rabīʿ II — corrected to 27 Dhū al-Ḥijja 699 AH on collation — and details the Mamlūk withdrawal."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the engagement under the events of 699 AH and the Ilkhānid occupation of Damascus under 700 AH."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's al-Durar al-Kāmina notes the battle in his entries on the Mamlūk amīrs of the year."
    people: [[al-nasir-muhammad-ibn-qalawun, leader]]
    tags: [mamluk, ilkhan, mongol, syria, hims, ghazan, defeat]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-shaqhab
    category: battle
    title_en: Battle of Shaqḥāb — Mamlūk Decisive Victory over the Mongols
    title_ar: معركة شقحب (مرج الصفر) — انتصار المماليك الحاسم على المغول
    title_fr: Bataille de Shaqḥāb — victoire mamelouke décisive sur les Mongols
    description_en: |
      The decisive Mamlūk victory over the Ilkhānid army of
      Qutlughshāh — sent by the Ilkhān Öljeitü — fought on the
      plain of Shaqḥāb (also called Marj al-Ṣuffar) south of
      Damascus on the road to the Ḥawrān. The Mamlūk army of
      Sultan al-Nāṣir Muḥammad ibn Qalāwūn met the Mongol force
      that had again invaded Syria three years after Wādī
      al-Khaznadār; Ibn Taymiyya famously rode with the Mamlūks
      to encourage them to fight despite the public opinion
      that war against the now-Muslim Ilkhāns was problematic,
      issuing the *fatwā* that the Ilkhāns' formal Islam did not
      protect their war on the *dār al-islām* under the Mamlūks.
      The Mamlūks won on the third day of fighting, the Mongol
      army was destroyed, and the Ilkhānid threat to Syria was
      ended for two generations. Tradition records that the
      sultan and his amīrs prayed Friday in the Umayyad Mosque
      the week after the victory. Ibn Kathīr and al-Dhahabī give
      detailed accounts; both were Damascenes alive at the time.
    description_ar: |
      الانتصار الحاسم للمماليك على الجيش الإيلخاني بقيادة
      قتلغ شاه — الذي بعثه الإيلخان أولجايتو — في معركة سهل
      شقحب (المعروف بمرج الصفر) جنوب دمشق على طريق الحوران.
      التقى جيش السلطان الناصر محمد بن قلاوون بالجيش المغولي
      الذي عاد ليجتاح الشام بعد ثلاث سنوات من واقعة وادي
      الخازندار؛ وقد ركب الشيخ ابن تيمية مع المماليك يحضّهم
      على القتال رغم تردد العامة في حرب الإيلخان وقد أسلموا،
      وأفتى أن إسلامهم الشكلي لا يعصمهم إذا حاربوا دار
      الإسلام وحاكميها المماليك. وانتصر المماليك في اليوم
      الثالث من القتال، فانهار الجيش المغولي، وانقطع الخطر
      الإيلخاني عن الشام جيلين. ويذكر التراث أن السلطان وأمراءه
      صلّوا الجمعة بالجامع الأموي بعد النصر بأسبوع. ويفصّل
      الواقعة ابن كثير والذهبي وكلاهما كان دمشقياً معاصراً
      للحادثة.
    description_fr: |
      La victoire mamelouke décisive sur l'armée ilkhanide de
      Qutlughshāh — envoyée par l'ilkhān Öljeitü — livrée sur
      la plaine de Shaqḥāb (également appelée Marj al-Ṣuffar)
      au sud de Damas sur la route du Ḥawrān. L'armée mamelouke
      du sultan al-Nāṣir Muḥammad ibn Qalāwūn rencontra la
      force mongole qui avait à nouveau envahi la Syrie trois
      ans après Wādī al-Khaznadār; Ibn Taymiyya, on le sait,
      chevaucha avec les Mamelouks pour les exhorter à combattre
      malgré l'opinion publique selon laquelle la guerre contre
      les ilkhans désormais musulmans posait problème, émettant
      la *fatwa* selon laquelle l'islam formel des ilkhans ne
      les protégeait pas lorsqu'ils faisaient la guerre au
      *dār al-islām* sous les Mamelouks. Les Mamelouks
      l'emportèrent au troisième jour de combat, l'armée
      mongole fut détruite, et la menace ilkhanide sur la Syrie
      fut écartée pour deux générations. La tradition rapporte
      que le sultan et ses émirs firent la prière du vendredi
      à la mosquée omeyyade la semaine suivant la victoire.
      Ibn Kathīr et al-Dhahabī, tous deux Damascènes
      contemporains, en donnent des récits détaillés.
    canonical_hijri: {year: 702, month: 4, day: 2, precision: day}
    canonical_gregorian: {date: 1303-04-21, precision: day, method: attested}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the battle on Saturday 2 Ramaḍān 702 AH and details the three days of fighting."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the battle under the events of 702 AH."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's al-Durar al-Kāmina notes the battle in connection with the amīrs of the year."
    people: [[al-nasir-muhammad-ibn-qalawun, leader], [ibn-taymiyya, subject]]
    tags: [mamluk, ilkhan, mongol, syria, damascus, marj-al-suffar, ibn-taymiyya, victory]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-mansur-lajin
    category: ruler_death
    title_en: Assassination of al-Manṣūr Lāǧīn — Late Bahri Sultan of Egypt
    title_ar: مقتل السلطان المنصور لاجين — من سلاطين بني المنصور البحرية
    title_fr: Assassinat du sultan al-Manṣūr Lāǧīn — sultan baḥrī tardif d'Égypte
    description_en: |
      al-Malik al-Manṣūr Ḥusām al-Dīn Lāǧīn al-Manṣūrī — Bahri
      Mamlūk sultan of Egypt for fourteen months — was
      assassinated in the Cairo citadel by a group of his own
      mamlūk emirs led by his ḥājib Kurjī during the night,
      while he was reading Qurʾān after the ʿishāʾ prayer. A
      former Mongol-bought *mamlūk* of Sultan Qalāwūn (whence
      his nisba al-Manṣūrī), Lāǧīn had served as viceroy of
      Damascus before deposing the young al-Nāṣir Muḥammad in
      696 AH and taking the throne. His attempt to redistribute
      the Egyptian iqṭāʿ assignments away from the existing
      amīr factions and toward his own retinue (the *rawk
      al-ḥusāmī* of 697 AH) destroyed his political base; the
      assassination restored al-Nāṣir Muḥammad — by then about
      fourteen — to the throne for his second reign. The
      conspirators were themselves killed within months. Ibn
      Kathīr places the killing in Rabīʿ al-Awwal 698 AH and
      gives a detailed account of the night.
    description_ar: |
      اغتيل السلطان الملك المنصور حسام الدين لاجين المنصوري —
      سلطان مصر المملوكي من البحرية أربعة عشر شهراً — بقلعة
      الجبل بالقاهرة، قتله جماعة من أمراء مماليكه بقيادة حاجبه
      كرجي ليلاً، وهو يقرأ القرآن بعد صلاة العشاء. وكان لاجين
      من مماليك السلطان قلاوون (ومنه نسبته «المنصوري»)، تولّى
      نيابة دمشق قبل أن يعزل الناصر محمد الفتى ويأخذ السلطنة
      سنة ٦٩٦ هـ. وأودت محاولته إعادة توزيع الإقطاعات المصرية
      بعيداً عن طوائف الأمراء القائمة لصالح حاشيته (الروك
      الحسامي سنة ٦٩٧ هـ) بقاعدته السياسية؛ وأعاد الاغتيالُ
      الناصرَ محمداً — وعمره يومئذ نحو أربع عشرة سنة — إلى
      السلطنة في سلطنته الثانية. وقُتل المتآمرون أنفسُهم في
      أشهر. ويسجِّل ابن كثير القتلَ في ربيع الأول سنة ٦٩٨ هـ
      ويفصِّل وقائع الليلة.
    description_fr: |
      al-Malik al-Manṣūr Ḥusām al-Dīn Lāǧīn al-Manṣūrī — sultan
      mamelouk baḥrī d'Égypte pendant quatorze mois — fut
      assassiné dans la citadelle du Caire par un groupe de
      ses propres émirs mamelouks, conduit par son *ḥājib*
      Kurjī, durant la nuit, alors qu'il lisait le Coran après
      la prière du ʿishāʾ. Ancien *mamlūk* acheté du sultan
      Qalāwūn (d'où sa *nisba* al-Manṣūrī), Lāǧīn avait servi
      comme vice-roi de Damas avant de déposer le jeune
      al-Nāṣir Muḥammad en 696 H et de prendre le trône. Sa
      tentative de redistribuer les assignations d'iqṭāʿ
      égyptiennes au détriment des factions d'émirs établies
      et au profit de sa propre suite (le *rawk al-ḥusāmī* de
      697 H) détruisit sa base politique; l'assassinat
      ramena al-Nāṣir Muḥammad — alors âgé d'environ quatorze
      ans — au trône pour son second règne. Les conjurés
      eux-mêmes furent tués dans les mois qui suivirent. Ibn
      Kathīr place le meurtre en Rabīʿ al-Awwal 698 H et donne
      un récit détaillé de la nuit.
    canonical_hijri: {year: 698, month: 3, precision: month}
    canonical_gregorian: {date: 1299-01-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the assassination in Rabīʿ al-Awwal 698 AH and names Kurjī as the lead conspirator."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the death under the obituaries of 698 AH."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's al-Durar al-Kāmina gives the standard biographical entry on Lāǧīn."
    people: [[al-mansur-lajin, subject]]
    tags: [mamluk, bahri, egypt, cairo, sultan-death, assassination, citadel]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # FOUNDATION OF THE BURJI DYNASTY (784 AH / 1382)
  # =========================================================================

  - slug: accession-of-al-zahir-barquq
    category: political_event
    title_en: Accession of al-Ẓāhir Barqūq — Founding Sultan of the Burji Mamlūks
    title_ar: تولِّي السلطان الظاهر برقوق — مؤسس دولة المماليك الجراكسة (البرجية)
    title_fr: Avènement d'al-Ẓāhir Barqūq — sultan fondateur des Mamelouks burji
    description_en: |
      Sayf al-Dīn Barqūq al-Yalbughāwī al-Ẓāhirī — a Circassian
      *mamlūk* purchased and trained by the great amīr Yalbughā
      al-ʿUmarī al-Khāṣṣakī — assumed the sultanate of Egypt as
      al-Malik al-Ẓāhir Sayf al-Dīn Barqūq, deposing the last
      Bahri puppet sultan al-Ṣāliḥ Ḥājjī II. The accession
      inaugurated the Burji (Circassian) period of the Mamlūk
      sultanate, named after the *burj* (citadel) regiments at
      Cairo's citadel that formed Barqūq's political base. Where
      the preceding Bahri sultanate had been dominated by Turkic
      mamlūks and quasi-dynastic transmission within the line
      of Qalāwūn, the Burji order would be Circassian and
      strictly elective: each sultan was chosen by the senior
      amīrs from among themselves. Barqūq's reign — interrupted
      by a coup that removed him in 791 AH and restored him in
      792 AH — would last until 801 AH and frame the system
      that governed Egypt and Syria for 135 years. He is buried
      at his madrasa-tomb on Bayn al-Qaṣrayn in Cairo.
    description_ar: |
      تولّى الأمير سيف الدين برقوق اليلبغاوي الظاهري — وهو
      مملوك جركسي اشتراه وربّاه الأميرُ يلبغا العمري الخاصكي —
      السلطنةَ بمصر باسم الملك الظاهر سيف الدين برقوق، فعزل
      آخر سلاطين البحرية الصوريّين الصالح حاجي الثاني. وافتتح
      ذلك العهدَ المملوكي البرجي (الجركسي)، وسمي «البرجياً»
      نسبةً إلى الكتائب البرجية في قلعة الجبل بالقاهرة التي
      كانت قاعدةَ حُكم برقوق السياسية. وحيث كانت سلطنة البحرية
      السابقة في يد المماليك الترك مع توارثٍ شبهِ ملكي في
      أسرة قلاوون، كان النظام البرجي جركسياً وانتخابياً
      صرفاً: يختار كبارُ الأمراء السلطانَ من بينهم. وامتدّ
      حكم برقوق — وقد قُطع بانقلاب أزاحه سنة ٧٩١ هـ ثم رُدّ
      إلى السلطنة سنة ٧٩٢ هـ — حتى سنة ٨٠١ هـ، وأرسى النظام
      الذي ستحكم به الدولة المملوكية مصرَ والشام مئةً وخمساً
      وثلاثين سنة. ودفن بمدرسته المعروفة بمدرسة برقوق ببين
      القصرين بالقاهرة.
    description_fr: |
      L'émir Sayf al-Dīn Barqūq al-Yalbughāwī al-Ẓāhirī — un
      *mamlūk* circassien acheté et formé par le grand émir
      Yalbughā al-ʿUmarī al-Khāṣṣakī — accéda au sultanat
      d'Égypte sous le nom d'al-Malik al-Ẓāhir Sayf al-Dīn
      Barqūq, déposant le dernier sultan baḥrī fantoche al-Ṣāliḥ
      Ḥājjī II. Cet avènement inaugura la période burji
      (circassienne) du sultanat mamelouk, nommée d'après les
      régiments du *burj* (citadelle) du Caire qui formaient la
      base politique de Barqūq. Là où le sultanat baḥrī
      précédent avait été dominé par des mamelouks turcs avec
      une transmission quasi-dynastique au sein de la lignée
      de Qalāwūn, l'ordre burji serait circassien et strictement
      électif : chaque sultan était choisi par les hauts émirs
      en leur sein. Le règne de Barqūq — interrompu par un
      coup d'État qui le déposa en 791 H et le restaura en
      792 H — durerait jusqu'en 801 H et fonderait le système
      qui gouverna l'Égypte et la Syrie pendant 135 ans. Il
      est enterré dans son tombeau-madrasa de Bayn al-Qaṣrayn
      au Caire.
    canonical_hijri: {year: 784, month: 11, day: 19, precision: day}
    canonical_gregorian: {date: 1382-11-26, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina gives the date 19 Ramaḍān 784 AH for Barqūq's enthronement (in his account of the events of the year)."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab confirms 784 AH as the year Barqūq took the throne and the founding of the Burji line."
      - source_key: ei2
        notes: "EI2 'Burdjī' and 'Barḳūḳ' entries set the accession on 19 Ramaḍān 784 AH / 26 November 1382 CE."
    people: [[al-zahir-barquq, subject]]
    tags: [mamluk, burji, circassian, egypt, cairo, sultanate-foundation, dynasty]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # BURJI SULTANS — BARQUQ AND HIS SON FARAJ (801, 815 AH)
  # =========================================================================

  - slug: death-of-al-zahir-barquq
    category: ruler_death
    title_en: Death of Sultan al-Ẓāhir Barqūq — Founder of the Burji Mamlūks
    title_ar: وفاة السلطان الظاهر برقوق — مؤسس دولة المماليك البرجية
    title_fr: Mort du sultan al-Ẓāhir Barqūq — fondateur des Mamelouks burji
    description_en: |
      al-Malik al-Ẓāhir Sayf al-Dīn Barqūq — first Burji sultan
      and founder of the Circassian Mamlūk order — died at the
      Cairo citadel after a fortnight's illness, aged about 60.
      His seventeen-year reign (interrupted by an eight-month
      deposition in 791-792 AH) had stabilised Egypt after the
      famines and plagues of the late Bahri period, restored
      Mamlūk authority over Syria after the revolt of Yalbughā
      al-Nāṣirī, and mobilised the army that would face Tīmūr's
      first sortie westward. He had named his ten-year-old son
      Faraj as successor — the first hereditary transmission in
      the Burji line (a contradiction of the Burji elective
      principle that would not survive the dynasty's middle
      decades). He was buried in the great mausoleum-madrasa he
      had built between the cities (*bayn al-qaṣrayn*) on Cairo's
      ceremonial axis. Ibn Ḥajar al-ʿAsqalānī, who entered legal
      adulthood under Barqūq's reign, gives a long obituary in
      al-Durar al-Kāmina.
    description_ar: |
      توفي السلطان الملك الظاهر سيف الدين برقوق — أول سلاطين
      المماليك الجراكسة ومؤسس دولتهم البرجية — بقلعة الجبل
      بالقاهرة بعد علةٍ خمسةَ عشر يوماً، عن نحو ستين سنة. وكان
      عهدُه الذي امتدّ سبع عشرة سنة — تخلّله خلعٌ ثمانيةَ أشهر
      بين سنتي ٧٩١ و٧٩٢ هـ — قد ثبّت أمر مصر بعد المجاعات
      والأوبئة في أواخر العهد البحري، وأعاد سلطان المماليك على
      الشام بعد ثورة يلبغا الناصري، وعبّأ الجيشَ الذي سيواجه
      أول طلائع غزو تيمور لنك للغرب. وكان قد عهد إلى ابنه فرج
      وعمره عشر سنوات بالولاية من بعده — وذلك أول توريث في
      السلسلة البرجية، مخالفاً للأصل البرجي الانتخابي الذي
      لن يصمد طويلاً في عقود الدولة الوسطى. ودفن بمدرسته
      ومدفنه الكبيرين ببين القصرين على المحور الاحتفالي
      بالقاهرة. ويُترجم له ابن حجر العسقلاني — الذي بلغ سنّ
      البلوغ في عهده — ترجمةً مطوّلة في الدرر الكامنة.
    description_fr: |
      al-Malik al-Ẓāhir Sayf al-Dīn Barqūq — premier sultan
      burji et fondateur de l'ordre mamelouk circassien — mourut
      à la citadelle du Caire après quinze jours de maladie, à
      l'âge d'environ 60 ans. Son règne de dix-sept ans
      (interrompu par une déposition de huit mois en 791-792 H)
      avait stabilisé l'Égypte après les famines et les
      épidémies de la fin de la période baḥrī, restauré
      l'autorité mamelouke sur la Syrie après la révolte de
      Yalbughā al-Nāṣirī, et mobilisé l'armée qui ferait face à
      la première percée occidentale de Tīmūr. Il avait désigné
      son fils Faraj, alors âgé de dix ans, comme successeur —
      première transmission héréditaire dans la lignée burji,
      en contradiction avec le principe électif burji qui ne
      survivrait pas aux décennies médianes de la dynastie. Il
      fut enterré dans le grand mausolée-madrasa qu'il avait
      bâti entre les cités (*bayn al-qaṣrayn*) sur l'axe
      cérémoniel du Caire. Ibn Ḥajar al-ʿAsqalānī, qui atteignit
      la majorité légale sous le règne de Barqūq, en donne une
      longue notice nécrologique dans *al-Durar al-Kāmina*.
    canonical_hijri: {year: 801, month: 6, day: 15, precision: day}
    canonical_gregorian: {date: 1399-02-23, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina places the death on 15 Shawwāl 801 AH and gives a detailed obituary."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab confirms the death in Shawwāl 801 AH at the Cairo citadel."
      - source_key: ei2
        notes: "EI2 'Barḳūḳ' entry confirms the date and the succession of his son Faraj."
    people: [[al-zahir-barquq, subject]]
    tags: [mamluk, burji, egypt, cairo, sultan-death, citadel, founder]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: assassination-of-faraj-ibn-barquq
    category: ruler_death
    title_en: Assassination of Sultan al-Nāṣir Faraj ibn Barqūq at Damascus
    title_ar: مقتل السلطان الناصر فرج بن برقوق بدمشق
    title_fr: Assassinat du sultan al-Nāṣir Faraj ibn Barqūq à Damas
    description_en: |
      al-Malik al-Nāṣir Faraj ibn Barqūq — second Burji sultan,
      who acceded at age ten on his father's death in 801 AH —
      was tried and executed at Damascus by the rebellious amīrs
      Shaykh al-Maḥmūdī (the future sultan al-Muʾayyad Shaykh)
      and Nawrūz al-Ḥāfiẓī after a brief siege of the Damascus
      citadel. His twelve-year reign had been catastrophic: he
      faced Tīmūr's invasion in 803 AH that sacked Aleppo and
      Damascus, multiple amīr revolts in Syria, and his own
      capacity for paranoid violence against the senior Mamlūk
      establishment. After being deposed by his half-brother
      al-Manṣūr ʿAbd al-ʿAzīz for a few months in 808 AH, he
      had recovered the throne; but a fresh Syrian revolt in
      815 AH led him to march on Damascus where he was besieged
      in the citadel, surrendered on terms, and was nevertheless
      put on a sham trial for his violations of the Sharīʿa
      (the *fatwā* declaring him deserving of death was signed
      by jurists under coercion) and beheaded. The execution
      ended Burqūq's hereditary line and restored the Burji
      elective principle. Ibn Ḥajar gives a sombre obituary.
    description_ar: |
      مُحوكم وقُتل السلطان الملك الناصر فرج بن برقوق — ثاني
      سلاطين البرجية، الذي تولّى السلطنة وعمره عشر سنوات بعد
      وفاة أبيه سنة ٨٠١ هـ — بدمشق على يد الأميرين الثائرين
      الشيخ المحمودي (وهو السلطان المؤيد شيخ لاحقاً) ونوروز
      الحافظي بعد حصار وجيز لقلعة دمشق. وكان عهده الذي امتدّ
      اثنتي عشرة سنة كارثياً: واجه فيه غزو تيمور لنك سنة
      ٨٠٣ هـ الذي سُلبت فيه حلب ودمشق، وثوراتٍ متعدّدة
      للأمراء بالشام، وكان هو نفسه ذا نزعة قتلٍ لكبار رجال
      الدولة. وبعد خلعه من قِبَل أخيه غير الشقيق المنصور
      عبد العزيز أشهراً سنة ٨٠٨ هـ، استعاد العرش؛ لكن ثورةً
      شامية جديدة سنة ٨١٥ هـ ساقتْه على دمشق فحوصر بقلعتها،
      فاستسلم على أمان، فحوكم بمحاكمة صورية على مخالفاته
      للشريعة (وقّع الفقهاء الفتوى المُحلّةَ دمَه تحت الإكراه)
      ثم قُطع رأسه. وأنهى الإعدامُ السلسلةَ الوراثية لبرقوق،
      وأعاد المبدأ البرجي الانتخابي. ويترجم له ابن حجر ترجمةً
      حزينة.
    description_fr: |
      al-Malik al-Nāṣir Faraj ibn Barqūq — second sultan burji,
      qui accéda à dix ans à la mort de son père en 801 H —
      fut jugé et exécuté à Damas par les émirs rebelles
      Shaykh al-Maḥmūdī (le futur sultan al-Muʾayyad Shaykh)
      et Nawrūz al-Ḥāfiẓī après un bref siège de la citadelle
      de Damas. Son règne de douze ans avait été catastrophique :
      il dut affronter l'invasion de Tīmūr en 803 H qui mit à
      sac Alep et Damas, de multiples révoltes d'émirs en
      Syrie, et son propre penchant pour la violence
      paranoïaque envers l'establishment mamelouk. Après sa
      déposition par son demi-frère al-Manṣūr ʿAbd al-ʿAzīz
      pour quelques mois en 808 H, il avait recouvré le trône;
      mais une nouvelle révolte syrienne en 815 H le conduisit
      à marcher sur Damas où il fut assiégé dans la citadelle,
      se rendit sous conditions et fut néanmoins traduit dans
      un simulacre de procès pour ses violations de la Sharīʿa
      (la *fatwā* le déclarant méritant la mort fut signée
      par des juristes sous contrainte) et décapité.
      L'exécution mit fin à la lignée héréditaire de Barqūq
      et restaura le principe électif burji. Ibn Ḥajar lui
      consacre une notice nécrologique sombre.
    canonical_hijri: {year: 815, month: 5, day: 16, precision: day}
    canonical_gregorian: {date: 1412-08-23, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina places the execution on 16 Ṣafar 815 AH at Damascus and details the trial."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab confirms 815 AH and the role of Shaykh al-Maḥmūdī and Nawrūz."
      - source_key: ei2
        notes: "EI2 'Faradj' entry confirms the date and circumstances at Damascus."
    people: [[al-nasir-faraj, subject], [al-zahir-barquq, subject]]
    tags: [mamluk, burji, egypt, damascus, sultan-death, execution, civil-war]
    importance: notable
