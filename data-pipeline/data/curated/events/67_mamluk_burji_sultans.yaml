  # =========================================================================
  # MID-BURJI SULTANS — MUAYYAD SHAYKH, BARSBAY, JAQMAQ
  # =========================================================================

  - slug: death-of-al-muayyad-shaykh
    category: ruler_death
    title_en: Death of Sultan al-Muʾayyad Shaykh — Builder of the Mosque of al-Muʾayyad
    title_ar: وفاة السلطان المؤيد شيخ — باني جامع المؤيد بالقاهرة
    title_fr: Mort du sultan al-Muʾayyad Shaykh — bâtisseur de la mosquée d'al-Muʾayyad
    description_en: |
      al-Malik al-Muʾayyad Sayf al-Dīn Shaykh al-Maḥmūdī —
      sixth Burji sultan and the strongest of the dynasty's
      early generation — died at the Cairo citadel after a
      protracted illness, aged about 51. The Circassian
      *mamlūk* of Sultan Barqūq who had risen to viceroy of
      Tripoli and then participated in the deposition and
      execution of Faraj at Damascus in 815 AH, he had taken
      the throne in Shaʿbān 815 AH and ruled for eight years.
      His reign saw a stabilisation of Egypt after the chaos
      of Faraj's last years, military expeditions against the
      Karamanids and the principality of Cyprus, and a major
      building programme in Cairo — most famously the
      mosque-madrasa al-Muʾayyad next to Bāb Zuwayla in the
      Fatimid southern wall, with its twin minarets rising
      directly atop the eleventh-century gate, that still
      stands and is among the most visited monuments of
      Mamlūk Cairo. He was buried within the mosque
      complex itself. Ibn Ḥajar al-ʿAsqalānī, his
      contemporary, gives a long obituary in al-Durar
      al-Kāmina.
    description_ar: |
      توفي السلطان الملك المؤيد سيف الدين شيخ المحمودي —
      سادس سلاطين البرجية وأقواهم في الجيل الأول من
      الدولة — بقلعة الجبل بالقاهرة بعد علةٍ طويلة، عن
      نحو إحدى وخمسين سنة. وكان مملوكاً جركسياً للسلطان
      برقوق ترقّى إلى نيابة طرابلس، ثم اشترك في خلع
      الناصر فرج وقتله بدمشق سنة ٨١٥ هـ، ثم تولى
      السلطنة في شعبان من السنة نفسها، فحكم ثماني سنوات.
      وفي عهده استقرّت أحوال مصر بعد فوضى السنوات
      الأخيرة من ملك فرج، وأُرسلت حملاتٌ على بني
      كرمان وعلى مملكة قبرص، ونُفّذ مشروع عمراني كبير
      في القاهرة — وأشهرَ آثاره جامعُه ومدرستُه «المؤيد»
      بجوار باب زويلة من السور الفاطمي الجنوبي، الذي
      تنتصب مأذنتاه التوأمتان فوق نفس الباب الفاطمي
      من القرن الخامس الهجري، ولا يزال قائماً، وهو من
      أكثر آثار القاهرة المملوكية زيارةً. ودفن في مجمع
      الجامع نفسه. ويترجم له ابن حجر العسقلاني — معاصره —
      ترجمة مطوّلة في الدرر الكامنة.
    description_fr: |
      al-Malik al-Muʾayyad Sayf al-Dīn Shaykh al-Maḥmūdī —
      sixième sultan burji et le plus fort de la première
      génération de la dynastie — mourut à la citadelle du
      Caire après une longue maladie, à l'âge d'environ 51 ans.
      Mamelouk circassien du sultan Barqūq, il s'était élevé
      jusqu'à la vice-royauté de Tripoli puis avait participé
      à la déposition et à l'exécution de Faraj à Damas en
      815 H, avant de prendre le trône en Shaʿbān 815 H et de
      régner huit ans. Son règne vit une stabilisation de
      l'Égypte après le chaos des dernières années de Faraj,
      des expéditions militaires contre les Karamanides et
      la principauté de Chypre, et un grand programme de
      construction au Caire — au premier rang duquel la
      mosquée-madrasa d'al-Muʾayyad jouxtant Bāb Zuwayla
      dans la muraille fatimide sud, dont les deux minarets
      jumeaux s'élèvent directement au-dessus de la porte du
      XIᵉ siècle, et qui est encore debout, parmi les
      monuments les plus visités du Caire mamelouk. Il fut
      enterré dans le complexe de la mosquée elle-même.
      Ibn Ḥajar al-ʿAsqalānī, son contemporain, lui consacre
      une longue notice nécrologique dans *al-Durar al-Kāmina*.
    canonical_hijri: {year: 824, month: 1, day: 9, precision: day}
    canonical_gregorian: {date: 1421-01-13, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina places the death on 9 Muḥarram 824 AH at the Cairo citadel and gives a long obituary."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab confirms the death in Muḥarram 824 AH."
      - source_key: ei2
        notes: "EI2 'al-Muʾayyad Shaykh' entry sets the date and the founding of the mosque-complex by Bāb Zuwayla."
    people: [[al-muayyad-shaykh, subject]]
    tags: [mamluk, burji, egypt, cairo, sultan-death, architecture, bab-zuwayla]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: mamluk-conquest-of-cyprus
    category: conquest
    title_en: Mamlūk Conquest of Cyprus — Barsbāy's Naval Expedition against the Lusignans
    title_ar: الفتح المملوكي لقبرص — حملة الأشرف برسباي البحرية على اللوزنيانيين
    title_fr: Conquête mamelouke de Chypre — expédition navale de Barsbāy contre les Lusignan
    description_en: |
      The Mamlūk fleet of Sultan al-Ashraf Barsbāy — sent in
      response to repeated Cypriot Lusignan raids on the
      Egyptian and Syrian coasts and the harbouring of
      Catalan corsairs at Famagusta — captured the Lusignan
      kingdom of Cyprus in a campaign of three weeks. The
      Mamlūk landing at Limassol was followed by the decisive
      battle of Khirokitia on 27 Shawwāl 829 AH (the date
      al-Maqrīzī gives), in which the Cypriot forces of King
      Janus de Lusignan were destroyed and the king himself
      captured. He was carried to Cairo and held for a
      ransom of 200,000 dinars and an annual tribute. The
      conquest reduced the Lusignan kingdom — last Crusader-
      lineage state in the eastern Mediterranean — to
      Mamlūk vassalage; the tribute was paid until the
      Venetians took over the island a century later. It
      was the most ambitious Mamlūk overseas expedition;
      Ibn Ḥajar and Ibn Taghrībirdī both record the campaign
      in detail. (This was the mature-Mamlūk conquest, not
      to be confused with the seventh-century Rashidun
      naval expedition under Muʿāwiya in 28 AH.)
    description_ar: |
      افتتح أسطولُ السلطان الأشرف برسباي المملوكي — الذي
      أُرسل ردّاً على الغارات اللوزنيانية القبرصية المتوالية
      على سواحل مصر والشام، وعلى إيواء الفرنجة الكاتالان
      في فمغوست — مملكةَ قبرص اللوزنيانية في حملة ثلاثة
      أسابيع. وأعقب نزولَ الجيش المملوكي بليماسول معركةُ
      خيروكيتيا الفاصلة في ٢٧ شوال سنة ٨٢٩ هـ (التاريخ
      الذي يذكره المقريزي)، أُبيدت فيها قواتُ الملك
      الفرنجي جانوس دو لوزينيان، وأُسر الملك نفسُه فحُمل
      إلى القاهرة وأُطلق على فدية مقدارها مئتا ألف دينار
      وجزية سنوية. وأنزل الفتحُ مملكةَ اللوزنيانيين —
      آخرَ دولة من السلالات الصليبية في شرق المتوسط —
      إلى تبعية المماليك؛ وبقيت الجزية تؤدّى إلى أن أخذ
      البنادقة الجزيرة بعد قرن. وكانت أكبر حملة مملوكية
      وراء البحار، يفصِّلها ابن حجر وابن تغري بردي. (هذا
      هو الفتح المملوكي الناضج، يختلف عن الحملة البحرية
      الراشدية التي قادها معاوية رضي الله عنه سنة ٢٨ هـ.)
    description_fr: |
      La flotte mamelouke du sultan al-Ashraf Barsbāy —
      envoyée en réponse aux raids répétés des Chypriotes
      Lusignan sur les côtes égyptiennes et syriennes et à
      l'hébergement de corsaires catalans à Famagouste —
      s'empara du royaume Lusignan de Chypre en une
      campagne de trois semaines. Le débarquement mamelouk
      à Limassol fut suivi de la bataille décisive de
      Khirokitia le 27 Shawwāl 829 H (date donnée par
      al-Maqrīzī), où les forces chypriotes du roi Janus
      de Lusignan furent détruites et le roi lui-même
      capturé. Il fut emmené au Caire et gardé contre une
      rançon de 200 000 dinars et un tribut annuel. La
      conquête réduisit le royaume Lusignan — dernier
      État issu des lignées croisées en Méditerranée
      orientale — à une vassalité mamelouke; le tribut fut
      versé jusqu'à ce que les Vénitiens prennent l'île un
      siècle plus tard. Ce fut la plus ambitieuse
      expédition mamelouke d'outre-mer; Ibn Ḥajar et Ibn
      Taghrībirdī en consignent tous deux le détail. (Il
      s'agit de la conquête mamelouke mature, à ne pas
      confondre avec l'expédition navale rashidun du
      VIIᵉ siècle sous Muʿāwiya en 28 H.)
    canonical_hijri: {year: 829, month: 10, day: 27, precision: day}
    canonical_gregorian: {date: 1426-09-02, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina (and Inbāʾ al-Ghumr) records the Cyprus campaign under 829 AH and the capture of King Janus."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab enters the conquest under 829 AH."
      - source_key: ei2
        notes: "EI2 'Barsbāy' and 'Ḳubrus' entries set the conquest in summer 1426 CE / Shawwāl 829 AH."
    people: [[al-ashraf-barsbay, leader]]
    tags: [mamluk, burji, egypt, cyprus, naval, lusignan, conquest]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-ashraf-barsbay
    category: ruler_death
    title_en: Death of Sultan al-Ashraf Barsbāy — Conqueror of Cyprus
    title_ar: وفاة السلطان الأشرف برسباي — فاتح قبرص
    title_fr: Mort du sultan al-Ashraf Barsbāy — conquérant de Chypre
    description_en: |
      al-Malik al-Ashraf Sayf al-Dīn Barsbāy al-Ẓāhirī —
      ninth Burji sultan and conqueror of Cyprus — died at
      the Cairo citadel of plague (or a complication of one
      of the recurrent plague waves of his reign), aged
      about 67. His sixteen-year reign saw the conquest of
      Cyprus in 829 AH (1426 CE) which made the Lusignan
      kingdom a Mamlūk vassal, the imposition of a Mamlūk
      monopoly over the Indian Ocean spice and pepper
      trade through the Red Sea ports of ʿAydhāb and
      Jeddah, and a major architectural programme in Cairo
      including his madrasa-mausoleum at the Northern
      Cemetery (Qarāfa) which still stands. He was the
      last Burji sultan to maintain a strong Egyptian
      treasury before the silver and demographic crises of
      the mid-ninth-century AH; the spice monopoly was
      abandoned by his successors. Ibn Ḥajar al-ʿAsqalānī,
      one of the senior religious officials of his court,
      gives a long obituary.
    description_ar: |
      توفي السلطان الملك الأشرف سيف الدين برسباي الظاهري —
      تاسع سلاطين البرجية وفاتح قبرص — بقلعة الجبل
      بالقاهرة بالطاعون (أو علةٍ من علل موجات الوباء
      المتكرّرة في عهده)، عن نحو سبع وستين سنة. وفي عهده
      الذي امتدّ ست عشرة سنة كان فتحُ قبرص سنة ٨٢٩ هـ
      (١٤٢٦ م) الذي جعل مملكة اللوزنيانيين تابعة
      للمماليك، وفُرض احتكار مملوكي على تجارة التوابل
      والفلفل بالمحيط الهندي عبر موانئ البحر الأحمر بعيذاب
      وجدة، ونُفّذ مشروع عمراني كبير في القاهرة منه
      مدرستُه ومدفنُه بالقرافة الشمالية، ولا يزال قائماً.
      وكان آخر سلاطين البرجية الذين حافظوا على قوة الخزانة
      المصرية قبل أزمات الفضة والسكان في منتصف القرن
      التاسع الهجري، وتخلّى خلفاؤه عن احتكار التوابل.
      ويترجم له ابن حجر العسقلاني — وكان من رجال البلاط
      الديني الكبار — ترجمة مطوّلة.
    description_fr: |
      al-Malik al-Ashraf Sayf al-Dīn Barsbāy al-Ẓāhirī —
      neuvième sultan burji et conquérant de Chypre —
      mourut à la citadelle du Caire de la peste (ou d'une
      complication de l'une des vagues pestilentielles
      récurrentes de son règne), à l'âge d'environ 67 ans.
      Son règne de seize ans vit la conquête de Chypre en
      829 H (1426 EC) qui fit du royaume Lusignan un vassal
      mamelouk, l'imposition d'un monopole mamelouk sur le
      commerce des épices et du poivre de l'océan Indien
      via les ports de la mer Rouge ʿAydhāb et Djedda, et
      un grand programme architectural au Caire dont sa
      madrasa-mausolée du Cimetière du Nord (Qarāfa) qui
      tient encore debout. Il fut le dernier sultan burji
      à maintenir un trésor égyptien fort avant les crises
      d'argent et démographiques du milieu du IXᵉ siècle H;
      le monopole des épices fut abandonné par ses
      successeurs. Ibn Ḥajar al-ʿAsqalānī, l'un des grands
      officiers religieux de sa cour, lui consacre une
      longue notice nécrologique.
    canonical_hijri: {year: 841, month: 12, day: 13, precision: day}
    canonical_gregorian: {date: 1438-06-07, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina (and Inbāʾ al-Ghumr) places the death on 13 Dhū al-Ḥijja 841 AH at the Cairo citadel."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab confirms the death in Dhū al-Ḥijja 841 AH."
      - source_key: ei2
        notes: "EI2 'Barsbāy' entry sets the date 7 June 1438 CE / 13 Dhū al-Ḥijja 841 AH."
    people: [[al-ashraf-barsbay, subject]]
    tags: [mamluk, burji, egypt, cairo, sultan-death, plague, cyprus, spice-trade]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-zahir-jaqmaq
    category: ruler_death
    title_en: Death of Sultan al-Ẓāhir Jaqmaq — The Pious Burji of Cairo
    title_ar: وفاة السلطان الظاهر جقمق — السلطان البرجي الزاهد
    title_fr: Mort du sultan al-Ẓāhir Jaqmaq — le pieux burji du Caire
    description_en: |
      al-Malik al-Ẓāhir Sayf al-Dīn Jaqmaq al-ʿAlāʾī — twelfth
      Burji sultan, who acceded at age about 65 in 842 AH on
      the death of his predecessor al-ʿAzīz Yūsuf — died at
      the Cairo citadel after a brief illness, aged about 80.
      His fifteen-year reign was the longest of any Burji
      sultan after Barqūq, and the most peaceful: he avoided
      major external wars (sending only limited expeditions
      to Cyprus and Rhodes), governed Egypt with a reputation
      for personal piety and asceticism — Ibn Ḥajar and
      al-Sakhāwī both note that he prayed the night vigils
      and avoided wine and music — and patronised the Sunni
      religious establishment heavily, founding several
      madrasas and Sufi *zāwiyas* in Cairo. He attempted to
      pass the throne to his son al-Manṣūr ʿUthmān, but the
      amīrs deposed ʿUthmān within weeks of Jaqmaq's death,
      consistent with the Burji elective principle that
      hereditary transmission was an exception. He was buried
      at his madrasa-tomb in the Northern Cemetery. Ibn al-ʿImād
      and the contemporary historian al-Sakhāwī give detailed
      obituaries.
    description_ar: |
      توفي السلطان الملك الظاهر سيف الدين جقمق العلائي —
      ثاني عشر سلاطين البرجية، الذي تولّى السلطنة في نحو
      الخامسة والستين سنة ٨٤٢ هـ بعد وفاة سلفه العزيز
      يوسف — بقلعة الجبل بالقاهرة بعد علةٍ وجيزة، عن
      نحو ثمانين سنة. وكان عهده الذي امتدّ خمس عشرة سنة
      أطول عهود سلاطين البرجية بعد برقوق، وأهدأها: تجنّب
      الحروب الخارجية الكبرى (وأرسل حملاتٍ محدودة فقط
      إلى قبرص ورودس)، وحكم مصر بسمعةٍ من ورع شخصي وزهد —
      يذكر ابن حجر والسخاوي أنه يقوم الليل ويتجنّب الخمر
      والمعازف — وأكرم العلماء أهل السنة كرماً وافراً،
      فأسّس عدة مدارس وزوايا صوفية بالقاهرة. وحاول
      توريث ابنه المنصور عثمان السلطنة، لكن الأمراء
      خلعوا عثمان في أسابيع من وفاة جقمق، وفقاً للمبدأ
      البرجي الانتخابي القائل إن التوريث استثناء. ودفن
      بمدرسته ومدفنه بالقرافة الشمالية. ويترجم له ابن
      العماد والسخاوي معاصرَيه ترجمتين مفصّلتين.
    description_fr: |
      al-Malik al-Ẓāhir Sayf al-Dīn Jaqmaq al-ʿAlāʾī —
      douzième sultan burji, qui accéda à environ 65 ans en
      842 H à la mort de son prédécesseur al-ʿAzīz Yūsuf —
      mourut à la citadelle du Caire après une brève maladie,
      à l'âge d'environ 80 ans. Son règne de quinze ans fut
      le plus long de tout sultan burji après Barqūq, et le
      plus paisible : il évita les grandes guerres extérieures
      (n'envoyant que des expéditions limitées à Chypre et à
      Rhodes), gouverna l'Égypte avec une réputation de
      piété personnelle et d'ascèse — Ibn Ḥajar et al-Sakhāwī
      notent tous deux qu'il accomplissait les veilles
      nocturnes et évitait le vin et la musique — et
      patronna abondamment l'establishment religieux sunnite,
      fondant plusieurs madrasas et *zāwiyas* soufies au
      Caire. Il tenta de transmettre le trône à son fils
      al-Manṣūr ʿUthmān, mais les émirs déposèrent ʿUthmān
      dans les semaines suivant la mort de Jaqmaq,
      conformément au principe électif burji selon lequel
      la transmission héréditaire est une exception. Il fut
      enterré dans sa madrasa-tombeau du Cimetière du Nord.
      Ibn al-ʿImād et l'historien contemporain al-Sakhāwī en
      donnent des notices nécrologiques détaillées.
    canonical_hijri: {year: 857, month: 2, day: 3, precision: day}
    canonical_gregorian: {date: 1453-02-13, precision: day, method: attested}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab places the death on 3 Ṣafar 857 AH at the Cairo citadel."
      - source_key: ibn_hajar_durar
        notes: "Ibn Ḥajar's Inbāʾ al-Ghumr (continuation of al-Durar) confirms the death in Ṣafar 857 AH."
      - source_key: ei2
        notes: "EI2 'D̲j̲aḳmaḳ' entry sets the date 13 February 1453 CE / 3 Ṣafar 857 AH."
