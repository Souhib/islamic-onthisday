        is_canonical: true
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab places the execution on 21 Rabīʿ al-Awwal 923 AH at Bāb Zuwayla."
      - source_key: ei2
        notes: "EI2 'Ṭūmān Bāy II' and 'Bāb Zuwayla' entries set the execution on 13 April 1517 CE / 21 Rabīʿ I 923 AH."
    people: [[tuman-bay-ii, subject], [selim-i, subject]]
    tags: [mamluk, burji, egypt, cairo, sultan-death, execution, bab-zuwayla, ottoman, dynasty-end]
