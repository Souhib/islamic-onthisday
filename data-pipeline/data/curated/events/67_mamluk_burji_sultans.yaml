  - slug: execution-of-tuman-bay-ii
    category: ruler_death
    title_en: Execution of Ṭūmān Bāy II — Last Mamlūk Sultan, Hanged at Bāb Zuwayla
    title_ar: إعدام طومان باي الثاني — آخر سلاطين المماليك يُشنق على باب زويلة
    title_fr: Exécution de Ṭūmān Bāy II — dernier sultan mamelouk, pendu à Bāb Zuwayla
    description_en: |
      al-Malik al-Ashraf Ṭūmān Bāy II — twenty-second and last
      Burji Mamlūk sultan, who had taken the throne in
      Ramaḍān 922 AH on the death of Qānṣūh al-Ghawrī at
      Marj Dābiq — was hanged at Bāb Zuwayla, the southern
      Fatimid gate of Cairo, on the orders of the Ottoman
      sultan Selim I, three months after the Ottoman entry
      into the city. Defeated at Raydāniyya north of Cairo
      on 29 Dhū al-Ḥijja 922 AH (22 January 1517 CE),
      Ṭūmān Bāy had escaped the field and conducted
      organised street-fighting in Cairo's western suburbs
      and on the Nile islands; his refusal to capitulate
      and his rallying of Bedouin allies in the Delta
      after a brief escape made him a continuing threat to
      Ottoman authority. Captured in the Buḥayra by tribal
      betrayal in mid-Rabīʿ I 923 AH, he was brought to
      Cairo and hanged at Bāb Zuwayla — the same gate
      al-Muʾayyad Shaykh's twin minarets had been built
      atop a century earlier — in front of a Cairo crowd.
      The classical sources, especially Ibn Iyās (eyewitness
      throughout, no friend of Selim's regime), describe
      the rope breaking twice before the execution
      succeeded; Ṭūmān Bāy is reported to have refused a
      blindfold and recited the *shahāda* aloud. His death
      is the textbook closing date of Mamlūk rule in Egypt
      and the symbolic end of the Burji sultanate.
    description_ar: |
      شُنق السلطان الملك الأشرف طومان باي الثاني — ثاني
      وعشرون سلاطين البرجية وآخرهم، الذي تولّى السلطنة
      في رمضان سنة ٩٢٢ هـ بعد مقتل قانصوه الغوري في مرج
      دابق — على باب زويلة (الباب الفاطمي الجنوبي
      للقاهرة) بأمر السلطان العثماني سليم الأول، بعد
      ثلاثة أشهر من دخول العثمانيين القاهرة. وكان قد
      هُزم في الريدانية شمال القاهرة في ٢٩ ذي الحجة
      ٩٢٢ هـ (٢٢ يناير ١٥١٧ م)، فأفلت من الميدان وقاد
      قتالاً منظَّماً في الأحياء الغربية للقاهرة وجزر
      النيل؛ وأبقى رفضُه التسليم واستجماعه حلفاء البدو
      في الدلتا بعد فرار وجيز خطره مستمراً على السلطة
      العثمانية. ولما خانه القبائلُ بالبحيرة في منتصف
      ربيع الأول سنة ٩٢٣ هـ سيق إلى القاهرة فشُنق على
      باب زويلة — نفس الباب الذي بُنيت فوقه مأذنتا
      جامع المؤيد التوأمتان قبل قرن — أمام جموع أهل
      القاهرة. وتذكر المصادر الكلاسيكية، ولا سيما ابن
      إياس (شاهد العيان طول الحادثة، وغير صديق لنظام
      سليم)، أن حبل المشنقة انقطع مرتين قبل أن تنفذ
      العقوبة؛ ويُروى أن طومان باي رفض العصابة ونطق
      الشهادة جهراً. وموتُه التاريخ الكتابي لإغلاق
      حكم المماليك في مصر، والنهاية الرمزية لدولة
      البرجية.
    description_fr: |
      al-Malik al-Ashraf Ṭūmān Bāy II — vingt-deuxième et
      dernier sultan mamelouk burji, qui avait pris le trône
      en Ramaḍān 922 H à la mort de Qānṣūh al-Ghawrī à Marj
      Dābiq — fut pendu à Bāb Zuwayla, la porte fatimide
      sud du Caire, sur les ordres du sultan ottoman Selim I,
      trois mois après l'entrée ottomane dans la ville.
      Défait à Raydāniyya au nord du Caire le 29 Dhū
      al-Ḥijja 922 H (22 janvier 1517 EC), Ṭūmān Bāy s'était
      échappé du champ de bataille et avait conduit un combat
      de rue organisé dans les quartiers ouest du Caire et
      sur les îles du Nil; son refus de capituler et son
      ralliement d'alliés bédouins dans le Delta après une
      brève évasion firent de lui une menace persistante
      pour l'autorité ottomane. Capturé dans la Buḥayra par
      trahison tribale à la mi-Rabīʿ I 923 H, il fut amené
      au Caire et pendu à Bāb Zuwayla — la même porte
      au-dessus de laquelle les deux minarets jumeaux
      d'al-Muʾayyad Shaykh avaient été bâtis un siècle plus
      tôt — devant une foule cairote. Les sources
      classiques, en particulier Ibn Iyās (témoin oculaire
      du début à la fin, peu favorable au régime de Selim),
      rapportent que la corde se rompit deux fois avant que
      l'exécution n'aboutît; Ṭūmān Bāy aurait refusé le
      bandeau et récité la *shahāda* à haute voix. Sa mort
      est la date de clôture canonique du règne mamelouk en
      Égypte et la fin symbolique du sultanat burji.
    canonical_hijri: {year: 923, month: 3, day: 21, precision: day}
    canonical_gregorian: {date: 1517-04-13, precision: day, method: attested}
    claims:
