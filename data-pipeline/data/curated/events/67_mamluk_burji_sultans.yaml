  # =========================================================================
  # TIMUR'S SACKS OF ALEPPO AND DAMASCUS (803 AH / 1400-1401)
  # =========================================================================

  - slug: timur-sack-of-aleppo
    category: siege
    title_en: Tīmūr's Sack of Aleppo — Devastation of the Mamlūk Northern Capital
    title_ar: تيمور لنك يدمّر حلب — اجتياح العاصمة المملوكية الشمالية
    title_fr: Sac d'Alep par Tīmūr — destruction de la capitale mamelouke du nord
    description_en: |
      Tīmūr-i Lang ("Tamerlane"), the Chaghatayid conqueror who
      had built a Eurasian empire from Samarqand, took the
      Mamlūk fortified capital of northern Syria — Ḥalab
      (Aleppo) — after a brief field engagement outside the
      city in which the Mamlūk-Aleppine garrison was destroyed.
      The city's surrender was followed by a sack of several
      days: contemporary sources, including Ibn ʿArabshāh's
      *ʿAjāʾib al-Maqdūr* (an eyewitness account by an Aleppine
      whose family was killed and who was carried to Samarqand
      as a captive) and Ibn Ḥajar al-ʿAsqalānī's *Inbāʾ
      al-Ghumr*, describe systematic massacres of the civilian
      Muslim population, the burning of mosques and madrasas,
      and the construction of pyramids of severed heads outside
      the city's gates. The Great Mosque of Aleppo was set on
      fire; the citadel held out for some weeks longer before
      surrendering. The sack — which the Burji historians
      report factually as a devastation of a Sunni Muslim
      city by a fellow Muslim conqueror — was the prelude to
      the descent on Damascus four months later. Tīmūr's army
      withdrew east in early 804 AH; Aleppo would not recover
      its pre-803 population for over a century.
    description_ar: |
      دخل تيمور لنك — الغازي الجغتائي الذي بنى إمبراطورية
      أوراسية من سمرقند — قاعدةَ المماليك المحصنة في شمال
      الشام (مدينة حلب) بعد معركة ميدانية وجيزة خارج المدينة
      أُبيد فيها الحامية المملوكية الحلبية. ثم تلا تسليمَ
      المدينة سلبٌ ودمار عدة أيام: ووصف المصادر المعاصرة —
      ومنها «عجائب المقدور» لابن عربشاه (وهو شاهد عيان حلبي
      قُتل أهله وسيق هو إلى سمرقند سبياً) و«إنباء الغمر»
      لابن حجر العسقلاني — مجازر منظَّمة بالسكان المسلمين
      المدنيين، وحرقاً للمساجد والمدارس، وأهراماً من رؤوس
      المقتولين أُقيمت أمام أبواب المدينة. وأُحرق الجامع
      الأموي بحلب، وصمدت القلعة بعدها أسابيع قبل أن
      تُسلَّم. وكان هذا السلب — الذي ذكره مؤرخو الدولة
      البرجية بوصفه دمارَ مدينةٍ مسلمة سُنية على يد فاتح
      مسلم — تمهيداً للهجوم على دمشق بعد أربعة أشهر.
      وانسحب جيش تيمور شرقاً في أوائل سنة ٨٠٤ هـ؛ ولم
      تستعد حلبُ سكانَها قبل سنة ٨٠٣ هـ إلا بعد قرن.
    description_fr: |
      Tīmūr-i Lang (« Tamerlan »), le conquérant tchaghatayide
      qui avait bâti un empire eurasiatique depuis Samarcande,
      prit la capitale mamelouke fortifiée du nord de la
      Syrie — Ḥalab (Alep) — après un bref engagement en
      rase campagne devant la ville où la garnison mamelouke-
      alépine fut détruite. La reddition de la ville fut
      suivie d'un sac de plusieurs jours : les sources
      contemporaines, dont *ʿAjāʾib al-Maqdūr* d'Ibn ʿArabshāh
      (témoignage oculaire d'un Alépin dont la famille fut
      tuée et qu'on emmena captif à Samarcande) et *Inbāʾ
      al-Ghumr* d'Ibn Ḥajar al-ʿAsqalānī, décrivent des
      massacres systématiques de la population civile
      musulmane, l'incendie des mosquées et des madrasas, et
      l'érection de pyramides de têtes coupées devant les
      portes de la ville. La Grande Mosquée d'Alep fut
      incendiée; la citadelle tint quelques semaines de plus
      avant de capituler. Ce sac — que les historiens burji
      rapportent factuellement comme la dévastation d'une
      ville sunnite musulmane par un conquérant lui-même
      musulman — fut le prélude à la descente sur Damas
      quatre mois plus tard. L'armée de Tīmūr se retira vers
      l'est au début de 804 H; Alep ne retrouverait pas sa
      population d'avant 803 avant plus d'un siècle.
    canonical_hijri: {year: 803, month: 3, precision: month}
    canonical_gregorian: {date: 1400-11-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina (and his Inbāʾ al-Ghumr) places the sack in Rabīʿ al-Awwal 803 AH and details the massacres."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab enters the sack under 803 AH and confirms the Aleppine devastation."
      - source_key: ei2
        notes: "EI2 'Tīmūr Lang' and 'Ḥalab' entries set the sack in late October–November 1400 CE / Rabīʿ I 803 AH."
    people: [[al-nasir-faraj, subject]]
    tags: [mamluk, timurid, syria, aleppo, sack, massacre, civilians]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: timur-sack-of-damascus
    category: siege
    title_en: Tīmūr's Sack of Damascus — Burning of the Umayyad Capital of Syria
    title_ar: تيمور لنك يحرق دمشق — تدمير العاصمة الأموية للشام
    title_fr: Sac de Damas par Tīmūr — incendie de la capitale omeyyade de Syrie
    description_en: |
      Four months after the destruction of Aleppo, Tīmūr's army
      reached Damascus. The young sultan al-Nāṣir Faraj ibn
      Barqūq — facing both Tīmūr in the north and political
      revolt at home — withdrew the Mamlūk field army to Egypt
      and abandoned the city. Damascene notables, led by the
      qadi Walī al-Dīn ibn Khaldūn (then chief Mālikī judge of
      Egypt and present in the city), negotiated terms; Ibn
      Khaldūn famously rode out from a wall window to meet
      Tīmūr in his camp and engaged him in conversations on
      *ʿaṣabiyya* and dynastic theory that Ibn Khaldūn later
      recorded. The terms were broken: after the citadel fell
      in late Rajab 803 AH, the city was given over to a sack
      of nineteen days. The Umayyad Mosque — the great
      eighth-century basilica converted from the basilica of
      St. John the Baptist — was set on fire when one of
      Tīmūr's commanders ordered burning oil dropped from the
      roof; the wooden ceiling, mosaics, and minbar all burned.
      Most of the city's craftsmen, scholars, and skilled
      artisans were carried east to Samarqand to build Tīmūr's
      capital. Ibn ʿArabshāh and Ibn Ḥajar both record the
      sack with horror; it is a foundational trauma in late
      Mamlūk Syrian historiography.
    description_ar: |
      وصل جيش تيمور دمشقَ بعد أربعة أشهر من تدمير حلب. وكان
      السلطان الفتى الناصر فرج بن برقوق — الذي يواجه تيمور
      شمالاً وثورةً سياسية داخلياً — قد سحب جيش المماليك
      الميداني إلى مصر وترك المدينة. فتفاوض أعيان دمشق
      بقيادة القاضي ولي الدين بن خلدون (وهو يومئذ قاضي
      قضاة المالكية بمصر وكان حاضراً في المدينة) على
      الأمان؛ وقد ركب ابن خلدون شخصياً من نافذة سور
      ليلتقي تيمور في معسكره، وحاوره في «العصبية» ونظرية
      الدول كما سجَّل بعد ذلك في تاريخه. ثم نُكث الأمان:
      فبعد سقوط القلعة في أواخر رجب سنة ٨٠٣ هـ، أبيحت
      المدينةُ تسعةَ عشرَ يوماً سلباً. وأُحرق الجامع
      الأموي — البازيليكا الكبرى من القرن الثاني الهجري
      التي حُوِّلت عن كنيسة يوحنا المعمدان — حين أمر
      أحد قواد تيمور بإلقاء الزيت المشتعل من سطحه، فاحترق
      السقف الخشبي والفسيفساء والمنبر. وسُبي معظم
      الصنّاع والعلماء والحرفيين المهرة شرقاً إلى سمرقند
      ليبنوا عاصمة تيمور. ويسجِّل الواقعة بفاجعةٍ ابن
      عربشاه وابن حجر، وهي صدمة مؤسِّسة في كتب التاريخ
      الشامي المملوكي المتأخر.
    description_fr: |
      Quatre mois après la destruction d'Alep, l'armée de
      Tīmūr atteignit Damas. Le jeune sultan al-Nāṣir Faraj
      ibn Barqūq — confronté à Tīmūr au nord et à une révolte
      politique chez lui — retira l'armée mamelouke de campagne
      en Égypte et abandonna la ville. Les notables damascènes,
      conduits par le cadi Walī al-Dīn ibn Khaldūn (alors
      grand juge mālikite d'Égypte et présent dans la ville),
      négocièrent des conditions; Ibn Khaldūn, dit la
      tradition, descendit d'une fenêtre de la muraille pour
      rencontrer Tīmūr dans son camp et engagea avec lui des
      conversations sur la *ʿaṣabiyya* et la théorie
      dynastique qu'il consigna ensuite. Les conditions furent
      rompues : après la chute de la citadelle fin Rajab 803 H,
      la ville fut livrée à un sac de dix-neuf jours. La
      Mosquée des Omeyyades — la grande basilique du
      VIIIᵉ siècle convertie de la basilique de saint Jean-
      Baptiste — fut incendiée lorsqu'un commandant de Tīmūr
      ordonna de verser de l'huile enflammée depuis le toit;
      le plafond de bois, les mosaïques et le minbar
      brûlèrent. La plupart des artisans, savants et maîtres
      de la ville furent emmenés à l'est vers Samarcande pour
      bâtir la capitale de Tīmūr. Ibn ʿArabshāh et Ibn Ḥajar
      consignent tous deux le sac avec horreur; il s'agit
      d'un traumatisme fondateur dans l'historiographie
      mamelouke syrienne tardive.
    canonical_hijri: {year: 803, month: 7, precision: month}
    canonical_gregorian: {date: 1401-03-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina (and Inbāʾ al-Ghumr) places the sack in Rajab 803 AH and details the burning of the Umayyad Mosque."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab enters the sack under 803 AH and confirms the nineteen-day plunder."
      - source_key: ei2
        notes: "EI2 'Tīmūr Lang' and 'Dimashḳ' entries set the sack in March 1401 CE / Rajab 803 AH."
    people: [[al-nasir-faraj, subject], [ibn-khaldun, subject]]
    tags: [mamluk, timurid, syria, damascus, sack, umayyad-mosque, ibn-khaldun]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: mamluk-recovery-of-damascus-from-timur
    category: political_event
    title_en: Mamlūk Recovery of Damascus after Tīmūr's Withdrawal
    title_ar: استعادة المماليك دمشقَ بعد انسحاب تيمور
    title_fr: Reprise mamelouke de Damas après le retrait de Tīmūr
    description_en: |
      After nearly two months of plunder, Tīmūr's army withdrew
      east from Damascus toward Iraq, taking with them the
      city's craftsmen and scholars and abandoning the burned
      Umayyad capital. The Mamlūk amīrs of the city's
      surroundings, who had taken refuge in mountain villages,
      re-entered Damascus once Tīmūr's column had crossed the
      Euphrates; the Burji administration of Sultan al-Nāṣir
      Faraj formally re-established the *niyāba* of Damascus
      under a new Mamlūk vice-regent. The reconstruction of
      the Umayyad Mosque was begun within months: the prayer
      hall was re-roofed in 804-805 AH (the original mosaics
      were lost, but the basic structure preserved). The
      withdrawal — driven by Tīmūr's preparations for the
      campaign against the Ottoman sultan Bāyazīd I that
      would culminate at Ankara in Dhū al-Ḥijja 804 AH /
      July 1402 — meant that the Mamlūk state survived. Had
      Tīmūr advanced south on Egypt, Mamlūk Egypt would
      likely have fallen as the Khwārazmian state had a
      generation earlier. The recovery is recorded by Ibn
      Ḥajar and Ibn al-ʿImād under the events of 803 AH.
    description_ar: |
      انسحب جيش تيمور بعد قرابة شهرين من النهب شرقاً عن
      دمشق نحو العراق، واصطحب معه صنَّاع المدينة وعلماءها
      تاركاً العاصمة الأموية محروقة. ودخل أمراء المماليك
      من ضواحي المدينة الذين كانوا قد لجأوا إلى قرى الجبل
      دمشقَ بعد أن قطعت أرتالُ تيمور الفراتَ؛ وأعادت
      إدارة السلطان البرجي الناصر فرج تنصيبَ نيابة دمشق
      رسمياً تحت نائب مملوكي جديد. وبدأ إصلاح الجامع
      الأموي في أشهر: أُعيد سقف بيت الصلاة سنتي ٨٠٤-٨٠٥ هـ
      (وفقدت الفسيفساء الأصلية، لكن بقي الهيكل الأساس).
      وكان الانسحاب — الذي أَملته استعدادات تيمور لحملته
      على السلطان العثماني بايزيد الأول التي ستتوّج
      بأنقرة في ذي الحجة سنة ٨٠٤ هـ / يوليو ١٤٠٢ م — يعني
      نجاة الدولة المملوكية. ولو زحف تيمور على مصر جنوباً
      لسقطت مصر المملوكية كما سقطت دولة خوارزم قبل جيل.
      ويسجِّل ابن حجر وابن العماد الاستعادة تحت أحداث
      سنة ٨٠٣ هـ.
    description_fr: |
      Après près de deux mois de pillage, l'armée de Tīmūr se
      retira vers l'est de Damas en direction de l'Irak,
      emmenant les artisans et savants de la ville et
      abandonnant la capitale omeyyade incendiée. Les émirs
      mamelouks des environs, qui s'étaient réfugiés dans les
      villages de montagne, réentrèrent dans Damas une fois
      la colonne de Tīmūr ayant traversé l'Euphrate;
      l'administration burji du sultan al-Nāṣir Faraj
      rétablit formellement la *niyāba* de Damas sous un
      nouveau vice-roi mamelouk. La reconstruction de la
      Mosquée des Omeyyades commença dans les mois qui
      suivirent : la salle de prière fut recouverte en
      804-805 H (les mosaïques d'origine furent perdues, mais
      la structure de base préservée). Le retrait — dicté par
      les préparatifs de Tīmūr pour la campagne contre le
      sultan ottoman Bāyazīd Iᵉʳ qui culminerait à Ankara en
      Dhū al-Ḥijja 804 H / juillet 1402 — signifia la survie
      de l'État mamelouk. Si Tīmūr avait avancé vers le sud
      sur l'Égypte, l'Égypte mamelouke serait probablement
      tombée comme l'État khwārazmien une génération plus
      tôt. La reprise est consignée par Ibn Ḥajar et Ibn
      al-ʿImād sous les événements de 803 H.
    canonical_hijri: {year: 803, month: 9, precision: month}
    canonical_gregorian: {date: 1401-05-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Ibn Ḥajar al-Durar al-Kāmina (and Inbāʾ al-Ghumr) records the Mamlūk re-entry into Damascus and the rebuilding of the mosque under 803-804 AH."
      - source_key: ibn_imad_shadharat
        notes: "Ibn al-ʿImād Shadharāt al-Dhahab enters the recovery under 803 AH."
    people: [[al-nasir-faraj, subject]]
    tags: [mamluk, burji, timurid, syria, damascus, recovery, umayyad-mosque]
    importance: notable
    verified: true
