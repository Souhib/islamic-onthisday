  # =========================================================================
  # LATE BURJI — QAYTBAY AND THE FALL (901, 922-923 AH)
  # =========================================================================

  - slug: death-of-al-ashraf-qaytbay
    category: ruler_death
    title_en: Death of Sultan al-Ashraf Qāyt Bāy — Last Great Burji Builder of Cairo
    title_ar: وفاة السلطان الأشرف قايتباي — آخر بنّائي القاهرة المملوكية البرجية
    title_fr: Mort du sultan al-Ashraf Qāyt Bāy — dernier grand bâtisseur burji du Caire
    description_en: |
      al-Malik al-Ashraf Sayf al-Dīn Qāyt Bāy al-Maḥmūdī al-Ẓāhirī —
      eighteenth Burji sultan and the last sultan to wield
      effective authority over a unified Mamlūk state — died
      at the Cairo citadel after a long illness, aged about 80.
      His twenty-eight-year reign (872-901 AH) was the longest
      of any Burji sultan and a sustained achievement against
      severe constraints: chronic plague, the silver crisis
      of late-fifteenth-century Egypt, and the rising Ottoman
      power on the northern frontier. Six successful Mamlūk
      campaigns checked Ottoman expansion under Sultans
      Meḥmed II and Bāyazīd II between 877 and 896 AH,
      preserving northern Syrian–Anatolian Cilicia until
      after his death. His architectural patronage was the
      most extensive of any Mamlūk sultan: the great
      Mausoleum-Madrasa of Qāyt Bāy in the Northern
      Cemetery (Qarāfa) — its dome carved with the most
      virtuosic stone arabesques in Mamlūk architecture —
      survives as the iconic monument of fifteenth-century
      Cairo. He restored the Ḥaramayn extensively, rebuilt
      portions of the Masjid al-Ḥarām and the Prophet's
      Mosque, and endowed *waqf*s at Madīna. Ibn Iyās
      records the death in detail.
    description_ar: |
      توفي السلطان الملك الأشرف سيف الدين قايتباي
      المحمودي الظاهري — ثامن عشر سلاطين البرجية، وآخر
      من أَمسك بسلطان فعلي على دولة المماليك متّحدةً —
      بقلعة الجبل بالقاهرة بعد علة طويلة، عن نحو ثمانين
      سنة. وكان عهده الذي امتدّ ثمانية وعشرين سنة
      (٨٧٢-٩٠١ هـ) أطول عهود سلاطين البرجية، وإنجازاً
      طويلَ النفَس في وجه قيود شديدة: الطاعون المزمن،
      وأزمة الفضة في أواخر القرن التاسع الهجري، والقوة
      العثمانية الصاعدة على الجبهة الشمالية. وكفّت
      ست حملات مملوكية ناجحة التمدّدَ العثماني تحت
      محمد الفاتح وبايزيد الثاني بين سنتي ٨٧٧ و٨٩٦ هـ،
      فحفظت قيليقيا في شمال الشام حتى ما بعد وفاته.
      وكان عمرانه أوسع من عمران أيّ سلطان مملوكي:
      مدرستُه ومدفنُه الكبيران في القرافة الشمالية —
      وقد نُقشت قبتُه بأمهر زخارف أرابسك حجرية في
      عمارة المماليك — لا يزالان قائمين بوصفهما
      الأثر الأيقونيّ للقاهرة في القرن التاسع
      الهجري. وأَصلح الحرمين الشريفين إصلاحاً واسعاً،
      وأَعاد بناء أجزاء من المسجد الحرام والمسجد
      النبوي، ووقف بالمدينة أوقافاً. ويسجّل ابن إياس
      وفاتَه بتفصيل.
    description_fr: |
      al-Malik al-Ashraf Sayf al-Dīn Qāyt Bāy al-Maḥmūdī
      al-Ẓāhirī — dix-huitième sultan burji et le dernier
      sultan à exercer une autorité effective sur un État
      mamelouk unifié — mourut à la citadelle du Caire
      après une longue maladie, à l'âge d'environ 80 ans.
      Son règne de vingt-huit ans (872-901 H) fut le plus
      long de tout sultan burji et une réussite soutenue
      contre des contraintes sévères : peste chronique,
      crise de l'argent à la fin du XVᵉ siècle égyptien,
      et la puissance ottomane montante sur la frontière
      nord. Six campagnes mameloukes victorieuses
      contiennent l'expansion ottomane sous les sultans
      Meḥmed II et Bāyazīd II entre 877 et 896 H,
      préservant la Cilicie syro-anatolienne septentrionale
      jusqu'après sa mort. Son mécénat architectural fut le
      plus étendu de tout sultan mamelouk : le grand
      Mausolée-Madrasa de Qāyt Bāy dans le Cimetière du
      Nord (Qarāfa) — sa coupole sculptée des arabesques
      de pierre les plus virtuoses de l'architecture
      mamelouke — subsiste comme le monument iconique du
      Caire du XVᵉ siècle. Il restaura abondamment les
      Ḥaramayn, reconstruisit des parties de la Mosquée
      sacrée et de la Mosquée du Prophète, et fonda des
      *waqf*s à Médine. Ibn Iyās consigne sa mort en
      détail.
