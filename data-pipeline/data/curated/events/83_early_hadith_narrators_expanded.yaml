  - slug: death-of-abu-hatim-al-razi
    category: scholar_death
    title_en: Death of Abū Ḥātim al-Rāzī — co-master of rijāl criticism at Rayy
    title_ar: وفاة أبي حاتم الرازي — قرين أبي زرعة في نقد الرجال بالري
    title_fr: Mort d'Abū Ḥātim al-Rāzī — co-maître de la critique des *rijāl* à Rayy
    description_en: |
      Abū Ḥātim Muḥammad ibn Idrīs ibn al-Mundhir al-Ḥanẓalī
      al-Rāzī — Sunni traditionist and master rijāl critic of
      Rayy, paired in the classical sources with his close
      companion Abū Zurʿa al-Rāzī as the two seminal voices in
      mid-third-century *al-jarḥ wa-l-taʿdīl* — died at Rayy in
      Shaʿbān 277 AH (~November 890 CE) at age about 83, per
      al-Dhahabī's *Siyar* (the dominant transmission); a
      minority of sources gives 275 AH, a date al-Dhahabī
      himself notes and rejects. We follow 277 AH. His extensive
      verdicts on narrators were systematically gathered by his
      son Abū Muḥammad ʿAbd al-Raḥmān ibn Abī Ḥātim (d. 327 AH)
      into *al-Jarḥ wa-l-Taʿdīl* — the single largest surviving
      classical compendium of pre-Bukhārī rijāl criticism, in
      nine published volumes. His independent *Tafsīr* (also
      preserved by his son in extracts) is one of the earliest
      narration-based commentaries to survive the third century.
      Ibn Khallikān calls him "imām of his contemporaries in
      knowledge of *rijāl*."
    description_ar: |
      توفي الإمام أبو حاتم محمد بن إدريس بن المنذر الحنظلي
      الرازي — محدث من أهل السنة وكبير نقاد الرجال في الري،
      اقترنه المتقدمون بقرينه أبي زرعة الرازي بوصفهما رأسي
      علم الجرح والتعديل في أواسط القرن الثالث الهجري — بالري
      في شعبان سنة ٢٧٧ هـ (~نوفمبر ٨٩٠ م) عن نحو ثلاث وثمانين
      سنة، كما هو الراجح في «سير» الذهبي؛ وذُكر في بعض المصادر
      سنة ٢٧٥ هـ، وقد أشار إليها الذهبي ورجّح خلافها. ونحن
      نتابع ٢٧٧ هـ على القول الأكثر. وقد جمع ابنه أبو محمد
      عبد الرحمن بن أبي حاتم (ت ٣٢٧ هـ) أحكامه على الرواة
      منهجياً في «الجرح والتعديل»، وهو أكبر مؤلفات نقد الرجال
      الكلاسيكية الواصلة قبل البخاري في تسع مجلدات مطبوعة. وله
      «تفسير» مستقل حفظه ابنه نقلاً، وهو من أوائل التفاسير
      الأثرية الواصلة من القرن الثالث. قال عنه ابن خلكان:
      «إمام معاصريه في معرفة الرجال».
    description_fr: |
      Abū Ḥātim Muḥammad ibn Idrīs ibn al-Mundhir al-Ḥanẓalī
      al-Rāzī — traditionniste sunnite et grand critique des
      *rijāl* de Rayy, associé dans les sources classiques à
      son compagnon proche Abū Zurʿa al-Rāzī comme les deux
      voix séminales d'*al-jarḥ wa-l-taʿdīl* au milieu du 3e
      siècle hégirien — mourut à Rayy en Shaʿbān 277 H
      (~novembre 890 EC) à l'âge d'environ 83 ans, selon la
      transmission dominante des *Siyar* d'al-Dhahabī ; une
      minorité de sources donne 275 H, date qu'al-Dhahabī lui-
      même note et rejette. Nous suivons 277 H. Ses verdicts
      étendus sur les transmetteurs ont été systématiquement
      rassemblés par son fils Abū Muḥammad ʿAbd al-Raḥmān ibn
      Abī Ḥātim (m. 327 H) dans *al-Jarḥ wa-l-Taʿdīl* — la plus
      vaste compilation classique de critique des *rijāl* pré-
      bukhārienne ayant survécu, en neuf volumes publiés. Son
      *Tafsīr* indépendant (également préservé en extraits par
      son fils) figure parmi les commentaires fondés sur la
      narration les plus anciens parvenus du 3e siècle. Ibn
      Khallikān le qualifie d'« imam de ses contemporains dans
      la connaissance des *rijāl* ».
