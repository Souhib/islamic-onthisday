  - slug: death-of-al-ajurri
    category: scholar_death
    title_en: Death of Abū Bakr al-Ājurrī — author of *al-Sharīʿa*
    title_ar: وفاة أبي بكر الآجري — صاحب «الشريعة»
    title_fr: Mort d'Abū Bakr al-Ājurrī — auteur d'*al-Sharīʿa*
    description_en: |
      Abū Bakr Muḥammad ibn al-Ḥusayn ibn ʿAbdullah al-Ājurrī
      al-Baghdādī — Sunni traditionist of Ājurr (a quarter of
      Baghdad) who settled at Mecca, and author of *al-Sharīʿa*
      (a foundational creedal-traditionist compendium organising
      narrations from Companions and tabiʿūn that articulate
      the *ʿaqīda* of Ahl al-Sunna wa-l-Jamāʿa, in five
      published volumes) and of *al-Arbaʿīn ḥadīthan* (a
      thematic forty-hadith collection) — died at Mecca on
      the morning of 7 Muḥarram 360 AH (~6 November 970 CE)
      at age about 96, per al-Dhahabī's *Siyar*. Some sources
      give 365 AH; we follow al-Dhahabī's 360 AH as the
      majority opinion. *al-Sharīʿa* is one of the four pillar
      classical Sunni creedal source-books of the genre
      (alongside Ibn Baṭṭa's *al-Ibāna*, Ibn Mandah's *al-Tawḥīd*,
      and al-Lalakāʾī's *Sharḥ Uṣūl Iʿtiqād*) and is heavily
      relied on by later Sunni creedal writers including Ibn
      Taymiyya. He died in his Mecca residence neighbouring the
      Sacred Mosque, having lived in proximity to the Kaʿba for
      nearly thirty years.
    description_ar: |
      توفي الإمام أبو بكر محمد بن الحسين بن عبد الله الآجري
      البغدادي — محدث من أهل السنة من «آجر» (محلة ببغداد)
      استوطن مكة، ومصنف «الشريعة» (مجموع تأسيسي يجمع نصوصاً
      عن الصحابة والتابعين تقرر عقيدة أهل السنة والجماعة، في
      خمس مجلدات مطبوعة) و«الأربعين حديثاً» (أربعون موضوعية)
      — بمكة المكرمة صبيحة السابع من محرم سنة ٣٦٠ هـ
      (~٦ نوفمبر ٩٧٠ م) عن نحو ست وتسعين سنة، كما حفظ
      الذهبي في «السير». ذكر في بعض المصادر سنة ٣٦٥ هـ،
      ونعتمد ٣٦٠ هـ موافقة الذهبي والأكثر. و«الشريعة» أحد
      الأركان الأربعة لكتب أصول العقيدة المرجعية في تراث
      أهل السنة (مع «الإبانة» لابن بطة و«التوحيد» لابن منده
      و«شرح أصول الاعتقاد» للالكائي)، وقد اعتمد عليه كثير
      من كتاب العقائد المتأخرين كابن تيمية. توفي في داره
      بمكة المجاورة للمسجد الحرام بعد أن جاور الكعبة قرابة
      ثلاثين سنة.
    description_fr: |
      Abū Bakr Muḥammad ibn al-Ḥusayn ibn ʿAbdullah al-Ājurrī
      al-Baghdādī — traditionniste sunnite originaire d'Ājurr
      (un quartier de Bagdad) installé à La Mecque, auteur
      d'*al-Sharīʿa* (compendium fondateur du *ʿaqīda* de
      l'orthodoxie sunnite, organisant des narrations des
      Compagnons et des *tābiʿūn* articulant la doctrine
      d'Ahl al-Sunna wa-l-Jamāʿa, en cinq volumes publiés) et
      d'*al-Arbaʿīn ḥadīthan* (collection thématique de quarante
      hadiths) — mourut à La Mecque au matin du 7 Muḥarram 360
      H (~6 novembre 970 EC) à l'âge d'environ 96 ans, selon
      les *Siyar* d'al-Dhahabī. Certaines sources donnent 365
      H ; nous suivons les 360 H d'al-Dhahabī comme opinion
      majoritaire. *al-Sharīʿa* est l'un des quatre piliers des
      ouvrages-sources classiques du *ʿaqīda* sunnite (avec
      l'*Ibāna* d'Ibn Baṭṭa, le *Tawḥīd* d'Ibn Mandah et le
      *Sharḥ Uṣūl Iʿtiqād* d'al-Lalakāʾī) et est abondamment
      utilisé par les rédacteurs sunnites tardifs du credo,
      dont Ibn Taymiyya. Il mourut dans sa résidence mecquoise
      voisine de la Mosquée sacrée, ayant résidé près de la
      Kaʿba pendant près de trente ans.
