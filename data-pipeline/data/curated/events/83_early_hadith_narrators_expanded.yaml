  # 5th CENTURY AH — al-LALAKĀʾĪ
  # =========================================================================

  - slug: death-of-al-lalakai
    category: scholar_death
    title_en: Death of al-Lalakāʾī — author of *Sharḥ Uṣūl Iʿtiqād Ahl al-Sunna*
    title_ar: وفاة اللالكائي — صاحب «شرح أصول اعتقاد أهل السنة»
    title_fr: Mort d'al-Lalakāʾī — auteur de *Sharḥ Uṣūl Iʿtiqād Ahl al-Sunna*
    description_en: |
      Abū al-Qāsim Hibat Allāh ibn al-Ḥasan ibn Manṣūr al-Ṭabarī
      al-Rāzī al-Lalakāʾī — Sunni Shāfiʿī jurist and traditionist
      of Baghdad, foremost student of the ḥadīth-master Abū
      al-Ḥasan al-Dāraquṭnī (d. 385 AH), and author of *Sharḥ
      Uṣūl Iʿtiqād Ahl al-Sunna wa-l-Jamāʿa* — the most
      systematically organised classical narration-based
      compendium of Sunni creed, in nine published volumes,
      treating tawḥīd, qadar, the Companions, the Caliphate, the
      vision of Allah in the Hereafter, and the canonical
      positions of the early imams, all through ascribed
      narrations with full chains — died at Dīnāwar (in modern
      western Iran) in Ramaḍān 418 AH (~October-November 1027
      CE), per al-Dhahabī's *Siyar* and Ibn Kathīr. He had been
      travelling between Baghdad and Persia teaching hadith and
      *uṣūl al-iʿtiqād*; the *Sharḥ Uṣūl* and his *Karāmāt
      al-Awliyāʾ* survive. With al-Ājurrī's *al-Sharīʿa*, Ibn
      Baṭṭa's *al-Ibāna*, and Ibn Mandah's *al-Tawḥīd*, his
      *Sharḥ Uṣūl* completes the four-pillar classical source-
      base of late-Sunni creedal narration. Imam al-Subkī
      includes him in *Ṭabaqāt al-Shāfiʿiyya* among the senior
      Shāfiʿī authorities of his generation.
    description_ar: |
      توفي الإمام أبو القاسم هبة الله بن الحسن بن منصور
      الطبري الرازي اللالكائي — فقيه شافعي ومحدث من أهل
      السنة من بغداد، أبرز تلاميذ الحافظ الكبير أبي الحسن
      الدارقطني (ت ٣٨٥ هـ)، ومصنف «شرح أصول اعتقاد أهل السنة
      والجماعة» — أتقن مجموعات أصول الاعتقاد الكلاسيكية
      ترتيباً وأوسعها سنداً، في تسع مجلدات مطبوعة، تناول فيه
      التوحيد والقدر والصحابة والخلافة ورؤية الله في الآخرة
      ومذاهب الأئمة المتقدمين، مسوقاً ذلك كله بالأسانيد
      المسلسلة — بدينور (في غرب إيران اليوم) في رمضان سنة
      ٤١٨ هـ (~أكتوبر-نوفمبر ١٠٢٧ م) كما حفظ الذهبي في
      «السير» وابن كثير. كان رحمه الله يتنقل بين بغداد وبلاد
      فارس مدرّساً للحديث وأصول الاعتقاد، ووصلنا «شرح أصول
      الاعتقاد» و«كرامات الأولياء» له. ومع «الشريعة»
      للآجري و«الإبانة» لابن بطة و«التوحيد» لابن منده يكمل
      «شرح أصول» اللالكائي الأركان الأربعة لمنابع العقيدة
      السنية المتأخرة. وأدرجه السبكي في «طبقات الشافعية»
      ضمن كبار مشيخة الشافعية في عصره.
    description_fr: |
      Abū al-Qāsim Hibat Allāh ibn al-Ḥasan ibn Manṣūr al-Ṭabarī
      al-Rāzī al-Lalakāʾī — juriste shāfiʿite et traditionniste
      sunnite de Bagdad, principal disciple du maître hadith
      Abū al-Ḥasan al-Dāraquṭnī (m. 385 H), et auteur de *Sharḥ
      Uṣūl Iʿtiqād Ahl al-Sunna wa-l-Jamāʿa* — le compendium
      classique du credo sunnite fondé sur la narration le plus
      systématiquement organisé, en neuf volumes publiés,
      traitant du *tawḥīd*, du *qadar*, des Compagnons, du
      califat, de la vision d'Allah dans l'au-delà et des
      positions canoniques des imams précoces, tout cela à
      travers des narrations rattachées avec chaînes complètes
      — mourut à Dīnāwar (dans l'actuel ouest de l'Iran) en
      Ramaḍān 418 H (~octobre-novembre 1027 EC), selon les
      *Siyar* d'al-Dhahabī et Ibn Kathīr. Il voyageait entre
      Bagdad et la Perse pour enseigner le hadith et les *uṣūl
      al-iʿtiqād* ; le *Sharḥ Uṣūl* et ses *Karāmāt al-Awliyāʾ*
      ont survécu. Avec *al-Sharīʿa* d'al-Ājurrī, *al-Ibāna*
      d'Ibn Baṭṭa et *al-Tawḥīd* d'Ibn Mandah, son *Sharḥ Uṣūl*
      achève la base-sources à quatre piliers de la narration
      du credo sunnite tardif. L'imam al-Subkī l'inclut dans
      les *Ṭabaqāt al-Shāfiʿiyya* parmi les autorités shāfiʿites
      seniors de sa génération.
