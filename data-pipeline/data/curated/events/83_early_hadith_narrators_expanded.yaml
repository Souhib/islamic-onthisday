  # EARLY 3rd CENTURY AH — THE GENERATION OF AḤMAD AND IBN AL-MADĪNĪ
  # =========================================================================

  - slug: death-of-said-ibn-mansur
    category: scholar_death
    title_en: Death of Saʿīd ibn Manṣūr — author of the Sunan
    title_ar: وفاة سعيد بن منصور — صاحب «السنن»
    title_fr: Mort de Saʿīd ibn Manṣūr — auteur des Sunan
    description_en: |
      Abū ʿUthmān Saʿīd ibn Manṣūr ibn Shuʿba al-Khurāsānī
      al-Marwazī — Sunni traditionist of Khurāsānian origin
      who settled in Mecca, compiler of the *Sunan Saʿīd ibn
      Manṣūr* (a partial musnad-style compilation focused on
      tafsīr and aḥkām that survives only in part — the volumes
      on tafsīr from Sūrat al-Baqara through al-Aʿrāf and parts
      of the kitāb al-jihād are extant) — died at Mecca in 227
      AH (~842 CE) per the dominant transmission in Ibn Saʿd,
      al-Dhahabī, and Ibn Kathīr; some sources give 229 AH. We
      follow 227 AH as the majority. He is one of the named
      teachers of Imam Muslim, Imam Abū Dāwūd, and other senior
      authors of the Six Books generation. His *Sunan* is one of
      the earliest substantial muṣannaf compilations to survive
      and is repeatedly cited by later scholars (Ibn Ḥajar in
      *al-Maṭālib al-ʿĀliya*, al-Bayhaqī, al-Suyūṭī) for
      narrations not preserved in the Six Books.
    description_ar: |
      توفي الإمام أبو عثمان سعيد بن منصور بن شعبة الخراساني
      المروزي — محدث من أهل السنة من خراسان، استوطن مكة، ومصنف
      «سنن سعيد بن منصور» وهو كتاب على نمط المسانيد ركّز على
      التفسير وأحاديث الأحكام، وقد وصل إلينا منه قسم التفسير
      من البقرة إلى الأعراف وبعض كتاب الجهاد — بمكة المكرمة
      سنة ٢٢٧ هـ (~٨٤٢ م) على الرواية المعتمدة في طبقات ابن
      سعد والذهبي وابن كثير، وذُكر في بعض المصادر سنة ٢٢٩ هـ،
      ونعتمد ٢٢٧ هـ موافقةً للأكثر. وهو من شيوخ الإمام مسلم
      وأبي داود وكبار أصحاب الكتب الستة. و«سننه» من أقدم
      المصنفات الكبرى الواصلة إلينا، واستشهد به العلماء
      المتأخرون (ابن حجر في «المطالب العالية» والبيهقي
      والسيوطي) في روايات لم تصل من طريق الكتب الستة.
    description_fr: |
      Abū ʿUthmān Saʿīd ibn Manṣūr ibn Shuʿba al-Khurāsānī
      al-Marwazī — traditionniste sunnite d'origine khurasanienne
      installé à La Mecque, compilateur des *Sunan Saʿīd ibn
      Manṣūr* (compilation partielle de style musnad centrée
      sur le tafsīr et les *aḥkām*, dont ne subsistent que les
      volumes de tafsīr de la Sūrat al-Baqara jusqu'à al-Aʿrāf
      et des fragments du kitāb al-jihād) — mourut à La Mecque
      en 227 H (~842 EC) selon la transmission dominante chez
      Ibn Saʿd, al-Dhahabī et Ibn Kathīr ; certaines sources
      donnent 229 H. Nous suivons 227 H, opinion majoritaire.
      Il fut l'un des maîtres nommés de l'imam Muslim, de l'imam
      Abū Dāwūd et des principaux auteurs des Six Livres. Ses
      *Sunan* comptent parmi les plus anciennes compilations
      *muṣannaf* substantielles parvenues jusqu'à nous et sont
      régulièrement citées par les savants tardifs (Ibn Ḥajar
      dans *al-Maṭālib al-ʿĀliya*, al-Bayhaqī, al-Suyūṭī) pour
      des narrations non préservées dans les Six Livres.
    canonical_hijri: {year: 227, precision: year}
    canonical_gregorian: {date: 842-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Death at Mecca 227 AH per al-Dhahabī; teacher of Muslim and Abū Dāwūd."
      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt entry under 227 AH; alt 229 AH noted in some transmissions."
      - source_key: ibn_kathir_bidaya
        notes: "Year-227 chronicle entry; surviving Sunan partial extant in tafsīr and jihād portions."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab obituary under 227 AH."
    people: [[said-ibn-mansur, died]]
