  # =========================================================================
  # LATE 3rd / EARLY 4th CENTURY AH — POST-ṢAḤĪḤAYN MUSNAD COMPILERS
  # =========================================================================

  - slug: death-of-al-bazzar
    category: scholar_death
    title_en: Death of al-Bazzār — author of *al-Musnad al-Kabīr* (al-Baḥr al-Zakhkhār)
    title_ar: وفاة البزار — صاحب «المسند الكبير» (البحر الزخار)
    title_fr: Mort d'al-Bazzār — auteur d'*al-Musnad al-Kabīr* (al-Baḥr al-Zakhkhār)
    description_en: |
      Abū Bakr Aḥmad ibn ʿAmr ibn ʿAbd al-Khāliq al-Baṣrī
      al-Bazzār — Sunni Basran traditionist who travelled
      widely and dictated hadith in his old age across the
      Levant — and author of *al-Musnad al-Kabīr* (often called
      *al-Baḥr al-Zakhkhār*, "The Surging Sea"), one of the
      principal post-Ṣaḥīḥayn musnads, organised on the
      tradition of musnad-by-Companion and including extensive
      isnād-criticism remarks (al-Bazzār routinely flagged the
      defects of weaker chains, making the work valuable for
      *ʿilal* studies) — died at al-Ramla (Palestine) in 292
      AH (~905 CE), per al-Dhahabī's *Siyar*, *Tārīkh al-Islām*,
      and Ibn Kathīr's chronicle. He had been dictating in
      al-Ramla in the years before his death; the work survives
      and was edited and published in eighteen volumes in modern
      times. His verdicts on narrators are repeatedly invoked by
      al-Dāraquṭnī, al-Bayhaqī, and al-Haythamī (in *Majmaʿ
      al-Zawāʾid*, where the *Musnad al-Bazzār* is one of the
      five primary sources).
    description_ar: |
      توفي الإمام أبو بكر أحمد بن عمرو بن عبد الخالق البصري
      البزار — محدث البصرة من أهل السنة، رحّال كبير، أملى
      الحديث في كبره في بلاد الشام، ومصنف «المسند الكبير»
      المعروف بـ«البحر الزخار» — وهو أحد أهم المسانيد بعد
      الصحيحين، رتّبه على مسانيد الصحابة وضمّنه نقداً واسعاً
      للأسانيد، إذ كان البزار يبيّن علل الإسناد الضعيف في
      مواضعه، فاكتسب الكتاب قيمة خاصة في علم العلل — بالرملة
      (فلسطين) سنة ٢٩٢ هـ (~٩٠٥ م)، كما حفظ الذهبي في
      «السير» و«تاريخ الإسلام» وابن كثير في «البداية والنهاية».
      كان يملي بالرملة في السنوات السابقة لوفاته، وقد طبع
      الكتاب في ثمانية عشر مجلداً في العصر الحديث. ويستشهد
      بأحكامه الدارقطني والبيهقي والهيثمي في «مجمع الزوائد»
      الذي مسند البزار أحد مصادره الخمسة الرئيسية.
    description_fr: |
      Abū Bakr Aḥmad ibn ʿAmr ibn ʿAbd al-Khāliq al-Baṣrī
      al-Bazzār — traditionniste bassorois sunnite, grand
      voyageur, qui dicta des hadiths dans sa vieillesse à
      travers le Levant — et auteur d'*al-Musnad al-Kabīr* (dit
      *al-Baḥr al-Zakhkhār*, « la Mer Houleuse »), l'un des
      principaux *musnads* post-Ṣaḥīḥayn, organisé selon la
      tradition *musnad-par-Compagnon* et incluant d'amples
      remarques de critique d'*isnād* (al-Bazzār signalait
      systématiquement les défauts des chaînes plus faibles,
      ce qui rend l'ouvrage précieux pour les études d'*ʿilal*)
      — mourut à al-Ramla (Palestine) en 292 H (~905 EC),
      selon les *Siyar*, le *Tārīkh al-Islām* d'al-Dhahabī et
      la chronique d'Ibn Kathīr. Il avait dicté à al-Ramla dans
      les années précédant sa mort ; l'ouvrage a survécu et a
      été édité et publié en dix-huit volumes à l'époque
      moderne. Ses verdicts sur les transmetteurs sont
      régulièrement invoqués par al-Dāraquṭnī, al-Bayhaqī et
      al-Haythamī (dans *Majmaʿ al-Zawāʾid*, où le *Musnad
      al-Bazzār* est l'une des cinq sources primaires).
