  - slug: death-of-abu-awana-al-isfaraini
    category: scholar_death
    title_en: Death of Abū ʿAwāna al-Isfarāʾīnī — author of the *Mustakhraj* on Muslim
    title_ar: وفاة أبي عوانة الإسفراييني — صاحب «المستخرج» على مسلم
    title_fr: Mort d'Abū ʿAwāna al-Isfarāʾīnī — auteur du *Mustakhraj* sur Muslim
    description_en: |
      Abū ʿAwāna Yaʿqūb ibn Isḥāq ibn Ibrāhīm al-Isfarāʾīnī
      al-Naysābūrī — Sunni Khurāsānian traditionist of
      Isfarāʾīn (in modern northern Iran) and Nīsābūr, and
      author of *al-Mustakhraj ʿalā Ṣaḥīḥ Muslim* — one of the
      principal *mustakhrajāt* (independent re-derivations of
      Ṣaḥīḥ Muslim's narrations through alternative chains,
      preserving variant wordings and additional matn material
      that became standard reference points for hadith study)
      — died at Isfarāʾīn in 316 AH (~928 CE), per al-Dhahabī's
      *Siyar* and *Tārīkh al-Islām*. His *Mustakhraj* (often
      called *Musnad Abī ʿAwāna*) is preserved and published in
      modern editions; alongside the *Mustakhraj* of Abū Nuʿaym
      al-Isfahānī and that of al-Bayhaqī it forms the
      foundational *mustakhraj* corpus on Muslim. Imam al-Nawawī
      treats the *Musnad Abī ʿAwāna* as one of the standard
      reference works in his *Sharḥ Ṣaḥīḥ Muslim*.
    description_ar: |
      توفي الإمام أبو عوانة يعقوب بن إسحاق بن إبراهيم
      الإسفراييني النيسابوري — محدث خراسان من أهل السنة، من
      إسفرايين ونيسابور، ومصنف «المستخرج على صحيح مسلم» — وهو
      أحد أهم المستخرجات (وهي إعادات تخريج مستقلة لأحاديث
      صحيح مسلم بأسانيد بديلة، تحفظ ألفاظاً متباينة ومتوناً
      إضافية، صارت مراجع معتمدة في علم الحديث) — بإسفرايين
      سنة ٣١٦ هـ (~٩٢٨ م)، كما حفظ الذهبي في «السير» و«تاريخ
      الإسلام». «مستخرجه» المعروف بـ«مسند أبي عوانة» وصلنا
      وطبع في طبعات حديثة، وهو مع «مستخرج أبي نعيم الأصبهاني»
      و«مستخرج البيهقي» يشكل قوام كتب المستخرجات على مسلم. وقد
      اعتمد عليه الإمام النووي في «شرح صحيح مسلم» اعتماداً
      ملحوظاً.
    description_fr: |
      Abū ʿAwāna Yaʿqūb ibn Isḥāq ibn Ibrāhīm al-Isfarāʾīnī
      al-Naysābūrī — traditionniste khurasanien sunnite
      d'Isfarāʾīn (dans l'actuel nord de l'Iran) et de Nīsābūr,
      et auteur d'*al-Mustakhraj ʿalā Ṣaḥīḥ Muslim* — l'un des
      principaux *mustakhrajāt* (re-dérivations indépendantes
      des narrations du Ṣaḥīḥ de Muslim par chaînes alternatives,
      préservant des variantes lexicales et un matériel *matn*
      additionnel devenus des points de référence standard pour
      l'étude du hadith) — mourut à Isfarāʾīn en 316 H (~928
      EC), selon les *Siyar* et le *Tārīkh al-Islām* d'al-Dhahabī.
      Son *Mustakhraj* (souvent dit *Musnad Abī ʿAwāna*) est
      préservé et publié dans des éditions modernes ; aux côtés
      du *Mustakhraj* d'Abū Nuʿaym al-Isfahānī et de celui
      d'al-Bayhaqī, il forme le corpus fondateur des
      *mustakhrajāt* sur Muslim. L'imam al-Nawawī traite le
      *Musnad Abī ʿAwāna* comme l'un des ouvrages de référence
      standard dans son *Sharḥ Ṣaḥīḥ Muslim*.
