      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt entry confirms Muḥarram 235 AH; al-Muṣannaf is the principal surviving work."
      - source_key: ibn_kathir_bidaya
        notes: "Year-235 chronicle entry alongside ʿAlī ibn al-Madīnī's death (also 235 AH)."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab obituary under year 235 AH."
