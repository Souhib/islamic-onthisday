  - slug: death-of-al-ramahurmuzi
    category: scholar_death
    title_en: Death of al-Rāmahurmuzī — author of *al-Muḥaddith al-Fāṣil*
    title_ar: وفاة الرامهرمزي — صاحب «المحدث الفاصل»
    title_fr: Mort d'al-Rāmahurmuzī — auteur d'*al-Muḥaddith al-Fāṣil*
    description_en: |
      al-Qāḍī Abū Muḥammad al-Ḥasan ibn ʿAbd al-Raḥmān ibn
      Khallād al-Fārisī al-Rāmahurmuzī — Sunni qāḍī of
      Rāmhurmuz (in modern Khūzistān, southwestern Iran) and
      author of *al-Muḥaddith al-Fāṣil bayna al-Rāwī wa-l-Wāʿī*
      — the earliest surviving systematic treatise on
      *muṣṭalaḥ al-ḥadīth* (the technical methodology of hadith
      science as a field unto itself: requirements of the
      narrator, the rules of transmission, types of *isnād*,
      etiquette of *samāʿ* and *ijāza*) — died at Rāmhurmuz in
      360 AH (~971 CE), per al-Dhahabī's *Siyar* and *Tārīkh
      al-Islām*. The *Muḥaddith al-Fāṣil* predates the standard
      pedagogical handbooks (al-Ḥākim's *Maʿrifa*, al-Khaṭīb's
      *al-Kifāya*, Ibn al-Ṣalāḥ's *Muqaddima*) by nearly half a
      century and inaugurates the genre. Ibn Khallikān calls
      him "the qāḍī of his land, distinguished in hadith and
      adab"; the work was edited and published in modern times
      by Muḥammad ʿAjjāj al-Khaṭīb.
    description_ar: |
      توفي القاضي أبو محمد الحسن بن عبد الرحمن بن خلاد
      الفارسي الرامهرمزي — قاض من أهل السنة في رامهرمز (في
      خوزستان، جنوب غرب إيران اليوم)، ومصنف «المحدث الفاصل
      بين الراوي والواعي» — أقدم مصنف منهجي واصل في علم
      مصطلح الحديث (شروط الراوي، قواعد التحمل والأداء،
      أنواع الإسناد، أدب السماع والإجازة) — برامهرمز سنة
      ٣٦٠ هـ (~٩٧١ م)، كما حفظ الذهبي في «السير» و«تاريخ
      الإسلام». و«المحدث الفاصل» يسبق الكتب التعليمية
      المعتمدة («معرفة علوم الحديث» للحاكم، و«الكفاية»
      للخطيب، و«مقدمة ابن الصلاح») بنحو نصف قرن، وهو فاتح
      هذا الفن. قال عنه ابن خلكان: «قاضي بلده، له معرفة
      بالحديث والأدب». وقد حقق الكتاب وطبعه في العصر الحديث
      محمد عجاج الخطيب.
    description_fr: |
      al-Qāḍī Abū Muḥammad al-Ḥasan ibn ʿAbd al-Raḥmān ibn
      Khallād al-Fārisī al-Rāmahurmuzī — *qāḍī* sunnite de
      Rāmhurmuz (dans l'actuel Khūzistān, sud-ouest de l'Iran)
      et auteur d'*al-Muḥaddith al-Fāṣil bayna al-Rāwī wa-l-
      Wāʿī* — le plus ancien traité systématique conservé sur
      le *muṣṭalaḥ al-ḥadīth* (la méthodologie technique de la
      science hadith comme champ propre : exigences du
      transmetteur, règles de transmission, types d'*isnād*,
      étiquette du *samāʿ* et de l'*ijāza*) — mourut à
      Rāmhurmuz en 360 H (~971 EC), selon les *Siyar* et le
      *Tārīkh al-Islām* d'al-Dhahabī. Le *Muḥaddith al-Fāṣil*
      précède les manuels pédagogiques standards (la *Maʿrifa*
      d'al-Ḥākim, *al-Kifāya* d'al-Khaṭīb, la *Muqaddima* d'Ibn
      al-Ṣalāḥ) de près d'un demi-siècle et inaugure le genre.
      Ibn Khallikān le qualifie de « *qāḍī* de son pays,
      distingué en hadith et en adab » ; l'œuvre a été éditée
      et publiée à l'époque moderne par Muḥammad ʿAjjāj
      al-Khaṭīb.
    canonical_hijri: {year: 360, precision: year}
    canonical_gregorian: {date: 971-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Death at Rāmhurmuz 360 AH per al-Dhahabī; al-Muḥaddith al-Fāṣil is earliest surviving muṣṭalaḥ treatise."
      - source_key: dhahabi_tarikh_islam
        notes: "Tārīkh al-Islām year-360 entry confirms death."
      - source_key: ibn_khallikan_wafayat
