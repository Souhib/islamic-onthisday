  - slug: death-of-ishaq-ibn-rahawayh
    category: scholar_death
    title_en: Death of Isḥāq ibn Rāhawayh — Khurāsānian imam, teacher of al-Bukhārī and Muslim
    title_ar: وفاة إسحاق بن راهويه — إمام خراسان وشيخ البخاري ومسلم
    title_fr: Mort d'Isḥāq ibn Rāhawayh — imam khurasanien, maître d'al-Bukhārī et Muslim
    description_en: |
      Abū Yaʿqūb Isḥāq ibn Ibrāhīm ibn Makhlad al-Ḥanẓalī
      al-Marwazī, known as Ibn Rāhawayh — paramount Sunni
      traditionist and jurist of Khurāsān in his generation,
      one of the four imams whom al-Khaṭīb al-Baghdādī paired
      as the master-pillars of the rijāl-criticism era (with
      Aḥmad ibn Ḥanbal, Yaḥyā ibn Maʿīn, and ʿAlī ibn al-Madīnī),
      and the named teacher of both al-Bukhārī and Muslim in
      their *Ṣaḥīḥ*s — died at Nīsābūr (Nishapur) on the night
      of 14 Shaʿbān 238 AH (~January 853 CE) at age about 78,
      per al-Dhahabī's *Siyar* and Ibn Khallikān's *Wafayāt*.
      Imam Aḥmad said of him "Isḥāq is unmatched in Khurāsān";
      al-Bukhārī recalled "we used to count Isḥāq among the
      teachers." His *Musnad* survives in part and is one of
      the early third-century musnads alongside those of
      al-Ṭayālisī (d. 204) and Aḥmad ibn Ḥanbal (d. 241). His
      mukhtaṣar fiqh works seeded the eastern Shāfiʿī-Hanbalī
      cross-influence that shaped Khurāsānian Sunnī jurisprudence
      down through al-Bayhaqī.
    description_ar: |
      توفي الإمام أبو يعقوب إسحاق بن إبراهيم بن مخلد الحنظلي
      المروزي المعروف بابن راهويه — شيخ خراسان من أهل السنة
      في زمانه، وأحد الأئمة الأربعة الذين اقترن بهم الخطيب
      البغدادي أعمدة عصر الجرح والتعديل (مع أحمد بن حنبل
      ويحيى بن معين وعلي بن المديني)، ومن شيوخ البخاري ومسلم
      المنصوص عليهم في «الصحيحين» — بنيسابور ليلة الرابع عشر
      من شعبان سنة ٢٣٨ هـ (~يناير ٨٥٣ م) عن نحو ثمان وسبعين
      سنة، كما حفظ الذهبي في «السير» وابن خلكان في «الوفيات».
      قال عنه أحمد بن حنبل: «لا يعرف لإسحاق بخراسان نظير»،
      وقال البخاري: «كنا نعدّ إسحاق من المشايخ». وله «المسند»
      وصلنا منه قسم، وهو من المسانيد المبكرة في القرن الثالث
      مع مسند الطيالسي (ت ٢٠٤ هـ) ومسند أحمد (ت ٢٤١ هـ).
      وكتبه الفقهية المختصرة أوّلت التلاقح الشافعي-الحنبلي
      الخراساني الذي تجلى في فقه نيسابور وصولاً إلى البيهقي.
    description_fr: |
      Abū Yaʿqūb Isḥāq ibn Ibrāhīm ibn Makhlad al-Ḥanẓalī
      al-Marwazī, dit Ibn Rāhawayh — traditionniste et juriste
      sunnite par excellence du Khurāsān de sa génération, l'un
      des quatre imams qu'al-Khaṭīb al-Baghdādī associa comme
      piliers maîtres de l'ère de la critique des *rijāl* (avec
      Aḥmad ibn Ḥanbal, Yaḥyā ibn Maʿīn et ʿAlī ibn al-Madīnī),
      et maître nommé d'al-Bukhārī comme de Muslim dans leurs
      *Ṣaḥīḥ*s — mourut à Nīsābūr (Nishapur) dans la nuit du
      14 Shaʿbān 238 H (~janvier 853 EC) à l'âge d'environ 78
      ans, selon les *Siyar* d'al-Dhahabī et les *Wafayāt*
      d'Ibn Khallikān. L'imam Aḥmad dit de lui « Isḥāq n'a pas
      d'égal au Khurāsān » ; al-Bukhārī se rappela « nous
      comptions Isḥāq parmi nos maîtres ». Son *Musnad* nous
      est partiellement parvenu et compte parmi les *musnads*
      précoces du troisième siècle aux côtés de ceux d'al-
      Ṭayālisī (m. 204 H) et d'Aḥmad ibn Ḥanbal (m. 241 H). Ses
      *mukhtaṣar* de fiqh ont semé le croisement shāfiʿite-
      hanbalite oriental qui a façonné la jurisprudence sunnite
      khurasanienne jusqu'à al-Bayhaqī.
