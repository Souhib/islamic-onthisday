  # =========================================================================
  # MID 3rd CENTURY AH — THE TWO RĀZĪS AND CONTEMPORARIES
  # =========================================================================

  - slug: death-of-abu-zura-al-razi
    category: scholar_death
    title_en: Death of Abū Zurʿa al-Rāzī — chief rijāl critic of Rayy
    title_ar: وفاة أبي زرعة الرازي — كبير نقاد الرجال بالري
    title_fr: Mort d'Abū Zurʿa al-Rāzī — premier critique des *rijāl* de Rayy
    description_en: |
      Abū Zurʿa ʿUbaydullah ibn ʿAbd al-Karīm ibn Yazīd al-Rāzī
      — Sunni traditionist and master rijāl critic of Rayy
      (al-Rayy, near modern Tehran), close companion and exact
      contemporary of Abū Ḥātim al-Rāzī (d. 277 AH), and one of
      the half-dozen authoritative voices whose verdict could
      definitively pass or fail a hadith narrator in the second
      half of the third century AH — died at Rayy at the very
      end of Dhū al-Ḥijja 264 AH (~September 878 CE) at age
      about 64, per al-Dhahabī's *Siyar* and *Tārīkh al-Islām*.
      His extensive *Suʾālāt* and *ʿIlal* — questions on hadith
      narrators and their hidden defects — survive in
      transmissions through his son Abū Muḥammad and through
      al-Bardhaʿī, and form one of the principal early sources
      of the *jarḥ wa-l-taʿdīl* genre. Aḥmad ibn Ḥanbal said of
      him: "no one has crossed the bridge of Khurāsān like Abū
      Zurʿa, in his memory and in his integrity." His verdicts
      are extensively quoted in Ibn Ḥajar's *Tahdhīb al-Tahdhīb*
      and in his son Ibn Abī Ḥātim's *al-Jarḥ wa-l-Taʿdīl*.
    description_ar: |
      توفي الإمام أبو زرعة عبيد الله بن عبد الكريم بن يزيد
      الرازي — محدث من أهل السنة وكبير نقاد الرجال في الري
      (قرب طهران اليوم)، قرين أبي حاتم الرازي (ت ٢٧٧ هـ)،
      وأحد رؤوس المعدودين الذين بحكمهم يعرف الراوي ثقةً أو
      تركاً في النصف الثاني من القرن الثالث الهجري — بالري
      في أواخر ذي الحجة سنة ٢٦٤ هـ (~سبتمبر ٨٧٨ م) عن نحو
      أربع وستين سنة، كما حفظ الذهبي في «السير» و«تاريخ
      الإسلام». تركت «سؤالاته» و«علله» في رواة الحديث وعلل
      أسانيدها — ينقلها ابنه عبد الرحمن أبو محمد والبردعي —
      أصلاً من أصول كتب الجرح والتعديل المبكرة. قال عنه أحمد
      بن حنبل: «ما عبر جسر خراسان مثل أبي زرعة في حفظه
      وأمانته». ونقل أحكامه ابن حجر في «تهذيب التهذيب» وابن
      أبي حاتم في «الجرح والتعديل» نقلاً واسعاً.
    description_fr: |
      Abū Zurʿa ʿUbaydullah ibn ʿAbd al-Karīm ibn Yazīd al-Rāzī
      — traditionniste sunnite et grand critique des *rijāl* de
      Rayy (al-Rayy, près de l'actuelle Téhéran), compagnon
      proche et contemporain exact d'Abū Ḥātim al-Rāzī (m. 277
      H), et l'une des demi-douzaine de voix faisant autorité
      dont le verdict pouvait définitivement valider ou écarter
      un transmetteur de hadith dans la seconde moitié du 3e
      siècle hégirien — mourut à Rayy à la toute fin de Dhū
      al-Ḥijja 264 H (~septembre 878 EC) à l'âge d'environ 64
      ans, selon les *Siyar* et le *Tārīkh al-Islām* d'al-Dhahabī.
      Ses vastes *Suʾālāt* et *ʿIlal* — questions sur les
      transmetteurs et défauts cachés de leurs chaînes — nous
      sont parvenus par transmission à travers son fils Abū
      Muḥammad et al-Bardhaʿī, et forment l'une des sources
      principales du genre *al-jarḥ wa-l-taʿdīl*. Aḥmad ibn
      Ḥanbal dit de lui : « personne n'a traversé le pont du
      Khurāsān comme Abū Zurʿa, dans sa mémoire et son intégrité ».
      Ses verdicts sont abondamment cités dans le *Tahdhīb
      al-Tahdhīb* d'Ibn Ḥajar et dans *al-Jarḥ wa-l-Taʿdīl* de
      son fils Ibn Abī Ḥātim.
