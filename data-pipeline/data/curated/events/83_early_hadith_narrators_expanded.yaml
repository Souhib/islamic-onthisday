  - slug: death-of-ibn-al-jarud
    category: scholar_death
    title_en: Death of Ibn al-Jārūd — author of *al-Muntaqā*
    title_ar: وفاة ابن الجارود — صاحب «المنتقى»
    title_fr: Mort d'Ibn al-Jārūd — auteur d'*al-Muntaqā*
    description_en: |
      Abū Muḥammad ʿAbdullah ibn ʿAlī ibn al-Jārūd al-Naysābūrī
      — Sunni Khurāsānian traditionist who settled at Mecca,
      and compiler of *al-Muntaqā fī al-Sunan al-Musnada* (a
      selective Sunan focused on aḥkām hadith, a compact and
      stringent compilation that aspires to the rigour of the
      Ṣaḥīḥayn while organising material by chapters of
      jurisprudence) — died at Mecca in 307 AH (~919 CE), per
      al-Dhahabī's *Siyar* and *Tārīkh al-Islām*. His *Muntaqā*
      contains roughly 1,114 narrations. Later scholars
      including al-Bayhaqī, Ibn Khuzayma's contemporaries, and
      Ibn Ḥajar treat the *Muntaqā* as a high-tier post-
      Ṣaḥīḥayn collection — al-Dhahabī describes it in the
      *Siyar* as a book "in which there is little criticism for
      its compiler," indicating that the editorial standard
      approaches but does not fully match the two Ṣaḥīḥs. Imam
      al-Suyūṭī cites the work for legal narrations not found
      in the Six Books.
    description_ar: |
      توفي الإمام أبو محمد عبد الله بن علي بن الجارود
      النيسابوري — محدث من أهل السنة من خراسان استوطن مكة،
      ومصنف «المنتقى في السنن المسندة» — وهو سنن انتقائية في
      أحاديث الأحكام، مجموع موجز متقن طمحَ صاحبه أن يقاربَ
      شرط الصحيحين مع ترتيب أبواب الفقه — بمكة المكرمة سنة
      ٣٠٧ هـ (~٩١٩ م)، كما حفظ الذهبي في «السير» و«تاريخ
      الإسلام». ويضم «المنتقى» نحو ألف ومئة وأربعة عشر
      حديثاً. وعدّه المتأخرون بمن فيهم البيهقي ومعاصرو ابن
      خزيمة وابن حجر مجموعةً عاليةَ الرتبة بعد الصحيحين؛
      وقال عنه الذهبي في «السير»: «كتابه قَلَّ ما يُنتقد على
      صاحبه فيه»، ممّا يدل على أن الشرط يكاد يقرب من شرط
      الصحيحين دون أن يبلغه. واستشهد به السيوطي في الأحاديث
      الفقهية التي لم تخرج في الكتب الستة.
    description_fr: |
      Abū Muḥammad ʿAbdullah ibn ʿAlī ibn al-Jārūd al-Naysābūrī
      — traditionniste khurasanien sunnite installé à La Mecque
      et compilateur d'*al-Muntaqā fī al-Sunan al-Musnada* (Sunan
      sélectif centré sur les hadiths d'*aḥkām*, compilation
      compacte et rigoureuse qui aspire à la rigueur des
      Ṣaḥīḥayn tout en organisant le matériel par chapitres de
      jurisprudence) — mourut à La Mecque en 307 H (~919 EC),
      selon les *Siyar* et le *Tārīkh al-Islām* d'al-Dhahabī.
      Son *Muntaqā* contient environ 1 114 narrations. Les
      savants tardifs, notamment al-Bayhaqī, les contemporains
      d'Ibn Khuzayma et Ibn Ḥajar, traitent le *Muntaqā* comme
      une collection post-Ṣaḥīḥayn de très haut niveau ;
      al-Dhahabī le décrit dans les *Siyar* comme un livre « où
      l'on critique peu son compilateur », indiquant que la
      norme éditoriale approche celle des deux *Ṣaḥīḥ* sans la
      rejoindre pleinement. L'imam al-Suyūṭī cite l'œuvre pour
      des narrations juridiques absentes des Six Livres.
