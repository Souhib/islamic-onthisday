  - slug: death-of-ibn-abi-shayba
    category: scholar_death
    title_en: Death of Abū Bakr Ibn Abī Shayba — author of *al-Muṣannaf*
    title_ar: وفاة أبي بكر ابن أبي شيبة — صاحب «المصنف»
    title_fr: Mort d'Abū Bakr Ibn Abī Shayba — auteur d'*al-Muṣannaf*
    description_en: |
      Abū Bakr ʿAbdullah ibn Muḥammad ibn Ibrāhīm ibn ʿUthmān
      ibn Abī Shayba al-ʿAbsī al-Kūfī — Sunni Kūfan traditionist
      and compiler of *al-Muṣannaf*, the largest surviving
      hadith musnad-muṣannaf from the early third century AH
      (preserving roughly 38,000 narrations organised by chapters
      of fiqh) — died at Kūfa in Muḥarram 235 AH (~August 849
      CE) per al-Dhahabī, Ibn Khallikān, and Ibn Kathīr. He is
      a named teacher of Imam al-Bukhārī (in the *Ṣaḥīḥ*),
      Imam Muslim, Imam Abū Dāwūd, Ibn Mājah, and his own brother
      ʿUthmān ibn Abī Shayba (also a major narrator). His
      *Muṣannaf* preserves a vast body of Companion and tabiʿī
      legal-hadith material older than the Six Books and is one
      of the two pillar muṣannafs of the era, paired with that
      of ʿAbd al-Razzāq al-Ṣanʿānī (d. 211 AH). Aḥmad ibn Ḥanbal
      called him "an embodied trove of hadith" (*ṣadūq*); al-ʿIjlī
      placed him among the foremost ḥuffāẓ of Kūfa.
    description_ar: |
      توفي الإمام أبو بكر عبد الله بن محمد بن إبراهيم بن عثمان
      بن أبي شيبة العبسي الكوفي — محدث الكوفة من أهل السنة،
      صاحب «المصنف» وهو أكبر مصنفات الحديث الواصلة من أوائل
      القرن الثالث الهجري (يضم نحو ثمانية وثلاثين ألف حديث
      مرتبة على أبواب الفقه) — بالكوفة في محرم سنة ٢٣٥ هـ
      (~أغسطس ٨٤٩ م) كما حفظ ذلك الذهبي وابن خلكان وابن كثير.
      وهو من شيوخ الإمام البخاري في «الصحيح»، ومسلم وأبي داود
      وابن ماجه، ومن شيوخ أخيه عثمان بن أبي شيبة وكان أيضاً
      محدثاً كبيراً. ويحفظ «المصنف» تراثاً واسعاً من أحاديث
      الصحابة والتابعين الفقهية أقدم من الكتب الستة، وهو أحد
      ركني المصنفات في عصره مع «مصنف عبد الرزاق الصنعاني» (ت
      ٢١١ هـ). قال الإمام أحمد بن حنبل في وصفه: «صدوق» وعدّه
      العجلي في كبار حفاظ الكوفة.
    description_fr: |
      Abū Bakr ʿAbdullah ibn Muḥammad ibn Ibrāhīm ibn ʿUthmān
      ibn Abī Shayba al-ʿAbsī al-Kūfī — traditionniste sunnite
      koufi et compilateur d'*al-Muṣannaf*, la plus vaste
      compilation hadith *musnad-muṣannaf* parvenue du début du
      troisième siècle hégirien (préservant environ 38 000
      narrations organisées par chapitres de fiqh) — mourut à
      Koufa en Muḥarram 235 H (~août 849 EC) selon al-Dhahabī,
      Ibn Khallikān et Ibn Kathīr. Il fut l'un des maîtres nommés
      de l'imam al-Bukhārī (dans le *Ṣaḥīḥ*), de l'imam Muslim,
      d'Abū Dāwūd, d'Ibn Mājah, et de son propre frère ʿUthmān
      ibn Abī Shayba (lui-même narrateur majeur). Son *Muṣannaf*
      préserve un vaste corpus de matériel légal hadith des
      Compagnons et des *tābiʿūn* antérieur aux Six Livres et
      constitue l'un des deux *muṣannafs* piliers de l'époque,
      avec celui de ʿAbd al-Razzāq al-Ṣanʿānī (m. 211 H). Aḥmad
      ibn Ḥanbal le qualifia de « trésor incarné de hadith »
      (*ṣadūq*) ; al-ʿIjlī le plaça parmi les plus grands
      *ḥuffāẓ* de Koufa.
    canonical_hijri: {year: 235, month: 1, precision: month}
    canonical_gregorian: {date: 849-08-01, precision: month, method: tabular_conversion}
