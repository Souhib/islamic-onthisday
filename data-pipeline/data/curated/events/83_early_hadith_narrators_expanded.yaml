# Wave 32 of curated event additions (2026-04-27).
# Early Sunni hadith narrators and rijāl scholars, 2nd-5th centuries AH,
# not previously covered. Twelve figures spanning the formation of the
# rijāl-criticism tradition (Ḥammād b. Zayd → Ibn al-Madīnī's circle →
# the two Rāzīs → Ibn Khuzayma's contemporaries → al-Lalakāʾī),
# four sub-Ṣaḥīḥayn musnad/Sunan compilers (Saʿīd b. Manṣūr, Ibn Abī
# Shayba, al-Bazzār, Ibn al-Jārūd, Abū ʿAwāna), and the canonical
# *Sharḥ Uṣūl Iʿtiqād Ahl al-Sunna* and *al-Sharīʿa* of late-creedal
# Sunni codification (al-Lalakāʾī, al-Ājurrī).
#
# Already covered elsewhere and intentionally not duplicated here:
# Sufyān ibn ʿUyayna (death-of-sufyan-ibn-uyayna), Hammād ibn Salama
# (death-of-hammad-ibn-salama), ʿAbd Allāh ibn Wahb (death-of-ibn-wahb),
# Yaḥyā ibn Maʿīn (death-of-yahya-ibn-main), ʿAlī ibn al-Madīnī
# (death-of-ali-ibn-al-madini), Ibn Khuzayma (death-of-ibn-khuzayma),
# Ibn Ḥibbān (death-of-ibn-hibban), al-Khaṭīb al-Baghdādī, al-Bayhaqī.
#
# Sources: al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ* (the master rijāl
# biographical dictionary — covers every figure here), Ibn Khallikān's
# *Wafayāt al-Aʿyān* (death-focused), Ibn Kathīr's *al-Bidāya wa-l-
# Nihāya* (year-by-year chronicle), Ibn al-ʿImād al-Ḥanbalī's
# *Shadharāt al-Dhahab* (year-by-year obituary), and al-Dhahabī's
# *Tārīkh al-Islām* (year-by-year). Each entry attests to ≥2 of these
# classical Sunni sources for cross_verified status.
#
# Date precision: most figures are year-precise in the canonical
# wafayāt literature; a handful are month- or day-precise (notably
# Ḥammād b. Zayd in Ramaḍān 179, Isḥāq b. Rāhawayh on the night of
# 14 Shaʿbān 238, Ibn Abī Shayba in Muḥarram 235, al-Ājurrī in
# Muḥarram 360, al-Lalakāʾī in Ramaḍān 418). Where sources disagree
# we follow the majority and flag the dispute (Saʿīd b. Manṣūr 227 vs
# 229, Abū Ḥātim 277 vs 275, Abū Bakr al-Ājurrī 360 vs 365).
#
# All trilingual (en/ar/fr); no hadith refs needed (these are
# biographical death events, not narration events).

events:
  # =========================================================================
  # 2nd CENTURY AH — THE FORMATION OF BASRAN HADITH SCIENCE
  # =========================================================================

  - slug: death-of-hammad-ibn-zayd
    category: scholar_death
    title_en: Death of Ḥammād ibn Zayd — chief Basran muḥaddith of his generation
    title_ar: وفاة حماد بن زيد — كبير محدثي البصرة في عصره
    title_fr: Mort de Ḥammād ibn Zayd — chef des muḥaddiths bassorois de sa génération
    description_en: |
      Abū Ismāʿīl Ḥammād ibn Zayd ibn Dirham al-Azdī al-Jahḍamī
      al-Baṣrī — Sunni Basran traditionist of mawlā (freedman)
      origin, blind in his later years, and the senior teacher
      from whom Imam al-Shāfiʿī, ʿAbd al-Raḥmān ibn Mahdī, Yaḥyā
      ibn Saʿīd al-Qaṭṭān, and a generation of the foundational
      Basran hadith critics learned — died at Basra on the
      eve of 10 Ramaḍān 179 AH (~December 795 CE) at age about
      81, per al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ*. He was a
      direct student of Ayyūb al-Sakhtiyānī and Yaḥyā ibn Saʿīd
      al-Anṣārī and is one of the principal nodes through whom
      the canonical Basran *isnād* into the Six Books descends;
      al-Dhahabī ranks him in the highest tier of hadith
      narrators (*ḥuffāẓ*) and quotes Ibn Mahdī as saying
      "I have not seen anyone in Iraq more knowledgeable of the
      Sunna than Ḥammād ibn Zayd." He is to be carefully
      distinguished from his contemporary and counterpart
      Ḥammād ibn Salama (d. 167 AH); the early sources note
      that on questions where the two Ḥammāds differ, Ibn Zayd
      is generally the more rigorous transmitter, while Ibn
      Salama has the broader narrative range.
    description_ar: |
      توفي الإمام أبو إسماعيل حماد بن زيد بن درهم الأزدي
      الجَهْضمي البصري — محدث البصرة من أهل السنة وكان مولى،
      عمي في آخر عمره، وعنه أخذ الإمام الشافعي وعبد الرحمن بن
      مهدي ويحيى بن سعيد القطان وطبقة من نقاد البصرة المؤسسين
      علم الجرح والتعديل — بالبصرة ليلة العاشر من رمضان سنة
      ١٧٩ هـ (~ديسمبر ٧٩٥ م) عن نحو إحدى وثمانين سنة، كما
      حفظ الذهبي في «سير أعلام النبلاء». تتلمذ مباشرة على أيوب
      السختياني ويحيى بن سعيد الأنصاري، وهو إحدى العقد
      الأساسية في إسناد البصرة الذي يدخل به الكتب الستة؛ عدّه
      الذهبي في الطبقة العليا من الحفاظ، ونقل عن ابن مهدي قوله:
      «ما رأيت بالعراق أحداً أعلم بالسنة من حماد بن زيد».
      ويفرّق العلماء بدقة بينه وبين قرينه حماد بن سلمة (ت ١٦٧
      هـ)؛ ونبه المتقدمون إلى أن ابن زيد أتقن في موضع الخلاف
      بينهما عموماً، وابن سلمة أوسع رواية.
    description_fr: |
      Abū Ismāʿīl Ḥammād ibn Zayd ibn Dirham al-Azdī
      al-Jahḍamī al-Baṣrī — traditionniste sunnite bassorois
      d'origine *mawlā* (affranchi), aveugle à la fin de sa vie,
      et le maître de premier plan auprès duquel l'imam
      al-Shāfiʿī, ʿAbd al-Raḥmān ibn Mahdī, Yaḥyā ibn Saʿīd
      al-Qaṭṭān et toute une génération de critiques bassorois
      fondateurs ont étudié — mourut à Bassora dans la nuit du
      10 Ramaḍān 179 H (~décembre 795 EC) à l'âge d'environ
      81 ans, selon les *Siyar Aʿlām al-Nubalāʾ* d'al-Dhahabī.
      Disciple direct d'Ayyūb al-Sakhtiyānī et de Yaḥyā ibn
      Saʿīd al-Anṣārī, il constitue l'un des nœuds principaux
      par lesquels l'*isnād* canonique bassorois pénètre dans
      les Six Livres ; al-Dhahabī le classe au plus haut rang
      des préservateurs (*ḥuffāẓ*) et cite Ibn Mahdī : « je n'ai
      vu en Irak personne de plus savant en la Sunna que Ḥammād
      ibn Zayd ». Il est à distinguer soigneusement de son
      contemporain et homologue Ḥammād ibn Salama (m. 167 H) ;
      les premières sources notent qu'au point de divergence
      entre les deux Ḥammād, Ibn Zayd est généralement le
      transmetteur le plus rigoureux, tandis qu'Ibn Salama
      possède l'éventail narratif le plus large.
    canonical_hijri: {year: 179, month: 9, day: 10, precision: day}
    canonical_gregorian: {date: 795-11-25, precision: day, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Death on eve of 10 Ramaḍān 179 AH at Basra, age ~81; al-Dhahabī ranks among highest tier of ḥuffāẓ."
      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt entry confirms 179 AH death year; key Basran isnād node."
      - source_key: ibn_kathir_bidaya
        notes: "Year-by-year chronicle places death at 179 AH alongside Mālik (d. 179 AH)."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab obituary entry under year 179 AH."
    people: [[hammad-ibn-zayd, died]]
    tags: [abbasid, basra, hadith, rijal, jarh-wa-tadil, second-century-ah]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Hammad_ibn_Zayd"

