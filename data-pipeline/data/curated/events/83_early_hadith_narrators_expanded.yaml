  - slug: death-of-ibn-abi-hatim-al-razi
    category: scholar_death
    title_en: Death of Ibn Abī Ḥātim al-Rāzī — author of *al-Jarḥ wa-l-Taʿdīl*
    title_ar: وفاة ابن أبي حاتم الرازي — صاحب «الجرح والتعديل»
    title_fr: Mort d'Ibn Abī Ḥātim al-Rāzī — auteur d'*al-Jarḥ wa-l-Taʿdīl*
    description_en: |
      Abū Muḥammad ʿAbd al-Raḥmān ibn Abī Ḥātim Muḥammad ibn
      Idrīs al-Ḥanẓalī al-Rāzī — son and principal scholarly
      heir of Abū Ḥātim al-Rāzī (d. 277 AH), Sunni traditionist
      and rijāl encyclopaedist of Rayy, and compiler of
      *al-Jarḥ wa-l-Taʿdīl*, the single largest surviving
      classical compilation of pre-Bukhārī rijāl assessment (in
      nine published volumes), and of the substantial *Tafsīr
      Ibn Abī Ḥātim* (also extant) — died at Rayy in Muḥarram
      327 AH (~November 938 CE) per al-Dhahabī's *Siyar* and
      Ibn Khallikān's *Wafayāt*. His *Jarḥ* preserves verbatim
      the verdicts of his father Abū Ḥātim, his close associate
      Abū Zurʿa al-Rāzī, his master al-Bukhārī, and other
      rijāl voices of the third century AH that would otherwise
      survive only in fragments scattered through later works.
      Ibn Khallikān ranks his book "second to none in its
      genre"; it remains the indispensable foundation for
      modern hadith narrator research.
    description_ar: |
      توفي الإمام أبو محمد عبد الرحمن بن أبي حاتم محمد بن
      إدريس الحنظلي الرازي — ابن أبي حاتم الرازي (ت ٢٧٧ هـ)
      ووارثه العلمي الأكبر، محدث من أهل السنة وموسوعي علم
      الرجال بالري، ومصنف «الجرح والتعديل» — أكبر مؤلفات نقد
      الرجال الكلاسيكية الواصلة من قبل البخاري في تسع
      مجلدات مطبوعة — و«تفسير ابن أبي حاتم» (الواصل أيضاً) —
      بالري في محرم سنة ٣٢٧ هـ (~نوفمبر ٩٣٨ م) كما حفظ
      الذهبي في «السير» وابن خلكان في «الوفيات». ويحفظ كتاب
      «الجرح» نصوص أحكام أبيه أبي حاتم وقرين أبيه أبي زرعة
      الرازي وشيخه البخاري وغيرهم من نقاد القرن الثالث الهجري
      ممن لم تصلنا أحكامهم منثورةً في كتب أخرى إلا متفرقة. قال
      ابن خلكان: «كتابه فريد في بابه». وهو أساس لا غنى عنه
      في أبحاث رواة الحديث الحديثة.
    description_fr: |
      Abū Muḥammad ʿAbd al-Raḥmān ibn Abī Ḥātim Muḥammad ibn
      Idrīs al-Ḥanẓalī al-Rāzī — fils et principal héritier
      érudit d'Abū Ḥātim al-Rāzī (m. 277 H), traditionniste
      sunnite et encyclopédiste des *rijāl* de Rayy,
      compilateur d'*al-Jarḥ wa-l-Taʿdīl*, la plus vaste
      compilation classique d'évaluation des *rijāl* pré-
      bukhārienne ayant survécu (en neuf volumes publiés), et
      du substantiel *Tafsīr Ibn Abī Ḥātim* (également
      conservé) — mourut à Rayy en Muḥarram 327 H (~novembre
      938 EC) selon les *Siyar* d'al-Dhahabī et les *Wafayāt*
      d'Ibn Khallikān. Son *Jarḥ* préserve mot pour mot les
      verdicts de son père Abū Ḥātim, de son proche associé
      Abū Zurʿa al-Rāzī, de son maître al-Bukhārī et d'autres
      voix de la critique des *rijāl* du 3e siècle hégirien
      qui ne nous seraient autrement parvenus que par fragments
      dispersés dans des ouvrages tardifs. Ibn Khallikān classe
      son livre comme « sans égal dans son genre » ; il demeure
      le fondement indispensable de la recherche moderne sur
      les transmetteurs de hadith.
