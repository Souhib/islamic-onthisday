  - slug: death-of-yaqub-al-fasawi
    category: scholar_death
    title_en: Death of Yaʿqūb ibn Sufyān al-Fasawī — author of *al-Maʿrifa wa-l-Tārīkh*
    title_ar: وفاة يعقوب بن سفيان الفسوي — صاحب «المعرفة والتاريخ»
    title_fr: Mort de Yaʿqūb ibn Sufyān al-Fasawī — auteur d'*al-Maʿrifa wa-l-Tārīkh*
    description_en: |
      Abū Yūsuf Yaʿqūb ibn Sufyān ibn Jawān al-Fārisī al-Fasawī
      — Sunni Persian traditionist of Fasā in Fārs, world-
      traveller (he claimed to have spent thirty years collecting
      hadith across Khurāsān, Iraq, the Ḥijāz, the Levant, Egypt,
      and the Maghrib), and author of *al-Maʿrifa wa-l-Tārīkh*
      — one of the earliest substantial Sunni biographical-
      historical compilations in three published volumes,
      particularly valuable for its preservation of Companion
      and tabiʿī biographical material — died at Fasā in Rajab
      277 AH (~October 890 CE), the same year as Abū Ḥātim
      al-Rāzī. Per al-Dhahabī he was a teacher of al-Tirmidhī
      and Abū Dāwūd's son ʿAbd Allāh, and a major narrator into
      the standard Sunni hadith corpus. His unique perspective
      as an early-third-century historian-traditionist preserves
      narrations and chronological data not found in the more
      familiar Six Books, and his work is heavily cited by Ibn
      Ḥajar in *al-Iṣāba* and by Ibn ʿAsākir.
    description_ar: |
      توفي الإمام أبو يوسف يعقوب بن سفيان بن جوّان الفارسي
      الفسوي — محدث ومؤرخ من أهل السنة من فسا بفارس، رحّال
      كبير ادّعى أنه قضى ثلاثين سنة في طلب الحديث في خراسان
      والعراق والحجاز والشام ومصر والمغرب، ومصنف «المعرفة
      والتاريخ» — وهو من أقدم المصنفات الجامعة بين علم الرجال
      والتاريخ في تراث أهل السنة، في ثلاث مجلدات مطبوعة، وله
      قيمة خاصة في حفظ تراجم الصحابة والتابعين — بفسا في رجب
      سنة ٢٧٧ هـ (~أكتوبر ٨٩٠ م)، في السنة نفسها التي توفي
      فيها أبو حاتم الرازي. ذكر الذهبي أنه من شيوخ الترمذي
      وعبد الله بن أبي داود، ومن كبار الرواة في كتب أهل السنة.
      ورؤيته الفريدة بوصفه مؤرخاً-محدثاً في أوائل القرن الثالث
      تحفظ روايات وبيانات زمنية لا توجد في الكتب الستة المشهورة،
      وقد استشهد بكتابه ابن حجر في «الإصابة» وابن عساكر استشهاداً
      واسعاً.
    description_fr: |
      Abū Yūsuf Yaʿqūb ibn Sufyān ibn Jawān al-Fārisī al-Fasawī
      — traditionniste persan sunnite de Fasā en Fārs, grand
      voyageur (il prétend avoir passé trente ans à recueillir
      des hadiths à travers le Khurāsān, l'Irak, le Ḥijāz, le
      Levant, l'Égypte et le Maghreb) et auteur d'*al-Maʿrifa
      wa-l-Tārīkh* — l'une des premières compilations
      biographico-historiques sunnites substantielles en trois
      volumes publiés, particulièrement précieuse pour sa
      préservation du matériel biographique des Compagnons et
      des *tābiʿūn* — mourut à Fasā en Rajab 277 H (~octobre 890
      EC), la même année qu'Abū Ḥātim al-Rāzī. Selon al-Dhahabī,
      il fut un maître d'al-Tirmidhī et du fils d'Abū Dāwūd
      ʿAbd Allāh, et un transmetteur majeur dans le corpus
      hadith sunnite standard. Sa perspective unique d'historien-
      traditionniste du début du 3e siècle préserve des
      narrations et données chronologiques absentes des Six
      Livres, et son œuvre est abondamment citée par Ibn Ḥajar
      dans *al-Iṣāba* et par Ibn ʿAsākir.
