  - slug: wahhabi-capture-of-karbala-1802
    category: battle
    title_en: Saudi Raid on Karbala
    title_ar: غارة السعوديين على كربلاء
    title_fr: Raid saʿūdī sur Karbalāʾ
    description_en: |
      A force of the First Saudi State under Saʿūd ibn ʿAbd
      al-ʿAzīz raided the Iraqi Shīʿī shrine-city of Karbala on
      18 Dhū al-Qaʿda 1216 AH/21 April 1802 CE, sacking the
      shrine of al-Ḥusayn ibn ʿAlī, killing a substantial number
      of inhabitants, and seizing the shrine treasury. The raid
      was carried out under the doctrinal programme of the
      Najdi daʿwa, which classed the architectural cult of
      tombs as *bidʿa* contrary to scriptural *tawḥīd*; the
      Saʿūdī force struck during a season when most of the
      city's male defenders were absent on pilgrimage. The
      attack provoked a permanent breach with Qajar Iran and a
      lasting place in the Shīʿī collective memory of the era,
      and is one of the canonical episodes of the First Saudi
      State's expansion northward. It is reported with broad
      agreement across Ottoman, Iranian, and Western sources;
      the figures for the dead vary widely between contemporary
      reports.
    description_ar: |
      غزت قواتُ الدولة السعودية الأولى بقيادة الأمير سعود بن
      عبد العزيز مدينة كربلاء العراقية الشيعية يوم ١٨ ذي
      القعدة سنة ١٢١٦ هـ (الموافق ٢١ إبريل ١٨٠٢ ميلادي)،
      فاقتحمت ضريح الحسين بن علي رضي الله عنهما، وقتلت عدداً
      كبيراً من السكان، وأخذت ما في خزانة الضريح. وقد جرى
      الغزو في إطار البرنامج الدعوي النجدي القائل ببدعية
      تعمير القبور وتعارضِها مع توحيد الكتاب والسنة، وضربت
      القوة السعودية في موسم كان كثيرٌ من المدافعين الذكور
      غائبين عن المدينة في الحج. وأحدث الغزو قطيعةً ثابتة مع
      إيران القاجارية ومكانةً ثابتة في الذاكرة الجماعية
      الشيعية لذلك العصر، وهو من المواقف الكنسية في توسع
      الدولة السعودية الأولى شمالاً. والمصادر العثمانية
      والإيرانية والغربية متفقة في وقوعه، أما عدد القتلى
      فمختلف فيه بين التقارير المعاصرة.
    description_fr: |
      Une force du Premier État saʿūdī conduite par Saʿūd ibn
      ʿAbd al-ʿAzīz lança un raid sur la ville-sanctuaire
      shīʿite irakienne de Karbalāʾ le 18 Dhū al-Qaʿda 1216
      H/21 avril 1802 EC, prenant d'assaut le sanctuaire d'al-
      Ḥusayn ibn ʿAlī, tuant un nombre considérable d'habitants
      et s'emparant du trésor du sanctuaire. Le raid s'inscrivait
      dans le programme doctrinal de la daʿwa najdī, qui classait
      l'architecture funéraire votive comme *bidʿa* contraire au
      *tawḥīd* scripturaire ; la force saʿūdī frappa pendant
      une saison où la plupart des défenseurs masculins de la
      ville étaient absents en pèlerinage. L'attaque provoqua
      une rupture permanente avec l'Iran qajar et garda une
      place durable dans la mémoire collective shīʿite de
      l'époque, et constitue l'un des épisodes canoniques de
      l'expansion du Premier État saʿūdī vers le nord. Elle est
      rapportée d'un commun accord par les sources ottomanes,
      iraniennes et occidentales ; les chiffres des morts
      varient largement entre rapports contemporains.
