  # =========================================================================
  # THIRD SAUDI STATE — RECOVERY OF RIYADH (1319 AH / 1902 CE)
  # =========================================================================

  - slug: recovery-of-riyadh-by-ibn-saud
    category: conquest
    title_en: Recovery of al-Riyāḍ by ʿAbd al-ʿAzīz Ibn Saʿūd — Beginning of the Third Saudi State
    title_ar: استرداد الرياض على يد عبد العزيز بن سعود — بداية الدولة السعودية الثالثة
    title_fr: Reprise d'al-Riyāḍ par ʿAbd al-ʿAzīz Ibn Saʿūd — début du Troisième État saʿūdī
    description_en: |
      ʿAbd al-ʿAzīz ibn ʿAbd al-Raḥmān Āl Saʿūd — son of the
      last imam of the Second Saudi State, raised in Kuwaiti
      exile from age ten — recaptured al-Riyāḍ from its
      Rashīdī governor ʿAjlān ibn Muḥammad in a night raid on
      5 Shawwāl 1319 AH/15 January 1902 CE, ending eleven
      years of Rashīdī rule and beginning what historians call
      the Third Saudi State, the polity that would, three
      decades later, become the Kingdom of Saudi Arabia. The
      raiding party of about forty men scaled the wall of
      al-Riyāḍ at night, reached the residence of the governor
      at the Mismāk fortress, and killed him in the morning
      ambush; the city's garrison surrendered. ʿAbd al-ʿAzīz's
      father ʿAbd al-Raḥmān returned from Kuwait and ceded the
      imamate to his son, who would over the next three decades
      reunite Najd, take al-Aḥsāʾ from the Ottomans (1331 AH),
      defeat the Rashīdīs at Ḥāʾil (1340 AH), incorporate the
      Ḥijāz from the Hāshimites (1343 AH), and proclaim the
      unified Kingdom of Saudi Arabia in 1351 AH/1932 CE.
    description_ar: |
      استرد الأمير عبد العزيز بن عبد الرحمن آل سعود — ابن
      آخر أئمة الدولة السعودية الثانية، الذي تربى منفيّاً
      في الكويت من سن العاشرة — مدينةَ الرياض من واليها
      الرشيدي «عجلان بن محمد» في غارة ليلية يوم ٥ شوال سنة
      ١٣١٩ هـ (الموافق ١٥ يناير ١٩٠٢ ميلادي)، فأنهى بذلك
      إحدى عشرة سنة من حكم آل رشيد، وابتدأت بذلك
      «الدولة السعودية الثالثة» التي ستصير بعد ثلاثة عقود
      المملكة العربية السعودية. وقد تَسوَّر فريق الغارة
      المؤلَّف من نحو أربعين رجلاً سور الرياض ليلاً، فبلغ
      دار الوالي في قصر المصمك، فقتله في كمين الفجر،
      واستسلمت حامية المدينة. وعاد والد الأمير عبد الرحمن
      من الكويت فسلَّم الإمامة لابنه، فقام عبد العزيز في
      ثلاثة عقود تلتها بإعادة وحدة نجد، وانتزاع الأحساء من
      العثمانيين سنة ١٣٣١ هـ، وهزيمة الرشيد بحائل سنة
      ١٣٤٠ هـ، وضمّ الحجاز من الهاشميين سنة ١٣٤٣ هـ، ثم
      أعلن المملكة العربية السعودية الموحدة سنة ١٣٥١ هـ
      (الموافق ١٩٣٢ ميلادي).
    description_fr: |
      ʿAbd al-ʿAzīz ibn ʿAbd al-Raḥmān Āl Saʿūd — fils du
      dernier imam du Second État saʿūdī, élevé en exil au
      Koweït dès l'âge de dix ans — reprit al-Riyāḍ à son
      gouverneur rashīdī ʿAjlān ibn Muḥammad par un raid
      nocturne le 5 Shawwāl 1319 H/15 janvier 1902 EC,
      mettant fin à onze ans de domination rashīdī et
      inaugurant ce que les historiens appellent le Troisième
      État saʿūdī — l'État qui deviendrait, trois décennies
      plus tard, le royaume d'Arabie saoudite. Le commando
      d'une quarantaine d'hommes escalada de nuit la muraille
      d'al-Riyāḍ, atteignit la résidence du gouverneur dans
      la forteresse de Mismāk et le tua dans une embuscade à
      l'aube ; la garnison se rendit. ʿAbd al-Raḥmān revint
      du Koweït et céda l'imamat à son fils, qui en trois
      décennies réunifierait le Najd, prendrait al-Aḥsāʾ aux
      Ottomans (1331 H), défairait les Rashīdīs à Ḥāʾil
      (1340 H), annexerait le Ḥijāz aux Hāshimites (1343 H)
      et proclamerait le royaume unifié d'Arabie saoudite en
      1351 H/1932 EC.
    canonical_hijri: {year: 1319, month: 10, day: 5, precision: day}
    canonical_gregorian: {date: 1902-01-15, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Ibn Saʿūd' and 'al-Riyāḍ' date the night raid to 5 Shawwāl 1319 AH / 15 January 1902 CE."
      - source_key: editorial
        notes: "Editorial summary; date attested in all standard Saʿūdī, Western, and Ottoman accounts."
