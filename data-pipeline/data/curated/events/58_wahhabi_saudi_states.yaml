  - slug: wahhabi-capture-of-al-ahsa
    category: conquest
    title_en: Capture of al-Aḥsāʾ by the First Saudi State
    title_ar: ضمّ الأحساء إلى الدولة السعودية الأولى
    title_fr: Conquête d'al-Aḥsāʾ par le Premier État saʿūdī
    description_en: |
      The army of Saʿūd ibn ʿAbd al-ʿAzīz — son and heir-apparent
      of the Saʿūdī emir ʿAbd al-ʿAzīz ibn Muḥammad — captured
      the oasis-province of al-Aḥsāʾ on the Gulf coast in 1207
      AH/1793 CE, ending the local Banū Khālid emirate that had
      held the province since the seventeenth century. The
      conquest gave the First Saudi State its first Gulf
      coastline and the customs revenues of the trans-Arabian
      caravan terminus at al-Hufūf and al-Mubarraz. Al-Aḥsāʾ —
      with a substantial Twelver Shīʿī population — was placed
      under a Wahhābī-Saʿūdī governor, and its tribute funded
      the subsequent campaigns into the Ḥijāz and southern Iraq.
      The province would remain under intermittent Saʿūdī
      control through the destruction of al-Dirʿiyya in 1233 AH
      and was reconquered for the Third Saudi State by ʿAbd
      al-ʿAzīz ibn Saʿūd in 1331 AH/1913 CE.
    description_ar: |
      افتتح الأمير سعود بن عبد العزيز — ولي عهد الأمير عبد
      العزيز بن محمد بن سعود — إقليمَ الأحساء على ساحل الخليج
      سنة ١٢٠٧ هـ (١٧٩٣ ميلادي)، فأنهى إمارة بني خالد
      المحلية التي كانت تحكم الإقليم منذ القرن الحادي عشر
      الهجري. وأَتاح هذا الفتح للدولة السعودية الأولى أول
      منفذٍ بحري لها، ومدخولات جمارك المحطة العابرة للجزيرة في
      الهفوف والمبرّز. وكان في الأحساء عدد كبير من الشيعة
      الإمامية، فعُيِّن عليها والٍ سعودي وهابي، وموَّلت جزيتها
      الحملاتِ التالية على الحجاز وجنوب العراق. وبقي الإقليم
      تحت سيطرة سعودية متقطعة إلى تدمير الدرعية سنة ١٢٣٣ هـ،
      وأَعاد الملك عبد العزيز ابن سعود فتحه للدولة السعودية
      الثالثة سنة ١٣٣١ هـ (١٩١٣ ميلادي).
    description_fr: |
      L'armée de Saʿūd ibn ʿAbd al-ʿAzīz — fils et héritier
      présomptif de l'émir saʿūdī ʿAbd al-ʿAzīz ibn Muḥammad —
      conquit l'oasis-province d'al-Aḥsāʾ sur la côte du Golfe
      en 1207 H/1793 EC, mettant fin à l'émirat local des Banū
      Khālid qui dominait la province depuis le XVIIe siècle.
      Cette conquête donna au Premier État saʿūdī sa première
      façade maritime et les revenus douaniers du terminus
      caravanier transarabique à al-Hufūf et al-Mubarraz.
      Al-Aḥsāʾ — peuplée d'une importante communauté shīʿite
      duodécimaine — fut placée sous un gouverneur saʿūdī
      wahhābī, et son tribut financera les campagnes
      ultérieures dans le Ḥijāz et le sud de l'Irak. La
      province resta sous contrôle saʿūdī intermittent jusqu'à
      la destruction d'al-Dirʿiyya en 1233 H, et fut reconquise
      pour le Troisième État saʿūdī par ʿAbd al-ʿAzīz Ibn Saʿūd
      en 1331 H/1913 EC.
    canonical_hijri: {year: 1207, precision: year}
    canonical_gregorian: {date: 1793-01-01, precision: year, method: tabular_conversion}
