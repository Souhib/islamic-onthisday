  - slug: death-of-muhammad-ibn-abd-al-wahhab
    category: scholar_death
    title_en: Death of Muḥammad ibn ʿAbd al-Wahhāb — the Najdi Reformer
    title_ar: وفاة الشيخ محمد بن عبد الوهاب — صاحب الدعوة النجدية
    title_fr: Mort de Muḥammad ibn ʿAbd al-Wahhāb — le réformateur najdī
    description_en: |
      Muḥammad ibn ʿAbd al-Wahhāb al-Tamīmī, Najdi Sunni-Ḥanbalī
      jurist and the religious leader of the Najdi daʿwa, died at
      al-Dirʿiyya in 1206 AH/1792 CE at about ninety lunar years
      of age. Trained in the Ḥanbalī jurisprudence of Najd,
      Medina, Basra, and al-Aḥsāʾ — and steeped in the works of
      Ibn Taymiyya and Ibn Qayyim al-Jawziyya — he called from
      circa 1157 AH onward for a return to direct scriptural
      *tawḥīd* and the abandonment of practices he classed as
      *bidʿa*: intercession at tombs, votive vows, saint-cult
      shrines, magical amulets. His treatise *Kitāb al-Tawḥīd*
      and the *Thalāthat al-Uṣūl* became the catechetical core
      of the daʿwa. His pact with Muḥammad ibn Saʿūd at
      al-Dirʿiyya (c. 1157 AH/1744 CE) gave the movement a
      political vehicle; by his death the First Saudi State
      controlled most of central Arabia. He was succeeded in
      religious authority by his sons and the lineage of Āl
      al-Shaykh, which has retained that role across all three
      Saudi states.
    description_ar: |
      توفي الشيخ محمد بن عبد الوهاب التميمي — الفقيه النجدي
      السني الحنبلي، وإمام الدعوة النجدية — في الدرعية سنة
      ١٢٠٦ هـ (١٧٩٢ ميلادي) عن نحو تسعين سنة هلالية. قرأ فقه
      الحنابلة بنجد والمدينة والبصرة والأحساء، وعنيَ خاصةً
      بأعمال شيخ الإسلام ابن تيمية وتلميذه ابن قيم الجوزية،
      ودعا منذ نحو سنة ١١٥٧ هـ إلى تجريد التوحيد على نصوص
      الكتاب والسنة وترك ما عدَّه من البدع: الاستغاثة بالقبور،
      والنذور لها، وعمارة الأضرحة، والتمائم. وصار كتاباه
      «التوحيد» و«الأصول الثلاثة» متن الدعوة. وأَفضى ميثاقه
      مع الأمير محمد بن سعود في الدرعية نحو سنة ١١٥٧ هـ
      (١٧٤٤ ميلادي) إلى مرتكز سياسي عسكري للدعوة، وعند وفاته
      كانت الدولة السعودية الأولى قد بسطت سلطانها على معظم
      وسط الجزيرة. وخلفه في الإمامة الدينية أولاده وذريّته من
      «آل الشيخ»، وقد بقيت هذه السلطة في عقبهم في الدول
      السعودية الثلاث.
    description_fr: |
      Muḥammad ibn ʿAbd al-Wahhāb al-Tamīmī, juriste sunnite-
      ḥanbalī najdī et chef religieux de la daʿwa najdī, mourut
      à al-Dirʿiyya en 1206 H/1792 EC, à environ quatre-vingt-
      dix années lunaires. Formé au fiqh ḥanbalī au Najd, à
      Médine, à Bassora et à al-Aḥsāʾ — et nourri de l'œuvre
      d'Ibn Taymiyya et d'Ibn Qayyim al-Jawziyya — il appela à
      partir de 1157 H environ à un retour au *tawḥīd*
      strictement scripturaire et au rejet de ce qu'il classait
      comme *bidʿa* : intercession aux tombeaux, vœux votifs,
      culte des saints, amulettes. Son *Kitāb al-Tawḥīd* et les
      *Thalāthat al-Uṣūl* devinrent le manuel catéchétique de la
      daʿwa. Son pacte avec Muḥammad ibn Saʿūd à al-Dirʿiyya
      (vers 1157 H/1744 EC) donna au mouvement un véhicule
      politique ; à sa mort, le Premier État saʿūdī contrôlait
      la majeure partie de l'Arabie centrale. Ses fils et la
      lignée des Āl al-Shaykh lui succédèrent dans l'autorité
      religieuse, qu'ils ont conservée à travers les trois
      États saʿūdī.
    canonical_hijri: {year: 1206, precision: year}
    canonical_gregorian: {date: 1792-01-01, precision: year, method: tabular_conversion}
