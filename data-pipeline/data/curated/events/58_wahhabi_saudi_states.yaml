  - slug: first-wahhabi-capture-of-medina
    category: conquest
    title_en: First Saudi Capture of Medina
    title_ar: دخول السعوديين الأول المدينةَ المنورة
    title_fr: Première prise de Médine par le Premier État saʿūdī
    description_en: |
      A Saʿūdī army under Saʿūd ibn ʿAbd al-ʿAzīz — by then
      effective ruler of the First Saudi State after the
      assassination of his father ʿAbd al-ʿAzīz at al-Dirʿiyya
      in 1218 AH — entered Medina in 1220 AH/1805 CE after a
      siege of about a year, completing Saʿūdī control of the
      Ḥijāz. The Ottoman garrison and the city's governor
      were expelled; Saʿūdī authority over the Prophet's ﷺ
      city, like that over Mecca two years earlier, was the
      first non-Hāshimite, non-Ottoman regime since the
      Ayyūbid era. During the occupation a number of votive
      domes and shrine-structures within al-Baqīʿ cemetery
      were demolished in line with the daʿwa's *bidʿa*
      programme. Saʿūdī administration of Medina lasted until
      Ibrāhīm Pāshā's Egyptian-Ottoman army recovered the
      city in 1227 AH/1812 CE, opening the campaign that
      would end at al-Dirʿiyya six years later.
    description_ar: |
      دخل جيش الدولة السعودية الأولى بقيادة الأمير سعود بن
      عبد العزيز — وقد صار حينها الحاكم الفعلي للدولة بعد
      اغتيال أبيه عبد العزيز في الدرعية سنة ١٢١٨ هـ —
      المدينةَ المنورة سنة ١٢٢٠ هـ (الموافق ١٨٠٥ ميلادي)
      بعد حصار قرابة السنة، فاكتمل بذلك سلطان الدولة على
      الحجاز. وأخرج الأميرُ الحاميةَ العثمانية ووالي
      المدينة، فكانت سلطته على مدينة النبي ﷺ — كسلطته على
      مكة قبل ذلك بسنتين — أوّل سلطة على البلد من خارج
      الشرفاء الهاشميين والعثمانيين منذ زمن الأيوبيين.
      وأثناء الإقامة هُدمت قبابٌ وأبنية موقوفة على قبور
      البقيع وفقاً لبرنامج الدعوة في إنكار البدع. وامتدت
      الإدارة السعودية في المدينة إلى أن استعادها جيش
      إبراهيم باشا المصري العثماني سنة ١٢٢٧ هـ (١٨١٢
      ميلادي)، فابتدأت بذلك الحملة التي ستنتهي بسقوط
      الدرعية بعد ست سنوات.
    description_fr: |
      Une armée saʿūdī conduite par Saʿūd ibn ʿAbd al-ʿAzīz —
      dirigeant effectif du Premier État saʿūdī après
      l'assassinat de son père ʿAbd al-ʿAzīz à al-Dirʿiyya en
      1218 H — entra à Médine en 1220 H/1805 EC à l'issue
      d'environ un an de siège, achevant le contrôle saʿūdī
      du Ḥijāz. La garnison ottomane et le gouverneur de la
      ville furent expulsés ; l'autorité saʿūdī sur la ville
      du Prophète ﷺ, comme celle sur La Mecque deux ans plus
      tôt, fut le premier régime non-hāshimite et non-ottoman
      depuis l'époque ayyūbide. Pendant l'occupation, plusieurs
      coupoles et structures votives du cimetière d'al-Baqīʿ
      furent détruites conformément au programme anti-*bidʿa*
      de la daʿwa. L'administration saʿūdī de Médine dura
      jusqu'à la reprise de la ville par l'armée égypto-
      ottomane d'Ibrāhīm Pāshā en 1227 H/1812 EC, ouvrant la
      campagne qui s'achèverait à al-Dirʿiyya six ans plus
      tard.
