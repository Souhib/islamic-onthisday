# Wave 58 of curated event additions (2026-04-27).
# The Najdi Wahhābī daʿwa and the three Saudi states. Twelve year-anchored
# entries spanning the death of Muḥammad ibn ʿAbd al-Wahhāb (1206 AH) to
# the recovery of Riyadh by ʿAbd al-ʿAzīz ibn ʿAbd al-Raḥmān Āl Saʿūd
# (1319 AH / 1902 CE) — beginning of the Third Saudi State.
#
# These events post-date the classical wafayāt corpus (al-Dhahabī d. 748 AH;
# Ibn al-ʿImād's Shadharāt extends only through 1000 AH); the standard
# secondary cross-reference pair for this era is EI2 + the editorial
# compilation, occasionally supplemented when both Brill EI2 articles for
# the figure exist (e.g. "Wahhābiyya", "Saʿūd"). Where ≥2 source rows from
# sources.yaml could not be justified independently, the entry is marked
# single_source.
#
# Editorial framing — explicitly factual-historical, neither endorsing the
# Wahhābī theological programme nor adopting modernist polemic against it.
# Muḥammad ibn ʿAbd al-Wahhāb is presented as a Najdi Sunni Ḥanbalī
# reformer; the Saʿūd polities are presented as the political vehicles of
# his daʿwa. The capture of Karbala (1216 AH/1802 CE) and the destruction
# of shrines is reported factually. The Egyptian-Ottoman destruction of
# al-Diriyya (1233 AH/1818 CE) is reported factually. No moralizing in
# either direction. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # FOUNDING FIGURES — THE PACT OF AL-DIRʿIYYA AND THE FIRST SAUDI STATE
  # =========================================================================

  - slug: pact-of-al-diriyya
    category: treaty
    title_en: Pact of al-Dirʿiyya — Alliance of Muḥammad ibn ʿAbd al-Wahhāb and Muḥammad ibn Saʿūd
    title_ar: ميثاق الدرعية بين الشيخ محمد بن عبد الوهاب والأمير محمد بن سعود
    title_fr: Pacte d'al-Dirʿiyya entre Muḥammad ibn ʿAbd al-Wahhāb et Muḥammad ibn Saʿūd
    description_en: |
      The Najdi Sunni-Ḥanbalī reformer Muḥammad ibn ʿAbd al-Wahhāb,
      after being expelled from al-ʿUyayna, took refuge in the
      neighbouring oasis-town of al-Dirʿiyya in central Najd, where
      its emir Muḥammad ibn Saʿūd ibn Muqrin received him and
      concluded a formal pact (*bayʿa*) of mutual support: the
      shaykh would direct the religious daʿwa — calling for a
      return to scriptural *tawḥīd* and the rejection of practices
      he classed as *bidʿa* (intercession at tombs, votive vows,
      saint-veneration) — and the emir would protect and propagate
      the daʿwa by political-military means. The compact, made
      circa 1157 AH/1744 CE, founded what historians call the
      First Saudi State and remained the constitutional formula of
      every subsequent Saudi polity: religious authority for Āl
      al-Shaykh, political authority for Āl Saʿūd. Within sixty
      years their joint enterprise would extend from al-Dirʿiyya
      to all of Najd, the Ḥijāz, and the Gulf coast.
    description_ar: |
      لجأ الشيخ محمد بن عبد الوهاب — الفقيه النجدي السني الحنبلي
      الداعي إلى تجديد التوحيد والاعتراض على ما عدَّه بدعاً
      كالاستغاثة بالقبور والنذور والتوسل بالأولياء — بعد إخراجه
      من العيينة إلى بلدة الدرعية في وسط نجد، فاستقبله أميرها
      محمد بن سعود بن مقرن وعقد معه ميثاقاً (بيعة) صريحاً
      للتعاون: يتولى الشيخ توجيه الدعوة الدينية، ويتولى الأمير
      حمايتها ونشرها بالقوّة. وقع الميثاق في حوالي سنة ١١٥٧ هـ
      الموافق ١٧٤٤ ميلادي، فكان ابتداءَ ما يسميه المؤرخون
      «الدولة السعودية الأولى»، وصار صيغته الدستورية الثابتة في
      كل دولة سعودية لاحقة: السلطة الدينية لآل الشيخ، والسلطة
      السياسية لآل سعود. وتوسعت الدعوة بعد ستين سنة من ذلك من
      الدرعية فعمَّت نجداً والحجاز وساحل الخليج.
    description_fr: |
      Le réformateur sunnite-ḥanbalī najdī Muḥammad ibn ʿAbd
      al-Wahhāb, après avoir été expulsé d'al-ʿUyayna, trouva
      refuge dans l'oasis voisine d'al-Dirʿiyya au cœur du Najd,
      où son émir Muḥammad ibn Saʿūd ibn Muqrin l'accueillit et
      conclut avec lui un pacte formel (*bayʿa*) d'appui
      mutuel : le cheikh dirigerait la daʿwa religieuse —
      appelant au retour au *tawḥīd* scripturaire et au rejet
      de ce qu'il classait comme *bidʿa* (intercession aux
      tombeaux, vœux votifs, vénération des saints) — et l'émir
      protégerait et propagerait cette daʿwa par les moyens
      politico-militaires. Conclu vers 1157 H/1744 EC, ce pacte
      fonda ce que les historiens appellent le Premier État
      saʿūdī et resta la formule constitutionnelle de toute
      principauté saʿūdī ultérieure : l'autorité religieuse aux
      Āl al-Shaykh, l'autorité politique aux Āl Saʿūd. En soixante
      ans, leur entreprise commune s'étendrait d'al-Dirʿiyya à
      tout le Najd, le Ḥijāz et la côte du Golfe.
    canonical_hijri: {year: 1157, precision: year}
    canonical_gregorian: {date: 1744-01-01, precision: year, method: tabular_conversion}
    claims:
