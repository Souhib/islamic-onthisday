  - slug: first-wahhabi-capture-of-mecca
    category: conquest
    title_en: First Saudi Capture of Mecca
    title_ar: دخول السعوديين الأول مكة المكرمة
    title_fr: Première prise de La Mecque par le Premier État saʿūdī
    description_en: |
      Saʿūd ibn ʿAbd al-ʿAzīz, heir-apparent of the First Saudi
      State, entered Mecca on 8 Muḥarram 1218 AH/30 April 1803
      CE after the Hāshimite sharīf Ghālib ibn Musāʿid withdrew
      to Jeddah; the city was occupied without battle. Saʿūdī
      authority over the holy city — the first such authority
      since the establishment of the sharīfate eight centuries
      earlier — lasted into the Ottoman-Egyptian counter-
      campaign of 1228-1233 AH. During the occupation, votive
      structures over graves in the cemeteries of al-Maʿlāh
      and al-ʿUyayn were demolished in line with the daʿwa's
      anti-*bidʿa* programme. Saʿūd kept the Hāshimite
      administrative apparatus in place under his authority
      and instituted the Wahhābī liturgical calendar in the
      Ḥaram. Sharīf Ghālib reconciled with the Saʿūdīs the
      following year and was reinstalled as governor under
      Saʿūdī suzerainty.
    description_ar: |
      دخل ولي عهد الدولة السعودية الأولى الأمير سعود بن عبد
      العزيز مكةَ المكرمة يوم ٨ محرم سنة ١٢١٨ هـ (الموافق
      ٣٠ إبريل ١٨٠٣ ميلادي) بعد انسحاب الشريف الهاشمي غالب
      بن مساعد إلى جدة، فاحتل المدينةَ من غير قتال. وكانت
      هذه أول سلطة سعودية على البلد الحرام — وأوّلَ سلطةٍ
      عليه من غير الشريفية الهاشمية منذ نحو ثمانية قرون —
      وامتدت إلى الحملة العثمانية المصرية المضادة سنة
      ١٢٢٨-١٢٣٣ هـ. وأثناء الإقامة هُدمت القباب والأبنية
      الموقوفة على القبور في مقبرتي «المعلاة» و«العيين»
      وفقاً لبرنامج الدعوة في إنكار البدع، وأبقى الأمير سعود
      الجهازَ الإداري الهاشمي تحت سلطانه، وأَجرى ترتيب الحرم
      على المنهج الوهابي. وتصالح الشريف غالب مع السعوديين
      في السنة التالية وأعيد والياً تحت سيادتهم.
    description_fr: |
      Saʿūd ibn ʿAbd al-ʿAzīz, héritier présomptif du Premier
      État saʿūdī, entra à La Mecque le 8 Muḥarram 1218 H/30
      avril 1803 EC après le retrait du sharīf hāshimite
      Ghālib ibn Musāʿid à Djedda ; la ville fut occupée sans
      combat. L'autorité saʿūdī sur la ville sainte — la
      première hors du sharīfat hāshimite depuis huit siècles
      — dura jusqu'à la contre-campagne ottomano-égyptienne
      de 1228-1233 H. Pendant l'occupation, les structures
      votives surmontant les sépultures des cimetières
      d'al-Maʿlāh et d'al-ʿUyayn furent détruites conformément
      au programme anti-*bidʿa* de la daʿwa. Saʿūd maintint
      l'appareil administratif hāshimite sous son autorité et
      institua la liturgie wahhābī au Ḥaram. Le sharīf Ghālib
      se réconcilia avec les Saʿūdīs l'année suivante et fut
      réinstallé comme gouverneur sous suzeraineté saʿūdī.
