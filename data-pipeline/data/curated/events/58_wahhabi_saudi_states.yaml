  # =========================================================================
  # FALL OF THE FIRST SAUDI STATE
  # =========================================================================

  - slug: destruction-of-al-diriyya-1818
    category: battle
    title_en: Destruction of al-Dirʿiyya by Ibrāhīm Pāshā — End of the First Saudi State
    title_ar: تدمير الدرعية على يد إبراهيم باشا — نهاية الدولة السعودية الأولى
    title_fr: Destruction d'al-Dirʿiyya par Ibrāhīm Pāshā — fin du Premier État saʿūdī
    description_en: |
      The Egyptian-Ottoman army of Ibrāhīm Pāshā, son of the
      Ottoman governor of Egypt Muḥammad ʿAlī, captured and
      systematically demolished the Saʿūdī capital of al-Dirʿiyya
      in central Najd on 9 Dhū al-Qaʿda 1233 AH/11 September
      1818 CE after a siege of some six months. The reigning
      Saʿūdī imam, ʿAbd Allāh ibn Saʿūd, surrendered and was
      taken in chains to Cairo and then to Istanbul, where he
      was executed by the Ottoman Sultan Maḥmūd II. The
      destruction of al-Dirʿiyya — its palaces, mosques, and
      water-channels razed to the foundations — marked the
      formal end of the First Saudi State, established with
      the Pact of al-Dirʿiyya seventy-four years earlier. The
      campaign had been launched at the urging of the
      Ottomans, alarmed by the Saʿūdī occupation of Mecca,
      Medina, and the disruption of the ḥajj caravan, and
      executed by the Egyptian forces under Muḥammad ʿAlī's
      reorganisation. Survivors of Āl Saʿūd dispersed to
      al-Riyāḍ and the surrounding settlements; one of them,
      Turkī ibn ʿAbd Allāh, would re-establish the dynasty
      six years later as the Second Saudi State.
    description_ar: |
      افتتح جيش إبراهيم باشا — ابن والي مصر العثماني محمد
      علي — عاصمة الدولة السعودية الأولى الدرعيةَ في وسط
      نجد يوم ٩ ذي القعدة سنة ١٢٣٣ هـ (الموافق ١١ سبتمبر
      ١٨١٨ ميلادي) بعد حصار قرابة الستة أشهر، ثم دكَّها
      دكاً منهجياً. واستسلم الإمام السعودي القائم عبد الله
      بن سعود، فاقتيد في الأغلال إلى مصر ثم إلى الآستانة،
      فأعدمه السلطان العثماني محمود الثاني هناك. وأَنهى
      تدميرُ الدرعية — قصورُها ومساجدها وأفلاجها هُدمت من
      قواعدها — رسمياً الدولةَ السعودية الأولى التي ابتدأت
      بميثاق الدرعية قبل ذلك بأربع وسبعين سنة. وكانت الحملة
      قد جُهِّزت بحضِّ العثمانيين الذين أَزعجهم احتلالُ
      السعوديين لمكة والمدينة وانقطاعُ ركب الحج، وتولّى
      تنفيذها الجيشُ المصري في إعادة تنظيم محمد علي. وتفرّق
      من بقي من آل سعود إلى الرياض وما حولها، ثم أعاد
      تركي بن عبد الله إنشاء الأسرة بعد ست سنوات في
      «الدولة السعودية الثانية».
    description_fr: |
      L'armée égypto-ottomane d'Ibrāhīm Pāshā, fils du
      gouverneur ottoman d'Égypte Muḥammad ʿAlī, prit et
      détruisit méthodiquement la capitale saʿūdī
      d'al-Dirʿiyya au cœur du Najd le 9 Dhū al-Qaʿda 1233
      H/11 septembre 1818 EC, au terme d'un siège d'environ
      six mois. L'imam saʿūdī régnant, ʿAbd Allāh ibn Saʿūd,
      se rendit et fut conduit en chaînes au Caire puis à
      Istanbul, où le sultan ottoman Maḥmūd II le fit
      exécuter. La destruction d'al-Dirʿiyya — palais, mosquées
      et qanāts rasés jusqu'aux fondations — marqua la fin
      formelle du Premier État saʿūdī, fondé soixante-quatorze
      ans plus tôt par le Pacte d'al-Dirʿiyya. La campagne
      avait été lancée à la demande des Ottomans, inquiets de
      l'occupation saʿūdī de La Mecque, de Médine et de la
      perturbation de la caravane du ḥajj, et exécutée par
      les forces égyptiennes réorganisées par Muḥammad ʿAlī.
      Les survivants des Āl Saʿūd se dispersèrent vers
      al-Riyāḍ et les villages environnants ; l'un d'eux,
      Turkī ibn ʿAbd Allāh, refondera la dynastie six ans plus
      tard sous le nom de Second État saʿūdī.
    canonical_hijri: {year: 1233, month: 11, day: 9, precision: day}
    canonical_gregorian: {date: 1818-09-11, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-Dirʿiyya' and 'Ibrāhīm Pāshā' date the surrender of ʿAbd Allāh ibn Saʿūd and the destruction to 9 Dhū al-Qaʿda 1233 AH / 11 September 1818 CE."
      - source_key: editorial
        notes: "Editorial summary; standard date in Western, Egyptian, and Saʿūdī historiographies."
    people:
      - [ibrahim-pasha-egypt, leader]
      - [abd-allah-ibn-saud, opposed]
    tags: [najd, diriyya, first-saudi-state, ottoman, egypt, siege, modern]
    importance: major
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ottoman%E2%80%93Saudi_War"

  # =========================================================================
  # SECOND SAUDI STATE — TURKĪ, FAYṢAL, AND THE FALL AT MULAYDA
  # =========================================================================

  - slug: founding-of-second-saudi-state
    category: founding
    title_en: Founding of the Second Saudi State by Turkī ibn ʿAbd Allāh
    title_ar: تأسيس الدولة السعودية الثانية على يد تركي بن عبد الله
    title_fr: Fondation du Second État saʿūdī par Turkī ibn ʿAbd Allāh
    description_en: |
      Turkī ibn ʿAbd Allāh ibn Muḥammad ibn Saʿūd — a grandson
      of the founder of the First Saudi State who had escaped
      the Egyptian massacres of 1233 AH — re-entered Najd in
      1240 AH/1824 CE, expelled the Egyptian garrison, and
      proclaimed himself imam of a restored Saʿūdī polity. Unable
      to rebuild the demolished al-Dirʿiyya, he established
      his capital at al-Riyāḍ, fifteen kilometres south. Within
      a decade his rule extended over central Najd, al-Aḥsāʾ,
      and parts of the Gulf coast. The Second Saudi State —
      smaller in territory than the First, never controlling
      the Ḥijāz — would last sixty-seven lunar years until its
      collapse at Mulayda in 1308 AH. Turkī himself would be
      assassinated at al-Riyāḍ in 1249 AH; he was succeeded by
      his son Fayṣal, the second great architect of the polity.
    description_ar: |
      عاد الإمام تركي بن عبد الله بن محمد بن سعود — حفيد
      مؤسس الدولة السعودية الأولى الذي نجا من المذابح
      المصرية سنة ١٢٣٣ هـ — إلى نجد سنة ١٢٤٠ هـ (الموافق
      ١٨٢٤ ميلادي)، فأخرج الحامية المصرية وأعلن نفسه إماماً
      على دولة سعودية مستردّة. ولم يستطع إعمار الدرعية
      المهدومة، فاتخذ من الرياض على نحو خمسة عشر كيلو
      متراً جنوبَها عاصمةً له. وامتدّ سلطانه في عقد من
      الزمن إلى وسط نجد والأحساء وأجزاء من ساحل الخليج.
      وكانت الدولة السعودية الثانية — أصغر مساحةً من
      الأولى، ولم تحكم الحجاز قط — ستبقى سبعاً وستين سنة
      قمرية إلى أن انهارت في وقعة المليداء سنة ١٣٠٨ هـ.
      اغتيل تركي نفسه في الرياض سنة ١٢٤٩ هـ، وخلفه ابنه
      فيصل المعمار الثاني للدولة.
    description_fr: |
      Turkī ibn ʿAbd Allāh ibn Muḥammad ibn Saʿūd — petit-fils
      du fondateur du Premier État saʿūdī rescapé des
      massacres égyptiens de 1233 H — rentra au Najd en 1240
      H/1824 EC, chassa la garnison égyptienne et se proclama
      imam d'un État saʿūdī restauré. Incapable de rebâtir
      al-Dirʿiyya détruite, il établit sa capitale à al-Riyāḍ,
      à quinze kilomètres au sud. En une décennie son autorité
      s'étendit sur le Najd central, al-Aḥsāʾ et une partie de
      la côte du Golfe. Le Second État saʿūdī — plus petit en
      territoire que le Premier, ne contrôlant jamais le Ḥijāz
      — durerait soixante-sept années lunaires, jusqu'à
      l'effondrement de Mulayda en 1308 H. Turkī lui-même
      serait assassiné à al-Riyāḍ en 1249 H ; son fils Fayṣal,
      second grand architecte de l'État, lui succéda.
    canonical_hijri: {year: 1240, precision: year}
    canonical_gregorian: {date: 1824-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Saʿūd, Āl' and 'al-Riyāḍ' date the restoration under Turkī ibn ʿAbd Allāh to 1240 AH / 1824 CE."
      - source_key: editorial
    people: [[turki-ibn-abd-allah, subject]]
    tags: [najd, riyadh, second-saudi-state, founding, modern]
    importance: major
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Emirate_of_Nejd"

  - slug: death-of-faysal-ibn-turki
    category: ruler_death
    title_en: Death of Fayṣal ibn Turkī — Imam of the Second Saudi State
    title_ar: وفاة الإمام فيصل بن تركي إمام الدولة السعودية الثانية
    title_fr: Mort de Fayṣal ibn Turkī — imam du Second État saʿūdī
    description_en: |
      Fayṣal ibn Turkī Āl Saʿūd, third imam of the Second Saudi
      State and its principal architect, died at al-Riyāḍ in
      1282 AH/1865 CE after two reigns spanning roughly thirty
      years. Born in al-Dirʿiyya before its destruction, taken
      to Egypt in chains in 1233 AH, escaped after his father
      Turkī's assassination, captured again by the Egyptians in
      1253 AH and held in Cairo for five years, he returned to
      al-Riyāḍ in 1259 AH, restored the Saʿūdī polity, and
      governed it from then until his death. Under his second
      reign (1259-1282 AH), the Second State reached its maximum
      extent — central Najd, al-Aḥsāʾ, ʿAsīr, and tributary
      relations with Bahrain, Qatar, and the Trucial coast.
      He was succeeded by his sons in succession; their fratricidal
      civil war in the next twenty-five years, exploited by the
      Rashīdī emirs of Ḥāʾil, would end the dynasty at Mulayda.
    description_ar: |
      توفي الإمام فيصل بن تركي آل سعود — ثالث أئمة الدولة
      السعودية الثانية ومهندسها الأكبر — في الرياض سنة
      ١٢٨٢ هـ (الموافق ١٨٦٥ ميلادي) بعد عهدين متعاقبين
      امتدا قرابة ثلاثين سنة. وُلد في الدرعية قبل تدميرها،
      وأُخذ إلى مصر في الأغلال سنة ١٢٣٣ هـ، ونجا بعد
      اغتيال أبيه تركي، وأُسر من المصريين ثانية سنة ١٢٥٣ هـ،
      فحُبس بالقاهرة خمس سنين، ثم رجع إلى الرياض سنة ١٢٥٩ هـ،
      فاستردّ الدولة السعودية وحكمها إلى وفاته. وفي عهده
      الثاني (١٢٥٩-١٢٨٢ هـ) بلغت الدولة السعودية الثانية
      أقصى امتدادها: وسط نجد والأحساء وعسير، وعلاقات تَبَع
      مع البحرين وقطر وساحل الإمارات. وخلفه أبناؤه تباعاً،
      فأَجرت الفتنة المتطاولة بينهم في خمسة وعشرين سنة
      سعودية تالية — والتي استثمرها بنو رشيد أمراء حائل —
      نهاية الأسرة في وقعة المليداء.
    description_fr: |
      Fayṣal ibn Turkī Āl Saʿūd, troisième imam du Second État
      saʿūdī et son principal architecte, mourut à al-Riyāḍ en
      1282 H/1865 EC, après deux règnes couvrant à peu près
      trente ans. Né à al-Dirʿiyya avant sa destruction,
      emmené en Égypte enchaîné en 1233 H, évadé après
      l'assassinat de son père Turkī, capturé à nouveau par
      les Égyptiens en 1253 H puis détenu cinq ans au Caire,
      il regagna al-Riyāḍ en 1259 H, restaura l'État saʿūdī
      et le gouverna jusqu'à sa mort. Sous son second règne
      (1259-1282 H), le Second État atteignit son extension
      maximale : Najd central, al-Aḥsāʾ, ʿAsīr, et liens
      tributaires avec Bahreïn, le Qatar et la côte des
      Trucial States. Ses fils lui succédèrent tour à tour ;
      la longue guerre civile fratricide qui suivit pendant
      vingt-cinq ans, exploitée par les émirs rashīdī de
      Ḥāʾil, mettrait fin à la dynastie à Mulayda.
    canonical_hijri: {year: 1282, precision: year}
