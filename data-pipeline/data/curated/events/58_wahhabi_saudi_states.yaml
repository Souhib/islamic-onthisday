  - slug: battle-of-mulayda
    category: battle
    title_en: Battle of Mulayda — Fall of the Second Saudi State
    title_ar: وقعة المليداء — نهاية الدولة السعودية الثانية
    title_fr: Bataille de Mulayda — fin du Second État saʿūdī
    description_en: |
      The combined Saʿūdī forces of ʿAbd al-Raḥmān ibn Fayṣal
      Āl Saʿūd, fifth and last imam of the Second Saudi State,
      were defeated by Muḥammad ibn ʿAbd Allāh Āl Rashīd, emir
      of the Shammar polity of Ḥāʾil, at Mulayda in al-Qaṣīm
      on 17 Jumādā al-Ūlā 1308 AH/29 January 1891 CE. The
      battle ended the long Saʿūdī-Rashīdī struggle for
      hegemony in central Arabia: the Rashīdī emirate of Ḥāʾil,
      backed by the Ottomans, took control of Najd; ʿAbd
      al-Raḥmān went into exile in Kuwait under the protection
      of the al-Ṣabāḥ. The Second Saudi State, founded by
      Turkī ibn ʿAbd Allāh sixty-seven lunar years earlier,
      formally ended at Mulayda. ʿAbd al-Raḥmān's son ʿAbd
      al-ʿAzīz — born during the wars of succession that had
      hollowed out the state — would recover al-Riyāḍ in 1319
      AH and found the Third Saudi State, but not before
      eleven years of Rashīdī supremacy in central Arabia.
    description_ar: |
      هُزمت قوات الإمام عبد الرحمن بن فيصل آل سعود — خامس
      أئمة الدولة السعودية الثانية وآخرهم — أمام جيش
      محمد بن عبد الله آل رشيد أمير شمَّر بحائل في وقعة
      «المليداء» بمنطقة القصيم يوم ١٧ جمادى الأولى سنة
      ١٣٠٨ هـ (الموافق ٢٩ يناير ١٨٩١ ميلادي). وأَنهت
      المعركة الصراع الطويل بين السعوديين والرشيد على وسط
      الجزيرة العربية: استولت إمارة الرشيد المدعومة من
      العثمانيين على نجد، ومضى الإمام عبد الرحمن إلى
      المنفى في الكويت تحت رعاية آل الصباح. وانتهت بذلك
      الدولة السعودية الثانية التي أسسها تركي بن عبد الله
      قبل سبع وستين سنة قمرية. وسيستردّ ابنه عبد العزيز —
      المولود في خضم حروب الخلافة التي أنهكت الدولة —
      الرياضَ سنة ١٣١٩ هـ ويؤسس الدولة السعودية الثالثة،
      ولكن بعد إحدى عشرة سنة من سيادة الرشيد على وسط
      الجزيرة.
    description_fr: |
      Les forces réunies de l'imam ʿAbd al-Raḥmān ibn Fayṣal
      Āl Saʿūd, cinquième et dernier imam du Second État
      saʿūdī, furent défaites par Muḥammad ibn ʿAbd Allāh Āl
      Rashīd, émir de la principauté shammar de Ḥāʾil, à
      Mulayda dans al-Qaṣīm le 17 Jumādā al-Ūlā 1308 H/29
      janvier 1891 EC. La bataille mit fin à la longue lutte
      saʿūdī-rashīdī pour l'hégémonie sur l'Arabie centrale :
      l'émirat rashīdī de Ḥāʾil, soutenu par les Ottomans,
      prit le contrôle du Najd ; ʿAbd al-Raḥmān gagna l'exil
      au Koweït sous la protection des al-Ṣabāḥ. Le Second
      État saʿūdī, fondé par Turkī ibn ʿAbd Allāh soixante-
      sept années lunaires plus tôt, prit officiellement fin
      à Mulayda. Le fils de ʿAbd al-Raḥmān, ʿAbd al-ʿAzīz —
      né au cours des guerres de succession qui avaient
      affaibli l'État — reprendrait al-Riyāḍ en 1319 H et
      fonderait le Troisième État saʿūdī, mais après onze ans
      de suprématie rashīdī sur l'Arabie centrale.
    canonical_hijri: {year: 1308, month: 5, day: 17, precision: day}
    canonical_gregorian: {date: 1891-01-29, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Saʿūd, Āl' and 'Rashīd, Āl' date the battle of Mulayda to 17 Jumādā al-Ūlā 1308 AH / 29 January 1891 CE."
      - source_key: editorial
