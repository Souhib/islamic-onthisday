  - slug: death-of-muhammad-ibn-saud
    category: ruler_death
    title_en: Death of Muḥammad ibn Saʿūd — Founder of the First Saudi State
    title_ar: وفاة الأمير محمد بن سعود — مؤسس الدولة السعودية الأولى
    title_fr: Mort de Muḥammad ibn Saʿūd — fondateur du Premier État saʿūdī
    description_en: |
      Muḥammad ibn Saʿūd ibn Muqrin, emir of al-Dirʿiyya and
      founder of the First Saudi State through his pact with
      Muḥammad ibn ʿAbd al-Wahhāb (c. 1157 AH/1744 CE), died at
      al-Dirʿiyya in 1179 AH/1765 CE after some twenty years of
      jointly building the Najdi religious-political enterprise.
      Under him the daʿwa was secured against the local opposition
      of the rival Najdi towns of al-Riyāḍ, al-ʿUyayna, Manfūḥa,
      and ʿUnayza, and the territorial nucleus of the state was
      consolidated around al-Dirʿiyya. He was succeeded by his
      son ʿAbd al-ʿAzīz ibn Muḥammad, under whose four-decade
      reign the state would expand to all of Najd, eastern
      Arabia, and ultimately into the Ḥijāz and Iraq.
    description_ar: |
      توفي محمد بن سعود بن مقرن — أمير الدرعية ومؤسس الدولة
      السعودية الأولى بميثاقه مع الشيخ محمد بن عبد الوهاب نحو
      ١١٥٧ هـ (١٧٤٤ ميلادي) — في الدرعية سنة ١١٧٩ هـ (١٧٦٥
      ميلادي) بعد قرابة عشرين سنة من البناء المشترك لمشروع
      الدعوة النجدية الديني السياسي. وفي عهده ثبتت الدعوة
      بمواجهة المعارضة المحلية من القرى النجدية المنافسة
      كالرياض والعيينة ومنفوحة وعنيزة، وتركَّز نواة الدولة
      الترابية حول الدرعية. وخلفه ابنه عبد العزيز بن محمد، الذي
      امتدت في عهده الذي قارب أربعة عقود الدولةُ إلى عامة نجد
      وشرق الجزيرة، ثم إلى الحجاز والعراق.
    description_fr: |
      Muḥammad ibn Saʿūd ibn Muqrin, émir d'al-Dirʿiyya et
      fondateur du Premier État saʿūdī par son pacte avec
      Muḥammad ibn ʿAbd al-Wahhāb (vers 1157 H/1744 EC), mourut
      à al-Dirʿiyya en 1179 H/1765 EC, après une vingtaine
      d'années de construction commune de l'entreprise
      religieuse-politique najdī. Sous son règne la daʿwa fut
      consolidée contre l'opposition locale des bourgs najdī
      rivaux — al-Riyāḍ, al-ʿUyayna, Manfūḥa, ʿUnayza — et le
      noyau territorial de l'État se forma autour d'al-Dirʿiyya.
      Son fils ʿAbd al-ʿAzīz ibn Muḥammad lui succéda; sous le
      règne de quatre décennies de ce dernier l'État s'étendrait
      à tout le Najd, à l'Arabie orientale, puis au Ḥijāz et à
      l'Irak.
    canonical_hijri: {year: 1179, precision: year}
    canonical_gregorian: {date: 1765-01-01, precision: year, method: tabular_conversion}
