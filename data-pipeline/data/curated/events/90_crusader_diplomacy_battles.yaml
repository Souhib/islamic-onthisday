  - slug: death-of-al-aziz-uthman-ayyubi
    category: ruler_death
    title_en: Death of al-ʿAzīz ʿUthmān — Saladin's Son and Sultan of Egypt
    title_ar: وفاة الملك العزيز عثمان — ابن صلاح الدين وسلطان مصر
    title_fr: Mort d'al-ʿAzīz ʿUthmān — fils de Saladin et sultan d'Égypte
    description_en: |
      al-Malik al-ʿAzīz ʿImād al-Dīn ʿUthmān ibn Ṣalāh al-Dīn —
      second Ayyūbid sultan of Egypt and second son of Saladin
      — died at Cairo at age twenty-eight from a fall while
      hunting wolf in the Fayyūm. His five-year reign (589-595
      AH) had been spent first contesting the inheritance of
      Saladin's empire with his elder brother al-Afḍal of
      Damascus and then defending Egypt with the support of his
      uncle al-ʿĀdil — the future founder of the senior
      Ayyūbid line. The vacuum left by his death allowed
      al-ʿĀdil to set aside his nephew the child al-Manṣūr
      Muḥammad and seize the sultanate himself in 596 AH,
      consolidating the line that would produce al-Kāmil
      (sultan during the Fifth and Sixth Crusades) and
      al-Ṣāliḥ Najm al-Dīn Ayyūb (the last effective Ayyūbid
      sultan). Ibn al-Athīr and Ibn Khallikān both place the
      death in Muḥarram 595 AH and dwell on the contrast
      between al-ʿAzīz's piety and his short reign.
    description_ar: |
      توفي الملك العزيز عماد الدين عثمان بن صلاح الدين — ثاني
      سلاطين بني أيوب بمصر، وابن السلطان صلاح الدين الثاني —
      بالقاهرة عن ثمانٍ وعشرين سنة بسقطة وهو يصيد الذئب بالفيوم.
      وكان عهده الخمسي (٥٨٩-٥٩٥ هـ) قد أُنفق أولاً في النزاع
      على ميراث صلاح الدين مع أخيه الأكبر الأفضل صاحب دمشق، ثم
      في الدفاع عن مصر بدعم من عمه العادل — الذي سيؤسِّس فرع
      الأيوبيين الأكبر. وأَتاح الفراغُ الذي تركته وفاتُه للعادل
      أن ينحِّي ابنَ أخيه الصبيَّ المنصور محمداً وينتزع
      السلطنة لنفسه سنة ٥٩٦ هـ، فيرسي الفرعَ الذي سيخرج منه
      الكامل (سلطان الحملتين الخامسة والسادسة) والصالح نجم الدين
      أيوب (آخر السلاطين الأيوبيين الفعّالين). ويذكر ابن الأثير
      وابن خلكان جميعاً وفاتَه في محرم سنة ٥٩٥ هـ، ويتأمَّلان
      التضادَّ بين تقواه وقصر مدته.
    description_fr: |
      al-Malik al-ʿAzīz ʿImād al-Dīn ʿUthmān ibn Ṣalāh al-Dīn —
      deuxième sultan ayyoubide d'Égypte et deuxième fils de
      Saladin — mourut au Caire à vingt-huit ans d'une chute
      lors d'une chasse au loup dans le Fayyūm. Son règne de
      cinq ans (589-595 H) s'était écoulé d'abord à se disputer
      l'héritage de l'empire de Saladin avec son frère aîné
      al-Afḍal de Damas, puis à défendre l'Égypte avec le
      soutien de son oncle al-ʿĀdil — futur fondateur de la
      branche ayyoubide aînée. Le vide laissé par sa mort
      permit à al-ʿĀdil d'écarter son neveu l'enfant al-Manṣūr
      Muḥammad et de saisir lui-même le sultanat en 596 H,
      consolidant la lignée qui produirait al-Kāmil (sultan des
      cinquième et sixième croisades) et al-Ṣāliḥ Najm al-Dīn
      Ayyūb (dernier sultan ayyoubide effectif). Ibn al-Athīr
      et Ibn Khallikān placent tous deux la mort en Muḥarram
      595 H et s'attardent sur le contraste entre la piété
      d'al-ʿAzīz et la brièveté de son règne.
    canonical_hijri: {year: 595, month: 1, day: 21, precision: day}
    canonical_gregorian: {date: 1198-11-29, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death in Muḥarram 595 AH at Cairo and the political consequences for the Ayyūbid succession."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the standard biographical entry placing his death on 21 Muḥarram 595 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the death in 595 AH and the accession of his son al-Manṣūr."
    people: [[salahuddin-al-ayyubi, subject]]
    tags: [ayyubid, egypt, saladin, succession]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # AL-KĀMIL'S DIPLOMACY — TREATY OF JAFFA 1229
  # =========================================================================

  - slug: treaty-of-jaffa-1229
    category: treaty
    title_en: Treaty of Jaffa (1229) — al-Kāmil Cedes Jerusalem to Frederick II
    title_ar: صلح يافا (٦٢٦ هـ) — الكامل يسلّم بيت المقدس لفريدريك الثاني
    title_fr: Traité de Jaffa (1229) — al-Kāmil cède Jérusalem à Frédéric II
    description_en: |
      The unprecedented diplomatic settlement between the
      Ayyūbid sultan al-Malik al-Kāmil Muḥammad of Egypt and
      Holy Roman Emperor Frederick II Hohenstaufen — concluded
      at Jaffa without a battle — by which al-Kāmil ceded
      Jerusalem (excluding the Ḥaram al-Sharīf, which remained
      Muslim and under Muslim worship), Bethlehem, Nazareth,
      and a corridor to the coast back to the Crusader Kingdom
      of Jerusalem for a renewable ten-year truce. The
      Ḥaram — the Dome of the Rock and al-Aqṣā — remained
      Muslim and under Muslim worship under the treaty's
      explicit terms. The accord drew a storm of public
      criticism in Damascus and Aleppo: the Damascene preacher
      Sibṭ Ibn al-Jawzī delivered a celebrated sermon of mourning
      at the Umayyad Mosque, and al-Kāmil's own brother
      al-Ashraf in Damascus condemned the cession. Frederick
      crowned himself king of Jerusalem in the Holy Sepulchre
      eighteen days later — under simultaneous papal
      excommunication, with no Latin clergy present, in a
      ceremony of his own composition. Jerusalem remained
      Crusader-held for fifteen years until the Khwārazmian
      sack in 642 AH; the Treaty of Jaffa is the only major
      transfer of Jerusalem in Crusade-era history achieved by
      diplomacy rather than arms. Ibn al-Athīr — alive when the
      treaty was signed — and Ibn Kathīr both record the
      settlement and the public mourning at Damascus.
    description_ar: |
      التسوية الدبلوماسية غير المسبوقة بين السلطان الأيوبي
      الملك الكامل محمد صاحب مصر والإمبراطور الجرماني فريدريك
      الثاني الهوهنشتاوفي — وعُقدت بيافا من غير قتال — وبها
      سلَّم الكامل مدينةَ بيت المقدس (دون الحرم الشريف الذي
      بقي إسلامياً ومفتوحاً للعبادة الإسلامية) وبيت لحم
      والناصرة وممرّاً إلى الساحل، إلى مملكة بيت المقدس
      الصليبية لمدة هدنة عشر سنوات قابلة للتجديد. وبقي الحرم —
      قبة الصخرة والمسجد الأقصى — إسلامياً ومفتوحاً للعبادة
      الإسلامية بنص الصلح. وأثار الصلح عاصفةَ نقد عام بدمشق
      وحلب: ألقى الواعظ الدمشقي سبط ابن الجوزي خطبة الحداد
      الشهيرة في الجامع الأموي، وندَّد بالتسليم أخو الكامل
      الملك الأشرف صاحب دمشق نفسه. وتوّج فريدريك نفسه ملكاً
      على بيت المقدس في كنيسة القمامة بعد ثمانية عشر يوماً —
      وهو تحت طائلة حرم البابا في الوقت ذاته، بلا حضور لأي
      من رجال الدين اللاتين، في احتفال من تأليفه. وبقيت بيت
      المقدس في يد الصليبيين خمس عشرة سنة إلى أن دخلتها
      الخوارزمية سنة ٦٤٢ هـ؛ وصلح يافا هو نقل بيت المقدس
      الكبير الوحيد في تاريخ الحروب الصليبية الذي تم
      بالدبلوماسية لا بالسلاح. ويذكر ابن الأثير — وكان حياً
      وقت توقيع الصلح — وابن كثير التسويةَ والحدادَ العلني
      بدمشق.
    description_fr: |
      Le règlement diplomatique sans précédent entre le sultan
      ayyoubide al-Malik al-Kāmil Muḥammad d'Égypte et
      l'empereur germanique Frédéric II Hohenstaufen — conclu
      à Jaffa sans bataille — par lequel al-Kāmil céda
      Jérusalem (à l'exclusion du Ḥaram al-Sharīf, qui resta
      musulman et ouvert au culte musulman), Bethléem,
      Nazareth et un couloir vers la côte au royaume croisé de
      Jérusalem pour une trêve renouvelable de dix ans. Le
      Ḥaram — Dôme du Rocher et al-Aqṣā — resta musulman et
      ouvert au culte musulman par les termes explicites du
      traité. L'accord souleva une tempête de critiques
      publiques à Damas et à Alep : le prédicateur damascène
      Sibṭ Ibn al-Jawzī prononça un célèbre sermon de deuil à
      la mosquée des Omeyyades, et le propre frère d'al-Kāmil
      al-Ashraf à Damas condamna la cession. Frédéric se
      couronna roi de Jérusalem au Saint-Sépulcre dix-huit
      jours plus tard — sous excommunication papale
      simultanée, sans clergé latin présent, dans une
      cérémonie de sa propre composition. Jérusalem resta aux
      mains croisées pendant quinze ans jusqu'au sac
      khwārazmien de 642 H; le traité de Jaffa est le seul
      transfert majeur de Jérusalem de l'ère croisée réalisé
      par la diplomatie plutôt que par les armes. Ibn al-Athīr
      — vivant lors de la signature du traité — et Ibn Kathīr
      enregistrent tous deux le règlement et le deuil public
      à Damas.
    canonical_hijri: {year: 626, month: 5, day: 20, precision: day}
    canonical_gregorian: {date: 1229-02-18, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr — contemporary to the events — enters the conclusion of the truce in Rabīʿ al-Awwal 626 AH and details the cession of Jerusalem and the public reaction."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the treaty in 626 AH and Sibṭ Ibn al-Jawzī's mourning sermon at Damascus."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the cession of Jerusalem under the events of 626 AH."
      - source_key: ei2
        notes: "EI² 'al-Kāmil' confirms the date of the treaty as 18 February 1229 (Rabīʿ al-Awwal 626 AH)."
    tags: [ayyubid, crusades, sixth-crusade, jerusalem, treaty, diplomacy, frederick-ii]
    importance: major
    verified: true
    verification_status: cross_verified
