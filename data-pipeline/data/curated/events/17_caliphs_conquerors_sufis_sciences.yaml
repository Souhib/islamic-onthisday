  - slug: death-of-nur-al-din-zanki
    category: ruler
    title_en: Death of Nur al-Din Zanki — Unifier of Syria
    title_ar: وفاة نور الدين زنكي — موحّد الشام
    title_fr: Mort de Nūr al-Din Zanki — unificateur de la Syrie
    description_en: |
      Nur al-Din Mahmud ibn Zanki, second of the Zangid atabegs of
      Aleppo and Mosul, the ruler who united Muslim Syria and Egypt
      against the Crusader states and through his lieutenant Ṣalāh
      al-Dīn (Saladin) made the recapture of Jerusalem possible —
      died of throat illness at the citadel of Damascus at age about
      57. His reign saw the construction of the Nūriyya madrasa in
      Damascus (the first dedicated dār al-ḥadīth in the Islamic
      world), the suppression of Shia and Christian governance from
      Aleppo to Egypt, and a famed personal asceticism: he wore
      patched clothes and reportedly never let his treasury keep
      more than what was due. The minbar he commissioned for
      al-Aqṣā Mosque (later installed by Saladin after the
      reconquest) bore his name in marquetry.
    description_ar: |
      توفي الملك العادل نور الدين محمود بن زنكي — ثاني الأتابكة
      الزنكيين على حلب والموصل، وموحد المسلمين بالشام ومصر في وجه
      دول الصليبيين، الذي مهد عبر قائده صلاح الدين الأيوبي لاستعادة
      القدس — بقلعة دمشق متأثراً بداء «الذبحة» عن نحو سبع وخمسين
      سنة. شهد عهده بناء المدرسة النورية بدمشق (أول دار للحديث في
      الإسلام)، والقضاء على الحكم الشيعي والصليبي من حلب إلى مصر،
      وزهد شخصي مأثور: لبس المرقّع، وقيل إنه لم يدع لبيت ماله
      فضلاً عن المستحق له. وأَمر بصنع المنبر الذي ركّبه صلاح الدين
      في المسجد الأقصى بعد تحرير القدس، وقد كتب عليه اسمه نقشاً.
    description_fr: |
      Nūr al-Dīn Maḥmūd ibn Zanki, deuxième des atabegs zangides
      d'Alep et de Mossoul, le souverain qui unifia la Syrie et
      l'Égypte musulmanes contre les États croisés et qui, par son
      lieutenant Ṣalāḥ al-Dīn (Saladin), rendit possible la
      reconquête de Jérusalem — mourut d'une affection de la gorge
      à la citadelle de Damas à l'âge d'environ 57 ans. Son règne
      vit la construction de la madrasa Nūriyya à Damas (la première
      *dār al-ḥadīth* du monde islamique), l'élimination de la
      gouvernance chiite et chrétienne d'Alep à l'Égypte, et un
      ascétisme personnel célèbre : il portait des vêtements
      rapiécés et, dit-on, ne laissa jamais à son trésor public
      au-delà de ce qui revenait. Le *minbar* qu'il fit fabriquer
      pour la mosquée al-Aqṣā (installé plus tard par Saladin après
      la reconquête) portait son nom en marqueterie.
    canonical_hijri: {year: 569, month: 5, precision: month}
    canonical_gregorian: {date: 1174-05-01, precision: month, method: tabular_conversion}
