  - slug: death-of-qutayba-ibn-muslim
    category: companion
    title_en: Death of Qutayba ibn Muslim — Conqueror of Transoxiana
    title_ar: مقتل قتيبة بن مسلم — فاتح ما وراء النهر
    title_fr: Mort de Qutayba ibn Muslim — conquérant de la Transoxiane
    description_en: |
      Qutayba ibn Muslim al-Bahili, governor of Khurasan under
      al-Ḥajjaj ibn Yusuf and conqueror of Transoxiana — Bukhara,
      Samarqand, Khwarazm, Farghana, and at the apex of his career
      Kashghar on the Chinese frontier — was killed at Farghana by
      his own troops who refused to follow him in revolt against the
      new caliph Sulayman ibn ʿAbd al-Malik. He was about 49. Within
      a single decade his campaigns brought Transoxiana decisively
      into the Islamic world and laid the foundation for the eastern
      hadith school of Bukhara — without which the *Ṣaḥīḥ al-Bukhari*
      would never have been compiled. al-Tabari preserves the long
      khutba in which he failed to rouse the troops to follow him,
      ending with their slaying him on the spot.
    description_ar: |
      قتل قتيبة بن مسلم الباهلي — والي خراسان للحجاج بن يوسف وفاتح
      ما وراء النهر: بخارى وسمرقند وخوارزم وفرغانة، ثم في ذروته
      كاشغر على حدود الصين — في فرغانة على يد جنده الذين أبوا الخروج
      معه على الخليفة الجديد سليمان بن عبد الملك. وكان عمره نحو تسع
      وأربعين سنة. أدخلت غزواته في عقد واحد ما وراء النهر في دار
      الإسلام إدخالاً نهائياً، وهيّأت الأرض لمدرسة الحديث الشرقية
      ببخارى التي لولاها ما خرج «صحيح البخاري». ويحفظ الطبري الخطبة
      الطويلة التي ألقاها قتيبة في جنده يستثيرهم على المواصلة، فلم
      يستجيبوا له، فقتلوه في موضعه.
    description_fr: |
      Qutayba ibn Muslim al-Bāhili, gouverneur du Khurasan sous
      al-Ḥajjāj ibn Yusuf et conquérant de la Transoxiane — Boukhara,
      Samarcande, Khwarezm, Ferghana, et à l'apogée de sa carrière
      Kashgar à la frontière chinoise — fut tué à Ferghana par ses
      propres troupes qui refusèrent de le suivre dans une révolte
      contre le nouveau calife Sulaymān ibn ʿAbd al-Malik. Il avait
      environ 49 ans. En une seule décennie, ses campagnes firent
      définitivement entrer la Transoxiane dans le monde islamique
      et posèrent les fondations de l'école de hadith orientale de
      Boukhara — sans laquelle le *Ṣaḥīḥ al-Bukhari* n'aurait jamais
      été compilé. al-Ṭabari conserve la longue *khuṭba* dans laquelle
      il échoua à rallier les troupes, terminant par leur action de
      le tuer sur place.
    canonical_hijri: {year: 96, precision: year}
    canonical_gregorian: {date: 715-08-01, precision: year, method: tabular_conversion}
