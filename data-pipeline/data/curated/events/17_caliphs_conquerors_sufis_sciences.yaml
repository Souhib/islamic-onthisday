  # ABBASID CALIPHS
  # =========================================================================

  - slug: death-of-al-mahdi-abbasid
    category: caliph
    title_en: Death of Caliph al-Mahdi
    title_ar: وفاة الخليفة المهدي
    title_fr: Mort du calife al-Mahdi
    description_en: |
      Muhammad ibn al-Mansur al-Mahdi, third Abbasid caliph (reigned
      158-169 AH), died at Masabadhan in the Zagros mountains while
      hunting, at age about 43. His ten-year reign restored the
      treasury depleted under his austere father's reforms, freed
      political prisoners en masse, and lavished patronage on the
      Hijaz: extensions to the Sacred Mosque in Mecca and the Prophet's
      ﷺ Mosque in Medina, and the establishment of the postal-station
      and water-cistern network on the Hajj route from Iraq. He led
      personal campaigns against Byzantine Anatolia. The proper-name
      pretensions of the Khurramiyya and other revolts saw fierce
      suppression in his late reign. His son and successor Hadi was
      summoned from Jurjan upon his death.
    description_ar: |
      توفي الخليفة محمد بن المنصور المهدي — ثالث خلفاء بني العباس
      (حكم من ١٥٨ إلى ١٦٩ هـ) — بـ«ماسبذان» في جبال زاغروس وهو في
      الصيد عن نحو ثلاث وأربعين سنة. أعاد عهده عشر سنين الميسرة لبيت
      المال بعد تقشف أبيه، وأطلق سراح المساجين السياسيين، وأنفق
      بسخاء على الحرمين: فوسّع المسجد الحرام بمكة والمسجد النبوي
      بالمدينة، وأقام شبكة من البريد ومنازل الماء على طريق الحج
      العراقي. وقاد بنفسه غزوات على ثغور الروم. وفي أواخر عهده شهدت
      الدولة قمع ثورات الخرمية وغيرها من الحركات. وقد استدعي ابنه
      وخليفته الهادي من جرجان عند وفاته.
    description_fr: |
      Muḥammad ibn al-Manṣūr al-Mahdi, troisième calife abbasside
      (règne 158-169 H), mourut à Masabadhan dans les monts Zagros
      lors d'une partie de chasse, à l'âge d'environ 43 ans. Son
      règne de dix ans rétablit le trésor public épuisé par les
      réformes austères de son père, libéra en masse les prisonniers
      politiques, et prodigua patronage au Hedjaz : extensions de la
      Mosquée Sacrée de La Mecque et de la Mosquée du Prophète ﷺ à
      Médine, et établissement du réseau de relais postaux et de
      citernes d'eau sur la route du Ḥajj depuis l'Irak. Il mena en
      personne des campagnes contre l'Anatolie byzantine. Les
      prétentions onomastiques des Khurramiyya et d'autres révoltes
      virent la répression sévère dans la fin de son règne. Son fils
      et successeur Hadi fut convoqué de Jurjan à sa mort.
