  - slug: death-of-al-battani
    category: scientist
    title_en: Death of al-Battani — astronomer of Raqqa
    title_ar: وفاة البتاني — فلكي الرقة
    title_fr: Mort d'al-Battani — astronome de Raqqa
    description_en: |
      Muhammad ibn Jabir al-Battani — known to medieval Latin Europe
      as *Albategnius* and ranked by historians of astronomy as the
      single most influential observational astronomer between
      Ptolemy and Tycho Brahe — died in Qaṣr al-Jiṣṣ near Samarra
      while returning from Baghdad to dispute taxes. His *Kitāb
      al-Zīj al-Ṣābiʾ* corrected Ptolemy's tropical year length to
      365 days 5 h 46 min 24 s (the modern value is 5 h 48 min 45 s),
      determined the obliquity of the ecliptic to within minutes of
      arc, and produced the most accurate ninth-century star catalogue.
      Copernicus cited him by name twenty-three times in *De
      Revolutionibus*. His sine and tangent tables superseded the
      chord tables of antiquity and grounded all subsequent Islamic
      and European trigonometry.
    description_ar: |
      توفي محمد بن جابر البتاني — المعروف عند أوروبا اللاتينية
      الوسيطة بـ«ألبتغنيوس»، ويعدّه مؤرخو علم الفلك أعظم فلكي رصدي
      بين بطليموس وتيخو براهي — في «قصر الجص» قرب سامراء وهو في
      طريق عودته من بغداد. وكتابه «الزيج الصابئ» صحّح طول السنة
      الاستوائية لبطليموس فجعلها ٣٦٥ يوماً و٥ ساعات و٤٦ دقيقة و٢٤
      ثانية (والقيمة الحديثة ٥ ساعات و٤٨ دقيقة و٤٥ ثانية)، وضبط
      ميل دائرة البروج بدقة دقائق قوسية، وأخرج أدق فهرس للنجوم في
      القرن الثالث الهجري. وذكره كوبرنيكوس باسمه ثلاثاً وعشرين مرة
      في «حركات الأجرام السماوية». وأبدلت جداول الجيب والظل عنده
      جداول الأوتار اليونانية وأسست لكل علم المثلثات الإسلامي
      والأوروبي بعدها.
    description_fr: |
      Muḥammad ibn Jābir al-Battāni — connu de l'Europe latine
      médiévale sous le nom d'*Albategnius* et classé par les
      historiens de l'astronomie comme le seul astronome observationnel
      le plus influent entre Ptolémée et Tycho Brahe — mourut à
      Qaṣr al-Jiṣṣ près de Samarra alors qu'il revenait de Bagdad
      pour contester des impôts. Son *Kitāb al-Zīj al-Ṣābiʾ* corrigea
      la durée de l'année tropique de Ptolémée à 365 j 5 h 46 min
      24 s (la valeur moderne est 5 h 48 min 45 s), détermina
      l'obliquité de l'écliptique à quelques minutes d'arc près, et
      produisit le catalogue stellaire le plus précis du IXe siècle.
      Copernic le cita nommément vingt-trois fois dans *De
      Revolutionibus*. Ses tables de sinus et tangentes supplantèrent
      les tables de cordes antiques et fondèrent toute la trigonométrie
      islamique et européenne ultérieure.
    canonical_hijri: {year: 317, precision: year}
    canonical_gregorian: {date: 929-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
