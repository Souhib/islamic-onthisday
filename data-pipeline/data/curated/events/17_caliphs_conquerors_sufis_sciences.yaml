  - slug: death-of-al-mutasim
    category: caliph
    title_en: Death of Caliph al-Muʿtaṣim
    title_ar: وفاة الخليفة المعتصم
    title_fr: Mort du calife al-Muʿtaṣim
    description_en: |
      Abu Isḥaq al-Muʿtaṣim bi-Allah — eighth Abbasid caliph (reigned
      218-227 AH), warrior-caliph who founded the Turkish guard
      corps that would later dominate Abbasid politics, builder of
      the new capital at Samarra, and the conqueror of Amorium —
      died there at age 47. Most famous for the Sack of Amorium in
      223 AH, which he undertook in response to a Muslim woman's
      cry "wa-Muʿtaṣimah!" reaching him from Byzantine captivity:
      classical sources record his preparation of an army of eighty
      thousand and his personal command. He died of complications
      following a long illness; some accounts say he refused to
      leave his bed even to receive the seal-ring from his sons.
      His son al-Wathiq succeeded him.
    description_ar: |
      توفي أبو إسحاق المعتصم بالله — ثامن خلفاء بني العباس (حكم من
      ٢١٨ إلى ٢٢٧ هـ)، الخليفة المحارب الذي أنشأ فرق الجند الترك
      التي ستهيمن لاحقاً على السياسة العباسية، وباني عاصمته الجديدة
      سامراء، وفاتح عمورية — بسامراء عن سبع وأربعين سنة. اشتهر بفتح
      عمورية سنة ٢٢٣ هـ التي شنها استجابة لاستغاثة امرأة مسلمة
      «وامعتصماه!» بلغته من سبي الروم؛ فأعد كما تذكر المصادر القديمة
      جيشاً قوامه ثمانون ألفاً قاده بنفسه. وتوفي عن مضاعفات طول مرض،
      وذكر بعض الإخباريين أنه أبى أن يفارق فراشه حتى لتسليم الخاتم
      لأبنائه. وخلفه ابنه الواثق.
    description_fr: |
      Abu Isḥāq al-Muʿtaṣim bi-Allah — huitième calife abbasside
      (règne 218-227 H), calife-guerrier qui fonda les corps de
      gardes turcs qui domineront plus tard la politique abbasside,
      bâtisseur de la nouvelle capitale de Samarra, et conquérant
      d'Amorium — y mourut à l'âge de 47 ans. Il est surtout célèbre
      pour le sac d'Amorium en 223 H, qu'il entreprit en réponse au
      cri d'une femme musulmane « *wa-Muʿtaṣimah!* » qui lui parvint
      de captivité byzantine : les sources classiques mentionnent sa
      préparation d'une armée de quatre-vingt mille hommes et son
      commandement personnel. Il mourut de complications suivant une
      longue maladie; certains récits disent qu'il refusa de quitter
      son lit même pour recevoir le sceau de ses fils. Son fils
      al-Wāthiq lui succéda.
    canonical_hijri: {year: 227, month: 1, precision: month}
    canonical_gregorian: {date: 842-01-01, precision: month, method: tabular_conversion}
