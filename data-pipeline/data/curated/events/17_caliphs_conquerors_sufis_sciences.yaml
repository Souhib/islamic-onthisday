# Wave 4 of curated event additions (2026-04-26).
# 4 abbasid caliphs + 3 conquerors/leaders + 2 sunni-canonical sufis
# + 3 scientists + 2 major historians + 1 abbasid military expedition.
# Each event attested in classical Sunni sources. Trilingual (en/ar/fr).

events:
