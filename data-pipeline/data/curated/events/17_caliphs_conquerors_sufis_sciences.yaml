  - slug: death-of-ibn-al-athir
    category: scholar
    title_en: Death of Ibn al-Athir — author of al-Kāmil fi al-Tārīkh
    title_ar: وفاة ابن الأثير — صاحب «الكامل في التاريخ»
    title_fr: Mort d'Ibn al-Athīr — auteur d'al-Kāmil fī al-Tārīkh
    description_en: |
      ʿIzz al-Din Abu al-Hasan ʿAli ibn Muhammad ibn al-Athir
      al-Jazari — the senior of three brothers each renowned in
      separate disciplines (his brother Majd al-Dīn in hadith, his
      brother Ḍiyāʾ al-Dīn in Arabic literary theory) — died in
      Mosul at age about 75. His *al-Kāmil fī al-Tārīkh* (the
      "Complete History") is the most-consulted single annalistic
      world history of medieval Islam: the principal narrative source
      for the Crusades from the Muslim side, the first eyewitness
      record of the Mongol invasion he watched unfold from Mosul,
      and a refined continuation of al-Ṭabari's earlier work. His
      *Usd al-Ghāba fi Maʿrifat al-Ṣaḥāba* — a 7,500-entry biographical
      dictionary of the Companions — remains a standard reference.
      His *al-Lubāb* condenses al-Samʿānī's *al-Ansāb* on tribal and
      geographical *nisbas*.
    description_ar: |
      توفي عز الدين أبو الحسن علي بن محمد ابن الأثير الجزري — كبير
      الإخوة الثلاثة كل في فن: أخوه مجد الدين في الحديث وأخوه ضياء
      الدين في البلاغة العربية — بالموصل عن نحو خمس وسبعين سنة.
      كتابه «الكامل في التاريخ» أوسع كتب التاريخ السنوية في الإسلام
      مرجعاً: المصدر الأول للحروب الصليبية من الجانب الإسلامي، وأول
      شهادة من شاهد عيان للغزو المغولي الذي رآه ابن الأثير من الموصل،
      وذيل منقّح لتاريخ الطبري. وكتابه «أسد الغابة في معرفة الصحابة»
      موسوعة في تراجم الصحابة تبلغ سبعة آلاف وخمس مئة ترجمة، ولا يزال
      مرجعاً معتمداً. واختصر في «اللباب» كتاب «الأنساب» للسمعاني في
      الأنساب القبلية والجغرافية.
    description_fr: |
      ʿIzz al-Dīn Abu al-Ḥasan ʿAli ibn Muḥammad ibn al-Athīr
      al-Jazari — l'aîné de trois frères chacun renommé dans une
      discipline distincte (son frère Majd al-Dīn en hadith, son
      frère Ḍiyāʾ al-Dīn en théorie littéraire arabe) — mourut à
      Mossoul à l'âge d'environ 75 ans. Son *al-Kāmil fī al-Tārīkh*
      (« l'Histoire complète ») est la chronique annalistique la
      plus consultée de l'islam médiéval : la source narrative
      principale des croisades du côté musulman, le premier
      témoignage oculaire de l'invasion mongole qu'il vit se dérouler
      depuis Mossoul, et une continuation raffinée de l'œuvre antérieure
      d'al-Ṭabari. Son *Usd al-Ghāba fī Maʿrifat al-Ṣaḥāba* — un
      dictionnaire biographique de 7 500 entrées sur les Compagnons
      — reste une référence standard. Son *al-Lubāb* condense
      *al-Ansāb* d'al-Samʿānī sur les *nisbas* tribales et
      géographiques.
