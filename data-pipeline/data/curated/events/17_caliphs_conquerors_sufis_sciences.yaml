  - slug: death-of-ibn-asakir
    category: scholar
    title_en: Death of Ibn ʿAsakir — historian of Damascus
    title_ar: وفاة ابن عساكر — مؤرخ دمشق
    title_fr: Mort d'Ibn ʿAsākir — historien de Damas
    description_en: |
      Abu al-Qasim ʿAli ibn al-Hasan ibn ʿAsakir al-Dimashqi —
      foremost muḥaddith of Damascus in his generation, head of the
      Dār al-Ḥadīth al-Nūriyya founded for him by Sultan Nūr al-Dīn
      Zankī, and author of the eighty-volume *Tarīkh Madīnat
      Dimashq* — died in Damascus at age about 71. *Tarīkh Madīnat
      Dimashq* is a city-as-isnad encyclopedia: it gathers, with
      full chains of transmission, every Companion, tabiʿi, scholar,
      ruler, traveller, or notable who set foot in Damascus from the
      conquest onward, totalling more than ten thousand biographical
      entries. The work is irreplaceable for early Islamic history
      of Greater Syria and is one of the principal sources for
      al-Dhahabi, Ibn Kathir, and Ibn Ḥajar.
    description_ar: |
      توفي أبو القاسم علي بن الحسن ابن عساكر الدمشقي — كبير محدثي
      دمشق في عصره، شيخ دار الحديث النورية التي أنشأها له السلطان
      نور الدين زنكي، ومصنف «تاريخ مدينة دمشق» في ثمانين مجلداً —
      بدمشق عن نحو إحدى وسبعين سنة. و«تاريخ مدينة دمشق» موسوعة
      المدينة بإسناد: يجمع بأسانيده الكاملة كل صحابي وتابعي وعالم
      وأمير ورحّالة ومشتهر دخل دمشق منذ الفتح فما بعد، ويبلغ عدد
      تراجمه أزيد من عشرة آلاف. والكتاب لا غنى عنه في تاريخ بلاد
      الشام الإسلامي الباكر، وهو من أصول مادة الذهبي وابن كثير وابن
      حجر العسقلاني.
    description_fr: |
      Abu al-Qāsim ʿAli ibn al-Ḥasan ibn ʿAsākir al-Dimashqi — le
      plus grand muḥaddith de Damas de sa génération, directeur de
      la *Dār al-Ḥadīth al-Nūriyya* fondée pour lui par le sultan
      Nūr al-Dīn Zanki, et auteur du *Tārīkh Madīnat Dimashq* en
      quatre-vingts volumes — mourut à Damas à l'âge d'environ
      71 ans. Le *Tārīkh Madīnat Dimashq* est une encyclopédie de
      la cité-comme-*isnād* : elle rassemble, avec chaînes de
      transmission complètes, tout Compagnon, tabiʿi, savant,
      souverain, voyageur ou notable qui foula le sol de Damas
      depuis la conquête, totalisant plus de dix mille notices
      biographiques. L'ouvrage est irremplaçable pour l'histoire
      islamique ancienne du Bilād al-Shām et l'une des sources
      principales d'al-Dhahabi, Ibn Kathīr et Ibn Ḥajar.
    canonical_hijri: {year: 571, month: 11, precision: month}
