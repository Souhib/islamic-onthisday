  - slug: death-of-al-sirri-al-saqati
    category: scholar
    title_en: Death of al-Sirri al-Saqaṭi
    title_ar: وفاة السري السقطي
    title_fr: Mort d'al-Sirri al-Saqaṭi
    description_en: |
      Abu al-Hasan al-Sirri ibn al-Mughallis al-Saqaṭi, maternal
      uncle and master of al-Junayd al-Baghdadi, and the first
      teacher in Baghdad to articulate "tawḥīd of the elite"
      (*tawḥīd al-khaṣṣa*) within strict Sunni framework — died in
      Baghdad at age about 98. The *Saqaṭi* nisba comes from his
      profession as a seller of *saqaṭ* (small wares); he combined
      manual labour with rigorous spiritual discipline, the model
      that al-Junayd would inherit and refine. His sayings on
      remembrance of God, brotherhood, and reliance preserved by
      al-Sulami in *Ṭabaqāt al-Ṣūfiyya* remain canonical citations
      in early Sufi adab literature. al-Junayd considered him the
      foundation of his own path.
    description_ar: |
      توفي أبو الحسن السري بن المغلس السقطي — خال الجنيد البغدادي
      وشيخه، وأول من نطق ببغداد بـ«توحيد الخاصة» في إطار التصوف السني
      الصارم — ببغداد عن نحو ثمانٍ وتسعين سنة. ونسبته «السقطي» من
      مهنته في بيع «السقط» (السلع الصغيرة)، فجمع بين الكسب الحلال
      وتدريب النفس الصوفي، وهو النموذج الذي ورثه عنه الجنيد ونقحه.
      ومحفوظات أقواله في الذكر والمحبة في الله والتوكل، التي رواها
      السلمي في «طبقات الصوفية»، من المراجع الأصلية في أدب التصوف
      السني الباكر. واعتبره الجنيد رحمه الله أصل طريقه ومصدره.
    description_fr: |
      Abu al-Ḥasan al-Sirri ibn al-Mughallis al-Saqaṭi, oncle maternel
      et maître d'al-Junayd al-Baghdādi, et le premier enseignant à
      Bagdad à articuler le « *tawḥīd* de l'élite » (*tawḥīd
      al-khāṣṣa*) dans un cadre sunnite strict — mourut à Bagdad à
      l'âge d'environ 98 ans. La *nisba* « al-Saqaṭi » provient de
      sa profession de marchand de *saqaṭ* (petites marchandises); il
      alliait travail manuel et discipline spirituelle rigoureuse, le
      modèle dont al-Junayd hériterait et qu'il raffinerait. Ses
      paroles sur le rappel de Dieu, la fraternité et la confiance
      préservées par al-Sulami dans *Ṭabaqāt al-Ṣūfiyya* demeurent
      des citations canoniques de la littérature *adab* soufie
      ancienne. al-Junayd le considérait comme le fondement de sa
      propre voie.
    canonical_hijri: {year: 253, precision: year}
    canonical_gregorian: {date: 867-01-01, precision: year, method: attested}
