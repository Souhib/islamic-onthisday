  - slug: death-of-ibn-yunus
    category: scientist
    title_en: Death of Ibn Yunus — Cairo astronomer
    title_ar: وفاة ابن يونس — فلكي القاهرة
    title_fr: Mort d'Ibn Yūnus — astronome du Caire
    description_en: |
      Abu al-Hasan ʿAli ibn Yunus al-Ṣadafi — head of the Fatimid
      observatory at Cairo and author of *al-Zīj al-Ḥākimi al-Kabīr*,
      the most accurate astronomical handbook of the medieval world
      — died in Cairo at age about 60. His Zīj records over a
      hundred personally observed planetary conjunctions, lunar
      eclipses, and equinox passages, the longest continuous run of
      pre-modern observational data; modern astronomers used his
      lunar timings of the Cairo eclipses of 977 and 978 CE to
      determine the secular acceleration of the Moon. He produced
      the first complete tables for spherical astronomical problems
      in trigonometric form, and his precise determination of the
      qibla of Cairo and the prayer times informed all later Egyptian
      timekeeping (*ʿilm al-mīqāt*).
    description_ar: |
      توفي أبو الحسن علي بن يونس الصدفي — رئيس المرصد الفاطمي بالقاهرة
      ومصنف «الزيج الحاكمي الكبير»، أدق زيج فلكي في العصور الوسطى —
      بالقاهرة عن نحو ستين سنة. سجل في زيجه أكثر من مئة رصد شخصي
      للاقترانات الكوكبية والكسوفات القمرية والاعتدالات، وهو أطول
      تتابع رصدي في تاريخ ما قبل الحديث؛ واستفاد فلكيو العصر الحديث
      من أرصاده القمرية لكسوفي القاهرة سنتي ٩٧٧ و٩٧٨ ميلادي في تحديد
      التسارع العلماني للقمر. وأخرج أول جداول كاملة لمسائل الفلك
      الكروي في صورة مثلثاتية، وأصبح ضبطه لقبلة القاهرة وأوقات
      الصلاة فيها أساس علم الميقات في مصر إلى الأبد.
    description_fr: |
      Abu al-Ḥasan ʿAli ibn Yūnus al-Ṣadafi — directeur de
      l'observatoire fatimide du Caire et auteur d'*al-Zīj al-Ḥākimī
      al-Kabīr*, le manuel astronomique le plus précis du monde
      médiéval — mourut au Caire à l'âge d'environ 60 ans. Son *Zīj*
      consigne plus d'une centaine de conjonctions planétaires,
      d'éclipses lunaires et de passages d'équinoxes personnellement
      observés, la plus longue série continue de données
      observationnelles pré-modernes; les astronomes modernes
      utilisèrent ses chronométrages lunaires des éclipses du Caire
      de 977 et 978 EC pour déterminer l'accélération séculaire de
      la Lune. Il produisit les premières tables complètes pour les
      problèmes d'astronomie sphérique sous forme trigonométrique,
      et sa détermination précise de la *qibla* du Caire et des
      heures de prière informa tout le calcul du temps égyptien
      ultérieur (*ʿilm al-mīqāt*).
    canonical_hijri: {year: 399, month: 6, precision: month}
    canonical_gregorian: {date: 1009-02-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: ei2
      - source_key: dhahabi_siyar
    people: [[ibn-yunus, subject]]
    tags: [scientist, astronomy, cairo, fatimid, miqat]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ibn_Yunus"

  - slug: death-of-ibn-al-baytar
    category: scientist
    title_en: Death of Ibn al-Bayṭar — botanist of al-Andalus
    title_ar: وفاة ابن البيطار — عشّاب الأندلس
    title_fr: Mort d'Ibn al-Bayṭār — botaniste d'al-Andalus
    description_en: |
      Abu Muhammad ʿAbdallah ibn Aḥmad ibn al-Bayṭar al-Malaqi —
      botanist, pharmacologist, and chief herbalist (*raʾīs al-
      ʿashshābīn*) of the Ayyubid sultan al-Kāmil and his successor
      al-Ṣāliḥ — died in Damascus at age about 51. His monumental
      *al-Jāmiʿ li-Mufradat al-Adwiya wa-l-Aghdhiya* catalogues 1,400
      simple drugs (plant, animal, mineral) cross-referenced from
      direct observation and from 150 prior authorities; it remained
      the standard pharmacopoeia of the Muslim and Christian
      Mediterranean for four centuries. He travelled the entire arc
      of the Mediterranean — from Malaga, his birthplace, through
      North Africa, Anatolia, and the Levant — to verify each
      species in situ. His work was the first to identify the
      Mediterranean medicinal flora as a coherent system.
    description_ar: |
      توفي أبو محمد عبد الله بن أحمد ابن البيطار المالقي — عالم النبات
      والصيدلة، ورئيس العشّابين للسلطان الأيوبي الكامل ثم خلفه الصالح
      نجم الدين أيوب — بدمشق عن نحو إحدى وخمسين سنة. وكتابه الموسوعي
      «الجامع لمفردات الأدوية والأغذية» سجلٌّ لـ١٤٠٠ مفردة دوائية
      نباتية وحيوانية ومعدنية، حُصّلت من مشاهدته المباشرة ومن مئة
      وخمسين مرجعاً سبقوه، وظل مرجع الصيدلة المعتمد في حوض المتوسط
      الإسلامي والمسيحي أربعة قرون. سافر طول قوس البحر المتوسط — من
      مالقة مسقط رأسه عبر شمال أفريقيا والأناضول والشام — للتثبت من
      كل نوع نباتي في موضعه. وكتابه أول من رصد نباتات المتوسط الطبية
      منظومةً متماسكة.
    description_fr: |
      Abu Muḥammad ʿAbdallāh ibn Aḥmad ibn al-Bayṭār al-Mālaqi —
      botaniste, pharmacologue et herboriste en chef (*raʾīs al-
      ʿashshābīn*) du sultan ayyoubide al-Kāmil et de son successeur
      al-Ṣāliḥ — mourut à Damas à l'âge d'environ 51 ans. Son
      monumental *al-Jāmiʿ li-Mufradāt al-Adwiya wa-l-Aghdhiya*
      catalogue 1 400 substances médicinales simples (végétales,
      animales, minérales) recoupées par observation directe et par
      150 autorités antérieures; il demeura la pharmacopée standard
      du monde méditerranéen musulman et chrétien pendant quatre
      siècles. Il parcourut tout l'arc méditerranéen — de Malaga,
      sa ville natale, à travers l'Afrique du Nord, l'Anatolie et le
      Levant — pour vérifier chaque espèce *in situ*. Son ouvrage
      fut le premier à identifier la flore médicinale méditerranéenne
      comme un système cohérent.
