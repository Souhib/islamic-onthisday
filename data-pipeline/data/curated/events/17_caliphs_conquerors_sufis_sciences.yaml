  - slug: death-of-al-mutadid
    category: caliph
    title_en: Death of Caliph al-Muʿtaḍid
    title_ar: وفاة الخليفة المعتضد
    title_fr: Mort du calife al-Muʿtaḍid
    description_en: |
      Aḥmad ibn al-Muwaffaq al-Muʿtaḍid bi-Allah, sixteenth Abbasid
      caliph (reigned 279-289 AH), died at Baghdad at age about 47.
      He is widely regarded by classical historians as the last
      effective Abbasid caliph: he restored the seat of the caliphate
      to Baghdad after thirty years at Samarra, brought the Tulunid
      autonomy in Egypt back under direct Abbasid control, suppressed
      Khārijite uprisings in al-Jazīra, and curbed the Saffarid
      ambitions in the east. After his death the dynasty entered
      irreversible political decline; within a generation, real power
      had passed to the Bāghdādī military commanders and ultimately
      to the Buyids. al-Ṭabari, Ibn al-Athir, and Ibn Kathir all
      memorialise his reign as a brief restoration before the
      breakup.
    description_ar: |
      توفي الخليفة أحمد بن الموفق المعتضد بالله — السادس عشر من
      خلفاء بني العباس (حكم من ٢٧٩ إلى ٢٨٩ هـ) — ببغداد عن نحو سبع
      وأربعين سنة. وعدّه عامة المؤرخين القدامى آخر خلفاء بني العباس
      المتمكنين تمكناً فعلياً: فقد أعاد الخلافة إلى بغداد بعد ثلاثين
      سنة في سامراء، وأخضع الدولة الطولونية في مصر لسلطة الخلافة
      المباشرة، وقمع ثورات الخوارج في الجزيرة، وكفّ مطامع الصفاريين
      في المشرق. وبعد وفاته دخلت الدولة في انحدار سياسي لا رجعة فيه؛
      وفي جيل واحد آلت السلطة الحقيقية إلى قواد الجند البغداديين
      ثم إلى البويهيين. وأرّخ الطبري وابن الأثير وابن كثير لخلافته
      عودة قصيرة قبل تفسخ الدولة.
    description_fr: |
      Aḥmad ibn al-Muwaffaq al-Muʿtaḍid bi-Allah, seizième calife
      abbasside (règne 279-289 H), mourut à Bagdad à l'âge d'environ
      47 ans. Il est largement considéré par les historiens classiques
      comme le dernier calife abbasside effectif : il rétablit le
      siège du califat à Bagdad après trente ans à Samarra, ramena
      l'autonomie tulunide d'Égypte sous le contrôle direct des
      Abbassides, réprima les soulèvements khārijites en al-Jazīra,
      et contint les ambitions saffarides à l'est. Après sa mort,
      la dynastie entra dans un déclin politique irréversible; en
      l'espace d'une génération, le pouvoir réel passa aux commandants
      militaires bagdadiens puis finalement aux Bouyides. al-Ṭabari,
      Ibn al-Athīr et Ibn Kathīr commémorent tous son règne comme
      une brève restauration avant la rupture.
    canonical_hijri: {year: 289, month: 4, precision: month}
    canonical_gregorian: {date: 902-04-01, precision: month, method: tabular_conversion}
