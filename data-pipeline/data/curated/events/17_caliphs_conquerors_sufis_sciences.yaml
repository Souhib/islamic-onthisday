  - slug: death-of-al-mutawakkil
    category: caliph
    title_en: Assassination of Caliph al-Mutawakkil
    title_ar: مقتل الخليفة المتوكل
    title_fr: Assassinat du calife al-Mutawakkil
    description_en: |
      Jaʿfar ibn al-Muʿtaṣim al-Mutawakkil ʿala Allah, tenth Abbasid
      caliph (reigned 232-247 AH), was killed in his palace at
      Samarra by a faction of Turkish guards in collusion with his
      own son al-Muntaṣir, at age about 41. His reign decisively ended
      the Mihna (the inquisition over the createdness of the Qurʾan)
      by reaffirming the Sunni position; he restored the religious
      scholars (Ahmad ibn Ḥanbal foremost among them) to public
      honour. He also issued sharply discriminatory edicts against
      Christians and Jews. His murder is the marker historians use
      to date the start of the *Anarchy at Samarra* — a decade in
      which four caliphs were enthroned and killed by their own
      Turkish military, accelerating the political collapse of the
      central caliphate.
    description_ar: |
      قُتل الخليفة جعفر بن المعتصم المتوكل على الله — عاشر خلفاء بني
      العباس (حكم من ٢٣٢ إلى ٢٤٧ هـ) — في قصره بسامراء على يد طائفة
      من جند الترك بمؤامرة من ابنه المنتصر، وقد ناهز الحادية والأربعين.
      أنهى عهده محنة خلق القرآن إنهاءً صريحاً برد قول أهل السنة، وأعاد
      تكريم الفقهاء وعلى رأسهم الإمام أحمد بن حنبل. غير أنه أصدر
      مراسيم تفرقة شديدة على أهل الذمة من النصارى واليهود. ومقتله
      هو التاريخ الذي يؤرخ به المؤرخون بداية «فوضى سامراء»: عقد من
      الزمن خلع فيه الجند الترك أربعة من الخلفاء وقتلوهم، تسارع به
      الانهيار السياسي للخلافة المركزية.
    description_fr: |
      Jaʿfar ibn al-Muʿtaṣim al-Mutawakkil ʿala Allah, dixième
      calife abbasside (règne 232-247 H), fut tué dans son palais à
      Samarra par une faction de gardes turcs en collusion avec son
      propre fils al-Muntaṣir, à l'âge d'environ 41 ans. Son règne
      mit fin de manière décisive à la *Miḥna* (l'inquisition sur
      le caractère créé du Coran) en réaffirmant la position sunnite;
      il restaura les savants religieux (Aḥmad ibn Ḥanbal en tête)
      à l'honneur public. Il émit aussi des édits durement
      discriminatoires contre chrétiens et juifs. Son meurtre est le
      marqueur que les historiens utilisent pour dater le début de
      l'*Anarchie à Samarra* — une décennie durant laquelle quatre
      califes furent intronisés et tués par leur propre armée turque,
      accélérant l'effondrement politique du califat central.
    canonical_hijri: {year: 247, month: 12, precision: month}
    canonical_gregorian: {date: 861-12-01, precision: month, method: tabular_conversion}
