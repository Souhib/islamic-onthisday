  - slug: death-of-al-junayd-al-baghdadi
    category: scholar
    title_en: Death of al-Junayd al-Baghdadi — Sayyid al-Ṭāʾifa
    title_ar: وفاة الجنيد البغدادي — سيد الطائفة
    title_fr: Mort d'al-Junayd al-Baghdadi — Sayyid al-Ṭāʾifa
    description_en: |
      Abu al-Qasim al-Junayd al-Baghdadi — *sayyid al-ṭāʾifa* "master
      of the [Sufi] community" by consensus of the classical Sunni
      tradition, jurist of the Thawri (and later the Shafiʿi)
      madhhab, and author of letters and short treatises that became
      the foundational corpus of "sober" Sunni Sufism — died in
      Baghdad at age about 80. His insistence that the mystical
      path must remain bound by the Qurʾan and Sunna, and his sharp
      distinction from the ecstatic excesses of his contemporary
      al-Ḥallaj, made him the canonical figure to whom every later
      Sunni Sufi master traces his silsila. al-Sulami, al-Qushayri,
      al-Ghazali, and Ibn Taymiyya all defer to him as the standard.
      He famously said: "All paths are closed except for him who
      treads in the footsteps of the Messenger ﷺ."
    description_ar: |
      توفي الإمام أبو القاسم الجنيد البغدادي — «سيد الطائفة» بإجماع
      أهل السنة من الصوفية، الفقيه على مذهب سفيان الثوري ثم الشافعي،
      ومصنف الرسائل والكتب الصغار التي صارت أصول التصوف السني
      «الصاحي» — ببغداد عن نحو ثمانين سنة. تمسكه بأن السلوك إلى الله
      مقيد بالكتاب والسنة، ومفاصلته الحازمة لشطحات معاصره الحلاج،
      جعلته العلم الذي ترفع إليه كل أسانيد المتصوفة السنة من بعده.
      فالسلمي والقشيري والغزالي وحتى ابن تيمية يصدرون عنه على أنه
      المعيار. ومن قوله المشهور: «الطرق كلها مسدودة إلا على من
      اقتفى أثر الرسول ﷺ».
    description_fr: |
      Abu al-Qāsim al-Junayd al-Baghdādi — *sayyid al-ṭāʾifa*, « maître
      de la communauté [soufie] » par consensus de la tradition
      sunnite classique, juriste du madhhab thawrī (puis chāfiʿite),
      et auteur de lettres et courts traités qui devinrent le corpus
      fondateur du soufisme sunnite « sobre » — mourut à Bagdad à
      l'âge d'environ 80 ans. Son insistance sur le fait que la voie
      mystique doit rester liée au Coran et à la Sunna, et sa nette
      distinction d'avec les excès extatiques de son contemporain
      al-Ḥallāj, en firent la figure canonique vers laquelle tout
      maître soufi sunnite ultérieur fait remonter sa *silsila*.
      al-Sulami, al-Qushayri, al-Ghazāli et Ibn Taymiyya s'en remettent
      tous à lui comme à la référence. Il disait : « toutes les voies
      sont fermées sauf pour celui qui marche dans les pas du
      Messager ﷺ ».
    canonical_hijri: {year: 298, precision: year}
    canonical_gregorian: {date: 910-01-01, precision: year, method: attested}
