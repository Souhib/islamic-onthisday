  - slug: sack-of-amorium
    category: battle
    title_en: Sack of Amorium — al-Muʿtaṣim's Anatolian campaign
    title_ar: فتح عمورية في غزوة المعتصم
    title_fr: Sac d'Amorium — campagne anatolienne d'al-Muʿtaṣim
    description_en: |
      Caliph al-Muʿtaṣim led an expedition of some eighty thousand
      Muslim troops deep into central Anatolia, besieging and
      capturing the strategic Byzantine fortress city of Amorium
      after a fifty-five day siege. The campaign was framed as a
      response to the cry of a Muslim woman taken captive by
      Byzantine raiders ("wa-Muʿtaṣimah!"); the caliph reportedly
      vowed to strike the city most beloved to Emperor Theophilos,
      and Amorium was the dynastic homeland of the reigning house.
      The fall produced the most celebrated single martial achievement
      of the Abbasid era — commemorated by al-Buḥturi and Abu
      Tammām (whose famous *Sayfu Aṣdaqu Anbāʾan mina-l-kutubi*
      qaṣīda was composed for it). The campaign demonstrated the
      Abbasid army's continued capacity to project power deep into
      Byzantine territory more than a century after Yarmuk.
    description_ar: |
      قاد الخليفة المعتصم جيشاً قوامه نحو ثمانين ألف مقاتل في عمق
      الأناضول، فحاصر مدينة عمورية الحصينة قاعدة الروم في وسط البلاد
      خمسة وخمسين يوماً ثم فتحها عنوة. وكانت الحملة استجابة لاستغاثة
      امرأة مسلمة سبتها غارات الروم: «وامعتصماه!»؛ فآلى الخليفة على
      نفسه أن يقصد أحبّ مدائن الإمبراطور توفيلوس إليه، وعمورية مهد
      أسرته الحاكمة. وأخرج فتحها أكبر إنجاز عسكري عباسي مدوّن، خلّده
      البحتري وأبو تمام في قصيدته الذائعة «السيف أصدق أنباء من
      الكتب». وأظهرت الحملة بقاء قدرة الجيش العباسي على بسط نفوذه
      عميقاً في أراضي الروم بعد أكثر من قرن من اليرموك.
    description_fr: |
      Le calife al-Muʿtaṣim mena une expédition de quelque
      quatre-vingt mille soldats musulmans au cœur de l'Anatolie
      centrale, assiégeant et prenant la cité-forteresse byzantine
      stratégique d'Amorium après cinquante-cinq jours de siège.
      La campagne fut présentée comme une réponse au cri d'une
      musulmane prise en captivité par des pillards byzantins
      (« *wa-Muʿtaṣimah!* »); le calife aurait juré de frapper la
      cité la plus chère à l'empereur Théophile, et Amorium était
      le berceau dynastique de la maison régnante. La chute produisit
      le plus célèbre exploit militaire isolé de l'ère abbasside —
      commémoré par al-Buḥturī et Abu Tammām (dont la fameuse
      *qaṣīda* « *al-Sayfu aṣdaqu anbāʾan mina-l-kutubi* » fut
      composée à cette occasion). La campagne démontra la capacité
      durable de l'armée abbasside à projeter sa puissance loin en
      territoire byzantin plus d'un siècle après Yarmouk.
    canonical_hijri: {year: 223, month: 8, precision: month}
    canonical_gregorian: {date: 838-08-01, precision: month, method: tabular_conversion}
