  - slug: death-of-uqba-ibn-nafi
    category: companion
    title_en: Martyrdom of ʿUqba ibn Nafiʿ — Founder of Qayrawan
    title_ar: استشهاد عقبة بن نافع — مؤسس القيروان
    title_fr: Martyre de ʿUqba ibn Nāfiʿ — fondateur de Qayrawan
    description_en: |
      ʿUqba ibn Nafiʿ al-Fihri, conqueror of Ifriqiya and founder
      (in 50 AH) of the city of Qayrawan from which Muslim authority
      would expand across the Maghreb, was killed at Tahuda in
      modern Algeria during a Berber-led uprising under Kusayla
      after he had ridden west "until the Atlantic Ocean lay between
      his horse and any further conquest" — the famous classical
      utterance attributed to him as he turned his mount into the
      surf. He was about 60. The mosque he founded at Qayrawan
      remains the oldest in North Africa and the spiritual anchor of
      the Maghrebi Maliki tradition. His foundational role is
      recorded in Ibn ʿAbd al-Hakam's *Futuh Misr wa-l-Maghrib*, the
      earliest extant Maghrebi conquest narrative.
    description_ar: |
      استشهد عقبة بن نافع الفهري — فاتح إفريقية ومؤسس مدينة القيروان
      سنة خمسين للهجرة، التي انطلقت منها سلطان المسلمين عبر المغرب
      كله — في «تهودة» بشمال شرق الجزائر اليوم في ثورة قبائل البربر
      بقيادة كسيلة، وكان قبل ذلك قد اقتحم الأرض حتى وصل إلى المحيط
      الأطلسي، فأدخل فرسه في موجه ونطق بقولته الذائعة في كتب التاريخ:
      «اللهم لو علمت أن وراء هذا البحر أرضاً لجاهدت في سبيلك حتى لا
      يُعبد سواك». وقد ناهز الستين. ولا يزال جامعه بالقيروان أقدم
      جامع في شمال أفريقيا والمعقل الروحي للمذهب المالكي بالمغرب.
      وذكر دوره التأسيسي ابن عبد الحكم في «فتوح مصر والمغرب»، أقدم
      ما وصلنا من كتب المغازي المغربية.
    description_fr: |
      ʿUqba ibn Nāfiʿ al-Fihri, conquérant de l'Ifrīqiya et fondateur
      (en 50 H) de la ville de Qayrawan d'où l'autorité musulmane
      s'étendrait à travers le Maghreb, fut tué à Tahuda dans
      l'actuelle Algérie lors d'un soulèvement berbère mené par
      Kusayla après avoir chevauché jusqu'à l'ouest « tant que
      l'Atlantique ne se trouvât entre son cheval et toute autre
      conquête » — la célèbre parole classique qui lui est attribuée
      alors qu'il dirigeait sa monture dans le ressac. Il avait
      environ 60 ans. La mosquée qu'il fonda à Qayrawan demeure la
      plus ancienne d'Afrique du Nord et l'ancrage spirituel de la
      tradition malikite maghrébine. Son rôle fondateur est consigné
      dans *Futūḥ Miṣr wa-l-Maghrib* d'Ibn ʿAbd al-Ḥakam, le plus
      ancien récit de conquête maghrébin existant.
    canonical_hijri: {year: 63, precision: year}
