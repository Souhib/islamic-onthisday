  - slug: death-of-alp-arslan
    category: ruler_death
    title_en: Assassination of Alp Arslān — Saljūq Sultan and Victor of Manzikert
    title_ar: مقتل ألب أرسلان — السلطان السلجوقي وفاتح ملاذكرد
    title_fr: Assassinat d'Alp Arslān — sultan seldjoukide et vainqueur de Manzikert
    description_en: |
      ʿAḍud al-Dawla Abū Shujāʿ Alp Arslān ibn Chaghrī, second
      sultan of the Great Saljūqs and victor over the Byzantines
      at Manzikert (463 AH), was killed at the camp on the Oxus
      while leading his army on campaign into Transoxiana. The
      classical sources tell that a captured fortress commander
      named Yūsuf al-Khwārazmī, brought before him in chains,
      drew a hidden dagger and stabbed the sultan; Alp Arslān's
      attempt to shoot the man with his bow caused him to slip
      from the dais, and his guards' subsequent dismemberment of
      the assassin came too late. He died of the wounds four
      days later, aged about forty. His ten-year reign had
      consolidated Saljūq rule of Iran with the vizier Niẓām
      al-Mulk's administrative reforms, broken Byzantine
      Anatolia at Manzikert, and made the Saljūqs the
      principal Sunni political power between the Mediterranean
      and Central Asia. He was succeeded by his eighteen-year-
      old son Malikshāh, with Niẓām al-Mulk continuing as
      vizier.
    description_ar: |
      قُتل السلطان عضد الدولة أبو شجاع ألب أرسلان بن جغري —
      ثاني سلاطين السلاجقة الكبار وفاتح ملاذكرد على البيزنطيين
      (٤٦٣ هـ) — في معسكره على نهر جيحون أثناء حملة على بلاد
      ما وراء النهر. وتروي المصادر الكلاسيكية أن أميرَ حصنٍ
      أُسر يدعى يوسف الخوارزمي حين أُحضر إليه مكبَّلاً سحب
      خنجراً مخبأً وطعن السلطانَ به؛ وحاول ألب أرسلان أن يرميه
      بسهم فسقط عن دكَّة الحكم، ولم ينفعه ما فعله حرسُه
      بالقاتل بعد ذلك من قطع وتمزيق. ومات بعد أربعة أيام من
      جراحه عن نحو أربعين سنة. وكانت ولايته العشر سنوات قد
      وطَّدت سلطان السلاجقة في إيران بإصلاحات وزيره نظام
      الملك، وكسرت الأناضول البيزنطية في ملاذكرد، وجعلت
      السلاجقة القوة السياسية السنية الكبرى بين البحر المتوسط
      ووسط آسيا. وخلفه ابنه ملكشاه وله ثماني عشرة سنة، وبقي
      نظام الملك في الوزارة.
    description_fr: |
      ʿAḍud al-Dawla Abū Shujāʿ Alp Arslān ibn Chaghrī, deuxième
      sultan des Grands Seldjoukides et vainqueur des Byzantins
      à Manzikert (463 H), fut tué au camp sur l'Oxus alors
      qu'il menait son armée en campagne en Transoxiane. Les
      sources classiques racontent qu'un commandant de forteresse
      capturé nommé Yūsuf al-Khwārazmī, amené devant lui enchaîné,
      tira un poignard caché et poignarda le sultan; la tentative
      d'Alp Arslān de tirer sur l'homme avec son arc le fit
      glisser du podium, et le démembrement subséquent de
      l'assassin par ses gardes vint trop tard. Il mourut de ses
      blessures quatre jours plus tard, à l'âge d'environ
      quarante ans. Son règne de dix ans avait consolidé la
      domination seldjoukide de l'Iran avec les réformes
      administratives du vizir Niẓām al-Mulk, brisé l'Anatolie
      byzantine à Manzikert, et fait des Seldjoukides la
      principale puissance politique sunnite entre la
      Méditerranée et l'Asie centrale. Il fut succédé par son
      fils Malikshāh âgé de dix-huit ans, Niẓām al-Mulk
      restant vizir.
    canonical_hijri: {year: 465, month: 3, day: 10, precision: day}
    canonical_gregorian: {date: 1072-11-30, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the assassination of Alp Arslān in Rabīʿ al-Awwal 465 AH on the Oxus and gives the captured-commander narrative in detail."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the death in 465 AH and details the assassination."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the biographical entry placing the assassination on 10 Rabīʿ al-Awwal 465 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Alp Arslān among the obituaries of 465 AH."
    people: [[alp-arslan, subject]]
    tags: [seljuk, oxus, transoxiana, assassination, manzikert, ruler]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-malikshah-saljuq
    category: ruler_death
    title_en: Death of Malikshāh — Apex of the Great Saljūq Empire
    title_ar: وفاة ملكشاه — ذروة الدولة السلجوقية الكبرى
    title_fr: Mort de Malikshāh — apogée de l'empire des Grands Seldjoukides
    description_en: |
      Jalāl al-Dawla Abū al-Fatḥ Malikshāh ibn Alp Arslān, third
      sultan of the Great Saljūqs and the empire's apex ruler,
      died at Baghdad after a hunting trip aged about thirty-
      eight, only thirty-five days after the assassination of
      his vizier Niẓām al-Mulk by an Ismāʿīlī Nizārī of
      Alamūt. Classical sources record both deaths together as
      the closing event of the empire's golden age. His twenty-
      year reign had brought Saljūq frontiers to their greatest
      extent — from the Mediterranean to the Pamirs — under
      Niẓām al-Mulk's administration, with his name read in
      the *khuṭba* in Mecca, Damascus, and the cities of the
      Yemen. The succession was contested between his sons
      Berkyāruq and Maḥmūd; the resulting civil war fragmented
      the unified empire into sub-sultanates that would never
      again be reunited. al-Dhahabī, Ibn al-Athīr, and Ibn
      Kathīr all note the proximity of the two deaths and the
      contemporary suspicion — never proved — that the
      Niẓārīs had also poisoned the sultan.
    description_ar: |
      توفي السلطان جلال الدولة أبو الفتح ملكشاه بن ألب أرسلان —
      ثالث سلاطين السلاجقة الكبار وذروة الدولة السلجوقية —
      ببغداد بعد رحلة صيد عن نحو ثمان وثلاثين سنة، بعد خمسة
      وثلاثين يوماً فقط من اغتيال وزيره نظام الملك على يد
      نزاريّ إسماعيلي من فدائية آلموت. وتجمع المصادر الكلاسيكية
      الموتَين بوصفهما إيذاناً بانطفاء العصر الذهبي للسلاجقة.
      وكانت ولايته العشرين قد بلغت بحدود السلاجقة أقصى مدى لها
      — من البحر المتوسط إلى البامير — في إدارة نظام الملك،
      وقُرئ اسمه في الخطبة بمكة ودمشق ومدن اليمن. واختلف بنوه
      على الوراثة: بركياروق ومحمود؛ فأشعلت الحرب الأهلية
      الناتجة تجزؤ الدولة الموحدة سلطنات فرعية لم تعد قط إلى
      وحدتها. ويذكر الذهبي وابن الأثير وابن كثير قرب الموتين
      من بعضهما، وما تردد في عصرهم — ولم يثبت — من أن
      النزارية سمَّت السلطان كذلك.
    description_fr: |
      Jalāl al-Dawla Abū al-Fatḥ Malikshāh ibn Alp Arslān,
      troisième sultan des Grands Seldjoukides et souverain de
      l'apogée de l'empire, mourut à Bagdad après une chasse à
      l'âge d'environ trente-huit ans, trente-cinq jours
      seulement après l'assassinat de son vizir Niẓām al-Mulk
      par un Nizārī ismaélien d'Alamūt. Les sources classiques
      enregistrent ces deux morts ensemble comme l'événement
      qui clôt l'âge d'or de l'empire. Son règne de vingt ans
      avait porté les frontières seldjoukides à leur plus
      grande extension — de la Méditerranée aux Pamirs — sous
      l'administration de Niẓām al-Mulk, son nom étant lu dans
      la *khuṭba* à La Mecque, Damas, et les villes du Yémen.
      La succession fut contestée entre ses fils Berkyāruq et
      Maḥmūd; la guerre civile qui s'ensuivit fragmenta
      l'empire unifié en sous-sultanats qui ne seraient jamais
      réunifiés. al-Dhahabī, Ibn al-Athīr, et Ibn Kathīr
      relèvent tous la proximité des deux morts et la suspicion
      contemporaine — jamais prouvée — que les Nizārīs
      auraient également empoisonné le sultan.
    canonical_hijri: {year: 485, month: 10, day: 15, precision: day}
    canonical_gregorian: {date: 1092-11-24, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Malikshāh in Shawwāl 485 AH at Baghdad, thirty-five days after Niẓām al-Mulk's assassination."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the death in 485 AH and the contemporary Niẓārī suspicions."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the standard biographical entry placing the death on 15 Shawwāl 485 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Malikshāh among the obituaries of 485 AH."
    people: [[malikshah-i-saljuq, subject]]
    tags: [seljuk, baghdad, nizam-al-mulk, ismaili, succession, ruler]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: battle-of-qatwan
    category: battle
    title_en: Battle of Qaṭwān — Saljūq Defeat by the Qara-Khitāy
    title_ar: معركة قطوان — هزيمة السلاجقة على يد القراخطاي
    title_fr: Bataille de Qaṭwān — défaite seldjoukide face aux Qara-Khitāy
    description_en: |
      The pitched battle on the Qaṭwān steppe north of Samarqand
      in which Sultan Sanjar of the Great Saljūqs, with the
      Qarakhānid khan Maḥmūd of Samarqand and a Khwārazmian
      contingent, was decisively defeated by the Buddhist-
      Mongolic Qara-Khitāy (Western Liao) under their
      Gürkhān Yelü Dashi. The Saljūq army of perhaps 100 000
      lost most of its strength in a single afternoon's
      fighting; Sanjar's wife and senior commanders were
      captured, and Sanjar fled westward across the Amu
      Darya to Tirmidh. Qaṭwān is the only major battlefield
      defeat of a Saljūq sultan in their history, and it
      removed Sunni Muslim authority from Transoxiana for the
      first time since the Sāmānid conquest two and a half
      centuries earlier — replacing it with non-Muslim Qara-
      Khitāy overlordship for the next eight decades. News of
      the defeat circulating westward, distorted by distance,
      generated the Crusader-era European legend of *Prester
      John*, the supposed Christian king of the East — Yelü
      Dashi was Buddhist, but contemporary Crusader chroniclers
      heard rumours of a Christian victory over the Muslims and
      named the victor accordingly.
    description_ar: |
      المعركة الميدانية في صحراء قطوان شمالي سمرقند، التي هزم
      فيها السلطان سنجر السلجوقي بصحبة القراخاني محمود صاحب
      سمرقند ومدد من خوارزم هزيمةً ساحقة على يد القراخطاي
      الوثنيين المغول-البوذيين بقيادة كوركانهم «يلو دشي».
      وفقدَ الجيش السلجوقي الذي قُدِّر بمئة ألف جلَّ قواه في
      عصر يوم واحد؛ وأُسرت زوجة سنجر وكبار قادته، وفرَّ
      سنجر غرباً عبر جيحون إلى ترمذ. ومعركة قطوان هي الهزيمة
      الميدانية الكبرى الوحيدة لسلطان سلجوقي في تاريخهم،
      وأخرجت السلطان السني المسلم من بلاد ما وراء النهر لأول
      مرة منذ الفتح الساماني قبل قرنين ونصف، وأبدلت من ذلك
      سيادةَ القراخطاي غير المسلمين على البلاد ثمانية عقود.
      وتسرَّب خبر الهزيمة إلى الغرب مشوَّهاً بفعل البعد فأنتج
      أسطورة «الملك يوحنا» (Prester John) في عصر الصليبيين —
      وهو ملك نصراني مزعوم في الشرق؛ وكان يلو دشي بوذياً، لكن
      مؤرخي الصليبيين سمعوا بهزيمة المسلمين فسموا منتصرها
      على هواهم.
    description_fr: |
      La bataille rangée dans la steppe de Qaṭwān au nord de
      Samarcande où le sultan Sanjar des Grands Seldjoukides,
      avec le khan qarakhānide Maḥmūd de Samarcande et un
      contingent khwārazmien, fut décisivement défait par les
      Qara-Khitāy bouddhistes-mongols (Liao occidentaux) sous
      leur Gürkhān Yelü Dashi. L'armée seldjoukide d'environ
      100 000 hommes perdit la majeure partie de ses forces en
      un seul après-midi de combat; l'épouse de Sanjar et ses
      commandants principaux furent capturés, et Sanjar
      s'enfuit vers l'ouest à travers l'Amou-Daria jusqu'à
      Tirmidh. Qaṭwān est l'unique défaite majeure sur le
      champ de bataille d'un sultan seldjoukide dans leur
      histoire, et elle ôta l'autorité musulmane sunnite de
      Transoxiane pour la première fois depuis la conquête
      sāmānide deux siècles et demi plus tôt — la remplaçant
      par la suzeraineté qara-khitāy non musulmane pendant les
      huit décennies suivantes. La nouvelle de la défaite
      circulant vers l'ouest, déformée par la distance, généra
      la légende européenne croisée du *Prêtre Jean*, supposé
      roi chrétien d'Orient — Yelü Dashi était bouddhiste, mais
      les chroniqueurs croisés contemporains entendirent
      rumeur d'une victoire chrétienne sur les musulmans et
      nommèrent le vainqueur en conséquence.
    canonical_hijri: {year: 536, month: 2, day: 5, precision: day}
    canonical_gregorian: {date: 1141-09-09, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the battle of Qaṭwān under 536 AH and details the magnitude of Sanjar's defeat and the loss of Transoxiana to the Qara-Khitāy."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the battle in 536 AH and the capture of Sanjar's wife."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the engagement under 536 AH."
    people: [[ahmad-sanjar, leader]]
    tags: [seljuk, qara-khitay, transoxiana, samarqand, sanjar, battle, prester-john]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-sanjar
    category: ruler_death
    title_en: Death of Sanjar — The Last Great Saljūq Sultan
    title_ar: وفاة سنجر — آخر سلاطين السلاجقة الكبار
    title_fr: Mort de Sanjar — le dernier grand sultan seldjoukide
    description_en: |
      Muʿizz al-Dīn Abū al-Ḥārith Aḥmad Sanjar ibn Malikshāh,
      last sultan of the Great Saljūqs and ruler of Khurāsān
      for more than half a century, died at Marw aged about
      seventy-two, three years after his release from a four-
      year captivity in the hands of the rebellious Ghuzz
      Turkmen tribes whom he had failed to subdue at the
      Battle of Marw in 548 AH. The Ghuzz had captured him
      after sacking Marw and Nīshāpūr, and held him while
      pillaging Khurāsān; his eventual escape (or release) in
      551 AH found his realm ruined, his treasury empty, and
      his nominal authority extending only to the immediate
      vicinity of Marw. Classical sources unanimously close
      the historical period of the Great Saljūq sultanate with
      his death — the western Saljūq sultanates of Iraq,
      Kirmān, and Rūm continued, but as autonomous principalities
      no longer recognising a single overlord. Khurāsān itself
      passed to the Khwārazmshāhs within a generation. Ibn
      al-Athīr, who lived through these years, gives a
      particularly long entry on Sanjar as the last bearer of
      Saljūq universalism.
    description_ar: |
      توفي السلطان معز الدين أبو الحارث أحمد سنجر بن ملكشاه —
      آخر سلاطين السلاجقة الكبار، وأمير خراسان أكثر من نصف
      قرن — بمرو عن نحو اثنتين وسبعين سنة، بعد ثلاث سنين من
      نجاته من أسر الغُزّ التركمان الذي امتد أربع سنوات، وقد
      عجز عن قمعهم في معركة مرو سنة ٥٤٨ هـ. وكان الغُزّ قد
      أسروه بعد نهب مرو ونيسابور واحتفظوا به وهم ينهبون
      خراسان؛ ولما خلص — أو أُطلق — سنة ٥٥١ هـ وجد بلاده
      خراباً وخزائنه مفلسة وسلطانه الاسمي لا يعدو محيط مرو
      المباشر. وتختم المصادر الكلاسيكية بوفاته العصرَ
      التاريخي للسلطنة السلجوقية الكبرى — وستبقى سلطنات
      السلاجقة في العراق وكرمان والروم، لكن بوصفها إمارات
      مستقلة لا تعترف بسيد واحد. وآلت خراسان نفسها إلى
      الخوارزم شاهية في جيل واحد. ويفرد ابن الأثير، الذي
      عاصر هذه السنين، فصلاً طويلاً لسنجر بوصفه آخر حملة
      الكلية السلجوقية.
    description_fr: |
      Muʿizz al-Dīn Abū al-Ḥārith Aḥmad Sanjar ibn Malikshāh,
      dernier sultan des Grands Seldjoukides et souverain du
      Khurāsān pendant plus d'un demi-siècle, mourut à Marw à
      l'âge d'environ soixante-douze ans, trois ans après sa
      libération d'une captivité de quatre années aux mains
      des tribus turkmènes Ghuzz rebelles qu'il n'avait pas
      réussi à soumettre à la bataille de Marw en 548 H. Les
      Ghuzz l'avaient capturé après avoir saccagé Marw et
      Nīshāpūr, et le détinrent pendant qu'ils pillaient le
      Khurāsān; sa fuite (ou sa libération) en 551 H le trouva
      avec un royaume ruiné, un trésor vide, et une autorité
      nominale ne s'étendant qu'aux environs immédiats de
      Marw. Les sources classiques closent unanimement la
      période historique du sultanat des Grands Seldjoukides
      avec sa mort — les sultanats seldjoukides occidentaux
      d'Irak, du Kirmān, et de Roum perduraient, mais comme
      principautés autonomes ne reconnaissant plus un seul
      suzerain. Le Khurāsān lui-même passa aux Khwārazm-Shāhs
      en une génération. Ibn al-Athīr, qui vécut ces années,
      consacre une entrée particulièrement longue à Sanjar
      comme dernier porteur de l'universalisme seldjoukide.
    canonical_hijri: {year: 552, month: 3, day: 14, precision: day}
    canonical_gregorian: {date: 1157-05-03, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
