# Wave 61 of curated event additions (2026-04-27).
# Seljuk and Ghaznavid rulers, the Sāmānids of Khurāsān-Transoxiana,
# and Sayf al-Dawla al-Ḥamdānī of Aleppo. The political-military
# scaffolding of the eastern Sunni Islamic world from the late
# 3rd AH century through the mid-6th AH century.
#
# Already in dataset (NOT duplicated here):
#   - assassination-of-nizam-al-mulk (485 AH)  — file 23
#   - battle-of-manzikert            (463 AH)  — file 14
#
# All events attested in classical Sunni sources — Ibn al-Athīr,
# al-Kāmil; Ibn Kathīr, al-Bidāya wa-l-Nihāya; al-Dhahabī, Tārīkh
# al-Islām and Siyar Aʿlām al-Nubalāʾ; Ibn Khallikān, Wafayāt
# al-Aʿyān. Where day-precision is firmly attested across multiple
# classical sources it is used; otherwise the entry is month- or
# year-precision per the date-uncertainty protocol. Trilingual
# en/ar/fr throughout.
#
# Sectarian framing: Seljuks and Ghaznavids are Sunni; the Sāmānids
# are Sunni (specifically Ḥanafī patrons of Persianate learning;
# the Sāmānid court is where Bukhārī's homeland-region matured a
# classical-Persian Sunni literary culture). The Ḥamdānids of
# Aleppo were Twelver Shia by adherence, but Sayf al-Dawla's
# court is shared cultural heritage — patron of al-Mutanabbī,
# al-Fārābī, the philologist Ibn Khālawayh — so the entry is
# framed factually around the political-cultural role rather than
# the doctrinal one.

events:
  # =========================================================================
  # SĀMĀNIDS — THE SUNNI PERSIANATE STATE THAT PRECEDED THE GHAZNAVIDS
  # =========================================================================

  - slug: death-of-ismail-ibn-ahmad-samani
    category: ruler_death
    title_en: Death of Ismāʿīl ibn Aḥmad — Founder of the Sāmānid State
    title_ar: وفاة إسماعيل بن أحمد الساماني — مؤسس الدولة السامانية
    title_fr: Mort d'Ismāʿīl ibn Aḥmad — fondateur de l'État sāmānide
    description_en: |
      Abū Ibrāhīm Ismāʿīl ibn Aḥmad al-Sāmānī, the amīr who unified
      the Sāmānid lands of Transoxiana and Khurāsān under a single
      Sunni Persianate authority and is considered the dynasty's
      effective founder, died at Bukhārā at about age sixty. His
      defeat of the last Ṣaffārid ruler ʿAmr ibn Layth at Balkh in
      287 AH had transferred Khurāsān from Ṣaffārid to Sāmānid
      rule by an ʿAbbāsid investiture, making Bukhārā — under
      Sāmānid patronage — the leading centre of Persian-language
      Sunni learning during the next century. The Sāmānid court
      patronised the historian al-Ṭabarī (in correspondence), the
      poet Rūdakī, and the philosopher Ibn Sīnā in his youth;
      under his successors the great Persian Quranic translation
      and tafsir-tradition would be commissioned, and Bukhārā
      would house the largest library in the eastern Islamic
      world before the Mongols. He was succeeded by his son
      Aḥmad ibn Ismāʿīl.
    description_ar: |
      توفي الأمير أبو إبراهيم إسماعيل بن أحمد الساماني — الأمير
      الذي وحَّد بلاد ما وراء النهر وخراسان تحت سلطة سنية فارسية
      واحدة ويُعدّ المؤسسَ الفعلي للدولة السامانية — ببخارى عن
      نحو ستين سنة. وكان قد هزم آخرَ أمراء الصفّاريّين عمرو بن
      الليث ببلخ سنة ٢٨٧ هـ، فآلت خراسان من الصفّاريين إلى
      السامانيّين بتقليد عبّاسي، فصارت بخارى — في رعاية الدولة
      السامانية — أكبر منارات العلم السني الفارسي في القرن التالي.
      ورعى البلاط الساماني المؤرخَ الطبري (مكاتبة)، والشاعر
      الرودكي، والفيلسوفَ ابن سينا في شبابه؛ وفي عهد خلفائه أُلِّف
      أوائل تراجم القرآن إلى الفارسية وكتب التفسير الفارسي،
      وحَوَت بخارى أكبرَ خزانة كتب في المشرق الإسلامي قبل المغول.
      وخلفه ابنه أحمد بن إسماعيل.
    description_fr: |
      Abū Ibrāhīm Ismāʿīl ibn Aḥmad al-Sāmānī, l'émir qui unifia
      les terres sāmānides de Transoxiane et du Khurāsān sous une
      autorité sunnite persane unique et qui est considéré comme
      le fondateur effectif de la dynastie, mourut à Boukhara à
      l'âge d'environ soixante ans. Sa défaite du dernier
      Ṣaffāride ʿAmr ibn Layth à Balkh en 287 H avait transféré le
      Khurāsān des Ṣaffārides aux Sāmānides par investiture
      ʿabbāsside, faisant de Boukhara — sous le mécénat sāmānide
      — le principal foyer de l'érudition sunnite persane durant
      le siècle suivant. La cour sāmānide patronna l'historien
      al-Ṭabarī (par correspondance), le poète Rūdakī, et le jeune
      philosophe Ibn Sīnā; sous ses successeurs furent commandés
      les premières traductions persanes du Coran et la tradition
      du tafsīr persan, et Boukhara abrita la plus grande
      bibliothèque du monde islamique oriental avant les Mongols.
      Il fut succédé par son fils Aḥmad ibn Ismāʿīl.
    canonical_hijri: {year: 295, month: 2, precision: month}
    canonical_gregorian: {date: 907-11-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Ismāʿīl al-Sāmānī under the events of 295 AH at Bukhārā."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the death in 295 AH and notes his unification of Khurāsān and Transoxiana."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Ismāʿīl among the obituaries of 295 AH."
    people: [[ismail-samani, subject]]
    tags: [samanid, bukhara, transoxiana, khurasan, persian, sunni, ruler]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-nasr-ii-samani
    category: ruler_death
    title_en: Death of Naṣr II al-Sāmānī — The Sāmānid Golden Age
    title_ar: وفاة نصر الثاني الساماني — العصر الذهبي للدولة السامانية
    title_fr: Mort de Naṣr II al-Sāmānī — l'âge d'or sāmānide
    description_en: |
      Abū al-Ḥasan Naṣr ibn Aḥmad ibn Ismāʿīl, eighth Sāmānid amīr
      and grandson of the dynasty's founder, died at Bukhārā after
      a thirty-year reign that classical sources unanimously
      describe as the political and cultural apogee of Sāmānid
      rule. His court patronised the poet-laureate Rūdakī, the
      poet Daqīqī (whose verse fragments would be folded into
      Firdawsī's *Shāhnāma* a generation later), and the early
      Sāmānid Persianate tradition that produced the first
      complete Persian translation of al-Ṭabarī's *Tafsīr* under
      his successor Manṣūr I. He had abdicated in 331 AH a few
      months before his death in favour of his son Nūḥ I after
      an Ismāʿīlī missionary controversy at his court — Sāmānid
      religious establishment had pressured him to renounce
      Ismāʿīlī sympathies. The Sāmānid state would persist
      for another half-century before falling to the Qarakhānid
      Turks, but its golden age effectively ended with him.
    description_ar: |
      توفي الأمير أبو الحسن نصر بن أحمد بن إسماعيل بن أحمد —
      ثامن أمراء بني سامان وحفيدُ مؤسس الدولة — ببخارى بعد ولاية
      امتدت ثلاثين سنة، تجمع المصادر الكلاسيكية على أنها كانت
      ذروة الدولة السامانية سياسياً وثقافياً. وقد رعى بلاطه
      الشاعرَ الكبير الرودكي، والشاعرَ الدقيقي (الذي ضمَّ الفردوسي
      شذرات شعره في «شاهنامة» بعد جيل)، وأنشأ التقليدَ السامانيَّ
      الأدبي الفارسي الذي أنتج في عهد خلفه منصور الأول أولَ ترجمة
      كاملة لتفسير الطبري إلى الفارسية. وقد تنازل عن الإمارة في
      سنة ٣٣١ هـ قبل أشهر من وفاته لابنه نوح الأول إثر فتنة
      دعاية إسماعيلية في بلاطه — ضغط عليه أهلُ السنة من العلماء
      ليرفض ميله إلى الإسماعيلية. وستبقى الدولة السامانية بعده
      نصف قرن قبل سقوطها على يد القراخانيين، لكن عصرها الذهبي
      انتهى بموته فعلاً.
    description_fr: |
      Abū al-Ḥasan Naṣr ibn Aḥmad ibn Ismāʿīl, huitième émir
      sāmānide et petit-fils du fondateur de la dynastie, mourut
      à Boukhara après un règne de trente ans que les sources
      classiques décrivent unanimement comme l'apogée politique
      et culturel de la domination sāmānide. Sa cour patronna le
      poète-lauréat Rūdakī, le poète Daqīqī (dont les fragments
      seraient absorbés dans le *Shāhnāma* de Firdawsī une
      génération plus tard), et la tradition persane primitive
      sāmānide qui produisit, sous son successeur Manṣūr I, la
      première traduction persane intégrale du *Tafsīr* d'al-Ṭabarī.
      Il avait abdiqué en 331 H quelques mois avant sa mort en
      faveur de son fils Nūḥ I à la suite d'une polémique liée à
      un missionnaire ismaélien à sa cour — l'establishment
      religieux sunnite l'avait pressé de renoncer à ses
      sympathies ismaéliennes. L'État sāmānide subsisterait encore
      un demi-siècle avant de tomber aux mains des Qarakhānides
      turcs, mais son âge d'or s'acheva en pratique avec lui.
    canonical_hijri: {year: 331, precision: year}
    canonical_gregorian: {date: 943-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Naṣr ibn Aḥmad in 331 AH and details the Ismāʿīlī controversy at his court."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the death in 331 AH."
      - source_key: dhahabi_siyar
        notes: "al-Dhahabī's Siyar Aʿlām al-Nubalāʾ places the death in 331 AH and gives biographical detail."
    people: [[nasr-ii-samani, subject]]
    tags: [samanid, bukhara, persian, sunni, rudaki, golden-age, ruler]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # ḤAMDĀNID ALEPPO — SAYF AL-DAWLA AS POLITICAL-CULTURAL FIGURE
  # =========================================================================

  - slug: death-of-sayf-al-dawla-al-hamdani
    category: ruler_death
    title_en: Death of Sayf al-Dawla al-Ḥamdānī — Patron of al-Mutanabbī and the Aleppine Court
    title_ar: وفاة سيف الدولة الحمداني — راعي المتنبي وبلاط حلب
    title_fr: Mort de Sayf al-Dawla al-Ḥamdānī — protecteur d'al-Mutanabbī et de la cour d'Alep
    description_en: |
      Sayf al-Dawla Abū al-Ḥasan ʿAlī ibn ʿAbd Allāh al-Ḥamdānī,
      Ḥamdānid amīr of Aleppo and northern Syria, died at Aleppo
      after years of debilitating illness, aged fifty-one. His
      twenty-year emirate was defined by a sustained ribāṭ-style
      frontier war with the Byzantine empire — annual campaigns
      across the Cilician marches that included a victory at
      Marʿash (339 AH) and the loss of Aleppo to Nicephorus
      Phocas in 351 AH, an event from which the Ḥamdānid power
      never fully recovered. The classical sources record him
      above all as the convening patron of the most dazzling Arab
      literary court since the early Abbasid era: al-Mutanabbī
      composed his greatest panegyric and lament cycle for him,
      the philologist Ibn Khālawayh refined his lexicographical
      work at his expense, and the philosopher al-Fārābī spent
      his last years in Aleppo under his protection. The
      Ḥamdānids were Twelver Shia by adherence; the Aleppine
      court he convened, however, drew Sunni and Shia,
      Christian and Muslim, Greek translators and Arab poets
      together, and is remembered in Sunni biographical
      tradition (Ibn Khallikān, Ibn al-Athīr) for that cultural
      role rather than for sectarian framing.
    description_ar: |
      توفي الأمير سيف الدولة أبو الحسن علي بن عبد الله
      الحمداني — أمير حلب وشمالي الشام من بني حمدان — بحلب بعد
      سنوات من المرض المُقعِد وله إحدى وخمسون سنة. وكانت إمارته
      التي امتدت عشرين سنة موسومة بحرب ربط ثغرية مستدامة على
      الجبهة البيزنطية — حملات سنوية عبر مرعش الكليكية، فيها
      انتصاره بمعركة مرعش سنة ٣٣٩ هـ ثم سقوطُ حلب في يد نقفور
      فوكاس سنة ٣٥١ هـ، حادثةٌ لم تستعد منها الدولة الحمدانية
      كامل قواها. وتسجِّل المصادر الكلاسيكية أنه قبل ذلك كله
      كان جامعَ أبهى البلاطات الأدبية العربية منذ أوائل العصر
      العباسي: نظم له المتنبي أعظم مدائحه ورثاءه، وسنَّ ابن
      خالويه تنقيحاته اللغوية على نفقته، وأمضى أبو نصر الفارابي
      آخر سنواته بحلب في حمايته. وكان بنو حمدان شيعة إمامية،
      لكن البلاطَ الحلبيَّ الذي أقامه جمع أهل السنة والشيعة،
      والنصارى والمسلمين، والمترجمين الإغريق والشعراء العرب،
      ويذكره أهلُ التراجم السنية (ابن خلكان، ابن الأثير) بهذا
      الدور الثقافي قبل كل تصنيف مذهبي.
    description_fr: |
      Sayf al-Dawla Abū al-Ḥasan ʿAlī ibn ʿAbd Allāh al-Ḥamdānī,
      émir hamdanide d'Alep et de Syrie du Nord, mourut à Alep
      après des années de maladie débilitante, à l'âge de
      cinquante et un ans. Son émirat de vingt ans fut défini par
      une guerre frontalière soutenue de type *ribāṭ* contre
      l'empire byzantin — campagnes annuelles à travers les
      marches ciliciennes incluant une victoire à Marʿash (339 H)
      et la perte d'Alep à Nicéphore Phocas en 351 H, événement
      dont le pouvoir hamdanide ne se releva jamais entièrement.
      Les sources classiques le retiennent surtout comme le
      mécène réunissant la cour littéraire arabe la plus
      éblouissante depuis le début de l'époque abbasside :
      al-Mutanabbī composa pour lui ses plus grands panégyriques
      et thrénodies, le philologue Ibn Khālawayh affina son
      œuvre lexicographique à ses frais, et le philosophe
      al-Fārābī passa ses dernières années à Alep sous sa
      protection. Les Hamdanides étaient duodécimains chiites
      d'adhésion; la cour alépine qu'il convoqua rassembla
      cependant sunnites et chiites, chrétiens et musulmans,
      traducteurs grecs et poètes arabes, et la tradition
      biographique sunnite (Ibn Khallikān, Ibn al-Athīr) le
      retient pour ce rôle culturel avant tout cadre confessionnel.
    canonical_hijri: {year: 356, month: 2, day: 25, precision: day}
    canonical_gregorian: {date: 967-02-14, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Sayf al-Dawla under the events of 356 AH at Aleppo."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the death in 356 AH and gives biographical detail on the Ḥamdānid emirate."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's biographical entry on Sayf al-Dawla places the death on 25 Ṣafar 356 AH at Aleppo and details the literary court."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Sayf al-Dawla among the obituaries of 356 AH."
    people: [[sayf-al-dawla-hamdani, subject]]
    tags: [hamdanid, aleppo, syria, mutanabbi, farabi, byzantine-frontier, ruler]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # GHAZNAVIDS — FROM SEBÜKTIGĪN TO MASʿŪD I
  # =========================================================================

  - slug: death-of-sebuktigin
    category: ruler_death
    title_en: Death of Sebüktigīn — Founder of the Ghaznavid Dynasty
    title_ar: وفاة سبكتكين — مؤسس الدولة الغزنوية
    title_fr: Mort de Sebüktigīn — fondateur de la dynastie ghaznavide
    description_en: |
      Abū Manṣūr Sebüktigīn — Turkish ghulām commander who had
      risen through Sāmānid military service to become governor
      of Ghazna in 366 AH and effective founder of the Ghaznavid
      polity — died on the road back from Balkh after a campaign
      to enforce Sāmānid suzerainty in eastern Khurāsān, aged
      about fifty-six. He had received the formal investiture
      of Khurāsān from the Sāmānid amīr Nūḥ II in 384 AH on
      condition of suppressing the rebellious Sāmānid general
      Fāʾiq, and his rule had extended Ghazna's authority east
      to Peshawar (where he defeated Jaipāl, the Hindu Shahi
      ruler) and west to the Sāmānid heartland. His son Maḥmūd
      succeeded him after a brief succession contest with his
      brother Ismāʿīl. The Ghaznavid state Sebüktigīn founded —
      Sunni Ḥanafī, Persianate in court culture, Turkish-Iranian
      in military composition — would under Maḥmūd become the
      dominant political force in eastern Iran and northern
      India for thirty years.
    description_ar: |
      توفي الأمير أبو منصور سبكتكين — المملوك التركي الذي ارتقى
      في الجيش الساماني حتى وُلِّي غزنة سنة ٣٦٦ هـ، وكان المؤسسَ
      الفعلي للدولة الغزنوية — في طريق عودته من بلخ بعد حملة
      أعاد فيها الطاعة السامانية إلى شرق خراسان، وله نحو ست
      وخمسون سنة. وكان قد تلقى التقليد الرسمي على خراسان من
      الأمير الساماني نوح الثاني سنة ٣٨٤ هـ على أن يقمع تمرّد
      القائد الساماني فائق، فوسَّع سلطان غزنة شرقاً إلى بيشاور
      (هزم بها جيپال أمير الراجوات الهنديين «الشاهي» الهندوس)
      وغرباً إلى صلب البلاد السامانية. وخلفه ابنه محمود بعد
      نزاع وراثي وجيز مع أخيه إسماعيل. وستصير الدولة الغزنوية
      التي أسسها سبكتكين — سنية حنفية، فارسية البلاط، تركية
      إيرانية الجيش — في عهد محمود أكبر القوى السياسية في
      شرقي إيران وشمالي الهند ثلاثين سنة.
    description_fr: |
      Abū Manṣūr Sebüktigīn — commandant ghulām turc qui s'était
      hissé dans le service militaire sāmānide jusqu'à devenir
      gouverneur de Ghazna en 366 H et fondateur effectif de
      l'État ghaznavide — mourut sur le chemin du retour de
      Balkh après une campagne destinée à imposer la suzeraineté
      sāmānide dans l'est du Khurāsān, à l'âge d'environ
      cinquante-six ans. Il avait reçu l'investiture formelle du
      Khurāsān de l'émir sāmānide Nūḥ II en 384 H à condition
      d'écraser le général sāmānide rebelle Fāʾiq, et son règne
      avait étendu l'autorité de Ghazna vers l'est jusqu'à
      Peshawar (où il défit Jaipāl, le souverain hindou des
      Shāhī) et vers l'ouest jusqu'au cœur des terres sāmānides.
      Son fils Maḥmūd lui succéda après une brève contestation
      successorale avec son frère Ismāʿīl. L'État ghaznavide
      fondé par Sebüktigīn — sunnite ḥanafī, persanisé à la cour,
      turco-iranien dans sa composition militaire — deviendrait
      sous Maḥmūd la principale force politique de l'Iran
      oriental et du nord de l'Inde pendant trente ans.
    canonical_hijri: {year: 387, month: 8, precision: month}
    canonical_gregorian: {date: 997-08-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Sebüktigīn under the events of 387 AH on the road from Balkh and details the succession contest between Maḥmūd and Ismāʿīl."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the death in 387 AH and the succession of Maḥmūd."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Sebüktigīn among the obituaries of 387 AH."
    people: [[sebuktigin, subject]]
    tags: [ghaznavid, ghazna, khurasan, turkish, sunni, dynastic_founding, ruler]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-mahmud-of-ghazna
    category: ruler_death
    title_en: Death of Maḥmūd of Ghazna — The Conqueror of India
    title_ar: وفاة محمود الغزنوي — فاتح الهند
    title_fr: Mort de Maḥmūd de Ghazna — le conquérant de l'Inde
    description_en: |
      Yamīn al-Dawla Maḥmūd ibn Sebüktigīn, the Ghaznavid sultan
      whose thirty-year reign made Ghazna the wealthiest court
      in the eastern Islamic world, died at Ghazna at about
      sixty after a long illness. The classical sources credit
      him with seventeen expeditions across the Hindu Kush into
      northern India between 391 AH and 416 AH — the most famous
      of which, the raid on Somnath in 416 AH, captured the
      temple's treasure and shattered its central icon. His
      destruction of the Sāmānid state in 389 AH had transferred
      Khurāsān to direct Ghaznavid rule; his coinage as
      *Yamīn al-Dawla* under ʿAbbāsid investiture made him the
      first Sunni Turkic sultan recognised by Baghdad. His
      court patronised the poet Firdawsī (whose *Shāhnāma*
      was completed for him in 400 AH), the polymath al-Bīrūnī
      (whose *Taḥqīq mā li-l-Hind* was researched during the
      Indian campaigns), and built Ghazna into a centre of
      Persian Sunni learning that the Seljuks would inherit a
      decade after his death. He was succeeded briefly by his
      son Muḥammad before Masʿūd I seized the throne.
    description_ar: |
      توفي السلطان يمين الدولة محمود بن سبكتكين — السلطان الغزنوي
      الذي جعلت ولايتُه التي امتدت ثلاثين سنة من غزنة أغنى بلاط
      في المشرق الإسلامي — بغزنة عن نحو ستين سنة بعد علة طويلة.
      وتنسب إليه المصادرُ الكلاسيكية سبع عشرة غزوة عبر هندوكوش
      إلى شمالي الهند بين ٣٩١ و ٤١٦ هـ، أشهرها غزوته «سومنات»
      سنة ٤١٦ هـ التي فتح بها معبدها وأخذ ذخائرَه وكسر صنمَه
      المركزي. وكان قد دكّ الدولة السامانية سنة ٣٨٩ هـ فآلت
      خراسان إلى الحكم الغزنوي المباشر؛ وضرب اسمَه على السكة
      «يمين الدولة» بتقليد عبّاسي، فكان أولَ سلطان تركي سني
      اعترفت به بغداد. ورعى بلاطه الشاعرَ الفردوسي (الذي أكمل
      له «شاهنامة» سنة ٤٠٠ هـ)، والعالم الموسوعي البيروني
      (الذي حقق «تحقيق ما للهند» إبان حملاته الهندية)، وأقام
      من غزنة مركزاً لعلوم الفرس السنية ورثه السلاجقة بعد
      موته بعقد. وخلفه قليلاً ابنه محمد قبل أن يتغلب عليه
      أخوه مسعود الأول.
    description_fr: |
      Yamīn al-Dawla Maḥmūd ibn Sebüktigīn, le sultan ghaznavide
      dont le règne de trente ans fit de Ghazna la cour la plus
      riche du monde islamique oriental, mourut à Ghazna à
      l'âge d'environ soixante ans après une longue maladie.
      Les sources classiques lui attribuent dix-sept expéditions
      à travers l'Hindou-Kouch jusqu'au nord de l'Inde entre
      391 H et 416 H — la plus célèbre étant le raid sur Somnāth
      en 416 H, qui captura le trésor du temple et brisa son
      idole centrale. Sa destruction de l'État sāmānide en 389 H
      avait transféré le Khurāsān à la souveraineté ghaznavide
      directe; sa monnaie comme *Yamīn al-Dawla* sous investiture
      ʿabbāsside fit de lui le premier sultan turc sunnite
      reconnu par Bagdad. Sa cour patronna le poète Firdawsī
      (dont le *Shāhnāma* fut achevé pour lui en 400 H), le
      polymathe al-Bīrūnī (qui mena ses recherches du *Taḥqīq mā
      li-l-Hind* durant les campagnes indiennes), et fit de
      Ghazna un foyer d'érudition persane sunnite dont les
      Seljoukides hériteraient une décennie après sa mort. Il
      fut succédé brièvement par son fils Muḥammad avant que
      Masʿūd I ne s'empare du trône.
    canonical_hijri: {year: 421, month: 4, day: 23, precision: day}
    canonical_gregorian: {date: 1030-05-06, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Maḥmūd in 421 AH at Ghazna and details the succession contest of Muḥammad and Masʿūd."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the death of Maḥmūd in 421 AH on 23 Rabīʿ al-Thānī."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the standard biographical entry placing the death on 23 Rabīʿ al-Thānī 421 AH and detailing the Indian campaigns."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Maḥmūd among the obituaries of 421 AH."
    people: [[mahmud-of-ghazna, subject]]
