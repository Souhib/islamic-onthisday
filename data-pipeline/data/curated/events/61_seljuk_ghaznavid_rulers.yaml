  - slug: death-of-masud-i-of-ghazna
    category: ruler_death
    title_en: Death of Masʿūd I of Ghazna — End of the Ghaznavid Empire in Iran
    title_ar: مقتل مسعود الأول الغزنوي — نهاية الدولة الغزنوية في المشرق الإيراني
    title_fr: Mort de Masʿūd I de Ghazna — fin de la domination ghaznavide en Iran
    description_en: |
      Shihāb al-Dawla Masʿūd ibn Maḥmūd, second great Ghaznavid
      sultan, was deposed and killed by his own guard at the
      fortress of Gīrī (in the Marigala pass east of the Indus)
      after eleven years of rule that ended with the disastrous
      defeat to the Seljuks at Dandanaqān a year earlier. He had
      seized the throne in 421 AH from his brother Muḥammad,
      whom he blinded and confined; but his reign was consumed
      by the failed defence of Khurāsān against the rising
      Seljuks. After Dandanaqān (Ramaḍān 431 AH) he withdrew
      across the Hindu Kush toward Lahore intending to use the
      Indian provinces as the base for a counter-attack, but his
      troops mutinied at Marigala, deposed him, and proclaimed
      his blinded brother Muḥammad as sultan. Masʿūd was
      murdered shortly afterwards. The Ghaznavid state survived
      another century and a half, but as a shrunken Indo-Iranian
      power based at Lahore — Khurāsān had passed irrevocably to
      the Seljuks.
    description_ar: |
      خُلع السلطان شهاب الدولة مسعود بن محمود — ثاني سلاطين بني
      غزنة الكبار — وقُتل على يد حرسه في حصن «جيري» (في فجّ
      مارگلا شرقي السند) بعد ولاية إحدى عشرة سنة كانت قد انتهت
      بهزيمته الفادحة على يد السلاجقة بدندانقان قبل سنة. وكان قد
      استولى على العرش سنة ٤٢١ هـ من أخيه محمد، فسمل عينيه
      وحبسه؛ لكنه استنفد ولايته كلها في الدفاع الفاشل عن خراسان
      أمام صعود السلاجقة. وبعد دندانقان (رمضان ٤٣١ هـ) انسحب
      عبر هندوكوش نحو لاهور قاصداً اتخاذَ المقاطعات الهندية
      قاعدةً للهجوم المضاد، لكنّ جنودَه تمردوا عليه بمارگلا
      وخلعوه ونادوا بأخيه محمد المسمول سلطاناً، فقُتل مسعود
      بعد ذلك بقليل. وستبقى الدولة الغزنوية بعد ذلك قرناً
      ونصفاً، لكنها قوة هند-إيرانية ضامرة قاعدتها لاهور — وآلت
      خراسان نهائياً إلى السلاجقة.
    description_fr: |
      Shihāb al-Dawla Masʿūd ibn Maḥmūd, deuxième grand sultan
      ghaznavide, fut déposé et tué par sa propre garde à la
      forteresse de Gīrī (dans le défilé de Margalla, à l'est de
      l'Indus) après onze années de règne qui s'achevèrent par
      la défaite désastreuse face aux Seljoukides à Dandanaqān
      un an plus tôt. Il avait pris le trône en 421 H à son frère
      Muḥammad, qu'il aveugla et emprisonna; mais son règne fut
      consumé par la défense ratée du Khurāsān face à la montée
      seldjoukide. Après Dandanaqān (Ramaḍān 431 H), il se retira
      à travers l'Hindou-Kouch vers Lahore avec l'intention
      d'utiliser les provinces indiennes comme base d'une
      contre-attaque, mais ses troupes se mutinèrent à Margalla,
      le déposèrent, et proclamèrent sultan son frère aveugle
      Muḥammad; Masʿūd fut assassiné peu après. L'État ghaznavide
      survivrait encore un siècle et demi, mais comme puissance
      indo-iranienne réduite basée à Lahore — le Khurāsān était
      passé irrévocablement aux Seljoukides.
    canonical_hijri: {year: 432, month: 1, precision: month}
    canonical_gregorian: {date: 1040-09-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the deposition and killing of Masʿūd in early 432 AH at Gīrī after the Marigala mutiny."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the death in 432 AH and describes the mutiny and Muḥammad's restoration."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters Masʿūd among the obituaries of 432 AH."
    people: [[masud-i-of-ghazna, subject]]
    tags: [ghaznavid, ghazna, khurasan, india, deposition, ruler]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # SELJUK FOUNDING — DANDANAQĀN AND THE ACCESSION OF ṬUGHRIL
  # =========================================================================

  - slug: battle-of-dandanaqan
    category: battle
    title_en: Battle of Dandanaqān — The Seljuk Conquest of Khurāsān
    title_ar: معركة دندانقان — فتح السلاجقة لخراسان
    title_fr: Bataille de Dandanaqān — la conquête seldjoukide du Khurāsān
    description_en: |
      The pitched battle on the steppe between Sarakhs and Marw
      in which the Saljūq Turkmen brothers Ṭughril Beg and
      Chaghrī Beg, leading some 16 000 mounted nomad warriors,
      decisively defeated the Ghaznavid army of Sultan Masʿūd I,
      which fielded perhaps 50 000 troops including the
      Indian-elephant corps that had won Maḥmūd's wars. The
      Ghaznavid army, exhausted by a forced march through
      waterless terrain and harassed continuously by Saljūq
      mounted archers in the days preceding the engagement,
      collapsed once the elephant corps panicked and broke its
      own lines; Masʿūd fled the field toward Ghazna with a
      handful of survivors. The classical sources are unanimous
      that this single battle transferred Khurāsān — the
      eastern Iranian heartland that had carried Sāmānid and
      Ghaznavid Sunni rule for a century — to Saljūq
      sovereignty, and it conventionally marks the foundation
      of the Great Saljūq sultanate. Ṭughril Beg entered
      Nīshāpūr days later as sultan; the *khuṭba* would be
      read in his name from there to Iraq within fifteen years.
    description_ar: |
      المعركة الميدانية في صحراء بين سرخس ومرو، التي هزم بها
      الأخوان السلجوقيان طغرل بك وجغري بك على رأس نحو ستة عشر
      ألف فارس من أتراك السلجوقية الجيشَ الغزنوي للسلطان مسعود
      الأول وقوامه نحو خمسين ألفاً بمن فيهم فيلة الهند التي
      نصرت محمود في حروبه. وقد أُنهك الجيش الغزنوي بمسير قاسٍ
      عبر برٍّ بلا ماء، وضايقه رماة السلجوقية المركوبون أياماً
      متتالية قبل اللقاء، فلما ذُعرت الفِيَلة وكسرت صفوفها
      انهار الجيش، وفرّ مسعود من الموقع نحو غزنة في حفنة من
      الناجين. وتجمع المصادر الكلاسيكية على أن هذه المعركة
      الواحدة نقلت خراسان — قلبَ المشرق الإيراني الذي حمل الحكم
      السني السامانيَّ ثم الغزنوي قرناً — إلى سلطان السلاجقة،
      وهي تأرَّخ تقليدياً بداية السلطنة السلجوقية الكبرى. ودخل
      طغرل بك نيسابور بعد أيام سلطاناً، وسيُذكَر اسمه في الخطبة
      منها إلى العراق في خمس عشرة سنة.
    description_fr: |
      La bataille rangée dans la steppe entre Sarakhs et Marw où
      les frères seldjoukides turkmènes Ṭughril Beg et Chaghrī
      Beg, à la tête de quelque 16 000 cavaliers nomades,
      défirent décisivement l'armée ghaznavide du sultan Masʿūd I,
      qui alignait peut-être 50 000 hommes incluant le corps
      d'éléphants indiens qui avait gagné les guerres de Maḥmūd.
      L'armée ghaznavide, épuisée par une marche forcée à travers
      un terrain sans eau et harcelée continuellement par les
      archers montés seldjoukides les jours précédant
      l'engagement, s'effondra dès que le corps d'éléphants prit
      panique et brisa ses propres rangs; Masʿūd s'enfuit du
      champ vers Ghazna avec une poignée de survivants. Les
      sources classiques sont unanimes : cette unique bataille
      transféra le Khurāsān — le cœur iranien oriental qui avait
      porté la domination sunnite sāmānide puis ghaznavide
      pendant un siècle — à la souveraineté seldjoukide, et elle
      marque conventionnellement la fondation du sultanat des
      Grands Seldjoukides. Ṭughril Beg entra à Nīshāpūr quelques
      jours plus tard comme sultan; la *khuṭba* serait prononcée
      en son nom de là à l'Irak dans les quinze ans.
    canonical_hijri: {year: 431, month: 9, day: 8, precision: day}
    canonical_gregorian: {date: 1040-05-29, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr describes the battle of Dandanaqān in detail under 431 AH and the entry of Ṭughril Beg into Nīshāpūr."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the battle in 431 AH and the collapse of the Ghaznavid army."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the engagement under 431 AH and notes its consequence — the transfer of Khurāsān to Saljūq rule."
    people: [[tughril-beg, leader], [masud-i-of-ghazna, leader]]
    tags: [seljuk, ghaznavid, khurasan, dandanaqan, battle, dynastic_founding, turkmen]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: tughril-proclaims-saljuq-sultanate-at-nishapur
    category: dynastic_founding
    title_en: Ṭughril Beg Proclaimed Saljūq Sultan at Nīshāpūr
    title_ar: طغرل بك يبايَع سلطاناً للسلاجقة بنيسابور
    title_fr: Ṭughril Beg proclamé sultan seldjoukide à Nīshāpūr
    description_en: |
      Ṭughril Beg ibn Mīkāʾīl entered Nīshāpūr — the metropolis
      of Khurāsān and the seat of its religious-juridical
      establishment — and was proclaimed sultan from the minbar
      of the city's congregational mosque, with a *khuṭba*
      pronounced in his name as ruler of the Saljūq Turkmen
      after the Ghaznavid garrison evacuated. Classical sources
      place the proclamation at Rabīʿ al-Thānī 429 AH, two years
      before Dandanaqān and at the moment when Saljūq forces
      had already taken effective control of much of Khurāsān
      from the Ghaznavids; the formal investiture from Baghdad
      would not arrive until after the decisive victory at
      Dandanaqān. The choice of Nīshāpūr — rather than the
      Saljūq nomad camps — and the city's juridical
      establishment's acceptance of the new dynasty (the
      Shāfiʿī jurist Abū Sahl al-Bastāmī officiated, by some
      accounts) signalled the Saljūqs' formal embrace of
      Sunni-Ḥanafī patronage and made Nīshāpūr the early
      Saljūq capital. From this moment until Ṭughril's entry
      into Baghdad in 447 AH the Saljūq state expanded
      continuously across the Iranian plateau.
    description_ar: |
      دخل طغرل بك بن ميكائيل نيسابور — حاضرة خراسان ومستقَر
      علمائها وفقهائها — فبويع سلطاناً من فوق منبر الجامع
      الكبير وخُطب باسمه أميراً للسلاجقة بعد أن جلَتْ عنها
      حامية الغزنويين. وتضع المصادر الكلاسيكية البيعة في ربيع
      الآخر سنة ٤٢٩ هـ، أي قبل دندانقان بسنتين، وفي اللحظة
      التي كانت قد آلت فيها بيعة المنطقة إلى السلاجقة فعلاً
      من الغزنويين؛ ولم يصلهم التقليد الرسمي من بغداد إلا بعد
      انتصار دندانقان الفاصل. واختيار نيسابور — بدلاً من
      مضارب السلاجقة الرحَّل — وقبول علماء المدينة بالدولة
      الجديدة (تذكر بعض الروايات أن الفقيه الشافعي أبا سهل
      البسطامي تولى الإجراء) أعلَن انضمام السلاجقة الرسمي
      إلى الرعاية السنية الحنفية وجعل نيسابور عاصمة السلاجقة
      الأولى. ومن هذه اللحظة إلى دخول طغرل بغداد سنة ٤٤٧ هـ
      توسعت الدولة السلجوقية عبر هضبة إيران توسعاً متصلاً.
    description_fr: |
      Ṭughril Beg ibn Mīkāʾīl entra à Nīshāpūr — métropole du
      Khurāsān et siège de son établissement religieux et
      juridique — et fut proclamé sultan depuis le minbar de la
      mosquée congrégationnelle, une *khuṭba* prononcée en son
      nom comme souverain des Turkmènes seldjoukides après
      l'évacuation de la garnison ghaznavide. Les sources
      classiques placent la proclamation en Rabīʿ al-Thānī 429 H,
      deux ans avant Dandanaqān et au moment où les forces
      seldjoukides avaient déjà pris le contrôle effectif d'une
      grande partie du Khurāsān aux Ghaznavides; l'investiture
      formelle de Bagdad ne parviendrait qu'après la victoire
      décisive de Dandanaqān. Le choix de Nīshāpūr — plutôt que
      les campements nomades seldjoukides — et l'acceptation par
      l'establishment juridique de la ville de la nouvelle
      dynastie (selon certains récits le juriste shāfiʿite Abū
      Sahl al-Bastāmī officia) signala l'adhésion formelle des
      Seldjoukides au mécénat sunnite-ḥanafī et fit de Nīshāpūr
      la première capitale seldjoukide. De ce moment jusqu'à
      l'entrée de Ṭughril à Bagdad en 447 H, l'État seldjoukide
      s'étendit continûment à travers le plateau iranien.
    canonical_hijri: {year: 429, month: 4, precision: month}
    canonical_gregorian: {date: 1038-01-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the Saljūq entry into Nīshāpūr and Ṭughril's proclamation as sultan in 429 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms the proclamation at Nīshāpūr in 429 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the proclamation under 429 AH."
    people: [[tughril-beg, subject]]
    tags: [seljuk, nishapur, khurasan, dynastic_founding, turkmen, sunni]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # SELJUK SULTANS — DEATHS OF ṬUGHRIL, ALP ARSLĀN, MALIKSHĀH, SANJAR
  # =========================================================================

  - slug: death-of-tughril-beg
    category: ruler_death
    title_en: Death of Ṭughril Beg — First Saljūq Sultan
    title_ar: وفاة طغرل بك — أول سلاطين السلاجقة الكبار
    title_fr: Mort de Ṭughril Beg — premier sultan seldjoukide
    description_en: |
      Rukn al-Dīn Abū Ṭālib Ṭughril Beg ibn Mīkāʾīl, founder
      and first sultan of the Great Saljūq state, died at Rayy
      after a thirty-five-year ascent that had brought a
      Turkmen nomad confederation from the steppes of
      Khwārazm to mastery of the Iranian plateau and ʿAbbāsid
      Iraq. He was about seventy. His decisive moments had
      been Dandanaqān (431 AH), which transferred Khurāsān
      from the Ghaznavids; his entry into Baghdad in 447 AH,
      where the ʿAbbāsid caliph al-Qāʾim invested him as
      *Sultān al-Mashriq wa-l-Maghrib* and ended Buwayhid Shia
      tutelage of the caliphate; and his suppression of the
      Buwayhid restoration of al-Basāsīrī in 451 AH. He died
      childless and was succeeded by his nephew Alp Arslān
      after a brief succession contest with Sulaymān ibn
      Chaghrī. His vizier ʿAmīd al-Mulk al-Kundurī had ruled
      effectively in his name; al-Kundurī was executed by
      Alp Arslān's vizier Niẓām al-Mulk shortly after the
      succession.
    description_ar: |
      توفي السلطان ركن الدين أبو طالب طغرل بك بن ميكائيل —
      المؤسس وأول سلاطين السلاجقة الكبار — بمدينة الري بعد
      صعود امتد خمساً وثلاثين سنة، نقل اتحاداً تركمانياً
      رحَّالاً من سهول خوارزم إلى السيادة على هضبة إيران
      وعراق العباسيين. وله نحو سبعون سنة. وكانت لحظات تحوُّله
      الكبرى: دندانقان (٤٣١ هـ) التي نقلت خراسان من
      الغزنويين؛ ودخوله بغداد سنة ٤٤٧ هـ حيث فوَّضه الخليفة
      العباسي القائم «سلطاناً للمشرق والمغرب» وأنهى الوصاية
      البويهية الشيعية على الخلافة؛ وقمعه إعادة البويهيين
      على يد البساسيري سنة ٤٥١ هـ. ومات لا عقب له، فخلفه
      ابن أخيه ألب أرسلان بعد نزاع وراثي وجيز مع سليمان
      بن جغري. وكان وزيره عميد الملك الكندري قد ولي الأمر
      فعلاً باسمه؛ فقتله نظام الملك وزير ألب أرسلان بعد
      التولية بقليل.
    description_fr: |
      Rukn al-Dīn Abū Ṭālib Ṭughril Beg ibn Mīkāʾīl, fondateur
      et premier sultan de l'État des Grands Seldjoukides,
      mourut à Rayy après une ascension de trente-cinq ans qui
      avait porté une confédération nomade turkmène des steppes
      du Khwārazm à la maîtrise du plateau iranien et de l'Irak
      ʿabbāsside. Il avait environ soixante-dix ans. Ses moments
      décisifs avaient été Dandanaqān (431 H), qui transféra le
      Khurāsān des Ghaznavides; son entrée à Bagdad en 447 H, où
      le calife ʿabbāsside al-Qāʾim l'investit comme *Sulṭān
      al-Mashriq wa-l-Maghrib* et mit fin à la tutelle chiite
      bouyide sur le califat; et sa répression de la restauration
      bouyide d'al-Basāsīrī en 451 H. Il mourut sans descendance
      et fut succédé par son neveu Alp Arslān après une brève
      contestation successorale avec Sulaymān ibn Chaghrī. Son
      vizir ʿAmīd al-Mulk al-Kundurī avait régné effectivement
      en son nom; al-Kundurī fut exécuté par Niẓām al-Mulk, vizir
      d'Alp Arslān, peu après la succession.
    canonical_hijri: {year: 455, month: 9, day: 8, precision: day}
    canonical_gregorian: {date: 1063-09-10, precision: day, method: tabular_conversion}
