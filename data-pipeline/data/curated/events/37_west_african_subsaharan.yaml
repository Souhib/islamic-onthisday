  - slug: death-of-ahmadu-lobbo
    category: ruler
    title_en: Death of Aḥmadu Lobbo — Founder of the Massina Caliphate
    title_ar: وفاة أحمد لبو — مؤسس خلافة الماسينا
    title_fr: Mort d'Aḥmadu Lobbo — fondateur du califat de la Massina
    description_en: |
      Shaykh Aḥmadu Lobbo (Seku Aamadu) — Fulbe Mālikī jurist
      and Qādirī Sufi disciple of the al-Kuntī school of Tinbuktu,
      leader of the Fulani jihad of 1233 AH / 1818 CE in the
      Inner Niger Delta of present-day Mali, and founder of the
      Massina Caliphate (the *Diina* of Hamdullāhi) which united
      Djenné, Massina, and Tombouctou under a single Sunni
      theocratic government from 1234 AH / 1819 CE — died at
      Hamdullāhi on 13 Rabīʿ II 1261 AH / 20 April 1845 CE. He
      was about 69. His state was organised around a Council of
      Forty *ʿulamāʾ* implementing strict Mālikī law, around six
      hundred Quranic schools, a pastoral-resource code regulating
      access to the Niger floodplain that remains studied to this
      day, and a deliberate spatial separation of the political
      capital Hamdullāhi from the older commercial cities. The
      Massina Caliphate persisted under his son Aḥmadu II and
      grandson Aḥmadu III until conquered by al-Ḥājj ʿUmar Tāl
      in 1862 CE.
    description_ar: |
      توفي الشيخ أحمد لبو (أسكي أحمد) — فقيه مالكي فلاني، ومريد
      قادري على طريقة الكنتيين بتنبكتو، وقائد جهاد الفولان سنة ١٢٣٣
      هـ/١٨١٨ ميلادي في إقليم النيجر الداخلي بمالي اليوم، ومؤسس
      خلافة الماسينا («الدينة» بحمد الله) التي وحدت جني والماسينا
      وتنبكتو تحت حكومة سنية واحدة من سنة ١٢٣٤ هـ/١٨١٩ ميلادي —
      بحمد الله يوم ١٣ ربيع الثاني سنة ١٢٦١ هـ/٢٠ أبريل ١٨٤٥ ميلادي.
      وقد ناهز التاسعة والستين. ونظمت دولته على مجلس أربعين من
      العلماء يقيمون أحكام مذهب مالك، ونحو ست مئة مدرسة قرآنية،
      وقانون رعوي ينظم الانتفاع بسهل النيجر الفيضي ما زال موضع
      دراسة المختصين، وفصل مدروس بين العاصمة السياسية «حمد الله»
      والمدن التجارية القديمة. وبقيت خلافة الماسينا في عهد ابنه
      أحمد الثاني وحفيده أحمد الثالث إلى أن فتحها الحاج عمر تال سنة
      ١٢٧٩ هـ/١٨٦٢ ميلادي.
    description_fr: |
      Cheikh Aḥmadu Lobbo (Seku Aamadu) — juriste mālikite peul
      et disciple soufi qādirī de l'école kuntīa de Tombouctou,
      chef du jihad peul de 1233 H / 1818 EC dans le Delta
      intérieur du Niger de l'actuel Mali, et fondateur du
      califat de la Massina (la *Diina* de Ḥamdullāhi) qui
      unifia Djenné, la Massina et Tombouctou sous un unique
      gouvernement théocratique sunnite à partir de 1234 H /
      1819 EC — mourut à Ḥamdullāhi le 13 Rabīʿ II 1261 H /
      20 avril 1845 EC. Il avait environ 69 ans. Son État était
      organisé autour d'un Conseil de Quarante *ʿulamāʾ* appliquant
      la stricte loi mālikite, d'environ six cents écoles
      coraniques, d'un code pastoral régulant l'accès à la plaine
      d'inondation du Niger qui demeure étudié aujourd'hui, et
      d'une séparation spatiale délibérée entre la capitale
      politique Ḥamdullāhi et les anciennes villes commerçantes.
      Le califat de la Massina perdura sous son fils Aḥmadu II et
      son petit-fils Aḥmadu III jusqu'à sa conquête par al-Ḥājj
      ʿUmar Tāl en 1862 EC.
    canonical_hijri: {year: 1261, month: 4, day: 13, precision: day}
    canonical_gregorian: {date: 1845-04-20, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    people: [[ahmadu-lobbo, subject]]
    tags: [west-africa, mali, massina, hamdullahi, fulani, qadiriyya, maliki, jihad]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ahmadu_Lobbo"

