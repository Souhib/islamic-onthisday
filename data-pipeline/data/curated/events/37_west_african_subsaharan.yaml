  - slug: death-of-cheikh-sidiyya-baba
    category: scholar
    title_en: Death of Cheikh Sidiyya Bābā — Mauritanian Qādirī Shaykh
    title_ar: وفاة الشيخ سيدية بابا — شيخ القادرية الموريتاني
    title_fr: Mort de Cheikh Sidiyya Bābā — cheikh qādirī mauritanien
    description_en: |
      Cheikh Sidiyya Bābā ibn Sīdī Muḥammad ibn Sīdiyya al-Kabīr —
      Mauritanian Mālikī jurist and Qādirī shaykh of the Sīdiyya
      family of the western Saharan Trarza emirate, grandson of
      the founding scholar Sīdiyya al-Kabīr (d. 1284 AH / 1868 CE),
      successor to his uncle Sīdī Muḥammad as head of the family's
      *zāwiya*, and the most influential Sunni ʿālim of southern
      Mauritania in the early French-colonial period — died at
      his zāwiya of Boutilimit on 13 Dhū al-Ḥijja 1342 AH / 16
      July 1924 CE. He was about 62. His extensive correspondence
      and fatwas — including the much-debated *Fatwā of 1903*
      addressing the legal status of Muslim relations with the
      colonial administration — remained the principal Sunni
      jurisprudential reference of southern Mauritania for the
      first half of the twentieth century, and his Boutilimit
      *zāwiya* (transmitting the same Qādirī chain that
      al-Kuntī had carried into the Tinbuktu region a century
      earlier) shaped Mauritanian Mālikī scholarship for
      generations.
    description_ar: |
      توفي الشيخ سيدية بابا بن سيدي محمد بن سيدية الكبير — الفقيه
      المالكي الموريتاني، وشيخ الطريقة القادرية في أسرة «السيدية»
      بإمارة الترارزة في الصحراء الغربية، وحفيد الشيخ المؤسس
      «سيدية الكبير» (ت ١٢٨٤ هـ/١٨٦٨ ميلادي)، خليفة عمه سيدي محمد
      على رئاسة زاوية الأسرة، وأحد أبرز علماء أهل السنة في جنوب
      موريتانيا في صدر العهد الاستعماري الفرنسي — في زاويته بـ
      «بوتلميت» يوم ١٣ ذي الحجة سنة ١٣٤٢ هـ/١٦ يوليو ١٩٢٤ ميلادي.
      وقد ناهز الثانية والستين. ومراسلاته وفتاويه الواسعة — ومنها
      «فتوى ١٩٠٣» المثيرة للجدل في حكم التعامل مع الإدارة
      الاستعمارية — ظلت المرجع الفقهي السني الأول في جنوب موريتانيا
      في النصف الأول من القرن العشرين؛ وزاويته في بوتلميت — التي
      تنقل السلسلة القادرية نفسها التي حمل بها الكنتيون قبل قرن
      إلى منطقة تنبكتو — قعّدت الفقه المالكي الموريتاني أجيالاً.
    description_fr: |
      Cheikh Sidiyya Bābā ibn Sīdī Muḥammad ibn Sīdiyya al-Kabīr —
      juriste mālikite mauritanien et cheikh qādirī de la famille
      Sīdiyya de l'émirat ouest-saharien du Trarza, petit-fils du
      savant fondateur Sīdiyya al-Kabīr (m. 1284 H / 1868 EC),
      successeur de son oncle Sīdī Muḥammad à la tête de la
      *zāwiya* familiale, et plus influent des ʿulamāʾ sunnites
      du sud de la Mauritanie au début de la période coloniale
      française — mourut à sa zāwiya de Boutilimit le 13
      Dhū al-Ḥijja 1342 H / 16 juillet 1924 EC. Il avait environ
      62 ans. Sa vaste correspondance et ses fatwas — dont la très
      débattue *fatwa de 1903* traitant du statut juridique des
      relations des musulmans avec l'administration coloniale —
      demeurèrent la référence jurisprudentielle sunnite principale
      du sud de la Mauritanie pendant la première moitié du XXe
      siècle, et sa *zāwiya* de Boutilimit (transmettant la même
      chaîne qādirī que les Kuntīs avaient portée dans la région
      de Tombouctou un siècle plus tôt) façonna l'érudition
      mālikite mauritanienne pendant des générations.
