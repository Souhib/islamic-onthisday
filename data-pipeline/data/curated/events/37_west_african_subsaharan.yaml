  # =========================================================================
  # TIMBUKTU SCHOLARS AND CHRONICLERS
  # =========================================================================

  - slug: death-of-mahmud-kati
    category: scholar
    title_en: Death of Maḥmūd Kati — Songhai Chronicler
    title_ar: وفاة محمود كعت — مؤرخ صنغاي
    title_fr: Mort de Maḥmūd Kati — chroniqueur du Songhaï
    description_en: |
      Maḥmūd Kati ibn al-Ḥājj al-Mutawakkil al-Wangari — Songhai
      Mālikī scholar associated with Timbuktu, traditionally
      credited with initiating the *Tārīkh al-Fattāsh* (the
      "Chronicle of the Researcher") that, in its received form,
      provides — alongside ʿAbd al-Raḥmān al-Saʿdī's later
      *Tārīkh al-Sūdān* — the foundational narrative source for
      the Songhai Empire and its predecessors — died around the
      year 957 AH / 1550 CE in Timbuktu at advanced age. He had
      reportedly accompanied Askia Muḥammad I on the latter's
      Hajj of 902 AH / 1496 CE in his youth. The textual history
      of the *Tārīkh al-Fattāsh* is contested: modern scholarship
      attributes the surviving chronicle in part to his grandson
      Ibn al-Mukhtār and in part to a later nineteenth-century
      Massina-era recension, but the Kati family's role as the
      original Timbuktu chroniclers of Songhai is unanimously
      attested in the West-African biographical tradition.
    description_ar: |
      توفي محمود كعت بن الحاج المتوكل الونغري — فقيه مالكي صنغاوي من
      أهل تنبكتو، تنسب إليه التقاليد بدء تأليف «تاريخ الفتاش» —
      الذي يُعد، إلى جانب «تاريخ السودان» لعبد الرحمن السعدي بعده،
      أصلَ المصادر السردية لتاريخ دولة صنغاي وما قبلها — في تنبكتو
      سنة ٩٥٧ هـ/١٥٥٠ ميلادي تقريباً عن سن متقدمة. وكان قد رافق
      أسكيا محمداً الأول في حجته سنة ٩٠٢ هـ/١٤٩٦ ميلادي حين كان
      شاباً. وموضع نسبة «تاريخ الفتاش» مختلَف فيه عند المحدثين:
      فينسب الكتاب الباقي بعضُه إلى حفيده ابن المختار وبعضُه إلى
      تحرير لاحق في عصر دولة الماسينا في القرن الثالث عشر الهجري؛
      غير أن دور أسرة كعت بوصفها أسرة مؤرخي تنبكتو الأوائل لدولة
      صنغاي لا خلاف عليه في تراجم أهل غرب أفريقيا.
      
      The biographical chronology of Maḥmūd Kati and the textual stratigraphy of *Tārīkh al-Fattāsh* are both contested in modern scholarship: classical Songhai chronicle traditions place his death around 957 AH; Levtzion and Hunwick demonstrate textual layers that complicate attribution. We use 957 AH as the modal classical attestation rather than as firm fact.
      
      ترتيب حياة محمود كاتي ومراحل تأليف «تاريخ الفتاش» موضع نقاش في الدراسات الحديثة: ترسي تقاليد الإخبار الصنغايي وفاته نحو سنة ٩٥٧ هـ؛ وقد بيّن ليفتزيون وهنويك في كتابتيهما طبقات نصية تعقد المسألة. ولذا نعتمد ٩٥٧ هـ بوصفها التاريخ الأكثر تواتراً في التراث الكلاسيكي لا حقيقة قطعية.
    description_fr: |
      Maḥmūd Kati ibn al-Ḥājj al-Mutawakkil al-Wangari — savant
      mālikite songhaï associé à Tombouctou, auquel la tradition
      attribue le début de la rédaction du *Tārīkh al-Fattāsh*
      (la « chronique du chercheur ») qui, dans sa forme reçue,
      fournit — aux côtés du *Tārīkh al-Sūdān* postérieur d'ʿAbd
      al-Raḥmān al-Saʿdī — la source narrative fondatrice pour
      l'empire du Songhaï et ses prédécesseurs — mourut autour de
      l'an 957 H / 1550 EC à Tombouctou à un âge avancé. Il
      aurait accompagné dans sa jeunesse Askia Muḥammad Ier dans
      son Hajj de 902 H / 1496 EC. L'histoire textuelle du
      *Tārīkh al-Fattāsh* est disputée : l'érudition moderne
      attribue la chronique survivante en partie à son petit-fils
      Ibn al-Mukhtār et en partie à une recension postérieure de
      l'époque de la Massina au XIXe siècle, mais le rôle de la
      famille Kati comme première famille tombouctoise des
      chroniqueurs du Songhaï est unanimement attesté dans la
      tradition biographique ouest-africaine.
    canonical_hijri: {year: 957, precision: year}
    canonical_gregorian: {date: 1550-01-01, precision: year, method: attested}
