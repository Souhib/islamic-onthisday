  - slug: death-of-mansa-musa
    category: ruler
    title_en: Death of Mansa Mūsā — Pilgrim of 724 AH
    title_ar: وفاة مَنْسا موسى — حاج سنة ٧٢٤ هـ
    title_fr: Mort de Mansa Mūsā — pèlerin de 724 H
    description_en: |
      Mansa Mūsā I — ninth *mansa* of the Mali Empire, builder of
      the great mosques of Timbuktu and Gao under the architect
      Abū Isḥāq al-Sāḥilī of Granada, and the pilgrim whose Hajj
      caravan of 724 AH / 1324 CE was so laden with gold that his
      transit through Cairo destabilised the Egyptian dinar for a
      decade — died in Mali after roughly twenty-five years on the
      throne. He was about 57. The Egyptian historian al-ʿUmari,
      writing about a decade after Mūsā's Hajj from interviews
      with Cairene officials who had hosted him, records that the
      mansa distributed so much gold in alms during his stopover
      that the metal's price in the Cairo market fell by twelve
      percent and did not fully recover until al-ʿUmari's own
      day. Mansa Mūsā returned with Mālikī scholars and architects
      and made Timbuktu — through the Sankoré, Djinguereber, and
      Sīdī Yaḥyā mosque-madrasas — a pole of West African Sunni
      learning that would peak under the later Songhai sultanate.
    description_ar: |
      توفي مَنْسا موسى الأول — تاسع مَناسي إمبراطورية مالي، وباني
      مساجد تنبكتو وجاو الكبرى على يد المعماري أبي إسحاق الساحلي
      الغرناطي، والحاج الذي كان موكب حجه سنة ٧٢٤ هـ/١٣٢٤ ميلادي
      مثقلاً بالذهب لدرجة أن مروره بالقاهرة زعزع قيمة الدينار المصري
      نحو عقد كامل — في بلاد مالي بعد قرابة خمس وعشرين سنة على
      العرش. وقد ناهز السبع والخمسين. وذكر المؤرخ المصري ابن فضل
      الله العمري في كتابه — بعد حجة موسى بنحو عقد، نقلاً عن من
      استضافه من رجال الدولة المملوكية بالقاهرة — أن المنسا أنفق
      من الذهب صدقاتٍ بقدر ما أسقط ثمن الذهب في سوق القاهرة اثني
      عشر بالمئة، ولم يَعُد إلى ما كان عليه إلى زمن العمري نفسه.
      وعاد مَنْسا موسى ومعه فقهاء المالكية ومعماريون فأقام تنبكتو —
      على مدارس مساجد سنكوري وجنغرابر وسيدي يحيى — قطباً من أقطاب
      العلم السني في غرب أفريقيا، يبلغ ذروته في الدولة الصنغاوية
      اللاحقة.
    description_fr: |
      Mansa Mūsā Ier — neuvième *mansa* de l'empire du Mali,
      bâtisseur des grandes mosquées de Tombouctou et de Gao sous
      l'architecte Abū Isḥāq al-Sāḥilī de Grenade, et le pèlerin
      dont la caravane de Hajj de 724 H / 1324 EC était si chargée
      d'or que son passage par Le Caire déstabilisa le dinar
      égyptien pendant une décennie — mourut au Mali après environ
      vingt-cinq ans sur le trône. Il avait environ 57 ans.
      L'historien égyptien al-ʿUmari, écrivant une dizaine d'années
      après le Hajj de Mūsā à partir d'entretiens avec les
      fonctionnaires cairotes qui l'avaient reçu, rapporte que le
      mansa distribua tant d'or en aumônes durant son escale que
      le prix du métal sur le marché du Caire chuta de douze pour
      cent et ne se rétablit pleinement qu'à l'époque même
      d'al-ʿUmari. Mansa Mūsā revint avec des juristes mālikites
      et des architectes et fit de Tombouctou — par les mosquées-
      madrasas de Sankoré, Djinguereber et Sīdī Yaḥyā — un pôle
      de l'érudition sunnite ouest-africaine qui culminerait sous
      le sultanat songhaï postérieur.
    canonical_hijri: {year: 738, precision: year}
    canonical_gregorian: {date: 1337-01-01, precision: year, method: attested}
