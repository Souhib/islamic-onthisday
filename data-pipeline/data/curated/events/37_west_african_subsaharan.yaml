  - slug: death-of-sayyid-muhammad-abdullah-hassan
    category: scholar
    title_en: Death of Sayyid Muḥammad ʿAbdullāh Ḥassan — Sāliḥiyya Mujahid of Somalia
    title_ar: وفاة السيد محمد عبد الله حسن — مجاهد الصالحية بالصومال
    title_fr: Mort de Sayyid Muḥammad ʿAbdullāh Ḥassan — moudjahid sāliḥite de Somalie
    description_en: |
      Sayyid Muḥammad ibn ʿAbdullāh Ḥassan — Somali Shāfiʿī
      ḥāfiẓ, disciple of the Sāliḥiyya tariqa of Muḥammad
      Sāliḥ of Mecca, leader of the Somali Dervish movement
      from 1899 against British, Italian, and Ethiopian
      colonial encroachment on the Somali peninsula, and the
      composer of an extensive corpus of Somali jihad poetry
      that remains a foundational text of Somali nationalism —
      died of influenza at his redoubt of Imi (in present-day
      Ethiopia) on 10 Rabīʿ II 1339 AH / 21 December 1920 CE
      after the British Royal Air Force bombing of his
      Taleeh fortress earlier that year had ended the Dervish
      State as a military entity. He was about 64. The Ottoman
      caliphate had recognised him in 1336 AH / 1917 CE as
      "Emir of the Somali People". His Sāliḥī Dervish movement
      is the most-attested Sunni anti-colonial jihad of the
      Horn of Africa.
    description_ar: |
      توفي السيد محمد بن عبد الله حسن — العالم الصومالي الشافعي
      الحافظ، ومريد طريقة الصالحية على شيخها محمد صالح المكي،
      وقائد حركة الدراويش الصومالية من سنة ١٣١٧ هـ/١٨٩٩ ميلادي
      ضد التغلغل الاستعماري البريطاني والإيطالي والإثيوبي على شبه
      الجزيرة الصومالية، وصاحب ديوان واسع من الشعر الجهادي
      بالصومالية ما زال نصاً مؤسساً في القومية الصومالية — مرضاً
      بالإنفلونزا في معقله بـ«إيمي» (في الحبشة اليوم) يوم ١٠ ربيع
      الثاني سنة ١٣٣٩ هـ/٢١ ديسمبر ١٩٢٠ ميلادي، بعدما أنهى قصف
      السلاح الجوي الملكي البريطاني لحصن «طاليه» في صدر السنة
      نفسها دولة الدراويش بوصفها كياناً عسكرياً. وقد ناهز الرابعة
      والستين. وكانت الخلافة العثمانية قد اعترفت به سنة ١٣٣٦
      هـ/١٩١٧ ميلادي «أميراً للشعب الصومالي». وحركته الدرويشية
      الصالحية أبرز ما وثقه التاريخ من جهاد سني ضد الاستعمار في
      القرن الأفريقي.
    description_fr: |
      Sayyid Muḥammad ibn ʿAbdullāh Ḥassan — érudit somalien
      shāfiʿī ḥāfiẓ, disciple de la confrérie sāliḥiyya de
      Muḥammad Ṣāliḥ de La Mecque, chef du mouvement derviche
      somalien à partir de 1899 contre l'empiétement colonial
      britannique, italien et éthiopien sur la péninsule somalie,
      et compositeur d'un vaste corpus de poésie jihadiste en
      langue somalie qui demeure un texte fondateur du
      nationalisme somalien — mourut de la grippe dans son réduit
      d'Imi (dans l'Éthiopie actuelle) le 10 Rabīʿ II 1339 H /
      21 décembre 1920 EC après que le bombardement de la Royal
      Air Force britannique sur sa forteresse de Taleeh plus tôt
      cette année-là eut mis fin à l'État derviche comme entité
      militaire. Il avait environ 64 ans. Le califat ottoman
      l'avait reconnu en 1336 H / 1917 EC comme « Émir du peuple
      somalien ». Son mouvement derviche sāliḥī est le jihad
      sunnite anticolonial le plus attesté de la Corne de
      l'Afrique.
