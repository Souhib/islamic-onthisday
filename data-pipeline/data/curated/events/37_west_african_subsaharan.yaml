  - slug: death-of-muhammad-bello
    category: ruler
    title_en: Death of Muḥammad Bello — Second Caliph of Sokoto
    title_ar: وفاة محمد بِلُّو — ثاني خلفاء صكتو
    title_fr: Mort de Muḥammad Bello — deuxième calife de Sokoto
    description_en: |
      Muḥammad Bello ibn ʿUthmān ibn Fudi — eldest son of Shaykh
      ʿUthmān dan Fodio, founding architect of the city of Sokoto
      (which he laid out in 1224 AH / 1809 CE), commander of the
      consolidating campaigns of the Sokoto jihad after his
      father's withdrawal, scholar of Mālikī fiqh and Qādirī
      Sufism, and second caliph of the Sokoto Caliphate from his
      father's death in 1232 AH / 1817 CE — died at Wurno on 25
      Rajab 1253 AH / 25 October 1837 CE. He was about 56. His
      *Infāq al-Maysūr* (a chronicle of the Fulani jihad against
      the Hausa kingdoms) is the foremost first-person historical
      source for the founding of Sokoto, and his more than 100
      surviving works in Arabic, Hausa, and Fulfulde — covering
      fiqh, Sufism, history, and poetry — make him one of the
      most prolific Sunni scholar-rulers of nineteenth-century
      Africa.
    description_ar: |
      توفي الأمير محمد بِلُّو بن الشيخ عثمان بن فودي — كبير أبناء
      الشيخ عثمان، وباني مدينة صكتو (خطها سنة ١٢٢٤ هـ/١٨٠٩ ميلادي)،
      وقائد حروب التثبيت في جهاد صكتو بعد اعتزال أبيه، والفقيه
      المالكي القادري، وثاني خلفاء خلافة صكتو منذ وفاة أبيه سنة
      ١٢٣٢ هـ/١٨١٧ ميلادي — في «ورنو» يوم ٢٥ رجب سنة ١٢٥٣ هـ/٢٥
      أكتوبر ١٨٣٧ ميلادي. وقد ناهز السادسة والخمسين. وكتابه «إنفاق
      الميسور في تاريخ بلاد التكرور» تأريخٌ لجهاد الفولانيين على
      ممالك الهوسا، وهو أقدم مصدر وثائقي لقيام دولة صكتو؛ ويزيد
      عدد ما خلّف من مصنفات بالعربية والهوسا والفولانية في الفقه
      والتصوف والتاريخ والشعر على المئة، فيُعد أحد أخصب علماء
      السنة الحاكمين في أفريقيا في القرن التاسع عشر.
    description_fr: |
      Muḥammad Bello ibn ʿUthmān ibn Fudi — fils aîné de Cheikh
      ʿUthmān dan Fodio, architecte fondateur de la ville de
      Sokoto (qu'il traça en 1224 H / 1809 EC), commandant des
      campagnes de consolidation du jihad de Sokoto après le
      retrait de son père, érudit du fiqh mālikite et du soufisme
      qādirī, et deuxième calife du califat de Sokoto à compter
      de la mort de son père en 1232 H / 1817 EC — mourut à Wurno
      le 25 Rajab 1253 H / 25 octobre 1837 EC. Il avait environ
      56 ans. Son *Infāq al-Maysūr* (chronique du jihad peul
      contre les royaumes haoussa) est la source historique de
      première main majeure pour la fondation de Sokoto, et ses
      plus de 100 ouvrages survivants en arabe, haoussa et peul —
      couvrant le fiqh, le soufisme, l'histoire et la poésie —
      en font l'un des savants-souverains sunnites les plus
      prolifiques de l'Afrique du XIXe siècle.
    canonical_hijri: {year: 1253, month: 7, day: 25, precision: day}
    canonical_gregorian: {date: 1837-10-25, precision: day, method: attested}
