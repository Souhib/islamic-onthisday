  - slug: death-of-ahmad-baba-al-tinbukti
    category: scholar
    title_en: Death of Aḥmad Bābā al-Tinbuktī — Mālikī of Timbuktu
    title_ar: وفاة أحمد بابا التنبكتي — مالكي تنبكتو
    title_fr: Mort d'Aḥmad Bābā al-Tinbuktī — mālikite de Tombouctou
    description_en: |
      Abū al-ʿAbbās Aḥmad Bābā ibn Aḥmad al-Tinbuktī al-Ṣanhājī —
      most famous Mālikī jurist of West Africa in the Saadi era,
      Ashʿarī theologian, and author of *Nayl al-Ibtihāj bi-Taṭrīz
      al-Dībāj* (a continuation of Ibn Farḥūn's biographical
      dictionary of Mālikī scholars) and the celebrated fatwa
      *Miʿrāj al-Ṣuʿūd* against the racial enslavement of free
      Black Muslims of the Sūdān — died at Timbuktu on 6 Shaʿbān
      1036 AH / 22 April 1627 CE. He was about 70. He had been
      deported with his family to Marrakesh in 1002 AH / 1593 CE
      after the Saadi conquest of Songhai and held under restricted
      residence and later released to teach there until al-Manṣūr's
      death; he returned to Timbuktu in 1017 AH / 1608 CE and
      taught in the Sankoré complex for the remaining nineteen
      years of his life. His more than forty surviving works mark
      him as the senior Sunni jurist of the early-modern western
      Sūdān.
    description_ar: |
      توفي أبو العباس أحمد بابا بن أحمد التنبكتي الصنهاجي — أشهر
      فقهاء المالكية في غرب أفريقيا في العصر السعدي، والمتكلم
      الأشعري، ومصنف «نيل الابتهاج بتطريز الديباج» (تكملة لكتاب
      تراجم فقهاء المالكية لابن فرحون)، والفتوى الشهيرة «معراج
      الصعود إلى نيل حكم مجلوب السود» في رد رق المسلمين الأحرار
      من سود السودان — في تنبكتو يوم ٦ شعبان سنة ١٠٣٦ هـ/٢٢ أبريل
      ١٦٢٧ ميلادي. وقد ناهز السبعين. وكان قد نفي بأهله إلى مراكش
      سنة ١٠٠٢ هـ/١٥٩٣ ميلادي بعد الفتح السعدي على دولة صنغاي
      ومُنع من الخروج، ثم أطلق ليدرّس بها حتى وفاة المنصور؛ وعاد إلى
      تنبكتو سنة ١٠١٧ هـ/١٦٠٨ ميلادي ودرّس بمجمع سنكوري ما بقي من
      عمره تسع عشرة سنة. وأكثر من أربعين كتاباً من تصانيفه المخطوطة
      الباقية تجعله شيخ فقهاء أهل السنة في غرب السودان في صدر
      العصر الحديث.
    description_fr: |
      Abū al-ʿAbbās Aḥmad Bābā ibn Aḥmad al-Tinbuktī al-Ṣanhājī —
      plus célèbre juriste mālikite d'Afrique de l'Ouest à l'époque
      saadienne, théologien ashʿarī, et auteur de *Nayl al-Ibtihāj
      bi-Taṭrīz al-Dībāj* (continuation du dictionnaire biographique
      des savants mālikites d'Ibn Farḥūn) ainsi que de la célèbre
      fatwa *Miʿrāj al-Ṣuʿūd* contre l'asservissement racial des
      musulmans libres noirs du Sūdān — mourut à Tombouctou le
      6 Shaʿbān 1036 H / 22 avril 1627 EC. Il avait environ 70 ans.
      Il avait été déporté avec sa famille à Marrakech en 1002 H /
      1593 EC après la conquête saadienne du Songhaï et détenu sous
      résidence restreinte, puis libéré pour y enseigner jusqu'à
      la mort d'al-Manṣūr ; il revint à Tombouctou en 1017 H /
      1608 EC et enseigna au complexe de Sankoré pendant les
      dix-neuf années restantes de sa vie. Ses plus de quarante
      ouvrages survivants en font le doyen des juristes sunnites
      du Sūdān occidental au début de l'époque moderne.
    canonical_hijri: {year: 1036, month: 8, day: 6, precision: day}
    canonical_gregorian: {date: 1627-04-22, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    people: [[ahmad-baba-al-tinbukti, subject]]
    tags: [west-africa, songhai, saadi, timbuktu, sankore, maliki, ashari]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ahmad_Baba_al_Massufi"

  - slug: death-of-abd-al-rahman-al-sadi-al-tinbukti
    category: scholar
    title_en: Death of ʿAbd al-Raḥmān al-Saʿdī — Author of Tārīkh al-Sūdān
    title_ar: وفاة عبد الرحمن السعدي — صاحب «تاريخ السودان»
    title_fr: Mort d'ʿAbd al-Raḥmān al-Saʿdī — auteur du Tārīkh al-Sūdān
    description_en: |
      ʿAbd al-Raḥmān ibn ʿAbd Allāh al-Saʿdī al-Tinbuktī —
      Mālikī secretary of the Arma pashalik of Timbuktu in the
      generation after the Saadi conquest, and author of the
      *Tārīkh al-Sūdān* ("History of the Sūdān"), the major
      narrative source for Songhai and post-Songhai West Africa
      from the rise of the Mali Empire to the mid-eleventh
      hijri century — died at an unknown date after 1066 AH /
      1655–6 CE in Timbuktu. He was born in Timbuktu in
      1003 AH / 1594 CE. He had served as imam of the Sankoré
      mosque before entering the Arma administration first at
      Djenné and the Massina region (1037 AH / 1627 CE) and
      then as chief secretary of the pashalik in Timbuktu
      (1056 AH / 1646 CE). His chronicle, alongside the
      Kati-family *Tārīkh al-Fattāsh*, remains the indispensable
      classical Sunni West-African historiographical source for
      the seven centuries from Sundiata Keita to the Saadi
      conquest.
    description_ar: |
      توفي عبد الرحمن بن عبد الله السعدي التنبكتي — كاتب الباشاوية
      «الأرماء» بتنبكتو في الجيل التالي للفتح السعدي، ومصنف
      «تاريخ السودان» — وهو المصدر السردي الكبير لتاريخ صنغاي وما
      بعد صنغاي في غرب أفريقيا من قيام دولة مالي إلى منتصف القرن
      الحادي عشر الهجري — في تاريخ غير محدد بعد سنة ١٠٦٦ هـ/١٦٥٥
      ميلادي بتنبكتو. وكان مولده بها سنة ١٠٠٣ هـ/١٥٩٤ ميلادي. تولّى
      إمامة جامع سنكوري قبل أن يدخل في إدارة الأرماء أولاً بجني
      وإقليم الماسينا (سنة ١٠٣٧ هـ/١٦٢٧ ميلادي)، ثم كاتب الباشاوية
      الأكبر في تنبكتو (سنة ١٠٥٦ هـ/١٦٤٦ ميلادي). وتاريخه، إلى جانب
      «تاريخ الفتاش» لأسرة كعت، يبقى المصدر السني الكلاسيكي الذي لا
      غنى عنه لتاريخ غرب أفريقيا في القرون السبعة الممتدة من سنجاتا
      كيتا إلى الفتح السعدي.
    description_fr: |
      ʿAbd al-Raḥmān ibn ʿAbd Allāh al-Saʿdī al-Tinbuktī —
      secrétaire mālikite du pachalik des Arma à Tombouctou dans
      la génération qui suivit la conquête saadienne, et auteur du
      *Tārīkh al-Sūdān* (« Histoire du Sūdān »), source narrative
      majeure pour le Songhaï et l'Afrique de l'Ouest post-songhaï
      de la montée de l'empire du Mali jusqu'au milieu du XIe
      siècle hégirien — mourut à une date inconnue après 1066 H /
      1655-6 EC à Tombouctou. Il était né à Tombouctou en 1003 H /
      1594 EC. Il avait servi comme imam de la mosquée de Sankoré
      avant d'entrer dans l'administration des Arma d'abord à
      Djenné et dans la région de la Massina (1037 H / 1627 EC),
      puis comme secrétaire en chef du pachalik à Tombouctou
      (1056 H / 1646 EC). Sa chronique, aux côtés du *Tārīkh
      al-Fattāsh* de la famille Kati, demeure la source
      historiographique sunnite ouest-africaine classique
      indispensable pour les sept siècles s'étendant de Soundiata
      Keïta à la conquête saadienne.
    canonical_hijri: {year: 1066, precision: year}
    canonical_gregorian: {date: 1655-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    people: [[abd-al-rahman-al-sadi-al-tinbukti, subject]]
    tags: [west-africa, songhai, timbuktu, sankore, chronicle, sudan, maliki]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Tarikh_al-Sudan"

