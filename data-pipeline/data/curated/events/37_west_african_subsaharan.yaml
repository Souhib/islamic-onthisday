# Wave 24 of curated event additions (2026-04-27).
# West African and Sub-Saharan Sunni Muslim history — twelve events
# spanning the medieval Mali Empire, the Songhai Empire, the Saadi
# conquest of Timbuktu, and the nineteenth- to early-twentieth-century
# West African and Horn-of-Africa jihad and tariqa movements. Three
# Mansas / Askias of medieval West Africa; three Timbuktu chroniclers
# and scholars (Aḥmad Bābā, Maḥmūd Kati, ʿAbd al-Raḥmān al-Saʿdi); the
# Saadi-Songhai battle of Tondibi (999 AH/1591 CE); four nineteenth-
# century Sunni reformer-mujahids (ʿUmar Tāl, Muḥammad Bello, Aḥmadu
# Lobbo); and two early-twentieth-century scholars / mujahids (Sayyid
# Muḥammad ʿAbdullāh Ḥassan, Cheikh Sidiyya Bābā). All twelve are
# attested Sunni Muslim figures (mostly Mālikī, with Tijānī and
# Qādirī Sufi affiliations); none are sahaba; none carry hadith refs.
# Trilingual en/ar/fr throughout. Sources: EI2 + editorial across all
# entries, with Aḥmad Bābā additionally attested by Ibn Khallikān
# (post-Wafayāt continuators) and Ibn Kathīr-tradition West-African
# chronicles for the medieval mansas.

events:
  # =========================================================================
  # MEDIEVAL MALI AND SONGHAI EMPIRES
  # =========================================================================

  - slug: death-of-sundiata-keita
    category: ruler
    title_en: Death of Sundiata Keita — Founder of the Mali Empire
    title_ar: وفاة سُنجاتا كيتا — مؤسس إمبراطورية مالي
    title_fr: Mort de Soundiata Keïta — fondateur de l'empire du Mali
    description_en: |
      Sundiata Keita (Mande: *Sun Jata*) — first *mansa* of the
      Mali Empire, victor over the Soso king Sumanguru Kanté at
      the battle of Kirina (c. 1235 CE), and unifier of the
      Manding-speaking peoples of the upper Niger — died in his
      capital of Niani at about age 38. He was about 38. The
      classical written attestation of Sundiata's career is owed
      to the Tunisian historian Ibn Khaldūn, who interviewed
      Mande informants in the late fourteenth century and recorded
      Sundiata's name and dynastic line in his *Kitāb al-ʿIbar*;
      independently, Ibn Baṭṭūṭa visited Mali in 754 AH/1353 CE
      and confirmed the dynasty. The Mali Empire founded by Sundiata
      and Islamised across successive reigns would, under his
      great-grandnephew Mansa Mūsā, become the wealthiest and
      most-renowned Muslim polity of West Africa in the medieval
      period.
    description_ar: |
      توفي سُنجاتا كيتا (بلسان المنده: «سُن جاتا») — أول مَنْسا
      لإمبراطورية مالي، والمنتصر على ملك السوسو سومنغورو كانتي في
      معركة كيرينا (نحو ٦٣٢ هـ/١٢٣٥ ميلادي)، وموحد شعوب الماندينغ
      على أعالي نهر النيجر — في عاصمته نياني عن نحو ثمان وثلاثين
      سنة. والشاهد المكتوب الكلاسيكي على سيرة سُنجاتا يرجع إلى
      المؤرخ التونسي ابن خلدون الذي قابل عنه أهل الماندي في أواخر
      القرن الثامن الهجري وسجل اسمه وسلسلة دولته في «كتاب العبر»؛
      وزار ابن بطوطة بلاد مالي مستقلاً سنة ٧٥٤ هـ/١٣٥٣ ميلادي
      وأكد قيام تلك الدولة. وستصبح إمبراطورية مالي التي أسسها
      سُنجاتا وأسلمت في عهود متعاقبة من بعده، في عصر حفيد أخيه
      مَنْسا موسى، أغنى وأشهر دول المسلمين في غرب أفريقيا في العصر
      الوسيط.
    description_fr: |
      Soundiata Keïta (mandé : *Sun Jata*) — premier *mansa* de
      l'empire du Mali, vainqueur du roi sosso Soumaoro Kanté à
      la bataille de Kirina (c. 1235 EC), et unificateur des
      peuples de langue manding du haut Niger — mourut dans sa
      capitale Niani à environ 38 ans. L'attestation écrite
      classique de la carrière de Soundiata est due à l'historien
      tunisien Ibn Khaldūn, qui interrogea des informateurs mandé
      à la fin du XIVe siècle et consigna le nom de Soundiata et
      sa lignée dynastique dans son *Kitāb al-ʿIbar* ; de manière
      indépendante, Ibn Baṭṭūṭa visita le Mali en 754 H/1353 EC
      et confirma la dynastie. L'empire du Mali fondé par Soundiata
      et islamisé au fil des règnes successifs deviendrait, sous
      l'arrière-petit-neveu Mansa Mūsā, la polité musulmane la
      plus riche et la plus renommée d'Afrique de l'Ouest à
      l'époque médiévale.
    canonical_hijri: {year: 653, precision: year}
    canonical_gregorian: {date: 1255-01-01, precision: year, method: attested}
