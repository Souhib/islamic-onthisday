  - slug: battle-of-tondibi-conquest-of-timbuktu
    category: battle
    title_en: Battle of Tondibi — Saadi Conquest of Songhai
    title_ar: معركة تنديبي — فتح السعديين على صنغاي
    title_fr: Bataille de Tondibi — conquête saadienne du Songhaï
    description_en: |
      On the plain of Tondibi north of Gao on the Niger river, an
      expeditionary force dispatched by the Saadi sultan al-Manṣūr
      al-Dhahabī of Marrakesh — about 4,000 musketeers and
      arquebusiers under the eunuch general Jūdar Pasha — defeated
      the much larger but pre-gunpowder Songhai army of Askia Isḥāq
      II on 17 Jumādā I 999 AH / 13 March 1591 CE in the course of
      a roughly two-hour engagement. Following the victory the
      Saadi force occupied Gao, Timbuktu, and Djenné, ending the
      Songhai Empire as a unified polity and dismembering the great
      West-African Sunni state founded by Askia Muḥammad a century
      earlier. The occupation of Timbuktu produced the deportation
      of its Sankoré scholars to Marrakesh — most prominently the
      Mālikī jurist Aḥmad Bābā al-Tinbuktī — and the dispersal of
      the great manuscript libraries of the city; the Saadi
      pashalik that succeeded Songhai held the cities loosely for
      another two centuries before fragmenting.
    description_ar: |
      في سهل تنديبي شمال جاو على نهر النيجر، هزمت قوة استكشافية
      أرسلها السلطان السعدي أحمد المنصور الذهبي من مراكش — نحو
      أربعة آلاف من المسلحين بالبنادق والقذائف بقيادة الباشا الخصي
      جودر — جيش صنغاي الكبير من أتباع أسكيا إسحاق الثاني الذي
      كان لا يزال على السلاح القديم، وذلك يوم ١٧ جمادى الأولى سنة
      ٩٩٩ هـ/١٣ مارس ١٥٩١ ميلادي في معركة استمرت قرابة الساعتين.
      وعلى إثر النصر استولت قوات السعديين على جاو وتنبكتو وجني
      فأنهت دولة صنغاي بوصفها كياناً موحداً، وفككت دولة السنة
      الكبرى التي أنشأها أسكيا محمد قبل قرن في غرب أفريقيا. ونتج
      عن احتلال تنبكتو نفي علماء سنكوري إلى مراكش — وأبرزهم
      الفقيه المالكي أحمد بابا التنبكتي — وتشتت مكتبات المدينة
      الكبرى؛ واستمر «الباشا» السعدي خلفاً لصنغاي قابضاً على
      المدن قبضة مرتخية قرنين قبل أن تتفكك.
    description_fr: |
      Dans la plaine de Tondibi au nord de Gao sur le fleuve
      Niger, un corps expéditionnaire envoyé par le sultan saadien
      al-Manṣūr al-Dhahabī de Marrakech — environ 4 000 mousquetaires
      et arquebusiers commandés par le pacha eunuque Jūdar — défit
      l'armée songhaï bien plus nombreuse mais d'avant l'ère de la
      poudre d'Askia Isḥāq II le 17 Jumādā I 999 H / 13 mars 1591 EC
      au cours d'un engagement d'environ deux heures. À la suite de
      la victoire, la force saadienne occupa Gao, Tombouctou et Djenné,
      mettant fin à l'empire du Songhaï comme polité unifiée et
      démembrant le grand État sunnite ouest-africain fondé par Askia
      Muḥammad un siècle plus tôt. L'occupation de Tombouctou produisit
      la déportation des savants de Sankoré à Marrakech — au premier
      rang desquels le juriste mālikite Aḥmad Bābā al-Tinbuktī — et
      la dispersion des grandes bibliothèques manuscrites de la ville ;
      le pachalik saadien qui succéda au Songhaï tint les villes d'une
      poigne lâche pendant encore deux siècles avant de se fragmenter.
    canonical_hijri: {year: 999, month: 5, day: 17, precision: day}
