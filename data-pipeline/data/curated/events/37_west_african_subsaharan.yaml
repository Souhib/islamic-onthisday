  - slug: death-of-askia-muhammad-i
    category: ruler
    title_en: Death of Askia Muḥammad I — Songhai Pilgrim-Emperor
    title_ar: وفاة أسكيا محمد الأول — إمبراطور صنغاي الحاج
    title_fr: Mort d'Askia Muḥammad Ier — empereur-pèlerin du Songhaï
    description_en: |
      al-Ḥājj Muḥammad ibn Abī Bakr Tūré, known as Askia
      Muḥammad I — first ruler of the Askia dynasty of the Songhai
      Empire after deposing Sunni ʿAlī's son in 898 AH / 1493 CE,
      pilgrim of 902 AH / 1496 CE (during which the Sharīfian
      ʿAbbāsid caliph al-Mutawakkil II in Cairo invested him with
      the title of caliph of the western Sūdān), patron of the
      Sankoré scholars of Timbuktu, and consolidator of Mālikī
      Islam as the legal-administrative framework of the Songhai
      state — died at Gao at advanced age after a long retirement
      forced by his sons. He was approximately in his nineties.
      Under his reign Songhai reached its territorial zenith from
      Senegal to the central Niger; the Sankoré madrasa-mosque
      received the influx of scholars and books that would make
      Timbuktu, in the next century, the pre-eminent centre of
      Sunni learning south of the Sahara.
    description_ar: |
      توفي الحاج محمد بن أبي بكر توري، المعروف بأسكيا محمد الأول —
      أول حكام الأسرة الأسكية من إمبراطورية صنغاي بعد عزله ابن
      السلطان سني علي سنة ٨٩٨ هـ/١٤٩٣ ميلادي، والحاج الذي قلده
      الخليفة العباسي الشريف المتوكل الثالث بالقاهرة في حجته سنة
      ٩٠٢ هـ/١٤٩٦ ميلادي خلافة السودان الغربي، وراعي علماء سنكوري
      بتنبكتو، ومرسي المذهب المالكي إطاراً تشريعياً وإدارياً لدولة
      صنغاي — بمدينة جاو في عمر متقدم بعد سنين طويلة في العزلة فرضها
      عليه أبناؤه. وقد ناهز التسعين. وفي عهده بلغت دولة صنغاي
      أقصى اتساعها من السنغال إلى أواسط نهر النيجر؛ ووفد على
      مسجد ومدرسة سنكوري من العلماء والكتب ما جعل تنبكتو في
      القرن التالي أعظم مراكز العلم السني جنوب الصحراء الكبرى.
    description_fr: |
      al-Ḥājj Muḥammad ibn Abī Bakr Tūré, connu sous le nom
      d'Askia Muḥammad Ier — premier souverain de la dynastie
      askia de l'empire du Songhaï après avoir déposé le fils
      de Sunni ʿAlī en 898 H / 1493 EC, pèlerin de 902 H /
      1496 EC (durant lequel le calife abbasside chérifien
      al-Mutawakkil II au Caire l'investit du titre de calife
      du Soudan occidental), mécène des savants de Sankoré à
      Tombouctou, et consolidateur de l'islam mālikite comme
      cadre juridique et administratif de l'État songhaï —
      mourut à Gao à un âge avancé après une longue retraite
      imposée par ses fils. Il avait environ quatre-vingt-dix
      ans. Sous son règne, le Songhaï atteignit son zénith
      territorial du Sénégal au Niger central ; la madrasa-
      mosquée de Sankoré reçut l'afflux d'érudits et de livres
      qui feraient de Tombouctou, au siècle suivant, le centre
      d'érudition sunnite par excellence au sud du Sahara.
    canonical_hijri: {year: 944, precision: year}
    canonical_gregorian: {date: 1538-01-01, precision: year, method: attested}
