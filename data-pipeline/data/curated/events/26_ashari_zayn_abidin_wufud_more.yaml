  - slug: year-of-delegations
    category: prophetic
    title_en: Year of Delegations (ʿAm al-Wufud)
    title_ar: عام الوفود
    title_fr: Année des Délégations (*ʿĀm al-Wufūd*)
    description_en: |
      Following the conquest of Mecca and the consolidation of
      Muslim authority across most of the Arabian Peninsula,
      the year 9 AH became known as *ʿAm al-Wufud* — the Year
      of Delegations — as Arab tribes from across the peninsula
      sent representative parties to Medina to declare their
      Islam and submission to the Prophet ﷺ. Classical sources
      (Ibn Hisham, al-Tabari, Ibn Saʿd) document around 70
      formal delegations within the year, including the
      Christians of Najran (whose written *muʿahada* with the
      Prophet ﷺ guaranteed their churches and their cross-
      worship; the document was extant in Damascus into the
      Abbasid era), Banu Tamim, Banu Hanifa (whose Musaylima
      would later apostatise), Banu Thaqif of al-Ṭaʾif, and
      delegations from al-Aws, al-Khazraj clients, the
      Ḥaḍrami people, and Hadhramaut. The Year marked the
      effective transition from the Prophet's ﷺ position as
      head of a city-state to that of head of an Arabian
      polity.
    description_ar: |
      بعد فتح مكة واستقرار سلطة المسلمين على معظم جزيرة العرب،
      صار العام التاسع للهجرة يُعرف بـ«عام الوفود» — إذ بعثت
      قبائل العرب من عامة الجزيرة وفوداً ممثلة لها إلى المدينة
      المنورة تعلن إسلامها وانضواءها تحت سلطان النبي ﷺ. وتسجل
      المصادر الكلاسيكية (ابن هشام والطبري وابن سعد) نحو
      سبعين وفداً رسمياً في تلك السنة الواحدة، منها وفد نصارى
      نجران (الذين كتب لهم النبي ﷺ معاهدة كفلت لهم كنائسهم
      وعبادة الصلبان فيها؛ وكان الكتاب موجوداً بدمشق إلى
      العصر العباسي)، ووفد بني تميم، ووفد بني حنيفة (وقد
      ارتد منهم لاحقاً مسيلمة)، ووفد بني ثقيف بالطائف،
      ووفود من الأوس وحلفاء الخزرج وأهل حضرموت والحضارمة.
      وكان «عام الوفود» يرسم الانتقال الفعلي من مقام النبي ﷺ
      رئيس دولة المدينة إلى مقام رئيس الدولة العربية.
    description_fr: |
      Suite à la conquête de La Mecque et à la consolidation de
      l'autorité musulmane sur la majeure partie de la Péninsule
      arabique, l'année 9 H devint connue comme *ʿĀm al-Wufūd*
      — l'Année des Délégations — alors que les tribus arabes
      de toute la péninsule envoyèrent des délégations
      représentatives à Médine pour déclarer leur Islam et leur
      soumission au Prophète ﷺ. Les sources classiques (Ibn
      Hishām, al-Ṭabarī, Ibn Saʿd) consignent environ 70
      délégations formelles durant l'année, dont les chrétiens
      de Najrān (dont le *muʿāhada* écrit avec le Prophète ﷺ
      garantit leurs églises et leur culte de la croix; le
      document était existant à Damas jusqu'à l'ère abbasside),
      les Banū Tamīm, les Banū Ḥanīfa (dont Musaylima
      apostasierait plus tard), les Banū Thaqīf d'al-Ṭāʾif, et
      des délégations d'al-Aws, des clients d'al-Khazraj, des
      Ḥaḍramītes et du Hadhramaut. L'Année marqua la transition
      effective de la position du Prophète ﷺ comme chef d'une
      cité-État à celle de chef d'un État arabe.
    canonical_hijri: {year: 9, precision: year}
