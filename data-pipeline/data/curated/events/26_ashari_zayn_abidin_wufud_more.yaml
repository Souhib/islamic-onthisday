  - slug: death-of-ali-zayn-al-abidin
    category: ahl_al_bayt
    title_en: Death of ʿAli Zayn al-ʿAbidin
    title_ar: وفاة علي زين العابدين
    title_fr: Mort d'ʿAlī Zayn al-ʿĀbidīn
    description_en: |
      ʿAli ibn al-Husayn ibn ʿAli ibn Abi Ṭalib, known as Zayn
      al-ʿAbidin ("Ornament of the Worshippers") — only son of
      al-Husayn ibn ʿAli ra to survive the massacre at Karbala
      (61 AH), where the eight-year-old future imam was spared
      due to severe illness, and the senior figure of the
      Prophetic family in the second generation — died in
      Medina at age about 57. The Sunni tradition reveres him
      as one of the seven foundational tabiʿun jurists of
      Medina (the Shia tradition counts him as the fourth Imam).
      Imam Malik narrated extensively from him; his maxim "the
      tongue is more deserving of imprisonment than the wild
      beast" became proverbial. His *al-Ṣaḥifa al-Sajjadiyya*
      (a collection of supplications) is canonical Shia text but
      also widely received in Sunni adab literature. He was
      famously charitable, secretly carrying food at night to
      Medinan widows and orphans for thirty years; only after
      his death was the source of their sustenance discovered.
    description_ar: |
      توفي الإمام علي بن الحسين بن علي بن أبي طالب — المعروف
      بـ«زين العابدين»، الابن الوحيد للإمام الحسين رضي الله عنه
      الذي نجا من مذبحة كربلاء (٦١ هـ)، حيث استثني الإمام
      المقبل من القتل وعمره ثماني سنوات بسبب مرضه الشديد، وكبير
      آل البيت في الجيل الثاني — بالمدينة المنورة عن نحو سبع
      وخمسين سنة. وأهل السنة يعدونه من فقهاء التابعين السبعة
      المؤسسين بالمدينة (وأهل التشيع يعدونه الإمام الرابع).
      روى عنه الإمام مالك كثيراً، وقاله المضرب به المثل:
      «اللسان أحق بسجن من السبع». و«صحيفته السجادية» (مجموعة
      الأدعية) نص شيعي رسمي، لكنه يُروى على نطاق واسع في أدب
      أهل السنة. واشتهر بالصدقة، فكان يحمل الطعام بنفسه ليلاً
      إلى أرامل المدينة وأيتامها سراً ثلاثين سنة؛ ولم يكتشف
      مصدر معاشهم إلا بعد وفاته.
    description_fr: |
      ʿAlī ibn al-Ḥusayn ibn ʿAlī ibn Abī Ṭālib, connu sous le
      nom de Zayn al-ʿĀbidīn (« Ornement des Adorateurs ») —
      seul fils d'al-Ḥusayn ibn ʿAlī ra à survivre au massacre
      de Kerbala (61 H), où l'imam futur de huit ans fut épargné
      en raison d'une maladie sévère, et la figure principale
      de la famille prophétique à la seconde génération —
      mourut à Médine à l'âge d'environ 57 ans. La tradition
      sunnite le révère comme l'un des sept jurisconsultes
      tabiʿūn fondateurs de Médine (la tradition chiite le
      compte comme le quatrième imam). L'imam Mālik rapporta
      abondamment de lui; sa maxime « la langue mérite plus la
      prison que la bête sauvage » devint proverbiale. Son
      *al-Ṣaḥīfa al-Sajjādiyya* (un recueil de supplications)
      est un texte chiite canonique mais aussi largement reçu
      dans la littérature *adab* sunnite. Il était célèbrement
      charitable, portant secrètement de la nourriture la nuit
      aux veuves et aux orphelins médinois pendant trente ans;
      ce ne fut qu'après sa mort que la source de leur subsistance
      fut découverte.
