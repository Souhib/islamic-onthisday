  - slug: death-of-khalid-al-baghdadi
    category: scholar
    title_en: Death of Mawlana Khalid al-Baghdadi
    title_ar: وفاة مولانا خالد البغدادي
    title_fr: Mort de Mawlānā Khālid al-Baghdādī
    description_en: |
      Mawlana Khalid ibn Aḥmad al-Shahrazuri al-Kurdi al-
      Baghdadi — Kurdish Sunni Naqshbandi-Mujaddidi shaykh of
      Sulaymaniyya in Iraqi Kurdistan, founder of the Khalidi
      sub-branch of the Naqshbandi tariqa that became the
      single most influential Sunni reformist Sufi network of
      the 19th century, with a presence stretching from the
      Caucasus to the Balkans, the Levant, Egypt, and the
      Hijaz — died of plague in Damascus at age about 49.
      Trained in Sulaymaniyya in classical sciences, then
      sent to India where he became a successor of Shah Ghulam
      ʿAli al-Dihlawi (an inheritor of Sirhindi's Mujaddidi
      lineage), he returned to the Ottoman Arab world to spread
      a reformist Sunni Sufism combining strict Sharia adherence,
      anti-bidʿa polemic, and political engagement against
      colonial encroachment. The Khalidiyya played significant
      roles in the resistance to Russian expansion in the
      Caucasus (Imam Shamil), the Balkan crises, and the Arab
      anti-Ottoman intellectual currents.
    description_ar: |
      توفي مولانا خالد بن أحمد الشهرزوري الكردي البغدادي —
      شيخ نقشبندي مجدّدي سني كردي من السليمانية في كردستان
      العراق، ومؤسس الفرع الخالدي من الطريقة النقشبندية الذي
      صار أوسع شبكة صوفية سنية إصلاحية في القرن التاسع عشر،
      ممتدة من القوقاز إلى البلقان والشام ومصر والحجاز —
      بدمشق بالطاعون عن نحو تسع وأربعين سنة. تخرج بالسليمانية
      على العلوم الكلاسيكية، ثم بُعث إلى الهند حيث صار خليفة
      الشاه غلام علي الدهلوي (وارث سلسلة السرهندي
      المجدّدية)، فعاد إلى البلاد العربية تحت العثمانيين ينشر
      تصوفاً سنياً إصلاحياً يجمع بين الالتزام الصارم بالشريعة
      ومعاداة البدع والاشتباك السياسي مع التغلغل الاستعماري.
      ولعبت الخالدية دوراً مهماً في مقاومة التوسع الروسي في
      القوقاز (الإمام شامل) وفي أزمات البلقان وفي التيارات
      الفكرية العربية المضادة لبني عثمان أواخر القرن.
    description_fr: |
      Mawlānā Khālid ibn Aḥmad al-Shahrazūrī al-Kurdī al-
      Baghdādī — shaykh sunnite naqshbandī-mujaddidī kurde de
      Sulaymaniyya au Kurdistan irakien, fondateur de la sous-
      branche khālidiyya de la *ṭarīqa Naqshbandiyya* qui
      devint le réseau soufi sunnite réformiste unique le plus
      influent du XIXe siècle, avec une présence s'étendant du
      Caucase aux Balkans, au Levant, à l'Égypte et au Hedjaz
      — mourut de la peste à Damas à l'âge d'environ 49 ans.
      Formé à Sulaymaniyya aux sciences classiques, puis envoyé
      en Inde où il devint successeur de Shāh Ghulām ʿAli
      al-Dihlawī (héritier de la lignée mujaddidiyya de
      Sirhindī), il retourna au monde arabe ottoman pour
      diffuser un soufisme sunnite réformiste combinant
      l'adhésion stricte à la *sharīʿa*, la polémique anti-
      *bidʿa*, et l'engagement politique contre l'empiètement
      colonial. La Khālidiyya joua des rôles significatifs
      dans la résistance à l'expansion russe au Caucase (l'imam
      Shāmil), dans les crises balkaniques, et dans les
      courants intellectuels arabes anti-ottomans.
