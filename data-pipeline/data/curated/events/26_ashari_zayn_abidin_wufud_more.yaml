  - slug: death-of-bara-ibn-malik
    category: companion
    title_en: Martyrdom of al-Baraʾ ibn Malik ra at Tustar
    title_ar: استشهاد البراء بن مالك رضي الله عنه يوم تستر
    title_fr: Martyre d'al-Barāʾ ibn Mālik ra à Tustar
    description_en: |
      al-Baraʾ ibn Malik al-Anṣari — brother of Anas ibn Malik
      ra (the Prophet's ﷺ servant), Companion who killed in
      hand-to-hand combat the apostate "false prophet"
      Musaylima at the Battle of Yamama (12 AH) and so received
      the divine reward the Prophet ﷺ had foretold for his
      killer, and the foremost individual warrior of the early
      Companion generation — fell martyred at the Battle of
      Tustar in 20 AH at the age of about 50. The Prophet ﷺ
      had said of him in a hadith of Tirmidhi: "How many a
      dishevelled, dust-stained one, with a single garment,
      whom none would heed — but if he swore by Allah, Allah
      would fulfil his oath; al-Baraʾ ibn Malik is one of them."
      During the siege of Tustar he was thrown by his
      Companions over the Persian fortress wall in a hooked
      basket to lift the latch from inside — a grievously
      dangerous tactic that he survived in this engagement and
      that earned him decisive military fame.
    description_ar: |
      استشهد الإمام البراء بن مالك الأنصاري رضي الله عنه — أخو أنس
      بن مالك خادم رسول الله ﷺ، الصحابي الذي قتل في مبارزة
      مسيلمة الكذاب يوم اليمامة سنة ١٢ هـ فأخذ من الله الجزاء
      الذي بشّر النبي ﷺ به قاتله، وأمضى المحاربين الأفراد في
      الجيل الصحابي الأول — في معركة تستر سنة عشرين للهجرة عن
      نحو خمسين سنة. قال فيه النبي ﷺ في حديث الترمذي: «رب
      أشعث أغبر، ذي طمرين، لا يؤبه له، لو أقسم على الله لأبره؛
      منهم البراء بن مالك». وفي حصار تستر ألقاه إخوانه عبر سور
      حصن الفرس في كلاب مرفوع ليفتح الباب من الداخل — تكتيك
      شديد الخطر نجا منه في هذه المعركة وكسب به شهرة عسكرية
      حاسمة.
    description_fr: |
      al-Barāʾ ibn Mālik al-Anṣārī — frère d'Anas ibn Mālik ra
      (le serviteur du Prophète ﷺ), Compagnon qui tua en combat
      singulier le faux prophète apostat Musaylima à la
      bataille de Yamāma (12 H) et reçut ainsi la récompense
      divine que le Prophète ﷺ avait promise à son tueur, et le
      plus éminent guerrier individuel de la première génération
      des Compagnons — tomba martyr à la bataille de Tustar en
      20 H à l'âge d'environ 50 ans. Le Prophète ﷺ dit de lui
      dans un hadith de Tirmidhī : « combien d'ébouriffés,
      poussiéreux, avec un seul vêtement, à qui nul ne prêterait
      attention — mais s'ils juraient par Allah, Allah
      accomplirait leur serment; al-Barāʾ ibn Mālik en est un ».
      Durant le siège de Tustar, il fut lancé par ses compagnons
      par-dessus le mur de la forteresse perse dans un panier à
      crochets pour soulever le verrou de l'intérieur — une
      tactique gravement dangereuse à laquelle il survécut dans
      cet engagement et qui lui valut une renommée militaire
      décisive.
