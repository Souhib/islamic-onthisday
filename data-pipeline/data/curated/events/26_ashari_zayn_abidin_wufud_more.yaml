  - slug: death-of-abd-al-razzaq-al-sanani
    category: scholar
    title_en: Death of ʿAbd al-Razzaq al-Ṣanʿani — author of al-Muṣannaf
    title_ar: وفاة عبد الرزاق الصنعاني — صاحب «المصنف»
    title_fr: Mort d'ʿAbd al-Razzāq al-Ṣanʿānī — auteur du *al-Muṣannaf*
    description_en: |
      Abu Bakr ʿAbd al-Razzaq ibn Hammam al-Ṣanʿani — Yemeni
      Sunni hadith muḥaddith of the second-century AH
      generation, foremost direct student of al-Zuhri after the
      Madinan tabiʿun, and author of *al-Muṣannaf* (one of the
      two earliest organised compendia of hadith arranged by
      legal-thematic chapters, the other being Ibn Abi Shayba's
      *Muṣannaf*) — died in Sanaa at age about 85. Imam Aḥmad
      ibn Ḥanbal travelled from Baghdad to Sanaa to study under
      him; their correspondence is preserved in al-Ṣanʿani's
      hadith collection. His *Muṣannaf* in eleven volumes
      preserves about 21,000 hadiths and is one of the principal
      pre-canonical sources from which the Six Books were
      drawn — al-Bukhari, Muslim, and the Sunan compilers all
      narrate from him directly or through one intermediary.
    description_ar: |
      توفي الإمام أبو بكر عبد الرزاق بن همام الصنعاني — محدث
      سني يمني من جيل القرن الثاني الهجري، أعلم أصحاب الإمام
      الزهري مباشرة بعد تابعي المدينة، ومصنف «المصنف» (أحد
      أقدم مجاميع الحديث المرتبة على أبواب الفقه، والآخر
      «مصنف» ابن أبي شيبة) — بصنعاء عن نحو خمس وثمانين سنة.
      رحل إليه الإمام أحمد بن حنبل من بغداد إلى صنعاء ليأخذ
      عنه؛ وحفظت مراسلاتهم في «مصنف» الصنعاني. ويستوعب
      «المصنف» في أحد عشر مجلداً نحو ٢١٠٠٠ حديث، وهو من أصول
      المصادر السابقة على الكتب الستة التي استخرج منها مادة
      أصحاب الكتب الستة — البخاري ومسلم وأصحاب السنن — يروون
      عنه مباشرة أو عبر واسطة واحدة.
    description_fr: |
      Abu Bakr ʿAbd al-Razzāq ibn Hammām al-Ṣanʿānī — muḥaddith
      sunnite yéménite de la génération du IIe siècle de
      l'Hégire, premier élève direct d'al-Zuhrī après les
      tabiʿūn médinois, et auteur d'*al-Muṣannaf* (l'un des
      deux plus anciens compendiums organisés de hadiths
      arrangés par chapitres juridico-thématiques, l'autre
      étant le *Muṣannaf* d'Ibn Abī Shayba) — mourut à Sanaa
      à l'âge d'environ 85 ans. L'imam Aḥmad ibn Ḥanbal voyagea
      de Bagdad à Sanaa pour étudier sous lui; leur
      correspondance est préservée dans la collection de hadiths
      d'al-Ṣanʿānī. Son *Muṣannaf* en onze volumes préserve
      environ 21 000 hadiths et est l'une des sources pré-
      canoniques principales d'où furent tirés les Six Livres
      — al-Bukhārī, Muslim, et les compilateurs des *Sunan*
      narrent tous de lui directement ou à travers un seul
      intermédiaire.
