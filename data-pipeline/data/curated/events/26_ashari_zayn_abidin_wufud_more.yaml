  - slug: death-of-ibn-abi-zayd
    category: scholar
    title_en: Death of Ibn Abi Zayd al-Qayrawani — Author of al-Risala
    title_ar: وفاة ابن أبي زيد القيرواني — صاحب «الرسالة»
    title_fr: Mort d'Ibn Abī Zayd al-Qayrawānī — auteur de *al-Risāla*
    description_en: |
      Abu Muhammad ʿAbdullah ibn Abi Zayd al-Qayrawani — Maliki
      jurist of Qayrawan, called by his contemporaries *Malik
      al-Saghir* ("the little Malik") for his command of Maliki
      fiqh, and author of *al-Risala fi al-Fiqh* — the
      foundational primer of the Maliki madhhab, taught to
      every Maliki child for a millennium and the most-
      memorised legal text in the entire Sunni tradition — died
      in Qayrawan at age about 76. *al-Risala* compresses the
      essential Maliki rulings on creed, ritual purity, prayer,
      fasting, almsgiving, and pilgrimage into a single
      120-page treatise of remarkable lucidity; its many
      classical commentaries (most famously al-Fakihani's and
      Zarruq's) constitute their own genre. His *al-Nawadir
      wa-l-Ziyadat* in fifteen volumes is the largest single
      compilation of Maliki rulings beyond *al-Mudawwana*. He
      defended Sunni Maliki orthodoxy against the Fatimid
      Ismaʿili presence in North Africa.
    description_ar: |
      توفي الإمام أبو محمد عبد الله بن أبي زيد القيرواني — فقيه
      مالكي بالقيروان، الملقب عند أقرانه بـ«مالك الصغير»
      لإحاطته بالمذهب المالكي، ومصنف «الرسالة في الفقه» — متن
      المذهب المالكي الأم، يدرّس لكل صبي مالكي قرابة ألف سنة،
      وأكثر متن فقهي حفظاً في تراث أهل السنة كله — بالقيروان
      عن نحو ست وسبعين سنة. وتركز «الرسالة» الأحكام المالكية
      الأصلية في العقيدة والطهارة والصلاة والصيام والزكاة والحج
      في متن في مئة وعشرين صفحة من اللوضوح اللافت؛ وشروحها
      الكلاسيكية الكثيرة (أشهرها للفاكهاني وزرّوق) صنف
      مستقل بذاته. وكتابه «النوادر والزيادات» في خمسة عشر
      مجلداً أكبر مجموعة فقهية مالكية بعد «المدونة». ودافع
      رحمه الله عن العقيدة السنية المالكية في وجه الوجود
      الفاطمي الإسماعيلي بشمال أفريقيا.
    description_fr: |
      Abu Muḥammad ʿAbdallāh ibn Abī Zayd al-Qayrawānī —
      juriste malikite de Qayrawan, appelé par ses contemporains
      *Mālik al-Ṣaghīr* (« le petit Mālik ») pour sa maîtrise
      du fiqh malikite, et auteur de *al-Risāla fī al-Fiqh* —
      le manuel fondateur du madhhab malikite, enseigné à
      chaque enfant malikite pendant un millénaire et le texte
      juridique le plus mémorisé de toute la tradition sunnite
      — mourut à Qayrawan à l'âge d'environ 76 ans. *al-Risāla*
      condense les jugements malikites essentiels sur le credo,
      la pureté rituelle, la prière, le jeûne, l'aumône et le
      pèlerinage en un traité unique de 120 pages d'une lucidité
      remarquable; ses nombreux commentaires classiques (les
      plus célèbres d'al-Fākihānī et de Zarrūq) constituent
      leur propre genre. Son *al-Nawādir wa-l-Ziyādāt* en quinze
      volumes est la plus grande compilation unique de jugements
      malikites au-delà d'*al-Mudawwana*. Il défendit
      l'orthodoxie sunnite malikite contre la présence
      ismaélienne fatimide en Afrique du Nord.
