  - slug: death-of-al-lakhmi
    category: scholar
    title_en: Death of Abu al-Hasan al-Lakhmi
    title_ar: وفاة أبي الحسن اللخمي
    title_fr: Mort d'Abū al-Ḥasan al-Lakhmī
    description_en: |
      Abu al-Hasan ʿAli ibn Muhammad al-Lakhmi al-Rabaʿi —
      Maliki jurist of Qayrawan and Ṣafaqus (modern Sfax),
      author of *al-Tabṣira fi Furuʿ al-Fiqh* (the Insight on
      Branches of Jurisprudence) — the second-most-extensive
      Maliki commentary on al-Mudawwana after Ibn Yunus al-
      Ṣiqilli, in twelve volumes — died at Sfax at age about
      78. The *Tabṣira* preserves the entire body of Qayrawani-
      Sfaxian Maliki tradition through the late fifth century
      AH; later authorities (Ibn ʿArafa, al-Wansharisi) cite
      it constantly. al-Lakhmi was famously rigorous in
      preferring the recorded position of Imam Malik over
      later Maliki accretions even when they had become
      conventional in his own region — a methodological
      principle of return-to-the-source that influenced the
      later Andalusian Maliki tradition. He served as qadi at
      Sfax and was admired for his unbending personal integrity.
    description_ar: |
      توفي الإمام أبو الحسن علي بن محمد اللخمي الربعي — فقيه
      مالكي من القيروان وصفاقس، ومصنف «التبصرة في فروع الفقه»
      (ثاني أوسع شرح مالكي على «المدونة» بعد ابن يونس الصقلي،
      في اثني عشر مجلداً) — بصفاقس عن نحو ثمانٍ وسبعين سنة.
      وتحفظ «التبصرة» التراث المالكي القيرواني-الصفاقسي إلى
      أواخر القرن الخامس الهجري؛ وعلى نقولها يعتمد المتأخرون
      (ابن عرفة والونشريسي). وعرف اللخمي بصرامة منهجه في تقديم
      أقوال الإمام مالك المنصوصة على ما طرأ على المذهب من
      توسعات لاحقة حتى لو كانت قد اعتمدت في وقته في إقليمه —
      وهو منهج «الرجوع إلى المصدر» أثر في تراث المالكية الأندلسي
      المتأخر. وتولى رحمه الله قضاء صفاقس، وأعجب الناس بصلابته
      الشخصية.
    description_fr: |
      Abu al-Ḥasan ʿAlī ibn Muḥammad al-Lakhmī al-Rabaʿī —
      juriste malikite de Qayrawan et Ṣafaqus (Sfax moderne),
      auteur d'*al-Tabṣira fī Furūʿ al-Fiqh* (l'Insight sur
      les Branches de la Jurisprudence) — le deuxième commentaire
      malikite le plus exhaustif d'al-Mudawwana après Ibn Yūnus
      al-Ṣiqillī, en douze volumes — mourut à Sfax à l'âge
      d'environ 78 ans. La *Tabṣira* préserve l'ensemble de la
      tradition malikite qayrawanaise-sfaxienne jusqu'à la fin
      du Ve siècle de l'Hégire; les autorités ultérieures (Ibn
      ʿArafa, al-Wansharīsī) la citent constamment. al-Lakhmī
      était célèbrement rigoureux à préférer la position
      consignée de l'imam Mālik aux accrétions malikites
      ultérieures même lorsqu'elles étaient devenues
      conventionnelles dans sa propre région — un principe
      méthodologique de retour-à-la-source qui influença la
      tradition malikite andalouse ultérieure. Il servit comme
      *qāḍī* à Sfax et fut admiré pour son intégrité personnelle
      inflexible.
    canonical_hijri: {year: 478, precision: year}
    canonical_gregorian: {date: 1085-01-01, precision: year, method: attested}
