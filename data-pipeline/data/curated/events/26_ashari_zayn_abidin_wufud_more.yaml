  - slug: death-of-nizam-al-din-awliya
    category: scholar
    title_en: Death of Khwaja Niẓam al-Din Awliyaʾ
    title_ar: وفاة خواجه نظام الدين أولياء
    title_fr: Mort de Khwāja Niẓām al-Dīn Awliyāʾ
    description_en: |
      Khwaja Niẓam al-Din Muhammad al-Bukhari al-Dihlawi —
      Indian Sunni Sufi shaykh of Delhi, fourth shaykh in the
      Chishti silsila after Khwaja Moinuddin Chishti, and
      called by his disciples *Sultan al-Mashayikh* (Sultan of
      the Masters) — died in Delhi at age about 89. His
      Sufi network became the most influential single
      institution of medieval Indian Sunni Islam: he taught
      and initiated the great mystical-poet Amir Khusraw, the
      historian Ḍiyaʾ al-Din Barani, and a generation of Delhi
      sultanate political and cultural figures. His *darga* in
      Delhi remains one of the largest active Sufi shrines in
      the Indian subcontinent, drawing tens of thousands of
      visitors weekly. The hagiographic *Fawaʾid al-Fuʾad* of
      his disciple Amir Hasan Sijzi (a daily diary of the
      shaykh's discourses, in Persian) is one of the most
      important sources for medieval Indian Sufi adab.
    description_ar: |
      توفي خواجه نظام الدين محمد البخاري الدهلوي — شيخ صوفي سني
      هندي بدلهي، رابع شيوخ السلسلة الجشتية بعد الخواجه معين
      الدين الجشتي، الذي يدعوه مريدوه «سلطان المشايخ» — بدلهي
      عن نحو تسع وثمانين سنة. وصارت شبكته الصوفية أكبر مؤسسة
      منفردة في الإسلام السني الهندي في العصر الوسيط: درّس
      وأنشأ الشاعر الصوفي الكبير أمير خسرو، والمؤرخ ضياء
      الدين برني، وجيلاً من السياسيين والمثقفين في سلطنة
      دلهي. وما زال «درغاهه» بدلهي من أكبر المزارات الصوفية
      الفاعلة في شبه القارة الهندية، يأم عشرات الألوف من
      الزوار أسبوعياً. وكتاب «فوائد الفؤاد» لمريده أمير حسن
      السجزي (يوميات لمجالس الشيخ بالفارسية) من أهم مصادر
      الأدب الصوفي الهندي الكلاسيكي.
    description_fr: |
      Khwāja Niẓām al-Dīn Muḥammad al-Bukhārī al-Dihlawī —
      shaykh soufi sunnite indien de Delhi, quatrième shaykh
      dans la *silsila* Chishtī après Khwāja Moinuddin Chishtī,
      et appelé par ses disciples *Sulṭān al-Mashāyikh* (Sultan
      des Maîtres) — mourut à Delhi à l'âge d'environ 89 ans.
      Son réseau soufi devint l'institution unique la plus
      influente de l'islam sunnite indien médiéval : il enseigna
      et initia le grand poète mystique Amīr Khusraw, l'historien
      Ḍiyāʾ al-Dīn Baranī, et une génération de figures
      politiques et culturelles du sultanat de Delhi. Sa
      *dargāh* à Delhi demeure l'un des plus grands sanctuaires
      soufis actifs du sous-continent indien, attirant des
      dizaines de milliers de visiteurs chaque semaine. Le
      *Fawāʾid al-Fuʾād* hagiographique de son disciple Amīr
      Ḥasan Sijzī (un journal quotidien des discours du
      shaykh, en persan) est l'une des sources les plus
      importantes de l'*adab* soufi indien médiéval.
