  - slug: conversion-of-umar
    category: prophetic
    title_en: Conversion of ʿUmar ibn al-Khaṭṭab ra
    title_ar: إسلام عمر بن الخطاب رضي الله عنه
    title_fr: Conversion d'ʿUmar ibn al-Khaṭṭāb ra
    description_en: |
      ʿUmar ibn al-Khaṭṭab — leading Quraysh young man, ardent
      enemy of the Muslims, who had set out from his home with
      drawn sword to assassinate the Prophet ﷺ — embraced Islam
      after a chance encounter that led him first to his
      sister Fāṭima bint al-Khaṭṭab's house, where he overheard
      her and her husband Saʿid ibn Zayd reciting the early
      surahs of the Qurʾan. Striking his sister to the ground
      in fury, then witnessing her resolute declaration of
      faith, he asked to read the parchment. He recited Sūrat
      Ṭa-Hā (Q 20) and was so transformed by it that he went
      directly to the Prophet ﷺ, drew his sword in his hand,
      and pronounced the *shahada*. The Prophet ﷺ had recently
      prayed: "O Allah, strengthen Islam with one of the two
      ʿUmars" (ʿUmar ibn al-Khaṭṭab or ʿUmar ibn Hisham, Abu
      Jahl); the supplication was answered. The conversion
      crystallised the Muslim community's first public openness
      in Mecca: from that day, the Muslims prayed at the
      Kaʿba.
    description_ar: |
      أسلم عمر بن الخطاب رضي الله عنه — وكان شاباً قرشياً
      مبارزاً، شديد العداوة للمسلمين، وقد خرج من بيته بسيف
      مسلول يقصد قتل النبي ﷺ — بعد لقاء عرضي قاده أولاً إلى
      دار أخته فاطمة بنت الخطاب، حيث سمعها وزوجها سعيد بن زيد
      يقرآن أوائل سور القرآن. ضرب أخته أرضاً في غضبه، ثم رأى
      ثباتها على شهادتها، فطلب أن يقرأ في الصحيفة. قرأ سورة
      طه (سورة ٢٠) فهزته هزاً، فمضى مباشرة إلى رسول الله ﷺ
      والسيف في يده، فأعلن الشهادة. وقد كان النبي ﷺ دعا قبل
      ذلك: «اللهم أعزّ الإسلام بأحب هذين الرجلين إليك: بعمر
      بن الخطاب أو بعمرو بن هشام» (أبي جهل)؛ فاستُجيب الدعاء.
      وكانت إسلامه أول انفتاح علني للجماعة المسلمة بمكة: فمن
      ذلك اليوم صلى المسلمون عند الكعبة.
    description_fr: |
      ʿUmar ibn al-Khaṭṭāb — éminent jeune homme de Quraysh,
      ennemi ardent des musulmans, qui s'était mis en route de
      chez lui avec son épée tirée pour assassiner le
      Prophète ﷺ — embrassa l'Islam après une rencontre
      fortuite qui le mena d'abord à la maison de sa sœur
      Fāṭima bint al-Khaṭṭāb, où il entendit son mari Saʿīd
      ibn Zayd réciter les premières sourates du Coran. Frappant
      sa sœur au sol dans sa fureur, puis témoignant de sa
      déclaration résolue de foi, il demanda à lire le
      parchemin. Il récita la sourate Ṭā Hā (Q 20) et en fut
      tellement transformé qu'il alla directement au Prophète ﷺ,
      tira l'épée à la main, et prononça la *shahāda*. Le
      Prophète ﷺ avait récemment prié : « ô Allah, fortifie
      l'Islam par l'un des deux ʿUmar » (ʿUmar ibn al-Khaṭṭāb
      ou ʿUmar ibn Hishām, Abū Jahl); la supplication fut
      exaucée. La conversion cristallisa la première ouverture
      publique de la communauté musulmane à La Mecque : à
      partir de ce jour, les musulmans prièrent à la Kaʿba.
    canonical_hijri: {year: -7, precision: year}
    canonical_gregorian: {date: 616-07-01, precision: year, method: attested}
