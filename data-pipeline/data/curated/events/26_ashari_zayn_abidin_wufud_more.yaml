  - slug: death-of-aqil-ibn-abi-talib
    category: companion
    title_en: Death of ʿAqil ibn Abi Ṭalib ra
    title_ar: وفاة عقيل بن أبي طالب رضي الله عنه
    title_fr: Mort de ʿAqīl ibn Abī Ṭālib ra
    description_en: |
      Abu Yazid ʿAqil ibn Abi Ṭalib ibn ʿAbd al-Muṭṭalib —
      paternal first cousin of the Prophet ﷺ, elder brother of
      ʿAli ra and Jaʿfar ra, the leading authority on Quraysh
      genealogy in the early Islamic period — died in Medina
      at age about 96. He was captured at Badr fighting on the
      Quraysh side, ransomed by his uncle al-ʿAbbas, and
      embraced Islam shortly before the Conquest of Mecca. He
      was the principal informant of all later genealogists
      (most prominently Ibn al-Kalbi and al-Zubayr ibn Bakkar)
      on the lineages and family histories of Quraysh; the
      knowledge that survives of pre-Islamic Meccan tribal
      structure largely descends through him. He retired into
      neutrality during the first fitna, lodging with Muʿawiya
      ra in Damascus while continuing to defend his brother
      ʿAli's right to the caliphate.
    description_ar: |
      توفي أبو يزيد عقيل بن أبي طالب بن عبد المطلب رضي الله عنه
      — ابن عم النبي ﷺ من أبيه، وأكبر إخوة علي وجعفر رضي الله
      عنهما، وكبير علماء أنساب قريش في عصر الإسلام الأول —
      بالمدينة المنورة عن نحو ست وتسعين سنة. أُسر يوم بدر وكان
      مع المشركين، فافتداه عمه العباس، وأسلم قبيل فتح مكة. وكان
      المخبر الأصلي لكل نسابة لاحق (ولا سيما ابن الكلبي والزبير
      بن بكار) في أنساب قريش وتراجم بطونها؛ وما حفظ من أنسابهم
      في الجاهلية ينحدر في عامته منه. واعتزل في الفتنة الأولى
      لاجئاً إلى معاوية رضي الله عنه بدمشق، مع دفاعه المستمر عن
      أحقية أخيه علي رضي الله عنه بالخلافة.
    description_fr: |
      Abu Yazīd ʿAqīl ibn Abī Ṭālib ibn ʿAbd al-Muṭṭalib —
      cousin germain paternel du Prophète ﷺ, frère aîné d'ʿAlī
      ra et de Jaʿfar ra, principale autorité sur la généalogie
      de Quraysh à la période islamique ancienne — mourut à
      Médine à l'âge d'environ 96 ans. Il fut capturé à Badr
      combattant du côté de Quraysh, racheté par son oncle
      al-ʿAbbās, et embrassa l'Islam peu avant la conquête de
      La Mecque. Il fut l'informateur principal de tous les
      généalogistes ultérieurs (le plus en vue Ibn al-Kalbī et
      al-Zubayr ibn Bakkār) sur les lignées et les histoires
      familiales de Quraysh; la connaissance qui survit de la
      structure tribale mecquoise préislamique descend largement
      à travers lui. Il se retira dans la neutralité durant la
      première *fitna*, logeant avec Muʿāwiya ra à Damas tout
      en continuant à défendre le droit de son frère ʿAlī au
      califat.
