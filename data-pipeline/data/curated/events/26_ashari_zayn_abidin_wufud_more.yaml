  - slug: death-of-al-aswad-al-nakhai
    category: scholar
    title_en: Death of al-Aswad ibn Yazid al-Nakhaʿi
    title_ar: وفاة الأسود بن يزيد النخعي
    title_fr: Mort d'al-Aswad ibn Yazīd al-Nakhaʿī
    description_en: |
      Abu ʿAmr al-Aswad ibn Yazid al-Nakhaʿi — leading tabiʿi
      jurist of Kufa, foremost direct student of ʿAbdullah ibn
      Masʿud ra, and a primary teacher of Ibrahim al-Nakhaʿi
      (whose own student Hammad ibn Abi Sulayman would teach
      Abu Hanifa) — died in Kufa at age about 75. The Iraqi
      jurisprudential lineage that runs from Ibn Masʿud through
      al-Aswad and his brother ʿAlqama ibn Qays to Ibrahim al-
      Nakhaʿi to Hammad to Abu Hanifa is the foundation of the
      Hanafi madhhab; al-Aswad's positions are quoted throughout
      ʿAbd al-Razzaq al-Ṣanʿani's *Muṣannaf* and Ibn Abi Shayba's
      *Muṣannaf* as defining the early Iraqi school. He
      performed Hajj more than seventy times. al-Shaʿbi said of
      him: "Al-Aswad would fast in summer until I thought he
      would die, then break the fast at night to a single
      morsel — and he was a stalwart of all the prayers."
    description_ar: |
      توفي الإمام أبو عمرو الأسود بن يزيد النخعي — كبير فقهاء
      التابعين بالكوفة، أعلم تلاميذ عبد الله بن مسعود رضي الله
      عنه مباشرة، وشيخ إبراهيم النخعي (الذي ستلميذه حماد بن
      أبي سليمان مدرّس أبي حنيفة) — بالكوفة عن نحو خمس
      وسبعين سنة. والسلسلة الفقهية العراقية الجارية من ابن
      مسعود عبر الأسود وأخيه علقمة بن قيس إلى إبراهيم النخعي
      إلى حماد إلى أبي حنيفة هي الأصل الذي قام عليه المذهب
      الحنفي؛ وأقوال الأسود مذكورة في «مصنف» عبد الرزاق
      الصنعاني و«مصنف» ابن أبي شيبة بصفتها معالم لمدرسة العراق
      الباكر. حج رحمه الله أكثر من سبعين حجة. قال عنه الشعبي:
      «كان الأسود يصوم في الصيف حتى أحسبه ميتاً ثم يفطر
      ليلاً على كسرة — وكان قائماً في الصلوات كلها».
    description_fr: |
      Abu ʿAmr al-Aswad ibn Yazīd al-Nakhaʿī — principal juriste
      tabiʿī de Koufa, premier élève direct d'ʿAbdullāh ibn
      Masʿūd ra, et l'un des principaux enseignants d'Ibrāhīm
      al-Nakhaʿī (dont l'élève Ḥammād ibn Abī Sulaymān
      enseignerait Abū Ḥanīfa) — mourut à Koufa à l'âge
      d'environ 75 ans. La lignée jurisprudentielle irakienne
      qui passe d'Ibn Masʿūd à travers al-Aswad et son frère
      ʿAlqama ibn Qays jusqu'à Ibrāhīm al-Nakhaʿī à Ḥammād à
      Abū Ḥanīfa est le fondement du madhhab hanafite; les
      positions d'al-Aswad sont citées tout du long dans le
      *Muṣannaf* de ʿAbd al-Razzāq al-Ṣanʿānī et le *Muṣannaf*
      d'Ibn Abī Shayba comme définissant l'école irakienne
      ancienne. Il accomplit le Ḥajj plus de soixante-dix fois.
      al-Shaʿbī dit de lui : « al-Aswad jeûnait en été jusqu'à
      ce que je le crusse mort, puis rompait le jeûne la nuit
      sur un seul morceau — et il était un pilier de toutes les
      prières ».
