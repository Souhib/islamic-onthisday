  - slug: battle-of-buwayb
    category: battle
    title_en: Battle of al-Buwayb — al-Muthanna's Iraq Campaign
    title_ar: معركة البويب — حملة المثنى على العراق
    title_fr: Bataille d'al-Buwayb — campagne irakienne d'al-Muthannā
    description_en: |
      al-Muthanna ibn Ḥaritha al-Shaybani, sahabi commander of
      the Muslim forces along the Euphrates after the recall of
      Khalid ibn al-Walid ra to Syria, decisively defeated a
      Sasanian Persian army at al-Buwayb (a tributary of the
      Euphrates near Kufa). The victory restored Muslim control
      of the western Iraqi countryside after the catastrophic
      Battle of the Bridge (*Yawm al-Jisr*) of 13 AH had cost
      the lives of Abu ʿUbayd al-Thaqafi and four thousand
      Muslim soldiers. al-Muthanna was killed shortly after
      from wounds sustained in the engagement; Saʿd ibn Abi
      Waqqāṣ ra succeeded him in command and led the Muslim
      forces to the decisive Battle of Qadisiyya the following
      year. Without al-Buwayb's stabilisation of the western
      Iraqi front, the rapid Muslim conquest of Sasanian Persia
      that followed would have been impossible.
    description_ar: |
      هزم المثنى بن حارثة الشيباني — الصحابي قائد الجيش
      الإسلامي على نهر الفرات بعد سحب خالد بن الوليد رضي الله
      عنه إلى الشام — جيش الفرس الساسانيين هزيمة فاصلة في
      «البويب» (رافد للفرات قرب الكوفة). وأعاد النصر السيطرة
      الإسلامية على ريف العراق الغربي بعد كارثة «يوم الجسر»
      سنة ثلاث عشرة للهجرة الذي ذهب فيه أبو عبيد الثقفي
      وأربعة آلاف من جند المسلمين. وقتل المثنى بعد ذلك بقليل
      متأثراً بإصابته في المعركة؛ فخلفه سعد بن أبي وقاص رضي
      الله عنه في الإمارة، وقاد الجيش الإسلامي إلى نصر
      القادسية الفاصل في السنة التالية. ولولا تثبيت البويب
      جبهة العراق الغربية لما تمت الفتوح الإسلامية المتسارعة
      على فارس الساسانية بعدها.
    description_fr: |
      al-Muthannā ibn Ḥāritha al-Shaybānī, commandant ṣaḥābī
      des forces musulmanes le long de l'Euphrate après le
      rappel de Khālid ibn al-Walīd ra en Syrie, défit de
      manière décisive une armée perse sassanide à al-Buwayb
      (un affluent de l'Euphrate près de Koufa). La victoire
      restaura le contrôle musulman de la campagne irakienne
      occidentale après la bataille catastrophique du Pont
      (*Yawm al-Jisr*) de 13 H qui avait coûté la vie d'Abū
      ʿUbayd al-Thaqafī et de quatre mille soldats musulmans.
      al-Muthannā fut tué peu après de blessures subies dans
      l'engagement; Saʿd ibn Abī Waqqāṣ ra lui succéda au
      commandement et mena les forces musulmanes à la bataille
      décisive de Qādisiyya l'année suivante. Sans la
      stabilisation par al-Buwayb du front irakien occidental,
      la conquête musulmane rapide de la Perse sassanide qui
      s'ensuivit aurait été impossible.
    canonical_hijri: {year: 13, month: 9, precision: month}
    canonical_gregorian: {date: 634-11-01, precision: month, method: tabular_conversion}
