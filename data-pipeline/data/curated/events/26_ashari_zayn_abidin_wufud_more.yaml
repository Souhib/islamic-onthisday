  # FOUNDER OF ASH'ARI CREED
  # =========================================================================

  - slug: death-of-al-ashari
    category: scholar
    title_en: Death of Abu al-Hasan al-Ashʿari — Founder of the Ashʿari Creed
    title_ar: وفاة أبي الحسن الأشعري — مؤسس العقيدة الأشعرية
    title_fr: Mort d'Abū al-Ḥasan al-Ashʿarī — fondateur du credo ashʿarite
    description_en: |
      Abu al-Hasan ʿAli ibn Ismaʿil al-Ashʿari — Shafiʿi scholar
      of Basra and Baghdad, eponymous founder of the Ashʿari
      school of Sunni theology that, alongside the Maturidi
      school of his exact contemporary Abu Manṣur al-Maturidi,
      came to define Sunni orthodox kalam — died in Baghdad at
      age about 64. He was raised in the Muʿtazili school under
      his stepfather al-Jubbaʾi but at age 40 publicly renounced
      Muʿtazili rationalism and embraced the Athari position of
      Aḥmad ibn Ḥanbal on the divine attributes — though
      adopting kalam-method argumentation in defending it
      against Muʿtazili and rationalist challenges. His major
      surviving works include *al-Ibana ʿan Uṣul al-Diyana*,
      *Maqalat al-Islamiyyin* (the foundational doxographical
      survey of Islamic schools through the early fourth century
      AH), and *al-Lumaʿ*. The Ashʿari creed, systematised by
      al-Baqillani, al-Juwayni, and al-Ghazali after him, became
      the dominant theology of the Shafiʿi and Maliki madhahib
      and remains the official creed today across Egypt, the
      Levant, the Maghreb, Yemen, the Indian subcontinent
      coastal Sunni networks, and Southeast Asia.
    description_ar: |
      توفي الإمام أبو الحسن علي بن إسماعيل الأشعري — فقيه شافعي
      بالبصرة وبغداد، ومؤسس المدرسة الأشعرية في علم العقيدة
      عند أهل السنة، التي صارت — مع المدرسة الماتريدية لمعاصره
      أبي منصور الماتريدي — هي المدرستان السنيتان المعتبرتان
      في علم الكلام — ببغداد عن نحو أربع وستين سنة. نشأ على
      المعتزلة عند زوج أمه أبي علي الجبائي، فلما بلغ أربعين سنة
      خرج عليهم في مسجد البصرة الجامع وأعلن الرجوع إلى مذهب
      أحمد بن حنبل في الصفات — وإن استخدم منهج الكلام في
      الدفاع عنه ضد المعتزلة وأهل التأويل العقلي. ومن أهم ما
      وصل من كتبه: «الإبانة عن أصول الديانة»، و«مقالات
      الإسلاميين» (الكتاب الأم في المذاهب الإسلامية إلى
      أوائل القرن الرابع الهجري)، و«اللمع». ونهج الأشعرية
      الذي قنّنه الباقلاني والجويني والغزالي بعده، صار
      السائد عند الشافعية والمالكية، وما زال العقيدة الرسمية
      اليوم في مصر والشام والمغرب الإسلامي واليمن وشبكات
      السنة الساحلية بشبه القارة الهندية وجنوب شرق آسيا.
    description_fr: |
      Abu al-Ḥasan ʿAli ibn Ismāʿīl al-Ashʿarī — savant shāfiʿite
      de Bassora et Bagdad, fondateur éponyme de l'école
      ashʿarite de la théologie sunnite qui, aux côtés de
      l'école māturīdite de son strict contemporain Abū Manṣūr
      al-Māturīdī, en vint à définir le *kalām* sunnite
      orthodoxe — mourut à Bagdad à l'âge d'environ 64 ans. Il
      fut élevé dans l'école muʿtazilite sous son beau-père
      al-Jubbāʾī mais à 40 ans renonça publiquement au
      rationalisme muʿtazilite et embrassa la position athari
      d'Aḥmad ibn Ḥanbal sur les attributs divins — tout en
      adoptant l'argumentation par méthode *kalām* pour la
      défendre contre les défis muʿtazilites et rationalistes.
      Ses œuvres majeures survivantes incluent *al-Ibāna ʿan
      Uṣūl al-Diyāna*, *Maqālāt al-Islāmiyyīn* (l'enquête
      doxographique fondatrice des écoles islamiques jusqu'au
      début du IVe siècle de l'Hégire), et *al-Lumaʿ*. Le credo
      ashʿarite, systématisé par al-Bāqillānī, al-Juwaynī et
      al-Ghazālī après lui, devint la théologie dominante des
      madhāhib shāfiʿite et malikite et demeure le credo officiel
      aujourd'hui à travers l'Égypte, le Levant, le Maghreb, le
      Yémen, les réseaux sunnites côtiers du sous-continent
      indien et l'Asie du Sud-Est.
