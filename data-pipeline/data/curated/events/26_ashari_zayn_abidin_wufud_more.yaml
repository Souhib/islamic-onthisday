  - slug: death-of-mulla-ali-al-qari
    category: scholar
    title_en: Death of Mulla ʿAli al-Qari
    title_ar: وفاة ملا علي القاري
    title_fr: Mort de Mullā ʿAlī al-Qārī
    description_en: |
      Nur al-Din ʿAli ibn Sulṭan al-Harawi al-Qari — Hanafi-
      Maturidi muḥaddith and qari of Mecca, of Afghan origin,
      who emigrated to Mecca in his youth and remained there
      for the rest of his life teaching hadith and Qurʾanic
      sciences — died in Mecca at age about 84. Among the most
      prolific authors in Sunni history (his works exceed 200
      titles), his major surviving works include *Mirqat al-
      Mafatiḥ* (the standard Sunni commentary on al-Tabrizi's
      *Mishkat al-Maṣabiḥ*, in eleven volumes), *Sharḥ al-
      Shifa* (the most-cited commentary on al-Qaḍi ʿIyaḍ's
      *al-Shifa*), and *al-Asrar al-Marfuʿa fi al-Akhbar al-
      Mawḍuʿa* (a foundational treatise on forged hadiths).
      Through these works he became the principal Sunni
      authority of his age in the Hanafi-Maturidi-Mecca-and-
      hadith intersection, and his judgements remain
      authoritative across Hanafi-Maturidi networks today
      from Turkey to South Asia.
    description_ar: |
      توفي العلامة نور الدين علي بن سلطان الهروي القاري — محدث
      حنفي ماتريدي وقارئ بمكة المكرمة، من أصول هروية أفغانية،
      هاجر إلى مكة شاباً وأقام فيها بقية عمره مدرّساً للحديث
      وعلوم القرآن — بمكة عن نحو أربع وثمانين سنة. وهو من أوفر
      المصنفين في تاريخ السنة (تجاوزت كتبه مئتي عنوان)، ومن أبرز
      ما وصل من كتبه: «مرقاة المفاتيح» (الشرح المعتمد على
      «مشكاة المصابيح» للتبريزي، في أحد عشر مجلداً)، و«شرح
      الشفا» (أكثر شروح «الشفا» للقاضي عياض إحالة عليها)،
      و«الأسرار المرفوعة في الأخبار الموضوعة» (متن أصل في
      الأحاديث الموضوعة). وبهذه الأعمال صار المرجع السني الأكبر
      في عصره في تقاطع المذهب الحنفي والعقيدة الماتريدية ومكة
      وعلم الحديث، ولا تزال أحكامه معتمدة في شبكات الحنفية
      الماتريدية اليوم من تركيا إلى جنوب آسيا.
    description_fr: |
      Nūr al-Dīn ʿAlī ibn Sulṭān al-Harawī al-Qārī — muḥaddith
      hanafite-māturīdite et *qārī* de La Mecque, d'origine
      afghane, qui émigra à La Mecque jeune et y demeura pour
      le reste de sa vie enseignant le hadith et les sciences
      coraniques — mourut à La Mecque à l'âge d'environ 84 ans.
      Parmi les auteurs les plus prolifiques de l'histoire
      sunnite (ses œuvres dépassent 200 titres), ses œuvres
      majeures survivantes incluent *Mirqāt al-Mafātīḥ* (le
      commentaire sunnite standard du *Mishkāt al-Maṣābīḥ* d'al-
      Tabrīzī, en onze volumes), *Sharḥ al-Shifāʾ* (le commentaire
      le plus cité d'*al-Shifāʾ* d'al-Qāḍī ʿIyāḍ), et *al-Asrār
      al-Marfūʿa fī al-Akhbār al-Mawḍūʿa* (traité fondateur sur
      les hadiths forgés). À travers ces œuvres il devint
      l'autorité sunnite principale de son âge à l'intersection
      hanafite-māturīdite-mecquoise-hadith, et ses jugements
      demeurent autoritatifs à travers les réseaux hanafite-
      māturīdites aujourd'hui de la Turquie à l'Asie du Sud.
    canonical_hijri: {year: 1014, precision: year}
    canonical_gregorian: {date: 1605-01-01, precision: year, method: tabular_conversion}
