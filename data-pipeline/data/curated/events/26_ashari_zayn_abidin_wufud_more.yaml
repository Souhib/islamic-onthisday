  - slug: battle-of-marj-al-suffar
    category: battle
    title_en: Battle of Marj al-Ṣuffar — first major engagement in Syria
    title_ar: معركة مرج الصفر — أول معركة كبيرة في الشام
    title_fr: Bataille de Marj al-Ṣuffar — premier engagement majeur en Syrie
    description_en: |
      The combined Muslim armies under Khalid ibn al-Walid ra
      and Abu ʿUbayda ibn al-Jarrah ra defeated a Byzantine
      force south of Damascus at Marj al-Ṣuffar, in the first
      large-scale engagement of the Muslim conquest of Syria.
      The battle was fought on the wedding night of Khalid's
      lieutenant al-Qaʿqaʿ ibn ʿAmr al-Tamimi (whose bride was
      a Companion's sister) — al-Qaʿqaʿ left the marriage
      celebration to fight, won the engagement, and returned
      to consummate the marriage that night, an episode the
      classical histories preserve as exemplifying the
      Companions' priorities. The victory opened the road to
      Damascus, which would surrender to Khalid ibn al-Walid
      after a six-month siege the following year. The plain
      of Marj al-Ṣuffar would be the site of two more major
      battles in subsequent Muslim history: against the
      Byzantines in 13 AH and against the Mongols in 720 AH.
    description_ar: |
      هزمت جيوش المسلمين المجتمعة بقيادة خالد بن الوليد وأبي
      عبيدة بن الجراح رضي الله عنهما قوة بيزنطية جنوب دمشق
      في «مرج الصفر»، في أول معركة كبيرة في الفتح الإسلامي
      للشام. وخيضت المعركة في ليلة عرس قائد خالد القعقاع بن
      عمرو التميمي (وكانت زوجه أخت صحابي) — فترك القعقاع
      حفل عرسه ليقاتل، ففاز في الإحدى، فعاد إلى عرسه ليبني
      بأهله تلك الليلة، وهي حادثة تحفظها كتب التاريخ
      الكلاسيكية شاهداً على أولويات الصحابة. وفتح النصر
      الطريق إلى دمشق التي ستستسلم لخالد بن الوليد بعد حصار
      ستة أشهر في السنة التالية. وكان سهل مرج الصفر موضع
      معركتين كبريين أخريين في تاريخ المسلمين اللاحق: ضد
      الروم سنة ١٣ هـ، وضد المغول سنة ٧٢٠ هـ.
    description_fr: |
      Les armées musulmanes combinées sous Khālid ibn al-Walīd
      ra et Abū ʿUbayda ibn al-Jarrāḥ ra défirent une force
      byzantine au sud de Damas à Marj al-Ṣuffar, dans le
      premier engagement à grande échelle de la conquête
      musulmane de la Syrie. La bataille fut livrée la nuit du
      mariage du lieutenant de Khālid al-Qaʿqāʿ ibn ʿAmr
      al-Tamīmī (dont la mariée était la sœur d'un Compagnon)
      — al-Qaʿqāʿ quitta la célébration du mariage pour
      combattre, remporta l'engagement, et retourna consommer
      le mariage cette nuit-là, un épisode que les histoires
      classiques préservent comme illustrant les priorités
      des Compagnons. La victoire ouvrit la route de Damas,
      qui capitulerait devant Khālid ibn al-Walīd après un
      siège de six mois l'année suivante. La plaine de Marj
      al-Ṣuffar serait le théâtre de deux autres grandes
      batailles dans l'histoire musulmane ultérieure : contre
      les Byzantins en 13 H et contre les Mongols en 720 H.
