  - slug: death-of-ibn-khafaja
    category: scholar_death
    title_en: Death of Ibn Khafāja al-Andalusī — Poet of the Garden
    title_ar: وفاة ابن خفاجة الأندلسي — شاعر الطبيعة الأندلسية
    title_fr: Mort d'Ibn Khafāja al-Andalusī — poète du jardin
    description_en: |
      Abū Isḥāq Ibrāhīm ibn Abī al-Fatḥ ibn Khafāja al-Andalusī —
      poet of Alzira (Jazīrat Shuqr) on the Júcar river in the
      Sharq al-Andalus, active under the Almoravid governors
      of Valencia, the universally-acknowledged master of the
      Andalusi *rawḍiyya* (garden-and-river ode) and *waṣf
      al-ṭabīʿa* (description of nature) — died in Alzira in
      533 AH (1138–39 CE), at age over eighty. His *Dīwān*
      preserves the most concentrated body of pastoral and
      landscape poetry in the Andalusi tradition, with extended
      descriptive sequences on the Júcar valley, garden
      orchards, mountains, and storms that became the model
      for later Andalusi-Maghribi poetry of place. Ibn
      Khallikān places the wafāh in 533 AH at Alzira;
      al-Dhahabī confirms in *Tārīkh al-Islām*. The classical
      sources retain only the year.
    description_ar: |
      توفي أبو إسحاق إبراهيم بن أبي الفتح بن خفاجة الأندلسي
      — شاعر جزيرة شُقر على نهر شُقر في شرق الأندلس، اشتُهر
      في أيام ولاة المرابطين على بلنسية، وهو إمام «الروضيات»
      ووصف الطبيعة في الأدب الأندلسي بلا منازع — في جزيرة
      شُقر سنة ٥٣٣ هـ (الموافق ١١٣٨–٣٩ م) وعمره يربو على
      الثمانين. وفي ديوانه أوسعُ ما نُظم في الأدب الأندلسي
      من شعر الرعاء ووصف المنازل، وفيه فصول طويلة في وصف
      وادي شُقر وبساتينه وجباله وأنوائه، صارت نموذجاً للشعر
      الأندلسي والمغربي بعده في وصف المكان. وأرّخ ابن خلكان
      وفاته بسنة ٥٣٣ هـ بجزيرة شُقر؛ وأكّد ذلك الذهبي في
      «تاريخ الإسلام». ولا تحفظ المصادر القديمة سوى السنة.
    description_fr: |
      Abū Isḥāq Ibrāhīm ibn Abī al-Fatḥ ibn Khafāja al-Andalusī
      — poète d'Alzira (Jazīrat Shuqr) sur le Júcar dans le
      Sharq al-Andalus, actif sous les gouverneurs almoravides
      de Valence, maître universellement reconnu de la
      *rawḍiyya* (ode de jardin et de rivière) andalousie et
      du *waṣf al-ṭabīʿa* (description de la nature) — mourut
      à Alzira en 533 H (1138–39 EC), âgé de plus de quatre-
      vingts ans. Son *Dīwān* conserve le corpus de poésie
      pastorale et paysagère le plus concentré de la tradition
      andalouse, avec des suites descriptives étendues sur la
      vallée du Júcar, les vergers, les montagnes et les
      orages, qui devinrent le modèle de la poésie andalousie-
      maghrébine ultérieure du lieu. Ibn Khallikān place la
      *wafāh* en 533 H à Alzira; al-Dhahabī le confirme dans
      *Tārīkh al-Islām*. Les sources classiques ne retiennent
      que l'année.
