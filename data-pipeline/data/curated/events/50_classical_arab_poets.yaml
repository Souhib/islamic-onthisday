  # =========================================================================
  # AL-JĀḤIẒ — THE GREAT ABBASID PROSE-MASTER
  # =========================================================================

  - slug: death-of-al-jahiz
    category: scholar_death
    title_en: Death of al-Jāḥiẓ — Author of *al-Bayān wa-l-Tabyīn*
    title_ar: وفاة الجاحظ — صاحب «البيان والتبيين»
    title_fr: Mort d'al-Jāḥiẓ — auteur d'*al-Bayān wa-l-Tabyīn*
    description_en: |
      Abū ʿUthmān ʿAmr ibn Baḥr al-Kinānī al-Baṣrī, known as
      al-Jāḥiẓ ("the goggle-eyed") — Basran-Baghdādī Muʿtazilī
      littérateur and the founding figure of Arabic *adab*
      prose, author of *al-Bayān wa-l-Tabyīn* (a foundational
      treatise on Arabic eloquence and rhetoric), *Kitāb al-
      Ḥayawān* (a seven-volume zoology that doubles as a
      compendium of Arabic poetic and proverbial lore), *Kitāb
      al-Bukhalāʾ* ("The Book of Misers"), and dozens of further
      epistles on theology, sociology, and natural history —
      died at Basra in Muḥarram 255 AH (December 868 / January
      869 CE), reportedly at age over ninety, when a stack of
      books fell on him in his library. Ibn Khallikān places
      the death in Muḥarram 255 AH at Basra; al-Dhahabī gives
      the same year in *Siyar Aʿlām al-Nubalāʾ*. The day within
      Muḥarram is not consistently preserved.
    description_ar: |
      توفي أبو عثمان عمرو بن بحر الكناني البصري المعروف
      بالجاحظ — أديبٌ بصريٌّ بغداديٌّ معتزليٌّ، مؤسسُ نثر
      الأدب العربي، صاحب «البيان والتبيين» في علم البلاغة
      العربية، و«كتاب الحيوان» في سبعة أجزاء يتوسل فيه إلى
      علم الأحياء بشواهد الشعر والأمثال العربية، و«البخلاء»،
      وعشرات الرسائل الأخرى في الكلام وعلم الاجتماع
      وتاريخ الطبيعة — بالبصرة في محرم سنة ٢٥٥ هـ (ديسمبر
      ٨٦٨ – يناير ٨٦٩ م) وعمره ينيف على التسعين، إذ سقطت
      عليه مجموعة من كتبه في خزانته فقتلته. وضبط ابن خلكان
      وفاته في محرم سنة ٢٥٥ هـ بالبصرة، وأكّد الذهبي السنة
      في «سير أعلام النبلاء». ولم يُحفظ اليومُ من محرم
      على وجه الاتفاق.
    description_fr: |
      Abū ʿUthmān ʿAmr ibn Baḥr al-Kinānī al-Baṣrī, dit
      al-Jāḥiẓ (« celui aux yeux saillants ») — littérateur
      basrien-bagdādien muʿtazilite et figure fondatrice de la
      prose *adab* arabe, auteur d'*al-Bayān wa-l-Tabyīn*
      (traité fondateur de l'éloquence et de la rhétorique
      arabes), du *Kitāb al-Ḥayawān* (une zoologie en sept
      volumes qui sert également de compendium de poésie et de
      proverbes arabes), du *Kitāb al-Bukhalāʾ* (« Livre des
      avares »), et de dizaines d'autres épîtres sur la
      théologie, la sociologie et l'histoire naturelle —
      mourut à Bassora en Muḥarram 255 H (décembre 868 –
      janvier 869 EC), réputé avoir dépassé les quatre-vingt-
      dix ans, lorsqu'une pile de livres s'effondra sur lui
      dans sa bibliothèque. Ibn Khallikān place la mort en
      Muḥarram 255 H à Bassora; al-Dhahabī donne la même
      année dans *Siyar Aʿlām al-Nubalāʾ*. Le jour du mois
      de Muḥarram n'est pas conservé de manière cohérente.
    canonical_hijri: {year: 255, month: 1, precision: month}
    canonical_gregorian: {date: 868-12-01, precision: month, method: tabular_conversion}
    claims:
