  - slug: death-of-ibn-al-mutazz
    category: scholar_death
    title_en: Death of Ibn al-Muʿtazz — One-Day Caliph and Poet-Critic
    title_ar: وفاة ابن المعتز — خليفة يوم وإمام النقد البلاغي
    title_fr: Mort d'Ibn al-Muʿtazz — calife d'un jour et critique-poète
    description_en: |
      Abū al-ʿAbbās ʿAbd Allāh ibn al-Muʿtazz bi-llāh — ʿAbbāsid
      prince, son of the caliph al-Muʿtazz, distinguished poet
      and the founding theoretician of *ʿilm al-badīʿ* (the
      science of rhetorical figures) in his treatise *Kitāb
      al-Badīʿ* (composed 274 AH / 887–88 CE), the work that
      established the Arabic terminology for metaphor, antithesis,
      paronomasia and the related figures still used today —
      was proclaimed caliph at Baghdad on the night of Saturday
      20 Rabīʿ al-Awwal 296 AH (16 December 908 CE) by a faction
      of viziers and judges following the death of al-Muktafī,
      held the throne for a single day, was overthrown by the
      partisans of the boy-caliph al-Muqtadir, captured, and
      strangled the next day. Ibn Khallikān gives the date
      precisely; al-Ṭabarī's *Tārīkh* and Ibn al-Athīr's
      *al-Kāmil* both narrate the brief reign and execution
      under the events of 296 AH. He was buried at age fifty.
    description_ar: |
      قُتل أبو العباس عبد الله بن المعتز بالله — أمير عباسي،
      ابن الخليفة المعتز، شاعرٌ مُجَلٍّ وأول من أصّل علم البديع
      في كتابه «البديع» (نُظم سنة ٢٧٤ هـ / ٨٨٧–٨٨ م)، فأرسى
      مصطلحات العربية للاستعارة والطباق والجناس وسائر فنون
      البلاغة المستعملة إلى يومنا — وقد بويع بالخلافة ببغداد
      ليلة السبت العشرين من ربيع الأول سنة ٢٩٦ هـ (الموافق
      ١٦ ديسمبر ٩٠٨ م) إثر وفاة المكتفي بفعل فريقٍ من الوزراء
      والقضاة، فاستقام له الأمر يوماً واحداً، ثم انقلب عليه
      أنصارُ الصبي المقتدر، فقُبض عليه وخُنق في غدِه. وأرّخ
      ابن خلكان وفاته بدقة؛ وأطنب الطبري في «تاريخه» وابن
      الأثير في «الكامل» في خبر خلافته القصيرة وقتله في حوادث
      سنة ٢٩٦ هـ. ودُفن وعمره خمسون سنة.
    description_fr: |
      Abū al-ʿAbbās ʿAbd Allāh ibn al-Muʿtazz bi-llāh — prince
      ʿabbāside, fils du calife al-Muʿtazz, poète distingué et
      théoricien fondateur de *ʿilm al-badīʿ* (la science des
      figures rhétoriques) dans son traité *Kitāb al-Badīʿ*
      (composé en 274 H / 887–88 EC), l'ouvrage qui établit la
      terminologie arabe de la métaphore, de l'antithèse, de
      la paronomase et des figures voisines encore utilisée
      aujourd'hui — fut proclamé calife à Bagdad la nuit du
      samedi 20 Rabīʿ al-Awwal 296 H (16 décembre 908 EC) par
      une faction de vizirs et de juges après la mort
      d'al-Muktafī, tint le trône une journée, fut renversé
      par les partisans du calife-enfant al-Muqtadir, capturé
      et étranglé le lendemain. Ibn Khallikān donne la date
      précisément; *Tārīkh* d'al-Ṭabarī et *al-Kāmil* d'Ibn
      al-Athīr narrent tous deux le bref règne et l'exécution
      sous les événements de 296 H. Il fut enterré à l'âge de
      cinquante ans.
    canonical_hijri: {year: 296, month: 3, day: 20, precision: day}
    canonical_gregorian: {date: 908-12-16, precision: day, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Bayʿa on the night of Saturday 20 Rabīʿ al-Awwal 296 AH; deposed and strangled the next day, age 50."
      - source_key: tabari_tarikh
        notes: "al-Ṭabarī narrates the proclamation and overthrow under the events of 296 AH."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr al-Kamil places the bayʿa, the deposition, and the killing in 296 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 296 AH wafayāt entry."
