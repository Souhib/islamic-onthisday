  - slug: death-of-ibn-said-al-maghribi
    category: scholar_death
    title_en: Death of Ibn Saʿīd al-Maghribī — Andalusi-Maghribi Anthologist
    title_ar: وفاة ابن سعيد المغربي — مؤرخ الأدب الأندلسي والمغربي
    title_fr: Mort d'Ibn Saʿīd al-Maghribī — anthologiste andalousi-maghrébin
    description_en: |
      Abū al-Ḥasan ʿAlī ibn Mūsā ibn Saʿīd al-ʿAnsī al-Granaṭī
      al-Maghribī — Granadan polymath, traveller, and
      anthologist of the late Almohad period, author of *al-
      Mughrib fī Ḥulā al-Maghrib* (a vast biographical-
      anthological survey of Andalusi-Maghribi poets and prose
      writers begun by his father and grandfather) and *Rāyāt
      al-Mubarrizīn wa-Ghāyāt al-Mumayyazīn* (a slim, much-
      transcribed anthology of Andalusi poetry) — died in Tunis
      in 685 AH (1286 CE) at age about seventy-five (some
      sources place the death at Damascus or Aleppo). Together
      with the parallel *Mughrib* of his ancestors, the *al-
      Maqqarī*-cited references to his work in *Nafḥ al-Ṭīb*,
      and his own travel-memoir, his oeuvre is the principal
      late-medieval inventory of the Andalusi-Maghribi literary
      canon. Ibn Khallikān had died (681 AH) before Ibn Saʿīd's
      death, so the principal classical source is al-Dhahabī
      in *Tārīkh al-Islām*; al-Maqqarī, writing centuries
      later, draws extensively on Ibn Saʿīd in *Nafḥ al-Ṭīb*.
      Sources differ on the place of death (Tunis / Damascus /
      Aleppo) but agree on the year 685 AH.
    description_ar: |
      توفي أبو الحسن علي بن موسى بن سعيد العنسي الغرناطي
      المغربي — أديب غرناطيٌّ متعدّد الميادين، رحّالةٌ ومؤرخ
      أدبٍ من أواخر العصر الموحدي، صاحب «المُغرب في حُلى
      المغرب» (مسحٌ سيري وأدبيٌّ كبير لشعراء الأندلس والمغرب
      وأدبائهم، بدأه جدّه وأبوه وأكمله هو) و«رايات المبرزين
      وغايات المميزين» (مختارات أندلسية وجيزة كثُرت روايتها)
      — بتونس سنة ٦٨٥ هـ (الموافق ١٢٨٦ م) وعمره يقارب الخامسة
      والسبعين (وقد ذكرت بعض المصادر أنه توفي بدمشق أو حلب).
      ومع ما سبق إلى «المُغرب» من سلفه ومراجع المقري إليه في
      «نفح الطيب» ومعرفة رحلاته، يكون أثرُه الإحصائيَّ
      الأساسيّ للأدب الأندلسي والمغربي في أواخر العصر الوسيط.
      وقد توفي ابن خلكان (٦٨١ هـ) قبل وفاته، فالمصدر السني
      الرئيسي عنه هو الذهبي في «تاريخ الإسلام»؛ وأكثر المقري
      عنه النقل في «نفح الطيب». واختلفت المصادر في مكان
      الوفاة (تونس / دمشق / حلب) واتفقت على سنة ٦٨٥ هـ.
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn Mūsā ibn Saʿīd al-ʿAnsī al-Granaṭī
      al-Maghribī — polymathe grenadin, voyageur et
      anthologiste de la fin de la période almohade, auteur
      d'*al-Mughrib fī Ḥulā al-Maghrib* (vaste enquête
      biographique et anthologique sur les poètes et prosateurs
      andalous-maghrébins, commencée par son père et son
      grand-père) et de *Rāyāt al-Mubarrizīn wa-Ghāyāt al-
      Mumayyazīn* (mince anthologie de poésie andalousie
      abondamment recopiée) — mourut à Tunis en 685 H (1286
      EC), âgé d'environ soixante-quinze ans (certaines
      sources placent la mort à Damas ou à Alep). Avec
      l'œuvre parallèle de ses ancêtres, les références à son
      travail citées par al-Maqqarī dans *Nafḥ al-Ṭīb* et son
      propre récit de voyage, son corpus est le principal
      inventaire médiéval-tardif du canon littéraire andalousi-
      maghrébin. Ibn Khallikān étant mort (681 H) avant Ibn
      Saʿīd, la principale source sunnite classique est al-
      Dhahabī dans *Tārīkh al-Islām*; al-Maqqarī, écrivant
      des siècles plus tard, le cite abondamment dans *Nafḥ
      al-Ṭīb*. Les sources divergent sur le lieu du décès
      (Tunis / Damas / Alep) mais s'accordent sur l'année 685 H.
