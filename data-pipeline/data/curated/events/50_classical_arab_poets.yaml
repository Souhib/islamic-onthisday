  - slug: death-of-abu-al-atahiya
    category: scholar_death
    title_en: Death of Abū al-ʿAtāhiya — Poet of Ascetic Wisdom
    title_ar: وفاة أبي العتاهية — شاعر الزهد
    title_fr: Mort d'Abū al-ʿAtāhiya — poète de l'ascèse
    description_en: |
      Abū Isḥāq Ismāʿīl ibn al-Qāsim al-ʿAnzī, known as Abū
      al-ʿAtāhiya — Kūfan-Baghdādi poet of the early ʿAbbāsid
      court who, after a youth of love-poetry to the slave-girl
      ʿUtba, turned in middle life to the *zuhdiyyāt* (ascetic
      odes) and became the universally recognised master of
      that genre in Arabic literature — died at Baghdad in 211
      AH (826 CE), at age about seventy-eight. His *zuhdiyyāt*,
      composed in deliberately simple metres and diction so they
      could be widely memorised, were quoted by Ibn Ḥanbal and
      al-Ghazālī in works of *raqāʾiq* (heart-softening)
      reflection. The classical anecdote, preserved by Ibn
      Khallikān, that he addressed his own grave-couplet — *Inna
      li-llāhi wa-innā ilayhi rājiʿūn* — to himself, captures
      his place at the boundary between Arabic poetry and
      religious admonition. Ibn Khallikān gives 211 AH as the
      year; al-Dhahabī enters him under the same year in *Tārīkh
      al-Islām*. The day is not consistently preserved.
    description_ar: |
      توفي أبو إسحاق إسماعيل بن القاسم العنزي المعروف بأبي
      العتاهية — شاعر كوفي بغدادي من أوائل بلاط العباسيين،
      انصرف في كهولته من شعر الغزل في عتبة جارية المهدي إلى
      «الزهديات» فصار إمامها في الأدب العربي بلا منازع — ببغداد
      سنة ٢١١ هـ (٨٢٦ م) وعمره يناهز الثمانين. ونظم زهدياته
      على أوزان وأسلوب سهلَين متعمَّدَين ليُحفظ شعره عند الناس،
      حتى استشهد به الإمام أحمد بن حنبل والإمام الغزالي في
      كتب «الرقائق». وحُفظ في «وفيات الأعيان» لابن خلكان أنه
      رثى نفسه في قبره بقول «إنا لله وإنا إليه راجعون»، وفي
      ذلك خلاصة منزلته على الحدّ بين الشعر العربي والوعظ
      الديني. وذكر ابن خلكان سنة وفاته ٢١١ هـ، وأَلَمَّ بها
      الذهبي في «تاريخ الإسلام» في وفيات السنة المذكورة.
      ولم تُحفظ تواريخ يومه على وجه الاتفاق.
    description_fr: |
      Abū Isḥāq Ismāʿīl ibn al-Qāsim al-ʿAnzī, dit Abū al-
      ʿAtāhiya — poète kūfan-bagdādien de la première cour
      ʿabbāside qui, après une jeunesse vouée à la poésie
      amoureuse dédiée à la jeune esclave ʿUtba, se tourna à
      l'âge mûr vers les *zuhdiyyāt* (odes ascétiques) et en
      devint le maître universellement reconnu dans la
      littérature arabe — mourut à Bagdad en 211 H (826 EC),
      âgé d'environ soixante-dix-huit ans. Ses *zuhdiyyāt*,
      composées dans des mètres et un lexique délibérément
      simples afin d'être largement mémorisées, furent citées
      par Ibn Ḥanbal et al-Ghazālī dans des ouvrages de
      *raqāʾiq* (assouplissement des cœurs). L'anecdote
      classique préservée par Ibn Khallikān — selon laquelle
      il adressa à lui-même le distique de sa propre tombe,
      *Inna li-llāhi wa-innā ilayhi rājiʿūn* — saisit sa
      position à la frontière de la poésie arabe et de
      l'exhortation religieuse. Ibn Khallikān donne 211 H comme
      l'année; al-Dhahabī l'enregistre la même année dans
      *Tārīkh al-Islām*. Le jour n'est pas conservé de manière
      cohérente.
