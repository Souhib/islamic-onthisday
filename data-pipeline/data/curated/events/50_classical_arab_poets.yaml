  # SAMARRA-ERA TRIO — AL-BUḤTURĪ, IBN AL-RŪMĪ, IBN AL-MUʿTAZZ
  # =========================================================================

  - slug: death-of-al-buhturi
    category: scholar_death
    title_en: Death of al-Buḥturī — Poet of the Mutawakkilī Court
    title_ar: وفاة البحتري — شاعر بلاط المتوكل
    title_fr: Mort d'al-Buḥturī — poète de la cour mutawakkilienne
    description_en: |
      Abū ʿUbāda al-Walīd ibn ʿUbayd Allāh al-Ṭāʾī al-Buḥturī —
      Syrian-origin Arab poet who, alongside Abū Tammām and
      al-Mutanabbī, completes the trio of greatest ʿAbbāsid
      qaṣīda-poets, court-laureate to the caliph al-Mutawakkil
      and the Banū Ḥamdūn at Samarra and Baghdad — died at his
      native town of Manbij in northern Syria in 284 AH (897 CE)
      at age about eighty. His *Ḥamāsa* (anthology of pre-
      Islamic and early-Islamic war poetry, modelled on Abū
      Tammām's earlier *Ḥamāsa*) and his celebrated *Sīniyya*
      ode on the ruined Sasanian palace at Ctesiphon (*Īwān
      Kisrā*) — the latter judged by Ibn Khallikān among the
      finest qaṣīdas ever composed — secure his rank in the
      Arabic canon. Ibn Khallikān places his death in Manbij
      in 284 AH; al-Dhahabī confirms in *Tārīkh al-Islām*. The
      classical sources do not converge on the day or month.
    description_ar: |
      توفي أبو عبادة الوليد بن عبيد الله الطائي البحتري — شاعر
      عربي شامي من أهل منبج، يكمل مع أبي تمام والمتنبي ثلاثيَّ
      أئمة قصيدة المديح في العصر العباسي، وهو شاعر بلاط الخليفة
      المتوكل وبني حمدون بسامراء وبغداد — في بلده منبج بشمال
      الشام سنة ٢٨٤ هـ (٨٩٧ م) وعمره يناهز الثمانين. واختياره
      الشعري الموسوم بـ«الحماسة» (على غرار «حماسة» أبي تمام
      شيخه)، وقصيدته «السينية» في إيوان كسرى — التي قال عنها
      ابن خلكان إنها من أحسن ما نُظم في العربية — مما يثبت
      مكانته في الصدارة الشعرية العربية. ويذكر ابن خلكان وفاته
      بمنبج سنة ٢٨٤ هـ، وأكّد ذلك الذهبي في «تاريخ الإسلام». ولم
      تتفق المصادر القديمة على تاريخ يومه أو شهره.
    description_fr: |
      Abū ʿUbāda al-Walīd ibn ʿUbayd Allāh al-Ṭāʾī al-Buḥturī —
      poète arabe d'origine syrienne qui, aux côtés d'Abū
      Tammām et d'al-Mutanabbī, complète le trio des plus
      grands poètes-de-qaṣīda ʿabbāsides, lauréat de cour des
      califes al-Mutawakkil et des Banū Ḥamdūn à Samarra et
      Bagdad — mourut dans sa ville natale de Manbij en Syrie
      du nord en 284 H (897 EC), âgé d'environ quatre-vingts
      ans. Sa *Ḥamāsa* (anthologie de poésie guerrière pré-
      islamique et islamique ancienne, sur le modèle de la
      *Ḥamāsa* antérieure d'Abū Tammām) et sa célèbre ode
      *Sīniyya* sur le palais sassanide en ruine de Ctésiphon
      (*Īwān Kisrā*) — cette dernière jugée par Ibn Khallikān
      parmi les plus belles qaṣīdas jamais composées —
      assurent sa place dans le canon arabe. Ibn Khallikān
      place sa mort à Manbij en 284 H; al-Dhahabī le confirme
      dans *Tārīkh al-Islām*. Les sources classiques ne
      convergent pas sur le jour ou le mois.
    canonical_hijri: {year: 284, precision: year}
    canonical_gregorian: {date: 897-01-01, precision: year, method: tabular_conversion}
