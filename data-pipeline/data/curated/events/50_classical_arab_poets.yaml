  - slug: death-of-ibn-al-rumi
    category: scholar_death
    title_en: Death of Ibn al-Rūmī — Master of the Detailed Image
    title_ar: وفاة ابن الرومي — شاعر الصورة الدقيقة
    title_fr: Mort d'Ibn al-Rūmī — maître de l'image détaillée
    description_en: |
      Abū al-Ḥasan ʿAlī ibn al-ʿAbbās ibn Jurayj — known as Ibn
      al-Rūmī from his Byzantine-Greek paternal grandfather, a
      Baghdādī poet of the Samarra age, court-poet to the
      ʿAbbāsid amir Ismāʿīl ibn Bulbul and the Tāhirids — died
      at Baghdad in 283 AH (896 CE) at age about sixty-seven.
      He is universally regarded by classical Arabic literary
      criticism (Qudāma ibn Jaʿfar, al-Marzubānī, Ibn Rashīq)
      as the unrivalled master of the long, image-dense
      descriptive *qaṣīda* in Arabic, with extended set-piece
      treatments of cooks, foods, gardens, ruined houses, and
      portraits of friends and patrons that have no precedent
      in the earlier tradition for sustained visual concretion.
      Ibn Khallikān reports the prevailing tradition that he
      was poisoned at the table of the vizier al-Qāsim ibn
      ʿUbayd Allāh after a series of satirical verses; the
      classical biographers preserve 283 AH for the year.
    description_ar: |
      توفي أبو الحسن علي بن العباس بن جريج المعروف بابن الرومي
      — نسبةً إلى جدّ روميٍّ بيزنطيٍّ، شاعر بغداديٌّ من شعراء
      عصر سامراء، نديم الأمير العباسي إسماعيل بن بُلبل ومادح
      الطاهريين — ببغداد سنة ٢٨٣ هـ (٨٩٦ م) وعمره يناهز السابعة
      والستين. ويتفق نقاد العربية الكلاسيكيون (قدامة بن جعفر
      والمرزباني وابن رشيق) على أنه إمام القصيدة العربية
      الوصفية الطويلة بلا منازع، إذ نظم في الطبّاخين والأطعمة
      والبساتين والديار الخربة وصور الأصحاب والممدوحين قطعاً
      وصفية مطوّلة لم يَسبق إلى مثل ذلك الإمعان البصريّ
      المتواصل أحدٌ من قدماء العرب. وأرّخ ابن خلكان الرواية
      الراجحة في وفاته أنه مات مسموماً على مائدة الوزير
      القاسم بن عبيد الله جزاءَ هجاءٍ نظمه فيه؛ والمصادر
      الكلاسيكية كلها على سنة ٢٨٣ هـ.
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn al-ʿAbbās ibn Jurayj — connu sous
      le nom d'Ibn al-Rūmī d'après son grand-père paternel
      grec-byzantin, poète bagdādien de l'âge de Samarra, poète
      de cour de l'émir ʿabbāside Ismāʿīl ibn Bulbul et des
      Ṭāhirides — mourut à Bagdad en 283 H (896 EC), âgé
      d'environ soixante-sept ans. Il est universellement tenu
      par la critique littéraire arabe classique (Qudāma ibn
      Jaʿfar, al-Marzubānī, Ibn Rashīq) pour le maître
      incontesté de la longue *qaṣīda* descriptive arabe à
      densité d'images, avec des morceaux de bravoure
      prolongés sur les cuisiniers, les mets, les jardins,
      les maisons en ruine et les portraits d'amis et de
      mécènes — sans précédent dans la tradition antérieure
      pour la concrétion visuelle soutenue. Ibn Khallikān
      rapporte la tradition prédominante selon laquelle il
      fut empoisonné à la table du vizir al-Qāsim ibn ʿUbayd
      Allāh après des vers satiriques; les biographes
      classiques conservent 283 H pour l'année.
    canonical_hijri: {year: 283, precision: year}
    canonical_gregorian: {date: 896-01-01, precision: year, method: tabular_conversion}
