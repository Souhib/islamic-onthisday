  - slug: death-of-abu-nuwas
    category: scholar_death
    title_en: Death of Abū Nuwās — Master of the Khamriyya
    title_ar: وفاة أبي نواس — شاعر الخمريات
    title_fr: Mort d'Abū Nuwās — maître de la khamriyya
    description_en: |
      Abū Nuwās al-Ḥasan ibn Hāniʾ al-Ḥakamī — Khurāsānian-Arab
      poet of the early ʿAbbāsid period, court-companion of the
      caliphs al-Amīn and (briefly) Hārūn al-Rashīd, and the
      undisputed master of the *khamriyya* (wine-ode) and *ṭardiyya*
      (hunting-ode) sub-genres — died at Baghdad around 199 AH
      (814–15 CE), at age about sixty. He was the first poet to
      consciously adopt urban-courtly themes (wine, gardens, love
      of male and female cup-bearers, hunting) in place of the
      desert-camp opening of the classical qaṣīda, and his
      *Dīwān* runs to more than thirteen thousand verses across
      every traditional genre. The precise year of his death is
      disputed in the classical sources — Ibn Khallikān gives
      199 AH as the most-cited date, with 196, 198, and 200 AH
      as minority alternatives; the dispute is over his date,
      not over the fact of his death at Baghdad. al-Jāḥiẓ in
      *al-Bayān wa-l-Tabyīn* cites Abū Nuwās repeatedly as a
      master of natural Arabic eloquence.
    description_ar: |
      توفي أبو نواس الحسن بن هانئ الحكمي — شاعر عربي خراساني
      من أوائل العصر العباسي، نديم الخليفتين الأمين وهارون
      الرشيد (مدّةً قصيرة)، وإمام «الخمريات» و«الطرديات» في
      الشعر العربي بلا منازع — ببغداد نحو سنة ١٩٩ هـ (٨١٤–١٥ م)
      وعمره يناهز الستين. وهو أول من تحوّل بالشعر تحوّلاً واعياً
      من افتتاحية الديار والأطلال البدوية إلى مواضيع المدينة
      والقصور (الخمر والبساتين والساقي والطرد)، وديوانه يربو
      على ثلاثة عشر ألف بيت في عامة فنون الشعر. واختلفت المصادر
      القديمة في سنة وفاته — وذكر ابن خلكان سنة ١٩٩ هـ بوصفها
      الأكثر تداولاً، مع روايات أقل: ١٩٦ و١٩٨ و٢٠٠ هـ، والخلاف
      في التاريخ لا في أصل وفاته ببغداد. وكان الجاحظُ في «البيان
      والتبيين» يكثر من الاستشهاد بأبي نواس بوصفه إماماً في
      فصاحة العربية.
    description_fr: |
      Abū Nuwās al-Ḥasan ibn Hāniʾ al-Ḥakamī — poète arabe
      d'origine khurāsānienne du début de la période ʿabbāside,
      compagnon de cour des califes al-Amīn et (brièvement) Hārūn
      al-Rashīd, et maître incontesté de la *khamriyya* (ode
      bachique) et de la *ṭardiyya* (ode de chasse) — mourut à
      Bagdad vers 199 H (814–15 EC), âgé d'environ soixante ans.
      Il fut le premier poète à substituer consciemment aux
      thèmes du campement bédouin de la qaṣīda classique des
      thèmes urbains et courtois (vin, jardins, amour des
      échansons, chasse); son *Dīwān* dépasse les treize mille
      vers à travers tous les genres traditionnels. L'année
      exacte de sa mort est disputée dans les sources classiques
      — Ibn Khallikān retient 199 H comme la date la plus citée,
      avec 196, 198 et 200 H comme alternatives minoritaires;
      le différend porte sur la date, non sur le fait de sa mort
      à Bagdad. al-Jāḥiẓ cite Abū Nuwās à de multiples reprises
      dans *al-Bayān wa-l-Tabyīn* comme un maître de l'éloquence
      arabe naturelle.
