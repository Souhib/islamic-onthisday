# Wave 50 of curated event additions (2026-04-27).
# Classical Arabic poets and litterateurs of the Islamic era — covering the
# four-generation Abbasid lyrical canon (Bashshār ibn Burd, Abū Nuwās,
# Abū al-ʿAtāhiya), the Samarra-era trio of *muḥaddathūn* (al-Buḥturī,
# Ibn al-Rūmī, Ibn al-Muʿtazz), the great Abbasid prose-master al-Jāḥiẓ,
# the Buwayhid-period litterateurs (al-Sharīf al-Raḍī, al-Maʿarrī),
# the Andalusi succession (Ibn Zaydūn, Ibn Khafāja), the Mamluk-era
# Egyptian Sufi poet Ibn al-Fāriḍ, and the Andalusi-Egyptian belletrist-
# anthologist Ibn Saʿīd al-Maghribī. al-Buṣīrī (Burda) and al-Mutanabbī
# and Abū Tammām are covered elsewhere in the dataset and not duplicated
# here. al-Sharīf al-Raḍī is included as a Buwayhid-period Arabic poet
# attested by Ibn Khallikān and al-Dhahabī as a leading litterateur; his
# compilation of statements attributed to ʿAlī ra (*Nahj al-Balāgha*) is
# noted historically without endorsing those attributions, which Sunni
# hadith critics (Ibn Khallikān, al-Dhahabī, Ibn Ḥajar) have long
# disputed. Trilingual en/ar/fr throughout. No hadith citations: poetry
# events are not directly anchored by ṣaḥīḥ narrations.

events:
  # =========================================================================
  # FIRST ABBASID GENERATION — THE LYRICAL TURN (BASHSHĀR, ABŪ NUWĀS,
  # ABŪ AL-ʿATĀHIYA)
  # =========================================================================

  - slug: death-of-bashshar-ibn-burd
    category: scholar_death
    title_en: Death of Bashshār ibn Burd — Father of the Muḥdath Style
    title_ar: وفاة بشار بن برد — رائد الشعر المحدث
    title_fr: Mort de Bashshār ibn Burd — père du style muḥdath
    description_en: |
      Abū Muʿādh Bashshār ibn Burd al-ʿUqaylī — blind Persian-
      origin poet of Basra, considered by the classical critics
      (Ibn Qutayba, Ibn Sallām al-Jumaḥī, al-Aṣmaʿī) to be the
      inaugural figure of the *muḥdath* (modernist) school of
      Arabic poetry that broke decisively with the desert-Bedouin
      idiom of the *jāhiliyya* and Umayyad qaṣīda — was executed
      under the orders of the ʿAbbāsid caliph al-Mahdī in 168 AH
      (784–85 CE) on charges of zandaqa and lampoon-poetry
      directed at the caliph and his vizier Yaʿqūb ibn Dāwūd,
      after a long career at the courts of al-Manṣūr and
      al-Mahdī. He is reckoned to have left a *dīwān* of some
      twelve thousand verses; al-Jāḥiẓ devotes substantial
      passages of *al-Bayān wa-l-Tabyīn* to citing his lines as
      models of natural Arabic eloquence. Ibn Khallikān gives the
      year 168 AH for his death; al-Dhahabī confirms in *Tārīkh
      al-Islām*. The classical sources retain only the year, not
      the day or month.
    description_ar: |
      أُعدم أبو معاذ بشار بن برد العقيلي — شاعر بصريٌّ ضرير
      من أصول فارسية، يَعُدّه نقاد العربية الكلاسيكيون (ابن قتيبة
      وابن سلام الجمحي والأصمعي) فاتحَ مدرسة «المحدثين» في الشعر
      العربي، التي قطعت قطعاً صريحاً مع الديباجة البدوية
      الجاهلية والأموية — بأمر الخليفة العباسي المهدي سنة ١٦٨ هـ
      (٧٨٤ ميلادي) بتهمة الزندقة وهجاء الخليفة ووزيره يعقوب بن
      داود، بعد عمر طويل في بلاطَي المنصور والمهدي. ويُقدَّر
      ديوانه بنحو اثني عشر ألف بيت؛ وقد أكثر الجاحظ في «البيان
      والتبيين» من الاستشهاد بأبياته بوصفها نماذجَ الفصاحة
      العربية على السليقة. وأرّخ ابن خلكان وفاته بسنة ١٦٨ هـ،
      وأكّد ذلك الذهبي في «تاريخ الإسلام». ولم تحفظ المصادر
      القديمة اليوم ولا الشهر.
    description_fr: |
      Abū Muʿādh Bashshār ibn Burd al-ʿUqaylī — poète aveugle
      d'origine persane de Bassora, considéré par les critiques
      classiques (Ibn Qutayba, Ibn Sallām al-Jumaḥī, al-Aṣmaʿī)
      comme la figure inaugurale de l'école *muḥdath* (moderniste)
      de la poésie arabe, qui rompit décisivement avec le langage
      bédouin de la qaṣīda *jāhilī* et omeyyade — fut exécuté sur
      l'ordre du calife ʿabbāside al-Mahdī en 168 H (784–85 EC)
      sous l'accusation de *zandaqa* et de poésie satirique
      dirigée contre le calife et son vizir Yaʿqūb ibn Dāwūd,
      après une longue carrière aux cours d'al-Manṣūr et
      d'al-Mahdī. On lui attribue un *dīwān* de quelque douze
      mille vers; al-Jāḥiẓ consacre dans *al-Bayān wa-l-Tabyīn*
      d'amples passages à citer ses vers comme modèles de
      l'éloquence arabe naturelle. Ibn Khallikān donne 168 H
      pour sa mort; al-Dhahabī le confirme dans *Tārīkh al-Islām*.
      Les sources classiques ne retiennent que l'année, ni le
      jour ni le mois.
