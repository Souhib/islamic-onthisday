        is_canonical: true
        notes: "Wafāh in Muḥarram 255 AH at Basra, age over 90; killed by collapsing pile of books."
      - source_key: dhahabi_siyar
        notes: "Year 255 AH biographical entry."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 255 AH wafayāt entry."
      - source_key: ei2
