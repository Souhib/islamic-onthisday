    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Jahiz"

  # =========================================================================
  # BUWAYHID PERIOD — AL-SHARĪF AL-RAḌĪ, AL-MAʿARRĪ
  # =========================================================================

  # death-of-al-sharif-al-radi intentionally excluded — Twelver Shia compiler of *Nahj al-Balāgha*.
  # See EDITORIAL.md “Sunni orthodoxy” rule.

  - slug: death-of-al-maarri
    category: scholar_death
    title_en: Death of Abū al-ʿAlāʾ al-Maʿarrī — Blind Sage of Maʿarrat al-Nuʿmān
    title_ar: وفاة أبي العلاء المعرّي — حكيم معرّة النعمان الضرير
    title_fr: Mort d'Abū al-ʿAlāʾ al-Maʿarrī — sage aveugle de Maʿarrat al-Nuʿmān
    description_en: |
      Abū al-ʿAlāʾ Aḥmad ibn ʿAbd Allāh al-Tanūkhī al-Maʿarrī —
      blind Syrian poet and prose-writer of the northern town
      of Maʿarrat al-Nuʿmān, author of the two great poetic
      collections *Saqṭ al-Zand* (early period) and *al-Luzūmiyyāt*
      (mature period, with its rigorous double-rhyme constraint),
      and of the prose *Risālat al-Ghufrān* — died at his home
      town on Friday 13 Rabīʿ al-Awwal 449 AH (10 May 1057 CE)
      at age eighty-six. Ibn Khallikān gives the date precisely
      and reports that al-Maʿarrī chose the epitaph *hādhā mā
      janāhu abī ʿalayya / wa-mā janaytu ʿalā aḥad* ("This is
      what my father committed against me / and I have committed
      against no one") for his grave. Several of his surviving
      verses contain harsh skeptical-rationalist statements about
      religion; classical Sunni biographers (Ibn Khallikān, Ibn
      Kathīr, al-Dhahabī) record both his unmatched mastery of
      Arabic and the sharp criticism his religious views drew
      from contemporaries.
    description_ar: |
      توفي أبو العلاء أحمد بن عبد الله التنوخي المعرّي — شاعر
      شامي ضرير من معرّة النعمان، صاحب الديوانين الكبيرين
      «سقط الزند» (في بواكيره) و«اللزوميّات» (في كهولته،
      ملتزمة قيد القافية المضاعفة)، وصاحب الرسالة النثرية
      «رسالة الغفران» — في بلده معرّة النعمان يوم الجمعة
      الثالث عشر من ربيع الأول سنة ٤٤٩ هـ (الموافق ١٠ مايو
      ١٠٥٧ م) وعمره ست وثمانون سنة. وضبط ابن خلكان تاريخ
      وفاته بدقة، وحفظ من اختياره أن يُكتب على قبره: «هذا
      ما جناه أبي عليّ / وما جنيتُ على أحد». وفي شعره الباقي
      تصريحاتٌ شكوكية عقلية خشنة في الدين؛ ويذكر مترجموه من
      أئمة السنة (ابن خلكان وابن كثير والذهبي) في آنٍ معاً
      تفوقه في العربية لا يُماثَل، ونقد معاصريه له على
      آرائه الدينية.
    description_fr: |
      Abū al-ʿAlāʾ Aḥmad ibn ʿAbd Allāh al-Tanūkhī al-Maʿarrī —
      poète et prosateur syrien aveugle de la ville
      septentrionale de Maʿarrat al-Nuʿmān, auteur des deux
      grandes collections poétiques *Saqṭ al-Zand* (période
      ancienne) et *al-Luzūmiyyāt* (période de maturité, avec
      sa rigoureuse contrainte de la double rime), et de la
      prose *Risālat al-Ghufrān* — mourut dans sa ville natale
      le vendredi 13 Rabīʿ al-Awwal 449 H (10 mai 1057 EC),
      âgé de quatre-vingt-six ans. Ibn Khallikān donne la
      date avec précision et rapporte qu'al-Maʿarrī choisit
      pour épitaphe *hādhā mā janāhu abī ʿalayya / wa-mā
      janaytu ʿalā aḥad* (« Voici ce que mon père a commis
      contre moi / et moi, je n'ai commis envers personne »).
      Plusieurs vers conservés contiennent des déclarations
      sceptiques-rationalistes acerbes sur la religion; les
      biographes sunnites classiques (Ibn Khallikān, Ibn
      Kathīr, al-Dhahabī) consignent à la fois sa maîtrise
      sans pareille de l'arabe et la critique sévère que ses
      vues religieuses lui valurent de la part de ses
      contemporains.
    canonical_hijri: {year: 449, month: 3, day: 13, precision: day}
    canonical_gregorian: {date: 1057-05-10, precision: day, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafāh: Friday 13 Rabīʿ al-Awwal 449 AH at Maʿarrat al-Nuʿmān, age 86; epitaph preserved."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 449 AH wafayāt entry."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr places the wafāh in 449 AH and rehearses his life and the criticism of his religious verse."
      - source_key: ei2
    people: [[al-maarri, died]]
    tags: [abbasid, poet, syria, maarrat-al-numan, blind, luzumiyyat, risalat-al-ghufran]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Ma%27arri"

  # =========================================================================
  # ANDALUSI POETIC SUCCESSION — IBN ZAYDŪN, IBN KHAFĀJA
  # =========================================================================

  - slug: death-of-ibn-zaydun
    category: scholar_death
    title_en: Death of Ibn Zaydūn — Court-Poet of Cordoba and Seville
    title_ar: وفاة ابن زيدون — شاعر بلاطَي قرطبة وإشبيلية
    title_fr: Mort d'Ibn Zaydūn — poète de cour de Cordoue et Séville
    description_en: |
      Abū al-Walīd Aḥmad ibn ʿAbd Allāh ibn Zaydūn al-Makhzūmī
      al-Andalusī — Cordoban poet and prose stylist of the
      late-Umayyad and Tāʾifa-period Andalus, court-secretary
      to the Banū Jahwar of Cordoba and to al-Muʿtaḍid and
      al-Muʿtamid of the ʿAbbādid kingdom of Seville, author
      of the Arabic *qaṣīda nūniyya* on his absent beloved
      Wallāda bint al-Mustakfī (one of the most celebrated love
      poems of Andalusi Arabic literature) and of the satirical-
      epistolary *Risāla Hazliyya* and *Risāla Jiddiyya* — died
      at Seville in Rajab 463 AH (April 1071 CE) at age about
      seventy. Ibn Khallikān gives Rajab 463 AH at Seville;
      al-Maqqarī in *Nafḥ al-Ṭīb* preserves a parallel report.
      The day within Rajab is not consistently preserved.
    description_ar: |
      توفي أبو الوليد أحمد بن عبد الله بن زيدون المخزومي
      الأندلسي — شاعر قرطبي وكاتب أندلسي من أواخر العصر
      الأموي وعصر الطوائف، تكاتب لبني جهور بقرطبة وللمعتضد
      والمعتمد العبّاديَّين بإشبيلية، صاحب القصيدة النونية
      الشهيرة في ولاّدة بنت المستكفي (وهي من أعرف قصائد
      الغزل في الأدب العربي الأندلسي) وصاحب «الرسالة الهزلية»
      و«الرسالة الجدية» — بإشبيلية في رجب سنة ٤٦٣ هـ (الموافق
      أبريل ١٠٧١ م) وعمره يقارب السبعين. وذكر ابن خلكان وفاته
      في رجب سنة ٤٦٣ هـ بإشبيلية؛ وحفظ المقري في «نفح الطيب»
      روايةً مُماثلة. ولم يُحفظ يومه من رجب على وجه الاتفاق.
    description_fr: |
      Abū al-Walīd Aḥmad ibn ʿAbd Allāh ibn Zaydūn al-Makhzūmī
      al-Andalusī — poète et prosateur cordouan de l'Andalousie
      de la fin de l'époque omeyyade et de la période des
      *taïfas*, secrétaire de cour des Banū Jahwar de Cordoue
      et d'al-Muʿtaḍid et d'al-Muʿtamid du royaume ʿabbādide
      de Séville, auteur de la *qaṣīda nūniyya* sur sa bien-
      aimée absente Wallāda bint al-Mustakfī (l'un des poèmes
      d'amour les plus célèbres de la littérature arabe
      andalousie) et des épîtres satiriques *Risāla Hazliyya*
      et *Risāla Jiddiyya* — mourut à Séville en Rajab 463 H
      (avril 1071 EC), âgé d'environ soixante-dix ans. Ibn
      Khallikān donne Rajab 463 H à Séville; al-Maqqarī dans
      *Nafḥ al-Ṭīb* conserve un récit parallèle. Le jour du
      mois de Rajab n'est pas conservé de manière cohérente.
    canonical_hijri: {year: 463, month: 7, precision: month}
    canonical_gregorian: {date: 1071-04-01, precision: month, method: tabular_conversion}
