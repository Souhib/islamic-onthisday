# Wave 60 of curated event additions (2026-04-27).
# 13 major Abbasid political and military events of the 9th-13th centuries.
# Covers: Barmakid downfall, the civil war between al-Amin and al-Maʾmun,
# death of al-Maʾmun in Tarsus, end of the Miḥna under al-Mutawakkil,
# death of al-Wathiq, the Anarchy at Samarra, the Zanj rebellion and its
# suppression, death of the regent al-Muwaffaq, Qarmatian raid on Mecca
# and theft of the Black Stone, return of the Black Stone, Buyid takeover
# of Baghdad, Seljuk Tughril Beg's entry to Baghdad, and death of caliph
# al-Naṣir li-Dīn Allah. All events attested in classical Sunni sources
# (al-Ṭabari, Ibn al-Athīr al-Kāmil, Ibn Kathīr al-Bidāya wa-l-Nihāya,
# al-Dhahabī Tārīkh al-Islām, Ibn Khallikān Wafayāt al-Aʿyān). Trilingual
# (en/ar/fr).

events:
  # =========================================================================
  # HARUN AL-RASHID-ERA POLITICS
  # =========================================================================

  - slug: execution-of-jafar-al-barmaki
    category: political_event
    title_en: Execution of Jaʿfar al-Barmakī — Downfall of the Barmakids
    title_ar: مقتل جعفر البرمكي — نكبة البرامكة
    title_fr: Exécution de Jaʿfar al-Barmakī — la chute des Barmécides
    description_en: |
      Jaʿfar ibn Yaḥyā al-Barmakī, vizier and intimate companion
      of caliph Hārūn al-Rashīd, was beheaded at al-ʿUmr (near
      al-Anbār on the Euphrates) on the orders of the caliph,
      ending the dominance of the Barmakid family that had
      effectively administered the Abbasid state for nearly two
      decades. His brothers Faḍl and Mūsā were imprisoned, the
      family's vast estates were confiscated, and his father
      Yaḥyā ibn Khālid died in prison shortly after. al-Ṭabarī
      preserves multiple accounts of the cause, ranging from
      Jaʿfar's secret marriage to the caliph's sister al-ʿAbbāsa
      to the Barmakids' accumulated wealth and political
      independence; the precise trigger remained famously
      obscure even in al-Ṭabarī's own day. The fall of the
      Barmakids became one of the most-cited cautionary tales
      in classical Arabic literature on the precariousness of
      worldly fortune and the wages of unchecked ambition near
      the throne.
    description_ar: |
      ضُرب عنق جعفر بن يحيى البرمكي — وزير هارون الرشيد
      ونديمه — في «العُمر» قرب الأنبار على نهر الفرات بأمر
      الخليفة، فأنهت قتلتُه هيمنة آل برمك الذين دبَّروا أمور
      الدولة العباسية فعلياً قرابة عقدين من الزمن. وسُجن
      أخواه الفضل وموسى، وصودرت ضياع الأسرة العظيمة، ومات
      أبوه يحيى بن خالد في سجنه بعد قليل. وقد أورد الطبري
      روايات متعددة في سبب النكبة، تتراوح بين زواج جعفر
      السرّي من العباسة أخت الخليفة وبين تضخم ثروة البرامكة
      واستقلالهم السياسي؛ وظلّ السبب المحدد غامضاً حتى في
      عصر الطبري نفسه. وصارت نكبة البرامكة من أكثر العبر
      شهرةً في الأدب العربي الكلاسيكي على غدر الدنيا
      وعاقبة الطموح المفرط من قرب السلطان.
    description_fr: |
      Jaʿfar ibn Yaḥyā al-Barmakī, vizir et compagnon intime du
      calife Hārūn al-Rashīd, fut décapité à al-ʿUmr (près d'al-
      Anbār, sur l'Euphrate) sur ordre du calife, mettant fin
      à la prééminence de la famille barmécide qui administrait
      effectivement l'État abbasside depuis près de vingt ans.
      Ses frères Faḍl et Mūsā furent emprisonnés, les vastes
      propriétés de la famille confisquées, et son père Yaḥyā
      ibn Khālid mourut en prison peu après. al-Ṭabarī conserve
      plusieurs versions de la cause — du mariage secret de
      Jaʿfar avec al-ʿAbbāsa, sœur du calife, à l'accumulation
      de richesses et l'indépendance politique des Barmécides;
      le déclencheur précis resta célèbrement obscur jusque
      dans le propre temps d'al-Ṭabarī. La chute des Barmécides
      devint l'un des avertissements les plus cités de la
      littérature arabe classique sur la précarité de la fortune
      et le prix de l'ambition immodérée auprès du trône.
    canonical_hijri: {year: 187, month: 2, day: 1, precision: day}
    canonical_gregorian: {date: 803-02-02, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives the execution of Jaʿfar at al-ʿUmr in Ṣafar 187 AH and devotes a long section to the conflicting accounts of the cause."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the events of 187 AH with the execution of Jaʿfar and the imprisonment of the Barmakids."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān contains the standard biographical entry on Jaʿfar al-Barmakī and dates his death to 187 AH."
    people: [[harun-al-rashid, leader], [jafar-al-barmaki, died]]
    tags: [abbasid, barmakid, vizier, baghdad, harun-al-rashid]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # CIVIL WAR AND THE FOURTH CIVIL FITNA
  # =========================================================================

  - slug: death-of-al-amin
    category: ruler_death
    title_en: Death of Caliph al-Amīn — End of the Fourth Fitna
    title_ar: مقتل الخليفة الأمين — خاتمة الفتنة الرابعة
    title_fr: Mort du calife al-Amīn — fin de la quatrième fitna
    description_en: |
      Muḥammad al-Amīn, sixth Abbasid caliph and son of Hārūn
      al-Rashīd by Zubayda, was killed at Baghdad after a
      fourteen-month siege by the Khurāsānī army of his brother
      al-Maʾmūn under the command of Ṭāhir ibn al-Ḥusayn. The
      civil war had begun in 195 AH when al-Amīn moved to set
      aside the succession arrangement Hārūn had imposed, which
      named al-Maʾmūn governor of Khurāsān and second in line.
      After Ṭāhir's army breached the city walls and the
      Round City of al-Manṣūr fell, al-Amīn surrendered on a
      promise of safe-conduct but was overtaken on the Tigris
      by Ṭāhir's troops and killed. His severed head was sent
      east to al-Maʾmūn at Marw, an act that scandalised even
      his own supporters. The siege of Baghdad — the first time
      the new capital had been attacked — caused massive
      destruction recorded in al-Ṭabarī, and the war is counted
      by classical historians as the *fitna al-rābiʿa* ("the
      Fourth Civil War") of the umma.
    description_ar: |
      قُتل الخليفة محمد الأمين — سادس خلفاء بني العباس وابن
      هارون الرشيد من زبيدة — ببغداد بعد حصار أربعة عشر شهراً
      ضربه عليه جيش أخيه المأمون الخراساني بقيادة طاهر بن
      الحسين. وكانت الحرب الأهلية قد اندلعت سنة ١٩٥ هـ حين
      أقدم الأمين على نقض ترتيب الخلافة الذي فرضه عليه أبوه
      هارون، والذي جعل المأمون والياً على خراسان وولي عهد
      ثاني. ولما اخترق جيش طاهر أسوار العاصمة وسقطت مدينة
      المنصور المدوّرة، استسلم الأمين على عهد الأمان فأدركه
      جند طاهر على دجلة فقتلوه. وأُرسل رأسه شرقاً إلى المأمون
      بمرو، وهو أمر استنكره حتى أنصاره. وأحدث حصار بغداد —
      أول هجمة على العاصمة الجديدة — دماراً عظيماً سجّله
      الطبري، وعدّ المؤرخون الكلاسيكيون هذه الحرب «الفتنة
      الرابعة» من فتن الأمة.
    description_fr: |
      Muḥammad al-Amīn, sixième calife abbasside et fils de Hārūn
      al-Rashīd par Zubayda, fut tué à Baghdād après un siège de
      quatorze mois par l'armée khurāsānienne de son frère al-
      Maʾmūn, commandée par Ṭāhir ibn al-Ḥusayn. La guerre civile
      avait éclaté en 195 H lorsque al-Amīn entreprit de défaire
      l'arrangement successoral imposé par Hārūn, qui faisait
      d'al-Maʾmūn gouverneur du Khurāsān et second dans la
      succession. Après que l'armée de Ṭāhir eut percé les murs
      de la ville et que la Cité Ronde d'al-Manṣūr fut tombée,
      al-Amīn se rendit sur une promesse de sauf-conduit mais
      fut rejoint sur le Tigre par les troupes de Ṭāhir et tué.
      Sa tête tranchée fut envoyée vers l'est à al-Maʾmūn à
      Marw, acte qui scandalisa jusqu'à ses propres partisans.
      Le siège de Baghdād — la première attaque que subit la
      nouvelle capitale — causa des destructions massives
      consignées par al-Ṭabarī, et la guerre est comptée par
      les historiens classiques comme la *fitna al-rābiʿa*
      (« quatrième fitna ») de l'umma.
    canonical_hijri: {year: 198, month: 1, day: 25, precision: day}
    canonical_gregorian: {date: 813-09-29, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives a detailed narrative of the siege of Baghdad and the killing of al-Amīn in Muḥarram 198 AH; he preserves multiple eyewitness accounts of the night-time pursuit and the surrender."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters the killing of al-Amīn under 198 AH and gives Ṭāhir ibn al-Ḥusayn as the responsible commander."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 198 AH and the circumstances at Baghdad."
    people: [[al-amin, died], [al-mamun, leader], [tahir-ibn-al-husayn, leader]]
    tags: [abbasid, civil-war, baghdad, fitna, al-mamun, tahir]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-mamun
    category: ruler_death
    title_en: Death of Caliph al-Maʾmūn at Tarsus
    title_ar: وفاة الخليفة المأمون بطرسوس
    title_fr: Mort du calife al-Maʾmūn à Tarse
    description_en: |
      ʿAbd Allāh al-Maʾmūn ibn Hārūn al-Rashīd, seventh Abbasid
      caliph (reigned 198-218 AH), died on the Byzantine frontier
      at the small town of al-Budandūn near Tarsus while leading
      a summer campaign into Cappadocia, at age about 48. His
      twenty-year reign saw the consolidation of Khurāsānī
      influence at Baghdad, the founding of the *Bayt al-Ḥikma*
      and the height of the translation movement that rendered
      Greek philosophy, mathematics, and medicine into Arabic,
      and the imposition of the *Miḥna* — the doctrinal
      inquisition over the createdness of the Qurʾān that was
      already underway when he died. He had also recently
      designated his brother al-Muʿtaṣim as successor in place
      of his son al-ʿAbbās, a decision that secured the
      transition. He was buried at Tarsus and his brother
      al-Muʿtaṣim was acclaimed caliph there before the army
      returned to Iraq. Sunni tradition records the Miḥna as a
      grave error of an otherwise consequential reign; his
      patronage of learning is universally praised.
    description_ar: |
      توفي الخليفة عبد الله المأمون بن هارون الرشيد — سابع
      خلفاء بني العباس (حكم من ١٩٨ إلى ٢١٨ هـ) — على ثغر
      الروم في «البَدَنْدُون» قرب طرسوس وهو على رأس صائفة
      أرسلها لغزو بلاد قبادوقية، عن نحو ثمان وأربعين سنة. شهد
      عهده الذي استمر عشرين سنة استحكام النفوذ الخراساني
      ببغداد، وتأسيس «بيت الحكمة» وذروة حركة الترجمة التي
      نقلت الفلسفة اليونانية والرياضيات والطب إلى العربية،
      وفرض «المحنة» — أي محنة خلق القرآن التي كانت قائمة عند
      وفاته. وكان قد عيّن أخاه المعتصم وليّاً للعهد بدل ابنه
      العباس، وهو ما ضمن انتقال السلطة. ودفن بطرسوس وبويع
      أخوه المعتصم بالخلافة هناك قبل عودة الجيش إلى العراق.
      وتسجّل التقليد السنّي «المحنة» خطأً جسيماً في عهد عظيم
      النتائج، وأجمع المؤرخون على الثناء على رعايته للعلم.
    description_fr: |
      ʿAbd Allāh al-Maʾmūn ibn Hārūn al-Rashīd, septième calife
      abbasside (règne 198-218 H), mourut sur la frontière
      byzantine au bourg d'al-Budandūn près de Tarse, alors qu'il
      dirigeait une campagne d'été en Cappadoce, âgé d'environ
      quarante-huit ans. Son règne de vingt ans vit la
      consolidation de l'influence khurāsānienne à Baghdād, la
      fondation de la *Bayt al-Ḥikma* et l'apogée du mouvement
      de traduction qui transposa philosophie grecque,
      mathématiques et médecine en arabe, et l'imposition de la
      *Miḥna* — l'inquisition doctrinale sur le caractère créé
      du Coran, déjà en cours à sa mort. Il avait aussi
      récemment désigné son frère al-Muʿtaṣim comme successeur
      à la place de son fils al-ʿAbbās, décision qui assura la
      transition. Il fut enterré à Tarse et son frère al-
      Muʿtaṣim y fut acclamé calife avant le retour de l'armée
      en Irak. La tradition sunnite consigne la Miḥna comme une
      grave erreur d'un règne par ailleurs déterminant; son
      mécénat scientifique est unanimement loué.
    canonical_hijri: {year: 218, month: 7, day: 17, precision: day}
    canonical_gregorian: {date: 833-08-12, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives the death of al-Maʾmūn at al-Budandūn near Tarsus in Rajab 218 AH and details his death-bed designation of al-Muʿtaṣim."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters the death of al-Maʾmūn under 218 AH and confirms burial at Tarsus."
      - source_key: dhahabi_siyar
        notes: "al-Dhahabī's Siyar Aʿlām al-Nubalāʾ enters the obituary of al-Maʾmūn under 218 AH."
    people: [[al-mamun, died]]
    tags: [abbasid, caliph, mihna, tarsus, byzantine-frontier]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # END OF THE MIHNA
  # =========================================================================

  - slug: end-of-the-mihna
    category: religious_movement_event
    title_en: End of the Miḥna under Caliph al-Mutawakkil
    title_ar: انتهاء محنة خلق القرآن في عهد المتوكل
    title_fr: Fin de la Miḥna sous le calife al-Mutawakkil
    description_en: |
      Caliph Jaʿfar al-Mutawakkil ʿalā Allāh formally reversed
      the Muʿtazilite *Miḥna* — the doctrinal inquisition over
      the createdness of the Qurʾān imposed by his predecessors
      al-Maʾmūn, al-Muʿtaṣim, and al-Wāthiq — by ordering an end
      to the interrogation of judges, scholars, and traditionists
      on the question, releasing those still imprisoned, and
      restoring the traditionalist position as the official
      doctrine of the caliphate. He summoned the muḥaddithūn
      (hadith scholars) to public sessions in the mosques of
      Baghdad and Sāmarrāʾ to dictate hadith — including hadith
      affirming the un-createdness of the Qurʾān — to the
      common people, formally signalling the rehabilitation of
      Imām Aḥmad ibn Ḥanbal and the Sunni traditionalist
      *ahl al-ḥadīth*. Classical Sunni historians count the end
      of the Miḥna among the three or four most consequential
      acts of the Abbasid caliphate, alongside the founding of
      Baghdad itself.
    description_ar: |
      رفع الخليفة جعفر المتوكل على الله رسمياً «المحنة»
      المعتزلية — محنة خلق القرآن التي فرضها أسلافُه المأمون
      والمعتصم والواثق — فأمر بكفّ سؤال القضاة والعلماء
      والمحدّثين عن المسألة، وأطلق من بقي في السجن منهم،
      وأعاد مذهب أهل السنة العقدي مذهباً رسمياً للخلافة. ودعا
      المحدّثين إلى مجالس عامة بمساجد بغداد وسامراء يملون
      فيها على الناس الحديث — ومنه الأحاديث المؤكدة لعدم خلق
      القرآن — إعلاناً برد الاعتبار للإمام أحمد بن حنبل
      وأهل الحديث من السنّة. ويعدّ المؤرخون الكلاسيكيون من
      أهل السنة رفع المحنة من أعظم ثلاثة أو أربعة أعمال
      للخلافة العباسية إلى جنب تأسيس بغداد ذاتها.
    description_fr: |
      Le calife Jaʿfar al-Mutawakkil ʿalā Allāh révoqua
      formellement la *Miḥna* muʿtazilite — l'inquisition
      doctrinale sur le caractère créé du Coran imposée par ses
      prédécesseurs al-Maʾmūn, al-Muʿtaṣim et al-Wāthiq — en
      ordonnant la fin des interrogatoires des cadis, savants
      et traditionnistes sur la question, en libérant ceux qui
      étaient encore emprisonnés, et en rétablissant la position
      traditionniste comme doctrine officielle du califat. Il
      convoqua les muḥaddithūn (savants de hadith) dans des
      séances publiques aux mosquées de Baghdād et Sāmarrāʾ
      pour dicter des hadiths — y compris ceux affirmant
      l'incréé du Coran — au commun, signalant la réhabilitation
      formelle de l'imām Aḥmad ibn Ḥanbal et des traditionnistes
      sunnites *ahl al-ḥadīth*. Les historiens sunnites
      classiques comptent la fin de la Miḥna parmi les trois ou
      quatre actes les plus déterminants du califat abbasside,
      aux côtés de la fondation de Baghdād elle-même.
    canonical_hijri: {year: 234, precision: year}
    canonical_gregorian: {date: 848-08-10, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the reversal of the Miḥna and the public hadith dictations under 234 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives the year 234 AH for al-Mutawakkil's official ending of the Miḥna and the rehabilitation of the muḥaddithūn."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms 234 AH for the formal end of the inquisition."
    people: [[al-mutawakkil, leader], [ahmad-ibn-hanbal, subject]]
    tags: [abbasid, mihna, mutawakkil, ahmad-ibn-hanbal, sunni-revival, hadith]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # DEATH OF AL-WATHIQ AND THE ANARCHY AT SAMARRA
  # =========================================================================

  - slug: death-of-al-wathiq
    category: ruler_death
    title_en: Death of Caliph al-Wāthiq
    title_ar: وفاة الخليفة الواثق
    title_fr: Mort du calife al-Wāthiq
    description_en: |
      Hārūn ibn al-Muʿtaṣim al-Wāthiq bi-Allāh, ninth Abbasid
      caliph (reigned 227-232 AH), died at Sāmarrāʾ at age about
      36, having reigned for less than six years. His brief
      reign continued the Miḥna doctrinal policy of his father
      al-Muʿtaṣim and grandfather al-Maʾmūn — the most violent
      phase of the inquisition, in which the elderly traditionist
      Aḥmad ibn Naṣr al-Khuzāʿī was executed at the caliph's
      own hand for refusing to affirm the createdness of the
      Qurʾān. He patronised astronomers and translators in the
      tradition of al-Maʾmūn, ordering a verification of the
      degree-length on the plain north of Sinjār. He was
      succeeded by his brother al-Mutawakkil, whose reversal
      of the Miḥna two years later would distinguish his reign
      from al-Wāthiq's; classical sources note al-Wāthiq's
      reign as the last in which the Mu'tazilite doctrine held
      official force.
    description_ar: |
      توفي الخليفة هارون بن المعتصم الواثق بالله — تاسع خلفاء
      بني العباس (حكم من ٢٢٧ إلى ٢٣٢ هـ) — بسامراء عن نحو ست
      وثلاثين سنة، بعد أن حكم أقل من ست سنوات. واصل عهده
      القصير سياسة المحنة العقدية التي ورثها عن أبيه المعتصم
      وجده المأمون — وهي أعنف مراحل المحنة، إذ أعدم فيها
      الشيخ أحمد بن نصر الخزاعي المحدّث بسيف الخليفة بنفسه
      لرفضه القول بخلق القرآن. ورعى الواثق المنجمين
      والمترجمين على نهج المأمون، وأمر بقياس درجة الفلك في
      سهل سنجار شمالاً. وخلفه أخوه المتوكل الذي رفع المحنة
      بعد سنتين فميّز عهده من عهد الواثق. ويسجّل المؤرخون
      الكلاسيكيون عهد الواثق آخر العهود التي ظلّ فيها مذهب
      المعتزلة مذهباً رسمياً للدولة.
    description_fr: |
      Hārūn ibn al-Muʿtaṣim al-Wāthiq bi-Allāh, neuvième calife
      abbasside (règne 227-232 H), mourut à Sāmarrāʾ à environ
      trente-six ans, après moins de six ans de règne. Son bref
      règne poursuivit la politique doctrinale de la Miḥna de
      son père al-Muʿtaṣim et de son grand-père al-Maʾmūn —
      la phase la plus violente de l'inquisition, durant
      laquelle le vieux traditionniste Aḥmad ibn Naṣr al-Khuzāʿī
      fut exécuté de la main même du calife pour avoir refusé
      d'affirmer le caractère créé du Coran. Il fut le mécène
      d'astronomes et de traducteurs dans la tradition d'al-
      Maʾmūn, ordonnant une vérification de la longueur du
      degré dans la plaine au nord de Sinjār. Lui succéda son
      frère al-Mutawakkil, dont la révocation de la Miḥna deux
      ans plus tard distinguerait son règne de celui d'al-
      Wāthiq; les sources classiques voient le règne d'al-
      Wāthiq comme le dernier où la doctrine muʿtazilite avait
      force officielle.
    canonical_hijri: {year: 232, month: 12, day: 24, precision: day}
    canonical_gregorian: {date: 847-08-15, precision: day, method: tabular_conversion}
