  - slug: anarchy-at-samarra-begins
    category: political_event
    title_en: The Anarchy at Sāmarrāʾ Begins
    title_ar: بداية فوضى سامراء
    title_fr: Début de l'anarchie de Sāmarrāʾ
    description_en: |
      The assassination of caliph al-Mutawakkil by Turkish
      guardsmen in collusion with his son al-Muntaṣir in Shawwāl
      247 AH inaugurated a nine-year period in which the Abbasid
      caliphate effectively passed under the control of the
      Turkish military commanders at Sāmarrāʾ, who made and
      unmade four caliphs in rapid succession: al-Muntaṣir
      (six months in 247-248 AH), al-Mustaʿīn (deposed and
      killed 252 AH), al-Muʿtazz (deposed and killed 255 AH),
      and al-Muhtadī (killed 256 AH). Each was raised to the
      throne and removed at the Turkish guards' pleasure;
      treasuries were emptied to pay the soldiery, civil
      administration broke down, and provinces drifted toward
      autonomy. Order was finally restored when al-Muʿtamid's
      brother al-Muwaffaq seized effective regency and crushed
      the army factions. al-Ṭabarī, Ibn al-Athīr, and Ibn
      Kathīr all describe the period as the lowest point of
      the Abbasid state before the Buyid takeover; the term
      *fitnat Sāmarrāʾ* ("the anarchy at Sāmarrāʾ") is the
      classical historiographical label.
    description_ar: |
      فتحت قتلة الخليفة المتوكل التي ارتكبها جند الأتراك
      بالتواطؤ مع ابنه المنتصر في شوال سنة ٢٤٧ هـ تسع سنين
      انتقلت فيها الخلافة العباسية فعلياً إلى يد قواد الأتراك
      بسامراء، فعزلوا أربعةً من الخلفاء وولَّوا غيرهم في
      تتابع سريع: المنتصر (ستة أشهر سنة ٢٤٧-٢٤٨ هـ)، والمستعين
      (خُلع وقُتل سنة ٢٥٢ هـ)، والمعتز (خُلع وقُتل سنة ٢٥٥ هـ)،
      والمهتدي (قُتل سنة ٢٥٦ هـ). يرفع جند الأتراك من شاؤوا
      ويعزلون من شاؤوا؛ فُرغت بيوت الأموال لرواتب الجند،
      وانهار النظام الإداري، واتجهت الولايات نحو الاستقلال.
      ولم تعد الأمور إلى نصابها إلا حين تولّى أخو المعتمد
      الموفقُ النيابةَ الفعلية وقمع فصائل الجند. ويصف الطبري
      وابن الأثير وابن كثير هذه المرحلة بأنها أحط نقطة
      للدولة العباسية قبل استيلاء البويهيين، ومصطلح «فتنة
      سامراء» هو اللقب التاريخي الكلاسيكي لها.
    description_fr: |
      L'assassinat du calife al-Mutawakkil par les gardes turcs
      en collusion avec son fils al-Muntaṣir en Shawwāl 247 H
      inaugura une période de neuf ans où le califat abbasside
      passa effectivement sous le contrôle des commandants
      militaires turcs de Sāmarrāʾ, qui firent et défirent
      quatre califes en succession rapide : al-Muntaṣir (six
      mois en 247-248 H), al-Mustaʿīn (déposé et tué en 252 H),
      al-Muʿtazz (déposé et tué en 255 H) et al-Muhtadī (tué
      en 256 H). Chacun fut élevé au trône et destitué au gré
      des gardes turcs; les trésors furent vidés pour solder
      la troupe, l'administration civile s'effondra, les
      provinces dérivèrent vers l'autonomie. L'ordre ne fut
      rétabli que lorsque al-Muwaffaq, frère d'al-Muʿtamid,
      saisit la régence effective et écrasa les factions de
      l'armée. al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr décrivent
      tous la période comme le point le plus bas de l'État
      abbasside avant la prise de pouvoir des Buyides; le
      terme *fitnat Sāmarrāʾ* (« anarchie de Sāmarrāʾ ») est
      l'étiquette classique de l'historiographie.
    canonical_hijri: {year: 247, month: 12, precision: month}
    canonical_gregorian: {date: 862-02-09, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives a year-by-year narrative of the rapid succession of caliphs at Sāmarrāʾ from 247 to 256 AH and identifies the period as a *fitna*."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil confirms the chronology of the four short caliphates and their depositions."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr describes the period as the nadir of Abbasid temporal authority."
    people: [[al-mutawakkil, subject]]
    tags: [abbasid, samarra, anarchy, turkish-guards, fitna]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # ZANJ REBELLION
  # =========================================================================

  - slug: zanj-rebellion-outbreak
    category: political_event
    title_en: Outbreak of the Zanj Rebellion in Lower Iraq
    title_ar: اندلاع ثورة الزنج في جنوب العراق
    title_fr: Éclatement de la révolte des Zanj en Bas-Iraq
    description_en: |
      The slave revolt of the Zanj — the East African plantation
      labourers employed in clearing the salt-encrusted soil of
      the Baṣra region for cultivation — broke out in Ramaḍān
      255 AH under the leadership of ʿAlī ibn Muḥammad, an
      Arabic-speaking insurgent of obscure origin who claimed
      ʿAlid descent and proclaimed an egalitarian programme to
      his followers. Within three years the rebellion had
      captured al-Ubulla and the city of al-Baṣra itself —
      sacked and burned in 257 AH with thousands of inhabitants
      killed, an event that shocked the Muslim world — and
      established a fortified capital at al-Mukhtāra on the
      Euphrates. For nearly fifteen years the rebels controlled
      lower Iraq and Khūzistān, repeatedly defeated Abbasid
      armies sent against them, and threatened Wāsiṭ and
      Baghdad itself. al-Ṭabarī, who lived through the war,
      gives the most detailed account; he treats the leader's
      ʿAlid claim as fraudulent.
    description_ar: |
      اندلعت ثورة الزنج — وهم العبيد الأفارقة الذين كانوا
      يعملون في تجفيف ملوحة أرض البصرة لزراعتها — في رمضان
      سنة ٢٥٥ هـ بقيادة علي بن محمد، الثائر العربي اللسان
      المجهول الأصل، الذي ادّعى نسباً علوياً ودعا أتباعه
      إلى منهج مساواتي. وفي ثلاث سنين كانت الثورة قد فتحت
      الأبلّة والبصرةَ نفسها — التي نُهبت وأُحرقت سنة ٢٥٧ هـ
      وقتل بها ألوف من أهلها، وهو حدث صدم العالم الإسلامي
      كله — وأقامت عاصمة مُحصّنة في «المختارة» على الفرات.
      وسيطرت الثورة قرابة خمس عشرة سنة على جنوب العراق
      وخوزستان، وهزمت جيوش الخلافة المرسلة عليها مراراً،
      وهدّدت واسط وبغداد ذاتها. وأطول الروايات هي رواية
      الطبري الذي عاصر الحرب، وقد عدّ ادعاءَ الزعيم النسبَ
      العلوي ادعاءً كاذباً.
    description_fr: |
      La révolte des esclaves Zanj — les travailleurs africains
      employés à dessaler le sol de la région de Baṣra pour le
      mettre en culture — éclata en Ramaḍān 255 H sous la
      direction de ʿAlī ibn Muḥammad, insurgé arabophone d'origine
      obscure qui se réclama d'une descendance ʿalide et proclama
      à ses partisans un programme égalitaire. En trois ans la
      révolte avait pris al-Ubulla et la ville de Baṣra elle-
      même — saccagée et brûlée en 257 H avec des milliers
      d'habitants tués, événement qui choqua le monde musulman —
      et établi une capitale fortifiée à al-Mukhtāra sur
      l'Euphrate. Près de quinze ans durant, les rebelles
      contrôlèrent le Bas-Iraq et le Khūzistān, défirent à
      maintes reprises les armées abbassides envoyées contre
      eux, et menacèrent Wāsiṭ puis Baghdād même. al-Ṭabarī,
      contemporain de la guerre, donne le récit le plus détaillé
      et tient la prétention ʿalide du chef pour frauduleuse.
    canonical_hijri: {year: 255, month: 9, precision: month}
    canonical_gregorian: {date: 869-08-17, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī devotes extensive sections to the outbreak of the Zanj rebellion in Ramaḍān 255 AH and gives the most detailed contemporary chronicle."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters the Zanj rebellion under 255 AH and follows its progress year by year."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr summarises the Zanj rebellion in al-Bidāya wa-l-Nihāya, treating the leader's ʿAlid claim as false."
    tags: [abbasid, zanj, rebellion, basra, iraq, slavery]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: suppression-of-zanj-rebellion
    category: political_event
    title_en: Suppression of the Zanj Rebellion by al-Muwaffaq
    title_ar: قمع ثورة الزنج على يد الموفق
    title_fr: Suppression de la révolte des Zanj par al-Muwaffaq
    description_en: |
      The Zanj rebellion that had controlled lower Iraq for
      nearly fifteen years was finally crushed by the regent
      al-Muwaffaq Ṭalḥa ibn al-Mutawakkil and his son Abū al-
      ʿAbbās — the future caliph al-Muʿtaḍid — after a three-
      year campaign of fortified river-flotilla operations
      against the rebel capital al-Mukhtāra at the confluence
      of the Tigris and Euphrates. The final assault breached
      the city; the leader ʿAlī ibn Muḥammad was killed and his
      head carried on a pole through the Abbasid camp, and the
      remaining Zanj were either killed or surrendered. The
      victory was the most consequential military success of
      the Abbasid recovery under al-Muwaffaq's regency: it
      restored caliphal authority over the lower Iraqi
      heartland, freed the agriculture of southern Iraq from
      a decade and a half of devastation, and established the
      reputation of Abū al-ʿAbbās that would secure his own
      caliphate as al-Muʿtaḍid eight years later. al-Ṭabarī
      gives a triumphal account; Ibn al-Athīr follows him.
    description_ar: |
      قُضي على ثورة الزنج التي سيطرت على جنوب العراق قرابة
      خمس عشرة سنة على يد الأمير الموفق طلحة بن المتوكل
      وابنه أبي العباس — الخليفة المعتضد فيما بعد — بعد حملة
      ثلاث سنين قائمة على عمليات الأساطيل النهرية المحصّنة
      ضد عاصمة الثورة «المختارة» عند ملتقى دجلة والفرات.
      اخترق الجيش الخلافي المدينة في الهجمة الأخيرة، وقتل
      الزعيم علي بن محمد وحُمل رأسه على رمح في معسكر
      الخلافة، وقتل من تبقى من الزنج أو استسلم. وكان النصر
      أعظم انتصار عسكري للنهضة العباسية في زمن نيابة الموفق:
      فأعاد سلطة الخلافة على قلب جنوب العراق، وحرّر زراعة
      البلاد من خمسة عشر عاماً من الخراب، وأرسى سمعة أبي
      العباس التي ضمنت له الخلافة باسم المعتضد بعد ثماني
      سنوات. ويعطي الطبري رواية ظافرة، ويتابعه ابن الأثير.
    description_fr: |
      La révolte zanj qui contrôlait le Bas-Iraq depuis près de
      quinze ans fut finalement écrasée par le régent al-
      Muwaffaq Ṭalḥa ibn al-Mutawakkil et son fils Abū al-
      ʿAbbās — futur calife al-Muʿtaḍid — au terme d'une
      campagne de trois ans menée par flottille fluviale
      fortifiée contre la capitale rebelle al-Mukhtāra, au
      confluent du Tigre et de l'Euphrate. L'assaut final perça
      la ville; le chef ʿAlī ibn Muḥammad fut tué et sa tête
      portée sur une pique à travers le camp abbasside, les
      Zanj restants tués ou se rendant. La victoire fut le
      succès militaire le plus déterminant du redressement
      abbasside sous la régence d'al-Muwaffaq : elle rétablit
      l'autorité califale sur le cœur du Bas-Iraq, libéra
      l'agriculture méridionale de quinze ans de dévastation,
      et fonda la réputation d'Abū al-ʿAbbās qui lui assurerait
      son propre califat en tant qu'al-Muʿtaḍid huit ans plus
      tard. al-Ṭabarī en donne un récit triomphal; Ibn al-Athīr
      le suit.
    canonical_hijri: {year: 270, month: 2, day: 2, precision: day}
    canonical_gregorian: {date: 883-08-15, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives the death of ʿAlī ibn Muḥammad and the fall of al-Mukhtāra under Ṣafar 270 AH."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters the suppression of the Zanj rebellion under 270 AH and follows al-Ṭabarī's chronology."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 270 AH for the final Abbasid victory."
    people: [[al-muwaffaq, leader], [al-mutadid, leader]]
    tags: [abbasid, zanj, rebellion, basra, iraq, al-muwaffaq]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-muwaffaq
    category: ruler_death
    title_en: Death of the Regent al-Muwaffaq
    title_ar: وفاة الأمير الموفق
    title_fr: Mort du régent al-Muwaffaq
    description_en: |
      Abū Aḥmad Ṭalḥa ibn al-Mutawakkil, known by his caliphal
      title al-Muwaffaq bi-Allāh, brother of caliph al-Muʿtamid
      and the *de facto* ruler of the Abbasid state for the
      preceding two decades, died at Baghdad at age about 49.
      Officially he was only the heir-apparent and the
      commander of the army; in fact he had been the
      indispensable figure of the Abbasid recovery from the
      anarchy at Sāmarrāʾ — crushing the Zanj rebellion in 270
      AH, restraining the ambitions of the Ṣaffārids in Khurāsān,
      and re-imposing caliphal authority over the lower Iraqi
      heartland. His son Abū al-ʿAbbās succeeded as caliph al-
      Muʿtaḍid the following year. al-Ṭabarī treats al-Muwaffaq's
      regency as a brief restoration before the inevitable
      decline; Ibn al-Athīr concurs and gives the standard
      obituary entry under 278 AH.
    description_ar: |
      توفي الأمير أبو أحمد طلحة بن المتوكل المعروف بلقبه
      الخلافي «الموفق بالله» — أخو الخليفة المعتمد والحاكم
      الفعلي للدولة العباسية في العقدين الماضيين — ببغداد عن
      نحو تسع وأربعين سنة. كان في الرسم وليّ عهد وقائد جند
      فحسب، لكنه في الواقع كان محور النهضة العباسية بعد فتنة
      سامراء — قضى على ثورة الزنج سنة ٢٧٠ هـ، وكفّ مطامع
      الصفاريين في خراسان، وأعاد سلطة الخلافة على قلب جنوب
      العراق. وخلفه ابنه أبو العباس بالخلافة باسم «المعتضد»
      في العام التالي. ويعتبر الطبري نيابة الموفق نهضةً قصيرة
      قبل الانحدار الحتمي؛ وأقرّه ابن الأثير، وأورد ترجمته
      المعهودة في حوادث سنة ٢٧٨ هـ.
    description_fr: |
      Abū Aḥmad Ṭalḥa ibn al-Mutawakkil, connu sous son titre
      califal d'al-Muwaffaq bi-Allāh, frère du calife al-
      Muʿtamid et souverain *de facto* de l'État abbasside
      pendant les deux décennies précédentes, mourut à Baghdād
      à environ quarante-neuf ans. Il n'était officiellement
      qu'héritier présomptif et commandant de l'armée; en fait
      il avait été la figure indispensable du redressement
      abbasside après l'anarchie de Sāmarrāʾ — écrasement de
      la révolte zanj en 270 H, contention des ambitions
      ṣaffārides au Khurāsān, restauration de l'autorité
      califale sur le cœur du Bas-Iraq. Son fils Abū al-ʿAbbās
      lui succéda comme calife al-Muʿtaḍid l'année suivante.
      al-Ṭabarī tient la régence d'al-Muwaffaq pour une brève
      restauration avant le déclin inéluctable; Ibn al-Athīr
      concorde et donne l'obituaire standard sous 278 H.
    canonical_hijri: {year: 278, month: 2, day: 22, precision: day}
    canonical_gregorian: {date: 891-06-09, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of al-Muwaffaq in Ṣafar 278 AH and notes that his son Abū al-ʿAbbās would succeed his uncle al-Muʿtamid the following year."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr confirms the death of al-Muwaffaq under 278 AH at Baghdad."
      - source_key: dhahabi_siyar
        notes: "al-Dhahabī's Siyar Aʿlām al-Nubalāʾ gives the obituary of al-Muwaffaq under 278 AH."
    people: [[al-muwaffaq, died], [al-mutadid, subject]]
    tags: [abbasid, regent, baghdad, al-muwaffaq, zanj]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # QARMATIAN RAID AND THE BLACK STONE
  # =========================================================================

  - slug: qarmatian-raid-on-mecca
    category: political_event
    title_en: Qarmatian Raid on Mecca and Theft of the Black Stone
    title_ar: غارة القرامطة على مكة وسرقة الحجر الأسود
    title_fr: Raid qarmate sur La Mecque et vol de la Pierre noire
    description_en: |
      Abū Ṭāhir al-Janābī, leader of the Qarmatian state at al-
      Aḥsāʾ in eastern Arabia — an Ismaʿili-derived breakaway
      sect universally condemned by the Sunni mainstream and by
      most Shīʿa as well — sacked Mecca on 8 Dhū al-Ḥijja 317
      AH during the Hajj season, slaughtering pilgrims in the
      Sacred Mosque itself, filling the well of Zamzam with
      corpses, and prying the Black Stone (*al-Ḥajar al-Aswad*)
      from the corner of the Kaʿba and carrying it back to
      al-Aḥsāʾ. Classical historians count the attack among the
      gravest sacrileges in Islamic history. The Black Stone
      remained in Qarmatian hands for twenty-two years until
      its return in 339 AH after extensive Abbasid and Fāṭimid
      diplomatic pressure. The Qarmatians' radicalism — their
      attack on the Hajj, their claimed antinomian doctrines,
      their alliance with no part of the Muslim mainstream —
      placed them outside both Sunni and most Shīʿa frameworks
      of legitimacy. Ibn al-Athīr and Ibn Kathīr both record
      the raid in detail; al-Dhahabī condemns it as among the
      worst calamities of the age.
    description_ar: |
      أوقع أبو طاهر الجنابي — زعيم دولة القرامطة بالأحساء في
      شرق الجزيرة العربية، وهي فرقة باطنية إسماعيلية الأصل
      أجمع عامة المسلمين من السنّة وغالبية الشيعة على ذمّها —
      مذبحةً في مكة يوم ٨ ذي الحجة سنة ٣١٧ هـ في موسم الحج،
      فقتلوا الحجاج في المسجد الحرام نفسه، وملأ بئر زمزم
      جثثاً، وقلع «الحجر الأسود» من ركن الكعبة وحمله إلى
      الأحساء. ويعدّ المؤرخون الكلاسيكيون هذه الواقعةَ من
      أعظم انتهاكات الحرمات في تاريخ الإسلام. وبقي الحجر
      الأسود في يد القرامطة اثنتين وعشرين سنة حتى رُدّ سنة
      ٣٣٩ هـ بعد ضغوط دبلوماسية مكثفة من الخلافة العباسية
      والدولة الفاطمية. وقد أخرج تطرّف القرامطة — اعتداؤهم
      على الحج، ومذاهبهم المنسوبة إليهم في إسقاط الفرائض،
      وعدم تحالفهم مع أي من فرق المسلمين الرئيسية — أخرجهم
      من إطاري الشرعية عند السنّة وعند جمهور الشيعة كذلك.
      ويسجّل ابن الأثير وابن كثير الواقعةَ مفصّلةً، ويذمّها
      الذهبي ذمّاً شديداً ضمن أكبر مصائب العصر.
    description_fr: |
      Abū Ṭāhir al-Janābī, chef de l'État qarmate d'al-Aḥsāʾ en
      Arabie orientale — secte dissidente d'origine ismaʿilienne
      universellement condamnée par le sunnisme dominant et par
      la majorité du shīʿisme également — saccagea La Mecque le
      8 Dhū al-Ḥijja 317 H durant la saison du Hajj, massacrant
      les pèlerins dans la Mosquée sacrée elle-même, comblant
      le puits de Zamzam de cadavres, et arrachant la Pierre
      noire (*al-Ḥajar al-Aswad*) de l'angle de la Kaʿba pour
      l'emporter à al-Aḥsāʾ. Les historiens classiques classent
      l'attaque parmi les sacrilèges les plus graves de
      l'histoire islamique. La Pierre resta vingt-deux ans aux
      mains des Qarmates jusqu'à sa restitution en 339 H après
      d'intenses pressions diplomatiques abbassides et
      fāṭimides. Le radicalisme qarmate — leur attaque contre
      le Hajj, leurs doctrines antinomistes alléguées, leur
      alliance avec aucune fraction de l'islam dominant — les
      plaça hors des cadres de légitimité sunnites comme de la
      plupart des shīʿites. Ibn al-Athīr et Ibn Kathīr
      rapportent tous deux le raid en détail; al-Dhahabī le
      condamne parmi les pires calamités de l'époque.
    canonical_hijri: {year: 317, month: 12, day: 8, precision: day}
    canonical_gregorian: {date: 930-01-17, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the Qarmatian raid on Mecca and the theft of the Black Stone in detail under 317 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya confirms 317 AH and gives a detailed condemnation of the act."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the raid under 317 AH as among the gravest sacrileges of the period."
    people: [[abu-tahir-al-janabi, leader]]
    tags: [abbasid, qarmati, mecca, black-stone, kaaba, hajj]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: return-of-the-black-stone
    category: political_event
    title_en: Return of the Black Stone to the Kaʿba
    title_ar: ردّ الحجر الأسود إلى الكعبة
    title_fr: Retour de la Pierre noire à la Kaʿba
    description_en: |
      Twenty-two years after Abū Ṭāhir al-Janābī's Qarmatian
      forces had pried the Black Stone from the Kaʿba and
      carried it to al-Aḥsāʾ, the relic was finally returned
      to Mecca and reinstalled in the corner of the Sacred
      House. Classical sources differ on the immediate trigger
      — al-Mas'ūdī and Ibn al-Athīr cite extensive diplomatic
      pressure and large payments by the Abbasid caliphate
      under al-Muṭīʿ and (in some accounts) the Fāṭimid caliph
      al-Manṣūr ʿubayd Allāh — but agree that the Stone was
      brought back in 339 AH and that its return marked a
      partial restoration of the dignity of the Sacred Mosque
      after the trauma of 317 AH. Ibn al-Athīr notes that
      sceptics had wondered whether the returned stone was the
      original; the *qurayshī* descendants of the Banū Shayba —
      hereditary keepers of the Kaʿba's keys — verified its
      authenticity by its ability to float on water, a test
      already preserved in Hajj-pilgrimage tradition. The
      Stone has remained in the Kaʿba ever since.
    description_ar: |
      بعد اثنتين وعشرين سنة من قلع جند أبي طاهر الجنابي
      القرمطي للحجر الأسود من الكعبة وحمله إلى الأحساء، رُدّ
      الحجرُ أخيراً إلى مكة وأُعيد تركيبه في ركن البيت
      الحرام. واختلفت المصادر الكلاسيكية في السبب المباشر —
      فأشار المسعودي وابن الأثير إلى ضغوط دبلوماسية مكثفة
      وأموال جسيمة دفعتها الخلافة العباسية في عهد المطيع
      وكذلك (في بعض الروايات) الخليفة الفاطمي المنصور عبيد
      الله — لكنها تجمع على أن الحجر رُدّ سنة ٣٣٩ هـ، وأن
      ردّه شكّل عودةً جزئية لهيبة الحرم بعد صدمة سنة ٣١٧ هـ.
      وذكر ابن الأثير أن المشككين تساءلوا أكان المردود هو
      الحجر الأصل، فتحقق بنو شيبة القرشيون — حملة مفتاح
      الكعبة بالوراثة — من أصالته بقدرته على الطفو على الماء،
      وهو امتحان معروف في تقليد الحج. وبقي الحجر في ركن
      الكعبة منذ ذلك الحين.
    description_fr: |
      Vingt-deux ans après que les forces qarmates d'Abū Ṭāhir
      al-Janābī eurent arraché la Pierre noire de la Kaʿba et
      l'eurent emportée à al-Aḥsāʾ, la relique fut enfin rendue
      à La Mecque et réinstallée à l'angle de la Maison Sacrée.
      Les sources classiques divergent sur le déclencheur
      immédiat — al-Masʿūdī et Ibn al-Athīr citent d'intenses
      pressions diplomatiques et de fortes sommes versées par
      le califat abbasside sous al-Muṭīʿ et (selon certains
      récits) le calife fāṭimide al-Manṣūr ʿUbayd Allāh — mais
      s'accordent à dire que la Pierre fut rapportée en 339 H
      et que son retour marqua une restauration partielle de
      la dignité de la Mosquée sacrée après le traumatisme de
      317 H. Ibn al-Athīr note que les sceptiques se demandèrent
      si la pierre rendue était l'original; les Banū Shayba
      qurayshites — gardiens héréditaires des clés de la Kaʿba
      — vérifièrent son authenticité par sa capacité à flotter
      sur l'eau, épreuve déjà conservée dans la tradition du
      Hajj. La Pierre est restée dans la Kaʿba depuis lors.
    canonical_hijri: {year: 339, precision: year}
    canonical_gregorian: {date: 950-06-19, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the return of the Black Stone under 339 AH and describes the verification ritual at the Kaʿba."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the return in 339 AH."
    people: [[abu-tahir-al-janabi, subject]]
    tags: [abbasid, qarmati, mecca, black-stone, kaaba]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # END OF EFFECTIVE ABBASID TEMPORAL POWER
  # =========================================================================

  - slug: buyid-takeover-of-baghdad
    category: political_event
    title_en: Muʿizz al-Dawla Enters Baghdad — End of Abbasid Temporal Authority
    title_ar: دخول معز الدولة بغداد — نهاية السلطة الزمنية للعباسيين
    title_fr: Muʿizz al-Dawla entre à Baghdād — fin de l'autorité temporelle abbasside
    description_en: |
      Aḥmad ibn Buwayh Muʿizz al-Dawla, leader of the Daylamite
      Buyid forces from western Iran, entered Baghdad and was
      received by caliph al-Mustakfī, marking the end of the
      Abbasids' effective temporal authority over their own
      capital after two centuries. The caliph confirmed Muʿizz
      al-Dawla as *amīr al-umarāʾ* ("commander of commanders"),
      formally vesting in him the executive functions of the
      state; within three months Muʿizz al-Dawla deposed and
      blinded al-Mustakfī and installed al-Muṭīʿ as a more
      compliant figurehead. The Buyid era at Baghdad would
      last 110 years, during which the caliphs reigned only
      ceremonially and effective administrative, military, and
      fiscal control rested with the Buyid amīrs. Although the
      Buyids were Twelver-Shīʿa-leaning in personal allegiance
      — patronising the *ʿĀshūrāʾ* commemoration in Baghdad
      from 352 AH onward — they retained the Sunni Abbasid
      caliphate as the legitimating institution of the realm
      rather than displacing it. Ibn al-Athīr's *al-Kāmil*
      describes the entry as the de facto end of the Abbasid
      state.
    description_ar: |
      دخل أحمد بن بويه «معز الدولة» — قائد الديلم البويهيين
      القادمين من غرب إيران — بغدادَ، فاستقبله الخليفة
      المستكفي، فكان دخوله نهايةً للسلطة الزمنية الفعلية
      للعباسيين على عاصمتهم بعد قرنين كاملين. ولّاه الخليفةُ
      «أمير الأمراء» — وهو منصب يجمع فعلياً وظائف الدولة
      التنفيذية — وفي أقل من ثلاثة أشهر خلع معز الدولة
      المستكفيَ وسمل عينيه ونصّب المطيع بديلاً مطواعاً. ودام
      عهد البويهيين ببغداد مائة وعشر سنين، ظلّت الخلافة فيها
      رمزاً تشريفياً، وسلطة الإدارة والعسكر والمال الفعلية
      للأمراء البويهيين. ومع أن البويهيين كانوا في الولاء
      الشخصي يميلون إلى التشيع الإمامي — وقد رعوا إحياء
      «عاشوراء» ببغداد منذ سنة ٣٥٢ هـ — فإنهم أبقوا الخلافة
      العباسية السنّية بصفتها المؤسسة الشرعية للدولة بدل
      إلغائها. ويصف ابن الأثير في «الكامل» هذا الدخول بأنه
      نهاية فعلية للدولة العباسية.
    description_fr: |
      Aḥmad ibn Buwayh Muʿizz al-Dawla, chef des forces
      Daylamites buyides venues d'Iran occidental, entra à
      Baghdād et fut reçu par le calife al-Mustakfī, marquant
      la fin de l'autorité temporelle effective des Abbassides
      sur leur propre capitale après deux siècles. Le calife
      confirma Muʿizz al-Dawla comme *amīr al-umarāʾ*
      (« commandeur des commandeurs »), lui conférant
      formellement les fonctions exécutives de l'État; en moins
      de trois mois, Muʿizz al-Dawla déposa et aveugla al-
      Mustakfī, et installa al-Muṭīʿ comme figure de proue plus
      docile. L'ère buyide à Baghdād dura cent dix ans, durant
      laquelle les califes ne régnaient qu'à titre cérémoniel
      tandis que le contrôle administratif, militaire et fiscal
      effectif revenait aux émirs buyides. Bien que les Buyides
      penchassent personnellement vers le shīʿisme duodécimain
      — patronnant la commémoration de l'*ʿĀshūrāʾ* à Baghdād
      à partir de 352 H — ils conservèrent le califat abbasside
      sunnite comme institution légitimante du domaine plutôt
      que de l'abolir. Le *Kāmil* d'Ibn al-Athīr décrit l'entrée
      comme la fin de fait de l'État abbasside.
    canonical_hijri: {year: 334, month: 5, day: 11, precision: day}
    canonical_gregorian: {date: 945-12-24, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates the entry of Muʿizz al-Dawla into Baghdad to Jumādā al-ūlā 334 AH and describes the deposition of al-Mustakfī."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms the entry in 334 AH and the appointment of al-Muṭīʿ."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records the events of 334 AH including Muʿizz al-Dawla's takeover of Baghdad."
    people: [[muizz-al-dawla, leader]]
    tags: [abbasid, buyid, baghdad, muizz-al-dawla, end-of-temporal-authority]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: seljuk-tughril-enters-baghdad
    category: political_event
    title_en: Seljuk Sultan Ṭughril Beg Enters Baghdad — End of Buyid Rule
    title_ar: دخول السلطان السلجوقي طغرلبك بغداد — نهاية حكم البويهيين
    title_fr: Le sultan seldjoukide Ṭughril Beg entre à Baghdād — fin du règne buyide
    description_en: |
      Ṭughril Beg ibn Mīkāʾīl, founder of the Great Seljuk
      sultanate and leader of the Oghuz Turkish forces that had
      conquered most of Iran in the preceding two decades,
      entered Baghdad at the invitation of caliph al-Qāʾim,
      ending 110 years of Buyid control over the Abbasid capital.
      The Buyid amīr al-Malik al-Raḥīm was deposed and
      imprisoned, the Sunni *khuṭba* was restored to its full
      form, and Ṭughril was honoured by al-Qāʾim with the title
      *Sultan of the East and the West* — formalising the
      pattern in which the Seljuk sultans would hold executive
      authority while the Abbasid caliph retained spiritual
      legitimacy. Ṭughril's entry was hailed by Sunni
      historians as a deliverance from Shīʿī Buyid rule and as
      a step toward the Sunni revival that would culminate
      under his successor Alp Arslān and his vizier Niẓām al-
      Mulk. It also began the process by which Turkish
      sultanate, rather than Iranian or Arab amirate, became
      the dominant political form in the central Islamic lands.
    description_ar: |
      دخل السلطان طغرلبك بن ميكائيل — مؤسس دولة السلاجقة
      الكبرى وقائد قوات التركمان الغُز الذين فتحوا في العقدين
      السابقين معظمَ بلاد فارس — بغدادَ بدعوة من الخليفة
      القائم، فأنهى دخوله مائة وعشر سنين من سلطة البويهيين
      على عاصمة الخلافة. وعُزل الأمير البويهي «الملك الرحيم»
      وسُجن، وأُعيدت الخطبة السنّية إلى صورتها التامة، وكرّم
      القائمُ طغرلبك بلقب «سلطان المشرق والمغرب» — تأسيساً
      للتقليد الذي سيظل فيه السلاطين السلاجقة أصحابَ السلطة
      التنفيذية، والخليفة العباسي صاحبَ الشرعية الدينية. ورأى
      مؤرخو السنّة في دخول طغرلبك خلاصاً من سلطة البويهيين
      الشيعية وخطوةً نحو النهضة السنّية التي ستتوّج في عهد
      ألب أرسلان خلَفه ووزيره نظام الملك. وبدأت مع ذلك أيضاً
      صيرورة هيمنة السلطنة التركية على بلاد الإسلام الوسطى
      عوضاً عن الإمارة الإيرانية أو العربية.
    description_fr: |
      Ṭughril Beg ibn Mīkāʾīl, fondateur du sultanat seldjoukide
      majeur et chef des forces oghouz turques qui avaient
      conquis la majeure partie de l'Iran dans les deux décennies
      précédentes, entra à Baghdād à l'invitation du calife al-
      Qāʾim, mettant fin à cent dix ans de contrôle buyide sur
      la capitale abbasside. L'émir buyide al-Malik al-Raḥīm fut
      déposé et emprisonné, la *khuṭba* sunnite restaurée dans
      sa forme complète, et Ṭughril honoré par al-Qāʾim du titre
      de *Sultan de l'Orient et de l'Occident* — formalisant le
      schéma selon lequel les sultans seldjoukides détiendraient
      l'autorité exécutive tandis que le calife abbasside
      conserverait la légitimité spirituelle. L'entrée de
      Ṭughril fut saluée par les historiens sunnites comme une
      délivrance du joug buyide shīʿite et un pas vers le renouveau
      sunnite qui culminerait sous son successeur Alp Arslān et
      son vizir Niẓām al-Mulk. Elle inaugura aussi le processus
      par lequel le sultanat turc, plutôt que l'émirat iranien
      ou arabe, devint la forme politique dominante des terres
      centrales d'islam.
    canonical_hijri: {year: 447, month: 9, day: 25, precision: day}
    canonical_gregorian: {date: 1055-12-24, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil dates Ṭughril's entry to Ramaḍān 447 AH and describes the deposition of al-Malik al-Raḥīm and the bestowal of the sultanate title by al-Qāʾim."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 447 AH for Ṭughril's entry into Baghdad and the end of Buyid rule."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records Ṭughril's entry into Baghdad under 447 AH."
    people: [[tughril-beg, leader]]
    tags: [abbasid, seljuk, baghdad, tughril, buyid-end, sunni-revival]
    importance: major
