  # =========================================================================
  # LAST STRONG ABBASID CALIPH
  # =========================================================================

  - slug: death-of-al-nasir-li-din-allah
    category: ruler_death
    title_en: Death of Caliph al-Nāṣir li-Dīn Allāh
    title_ar: وفاة الخليفة الناصر لدين الله
    title_fr: Mort du calife al-Nāṣir li-Dīn Allāh
    description_en: |
      Aḥmad ibn al-Mustaḍīʾ al-Nāṣir li-Dīn Allāh, thirty-fourth
      Abbasid caliph (reigned 575-622 AH), died at Baghdad after
      a forty-seven-year reign — the longest in Abbasid history
      — at age about 70. He is widely regarded by classical
      historians as the last strong Abbasid caliph: he restored
      effective caliphal authority over central Iraq for the
      first time in nearly three centuries, broke the power of
      the Seljuk successor states by exploiting the Khwārazmian
      threat from the east, and reorganised the *futuwwa* — the
      chivalric brotherhoods of the city — under direct caliphal
      patronage as an institution of religious and political
      mobilisation. His foreign policy involved a complex
      diplomatic correspondence with the Ayyūbids, the
      Khwārazm-Shāhs, and even the Mongol *khans* on the eve
      of the catastrophe. After his death the caliphate
      declined sharply; within thirty-six years, in 656 AH,
      the Mongols under Hülegü would sack Baghdad and execute
      his great-great-grandson al-Mustaʿṣim, ending the
      Abbasid caliphate at Baghdad.
    description_ar: |
      توفي الخليفة أحمد بن المستضيء «الناصر لدين الله» —
      الرابع والثلاثون من خلفاء بني العباس (حكم من ٥٧٥ إلى ٦٢٢
      هـ) — ببغداد بعد سبع وأربعين سنة من الحكم، وهي أطول
      مدة خلافة في تاريخ بني العباس، عن نحو سبعين سنة. ويعدّه
      المؤرخون الكلاسيكيون آخر الخلفاء العباسيين الأقوياء:
      فقد أعاد سلطة الخلافة الفعلية على وسط العراق لأول مرة
      منذ نحو ثلاثة قرون، وكسر شوكة الدول السلجوقية الخالفة
      مستفيداً من خطر الخوارزميين القادم من الشرق، ونظَّم
      «الفتوة» — الأخويات الفروسية في المدن — تحت رعاية
      الخلافة المباشرة مؤسسةً دينية سياسية للتعبئة. وانخرطت
      سياسته الخارجية في مراسلات دبلوماسية معقدة مع
      الأيوبيين والخوارزم شاه، بل ومع خانات المغول عشية
      الكارثة. وبعد وفاته انحدرت الخلافة بسرعة؛ وفي ست
      وثلاثين سنة فقط، سنة ٦٥٦ هـ، نهبت قوات هولاكو المغولية
      بغداد وقتلت حفيد حفيده المستعصم، فأنهت الخلافة العباسية
      ببغداد.
    description_fr: |
      Aḥmad ibn al-Mustaḍīʾ al-Nāṣir li-Dīn Allāh, trente-
      quatrième calife abbasside (règne 575-622 H), mourut à
      Baghdād après un règne de quarante-sept ans — le plus
      long de l'histoire abbasside — âgé d'environ soixante-
      dix ans. Il est largement considéré par les historiens
      classiques comme le dernier calife abbasside fort : il
      restaura l'autorité califale effective sur le centre de
      l'Iraq pour la première fois en près de trois siècles,
      brisa la puissance des États successeurs seldjoukides en
      exploitant la menace khwārazmienne venue de l'est, et
      réorganisa la *futuwwa* — les confréries chevaleresques
      des villes — sous mécénat califal direct comme institution
      de mobilisation religieuse et politique. Sa politique
      extérieure impliqua une correspondance diplomatique
      complexe avec les Ayyoubides, les Khwārazm-Shāhs et même
      les *khans* mongols à la veille de la catastrophe. Après
      sa mort le califat déclina brutalement; en trente-six
      ans seulement, en 656 H, les Mongols de Hülegü mettraient
      à sac Baghdād et exécuteraient son arrière-arrière-petit-
      fils al-Mustaʿṣim, mettant fin au califat abbasside à
      Baghdād.
    canonical_hijri: {year: 622, month: 9, precision: month}
    canonical_gregorian: {date: 1225-10-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil — who died only seven years after al-Nāṣir — gives a substantial obituary entry placing his death in Ramaḍān 622 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms the death of al-Nāṣir in 622 AH and discusses the long reign."
