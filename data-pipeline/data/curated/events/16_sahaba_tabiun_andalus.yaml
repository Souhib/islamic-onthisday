  - slug: death-of-ibn-tufayl
    category: scholar
    title_en: Death of Ibn Ṭufayl — author of Ḥayy ibn Yaqẓan
    title_ar: وفاة ابن طفيل — صاحب «حي بن يقظان»
    title_fr: Mort d'Ibn Ṭufayl — auteur de Ḥayy ibn Yaqẓān
    description_en: |
      Abu Bakr Muhammad ibn Ṭufayl al-Qaysi al-Andalusi — Almohad court
      philosopher, vizier and physician to the Caliph Abu Yaʿqub Yusuf,
      mentor and patron of Ibn Rushd (whom he introduced to the caliph
      and proposed for the project of commenting on Aristotle), and
      author of the philosophical novel *Ḥayy ibn Yaqẓān* — died in
      Marrakesh at about 75. *Ḥayy ibn Yaqẓān* — the autobiography of
      a self-taught man stranded alone on an island who reasons his
      way to natural philosophy, then to certainty of God's existence
      — was translated into Latin by Edward Pococke in 1671 and
      circulated as one of the most influential Arab works in early
      modern European thought.
    description_ar: |
      توفي أبو بكر محمد بن طفيل القيسي الأندلسي — فيلسوف بلاط الموحدين
      ووزير الخليفة أبي يعقوب يوسف وطبيبه، ومُوصل ابن رشد إلى الخليفة
      ومقترح عليه أن يتولى شرح كلام أرسطو، ومصنف القصة الفلسفية
      «حي بن يقظان» — بمراكش عن نحو خمس وسبعين سنة. وقصة «حي بن يقظان»
      — وهي ترجمة الإنسان العصامي يلقى وحيداً في جزيرة فيستدل بعقله
      على الفلسفة الطبيعية ثم على وجود الله ووحدانيته — ترجمها إدوارد
      بوكوك إلى اللاتينية سنة ١٦٧١ ميلادي، فدارت في أوروبا الحديثة
      المبكرة من أكثر النصوص العربية تأثيراً في فكرها.
    description_fr: |
      Abu Bakr Muḥammad ibn Ṭufayl al-Qaysi al-Andalusi — philosophe de
      cour almohade, vizir et médecin du calife Abu Yaʿqūb Yusuf,
      mentor et protecteur d'Ibn Rushd (qu'il présenta au calife et
      proposa pour le projet de commenter Aristote), et auteur du roman
      philosophique *Ḥayy ibn Yaqẓān* — mourut à Marrakech à l'âge
      d'environ 75 ans. *Ḥayy ibn Yaqẓān* — autobiographie d'un homme
      autodidacte échoué seul sur une île qui parvient par la raison
      à la philosophie naturelle, puis à la certitude de l'existence
      de Dieu — fut traduit en latin par Edward Pococke en 1671 et
      circula comme l'un des textes arabes les plus influents de la
      pensée européenne moderne précoce.
    canonical_hijri: {year: 581, precision: year}
    canonical_gregorian: {date: 1185-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: ibn_kathir_bidaya
      - source_key: dhahabi_siyar
    people: [[ibn-tufayl, subject]]
