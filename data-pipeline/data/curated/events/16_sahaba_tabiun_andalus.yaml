  - slug: death-of-sad-ibn-ubada
    category: companion
    title_en: Death of Saʿd ibn ʿUbada ra — Chief of the Khazraj
    title_ar: وفاة سعد بن عبادة رضي الله عنه — سيد الخزرج
    title_fr: Mort de Saʿd ibn ʿUbada ra — chef des Khazraj
    description_en: |
      Saʿd ibn ʿUbada al-Anṣari, chief (sayyid) of the Khazraj and the
      Companion who hosted the Prophet ﷺ at the second pledge of
      ʿAqaba — and the candidate the Anṣar gathered around at the
      Saqīfa of Banu Sāʿida the day after the Prophet's ﷺ death,
      before the bayʿa was concluded for Abu Bakr ra — died in Ḥawran
      in southern Syria around 14 AH. Saʿd had withdrawn from Medina
      after refusing to give bayʿa to Abu Bakr, but he never broke the
      community: he simply left and remained loyal, neither aiding
      faction nor opposing the caliphate. Classical sources transmit
      that he was found dead with arrow-wounds attributed to the
      jinn — a wonder narrative *al-Tabari* and *Ibn Hisham* convey
      without endorsing.
    description_ar: |
      توفي سعد بن عبادة الأنصاري رضي الله عنه — سيد الخزرج، والصحابي
      الذي استضاف رسول الله ﷺ في بيعة العقبة الثانية، والذي اجتمع
      الأنصار حوله في سقيفة بني ساعدة غداة وفاة النبي ﷺ قبل أن تنعقد
      البيعة لأبي بكر الصديق رضي الله عنه — بحوران من بلاد الشام نحو
      سنة أربع عشرة من الهجرة. كان سعد قد اعتزل المدينة بعد امتناعه
      عن البيعة لأبي بكر، إلا أنه لم يخالف الجماعة فلم يدع إلى نفسه
      ولا قاتل الخلافة. ونقلت كتب التاريخ خبر وجوده ميتاً وبه أثر
      رماية نُسبت إلى الجن، وهو خبر يرويه الطبري وابن هشام دون
      توثيق.
    description_fr: |
      Saʿd ibn ʿUbada al-Anṣari, chef (*sayyid*) des Khazraj et le
      Compagnon qui accueillit le Prophète ﷺ lors du deuxième serment
      d'ʿAqaba — et le candidat autour duquel les Anṣār se rassemblèrent
      à la *Saqīfa* des Banū Sāʿida le lendemain de la mort du Prophète ﷺ,
      avant que la *bayʿa* ne fût scellée pour Abu Bakr ra — mourut à
      Ḥawran dans le sud de la Syrie vers 14 H. Saʿd s'était retiré
      de Médine après avoir refusé de prêter allégeance à Abu Bakr,
      mais il ne rompit jamais avec la communauté : il s'en alla
      simplement et resta loyal, ni n'aidant aucune faction ni ne
      s'opposant au califat. Les sources classiques rapportent qu'on
      le retrouva mort avec des blessures par flèches attribuées aux
      djinns — narration prodigieuse qu'*al-Ṭabari* et *Ibn Hishām*
      consignent sans la valider.
