  - slug: death-of-al-baqillani
    category: scholar
    title_en: Death of al-Qaḍi Abu Bakr al-Baqillani
    title_ar: وفاة القاضي أبي بكر الباقلاني
    title_fr: Mort du qāḍī Abu Bakr al-Baqillani
    description_en: |
      Abu Bakr Muhammad ibn al-Ṭayyib al-Baqillani, foremost Ashʿari
      mutakallim of his generation, defender of Sunni creed against
      Muʿtazila and Imami Shia opponents at the courts of the Buyid
      and Byzantine emperors, and author of *Iʿjāz al-Qurʾān* and
      *al-Tamhid* — died in Baghdad at about age 65. As an envoy of
      the Caliph al-Qādir to Constantinople he reportedly made the
      Byzantine emperor lower his head before granting audience. His
      systematisation of Ashʿari kalam — particularly the doctrines
      of divine speech and the inimitability (*iʿjāz*) of the Qurʾan
      — set the framework received by al-Juwayni and al-Ghazali after
      him. He is buried near the grave of Imam Ahmad ibn Ḥanbal in
      Baghdad.
    description_ar: |
      توفي القاضي أبو بكر محمد بن الطيب الباقلاني — كبير متكلمي
      الأشاعرة في عصره، والمدافع عن عقائد أهل السنة في وجه المعتزلة
      والإمامية في بلاطي البويهيين والروم، ومصنف «إعجاز القرآن»
      و«التمهيد» — ببغداد عن نحو خمس وستين سنة. أُرسل سفيراً للخليفة
      القادر إلى القسطنطينية فأخضع — على ما تواتر في الحكاية — قيصر
      الروم لأن يحني رأسه قبل المثول. ومنهجه في تنظيم علم الكلام
      الأشعري — لا سيما في مسائل كلام الله وإعجاز القرآن — هو
      الإطار الذي تلقاه عنه إمام الحرمين الجويني وأبو حامد الغزالي
      من بعده. ودفن إلى جوار الإمام أحمد بن حنبل ببغداد.
    description_fr: |
      Abu Bakr Muḥammad ibn al-Ṭayyib al-Bāqillāni, plus grand
      *mutakallim* ashʿarite de sa génération, défenseur du credo
      sunnite contre les Muʿtazilites et les opposants imāmites aux
      cours des Bouyides et des empereurs byzantins, et auteur d'*Iʿjāz
      al-Qurʾān* et *al-Tamhīd* — mourut à Bagdad à l'âge d'environ
      65 ans. Envoyé du calife al-Qādir à Constantinople, il aurait
      contraint l'empereur byzantin à baisser la tête avant l'audience.
      Sa systématisation du *kalām* ashʿarite — en particulier les
      doctrines de la parole divine et de l'inimitabilité (*iʿjāz*)
      du Coran — a fixé le cadre reçu après lui par al-Juwayni et
      al-Ghazāli. Il est enterré près de la tombe de l'imam Aḥmad ibn
      Ḥanbal à Bagdad.
    canonical_hijri: {year: 403, precision: year}
    canonical_gregorian: {date: 1013-06-01, precision: year, method: tabular_conversion}
