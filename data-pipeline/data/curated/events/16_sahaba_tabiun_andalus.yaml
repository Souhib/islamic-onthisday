  - slug: death-of-ata-ibn-abi-rabah
    category: scholar
    title_en: Death of ʿAṭaʾ ibn Abi Rabah — Mufti of Mecca
    title_ar: وفاة عطاء بن أبي رباح — مفتي مكة
    title_fr: Mort de ʿAṭāʾ ibn Abi Rabaḥ — mufti de La Mecque
    description_en: |
      ʿAṭaʾ ibn Abi Rabaḥ — son of an Abyssinian freedman, leading
      tabiʿi mufti of Mecca for nearly fifty years, and one of the
      seven jurists of Mecca — died there at age about 88. The Caliph
      Hisham ibn ʿAbd al-Malik instructed his children: "Take from
      ʿAṭaʾ — for as long as he lives, no one in al-Ḥaram al-Makki
      surpasses him." Imam Abu Hanifa said: "I never saw anyone better
      than ʿAṭaʾ." During Hajj season the Umayyad authorities had
      criers proclaim that nobody should issue a fatwā in Mecca except
      him. He combined deep knowledge with renowned asceticism and
      did not own a house of his own.
    description_ar: |
      توفي الإمام عطاء بن أبي رباح — وهو ابن مولى حبشي — كبير مفتي
      مكة من التابعين قرابة خمسين سنة، وأحد فقهاء مكة السبعة، رحمه الله
      عن نحو ثمانٍ وثمانين سنة. أوصى هشام بن عبد الملك أولاده فقال:
      «خذوا عن عطاء؛ فإنه ما دام عطاء حياً، فلا يعدله بمكة أحد». وقال
      الإمام أبو حنيفة: «ما رأيت أفضل من عطاء». وكان الأمراء الأمويون
      ينادون في الموسم: «ألا لا يفتي بمكة إلا عطاء بن أبي رباح». جمع
      رحمه الله بين سعة العلم والورع المشهور، ولم يملك في حياته داراً.
    description_fr: |
      ʿAṭāʾ ibn Abi Rabaḥ — fils d'un affranchi abyssinien, principal
      mufti tabiʿi de La Mecque pendant près de cinquante ans et l'un
      des sept jurisconsultes de La Mecque — y mourut à l'âge d'environ
      88 ans. Le calife Hishām ibn ʿAbd al-Malik dit à ses enfants :
      « apprenez d'ʿAṭāʾ — tant qu'il vit, personne au Ḥaram de La
      Mecque ne le surpasse ». L'imam Abu Hanifa dit : « je n'ai jamais
      vu meilleur qu'ʿAṭāʾ ». Pendant le pèlerinage, les autorités
      omeyyades faisaient proclamer par les hérauts que nul ne devait
      émettre une *fatwā* à La Mecque sinon lui. Il alliait science
      profonde et ascétisme proverbial, et ne possédait pas de maison.
    canonical_hijri: {year: 114, precision: year}
    canonical_gregorian: {date: 732-01-01, precision: year, method: attested}
