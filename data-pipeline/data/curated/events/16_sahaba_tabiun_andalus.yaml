  - slug: death-of-zayd-ibn-thabit
    category: companion
    title_en: Death of Zayd ibn Thabit ra — Compiler of the Muṣḥaf
    title_ar: وفاة زيد بن ثابت رضي الله عنه — جامع المصحف
    title_fr: Mort de Zayd ibn Thabit ra — compilateur du Muṣḥaf
    description_en: |
      Zayd ibn Thabit al-Anṣari, the foremost scribe of revelation for
      the Prophet ﷺ in Medina, the Companion entrusted by Abu Bakr ra
      with the first compilation (jamʿ) of the Qurʾan after the deaths
      at Yamāma, and head of the committee under ʿUthman ra that
      produced the standard Muṣḥaf — died in Medina at age about 56.
      He was twenty-one when the Prophet ﷺ died. Beyond Qurʾanic
      service he was the leading authority on the laws of inheritance
      (farāʾiḍ); the Prophet ﷺ said: "the most knowledgeable of you
      regarding inheritance is Zayd ibn Thabit" (Tirmidhi). ʿUmar ra
      delegated the affairs of Medina to him during the latter's
      pilgrimages. Sources record his death between 45 and 56 AH.
    description_ar: |
      توفي زيد بن ثابت الأنصاري رضي الله عنه — كبير كتاب الوحي للنبي ﷺ
      بالمدينة المنورة، والصحابي الذي كلفه أبو بكر الصديق رضي الله عنه
      بأول جمع للقرآن الكريم بعد استشهاد القراء يوم اليمامة، ورئيس
      اللجنة في عهد عثمان رضي الله عنه التي أخرجت المصحف الإمام —
      بالمدينة عن نحو ست وخمسين سنة. كان عمره يوم وفاة النبي ﷺ إحدى
      وعشرين سنة. وفضلاً عن خدمته للقرآن كان أعلم الناس بالفرائض، قال
      النبي ﷺ: «أفرضكم زيد بن ثابت» (الترمذي). وكان عمر رضي الله عنه
      يستخلفه على المدينة إذا حج. واختلف المؤرخون في سنة وفاته بين
      الخمس والأربعين والست والخمسين.
    description_fr: |
      Zayd ibn Thabit al-Anṣari, principal scribe de la révélation pour
      le Prophète ﷺ à Médine, le Compagnon que confia Abu Bakr ra de
      la première compilation (*jamʿ*) du Coran après les morts à
      Yamāma, et chef du comité sous ʿUthman ra qui produisit le
      *Muṣḥaf* canonique — mourut à Médine à l'âge d'environ 56 ans.
      Il avait vingt-et-un ans à la mort du Prophète ﷺ. Outre son
      service coranique, il était la première autorité en matière de
      droit successoral (*farāʾiḍ*); le Prophète ﷺ a dit : « le plus
      savant d'entre vous en matière d'héritage est Zayd ibn Thabit »
      (Tirmidhi). ʿUmar ra lui déléguait les affaires de Médine lors
      de ses pèlerinages. Les sources placent sa mort entre 45 et 56 H.
    canonical_hijri: {year: 45, precision: year}
    canonical_gregorian: {date: 665-01-01, precision: year, method: attested}
