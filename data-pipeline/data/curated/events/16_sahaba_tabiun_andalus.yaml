  - slug: death-of-amir-al-shabi
    category: scholar
    title_en: Death of ʿAmir al-Shaʿbi
    title_ar: وفاة عامر الشعبي
    title_fr: Mort de ʿAmir al-Shaʿbi
    description_en: |
      ʿAmir ibn Sharaḥil al-Shaʿbi, foremost tabiʿi jurist and
      muḥaddith of Kufa, court counsellor to ʿAbd al-Malik ibn Marwan,
      and one of the four pillars of fiqh in his generation alongside
      Saʿid ibn al-Musayyib (Medina), al-Ḥasan al-Baṣri (Basra), and
      Ibrahim al-Nakhaʿi (Kufa) — died at about 80. He claimed to have
      met five hundred Companions and was famed for the prodigious
      memory by which he asserted: "I have not written a single
      narration; nor have I asked anyone to repeat one to me." His
      legal opinions stood as a primary input to the Iraqi school
      that later became the Ḥanafi madhhab.
    description_ar: |
      توفي عامر بن شراحيل الشعبي — كبير فقهاء التابعين ومحدثيهم بالكوفة،
      ومستشار الخليفة عبد الملك بن مروان في بلاطه، وأحد فقهاء الأمصار
      الأربعة في طبقته مع سعيد بن المسيب بالمدينة والحسن البصري بالبصرة
      وإبراهيم النخعي بالكوفة — رحمه الله عن نحو ثمانين سنة. كان يقول
      إنه لقي خمس مئة من الصحابة، واشتهر بقوة الحفظ حتى قال: «ما كتبت
      حديثاً قط، ولا سألت رجلاً عن حديث إلا حفظته». وكانت اجتهاداته من
      أصول مدرسة فقه أهل العراق التي صارت أساساً للمذهب الحنفي.
    description_fr: |
      ʿAmir ibn Sharāḥīl al-Shaʿbi, principal juriste et muḥaddith
      tabiʿi de Koufa, conseiller à la cour d'ʿAbd al-Malik ibn Marwan,
      et l'un des quatre piliers du fiqh de sa génération aux côtés de
      Saʿid ibn al-Musayyib (Médine), al-Ḥasan al-Baṣri (Bassora) et
      Ibrahim al-Nakhaʿi (Koufa) — mourut à l'âge d'environ 80 ans. Il
      affirmait avoir rencontré cinq cents Compagnons et était célèbre
      pour la mémoire prodigieuse qui lui faisait dire : « je n'ai
      jamais écrit une seule narration; ni demandé à quiconque de me
      la répéter ». Ses avis juridiques constituèrent un apport
      primordial à l'école irakienne qui devint plus tard le madhhab
      ḥanafite.
    canonical_hijri: {year: 104, precision: year}
    canonical_gregorian: {date: 723-01-01, precision: year, method: attested}
