  - slug: death-of-ibn-khuzayma
    category: scholar
    title_en: Death of Ibn Khuzayma — Imam al-Aʾimma
    title_ar: وفاة ابن خزيمة — إمام الأئمة
    title_fr: Mort d'Ibn Khuzayma — Imam al-Aʾimma
    description_en: |
      Muhammad ibn Isḥāq ibn Khuzayma al-Naysaburi — *Imam al-Aʾimma*,
      "Imam of the Imams", and author of *al-Ṣaḥiḥ* (commonly *Ṣaḥiḥ
      Ibn Khuzayma*) — died in Naysabur at age about 88. His Ṣaḥīḥ
      applies criteria as exacting as al-Bukhari's; al-Subki and others
      classed it as the fourth Ṣaḥīḥ alongside the three already
      received. He was the master of al-Ḥakim al-Naysaburi and a
      teacher of al-Ṭabarani and Ibn Ḥibban — making him a node through
      which much of the eastern Islamic muḥaddith network passes.
      He famously said of the divine attributes: "We affirm what Allah
      affirmed for Himself, in the manner He affirmed it, without
      modality or comparison."
    description_ar: |
      توفي الإمام محمد بن إسحاق بن خزيمة النيسابوري — «إمام الأئمة»،
      وصاحب «الصحيح» المعروف بـ«صحيح ابن خزيمة» — بنيسابور عن نحو
      ثمانٍ وثمانين سنة. كان شرطه في صحيحه قريباً من شرط البخاري، حتى
      عدّه السبكي وغيره الصحيح الرابع بعد الصحاح الثلاثة المعروفة.
      وكان شيخ الحاكم النيسابوري ومن شيوخ الطبراني وابن حبان، فهو عقدة
      من عقد إسناد المحدثين في المشرق الإسلامي. ومن قوله المشهور في
      الصفات: «نثبت ما أثبته الله لنفسه على ما أثبته بلا تكييف ولا
      تمثيل».
    description_fr: |
      Muḥammad ibn Isḥāq ibn Khuzayma al-Naysabūri — *Imām al-Aʾimma*,
      « l'imam des imams », et auteur d'*al-Ṣaḥīḥ* (communément *Ṣaḥīḥ
      Ibn Khuzayma*) — mourut à Naysabur à l'âge d'environ 88 ans. Son
      *Ṣaḥīḥ* applique des critères aussi exigeants que ceux d'al-Bukhari;
      al-Subki et d'autres le classèrent comme le quatrième *Ṣaḥīḥ*
      aux côtés des trois déjà reçus. Il fut le maître d'al-Ḥākim
      al-Naysabūri et l'un des professeurs d'al-Ṭabarani et Ibn Ḥibban
      — ce qui en fait un nœud par lequel passe une grande partie du
      réseau muḥaddith oriental. Il disait des attributs divins : « nous
      affirmons ce qu'Allah a affirmé pour Lui-même, comme Il l'a
      affirmé, sans modalité ni comparaison ».
    canonical_hijri: {year: 311, precision: year}
    canonical_gregorian: {date: 924-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: ibn_kathir_bidaya
