  # =========================================================================

  - slug: death-of-ibn-bajja
    category: scholar
    title_en: Death of Ibn Bajja (Avempace)
    title_ar: وفاة ابن باجة
    title_fr: Mort d'Ibn Bājja (Avempace)
    description_en: |
      Abu Bakr Muhammad ibn Yaḥya ibn Bājja — known to medieval Latin
      Europe as *Avempace*, foremost philosopher of al-Andalus before
      Ibn Rushd, polymath in physics, astronomy, music, and politics,
      and chief vizier to the Almoravid governor of Saragossa Abu Bakr
      ibn Ibrāhīm — died in Fes, reportedly poisoned by an envious rival.
      His *Tadbīr al-Mutawaḥḥid* ("Regimen of the Solitary") was the
      direct philosophical predecessor of Ibn Ṭufayl's *Ḥayy ibn
      Yaqẓān*. He critiqued the Aristotelian theory of motion in a way
      that would influence Galileo through transmissions via Averroes.
      Sources differ on the year of his death: 530 AH (al-Maqqari) or
      533 AH (Ibn Khallikan).
    description_ar: |
      توفي أبو بكر محمد بن يحيى ابن باجة — المعروف عند أوروبا اللاتينية
      الوسيطة بـ«أفمباس»، وهو كبير فلاسفة الأندلس قبل ابن رشد، وعالم
      موسوعي في الفيزياء والفلك والموسيقى والسياسة، ووزير لأبي بكر بن
      إبراهيم والي سرقسطة في الدولة المرابطية — بفاس، وذكر بعض
      المؤرخين أنه قتل بالسم على يد منافس حسود. وكتابه «تدبير
      المتوحد» هو السلف الفلسفي المباشر لـ«حي بن يقظان» لابن طفيل.
      نقد نظرية أرسطو في الحركة نقداً سيؤثر في غاليليو لاحقاً عبر
      ترجمات ابن رشد. واختلف المؤرخون في سنة وفاته: قال المقري ٥٣٠ هـ
      وقال ابن خلكان ٥٣٣ هـ.
    description_fr: |
      Abu Bakr Muḥammad ibn Yaḥyā ibn Bājja — connu de l'Europe latine
      médiévale sous le nom d'*Avempace*, plus grand philosophe d'al-
      Andalus avant Ibn Rushd, polymathe en physique, astronomie,
      musique et politique, et vizir en chef du gouverneur almoravide
      de Saragosse Abu Bakr ibn Ibrāhīm — mourut à Fès, empoisonné
      selon les sources par un rival envieux. Son *Tadbīr al-Mutawaḥḥid*
      (« Régime du Solitaire ») fut le prédécesseur philosophique direct
      du *Ḥayy ibn Yaqẓān* d'Ibn Ṭufayl. Il critiqua la théorie
      aristotélicienne du mouvement d'une manière qui influencera
      Galilée par les transmissions d'Averroès. Les sources divergent
      sur l'année de sa mort : 530 H (al-Maqqari) ou 533 H (Ibn Khallikan).
    canonical_hijri: {year: 533, precision: year}
    canonical_gregorian: {date: 1139-01-01, precision: year, method: tabular_conversion}
