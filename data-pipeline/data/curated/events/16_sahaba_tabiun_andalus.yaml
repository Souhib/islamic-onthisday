  # =========================================================================
  # UMAYYAD CALIPH + EARLY NAVAL VICTORY
  # =========================================================================

  - slug: death-of-al-walid-i
    category: caliph
    title_en: Death of al-Walid I — Builder of the Umayyad Mosque
    title_ar: وفاة الوليد بن عبد الملك — باني الجامع الأموي
    title_fr: Mort d'al-Walid Ier — bâtisseur de la Grande Mosquée des Omeyyades
    description_en: |
      al-Walid I ibn ʿAbd al-Malik, sixth Umayyad caliph (reigned 86-96
      AH), under whom the Muslim conquests reached their greatest
      territorial extent — Sindh in the east, the conquest of Hispania
      under Tāriq ibn Ziyād and Mūsā ibn Nuṣayr in the west, and the
      consolidation of Transoxiana under Qutayba ibn Muslim — died at
      Dayr Murran outside Damascus at age about 45. His reign saw the
      construction of the Great Umayyad Mosque of Damascus, the
      reconstruction of the Prophet's ﷺ Mosque in Medina (incorporating
      the apartments of his wives, including the burial chamber), and
      the al-Aqṣa Mosque on the Ḥaram in Jerusalem. Sources praise his
      civic patronage of the disabled and elderly.
    description_ar: |
      توفي الوليد الأول بن عبد الملك — سادس الخلفاء الأمويين (حكم من
      ٨٦ إلى ٩٦ هـ)، الذي بلغت في عصره الفتوح الإسلامية أوسع رقعة لها:
      السند شرقاً بقيادة محمد بن القاسم، والأندلس غرباً بقيادة طارق
      بن زياد وموسى بن نصير، وتثبيت ما وراء النهر بقيادة قتيبة بن
      مسلم — بدير مرّان قرب دمشق عن نحو خمس وأربعين سنة. شهد عهده بناء
      الجامع الأموي الكبير بدمشق، وإعادة بناء المسجد النبوي بالمدينة
      (وأدخل في توسعته حجرات أمهات المؤمنين بما فيها الحجرة النبوية)،
      والمسجد الأقصى ضمن الحرم القدسي. وأثنى المؤرخون على رعايته
      للزمنى والمسنين والعميان من بيت المال.
    description_fr: |
      al-Walid Ier ibn ʿAbd al-Malik, sixième calife omeyyade (règne
      86-96 H), sous lequel les conquêtes musulmanes atteignirent
      leur plus grande extension territoriale — le Sindh à l'est, la
      conquête de l'Hispanie sous Ṭāriq ibn Ziyād et Mūsā ibn Nuṣayr à
      l'ouest, et la consolidation de la Transoxiane sous Qutayba ibn
      Muslim — mourut à Dayr Murrān près de Damas à l'âge d'environ
      45 ans. Son règne vit la construction de la Grande Mosquée des
      Omeyyades de Damas, la reconstruction de la Mosquée du Prophète ﷺ
      à Médine (intégrant les appartements de ses épouses, dont la
      chambre funéraire), et la mosquée al-Aqṣā sur le Ḥaram de
      Jérusalem. Les sources louent son mécénat civique pour les
      handicapés, les aveugles et les personnes âgées.
