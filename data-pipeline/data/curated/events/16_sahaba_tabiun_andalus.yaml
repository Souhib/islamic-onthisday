    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ibn_Tufail"

  - slug: death-of-ibn-al-khatib
    category: scholar
    title_en: Death of Lisan al-Din ibn al-Khaṭib
    title_ar: وفاة لسان الدين ابن الخطيب
    title_fr: Mort de Lisan al-Din ibn al-Khaṭib
    description_en: |
      Lisan al-Din Muhammad ibn ʿAbdallah ibn al-Khaṭib — vizier of the
      Naṣrid sultan Muḥammad V of Granada, polymath historian, poet,
      physician, and the foremost prose stylist of the late Islamic
      West — died in Fes at age about 63, strangled in his prison cell
      after a political fall and a charge of heresy fabricated by his
      enemies. His monumental *al-Iḥāṭa fi Akhbār Gharnāṭa* preserves
      the cultural memory of late al-Andalus; *Aʿmāl al-Aʿlām* surveys
      the dynasties of the Islamic West. Verses by him are still
      inscribed on the walls of the Alhambra. He was rehabilitated by
      his student al-Maqqari, who memorialised him at length in
      *Nafḥ al-Ṭib*.
    description_ar: |
      توفي لسان الدين محمد بن عبد الله ابن الخطيب — وزير السلطان
      الناصري محمد الخامس بغرناطة، والمؤرخ الموسوعي والشاعر والطبيب،
      وكبير أدباء النثر في المغرب الإسلامي المتأخر — بفاس عن نحو ثلاث
      وستين سنة، خنقاً في محبسه بعد سقوطه السياسي وتهمة بالزندقة
      ألصقها به أعداؤه. وفي «الإحاطة في أخبار غرناطة» سجل ضخم لذاكرة
      الأندلس المتأخرة، و«أعمال الأعلام» تأريخ لدول المغرب الإسلامي.
      ولا تزال أبياته منقوشة على جدران قصر الحمراء. وتلميذه المقري
      أعاد اعتبار شيخه فأطال في ترجمته في «نفح الطيب».
    description_fr: |
      Lisan al-Din Muḥammad ibn ʿAbdallāh ibn al-Khaṭib — vizir du
      sultan naṣride Muḥammad V de Grenade, historien polymathe, poète,
      médecin, et plus grand prosateur de l'Occident islamique tardif
      — mourut à Fès à l'âge d'environ 63 ans, étranglé dans sa cellule
      après une chute politique et une accusation d'hérésie fabriquée
      par ses ennemis. Son monumental *al-Iḥāṭa fī Akhbār Gharnāṭa*
      préserve la mémoire culturelle de l'al-Andalus tardif; *Aʿmāl
      al-Aʿlām* dresse le tableau des dynasties de l'Occident islamique.
      Des vers de lui sont encore gravés sur les murs de l'Alhambra.
      Il fut réhabilité par son élève al-Maqqari, qui lui consacra de
      longues pages dans *Nafḥ al-Ṭīb*.
    canonical_hijri: {year: 776, precision: year}
    canonical_gregorian: {date: 1374-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: ibn_kathir_bidaya
      - source_key: dhahabi_tarikh_islam
