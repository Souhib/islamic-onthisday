  - slug: battle-of-dhat-al-sawari
    category: battle
    title_en: Battle of Dhat al-Ṣawari — first Muslim naval victory
    title_ar: معركة ذات الصواري — أول نصر بحري إسلامي
    title_fr: Bataille de Dhāt al-Ṣawārī — première victoire navale musulmane
    description_en: |
      Off the coast of Lycia (modern southwestern Turkey), the Muslim
      fleet under ʿAbdullah ibn Saʿd ibn Abi Sarḥ — appointed by
      Caliph ʿUthman ra over Egypt — defeated a vastly larger Byzantine
      fleet personally led by Emperor Constans II. Both fleets bound
      their ships together to fight as floating platforms — hence the
      Arabic name *Dhāt al-Ṣawārī* ("the one of the masts"). The
      victory shattered Byzantine naval supremacy in the eastern
      Mediterranean and opened the sea lanes to subsequent expeditions
      against Cyprus, Rhodes, and ultimately Constantinople. Constans
      himself escaped only by exchanging clothes with a sailor.
    description_ar: |
      عند سواحل ليكيا (جنوب غرب تركيا الحديثة) هزم الأسطول الإسلامي
      بقيادة عبد الله بن سعد بن أبي سرح — والي عثمان بن عفان رضي الله
      عنه على مصر — أسطولاً بيزنطياً ضخماً يقوده الإمبراطور قنسطانز
      الثاني بنفسه. ربط كل من الأسطولين سفنه بعضها ببعض ليقاتل عليها
      كمنصات عائمة، فسميت المعركة «ذات الصواري». وقضى هذا النصر على
      السيادة البحرية البيزنطية في شرق المتوسط وفتح طرق البحر للمعارك
      اللاحقة على قبرص ورودس ثم القسطنطينية. ولم ينج قنسطانز إلا
      بتبادل ثيابه مع بعض الجنود ليتنكر.
    description_fr: |
      Au large des côtes de Lycie (sud-ouest de l'actuelle Turquie),
      la flotte musulmane sous ʿAbdullāh ibn Saʿd ibn Abī Sarḥ —
      nommé par le calife ʿUthman ra sur l'Égypte — vainquit une
      flotte byzantine bien plus nombreuse menée personnellement par
      l'empereur Constant II. Les deux flottes attachèrent leurs
      navires les uns aux autres pour combattre en plateformes
      flottantes — d'où le nom arabe *Dhāt al-Ṣawārī* (« celle des
      mâts »). La victoire brisa la suprématie navale byzantine en
      Méditerranée orientale et ouvrit les voies maritimes aux
      expéditions ultérieures contre Chypre, Rhodes et finalement
      Constantinople. Constant lui-même n'en réchappa qu'en échangeant
      ses habits avec un marin.
