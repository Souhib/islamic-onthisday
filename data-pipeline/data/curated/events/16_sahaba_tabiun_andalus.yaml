  - slug: death-of-mujahid-ibn-jabr
    category: scholar
    title_en: Death of Mujahid ibn Jabr — Pillar of Tafsir
    title_ar: وفاة مجاهد بن جبر — عماد علم التفسير
    title_fr: Mort de Mujāhid ibn Jabr — pilier du tafsir
    description_en: |
      Mujahid ibn Jabr al-Makki, foremost student of Ibn ʿAbbas ra,
      and the single most-cited tabiʿi authority in classical
      Qurʾanic commentary — died in Mecca at age about 83. He famously
      said: "I went through the Muṣḥaf with Ibn ʿAbbas three times,
      stopping at every verse to ask him about it." His positions
      occupy more isnads in al-Tabari's *Jamiʿ al-Bayān* than any
      other tabiʿi mufassir. The classical maxim runs: *idhā jāʾaka
      al-tafsīr ʿan Mujāhid fa-ḥasbuk* — "if a tafsir reaches you on
      Mujahid's authority, that is enough for you." Sources also place
      him among the seven jurists of Mecca alongside ʿAṭāʾ ibn Abī
      Rabāḥ.
    description_ar: |
      توفي الإمام مجاهد بن جبر المكي — أعلم تلاميذ ابن عباس رضي الله
      عنهما، وأكثر التابعين رواية في كتب التفسير الكلاسيكية — بمكة
      المكرمة عن نحو ثلاث وثمانين سنة. ومن قوله المشهور: «عرضت المصحف
      على ابن عباس ثلاث عرضات، أقفه عند كل آية أسأله عنها». ولا يفوقه
      تابعي في كثرة الأسانيد المعتمدة في «جامع البيان» للطبري. وفي
      أصول التفسير عند المتقدمين: «إذا جاءك التفسير عن مجاهد فحسبك».
      ويعدّه بعض المؤرخين ضمن فقهاء مكة السبعة مع عطاء بن أبي رباح.
    description_fr: |
      Mujāhid ibn Jabr al-Makki, le plus éminent élève d'Ibn ʿAbbas ra
      et l'autorité tabiʿi la plus citée du commentaire coranique
      classique — mourut à La Mecque à l'âge d'environ 83 ans. Il
      disait : « j'ai parcouru le Muṣḥaf avec Ibn ʿAbbas trois fois,
      m'arrêtant à chaque verset pour l'interroger ». Ses positions
      occupent plus de chaînes de transmission dans le *Jamiʿ al-Bayān*
      d'al-Ṭabari qu'aucun autre mufassir tabiʿi. La maxime classique
      dit : *idhā jāʾaka al-tafsīr ʿan Mujāhid fa-ḥasbuk* — « si un
      tafsir te parvient par Mujāhid, cela te suffit ». Les sources le
      placent également parmi les sept jurisconsultes de La Mecque aux
      côtés d'ʿAṭāʾ ibn Abī Rabāḥ.
    canonical_hijri: {year: 104, precision: year}
    canonical_gregorian: {date: 722-01-01, precision: year, method: attested}
