  - slug: death-of-hudhayfa-ibn-al-yaman
    category: companion
    title_en: Death of Ḥudhayfa ibn al-Yaman ra
    title_ar: وفاة حذيفة بن اليمان رضي الله عنه
    title_fr: Mort de Ḥudhayfa ibn al-Yaman ra
    description_en: |
      Ḥudhayfa ibn al-Yaman al-ʿAbsi, the Companion to whom the Prophet ﷺ
      confided the names of the hypocrites (*ṣaḥib sirr rasul Allah ﷺ*),
      veteran of every major Muslim engagement from Uḥud onward, and
      governor of al-Madaʾin under ʿUmar and ʿUthman ra — died at
      al-Madaʾin in 36 AH, only forty days after the assassination of
      ʿUthman ra. He had famously declined to disclose any name on the
      list of munāfiqūn even when ʿUmar pressed him about himself.
      During the great fitna over ʿUthman's killing, his last counsel
      to those around him was to keep their swords sheathed against
      their fellow Muslims. He is the principal narrator of many
      hadiths concerning the end times, including the hadith of the
      "good and evil" recorded in the two Ṣaḥīḥs.
    description_ar: |
      توفي حذيفة بن اليمان العبسي رضي الله عنه — صاحب سر رسول الله ﷺ في
      أسماء المنافقين، وشاهد كل غزوة منذ غزوة أحد، ووالي المدائن في
      خلافتي عمر وعثمان رضي الله عنهما — بالمدائن سنة ست وثلاثين
      للهجرة بعد أربعين يوماً من استشهاد عثمان رضي الله عنه. اشتهر بأنه
      أبى أن يفشي اسماً واحداً مما عنده من أسماء المنافقين حتى لما
      ألح عليه عمر رضي الله عنه في نفسه. وفي الفتنة الكبرى أوصى من
      حوله أن يمسكوا سيوفهم عن إخوانهم المسلمين. وهو الراوي الأصلي
      للكثير من أحاديث الفتن والملاحم، ومنها حديث «الخير والشر»
      المتفق عليه.
    description_fr: |
      Ḥudhayfa ibn al-Yaman al-ʿAbsi, le Compagnon à qui le Prophète ﷺ
      confia les noms des hypocrites (*ṣāḥib sirr rasūl Allāh ﷺ*),
      vétéran de toutes les grandes campagnes musulmanes depuis Uḥud,
      et gouverneur d'al-Madāʾin sous ʿUmar et ʿUthman ra — mourut à
      al-Madāʾin en 36 H, seulement quarante jours après l'assassinat
      d'ʿUthman ra. Il était célèbre pour avoir refusé de divulguer
      le moindre nom sur la liste des *munāfiqūn* même lorsque ʿUmar
      l'interrogea sur lui-même. Durant la grande *fitna* qui suivit
      le meurtre d'ʿUthman, son dernier conseil à ceux qui l'entouraient
      fut de garder leurs épées au fourreau face à leurs frères
      musulmans. Il est le narrateur principal de nombreux hadiths sur
      la fin des temps, dont le hadith du « bien et du mal » consigné
      dans les deux *Ṣaḥīḥ*.
    canonical_hijri: {year: 36, precision: year}
    canonical_gregorian: {date: 656-08-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
