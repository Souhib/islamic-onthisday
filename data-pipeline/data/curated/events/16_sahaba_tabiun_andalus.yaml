# Wave 3 of curated event additions (2026-04-26).
# 4 senior sahaba (incl. al-Hasan ra ahl al-bayt) + 3 tabi'un mufassirun
# + 3 andalusi polymaths + 1 muhaddith + 1 ash'ari + 1 umayyad caliph
# + 2 conquests / battles. Each event attested in classical Sunni sources.
# Trilingual (en/ar/fr).

events:
  # =========================================================================
  # SENIOR SAHABA (incl. Ahl al-Bayt)
  # =========================================================================

  - slug: death-of-al-hasan-ibn-ali
    category: ahl_al_bayt
    title_en: Death of al-Ḥasan ibn ʿAli ra
    title_ar: وفاة الحسن بن علي رضي الله عنهما
    title_fr: Mort d'al-Ḥasan ibn ʿAli ra
    description_en: |
      al-Ḥasan ibn ʿAli, eldest grandson of the Prophet ﷺ through Fatima
      ra, sayyid shabab ahl al-Janna ("master of the youth of Paradise")
      by the Prophet's ﷺ own naming, and the Caliph who voluntarily
      abdicated to Muʿawiya ra in 41 AH so that Muslim blood would not
      be shed — the year remembered as ʿĀm al-Jamāʿa, "the Year of the
      Community" — died in Medina at age about 47. The Prophet ﷺ had
      said of him from the pulpit: "This son of mine is a master, and
      perhaps Allah will make peace through him between two great
      factions of the Muslims" (Bukhari) — a prophecy fulfilled by his
      abdication. Classical sources differ on whether he was poisoned
      by his wife Jaʿda bint al-Ashʿath; al-Tabari and Ibn Kathir
      record the report without endorsing it.
    description_ar: |
      توفي الحسن بن علي رضي الله عنهما — الحفيد الأكبر للنبي ﷺ من
      ابنته فاطمة رضي الله عنها، و«سيد شباب أهل الجنة» كما سمّاه جده ﷺ،
      وأمير المؤمنين الذي تنازل عن الخلافة لمعاوية رضي الله عنه سنة
      إحدى وأربعين للهجرة حقناً لدماء المسلمين، وهي السنة التي سُميت
      «عام الجماعة» — بالمدينة المنورة عن نحو سبع وأربعين سنة. قال فيه
      النبي ﷺ على المنبر: «إن ابني هذا سيد، ولعل الله أن يصلح به بين
      فئتين عظيمتين من المسلمين» (البخاري)، وقد تحققت النبوة
      بتنازله. واختلفت كتب التاريخ في كونه سُمّ بدسٍّ من زوجته جعدة
      بنت الأشعث، فأوردها الطبري وابن كثير دون تصحيح.
    description_fr: |
      al-Ḥasan ibn ʿAli, petit-fils aîné du Prophète ﷺ par Fatima ra,
      *sayyid shabab ahl al-Janna* (« maître de la jeunesse du Paradis »)
      selon le nom même que lui donna le Prophète ﷺ, et le calife qui
      abdiqua volontairement en faveur de Muʿawiya ra en 41 H afin que
      le sang musulman ne soit pas versé — l'année que l'on retient comme
      *ʿĀm al-Jamāʿa*, « l'année de la Communauté » — mourut à Médine
      à l'âge d'environ 47 ans. Le Prophète ﷺ avait dit de lui depuis
      le minbar : « ce fils mien est un maître, et peut-être Allah
      réconciliera-t-il par lui deux grandes factions des musulmans »
      (Bukhari) — prophétie accomplie par son abdication. Les sources
      classiques divergent sur la question de son empoisonnement par
      son épouse Jaʿda bint al-Ashʿath; al-Tabari et Ibn Kathir
      rapportent l'information sans la valider.
    canonical_hijri: {year: 50, month: 9, precision: month}
    canonical_gregorian: {date: 670-04-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_kathir_bidaya
      - source_key: ibn_athir_kamil
      - source_key: dhahabi_siyar
    hadith_refs: "Bukhari 2704"
    people: [[hasan-ibn-ali, subject], [muawiya-ibn-abi-sufyan, subject]]
    tags: [ahl-al-bayt, sahaba, am-al-jamaa, abdication, medina, umayyad]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Hasan_ibn_Ali"

  - slug: death-of-ubayy-ibn-kab
    category: companion
    title_en: Death of Ubayy ibn Kaʿb ra — Sayyid al-Qurraʾ
    title_ar: وفاة أبي بن كعب رضي الله عنه — سيد القراء
    title_fr: Mort d'Ubayy ibn Kaʿb ra — Sayyid al-Qurraʾ
    description_en: |
      Ubayy ibn Kaʿb al-Anṣari — chief reciter (sayyid al-qurraʾ) of
      the Companions, scribe of revelation for the Prophet ﷺ, and one
      of the four Companions to whom the Prophet ﷺ explicitly ordered
      the Muslims to "take the Qurʾan from" (Bukhari) — died in Medina
      during the caliphate of ʿUthman ra. The Prophet ﷺ recited Surat
      al-Bayyina (Q 98) to him directly and said "Allah commanded me
      to recite to you" — at which Ubayy wept. He was the lead reciter
      of Tarāwīḥ during ʿUmar's ra organisation of communal night
      prayer. Classical sources record his death between 30 and 32 AH;
      Ibn Hajar al-ʿAsqalani in *al-Iṣāba* surveys the disagreement.
    description_ar: |
      توفي أبيّ بن كعب الأنصاري رضي الله عنه — سيد القراء من الصحابة،
      وكاتب الوحي لرسول الله ﷺ، وأحد الأربعة الذين أمر النبي ﷺ
      المسلمين أن يأخذوا القرآن منهم (رواه البخاري) — بالمدينة المنورة
      في خلافة عثمان رضي الله عنه. قرأ النبي ﷺ عليه سورة البينة
      (سورة ٩٨) مباشرة وقال له: «إن الله أمرني أن أقرأ عليك» فبكى أبيّ.
      وكان إمام الناس في صلاة التراويح حين جمعهم عمر رضي الله عنه على
      قارئ واحد. واختلفت المصادر القديمة في سنة وفاته بين الثلاثين
      والاثنتين والثلاثين، واستوعب الخلاف ابن حجر في «الإصابة».
    description_fr: |
      Ubayy ibn Kaʿb al-Anṣari — récitateur en chef (*sayyid al-qurraʾ*)
      des Compagnons, scribe de la révélation pour le Prophète ﷺ, et
      l'un des quatre Compagnons à qui le Prophète ﷺ ordonna explicitement
      aux musulmans de « prendre le Coran » (Bukhari) — mourut à Médine
      durant le califat d'ʿUthman ra. Le Prophète ﷺ lui récita en
      personne la sourate al-Bayyina (Q 98) en lui disant « Allah m'a
      ordonné de te la réciter » — à quoi Ubayy pleura. Il dirigeait
      les *Tarāwīḥ* lorsque ʿUmar ra organisa la prière nocturne en
      assemblée. Les sources classiques placent sa mort entre 30 et 32 H;
      Ibn Ḥajar al-ʿAsqalānī dans *al-Iṣāba* recense le désaccord.
    canonical_hijri: {year: 30, precision: year}
    canonical_gregorian: {date: 650-01-01, precision: year, method: attested}
