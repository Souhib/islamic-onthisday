  - slug: death-of-abu-dharr
    category: rashidun
    title_en: Death of Abū Dharr al-Ghifārī
    title_ar: وفاة أبي ذر الغفاري
    title_fr: Décès d'Abū Dharr al-Ghifārī
    description_en: |
      Jundub ibn Junāda ra — known throughout history by his kunya Abū
      Dharr — died at al-Rabadha east of Madīnah, in the desert to which
      Caliph ʿUthmān had asked him to retire after his vocal critiques of
      the wealth-accumulation of governors and notables. The Prophet ﷺ
      had foretold his death in such poverty that "those who buried him
      would be the best of you" — a prophecy fulfilled when ʿAbdullāh ibn
      Masʿūd ra, returning from Iraq, performed his burial. Among the
      first to embrace Islam (the fourth or fifth, by his own report), he
      narrated 281 ḥadīths and remained the conscience of the early
      community on matters of wealth and asceticism.
    description_ar: |
      جندب بن جنادة رضي الله عنه — المعروف على مرّ التاريخ بكنيته أبي ذر —
      توفّي بالربذة شرقي المدينة، في الصحراء التي اعتزل إليها بطلب من الخليفة
      عثمان رضي الله عنه بعد مواقفه الصارخة من تكاثر الأموال عند الولاة
      والوجهاء. وكان النبي ﷺ أخبره أنه يموت وحيداً وأنّ «خير الناس مَن يدفنه»،
      فتحققت النبوءة حين مرّ به عبد الله بن مسعود رضي الله عنه قافلاً من
      العراق فدفنه. وهو من السابقين الأوّلين إلى الإسلام (الرابع أو الخامس
      بإقراره)، روى مائتين وواحداً وثمانين حديثاً، وظلّ ضمير الصدر الأول في
      الزهد ومسائل المال.
    description_fr: |
      Jundub ibn Junāda ra — connu à travers l'histoire par sa kunya Abū
      Dharr — mourut à al-Rabadha à l'est de Médine, dans le désert où le
      calife ʿUthmān lui avait demandé de se retirer après ses critiques
      véhémentes de l'accumulation de richesses chez les gouverneurs et
      les notables. Le Prophète ﷺ avait annoncé qu'il mourrait dans une
      telle pauvreté que « celui qui l'enterrera sera le meilleur d'entre
      vous » — prophétie accomplie quand ʿAbdullāh ibn Masʿūd ra, revenant
      d'Iraq, accomplit son inhumation. Parmi les tout premiers à embrasser
      l'islam (le quatrième ou le cinquième, selon son propre récit), il
      rapporta 281 ḥadīths et demeura la conscience de la première
      communauté en matière de richesse et d'ascèse.
    canonical_hijri: {year: 32, precision: year}
    canonical_gregorian: {date: 652-01-01, precision: year, method: attested}
