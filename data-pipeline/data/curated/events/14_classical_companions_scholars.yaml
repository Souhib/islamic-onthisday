  - slug: death-of-abu-musa-al-ashari
    category: umayyad
    title_en: Death of Abū Mūsā al-Ashʿarī
    title_ar: وفاة أبي موسى الأشعري
    title_fr: Décès d'Abū Mūsā al-Ashʿarī
    description_en: |
      ʿAbdullāh ibn Qays ra — Abū Mūsā al-Ashʿarī — Sahabi, governor of
      Basra and then Kufa under ʿUmar and ʿUthmān, and one of the two
      arbiters at Ṣiffīn, died at Kufa (or by some reports at Mecca) in
      his late seventies. The Prophet ﷺ said of him, "Indeed Abū Mūsā has
      been given a mizmār (a melodious voice) from the mizmārs of the
      family of Dāwūd ﷺ" — a reference to the beauty of his Qurʾān
      recitation. He narrated about 360 ḥadīths and is one of the
      principal jurists and Qurʾān-reciters of the first generation. The
      Ashʿarī theological school is traditionally traced through his
      lineage by way of his descendant Abū al-Ḥasan al-Ashʿarī.
    description_ar: |
      عبد الله بن قيس رضي الله عنه — أبو موسى الأشعري — الصحابي والوالي على
      البصرة ثم الكوفة في عهد عمر وعثمان رضي الله عنهما، وأحد الحكَمَين في
      صفّين، توفّي بالكوفة (وفي رواية بمكة) في أواخر السبعينات من عمره. وقال
      فيه النبي ﷺ: «لقد أُوتي أبو موسى مزماراً من مزامير آل داود» إشارةً إلى
      جمال قراءته للقرآن. روى نحو ثلاثمائة وستّين حديثاً، وهو من كبار فقهاء
      وقرّاء الصدر الأول. ويُنسب المذهب الكلامي الأشعري تقليدياً إلى نسبه عن
      طريق حفيده أبي الحسن الأشعري.
    description_fr: |
      ʿAbdullāh ibn Qays ra — Abū Mūsā al-Ashʿarī — Sahabi, gouverneur de
      Bassora puis de Koufa sous ʿUmar et ʿUthmān, et l'un des deux arbitres
      à Ṣiffīn, mourut à Koufa (ou selon certains à La Mecque) à la fin de
      la soixante-dizaine d'années. Le Prophète ﷺ dit de lui : « En vérité,
      Abū Mūsā s'est vu donner un mizmār (une voix mélodieuse) parmi les
      mizmārs de la famille de Dāwūd ﷺ », en référence à la beauté de sa
      récitation coranique. Il rapporta environ 360 ḥadīths et compte parmi
      les principaux juristes et récitateurs du Qurʾān de la première
      génération. L'école théologique ashʿarī se rattache traditionnellement
      à sa lignée par l'intermédiaire de son descendant Abū al-Ḥasan
      al-Ashʿarī.
    canonical_hijri: {year: 50, precision: year}
    canonical_gregorian: {date: 670-01-01, precision: year, method: attested}
