  - slug: death-of-al-awzai
    category: scholar_death
    title_en: Death of Imām al-Awzāʿī
    title_ar: وفاة الإمام الأوزاعي
    title_fr: Décès de l'imām al-Awzāʿī
    description_en: |
      Abū ʿAmr ʿAbd al-Raḥmān ibn ʿAmr al-Awzāʿī, the leading jurist of
      Greater Syria and chief muftī of his age, died at Beirut. His
      eponymous Awzāʿī school of law dominated Syrian jurisprudence for
      two centuries before being absorbed by the Shāfiʿī school. He was
      celebrated for his courage before the Abbasid governors — who
      executed many ʿulamāʾ they considered politically unreliable — and
      for his refusal to bend in matters of religious principle. His
      legal opinions, preserved in al-Ṭabarī and later compendia, mark
      one of the lost paths of early Sunni legal pluralism.
    description_ar: |
      أبو عمرو عبد الرحمن بن عمرو الأوزاعي — إمام أهل الشام ومفتيهم في زمانه —
      توفّي ببيروت. سيطر مذهبه الأوزاعي على الفقه في الشام قرنين قبل أن يندمج
      في المذهب الشافعي. اشتُهر بشجاعته أمام ولاة بني العباس — الذين أعدموا
      كثيراً من العلماء يرونهم غير موثوقين سياسياً — وبامتناعه عن المداهنة في
      مسائل الدين. وفتاواه التي حفظها الطبري والمصنّفون من بعده تشير إلى أحد
      المسارات المفقودة من تعدّدية الفقه السنّي المبكر.
    description_fr: |
      Abū ʿAmr ʿAbd al-Raḥmān ibn ʿAmr al-Awzāʿī, juriste prééminent de la
      Grande Syrie et muftī en chef de son époque, mourut à Beyrouth. Son
      école éponyme, l'awzāʿī, domina la jurisprudence syrienne durant
      deux siècles avant d'être absorbée par l'école shāfiʿī. Il fut
      célébré pour son courage face aux gouverneurs abbassides — qui
      exécutèrent nombre de ʿulamāʾ jugés politiquement peu fiables — et
      pour son refus de se plier sur les questions de principe religieux.
      Ses avis juridiques, préservés chez al-Ṭabarī et les compendiums
      ultérieurs, jalonnent l'une des voies perdues du premier pluralisme
      juridique sunnite.
