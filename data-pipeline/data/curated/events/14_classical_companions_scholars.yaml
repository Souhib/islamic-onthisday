  - slug: death-of-jabir-ibn-abdullah
    category: umayyad
    title_en: Death of Jābir ibn ʿAbdullāh al-Anṣārī
    title_ar: وفاة جابر بن عبد الله الأنصاري
    title_fr: Décès de Jābir ibn ʿAbdullāh al-Anṣārī
    description_en: |
      Jābir ibn ʿAbdullāh ra, who pledged the second Bayʿat al-ʿAqaba with
      his father before the Hijra and witnessed nineteen ghazawāt with the
      Prophet ﷺ, died at Madīnah at about 94 lunar years, the last of the
      Anṣār to die in the Prophet's ﷺ city. He narrated 1,540 ḥadīths and
      was a major teacher of the next generation, including Mujāhid, ʿAṭāʾ
      ibn Abī Rabāḥ, and the Madīnan jurists. His ḥadīth describing the
      Prophet's ﷺ farewell pilgrimage in detail is the cornerstone of the
      jurisprudence of Hajj.
    description_ar: |
      جابر بن عبد الله الأنصاري رضي الله عنه — الذي بايع مع أبيه في بيعة
      العقبة الثانية قبل الهجرة، وشهد مع النبي ﷺ تسع عشرة غزوة — توفي
      بالمدينة وهو في نحو الرابعة والتسعين، آخر الأنصار وفاةً بمدينة النبي
      ﷺ. روى ألفاً وخمسمائة وأربعين حديثاً، وكان من أكبر شيوخ التابعين منهم
      مجاهد وعطاء بن أبي رباح وفقهاء المدينة. وحديثه في صفة حجة الوداع
      تفصيلاً هو الأصل في فقه الحج.
    description_fr: |
      Jābir ibn ʿAbdullāh ra, qui prêta le second Bayʿat al-ʿAqaba avec son
      père avant la Hijra et participa à dix-neuf ghazawāt aux côtés du
      Prophète ﷺ, mourut à Médine vers l'âge de 94 années lunaires, dernier
      des Anṣār à mourir dans la cité du Prophète ﷺ. Il rapporta 1 540
      ḥadīths et fut un maître majeur de la génération suivante, dont
      Mujāhid, ʿAṭāʾ ibn Abī Rabāḥ et les juristes médinois. Son ḥadīth
      décrivant en détail le pèlerinage d'adieu du Prophète ﷺ est la pierre
      angulaire de la jurisprudence du Hajj.
    canonical_hijri: {year: 78, precision: year}
    canonical_gregorian: {date: 697-01-01, precision: year, method: attested}
