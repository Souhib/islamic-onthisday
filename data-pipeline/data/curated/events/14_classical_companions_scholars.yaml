  - slug: death-of-ibn-al-mubarak
    category: scholar_death
    title_en: Death of ʿAbdullāh ibn al-Mubārak
    title_ar: وفاة عبد الله بن المبارك
    title_fr: Décès de ʿAbdullāh ibn al-Mubārak
    description_en: |
      Abū ʿAbd al-Raḥmān ʿAbdullāh ibn al-Mubārak al-Marwazī, the
      paradigmatic combiner of ḥadīth scholarship, jihād on the
      Byzantine frontier, and trade, died at Hīt on the Euphrates while
      returning from a campaign. His Kitāb al-Jihād and Kitāb al-Zuhd —
      both extant — set the genre standard for their respective subjects.
      Sufyān al-Thawrī said of him, "I love to be like Ibn al-Mubārak in
      this world and the next." His annual practice was unique: a year
      teaching ḥadīth, a year fighting on the Byzantine frontier, a year
      trading. The synthesis became the ideal type of the early Sunni
      ʿālim who refused both isolation in the mosque and accommodation
      with the state.
    description_ar: |
      أبو عبد الرحمن عبد الله بن المبارك المروزي — النموذج الجامع بين علم
      الحديث والجهاد على ثغور الروم والتجارة — توفّي بهيت على الفرات راجعاً
      من غزوة. كتابه "الجهاد" و"الزهد" — وكلاهما باقٍ — يضعان معيار النوع
      في موضوعَيهما. وقال فيه سفيان الثوري: «وددتُ أني مثل ابن المبارك في
      الدنيا والآخرة». وكان له برنامج فريد سنوي: عام في الحديث، وعام في
      جهاد الروم، وعام في التجارة. صار هذا الجمع نمطاً مثالياً للعالم السنّي
      المبكر الذي يأبى الانعزال في المسجد والمصانعة مع السلطان جميعاً.
    description_fr: |
      Abū ʿAbd al-Raḥmān ʿAbdullāh ibn al-Mubārak al-Marwazī, l'archétype
      de l'union entre érudition du ḥadīth, jihād sur la frontière
      byzantine et commerce, mourut à Hīt sur l'Euphrate au retour d'une
      campagne. Son Kitāb al-Jihād et son Kitāb al-Zuhd — tous deux
      conservés — établirent la norme générique sur leurs sujets
      respectifs. Sufyān al-Thawrī dit de lui : « J'aimerais être comme
      Ibn al-Mubārak dans ce monde et dans l'autre ». Sa pratique
      annuelle était unique : une année à enseigner le ḥadīth, une année
      à combattre sur la frontière byzantine, une année à commercer.
      Cette synthèse devint le type idéal du premier ʿālim sunnite
      refusant à la fois l'isolement dans la mosquée et l'accommodement
      avec l'État.
