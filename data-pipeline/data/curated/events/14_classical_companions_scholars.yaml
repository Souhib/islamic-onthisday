  - slug: death-of-abu-saeed-al-khudri
    category: umayyad
    title_en: Death of Abū Saʿīd al-Khudrī
    title_ar: وفاة أبي سعيد الخدري
    title_fr: Décès d'Abū Saʿīd al-Khudrī
    description_en: |
      Saʿd ibn Mālik ibn Sinān al-Anṣārī al-Khudrī ra, the Sahabi commonly
      known by his kunya Abū Saʿīd, died at Madīnah at about 86 lunar
      years. He fought at the Trench (the Prophet ﷺ judged him too young
      for Uhud) and witnessed twelve subsequent expeditions. He narrated
      1,170 ḥadīths and was renowned among the Companions for his
      exposition of fiqh. His ḥadīth on commanding the right and
      forbidding the wrong — "Whoever among you sees a wrong, let him
      change it with his hand…" — is one of the most-cited foundations of
      Sunni public ethics.
    description_ar: |
      سعد بن مالك بن سنان الأنصاري الخدري رضي الله عنه — الصحابي الذي اشتهر
      بكنيته أبي سعيد — توفّي بالمدينة وهو في نحو السادسة والثمانين. شهد
      الخندق (وكان النبي ﷺ ردّه يوم أحد لصغره)، ثم اثنتي عشرة غزوة بعدها.
      روى ألفاً ومئة وسبعين حديثاً، واشتهر بين الصحابة بفقهه. وحديثه في
      الأمر بالمعروف والنهي عن المنكر «من رأى منكم منكراً فليغيّره بيده…»
      من أعظم أصول الأخلاق العامة عند أهل السنّة.
    description_fr: |
      Saʿd ibn Mālik ibn Sinān al-Anṣārī al-Khudrī ra, le Sahabi communément
      connu par sa kunya Abū Saʿīd, mourut à Médine vers l'âge de 86 années
      lunaires. Il combattit à la Tranchée (le Prophète ﷺ l'avait jugé trop
      jeune pour Uhud) et participa à douze expéditions ultérieures. Il
      rapporta 1 170 ḥadīths et fut renommé parmi les Compagnons pour son
      exposition du fiqh. Son ḥadīth sur l'ordonnance du convenable et
      l'interdiction du blâmable — « Quiconque parmi vous voit un mal, qu'il
      le change de sa main… » — est l'un des fondements les plus cités de
      l'éthique publique sunnite.
    canonical_hijri: {year: 74, precision: year}
