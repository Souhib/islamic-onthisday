  - slug: battle-of-manzikert
    category: battle
    title_en: Battle of Manzikert
    title_ar: معركة ملاذكرد
    title_fr: Bataille de Manzikert
    description_en: |
      Sultan Alp Arslān of the Seljuks defeated the Byzantine army of
      Emperor Romanos IV Diogenes at Manzikert in eastern Anatolia,
      capturing the emperor himself. The defeat shattered Byzantine
      defences in Asia Minor, opened Anatolia permanently to Turkic
      settlement, and set the stage for the rise of the Seljuk Sultanate
      of Rūm — and, four centuries later, the Ottoman state. Alp Arslān
      released Romanos under the terms of a treaty that the next Byzantine
      emperor would refuse to honour, but the strategic verdict was
      irreversible: the Byzantine empire never recovered the Anatolian
      heartland.
    description_ar: |
      هزم السلطان ألب أرسلان السلجوقي الجيشَ البيزنطي بقيادة الإمبراطور رومانوس
      الرابع ديوجين في ملاذكرد بشرق الأناضول، وأسر الإمبراطورَ نفسَه. كسرت
      الهزيمة دفاعات بيزنطة في آسيا الصغرى، وفتحت الأناضول دائماً للاستيطان
      التركي، ومهّدت لقيام سلطنة سلاجقة الروم — ومن بعدها بأربعة قرون الدولة
      العثمانية. وأطلق ألب أرسلان رومانوسَ في إطار معاهدة لم يُبقها خلَفه على
      عرش بيزنطة، لكنّ الحكم الاستراتيجي كان لا رجعة فيه: لم تستعد بيزنطة قلبَ
      الأناضول قط.
    description_fr: |
      Le sultan Alp Arslān des Seljoukides battit l'armée byzantine de
      l'empereur Romanos IV Diogène à Manzikert, dans l'est de l'Anatolie,
      capturant l'empereur lui-même. La défaite brisa les défenses byzantines
      en Asie Mineure, ouvrit définitivement l'Anatolie à la colonisation
      turque et prépara l'essor du sultanat seljoukide de Roum — et, quatre
      siècles plus tard, de l'État ottoman. Alp Arslān libéra Romanos en
      vertu d'un traité que l'empereur byzantin suivant refusa d'honorer,
      mais le verdict stratégique était irréversible : Byzance ne retrouva
      jamais le cœur anatolien.
    canonical_hijri: {year: 463, month: 11, precision: month}
    canonical_gregorian: {date: 1071-08-01, precision: month, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
      - source_key: ibn_kathir_bidaya
    tags: [seljuk, battle, byzantine, anatolia, manzikert, alp-arslan]
    importance: major
    verified: true
    source_url: https://en.wikipedia.org/wiki/Battle_of_Manzikert

  - slug: muslim-conquest-of-sicily-begins
    category: conquest
    title_en: Muslim Conquest of Sicily Begins
    title_ar: بدء فتح صقلية
    title_fr: Début de la conquête musulmane de la Sicile
    description_en: |
      Asad ibn al-Furāt, jurist and qāḍī of the Aghlabid emirate of
      Ifrīqiya, led a fleet of approximately seventy ships from Sūsa
      across the strait to Mazara on the western Sicilian coast. The
      landing began a campaign of conquest that would unfold over more
      than seventy years and culminate in the fall of Syracuse (264 AH)
      and Taormina (291 AH). Sicily under Muslim rule became a centre of
      multilingual scholarship, agricultural innovation, and architectural
      synthesis whose influence on Norman and Renaissance Europe is
      well-attested.
    description_ar: |
      قاد أسد بن الفرات — فقيه وقاضي الإمارة الأغلبية بإفريقية — أسطولاً قوامه
      نحو سبعين سفينة من سوسة عبر المضيق إلى مدينة مازارة بالساحل الغربي
      لصقلية. كان النزول إيذاناً بحملة فتح امتدت أكثر من سبعين عاماً، وانتهت
      بسقوط سَرَقُوسة (264 هـ) ثم طُرمين (291 هـ). صارت صقلية في ظل الحكم
      الإسلامي مركزاً علمياً متعدّد اللغات، ومرتعاً للإبداع الزراعي والمعماري،
      وأثره على نُورمان وأوروبا في عصر النهضة موثّق ومعروف.
    description_fr: |
      Asad ibn al-Furāt, juriste et qāḍī de l'émirat aghlabide d'Ifrīqiya,
      conduisit une flotte d'environ soixante-dix navires depuis Sousse à
      travers le détroit jusqu'à Mazara, sur la côte occidentale sicilienne.
      Le débarquement amorça une campagne de conquête qui se déroulera sur
      plus de soixante-dix ans et culminera dans la chute de Syracuse
      (264 AH) puis de Taormine (291 AH). Sous la domination musulmane, la
      Sicile devint un centre d'érudition multilingue, d'innovation agricole
      et de synthèse architecturale dont l'influence sur l'Europe normande
      et de la Renaissance est bien attestée.
    canonical_hijri: {year: 212, month: 6, precision: month}
    canonical_gregorian: {date: 827-06-01, precision: month, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
      - source_key: ibn_kathir_bidaya
    tags: [aghlabid, conquest, sicily, mediterranean, asad-ibn-al-furat]
    importance: notable
    verified: true
    source_url: https://en.wikipedia.org/wiki/Muslim_conquest_of_Sicily

