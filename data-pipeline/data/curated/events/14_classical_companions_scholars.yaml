  - slug: death-of-anas-ibn-malik
    category: rashidun
    title_en: Death of Anas ibn Mālik — Servant of the Prophet ﷺ
    title_ar: وفاة أنس بن مالك خادم رسول الله ﷺ
    title_fr: Décès d'Anas ibn Mālik — serviteur du Prophète ﷺ
    description_en: |
      Anas ibn Mālik ra, who served the Prophet ﷺ for ten years from the
      time of the Hijra until the Prophet's ﷺ death, lived to about 103
      lunar years and died at Basra. The Prophet ﷺ had supplicated for
      him: "O Allah, increase his wealth and his children, and bless what
      You have given him." He narrated 2,286 ḥadīths — among the most
      prolific of the Companions — and was the last surviving Sahabi to
      have served the Prophet ﷺ in his household. His death closed a
      direct living chain to the Madīnan years.
    description_ar: |
      أنس بن مالك رضي الله عنه — خادم رسول الله ﷺ عشر سنين من الهجرة إلى
      وفاته الكريمة ﷺ — عمّر نحو ثلاث ومائة سنة ومات بالبصرة. ودعا له النبي
      ﷺ: «اللّهم أكثر ماله وولده، وبارك له فيما أعطيته». روى ألفين ومئتين
      وستّة وثمانين حديثاً — من أكثر الصحابة رواية — وكان آخر مَن بقي ممّن
      خدم النبيَّ ﷺ في بيته. أُغلقت بوفاته أحد الأخطاط المباشرة للسنوات
      المدنية.
    description_fr: |
      Anas ibn Mālik ra, qui servit le Prophète ﷺ durant dix années depuis
      la Hijra jusqu'à la mort bénie du Prophète ﷺ, vécut environ
      103 années lunaires et mourut à Bassora. Le Prophète ﷺ avait imploré
      pour lui : « Ô Allāh, accrois sa fortune et ses enfants, et bénis ce
      que Tu lui as accordé ». Il rapporta 2 286 ḥadīths — parmi les plus
      prolifiques des Compagnons — et fut le dernier Sahabi survivant à
      avoir servi le Prophète ﷺ dans sa maison. Sa mort referma une chaîne
      vivante directe vers les années médinoises.
    canonical_hijri: {year: 93, precision: year}
    canonical_gregorian: {date: 712-01-01, precision: year, method: attested}
    claims:
