  - slug: death-of-sufyan-al-thawri
    category: scholar_death
    title_en: Death of Sufyān al-Thawrī — Amīr al-Muʾminīn fī al-Ḥadīth
    title_ar: وفاة سفيان الثوري — أمير المؤمنين في الحديث
    title_fr: Décès de Sufyān al-Thawrī — Amīr al-Muʾminīn fī al-Ḥadīth
    description_en: |
      Abū ʿAbdullāh Sufyān ibn Saʿīd al-Thawrī, Kufan ḥadīth master and
      jurist of the eponymous (now-extinct) Thawrī legal school, died at
      Basra in hiding from the Abbasid Caliph al-Mahdī, who had sought
      his appointment as chief judge. He had been called Amīr al-Muʾminīn
      fī al-Ḥadīth ("Commander of the Believers in Ḥadīth"), the highest
      epithet awarded a muḥaddith. He left behind the Jāmiʿ — a
      foundational work in early ḥadīth/fiqh integration, partly
      preserved in later compendia — and a corpus of zuhd (asceticism)
      transmitted by his students. His refusal of state office became
      the model for the next generation of independent scholars.
    description_ar: |
      أبو عبد الله سفيان بن سعيد الثوري — إمام أهل الحديث في الكوفة وفقيه
      المذهب الثوري الذي اندثر — توفّي بالبصرة مختفياً من الخليفة العباسي
      المهدي الذي طلب توليته القضاء. لُقّب بأمير المؤمنين في الحديث وهي أعلى
      رتبة تُمنح لمحدّث. وترك "الجامع" — أصلٌ في الجمع بين الحديث والفقه،
      حُفظ بعضه في المصنّفات اللاحقة — وميراثاً في الزهد رواه عنه تلاميذه.
      صار رفضه ولاية القضاء قدوةً للجيل التالي من العلماء المستقلّين.
    description_fr: |
      Abū ʿAbdullāh Sufyān ibn Saʿīd al-Thawrī, maître koufien du ḥadīth et
      juriste de l'école éponyme thawrī (aujourd'hui éteinte), mourut à
      Bassora caché du calife abbasside al-Mahdī, qui avait recherché sa
      nomination comme cadi suprême. On l'avait surnommé Amīr al-Muʾminīn
      fī al-Ḥadīth (« Commandeur des croyants en ḥadīth »), épithète
      suprême décernée à un muḥaddith. Il laissa le Jāmiʿ — œuvre
      fondatrice de l'intégration ḥadīth/fiqh primitif, partiellement
      préservée dans des compendiums ultérieurs — et un corpus de zuhd
      (ascèse) transmis par ses étudiants. Son refus de la charge publique
      devint le modèle de la génération suivante de savants indépendants.
    canonical_hijri: {year: 161, precision: year}
    canonical_gregorian: {date: 778-01-01, precision: year, method: attested}
