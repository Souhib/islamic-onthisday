# 5 battles/conquests + 5 sahaba deaths + 5 classical-scholar deaths.
# Each event attested in classical Sunni sources (al-Tabari, Ibn Kathir,
# al-Dhahabi, Ibn al-Athir, Ibn Hajar al-'Asqalani). Trilingual (en/ar/fr).

events:
  # =========================================================================
  # BATTLES + CONQUESTS
  # =========================================================================

  - slug: conquest-of-egypt-amr
    category: conquest
    title_en: Conquest of Egypt — ʿAmr ibn al-ʿĀṣ
    title_ar: فتح مصر على يد عمرو بن العاص
    title_fr: Conquête de l'Égypte par ʿAmr ibn al-ʿĀṣ
    description_en: |
      ʿAmr ibn al-ʿĀṣ, commanding a force of around four thousand under
      Caliph ʿUmar's authorisation, completed the conquest of Egypt with
      the surrender of the Roman fortress of Babylon (Old Cairo) and,
      shortly after, of Alexandria. The terms granted the Coptic Christian
      population freedom of worship and protection of property in return
      for the jizya. ʿAmr immediately founded the garrison-city of
      al-Fusṭāṭ on the east bank of the Nile, ending six centuries of
      Roman rule and folding Egypt permanently into the Islamic world.
    description_ar: |
      أتمّ عمرو بن العاص رضي الله عنه — على رأس جيش يقارب الأربعة آلاف بإذن
      الخليفة عمر بن الخطاب رضي الله عنه — فتح مصر باستسلام حصن بابليون الروماني
      (مصر القديمة)، ثم بعده الإسكندرية. كانت شروط الصلح تكفل لأهل مصر القبط
      حرية العبادة وحماية أموالهم في مقابل الجزية. وأسس عمرو فور الفتح مدينة
      الفسطاط على الضفة الشرقية من النيل، فأنهى ستة قرون من الحكم الروماني
      وأدخل مصر نهائياً في دار الإسلام.
    description_fr: |
      ʿAmr ibn al-ʿĀṣ, à la tête d'une force d'environ quatre mille hommes
      avec l'autorisation du calife ʿUmar, acheva la conquête de l'Égypte
      par la reddition de la forteresse romaine de Babylone (le Vieux Caire)
      puis, peu après, d'Alexandrie. Les conditions accordèrent à la
      population copte chrétienne la liberté de culte et la protection des
      biens en échange de la jizya. ʿAmr fonda aussitôt la ville-garnison
      d'al-Fusṭāṭ sur la rive orientale du Nil, mettant fin à six siècles de
      domination romaine et intégrant définitivement l'Égypte au monde
      islamique.
    canonical_hijri: {year: 20, precision: year}
    canonical_gregorian: {date: 641-01-01, precision: year, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_athir_kamil
      - source_key: ibn_kathir_bidaya
    people: [[amr-ibn-al-as, leader], [umar-ibn-al-khattab, subject]]
    tags: [rashidun, conquest, egypt, amr-ibn-al-as, fustat]
    importance: major
    verified: true
    source_url: https://en.wikipedia.org/wiki/Muslim_conquest_of_Egypt

  - slug: battle-of-siffin
    category: battle
    title_en: Battle of Ṣiffīn
    title_ar: معركة صفّين
    title_fr: Bataille de Ṣiffīn
    description_en: |
      The decisive engagement of the First Fitna between Caliph ʿAlī ibn
      Abī Ṭālib's Iraqi army and Muʿāwiya ibn Abī Sufyān's Syrian forces
      on the upper Euphrates. After three days of severe fighting in
      which the Iraqis came close to victory, Muʿāwiya's troops raised
      muṣḥafs on their spears and called for arbitration by the Book of
      Allah. The arbitration that followed (Tahkim) divided ʿAlī's camp,
      gave rise to the Khawārij faction, and entrenched the political
      schism whose echoes would shape Islamic history for centuries. Both
      armies retired without a clear military verdict.
    description_ar: |
      المعركة الحاسمة في الفتنة الأولى بين الخليفة علي بن أبي طالب رضي الله
      عنه ومعاوية بن أبي سفيان رضي الله عنه على ضفاف الفرات الأعلى. وبعد
      ثلاثة أيام من القتال الشديد كاد فيه أهل العراق أن ينتصروا، رفع جيش
      الشام المصاحف على الرماح ودعوا إلى التحكيم بكتاب الله. أفضى التحكيم
      الذي تبعها إلى انقسام معسكر علي رضي الله عنه، ونشأت منه طائفة الخوارج،
      وترسخ الانقسام السياسي الذي ظلت أصداؤه تشكّل التاريخ الإسلامي قروناً.
      وانفض الجيشان دون فصل عسكري حاسم.
    description_fr: |
      L'affrontement décisif de la Première Fitna entre l'armée irakienne
      du calife ʿAlī ibn Abī Ṭālib et les forces syriennes de Muʿāwiya ibn
      Abī Sufyān, sur le haut Euphrate. Après trois jours de combats
      acharnés au cours desquels les Irakiens furent près de l'emporter,
      les troupes de Muʿāwiya hissèrent des muṣḥafs sur leurs lances et
      demandèrent l'arbitrage par le Livre d'Allāh. L'arbitrage (Tahkim)
      qui suivit divisa le camp de ʿAlī, donna naissance à la faction des
      Khawārij et grava le schisme politique dont les échos modèleront
      l'histoire islamique durant des siècles. Les deux armées se retirèrent
      sans verdict militaire clair.
    canonical_hijri: {year: 37, month: 7, precision: month}
    canonical_gregorian: {date: 657-07-26, precision: month, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_athir_kamil
      - source_key: ibn_kathir_bidaya
    people: [[ali-ibn-abi-talib, leader], [muawiya-ibn-abi-sufyan, leader]]
    tags: [rashidun, battle, fitna, siffin, tahkim, khawarij]
    importance: major
    verified: true
    source_url: https://en.wikipedia.org/wiki/Battle_of_Siffin

  - slug: battle-of-nahrawan
    category: battle
    title_en: Battle of al-Nahrawān
    title_ar: معركة النهروان
    title_fr: Bataille d'al-Nahrawān
    description_en: |
      Caliph ʿAlī ibn Abī Ṭālib confronted the Khawārij — the faction that
      had broken from his army after the Tahkim arbitration following
      Ṣiffīn — at the canal of al-Nahrawān east of the Tigris. The
      Khawārij had condemned ʿAlī as a kāfir for accepting human
      arbitration, declaring "lā ḥukma illā li-Llāh" ("there is no
      judgment except Allah's"). After they refused his calls to return
      and began murdering Muslims they considered apostates, ʿAlī fought
      them; almost the entire Khawārij force was killed. The remnant
      who escaped became the seed of every later Khawārij movement, and
      from one of them — Ibn Muljam — would come the dagger that
      martyred ʿAlī three years later.
    description_ar: |
      واجه الخليفة علي بن أبي طالب رضي الله عنه طائفة الخوارج — الذين
      انفصلوا عن جيشه بعد تحكيم صفين — عند نهر النهروان شرقي دجلة. وكان
      الخوارج كفّروا علياً رضي الله عنه لقبوله التحكيم، رافعين شعار «لا
      حكم إلا لله». وبعد أن رفضوا دعوته إلى الرجوع وبدأوا يقتلون من خالفهم
      من المسلمين متهمينهم بالردة، ناجزهم القتال، فقتل عامتهم. والقلّة
      التي نجت منهم صارت بذرة كل حركة خارجية لاحقة، ومن أحدهم — ابن ملجم —
      جاء الخنجر الذي استشهد به علي بعد ثلاث سنين.
    description_fr: |
      Le calife ʿAlī ibn Abī Ṭālib affronta les Khawārij — la faction qui
      s'était séparée de son armée après l'arbitrage du Tahkim consécutif à
      Ṣiffīn — sur le canal d'al-Nahrawān à l'est du Tigre. Les Khawārij
      avaient déclaré ʿAlī kāfir pour avoir accepté un arbitrage humain,
      proclamant « lā ḥukma illā li-Llāh » (« nul jugement n'appartient
      qu'à Allāh »). Après qu'ils eurent refusé ses appels au retour et
      commencé à tuer les musulmans qu'ils tenaient pour apostats, ʿAlī
      les combattit ; la quasi-totalité de la force khārijite fut tuée. Le
      reliquat qui s'échappa devint la semence de tout mouvement khārijite
      ultérieur, et de l'un d'entre eux — Ibn Muljam — viendrait la dague
      qui martyrisa ʿAlī trois ans plus tard.
    canonical_hijri: {year: 38, month: 9, precision: month}
    canonical_gregorian: {date: 658-07-17, precision: month, method: attested}
    claims:
