  - slug: death-of-ibn-ishaq
    category: scholar_death
    title_en: Death of Muḥammad ibn Isḥāq — Biographer of the Prophet ﷺ
    title_ar: وفاة محمد بن إسحاق صاحب السيرة
    title_fr: Décès de Muḥammad ibn Isḥāq — biographe du Prophète ﷺ
    description_en: |
      Abū ʿAbdullāh Muḥammad ibn Isḥāq ibn Yasār al-Madanī, author of the
      Sīrat Rasūl Allāh — the foundational biography of the Prophet ﷺ —
      died at Baghdad. His original work survives only through later
      recensions, principally Ibn Hishām's redaction (which removed
      material Ibn Hishām considered unreliable) and the citations
      preserved in al-Ṭabarī's Tārīkh. Despite some classical scholars
      faulting his hadith standards (he reported from controversial
      sources), his Sīra remains the indispensable source for the events
      of the Prophet's ﷺ life and the standard against which all later
      sīra works measure themselves.
    description_ar: |
      أبو عبد الله محمد بن إسحاق بن يسار المدني — صاحب سيرة رسول الله ﷺ —
      توفّي ببغداد. ولم يبق من كتابه الأصلي إلّا ما حُفظ بطريق روايات لاحقة،
      أبرزها تهذيب ابن هشام (الذي أسقط ما رآه ضعيفاً) واقتباسات تاريخ الطبري.
      ومع أن بعض المحدّثين انتقدوه في معايير الرواية لروايته عن مصادر متنازع
      فيها، تظلّ سيرته المصدرَ الذي لا غنى عنه لأحداث حياة النبي ﷺ، والمعيارَ
      الذي تُقاس به سائر كتب السيرة بعده.
    description_fr: |
      Abū ʿAbdullāh Muḥammad ibn Isḥāq ibn Yasār al-Madanī, auteur de la
      Sīrat Rasūl Allāh — la biographie fondatrice du Prophète ﷺ — mourut à
      Bagdad. Son ouvrage original ne survit qu'à travers des recensions
      ultérieures, principalement la rédaction d'Ibn Hishām (qui retira ce
      qu'il jugeait peu fiable) et les citations conservées dans le Tārīkh
      d'al-Ṭabarī. Bien que certains savants classiques aient critiqué ses
      standards de hadith (il rapportait depuis des sources controversées),
      sa Sīra demeure la source indispensable pour les événements de la vie
      du Prophète ﷺ et la norme à laquelle se mesurent toutes les sīra
      ultérieures.
    canonical_hijri: {year: 151, precision: year}
    canonical_gregorian: {date: 768-01-01, precision: year, method: attested}
