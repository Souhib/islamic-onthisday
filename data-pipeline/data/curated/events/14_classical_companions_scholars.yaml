  - slug: death-of-al-layth-ibn-saad
    category: scholar_death
    title_en: Death of al-Layth ibn Saʿd — Imām of the Egyptians
    title_ar: وفاة الليث بن سعد إمام أهل مصر
    title_fr: Décès d'al-Layth ibn Saʿd — imām des Égyptiens
    description_en: |
      Abū al-Ḥārith al-Layth ibn Saʿd, the leading jurist and muḥaddith
      of Egypt in his era, died at al-Fusṭāṭ. al-Shāfiʿī famously
      remarked: "al-Layth was a greater jurist than Mālik, but his
      students did not establish his school" — a reference to al-Layth's
      independent standing as the head of an Egyptian legal school that
      faded in the next generation while Mālik's prevailed. Generous to
      a famed degree (his annual income, by classical reports, exceeded
      that of any contemporary scholar, all of which he distributed in
      charity), he combined deep ḥadīth knowledge with juristic rigour
      and refused, like Sufyān al-Thawrī, every offer of state office.
    description_ar: |
      أبو الحارث الليث بن سعد — إمام أهل مصر في عصره وفقيهها ومحدِّثها — توفّي
      بالفسطاط. وقال فيه الشافعي قولته المشهورة: «الليث أفقه من مالك، إلا أنّ
      أصحابه لم يقوموا به» — إشارةً إلى مكانته المستقلّة على رأس مذهب فقهي
      مصري ضمر في الجيل التالي بينما ظهر مذهب مالك. كان كريماً مشهوراً
      بالكرم (تروي المصادر الكلاسيكية أن دخله السنوي كان يفوق ما لأي عالم في
      زمانه، وكان يفرّقه كلَّه في الصدقات)، وجمع بين سَعة الحديث وصرامة
      الفقه، ورفض — كسفيان الثوري — كل تولية للسلطان.
    description_fr: |
      Abū al-Ḥārith al-Layth ibn Saʿd, juriste et muḥaddith prééminent de
      l'Égypte de son temps, mourut à al-Fusṭāṭ. al-Shāfiʿī déclara la
      célèbre phrase : « al-Layth était un plus grand juriste que Mālik,
      mais ses étudiants n'établirent pas son école » — référence à la
      stature indépendante d'al-Layth comme chef d'une école juridique
      égyptienne qui s'estompa à la génération suivante tandis que celle
      de Mālik s'imposa. D'une générosité fameuse (son revenu annuel,
      selon les rapports classiques, dépassait celui de tout savant
      contemporain, et qu'il distribuait en aumônes), il joignait à une
      profonde maîtrise du ḥadīth la rigueur juridique et refusa, comme
      Sufyān al-Thawrī, toute offre de charge publique.
    canonical_hijri: {year: 175, precision: year}
    canonical_gregorian: {date: 791-01-01, precision: year, method: attested}
