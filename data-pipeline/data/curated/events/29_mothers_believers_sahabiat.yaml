  - slug: death-of-juwayriya-bint-al-harith
    category: ahl_al_bayt
    title_en: Death of Juwayriya bint al-Ḥārith ra — Mother of the Believers
    title_ar: وفاة جويرية بنت الحارث رضي الله عنها — أم المؤمنين
    title_fr: Mort de Juwayriya bint al-Ḥārith ra — Mère des Croyants
    description_en: |
      Juwayriya bint al-Ḥārith — daughter of the chief of the Banū
      al-Muṣṭaliq tribe, captured along with her tribe at the Battle
      of al-Muraysīʿ (5 AH) and freed when the Prophet ﷺ paid her
      ransom and married her — died in Medina. She was about 65.
      ʿĀʾisha ra famously said: "I have never seen a woman more
      blessed for her people than Juwayriya — when the Prophet ﷺ
      married her, the Companions freed all the captives of Banū
      al-Muṣṭaliq, refusing to keep slaves who were now in-laws of
      the Prophet ﷺ." Approximately 100 households of the tribe
      were liberated this way. Her change of name from Barra (the
      righteous) to Juwayriya (the little maiden) was personally
      ordered by the Prophet ﷺ to avoid implying righteousness in
      one's own name.
    description_ar: |
      توفيت جويرية بنت الحارث رضي الله عنها — ابنة سيد بني المصطلق،
      وقعت سبية بقومها في غزوة المريسيع سنة خمس للهجرة، وتحررت
      حين أدى عنها رسول الله ﷺ كتابتها وتزوجها — بالمدينة المنورة
      عن نحو خمس وستين سنة. قالت عائشة رضي الله عنها قولاً مشهوراً:
      «ما رأيت امرأة أعظم بركة على قومها من جويرية — لما تزوجها
      رسول الله ﷺ أعتق الصحابة سبي بني المصطلق كلهم، أنفة من إمساك
      رقيق صار صهر رسول الله ﷺ». وحُرّر بهذا نحو مئة أسرة من تلك
      القبيلة. وغيّر النبي ﷺ اسمها من «برة» إلى «جويرية» بنفسه
      اتقاءً لتزكية النفس بالاسم.
    description_fr: |
      Juwayriya bint al-Ḥārith — fille du chef de la tribu des Banū
      al-Muṣṭaliq, capturée avec sa tribu à la bataille d'al-
      Muraysīʿ (5 H) et libérée lorsque le Prophète ﷺ paya sa
      rançon et l'épousa — mourut à Médine. Elle avait environ
      65 ans. ʿĀʾisha ra dit célèbrement : « je n'ai jamais vu de
      femme plus bénie pour son peuple que Juwayriya — quand le
      Prophète ﷺ l'épousa, les Compagnons libérèrent tous les
      captifs des Banū al-Muṣṭaliq, refusant de garder des esclaves
      désormais belle-famille du Prophète ﷺ ». Environ 100 foyers
      de la tribu furent ainsi libérés. Le changement de son nom
      de Barra (la juste) à Juwayriya (la jeune fille) fut
      personnellement ordonné par le Prophète ﷺ pour éviter la
      vantardise dans le nom propre.
    canonical_hijri: {year: 56, precision: year}
    canonical_gregorian: {date: 676-01-01, precision: year, method: attested}
