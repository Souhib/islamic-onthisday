  - slug: death-of-umm-al-fadl
    category: companion
    title_en: Death of Umm al-Faḍl Lubaba bint al-Ḥarith ra
    title_ar: وفاة أم الفضل لبابة بنت الحارث رضي الله عنها
    title_fr: Mort d'Umm al-Faḍl Lubāba bint al-Ḥārith ra
    description_en: |
      Umm al-Faḍl Lubāba al-Kubrā bint al-Ḥarith al-Hilāliyya —
      wife of al-ʿAbbas ibn ʿAbd al-Muṭṭalib (the Prophet's ﷺ uncle)
      and mother of ʿAbdullah ibn ʿAbbas ra (the foundational
      mufassir), and reportedly the second woman in Islam to convert
      after Khadīja ra — died in Medina during the caliphate of
      ʿUthman ra. She narrated 30 hadith in the Six Books. She is
      the Companion who reported the Prophet's ﷺ recitation of
      Sūrat al-Mursalāt as the *witr* of the night before his death,
      and the only woman directly attested in the classical sources
      to have personally lifted her foot to strike Abu Lahab in
      defence of a Muslim during the persecution at Mecca. Her
      sister Maymouna became Mother of the Believers.
    description_ar: |
      توفيت أم الفضل لبابة الكبرى بنت الحارث الهلالية رضي الله عنها
      — زوجة العباس بن عبد المطلب عم النبي ﷺ، وأم عبد الله بن عباس
      رضي الله عنهما (الترجمان الأكبر للقرآن)، ويقال إنها ثانية من
      أسلم من النساء بعد خديجة رضي الله عنها — بالمدينة المنورة في
      خلافة عثمان رضي الله عنه. روت ثلاثين حديثاً في الكتب الستة.
      وهي الصحابية التي روت قراءة النبي ﷺ سورة المرسلات في وتر
      ليلته الأخيرة، والصحابية الوحيدة المنصوصة في المصادر القديمة
      أنها رفعت قدمها لتضرب أبا لهب دفاعاً عن مسلم في عصر الاضطهاد
      بمكة. وأختها ميمونة صارت من أمهات المؤمنين.
    description_fr: |
      Umm al-Faḍl Lubāba al-Kubrā bint al-Ḥārith al-Hilāliyya —
      épouse d'al-ʿAbbās ibn ʿAbd al-Muṭṭalib (l'oncle du
      Prophète ﷺ) et mère d'ʿAbdullāh ibn ʿAbbās ra (le mufassir
      fondateur), et selon les sources la seconde femme à se
      convertir à l'Islam après Khadīja ra — mourut à Médine durant
      le califat d'ʿUthman ra. Elle rapporta 30 hadiths dans les
      Six Livres. Elle est la Compagne qui rapporta la récitation
      du Prophète ﷺ de la sourate al-Mursalāt en *witr* la nuit
      avant sa mort, et la seule femme directement attestée dans
      les sources classiques avoir personnellement levé le pied
      pour frapper Abū Lahab en défense d'un musulman durant la
      persécution à La Mecque. Sa sœur Maymouna devint Mère des
      Croyants.
    canonical_hijri: {year: 30, precision: year}
    canonical_gregorian: {date: 651-01-01, precision: year, method: attested}
