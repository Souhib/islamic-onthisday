  - slug: death-of-umm-hakim
    category: companion
    title_en: Death of Umm Ḥakim bint al-Ḥārith ra — Heroine of Marj al-Ṣuffar
    title_ar: وفاة أم حكيم بنت الحارث رضي الله عنها — بطلة مرج الصفر
    title_fr: Mort d'Umm Ḥakim bint al-Ḥārith ra — héroïne de Marj al-Ṣuffar
    description_en: |
      Umm Ḥakim bint al-Ḥarith al-Makhzūmiyya — niece of Khalid
      ibn al-Walīd ra and daughter of one of Quraysh's chiefs at
      Badr (her father al-Ḥarith ibn Hishām fell at Yarmuk later
      as a Muslim) — embraced Islam at the Conquest of Mecca and
      participated as a combatant at the Battle of Marj al-Ṣuffar
      (13 AH), where her husband ʿIkrima ibn Abi Jahl was martyred
      after his conversion. Classical sources record her killing
      seven Byzantine soldiers single-handedly with a tent-pole at
      Marj al-Ṣuffar after her husband's fall — the most-cited
      classical account of a sahabia in direct combat. She
      remarried after the battle to Khalid ibn Saʿid ibn al-ʿĀṣ,
      who was also martyred shortly after. She died in Medina
      around 13-14 AH.
    description_ar: |
      توفيت أم حكيم بنت الحارث المخزومية رضي الله عنها — ابنة أخت
      خالد بن الوليد رضي الله عنه، وابنة أحد سادة قريش يوم بدر
      (والدها الحارث بن هشام استشهد لاحقاً مسلماً يوم اليرموك) —
      أسلمت يوم فتح مكة، وشاركت محاربةً في معركة مرج الصفر سنة
      ١٣ هـ، حيث استشهد زوجها عكرمة بن أبي جهل بعد إسلامه. تذكر
      المصادر القديمة أنها قتلت سبعة من جند الروم بنفسها بعمود
      خيمة في مرج الصفر بعد سقوط زوجها — وهي أكثر روايات الصحابيات
      في القتال المباشر استشهاداً. وتزوجت بعد المعركة خالد بن سعيد
      بن العاص، فاستشهد هو الآخر بُعَيْدَ ذلك. توفيت بالمدينة نحو
      سنة ١٣-١٤ هـ.
    description_fr: |
      Umm Ḥakim bint al-Ḥārith al-Makhzūmiyya — nièce de Khālid ibn
      al-Walīd ra et fille de l'un des chefs de Quraysh à Badr
      (son père al-Ḥārith ibn Hishām tomba plus tard à Yarmouk en
      tant que musulman) — embrassa l'Islam à la Conquête de
      La Mecque et participa comme combattante à la bataille de
      Marj al-Ṣuffar (13 H), où son mari ʿIkrima ibn Abī Jahl fut
      martyrisé après sa conversion. Les sources classiques
      consignent qu'elle tua sept soldats byzantins à elle seule
      avec un piquet de tente à Marj al-Ṣuffar après la chute de
      son mari — le récit classique le plus cité d'une sahabia en
      combat direct. Elle se remaria après la bataille avec
      Khālid ibn Saʿīd ibn al-ʿĀṣ, qui fut également martyrisé
      peu après. Elle mourut à Médine vers 13-14 H.
    canonical_hijri: {year: 14, precision: year}
    canonical_gregorian: {date: 635-01-01, precision: year, method: attested}
