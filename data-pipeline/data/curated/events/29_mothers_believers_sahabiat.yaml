  - slug: death-of-asma-bint-yazid
    category: companion
    title_en: Death of Asmaʾ bint Yazid al-Anṣāriyya ra — Khaṭibat al-Nisāʾ
    title_ar: وفاة أسماء بنت يزيد الأنصارية رضي الله عنها — خطيبة النساء
    title_fr: Mort d'Asmāʾ bint Yazid al-Anṣāriyya ra — *Khaṭibat al-Nisāʾ*
    description_en: |
      Asmaʾ bint Yazid ibn al-Sakan al-Anṣāriyya — Madinan sahabia
      of the Awsi clan whose famous public address to the Prophet ﷺ
      on behalf of the women of Medina earned her the title
      *Khaṭibat al-Nisāʾ* ("Orator of the Women"). She approached
      the Prophet ﷺ in the company of female delegates and asked
      whether women's worship received the same divine reward as
      men's, given that men had additional opportunities (Friday
      prayer in the mosque, jihād, etc.) — the Prophet ﷺ replied
      affirmatively, in a celebrated hadith preserved in Aḥmad's
      Musnad. She participated in the Battle of Yarmuk and is
      reported to have killed nine Byzantine soldiers with her
      tent-pole. She died in Damascus during the caliphate of
      Yazīd ibn Muʿawiya, around 30 AH per Ibn Saʿd.
    description_ar: |
      توفيت أسماء بنت يزيد بن السكن الأنصارية الأوسية رضي الله عنها
      — صحابية مدنية، خطبت بين يدي رسول الله ﷺ بأمر نساء المدينة
      خطبة شهيرة استحقت بها لقب «خطيبة النساء». أتت رسول الله ﷺ في
      وفد من النساء فقالت: «إن الرجال فضلوا علينا بشهود الجمع
      والجماعات والجهاد ونحن النساء قاعدات في بيوتنا — هل لنا
      نصيب من ثوابهم؟» فأقرّ النبي ﷺ مساواة الأجر، في حديث ذائع
      محفوظ في «مسند» الإمام أحمد. وشاركت في معركة اليرموك، ويُروى
      أنها قتلت تسعة من جند الروم بعمود خيمتها. توفيت بدمشق في
      خلافة يزيد بن معاوية، نحو سنة ٣٠ هـ على ابن سعد.
    description_fr: |
      Asmāʾ bint Yazid ibn al-Sakan al-Anṣāriyya — sahabia médinoise
      du clan Aws, dont la célèbre allocution publique au Prophète ﷺ
      au nom des femmes de Médine lui valut le titre de *Khaṭibat
      al-Nisāʾ* (« Oratrice des Femmes »). Elle s'approcha du
      Prophète ﷺ en compagnie de déléguées et demanda si l'adoration
      des femmes recevait la même récompense divine que celle des
      hommes, étant donné que les hommes avaient des opportunités
      supplémentaires (prière du vendredi à la mosquée, jihād,
      etc.) — le Prophète ﷺ répondit affirmativement, dans un
      célèbre hadith préservé dans le Musnad d'Aḥmad. Elle participa
      à la bataille de Yarmouk et l'on rapporte qu'elle tua neuf
      soldats byzantins avec son piquet de tente. Elle mourut à
      Damas durant le califat de Yazīd ibn Muʿāwiya, vers 30 H
      d'après Ibn Saʿd.
