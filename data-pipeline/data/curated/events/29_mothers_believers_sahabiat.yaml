  - slug: death-of-maymouna-bint-al-harith
    category: ahl_al_bayt
    title_en: Death of Maymouna bint al-Ḥarith ra — Last Mother of the Believers to Die
    title_ar: وفاة ميمونة بنت الحارث رضي الله عنها — آخر أمهات المؤمنين وفاةً
    title_fr: Mort de Maymouna bint al-Ḥārith ra — dernière des Mères des Croyants à mourir
    description_en: |
      Maymouna bint al-Ḥarith al-Hilāliyya — last wife of the
      Prophet ﷺ to be married (in 7 AH at Sarif during the
      ʿUmratu al-Qaḍāʾ pilgrimage), aunt of Khalid ibn al-Walīd ra
      and Ibn ʿAbbās ra (both her sister's sons), and the last of
      the Mothers of the Believers to die — passed away at Sarif
      (where she had been married) and was buried there at her own
      request, at age about 80. She narrated 76 hadiths preserved
      in the Six Books, several foundational on ritual purity and
      the Prophet's ﷺ private daily practice. ʿAʾisha ra said of
      her: "By Allah, of all of us she had the most fear of Allah
      and the strongest ties with the womb." Her grave at Sarif on
      the Mecca-Medina road remained a recognised pilgrimage site
      into the Mamluk era.
    description_ar: |
      توفيت ميمونة بنت الحارث الهلالية رضي الله عنها — آخر زوجات
      النبي ﷺ نكاحاً (تزوجها في «سرف» سنة سبع للهجرة في عمرة
      القضاء)، وخالة خالد بن الوليد وعبد الله بن عباس رضي الله
      عنهما (كلاهما ابنا أختها)، وآخر أمهات المؤمنين وفاةً — في
      «سرف» (موضع نكاحها)، ودفنت بها بوصية منها، وقد ناهزت الثمانين.
      روت ستة وسبعين حديثاً في الكتب الستة، منها أحاديث أصول في
      الطهارة وفي الهدي اليومي للنبي ﷺ في خاصة بيته. قالت عنها
      عائشة رضي الله عنها: «والله إنها كانت من أتقانا لله وأوصلنا
      للرحم». وظل قبرها بـ«سرف» على طريق مكة-المدينة مزاراً متعارفاً
      عليه إلى عصر المماليك.
    description_fr: |
      Maymouna bint al-Ḥārith al-Hilāliyya — dernière épouse du
      Prophète ﷺ à être épousée (en 7 H à Sarif durant le
      pèlerinage de l'ʿUmratu al-Qaḍāʾ), tante de Khālid ibn al-
      Walīd ra et d'Ibn ʿAbbās ra (tous deux fils de sa sœur), et
      la dernière des Mères des Croyants à mourir — décéda à Sarif
      (où elle avait été épousée) et y fut enterrée selon ses
      propres volontés, à l'âge d'environ 80 ans. Elle rapporta
      76 hadiths préservés dans les Six Livres, plusieurs fondateurs
      sur la pureté rituelle et la pratique quotidienne privée du
      Prophète ﷺ. ʿĀʾisha ra dit d'elle : « Par Allah, de nous
      toutes elle avait le plus de crainte d'Allah et les liens
      les plus forts avec la parenté ». Sa tombe à Sarif sur la
      route La Mecque-Médine demeura un site de pèlerinage reconnu
      jusqu'à l'ère mamelouke.
    canonical_hijri: {year: 51, precision: year}
    canonical_gregorian: {date: 671-01-01, precision: year, method: attested}
