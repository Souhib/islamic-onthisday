# Wave 16 of curated event additions (2026-04-26).
# Mothers of the Believers (uncovered): Sawda, Umm Habiba, Maymouna,
# Juwayriya, Safiyya. Plus 10 senior sahabiat: Asma bint ʿUmays,
# Umm Maʿbad, Umm al-Faḍl, Umm Ḥakim, Umm Waraqa, Khawla bint Thaʿlaba,
# al-Shifaʾ bint ʿAbdullah, Asmaʾ bint Yazid, Umm Ayman, Umm Ḥaram.
# All female sahaba — image_blocked. Each event attested in Ibn Saʿd
# Ṭabaqāt al-Kubrā, Ibn Ḥajar al-Iṣāba, al-Dhahabī Siyar, or Ibn
# al-Athīr Usd al-Ghāba. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # MOTHERS OF THE BELIEVERS (REMAINING FIVE)
  # =========================================================================

  - slug: death-of-sawda-bint-zama
    category: ahl_al_bayt
    title_en: Death of Sawda bint Zamʿa ra — Mother of the Believers
    title_ar: وفاة سودة بنت زمعة رضي الله عنها — أم المؤمنين
    title_fr: Mort de Sawda bint Zamʿa ra — Mère des Croyants
    description_en: |
      Sawda bint Zamʿa al-Qurashiyya — the second wife of the
      Prophet ﷺ after the death of Khadīja ra, an early convert
      to Islam, and the first woman the Prophet ﷺ married after
      his bereavement during the Year of Sorrow (10th year of the
      mission) — died in Medina during the caliphate of Muʿawiya
      ra at age about 80. She was the senior of the wives in age
      and reportedly relinquished her night with the Prophet ﷺ to
      ʿAʾisha ra in her later years, an act preserved as an
      example of selflessness in classical biographical literature.
      She narrated five hadith preserved in the Six Books and was
      celebrated for her generosity, distributing what came to her
      from the public treasury under ʿUmar ra to the poor of
      Medina the same day she received it.
    description_ar: |
      توفيت سودة بنت زمعة القرشية رضي الله عنها — الزوجة الثانية
      للنبي ﷺ بعد وفاة خديجة رضي الله عنها، ومن أوائل المسلمات،
      وأول من تزوجها رسول الله ﷺ بعد وفاة خديجة في عام الحزن
      (السنة العاشرة من البعثة) — بالمدينة المنورة في خلافة معاوية
      رضي الله عنه عن نحو ثمانين سنة. كانت أكبر أزواج النبي ﷺ سناً،
      ونقل عنها أنها وهبت يومها للنبي ﷺ لعائشة رضي الله عنها في
      أواخر عمرها، وهي حادثة محفوظة في كتب التراجم نموذجاً للإيثار.
      روت خمسة أحاديث في الكتب الستة، واشتهرت بالكرم: فكانت إذا
      جاءها عطاء من بيت المال في عهد عمر رضي الله عنه فرّقته على
      فقراء المدينة في يومه.
    description_fr: |
      Sawda bint Zamʿa al-Qurashiyya — seconde épouse du Prophète ﷺ
      après le décès de Khadīja ra, convertie précoce à l'Islam, et
      la première femme que le Prophète ﷺ épousa après son deuil
      durant l'Année de Tristesse (10e année de la mission) —
      mourut à Médine durant le califat de Muʿāwiya ra à l'âge
      d'environ 80 ans. Elle était la plus âgée des épouses, et
      l'on rapporte qu'elle céda son tour au Prophète ﷺ à ʿĀʾisha
      ra dans ses dernières années — acte préservé comme exemple
      d'abnégation dans la littérature biographique classique. Elle
      rapporta cinq hadiths préservés dans les Six Livres et fut
      célébrée pour sa générosité : elle distribuait aux pauvres de
      Médine le jour même ce qui lui parvenait du trésor public
      sous ʿUmar ra.
    canonical_hijri: {year: 54, precision: year}
    canonical_gregorian: {date: 674-01-01, precision: year, method: attested}
