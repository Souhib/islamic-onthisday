  - slug: death-of-umm-ayman
    category: companion
    title_en: Death of Umm Ayman ra — Nursemaid of the Prophet ﷺ
    title_ar: وفاة أم أيمن رضي الله عنها — حاضنة رسول الله ﷺ
    title_fr: Mort d'Umm Ayman ra — nourrice du Prophète ﷺ
    description_en: |
      Baraka — Umm Ayman al-Ḥabashiyya — Abyssinian-origin
      freedwoman who was the Prophet's ﷺ nursemaid from his
      childhood (after the death of his mother Āmina, when the
      young Prophet ﷺ was returned to Mecca and Umm Ayman
      accompanied him), who married Zayd ibn Ḥaritha (the
      Prophet's ﷺ adoptive son) and bore him Usāma ibn Zayd ra —
      died in Medina during the caliphate of ʿUmar ra. The
      Prophet ﷺ called her *ummī* ("my mother") in his lifetime
      and said of her: "she is from the people of Paradise"
      (preserved in classical biographical sources). She wept
      inconsolably at the Prophet's ﷺ death; when Abu Bakr ra
      asked her why, she replied: "I weep because the news from
      heaven has been cut off from us." She died around 20 AH.
    description_ar: |
      توفيت بركة — أم أيمن الحبشية رضي الله عنها — مولاة من أصول
      حبشية، كانت حاضنة النبي ﷺ من صباه (بعد وفاة أمه آمنة، حين
      أُعيد الصبي ﷺ إلى مكة فصحبته أم أيمن)، وتزوجت بزيد بن حارثة
      (متبنّى النبي ﷺ) فأنجبت له أسامة بن زيد رضي الله عنهم —
      بالمدينة المنورة في خلافة عمر رضي الله عنه. وكان النبي ﷺ
      يدعوها «أمي» في حياته وقال فيها: «هي من أهل الجنة» (في
      المصادر التراجمية القديمة). وبكت عند وفاته ﷺ بكاءً شديداً،
      فلما سألها أبو بكر رضي الله عنه عن سبب بكائها قالت: «أبكي
      لأن خبر السماء قد انقطع عنا». توفيت نحو سنة ٢٠ هـ.
    description_fr: |
      Baraka — Umm Ayman al-Ḥabashiyya — affranchie d'origine
      abyssinienne qui fut la nourrice du Prophète ﷺ depuis son
      enfance (après le décès de sa mère Āmina, lorsque le jeune
      Prophète ﷺ fut ramené à La Mecque et qu'Umm Ayman
      l'accompagna), qui épousa Zayd ibn Ḥāritha (le fils adoptif
      du Prophète ﷺ) et lui donna Usāma ibn Zayd ra — mourut à
      Médine durant le califat d'ʿUmar ra. Le Prophète ﷺ
      l'appelait *ummī* (« ma mère ») de son vivant et dit d'elle :
      « elle est des gens du Paradis » (préservé dans les sources
      biographiques classiques). Elle pleura inconsolablement à la
      mort du Prophète ﷺ; lorsqu'Abū Bakr ra lui demanda pourquoi,
      elle répondit : « je pleure parce que les nouvelles du ciel
      nous ont été coupées ». Elle mourut vers 20 H.
