  - slug: death-of-umm-mabad
    category: companion
    title_en: Death of Umm Maʿbad al-Khuzaʿiyya ra — Witness of the Hijra
    title_ar: وفاة أم معبد الخزاعية رضي الله عنها — شاهدة الهجرة
    title_fr: Mort d'Umm Maʿbad al-Khuzaʿiyya ra — témoin de la Hijra
    description_en: |
      Umm Maʿbad ʿĀtika bint Khalid al-Khuzaʿiyya — bedouin sahabia
      whose tent the Prophet ﷺ and Abu Bakr ra passed during their
      Hijra from Mecca to Medina, and whose famous physical
      description of the Prophet ﷺ (preserved in al-Ḥākim's
      *Mustadrak* and Ibn Saʿd) is the most detailed and most
      cited classical-source description of the Prophet's ﷺ
      appearance: "I saw a man clear of complexion, beautiful of
      face, fine of build, neither stout nor lean, with bright
      eyes and long lashes..." — running for several lines. She
      embraced Islam after the encounter and migrated to Medina
      with her husband Abu Maʿbad. She died in Medina during the
      caliphate of Muʿawiya ra.
    description_ar: |
      توفيت أم معبد عاتكة بنت خالد الخزاعية رضي الله عنها — صحابية
      من البادية مرّ النبي ﷺ وأبو بكر الصديق رضي الله عنه بخيمتها
      في طريق الهجرة من مكة إلى المدينة، وعنها وصف النبي ﷺ المشهور
      المحفوظ في «مستدرك» الحاكم و«طبقات» ابن سعد، وهو أتم وصف
      كلاسيكي وأكثره استشهاداً لخلق النبي ﷺ: «رأيت رجلاً ظاهر الوضاءة،
      أبلج الوجه، حسن الخلق، لم تعبه ثُجلة ولم تزر به صعلة، وسيماً
      قسيماً، في عينيه دعج، وفي أشفاره عطف، وفي صوته صَهَل، وفي
      عنقه سَطَع، وفي لحيته كثاثة...» — في أبيات طويلة. وأسلمت
      رحمها الله بعد اللقاء، وهاجرت إلى المدينة مع زوجها أبي معبد.
      توفيت بالمدينة في خلافة معاوية رضي الله عنه.
    description_fr: |
      Umm Maʿbad ʿĀtika bint Khālid al-Khuzaʿiyya — sahabia bédouine
      dont la tente fut traversée par le Prophète ﷺ et Abū Bakr ra
      durant leur Hijra de La Mecque à Médine, et dont la célèbre
      description physique du Prophète ﷺ (préservée dans le
      *Mustadrak* d'al-Ḥākim et dans les *Ṭabaqāt* d'Ibn Saʿd) est
      la description la plus détaillée et la plus citée des sources
      classiques sur l'apparence du Prophète ﷺ : « j'ai vu un homme
      au teint clair, beau de visage, à la stature fine, ni gros
      ni maigre, aux yeux brillants et aux longs cils... » — sur
      plusieurs lignes. Elle embrassa l'Islam après la rencontre
      et émigra à Médine avec son mari Abū Maʿbad. Elle mourut à
      Médine durant le califat de Muʿāwiya ra.
    canonical_hijri: {year: 50, precision: year}
    canonical_gregorian: {date: 670-01-01, precision: year, method: attested}
