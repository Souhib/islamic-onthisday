  - slug: death-of-asma-bint-umays
    category: companion
    title_en: Death of Asmaʾ bint ʿUmays ra
    title_ar: وفاة أسماء بنت عميس رضي الله عنها
    title_fr: Mort d'Asmāʾ bint ʿUmays ra
    description_en: |
      Asmaʾ bint ʿUmays al-Khathʿamiyya — sahabia of the first
      Hijra to Abyssinia (with her first husband Jaʿfar ibn Abi
      Ṭalib, the Prophet's ﷺ cousin), then wife of Abu Bakr ra
      after Jaʿfar's martyrdom at Muʾta, then wife of ʿAli ibn
      Abi Ṭalib ra after Abu Bakr's death — was the only woman in
      Islamic history married successively to three Companions of
      the highest rank. She bore Muhammad ibn Abi Bakr, Muhammad
      ibn Jaʿfar, and ʿAwn ibn Jaʿfar, among others. She washed
      Abu Bakr's body for burial at his own bequest. She narrated
      60 hadith in the Six Books, several foundational on the
      legal practice of mourning and the duty of widows. She died
      in Medina around 40 AH.
    description_ar: |
      توفيت أسماء بنت عميس الخثعمية رضي الله عنها — صحابية مهاجرة
      في الهجرة الأولى إلى الحبشة (مع زوجها الأول جعفر بن أبي طالب
      ابن عم النبي ﷺ)، ثم زوجة أبي بكر الصديق رضي الله عنه بعد
      استشهاد جعفر بمؤتة، ثم زوجة علي بن أبي طالب رضي الله عنه بعد
      وفاة أبي بكر — وهي المرأة الوحيدة في تاريخ الإسلام التي
      تزوجها على التتابع ثلاثة من كبار الصحابة. أنجبت محمد بن أبي
      بكر ومحمد بن جعفر وعون بن جعفر وغيرهم. وغسّلت أبا بكر بوصية
      منه. روت ستين حديثاً في الكتب الستة، منها أحاديث أصول في فقه
      العدة وحقوق الأرامل. توفيت بالمدينة المنورة نحو سنة أربعين
      للهجرة.
    description_fr: |
      Asmāʾ bint ʿUmays al-Khathʿamiyya — sahabia de la première
      Hijra en Abyssinie (avec son premier mari Jaʿfar ibn Abī
      Ṭālib, cousin du Prophète ﷺ), puis épouse d'Abū Bakr ra
      après le martyre de Jaʿfar à Muʾta, puis épouse d'ʿAlī ibn
      Abī Ṭālib ra après la mort d'Abū Bakr — fut la seule femme
      de l'histoire islamique mariée successivement à trois
      Compagnons du plus haut rang. Elle enfanta Muḥammad ibn Abī
      Bakr, Muḥammad ibn Jaʿfar et ʿAwn ibn Jaʿfar, entre autres.
      Elle lava le corps d'Abū Bakr pour son ensevelissement à
      sa propre demande. Elle rapporta 60 hadiths dans les Six
      Livres, plusieurs fondateurs sur la pratique juridique du
      deuil et le devoir des veuves. Elle mourut à Médine vers
      40 H.
    canonical_hijri: {year: 40, precision: year}
    canonical_gregorian: {date: 660-01-01, precision: year, method: attested}
