  - slug: death-of-umm-haram
    category: companion
    title_en: Martyrdom of Umm Ḥaram bint Milḥan ra — First Sahabia Martyr at Sea
    title_ar: استشهاد أم حرام بنت ملحان رضي الله عنها — أول صحابية شهيدة في البحر
    title_fr: Martyre d'Umm Ḥarām bint Milḥān ra — première sahabia martyre en mer
    description_en: |
      Umm Ḥarām bint Milḥān al-Anṣariyya — sahabia of the
      Khazraj, sister of Umm Sulaym ra and aunt of Anas ibn Mālik
      ra, wife of ʿUbāda ibn al-Ṣāmit ra — fell from her mount
      and was killed at Larnaca, Cyprus, during the first Muslim
      naval expedition led by her husband and Muʿāwiya ibn Abi
      Sufyan in 28 AH. Her death fulfilled the Prophet's ﷺ
      foretelling preserved in the *ṣaḥīḥayn*: when she had
      napped at his side and woken up smiling, he had told her
      she would be among the first soldiers of his Umma to ride
      the sea on a military expedition (Bukhārī 2877). She was
      buried at Hala Sultan Tekke near Larnaca, where her tomb
      remains the only surviving Muslim shrine of a sahabia
      outside the central Islamic lands and a major pilgrimage
      destination.
    description_ar: |
      استشهدت أم حرام بنت ملحان الأنصارية رضي الله عنها — صحابية
      من الخزرج، أخت أم سليم رضي الله عنها وخالة أنس بن مالك رضي
      الله عنه، وزوجة عبادة بن الصامت رضي الله عنه — في «لارناكا»
      بقبرص، إذ سقطت عن دابتها فماتت، وذلك في أول حملة بحرية
      إسلامية بقيادة زوجها ومعاوية بن أبي سفيان سنة ٢٨ هـ. وحقّق
      موتها قول النبي ﷺ المتفق عليه إذ كانت قد قالت في نومها بجواره
      فاستيقظت تضحك، فأخبرها ﷺ أنها ستكون من أوائل جند أمته الذين
      يركبون البحر مجاهدين (البخاري ٢٨٧٧). دفنت بـ«هلا سلطان تكية»
      قرب لارناكا، وما زال قبرها هو المزار الإسلامي الوحيد الباقي
      لصحابية خارج البلاد الإسلامية الأصلية، ومن أكبر المزارات.
    description_fr: |
      Umm Ḥarām bint Milḥān al-Anṣariyya — sahabia de la Khazraj,
      sœur d'Umm Sulaym ra et tante d'Anas ibn Mālik ra, épouse
      d'ʿUbāda ibn al-Ṣāmit ra — tomba de sa monture et fut tuée
      à Larnaca, Chypre, durant la première expédition navale
      musulmane menée par son mari et Muʿāwiya ibn Abī Sufyān en
      28 H. Sa mort accomplit la prédiction du Prophète ﷺ préservée
      dans les *Ṣaḥīḥayn* : lorsqu'elle avait fait la sieste à ses
      côtés et s'était réveillée en souriant, il lui avait dit
      qu'elle serait parmi les premiers soldats de sa Umma à
      monter la mer en expédition militaire (Bukhārī 2877). Elle
      fut enterrée à Hala Sultan Tekke près de Larnaca, où sa
      tombe demeure le seul sanctuaire musulman survivant d'une
      sahabia en dehors des terres islamiques centrales et une
      destination de pèlerinage majeure.
