  - slug: death-of-umm-waraqa
    category: companion
    title_en: Martyrdom of Umm Waraqa bint ʿAbdullāh ra
    title_ar: استشهاد أم ورقة بنت عبد الله رضي الله عنها
    title_fr: Martyre d'Umm Waraqa bint ʿAbdallāh ra
    description_en: |
      Umm Waraqa bint ʿAbdullāh al-Anṣāriyya — early Madinan
      sahabia, one of the few Companions to memorise the entire
      Qurʾan during the Prophet's ﷺ lifetime, whom the Prophet ﷺ
      personally appointed to lead her own household in prayer
      (a precedent classical jurists cite for the permissibility of
      a woman leading other women in prayer) — was killed in her
      own home during the caliphate of ʿUmar ibn al-Khaṭṭāb ra by
      her own male and female slaves. ʿUmar ra dispatched
      investigators when she missed the dawn prayer at the Mosque,
      who found her smothered in her bed; the slaves were caught
      attempting to flee the city and were the first persons in
      Islamic history executed under the *qiṣāṣ* law for the murder
      of a free Muslim woman. The Prophet ﷺ used to call her "the
      martyr" *(al-shahīda)* in his lifetime in anticipation of her
      end.
    description_ar: |
      استشهدت أم ورقة بنت عبد الله الأنصارية رضي الله عنها —
      صحابية مدنية باكرة، من القلة من الصحابة الذين حفظوا القرآن
      كله في حياة النبي ﷺ، وممن أمرها النبي ﷺ بنفسه أن تؤم أهل
      دارها في الصلاة (وهي السابقة التي يستشهد بها الفقهاء القدامى
      في جواز إمامة المرأة للنساء) — قُتلت في دارها في خلافة عمر
      بن الخطاب رضي الله عنه على يد عبدها وأمتها. أرسل عمر رضي
      الله عنه من يتفقدها لما تأخرت عن صلاة الفجر في المسجد،
      فوجدها مخنوقة في فراشها؛ أُسر العبدان وهما يحاولان الفرار
      من المدينة، وكانا أول من نُفّذ فيهما حكم القصاص في الإسلام
      على قتل حرة. وكان النبي ﷺ يدعوها في حياته «الشهيدة» تنبؤاً
      بنهايتها.
    description_fr: |
      Umm Waraqa bint ʿAbdallāh al-Anṣāriyya — sahabia médinoise
      ancienne, l'une des rares Compagnons à mémoriser le Coran
      entier durant la vie du Prophète ﷺ, que le Prophète ﷺ
      désigna personnellement pour diriger la prière dans sa propre
      maisonnée (précédent que les juristes classiques citent pour
      la permissibilité d'une femme dirigeant d'autres femmes en
      prière) — fut tuée dans sa propre maison durant le califat
      d'ʿUmar ibn al-Khaṭṭāb ra par ses propres esclaves homme et
      femme. ʿUmar ra dépêcha des enquêteurs lorsqu'elle manqua la
      prière de l'aube à la Mosquée, qui la trouvèrent étouffée
      dans son lit; les esclaves furent capturés en tentant de
      fuir la ville et furent les premiers à être exécutés dans
      l'histoire islamique sous la loi du *qiṣāṣ* pour le meurtre
      d'une femme musulmane libre. Le Prophète ﷺ avait l'habitude
      de l'appeler « la martyre » *(al-shahīda)* de son vivant en
      anticipation de sa fin.
    canonical_hijri: {year: 14, precision: year}
    canonical_gregorian: {date: 635-01-01, precision: year, method: attested}
