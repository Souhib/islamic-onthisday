  - slug: death-of-khawla-bint-thalaba
    category: companion
    title_en: Death of Khawla bint Thaʿlaba ra — Subject of Surat al-Mujadila
    title_ar: وفاة خولة بنت ثعلبة رضي الله عنها — التي في شأنها سورة المجادلة
    title_fr: Mort de Khawla bint Thaʿlaba ra — sujet de la sourate al-Mujādila
    description_en: |
      Khawla bint Thaʿlaba al-Khazrajiyya — Madinan sahabia of the
      Khazraj, whose dispute (*mujādala*) with the Prophet ﷺ
      regarding her husband Aws ibn al-Ṣāmit's pronouncement of
      *ẓihār* (a pre-Islamic divorce-formula equating the wife to
      the husband's mother) was directly addressed in the opening
      verse of Sūrat al-Mujādila (Q 58:1): "Allah has heard the
      words of she who pleads with you about her husband and
      complains to Allah" — establishing the legal abrogation of
      *ẓihār* and instituting expiation (*kaffāra*) for those who
      had pronounced it. ʿUmar ra was once asked at the Caliph's
      court when Khawla addressed him: "ʿUmar! I knew you when
      you were called Umayr in the markets of ʿUkāẓ — fear Allah
      in the affairs of the Muslims!" ʿUmar wept and gave her his
      full attention. She died in Medina, year uncertain,
      probably late ʿUthmān-era.
    description_ar: |
      توفيت خولة بنت ثعلبة الخزرجية رضي الله عنها — صحابية مدنية من
      الخزرج، نزلت في شأن مجادلتها للنبي ﷺ بسبب ظهار زوجها أوس بن
      الصامت (وهو طلاق جاهلي يجعل الزوجة كأم الزوج في التحريم)
      أوّلَ آية من سورة المجادلة (الآية ١): ﴿قَدْ سَمِعَ اللَّهُ
      قَوْلَ الَّتِي تُجَادِلُكَ فِي زَوْجِهَا وَتَشْتَكِي إِلَى
      اللَّهِ﴾ — وفيها نسخ الظهار شرعاً ووضع كفّارته. وكلّمت عمر
      رضي الله عنه يوماً في مجلس قضائه فقالت: «يا عمر! قد عهدتك
      وأنت تدعى عُميراً في أسواق عكاظ — اتق الله في أمر المسلمين!»
      فبكى عمر رضي الله عنه وأقبل عليها بكليته. توفيت رحمها الله
      بالمدينة، والسنة غير محددة على الأرجح في أواخر خلافة عثمان
      رضي الله عنه.
      
      Classical biographers (Ibn Saʿd, Ibn Ḥajar) record her death only as occurring during the latter Rashidun era without precise year; the 35 AH date used here is the modal estimate from Ibn Ḥajar's *Iṣāba* and is approximate rather than firmly attested.
      
      لم يحدد كبار المترجمين (ابن سعد وابن حجر) سنة وفاتها وإنما ذكروا أنها كانت في أواخر عهد الراشدين دون تحديد دقيق؛ فما اعتمدناه هنا (سنة ٣٥ هـ) تقريب بناء على «الإصابة» لابن حجر، وليس روايةً منصوصةً جازمةً.
    description_fr: |
      Khawla bint Thaʿlaba al-Khazrajiyya — sahabia médinoise de
      la Khazraj, dont le différend (*mujādala*) avec le Prophète ﷺ
      au sujet du prononcé de *ẓihār* par son mari Aws ibn al-
      Ṣāmit (formule de divorce préislamique assimilant l'épouse à
      la mère du mari) fut directement traité dans le verset
      d'ouverture de la sourate al-Mujādila (Q 58:1) : « Allah a
      entendu les paroles de celle qui plaide auprès de toi à
      propos de son mari et se plaint à Allah » — établissant
      l'abrogation juridique du *ẓihār* et instituant l'expiation
      (*kaffāra*) pour ceux qui l'avaient prononcé. ʿUmar ra fut
      un jour interpellé à la cour du calife lorsque Khawla
      l'apostropha : « ʿUmar ! Je t'ai connu quand on t'appelait
      Umayr dans les marchés d'ʿUkāẓ — crains Allah dans les
      affaires des musulmans ! » ʿUmar pleura et lui accorda toute
      son attention. Elle mourut à Médine, l'année est incertaine,
      probablement vers la fin de l'ère d'ʿUthmān.
    canonical_hijri: {year: 35, precision: year}
    canonical_gregorian: {date: 656-01-01, precision: year, method: attested}
