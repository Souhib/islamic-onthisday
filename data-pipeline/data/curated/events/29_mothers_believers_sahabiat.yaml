  - slug: death-of-safiyya-bint-huyayy
    category: ahl_al_bayt
    title_en: Death of Ṣafiyya bint Ḥuyayy ra — Mother of the Believers
    title_ar: وفاة صفية بنت حيي رضي الله عنها — أم المؤمنين
    title_fr: Mort de Ṣafiyya bint Ḥuyayy ra — Mère des Croyants
    description_en: |
      Ṣafiyya bint Ḥuyayy — of Hebrew lineage descended from the
      Prophet Hārūn (Aaron), daughter of the chief of Banū Naḍīr,
      taken captive at the conquest of Khaybar (7 AH) and freed
      and married by the Prophet ﷺ on the road back to Medina —
      died in Medina at age about 60. The Prophet ﷺ made her
      freedom her *mahr* — the rare juristic precedent the Hanafi
      and Shafiʿi madhāhib later cite for permitting a woman's
      manumission to be the consideration for her marriage. When
      asked by ʿAʾisha ra how she felt being descended from the
      Jewish prophets, Ṣafiyya replied: "My uncle is Mūsā, my
      cousin is Hārūn, and my husband is Muḥammad — what nobler
      house can a woman wish for?" She narrated 10 hadith
      preserved in the Six Books.
    description_ar: |
      توفيت صفية بنت حيي رضي الله عنها — من نسل سبط النبي هارون
      عليه السلام، ابنة سيد بني النضير، سُبيت في فتح خيبر سنة سبع
      للهجرة، فأعتقها رسول الله ﷺ وتزوجها في طريق الرجوع إلى
      المدينة — بالمدينة المنورة عن نحو ستين سنة. وجعل النبي ﷺ
      عتقها صداقها — وهي السابقة الفقهية النادرة التي يستشهد بها
      الحنفية والشافعية في صحة جعل العتق صداقاً للمرأة. ولما
      عيّرتها عائشة رضي الله عنها يوماً بنسبها اليهودي، قالت لها
      صفية: «خالي موسى وابن عمي هارون وزوجي محمد — فأي بيت أشرف من
      هذا؟». روت عشرة أحاديث في الكتب الستة.
      
      Sources record her death between 36 and 50 AH; we follow al-Ṭabarī's *Tārīkh* and Ibn Saʿd's *Ṭabaqāt* with 50 AH as the dominant attestation, while a minority position (Ibn Ḥajar's *Iṣāba* citing earlier authorities) records 36 AH.
      
      ذكرت المصادر وفاتها بين سنتي ٣٦ و٥٠ هـ؛ ونتبع هنا تاريخ الطبري وطبقات ابن سعد بسنة ٥٠ هـ بوصفها الأكثر تواتراً، مع إيراد ابن حجر العسقلاني في «الإصابة» نقلاً عن متقدمين سنة ٣٦ هـ بوصفها قولاً أقل.
    description_fr: |
      Ṣafiyya bint Ḥuyayy — de lignée hébraïque descendante du
      prophète Hārūn (Aaron), fille du chef des Banū Naḍīr, prise
      captive à la conquête de Khaybar (7 H) et libérée puis
      épousée par le Prophète ﷺ sur la route du retour vers Médine
      — mourut à Médine à l'âge d'environ 60 ans. Le Prophète ﷺ
      fit de sa libération son *mahr* — précédent juridique rare
      que les madhāhib hanafite et shafiʿite citeraient plus tard
      pour permettre que l'affranchissement d'une femme soit la
      contrepartie de son mariage. Lorsqu'ʿĀʾisha ra lui demanda
      ce qu'elle ressentait à descendre des prophètes juifs,
      Ṣafiyya répondit : « mon oncle est Mūsā, mon cousin est
      Hārūn, et mon mari est Muḥammad — quelle maison plus noble
      une femme peut-elle souhaiter ? » Elle rapporta 10 hadiths
      préservés dans les Six Livres.
    canonical_hijri: {year: 50, precision: year}
    canonical_gregorian: {date: 670-01-01, precision: year, method: attested}
