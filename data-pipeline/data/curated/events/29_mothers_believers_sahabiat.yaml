  - slug: death-of-al-shifa-bint-abdullah
    category: companion
    title_en: Death of al-Shifaʾ bint ʿAbdullāh ra — First Female Public Administrator
    title_ar: وفاة الشفاء بنت عبد الله رضي الله عنها — أول والية في الإسلام
    title_fr: Mort d'al-Shifāʾ bint ʿAbdallāh ra — première administratrice publique
    description_en: |
      al-Shifaʾ bint ʿAbdullāh al-ʿAdawiyya — early Quraysh sahabia
      who could read and write before the rise of Islam (a rare
      literacy at the time), personally taught Ḥafṣa bint ʿUmar ra
      to read, and was appointed by ʿUmar ibn al-Khaṭṭāb ra as
      *muḥtasiba* (market inspector) of Medina — the first woman
      in Islamic history to hold a formal civic-administrative
      post — died in Medina at age about 70. The classical
      jurists from the Hanafi school onward cite her appointment
      as a precedent for the permissibility of women holding the
      *ḥisba* (market regulation) office. She narrated the famous
      hadith on the *ruqya* (Islamic spiritual healing) in which
      the Prophet ﷺ taught her a specific prayer for ant-bites that
      she would later teach to Ḥafṣa.
    description_ar: |
      توفيت الشفاء بنت عبد الله العدوية رضي الله عنها — صحابية
      قرشية باكرة، كانت تجيد القراءة والكتابة قبل ظهور الإسلام (وهي
      من نوادر العلم في النساء يومئذ)، وعلّمت بنفسها حفصة بنت عمر
      رضي الله عنها الكتابة، وولاها عمر بن الخطاب رضي الله عنه
      حسبة سوق المدينة — وهي أول امرأة في تاريخ الإسلام تتولى
      منصباً مدنياً رسمياً — بالمدينة المنورة عن نحو سبعين سنة.
      ويستشهد فقهاء أهل السنة من الحنفية فما بعد بهذه الولاية في
      جواز تولي المرأة الحسبة. روت الحديث الذائع في الرقية الذي
      علّمها فيه النبي ﷺ دعاءً مخصوصاً للنملة (مرض جلدي) تعلّمته
      منها حفصة لاحقاً.
    description_fr: |
      al-Shifāʾ bint ʿAbdallāh al-ʿAdawiyya — sahabia qurashite
      ancienne qui savait lire et écrire avant l'avènement de
      l'Islam (lettrement rare à l'époque), enseigna personnellement
      à Ḥafṣa bint ʿUmar ra à lire, et fut désignée par ʿUmar ibn
      al-Khaṭṭāb ra comme *muḥtasiba* (inspectrice de marché) de
      Médine — la première femme de l'histoire islamique à occuper
      un poste civique-administratif formel — mourut à Médine à
      l'âge d'environ 70 ans. Les juristes classiques de l'école
      hanafite et au-delà citent sa nomination comme précédent pour
      la permissibilité aux femmes de tenir l'office de *ḥisba*
      (régulation des marchés). Elle rapporta le célèbre hadith sur
      la *ruqya* (guérison spirituelle islamique) où le Prophète ﷺ
      lui enseigna une prière spécifique pour les piqûres de
      fourmi qu'elle enseignerait plus tard à Ḥafṣa.
