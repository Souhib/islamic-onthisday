  - slug: death-of-umm-habiba
    category: ahl_al_bayt
    title_en: Death of Umm Ḥabiba ra — Mother of the Believers
    title_ar: وفاة أم حبيبة رضي الله عنها — أم المؤمنين
    title_fr: Mort d'Umm Ḥabiba ra — Mère des Croyants
    description_en: |
      Ramla bint Abi Sufyan, known as Umm Ḥabiba — daughter of Abu
      Sufyan ibn Ḥarb (chief of Quraysh prior to the conquest of
      Mecca) and an early convert to Islam who emigrated to
      Abyssinia with her first husband ʿUbayd Allah ibn Jaḥsh — died
      in Medina at age about 70. After her first husband apostatised
      to Christianity in Abyssinia and died there, the Negus of
      Abyssinia conducted her marriage to the Prophet ﷺ on his
      behalf, with a *mahr* of 400 *dinars* personally provided by
      the Negus — a marriage of substantial diplomatic significance
      that bound the lineage of Abu Sufyan into the Prophet's ﷺ
      household. She narrated 65 hadith preserved in the Six Books.
      ʿAʾisha ra and Umm Salama ra both attended her deathbed at
      her own request to seek mutual forgiveness for any past
      tensions between the wives.
    description_ar: |
      توفيت رملة بنت أبي سفيان المعروفة بأم حبيبة رضي الله عنها —
      ابنة أبي سفيان بن حرب (سيد قريش قبل فتح مكة)، ومن أوائل
      المسلمات، هاجرت إلى الحبشة مع زوجها الأول عبيد الله بن جحش —
      بالمدينة المنورة عن نحو سبعين سنة. وبعد ارتداد زوجها الأول إلى
      النصرانية بالحبشة وموته فيها، تولى النجاشي ملك الحبشة عقد
      نكاحها على رسول الله ﷺ بالنيابة، بصداق أربع مئة دينار دفعها
      النجاشي بنفسه — وهو زواج ذو دلالة دبلوماسية كبيرة ربط نسب أبي
      سفيان بأهل بيت النبي ﷺ. روت خمسة وستين حديثاً في الكتب الستة.
      وحضرت عائشة وأم سلمة رضي الله عنهما عند موتها بطلب منها
      ليتسامحن في أي توتر سابق بين أمهات المؤمنين.
    description_fr: |
      Ramla bint Abī Sufyān, connue sous le nom d'Umm Ḥabiba —
      fille d'Abū Sufyān ibn Ḥarb (chef de Quraysh avant la conquête
      de La Mecque) et convertie précoce à l'Islam qui émigra en
      Abyssinie avec son premier mari ʿUbayd Allāh ibn Jaḥsh —
      mourut à Médine à l'âge d'environ 70 ans. Après que son
      premier mari fut apostasié au christianisme en Abyssinie et y
      fut décédé, le Négus d'Abyssinie conduisit son mariage avec
      le Prophète ﷺ par procuration, avec un *mahr* de 400 *dinars*
      personnellement fourni par le Négus — un mariage d'une
      importance diplomatique substantielle qui lia la lignée
      d'Abū Sufyān à la maisonnée du Prophète ﷺ. Elle rapporta
      65 hadiths préservés dans les Six Livres. ʿĀʾisha ra et Umm
      Salama ra assistèrent toutes deux à son lit de mort à sa
      propre demande pour solliciter un pardon mutuel pour toute
      tension passée entre les épouses.
    canonical_hijri: {year: 44, precision: year}
