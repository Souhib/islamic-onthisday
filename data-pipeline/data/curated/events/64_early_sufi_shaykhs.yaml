  - slug: death-of-abd-al-wahid-ibn-zayd
    category: scholar_death
    title_en: Death of ʿAbd al-Wāḥid ibn Zayd — Basran zāhid and founder of the ʿAbbādān ribāṭ
    title_ar: وفاة عبد الواحد بن زيد — زاهد البصرة ومؤسس رباط عبادان
    title_fr: Mort de ʿAbd al-Wāḥid ibn Zayd — ascète basrien, fondateur du *ribāṭ* de ʿAbbādān
    description_en: |
      ʿAbd al-Wāḥid ibn Zayd al-Baṣrī — Basran zāhid, transmitter
      and pupil of al-Ḥasan al-Baṣrī, and the figure to whom
      classical Sufi historiography attributes the founding of
      the *ribāṭ* of ʿAbbādān at the mouth of the Tigris-Euphrates
      delta — the earliest formally organised gathering-place of
      Muslim ascetics — died in Basra. The sources give his death
      year variously as 177 AH (the date in al-Dhahabī's *Siyar
      Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām*), 167 AH, or simply
      "before 180". We follow the 177 AH date as the best-attested
      majority position. His circle at ʿAbbādān, recorded by Abū
      Nuʿaym in *Ḥilyat al-Awliyāʾ*, became the model for the
      later *ribāṭ* / *khānqāh* tradition; many of the second-
      century Basran ascetics — Mālik ibn Dīnār, Rabāḥ ibn ʿAmr
      al-Qaysī, ʿUtba al-Ghulām — were associated with him.
    description_ar: |
      توفي عبد الواحد بن زيد البصري — زاهد البصرة، روى عن الحسن
      البصري وأخذ عنه، وإليه تنسب كتب التراجم الصوفية الكلاسيكية
      تأسيس «رباط عبادان» على مصبّ دجلة والفرات في أوائل تجمعات
      الزهاد المنظمة في الإسلام — بالبصرة. واختلفت المصادر في سنة
      وفاته: ذكر الذهبي في «سير أعلام النبلاء» وفي «تاريخ الإسلام»
      أنه توفي سنة ١٧٧ هـ، وذكر بعضهم سنة ١٦٧ هـ، وقال آخرون:
      «قبل الثمانين». ونحن نتابع سنة ١٧٧ هـ بوصفها الأرجح والأكثر
      عند المصادر. وحلقتُه برباط عبادان التي قيدها أبو نعيم في
      «حلية الأولياء» صارت النموذج الذي قام عليه نظام الرباط
      والخانقاه بعدُ، وكثير من زهاد البصرة في القرن الثاني — مالك
      بن دينار، ورباح بن عمرو القيسي، وعتبة الغلام — اتصلوا به.
    description_fr: |
      ʿAbd al-Wāḥid ibn Zayd al-Baṣrī — *zāhid* basrien,
      transmetteur et disciple d'al-Ḥasan al-Baṣrī, et figure à
      laquelle l'historiographie soufie classique attribue la
      fondation du *ribāṭ* de ʿAbbādān à l'embouchure du delta
      Tigre-Euphrate — premier lieu de rassemblement formellement
      organisé d'ascètes musulmans — mourut à Basra. Les sources
      donnent son année de mort tantôt en 177 H (date des *Siyar
      Aʿlām al-Nubalāʾ* et du *Tārīkh al-Islām* d'al-Dhahabī),
      tantôt en 167 H, tantôt simplement « avant 180 ». Nous
      retenons 177 H comme position majoritaire la mieux
      attestée. Son cercle à ʿAbbādān, consigné par Abū Nuʿaym
      dans la *Ḥilyat al-Awliyāʾ*, devint le modèle de la
      tradition ultérieure du *ribāṭ* / *khānqāh* ; nombre des
      ascètes basriens du IIᵉ siècle — Mālik ibn Dīnār, Rabāḥ
      ibn ʿAmr al-Qaysī, ʿUtba al-Ghulām — lui furent
      associés.
    canonical_hijri: {year: 177, precision: year}
