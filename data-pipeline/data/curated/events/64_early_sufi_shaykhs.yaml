  - slug: death-of-ibrahim-ibn-adham
    category: scholar_death
    title_en: Death of Ibrāhīm ibn Adham — the prince-turned-ascetic of Balkh
    title_ar: وفاة إبراهيم بن أدهم — أمير بلخ الذي تحول إلى الزهد
    title_fr: Mort d'Ibrāhīm ibn Adham — le prince-ascète de Balkh
    description_en: |
      Abū Isḥāq Ibrāhīm ibn Adham ibn Manṣūr — Khurāsānī of noble
      Balkhī lineage who renounced his princely station for a life
      of itinerant zuhd in the Levant, and in classical Sunni
      memory the archetype of the *zāhid* who lives by the labour
      of his own hands — died at the frontier of Byzantine
      territory while on a *ghazwa* (according to most sources, in
      161 AH, the date adopted by al-Dhahabī in *Siyar Aʿlām
      al-Nubalāʾ* and Ibn Khallikān in *Wafayāt al-Aʿyān*; some
      reports give 162 AH). He was a recognised hadith
      transmitter — Sufyān al-Thawrī, Shuʿba ibn al-Ḥajjāj, and
      al-Awzāʿī sat with him — and Imām Aḥmad's circle preserved
      his sayings on tawakkul, the licit livelihood, and the
      sweetness of nightly prayer. Abū Nuʿaym's *Ḥilyat
      al-Awliyāʾ* devotes one of its longest entries to him; later
      Sufi tradition (al-Qushayrī, al-Hujwīrī, ʿAṭṭār's
      *Tadhkirat al-Awliyāʾ*) made his conversion narrative — the
      voice from the unseen interrupting his hunting expedition —
      one of the foundational hagiographic motifs of Khurāsānī
      Sufism.
    description_ar: |
      توفي أبو إسحاق إبراهيم بن أدهم بن منصور — خراساني المنبت من
      أكابر بلخ، ترك الإمارة وعاش زاهداً متجولاً في بلاد الشام،
      وهو في ذاكرة أهل السنة الكلاسيكية النموذج الأمثل للزاهد الذي
      يعيش من كَدّ يده — على ثغر الروم وهو في غزوة، سنة ١٦١ هـ
      عند جمهور أهل الأخبار وهي السنة التي أثبتها الذهبي في «سير
      أعلام النبلاء» وابن خلكان في «وفيات الأعيان»، وذكر بعضهم
      ١٦٢ هـ. وهو من رجال الحديث الذين روى عنهم سفيان الثوري
      وشعبة بن الحجاج والأوزاعي، وحفظ أصحاب أحمد بن حنبل أقواله
      في التوكل والكسب الحلال وحلاوة قيام الليل. وأفرد له أبو
      نعيم في «حلية الأولياء» من أطول تراجمه؛ ثم جعلت تقاليد
      التصوف اللاحقة (القشيري والهجويري و«تذكرة الأولياء» للعطار)
      من قصة توبته — وذلك النداء الغيبي الذي قطع عليه رحلة الصيد
      — رأس المواقف التأسيسية في تصوف خراسان.
    description_fr: |
      Abū Isḥāq Ibrāhīm ibn Adham ibn Manṣūr — Khurāsānien de
      noble lignée balkhī qui renonça à sa condition princière
      pour une vie de *zuhd* itinérant au Levant, et qui dans la
      mémoire sunnite classique incarne l'archétype du *zāhid*
      vivant du labeur de ses propres mains — mourut à la
      frontière byzantine au cours d'une *ghazwa*, en 161 H selon
      la majorité des sources (date retenue par al-Dhahabī dans
      les *Siyar Aʿlām al-Nubalāʾ* et par Ibn Khallikān dans les
      *Wafayāt al-Aʿyān*) ; certaines relations donnent 162 H. Il
      était un transmetteur de hadiths reconnu — Sufyān al-Thawrī,
      Shuʿba ibn al-Ḥajjāj et al-Awzāʿī assistèrent à ses séances
      — et le cercle d'Imām Aḥmad préserva ses paroles sur le
      *tawakkul*, le gain licite et la douceur de la prière
      nocturne. La *Ḥilyat al-Awliyāʾ* d'Abū Nuʿaym lui consacre
      l'une de ses plus longues notices ; la tradition soufie
      ultérieure (al-Qushayrī, al-Hujwīrī, la *Tadhkirat
      al-Awliyāʾ* de ʿAṭṭār) fit du récit de sa conversion — la
      voix invisible interrompant sa partie de chasse — l'un des
      motifs hagiographiques fondateurs du soufisme khurāsānien.
    canonical_hijri: {year: 161, precision: year}
    canonical_gregorian: {date: 778-01-01, precision: year, method: tabular_conversion}
