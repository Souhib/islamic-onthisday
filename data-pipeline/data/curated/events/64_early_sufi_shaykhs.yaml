        notes: "261 AH at Bisṭām — al-Dhahabī's preferred date; followed by majority."
      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt al-Aʿyān adopts 261 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "Tārīkh al-Islām confirms 261 AH; al-Sulamī's earlier 234 AH noted."
