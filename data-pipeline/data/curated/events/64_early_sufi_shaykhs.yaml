  - slug: death-of-dawud-al-tai
    category: scholar_death
    title_en: Death of Dāwūd al-Ṭāʾī — Kūfan jurist-turned-ascetic, pupil of Abū Ḥanīfa
    title_ar: وفاة داود الطائي — فقيه كوفي تحول إلى الزهد، تلميذ أبي حنيفة
    title_fr: Mort de Dāwūd al-Ṭāʾī — juriste kūfīen ascète, disciple d'Abū Ḥanīfa
    description_en: |
      Abū Sulaymān Dāwūd ibn Nuṣayr al-Ṭāʾī al-Kūfī — Kūfan
      Sunni jurist who studied fiqh and uṣūl with Imām Abū Ḥanīfa
      for twenty years before withdrawing into rigorous zuhd, and
      a recognised hadith transmitter cited in the Six Books — died
      in Kūfa. The classical biographers diverge between 165 AH and
      160 AH; we follow al-Dhahabī's preferred date of 165 AH in
      *Siyar Aʿlām al-Nubalāʾ*, which is also the year given by
      Ibn Khallikān in *Wafayāt al-Aʿyān* and by Ibn ʿImād in
      *Shadharāt al-Dhahab*. Abū Ḥanīfa is reported to have said
      of him: "Dāwūd attained what we sought through fiqh, and
      we did not." He inherited a modest patrimony from his mother,
      lived on it for years until it was exhausted, and then sold
      the timbers of his roof one by one to feed himself — a story
      preserved by Abū Nuʿaym in *Ḥilyat al-Awliyāʾ* that became
      one of the canonical anecdotes of the second-century AH
      Iraqi zuhd tradition.
    description_ar: |
      توفي أبو سليمان داود بن نُصير الطائي الكوفي — فقيه كوفي
      سني درس الفقه والأصول على الإمام أبي حنيفة عشرين سنة قبل
      أن يعتزل في الزهد الشديد، وهو من رجال الحديث الذين روى
      عنهم أصحاب الكتب الستة — بالكوفة. واختلف أصحاب التراجم بين
      سنة ١٦٥ هـ وسنة ١٦٠ هـ؛ ونحن نتابع ما اختاره الذهبي في
      «سير أعلام النبلاء» من سنة ١٦٥ هـ، وهي السنة التي أثبتها
      ابن خلكان في «وفيات الأعيان» وابن العماد في «شذرات الذهب».
      ويُنقَل عن أبي حنيفة قوله فيه: «وصل داود إلى ما طلبنا
      بالفقه ولم نصل». وكان قد ورث عن أمه قوتاً يسيراً عاش به
      سنين حتى نفد، ثم صار يبيع خشب سقف بيته خشبة خشبة لِيَقتات،
      وهي قصة نقلها أبو نعيم في «حلية الأولياء» وصارت من
      الحكايات التأسيسية في تراث الزهد العراقي في القرن الثاني
      الهجري.
    description_fr: |
      Abū Sulaymān Dāwūd ibn Nuṣayr al-Ṭāʾī al-Kūfī — juriste
      sunnite kūfīen qui étudia le *fiqh* et les *uṣūl* auprès de
      l'Imām Abū Ḥanīfa pendant vingt ans avant de se retirer
      dans un *zuhd* rigoureux, et transmetteur reconnu de
      hadiths cité dans les Six Livres — mourut à Kūfa. Les
      biographes classiques hésitent entre 165 H et 160 H ; nous
      suivons la date privilégiée par al-Dhahabī dans les *Siyar
      Aʿlām al-Nubalāʾ* — 165 H —, également retenue par Ibn
      Khallikān dans les *Wafayāt al-Aʿyān* et par Ibn ʿImād dans
      les *Shadharāt al-Dhahab*. On rapporte qu'Abū Ḥanīfa
      disait de lui : « Dāwūd a atteint par sa voie ce que nous
      avons cherché par le *fiqh* sans l'atteindre. » Il avait
      hérité de sa mère un modeste patrimoine dont il vécut des
      années durant jusqu'à son épuisement, puis se mit à
      vendre une à une les poutres du toit de sa maison pour
      subsister — récit préservé par Abū Nuʿaym dans la *Ḥilyat
      al-Awliyāʾ* devenu l'une des anecdotes canoniques du
      *zuhd* irakien du IIᵉ siècle de l'Hégire.
