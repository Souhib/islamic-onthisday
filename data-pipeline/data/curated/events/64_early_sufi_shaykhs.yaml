  - slug: death-of-bayazid-al-bistami
    category: scholar_death
    title_en: Death of Abū Yazīd al-Bisṭāmī (Bāyazīd) — Khurāsānī Sufi master
    title_ar: وفاة أبي يزيد البسطامي (بايزيد) — شيخ صوفية خراسان
    title_fr: Mort d'Abū Yazīd al-Bisṭāmī (Bāyazīd) — maître soufi du Khurāsān
    description_en: |
      Abū Yazīd Ṭayfūr ibn ʿĪsā ibn Surūshān al-Bisṭāmī, known
      across the eastern Islamic world as Bāyazīd — Khurāsānī
      Sunni Sufi master of Bisṭām (in the Qūmis region of
      northern Iran), and the figure to whom the classical
      *ṭabaqāt* tradition traces the *sukr* (intoxicated)
      idiom of mystical expression that al-Junayd would later
      moderate within the Baghdadi *ṣaḥw* (sober) school — died
      at Bisṭām. Sources differ between two main dates: 234 AH
      (the early date preserved in al-Sulamī's *Ṭabaqāt
      al-Ṣūfiyya*) and 261 AH (the date adopted by al-Dhahabī
      in *Siyar Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām* and
      followed by the majority of the later canon, including Ibn
      Khallikān's *Wafayāt al-Aʿyān*). We follow the 261 AH
      majority position. His legal-spiritual training was anchored
      by Ḥanafī fiqh under his teacher Abū ʿAlī al-Sindī (the
      attribution noted by al-Sahlagī, his earliest biographer);
      the *shaṭaḥāt* attributed to him — among the most quoted
      and most contested passages of early Sufi literature — were
      defended within Sunni reception by figures such as
      al-Junayd, who interpreted them as expressions overcome by
      mystical state, and remained a touchstone of the East-Iranian
      Sufi tradition through al-Hujwīrī, ʿAṭṭār's
      *Tadhkirat al-Awliyāʾ* and the Naqshbandī silsila.
    description_ar: |
      توفي أبو يزيد طيفور بن عيسى بن سروشان البسطامي، المعروف
      في شرق العالم الإسلامي بـ«بايزيد» — خراساني سني، من شيوخ
      الصوفية ببسطام (في قُومس بشمال إيران)، وإليه تَردُّ كتب
      الطبقات الكلاسيكية أصلَ مذهب «السُّكْر» في التعبير الصوفي
      الذي كَبَحه الجنيد ضمن مدرسة «الصحو» البغدادية — ببسطام.
      واختلفت المصادر بين تأريخين: سنة ٢٣٤ هـ (السنة الأقدم
      المحفوظة في «طبقات الصوفية» للسلمي)، وسنة ٢٦١ هـ (السنة
      التي اختارها الذهبي في «سير أعلام النبلاء» و«تاريخ الإسلام»
      وتابعه عليها جمهور كتب التراجم اللاحقة بمن فيهم ابن خلكان
      في «وفيات الأعيان»). ونحن نتابع سنة ٢٦١ هـ بوصفها قول
      الجمهور. وكان فقهه على المذهب الحنفي على شيخه أبي علي
      السندي (كما أثبت ذلك السهلجي، أقدم من ترجم له)؛ والشطحات
      المنسوبة إليه — من أكثر النصوص نقلاً في تراث التصوف الباكر
      وأشدّها إشكالاً — دافع عنها داخل التلقي السني أمثالُ الجنيد،
      وأوّلها بأنها أقوال غُلب صاحبها بحاله، وظلت من أصول التراث
      الصوفي الإيراني الشرقي عند الهجويري وفي «تذكرة الأولياء»
      للعطار وفي السلسلة النقشبندية.
    description_fr: |
      Abū Yazīd Ṭayfūr ibn ʿĪsā ibn Surūshān al-Bisṭāmī, connu à
      travers l'orient musulman sous le nom de Bāyazīd — maître
      soufi sunnite khurāsānien de Bisṭām (région de Qūmis, nord
      de l'Iran actuel), et figure à laquelle la tradition
      classique des *ṭabaqāt* fait remonter l'idiome du *sukr*
      (« ivresse mystique ») que la suite, par al-Junayd,
      tempérerait dans l'école bagdadienne du *ṣaḥw*
      (« sobriété ») — mourut à Bisṭām. Les sources hésitent
      entre deux dates principales : 234 H (date ancienne
      préservée dans les *Ṭabaqāt al-Ṣūfiyya* d'al-Sulamī) et
      261 H (date retenue par al-Dhahabī dans les *Siyar Aʿlām
      al-Nubalāʾ* et le *Tārīkh al-Islām*, et suivie par la
      majorité du canon ultérieur, dont les *Wafayāt al-Aʿyān*
      d'Ibn Khallikān). Nous retenons la position majoritaire
      de 261 H. Sa formation juridico-spirituelle s'enracinait
      dans le *fiqh* ḥanafīte auprès de son maître Abū ʿAlī
      al-Sindī (attribution notée par al-Sahlagī, son plus ancien
      biographe) ; les *shaṭaḥāt* qui lui sont attribués —
      parmi les passages les plus cités et les plus contestés de
      la littérature soufie ancienne — furent défendus dans la
      réception sunnite par des figures telles qu'al-Junayd,
      qui les lisait comme paroles dominées par l'état
      mystique de leur auteur, et demeurèrent une pierre de
      touche de la tradition soufie iranienne orientale chez
      al-Hujwīrī, dans la *Tadhkirat al-Awliyāʾ* de ʿAṭṭār et
      dans la *silsila* naqshbandīe.
    canonical_hijri: {year: 261, precision: year}
    canonical_gregorian: {date: 875-01-01, precision: year, method: tabular_conversion}
