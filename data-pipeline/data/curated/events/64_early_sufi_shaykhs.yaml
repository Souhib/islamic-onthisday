  - slug: death-of-abu-said-al-kharraz
    category: scholar_death
    title_en: Death of Abū Saʿīd al-Kharrāz — Baghdadi Sufi master, author of *Kitāb al-Ṣidq*
    title_ar: وفاة أبي سعيد الخرّاز — من شيوخ صوفية بغداد ومصنف «كتاب الصدق»
    title_fr: Mort d'Abū Saʿīd al-Kharrāz — maître soufi de Bagdad, auteur du *Kitāb al-Ṣidq*
    description_en: |
      Abū Saʿīd Aḥmad ibn ʿĪsā al-Kharrāz al-Baghdādī — Baghdadi
      Sunni Sufi master of the Junaydī generation, contemporary
      and senior of al-Junayd, author of *Kitāb al-Ṣidq* (The
      Book of Truthfulness — the earliest surviving Sufi treatise
      on *ṣidq* as a structuring principle of the spiritual
      life), *Kitāb al-Farāgh*, and *Kitāb al-Ḍiyāʾ* — died at
      Baghdad. The classical sources differ between 277 AH and
      286 AH; we follow the majority 286 AH date adopted by
      al-Dhahabī in *Siyar Aʿlām al-Nubalāʾ* and reflected by
      Ibn Khallikān in *Wafayāt al-Aʿyān* and Ibn Kathīr in
      *al-Bidāya wa al-Nihāya*. He was a leather-shoemaker
      (*kharrāz*) by trade — the model of the Sunni ascetic
      living from licit manual labour — and his sayings on
      *fanāʾ* and *baqāʾ*, on the unity of the seeker's intent,
      and on the disciplines of poverty, preserved by al-Sulamī
      and al-Qushayrī, became one of the principal sources for
      al-Ghazālī's *Iḥyāʾ ʿUlūm al-Dīn* and for the later
      Junaydī Sunni Sufi mainstream.
    description_ar: |
      توفي أبو سعيد أحمد بن عيسى الخرّاز البغدادي — بغدادي سني،
      من شيوخ صوفية بغداد في طبقة الجنيد، معاصر للجنيد وأقدم
      منه قليلاً، مصنف «كتاب الصدق» (وهو أقدم ما وصل إلينا من
      كتب الصوفية في الصدق بوصفه أصلاً منظماً للسلوك)، و«كتاب
      الفراغ»، و«كتاب الضياء» — ببغداد. واختلفت كتب التراجم بين
      سنة ٢٧٧ هـ وسنة ٢٨٦ هـ؛ ونحن نتابع سنة ٢٨٦ هـ التي اختارها
      الذهبي في «سير أعلام النبلاء» وأثبتها ابن خلكان في «وفيات
      الأعيان» وابن كثير في «البداية والنهاية». وكان خرّازاً
      (صانعَ نِعالٍ من الأديم)، نموذجاً للزاهد السني الذي يعيش
      من كسب يده الحلال؛ ومحفوظات أقواله في الفناء والبقاء، وفي
      توحيد قصد السالك، وفي رياضات الفقر، التي رواها السلمي
      والقشيري، صارت من أهم مصادر الإمام الغزالي في «إحياء علوم
      الدين» ومن أصول التصوف السني الجنيدي بعدُ.
    description_fr: |
      Abū Saʿīd Aḥmad ibn ʿĪsā al-Kharrāz al-Baghdādī — maître
      soufi sunnite bagdadien de la génération junaydīenne,
      contemporain et aîné légèrement d'al-Junayd, auteur du
      *Kitāb al-Ṣidq* (Le Livre de la Véracité — premier traité
      soufi conservé sur le *ṣidq* comme principe structurant de
      la vie spirituelle), du *Kitāb al-Farāgh* et du *Kitāb
      al-Ḍiyāʾ* — mourut à Bagdad. Les sources classiques
      hésitent entre 277 H et 286 H ; nous retenons la date
      majoritaire de 286 H adoptée par al-Dhahabī dans les
      *Siyar Aʿlām al-Nubalāʾ* et reflétée par Ibn Khallikān
      dans les *Wafayāt al-Aʿyān* et Ibn Kathīr dans *al-Bidāya
      wa al-Nihāya*. Il était cordonnier (*kharrāz*, façonneur
      de cuir) de profession — modèle de l'ascète sunnite vivant
      d'un travail manuel licite ; ses paroles sur le *fanāʾ* et
      le *baqāʾ*, sur l'unité de l'intention du quêteur et sur
      les disciplines de la pauvreté, préservées par al-Sulamī
      et al-Qushayrī, devinrent l'une des principales sources de
      l'*Iḥyāʾ ʿUlūm al-Dīn* d'al-Ghazālī et un fondement du
      courant central soufi sunnite junaydīen ultérieur.
