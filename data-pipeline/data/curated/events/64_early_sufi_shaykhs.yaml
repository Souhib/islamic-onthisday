  - slug: death-of-dhu-al-nun-al-misri
    category: scholar_death
    title_en: Death of Dhū al-Nūn al-Miṣrī — Egyptian Sufi master and Mālikī muḥaddith
    title_ar: وفاة ذو النون المصري — شيخ الصوفية بمصر والمحدّث المالكي
    title_fr: Mort de Dhū al-Nūn al-Miṣrī — maître soufi égyptien, *muḥaddith* mālikīte
    description_en: |
      Abū al-Fayḍ Thawbān ibn Ibrāhīm al-Miṣrī, known as
      *Dhū al-Nūn* — Egyptian Sunni Mālikī ascetic, hadith
      transmitter, and the figure to whom the classical Sufi
      tabaqāt tradition attributes the foundational systematisation
      of *aḥwāl* (states) and *maqāmāt* (stations) of the
      mystical path — died in Cairo (Old Cairo / Fusṭāṭ) in
      245 AH, the year recorded by al-Dhahabī in *Siyar Aʿlām
      al-Nubalāʾ*, by Ibn Khallikān in *Wafayāt al-Aʿyān*, and
      by Ibn Kathīr in *al-Bidāya wa al-Nihāya*. He had studied
      with Mālik's pupil Ibn Wahb in Egypt and was tested under
      the *miḥna* of the createdness of the Qurʾan, which he
      withstood. al-Sulamī's *Ṭabaqāt al-Ṣūfiyya* opens with
      him as the first systematic Sufi teacher; al-Qushayrī's
      *al-Risāla* preserves dozens of his sayings on *maʿrifa*,
      tawḥīd of the gnostic, and the disciplines of the heart.
      His grave in the Qarāfa cemetery at Cairo remained one of
      the principal Sufi pilgrimage sites of medieval Egypt.
    description_ar: |
      توفي أبو الفيض ثوبان بن إبراهيم المصري المعروف بـ«ذي النون
      المصري» — مصري سني مالكي زاهد، من رجال الحديث، وإليه تنسب
      كتب طبقات الصوفية الكلاسيكية تأصيلَ علم الأحوال والمقامات
      في الطريق الصوفي — بالقاهرة (الفسطاط) سنة ٢٤٥ هـ، وهي السنة
      التي أثبتها الذهبي في «سير أعلام النبلاء»، وابن خلكان في
      «وفيات الأعيان»، وابن كثير في «البداية والنهاية». وكان قد
      درس بمصر على ابن وهب صاحب الإمام مالك، وامتُحن في فتنة
      خلق القرآن فثبت. وافتتح به السلمي «طبقات الصوفية» بوصفه
      أولَ مَن نظم تعليم التصوف، وحفظ القشيري في «الرسالة» عشرات
      أقواله في المعرفة وتوحيد العارفين ورياضات القلوب. وكان قبره
      بمقابر «القرافة» بمصر من أكبر المزارات الصوفية في مصر
      الوسطى.
    description_fr: |
      Abū al-Fayḍ Thawbān ibn Ibrāhīm al-Miṣrī, dit *Dhū al-Nūn*
      — ascète sunnite mālikīte égyptien, transmetteur de
      hadiths, et figure à laquelle la tradition classique des
      *ṭabaqāt* soufis attribue la systématisation fondatrice
      des *aḥwāl* (états) et *maqāmāt* (stations) de la voie
      mystique — mourut au Caire (Vieux-Caire / Fusṭāṭ) en
      245 H, date consignée par al-Dhahabī dans les *Siyar Aʿlām
      al-Nubalāʾ*, Ibn Khallikān dans les *Wafayāt al-Aʿyān* et
      Ibn Kathīr dans *al-Bidāya wa al-Nihāya*. Il avait étudié
      en Égypte auprès d'Ibn Wahb, disciple de Mālik, et fut
      éprouvé par la *miḥna* de la créaturalité du Coran, à
      laquelle il résista. Les *Ṭabaqāt al-Ṣūfiyya* d'al-Sulamī
      s'ouvrent par lui comme premier maître soufi systématique ;
      la *Risāla* d'al-Qushayrī préserve des dizaines de ses
      paroles sur la *maʿrifa*, le *tawḥīd* du *ʿārif* et les
      disciplines du cœur. Sa tombe au cimetière de la Qarāfa du
      Caire demeura l'un des principaux lieux de pèlerinage
      soufi de l'Égypte médiévale.
    canonical_hijri: {year: 245, precision: year}
    canonical_gregorian: {date: 859-01-01, precision: year, method: tabular_conversion}
