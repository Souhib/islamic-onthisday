# Wave 29 of curated event additions (2026-04-27).
# Early classical Sunni zuhd / taṣawwuf shaykhs of the 1st-4th centuries
# AH — the foundational ascetics and Sufi masters embedded in mainstream
# Sunni hadith and fiqh circles whose lives and sayings shaped the genre
# of Sufi adab from al-Sulamī's *Ṭabaqāt al-Ṣūfiyya* and Abū Nuʿaym's
# *Ḥilyat al-Awliyāʾ* through al-Qushayrī's *al-Risāla* and al-Hujwīrī's
# *Kashf al-Maḥjūb*.
#
# Already covered elsewhere and intentionally not duplicated here:
# Ḥasan al-Baṣrī (file 03 + 34), Rābiʿa al-ʿAdawiyya (file 34),
# Maʿrūf al-Karkhī (file 34), Ḥabīb al-ʿAjamī (file 34),
# al-Sirrī al-Saqaṭī (file 17), al-Junayd al-Baghdādī (file 17),
# Sahl al-Tustarī (file 34), Abū Madyan al-Ghawth (file 21).
#
# All figures here are firmly within the mainstream Sunni hadith /
# fiqh / zuhd tradition: Mālik ibn Dīnār was a pupil of al-Ḥasan
# al-Baṣrī and a recognised muḥaddith; Ibrāhīm ibn Adham was a
# transmitter of hadith cited by Sufyān al-Thawrī and Imām Aḥmad;
# al-Fuḍayl ibn ʿIyāḍ taught Hārūn al-Rashīd and was praised by
# al-Shāfiʿī; Dāwūd al-Ṭāʾī was a senior pupil of Abū Ḥanīfa;
# Bishr al-Ḥāfī was an associate of Imām Aḥmad ibn Ḥanbal;
# al-Muḥāsibī was a Sunni-mutakallim contemporary of Aḥmad ibn
# Ḥanbal; Dhū al-Nūn al-Miṣrī was a Mālikī muḥaddith of Egypt;
# Bāyazīd al-Bisṭāmī's path was anchored by Ḥanafī fiqh under his
# teacher Abū ʿAlī al-Sindī; Abū Saʿīd al-Khaffāf was a senior
# pupil of al-Junayd. None of the figures included here are
# excluded from mainstream Sunni reception.
#
# Death dates of these early ascetics are usually only year-precise;
# a few (Bāyazīd al-Bisṭāmī, Dāwūd al-Ṭāʾī, Mālik ibn Dīnār,
# ʿAbd al-Wāḥid ibn Zayd) are contested across two or more years
# in the classical biographical sources. Disputes are flagged with
# `disputed: true` + `dispute_about: date` and explained in the
# description body. Trilingual en/ar/fr throughout. No hadith refs
# are included — these are biographical death entries, not hadith
# narratives.
#
# Coverage in the classical Sunni biographical canon: al-Dhahabī
# (*Siyar Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām*), Ibn Khallikān
# (*Wafayāt al-Aʿyān*), Ibn Kathīr (*al-Bidāya wa al-Nihāya*),
# Ibn ʿImād (*Shadharāt al-Dhahab*) cover most figures; we cite
# whichever of these treat each shaykh, and supplement with EI2
# / editorial where needed.

events:
  # =========================================================================
  # 2nd CENTURY AH — first generation of zuhd: Mālik ibn Dīnār,
  # Ibrāhīm ibn Adham, Dāwūd al-Ṭāʾī, ʿAbd al-Wāḥid ibn Zayd,
  # al-Fuḍayl ibn ʿIyāḍ
  # =========================================================================

  - slug: death-of-malik-ibn-dinar
    category: scholar_death
    title_en: Death of Mālik ibn Dīnār — Basran zāhid and pupil of al-Ḥasan al-Baṣrī
    title_ar: وفاة مالك بن دينار — زاهد البصرة وتلميذ الحسن البصري
    title_fr: Mort de Mālik ibn Dīnār — ascète basrien, disciple d'al-Ḥasan al-Baṣrī
    description_en: |
      Abū Yaḥyā Mālik ibn Dīnār al-Baṣrī — Basran zāhid and a
      direct pupil of al-Ḥasan al-Baṣrī, recognised as a reliable
      transmitter of hadith and treated by the classical Sunni
      tradition as one of the founding figures of the Basran
      school of zuhd that produced Rābiʿa al-ʿAdawiyya, ʿAbd
      al-Wāḥid ibn Zayd and (via al-Ḥasan) Ḥabīb al-ʿAjamī — died
      in Basra. Sources differ on the exact year: most place his
      death in 131 AH (the year reported by al-Dhahabī in *Siyar
      Aʿlām al-Nubalāʾ* and adopted by Ibn Kathīr in *al-Bidāya
      wa al-Nihāya*), with some reports giving 127 AH or 130 AH;
      we follow the majority 131 AH date. He earned his living as
      a copyist of Qurʾan codices, refused all gifts and stipends,
      and his sayings on the dangers of the dunyā and the
      sweetness of obedience preserved by Abū Nuʿaym in *Ḥilyat
      al-Awliyāʾ* became a staple of subsequent Sufi adab.
    description_ar: |
      توفي أبو يحيى مالك بن دينار البصري — زاهد البصرة وتلميذ
      الحسن البصري المباشر، وهو من رجال الحديث الثقات عند أهل
      السنة، ومن المؤسسين لمدرسة الزهد البصرية التي أنجبت رابعة
      العدوية وعبد الواحد بن زيد و(عن طريق الحسن) حبيب العجمي —
      بالبصرة. واختلفت المصادر في سنة وفاته: فأكثرها على أنه توفي
      سنة ١٣١ هـ (هي السنة التي أثبتها الذهبي في «سير أعلام النبلاء»
      وتابعه عليها ابن كثير في «البداية والنهاية»)، وذكر بعضهم
      ١٢٧ هـ أو ١٣٠ هـ، ونحن نتابع السنة الأكثر عند المصادر وهي
      ١٣١ هـ. وكان يكتسب من نسخ المصاحف فلا يقبل عطاءً ولا جائزة،
      ومحفوظات أقواله في خطر الدنيا وحلاوة الطاعة التي نقلها أبو
      نعيم في «حلية الأولياء» صارت أصلاً في أدب التصوف بعدُ.
    description_fr: |
      Abū Yaḥyā Mālik ibn Dīnār al-Baṣrī — *zāhid* basrien et
      disciple direct d'al-Ḥasan al-Baṣrī, reconnu comme
      transmetteur fiable de hadiths et tenu par la tradition
      sunnite classique pour l'une des figures fondatrices de
      l'école basrienne du *zuhd* qui produisit Rābiʿa
      al-ʿAdawiyya, ʿAbd al-Wāḥid ibn Zayd et (par l'intermédiaire
      d'al-Ḥasan) Ḥabīb al-ʿAjamī — mourut à Basra. Les sources
      divergent sur l'année exacte : la majorité situe sa mort en
      131 H (date donnée par al-Dhahabī dans les *Siyar Aʿlām
      al-Nubalāʾ* et reprise par Ibn Kathīr dans *al-Bidāya wa
      al-Nihāya*), certaines indiquant 127 ou 130 H ; nous
      retenons la date majoritaire de 131 H. Il vivait en
      copiant des exemplaires du Coran, refusait tout don et
      toute pension, et ses paroles sur les dangers de la *dunyā*
      et la douceur de l'obéissance, préservées par Abū Nuʿaym
      dans la *Ḥilyat al-Awliyāʾ*, devinrent un pilier de
      l'*adab* soufi ultérieur.
