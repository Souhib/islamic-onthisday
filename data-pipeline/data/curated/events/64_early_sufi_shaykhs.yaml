  - slug: death-of-al-muhasibi
    category: scholar_death
    title_en: Death of al-Ḥārith al-Muḥāsibī — Sufi-mutakallim and author of *al-Riʿāya*
    title_ar: وفاة الحارث المحاسبي — الصوفي المتكلم وصاحب «الرعاية لحقوق الله»
    title_fr: Mort d'al-Ḥārith al-Muḥāsibī — soufi-*mutakallim*, auteur d'*al-Riʿāya*
    description_en: |
      Abū ʿAbdullah al-Ḥārith ibn Asad al-Muḥāsibī al-Baṣrī — Iraqi
      Sunni scholar of kalām, hadith, and ascetic discipline,
      author of *al-Riʿāya li-Ḥuqūq Allāh* (Observance of the
      Rights of God) and *Kitāb al-Tawahhum*, and the most
      important systematic theorist of the inner life among the
      pre-Junaydī Sufis — died in Baghdad in 243 AH, the date
      reported by al-Dhahabī in *Siyar Aʿlām al-Nubalāʾ* and
      *Tārīkh al-Islām*, by Ibn Khallikān in *Wafayāt al-Aʿyān*,
      and by Ibn Kathīr in *al-Bidāya wa al-Nihāya*. The nisba
      *al-Muḥāsibī* commemorates his constant practice of
      *muḥāsabat al-nafs* (rigorous self-audit), the disciplined
      examination of motive and deed that *al-Riʿāya* reduces to
      a system. Imām Aḥmad ibn Ḥanbal disapproved of his
      involvement in kalām and refused to associate publicly with
      him — a Sunni-internal disagreement preserved honestly by
      al-Dhahabī — but recognised the value of his ascetic
      teachings, and al-Junayd al-Baghdādī inherited and refined
      his programme of *muḥāsaba* into the Junaydī Sunni Sufi
      mainstream. al-Ghazālī's *Iḥyāʾ ʿUlūm al-Dīn* draws
      extensively from *al-Riʿāya* across its quarters.
    description_ar: |
      توفي أبو عبد الله الحارث بن أسد المحاسبي البصري — عالم
      عراقي سني في الكلام والحديث والتدريب الزهدي، مصنف «الرعاية
      لحقوق الله» و«كتاب التوهم»، وأهم مَن تنسّب من قبل الجنيد إلى
      علم الباطن تأصيلاً وتنظيراً — ببغداد سنة ٢٤٣ هـ، وهي السنة
      التي أثبتها الذهبي في «سير أعلام النبلاء» و«تاريخ الإسلام»،
      وابن خلكان في «وفيات الأعيان»، وابن كثير في «البداية
      والنهاية». ونسبته «المحاسبي» من ملازمته لمحاسبة النفس،
      وذلك الفحص الدقيق للنية والعمل الذي يَردّه «الرعاية» إلى
      علم منظم. وكان الإمام أحمد بن حنبل ينكر عليه تعاطي علم
      الكلام ولم يَستَجِز مشاركته الإملاء في حلقته — وهو خلافٌ
      داخل أهل السنة نقله الذهبي بأمانة — مع إقراره بقيمة
      تعاليمه الزهدية. وورِث الجنيد البغدادي نظامه في المحاسبة
      ودخل به سَوادَ التصوف السني الجنيدي، ونقل الإمام الغزالي
      عن «الرعاية» في «إحياء علوم الدين» نقلاً واسعاً في أرباعه
      كلها.
    description_fr: |
      Abū ʿAbdullah al-Ḥārith ibn Asad al-Muḥāsibī al-Baṣrī —
      savant sunnite irakien de *kalām*, de hadith et de
      discipline ascétique, auteur d'*al-Riʿāya li-Ḥuqūq Allāh*
      (L'Observance des droits de Dieu) et du *Kitāb al-Tawahhum*,
      et le plus important théoricien systématique de la vie
      intérieure parmi les soufis pré-junaydīens — mourut à
      Bagdad en 243 H, date donnée par al-Dhahabī dans les
      *Siyar Aʿlām al-Nubalāʾ* et le *Tārīkh al-Islām*, par Ibn
      Khallikān dans les *Wafayāt al-Aʿyān* et par Ibn Kathīr
      dans *al-Bidāya wa al-Nihāya*. La *nisba* *al-Muḥāsibī*
      commémore sa pratique constante de la *muḥāsabat al-nafs*
      (l'auto-examen rigoureux), discipline d'examen des motifs
      et des actes qu'*al-Riʿāya* réduit en système. L'Imām
      Aḥmad ibn Ḥanbal désapprouvait son implication dans le
      *kalām* et refusait de paraître publiquement avec lui —
      désaccord interne sunnite préservé honnêtement par
      al-Dhahabī — tout en reconnaissant la valeur de son
      enseignement ascétique. Al-Junayd al-Baghdādī hérita et
      raffina son programme de *muḥāsaba* dans le courant
      central du soufisme sunnite junaydīen. L'*Iḥyāʾ ʿUlūm
      al-Dīn* d'al-Ghazālī puise abondamment dans *al-Riʿāya*
      dans ses quatre parties.
