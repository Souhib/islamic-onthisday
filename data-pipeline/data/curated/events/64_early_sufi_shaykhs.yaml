  - slug: death-of-bishr-al-hafi
    category: scholar_death
    title_en: Death of Bishr al-Ḥāfī — "the Barefoot," Baghdadi ascetic
    title_ar: وفاة بِشر الحافي — زاهد بغداد
    title_fr: Mort de Bishr al-Ḥāfī — « le Va-nu-pieds », ascète de Bagdad
    description_en: |
      Abū Naṣr Bishr ibn al-Ḥārith al-Marwazī al-Baghdādī, known
      as *Bishr al-Ḥāfī* ("the Barefoot") — Khurāsānī-born
      Baghdadi ascetic, recognised hadith transmitter, and a
      personal associate of Imām Aḥmad ibn Ḥanbal — died in
      Baghdad in 227 AH, the year on which al-Dhahabī (*Siyar
      Aʿlām al-Nubalāʾ*), Ibn Khallikān (*Wafayāt al-Aʿyān*), Ibn
      Kathīr (*al-Bidāya*) and Ibn ʿImād (*Shadharāt al-Dhahab*)
      all converge. He had received hadith from Ḥammād ibn Zayd,
      Mālik ibn Anas, and Ibn al-Mubārak, but in middle age he
      gave up dictation entirely out of fear of riyāʾ. The
      sobriquet *al-Ḥāfī* commemorates his refusal — after the
      moment of his repentance — to wear shoes on the earth which
      had been unjustly taxed by the ruling power. Imām Aḥmad
      defended him publicly and is reported to have said that he
      had "not seen his like in scrupulousness". His sayings on
      sincerity, the hidden faults of the self, and the danger of
      the *suḥba* of rulers became a staple of subsequent Sunni
      ascetic literature; al-Sulamī's *Ṭabaqāt al-Ṣūfiyya* and
      al-Qushayrī's *al-Risāla* preserve dozens.
    description_ar: |
      توفي أبو نصر بِشر بن الحارث المروزي البغدادي المعروف
      بـ«بِشر الحافي» — خراساني المولد، سكن بغداد، وهو من رجال
      الحديث المعتبرين عند أهل السنة، ومن أصحاب الإمام أحمد بن
      حنبل المخالطين له — ببغداد سنة ٢٢٧ هـ، وعلى هذه السنة
      اتفاق الذهبي في «سير أعلام النبلاء» وابن خلكان في «وفيات
      الأعيان» وابن كثير في «البداية والنهاية» وابن العماد في
      «شذرات الذهب». وكان قد روى الحديث عن حماد بن زيد ومالك بن
      أنس وابن المبارك، ثم ترك الإملاء في وسط عمره خوف الرياء.
      ولقبه «الحافي» لِما عُرف عنه — منذ ساعة توبته — من امتناعه
      عن الانتعال على أرضٍ ظلَمَها أرباب السلطان في خَراجها.
      ودافع عنه الإمام أحمد ملياً، وقال — كما يُنقَل —: «لم أر
      في الورع مثله». ومحفوظات أقواله في الإخلاص وآفات النفس
      الخفية وخطر صحبة السلطان من أصول كتب الزهد السنية بعدُ، وقد
      روى السلمي في «طبقات الصوفية» والقشيري في «الرسالة» منها
      الكثير.
    description_fr: |
      Abū Naṣr Bishr ibn al-Ḥārith al-Marwazī al-Baghdādī, dit
      *Bishr al-Ḥāfī* (« le Va-nu-pieds ») — Khurāsānien né,
      ascète établi à Bagdad, transmetteur reconnu de hadiths et
      compagnon personnel de l'Imām Aḥmad ibn Ḥanbal — mourut à
      Bagdad en 227 H, date sur laquelle convergent al-Dhahabī
      (*Siyar Aʿlām al-Nubalāʾ*), Ibn Khallikān (*Wafayāt
      al-Aʿyān*), Ibn Kathīr (*al-Bidāya*) et Ibn ʿImād
      (*Shadharāt al-Dhahab*). Il avait reçu des hadiths de
      Ḥammād ibn Zayd, Mālik ibn Anas et Ibn al-Mubārak mais
      cessa toute dictée à la moitié de sa vie par crainte du
      *riyāʾ*. Le surnom *al-Ḥāfī* commémore son refus — depuis
      l'heure de sa repentance — de chausser des sandales sur
      une terre dont les autorités avaient injustement taxé les
      revenus. L'Imām Aḥmad le défendit publiquement et aurait
      dit n'avoir « pas vu son pareil dans le *waraʿ* ». Ses
      paroles sur la sincérité, les défauts cachés de l'âme et
      le danger de la fréquentation des gouvernants devinrent un
      pilier de la littérature ascétique sunnite ultérieure ;
      les *Ṭabaqāt al-Ṣūfiyya* d'al-Sulamī et la *Risāla*
      d'al-Qushayrī en préservent des dizaines.
