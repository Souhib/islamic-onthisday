  - slug: death-of-fudayl-ibn-iyad
    category: scholar_death
    title_en: Death of al-Fuḍayl ibn ʿIyāḍ — ascetic teacher of Hārūn al-Rashīd
    title_ar: وفاة الفضيل بن عياض — الزاهد الذي وعظ هارون الرشيد
    title_fr: Mort d'al-Fuḍayl ibn ʿIyāḍ — l'ascète qui enseigna Hārūn al-Rashīd
    description_en: |
      Abū ʿAlī al-Fuḍayl ibn ʿIyāḍ ibn Masʿūd al-Tamīmī al-Yarbūʿī —
      Khurāsānī of Tamīmī origin who settled in Mecca, recognised
      Sunni hadith transmitter (cited by Sufyān al-Thawrī, Sufyān
      ibn ʿUyayna, and Ibn al-Mubārak), and the most famous
      ascetic teacher of his generation — died at Mecca in 187 AH
      (the year reported by al-Dhahabī in *Siyar Aʿlām al-Nubalāʾ*,
      Ibn Khallikān in *Wafayāt al-Aʿyān*, and Ibn Kathīr in
      *al-Bidāya wa al-Nihāya*). Al-Shāfiʿī said of his hadith:
      "If a man's narration could be enough on its own, al-Fuḍayl's
      would suffice." His celebrated audience with the caliph
      Hārūn al-Rashīd in Mecca — preserved at length in al-Ghazālī's
      *Iḥyāʾ ʿUlūm al-Dīn* on the authority of the early
      compilers — in which he reduced the caliph to tears with a
      sermon on the dangers of power, became one of the
      foundational *adab al-mulūk* texts of the Sunni tradition,
      and one of the model pieces in subsequent Sufi advice-to-
      rulers literature.
    description_ar: |
      توفي أبو علي الفضيل بن عياض بن مسعود التميمي اليربوعي —
      خراساني الأصل من تميم، استوطن مكة المكرمة، وهو من رجال
      الحديث المعتبرين عند أهل السنة (روى عنه سفيان الثوري وسفيان
      بن عيينة وابن المبارك)، ومن أشهر زهاد جيله — بمكة المكرمة
      سنة ١٨٧ هـ، وهي السنة التي أثبتها الذهبي في «سير أعلام
      النبلاء» وابن خلكان في «وفيات الأعيان» وابن كثير في «البداية
      والنهاية». قال فيه الشافعي: «لو قام في الناس بحديث، لكفى
      حديث الفضيل». ومجلسُه المشهور مع الخليفة هارون الرشيد بمكة —
      الذي حفظه الإمام الغزالي بطوله في «إحياء علوم الدين» نقلاً
      عن أصحاب التراجم الأوائل — حين أبكاه بموعظته في خطر السلطان،
      صار من النصوص التأسيسية في «أدب الملوك» في التراث السني،
      ومن النماذج الأصلية في أدب نصائح الصوفية للحكام بعدُ.
    description_fr: |
      Abū ʿAlī al-Fuḍayl ibn ʿIyāḍ ibn Masʿūd al-Tamīmī
      al-Yarbūʿī — Khurāsānien d'origine tamīmīde établi à La
      Mecque, transmetteur sunnite reconnu de hadiths (cité par
      Sufyān al-Thawrī, Sufyān ibn ʿUyayna et Ibn al-Mubārak), et
      l'ascète enseignant le plus célèbre de sa génération —
      mourut à La Mecque en 187 H, date donnée par al-Dhahabī
      dans les *Siyar Aʿlām al-Nubalāʾ*, par Ibn Khallikān dans
      les *Wafayāt al-Aʿyān* et par Ibn Kathīr dans *al-Bidāya
      wa al-Nihāya*. Al-Shāfiʿī dit de sa transmission : « Si la
      narration d'un homme pouvait suffire à elle seule, celle
      d'al-Fuḍayl suffirait. » Sa célèbre audience avec le
      calife Hārūn al-Rashīd à La Mecque — préservée tout au
      long de l'*Iḥyāʾ ʿUlūm al-Dīn* d'al-Ghazālī d'après les
      premiers compilateurs — au cours de laquelle il fit pleurer
      le calife par un sermon sur les périls du pouvoir, devint
      l'un des textes fondateurs du genre *adab al-mulūk* dans
      la tradition sunnite et l'un des modèles de la
      littérature soufie ultérieure de conseil aux gouvernants.
