  # =====================================================================
  # THE TURNING POINT — BATTLE OF TALAS
  # =====================================================================

  - slug: battle-of-talas
    category: battle
    title_en: Battle of Talas — Abbasid Forces Defeat the Tang Chinese
    title_ar: معركة نهر طلاس — العباسيون يهزمون التانغ الصينيين
    title_fr: Bataille de Talas — les forces abbassides vainquent les Tang chinois
    description_en: |
      The battle on the Talas River (modern Taraz,
      Kazakhstan) in which the Abbasid army of Abu Muslim's
      successor Ziyād ibn Ṣāliḥ, reinforced by Karluk Turkish
      cavalry who defected during the engagement, defeated the
      Tang Chinese expeditionary force under the Korean
      general Gao Xianzhi. al-Tabari records the battle under
      the events of 134 AH (~751 CE) and describes it as the
      decisive encounter that fixed the eastern frontier of
      the Islamic world along the Pamir-Tian Shan line for
      the next four centuries. The Karluk defection was the
      turning point: the Turkish tribes, previously Tang
      vassals, switched to the Abbasid side and accelerated
      the Islamisation of Central Asia. Chinese prisoners
      taken at Talas reportedly introduced papermaking to
      the Muslim world — an anecdote preserved by al-Masʿūdī
      and others that has become a symbol of the east-west
      technological exchange catalysed by the battle.
    description_ar: |
      المعركة على نهر طلاس (طراز الحديثة بكازاخستان)
      التي هزم فيها الجيش العباسي لخليفة أبي مسلم
      زياد بن صالح، المعزز بفرسان قيرغيز أتراك
      انقلبوا أثناء المعركة، القوة التanغية الصينية
      بقيادة الجنرال الكوري غاو شيانج. يدون الطبري
      المعركة في حوادث سنة ١٣٤ هـ (~٧٥١ م) ويصفها
      بالمواجهة الفاصلة التي ثبتت الحدود الشرقية
      للعالم الإسلامي على خط بامير-تيان شان أربعة
      قرون مقبلة. وكان انشقاق القيرغيز هو نقطة
      التحول: فالقبائل التركية التي كانت تابعة للتanغ
      تحولت إلى جانب العباسيين وسّرّعت أسلمة آسيا
      الوسطى. ويُروى أن أسرى صينيين أُخذوا في طلاس
      أدخلوا صناعة الورق إلى العالم الإسلامي —
      قصة يحفظها المسعودي وغيره وصارت رمزاً
      للتبادل التكنولوجي الشرقي-الغربي الذي دفعته
      المعركة.
    description_fr: |
      La bataille sur la rivière Talas (actuelle Taraz au
      Kazakhstan) où l'armée abbasside du successeur d'Abū
      Muslim Ziyād ibn Ṣāliḥ, renforcée par la cavalerie
      turque Karluk qui défecta pendant l'engagement, vainquit
      la force expéditionnaire chinoise des Tang sous le
      général coréen Gao Xianzhi. al-Ṭabarī consigne la
      bataille sous les événements de 134 H (~751 EC) et la
      décrit comme la rencontre décisive qui fixa la frontière
      orientale du monde islamique le long de la ligne Pamir-
      Tian Shan pour les quatre siècles suivants. La défection
      des Karluk fut le tournant : les tribus turques,
      auparavant vassales des Tang, passèrent du côté
      abbasside et accélérèrent l'islamisation de l'Asie
      centrale. Des prisonniers chinois faits à Talas
      auraient introduit la fabrication du papier dans le
      monde musulman — une anecdote préservée par al-Masʿūdī
      et d'autres qui est devenue un symbole de l'échange
      technologique est-ouest catalysé par la bataille.
    canonical_hijri: {year: 134, precision: year}
    canonical_gregorian: {date: 751-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Tabari records the battle of Talas under 134 AH and the Karluk defection."
      - source_key: baladhuri_futuh
        notes: "al-Baladhuri confirms the 134 AH date and the Abbasid-Tang confrontation."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athir corroborates the 134 AH date and describes the battle as fixing the eastern frontier."
      - source_key: ei2
        notes: "EI2 article 'Talas' confirms the 134 AH date, the Karluk defection, and the papermaking anecdote."
    people: []
    tags: [abbasid, battle, tang, china, karluk, talas, central-asia, frontier]
    importance: major
    verified: true
    verification_status: cross_verified
