  - slug: death-of-muhammad-khalil-al-maradi
    category: scholar_death
    title_en: Death of Muḥammad Khalīl al-Marādī — Damascene Hanafi Chronicler of *Silk al-Durar*
    title_ar: وفاة الإمام محمد خليل المرادي — مؤرخ دمشق الحنفي صاحب «سلك الدرر»
    title_fr: Mort de Muḥammad Khalīl al-Marādī — chroniqueur hanafite damascène de *Silk al-Durar*
    description_en: |
      Muḥammad Khalīl ibn ʿAlī al-Marādī — Damascene Sunni
      Ḥanafī jurist, mufti of the Syrian capital, naqīb
      al-ashrāf of Damascus, and biographer of the
      twelfth-Hijri-century Sunni scholarly class — died
      at Damascus in the year 1206 AH (1791 CE) at age
      thirty-six. Born at Damascus in 1173 AH (1760 CE)
      to a family of Bukharan ascent long established as
      the senior Hanafī muftīs of Damascus, he succeeded
      his father in the muftī chair and was simultaneously
      appointed naqīb al-ashrāf, a charge his family had
      held repeatedly under the Ottomans. His major work
      is the four-volume biographical chronicle *Silk al-
      Durar fī Aʿyān al-Qarn al-Thānī ʿAshar*, completed in
      the last year of his life, which records over a
      thousand entries on the Sunni scholars, judges, and
      notables of the twelfth Hijri century from al-Andalus
      to India and serves as the principal Damascene-Sunni
      reference for the period. He also authored *ʿArf al-
      Bashām fī man Waliya Fatwā Dimashq al-Shām*, a
      muftī-by-muftī chronicle of the Hanafī fatwa office
      of Damascus.
    description_ar: |
      توفي الإمام محمد خليل بن علي المرادي — الفقيه السني
      الحنفي الدمشقي، مفتي العاصمة الشامية ونقيب أشرافها،
      والمترجم لأعيان أهل العلم السنيين في القرن الثاني
      عشر الهجري — بدمشق سنة ١٢٠٦ هـ (١٧٩١ ميلادي) عن
      ست وثلاثين سنة. ولد بدمشق سنة ١١٧٣ هـ (١٧٦٠ ميلادي)
      في أسرة بخارية الأصل عريقة في إفتاء الشام على
      المذهب الحنفي، وخلف أباه في مشيخة الإفتاء، وتولى
      في الوقت ذاته نقابة الأشراف وهي ولاية تواترت في
      أسرته في عهد الدولة العثمانية. وأكبر مؤلفاته
      «سلك الدرر في أعيان القرن الثاني عشر» في أربعة
      مجلدات، أتمه في آخر سنة من عمره، يضم أكثر من ألف
      ترجمة لعلماء أهل السنة وقضاتهم وأعيانهم في القرن
      الثاني عشر الهجري من الأندلس إلى الهند، ويعد
      المرجع السني الدمشقي الأول لذلك العصر. وله أيضاً
      «عرف البشام فيمن ولي فتوى دمشق الشام» في تراجم
      مفتي الديار الشامية على المذهب الحنفي.
    description_fr: |
      Muḥammad Khalīl ibn ʿAlī al-Marādī — juriste sunnite
      hanafite damascène, muftī de la capitale syrienne,
      naqīb al-ashrāf de Damas, et biographe de la classe
      savante sunnite du XIIe siècle hégirien — mourut à
      Damas en 1206 H (1791 EC) à l'âge de trente-six ans.
      Né à Damas en 1173 H (1760 EC) dans une famille
      d'ascendance boukhariote longtemps installée comme
      principaux muftīs hanafites de Damas, il succéda à
      son père au siège du muftī et fut simultanément
      nommé naqīb al-ashrāf, charge que sa famille avait
      tenue à plusieurs reprises sous les Ottomans. Son
      œuvre majeure est la chronique biographique en
      quatre volumes *Silk al-Durar fī Aʿyān al-Qarn al-
      Thānī ʿAshar*, achevée la dernière année de sa vie,
      qui rassemble plus de mille notices sur les savants,
      juges et notables sunnites du XIIe siècle hégirien
      d'al-Andalus à l'Inde, et constitue la référence
      sunnite damascène majeure pour cette période. Il
      rédigea également *ʿArf al-Bashām fī man Waliya
      Fatwā Dimashq al-Shām*, chronique muftī par muftī
      du bureau hanafite de la fatwa de Damas.
    canonical_hijri: {year: 1206, precision: year}
    canonical_gregorian: {date: 1791-11-09, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Article 'al-Murādī, Muḥammad Khalīl b. ʿAlī' in EI2 records death 1206 AH / 1791 CE in Damascus."
      - source_key: editorial
        notes: "Authorship of *Silk al-Durar* and the Damascene Hanafī muftī succession from his father attested in the closing folios of the work itself and in standard biographies."
    people: [[muhammad-khalil-al-maradi, died]]
