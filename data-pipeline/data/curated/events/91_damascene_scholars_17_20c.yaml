  # MANDATE-ERA AND EARLY-INDEPENDENCE DAMASCUS
  # =========================================================================

  - slug: death-of-said-al-bani
    category: scholar_death
    title_en: Death of Saʿīd al-Bānī — Damascene Hanafi Educator
    title_ar: وفاة الشيخ سعيد الباني — المربي الدمشقي الحنفي
    title_fr: Mort de Saʿīd al-Bānī — éducateur hanafite damascène
    description_en: |
      Saʿīd ibn ʿAbd al-Raḥmān al-Bānī — Damascene Sunni
      Ḥanafī scholar, educator, and member of the late-
      Ottoman and early-Mandate-period Damascene reformist
      circle around Jamāl al-Dīn al-Qāsimī and Ṭāhir al-
      Jazāʾirī — died at Damascus on 4 Shaʿbān 1351 AH
      (3 December 1932 CE). Born at Damascus around 1284
      AH (1867 CE), he taught at the Maktab ʿAnbar
      secondary school established under the late Ottoman
      educational reforms and at the Sulṭāniyya schools,
      and engaged in the Damascene Salafī-traditionalist
      reformist project that sought to broaden the Hanafī
      curriculum towards greater attention to the Qurʾan,
      ḥadīth, and Arabic sciences. His authored Arabic
      works include *ʿUmdat al-Taḥqīq fī al-Taqlīd wa-l-
      Talfīq*, a treatise on the legal-methodological
      questions of *taqlīd* and *talfīq* among the four
      Sunnī madhāhib, and educational essays
      contributing to the early Damascene reformist
      press alongside *al-Manār*-aligned Damascene
      figures.
    description_ar: |
      توفي الشيخ سعيد بن عبد الرحمن الباني — العالم
      السني الحنفي الدمشقي والمربي، ومن أعلام حلقة
      الإصلاح الدمشقية في أواخر العهد العثماني
      وأوائل عهد الانتداب الفرنسي حول العلامتين جمال
      الدين القاسمي وطاهر الجزائري — بدمشق يوم
      ٤ شعبان سنة ١٣٥١ هـ (الموافق ٣ ديسمبر ١٩٣٢
      ميلادي). ولد بدمشق نحو سنة ١٢٨٤ هـ (١٨٦٧
      ميلادي)، ودرّس بـ«مكتب عنبر» الثانوي الذي
      أُسس في إطار إصلاحات التعليم العثمانية
      المتأخرة، وبالمدارس السلطانية، وانخرط في
      المشروع الإصلاحي الدمشقي السلفي التقليدي
      الذي رام توسيع المنهج الحنفي إلى مزيد من
      الاهتمام بالقرآن والحديث وعلوم العربية.
      ومن مؤلفاته «عمدة التحقيق في التقليد والتلفيق»
      رسالة في مسائل التقليد والتلفيق بين المذاهب
      السنية الأربعة، ومقالات تربوية في الصحافة
      الإصلاحية الدمشقية الأولى مع الموالين
      لمدرسة «المنار» من الدمشقيين.
    description_fr: |
      Saʿīd ibn ʿAbd al-Raḥmān al-Bānī — savant sunnite
      hanafite damascène, éducateur et membre du cercle
      réformiste damascène de la fin de l'époque
      ottomane et du début du Mandat français autour de
      Jamāl al-Dīn al-Qāsimī et Ṭāhir al-Jazāʾirī —
      mourut à Damas le 4 Shaʿbān 1351 H
      (3 décembre 1932 EC). Né à Damas vers 1284 H
      (1867 EC), il enseigna au Maktab ʿAnbar
      d'enseignement secondaire fondé dans le cadre
      des réformes éducatives ottomanes tardives et
      aux écoles Sulṭāniyya, et participa au projet
      réformiste salafī-traditionaliste damascène qui
      cherchait à élargir le programme hanafite vers
      une plus grande attention au Coran, au hadith et
      aux sciences arabes. Ses œuvres arabes
      comprennent *ʿUmdat al-Taḥqīq fī al-Taqlīd wa-l-
      Talfīq*, un traité sur les questions juridico-
      méthodologiques du *taqlīd* et du *talfīq* entre
      les quatre madhhabs sunnites, et des essais
      éducatifs publiés dans la presse réformiste
      damascène naissante aux côtés des figures
      damascènes alignées sur *al-Manār*.
    canonical_hijri: {year: 1351, month: 8, day: 4, precision: day}
    canonical_gregorian: {date: 1932-12-03, precision: day, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Damascene biographical sources and the Maktab ʿAnbar staff records register death 4 Shaʿbān 1351 / 3 December 1932 in Damascus; teaching engagement and *ʿUmdat al-Taḥqīq* attested in standard Damascene reformist biographies."
    people: [[said-al-bani, died]]
    tags: [modern, scholar, syria, damascus, hanafi, late-ottoman, mandate, reformist, twentieth-century]
    importance: notable
    verified: true
    verification_status: single_source

  - slug: death-of-ali-al-daqr
    category: scholar_death
    title_en: Death of ʿAlī al-Daqr — Founder of Damascus' *Maʿhad al-Tawjīh al-Islāmī*
    title_ar: وفاة الشيخ علي الدقر — مؤسس «معهد التوجيه الإسلامي» بدمشق
    title_fr: Mort de ʿAlī al-Daqr — fondateur de l'*Institut de l'Orientation Islamique* à Damas
    description_en: |
      ʿAlī ibn Ḥasan al-Daqr — Damascene Sunni Ḥanafī
      scholar, longtime teacher in the great mosques of
      Damascus, and founding figure of the *Jamʿiyyat al-
      Tamaddun al-Islāmī* (1932) and the *Maʿhad al-Tawjīh
      al-Islāmī* (1933), the two institutions that
      formed an entire generation of mid-twentieth-century
      Damascene Sunni scholars including Ḥasan Ḥabannaka
      al-Maydānī, Mullā Ramaḍān al-Būṭī, and others —
      died at Damascus on 12 Rabīʿ al-Thānī 1370 AH
      (21 January 1951 CE) at age about seventy-three.
      Born at Damascus in 1297 AH (1879 CE), he was a
      pupil of Bakrī al-ʿAṭṭār al-Ṭarābulsī, Bahāʾ al-Dīn
      al-Bīṭār, and Saʿīd al-Bānī, and gathered around
      him in the Damascene mosques the *durūs* circles
      from which the post-Mandate Damascene revivalist
      ʿulamāʾ would emerge. His teaching corpus survives
      in the recordings and notebooks of his students
      preserved at the institutional successors of the
      *Maʿhad*; he was buried in the Bāb al-Ṣaghīr
      cemetery of Damascus.
    description_ar: |
      توفي الشيخ علي بن حسن الدقر — العالم السني الحنفي
      الدمشقي، مدرس جوامع الشام سنين طويلة، والمؤسس
      الفعلي لـ«جمعية التمدن الإسلامي» سنة ١٣٥١ هـ
      (١٩٣٢ ميلادي) و«معهد التوجيه الإسلامي» سنة
      ١٣٥٢ هـ (١٩٣٣ ميلادي)، وهما المؤسستان اللتان
      ربتا جيلاً كاملاً من علماء أهل السنة بدمشق في
      منتصف القرن العشرين الميلادي، منهم الشيخ حسن
      حبنكة الميداني والملا رمضان البوطي وآخرون —
      بدمشق يوم ١٢ ربيع الثاني سنة ١٣٧٠ هـ (الموافق
      ٢١ جانفي ١٩٥١ ميلادي) عن نحو ثلاث وسبعين سنة.
      ولد بدمشق سنة ١٢٩٧ هـ (١٨٧٩ ميلادي)، وأخذ عن
      الشيخ بكري العطار الطرابلسي والشيخ بهاء الدين
      البيطار والشيخ سعيد الباني، وجمع حوله في جوامع
      دمشق حلقات الدروس التي تخرّج بها العلماء
      السنيون رواد الإحياء الدمشقي بعد الانتداب.
      وقد حُفظ تراثه التدريسي في تسجيلات تلامذته
      ودفاترهم لدى مؤسسات «المعهد» الخلف، ودفن
      بمقبرة الباب الصغير بدمشق.
    description_fr: |
      ʿAlī ibn Ḥasan al-Daqr — savant sunnite hanafite
      damascène, longtemps enseignant dans les grandes
      mosquées de Damas, et figure fondatrice de la
      *Jamʿiyyat al-Tamaddun al-Islāmī* (1932) et de
      l'*Institut de l'Orientation Islamique* (*Maʿhad
      al-Tawjīh al-Islāmī*, 1933), les deux institutions
      qui formèrent toute une génération de savants
      sunnites damascènes du milieu du XXe siècle, parmi
      lesquels Ḥasan Ḥabannaka al-Maydānī, Mullā Ramaḍān
      al-Būṭī et d'autres — mourut à Damas le 12 Rabīʿ
      al-Thānī 1370 H (21 janvier 1951 EC) à l'âge
      d'environ soixante-treize ans. Né à Damas en
      1297 H (1879 EC), il fut l'élève de Bakrī al-
      ʿAṭṭār al-Ṭarābulsī, de Bahāʾ al-Dīn al-Bīṭār et
      de Saʿīd al-Bānī, et rassembla autour de lui dans
      les mosquées damascènes les cercles de *durūs*
      d'où émergerait la génération de ʿulamāʾ
      revivalistes damascènes de l'après-Mandat. Son
      corpus d'enseignement survit dans les
      enregistrements et les cahiers de ses élèves
      conservés auprès des institutions successeures du
      *Maʿhad*; il fut enterré au cimetière Bāb al-
      Ṣaghīr de Damas.
    canonical_hijri: {year: 1370, month: 4, day: 12, precision: day}
    canonical_gregorian: {date: 1951-01-21, precision: day, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Damascene biographical sources and the *Maʿhad al-Tawjīh al-Islāmī* institutional records register death 12 Rabīʿ al-Thānī 1370 / 21 January 1951 in Damascus; pupillage chain and founding role at the Maʿhad attested in successor-institution archives and standard biographies."
    people: [[ali-al-daqr, died]]
    tags: [modern, scholar, syria, damascus, hanafi, educator, twentieth-century]
    importance: notable
    verified: true
    verification_status: single_source

  - slug: death-of-izz-al-din-al-tanukhi
    category: scholar_death
    title_en: Death of ʿIzz al-Dīn al-Tanūkhī — Damascene Arabic-Language Scholar
    title_ar: وفاة العلامة عز الدين التنوخي — العلامة الدمشقي في علوم العربية
    title_fr: Mort de ʿIzz al-Dīn al-Tanūkhī — savant damascène des sciences arabes
    description_en: |
      Muḥammad ʿIzz al-Dīn ibn Ibrāhīm al-Tanūkhī —
      Damascene Sunni scholar of Arabic philology, lexicography,
      and manuscript editing, longtime member of the *Majmaʿ
      al-Lugha al-ʿArabiyya* of Damascus (the Arabic Academy of
      Damascus, founded 1919) and of its sister academies in
      Cairo and Baghdad — died at Damascus on 6 Rabīʿ al-Thānī
      1385 AH (4 August 1965 CE). Born at Damascus around 1305
      AH (1888 CE) into the Tanūkhī Sunnī family of Damascene
      ʿulamāʾ, he was educated at Maktab ʿAnbar and at the
      Damascus higher schools, and devoted his career to the
      critical edition of classical Arabic literary, lexical,
      and historical manuscripts. He edited and published
      numerous Andalusian, Maghrebī, and Eastern Sunni works,
      including portions of al-Tanūkhī's *Nishwār al-Muḥāḍara*
      (his ancestor's collection), Ibn al-Sikkīt's
      lexicographical writings, and parts of the historical
      corpus of late-Mamlūk and early-Ottoman Damascus
      preserved in the Ẓāhiriyya Library. He was buried in
      the Bāb al-Ṣaghīr cemetery of Damascus.
    description_ar: |
      توفي العلامة محمد عز الدين بن إبراهيم التنوخي —
      العالم السني الدمشقي في علوم العربية والمعاجم
      وتحقيق المخطوطات، وعضو «مجمع اللغة العربية» بدمشق
      (المؤسس سنة ١٣٣٧ هـ / ١٩١٩ ميلادي) سنين طويلة،
      وعضو نظيريه بالقاهرة وبغداد — بدمشق يوم ٦ ربيع
      الثاني سنة ١٣٨٥ هـ (الموافق ٤ أوت ١٩٦٥ ميلادي).
      ولد بدمشق نحو سنة ١٣٠٥ هـ (١٨٨٨ ميلادي) من أسرة
      التنوخي السنية الدمشقية العلمية، وتعلم في «مكتب
      عنبر» وفي المدارس العليا بدمشق، وأفنى حياته في
      تحقيق المخطوطات الأدبية والمعجمية والتاريخية
      العربية الكلاسيكية. وقد حقق ونشر مصنفات سنية
      أندلسية ومغربية ومشرقية كثيرة، منها أجزاء من
      «نشوار المحاضرة» للقاضي التنوخي (جدّه)، ومصنفات
      ابن السكيت اللغوية، وأجزاء من التراث التاريخي
      الدمشقي في أواخر العهد المملوكي وأوائل العهد
      العثماني المحفوظة بالمكتبة الظاهرية. ودفن بمقبرة
      الباب الصغير بدمشق.
    description_fr: |
      Muḥammad ʿIzz al-Dīn ibn Ibrāhīm al-Tanūkhī —
      savant sunnite damascène en philologie arabe,
      lexicographie et édition de manuscrits, longtemps
      membre du *Majmaʿ al-Lugha al-ʿArabiyya* de Damas
      (l'Académie arabe de Damas, fondée en 1919) et de
      ses académies sœurs du Caire et de Bagdad —
      mourut à Damas le 6 Rabīʿ al-Thānī 1385 H
      (4 août 1965 EC). Né à Damas vers 1305 H (1888
      EC) dans la famille Tanūkhī sunnite des ʿulamāʾ
      damascènes, il fut formé à Maktab ʿAnbar et aux
      écoles supérieures de Damas, et consacra sa
      carrière à l'édition critique de manuscrits
      littéraires, lexicaux et historiques arabes
      classiques. Il édita et publia de nombreux
      ouvrages sunnites andalous, maghrébins et
      orientaux, dont des parties du *Nishwār al-
      Muḥāḍara* d'al-Tanūkhī (son ancêtre), les écrits
      lexicographiques d'Ibn al-Sikkīt et des éléments
      du corpus historique de Damas de la fin de
      l'époque mamelouke et du début de l'époque
      ottomane conservés à la Bibliothèque Ẓāhiriyya.
      Il fut enterré au cimetière Bāb al-Ṣaghīr de
      Damas.
    canonical_hijri: {year: 1385, month: 4, day: 6, precision: day}
    canonical_gregorian: {date: 1965-08-04, precision: day, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Damascus Arabic Academy (*Majmaʿ al-Lugha al-ʿArabiyya bi-Dimashq*) institutional records register death 6 Rabīʿ al-Thānī 1385 / 4 August 1965 in Damascus; editorial corpus and academy memberships attested in *Majallat al-Majmaʿ* and standard biographies."
    people: [[izz-al-din-al-tanukhi, died]]
    tags: [modern, scholar, syria, damascus, philology, arabic-academy, twentieth-century]
    importance: notable
    verified: true
    verification_status: single_source

  # =========================================================================
  # MID-20C DAMASCENE TEACHING CIRCLES
  # =========================================================================

  - slug: death-of-abd-al-karim-al-rifai
    category: scholar_death
    title_en: Death of ʿAbd al-Karīm al-Rifāʿī — Founder of *Jamāʿat Zayd* in Damascus
    title_ar: وفاة الشيخ عبد الكريم الرفاعي — مؤسس «جماعة زيد» بدمشق
    title_fr: Mort de ʿAbd al-Karīm al-Rifāʿī — fondateur de la *Jamāʿat Zayd* à Damas
    description_en: |
      ʿAbd al-Karīm ibn Saʿīd al-Rifāʿī — Damascene Sunni
      scholar, classically trained in Hanafī and Shāfiʿī
      fiqh and in the Damascene Naqshbandī-Khālidī
      tradition, founder of the Jamāʿat Zayd circle around
      the Mosque of Zayd ibn Thābit ra in the al-Bābilā
      quarter of Damascus, and one of the most influential
      mid-twentieth-century Damascene teaching shaykhs
      after ʿAlī al-Daqr — died at Damascus on 25 Rajab
      1393 AH (24 August 1973 CE) at age about sixty-
      three. Born at Damascus in 1321 AH (1903 CE), he
      was a pupil of ʿAlī al-Daqr and Hāshim al-Khaṭīb,
      and built around the Zayd ibn Thābit ra mosque a
      systematic *durūs* programme covering the standard
      Hanafī-Shāfiʿī fiqh curriculum, ḥadīth, tafsīr, and
      Qurʾanic recitation. The circle continued under his
      sons Sāriya, Usāma, and Sabsabī al-Rifāʿī after
      his death and remains one of the principal Sunni
      teaching networks of late-twentieth-century
      Damascus. He authored a number of devotional and
      hortatory tracts and a *fiqh*-textbook for students
      of the Zayd circle.
    description_ar: |
      توفي الشيخ عبد الكريم بن سعيد الرفاعي — العالم
      السني الدمشقي، المتخرج من المدرسة الكلاسيكية
      الحنفية والشافعية في الفقه ومن تراث الشام
      النقشبندي الخالدي، مؤسس حلقة «جماعة زيد» حول
      جامع زيد بن ثابت رضي الله عنه بحي البابلا في
      دمشق، وأحد أكثر شيوخ التعليم بدمشق تأثيراً في
      منتصف القرن العشرين الميلادي بعد الشيخ علي
      الدقر — بدمشق يوم ٢٥ رجب سنة ١٣٩٣ هـ
      (الموافق ٢٤ أوت ١٩٧٣ ميلادي) عن نحو ثلاث
      وستين سنة. ولد بدمشق سنة ١٣٢١ هـ (١٩٠٣
      ميلادي)، وأخذ عن الشيخ علي الدقر والشيخ هاشم
      الخطيب، وأقام حول جامع زيد بن ثابت رضي الله عنه
      منهجاً منتظماً للدروس يشمل المنهج الحنفي
      والشافعي في الفقه والحديث والتفسير وقراءات
      القرآن الكريم. وقد واصلت الحلقة من بعده أبناؤه
      الشيخ سارية والشيخ أسامة والشيخ صبصبي الرفاعي،
      ولا تزال من أكبر شبكات التعليم السنية بدمشق
      في أواخر القرن العشرين الميلادي. وله رسائل
      وعظية تربوية ومقررات فقهية لطلاب «جماعة زيد».
    description_fr: |
      ʿAbd al-Karīm ibn Saʿīd al-Rifāʿī — savant sunnite
      damascène formé classiquement en fiqh hanafite et
      shāfiʿite et dans la tradition naqshbandi-khālidiyya
      damascène, fondateur du cercle Jamāʿat Zayd autour
      de la mosquée de Zayd ibn Thābit ra dans le
      quartier al-Bābilā de Damas, et l'un des shaykhs
      enseignants damascènes les plus influents du
      milieu du XXe siècle après ʿAlī al-Daqr — mourut
      à Damas le 25 Rajab 1393 H (24 août 1973 EC) à
      l'âge d'environ soixante-trois ans. Né à Damas en
      1321 H (1903 EC), il fut l'élève de ʿAlī al-Daqr
      et de Hāshim al-Khaṭīb, et bâtit autour de la
      mosquée de Zayd ibn Thābit ra un programme
      systématique de *durūs* couvrant le cursus
      hanafite-shāfiʿite classique en fiqh, hadith,
      tafsīr et récitation coranique. Le cercle se
      poursuivit sous la direction de ses fils Sāriya,
      Usāma et Sabsabī al-Rifāʿī après sa mort et
      demeure l'un des principaux réseaux
      d'enseignement sunnite de la fin du XXe siècle
      damascène. Il rédigea un certain nombre
      d'opuscules dévotionnels et exhortatifs et un
      manuel de *fiqh* pour les étudiants du cercle de
      Zayd.
    canonical_hijri: {year: 1393, month: 7, day: 25, precision: day}
    canonical_gregorian: {date: 1973-08-24, precision: day, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Damascene biographical sources and the Jamāʿat Zayd succession-records register death 25 Rajab 1393 / 24 August 1973 in Damascus; Zayd ibn Thābit ra mosque teaching circle and pupillage chain attested in the *durūs*-archives of his sons."
    people: [[abd-al-karim-al-rifai, died]]
