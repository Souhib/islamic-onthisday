  - slug: death-of-bakri-al-tarabulsi-al-attar
    category: scholar_death
    title_en: Death of Bakrī al-ʿAṭṭār al-Ṭarābulsī — Late-Ottoman Damascene Hanafi
    title_ar: وفاة الشيخ بكري العطار الطرابلسي — الفقيه الدمشقي الحنفي العثماني المتأخر
    title_fr: Mort de Bakrī al-ʿAṭṭār al-Ṭarābulsī — hanafite damascène de la fin de l'époque ottomane
    description_en: |
      Bakrī ibn Ḥāmid al-ʿAṭṭār al-Ṭarābulsī — Damascene
      Sunni Ḥanafī jurist of Tripolitan ascent, longtime
      teacher at the Sinānīyya mosque-school complex in
      Damascus and one of the senior Hanafī muftī
      assistants in the city in the closing decades of
      Ottoman rule — died at Damascus in 1322 AH (1905
      CE) at age about seventy. He was educated under the
      principal Hanafī shaykhs of late-nineteenth-century
      Damascus, including ʿAbd al-Razzāq al-Bīṭār, and
      transmitted the standard Hanafī curriculum
      (al-Ḥaṣkafī's *Durr al-Mukhtār*, Ibn ʿĀbidīn's
      *Radd al-Muḥtār*, *al-Hidāya*, and *Multaqā al-
      Abḥur*) to a generation of Damascene scholars
      whose careers extended into the Mandate period,
      including ʿAlī al-Daqr and Muḥammad al-Khaḍir
      al-Shanqīṭī's Damascene contemporaries. His
      authored output remained largely as marginalia
      and *taqrīrāt* preserved in his students' notes.
    description_ar: |
      توفي الشيخ بكري بن حامد العطار الطرابلسي — الفقيه
      السني الحنفي الدمشقي ذو الأصل الطرابلسي، المدرس
      بالمدرسة السنانية بدمشق سنين طويلة وأحد كبار
      مساعدي الإفتاء الحنفي في العاصمة الشامية في
      أواخر العهد العثماني — بدمشق سنة ١٣٢٢ هـ (١٩٠٥
      ميلادي) عن نحو سبعين سنة. تعلم على كبار شيوخ
      الحنفية بدمشق في أواخر القرن التاسع عشر الميلادي،
      منهم العلامة عبد الرزاق البيطار، ونقل المتون
      الحنفية الأساسية («الدر المختار» للحصكفي و«رد
      المحتار» لابن عابدين و«الهداية» و«ملتقى الأبحر»)
      إلى جيل من علماء دمشق امتدت أعمارهم إلى عهد
      الانتداب، منهم الشيخ علي الدقر ومعاصروه. وقد
      ظلت تقريراته وتحاشيه على الكتب الحنفية محفوظة
      في أوراق تلامذته أكثر منها مؤلفات مستقلة.
    description_fr: |
      Bakrī ibn Ḥāmid al-ʿAṭṭār al-Ṭarābulsī — juriste
      sunnite hanafite damascène d'ascendance tripolitaine,
      longtemps enseignant à la madrasa de la mosquée
      Sinānīyya à Damas et l'un des principaux assistants
      du muftī hanafite de la ville durant les dernières
      décennies de la domination ottomane — mourut à
      Damas en 1322 H (1905 EC) à l'âge d'environ
      soixante-dix ans. Il fut formé auprès des
      principaux shaykhs hanafites de la fin du XIXe
      siècle damascène, dont ʿAbd al-Razzāq al-Bīṭār, et
      transmit le programme hanafite classique
      (*al-Durr al-Mukhtār* d'al-Ḥaṣkafī, *Radd al-Muḥtār*
      d'Ibn ʿĀbidīn, *al-Hidāya* et *Multaqā al-Abḥur*) à
      une génération de savants damascènes dont la
      carrière s'étendit jusqu'à la période du Mandat,
      parmi lesquels ʿAlī al-Daqr et ses contemporains.
      Son œuvre écrite demeura essentiellement sous
      forme de notes marginales et de *taqrīrāt*
      conservées dans les cahiers de ses élèves.
    canonical_hijri: {year: 1322, precision: year}
    canonical_gregorian: {date: 1905, precision: year, method: tabular_conversion}
