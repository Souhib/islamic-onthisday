  # =========================================================================
  # NAQSHBANDI-HANAFI MASTER OF EARLY 20C DAMASCUS
  # =========================================================================

  - slug: death-of-muhammad-said-al-bukhari
    category: scholar_death
    title_en: Death of Muḥammad Saʿīd al-Bukhārī — Damascene Naqshbandī-Hanafi Master
    title_ar: وفاة الشيخ محمد سعيد البخاري — شيخ النقشبندية الحنفي بدمشق
    title_fr: Mort de Muḥammad Saʿīd al-Bukhārī — maître naqshbandi-hanafite damascène
    description_en: |
      Muḥammad Saʿīd al-Bukhārī — Damascene Sunni Ḥanafī
      jurist and Naqshbandī-Khālidī Sufi shaykh, head of
      the Bukhāriyya zāwiya in the Sūq Ṣārūja quarter of
      Damascus and one of the leading transmitters of the
      Khālidiyya line of the Naqshbandiyya from his
      father Murād al-Bukhārī's house into the early
      twentieth century — died at Damascus on 22 Rabīʿ
      al-Thānī 1354 AH (24 July 1935 CE). He was the
      grandson of Muḥammad ibn ʿAbdullāh al-Khānī al-
      Bukhārī, one of the senior Damascene khulafāʾ of
      Mawlānā Khālid al-Baghdādī (d. 1242 / 1827), and
      transmitted the Khālidiyya silsila to disciples
      including the early founders of the Damascene
      Maʿhad al-Tawjīh al-Islāmī generation. His authored
      legacy consists chiefly of Khālidiyya manuals of
      *suluk* and ijāzāt preserved in the Bukhāriyya
      archive, and he is buried at the family mausoleum
      adjacent to the zāwiya.
    description_ar: |
      توفي الشيخ محمد سعيد البخاري — الفقيه السني الحنفي
      الدمشقي وشيخ الطريقة النقشبندية الخالدية، شيخ
      الزاوية البخارية في حي سوق ساروجا بدمشق، وأحد
      كبار ناقلي السلسلة الخالدية من النقشبندية في بيت
      أبيه الشيخ مراد البخاري إلى أوائل القرن العشرين
      الميلادي — بدمشق يوم ٢٢ ربيع الثاني سنة ١٣٥٤ هـ
      (الموافق ٢٤ جويلية ١٩٣٥ ميلادي). وهو حفيد محمد بن
      عبد الله الخاني البخاري أحد كبار خلفاء مولانا
      خالد البغدادي (المتوفى سنة ١٢٤٢ هـ / ١٨٢٧
      ميلادي) بدمشق، ونقل السلسلة الخالدية إلى تلامذة
      منهم مؤسسو الجيل الأول لمعهد التوجيه الإسلامي
      بدمشق. وتراثه المؤلف ينحصر أساساً في رسائل
      السلوك الخالدية والإجازات المحفوظة بأرشيف
      البخارية، ودفن بمدفن الأسرة الملحق بالزاوية.
    description_fr: |
      Muḥammad Saʿīd al-Bukhārī — juriste sunnite hanafite
      damascène et shaykh soufi naqshbandi-khālidī,
      directeur de la zāwiya Bukhāriyya dans le quartier
      Sūq Ṣārūja de Damas et l'un des principaux
      transmetteurs de la lignée khālidiyya de la
      Naqshbandiyya issue de la maison de son père
      Murād al-Bukhārī jusqu'au début du XXe siècle —
      mourut à Damas le 22 Rabīʿ al-Thānī 1354 H
      (24 juillet 1935 EC). Il fut le petit-fils de
      Muḥammad ibn ʿAbdullāh al-Khānī al-Bukhārī, l'un
      des principaux khulafāʾ damascènes de Mawlānā
      Khālid al-Baghdādī (m. 1242 H / 1827 EC), et
      transmit la silsila khālidiyya à des disciples,
      notamment aux fondateurs de la première
      génération de l'Institut de l'Orientation
      Islamique de Damas. Son héritage écrit consiste
      principalement en manuels khālidiyyas de *sulūk*
      et en ijāzāt conservés dans les archives de la
      Bukhāriyya, et il est enterré au mausolée
      familial attenant à la zāwiya.
    canonical_hijri: {year: 1354, month: 4, day: 22, precision: day}
    canonical_gregorian: {date: 1935-07-24, precision: day, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Damascene Naqshbandī-Khālidī biographical sources and the Bukhāriyya zāwiya silsila records register death 22 Rabīʿ al-Thānī 1354 / 24 July 1935 in Damascus."
    people: [[muhammad-said-al-bukhari, died]]
    tags: [modern, scholar, syria, damascus, hanafi, sufi, naqshbandi, khalidi, twentieth-century]
    importance: notable
