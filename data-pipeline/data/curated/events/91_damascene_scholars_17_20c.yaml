        is_canonical: true
        notes: "Article 'al-Nābulusī, ʿAbd al-Ghanī b. Ismāʿīl' in EI2 records death 24 Shaʿbān 1143 / 5 March 1731 in Damascus."
      - source_key: editorial
        notes: "Burial at the Sālihiyya cemetery on Mount Qāsiyūn and authored corpus of several hundred works attested in *Silk al-Durar* and standard biographies."
