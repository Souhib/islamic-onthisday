# Wave 91 of curated event additions (2026-04-27).
# Twelve mainstream Sunni Damascene scholars of the seventeenth through
# twentieth centuries CE, drawn from the Hanafī-Shāfiʿī establishment
# and the Naqshbandiyya-Khālidiyya line that have anchored Damascene
# religious life from the late Ottoman period to the present. Coverage:
# the Hanafī-Sufi polymath ʿAbd al-Ghānī al-Nābulsī (d. 1143 AH /
# 1731 CE) and his great-grandson the chronicler Muḥammad Khalīl
# al-Marādī (d. 1206 AH / 1791 CE) of *Silk al-Durar*; the Naqshbandi-
# Hanafi master Muḥammad Saʿīd al-Bukhārī (d. 1354 / 1935); the early-
# 20c Damascene Hanafi Bakrī al-Tarābulsī al-ʿAṭṭār (d. 1322 / 1905);
# Bahāʾ al-Dīn al-Bīṭār (d. 1335 / 1917); the educator-reformer Saʿīd
# al-Bānī (d. 1351 / 1932); the Hanafi Shaykh ʿAlī al-Daqr — co-founder
# of *Maʿhad al-Tawjīh al-Islāmī* (d. 1370 / 1951); the Arabic-language
# revivalist ʿIzz al-Dīn al-Tanūkhī (d. 1385 / 1965); the Hanafi
# Shaykh ʿAbd al-Karīm al-Rifāʿī, founder of Jamāʿat Zayd (d. 1393 /
# 1973); the Damascene Shāfiʿī-Sufi Ḥasan Ḥabannaka al-Maydānī of
# *Maʿhad al-Tawjīh al-Islāmī* (d. 1398 / 1978); the Hanafi Mufti of
# Syria Muḥammad Abū al-Yusr ʿĀbidīn — descendant of Ibn ʿĀbidīn
# (d. 1401 / 1981); and the Naqshbandi Grand Muftī of Syria Aḥmad
# Kuftarū (d. 1425 / 2004). All entries are presented factually-
# historically, span the Hanafī-Shāfiʿī Damascene scholarly
# establishment with its embedded Naqshbandiyya line, and are
# defensible within Ahl al-Sunna wa-l-Jamāʿa. Already-covered figures
# (al-Qāsimī, al-Jazāʾirī, Ibn ʿĀbidīn, al-Būṭī) are skipped.
# Sources: EI2, EI3 where available, *Silk al-Durar*, academic
# biographies, and editorial compilation. No hadith refs.
# Trilingual en/ar/fr throughout.

events:
