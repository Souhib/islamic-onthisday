  - slug: death-of-baha-al-din-al-bitar
    category: scholar_death
    title_en: Death of Bahāʾ al-Dīn al-Bīṭār — Damascene Sunni Scholar
    title_ar: وفاة الشيخ بهاء الدين البيطار — العالم السني الدمشقي
    title_fr: Mort de Bahāʾ al-Dīn al-Bīṭār — savant sunnite damascène
    description_en: |
      Bahāʾ al-Dīn ibn ʿAbd al-Razzāq al-Bīṭār — Damascene
      Sunni scholar of the late-Ottoman Bīṭār family of
      Damascene ʿulamāʾ, son of the celebrated reformist
      ʿAbd al-Razzāq al-Bīṭār (d. 1335 / 1916), and a
      teacher of the early-twentieth-century Damascene
      reformist generation — died at Damascus in 1335 AH
      (1916/17 CE). He was educated at the Sinānīyya and
      Murādiyya complexes of Damascus, accompanied his
      father in the late-Ottoman Damascene reformist
      circle that included Jamāl al-Dīn al-Qāsimī and
      Ṭāhir al-Jazāʾirī, and held a teaching post at the
      Umayyad Mosque. His authored works circulated
      modestly outside Damascus and his name survives
      principally in the *Ḥilyat al-Bashar fī Tārīkh
      al-Qarn al-Thālith ʿAshar* of his father, where
      his early formation and ḥadīth transmission line
      are recorded.
    description_ar: |
      توفي الشيخ بهاء الدين بن عبد الرزاق البيطار —
      العالم السني الدمشقي من أسرة البيطار الدمشقية
      العثمانية المتأخرة من العلماء، نجل العلامة المصلح
      عبد الرزاق البيطار (المتوفى سنة ١٣٣٥ هـ / ١٩١٦
      ميلادي)، وأحد شيوخ الجيل الإصلاحي الدمشقي في
      أوائل القرن العشرين الميلادي — بدمشق سنة ١٣٣٥ هـ
      (١٩١٦-١٩١٧ ميلادي). تعلم بالسنانية والمرادية
      بدمشق، وصاحب أباه في حلقة الإصلاح الدمشقية
      المتأخرة العثمانية مع جمال الدين القاسمي وطاهر
      الجزائري، وتقلد التدريس بالجامع الأموي. وانتشرت
      مصنفاته انتشاراً محدوداً خارج الشام، وقد حفظ
      اسمه بشكل رئيس في كتاب أبيه «حلية البشر في
      تاريخ القرن الثالث عشر» الذي ضم تكوينه العلمي
      الباكر وأسانيد حديثه.
    description_fr: |
      Bahāʾ al-Dīn ibn ʿAbd al-Razzāq al-Bīṭār — savant
      sunnite damascène de la famille Bīṭār des ʿulamāʾ
      damascènes de la fin de l'époque ottomane, fils du
      célèbre réformiste ʿAbd al-Razzāq al-Bīṭār (m.
      1335 H / 1916 EC), et maître de la génération
      réformiste damascène du début du XXe siècle —
      mourut à Damas en 1335 H (1916/17 EC). Il fut
      formé aux complexes Sinānīyya et Murādiyya de
      Damas, accompagna son père dans le cercle
      réformiste damascène ottoman tardif aux côtés de
      Jamāl al-Dīn al-Qāsimī et Ṭāhir al-Jazāʾirī, et
      occupa un poste d'enseignement à la Grande
      Mosquée des Omeyyades. Ses œuvres écrites
      circulèrent modestement hors de Damas, et son
      nom est principalement conservé dans le *Ḥilyat
      al-Bashar fī Tārīkh al-Qarn al-Thālith ʿAshar* de
      son père, où sont consignés sa formation
      initiale et ses chaînes de transmission du
      hadith.
    canonical_hijri: {year: 1335, precision: year}
