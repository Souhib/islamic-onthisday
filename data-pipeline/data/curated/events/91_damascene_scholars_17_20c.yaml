  - slug: death-of-muhammad-abu-al-yusr-abidin
    category: scholar_death
    title_en: Death of Muḥammad Abū al-Yusr ʿĀbidīn — Hanafi Mufti of Syria
    title_ar: وفاة الشيخ محمد أبي اليسر عابدين — مفتي الجمهورية العربية السورية الحنفي
    title_fr: Mort de Muḥammad Abū al-Yusr ʿĀbidīn — Muftī hanafite de la République Arabe Syrienne
    description_en: |
      Muḥammad Abū al-Yusr ibn Muḥammad Saʿīd ʿĀbidīn —
      Damascene Sunni Ḥanafī jurist, descendant of the
      celebrated Hanafī authority Muḥammad Amīn Ibn
      ʿĀbidīn (d. 1252 / 1836), and Muftī of the Syrian
      Arab Republic from 1962 until his retirement
      shortly before his death — died at Damascus in
      1401 AH (corresponding to 1981 CE) at age about
      ninety-two and was buried in the Bāb al-Ṣaghīr
      cemetery beside other Damascene ʿulamāʾ. Born at
      Damascus in 1306 AH (1889 CE), he was educated in
      the Sinānīyya and Murādiyya complexes and at the
      Damascus *Maktab ʿAnbar*, served as a judge in the
      shariʿa court system, and held the chair of
      Hanafi jurisprudence at the College of Sharīʿa of
      the University of Damascus. His authored works
      include *Nāfiʿ al-Kabīr li-man Yuṭāliʿ al-Jāmiʿ
      al-Ṣaghīr* on Hanafī jurisprudence, *al-Sharīʿa
      al-Islāmiyya wa-Manāhij Tashrīʿihā*, and a number
      of fatwa collections preserved in the Syrian
      Ministry of Awqāf archives. He was a maternal
      grandfather of Muftī Aḥmad Kuftarū's contemporary
      Damascene scholarly milieu.
    description_ar: |
      توفي العلامة محمد أبو اليسر بن محمد سعيد عابدين —
      الفقيه السني الحنفي الدمشقي من ذرية المحقق
      الحنفي محمد أمين ابن عابدين (المتوفى سنة ١٢٥٢
      هـ / ١٨٣٦ ميلادي)، ومفتي الجمهورية العربية
      السورية من سنة ١٣٨٢ هـ (١٩٦٢ ميلادي) إلى
      تقاعده قبيل وفاته — بدمشق سنة ١٤٠١ هـ (الموافق
      ١٩٨١ ميلادي) عن نحو اثنتين وتسعين سنة، ودفن
      بمقبرة الباب الصغير بدمشق إلى جوار غيره من
      علماء الشام. ولد بدمشق سنة ١٣٠٦ هـ (١٨٨٩
      ميلادي)، وتعلم بالسنانية والمرادية وبـ«مكتب
      عنبر» بدمشق، وتقلد القضاء في المحاكم الشرعية،
      وحاز كرسي الفقه الحنفي بكلية الشريعة في جامعة
      دمشق. ومن مؤلفاته «نافع الكبير لمن يطالع الجامع
      الصغير» في الفقه الحنفي، و«الشريعة الإسلامية
      ومناهج تشريعها»، ومجموعات من الفتاوى محفوظة في
      أرشيف وزارة الأوقاف السورية. وهو من أعلام محيط
      الشام العلمي السني المعاصر للمفتي أحمد كفتارو.
    description_fr: |
      Muḥammad Abū al-Yusr ibn Muḥammad Saʿīd ʿĀbidīn —
      juriste sunnite hanafite damascène, descendant de
      la célèbre autorité hanafite Muḥammad Amīn Ibn
      ʿĀbidīn (m. 1252 H / 1836 EC), et Muftī de la
      République Arabe Syrienne de 1962 jusqu'à sa
      retraite peu avant sa mort — mourut à Damas en
      1401 H (correspondant à 1981 EC) à l'âge
      d'environ quatre-vingt-douze ans et fut enterré
      au cimetière Bāb al-Ṣaghīr aux côtés d'autres
      ʿulamāʾ damascènes. Né à Damas en 1306 H
      (1889 EC), il fut formé aux complexes Sinānīyya
      et Murādiyya et au *Maktab ʿAnbar* de Damas,
      servit comme juge dans le système des tribunaux
      de la sharīʿa et occupa la chaire de
      jurisprudence hanafite à la Faculté de Sharīʿa
      de l'Université de Damas. Ses œuvres comprennent
      *Nāfiʿ al-Kabīr li-man Yuṭāliʿ al-Jāmiʿ al-
      Ṣaghīr* sur la jurisprudence hanafite, *al-
      Sharīʿa al-Islāmiyya wa-Manāhij Tashrīʿihā*, et
      plusieurs recueils de fatwas conservés aux
      archives du ministère syrien des Awqāf. Il fut
      l'une des figures du milieu savant sunnite
      damascène contemporain du Muftī Aḥmad Kuftarū.
    canonical_hijri: {year: 1401, precision: year}
    canonical_gregorian: {date: 1981, precision: year, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Syrian Ministry of Awqāf records and Damascene biographical sources register death 1401 AH / 1981 CE in Damascus; Muftī tenure (1962 onward) and University of Damascus chair attested in standard biographies; precise day variously reported in Damascene sources, so year-precision used for both calendars."
    people: [[muhammad-abu-al-yusr-abidin, died], [ibn-abidin, subject]]
    tags: [modern, scholar, syria, damascus, hanafi, mufti, twentieth-century]
    importance: notable
    verified: true
    verification_status: single_source

  - slug: death-of-ahmad-kuftaru
    category: scholar_death
    title_en: Death of Aḥmad Kuftarū — Naqshbandi Grand Muftī of Syria
    title_ar: وفاة الشيخ أحمد كفتارو — المفتي العام النقشبندي للجمهورية العربية السورية
    title_fr: Mort de Aḥmad Kuftarū — Grand Muftī naqshbandi de la République Arabe Syrienne
    description_en: |
      Aḥmad ibn Muḥammad Amīn Kuftarū — Damascene Sunni
      Ḥanafī jurist of Kurdish origin, Naqshbandī-Khālidī
      Sufi shaykh of the Abū al-Nūr complex in Damascus,
      and Grand Muftī (*al-Muftī al-ʿĀmm*) of the Syrian
      Arab Republic from 1958 until his death in 2004 —
      died at Damascus on 16 Rajab 1425 AH (1 September
      2004 CE) at age about ninety. Born at Damascus in
      1335 AH (1915 CE) into a Kurdish-Damascene
      Naqshbandī family, he was the son and successor of
      the Naqshbandī shaykh Muḥammad Amīn Kuftarū at the
      Abū al-Nūr Mosque in the al-Akrād district. He
      established the Abū al-Nūr Islamic Foundation
      and the Shaykh Aḥmad Kuftarū Academy, which
      trained students from across the Sunni Muslim
      world in classical Islamic sciences and the
      Naqshbandī ṭarīqa, and held the office of muftī
      under successive Syrian governments for more than
      forty-five years. He was prominent in the
      Damascene Sufi-traditionalist current, in
      Christian-Muslim and inter-Sunni dialogue, and in
      the public religious life of late-twentieth-
      century Damascus.
    description_ar: |
      توفي الشيخ أحمد بن محمد أمين كفتارو — الفقيه السني
      الحنفي الدمشقي من أصل كردي، شيخ الطريقة
      النقشبندية الخالدية بمجمع أبي النور بدمشق، والمفتي
      العام للجمهورية العربية السورية من سنة ١٣٧٧ هـ
      (١٩٥٨ ميلادي) إلى وفاته سنة ١٤٢٥ هـ (٢٠٠٤
      ميلادي) — بدمشق يوم ١٦ رجب سنة ١٤٢٥ هـ (الموافق
      ١ سبتمبر ٢٠٠٤ ميلادي) عن نحو تسعين سنة. ولد
      بدمشق سنة ١٣٣٥ هـ (١٩١٥ ميلادي) في أسرة كردية
      دمشقية نقشبندية، وهو نجل الشيخ النقشبندي محمد
      أمين كفتارو وخليفته في إمامة جامع أبي النور بحي
      الأكراد. أسس «مؤسسة أبي النور الإسلامية» و«مجمع
      الشيخ أحمد كفتارو الإسلامي»، وقد رَبَّيا تلاميذ
      من عموم العالم الإسلامي السني في العلوم الشرعية
      الكلاسيكية والطريقة النقشبندية، وشغل منصب
      الإفتاء العام تحت حكومات سورية متعاقبة ما يزيد
      على خمس وأربعين سنة. ومن أبرز رموز التيار
      السني الصوفي التقليدي بدمشق وحوار الأديان بين
      المسلمين والمسيحيين والحوار بين أهل السنة في
      الحياة الدينية العامة بأواخر القرن العشرين
      الميلادي.
    description_fr: |
      Aḥmad ibn Muḥammad Amīn Kuftarū — juriste sunnite
      hanafite damascène d'origine kurde, shaykh soufi
      naqshbandi-khālidī du complexe Abū al-Nūr de
      Damas, et Grand Muftī (*al-Muftī al-ʿĀmm*) de la
      République Arabe Syrienne de 1958 jusqu'à sa
      mort en 2004 — mourut à Damas le 16 Rajab 1425 H
      (1 septembre 2004 EC) à l'âge d'environ
      quatre-vingt-dix ans. Né à Damas en 1335 H
      (1915 EC) dans une famille kurde-damascène
      naqshbandiyya, il fut le fils et successeur du
      shaykh naqshbandi Muḥammad Amīn Kuftarū à la
      mosquée Abū al-Nūr du quartier al-Akrād. Il
      fonda la *Fondation Islamique Abū al-Nūr* et
      l'*Académie Shaykh Aḥmad Kuftarū*, qui
      formèrent des étudiants venus de l'ensemble du
      monde musulman sunnite aux sciences islamiques
      classiques et à la *ṭarīqa* naqshbandiyya, et
      occupa la charge de muftī sous des
      gouvernements syriens successifs pendant plus
      de quarante-cinq ans. Il fut une figure de
      premier plan du courant sunnite-soufi-
      traditionaliste damascène, du dialogue
      islamo-chrétien et inter-sunnite, et de la vie
      religieuse publique de la fin du XXe siècle
      damascène.
    canonical_hijri: {year: 1425, month: 7, day: 16, precision: day}
    canonical_gregorian: {date: 2004-09-01, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Article 'Kuftarū, Aḥmad' in EI3 records death 1 September 2004 in Damascus."
      - source_key: editorial
        notes: "Syrian Ministry of Awqāf records, Abū al-Nūr Foundation institutional history, and forty-six-year tenure as Muftī of the Syrian Arab Republic attested in standard biographies."
    people: [[ahmad-kuftaru, died]]
