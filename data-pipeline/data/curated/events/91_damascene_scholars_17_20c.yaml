      - source_key: editorial
        is_canonical: true
        notes: "Damascene Hanafī biographical compilations record death 1322 AH / 1905 CE; teaching career at the Sinānīyya and chain of pupils attested in the *thabat*-records of his students including ʿAlī al-Daqr."
    people: [[bakri-al-tarabulsi-al-attar, died]]
    tags: [modern, scholar, syria, damascus, hanafi, late-ottoman, twentieth-century]
    importance: notable
