  - slug: death-of-abd-al-ghani-al-nabulsi
    category: scholar_death
    title_en: Death of ʿAbd al-Ghānī al-Nābulsī — Damascene Hanafi-Sufi Polymath
    title_ar: وفاة العلامة عبد الغني النابلسي — العالم الدمشقي الحنفي الصوفي
    title_fr: Mort de ʿAbd al-Ghānī al-Nābulsī — polymathe damascène hanafite-soufi
    description_en: |
      ʿAbd al-Ghānī ibn Ismāʿīl al-Nābulsī — Damascene
      Sunni Ḥanafī jurist, Naqshbandi-Qādirī Sufi, traveller,
      poet, and one of the most prolific Arabic-language
      polymaths of the late seventeenth and early eighteenth
      centuries — died at Damascus on 24 Shaʿbān 1143 AH
      (4 March 1731 CE) at age about ninety-one and was
      buried at the Sālihiyya quarter on Mount Qāsiyūn near
      his master Shaykh Maḥmūd al-Kurdī. Born at Damascus
      in 1050 AH (1641 CE) into a scholarly family of
      Nablusi origin, he was initiated into the Naqshbandiyya
      and the Qādiriyya and led a forty-year retreat-and-
      writing programme in his Damascus home before turning
      to public teaching late in life. His authored corpus
      runs to several hundred works in fiqh, taṣawwuf,
      tafsīr, ḥadīth, poetry, agriculture, and travel. The
      most cited include the Hanafī fiqh manual *al-Ḥadīqa
      al-Nadiyya Sharḥ al-Ṭarīqa al-Muḥammadiyya*, the
      dream-interpretation reference *Taʿṭīr al-Anām fī
      Tafsīr al-Aḥlām*, the travel narratives *al-Ḥaḍra
      al-Unsiyya fī al-Riḥla al-Qudsiyya* and *al-Ḥaqīqa
      wa-l-Majāz fī Riḥlat Bilād al-Shām wa Miṣr wa-l-Ḥijāz*,
      and a sustained body of poetry collected in his
      *Dīwān al-Ḥaqāʾiq*.
    description_ar: |
      توفي العلامة الشيخ عبد الغني بن إسماعيل النابلسي —
      الفقيه السني الحنفي الدمشقي والصوفي النقشبندي
      القادري والرحالة والشاعر، وأحد أكبر الموسوعيين
      باللغة العربية في أواخر القرن السابع عشر وأوائل
      القرن الثامن عشر الميلاديين — بدمشق يوم ٢٤ شعبان
      سنة ١١٤٣ هـ (الموافق ٤ مارس ١٧٣١ ميلادي) عن نحو
      إحدى وتسعين سنة، ودفن بحي الصالحية في سفح جبل
      قاسيون قرب شيخه محمود الكردي. ولد بدمشق سنة ١٠٥٠
      هـ (الموافق ١٦٤١ ميلادي) في أسرة علمية نابلسية
      الأصل، وأخذ النقشبندية والقادرية، ولزم في داره
      بدمشق نحو أربعين سنة في الخلوة والتأليف قبل أن
      يعود إلى التدريس العام في آخر أمره. ومصنفاته تبلغ
      عدة مئات في الفقه والتصوف والتفسير والحديث والشعر
      والفلاحة والرحلة. ومن أشهرها «الحديقة الندية شرح
      الطريقة المحمدية» في الفقه الحنفي، و«تعطير الأنام
      في تفسير الأحلام» في تفسير المنامات، ورحلتاه
      «الحضرة الأنسية في الرحلة القدسية» و«الحقيقة
      والمجاز في رحلة بلاد الشام ومصر والحجاز»، وديوانه
      الشعري الكبير «ديوان الحقائق».
    description_fr: |
      ʿAbd al-Ghānī ibn Ismāʿīl al-Nābulsī — juriste sunnite
      hanafite damascène, soufi naqshbandi-qādirī, voyageur,
      poète, et l'un des polymathes arabophones les plus
      prolifiques de la fin du XVIIe et du début du XVIIIe
      siècle — mourut à Damas le 24 Shaʿbān 1143 H
      (4 mars 1731 EC) à l'âge d'environ quatre-vingt-onze
      ans et fut enterré dans le quartier de la Sāliḥiyya
      au pied du mont Qāsiyūn près de son maître Shaykh
      Maḥmūd al-Kurdī. Né à Damas en 1050 H (1641 EC) dans
      une famille savante d'origine nablusienne, il fut
      initié à la Naqshbandiyya et à la Qādiriyya et passa
      une retraite d'environ quarante ans consacrée à la
      réclusion et à l'écriture dans sa maison damascène
      avant de revenir à l'enseignement public en fin de
      vie. Son œuvre s'élève à plusieurs centaines
      d'ouvrages en fiqh, taṣawwuf, tafsīr, hadith, poésie,
      agriculture et récits de voyage. Les plus cités sont
      le manuel de fiqh hanafite *al-Ḥadīqa al-Nadiyya
      Sharḥ al-Ṭarīqa al-Muḥammadiyya*, l'ouvrage de
      référence sur l'interprétation des rêves *Taʿṭīr
      al-Anām fī Tafsīr al-Aḥlām*, les relations de voyage
      *al-Ḥaḍra al-Unsiyya fī al-Riḥla al-Qudsiyya* et
      *al-Ḥaqīqa wa-l-Majāz fī Riḥlat Bilād al-Shām wa Miṣr
      wa-l-Ḥijāz*, et le grand recueil poétique *Dīwān
      al-Ḥaqāʾiq*.
    canonical_hijri: {year: 1143, month: 8, day: 24, precision: day}
    canonical_gregorian: {date: 1731-03-04, precision: day, method: tabular_conversion}
    claims:
