  - slug: death-of-hassan-habannaka-al-maydani
    category: scholar_death
    title_en: Death of Ḥasan Ḥabannaka al-Maydānī — Damascene Shaykh of *Maʿhad al-Tawjīh al-Islāmī*
    title_ar: وفاة الشيخ حسن حبنكة الميداني — شيخ «معهد التوجيه الإسلامي» بدمشق
    title_fr: Mort de Ḥasan Ḥabannaka al-Maydānī — shaykh damascène de l'*Institut de l'Orientation Islamique*
    description_en: |
      Ḥasan ibn ʿAbd al-Raḥmān Ḥabannaka al-Maydānī —
      Damascene Sunni Shāfiʿī scholar, longtime principal
      teacher and director of the *Maʿhad al-Tawjīh al-
      Islāmī* (the Damascus Institute of Islamic
      Orientation, founded by ʿAlī al-Daqr in 1933), and
      one of the foremost mid-twentieth-century Damascene
      mosque preachers — died at Damascus on 17 Rajab
      1398 AH (23 June 1978 CE) at age about seventy-
      months after Friday prayer at the Manjak Mosque in
      the al-Maydān quarter where he had taught for
      decades. Born at Damascus around 1326 AH (1908
      CE), he was a senior pupil of ʿAlī al-Daqr and
      Hāshim al-Khaṭīb, and steered the Maʿhad through
      the post-independence period as one of the
      principal training grounds for the Damascene
      Sunni teaching ʿulamāʾ. His Arabic works include
      *Ḍawābiṭ al-Maʿrifa wa Uṣūl al-Istidlāl wa-l-
      Munāẓara*, *Qawāʿid al-Tadabbur al-Amthal li-
      Kitāb Allāh ʿAzz wa Jall*, and a body of mosque
      sermons preserved by his students. He was the
      father of the contemporary scholar of Qurʾanic
      tafsīr ʿAbd al-Raḥmān Ḥabannaka al-Maydānī and
      the grandfather of his namesake Ḥasan Ḥabannaka
      al-Maydānī.
    description_ar: |
      توفي العلامة حسن بن عبد الرحمن حبنكة الميداني —
      العالم السني الشافعي الدمشقي، رئيس المدرسين
      الفعلي ومدير «معهد التوجيه الإسلامي» بدمشق
      (الذي أسسه الشيخ علي الدقر سنة ١٣٥٢ هـ / ١٩٣٣
      ميلادي) سنين طويلة، وأحد أكبر خطباء جوامع دمشق
      في منتصف القرن العشرين الميلادي — بدمشق يوم
      ١٧ رجب سنة ١٣٩٨ هـ (الموافق ٢٣ جوان ١٩٧٨
      ميلادي) عن نحو سبعين سنة، وذلك بعد صلاة الجمعة
      بجامع منجك بحي الميدان حيث درّس عقوداً.
      ولد بدمشق نحو سنة ١٣٢٦ هـ (١٩٠٨ ميلادي)، وكان
      من كبار تلامذة الشيخ علي الدقر والشيخ هاشم
      الخطيب، وقاد «المعهد» في عهد الاستقلال إلى أن
      صار من أكبر مراكز تخريج علماء أهل السنة
      المدرسين بدمشق. ومن مؤلفاته العربية «ضوابط
      المعرفة وأصول الاستدلال والمناظرة»، و«قواعد
      التدبر الأمثل لكتاب الله عز وجل»، ومجموعات من
      الخطب الجامعية حفظها تلاميذه. وهو والد العلامة
      المفسر عبد الرحمن حبنكة الميداني وجد سميه
      الشيخ حسن حبنكة الميداني من أعلام عصرنا.
    description_fr: |
      Ḥasan ibn ʿAbd al-Raḥmān Ḥabannaka al-Maydānī —
      savant sunnite shāfiʿite damascène, longtemps
      principal enseignant et directeur de l'*Institut
      de l'Orientation Islamique* (*Maʿhad al-Tawjīh al-
      Islāmī*, fondé par ʿAlī al-Daqr en 1933) à Damas,
      et l'un des principaux prédicateurs des mosquées
      damascènes du milieu du XXe siècle — mourut à
      Damas le 17 Rajab 1398 H (23 juin 1978 EC) à
      l'âge d'environ soixante-dix ans, après la prière
      du vendredi à la mosquée Manjak du quartier
      al-Maydān où il avait enseigné pendant des
      décennies. Né à Damas vers 1326 H (1908 EC), il
      fut un élève senior de ʿAlī al-Daqr et de Hāshim
      al-Khaṭīb, et dirigea l'Institut à travers la
      période post-indépendance jusqu'à en faire l'un
      des principaux centres de formation des ʿulamāʾ
      enseignants sunnites de Damas. Ses œuvres en
      arabe comprennent *Ḍawābiṭ al-Maʿrifa wa Uṣūl
      al-Istidlāl wa-l-Munāẓara*, *Qawāʿid al-Tadabbur
      al-Amthal li-Kitāb Allāh ʿAzz wa Jall*, et un
      ensemble de sermons préservés par ses élèves. Il
      est le père du savant contemporain en *tafsīr*
      coranique ʿAbd al-Raḥmān Ḥabannaka al-Maydānī
      et le grand-père de son homonyme Ḥasan Ḥabannaka
      al-Maydānī.
    canonical_hijri: {year: 1398, month: 7, day: 17, precision: day}
    canonical_gregorian: {date: 1978-06-23, precision: day, method: tabular_conversion}
