  - slug: death-of-al-ayni
    category: scholar_death
    title_en: Death of Badr al-Dīn al-ʿAynī — Hanafī Historian and Bukhārī Commentator
    title_ar: وفاة بدر الدين العيني — مؤرّخ الحنفية وشارح البخاري
    title_fr: Mort de Badr al-Dīn al-ʿAynī — historien ḥanafite et commentateur d'al-Bukhārī
    description_en: |
      Maḥmūd ibn Aḥmad al-ʿAynī, Badr al-Dīn — Hanafī
      polymath of Mamlūk Cairo, historian, and chief Hanafī
      judge in Egypt, originally from ʿAyntāb in northern
      Syria — died in Cairo in 855 AH (1451 CE) aged 93.
      His *ʿUmdat al-Qārī fī Sharḥ Ṣaḥīḥ al-Bukhārī* is the
      principal Hanafī commentary on the Ṣaḥīḥ — written in
      explicit dialogue with Ibn Ḥajar's contemporaneous
      *Fatḥ al-Bārī* — and, alongside it, the work that
      defined the late-Mamlūk Bukhārī-commentary tradition.
      He also wrote the universal history *ʿIqd al-Jumān fī
      Tārīkh Ahl al-Zamān* in over twenty volumes, and a
      commentary on the Hanafī manual *al-Hidāya* of al-
      Marghīnānī. Lifelong rival of Ibn Ḥajar; their
      polemics shaped late-Mamlūk Egyptian scholarship.
    description_ar: |
      توفي محمود بن أحمد العيني بدر الدين — فقيه حنفي
      موسوعي ومؤرّخ من علماء القاهرة المملوكية، وقاضي
      قضاة الحنفية بمصر، أصله من عينتاب بشمال الشام —
      بالقاهرة سنة ٨٥٥ هـ (١٤٥١ م) عن ثلاث وتسعين سنة.
      وكتابه «عمدة القاري في شرح صحيح البخاري» الشرح
      الحنفي الأول للصحيح — كتبه في حوار صريح مع «فتح
      الباري» لابن حجر معاصره — وهو إلى جانب «فتح
      الباري» الكتاب الذي رسم تقليد شرح البخاري في
      أواخر العصر المملوكي. وله «عقد الجمان في تاريخ
      أهل الزمان» في أكثر من عشرين مجلداً، وشرح على
      «الهداية» للمرغيناني في الفقه الحنفي. وكان منازعاً
      لابن حجر طوال عمره، ومناظراتهما صنعت العلم
      المصري في أواخر دولة المماليك.
    description_fr: |
      Maḥmūd ibn Aḥmad al-ʿAynī, Badr al-Dīn — polymathe
      ḥanafite du Caire mamlouk, historien et grand juge
      ḥanafite d'Égypte, originaire d'ʿAyntāb en Syrie du
      Nord — mourut au Caire en 855 H (1451 EC), à 93
      ans. Son *ʿUmdat al-Qārī fī Sharḥ Ṣaḥīḥ al-Bukhārī*
      est le principal commentaire ḥanafite du Ṣaḥīḥ —
      rédigé en dialogue explicite avec le *Fatḥ al-Bārī*
      contemporain d'Ibn Ḥajar — et, à côté de celui-ci,
      l'ouvrage qui définit la tradition de commentaire
      d'al-Bukhārī à la fin de l'époque mamlouk. Il
      composa également l'histoire universelle *ʿIqd
      al-Jumān fī Tārīkh Ahl al-Zamān* en plus de vingt
      volumes, et un commentaire du manuel ḥanafite
      *al-Hidāya* d'al-Marghīnānī. Rival d'une vie
      d'Ibn Ḥajar ; leurs polémiques façonnèrent l'érudition
      égyptienne de la fin de l'époque mamlouk.
