  # =========================================================================

  - slug: death-of-abd-al-ghani-al-maqdisi
    category: scholar_death
    title_en: Death of ʿAbd al-Ghanī al-Maqdisī — Hanbalī Muḥaddith of Damascus
    title_ar: وفاة عبد الغني المقدسي — محدّث الحنابلة بدمشق
    title_fr: Mort de ʿAbd al-Ghanī al-Maqdisī — muḥaddith ḥanbalite de Damas
    description_en: |
      ʿAbd al-Ghanī ibn ʿAbd al-Wāḥid al-Jammāʿīlī al-Maqdisī,
      Taqī al-Dīn — Palestinian-born Hanbalī muḥaddith and
      cousin of Ibn Qudāma al-Maqdisī, founder (with his
      kinsmen) of the first madrasa on Mount Qāsiyūn outside
      Damascus and one of the central figures of the
      Damascene Hanbalī school in the post-Crusade
      generation — died in 600 AH (1203 CE), aged about 57.
      His *al-Kamāl fī Asmāʾ al-Rijāl* gathered the narrators
      of the Six Books into a single biographical dictionary,
      the work that would become the foundation of al-Mizzī's
      *Tahdhīb al-Kamāl* a century later — and through it of
      Ibn Ḥajar's *Tahdhīb al-Tahdhīb*. He also composed
      *ʿUmdat al-Aḥkām* — a short selection of agreed-upon
      hadith that remains a standard introductory ḥadīth text
      in Sunni madrasas to this day.
    description_ar: |
      توفي عبد الغني بن عبد الواحد الجمّاعيلي المقدسي تقي
      الدين — محدّث حنبلي مولده بفلسطين، وابن عم موفّق
      الدين ابن قدامة المقدسي، ومؤسس — بصحبة أبناء عمومته —
      أوّل مدرسة على جبل قاسيون خارج دمشق، ومن كبار رجال
      المدرسة الحنبلية الدمشقية في الجيل الذي تلا الحروب
      الصليبية — سنة ٦٠٠ هـ (١٢٠٣ م) عن نحو سبع وخمسين
      سنة. جمع في «الكمال في أسماء الرجال» رواة الكتب الستة
      في معجم تراجمي واحد، صار بعد قرن أساس «تهذيب الكمال»
      للمزّي — ومن خلاله أساس «تهذيب التهذيب» لابن حجر.
      وله «عمدة الأحكام» — مختصر مختار من الأحاديث المتفق
      عليها، ولا يزال متناً معتمداً للمبتدئين في الحديث في
      المدارس السنّية إلى اليوم.
    description_fr: |
      ʿAbd al-Ghanī ibn ʿAbd al-Wāḥid al-Jammāʿīlī al-Maqdisī,
      Taqī al-Dīn — muḥaddith ḥanbalite né en Palestine, cousin
      d'Ibn Qudāma al-Maqdisī, fondateur (avec les siens) de la
      première madrasa du mont Qāsiyūn aux portes de Damas, et
      figure centrale de l'école ḥanbalite damascène de la
      génération suivant les Croisades — mourut en 600 H (1203
      EC), à environ 57 ans. Son *al-Kamāl fī Asmāʾ al-Rijāl*
      réunit les transmetteurs des Six Livres dans un seul
      dictionnaire biographique, l'ouvrage qui deviendrait un
      siècle plus tard le fondement du *Tahdhīb al-Kamāl* d'al-
      Mizzī — et par là du *Tahdhīb al-Tahdhīb* d'Ibn Ḥajar. Il
      composa également *ʿUmdat al-Aḥkām* — court recueil de
      ḥadīths consensuels qui demeure jusqu'à aujourd'hui un
      texte d'initiation standard dans les madrasas sunnites.
    canonical_hijri: {year: 600, precision: year}
    canonical_gregorian: {date: 1203-01-01, precision: year, method: tabular_conversion}
    claims:
