  - slug: death-of-najm-al-din-al-tufi
    category: scholar_death
    title_en: Death of Najm al-Dīn al-Ṭūfī — Hanbalī Theorist of *Maṣlaḥa*
    title_ar: وفاة نجم الدين الطوفي — منظّر «المصلحة» الحنبلي
    title_fr: Mort de Najm al-Dīn al-Ṭūfī — théoricien ḥanbalite de la *maṣlaḥa*
    description_en: |
      Sulaymān ibn ʿAbd al-Qawī al-Ṭūfī, Najm al-Dīn —
      Hanbalī uṣūlī, polemicist, and grammarian, born in
      Ṭūfā near Baghdad and educated in Baghdad, Damascus and
      Cairo — died at Hebron (al-Khalīl) in 716 AH (1316 CE)
      after a final pilgrimage to Mecca. He is best known for
      his commentary on al-Nawawī's *al-Arbaʿīn al-Nawawiyya*
      — and within it for the long excursus on the thirty-
      second hadith ("lā ḍarara wa-lā ḍirār"), where he argued
      that *maṣlaḥa* (the safeguarding of public welfare) is
      the strongest evidence in muʿāmalāt and may even
      particularise a contradicting Qur'ānic or hadith text.
      The thesis was rejected by his contemporaries but
      revived in the modern reform-jurisprudence of Rashīd
      Riḍā and the twentieth-century Egyptian school. He also
      composed *Sharḥ Mukhtaṣar al-Rawḍa* in uṣūl al-fiqh.
    description_ar: |
      توفي سليمان بن عبد القوي الطوفي نجم الدين — أصولي
      حنبلي ومجادل ولغوي، مولده ببلدة طوفا قرب بغداد، وقد
      أخذ العلم ببغداد ودمشق والقاهرة — بمدينة الخليل سنة
      ٧١٦ هـ (١٣١٦ م) عقب آخر حجة له. واشتهر بشرحه على
      «الأربعين النووية» للنووي — ولا سيما بمبحثه المطوّل
      على الحديث الثاني والثلاثين «لا ضرر ولا ضرار»، حيث
      قرّر أن «المصلحة» (مراعاة جلب النفع ودرء الفساد) أقوى
      الأدلة في باب المعاملات، وأنها قد تخصّص حتى نصاً
      قرآنياً أو حديثياً يعارضها. ورُدّت الفكرة في زمنه
      ولكن أحياها فقه الإصلاح الحديث على يد محمد رشيد
      رضا والمدرسة المصرية في القرن العشرين. وله «شرح مختصر
      الروضة» في أصول الفقه.
    description_fr: |
      Sulaymān ibn ʿAbd al-Qawī al-Ṭūfī, Najm al-Dīn —
      uṣūlī ḥanbalite, polémiste et grammairien, né à Ṭūfā
      près de Bagdad et formé à Bagdad, Damas et Le Caire —
      mourut à Hébron (al-Khalīl) en 716 H (1316 EC) au retour
      de son ultime pèlerinage à La Mecque. Il est surtout
      connu pour son commentaire des *Arbaʿīn* d'al-Nawawī —
      et particulièrement pour son long excursus sur le
      trente-deuxième ḥadīth ("lā ḍarara wa-lā ḍirār"), où il
      soutint que la *maṣlaḥa* (la préservation du bien
      commun) est la plus forte des preuves en muʿāmalāt et
      peut même particulariser un texte coranique ou
      ḥadīthique qui la contredirait. La thèse fut rejetée
      par ses contemporains mais ressuscitée par la
      jurisprudence réformiste moderne de Rashīd Riḍā et
      l'école égyptienne du XXe siècle. Il composa aussi le
      *Sharḥ Mukhtaṣar al-Rawḍa* en uṣūl al-fiqh.
    canonical_hijri: {year: 716, precision: year}
    canonical_gregorian: {date: 1316-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
      - source_key: ei2
    people: [[najm-al-din-al-tufi, died]]
    tags: [mamluk, scholar, hanbali, usul, hebron]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Najm_al-Din_al-Tufi"

  - slug: death-of-al-mizzi
    category: scholar_death
    title_en: Death of al-Mizzī — Damascene Hadith Critic
    title_ar: وفاة المزّي — ناقد المحدّثين بدمشق
    title_fr: Mort d'al-Mizzī — critique de ḥadīth de Damas
    description_en: |
      Yūsuf ibn ʿAbd al-Raḥmān al-Mizzī, Jamāl al-Dīn —
      Damascene Shāfiʿī muḥaddith and rijāl-critic, head of
      the Dār al-Ḥadīth al-Ashrafiyya in Damascus, friend and
      contemporary of Ibn Taymiyya and teacher of al-Dhahabī
      and Ibn Kathīr — died in Damascus in 742 AH (1341 CE),
      aged about 86. His *Tahdhīb al-Kamāl fī Asmāʾ al-Rijāl*
      reorganised and vastly expanded the *al-Kamāl* of ʿAbd
      al-Ghanī al-Maqdisī into a thirty-five-volume
      biographical dictionary of every narrator in the Six
      Books — the foundational reference work of post-
      classical Sunni rijāl criticism, on which al-Dhahabī's
      *Siyar* and *Tadhhīb*, and later Ibn Ḥajar's *Tahdhīb
      al-Tahdhīb*, all rest. He also produced *Tuḥfat al-
      Ashrāf bi-Maʿrifat al-Aṭrāf*, indexing the hadith of
      the Six Books by their Companion-narrators.
    description_ar: |
      توفي يوسف بن عبد الرحمن المزّي جمال الدين — محدث
      شافعي شامي وناقد رجال، شيخ دار الحديث الأشرفية
      بدمشق، وصاحب ابن تيمية ومعاصره، وشيخ الذهبي وابن
      كثير — بدمشق سنة ٧٤٢ هـ (١٣٤١ م) عن نحو ست وثمانين
      سنة. أعاد في «تهذيب الكمال في أسماء الرجال» ترتيب
      «الكمال» لعبد الغني المقدسي وزاد عليه زيادة كبرى،
      فأخرج معجماً تراجمياً في خمسة وثلاثين مجلداً يضم
      كل راو في الكتب الستة — وهو المرجع التأسيسي للنقد
      الرجالي السني ما بعد الكلاسيكي، الذي قام عليه
      «سير» الذهبي و«تذهيب التهذيب» له، ثم «تهذيب
      التهذيب» لابن حجر. وله أيضاً «تحفة الأشراف بمعرفة
      الأطراف» في فهرسة أحاديث الكتب الستة بأسماء صحابتها.
    description_fr: |
      Yūsuf ibn ʿAbd al-Raḥmān al-Mizzī, Jamāl al-Dīn —
      muḥaddith shāfiʿite damascène et critique de rijāl,
      directeur de la Dār al-Ḥadīth al-Ashrafiyya de Damas,
      ami et contemporain d'Ibn Taymiyya, maître d'al-Dhahabī
      et d'Ibn Kathīr — mourut à Damas en 742 H (1341 EC), à
      environ 86 ans. Son *Tahdhīb al-Kamāl fī Asmāʾ al-Rijāl*
      réorganisa et augmenta considérablement le *Kamāl* de
      ʿAbd al-Ghanī al-Maqdisī en un dictionnaire biographique
      de trente-cinq volumes recensant tout transmetteur des
      Six Livres — l'ouvrage de référence fondateur de la
      critique rijālienne sunnite post-classique, sur lequel
      reposent les *Siyar* et *Tadhhīb* d'al-Dhahabī, puis le
      *Tahdhīb al-Tahdhīb* d'Ibn Ḥajar. Il produisit aussi la
      *Tuḥfat al-Ashrāf bi-Maʿrifat al-Aṭrāf*, indexant les
      ḥadīths des Six Livres par leurs Compagnons
      transmetteurs.
    canonical_hijri: {year: 742, precision: year}
    canonical_gregorian: {date: 1341-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Al-Dhahabī (the canonical reporter for his own teacher) gives 12 Ṣafar 742 AH; year-precision used here pending day-attestation reconciliation."
      - source_key: ibn_kathir_bidaya
