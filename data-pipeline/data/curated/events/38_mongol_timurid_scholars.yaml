# Wave 25 of curated event additions (2026-04-27).
# Mongol-era (post-Baghdad-sack) and Timurid Sunni scholars: a generation
# of polymaths, mufassirūn, muḥaddithūn and uṣūliyyūn whose work bridges
# the Khwārazm/Marāgha period (Sharaf al-Dīn al-Ṭūsī, al-ʿUrḍī, Quṭb
# al-Dīn al-Shīrāzī) and the late-Mamlūk / early-Timurid synthesis
# (al-Mizzī, al-Bayḍāwī, al-Ṭūfī, al-Maḥallī, al-ʿAynī, al-Bulqīnī,
# al-Kirmānī). Two earlier figures are included as anchors of the
# tradition the Mongol-era scholars inherited: Najm al-Dīn ʿUmar
# al-Nasafī (the Maturidi creed) and ʿAbd al-Ghanī al-Maqdisī (the
# Damascene Hanbali muḥaddith whose *al-Kamāl* was the precursor to
# al-Mizzī's *Tahdhīb al-Kamāl*). All twelve carry classical Sunni
# attestation in the wafayāt / siyar literature; the dataset's
# strict-ṣaḥīḥ policy is honoured by omitting hadith refs entirely.
# Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # MARĀGHA / KHWĀRAZM SCIENCES
  # =========================================================================

  - slug: death-of-sharaf-al-din-al-tusi
    category: scholar_death
    title_en: Death of Sharaf al-Dīn al-Ṭūsī — Algebraist of Khurāsān
    title_ar: وفاة شرف الدين الطوسي — جبري خراسان
    title_fr: Mort de Sharaf al-Dīn al-Ṭūsī — algébriste du Khurāsān
    description_en: |
      Sharaf al-Dīn al-Muẓaffar ibn Muḥammad al-Ṭūsī — Persian
      mathematician of the late twelfth century, working in
      Khurāsān, Mosul, Aleppo and Damascus — died around 610 AH
      (~1213 CE). Before the Mongol catastrophe scattered the
      eastern schools, he produced a systematic treatise on cubic
      equations that classified the thirteen positive-root cases
      and developed numerical methods for finding their roots,
      decisively advancing the algebraic tradition of al-Khwārazmī
      and ʿUmar al-Khayyām. He also designed an improved
      astrolabe (the *al-asṭurlāb al-khaṭṭī*). His student
      Kamāl al-Dīn ibn Yūnus would teach Naṣīr al-Dīn al-Ṭūsī, so
      the chain from Sharaf al-Dīn to the Marāgha observatory of
      a generation later is direct.
    description_ar: |
      توفي شرف الدين المظفر بن محمد الطوسي — رياضي فارسي من
      أهل خراسان، اشتغل في خراسان والموصل وحلب ودمشق — نحو
      سنة ٦١٠ هـ (~١٢١٣ م)، قبيل الكارثة المغولية التي شتّتت
      المدارس الشرقية. أبدع رسالة منهجية في المعادلات
      التكعيبية صنّف فيها الحالات الثلاث عشرة ذات الجذر
      الموجب وطوّر طرائق عدديّة لاستخراج جذورها، فدفع
      التراث الجبري للخوارزمي وعمر الخيّام دفعة كبرى. واخترع
      أيضاً إسطرلاباً مطوّراً سمّاه «الإسطرلاب الخطّي». ومن
      تلاميذه كمال الدين بن يونس، الذي تتلمذ عليه نصير الدين
      الطوسي صاحب مرصد مراغة من بعد، فالسلسلة من شرف الدين
      إلى مرصد مراغة سلسلة متّصلة.
    description_fr: |
      Sharaf al-Dīn al-Muẓaffar ibn Muḥammad al-Ṭūsī —
      mathématicien persan de la fin du XIIe siècle, actif au
      Khurāsān, à Mossoul, Alep et Damas — mourut vers 610 H
      (~1213 EC). Avant que le cataclysme mongol ne disperse les
      écoles orientales, il produisit un traité systématique sur
      les équations cubiques classant les treize cas à racine
      positive et développa des méthodes numériques pour en
      extraire les racines, faisant ainsi décisivement progresser
      la tradition algébrique d'al-Khwārazmī et d'ʿUmar
      al-Khayyām. Il conçut également un astrolabe perfectionné
      (*al-asṭurlāb al-khaṭṭī*). Son disciple Kamāl al-Dīn ibn
      Yūnus formerait Naṣīr al-Dīn al-Ṭūsī : la chaîne menant de
      Sharaf al-Dīn à l'observatoire de Marāgha de la génération
      suivante est directe.
    canonical_hijri: {year: 610, precision: year}
    canonical_gregorian: {date: 1213-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Approximate dates (c. 1135 – c. 1213); classical biographical sources give year-only attestation."
      - source_key: ei2
    people: [[sharaf-al-din-al-tusi, died]]
    tags: [pre-mongol, khurasan, scholar, mathematics, astronomy]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Sharaf_al-Din_al-Tusi"

  - slug: death-of-al-urdi
    category: scholar_death
    title_en: Death of Muʾayyad al-Dīn al-ʿUrḍī — Engineer of the Marāgha Observatory
    title_ar: وفاة مؤيد الدين العُرضي — مهندس مرصد مراغة
    title_fr: Mort de Muʾayyad al-Dīn al-ʿUrḍī — ingénieur de l'observatoire de Marāgha
    description_en: |
      Muʾayyad al-Dīn al-ʿUrḍī al-ʿĀmirī al-Dimashqī — Syrian
      Arab astronomer and geometer originally from the village of
      ʿUrḍ, who spent his early career as an engineer in
      Damascus before being summoned in 657 AH (1259 CE) to
      Marāgha by Hulagu Khan to build the observatory under
      Naṣīr al-Dīn al-Ṭūsī's direction — died at Marāgha in 664
      AH (1266 CE). His *Risāla fī Kayfiyyat al-Arṣād* describes
      the instruments he constructed (a mural quadrant, an
      armillary sphere, parallactic rulers, a sextant), and his
      *Kitāb al-Hayʾa* introduced the *ʿUrḍī lemma* — the
      geometric construction that, together with al-Ṭūsī's
      couple, formed the technical core of the Marāgha
      programme of non-Ptolemaic planetary models. Both devices
      reappear in the Greek manuscripts attributed to later
      Byzantine astronomers, and through them in the work of
      Copernicus.
    description_ar: |
      توفي مؤيد الدين العُرضي العامري الدمشقي — فلكي ومهندس
      عربي شامي أصله من قرية عُرض، اشتغل أوّل أمره مهندساً في
      دمشق، ثم استدعي سنة ٦٥٧ هـ (١٢٥٩ م) إلى مراغة بأمر
      هولاكو لإنشاء المرصد تحت إشراف نصير الدين الطوسي —
      بمراغة سنة ٦٦٤ هـ (١٢٦٦ م). وصف في «رسالته في كيفية
      الأرصاد» الآلات التي صنعها (الربع الجداري والكرة ذات
      الحلق والمسطرتين والسدس)، وقدّم في «كتاب الهيئة» ما عُرف
      بـ«مبرهنة العُرضي» — وهي البناء الهندسي الذي شكّل مع
      «زوج الطوسي» النواة الفنية لمشروع مراغة لتقديم نماذج
      كوكبية غير بطلميّة. وقد عادت هاتان الأداتان في
      المخطوطات اليونانية المنسوبة لعلماء فلك بيزنطيين
      متأخرين، ومنها إلى عمل كوبرنيكوس.
    description_fr: |
      Muʾayyad al-Dīn al-ʿUrḍī al-ʿĀmirī al-Dimashqī —
      astronome et géomètre arabe syrien originaire du village
      d'ʿUrḍ, qui débuta sa carrière comme ingénieur à Damas
      avant d'être convoqué en 657 H (1259 EC) à Marāgha par
      Hulagu Khan pour bâtir l'observatoire sous la direction de
      Naṣīr al-Dīn al-Ṭūsī — mourut à Marāgha en 664 H (1266
      EC). Sa *Risāla fī Kayfiyyat al-Arṣād* décrit les
      instruments qu'il construisit (quadrant mural, sphère
      armillaire, règles parallactiques, sextant), et son
      *Kitāb al-Hayʾa* introduisit le *lemme d'al-ʿUrḍī* — la
      construction géométrique qui, avec le couple d'al-Ṭūsī,
      forma le noyau technique du programme de Marāgha pour des
      modèles planétaires non-ptolémaïques. Les deux dispositifs
      réapparaissent dans les manuscrits grecs attribués à des
      astronomes byzantins plus tardifs, et par leur entremise
      dans l'œuvre de Copernic.
    canonical_hijri: {year: 664, precision: year}
    canonical_gregorian: {date: 1266-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Year-only attested; some manuscript notices give 1260, but 664/1266 is the standard date."
      - source_key: editorial
    people: [[al-urdi, died]]
    tags: [mongol-era, ilkhanid, scholar, astronomy, maragha, damascus]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Mu%27ayyad_al-Din_al-%27Urdi"

  - slug: death-of-qutb-al-din-al-shirazi
    category: scholar_death
    title_en: Death of Quṭb al-Dīn al-Shīrāzī — Persian Polymath of Tabrīz
    title_ar: وفاة قطب الدين الشيرازي — موسوعي تبريز الفارسي
    title_fr: Mort de Quṭb al-Dīn al-Shīrāzī — polymathe persan de Tabrīz
    description_en: |
      Maḥmūd ibn Masʿūd al-Shīrāzī, Quṭb al-Dīn — Persian
      polymath, student of Naṣīr al-Dīn al-Ṭūsī at the Marāgha
      observatory and one of the most prolific scholars of his
      generation — died at Tabrīz on 24 Ramaḍān 710 AH (15
      February 1311 CE), aged about 75. His *Nihāyat al-Idrāk fī
      Dirāyat al-Aflāk* and *al-Tuḥfa al-Shāhiyya* developed the
      non-Ptolemaic planetary models of the Marāgha school, and
      his *Sharḥ Ḥikmat al-Ishrāq* (commentary on al-Suhrawardī)
      remains the central exposition of Illuminationist
      philosophy. He also wrote a major commentary on Ibn Sīnā's
      *al-Qānūn fī al-Ṭibb* and an extensive Persian
      encyclopedia, the *Durrat al-Tāj*. Buried in the Charandāb
      cemetery at Tabrīz.
    description_ar: |
      توفي محمود بن مسعود الشيرازي قطب الدين — موسوعي فارسي،
      وتلميذ نصير الدين الطوسي بمرصد مراغة، ومن أكثر علماء
      جيله إنتاجاً — بتبريز يوم ٢٤ رمضان سنة ٧١٠ هـ (الموافق
      ١٥ فبراير ١٣١١ م) عن نحو خمس وسبعين سنة. وفي «نهاية
      الإدراك في دراية الأفلاك» و«التحفة الشاهية» طوّر نماذج
      مدرسة مراغة الكوكبية غير البطلمية، وفي «شرح حكمة
      الإشراق» قدّم الشرح المعتمد لفلسفة السهروردي
      الإشراقية. وله شرح كبير على «القانون في الطب» لابن سينا
      وموسوعة فارسية ضخمة هي «درّة التاج». ودُفن بمقبرة
      جراندآب بتبريز.
    description_fr: |
      Maḥmūd ibn Masʿūd al-Shīrāzī, Quṭb al-Dīn — polymathe
      persan, disciple de Naṣīr al-Dīn al-Ṭūsī à l'observatoire
      de Marāgha et l'un des savants les plus prolifiques de sa
      génération — mourut à Tabrīz le 24 Ramaḍān 710 H (15
      février 1311 EC), à environ 75 ans. Sa *Nihāyat al-Idrāk
      fī Dirāyat al-Aflāk* et sa *Tuḥfa al-Shāhiyya*
      développèrent les modèles planétaires non-ptolémaïques de
      l'école de Marāgha, et son *Sharḥ Ḥikmat al-Ishrāq*
      (commentaire d'al-Suhrawardī) demeure l'exposé central de
      la philosophie illuminationniste. Il rédigea également un
      commentaire majeur du *Qānūn fī al-Ṭibb* d'Ibn Sīnā et une
      vaste encyclopédie persane, la *Durrat al-Tāj*. Enterré au
      cimetière de Charandāb à Tabrīz.
    canonical_hijri: {year: 710, month: 9, day: 24, precision: day}
    canonical_gregorian: {date: 1311-02-15, precision: day, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
      - source_key: ei2
    people: [[qutb-al-din-al-shirazi, died]]
    tags: [ilkhanid, scholar, astronomy, philosophy, persia, tabriz]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Qutb_al-Din_al-Shirazi"

