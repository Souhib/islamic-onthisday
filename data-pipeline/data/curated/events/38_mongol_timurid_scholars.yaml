  - slug: death-of-al-kirmani
    category: scholar_death
    title_en: Death of Shams al-Dīn al-Kirmānī — Commentator of Ṣaḥīḥ al-Bukhārī
    title_ar: وفاة شمس الدين الكرماني — شارح صحيح البخاري
    title_fr: Mort de Shams al-Dīn al-Kirmānī — commentateur du Ṣaḥīḥ al-Bukhārī
    description_en: |
      Muḥammad ibn Yūsuf al-Kirmānī, Shams al-Dīn — Persian
      Shāfiʿī scholar of Baghdad, student of ʿAḍud al-Dīn
      al-Ījī and one of the leading hadith commentators of his
      generation — died in 786 AH (1384 CE) returning from the
      pilgrimage. His *al-Kawākib al-Darārī fī Sharḥ Ṣaḥīḥ
      al-Bukhārī* was, before Ibn Ḥajar's *Fatḥ al-Bārī*, the
      most-circulated full commentary on al-Bukhārī's
      collection — and Ibn Ḥajar would draw on it heavily,
      sometimes critiquing it, in his own canonical work. He
      was buried in Baghdad near the tomb of the Shāfiʿī
      jurist Abū Isḥāq al-Shīrāzī, the *imām of the school* in
      Iraq three centuries earlier.
    description_ar: |
      توفي محمد بن يوسف الكرماني شمس الدين — عالم شافعي
      فارسي ببغداد، وتلميذ عضد الدين الإيجي، ومن أكابر شراح
      الحديث في جيله — راجعاً من الحج سنة ٧٨٦ هـ (١٣٨٤ م).
      وكان «الكواكب الدراري في شرح صحيح البخاري» — قبل
      «فتح الباري» لابن حجر — أوسع شروح صحيح البخاري
      تداولاً، وقد اعتمد عليه ابن حجر اعتماداً كبيراً
      وانتقده أحياناً في كتابه المعتمد. ودفن ببغداد قرب
      قبر الفقيه الشافعي أبي إسحاق الشيرازي إمام المذهب
      بالعراق قبل ثلاثة قرون.
    description_fr: |
      Muḥammad ibn Yūsuf al-Kirmānī, Shams al-Dīn — savant
      shāfiʿite persan de Bagdad, disciple d'ʿAḍud al-Dīn
      al-Ījī et l'un des principaux commentateurs de ḥadīth
      de sa génération — mourut en 786 H (1384 EC) au retour
      du pèlerinage. Son *al-Kawākib al-Darārī fī Sharḥ
      Ṣaḥīḥ al-Bukhārī* fut, avant le *Fatḥ al-Bārī* d'Ibn
      Ḥajar, le commentaire intégral du Ṣaḥīḥ d'al-Bukhārī le
      plus diffusé — et Ibn Ḥajar s'en inspira largement,
      tout en le critiquant à l'occasion, dans son ouvrage
      canonique. Il fut enterré à Bagdad près du tombeau du
      juriste shāfiʿite Abū Isḥāq al-Shīrāzī, *imam de
      l'école* en Iraq trois siècles plus tôt.
    canonical_hijri: {year: 786, precision: year}
    canonical_gregorian: {date: 1384-01-01, precision: year, method: tabular_conversion}
