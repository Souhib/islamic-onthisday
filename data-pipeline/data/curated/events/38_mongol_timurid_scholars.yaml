  - slug: death-of-al-mahalli
    category: scholar_death
    title_en: Death of Jalāl al-Dīn al-Maḥallī — Co-Author of *Tafsīr al-Jalālayn*
    title_ar: وفاة جلال الدين المحلي — أحد مؤلفي تفسير الجلالين
    title_fr: Mort de Jalāl al-Dīn al-Maḥallī — co-auteur du *Tafsīr al-Jalālayn*
    description_en: |
      Muḥammad ibn Aḥmad al-Maḥallī, Jalāl al-Dīn — Egyptian
      Shāfiʿī jurist of Cairo, teacher of al-Suyūṭī and one
      of the principal Shāfiʿī scholars of the late Mamlūk
      period — died in Cairo on 1 Muḥarram 864 AH (28
      October 1459 CE), aged about 70. He authored the
      first half of the *Tafsīr al-Jalālayn* (from Sūrat
      al-Kahf to the end of the Qur'ān, plus al-Fātiḥa) —
      the briefest and most-circulated full Qur'ānic
      commentary in the Sunni world, completed posthumously
      by his pupil al-Suyūṭī. His *Sharḥ al-Maḥallī ʿalā
      Jamʿ al-Jawāmiʿ* (commentary on the *Jamʿ al-Jawāmiʿ*
      of al-Subkī) became the standard Shāfiʿī uṣūl al-fiqh
      textbook for the next four centuries.
    description_ar: |
      توفي محمد بن أحمد المحلي جلال الدين — فقيه شافعي
      مصري بالقاهرة، شيخ السيوطي ومن أكابر علماء
      الشافعية في أواخر العصر المملوكي — بالقاهرة يوم
      أول محرم سنة ٨٦٤ هـ (الموافق ٢٨ أكتوبر ١٤٥٩ م)
      عن نحو سبعين سنة. ألّف النصف الأول من «تفسير
      الجلالين» (من سورة الكهف إلى آخر القرآن، مع
      الفاتحة) — أوجز التفاسير القرآنية الكاملة وأوسعها
      تداولاً في العالم السنّي، أتمّه بعد وفاته تلميذه
      السيوطي. وصار «شرح المحلي على جمع الجوامع» (شرح
      «جمع الجوامع» لتاج الدين السبكي) متن أصول الفقه
      الشافعي المعتمد طوال أربعة قرون.
    description_fr: |
      Muḥammad ibn Aḥmad al-Maḥallī, Jalāl al-Dīn —
      juriste shāfiʿite égyptien du Caire, maître d'al-
      Suyūṭī et l'un des principaux savants shāfiʿites de
      la fin de l'époque mamlouk — mourut au Caire le
      1er Muḥarram 864 H (28 octobre 1459 EC), à environ
      70 ans. Il rédigea la première moitié du *Tafsīr
      al-Jalālayn* (de Sūrat al-Kahf à la fin du Coran,
      plus al-Fātiḥa) — le plus bref et le plus diffusé
      des commentaires coraniques intégraux du monde
      sunnite, achevé après sa mort par son disciple al-
      Suyūṭī. Son *Sharḥ al-Maḥallī ʿalā Jamʿ al-Jawāmiʿ*
      (commentaire du *Jamʿ al-Jawāmiʿ* d'al-Subkī) devint
      le manuel standard d'uṣūl al-fiqh shāfiʿite pour les
      quatre siècles suivants.
