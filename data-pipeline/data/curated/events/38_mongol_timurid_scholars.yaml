  - slug: death-of-al-baydawi
    category: scholar_death
    title_en: Death of al-Bayḍāwī — Author of *Anwār al-Tanzīl*
    title_ar: وفاة البيضاوي — صاحب «أنوار التنزيل»
    title_fr: Mort d'al-Bayḍāwī — auteur d'*Anwār al-Tanzīl*
    description_en: |
      ʿAbd Allāh ibn ʿUmar al-Bayḍāwī, Nāṣir al-Dīn — Persian
      Shāfiʿī jurist, Ashʿarī theologian and chief judge of
      Shīrāz under the Īlkhāns — died at Tabrīz around the end
      of the seventh Hijrī century. His *Anwār al-Tanzīl wa-
      Asrār al-Taʾwīl* condensed and reworked al-Zamakhsharī's
      Muʿtazilite *Kashshāf* into an Ashʿarī-Sunnī tafsīr that
      became the most-taught Qur'ānic commentary in the post-
      classical period — its short, philological style
      generated more super-commentaries than any other tafsīr
      and remained the standard madrasa text from Egypt to
      India for six centuries. He also wrote *Ṭawāliʿ al-Anwār*
      in kalām and *Minhāj al-Wuṣūl* in uṣūl al-fiqh — both
      attracted the same dense layered super-commentary
      tradition. Classical sources differ on his death year
      (685, 691, or 716 AH); the disputed flag is set
      accordingly.
    description_ar: |
      توفي عبد الله بن عمر البيضاوي، ناصر الدين — فقيه شافعي
      فارسي، ومتكلم أشعري، وقاضي القضاة بشيراز في عهد
      الإيلخانات — بتبريز في أواخر القرن السابع الهجري.
      اختصر في «أنوار التنزيل وأسرار التأويل» «الكشاف»
      المعتزلي للزمخشري وأعاد صياغته على المذهب الأشعري
      السنّي، فصار أكثر التفاسير الكلاسيكية تداولاً في
      المرحلة ما بعد الكلاسيكية — إذ ولّد أسلوبه الموجز
      اللغوي حواشي وشروحاً أكثر مما ولّد أيّ تفسير سواه،
      وظلّ متناً مدرسياً معتمداً من مصر إلى الهند ستة
      قرون. وله «طوالع الأنوار» في الكلام و«منهاج الوصول»
      في أصول الفقه، وكلاهما اجتذب التقليد الكثيف من
      الحواشي الطباقية. واختلفت المصادر الكلاسيكية في سنة
      وفاته (٦٨٥ أو ٦٩١ أو ٧١٦ هـ)، ومن ثم رُفع علم
      الخلاف.
    description_fr: |
      ʿAbd Allāh ibn ʿUmar al-Bayḍāwī, Nāṣir al-Dīn — juriste
      shāfiʿite persan, théologien ashʿarite et grand juge de
      Shīrāz sous les Īlkhānides — mourut à Tabrīz vers la fin
      du VIIe siècle hégirien. Son *Anwār al-Tanzīl wa-Asrār
      al-Taʾwīl* condensa et reformula le *Kashshāf*
      muʿtazilite d'al-Zamakhsharī en un tafsīr ashʿarite-
      sunnite qui devint le commentaire coranique le plus
      enseigné de la période post-classique — son style bref
      et philologique suscita plus de super-commentaires
      qu'aucun autre tafsīr et demeura le texte de madrasa
      standard de l'Égypte à l'Inde pendant six siècles. Il
      composa également *Ṭawāliʿ al-Anwār* en kalām et
      *Minhāj al-Wuṣūl* en uṣūl al-fiqh — tous deux attirèrent
      la même tradition dense de super-commentaires en
      strates. Les sources classiques divergent sur l'année de
      sa mort (685, 691 ou 716 H) ; le drapeau de litige est
      donc levé.
    canonical_hijri: {year: 691, precision: year}
    canonical_gregorian: {date: 1292-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "691 AH is the most common position in classical biographical literature; 685 and 716 AH are alternative attestations."
      - source_key: dhahabi_siyar
        notes: "685 AH is the alternative position cited in some Shāfiʿī tabaqāt notices."
      - source_key: ei2
        notes: "Modern scholarship: EI2 / Brill notes the dispute and prefers c. 1286–1316 CE range, with 685/1286 as one position."
    people: [[al-baydawi, died]]
    tags: [ilkhanid, scholar, shafii, ashari, mufassir, persia]
    importance: notable
    verification_status: cross_verified
    disputed: true
    dispute_about: date
    source_url: "https://en.wikipedia.org/wiki/Al-Baydawi"

