  - slug: death-of-umar-al-nasafi
    category: scholar_death
    title_en: Death of Najm al-Dīn ʿUmar al-Nasafī — Author of *al-ʿAqāʾid al-Nasafiyya*
    title_ar: وفاة نجم الدين عمر النسفي — صاحب «العقائد النسفية»
    title_fr: Mort de Najm al-Dīn ʿUmar al-Nasafī — auteur des *ʿAqāʾid al-Nasafiyya*
    description_en: |
      Abū Ḥafṣ Najm al-Dīn ʿUmar ibn Muḥammad al-Nasafī —
      Hanafī-Māturīdī polymath of Samarqand, author of more than
      a hundred works in fiqh, kalām, tafsīr, and history —
      died in 537 AH (1142 CE), aged about 75. His brief
      *al-ʿAqāʾid al-Nasafiyya*, summarising the Maturidi creed
      in a single page, became one of the three seminal Sunni
      doctrinal texts and the standard introductory creed of the
      Hanafi school from Central Asia to the Ottoman lands.
      Sa'd al-Dīn al-Taftāzānī's *Sharḥ al-ʿAqāʾid al-Nasafiyya*
      — the most-taught commentary on it — would carry that
      creed into every Sunni madrasa for the next four
      centuries. Al-Nasafī also authored a Qur'ānic tafsīr
      (*al-Taysīr*) and the historical work *al-Qand fī Dhikr
      ʿUlamāʾ Samarqand*.
    description_ar: |
      توفي أبو حفص نجم الدين عمر بن محمد النسفي — فقيه ومتكلم
      موسوعي حنفي ماتريدي من أهل سمرقند صاحب أكثر من مئة
      مصنف في الفقه والكلام والتفسير والتاريخ — سنة ٥٣٧ هـ
      (١١٤٢ م) عن نحو خمس وسبعين سنة. ومتنه الموجز «العقائد
      النسفية» الذي لخّص فيه عقيدة الماتريدية في صفحة واحدة
      صار من أصول الكتب الثلاثة في العقيدة السنية، ومتن
      المبتدئ المعتمد على المذهب الحنفي من بلاد ما وراء
      النهر إلى الديار العثمانية. وحمل «شرح العقائد
      النسفية» لسعد الدين التفتازاني — أكثر شروحه تداولاً —
      هذا المتن إلى كل مدرسة سنية في القرون الأربعة التي
      تلت. وللنسفي تفسير قرآني سمّاه «التيسير»، وكتاب
      التراجم المشهور «القند في ذكر علماء سمرقند».
    description_fr: |
      Abū Ḥafṣ Najm al-Dīn ʿUmar ibn Muḥammad al-Nasafī —
      polymathe ḥanafī-māturīdī de Samarcande, auteur de plus
      d'une centaine d'ouvrages en fiqh, kalām, tafsīr et
      histoire — mourut en 537 H (1142 EC), à environ 75 ans.
      Son bref *ʿAqāʾid al-Nasafiyya*, résumant le credo
      māturīdī en une seule page, devint l'un des trois textes
      doctrinaux sunnites majeurs et le credo introductif
      standard de l'école ḥanafite, de l'Asie centrale aux
      terres ottomanes. Le *Sharḥ al-ʿAqāʾid al-Nasafiyya* de
      Saʿd al-Dīn al-Taftāzānī — son commentaire le plus
      enseigné — porterait ce credo dans toutes les madrasas
      sunnites pendant les quatre siècles suivants. Al-Nasafī
      composa également un tafsīr coranique (*al-Taysīr*) et
      l'ouvrage historique *al-Qand fī Dhikr ʿUlamāʾ Samarqand*.
    canonical_hijri: {year: 537, precision: year}
    canonical_gregorian: {date: 1142-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: dhahabi_siyar
    people: [[umar-al-nasafi, died]]
