  - slug: death-of-al-bulqini
    category: scholar_death
    title_en: Death of Sirāj al-Dīn al-Bulqīnī — Shāfiʿī Chief Justice of Cairo
    title_ar: وفاة سراج الدين البلقيني — قاضي قضاة الشافعية بالقاهرة
    title_fr: Mort de Sirāj al-Dīn al-Bulqīnī — grand juge shāfiʿite du Caire
    description_en: |
      ʿUmar ibn Raslān al-Bulqīnī, Sirāj al-Dīn — Egyptian
      Shāfiʿī jurist, hadith scholar, and chief justice
      (*qāḍī al-quḍāt*) of Cairo under the Burjī Mamlūks,
      contemporary and rival of Ibn Ḥajar al-ʿAsqalānī's
      teachers — died in Cairo on 11 Dhū al-Qaʿda 805 AH (1
      June 1403 CE), aged about 80. His writings on Shāfiʿī
      fiqh and uṣūl, including the *Tadrīb* and a substantial
      commentary on the *Muhadhdhab* of Abū Isḥāq al-
      Shīrāzī, anchored Egyptian Shāfiʿīsm of the late
      fourteenth century. Ibn Ḥajar would acknowledge him as
      one of the great Shāfiʿī muḥaddithūn of the era and
      narrate from him in *al-Mu'jam al-Mufahras*.
    description_ar: |
      توفي عمر بن رسلان البلقيني سراج الدين — فقيه مصري
      شافعي ومحدث وقاضي قضاة بالقاهرة في عهد المماليك
      البرجية، معاصر شيوخ ابن حجر العسقلاني ومنازعهم —
      بالقاهرة يوم ١١ ذي القعدة سنة ٨٠٥ هـ (الموافق
      ١ يونيو ١٤٠٣ م) عن نحو ثمانين سنة. ورسّخت كتبه في
      الفقه والأصول الشافعيين — ومنها «التدريب» وشرحه
      الكبير على «المهذب» لأبي إسحاق الشيرازي — المذهب
      الشافعي المصري في أواخر القرن الرابع عشر الميلادي.
      وأقرّ ابن حجر بأنه من كبار محدّثي الشافعية في
      عصره، وروى عنه في «المعجم المفهرس».
    description_fr: |
      ʿUmar ibn Raslān al-Bulqīnī, Sirāj al-Dīn — juriste
      shāfiʿite égyptien, savant de ḥadīth et grand juge
      (*qāḍī al-quḍāt*) du Caire sous les Mamlouks burjites,
      contemporain et rival des maîtres d'Ibn Ḥajar al-
      ʿAsqalānī — mourut au Caire le 11 Dhū al-Qaʿda 805 H
      (1er juin 1403 EC), à environ 80 ans. Ses écrits en
      fiqh et uṣūl shāfiʿites, notamment le *Tadrīb* et un
      commentaire substantiel du *Muhadhdhab* d'Abū Isḥāq
      al-Shīrāzī, ancrèrent le shāfiʿisme égyptien de la fin
      du XIVe siècle. Ibn Ḥajar le reconnut comme l'un des
      grands muḥaddithūn shāfiʿites de l'époque et transmit
      de lui dans *al-Muʿjam al-Mufahras*.
    canonical_hijri: {year: 805, month: 11, day: 11, precision: day}
    canonical_gregorian: {date: 1403-06-01, precision: day, method: attested}
