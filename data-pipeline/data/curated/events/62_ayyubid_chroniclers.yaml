  - slug: death-of-ibn-abi-usaybia
    category: scholar_death
    title_en: Death of Ibn Abī Uṣaybiʿa — Biographer of Physicians
    title_ar: وفاة ابن أبي أصيبعة — صاحب «عيون الأنباء»
    title_fr: Mort d'Ibn Abī Uṣaybiʿa — biographe des médecins
    description_en: |
      Muwaffaq al-Dīn Abū al-ʿAbbās Aḥmad ibn al-Qāsim ibn Khalīfa
      ibn Abī Uṣaybiʿa al-Khazrajī — Damascene-born Mamlūk-era
      physician and biographer who served at the Bīmāristān al-Nūrī
      in Damascus and at the court of the Ayyūbid amīr ʿIzz al-Dīn
      Aydamur of Ṣarkhad — died at Ṣarkhad in 668 AH (1270 CE),
      two years after completing the second redaction of his great
      biographical dictionary of physicians. His *ʿUyūn al-Anbāʾ
      fī Ṭabaqāt al-Aṭibbāʾ*, in fifteen chapters running from
      Greek and Indian medicine through pre-Islamic Arabia to his
      own teachers in Cairo and Damascus, is the most important
      single classical Arabic source on the history of medicine in
      Islam, and most of the death dates of physicians elsewhere
      in this dataset are attested through it. Ibn Khallikān, who
      knew him, fixes the year; Ibn al-ʿImād confirms in *Shadharāt
      al-Dhahab*. (See the wave-43 entry on the *ʿUyūn al-Anbāʾ*
      completion in 668 AH for the work itself.)
    description_ar: |
      توفي موفق الدين أبو العبّاس أحمد بن القاسم بن خليفة بن أبي
      أصيبعة الخزرجيُّ — طبيبٌ ومؤرِّخٌ دمشقيُّ المولد من العصر
      المملوكي، خدم بالبيمارستان النوري بدمشق وفي بلاط الأمير
      الأيوبي عز الدين أيدمر صاحب صرخد — بصرخد سنة ثمانٍ وستين
      وستمئة للهجرة (الموافق ١٢٧٠ ميلادي)، بعد سنتين من فراغه
      من التحرير الثاني لمعجمه الكبير في تراجم الأطباء. وكتابه
      «عيون الأنباء في طبقات الأطباء» في خمسة عشر فصلاً، يستوعب
      أطباءَ اليونان والهند والعرب قبل الإسلام، حتى أساتذته
      بالقاهرة ودمشق، هو أهمُّ المصادر العربية الكلاسيكية
      المنفردة في تاريخ الطبّ في الإسلام، ومن طريقه أكثر تواريخ
      وفيات الأطباء في غير هذه المادة. ضبط ابنُ خلكان — وكان
      يعرفه — سنةَ وفاته؛ وأكَّده ابنُ العماد في «شذرات الذهب».
      (ينظر مدخل الموجة ٤٣ على إتمام «عيون الأنباء» سنة ٦٦٨ هـ
      للكتاب نفسه.)
    description_fr: |
      Muwaffaq al-Dīn Abū al-ʿAbbās Aḥmad ibn al-Qāsim ibn Khalīfa
      ibn Abī Uṣaybiʿa al-Khazrajī — médecin et biographe
      d'origine damascène de l'époque mamelouke, qui servit au
      *Bīmāristān al-Nūrī* de Damas et à la cour de l'émir
      ayyūbide ʿIzz al-Dīn Aydamur de Ṣarkhad — mourut à Ṣarkhad
      en 668 H (1270 EC), deux ans après avoir achevé la seconde
      rédaction de son grand dictionnaire biographique des
      médecins. Ses *ʿUyūn al-Anbāʾ fī Ṭabaqāt al-Aṭibbāʾ*, en
      quinze chapitres allant de la médecine grecque et indienne
      à l'Arabie préislamique jusqu'à ses propres maîtres au
      Caire et à Damas, sont la source arabe classique unique
      la plus importante pour l'histoire de la médecine en
      islam, et la plupart des dates de mort des médecins citées
      ailleurs dans cette base sont attestées par lui. Ibn
      Khallikān, qui le connaissait, fixe l'année ; Ibn al-ʿImād
      confirme dans *Shadharāt al-Dhahab*. (Voir l'entrée vague-43
      sur l'achèvement des *ʿUyūn al-Anbāʾ* en 668 H pour
      l'ouvrage lui-même.)
