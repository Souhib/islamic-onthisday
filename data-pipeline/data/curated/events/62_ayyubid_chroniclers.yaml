  - slug: death-of-ibn-wasil-al-hamawi
    category: scholar_death
    title_en: Death of Ibn Wāṣil al-Ḥamawī — Author of *Mufarrij al-Kurūb*
    title_ar: وفاة ابن واصل الحموي — صاحب «مفرِّج الكروب»
    title_fr: Mort d'Ibn Wāṣil al-Ḥamawī — auteur de *Mufarrij al-Kurūb*
    description_en: |
      Jamāl al-Dīn Abū ʿAbd Allāh Muḥammad ibn Sālim ibn Wāṣil
      al-Ḥamawī al-Shāfiʿī — Ḥamāh-born Shāfiʿī jurist, qāḍī
      of the Ayyūbid principality of Ḥamāh, ambassador of the
      Mamlūk sultan Baybars to Manfred of Sicily (1261 CE), and
      author of the standard chronicle of the Ayyūbid dynasty —
      died at Ḥamāh in 697 AH (1298 CE). His *Mufarrij al-Kurūb
      fī Akhbār Banī Ayyūb*, in five surviving volumes, narrates
      the rise of Saladin's family from its Kurdish origins through
      the conquest of Egypt to the dynasty's eclipse and the rise
      of the Mamlūks; Ibn Wāṣil himself participated in the
      embassies of his time and writes from direct observation of
      the late-Ayyūbid courts of Ḥamāh and Damascus. Ibn al-ʿImād
      fixes the year of death and confirms his authorship of the
      *Mufarrij*; al-Dhahabī notices him in *Tārīkh al-Islām*.
    description_ar: |
      توفي جمال الدين أبو عبد الله محمد بن سالم ابن واصل
      الحمويُّ الشافعيُّ — فقيهٌ شافعيٌّ من حماة، وقاضي
      الإمارة الأيوبية بحماة، وسفيرُ السلطان المملوكي بيبرس
      إلى ملك صقلية مانفريد سنة ٦٥٩ هـ (١٢٦١ م)، وصاحبُ
      تاريخ الدولة الأيوبية المعتمَد — بحماة سنة سبعٍ وتسعين
      وستمئة للهجرة (الموافق ١٢٩٨ ميلادي). وكتابه «مفرِّج
      الكروب في أخبار بني أيوب» في خمسة مجلدات وصلت إلينا،
      يسرد قيام آل صلاح الدين من أصولهم الكردية إلى فتح
      مصر، إلى أفول الدولة وقيام دولة المماليك؛ وقد شارك
      ابنُ واصل في سفارات عصره فكتب عن مشاهدةٍ من بلاط
      حماة ودمشق في أواخر العصر الأيوبيِّ. ضبط ابنُ العماد
      سنةَ وفاته، وأكَّد نسبةَ «المفرِّج» إليه؛ وعليه
      الذهبيُّ في «تاريخ الإسلام».
    description_fr: |
      Jamāl al-Dīn Abū ʿAbd Allāh Muḥammad ibn Sālim ibn Wāṣil
      al-Ḥamawī al-Shāfiʿī — juriste shāfiʿite né à Ḥamāh,
      qāḍī de la principauté ayyūbide de Ḥamāh, ambassadeur
      du sultan mamelouk Baybars auprès de Manfred de Sicile
      (1261 EC), et auteur de la chronique standard de la
      dynastie ayyūbide — mourut à Ḥamāh en 697 H (1298 EC).
      Son *Mufarrij al-Kurūb fī Akhbār Banī Ayyūb*, dans les
      cinq volumes conservés, retrace l'ascension de la
      famille de Saladin de ses origines kurdes à la conquête
      de l'Égypte, jusqu'à l'éclipse de la dynastie et à la
      montée des Mamelouks ; Ibn Wāṣil prit part aux ambassades
      de son temps et écrit d'observation directe des cours
      ayyūbides tardives de Ḥamāh et de Damas. Ibn al-ʿImād
      fixe l'année de la mort et confirme son autorité sur
      le *Mufarrij* ; al-Dhahabī le mentionne dans *Tārīkh
      al-Islām*.
