  - slug: death-of-imad-al-din-al-isfahani
    category: scholar_death
    title_en: Death of ʿImād al-Dīn al-Iṣfahānī — Saladin's Secretary and Historian
    title_ar: وفاة العماد الأصبهاني — كاتب صلاح الدين ومؤرِّخه
    title_fr: Mort d'ʿImād al-Dīn al-Iṣfahānī — secrétaire et historien de Saladin
    description_en: |
      ʿImād al-Dīn Abū ʿAbd Allāh Muḥammad ibn Muḥammad al-Iṣfahānī
      al-Kātib — Persian-born secretary first to Nūr al-Dīn Maḥmūd
      Zankī at Damascus and then, after 570 AH, to Saladin in his
      Egyptian and Syrian campaigns; one of the two principal
      eyewitness historians of the Third Crusade — died at Damascus
      on 1 Ramaḍān 597 AH (5 June 1201 CE). His *al-Fatḥ al-Qussī
      fī al-Fatḥ al-Qudsī* is the most detailed contemporary
      Arabic narrative of Saladin's reconquest of Jerusalem and
      the war with Richard the Lionheart, written in the elaborate
      rhymed prose (*sajʿ*) of the late Ayyūbid chancery; his
      *Kharīdat al-Qaṣr wa-Jarīdat al-ʿAṣr*, an anthology of
      contemporary Arabic poetry organised geographically, is the
      principal source for the literary history of the sixth AH
      century. Ibn Khallikān gives the day and place; al-Dhahabī
      confirms in *Siyar* among the wafayāt of 597.
    description_ar: |
      توفي العماد الكاتب أبو عبد الله محمد بن محمد الأصبهاني —
      كاتبٌ فارسيُّ الأصل لازمَ نورَ الدين محمود زنكي بدمشق ثم
      انتقل بعد سنة ٥٧٠ هـ إلى ديوانِ صلاحِ الدين في غزواته
      المصرية والشامية، فصار أحدَ شاهدَي العيانِ الكبيرين على
      الحملة الصليبية الثالثة — بدمشق في غُرَّة رمضان سنة
      سبعٍ وتسعين وخمسمئة للهجرة (الموافق ٥ يونيو ١٢٠١ ميلادي).
      وكتابه «الفتح القُسِّي في الفتح القدسي» أوسعُ ما خلَّفه
      المعاصرون من سرد عربي لتحرير صلاحِ الدين بيتَ المقدس
      وحربه مع ريتشارد قلب الأسد، صاغه في السجع المنمَّق الذي
      ساد ديوانَ الإنشاء الأيوبيَّ المتأخّر؛ و«خريدة القصر
      وجريدة العصر» مجموعٌ في شعراء العصر مرتَّبٌ على البلدان،
      وهو أول مصادر الأدب العربيِّ في القرن السادس. ضبط ابنُ
      خلكان يومَ وفاته ومكانَها؛ وعليه الذهبيُّ في وفيات ٥٩٧
      من «السير».
    description_fr: |
      ʿImād al-Dīn Abū ʿAbd Allāh Muḥammad ibn Muḥammad al-Iṣfahānī
      al-Kātib — secrétaire d'origine persane d'abord auprès de
      Nūr al-Dīn Maḥmūd Zankī à Damas, puis après 570 H auprès
      de Saladin dans ses campagnes égyptiennes et syriennes ;
      l'un des deux principaux témoins-historiens contemporains
      de la troisième Croisade — mourut à Damas le 1ᵉʳ Ramaḍān
      597 H (5 juin 1201 EC). Son *al-Fatḥ al-Qussī fī al-Fatḥ
      al-Qudsī* est le récit arabe contemporain le plus détaillé
      de la reconquête de Jérusalem par Saladin et de la guerre
      contre Richard Cœur de Lion, rédigé dans la prose rimée
      (*sajʿ*) élaborée de la chancellerie ayyūbide tardive ;
      sa *Kharīdat al-Qaṣr wa-Jarīdat al-ʿAṣr*, anthologie de la
      poésie arabe contemporaine organisée par régions, est la
      source principale pour l'histoire littéraire du VIᵉ siècle
      de l'Hégire. Ibn Khallikān donne le jour et le lieu ;
      al-Dhahabī confirme dans les *Siyar* parmi les wafayāt
      de 597.
