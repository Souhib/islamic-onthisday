# Wave 62 of curated event additions (2026-04-27).
# Major Ayyūbid-era and post-Ayyūbid Sunni chroniclers, biographers,
# secretaries, and court historians whose deaths constitute well-attested
# anchor points in the historiography of the Crusades / Mongol period.
# This file extends the existing biographical-historian coverage:
# Ibn Khallikān (wave 19), ʿIzz al-Dīn Ibn al-Athīr (wave 17), Majd al-Dīn
# Ibn al-Athīr (wave 25), Sibṭ Ibn al-Jawzī (wave 21), Abū al-Fidāʾ
# (wave 38), and the wave-43 Ibn Abī Uṣaybiʿa book-completion entry are
# already in the dataset and not duplicated here. The figures below
# round out the Ayyūbid-Mamlūk transition: the chancery secretaries
# of Saladin (al-Qāḍī al-Fāḍil and ʿImād al-Dīn al-Iṣfahānī), his
# personal biographer (Bahāʾ al-Dīn Ibn Shaddād), the great
# Ayyūbid-Aleppine historian Ibn al-ʿAdīm, the Ḥamawī court historian
# Ibn Wāṣil, the Damascene chronicler-jurist Abū Shāma, the late-
# Mamlūk continuator al-Yūnīnī, the death of Ibn Abī Uṣaybiʿa himself,
# the standard ḥadīth-targhīb compiler al-Mundhirī, and the
# Abbasid-court librarian-historian Ibn al-Sāʿī. Cross-verification
# leans on Ibn Khallikān (where the figure predates 681 AH),
# al-Dhahabī's Siyar / Tārīkh al-Islām, Ibn Kathīr's Bidāya, Ibn
# al-ʿImād's Shadharāt al-Dhahab, and Ibn Ḥajar's Durar (for the
# 8th-AH-century al-Yūnīnī). Trilingual en/ar/fr throughout. No
# hadith refs (no narration directly anchors a chronicler's death).
# Date precision uses day only where the classical sources explicitly
# attest the day; otherwise year-only.

events:
  # =========================================================================
  # SECRETARIES AND BIOGRAPHERS OF THE AYYŪBID COURT (596–632 AH)
  # =========================================================================

  - slug: death-of-al-qadi-al-fadil
    category: scholar_death
    title_en: Death of al-Qāḍī al-Fāḍil — Saladin's Chancellor and Master Stylist
    title_ar: وفاة القاضي الفاضل — كاتبُ ديوانِ صلاحِ الدين
    title_fr: Mort d'al-Qāḍī al-Fāḍil — chancelier et maître du style de Saladin
    description_en: |
      Abū ʿAlī ʿAbd al-Raḥīm ibn ʿAlī al-Bīsānī al-ʿAsqalānī, known as
      al-Qāḍī al-Fāḍil — head of Saladin's chancery (*dīwān al-inshāʾ*),
      author of the most-imitated Arabic epistolary style of the late
      sixth century AH, and Saladin's closest civilian counsellor —
      died at Cairo on 7 Rabīʿ II 596 AH (26 January 1200 CE). Born at
      ʿAsqalān into a family of Fāṭimid administrators, he served the
      Fāṭimids before transferring to the Ayyūbid administration in
      567 AH and becoming the indispensable architect of Saladin's
      diplomatic correspondence with the Abbasid caliph, the Crusader
      states, and rival Muslim powers. His *Rasāʾil* — preserved
      heavily in ʿImād al-Dīn al-Iṣfahānī's *al-Fatḥ al-Qussī* and in
      the later anthologies — set the canonical model for *inshāʾ*
      prose for the rest of the medieval period. Ibn Khallikān fixes
      the day; al-Dhahabī confirms in *Siyar Aʿlām al-Nubalāʾ*.
    description_ar: |
      توفي القاضي الفاضل أبو علي عبد الرحيم بن علي البيسانيُّ
      العسقلانيُّ — رئيسُ ديوان الإنشاء عند صلاحِ الدين، وصاحبُ
      أكثرِ أساليب الترسُّل العربيِّ تأثيراً في أواخر القرن السادس
      الهجري، وأقربُ مستشاريه المدنيين — بالقاهرة في السابع من ربيعٍ
      الآخر سنة ستٍّ وتسعين وخمسمئة للهجرة (الموافق ٢٦ يناير
      ١٢٠٠ ميلادي). ولد بعسقلان في بيتٍ من بيوت كتَّاب الدولة
      الفاطمية، فخدمها زمناً ثم انتقل إلى الديوان الأيوبيِّ سنة
      ٥٦٧ هـ، فصار المهندسَ الذي لا غنى عنه لمراسلات صلاحِ
      الدين مع الخلافة العباسية والمماليك الصليبية وسائر الدول
      الإسلامية المنازِعة. ورسائله — المحفوظة في «الفتح القُسِّي»
      للعماد الأصبهاني وفي مجاميع الرسائل اللاحقة — هي النموذجُ
      المعتمَدُ في فنّ الإنشاء بقيّةَ العصور الوسطى. ضبط ابنُ
      خلكان يومَ وفاته؛ وأكَّده الذهبيُّ في «سير أعلام النبلاء».
    description_fr: |
      Abū ʿAlī ʿAbd al-Raḥīm ibn ʿAlī al-Bīsānī al-ʿAsqalānī, dit
      al-Qāḍī al-Fāḍil — chef de la chancellerie de Saladin
      (*dīwān al-inshāʾ*), auteur du style épistolaire arabe le
      plus imité de la fin du VIᵉ siècle de l'Hégire, et conseiller
      civil le plus proche du sultan — mourut au Caire le 7 Rabīʿ II
      596 H (26 janvier 1200 EC). Né à ʿAsqalān dans une famille
      d'administrateurs fāṭimides, il servit les Fāṭimides puis
      passa à l'administration ayyūbide en 567 H, devenant
      l'architecte indispensable de la correspondance diplomatique
      de Saladin avec le calife abbasside, les États croisés et
      les puissances musulmanes rivales. Ses *Rasāʾil* — largement
      préservées dans *al-Fatḥ al-Qussī* d'ʿImād al-Dīn al-Iṣfahānī
      et dans les anthologies postérieures — fixèrent le modèle
      canonique de la prose d'*inshāʾ* pour le reste du Moyen Âge.
      Ibn Khallikān fixe le jour ; al-Dhahabī confirme dans *Siyar
      Aʿlām al-Nubalāʾ*.
    canonical_hijri: {year: 596, month: 4, day: 7, precision: day}
    canonical_gregorian: {date: 1200-01-26, precision: day, method: attested}
