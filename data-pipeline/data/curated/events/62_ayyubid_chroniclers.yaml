  - slug: death-of-al-mundhiri
    category: scholar_death
    title_en: Death of al-Mundhirī — Author of *al-Targhīb wa-l-Tarhīb*
    title_ar: وفاة المنذريِّ — صاحب «الترغيب والترهيب»
    title_fr: Mort d'al-Mundhirī — auteur d'*al-Targhīb wa-l-Tarhīb*
    description_en: |
      Zakī al-Dīn Abū Muḥammad ʿAbd al-ʿAẓīm ibn ʿAbd al-Qawī
      al-Mundhirī al-Shāfiʿī — Damascene-born Egyptian muḥaddith,
      shaykh of the Dār al-Ḥadīth al-Kāmiliyya at Cairo for nearly
      two decades, and the leading transmitter of the standard
      hadith collections to the next generation of Egyptian
      scholars — died at Cairo on 4 Dhū al-Qaʿda 656 AH (1
      November 1258 CE) at age seventy-six. His *al-Targhīb wa-l-
      Tarhīb min al-Ḥadīth al-Sharīf* organises Prophetic narrations
      thematically by encouragement (*targhīb*) and warning
      (*tarhīb*), grading each report by isnād-strength, and remains
      one of the most-printed devotional hadith works in Sunni
      use; his abridgements of the *Sunan* of Abū Dāwūd
      (*al-Mukhtaṣar*) and of Sahih Muslim were standard teaching
      texts well into the Ottoman period. Ibn Khallikān fixes the
      day; al-Dhahabī confirms in *Siyar*.
    description_ar: |
      توفي زكيُّ الدين أبو محمد عبد العظيم بن عبد القوي المنذريُّ
      الشافعيُّ — محدِّثٌ مصريٌّ دمشقيُّ المولد، تولَّى مشيخةَ دار
      الحديث الكاملية بالقاهرة قرابة عشرين سنة، وكان مَن انتهى
      إليه إسنادُ كتب الحديث المعتمدة في طبقته — بالقاهرة في
      الرابع من ذي القعدة سنة ست وخمسين وستمئة للهجرة (الموافق
      أوّلَ نوفمبر ١٢٥٨ ميلادي) عن ست وسبعين سنة. وكتابه
      «الترغيب والترهيب من الحديث الشريف» رتَّب الأحاديث على
      أبواب الترغيب والترهيب، وحكم على كلِّ حديث بقوة سنده، وما
      يزال من أكثر كتب الحديث الوعظيِّ تداولاً في المذهب السنّي؛
      ومختصراه لـ«سنن أبي داود» و«صحيح مسلم» من نصوص التدريس
      المعتمدة إلى العصر العثماني. ضبط ابنُ خلكان يومَ وفاته؛
      وعليه الذهبيُّ في «السير».
    description_fr: |
      Zakī al-Dīn Abū Muḥammad ʿAbd al-ʿAẓīm ibn ʿAbd al-Qawī
      al-Mundhirī al-Shāfiʿī — muḥaddith égyptien né à Damas,
      directeur (*shaykh*) de la *Dār al-Ḥadīth al-Kāmiliyya*
      du Caire pendant près de vingt ans, et principal
      transmetteur des collections hadithiques canoniques à la
      génération suivante des savants égyptiens — mourut au
      Caire le 4 Dhū al-Qaʿda 656 H (1ᵉʳ novembre 1258 EC), à
      soixante-seize ans. Son *al-Targhīb wa-l-Tarhīb min al-
      Ḥadīth al-Sharīf* classe les récits prophétiques de manière
      thématique selon l'encouragement (*targhīb*) et
      l'avertissement (*tarhīb*), gradant chaque rapport par la
      force de l'isnād, et demeure l'un des ouvrages hadithiques
      dévotionnels les plus imprimés dans l'usage sunnite ; ses
      abrégés des *Sunan* d'Abū Dāwūd et du *Ṣaḥīḥ* de Muslim
      furent des textes d'enseignement standards jusqu'à l'époque
      ottomane. Ibn Khallikān fixe le jour ; al-Dhahabī confirme
      dans les *Siyar*.
    canonical_hijri: {year: 656, month: 11, day: 4, precision: day}
    canonical_gregorian: {date: 1258-11-01, precision: day, method: attested}
    claims:
