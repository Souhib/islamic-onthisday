  - slug: death-of-baha-al-din-ibn-shaddad
    category: scholar_death
    title_en: Death of Bahāʾ al-Dīn Ibn Shaddād — Saladin's Biographer
    title_ar: وفاة بهاء الدين ابن شدّاد — مؤرِّخ صلاحِ الدين
    title_fr: Mort de Bahāʾ al-Dīn Ibn Shaddād — biographe de Saladin
    description_en: |
      Bahāʾ al-Dīn Abū al-Maḥāsin Yūsuf ibn Rāfiʿ ibn Shaddād —
      Mosul-trained Shāfiʿī jurist who joined Saladin's court in
      584 AH as army-judge (*qāḍī al-ʿaskar*) and intimate counsellor,
      then served as chief judge of Aleppo under al-Ẓāhir Ghāzī and
      his successors for nearly half a century — died at Aleppo on
      14 Ṣafar 632 AH (8 November 1234 CE) at age ninety. His *al-
      Nawādir al-Sulṭāniyya wa-l-Maḥāsin al-Yūsufiyya*, the most
      personal of the contemporary biographies of Saladin, mixes
      direct conversation, court anecdote, and battlefield narrative
      from his three years of constant attendance during the Third
      Crusade. He founded two madrasas at Aleppo (the Ṣāḥibiyya
      Shāfiʿiyya and a hadith dār) which remained centres of Shāfiʿī
      teaching into the Mamlūk period. Ibn Khallikān gives the day
      and place; al-Dhahabī confirms in *Tārīkh al-Islām*.
    description_ar: |
      توفي بهاء الدين أبو المحاسن يوسف بن رافع بن شدّاد — فقيهٌ
      شافعيٌّ موصليُّ النشأة، التحق بصلاحِ الدين سنة ٥٨٤ هـ
      قاضياً للعسكر ومستشاراً ملازماً، ثم تولّى قضاءَ حلب لـ
      الظاهر غازي ولمن جاء بعده قرابة نصف قرن — بحلب في الرابع
      عشر من صفر سنة اثنتين وثلاثين وستمئة للهجرة (الموافق
      ٨ نوفمبر ١٢٣٤ ميلادي) عن تسعين سنة. وكتابه «النوادر
      السلطانية والمحاسن اليوسفية» أشدُّ ترجمات صلاحِ الدين
      المعاصرة شخصيةً، يجمع الحوارَ المباشرَ ونوادرَ المجلس
      وأخبارَ الميدان من ثلاث سنواتٍ لازمَه فيها أيامَ الحملة
      الصليبية الثالثة. وأنشأ بحلب مدرستين شافعيتين (الصاحبية
      ودار حديث) ظلّتا من مراكز المذهب الشافعي إلى العصر
      المملوكي. ضبط ابنُ خلكان يومَ وفاته ومكانَها؛ وعليه
      الذهبيُّ في «تاريخ الإسلام».
    description_fr: |
      Bahāʾ al-Dīn Abū al-Maḥāsin Yūsuf ibn Rāfiʿ ibn Shaddād —
      juriste shāfiʿite formé à Mossoul qui rejoignit la cour
      de Saladin en 584 H comme juge militaire (*qāḍī al-ʿaskar*)
      et conseiller intime, puis servit comme grand juge d'Alep
      sous al-Ẓāhir Ghāzī et ses successeurs durant près d'un
      demi-siècle — mourut à Alep le 14 Ṣafar 632 H (8 novembre
      1234 EC), à quatre-vingt-dix ans. Son *al-Nawādir al-
      Sulṭāniyya wa-l-Maḥāsin al-Yūsufiyya*, la plus personnelle
      des biographies contemporaines de Saladin, mêle conversation
      directe, anecdote de cour et récit de bataille tirés de
      ses trois années d'attendance constante pendant la troisième
      Croisade. Il fonda à Alep deux madrasas (la Ṣāḥibiyya
      shāfiʿite et une *dār al-ḥadīth*) qui demeurèrent des
      centres d'enseignement shāfiʿite jusqu'à l'époque mamelouke.
      Ibn Khallikān donne le jour et le lieu ; al-Dhahabī confirme
      dans *Tārīkh al-Islām*.
    canonical_hijri: {year: 632, month: 2, day: 14, precision: day}
    canonical_gregorian: {date: 1234-11-08, precision: day, method: attested}
