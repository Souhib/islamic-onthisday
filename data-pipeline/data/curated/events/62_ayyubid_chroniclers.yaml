  - slug: death-of-ibn-al-sai
    category: scholar_death
    title_en: Death of Ibn al-Sāʿī — Abbasid Court Historian and Librarian
    title_ar: وفاة ابن الساعي — مؤرِّخُ الخلافة العباسية وأمينُ خزانتها
    title_fr: Mort d'Ibn al-Sāʿī — historien et bibliothécaire de la cour abbasside
    description_en: |
      Tāj al-Dīn Abū Ṭālib ʿAlī ibn Anjab ibn al-Sāʿī al-Khāzin
      al-Baghdādī — last librarian (*khāzin*) of the Mustanṣiriyya
      madrasa-library at Baghdad before the Mongol sack of 656 AH,
      and the principal Sunni court historian of the late Abbasid
      caliphate — died at Baghdad in 674 AH (1276 CE) at age about
      eighty-three. His *al-Jāmiʿ al-Mukhtaṣar fī ʿUnwān al-Tawārīkh
      wa-ʿUyūn al-Siyar* is one of the earliest surviving Sunni
      narratives of the fall of Baghdad to Hülegü, written by an
      eyewitness who lived through the catastrophe; his *Nisāʾ al-
      Khulafāʾ* (also titled *Jihāt al-Aʾimma al-Khulafāʾ min al-
      Ḥarāʾir wa-l-Imāʾ*) preserves biographies of caliphal consorts
      from the Umayyad through Abbasid periods and remains a unique
      source for the social history of the caliphal court. Ibn al-
      Fuwaṭī, his student, fixes the death year; al-Dhahabī confirms
      in *Tārīkh al-Islām*.
    description_ar: |
      توفي تاج الدين أبو طالب علي بن أنجب ابن الساعي الخازن
      البغداديُّ — آخرُ خازنٍ لمكتبة المدرسة المستنصرية ببغداد
      قبل سقوطها بيد المغول سنة ٦٥٦ هـ، ومؤرِّخُ بلاط الخلافة
      العباسية الأخير — ببغداد سنة أربع وسبعين وستمئة للهجرة
      (الموافق ١٢٧٦ ميلادي) عن نحو ثلاث وثمانين سنة. وكتابه
      «الجامع المختصر في عنوان التواريخ وعيون السير» من أوائل
      ما وصلنا من السرد السنّي لسقوط بغداد بيد هولاكو، كتبه
      شاهدُ عيانٍ نجا من الكارثة؛ وكتابه «نساء الخلفاء» (واسمه
      الآخر «جهات الأئمة الخلفاء من الحرائر والإماء») يحفظ تراجم
      حظايا الخلفاء من العصر الأموي إلى العصر العباسي، وهو
      مصدرٌ فريدٌ في التاريخ الاجتماعيِّ لبلاط الخلافة. ضبط
      تلميذه ابنُ الفُوَطي سنةَ وفاته؛ وأكَّده الذهبيُّ في
      «تاريخ الإسلام».
    description_fr: |
      Tāj al-Dīn Abū Ṭālib ʿAlī ibn Anjab ibn al-Sāʿī al-Khāzin
      al-Baghdādī — dernier bibliothécaire (*khāzin*) de la
      bibliothèque-madrasa al-Mustanṣiriyya à Bagdad avant le
      sac mongol de 656 H, et principal historien sunnite de
      la cour du califat abbasside tardif — mourut à Bagdad
      en 674 H (1276 EC), à environ quatre-vingt-trois ans.
      Son *al-Jāmiʿ al-Mukhtaṣar fī ʿUnwān al-Tawārīkh wa-
      ʿUyūn al-Siyar* est l'un des premiers récits sunnites
      conservés de la chute de Bagdad face à Hülegü, rédigé
      par un témoin oculaire qui survécut à la catastrophe ;
      ses *Nisāʾ al-Khulafāʾ* (également intitulés *Jihāt al-
      Aʾimma al-Khulafāʾ min al-Ḥarāʾir wa-l-Imāʾ*) préservent
      les biographies des consortes califales de l'époque
      umayyade à l'époque abbasside et demeurent une source
      unique pour l'histoire sociale de la cour califale. Son
      élève Ibn al-Fuwaṭī fixe l'année de la mort ; al-Dhahabī
      confirme dans *Tārīkh al-Islām*.
    canonical_hijri: {year: 674, precision: year}
    canonical_gregorian: {date: 1276-01-01, precision: year, method: tabular_conversion}
