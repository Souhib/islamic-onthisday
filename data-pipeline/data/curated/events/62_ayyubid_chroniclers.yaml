  - slug: death-of-al-yunini
    category: scholar_death
    title_en: Death of al-Yūnīnī — Continuator of Sibṭ Ibn al-Jawzī
    title_ar: وفاة اليونيني — مذيِّل «مرآة الزمان» لسبط ابن الجوزي
    title_fr: Mort d'al-Yūnīnī — continuateur de Sibṭ Ibn al-Jawzī
    description_en: |
      Quṭb al-Dīn Abū al-Fatḥ Mūsā ibn Muḥammad al-Yūnīnī al-
      Baʿlabakkī al-Ḥanbalī — Baʿlabakk-born Ḥanbalī muḥaddith,
      son of the renowned Ḥanbalī ascetic shaykh ʿAbd Allāh al-
      Yūnīnī, and historian of the early Mamlūk decades — died at
      Baʿlabakk in 726 AH (1326 CE). His *Dhayl Mirʾāt al-Zamān*
      continues Sibṭ Ibn al-Jawzī's *Mirʾāt al-Zamān fī Tārīkh al-
      Aʿyān* from 654 AH down to his own time, supplying the most
      detailed annalistic Sunni narrative of the early Mamlūk
      sultanate (Baybars, Qalāwūn, al-Ashraf Khalīl, al-Nāṣir
      Muḥammad), the late Crusader campaigns, and the third Mongol
      offensive. Al-Yūnīnī also produced an authoritative collation
      of Ṣaḥīḥ al-Bukhārī from multiple manuscript traditions
      (the *Yūnīniyya* recension), which became the standard
      textual base for many later printings. Ibn Ḥajar fixes the
      year of death in *al-Durar al-Kāmina*; Ibn al-ʿImād confirms
      in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي قطب الدين أبو الفتح موسى بن محمد اليونينيُّ
      البعلبكيُّ الحنبليُّ — محدِّثٌ حنبليٌّ من بعلبك، ابنُ
      الشيخ الزاهد الحنبلي عبد الله اليونيني، ومؤرِّخُ العقود
      الأولى من الدولة المملوكية — ببعلبك سنة ست وعشرين
      وسبعمئة للهجرة (الموافق ١٣٢٦ ميلادي). وكتابه «ذيل مرآة
      الزمان» يذيِّل «مرآة الزمان في تاريخ الأعيان» لسبط ابن
      الجوزي من سنة ٦٥٤ هـ إلى وقته، فيقدِّم أوسعَ سردٍ
      سنويٍّ سنّيٍّ لأوائل دولة المماليك (بيبرس وقلاوون
      والأشرف خليل والناصر محمد)، ولأواخر الحروب الصليبية،
      وللهجمة المغولية الثالثة. وله أيضاً ضبطٌ نقديٌّ
      لـ«صحيح البخاري» على عدّة روايات (المعروف بالنسخة
      اليونينية)، صار الأساسَ النصّي للكثير من الطبعات
      اللاحقة. ضبط ابنُ حجر سنةَ وفاته في «الدرر الكامنة»؛
      وأكَّده ابنُ العماد في «شذرات الذهب».
    description_fr: |
      Quṭb al-Dīn Abū al-Fatḥ Mūsā ibn Muḥammad al-Yūnīnī al-
      Baʿlabakkī al-Ḥanbalī — muḥaddith ḥanbalite né à Baʿlabakk,
      fils du célèbre cheikh ascète ḥanbalite ʿAbd Allāh al-
      Yūnīnī, et historien des premières décennies mameloukes —
      mourut à Baʿlabakk en 726 H (1326 EC). Son *Dhayl Mirʾāt
      al-Zamān* continue le *Mirʾāt al-Zamān fī Tārīkh al-Aʿyān*
      de Sibṭ Ibn al-Jawzī à partir de 654 H jusqu'à son temps,
      fournissant le récit annalistique sunnite le plus détaillé
      du début du sultanat mamelouk (Baybars, Qalāwūn, al-Ashraf
      Khalīl, al-Nāṣir Muḥammad), des dernières campagnes
      croisées et de la troisième offensive mongole. Al-Yūnīnī
      produisit aussi une collation faisant autorité du *Ṣaḥīḥ*
      d'al-Bukhārī à partir de plusieurs traditions manuscrites
      (la recension *Yūnīniyya*), qui devint la base textuelle
      standard de nombreuses impressions ultérieures. Ibn Ḥajar
      fixe l'année de la mort dans *al-Durar al-Kāmina* ; Ibn
      al-ʿImād confirme dans *Shadharāt al-Dhahab*.
