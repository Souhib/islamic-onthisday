  - slug: death-of-abu-shama-al-maqdisi
    category: scholar_death
    title_en: Death of Abū Shāma al-Maqdisī — Historian of the Two Reigns
    title_ar: وفاة أبي شامة المقدسي — مؤرِّخ الدولتين النورية والصلاحية
    title_fr: Mort d'Abū Shāma al-Maqdisī — historien des deux règnes
    description_en: |
      Shihāb al-Dīn Abū Shāma ʿAbd al-Raḥmān ibn Ismāʿīl al-Maqdisī
      al-Dimashqī al-Shāfiʿī — Damascene Shāfiʿī jurist, Qurʾān-
      reciter, and one of the principal teachers of the Mamlūk-era
      hadith scholar al-Nawawī — was attacked at his home and died
      from his wounds at Damascus on 19 Ramaḍān 665 AH (13 June
      1267 CE) at age sixty-eight. His *Kitāb al-Rawḍatayn fī
      Akhbār al-Dawlatayn al-Nūriyya wa-l-Ṣalāḥiyya* is the
      standard composite chronicle of the two reigns of Nūr al-
      Dīn Maḥmūd Zankī and Saladin, woven from the lost narratives
      of Ibn Abī Ṭayyiʾ and the surviving works of ʿImād al-Dīn
      al-Iṣfahānī, al-Qāḍī al-Fāḍil, and Ibn Shaddād, with Abū
      Shāma's own continuation (*al-Dhayl ʿalā al-Rawḍatayn*)
      taking the narrative through his own lifetime. Ibn Khallikān
      gives the day; al-Dhahabī confirms in *Siyar*.
    description_ar: |
      توفي شهاب الدين أبو شامة عبد الرحمن بن إسماعيل المقدسيُّ
      الدمشقيُّ الشافعيُّ — فقيهٌ شافعيٌّ ومقرئٌ دمشقيٌّ،
      وأحدُ شيوخ المحدِّث المملوكيِّ النوويّ — بعد أن هُجِم على
      منزله بدمشق متأثراً بجراحه يوم التاسع عشر من رمضان سنة
      خمسٍ وستين وستمئة للهجرة (الموافق ١٣ يونيو ١٢٦٧ ميلادي)
      عن ثمانٍ وستين سنة. وكتابه «كتاب الروضتين في أخبار
      الدولتين النورية والصلاحية» هو الجامعُ المعتمَدُ في
      دولة نور الدين محمود زنكي ودولة صلاح الدين، نسجه من
      روايات ابن أبي طي المفقودة ومن كتب العماد الأصبهاني
      والقاضي الفاضل وابن شدّاد التي بقيت لنا، ثم ذيَّلَه
      بـ«الذيل على الروضتين» إلى وقته. ضبط ابنُ خلكان يومَ
      وفاته؛ وعليه الذهبيُّ في «السير».
    description_fr: |
      Shihāb al-Dīn Abū Shāma ʿAbd al-Raḥmān ibn Ismāʿīl
      al-Maqdisī al-Dimashqī al-Shāfiʿī — juriste shāfiʿite et
      lecteur du Coran damascène, et l'un des principaux maîtres
      du muḥaddith mamelouk al-Nawawī — fut attaqué chez lui
      et mourut de ses blessures à Damas le 19 Ramaḍān 665 H
      (13 juin 1267 EC), à soixante-huit ans. Son *Kitāb al-
      Rawḍatayn fī Akhbār al-Dawlatayn al-Nūriyya wa-l-Ṣalāḥiyya*
      est la chronique composite standard des deux règnes de
      Nūr al-Dīn Maḥmūd Zankī et de Saladin, tissée à partir
      des récits perdus d'Ibn Abī Ṭayyiʾ et des ouvrages
      conservés d'ʿImād al-Dīn al-Iṣfahānī, d'al-Qāḍī al-Fāḍil
      et d'Ibn Shaddād, avec son propre supplément (*al-Dhayl
      ʿalā al-Rawḍatayn*) prolongeant le récit jusqu'à son
      vivant. Ibn Khallikān donne le jour ; al-Dhahabī confirme
      dans les *Siyar*.
