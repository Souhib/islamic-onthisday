  - slug: death-of-ibn-al-adim
    category: scholar_death
    title_en: Death of Ibn al-ʿAdīm — Historian of Aleppo
    title_ar: وفاة ابن العديم — مؤرِّخ حلب
    title_fr: Mort d'Ibn al-ʿAdīm — historien d'Alep
    description_en: |
      Kamāl al-Dīn Abū al-Qāsim ʿUmar ibn Aḥmad ibn al-ʿAdīm
      al-ʿUqaylī al-Ḥalabī — Ḥanafī jurist, qāḍī, diplomat, and
      principal historian of Ayyūbid Aleppo whose family had served
      the city's chancery for generations — died at Cairo in 660 AH
      (1262 CE), having fled there after the Mongol sack of Aleppo
      in 658 AH. His *Bughyat al-Ṭalab fī Tārīkh Ḥalab* is a
      forty-volume biographical-topographical history of Aleppo
      and its scholars (only ten volumes survive); its abridgement
      *Zubdat al-Ḥalab fī Tārīkh Ḥalab* is the standard chronological
      narrative of the Ayyūbid emirate of Aleppo and a key source
      for the late Crusader period. He served as Aleppo's ambassador
      to the Abbasid caliph and to the Ayyūbid sultans of Cairo and
      Damascus. Ibn Khallikān, who knew him personally, fixes the
      year of death and the flight to Cairo; al-Dhahabī confirms
      in *Tārīkh al-Islām* among the wafayāt of 660.
    description_ar: |
      توفي كمالُ الدين أبو القاسم عمر بن أحمد ابن العديم
      العقيليُّ الحلبيُّ — فقيهٌ حنفيٌّ، وقاضٍ، وسفيرٌ، ومؤرِّخُ
      حلب الأيوبية الأكبر، من بيتٍ تولَّى ديوانَ المدينة أجيالاً —
      بالقاهرة سنة ستِّين وستمئة للهجرة (الموافق ١٢٦٢ ميلادي)،
      وكان قد لجأ إليها بعد سقوط حلب بيد المغول سنة ٦٥٨ هـ.
      وكتابه «بغية الطلب في تاريخ حلب» موسوعةٌ في أربعين مجلداً
      في تراجم علماء حلب وجغرافيتها (لم يصلنا منه إلا عشرة
      مجلدات)؛ ومختصرُه «زبدة الحلب في تاريخ حلب» هو السرد
      السنويُّ المعتمَد لإمارة حلب الأيوبية وأهمُّ مصادر أواخر
      عصر الحروب الصليبية. تولَّى السفارةَ عن حلب إلى الخليفة
      العباسي وإلى السلاطين الأيوبيين بالقاهرة ودمشق. ضبط ابنُ
      خلكان — وكان يعرفه شخصياً — سنةَ وفاته وفرارَه إلى القاهرة؛
      وأكَّده الذهبيُّ في وفيات ٦٦٠ من «تاريخ الإسلام».
    description_fr: |
      Kamāl al-Dīn Abū al-Qāsim ʿUmar ibn Aḥmad ibn al-ʿAdīm
      al-ʿUqaylī al-Ḥalabī — juriste ḥanafite, qāḍī, diplomate
      et principal historien de l'Alep ayyūbide, dont la famille
      avait servi la chancellerie de la ville durant des
      générations — mourut au Caire en 660 H (1262 EC), s'y
      étant réfugié après le sac d'Alep par les Mongols en
      658 H. Sa *Bughyat al-Ṭalab fī Tārīkh Ḥalab* est une
      histoire biographique et topographique d'Alep et de ses
      savants en quarante volumes (dont seuls dix nous sont
      parvenus) ; son abrégé *Zubdat al-Ḥalab fī Tārīkh Ḥalab*
      est le récit chronologique standard de l'émirat ayyūbide
      d'Alep et une source-clé pour la fin de la période
      croisée. Il servit comme ambassadeur d'Alep auprès du
      calife abbasside et des sultans ayyūbides du Caire et
      de Damas. Ibn Khallikān, qui le connaissait personnellement,
      fixe l'année de la mort et la fuite au Caire ; al-Dhahabī
      confirme dans *Tārīkh al-Islām* parmi les wafayāt de 660.
    canonical_hijri: {year: 660, precision: year}
    canonical_gregorian: {date: 1262-01-01, precision: year, method: tabular_conversion}
