  - slug: death-of-ikrimah-mawla-ibn-abbas
    category: scholar
    title_en: Death of ʿIkrimah mawla Ibn ʿAbbas
    title_ar: وفاة عكرمة مولى ابن عباس
    title_fr: Mort de ʿIkrimah mawlā Ibn ʿAbbās
    description_en: |
      ʿIkrimah ibn ʿAbdallah al-Barbari — Berber-origin freedman
      of ʿAbdullah ibn ʿAbbas ra, foremost transmitter of Ibn
      ʿAbbas's tafsir alongside Mujahid ibn Jabr, and one of the
      most-cited tabiʿi mufassirun in al-Ṭabari's *Jamiʿ al-Bayan*
      — died in Medina around 104 AH, on the same day as the
      famous poet Kuthayyir ʿAzza. ʿIkrimah's *tafsir* dictation
      to his students became the substrate of the Ibn ʿAbbas-
      based commentary tradition that runs through al-Ṭabari and
      ultimately Ibn Kathir. Although later Maliki scholars
      criticised aspects of his transmission (some accusing him of
      Khariji sympathies), the muḥaddithun of the Six Books accepted
      his hadith: al-Bukhari narrated some 270 reports from him.
      Ibn Ḥajar reconciled the disputes in *Tahdhib al-Tahdhib* with
      a finding of overall reliability.
    description_ar: |
      توفي الإمام عكرمة بن عبد الله البربري — مولى عبد الله بن عباس
      رضي الله عنهما من أصول أمازيغية، وكبير ناقلي تفسير ابن عباس
      مع مجاهد بن جبر، وأحد أكثر التابعين رواية في «جامع البيان»
      للطبري — بالمدينة المنورة نحو سنة ١٠٤ هـ، في اليوم نفسه الذي
      توفي فيه الشاعر كثيّر عزّة. وإملاءات عكرمة في التفسير صارت
      أصل تراث التفسير الراجع إلى ابن عباس الذي مر بالطبري ووصل
      إلى ابن كثير. ومع أن متأخري المالكية انتقدوا بعض جوانب
      روايته (وبعضهم نسب إليه ميلاً للخوارج)، فإن محدثي الكتب
      الستة قبلوا حديثه: روى البخاري نحو ٢٧٠ خبراً عنه. وقد رفع
      ابن حجر العسقلاني الخلاف في «تهذيب التهذيب» إلى توثيق إجمالي.
    description_fr: |
      ʿIkrimah ibn ʿAbdallāh al-Barbarī — affranchi d'origine berbère
      d'ʿAbdullāh ibn ʿAbbās ra, principal transmetteur du tafsir
      d'Ibn ʿAbbās aux côtés de Mujāhid ibn Jabr, et l'un des
      mufassirūn tabiʿūn les plus cités dans le *Jamiʿ al-Bayān*
      d'al-Ṭabarī — mourut à Médine vers 104 H, le même jour que
      le célèbre poète Kuthayyir ʿAzza. La dictée de tafsir de
      ʿIkrimah à ses élèves devint le substrat de la tradition
      exégétique fondée sur Ibn ʿAbbās qui passa par al-Ṭabarī et
      finalement Ibn Kathīr. Bien que les savants malikites tardifs
      aient critiqué certains aspects de sa transmission (certains
      l'accusant de sympathies kharidjites), les muḥaddithūn des
      Six Livres acceptèrent son hadith : al-Bukhārī rapporta
      quelque 270 récits de lui. Ibn Ḥajar concilia les
      controverses dans *Tahdhīb al-Tahdhīb* en concluant à une
      fiabilité globale.
