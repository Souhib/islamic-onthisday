  - slug: death-of-al-qasim-ibn-muhammad
    category: scholar
    title_en: Death of al-Qasim ibn Muhammad ibn Abi Bakr
    title_ar: وفاة القاسم بن محمد بن أبي بكر
    title_fr: Mort d'al-Qāsim ibn Muḥammad ibn Abī Bakr
    description_en: |
      al-Qasim ibn Muhammad ibn Abi Bakr al-Ṣiddiq — grandson of
      Abu Bakr ra through his father Muhammad, raised in the
      household of his aunt ʿAʾisha ra, and one of the seven
      jurists of Medina — died at Quba on the Hajj road at age
      about 70. Imam Malik narrated extensively from him; the
      foundation of much of *al-Muwaṭṭaʾ* in Medinan ijmaʿ runs
      back to his rulings. ʿUmar ibn ʿAbd al-ʿAziz, when offered
      possible candidates for the caliphate, said: "I find no one
      more deserving of this matter than al-Qasim ibn Muhammad."
      He was the master of the hadith methodology that prized
      direct Madinan precedent over speculative reasoning — the
      seedbed of what would become the Maliki madhhab. His
      father Muhammad ibn Abi Bakr had been killed in the chaos
      of the first fitna in Egypt at age 28.
    description_ar: |
      توفي الإمام القاسم بن محمد بن أبي بكر الصديق — حفيد أبي بكر
      رضي الله عنه من أبيه محمد، تربى في بيت عمته عائشة رضي الله
      عنها، وأحد فقهاء المدينة السبعة — بقباء في طريق الحج عن نحو
      سبعين سنة. روى عنه الإمام مالك بن أنس كثيراً، وكثير من إجماع
      أهل المدينة في «الموطأ» يرجع إلى أقواله. ولما عرض على عمر بن
      عبد العزيز رضي الله عنه أسماء يصلح ولي عهدها، قال: «ما أعلم
      أحداً أحق بهذا الأمر من القاسم بن محمد». وكان رحمه الله رأس
      المنهج الحديثي الذي يقدم العمل المدني الموصول على الرأي،
      وهي البذرة التي صار بها مذهب الإمام مالك. وكان أبوه محمد بن
      أبي بكر قد قُتل في فتنة الجمل وما تلاها بمصر عن ثمان وعشرين
      سنة.
    description_fr: |
      al-Qāsim ibn Muḥammad ibn Abī Bakr al-Ṣiddīq — petit-fils
      d'Abu Bakr ra par son père Muḥammad, élevé dans la maison
      de sa tante ʿĀʾisha ra et l'un des sept jurisconsultes de
      Médine — mourut à Qubāʾ sur la route du Ḥajj à l'âge
      d'environ 70 ans. L'imam Mālik rapporta abondamment de lui;
      le fondement d'une grande partie d'*al-Muwaṭṭaʾ* dans
      l'*ijmāʿ* médinois remonte à ses sentences. ʿUmar ibn ʿAbd
      al-ʿAzīz, à qui on présenta des candidats possibles pour le
      califat, dit : « je ne trouve nul plus digne de cette affaire
      qu'al-Qāsim ibn Muḥammad ». Il fut le maître de la
      méthodologie de hadith qui privilégiait le précédent
      médinois direct sur le raisonnement spéculatif — le terreau
      de ce qui deviendrait le madhhab malikite. Son père Muḥammad
      ibn Abī Bakr avait été tué dans le chaos de la première
      *fitna* en Égypte à 28 ans.
