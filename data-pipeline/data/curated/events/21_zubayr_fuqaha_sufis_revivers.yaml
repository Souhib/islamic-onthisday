  - slug: muslim-conquest-of-cyprus
    category: conquest
    title_en: Muslim Conquest of Cyprus — first Muslim naval expedition
    title_ar: فتح قبرص — أول حملة بحرية إسلامية
    title_fr: Conquête musulmane de Chypre — première expédition navale musulmane
    description_en: |
      The first Muslim naval expedition departed from the Levantine
      coast under the command of Muʿawiya ibn Abi Sufyan, governor
      of Syria, with ʿUbada ibn al-Ṣamit ra and his wife Umm
      Ḥaram bint Milḥan ra (the Companion whose dream of becoming
      "the first soldier of the sea" had been blessed by the
      Prophet ﷺ in a famous hadith of Bukhari). The expedition
      crossed to Cyprus, defeated the local Byzantine garrison,
      and imposed an annual tribute on the island, beginning a
      pattern of Levantine maritime power that would shape
      Mediterranean naval politics for centuries. Umm Ḥaram fell
      from her mount and died on the island; her tomb at Hala
      Sultan Tekke near Larnaca remains the only surviving Muslim
      shrine of a sahabia outside the central Islamic lands. The
      campaign was the first of three Cypriot expeditions in the
      same decade.
    description_ar: |
      انطلقت أول حملة بحرية إسلامية من سواحل الشام بقيادة معاوية بن
      أبي سفيان والي الشام، ومعه عبادة بن الصامت رضي الله عنه
      وزوجه أم حرام بنت ملحان رضي الله عنها — وهي الصحابية التي
      سمى لها النبي ﷺ في حلمها أن تكون «من أول من يركب البحر»
      كما في حديث البخاري المتفق على صحته. وعبرت الحملة إلى قبرص
      فهزمت الحامية الرومية فيها، وفرضت عليها جزية سنوية، فأطلقت
      عصراً من القوة البحرية الشامية الذي صاغ سياسات بحر المتوسط
      البحرية قروناً. وسقطت أم حرام رضي الله عنها عن دابتها فماتت
      في قبرص، وما زال قبرها في «هلا سلطان تكية» قرب لارناكا
      المزار الوحيد الباقي لصحابية خارج البلاد الإسلامية الأصلية.
      وكانت تلك أولى ثلاث حملات على قبرص في العقد نفسه.
    description_fr: |
      La première expédition navale musulmane partit des côtes
      levantines sous le commandement de Muʿāwiya ibn Abī Sufyān,
      gouverneur de Syrie, avec ʿUbāda ibn al-Ṣāmit ra et son
      épouse Umm Ḥarām bint Milḥān ra (la Compagne dont le rêve
      de devenir « le premier soldat de la mer » avait été béni
      par le Prophète ﷺ dans un hadith célèbre de Bukhārī).
      L'expédition traversa vers Chypre, défit la garnison
      byzantine locale et imposa un tribut annuel à l'île,
      entamant un schéma de puissance maritime levantine qui
      façonnerait la politique navale méditerranéenne pendant
      des siècles. Umm Ḥarām tomba de sa monture et mourut sur
      l'île; sa tombe à Hala Sultan Tekke près de Larnaca demeure
      le seul sanctuaire musulman survivant d'une *ṣaḥābiyya* en
      dehors des terres islamiques centrales. La campagne fut la
      première de trois expéditions chypriotes dans la même
      décennie.
