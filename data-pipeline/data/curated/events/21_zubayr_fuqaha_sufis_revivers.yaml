  - slug: death-of-naqshband
    category: scholar
    title_en: Death of Bahaʾ al-Din Naqshband
    title_ar: وفاة بهاء الدين نقشبند
    title_fr: Mort de Bahāʾ al-Dīn Naqshband
    description_en: |
      Bahaʾ al-Din Muhammad ibn Muhammad al-Bukhari, known as
      *Naqshband* — eponymous founder of the Naqshbandi tariqa,
      among the most widespread and rigorously Sunni-Sharia-bound
      of the major Sufi orders, with extensive presence today in
      Central Asia, the Indian subcontinent, Turkey, the Caucasus,
      and the Levant — died at Qaṣr al-ʿArifan near Bukhara at
      age about 73. The Naqshbandi tariqa is distinctive in
      Sufi history for its insistence on *dhikr khafi* (silent
      remembrance) over vocal *dhikr*, its refusal of music and
      ecstatic practice, and its principle that the disciple
      remain fully embedded in worldly trade and family life
      while pursuing the inward path — *khalwat dar anjuman*
      ("solitude in the crowd"). Its eight founding principles,
      formulated by his predecessor ʿAbd al-Khaliq al-Ghujdawani,
      he augmented with three more. The order's later sub-branches
      include the Mujaddidi (through Sirhindi) and the Khalidi.
    description_ar: |
      توفي الشيخ بهاء الدين محمد بن محمد البخاري المعروف بـ«نقشبند»
      — مؤسس الطريقة النقشبندية، من أكثر الطرق الصوفية انتشاراً
      ومن أصرمها التزاماً بالشريعة على منهج أهل السنة، حضورها
      اليوم واسع في آسيا الوسطى وشبه القارة الهندية وتركيا والقوقاز
      والشام — في «قصر العارفان» قرب بخارى عن نحو ثلاث وسبعين سنة.
      وتمتاز الطريقة النقشبندية في تاريخ التصوف بإصرارها على «الذكر
      الخفي» على الذكر الجهري، ورفضها السماع والوجد، وأصلها أن
      يبقى السالك متلبساً بشؤون التجارة والأسرة في العالم وهو
      يسلك إلى الله — قاعدة «خلوت در أنجمن» (الخلوة في الجمع).
      وأصول الطريقة الثمانية التي صاغها سلفه عبد الخالق الغجدواني
      زاد عليها بهاء الدين ثلاثة أصول أخرى. وفيما بعد تفرعت
      الطريقة إلى المجددية (عبر السرهندي) والخالدية.
    description_fr: |
      Bahāʾ al-Dīn Muḥammad ibn Muḥammad al-Bukhārī, connu sous
      le nom de *Naqshband* — fondateur éponyme de la *ṭarīqa
      Naqshbandiyya*, parmi les plus répandues et les plus
      rigoureusement liées à la *sharīʿa* sunnite des grands
      ordres soufis, avec une présence étendue aujourd'hui en
      Asie centrale, dans le sous-continent indien, en Turquie,
      au Caucase et au Levant — mourut à Qaṣr al-ʿĀrifān près de
      Boukhara à l'âge d'environ 73 ans. La *ṭarīqa Naqshbandiyya*
      est distinctive dans l'histoire soufie pour son insistance
      sur le *dhikr khafī* (rappel silencieux) plutôt que vocal,
      son refus de la musique et de la pratique extatique, et son
      principe selon lequel le disciple demeure pleinement engagé
      dans le commerce mondain et la vie de famille tout en
      poursuivant la voie intérieure — *khalwat dar anjuman*
      (« la solitude dans la foule »). Aux huit principes
      fondateurs formulés par son prédécesseur ʿAbd al-Khāliq
      al-Ghujdawānī, il en ajouta trois autres. Les sous-branches
      ultérieures de l'ordre incluent la Mujaddidiyya (par
      Sirhindī) et la Khālidiyya.
