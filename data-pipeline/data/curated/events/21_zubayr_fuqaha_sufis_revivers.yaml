  - slug: first-hijra-to-abyssinia
    category: prophetic
    title_en: First Hijra to Abyssinia
    title_ar: الهجرة الأولى إلى الحبشة
    title_fr: Première Hijra en Abyssinie
    description_en: |
      Approximately twelve men and four women among the early
      Muslims of Mecca, fleeing escalating Quraysh persecution,
      crossed the Red Sea to take refuge with the Christian
      Negus of Abyssinia (al-Najashi) at the Prophet's ﷺ
      direction — the first organised migration of Muslims out of
      Mecca, five years before the Hijra to Medina. The party
      included ʿUthman ibn ʿAffan ra and his wife Ruqayya bint
      Muhammad ﷺ, ʿUthman ibn Maẓʿun ra, and the senior leader
      of the second wave Jaʿfar ibn Abi Talib ra. When Quraysh
      sent ʿAmr ibn al-ʿAṣ (then still pre-conversion) to demand
      their extradition, Jaʿfar's address to the Negus — recorded
      verbatim in Aḥmad's *Musnad* — recited Surat Maryam (Q 19),
      moving the Negus to tears and securing the Muslims'
      asylum. The Prophet ﷺ later said of him: "Allah has placed
      al-Najashi in his place upon a noble seat."
    description_ar: |
      هاجر نحو اثني عشر رجلاً وأربع نسوة من أوائل مسلمي مكة هرباً
      من اضطهاد قريش المتصاعد، فعبروا البحر الأحمر إلى ملك الحبشة
      المسيحي النجاشي بأمر رسول الله ﷺ — وهي أول هجرة منظمة
      للمسلمين خارج مكة، قبل الهجرة إلى المدينة بخمس سنين. وكان من
      المهاجرين عثمان بن عفان رضي الله عنه وزوجه رقية بنت محمد ﷺ،
      وعثمان بن مظعون رضي الله عنه، وكبير الموجة الثانية جعفر بن
      أبي طالب رضي الله عنه. ولما بعثت قريش عمرو بن العاص (وكان
      يومئذ مشركاً) إلى النجاشي يطلب تسليم المسلمين، خطب جعفر بين
      يديه الخطبة المحفوظة في «مسند» الإمام أحمد، ثم تلا أول سورة
      مريم (سورة ١٩)، فبكى النجاشي وأمن المسلمين على دينهم. وقال
      النبي ﷺ فيه لاحقاً: «وضعه الله في مقام كريم».
    description_fr: |
      Environ douze hommes et quatre femmes parmi les premiers
      musulmans de La Mecque, fuyant la persécution croissante de
      Quraysh, traversèrent la mer Rouge pour se réfugier auprès
      du Négus chrétien d'Abyssinie (al-Najāshī) sur instruction
      du Prophète ﷺ — la première migration organisée de musulmans
      hors de La Mecque, cinq ans avant la Hijra vers Médine. Le
      groupe comprenait ʿUthmān ibn ʿAffān ra et son épouse Ruqayya
      bint Muḥammad ﷺ, ʿUthmān ibn Maẓʿūn ra, et le chef de la
      seconde vague Jaʿfar ibn Abī Ṭālib ra. Lorsque Quraysh
      envoya ʿAmr ibn al-ʿĀṣ (alors encore pré-conversion) pour
      exiger leur extradition, l'allocution de Jaʿfar au Négus —
      consignée verbatim dans le *Musnad* d'Aḥmad — récita la
      sourate Maryam (Q 19), émut le Négus aux larmes et obtint
      l'asile des musulmans. Le Prophète ﷺ dit plus tard de lui :
      « Allah a placé al-Najāshī à sa place sur un noble siège ».
    canonical_hijri: {year: -5, precision: year}
