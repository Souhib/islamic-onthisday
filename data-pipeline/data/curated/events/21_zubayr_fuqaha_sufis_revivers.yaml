  - slug: death-of-abu-madyan
    category: scholar
    title_en: Death of Abu Madyan al-Maghribi
    title_ar: وفاة أبي مدين المغربي
    title_fr: Mort d'Abu Madyan al-Maghribi
    description_en: |
      Abu Madyan Shuʿayb ibn al-Husayn al-Anṣari — Andalusian-born
      Maliki Sufi who emigrated to the Maghreb and became the
      foundational master of the *Madyaniyya* lineage from which
      almost every later Maghrebi-North African Sufi tariqa
      descends — died at ʿUbbad outside Tlemcen at age about 78,
      while travelling to Marrakesh under summons by the Almohad
      caliph Yaʿqub al-Manṣur. His sayings, preserved in the
      *Bidayat al-Ṭalibin* and the *Wasiyya al-Kubra*, became the
      reference points for Maghrebi Sufi adab. al-Shadhili (whose
      *Shadhiliyya* is the largest North African tariqa) takes
      his initiatic chain through Abu Madyan; Ibn ʿArabi
      al-Andalusi met him in his youth and venerated him by the
      title *al-Ghawth*. His shrine at ʿUbbad-Tlemcen is one of
      the principal Maghrebi pilgrimage centres to this day.
    description_ar: |
      توفي الإمام أبو مدين شعيب بن الحسين الأنصاري — أندلسي المولد
      هاجر إلى المغرب فصار شيخ سلسلة «المدينية» التي تنحدر منها
      عامة الطرق الصوفية المغربية والشمال أفريقية تقريباً — في
      «العباد» قرب تلمسان عن نحو ثمانٍ وسبعين سنة، وهو في طريقه
      إلى مراكش باستدعاء من الخليفة الموحدي يعقوب المنصور. وأقواله
      المحفوظة في «بداية الطالبين» و«الوصية الكبرى» صارت مراجع
      الأدب الصوفي المغربي. والشيخ أبو الحسن الشاذلي (مؤسس الطريقة
      الشاذلية، أكبر طرق شمال أفريقيا) يأخذ سند طريقته عن أبي
      مدين؛ ولقيه ابن عربي الأندلسي صبياً فعظمه ولقبه «الغوث».
      ومزاره في «العباد» قرب تلمسان من أكبر مزارات المغرب إلى اليوم.
    description_fr: |
      Abu Madyan Shuʿayb ibn al-Ḥusayn al-Anṣārī — soufi malikite
      d'origine andalouse qui émigra au Maghreb et devint le
      maître fondateur de la lignée *Madyaniyya* dont descend
      presque toute *ṭarīqa* maghrébine et nord-africaine
      ultérieure — mourut à ʿUbbād près de Tlemcen à l'âge
      d'environ 78 ans, alors qu'il se rendait à Marrakech sur
      convocation du calife almohade Yaʿqūb al-Manṣūr. Ses
      paroles, préservées dans la *Bidāyat al-Ṭālibīn* et la
      *Waṣiyya al-Kubrā*, devinrent les points de référence de
      l'*adab* soufi maghrébin. al-Shādhilī (dont la *Shādhiliyya*
      est la plus grande *ṭarīqa* nord-africaine) prend sa chaîne
      initiatique par Abū Madyan; Ibn ʿArabī al-Andalusī le
      rencontra dans sa jeunesse et le vénéra sous le titre de
      *al-Ghawth*. Son sanctuaire à ʿUbbād-Tlemcen est l'un des
      principaux centres de pèlerinage maghrébins à ce jour.
