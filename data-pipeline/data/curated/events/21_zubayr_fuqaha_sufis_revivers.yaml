  - slug: death-of-yazid-ibn-muawiya
    category: caliph
    title_en: Death of Yazid ibn Muʿawiya
    title_ar: وفاة يزيد بن معاوية
    title_fr: Mort de Yazīd ibn Muʿāwiya
    description_en: |
      Yazid ibn Muʿawiya — second Umayyad caliph (reigned 60-64
      AH), whose three-year reign produced the three foundational
      catastrophes of the second Islamic generation: the killing
      of al-Ḥusayn ibn ʿAli ra at Karbala (61 AH), the sack of
      Medina at al-Ḥarra (63 AH), and the catapulting of the
      Sacred Mosque at the first siege of Mecca (64 AH) — died at
      Ḥuwwarin in Syria of unknown cause at age 38, two months
      before the Mecca siege ended. Classical Sunni assessment of
      him is uniformly severe. Imam Aḥmad ibn Ḥanbal explicitly
      withheld blessing for him; al-Ghazali in *Iḥyaʾ ʿUlum
      al-Din* permitted naming him as a transgressor but reserved
      direct cursing. al-Tabari and Ibn Kathir record his
      catastrophic record neutrally, leaving the moral assessment
      to the reader. His son Muʿawiya II succeeded him for forty
      days before dying without an heir, ending the Sufyanid line.
    description_ar: |
      توفي يزيد بن معاوية — ثاني خلفاء بني أمية (حكم من ٦٠ إلى ٦٤
      هـ)، الذي شهد عهده القصير ثلاث سنوات الكوارث الثلاث الكبرى
      للجيل الإسلامي الثاني: مقتل الحسين بن علي رضي الله عنه
      بكربلاء (٦١ هـ)، وواقعة الحرة استباحة المدينة (٦٣ هـ)، ورمي
      المسجد الحرام بالمنجنيق في الحصار الأول لمكة (٦٤ هـ) — في
      «حوارين» بالشام بسبب غير معروف عن ثمانٍ وثلاثين سنة، قبل
      انتهاء حصار مكة بشهرين. وحكم أهل السنة عليه شديد. فالإمام
      أحمد بن حنبل امتنع عن الترضي عليه، والغزالي في «الإحياء»
      أجاز تسميته بالفاسق وامتنع عن لعنه عيناً. وأورد الطبري وابن
      كثير سجله الكارثي بحياد، تاركين الحكم الأخلاقي للقارئ. وخلفه
      ابنه معاوية الثاني أربعين يوماً ثم مات دون عقب، فانطفأ خط
      السفيانيين.
    description_fr: |
      Yazīd ibn Muʿāwiya — deuxième calife omeyyade (règne 60-64
      H), dont le règne de trois ans produisit les trois
      catastrophes fondatrices de la seconde génération islamique :
      le meurtre d'al-Ḥusayn ibn ʿAlī ra à Kerbala (61 H), le sac
      de Médine à al-Ḥarra (63 H), et la catapultation de la
      Mosquée Sacrée lors du premier siège de La Mecque (64 H) —
      mourut à Ḥuwwārīn en Syrie de cause inconnue à l'âge de
      38 ans, deux mois avant la fin du siège de La Mecque. Le
      jugement sunnite classique sur lui est uniformément sévère.
      L'imam Aḥmad ibn Ḥanbal s'abstint explicitement de
      bénédiction sur lui; al-Ghazālī dans l'*Iḥyāʾ ʿUlūm al-Dīn*
      permit de le nommer transgresseur mais s'abstint de
      malédiction directe. al-Ṭabarī et Ibn Kathīr consignent
      son bilan catastrophique avec neutralité, laissant le
      jugement moral au lecteur. Son fils Muʿāwiya II lui succéda
      pendant quarante jours avant de mourir sans héritier,
      éteignant la lignée sufyanide.
