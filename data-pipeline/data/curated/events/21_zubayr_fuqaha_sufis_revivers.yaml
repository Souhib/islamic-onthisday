  - slug: death-of-ahmad-shakir
    category: scholar
    title_en: Death of Aḥmad Muḥammad Shakir
    title_ar: وفاة أحمد محمد شاكر
    title_fr: Mort d'Aḥmad Muḥammad Shākir
    description_en: |
      Aḥmad Muḥammad Shakir — Egyptian Sunni hadith scholar,
      Azhari-trained jurist of Shafiʿi madhhab who eventually
      embraced ijtihad-style methodology, and the editor whose
      monumental editions of *Musnad Aḥmad ibn Ḥanbal* (the first
      published critical edition with hadith-by-hadith grading),
      *al-Risala* of al-Shafiʿi, *Sunan al-Tirmidhi*, and Ibn
      Ḥazm's *al-Muḥalla* set the modern critical-edition
      methodology for classical Sunni texts — died in Cairo at
      age 66. He served as a state qadi until political differences
      forced his retirement; thereafter he devoted himself
      entirely to text editing, hadith authentication, and
      advocacy for return to the primary sources. His brother
      Maḥmud Shakir was an equally influential editor of classical
      Arabic literary texts, and his student al-Albani would
      become the most prominent twentieth-century Sunni hadith
      grader.
    description_ar: |
      توفي الإمام أحمد محمد شاكر — محدث سني مصري، شافعي المذهب
      أزهري التخريج ثم انتقل إلى منهج الاجتهاد، ومن مرجعه إلى
      تحقيقاته الكبرى لـ«مسند الإمام أحمد بن حنبل» (أول طبعة
      نقدية منشورة بتخريج الأحاديث وتصحيحها واحداً واحداً) و«الرسالة»
      للشافعي و«سنن الترمذي» و«المحلى» لابن حزم، التي أرست منهج
      التحقيق النقدي الحديث للنصوص السنية الكلاسيكية — بالقاهرة عن
      ست وستين سنة. عمل قاضياً للدولة حتى أجبرته الخلافات السياسية
      على الاعتزال، فتفرغ بعد ذلك للتحقيق وتخريج الحديث والدعوة
      إلى الرجوع إلى المصادر الأصلية. وكان أخوه محمود شاكر محققاً
      موازياً في النصوص الأدبية العربية الكلاسيكية، وصار تلميذه
      الألباني أبرز محدث سني في تخريج الأحاديث في القرن العشرين.
    description_fr: |
      Aḥmad Muḥammad Shākir — savant sunnite égyptien du hadith,
      juriste shafiʿite formé à al-Azhar qui adopta finalement une
      méthodologie d'*ijtihād*, et l'éditeur dont les éditions
      monumentales du *Musnad Aḥmad ibn Ḥanbal* (la première
      édition critique publiée avec gradation hadith par hadith),
      d'*al-Risāla* d'al-Shāfiʿī, des *Sunan al-Tirmidhī* et
      d'*al-Muḥallā* d'Ibn Ḥazm posèrent la méthodologie moderne
      d'édition critique pour les textes sunnites classiques —
      mourut au Caire à l'âge de 66 ans. Il servit comme *qāḍī*
      d'État jusqu'à ce que des désaccords politiques le forcent
      à la retraite; par la suite il se consacra entièrement à
      l'édition de textes, à l'authentification du hadith et à
      la défense du retour aux sources primaires. Son frère
      Maḥmūd Shākir fut un éditeur tout aussi influent de textes
      littéraires arabes classiques, et son élève al-Albānī
      deviendrait le plus éminent gradateur de hadith sunnite du
      XXe siècle.
    canonical_hijri: {year: 1377, month: 12, day: 6, precision: day}
    canonical_gregorian: {date: 1958-06-23, precision: day, method: attested}
