  - slug: death-of-rashid-rida
    category: scholar
    title_en: Death of Muhammad Rashid Riḍa
    title_ar: وفاة محمد رشيد رضا
    title_fr: Mort de Muḥammad Rashīd Riḍā
    description_en: |
      Muhammad Rashid Riḍa al-Husayni — Syrian-born Sunni reformer,
      principal student of Muhammad ʿAbduh in Cairo, founder and
      editor of the journal *al-Manar* (1898-1935 CE) which spread
      Salafi-modernist thought across the Arab world for thirty-
      seven years, and author of *Tafsir al-Manar* (a Qurʾan
      commentary continuing ʿAbduh's lectures) and *al-Khilafa*
      (a 1922 treatise on the caliphate written in the wake of
      Mustafa Kemal's abolition) — died on the road from Suez to
      Cairo, returning from accompanying King ʿAbd al-ʿAziz Al
      Saʿud during a state visit. He was about 70. He was the
      principal twentieth-century relay of pre-modern Sunni revival
      currents (especially Ibn Taymiyya and Muhammad ibn ʿAbd
      al-Wahhab) into the Arab modernist mainstream; modern Salafi,
      Muslim Brotherhood, and Islamist reformist currents all trace
      direct lines through him.
    description_ar: |
      توفي الشيخ محمد رشيد رضا الحسيني — مصلح سني سوري المنشأ،
      وكبير تلاميذ الإمام محمد عبده بالقاهرة، ومؤسس ومحرر مجلة
      «المنار» (١٨٩٨-١٩٣٥ ميلادي) التي نشرت الفكر السلفي الإصلاحي
      في عامة الوطن العربي سبعاً وثلاثين سنة، ومصنف «تفسير المنار»
      (تابعاً لدروس الإمام محمد عبده) و«الخلافة» (رسالة سنة ١٩٢٢
      ميلادي في الخلافة في أعقاب إلغائها على يد مصطفى كمال) —
      على طريق السويس-القاهرة، عائداً من توديع الملك عبد العزيز
      آل سعود في زيارة رسمية. وقد ناهز السبعين. وكان رحمه الله
      الجسر الأكبر في القرن العشرين بين تيارات الإحياء السني قبل
      الحداثة (لا سيما تراث ابن تيمية ومحمد بن عبد الوهاب) والوسط
      الحداثي العربي؛ وتيارات السلفية والإخوان المسلمين والحركات
      الإسلامية الإصلاحية الحديثة كلها تنحدر منه عبر خطوط واضحة.
    description_fr: |
      Muḥammad Rashīd Riḍā al-Ḥusaynī — réformateur sunnite
      syrien, principal élève de Muḥammad ʿAbduh au Caire,
      fondateur et rédacteur en chef du journal *al-Manār*
      (1898-1935 EC) qui diffusa la pensée salafi-moderniste à
      travers le monde arabe pendant trente-sept ans, et auteur
      de *Tafsīr al-Manār* (un commentaire coranique poursuivant
      les conférences d'ʿAbduh) et d'*al-Khilāfa* (un traité de
      1922 sur le califat rédigé dans le sillage de l'abolition
      par Mustafa Kemal) — mourut sur la route de Suez au Caire
      en revenant d'avoir accompagné le roi ʿAbd al-ʿAzīz Āl Saʿūd
      lors d'une visite d'État. Il avait environ 70 ans. Il fut
      le principal relais du XXe siècle des courants de renaissance
      sunnite pré-moderne (surtout Ibn Taymiyya et Muḥammad ibn
      ʿAbd al-Wahhāb) vers le courant moderniste arabe; les
      mouvements salafi, frères musulmans et islamistes
      réformistes modernes tracent tous des lignes directes à
      travers lui.
    canonical_hijri: {year: 1354, month: 5, day: 23, precision: day}
    canonical_gregorian: {date: 1935-08-22, precision: day, method: attested}
