  - slug: death-of-al-maraghi
    category: scholar
    title_en: Death of Mustafa al-Maraghi — Shaykh of al-Azhar
    title_ar: وفاة مصطفى المراغي — شيخ الأزهر
    title_fr: Mort de Muṣṭafā al-Marāghī — Shaykh d'al-Azhar
    description_en: |
      Mustafa al-Maraghi — Egyptian Sunni jurist and grand Shaykh
      of al-Azhar (twice: 1928-1929 and 1935-1945), modernist
      reformer in the lineage of his teacher Muhammad ʿAbduh, and
      author of an influential Qurʾan commentary (*Tafsir al-
      Maraghi*) in ten volumes addressing the Qurʾan in modern
      Arabic accessible to non-specialists — died at his home in
      Cairo at age about 64. As Shaykh of al-Azhar he led the
      institutional modernisation of the Sunni world's oldest
      university: he established faculties of theology, sharia,
      and Arabic literature with formal degrees, broke the
      monopoly of pre-modern teaching circles, and admitted the
      first women to study at al-Azhar's affiliated institutes.
      His brother ʿAbdullah al-Maraghi served as his deputy and
      his sons established a continuing scholarly lineage in
      twentieth-century Egyptian Sunni academia.
    description_ar: |
      توفي الشيخ مصطفى المراغي — فقيه سني مصري وشيخ الجامع الأزهر
      مرتين (١٩٢٨-١٩٢٩ ثم ١٩٣٥-١٩٤٥)، ومجدد على نهج شيخه الإمام
      محمد عبده، ومصنف تفسير قرآني كبير الأثر («تفسير المراغي» في
      عشرة مجلدات) باللغة العربية الحديثة الميسرة لغير المتخصصين —
      في داره بالقاهرة عن نحو أربع وستين سنة. وقاد بصفته شيخاً
      للأزهر التحديث المؤسسي لأقدم جامعة في العالم السني: فأسس
      كليات أصول الدين والشريعة واللغة العربية بشهادات رسمية،
      وكسر احتكار حلقات التدريس قبل الحداثة، وقبل لأول مرة دخول
      النساء معاهد الأزهر التابعة. وكان أخوه عبد الله المراغي
      نائباً له، وأنشأ أبناؤه سلسلة علمية متواصلة في الأكاديميا
      السنية المصرية في القرن العشرين.
    description_fr: |
      Muṣṭafā al-Marāghī — juriste sunnite égyptien et grand
      cheikh d'al-Azhar (à deux reprises : 1928-1929 et 1935-1945),
      réformateur moderniste dans la lignée de son maître Muḥammad
      ʿAbduh, et auteur d'un commentaire coranique influent
      (*Tafsīr al-Marāghī*) en dix volumes traitant du Coran en
      arabe moderne accessible aux non-spécialistes — mourut à
      son domicile au Caire à l'âge d'environ 64 ans. En tant que
      cheikh d'al-Azhar il dirigea la modernisation institutionnelle
      de la plus ancienne université du monde sunnite : il créa
      les facultés de théologie, de sharīʿa et de littérature
      arabe avec diplômes formels, brisa le monopole des cercles
      d'enseignement pré-modernes et admit pour la première fois
      des femmes dans les instituts affiliés à al-Azhar. Son frère
      ʿAbdallāh al-Marāghī servit comme adjoint, et ses fils
      établirent une lignée savante continue dans l'académie
      sunnite égyptienne du XXe siècle.
