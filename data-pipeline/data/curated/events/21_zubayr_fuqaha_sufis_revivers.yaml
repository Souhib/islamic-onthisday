  - slug: death-of-al-shadhili
    category: scholar
    title_en: Death of Abu al-Hasan al-Shadhili
    title_ar: وفاة أبي الحسن الشاذلي
    title_fr: Mort d'Abū al-Ḥasan al-Shādhilī
    description_en: |
      Abu al-Hasan ʿAli al-Shadhili al-Maghribi al-Maliki —
      Moroccan-born Maliki scholar and founder of the Shadhili
      tariqa, the largest Sufi order in North Africa, Egypt, and
      across the Sunni Maghreb — died at Humaythira in the Eastern
      Desert of Egypt while travelling on the Hajj route. He was
      about 63. His tariqa is distinct in classical Sunni Sufism
      for its lack of formal initiation rites, its embrace of
      lay social life over monastic withdrawal, and the
      prominence of his daily *aḥzab* (litanies, especially
      *Ḥizb al-Baḥr* and *Ḥizb al-Barr*) which remain in active
      recitation across the Muslim world. He left no formal
      writings of his own; his sayings were preserved by his
      successor Ibn ʿAṭaʾillah al-Iskandari in *Laṭaʾif al-Minan*
      and the *Hikam*. The Shadhili tariqa later branched into
      sub-orders including the Darqawiyya (West Africa), the
      ʿAlawiyya (Algeria), and the Yashruṭiyya (Levant).
    description_ar: |
      توفي الإمام أبو الحسن علي الشاذلي المغربي المالكي — مغربي
      المولد، عالم على مذهب الإمام مالك، ومؤسس الطريقة الشاذلية،
      أكبر الطرق الصوفية في شمال أفريقيا ومصر وعموم المغرب الإسلامي
      السني — بـ«حميثرة» في الصحراء الشرقية بمصر وهو في طريق الحج
      عن نحو ثلاث وستين سنة. وتمتاز طريقته في التراث الصوفي السني
      الكلاسيكي بعدم اشتراطها طقوس انتساب رسمية، وقبولها للحياة
      الاجتماعية اللائقة على مفاصلتها، وبأذكاره وأحزابه اليومية
      (لا سيما «حزب البحر» و«حزب البر») التي ما زالت تتداول
      بالقراءة في عامة العالم الإسلامي. لم يصنف رحمه الله كتاباً،
      وحفظ أقواله خليفته ابن عطاء الله الإسكندري في «لطائف المنن»
      و«الحكم». وتفرعت الشاذلية لاحقاً إلى طرق منها الدرقاوية
      (المغرب وأفريقيا الغربية) والعلاوية (الجزائر) واليشرطية
      (الشام).
    description_fr: |
      Abū al-Ḥasan ʿAlī al-Shādhilī al-Maghribī al-Mālikī — savant
      malikite marocain et fondateur de la *ṭarīqa Shādhiliyya*,
      le plus grand ordre soufi d'Afrique du Nord, d'Égypte et du
      Maghreb sunnite tout entier — mourut à Ḥumaythira dans le
      Désert oriental d'Égypte alors qu'il voyageait sur la route
      du Ḥajj. Il avait environ 63 ans. Sa *ṭarīqa* se distingue
      dans le soufisme sunnite classique par l'absence de rites
      d'initiation formels, son adoption de la vie sociale
      ordinaire sur le retrait monastique, et la prééminence de
      ses *aḥzāb* quotidiens (litanies, en particulier *Ḥizb
      al-Baḥr* et *Ḥizb al-Barr*) qui demeurent en récitation
      active à travers le monde musulman. Il ne laissa aucun écrit
      formel; ses paroles furent préservées par son successeur
      Ibn ʿAṭāʾillāh al-Iskandarī dans *Laṭāʾif al-Minan* et les
      *Ḥikam*. La *ṭarīqa Shādhiliyya* se ramifia plus tard en
      sous-ordres incluant la Darqāwiyya (Maghreb), l'ʿAlāwiyya
      (Algérie) et la Yashruṭiyya (Levant).
