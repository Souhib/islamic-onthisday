  - slug: battle-of-al-harra
    category: battle
    title_en: Battle of al-Ḥarra — Sack of Medina
    title_ar: واقعة الحرة — استباحة المدينة
    title_fr: Bataille d'al-Ḥarra — sac de Médine
    description_en: |
      Yazid ibn Muʿawiya, the Umayyad caliph, dispatched an army
      under Muslim ibn ʿUqba al-Murri against Medina after its
      population had withdrawn allegiance from him in the wake of
      Karbala. The Madinans were defeated at the volcanic plain
      east of the city (al-Ḥarra al-Sharqiyya), and Muslim ibn
      ʿUqba's men were granted three days of license over the
      city. Classical sources (al-Ṭabari, Ibn Kathir) record
      grave excesses including the killing of an estimated seven
      hundred Companions and tabiʿun, the desecration of the
      Prophet's ﷺ Mosque, and the forced re-pledge of allegiance
      to Yazid as if the Madinans were his slaves rather than his
      free Muslim subjects. The Madinan general ʿAbdullah ibn
      Ḥanẓala — son of the *Ghasil al-Malaʾika* (the Companion
      whom angels washed at Uhud) — was killed leading the
      defence. The event is one of the great catastrophes of the
      Umayyad era; al-Bukhari narrates several hadiths bearing on
      it under chapters of fitna.
    description_ar: |
      أرسل يزيد بن معاوية الخليفة الأموي جيشاً بقيادة مسلم بن عقبة
      المرّي إلى المدينة المنورة بعد أن خلع أهلها بيعته في أعقاب
      كارثة كربلاء. هزم أهل المدينة في الحرة الشرقية شرق المدينة،
      فأباح مسلم بن عقبة جيشه ثلاثة أيام في المدينة. وتسجل المصادر
      القديمة (الطبري وابن كثير) أهوالاً عظيمة منها قتل نحو سبع
      مئة من الصحابة والتابعين، وانتهاك المسجد النبوي، وإكراه
      أهل المدينة على البيعة ليزيد على أنهم عبيد وليسوا مسلمين
      أحراراً. وقتل قائد المدينة عبد الله بن حنظلة — ابن «غسيل
      الملائكة» يوم أحد — وهو يقود الدفاع. وهذه الواقعة من أعظم
      مصائب الأمة في عصر بني أمية، ويروي البخاري في صحيحه أحاديث
      تتعلق بها في أبواب الفتن.
    description_fr: |
      Yazīd ibn Muʿāwiya, le calife omeyyade, dépêcha une armée
      sous Muslim ibn ʿUqba al-Murrī contre Médine après que sa
      population eut retiré son allégeance dans le sillage de
      Kerbala. Les Médinois furent défaits sur la plaine volcanique
      à l'est de la ville (al-Ḥarra al-Sharqiyya), et les hommes
      de Muslim ibn ʿUqba reçurent trois jours de licence sur la
      ville. Les sources classiques (al-Ṭabarī, Ibn Kathīr)
      consignent de graves excès, dont le meurtre d'environ
      sept cents Compagnons et *tābiʿūn*, la profanation de la
      Mosquée du Prophète ﷺ, et le serment d'allégeance forcé à
      Yazīd comme si les Médinois étaient ses esclaves plutôt que
      ses sujets musulmans libres. Le général médinois ʿAbdallāh
      ibn Ḥanẓala — fils du *Ghasīl al-Malāʾika* (le Compagnon
      que les anges lavèrent à Uḥud) — fut tué en menant la
      défense. L'événement est l'une des grandes catastrophes de
      l'ère omeyyade; al-Bukhārī rapporte plusieurs hadiths qui
      s'y rapportent dans les chapitres de *fitna*.
