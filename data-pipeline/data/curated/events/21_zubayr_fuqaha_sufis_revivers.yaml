  - slug: death-of-asma-bint-abi-bakr
    category: companion
    title_en: Death of Asmaʾ bint Abi Bakr ra — Dhat al-Niṭaqayn
    title_ar: وفاة أسماء بنت أبي بكر رضي الله عنها — ذات النطاقين
    title_fr: Mort d'Asmāʾ bint Abī Bakr ra — Dhāt al-Niṭāqayn
    description_en: |
      Asmaʾ bint Abi Bakr al-Ṣiddiq, elder sister of ʿAʾisha ra,
      wife of al-Zubayr ibn al-ʿAwwam ra, and mother of ʿAbdullah
      ibn al-Zubayr — died in Mecca at age about 100, only days
      after the killing of her son. She is the Companion who tore
      her waist-belt in two to fasten the Prophet's ﷺ provisions
      at the cave of Thawr during the Hijra, earning the lasting
      epithet *Dhat al-Niṭaqayn* ("She of the Two Belts"). At
      the death of her son, when the Umayyad governor crucified
      his body, she went to him and recited: "to Allah we belong
      and to Him we return." al-Hajjaj asked her: "How did you
      see Allah's enemy?" She replied: "I saw him as one who has
      ruined his world for his next; you have ruined yours for
      his." She narrated 58 hadith in the Six Books and was the
      last of the Muhajirat to die.
    description_ar: |
      توفيت أسماء بنت أبي بكر الصديق رضي الله عنها — أخت عائشة رضي
      الله عنها، وزوجة الزبير بن العوام رضي الله عنه، وأم عبد
      الله بن الزبير — بمكة المكرمة عن نحو مئة سنة، بعد أيام من
      مقتل ابنها. وهي الصحابية التي شقّت نطاقها نصفين لتربط
      بأحدهما زاد رسول الله ﷺ في غار ثور يوم الهجرة، فلقبت
      بـ«ذات النطاقين». ولما قتل ابنها وصُلبت جثته جاءت إليه فقالت:
      «إنا لله وإنا إليه راجعون». فقال لها الحجاج: «كيف رأيت
      عدو الله؟»، فقالت له: «رأيته أفسد دنياه لأخراه، وأفسدتَ أنت
      أخراك لدنياه». روت ثمانية وخمسين حديثاً في الكتب الستة، وهي
      آخر المهاجرات وفاة.
    description_fr: |
      Asmāʾ bint Abī Bakr al-Ṣiddīq, sœur aînée d'ʿĀʾisha ra,
      épouse d'al-Zubayr ibn al-ʿAwwām ra et mère d'ʿAbdallāh ibn
      al-Zubayr — mourut à La Mecque à l'âge d'environ 100 ans,
      quelques jours seulement après le meurtre de son fils. Elle
      est la Compagne qui déchira sa ceinture en deux pour fixer
      les provisions du Prophète ﷺ à la grotte de Thawr durant la
      Hijra, méritant l'épithète durable *Dhāt al-Niṭāqayn*
      (« Celle aux Deux Ceintures »). À la mort de son fils,
      lorsque le gouverneur omeyyade crucifia son corps, elle
      s'approcha et récita : « à Allah nous appartenons et à Lui
      nous retournons ». al-Ḥajjāj lui demanda : « Comment as-tu
      vu l'ennemi d'Allah ? » Elle répondit : « je l'ai vu comme
      celui qui a ruiné son monde pour son au-delà; toi, tu as
      ruiné ton au-delà pour son monde ». Elle rapporta 58 hadiths
      dans les Six Livres et fut la dernière des Muhājirāt à mourir.
