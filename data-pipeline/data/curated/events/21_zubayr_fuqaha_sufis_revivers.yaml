  - slug: death-of-abdullah-ibn-al-zubayr
    category: companion
    title_en: Martyrdom of ʿAbdullah ibn al-Zubayr ra
    title_ar: استشهاد عبد الله بن الزبير رضي الله عنه
    title_fr: Martyre de ʿAbdallāh ibn al-Zubayr ra
    description_en: |
      ʿAbdullah ibn al-Zubayr — first Muslim child born after the
      Hijra (in 1 AH at Quba), grandson of Abu Bakr ra through his
      mother Asma, nephew of ʿAʾisha ra, and the Companion who
      held the caliphate at Mecca for nine years (64-73 AH) in
      contention with the Umayyads of Damascus — was killed during
      the second Umayyad siege of Mecca by al-Hajjaj ibn Yusuf's
      forces. He was about 72. He had refused to give bayʿa to
      Yazid ibn Muʿawiya at Yazid's accession; after the
      catastrophe of Karbala (61 AH) and the sack of Medina at
      al-Ḥarra (63 AH), he was acknowledged caliph by the Hijaz,
      Iraq, Egypt, and parts of Syria. al-Hajjaj catapulted the
      Kaʿba and the Sacred Mosque from Abu Qubays during the siege.
      Ibn al-Zubayr fought to the end, his last words: "Indeed
      Allah's promise is true, and we are most worthy of receiving it."
      His mother Asma viewed his crucified body and said: "Has the
      time not come for this rider to dismount?"
    description_ar: |
      استشهد عبد الله بن الزبير رضي الله عنه — أول مولود في الإسلام
      بعد الهجرة (سنة ١ هـ بقباء)، حفيد أبي بكر الصديق رضي الله
      عنه من ابنته أسماء، وابن أخت عائشة رضي الله عنها، والصحابي
      الذي قام بالخلافة في مكة تسع سنين (٦٤-٧٣ هـ) منازعاً لبني
      أمية بدمشق — في حصار مكة الثاني الأموي بقيادة الحجاج بن يوسف
      الثقفي، وقد ناهز الاثنتين والسبعين. كان قد امتنع عن البيعة
      ليزيد بن معاوية لما تولى، وبعد كارثة كربلاء (٦١ هـ) وواقعة
      الحرة (٦٣ هـ) بايعه أهل الحجاز والعراق ومصر وأطراف الشام.
      ورمى الحجاج الكعبة والمسجد الحرام بالمنجنيق من جبل أبي قبيس
      في الحصار. وقاتل ابن الزبير حتى آخر رمق، وكان من آخر كلماته:
      «إن وعد الله حق، وإنا لأحقّ من أدركه». ولما رأت أمه أسماء
      جثته مصلوبة قالت: «أما آن لهذا الراكب أن ينزل؟».
    description_fr: |
      ʿAbdallāh ibn al-Zubayr — premier enfant musulman né après la
      Hijra (en 1 H à Qubāʾ), petit-fils d'Abu Bakr ra par sa mère
      Asmāʾ, neveu d'ʿĀʾisha ra, et le Compagnon qui détint le
      califat à La Mecque pendant neuf ans (64-73 H) en concurrence
      avec les Omeyyades de Damas — fut tué durant le second siège
      omeyyade de La Mecque par les forces d'al-Ḥajjāj ibn Yūsuf.
      Il avait environ 72 ans. Il avait refusé la *bayʿa* à
      Yazīd ibn Muʿāwiya lors de son accession; après la catastrophe
      de Kerbala (61 H) et le sac de Médine à al-Ḥarra (63 H), il
      fut reconnu calife par le Hedjaz, l'Irak, l'Égypte et des
      parties de la Syrie. al-Ḥajjāj catapulta la Kaʿba et la
      Mosquée Sacrée depuis Abū Qubays durant le siège. Ibn al-
      Zubayr combattit jusqu'à la fin, ses dernières paroles
      furent : « certes la promesse d'Allah est vraie, et nous
      en sommes les plus dignes destinataires ». Sa mère Asmāʾ
      contempla son corps crucifié et dit : « le moment n'est-il
      pas venu pour ce cavalier de mettre pied à terre ? »
