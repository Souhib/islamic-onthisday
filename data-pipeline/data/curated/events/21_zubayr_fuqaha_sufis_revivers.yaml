  - slug: death-of-urwa-ibn-al-zubayr
    category: scholar
    title_en: Death of ʿUrwa ibn al-Zubayr — One of the Seven Jurists of Medina
    title_ar: وفاة عروة بن الزبير — أحد فقهاء المدينة السبعة
    title_fr: Mort d'ʿUrwa ibn al-Zubayr — l'un des Sept Jurisconsultes de Médine
    description_en: |
      ʿUrwa ibn al-Zubayr ibn al-ʿAwwam — son of al-Zubayr and
      Asma bint Abi Bakr, full brother of the caliph ʿAbdullah,
      grand-nephew of ʿAʾisha ra (his student in fiqh and hadith),
      and one of the seven jurists of Medina (*al-fuqahaʾ al-
      sabʿa*) — died in Medina at age about 71. ʿUrwa took the
      opposite political path from his brother: he never gave bayʿa
      to a counter-caliph, devoting himself instead to scholarship
      under both Umayyad and Zubayrid regimes. He was the principal
      conduit through whom ʿAʾisha's hadith reached later
      generations and the first systematic chronicler of the
      Prophetic *maghazi* — his lost *Maghazi Rasul Allah* underlies
      every later sira (Ibn Isḥaq, al-Ṭabari) directly or through
      his student al-Zuhri. al-Walid I had him buried beside the
      Companions in al-Baqiʿ.
    description_ar: |
      توفي الإمام عروة بن الزبير بن العوام — ابن الزبير وأسماء بنت
      أبي بكر، شقيق الخليفة عبد الله، وابن أخت عائشة رضي الله عنها
      (وتلميذها في الفقه والحديث)، وأحد فقهاء المدينة السبعة —
      بالمدينة عن نحو إحدى وسبعين سنة. سلك عروة عكس مسلك أخيه
      السياسي: لم يبايع منازعاً قط، بل تفرغ للعلم في عهدي بني أمية
      وابن الزبير معاً. وهو القناة الرئيسية التي وصلت بها أحاديث
      عائشة رضي الله عنها إلى الأجيال التالية، وأول من سجل المغازي
      النبوية تسجيلاً منهجياً — كتابه «مغازي رسول الله» المفقود
      أصل كل سيرة لاحقة (ابن إسحاق والطبري) إما مباشرة أو عبر
      تلميذه الزهري. ودفنه الوليد الأول إلى جوار الصحابة بالبقيع.
    description_fr: |
      ʿUrwa ibn al-Zubayr ibn al-ʿAwwām — fils d'al-Zubayr et
      d'Asmāʾ bint Abī Bakr, frère germain du calife ʿAbdallāh,
      petit-neveu d'ʿĀʾisha ra (son élève en fiqh et en hadith) et
      l'un des sept jurisconsultes de Médine (*al-fuqahāʾ al-
      sabʿa*) — mourut à Médine à l'âge d'environ 71 ans. ʿUrwa
      emprunta le chemin politique opposé à celui de son frère :
      il ne prêta jamais *bayʿa* à un calife rival, se consacrant
      à l'érudition sous les régimes omeyyade et zubayride. Il
      fut le principal canal par lequel les hadiths d'ʿĀʾisha
      parvinrent aux générations ultérieures et le premier
      chroniqueur systématique des *maghāzī* prophétiques — son
      *Maghāzī Rasūl Allāh* perdu sous-tend toute *sīra* ultérieure
      (Ibn Isḥāq, al-Ṭabarī) directement ou via son élève al-Zuhrī.
      al-Walīd Ier le fit enterrer aux côtés des Compagnons à
      al-Baqīʿ.
