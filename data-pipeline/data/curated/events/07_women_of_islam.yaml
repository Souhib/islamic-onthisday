  - slug: rufayda-first-muslim-nurse
    category: prophetic_era
    title_en: Rufayda al-Aslamiyya — The First Muslim Field Nurse
    title_ar: رُفَيْدة الأسلميّة رضي الله عنها — أوّل ممرّضة في الإسلام
    title_fr: Rufayda al-Aslamiyya ra — la première infirmière de campagne en islam
    description_en: |
      Rufayda al-Aslamiyya is recorded as the first Muslim woman to
      practise medicine and nursing as a systematic profession. During
      the Battle of Khandaq (5 AH) she set up a field tent at the mosque
      of the Prophet ﷺ in Madinah to treat the wounded — the recognised
      starting point of Muslim medical nursing. When Sa'd ibn Mu'adh was
      struck by an arrow, the Prophet ﷺ instructed that he be brought
      to Rufayda's tent for care. Her example established Muslim women's
      participation in the medical arts as a recognised vocation.
    description_ar: |
      تُذكر رُفَيدة الأسلميّة رضي الله عنها بوصفها أوّل امرأة مسلمة
      مارست الطبّ والتمريض مهنةً منظَّمة. في غزوة الخندق (سنة 5هـ)،
      نصبت خيمةً عند مسجد النبي ﷺ بالمدينة لمعالجة الجرحى — وهو ما يُعدّ
      نقطة انطلاق التمريض الطبّي في الحضارة الإسلامية. ولمّا أُصيب سعد
      بن معاذ رضي الله عنه بسهم، أمر النبي ﷺ أن يُحمل إلى خيمة رُفَيدة
      ليُعالَج. وقد أرسى مثالها مشاركة المرأة المسلمة في الطبّ مهنةً
      معترفاً بها.
    description_fr: |
      Rufayda al-Aslamiyya ra est rapportée comme la première femme
      musulmane à exercer la médecine et le soin infirmier comme
      profession organisée. Lors de la bataille du Khandaq (5 H), elle
      installa une tente de campagne près de la mosquée du Prophète ﷺ
      à Médine pour soigner les blessés — point de départ reconnu du
      soin infirmier médical musulman. Lorsque Saʿd ibn Muʿadh ra fut
      atteint d'une flèche, le Prophète ﷺ ordonna qu'il soit porté à la
      tente de Rufayda pour y être soigné. Son exemple établit la
      participation des femmes musulmanes aux arts médicaux comme une
      vocation reconnue.
