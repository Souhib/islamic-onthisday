# Women of Islam — standalone events for the Mothers of the Believers, major
# Sahabiyat, and later women scholars. All dates verified against classical
# biographical dictionaries (Ibn Sa'd's Tabaqat, al-Dhahabi's Siyar, Ibn al-Athir's
# Usd al-Ghaba, Ibn Hajar's al-Isaba).

events:
  - slug: death-of-khadija
    category: prophetic_era
    title_en: Passing of Khadija bint Khuwaylid (First Believer)
    title_ar: وفاة أم المؤمنين خديجة بنت خويلد رضي الله عنها
    title_fr: Décès de Khadija bint Khuwaylid ra (la première croyante)
    description_en: |
      The first of the believers, the first wife of the Prophet ﷺ, and the
      mother of most of his children. She was the one who comforted him at
      the first revelation and who bore twenty-five years of marriage in
      which he took no other wife. She passed away in Makkah in Ramadan,
      the tenth year of prophethood — three years before the Hijra —
      shortly after Abu Talib, the year accordingly called the Year of
      Sorrow ('Am al-Huzn). The Prophet ﷺ buried her with his own hands at
      al-Hajun cemetery. He never ceased to speak of her with love for the
      remainder of his life, and 'A'isha ra reported: "I did not envy any
      of the wives of the Prophet ﷺ as I envied Khadija, even though I
      never met her."
    description_ar: |
      أوّل المؤمنين، وأوّل زوجات النبي ﷺ، وأمّ أكثر أولاده. هي التي
      ثبّتته عند نزول الوحي الأوّل، وعاشت معه خمساً وعشرين سنة لم يتزوّج
      عليها. توفّيت بمكّة في رمضان من السنة العاشرة من البعثة — أي قبل
      الهجرة بثلاث سنين — بعد وفاة أبي طالب بمدّة قصيرة، فسُمّي ذلك العام
      "عام الحُزن". دفنها النبي ﷺ بيده في مقبرة الحَجون. ولم يزل يذكرها
      بالخير حتى آخر حياته. قالت عائشة رضي الله عنها: "ما غِرتُ على امرأة
      من نساء النبي ﷺ ما غِرتُ على خديجة، وما رأيتُها قط".
    description_fr: |
      Première des croyants, première épouse du Prophète ﷺ et mère de la
      plupart de ses enfants. C'est elle qui le rassura lors de la
      première révélation, et avec qui il vécut vingt-cinq années sans
      prendre d'autre épouse. Elle décéda à La Mecque au mois de Ramadan
      de la dixième année de la prophétie — soit trois ans avant l'Hégire —
      peu après Abu Talib ; cette année fut nommée "l'Année de la Tristesse"
      ('Am al-Huzn). Le Prophète ﷺ la mit en terre de ses propres mains
      au cimetière d'al-Hajun. Il ne cessa d'évoquer son souvenir avec
      tendresse jusqu'à la fin de sa vie. ʿĀʾisha ra rapporta : "Je
      n'enviai jamais une femme du Prophète ﷺ comme j'enviai Khadija, et
      pourtant je ne l'ai jamais rencontrée."
    canonical_hijri: {year: -3, month: 9, precision: month}
    canonical_gregorian: {date: 619-11-15, precision: month, method: tabular_conversion}
    claims:
      - source_key: bukhari_sahih
        notes: "Sahih al-Bukhari 3818 — hadith of Aisha on Khadija's station before Allah."
        is_canonical: true
      - source_key: ibn_hisham_sira
      - source_key: ibn_sad_tabaqat
    people: [[khadija-bint-khuwaylid, died], [muhammad, subject]]
    tags: [prophetic-era, sahabiya, makkah, year-of-sorrow]
    importance: major
    verification_status: cross_verified
    verified: true
    source_url: https://en.wikipedia.org/wiki/Khadija_bint_Khuwaylid
    hadith_refs: "Bukhari 3818"

  - slug: martyrdom-of-sumayya
    category: prophetic_era
    title_en: Martyrdom of Sumayya bint Khayyat — First Martyr of Islam
    title_ar: استشهاد سُمَيّة بنت خَيّاط رضي الله عنها — أوّل شهيدة في الإسلام
    title_fr: Martyre de Sumayya bint Khayyat ra — première martyre de l'islam
    description_en: |
      Sumayya, the mother of 'Ammar ibn Yasir, was tortured by Abu Jahl
      for refusing to renounce Islam and killed with a spear in his hand —
      becoming the first martyr of this community. The Prophet ﷺ passed
      by the Yasir family undergoing torture and said: "Patience, O family
      of Yasir — your appointment is Paradise." Her martyrdom took place
      in Makkah, approximately seven years before the Hijra.
    description_ar: |
      سُمَيّة بنت خَيّاط، أمّ عَمّار بن ياسر، عذّبها أبو جهل لرفضها
      التبرّؤ من الإسلام، وطعنها بحربةٍ في يده فقتلها، فكانت أوّل شهيدة
      في هذه الأمّة. ومرّ النبي ﷺ بآل ياسر وهم يُعذَّبون فقال: "صبراً
      آل ياسر، فإنّ موعدكم الجنّة". كان استشهادها بمكّة قبل الهجرة بنحو
      سبع سنوات.
    description_fr: |
      Sumayya, mère de ʿAmmar ibn Yasir, fut torturée par Abu Jahl pour
      avoir refusé de renier l'islam, et il la transperça d'une lance —
      devenant ainsi la première martyre de cette communauté. Le Prophète
      ﷺ passa près de la famille de Yasir alors qu'ils subissaient les
      tortures et dit : "Patience, ô famille de Yasir, votre rendez-vous
      est le Paradis." Son martyre eut lieu à La Mecque, environ sept ans
      avant l'Hégire.
    canonical_hijri: {year: -7, precision: year}
    canonical_gregorian: {date: 615-01-01, precision: year, method: attested}
