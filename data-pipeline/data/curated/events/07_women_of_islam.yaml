  - slug: death-of-rabi-a-al-adawiyya
    category: scholar_death
    title_en: Death of Rabi'a al-'Adawiyya — The Ascetic of Basra
    title_ar: وفاة رابعة العدويّة — زاهدة البصرة
    title_fr: Décès de Rabiʿa al-ʿAdawiyya — l'ascète de Basra
    description_en: |
      A freed slave of Basra who became one of the most influential early
      Muslim ascetics. Her teachings on the love of Allah as an end in
      itself — neither from fear of the Fire nor hope of Paradise —
      shaped later Sufi literature on mahabba. She never married, and
      her supplications and aphorisms are preserved by al-Sulami,
      al-Qushayri, and al-Ghazali. She died in Basra (most sources give
      185 AH / 801 CE; some report ~180 AH) and is buried there.
    description_ar: |
      جارية معتوقة من البصرة، صارت من أعظم زهّاد المسلمين في صدر
      الإسلام. أثّر تعليمها في محبّة الله لذاته — لا خوفاً من النار ولا
      طمعاً في الجنّة — في الأدب الصوفي اللاحق في باب المحبّة. لم
      تتزوّج قطّ، وقد حفظ السلمي والقشيري والغزالي أدعيتها وحِكمها.
      توفّيت بالبصرة (أكثر المصادر على 185هـ / 801م، وبعضها على نحو
      180هـ) ودُفنت بها.
    description_fr: |
      Esclave affranchie de Basra qui devint l'une des plus influentes
      ascètes des débuts de l'islam. Son enseignement sur l'amour
      d'Allah comme fin en soi — sans crainte du Feu ni espoir du Paradis —
      marqua durablement la littérature soufie sur la mahabba. Elle ne
      se maria jamais, et ses invocations et aphorismes sont préservés
      par al-Sulami, al-Qushayri et al-Ghazali. Elle décéda à Basra (la
      plupart des sources donnent 185 H / 801 EC ; certaines ~180 H) et
      y fut enterrée.
