  - slug: death-of-hafsa
    category: rashidun
    title_en: Passing of Hafsa bint 'Umar ra
    title_ar: وفاة حفصة بنت عمر بن الخطّاب رضي الله عنها
    title_fr: Décès de Hafsa bint ʿUmar ra
    description_en: |
      The daughter of Caliph 'Umar ibn al-Khattab and wife of the Prophet
      ﷺ. After her widowhood (she was first married to Khunays ibn
      Hudhafa), her marriage to the Prophet ﷺ placed her among the Mothers
      of the Believers. She was the custodian of the first complete
      written mushaf of the Qur'an, which her father had received from
      Abu Bakr — it remained with her until 'Uthman requested it for the
      standardised codex. She died in Madinah in Sha'ban 45 AH; the day
      is not securely attested.
    description_ar: |
      ابنة الخليفة عمر بن الخطّاب رضي الله عنه، وزوج النبي ﷺ. بعد ترمّلها
      (كانت قبل ذلك زوج خُنَيس بن حُذافة)، تزوّجها النبي ﷺ، فصارت من
      أمّهات المؤمنين. وكانت في حوزتها أوّل مصحف مكتوب جامع للقرآن، الذي
      تسلّمه أبوها من أبي بكر، فبقي عندها حتى طلبه عثمان لينسخ منه المصحف
      الإمام. توفّيت بالمدينة في شعبان سنة 45هـ، واليوم لم يثبت بدقّة.
    description_fr: |
      Fille du calife ʿUmar ibn al-Khattab ra et épouse du Prophète ﷺ.
      Après son veuvage (elle avait d'abord épousé Khunays ibn Hudhafa),
      son mariage avec le Prophète ﷺ la plaça parmi les Mères des
      croyants. Elle fut la dépositaire du premier mushaf complet du
      Coran, que son père avait reçu d'Abu Bakr ; il resta entre ses
      mains jusqu'à ce que ʿUthman le réclame pour la recension
      standard. Elle décéda à Médine en Sha'ban 45 H ; le jour précis
      n'est pas solidement attesté.
    canonical_hijri: {year: 45, month: 8, precision: month}
    canonical_gregorian: {date: 665-10-15, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
