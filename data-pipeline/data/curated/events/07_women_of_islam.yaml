  - slug: nusayba-at-uhud
    category: battle
    title_en: Nusayba bint Ka'b Defends the Prophet ﷺ at Uhud
    title_ar: نسيبة بنت كعب الأنصاريّة رضي الله عنها تدافع عن النبي ﷺ في أُحُد
    title_fr: Nusayba bint Kaʿb ra défend le Prophète ﷺ à Uhud
    description_en: |
      Nusayba bint Ka'b al-Ansariyya (Umm 'Umara) went to Uhud to bring
      water and care for the wounded. When the battle turned and most
      defenders fell back, she stepped forward with a sword and shield to
      defend the Prophet ﷺ directly, taking at least twelve wounds. The
      Prophet ﷺ said: "I did not look left or right without seeing her
      fighting for me." She would later participate in the campaigns
      against Musaylima at Yamama — losing a hand in the battle — and die
      at a great age.
    description_ar: |
      نسيبة بنت كعب الأنصاريّة، المعروفة بأمّ عمارة رضي الله عنها، خرجت
      إلى أُحُد لتسقي الجرحى وتداويهم. فلمّا اضطرب الناس وانكشفوا، تقدّمت
      بسيفها وترسها تذود عن النبي ﷺ مباشرةً، حتى أُصيبت باثنتي عشرة جراحة
      على الأقل. قال النبي ﷺ: "ما التفتُّ يميناً ولا شمالاً يوم أُحُد إلاّ
      وأنا أراها تقاتل دوني". وشاركت من بعدُ في حرب اليمامة ضدّ مُسَيلمة
      الكذّاب — فقُطعت يدها فيها — وعاشت حتى بلغت سنّاً عالية.
    description_fr: |
      Nusayba bint Kaʿb al-Ansariyya (Umm ʿUmara) ra se rendit à Uhud
      pour apporter de l'eau et soigner les blessés. Quand le cours de
      la bataille bascula et que la plupart des défenseurs reculèrent,
      elle s'avança avec une épée et un bouclier pour défendre directement
      le Prophète ﷺ, recevant au moins douze blessures. Le Prophète ﷺ
      dit : "Je ne regardais ni à droite ni à gauche sans la voir
      combattre pour moi." Elle participa plus tard aux campagnes contre
      Musaylima à Yamama — y perdant une main — et vécut jusqu'à un âge
      avancé.
    canonical_hijri: {year: 3, month: 10, day: 7, precision: day}
    canonical_gregorian: {date: 625-03-23, precision: day, method: attested}
