  - slug: death-of-fatima-az-zahra
    category: prophetic_era
    title_en: Passing of Fatima az-Zahra ra
    title_ar: وفاة فاطمة الزهراء رضي الله عنها
    title_fr: Décès de Fatima az-Zahra ra
    description_en: |
      The daughter of the Prophet ﷺ, mother of al-Hasan and al-Husayn, and
      wife of Ali ibn Abi Talib, passed away in Madinah approximately six
      months after her father — fulfilling his private words to her that
      she would be the first of his family to follow him. Classical
      sources diverge sharply on the precise date within 11 AH: Sahih
      al-Bukhari's narration of "six months after the Prophet ﷺ" (3 Jumada
      al-Akhirah 11 AH per Sunni majority calculation) is the most
      commonly cited figure; other Sunni narrations give 3 Ramadan,
      8 Ramadan, or 14 Jumada al-Akhirah. We record month-precision as
      "Jumada al-Akhirah 11 AH" since the day is genuinely contested. She
      is buried in the Baqi' cemetery in Madinah. The Prophet ﷺ had called
      her "the leader of the women of Paradise."
    description_ar: |
      ابنة النبي ﷺ، وأمّ الحسن والحسين، وزوجة عليّ بن أبي طالب رضي الله
      عنه. توفّيت بالمدينة بعد أبيها بنحو ستّة أشهر، تصديقاً لما أسرّ
      إليها أنّها أوّل أهله لحوقاً به. اختلفت المصادر السنّية الكلاسيكية
      في تحديد اليوم بدقّة من سنة 11هـ: فحديث البخاري "عاشت بعد النبي ﷺ
      ستّة أشهر" هو الأشهر، ويُحسب بـ 3 جمادى الآخرة 11هـ عند جمهور
      السنّة؛ وثمّة روايات سنّية أخرى تذكر 3 رمضان أو 8 رمضان أو 14 جمادى
      الآخرة. نسجّل هنا "جمادى الآخرة 11هـ" بدقّة الشهر لأنّ اليوم متنازع
      فيه. دُفنت في البقيع بالمدينة. وقد قال عنها النبي ﷺ إنّها "سيّدة
      نساء أهل الجنّة".
      
      ʿĀʾisha ra's narration in al-Bukhārī gives six months after the Prophet's ﷺ death; other classical accounts record three months or 75 days; we follow the dominant six-month tradition.
      
      روت عائشة رضي الله عنها في «صحيح البخاري» أنها توفيت بعد ستة أشهر من وفاة النبي ﷺ؛ وروايات أخرى ذكرت ثلاثة أشهر أو خمسة وسبعين يوماً؛ ونتبع هنا الرواية المشهورة بستة أشهر.
    description_fr: |
      Fille du Prophète ﷺ, mère d'al-Hasan et al-Husayn, et épouse de
      ʿAli ibn Abi Talib ra. Elle décéda à Médine environ six mois après
      son père — accomplissant sa parole intime selon laquelle elle
      serait la première de sa famille à le rejoindre. Les sources
      classiques divergent fortement sur la date précise au sein de
      l'an 11 H : la narration de Sahih al-Bukhari de "six mois après le
      Prophète ﷺ" (3 Jumada al-Akhirah 11 H selon le calcul majoritaire
      sunnite) est la plus citée ; d'autres narrations sunnites donnent
      3 ou 8 Ramadan, ou 14 Jumada al-Akhirah. Nous enregistrons "Jumada
      al-Akhirah 11 H" avec une précision au mois, le jour étant réellement
      contesté. Elle est enterrée au cimetière de Baqi' à Médine. Le
      Prophète ﷺ l'avait nommée "la maîtresse des femmes du Paradis".
    canonical_hijri: {year: 11, month: 6, precision: month}
    canonical_gregorian: {date: 632-08-15, precision: month, method: tabular_conversion}
    claims:
      - source_key: bukhari_sahih
        notes: "Sahih al-Bukhari 3624 — 'she lived six months after the Prophet ﷺ', the basis for Jumada al-Akhirah dating."
        is_canonical: true
      - source_key: muslim_sahih
        notes: "Sahih Muslim 2450 — same narration tradition."
      - source_key: ibn_sad_tabaqat
        hijri: {year: 11, month: 9, day: 3, precision: day}
        notes: "One Sunni narration giving 3 Ramadan 11 AH."
    people: [[fatima-az-zahra, died]]
