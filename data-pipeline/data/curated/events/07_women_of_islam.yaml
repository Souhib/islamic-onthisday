  - slug: death-of-aisha
    category: rashidun
    title_en: Passing of 'A'isha bint Abi Bakr ra — Mother of the Believers
    title_ar: وفاة أمّ المؤمنين عائشة بنت أبي بكر رضي الله عنها
    title_fr: Décès de ʿĀʾisha bint Abi Bakr ra — Mère des croyants
    description_en: |
      The beloved wife of the Prophet ﷺ and the daughter of Abu Bakr,
      'A'isha ra narrated over 2,210 hadith — more than any other of the
      Mothers of the Believers. She was a teacher of the Companions and
      Tabi'un; Masruq said of her: "I saw the great Companions of the
      Prophet ﷺ — including Abu Bakr and 'Umar — asking her about the
      obligations (fara'id)." She died in Madinah on the 17th of Ramadan,
      58 AH, at age 66, and was buried in the Baqi' cemetery by night.
    description_ar: |
      زوجة النبي ﷺ المحبوبة، وابنة أبي بكر الصدّيق رضي الله عنه. روت
      عائشة رضي الله عنها أكثر من 2210 حديثاً — أكثر من أيّ أمّ من أمّهات
      المؤمنين. وكانت معلّمةً للصحابة والتابعين؛ قال عنها مسروق: "لقد
      رأيتُ مشيخة أصحاب النبي ﷺ الأكابر — أبا بكر وعمر — يسألونها عن
      الفرائض". توفّيت بالمدينة في 17 رمضان سنة 58هـ عن ستٍّ وستّين سنة،
      ودُفنت بالبقيع ليلاً.
    description_fr: |
      Épouse bien-aimée du Prophète ﷺ et fille d'Abu Bakr ra, ʿĀʾisha ra
      rapporta plus de 2 210 hadiths — plus qu'aucune autre des Mères des
      croyants. Elle fut une enseignante des Compagnons et des Tâbi'un ;
      Masruq dit d'elle : "J'ai vu les grands Compagnons du Prophète ﷺ —
      dont Abu Bakr et ʿUmar — lui poser des questions sur les obligations
      (fara'id)." Elle décéda à Médine le 17 Ramadan 58 H, à l'âge de 66
      ans, et fut enterrée de nuit au cimetière de Baqi'.
    canonical_hijri: {year: 58, month: 9, day: 17, precision: day}
    canonical_gregorian: {date: 678-07-16, precision: day, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    people: [[aisha-bint-abi-bakr, died]]
    tags: [sahabiya, mother-of-the-believers, madinah, baqi]
    importance: major
    verification_status: cross_verified
    verified: true
    source_url: https://en.wikipedia.org/wiki/Aisha
    hadith_refs: "Bukhari 3815, Muslim 2442"

  - slug: death-of-umm-salama
    category: umayyad
    title_en: Passing of Umm Salama ra — Last Mother of the Believers
    title_ar: وفاة أمّ سلمة هند بنت أبي أميّة رضي الله عنها — آخر أمّهات المؤمنين
    title_fr: Décès d'Umm Salama ra — dernière des Mères des croyants
    description_en: |
      Hind bint Abi Umayya — "Umm Salama" — was the longest-lived of the
      Mothers of the Believers, dying in Madinah at age 84. She was the
      wife of Abu Salama (one of the first emigrants to Abyssinia) before
      her marriage to the Prophet ﷺ. She narrated 378 hadiths and was a
      major authority in Madinan scholarly circles. She was the last of
      the Ummahat al-Mu'minin to pass. Most classical Sunni sources place
      her death in 62 AH (others propose 61 or 64 AH); we record with
      year-precision since the day is not securely attested.
    description_ar: |
      هند بنت أبي أميّة، المعروفة بـ "أمّ سلمة"، كانت أطول أمّهات المؤمنين
      عمراً، توفّيت بالمدينة عن أربعٍ وثمانين سنة. كانت زوج أبي سلمة (من
      أوائل المهاجرين إلى الحبشة) قبل زواجها من النبي ﷺ. روت 378 حديثاً،
      وكانت من كبار فقهاء المدينة وعلمائها. وهي آخر من توفّي من أمّهات
      المؤمنين. أكثر المصادر السنّية الكلاسيكية تذكر وفاتها سنة 62هـ
      (وقيل 61 أو 64هـ)، فنسجّلها بدقّة السنة لعدم تثبّت اليوم.
      
      Sources record her death between 59 and 62 AH; we follow Ibn Saʿd's *Ṭabaqāt* with 59 AH as the most-cited classical attestation, while Ibn Ḥajar's *Iṣāba* records 61 AH.
      
      ذكرت المصادر وفاتها بين سنتي ٥٩ و٦٢ هـ؛ ونتبع هنا «طبقات» ابن سعد بسنة ٥٩ هـ أكثر التواريخ استشهاداً، مع إيراد ابن حجر العسقلاني سنة ٦١ هـ في «الإصابة».
    description_fr: |
      Hind bint Abi Umayya — "Umm Salama" — fut la plus longévive des
      Mères des croyants, décédée à Médine à l'âge de 84 ans. Elle était
      l'épouse d'Abu Salama (l'un des premiers émigrés en Abyssinie)
      avant son mariage avec le Prophète ﷺ. Elle rapporta 378 hadiths et
      fut une autorité majeure dans les cercles savants médinois. Elle
      fut la dernière des Mères des croyants à s'éteindre. La plupart
      des sources classiques sunnites situent sa mort en 62 H (d'autres
      proposent 61 ou 64 H) ; nous l'enregistrons avec une précision à
      l'année, le jour n'étant pas attesté de façon sûre.
    canonical_hijri: {year: 62, precision: year}
    canonical_gregorian: {date: 681-09-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
        notes: "Ibn Sa'd's Tabaqat — Dhu al-Qa'da 62 AH."
      - source_key: dhahabi_siyar
        notes: "Al-Dhahabi notes the dispute (61, 62 or 64 AH)."
    people: [[umm-salama, died]]
