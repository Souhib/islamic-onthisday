  - slug: death-of-aisha-al-bauniyya
    category: scholar_death
    title_en: Death of 'A'isha al-Ba'uniyya — Mamluk-Era Scholar and Poet
    title_ar: وفاة عائشة الباعونيّة — عالمة العصر المملوكي وشاعرته
    title_fr: Décès de ʿĀʾisha al-Baʿuniyya — savante et poétesse de l'ère mamelouke
    description_en: |
      The most prolific Muslim woman author of the pre-modern period,
      'A'isha al-Ba'uniyya of Damascus composed more than a dozen
      surviving works on Sufism, theology, and poetry — including her
      "al-Muntakhab fi Usul al-Rutab fi 'Ilm al-Tasawwuf." She was
      granted ijaza to teach in the Ba'uniyya school in Damascus, and her
      poetic madih (praise) of the Prophet ﷺ circulated widely in her
      lifetime. She died in Damascus on 16 Dhu al-Qa'da 922 AH (December
      1517 CE), in the early Ottoman period.
    description_ar: |
      أغزر النساء المسلمات تأليفاً قبل العصر الحديث. عائشة الباعونيّة
      الدمشقيّة، صنّفت أكثر من عشرة كتب باقية في التصوّف والعقيدة
      والشعر — منها "المنتخب في أصول الرتب في علم التصوّف". أُجيزت
      للتدريس في المدرسة الباعونيّة بدمشق، وانتشرت قصائدها في مدح النبي ﷺ
      في حياتها. توفّيت بدمشق في 16 ذي القَعْدة سنة 922هـ (ديسمبر 1517م)
      في أوائل العصر العثماني.
    description_fr: |
      Auteure musulmane la plus prolifique de la période pré-moderne,
      ʿĀʾisha al-Baʿuniyya de Damas composa plus d'une dizaine d'ouvrages
      préservés sur le soufisme, la théologie et la poésie — dont
      "al-Muntakhab fi Usul al-Rutab fi ʿIlm al-Tasawwuf". Elle reçut
      l'ijaza pour enseigner à l'école Baʿuniyya de Damas, et ses
      poèmes en éloge du Prophète ﷺ (madih) circulèrent largement de son
      vivant. Elle décéda à Damas le 16 Dhu al-Qaʿda 922 H (décembre
      1517 EC), au début de l'époque ottomane.
    canonical_hijri: {year: 922, month: 11, day: 16, precision: day}
    canonical_gregorian: {date: 1517-12-11, precision: day, method: attested}
