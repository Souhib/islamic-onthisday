  - slug: umm-sulaym-and-prophet
    category: prophetic_era
    title_en: Umm Sulaym and the Patience of the Believers
    title_ar: أمّ سُلَيم رضي الله عنها وصبر المؤمنين
    title_fr: Umm Sulaym ra et la patience des croyants
    description_en: |
      Umm Sulaym bint Milhan al-Ansariyya was among the earliest of the
      Ansar to embrace Islam. When her son's death came while her husband
      Abu Talha was away, she prepared food and composed herself, telling
      him only after he had eaten — with the famous words: "What do you
      say about one who took a loan and returns it to its owner when
      asked?" The Prophet ﷺ smiled at her report and prayed for blessing
      in that night. Anas ibn Malik — nine of whose siblings came from
      this union — is the most prolific hadith narrator of the Ansar
      because of his service to the Prophet ﷺ, which Umm Sulaym
      arranged.
    description_ar: |
      أمّ سُلَيم بنت مِلْحان الأنصاريّة رضي الله عنها كانت من أوائل
      الأنصار إسلاماً. لمّا توفّي ابنها وزوجها أبو طلحة غائب، هيّأت
      الطعام وتجمّلت، فلم تخبره حتى أكل وفرغ، ثم قالت كلمتها المشهورة:
      "ما تقول في قومٍ أعاروا قوماً عاريةً، فلمّا طُلبت منهم منعوها؟"
      فتبسّم النبي ﷺ من خبرها ودعا لهما بالبركة في ليلتهما. وأنس بن مالك —
      الذي وُلد له تسعة من إخوته من هذا الاقتران — هو أكثر الأنصار رواية
      للحديث، بفضل خدمته للنبي ﷺ التي أوصلتها إليها أمّه أمّ سُلَيم.
    description_fr: |
      Umm Sulaym bint Milhan al-Ansariyya ra fut parmi les premiers des
      Ansar à embrasser l'islam. Quand son fils mourut alors que son
      époux Abu Talha était absent, elle prépara le repas, se composa,
      et ne lui annonça la nouvelle qu'après qu'il eut mangé — avec ces
      mots célèbres : "Que dis-tu de gens qui ont prêté quelque chose à
      d'autres, et que ces derniers refusent de la rendre ?" Le Prophète
      ﷺ sourit en entendant le récit et invoqua la bénédiction sur leur
      nuit. Anas ibn Malik ra — duquel naquirent neuf frères et sœurs
      de cette union — est le plus prolifique narrateur de hadiths parmi
      les Ansar, grâce à son service auprès du Prophète ﷺ qu'avait
      arrangé sa mère Umm Sulaym.
    canonical_hijri: {year: 1, precision: year}
    canonical_gregorian: {date: 622-07-19, precision: year, method: attested}
    claims:
      - source_key: bukhari_sahih
        is_canonical: true
        notes: Sahih al-Bukhari 1301 — narration of Anas ibn Malik on Abu Talha and his wife (Umm Sulaym).
      - source_key: muslim_sahih
        notes: Sahih Muslim — Book of Virtues of the Companions, hadith on Umm Sulaym and Abu Talha.
    people: [[umm-sulaym, subject], [muhammad, subject]]
