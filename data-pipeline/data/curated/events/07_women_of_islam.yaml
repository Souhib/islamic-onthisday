  - slug: death-of-fatima-al-fihri
    category: scholar_death
    title_en: Death of Fatima bint Muhammad al-Fihri — Founder of al-Qarawiyyin
    title_ar: وفاة فاطمة بنت محمد الفِهريّة — مؤسِّسة جامعة القرويّين
    title_fr: Décès de Fatima bint Muhammad al-Fihri — fondatrice d'al-Qarawiyyin
    description_en: |
      The Tunisian-born Fatima al-Fihri, who had inherited a substantial
      estate from her father, endowed the mosque and teaching complex at
      Fez that became al-Qarawiyyin — continuously operating since 245 AH
      (859 CE) and recognised by UNESCO as the oldest existing university.
      She died in Fez circa 880 CE, having seen the institution take
      root. The traditional account of her foundation is preserved
      principally in Ibn Abi Zar' (14th c., "Rawd al-Qirtas").
    description_ar: |
      وُلدت فاطمة الفِهريّة في القيروان بتونس، وورثت عن أبيها ثروةً
      كبيرة. أوقفت بمدينة فاس مسجداً ومجمَّعاً تعليميّاً صار جامعةَ
      القرويّين — التي تعمل بلا انقطاع منذ سنة 245هـ (859م)، وتعترف بها
      اليونسكو بوصفها أقدم جامعة قائمة في العالم. توفّيت بفاس نحو سنة
      880م، بعد أن رأت مؤسّستها قد ترسّخت. والرواية التقليديّة عن
      تأسيسها محفوظة أساساً في "الروض القرطاس" لابن أبي زرع (القرن
      الثامن الهجري).
    description_fr: |
      Née à Kairouan en Tunisie, Fatima al-Fihri hérita d'une fortune
      considérable de son père. Elle fonda et dota à Fès une mosquée et
      un complexe d'enseignement qui devint al-Qarawiyyin — en
      fonctionnement continu depuis 245 H (859 EC) et reconnue par
      l'UNESCO comme la plus ancienne université existante au monde.
      Elle décéda à Fès vers 880 EC, ayant vu son institution
      s'enraciner. Le récit traditionnel de sa fondation est
      principalement préservé dans le "Rawd al-Qirtas" d'Ibn Abi Zar'
      (XIVe siècle).
    canonical_hijri: {year: 265, precision: year}
    canonical_gregorian: {date: 880-01-01, precision: year, method: attested}
