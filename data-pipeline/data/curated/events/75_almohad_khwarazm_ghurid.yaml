# Wave 75 of curated event additions (2026-04-27).
# 12 events covering the Almohad caliphs after ʿAbd al-Muʾmin, the
# Ghurid–Delhi-Mamlūk transmission of Islamic rule into the Indian
# subcontinent, and the catastrophic destruction of the Khwārazm-Shāh
# state by Genghis Khan's Mongols (the so-called "Mongol Catastrophe").
#
# Already in the dataset and NOT duplicated here:
#  - second-battle-of-tarain (588 AH)        — events/25
#  - death-of-jalal-al-din-khwarazmshah      — events/47
#  - mongol-siege-of-bukhara (617 AH)        — events/24
#  - sack-of-baghdad (656 AH)                — events/00
#  - battle-of-ain-jalut (658 AH)            — events/00
#
# Sources used (all in sources.yaml):
#   ibn_athir_kamil, ibn_kathir_bidaya, ibn_khallikan_wafayat,
#   dhahabi_tarikh_islam, dhahabi_siyar, ei2.
#
# Editorial framing notes:
# - The Almohads are recorded as a Berber Sunni-Mahdist movement;
#   Ibn Tūmart's Mahdist self-claim was rejected by mainstream Sunni
#   scholarship but is part of the historical record.
# - The Mongol sacks of Samarqand, Merv and Nishapur are reported
#   factually with civilian massacre figures as transmitted by Ibn
#   al-Athīr, al-Dhahabī and Ibn Kathīr — without glorification or
#   sensationalism. Ibn al-Athīr's al-Kāmil is the principal eyewitness
#   chronicle of the catastrophe.
# - Genghis Khan and Hülegü are non-Muslim figures, but their deaths
#   are landmarks in Islamic-world history; we include them as
#   historical events without endorsement.

events:
  # =========================================================================
  # ALMOHAD CALIPHS — successors of ʿAbd al-Muʾmin
  # =========================================================================

  - slug: death-of-abu-yaqub-yusuf-almohad
    category: ruler_death
    title_en: Death of Abū Yaʿqūb Yūsuf I — Almohad Caliph at the Siege of Santarém
    title_ar: وفاة أبي يعقوب يوسف الأول — الخليفة الموحدي في حصار شَنْتَرِين
    title_fr: Mort d'Abū Yaʿqūb Yūsuf Ier — calife almohade au siège de Santarém
    description_en: |
      Abū Yaʿqūb Yūsuf I, second Almohad caliph and son of ʿAbd
      al-Muʾmin, died of wounds received at the siege of Shantarīn
      (Santarém) in Portugal in Rabīʿ I 580 AH (July 1184 CE). He
      had crossed into al-Andalus that summer at the head of a
      large Almohad army to suppress the Portuguese Reconquista
      pressure on the Tagus valley; his troops surrounded
      Santarém — held by Afonso I Henriques of Portugal — but
      were repulsed in a Christian sortie in which the caliph
      himself was wounded. He died near Évora as the army
      withdrew. His twenty-one-year reign had stabilised the
      Almohad caliphate after his father's wars of unification:
      he completed the conquest of the Maghrib, secured Ifrīqiya
      against the Banū Ghāniya remnant of the Almoravids, and
      founded Ribāṭ al-Fatḥ (Rabat) on the Atlantic coast as a
      base for jihād campaigns into al-Andalus. He was a patron
      of philosophy who befriended Ibn Ṭufayl and summoned the
      young Ibn Rushd (Averroes) to write the great Aristotle
      commentaries. He was succeeded by his son Yaʿqūb al-Manṣūr.
      Ibn al-Athīr, Ibn Khallikān and al-Dhahabī all enter the
      death under 580 AH at Santarém.
    description_ar: |
      توفي أبو يعقوب يوسف الأول — ثاني خلفاء الموحدين وابن عبد
      المؤمن — متأثراً بجراحه في حصار شَنْتَرِين (Santarém)
      بالبرتغال، في ربيع الأول سنة ٥٨٠ هـ (يوليو ١١٨٤ م). وكان
      قد عبر إلى الأندلس ذلك الصيف على رأس جيش موحدي كبير لردع
      ضغط الاسترداد البرتغالي على وادي تاجُه؛ فضرب جنودُه
      الحصار على شَنْتَرِين التي يحتميها أَلْفُونْسُ الأول
      هنريكيس ملك البرتغال، فردَّتهم خرجة نصرانية أُصيب فيها
      الخليفةُ بنفسه، وتوفي قرب يابُرَة (Évora) أثناء انسحاب
      الجيش. أرسى حكمُه — الذي دام إحدى وعشرين سنة — أركانَ
      الخلافة الموحدية بعد حروب التوحيد التي خاضها أبوه: فأكمل
      افتتاح المغرب، وأمَّن إفريقية من بقايا بني غانية
      المرابطيين، وأسس رِباطَ الفتح على ساحل المحيط قاعدةً لجهاد
      الأندلس. وكان راعياً للفلسفة، صادق ابنَ طُفَيل، واستدعى
      الفتى ابن رشد ليؤلِّف شروحه الكبرى على أرسطو. وخلفه ابنه
      يعقوب المنصور. ويثبت ابنُ الأثير وابن خلكان والذهبي
      الوفاةَ في ٥٨٠ هـ بشَنْتَرِين.
    description_fr: |
      Abū Yaʿqūb Yūsuf Ier, deuxième calife almohade et fils
      de ʿAbd al-Muʾmin, mourut des suites de blessures reçues
      au siège de Shantarīn (Santarém) au Portugal en Rabīʿ I
      580 H (juillet 1184 EC). Il avait passé le détroit cet
      été-là à la tête d'une grande armée almohade pour
      étouffer la pression reconquérante portugaise dans la
      vallée du Tage ; ses troupes encerclèrent Santarém —
      tenue par Alphonse Ier Henriques de Portugal — mais
      furent repoussées par une sortie chrétienne au cours de
      laquelle le calife lui-même fut blessé. Il mourut près
      d'Évora pendant que l'armée se repliait. Son règne de
      vingt-et-un ans avait stabilisé le califat almohade après
      les guerres d'unification de son père : il acheva la
      conquête du Maghrib, sécurisa l'Ifrīqiya face au reliquat
      almoravide des Banū Ghāniya, et fonda Ribāṭ al-Fatḥ
      (Rabat) sur la côte atlantique comme base de jihād en
      al-Andalus. Mécène de la philosophie, il fut l'ami d'Ibn
      Ṭufayl et fit venir le jeune Ibn Rushd (Averroès) pour
      composer ses grands commentaires d'Aristote. Son fils
      Yaʿqūb al-Manṣūr lui succéda. Ibn al-Athīr, Ibn
      Khallikān et al-Dhahabī enregistrent tous la mort en
      580 H à Santarém.
    canonical_hijri: {year: 580, month: 3, precision: month}
    canonical_gregorian: {date: 1184-07-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr enters the death of Abū Yaʿqūb Yūsuf at the siege of Shantarīn under 580 AH and the succession of his son Yaʿqūb al-Manṣūr."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān has a biographical entry placing the death in 580 AH at Santarém."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms 580 AH for the Almohad caliph's death from wounds at Shantarīn."
    people: [[abu-yaqub-yusuf-almohad, died]]
    tags: [almohad, caliph, andalus, maghrib, santarem, siege, ruler_death]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-yaqub-al-mansur-almohad
    category: ruler_death
    title_en: Death of Yaʿqūb al-Manṣūr — Almohad Caliph and Victor of al-Arak
    title_ar: وفاة يعقوب المنصور — الخليفة الموحدي وفاتح الأَرَك
    title_fr: Mort de Yaʿqūb al-Manṣūr — calife almohade et vainqueur d'Alarcos
    description_en: |
      Abū Yūsuf Yaʿqūb al-Manṣūr, third Almohad caliph and son
      of Abū Yaʿqūb Yūsuf I, died at his capital Marrakesh in
      Rabīʿ I 595 AH (January 1199 CE) after a fifteen-year
      reign that took the Almohad caliphate to its territorial
      and political apogee. He won the great victory of al-Arak
      (Alarcos) over Alfonso VIII of Castile in 591 AH (1195
      CE) — the most decisive Muslim battlefield success in
      al-Andalus since al-Zallāqa, in honour of which he took
      the laqab "al-Manṣūr bi-Llāh" (Victor by God). He
      campaigned three times into the Andalusi marches, raising
      sieges of Toledo and pushing the Castilian frontier back
      to the Tagus. At home he completed the great works that
      define Almohad architectural patrimony: the Kutubiyya
      Mosque of Marrakesh, the Giralda and Great Mosque of
      Seville, and Ribāṭ al-Fatḥ (Rabat) including the unfinished
      Ḥassan Tower. He gave Ibn Rushd (Averroes) protection but
      later, under pressure from the Mālikī fuqahāʾ, exiled him
      to Lucena and burned his philosophical works — a famous
      reversal in Andalusi intellectual history. Ibn al-Athīr,
      Ibn Khallikān and al-Dhahabī all enter the death in 595 AH.
    description_ar: |
      توفي أبو يوسف يعقوب المنصور — ثالث خلفاء الموحدين وابن
      أبي يعقوب يوسف — بعاصمته مَرَّاكُش في ربيع الأول سنة
      ٥٩٥ هـ (يناير ١١٩٩ م) بعد حكم دام خمس عشرة سنة بلغت فيها
      الخلافةُ الموحدية أوجَها. أحرز نصرَه الكبير في الأَرَك
      (Alarcos) على ألفونسو الثامن ملك قشتالة سنة ٥٩١ هـ
      (١١٩٥ م) — أكبرَ نصر إسلامي في الأندلس منذ الزَّلاقة —
      فتلقَّب لذلك «المنصور بالله». وسار ثلاث مرات في الأندلس
      فرفع حصار طُلَيطِلَة وردَّ تخوم قشتالة إلى وادي تاجُه.
      وأكمل في المغرب الآثار الكبرى التي تَمَيَّزَ بها العمران
      الموحدي: جامع الكُتُبِيَّة بمراكش، والجِيرالدا وجامع إشبيلية
      الأكبر، ورِباط الفتح بما فيه صومعة حسَّان غير المكتملة.
      وآوى ابنَ رُشد ثم نفاه — تحت ضغط فقهاء المالكية — إلى
      لُوسِيَّنا وأحرق كتبه الفلسفية، وهو من أبرز الانعطافات
      في تاريخ الأندلس الفكري. ويثبت ابن الأثير وابن خلكان
      والذهبي الوفاةَ في ٥٩٥ هـ.
    description_fr: |
      Abū Yūsuf Yaʿqūb al-Manṣūr, troisième calife almohade et
      fils d'Abū Yaʿqūb Yūsuf Ier, mourut dans sa capitale
      Marrakech en Rabīʿ I 595 H (janvier 1199 EC), après un
      règne de quinze ans qui porta le califat almohade à son
      apogée territoriale et politique. Il remporta la grande
      victoire d'al-Arak (Alarcos) sur Alphonse VIII de
      Castille en 591 H (1195 EC) — la plus décisive victoire
      musulmane en al-Andalus depuis al-Zallāqa — en l'honneur
      de laquelle il prit le laqab d'« al-Manṣūr bi-Llāh » (le
      Victorieux par Dieu). Il fit trois campagnes dans les
      marches andalouses, leva les sièges de Tolède et repoussa
      la frontière castillane jusqu'au Tage. Au Maghrib, il
      acheva les grandes œuvres qui définissent le patrimoine
      architectural almohade : la mosquée de la Kutubiyya à
      Marrakech, la Giralda et la grande mosquée de Séville,
      et Ribāṭ al-Fatḥ (Rabat) avec sa tour Ḥassan inachevée.
      Il protégea d'abord Ibn Rushd (Averroès) puis, sous la
      pression des fuqahāʾ mālikites, l'exila à Lucena et fit
      brûler ses œuvres philosophiques — un revirement célèbre
      de l'histoire intellectuelle andalouse. Ibn al-Athīr, Ibn
      Khallikān et al-Dhahabī enregistrent tous la mort en
      595 H.
    canonical_hijri: {year: 595, month: 3, precision: month}
    canonical_gregorian: {date: 1199-01-01, precision: month, method: tabular_conversion}
