events:
  - slug: death-of-ibn-al-naqib-al-misri
    category: scholar_death
    title_en: Death of Ibn al-Naqīb al-Miṣrī — Author of ʿUmdat al-Sālik
    title_ar: وفاة ابن النقيب المصري — مؤلف «عمدة السالك»
    title_fr: Mort d'Ibn al-Naqīb al-Miṣrī — auteur de l'ʿUmdat al-Sālik
    description_en: |
      Abū Muḥammad ʿAbd Allāh ibn Naqīb al-Miṣrī al-Shāfiʿī,
      the Egyptian jurist who composed *ʿUmdat al-Sālik wa
      ʿUddat al-Nāsik*, the most widely used condensed manual
      of Shāfiʿī fiqh in the modern Muslim world, died in 769
      AH (~1368 CE). Born in Egypt around 710 AH, he studied
      at al-Azhar under the leading Shāfiʿī scholars of his
      generation and served as a judge and teacher in Cairo.
      His *ʿUmda* — a concise yet comprehensive summary of
      Shāfiʿī law organised by the standard chapters of fiqh —
      was designed for students and travellers who needed a
      portable reference. It became the standard introductory
      text in Shāfiʿī seminaries from Egypt to Yemen to
      Indonesia, and remains in print across the Muslim world
      today with numerous commentaries and super-commentaries.
    description_ar: |
      توفي أبو محمد عبد الله بن نقيب المصري الشافعي — الفقيه
      المصري الذي ألّف «عمدة السالك وعدة الناسك»، أكثر
      متون الفقه الشافعي الوجيزة استعمالاً في العالم
      الإسلامي الحديث — سنة ٧٦٩ هـ (~١٣٦٨ م). وُلد بمصر
      نحو سنة ٧١٠ هـ، وتتلمذ بالأزهر على كبار علماء
      الشافعية في جيله وخدم قاضياً ومدرّساً بالقاهرة.
      و«عمدته» — ملخص موجز شامل للفقه الشافعي مرتب
      بأبواب الفقه المعتادة — صُممت للطلاب والمسافرين
      المحتاجين إلى مرجع محمول. وصارت النص المدخلي
      القياسي في حلقات الشافعية من مصر إلى اليمن
      إلى إندونيسيا، ولا تزال مطبوعة في عموم العالم
      الإسلامي بشروح وتحشيات عديدة.
    description_fr: |
      Abū Muḥammad ʿAbd Allāh ibn Naqīb al-Miṣrī al-Shāfiʿī,
      juriste égyptien qui rédigea *ʿUmdat al-Sālik wa ʿUddat
      al-Nāsik*, le manuel condensé de fiqh shāfiʿite le plus
      utilisé dans le monde musulman moderne, mourut en 769 H
      (~1368 EC). Né en Égypte vers 710 H, il étudia à al-
      Azhar auprès des principaux savants shāfiʿites de sa
      génération et servit comme juge et enseignant au Caire.
      Son *ʿUmda* — un résumé concis mais complet du fiqh
      shāfiʿite organisé selon les chapitres standards du fiqh
      — fut conçu pour les étudiants et voyageurs ayant besoin
      d'une référence portable. Il devint le texte
      d'introduction standard dans les séminaires shāfiʿites
      d'Égypte au Yémen en passant par l'Indonésie, et reste
      imprimé à travers le monde musulman avec de nombreux
      commentaires et super-commentaires.
