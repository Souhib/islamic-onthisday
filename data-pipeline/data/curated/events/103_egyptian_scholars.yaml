  - slug: death-of-abd-al-rahman-al-jabarti
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān al-Jabartī — Chronicler of Napoleon's Invasion
    title_ar: وفاة عبد الرحمن الجبرتي — مؤرخ الغزو الفرنسي لمصر
    title_fr: Mort de ʿAbd al-Raḥmān al-Jabartī — chroniqueur de l'invasion napoléonienne
    description_en: |
      ʿAbd al-Raḥmān ibn Ḥasan al-Jabartī, the Egyptian
      historian whose *ʿAjāʾib al-Āthār fī al-Tarājim wa-l-
      Akhbār* provides the most detailed contemporary Arabic
      account of the French invasion of Egypt (1798) and the
      subsequent Ottoman restoration, died in Cairo in 1241 AH
      (~1825 CE). Born into a family of scholars in 1167 AH
      (1753 CE), he studied at al-Azhar under the leading
      scholars of his generation and witnessed firsthand the
      turbulent decades that transformed Egypt from an Ottoman
      province into the autonomous power base of Muḥammad ʿAlī
      Pasha. His chronicle — organised as a year-by-year
      annal — preserves invaluable eyewitness testimony of the
      Battle of the Pyramids, the Cairo revolt of 1798, and
      the political manoeuvring of the Mamlūk beys. Beyond
      the French period, his work is a major source for the
      social, religious, and economic history of late
      eighteenth-century Egypt.
    description_ar: |
      توفي عبد الرحمن بن حسن الجبرتي — المؤرخ المصري الذي
      يقدم كتابه «عجائب الآثار في التراجم والأخبار» أكثر
      الروايات العربية المعاصرة تفصيلاً عن الغزو الفرنسي
      لمصر (١٧٩٨) واستعادة العثمانيين لها بعد ذلك —
      بالقاهرة سنة ١٢٤١ هـ (~١٨٢٥ م). وُلد في بيت علم
      سنة ١١٦٧ هـ (١٧٥٣ م)، وتتلمذ بالأزهر على كبار
      علماء جيله وشهد عقوداً مضطربة حوّلت مصر من
      ولاية عثمانية إلى قاعدة السلطة المستقلة لمحمد
      علي باشا. ودونت كتابته — المرتبة حسب السنوات
      — شهادة عيان لا تقدر بثمن عن معركة الأهرام
      وثورة القاهرة سنة ١٧٩٨ ومناورات البكوات
      المماليك. وإلى جانب الفترة الفرنسية، يُعدّ
      عمله مصدراً رئيسياً للتاريخ الاجتماعي والديني
      والاقتصادي لمصر أواخر القرن الثامن عشر.
    description_fr: |
      ʿAbd al-Raḥmān ibn Ḥasan al-Jabartī, historien égyptien
      dont *ʿAjāʾib al-Āthār fī al-Tarājim wa-l-Akhbār*
      fournit le récit arabe contemporain le plus détaillé de
      l'invasion française de l'Égypte (1798) et de la
      restauration ottomane subséquente, mourut au Caire en
      1241 H (~1825 EC). Né dans une famille de savants en
      1167 H (1753 EC), il étudia à al-Azhar auprès des
      principaux érudits de sa génération et fut témoin des
      décennies turbulentes qui transformèrent l'Égypte d'une
      province ottomane en la base de pouvoir autonome de
      Muḥammad ʿAlī Pacha. Sa chronique — organisée comme
      une annale année par année — préserve un témoignage
      oculaire inestimable de la bataille des Pyramides, de
      la révolte du Caire de 1798 et des manœuvres politiques
      des beys mamelouks. Au-delà de la période française,
      son œuvre est une source majeure pour l'histoire
      sociale, religieuse et économique de l'Égypte de la fin
      du 18e siècle.
