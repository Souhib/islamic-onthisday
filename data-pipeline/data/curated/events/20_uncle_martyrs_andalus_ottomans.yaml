  - slug: death-of-abu-hayyan-al-gharnati
    category: scholar
    title_en: Death of Abu Ḥayyan al-Gharnaṭi — author of al-Bahr al-Muḥit
    title_ar: وفاة أبي حيان الغرناطي — صاحب «البحر المحيط»
    title_fr: Mort d'Abū Ḥayyān al-Gharnāṭī — auteur d'al-Baḥr al-Muḥīṭ
    description_en: |
      Abu Ḥayyan Muhammad ibn Yusuf al-Gharnaṭi al-Andalusi —
      Andalusian-born scholar who emigrated to Cairo, foremost
      grammarian of the Mamluk Levant, and author of *al-Bahr al-
      Muḥit*, the most exhaustive linguistic-grammatical Qurʾan
      commentary in the Sunni tradition — died in Cairo at age
      about 91. Beyond Arabic he had documented working knowledge
      of Berber, Turkish, Mongol, and Persian; his comparative
      grammar of Turkic languages (*Kitab al-Idrak li-Lisan al-
      Atrak*) was the first systematic Turkic linguistic work
      composed in Arabic. *al-Bahr al-Muḥit* applies the full
      methodology of Andalusian grammatical and *qiraʾat* analysis
      to every verse of the Qurʾan, citing more than 450 prior
      authorities. He was a Ẓahiri in fiqh (rejecting analogical
      reasoning, as Ibn Ḥazm had).
    description_ar: |
      توفي الإمام أبو حيان محمد بن يوسف الغرناطي الأندلسي — مولده
      الأندلس وانتقاله إلى القاهرة، وكبير نحاة المماليك بالشام،
      ومصنف «البحر المحيط»، أوسع تفاسير القرآن لغة ونحواً عند أهل
      السنة — بالقاهرة عن نحو إحدى وتسعين سنة. وأتقن إلى جانب
      العربية البربرية والتركية والمغولية والفارسية على شهادة
      كتبه؛ وكتابه «الإدراك للسان الأتراك» أول كتاب لغوي منهجي عن
      اللغات التركية بالعربية. ويطبق «البحر المحيط» منهج النحو
      الأندلسي وعلم القراءات على كل آية من القرآن، مع نقل عن أزيد
      من أربع مئة وخمسين مرجعاً سابقاً. وكان ظاهري المذهب (يرفض
      القياس كما رفضه ابن حزم).
    description_fr: |
      Abū Ḥayyān Muḥammad ibn Yūsuf al-Gharnāṭī al-Andalusi —
      savant né en al-Andalus émigré au Caire, plus grand
      grammairien du Levant mamelouk, et auteur d'*al-Baḥr al-
      Muḥīṭ*, le commentaire coranique linguistico-grammatical le
      plus exhaustif de la tradition sunnite — mourut au Caire à
      l'âge d'environ 91 ans. Outre l'arabe, il avait une
      connaissance documentée du berbère, du turc, du mongol et du
      persan; sa grammaire comparée des langues turques (*Kitāb
      al-Idrāk li-Lisān al-Atrāk*) fut le premier ouvrage
      linguistique turcique systématique composé en arabe. *al-
      Baḥr al-Muḥīṭ* applique la méthodologie complète de l'analyse
      grammaticale andalouse et des *qirāʾāt* à chaque verset du
      Coran, citant plus de 450 autorités antérieures. Il était
      ẓāhirite en fiqh (rejetant le raisonnement analogique, comme
      Ibn Ḥazm).
    canonical_hijri: {year: 745, month: 8, precision: month}
