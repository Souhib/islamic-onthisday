  - slug: conquest-of-aleppo
    category: conquest
    title_en: Muslim Conquest of Aleppo
    title_ar: فتح حلب
    title_fr: Conquête musulmane d'Alep
    description_en: |
      The strategic Byzantine city of Aleppo (Ḥalab) in northern
      Syria fell to the Muslim army under Abu ʿUbayda ibn al-
      Jarrah ra and Khalid ibn al-Walid ra after the conquest of
      Ḥims and the fall of Damascus. The terms of capitulation —
      a fixed jizya per adult male, with protection of life,
      property, and churches, mirroring the model of the Ḥims
      treaty — were preserved by the Muslim historians as a
      documented precedent for non-Muslim subjects under early
      Islamic rule. The fall of Aleppo opened the entire northern
      Syrian frontier and led directly to the conquest of Antioch
      the following year, completing the Muslim displacement of
      Byzantine power from the Levant. ʿUmar ibn al-Khaṭṭab ra
      personally inspected the city in his Levantine tour of
      17 AH.
    description_ar: |
      سقطت مدينة حلب الحصينة قاعدة الروم في شمال الشام للجيش
      الإسلامي بقيادة أبي عبيدة بن الجراح وخالد بن الوليد رضي الله
      عنهما، بعد فتح حمص وسقوط دمشق. وكانت شروط الصلح — جزية مقدرة
      على البالغين من الرجال، مع حقن الدماء وحفظ الأموال والكنائس
      على طراز عقد حمص — قد حفظها المؤرخون المسلمون شاهداً موثقاً
      على وضع غير المسلمين تحت الحكم الإسلامي الباكر. وفتح سقوط
      حلب الحدود الشمالية كلها للشام، وأدى مباشرة إلى فتح أنطاكية
      في السنة التالية، فاكتمل إخراج المسلمين للنفوذ البيزنطي من
      بلاد الشام. وقد فقد عمر بن الخطاب رضي الله عنه المدينة
      بنفسه في جولته الشامية سنة ١٧ للهجرة.
    description_fr: |
      La cité byzantine stratégique d'Alep (Ḥalab) au nord de la
      Syrie tomba aux mains de l'armée musulmane sous Abū ʿUbayda
      ibn al-Jarrāḥ ra et Khālid ibn al-Walīd ra après la conquête
      de Ḥims et la chute de Damas. Les conditions de capitulation
      — une *jizya* fixe par homme adulte, avec protection des
      vies, des biens et des églises, reflétant le modèle du
      traité de Ḥims — furent préservées par les historiens
      musulmans comme précédent documenté pour les sujets non
      musulmans sous la domination islamique précoce. La chute
      d'Alep ouvrit toute la frontière syrienne du nord et mena
      directement à la conquête d'Antioche l'année suivante,
      achevant le déplacement musulman du pouvoir byzantin du
      Levant. ʿUmar ibn al-Khaṭṭāb ra inspecta personnellement la
      ville lors de sa tournée levantine de 17 H.
    canonical_hijri: {year: 16, precision: year}
    canonical_gregorian: {date: 637-01-01, precision: year, method: attested}
