  - slug: martyrdom-of-jafar-ibn-abi-talib
    category: companion
    title_en: Martyrdom of Jaʿfar ibn Abi Ṭalib ra at Mu'ta — Dhu al-Janahayn
    title_ar: استشهاد جعفر بن أبي طالب رضي الله عنه يوم مؤتة — ذو الجناحين
    title_fr: Martyre de Jaʿfar ibn Abī Ṭālib ra à Muʾta — Dhū al-Janāḥayn
    description_en: |
      Jaʿfar ibn Abi Ṭalib — first cousin of the Prophet ﷺ, elder
      brother of ʿAli ra, leader of the early emigration to
      Abyssinia (where his speech to the Negus is preserved verbatim
      in Aḥmad's *Musnad*), and the man whom the Prophet ﷺ
      compared to himself in resemblance and character — fell
      martyred at the Battle of Mu'ta (8 AH) while leading the
      Muslim force against the Byzantine army. He took the standard
      from Zayd ibn Ḥaritha when Zayd was killed, held it until
      his right hand was severed, took it in his left until that
      was severed, then held it between the stumps of both arms
      against his chest until he was killed at age about 41. The
      Prophet ﷺ said of him: "Allah has replaced his arms with
      two wings with which he flies in Paradise" — hence his epithet
      *Dhu al-Janahayn* ("the One with Two Wings"). The Prophet ﷺ
      wept publicly when news reached Medina.
    description_ar: |
      استشهد جعفر بن أبي طالب رضي الله عنه — ابن عم رسول الله ﷺ،
      وأكبر إخوة علي رضي الله عنه، وقائد الهجرة الأولى إلى الحبشة
      (وفيها خطبته الذائعة بين يدي النجاشي المحفوظة في «مسند»
      الإمام أحمد)، والصحابي الذي قال له النبي ﷺ: «أشبهت خَلقي
      وخُلقي» — في غزوة مؤتة سنة ثماني للهجرة قائداً للمسلمين في
      وجه الروم. أخذ اللواء عن زيد بن حارثة لما قتل، وحمله بيمينه
      حتى قطعت، وبيسراه حتى قطعت، فاحتضن اللواء بعضديه إلى صدره
      حتى قتل عن نحو إحدى وأربعين سنة. قال النبي ﷺ فيه: «أبدله الله
      بيديه جناحين يطير بهما في الجنة»، فلقب «ذا الجناحين». وبكى
      رسول الله ﷺ علناً يوم بلغه نبأ مؤتة بالمدينة.
    description_fr: |
      Jaʿfar ibn Abī Ṭālib — cousin germain du Prophète ﷺ, frère
      aîné d'ʿAli ra, chef de la première émigration en Abyssinie
      (où son discours devant le Négus est conservé verbatim dans
      le *Musnad* d'Aḥmad), et l'homme que le Prophète ﷺ comparait
      à lui-même par la ressemblance et le caractère — tomba martyr
      à la bataille de Muʾta (8 H) alors qu'il dirigeait les forces
      musulmanes contre l'armée byzantine. Il prit l'étendard de
      Zayd ibn Ḥāritha lorsque Zayd fut tué, le tint jusqu'à ce que
      sa main droite soit tranchée, le prit dans sa gauche jusqu'à
      ce qu'elle soit tranchée, puis le serra entre les moignons de
      ses deux bras contre sa poitrine jusqu'à être tué à l'âge
      d'environ 41 ans. Le Prophète ﷺ dit de lui : « Allah a remplacé
      ses bras par deux ailes avec lesquelles il vole au Paradis »
      — d'où son épithète *Dhū al-Janāḥayn* (« Celui aux Deux
      Ailes »). Le Prophète ﷺ pleura publiquement quand la nouvelle
      parvint à Médine.
