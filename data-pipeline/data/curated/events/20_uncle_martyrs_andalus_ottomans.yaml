  - slug: death-of-al-abbas-ibn-abd-al-muttalib
    category: companion
    title_en: Death of al-ʿAbbas ibn ʿAbd al-Muṭṭalib ra — Uncle of the Prophet ﷺ
    title_ar: وفاة العباس بن عبد المطلب رضي الله عنه — عم النبي ﷺ
    title_fr: Mort d'al-ʿAbbās ibn ʿAbd al-Muṭṭalib ra — oncle du Prophète ﷺ
    description_en: |
      al-ʿAbbas ibn ʿAbd al-Muṭṭalib — paternal uncle of the
      Prophet ﷺ, ancestor of the Abbasid caliphs from whom the
      dynasty took its name, and the Companion who took the second
      Pledge of ʿAqaba on behalf of his nephew before formally
      embracing Islam himself shortly before the conquest of Mecca
      — died in Medina at age about 88. ʿUmar ra would seek
      al-ʿAbbas as his intercessor for rain (*tawassul* by his
      uncle of the Prophet ﷺ) during the drought of the Year of
      Ashes (*ʿAm al-Ramada*, 18 AH), the famous incident recorded
      by al-Bukhari. He was the Companion who hid the news of the
      Prophet's ﷺ intent to march on Mecca from his fellow Quraysh
      and led Abu Sufyan into the Muslim camp on the night before
      the conquest. ʿUthman ra prayed his funeral.
    description_ar: |
      توفي العباس بن عبد المطلب رضي الله عنه — عم رسول الله ﷺ من
      أبيه، وجد بني العباس الذين أخذت الدولة العباسية اسمها منه،
      والصحابي الذي شهد بيعة العقبة الثانية ضامناً لابن أخيه قبل
      إعلان إسلامه قبيل فتح مكة — بالمدينة المنورة عن نحو ثمانٍ
      وثمانين سنة. وقد توسل به عمر رضي الله عنه في سقيا أهل
      الحجاز عام الرمادة (سنة ١٨ هـ) فقال: «اللهم إنا كنا نتوسل
      إليك بنبينا فتسقينا، وإنا نتوسل إليك بعم نبينا فاسقنا»
      (رواه البخاري). وهو الصحابي الذي كتم نية رسول الله ﷺ في
      المسير إلى مكة عن قريش، وأدخل أبا سفيان إلى معسكر المسلمين
      ليلة الفتح. وصلى عليه عثمان رضي الله عنه.
    description_fr: |
      al-ʿAbbās ibn ʿAbd al-Muṭṭalib — oncle paternel du Prophète ﷺ,
      ancêtre des califes abbassides dont la dynastie tira son nom,
      et le Compagnon qui prit le second Serment d'ʿAqaba au nom
      de son neveu avant d'embrasser formellement l'Islam lui-même
      peu avant la conquête de La Mecque — mourut à Médine à l'âge
      d'environ 88 ans. ʿUmar ra rechercherait al-ʿAbbās comme
      son intercesseur pour la pluie (*tawassul* par l'oncle du
      Prophète ﷺ) durant la sécheresse de l'Année des Cendres
      (*ʿĀm al-Ramāda*, 18 H), l'incident célèbre rapporté par
      al-Bukhari. Il fut le Compagnon qui cacha à ses concitoyens
      Quraysh l'intention du Prophète ﷺ de marcher sur La Mecque
      et conduisit Abu Sufyān au camp musulman la nuit précédant
      la conquête. ʿUthmān ra dirigea sa prière funéraire.
