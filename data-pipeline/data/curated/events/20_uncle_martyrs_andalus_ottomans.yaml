  - slug: death-of-murad-iv
    category: ruler
    title_en: Death of Sultan Murad IV — Reconqueror of Baghdad
    title_ar: وفاة السلطان مراد الرابع — مستعيد بغداد
    title_fr: Mort du sultan Murad IV — reconquérant de Bagdad
    description_en: |
      Murad IV, seventeenth Ottoman sultan (reigned 1032-1049 AH),
      died at Istanbul at age 28 of cirrhosis. Despite the
      brevity of his life, his reign restored Ottoman central
      authority after the chaos of the Janissary regicides of his
      predecessors: he led personal campaigns against the Safavids,
      reconquered Yerevan in 1045 AH, and most spectacularly
      retook Baghdad in 1048 AH after the Safavids had held it
      for fifteen years. The reconquest of Baghdad was framed in
      Ottoman propaganda as the rescue of the city of the
      Companions and the Abbasid caliphate from heterodox rule.
      He executed without warning corrupt officials and habitually
      suppressed coffee and tobacco use under penalty of death.
      The poet Naf'i, the historian Katib Çelebi, and the encyclopedist
      Hezarfen all flourished under him.
    description_ar: |
      توفي السلطان مراد الرابع — السابع عشر من سلاطين آل عثمان (حكم
      من ١٠٣٢ إلى ١٠٤٩ هـ) — في إسطنبول عن ثمانٍ وعشرين سنة بسبب
      تليّف الكبد. ومع قصر عمره أعاد عهده السلطة المركزية العثمانية
      بعد فوضى مقاتل الإنكشارية لسالفيه: فقاد بنفسه حملات على
      الصفويين، استعاد فيها يريفان سنة ١٠٤٥ هـ، وأبرز ذلك استعادة
      بغداد سنة ١٠٤٨ هـ بعد أن كانت بيد الصفويين خمس عشرة سنة. وكانت
      استعادة بغداد إعلاناً عثمانياً بإنقاذ مدينة الصحابة ومركز
      الخلافة العباسية من حكم الباطنية. كان يعدم الفاسدين من
      الموظفين دون إنذار، وحرّم القهوة والتبغ تحت عقوبة الموت.
      وازدهر في عهده الشاعر «نفعي» والمؤرخ «كاتب جلبي» والموسوعي
      «حزارفن».
    description_fr: |
      Murad IV, dix-septième sultan ottoman (règne 1032-1049 H),
      mourut à Istanbul à l'âge de 28 ans de cirrhose. Malgré la
      brièveté de sa vie, son règne restaura l'autorité centrale
      ottomane après le chaos des régicides janissaires de ses
      prédécesseurs : il mena en personne des campagnes contre les
      Safavides, reconquérant Erevan en 1045 H, et plus
      spectaculairement reprit Bagdad en 1048 H après que les
      Safavides l'eurent tenue quinze ans. La reconquête de Bagdad
      fut présentée dans la propagande ottomane comme le sauvetage
      de la ville des Compagnons et du califat abbasside du
      gouvernement hétérodoxe. Il exécutait sans prévenir les
      fonctionnaires corrompus et supprimait habituellement
      l'usage du café et du tabac sous peine de mort. Le poète
      Nefʿî, l'historien Kâtib Çelebi et l'encyclopédiste
      Hezarfen prospérèrent tous sous son règne.
    canonical_hijri: {year: 1049, month: 9, precision: month}
    canonical_gregorian: {date: 1640-02-01, precision: month, method: tabular_conversion}
