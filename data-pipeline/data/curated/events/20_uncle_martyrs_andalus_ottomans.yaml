  - slug: death-of-al-wansharisi
    category: scholar
    title_en: Death of al-Wansharisi — al-Miʿyar al-Muʿrib
    title_ar: وفاة الونشريسي — صاحب «المعيار المعرب»
    title_fr: Mort d'al-Wansharīsī — auteur d'al-Miʿyār al-Muʿrib
    description_en: |
      Aḥmad ibn Yaḥya al-Wansharisi al-Tilimsani — Maliki jurist
      from Tlemcen who taught at Fes after fleeing Zayyanid
      political turmoil, and author of *al-Miʿyar al-Muʿrib wa-l-
      Jamiʿ al-Mughrib ʿan Fatawa Ahl Ifriqiya wa-l-Andalus wa-l-
      Maghrib*, the largest single Maliki fatwa compilation ever
      produced — died in Fes. He was about 80. *al-Miʿyar* in
      twelve volumes preserves over six thousand fatwas of the
      Maliki authorities of North Africa and al-Andalus from the
      4th to the 9th centuries AH; it is the indispensable archive
      of Maghrebi Maliki social and economic history. Among its
      most-cited entries are the rulings on the legal status of
      Muslims under Christian rule in al-Andalus after the
      Reconquista — texts that Maghrebi muftis cite to this day
      when consulted by Muslims in non-Muslim majority countries.
    description_ar: |
      توفي الإمام أحمد بن يحيى الونشريسي التلمساني — فقيه مالكي من
      تلمسان، درّس بفاس بعد فراره من الاضطرابات السياسية في الدولة
      الزيانية، ومصنف «المعيار المعرب والجامع المغرب عن فتاوى أهل
      أفريقية والأندلس والمغرب»، أكبر مجموعة فتاوى مالكية على
      الإطلاق — بفاس عن نحو ثمانين سنة. ويحفظ «المعيار» في اثني
      عشر مجلداً ستة آلاف فتوى من علماء المالكية بشمال أفريقيا
      والأندلس من القرن الرابع إلى التاسع الهجري؛ وهو الأرشيف الذي
      لا غنى عنه في تاريخ المالكية الاجتماعي والاقتصادي بالمغرب
      الإسلامي. ومن أشهر فتاويه المعتمدة فتاواه في حكم بقاء
      المسلمين تحت حكم النصارى في الأندلس بعد سقوطها — وهي نصوص
      ترجع إليها مفتو المغرب إلى يومنا حين يستفتيهم المسلمون
      المقيمون في بلاد الكفر.
    description_fr: |
      Aḥmad ibn Yaḥyā al-Wansharīsī al-Tilimsānī — juriste malikite
      de Tlemcen qui enseigna à Fès après avoir fui les troubles
      politiques zayyānides, et auteur d'*al-Miʿyār al-Muʿrib wa-l-
      Jāmiʿ al-Mughrib ʿan Fatāwā Ahl Ifrīqiya wa-l-Andalus wa-l-
      Maghrib*, la plus grande compilation de fatwas malikites
      jamais produite — mourut à Fès. Il avait environ 80 ans.
      *al-Miʿyār* en douze volumes préserve plus de six mille
      fatwas des autorités malikites d'Afrique du Nord et d'al-
      Andalus du IVe au IXe siècle de l'Hégire; c'est l'archive
      indispensable de l'histoire sociale et économique malikite
      maghrébine. Parmi ses entrées les plus citées figurent les
      jugements sur le statut légal des musulmans sous domination
      chrétienne en al-Andalus après la Reconquista — textes que
      les muftis maghrébins citent à ce jour lorsqu'ils sont
      consultés par des musulmans dans des pays non musulmans.
