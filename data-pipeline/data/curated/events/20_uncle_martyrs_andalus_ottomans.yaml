  - slug: martyrdom-of-musab-ibn-umayr
    category: companion
    title_en: Martyrdom of Muṣʿab ibn ʿUmayr ra at Uhud
    title_ar: استشهاد مصعب بن عمير رضي الله عنه يوم أحد
    title_fr: Martyre de Muṣʿab ibn ʿUmayr ra à Uḥud
    description_en: |
      Muṣʿab ibn ʿUmayr al-ʿAbdari, the man whom the Prophet ﷺ
      had sent ahead to Medina as the first ambassador of Islam to
      teach the Qurʾan to the new converts and prepare the city
      for the Hijra, fell martyred at the Battle of Uhud (3 AH).
      He held the Prophet's ﷺ standard until his right hand was
      severed, then his left, then was killed by spear. The
      Prophet ﷺ wept over his body and recited Q 33:23 ("Among
      the believers are men who have been true to the covenant
      they made with Allah"). His mother — pagan, wealthy, and who
      had once locked him up to prevent his conversion — had said
      to him: "I will lock you in until you abandon this religion
      or I die starving"; he had answered: "If your soul left your
      body in a hundred ways, I would not return to my religion."
      A son of Quraysh's most luxurious household, he died wrapped
      in a single garment too short for his feet.
    description_ar: |
      استشهد مصعب بن عمير العبدري رضي الله عنه — الذي بعثه رسول الله ﷺ
      أمامه إلى المدينة سفيراً أول للإسلام يقرئ الناس القرآن ويهيئ
      المدينة للهجرة — في غزوة أحد سنة ثلاث للهجرة. حمل لواء النبي ﷺ
      حتى قُطعت يده اليمنى ثم اليسرى ثم قُتل برمح. بكى عليه النبي ﷺ
      وقرأ قول الله: ﴿مِنَ الْمُؤْمِنِينَ رِجَالٌ صَدَقُوا مَا
      عَاهَدُوا اللَّهَ عَلَيْهِ﴾ [الأحزاب: ٢٣]. وكانت أمه — وكانت
      مشركة موسرة قد سبق أن حبسته لتمنعه من الدين — قالت له:
      «لأحبسنّك حتى تفارق هذا الدين أو أموت جوعاً»؛ فقال لها: «لو
      خرجت نفسك في مئة طريق ما رجعت في ديني». ابن أبهى بيوت قريش،
      مات ملفوفاً في برد واحد قصير عن قدميه.
    description_fr: |
      Muṣʿab ibn ʿUmayr al-ʿAbdari, l'homme que le Prophète ﷺ avait
      envoyé en avant à Médine comme premier ambassadeur de l'Islam
      pour enseigner le Coran aux nouveaux convertis et préparer
      la ville à la Hijra, tomba martyr à la bataille d'Uḥud (3 H).
      Il porta l'étendard du Prophète ﷺ jusqu'à ce que sa main
      droite soit tranchée, puis sa gauche, puis fut tué d'un coup
      de lance. Le Prophète ﷺ pleura sur son corps et récita Q 33:23
      (« parmi les croyants sont des hommes qui ont été fidèles à
      l'engagement qu'ils ont conclu avec Allah »). Sa mère — païenne,
      riche, et qui l'avait jadis enfermé pour empêcher sa conversion
      — lui avait dit : « je t'enfermerai jusqu'à ce que tu abandonnes
      cette religion ou que je meure de faim »; il avait répondu :
      « même si ton âme quittait ton corps de cent manières, je ne
      reviendrais pas à ma religion ». Fils du foyer le plus luxueux
      de Quraysh, il mourut enveloppé d'une seule étoffe trop courte
      pour ses pieds.
