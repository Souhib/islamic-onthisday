  - slug: death-of-salama-ibn-al-akwa
    category: companion
    title_en: Death of Salama ibn al-Akwaʿ ra
    title_ar: وفاة سلمة بن الأكوع رضي الله عنه
    title_fr: Mort de Salama ibn al-Akwaʿ ra
    description_en: |
      Salama ibn al-Akwaʿ al-Aslami — Companion who participated
      in eight expeditions with the Prophet ﷺ, foremost archer-
      runner of the Muslim army (the Prophet ﷺ said of him:
      "the best of our infantry today is Salama"), and one of the
      principal narrators of the *Bayʿat al-Riḍwan* (the Pledge of
      the Tree at Ḥudaybiyya — Q 48:18) — died in Medina at age
      about 80. He had retired to Rabadha after the killing of
      ʿUthman ra, returning to Medina only days before his death.
      His narration of the Pledge under the tree, preserved in
      both Ṣaḥīḥs, is the principal hadith establishing the
      special merit of those Companions: "We pledged to him not
      to flee, and the Prophet ﷺ stood under the tree and we
      pledged ourselves to him." He was famed for his pious
      independence: he never accepted gifts from the Umayyad
      governors.
    description_ar: |
      توفي سلمة بن الأكوع الأسلمي رضي الله عنه — الصحابي الذي شهد
      مع رسول الله ﷺ ثماني غزوات، وكبير رماة جيش المسلمين السابقين
      في الجري (قال عنه النبي ﷺ: «خير رجالتنا اليوم سلمة»)، وأحد
      الرواة الرئيسيين لبيعة الرضوان تحت الشجرة بالحديبية ﴿لقد رضي
      الله عن المؤمنين إذ يبايعونك تحت الشجرة﴾ [الفتح: ١٨] —
      بالمدينة المنورة عن نحو ثمانين سنة. كان قد اعتزل إلى الربذة
      بعد مقتل عثمان رضي الله عنه، ولم يعد إلى المدينة إلا قبيل
      وفاته بأيام. وروايته لبيعة الرضوان المتفق عليها هي أصل ما
      ورد في فضل هؤلاء الصحابة: «بايعناه على ألا نفر، وقام النبي ﷺ
      تحت الشجرة فبايعناه». وعرف بعفته عن السلطان: لم يقبل من ولاة
      بني أمية شيئاً.
    description_fr: |
      Salama ibn al-Akwaʿ al-Aslami — Compagnon qui participa à
      huit expéditions avec le Prophète ﷺ, archer-coureur le plus
      remarquable de l'armée musulmane (le Prophète ﷺ dit de lui :
      « le meilleur de notre infanterie aujourd'hui est Salama »),
      et l'un des principaux narrateurs du *Bayʿat al-Riḍwān* (le
      Serment de l'Arbre à Ḥudaybiyya — Q 48:18) — mourut à Médine
      à l'âge d'environ 80 ans. Il s'était retiré à Rabadha après
      le meurtre d'ʿUthman ra, ne revenant à Médine que quelques
      jours avant sa mort. Sa narration du Serment sous l'arbre,
      conservée dans les deux *Ṣaḥīḥ*, est le hadith principal
      établissant le mérite particulier de ces Compagnons : « nous
      lui prêtâmes serment de ne pas fuir, et le Prophète ﷺ se
      tint sous l'arbre et nous nous engageâmes à lui ». Il était
      célèbre pour son indépendance pieuse : il n'accepta jamais
      de cadeau des gouverneurs omeyyades.
