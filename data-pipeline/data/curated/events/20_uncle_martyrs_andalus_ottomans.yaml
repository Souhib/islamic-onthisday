  # =========================================================================
  # OTTOMAN SULTANS
  # =========================================================================

  - slug: death-of-murad-iii
    category: ruler
    title_en: Death of Sultan Murad III
    title_ar: وفاة السلطان مراد الثالث
    title_fr: Mort du sultan Murad III
    description_en: |
      Murad III, twelfth Ottoman sultan (reigned 982-1003 AH), died
      in the Topkapı Palace at Istanbul at age about 49. His
      reign saw the empire reach its greatest territorial extent
      with the conquests of the Caucasus during the long
      Ottoman-Safavid war (986-998 AH), but also the first signs
      of the structural shifts that would weigh on later Ottoman
      governance: the rise of harem and palace influence, monetary
      debasement, and the slow erosion of the *devşirme* system
      that had supplied the Janissary corps. He was nonetheless a
      patron of the highest cultural production: the historian
      Mustafa ʿĀli of Gallipoli composed under him, and Mimar
      Sinan, the greatest Ottoman architect, completed the
      Selimiye Mosque at Edirne (the masterwork of Islamic
      architecture in the Ottoman tradition) during his reign.
    description_ar: |
      توفي السلطان مراد الثالث — ثاني عشر سلاطين آل عثمان (حكم من
      ٩٨٢ إلى ١٠٠٣ هـ) — في قصر طوب قابي بإسطنبول عن نحو تسع
      وأربعين سنة. شهد عهده بلوغ الدولة العثمانية أقصى اتساعها
      الجغرافي بفتوحاتها في القوقاز إثر الحرب العثمانية-الصفوية
      الطويلة (٩٨٦-٩٩٨ هـ)، كما شهد أول البوادر البنيوية التي
      ستثقل على حكم العثمانيين بعدُ: صعود نفوذ الحرم والقصر، وغش
      السكة، والتآكل البطيء لنظام «الدوشيرمة» الذي كان يمد فرق
      الإنكشارية. ومع ذلك ظل راعياً لأعلى الإنتاج الثقافي: ألّف
      المؤرخ مصطفى علي الغليبولي في عهده، وأنجز معمار سنان أكبر
      معماري عثماني الجامع السليمي بأدرنة (تحفة العمارة الإسلامية
      في التقليد العثماني) في عهده.
    description_fr: |
      Murad III, douzième sultan ottoman (règne 982-1003 H), mourut
      au palais de Topkapı à Istanbul à l'âge d'environ 49 ans.
      Son règne vit l'empire atteindre sa plus grande extension
      territoriale avec les conquêtes du Caucase durant la longue
      guerre ottomano-safavide (986-998 H), mais aussi les premiers
      signes des changements structurels qui pèseraient sur la
      gouvernance ottomane ultérieure : la montée de l'influence
      du harem et du palais, la dégradation monétaire et l'érosion
      lente du système *devşirme* qui avait alimenté le corps des
      janissaires. Il fut néanmoins le mécène de la plus haute
      production culturelle : l'historien Mustafa ʿĀli de Gallipoli
      composa sous son règne, et Mimar Sinan, le plus grand architecte
      ottoman, acheva la mosquée Selimiye d'Edirne (chef-d'œuvre de
      l'architecture islamique dans la tradition ottomane) durant
      son règne.
    canonical_hijri: {year: 1003, month: 1, precision: month}
    canonical_gregorian: {date: 1595-01-01, precision: month, method: tabular_conversion}
