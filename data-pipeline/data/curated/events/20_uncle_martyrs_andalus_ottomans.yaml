  - slug: death-of-ibn-atiyya
    category: scholar
    title_en: Death of Ibn ʿAṭiyya al-Andalusi — al-Muḥarrar al-Wajiz
    title_ar: وفاة ابن عطية الأندلسي — صاحب «المحرر الوجيز»
    title_fr: Mort d'Ibn ʿAṭiyya al-Andalusi — auteur d'al-Muḥarrar al-Wajīz
    description_en: |
      Abu Muhammad ʿAbd al-Ḥaqq ibn Ghalib ibn ʿAṭiyya al-Andalusi
      al-Muḥaribi — Maliki jurist, qadi of Almeria, and author of
      *al-Muḥarrar al-Wajiz fi Tafsir al-Kitab al-ʿAziz*, the
      foremost Andalusian Sunni Qurʾan commentary — died in Lorca
      at age about 60. *al-Muḥarrar al-Wajiz* combined the Eastern
      tafsir tradition (al-Ṭabari, al-Thaʿlabi) with the indigenous
      Maliki-Andalusian framework, applying close attention to
      grammar and to *qiraʾat* variants. Ibn Khaldun would later
      remark in his *Muqaddima* that "the tafsir of Ibn ʿAṭiyya
      and the tafsir of al-Zamakhshari are the most distinguished
      and most reliable in the Maghreb." The work was a primary
      source for Abu Ḥayyan's *al-Bahr al-Muḥit* and al-Qurṭubi's
      *al-Jamiʿ li-Aḥkam al-Qurʾan*.
    description_ar: |
      توفي الإمام أبو محمد عبد الحق بن غالب ابن عطية الأندلسي
      المحاربي — فقيه مالكي وقاضي ألمرية، ومصنف «المحرر الوجيز في
      تفسير الكتاب العزيز»، أكبر تفاسير أهل السنة الأندلسية —
      بـ«لورقة» عن نحو ستين سنة. ضم «المحرر الوجيز» بين التراث
      التفسيري المشرقي (الطبري والثعلبي) والتراث المالكي الأندلسي،
      مع عناية لافتة بالنحو وقراءات القرآن. وقال ابن خلدون لاحقاً
      في «مقدمته»: «أعظم تفاسير المغرب وأمتنها: تفسير ابن عطية
      وتفسير الزمخشري». وكان كتابه مصدراً أصلياً لـ«البحر المحيط»
      لأبي حيان و«الجامع لأحكام القرآن» للقرطبي.
    description_fr: |
      Abu Muḥammad ʿAbd al-Ḥaqq ibn Ghālib ibn ʿAṭiyya al-Andalusi
      al-Muḥāribi — juriste malikite, qāḍī d'Almería et auteur
      d'*al-Muḥarrar al-Wajīz fī Tafsīr al-Kitāb al-ʿAzīz*, le plus
      grand commentaire coranique sunnite andalou — mourut à Lorca
      à l'âge d'environ 60 ans. *al-Muḥarrar al-Wajīz* combina la
      tradition tafsīrique orientale (al-Ṭabarī, al-Thaʿlabī) avec
      le cadre indigène malikite-andalou, accordant une attention
      poussée à la grammaire et aux variantes de *qirāʾāt*. Ibn
      Khaldūn remarquerait plus tard dans sa *Muqaddima* : « le
      tafsir d'Ibn ʿAṭiyya et le tafsir d'al-Zamakhsharī sont les
      plus distingués et les plus fiables au Maghreb ». L'œuvre fut
      une source primaire pour *al-Baḥr al-Muḥīṭ* d'Abū Ḥayyān et
      *al-Jāmiʿ li-Aḥkām al-Qurʾān* d'al-Qurṭubī.
