  - slug: deposition-of-abdulhamid-ii
    category: ruler
    title_en: Deposition of Sultan Abdulhamid II
    title_ar: خلع السلطان عبد الحميد الثاني
    title_fr: Déposition du sultan Abdulhamid II
    description_en: |
      Sultan Abdulhamid II, thirty-fourth Ottoman sultan (reigned
      1293-1327 AH / 1876-1909 CE), was deposed by a fatwa of the
      Sheikh ul-Islam Ziyaeddin Efendi following the
      counter-revolutionary uprising of 31 March 1909 (which
      Abdulhamid was accused, perhaps wrongly, of orchestrating
      against the Committee of Union and Progress). He was sent to
      house arrest in Salonica and later moved back to the Beylerbeyi
      Palace in Istanbul, where he died in 1918. His thirty-three-
      year reign was the last in which the Ottoman caliph held
      effective political authority — under his successors Mehmed
      V and Mehmed VI the sultanate was a CUP cipher and then a
      Constantinople-occupied figurehead before its abolition by
      the new Turkish Republic in 1924. His pan-Islamic policy
      (the Hijaz Railway, the Friday telegraph network from
      Istanbul to all Muslim lands) made him a deeply venerated
      figure in later Sunni revivalist memory across the Muslim
      world.
    description_ar: |
      خلع السلطان عبد الحميد الثاني — رابع وثلاثين سلاطين آل عثمان
      (حكم من ١٢٩٣ إلى ١٣٢٧ هـ / من ١٨٧٦ إلى ١٩٠٩ ميلادي) — بفتوى
      من شيخ الإسلام ضياء الدين أفندي بعد ثورة الواحد والثلاثين من
      مارس ١٩٠٩ ميلادي المضادة (التي اتهم — ربما ظلماً — بتدبيرها
      ضد جمعية الاتحاد والترقي). وأُرسل إلى الإقامة الجبرية في
      سالونيك ثم نقل لاحقاً إلى قصر «بيلربايي» بإسطنبول، حيث توفي
      سنة ١٩١٨ ميلادي. وكان حكمه الذي امتد ثلاثاً وثلاثين سنة آخر
      عهد كان فيه الخليفة العثماني صاحب السلطة السياسية الفعلية —
      فخلفاه محمد الخامس ومحمد السادس كانا مجرد ختم لجمعية الاتحاد
      والترقي ثم رمزاً تحت احتلال القسطنطينية قبل إلغاء السلطنة
      على يد الجمهورية التركية الجديدة سنة ١٩٢٤. وقد جعلته سياسته
      الجامعة الإسلامية (سكة حديد الحجاز، وشبكة برق الجمعة من
      إسطنبول إلى عامة بلاد المسلمين) شخصية محبوبة الذكر في
      الذاكرة السلفية والإحيائية السنية اللاحقة.
    description_fr: |
      Le sultan Abdulhamid II, trente-quatrième sultan ottoman
      (règne 1293-1327 H / 1876-1909 EC), fut déposé par une
      fatwa du Cheikh ul-Islam Ziyaeddin Efendi à la suite du
      soulèvement contre-révolutionnaire du 31 mars 1909 (dont
      Abdulhamid fut accusé, peut-être à tort, d'avoir orchestré
      contre le Comité Union et Progrès). Il fut envoyé en
      résidence surveillée à Salonique puis transféré au palais
      de Beylerbeyi à Istanbul, où il mourut en 1918. Son règne
      de trente-trois ans fut le dernier durant lequel le calife
      ottoman détint une autorité politique effective — sous ses
      successeurs Mehmed V et Mehmed VI le sultanat fut un
      paravent de la CUP puis une figure de proue dans une
      Constantinople occupée avant son abolition par la nouvelle
      République turque en 1924. Sa politique pan-islamique (le
      chemin de fer du Hedjaz, le réseau télégraphique du vendredi
      d'Istanbul à toutes les terres musulmanes) en a fait une
      figure profondément vénérée dans la mémoire revivaliste
      sunnite ultérieure à travers le monde musulman.
