  - slug: death-of-abu-al-wafa-al-buzjani
    category: scientist
    title_en: Death of Abu al-Wafaʾ al-Buzjani
    title_ar: وفاة أبي الوفاء البوزجاني
    title_fr: Mort d'Abū al-Wafāʾ al-Būzjānī
    description_en: |
      Abu al-Wafaʾ Muhammad ibn Muhammad al-Buzjani — Persian
      mathematician and astronomer at the Buyid court of Baghdad,
      and the scholar who introduced the tangent, secant, and
      cosecant functions into Islamic trigonometry — died in
      Baghdad at age about 58. His *al-Majisṭi* extended Ptolemy's
      Almagest with new spherical-trigonometry methods that
      simplified astronomical calculation; he established the
      sine-rule for spherical triangles and computed sine tables
      accurate to eight decimal places at intervals of fifteen
      minutes of arc. His refinement of the lunar variation
      *(al-mukhassafa)* anticipated by 600 years what European
      astronomy would credit to Tycho Brahe. He was a patron of
      the celebrated Baghdad observatory of Sharaf al-Dawla, and
      al-Karaji and al-Bīrūnī both cite his works as the standard
      reference for trigonometric methods.
    description_ar: |
      توفي أبو الوفاء محمد بن محمد البوزجاني — عالم رياضي وفلكي
      فارسي في بلاط البويهيين ببغداد، والعالم الذي أدخل دوال الظل
      (التانجنت) والقاطع (السيكنت) وقاطع التمام (الكسيكنت) في علم
      المثلثات الإسلامي — ببغداد عن نحو ثمانٍ وخمسين سنة. وأخرج
      كتابه «المجسطي» امتداداً لـ«المجسطي» البطلموسي بمناهج جديدة
      في مثلثات الكرة بسطت العمليات الفلكية؛ وأرسى قانون الجيوب
      للمثلثات الكروية، وحسب جداول للجيب بدقة ثمانية كسور عشرية في
      كل ربع درجة. وتنقيحه لاختلاف القمر «المخسفة» سبق فيه ستة
      قرون ما سينسب في الفلك الأوروبي إلى تيخو براهي. ورعى مرصد
      شرف الدولة الذائع الصيت ببغداد، ويستشهد بكتبه الكرجي
      والبيروني بوصفها المرجع المعتمد في طرق المثلثات.
    description_fr: |
      Abū al-Wafāʾ Muḥammad ibn Muḥammad al-Būzjānī — mathématicien
      et astronome persan à la cour bouyide de Bagdad, et le savant
      qui introduisit les fonctions tangente, sécante et cosécante
      dans la trigonométrie islamique — mourut à Bagdad à l'âge
      d'environ 58 ans. Son *al-Majisṭī* étendit l'Almageste de
      Ptolémée avec de nouvelles méthodes de trigonométrie sphérique
      qui simplifièrent les calculs astronomiques; il établit la
      règle des sinus pour les triangles sphériques et calcula des
      tables de sinus précises à huit décimales par intervalles de
      quinze minutes d'arc. Son raffinement de la variation lunaire
      (*al-mukhassafa*) anticipa de 600 ans ce que l'astronomie
      européenne créditerait à Tycho Brahe. Il fut un mécène du
      célèbre observatoire bagdadien de Sharaf al-Dawla, et
      al-Karajī et al-Bīrūnī citent tous deux ses œuvres comme
      référence standard pour les méthodes trigonométriques.
