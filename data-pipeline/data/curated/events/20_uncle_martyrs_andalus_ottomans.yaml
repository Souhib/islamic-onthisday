  - slug: muslim-conquest-of-crete
    category: conquest
    title_en: Muslim Conquest of Crete
    title_ar: فتح كريت
    title_fr: Conquête musulmane de la Crète
    description_en: |
      A force of approximately ten thousand Andalusian exiles —
      survivors of the Arrabal uprising in Cordoba expelled by
      al-Ḥakam I in 818 CE — under the command of Abu Ḥafṣ ʿUmar
      al-Iqriṭishi seized the Byzantine island of Crete after
      crossing from Alexandria and establishing a fortified base
      at Khandaq (Iraklion). The conquest of Crete inaugurated a
      Muslim emirate that would hold the island for 135 years
      (817-961 CE), making the central Mediterranean a contested
      space and providing the staging ground for raids on the
      Byzantine Aegean coast and on Christian shipping. The
      Cretan emirate was an outlier in Islamic history — neither
      Umayyad, Abbasid, nor Aghlabid in allegiance, but an
      independent Andalusi-Maghrebi maritime polity — and the
      city of Khandaq it founded survives as the modern Iraklion.
    description_ar: |
      جيش يقارب عشرة آلاف من المنفيين الأندلسيين — الناجين من ثورة
      الربض بقرطبة الذين طردهم الحكم الأول سنة ٨١٨ ميلادي — بقيادة
      أبي حفص عمر الإقريطشي، استولوا على جزيرة كريت البيزنطية بعد
      عبورهم إليها من الإسكندرية، وأقاموا قاعدة حصينة عند الخندق
      (هرقليون اليوم). وأطلق فتح كريت إمارة إسلامية ظلت تحكم الجزيرة
      ١٣٥ سنة (٨١٧-٩٦١ ميلادي)، فجعلت وسط المتوسط مساحة منازعة،
      وقدمت قاعدة الانطلاق لغارات على سواحل بحر إيجة البيزنطية وعلى
      الملاحة المسيحية. وكانت إمارة كريت شاذة في التاريخ الإسلامي
      — لا أموية ولا عباسية ولا أغلبية في ولائها، بل دولة بحرية
      مستقلة أندلسية-مغربية — ومدينة الخندق التي أسسها بقيت إلى
      اليوم باسم هرقليون.
    description_fr: |
      Une force d'environ dix mille exilés andalous — survivants du
      soulèvement du Faubourg à Cordoue expulsés par al-Ḥakam Ier
      en 818 EC — sous le commandement d'Abū Ḥafṣ ʿUmar
      al-Iqrīṭishī, s'empara de l'île byzantine de Crète après
      avoir traversé depuis Alexandrie et avoir établi une base
      fortifiée à Khandaq (Héraklion). La conquête de la Crète
      inaugura un émirat musulman qui tiendrait l'île pendant
      135 ans (817-961 EC), faisant de la Méditerranée centrale
      un espace disputé et fournissant la base d'attaque pour des
      raids sur la côte égéenne byzantine et sur la navigation
      chrétienne. L'émirat crétois fut un cas atypique dans
      l'histoire islamique — ni omeyyade, ni abbasside, ni
      aghlabide dans son allégeance, mais une entité maritime
      indépendante andalouse-maghrébine — et la ville de Khandaq
      qu'il fonda survit aujourd'hui sous le nom d'Héraklion.
    canonical_hijri: {year: 212, precision: year}
    canonical_gregorian: {date: 827-01-01, precision: year, method: attested}
