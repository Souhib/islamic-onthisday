  - slug: death-of-al-masudi
    category: scholar
    title_en: Death of al-Masʿudi — Herodotus of the Arabs
    title_ar: وفاة المسعودي — هيرودوت العرب
    title_fr: Mort d'al-Masʿūdī — Hérodote des Arabes
    description_en: |
      Abu al-Hasan ʿAli ibn al-Husayn al-Masʿudi — historian,
      geographer, and traveller, foremost ethnographer of the Indian
      Ocean world in his generation — died in Cairo at age about
      59. His *Muruj al-Dhahab wa-Maʿadin al-Jawhar* ("Meadows of
      Gold and Mines of Gems") is at once a chronicle of Islamic
      history, an ethnographic survey of the peoples of the known
      world from the Volga Bulgars to the rivers of southern China,
      and a digest of the political philosophy of his age.
      *al-Tanbih wa-l-Ishraf*, his geographic-historical companion
      volume, refines and corrects the larger work. He travelled
      personally to Khurasan, India (visiting Mansura in Sindh),
      Sri Lanka, Madagascar, Zanzibar, Oman, and across the
      Caspian basin; his eyewitness data on the Caspian ecosystem,
      the Volga trade route, and South Asian Buddhism remains
      historically irreplaceable.
    description_ar: |
      توفي الإمام أبو الحسن علي بن الحسين المسعودي — مؤرخ وجغرافي
      ورحالة، وأكبر عالم أعراق في زمانه في حوض المحيط الهندي —
      بالقاهرة عن نحو تسع وخمسين سنة. كتابه «مروج الذهب ومعادن
      الجوهر» في آن واحد تأريخ للإسلام وعرض إثنوغرافي لأمم العالم
      المعروف من بلغار الفولغا إلى أنهار جنوب الصين، وموسوعة في
      الفلسفة السياسية لعصره. أما كتابه «التنبيه والإشراف» الجغرافي-
      التاريخي المرافق فينقّح الكتاب الأكبر ويصححه. سافر بنفسه إلى
      خراسان والهند (زار المنصورة في السند) وسريلانكا ومدغشقر وزنجبار
      وعمان وحوض بحر قزوين؛ وأخباره من شاهد عيان عن النظام البيئي
      لبحر قزوين وطريق التجارة الفولغية وبوذية جنوب آسيا لا تزال
      تاريخياً لا غنى عنها.
    description_fr: |
      Abu al-Ḥasan ʿAlī ibn al-Ḥusayn al-Masʿūdī — historien,
      géographe et voyageur, plus grand ethnographe du monde de
      l'océan Indien de sa génération — mourut au Caire à l'âge
      d'environ 59 ans. Son *Murūj al-Dhahab wa-Maʿādin al-Jawhar*
      (« Prairies d'Or et Mines de Pierres Précieuses ») est à la
      fois une chronique de l'histoire islamique, une enquête
      ethnographique sur les peuples du monde connu depuis les
      Bulgares de la Volga jusqu'aux rivières de Chine du Sud, et
      un compendium de la philosophie politique de son époque.
      *al-Tanbīh wa-l-Ishrāf*, son ouvrage géographico-historique
      compagnon, raffine et corrige l'œuvre plus vaste. Il voyagea
      personnellement au Khurasan, en Inde (visitant Mansūra dans
      le Sindh), à Sri Lanka, à Madagascar, à Zanzibar, à Oman et
      à travers le bassin caspien; ses données de témoin oculaire
      sur l'écosystème caspien, la route commerciale de la Volga
      et le bouddhisme sud-asiatique demeurent historiquement
      irremplaçables.
    canonical_hijri: {year: 345, month: 9, precision: month}
    canonical_gregorian: {date: 956-12-01, precision: month, method: tabular_conversion}
