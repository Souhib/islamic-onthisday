  - slug: battle-of-mansoura
    category: battle
    title_en: Battle of Mansoura — Capture of King Louis IX
    title_ar: معركة المنصورة — أسر الملك لويس التاسع
    title_fr: Bataille de Mansourah — capture du roi Louis IX
    description_en: |
      The Egyptian forces of the dying Sultan al-Ṣaliḥ Najm al-
      Din Ayyub — under the field command of his Turkish slave-
      general Aybak and the Mamluk *baḥrī* corps led by
      Baybars al-Bunduqdari — defeated the Crusader army of
      King Louis IX of France at Mansoura in the Egyptian
      Delta. The decisive engagement saw the Mamluks ambush
      the Crusaders inside the city after the latter had
      crossed the Nile branch and entered the streets, killing
      thousands and capturing the king himself with most of his
      surviving army. Louis IX was held for ransom and released
      against payment of 400,000 livres tournois and the
      surrender of the captured Damietta. The battle marked
      the effective end of the Seventh Crusade, the destruction
      of large-scale Crusader expeditions to the Levant, and
      the beginning of the political ascendancy of the Mamluks
      that would replace the Ayyubid dynasty within months.
    description_ar: |
      هزمت قوات السلطان الصالح نجم الدين أيوب المريض في عاصمته —
      تحت قيادة قائده المملوك التركي «أيبك» وفرقة المماليك
      البحرية بقيادة الظاهر بيبرس البندقداري — جيش الصليبيين
      بقيادة الملك لويس التاسع ملك فرنسا في «المنصورة» في دلتا
      مصر. وشهدت المواجهة الفاصلة كميناً مملوكياً للصليبيين داخل
      المدينة بعد أن عبروا فرع النيل ودخلوا شوارعها، فقُتل منهم
      آلاف وأُسر الملك نفسه ومعظم بقية جيشه. واحتُجز لويس التاسع
      بفدية وأُفرج عنه في مقابل أربع مئة ألف ليفر فرنسي وتسليم
      دمياط المفتتحة. وشكلت المعركة النهاية الفعلية للحملة
      الصليبية السابعة، ونهاية الحملات الصليبية الكبرى على
      الشام، وبداية الصعود السياسي للمماليك الذي سيستبدل دولة
      بني أيوب في غضون أشهر.
    description_fr: |
      Les forces égyptiennes du sultan mourant al-Ṣāliḥ Najm
      al-Dīn Ayyūb — sous le commandement sur le terrain de
      son général-esclave turc Aybak et du corps mamelouk
      *baḥrī* mené par Baybars al-Bunduqdārī — défirent l'armée
      croisée du roi Louis IX de France à Mansourah dans le
      delta égyptien. L'engagement décisif vit les Mamelouks
      tendre une embuscade aux Croisés à l'intérieur de la
      ville après que ces derniers eurent traversé le bras du
      Nil et pénétré dans les rues, tuant des milliers et
      capturant le roi lui-même avec la majeure partie de son
      armée survivante. Louis IX fut détenu pour rançon et
      libéré contre paiement de 400 000 livres tournois et la
      reddition de Damiette capturée. La bataille marqua la
      fin effective de la septième croisade, la destruction
      des expéditions croisées de grande échelle vers le
      Levant, et le début de l'ascendance politique des
      Mamelouks qui remplacerait la dynastie ayyoubide en
      l'espace de mois.
