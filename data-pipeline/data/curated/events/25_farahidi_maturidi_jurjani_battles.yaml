  - slug: death-of-said-ibn-zayd
    category: companion
    title_en: Death of Saʿid ibn Zayd ra — One of the Ten Promised Paradise
    title_ar: وفاة سعيد بن زيد رضي الله عنه — أحد العشرة المبشرين بالجنة
    title_fr: Mort de Saʿīd ibn Zayd ra — l'un des dix Compagnons promis au Paradis
    description_en: |
      Abu al-Aʿwar Saʿid ibn Zayd ibn ʿAmr ibn Nufayl al-ʿAdawi —
      one of the ten Companions promised Paradise (*al-ʿasharatu
      al-mubashsharun*), brother-in-law of ʿUmar ibn al-Khaṭṭab
      ra (whose conversion he and his sister Fāṭima had instigated
      by their reciting of Sūrat Ṭa-Hā), and one of the very
      first Meccan converts (the eighth or ninth person to
      embrace Islam) — died at his estate near Medina at age
      about 70, in the same year as his close friend Saʿd ibn
      Abi Waqqāṣ ra. His father Zayd ibn ʿAmr had been a
      *ḥanīf* — a pre-Islamic Arabian monotheist who rejected
      Quraysh's idolatry — and the Prophet ﷺ said of him:
      "Zayd ibn ʿAmr will be raised on the Day of Resurrection
      as a single nation by himself" (al-Bukhari). Saʿid ibn
      Zayd was the last of the ten promised Paradise to die,
      according to the dominant classical position.
    description_ar: |
      توفي أبو الأعور سعيد بن زيد بن عمرو بن نفيل العدوي رضي الله
      عنه — أحد العشرة المبشرين بالجنة، وزوج فاطمة بنت الخطاب
      رضي الله عنها (وقد كان إسلامه وإسلامها من أسباب إسلام
      أخيها عمر بن الخطاب رضي الله عنه بقراءة سورة طه)، وأحد
      أوائل من أسلم بمكة (وهو الثامن أو التاسع في الإسلام) —
      في ضيعته قرب المدينة عن نحو سبعين سنة، في السنة نفسها التي
      توفي فيها صديقه سعد بن أبي وقاص رضي الله عنه. وكان أبوه
      زيد بن عمرو حنيفياً — من موحدي العرب قبل الإسلام رفض شرك
      قريش — وقال فيه النبي ﷺ: «يبعث زيد بن عمرو يوم القيامة
      أمة وحده» (رواه البخاري). وسعيد بن زيد آخر العشرة المبشرين
      بالجنة وفاةً على الراجح من أقوال المؤرخين الأوائل.
    description_fr: |
      Abu al-Aʿwar Saʿīd ibn Zayd ibn ʿAmr ibn Nufayl al-ʿAdawī —
      l'un des dix Compagnons promis au Paradis (*al-ʿasharatu
      al-mubashsharūn*), beau-frère d'ʿUmar ibn al-Khaṭṭāb ra
      (dont la conversion fut instiguée par lui et sa sœur
      Fāṭima par leur récitation de la sourate Ṭā Hā), et l'un
      des tout premiers convertis mecquois (huitième ou neuvième
      personne à embrasser l'Islam) — mourut sur son domaine
      près de Médine à l'âge d'environ 70 ans, la même année
      que son ami proche Saʿd ibn Abī Waqqāṣ ra. Son père Zayd
      ibn ʿAmr avait été un *ḥanīf* — un monothéiste arabe
      préislamique qui rejetait l'idolâtrie de Quraysh — et le
      Prophète ﷺ dit de lui : « Zayd ibn ʿAmr sera ressuscité
      au Jour de la Résurrection comme une nation à lui seul »
      (al-Bukhārī). Saʿīd ibn Zayd fut le dernier des dix promis
      au Paradis à mourir, selon la position classique dominante.
    canonical_hijri: {year: 51, precision: year}
    canonical_gregorian: {date: 671-01-01, precision: year, method: attested}
