  - slug: death-of-al-maturidi
    category: scholar
    title_en: Death of Imam al-Maturidi — Founder of the Maturidi Creed
    title_ar: وفاة الإمام الماتريدي — مؤسس العقيدة الماتريدية
    title_fr: Mort de l'imam al-Māturīdī — fondateur du credo māturīdite
    description_en: |
      Abu Manṣur Muhammad ibn Muhammad al-Maturidi al-Samarqandi
      — Hanafi jurist of Samarqand and the eponymous founder of
      the Maturidi school of Sunni theology, the second of the
      two great creedal schools (with the Ashʿari school of Abu
      al-Hasan al-Ashʿari) accepted as orthodox across the entire
      classical Sunni world — died at Samarqand at age about 80.
      His major works include *Kitab al-Tawḥid* (the foundational
      systematic Maturidi creedal treatise) and *Taʾwilat Ahl al-
      Sunna* (a Qurʾan commentary). The Maturidi school became
      the dominant creed of the Hanafi madhhab from the Saljuq
      era onward and remains the official creed today across
      Turkey, Central Asia, the Indian subcontinent (where the
      Hanafi madhhab is dominant), and the Balkans. The
      historical-doctrinal differences between Maturidism and
      Ashʿarism are far smaller than the points of agreement;
      al-Subki and other Sunni doxographers treat them as the
      two recognised forms of orthodox Sunni kalam.
    description_ar: |
      توفي الإمام أبو منصور محمد بن محمد الماتريدي السمرقندي —
      فقيه حنفي بسمرقند، ومؤسس المدرسة الماتريدية في علم العقيدة
      عند أهل السنة، ثاني المدرستين العقديتين الكبيرتين (مع
      مدرسة الإمام الأشعري) المقبولتين عقيدة سنية في عامة العالم
      الإسلامي الكلاسيكي — بسمرقند عن نحو ثمانين سنة. ومن أبرز
      مصنفاته: «كتاب التوحيد» (المتن المنهجي الأم في العقيدة
      الماتريدية)، و«تأويلات أهل السنة» (تفسير قرآني). صارت
      الماتريدية العقيدة السائدة في المذهب الحنفي من العصر
      السلجوقي فصاعداً، ولا تزال العقيدة الرسمية اليوم في تركيا
      وآسيا الوسطى وشبه القارة الهندية (حيث المذهب الحنفي هو
      السائد) والبلقان. والفروق العقدية التاريخية بين الماتريدية
      والأشعرية أقل بكثير من نقاط الاتفاق؛ ويعد السبكي وسائر
      أصحاب الطبقات السنية المدرستين الشكلين المعترف بهما من
      كلام أهل السنة.
    description_fr: |
      Abu Manṣūr Muḥammad ibn Muḥammad al-Māturīdī al-Samarqandī
      — juriste hanafite de Samarcande et fondateur éponyme de
      l'école māturīdite de la théologie sunnite, la seconde
      des deux grandes écoles de credo (avec l'école ashʿarite
      d'Abū al-Ḥasan al-Ashʿarī) acceptée comme orthodoxe à
      travers tout le monde sunnite classique — mourut à
      Samarcande à l'âge d'environ 80 ans. Ses œuvres majeures
      incluent *Kitāb al-Tawḥīd* (le traité de credo systématique
      fondateur māturīdite) et *Taʾwīlāt Ahl al-Sunna* (un
      commentaire coranique). L'école māturīdite devint le credo
      dominant du madhhab hanafite à partir de l'ère seldjoukide
      et demeure le credo officiel aujourd'hui à travers la
      Turquie, l'Asie centrale, le sous-continent indien (où le
      madhhab hanafite est dominant), et les Balkans. Les
      différences historico-doctrinales entre le māturīdisme et
      l'ashʿarisme sont bien moindres que les points d'accord;
      al-Subkī et autres doxographes sunnites les traitent comme
      les deux formes reconnues du *kalām* sunnite orthodoxe.
    canonical_hijri: {year: 333, precision: year}
