  - slug: death-of-al-maydani
    category: scholar
    title_en: Death of al-Maydani — Compiler of Arabic Proverbs
    title_ar: وفاة الميداني — جامع أمثال العرب
    title_fr: Mort d'al-Maydānī — compilateur des proverbes arabes
    description_en: |
      Abu al-Faḍl Aḥmad ibn Muhammad al-Maydani al-Naysaburi —
      Persian Sunni philologist and grammarian of Naysabur,
      author of *Majmaʿ al-Amthal* (the standard pre-modern
      compilation of Arabic proverbs, comprising about 6,000
      proverbs each with its narrative occasion and grammatical
      analysis) — died in Naysabur. *Majmaʿ al-Amthal* was the
      master compendium that displaced earlier proverb collections
      (al-Mufaḍḍal al-Ḍabbi, al-Maydani's own teacher al-
      Wahidi) and remained the canonical reference into the
      modern era; it is the principal source for the cultural
      history of pre-Islamic and early-Islamic Arab social
      experience. His *al-Sami fi al-Asami* in three volumes is
      a major Arabic-Persian thematic dictionary; his
      *al-Anmuzaj fi al-Naḥw* an introductory grammar widely
      taught in Khurasan. He was killed in a riot following a
      faction-fight at Naysabur.
    description_ar: |
      توفي الإمام أبو الفضل أحمد بن محمد الميداني النيسابوري —
      لغوي سني فارسي ونحوي بنيسابور، ومصنف «مجمع الأمثال» (أمهات
      كتب أمثال العرب قبل الحديث، يضم نحو ستة آلاف مثل بمناسبتها
      وتحليلها النحوي) — بنيسابور. و«مجمع الأمثال» المعجم الكبير
      الذي نسخ مجاميع الأمثال السابقة (للمفضل الضبي ومعلم
      الميداني نفسه الواحدي)، وظل المرجع المعتمد إلى العصر الحديث؛
      وهو المصدر الأصلي في تاريخ الثقافة والعيش الاجتماعي العربي
      الجاهلي والباكر. أما كتابه «السامي في الأسامي» في ثلاثة
      مجلدات فمعجم عربي-فارسي موضوعي كبير؛ و«الأنموذج في النحو»
      متن نحو تقدمي درّس على نطاق واسع في خراسان. وقتله رحمه
      الله في فتنة طائفية بنيسابور.
    description_fr: |
      Abū al-Faḍl Aḥmad ibn Muḥammad al-Maydānī al-Naysabūrī —
      philologue et grammairien sunnite persan de Naysabur,
      auteur de *Majmaʿ al-Amthāl* (la compilation pré-moderne
      standard des proverbes arabes, comprenant environ 6 000
      proverbes chacun avec son occasion narrative et son analyse
      grammaticale) — mourut à Naysabur. *Majmaʿ al-Amthāl* fut
      le compendium maître qui supplanta les recueils de
      proverbes antérieurs (al-Mufaḍḍal al-Ḍabbī, le maître
      d'al-Maydānī lui-même al-Wāḥidī) et resta la référence
      canonique jusqu'à l'époque moderne; c'est la source
      principale de l'histoire culturelle de l'expérience
      sociale arabe préislamique et islamique précoce. Son
      *al-Sāmī fī al-Asāmī* en trois volumes est un dictionnaire
      thématique arabe-persan majeur; son *al-Anmūdhaj fī al-
      Naḥw* une grammaire introductive largement enseignée au
      Khurasan. Il fut tué dans une émeute suite à une lutte
      factionnelle à Naysabur.
    canonical_hijri: {year: 518, month: 9, precision: month}
    canonical_gregorian: {date: 1124-11-01, precision: month, method: tabular_conversion}
