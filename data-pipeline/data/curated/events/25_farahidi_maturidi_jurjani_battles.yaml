  - slug: death-of-al-sadi
    category: scholar
    title_en: Death of ʿAbd al-Raḥman al-Saʿdi
    title_ar: وفاة عبد الرحمن السعدي
    title_fr: Mort d'ʿAbd al-Raḥmān al-Saʿdī
    description_en: |
      ʿAbd al-Raḥman ibn Naṣir al-Saʿdi al-Tamimi — Saudi Najdi
      Hanbali Sunni scholar of ʿUnayza and the foremost
      contemporary Hanbali tafsir author, whose *Taysir al-
      Karim al-Rahman fi Tafsir Kalam al-Mannan* (commonly
      *Tafsir al-Saʿdi*) is among the most read modern Sunni
      tafsirs in the Arabic-speaking world for its accessibility,
      orthodoxy, and economy of style — died in ʿUnayza at age
      about 70. He was the master of the next generation of
      Saudi Hanbali scholars, including ʿAbd al-ʿAziz ibn Baz
      and Muhammad ibn Ṣaliḥ al-ʿUthaymin (both of whom studied
      under him directly). His *al-Qawaʿid al-Ḥisan li-Tafsir
      al-Qurʾan* is a foundational work on the methodology of
      Qurʾanic exegesis, and his *Bahjat Qulub al-Abrar* a
      widely-circulated commentary on hadith of personal piety.
    description_ar: |
      توفي الإمام عبد الرحمن بن ناصر السعدي التميمي — عالم سني
      نجدي حنبلي بعنيزة، وأكبر مفسري الحنابلة في العصر الحديث،
      ومصنف «تيسير الكريم الرحمن في تفسير كلام المنان» (المعروف
      بـ«تفسير السعدي») الذي يعد من أكثر تفاسير أهل السنة
      الحديثة قراءة في العالم الناطق بالعربية بسبب يسر عبارته
      ومتانة عقيدته واقتصاد أسلوبه — في عنيزة عن نحو سبعين
      سنة. وكان شيخ الجيل التالي من علماء الحنابلة السعوديين،
      منهم عبد العزيز بن باز ومحمد بن صالح العثيمين (وقد قرأ
      كلاهما عليه مباشرة). و«القواعد الحسان لتفسير القرآن» متن
      أصل في منهج التفسير، و«بهجة قلوب الأبرار» شرح حديثي في
      آداب التقوى الفردية واسع الانتشار.
    description_fr: |
      ʿAbd al-Raḥmān ibn Nāṣir al-Saʿdī al-Tamīmī — savant
      sunnite saoudien najdi hanbalite d'ʿUnayza et le principal
      auteur contemporain de tafsir hanbalite, dont *Taysīr al-
      Karīm al-Raḥmān fī Tafsīr Kalām al-Mannān* (communément
      *Tafsīr al-Saʿdī*) figure parmi les tafsirs sunnites
      modernes les plus lus dans le monde arabophone pour son
      accessibilité, son orthodoxie et son économie stylistique
      — mourut à ʿUnayza à l'âge d'environ 70 ans. Il fut le
      maître de la génération suivante de savants hanbalites
      saoudiens, dont ʿAbd al-ʿAzīz ibn Bāz et Muḥammad ibn
      Ṣāliḥ al-ʿUthaymīn (tous deux ayant étudié directement
      sous lui). Son *al-Qawāʿid al-Ḥisān li-Tafsīr al-Qurʾān*
      est un ouvrage fondateur sur la méthodologie de l'exégèse
      coranique, et son *Bahjat Qulūb al-Abrār* un commentaire
      largement diffusé sur les hadiths de piété personnelle.
    canonical_hijri: {year: 1376, month: 6, day: 24, precision: day}
    canonical_gregorian: {date: 1957-01-26, precision: day, method: attested}
