  - slug: death-of-suhayb-al-rumi
    category: companion
    title_en: Death of Suhayb al-Rumi ra
    title_ar: وفاة صهيب الرومي رضي الله عنه
    title_fr: Mort de Ṣuhayb al-Rūmī ra
    description_en: |
      Abu Yaḥya Ṣuhayb ibn Sinan al-Rumi — Companion of Byzantine
      origin (born in northern Mesopotamia, captured as a child
      by Byzantine raiders, raised in Constantinople, and ransomed
      back through Mecca where he embraced Islam in the very
      early Meccan period) — died in Medina at age about 73, in
      the early reign of Muʿawiya ra. He was the Companion who,
      on his Hijra, was overtaken by a Quraysh patrol that
      demanded he relinquish his entire trading fortune; he
      handed it over and continued to Medina, prompting the
      revelation of Q 2:207: "Among men is one who sells his
      soul seeking Allah's pleasure." The Prophet ﷺ said on his
      arrival: "Profit indeed, Abu Yaḥya, profit indeed!" He led
      the funeral prayer over ʿUmar ra at the latter's testamentary
      request, and would have been the leader for the Shura
      consultation that elected ʿUthman ra. His narration on
      patient endurance — "wondrous is the affair of the believer"
      (Muslim) — is one of the most-cited hadiths on faith and
      hardship.
    description_ar: |
      توفي أبو يحيى صهيب بن سنان الرومي رضي الله عنه — صحابي من
      أصل رومي (ولد في شمال الجزيرة، فأسرته غارات الروم طفلاً،
      ونشأ بالقسطنطينية، وافتدته أسرته فدخل مكة فأسلم في أول
      عصر بعثة النبي ﷺ) — بالمدينة المنورة عن نحو ثلاث وسبعين
      سنة، في أوائل خلافة معاوية رضي الله عنه. وهو الصحابي الذي
      اعترضه دورية قرشية في هجرته فطلبوا منه أن يدفع جميع ماله
      من التجارة، فدفعه وأكمل إلى المدينة، فنزل فيه قول الله
      تعالى: ﴿وَمِنَ النَّاسِ مَن يَشْرِي نَفْسَهُ ابْتِغَاءَ
      مَرْضَاتِ اللَّهِ﴾ [البقرة: ٢٠٧]. وقال له النبي ﷺ يوم
      وصوله: «ربح البيع يا أبا يحيى ربح البيع». وأمَّ الناس في
      صلاة الجنازة على عمر رضي الله عنه بوصية منه، وكان مرشحاً
      للإمامة في شورى عثمان رضي الله عنه. وحديثه في الصبر:
      «عجباً لأمر المؤمن» (رواه مسلم) من أكثر الأحاديث استشهاداً
      في الإيمان والصبر.
    description_fr: |
      Abu Yaḥyā Ṣuhayb ibn Sinān al-Rūmī — Compagnon d'origine
      byzantine (né dans le nord de la Mésopotamie, capturé
      enfant par des raiders byzantins, élevé à Constantinople,
      et racheté par sa famille via La Mecque où il embrassa
      l'Islam à la toute première période mecquoise) — mourut à
      Médine à l'âge d'environ 73 ans, au début du règne de
      Muʿāwiya ra. Il est le Compagnon qui, lors de sa Hijra,
      fut dépassé par une patrouille de Quraysh qui exigea qu'il
      remette toute sa fortune commerciale; il la livra et
      continua vers Médine, suscitant la révélation de Q 2:207 :
      « parmi les hommes il en est qui vend son âme cherchant
      l'agrément d'Allah ». Le Prophète ﷺ dit à son arrivée :
      « profit certes, Abū Yaḥyā, profit certes ! » Il dirigea
      la prière funéraire sur ʿUmar ra à la demande testamentaire
      de ce dernier, et aurait été le dirigeant pour la
      consultation de Shūra qui élit ʿUthmān ra. Sa narration
      sur l'endurance patiente — « étonnant est l'affaire du
      croyant » (Muslim) — est l'un des hadiths les plus cités
      sur la foi et l'épreuve.
