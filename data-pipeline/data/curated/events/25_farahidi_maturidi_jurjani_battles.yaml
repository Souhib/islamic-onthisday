  - slug: death-of-al-kattani
    category: scholar
    title_en: Death of Muhammad ʿAbd al-Hayy al-Kattani
    title_ar: وفاة محمد عبد الحي الكتاني
    title_fr: Mort de Muḥammad ʿAbd al-Ḥayy al-Kattānī
    description_en: |
      Muhammad ʿAbd al-Hayy ibn ʿAbd al-Kabir al-Kattani — Maliki
      Sunni Sufi muḥaddith of Fes, of Idrisi sharifian descent,
      and the most extensive twentieth-century classical-style
      Maghrebi hadith authority — died in Fes at age about 76.
      His *Fihris al-Faharis wa-l-Athbat wa-Muʿjam al-Maʿajim
      wa-l-Mashyakhat wa-l-Musalsalat*, completed in 1346 AH /
      1928 CE, is a 1,200-entry catalogue of Sunni hadith
      transmission chains running through the Maghrebi-Mashriqi
      scholarly network of his era — the indispensable reference
      for any modern study of the *isnad* tradition's continuity.
      His *Niẓam al-Ḥukuma al-Nabawiyya* is an early modern
      institutional history of the Prophet's ﷺ governance of
      Medina, anticipating later studies in this area. He was
      politically active in Moroccan-French negotiations of
      the early Protectorate era and lived his final years in
      voluntary exile in Egypt and Lebanon over disputes with
      ʿAlawi sharifian rivals.
    description_ar: |
      توفي العلامة محمد عبد الحي بن عبد الكبير الكتاني — محدث
      صوفي سني مالكي من فاس، من ذرية الإدريسيين الأشراف، وأوسع
      علماء المغرب الحديث في رواية الحديث على المنهج الكلاسيكي —
      بفاس عن نحو ست وسبعين سنة. وكتابه «فهرس الفهارس والأثبات
      ومعجم المعاجم والمشيخات والمسلسلات» الذي أتمه سنة ١٣٤٦ هـ
      / ١٩٢٨ ميلادي معجم في ١٢٠٠ ترجمة لأسانيد الحديث السنية
      المارة عبر الشبكة العلمية المغربية-المشرقية في عصره — وهو
      المرجع الذي لا غنى عنه في الدراسات الحديثة لاستمرار تراث
      الإسناد. وكتابه «نظام الحكومة النبوية» تاريخ مؤسسي حديث
      مبكر لإدارة النبي ﷺ للمدينة، استبق دراسات لاحقة في هذا
      الباب. وكان نشطاً في المفاوضات المغربية-الفرنسية في عصر
      الحماية المبكر، وقضى سنواته الأخيرة في منفى طوعي في مصر
      ولبنان بسبب خلافات مع منافسيه من الأشراف العلويين.
    description_fr: |
      Muḥammad ʿAbd al-Ḥayy ibn ʿAbd al-Kabīr al-Kattānī —
      muḥaddith soufi sunnite malikite de Fès, de descendance
      idrisside chérifienne, et la plus grande autorité hadith
      du Maghreb du XXe siècle dans le style classique — mourut
      à Fès à l'âge d'environ 76 ans. Son *Fihris al-Fahāris
      wa-l-Athbāt wa-Muʿjam al-Maʿājim wa-l-Mashyakhāt wa-l-
      Musalsalāt*, achevé en 1346 H / 1928 EC, est un catalogue
      de 1 200 entrées des chaînes de transmission de hadiths
      sunnites passant par le réseau savant maghrébin-mashriqī
      de son époque — la référence indispensable pour toute
      étude moderne de la continuité de la tradition d'*isnād*.
      Son *Niẓām al-Ḥukūma al-Nabawiyya* est une histoire
      institutionnelle moderne précoce de la gouvernance du
      Prophète ﷺ à Médine, anticipant des études ultérieures
      dans ce domaine. Il fut politiquement actif dans les
      négociations marocco-françaises du début de l'ère du
      Protectorat et vécut ses dernières années en exil
      volontaire en Égypte et au Liban pour des disputes avec
      des rivaux chérifiens ʿalaouites.
    canonical_hijri: {year: 1382, month: 9, day: 7, precision: day}
    canonical_gregorian: {date: 1962-12-31, precision: day, method: attested}
