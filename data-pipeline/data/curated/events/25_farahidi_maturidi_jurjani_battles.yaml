  - slug: death-of-maruf-al-karkhi
    category: scholar
    title_en: Death of Maʿruf al-Karkhi — Early Baghdad Sufi
    title_ar: وفاة معروف الكرخي — صوفي بغداد الأول
    title_fr: Mort de Maʿrūf al-Karkhī — premier soufi de Bagdad
    description_en: |
      Abu Maḥfuz Maʿruf ibn Firuzan al-Karkhi — Sunni ascetic
      and mystic of Karkh in Baghdad, master of al-Sirri al-
      Saqaṭi (and through him grand-master of al-Junayd al-
      Baghdadi), and the earliest of the Baghdad Sufi network
      whose teachings entered the canonical Sufi tradition —
      died in Baghdad. He was a freedman, of Persian descent,
      whose conversion came under the master ʿAli al-Riḍa (the
      eighth Shia Imam, also a transmitter of hadith for the
      Sunni Imam Aḥmad ibn Ḥanbal); both Sunni and later
      classical Sufi sources count him as the principal Sunni
      Sufi authority of the second century AH. His sayings —
      preserved by al-Sulami in *Ṭabaqat al-Ṣufiyya* and Abu
      Nuʿaym in *Ḥilyat al-Awliyaʾ* — establish the early
      ascetic-Sufi vocabulary of *zuhd*, *ridā*, *muhabba*, and
      *yaqīn* that the Baghdad school would systematise in the
      next two generations. His tomb on the west bank of the
      Tigris was a popular Baghdadi pilgrimage site for over a
      millennium.
    description_ar: |
      توفي الإمام أبو محفوظ معروف بن فيروزان الكرخي — زاهد
      ومتصوف سني من «الكرخ» ببغداد، شيخ السري السقطي (وعن
      السقطي شيخ الجنيد البغدادي)، وأول مَن دخل تعاليمه التراث
      الصوفي السني الكلاسيكي من جيل بغداد — ببغداد. وكان
      مولى من أصول فارسية، أسلم على يد الإمام علي الرضا
      (الإمام الثامن عند الشيعة، ومن رواة الحديث للإمام أحمد
      بن حنبل عند أهل السنة)؛ ويعدّه السنة وكتب التصوف
      الكلاسيكية اللاحقة شيخاً سنياً صوفياً مرجعياً في القرن
      الثاني للهجرة. وأقواله المحفوظة عند السلمي في «طبقات
      الصوفية» وأبي نعيم في «حلية الأولياء» تؤسس مفردات الزهد
      والصوفية الباكر في «الزهد» و«الرضا» و«المحبة» و«اليقين»،
      التي ستنهجها مدرسة بغداد في الجيلين التاليين. وكان
      قبره على الضفة الغربية من نهر دجلة مزاراً شعبياً ببغداد
      أكثر من ألف سنة.
    description_fr: |
      Abu Maḥfūẓ Maʿrūf ibn Fīrūzān al-Karkhī — ascète et
      mystique sunnite de Karkh à Bagdad, maître d'al-Sirrī
      al-Saqaṭī (et par lui maître ultime d'al-Junayd al-
      Baghdādī), et le plus ancien du réseau soufi bagdadien
      dont les enseignements entrèrent dans la tradition
      soufie canonique — mourut à Bagdad. C'était un affranchi,
      de descendance persane, dont la conversion vint sous le
      maître ʿAlī al-Riḍā (le huitième imam chiite, également
      transmetteur de hadiths pour l'imam sunnite Aḥmad ibn
      Ḥanbal); les sources sunnites et les sources soufies
      classiques ultérieures le comptent comme la principale
      autorité soufie sunnite du second siècle de l'Hégire.
      Ses paroles — préservées par al-Sulamī dans *Ṭabaqāt
      al-Ṣūfiyya* et Abū Nuʿaym dans *Ḥilyat al-Awliyāʾ* —
      établissent le vocabulaire ascétique-soufi ancien de
      *zuhd*, *riḍā*, *muḥabba* et *yaqīn* que l'école
      bagdadienne systématiserait dans les deux générations
      suivantes. Sa tombe sur la rive ouest du Tigre fut un
      site de pèlerinage bagdadien populaire durant plus d'un
      millénaire.
