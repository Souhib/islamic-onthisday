  # =========================================================================
  # HANBALI POLYMATH + HADITH LEXICOGRAPHER
  # =========================================================================

  - slug: death-of-ibn-muflih
    category: scholar
    title_en: Death of Ibn Mufliḥ — Hanbali Polymath
    title_ar: وفاة ابن مفلح — موسوعي الحنابلة
    title_fr: Mort d'Ibn Mufliḥ — polymathe hanbalite
    description_en: |
      Shams al-Din Muhammad ibn Mufliḥ al-Maqdisi — leading
      Hanbali jurist of Damascus in his generation, foremost
      direct student of Ibn Taymiyya (whose hadith and fiqh
      transmissions to later Damascene Hanbalis run through him),
      and author of *al-Furuʿ* (the most-cited Hanbali fiqh
      manual after Ibn Qudama's *al-Mughni*) — died in Damascus
      at age about 53. *al-Furuʿ* in 11 volumes provides
      systematic comparative fiqh across the Hanbali madhhab
      with cross-references to the other three Sunni schools;
      it became the operating reference of every later Hanbali
      muḥaqqiq. His *al-Adab al-Sharʿiyya* — a systematic
      treatise on Sunni etiquette and personal piety in three
      volumes — is the most extensive single Sunni manual on
      the subject and is widely read across madhhab boundaries.
      Ibn Taymiyya famously said of him: "There is no person on
      earth more learned in the school of Aḥmad than Ibn
      Mufliḥ."
    description_ar: |
      توفي الإمام شمس الدين محمد بن مفلح المقدسي — كبير فقهاء
      الحنابلة بدمشق في جيله، أعلم تلاميذ ابن تيمية مباشرة
      (وعنه تنحدر أسانيد روايته في الحديث والفقه إلى متأخري
      حنابلة دمشق)، ومصنف «الفروع» (أكثر متن فقه حنبلي إحالة
      عليه بعد «المغني» لابن قدامة) — بدمشق عن نحو ثلاث
      وخمسين سنة. ويقدم «الفروع» في أحد عشر مجلداً فقهاً مقارناً
      منهجياً في المذهب الحنبلي مع إحالات على المذاهب السنية
      الثلاثة الأخرى؛ وصار المرجع المعتمد عند كل محقق حنبلي
      تالٍ. وكتابه «الآداب الشرعية» — متن منهجي في آداب
      السنة وتقوى الفرد في ثلاثة مجلدات — هو أوسع متن سني
      منفرد في الباب، يُقرأ على نطاق واسع عبر المذاهب. قال
      عنه ابن تيمية: «ما تحت قبة الفلك أعلم بمذهب أحمد من ابن
      مفلح».
    description_fr: |
      Shams al-Dīn Muḥammad ibn Mufliḥ al-Maqdisī — principal
      juriste hanbalite de Damas de sa génération, premier élève
      direct d'Ibn Taymiyya (dont les transmissions de hadith
      et de fiqh aux hanbalites damascènes ultérieurs passent
      par lui), et auteur d'*al-Furūʿ* (le manuel de fiqh
      hanbalite le plus cité après *al-Mughnī* d'Ibn Qudāma) —
      mourut à Damas à l'âge d'environ 53 ans. *al-Furūʿ* en
      11 volumes fournit un fiqh comparatif systématique à
      travers le madhhab hanbalite avec des références croisées
      aux trois autres écoles sunnites; il devint la référence
      opérationnelle de chaque *muḥaqqiq* hanbalite ultérieur.
      Son *al-Ādāb al-Sharʿiyya* — un traité systématique sur
      l'étiquette sunnite et la piété personnelle en trois
      volumes — est le manuel sunnite unique le plus exhaustif
      sur le sujet et est largement lu à travers les frontières
      madhhabiques. Ibn Taymiyya dit célèbrement de lui :
      « il n'y a personne sur terre plus savant dans l'école
      d'Aḥmad qu'Ibn Mufliḥ ».
    canonical_hijri: {year: 763, month: 9, day: 5, precision: day}
    canonical_gregorian: {date: 1362-07-02, precision: day, method: tabular_conversion}
