  - slug: death-of-al-khalil-al-farahidi
    category: scholar
    title_en: Death of al-Khalil ibn Aḥmad al-Farahidi
    title_ar: وفاة الخليل بن أحمد الفراهيدي
    title_fr: Mort d'al-Khalīl ibn Aḥmad al-Farāhīdī
    description_en: |
      Abu ʿAbd al-Rahman al-Khalil ibn Aḥmad al-Farahidi al-Azdi
      — Sunni Basran philologist, founder of the science of
      Arabic prosody (*ʿarūḍ*), creator of the first Arabic
      lexicographical methodology in his unfinished *Kitab al-
      ʿAyn*, and the master of Sibawayhi (whose *al-Kitab*
      preserves al-Khalil's grammatical positions throughout) —
      died in Basra at age about 75. He systematised the
      sixteen Arabic poetic metres into the framework still
      used in classical Arabic prosody to this day; his
      lexicography organised Arabic roots by phonetic place of
      articulation rather than alphabetical order — a structural
      innovation that, though later superseded by alphabetical
      ordering in al-Jawhari and al-Fayruzabadi, remains a
      foundational moment in linguistic methodology. He
      reportedly devised the *abjad* numerical system. He lived
      in voluntary poverty, declining gifts from the powerful;
      al-Layth ibn Saʿd's annual stipend, sent against his
      protests, was the principal source by which classical
      sources note his survival.
    description_ar: |
      توفي الإمام أبو عبد الرحمن الخليل بن أحمد الفراهيدي الأزدي
      — لغوي سني بصري، ومؤسس علم العروض، وأول من وضع منهجاً
      معجمياً للعربية في كتابه «العين» (الذي لم يكتمل)، وشيخ
      سيبويه الذي حفظ «كتابه» مسائل الخليل النحوية في عامة
      مادته — بالبصرة عن نحو خمس وسبعين سنة. قنّن الخليل البحور
      الستة عشر للشعر العربي في الإطار الذي ما زال يستخدم في
      علم العروض الكلاسيكي إلى اليوم؛ ورتب معجمه الجذور العربية
      على مخارج الحروف الصوتية لا على الحروف الأبجدية — وهو
      ابتكار بنيوي وإن نسخه ترتيب الأبجدية لاحقاً في «صحاح»
      الجوهري و«قاموس» الفيروزآبادي، يبقى لحظة مؤسسة في منهج
      علم اللغة. ويذكر له ترتيب نظام «الأبجد» العددي. وعاش رحمه
      الله في فقر طوعي، يرفض هدايا أصحاب السلطان؛ وكان الراتب
      السنوي الذي يبعثه إليه الليث بن سعد رحمه الله رغم
      احتجاجاته الأصل الذي تتنبه عليه المصادر القديمة في معاشه.
    description_fr: |
      Abu ʿAbd al-Raḥmān al-Khalīl ibn Aḥmad al-Farāhīdī al-Azdī
      — philologue sunnite basrien, fondateur de la science de
      la prosodie arabe (*ʿarūḍ*), créateur de la première
      méthodologie lexicographique arabe dans son inachevé
      *Kitāb al-ʿAyn*, et maître de Sibawayhi (dont *al-Kitāb*
      préserve les positions grammaticales d'al-Khalīl tout du
      long) — mourut à Bassora à l'âge d'environ 75 ans. Il
      systématisa les seize mètres poétiques arabes dans le
      cadre encore utilisé en prosodie arabe classique
      aujourd'hui; sa lexicographie organisa les racines arabes
      par lieu phonétique d'articulation plutôt que par ordre
      alphabétique — une innovation structurale qui, bien que
      plus tard supplantée par l'ordre alphabétique chez
      al-Jawharī et al-Fayrūzābādī, demeure un moment fondateur
      dans la méthodologie linguistique. Il aurait conçu le
      système numérique *abjad*. Il vivait dans la pauvreté
      volontaire, déclinant les cadeaux des puissants; la
      stipendia annuelle d'al-Layth ibn Saʿd, envoyée contre
      ses protestations, fut la source principale par laquelle
      les sources classiques notent sa survie.
    canonical_hijri: {year: 175, precision: year}
    canonical_gregorian: {date: 791-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: dhahabi_siyar
      - source_key: ibn_kathir_bidaya
    people: [[al-khalil-al-farahidi, subject], [sibawayhi, subject]]
