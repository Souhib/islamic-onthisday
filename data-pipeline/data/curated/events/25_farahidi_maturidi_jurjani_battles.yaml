  - slug: death-of-al-jurjani-balagha
    category: scholar
    title_en: Death of ʿAbd al-Qahir al-Jurjani — Founder of Balagha
    title_ar: وفاة عبد القاهر الجرجاني — مؤسس علم البلاغة
    title_fr: Mort d'ʿAbd al-Qāhir al-Jurjānī — fondateur de la *balāgha*
    description_en: |
      Abu Bakr ʿAbd al-Qahir ibn ʿAbd al-Rahman al-Jurjani —
      Persian Sunni Shafiʿi-Ashʿari scholar of Jurjan in
      northeastern Iran, and founder of the Arabic science of
      literary theory and rhetoric (*ʿilm al-balagha*) through
      his two foundational treatises *Asrar al-Balagha* (Secrets
      of Eloquence) and *Dalaʾil al-Iʿjaz* (Indications of the
      Inimitability of the Qurʾan) — died at Jurjan. His
      revolutionary thesis — that the inimitability of the
      Qurʾan lies not in its lexicon but in its *naẓm*, its
      compositional structure that depends on the ordering and
      governance relations within the sentence — established a
      new science of literary criticism and the methodology of
      Qurʾanic *iʿjaz* studies. *Dalaʾil al-Iʿjaz* is read at
      al-Azhar to this day; the modern Arabic literary theory
      of T. Hussein and ʿA. Mahmud Shakir traces its lineage
      directly to al-Jurjani. He was a humble teacher whose
      personal poverty was reportedly such that his students
      shared their cloaks with him in winter.
    description_ar: |
      توفي الإمام أبو بكر عبد القاهر بن عبد الرحمن الجرجاني —
      فقيه شافعي أشعري سني فارسي من «جرجان» شمال شرق إيران،
      ومؤسس علم البلاغة العربية ونقده عبر متنيه الأصليين «أسرار
      البلاغة» و«دلائل الإعجاز» — بجرجان. وأطروحته الثورية —
      أن إعجاز القرآن ليس في معجمه وإنما في «نظمه»، أي بنيته
      التأليفية القائمة على الترتيب وعلاقات العمل في الجملة —
      أسست علم نقد الأدب الجديد ومنهج دراسة إعجاز القرآن. ولا
      يزال «دلائل الإعجاز» يقرأ في الأزهر إلى اليوم؛ ونظرية
      الأدب العربية الحديثة عند طه حسين وأ. م. شاكر ترفع نسبها
      مباشرة إلى الجرجاني. وكان رحمه الله متواضعاً في التدريس،
      حتى ذكرت المصادر أن طلبته كانوا يقتسمون معه عباءاتهم في
      الشتاء.
    description_fr: |
      Abū Bakr ʿAbd al-Qāhir ibn ʿAbd al-Raḥmān al-Jurjānī —
      savant sunnite chāfiʿite-ashʿarite persan de Jurjan dans
      le nord-est de l'Iran, et fondateur de la science arabe de
      la théorie littéraire et de la rhétorique (*ʿilm al-
      balāgha*) à travers ses deux traités fondateurs *Asrār
      al-Balāgha* (Secrets de l'Éloquence) et *Dalāʾil al-Iʿjāz*
      (Indications de l'Inimitabilité du Coran) — mourut à
      Jurjan. Sa thèse révolutionnaire — que l'inimitabilité
      du Coran réside non dans son lexique mais dans son *naẓm*,
      sa structure compositionnelle qui dépend de l'ordre et des
      relations de régence à l'intérieur de la phrase — établit
      une nouvelle science de la critique littéraire et la
      méthodologie des études de l'*iʿjāz* coranique. *Dalāʾil
      al-Iʿjāz* est lu à al-Azhar à ce jour; la théorie
      littéraire arabe moderne de Ṭ. Ḥusayn et de ʿA. M. Shākir
      trace sa lignée directement à al-Jurjānī. Il fut un
      enseignant humble dont la pauvreté personnelle était
      telle, dit-on, que ses élèves partageaient leurs manteaux
      avec lui en hiver.
    canonical_hijri: {year: 471, precision: year}
    canonical_gregorian: {date: 1078-01-01, precision: year, method: attested}
