  - slug: second-battle-of-tarain
    category: battle
    title_en: Second Battle of Tarain — Founding of the Delhi Sultanate
    title_ar: معركة طرائن الثانية — قيام سلطنة دلهي
    title_fr: Seconde bataille de Tarāʾin — fondation du sultanat de Delhi
    description_en: |
      Muʿizz al-Din Muhammad of Ghor, brother of the Ghurid
      sultan Ghiyath al-Din and viceroy of his eastern domains,
      decisively defeated the Hindu Rajput coalition under
      Prithviraj Chauhan III at the Second Battle of Tarain on
      the plain of Karnal in northern India. The Muslim victory
      reversed the loss of the previous year's First Tarain
      and inaugurated four centuries of Indo-Muslim political
      sovereignty over north India. Muʿizz al-Din placed his
      slave-general Quṭb al-Din Aybak in administrative
      command at Delhi, founding what would become the Delhi
      Sultanate (later the Mamluk, Khalji, Tughluq, Sayyid, and
      Lodi dynasties succeeded each other through 932 AH /
      1526 CE). The strategic significance was civilisational:
      a permanent Muslim political establishment in the Gangetic
      heartland enabled the wide diffusion of Persianate Islamic
      culture, the Chishti Sufi mission, and ultimately the
      Mughal-era cultural synthesis from which the modern
      Indian Muslim community largely descends.
    description_ar: |
      هزم معز الدين محمد الغوري — أخو السلطان غياث الدين الغوري
      ونائبه على المشرق — تحالف الراجبوت الهندوسي بقيادة
      «بريثفيراج تشوهان الثالث» هزيمة فاصلة في معركة طرائن
      الثانية في سهل «كارنال» شمال الهند. وعكس النصر الإسلامي
      هزيمة طرائن الأولى في السنة السابقة، وأطلق أربعة قرون من
      السيادة السياسية الإسلامية الهندية على شمال الهند.
      ووضع معز الدين قائده الغلام «قطب الدين أيبك» على ولاية
      دلهي إدارياً، فأسس ما سيصبح سلطنة دلهي (وقد تعاقبت
      عليها لاحقاً الدول المملوكية والخلجية والتغلقية والسيدية
      واللودية إلى سنة ٩٣٢ هـ / ١٥٢٦ ميلادي). والأهمية
      الاستراتيجية حضارية: ففتح الاستقرار السياسي الإسلامي
      الدائم في قلب وادي الغانج باب نشر الثقافة الإسلامية
      الفارسية على نطاق واسع، ومبعث الجشتية الصوفي، وفي نهاية
      المطاف التركيب الثقافي المغولي الذي ينحدر منه عامة
      المجتمع الهندي المسلم الحديث.
    description_fr: |
      Muʿizz al-Dīn Muḥammad de Ghor, frère du sultan ghuride
      Ghiyāth al-Dīn et vice-roi de ses domaines orientaux,
      défit de manière décisive la coalition hindoue rajput
      sous Prithviraj Chauhan III à la seconde bataille de
      Tarāʾin sur la plaine de Karnal dans le nord de l'Inde.
      La victoire musulmane renversa la défaite de la première
      Tarāʾin de l'année précédente et inaugura quatre siècles
      de souveraineté politique indo-musulmane sur le nord de
      l'Inde. Muʿizz al-Dīn plaça son général-esclave Quṭb al-
      Dīn Aybak au commandement administratif à Delhi, fondant
      ce qui deviendrait le sultanat de Delhi (les dynasties
      mameloukes, khaldjie, tughluquides, sayyids et lodies se
      succédèrent jusqu'à 932 H / 1526 EC). La signification
      stratégique fut civilisationnelle : un établissement
      politique musulman permanent au cœur de la vallée du
      Gange permit la large diffusion de la culture islamique
      persanate, la mission soufie Chishtī, et finalement la
      synthèse culturelle de l'ère moghole dont la communauté
      musulmane indienne moderne descend largement.
    canonical_hijri: {year: 588, month: 10, precision: month}
    canonical_gregorian: {date: 1192-11-01, precision: month, method: tabular_conversion}
