  - slug: death-of-majd-al-din-ibn-al-athir
    category: scholar
    title_en: Death of Majd al-Din Ibn al-Athir — al-Nihaya
    title_ar: وفاة مجد الدين ابن الأثير — صاحب «النهاية»
    title_fr: Mort de Majd al-Dīn Ibn al-Athīr — auteur d'al-Nihāya
    description_en: |
      Majd al-Din Abu al-Saʿadat al-Mubarak ibn Muhammad ibn al-
      Athir al-Jazari — eldest of the three Ibn al-Athir
      brothers (his brother ʿIzz al-Din the historian and his
      brother Ḍiyaʾ al-Din the literary theorist), Shafiʿi
      jurist and chief secretary at Mosul under the Zangid
      atabeg, and author of *al-Nihaya fi Gharib al-Ḥadith wa-l-
      Athar* (the foundational lexicon of difficult words in
      hadith — the most cited Sunni hadith dictionary in
      classical scholarship) — died in Mosul at age about 62.
      *al-Nihaya* synthesises the prior philological work of
      al-Harawi, al-Zamakhshari, and Ibn Faris on hadith
      vocabulary into a single five-volume reference;
      al-Suyuṭi later abridged it as *al-Durr al-Nathir*. His
      *Jamiʿ al-Uṣul fi Aḥadith al-Rasul* combines the hadith
      of the Six Books and the *Muwaṭṭaʾ* into a single
      thematic compendium, the earliest such cross-collection
      attempt and a model for many subsequent works.
    description_ar: |
      توفي الإمام مجد الدين أبو السعادات المبارك بن محمد ابن
      الأثير الجزري — أكبر إخوة آل ابن الأثير الثلاثة (أخوه عز
      الدين المؤرخ وأخوه ضياء الدين الأديب البلاغي)، فقيه
      شافعي وكاتب السر بالموصل في إمارة أتابكة الزنكيين، ومصنف
      «النهاية في غريب الحديث والأثر» (المعجم الأصلي في الحديث
      للكلمات الغامضة — أكثر معاجم الحديث السنية إحالة عليها
      في التراث) — بالموصل عن نحو اثنتين وستين سنة. ويجمع
      «النهاية» بين أعمال أهل اللغة السابقين (الهروي والزمخشري
      وابن فارس) في غريب الحديث في مرجع واحد في خمسة مجلدات؛
      اختصره السيوطي بعد ذلك في «الدر النثير». وكتابه «جامع
      الأصول في أحاديث الرسول» يجمع أحاديث الكتب الستة
      و«الموطأ» في موسوعة موضوعية واحدة، وهي أقدم محاولة
      للجمع بين هذه المجاميع، وقالب لكثير من الأعمال اللاحقة.
    description_fr: |
      Majd al-Dīn Abū al-Saʿādāt al-Mubārak ibn Muḥammad ibn al-
      Athīr al-Jazarī — aîné des trois frères Ibn al-Athīr (son
      frère ʿIzz al-Dīn l'historien et son frère Ḍiyāʾ al-Dīn
      le théoricien littéraire), juriste shāfiʿite et secrétaire
      en chef à Mossoul sous l'atabeg zangide, et auteur d'*al-
      Nihāya fī Gharīb al-Ḥadīth wa-l-Athar* (le lexique
      fondateur des mots difficiles dans le hadith — le
      dictionnaire de hadith sunnite le plus cité dans
      l'érudition classique) — mourut à Mossoul à l'âge
      d'environ 62 ans. *al-Nihāya* synthétise les travaux
      philologiques antérieurs d'al-Harawī, d'al-Zamakhsharī
      et d'Ibn Fāris sur le vocabulaire du hadith en une
      référence unique en cinq volumes; al-Suyūṭī l'abrégea
      plus tard en *al-Durr al-Nathīr*. Son *Jāmiʿ al-Uṣūl fī
      Aḥādīth al-Rasūl* combine les hadiths des Six Livres et
      du *Muwaṭṭaʾ* en un compendium thématique unique, la
      plus ancienne tentative de telle collection croisée et
      un modèle pour de nombreuses œuvres ultérieures.
    canonical_hijri: {year: 606, precision: year}
    canonical_gregorian: {date: 1210-01-01, precision: year, method: tabular_conversion}
