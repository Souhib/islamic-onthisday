  - slug: death-of-sahl-ibn-sad
    category: companion
    title_en: Death of Sahl ibn Saʿd al-Saʿidi ra — Last Companion in Medina
    title_ar: وفاة سهل بن سعد الساعدي رضي الله عنه — آخر صحابي بالمدينة
    title_fr: Mort de Sahl ibn Saʿd al-Sāʿidī ra — dernier Compagnon à Médine
    description_en: |
      Abu al-ʿAbbas Sahl ibn Saʿd al-Anṣari al-Saʿidi — Madinan
      Companion of the Khazraji clan of Banu Sāʿida, who took the
      Prophet's ﷺ pledge as a teenager and lived through the
      Rashidun, Umayyad, and Marwanid eras until the time of al-
      Walid I — died at age 100, the last surviving Companion
      to die in Medina. He narrated 188 hadiths preserved in
      the Six Books, several of them legally foundational: his
      report on the woman who came to the Prophet ﷺ and was
      married to a man for the gift of "what you have memorised
      of the Qurʾan" (Bukhari) is the principal hadith on the
      legal validity of any small token as bridal *mahr*. He
      is the Companion who narrated the Prophet's ﷺ statement:
      "I and the one who cares for an orphan will be in Paradise
      like this" — joining his index and middle fingers (Bukhari).
      His grandson recorded that he was so tall that the
      Marwanid governor's gate had to be enlarged for him to
      enter standing.
    description_ar: |
      توفي أبو العباس سهل بن سعد الأنصاري الساعدي رضي الله عنه —
      صحابي مدني من خزرج بني ساعدة، بايع رسول الله ﷺ غلاماً يافعاً،
      وعاش عصور الراشدين وبني أمية والمروانيين إلى زمن الوليد
      الأول — عن مئة سنة، آخر صحابي وفاةً بالمدينة المنورة. روى
      ١٨٨ حديثاً في الكتب الستة، منها أصول فقهية: حديثه عن
      المرأة التي جاءت النبي ﷺ فزوجها الرجل بصداق «ما معك من
      القرآن» (متفق عليه) أصل في صحة المهر القليل في النكاح.
      وهو الصحابي الذي روى عن النبي ﷺ: «أنا وكافل اليتيم في
      الجنة هكذا» وأشار بإصبعيه السبابة والوسطى (متفق عليه).
      وروى حفيده أنه كان طويل القامة جداً حتى احتيج إلى رفع
      باب أمير المؤمنين المرواني ليدخل قائماً.
    description_fr: |
      Abū al-ʿAbbās Sahl ibn Saʿd al-Anṣārī al-Sāʿidī — Compagnon
      médinois du clan khazradjite des Banū Sāʿida, qui prit le
      serment du Prophète ﷺ adolescent et vécut à travers les
      ères des Rashidun, des Omeyyades et des Marwanides jusqu'à
      l'époque d'al-Walīd Ier — mourut à l'âge de 100 ans, le
      dernier Compagnon survivant à mourir à Médine. Il narra
      188 hadiths préservés dans les Six Livres, plusieurs
      juridiquement fondateurs : son rapport sur la femme qui
      vint au Prophète ﷺ et fut mariée à un homme pour le don
      de « ce que tu as mémorisé du Coran » (Bukhārī) est le
      hadith principal sur la validité juridique de tout petit
      symbole comme *mahr* nuptial. Il est le Compagnon qui
      narra la parole du Prophète ﷺ : « moi et celui qui prend
      soin d'un orphelin serons au Paradis ainsi » — joignant
      son index et son majeur (Bukhārī). Son petit-fils consigna
      qu'il était si grand que la porte du gouverneur marwanide
      dut être agrandie pour qu'il puisse entrer debout.
