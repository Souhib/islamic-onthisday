  # =========================================================================
  # AL-MANṢŪR IBN ABĪ ʿĀMIR — the de facto ruler of Cordoba
  # =========================================================================

  - slug: death-of-al-mansur-ibn-abi-amir
    category: ruler_death
    title_en: Death of al-Manṣūr ibn Abī ʿĀmir (Almanzor) — De Facto Ruler of Cordoba
    title_ar: وفاة المنصور بن أبي عامر — الحاكم الفعلي لقرطبة
    title_fr: Décès d'al-Manṣūr ibn Abī ʿĀmir (Almanzor) — maître effectif de Cordoue
    description_en: |
      Muḥammad ibn Abī ʿĀmir al-Maʿāfirī, surnamed al-Manṣūr
      bi-Allāh — the *Almanzor* of the Latin chronicles — died
      at Madīnat Sālim (Medinaceli) in Ramaḍān 392 AH on his
      return from his fifty-second campaign against the
      Christian north. As ḥājib of the boy-caliph Hishām II
      al-Muʾayyad he had effectively ruled the Cordoban
      caliphate since c. 370 AH, ordering the army around his
      person, building the new palace-city of al-Madīna
      al-Zāhira (the *eastern* Zahra) east of Cordoba, sacking
      Barcelona in 374 AH and the shrine of Santiago de
      Compostela in 387 AH. His near-annual *ṣawāʾif* against
      León, Castile, Navarre, and the Catalan counties marked
      the brief restoration of caliphal offensive momentum after
      al-Nāṣir's defeat at Wādī Salīṭ. His succession by his son
      ʿAbd al-Malik al-Muẓaffar held the regime together for
      another six years, but the death of the second son
      ʿAbd al-Raḥmān (Sanchuelo) in 399 AH would tip the
      caliphate into the Fitna. Ibn al-Athīr, Ibn ʿIdhārī, and
      al-Dhahabī fix his death in Ramaḍān 392 AH (August 1002 CE).
    description_ar: |
      توفي محمد بن أبي عامر المعافري — الملقَّب بالمنصور بالله،
      وهو *المنزور* عند المؤرخين اللاتين — بمدينة سالم
      (Medinaceli) في رمضان سنة ٣٩٢ هـ في طريق عودته من
      غزوته الثانية والخمسين على شمال الأندلس النصراني. وبصفته
      حاجباً للخليفة الفتى هشام الثاني المؤيد، حكم الخلافة
      القرطبية فعلياً منذ نحو سنة ٣٧٠ هـ، فأدار الجيشَ من حوله،
      وبنى المدينة الزاهرة الجديدة شرقَ قرطبة، وأخرب برشلونة
      سنة ٣٧٤ هـ، وانتهك مزار شَنْتَ ياقُب (سَنْتِيَاغُو دي
      كُمْبُسْتِيلَا) سنة ٣٨٧ هـ. وكانت صوائفه السنوية
      تقريباً على ليون وقشتالة ونبرَّة وبلاد كَتالان توقُّفَ
      المدِّ الخلافي العسكري بعد هزيمة الناصر بوادي سليط.
      وحفظ خلَفُه ابنُه عبد الملك المظفر تماسكَ النظام ست
      سنوات أخرى، إلا أن وفاة ابنه الثاني عبد الرحمن
      (شنشول/سَنْشُويلو) سنة ٣٩٩ هـ أدخلت الخلافةَ في
      الفتنة. ويؤرِّخ ابن الأثير وابن عذاري والذهبي وفاتَه
      في رمضان ٣٩٢ هـ (أغسطس ١٠٠٢ م).
    description_fr: |
      Muḥammad ibn Abī ʿĀmir al-Maʿāfirī, surnommé al-Manṣūr
      bi-Allāh — l'*Almanzor* des chroniqueurs latins — mourut
      à Madīnat Sālim (Medinaceli) en Ramaḍān 392 H, sur le
      chemin du retour de sa cinquante-deuxième campagne contre
      le nord chrétien. Comme ḥājib du calife enfant Hishām II
      al-Muʾayyad, il avait effectivement gouverné le califat
      cordouan depuis 370 H environ, organisant l'armée autour
      de sa personne, bâtissant la nouvelle ville-palais
      d'al-Madīna al-Zāhira (la *Zahra orientale*) à l'est de
      Cordoue, mettant Barcelone à sac en 374 H et profanant le
      sanctuaire de Saint-Jacques-de-Compostelle en 387 H. Ses
      *ṣawāʾif* presque annuelles contre León, Castille, Navarre
      et les comtés catalans marquèrent la brève restauration de
      l'élan offensif califal après la défaite d'al-Nāṣir à
      Wādī Salīṭ. La succession de son fils ʿAbd al-Malik
      al-Muẓaffar maintint le régime pendant six ans encore,
      mais la mort du second fils ʿAbd al-Raḥmān (Sanchuelo) en
      399 H précipiterait le califat dans la Fitna. Ibn al-Athīr,
      Ibn ʿIdhārī et al-Dhahabī fixent sa mort en Ramaḍān 392 H
      (août 1002 EC).
