  - slug: death-of-al-mutamid-ibn-abbad
    category: ruler_death
    title_en: Death of al-Muʿtamid ibn ʿAbbād — Last ʿAbbādid King of Sevilla, in Aghmat Exile
    title_ar: وفاة المعتمد بن عبَّاد — آخر ملوك بني عبَّاد بإشبيلية، منفياً بأَغْمَات
    title_fr: Décès d'al-Muʿtamid ibn ʿAbbād — dernier roi abbadide de Séville, exilé à Aghmat
    description_en: |
      Muḥammad ibn ʿAbbād al-Muʿtamid bi-Allāh, third and last
      king of the ʿAbbādid taifa of Sevilla, died at Aghmat in
      Shawwāl 488 AH after four years of captivity south of
      Marrakesh. The Almoravid amīr Yūsuf ibn Tāshufīn had
      deposed him on his entry to Sevilla in Rajab 484 AH,
      taken him in chains across the Straits, and held him under
      house arrest at Aghmat in the Atlas foothills with the
      women of his household. The poetry he composed there —
      addressed to his daughters in their poverty, mourning the
      lost gardens of Sevilla and the Guadalquivir, and rebuking
      himself for not dying on the field — is among the most
      celebrated of all Arabic exile literature; the long
      *Sirr al-Adab* couplets and the tomb verses survive in
      Ibn Khallikān, the *Dhakhīra* of Ibn Bassām, and Ibn
      al-Khaṭīb's *Iḥāṭa*. He was buried at Aghmat where his
      tomb still stands. Ibn al-Athīr enters his death in 488
      AH; Ibn Khallikān's Wafayāt confirms.
    description_ar: |
      توفي محمد بن عبَّاد المعتمد بالله — ثالث ملوك بني عبَّاد
      بإشبيلية وآخرهم — بأَغْمَات في شوال سنة ٤٨٨ هـ بعد أربع
      سنين من الأسر جنوبَ مراكش. كان الأميرُ المرابطي يوسف بن
      تاشفين قد خلعه عند دخوله إشبيلية في رجب ٤٨٤ هـ، وأخذه
      مكبَّلاً إلى المغرب، وحبسه في أَغْمَات بسفح الأطلس مع
      نساء بيته. وما نظم هناك من شعرٍ — يخاطب فيه بناته في
      فاقتهن، ويبكي رياض إشبيلية والوادي الكبير، ويعاتب نفسه
      على ألا يكون مات في المعركة — من أعرف الشعر العربي في
      الغربة قاطبةً؛ ومنه قصائدُه التي حفظها ابنُ خلكان وابنُ
      بسَّام في «الذخيرة» وابنُ الخطيب في «الإحاطة»، وأبياتُ
      قبره. ودفن بأَغْمَات حيث ما زال قبرُه إلى اليوم.
      ويثبت ابن الأثير وفاتَه في ٤٨٨ هـ، ويوافقه ابن خلكان
      في «وفيات الأعيان».
    description_fr: |
      Muḥammad ibn ʿAbbād al-Muʿtamid bi-Allāh, troisième et
      dernier roi de la taifa ʿabbādide de Séville, mourut à
      Aghmat en Shawwāl 488 H, après quatre ans de captivité au
      sud de Marrakech. L'amīr almoravide Yūsuf ibn Tāshufīn
      l'avait déposé à son entrée dans Séville en Rajab 484 H,
      l'avait emmené enchaîné par-delà le détroit et tenu en
      résidence forcée à Aghmat, au pied de l'Atlas, avec les
      femmes de sa maison. La poésie qu'il y composa — adressée
      à ses filles dans leur dénuement, pleurant les jardins
      perdus de Séville et le Guadalquivir, et se reprochant de
      n'être pas mort sur le champ de bataille — compte parmi la
      plus célèbre de toute la littérature arabe d'exil ; les
      grandes pièces de *Sirr al-Adab* et les vers du tombeau
      survivent chez Ibn Khallikān, dans la *Dhakhīra* d'Ibn
      Bassām, et dans l'*Iḥāṭa* d'Ibn al-Khaṭīb. Il fut enterré
      à Aghmat, où son tombeau se dresse encore. Ibn al-Athīr
      situe sa mort en 488 H ; le *Wafayāt* d'Ibn Khallikān
      confirme.
    canonical_hijri: {year: 488, month: 10, precision: month}
    canonical_gregorian: {date: 1095-10-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the death of al-Muʿtamid ibn ʿAbbād in exile at Aghmat under the events of 488 AH."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān has a long entry on al-Muʿtamid covering his deposition (484 AH), his Aghmat exile, his daughters, and his death (488 AH)."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms 488 AH for the death of al-Muʿtamid in Aghmat exile."
    people: [[al-mutamid-ibn-abbad, died]]
