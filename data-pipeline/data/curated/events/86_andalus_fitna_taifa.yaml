      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān records the Almoravid deposition of al-Muʿtamid in 484 AH and his subsequent exile to Aghmat."
      - source_key: ei2
        notes: "EI² entry 'ʿAbbādids' confirms 484 AH / 1091 CE for the fall of the ʿAbbādid taifa to the Almoravids."
