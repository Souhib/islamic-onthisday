  # =========================================================================
  # FITNAT AL-ANDALUS (399-422 AH) — the Cordoban civil war
  # =========================================================================

  - slug: beginning-of-fitnat-al-andalus
    category: political_event
    title_en: Beginning of Fitnat al-Andalus — the Cordoban Civil War
    title_ar: بداية فتنة الأندلس — الحرب الأهلية القرطبية
    title_fr: Début de la Fitna d'al-Andalus — la guerre civile cordouane
    description_en: |
      In Jumādā II 399 AH the Cordoban populace rose against
      ʿAbd al-Raḥmān Sanchuelo (*Shanjūl*), ʿAmirid heir of his
      father al-Manṣūr and brother of ʿAbd al-Malik al-Muẓaffar,
      after Sanchuelo had compelled the puppet caliph Hishām II
      al-Muʾayyad to designate him as caliphal heir-apparent.
      The Umayyad-loyalist faction proclaimed Muḥammad II
      al-Mahdī, a great-grandson of ʿAbd al-Raḥmān III, in
      Sanchuelo's place; Sanchuelo was hunted down and killed
      on his return from a frontier campaign, and al-Madīna
      al-Zāhira — the ʿAmirid palace-city east of Cordoba —
      was sacked. The event opens what Andalusi historians call
      the *Fitnat al-Andalus*, a twenty-three-year civil war
      that destroyed the Cordoban caliphate, depopulated
      Cordoba itself, and dismembered al-Andalus into the Taifa
      kingdoms. From 399 AH the caliphal title would pass back
      and forth — between successive Umayyad claimants
      (Muḥammad II, Hishām II reinstalled, Sulaymān al-Mustaʿīn)
      and the rival Idrīsīd-ʿAlawid Hammudids of Málaga and
      Algeciras (ʿAlī, al-Qāsim, Yaḥyā) — until Hishām III's
      deposition in 422 AH ended the institution. Ibn al-Athīr
      enters the outbreak under 399 AH; Ibn ʿIdhārī and the
      later EI² synthesis confirm.
    description_ar: |
      في جمادى الآخرة سنة ٣٩٩ هـ ثارت عامةُ قرطبة على عبد
      الرحمن شنشول العامري — وريث المنصور بن أبي عامر وأخي عبد
      الملك المظفر — بعد أن أكره شنشولُ الخليفةَ الصوري هشام
      الثاني المؤيدَ على تنصيبه ولياً للعهد. فأقامت العصبةُ
      الموالية للأمويين محمد الثاني المهديَّ — أحدَ أحفاد عبد
      الرحمن الناصر — مكانَ شنشول؛ ولوحق شنشول وقُتل وهو
      عائد من غزو الثغر، ونُهبت المدينة الزاهرة العامرية
      شرقَ قرطبة. وتفتح هذه الحادثة ما يسمِّيه المؤرخون
      الأندلسيون «فتنةَ الأندلس»، وهي حربٌ أهلية امتدَّت ثلاثاً
      وعشرين سنة دمَّرت الخلافةَ القرطبية، وأخلت قرطبةَ نفسَها،
      ومزَّقت الأندلسَ إلى ممالك الطوائف. ومن سنة ٣٩٩ هـ تتداول
      اللقبُ الخلافي بين أمويين متعاقبين (محمد الثاني، ثم هشام
      الثاني مرةً ثانية، ثم سليمان المستعين) وبين الأدارسة
      الحموديين السادات في مالقة والجزيرة الخضراء (علي،
      القاسم، يحيى)، إلى أن خُلع هشام الثالث سنة ٤٢٢ هـ
      فانطوت المؤسسة. ويُثبت ابن الأثير اندلاع الفتنة في
      حوادث ٣٩٩ هـ، ويؤيِّده ابنُ عذاري وملخَّصُ EI² لاحقاً.
    description_fr: |
      En Jumādā II 399 H, la population de Cordoue se souleva
      contre ʿAbd al-Raḥmān Sanchuelo (*Shanjūl*), héritier
      ʿāmiride d'al-Manṣūr et frère de ʿAbd al-Malik al-Muẓaffar,
      après que Sanchuelo eut contraint le calife-pantin Hishām
      II al-Muʾayyad à le désigner comme héritier califal
      présomptif. La faction omeyyado-légitimiste proclama à sa
      place Muḥammad II al-Mahdī, arrière-petit-fils de ʿAbd
      al-Raḥmān III ; Sanchuelo fut traqué et tué au retour
      d'une campagne de frontière, et al-Madīna al-Zāhira —
      ville-palais ʿāmiride à l'est de Cordoue — fut mise à sac.
      L'événement ouvre ce que les historiens d'al-Andalus
      nomment la *Fitna d'al-Andalus*, guerre civile de
      vingt-trois ans qui détruisit le califat cordouan, vida
      Cordoue elle-même de ses habitants et démembra al-Andalus
      en royaumes de taifas. À partir de 399 H, le titre califal
      passa de main en main — entre prétendants omeyyades
      successifs (Muḥammad II, Hishām II rétabli, Sulaymān
      al-Mustaʿīn) et les Hammudides idrīsides-ʿalawides
      sayyids de Malaga et d'Algésiras (ʿAlī, al-Qāsim, Yaḥyā)
      — jusqu'à la déposition de Hishām III en 422 H, qui mit
      fin à l'institution. Ibn al-Athīr place le déclenchement
      sous 399 H ; Ibn ʿIdhārī et la synthèse postérieure
      d'EI² le confirment.
    canonical_hijri: {year: 399, month: 6, precision: month}
    canonical_gregorian: {date: 1009-02-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the rising against Sanchuelo and the proclamation of Muḥammad II al-Mahdī under the events of 399 AH and follows the Fitna year by year."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr's al-Bidāya wa-l-Nihāya confirms the outbreak of the Fitna in 399 AH and the death of Sanchuelo."
      - source_key: ei2
        notes: "EI² entry 'Fitna' (al-Andalus) confirms the inception in 399 AH / 1009 CE and the twenty-three-year arc to 422 AH."
    tags: [andalus, cordoba, caliphate, fitna, civil_war, amirids, umayyad_andalus]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: end-of-cordoba-caliphate-422
    category: political_event
    title_en: Deposition of Hishām III — End of the Cordoban Caliphate
    title_ar: خلع هشام الثالث — نهاية خلافة قرطبة
    title_fr: Déposition de Hishām III — fin du califat de Cordoue
    description_en: |
      In Dhū al-Ḥijja 422 AH the notables of Cordoba — under
      the leadership of the *jamāʿa* of city sheikhs around
      Abū al-Ḥazm Jahwar ibn Muḥammad — deposed the last
      Umayyad caliph of al-Andalus, Hishām III al-Muʿtadd
      bi-Allāh, expelled him from the city, and formally
      abolished the institution of the caliphate at Cordoba,
      replacing it with a council of notables (the *jumhūriyyat*
      of the Banū Jahwar). The act sealed twenty-three years of
      Fitna and ratified the de facto fragmentation of
      al-Andalus into the Taifa kingdoms (mulūk al-ṭawāʾif). No
      caliph in al-Andalus would ever again command universal
      recognition; the Hammudids of Málaga continued to claim
      the caliphal title intermittently, but their writ
      stretched no further than the Straits. The Ṭawāʾif now
      operated as petty Sunni monarchies (mulūk and amīrs),
      paying tribute (parias) to the rising Christian kingdoms
      of León-Castile, Navarre, and the Catalan counties. Ibn
      al-Athīr enters the deposition under 422 AH; Ibn ʿIdhārī
      records the founding of the Jahwarid council and the
      symbolic burial of the office.
    description_ar: |
      في ذي الحجة سنة ٤٢٢ هـ خلع وجهاءُ قرطبة — بقيادة
      *جماعة* مشايخ المدينة من حول أبي الحزم جهور بن محمد —
      آخرَ خلفاء بني أمية بالأندلس هشامَ الثالث المعتدَّ
      بالله، وأخرجوه من المدينة، وألغَوا رسمياً مؤسسةَ
      الخلافة بقرطبة، فأقاموا مكانها مجلسَ الأعيان (جمهورية
      بني جهور). ختم العملُ ثلاثاً وعشرين سنة من الفتنة،
      وأقرَّ تجزُّؤَ الأندلس إلى ممالك الطوائف (ملوك الطوائف).
      ولن يحظى خليفةٌ بالأندلس بعدها بإجماعٍ عام؛ وإن واصل
      الحموديون بمالقة ادِّعاء اللقب الخلافي على فتراتٍ، فلم
      تتجاوز كلمتُهم المضيق. وصارت الطوائفُ ممالكَ سنية صغرى
      (ملوكاً وأمراءً) تؤدي الإتاوة (parias) إلى الممالك
      النصرانية الصاعدة بليون وقشتالة ونبرَّة وبلاد كَتالان.
      ويُثبت ابنُ الأثير الخلعَ في حوادث ٤٢٢ هـ، ويسجِّل
      ابنُ عذاري قيامَ المجلس الجهوري والدفنَ الرمزي
      للمؤسسة.
    description_fr: |
      En Dhū al-Ḥijja 422 H, les notables de Cordoue — sous la
      direction de la *jamāʿa* des shaykhs de la ville réunie
      autour d'Abū al-Ḥazm Jahwar ibn Muḥammad — déposèrent le
      dernier calife omeyyade d'al-Andalus, Hishām III
      al-Muʿtadd bi-Allāh, le chassèrent de la ville et abolirent
      formellement l'institution du califat à Cordoue, lui
      substituant un conseil de notables (la *jumhūriyya* des
      Banū Jahwar). L'acte scella vingt-trois ans de Fitna et
      ratifia la fragmentation de fait d'al-Andalus en royaumes
      de taifas (mulūk al-ṭawāʾif). Plus jamais un calife
      d'al-Andalus ne jouirait d'une reconnaissance universelle ;
      les Hammudides de Malaga continueraient bien à revendiquer
      par intermittence le titre califal, mais leur autorité ne
      dépasserait plus le détroit. Les taifas opèrent désormais
      comme petites monarchies sunnites (mulūk et amīrs), payant
      tribut (parias) aux royaumes chrétiens montants de
      León-Castille, de Navarre et des comtés catalans. Ibn
      al-Athīr inscrit la déposition sous 422 H ; Ibn ʿIdhārī
      enregistre la fondation du conseil jahwaride et
      l'enterrement symbolique de la fonction.
    canonical_hijri: {year: 422, month: 12, precision: month}
    canonical_gregorian: {date: 1031-11-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the deposition of Hishām III al-Muʿtadd and the abolition of the Cordoban caliphate under the events of 422 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr's al-Bidāya wa-l-Nihāya confirms the abolition of the Cordoban caliphate in 422 AH."
      - source_key: ei2
        notes: "EI² entry 'Hishām III' / 'Cordoba' fixes the deposition in 422 AH / 1031 CE as the formal end of the institution."
    people: [[hisham-iii-andalus, died]]
    tags: [andalus, cordoba, caliphate, fitna, end_of_caliphate, taifa, jahwarids]
    importance: major
