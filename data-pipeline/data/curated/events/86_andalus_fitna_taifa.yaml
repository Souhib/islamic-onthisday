  # =========================================================================
  # ALMORAVID ANNEXATIONS — end of the Taifa kingdoms
  # =========================================================================

  - slug: almoravid-annexation-of-granada
    category: conquest
    title_en: Almoravid Annexation of Granada — End of the Zīrid Taifa
    title_ar: ضمُّ المرابطين لغرناطة — نهاية طائفة بني زِيري
    title_fr: Annexion almoravide de Grenade — fin de la taifa zīride
    description_en: |
      In Rajab 483 AH the Almoravid amīr Yūsuf ibn Tāshufīn
      deposed the last Zīrid king of the taifa of Granada,
      ʿAbd Allāh ibn Buluggīn (author of the celebrated memoir
      *al-Tibyān*), and incorporated Granada — together with
      its dependent Málaga held by ʿAbd Allāh's brother
      Tamīm — into the Almoravid empire. ʿAbd Allāh and Tamīm
      were exiled to Aghmat south of Marrakesh, where ʿAbd
      Allāh would write the *Tibyān*, the only Andalusi king's
      autobiography to survive in full and the most candid
      first-person Andalusi political document of the era.
      Granada's annexation was the first of the great Almoravid
      absorptions of the eastern Andalusi taifas; Yūsuf ibn
      Tāshufīn had been invited across the Straits in 479 AH by
      al-Muʿtamid of Sevilla and others to repel Alfonso VI
      after Toledo's fall, and now turned the same army on the
      Andalusi rulers themselves. Sevilla, Almería, Badajoz,
      and Saragossa would follow in the next decade. Ibn
      al-Athīr enters the annexation under 483 AH; ʿAbd Allāh's
      own *Tibyān* gives a contemporary first-hand account.
    description_ar: |
      في رجب سنة ٤٨٣ هـ خلع الأميرُ المرابطي يوسف بن تاشفين
      آخرَ ملوك بني زيري من طائفة غرناطة، عبدَ الله بن
      بُلُكِّين (صاحبَ المذكرات الشهيرة «التِّبيان»)، وضمَّ
      غرناطةَ — ومعها مالقة التي كان يحكمها أخوه تميم —
      إلى دولة المرابطين. ونُفي عبدُ الله وتميم إلى أَغْمَات
      جنوبيَّ مراكش، حيث كتب عبدُ الله «التِّبيان»، وهو السيرةُ
      الذاتية الوحيدة لملك أندلسي وصلت إلينا كاملة وأصرحُ
      وثيقة أندلسية ذاتية في عصرها. كان ضمُّ غرناطة فاتحةَ
      الموجة الكبرى لاستيعاب المرابطين الطوائفَ الشرقية، فقد
      كان يوسفُ قد عبر المضيق سنة ٤٧٩ هـ بطلب المعتمد بن
      عبَّاد ومن معه لردِّ ألفونسو السادس بعد سقوط طُلَيطِلَة،
      ثم وجَّه الجيشَ نفسَه إلى الأمراء الأندلسيين. وستتبعها
      إشبيلية والمرية وبَطَلْيَوْس وسرقسطة في العقد الذي
      يليها. يثبت ابنُ الأثير الضمَّ في ٤٨٣ هـ، ويعطي
      *التِّبيان* لعبد الله شهادةً معاصِرةً مباشرة.
    description_fr: |
      En Rajab 483 H, l'amīr almoravide Yūsuf ibn Tāshufīn
      déposa le dernier roi zīride de la taifa de Grenade,
      ʿAbd Allāh ibn Buluggīn (auteur du célèbre mémoire
      *al-Tibyān*), et incorpora Grenade — avec sa dépendance
      Malaga, tenue par son frère Tamīm — dans l'empire
      almoravide. ʿAbd Allāh et Tamīm furent exilés à Aghmat
      au sud de Marrakech, où ʿAbd Allāh écrivit le *Tibyān*,
      seule autobiographie d'un roi andalusi parvenue intégrale
      et document politique andalou à la première personne le
      plus franc de l'époque. L'annexion de Grenade ouvrit la
      grande vague d'absorption almoravide des taifas
      orientales : Yūsuf ibn Tāshufīn avait franchi le détroit
      en 479 H à l'appel d'al-Muʿtamid de Séville et d'autres
      pour repousser Alphonse VI après la chute de Tolède, et
      retournait à présent la même armée contre les souverains
      andalous eux-mêmes. Séville, Almería, Badajoz et Saragosse
      suivraient dans la décennie. Ibn al-Athīr place l'annexion
      sous 483 H ; le *Tibyān* de ʿAbd Allāh en livre un
      témoignage contemporain de première main.
    canonical_hijri: {year: 483, month: 7, precision: month}
    canonical_gregorian: {date: 1090-09-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
