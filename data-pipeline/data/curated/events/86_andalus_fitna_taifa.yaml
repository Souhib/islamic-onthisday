    verification_status: cross_verified

  - slug: death-of-yahya-ibn-ali-hammudi
    category: ruler_death
    title_en: Death of Yaḥyā ibn ʿAlī al-Ḥammūdī — Hammudid Caliph of Cordoba
    title_ar: وفاة يحيى بن علي الحمودي — الخليفة الحمودي بقرطبة
    title_fr: Décès de Yaḥyā ibn ʿAlī al-Ḥammūdī — calife hammudide de Cordoue
    description_en: |
      Yaḥyā ibn ʿAlī ibn Ḥammūd al-Idrīsī, of the Idrīsīd-ʿAlawid
      Hammudid line of Málaga and Algeciras, was killed in
      Muḥarram 427 AH while besieging the Zīrid lord Bādīs ibn
      Ḥabbūs at Carmona. He had been recognised intermittently
      as caliph of al-Andalus during the long Fitna — succeeding
      his father ʿAlī (proclaimed at Cordoba in 407 AH) and his
      uncle al-Qāsim — but his Cordoban authority had collapsed
      and his realm was reduced to Málaga, Algeciras, and the
      Straits. The Hammudids descended from Idrīs II of Fez and
      thus from al-Ḥasan ibn ʿAlī ibn Abī Ṭālib through the
      Idrīsīd line — a sayyid pedigree that legitimised their
      caliphal claim against the Cordoban Umayyads, whom they
      reproached for non-Hashimite descent. Yaḥyā's death ended
      the brief revival of Hammudid claims at Cordoba; the line
      survived only in coastal Málaga until the mid-5th AH
      century, when it was absorbed by the Zīrids of Granada and
      the Almoravids. Ibn al-Athīr places the death in Muḥarram
      427 AH (November 1035 CE); Ibn ʿIdhārī confirms.
    description_ar: |
      قُتل يحيى بن علي بن حمود الإدريسي — من الأدارسة العَلَويين
      الحموديين السادات بمالقة والجزيرة الخضراء — في محرم سنة
      ٤٢٧ هـ وهو يحاصر الزِّيري باديس بن حبُّوس بقرمونة. كان قد
      عُرف خليفةً للأندلس في فترات متقطِّعة خلال الفتنة الطويلة
      — خلفاً لأبيه علي الذي بُويع بقرطبة سنة ٤٠٧ هـ، ولعمِّه
      القاسم — إلا أن سلطته القرطبية كانت قد انهارت وانحصر
      ملكُه في مالقة والجزيرة الخضراء وما يليهما من سواحل
      المضيق. والحموديون من ذريّة إدريس الثاني بفاس، وعن
      الأدارسة من الحسن بن علي بن أبي طالب — نسبٌ سيِّدي شريف
      كان حجَّتَهم الخلافية في وجه أمويي قرطبة الذين عابوا
      عليهم نسبَهم غير الهاشمي. وأنهت وفاتُه الإحياءَ الوجيز
      للدعوى الحمودية بقرطبة، فلم يبقَ من السلالة إلا فرعها
      المالقي إلى منتصف المئة الخامسة، حين ابتلعها الزِّيريون
      بغرناطة ثم المرابطون. ويؤرِّخ ابن الأثير الوفاةَ في محرم
      ٤٢٧ هـ (نوفمبر ١٠٣٥ م)، ويتابعه ابن عذاري.
    description_fr: |
      Yaḥyā ibn ʿAlī ibn Ḥammūd al-Idrīsī, de la lignée
      idrīsīde-ʿalawide hammudide de Malaga et Algésiras, fut
      tué en Muḥarram 427 H alors qu'il assiégeait le seigneur
      zīride Bādīs ibn Ḥabbūs à Carmona. Reconnu par
      intermittence comme calife d'al-Andalus durant la longue
      Fitna — successeur de son père ʿAlī, proclamé à Cordoue en
      407 H, et de son oncle al-Qāsim — son autorité cordouane
      s'était effondrée, son royaume réduit à Malaga, Algésiras
      et le détroit. Les Hammudides descendaient d'Idrīs II de
      Fès, donc d'al-Ḥasan ibn ʿAlī ibn Abī Ṭālib par la lignée
      idrīsīde — pedigree de sayyids qui légitimait leur
      revendication califale contre les Omeyyades de Cordoue,
      auxquels ils reprochaient une ascendance non hāshimite. La
      mort de Yaḥyā mit fin au bref renouveau des prétentions
      hammudides à Cordoue ; la lignée ne survécut que dans la
      Malaga côtière jusqu'au milieu du Ve s. H, quand elle fut
      absorbée par les Zīrides de Grenade et les Almoravides.
      Ibn al-Athīr situe la mort en Muḥarram 427 H (novembre
      1035 EC) ; Ibn ʿIdhārī confirme.
    canonical_hijri: {year: 427, month: 1, precision: month}
    canonical_gregorian: {date: 1035-11-01, precision: month, method: tabular_conversion}
