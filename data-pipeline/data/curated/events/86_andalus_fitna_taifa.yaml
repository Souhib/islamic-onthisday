# Wave 86 of curated event additions (2026-04-27).
# 14 events covering the long arc of the Cordoban Umayyad emirate
# and caliphate, the Fitnat al-Andalus (399-422 AH), and the Taifa
# kings (mulūk al-ṭawāʾif) absorbed by the Almoravids in the 480s
# AH. Spans 180-488 AH / 796-1095 CE.
#
# Already in the dataset and NOT duplicated here:
#   - abd-al-rahman-i-enters-andalus       — events/00 (138 AH)
#   - abd-al-rahman-iii-caliphate          — events/04 (316 AH)
#   - madinat-al-zahra-founding            — events/04 (324 AH)
#   - founding-great-mosque-cordoba        — events/00 (170 AH)
#   - battle-of-zallaqa-sagrajas           — events/04 (479 AH)
#   - fall-of-toledo                       — events/55-region (478 AH)
#
# Sources used (all keys verified in sources.yaml):
#   ibn_athir_kamil, ibn_kathir_bidaya, ibn_khallikan_wafayat,
#   dhahabi_tarikh_islam, dhahabi_siyar, ei2.
#
# Sectarian framing: standard Sunni-historical narrative. The
# Hammudids (Yaḥyā ibn ʿAlī al-Ḥammūdī below) are recorded by the
# classical sources as Idrīsīd-ʿAlawid sayyids; therefore
# is_ahl_al_bayt: true on his people.yaml record. The other Taifa
# kings — ʿĀmirids of Denia, Hūdids of Saragossa, Ṣumādiḥids of
# Almería, ʿAbbādids of Sevilla, Zīrids of Granada — were Berber
# or muwallad, never claimed sayyid descent, and stay false.

events:
  # =========================================================================
  # CORDOBAN UMAYYAD EMIRATE — early consolidation
  # =========================================================================

  - slug: death-of-hisham-i-andalus
    category: ruler_death
    title_en: Death of Hishām I — Second Cordoban Umayyad Emir
    title_ar: وفاة هشام الأول — أمير الأندلس الأموي الثاني
    title_fr: Décès de Hishām Ier — second émir omeyyade de Cordoue
    description_en: |
      Hishām I ibn ʿAbd al-Raḥmān al-Dākhil, second Umayyad emir
      of al-Andalus, died at Cordoba in Ṣafar 180 AH after a
      reign of just under eight years (172-180 AH). He was the
      designated successor of his father ʿAbd al-Raḥmān I, the
      Umayyad refugee who had founded the Cordoban emirate, and
      his short reign secured the dynastic transition: he
      suppressed the revolts of his elder brothers Sulaymān and
      ʿAbd Allāh, prosecuted summer raids (ṣawāʾif) against the
      Frankish marches and the Asturian kingdom, and continued
      construction on the Great Mosque of Cordoba his father had
      begun. The classical sources praise his personal piety and
      Mālikī patronage — he is said to have introduced Mālik's
      Muwaṭṭaʾ as the dominant fiqh reference in al-Andalus. He
      was succeeded by his son al-Ḥakam I. Ibn al-Athīr, Ibn
      ʿIdhārī (via classical chronicle tradition), and later
      al-Dhahabī all place his death in 180 AH (April 796 CE)
      at age forty.
    description_ar: |
      توفي هشام الأول بن عبد الرحمن الداخل، ثاني أمراء بني أمية
      في الأندلس، بقرطبة في صفر سنة ١٨٠ هـ بعد حكم دام نحو ثماني
      سنوات (١٧٢-١٨٠ هـ). كان وليَّ عهد أبيه عبد الرحمن الداخل
      مؤسس الإمارة الأموية بالأندلس، فمكَّنت سنواته القصيرةُ
      الانتقالَ السلالي: قمع ثورتَي أخوَيه سليمان وعبد الله،
      ووجَّه الصوائف نحو الثغور الإفرنجية وأشتورية، وواصل
      البناء في جامع قرطبة الذي بدأه أبوه. وتُثني المصادر على
      ورعه الشخصي ودعمه للمذهب المالكي — يُقال إنه أدخل
      «الموطأ» للإمام مالك مرجعاً فقهياً سائداً في الأندلس.
      وخلفه ابنه الحكم الأول. ويؤرِّخ ابن الأثير، وابن عذاري
      في «البيان المغرب»، والذهبي وفاتَه بسنة ١٨٠ هـ
      (إبريل ٧٩٦ م) عن أربعين سنة.
    description_fr: |
      Hishām Ier ibn ʿAbd al-Raḥmān al-Dākhil, deuxième émir
      omeyyade d'al-Andalus, mourut à Cordoue en Ṣafar 180 H,
      après un règne de près de huit ans (172-180 H). Désigné
      successeur de son père ʿAbd al-Raḥmān Ier — le réfugié
      omeyyade fondateur de l'émirat cordouan — il assura par
      son règne bref la transmission dynastique : il réprima
      les révoltes de ses frères aînés Sulaymān et ʿAbd Allāh,
      conduisit les expéditions estivales (ṣawāʾif) contre les
      marches franques et le royaume des Asturies, et poursuivit
      la construction de la Grande Mosquée de Cordoue que son
      père avait commencée. Les sources classiques louent sa
      piété personnelle et son soutien au mālikisme — on lui
      attribue l'introduction du *Muwaṭṭaʾ* de Mālik comme
      référence fiqhique dominante en al-Andalus. Son fils
      al-Ḥakam Ier lui succéda. Ibn al-Athīr, Ibn ʿIdhārī
      (via la tradition chronique classique) et plus tard
      al-Dhahabī fixent sa mort en 180 H (avril 796 EC), à
      quarante ans.
    canonical_hijri: {year: 180, month: 2, precision: month}
    canonical_gregorian: {date: 796-04-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the death of Hishām I, emir of al-Andalus, under the events of 180 AH and notes the succession of his son al-Ḥakam."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records Hishām ibn ʿAbd al-Raḥmān al-Dākhil's death in 180 AH at Cordoba."
      - source_key: ei2
        notes: "EI² entry 'Hishām I' confirms the death date 180 AH / 796 CE and the eight-year reign over al-Andalus."
    people: [[hisham-i-andalus, died]]
    tags: [andalus, umayyad_andalus, cordoba, ruler, emirate]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # 9th-CENTURY ANDALUS — the long Ibn Ḥafṣūn revolt
  # =========================================================================

  - slug: bobastro-revolt-ibn-hafsun
    category: political_event
    title_en: Outbreak of the Bobastro Revolt of ʿUmar ibn Ḥafṣūn
    title_ar: انطلاق ثورة بُبَشتر بقيادة عمر بن حفصون
    title_fr: Déclenchement de la révolte de Bobastro d'ʿUmar ibn Ḥafṣūn
    description_en: |
      Around 267 AH (880 CE) ʿUmar ibn Ḥafṣūn, a *muwallad*
      (Hispano-Romance Muslim) chieftain of the Rondan
      mountains, raised the standard of revolt against the
      Cordoban Umayyad emir Muḥammad I from his stronghold at
      Bobastro (Arabic *Bubashtar*) in the Serranía de Ronda
      west of Málaga. His rebellion, fuelled by the resentment
      of the Iberian-convert and Christian Iberian populations
      against Arab-aristocratic rule and tax pressure, would
      consume the south-western quadrant of al-Andalus for
      nearly forty years and survive his death; his sons held
      Bobastro until ʿAbd al-Raḥmān III stormed and razed it in
      305 AH (917-918 CE). Late in his career Ibn Ḥafṣūn
      apostatised back to Christianity (a fact later disinterred
      and used by ʿAbd al-Raḥmān III as propaganda after the
      fall of Bobastro), shrinking his political base. The
      classical Andalusi chronicles preserved by Ibn al-Athīr
      give the year 267 AH for the formal outbreak of the
      revolt, though the figure of Ibn Ḥafṣūn appears in the
      sources from the previous decade as a brigand chief; we
      record the year-precise date and note the long duration
      to 305 AH in the description rather than fabricating a
      day.
    description_ar: |
      نحو سنة ٢٦٧ هـ (٨٨٠ م) رفع عمر بن حفصون — وهو زعيم
      مولَّد (مسلم من أصل إسباني-روماني) من جبال رُنْدَة —
      رايةَ الثورة على الأمير الأموي محمد الأول بقرطبة من حصنه
      المعروف بِبَشْتَر (Bobastro) في سييرّا دي رُنْدَة غربيَّ
      مالقة. وكانت ثورته — التي غذَّاها سخطُ السكان من المسلمين
      الجدد والنصارى الإيبيريين على الهيمنة العربية والثقل
      الجبائي — تستهلك الربعَ الجنوبي الغربي من الأندلس قرابة
      أربعين سنة، وتجاوزت وفاته بأعوام، إذ ظل أبناؤه قابضين
      على ببشتر حتى اقتحمها عبد الرحمن الناصر وهدمها سنة ٣٠٥
      هـ (٩١٧-٩١٨ م). وفي أواخر حياته ارتدَّ ابن حفصون إلى
      النصرانية — حقيقةٌ نُبشت لاحقاً واستخدمها الناصر
      للدعاية بعد سقوط ببشتر — فضاق عليه نطاقُ الولاء.
      وأثبت ابنُ الأثير في حوادث ٢٦٧ هـ بدايةَ الثورة الرسمية،
      وإن كان اسم ابن حفصون يرد قبل ذلك بعقد قاطعَ طريق
      وزعيمَ شغب؛ فأثبتنا التاريخ بدقة السنة، ونصصنا على طول
      أمدها إلى ٣٠٥ هـ في الوصف، تفادياً لاختلاق دقة لا
      تثبتها المصادر.
    description_fr: |
      Vers 267 H (880 EC), ʿUmar ibn Ḥafṣūn — chef *muwallad*
      (musulman d'origine ibéro-romane) des montagnes de Ronda —
      leva l'étendard de la révolte contre l'émir omeyyade de
      Cordoue Muḥammad Ier depuis sa forteresse de Bobastro
      (arabe *Bubashtar*) dans la Serranía de Ronda à l'ouest
      de Malaga. Sa rébellion — alimentée par le ressentiment
      des populations néo-converties et des chrétiens ibériques
      contre la domination aristocratique arabe et la pression
      fiscale — engloutit le quart sud-ouest d'al-Andalus durant
      près de quarante ans et survécut à sa mort : ses fils
      tinrent Bobastro jusqu'à ce que ʿAbd al-Raḥmān III prît
      la place d'assaut et la rasât en 305 H (917-918 EC). À la
      fin de sa vie, Ibn Ḥafṣūn apostasia en revenant au
      christianisme — fait exhumé plus tard et exploité par
      ʿAbd al-Raḥmān III à des fins de propagande après la chute
      de Bobastro — ce qui amenuisa son assise politique. Les
      chroniques andalouses conservées par Ibn al-Athīr donnent
      l'année 267 H pour le déclenchement formel de la révolte,
      bien que la figure d'Ibn Ḥafṣūn apparaisse dans les sources
      dès la décennie précédente comme chef de bande ; nous
      retenons donc la précision à l'année et signalons la longue
      durée jusqu'en 305 H dans la description, plutôt que de
      fabriquer un jour.
    canonical_hijri: {year: 267, precision: year}
    canonical_gregorian: {date: 880-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the rise of ʿUmar ibn Ḥafṣūn at Bobastro under the events of 267 AH and follows the revolt's career through to its destruction at 305 AH."
      - source_key: ei2
        notes: "EI² entry 'Ibn Ḥafṣūn' fixes the formal outbreak of the Bobastro revolt c. 267 AH / 880 CE; year-precision only — the day is not attested classically."
    people: [[ibn-hafsun, leader]]
    tags: [andalus, cordoba, emirate, revolt, muwallad, bobastro, ronda]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # CALIPHATE OF CORDOBA — al-Nāṣir's defeat at Simancas / Wādī Salīṭ
  # =========================================================================

  - slug: battle-of-wadi-salit-simancas
    category: battle
    title_en: Battle of Wādī Salīṭ (Simancas) — al-Nāṣir Defeated by Ramiro II
    title_ar: معركة وادي سَلِيط — هزيمة الناصر أمام راميرو الثاني
    title_fr: Bataille de Wādī Salīṭ (Simancas) — al-Nāṣir défait par Ramire II
    description_en: |
      In Shawwāl 327 AH (July-August 939 CE) the Cordoban
      caliph ʿAbd al-Raḥmān III al-Nāṣir suffered the most
      severe military defeat of his long reign at the hands of
      Ramiro II, king of León, near the Tagus tributary the
      Arabs called *Wādī Salīṭ* — the engagement is known in
      the Latin sources as the Battle of Simancas–Alhandega.
      Al-Nāṣir had marched north with a large caliphal army to
      punish León and its allies; Ramiro intercepted him in the
      Duero valley and routed the Andalusi force with heavy
      losses, including most of the caliph's personal guard
      regiment, while al-Nāṣir himself escaped only by
      abandoning his standards and his Qurʾān-stand on the
      field. The defeat shocked Cordoba — it ended al-Nāṣir's
      personal command of the army for the rest of his reign
      (he never led a campaign in the north again) and
      contributed to the long lull on the northern frontier
      until al-Manṣūr's resumption of the *jihād* sixty years
      later. Ibn al-Athīr enters the disaster under 327 AH;
      Ibn Kathīr's Bidāya confirms the year and the caliph's
      flight.
    description_ar: |
      في شوال سنة ٣٢٧ هـ (يوليو-أغسطس ٩٣٩ م) لقي الخليفةُ
      الأموي بقرطبة عبد الرحمن الناصر أنكبَ هزيمة عسكرية في
      حكمه الطويل على يد راميرو الثاني ملك ليون قرب رافدٍ من
      روافد التاجُه يسمِّيه العرب «وادي سَلِيط» — وتعرف المعركة
      في المصادر اللاتينية بمعركة سَيْمَنْكَس-الخندق
      (Simancas-Alhandega). كان الناصر قد سار شمالاً بجيش كبير
      ليؤدِّب ليون وحلفاءها؛ فاعترضه راميرو في وادي الدويرة
      ومزَّق الجيشَ الأندلسي بخسائر جسيمة، شملت جلَّ كتيبة
      الحرس الخليفي، ولم ينجُ الناصر إلا بأن ترك راياته ومصحفَه
      في ساحة المعركة. صدمت الهزيمةُ قرطبة، فكانت آخرَ معركة
      يقودها الناصر بنفسه — لم يخرج بعدها إلى ثغر أبداً —
      وأفضت إلى ركودٍ في الجبهة الشمالية امتدَّ ستين سنة حتى
      أعاد المنصور بن أبي عامر استئنافَ الجهاد. ويثبت ابنُ
      الأثير الكارثة في حوادث ٣٢٧ هـ، ويؤكِّد ابن كثير في
      «البداية والنهاية» السنةَ وفرارَ الخليفة.
    description_fr: |
      En Shawwāl 327 H (juillet-août 939 EC), le calife omeyyade
      de Cordoue ʿAbd al-Raḥmān III al-Nāṣir subit la plus rude
      défaite militaire de son long règne face à Ramire II, roi
      de León, près d'un affluent du Tage que les Arabes
      appelaient *Wādī Salīṭ* — la bataille est connue dans les
      sources latines sous le nom de Simancas-Alhandega. Al-Nāṣir
      avait marché vers le nord à la tête d'une grande armée
      califale pour châtier León et ses alliés ; Ramire
      l'intercepta dans la vallée du Douro et tailla en pièces
      la force andalouse avec de lourdes pertes — dont la
      majeure partie de la garde personnelle du calife — tandis
      qu'al-Nāṣir lui-même n'échappa qu'en abandonnant ses
      étendards et son Coran sur le champ de bataille. Le choc à
      Cordoue mit fin au commandement personnel du calife pour
      le reste de son règne (il ne mena plus jamais de campagne
      au nord) et contribua à la longue accalmie sur la frontière
      septentrionale jusqu'à la reprise du *jihād* par al-Manṣūr
      soixante ans plus tard. Ibn al-Athīr inscrit le désastre
      sous 327 H ; Ibn Kathīr dans la *Bidāya* confirme l'année
      et la fuite du calife.
    canonical_hijri: {year: 327, month: 10, precision: month}
    canonical_gregorian: {date: 939-08-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the defeat of ʿAbd al-Raḥmān III at Wādī Salīṭ under 327 AH and notes the loss of standards and personal items."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr's al-Bidāya wa-l-Nihāya confirms the disaster of 327 AH and the caliph's narrow escape."
      - source_key: ei2
        notes: "EI² entry 'Simancas' / 'al-Khandaq' identifies the engagement with the Latin Simancas-Alhandega and confirms 327 AH / 939 CE."
    people: [[abd-al-rahman-iii-andalus, leader]]
    tags: [andalus, cordoba, caliphate, battle, leon, reconquista, defeat]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # CALIPHATE OF CORDOBA — death of al-Ḥakam II al-Mustanṣir
  # =========================================================================

  - slug: death-of-al-hakam-ii-mustansir
    category: ruler_death
    title_en: Death of al-Ḥakam II al-Mustanṣir — Last Effective Cordoban Caliph
    title_ar: وفاة الحكم الثاني المستنصر — آخر خليفة قرطبي مؤثر
    title_fr: Décès d'al-Ḥakam II al-Mustanṣir — dernier calife cordouan effectif
    description_en: |
      Al-Ḥakam II al-Mustanṣir bi-Allāh, second Umayyad caliph
      of Cordoba and son of ʿAbd al-Raḥmān III al-Nāṣir, died at
      Cordoba in Ṣafar 366 AH after a fifteen-year reign
      (350-366 AH). His was the high noon of caliphal Cordoba:
      he completed his father's expansion of the Great Mosque
      with the celebrated mihrab and maqṣūra, and assembled in
      Madīnat al-Zahrāʾ a library said by the chronicles to
      contain four hundred thousand volumes — the most
      comprehensive Arabic library of its century, with agents
      buying manuscripts from Egypt, Iraq, and Khurasan. His
      reign is also the one in which the chamberlain Muḥammad
      ibn Abī ʿĀmir, the future al-Manṣūr, first rose to high
      office. He was succeeded — in form — by his under-aged son
      Hishām II al-Muʾayyad, but in substance by Ibn Abī ʿĀmir,
      who within four years would reduce the boy-caliph to a
      ceremonial figurehead. Ibn al-Athīr, Ibn Khallikān, and
      al-Dhahabī all place the death in Ṣafar 366 AH (October
      976 CE).
    description_ar: |
      توفي الحكم الثاني المستنصر بالله، ثاني خلفاء الأمويين
      بقرطبة وابن عبد الرحمن الناصر، بقرطبة في صفر سنة ٣٦٦ هـ
      بعد حكم استمر خمس عشرة سنة (٣٥٠-٣٦٦ هـ). كان عهده ذُروةَ
      خلافة قرطبة: أتمَّ توسعةَ أبيه لجامع قرطبة بالمحراب
      والمقصورة المشهورَين، وجمع في مدينة الزهراء مكتبةً تذكر
      المصادرُ أنها بلغت أربعمئة ألف مجلد — أعظم مكتبة عربية
      في قرنها — يجوب وكلاؤه مصرَ والعراقَ وخراسانَ شراءً
      للمخطوطات. وفي عهده أيضاً ارتقى الحاجبُ محمد بن أبي
      عامر — المنصورُ في قابل أيامه — إلى كبار المناصب. وخلفه
      شكلاً ابنُه الصغير هشام الثاني المؤيد، أما حقيقةً فابنُ
      أبي عامر، الذي حوَّل الخليفةَ الفتى في غضون أربع سنوات
      إلى رمز شرفي. ويتفق ابنُ الأثير وابنُ خلكان والذهبي
      على وفاته في صفر سنة ٣٦٦ هـ (أكتوبر ٩٧٦ م).
    description_fr: |
      Al-Ḥakam II al-Mustanṣir bi-Allāh, deuxième calife omeyyade
      de Cordoue et fils de ʿAbd al-Raḥmān III al-Nāṣir, mourut
      à Cordoue en Ṣafar 366 H, après un règne de quinze ans
      (350-366 H). Son règne fut l'apogée de la Cordoue
      califale : il acheva l'agrandissement paternel de la
      Grande Mosquée par le célèbre mihrab et la maqṣūra, et
      réunit à Madīnat al-Zahrāʾ une bibliothèque que les
      chroniques disent forte de quatre cent mille volumes — la
      plus vaste bibliothèque arabe de son siècle — ses agents
      achetant des manuscrits en Égypte, en Irak et au Khurasan.
      C'est aussi sous son règne que le chambellan Muḥammad ibn
      Abī ʿĀmir, futur al-Manṣūr, accéda aux hautes charges. Il
      eut pour successeur, en la forme, son fils mineur Hishām II
      al-Muʾayyad, mais en réalité Ibn Abī ʿĀmir, qui en quatre
      ans réduirait le calife enfant à une pure figure
      d'apparat. Ibn al-Athīr, Ibn Khallikān et al-Dhahabī
      situent la mort en Ṣafar 366 H (octobre 976 EC).
    canonical_hijri: {year: 366, month: 2, precision: month}
    canonical_gregorian: {date: 976-10-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the death of al-Ḥakam al-Mustanṣir under the events of 366 AH and the succession of Hishām II."
      - source_key: ibn_khallikan_wafayat
