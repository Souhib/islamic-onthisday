  - slug: death-of-mujahid-al-amiri-denia
    category: ruler_death
    title_en: Death of Mujāhid al-ʿĀmirī — Taifa King of Denia and the Balearics
    title_ar: وفاة مجاهد العامري — ملك طائفة دانية والبليار
    title_fr: Décès de Mujāhid al-ʿĀmirī — roi de taifa de Denia et des Baléares
    description_en: |
      Mujāhid ibn ʿAbd Allāh al-ʿĀmirī al-Muwaffaq, freedman and
      protégé of the ʿĀmirid house of al-Manṣūr, founder of the
      taifa of Denia and the Balearic Islands, died at Denia in
      Shaʿbān 436 AH after a reign of more than three decades
      (c. 405-436 AH). His was the only Andalusi taifa with a
      sea-borne policy: in 405-406 AH (1014-1015 CE) his fleet
      occupied Sardinia for several months and pressed
      operations against the Italian maritime republics — Pisa
      and Genoa — until a counter-strike by their joint armada
      forced him to evacuate the island. He kept the Balearics
      throughout his reign and made Denia a centre of
      *qirāʾāt* and Arabic philological scholarship: it was
      under his and his son ʿAlī Iqbāl al-Dawla's patronage that
      the great Andalusi grammarian Abū ʿAmr al-Dānī flourished.
      He was succeeded by his son ʿAlī Iqbāl al-Dawla, under
      whom Denia was annexed by Saragossa in 468 AH. Ibn
      al-Athīr fixes Mujāhid's death in 436 AH; al-Dhahabī
      confirms.
    description_ar: |
      توفي مجاهد بن عبد الله العامري الموفَّق — مولى آل المنصور
      العامرية ومؤسس طائفة دانية وجزائر البليار — بدانية في
      شعبان سنة ٤٣٦ هـ بعد حكم تجاوز ثلاثة عقود (نحو
      ٤٠٥-٤٣٦ هـ). كانت طائفتُه الوحيدةَ في الأندلس ذاتَ
      السياسة البحرية: ففي ٤٠٥-٤٠٦ هـ (١٠١٤-١٠١٥ م) احتلَّ
      أسطولُه جزيرةَ سَرْدانية أشهراً عدةً، وضايق جمهوريات
      البحر الإيطالية — بِيزَا وجِنْوَا — حتى أرغمه أسطولُهما
      المشترك على الانسحاب. أبقى البليار طوال عهده، وجعل
      دانية مركزاً للقراءات والعلوم العربية: ففي رعايته ورعاية
      ابنه علي إقبال الدولة ازدهر الإمام أبو عمرو الداني،
      شيخُ القراء الأندلسي. وخلفه ابنه علي إقبال الدولة، وفي
      عهده ضمَّ المقتدر بنُ هود السرقسطي دانيةَ سنة ٤٦٨ هـ.
      ويؤرخ ابن الأثير وفاةَ مجاهد بسنة ٤٣٦ هـ، ويوافقه
      الذهبي.
    description_fr: |
      Mujāhid ibn ʿAbd Allāh al-ʿĀmirī al-Muwaffaq, affranchi et
      protégé de la maison ʿāmiride d'al-Manṣūr, fondateur de la
      taifa de Denia et des îles Baléares, mourut à Denia en
      Shaʿbān 436 H, après un règne de plus de trois décennies
      (vers 405-436 H). Sa taifa fut la seule d'al-Andalus à
      mener une politique maritime : en 405-406 H (1014-1015
      EC), sa flotte occupa la Sardaigne pendant plusieurs mois
      et harcela les républiques maritimes italiennes — Pise et
      Gênes — jusqu'à ce qu'une contre-offensive de leur armada
      conjointe l'obligeât à évacuer l'île. Il conserva les
      Baléares tout son règne et fit de Denia un centre de
      *qirāʾāt* et de philologie arabe : c'est sous son
      patronage et celui de son fils ʿAlī Iqbāl al-Dawla que
      s'épanouit le grand grammairien andalou Abū ʿAmr al-Dānī.
      Son fils ʿAlī Iqbāl al-Dawla lui succéda ; Denia serait
      annexée par Saragosse en 468 H sous son règne. Ibn al-Athīr
      fixe la mort de Mujāhid en 436 H ; al-Dhahabī confirme.
    canonical_hijri: {year: 436, month: 8, precision: month}
    canonical_gregorian: {date: 1045-02-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the death of Mujāhid al-ʿĀmirī, ruler of Denia and the Balearics, under the events of 436 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records 436 AH for Mujāhid's death and his Sardinia expedition."
      - source_key: ei2
        notes: "EI² entry 'Mudjāhid al-ʿĀmirī' confirms 436 AH / 1045 CE for the death and the unique maritime character of the Denian taifa."
    people: [[mujahid-al-amiri, died]]
    tags: [andalus, taifa, denia, balearics, sardinia, amirid_freedman, qiraat]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-yusuf-al-mutaman-ibn-hud
    category: ruler_death
    title_en: Death of Yūsuf al-Muʾtaman ibn Hūd — Mathematician-King of Saragossa
    title_ar: وفاة يوسف المؤتمن بن هود — الملك الرياضي بسرقسطة
    title_fr: Décès de Yūsuf al-Muʾtaman ibn Hūd — roi-mathématicien de Saragosse
    description_en: |
      Al-Muʾtaman bi-Allāh, Yūsuf ibn Aḥmad ibn Hūd al-Judhāmī,
      third Hūdid king of the taifa of Saragossa (the *Banū
      Hūd*), died at Saragossa in Rajab 478 AH after a reign of
      five years (474-478 AH). He was a working mathematician
      of considerable rank as well as a king: his *Kitāb
      al-Istikmāl* (*Book of Perfection*), an unfinished
      compendium of pure mathematics in the tradition of Euclid,
      Apollonius, and Archimedes, contains the earliest known
      statement of what is today named *Ceva's theorem* (after
      its 17th-century European rediscoverer) and the earliest
      proof of the *theorem of Ibn Hūd* on the trihedral angle.
      The book circulated widely in 12th-century Egypt — Ibn
      Sabʿīn and the Maimonides circle in Cairo cite it — but
      his political reign was short and dominated by the rising
      Christian threat: Alfonso VI was already pressing Toledo,
      which would fall the very year of al-Muʾtaman's death.
      His son al-Mustaʿīn II succeeded him. Ibn al-Athīr places
      his death in 478 AH; al-Dhahabī and EI² confirm.
    description_ar: |
      توفي المؤتمن بالله يوسف بن أحمد بن هود الجذامي — ثالث
      ملوك بني هود طائفةِ سرقسطة — بسرقسطة في رجب سنة ٤٧٨ هـ
      بعد حكم خمس سنوات (٤٧٤-٤٧٨ هـ). كان رياضياً محقِّقاً من
      الطبقة الأولى إلى جانب ملكه: ألَّف *كتاب الاستكمال* —
      موسوعةً غير مكتملة في الرياضيات النظرية على طريقة
      إقليدس وأبولونيوس وأرخميدس — وفيه أقدم نصٍّ معروف
      لما يعرف اليوم بـ«مبرهنة شيفا» (نسبةً إلى مكتشفها
      الأوروبي في القرن السابع عشر)، وأقدم برهان على «مبرهنة
      ابن هود» في الزاوية الثلاثية الأوجه. وقد انتشر الكتاب
      في مصر القرن السادس الهجري — يستشهد به ابن سبعين
      ودائرة موسى بن ميمون بالقاهرة — أما عهده السياسي فكان
      قصيراً يطغى عليه التهديد النصراني الصاعد: كان ألفونسو
      السادس قد ضيَّق على طُلَيطِلَة، وستسقط في السنة نفسها
      التي مات فيها المؤتمن. وخلفه ابنُه المستعين الثاني.
      يؤرِّخ ابن الأثير وفاتَه بسنة ٤٧٨ هـ، ويوافقه الذهبي
      وموسوعة EI².
    description_fr: |
      Al-Muʾtaman bi-Allāh, Yūsuf ibn Aḥmad ibn Hūd al-Judhāmī,
      troisième roi hūdide de la taifa de Saragosse (les *Banū
      Hūd*), mourut à Saragosse en Rajab 478 H, après un règne
      de cinq ans (474-478 H). Il était un mathématicien actif
      de premier rang autant qu'un roi : son *Kitāb al-Istikmāl*
      (*Livre de la perfection*), abrégé inachevé de
      mathématiques pures dans la tradition d'Euclide,
      d'Apollonius et d'Archimède, contient la plus ancienne
      formulation connue de ce qu'on appelle aujourd'hui
      *théorème de Ceva* (du nom de son redécouvreur européen
      au XVIIe siècle) et la première démonstration du
      *théorème d'Ibn Hūd* sur l'angle trièdre. L'ouvrage
      circula largement dans l'Égypte du XIIe siècle — Ibn
      Sabʿīn et le cercle de Maïmonide au Caire le citent —
      mais son règne politique fut bref et dominé par la menace
      chrétienne montante : Alphonse VI pressait déjà Tolède,
      qui tomberait l'année même de la mort d'al-Muʾtaman. Son
      fils al-Mustaʿīn II lui succéda. Ibn al-Athīr place sa
      mort en 478 H ; al-Dhahabī et EI² confirment.
    canonical_hijri: {year: 478, month: 7, precision: month}
    canonical_gregorian: {date: 1085-11-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the death of al-Muʾtaman ibn Hūd of Saragossa under the events of 478 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms 478 AH for Yūsuf al-Muʾtaman's death and the succession of his son al-Mustaʿīn."
      - source_key: ei2
        notes: "EI² entry 'Hūdids' confirms 478 AH / 1085 CE for al-Muʾtaman and notes his Kitāb al-Istikmāl as a major Andalusi mathematical compendium."
    people: [[yusuf-al-mutaman-ibn-hud, died]]
    tags: [andalus, taifa, saragossa, hudid, mathematics, scholar_king, banu_hud]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-mutasim-ibn-sumadih-almeria
    category: ruler_death
    title_en: Death of al-Muʿtaṣim ibn Ṣumādiḥ — Taifa King of Almería
    title_ar: وفاة المعتصم بن صمادح — ملك طائفة المرية
    title_fr: Décès d'al-Muʿtaṣim ibn Ṣumādiḥ — roi de taifa d'Almería
    description_en: |
      Muḥammad ibn Maʿn ibn Ṣumādiḥ al-Muʿtaṣim bi-Allāh,
      second of the Banū Ṣumādiḥ kings of the taifa of Almería,
      died at Almería in Rabīʿ II 484 AH after a reign of more
      than thirty years (443-484 AH). His court at the
      *al-Ṣumādiḥiyya* citadel was one of the most refined
      cultural centres of the Taifa age — patron of the poet
      Ibn al-Ḥaddād, the philosopher-poet Ibn al-ʿArīf, and
      others — and the city, the principal Andalusi port for the
      eastern Mediterranean trade, prospered under his rule.
      Politically, he kept Almería out of direct conflict with
      the Almoravids by paying tribute and avoiding the formal
      *istinjād* (call for help) that brought Yūsuf ibn Tāshufīn
      across the Straits — but his lands were in any case
      annexed by the Almoravids only weeks after his death,
      under his son and successor Muḥammad al-Muʿizz. Ibn
      al-Athīr places the death in 484 AH; Ibn ʿIdhārī confirms
      and connects it directly to the Almoravid annexation of
      Almería that immediately followed.
    description_ar: |
      توفي محمد بن معن بن صمادح المعتصم بالله — ثاني ملوك بني
      صمادح طائفةِ المرية — بالمرية في ربيع الآخر سنة ٤٨٤ هـ
      بعد حكم تجاوز ثلاثين سنة (٤٤٣-٤٨٤ هـ). كان بلاطُه في
      قصبة الصمادحية من أرفع المراكز الثقافية في عصر الطوائف
      — راعى الشاعر ابن الحدَّاد، والشاعرَ الفيلسوف ابنَ
      العريف، وغيرَهما — وازدهرت في عهده المريةُ، الميناءُ
      الأندلسي الرئيس على ضفة المتوسط الشرقية. وأبعد سياسياً
      مدينتَه عن صدام مباشر مع المرابطين بدفع الإتاوة، ولم
      ينضمَّ رسمياً إلى استنجاد ابن عبَّاد ليوسف بن تاشفين عبر
      المضيق؛ على أن المرابطين ضمُّوا بلادَه بعد وفاته بأسابيع
      في عهد ابنه محمد المعزِّ. ويؤرِّخ ابن الأثير الوفاةَ في
      ٤٨٤ هـ، ويوافقه ابن عذاري ويربط الوفاةَ مباشرةً بالضمِّ
      المرابطي للمَرية.
    description_fr: |
      Muḥammad ibn Maʿn ibn Ṣumādiḥ al-Muʿtaṣim bi-Allāh,
      deuxième roi des Banū Ṣumādiḥ de la taifa d'Almería,
      mourut à Almería en Rabīʿ II 484 H, après un règne de
      plus de trente ans (443-484 H). Sa cour, à la citadelle
      *al-Ṣumādiḥiyya*, fut l'un des centres culturels les plus
      raffinés de l'âge des taifas — protectrice du poète Ibn
      al-Ḥaddād, du poète-philosophe Ibn al-ʿArīf, et d'autres —
      et la ville, principal port andalusi pour le commerce
      avec la Méditerranée orientale, prospéra sous son règne.
      Politiquement, il tint Almería hors d'un affrontement
      direct avec les Almoravides en payant tribut et en
      n'entrant pas formellement dans l'*istinjād* qui avait
      fait passer Yūsuf ibn Tāshufīn par le détroit — mais ses
      terres furent de toute façon annexées par les Almoravides
      quelques semaines seulement après sa mort, sous son fils
      et successeur Muḥammad al-Muʿizz. Ibn al-Athīr situe la
      mort en 484 H ; Ibn ʿIdhārī confirme et la rattache
      directement à l'annexion almoravide d'Almería qui suivit
      immédiatement.
    canonical_hijri: {year: 484, month: 4, precision: month}
    canonical_gregorian: {date: 1091-06-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's al-Kāmil enters the death of al-Muʿtaṣim ibn Ṣumādiḥ of Almería under the events of 484 AH and the immediate Almoravid annexation."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām records 484 AH for the death of al-Muʿtaṣim and the succession of his son al-Muʿizz."
      - source_key: ei2
        notes: "EI² entry 'Ṣumādiḥids' confirms 484 AH / 1091 CE for al-Muʿtaṣim's death."
    people: [[al-mutasim-ibn-sumadih, died]]
    tags: [andalus, taifa, almeria, sumadihids, port, patronage]
