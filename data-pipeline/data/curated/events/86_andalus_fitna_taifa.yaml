  - slug: almoravid-annexation-of-sevilla
    category: conquest
    title_en: Almoravid Annexation of Sevilla — End of the ʿAbbādid Taifa
    title_ar: ضمُّ المرابطين لإشبيلية — نهاية طائفة بني عبَّاد
    title_fr: Annexion almoravide de Séville — fin de la taifa abbadide
    description_en: |
      In Rajab 484 AH an Almoravid army under Sīr ibn Abī Bakr
      al-Lamtūnī, on the orders of Yūsuf ibn Tāshufīn, took
      Sevilla after a siege and deposed Muḥammad al-Muʿtamid
      ibn ʿAbbād, the third and last ʿAbbādid king. Al-Muʿtamid
      had been the chief Andalusi sponsor of the Almoravid
      crossing five years earlier (the *istinjād* of 479 AH
      that culminated at al-Zallāqa); the Almoravid annexation
      of his own kingdom — together with his cousin's at
      Cordoba and the broader takeover of Almería, Badajoz,
      and the south — completed Yūsuf ibn Tāshufīn's reduction
      of the Andalusi taifas. Al-Muʿtamid was led away in
      chains to Aghmat south of Marrakesh, where he would die
      four years later (488 AH) after writing some of the most
      moving Arabic verse of exile in the tradition. Ibn
      al-Athīr enters the fall of Sevilla under 484 AH; Ibn
      Khallikān's Wafayāt records the deposition and exile in
      his entry on al-Muʿtamid; EI² confirms.
    description_ar: |
      في رجب سنة ٤٨٤ هـ افتتح جيشٌ مرابطي بقيادة سير بن أبي
      بكر اللمتوني — بأمر يوسف بن تاشفين — إشبيليةَ بعد حصار،
      وخلع محمد المعتمد بن عبَّاد ثالثَ ملوك بني عبَّاد
      وآخرَهم. كان المعتمد قد قاد استنجاد الأندلسيين بالمرابطين
      قبل خمس سنين (استنجاد ٤٧٩ هـ المتوِّج بالزَّلاقة)؛ فجاء
      ضمُّ مملكته — وإلى جانبها قرطبة وعمومُ المرية وبَطَلْيَوْس
      والجنوب — ليكمل اختزال يوسف بن تاشفين للطوائف الأندلسية.
      وسيق المعتمدُ مكبَّلاً إلى أَغْمَات جنوبَ مراكش، فمات
      هناك بعد أربع سنين (٤٨٨ هـ) بعد أن نظم في غربته من
      أعظم شعر العربية في الحنين. يثبت ابن الأثير سقوطَ إشبيلية
      في ٤٨٤ هـ، ويسرد ابن خلكان في «وفيات الأعيان» ترجمةَ
      المعتمد الخلعَ والمنفى، وتؤكد EI².
    description_fr: |
      En Rajab 484 H, une armée almoravide commandée par Sīr ibn
      Abī Bakr al-Lamtūnī, sur ordre de Yūsuf ibn Tāshufīn,
      prit Séville après siège et déposa Muḥammad al-Muʿtamid
      ibn ʿAbbād, troisième et dernier roi ʿabbādide.
      Al-Muʿtamid avait été le principal parrain andalusi de la
      traversée almoravide cinq ans plus tôt (l'*istinjād* de
      479 H qui culmina à al-Zallāqa) ; l'annexion de son
      propre royaume — jointe à celle de Cordoue et à la prise
      générale d'Almería, de Badajoz et du sud — acheva la
      réduction par Yūsuf ibn Tāshufīn des taifas andalouses.
      Al-Muʿtamid fut emmené enchaîné à Aghmat au sud de
      Marrakech, où il devait mourir quatre ans plus tard
      (488 H) après y avoir composé certains des plus
      poignants vers d'exil de toute la tradition arabe. Ibn
      al-Athīr inscrit la chute de Séville sous 484 H ; le
      *Wafayāt* d'Ibn Khallikān rapporte la déposition et
      l'exil dans sa notice d'al-Muʿtamid ; EI² confirme.
