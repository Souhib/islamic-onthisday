  - slug: death-of-ibn-al-quff
    category: scholar_death
    title_en: Death of Ibn al-Quff — Mamlūk Surgeon and Author of *al-ʿUmda*
    title_ar: وفاة ابن القف — جراح المماليك ومؤلف «العمدة في صناعة الجراحة»
    title_fr: Mort d'Ibn al-Quff — chirurgien mamelouk, auteur d'*al-ʿUmda*
    description_en: |
      Amīn al-Dawla Abū al-Faraj ibn Yaʿqūb ibn Isḥāq ibn al-Quff
      al-Karakī — Eastern Christian Arab physician and surgeon
      from al-Karak in Transjordan, military physician at the
      citadels of ʿAjlūn and Damascus under the Mamlūk sultans
      Baybars and Qalāwūn, student of the philosopher-historian
      Ibn Abī Uṣaybiʿa — died at Damascus on 5 Jumādā al-Awwal
      685 AH (30 June 1286 CE) at the age of forty-six. His
      twenty-volume *Kitāb al-ʿUmda fī Ṣināʿat al-Jirāḥa* (the
      *Pillar* on Surgery) is the most systematic Arabic
      surgical treatise after al-Zahrāwī's *Taṣrīf*; volumes 19-20
      contain a systematic Arabic exposition of capillary
      circulation between arteries and veins independent of his
      contemporary Ibn al-Nafīs. Ibn Abī Uṣaybiʿa, his teacher
      and biographer, gives the day-precise date.
    description_ar: |
      توفي أمين الدولة أبو الفرج بن يعقوب بن إسحاق بن القف
      الكركي — طبيب وجرّاح نصراني عربي من الكرك بشرقي الأردن،
      طبيب الحاميتين العسكريتين بقلعة عجلون ثم بقلعة دمشق في
      عهد السلطانين المملوكيين بيبرس وقلاوون، تلميذ الفيلسوف
      المؤرخ ابن أبي أصيبعة — بدمشق يوم ٥ جمادى الأولى ٦٨٥ هـ
      (الموافق ٣٠ يونيو ١٢٨٦ ميلادي) عن ست وأربعين سنة. كتابه
      «العمدة في صناعة الجراحة» في عشرين مجلداً أوسع تأليف
      عربي منهجي في الجراحة بعد «التصريف» للزهراوي؛ يحوي
      المجلدان ١٩ و٢٠ منه عرضاً منهجيّاً للدورة الشَّعرية بين
      الشرايين والأوردة، انتهى إليه استقلالاً عن معاصره ابن
      النفيس. وقد ضبط أستاذه وصاحب ترجمته ابن أبي أصيبعة اليوم
      بدقة.
    description_fr: |
      Amīn al-Dawla Abū al-Faraj ibn Yaʿqūb ibn Isḥāq ibn
      al-Quff al-Karakī — médecin et chirurgien chrétien arabe
      d'al-Karak en Transjordanie, médecin militaire des
      citadelles de ʿAjlūn puis de Damas sous les sultans
      mamelouks Baybars et Qalāwūn, élève du philosophe-historien
      Ibn Abī Uṣaybiʿa — mourut à Damas le 5 Jumādā al-Awwal
      685 H (30 juin 1286 EC) à l'âge de quarante-six ans.
      Son *Kitāb al-ʿUmda fī Ṣināʿat al-Jirāḥa* (le *Pilier*
      sur la chirurgie) en vingt volumes est le traité de
      chirurgie systématique arabe le plus complet après
      le *Taṣrīf* d'al-Zahrāwī ; les volumes 19-20 contiennent
      un exposé arabe systématique de la circulation capillaire
      entre artères et veines, parvenu indépendamment de son
      contemporain Ibn al-Nafīs. Ibn Abī Uṣaybiʿa, son maître
      et biographe, donne la date jour-précise.
    canonical_hijri: {year: 685, month: 5, day: 5, precision: day}
