  - slug: death-of-ibn-ridwan
    category: scholar_death
    title_en: Death of ʿAlī ibn Riḍwān — Court Physician of Fatimid Cairo
    title_ar: وفاة علي بن رضوان — طبيب البلاط الفاطمي بالقاهرة
    title_fr: Mort de ʿAlī ibn Riḍwān — médecin de cour fatimide du Caire
    description_en: |
      Abū al-Ḥasan ʿAlī ibn Riḍwān al-Miṣrī — Egyptian physician,
      autodidact in medicine and astronomy, chief physician
      (*raʾīs al-aṭibbāʾ*) to the Fatimid caliph al-Mustanṣir
      bi-Allāh in Cairo, and author of detailed commentaries on
      Galen's *Tegni* (*Ṣināʿa Ṣaghīra*) — died in Cairo
      around 460 AH (1068 CE). His on-the-ground treatise
      *Daf ʿMaḍārr al-Abdān bi-Arḍ Miṣr* (Repelling the Bodily
      Harms of the Land of Egypt) is the earliest detailed
      medical climatology of the Nile valley and a primary
      source for the great Egyptian famine of 446-454 AH
      (1054-1062 CE), which he witnessed as state physician.
      His public dispute with the Christian physician Ibn
      Buṭlān of Baghdad — conducted by exchange of polemical
      treatises across the Mediterranean — is one of the most
      vivid records of medical controversy in the medieval
      Arabic world. Year-precision; the *Encyclopaedia of
      Islam* and Ibn Abī Uṣaybiʿa give c. 460/1068.
    description_ar: |
      توفي أبو الحسن علي بن رضوان المصري — طبيب مصري عصامي
      في الطب والفلك، ورأس الأطباء عند الخليفة الفاطمي
      المستنصر بالله بالقاهرة، صاحب الشروح المفصلة على
      «الصناعة الصغيرة» لجالينوس — بالقاهرة نحو سنة ٤٦٠
      هـ (١٠٦٨ ميلادي). من تصانيفه «دفع مضارّ الأبدان بأرض
      مصر» وهو أقدم كتاب مفصل في طب البيئة ومناخ مصر، ومصدر
      أساسي لأخبار المجاعة المصرية الكبرى ٤٤٦-٤٥٤ هـ
      (١٠٥٤-١٠٦٢ ميلادي) التي عاصرها بصفته طبيب الدولة.
      وله مع طبيب بغداد النصراني ابن بطلان مناظرة طبية مشهورة
      تبادلا فيها الرسائل المجادلة عبر البحر الأبيض المتوسط،
      وهي من أحفل سجلات الجدل الطبي في العالم العربي القروسطي.
      الدقة سنوية؛ ضبط دائرة المعارف الإسلامية وابن أبي
      أصيبعة وفاته نحو ٤٦٠ هـ/١٠٦٨ ميلادي.
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn Riḍwān al-Miṣrī — médecin égyptien,
      autodidacte en médecine et en astronomie, médecin-chef
      (*raʾīs al-aṭibbāʾ*) du calife fatimide al-Mustanṣir
      bi-Allāh au Caire, et auteur de commentaires détaillés
      sur la *Tegni* de Galien (*Ṣināʿa Ṣaghīra*) — mourut au
      Caire vers 460 H (1068 EC). Son traité de terrain
      *Dafʿ Maḍārr al-Abdān bi-Arḍ Miṣr* (Écarter les
      dommages corporels au pays d'Égypte) est la plus
      ancienne climatologie médicale détaillée de la vallée
      du Nil et une source primaire sur la grande famine
      égyptienne de 446-454 H (1054-1062 EC), à laquelle il
      assista en qualité de médecin de l'État. Sa controverse
      publique avec le médecin chrétien Ibn Buṭlān de Bagdad —
      menée par échange de traités polémiques à travers la
      Méditerranée — est l'un des registres les plus vivants
      de controverse médicale dans le monde arabe médiéval.
      Précision annuelle ; l'*Encyclopédie de l'Islam* et Ibn
      Abī Uṣaybiʿa donnent vers 460/1068.
    canonical_hijri: {year: 460, precision: year}
    canonical_gregorian: {date: 1068-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Ibn Riḍwān' gives c. 460/1068."
      - source_key: editorial
        notes: "Cross-checked against Ibn Abī Uṣaybiʿa, *ʿUyūn al-Anbāʾ*."
