  - slug: death-of-al-ghafiqi
    category: scholar_death
    title_en: Death of Aḥmad al-Ghāfiqī — Andalusī Pharmacognosist
    title_ar: وفاة أحمد الغافقي — صيدلاني الأندلس
    title_fr: Mort d'Aḥmad al-Ghāfiqī — pharmacognoste andalou
    description_en: |
      Abū Jaʿfar Aḥmad ibn Muḥammad al-Ghāfiqī — Andalusī
      botanist and pharmacognosist from Ghāfiq near Cordoba,
      author of the *Kitāb al-Adwiya al-Mufrada* (Book of
      Simple Drugs), the most accurate Andalusī materia medica
      before the encyclopaedic compilations of Ibn al-Bayṭār —
      died around 560 AH (1165 CE). Ibn al-Bayṭār drew on his
      *Mufradāt* heavily, citing al-Ghāfiqī by name; the
      Christian physician Bar Hebraeus credited him as the
      most reliable plant-identifier of the Arabic tradition.
      The *Encyclopaedia of Islam* gives the death year as
      around 560/1165 with year-precision; the day is not
      attested.
    description_ar: |
      توفي أبو جعفر أحمد بن محمد الغافقي — نباتي وعالم بمفردات
      الأدوية أندلسي، من غافق قرب قرطبة، صاحب «كتاب الأدوية
      المفردة» وهو أدق دستور للنباتات الطبية في الأندلس قبل
      موسوعات ابن البيطار — نحو سنة ٥٦٠ هـ (١١٦٥ ميلادي). نقل
      عنه ابن البيطار في «المفردات» نقلاً واسعاً وذكره باسمه؛
      وأشاد به الطبيب النصراني بَر هَبْرَايُوس بصفته أوثق من
      عرف النباتات الطبية في التراث العربي. ضبط دائرة المعارف
      الإسلامية وفاته نحو سنة ٥٦٠ هـ/١١٦٥ ميلادي بدقة سنوية،
      ولم يثبت اليوم.
    description_fr: |
      Abū Jaʿfar Aḥmad ibn Muḥammad al-Ghāfiqī — botaniste et
      pharmacognoste andalou originaire de Ghāfiq près de
      Cordoue, auteur du *Kitāb al-Adwiya al-Mufrada* (Livre
      des médicaments simples), la materia medica andalouse
      la plus précise avant les compilations encyclopédiques
      d'Ibn al-Bayṭār — mourut vers 560 H (1165 EC). Ibn
      al-Bayṭār a largement cité ses *Mufradāt*, le nommant
      explicitement ; le médecin chrétien Bar Hebraeus lui
      reconnut le titre du plus fiable identificateur de
      plantes de la tradition arabe. L'*Encyclopédie de
      l'Islam* situe sa mort vers 560/1165 avec précision
      annuelle ; le jour n'est pas attesté.
    canonical_hijri: {year: 560, precision: year}
    canonical_gregorian: {date: 1165-01-01, precision: year, method: tabular_conversion}
