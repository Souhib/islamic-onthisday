      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'al-Ghāfiqī' gives c. 560/1165 at Cordoba."
      - source_key: editorial
        notes: "Cross-checked against Ibn al-Bayṭār's *Mufradāt*, which cites al-Ghāfiqī by name as a primary authority."
