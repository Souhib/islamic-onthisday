  - slug: death-of-ibn-jumayy
    category: scholar_death
    title_en: Death of Ibn Jumayʿ — Saladin's Personal Physician
    title_ar: وفاة ابن جميع — طبيب صلاح الدين الأيوبي
    title_fr: Mort d'Ibn Jumayʿ — médecin personnel de Saladin
    description_en: |
      Abū al-ʿAshāʾir Hibat Allāh ibn Zayn ibn Jumayʿ
      al-Isrāʾīlī — Egyptian-Jewish physician of the Fusṭāṭ
      community, personal physician to Salāḥ al-Dīn al-Ayyūbī
      and one of the principal teachers of ʿAbd al-Laṭīf
      al-Baghdādī during the latter's residence in Cairo —
      died at Fusṭāṭ in 594 AH (1198 CE). His major works
      include the medical compendium *Kitāb al-Irshād li-Maṣāliḥ
      al-Anfus wa'l-Ajsād*, an apologetic treatise on Galenic
      medicine *al-Maqāla al-Ṣalāḥiyya fī Iḥyāʾ Ṣināʿat
      al-Ṭibb* dedicated to Saladin, and a celebrated case
      study describing the recovery of a young patient from a
      catatonic state which al-Baghdādī later cited as a
      didactic example. Year 594 AH at Fusṭāṭ is given in Ibn
      Khallikān and Ibn Abī Uṣaybiʿa.
    description_ar: |
      توفي أبو العشائر هبة الله بن زين بن جميع الإسرائيلي —
      طبيب يهودي مصري من جماعة الفسطاط، طبيب صلاح الدين
      الأيوبي الخاص، وأحد أهم أساتذة عبد اللطيف البغدادي خلال
      إقامته بالقاهرة — بالفسطاط سنة ٥٩٤ هـ (١١٩٨ ميلادي).
      من أهم تصانيفه «كتاب الإرشاد لمصالح الأنفس والأجساد»،
      ورسالة دفاعية عن الطب الجالينوسي عنوانها «المقالة
      الصلاحية في إحياء صناعة الطب» أهداها لصلاح الدين، ودراسة
      حالة شهيرة وصف فيها شفاء مريض شاب من سُبَات تخشبيّ نقلها
      لاحقاً البغدادي في سياق التعليم. ضبط ابن خلكان وابن أبي
      أصيبعة وفاته سنة ٥٩٤ هـ بالفسطاط.
    description_fr: |
      Abū al-ʿAshāʾir Hibat Allāh ibn Zayn ibn Jumayʿ
      al-Isrāʾīlī — médecin juif égyptien de la communauté de
      Fusṭāṭ, médecin personnel de Salāḥ al-Dīn al-Ayyūbī
      (Saladin) et l'un des principaux maîtres de ʿAbd al-Laṭīf
      al-Baghdādī durant le séjour cairote de ce dernier —
      mourut à Fusṭāṭ en 594 H (1198 EC). Ses œuvres principales
      incluent le compendium médical *Kitāb al-Irshād li-Maṣāliḥ
      al-Anfus wa'l-Ajsād*, un traité apologétique sur la
      médecine galénique *al-Maqāla al-Ṣalāḥiyya fī Iḥyāʾ
      Ṣināʿat al-Ṭibb* dédié à Saladin, et une célèbre étude
      de cas décrivant le rétablissement d'un jeune malade
      d'un état catatonique, qu'al-Baghdādī cita ultérieurement
      comme exemple didactique. L'année 594 H à Fusṭāṭ est
      donnée dans Ibn Khallikān et Ibn Abī Uṣaybiʿa.
    canonical_hijri: {year: 594, precision: year}
    canonical_gregorian: {date: 1198-01-01, precision: year, method: tabular_conversion}
