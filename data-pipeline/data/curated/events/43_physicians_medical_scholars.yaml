# Wave 30 of curated event additions (2026-04-27).
# Major physicians, medical authors, and pharmacologists of the Islamic
# civilisational tradition not yet covered in the dataset. The classical
# corpus already contained al-Zahrāwī, Ibn al-Nafīs, Ibn al-Bayṭār,
# Ibn Sīnā, al-Bīrūnī, and the philosopher-physicians Ibn Bajja, Ibn Ṭufayl,
# and Ibn Rushd; this wave adds the major figures missing from that map.
#
# Twelve physicians attested in classical Sunni biographical literature
# (Ibn Khallikān's *Wafayāt al-Aʿyān*, al-Dhahabī's *Tārīkh al-Islām* and
# *Siyar Aʿlām al-Nubalāʾ*, Ibn Kathīr's *al-Bidāya wa'l-Nihāya*) and in
# the standard modern reference (*Encyclopaedia of Islam, 2nd ed.*).
# Two of the figures (Hunayn ibn Isḥāq, Ibn al-Quff) were Eastern Christian
# Arabs whose careers unfolded inside the Abbasid and Mamlūk medical
# systems and whose Arabic writings became part of the Islamic medical
# canon — they are included as part of Islamic civilisational history,
# the dataset already including comparable cross-confessional figures
# (al-Idrīsī at the Norman court of Palermo). Trilingual en/ar/fr.

events:
  # =========================================================================
  # ABBASID-ERA TRANSLATORS AND PHYSICIANS
  # =========================================================================

  - slug: death-of-yuhanna-ibn-masawayh
    category: scholar_death
    title_en: Death of Yūḥannā ibn Māsawayh — Physician of the House of Wisdom
    title_ar: وفاة يوحنا بن ماسويه — طبيب بيت الحكمة
    title_fr: Mort de Yūḥannā ibn Māsawayh — médecin de la Maison de la Sagesse
    description_en: |
      Yūḥannā ibn Māsawayh — Eastern Christian Arab physician of
      Khūzistān origin trained in Jundīshāpūr who served six
      successive Abbasid caliphs (al-Maʾmūn through al-Mutawakkil)
      as personal physician and as the second director of the
      *Bayt al-Ḥikma* (House of Wisdom) translation programme in
      Baghdad after his teacher Yūḥannā ibn al-Biṭrīq — died at
      Sāmarrāʾ in 243 AH (857 CE). He composed Arabic medical
      treatises that were the first generation of original works
      in the language (his *Kitāb al-Nawādir al-Ṭibbiyya* and the
      ophthalmological *Daghal al-ʿAyn* among them), and he
      taught the next generation of Abbasid physicians, including
      Ḥunayn ibn Isḥāq. Classical biographers (Ibn Khallikān,
      al-Dhahabī, Ibn Abī Uṣaybiʿa) preserve his repartee at the
      caliphal court; al-Dhahabī notes the year-precision dating
      with the location at Sāmarrāʾ.
    description_ar: |
      توفي يوحنا بن ماسويه — طبيب نصراني من خوزستان، تلقى تعليمه
      في جنديسابور، خدم ستة من خلفاء بني العباس (من المأمون إلى
      المتوكل) طبيباً خاصاً، وتولّى رئاسة بيت الحكمة في بغداد
      ثاني مديريه بعد أستاذه يوحنا بن البطريق — بسامراء سنة ٢٤٣
      هـ (٨٥٧ ميلادي). وضع باللغة العربية مصنفات طبية كانت من
      الجيل الأول للتأليف الطبي العربي الأصيل (منها «كتاب
      النوادر الطبية» و«دغل العين» في طب العيون)، ودرَّس الجيل
      التالي من أطباء العباسيين، ومنهم تلميذه حنين بن إسحاق.
      وحفظ المؤرخون الأوائل (ابن خلكان والذهبي وابن أبي أصيبعة)
      كثيراً من نوادره في حضرة الخلفاء. ذكر الذهبي تاريخ وفاته
      السنوي ومكانها بسامراء.
    description_fr: |
      Yūḥannā ibn Māsawayh — médecin chrétien arabe d'origine
      khouzistanaise, formé à Jundīshāpūr, qui servit six califes
      abbassides successifs (d'al-Maʾmūn à al-Mutawakkil) comme
      médecin personnel et comme second directeur du programme de
      traduction de la *Bayt al-Ḥikma* (Maison de la Sagesse) à
      Bagdad, succédant à son maître Yūḥannā ibn al-Biṭrīq —
      mourut à Sāmarrāʾ en 243 H (857 EC). Il composa en arabe
      des traités médicaux qui formèrent la première génération
      d'œuvres originales dans cette langue (notamment son *Kitāb
      al-Nawādir al-Ṭibbiyya* et le traité d'ophtalmologie *Daghal
      al-ʿAyn*), et il forma la génération suivante de médecins
      abbassides, dont Ḥunayn ibn Isḥāq. Les biographes classiques
      (Ibn Khallikān, al-Dhahabī, Ibn Abī Uṣaybiʿa) conservent ses
      reparties à la cour califale ; al-Dhahabī donne la datation
      annuelle avec la localisation à Sāmarrāʾ.
    canonical_hijri: {year: 243, precision: year}
    canonical_gregorian: {date: 857-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafāt 243 AH at Sāmarrāʾ."
      - source_key: dhahabi_tarikh_islam
        notes: "Year-precise; biographies of physicians of the caliphs of Sāmarrāʾ."
      - source_key: ei2
        notes: "EI2 article 'Ibn Māsawayh' confirms 243/857 and Sāmarrāʾ."
    people: [[yuhanna-ibn-masawayh, died]]
    tags: [abbasid, physician, baghdad, samarra, bayt-al-hikma, translation, jundishapur]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Yuhanna_ibn_Masawaih"

  - slug: death-of-hunayn-ibn-ishaq
    category: scholar_death
    title_en: Death of Ḥunayn ibn Isḥāq — Master Translator of Greek Medicine
    title_ar: وفاة حنين بن إسحاق — كبير المترجمين عن اليونانية
    title_fr: Mort de Ḥunayn ibn Isḥāq — maître traducteur de la médecine grecque
    description_en: |
      Abū Zayd Ḥunayn ibn Isḥāq al-ʿIbādī — Eastern Christian
      Arab translator-physician from al-Ḥīra, the central figure
      of the Abbasid Greek-into-Arabic translation movement and
      personal physician to caliph al-Mutawakkil — died at
      Baghdad in Ṣafar 260 AH (December 873 CE). He and the
      atelier he led (his son Isḥāq, his nephew Ḥubaysh, ʿĪsā
      ibn Yaḥyā) Arabised the Galenic corpus and key works of
      Hippocrates, Dioscorides, and Aristotle, fixing the
      technical vocabulary that Ibn Sīnā, al-Rāzī, and the entire
      Arabic-Latin medical tradition would inherit. His own
      *Kitāb al-ʿAshr Maqālāt fī al-ʿAyn* (Ten Treatises on the
      Eye) is the earliest systematic Arabic ophthalmology. Ibn
      Khallikān places his death in 260 AH; the *Encyclopaedia of
      Islam* gives Ṣafar 260/December 873 with month-precision.
    description_ar: |
      توفي أبو زيد حنين بن إسحاق العبادي — طبيب مترجم نصراني
      عربي من أهل الحيرة، الشخصية المحورية في حركة الترجمة من
      اليونانية إلى العربية في عصر العباسيين، والطبيب الخاص
      للخليفة المتوكل — ببغداد في صفر سنة ٢٦٠ هـ (الموافق
      ديسمبر ٨٧٣ ميلادي). عرّب هو وحلقته (ابنه إسحاق وابن أخته
      حبيش وعيسى بن يحيى) جميع المتون الجالينوسية وأمهات أعمال
      أبقراط وديوسقوريدس وأرسطو، وثبّت المصطلح الفني الذي ورثه
      ابن سينا والرازي والمدرسة الطبية العربية اللاتينية بأسرها.
      ومن أعماله الأصلية «كتاب العشر مقالات في العين» وهو أقدم
      كتاب عربي منهجي في طب العيون. ذكر ابن خلكان وفاته سنة
      ٢٦٠ هـ، وأفادت دائرة المعارف الإسلامية بأن وفاته كانت في
      صفر من تلك السنة بدقة شهرية.
    description_fr: |
      Abū Zayd Ḥunayn ibn Isḥāq al-ʿIbādī — médecin-traducteur
      chrétien arabe d'al-Ḥīra, figure centrale du mouvement
      abbasside de traduction du grec vers l'arabe et médecin
      personnel du calife al-Mutawakkil — mourut à Bagdad en
      Ṣafar 260 H (décembre 873 EC). Lui et l'atelier qu'il
      dirigeait (son fils Isḥāq, son neveu Ḥubaysh, ʿĪsā ibn
      Yaḥyā) arabisèrent le corpus galénique et les ouvrages
      majeurs d'Hippocrate, Dioscoride et Aristote, fixant le
      vocabulaire technique dont héritèrent Ibn Sīnā, al-Rāzī
      et toute la tradition médicale arabo-latine. Son propre
      *Kitāb al-ʿAshr Maqālāt fī al-ʿAyn* (Dix Traités sur
      l'œil) est la plus ancienne ophtalmologie arabe
      systématique. Ibn Khallikān situe sa mort en 260 H ;
      l'*Encyclopédie de l'Islam* précise Ṣafar 260/décembre
      873 avec datation mensuelle.
    canonical_hijri: {year: 260, month: 2, precision: month}
    canonical_gregorian: {date: 873-12-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafāt 260 AH; biographer of physicians."
      - source_key: ei2
        notes: "EI2 article 'Ḥunayn ibn Isḥāḳ' gives Ṣafar 260/December 873."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 260 AH; physician of al-Mutawakkil."
    people: [[hunayn-ibn-ishaq, died]]
