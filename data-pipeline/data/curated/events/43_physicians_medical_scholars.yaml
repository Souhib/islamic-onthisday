  # =========================================================================

  - slug: death-of-dawud-al-antaki
    category: scholar_death
    title_en: Death of Dāwūd al-Anṭākī — Author of the *Tadhkira*
    title_ar: وفاة داود الأنطاكي — صاحب «التذكرة»
    title_fr: Mort de Dāwūd al-Anṭākī — auteur de la *Tadhkira*
    description_en: |
      Dāwūd ibn ʿUmar al-Anṭākī al-Ḍarīr — Syrian physician and
      bibliographer born blind at Antioch, who studied Greek
      and the medical tradition under a Persian visitor at
      Antioch, taught for years in Damascus, and ended his life
      in pious retirement at Mecca, where he died in 1008 AH
      (1599 CE). His *Tadhkirat ūlī al-Albāb wa'l-Jāmiʿ
      li'l-ʿAjab al-ʿUjāb* (*Tadhkira* — Memorandum for the
      Wise and Compendium of Wonders) is the most widely
      copied Arabic medical-pharmacological encyclopaedia of
      the late Ottoman period, integrating the classical
      Galenic-Avicennian tradition with the New World materia
      medica then entering the Ottoman pharmacy. The death
      year 1008 AH at Mecca is given in the *Encyclopaedia of
      Islam* and was preserved in his autograph correspondence;
      year-precision is retained.
    description_ar: |
      توفي داود بن عمر الأنطاكي الضرير — طبيب سوري ومحقق
      ببليوغرافي ولد كفيفاً بأنطاكية، تعلَّم اليونانية والطب
      على فارسي قدم أنطاكية، ودرَّس بدمشق سنوات، ثم اعتزل
      تلبيةً للنسك بمكة المكرمة فتوفي بها سنة ١٠٠٨ هـ (١٥٩٩
      ميلادي). كتابه «تذكرة أولي الألباب والجامع للعجب
      العجاب» (المعروف بـ«التذكرة») أوسع موسوعات الطب
      والصيدلة العربية تداولاً في أواخر العصر العثماني، يجمع
      بين التراث الجالينوسي السينوي الكلاسيكي ومفردات الأدوية
      الجديدة الواردة من العالم الجديد إلى الصيدلية العثمانية.
      ضبطت دائرة المعارف الإسلامية وفاته سنة ١٠٠٨ هـ بمكة
      المكرمة، وحفظ مراسلاته الخطية ذلك. الدقة سنوية.
    description_fr: |
      Dāwūd ibn ʿUmar al-Anṭākī al-Ḍarīr — médecin syrien et
      bibliographe né aveugle à Antioche, qui étudia le grec
      et la tradition médicale auprès d'un visiteur persan à
      Antioche, enseigna pendant des années à Damas, et
      acheva sa vie dans la retraite pieuse à La Mecque où
      il mourut en 1008 H (1599 EC). Sa *Tadhkirat ūlī
      al-Albāb wa'l-Jāmiʿ li'l-ʿAjab al-ʿUjāb* (*Tadhkira* —
      Mémorial pour les Sages et Compendium des Merveilles)
      est l'encyclopédie médico-pharmacologique arabe la plus
      largement copiée à la fin de la période ottomane,
      intégrant la tradition classique galéno-avicennienne et
      la materia medica du Nouveau Monde entrant alors dans
      la pharmacie ottomane. L'année 1008 H à La Mecque est
      donnée dans l'*Encyclopédie de l'Islam* et conservée
      dans sa correspondance autographe ; précision annuelle.
    canonical_hijri: {year: 1008, precision: year}
    canonical_gregorian: {date: 1599-01-01, precision: year, method: tabular_conversion}
    claims:
