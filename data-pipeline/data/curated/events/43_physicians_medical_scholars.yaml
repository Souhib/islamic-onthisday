  - slug: ibn-abi-usaybia-uyun-al-anba-completed
    category: foundation
    title_en: Ibn Abī Uṣaybiʿa Completes *ʿUyūn al-Anbāʾ fī Ṭabaqāt al-Aṭibbāʾ*
    title_ar: ابن أبي أصيبعة يفرغ من «عيون الأنباء في طبقات الأطباء»
    title_fr: Ibn Abī Uṣaybiʿa achève les *ʿUyūn al-Anbāʾ fī Ṭabaqāt al-Aṭibbāʾ*
    description_en: |
      Muwaffaq al-Dīn Aḥmad ibn al-Qāsim ibn Abī Uṣaybiʿa —
      Damascene-born physician of the Mamlūk era — completed
      the second redaction of his great biographical dictionary
      of physicians, *ʿUyūn al-Anbāʾ fī Ṭabaqāt al-Aṭibbāʾ*
      (Sources of Information on the Generations of
      Physicians), at Ṣarkhad in 668 AH (1270 CE). Organised
      into fifteen chapters covering Greek, Indian, pre-Islamic
      Arabian, and Islamic-era physicians from the early
      Abbasid translators down to his own teachers in Cairo
      and Damascus, the *ʿUyūn* is the single most important
      classical Arabic source on the history of medicine in
      Islam — most of the death dates of physicians in this
      dataset are attested through it. The completion year is
      attested in the manuscript colophon. Ibn Abī Uṣaybiʿa
      himself died at Ṣarkhad ten years later in 668 AH (1270 CE).
    description_ar: |
      أتمّ موفق الدين أحمد بن القاسم بن أبي أصيبعة — طبيب دمشقي
      المولد من العصر المملوكي — التحرير الثاني لمعجمه الكبير
      في تراجم الأطباء «عيون الأنباء في طبقات الأطباء» بصرخد
      سنة ٦٦٨ هـ (١٢٧٠ ميلادي). والكتاب موزَّع على خمسة عشر
      فصلاً تستوعب أطباء اليونان والهند والعرب قبل الإسلام
      والأطباء في العصر الإسلامي من مترجمي العصر العباسي
      الأوائل إلى أساتذته في القاهرة ودمشق، وهو أهم مصدر عربي
      كلاسيكي وحيد في تاريخ الطب الإسلامي — وأكثر تاريخ وفيات
      الأطباء في هذا الموسوعة محفوظ من طريقه. وقد ضبط تاريخ
      الفراغ من التحرير في خاتمة المخطوط، وتوفي ابن أبي
      أصيبعة بصرخد في السنة نفسها.
    description_fr: |
      Muwaffaq al-Dīn Aḥmad ibn al-Qāsim ibn Abī Uṣaybiʿa —
      médecin d'origine damascène de l'époque mamelouke —
      acheva la seconde rédaction de son grand dictionnaire
      biographique des médecins, *ʿUyūn al-Anbāʾ fī Ṭabaqāt
      al-Aṭibbāʾ* (Sources d'information sur les générations
      des médecins), à Ṣarkhad en 668 H (1270 EC). Organisé
      en quinze chapitres couvrant les médecins grecs,
      indiens, arabes préislamiques et islamiques depuis les
      premiers traducteurs abbassides jusqu'à ses propres
      maîtres au Caire et à Damas, *ʿUyūn al-Anbāʾ* est la
      source classique arabe la plus importante sur
      l'histoire de la médecine en Islam — la plupart des
      dates de mort des médecins de ce corpus reposent sur
      lui. L'année d'achèvement est attestée dans le colophon
      manuscrit ; Ibn Abī Uṣaybiʿa mourut lui-même à Ṣarkhad
      la même année.
    canonical_hijri: {year: 668, precision: year}
    canonical_gregorian: {date: 1270-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Ibn Abī Uṣaybiʿa' confirms 668/1270 second redaction at Ṣarkhad."
      - source_key: editorial
        notes: "Manuscript colophon evidence; the *ʿUyūn al-Anbāʾ* is the source for most physician death dates in this dataset."
    people: [[ibn-abi-usaybia, subject]]
    tags: [mamluk, physician, damascus, sarkhad, biography, history-of-medicine, tabaqat]
    importance: major
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Ibn_Abi_Usaibia"
