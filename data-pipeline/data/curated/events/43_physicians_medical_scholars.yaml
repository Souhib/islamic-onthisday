  - slug: death-of-ibn-al-tilmidh
    category: scholar_death
    title_en: Death of Ibn al-Tilmīdh — Pharmacologist of the ʿAḍudī Hospital
    title_ar: وفاة ابن التلميذ — صيدلاني البيمارستان العضدي
    title_fr: Mort d'Ibn al-Tilmīdh — pharmacologue de l'hôpital ʿAḍudī
    description_en: |
      Amīn al-Dawla Hibat Allāh ibn Ṣāʿid ibn al-Tilmīdh —
      Eastern Christian Arab physician, chief physician
      (*sāʿūr*) of the ʿAḍudī hospital in Baghdad and personal
      physician to the Abbasid caliph al-Muqtafī — died at
      Baghdad on 12 Rabīʿ al-Awwal 560 AH (27 January 1165 CE)
      at the age of about ninety. His *Aqrābādhīn* (pharmacopoeia)
      replaced the earlier dispensatory of Sābūr ibn Sahl as the
      official drug compendium of the ʿAḍudī hospital and
      remained the standard hospital formulary in the eastern
      Islamic world for centuries. He revised much of the
      Galenic translation tradition and composed an annotated
      epitome of Ibn Sīnā's *Qānūn*. Ibn Khallikān gives the day
      precisely: 12 Rabīʿ al-Awwal 560 AH at Baghdad.
    description_ar: |
      توفي أمين الدولة هبة الله بن صاعد بن التلميذ — طبيب نصراني
      عربي، ساعور البيمارستان العضدي ببغداد، والطبيب الخاص
      للخليفة العباسي المقتفي لأمر الله — ببغداد يوم ١٢ ربيع
      الأول سنة ٥٦٠ هـ (الموافق ٢٧ يناير ١١٦٥ ميلادي) عن نحو
      تسعين سنة. أحلَّ «أقراباذينه» (دستور الأدوية) محل
      أقراباذين سابور بن سهل دستوراً رسمياً للأدوية في
      البيمارستان العضدي، وبقي كتاباً مرجعياً للصيدلة
      المستشفائية في المشرق الإسلامي قروناً. وراجع كثيراً من
      ترجمات التراث الجالينوسي، ولخّص «قانون» ابن سينا تلخيصاً
      محشيّاً. وذكر ابن خلكان اليوم بدقة: ١٢ ربيع الأول ٥٦٠ هـ
      ببغداد.
    description_fr: |
      Amīn al-Dawla Hibat Allāh ibn Ṣāʿid ibn al-Tilmīdh —
      médecin chrétien arabe oriental, médecin-chef (*sāʿūr*)
      de l'hôpital ʿAḍudī à Bagdad et médecin personnel du
      calife abbasside al-Muqtafī — mourut à Bagdad le
      12 Rabīʿ al-Awwal 560 H (27 janvier 1165 EC) à environ
      quatre-vingt-dix ans. Son *Aqrābādhīn* (pharmacopée)
      remplaça l'ancien dispensaire de Sābūr ibn Sahl comme
      formulaire officiel des médicaments de l'hôpital ʿAḍudī
      et demeura pendant des siècles le formulaire hospitalier
      de référence dans le monde islamique oriental. Il révisa
      une grande partie de la tradition de traduction
      galénique et composa un abrégé annoté du *Qānūn* d'Ibn
      Sīnā. Ibn Khallikān donne précisément le jour :
      12 Rabīʿ al-Awwal 560 H à Bagdad.
