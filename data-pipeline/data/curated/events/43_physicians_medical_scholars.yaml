  - slug: death-of-ibn-zuhr
    category: scholar_death
    title_en: Death of Abū Marwān ibn Zuhr (Avenzoar) — Andalusī Master Clinician
    title_ar: وفاة أبي مروان ابن زهر — كبير أطباء الأندلس السريريين
    title_fr: Mort d'Abū Marwān ibn Zuhr (Avenzoar) — grand clinicien andalou
    description_en: |
      Abū Marwān ʿAbd al-Malik ibn Abī al-ʿAlāʾ Zuhr al-Ishbīlī —
      Andalusī physician of the Banū Zuhr medical dynasty,
      teacher of Ibn Rushd in medicine and personal physician
      to the Almohad caliphs ʿAbd al-Muʾmin and Abū Yaʿqūb
      Yūsuf — died at Seville in 557 AH (1162 CE). His
      *Kitāb al-Taysīr fī al-Mudāwāt wa'l-Tadbīr* (the *Theisir*
      of the Latins) is the most clinically observant medical
      text of the Western Islamic tradition and contains the
      earliest description of pericarditis and serous
      pericardial effusion, of inflammation of the middle ear,
      and of *Sarcoptes scabiei* as the cause of scabies. His
      smaller *Kitāb al-Aghdhiya* on dietetics circulated
      widely. Year 557 AH at Seville is given by Ibn Khallikān
      and confirmed in al-Dhahabī's *Tārīkh al-Islām*.
    description_ar: |
      توفي أبو مروان عبد الملك بن أبي العلاء زهر الإشبيلي —
      طبيب أندلسي من سلالة بني زهر الطبية، أستاذ ابن رشد في
      الطب وطبيب الخليفتين الموحديَّين عبد المؤمن وأبي يعقوب
      يوسف — بإشبيلية سنة ٥٥٧ هـ (١١٦٢ ميلادي). كتابه «التيسير
      في المداواة والتدبير» (المعروف لدى اللاتين بـ Theisir)
      أوفر كتاب طبي في غرب العالم الإسلامي بالملاحظة السريرية
      المباشرة، يحوي أوّل وصف لالتهاب التأمور القلبي وللاندفاع
      المصلي حول القلب، ولالتهاب الأذن الوسطى، ولكون عثة
      الجرب (Sarcoptes scabiei) سبباً للجرب. ولكتابه الأصغر
      «الأغذية» تداول واسع. ضبط ابن خلكان وفاته سنة ٥٥٧ هـ
      بإشبيلية، وأكد ذلك الذهبي في «تاريخ الإسلام».
    description_fr: |
      Abū Marwān ʿAbd al-Malik ibn Abī al-ʿAlāʾ Zuhr al-Ishbīlī —
      médecin andalou de la dynastie médicale des Banū Zuhr,
      maître d'Ibn Rushd en médecine et médecin personnel des
      califes almohades ʿAbd al-Muʾmin et Abū Yaʿqūb Yūsuf —
      mourut à Séville en 557 H (1162 EC). Son *Kitāb al-Taysīr
      fī al-Mudāwāt wa'l-Tadbīr* (le *Theisir* des Latins) est
      le texte médical le plus précis dans l'observation
      clinique de la tradition islamique occidentale et
      contient la première description de la péricardite et
      de l'épanchement péricardique séreux, de l'otite moyenne,
      et de la gale (*Sarcoptes scabiei*) comme cause du
      prurit. Son petit traité de diététique *Kitāb al-Aghdhiya*
      circula largement. Ibn Khallikān donne 557 H à Séville,
      confirmé dans le *Tārīkh al-Islām* d'al-Dhahabī.
    canonical_hijri: {year: 557, precision: year}
    canonical_gregorian: {date: 1162-01-01, precision: year, method: tabular_conversion}
