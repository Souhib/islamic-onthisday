  - slug: death-of-al-majusi
    category: scholar_death
    title_en: Death of ʿAlī ibn al-ʿAbbās al-Majūsī (Haly Abbas)
    title_ar: وفاة علي بن العباس المجوسي
    title_fr: Mort de ʿAlī ibn al-ʿAbbās al-Majūsī (Haly Abbas)
    description_en: |
      Abū al-Ḥasan ʿAlī ibn al-ʿAbbās al-Majūsī al-Ahwāzī — Persian
      physician of Zoroastrian-convert family from al-Ahwāz, court
      physician to the Buyid amīr ʿAḍud al-Dawla and named author
      of one of the greatest medical encyclopaedias of the Arabic
      tradition, the *Kāmil al-Ṣināʿa al-Ṭibbiyya* known as the
      *Kitāb al-Malakī* (the Royal Book), composed for and dedicated
      to ʿAḍud al-Dawla — died around 384 AH (994 CE). The *Kitāb
      al-Malakī*, a twenty-volume systematic medicine in two
      halves (theoretical and practical), was the dominant
      teaching text in Latin Christendom under Constantinus
      Africanus's translation as *Liber Pantegni* until Ibn
      Sīnā's *Qānūn* displaced it in the twelfth century. The
      death year is given as around 384 AH/994 CE in the
      *Encyclopaedia of Islam* and Ibn Abī Uṣaybiʿa, with year-
      precision; the day is not preserved.
    description_ar: |
      توفي أبو الحسن علي بن العباس المجوسي الأهوازي — طبيب
      فارسي من أسرة من المجوس الذين اعتنق آباؤه الإسلام،
      من الأهواز، طبيب أمير الأمراء البويهي عضد الدولة، ومؤلف
      إحدى أعظم موسوعات الطب في التراث العربي «كامل الصناعة
      الطبية» المعروف بـ«الكتاب الملكي» الذي صنفه وأهداه
      لعضد الدولة — نحو سنة ٣٨٤ هـ (٩٩٤ ميلادي). والكتاب
      الملكي طب منظوم في عشرين جزءاً موزعة على شطرين
      (النظري والعملي)، ساد على التعليم الطبي في النصرانية
      اللاتينية بترجمة قسطنطين الإفريقي الموسومة بـ Liber
      Pantegni إلى أن أزاحه «قانون» ابن سينا في القرن
      الثاني عشر. ضبط دائرة المعارف الإسلامية وابن أبي أصيبعة
      وفاته بالسنة نحو ٣٨٤ هـ/٩٩٤ ميلادي، ولم يثبت اليوم.
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn al-ʿAbbās al-Majūsī al-Ahwāzī —
      médecin persan d'une famille zoroastrienne convertie
      à l'islam, originaire d'al-Ahwāz, médecin de cour de
      l'émir bouyide ʿAḍud al-Dawla et auteur de l'une des
      plus grandes encyclopédies médicales de la tradition
      arabe, *Kāmil al-Ṣināʿa al-Ṭibbiyya* connue sous le
      titre *Kitāb al-Malakī* (le Livre Royal) qu'il composa
      et dédia à ʿAḍud al-Dawla — mourut vers 384 H (994 EC).
      Le *Kitāb al-Malakī*, médecine systématique en vingt
      volumes répartis en deux moitiés (théorique et pratique),
      fut le manuel d'enseignement dominant dans la chrétienté
      latine sous la traduction de Constantin l'Africain
      intitulée *Liber Pantegni*, jusqu'à ce que le *Qānūn*
      d'Ibn Sīnā le supplante au XIIe siècle. La date de mort
      est donnée vers 384 H/994 EC dans l'*Encyclopédie de
      l'Islam* et Ibn Abī Uṣaybiʿa, avec précision annuelle ;
      le jour n'est pas conservé.
    canonical_hijri: {year: 384, precision: year}
    canonical_gregorian: {date: 994-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'al-Madjūsī, ʿAlī b. al-ʿAbbās' gives c. 384/994."
      - source_key: editorial
        notes: "Cross-checked against Ibn Abī Uṣaybiʿa, *ʿUyūn al-Anbāʾ fī Ṭabaqāt al-Aṭibbāʾ*."
    people: [[al-majusi, died]]
    tags: [buyid, physician, ahwaz, kitab-al-malaki, pantegni, encyclopedia]
    importance: notable
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Ali_ibn_al-Abbas_al-Majusi"

