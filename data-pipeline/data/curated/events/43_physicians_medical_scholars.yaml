    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Hunayn_ibn_Ishaq"

  - slug: death-of-al-razi-tabib
    category: scholar_death
    title_en: Death of Abū Bakr al-Rāzī (Rhazes) — The Galen of the Arabs
    title_ar: وفاة أبي بكر الرازي — جالينوس العرب
    title_fr: Mort d'Abū Bakr al-Rāzī (Rhazès) — le Galien des Arabes
    description_en: |
      Abū Bakr Muḥammad ibn Zakariyyā al-Rāzī — physician,
      alchemist, and philosopher born at Rayy in northern Iran,
      head of the bīmāristān at Rayy and later of the ʿAḍudī
      hospital in Baghdad, the most original clinician of the
      Islamic Middle Ages — died at Rayy in 313 AH (925 CE),
      blind in his old age. His monumental *al-Ḥāwī fī al-Ṭibb*
      (the *Continens* of the Latins) is a posthumously compiled
      twenty-five-book casebook running to thousands of clinical
      observations cross-referenced against the Greek, Indian
      and Arabic literature; his short epidemiological treatise
      *Kitāb al-Judarī wa'l-Ḥaṣba* contains the first clinical
      differentiation of smallpox from measles. Ibn Khallikān
      and al-Dhahabī both record his death in 313 AH at Rayy,
      with Ibn Abī Uṣaybiʿa preserving the dominant date of
      5 Shaʿbān 313 AH (26 October 925 CE); a minority position
      in al-Bīrūnī's *Risāla fī Fihrist Kutub al-Rāzī* gives
      311 AH. We follow the majority 313 AH dating; year-
      precision is retained because the day is preserved by a
      single later source.
    description_ar: |
      توفي أبو بكر محمد بن زكريا الرازي — طبيب وكيمائي وفيلسوف
      ولد بالري في شمالي بلاد فارس، رأس بيمارستان الري ثم
      البيمارستان العضدي ببغداد، وأبرع أطباء العصر الإسلامي
      الوسيط في السريريات — بالري سنة ٣١٣ هـ (الموافق ٩٢٥
      ميلادي) كفيف البصر في شيخوخته. كتابه الموسوعي «الحاوي في
      الطب» (المعروف لدى اللاتين بـ Continens) مجموعة سريرية
      تقع في خمسة وعشرين كتاباً تشتمل على آلاف الملاحظات
      السريرية موثَّقة في مقابلة الأدب الطبي اليوناني والهندي
      والعربي؛ ورسالته الوبائية الموجزة «الجدري والحصبة» تحوي
      أول تمييز سريري بين الجدري والحصبة. ذكر ابن خلكان
      والذهبي وفاته سنة ٣١٣ هـ بالري، وحفظ ابن أبي أصيبعة
      اليوم الراجح وهو ٥ شعبان من تلك السنة (٢٦ أكتوبر ٩٢٥
      ميلادي)؛ وأفاد البيروني في «رسالته في فهرست كتب الرازي»
      تاريخ ٣١١ هـ على رأي مرجوح. تبنّينا الراجح ٣١٣ هـ ولم
      نضبط بدقة يومية لأن اليوم لم يحفظه إلا مصدر متأخر.
    description_fr: |
      Abū Bakr Muḥammad ibn Zakariyyā al-Rāzī — médecin,
      alchimiste et philosophe né à Rayy au nord de l'Iran,
      directeur du *bīmāristān* de Rayy puis de l'hôpital
      ʿAḍudī à Bagdad, le clinicien le plus original du Moyen
      Âge islamique — mourut à Rayy en 313 H (925 EC), aveugle
      dans sa vieillesse. Son monumental *al-Ḥāwī fī al-Ṭibb*
      (le *Continens* des Latins) est un recueil de cas en
      vingt-cinq livres compilé après sa mort, contenant des
      milliers d'observations cliniques recoupées avec la
      littérature grecque, indienne et arabe ; son court
      traité épidémiologique *Kitāb al-Judarī wa'l-Ḥaṣba*
      offre la première différenciation clinique de la variole
      et de la rougeole. Ibn Khallikān et al-Dhahabī enregistrent
      sa mort en 313 H à Rayy, et Ibn Abī Uṣaybiʿa conserve la
      date dominante du 5 Shaʿbān 313 H (26 octobre 925 EC) ;
      une opinion minoritaire d'al-Bīrūnī dans sa *Risāla fī
      Fihrist Kutub al-Rāzī* donne 311 H. Nous suivons la
      majorité (313 H) ; la précision annuelle est retenue
      car le jour n'est conservé que par une source tardive.
    canonical_hijri: {year: 313, precision: year}
    canonical_gregorian: {date: 925-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafāt 313 AH at Rayy."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 313 AH; physician of Rayy and Baghdad."
      - source_key: ei2
        notes: "EI2 article 'al-Rāzī, Abū Bakr Muḥammad b. Zakariyyāʾ' notes 313/925 majority and 311 AH minority (Bīrūnī)."
    disputed: true
    dispute_about: date
    people: [[al-razi-tabib, died]]
    tags: [abbasid, physician, polymath, rayy, baghdad, alchemy, smallpox, hawi]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Muhammad_ibn_Zakariya_al-Razi"

