  # =========================================================================
  # NADIR SHAH'S INVASION (1739)
  # =========================================================================

  - slug: battle-of-karnal
    category: battle
    title_en: Battle of Karnal — Nādir Shāh Defeats the Mughals
    title_ar: معركة كرنال — نادر شاه يهزم المغول
    title_fr: Bataille de Karnâl — Nâdir Shâh défait les Moghols
    description_en: |
      The pitched battle on the plain of Karnāl, ninety
      kilometres north of Delhi, in which the Persian army of
      Nādir Shāh Afshār — having marched out of Iran through
      Qandahār, Ghazna and Kabul and crossed the Indus —
      decisively defeated the Mughal field army of Emperor
      Muḥammad Shāh "Rangīla" in a few hours of fighting. The
      Mughal army was numerically much larger but mostly composed
      of cumbersome elephant- and palanquin-borne nobility; the
      Afsharid Persians fought as a tightly disciplined regular
      force with massed musketry and the manoeuvrable *zamburak*
      camel-mounted swivel gun. Two of the Emperor's three
      principal commanders — Khān-i Daurān and Saʿādat Khān —
      were killed or captured in a single morning; the third,
      Niẓām al-Mulk, sued for terms. Muḥammad Shāh surrendered
      his person and was escorted into Delhi at Nādir's side a
      fortnight later. Modern academic sources date the battle
      to 24 February 1739 / 13 Dhū al-Qaʿda 1151 AH.
    description_ar: |
      المعركة الميدانية في سهل كرنال، على نحو تسعين كيلومتراً
      شمالي دلهي، التي هزم فيها جيش نادر شاه الأفشاري الفارسي
      — بعد أن سار من إيران عبر قندهار وغزنة وكابل ثم عبر السند —
      جيش الإمبراطور المغولي محمد شاه «رنغيلا» الميداني هزيمة
      حاسمة في ساعات معدودة من القتال. وكان الجيش المغولي أكثر
      عدداً بكثير لكنه مكوّن في معظمه من النبالة الراكبين على
      الفيلة والمحفّات الثقيلة، في حين قاتل الأفشاريون كقوة
      نظامية مدرّبة منضبطة بنيران بنادق جماعية وبسلاح «الزنبورك»
      المدفعي المحمول على الجمل سهل المناورة. وفي صبيحة واحدة
      قتل اثنان من قواد الإمبراطور الثلاثة الرئيسيين — «خان
      دوران» و«سعادت خان» — أو أُسرا، أما الثالث «نظام الملك»
      فطلب الأمان. واستسلم محمد شاه شخصياً وسار بعدها بأسبوعين
      إلى دلهي بصحبة نادر شاه. وتحدد المصادر الأكاديمية الحديثة
      يوم المعركة في ٢٤ فبراير ١٧٣٩ م / ١٣ ذي القعدة ١١٥١ هـ.
    description_fr: |
      Bataille rangée dans la plaine de Karnâl, à quatre-vingt-dix
      kilomètres au nord de Delhi, dans laquelle l'armée perse
      de Nâdir Shâh Afshâr — ayant marché d'Iran via Qandahâr,
      Ghazna et Kaboul puis franchi l'Indus — défit en quelques
      heures de combat l'armée moghole de campagne de l'empereur
      Muḥammad Shâh « Rangîlâ ». L'armée moghole était bien plus
      nombreuse mais composée pour l'essentiel d'une noblesse
      encombrée d'éléphants et de palanquins; les Perses
      afshârides combattirent en force régulière fortement
      disciplinée avec des feux de mousquets massifs et le
      *zambūrak*, pièce d'artillerie pivotante montée sur
      chameau et particulièrement mobile. Deux des trois
      principaux chefs de l'empereur — Khân-i Dawrân et Saʿâdat
      Khân — furent tués ou capturés en une matinée; le
      troisième, Niẓâm al-Mulk, demanda des conditions. Muḥammad
      Shâh livra sa personne et fut escorté à Delhi quinze jours
      plus tard aux côtés de Nâdir. Les sources académiques
      modernes datent la bataille du 24 février 1739 / 13 dhū
      al-qaʿda 1151 H.
    canonical_hijri: {year: 1151, month: 11, day: 13, precision: day}
    canonical_gregorian: {date: 1739-02-24, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the battle on 13 Dhū al-Qaʿda 1151 / 24 February 1739 and details the Afsharid use of zamburak swivel guns."
      - source_key: editorial
        notes: "Editorial summary cross-checked against Mahdī Khān Astarābādī's Tārīkh-i Jahān-gushā-yi Nādirī (the official Afsharid chronicle)."
    tags: [mughal, persian, battle, india, nadir-shah, muhammad-shah, karnal, afsharid]
    source_url: https://en.wikipedia.org/wiki/Battle_of_Karnal
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: nadir-shah-sack-of-delhi
    category: political_event
    title_en: Nādir Shāh's Sack of Delhi
    title_ar: نادر شاه ينهب دلهي
    title_fr: Sac de Delhi par Nâdir Shâh
    description_en: |
      A fortnight after his victory at Karnāl, Nādir Shāh entered
      Delhi at the side of the captive Emperor Muḥammad Shāh.
      Order held for two days. On the morning of 22 March 1739
      (Julian 11 March) — provoked by a riot in the Chāndnī
      Chowk during which Persian soldiers had been killed —
      Nādir mounted the Sunehrī Masjid by the roadside, drew his
      sword, and gave the signal for a *qatl-i ʿāmm*, a general
      massacre. From dawn until two o'clock in the afternoon his
      troops killed indiscriminately in the streets, bāzārs and
      havelis of Old Delhi; estimates of the dead range from
      twenty thousand to thirty thousand, with much of the city
      put to the torch. Muḥammad Shāh interceded; Nādir sheathed
      his sword and ordered the killing to stop. The Persians
      then conducted a systematic stripping of the city's wealth
      over fifty-seven days — the imperial treasury, the Peacock
      Throne, the Kūh-i Nūr and Daryā-i Nūr diamonds, and an
      indemnity in cash and bullion. The contemporary Mughal
      historian Anand Rām Mukhliṣ chronicled the catastrophe in
      *Tazkira*. The sack broke the financial back of the Mughal
      state and is commonly identified as the moment from which
      its terminal decline became irrecoverable.
    description_ar: |
      بعد أسبوعين من نصره في كرنال دخل نادر شاه دلهي بصحبة
      الإمبراطور الأسير محمد شاه. واستتب النظام يومين. ثم في
      صبيحة ٢٢ مارس ١٧٣٩ م (الموافق ١١ مارس يولياني) — على
      أثر شغب في «شاندني تشوك» قُتل فيه عدد من الجنود الفرس —
      صعد نادر شاه إلى مسجد «سُنهري» على جانب الطريق، فاستلّ
      سيفه، وأعطى إشارة «القتل العام» (قتل عام). فقتل جنده من
      الفجر إلى الساعة الثانية بعد الظهر دون تمييز في شوارع
      دلهي القديمة وأسواقها وقصورها، وتتراوح تقديرات القتلى
      بين عشرين ألفاً وثلاثين ألفاً، مع إحراق جزء كبير من
      المدينة. وتوسط محمد شاه إلى نادر، فأَغمد سيفه وأمر بوقف
      القتل. ثم نفّذ الفرس تجريداً منهجياً لثروة المدينة على
      مدى سبعة وخمسين يوماً — خزانة الإمبراطورية والعرش الطاووسي
      وألماستي «كوه نور» و«دريا نور» وفداء نقدي وذهبي. وسجّل
      المؤرخ المغولي المعاصر «أناند رام مخلص» الكارثةَ في كتابه
      «التذكرة». وكسر السلب ظهر الدولة المغولية مالياً، ويُحدَّد
      عادةً منه اللحظةُ التي صار انحدارها النهائي بعدها لا رجعة
      فيه.
    description_fr: |
      Quinze jours après sa victoire de Karnâl, Nâdir Shâh entra
      dans Delhi aux côtés de l'empereur captif Muḥammad Shâh.
      L'ordre tint deux jours. Au matin du 22 mars 1739 (11
      mars julien) — provoqué par une émeute dans le Chândnî
      Chowk au cours de laquelle des soldats persans avaient
      été tués — Nâdir monta sur la Sunehrî Masjid au bord de
      la rue, tira l'épée et donna le signal d'un *qatl-i ʿāmm*,
      un massacre général. De l'aube à deux heures de l'après-
      midi ses troupes tuèrent sans distinction dans les rues,
      bâzârs et havelis du Vieux Delhi; les estimations des
      morts vont de vingt à trente mille, et une grande partie
      de la ville fut livrée aux flammes. Muḥammad Shâh
      intercéda; Nâdir rengaina et ordonna la cessation des
      tueries. Les Perses procédèrent ensuite à un dépouillement
      systématique des richesses de la ville pendant cinquante-
      sept jours — le trésor impérial, le Trône du Paon, les
      diamants Kûh-i Nûr et Daryâ-i Nûr, et une indemnité en
      espèces et en lingots. L'historien moghol contemporain
      Anand Râm Mukhliṣ a chroniqué la catastrophe dans la
      *Tazkira*. Le sac brisa l'épine financière de l'État
      moghol et marque communément le moment à partir duquel
      son déclin terminal devint irrémédiable.
    canonical_hijri: {year: 1151, month: 12, day: 11, precision: day}
    canonical_gregorian: {date: 1739-03-22, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the qatl-i ʿāmm of 22 March 1739 (11 March Julian) and details the fifty-seven-day occupation, the seizure of the Peacock Throne and Kūh-i Nūr."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the contemporary Mughal account by Anand Rām Mukhliṣ (Tazkira) and Mahdī Khān Astarābādī's Tārīkh-i Jahān-gushā-yi Nādirī."
    tags: [mughal, persian, india, nadir-shah, muhammad-shah, delhi, sack, peacock-throne]
    source_url: https://en.wikipedia.org/wiki/Nader_Shah%27s_invasion_of_the_Mughal_Empire
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # LATE MUGHAL DEATHS
  # =========================================================================

  - slug: death-of-muhammad-shah-rangila
    category: ruler_death
    title_en: Death of Emperor Muḥammad Shāh "Rangīla"
    title_ar: وفاة الإمبراطور محمد شاه «رنغيلا»
    title_fr: Mort de l'empereur Muḥammad Shâh « Rangîlâ »
    description_en: |
      Nāṣir al-Dīn Muḥammad Shāh — the twelfth Mughal emperor,
      called "Rangīla" ("the colourful") for the cultural
      flowering of Urdu poetry, music and miniature painting that
      adorned his court — died at Delhi after a reign of twenty-
      nine years. His was a reign of presiding catastrophe: the
      Maratha conquest of Mālwa and the Deccan, the secession of
      Hyderabad and Awadh as independent successor states, and
      above all Nādir Shāh's invasion of 1739, which he had
      personally surrendered after the rout at Karnāl. The empire
      he passed to his son Aḥmad Shāh Bahādur was a shell of the
      one Aurangzeb had ruled forty years earlier, with effective
      sovereignty reduced to the Delhi-Agra region and most
      provinces de facto independent. He was buried in the Niẓām
      al-Dīn dargāh complex outside Delhi. EI2 places his death
      in 1161 AH (April 1748).
    description_ar: |
      توفي ناصر الدين محمد شاه — ثاني عشر أباطرة المغول، الملقب
      «رنغيلا» («الملوّن») لما عرف به بلاطه من ازدهار ثقافي للشعر
      الأردي والموسيقى والرسم المنمنم — بدلهي بعد عهد امتدّ تسعاً
      وعشرين سنة. وكان عهده عهد كوارث متتابعة: فتح المرهتيين
      «مالوا» والدكن، وانفصال «حيدر آباد» و«أوده» كدويلات وراثية
      مستقلة، وفوق ذلك كله غزو نادر شاه سنة ١٧٣٩ م الذي استسلم
      له شخصياً بعد كارثة كرنال. وكانت الدولة التي أورثها لابنه
      «أحمد شاه بهادر» ظلَّ ما حكمه أورنكزيب قبل أربعين سنة فقط،
      وقد انكمش حكمها الفعلي على إقليم دلهي–أكره وصارت معظم
      الأقاليم دولاً مستقلة بحكم الواقع. ودفن في مجمع «نظام الدين
      أولياء» خارج دلهي. وتحدد دائرة المعارف الإسلامية وفاتَه
      في سنة ١١٦١ هـ (أبريل ١٧٤٨ م).
    description_fr: |
      Nâṣir al-Dīn Muḥammad Shâh — douzième empereur moghol,
      surnommé « Rangîlâ » (« le coloré ») pour le rayonnement
      culturel de la poésie ourdoue, de la musique et de la
      miniature qui ornèrent sa cour — mourut à Delhi après un
      règne de vingt-neuf ans. Son règne fut celui d'une
      catastrophe de présidence : conquête marathe du Mâlwâ et
      du Deccan, sécession de Hyderabad et d'Awadh en États
      successeurs indépendants, et surtout l'invasion de Nâdir
      Shâh en 1739, à laquelle il s'était personnellement rendu
      après la déroute de Karnâl. L'empire qu'il transmit à son
      fils Aḥmad Shâh Bahâdur n'était plus que l'ombre de celui
      qu'avait gouverné Aurangzeb quarante ans plus tôt, la
      souveraineté effective réduite à la région Delhi-Agra et
      la plupart des provinces de facto indépendantes. Il fut
      enseveli dans le complexe du dargâh de Niẓâm al-Dīn près
      de Delhi. L'EI2 place sa mort en 1161 H (avril 1748).
    canonical_hijri: {year: 1161, month: 4, day: 27, precision: day}
    canonical_gregorian: {date: 1748-04-26, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the death of Muḥammad Shāh in late Rabīʿ al-Thānī 1161 / April 1748 at Delhi after a 29-year reign."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the late-Mughal court chronicle Tārīkh-i Muḥammadī of Mīrzā Muḥammad Bakhshī."
    tags: [mughal, india, muhammad-shah, ruler-death, delhi, urdu, rangila]
    source_url: https://en.wikipedia.org/wiki/Muhammad_Shah
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-ahmad-shah-bahadur
    category: ruler_death
    title_en: Death of Emperor Aḥmad Shāh Bahādur
    title_ar: وفاة الإمبراطور أحمد شاه بهادر
    title_fr: Mort de l'empereur Aḥmad Shâh Bahâdur
    description_en: |
      Mujāhid al-Dīn Abū Naṣir Muḥammad Aḥmad Shāh Bahādur —
      thirteenth Mughal emperor, son of Muḥammad Shāh "Rangīla"
      and the dancer Ūdham Bāī — died at Delhi after thirteen
      years in confinement, having been deposed and blinded by
      his vizier ʿImād al-Mulk in Shaʿbān 1167 (June 1754) and
      replaced by ʿĀlamgīr II. His brief active reign (1748–1754)
      was dominated by Aḥmad Shāh Durrānī's first two invasions
      of north India in 1748 and 1751, the latter producing the
      cession of the Punjab to the Durrānī state, and by the
      assertion of effective control over Delhi by his vizier.
      He was the last Mughal emperor under whom imperial
      administration nominally extended much beyond the Delhi
      hinterland; after him the empire was a Mughal in name and
      a Marāṭhā or Durrānī protectorate in fact. He was buried
      in the precinct of the Mubārak Bēgum mosque in Old Delhi.
      EI2 places his death in 1188 AH / January 1775.
    description_ar: |
      توفي مجاهد الدين أبو ناصر محمد أحمد شاه بهادر — ثالث عشر
      أباطرة المغول، ابن محمد شاه «رنغيلا» و«أُدهم باي» الراقصة —
      بدلهي بعد ثلاث عشرة سنة في الحبس، إذ خلعه وزيره «عماد
      الملك» وسمل عينيه في شعبان ١١٦٧ هـ (يونيو ١٧٥٤ م) واستبدل
      به «عالمكير الثاني». وامتدّ عهد حكمه الفعلي القصير
      (١٧٤٨–١٧٥٤ م) في غمار غزوتي أحمد شاه الدراني الأوليين
      لشمال الهند سنتي ١٧٤٨ و١٧٥١، وكانت ثانيتهما سبباً في تنازل
      المغول عن البنجاب لدولة الدرانيين، وفي بسط وزيره سيطرته
      الفعلية على دلهي. وكان آخر إمبراطور مغولي امتدّ في عهده
      الحكم الإمبراطوري — ولو اسمياً — إلى أبعد من ضاحية دلهي،
      فبعده صار المغول مغولاً بالاسم ومحميةً مرهتية أو درانية في
      الواقع. ودفن في حرم مسجد «مبارك بيغم» بدلهي القديمة. وتحدد
      دائرة المعارف الإسلامية وفاته في سنة ١١٨٨ هـ / يناير
      ١٧٧٥ م.
    description_fr: |
      Mujāhid al-Dīn Abū Naṣir Muḥammad Aḥmad Shâh Bahâdur —
      treizième empereur moghol, fils de Muḥammad Shâh « Rangîlâ »
      et de la danseuse Ûdham Bâî — mourut à Delhi après treize
      ans de réclusion, ayant été déposé et aveuglé par son vizir
      ʿImâd al-Mulk en shaʿbân 1167 (juin 1754) et remplacé par
      ʿĀlamgīr II. Son bref règne effectif (1748–1754) fut
      dominé par les deux premières invasions d'Aḥmad Shâh
      Durrānî en Inde du Nord en 1748 et 1751, la seconde
      aboutissant à la cession du Pendjab à l'État durrânî, et
      par l'affermissement du contrôle effectif de Delhi par
      son vizir. Il fut le dernier empereur moghol sous lequel
      l'administration impériale s'étendit nominalement au-delà
      de l'arrière-pays de Delhi; après lui l'empire fut moghol
      de nom et marathe ou durrânî de fait. Il fut enseveli
      dans l'enceinte de la mosquée Mubârak Bēgum dans le Vieux
      Delhi. L'EI2 place sa mort en 1188 H / janvier 1775.
    canonical_hijri: {year: 1188, month: 10, day: 28, precision: day}
    canonical_gregorian: {date: 1775-01-01, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 dates the death of Aḥmad Shāh Bahādur to early 1188 AH (January 1775) at Delhi after thirteen years of post-deposition confinement."
      - source_key: editorial
        notes: "Editorial summary cross-checked against Ghulām Ḥusayn Khān's Siyar al-Mutaʾakhkhirīn — the authoritative late-Mughal chronicle."
    tags: [mughal, india, ahmad-shah-bahadur, ruler-death, delhi, durrani]
    source_url: https://en.wikipedia.org/wiki/Ahmad_Shah_Bahadur
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-shah-alam-ii
    category: ruler_death
    title_en: Death of Emperor Shāh ʿĀlam II
    title_ar: وفاة الإمبراطور شاه عالم الثاني
    title_fr: Mort de l'empereur Shâh ʿĀlam II
    description_en: |
      Jalāl al-Dīn ʿAlī Jawhar Shāh ʿĀlam II — fifteenth Mughal
      emperor — died at Delhi after one of the longest and most
      tormented reigns in the dynasty's history. He had succeeded
      his murdered father ʿĀlamgīr II in 1759 in absentia at
      Allāhābād; commanded the Mughal field army at the disaster
      of Buxar against the East India Company in 1764; lived in
      Allāhābād under Company protection until 1772; returned to
      Delhi under Maratha protection; and in Shaʿbān 1202 (1788)
      was blinded by the Rohilla amīr Ghulām Qādir during a
      sixty-eight-day occupation of the Red Fort, after which he
      reigned for another eighteen years as a blind sovereign in
      a city he no longer ruled. After Lord Lake's defeat of the
      Marathas at Delhi in 1803, the British East India Company
      took over his nominal protection, and the imperial
      pension-state that the British and the Mughals jointly
      maintained until 1857 dates from this transition. His coins
      continued to be struck in his name across India until his
      death. EI2 places his death on 7 Ramaḍān 1221 / 19 November
      1806.
    description_ar: |
      توفي جلال الدين علي جوهر شاه عالم الثاني — خامس عشر أباطرة
      المغول — بدلهي بعد واحد من أطول العهود وأشدها قساوة في
      تاريخ الدولة. خلف أباه «عالمكير الثاني» المقتول سنة ١٧٥٩ م
      وهو غائب في «إله آباد»، وقاد الجيش المغولي الميداني في
      كارثة «بكسر» ضد شركة الهند الشرقية الإنجليزية سنة ١٧٦٤،
      وعاش في «إله آباد» تحت حماية الشركة حتى ١٧٧٢، ثم عاد إلى
      دلهي تحت حماية المرهتيين. وفي شعبان ١٢٠٢ هـ (١٧٨٨ م) سمل
      عينيه الأمير الروهيلي «غلام قادر» خلال احتلاله القلعة الحمراء
      ثمانية وستين يوماً، فحكم بعدها ثماني عشرة سنة سلطاناً أعمى
      في مدينة لم يعد يحكمها. وبعد هزيمة اللورد «ليك» للمرهتيين
      في دلهي سنة ١٨٠٣ م تولّت شركة الهند الشرقية الحماية الاسمية
      عليه، ومن هذا الانتقال انبثقت دولة معاش الإمبراطور التي
      ظلّ الإنجليز والمغول يديرونها معاً إلى ١٨٥٧ م. وظلت
      عملاته تُسكّ باسمه في عموم الهند إلى وفاته. وتحدد دائرة
      المعارف الإسلامية وفاته في ٧ رمضان ١٢٢١ هـ / ١٩ نوفمبر
      ١٨٠٦ م.
    description_fr: |
      Jalāl al-Dīn ʿAlī Jawhar Shâh ʿĀlam II — quinzième empereur
      moghol — mourut à Delhi après l'un des règnes les plus
      longs et les plus tourmentés de l'histoire de la dynastie.
      Il avait succédé à son père assassiné ʿĀlamgīr II en 1759
      en absence à Allâhâbâd; commandé l'armée moghole de
      campagne au désastre de Buxar contre la Compagnie
      anglaise des Indes orientales en 1764; vécu à Allâhâbâd
      sous protection de la Compagnie jusqu'en 1772; et était
      revenu à Delhi sous protection marathe; en shaʿbân 1202
      (1788) il fut aveuglé par l'émir rohilla Ghulām Qâdir
      durant une occupation de soixante-huit jours du Fort
      rouge, après quoi il régna dix-huit autres années comme
      souverain aveugle dans une ville qu'il ne gouvernait plus.
      Après la défaite des Marathes par Lord Lake à Delhi en
      1803, la Compagnie anglaise reprit sa protection nominale,
      et l'état-pension impérial que les Britanniques et les
      Moghols entretinrent conjointement jusqu'en 1857 date de
      cette transition. Ses monnaies continuèrent d'être frappées
      à son nom à travers l'Inde jusqu'à sa mort. L'EI2 place
      sa mort le 7 ramaḍân 1221 / 19 novembre 1806.
