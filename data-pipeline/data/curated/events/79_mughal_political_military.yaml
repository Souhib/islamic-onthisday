  - slug: accession-of-akbar-at-kalanaur
    category: political_event
    title_en: Accession of Akbar at Kalanaur
    title_ar: تولية أكبر العرش في كلانور
    title_fr: Accession d'Akbar au trône à Kalanaur
    description_en: |
      Jalāl al-Dīn Muḥammad Akbar, aged thirteen, was enthroned in
      a hastily-built brick platform (the *takht-i-akbarī*, still
      standing) in the garden of Kalānūr in the Punjab, twenty-six
      days after the death of his father Humāyūn at Delhi. The
      Mughal position was precarious: most of northern India
      remained in the hands of the Sūr restoration regime under
      the Hindu general Hemū, who had retaken Agra and Delhi
      within weeks of Humāyūn's death. The young emperor was
      proclaimed under the regency of the Turkoman noble Bayrām
      Khān, who would govern the empire for the first four years
      of the reign. The Kalānūr ceremony — held in the open air
      because no fortified Mughal capital remained — became one
      of the iconic scenes of Mughal historiography; Abū al-Faẓl
      records it in the *Akbarnāma*, dated to 2 Rabīʿ al-Thānī
      963 AH (14 February 1556 Julian). Akbar would reign for
      nearly half a century and consolidate Mughal rule across
      most of the subcontinent.
    description_ar: |
      جُلس جلال الدين محمد أكبر — وعمره ثلاث عشرة سنة — على عرش
      من الآجر بُني على عجل (هو «تخت أكبري» الذي ما زال قائماً
      إلى اليوم) في بستان كلانور بإقليم البنجاب، بعد ستة وعشرين
      يوماً من وفاة أبيه همايون بدلهي. وكان الوضع المغولي مزرياً:
      فمعظم شمال الهند كان في قبضة دولة السوريين العائدة بقيادة
      القائد الهندوسي «هيمو»، الذي أَعَاد فتح أَكْرَه ودلهي في
      أسابيع من وفاة همايون. ونُصِّب الإمبراطور الفتى تحت وصاية
      الأمير التركماني بَيرام خان الذي حكم الدولة في السنوات
      الأربع الأولى من عهده. وقد صارت مراسم كلانور — التي
      أُقيمت في العراء لانعدام عاصمة مغولية محصنة آنئذٍ —
      مشهداً من المشاهد الشهيرة في تاريخ الكتابة المغولية،
      ويسجّلها أبو الفضل في «أكبرنامه» في يوم ٢ ربيع الآخر
      ٩٦٣ هـ (١٤ فبراير ١٥٥٦ يولياني). وسيحكم أكبر قرابة نصف
      قرن وسيرسخ الحكم المغولي على عامة شبه القارة.
    description_fr: |
      Jalāl al-Dīn Muḥammad Akbar, âgé de treize ans, fut intronisé
      sur une plateforme de briques bâtie en hâte (le *takht-i-
      akbarī*, encore debout) dans le jardin de Kalânûr au Pendjab,
      vingt-six jours après la mort de son père Humâyûn à Delhi.
      La position moghole était précaire : la plus grande partie
      de l'Inde du Nord restait aux mains du régime sūr restauré
      sous le général hindou Hemû, qui avait repris Agra et Delhi
      en quelques semaines après la mort de Humâyûn. Le jeune
      empereur fut proclamé sous la régence du noble turcoman
      Bayrâm Khân, qui gouvernerait l'empire les quatre premières
      années du règne. La cérémonie de Kalânûr — tenue en plein
      air faute de capitale moghole fortifiée — devint l'une des
      scènes emblématiques de l'historiographie moghole; Abû
      al-Faḍl la consigne dans l'*Akbarnâmâ* à la date du 2 rabīʿ
      II 963 H (14 février 1556 julien). Akbar régnerait près
      d'un demi-siècle et consoliderait la domination moghole
      sur la quasi-totalité du sous-continent.
    canonical_hijri: {year: 963, month: 4, day: 2, precision: day}
    canonical_gregorian: {date: 1556-02-24, precision: day, method: attested}
    julian_date: 1556-02-14
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the accession at Kalānūr on 2 Rabīʿ al-Thānī 963 / 14 February 1556 (Julian) under the regency of Bayrām Khān."
      - source_key: editorial
        notes: "Editorial summary cross-checked against Abū al-Faẓl's Akbarnāma, the official chronicle of the reign."
    tags: [mughal, india, akbar, accession, kalanaur, bayram-khan, punjab]
    source_url: https://en.wikipedia.org/wiki/Akbar
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: second-battle-of-panipat
    category: battle
    title_en: Second Battle of Panipat — Akbar Defeats Hemu
    title_ar: معركة بانيبات الثانية — أكبر يهزم هيمو
    title_fr: Seconde bataille de Pânipat — Akbar défait Hemû
    description_en: |
      Eight months after Akbar's accession at Kalānūr, the
      thirteen-year-old emperor's regent Bayrām Khān engaged the
      Hindu general Hemū at Panipat — the same plain on which
      Bābur had founded the dynasty thirty years earlier. Hemū,
      a salt-trader's son who had risen to be the chief minister
      of the Sūrid sultan ʿĀdil Shāh, had taken Delhi and Agra
      after Humāyūn's death and had himself proclaimed *Rāja
      Bikramjīt* — the first Hindu ruler in Delhi for centuries.
      The battle was decided by a single arrow that struck Hemū
      in the eye while he was leading his elephant-mounted centre
      from the front; his army, leaderless, collapsed. The
      captured and unconscious Hemū was brought before the boy-
      emperor and beheaded — by Bayrām Khān according to most
      accounts, by the symbolic stroke of Akbar's sword according
      to the Mughal court history. The victory restored Delhi to
      Mughal rule and effectively secured the dynasty for the
      half-century of Akbar's reign. Modern academic sources
      including EI2 place the battle on 2 Muḥarram 964 / 5 November
      1556 (Julian).
    description_ar: |
      بعد ثمانية أشهر من تولية أكبر العرش في كلانور، خاض الأمير
      بَيرام خان وصيُّ الإمبراطور الفتى ابنِ الثلاث عشرة سنةً
      المعركةَ في بانيبات — في السهل ذاته الذي أسس فيه بابر الدولة
      المغولية قبل ثلاثين سنة — ضد القائد الهندوسي «هيمو». وكان
      هيمو ابن تاجر ملح ارتقى حتى صار وزيراً أعظم لسلطان السوريين
      عادل شاه، فاستولى بعد وفاة همايون على دلهي وأكره وأَعلَن
      نفسه «راجا بكرماجيت» — أول حاكم هندوسي يحكم دلهي منذ قرون.
      وحُسمت المعركة بسهم واحد أصاب هيمو في عينه وهو يقود قلب
      الجيش من على ظهر فيله، فانهار جنده الذين فقدوا قائدهم.
      وأُحضر هيمو الأسير المغمى عليه أمام الإمبراطور الفتى فقُطعت
      رأسه — بيد بَيرام خان عند جمهور المؤرخين، أو بضربة رمزية
      من سيف أكبر عند مؤرخي البلاط المغولي. وأَعَاد النصر دلهي
      إلى الحكم المغولي وأَمَّن للدولة عمراً امتد نصف قرن من حكم
      أكبر. وتحدد المصادر الأكاديمية الحديثة — ومنها دائرة
      المعارف الإسلامية — يومَ المعركة في ٢ محرم ٩٦٤ هـ
      (٥ نوفمبر ١٥٥٦ يولياني).
    description_fr: |
      Huit mois après l'accession d'Akbar à Kalânûr, le régent
      Bayrâm Khân engagea le combat avec le général hindou Hemû
      à Pânipat — la plaine même où Bâbur avait fondé la dynastie
      trente ans plus tôt — pour le compte du jeune empereur âgé
      de treize ans. Hemû, fils d'un marchand de sel parvenu au
      rang de premier ministre du sultan sūr ʿĀdil Shâh, avait
      pris Delhi et Agra après la mort de Humâyûn et s'était fait
      proclamer *Râja Bikramjît* — premier souverain hindou de
      Delhi depuis des siècles. La bataille fut décidée par une
      flèche unique qui frappa Hemû à l'œil alors qu'il menait
      depuis l'avant son centre d'éléphants; son armée, privée
      de chef, s'effondra. Le captif Hemû inconscient fut amené
      devant l'empereur-enfant et décapité — par Bayrâm Khân
      selon la plupart des récits, par un coup symbolique du
      sabre d'Akbar selon l'historiographie de la cour moghole.
      La victoire rendit Delhi à la domination moghole et
      sécurisa effectivement la dynastie pour le demi-siècle
      du règne d'Akbar. Les sources académiques modernes — dont
      l'EI2 — placent la bataille le 2 muḥarram 964 / 5 novembre
      1556 (julien).
    canonical_hijri: {year: 964, month: 1, day: 2, precision: day}
    canonical_gregorian: {date: 1556-11-15, precision: day, method: attested}
    julian_date: 1556-11-05
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the engagement on 2 Muḥarram 964 / 5 November 1556 (Julian) and identifies Bayrām Khān as battle commander for the boy-emperor Akbar."
      - source_key: editorial
        notes: "Editorial summary cross-checked against Abū al-Faẓl's Akbarnāma and Niẓām al-Dīn Aḥmad's Ṭabaqāt-i Akbarī."
    tags: [mughal, battle, india, akbar, hemu, panipat, bayram-khan, sur]
    source_url: https://en.wikipedia.org/wiki/Second_Battle_of_Panipat
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: akbar-conquest-of-gujarat
    category: conquest
    title_en: Akbar's Conquest of Gujarat
    title_ar: فتح أكبر لكجرات
    title_fr: Conquête du Gujarat par Akbar
    description_en: |
      The annexation of the Sultanate of Gujarat — until then an
      independent Muslim sultanate ruled by the Muẓaffarid dynasty
      — gave Akbar his first sea-coast and a major source of
      maritime revenue. The campaign opened in late 980 AH (1573
      CE) when Akbar marched from Agra and entered Aḥmadābād
      without resistance; the deposed Sultan Muẓaffar III had
      already fled. The decisive engagement followed at Sarnāl on
      the Mahī river, where Akbar — riding ahead of his main army
      with a force reportedly numbering only about two hundred —
      defeated a far larger Mīrzā contingent in a textbook example
      of personal command. A second campaign the following year
      crushed a rebellion led by Iʿtimād Khān and the Mīrzās,
      after which Akbar made the celebrated forty-three-day forced
      march from Fatḥpūr Sīkrī to Aḥmadābād (about 800 km) to
      surprise and destroy the rebel army at the second Battle of
      Aḥmadābād. The conquest opened Mughal access to the Gujarati
      ports of Sūrat and Cambay — the gateway through which the
      ḥajj fleet and the Indian Ocean spice trade thereafter
      flowed under Mughal supervision.
    description_ar: |
      ضمّ أكبر سلطنةَ كجرات — التي كانت حتى ذلك الحين سلطنةً
      مسلمة مستقلة يحكمها بنو المظفر — أكسبه أول ساحل بحري له
      ومصدراً ضخماً للعوائد البحرية. افتتحت الحملة في أواخر سنة
      ٩٨٠ هـ (١٥٧٣ م) إذ سار أكبر من أَكْرَه فدخل أحمد آباد دون
      مقاومة، وكان السلطان المعزول مظفر الثالث قد فرّ قبله.
      وانعقدت الموقعة الفاصلة عند «سرنال» على نهر «ماهي»، حيث
      هزم أكبر — متقدماً جيشَه الرئيسي على رأس قوة لا يجاوز
      عددها — على ما يُروى — مئتي فارس — جيشَ المرزا الأكبر
      منه بمراحل، وكان مثالاً نموذجياً للقيادة الشخصية. وفي
      السنة التالية أخمدت الحملة الثانية ثورة قادها اعتماد خان
      وأسرة المرزا، فقام أكبر بعدها بمسيرته الشهيرة في ثلاثة
      وأربعين يوماً من فاتحبور سيكري إلى أحمد آباد (نحو ٨٠٠ كم)
      ليفاجئ الثائرين فيدمرهم في معركة أحمد آباد الثانية. وفتح
      هذا الضمُّ للمغول مرافئ كجرات — سورة وكنباية — التي
      صار من خلالها أسطولُ الحج وتجارةُ التوابل في المحيط
      الهندي يجريان تحت الإشراف المغولي.
    description_fr: |
      L'annexion du sultanat du Gujarat — jusqu'alors un sultanat
      musulman indépendant gouverné par la dynastie muẓaffaride —
      donna à Akbar son premier littoral maritime et une source
      majeure de revenus marchands. La campagne s'ouvrit fin
      980 H (1573 EC) quand Akbar marcha d'Agra et entra à
      Aḥmadābād sans résistance; le sultan déposé Muẓaffar III
      avait déjà pris la fuite. L'engagement décisif suivit à
      Sarnâl sur la rivière Mahī, où Akbar — devançant le gros
      de son armée à la tête d'une troupe qui n'aurait, dit-on,
      pas dépassé deux cents cavaliers — défit un contingent
      mīrzā bien plus nombreux dans un exemple manuel de
      commandement personnel. Une seconde campagne l'année
      suivante écrasa une rébellion menée par Iʿtimâd Khân et
      les Mīrzās, après quoi Akbar effectua sa célèbre marche
      forcée de quarante-trois jours de Fatḥpūr Sīkrī à Aḥmadābād
      (environ 800 km) pour surprendre et détruire l'armée rebelle
      à la seconde bataille d'Aḥmadābād. La conquête ouvrit aux
      Moghols les ports gujaratis de Sûrat et Cambay — la porte
      par laquelle la flotte du ḥajj et le commerce des épices
      de l'océan Indien passaient désormais sous supervision
      moghole.
    canonical_hijri: {year: 980, precision: year}
    canonical_gregorian: {date: 1573-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 dates the conquest of Gujarat to 980 AH (1573 CE) and notes the strategic importance of the maritime ports of Sūrat and Cambay."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the Akbarnāma's account of the 1572–73 and 1573 campaigns and the second forced march to Aḥmadābād."
    tags: [mughal, conquest, india, akbar, gujarat, surat, cambay, hajj]
    source_url: https://en.wikipedia.org/wiki/Mughal_conquest_of_Gujarat
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-haldighati
    category: battle
    title_en: Battle of Haldighati — Akbar's Army against Maharana Pratap
    title_ar: معركة هلديغاتي — جيش أكبر في مواجهة مهارانا براتاب
    title_fr: Bataille de Haldighâtî — l'armée d'Akbar contre Mahârâṇâ Pratâp
    description_en: |
      A pitched battle in a narrow defile of the Aravalli range
      west of Udaipur between the Mughal field army commanded by
      Rājā Mān Singh of Āmber — a Hindu Rajput in Akbar's service
      and the most senior of his Hindu generals — and the forces
      of Mahārāṇā Pratāp Singh of Mewār, the Rajput prince who had
      refused to submit to Mughal suzerainty after Akbar's other
      Rajput houses had accepted vassal status. The action lasted
      a single morning. Pratāp's smaller force — including a
      contingent of Pashtun mercenaries under Ḥakīm Khān Sūr —
      held off the Mughal van in fierce fighting; Pratāp himself
      famously charged Mān Singh's elephant and barely escaped
      the field on his wounded horse Chetak. The Mughal centre
      eventually broke the Mewār line and held the field, but
      Pratāp escaped into the Aravallis where he conducted a
      guerrilla resistance for the remaining twenty-one years of
      his life — recovering most of the lost territory by his
      death in 1597. Modern academic sources place the battle on
      18 June 1576 (Julian).
    description_ar: |
      معركة ميدانية في مضيق ضيق بسلسلة جبال أرافالي غربي أودَيبور
      بين الجيش الميداني المغولي بقيادة الراجا «مان سينغ» صاحب
      أَمبير — وهو راجبوتي هندوسي في خدمة أكبر وأكبر قواده
      الهندوس — وقوات «مهارانا براتاب سينغ» أمير ميوار، الراجبوتي
      الذي رفض الإذعان للسيادة المغولية بعد أن قبلت سائر بيوت
      الراجبوت أن تكون من الأتباع. ودارت المعركة في صبيحة
      واحدة. صمدت قوة براتاب الأقل عدداً — وفيها كتيبة من المرتزقة
      البشتون بقيادة «حكيم خان السوري» — أمام طليعة المغول في
      قتال شديد، وشَنَّ براتاب نفسه هجومه الشهير على فيل مان
      سينغ، ولم ينجُ من الميدان إلا بفرسه الجريح «شيتاك». ثم
      كسر القلب المغولي صفّ ميوار في النهاية واحتفظ بالميدان،
      لكن براتاب لجأ إلى جبال أرافالي حيث شنّ حرب عصابات إحدى
      وعشرين سنة هي ما بقي من عمره — استعاد فيها معظم الأرض
      المسلوبة قبل وفاته سنة ١٥٩٧ م. وتحدد المصادر الأكاديمية
      الحديثة يومَ المعركة في ١٨ يونيو ١٥٧٦ يولياني.
    description_fr: |
      Bataille rangée dans un défilé étroit des monts Aravalli
      à l'ouest d'Udaipur entre l'armée moghole de campagne
      commandée par le râjâ Mân Singh d'Âmber — Rajput hindou
      au service d'Akbar et le plus haut placé de ses généraux
      hindous — et les forces du mahârâṇâ Pratâp Singh de
      Mewâr, prince Rajput qui avait refusé de se soumettre à
      la suzeraineté moghole là où les autres maisons Rajput
      l'avaient acceptée. L'action ne dura qu'une matinée. La
      troupe plus restreinte de Pratâp — comprenant un contingent
      de mercenaires pashtouns sous Ḥakīm Khân Sûr — tint en
      échec l'avant-garde moghole dans un combat acharné; Pratâp
      lui-même chargea l'éléphant de Mân Singh dans son fameux
      assaut et n'échappa au champ qu'à grand-peine sur son
      cheval blessé Chetak. Le centre moghol finit par enfoncer
      la ligne de Mewâr et garda le terrain, mais Pratâp se
      retira dans les Aravalli où il conduisit une résistance
      de guérilla durant les vingt-et-un années qui lui restaient
      — récupérant la plus grande partie du territoire perdu
      avant sa mort en 1597. Les sources académiques modernes
      placent la bataille le 18 juin 1576 (julien).
    canonical_hijri: {year: 984, month: 3, day: 21, precision: day}
    canonical_gregorian: {date: 1576-06-28, precision: day, method: attested}
    julian_date: 1576-06-18
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the battle on 18 June 1576 (Julian) and identifies Mān Singh of Āmber as Akbar's commander against Pratāp."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the Akbarnāma and modern academic studies of the Mughal–Mewār conflict."
    tags: [mughal, battle, india, akbar, mewar, rajput, man-singh, pratap]
    source_url: https://en.wikipedia.org/wiki/Battle_of_Haldighati
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # JAHANGIR — DEATH
  # =========================================================================

  - slug: death-of-jahangir
    category: ruler_death
    title_en: Death of Emperor Jahāngīr
    title_ar: وفاة الإمبراطور جهانكير
    title_fr: Mort de l'empereur Jahângîr
    description_en: |
      Nūr al-Dīn Muḥammad Salīm — fourth Mughal emperor under the
      reign-name Jahāngīr ("Conqueror of the World"), son of
      Akbar — died on the road from Kashmir to Lahore at the
      relay station of Bhimber in the Pir Panjal foothills, of
      asthma and the long effects of opium and alcohol use. His
      twenty-two-year reign saw the consolidation of Akbar's
      conquests rather than fresh territorial expansion, the
      first English embassy under Sir Thomas Roe (1615 –1619), and
      the rise to political dominance of his Persian-born consort
      Nūr Jahān, who governed in his name during his last decade.
      The succession passed to his son Khurram (Shāh Jahān) after
      a three-month war of succession against his other brothers.
      He was buried at Shahdara on the banks of the Ravi outside
      Lahore, where his widow Nūr Jahān raised the marble tomb
      that still stands. Modern academic sources place his death
      on 28 October 1627 (Julian) / 28 Ṣafar 1037 AH.
    description_ar: |
      توفي نور الدين محمد سليم — رابع أباطرة المغول باسم الحكم
      «جهانكير» («فاتح الدنيا»)، ابن الإمبراطور أكبر — على
      الطريق من كشمير إلى لاهور في محطة «بهيمبر» في تخوم سلسلة
      «بير بانجال»، بسبب الربو والآثار المتراكمة لتعاطي الأفيون
      والمسكر. وشهد عهده الذي امتدّ اثنتين وعشرين سنة ترسيخ
      فتوحات أكبر دون توسعات إقليمية كبيرة جديدة، ووصول السفارة
      الإنجليزية الأولى بقيادة السير توماس رو (١٦١٥–١٦١٩)،
      وصعودَ زوجته الفارسية «نور جهان» إلى السيطرة السياسية،
      حتى صارت تحكم باسمه في عشريته الأخيرة. وانتقل المُلك إلى
      ابنه «خرم» (شاه جهان) بعد حرب أهلية على العرش امتدت
      ثلاثة أشهر مع إخوته. ودفن في «شاهدره» على ضفة نهر «راوي»
      خارج لاهور، حيث رفعت أرملته نور جهان قبره الرخامي الذي
      ما زال قائماً. وتحدد المصادر الأكاديمية الحديثة يوم
      وفاته في ٢٨ أكتوبر ١٦٢٧ يولياني / ٢٨ صفر ١٠٣٧ هـ.
    description_fr: |
      Nūr al-Dīn Muḥammad Salīm — quatrième empereur moghol sous
      le nom de règne de Jahângîr (« Conquérant du monde »), fils
      d'Akbar — mourut sur la route du Cachemire vers Lahore au
      relais de Bhimber dans les contreforts du Pir Panjal,
      d'asthme et des effets cumulés de l'opium et de l'alcool.
      Son règne de vingt-deux ans vit la consolidation des
      conquêtes d'Akbar plutôt qu'une expansion territoriale
      nouvelle, la première ambassade anglaise sous Sir Thomas
      Roe (1615 –1619) et la montée à la prééminence politique
      de son épouse persane Nûr Jahân, qui gouverna en son nom
      durant sa dernière décennie. La succession passa à son
      fils Khurram (Shâh Jahân) après une guerre de succession
      de trois mois contre ses autres frères. Il fut enseveli
      à Shahdara sur la rive du Ravi près de Lahore, où sa
      veuve Nûr Jahân éleva le tombeau de marbre qui se dresse
      encore. Les sources académiques modernes placent sa mort
      le 28 octobre 1627 (julien) / 28 ṣafar 1037 H.
    canonical_hijri: {year: 1037, month: 2, day: 28, precision: day}
    canonical_gregorian: {date: 1627-11-07, precision: day, method: attested}
    julian_date: 1627-10-28
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 dates the death to 28 Ṣafar 1037 / 28 October 1627 at Bhimber on the road from Kashmir to Lahore."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the official Mughal court chronicle (Tūzuk-i Jahāngīrī continuation by Muʿtamad Khān)."
    tags: [mughal, india, jahangir, ruler-death, kashmir, lahore, nur-jahan]
    source_url: https://en.wikipedia.org/wiki/Jahangir
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # AURANGZEB — ACCESSION
  # =========================================================================

  - slug: accession-of-aurangzeb
    category: political_event
    title_en: Accession of Aurangzeb after the Siege of Agra
    title_ar: تولي أورنكزيب الحكم بعد حصار أكره
    title_fr: Accession d'Aurangzeb après le siège d'Agra
    description_en: |
      Muḥyī al-Dīn Muḥammad Aurangzeb formally ascended the
      Mughal throne under the regnal title ʿĀlamgīr ("Seizer of
      the World") at Delhi after a year-long war of succession
      against his three brothers — Dārā Shukōh, Shāh Shujāʿ, and
      Murād Bakhsh — and the deposition and confinement of his
      father Shāh Jahān at Agra. After defeating Dārā at the
      battles of Dharmāt and Sāmugarh in spring 1658, Aurangzeb
      besieged the Agra Fort where his father held the Yamuna-side
      water gate. Within a few weeks, with water supplies cut,
      Shāh Jahān surrendered the fort; Aurangzeb confined him to
      the Mussamman Burj — the same octagonal pavilion from which
      Shāh Jahān looked across the river at the Tāj Maḥal — for
      the remaining seven years of his life. The first formal
      enthronement at Delhi was on 1 Dhū al-Qaʿda 1068 (31 July
      1658); a second more elaborate coronation followed on 5 June
      1659 after Dārā's capture and execution. Aurangzeb would
      reign for forty-nine years — the longest of any Mughal
      emperor — and extend the empire to its largest territorial
      footprint while presiding over its first signs of strain.
    description_ar: |
      اعتلى محيي الدين محمد أورنكزيب رسمياً عرش الدولة المغولية
      تحت لقب الحكم «عالمكير» («فاتح الدنيا») بدلهي بعد سنة من
      حرب أهلية على العرش مع إخوته الثلاثة — دارا شُكوه وشاه شجاع
      ومراد بخش — وبعد عزل أبيه شاه جهان وحبسه بأَكْرَه. وبعد
      هزيمة دارا في معركتي «درمات» و«ساموغرة» في ربيع ١٦٥٨ م،
      حاصر أورنكزيب قلعة أَكْرَه التي تحصن بها أبوه عند بوابة
      الماء على نهر «جومنا». فما هي إلا أسابيع حتى انقطعت
      المياه عن القلعة، فاستسلم شاه جهان، فعزله أورنكزيب في
      «المثمن برج» — الجناح الثماني الذي يطل على نهر جومنا
      ومنه كان شاه جهان يبصر تاج محل عبر النهر — ما بقي من
      عمره سبعَ سنواتٍ. وكانت أول مراسم تنصيب رسمية بدلهي في
      ١ ذي القعدة ١٠٦٨ هـ (٣١ يوليو ١٦٥٨ م)، ثم تلتها مراسم
      تنصيب ثانية أوسع في ٥ يونيو ١٦٥٩ م بعد القبض على دارا
      وإعدامه. وحكم أورنكزيب تسعاً وأربعين سنة — وهي أطول مدة
      حكم لإمبراطور مغولي — وامتدّت في عهده الدولة إلى أقصى
      اتساع لها وفي عهده ظهرت بوادر إنهاكها.
    description_fr: |
      Muḥyī al-Dīn Muḥammad Aurangzeb monta formellement sur le
      trône moghol sous le nom de règne d'ʿĀlamgîr (« Saisisseur
      du monde ») à Delhi après une guerre de succession d'un
      an contre ses trois frères — Dârâ Shukôh, Shâh Shujâʿ et
      Murâd Bakhsh — et la déposition et l'enfermement de son
      père Shâh Jahân à Agra. Après avoir vaincu Dârâ aux
      batailles de Dharmât et de Sâmugarh au printemps 1658,
      Aurangzeb assiégea le fort d'Agra où son père tenait la
      porte d'eau côté Yamunâ. En quelques semaines, l'eau
      coupée, Shâh Jahân rendit la forteresse; Aurangzeb le
      confina au Mussamman Burj — le pavillon octogonal d'où
      Shâh Jahân regardait par-delà la rivière le Taj Mahal —
      pour les sept années qui lui restaient à vivre. Le
      premier intronisation formelle à Delhi eut lieu le 1
      dhū al-qaʿda 1068 (31 juillet 1658); une seconde
      cérémonie plus solennelle suivit le 5 juin 1659 après
      la capture et l'exécution de Dârâ. Aurangzeb régnerait
      quarante-neuf ans — le règne le plus long de tous les
      empereurs moghols — et étendrait l'empire à son plus
      grand développement territorial tout en présidant ses
      premiers signes d'épuisement.
    canonical_hijri: {year: 1068, month: 11, day: 1, precision: day}
    canonical_gregorian: {date: 1658-08-10, precision: day, method: attested}
    julian_date: 1658-07-31
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 dates the first Delhi enthronement to 1 Dhū al-Qaʿda 1068 / 31 July 1658 (Julian), with the formal jashn-i jūlūs on 5 June 1659."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the Mughal court chronicles ʿĀlamgīrnāma and Maʾāthir-i ʿĀlamgīrī."
    tags: [mughal, india, aurangzeb, accession, agra, shah-jahan, dara-shukoh]
    source_url: https://en.wikipedia.org/wiki/Aurangzeb
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # MARATHA SACK OF SURAT
  # =========================================================================

  - slug: maratha-sack-of-surat-1664
    category: political_event
    title_en: Maratha Capture and Sack of Surat under Shivaji
    title_ar: استيلاء المرهتيين على سورة ونهبها بقيادة شيواجي
    title_fr: Prise et sac de Sûrat par les Marathes sous Shivâjî
    description_en: |
      Shivājī Bhonsle, founder of the emergent Maratha
      confederacy, raided and sacked the great Mughal port of
      Sūrat on the Gujarati coast — at that date the wealthiest
      port in the empire and the principal entrepôt of the Indian
      Ocean trade flowing into India, including the annual ḥajj
      fleet to the Hijaz. The city's Mughal governor, Ināyat
      Khān, retreated into the citadel; Shivājī's force occupied
      the city for six days, plundered the merchants' havelis
      and the European factory compounds (English, Dutch and
      French), and withdrew with what European observers
      estimated at one crore (10 million) rupees in cash, plate
      and goods, plus prisoners for ransom. The English East
      India Company factor George Oxenden mounted a defence of
      the English compound that was rewarded by the Crown; the
      Mughal failure to protect the port was a profound shock to
      Aurangzeb's prestige and prompted a hardening of the
      imperial military presence in the Deccan. The raid is
      conventionally dated to early January 1664; the date is
      Julian as the European factory records of the time used
      that calendar.
    description_ar: |
      أغار شيواجي بهونسلي مؤسس الكونفدرالية المرهتية الناشئة
      على ميناء سورة الكبرى المغولي على الساحل الكجراتي ونهبه —
      وكان حينئذ أغنى موانئ الدولة المغولية، والمرفأ الرئيسي
      لتجارة المحيط الهندي القادمة إلى الهند، بما في ذلك أسطول
      الحج السنوي إلى الحجاز. وتحصن والي المدينة المغولي
      «عناية خان» في القلعة، فاحتلت قوة شيواجي المدينة ستة أيام،
      ونهبت قصور التجار ومستودعات الشركات الأوروبية (الإنجليزية
      والهولندية والفرنسية)، ثم انسحبت بما قدّره الشهود الأوروبيون
      بـعشرة ملايين روبية نقداً وفضةً وسلعاً، فضلاً عن أسرى
      للفداء. وكان «جورج أوكسندن» وكيل شركة الهند الشرقية
      الإنجليزية قد دافع عن مجمع الإنجليز دفاعاً كافأه عليه التاج
      الإنجليزي، وكان عجز المغول عن حماية الميناء صدمةً قاسية
      لهيبة أورنكزيب وحفّز تشديد الوجود العسكري الإمبراطوري في
      الدكن. ومن المتعارف عليه تأريخ الغارة في مطلع يناير ١٦٦٤ م،
      وهو تاريخ يولياني وفق ما كانت تستعمله سجلات الشركات
      الأوروبية حينئذٍ.
    description_fr: |
      Shivâjî Bhonsle, fondateur de la confédération marathe
      naissante, attaqua et sacca le grand port moghol de Sûrat
      sur la côte du Gujarat — à cette date le port le plus riche
      de l'empire et le principal entrepôt du commerce de l'océan
      Indien arrivant en Inde, y compris la flotte annuelle du
      ḥajj vers le Hedjaz. Le gouverneur moghol de la ville,
      Ināyat Khân, se retira dans la citadelle; la force de
      Shivâjî occupa la ville six jours, pilla les havelis des
      marchands et les comptoirs européens (anglais, néerlandais
      et français), et se retira avec ce que les observateurs
      européens estimèrent à un crore (dix millions) de roupies
      en numéraire, vaisselle et marchandises, plus des
      prisonniers pour rançon. Le facteur de la Compagnie
      anglaise des Indes orientales, George Oxenden, organisa
      une défense du comptoir anglais que la Couronne récompensa;
      l'incapacité moghole à protéger le port fut un choc profond
      pour le prestige d'Aurangzeb et provoqua un durcissement
      de la présence militaire impériale au Deccan. Le raid est
      conventionnellement daté du début de janvier 1664; la date
      est julienne, le calendrier utilisé par les registres
      européens des comptoirs à l'époque.
    canonical_hijri: {year: 1074, month: 6, precision: month}
    canonical_gregorian: {date: 1664-01-16, precision: day, method: attested}
    julian_date: 1664-01-06
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the Maratha sack of Sūrat in early January 1664 (Julian) and details the six-day occupation under Shivājī while the governor remained in the citadel."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the English East India Company factory records of George Oxenden and the Mughal court history Maʾāthir-i ʿĀlamgīrī."
    tags: [mughal, maratha, india, surat, shivaji, aurangzeb, deccan]
    source_url: https://en.wikipedia.org/wiki/Battle_of_Surat
    importance: notable
