# Wave 79 of curated event additions (2026-04-27).
# 13 Mughal political-military events filling gaps left by earlier waves
# (which already cover First Battle of Panipat, deaths of Babur / Akbar /
# Aurangzeb / Bahadur Shah I / Bahadur Shah II, the Third Panipat, Plassey,
# Buxar, the 1857 fall of Delhi).
#
# Coverage here:
#   - Khanwa (1527), Ghaghra (1529)              — Babur's consolidation
#   - Akbar accession at Kalanaur, Second Panipat — 963–964 AH
#   - Conquest of Gujarat (1573), Haldighati (1576) — Akbar's expansion
#   - Death of Jahangir (1627), Aurangzeb at Agra (1658)
#   - Maratha sack of Surat under Shivaji (1664)
#   - Battle of Karnal + Nadir Shah's sack of Delhi (1739)
#   - Death of Muḥammad Shāh Rangīla (1748)
#   - Death of Aḥmad Shāh Bahādur (1775), Death of Shāh ʿĀlam II (1806)
#
# Sources: editorial compilation cross-checked against EI2 (modern academic
# reference). Mughal-era event chronology in Sunni classical sources is thin
# for India; EI2 is the gold-standard secondary work for these centuries.
# Where two sources are cited the entry is `cross_verified`; where only
# editorial attestation is available the entry is `single_source`.
#
# Editorial framing: factual military / political reporting. Mughal–Hindu
# wars (Khanwa, Haldighati) are reported as state-level military events
# without religious polemic. Nadir Shah's sack of Delhi is reported with
# the massacre as historical fact, neither glorified nor minimised.

events:
  # =========================================================================
  # BABUR — POST-PANIPAT CONSOLIDATION
  # =========================================================================

  - slug: battle-of-khanwa
    category: battle
    title_en: Battle of Khanwa — Babur Defeats Rana Sanga
    title_ar: معركة خانوا — بابر يهزم رانا سانغا
    title_fr: Bataille de Khanwa — Bâbur défait Rânâ Sangâ
    description_en: |
      A year after the founding victory at Panipat, Ẓahīr al-Dīn
      Muḥammad Bābur fought the Rajput confederacy of Rānā Sāṅgā
      of Mewar at the village of Khanwa, about sixty kilometres
      west of Agra. Rānā Sāṅgā had assembled the largest Rajput
      coalition in living memory — joined by Afghan amīrs of the
      defeated Lodi camp — to expel the new Mughal power before
      it could consolidate. As at Panipat the year before, Bābur
      drew up his army behind a defensive line of carts lashed
      together (the *araba* / Ottoman *taburcılık* tactic) and
      employed massed matchlock fire and field artillery against
      the Rajput cavalry charge. The matchlocks and culverins of
      Mustafa Rūmī broke the Rajput formation; Sāṅgā was wounded
      and carried from the field, and the survivors withdrew. The
      victory eliminated the only confederation in northern India
      capable of resisting Bābur and effectively founded Mughal
      rule beyond a single battle. Bābur recorded the engagement
      in detail in the *Bāburnāma*. Classical Sunni chronicles for
      Mughal India are thin; EI2 and the modern editions of the
      *Bāburnāma* place the battle on 13 Jumādā I 933 AH.
    description_ar: |
      بعد عام واحد من نصر بانيبات التأسيسي، خاض ظهير الدين محمد
      بابر معركة في قرية «خانوا» على نحو ستين كيلومتراً غربي
      أَكْرَه (أغرا) أمام التحالف الراجبوتي بقيادة رانا سانغا
      صاحب ميوار. وكان رانا سانغا قد جمع أكبر تحالف راجبوتي
      شهدته تلك العصور — وانضم إليه أمراء أفغان من معسكر اللوديين
      المهزوم — ليطرد الدولة المغولية الإسلامية الجديدة قبل أن
      تستقر. ومثلما فعل في بانيبات السنة السابقة، احتمى بابر خلف
      صفّ من العربات المربوطة (تكتيك «العَرَبا» العثماني)، وأمطر
      هجمات الفرسان الراجبوتية بنيران البنادق الفتيلية الجماعية
      والمدافع الخفيفة. فحطم رصاصُ مصطفى الرومي ومدافعُه نظامَ
      الراجبوت، فجرح رانا سانغا وحُمل من ساحة المعركة وانسحب من
      بقي. وأنهى النصر الكتلةَ الوحيدة في شمال الهند القادرة على
      مقاومة بابر، فأرسى دعائم الحكم المغولي على أساس متين تجاوز
      مجرد نصر بانيبات الفردي. وقد سجّل بابر تفاصيل المعركة في
      «بابرنامه» مذكراته. والمصادر السنية الكلاسيكية شحيحة لأخبار
      الهند المغولية؛ وتحدد دائرة المعارف الإسلامية والطبعات
      الحديثة من «البابرنامه» يومَ المعركة في ١٣ جمادى الأولى
      ٩٣٣ هـ.
    description_fr: |
      Un an après la victoire fondatrice de Pânipat, Ẓahīr al-Dīn
      Muḥammad Bâbur affronta la confédération rajput de Rânâ
      Sangâ de Mewâr au village de Khanwa, à une soixantaine de
      kilomètres à l'ouest d'Agra. Rânâ Sangâ avait assemblé la
      plus grande coalition rajput de mémoire d'homme — rejoint
      par les émirs afghans du camp lôdî vaincu — pour chasser
      le nouvel État moghol avant qu'il ne se consolide. Comme
      à Pânipat l'année précédente, Bâbur disposa son armée
      derrière une ligne défensive de chariots liés ensemble
      (la tactique de l'*araba* / *taburcılık* ottoman) et
      employa contre la charge de cavalerie rajput des feux
      massifs de mousquets à mèche et d'artillerie de campagne.
      Les mousquets et coulevrines de Mustafâ Rûmî brisèrent la
      formation rajput; Sangâ blessé fut évacué du champ, et les
      survivants se retirèrent. La victoire écarta la seule
      coalition d'Inde du Nord capable de résister à Bâbur et
      fonda véritablement la domination moghole au-delà d'une
      seule bataille. Bâbur consigna l'affrontement en détail
      dans le *Bâburnâmâ*. Les chroniques sunnites classiques
      sont peu prolixes sur l'Inde moghole; l'EI2 et les éditions
      modernes du *Bâburnâmâ* placent la bataille le 13 jumâdâ
      I 933 H.
    canonical_hijri: {year: 933, month: 5, day: 13, precision: day}
    canonical_gregorian: {date: 1527-03-26, precision: day, method: attested}
    julian_date: 1527-03-16
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the engagement on 13 Jumādā I 933 / 16 March 1527 (Julian) and details Bābur's matchlock-and-cart tactics."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the Bāburnāma (Beveridge / Thackston editions), which records Bābur's own account of the battle."
    tags: [mughal, battle, india, babur, rajput, mewar, gunpowder]
    source_url: https://en.wikipedia.org/wiki/Battle_of_Khanwa
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-ghaghra
    category: battle
    title_en: Battle of Ghaghra — Babur Defeats the Afghan-Bengali Coalition
    title_ar: معركة غاغرا — بابر يهزم تحالف الأفغان والبنغال
    title_fr: Bataille du Ghaghra — Bâbur défait la coalition afghano-bengalie
    description_en: |
      Bābur's third decisive victory in India was fought at the
      confluence of the Ghaghra and the Ganges (in modern Bihar)
      against an Afghan-Bengali coalition led by Sultan Maḥmūd
      Lodi (a brother of the Ibrāhīm killed at Panipat) and Sultan
      Naṣrat Shāh of Bengal. The engagement was an unusual one for
      a sixteenth-century Indian battle in that it was partly an
      amphibious operation: Bābur's troops forced a crossing of
      the Ghaghra under matchlock and artillery cover from a
      flotilla of riverboats, while his army on the south bank
      pinned the Afghan host. The Afghan-Bengali coalition broke;
      Bengal sued for peace and recognised Mughal suzerainty over
      the territory west of the Ghaghra. With this final victory
      Bābur extended Mughal rule across the entire Ganges plain
      from the Indus to the borders of Bengal — the territorial
      shape his grandson Akbar would inherit and double. Bābur
      himself recorded the campaign in the *Bāburnāma* under the
      events of 935 AH; he died the following year.
    description_ar: |
      ثالث الانتصارات الحاسمة لبابر في الهند كانت على ملتقى
      نهري غاغرا والكنج (في بهار الحالية) في مواجهة تحالف
      أفغاني بنغالي بقيادة السلطان محمود اللودي (شقيق إبراهيم
      الذي قتل في بانيبات) والسلطان نصرت شاه صاحب البنغال.
      وكانت معركة استثنائية في عرف المعارك الهندية في القرن
      السادس عشر إذ تضمنت عملية نهرية: أَجبر بابر قواتِه على
      عبور غاغرا تحت غطاء البنادق الفتيلية والمدفعية من أسطول
      من الزوارق النهرية، في حين ثبّت جيشه على الضفة الجنوبية
      الجيشَ الأفغاني. فانكسر التحالف، وطلب البنغال السلم وأقرّ
      بسيادة المغول على الأرض الواقعة غربي غاغرا. وبهذا النصر
      الأخير امتدّت دولة بابر على عموم سهل الكنج من السند إلى
      تخوم البنغال — وهي الرقعة التي سيرثها حفيده أكبر فيضاعفها.
      وسجّل بابر الحملة في «بابرنامه» تحت حوادث سنة ٩٣٥ هـ، ومات
      في السنة التالية.
    description_fr: |
      La troisième victoire décisive de Bâbur en Inde fut livrée
      au confluent du Ghaghra et du Gange (dans le Bihar actuel)
      contre une coalition afghano-bengalie menée par le sultan
      Maḥmūd Lôdî (frère d'Ibrâhîm tombé à Pânipat) et le sultan
      Naṣrat Shâh du Bengale. L'engagement fut inhabituel pour
      une bataille indienne du XVIᵉ siècle en ce qu'il fut en
      partie amphibie: Bâbur força le passage du Ghaghra sous
      le feu de mousquets et d'artillerie tirés depuis une
      flottille fluviale, tandis que son armée sur la rive sud
      fixait l'ost afghan. La coalition s'effondra; le Bengale
      négocia la paix et reconnut la suzeraineté moghole sur le
      territoire à l'ouest du Ghaghra. Avec cette dernière
      victoire, Bâbur étendit la domination moghole sur toute la
      plaine du Gange, de l'Indus aux confins du Bengale — la
      forme territoriale que son petit-fils Akbar héritera et
      doublera. Bâbur consigna lui-même la campagne dans le
      *Bâburnâmâ* sous les événements de 935 H; il mourut l'année
      suivante.
    canonical_hijri: {year: 935, month: 8, precision: month}
    canonical_gregorian: {date: 1529-05-01, precision: month, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 places the battle in 935 AH (May 1529) at the Ghaghra-Ganges confluence and notes the riverine character of the engagement."
      - source_key: editorial
        notes: "Editorial summary cross-checked against the Bāburnāma's own narrative of the 935 AH campaign."
    tags: [mughal, battle, india, babur, bengal, afghan, ganges, bihar]
    source_url: https://en.wikipedia.org/wiki/Battle_of_Ghaghra
    importance: notable
    verified: true
    verification_status: cross_verified

