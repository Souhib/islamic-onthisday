  - slug: founding-of-tablighi-jamaat
    category: religious_movement_event
    title_en: Founding of Tablīghī Jamāʿat by Muḥammad Ilyās al-Kandhlawī
    title_ar: نشأة جماعة التبليغ على يد محمد إلياس الكاندهلوي
    title_fr: Fondation de la Tablīghī Jamāʿat par Muḥammad Ilyās al-Kandhlawī
    description_en: |
      Muḥammad Ilyās al-Kandhlawī — Indian Sunni Hanafī scholar
      of the Deobandī tradition and a member of the Naqshbandī-
      Mujaddidī Sufi chain — launched the lay-led grass-roots
      missionary movement that would come to be known as the
      Tablīghī Jamāʿat in the Mewat region of north India around
      1344 AH / 1926 CE, on his return from his second hajj.
      Confronted by the syncretic, semi-Islamised state of the
      Mewati Meo community — formally Muslim but observing
      pre-Islamic Rajput customs and unfamiliar with basic
      *ʿaqīda* and *ṣalāt* — and dissatisfied with the slow
      reach of the formal madrasa system into rural mass life,
      he organised the first travelling teaching parties of
      ordinary Muslim men who would camp in mosques and remind
      one another of basic Islamic teachings. The method was
      codified in the *Six Points* (*chhe baten*) — *kalima*,
      *ṣalāt*, *ʿilm wa-dhikr*, *ikrām al-muslim*, *ikhlāṣ*, and
      *tafrīgh-i waqt* (devoting time). Year-precision is used
      because the movement crystallised over months and the
      contemporary sources do not agree on a single inception
      day. Within fifty years it had become the largest
      trans-national Muslim missionary movement of the twentieth
      century, with annual gatherings at Raiwind in Pakistan,
      Tongi in Bangladesh, and Bhopal in India each drawing
      millions of participants.
    description_ar: |
      أطلق الشيخ محمد إلياس الكاندهلوي — العالم السني الهندي
      الحنفي على تراث ديوبند، ومن أهل السلسلة النقشبندية
      المجددية — الحركة الدعوية الشعبية التي ستُعرف بعدُ
      بـ«جماعة التبليغ» في إقليم «ميوات» شمال الهند نحو سنة
      ١٣٤٤ هـ (الموافق ١٩٢٦ ميلادي) إثر عودته من حجته الثانية.
      وكان قد جابه الواقع الشركي شبه الإسلامي للقبائل المِيوية
      من «الميو» — قوم مسلمون اسماً، يتمسكون بعادات الراجبوت
      السابقة على الإسلام، ولا يعرفون أصول العقيدة ولا
      الصلاة — ووجد منهج المدارس الرسمية بطيء الوصول إلى
      حياة الجماهير الريفية، فنظّم أولى جماعات الخروج التعليمي
      من عوام المسلمين، يبيتون في المساجد ويذكّر بعضهم بعضاً
      بأصول الدين. وقعّد منهجه في «النقاط الست» (شِيْ بَاتيْنْ):
      الكلمة، والصلاة، والعلم والذكر، وإكرام المسلم،
      والإخلاص، وتفريغ الوقت. واعتُمدت الدقة السنوية لأن
      الحركة تَبَلْوَرت عبر شهور ولم تتفق المصادر المعاصرة
      على يوم واحد لانطلاقها. وفي خمسين سنة صارت أكبر حركة
      دعوية سنية عابرة للحدود في القرن العشرين، ولها تجمعات
      سنوية برَيْوِنْد بباكستان وتُونغي ببنغلاديش وبهوبال
      بالهند، يحضرها الملايين سنوياً.
    description_fr: |
      Muḥammad Ilyās al-Kandhlawī — savant sunnite indien
      hanafite de la tradition deobandie et membre de la chaîne
      soufie naqshbandī-mujaddidī — lança le mouvement
      missionnaire populaire conduit par les laïcs qui serait
      connu sous le nom de Tablīghī Jamāʿat dans la région du
      Mewat, dans le nord de l'Inde, vers 1344 H / 1926 EC, au
      retour de son deuxième hajj. Confronté à l'état
      syncrétique et semi-islamisé de la communauté méo du
      Mewat — musulmane de nom, mais observant des coutumes
      rajpoutes pré-islamiques et ignorant les éléments de base
      de la *ʿaqīda* et de la *ṣalāt* — et insatisfait de la
      lenteur de l'enseignement madrasa officiel à atteindre la
      vie rurale de masse, il organisa les premières
      expéditions d'enseignement itinérantes de simples
      musulmans, qui campaient dans les mosquées et se
      rappelaient mutuellement les enseignements islamiques
      fondamentaux. La méthode fut codifiée dans les *Six
      Points* (*chhe baten*) : *kalima*, *ṣalāt*, *ʿilm wa-
      dhikr*, *ikrām al-muslim*, *ikhlāṣ* et *tafrīgh-i waqt*
      (consacrer du temps). La précision à l'année est retenue
      parce que le mouvement se cristallisa sur des mois et
      que les sources contemporaines ne s'accordent pas sur un
      jour d'origine unique. En cinquante ans il devint le plus
      grand mouvement missionnaire musulman transnational du
      XXe siècle, avec des rassemblements annuels à Raiwind au
      Pakistan, Tongi au Bangladesh et Bhopal en Inde drainant
      chacun des millions de participants.
