  - slug: fall-of-delhi-1857
    category: political_event
    title_en: Fall of Delhi to British Forces — End of the 1857 Rebellion in the Capital
    title_ar: سقوط دلهي في يد البريطانيين — نهاية ثورة سنة ١٢٧٤ هـ في العاصمة
    title_fr: Chute de Delhi face aux forces britanniques — fin de la révolte de 1857 dans la capitale
    description_en: |
      After a four-month siege, the British Delhi Field Force
      stormed and recaptured the Mughal capital from the rebel
      sepoys and citizen-fighters who had held it since the
      uprising of 11 May 1857. The decisive assault began on
      14 September 1857 (24 Muḥarram 1274 AH); the city was in
      British hands within six days. The retributive massacre
      that followed killed tens of thousands of civilians,
      systematically targeted Muslim quarters around the Red
      Fort and the Jāmiʿ Masjid, expelled the surviving
      population of the walled city, demolished much of the
      surrounding Muslim aristocratic architecture, and cleared
      the area between the Fort and the Jāmiʿ for British
      garrison use. Many of the leading Sunni *ʿulamāʾ* of
      Delhi — including descendants of the Walīullāhī school —
      were killed in the violence or fled. The Mughal emperor
      Bahādur Shāh II Ẓafar surrendered three days later to
      Major Hodson at the tomb of Humāyūn outside the city; his
      sons and grandson were summarily shot. The fall of Delhi
      effectively ended the rebellion in the central plains and
      sealed the political extinction of the Mughal dynasty.
    description_ar: |
      بعد حصار دام أربعة أشهر، اقتحمت قوة دلهي البريطانية
      الميدانية العاصمةَ المغولية وأعادت السيطرة عليها من
      الجنود السبَاهيِّين الثائرين والمدنيين الذين أمسكوا بها
      منذ ثورة ١١ ماي ١٨٥٧ ميلادية. وانطلق الهجوم الحاسم يوم
      ١٤ سبتمبر ١٨٥٧ ميلادية (الموافق ٢٤ محرم سنة ١٢٧٤ هـ)،
      وفي ستة أيام صارت المدينة بيد الإنجليز. وأعقب ذلك مذبحة
      انتقامية ذهب ضحيتها عشرات الآلاف من المدنيين، استهدفت
      أحياء المسلمين حول القلعة الحمراء والجامع المغولي
      الكبير، وطُرد من نَجَا من السكان، وهُدمت أوسع جوانب
      العمارة المغولية الأرستقراطية المحيطة، وأُخليت المساحة
      بين القلعة والجامع لمعسكرات حامية بريطانية. وقُتل في
      أحداث العنف كثير من كبار علماء أهل السنة بدلهي — منهم
      أبناء التراث الولي اللهي — وفرّ من بقي. واستسلم الإمبراطور
      المغولي بهادر شاه الثاني «ظفر» بعد ثلاثة أيام للنقيب
      هودسون عند ضريح هُمايون خارج العاصمة، وأُعدم أبناؤه
      وحفيده رمياً بالرصاص ميدانياً. وأنهى سقوط دلهي ثورة
      السهول الوسطى الهندية وختم الانقراض السياسي للدولة
      المغولية الإسلامية.
    description_fr: |
      Après quatre mois de siège, la Delhi Field Force britannique
      prit d'assaut et reprit la capitale moghole aux cipayes
      rebelles et aux combattants citoyens qui la tenaient depuis
      le soulèvement du 11 mai 1857. L'assaut décisif commença le
      14 septembre 1857 (24 Muḥarram 1274 H); la ville fut entre
      les mains des Britanniques en six jours. Le massacre punitif
      qui suivit tua des dizaines de milliers de civils, cibla
      systématiquement les quartiers musulmans autour du Fort
      Rouge et de la Jāmiʿ Masjid, chassa la population survivante
      de la ville fortifiée, démolit une grande partie de
      l'architecture aristocratique musulmane environnante et
      libéra la zone entre le Fort et la grande mosquée pour
      l'usage de la garnison britannique. Beaucoup des principaux
      *ʿulamāʾ* sunnites de Delhi — y compris des descendants de
      l'école walīullāhī — furent tués dans la violence ou
      s'enfuirent. L'empereur moghol Bahādur Shāh II Ẓafar se
      rendit trois jours plus tard au major Hodson à la tombe
      d'Humāyūn aux abords de la ville; ses fils et son petit-fils
      furent abattus sommairement. La chute de Delhi mit
      effectivement fin à la révolte dans les plaines centrales
      et scella l'extinction politique de la dynastie moghole.
    canonical_hijri: {year: 1274, month: 1, day: 24, precision: day}
    canonical_gregorian: {date: 1857-09-14, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Dihlī' / 'Indian Mutiny' — date of recapture."
      - source_key: editorial
        notes: "Cross-checked against standard 1857-rebellion historiography."
