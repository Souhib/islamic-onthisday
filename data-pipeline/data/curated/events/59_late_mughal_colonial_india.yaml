  - slug: founding-of-nadwat-al-ulama
    category: madrasa_founding
    title_en: Founding of Nadwat al-ʿUlamāʾ at Kanpur
    title_ar: تأسيس ندوة العلماء بكَانپور
    title_fr: Fondation de Nadwat al-ʿUlamāʾ à Kanpur
    description_en: |
      A circle of Indian Sunni Hanafī scholars led by Mawlānā
      Muḥammad ʿAlī Mungerī, supported by Shiblī Nuʿmānī of
      Aligarh and senior figures of the Walīullāhī tradition,
      convened the founding session of Nadwat al-ʿUlamāʾ
      ("Council of Scholars") at the Madrasat Faiḍ-i ʿĀm in
      Kanpur in Shawwāl 1311 AH / late April 1894 CE. Its
      founding aim was to bridge the post-1857 institutional
      divide between the Deobandī madrasa tradition and the
      Aligarh modernist current — neither of which the
      *nadwa*'s circle accepted as adequate alone — and to
      modernise the *Dars-i Niẓāmī* curriculum with classical
      Arabic, modern Arabic literature, Sunni Hanafī fiqh,
      hadith, and contemporary Islamic studies. In 1316 AH
      (1898 CE) the *nadwa* established its own seminary, Dār
      al-ʿUlūm Nadwat al-ʿUlamāʾ, at Lucknow, which became one
      of the three principal Sunni Hanafī training centres of
      the subcontinent alongside Deoband and the Aligarh-
      affiliated institutions. Shiblī Nuʿmānī served as its
      leading rector and Sayyid Sulaymān Nadwī, then later
      Sayyid Abū al-Ḥasan ʿAlī al-Nadwī, were its leading
      twentieth-century figures.
    description_ar: |
      عقدت حلقة من علماء أهل السنة الهنود الحنفية بقيادة
      المولوي محمد علي المنغيري، وبدعم من الأستاذ شبلي
      النعماني العَلِيكَري وكبار حملة التراث الولي اللهي،
      الدورةَ التأسيسية لـ«ندوة العلماء» في «المدرسة فيض
      عام» بمدينة كانپور في شوال سنة ١٣١١ هـ (الموافق
      أواخر أفريل ١٨٩٤ ميلادي). وكان غايتها التأسيسية
      ردمَ الهوّة المؤسسية ما بعد سنة ١٢٧٤ هـ بين تراث
      مدرسة ديوبند والاتجاه التحديثي العَلِيكَري — وكلاهما
      لم تَرتضِ حلقة «الندوة» بأحدهما وحده — وتحديثَ منهج
      «درس نظامي» بإدخال الفصحى التراثية والأدب العربي
      الحديث والفقه السني الحنفي والحديث والدراسات
      الإسلامية المعاصرة. وفي سنة ١٣١٦ هـ (الموافق ١٨٩٨
      ميلادي) أنشأت «الندوة» جامعتَها الخاصة «دار العلوم
      ندوة العلماء» بمدينة لكْنَوْ، فصارت من المعاهد
      الثلاثة الكبرى لتدريس الحنفية السنية في شبه القارة
      الهندية إلى جانب «دار العلوم ديوبند» والمؤسسات
      الملحقة بعَلِيكَره. وتولى رئاستها الفعلية الأستاذ
      شبلي النعماني، وكبار رجالها في القرن العشرين السيد
      سليمان الندوي، ثم السيد أبو الحسن علي الندوي.
    description_fr: |
      Un cercle de savants sunnites hanafites indiens conduit
      par Mawlānā Muḥammad ʿAlī Mungerī, soutenu par Shiblī
      Nuʿmānī d'Aligarh et des figures aînées de la tradition
      walīullāhī, tint la session inaugurale de Nadwat al-
      ʿUlamāʾ (« Conseil des oulémas ») à la Madrasat Faiḍ-i
      ʿĀm de Kanpur en Shawwāl 1311 H / fin avril 1894 EC.
      Son objectif fondateur était de combler la fracture
      institutionnelle de l'après-1857 entre la tradition
      madrasa deobandie et le courant moderniste d'Aligarh —
      aucun n'étant accepté comme suffisant à lui seul par
      le cercle de la *nadwa* — et de moderniser le curriculum
      *Dars-i Niẓāmī* avec l'arabe classique, la littérature
      arabe moderne, le fiqh sunnite hanafite, le hadith et
      les études islamiques contemporaines. En 1316 H (1898
      EC) la *nadwa* établit son propre séminaire, Dār al-
      ʿUlūm Nadwat al-ʿUlamāʾ, à Lucknow, qui devint l'un des
      trois principaux centres de formation sunnite hanafite
      du sous-continent, aux côtés de Deoband et des
      institutions affiliées à Aligarh. Shiblī Nuʿmānī en fut
      le recteur principal, et ses figures dirigeantes du
      XXe siècle furent Sayyid Sulaymān Nadwī, puis plus tard
      Sayyid Abū al-Ḥasan ʿAlī al-Nadwī.
