        notes: "EI2 'Deoband' — founding date and circumstances."
      - source_key: editorial
        notes: "Cross-checked against Sayyid Mahbub Rizwi, Tarikh-i Dar al-Ulum Deoband."
    people: [[muhammad-qasim-al-nanautwi, leader], [rashid-ahmad-al-gangohi, leader]]
