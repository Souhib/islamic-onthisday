  - slug: death-of-sayyid-ahmad-khan
    category: scholar_death
    title_en: Death of Sir Sayyid Aḥmad Khān — Founder of Aligarh
    title_ar: وفاة السير سيد أحمد خان — مؤسس عَلِيكَره
    title_fr: Mort de Sir Sayyid Aḥmad Khān — fondateur d'Aligarh
    description_en: |
      Sayyid Aḥmad Khān ibn Sayyid Muḥammad Muttaqī (KCSI; "Sir
      Sayyid") — Indian Sunni reformer of Delhi origin, civil
      servant in the East India Company and later the British
      Crown, founder of the MAO College at Aligarh (1875), editor
      of the journal *Tahdhīb al-Akhlāq*, and the principal
      architect of the Indian Muslim modernist current of the
      late nineteenth century — died at Aligarh on 4 Dhū al-Qaʿda
      1315 AH (27 March 1898 CE) at age about 80 and was buried
      beside the Aligarh mosque in the college grounds. He had
      witnessed the 1857 rebellion as a Company subordinate-
      magistrate at Bijnor, where he sheltered British survivors
      and afterwards composed *Asbāb-i Baghāwat-i Hind* (*The
      Causes of the Indian Revolt*) attributing the violence to
      colonial misgovernance and Muslim alienation. His
      voluminous writings — Urdu *tafsīr* commentaries, essays
      on Sunni *kalām*, social-reform editorials in *Tahdhīb al-
      Akhlāq*, and his *Khuṭbāt al-Aḥmadiyya* in defence of the
      Prophet ﷺ against William Muir's *Life of Mahomet* —
      shaped the framework within which Indian Sunni educated
      classes engaged the colonial settlement and the natural
      sciences for the next half-century. The Aligarh movement
      he founded outlived him as the dominant institutional
      vehicle of Indian Sunni Muslim modernism.
    description_ar: |
      توفي السيد أحمد خان بن السيد محمد متّقي (المعروف بـ«السير
      سيد») — العالم المصلح السني الهندي من أصل دلهي، الموظف
      في إدارة شركة الهند الشرقية ثم في إدارة التاج البريطاني،
      مؤسس «كلية محمد الإنجليزية الشرقية» بعَلِيكَره سنة
      ١٢٩٢ هـ (١٨٧٥ ميلادي)، رئيس تحرير مجلة «تهذيب الأخلاق»،
      والمهندس الأول للتيار الإسلامي التحديثي السني الهندي في
      أواخر القرن التاسع عشر الميلادي — بعَلِيكَره يوم ٤ ذي
      القعدة سنة ١٣١٥ هـ (الموافق ٢٧ مارس ١٨٩٨ ميلادي) عن
      نحو ثمانين سنة، ودُفن بجوار مسجد عَلِيكَره داخل حرم
      الكلية. وكان قد شهد ثورة سنة ١٢٧٣ هـ نائباً قاضياً
      للشركة في بِجْنور حيث آوى الناجين البريطانيين، فألّف
      بعدها كتابه «أسباب بغاوت هند» («أسباب ثورة الهند»)
      مرجعاً عنف ١٢٧٣ هـ إلى سوء الإدارة الاستعمارية وإلى
      اغتراب المسلمين. ومؤلفاته الواسعة — تفاسيره القرآنية
      بالأردية، ومقالاته في علم الكلام السني، ومقالاته
      الإصلاحية الاجتماعية في «تهذيب الأخلاق»، و«الخطبات
      الأحمدية» في الدفاع عن النبي ﷺ في وجه «حياة محمد»
      للمستشرق وليم مْيُوِر — أرست الإطار الذي تعاملت من
      خلاله الطبقات السنية المتعلمة الهندية مع التسوية
      الاستعمارية والعلوم الطبيعية الحديثة طوال نصف القرن
      التالي. وعاشت حركة عَلِيكَره التي أسسها رحمه الله بعده
      الواجهةَ المؤسسية الكبرى للحداثة الإسلامية السنية الهندية.
    description_fr: |
      Sayyid Aḥmad Khān ibn Sayyid Muḥammad Muttaqī (KCSI; « Sir
      Sayyid ») — réformateur sunnite indien d'origine delhiote,
      fonctionnaire de la Compagnie des Indes orientales puis de
      la Couronne britannique, fondateur du MAO College
      d'Aligarh (1875), directeur de la revue *Tahdhīb al-
      Akhlāq*, et principal architecte du courant moderniste
      musulman indien de la fin du XIXe siècle — mourut à
      Aligarh le 4 Dhū al-Qaʿda 1315 H (27 mars 1898 EC) à
      environ 80 ans et fut enterré à côté de la mosquée
      d'Aligarh dans l'enceinte du collège. Il avait vécu la
      révolte de 1857 comme magistrat subalterne de la
      Compagnie à Bijnor, où il abrita des survivants
      britanniques, puis composa *Asbāb-i Baghāwat-i Hind*
      (*Les Causes de la Révolte indienne*) attribuant la
      violence à la mauvaise gouvernance coloniale et à
      l'aliénation des musulmans. Ses écrits volumineux —
      commentaires de tafsīr en ourdou, essais sur le *kalām*
      sunnite, éditoriaux de réforme sociale dans *Tahdhīb
      al-Akhlāq*, et ses *Khuṭbāt al-Aḥmadiyya* en défense du
      Prophète ﷺ contre la *Life of Mahomet* de William Muir
      — façonnèrent le cadre dans lequel les classes sunnites
      indiennes éduquées engagèrent le règlement colonial et
      les sciences naturelles pendant le demi-siècle suivant.
      Le mouvement d'Aligarh qu'il avait fondé lui survécut
      comme principal véhicule institutionnel du modernisme
      musulman sunnite indien.
