  # NINETEENTH-CENTURY REFORM AND THE 1857 RUPTURE
  # =========================================================================

  - slug: death-of-haji-shariat-allah
    category: scholar_death
    title_en: Death of Hāji Sharīʿat Allāh — Founder of the Faraidi Movement
    title_ar: وفاة الحاج شريعة الله — مؤسس حركة الفرائض
    title_fr: Mort de Hāji Sharīʿat Allāh — fondateur du mouvement faraidi
    description_en: |
      Hāji Sharīʿat Allāh — Bengali Sunni Hanafī reformer of
      Faridpur in eastern Bengal (modern-day Bangladesh) — died at
      Bahaduria around 1255 AH / 1840 CE at age about 60. After
      nearly twenty years in Mecca and Cairo (where he encountered
      the early-nineteenth-century reformist currents of the Hijaz
      and was influenced by his Indian-born teacher Ṭāhir al-Sunbul
      al-Makkī), he returned to Bengal in 1818 and launched a
      grass-roots movement of Sunni renewal that took its name from
      its insistence on the *farāʾiḍ* — the obligatory acts of the
      religion. The Faraidi *jamāʿat* called Bengali Muslim
      peasants to abandon syncretic shrine-cult practices,
      shirk-tinged saint-mediation, and unsupported customary
      observances, and to focus on prayer, fasting, *zakāt*, and
      *ḥajj* in line with Hanafi fiqh. The movement also
      crystallised peasant resistance to the Hindu landlord
      (*zamīndār*) and British indigo-planter classes; under his
      son and successor Dudu Miyan it became one of the principal
      rural Sunni Muslim mobilisations of nineteenth-century India.
      Year-precision is used because no day or month is securely
      attested in the early Bengali sources.
    description_ar: |
      توفي الحاج شريعة الله — العالم المصلح السني البنغالي على
      المذهب الحنفي بمنطقة فَرِيد پور شرق البنغال (في
      بنغلاديش اليوم) — ببلدة «بهادريا» سنة ١٢٥٥ هـ تقريباً
      (الموافق ١٨٤٠ ميلادي) عن نحو ستين سنة. وكان قد أمضى
      نحو عشرين سنة بمكة المكرمة والقاهرة، فاحتك هناك بحركات
      الإصلاح الحجازية في أوائل القرن التاسع عشر الميلادي،
      وتأثر بشيخه الهندي الأصل الشيخ طاهر السنبل المكي. ولما
      عاد إلى البنغال سنة ١٨١٨ ميلادية أطلق حركةً شعبيةً
      للتجديد السني، استمدت اسمها من تشديدها على «الفرائض»
      — أي ما افترضه الله على المكلفين. ودعت «جماعة الفرائض»
      مسلمي بنغال الفلاحين إلى ترك العبادات الشركية والمظاهر
      التوسلية المخالفة عند المزارات، والوقوف على الصلاة
      والصيام والزكاة والحج وفق الفقه الحنفي. وتحولت الحركة
      أيضاً إلى صورة بَلْوَرت مقاومة الفلاحين السنيين لطبقة
      الإقطاعيين «الزَمِنْدَار» الهندوس وللمنتجين الإنجليز
      للنيلة، وغدت في خلافة ابنه «دودو ميان» من أكبر تعبئات
      المسلمين السنيين الريفية في الهند في القرن التاسع عشر
      الميلادي. واعتُمدت الدقة السنوية فقط لأنه لا يثبت يوم
      ولا شهر في المصادر البنغالية الأولى.
    description_fr: |
      Hāji Sharīʿat Allāh — réformateur sunnite hanafite bengali
      de Faridpur, dans l'est du Bengale (actuel Bangladesh) —
      mourut à Bahaduria vers 1255 H / 1840 EC à l'âge d'environ
      60 ans. Après près de vingt années passées à La Mecque et
      au Caire (où il fut au contact des courants réformistes
      hijaziens du début du XIXe siècle et reçut l'influence de
      son maître d'origine indienne Ṭāhir al-Sunbul al-Makkī), il
      revint au Bengale en 1818 et lança un mouvement populaire
      de renouveau sunnite qui tira son nom de son insistance sur
      les *farāʾiḍ* — les actes obligatoires de la religion. La
      *jamāʿat* faraidi appela les paysans musulmans bengalis à
      abandonner les cultes syncrétiques des sanctuaires, les
      médiations saintes teintées de shirk et les observances
      coutumières non fondées, et à se concentrer sur la prière,
      le jeûne, la *zakāt* et le *ḥajj* conformément au fiqh
      hanafite. Le mouvement cristallisa également la résistance
      paysanne aux *zamīndār* hindous et aux planteurs d'indigo
      britanniques; sous son fils et successeur Dudu Miyan il
      devint l'une des principales mobilisations rurales musulmanes
      sunnites de l'Inde du XIXe siècle. La précision à l'année
      est retenue car ni jour ni mois ne sont attestés avec
      certitude dans les premières sources bengalies.
