  - slug: founding-of-mao-college-aligarh
    category: madrasa_founding
    title_en: Founding of MAO College at Aligarh by Sir Sayyid Aḥmad Khān
    title_ar: تأسيس كلية «م. ع. أ» بعليكره على يد السير سيد أحمد خان
    title_fr: Fondation du MAO College à Aligarh par Sir Sayyid Aḥmad Khān
    description_en: |
      Sir Sayyid Aḥmad Khān — Indian Sunni reformer, civil servant
      of the East India Company and later the Crown, and the
      principal advocate of an Anglo-Muslim educational
      reconciliation in the post-1857 generation — formally
      opened the Madrasatul Uloom Musalmanan-e-Hind at Aligarh on
      18 Rabīʿ al-Thānī 1292 AH (24 May 1875 CE); it was renamed
      the Muhammadan Anglo-Oriental (MAO) College on 8 January
      1877 when its main building was inaugurated by Lord Lytton.
      The institution, modelled in administration on Cambridge
      and in religious-instruction on the existing North Indian
      madrasa tradition, taught Arabic, Persian, Urdu, English,
      and the modern natural and social sciences side by side.
      Sayyid Aḥmad's project — articulated in his journal *Tahdhīb
      al-Akhlāq* (1870 onwards) — was to recover Indian Sunni
      Muslim self-confidence after 1857 by acquiring the
      colonisers' tools of state service, scientific competence,
      and modern administration without doctrinal capitulation.
      The college grew into Aligarh Muslim University (chartered
      1920) and shaped a century of Indian Sunni Muslim
      professional, political, and intellectual life across the
      Raj and the post-1947 successor states.
    description_ar: |
      افتتح السير سيد أحمد خان — العالم الإصلاحي السني الهندي،
      الذي تقلّب في وظائف الإدارة لشركة الهند الشرقية ثم للتاج
      البريطاني، وأكبر دعاة المصالحة التعليمية الإنجليزية-
      الإسلامية في الجيل التالي لثورة سنة ١٢٧٤ هـ — «مدرسة
      العلوم لمسلمان هند» بعليكره يوم ١٨ ربيع الآخر سنة ١٢٩٢ هـ
      (الموافق ٢٤ ماي ١٨٧٥ ميلادي)، وأُعيدت تسميتها «كلية محمد
      الإنجليزية الشرقية» (المخْتصَرة Muhammadan Anglo-Oriental)
      في ٨ جانفي ١٨٧٧ ميلادي حين دشّن المبنى الرئيس اللورد
      لِيتُن. وكانت المؤسسة في إدارتها على نسق جامعة كَمبِردج،
      وفي تعليمها الديني على نسق المدرسة الهندية الشمالية
      القائمة، تُدرس العربية والفارسية والأردية والإنجليزية
      والعلوم الطبيعية والاجتماعية الحديثة جنباً إلى جنب.
      ومشروع سيد أحمد — كما صاغه في مجلته «تهذيب الأخلاق» منذ
      سنة ١٢٨٦ هـ (١٨٧٠ ميلادي) — استرداد ثقة المسلمين السنيين
      الهنود في أنفسهم بعد سنة ١٨٥٧ ميلادية باكتساب أدوات
      المستعمر من خدمة الدولة والتفوّق العلمي والإدارة
      الحديثة من غير تنازل عقدي. ونمت الكلية حتى أنشئت منها
      «جامعة عليكره الإسلامية» (بمرسوم سنة ١٣٣٨ هـ / ١٩٢٠
      ميلادي)، وشكلت قرناً كاملاً من الحياة المسلمة السنية
      الهندية في الراج وما بعد الاستقلال سنة ١٣٦٦ هـ (١٩٤٧
      ميلادي).
    description_fr: |
      Sir Sayyid Aḥmad Khān — réformateur sunnite indien,
      fonctionnaire de la Compagnie des Indes orientales puis de
      la Couronne, et principal défenseur d'une réconciliation
      éducative anglo-musulmane dans la génération de l'après-
      1857 — inaugura officiellement la Madrasatul Uloom
      Musalmanan-e-Hind à Aligarh le 18 Rabīʿ al-Thānī 1292 H
      (24 mai 1875 EC); elle fut rebaptisée Muhammadan Anglo-
      Oriental (MAO) College le 8 janvier 1877 lorsque Lord
      Lytton inaugura le bâtiment principal. L'établissement,
      calqué administrativement sur Cambridge et religieusement
      sur la tradition madrasa nord-indienne existante, enseignait
      l'arabe, le persan, l'ourdou, l'anglais et les sciences
      naturelles et sociales modernes côte à côte. Le projet de
      Sayyid Aḥmad — articulé dans sa revue *Tahdhīb al-Akhlāq*
      (à partir de 1870) — était de rétablir la confiance des
      musulmans sunnites indiens après 1857 en acquérant les
      outils du colonisateur — service d'État, compétence
      scientifique, administration moderne — sans capitulation
      doctrinale. Le collège devint l'Université musulmane
      d'Aligarh (charte de 1920) et façonna un siècle de la vie
      musulmane sunnite indienne — professionnelle, politique
      et intellectuelle — à travers le Raj et les États
      successeurs de l'après-1947.
