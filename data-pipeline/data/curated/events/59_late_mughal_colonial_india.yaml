  - slug: third-battle-of-panipat
    category: battle
    title_en: Third Battle of Panipat — Maratha Defeat by Aḥmad Shāh Durrānī
    title_ar: معركة بانيبات الثالثة — هزيمة المَرَاثا أمام أحمد شاه الدُّرَّاني
    title_fr: Troisième bataille de Pânipat — défaite des Marathes face à Aḥmad Shāh Durrānī
    description_en: |
      The third major battle on the plain of Panipat north of Delhi
      took place on 7 Jumādā al-Ākhira 1174 AH (14 January 1761 CE)
      between the Afghan-Mughal-Awadh coalition led by the Durrānī
      ruler Aḥmad Shāh Abdālī and the Hindu Maratha Confederacy under
      Sadāshivrāo Bhāu. The Maratha army — which had advanced on
      Delhi in the wake of Mughal collapse and reached its high-water
      mark in 1759-1760 — was decisively defeated and Bhāu was killed,
      together with the heir-apparent Vishwasrao and tens of
      thousands of Maratha soldiers and camp followers. The battle
      halted the Maratha advance into the Punjab and northern India
      for a decade, but did nothing to restore Mughal sovereignty;
      Aḥmad Shāh withdrew across the Indus within months. The
      vacuum it left would be filled neither by an Afghan empire
      nor by a Maratha one, but, in the long run, by the British
      East India Company expanding north from Bengal.
    description_ar: |
      وقعت ثالث المعارك الكبرى في سهل بانيبات شمال دلهي يوم
      ٧ جمادى الآخرة سنة ١١٧٤ هـ (الموافق ١٤ جانفي ١٧٦١ ميلادي)
      بين الحلف الأفغاني المغولي الأَوَدْهي بقيادة الملك الدُّرَّاني
      أحمد شاه الأبدالي والكونفدرالية المَرَاثية الهندوسية بقيادة
      سَدَاشيف رَاو بَهَاو. وكان جيش المَرَاثا قد استغل تفكّك
      الدولة المغولية فاجتاح دلهي وبلغ أقصى توسعه في سنتي
      ١١٧٢-١١٧٣ هـ (١٧٥٩-١٧٦٠ ميلادي)، فهُزم في هذه المعركة
      هزيمةً قاطعة وقُتل بَهَاو ومعه ولي العهد المَرَاثي
      «فيشواس راو» وعشرات الآلاف من جنوده وأهل المعسكر. وأوقفت
      المعركة زحف المَرَاثا على البنجاب وشمال الهند عقداً من
      الزمن، غير أنها لم تُعِد للمغول سيادتهم؛ فقد انسحب أحمد
      شاه عبر السند بعد شهور. ولم يَملأ الفراغ الذي خلّفته لا
      دولة أفغانية ولا دولة مَرَاثية، بل في الأمد البعيد
      شركة الهند الشرقية البريطانية الصاعدة من البنغال.
    description_fr: |
      La troisième grande bataille livrée dans la plaine de Pânipat,
      au nord de Delhi, eut lieu le 7 Jumādā al-Ākhira 1174 H
      (14 janvier 1761 EC) entre la coalition afghane-moghole-
      awadhie dirigée par le souverain durrānī Aḥmad Shāh Abdālī
      et la Confédération marathe hindoue sous Sadāshivrāo Bhāu.
      L'armée marathe — qui s'était avancée sur Delhi à la faveur
      de l'effondrement moghol et avait atteint son apogée en
      1759-1760 — fut décisivement défaite et Bhāu fut tué avec
      l'héritier présomptif Vishwasrao et des dizaines de milliers
      de soldats marathes et de gens du camp. La bataille arrêta
      l'avance marathe au Pendjab et dans le nord de l'Inde pour
      une décennie, mais ne rétablit en rien la souveraineté
      moghole; Aḥmad Shāh repassa l'Indus en quelques mois. Le
      vide qu'elle laissa ne serait comblé ni par un empire
      afghan ni par un empire marathe, mais à long terme par la
      Compagnie britannique des Indes orientales s'étendant vers
      le nord depuis le Bengale.
