  - slug: founding-of-deoband
    category: madrasa_founding
    title_en: Founding of Dār al-ʿUlūm Deoband
    title_ar: تأسيس دار العلوم ديوبند
    title_fr: Fondation de Dār al-ʿUlūm Deoband
    description_en: |
      Muḥammad Qāsim al-Nānautwī and Rashīd Aḥmad al-Gangohī, two
      Indian Sunni Hanafī scholars trained in the Walīullāhī
      hadith-revival of late-Mughal Delhi, opened a small madrasa
      under a pomegranate tree in the courtyard of the Chhatta
      Masjid in the qaṣba town of Deoband (Saharanpur district,
      United Provinces) on 15 Muḥarram 1283 AH (30 May 1866 CE).
      A single teacher, Mullā Maḥmūd, taught a single student,
      the future Shaykh al-Hind Maḥmūd al-Ḥasan, on that opening
      day. Within a generation Dār al-ʿUlūm Deoband had grown
      into the largest training institution for Sunni Hanafī
      scholarship in the colonised Muslim world, with a fixed
      Arabic-Persian-Urdu curriculum (the *Dars-i Niẓāmī*
      adapted with a strong hadith and *fiqh* emphasis), a
      financially independent waqf base supplied by ordinary
      Indian Muslim donors rather than by princely patronage,
      and a deliberate political distance from the British Raj.
      It became the institutional matrix of the "Deobandī" school
      of South Asian Sunni Islam — Hanafī in fiqh, Māturīdī
      in *ʿaqīda*, Naqshbandī-Mujaddidī in Sufi orientation —
      whose graduates and affiliated madrasas number in the
      thousands across India, Pakistan, Bangladesh, the Gulf,
      Britain, and the South Asian diaspora today.
    description_ar: |
      افتتح الإمامان محمد قاسم النانوتوي ورشيد أحمد الجنجوهي،
      وهما عالمان سنيان هنديان حنفيان من حملة تراث الحديث
      الولي اللهي بدلهي في أواخر العصر المغولي، مدرسة صغيرة تحت
      شجرة رمان في صحن «المسجد جَتَّا» في قَصبة ديوبند (في
      مقاطعة سهارن پور بالولايات المتحدة الهندية) يوم ١٥ محرم
      سنة ١٢٨٣ هـ (الموافق ٣٠ ماي ١٨٦٦ ميلادي). وكان مدرس
      واحد، الملا محمود، يُلقي على طالب واحد، هو الشيخ محمود
      الحسن «شيخ الهند» مستقبلاً، يوم الافتتاح. وفي جيل واحد
      صارت «دار العلوم ديوبند» أكبر معاهد العلوم الشرعية
      السنية الحنفية في العالم الإسلامي المستعمَر، بمنهاج ثابت
      عربي-فارسي-أردي (مستفيد من «درس نظامي» مع توسيع لمواد
      الحديث والفقه)، وأوقاف مستقلة مالياً من تبرعات عوام
      مسلمي الهند لا من رعاية أمراء، وموقف سياسي متعمد
      الانفصال عن الراج البريطاني. وصارت المنبت المؤسسي
      للمذهب «الديوبندي» السني في شبه القارة الهندية —
      حنفي الفقه، ماتريدي العقيدة، نقشبندي مجددي المسلك —
      وأتباعه ومدارسه التابعة بالآلاف اليوم في الهند وباكستان
      وبنغلاديش والخليج وبريطانيا وشتات شبه القارة.
    description_fr: |
      Muḥammad Qāsim al-Nānautwī et Rashīd Aḥmad al-Gangohī, deux
      savants sunnites indiens hanafites formés dans le renouveau
      du hadith walīullāhī du Delhi mogholo-tardif, ouvrirent une
      petite madrasa sous un grenadier dans la cour de la Chhatta
      Masjid, dans la qaṣba de Deoband (district de Saharanpur,
      Provinces-Unies), le 15 Muḥarram 1283 H (30 mai 1866 EC).
      Un seul enseignant, Mullā Maḥmūd, donna ce jour-là cours à
      un seul élève, le futur Shaykh al-Hind Maḥmūd al-Ḥasan. En
      une génération, Dār al-ʿUlūm Deoband devint le plus grand
      institut de formation à l'érudition sunnite hanafite du
      monde musulman colonisé : un curriculum fixe arabo-persan-
      ourdou (le *Dars-i Niẓāmī* adapté avec un fort accent sur
      le hadith et le *fiqh*), une base de waqf financièrement
      autonome alimentée par les dons des musulmans indiens
      ordinaires plutôt que par le mécénat princier, et une
      distance politique délibérée vis-à-vis du Raj britannique.
      Elle devint la matrice institutionnelle de l'école
      « deobandie » de l'islam sunnite sud-asiatique — hanafite
      en fiqh, maturidite en *ʿaqīda*, naqshbandī-mujaddidī
      d'orientation soufie — dont les diplômés et les madrasas
      affiliées se comptent aujourd'hui par milliers en Inde,
      au Pakistan, au Bangladesh, dans le Golfe, en Grande-
      Bretagne et dans la diaspora sud-asiatique.
    canonical_hijri: {year: 1283, month: 1, day: 15, precision: day}
    canonical_gregorian: {date: 1866-05-30, precision: day, method: attested}
