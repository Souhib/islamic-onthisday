# Wave 59 of curated event additions (2026-04-27).
# Late Mughal and colonial-era Islam in the Indian subcontinent (12th-14th
# centuries AH / 18th-20th centuries CE). Twelve dated events covering the
# political-military collapse of independent Muslim power in India, the
# institutional reform-and-revival movements that emerged under the British
# Raj, and the mass-organisational forms (Deoband, Aligarh, Nadwa, Tablīghī
# Jamāʿat) that defined twentieth-century South Asian Sunni life. Battles
# are framed factually: the East India Company's victories at Plassey and
# Buxar are the structural beginning of British rule, not Muslim victories;
# the Maratha-Afghan engagement at Panipat halted the Maratha advance but
# did nothing to restore Mughal sovereignty. Reform movements (Faraidi,
# Deobandī, Aligarh-modernist, Nadwa-mediating, Tablīghī-revivalist) are
# Sunni-scope and presented in their own institutional terms. Trilingual
# en/ar/fr throughout. All twelve attested in EI2 + standard secondary
# scholarship. None are sahaba; none carry hadith refs.

events:
  # =========================================================================
  # POLITICAL-MILITARY COLLAPSE — 18th c.
  # =========================================================================

  - slug: battle-of-plassey
    category: battle
    title_en: Battle of Plassey — British Conquest of Bengal
    title_ar: معركة بلاسي — فتح البريطانيين البنغال
    title_fr: Bataille de Plassey — conquête britannique du Bengale
    description_en: |
      A small force of the British East India Company under Robert Clive
      defeated the army of Sirāj al-Dawla, the young Nawab of Bengal,
      at the village of Palāsī (Plassey) on the Bhāgīrathī river north
      of Murshidabad on 5 Shawwāl 1170 AH (23 June 1757 CE). The
      outcome was decided less by combat than by the secret defection
      of the nawab's senior commander Mīr Jaʿfar, who had been bought
      over by Company agents through the banker Jagat Seth and who
      withheld the bulk of the Bengal cavalry from the field. Sirāj
      al-Dawla fled, was captured days later, and was killed; Mīr
      Jaʿfar was installed as a Company-dependent nawab. The
      engagement was small in absolute terms, but its consequences
      were vast: the wealth of Bengal — at the time the richest
      province of the disintegrating Mughal Empire — passed under
      Company control, financing the further military expansion that
      would, within a century, make British India the dominant power
      on the subcontinent and end the long political ascendancy of
      Sunni Muslim rule there.
    description_ar: |
      هزمت قوة صغيرة من جيش شركة الهند الشرقية البريطانية بقيادة
      روبرت كلايف جيش سراج الدولة، نواب البنغال الشاب، عند قرية
      پلاسي على نهر «بهاكيرتي» شمالي مرشد آباد يوم ٥ شوال سنة
      ١١٧٠ هـ (الموافق ٢٣ جوان ١٧٥٧ ميلادي). ولم تَحْسِم النتيجةَ
      المعركةُ نفسها بقدر ما حسمتها خيانة سرّية من قبل القائد
      الأكبر لجيش النواب مير جعفر، الذي أبرم الإنجليز معه صفقة
      عن طريق الصيرفي «جاجَتْ سيث»، فحجب جلّ خيول البنغال عن
      المعركة. وفرّ سراج الدولة فأُسر بعد أيام وقُتل، وجُعل
      مير جعفر نواباً تابعاً للشركة. وكانت المعركة صغيرة في
      ذاتها، لكن آثارها كبيرة جداً: انتقلت ثروة البنغال — وكانت
      أغنى ولايات الدولة المغولية الإسلامية المتفكّكة — إلى يد
      الشركة، فمَوّلت توسعاً عسكرياً إضافياً جعل الهند البريطانية
      في غضون قرن واحد القوةَ المهيمنة على شبه القارة، ووضع نهاية
      للهيمنة السياسية الطويلة لأهل السنة المسلمين فيها.
    description_fr: |
      Une petite armée de la Compagnie britannique des Indes orientales
      sous Robert Clive défit l'armée de Sirāj al-Dawla, le jeune
      Nawab du Bengale, près du village de Palāsī (Plassey) sur la
      rivière Bhāgīrathī au nord de Murshidabad le 5 Shawwāl 1170 H
      (23 juin 1757 EC). Le résultat fut moins déterminé par les
      combats que par la défection secrète du commandant en chef du
      nawab, Mīr Jaʿfar, acheté par les agents de la Compagnie via
      le banquier Jagat Seth, qui retint le gros de la cavalerie
      bengalie hors du champ. Sirāj al-Dawla s'enfuit, fut capturé
      quelques jours plus tard et tué; Mīr Jaʿfar fut installé
      comme nawab à la solde de la Compagnie. La bataille fut
      modeste en elle-même, mais ses conséquences furent vastes :
      la richesse du Bengale — alors la province la plus riche
      d'un Empire moghol en désintégration — passa sous le contrôle
      de la Compagnie, finançant l'expansion militaire qui ferait,
      en l'espace d'un siècle, de l'Inde britannique la puissance
      dominante du sous-continent et mettrait fin à la longue
      prééminence politique des musulmans sunnites en Inde.
    canonical_hijri: {year: 1170, month: 10, day: 5, precision: day}
    canonical_gregorian: {date: 1757-06-23, precision: day, method: attested}
