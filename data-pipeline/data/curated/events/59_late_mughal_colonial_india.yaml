  - slug: death-of-tipu-sultan
    category: ruler_death
    title_en: Death of Tīpū Sulṭān at Seringapatam — Fall of Mysore
    title_ar: مقتل تيبو سلطان بسرنغ پتم — سقوط دولة ميسور
    title_fr: Mort de Tīpū Sulṭān à Seringapatam — chute de Mysore
    description_en: |
      Fatḥ ʿAlī Tīpū Sulṭān ibn Ḥaydar ʿAlī — Sunni Muslim ruler of
      the Sultanate of Mysore in southern India and the most
      militarily formidable Indian opponent the East India Company
      ever faced — was killed defending the breached fortress of
      Seringapatam (*Srīrangapaṭṭanam*) against the Fourth
      Anglo-Mysore War's final assault on 29 Dhū al-Qaʿda 1213 AH
      (4 May 1799 CE). He was about 49. Heir to his father's
      Mysore throne, he had reorganised his army on European
      lines, built a war-rocket arm decades ahead of any other
      Indian state, conducted long correspondence with Ottoman,
      Persian, French, and Mughal courts, and twice fought the
      Company to a settlement. With his fall, Mysore was reduced
      to a Company-protected princely state under a restored
      Hindu Wadiyar dynasty; with the simultaneous breakup of the
      Maratha confederacy a few years later, the major remaining
      organised resistance to British paramountcy on the
      subcontinent was extinguished. He was buried beside his
      father in the *Gumbaz* mausoleum at Seringapatam.
    description_ar: |
      قُتل فتح علي تيبو سلطان بن حيدر علي — السلطان المسلم السني
      صاحب دولة ميسور في جنوب الهند، وأشدّ خصوم شركة الهند الشرقية
      البريطانية من ملوك الهند منعةً وقتالاً — وهو يدافع عن قلعة
      «سرنگ پتم» بعد ثَلْم أسوارها في الهجوم الأخير من حرب الإنجليز
      الميسورية الرابعة، يوم ٢٩ ذي القعدة سنة ١٢١٣ هـ (الموافق
      ٤ ماي ١٧٩٩ ميلادي). وقد ناهز التاسعة والأربعين. وكان قد
      ورث ملك ميسور عن أبيه، وأعاد تنظيم جيشه على الطريقة
      الأوروبية، وأنشأ سلاحاً للصواريخ الحربية سبق به دول الهند
      عقوداً، وراسل دولة الخلافة العثمانية وملوك إيران وفرنسا
      والمغول، وحارب الإنجليز مرتين حتى أكرهتهما الحرب على
      التسوية. وبسقوطه ارتدّت ميسور إماراتٍ تابعة للشركة
      الإنجليزية تحت ملوكها الهندوس من «وادييار»، ومع تَفَكُّك
      الكونفدرالية المَرَاثية بعد ذلك بسنين قليلة انطفأ آخر
      جسم سياسي منظم يقاوم الهيمنة البريطانية على شبه القارة.
      ودُفن إلى جانب أبيه في ضريح «الكنبذ» بسرنغ پتم.
    description_fr: |
      Fatḥ ʿAlī Tīpū Sulṭān ibn Ḥaydar ʿAlī — souverain musulman
      sunnite du Sultanat de Mysore, dans le sud de l'Inde, et
      l'adversaire indien militairement le plus redoutable que la
      Compagnie britannique des Indes orientales ait jamais
      affronté — fut tué en défendant la forteresse éventrée de
      Seringapatam (*Srīrangapaṭṭanam*) lors de l'assaut final
      de la quatrième guerre anglo-mysoréenne, le 29 Dhū al-
      Qaʿda 1213 H (4 mai 1799 EC). Il avait environ 49 ans.
      Héritier du trône de Mysore de son père, il avait
      réorganisé son armée à l'européenne, bâti un corps de
      fusées de guerre des décennies en avance sur toute autre
      puissance indienne, entretenu une longue correspondance
      avec les cours ottomane, persane, française et moghole,
      et combattu la Compagnie deux fois jusqu'à des accords.
      Avec sa chute, Mysore fut ramené au rang d'État princier
      protégé par la Compagnie sous une dynastie hindoue
      Wadiyar restaurée; avec la dislocation simultanée de la
      confédération marathe quelques années plus tard, la
      résistance organisée à la suprématie britannique sur le
      sous-continent fut éteinte. Il fut enterré aux côtés de
      son père dans le mausolée du *Gumbaz* à Seringapatam.
    canonical_hijri: {year: 1213, month: 11, day: 29, precision: day}
    canonical_gregorian: {date: 1799-05-04, precision: day, method: attested}
