  - slug: exile-of-bahadur-shah-ii
    category: political_event
    title_en: Exile of Bahādur Shāh II Ẓafar to Rangoon — Formal End of the Mughal Empire
    title_ar: نفي بهادر شاه الثاني «ظفر» إلى رنغون — النهاية الرسمية للدولة المغولية
    title_fr: Exil de Bahādur Shāh II Ẓafar à Rangoon — fin formelle de l'Empire moghol
    description_en: |
      Mirzā Abū Ẓafar Sirāj al-Dīn Muḥammad Bahādur Shāh II,
      twenty-second and last emperor of the Mughal dynasty, was
      shipped from Calcutta to Rangoon in British Burma on
      28 Ṣafar 1275 AH (7 October 1858 CE), under the terms of
      his post-trial sentence following the 1857 Indian Rebellion.
      He had reigned in name from 1837 but in substance only
      over the Red Fort and its immediate dependencies. Acclaimed
      by the rebel sepoys as their nominal leader on the entry
      of the rebellion's vanguard into Delhi on 11 May 1857, he
      was tried by military commission in 1858 for treason and
      complicity in the murder of British prisoners; the verdict
      was guilty, but the death sentence was commuted to exile.
      He died at Rangoon on 7 November 1862 (14 Jumādā al-Ūlā
      1279 AH), aged 87, an Urdu poet of distinction whose
      published *dīwān* under the *takhalluṣ* "Ẓafar" survives.
      With his deportation, the imperial throne that had ruled
      over the Indian subcontinent in name since Babur's victory
      at Panipat in 932 AH (1526 CE) was extinguished by formal
      act of the British Crown, and the territories of the
      former empire were placed under direct rule by the
      Government of India Act of 1858.
    description_ar: |
      نُفي ميرزا أبو ظفر سراج الدين محمد بهادر شاه الثاني،
      الإمبراطور المغولي الثاني والعشرين وآخر سلاطين الدولة،
      من كَلكَتا إلى رنغون في بِرما البريطانية يوم ٢٨ صفر سنة
      ١٢٧٥ هـ (الموافق ٧ أكتوبر ١٨٥٨ ميلادي)، بموجب الحكم
      الصادر بحقه إثر ثورة سنة ١٢٧٣ هـ. وكان قد تولى الإمبراطورية
      اسماً سنة ١٢٥٣ هـ (١٨٣٧ ميلادي)، ولكنه في الحقيقة لم يَسُد
      إلا القلعة الحمراء وحواليها. وحين دخل طلائع الثوار من
      الجنود السبَاهيِّين دلهي يوم ١١ ماي ١٨٥٧ ميلادية بايعوه
      قائداً اسمياً، فحوكم سنة ١٨٥٨ ميلادية أمام لجنة عسكرية
      بتهمتي الخيانة العظمى والتواطؤ في قتل الأسرى البريطانيين،
      وصدر الحكم بإدانته، فخُفّف حكم الإعدام إلى النفي.
      وتوفي رحمه الله برنغون يوم ٧ نوفمبر ١٨٦٢ ميلادي (الموافق
      ١٤ جمادى الأولى سنة ١٢٧٩ هـ) عن سبع وثمانين سنة، وكان
      شاعراً بالأردية ذا اعتبار، وله ديوان مطبوع بتخلصه
      «ظفر». وبنفيه انقرض العرش الإمبراطوري الذي حكم اسمياً
      شبه القارة الهندية منذ نصر بابر في پانيپات سنة ٩٣٢ هـ
      (الموافق ١٥٢٦ ميلادي) بقرار رسمي من التاج البريطاني،
      ووُضعت أراضي الدولة المغولية السابقة تحت الحكم المباشر
      بقانون «حكومة الهند» سنة ١٨٥٨ ميلادية.
    description_fr: |
      Mirzā Abū Ẓafar Sirāj al-Dīn Muḥammad Bahādur Shāh II,
      vingt-deuxième et dernier empereur de la dynastie moghole,
      fut acheminé de Calcutta à Rangoon, en Birmanie britannique,
      le 28 Ṣafar 1275 H (7 octobre 1858 EC), au titre de la
      sentence prononcée à son encontre à la suite de la révolte
      indienne de 1857. Il avait régné nominalement depuis 1837,
      mais en pratique seulement sur le Fort Rouge et ses
      dépendances immédiates. Acclamé par les cipayes rebelles
      comme leur chef nominal lors de l'entrée de l'avant-garde
      de la révolte dans Delhi le 11 mai 1857, il fut jugé en
      1858 par une commission militaire pour trahison et
      complicité dans le meurtre de prisonniers britanniques;
      le verdict fut « coupable », mais la peine capitale fut
      commuée en exil. Il mourut à Rangoon le 7 novembre 1862
      (14 Jumādā al-Ūlā 1279 H), à 87 ans, poète ourdou de
      qualité dont le *dīwān* publié sous le *takhalluṣ* « Ẓafar »
      a été préservé. Par sa déportation, le trône impérial qui
      avait régné en titre sur le sous-continent indien depuis la
      victoire de Babur à Panipat en 932 H (1526 EC) fut éteint
      par acte formel de la Couronne britannique, et les
      territoires de l'ancien empire furent placés sous
      administration directe par le Government of India Act
      de 1858.
    canonical_hijri: {year: 1275, month: 2, day: 28, precision: day}
    canonical_gregorian: {date: 1858-10-07, precision: day, method: attested}
