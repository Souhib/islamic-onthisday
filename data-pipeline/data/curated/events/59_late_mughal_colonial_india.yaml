  - slug: battle-of-buxar
    category: battle
    title_en: Battle of Buxar — Company Becomes Dīwān of Bengal-Bihar-Orissa
    title_ar: معركة بَكْسَر — الشركة تتحوّل ديواناً للبنغال وبيهار وأوريسا
    title_fr: Bataille de Buxar — la Compagnie devient dīwān du Bengale-Bihar-Orissa
    description_en: |
      Seven years after Plassey, the British East India Company under
      Hector Munro defeated the combined armies of three Muslim
      Indian rulers — Mīr Qāsim (the deposed Nawab of Bengal),
      Shujāʿ al-Dawla (the Nawab of Awadh), and the Mughal emperor
      Shāh ʿĀlam II — at the town of Bakhsar (Buxar) on the Ganges
      west of Patna on 25 Rabīʿ al-Thānī 1178 AH (22 October 1764
      CE). The defeat was decisive: Mīr Qāsim's bid to break free
      of Company tutelage failed, Shujāʿ al-Dawla was forced into
      a subordinate alliance, and Shāh ʿĀlam II himself fell into
      Company hands. By the Treaty of Allahabad the following August
      he formally granted the Company the *dīwānī* — the right of
      civil administration and revenue collection — over Bengal,
      Bihar, and Orissa, in exchange for an annual pension. Where
      Plassey had begun the conquest of Bengal, Buxar legalised it
      under Mughal imperial sanction and made the East India
      Company a sovereign power in north-eastern India.
    description_ar: |
      بعد سبع سنين من معركة پلاسي، هزمت قوات شركة الهند الشرقية
      البريطانية بقيادة هكتور مونرو الجيوشَ الثلاثة المتحالفة:
      جيش مير قاسم نواب البنغال المعزول، وجيش شجاع الدولة نواب
      أَوَدْه، وجيش الإمبراطور المغولي شاه عالم الثاني، عند بلدة
      بَكْسَر على نهر الكَنْج غربيّ بَتْنا يوم ٢٥ ربيع الآخر سنة
      ١١٧٨ هـ (الموافق ٢٢ أكتوبر ١٧٦٤ ميلادي). وكانت الهزيمة
      قاطعة: فشلت محاولة مير قاسم في الانعتاق من نفوذ الشركة،
      وأُجبر شجاع الدولة على حلف تابع، ووقع شاه عالم الثاني
      نفسه في يد الشركة. وفي شهر أوت من السنة التالية أبرم معه
      الإنجليز «معاهدة الله آباد» ومنحت الشركة بموجبها
      «الديوانية»، أي حق الإدارة المدنية وجباية الخراج، على
      البنغال وبيهار وأوريسا، في مقابل معاش سنوي. وإذا كانت
      پلاسي قد فتحت باب التغلب على البنغال، فإن بَكْسَر شرعنته
      بختم إمبراطوري مغولي، وحوّلت شركة الهند الشرقية إلى
      سلطة سيادية في شمال شرق الهند.
    description_fr: |
      Sept ans après Plassey, la Compagnie britannique des Indes
      orientales sous Hector Munro défit les armées combinées de
      trois souverains musulmans indiens — Mīr Qāsim (le Nawab du
      Bengale déposé), Shujāʿ al-Dawla (le Nawab d'Awadh) et
      l'empereur moghol Shāh ʿĀlam II — à la ville de Bakhsar
      (Buxar) sur le Gange à l'ouest de Patna, le 25 Rabīʿ al-Thānī
      1178 H (22 octobre 1764 EC). La défaite fut décisive : la
      tentative de Mīr Qāsim de se libérer de la tutelle de la
      Compagnie échoua, Shujāʿ al-Dawla fut contraint à une
      alliance subordonnée et Shāh ʿĀlam II lui-même tomba aux
      mains de la Compagnie. Par le Traité d'Allahabad du mois
      d'août suivant, il accorda formellement à la Compagnie le
      *dīwānī* — le droit d'administration civile et de collecte
      des revenus — sur le Bengale, le Bihar et l'Orissa, en
      échange d'une pension annuelle. Là où Plassey avait amorcé
      la conquête du Bengale, Buxar la légalisa sous sanction
      impériale moghole et fit de la Compagnie britannique une
      puissance souveraine dans le nord-est de l'Inde.
    canonical_hijri: {year: 1178, month: 4, day: 25, precision: day}
    canonical_gregorian: {date: 1764-10-22, precision: day, method: attested}
