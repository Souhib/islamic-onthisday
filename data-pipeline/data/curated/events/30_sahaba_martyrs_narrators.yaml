# Wave 17 of curated event additions (2026-04-27).
# Senior sahaba beyond the famous figures: martyrs of Muʾta and the Ridda
# wars, late narrators in Khurasan/Damascus/Kufa, and ahl al-bayt collateral
# branches. All sahaba — image_blocked. Each event attested in ≥2 of:
# Ibn Ḥajar al-Iṣāba, al-Dhahabī Siyar, Ibn Saʿd Ṭabaqāt, al-Ṭabarī
# Tārīkh, Ibn al-Athīr al-Kāmil, Ibn Hishām al-Sīra, Ibn Kathīr al-Bidāya,
# Ibn Khallikān Wafayāt. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # MARTYRS OF MUʾTA (8 AH) — Zayd ibn Ḥāritha + ʿAbdullāh ibn Rawāḥa
  # =========================================================================

  - slug: martyrdom-of-zayd-ibn-haritha
    category: battle
    title_en: Martyrdom of Zayd ibn Ḥāritha ra at Muʾta — First Commander to Fall
    title_ar: استشهاد زيد بن حارثة رضي الله عنه في مؤتة — أول القادة الثلاثة
    title_fr: Martyre de Zayd ibn Ḥāritha ra à Muʾta — premier commandant tombé
    description_en: |
      Zayd ibn Ḥāritha al-Kalbī — freedman of the Prophet ﷺ
      (originally captured as a child of the Banū Kalb and gifted
      to Khadīja ra, who in turn gifted him to the Prophet ﷺ, who
      manumitted him and called him *ibnī* — "my son" — until
      Q. 33:5 abrogated the practice of legal adoption) and the
      only Companion named in the Qur'an by his given name (Q. 33:37)
      — was the first of the three commanders appointed by the
      Prophet ﷺ at Muʾta and the first to fall. The Muslim force of
      three thousand met a far larger Byzantine-Ghassānid army at
      the village of Muʾta southeast of the Dead Sea in Jumādā I 8 AH
      (September 629 CE). Zayd carried the standard at the front
      until he was struck by a spear and bled to death. The Prophet ﷺ
      announced the martyrdom in Medina before the messenger could
      arrive, weeping over Zayd as he had wept over no other
      Companion. Zayd was about 55. His son Usāma ibn Zayd ra was
      raised by the Prophet ﷺ as a beloved foster-grandson.
    description_ar: |
      اِسْتُشْهِدَ زَيْدُ بْنُ حَارِثَةَ الْكَلْبِيُّ رَضِيَ اللَّهُ
      عَنْهُ — مَوْلَى رَسُولِ اللَّهِ ﷺ (وَكَانَ سُبِيَ صَغِيرًا
      مِنْ بَنِي كَلْبٍ، فَأَهْدَتْهُ خَدِيجَةُ رَضِيَ اللَّهُ عَنْهَا
      لِلنَّبِيِّ ﷺ، فَأَعْتَقَهُ وَكَانَ يَدْعُوهُ ابْنَهُ حَتَّى
      نَزَلَ قَوْلُهُ تَعَالَى ﴿ادْعُوهُمْ لِآبَائِهِمْ﴾) —
      وَهُوَ الصَّحَابِيُّ الْوَحِيدُ الَّذِي ذُكِرَ بِاسْمِهِ
      الصَّرِيحِ فِي الْقُرْآنِ (الأَحْزَاب ٣٧)، وَأَوَّلُ الْقَادَةِ
      الثَّلَاثَةِ الَّذِينَ أَمَّرَهُمُ النَّبِيُّ ﷺ يَوْمَ مُؤْتَةَ.
      اِلْتَقَى ثَلَاثَةُ آلَافٍ مِنَ الْمُسْلِمِينَ بِجَيْشٍ
      بِيزَنْطِيٍّ غَسَّانِيٍّ يَفُوقُهُمْ كَثْرَةً فِي قَرْيَةِ
      مُؤْتَةَ جَنُوبَ شَرْقِيَّ الْبَحْرِ الْمَيِّتِ فِي جُمَادَى
      الأُولَى سَنَةَ ثَمَانٍ مِنَ الْهِجْرَةِ. حَمَلَ زَيْدٌ اللِّوَاءَ
      حَتَّى طُعِنَ بِرُمْحٍ فَنَزَفَ دَمُهُ وَمَاتَ، وَكَانَ ابْنُ
      نَحْوِ خَمْسٍ وَخَمْسِينَ سَنَةً. وَأَخْبَرَ النَّبِيُّ ﷺ بِخَبَرِ
      اسْتِشْهَادِهِ بِالْمَدِينَةِ قَبْلَ وُصُولِ الْبَرِيدِ، وَبَكَى
      عَلَيْهِ بُكَاءً لَمْ يَبْكِهِ عَلَى أَحَدٍ مِنَ الصَّحَابَةِ
      مِنْ قَبْلُ. وَرَبَّى النَّبِيُّ ﷺ ابْنَهُ أُسَامَةَ بْنَ زَيْدٍ
      رَضِيَ اللَّهُ عَنْهُ كَالْحَفِيدِ الْحَبِيبِ.
    description_fr: |
      Zayd ibn Ḥāritha al-Kalbī — affranchi du Prophète ﷺ (capturé
      enfant chez les Banū Kalb puis offert à Khadīja ra, qui le
      donna à son tour au Prophète ﷺ, lequel l'affranchit et
      l'appelait *ibnī* — « mon fils » — jusqu'à ce que Q. 33:5
      abolisse la pratique de l'adoption légale) et seul Compagnon
      nommé dans le Coran par son prénom (Q. 33:37) — fut le premier
      des trois commandants désignés par le Prophète ﷺ à Muʾta et le
      premier à tomber. Les trois mille musulmans rencontrèrent une
      armée byzantino-ghassanide bien plus nombreuse au village de
      Muʾta, au sud-est de la mer Morte, en Jumādā I de l'an 8 H
      (septembre 629). Zayd portait l'étendard en tête jusqu'à ce
      qu'un coup de lance le transperçât ; il mourut d'hémorragie.
      Le Prophète ﷺ annonça son martyre à Médine avant l'arrivée du
      messager, et pleura sur lui comme il n'avait pleuré sur aucun
      autre Compagnon. Zayd avait environ 55 ans. Son fils Usāma ibn
      Zayd ra fut élevé par le Prophète ﷺ comme un petit-fils chéri.
    canonical_hijri: {year: 8, month: 5, precision: month}
    canonical_gregorian: {date: 629-09-15, precision: month, method: attested}
