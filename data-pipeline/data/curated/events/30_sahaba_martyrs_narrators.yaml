  - slug: martyrdom-of-abdullah-ibn-rawaha
    category: battle
    title_en: Martyrdom of ʿAbdullāh ibn Rawāḥa ra at Muʾta — Anṣārī Poet-Commander
    title_ar: استشهاد عبد الله بن رواحة رضي الله عنه في مؤتة — الأنصاري الشاعر
    title_fr: Martyre d'ʿAbdullāh ibn Rawāḥa ra à Muʾta — poète-commandant ansari
    description_en: |
      ʿAbdullāh ibn Rawāḥa al-Anṣārī al-Khazrajī — one of the
      twelve *naqībs* selected at the second pledge of al-ʿAqaba,
      the Prophet's ﷺ designated poet alongside Ḥassān ibn Thābit
      and Kaʿb ibn Mālik, scribe of revelation, and a participant
      at Badr, Uḥud, al-Khandaq, al-Ḥudaybiyya, and Khaybar — was
      the third and final commander to fall at Muʾta in Jumādā I
      8 AH (September 629 CE), after Zayd ibn Ḥāritha and Jaʿfar ibn
      Abī Ṭālib ra. Sources record him hesitating briefly when the
      banner reached him after Jaʿfar's two arms were severed, then
      reciting verses to his own soul reproaching it before charging
      forward. He fought until he was killed. His verses on that day,
      preserved by Ibn Hishām, ending "yā nafsu mā laki tukrahīna
      al-jannata" ("O my soul, why do you dread Paradise?"), became
      one of the most cited examples of *shiʿr al-istishhād* in
      classical Arabic literature. Khālid ibn al-Walīd ra then took
      up the standard and saved the army.
    description_ar: |
      اِسْتُشْهِدَ عَبْدُ اللَّهِ بْنُ رَوَاحَةَ الأَنْصَارِيُّ
      الْخَزْرَجِيُّ رَضِيَ اللَّهُ عَنْهُ — أَحَدُ النُّقَبَاءِ
      الِاثْنَيْ عَشَرَ يَوْمَ بَيْعَةِ الْعَقَبَةِ الثَّانِيَةِ،
      وَأَحَدُ شُعَرَاءِ النَّبِيِّ ﷺ مَعَ حَسَّانَ بْنِ ثَابِتٍ
      وَكَعْبِ بْنِ مَالِكٍ رَضِيَ اللَّهُ عَنْهُمَا، وَكَاتِبٌ
      مِنْ كُتَّابِ الْوَحْيِ، وَشَهِدَ بَدْرًا وَأُحُدًا وَالْخَنْدَقَ
      وَالْحُدَيْبِيَةَ وَخَيْبَرَ — وَهُوَ الْقَائِدُ الثَّالِثُ
      وَالأَخِيرُ الَّذِي سَقَطَ يَوْمَ مُؤْتَةَ فِي جُمَادَى الأُولَى
      سَنَةَ ثَمَانٍ بَعْدَ زَيْدِ بْنِ حَارِثَةَ وَجَعْفَرِ بْنِ
      أَبِي طَالِبٍ رَضِيَ اللَّهُ عَنْهُمَا. ذَكَرَتِ السِّيَرُ
      أَنَّهُ تَرَدَّدَ يَسِيرًا حِينَ بَلَغَتْهُ الرَّايَةُ بَعْدَ
      قَطْعِ يَدَيْ جَعْفَرٍ، ثُمَّ أَنْشَدَ لِنَفْسِهِ يُعَاتِبُهَا
      ثُمَّ اِنْدَفَعَ. وَقَاتَلَ حَتَّى قُتِلَ. وَأَبْيَاتُهُ تِلْكَ
      الَّتِي حَفِظَهَا ابْنُ هِشَامٍ وَخَتَمَهَا بِقَوْلِهِ:
      «يَا نَفْسُ مَا لَكِ تَكْرَهِينَ الْجَنَّةَ» صَارَتْ
      مِنْ أَشْهَرِ نَمَاذِجِ شِعْرِ الِاسْتِشْهَادِ فِي الأَدَبِ
      الْعَرَبِيِّ. ثُمَّ أَخَذَ خَالِدُ بْنُ الْوَلِيدِ رَضِيَ
      اللَّهُ عَنْهُ الرَّايَةَ فَأَنْقَذَ الْجَيْشَ.
    description_fr: |
      ʿAbdullāh ibn Rawāḥa al-Anṣārī al-Khazrajī — l'un des douze
      *naqībs* (chefs) désignés au second serment d'al-ʿAqaba,
      poète attitré du Prophète ﷺ aux côtés de Ḥassān ibn Thābit et
      de Kaʿb ibn Mālik, scribe de la révélation, et participant à
      Badr, Uḥud, al-Khandaq, al-Ḥudaybiyya et Khaybar — fut le
      troisième et dernier commandant à tomber à Muʾta en Jumādā I
      de l'an 8 H (septembre 629), après Zayd ibn Ḥāritha et
      Jaʿfar ibn Abī Ṭālib ra. Les sources rapportent qu'il hésita
      brièvement quand l'étendard lui parvint après que Jaʿfar eut
      les deux bras tranchés, puis récita des vers reprochant à son
      âme sa propre lâcheté avant de charger. Il combattit jusqu'à
      la mort. Ces vers, préservés par Ibn Hishām et se terminant
      par « yā nafsu mā laki tukrahīna al-jannata » (« ô mon âme,
      pourquoi redoutes-tu le Paradis ? »), devinrent l'un des
      exemples les plus cités de *shiʿr al-istishhād* dans la
      littérature arabe classique. Khālid ibn al-Walīd ra prit
      ensuite l'étendard et sauva l'armée.
    canonical_hijri: {year: 8, month: 5, precision: month}
    canonical_gregorian: {date: 629-09-15, precision: month, method: attested}
