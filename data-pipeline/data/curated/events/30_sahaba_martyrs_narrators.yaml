  # =========================================================================
  # SON OF ḤĀTIM AL-ṬĀʾĪ
  # =========================================================================

  - slug: death-of-adi-ibn-hatim-al-tai
    category: companion
    title_en: Death of ʿAdī ibn Ḥātim al-Ṭāʾī ra — Son of the Legendary Generous
    title_ar: وفاة عدي بن حاتم الطائي رضي الله عنه — ابن أكرم العرب
    title_fr: Mort d'ʿAdī ibn Ḥātim al-Ṭāʾī ra — fils de la légende de la générosité
    description_en: |
      ʿAdī ibn Ḥātim al-Ṭāʾī — son of the proverbially generous
      pre-Islamic poet Ḥātim al-Ṭāʾī, chief of the Banū Ṭayyiʾ, and
      a Christian until his deputation embraced Islam in 9 AH (the
      Year of Deputations) — died in Kūfa in 67 or 68 AH (687-688 CE)
      at a reported age of 120 years. Bukhārī and Muslim preserve
      the Prophet's ﷺ encounter with him: when ʿAdī arrived in
      Medina with a silver crucifix around his neck, the Prophet ﷺ
      recited Q. 9:31 to him ("They have taken their rabbis and
      monks as lords") and answered ʿAdī's hesitations directly.
      He fought beside ʿAlī ra at the Battle of the Camel and
      Ṣiffīn, lost an eye and a son in the latter, and ended his
      days in Kūfa. He was a foundational *muḥaddith* of Iraq;
      Bukhārī preserves twenty hadith from him, including the
      famous hadith of "the white thread and the black thread" of
      Ramaḍān fasting (Bukhārī 1916), which was occasioned by
      ʿAdī's own literal misunderstanding of the verse.
    description_ar: |
      تُوُفِّيَ عَدِيُّ بْنُ حَاتِمٍ الطَّائِيُّ رَضِيَ اللَّهُ
      عَنْهُ — اِبْنُ حَاتِمٍ الطَّائِيِّ شَاعِرِ الْجَاهِلِيَّةِ
      الْمَضْرُوبِ بِكَرَمِهِ الْمَثَلُ، وَسَيِّدُ بَنِي طَيِّئٍ،
      وَكَانَ نَصْرَانِيًّا حَتَّى أَسْلَمَ مَعَ وَفْدِ قَوْمِهِ
      سَنَةَ تِسْعٍ مِنَ الْهِجْرَةِ (عَامُ الْوُفُودِ) — بِالْكُوفَةِ
      سَنَةَ سَبْعٍ أَوْ ثَمَانٍ وَسِتِّينَ مِنَ الْهِجْرَةِ، وَكَانَ
      عُمْرُهُ نَحْوَ مِئَةٍ وَعِشْرِينَ سَنَةً. رَوَى الْبُخَارِيُّ
      وَمُسْلِمٌ لِقَاءَهُ بِالنَّبِيِّ ﷺ: لَمَّا قَدِمَ الْمَدِينَةَ
      وَفِي عُنُقِهِ صَلِيبٌ مِنْ فِضَّةٍ، تَلَا عَلَيْهِ النَّبِيُّ ﷺ
      ﴿اتَّخَذُوا أَحْبَارَهُمْ وَرُهْبَانَهُمْ أَرْبَابًا مِنْ
      دُونِ اللَّهِ﴾ (التوبة ٣١) وَأَجَابَ شُكُوكَهُ. وَقَاتَلَ مَعَ
      عَلِيٍّ رَضِيَ اللَّهُ عَنْهُ يَوْمَ الْجَمَلِ وَيَوْمَ صِفِّينَ،
      وَفَقَدَ عَيْنَهُ وَوَلَدًا فِي صِفِّينَ، وَخَتَمَ أَيَّامَهُ
      بِالْكُوفَةِ. وَهُوَ مِنْ كِبَارِ مُحَدِّثِي الْعِرَاقِ:
      رَوَى الْبُخَارِيُّ عَنْهُ نَحْوَ عِشْرِينَ حَدِيثًا، مِنْهَا
      حَدِيثُ «الْخَيْطِ الأَبْيَضِ وَالْخَيْطِ الأَسْوَدِ» فِي
      صِيَامِ رَمَضَانَ (الْبُخَارِيُّ ١٩١٦) الَّذِي كَانَ سَبَبُهُ
      فَهْمَ عَدِيٍّ الْحَرْفِيَّ لِلْآيَةِ.
      
      Sources record his death between 67 and 68 AH; we follow Ibn Saʿd's *Ṭabaqāt* with 67 AH as the most-cited attestation, while Ibn Ḥajar gives 68 AH in *al-Iṣāba* as a minority position.
      
      ذكرت المصادر وفاته بين سنتي ٦٧ و٦٨ هـ؛ ونتبع هنا «طبقات» ابن سعد بسنة ٦٧ هـ أكثر التواريخ استشهاداً، مع إيراد ابن حجر سنة ٦٨ هـ في «الإصابة» بوصفها قولاً أقل.
    description_fr: |
      ʿAdī ibn Ḥātim al-Ṭāʾī — fils du poète préislamique Ḥātim
      al-Ṭāʾī, devenu proverbe de générosité, chef des Banū Ṭayyiʾ,
      chrétien jusqu'à ce que sa délégation embrassât l'Islam en
      9 H (l'Année des Délégations) — mourut à Kūfa en 67 ou 68 H
      (687-688), à un âge rapporté de 120 ans. Bukhārī et Muslim
      préservent sa rencontre avec le Prophète ﷺ : lorsqu'ʿAdī
      arriva à Médine portant un crucifix d'argent au cou, le
      Prophète ﷺ lui récita Q. 9:31 (« ils ont pris leurs rabbins
      et leurs moines pour seigneurs hors d'Allāh ») et répondit
      à ses hésitations. Il combattit aux côtés d'ʿAlī ra à la
      bataille du Chameau et à Ṣiffīn, y perdit un œil et un fils,
      et termina ses jours à Kūfa. C'est un muḥaddith fondateur
      de l'Iraq : Bukhārī préserve vingt hadiths de lui, dont le
      célèbre hadith du « fil blanc et du fil noir » du jeûne de
      Ramaḍān (Bukhārī 1916), occasionné par sa propre lecture
      littérale du verset.
    canonical_hijri: {year: 67, precision: year}
    canonical_gregorian: {date: 687-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_hajar_isaba
        is_canonical: true
      - source_key: ibn_sad_tabaqat
      - source_key: dhahabi_siyar
      - source_key: ibn_kathir_bidaya
    hadith_refs: "Bukhari 1916"
    people: [[adi-ibn-hatim-al-tai, subject], [muhammad, subject], [ali-ibn-abi-talib, subject]]
    tags: [sahabi, tayy, christian-convert, kufa, muhaddith, hatim-al-tai-son]
    importance: notable
    verification_status: cross_verified
    disputed: true
    dispute_about: date
