  # =========================================================================
  # MARTYR OF YAMĀMA — Chief of Daws
  # =========================================================================

  - slug: martyrdom-of-al-tufayl-ibn-amr-al-dawsi
    category: battle
    title_en: Martyrdom of al-Ṭufayl ibn ʿAmr al-Dawsī ra at al-Yamāma
    title_ar: استشهاد الطفيل بن عمرو الدوسي رضي الله عنه باليمامة
    title_fr: Martyre d'al-Ṭufayl ibn ʿAmr al-Dawsī ra à al-Yamāma
    description_en: |
      Al-Ṭufayl ibn ʿAmr al-Dawsī — chief of the Daws tribe of
      Tihāma, a noble pre-Islamic poet whom the Quraysh tried to
      shield from the Prophet's ﷺ message by stuffing cotton in
      his ears at the Kaʿba, and who nevertheless heard a verse
      and embraced Islam, then returned to Daws and brought his
      entire tribe (including the young Abū Hurayra ra) into Islam —
      was martyred at the Battle of al-Yamāma in 12 AH (633 CE)
      during the Ridda Wars under Caliph Abū Bakr ra against the
      false prophet Musaylima al-Kadhdhāb. Sources record that he
      saw a vision the night before the battle in which his head
      was shaved (interpreted as forthcoming martyrdom) and a bird
      flew out of his mouth (his soul). His son ʿAmr ibn al-Ṭufayl
      was wounded the same day and survived to fight again at
      Yarmūk, where he too was martyred — father and son falling
      in the two foundational battles of the Caliphate.
    description_ar: |
      اِسْتُشْهِدَ الطُّفَيْلُ بْنُ عَمْرٍو الدَّوْسِيُّ رَضِيَ اللَّهُ
      عَنْهُ — سَيِّدُ قَبِيلَةِ دَوْسٍ مِنْ تِهَامَةَ، وَشَاعِرٌ
      جَاهِلِيٌّ شَرِيفٌ حَاوَلَتْ قُرَيْشٌ أَنْ تَحْجُبَهُ عَنْ
      كَلَامِ النَّبِيِّ ﷺ بِأَنْ حَشَوْا أُذُنَيْهِ بِالْقُطْنِ
      عِنْدَ الْكَعْبَةِ، فَسَمِعَ آيَةً وَأَسْلَمَ، ثُمَّ رَجَعَ
      إِلَى دَوْسٍ فَأَدْخَلَهَا فِي الإِسْلَامِ كُلَّهَا (وَمِنْهُمْ
      أَبُو هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ) — يَوْمَ الْيَمَامَةِ
      سَنَةَ ثِنْتَيْ عَشْرَةَ مِنَ الْهِجْرَةِ فِي حُرُوبِ الرِّدَّةِ
      فِي خِلَافَةِ أَبِي بَكْرٍ الصِّدِّيقِ رَضِيَ اللَّهُ عَنْهُ
      عَلَى مُسَيْلِمَةَ الْكَذَّابِ. ذَكَرَتِ السِّيَرُ أَنَّهُ
      رَأَى لَيْلَةَ الْمَعْرَكَةِ رُؤْيَا حُلِقَ فِيهَا رَأْسُهُ
      (وَتَأَوَّلَ ذَلِكَ بِالشَّهَادَةِ) وَخَرَجَ مِنْ فِيهِ طَائِرٌ
      (وَتَأَوَّلَهُ رُوحَهُ). وَجُرِحَ ابْنُهُ عَمْرُو بْنُ
      الطُّفَيْلِ يَوْمَئِذٍ، وَنَجَا فَقَاتَلَ يَوْمَ الْيَرْمُوكِ
      فَاسْتُشْهِدَ — فَالأَبُ وَالِابْنُ شَهِيدَا الْمَعْرَكَتَيْنِ
      الْمُؤَسِّسَتَيْنِ لِلْخِلَافَةِ.
    description_fr: |
      Al-Ṭufayl ibn ʿAmr al-Dawsī — chef de la tribu de Daws en
      Tihāma, poète noble préislamique que les Qurayshites tentèrent
      de soustraire au message du Prophète ﷺ en lui bouchant les
      oreilles avec du coton près de la Kaʿba, mais qui entendit
      pourtant un verset et embrassa l'Islam, puis revint à Daws
      et fit entrer sa tribu entière (dont le jeune Abū Hurayra ra)
      dans l'Islam — fut martyrisé à la bataille d'al-Yamāma en
      12 H (633) durant les Guerres de la Ridda sous le califat
      d'Abū Bakr ra contre le faux prophète Musaylima al-Kadhdhāb.
      Les sources rapportent qu'il vit la nuit précédant la
      bataille une vision où sa tête était rasée (interprétée comme
      son martyre prochain) et un oiseau s'envolait de sa bouche
      (son âme). Son fils ʿAmr ibn al-Ṭufayl fut blessé le même
      jour, survécut, et combattit ensuite à Yarmūk, où il tomba
      lui aussi en martyr — père et fils fauchés dans les deux
      batailles fondatrices du Califat.
    canonical_hijri: {year: 12, precision: year}
    canonical_gregorian: {date: 633-01-01, precision: year, method: attested}
