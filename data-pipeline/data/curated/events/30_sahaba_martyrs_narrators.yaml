  # =========================================================================
  # SON OF ʿALĪ ra BY A NON-FĀṬIMA WIFE
  # =========================================================================

  - slug: death-of-muhammad-ibn-al-hanafiyya
    category: ahl_al_bayt
    title_en: Death of Muḥammad ibn al-Ḥanafiyya — Son of ʿAlī ra
    title_ar: وفاة محمد بن الحنفية — ابن علي رضي الله عنه
    title_fr: Mort de Muḥammad ibn al-Ḥanafiyya — fils d'ʿAlī ra
    description_en: |
      Muḥammad ibn ʿAlī, known as *ibn al-Ḥanafiyya* after his
      mother Khawla bint Jaʿfar al-Ḥanafiyya (a non-Fāṭimid wife
      of ʿAlī ra), eldest surviving son of ʿAlī ibn Abī Ṭālib ra
      after the martyrdoms of al-Ḥasan and al-Ḥusayn ra and a
      respected *tābiʿī* in his own right — died at al-Ṭāʾif (or
      Medina, sources differ) in 81 AH (700-701 CE) at about 65
      years of age. Famously neutral during the Second Fitna, he
      refused to give bayʿa to Yazīd ibn Muʿāwiya or to ʿAbdullāh
      ibn al-Zubayr, was briefly imprisoned by the latter at Mecca,
      and eventually pledged to ʿAbd al-Malik ibn Marwān only when
      forced. Al-Mukhtār al-Thaqafī raised the banner of revenge
      for al-Ḥusayn in his name without his sanction. The Kaysānī
      sect later splintered around the false claim that he was the
      Mahdī in occultation in Mount Raḍwā. Sunni biographers
      (Dhahabī, Ibn Saʿd) record him as a transmitter of hadith
      from his father, his stepmother Asmāʾ bint ʿUmays ra, and
      from ʿUthmān ra.
    description_ar: |
      تُوُفِّيَ مُحَمَّدُ بْنُ عَلِيٍّ الْمَعْرُوفُ بِابْنِ
      الْحَنَفِيَّةِ نِسْبَةً إِلَى أُمِّهِ خَوْلَةَ بِنْتِ جَعْفَرٍ
      الْحَنَفِيَّةِ (مِنْ غَيْرِ فَاطِمَةَ رَضِيَ اللَّهُ عَنْهَا)،
      أَكْبَرُ أَبْنَاءِ عَلِيِّ بْنِ أَبِي طَالِبٍ رَضِيَ اللَّهُ
      عَنْهُ بَقَاءً بَعْدَ شَهَادَةِ الْحَسَنِ وَالْحُسَيْنِ رَضِيَ
      اللَّهُ عَنْهُمَا، وَتَابِعِيٌّ كَبِيرٌ فِي ذَاتِهِ — بِالطَّائِفِ
      أَوْ بِالْمَدِينَةِ (اِخْتُلِفَ فِي مَوْضِعِهِ) سَنَةَ إِحْدَى
      وَثَمَانِينَ مِنَ الْهِجْرَةِ، وَكَانَ ابْنَ نَحْوِ خَمْسٍ
      وَسِتِّينَ سَنَةً. اِشْتَهَرَ بِحِيَادِهِ يَوْمَ الْفِتْنَةِ
      الثَّانِيَةِ: امْتَنَعَ عَنْ بَيْعَةِ يَزِيدَ بْنِ مُعَاوِيَةَ
      وَعَبْدِ اللَّهِ بْنِ الزُّبَيْرِ مَعًا، فَحُبِسَ بِمَكَّةَ
      حِينًا عِنْدَ ابْنِ الزُّبَيْرِ، وَلَمْ يُبَايِعْ عَبْدَ
      الْمَلِكِ بْنَ مَرْوَانَ إِلَّا مُكْرَهًا. وَرَفَعَ الْمُخْتَارُ
      الثَّقَفِيُّ رَايَةَ الثَّأْرِ لِلْحُسَيْنِ بِاسْمِهِ مِنْ
      دُونِ إِذْنِهِ. وَتَفَرَّقَتْ بَعْدَهُ الْكَيْسَانِيَّةُ
      عَلَى دَعْوَى أَنَّهُ الْمَهْدِيُّ الْغَائِبُ بِجَبَلِ رَضْوَى
      وَهُوَ بَاطِلٌ. ذَكَرَهُ الذَّهَبِيُّ وَابْنُ سَعْدٍ مِنْ
      رُوَاةِ الْحَدِيثِ عَنْ أَبِيهِ وَزَوْجَةِ أَبِيهِ أَسْمَاءَ
      بِنْتِ عُمَيْسٍ رَضِيَ اللَّهُ عَنْهُمَا وَعَنْ عُثْمَانَ
      رَضِيَ اللَّهُ عَنْهُ.
    description_fr: |
      Muḥammad ibn ʿAlī, dit *ibn al-Ḥanafiyya* d'après sa mère
      Khawla bint Jaʿfar al-Ḥanafiyya (épouse non-fāṭimide d'ʿAlī ra),
      aîné des fils survivants d'ʿAlī ibn Abī Ṭālib ra après le
      martyre d'al-Ḥasan et d'al-Ḥusayn ra et tābiʿī respecté en
      lui-même — mourut à al-Ṭāʾif (ou à Médine, les sources
      divergent) en 81 H (700-701) vers l'âge de 65 ans. Célèbre
      pour sa neutralité durant la Seconde Fitna, il refusa de
      prêter allégeance à Yazīd ibn Muʿāwiya comme à ʿAbdullāh
      ibn al-Zubayr, fut brièvement emprisonné par ce dernier à
      La Mecque, et finit par se rallier à ʿAbd al-Malik ibn
      Marwān seulement contraint. Al-Mukhtār al-Thaqafī leva la
      bannière de la vengeance d'al-Ḥusayn en son nom sans son
      consentement. La secte kaysānite s'agrégea après lui autour
      de la fausse prétention qu'il était le Mahdī en occultation
      au mont Raḍwā. Les biographes sunnites (Dhahabī, Ibn Saʿd)
      le mentionnent comme transmetteur de hadiths de son père,
      de sa belle-mère Asmāʾ bint ʿUmays ra et d'ʿUthmān ra.
    canonical_hijri: {year: 81, precision: year}
    canonical_gregorian: {date: 700-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
      - source_key: ibn_kathir_bidaya
      - source_key: ibn_khallikan_wafayat
    people: [[muhammad-ibn-al-hanafiyya, subject], [ali-ibn-abi-talib, subject]]
    tags: [tabii, ahl-al-bayt, son-of-ali, second-fitna, neutral, kaysaniyya-rejected]
    importance: notable
    verification_status: cross_verified
    disputed: true
    dispute_about: detail
    source_url: "https://en.wikipedia.org/wiki/Muhammad_ibn_al-Hanafiyyah"

  # =========================================================================
  # NARRATOR IN KHURĀSĀN
  # =========================================================================

  - slug: death-of-buraydah-ibn-al-husayb-al-aslami
    category: companion
    title_en: Death of Buraydah ibn al-Ḥuṣayb al-Aslamī ra in Marw
    title_ar: وفاة بريدة بن الحصيب الأسلمي رضي الله عنه بمرو
    title_fr: Mort de Buraydah ibn al-Ḥuṣayb al-Aslamī ra à Marw
    description_en: |
      Buraydah ibn al-Ḥuṣayb al-Aslamī — chief of the Banū Sahm
      sub-clan of the Aslam tribe, who met the Prophet ﷺ on the
      Hijra road at the well of al-Ghamīm with seventy or eighty
      horsemen of his tribe, all of whom embraced Islam on the
      spot — died at Marw in Khurāsān in 63 AH (683 CE) during the
      reign of Yazīd ibn Muʿāwiya. He participated in al-Ḥudaybiyya,
      Khaybar, and the Conquest of Mecca, and is the *rāwī* of the
      foundational hadith of the Prophet's ﷺ saying about the
      *khilāfa* lasting thirty years (preserved in the *Sunan*).
      He served as a frontier commander into Khurāsān and Sijistān
      under Muʿāwiya and Yazīd, settling at Marw, where his grave
      remains a recognised pilgrimage site today in Bayramaly,
      Turkmenistan. He was approximately 80 at his death. Bukhārī
      and Muslim preserve numerous hadith from him, particularly
      on prayer, poverty, and the proper conduct of jihād.
    description_ar: |
      تُوُفِّيَ بُرَيْدَةُ بْنُ الْحُصَيْبِ الأَسْلَمِيُّ رَضِيَ
      اللَّهُ عَنْهُ — سَيِّدُ بَنِي سَهْمٍ مِنْ قَبِيلَةِ أَسْلَمَ،
      الَّذِي لَقِيَ رَسُولَ اللَّهِ ﷺ فِي طَرِيقِ الْهِجْرَةِ عِنْدَ
      مَاءِ الْغَمِيمِ مَعَ سَبْعِينَ أَوْ ثَمَانِينَ فَارِسًا مِنْ
      قَوْمِهِ، فَأَسْلَمُوا جَمِيعًا فِي مَكَانِهِمْ — بِمَرْوَ
      مِنْ خُرَاسَانَ سَنَةَ ثَلَاثٍ وَسِتِّينَ مِنَ الْهِجْرَةِ
      فِي خِلَافَةِ يَزِيدَ بْنِ مُعَاوِيَةَ. شَهِدَ الْحُدَيْبِيَةَ
      وَخَيْبَرَ وَفَتْحَ مَكَّةَ، وَهُوَ رَاوِي الْحَدِيثِ
      الْمَشْهُورِ فِي قَوْلِ النَّبِيِّ ﷺ بِأَنَّ الْخِلَافَةَ
      ثَلَاثُونَ سَنَةً (مَحْفُوظٌ فِي السُّنَنِ). وَوَلِيَ ثُغُورَ
      خُرَاسَانَ وَسِجِسْتَانَ فِي عَهْدِ مُعَاوِيَةَ وَيَزِيدَ،
      وَنَزَلَ بِمَرْوَ، وَلَا يَزَالُ قَبْرُهُ بِبَيْرَامَ عَلِي
      مِنْ تُرْكْمَانِسْتَانَ مَزَارًا مَعْرُوفًا. وَكَانَ ابْنَ
      نَحْوِ ثَمَانِينَ سَنَةً عِنْدَ وَفَاتِهِ. وَفِي الصَّحِيحَيْنِ
      عَنْهُ أَحَادِيثُ كَثِيرَةٌ، خَاصَّةً فِي الصَّلَاةِ
      وَالْفَقْرِ وَآدَابِ الْجِهَادِ.
    description_fr: |
      Buraydah ibn al-Ḥuṣayb al-Aslamī — chef du sous-clan des
      Banū Sahm de la tribu Aslam, qui rencontra le Prophète ﷺ sur
      la route de la Hijra au puits d'al-Ghamīm avec soixante-dix
      ou quatre-vingts cavaliers de sa tribu, lesquels embrassèrent
      tous l'Islam sur place — mourut à Marw en Khurāsān en 63 H
      (683) sous le règne de Yazīd ibn Muʿāwiya. Il participa à
      al-Ḥudaybiyya, à Khaybar et à la Conquête de La Mecque, et
      est le *rāwī* du hadith fondateur sur le califat (*khilāfa*)
      d'une durée de trente ans (préservé dans les Sunan). Il
      servit comme commandant frontalier en Khurāsān et au
      Sijistān sous Muʿāwiya et Yazīd, s'installant à Marw, où sa
      tombe demeure aujourd'hui un site de pèlerinage reconnu à
      Bayramaly, au Turkménistan. Il avait environ 80 ans à sa
      mort. Bukhārī et Muslim préservent de nombreux hadiths de
      lui, particulièrement sur la prière, la pauvreté et la
      conduite du jihād.
    canonical_hijri: {year: 63, precision: year}
    canonical_gregorian: {date: 683-01-01, precision: year, method: attested}
