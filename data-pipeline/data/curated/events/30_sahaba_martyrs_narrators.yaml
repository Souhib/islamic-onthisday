  # =========================================================================
  # POET-COMPANION OF BANŪ SULAYM — NARRATOR OF ḤUNAYN
  # =========================================================================

  - slug: death-of-al-abbas-ibn-mirdas
    category: companion
    title_en: Death of al-ʿAbbās ibn Mirdās al-Sulamī ra — Poet of Ḥunayn
    title_ar: وفاة العباس بن مرداس السلمي رضي الله عنه — شاعر حنين
    title_fr: Mort d'al-ʿAbbās ibn Mirdās al-Sulamī ra — poète de Ḥunayn
    description_en: |
      Al-ʿAbbās ibn Mirdās ibn Abī ʿĀmir al-Sulamī — chief of the
      Banū Sulaym sub-clan and one of the most accomplished
      *fursān-shuʿarāʾ* of his generation, embraced Islam shortly
      before the Conquest of Mecca and led 900 of his tribesmen
      to fight beside the Prophet ﷺ at the Battle of Ḥunayn
      (8 AH) — died during the caliphate of ʿUmar ra around 18 AH
      (639 CE), though sources record dates between 18 and 35 AH.
      He is the Companion who composed the famous verses
      complaining about his share of the Hunayn spoils when the
      Prophet ﷺ initially apportioned only four camels to him
      while giving 100 each to the chiefs of Quraysh and the new
      converts; the Prophet ﷺ ordered his share corrected after
      hearing the verses, and Ibn Hishām preserves the lines as
      a foundational example of *ʿitāb* poetry directed to the
      Prophet ﷺ. His son Kināna ibn al-ʿAbbās was a pre-eminent
      poet of the early Umayyad era. He is buried at Baṣra
      according to Ibn Saʿd.
    description_ar: |
      تُوُفِّيَ الْعَبَّاسُ بْنُ مِرْدَاسِ بْنِ أَبِي عَامِرٍ
      السُّلَمِيُّ رَضِيَ اللَّهُ عَنْهُ — سَيِّدُ بَنِي سُلَيْمٍ
      وَأَحَدُ كِبَارِ الْفُرْسَانِ-الشُّعَرَاءِ فِي جِيلِهِ، أَسْلَمَ
      قَبْلَ فَتْحِ مَكَّةَ بِيَسِيرٍ وَقَادَ تِسْعَ مِئَةٍ مِنْ
      قَوْمِهِ مَعَ رَسُولِ اللَّهِ ﷺ يَوْمَ حُنَيْنٍ سَنَةَ ثَمَانٍ —
      فِي خِلَافَةِ عُمَرَ رَضِيَ اللَّهُ عَنْهُ نَحْوَ سَنَةِ
      ثَمَانِيَ عَشْرَةَ مِنَ الْهِجْرَةِ، وَإِنْ تَفَاوَتَتِ
      الرِّوَايَاتُ بَيْنَ ١٨ وَ٣٥ هِجْرِيَّةٍ. وَهُوَ الصَّحَابِيُّ
      الَّذِي قَالَ الأَبْيَاتَ الْمَشْهُورَةَ عَاتِبًا عَلَى نَصِيبِهِ
      مِنْ غَنَائِمِ حُنَيْنٍ، حِينَ قَسَمَ النَّبِيُّ ﷺ لَهُ أَوَّلًا
      أَرْبَعَةً مِنَ الإِبِلِ بَيْنَمَا قَسَمَ لِسَادَاتِ قُرَيْشٍ
      وَالْمُؤَلَّفَةِ قُلُوبُهُمْ مِئَةً مِئَةً. فَأَمَرَ النَّبِيُّ ﷺ
      بِتَكْمِلَةِ نَصِيبِهِ بَعْدَ سَمَاعِ الأَبْيَاتِ، وَحَفِظَهَا
      ابْنُ هِشَامٍ نَمُوذَجًا لِشِعْرِ الْعِتَابِ الْمُوَجَّهِ
      إِلَى رَسُولِ اللَّهِ ﷺ. وَكَانَ ابْنُهُ كِنَانَةُ بْنُ
      الْعَبَّاسِ مِنْ كِبَارِ شُعَرَاءِ صَدْرِ الْعَهْدِ الأُمَوِيِّ.
      وَدُفِنَ بِالْبَصْرَةِ كَمَا ذَكَرَ ابْنُ سَعْدٍ.
    description_fr: |
      Al-ʿAbbās ibn Mirdās ibn Abī ʿĀmir al-Sulamī — chef d'un
      sous-clan des Banū Sulaym et l'un des plus accomplis
      *fursān-shuʿarāʾ* (chevaliers-poètes) de sa génération,
      embrassa l'Islam peu avant la Conquête de La Mecque et
      conduisit neuf cents hommes de sa tribu auprès du Prophète ﷺ
      à la bataille de Ḥunayn (8 H) — mourut sous le califat
      d'ʿUmar ra vers 18 H (639), bien que les sources rapportent
      des dates entre 18 et 35 H. C'est le Compagnon qui composa
      les vers fameux se plaignant de sa part du butin de Ḥunayn,
      lorsque le Prophète ﷺ ne lui attribua initialement que
      quatre chameaux tandis qu'il en donnait cent à chacun des
      chefs de Quraysh et des *muʾallafa qulūbuhum* ; le
      Prophète ﷺ ordonna que sa part fût complétée après avoir
      entendu les vers, qu'Ibn Hishām préserva comme exemple
      fondateur de poésie *ʿitāb* (reproche) adressée au
      Prophète ﷺ. Son fils Kināna ibn al-ʿAbbās fut l'un des
      grands poètes de l'aube de l'époque omeyyade. Il fut
      enterré à Baṣra selon Ibn Saʿd.
    canonical_hijri: {year: 18, precision: year}
    canonical_gregorian: {date: 639-01-01, precision: year, method: attested}
