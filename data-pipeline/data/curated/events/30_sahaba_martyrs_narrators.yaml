  # =========================================================================
  # COUSIN OF THE PROPHET ﷺ — PLAGUE OF AMWĀS
  # =========================================================================

  - slug: death-of-al-fadl-ibn-al-abbas
    category: ahl_al_bayt
    title_en: Death of al-Faḍl ibn al-ʿAbbās ra in the Plague of Amwās
    title_ar: وفاة الفضل بن العباس رضي الله عنه في طاعون عمواس
    title_fr: Mort d'al-Faḍl ibn al-ʿAbbās ra durant la peste d'Amwās
    description_en: |
      Al-Faḍl ibn al-ʿAbbās ibn ʿAbd al-Muṭṭalib — eldest son of
      the Prophet's ﷺ uncle al-ʿAbbās ra and Umm al-Faḍl Lubāba ra,
      cousin of the Prophet ﷺ, and elder brother of the foundational
      mufassir ʿAbdullāh ibn ʿAbbās ra — died in the plague of
      ʿAmwās in al-Shām in 18 AH (639 CE) at about 25 years of age.
      He is the cousin who rode pillion behind the Prophet ﷺ on
      the same camel during the descent from ʿArafāt at the
      Farewell Pilgrimage (Bukhārī and Muslim) — narrating in this
      capacity the canonical sequence of the *ramy* and *naḥr*
      of the Day of Naḥr — and the cousin whose visible attraction
      to a beautiful Khathʿamī woman during *iḥrām* prompted the
      Prophet ﷺ to physically turn his face away (Bukhārī 1855).
      He participated in the Conquest of Mecca and Ḥunayn beside
      the Prophet ﷺ. After the Prophet's ﷺ death he joined the
      Syrian campaigns under ʿUmar ra and was buried at ʿAmwās
      with Muʿādh ibn Jabal ra and Abū ʿUbayda ibn al-Jarrāḥ ra.
    description_ar: |
      تُوُفِّيَ الْفَضْلُ بْنُ الْعَبَّاسِ بْنِ عَبْدِ الْمُطَّلِبِ
      رَضِيَ اللَّهُ عَنْهُ — أَكْبَرُ أَوْلَادِ الْعَبَّاسِ عَمِّ
      النَّبِيِّ ﷺ مِنْ أُمِّ الْفَضْلِ لُبَابَةَ رَضِيَ اللَّهُ
      عَنْهَا، وَابْنُ عَمِّ النَّبِيِّ ﷺ، وَأَخُو عَبْدِ اللَّهِ
      بْنِ عَبَّاسٍ تُرْجُمَانِ الْقُرْآنِ — فِي طَاعُونِ عَمْوَاسَ
      بِالشَّامِ سَنَةَ ثَمَانِيَ عَشْرَةَ مِنَ الْهِجْرَةِ
      عَنْ نَحْوِ خَمْسٍ وَعِشْرِينَ سَنَةً. وَهُوَ ابْنُ الْعَمِّ
      الَّذِي أَرْدَفَهُ النَّبِيُّ ﷺ خَلْفَهُ عَلَى نَاقَتِهِ يَوْمَ
      الْإِفَاضَةِ مِنْ عَرَفَاتٍ فِي حَجَّةِ الْوَدَاعِ
      (الْبُخَارِيُّ وَمُسْلِمٌ) — وَرَوَى بِهَذِهِ الصِّفَةِ
      تَرْتِيبَ الرَّمْيِ وَالنَّحْرِ يَوْمَ النَّحْرِ — وَهُوَ
      ابْنُ الْعَمِّ الَّذِي رَأَى امْرَأَةً مِنْ خَثْعَمَ حَسْنَاءَ
      فِي الْإِحْرَامِ فَجَعَلَ النَّبِيُّ ﷺ يَلْوِي عُنُقَ الْفَضْلِ
      عَنْهَا (الْبُخَارِيُّ ١٨٥٥). شَهِدَ فَتْحَ مَكَّةَ وَحُنَيْنًا
      مَعَ النَّبِيِّ ﷺ. وَبَعْدَ وَفَاةِ النَّبِيِّ ﷺ خَرَجَ مَعَ
      جُيُوشِ الشَّامِ فِي خِلَافَةِ عُمَرَ رَضِيَ اللَّهُ عَنْهُ،
      وَدُفِنَ بِعَمْوَاسَ مَعَ مُعَاذِ بْنِ جَبَلٍ وَأَبِي عُبَيْدَةَ
      بْنِ الْجَرَّاحِ رَضِيَ اللَّهُ عَنْهُمَا.
    description_fr: |
      Al-Faḍl ibn al-ʿAbbās ibn ʿAbd al-Muṭṭalib — fils aîné de
      l'oncle du Prophète ﷺ, al-ʿAbbās ra, et d'Umm al-Faḍl
      Lubāba ra, cousin du Prophète ﷺ, et frère aîné du mufassir
      fondateur ʿAbdullāh ibn ʿAbbās ra — mourut dans la peste
      d'ʿAmwās en al-Shām en 18 H (639) à environ 25 ans. C'est
      le cousin qui chevaucha en croupe derrière le Prophète ﷺ
      sur la même chamelle lors de la descente d'ʿArafāt au
      Pèlerinage d'Adieu (Bukhārī et Muslim) — narrant à ce titre
      la séquence canonique du *ramy* et du *naḥr* du Jour du
      Naḥr — et le cousin dont l'attrait visible pour une belle
      femme de Khathʿam durant *iḥrām* poussa le Prophète ﷺ à
      lui détourner physiquement le visage (Bukhārī 1855). Il
      participa à la Conquête de La Mecque et à Ḥunayn aux côtés
      du Prophète ﷺ. Après la mort du Prophète ﷺ il rejoignit
      les campagnes syriennes sous ʿUmar ra et fut enterré à
      ʿAmwās avec Muʿādh ibn Jabal ra et Abū ʿUbayda ibn
      al-Jarrāḥ ra.
    canonical_hijri: {year: 18, precision: year}
    canonical_gregorian: {date: 639-01-01, precision: year, method: attested}
