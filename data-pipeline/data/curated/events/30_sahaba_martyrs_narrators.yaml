  # =========================================================================
  # ANṢĀRĪ ARCHER OF UḤUD
  # =========================================================================

  - slug: death-of-abu-talha-al-ansari
    category: companion
    title_en: Death of Abū Ṭalḥa al-Anṣārī ra — Archer of Uḥud
    title_ar: وفاة أبي طلحة الأنصاري رضي الله عنه — رامي يوم أحد
    title_fr: Mort d'Abū Ṭalḥa al-Anṣārī ra — l'archer d'Uḥud
    description_en: |
      Abū Ṭalḥa Zayd ibn Sahl al-Najjārī al-Khazrajī al-Anṣārī —
      one of the most prominent archers of the Anṣār, husband of
      Umm Sulaym ra, stepfather to Anas ibn Mālik ra, and the man
      who interposed his own body between the Prophet ﷺ and the
      Qurayshī arrows at Uḥud, taking the volleys onto a chest he
      offered as a shield while his bow-string snapped repeatedly
      from the rapidity of his shooting — died around the caliphate
      of ʿUthman ra at about 70 years of age. Bukhārī preserves the
      Prophet's ﷺ words at Uḥud: "The voice of Abū Ṭalḥa in the army
      is better than a hundred fighters." He was the Companion who
      wept when his palm-grove of Bayraḥā' was the most beloved of
      his properties, and on hearing the verse "you will not attain
      righteousness until you spend of what you love" (Q. 3:92) he
      gave the entire grove to the Prophet ﷺ as ṣadaqa — the most
      cited classical incident of voluntary divestment for that ayah.
    description_ar: |
      تُوُفِّيَ أَبُو طَلْحَةَ زَيْدُ بْنُ سَهْلٍ النَّجَّارِيُّ
      الْخَزْرَجِيُّ الأَنْصَارِيُّ رَضِيَ اللَّهُ عَنْهُ — مِنْ
      أَشْهَرِ رُمَاةِ الأَنْصَارِ، زَوْجُ أُمِّ سُلَيْمٍ رَضِيَ
      اللَّهُ عَنْهَا، وَزَوْجُ أُمِّ أَنَسِ بْنِ مَالِكٍ رَضِيَ
      اللَّهُ عَنْهُ، وَالَّذِي تَتَرَّسَ بِجَسَدِهِ دُونَ النَّبِيِّ ﷺ
      يَوْمَ أُحُدٍ مِنْ سِهَامِ قُرَيْشٍ، يَتَلَقَّاهَا فِي صَدْرِهِ
      وَيُكْسَرُ وَتَرُهُ مِنْ كَثْرَةِ الرَّمْيِ — فِي خِلَافَةِ
      عُثْمَانَ رَضِيَ اللَّهُ عَنْهُ عَنْ نَحْوِ سَبْعِينَ سَنَةً.
      رَوَى الْبُخَارِيُّ قَوْلَ النَّبِيِّ ﷺ يَوْمَ أُحُدٍ: «لَصَوْتُ
      أَبِي طَلْحَةَ فِي الْجَيْشِ خَيْرٌ مِنْ مِئَةِ رَجُلٍ».
      وَهُوَ الَّذِي بَكَى لَمَّا كَانَتْ بَيْرَحَاءُ أَحَبَّ
      أَمْوَالِهِ إِلَيْهِ، فَلَمَّا سَمِعَ ﴿لَن تَنَالُوا الْبِرَّ
      حَتَّى تُنفِقُوا مِمَّا تُحِبُّونَ﴾ (آل عمران ٩٢) جَعَلَهَا
      كُلَّهَا صَدَقَةً يَدْفَعُهَا رَسُولُ اللَّهِ ﷺ — وَهِيَ
      أَشْهَرُ حَادِثَةٍ كِلَاسِيكِيَّةٍ فِي تَفْسِيرِ تِلْكَ
      الآيَةِ.
    description_fr: |
      Abū Ṭalḥa Zayd ibn Sahl al-Najjārī al-Khazrajī al-Anṣārī —
      l'un des archers les plus renommés des Anṣār, époux d'Umm
      Sulaym ra, beau-père d'Anas ibn Mālik ra, et l'homme qui
      interposa son propre corps entre le Prophète ﷺ et les flèches
      qurayshites à Uḥud, recevant les volées sur la poitrine qu'il
      offrait en bouclier tandis que la corde de son arc se rompait
      à plusieurs reprises sous la rapidité de ses tirs — mourut
      durant le califat d'ʿUthmān ra à environ 70 ans. Bukhārī
      préserve les paroles du Prophète ﷺ à Uḥud : « la voix d'Abū
      Ṭalḥa dans l'armée vaut mieux que cent combattants ». C'est
      le Compagnon qui pleura car son verger de Bayraḥā' était son
      bien le plus cher, et qui, en entendant le verset « vous
      n'atteindrez la piété que lorsque vous aurez dépensé de ce
      que vous aimez » (Q. 3:92), donna le verger entier au
      Prophète ﷺ comme *ṣadaqa* — incident classique le plus cité
      en exégèse de ce verset.
    canonical_hijri: {year: 34, precision: year}
    canonical_gregorian: {date: 654-01-01, precision: year, method: attested}
