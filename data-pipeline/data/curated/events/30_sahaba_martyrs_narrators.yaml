  # =========================================================================
  # LAST SAHABI TO DIE IN DAMASCUS
  # =========================================================================

  - slug: death-of-wathila-ibn-al-asqa
    category: companion
    title_en: Death of Wāthila ibn al-Asqaʿ ra — Last Sahabi to Die in Damascus
    title_ar: وفاة واثلة بن الأسقع رضي الله عنه — آخر صحابيّ مات بدمشق
    title_fr: Mort de Wāthila ibn al-Asqaʿ ra — dernier sahabi mort à Damas
    description_en: |
      Wāthila ibn al-Asqaʿ al-Laythī — sahabi of the Banū Layth
      who joined Islam on the eve of the Tabūk expedition (9 AH),
      one of the *Ahl al-Ṣuffa* who lived in the back of the
      Prophet's ﷺ Mosque, and the last Companion to die in
      Damascus — passed away there in 83 AH (702-703 CE) at over
      ninety years of age. Sources differ between 83 and 86 AH;
      Ibn Ḥajar prefers 83. He fought at Tabūk, then at Yarmūk
      under Khālid ibn al-Walīd ra and Abū ʿUbayda ra, and
      remained in Damascus thereafter, eventually settling at
      Bayt al-Maqdis briefly before returning. He transmitted
      around seventy hadith preserved in the *Sunan* and
      *Musnad Aḥmad*, including the *qudsī* hadith "I am as my
      servant thinks of Me" (Aḥmad). Among his pupils were the
      Damascene *tābiʿīs* Makḥūl al-Shāmī and Bilāl ibn Saʿd —
      the bridge by which his hadith reached the early Syrian
      hadith schools.
    description_ar: |
      تُوُفِّيَ وَاثِلَةُ بْنُ الأَسْقَعِ اللَّيْثِيُّ رَضِيَ اللَّهُ
      عَنْهُ — صَحَابِيٌّ مِنْ بَنِي لَيْثٍ، أَسْلَمَ عَشِيَّةَ
      غَزْوَةِ تَبُوكَ سَنَةَ تِسْعٍ مِنَ الْهِجْرَةِ، وَكَانَ مِنْ
      أَهْلِ الصُّفَّةِ السَّاكِنِينَ مُؤَخِّرَةَ مَسْجِدِ النَّبِيِّ ﷺ،
      وَآخِرُ مَنْ مَاتَ بِدِمَشْقَ مِنَ الصَّحَابَةِ — بِهَا سَنَةَ
      ثَلَاثٍ وَثَمَانِينَ مِنَ الْهِجْرَةِ، وَكَانَ ابْنَ نَيِّفٍ
      وَتِسْعِينَ سَنَةً. اِخْتَلَفَتِ السِّيَرُ بَيْنَ ٨٣ وَ٨٦
      وَأَخَذَ ابْنُ حَجَرٍ بِـ ٨٣. شَهِدَ تَبُوكَ، ثُمَّ يَوْمَ
      الْيَرْمُوكِ تَحْتَ رَايَةِ خَالِدِ بْنِ الْوَلِيدِ وَأَبِي
      عُبَيْدَةَ رَضِيَ اللَّهُ عَنْهُمَا، ثُمَّ نَزَلَ بِدِمَشْقَ،
      وَأَقَامَ بِبَيْتِ الْمَقْدِسِ زَمَنًا ثُمَّ عَادَ. وَرَوَى
      نَحْوَ سَبْعِينَ حَدِيثًا فِي السُّنَنِ وَمُسْنَدِ الإِمَامِ
      أَحْمَدَ، مِنْهَا الْحَدِيثُ الْقُدْسِيُّ: «أَنَا عِنْدَ ظَنِّ
      عَبْدِي بِي» (أَخْرَجَهُ أَحْمَدُ). وَمِنْ أَشْهَرِ تَلَامِيذِهِ
      مَكْحُولٌ الشَّامِيُّ وَبِلَالُ بْنُ سَعْدٍ مِنْ تَابِعِي
      الشَّامِ — وَهُوَ الْجِسْرُ الَّذِي بَلَغَتْ بِهِ أَحَادِيثُهُ
      مَدَارِسَ الْحَدِيثِ الشَّامِيَّةَ الأُولَى.
    description_fr: |
      Wāthila ibn al-Asqaʿ al-Laythī — sahabi des Banū Layth qui
      embrassa l'Islam à la veille de l'expédition de Tabūk (9 H),
      l'un des *Ahl al-Ṣuffa* qui vivaient à l'arrière de la Mosquée
      du Prophète ﷺ, et le dernier Compagnon à mourir à Damas —
      s'éteignit dans cette ville en 83 H (702-703) à plus de
      quatre-vingt-dix ans. Les sources divergent entre 83 et 86 H ;
      Ibn Ḥajar retient 83. Il combattit à Tabūk, puis à Yarmūk
      sous Khālid ibn al-Walīd et Abū ʿUbayda ra, demeura ensuite
      à Damas, séjourna brièvement à Bayt al-Maqdis, puis revint.
      Il transmit environ soixante-dix hadiths préservés dans les
      Sunan et le Musnad d'Aḥmad, dont le hadith *qudsī* « je suis
      tel que mon serviteur Me pense » (Aḥmad). Parmi ses élèves
      figurent les *tābiʿīs* damascènes Makḥūl al-Shāmī et Bilāl
      ibn Saʿd — pont par lequel ses hadiths atteignirent les
      premières écoles hadithiques syriennes.
    canonical_hijri: {year: 83, precision: year}
    canonical_gregorian: {date: 702-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_hajar_isaba
        is_canonical: true
      - source_key: ibn_sad_tabaqat
      - source_key: dhahabi_siyar
      - source_key: ibn_athir_kamil
    people: [[wathila-ibn-al-asqa, subject]]
    tags: [sahabi, layth, ahl-al-suffa, damascus, hadith-narrator, last-sahabi-damascus]
    importance: notable
    verification_status: cross_verified
    disputed: true
    dispute_about: date
    source_url: "https://en.wikipedia.org/wiki/Companions_of_the_Prophet"

  # =========================================================================
  # NEPHEW OF KHADĪJA ra — THE PROVERBIAL GENEROUS
  # =========================================================================

  - slug: death-of-hakim-ibn-hizam
    category: companion
    title_en: Death of Ḥakīm ibn Ḥizām al-Asadī ra — The Generous of Quraysh
    title_ar: وفاة حكيم بن حزام الأسدي رضي الله عنه — كريم قريش
    title_fr: Mort de Ḥakīm ibn Ḥizām al-Asadī ra — le généreux de Quraysh
    description_en: |
      Ḥakīm ibn Ḥizām al-Asadī al-Qurashī — nephew of Khadīja ra
      (his father Ḥizām was her brother), cousin of al-Zubayr ibn
      al-ʿAwwām ra (his aunt was al-Zubayr's mother), born inside
      the Kaʿba (the only person classical sources attest as such),
      a Qurayshī merchant prince and proverbial *karīm* in pre-
      Islamic Arabia — embraced Islam at the Conquest of Mecca
      (8 AH) at age 60, and died in Medina in 54 AH (674 CE) at
      a reported age of 120, having lived sixty years in Jāhiliyya
      and sixty in Islam. Bukhārī preserves the famous *hadith
      al-yad al-ʿulyā* exchange ("the upper hand is better than
      the lower hand") between Ḥakīm and the Prophet ﷺ over
      ʿaṭāyā (Bukhārī 1472). Classical biographers record that
      he had freed one hundred slaves and offered one hundred
      camels in *fidya* during the Jāhiliyya, and freed one
      hundred more slaves and offered another hundred camels
      after embracing Islam — sometimes cited as the most
      programmatically generous documented life in early Islamic
      biography.
    description_ar: |
      تُوُفِّيَ حَكِيمُ بْنُ حِزَامٍ الأَسَدِيُّ الْقُرَشِيُّ رَضِيَ
      اللَّهُ عَنْهُ — اِبْنُ أَخِي خَدِيجَةَ رَضِيَ اللَّهُ عَنْهَا
      (أَبُوهُ حِزَامٌ أَخُوهَا)، وَابْنُ عَمَّةِ الزُّبَيْرِ بْنِ
      الْعَوَّامِ رَضِيَ اللَّهُ عَنْهُ، وُلِدَ فِي جَوْفِ الْكَعْبَةِ
      (وَهُوَ الْوَحِيدُ الَّذِي يَنُصُّ عَلَى ذَلِكَ التَّارِيخُ
      الْكِلَاسِيكِيُّ)، أَمِيرٌ تَاجِرٌ مِنْ قُرَيْشٍ وَكَرِيمٌ
      مَضْرُوبٌ بِكَرَمِهِ الْمَثَلُ فِي الْجَاهِلِيَّةِ — أَسْلَمَ
      يَوْمَ فَتْحِ مَكَّةَ سَنَةَ ثَمَانٍ وَهُوَ ابْنُ سِتِّينَ
      سَنَةً، وَتُوُفِّيَ بِالْمَدِينَةِ سَنَةَ أَرْبَعٍ وَخَمْسِينَ
      وَلَهُ نَحْوَ مِئَةٍ وَعِشْرِينَ سَنَةً — سِتُّونَ فِي
      الْجَاهِلِيَّةِ وَسِتُّونَ فِي الإِسْلَامِ. رَوَى الْبُخَارِيُّ
      حَدِيثَ «الْيَدُ الْعُلْيَا خَيْرٌ مِنَ الْيَدِ السُّفْلَى»
      بَيْنَهُ وَبَيْنَ النَّبِيِّ ﷺ فِي الْعَطِيَّةِ
      (الْبُخَارِيُّ ١٤٧٢). وَذَكَرَ الْمُتَرْجِمُونَ أَنَّهُ أَعْتَقَ
      مِئَةَ رَقَبَةٍ وَأَهْدَى مِئَةَ بَعِيرٍ فِي الْجَاهِلِيَّةِ،
      ثُمَّ أَعْتَقَ مِئَةً أُخْرَى وَأَهْدَى مِئَةً أُخْرَى فِي
      الإِسْلَامِ — وَيُسْتَشْهَدُ بِسِيرَتِهِ أَكْثَرَ مَا
      يُسْتَشْهَدُ بِسِيرَةٍ فِي الْكَرَمِ الْمُبَرْمَجِ فِي
      التَّرَاجِمِ الإِسْلَامِيَّةِ الأُولَى.
    description_fr: |
      Ḥakīm ibn Ḥizām al-Asadī al-Qurashī — neveu de Khadīja ra
      (son père Ḥizām était le frère de Khadīja), cousin
      d'al-Zubayr ibn al-ʿAwwām ra (sa tante était la mère
      d'al-Zubayr), né à l'intérieur de la Kaʿba (le seul que les
      sources classiques attestent comme tel), prince marchand
      qurayshite et *karīm* proverbial de l'Arabie préislamique —
      embrassa l'Islam à la Conquête de La Mecque (8 H) à 60 ans,
      et mourut à Médine en 54 H (674) à un âge rapporté de 120 ans,
      ayant vécu soixante ans en Jāhiliyya et soixante en Islam.
      Bukhārī préserve l'échange célèbre du *hadith al-yad
      al-ʿulyā* (« la main qui donne vaut mieux que la main qui
      reçoit ») entre Ḥakīm et le Prophète ﷺ à propos des dons
      (Bukhārī 1472). Les biographes classiques rapportent qu'il
      avait affranchi cent esclaves et offert cent chameaux en
      *fidya* durant la Jāhiliyya, puis affranchi cent autres
      esclaves et offert cent autres chameaux après son adhésion
      à l'Islam — souvent cité comme la vie de générosité
      programmatique la plus documentée de la biographie
      islamique précoce.
    canonical_hijri: {year: 54, precision: year}
    canonical_gregorian: {date: 674-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_hajar_isaba
        is_canonical: true
      - source_key: ibn_sad_tabaqat
      - source_key: dhahabi_siyar
      - source_key: ibn_kathir_bidaya
    hadith_refs: "Bukhari 1472"
    people: [[hakim-ibn-hizam, subject], [khadija-bint-khuwaylid, subject]]
    tags: [sahabi, quraysh, asad, conquest-of-mecca, generosity, kaaba-born]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Hakim_ibn_Hizam"

  # =========================================================================
  # CONQUEROR OF SIJISTĀN AND KHURĀSĀN
  # =========================================================================

  - slug: death-of-abd-al-rahman-ibn-samura
    category: companion
    title_en: Death of ʿAbd al-Raḥmān ibn Samura al-Qurashī ra — Conqueror of Sijistān
    title_ar: وفاة عبد الرحمن بن سمرة القرشي رضي الله عنه — فاتح سجستان
    title_fr: Mort d'ʿAbd al-Raḥmān ibn Samura al-Qurashī ra — conquérant du Sijistān
    description_en: |
      ʿAbd al-Raḥmān ibn Samura ibn Ḥabīb al-Qurashī al-ʿAbshamī —
      sahabi of Banū ʿAbd Shams (Quraysh), who embraced Islam at
      the Conquest of Mecca (8 AH), and the principal commander of
      the Muslim conquest of Sijistān and the eastern marches into
      Khurāsān during the caliphate of ʿUthmān ra and Muʿāwiya ra
      (governor 32-44 AH and again under Muʿāwiya) — died in Baṣra
      in 50 or 53 AH (670-673 CE). He led the campaigns that
      reduced Zaranj, Bust, Zābulistān, and reached as far as
      Kābul and the Hindu Kush, founded the first Friday mosque
      at Zaranj, and instituted the office of *ṣāḥib al-shurṭa*
      in Sijistān. He is the *rāwī* of the foundational hadith on
      seeking judgeship: "Do not seek office, ʿAbd al-Raḥmān, for
      if you are given it without asking, you will be aided in it,
      but if you are given it after asking, you will be left to
      it" (Bukhārī 7146; Muslim 1652) — known to the *uṣūlī*
      tradition as one of the principal proof-texts on the dangers
      of seeking authority.
    description_ar: |
      تُوُفِّيَ عَبْدُ الرَّحْمَنِ بْنُ سَمُرَةَ بْنِ حَبِيبٍ
      الْقُرَشِيُّ الْعَبْشَمِيُّ رَضِيَ اللَّهُ عَنْهُ — صَحَابِيٌّ
      مِنْ بَنِي عَبْدِ شَمْسٍ مِنْ قُرَيْشٍ، أَسْلَمَ يَوْمَ فَتْحِ
      مَكَّةَ سَنَةَ ثَمَانٍ، وَهُوَ الْقَائِدُ الأَكْبَرُ لِفُتُوحِ
      سِجِسْتَانَ وَأَطْرَافِ خُرَاسَانَ فِي خِلَافَةِ عُثْمَانَ
      رَضِيَ اللَّهُ عَنْهُ ثُمَّ مُعَاوِيَةَ رَضِيَ اللَّهُ عَنْهُ
      (وَلِيَ سِجِسْتَانَ مِنْ سَنَةِ ٣٢ إِلَى ٤٤ هِجْرِيَّةٍ ثُمَّ
      وَلِيَهَا فِي عَهْدِ مُعَاوِيَةَ) — بِالْبَصْرَةِ سَنَةَ
      خَمْسِينَ أَوْ ثَلَاثٍ وَخَمْسِينَ مِنَ الْهِجْرَةِ. قَادَ
      الْحَمَلَاتِ الَّتِي اِسْتَوْلَتْ عَلَى زَرَنْجَ وَبُسْتٍ
      وَزَابُلِسْتَانَ، وَبَلَغَ كَابُلَ وَالْهِنْدُوكُوشَ، وَأَسَّسَ
      أَوَّلَ مَسْجِدِ جُمُعَةٍ بِزَرَنْجَ، وَأَنْشَأَ مَنْصِبَ
      صَاحِبِ الشُّرْطَةِ بِسِجِسْتَانَ. وَهُوَ رَاوِي الْحَدِيثِ
      الأَصْلِيِّ فِي طَلَبِ الإِمَارَةِ: «يَا عَبْدَ الرَّحْمَنِ
      لَا تَسْأَلِ الإِمَارَةَ، فَإِنَّكَ إِنْ أُعْطِيتَهَا عَنْ
      غَيْرِ مَسْأَلَةٍ أُعِنْتَ عَلَيْهَا، وَإِنْ أُعْطِيتَهَا
      عَنْ مَسْأَلَةٍ وُكِلْتَ إِلَيْهَا» (الْبُخَارِيُّ ٧١٤٦،
      مُسْلِمٌ ١٦٥٢) — وَهُوَ مِنْ أَشْهَرِ نُصُوصِ الأُصُولِ
      الْفِقْهِيَّةِ فِي خَطَرِ طَلَبِ السُّلْطَةِ.
      
      Sources record his death between 50 and 53 AH; we follow Ibn Saʿd's *Ṭabaqāt* with 50 AH at Basra as the dominant attestation, while al-Ṭabarī's *Tārīkh* records 53 AH.
      
      ذكرت المصادر وفاته بين سنتي ٥٠ و٥٣ هـ؛ ونتبع هنا «طبقات» ابن سعد بسنة ٥٠ هـ بالبصرة بوصفها الأكثر تواتراً، مع إيراد الطبري سنة ٥٣ هـ في «التاريخ».
    description_fr: |
      ʿAbd al-Raḥmān ibn Samura ibn Ḥabīb al-Qurashī al-ʿAbshamī —
      sahabi des Banū ʿAbd Shams (Quraysh), qui embrassa l'Islam
      à la Conquête de La Mecque (8 H), et principal commandant
      de la conquête musulmane du Sijistān et des marches
      orientales du Khurāsān sous les califats d'ʿUthmān ra et
      de Muʿāwiya ra (gouverneur de 32 à 44 H, puis à nouveau
      sous Muʿāwiya) — mourut à Baṣra en 50 ou 53 H (670-673).
      Il dirigea les campagnes qui prirent Zaranj, Bust et
      Zābulistān, atteignirent Kābul et l'Hindū Kūsh, fonda la
      première mosquée du vendredi à Zaranj et institua la charge
      de *ṣāḥib al-shurṭa* au Sijistān. Il est le *rāwī* du hadith
      fondamental sur la recherche de la charge : « ne demande
      pas la charge, ʿAbd al-Raḥmān : si elle t'est donnée sans
      la demander, tu y seras secouru ; si tu la demandes, tu y
      seras abandonné » (Bukhārī 7146, Muslim 1652) — l'un des
      proof-texts majeurs des *uṣūl al-fiqh* sur le danger de
      rechercher l'autorité.
