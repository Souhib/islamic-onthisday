  - slug: ihya-ulum-al-din-completed
    category: scholar_death
    title_en: al-Ghazālī Completes Iḥyāʾ ʿUlūm al-Dīn
    title_ar: إتمام الإمام الغزالي إحياء علوم الدين
    title_fr: Achèvement d'Iḥyāʾ ʿUlūm al-Dīn par al-Ghazālī
    description_en: |
      Following his crisis of conviction and decade-long withdrawal from
      teaching, Abū Ḥāmid al-Ghazālī completed Iḥyāʾ ʿUlūm al-Dīn
      ("Revival of the Religious Sciences"), forty books in four quarters
      (ʿibādāt, ʿādāt, muhlikāt, munjiyāt) that re-grounded outward
      religious practice in the inward states of the heart. The Iḥyāʾ
      synthesised Sunni jurisprudence, kalām, and the discipline of the
      heart (taṣawwuf within the bounds of orthodoxy) into a single
      programme of religious renewal. Few books since the early Islamic
      centuries have been read as widely or shaped Sunni piety as
      durably; al-Nawawī declared it "almost a Qurʾān" — a hyperbole
      reflecting its central place in Sunni spiritual literature.
    description_ar: |
      بعد أزمة يقينه وعزلته نحو عشر سنين، أتمّ أبو حامد الغزالي كتاب "إحياء
      علوم الدين"، أربعين كتاباً في أربعة أرباع (العبادات، العادات، المهلكات،
      المنجيات)، ربط فيه الظاهر الديني بأحوال القلب الباطنة. جمع الإحياء بين
      الفقه السنّي والكلام وتزكية النفس (التصوّف في حدود السنّة) في برنامج
      واحد للتجديد الديني. وقلَّ كتاب — منذ القرون الأولى — قُرئ على نطاق واسع
      كهذا أو شكّل التديّن السنّي بدوامٍ مماثل؛ وقال فيه النووي: «كاد أن يكون
      قرآناً» — مبالغة تعكس مكانته المحورية في الأدب الروحي السنّي.
    description_fr: |
      Après sa crise de conviction et sa retraite d'enseignement durant
      une décennie, Abū Ḥāmid al-Ghazālī acheva Iḥyāʾ ʿUlūm al-Dīn
      ("Revivification des sciences de la religion"), quarante livres
      répartis en quatre quarts (ʿibādāt, ʿādāt, muhlikāt, munjiyāt), qui
      réenracinent la pratique religieuse extérieure dans les états
      intérieurs du cœur. L'Iḥyāʾ synthétisa la jurisprudence sunnite, le
      kalām et la discipline du cœur (taṣawwuf dans les limites de
      l'orthodoxie) en un programme unique de renouveau religieux. Peu de
      livres depuis les premiers siècles islamiques ont été lus aussi
      largement ou ont façonné aussi durablement la piété sunnite ;
      al-Nawawī le qualifia de «presque un Coran» — hyperbole reflétant sa
      place centrale dans la littérature spirituelle sunnite.
