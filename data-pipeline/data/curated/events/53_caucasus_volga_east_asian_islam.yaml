  - slug: death-of-qayyum-nasiri
    category: scholar_death
    title_en: Death of Qayyūm Nasiri — Father of Modern Tatar Letters
    title_ar: وفاة قيوم ناصري — أب الأدب التتري الحديث
    title_fr: Mort de Qayyūm Nasiri — père des lettres tatares modernes
    description_en: |
      ʿAbd al-Qayyūm ibn ʿAbd al-Naṣīr al-Qazānī (Qayyūm Nasiri)
      — Volga-Tatar Sunni Hanafi scholar of Kazan, encyclopaedist,
      lexicographer of the Tatar language, and the central
      Tatar-language pedagogue of the late nineteenth century —
      died at Kazan on 2 September 1902 CE (28 Jumādā al-Awwal
      1320 AH) at age 77. Working alongside the Marjani circle in
      Kazan, he produced the first systematic Tatar-language
      textbooks (geography, grammar, arithmetic, history) for
      Muslim primary schools, the first Tatar-Russian
      dictionaries, and the first scholarly editions of Volga-
      Tatar folk literature. His pedagogical programme, designed
      to anchor a literate Tatar Sunni public schooled in
      vernacular Tatar rather than Bukharan Arabic-Persian,
      shaped the Tatar Jadid renewal that followed.
    description_ar: |
      توفي العلامة عبد القيوم بن عبد الناصر القازاني (قيوم
      ناصري) — العالم التتري الفولغي السني على المذهب الحنفي
      بقازان، الموسوعي، ومُعجمي اللغة التترية، والمربِّي
      التتري المركزي في أواخر القرن التاسع عشر الميلادي —
      بقازان يوم ٢٨ جمادى الأولى سنة ١٣٢٠ هـ (الموافق ٢ شتنبر
      ١٩٠٢ ميلادي) عن سبع وسبعين سنة. وكان من حلقة المرجاني
      بقازان، فأَخرج أول الكتب المدرسية التترية المنهجية
      (الجغرافيا والنحو والحساب والتاريخ) للمدارس الإسلامية
      الابتدائية، وأول معاجم تترية-روسية، وأول التحقيقات
      العلمية للأدب الشعبي التتري الفولغي. وأسَّس برنامجُه
      التربوي قاعدة قراء التترية السنية المتأدبة بلسانهم
      التتري لا بالعربية-الفارسية البخارية، التي بنى عليها
      تجديد الجديد التتري بعدئذ.
    description_fr: |
      ʿAbd al-Qayyūm ibn ʿAbd al-Naṣīr al-Qazānī (Qayyūm
      Nasiri) — savant volga-tatar sunnite hanafite de Kazan,
      encyclopédiste, lexicographe de la langue tatare et
      pédagogue tatar central de la fin du XIXe siècle —
      mourut à Kazan le 2 septembre 1902 EC (28 Jumādā al-
      Awwal 1320 H) à l'âge de 77 ans. Œuvrant dans le cercle
      d'al-Marjānī à Kazan, il produisit les premiers manuels
      tatars systématiques (géographie, grammaire, arithmétique,
      histoire) pour les écoles primaires musulmanes, les
      premiers dictionnaires tataro-russes, et les premières
      éditions savantes de la littérature populaire volgo-
      tatare. Son programme pédagogique, destiné à enraciner
      un public lettré sunnite tatar formé en langue
      vernaculaire plutôt qu'en arabe-persan boukhariote,
      façonna le renouveau jadid tatar qui suivit.
    canonical_hijri: {year: 1320, month: 5, day: 28, precision: day}
    canonical_gregorian: {date: 1902-09-02, precision: day, method: attested}
