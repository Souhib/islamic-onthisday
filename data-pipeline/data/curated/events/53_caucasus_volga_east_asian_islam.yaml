  - slug: death-of-shihab-al-din-marjani
    category: scholar_death
    title_en: Death of Shihāb al-Dīn al-Marjānī — Pioneer of Tatar Jadidism
    title_ar: وفاة شهاب الدين المرجاني — رائد التجديد التتري
    title_fr: Mort de Shihāb al-Dīn al-Marjānī — pionnier du jadidisme tatar
    description_en: |
      Shihāb al-Dīn ibn Bahāʾ al-Dīn al-Marjānī al-Qazānī (in
      Tatar Şihâbeddin Mercanî) — Volga-Tatar Sunni Hanafi
      scholar of Kazan, author of the seminal Tatar history
      *Mustafād al-Akhbār fī Aḥwāl Qazān wa Bulghār*, and the
      principal precursor of the Tatar Jadid renewal of the late
      nineteenth and early twentieth centuries — died at Kazan
      on 18 April 1889 CE (15 Shaʿbān 1306 AH) at age about 71.
      Trained in Bukhara and Samarqand in the classical Hanafi
      curriculum, he served from 1850 as imam of the First Mosque
      of Kazan and from 1876 as the first Tatar instructor of
      Islamic subjects at Kazan Tatar Teachers' School. His
      defence of *ijtihād* against the strict imitative *taqlīd*
      then dominant in Bukharan circles, and his reaffirmation
      of the historical-Bulgar-and-Tatar Muslim legacy of the
      Volga, opened the intellectual ground on which Ismāʿīl Bey
      Gasprinski's Crimean *Tarjumān* and the wider Jadid school
      programme would build a generation later.
    description_ar: |
      توفي الإمام شهاب الدين بن بهاء الدين المرجاني القازاني
      (Şihâbeddin Mercanî) — العالم التتري الفولغي السني على
      المذهب الحنفي بقازان، صاحب كتاب التاريخ الفصل في تاريخ
      التتر «المستفاد في أحوال قازان وبلغار»، والممهِّد الأكبر
      لحركة «التجديد» (الجديد) التترية في أواخر القرن التاسع
      عشر وأوائل العشرين الميلاديين — بقازان يوم ١٥ شعبان
      سنة ١٣٠٦ هـ (الموافق ١٨ أفريل ١٨٨٩ ميلادي) عن نحو إحدى
      وسبعين سنة. تخرّج من بخارى وسمرقند على المنهج الحنفي
      الكلاسيكي، ثم تولّى منذ سنة ١٢٦٧ هـ (الموافق ١٨٥٠
      ميلادي) إمامة «الجامع الأول» بقازان، وعُيِّن سنة ١٨٧٦
      ميلادي أوّلَ مدرس تتري للمواد الإسلامية في «دار المعلمين
      التترية» بقازان. ودعوته إلى الاجتهاد في وجه التقليد
      الصارم الذي ساد البخاريين، وتأكيده الميراث التاريخي
      البلغاري التتري للمسلمين على الفولغا، فتحا الأرض
      الفكرية التي نمت عليها مدرسة «إسماعيل بك غصبرنسكي» في
      جريدته «ترجمان» القرمية وعموم برنامج الجديد بعد جيل.
    description_fr: |
      Shihāb al-Dīn ibn Bahāʾ al-Dīn al-Marjānī al-Qazānī (en
      tatar Şihâbeddin Mercanî) — savant volga-tatar sunnite
      hanafite de Kazan, auteur de l'histoire fondatrice
      tatare *Mustafād al-Akhbār fī Aḥwāl Qazān wa Bulghār*,
      et principal précurseur du renouveau jadid tatar de la
      fin du XIXe siècle et du début du XXe — mourut à Kazan
      le 18 avril 1889 EC (15 Shaʿbān 1306 H) à l'âge
      d'environ 71 ans. Formé à Boukhara et Samarcande dans
      le curriculum hanafite classique, il servit dès 1850 EC
      comme imam de la Première Mosquée de Kazan, et fut
      nommé en 1876 EC premier enseignant tatar des matières
      islamiques à l'École normale tatare de Kazan. Sa
      défense de l'*ijtihād* contre le strict *taqlīd*
      imitatif alors dominant dans les cercles boukhariotes,
      et sa réaffirmation de l'héritage historique bulghar-
      tatar des musulmans de la Volga, ouvrirent le terrain
      intellectuel sur lequel l'école jadide d'Ismāʿīl Bey
      Gasprinski (du *Tarjumān* criméen) bâtirait son
      programme une génération plus tard.
    canonical_hijri: {year: 1306, month: 8, day: 15, precision: day}
    canonical_gregorian: {date: 1889-04-18, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-Mardjānī' for the death-date 15 Shaʿbān 1306 AH."
      - source_key: editorial
