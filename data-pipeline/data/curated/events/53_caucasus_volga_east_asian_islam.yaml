  - slug: death-of-musa-bigi
    category: scholar_death
    title_en: Death of Mūsā Jārullāh Bigi — Tatar Jadid Theologian in Exile
    title_ar: وفاة موسى جارالله بيجي — متكلم التجديد التتري في المنفى
    title_fr: Mort de Mūsā Jārullāh Bigi — théologien jadid tatar en exil
    description_en: |
      Mūsā Jārullāh Bigiyev (Musa Bigi / Mūsā Jārullāh) —
      Volga-Tatar Sunni Hanafi scholar of Rostov-on-Don and
      Petersburg, theologian of the Tatar Jadid school, author
      of dozens of works including *Rahmat-i Ilāhiyya Burhān-
      lari* (a controversial argument on universal divine
      mercy), *Khalq Naẓarına Bir Necce Mas'ele* (on social
      reform questions), and *Ḥurūf-i ʿArabiyya wa Lughat-i
      Turkiyya* (on Turkic orthography) — died in Cairo on 28
      October 1949 CE (5 Muḥarram 1369 AH) at age 74. After the
      Bolshevik consolidation he left Russia in 1930, lived
      successively in Afghanistan, India, Egypt, Finland,
      Japan, and again Egypt as a stateless scholar, lecturing
      at the Bhopal Tāj al-ʿUlūm Madrasa and exchanging with
      Sunni reformists from the Indian subcontinent to Cairo
      and Tokyo. He was the most ambitious Tatar-language
      systematic theologian of the twentieth century; the
      Soviet seizure of the Volga-Tatar institutional milieu
      cut short his work and dispersed his manuscripts across
      multiple capitals.
    description_ar: |
      توفي العلامة موسى جارالله بيجييف (Musa Bigi) —
      العالم التتري الفولغي السني على المذهب الحنفي من
      «روستوف على الدون» و«بطرسبرغ»، متكلِّم مدرسة الجديد
      التترية، صاحب عشرات المصنفات منها «براهين الرحمة
      الإلهية» (وهو طرح خلافيٌّ في عموم رحمة الله) و«خلق
      نظريته بر نچه مسئله» (في مسائل الإصلاح الاجتماعي)
      و«الحروف العربية واللغات التركية» (في رسم الحروف
      التركية) — بالقاهرة يوم ٥ محرّم سنة ١٣٦٩ هـ (الموافق
      ٢٨ أكتوبر ١٩٤٩ ميلادي) عن أربع وسبعين سنة. وكان قد
      هاجر من روسيا سنة ١٣٤٨ هـ (الموافق ١٩٣٠ ميلادي) بعد
      تثبيت السوفييت سيطرتهم، فتنقَّل بأفغانستان والهند
      ومصر وفنلندا واليابان ثم مصر ثانيةً عالماً بلا
      جنسية، ودرَّس بمدرسة «تاج العلوم» في «بهوبال»
      الهندية، وراسل مصلحي أهل السنة من شبه القارة الهندية
      إلى القاهرة وطوكيو. وهو من أعمق متكلِّمي التترية في
      القرن العشرين، فقطع الاستيلاءُ السوفييتي على وسط
      الفولغا التتري عمله، وتشتَّت مخطوطاته بين عواصم
      عدة.
    description_fr: |
      Mūsā Jārullāh Bigiyev (Musa Bigi / Mūsā Jārullāh) —
      savant volga-tatar sunnite hanafite de Rostov-sur-le-
      Don et de Saint-Pétersbourg, théologien de l'école
      jadid tatare, auteur de dizaines d'ouvrages dont
      *Rahmat-i Ilāhiyya Burhānları* (argument controversé
      sur la miséricorde divine universelle), *Khalq
      Naẓarına Bir Necce Mas'ele* (sur les questions de
      réforme sociale) et *Ḥurūf-i ʿArabiyya wa Lughat-i
      Turkiyya* (sur l'orthographe turcique) — mourut au
      Caire le 28 octobre 1949 EC (5 Muḥarram 1369 H) à
      l'âge de 74 ans. Après la consolidation bolchévique, il
      quitta la Russie en 1930 et vécut successivement en
      Afghanistan, en Inde, en Égypte, en Finlande, au Japon,
      puis de nouveau en Égypte comme savant apatride,
      enseignant à la madrasa Tāj al-ʿUlūm de Bhopal et
      correspondant avec les réformistes sunnites du sous-
      continent indien jusqu'au Caire et à Tokyo. Il fut le
      plus ambitieux théologien systématique de langue tatare
      du XXe siècle ; la mainmise soviétique sur le milieu
      institutionnel volgo-tatar interrompit son œuvre et
      dispersa ses manuscrits entre plusieurs capitales.
    canonical_hijri: {year: 1369, month: 1, day: 5, precision: day}
    canonical_gregorian: {date: 1949-10-28, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Mūsā Djārullāh' for biographical data and death at Cairo."
      - source_key: editorial
