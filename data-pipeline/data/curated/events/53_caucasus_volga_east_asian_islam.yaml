  - slug: death-of-imam-hamzat-bek
    category: ruler_death
    title_en: Death of Imām Hamzat Bek of Daghestan
    title_ar: استشهاد الإمام حمزة بك الداغستاني
    title_fr: Mort de l'Imam Hamzat Bek du Daghestan
    description_en: |
      Hamzat Bek of Hutsalmahi — second Imam of Daghestan
      (1832-1834), Naqshbandi-Khalidi *murīd* and successor of
      Ghāzī Muḥammad in the leadership of the Caucasian
      resistance to the Russian Empire — was assassinated in the
      Avar capital of Khunzakh on 19 September 1834 CE / 14
      Jumādā al-Awwal 1250 AH at age about 45. He had taken the
      khanate of Avaristan from the pro-Russian Khunzakh dynasty
      earlier the same year by killing the Avar khans, and was
      cut down two months later inside the Khunzakh mosque
      during the Friday prayer in a vendetta-driven counter-
      strike led by the *khanid* notable Hadji Murad and his
      brother Osman, avenging the slain Avar princes. He was
      succeeded by Shāmil, whose long imamate (1834-1859) would
      become the principal episode of nineteenth-century
      Caucasian Muslim resistance. Hamzat Bek's brief imamate
      consolidated the *sharīʿa*-state framework instituted by
      Ghāzī Muḥammad and broke the autonomy of the Avar khanate.
    description_ar: |
      اغتيل الإمام حمزة بك الحُتْسَلْمَهي — ثاني أئمة الداغستان
      الثلاثة (١٢٤٨-١٢٥٠ هـ)، مريد النقشبندية الخالدية وخلف
      الإمام غازي محمد في قيادة المقاومة القوقازية في وجه
      الإمبراطورية الروسية — في عاصمة الأفاريين «خونزاخ»
      يوم ١٤ جمادى الأولى سنة ١٢٥٠ هـ (الموافق ١٩ سبتمبر
      ١٨٣٤ ميلادي) عن نحو خمس وأربعين سنة. كان قد ضمَّ خانية
      «أفاريا» (آفاريا) من الأسرة الخونزخية الموالية لروسيا
      في السنة نفسها بقتل أمراء آفار، فقُتل بعد ذلك بشهرين
      داخل جامع خونزاخ أثناء صلاة الجمعة في عملية ثأر قاد
      عملياتها وجيه الأسرة الخانية «حاجي مراد» وأخوه «عثمان»
      ثأراً لأمرائهم القتلى. وخلفه الإمام شامل، الذي صار
      إمامه الطويل (١٢٥٠-١٢٧٦ هـ) أعظم فصول مقاومة المسلمين
      القوقازيين في القرن التاسع عشر الميلادي. وأَرسى الإمام
      حمزة بك في إمامه القصير الإطار الشرعي للدولة الذي
      أقامه غازي محمد، وكسر استقلال خانية الأفاريين.
    description_fr: |
      Hamzat Bek de Houtsalmahi — deuxième Imam du Daghestan
      (1832-1834), *murīd* naqshbandī-khālidī et successeur de
      Ghāzī Muḥammad à la tête de la résistance caucasienne à
      l'Empire russe — fut assassiné dans la capitale avare de
      Khounzakh le 19 septembre 1834 EC / 14 Jumādā al-Awwal
      1250 H, à l'âge d'environ 45 ans. Il avait pris le khanat
      d'Avaristan à la dynastie pro-russe des Khounzakh plus
      tôt la même année en tuant les khans avars, et fut abattu
      deux mois plus tard dans la mosquée de Khounzakh pendant
      la prière du vendredi lors d'une contre-attaque de
      vendetta conduite par le notable de la maison khanale
      Hadji Murad et son frère Osman, qui vengeaient les
      princes avars tués. Il fut remplacé par Shāmil, dont le
      long imamat (1834-1859) deviendra l'épisode majeur de la
      résistance musulmane caucasienne du XIXe siècle. L'imamat
      bref de Hamzat Bek consolida le cadre de l'État de
      *sharīʿa* institué par Ghāzī Muḥammad et brisa
      l'autonomie du khanat avar.
    canonical_hijri: {year: 1250, month: 5, day: 14, precision: day}
    canonical_gregorian: {date: 1834-09-19, precision: day, method: attested}
