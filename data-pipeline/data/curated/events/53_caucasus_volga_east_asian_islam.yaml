    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ma_Hualong"

  # =========================================================================
  # JAVANESE WALISONGO — SUNAN BONANG (NOT COVERED IN WAVE 27)
  # =========================================================================

  - slug: death-of-sunan-bonang
    category: scholar_death
    title_en: Death of Sunan Bonang — Walisongo of Tuban
    title_ar: وفاة السنن بونانغ — أحد والي سَنغا
    title_fr: Mort de Sunan Bonang — Walisongo de Tuban
    description_en: |
      Raden Maulana Makdum Ibrahim, known to Javanese tradition
      as Sunan Bonang — one of the *Walisongo* (Wali Sanga, the
      "Nine Saints" of Java), Sunni-Shafi'i student and son of
      Sunan Ampel of Surabaya, and master at Tuban on Java's
      north coast — died at Tuban in about 932 AH / 1525 CE.
      Within the Walisongo tradition he is associated with the
      Islamisation of the Tuban-Lasem coast, the training of
      Sunan Kalijaga, and the development of *suluk* poetry
      and the *bonang* gamelan instrument from which his title
      derives. Some Javanese chronicles place his death as
      late as 1532 CE; we follow the modal traditional date of
      1525 CE. The Walisongo are the foundational figures of
      Javanese Islam in standard Javanese chronicles (*Babad
      Tanah Jawi*) and modern academic historiography, but the
      precise dating of all nine saints is approximate
      Javanese-tradition rather than strict classical-Sunni
      source attestation.
    description_ar: |
      توفي الراذن مولانا مكدوم إبراهيم، المعروف عند الجاويين
      ب«سنن بونانغ» — أحد التسعة (Walisongo) الذين يُنسب
      إليهم إسلام أرض جاوة، تلميذ المذهب الشافعي وابن سنن
      أمبيل من «سورابايا»، وشيخ «توبان» على ساحل جاوة
      الشمالي — ب«توبان» نحو سنة ٩٣٢ هـ (الموافق ١٥٢٥
      ميلادي). ويُنسب إليه في تراث «والي سنغا» إسلام ساحل
      «توبان-لاسم»، وتربية «سنن كاليجاغا»، ووضع الشعر
      التعليمي الجاوي «سُلوك»، وآلة «بونانغ» من «جاملان»
      التي اشتُقَّ منها لقبه. وبعض المخطوطات الجاوية تؤخّر
      وفاته إلى سنة ٩٣٨ هـ (الموافق ١٥٣٢ ميلادي)؛ ونعتمد
      هنا الرواية الأكثر تواتراً ١٥٢٥ ميلادي. والتسعة
      (Walisongo) هم آباء الإسلام الجاوي عند المؤرخين
      المعاصرين والمخطوطات الجاوية الكلاسيكية «بَبَدْ تَنَه
      جاوي»، لكنّ ضبط تواريخهم تقريبيٌّ يتبع التراث الجاوي
      لا روايات كلاسيكية سنية محققة.
    description_fr: |
      Raden Maulana Makdum Ibrahim, connu dans la tradition
      javanaise sous le nom de Sunan Bonang — l'un des
      *Walisongo* (Wali Sanga, les « Neuf Saints » de Java),
      élève sunnite shafi'ite et fils de Sunan Ampel de
      Surabaya, et maître à Tuban sur la côte nord de Java
      — mourut à Tuban vers 932 H / 1525 EC. Au sein de la
      tradition des Walisongo, on lui associe l'islamisation
      de la côte Tuban-Lasem, la formation de Sunan
      Kalijaga, et l'élaboration de la poésie didactique
      *suluk* et de l'instrument *bonang* du *gamelan* dont
      dérive son titre. Certaines chroniques javanaises
      placent sa mort jusqu'en 1532 EC ; nous suivons la
      date traditionnelle modale de 1525 EC. Les Walisongo
      sont les figures fondatrices de l'islam javanais dans
      les chroniques classiques (*Babad Tanah Jawi*) et
      dans l'historiographie académique moderne, mais la
      datation précise des neuf saints est une approximation
      de la tradition javanaise plutôt qu'une attestation
      stricte des sources sunnites classiques.
