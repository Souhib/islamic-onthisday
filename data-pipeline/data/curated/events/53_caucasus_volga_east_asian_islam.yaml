  # =========================================================================
  # CAUCASUS — THE NAQSHBANDI-KHALIDI IMAMATE OF DAGHESTAN
  # =========================================================================

  - slug: death-of-imam-ghazi-muhammad
    category: ruler_death
    title_en: Death of Imām Ghāzī Muḥammad of Daghestan at Gimry
    title_ar: استشهاد الإمام غازي محمد الداغستاني في غمري
    title_fr: Mort de l'Imam Ghāzī Muḥammad du Daghestan à Gimry
    description_en: |
      Ghāzī Muḥammad of Gimry — first Imam of Daghestan, Naqshbandi-
      Khalidi shaykh, and proclaimed leader (1828) of the
      Caucasian resistance to Russian imperial expansion in the
      mountains of Daghestan and Chechnya — fell in battle at
      his native village of Gimry on 17 October 1832 CE / 22
      Jumādā al-Awwal 1248 AH at age about 39, when the Russian
      column under General Velyaminov stormed the Gimry stronghold
      after a long siege. He died with the bulk of his lieutenants;
      his close companion Shāmil escaped wounded and would later
      become the third Imam. Ghāzī Muḥammad's brief imamate
      established the legal-political programme of the Caucasian
      *muridist* movement: enforcement of *sharīʿa* over
      customary *ʿādat* law, jihād against Russian advance, and
      the administrative structure inherited from him by Hamzat
      Bek and Shāmil. His tomb at Gimry remained a pilgrimage
      destination through the long Russo-Caucasian war.
    description_ar: |
      استُشهد الإمام غازي محمد الغمري — أول أئمة الداغستان
      الثلاثة في الحرب القوقازية الكبرى، وشيخ الطريقة
      النقشبندية الخالدية، ومن أُعلن إماماً سنة ١٢٤٤ هـ
      (الموافق ١٨٢٨ ميلادي) لقيادة المقاومة القوقازية في وجه
      التوسع الروسي القيصري في جبال الداغستان والشيشان — في
      معركة قريته «غمري» يوم ٢٢ جمادى الأولى سنة ١٢٤٨ هـ
      (الموافق ١٧ أكتوبر ١٨٣٢ ميلادي) عن نحو تسع وثلاثين سنة،
      حين اقتحم الجنرال الروسي «فلياميـنوف» حصن غمري بعد حصار
      طويل. وقد قُتل ومعه عامة معاونيه، ونجا منهم رفيقه شامل
      جريحاً، وصار شامل بعد ذلك ثالث الأئمة. وأرسى إمامُه
      القصير برنامجَ حركة المريدين القوقازية: إقامة الشريعة
      على «العادات» العرفية، والجهاد في وجه الزحف الروسي،
      والهيكل الإداري الذي ورثه عنه حمزة بك ثم شامل من بعدهما.
      وضريحه بغمري ظل مزاراً طوال الحرب الروسية-القوقازية
      الطويلة.
    description_fr: |
      Ghāzī Muḥammad de Gimry — premier Imam du Daghestan,
      cheikh naqshbandī-khālidī, et chef proclamé en 1828 EC
      de la résistance caucasienne à l'expansion impériale
      russe dans les montagnes du Daghestan et de la Tchétchénie
      — tomba au combat dans son village natal de Gimry le 17
      octobre 1832 EC / 22 Jumādā al-Awwal 1248 H, à l'âge
      d'environ 39 ans, lorsque la colonne russe du général
      Veliaminov prit d'assaut la forteresse de Gimry après un
      long siège. Il mourut avec l'essentiel de ses lieutenants ;
      son compagnon Shāmil, blessé, parvint à s'échapper et
      deviendra plus tard le troisième Imam. L'imamat bref de
      Ghāzī Muḥammad établit le programme juridico-politique
      du mouvement *mouride* caucasien : application de la
      *sharīʿa* contre la loi coutumière *ʿādat*, *djihād*
      contre l'avancée russe, et la structure administrative
      héritée par Hamzat Bek puis par Shāmil. Sa tombe à Gimry
      demeura un lieu de pèlerinage pendant toute la longue
      guerre russo-caucasienne.
    canonical_hijri: {year: 1248, month: 5, day: 22, precision: day}
    canonical_gregorian: {date: 1832-10-17, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Ghāzī Muḥammad' and 'Daghistan' for the imamate and death at Gimry."
      - source_key: editorial
