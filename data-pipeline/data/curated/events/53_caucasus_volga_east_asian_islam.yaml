  - slug: execution-of-ma-hualong
    category: scholar_death
    title_en: Execution of Ma Hualong — Jahriyya Shaykh of Jinjipu
    title_ar: إعدام ما هوا لونغ — شيخ الجهرية بـ«جين جي بو»
    title_fr: Exécution de Ma Hualong — cheikh jahriyya de Jinjipu
    description_en: |
      Ma Hualong — fifth *menhuan* shaykh of the Hui Jahriyya
      Naqshbandi order in Gansu-Ningxia, hereditary spiritual
      heir of Ma Mingxin's line, and military leader of the
      Hui side in the great Dungan Revolt of 1862-1873 CE
      against the Qing dynasty — surrendered to General Zuo
      Zongtang at his Jahriyya stronghold of Jinjipu in early
      1871 CE after a sixteen-month siege, and was executed
      shortly afterwards on 2 March 1871 CE (10 Dhū al-Ḥijja
      1287 AH) in Lingzhou. His extended family was put to
      death with him, and the Jinjipu compound was razed; the
      Jahriyya communities of Gansu, Ningxia, and Shaanxi were
      forcibly resettled. Despite the disaster the Jahriyya
      order survived underground, regrouped under later
      *menhuan*, and remains one of the principal Naqshbandi
      orders among the northwestern Hui. The execution of Ma
      Hualong is the principal turning point in the
      destruction of the political-military Hui power-network
      of the Qing northwest.
    description_ar: |
      أُعدم الشيخ ما هوا لونغ — خامس مشايخ «منخوان» الجهرية
      النقشبندية من بيت «جين جي بو» ب«قانسو-نينغ شيا»،
      الوارث الروحي لسلسلة الشيخ ما مينغ شين، والقائد
      العسكري للجناح الهوي في «انتفاضة الدنغان» الكبرى
      ١٢٧٩-١٢٩٠ هـ (الموافق ١٨٦٢-١٨٧٣ ميلادي) في وجه دولة
      «تشينغ» — بعد أن سلَّم نفسه للجنرال «زو زنغ تانغ»
      في حصنه الجهري ب«جين جي بو» في أوائل سنة ١٢٨٧ هـ
      (الموافق ١٨٧١ ميلادي) إثر حصار دام ستة عشر شهراً،
      ثم أُعدم بعدها بقليل يوم ١٠ ذي الحجة سنة ١٢٨٧ هـ
      (الموافق ٢ مارس ١٨٧١ ميلادي) ب«لينغ زهو». ومات
      معه عامة آله، وسُوِّيت دار «جين جي بو» بالأرض،
      ورُحِّلت جالياتُ الجهرية في «قانسو» و«نينغ شيا»
      و«شَنشي» تهجيراً قسرياً. وعلى رغم الكارثة بقيت
      الطريقة الجهرية في السرية، وأعادت تنظيمها على
      مشايخ منخوان لاحقين، وما زالت إلى اليوم من أكبر
      الفروع النقشبندية عند هوي الشمال الغربي. وإعدام
      ما هوا لونغ هو منعطف التَدمير الأكبر لشبكة القوة
      السياسية-العسكرية الهوية في شمال غرب «تشينغ».
    description_fr: |
      Ma Hualong — cinquième cheikh *menhuan* de l'ordre hui
      jahriyya naqshbandī au Gansu-Ningxia, héritier
      spirituel héréditaire de la lignée de Ma Mingxin et
      chef militaire du camp hui dans la grande Révolte des
      Doungans de 1862-1873 EC contre la dynastie Qing —
      se rendit au général Zuo Zongtang dans son bastion
      jahriyya de Jinjipu au début de 1871 EC après un
      siège de seize mois, et fut exécuté peu après le 2
      mars 1871 EC (10 Dhū al-Ḥijja 1287 H) à Lingzhou. Sa
      famille élargie fut mise à mort avec lui, le complexe
      de Jinjipu rasé, et les communautés jahriyya du
      Gansu, du Ningxia et du Shaanxi furent déportées. En
      dépit du désastre, l'ordre jahriyya survécut dans la
      clandestinité, se reconstitua sous des *menhuan*
      ultérieurs, et demeure l'un des principaux ordres
      naqshbandīs parmi les Hui du nord-ouest. L'exécution
      de Ma Hualong est le point de basculement décisif de
      la destruction du réseau de pouvoir politico-
      militaire hui dans le nord-ouest des Qing.
    canonical_hijri: {year: 1287, month: 12, day: 10, precision: day}
    canonical_gregorian: {date: 1871-03-02, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Ma Hua-lung' for the surrender and execution after the siege of Jinjipu."
      - source_key: editorial
    people: [[ma-hualong, died]]
