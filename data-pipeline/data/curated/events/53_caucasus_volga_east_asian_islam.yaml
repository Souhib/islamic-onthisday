  - slug: death-of-liu-zhi
    category: scholar_death
    title_en: Death of Liu Zhi — Han Kitāb Master of Nanjing
    title_ar: وفاة ليو زهي — قطب «هان كتاب» بنانجينغ
    title_fr: Mort de Liu Zhi — maître Han Kitāb de Nankin
    description_en: |
      Liu Zhi (Liu Jielian) — Sunni Hui-Chinese scholar of
      Nanjing, the central figure of the eighteenth-century
      *Han Kitāb* school of Chinese-Islamic letters, and the
      author of the most influential Sino-Islamic works on
      *kalām*, prophetic biography, and ritual law in
      classical Chinese — died at Nanjing around 1730 CE
      (~1142 AH) at age about 70. His three core works
      *Tiānfāng Xìnglǐ* ("Nature and Principle in the Direction
      of Heaven [Mecca]"), *Tiānfāng Diǎnlǐ* ("Rituals of the
      Direction of Heaven"), and *Tiānfāng Zhì Shèng Shílù*
      ("True Record of the Most Holy of the Direction of
      Heaven", a sīra of the Prophet ﷺ) remain canonical for
      the Chinese-speaking Sunni community. Heir to the
      tradition of Wang Daiyu and Ma Zhu, Liu Zhi gave
      Sino-Islamic theology its most fully Confucian-engaged
      synthesis without departing from Sunni doctrine on
      *tawḥīd*, prophecy, and divine attributes. His exact
      death year is given between 1724 and 1736 CE in
      different Hui-Chinese sources; we use ~1730 CE.
    description_ar: |
      توفي الإمام ليو زهي (ليو جييه ليان) — العالم السني
      الصيني «الهوي» من «نان جينغ»، قطب مدرسة «هان كتاب»
      في القرن الثامن عشر الميلادي للأدب الإسلامي الصيني،
      ومصنف أعظم كتب «هان كتاب» في الكلام والسيرة والفقه
      بالصينية الفصحى — ب«نان جينغ» نحو سنة ١١٤٢ هـ (الموافق
      ١٧٣٠ ميلادي تقريباً) عن نحو سبعين سنة. ومصنفاته
      الثلاثة الكبرى «الفلسفة الإسلامية الصينية» (Tiānfāng
      Xìnglǐ، أي: «الطبيعة والمبدأ في جهة السماء [مكة]»)
      و«المناسك الإسلامية الصينية» (Tiānfāng Diǎnlǐ) و«السيرة
      النبوية الصينية» (Tiānfāng Zhì Shèng Shílù، أي «السجل
      الصحيح لأَقدس مَن في جهة السماء») لا تزال أُمَّاتِ
      المتون عند سنة المسلمين الصينيين. وَرِث تراث وانغ
      داي يو وما زهو، فأعطى الكلام السني الصيني صياغته
      الأكثر اشتغالاً بالكونفوشية مع الالتزام بأصول التوحيد
      والنبوة وصفات الله عند أهل السنة. وتختلف المصادر
      الصينية الإسلامية في ضبط سنة وفاته بين ١٧٢٤ و١٧٣٦
      ميلادي؛ ونعتمد هنا نحو ١٧٣٠.
    description_fr: |
      Liu Zhi (Liu Jielian) — savant sunnite hui-chinois de
      Nankin, figure centrale de l'école *Han Kitāb* du XVIIIe
      siècle des lettres sino-islamiques et auteur des œuvres
      sino-islamiques les plus influentes en *kalām*, en
      biographie prophétique et en droit rituel en chinois
      classique — mourut à Nankin vers 1730 EC (~1142 H) à
      l'âge d'environ 70 ans. Ses trois œuvres centrales
      *Tiānfāng Xìnglǐ* (« Nature et principe dans la
      direction du Ciel [La Mecque] »), *Tiānfāng Diǎnlǐ*
      (« Rituels de la direction du Ciel ») et *Tiānfāng Zhì
      Shèng Shílù* (« Récit véritable du plus saint de la
      direction du Ciel », *sīra* du Prophète ﷺ) demeurent
      canoniques pour la communauté sunnite sinophone.
      Héritier de la tradition de Wang Daiyu et Ma Zhu, Liu
      Zhi donna à la théologie sino-islamique sa synthèse la
      plus complètement engagée avec le confucianisme sans
      s'écarter de la doctrine sunnite du *tawḥīd*, de la
      prophétie et des attributs divins. Son année de décès
      exacte oscille entre 1724 et 1736 EC selon les sources
      hui-chinoises ; nous adoptons ~1730 EC.
    canonical_hijri: {year: 1142, precision: year}
    canonical_gregorian: {date: 1730-01-01, precision: year, method: attested}
    disputed: true
    dispute_about: date
