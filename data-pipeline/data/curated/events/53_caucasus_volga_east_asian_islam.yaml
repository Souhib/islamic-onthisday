  - slug: death-of-riza-fahreddin
    category: scholar_death
    title_en: Death of Riḍāʾ al-Dīn ibn Fakhr al-Dīn — Mufti of Russia's Muslims
    title_ar: وفاة رضاء الدين بن فخر الدين — مفتي مسلمي روسيا
    title_fr: Mort de Riḍāʾ al-Dīn ibn Fakhr al-Dīn — mufti des musulmans de Russie
    description_en: |
      Riḍāʾ al-Dīn ibn Fakhr al-Dīn al-Bulghārī (in Tatar Rıza
      Fahreddin) — Volga-Tatar Sunni Hanafi scholar, biographer,
      editor of the Orenburg journal *Shūrā* (1908-1917), author
      of the multi-volume biographical encyclopaedia *Āthār*, and
      from 1922 the third Mufti of the Central Spiritual
      Administration of the Muslims of European Russia and
      Siberia — died at Ufa on 12 April 1936 CE (20 Muḥarram
      1355 AH) at age 76. Trained in the Tatar Jadid milieu and
      heir to the Marjani-Nasiri tradition, he led Russian-
      Muslim institutional life through the late Tsarist
      reformist decades and the early Soviet period; *Āthār*
      remains the principal Tatar-language biographical reference
      for the Volga-Ural and broader Inner-Asian Sunni *ʿulamāʾ*
      of the nineteenth century. Increasingly constrained under
      Stalinist anti-religious pressure, he died in the year that
      saw the Soviet closure of the great Bukhara madrasas.
    description_ar: |
      توفي العلامة رضاء الدين بن فخر الدين البلغاري (Rıza
      Fahreddin) — العالم التتري الفولغي السني على المذهب
      الحنفي، المترجم لعلماء بلاد التتر، مدير مجلة «شورى» في
      «أورنبورغ» (١٣٢٦-١٣٣٦ هـ)، صاحب موسوعة التراجم الكبرى
      «الآثار»، ومفتي «الإدارة الدينية المركزية لمسلمي روسيا
      الأوروبية وسيبيريا» الثالث منذ سنة ١٣٤٠ هـ (الموافق
      ١٩٢٢ ميلادي) — بأوفا يوم ٢٠ محرّم سنة ١٣٥٥ هـ (الموافق
      ١٢ أفريل ١٩٣٦ ميلادي) عن ست وسبعين سنة. تخرّج من
      الوسط الجديدي التتري ووَرِث تقليدَ المرجاني وقيوم
      ناصري، ثم قاد الحياة المؤسسية للمسلمين في روسيا في
      أواخر العقود القيصرية الإصلاحية وأوائل العهد السوفييتي.
      وما زالت «الآثار» المرجعَ التاريخي الأكبر بالتترية
      لتراجم علماء أهل السنة من الفولغا والأورال وعموم
      آسيا الداخلية في القرن التاسع عشر الميلادي. وضاق به
      ضغط الستالينية المعادي للدين، فتوفي رحمه الله في
      السنة التي شهدت إغلاق مدارس بخارى الكبرى على يد
      السوفييت.
    description_fr: |
      Riḍāʾ al-Dīn ibn Fakhr al-Dīn al-Bulghārī (en tatar
      Rıza Fahreddin) — savant volga-tatar sunnite hanafite,
      biographe, rédacteur en chef du journal d'Orenbourg
      *Shūrā* (1908-1917), auteur de l'encyclopédie
      biographique en plusieurs volumes *Āthār*, et à partir
      de 1922 troisième mufti de l'Administration spirituelle
      centrale des musulmans de la Russie d'Europe et de
      Sibérie — mourut à Oufa le 12 avril 1936 EC (20
      Muḥarram 1355 H) à l'âge de 76 ans. Formé dans le
      milieu jadid tatar et héritier de la tradition
      Marjānī-Nasiri, il dirigea la vie institutionnelle
      russo-musulmane durant les dernières décennies
      réformistes tsaristes et le début de la période
      soviétique. *Āthār* demeure la principale référence
      biographique en langue tatare pour les *ʿulamāʾ*
      sunnites de la Volga, de l'Oural et de l'Asie intérieure
      du XIXe siècle. De plus en plus contraint sous la
      pression antireligieuse stalinienne, il mourut l'année
      même de la fermeture soviétique des grandes madrasas
      de Boukhara.
    canonical_hijri: {year: 1355, month: 1, day: 20, precision: day}
    canonical_gregorian: {date: 1936-04-12, precision: day, method: attested}
