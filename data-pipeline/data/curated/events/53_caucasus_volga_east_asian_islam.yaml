  - slug: death-of-wang-daiyu
    category: scholar_death
    title_en: Death of Wang Daiyu — Founder of Sino-Islamic Letters
    title_ar: وفاة وانغ داي يو — مؤسس الأدب الإسلامي الصيني
    title_fr: Mort de Wang Daiyu — fondateur des lettres sino-islamiques
    description_en: |
      Wang Daiyu — Sunni Hui-Chinese scholar of Nanjing, the
      first Muslim author to systematise Islamic theology in
      classical Chinese using Confucian and Neo-Confucian
      vocabulary, and the founding figure of the *Han Kitāb*
      tradition of Chinese-Islamic letters — died at Beijing
      around 1657 CE (1067-1068 AH) at age about 87. His
      principal works *Zhèngjiào Zhēnquán* ("True Annotation
      of the Right Religion", c. 1642 CE), *Qīngzhēn Dàxué*
      ("Great Learning of the Pure and True"), and *Xīzhēn
      Zhèngdá* ("Right Answers to Rare and True Questions")
      established the dominant Hui idiom for explaining Sunni
      tawḥīd, prophecy, and law to a literate Chinese-speaking
      Muslim public. He is the senior figure of the chain that
      runs through Ma Zhu and Liu Zhi over the next century
      and forms the canonical *Han Kitāb* corpus of the
      Chinese Sunni community. His exact death year and place
      are reported by his Hui-Chinese biographers as Beijing,
      Shunzhi 14, with some variation between 1657 and 1658
      CE.
    description_ar: |
      توفي العلامة وانغ داي يو — العالم السني الصيني «الهوي»
      من «نان جينغ»، أول مصنف من المسلمين قعَّد علم العقيدة
      الإسلامية بالصينية الفصحى مستعملاً معجمَ الكونفوشية
      والكونفوشية الجديدة، ومؤسِّس مدرسة «هان كتاب» في
      الأدب الإسلامي الصيني — ب«بكين» نحو سنة ١٠٦٧-١٠٦٨ هـ
      (الموافق ١٦٥٧ ميلادي تقريباً) عن نحو سبع وثمانين سنة.
      ومصنّفاته الكبرى «الشرح الصحيح للدين القويم» (Zhèngjiào
      Zhēnquán، نحو ١٦٤٢ ميلادي)، و«التعليم الكبير على الصدق
      الخالص» (Qīngzhēn Dàxué)، و«الجواب الصحيح على المسائل
      النادرة» (Xīzhēn Zhèngdá)، وضعت اللسانَ الإسلاميَّ
      الصينيَّ الذي يُعرض به التوحيدُ والنبوة والشريعة عند
      أهل السنة من المسلمين الصينيين القراء. وهو شيخ السلسلة
      التي تنتقل عبر «ما زهو» إلى «ليو زهي» في القرن التالي
      وتُكوِّن متن «هان كتاب» المعتمد عند سنة المسلمين
      الصينيين. وتذكر تراجمه «الهَوِيَّة» وفاته ب«بكين»
      في عهد الإمبراطور «شون زهي» سنة ١٤، مع اختلاف بين
      ١٦٥٧ و١٦٥٨ ميلادي.
    description_fr: |
      Wang Daiyu — savant sunnite hui-chinois de Nankin,
      premier auteur musulman à systématiser la théologie
      islamique en chinois classique en utilisant le
      vocabulaire confucéen et néo-confucéen, et figure
      fondatrice de la tradition *Han Kitāb* des lettres
      sino-islamiques — mourut à Pékin vers 1657 EC (1067-
      1068 H) à l'âge d'environ 87 ans. Ses œuvres
      principales *Zhèngjiào Zhēnquán* (« Annotation
      véritable de la juste religion », v. 1642 EC),
      *Qīngzhēn Dàxué* (« Grande Étude du Pur et Vrai ») et
      *Xīzhēn Zhèngdá* (« Réponses justes aux questions
      rares et vraies ») fixèrent l'idiome dominant par
      lequel les Hui présentent le *tawḥīd* sunnite, la
      prophétie et la Loi à un public musulman lettré
      chinois. Il est la figure aînée de la chaîne qui passe
      par Ma Zhu et Liu Zhi au siècle suivant pour former
      le corpus canonique *Han Kitāb* de la communauté
      sunnite chinoise. Ses biographes hui-chinois situent
      sa mort à Pékin en l'année 14 du règne de l'empereur
      Shunzhi, avec une variation entre 1657 et 1658 EC.
    canonical_hijri: {year: 1067, precision: year}
    canonical_gregorian: {date: 1657-01-01, precision: year, method: attested}
    disputed: true
    dispute_about: date
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Wang Tai-yü' for biography; death dated to Shunzhi 14 (1657-58 CE)."
      - source_key: editorial
