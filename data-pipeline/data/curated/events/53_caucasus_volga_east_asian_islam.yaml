    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Siege_of_Akhoulgo"

  - slug: death-of-imam-shamil
    category: ruler_death
    title_en: Death of Imām Shāmil of Daghestan in Medina
    title_ar: وفاة الإمام شامل الداغستاني بالمدينة المنورة
    title_fr: Mort de l'Imam Shāmil du Daghestan à Médine
    description_en: |
      Shāmil ibn Dengaw of Gimry — third Imam of Daghestan
      (1834-1859), Naqshbandi-Khalidi shaykh, and the central
      figure of the long Caucasian resistance to Russian imperial
      expansion — died in Medina on 4 February 1871 CE (14 Dhū
      al-Qaʿda 1287 AH) at age about 73. After leading the
      Caucasian Imamate for twenty-five years from his foothold
      in Chechnya and Daghestan, he surrendered to the Russian
      forces of Field Marshal Bariatinsky at Gunib in late August
      1859 CE; the surrender was honourable and Shāmil was
      relocated under house arrest first to Kaluga and then to
      Kiev. In 1869 the Tsar permitted him to leave for the
      Hijaz, and after performing Hajj at Mecca and visiting
      Medina he settled there. He was buried in al-Baqīʿ
      cemetery beside his eldest son Ghāzī Muḥammad. His
      imamate institutionalised the *sharīʿa*-state model of
      Ghāzī Muḥammad and Hamzat Bek and remains a foundational
      reference for modern Caucasian Sunni Islam.
    description_ar: |
      توفي الإمام شامل بن دنغاو الغمري — ثالث أئمة الداغستان
      الثلاثة (١٢٥٠-١٢٧٦ هـ)، شيخ الطريقة النقشبندية الخالدية،
      والركن المركزي للمقاومة القوقازية الطويلة في وجه التوسع
      الروسي القيصري — بالمدينة المنورة يوم ١٤ ذي القعدة سنة
      ١٢٨٧ هـ (الموافق ٤ فيفري ١٨٧١ ميلادي) عن نحو ثلاث وسبعين
      سنة. وكان قد قاد إمامة القوقاز خمساً وعشرين سنة من معقله
      في الشيشان والداغستان، ثم سلَّم نفسه للقوات الروسية
      بقيادة المشير «باريا تنسكي» ب«غونيب» في أواخر غشت سنة
      ١٢٧٦ هـ (الموافق ١٨٥٩ ميلادي)؛ وكان التسليم مُكرَّماً،
      فنُقل تحت الإقامة الجبرية إلى «كالوغا» ثم «كييف». وفي
      سنة ١٨٦٩ ميلادي أَذِن له القيصر بالخروج إلى الحجاز،
      فحجّ وزار المدينة المنورة واستوطنها. ودُفن بالبقيع إلى
      جانب ابنه البكر غازي محمد. وأَرسَت إمامته نموذجَ الدولة
      الشرعية الذي وضعه غازي محمد وحمزة بك من قبله، وما زالت
      مرجعاً مؤسِّساً للإسلام السني القوقازي الحديث.
    description_fr: |
      Shāmil ibn Dengaw de Gimry — troisième Imam du Daghestan
      (1834-1859), cheikh naqshbandī-khālidī, et figure centrale
      de la longue résistance caucasienne à l'expansion
      impériale russe — mourut à Médine le 4 février 1871 EC
      (14 Dhū al-Qaʿda 1287 H), à l'âge d'environ 73 ans. Après
      avoir mené l'Imamat caucasien pendant vingt-cinq ans
      depuis son bastion de Tchétchénie et du Daghestan, il se
      rendit aux forces russes du feld-maréchal Bariatinski à
      Gounib à la fin août 1859 EC ; la reddition fut
      honorable, et Shāmil fut placé en résidence surveillée
      d'abord à Kalouga puis à Kiev. En 1869, le tsar lui
      permit de partir pour le Hijaz, et après avoir accompli
      le Hajj à La Mecque et visité Médine, il s'y établit. Il
      fut enseveli au cimetière al-Baqīʿ aux côtés de son
      fils aîné Ghāzī Muḥammad. Son imamat institutionnalisa
      le modèle d'État de *sharīʿa* hérité de Ghāzī Muḥammad
      et de Hamzat Bek, et demeure une référence fondatrice
      pour l'islam sunnite caucasien moderne.
    canonical_hijri: {year: 1287, month: 11, day: 14, precision: day}
    canonical_gregorian: {date: 1871-02-04, precision: day, method: attested}
