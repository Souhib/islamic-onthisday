  - slug: execution-of-ma-mingxin
    category: scholar_death
    title_en: Execution of Ma Mingxin — Founder of the Hui Jahriyya Order
    title_ar: إعدام ما مينغ شين — مؤسس الطريقة الجهرية الهوية
    title_fr: Exécution de Ma Mingxin — fondateur de l'ordre jahriyya hui
    description_en: |
      Ma Mingxin — Sunni Hui-Chinese Naqshbandi scholar of
      Gansu, founder of the *Jahriyya* (Vocal-Dhikr) branch of
      the Naqshbandi tariqa among the northwestern Hui after
      his return in the 1750s from Yemeni and Hijazi study with
      shaykhs of the Naqshbandiyya-Mujaddidiyya line, and the
      central spiritual leader of the 1781 Hui uprising against
      the Qing — was executed by beheading in Lanzhou on 27
      March 1781 CE / 2 Rabīʿ al-Thānī 1195 AH after the
      uprising's defeat. His Jahriyya order, characterised by
      vocalised collective dhikr (in contrast to the silent
      *Khufiyya* dominant before him), spread widely across the
      Gansu-Ningxia-Shaanxi corridor and produced a distinct
      Hui Sufi tradition with its own *menhuan* (saint-lineage
      compounds) and a long line of martyred shaykhs. The Qing
      court tried twice to suppress the order; it survived
      both campaigns and remains one of the principal
      Naqshbandi branches among the Hui to the present day.
    description_ar: |
      أُعدم الشيخ ما مينغ شين — العالم السني الصيني «الهوي»
      النقشبندي من «قانسو»، مؤسس فرع «الجهرية» (دهر الذكر
      الجهرية) من الطريقة النقشبندية بين الهوي بشمال غرب
      الصين بعد عودته في عقد ١٧٥٠ ميلادي من اليمن والحجاز
      مجازاً عن مشايخ الطريقة النقشبندية المجدِّدية، والقطب
      الروحي لانتفاضة الهوي على دولة «تشينغ» سنة ١١٩٥ هـ —
      ضرباً للعنق في «لانزهو» يوم ٢ ربيع الآخر سنة ١١٩٥ هـ
      (الموافق ٢٧ مارس ١٧٨١ ميلادي) إثر هزيمة الانتفاضة. وطريقتُه
      الجهرية، المتميزة بالذكر الجماعي الجهري (في خلاف
      «الخُفية» التي كانت سائدة قبله بالذكر الخفيِّ
      السرّي)، انتشرت في الممرّ «قانسو-نينغ شيا-شَنشي»،
      وأخرجت تقليداً صوفياً هويّاً متميّزاً له «المنخوان»
      الخاصة (مَجامع البيوت السلسلية للأولياء)، وسلسلة
      طويلة من المشايخ الشهداء. وحاولت دولة «تشينغ» قمعها
      مرّتين، فنجت في الحملتين، وما زالت إلى اليوم من
      أكبر فروع النقشبندية عند الهوي.
    description_fr: |
      Ma Mingxin — savant sunnite hui-chinois naqshbandī du
      Gansu, fondateur de la branche *Jahriyya* (au *dhikr*
      vocal) de la *ṭarīqa* naqshbandiyya parmi les Hui du
      nord-ouest après son retour dans les années 1750 EC
      d'études au Yémen et au Hijaz auprès des cheikhs de la
      lignée naqshbandiyya-mujaddidiyya, et chef spirituel
      central du soulèvement hui de 1781 contre les Qing —
      fut exécuté par décapitation à Lanzhou le 27 mars 1781
      EC / 2 Rabīʿ al-Thānī 1195 H, après la défaite du
      soulèvement. Son ordre jahriyya, caractérisé par le
      *dhikr* vocalisé collectif (par opposition à la
      *Khufiyya* silencieuse dominante avant lui), s'étendit
      largement dans le corridor Gansu-Ningxia-Shaanxi et
      produisit une tradition soufie hui distincte, dotée
      de ses propres *menhuan* (complexes de lignées
      saintes) et d'une longue série de cheikhs martyrs. La
      cour des Qing tenta deux fois d'écraser l'ordre ; il
      survécut à ces deux campagnes et demeure aujourd'hui
      l'une des principales branches naqshbandies parmi les
      Hui.
    canonical_hijri: {year: 1195, month: 4, day: 2, precision: day}
    canonical_gregorian: {date: 1781-03-27, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Ma Ming-hsin' for biography and execution at Lanzhou in 1781."
      - source_key: editorial
    people: [[ma-mingxin, died]]
