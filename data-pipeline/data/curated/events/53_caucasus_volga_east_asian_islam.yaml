  - slug: fall-of-akhulgo
    category: battle
    title_en: Fall of Akhulgo to Russian Forces
    title_ar: سقوط حصن أَخُلْغو في أيدي الروس
    title_fr: Chute d'Akhulgo aux forces russes
    description_en: |
      Akhulgo — the principal mountain stronghold of Imam Shāmil's
      Naqshbandi-Khalidi imamate, perched on a rocky promontory
      above the Andi-Koisu river in north-western Daghestan —
      fell to the Russian forces of General Pavel Grabbe on 22
      August 1839 CE (11 Jumādā al-Thānī 1255 AH) after a brutal
      eighty-day siege that began on 12 June. The Russians lost
      some three thousand men in repeated assaults; the defenders
      lost virtually their entire fighting force, including most
      of the Imam's family. Shāmil himself escaped through the
      Russian lines with a handful of followers, but the fortress
      was demolished and the imamate's military centre of gravity
      shifted to Chechnya. Despite the disaster, Akhulgo became
      the founding myth of the long second phase of the Imamate
      (1840-1859); Shāmil rebuilt his administration in the
      forested foothills and held out against the Russian Empire
      for two more decades. The siege is remembered in modern
      Daghestani historiography as the Caucasian war's darkest
      and most determinative single engagement.
    description_ar: |
      سقط حصن «أخلْغو» — الحصن الجبليّ الأكبر في إمامة الشيخ
      شامل النقشبندي الخالدي، القائم على نتوء صخري فوق نهر
      «الأندي قويصو» في شمال غرب الداغستان — في أيدي القوات
      الروسية بقيادة الجنرال «بافل غرابِّه» يوم ١١ جمادى الآخرة
      سنة ١٢٥٥ هـ (الموافق ٢٢ غشت ١٨٣٩ ميلادي) بعد حصار وحشي
      دام نحو ثمانين يوماً ابتدأ في ١٢ جوان. خسر الروس فيه نحو
      ثلاثة آلاف جنديٍّ في الهجمات المتتالية، وفقد المدافعون
      عامّة قوّاتهم القتالية ومنهم جلّ آل الإمام. ونجا شامل
      نفسه باختراقه الخطوط الروسية في عصبة قليلة من أتباعه،
      لكن الحصن دُمِّر، وانتقل الثقل العسكري للإمامة إلى
      الشيشان. وعلى رغم الكارثة صارت «أخلغو» الأسطورة المؤسسة
      للطور الثاني الطويل من الإمامة (١٢٥٦-١٢٧٦ هـ)؛ فأعاد
      شامل إنشاء إدارته في الجبال الحرجية، واستعصى على
      الإمبراطورية الروسية عقدين آخرين. ويُذكر هذا الحصار في
      المؤلّفات الداغستانية الحديثة بأنّه أحلك مفاصل الحرب
      القوقازية وأكثرها تحديداً لمسارها.
    description_fr: |
      Akhulgo — la principale forteresse de montagne de
      l'imamat naqshbandī-khālidī de l'Imam Shāmil, perchée
      sur un éperon rocheux dominant la rivière Andi-Koysu
      au nord-ouest du Daghestan — tomba aux mains des forces
      russes du général Pavel Grabbe le 22 août 1839 EC (11
      Jumādā al-Thānī 1255 H), au terme d'un siège brutal de
      quatre-vingts jours commencé le 12 juin. Les Russes y
      perdirent environ trois mille hommes dans les assauts
      répétés ; les défenseurs perdirent la quasi-totalité de
      leur force combattante, y compris la majeure partie de
      la famille de l'Imam. Shāmil lui-même s'échappa à
      travers les lignes russes avec une poignée de fidèles,
      mais la forteresse fut rasée et le centre de gravité
      militaire de l'imamat se déplaça vers la Tchétchénie.
      Malgré le désastre, Akhulgo devint le mythe fondateur
      de la longue seconde phase de l'imamat (1840-1859) ;
      Shāmil reconstitua son administration dans les
      contreforts boisés et tint tête à l'Empire russe deux
      autres décennies. Le siège est tenu, dans
      l'historiographie daghestanaise contemporaine, pour
      l'engagement le plus sombre et le plus déterminant de
      la guerre du Caucase.
    canonical_hijri: {year: 1255, month: 6, day: 11, precision: day}
    canonical_gregorian: {date: 1839-08-22, precision: day, method: attested}
    claims:
      - source_key: ei2
