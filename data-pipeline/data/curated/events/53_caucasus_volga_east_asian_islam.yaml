# Wave 53 of curated event additions (2026-04-27).
# Caucasus, Volga / Tatar, Hui-Chinese, and additional Walisongo-Java
# Sunni Muslim history — geographies under-represented in the dataset.
# Four clusters:
#   (i) the Naqshbandi-Khalidi imamate of Daghestan and the long
#       Russian-Caucasian war (Ghāzī Muḥammad, Hamzat Bek, Akhulgo,
#       Imam Shāmil),
#   (ii) the conversion of the Volga Bulgars and the modern Tatar
#       Jadid renewal (Mercanī, Nasiri, Riza Fahreddin, Mūsā Bigi),
#   (iii) the founders of Sino-Islamic letters and the Hui-Chinese
#       Sufi orders (Wang Daiyu, Liu Zhi, Ma Mingxin, Ma Hualong),
#   (iv) Sunan Bonang of the Javanese Walisongo not covered in Wave 27.
# Most of these figures post-date al-Dhahabī (d. 748 AH), so the
# classical wafayāt corpus does not cover them. We rely on EI2 + the
# editorial summary as the standard cross-reference pair, supplemented
# where available by Ibn al-Athīr or Ibn Faḍlān for the early-tenth-
# century Bulgar conversion. Where ≥2 sources from sources.yaml could
# not be justified, the entry is marked single_source. None of the
# figures here are sahaba; image policy does not apply. Trilingual
# en/ar/fr throughout.

events:
  # =========================================================================
  # VOLGA — THE CONVERSION OF THE BULGARS (310 AH)
  # =========================================================================

  - slug: conversion-of-volga-bulgars
    category: conversion
    title_en: Conversion of the Volga Bulgars to Islam
    title_ar: إسلام بلغار الفولغا
    title_fr: Conversion à l'islam des Bulgares de la Volga
    description_en: |
      The formal conversion of the Volga-Bulgar khaganate to Sunni
      Islam took place in Muḥarram 310 AH (May 922 CE) when the
      Abbasid embassy of the caliph al-Muqtadir reached the court
      of Almish (Yiltawar) ibn Yiltawar at the confluence of the
      Volga and the Kama. The khan had earlier petitioned Baghdad
      for jurists and instructors to teach Islam, and the embassy —
      whose secretary Aḥmad ibn Faḍlān left a celebrated Arabic
      eyewitness account, *Risālat ibn Faḍlān* — delivered the
      caliphal answer. After the public *khuṭba* invoking the
      ʿAbbāsid caliph, Almish took the Muslim throne-name Jaʿfar
      ibn ʿAbd Allāh; the chain of conversions that followed gave
      rise to the Tatar-Bulgar Sunni community of the middle Volga
      that has persisted for more than eleven centuries — the
      historical core of the Tatar, Bashkir, and Chuvash Muslim
      populations of European Russia. The Volga Bulgar polity was
      the first Muslim state established north of the Caspian
      steppe and the Northernmost outpost of the Sunni *umma*
      until the Ottoman expansions of the sixteenth century.
    description_ar: |
      تمّ إسلام خانية بلغار الفولغا الإسلام السنّيَّ على المذهب
      الحنفيِّ في محرّم سنة ٣١٠ هـ (الموافق ماي ٩٢٢ ميلادي) لمّا
      وصلت السفارة العباسية التي بعث بها الخليفة المقتدر إلى بلاط
      «أَلْمَش (يلطوار) بن يلطوار» عند ملتقى نهري الفولغا والكاما.
      وكان الخان قد كاتب بغداد قبل ذلك يطلب فقهاء ومعلمين يعلمونه
      الإسلام، فأجاب الخليفة، وحملت السفارة جوابه — وكاتبها أحمد
      بن فضلان ترك «رسالة ابن فضلان» العربية الشهيرة في وصف
      هذه الرحلة. وبعد الخطبة الجامعة على المنابر باسم الخليفة
      العباسي تسمّى الخان بالاسم الإسلامي «جعفر بن عبد الله»،
      فبدأت بذلك سلسلة الإسلام التي أنتجت جالية بلغار الفولغا
      السنية في وسط الفولغا، الباقية أكثر من إحدى عشرة قرناً —
      وهي النواة التاريخية للجاليات التترية والباشكيرية
      والشوفاشية المسلمة في روسيا الأوروبية. وكانت دولة بلغار
      الفولغا أوّل دولة إسلامية شمال سهب بحر قزوين، وأقصى ثغور
      أهل السنة شمالاً إلى أن جاء التوسع العثماني في القرن
      السادس عشر الميلادي.
    description_fr: |
      La conversion formelle du khaganat des Bulgares de la Volga
      à l'islam sunnite eut lieu en Muḥarram 310 H (mai 922 EC)
      lorsque l'ambassade ʿabbāside du calife al-Muqtadir parvint
      à la cour d'Almish (Yiltawar) ibn Yiltawar, au confluent
      de la Volga et de la Kama. Le khan avait auparavant
      sollicité de Bagdad des juristes et des instructeurs pour
      enseigner l'islam ; l'ambassade — dont le secrétaire
      Aḥmad ibn Faḍlān laissa un célèbre témoignage arabe, la
      *Risāla* — apporta la réponse califale. Après la *khuṭba*
      publique au nom du calife ʿabbāside, Almish prit le nom
      musulman Jaʿfar ibn ʿAbd Allāh ; la chaîne de conversions
      qui s'ensuivit donna naissance à la communauté sunnite
      tatare-bulghare de la moyenne Volga, qui a persisté plus
      de onze siècles — noyau historique des populations
      musulmanes tatares, bachkires et tchouvaches de la Russie
      européenne. La principauté des Bulgares de la Volga fut le
      premier État musulman au nord de la steppe caspienne et
      l'avant-poste le plus septentrional de la *umma* sunnite
      jusqu'aux expansions ottomanes du XVIe siècle.
    canonical_hijri: {year: 310, month: 1, precision: month}
    canonical_gregorian: {date: 922-05-12, precision: month, method: tabular_conversion}
