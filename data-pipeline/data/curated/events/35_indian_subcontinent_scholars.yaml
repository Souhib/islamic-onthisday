  - slug: death-of-manazir-ahsan-gilani
    category: scholar
    title_en: Death of Manāẓir Aḥsan al-Gīlānī — Indian Sunni Biographer
    title_ar: وفاة مناظر أحسن الجيلاني — السيرة عند علماء الهند الحنفية
    title_fr: Mort de Manāẓir Aḥsan al-Gīlānī — biographe sunnite indien
    description_en: |
      Sayyid Manāẓir Aḥsan al-Gīlānī — Indian Sunni Hanafi
      scholar of the Deobandī tradition, professor of theology
      and Islamic studies at Osmania University in Hyderabad
      for nearly thirty years, and a prolific Urdu biographer
      of classical Sunni figures — died at Hyderabad on 27
      Shawwāl 1375 AH (5 June 1956 CE) at age 64. His Urdu
      biographical studies of Imām Abū Ḥanīfa, Muḥammad Qāsim
      al-Nānautwī, Abū Dharr al-Ghifārī ra, and the
      institutional history of Indian madrasa education —
      *Hindustān men Musalmānon kā Niẓām-i Taʿlīm wa Tarbiyat*
      — became standard references in twentieth-century South
      Asian Sunni scholarship. He combined academic philology
      with the classical Deobandī curriculum and produced
      detailed studies of Hanafi *uṣūl* and the history of
      Indian Islamic learning.
    description_ar: |
      توفي السيد مناظر أحسن الجيلاني — العالم السني الهندي
      على المذهب الحنفي من تراث ديوبند، أستاذ علم الكلام
      والدراسات الإسلامية بجامعة عثمانية بحيدر آباد قرابة
      ثلاثين سنة، ومصنف كتب السيرة بالأردية في كبار رجال
      أهل السنة الكلاسيكيين — بحيدر آباد يوم ٢٧ شوال سنة
      ١٣٧٥ هـ (الموافق ٥ جوان ١٩٥٦ ميلادي) عن أربع وستين
      سنة. ودراساته السِيَرية بالأردية للإمام أبي حنيفة
      ومحمد قاسم النانوتوي والصحابي أبي ذر الغفاري رضي الله
      عنه، وكتابه «هندوستان میں مسلمانوں کا نظام تعلیم و
      تربیت» في تاريخ التعليم الإسلامي بشبه القارة الهندية،
      صارت من المراجع المعتمدة في الدراسات السنية الهندية
      في القرن العشرين. وقد جمع بين منهج الدراسات الفيلولوجية
      الأكاديمية والمنهاج الكلاسيكي الديوبندي، فأخرج دراسات
      مفصلة في أصول الفقه الحنفي وتاريخ التعليم الإسلامي
      الهندي.
    description_fr: |
      Sayyid Manāẓir Aḥsan al-Gīlānī — savant sunnite indien
      hanafite de la tradition deobandie, professeur de
      théologie et d'études islamiques à l'université Osmania
      de Hyderabad pendant près de trente ans, et biographe
      ourdou prolifique de figures sunnites classiques —
      mourut à Hyderabad le 27 Shawwāl 1375 H (5 juin 1956
      EC) à l'âge de 64 ans. Ses études biographiques en
      ourdou de l'imam Abū Ḥanīfa, de Muḥammad Qāsim al-
      Nānautwī, du Compagnon Abū Dharr al-Ghifārī ra, et
      son histoire institutionnelle de l'enseignement
      madrasa indien — *Hindustān men Musalmānon kā Niẓām-i
      Taʿlīm wa Tarbiyat* — devinrent des références
      standard dans l'érudition sunnite sud-asiatique du
      XXe siècle. Il combinait la philologie académique
      avec le curriculum deobandi classique et produisit
      des études détaillées sur les *uṣūl* hanafites et
      l'histoire de l'apprentissage islamique indien.
