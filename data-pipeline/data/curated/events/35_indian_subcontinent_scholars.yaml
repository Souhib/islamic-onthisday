  - slug: death-of-mahmud-al-hasan-al-deobandi
    category: scholar
    title_en: Death of Maḥmūd al-Ḥasan al-Deobandī — Shaykh al-Hind
    title_ar: وفاة محمود الحسن الديوبندي — شيخ الهند
    title_fr: Mort de Maḥmūd al-Ḥasan al-Deobandī — Shaykh al-Hind
    description_en: |
      Maḥmūd al-Ḥasan ibn Dhū al-Fiqār ʿAlī al-Deobandī, known
      throughout the subcontinent as *Shaykh al-Hind* ("the
      Master of India") — first student to enrol at Dār al-
      ʿUlūm Deoband, later its principal (*ṣadr al-mudarrisīn*),
      and the senior Sunni Indian scholar of his generation —
      died in Delhi on 18 Rabīʿ al-Awwal 1339 AH (30 November
      1920 CE) shortly after laying the foundation stone of
      Jamia Millia Islamia. He was about 69. He had spent
      three and a half years (1916-1920) interned by British
      authorities at Fort Verdala on Malta after his arrest
      in connection with the so-called "Silk Letters
      Conspiracy" — an attempt to coordinate anti-colonial
      Muslim networks across the Hijāz, Afghanistan, and
      India during the First World War. On his return he
      drove a major Urdu translation-and-commentary of the
      Qurʾān (completed by his student al-Madanī after his
      death) and helped frame the Jamiat Ulema-e-Hind's
      stance against the partitioning of India.
    description_ar: |
      توفي الإمام محمود الحسن بن ذي الفقار علي الديوبندي —
      المعروف في عموم شبه القارة بـ«شيخ الهند»، أول طالب
      التحق بدار العلوم ديوبند، ثم مدرسها الأول «صدر
      المدرسين»، وأكبر علماء أهل السنة الهنود في عصره —
      بدلهي يوم ١٨ ربيع الأول سنة ١٣٣٩ هـ (الموافق ٣٠
      نوفمبر ١٩٢٠ ميلادي) بعيد وضعه حجر الأساس لجامعة الملية
      الإسلامية. وقد ناهز التاسعة والستين. وكان قد قضى ثلاث
      سنين ونصفاً من سنة ١٩١٦ إلى ١٩٢٠ ميلادي معتقلاً عند
      السلطات البريطانية في «حصن فيردالا» بمالطا إثر إلقاء
      القبض عليه على إثر ما اشتُهر بـ«مؤامرة الرسائل
      الحريرية»، وهو مشروع شبكات إسلامية مناهضة للاستعمار
      تربط بين الحجاز وأفغانستان والهند خلال الحرب العالمية
      الأولى. ولما عاد قاد ترجمة القرآن الكريم وتفسيره
      بالأردية (أكمله بعده تلميذه الحسين أحمد المدني)،
      وأسس مع جماعته «جمعية علماء الهند» موقفها الرافض
      لتقسيم الهند.
    description_fr: |
      Maḥmūd al-Ḥasan ibn Dhū al-Fiqār ʿAlī al-Deobandī, connu
      à travers tout le sous-continent comme *Shaykh al-Hind*
      (« le maître de l'Inde ») — premier étudiant inscrit
      à Dār al-ʿUlūm Deoband, plus tard son principal
      (*ṣadr al-mudarrisīn*), et le savant sunnite indien
      aîné de sa génération — mourut à Delhi le 18 Rabīʿ
      al-Awwal 1339 H (30 novembre 1920 EC) peu après avoir
      posé la première pierre de la Jamia Millia Islamia.
      Il avait environ 69 ans. Il avait passé trois ans et
      demi (1916-1920) interné par les autorités britanniques
      à Fort Verdala à Malte après son arrestation dans le
      cadre de la « conspiration des lettres de soie » — une
      tentative de coordination de réseaux musulmans
      anti-coloniaux entre le Hijāz, l'Afghanistan et l'Inde
      durant la Première Guerre mondiale. À son retour il
      lança une grande traduction-commentaire du Coran en
      ourdou (achevée après sa mort par son élève al-Madanī)
      et aida à articuler la position de la Jamiat
      Ulema-e-Hind contre la partition de l'Inde.
    canonical_hijri: {year: 1339, month: 3, day: 18, precision: day}
    canonical_gregorian: {date: 1920-11-30, precision: day, method: attested}
