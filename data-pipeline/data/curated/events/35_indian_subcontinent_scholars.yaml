  - slug: death-of-ashraf-ali-al-thanawi
    category: scholar
    title_en: Death of Ashraf ʿAlī al-Thānawī — Ḥakīm al-Umma
    title_ar: وفاة الأشرف علي التهانوي — حكيم الأمة
    title_fr: Mort d'Ashraf ʿAlī al-Thānawī — Ḥakīm al-Umma
    description_en: |
      Ashraf ʿAlī ibn ʿAbd al-Ḥaqq al-Thānawī, honoured by his
      students as *Ḥakīm al-Umma* ("the Sage of the
      Community") — Indian Sunni Hanafi scholar of the
      Deobandī tradition, prolific author of more than a
      thousand titles in Arabic, Persian, and Urdu, and a
      senior figure in the Naqshbandī-Mujaddidī Sufi
      lineage of Deoband — died at Thana Bhawan in
      United Provinces on 16 Rajab 1362 AH (20 July 1943 CE)
      at age 79. His Urdu *Bayān al-Qurʾān* (twelve volumes)
      remains one of the most-read Sunni tafsīrs of the
      subcontinent, and his manual *Bahishtī Zēwar* — written
      for the religious education of women in fiqh, ʿaqīda,
      and adab — became the most widely circulated Hanafi
      women's text of the twentieth century. He shaped the
      practical theology of Indian Sunnism for two
      generations.
    description_ar: |
      توفي الإمام أشرف علي بن عبد الحق التهانوي — المعروف
      عند تلاميذه بـ«حكيم الأمة»، عالم سني هندي على المذهب
      الحنفي من تراث ديوبند، مصنف ما يزيد على ألف كتاب
      بالعربية والفارسية والأردية، وكبير شيوخ السلسلة
      النقشبندية المجددية في ديوبند — في «تهانه بهون» في
      الولايات المتحدة الهندية يوم ١٦ رجب سنة ١٣٦٢ هـ
      (الموافق ٢٠ جويلية ١٩٤٣ ميلادي) عن تسع وسبعين سنة.
      و«بيان القرآن» له بالأردية في اثني عشر مجلداً من أكثر
      تفاسير أهل السنة قراءةً في شبه القارة الهندية،
      و«بهشتي زيور» كتابه الموضوع لتربية النساء في الفقه
      والعقيدة والآداب أكثر متون الحنفية النسائية تداولاً
      في القرن العشرين كله. وقد شكّل المتن العملي للعقيدة
      السنية الهندية لجيلين متتاليين.
    description_fr: |
      Ashraf ʿAlī ibn ʿAbd al-Ḥaqq al-Thānawī, honoré par
      ses élèves comme *Ḥakīm al-Umma* (« le Sage de la
      Communauté ») — savant sunnite indien hanafite de la
      tradition deobandie, auteur prolifique de plus d'un
      millier de titres en arabe, persan et ourdou, et figure
      majeure de la lignée soufie naqshbandī-mujaddidī de
      Deoband — mourut à Thana Bhawan, dans les Provinces-
      Unies, le 16 Rajab 1362 H (20 juillet 1943 EC) à l'âge
      de 79 ans. Son *Bayān al-Qurʾān* en ourdou (douze
      volumes) demeure l'un des tafsīrs sunnites les plus lus
      du sous-continent, et son manuel *Bahishtī Zēwar* —
      écrit pour l'éducation religieuse des femmes en fiqh,
      *ʿaqīda* et *adab* — devint le texte hanafite féminin
      le plus largement diffusé du XXe siècle. Il façonna la
      théologie pratique du sunnisme indien pour deux
      générations.
    canonical_hijri: {year: 1362, month: 7, day: 16, precision: day}
    canonical_gregorian: {date: 1943-07-20, precision: day, method: attested}
