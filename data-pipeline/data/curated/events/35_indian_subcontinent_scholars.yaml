  - slug: death-of-muhammad-ilyas-al-kandhlawi
    category: scholar
    title_en: Death of Muḥammad Ilyās al-Kandhlawī — Founder of Tablīghī Jamāʿat
    title_ar: وفاة محمد إلياس الكاندهلوي — مؤسس جماعة التبليغ
    title_fr: Mort de Muḥammad Ilyās al-Kandhlawī — fondateur de la Tablīghī Jamāʿat
    description_en: |
      Muḥammad Ilyās ibn Muḥammad Ismāʿīl al-Kandhlawī —
      Indian Sunni Hanafi scholar of the Deobandī tradition,
      member of the Naqshbandī-Mujaddidī Sufi chain, and
      founder of the Tablīghī Jamāʿat, the lay-led
      grass-roots Sunni renewal movement that began in the
      Mewat region of north India in the early 1920s — died
      at Nizamuddin (Delhi) on 21 Rajab 1363 AH (13 July 1944
      CE) at age about 59. His method, codified in the *Six
      Points* and elaborated by his son and successor Yūsuf
      al-Kandhlawī, took ordinary Muslims out from their
      mosques in temporary travelling parties to remind one
      another of basic ʿaqīda and ʿibādāt. Within fifty
      years it had become the largest single trans-national
      Muslim missionary movement of the twentieth century
      with millions of regular participants from West Africa
      to Indonesia.
    description_ar: |
      توفي الشيخ محمد إلياس بن محمد إسماعيل الكاندهلوي —
      عالم سني هندي على المذهب الحنفي من تراث ديوبند،
      ومن أهل السلسلة النقشبندية المجددية، ومؤسس «جماعة
      التبليغ»، وهي حركة تجديد سني شعبية بدأت في «مَيوات»
      شمال الهند في أوائل العشرينيات الميلادية — في
      «نظام الدين» (دلهي) يوم ٢١ رجب سنة ١٣٦٣ هـ (الموافق
      ١٣ جويلية ١٩٤٤ ميلادي) عن نحو تسع وخمسين سنة. ومنهجه
      الذي قعّده في «النقاط الست» ووسّعه ابنه وخليفته
      يوسف الكاندهلوي، يستخرج عامة المسلمين من مساجدهم
      في «خروجات» مؤقتة يذكّرون فيها بعضهم بعضاً بأصول
      العقيدة والعبادات. وفي خمسين سنة صارت أكبر حركة
      دعوية سنية عابرة للحدود في القرن العشرين، تضم ملايين
      المشاركين الدوريين من غرب أفريقيا إلى إندونيسيا.
    description_fr: |
      Muḥammad Ilyās ibn Muḥammad Ismāʿīl al-Kandhlawī —
      savant sunnite indien hanafite de la tradition deobandie,
      membre de la chaîne soufie naqshbandī-mujaddidī, et
      fondateur de la Tablīghī Jamāʿat, le mouvement de
      renouveau sunnite populaire et laïc qui commença dans
      la région du Mewat dans le nord de l'Inde au début des
      années 1920 — mourut à Nizamuddin (Delhi) le 21 Rajab
      1363 H (13 juillet 1944 EC) à l'âge d'environ 59 ans.
      Sa méthode, codifiée dans les *Six Points* et élargie
      par son fils et successeur Yūsuf al-Kandhlawī, faisait
      sortir les musulmans ordinaires de leurs mosquées en
      groupes itinérants temporaires pour se rappeler les uns
      aux autres les fondements de la *ʿaqīda* et des
      *ʿibādāt*. En cinquante ans elle était devenue le plus
      grand mouvement missionnaire musulman transnational du
      XXe siècle, avec des millions de participants réguliers
      de l'Afrique de l'Ouest à l'Indonésie.
    canonical_hijri: {year: 1363, month: 7, day: 21, precision: day}
    canonical_gregorian: {date: 1944-07-13, precision: day, method: attested}
