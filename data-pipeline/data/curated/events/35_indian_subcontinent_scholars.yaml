# Wave 22 of curated event additions (2026-04-27).
# Indian-subcontinent Sunni scholars and Naqshbandi-Mujaddidi figures of the
# nineteenth and twentieth centuries — the post–Shah Walīullāh chain that
# carried Sunni hadith and Hanafi fiqh through the late Mughal collapse,
# the British Raj, and the partition era. Three categories: (i) the
# Walīullāhī tradition (Shāh ʿAbd al-ʿAzīz, Sayyid Aḥmad Shahīd); (ii) the
# Deoband school (al-Nānautwī, al-Gangohī, al-Thānawī, Maḥmūd al-Ḥasan,
# al-Madanī, Ilyās and Zakariyyā al-Kandhlawī); (iii) the Barelwī branch
# (Aḥmad Riḍā Khān) and Indian Chishtī revivalism (Ḥasan Niẓāmī,
# Manāẓir Aḥsan Gīlānī). All twelve are post-classical (post-1800) Sunni
# figures attested in modern reference works (EI2 + standard biographies);
# none are sahaba; none carry hadith refs. Trilingual en/ar/fr throughout.

