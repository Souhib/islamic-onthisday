  - slug: death-of-ahmad-rida-khan-al-bareilwi
    category: scholar
    title_en: Death of Aḥmad Riḍā Khān al-Bareilwī — Founder of the Barelwī tradition
    title_ar: وفاة أحمد رضا خان البريلوي — مؤسس المدرسة البريلوية
    title_fr: Mort d'Aḥmad Riḍā Khān al-Bareilwī — fondateur de la tradition barelwie
    description_en: |
      Aḥmad Riḍā Khān ibn Naqī ʿAlī al-Qādirī al-Bareilwī —
      Indian Sunni Hanafi jurist, head of the Qādirī Sufi
      order in his branch of the subcontinent, and the
      founding figure of the "Barelwī" school of Sunni Islam
      in South Asia, distinct from the Deobandī tradition by
      its emphasis on the metaphysical status of the Prophet
      ﷺ, the validity of intercession (*tawassul*), and the
      veneration of the Sufi saints — died at Bareilly on
      25 Ṣafar 1340 AH (28 October 1921 CE) at age 65. He
      was prolific: his *Fatāwā Riḍawiyya* in some thirty
      volumes is the largest collection of Hanafi fatwas
      assembled in modern South Asia, and his Urdu
      Qurʾān translation *Kanz al-Īmān* circulates widely.
      The movement carrying his name is one of the two
      largest Sunni traditions of the subcontinent, with
      hundreds of millions of adherents across India, Pakistan,
      Bangladesh, and the South Asian diaspora today.
    description_ar: |
      توفي الإمام أحمد رضا خان بن نقي علي القادري البريلوي —
      الفقيه السني الهندي على المذهب الحنفي، شيخ الطريقة
      القادرية في فرعه من شبه القارة، والمؤسس للمدرسة
      «البريلوية» في فقه أهل السنة بشبه القارة الهندية،
      وتختلف عن المدرسة الديوبندية في تأكيدها على المقام
      المعنوي للنبي ﷺ، ومشروعية التوسل، وإكرام أولياء
      الصوفية — ببَريلي يوم ٢٥ صفر سنة ١٣٤٠ هـ (الموافق
      ٢٨ أكتوبر ١٩٢١ ميلادي) عن خمس وستين سنة. وكان
      مكثراً في التصنيف: «الفتاوى الرضوية» في نحو ثلاثين
      مجلداً أكبر مجموعة فتاوى حنفية صُنّفت في شبه القارة
      الحديثة، وترجمته للقرآن الكريم بالأردية «كنز الإيمان»
      مما يُتداول كثيراً. والحركة التي تحمل اسمه من أكبر
      تيارين سنيين في شبه القارة الهندية، يدين بها مئات
      الملايين في الهند وباكستان وبنغلادش وشتات شبه القارة
      اليوم.
    description_fr: |
      Aḥmad Riḍā Khān ibn Naqī ʿAlī al-Qādirī al-Bareilwī —
      juriste sunnite indien hanafite, chef de l'ordre soufi
      qādirī dans sa branche du sous-continent, et figure
      fondatrice de l'école « barelwie » de l'islam sunnite
      en Asie du Sud, distincte de la tradition deobandie
      par son insistance sur le statut métaphysique du
      Prophète ﷺ, la validité de l'intercession (*tawassul*)
      et la vénération des saints soufis — mourut à Bareilly
      le 25 Ṣafar 1340 H (28 octobre 1921 EC) à l'âge de 65
      ans. Il fut prolifique : ses *Fatāwā Riḍawiyya* en
      une trentaine de volumes constituent la plus grande
      collection de fatwas hanafites compilée dans l'Asie
      du Sud moderne, et sa traduction ourdoue du Coran
      *Kanz al-Īmān* circule largement. Le mouvement qui
      porte son nom est l'une des deux plus grandes
      traditions sunnites du sous-continent, avec des
      centaines de millions d'adeptes en Inde, au Pakistan,
      au Bangladesh et dans la diaspora sud-asiatique
      aujourd'hui.
