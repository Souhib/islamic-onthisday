  - slug: death-of-muhammad-zakariyya-al-kandhlawi
    category: scholar
    title_en: Death of Muḥammad Zakariyyā al-Kandhlawī — Shaykh al-Ḥadīth
    title_ar: وفاة محمد زكريا الكاندهلوي — شيخ الحديث
    title_fr: Mort de Muḥammad Zakariyyā al-Kandhlawī — Shaykh al-Ḥadīth
    description_en: |
      Muḥammad Zakariyyā ibn Muḥammad Yaḥyā al-Kandhlawī —
      Indian-Pakistani Sunni Hanafi muḥaddith of the Deobandī
      tradition, principal teacher of hadith at the Maẓāhir
      ʿUlūm seminary at Saharanpur, nephew of Muḥammad Ilyās
      al-Kandhlawī and a senior elder of the Tablīghī
      Jamāʿat — died in Medina on Monday 1 Shaʿbān 1402 AH
      (24 May 1982 CE) at age 84 and was buried in the
      Baqīʿ. His Arabic six-volume *Awjaz al-Masālik ilā
      Muwaṭṭaʾ Mālik* — a major commentary on the Muwaṭṭaʾ
      of Imām Mālik — was widely studied across the Sunni
      world; his *Tablīghī Niṣāb* (the *Faḍāʾil aʿmāl*) became
      the canonical reading of the global Tablīghī movement
      after its compilation in the 1930s. He combined senior
      hadith scholarship with a quiet, ascetic Naqshbandī-
      Mujaddidī Sufi practice.
    description_ar: |
      توفي الشيخ محمد زكريا بن محمد يحيى الكاندهلوي —
      محدث سني هندي-باكستاني على المذهب الحنفي من تراث
      ديوبند، شيخ الحديث بمدرسة «مظاهر العلوم» بسهارنپور،
      ابن أخ الشيخ محمد إلياس الكاندهلوي، ومن كبار شيوخ
      جماعة التبليغ — بالمدينة المنورة يوم الاثنين الأول
      من شعبان سنة ١٤٠٢ هـ (الموافق ٢٤ ماي ١٩٨٢ ميلادي)
      عن أربع وثمانين سنة، ودُفن بالبقيع. وكتابه «أوجز
      المسالك إلى موطأ مالك» في ستة مجلدات بالعربية —
      شرح كبير على «الموطأ» للإمام مالك — تتدارسه عامة
      أهل السنة، ومجموعه «نصاب التبليغ» (المعروف بـ«فضائل
      أعمال») صار المتن المعتمد في حركة التبليغ العالمية
      منذ تأليفه في الثلاثينيات الميلادية. وجمع بين علو
      السند في الحديث وممارسة طريق نقشبندية مجددية في
      هدوء وزهد.
    description_fr: |
      Muḥammad Zakariyyā ibn Muḥammad Yaḥyā al-Kandhlawī —
      muḥaddith sunnite indo-pakistanais hanafite de la
      tradition deobandie, principal enseignant du hadith
      au séminaire Maẓāhir ʿUlūm de Saharanpur, neveu de
      Muḥammad Ilyās al-Kandhlawī et figure ancienne de
      la Tablīghī Jamāʿat — mourut à Médine le lundi
      1er Shaʿbān 1402 H (24 mai 1982 EC) à l'âge de 84
      ans et fut inhumé au Baqīʿ. Son *Awjaz al-Masālik ilā
      Muwaṭṭaʾ Mālik* en six volumes en arabe — commentaire
      majeur du Muwaṭṭaʾ de l'imam Mālik — fut largement
      étudié dans le monde sunnite; son *Tablīghī Niṣāb*
      (le *Faḍāʾil aʿmāl*) devint la lecture canonique du
      mouvement Tablīghī mondial après sa compilation dans
      les années 1930. Il combinait une érudition de haut
      niveau en hadith avec une pratique soufie naqshbandī-
      mujaddidī discrète et ascétique.
