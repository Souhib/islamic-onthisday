  - slug: death-of-sayyid-ahmad-shahid-barelwi
    category: scholar
    title_en: Death of Sayyid Aḥmad Shahīd Barelwī at Balakot
    title_ar: استشهاد السيد أحمد الشهيد البريلوي ببالاكوت
    title_fr: Mort de Sayyid Aḥmad Shahīd Barelwī à Balakot
    description_en: |
      Sayyid Aḥmad ibn Muḥammad ʿIrfān al-Barelwī, known after
      his death as *Shahīd* ("the martyr") — Indian Sunni
      mujāhid, student of the Walīullāhī tradition through Shāh
      ʿAbd al-ʿAzīz, leader of a movement of religious reform
      and armed resistance against the expansion of the Sikh
      kingdom of Ranjit Singh into the Pashtun frontier — was
      killed at the Battle of Balakot in the mountains of
      Mansehra on 23 Dhū al-Qaʿda 1246 AH (6 May 1831 CE)
      together with his close associate Shāh Ismāʿīl Dihlawī.
      He was about 45. The *Ṭarīqa Muḥammadiyya* movement he
      led drew on Walīullāhī teaching, on the *ḥadīth* revival
      of late-Mughal Delhi, and on the Naqshbandī-Mujaddidī
      Sufism that had circulated in the subcontinent since
      Aḥmad Sirhindī. After his death his movement endured —
      under suppression by both Sikh and British authorities —
      and shaped the political-religious imagination of Indian
      Sunni reform throughout the nineteenth century.
    description_ar: |
      استشهد السيد أحمد بن محمد عرفان البريلوي — المعروف بعد
      موته بـ«الشهيد»، وهو مجاهد سني هندي تخرج على تراث
      الشاه ولي الله من طريق الشاه عبد العزيز، قائد حركة
      جامعة بين الإصلاح الديني والمقاومة المسلحة لتوسع مملكة
      السيخ بقيادة رنجيت سينغ في حدود البشتون — في معركة
      بالاكوت بجبال «مانسيهرا» يوم ٢٣ ذي القعدة سنة ١٢٤٦ هـ
      (الموافق ٦ ماي ١٨٣١ ميلادي) ومعه صاحبه ومستشاره الشاه
      إسماعيل الدهلوي. وقد ناهز الخامسة والأربعين. وحركته
      «الطريقة المحمدية» جمعت بين تعليم الشاه ولي الله،
      وحركة الحديث في دلهي في أواخر العصر المغولي، والتصوف
      النقشبندي المجددي الذي ساد في شبه القارة منذ الإمام
      أحمد السرهندي. وبعد استشهاده استمرت الحركة — في ظل
      ملاحقة السلطات السيخية ثم البريطانية — وأثرت في الوجدان
      السياسي والديني للإصلاح السني الهندي طوال القرن التاسع
      عشر.
    description_fr: |
      Sayyid Aḥmad ibn Muḥammad ʿIrfān al-Barelwī, connu après
      sa mort sous le nom de *Shahīd* (« le martyr ») —
      mujāhid sunnite indien, élève de la tradition walīullāhī
      par Shāh ʿAbd al-ʿAzīz, chef d'un mouvement de réforme
      religieuse et de résistance armée contre l'expansion du
      royaume sikh de Ranjit Singh dans la frontière pachtoune
      — fut tué à la bataille de Balakot, dans les montagnes
      de Mansehra, le 23 Dhū al-Qaʿda 1246 H (6 mai 1831 EC),
      aux côtés de son proche compagnon Shāh Ismāʿīl Dihlawī.
      Il avait environ 45 ans. Le mouvement *Ṭarīqa
      Muḥammadiyya* qu'il dirigea puisait à la fois dans
      l'enseignement walīullāhī, dans le renouveau du hadith
      de Delhi à la fin de l'ère moghole, et dans le soufisme
      naqshbandī-mujaddidī répandu dans le sous-continent
      depuis Aḥmad Sirhindī. Après sa mort, son mouvement
      perdura — sous la répression des autorités sikhes puis
      britanniques — et façonna l'imaginaire politico-religieux
      de la réforme sunnite indienne durant tout le XIXe siècle.
