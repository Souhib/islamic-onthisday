  - slug: death-of-rashid-ahmad-al-gangohi
    category: scholar
    title_en: Death of Rashīd Aḥmad al-Gangohī — Patron of Dār al-ʿUlūm Deoband
    title_ar: وفاة رشيد أحمد الجنجوهي — راعي دار العلوم ديوبند
    title_fr: Mort de Rashīd Aḥmad al-Gangohī — patron de Dār al-ʿUlūm Deoband
    description_en: |
      Rashīd Aḥmad ibn Hidāyat Aḥmad al-Gangohī — Indian Sunni
      Hanafi jurist, the foremost ḥadīth-trained scholar of
      Deoband's first generation, and patron (*sarparast*) of
      Dār al-ʿUlūm Deoband from 1297 AH / 1880 CE following
      the death of his close companion Muḥammad Qāsim al-
      Nānautwī — died at Gangoh on Friday 8 Jumādā al-Ākhira
      1323 AH (11 August 1905 CE) at age about 76. Both his
      *Fatāwā Rashīdiyya* and his lectures on the *Sunan* of
      Abū Dāwūd became canonical references in the Deobandī
      tradition. He combined teaching of hadith and Hanafi
      fiqh with active leadership of the Naqshbandī-Mujaddidī
      Sufi tradition that the Deobandī movement carried forward;
      his successors al-Thānawī and Maḥmūd al-Ḥasan recognised
      him as the senior spiritual authority of the school's
      founding circle.
    description_ar: |
      توفي الإمام رشيد أحمد بن هداية أحمد الجنجوهي — فقيه
      الحنفية السنية الهندية، أبرز محدثي الجيل الأول من علماء
      ديوبند، وراعي «سرپرست» دار العلوم ديوبند منذ سنة
      ١٢٩٧ هـ (الموافق ١٨٨٠ ميلادي) إثر وفاة صاحبه محمد قاسم
      النانوتوي — بجنجوه يوم الجمعة ٨ جمادى الآخرة سنة
      ١٣٢٣ هـ (الموافق ١١ أوت ١٩٠٥ ميلادي) عن نحو ست
      وسبعين سنة. وصارت «الفتاوى الرشيدية» ودروسه على «سنن
      أبي داود» من المراجع المعتمدة في تراث ديوبند. جمع بين
      تدريس الحديث والفقه الحنفي وبين القيادة الفعلية للسلسلة
      النقشبندية المجددية التي حملتها الحركة الديوبندية؛
      وعدّه أتباعه الأشرف علي التهانوي ومحمود الحسن سيد
      المسلك الروحي في حلقة المؤسسين.
    description_fr: |
      Rashīd Aḥmad ibn Hidāyat Aḥmad al-Gangohī — juriste
      sunnite indien hanafite, le plus éminent savant de
      hadith de la première génération de Deoband, et patron
      (*sarparast*) de Dār al-ʿUlūm Deoband à partir de 1297 H
      / 1880 EC après la mort de son proche compagnon
      Muḥammad Qāsim al-Nānautwī — mourut à Gangoh le vendredi
      8 Jumādā al-Ākhira 1323 H (11 août 1905 EC) à l'âge
      d'environ 76 ans. Tant ses *Fatāwā Rashīdiyya* que ses
      leçons sur les *Sunan* d'Abū Dāwūd devinrent des
      références canoniques de la tradition deobandie. Il
      combinait l'enseignement du hadith et du fiqh hanafite
      avec la direction effective de la voie soufie
      naqshbandī-mujaddidī que portait le mouvement deobandi;
      ses successeurs al-Thānawī et Maḥmūd al-Ḥasan le
      reconnaissaient comme l'autorité spirituelle aînée du
      cercle fondateur de l'école.
    canonical_hijri: {year: 1323, month: 6, day: 8, precision: day}
    canonical_gregorian: {date: 1905-08-11, precision: day, method: attested}
