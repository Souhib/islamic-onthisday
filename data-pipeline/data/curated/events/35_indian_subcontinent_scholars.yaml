  - slug: death-of-husayn-ahmad-al-madani
    category: scholar
    title_en: Death of Sayyid Ḥusayn Aḥmad al-Madanī — Shaykh al-Ḥadīth of Deoband
    title_ar: وفاة السيد حسين أحمد المدني — شيخ الحديث بدار العلوم ديوبند
    title_fr: Mort de Sayyid Ḥusayn Aḥmad al-Madanī — Shaykh al-Ḥadīth de Deoband
    description_en: |
      Sayyid Ḥusayn Aḥmad al-Faiḍābādī al-Madanī — Indian Sunni
      Hanafi scholar, fifth principal and *Shaykh al-Ḥadīth*
      of Dār al-ʿUlūm Deoband for nearly three decades, and
      foremost student of Shaykh al-Hind Maḥmūd al-Ḥasan —
      died at Deoband on 13 Jumādā al-Ūlā 1377 AH (5 December
      1957 CE) at age 78. His *nisba* "al-Madanī" came from
      his early teaching career in Medina, where he taught
      hadith for nearly two decades alongside his father
      before being arrested with his teacher Maḥmūd al-Ḥasan
      and interned by the British on Malta. He was a leading
      figure in the Jamiat Ulema-e-Hind, opposed the partition
      of India on theological-jurisprudential grounds, and
      shaped Indian Sunni political thought of the late
      colonial era. His four-volume *Naqsh-i Ḥayāt* and his
      hadith dictations preserved by his students remain
      reference works in Deoband-tradition seminaries.
    description_ar: |
      توفي السيد حسين أحمد الفيض آبادي المدني — العالم السني
      الهندي على المذهب الحنفي، خامس مديري دار العلوم ديوبند
      وشيخ الحديث بها قرابة ثلاثين سنة، وأكبر تلامذة
      «شيخ الهند» محمود الحسن — بديوبند يوم ١٣ جمادى الأولى
      سنة ١٣٧٧ هـ (الموافق ٥ ديسمبر ١٩٥٧ ميلادي) عن ثمان
      وسبعين سنة. ولقبه «المدني» يعود إلى أوائل تدريسه
      بالمدينة المنورة، إذ درّس فيها الحديث قرابة عشرين سنة
      مع والده قبل أن يُعتقل مع شيخه محمود الحسن وتنفيهما
      السلطات البريطانية إلى مالطا. وكان من كبار قادة
      «جمعية علماء الهند»، اعترض على تقسيم الهند بالحجج
      الفقهية الشرعية، وشكّل الفكر السياسي السني الهندي في
      أواخر العصر الاستعماري. و«نقش حياة» في أربعة مجلدات
      وإملاءاته الحديثية التي حفظها عنه طلابه ما زالت من
      مراجع التراث الديوبندي.
    description_fr: |
      Sayyid Ḥusayn Aḥmad al-Faiḍābādī al-Madanī — savant
      sunnite indien hanafite, cinquième directeur et
      *Shaykh al-Ḥadīth* de Dār al-ʿUlūm Deoband pendant
      près de trois décennies, et principal élève de Shaykh
      al-Hind Maḥmūd al-Ḥasan — mourut à Deoband le 13
      Jumādā al-Ūlā 1377 H (5 décembre 1957 EC) à l'âge de
      78 ans. Sa *nisba* « al-Madanī » lui vient de sa
      première carrière d'enseignement à Médine, où il
      enseigna le hadith pendant près de vingt ans aux côtés
      de son père avant d'être arrêté avec son maître Maḥmūd
      al-Ḥasan et interné par les Britanniques à Malte. Il
      fut une figure de premier plan de la Jamiat Ulema-e-Hind,
      s'opposa à la partition de l'Inde sur des bases
      théologico-jurisprudentielles, et façonna la pensée
      politique sunnite indienne de la fin de l'ère coloniale.
      Son *Naqsh-i Ḥayāt* en quatre volumes et ses dictées
      de hadith préservées par ses élèves demeurent des
      références dans les séminaires de la tradition
      deobandie.
