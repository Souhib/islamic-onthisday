  - slug: death-of-khwaja-hasan-nizami
    category: scholar
    title_en: Death of Khwāja Ḥasan Niẓāmī — Chishtī Sufi-Scholar of Delhi
    title_ar: وفاة الخواجة حسن نظامي — صوفي العارف الدلهوي على مشرب الجشتية
    title_fr: Mort de Khwāja Ḥasan Niẓāmī — soufi-savant Chishtī de Delhi
    description_en: |
      Khwāja Ḥasan Niẓāmī Dehlawī — Indian Sunni Sufi-scholar
      and writer in the Chishtī tradition descending from
      Niẓām al-Dīn Awliyāʾ of Delhi, and one of the most
      widely read Urdu prose writers of the early twentieth
      century — died at Delhi on 10 Dhū al-Ḥijja 1374 AH
      (31 July 1955 CE) at age 77. He authored more than a
      hundred works of biography, devotional prose, and
      narrative history including a multi-volume study of
      the 1857 Delhi rebellion and a major biography of his
      pīr Ghulām Ḥasan Shāh Niẓāmī. He was custodian (*sajjāda
      nashīn*) of the dargāh of Niẓām al-Dīn Awliyāʾ and
      maintained an active correspondence and publication
      programme that connected the classical Chishtī
      devotional tradition to the modern Urdu reading public.
    description_ar: |
      توفي الخواجة حسن نظامي الدهلوي — العارف السني الهندي
      من ساحة الطريقة الجشتية، نسبةً إلى نظام الدين أولياء
      بدلهي، ومن أكثر كتاب النثر بالأردية انتشاراً في
      أوائل القرن العشرين — بدلهي يوم ١٠ ذي الحجة سنة
      ١٣٧٤ هـ (الموافق ٣١ جويلية ١٩٥٥ ميلادي) عن سبع
      وسبعين سنة. وله ما يزيد على مئة مصنف بين السير
      والنثر العرفاني والتاريخ السردي، منها دراسة في عدة
      مجلدات لثورة دلهي سنة ١٢٧٤ هـ وسيرة موسعة لشيخه
      غلام حسن شاه نظامي. وكان «سجادة نشين» (متولي) ضريح
      نظام الدين أولياء، وأقام منهاجاً نشطاً من المراسلات
      والنشر يصل التراث العرفاني الجشتي الكلاسيكي بقراء
      الأردية الحديثة.
    description_fr: |
      Khwāja Ḥasan Niẓāmī Dehlawī — soufi-savant et écrivain
      sunnite indien dans la tradition chishtīe descendant
      de Niẓām al-Dīn Awliyāʾ de Delhi, et l'un des écrivains
      ourdous en prose les plus lus du début du XXe siècle —
      mourut à Delhi le 10 Dhū al-Ḥijja 1374 H (31 juillet
      1955 EC) à l'âge de 77 ans. Il composa plus d'une
      centaine d'ouvrages de biographie, de prose dévotionnelle
      et d'histoire narrative, dont une étude en plusieurs
      volumes de la révolte de Delhi de 1857 et une grande
      biographie de son *pīr* Ghulām Ḥasan Shāh Niẓāmī. Il
      fut le gardien (*sajjāda nashīn*) du *dargāh* de Niẓām
      al-Dīn Awliyāʾ et entretint un programme actif de
      correspondance et de publication qui reliait la tradition
      dévotionnelle chishtīe classique au public lettré
      ourdou moderne.
