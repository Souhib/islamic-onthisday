  # =========================================================================

  - slug: death-of-shah-abd-al-aziz-al-dihlawi
    category: scholar
    title_en: Death of Shāh ʿAbd al-ʿAzīz al-Dihlawī — Successor of Shāh Walīullāh
    title_ar: وفاة الشاه عبد العزيز الدهلوي — خليفة الشاه ولي الله
    title_fr: Mort de Shāh ʿAbd al-ʿAzīz al-Dihlawī — successeur de Shāh Walīullāh
    description_en: |
      Shāh ʿAbd al-ʿAzīz ibn Aḥmad al-Dihlawī — eldest son of Shāh
      Walīullāh of Delhi and the central figure of the Walīullāhī
      tradition in the generation after his father — died at Delhi
      on 7 Shawwāl 1239 AH (5 June 1824 CE) during the reign of
      the late Mughal emperor Akbar Shah II. He was about 78. His
      multi-volume *Tafsīr-i ʿAzīzī*, *Tuḥfa Ithnā ʿAshariyya*
      (a major Sunni response to Twelver Shia theology), and his
      collected fatwas circulated across the subcontinent and
      defined Sunni scholarly orthodoxy in late-Mughal Delhi. He
      taught the principal figures of the Indian Hadith revival
      who would in turn shape both the Deoband and Barelwī
      traditions; his ruling that British India had ceased to be
      *dār al-Islām* — formulated as the political realities of
      the Company's expansion became unavoidable — would echo
      through every nineteenth-century South Asian reform
      movement.
    description_ar: |
      توفي الشاه عبد العزيز بن أحمد الدهلوي — الابن الأكبر للشاه
      ولي الله الدهلوي، وكبير حاملي علمه في الجيل التالي له —
      بدلهي يوم ٧ شوال سنة ١٢٣٩ هـ (الموافق ٥ جوان ١٨٢٤
      ميلادي) في عهد آخر سلاطين المغول الإمبراطور أكبر شاه
      الثاني. وقد ناهز الثامنة والسبعين. وكتب «تفسير عزيزي»
      في عدة مجلدات و«تحفة اثنا عشرية» (وهو من أكبر الردود
      السنية على الكلام الإمامي الإثنا عشري) ومجموع فتاويه
      تداولتها مدارس شبه القارة الهندية وقعّدت العقيدة السنية
      المعتمدة في دلهي المغولية المتأخرة. وعلى يديه تخرّج كبار
      رجال الحركة الحديثية الهندية الذين أسسوا لاحقاً المدرستين
      الديوبندية والبريلوية؛ وفتواه الشهيرة بأن الهند البريطانية
      خرجت عن كونها «دار إسلام» — صدرت حين صار توسّع شركة
      الهند الشرقية واقعاً لا مفرّ منه — ظلّت مرجعاً لكل حركات
      الإصلاح في شبه القارة في القرن التاسع عشر.
    description_fr: |
      Shāh ʿAbd al-ʿAzīz ibn Aḥmad al-Dihlawī — fils aîné de
      Shāh Walīullāh de Delhi et figure centrale de la tradition
      walīullāhī dans la génération suivant son père — mourut
      à Delhi le 7 Shawwāl 1239 H (5 juin 1824 EC) sous le règne
      du dernier empereur moghol Akbar Shāh II. Il avait environ
      78 ans. Son *Tafsīr-i ʿAzīzī* en plusieurs volumes, sa
      *Tuḥfa Ithnā ʿAshariyya* (réponse sunnite majeure à la
      théologie chiite duodécimaine) et ses fatwas recueillies
      circulèrent à travers tout le sous-continent et définirent
      l'orthodoxie savante sunnite dans le Delhi mogholo-tardif.
      Il forma les principales figures du renouveau du hadith
      indien qui façonneraient à leur tour les traditions
      deobandie et barelwie; sa fatwa déclarant que l'Inde
      britannique avait cessé d'être *dār al-Islām* — formulée
      lorsque l'expansion de la Compagnie devint une réalité
      incontournable — résonnerait à travers tous les mouvements
      réformateurs sud-asiatiques du XIXe siècle.
