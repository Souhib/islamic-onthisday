  - slug: death-of-muhammad-qasim-al-nanautwi
    category: scholar
    title_en: Death of Muḥammad Qāsim al-Nānautwī — Founder of Dār al-ʿUlūm Deoband
    title_ar: وفاة محمد قاسم النانوتوي — مؤسس دار العلوم ديوبند
    title_fr: Mort de Muḥammad Qāsim al-Nānautwī — fondateur de Dār al-ʿUlūm Deoband
    description_en: |
      Muḥammad Qāsim ibn Asad al-Nānautwī — Indian Sunni Hanafi
      scholar of the Walīullāhī chain, principal founder of
      Dār al-ʿUlūm Deoband (established 1283 AH / 1866 CE),
      and theological architect of what would become the
      "Deobandī" school of Sunni Islam in South Asia — died
      at Deoband on 4 Jumādā al-Ūlā 1297 AH (15 April 1880 CE)
      at age about 47. He had taken hadith and Sunni-Sufi
      training from Mamlūk ʿAlī Nānautwī and from the senior
      hadith-master ʿAbd al-Ghanī al-Mujaddidī al-Dihlawī, who
      tied him into the Naqshbandī-Mujaddidī chain. His
      *Taqrīr-i Dilpaẕīr* and *Ḥujjat al-Islām* defended Sunni
      orthodoxy against both the Christian missions of the
      Raj and the rationalist apologetics emerging at Aligarh.
      The seminary he founded grew into the largest Hanafi
      training centre in the Sunni world, with thousands of
      affiliated madrasas across South Asia, Britain, and the
      Gulf to the present day.
    description_ar: |
      توفي الإمام محمد قاسم بن أسد النانوتوي — العالم السني
      الهندي على المذهب الحنفي، حامل التراث الولي اللهي،
      المؤسس الأول لدار العلوم ديوبند (افتُتحت سنة ١٢٨٣ هـ
      الموافق ١٨٦٦ ميلادي)، والمهندس الكلامي للمدرسة التي
      ستُعرف بـ«الديوبندية» في فقه أهل السنة بشبه القارة
      الهندية — بديوبند يوم ٤ جمادى الأولى سنة ١٢٩٧ هـ
      (الموافق ١٥ أفريل ١٨٨٠ ميلادي) عن نحو سبع وأربعين سنة.
      وأخذ الحديث والتصوف السني عن مملوك علي النانوتوي وعن
      كبير المحدثين عبد الغني المجددي الدهلوي الذي وصله
      بسلسلة الطريقة النقشبندية المجددية. وقد دافع في
      «تقرير دلپذير» و«حجة الإسلام» عن العقيدة السنية في
      وجه الدعوات النصرانية في عصر الراج وفي وجه
      التأويلات العقلانية في كلية عليكره. وتحولت دار العلوم
      ديوبند إلى أكبر مدرسة للعلوم الحنفية في العالم
      السني، تتبعها آلاف المدارس في شبه القارة وبريطانيا
      والخليج إلى يومنا هذا.
    description_fr: |
      Muḥammad Qāsim ibn Asad al-Nānautwī — savant sunnite
      indien hanafite issu de la chaîne walīullāhī, fondateur
      principal de Dār al-ʿUlūm Deoband (établie en 1283 H /
      1866 EC), et architecte théologique de ce qui deviendrait
      l'école « deobandie » de l'islam sunnite en Asie du Sud
      — mourut à Deoband le 4 Jumādā al-Ūlā 1297 H (15 avril
      1880 EC) à l'âge d'environ 47 ans. Il avait reçu sa
      formation en hadith et en soufisme sunnite auprès de
      Mamlūk ʿAlī Nānautwī et du maître muḥaddith ʿAbd al-Ghanī
      al-Mujaddidī al-Dihlawī, qui le rattacha à la chaîne
      naqshbandī-mujaddidī. Ses *Taqrīr-i Dilpaẕīr* et *Ḥujjat
      al-Islām* défendirent l'orthodoxie sunnite à la fois
      contre les missions chrétiennes du Raj et contre
      l'apologétique rationaliste émergeant à Aligarh. Le
      séminaire qu'il fonda devint le plus grand centre de
      formation hanafite du monde sunnite, avec des milliers
      de madrasas affiliées à travers l'Asie du Sud, la
      Grande-Bretagne et le Golfe jusqu'à nos jours.
