        notes: "Encyclopaedia of Islam, 2nd ed., 'Selīm II', 'Sinān', 'Edirne' — completion 982 AH."
      - source_key: editorial
        notes: "Tezkiretü'l-Bünyân (Saʾi Mustafa Çelebi) — Sinān's üstadlık eserim attribution to Selimiye."
