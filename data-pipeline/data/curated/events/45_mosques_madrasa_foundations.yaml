  - slug: founding-of-nizamiyya-baghdad
    category: madrasa_founding
    title_en: Founding of the Niẓāmiyya Madrasa of Baghdad
    title_ar: تأسيس المدرسة النظامية ببغداد
    title_fr: Fondation de la madrasa Niẓāmiyya de Bagdad
    description_en: |
      Niẓām al-Mulk al-Ṭūsī, vizier of the Saljūq sultans Alp Arslān
      and Malik-Shāh, inaugurated the Madrasa al-Niẓāmiyya on the east
      bank of the Tigris in Baghdad — the largest of his network of
      crown-funded Shāfiʿī-Ashʿarī teaching colleges (the Niẓāmiyyāt)
      established across the Saljūq realm. The Baghdad foundation,
      with stipended professorial chairs and student lodgings, set
      the template that the madrasa institution would follow across
      the Islamic world. Its most famous teacher, Imām Abū Ḥāmid
      al-Ghazālī, accepted the chief chair from 484 AH; the Niẓāmiyya
      remained the most prestigious teaching mosque of the Sunni
      east until the Mongol sack of Baghdad (656 AH).
    description_ar: |
      افتتح نظام الملك الطوسي — وزير السلطانين السلجوقيين ألب أرسلان
      وملك شاه — المدرسة النظامية على الضفة الشرقية لدجلة ببغداد، وهي
      أعظم مدارس شبكته من المدارس الشافعية الأشعرية الموقوفة على
      نفقة الديوان (النظاميات) التي أسسها في أنحاء الدولة السلجوقية.
      وأرست النظامية البغدادية — بكراسي تدريس مرتّبة الراتب وأروقة
      للطلاب — الإطار الذي ستسير عليه مؤسسة المدرسة في عموم العالم
      الإسلامي. وأشهر من تولّى التدريس فيها الإمام أبو حامد الغزالي،
      تصدّر للكرسي الأكبر من سنة 484 هـ. وظلّت النظامية أرقى مدارس
      المشرق السني إلى سقوط بغداد في يد المغول سنة 656 هـ.
    description_fr: |
      Niẓām al-Mulk al-Ṭūsī, vizir des sultans saljūqides Alp Arslān
      et Malik-Shāh, inaugura la madrasa al-Niẓāmiyya sur la rive
      orientale du Tigre à Bagdad — la plus grande de son réseau de
      collèges shāfiʿites-ashʿarites enseignants subventionnés par
      la couronne (les Niẓāmiyyāt) fondés à travers le royaume
      saljūqide. La fondation de Bagdad, dotée de chaires
      professorales rétribuées et de logements étudiants, fixa le
      modèle que l'institution de la madrasa suivrait à travers le
      monde islamique. Son enseignant le plus célèbre, l'imām Abū
      Ḥāmid al-Ghazālī, accepta la chaire principale en 484 AH; la
      Niẓāmiyya demeura la mosquée d'enseignement la plus
      prestigieuse de l'Orient sunnite jusqu'au sac de Bagdad par
      les Mongols (656 AH).
    canonical_hijri: {year: 459, month: 11, precision: month}
    canonical_gregorian: {date: 1067-09-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil — opening of the Niẓāmiyya in Dhu al-Qaʿda 459 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr, al-Bidāya — Niẓām al-Mulk's foundation and Ghazālī's appointment."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān, Wafayāt — biography of Niẓām al-Mulk and the madrasa endowment."
    people: [[nizam-al-mulk, founder]]
    tags: [saljuq, madrasa, baghdad, shafii, ashari, ghazali, madrasa_founding]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Nizamiyya"

  - slug: founding-of-mustansiriyya
    category: madrasa_founding
    title_en: Inauguration of the Mustanṣiriyya Madrasa of Baghdad
    title_ar: افتتاح المدرسة المستنصرية ببغداد
    title_fr: Inauguration de la madrasa Mustanṣiriyya de Bagdad
    description_en: |
      The Abbasid caliph al-Mustanṣir billāh inaugurated the Madrasa
      al-Mustanṣiriyya on the east bank of the Tigris, the first madrasa
      in Islamic history to teach simultaneously the four Sunni schools
      of jurisprudence (Ḥanafī, Mālikī, Shāfiʿī, Ḥanbalī) under a single
      endowment, alongside Qurʾanic studies, ḥadīth, medicine, and
      mathematics. Built between 625 and 631 AH at colossal expense and
      opened with a celebrated banquet at which the caliph distributed
      tens of thousands of dīnārs in alms and stipends, it housed
      lodgings for hundreds of students, a library, a hospital, and a
      bath. The brick-and-stone building still stands today on the
      Tigris embankment, the largest medieval madrasa in the Islamic
      world to survive substantially intact.
    description_ar: |
      افتتح الخليفة العباسي المستنصر بالله المدرسة المستنصرية على الضفة
      الشرقية لدجلة، وهي أول مدرسة في تاريخ الإسلام تجمع تدريس المذاهب
      السنية الأربعة (الحنفي والمالكي والشافعي والحنبلي) في وقف واحد، مع
      علوم القرآن والحديث والطب والرياضيات. بُنيت بين سنتي 625 و631 هـ
      بنفقات هائلة، وافتُتحت بحفل مشهور وزّع فيه الخليفة عشرات الآلاف من
      الدنانير صدقاتٍ ورواتب، وضمّت مساكن لمئات الطلاب ومكتبة ومارستاناً
      وحمّاماً. ولا يزال البناء الآجرّيّ الحجريّ قائماً على شاطئ دجلة إلى
      اليوم، وهو أعظم مدرسة قروسطية باقية في العالم الإسلامي على هيئتها
      الأصلية إلى حدّ كبير.
    description_fr: |
      Le calife abbāsside al-Mustanṣir bi-Llāh inaugura la madrasa
      al-Mustanṣiriyya sur la rive orientale du Tigre — la première
      madrasa de l'histoire islamique à enseigner simultanément les
      quatre écoles juridiques sunnites (ḥanafī, mālikī, shāfiʿī,
      ḥanbalī) sous une même fondation pieuse, à côté des sciences
      coraniques, du ḥadīth, de la médecine et des mathématiques. Bâtie
      entre 625 et 631 AH à grands frais et inaugurée par un banquet
      fameux où le calife distribua des dizaines de milliers de dīnārs
      en aumônes et stipendiums, elle abritait des logements pour des
      centaines d'étudiants, une bibliothèque, un hôpital et un bain.
      Le bâtiment en briques et pierre se dresse encore aujourd'hui
      sur la berge du Tigre, la plus grande madrasa médiévale du monde
      islamique à avoir subsisté substantiellement intacte.
    canonical_hijri: {year: 631, month: 7, precision: month}
