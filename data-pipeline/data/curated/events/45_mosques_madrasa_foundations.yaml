  - slug: completion-of-sultan-ahmed-mosque
    category: building_completion
    title_en: Completion of the Sulṭān Aḥmed (Blue) Mosque in Istanbul
    title_ar: إتمام جامع السلطان أحمد (الجامع الأزرق) بإسطنبول
    title_fr: Achèvement de la mosquée Sulṭān Aḥmed (Mosquée Bleue) à Istanbul
    description_en: |
      Sultan Aḥmed I inaugurated the imperial mosque named for him on
      the Hippodrome opposite Hagia Sophia, the last great selātīn
      mosque of the Ottoman capital before the eighteenth-century
      shift toward baroque idiom. Designed by Sinān's pupil Sedefkâr
      Meḥmed Agha, the building marries the Sinānian central-dome
      idiom with six minarets — a feature that stirred contemporary
      controversy as Mecca's Masjid al-Ḥarām then had only six,
      resolved when the sultan financed an additional minaret at the
      Sacred Mosque. The interior wall surfaces are clad in over
      twenty thousand İznik tiles in cobalt and turquoise — the
      "blue" of the mosque's later European name. The complex
      includes a madrasa, hospital, soup kitchen and the sultan's
      domed tomb.
    description_ar: |
      افتتح السلطان أحمد الأول جامعه السلطاني الكبير على ميدان «الفروم»
      مقابل آيا صوفيا، وهو آخر الجوامع السلاطين الكبرى في عاصمة العثمانيين
      قبل التحوّل إلى الأسلوب الباروكي في القرن الثاني عشر الهجري. صمّمه
      تلميذ سنان «صدفكار محمد آغا» جامعاً بين أسلوب القبة المركزية
      السنانية وست مآذن — وهو أمر أثار جدلاً في زمنه إذ كان للمسجد
      الحرام بمكة آنذاك ست مآذن فقط، وحُسم الأمر بأن موّل السلطان
      مئذنة سابعة للمسجد الحرام. وتُكسى جدرانه الداخلية بأكثر من
      عشرين ألف بلاطة من قاشاني إزنيق بلونيّ الكوبالت والفيروزي — وهو
      «الأزرق» الذي اشتُهر به اسم الجامع في الأوروبية لاحقاً. ويضمّ
      مجمّعه مدرسة ومارستاناً وتكية إطعام وقبة ضريح السلطان.
    description_fr: |
      Le sultan Aḥmed Ier inaugura la mosquée impériale qui porte son
      nom sur l'Hippodrome face à Sainte-Sophie, la dernière grande
      mosquée selāṭīn de la capitale ottomane avant la bascule vers
      l'idiome baroque au XVIIIe siècle. Conçu par l'élève de Sinān,
      Sedefkâr Meḥmed Agha, l'édifice marie l'idiome sinānien à dôme
      central avec six minarets — singularité qui souleva la
      controverse à l'époque, la mosquée al-Ḥarām de La Mecque n'en
      ayant alors que six — résolue quand le sultan finança un
      septième minaret pour le Sanctuaire. Les parois intérieures
      sont revêtues de plus de vingt mille carreaux d'İznik bleu
      cobalt et turquoise — le « bleu » du nom européen ultérieur de
      la mosquée. Le complexe comprend une madrasa, un hôpital, un
      réfectoire de soupe populaire et le tombeau à coupole du sultan.
    canonical_hijri: {year: 1026, precision: year}
    canonical_gregorian: {date: 1617-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Encyclopaedia of Islam, 2nd ed., 'Aḥmed I' and 'Istanbul' — Sultan Ahmed mosque dedication 1026 AH."
      - source_key: editorial
        notes: "Ottoman court historian Mustafa Saʾi recorded the seven-year construction (1018-1026 AH)."
    people: [[ahmed-i-ottoman, founder]]
    tags: [ottoman, mosque, istanbul, blue-mosque, iznik, building_completion]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Sultan_Ahmed_Mosque"

