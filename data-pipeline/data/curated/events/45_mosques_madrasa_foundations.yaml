# Wave: foundations and completions of major mosques and madrasas
# across Islamic history (Umayyad through modern). Each event is
# attested in classical Sunni sources (Ibn al-Athīr, Ibn Kathīr,
# al-Dhahabī, Ibn Khallikān) and/or modern academic reference
# (Encyclopaedia of Islam, 2nd ed.) for the post-Mamlūk Ottoman
# and modern entries that lie beyond the classical chronicle horizon.
# Trilingual (en/ar/fr).

events:
  # =========================================================================
  # UMAYYAD AND ABBASID
  # =========================================================================

  - slug: aqsa-rebuilding-walid-i
    category: building_completion
    title_en: Caliph al-Walīd I Rebuilds al-Masjid al-Aqṣā
    title_ar: إعادة الوليد بن عبد الملك بناء المسجد الأقصى
    title_fr: Reconstruction d'al-Masjid al-Aqṣā par le calife al-Walīd Ier
    description_en: |
      The Umayyad caliph al-Walīd ibn ʿAbd al-Malik completed the
      monumental rebuilding of al-Masjid al-Aqṣā at the southern end
      of the Noble Sanctuary in Jerusalem, replacing his father ʿAbd
      al-Malik's earlier wooden structure with a stone congregational
      mosque covered by a great timber-and-lead dome over the central
      nave. The project complemented the Dome of the Rock (completed
      72 AH) and the new Umayyad Mosque of Damascus, marking the
      Umayyad investment in monumental religious architecture across
      the central provinces. The mosque has been damaged and rebuilt
      several times since; the current standing structure preserves
      the al-Walīd plan in its general aisle disposition.
    description_ar: |
      أتمّ الخليفة الأموي الوليد بن عبد الملك إعادة بناء المسجد الأقصى
      في الجهة الجنوبية من الحرم القدسي الشريف بالقدس، فاستبدل بمنشأة
      الخشب التي بناها أبوه عبد الملك جامعاً حجرياً واسعاً تتوّجه قبّة
      كبيرة من الخشب والرصاص فوق صحن المسجد. وكان هذا المشروع مكمّلاً
      لقبّة الصخرة (التي اكتمل بناؤها سنة 72 هـ) والجامع الأموي بدمشق،
      شاهداً على عناية الأمويين بالعمارة الدينية الفخمة في الأقاليم
      المركزية. وقد تعرّض المسجد لأضرار وأُعيد بناؤه مراراً منذ ذلك
      الحين؛ ويحتفظ البناء القائم اليوم بتخطيط أروقة الوليد في خطوطه
      العامة.
    description_fr: |
      Le calife omeyyade al-Walīd ibn ʿAbd al-Malik acheva la
      reconstruction monumentale d'al-Masjid al-Aqṣā à l'extrémité
      sud du Noble Sanctuaire de Jérusalem, remplaçant la structure
      en bois antérieure érigée par son père ʿAbd al-Malik par une
      mosquée congrégationnelle en pierre couverte d'un grand dôme
      en bois et plomb sur la nef centrale. Le chantier complétait
      le Dôme du Rocher (achevé en 72 AH) et la nouvelle Grande
      Mosquée des Omeyyades de Damas, attestant l'investissement
      omeyyade dans l'architecture religieuse monumentale à travers
      les provinces centrales. La mosquée a été endommagée et
      reconstruite à plusieurs reprises depuis; l'édifice actuel
      conserve la disposition générale des nefs du plan d'al-Walīd.
    canonical_hijri: {year: 96, precision: year}
    canonical_gregorian: {date: 715-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil — Umayyad construction works under al-Walīd I."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr, al-Bidāya wa-l-Nihāya — al-Walīd's al-Aqṣā rebuilding alongside the Damascus mosque."
      - source_key: ei2
        notes: "Encyclopaedia of Islam, 2nd ed., 'al-Masdjid al-Aḳṣā' — Umayyad phase summary."
    people: [[al-walid-i, leader]]
    tags: [umayyad, mosque, aqsa, jerusalem, building_completion]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Aqsa_Mosque"

  - slug: mosque-of-ibn-tulun-completed
    category: mosque_founding
    title_en: Completion of the Mosque of Ibn Ṭūlūn in Cairo
    title_ar: إتمام جامع ابن طولون بالقاهرة
    title_fr: Achèvement de la mosquée d'Ibn Ṭūlūn au Caire
    description_en: |
      Aḥmad ibn Ṭūlūn, Abbasid governor of Egypt who founded an
      autonomous Ṭūlūnid emirate, completed the great congregational
      mosque he had begun three years earlier on the rocky hill of
      Yashkur, on the northeast outskirts of his new capital al-Qaṭāʾiʿ
      (north of al-Fusṭāṭ). The mosque — built almost entirely of red
      brick faced with carved stucco, around an open courtyard with a
      celebrated spiral minaret loosely modelled on al-Mutawakkil's
      Sāmarrāʾ minaret — is the oldest mosque in Egypt to survive in
      its original form, and the third-oldest extant mosque in the
      Islamic world. Its dedication inscription, dated 4 Ramaḍān 265,
      remains in situ.
    description_ar: |
      أتمّ أحمد بن طولون — والي مصر العباسي ومؤسس الإمارة الطولونية
      المستقلة — جامعه الكبير الذي بدأ بناءه قبل ثلاث سنوات على جبل
      يَشكُر شمال شرق عاصمته الجديدة «القطائع» (شمال الفسطاط). وقد
      بُني الجامع كله تقريباً من الآجرّ الأحمر المكسوّ بالجصّ المنقوش،
      حول صحن مكشوف، تشرف عليه مئذنة حلزونية شهيرة مستوحاة من مئذنة
      جامع المتوكّل بسامراء. وهو أقدم مسجد في مصر باقٍ على هيئته
      الأصلية، وثالث أقدم مسجد قائم في العالم الإسلامي. ولا تزال
      كتابة تأسيسه المؤرّخة بـ٤ رمضان 265 هـ محفوظة في موضعها.
    description_fr: |
      Aḥmad ibn Ṭūlūn, gouverneur abbāsside d'Égypte qui fonda un
      émirat ṭūlūnide autonome, acheva la grande mosquée
      congrégationnelle qu'il avait commencée trois ans plus tôt sur
      la colline rocheuse de Yashkur, à la lisière nord-est de sa
      nouvelle capitale al-Qaṭāʾiʿ (au nord d'al-Fusṭāṭ). La mosquée —
      bâtie presque entièrement en briques rouges revêtues de stuc
      sculpté, autour d'une cour ouverte dominée par un célèbre
      minaret hélicoïdal librement inspiré de celui de Sāmarrāʾ
      d'al-Mutawakkil — est la plus ancienne mosquée d'Égypte
      conservée dans sa forme originelle, et la troisième plus
      ancienne mosquée subsistant dans le monde islamique. Son
      inscription de fondation datée du 4 Ramaḍān 265 demeure in situ.
    canonical_hijri: {year: 265, month: 9, precision: month}
    canonical_gregorian: {date: 879-05-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Ibn Khallikān, Wafayāt al-Aʿyān — biography of Aḥmad ibn Ṭūlūn, mention of the mosque."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr, al-Bidāya — completion of the mosque dated to 265 AH."
      - source_key: ei2
        notes: "Encyclopaedia of Islam, 2nd ed., 'Ibn Ṭūlūn, Aḥmad' and 'Masdjid' — confirmed inscription on site."
    people: [[ibn-tulun, founder]]
    tags: [abbasid, tulunid, mosque, cairo, egypt, mosque_founding]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Mosque_of_Ibn_Tulun"

  - slug: qayrawan-expansion-ziyadat-allah
    category: building_completion
    title_en: Aghlabid Reconstruction of the Great Mosque of al-Qayrawān
    title_ar: إعادة الأغالبة بناء جامع القيروان الكبير
    title_fr: Reconstruction aghlabide de la Grande Mosquée de Kairouan
    description_en: |
      Ziyādat Allāh I, Aghlabid amīr of Ifrīqiya under Abbasid suzerainty,
      ordered a complete demolition and rebuilding of the Great Mosque of
      al-Qayrawān (Jāmiʿ ʿUqba), founded by ʿUqba ibn Nāfiʿ in 50 AH and
      twice rebuilt under earlier Umayyad and Abbasid governors. The new
      building established the form preserved to this day: a massive
      hypostyle prayer hall of seventeen aisles supported by spolia
      columns, a wide tiled courtyard, the celebrated three-tiered square
      minaret (the oldest standing minaret in the Islamic world), and the
      rectangular plan that became the prototype of Maghrebi mosque
      architecture. Later Aghlabid expansions under Abū Ibrāhīm Aḥmad
      (248 AH) added the famous miḥrāb tiles and minbar.
    description_ar: |
      أمر زيادة الله الأول — أمير الأغالبة بإفريقية تحت السيادة العباسية —
      بهدم جامع القيروان الكبير (جامع عقبة) — الذي أسسه عقبة بن نافع سنة
      50 هـ وأُعيد بناؤه مرّتين على عهد ولاة الأمويين والعباسيين قبله —
      وإعادة بنائه كاملاً. وأرسى البناء الجديد الصورة الباقية إلى اليوم:
      بيت صلاة شاسع مغطّى تحمله سبعة عشر بلاطاً من الأعمدة الرومية
      المعاد استعمالها، وصحن واسع مرصوف بالبلاط، والمئذنة المربعة
      الشهيرة بطوابقها الثلاثة (أقدم مئذنة قائمة في العالم الإسلامي)،
      والتخطيط المستطيل الذي صار النموذج الأصل لعمارة مساجد المغرب.
      وأضافت توسعات الأغالبة لاحقاً في عهد أبي إبراهيم أحمد (248 هـ)
      بلاط المحراب الشهير والمنبر.
    description_fr: |
      Ziyādat Allāh Ier, amīr aghlabide de l'Ifrīqiya sous suzeraineté
      abbāsside, ordonna la démolition complète et la reconstruction
      de la Grande Mosquée de Kairouan (Jāmiʿ ʿUqba), fondée par
      ʿUqba ibn Nāfiʿ en 50 AH et déjà deux fois rebâtie sous les
      gouverneurs omeyyades et abbāssides antérieurs. Le nouveau
      bâtiment fixa la forme conservée jusqu'à aujourd'hui : une
      salle de prière hypostyle massive à dix-sept nefs portée par
      des colonnes de remploi, une vaste cour pavée, le célèbre
      minaret carré à trois étages (le plus ancien minaret subsistant
      dans le monde islamique) et le plan rectangulaire qui devint
      le prototype de l'architecture des mosquées maghrébines. Les
      agrandissements aghlabides ultérieurs sous Abū Ibrāhīm Aḥmad
      (248 AH) ajoutèrent les célèbres carreaux du miḥrāb et le minbar.
    canonical_hijri: {year: 221, precision: year}
    canonical_gregorian: {date: 836-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil — Aghlabid building works in Ifrīqiya."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr, al-Bidāya — Ziyādat Allāh I's reconstruction of the Qayrawān mosque."
      - source_key: ei2
        notes: "Encyclopaedia of Islam, 2nd ed., 'al-Ḳayrawān' and 'Aghlabids' — architectural phases."
    tags: [aghlabid, mosque, qayrawan, ifriqiya, maghreb, building_completion]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Mosque_of_Uqba"

  - slug: founding-of-bab-al-mardum-toledo
    category: mosque_founding
    title_en: Founding of Bāb al-Mardūm Mosque in Toledo
    title_ar: تأسيس مسجد باب المردوم بطليطلة
    title_fr: Fondation de la mosquée de Bāb al-Mardūm à Tolède
    description_en: |
      A small private oratory was built in the upper-town quarter near the
      Bāb al-Mardūm gate of Ṭulayṭula (Toledo), under the late Umayyad
      caliphate of Cordoba. Its dated foundation inscription — preserved
      in carved brick on the façade and naming the patron Aḥmad ibn
      Ḥadīdī, his master-builder Mūsā ibn ʿAlī, and the date in the month
      of Muḥarram 390 — survives in situ and is the only legibly dated
      Andalusī mosque inscription of its century. The four-by-four
      nine-bay scheme with nine small ribbed domes makes it one of the
      earliest fully-preserved Andalusī mosques and a key witness to
      Cordoban miniature architecture before the Christian reconquest of
      Toledo in 478 AH (1085 CE).
    description_ar: |
      شُيِّد مسجد صغير خاص في الحيّ الأعلى من طليطلة قرب «باب المردوم» في
      أواخر عصر الخلافة الأموية بقرطبة. ولا تزال كتابة تأسيسه المؤرّخة —
      المنقوشة بالآجرّ على واجهته، وفيها اسم الباني أحمد بن حديدي ومعلّمه
      موسى بن علي، وتاريخها في شهر محرم سنة 390 هـ — قائمة في موضعها،
      وهي النقش المؤسس الوحيد المؤرّخ المقروء في الأندلس من قرنها. أمّا
      التخطيط المربع الذي ينقسم إلى تسع وحدات تعلوها تسع قبيبات مضلّعة،
      فيجعله من أقدم مساجد الأندلس الباقية كاملةً، وشاهداً مهماً على
      العمارة القرطبية المصغّرة قبل سقوط طليطلة بأيدي القشتاليين سنة
      478 هـ.
    description_fr: |
      Un petit oratoire privé fut bâti dans le quartier haut de Ṭulayṭula
      (Tolède), près de la porte de Bāb al-Mardūm, à la fin du califat
      omeyyade de Cordoue. Son inscription de fondation datée — gravée
      en briques sur la façade, mentionnant le commanditaire Aḥmad ibn
      Ḥadīdī, son maître d'œuvre Mūsā ibn ʿAlī et la date au mois de
      Muḥarram 390 — subsiste in situ et constitue la seule inscription
      lisiblement datée d'une mosquée andalouse de son siècle. Le plan
      à neuf travées en trois fois trois, surmonté de neuf petites
      coupoles nervurées, en fait l'une des plus anciennes mosquées
      andalouses intégralement préservées et un témoin essentiel de
      l'architecture cordouane miniaturisée avant la reconquête
      chrétienne de Tolède en 478 AH (1085 EC).
    canonical_hijri: {year: 390, month: 1, precision: month}
    canonical_gregorian: {date: 999-12-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Encyclopaedia of Islam, 2nd ed., 'Ṭulayṭula' and 'Masdjid' — foundation inscription analysis."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr, al-Kāmil — late Umayyad Andalusī building activity."
    tags: [andalus, umayyad-cordoba, mosque, toledo, mosque_founding]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Mosque_of_Cristo_de_la_Luz"

