  - slug: rebuilding-of-mosque-of-djenne
    category: building_completion
    title_en: Rebuilding of the Great Mosque of Djenné
    title_ar: إعادة بناء الجامع الكبير بجنّي
    title_fr: Reconstruction de la Grande Mosquée de Djenné
    description_en: |
      The community of Djenné, in the inland Niger delta of present-day
      Mali, completed the rebuilding of their Great Mosque in mud-brick
      banco on the foundations of the thirteenth-century original
      attributed to the Sultan Kunburu, which had been allowed to
      decay during the nineteenth-century Tukulor reforms. The
      reconstruction — supervised by the master-mason guild of Djenné
      and partly subsidised by the French colonial administration of
      the Soudan Français — preserves the indigenous Sudano-Sahelian
      style, with its three minarets, projecting toron beams of
      palmwood, and yearly ritual replastering by the entire town
      after the rains. It is the largest mud-brick building in the
      world and was inscribed on the UNESCO World Heritage List with
      the Old Towns of Djenné in 1988.
    description_ar: |
      أتمّ أهل بلدة جنّي في دلتا النيجر الداخلية بمالي اليوم إعادة بناء
      جامعهم الكبير بالطوب الطيني (البَنكو) على أساسات الجامع الأصلي
      المنسوب إلى السلطان «كنبورو» في القرن السابع الهجري، الذي
      أُهمل في عصر الإصلاحات التيكولورية في القرن الثالث عشر الهجري
      حتى تداعى. وأشرف على البناء الجديد عرفاء البنّائين بجنّي
      بإعانة جزئية من الإدارة الاستعمارية الفرنسية للسودان الفرنسي،
      محافظاً على الأسلوب السوداني الساحلي الأصيل بمآذنه الثلاث وعوارض
      «التورون» الناتئة من جذوع النخل، وعادة إعادة تطيينه السنوية
      بعد المطر يشترك فيها أهل البلدة كلهم. وهو أكبر بناء طيني في
      العالم، وأُدرج في قائمة اليونسكو للتراث العالمي ضمن «المدن
      العتيقة لجنّي» سنة 1988 ميلادي.
    description_fr: |
      La communauté de Djenné, dans le delta intérieur du Niger
      au Mali actuel, acheva la reconstruction de sa Grande Mosquée
      en briques crues (banco) sur les fondations de l'édifice
      original du XIIIe siècle attribué au sultan Kunburu, qu'on
      avait laissé dépérir durant les réformes toucouleurs du XIXe
      siècle. La reconstruction — supervisée par la corporation des
      maîtres-maçons de Djenné et partiellement subventionnée par
      l'administration coloniale française du Soudan français —
      préserve le style soudano-sahélien autochtone, avec ses trois
      minarets, les poutres saillantes (toron) en bois de palmier,
      et le crépissage rituel annuel auquel participe toute la ville
      après les pluies. C'est le plus grand bâtiment en briques crues
      au monde, inscrit au Patrimoine mondial de l'UNESCO avec les
      « Villes anciennes de Djenné » en 1988.
    canonical_hijri: {year: 1325, precision: year}
    canonical_gregorian: {date: 1907-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Encyclopaedia of Islam, 2nd ed., 'Djenne' and 'Mali' — 1907 reconstruction date."
      - source_key: editorial
        notes: "UNESCO World Heritage dossier (Old Towns of Djenne, 1988) confirms 1907 reconstruction."
    tags: [west-africa, mali, mosque, djenne, sudano-sahelian, building_completion, unesco]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Great_Mosque_of_Djenn%C3%A9"
