  - slug: completion-of-bayezid-ii-mosque
    category: building_completion
    title_en: Completion of the Bāyezīd II Mosque in Istanbul
    title_ar: إتمام جامع بايزيد الثاني بإسطنبول
    title_fr: Achèvement de la mosquée Bāyezīd II à Istanbul
    description_en: |
      Sultan Bāyezīd II ibn Meḥmed al-Fātiḥ inaugurated the great
      imperial mosque named for him on the heights of the old Forum
      Tauri in central Istanbul, completing the second selātīn (royal)
      mosque of the Ottoman capital after the Conqueror's Fātiḥ
      Mosque. The architect ʿAlāʾ al-Dīn (sometimes attributed in
      later Ottoman tradition to Yaʿqūb-Shāh ibn Sulṭān-Shāh) developed
      the Hagia-Sophia-derived central-dome plan that the imperial
      Ottoman tradition would refine through Süleymaniye and Selimiye —
      a great central dome carried on four piers, flanked by two
      semi-domes and a courtyard with a fountain. The mosque sits at
      the centre of a large külliye including a soup kitchen,
      hospital, primary school, madrasa, and the sultan's tomb.
    description_ar: |
      افتتح السلطان بايزيد الثاني بن محمد الفاتح جامعه السلطاني الكبير
      على هضبة الفروم القديم في وسط إسطنبول، وبه أتمّ ثاني جامع سلطاني
      في العاصمة العثمانية بعد جامع الفاتح. وطوّر المعمار علاء الدين —
      وتنسبه التقاليد العثمانية المتأخرة أحياناً إلى يعقوب شاه بن سلطان
      شاه — مخططَ القبة المركزية المستوحى من آيا صوفيا، الذي ستهذّبه
      التقاليد العثمانية الإمبراطورية لاحقاً في السليمانية والسليمية:
      قبة مركزية كبرى تحملها أربع دعائم تكتنفها قبتان نصفيتان، مع صحن
      وفسقية. ويتوسط الجامع كُلّيّة كبيرة تشمل تكية إطعام ومارستاناً
      ومكتباً ومدرسة وضريح السلطان.
    description_fr: |
      Le sultan Bāyezīd II ibn Meḥmed al-Fātiḥ inaugura la grande
      mosquée impériale qui porte son nom sur les hauteurs de l'ancien
      Forum Tauri au centre d'Istanbul, achevant ainsi la deuxième
      mosquée selāṭīn (royale) de la capitale ottomane après la
      mosquée Fātiḥ du Conquérant. L'architecte ʿAlāʾ al-Dīn —
      parfois attribué dans la tradition ottomane plus tardive à
      Yaʿqūb-Shāh ibn Sulṭān-Shāh — développa le plan à dôme central
      d'inspiration sainte-sophienne que la tradition ottomane
      impériale raffinerait ensuite à travers la Süleymaniye et la
      Selimiye : un grand dôme central porté par quatre piliers,
      flanqué de deux demi-coupoles, avec une cour et une fontaine.
      La mosquée occupe le centre d'une vaste külliye comprenant un
      réfectoire, un hôpital, une école primaire, une madrasa et le
      tombeau du sultan.
    canonical_hijri: {year: 911, precision: year}
    canonical_gregorian: {date: 1505-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Encyclopaedia of Islam, 2nd ed., 'Bāyezīd II' and 'Istanbul' — dedication date 911 AH."
      - source_key: editorial
        notes: "Ottoman court chronicles (e.g. Ibn Kemāl, Tevārīh-i Āl-i ʿOsmān) confirm the dedication year."
