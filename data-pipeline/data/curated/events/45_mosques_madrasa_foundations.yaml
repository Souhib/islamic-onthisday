  - slug: completion-of-sehzade-mosque
    category: building_completion
    title_en: Completion of the Şehzade Mosque in Istanbul
    title_ar: إتمام جامع الشهزاده بإسطنبول
    title_fr: Achèvement de la mosquée Şehzade à Istanbul
    description_en: |
      Sultan Süleymān al-Qānūnī inaugurated the great commemorative
      mosque on the Old City's third hill in memory of his eldest son
      and intended successor, Şehzāde Meḥmed, who had died of
      smallpox at twenty-two in 950 AH. It is the first major imperial
      commission of the chief Ottoman architect Mimār Sinān, then
      newly appointed to the post he would hold for fifty years.
      Sinān himself called it "the work of my apprenticeship" — its
      symmetrical four-half-dome plan covering a square central bay
      establishing the geometric idiom he would perfect in
      Süleymaniye and Selimiye. The Şehzāde tomb beside the mosque
      is the most decorative tile-clad tomb chamber of the Ottoman
      classical age.
    description_ar: |
      افتتح السلطان سليمان القانوني جامع «الشهزاده» الكبير على التلّ
      الثالث من المدينة العتيقة بإسطنبول إحياءً لذكرى ابنه الأكبر وولي
      عهده الشهزاده محمد الذي توفي بالجدري وله اثنان وعشرون عاماً سنة
      950 هـ. وهو أول مشروع سلطاني كبير من تكليفات معمار سنان كبير
      المعماريين العثمانيين، الذي عُيّن للتوّ في المنصب الذي سيشغله
      خمسين سنة. ووصف سنان نفسه هذا الجامع بأنه «عمل تتلمذي»؛ وأرسى
      تخطيطه الرباعي المتناظر بأربع قبيبات نصفية تكتنف قبةً مركزيةً
      مربّعةً البنيةَ الهندسيةَ التي سيُحكمها لاحقاً في السليمانية
      والسليمية. ويعدّ ضريح الشهزاده الملاصق للجامع أبدع مقابر
      الكاشي في عصر العثمانيين الكلاسيكي.
    description_fr: |
      Le sultan Süleymān al-Qānūnī inaugura la grande mosquée
      commémorative sur la troisième colline de la vieille ville en
      mémoire de son fils aîné et héritier présomptif, le şehzāde
      Meḥmed, mort de la variole à vingt-deux ans en 950 AH. Il
      s'agit de la première grande commande impériale du chef-
      architecte ottoman Mimār Sinān, alors nouvellement nommé au
      poste qu'il occuperait pendant cinquante ans. Sinān lui-même
      qualifia cet édifice d'« œuvre de mon apprentissage » : son
      plan symétrique à quatre demi-coupoles couvrant une travée
      centrale carrée fixa l'idiome géométrique qu'il porterait à
      perfection dans la Süleymaniye et la Selimiye. Le tombeau du
      şehzāde adjacent est la plus richement carrelée des chambres
      funéraires de l'âge classique ottoman.
    canonical_hijri: {year: 955, precision: year}
    canonical_gregorian: {date: 1548-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Encyclopaedia of Islam, 2nd ed., 'Sinān' and 'Süleymān I' — Şehzāde Mehmed memorial mosque dedicated 955 AH."
      - source_key: editorial
        notes: "Sinān's autobiography (Tezkiretü'l-Bünyân, Saʾi Mustafa Çelebi) confirms 'work of my apprenticeship'."
    people: [[suleyman-the-magnificent, founder], [mimar-sinan, architect]]
