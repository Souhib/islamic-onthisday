  - slug: completion-of-sultan-hasan-mosque-madrasa
    category: building_completion
    title_en: Completion of the Mosque-Madrasa of Sulṭān Ḥasan in Cairo
    title_ar: إتمام مسجد ومدرسة السلطان حسن بالقاهرة
    title_fr: Achèvement de la mosquée-madrasa du sultan Ḥasan au Caire
    description_en: |
      The Baḥrī Mamlūk sultan al-Nāṣir Ḥasan ibn Muḥammad ibn Qalāwūn
      completed the great cruciform mosque-madrasa-mausoleum complex
      named for him at the foot of the Citadel of Cairo, after seven
      years of construction that exhausted the treasury and reportedly
      cost a thousand dīnārs per day. The building combines a Friday
      mosque, four madrasas (one for each Sunni school of law), a
      Qurʾan school, and a domed funerary chamber within a single
      stone envelope rising 38 m above its courtyard, topped by what
      were the tallest minarets in the Islamic world at their
      completion. Sulṭān Ḥasan was assassinated three years before
      the dedication of his own tomb chamber, which therefore holds
      his sons rather than himself.
    description_ar: |
      أتمّ السلطان المملوكي البحري الناصر حسن بن محمد بن قلاوون مجمعه
      الكبير تحت قلعة القاهرة — جامعاً ومدرسةً وضريحاً متصالباً يحمل اسمه —
      بعد سبع سنوات من البناء أنهكت بيت المال، حتى نُقل أن نفقاته بلغت
      ألف دينار في اليوم. ويجمع البناء بين جامع الجمعة وأربع مدارس
      (واحدة لكل مذهب من المذاهب السنية الأربعة) وكتّاب لتعليم القرآن
      وحجرة دفنية ذات قبة، كله ضمن كتلة حجرية واحدة ترتفع نحو ثمانية
      وثلاثين متراً فوق صحنها، تعلوها مئذنتان كانتا حين إتمامهما الأطول
      في العالم الإسلامي. وقد اغتيل السلطان حسن قبل تكريس قاعة دفنه
      بثلاث سنوات، فدُفن فيها ابناه بدلاً منه.
    description_fr: |
      Le sultan mamelouk baḥrī al-Nāṣir Ḥasan ibn Muḥammad ibn Qalāwūn
      acheva, au pied de la citadelle du Caire, le grand complexe
      mosquée-madrasa-mausolée cruciforme qui porte son nom, après
      sept années de chantier qui épuisèrent le trésor et coûtèrent,
      rapporte-t-on, mille dīnārs par jour. L'édifice associe une
      mosquée congrégationnelle, quatre madrasas (une pour chacune des
      écoles juridiques sunnites), une école coranique et une chambre
      funéraire à coupole dans une enveloppe de pierre unique
      s'élevant à 38 m au-dessus de la cour, couronnée par ce qui
      étaient les plus hauts minarets du monde islamique à leur
      achèvement. Le sultan Ḥasan fut assassiné trois ans avant la
      consécration de sa propre chambre funéraire, qui abrite ainsi
      ses fils plutôt que lui.
    canonical_hijri: {year: 764, precision: year}
    canonical_gregorian: {date: 1363-01-01, precision: year, method: tabular_conversion}
