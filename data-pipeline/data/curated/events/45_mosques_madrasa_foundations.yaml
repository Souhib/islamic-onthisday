  - slug: completion-of-suleymaniye-mosque
    category: building_completion
    title_en: Completion of the Süleymaniye Mosque in Istanbul
    title_ar: إتمام جامع السليمانية بإسطنبول
    title_fr: Achèvement de la mosquée Süleymaniye à Istanbul
    description_en: |
      Sultan Süleymān al-Qānūnī (Süleymān the Magnificent) inaugurated
      the imperial Süleymaniye Mosque on the third hill of Istanbul
      after seven years of construction directed by his chief
      architect, Mimār Sinān. The mosque is the centre of a vast
      külliye comprising four madrasas (one per Sunni school of law),
      a medical school, a hospital, a soup kitchen, a Qurʾanic school
      and the tombs of the sultan and Hürrem Sulṭān. Its 53-metre
      central dome — supported on four piers and flanked by two
      semi-domes — is Sinān's mature realisation of the Hagia-Sophia
      tradition adapted to the Ottoman idiom, and the building is
      almost universally regarded as one of the high points of
      Islamic architecture.
    description_ar: |
      افتتح السلطان سليمان القانوني جامع السليمانية السلطاني على التلّ
      الثالث من إسطنبول بعد سبع سنوات من البناء أشرف عليها كبير
      معمارييه معمار سنان. والجامع مركز كُلّيّة عظمى تشمل أربع مدارس
      (واحدة لكل مذهب من المذاهب السنية) ومدرسة للطب ومارستاناً
      وتكية للإطعام ومكتب تحفيظ القرآن وضريحَي السلطان وزوجته «خرّم
      سلطان». وتُعدّ قبته المركزية البالغ ارتفاعها ثلاثة وخمسين متراً —
      المحمولة على أربع دعائم تحيط بها قبتان نصفيتان — تتويجاً ناضجاً
      لتراث آيا صوفيا الذي طوّعه سنان للأسلوب العثماني، ويُعدّ البناء
      بالإجماع من أعظم آثار العمارة الإسلامية.
    description_fr: |
      Le sultan Süleymān al-Qānūnī (Soliman le Magnifique) inaugura la
      mosquée impériale de la Süleymaniye sur la troisième colline
      d'Istanbul après sept années de travaux dirigés par son
      architecte en chef Mimār Sinān. La mosquée est le cœur d'une
      vaste külliye comprenant quatre madrasas (une pour chacune des
      écoles juridiques sunnites), une école de médecine, un hôpital,
      un réfectoire de soupe populaire, une école coranique et les
      tombeaux du sultan et de Hürrem Sulṭān. Son dôme central de 53 m
      — porté par quatre piliers et flanqué de deux demi-coupoles —
      est l'aboutissement mûr par Sinān de la tradition de Sainte-
      Sophie adaptée à l'idiome ottoman, et l'édifice est presque
      universellement tenu pour l'un des sommets de l'architecture
      islamique.
    canonical_hijri: {year: 964, precision: year}
    canonical_gregorian: {date: 1557-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Encyclopaedia of Islam, 2nd ed., 'Süleymān I', 'Sinān', 'Istanbul' — dedication 964 AH / 1557 CE."
      - source_key: editorial
        notes: "Tezkiretü'l-Bünyân (Saʾi Mustafa Çelebi) records seven years of construction completed Jumādā I 964."
    people: [[suleyman-the-magnificent, founder], [mimar-sinan, architect]]
    tags: [ottoman, mosque, istanbul, sinan, kulliye, building_completion]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/S%C3%BCleymaniye_Mosque"

  - slug: completion-of-selimiye-mosque
    category: building_completion
    title_en: Completion of the Selimiye Mosque in Edirne
    title_ar: إتمام جامع السليمية بأدرنة
    title_fr: Achèvement de la mosquée Selimiye à Edirne
    description_en: |
      Sultan Selīm II inaugurated the imperial Selimiye Mosque in
      Edirne, the work that Mimār Sinān — then in his eighties —
      regarded as his masterwork (üstadlık eserim, "the work of my
      mastery"). Sinān's central dome of 31.3 m diameter rests on
      eight piers within an octagonal supporting frame rather than
      the traditional four piers, achieving an interior space free
      of obstructing supports — and surpassing, by Sinān's own
      claim, the dome of Hagia Sophia in span. The mosque occupies
      the centre of a külliye including a madrasa, ḥadīth school,
      and bazaar; the four 70 m minarets articulate the silhouette
      of Edirne to this day. UNESCO designated the complex a World
      Heritage Site in 2011.
    description_ar: |
      افتتح السلطان سليم الثاني جامع السليمية السلطاني بأدرنة، وهو
      العمل الذي اعتبره معمار سنان — في الثمانينات من عمره — تحفته
      الكبرى («استادليك أثري» أي عمل احترافي). وتقوم قبة سنان المركزية
      البالغ قطرها واحداً وثلاثين متراً وثلاثة أعشار على ثماني دعائم
      ضمن إطار مثمن داعم لا على الأربع التقليدية، ففازت بفضاء داخلي
      خالٍ من الأعمدة العائقة، وفاقت — بحسب ادّعاء سنان نفسه — قبة آيا
      صوفيا في الاتساع. ويتوسط الجامع كُلّيّة تضمّ مدرسة ودار حديث
      وسوقاً؛ وما زالت مآذنه الأربع البالغ ارتفاعها سبعين متراً ترسم
      أفق أدرنة إلى اليوم. وأدرجت اليونسكو المجمع في قائمة التراث
      العالمي سنة 2011 ميلادي.
    description_fr: |
      Le sultan Selīm II inaugura la mosquée impériale Selimiye
      d'Edirne, l'œuvre que Mimār Sinān — alors octogénaire — tenait
      pour son chef-d'œuvre (üstadlık eserim, « l'œuvre de ma
      maîtrise »). Le dôme central de Sinān de 31,3 m de diamètre
      repose sur huit piliers dans un cadre porteur octogonal plutôt
      que sur les quatre piliers traditionnels, libérant un espace
      intérieur sans supports gênants — et surpassant, selon
      l'affirmation de Sinān lui-même, le dôme de Sainte-Sophie en
      portée. La mosquée occupe le centre d'une külliye comprenant
      une madrasa, une école de ḥadīth et un bazar; les quatre
      minarets de 70 m articulent encore aujourd'hui la silhouette
      d'Edirne. L'UNESCO a inscrit le complexe au Patrimoine mondial
      en 2011.
    canonical_hijri: {year: 982, precision: year}
    canonical_gregorian: {date: 1575-01-01, precision: year, method: tabular_conversion}
