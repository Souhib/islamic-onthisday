  - slug: founding-of-qutb-minar-quwwat-al-islam
    category: mosque_founding
    title_en: Founding of the Quwwat al-Islām Mosque and Quṭb Minār
    title_ar: تأسيس مسجد قوّة الإسلام ومنار قطب الدين
    title_fr: Fondation de la mosquée Quwwat al-Islām et du Quṭb Minār
    description_en: |
      Quṭb al-Dīn Aybak — slave-general of Muʿizz al-Dīn Muḥammad
      Ghūrī after the Second Battle of Tarāʾin (588 AH) and effective
      ruler of the new Ghurid territories in north India — laid the
      foundations of the Quwwat al-Islām ("might of Islam") mosque on
      the Lal Kot citadel of Delhi, the first congregational mosque
      built on Indian soil. Construction reused spolia from earlier
      Hindu and Jain temples on the site (a fact noted in the Persian
      foundation inscription itself). Aybak began the towering Quṭb
      Minār beside it as a victory tower and call-to-prayer minaret;
      successive Delhi-Sultanate rulers (Iltutmish, Fīrūz Shāh
      Tughluq) added the upper storeys, bringing it to 72.5 m — the
      tallest brick minaret in the world. The complex inaugurated
      Indo-Islamic architectural tradition.
    description_ar: |
      وضع قطب الدين أيبك — قائد معز الدين محمد الغوري المملوك بعد معركة
      طرائن الثانية سنة 588 هـ والحاكم الفعلي لأقاليم الغوريين الجديدة
      في شمال الهند — أساسات جامع «قوّة الإسلام» في حصن لال كوت بدلهي،
      أول جامع للجمعة يُبنى على أرض الهند. واستعمل البناء أعمدة وحجارة
      من معابد هندوسية وجاينية سابقة في الموقع (أمر يثبته نقش التأسيس
      الفارسي ذاته). وبدأ أيبك إلى جانبه بناء «منار قطب» الشامخ برجَ
      نصرٍ ومئذنةَ أذان؛ وأكمل الطبقات العلوية لاحقاً سلاطين دلهي
      المتعاقبون (إلتُتمش، وفيروز شاه التغلقي)، فبلغ ارتفاعه نحو
      اثنين وسبعين مترًا ونصف، أعلى مئذنة آجريّة في العالم. وافتتح هذا
      المجمّع تقاليد العمارة الإسلامية الهندية.
    description_fr: |
      Quṭb al-Dīn Aybak — général-esclave de Muʿizz al-Dīn Muḥammad
      Ghūrī après la seconde bataille de Tarāʾin (588 AH) et maître
      effectif des nouveaux territoires ghurides du nord de l'Inde —
      posa les fondations de la mosquée Quwwat al-Islām (« la
      puissance de l'Islam ») sur la citadelle de Lal Kot à Delhi, la
      première mosquée congrégationnelle bâtie sur le sol indien. La
      construction réemploya des éléments de temples hindous et jaïns
      antérieurs sur le site (fait que l'inscription de fondation en
      persan reconnaît elle-même). Aybak entama à côté la haute tour
      du Quṭb Minār à la fois tour de victoire et minaret d'appel à
      la prière; les sultans de Delhi successifs (Iltutmish, Fīrūz
      Shāh Tughluq) ajoutèrent les étages supérieurs, la portant à
      72,5 m — le plus haut minaret en briques du monde. Le complexe
      inaugura la tradition architecturale indo-islamique.
    canonical_hijri: {year: 587, precision: year}
    canonical_gregorian: {date: 1192-01-01, precision: year, method: tabular_conversion}
    claims:
