# Additional Sahaba deaths, mostly year-precision from Ibn Sa'd's Tabaqat
# and al-Dhahabi's Siyar A'lam al-Nubala'.

events:
  - slug: death-of-abu-ayyub-al-ansari
    category: umayyad
    title_en: Death of Abu Ayyub al-Ansari at the Walls of Constantinople
    title_ar: وفاة أبي أيوب الأنصاري
    title_fr: Décès d'Abū Ayyūb al-Anṣārī aux murailles de Constantinople
    description_en: |
      The Ansari Companion (ra) who hosted the Prophet ﷺ at the Hijra
      when he arrived at Madinah — his house was where the Prophet ﷺ
      stayed until the Masjid an-Nabawi and his own quarters were built.
      In extreme old age he joined the Arab siege of Constantinople under
      Mu'awiya's son Yazid and was buried at the walls of the city per
      his own request — a tomb venerated there ever since and rediscovered
      in 857/1453 by Mehmed II's teacher Aq Shams al-Din during the
      Ottoman conquest.
    description_ar: |
      الصحابي الأنصاري الذي استضاف النبي ﷺ في الهجرة حين قَدم المدينة —
      ففي بيته أقام النبي ﷺ حتى بُني المسجد النبوي وحُجَره. وفي شيخوخته
      المتقدّمة شارك في حصار العرب للقسطنطينية تحت إمرة يزيد بن معاوية،
      ودُفن عند أسوار المدينة بناءً على وصيته — قبرٌ ظلّ معظَّماً منذ
      ذلك الحين، وأعاد اكتشافه آق شمس الدين شيخ السلطان محمد الفاتح في
      فتح القسطنطينية سنة 857 هـ / 1453 م.
    description_fr: |
      Le Compagnon ansarite (ra) qui accueillit le Prophète ﷺ lors de
      l'Hégire à son arrivée à Médine — c'est dans sa maison que le
      Prophète ﷺ demeura jusqu'à la construction de la mosquée du
      Prophète et de ses propres appartements. Très âgé, il rejoignit
      le siège arabe de Constantinople sous Yazīd, fils de Muʿāwiya, et
      fut inhumé aux murailles de la ville selon son propre souhait —
      tombeau vénéré depuis et redécouvert en 857/1453 par Aq Shams
      al-Dīn, maître de Mehmed II, lors de la conquête ottomane.
    canonical_hijri: {year: 52, precision: year}
    canonical_gregorian: {date: 672-08-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Abu_Ayyub_al-Ansari
    people: [[abu-ayyub-al-ansari, died]]
    tags: [umayyad, sahabi, constantinople, istanbul]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-sad-ibn-abi-waqqas
    category: umayyad
    title_en: Death of Sa'd ibn Abi Waqqas — Last of the Ten Given Glad Tidings
    title_ar: وفاة سعد بن أبي وقاص
    title_fr: Décès de Saʿd ibn Abī Waqqāṣ — dernier des Dix annoncés au Paradis
    description_en: |
      The conqueror of Iraq — commander at al-Qadisiyya (15 AH) and
      founder of al-Kufa — and the last to pass away of the ten Companions
      (ra) given explicit glad tidings of Paradise during their lifetime
      (al-'Ashara al-Mubashshirun). He died at his estate outside Madinah
      in his eighties, and was carried to be buried in the Baqi' cemetery.
    description_ar: |
      فاتح العراق — قائد المسلمين في القادسية سنة 15 هـ ومُؤسّس الكوفة —
      وآخر من توفي من العشرة المبشّرين بالجنة (ra) من الصحابة الذين بُشّروا
      بها صراحةً في حياتهم. توفي في ضيعته خارج المدينة وقد جاوز الثمانين،
      وحُمل ليُدفن في مقبرة البقيع.
    description_fr: |
      Le conquérant de l'Irak — commandant à al-Qādisiyya (15 H) et
      fondateur de al-Kūfa — et le dernier à s'éteindre parmi les dix
      Compagnons (ra) à qui le Paradis fut explicitement annoncé de
      leur vivant (al-ʿAshara al-Mubashsharūn). Il mourut dans son
      domaine en dehors de Médine, octogénaire, et fut porté pour être
      inhumé dans le cimetière al-Baqīʿ.
    canonical_hijri: {year: 55, precision: year}
    canonical_gregorian: {date: 675-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Sa%27d_ibn_Abi_Waqqas
    people: [[sad-ibn-abi-waqqas, died]]
