  - slug: death-of-abu-ubayda
    category: rashidun
    title_en: Death of Abu 'Ubayda ibn al-Jarrah — Amin al-Umma
    title_ar: وفاة أبي عبيدة بن الجراح
    title_fr: Décès d'Abū ʿUbayda ibn al-Jarrāḥ — Amīn al-Umma
    description_en: |
      Commander of the Muslim forces in Syria after the recall of Khalid
      ibn al-Walid (ra), conqueror of much of the Levant. The Prophet ﷺ
      had titled him "the Trustee of this Umma" (Amin al-Umma). He also
      died in the plague of Amwas alongside Mu'adh ibn Jabal (ra) and
      others. He was among the ten given glad tidings of Paradise.
    description_ar: |
      قائد الجيش الإسلامي بالشام بعد عزل خالد بن الوليد (ra)، وفاتح كثيرٍ
      من أرض الشام. لقّبه النبي ﷺ بـ"أمين هذه الأمّة". توفي بطاعون عمواس
      مع معاذ بن جبل (ra) وغيره من الصحابة (ra). وهو من العشرة المبشّرين
      بالجنة.
    description_fr: |
      Commandant des forces musulmanes en Syrie après le rappel de
      Khālid ibn al-Walīd (ra), conquérant d'une grande partie du
      Levant. Le Prophète ﷺ l'avait surnommé "le Dépositaire de cette
      Umma" (Amīn al-Umma). Il mourut lui aussi lors de la peste
      d'ʿAmwās, aux côtés de Muʿādh ibn Jabal (ra) et d'autres
      Compagnons. Il fait partie des dix à qui le Paradis fut annoncé.
    canonical_hijri: {year: 18, precision: year}
    canonical_gregorian: {date: 639-02-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
