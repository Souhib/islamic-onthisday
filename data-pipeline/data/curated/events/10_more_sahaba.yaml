  - slug: death-of-abu-hurayra
    category: umayyad
    title_en: Death of Abu Hurayra
    title_ar: وفاة أبي هريرة
    title_fr: Décès d'Abū Hurayra
    description_en: |
      The most prolific hadith narrator in Islam — 5,374 hadiths are
      recorded from him. He came to Madinah in the year of Khaybar (7 AH)
      and from then until the Prophet's ﷺ death he was constantly in his
      ﷺ company, specifically prioritising that companionship over all
      else. The kunya "Abu Hurayra" (father of the little cat) was given
      by the Prophet ﷺ himself for the kitten he kept. Died in Madinah
      and was buried at al-Baqi'.
    description_ar: |
      أكثر الصحابة (ra) رواية للحديث في الإسلام — رُوي عنه نحو خمسة آلاف
      وثلاثمئة وأربعة وسبعين حديثاً. قَدم المدينةَ عامَ خيبر سنة 7 هـ،
      ولزم النبيَّ ﷺ منذ ذلك الحين حتى وفاته، مُؤثراً صحبته ﷺ على ما سواها.
      وكنيتُه "أبو هريرة" أطلقها عليه النبي ﷺ نفسه من أجل هرّةٍ صغيرة كان
      يحملها. توفي بالمدينة ودُفن بالبقيع.
    description_fr: |
      Le plus prolifique des transmetteurs de hadith en Islam — environ
      cinq mille trois cent soixante-quatorze hadiths furent rapportés
      de lui. Il vint à Médine l'année de Khaybar (7 H) et, dès lors et
      jusqu'à la mort du Prophète ﷺ, il fut constamment en sa compagnie,
      privilégiant cette compagnie sur toute autre chose. La kunya
      "Abū Hurayra" (père du chaton) lui fut donnée par le Prophète ﷺ
      lui-même, pour le chaton qu'il portait. Décédé à Médine et inhumé
      à al-Baqīʿ.
    canonical_hijri: {year: 59, precision: year}
    canonical_gregorian: {date: 679-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Abu_Hurairah
    people: [[abu-hurayra, died]]
    tags: [umayyad, sahabi, muhaddith, madinah]
    importance: major
