  - slug: death-of-ibn-abbas
    category: umayyad
    title_en: Death of 'Abdullah ibn 'Abbas — Habr al-Umma
    title_ar: وفاة عبد الله بن عباس
    title_fr: Décès de ʿAbdullāh ibn ʿAbbās — Ḥabr al-Umma
    description_en: |
      The Prophet's ﷺ cousin (son of his uncle al-'Abbas) and the foremost
      exegete (mufassir) among the Companions (ra), titled "Habr al-Umma" —
      the learned of the community. The Prophet ﷺ placed his hand on his
      head and prayed: "O Allah, teach him the Book and give him
      understanding of the religion." Approximately 1,660 hadiths are
      recorded from him. He died at Ta'if and is buried there.
    description_ar: |
      ابنُ عمّ النبي ﷺ (ابن عمّه العباس) وأوّل المفسرين من الصحابة (ra)،
      الملقّب بـ"حَبر الأمّة" — عالمها. وضع النبي ﷺ يده على رأسه ودعا له:
      "اللهمّ علّمه الكتاب وفقّهه في الدين". رُوي عنه نحو ألف وستمئة وستين
      حديثاً. توفي بالطائف ودُفن بها.
    description_fr: |
      Le cousin du Prophète ﷺ (fils de son oncle al-ʿAbbās) et le
      premier exégète (mufassir) parmi les Compagnons (ra), surnommé
      "Ḥabr al-Umma" — le savant de la communauté. Le Prophète ﷺ posa
      sa main sur sa tête et invoqua : "Ô Allāh, enseigne-lui le Livre
      et donne-lui la compréhension de la religion." Environ mille six
      cent soixante hadiths furent rapportés de lui. Il mourut à al-Ṭāʾif
      et y est inhumé.
    canonical_hijri: {year: 68, precision: year}
    canonical_gregorian: {date: 687-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Abdullah_ibn_Abbas
    people: [[abdullah-ibn-abbas, died]]
    tags: [umayyad, sahabi, mufassir, tafsir, taif]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-ibn-umar
    category: umayyad
    title_en: Death of 'Abdullah ibn 'Umar
    title_ar: وفاة عبد الله بن عمر
    title_fr: Décès de ʿAbdullāh ibn ʿUmar
    description_en: |
      Son of Caliph 'Umar (ra) and among the most scrupulous of the
      Companions (ra) in following the Prophet ﷺ — it was said of him:
      "No one followed the practice of the Prophet ﷺ more exactly than
      Ibn 'Umar." He narrated 2,630 hadiths and was a central figure of
      the Madinan scholarly circle into the late first century. He
      refused to take sides in the civil wars after Ali's (ra) death and
      died in Makkah at about 84.
    description_ar: |
      ابنُ الخليفة عمر (ra)، ومن أشدّ الصحابة (ra) تحرّياً لاتّباع سنّة
      النبي ﷺ — قِيل فيه: "ما تبع أحدٌ سنّةَ النبي ﷺ كما تبعَها ابنُ عمر".
      رَوى ألفينِ وستمئةً وثلاثين حديثاً، وكان عَلماً من أعلام الحلقة
      العلمية بالمدينة إلى أواخر القرن الأول. أبى الانحياز إلى أيٍّ من
      طرفَي الفتنة بعد مقتل عليّ (ra)، وتوفي بمكة وعمرُه نحو أربعٍ
      وثمانين.
    description_fr: |
      Fils du calife ʿUmar (ra) et parmi les plus scrupuleux des
      Compagnons (ra) dans le suivi du Prophète ﷺ — il fut dit de lui :
      "Nul n'a suivi la pratique du Prophète ﷺ plus exactement qu'Ibn
      ʿUmar." Il rapporta deux mille six cent trente hadiths et fut une
      figure centrale du cercle savant médinois jusqu'à la fin du
      premier siècle. Il refusa de prendre parti dans les guerres
      civiles après la mort de ʿAlī (ra) et mourut à La Mecque âgé
      d'environ quatre-vingt-quatre ans.
    canonical_hijri: {year: 73, precision: year}
    canonical_gregorian: {date: 693-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Abdullah_ibn_Umar
    people: [[abdullah-ibn-umar, died]]
    tags: [umayyad, sahabi, muhaddith, makkah]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-ibn-masud
    category: rashidun
    title_en: Death of 'Abdullah ibn Mas'ud
    title_ar: وفاة عبد الله بن مسعود
    title_fr: Décès de ʿAbdullāh ibn Masʿūd
    description_en: |
      The first of the Companions (ra) to recite the Qur'an openly in the
      Haram of Makkah — for which the Quraysh beat him, and to which he
      famously returned the next day. The Prophet ﷺ designated him among
      the four he named as best to learn Qur'an from: "Take the Qur'an
      from four: 'Abdullah ibn Mas'ud, Salim (mawla of Abu Hudhayfa),
      Mu'adh ibn Jabal, and Ubayy ibn Ka'b." He taught the Qur'an in
      Kufa for years before his return to Madinah, where he died and was
      buried at al-Baqi'.
    description_ar: |
      أوّل من جهر بالقرآن في حرم مكّة من الصحابة (ra) — فضربتهُ قريش، فعاد
      من الغد يجهر به مرّةً أخرى. وقد أدرجه النبي ﷺ ضمن أربعةٍ أمر بأخذ
      القرآن عنهم، فقال: "خُذوا القرآنَ من أربعة: عبد الله بن مسعود،
      وسالم مولى أبي حذيفة، ومعاذ بن جبل، وأبي بن كعب". علّم القرآن في
      الكوفة سنوات قبل عودته إلى المدينة، فتُوفي بها ودُفن بالبقيع.
    description_fr: |
      Le premier des Compagnons (ra) à réciter ouvertement le Coran dans
      le Ḥaram de La Mecque — ce pour quoi les Qurayshites le battirent,
      et où il revint le lendemain. Le Prophète ﷺ le désigna parmi les
      quatre dont il dit : "Prenez le Coran de quatre : ʿAbdullāh ibn
      Masʿūd, Sālim (mawlā d'Abū Ḥudhayfa), Muʿādh ibn Jabal et Ubayy
      ibn Kaʿb." Il enseigna le Coran à al-Kūfa durant des années avant
      son retour à Médine, où il mourut et fut inhumé à al-Baqīʿ.
    canonical_hijri: {year: 32, precision: year}
    canonical_gregorian: {date: 653-01-01, precision: year, method: attested}
    claims:
      - source_key: bukhari_sahih
        is_canonical: true
        notes: Sahih al-Bukhari 3758 — hadith on "Take the Qur'an from four".
      - source_key: ibn_sad_tabaqat
    source_url: https://en.wikipedia.org/wiki/Abdullah_ibn_Mas%27ud
    people: [[abdullah-ibn-masud, died]]
    tags: [rashidun, sahabi, quran-reciter, madinah, kufa]
    importance: major
    verified: true
    verification_status: cross_verified
    hadith_refs: "Bukhari 3758, Muslim 2464"

  - slug: death-of-abd-al-rahman-ibn-awf
    category: rashidun
    title_en: Death of 'Abd al-Rahman ibn 'Awf
    title_ar: وفاة عبد الرحمن بن عوف
    title_fr: Décès de ʿAbd al-Raḥmān ibn ʿAwf
    description_en: |
      One of the eight first believers and among the ten Companions (ra)
      given glad tidings of Paradise. He was a merchant of Madinah whose
      trading caravans were so celebrated that, upon one arrival, Aisha
      (ra) heard the sound and asked if it were an earthquake. He gave
      enormous wealth in charity during his lifetime, and bequeathed
      much more at death. Member of Caliph 'Umar's (ra) shura council.
      Died in Madinah and is buried in the Baqi'.
    description_ar: |
      من السابقين الأوّلين الثمانية إلى الإسلام، ومن العشرة المبشّرين
      بالجنة من الصحابة (ra). كان تاجراً بالمدينة اشتهرت قوافله، حتى إنّ
      عائشة (ra) سمعت ذات يومٍ صوتها فسألت: أهي رجفةٌ؟ تصدّق في حياته
      بأموال طائلة، وأوصى عند وفاته بأكثر منها. وكان من أصحاب الشورى
      الذين عيّنهم عمر (ra). توفي بالمدينة ودُفن بالبقيع.
    description_fr: |
      L'un des huit premiers croyants et parmi les dix Compagnons (ra)
      à qui le Paradis fut annoncé. Il fut un marchand de Médine dont
      les caravanes commerciales étaient si célèbres que, à l'arrivée
      de l'une d'elles, ʿĀʾisha (ra) entendit le bruit et demanda s'il
      s'agissait d'un tremblement de terre. Il donna en aumône
      d'énormes richesses de son vivant, et en légua bien davantage à
      sa mort. Membre du conseil de la shūrā du calife ʿUmar (ra).
      Décédé à Médine et inhumé à al-Baqīʿ.
    canonical_hijri: {year: 32, precision: year}
    canonical_gregorian: {date: 652-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Abd_al-Rahman_ibn_Awf
