  - slug: death-of-muadh-ibn-jabal
    category: rashidun
    title_en: Death of Mu'adh ibn Jabal in the Plague of Amwas
    title_ar: وفاة معاذ بن جبل في طاعون عمواس
    title_fr: Décès de Muʿādh ibn Jabal dans la peste d'ʿAmwās
    description_en: |
      One of the four Companions (ra) to whom the Prophet ﷺ directed the
      learning of the Qur'an. The Prophet ﷺ said of him: "The most
      knowledgeable of my Umma in halal and haram is Mu'adh ibn Jabal."
      Sent to Yemen as judge and teacher by the Prophet ﷺ, he returned
      during Abu Bakr's (ra) caliphate, then served under 'Umar (ra) in
      Syria, where he died of the plague at about 33.
    description_ar: |
      أحد الأربعة الذين أمر النبي ﷺ بأخذ القرآن عنهم من الصحابة (ra). قال
      فيه النبي ﷺ: "أعلمُ أمّتي بالحلال والحرام معاذ بن جبل". بعثه النبي ﷺ
      إلى اليمن قاضياً ومعلِّماً، فعاد في خلافة أبي بكر (ra)، ثم سار إلى
      الشام في خلافة عمر (ra)، فمات هناك بالطاعون وهو في الثالثة والثلاثين
      من عمره.
    description_fr: |
      L'un des quatre Compagnons (ra) à qui le Prophète ﷺ ordonna
      d'apprendre le Coran. Le Prophète ﷺ dit de lui : "Le plus savant
      de ma Umma en matière de licite et d'illicite est Muʿādh ibn
      Jabal." Envoyé au Yémen par le Prophète ﷺ comme juge et
      enseignant, il revint sous le califat d'Abū Bakr (ra), puis servit
      sous ʿUmar (ra) en Syrie, où il mourut de la peste à environ
      trente-trois ans.
    canonical_hijri: {year: 18, precision: year}
    canonical_gregorian: {date: 639-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
    source_url: https://en.wikipedia.org/wiki/Mu%27adh_ibn_Jabal
    people: [[muadh-ibn-jabal, died]]
    tags: [rashidun, sahabi, amwas-plague, syria, yemen]
    importance: notable
