  - slug: death-of-bilal
    category: rashidun
    title_en: Death of Bilal ibn Rabah — Muezzin of the Prophet ﷺ
    title_ar: وفاة بلال بن رباح
    title_fr: Décès de Bilāl ibn Rabāḥ — muezzin du Prophète ﷺ
    description_en: |
      The Abyssinian freedman and first muezzin of Islam, whose call to
      prayer from the roof of the Ka'ba on the day of the Conquest of
      Makkah was a watershed moment — a former slave summoning the
      community of Quraysh to prayer. After the Prophet's ﷺ death he
      refused to give the adhan, except once in Madinah for 'Umar's (ra)
      visit — the entire city wept. He died in Damascus around 20 AH.
    description_ar: |
      المولى الحبشي وأوّل مؤذّن في الإسلام (ra)، الذي جعل أذانَه فوق سطح
      الكعبة يومَ فتح مكة لحظةً مفصلية — عبدٌ مُعتَق ينادي قريشاً إلى
      الصلاة. وبعد وفاة النبي ﷺ امتنع عن الأذان، إلا مرّةً واحدة بالمدينة
      حين زارها عمر (ra)، فبكت المدينة بأسرها. توفي بدمشق نحو سنة عشرين
      للهجرة.
    description_fr: |
      L'affranchi abyssinien et premier muezzin de l'Islam (ra), dont
      l'appel à la prière depuis le toit de la Kaʿba le jour de la
      Conquête de La Mecque fut un moment décisif — un ancien esclave
      convoquant la communauté de Quraysh à la prière. Après la mort
      du Prophète ﷺ, il refusa de donner l'adhān, à l'exception d'une
      seule fois à Médine lors de la visite de ʿUmar (ra) — la ville
      entière pleura. Il mourut à Damas vers l'an 20 de l'Hégire.
    canonical_hijri: {year: 20, precision: year}
    canonical_gregorian: {date: 640-08-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
        notes: "Year of death disputed in classical sources (17, 18, 20, or 21 AH per al-Suyuti); 20 AH retained as the most commonly cited."
    source_url: https://en.wikipedia.org/wiki/Bilal_ibn_Rabah
    people: [[bilal-ibn-rabah, died]]
    tags: [rashidun, sahabi, muezzin, damascus, former-slave]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-hassan-ibn-thabit
    category: umayyad
    title_en: Death of Hassan ibn Thabit — Poet of the Prophet ﷺ
    title_ar: وفاة حسان بن ثابت
    title_fr: Décès de Ḥassān ibn Thābit — poète du Prophète ﷺ
    description_en: |
      The Ansari poet (ra) whose verses defended the Prophet ﷺ against
      the satires of the Quraysh — the Prophet ﷺ had a minbar erected
      in the mosque for him to compose from. He was the poet laureate
      of early Madinah. Died in Madinah at an advanced age — one of
      four men in Islamic history traditionally said to have lived 60
      years of jahiliyya and 60 of Islam.
    description_ar: |
      الشاعر الأنصاري (ra) الذي ذاد بشعره عن النبي ﷺ في وجه هجاء قريش —
      نصب له النبي ﷺ منبراً في المسجد لينظم منه شعره. كان شاعرَ المدينة
      المُجَلَّى في صدر الإسلام. توفي بالمدينة في سنٍّ متقدّمة — وهو من
      أربعةٍ في تاريخ الإسلام يُقال تقليدياً إنّ كلاًّ منهم عاش ستين سنة
      في الجاهلية وستين في الإسلام.
      
      Sources record his death between 50 and 54 AH; we follow Ibn Ḥajar's *Iṣāba* and Ibn Saʿd's *Ṭabaqāt* with 54 AH as the dominant classical position.
      
      ذكرت المصادر وفاته بين سنتي ٥٠ و٥٤ هـ؛ ونتبع هنا «الإصابة» لابن حجر و«الطبقات» لابن سعد بسنة ٥٤ هـ بوصفها الأرجح في التراث.
    description_fr: |
      Le poète ansarite (ra) dont les vers défendirent le Prophète ﷺ
      contre les satires de Quraysh — le Prophète ﷺ fit dresser pour
      lui un minbar dans la mosquée pour qu'il y compose. Il fut le
      poète attitré de la Médine des origines. Décédé à Médine à un âge
      avancé — l'un des quatre hommes de l'histoire islamique dont la
      tradition dit qu'ils vécurent soixante années dans la jāhiliyya
      et soixante en Islam.
    canonical_hijri: {year: 54, precision: year}
    canonical_gregorian: {date: 674-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
        notes: "Year of death disputed: classical sources record dates ranging from 40 AH (during Caliphate of Ali ra) to 54 AH (during Caliphate of Mu'awiya ra). Ibn Sa'd's Tabaqat retains 54 AH."
      - source_key: dhahabi_siyar
        notes: "Alternative tradition places death between 35-40 AH during the Caliphate of Ali (ra)."
    source_url: https://en.wikipedia.org/wiki/Hassan_ibn_Thabit
    people: [[hassan-ibn-thabit, died]]
    tags: [umayyad, sahabi, poet, madinah]
    importance: notable
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date

  - slug: death-of-salman-al-farisi
    category: rashidun
    title_en: Death of Salman al-Farisi
    title_ar: وفاة سلمان الفارسي
    title_fr: Décès de Salmān al-Fārisī
    description_en: |
      The Persian companion (ra) whose long search for the prophesied
      last prophet led him from Zoroastrianism through several Christian
      communities to Madinah — his journey of faith is one of the most
      storied conversion narratives in the Sira. He proposed the digging
      of the Trench at the siege of Madinah (5 AH) — a Persian military
      technique the Arabs had not used. The Prophet ﷺ said of him:
      "Salman is from us, the People of the House." He served as
      governor of al-Mada'in (former Sasanian capital) and died there,
      living ascetically.
    description_ar: |
      الصحابي الفارسي (ra) الذي قاده بحثُه الطويل عن النبي الموعود من
      المجوسية مروراً بعدّة جماعات مسيحية إلى المدينة — ومسيرة إيمانه من
      أبرز قصص الإسلام في السيرة. أشار بحفر الخندق في غزوة الأحزاب سنة 5 هـ —
      وهو أسلوبٌ عسكري فارسي لم يكن العرب يعرفونه. قال فيه النبي ﷺ: "سلمان
      منّا أهلَ البيت". وُلّي إمارة المدائن (عاصمة الساسانيين السابقة)
      وتوفي بها زاهداً.
    description_fr: |
      Le Compagnon persan (ra) dont la longue quête du dernier prophète
      annoncé le mena du zoroastrisme à Médine en passant par plusieurs
      communautés chrétiennes — son parcours de foi est l'un des récits
      de conversion les plus célèbres de la Sīra. Il proposa de creuser
      la Tranchée lors du siège de Médine (5 H) — une technique militaire
      perse que les Arabes n'avaient pas employée. Le Prophète ﷺ dit de
      lui : "Salmān est des nôtres, les Gens de la Maison." Il fut
      gouverneur d'al-Madāʾin (ancienne capitale sassanide) et y mourut,
      menant une vie ascétique.
    canonical_hijri: {year: 35, precision: year}
    canonical_gregorian: {date: 656-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        is_canonical: true
      - source_key: dhahabi_siyar
        notes: "Year of death given variously as 32-36 AH in classical sources; 35 AH (during Caliphate of Uthman ra) is the most commonly cited."
    source_url: https://en.wikipedia.org/wiki/Salman_the_Persian
    people: [[salman-al-farisi, died]]
    tags: [rashidun, sahabi, persia, mada'in]
    importance: notable
    verified: true
    verification_status: cross_verified
