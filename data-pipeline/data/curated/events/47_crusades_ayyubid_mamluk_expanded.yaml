  - slug: death-of-jalal-al-din-khwarazmshah
    category: ruler_death
    title_en: Death of Jalāl al-Dīn Khwārazmshāh — Last Ruler of the Khwārazmian Empire
    title_ar: مقتل جلال الدين خوارزم شاه — آخر سلاطين دولة خوارزم
    title_fr: Mort de Jalāl al-Dīn Khwārazmshāh — dernier souverain de l'empire khwārazmien
    description_en: |
      Jalāl al-Dīn Mengübirti, last Khwārazmian sultan and son of
      ʿAlāʾ al-Dīn Muḥammad — whose realm Genghis Khan had
      destroyed in 617 AH — died as a fugitive in the mountains
      of Diyār Bakr (south-eastern Anatolia), reportedly killed
      by a Kurdish villager who took him for a common bandit.
      For over a decade after his father's death he had waged a
      mobile campaign against the Mongols across Iran, the
      Caucasus, and eastern Anatolia, the only Muslim ruler to
      defeat a Mongol field army (at Parwān in 618 AH); but his
      irruptions into Ayyūbid Syria, his sack of Tiflīs in 623 AH,
      and his clash with the Seljuks of Rūm at Yāssī Chamen in
      627 AH alienated his potential Muslim allies. His death
      ended the Khwārazm-Shāh dynasty as a state, but his
      surviving Khwārazmian troops became the mercenary force
      that Ayyūbid factions employed in Syria and Egypt for the
      next decade — the same Khwārazmians who would sack
      Jerusalem in 642 AH.
    description_ar: |
      توفي السلطان جلال الدين منكوبرتي — آخر سلاطين خوارزم
      وابن السلطان علاء الدين محمد الذي دكّ جنكيز خان دولته
      سنة ٦١٧ هـ — هارباً في جبال ديار بكر بجنوب شرق الأناضول،
      وقد قتله — على ما يروى — كردي قروي ظنه قاطع طريق. وكان
      جلال الدين قد شنّ بعد سقوط دولة أبيه حرباً متنقلة على
      المغول عبر إيران والقوقاز وشرق الأناضول لأكثر من عقد، وهو
      الحاكم الإسلامي الوحيد الذي هزم جيشاً مغولياً ميدانياً
      (في بروان سنة ٦١٨ هـ)؛ لكن غاراته على بلاد الأيوبيين
      بالشام، وسلبه تفليس سنة ٦٢٣ هـ، وموقعته مع سلاجقة الروم
      في ياسي جمن سنة ٦٢٧ هـ، عزلته عن حلفائه المسلمين الممكنين.
      وأنهى موته دولة خوارزم شاه سياسياً، لكن جنوده الخوارزميين
      الناجين صاروا قوة المرتزقة التي استخدمتها فصائل الأيوبيين
      في الشام ومصر العقدَ التالي — وهم أنفسهم الخوارزمية الذين
      سيدخلون القدس فيخربونها سنة ٦٤٢ هـ.
    description_fr: |
      Jalāl al-Dīn Mengübirtī, dernier sultan khwārazmien et fils
      de ʿAlāʾ al-Dīn Muḥammad — dont l'empire avait été détruit
      par Gengis Khan en 617 H — mourut en fugitif dans les
      montagnes du Diyār Bakr (sud-est de l'Anatolie), tué selon
      la tradition par un villageois kurde qui le prit pour un
      simple brigand. Pendant plus d'une décennie après la mort
      de son père, il avait mené une campagne mobile contre les
      Mongols à travers l'Iran, le Caucase et l'est de l'Anatolie,
      seul souverain musulman à battre une armée mongole en
      campagne (à Parwān en 618 H); mais ses incursions dans la
      Syrie ayyoubide, son sac de Tiflis en 623 H, et son
      affrontement avec les Seljoukides de Roum à Yassı Çemen en
      627 H l'isolèrent de ses alliés musulmans potentiels. Sa
      mort mit fin à la dynastie des Khwārazm-Shāhs comme État,
      mais ses troupes khwārazmiennes survivantes devinrent la
      force mercenaire que les factions ayyoubides employèrent en
      Syrie et en Égypte pendant la décennie suivante — les
      mêmes Khwārazmiens qui sacageraient Jérusalem en 642 H.
