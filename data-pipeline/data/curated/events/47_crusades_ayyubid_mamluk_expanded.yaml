    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: minbar-of-nur-al-din-installed-at-aqsa
    category: political_event
    title_en: Saladin Installs Nūr al-Dīn's Minbar at al-Aqṣā Mosque
    title_ar: نصب صلاح الدين منبر نور الدين في المسجد الأقصى
    title_fr: Saladin installe le minbar de Nūr al-Dīn dans la mosquée al-Aqṣā
    description_en: |
      Following the liberation of Jerusalem on 27 Rajab 583 AH,
      Ṣalāh al-Dīn al-Ayyūbī had the carved wooden *minbar*
      commissioned twenty years earlier by Nūr al-Dīn Maḥmūd
      Zangī — and stored at Aleppo against the day Jerusalem
      should be retaken — transported to the city and installed
      in al-Aqṣā Mosque ahead of the first Friday prayer held
      there in eighty-eight years. Built without nails by Aleppan
      craftsmen in 564 AH from interlocking carved cedar inlaid
      with ivory and ebony in geometric arabesques, the minbar
      bore Nūr al-Dīn's name and a foundation inscription that
      was an act of waqf "for the Sacred House when Allah opens
      it." Ibn Khallikān and Ibn al-Athīr both record the act as
      the symbolic completion of the Zangid–Ayyūbid project. The
      minbar stood in al-Aqṣā for 781 years until it was destroyed
      by an arson attack on 21 August 1969 CE; a faithful
      reproduction was installed in 2007.
    description_ar: |
      بعد فتح بيت المقدس في ٢٧ رجب سنة ٥٨٣ هـ، أمر السلطان
      صلاح الدين الأيوبي بنقل المنبر الخشبي المنقوش الذي كان
      قد أمر بصناعته نور الدين محمود زنكي قبل عشرين سنة —
      وحُفظ بحلب لليوم الذي يفتح الله فيه القدس — ونصبه في
      المسجد الأقصى قبل أول جمعة فيها منذ ثمان وثمانين سنة.
      وقد صنعه حرفيون حلبيون سنة ٥٦٤ هـ من خشب أرز متداخل
      بلا مسامير، مطعَّم بالعاج والآبنوس بزخارف هندسية
      أرابسكية، وعليه اسم نور الدين ووقفية تنص أن هذا المنبر
      وقف «للبيت المقدس متى فتحه الله». ويسجِّل ابن خلكان وابن
      الأثير الواقعةَ علامةً رمزية على اكتمال المشروع
      الزنكي-الأيوبي. وبقي المنبر في الأقصى ٧٨١ سنة حتى أحرقه
      مجرم باعتداء حريق في ٢١ أغسطس ١٩٦٩ ميلادي، ونصبت نسخة
      طبق الأصل منه سنة ٢٠٠٧ ميلادي.
    description_fr: |
      Après la libération de Jérusalem le 27 Rajab 583 H, Ṣalāh
      al-Dīn al-Ayyūbī fit transporter le *minbar* en bois sculpté
      commandé vingt ans plus tôt par Nūr al-Dīn Maḥmūd Zangī —
      et conservé à Alep en attendant le jour où Jérusalem serait
      reprise — puis l'installa dans la mosquée al-Aqṣā avant la
      première prière du vendredi célébrée là depuis quatre-vingt-
      huit ans. Construit sans clous par des artisans alépains en
      564 H à partir de cèdre sculpté assemblé par tenons,
      incrusté d'ivoire et d'ébène en arabesques géométriques, le
      minbar portait le nom de Nūr al-Dīn et une inscription de
      fondation faisant *waqf* « à la Maison Sacrée le jour où
      Allāh l'ouvrira ». Ibn Khallikān et Ibn al-Athīr consignent
      l'acte comme l'achèvement symbolique du projet zangide-
      ayyoubide. Le minbar resta dans al-Aqṣā 781 ans jusqu'à sa
      destruction par un incendie criminel le 21 août 1969 EC; une
      réplique fidèle fut installée en 2007.
    canonical_hijri: {year: 583, month: 8, precision: month}
    canonical_gregorian: {date: 1187-10-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr describes the transport of the minbar from Aleppo and its installation following the Friday prayer in 583 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya records the minbar's commissioning by Nūr al-Dīn and its installation by Saladin."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān records the commissioning of the minbar in his entry on Nūr al-Dīn."
    people: [[salahuddin-al-ayyubi, leader], [nur-al-din-zanki, subject]]
    tags: [ayyubid, saladin, jerusalem, al-aqsa, minbar, nur-al-din, zangid]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-arsuf
    category: battle
    title_en: Battle of Arsuf — Saladin against Richard the Lionheart
    title_ar: معركة أرسوف — صلاح الدين في مواجهة ريتشارد قلب الأسد
    title_fr: Bataille d'Arsuf — Saladin contre Richard Cœur de Lion
    description_en: |
      The pitched battle on the coastal plain north of Jaffa in
      which the Crusader army of King Richard I of England,
      marching south from ʿAkkā along the Mediterranean coast
      after the fall of Acre to the Third Crusade, repulsed an
      attempt by Saladin's army to break the Frankish column.
      The Ayyūbid mounted archers harassed the Crusader rear and
      flanks throughout the morning; when the Hospitaller knights
      counter-charged in the early afternoon, the heavy Crusader
      cavalry broke through Saladin's centre and forced a
      withdrawal. Despite the tactical setback, Saladin's main
      strategic objective — denying the Crusaders Jerusalem —
      held: Richard reached Jaffa but was unable to take Jerusalem
      either after Arsuf or after a second attempt the following
      year, and the Treaty of Jaffa in Shaʿbān 588 AH left the
      city in Muslim hands. Both Ibn al-Athīr and Ibn Kathīr
      record the engagement and Saladin's regrouping at Ramla in
      its aftermath.
    description_ar: |
      المعركة الميدانية في السهل الساحلي شمالي يافا التي ردّت
      فيها قوات السلطان صلاح الدين محاولةَ كسر الرتل الصليبي
      للملك ريتشارد الأول ملك إنجلترا، الذي كان يسير جنوباً
      من عكا على الساحل المتوسطي بعد سقوط عكا أمام الحملة
      الصليبية الثالثة. ضايق رماةُ السلطان المماليكُ مؤخرة
      الرتل الصليبي وأجنحته طوال الصباح؛ ولما هاجم فرسان
      الإسبتارية في معركة معاكسة عند مطلع العصر اخترق سلاح
      الفرسان الصليبي الثقيل قلب صلاح الدين وألزمه بالانسحاب.
      ومع الهزيمة التكتيكية فإن هدف صلاح الدين الاستراتيجي
      الأكبر — حرمان الصليبيين من القدس — قد ثبت: وصل ريتشارد
      إلى يافا لكنه عجز عن أخذ القدس لا بعد أرسوف ولا بعد
      محاولة ثانية في السنة التالية، وتركت معاهدة يافا في
      شعبان سنة ٥٨٨ هـ المدينةَ في يد المسلمين. ويسجل ابن
      الأثير وابن كثير المواجهةَ وإعادة تنظيم صلاح الدين
      صفوفَه عند الرملة بعدها.
    description_fr: |
      La bataille rangée sur la plaine côtière au nord de Jaffa
      durant laquelle l'armée croisée du roi Richard Ier
      d'Angleterre, marchant vers le sud depuis ʿAkkā le long de
      la côte méditerranéenne après la chute d'Acre face à la
      troisième croisade, repoussa une tentative de l'armée de
      Saladin de briser la colonne franque. Les archers montés
      ayyoubides harcelèrent l'arrière-garde et les flancs
      croisés tout au long de la matinée; lorsque les chevaliers
      hospitaliers contre-chargèrent en début d'après-midi, la
      lourde cavalerie croisée perça le centre de Saladin et
      l'obligea au repli. Malgré le revers tactique, l'objectif
      stratégique principal de Saladin — refuser Jérusalem aux
      Croisés — fut maintenu : Richard atteignit Jaffa mais ne
      put prendre Jérusalem ni après Arsuf ni après une seconde
      tentative l'année suivante, et le traité de Jaffa en
      Shaʿbān 588 H laissa la ville aux mains musulmanes. Ibn
      al-Athīr et Ibn Kathīr enregistrent tous deux l'engagement
      et la reconstitution de Saladin à Ramla dans son sillage.
    canonical_hijri: {year: 587, month: 8, precision: month}
    canonical_gregorian: {date: 1191-09-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the battle under the events of 587 AH and describes the Hospitaller charge."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr confirms the engagement and Saladin's withdrawal toward Ramla in 587 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the battle under the obituaries and events of 587 AH."
    people: [[salahuddin-al-ayyubi, leader]]
    tags: [ayyubid, saladin, crusades, third-crusade, palestine, arsuf]
    importance: notable
    verified: true
    verification_status: cross_verified

