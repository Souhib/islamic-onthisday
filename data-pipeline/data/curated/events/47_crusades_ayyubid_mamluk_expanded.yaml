      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya places the death in Shaʿbān 647 AH at al-Manṣūra and details the concealment."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the obituary in 647 AH."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the standard biographical entry confirming 647 AH."
    people: [[al-salih-ayyub, subject]]
    tags: [ayyubid, egypt, mansoura, seventh-crusade, mamluks, shajar-al-durr]
    importance: notable
