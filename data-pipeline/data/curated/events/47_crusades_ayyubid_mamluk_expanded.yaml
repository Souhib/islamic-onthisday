  - slug: death-of-al-kamil-ayyubi
    category: ruler_death
    title_en: Death of Sultan al-Kāmil — Ayyūbid of Egypt and the Diplomat of the Sixth Crusade
    title_ar: وفاة السلطان الكامل — صاحب مصر ومُسالم الحملة السادسة
    title_fr: Mort du sultan al-Kāmil — l'Ayyoubide d'Égypte et le diplomate de la sixième croisade
    description_en: |
      al-Malik al-Kāmil Nāṣir al-Dīn Muḥammad ibn al-ʿĀdil ibn
      Ayyūb — fourth Ayyūbid sultan of Egypt and the senior
      Ayyūbid prince after his father's death in 615 AH — died
      at Damascus at age about 60 of dysentery. His twenty-year
      reign saw two Crusader expeditions that struck Egypt:
      the Fifth Crusade, which he defeated by inundating the
      Damietta plain in 618 AH; and the Sixth Crusade led by
      Emperor Frederick II, which he settled by the unprecedented
      Treaty of Jaffa in 626 AH (1229 CE) ceding Jerusalem
      back to the Crusaders for ten years in exchange for peace —
      a settlement that drew sharp criticism from Damascus and
      Aleppo Ayyūbids and from the Damascene jurists, who held
      a public mourning at the Umayyad Mosque. He recovered
      Jerusalem on the treaty's expiry in 637 AH. Famous in
      Western tradition as the sultan who corresponded with
      St. Francis of Assisi during the Damietta campaign.
    description_ar: |
      توفي الملك الكامل ناصر الدين محمد بن العادل بن أيوب —
      رابع سلاطين بني أيوب بمصر، وأكبر أمراء البيت الأيوبي بعد
      وفاة أبيه سنة ٦١٥ هـ — بدمشق عن نحو ستين سنة بعلة
      الإسهال. وفي عهده الذي امتد عشرين سنة قصدته حملتان
      صليبيتان: الحملة الخامسة التي هزمها بإغراق سهل دمياط سنة
      ٦١٨ هـ؛ والحملة السادسة بقيادة الإمبراطور فريدريك الثاني
      التي أنهاها بمعاهدة يافا سنة ٦٢٦ هـ (١٢٢٩ م) — معاهدة
      غير مسبوقة سلّم بمقتضاها القدسَ لعشر سنوات إلى الصليبيين
      مقابل السلام، وهي تسوية واجهت نقداً حاداً من أيوبيي دمشق
      وحلب ومن فقهاء دمشق الذين أقاموا حداداً عاماً في الجامع
      الأموي. واسترد القدس عند انقضاء المعاهدة سنة ٦٣٧ هـ.
      ومشهور في التراث الغربي بأنه السلطان الذي راسله القديس
      فرنسيس الأسيزي إبان حصار دمياط.
    description_fr: |
      al-Malik al-Kāmil Nāṣir al-Dīn Muḥammad ibn al-ʿĀdil ibn
      Ayyūb — quatrième sultan ayyoubide d'Égypte et l'aîné des
      princes ayyoubides après la mort de son père en 615 H —
      mourut à Damas à l'âge d'environ 60 ans de dysenterie. Son
      règne de vingt ans vit deux expéditions croisées frapper
      l'Égypte : la cinquième croisade, qu'il défit en inondant
      la plaine de Damiette en 618 H; et la sixième croisade
      menée par l'empereur Frédéric II, qu'il régla par le
      traité de Jaffa sans précédent en 626 H (1229 EC) cédant
      Jérusalem aux Croisés pour dix ans en échange de la paix
      — un règlement qui suscita de vives critiques des
      Ayyoubides de Damas et d'Alep ainsi que des juristes
      damascènes, qui tinrent un deuil public à la mosquée
      omeyyade. Il récupéra Jérusalem à l'expiration du traité
      en 637 H. Célèbre dans la tradition occidentale comme le
      sultan qui correspondit avec saint François d'Assise
      pendant la campagne de Damiette.
    canonical_hijri: {year: 635, month: 7, precision: month}
    canonical_gregorian: {date: 1238-03-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr's continuators in al-Kāmil's recensions and his contemporaries (Sibṭ ibn al-Jawzī, Ibn Wāṣil) place the death in Rajab 635 AH at Damascus."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr enters the death under 635 AH at Damascus."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the standard biographical entry placing the death in 635 AH and detailing the dysentery."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the death under the obituaries of 635 AH."
    people: [[al-kamil-muhammad, subject], [al-adil-sayf-al-din, subject]]
    tags: [ayyubid, egypt, damascus, sixth-crusade, jerusalem, frederick-ii]
    importance: notable
