  - slug: assassination-of-turan-shah
    category: ruler_death
    title_en: Assassination of Tūrān Shāh — End of the Ayyūbid Dynasty in Egypt
    title_ar: مقتل توران شاه — نهاية دولة بني أيوب بمصر
    title_fr: Assassinat de Tūrān Shāh — fin de la dynastie ayyoubide en Égypte
    description_en: |
      al-Malik al-Muʿaẓẓam Tūrān Shāh ibn al-Ṣāliḥ Ayyūb — last
      Ayyūbid sultan of Egypt — was assassinated at Fāriskūr in
      the Nile Delta less than three months after his accession,
      killed by the Baḥrī Mamlūk officers his late father had
      raised. Summoned from his apanage at Ḥiṣn Kayfā in
      Mesopotamia after his father's death, Tūrān Shāh had led
      the final stage of the war that captured King Louis IX of
      France at Mansoura; but his suspicion of his father's
      Mamlūk officers, his attempt to replace them with his own
      Mesopotamian retinue, and his alleged threats against
      Shajar al-Durr drove the Baḥrī corps under Baybars and
      Aqṭāy to revolt. He was wounded inside his banquet pavilion,
      fled to a wooden tower on the Nile bank where the Mamlūks
      set fire to it, leapt into the river under fire, and was
      killed in the water. His death ended the Ayyūbid sultanate
      of Egypt; Shajar al-Durr was acclaimed sultana in his place
      and married to the Mamlūk emir Aybak, inaugurating the
      Baḥrī Mamlūk dynasty.
    description_ar: |
      اغتيل السلطان الملك المعظم توران شاه بن الصالح أيوب —
      آخر سلاطين بني أيوب بمصر — عند فارسكور في دلتا النيل
      بعد أقل من ثلاثة أشهر من توليه، قتله ضباط المماليك
      البحرية الذين رباهم أبوه. واستُدعي توران شاه من
      إقطاعه بحصن كيفا في الجزيرة الفراتية بعد وفاة أبيه،
      فقاد المرحلة الأخيرة من الحرب التي أُسر فيها الملك
      لويس التاسع ملك فرنسا في المنصورة؛ لكنّ ارتيابه من
      ضباط المماليك البحرية، ومحاولته استبدالهم بحاشيته
      الجزرية، وتهديده — على ما يروى — لأرملة أبيه شجر الدر،
      دفع البحرية بقيادة بيبرس وأقطاي إلى الانقلاب. جُرح
      في خيمة وليمته، فهرب إلى برج خشبي على ضفة النيل،
      فأشعل المماليك فيه النار، فقفز إلى الماء تحت رشق سهامهم
      فقتل فيه. وأنهى موته السلطنة الأيوبية بمصر؛ وبويعت
      شجر الدر سلطانة، ثم زوّجت الأمير المملوكي عز الدين
      أيبك، فبدأ بذلك حكم المماليك البحرية.
    description_fr: |
      al-Malik al-Muʿaẓẓam Tūrān Shāh ibn al-Ṣāliḥ Ayyūb —
      dernier sultan ayyoubide d'Égypte — fut assassiné à
      Fāriskūr dans le delta du Nil moins de trois mois après son
      accession, tué par les officiers mamelouks baḥrī que son
      père défunt avait formés. Mandé de son apanage de Ḥiṣn
      Kayfā en Mésopotamie après la mort de son père, Tūrān Shāh
      avait conduit la phase finale de la guerre qui captura le
      roi Louis IX de France à Mansourah; mais sa méfiance envers
      les officiers mamelouks de son père, sa tentative de les
      remplacer par sa propre suite mésopotamienne et ses
      menaces alléguées contre Shajar al-Durr poussèrent le corps
      baḥrī sous Baybars et Aqṭāy à la révolte. Blessé dans son
      pavillon de banquet, il fuit dans une tour de bois sur la
      berge du Nil que les Mamelouks incendièrent, sauta dans
      le fleuve sous leurs flèches et y fut tué. Sa mort mit fin
      au sultanat ayyoubide d'Égypte; Shajar al-Durr fut
      acclamée sultane à sa place et mariée à l'émir mamelouk
      Aybak, inaugurant la dynastie mamelouke baḥrī.
    canonical_hijri: {year: 648, month: 1, precision: month}
    canonical_gregorian: {date: 1250-05-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya gives a detailed account under 648 AH of the assassination at Fāriskūr."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the death and the end of the Ayyūbid sultanate of Egypt under 648 AH."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān confirms the death in Muḥarram 648 AH at Fāriskūr."
    people: [[turan-shah, subject], [baybars, subject], [al-salih-ayyub, subject]]
    tags: [ayyubid, mamluk, egypt, fariskur, shajar-al-durr, dynasty-end, baybars]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # MAMLUK CONQUESTS — END OF THE CRUSADER LEVANT
  # =========================================================================

  - slug: fall-of-tripoli-1289
    category: siege
    title_en: Fall of Tripoli to the Mamlūks under Qalāwūn
    title_ar: سقوط طرابلس الشام على المماليك بقيادة قلاوون
    title_fr: Chute de Tripoli sous les Mamelouks de Qalāwūn
    description_en: |
      Sultan al-Manṣūr Sayf al-Dīn Qalāwūn took the fortified
      Crusader port of Tripoli — the last capital of the County
      of Tripoli, founded by Raymond IV of Toulouse in the wake
      of the First Crusade — after a thirty-four day siege. The
      Mamlūk siege engines breached the seaward walls and the
      Pisan and Genoese galleys evacuated those who could pay
      the passage; the rest of the population was killed or
      enslaved per the war convention of a stormed city. Qalāwūn
      ordered the city walls levelled and a new Mamlūk Tripoli
      built two miles inland on the Abū ʿAlī river, where the
      modern city stands. Tripoli's fall left only Acre, Tyre,
      Sidon, Beirut, and a few coastal castles in Crusader
      hands; within two years his son al-Ashraf Khalīl would
      take Acre and complete the reconquest. The taking is
      attested in detail by Ibn al-Furāt, Ibn Kathīr, and
      al-Dhahabī.
    description_ar: |
      افتتح السلطان المنصور سيف الدين قلاوون ميناءَ طرابلس
      الشام الصليبي المحصّن — آخر عواصم إمارة طرابلس
      الصليبية التي أسسها ريموند الرابع التولوزي على إثر
      الحملة الصليبية الأولى — بعد حصار أربعة وثلاثين يوماً.
      ضربت آلات الحصار المملوكية الأسوارَ البحرية فثلمتها،
      وأَقَلَّت سفنُ بيزة وجنوة من تستطيع دفع أجور النجاة،
      وقُتل أو سُبي من بقي من أهل المدينة على عرف الحرب
      حين تُؤخذ المدينة عنوة. وأمر قلاوون بهدم أسوار المدينة
      الساحلية، وبناء طرابلس مملوكية جديدة على بعد ميلين
      داخلاً على نهر أبي علي حيث تقوم اليوم. وأبقى سقوط
      طرابلس بيد الصليبيين عكا وصور وصيدا وبيروت وقلاع
      ساحلية قليلة فقط؛ وفي سنتين سيكمل ابنه الأشرف خليل
      الفتح بأخذ عكا. ووثقت الأخبار في تفصيلها عند ابن
      الفرات وابن كثير والذهبي.
    description_fr: |
      Le sultan al-Manṣūr Sayf al-Dīn Qalāwūn prit le port
      croisé fortifié de Tripoli — dernière capitale du comté
      croisé de Tripoli, fondé par Raymond IV de Toulouse à la
      suite de la première croisade — après un siège de
      trente-quatre jours. Les engins de siège mamelouks
      brèchèrent les remparts côté mer et les galères pisanes
      et génoises évacuèrent ceux qui pouvaient payer le
      passage; le reste de la population fut tué ou réduit en
      esclavage selon la convention de guerre d'une cité prise
      d'assaut. Qalāwūn ordonna le rasement des remparts et la
      construction d'une nouvelle Tripoli mamelouke deux milles
      à l'intérieur des terres sur le fleuve Abū ʿAlī, où se
      dresse la ville moderne. La chute de Tripoli ne laissa
      aux Croisés que Acre, Tyr, Sidon, Beyrouth et quelques
      châteaux côtiers; en deux ans son fils al-Ashraf Khalīl
      prendrait Acre et achèverait la reconquête. La prise est
      attestée en détail par Ibn al-Furāt, Ibn Kathīr et
      al-Dhahabī.
    canonical_hijri: {year: 688, month: 4, precision: month}
    canonical_gregorian: {date: 1289-04-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya enters the fall of Tripoli under 688 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the conquest under the events of 688 AH."
    people: [[qalawun, leader]]
    tags: [mamluk, crusades, tripoli, lebanon, qalawun, siege]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: fall-of-acre-1291
    category: siege
    title_en: Fall of Acre (ʿAkkā) — End of the Crusader Levant
    title_ar: سقوط عكا — نهاية الوجود الصليبي بالشام
    title_fr: Chute d'Acre (ʿAkkā) — fin du Levant croisé
    description_en: |
      Sultan al-Ashraf Ṣalāḥ al-Dīn Khalīl ibn Qalāwūn took
      ʿAkkā — Acre, capital of the rump Kingdom of Jerusalem
      since Saladin's reconquest of Jerusalem itself a century
      earlier, the largest and best-fortified Crusader stronghold
      remaining in the Levant — after a forty-three day siege.
      The Mamlūk artillery breached the outer walls in mid-May;
      the Frankish defenders, including Templars, Hospitallers,
      Teutonic Knights, and the orders' grand masters, fought a
      house-by-house defence as the Genoese and Venetian galleys
      evacuated those they could. The Templar tower on the sea
      collapsed under sappers' mining ten days after the city
      itself fell, killing the Mamlūks who had clambered onto
      the breach as well as the Templars within. Within months
      Tyre, Sidon, Beirut, Haifa, and the remaining Crusader
      coastal positions surrendered without further fighting.
      The fall of Acre is the textbook closing date of the
      Crusades in the Levant, ending two centuries of Crusader
      presence in the Holy Land.
    description_ar: |
      افتتح السلطان الأشرف صلاح الدين خليل بن قلاوون عكا
      — عاصمة بقايا مملكة بيت المقدس الصليبية منذ استرداد
      صلاح الدين القدسَ قبل قرن، وأكبر معاقل الصليبيين بقاءً
      في الشام وأمنعها — بعد حصار ثلاثة وأربعين يوماً. ضربت
      المدفعية المملوكية الأسوار الخارجية في منتصف مايو
      فثلمتها؛ وقاتل الفرنج فيها — من فرسان الهيكل والإسبتارية
      والفرسان الألمان وقادة طوائفهم — قتالاً من بيت إلى بيت
      بينما أَقَلَّت سفن جنوة وبيزة من استطاعت إنقاذه. وانهار
      برج الهيكل البحري بنقب المماليك له بعد عشرة أيام من
      سقوط المدينة، فمات فيه المماليك المتسلقون على ثلمته
      ومن في البرج من فرسان الهيكل. وفي أشهر استسلمت صور
      وصيدا وبيروت وحيفا وما تبقى من المواقع الساحلية
      الصليبية بلا قتال. وسقوط عكا تاريخ الإغلاق الكتابي
      للحملات الصليبية بالشام، ونهاية الوجود الصليبي بأرض
      المقدس بعد قرنين.
    description_fr: |
      Le sultan al-Ashraf Ṣalāḥ al-Dīn Khalīl ibn Qalāwūn prit
      ʿAkkā — Acre, capitale du royaume résiduel de Jérusalem
      depuis la reconquête de Jérusalem elle-même par Saladin un
      siècle plus tôt, la plus grande et la mieux fortifiée des
      places fortes croisées encore tenues au Levant — après un
      siège de quarante-trois jours. L'artillerie mamelouke
      brèche les remparts extérieurs à la mi-mai; les défenseurs
      francs — Templiers, Hospitaliers, Chevaliers teutoniques
      et les grands maîtres de leurs ordres — livrèrent une
      défense maison par maison tandis que les galères génoises
      et vénitiennes évacuaient ce qu'elles purent. La tour
      templière sur la mer s'effondra sous le travail de sape
      des Mamelouks dix jours après la chute de la ville
      elle-même, tuant aussi bien les Mamelouks grimpés sur la
      brèche que les Templiers à l'intérieur. En quelques mois
      Tyr, Sidon, Beyrouth, Haïfa et les autres positions
      côtières croisées se rendirent sans nouveau combat. La
      chute d'Acre est la date de clôture canonique des
      croisades au Levant, fin de deux siècles de présence
      croisée en Terre sainte.
    canonical_hijri: {year: 690, month: 5, day: 17, precision: day}
    canonical_gregorian: {date: 1291-05-18, precision: day, method: attested}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya gives the date 17 Jumādā al-Ūlā 690 AH for the storming of the city."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the conquest under the events of 690 AH and confirms the day."
    people: [[al-ashraf-khalil, leader]]
    tags: [mamluk, crusades, acre, palestine, levant, siege, ashraf-khalil]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # SCHOLAR — CHRONICLER OF THE ERA
  # =========================================================================

  - slug: death-of-sibt-ibn-al-jawzi
    category: scholar_death
    title_en: Death of Sibṭ ibn al-Jawzī — Damascene Historian and Preacher
    title_ar: وفاة سبط بن الجوزي — مؤرخ دمشق وواعظها
    title_fr: Mort de Sibṭ ibn al-Jawzī — historien et prédicateur de Damas
    description_en: |
      Shams al-Dīn Abū al-Muẓaffar Yūsuf ibn Qizoghlū — known by
      the laqab *Sibṭ ibn al-Jawzī*, "the grandson of Ibn al-Jawzī"
      (his maternal grandfather being the Hanbali polymath
      ʿAbd al-Raḥmān ibn al-Jawzī of Baghdad, d. 597 AH) —
      Damascene historian, preacher, and Hanafi (later Shāfiʿī)
      jurist, died at Damascus at age about 73. His chronicle
      *Mirʾāt al-Zamān fī Tārīkh al-Aʿyān* ("Mirror of the Age
      on the History of Notables") is a primary contemporary
      source for late-Ayyūbid Syria, the Crusader-Khwārazmian
      collisions of the 640s AH, and the early Mamlūk
      transition; he was an eyewitness to the Khwārazmian sack
      of Jerusalem in 642 AH and to the Mongol approach toward
      Syria. His sermons in the Umayyad Mosque drew massive
      crowds — the Damascene populace would assemble before
      Friday prayer specifically to hear him — and his eloquence
      is praised by Ibn Khallikān, Ibn Kathīr, and al-Dhahabī.
      The *Mirʾāt* survives in multiple manuscript recensions
      and remains a load-bearing source in modern scholarship
      on the period.
    description_ar: |
      توفي شمس الدين أبو المظفر يوسف بن قز أُغلي — المعروف
      بسبط ابن الجوزي (نسبة إلى جده لأمه الإمام الحنبلي
      الموسوعي عبد الرحمن بن الجوزي البغدادي ت ٥٩٧ هـ) —
      مؤرخ دمشق وواعظها، وفقيهها على المذهب الحنفي ثم
      الشافعي، بدمشق عن نحو ثلاث وسبعين سنة. وتاريخه «مرآة
      الزمان في تاريخ الأعيان» مصدر أصلي معاصر لتاريخ الشام
      أواخر عهد الأيوبيين، ومصادمات الصليبيين والخوارزمية في
      الأربعينيات من القرن السابع الهجري، وانتقال السلطة
      إلى المماليك؛ وكان شاهد عيان على هجوم الخوارزمية على
      القدس سنة ٦٤٢ هـ، وعلى زحف المغول نحو الشام. وكانت
      مواعظه في الجامع الأموي تجذب الجموع — يجتمع أهل دمشق
      قبل الجمعة خصيصاً لسماعه — وقد أثنى على فصاحته ابن
      خلكان وابن كثير والذهبي. ولا تزال «المرآة» مصدراً
      حاملاً في الدراسات الحديثة عن هذه الحقبة، وقد بقيت
      منها نسخ خطية متعددة.
    description_fr: |
      Shams al-Dīn Abū al-Muẓaffar Yūsuf ibn Qizoghlū — connu
      sous le laqab *Sibṭ ibn al-Jawzī*, « le petit-fils d'Ibn
      al-Jawzī » (son grand-père maternel étant le polymathe
      hanbalite ʿAbd al-Raḥmān ibn al-Jawzī de Bagdad, m. 597 H)
      — historien, prédicateur et juriste hanafite (puis
      shāfiʿite) damascène, mourut à Damas à l'âge d'environ 73
      ans. Sa chronique *Mirʾāt al-Zamān fī Tārīkh al-Aʿyān*
      (« Miroir de l'Époque sur l'Histoire des Notables ») est
      une source primaire contemporaine pour la Syrie ayyoubide
      tardive, les collisions croisées-khwārazmiennes des
      années 640 H et la transition mamelouke précoce; il fut
      témoin oculaire du sac de Jérusalem par les Khwārazmiens
      en 642 H et de l'approche mongole vers la Syrie. Ses
      sermons à la mosquée omeyyade attiraient des foules
      massives — la population damascène se rassemblait avant
      la prière du vendredi spécifiquement pour l'entendre —
      et son éloquence est louée par Ibn Khallikān, Ibn Kathīr
      et al-Dhahabī. Le *Mirʾāt* survit en plusieurs recensions
      manuscrites et reste une source porteuse dans l'érudition
      moderne sur la période.
    canonical_hijri: {year: 654, precision: year}
    canonical_gregorian: {date: 1257-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Ibn Khallikān gives the standard biographical entry placing the death in 654 AH at Damascus."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya enters the death under 654 AH and praises the Mirʾāt al-Zamān."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the death under the obituaries of 654 AH."
    people: [[sibt-ibn-al-jawzi, subject]]
    tags: [scholar, historian, damascus, ayyubid, mamluk, preaching, hanafi]
    importance: notable
    verified: true
    verification_status: cross_verified
