  # =========================================================================
  # 642 AH — THE KHWARAZMIAN CATASTROPHE AT JERUSALEM AND LA FORBIE
  # =========================================================================

  - slug: khwarazmian-sack-of-jerusalem
    category: siege
    title_en: Khwārazmian Sack of Jerusalem — Loss of the Holy City to Mercenaries
    title_ar: سقوط بيت المقدس على الخوارزمية — كارثة بيت المقدس
    title_fr: Sac de Jérusalem par les Khwārazmiens — perte de la Ville sainte aux mercenaires
    description_en: |
      The mercenary remnants of Jalāl al-Dīn Khwārazmshāh's army
      — some 10 000 horsemen displaced from their Iranian
      homeland by the Mongol conquest, employed by the Ayyūbid
      sultan al-Ṣāliḥ Najm al-Dīn Ayyūb against his Damascene
      cousins and the Crusader Kingdom of Jerusalem — broke
      into Jerusalem after a brief siege of the Crusader
      garrison and conducted a sack so destructive that the
      Frankish chronicler Matthew Paris and the Damascene
      historian Sibṭ ibn al-Jawzī both describe a fire that
      consumed the Holy Sepulchre's relics, the slaughter of
      civilians who emerged under safe-conduct, and the
      desecration of Christian tombs. The Crusader population
      that survived fled to Jaffa. Within months al-Ṣāliḥ Ayyūb
      had used the Khwārazmians as the spearhead of his
      victory at Hirbiyā (La Forbie); he then turned on them
      himself two years later when their plundering became
      uncontrollable, breaking them as a force outside Damascus
      in 644 AH. Jerusalem would remain in Muslim hands for the
      next 673 years.
    description_ar: |
      دخل بقايا جند جلال الدين خوارزم شاه — نحو عشرة آلاف فارس
      تشرّدوا من بلادهم الإيرانية بفتح المغول، استخدمهم السلطان
      الأيوبي الصالح نجم الدين أيوب على أقاربه أيوبيي دمشق
      وعلى مملكة بيت المقدس الصليبية — مدينةَ القدس بعد حصار
      وجيز للحامية الصليبية، وفعلوا بها فعلاً من القتل والنهب
      أَفَزَع المؤرخَ الفرنجي ماثيو باريس والمؤرخَ الدمشقي سبط
      ابن الجوزي معاً، فيذكران حريقاً أكل ذخائر القمامة، وذبحاً
      لمن خرج من المدنيين بأمان، وانتهاكاً لقبور النصارى. وفرّ
      من نجا من سكان القدس الصليبيين إلى يافا. وفي أشهر
      استخدم الصالح أيوب الخوارزميةَ رأس حربه في نصره بحربية
      (لا فوربي)؛ ثم انقلب عليهم نفسه بعد سنتين حين فلت أمرهم
      وأمعنوا في النهب، فكسرهم قواً عند دمشق سنة ٦٤٤ هـ.
      وبقيت بيت المقدس في يد المسلمين بعد ذلك ٦٧٣ سنة.
    description_fr: |
      Les vestiges mercenaires de l'armée de Jalāl al-Dīn
      Khwārazmshāh — quelque 10 000 cavaliers déracinés de leur
      patrie iranienne par la conquête mongole, employés par le
      sultan ayyoubide al-Ṣāliḥ Najm al-Dīn Ayyūb contre ses
      cousins damascènes et le royaume croisé de Jérusalem —
      pénétrèrent dans Jérusalem après un bref siège de la
      garnison croisée et menèrent un sac si destructeur que le
      chroniqueur franc Matthieu Paris et l'historien damascène
      Sibṭ ibn al-Jawzī décrivent tous deux un incendie qui
      consuma les reliques du Saint-Sépulcre, le massacre des
      civils sortis sous sauf-conduit et la profanation des
      tombes chrétiennes. La population croisée survivante fuit
      à Jaffa. En quelques mois al-Ṣāliḥ Ayyūb avait utilisé les
      Khwārazmiens comme fer de lance de sa victoire à Hirbiyā
      (La Forbie); il se retourna ensuite contre eux deux ans
      plus tard, quand leur pillage devint incontrôlable, et les
      brisa comme force devant Damas en 644 H. Jérusalem
      resterait aux mains musulmanes pour les 673 années
      suivantes.
    canonical_hijri: {year: 642, month: 4, precision: month}
    canonical_gregorian: {date: 1244-08-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya enters the Khwārazmian capture of Jerusalem under the events of 642 AH."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the events of 642 AH including the Khwārazmian movements toward Jerusalem and Hirbiyā."
    people: [[al-salih-ayyub, leader]]
    tags: [ayyubid, khwarazm, jerusalem, crusades, mercenaries, sack]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-la-forbie-hirbiya
    category: battle
    title_en: Battle of La Forbie (Hirbiyā) — Crusader Defeat North of Gaza
    title_ar: معركة هربية — هزيمة الصليبيين شمالي غزة
    title_fr: Bataille de La Forbie (Hirbiyā) — défaite croisée au nord de Gaza
    description_en: |
      The pitched battle near the village of Hirbiyā north of
      Gaza in which the Ayyūbid–Khwārazmian alliance under the
      Egyptian general Rukn al-Dīn Baybars — not yet sultan —
      destroyed the combined Crusader–Damascene force fielded
      against al-Ṣāliḥ Ayyūb. The Damascene Ayyūbid prince
      al-Ṣāliḥ Ismāʿīl, in alliance with the Crusader Kingdom
      of Jerusalem, the Templars, the Hospitallers, and the
      Teutonic Knights, sought to break Egyptian dominance of
      the southern Levant; the engagement saw the Crusader
      cavalry initially break the Egyptian centre but be
      enveloped and annihilated by the Khwārazmian wings. The
      Master of the Hospital and the Master of the Temple were
      killed; only thirty-three Templars survived from the
      battle. Western historians rank La Forbie alongside
      Ḥaṭṭīn as a strategic catastrophe for the Crusader
      enterprise in the Levant — after Hirbiyā the Crusader
      Kingdom of Jerusalem could no longer field an army
      capable of taking the offensive.
    description_ar: |
      المعركة الميدانية عند قرية «هربية» شمالي غزة التي حطّم
      فيها الحلف الأيوبي-الخوارزمي بقيادة القائد المصري ركن
      الدين بيبرس — قبل سلطنته — القوةَ المتحدة الصليبية
      الدمشقية المنصوبة على الصالح أيوب. وكان الأمير الأيوبي
      الدمشقي الصالح إسماعيل قد تحالف مع مملكة بيت المقدس
      الصليبية وفرسان الهيكل والإسبتارية والفرسان الألمان
      ليكسر هيمنة الفرع المصري على جنوب الشام؛ فشهدت المعركة
      تكسيراً صليبياً ابتدائياً لقلب الجيش المصري، ثم احتواءً
      للجناحين الخوارزميين أحاطا بالفرسان الصليبيين فأبادهم.
      قُتل قائد الإسبتارية وقائد فرسان الهيكل، ولم ينجُ من
      فرسان الهيكل غير ثلاثة وثلاثين. ويعد المؤرخون الغربيون
      هربيةَ مع حطين كارثةً استراتيجية للمشروع الصليبي بالشام
      — فبعدها لم تستطع مملكة بيت المقدس الصليبية إخراج جيش
      قادر على الهجوم.
    description_fr: |
      La bataille rangée près du village de Hirbiyā au nord de
      Gaza durant laquelle l'alliance ayyoubide–khwārazmienne
      sous le général égyptien Rukn al-Dīn Baybars — pas encore
      sultan — détruisit la force combinée croisée–damascène
      mise en ligne contre al-Ṣāliḥ Ayyūb. Le prince ayyoubide
      damascène al-Ṣāliḥ Ismāʿīl, allié au royaume croisé de
      Jérusalem, aux Templiers, aux Hospitaliers et aux
      Chevaliers teutoniques, cherchait à briser la domination
      égyptienne sur le sud du Levant; l'engagement vit la
      cavalerie croisée briser d'abord le centre égyptien puis
      être enveloppée et anéantie par les ailes khwārazmiennes.
      Le maître de l'Hôpital et le maître du Temple furent tués;
      il ne survécut que trente-trois Templiers de la bataille.
      Les historiens occidentaux placent La Forbie aux côtés de
      Ḥaṭṭīn comme catastrophe stratégique pour l'entreprise
      croisée au Levant — après Hirbiyā, le royaume croisé de
      Jérusalem ne put plus aligner une armée capable de prendre
      l'offensive.
    canonical_hijri: {year: 642, month: 6, precision: month}
    canonical_gregorian: {date: 1244-10-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Ibn Kathīr al-Bidāya wa-l-Nihāya enters the battle under 642 AH and names the Crusader–Damascene coalition."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī enters the battle under the events of 642 AH."
    people: [[al-salih-ayyub, leader], [baybars, leader]]
    tags: [ayyubid, mamluk, khwarazm, crusades, gaza, levant]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # END OF AYYUBIDS / RISE OF MAMLUKS
  # =========================================================================

  - slug: death-of-al-salih-ayyub
    category: ruler_death
    title_en: Death of Sultan al-Ṣāliḥ Ayyūb — Last Effective Ayyūbid of Egypt
    title_ar: وفاة السلطان الصالح أيوب — آخر سلاطين بني أيوب الفعليين بمصر
    title_fr: Mort du sultan al-Ṣāliḥ Ayyūb — dernier sultan ayyoubide effectif d'Égypte
    description_en: |
      al-Malik al-Ṣāliḥ Najm al-Dīn Ayyūb ibn al-Kāmil — eighth
      Ayyūbid sultan of Egypt, the ruler whose policy of buying
      and training Turkish mamlūk regiments (the Baḥrī corps
      barracked on Rawḍa Island in the Nile) created the military
      caste that would within a year of his death seize the
      throne — died at his camp at al-Manṣūra during the Crusader
      invasion of Egypt by King Louis IX. His widow Shajar al-Durr
      concealed his death for nearly three months, signing
      decrees in his name and continuing the prosecution of the
      war until his son Tūrān Shāh could be summoned from
      Mesopotamia. The concealment held; the Mamlūk corps under
      Aybak and Baybars defeated Louis IX at Mansoura while the
      sultan was officially still "alive". Sources agree on his
      death in Shaʿbān 647 AH; Ibn Wāṣil and Ibn Kathīr give
      14 Shaʿbān as the day, but the public announcement was
      delayed.
    description_ar: |
      توفي السلطان الملك الصالح نجم الدين أيوب بن الكامل —
      ثامن سلاطين بني أيوب بمصر، والسلطان الذي وضع سياسة شراء
      المماليك الترك وتدريبهم (فرقة المماليك البحرية المقيمة
      بجزيرة الروضة بالنيل)، فأنشأ بذلك الطبقة العسكرية التي
      ستستولي على عرشه خلال سنة من وفاته — في معسكره
      بالمنصورة إبان غزو الحملة الصليبية السابعة لمصر بقيادة
      الملك لويس التاسع. وكتمت أرملته شجر الدر موته نحو ثلاثة
      أشهر، توقّع المراسيم باسمه وتدير الحرب، حتى استُدعي
      ابنه توران شاه من ديار الجزيرة. وثبت الكتمان؛ فهزم
      المماليك بقيادة أيبك وبيبرس لويس التاسع في معركة
      المنصورة والسلطان رسمياً «حي». واتفقت المصادر على وفاته
      في شعبان سنة ٦٤٧ هـ؛ ويذكر ابن واصل وابن كثير أن ذلك
      كان في الرابع عشر من شعبان، إلا أن الإعلان أُخّر.
    description_fr: |
      al-Malik al-Ṣāliḥ Najm al-Dīn Ayyūb ibn al-Kāmil — huitième
      sultan ayyoubide d'Égypte, le souverain dont la politique
      d'achat et d'entraînement de régiments mamelouks turcs (le
      corps baḥrī cantonné sur l'île de Rawḍa dans le Nil) créa
      la caste militaire qui s'emparerait du trône moins d'un
      an après sa mort — mourut à son camp d'al-Manṣūra durant
      l'invasion croisée de l'Égypte par le roi Louis IX. Sa
      veuve Shajar al-Durr dissimula sa mort pendant près de
      trois mois, signant des décrets en son nom et continuant
      la conduite de la guerre jusqu'à ce que son fils Tūrān
      Shāh fût mandé de Mésopotamie. La dissimulation tint; le
      corps mamelouk sous Aybak et Baybars défit Louis IX à
      Mansourah tandis que le sultan était officiellement
      « vivant ». Les sources s'accordent sur sa mort en Shaʿbān
      647 H; Ibn Wāṣil et Ibn Kathīr donnent le 14 Shaʿbān, mais
      l'annonce publique fut différée.
    canonical_hijri: {year: 647, month: 8, precision: month}
    canonical_gregorian: {date: 1249-11-01, precision: month, method: tabular_conversion}
