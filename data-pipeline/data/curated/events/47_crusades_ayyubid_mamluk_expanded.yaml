# Wave 47 of curated event additions (2026-04-27).
# 13 Crusades-era / Ayyubid / Mamluk events, beyond the headline events
# (Hattin, Mansoura, ʿAyn Jalut) already in the dataset.
# Covers: Zengi, Marj ʿAyun, Aqṣa minbar, Arsuf, al-Kamil's death,
# Khwarazmian sack of Jerusalem, Battle of La Forbie, Jalal al-Din
# Khwarazmshah, al-Salih Ayyub, Turan Shah, Tripoli, Acre, Sibṭ ibn al-Jawzi.
# All events attested in classical Sunni sources (Ibn al-Athir al-Kamil,
# Ibn Kathir al-Bidaya wa-l-Nihaya, al-Dhahabi Tarikh al-Islam, Ibn
# Khallikan Wafayat). Trilingual (en/ar/fr).

events:
  # =========================================================================
  # ZENGID + AYYUBID FOUNDATIONS
  # =========================================================================

  - slug: assassination-of-imad-al-din-zengi
    category: ruler_death
    title_en: Assassination of ʿImād al-Din Zengī — Founder of the Zangid Counter-Crusade
    title_ar: مقتل عماد الدين زنكي — مؤسس مشروع الجهاد الزنكي ضد الصليبيين
    title_fr: Assassinat d'ʿImād al-Dīn Zengī — fondateur de la contre-croisade zangide
    description_en: |
      ʿImad al-Din Zengī ibn Aq Sunqur, atabeg of Mosul and
      Aleppo and the first Muslim ruler to mount a sustained
      counter-offensive against the Crusader states — was
      assassinated in his tent during the siege of Qalʿat Jaʿbar
      on the upper Euphrates, killed by a Frankish slave
      (*ghulām*) named Yarunqush who had been disciplined for
      drinking from the sultan's cup. His most consequential
      achievement was the recapture of the Crusader County of
      Edessa (al-Ruhā) in 539 AH (1144 CE) — the first major
      Muslim reconquest from the Franks since the First Crusade,
      which provoked the Second Crusade in response. He was
      succeeded in Aleppo by his son Nūr al-Dīn Maḥmūd, who
      would unite Muslim Syria and pave the way for Saladin's
      reconquest of Jerusalem. Ibn al-Athīr — whose father had
      served Zengī — devotes a substantial section of *al-Kamil*
      to him as the originator of the *jihād* movement against
      the Crusaders.
    description_ar: |
      اغتيل الأتابك عماد الدين زنكي بن آق سنقر — صاحب الموصل
      وحلب، وأول الحكام المسلمين الذين شنوا ردةً مستدامة على
      الدول الصليبية — في خيمته أثناء حصار قلعة جعبر على الفرات
      الأعلى، قتله غلامه «يارنقش» الفرنجي بعد أن عاقبه السلطان
      على شربه من إنائه. وأبرز أعماله استرداد إمارة الرها
      الصليبية سنة ٥٣٩ هـ (١١٤٤ م) — أول استرداد إسلامي كبير من
      الفرنج منذ الحملة الصليبية الأولى، وكان السبب في إطلاق
      الحملة الثانية عليه. وخلفه على حلب ابنه نور الدين محمود
      الذي وحَّد الشام وجعل من فتح القدس على يد صلاح الدين
      أمراً ممكناً. وأفرد ابن الأثير — الذي خدم أبوه زنكياً —
      فصلاً كبيراً من «الكامل في التاريخ» يجعله فيه مفتتح حركة
      الجهاد ضد الصليبيين.
    description_fr: |
      ʿImād al-Dīn Zengī ibn Āq Sunqur, atabeg de Mossoul et
      d'Alep et le premier souverain musulman à monter une
      contre-offensive soutenue contre les États croisés — fut
      assassiné dans sa tente lors du siège de la forteresse de
      Qalʿat Jaʿbar sur l'Euphrate supérieur, tué par un esclave
      (*ghulām*) franc nommé Yarunqush qui avait été châtié pour
      avoir bu à la coupe du sultan. Son fait d'armes le plus
      conséquent fut la reconquête du comté croisé d'Édesse
      (al-Ruhā) en 539 H (1144 EC) — la première grande
      reconquête musulmane sur les Francs depuis la première
      croisade, qui provoqua la deuxième croisade en réaction.
      Il fut remplacé à Alep par son fils Nūr al-Dīn Maḥmūd, qui
      unifia la Syrie musulmane et rendit possible la reconquête
      de Jérusalem par Saladin. Ibn al-Athīr — dont le père
      avait servi Zengī — consacre une large section de *al-Kāmil*
      à le présenter comme l'initiateur du mouvement de *jihād*
      contre les Croisés.
    canonical_hijri: {year: 541, month: 3, precision: month}
    canonical_gregorian: {date: 1146-09-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr (whose family served Zengī) places the assassination at Qalʿat Jaʿbar in Rabīʿ al-Awwal 541 AH and details the killing by his Frankish ghulām Yarunqush."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 541 AH and the circumstances at Qalʿat Jaʿbar."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān gives the standard biographical entry placing his death in 541 AH."
    people: [[nur-al-din-zanki, subject]]
    tags: [zangid, syria, mosul, aleppo, crusades, edessa, jihad, assassination]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-marj-ayun
    category: battle
    title_en: Battle of Marj ʿAyūn — Saladin's Victory over the Jerusalem Crusaders
    title_ar: معركة مرج عيون — انتصار صلاح الدين على فرنجة بيت المقدس
    title_fr: Bataille de Marj ʿAyūn — victoire de Saladin sur les Croisés de Jérusalem
    description_en: |
      Ṣalāh al-Dīn al-Ayyūbī defeated the Crusader army of King
      Baldwin IV of Jerusalem and the Templar Grand Master
      Odo de Saint-Amand at Marj ʿAyūn ("the Meadow of Springs"),
      a valley on the upper Litani river between southern Lebanon
      and northern Galilee. The Crusader vanguard had advanced
      to intercept Saladin's raiding force returning from a
      reconnaissance toward Banyas; the main Crusader column
      arrived disordered after a forced march and was caught at
      noon when men and horses were unfit to fight. Odo de
      Saint-Amand was captured and died in Damascene captivity;
      Baldwin IV escaped only with difficulty. The victory
      cleared the road to the Crusader frontier castle of Bayt
      al-Aḥzān (Châtelet) at Jacob's Ford, which Saladin took
      and razed in Rabīʿ al-Awwal 575 AH — a strategic prelude
      to the campaign that would culminate at Ḥaṭṭīn eight years
      later.
    description_ar: |
      هزم السلطان صلاح الدين الأيوبي جيش الصليبيين بقيادة
      الملك بلدوين الرابع ملك بيت المقدس وقائد فرسان الهيكل
      أودو دو سان أمان في «مرج عيون» — وادٍ على أعلى نهر
      الليطاني بين جنوب لبنان وشمال الجليل. كان طليعة الصليبيين
      قد تقدمت لاعتراض غارة الإسلاميين العائدة من استطلاع نحو
      بانياس، فلحقها رتلهم الكبير على عجل بعد مسير منهك،
      فأدركهم الإسلاميون عند الظهيرة وقد أعيت الرجالَ والخيلَ
      الحركةُ. وأُسر أودو دو سان أمان فمات في الأسر بدمشق،
      ولم ينجُ بلدوين الرابع إلا بصعوبة. وفتح النصر الطريق
      إلى حصن «بيت الأحزان» (الشاتليه) عند وعر يعقوب، الذي
      افتتحه صلاح الدين ودكّه في ربيع الأول سنة ٥٧٥ هـ —
      تمهيداً استراتيجياً للحملة التي ستتوج بحطين بعد ثماني
      سنوات.
    description_fr: |
      Ṣalāh al-Dīn al-Ayyūbī battit l'armée croisée du roi
      Baudouin IV de Jérusalem et du grand maître templier
      Odon de Saint-Amand à Marj ʿAyūn (« la prairie des
      sources »), une vallée sur le haut Litani entre le sud
      du Liban et le nord de la Galilée. L'avant-garde croisée
      s'était portée pour intercepter une force de raid de
      Saladin revenant d'une reconnaissance vers Banyas; la
      colonne principale arriva en désordre après une marche
      forcée et fut surprise à midi alors que hommes et chevaux
      étaient inaptes au combat. Odon de Saint-Amand fut capturé
      et mourut en captivité damascène; Baudouin IV ne s'échappa
      qu'avec peine. La victoire dégagea la route vers la
      forteresse-frontière croisée de Bayt al-Aḥzān (le Châtelet)
      au gué de Jacob, que Saladin prit et rasa en Rabīʿ al-Awwal
      575 H — un prélude stratégique à la campagne qui culminerait
      à Ḥaṭṭīn huit ans plus tard.
    canonical_hijri: {year: 575, month: 4, precision: month}
    canonical_gregorian: {date: 1179-06-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr places the Marj ʿAyūn engagement and the subsequent destruction of Bayt al-Aḥzān in 575 AH (Rabīʿ al-Awwal for the latter)."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr confirms the engagement in 575 AH and notes Odo de Saint-Amand's capture."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām enters the engagement under the events of 575 AH."
    people: [[salahuddin-al-ayyubi, leader]]
