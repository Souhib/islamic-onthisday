  - slug: death-of-umar-al-suhrawardi
    category: scholar
    title_en: Death of ʿUmar al-Suhrawardī — author of ʿAwārif al-Maʿārif
    title_ar: وفاة عمر السهروردي — صاحب «عوارف المعارف»
    title_fr: Mort d'ʿUmar al-Suhrawardī — auteur des ʿAwārif al-Maʿārif
    description_en: |
      Shihab al-Din Abu Ḥafṣ ʿUmar ibn Muḥammad al-Suhrawardi —
      Persian Shafiʿi jurist, nephew and successor of Abu al-Najib,
      and the figure who completed the final classical formalisation
      of the Suhrawardiyya ṭarīqa — died in Baghdad at age about
      89. His *ʿAwārif al-Maʿārif* ("Bestowals of Gnoses") is the
      single most influential Sufi manual of the entire Sunni
      tradition: a synthesis of doctrine, ethics, and the practice
      of the ṭarīqa across some sixty chapters that became the
      curriculum text in Suhrawardi, Chishti, and Qadiri convents
      from Anatolia to Bengal for the next seven centuries. He
      served as official emissary for caliphs al-Nāṣir li-Dīn
      Allah and al-Mustanṣir to Saljuq, Khwarazmshah, and Ayyubid
      courts. His pupils included Saʿdi of Shiraz and Bahaʾ al-Din
      Zakariyya Multani — through whom the Suhrawardiyya entered
      the Indian subcontinent.
    description_ar: |
      توفي شهاب الدين أبو حفص عمر بن محمد السهروردي — العالم الفارسي
      الشافعي، ابن أخي أبي النجيب وخليفته، الذي أنجز التأطير
      الكلاسيكي النهائي للطريقة السهروردية — ببغداد عن نحو تسع
      وثمانين سنة. وكتابه «عوارف المعارف» أعظم ما صنّف في التصوف
      السني تأثيراً على الإطلاق: جامع للعقيدة والأخلاق وعمل الطريقة
      في نحو ستين باباً، صار المنهج المعتمد في رباطات السهروردية
      والشاذلية والقادرية والشيشتية من الأناضول إلى البنغال سبعة
      قرون. وقد ندبه الخليفتان الناصر لدين الله والمستنصر سفيراً
      رسمياً إلى بلاطات السلاجقة والخوارزمشاهية والأيوبية. وأخذ عنه
      سعدي الشيرازي وبهاء الدين زكريا الملتاني الذي بطريقه دخلت
      السهروردية شبه القارة الهندية.
    description_fr: |
      Shihāb al-Dīn Abū Ḥafṣ ʿUmar ibn Muḥammad al-Suhrawardī —
      juriste shāfiʿite d'origine perse, neveu et successeur d'Abū
      al-Najīb, et la figure qui acheva la formalisation classique
      définitive de la *ṭarīqa Suhrawardiyya* — mourut à Bagdad à
      l'âge d'environ 89 ans. Son *ʿAwārif al-Maʿārif* (« Dons des
      Gnoses ») est le manuel soufi le plus influent de toute la
      tradition sunnite : synthèse de doctrine, d'éthique et de
      pratique de la *ṭarīqa* en quelque soixante chapitres,
      devenue le texte du curriculum dans les couvents
      Suhrawardiyya, Chishtiyya et Qādiriyya, de l'Anatolie au
      Bengale durant sept siècles. Il servit d'émissaire officiel
      pour les califes al-Nāṣir li-Dīn Allāh et al-Mustanṣir auprès
      des cours saljūqides, khwārazmshāhs et ayyoubides. Parmi ses
      élèves figurent Saʿdī de Shīrāz et Bahāʾ al-Dīn Zakariyyā
      Multānī — par qui la Suhrawardiyya entra dans le sous-
      continent indien.
