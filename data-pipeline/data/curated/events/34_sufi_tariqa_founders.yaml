  - slug: death-of-yusuf-al-hamadani
    category: scholar
    title_en: Death of Yūsuf al-Hamadānī — Khwajagan precursor
    title_ar: وفاة يوسف الهمذاني — أصل سلسلة الخواجگان
    title_fr: Mort de Yūsuf al-Hamadānī — précurseur des Khwājagān
    description_en: |
      Abu Yaʿqub Yusuf ibn Ayyub al-Hamadani — Persian Shafiʿi
      jurist trained in Baghdad under Abu Isḥaq al-Shirazi, then
      settled at Merv, and the first of the Central Asian masters
      named *Khwājagān* ("the Masters") whose silsila would later
      crystallise as the Naqshbandi ṭarīqa — died near Merv at age
      about 95. His four named successors — ʿAbdullah Barqi, Ḥasan
      al-Andaqi, Aḥmad Yasawi, and ʿAbd al-Khaliq al-Ghujdawani —
      branched the Khwajagan into two great streams: the Yasawiyya
      (through Yasawi, dominant later in the Turkic steppe) and
      the Naqshbandiyya (through Ghujdawani, the line that would
      reach Bahaʾ al-Din Naqshband). His reported teachings on
      *suḥba* (companionship of a master) and *dhikr khafī* (silent
      remembrance) became the two non-negotiable principles of
      the Naqshbandi path two centuries later.
    description_ar: |
      توفي أبو يعقوب يوسف بن أيوب الهمذاني — العالم الفارسي الشافعي،
      تلميذ أبي إسحاق الشيرازي ببغداد، استوطن مرو، وأول مشايخ آسيا
      الوسطى الذين سُمّوا «الخواجگان» — كبار المشايخ — الذين تحولت
      سلسلتهم لاحقاً إلى الطريقة النقشبندية — قرب مرو عن نحو خمس
      وتسعين سنة. وقد أنجب أربعة من خلفائه: عبد الله البرقي والحسن
      الأندقي وأحمد اليسوي وعبد الخالق الغجدواني، فتفرعت سلسلة
      الخواجگان عند خليفتيه الأخيرين إلى تيارين عظيمين: اليسوية
      (عبر اليسوي، فسادت في بادية الترك من بعد) والنقشبندية (عبر
      الغجدواني، وهي السلسلة التي وصلت إلى بهاء الدين نقشبند).
      وصارت تعاليمه المأثورة في الصحبة والذكر الخفي ركيزتين
      أصليتين في الطريقة النقشبندية بعد نحو قرنين من وفاته.
    description_fr: |
      Abū Yaʿqūb Yūsuf ibn Ayyūb al-Hamadānī — juriste shāfiʿite
      d'origine perse, formé à Bagdad sous Abū Isḥāq al-Shīrāzī,
      puis établi à Merv, et le premier des maîtres centrasiatiques
      appelés *Khwājagān* (« les Maîtres ») dont la *silsila* allait
      cristalliser plus tard comme la *ṭarīqa Naqshbandiyya* —
      mourut près de Merv à l'âge d'environ 95 ans. Ses quatre
      successeurs nommés — ʿAbdallāh Barqī, Ḥasan al-Andaqī, Aḥmad
      Yasawī et ʿAbd al-Khāliq al-Ghujdawānī — bifurquèrent les
      Khwājagān en deux grands courants : la Yasawiyya (par Yasawī,
      dominante plus tard dans la steppe turcique) et la
      Naqshbandiyya (par Ghujdawānī, la lignée qui atteindrait
      Bahāʾ al-Dīn Naqshband). Ses enseignements rapportés sur la
      *ṣuḥba* (compagnie du maître) et le *dhikr khafī* (rappel
      silencieux) devinrent les deux principes non négociables de
      la voie naqshbandiyya deux siècles plus tard.
