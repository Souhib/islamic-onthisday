  - slug: death-of-abd-al-wahhab-al-sharaani
    category: scholar
    title_en: Death of ʿAbd al-Wahhāb al-Shaʿrānī
    title_ar: وفاة عبد الوهاب الشعراني
    title_fr: Mort de ʿAbd al-Wahhāb al-Shaʿrānī
    description_en: |
      ʿAbd al-Wahhab ibn Aḥmad al-Shaʿrani — Egyptian Shafiʿi
      jurist, Ashʿari theologian, and Shadhili Sufi who founded
      the Shaʿrawiyya sub-branch of the Shadhili ṭarīqa — died
      in Cairo at age about 75. His *al-Ṭabaqāt al-Kubrā* —
      strictly *Lawāqiḥ al-Anwār fī Ṭabaqāt al-Akhyār* — is the
      single most important biographical dictionary of Sufi shaykhs
      written within the late classical Sunni tradition: it
      preserves the lives, sayings, and miracle-traditions of
      hundreds of Sufi masters from al-Junayd to his own
      contemporaries, with explicit reformist concern for
      distinguishing genuine ṭarīqa figures from "frauds and
      impostors posing as Sufis." His parallel *al-Mīzān al-
      Kubrā* attempted a fiqh-level reconciliation of the four
      Sunni madhāhib by harmonising their rulings on a graded
      "lighter / heavier" scale. He left more than three hundred
      works.
    description_ar: |
      توفي الإمام عبد الوهاب بن أحمد الشعراني — العالم المصري الفقيه
      الشافعي، والمتكلم الأشعري، والصوفي الشاذلي الذي أسس فرع
      الشعراوية من الشاذلية — بالقاهرة عن نحو خمس وسبعين سنة. وكتابه
      «الطبقات الكبرى» — وهو على الحقيقة «لواقح الأنوار في طبقات
      الأخيار» — من أعظم كتب الطبقات الصوفية في التراث السني
      الكلاسيكي المتأخر تأثيراً: حفظ سير المئات من شيوخ التصوف
      وأقوالهم وكراماتهم من لدن الجنيد إلى عصره، مع همّ إصلاحي
      صريح في التمييز بين أهل الطريق المعتبرين و«المتشيخين
      المزيّفين». ومن نظائره «الميزان الكبرى» الذي حاول فيه التوفيق
      الفقهي بين المذاهب السنية الأربعة بترتيب الأحكام على ميزان
      «الأخف فالأثقل». وترك ما يربو على ثلاثمئة مصنف.
    description_fr: |
      ʿAbd al-Wahhāb ibn Aḥmad al-Shaʿrānī — juriste shāfiʿite
      égyptien, théologien ashʿarite et soufi shādhilī qui fonda
      la sous-branche shaʿrāwiyya de la *ṭarīqa Shādhiliyya* —
      mourut au Caire à l'âge d'environ 75 ans. Sa *al-Ṭabaqāt
      al-Kubrā* — à proprement parler *Lawāqiḥ al-Anwār fī
      Ṭabaqāt al-Akhyār* — est le dictionnaire biographique de
      shaykhs soufis le plus important écrit dans la tradition
      sunnite classique tardive : il préserve les vies, paroles
      et traditions miraculeuses de centaines de maîtres soufis
      d'al-Junayd à ses propres contemporains, avec un souci
      réformiste explicite de distinguer les figures authentiques
      de la *ṭarīqa* des « fraudeurs et imposteurs se faisant
      passer pour soufis ». Sa *al-Mīzān al-Kubrā* parallèle
      tenta une réconciliation au niveau du *fiqh* des quatre
      *madhāhib* sunnites en harmonisant leurs décisions sur une
      échelle graduée du « plus léger au plus lourd ». Il laissa
      plus de trois cents ouvrages.
    canonical_hijri: {year: 973, precision: year}
    canonical_gregorian: {date: 1566-01-17, precision: year, method: tabular_conversion}
