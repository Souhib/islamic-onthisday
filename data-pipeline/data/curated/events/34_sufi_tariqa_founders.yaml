  - slug: death-of-ahmad-al-badawi
    category: scholar
    title_en: Death of Aḥmad al-Badawī — founder of the Badawiyya
    title_ar: وفاة أحمد البدوي — مؤسس الطريقة البدوية
    title_fr: Mort d'Aḥmad al-Badawī — fondateur de la Badawiyya
    description_en: |
      Aḥmad ibn ʿAli al-Badawi al-Sayyid — Fez-born shaykh of
      claimed sharifian descent who settled at Tanta in the western
      Nile Delta in 634 AH and made it the centre of the Badawiyya
      ṭarīqa, today the largest indigenous Sufi order in Egypt and
      among the most popular pilgrimage cults of the Sunni Arab
      world — died at Tanta at age about 79. His annual *mawlid*
      at Tanta draws between one and three million pilgrims yearly
      and is the largest popular religious festival in the Arab
      Sunni world after the Hajj itself. The Badawiyya is
      distinctive for its emphasis on silent retreat (he is said
      to have spent forty days motionless on the rooftop of his
      Tanta zāwiya) and for the red-banner tradition of its
      affiliates. His pupils included ʿAbd al-ʿAl, the second
      master of the Badawiyya, through whom the order expanded
      into Upper Egypt and the Sudan.
    description_ar: |
      توفي السيد أحمد بن علي البدوي الفاسي الأصل الحسيني النسب —
      الذي استوطن طنطا بدلتا غرب النيل سنة ٦٣٤ هـ وجعلها مركز
      الطريقة البدوية، أكبر الطرق الصوفية المصرية اليوم، وأكثر مزارات
      الزيارة ذيوعاً في العالم العربي السني — بطنطا عن نحو تسع
      وسبعين سنة. ومولده السنوي بطنطا يستقطب ما بين المليون والثلاثة
      ملايين زائر كل عام، وهو أعظم حشد ديني شعبي في العالم العربي
      السني بعد الحج. وتمتاز البدوية بتأكيدها الخلوة الصامتة، فيُروى
      أن البدوي قضى أربعين يوماً ثابتاً لا يتحرك على سطح زاويته
      بطنطا، وبعلامة الراية الحمراء التي يحملها أتباعها. وأخذ عنه
      عبد العال شيخ الطريقة الثاني، الذي بطريقه اتسعت الطريقة في
      صعيد مصر والسودان.
    description_fr: |
      Aḥmad ibn ʿAlī al-Badawī al-Sayyid — shaykh né à Fès, de
      descendance sharifienne revendiquée, qui s'établit à Ṭanṭā
      dans le Delta occidental du Nil en 634 H et en fit le centre
      de la *ṭarīqa Badawiyya*, aujourd'hui le plus grand ordre
      soufi indigène d'Égypte et parmi les cultes pèlerins les
      plus populaires du monde arabe sunnite — mourut à Ṭanṭā à
      l'âge d'environ 79 ans. Son *mawlid* annuel à Ṭanṭā attire
      entre un et trois millions de pèlerins chaque année et est
      la plus grande fête religieuse populaire du monde arabe
      sunnite après le Ḥajj lui-même. La Badawiyya se distingue
      par l'accent qu'elle place sur la retraite silencieuse (il
      aurait passé quarante jours immobile sur le toit de sa
      *zāwiya* de Ṭanṭā) et par la tradition de la bannière rouge
      de ses affiliés. Parmi ses disciples figurait ʿAbd al-ʿĀl,
      second maître de la Badawiyya, par qui l'ordre s'étendit en
      Haute-Égypte et au Soudan.
    canonical_hijri: {year: 675, precision: year}
    canonical_gregorian: {date: 1276-12-01, precision: year, method: tabular_conversion}
