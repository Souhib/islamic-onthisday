  - slug: death-of-najm-al-din-al-kubra
    category: scholar
    title_en: Martyrdom of Najm al-Dīn al-Kubrā at the Mongol siege of Khwārazm
    title_ar: استشهاد نجم الدين الكبرى في حصار خوارزم المغولي
    title_fr: Martyre de Najm al-Dīn al-Kubrā au siège mongol du Khwārazm
    description_en: |
      Aḥmad ibn ʿUmar Abu al-Jannab Najm al-Din al-Kubra — founder
      of the Kubrawi ṭarīqa whose chain produced the Hamadani,
      Naqshi, Nurbakhshi, and Dhahabi sub-orders that radiated
      across Khurasan, Kashmir, and Mughal India — was killed at
      the Mongol siege and sack of Konye-Urgench, capital of
      Khwarazm, at age about 78. Unlike most of the urban Sufi
      shaykhs of his era who fled before the Mongol advance,
      al-Kubra refused to leave his city, took up arms, and (as
      the standard Sufi-historical tradition records, reported in
      Ibn al-Athir's eyewitness account of the Mongol invasion in
      *al-Kāmil fī al-Tārīkh*) was killed in the hand-to-hand
      defence of Khwarazm against the besieging army. His
      *al-Uṣūl al-ʿAshara* ("The Ten Principles") and *Fawāʾiḥ
      al-Jamāl* shape the doctrine of the Kubrawi line; through
      his pupil Saʿd al-Din Hammuya and his pupil's pupil ʿAla'
      al-Dawla Simnani his teaching reached the Persianate Sufi
      tradition of the Ilkhanate.
    description_ar: |
      استشهد الشيخ أحمد بن عمر أبو الجناب نجم الدين الكبرى — مؤسس
      الطريقة الكبروية التي تفرعت سلسلتها إلى الهمذانية والنقشية
      والنوربخشية والذهبية، فانتشرت في خراسان وكشمير والهند المغولية
      — في حصار المغول لـ«كنية أرغنج» عاصمة خوارزم وسقوطها، وهو
      في نحو الثامنة والسبعين من عمره. وعلى خلاف عامة مشايخ التصوف
      من أهل الحضر في عصره الذين فرّوا من زحف المغول، أبى الكبرى
      الفرار من مدينته، وحمل السلاح، وكما يروى في تراث الصوفية
      المؤرخ، وما رواه ابن الأثير شاهد عيان للغزو المغولي في
      «الكامل في التاريخ»، استشهد في الدفاع المباشر عن خوارزم
      مقاتلاً جنود الجيش المهاجم. ورسمت كتبه «الأصول العشرة»
      و«فوائح الجمال» عقيدة السلسلة الكبروية؛ ومن طريق تلميذه
      سعد الدين حمويه ثم تلميذ تلميذه علاء الدولة السمناني
      وصلت تعاليمه إلى التصوف الفارسي في عهد الإيلخانيين.
    description_fr: |
      Aḥmad ibn ʿUmar Abū al-Jannāb Najm al-Dīn al-Kubrā —
      fondateur de la *ṭarīqa Kubrawiyya* dont la chaîne produisit
      les sous-ordres Hamadāniyya, Naqshiyya, Nūrbakhshiyya et
      Dhahabiyya qui rayonnèrent à travers le Khurasan, le Cachemire
      et l'Inde moghole — fut tué lors du siège mongol et du sac
      de Konye-Urgench, capitale du Khwārazm, à l'âge d'environ
      78 ans. Contrairement à la plupart des shaykhs soufis urbains
      de son époque qui fuirent devant l'avance mongole, al-Kubrā
      refusa de quitter sa cité, prit les armes et (comme le
      rapporte la tradition historico-soufie standard, consignée
      dans le récit de témoin oculaire d'Ibn al-Athīr sur l'invasion
      mongole dans *al-Kāmil fī al-Tārīkh*) fut tué dans la défense
      au corps à corps du Khwārazm contre l'armée assiégeante. Son
      *al-Uṣūl al-ʿAshara* (« Les Dix Principes ») et ses *Fawāʾiḥ
      al-Jamāl* façonnent la doctrine de la lignée kubrawiyya; par
      son disciple Saʿd al-Dīn Ḥammūya et le disciple de celui-ci
      ʿAlāʾ al-Dawla Simnānī, son enseignement atteignit la
      tradition soufie persanophone de l'Ilkhanat.
    canonical_hijri: {year: 618, month: 1, precision: month}
    canonical_gregorian: {date: 1221-02-15, precision: month, method: tabular_conversion}
