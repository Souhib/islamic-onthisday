  - slug: death-of-habib-al-ajami
    category: scholar
    title_en: Death of Ḥabīb al-ʿAjamī — Basran ascetic
    title_ar: وفاة حبيب العجمي — زاهد البصرة
    title_fr: Mort de Ḥabīb al-ʿAjamī — l'ascète de Basra
    description_en: |
      Ḥabib ibn Muḥammad al-ʿAjami al-Basri — Persian-origin Basran
      ascetic of the early ascetic-Sufi (*zuhd*) generation, pupil
      of al-Ḥasan al-Baṣri, and master in turn of Dawud al-Ṭaʾi
      from whom the early Iraqi ascetic chain runs forward to
      al-Sirri al-Saqaṭi and al-Junayd al-Baghdadi — died at Basra.
      The classical sources record his death year variously as 119,
      120, 125, or 130 AH. He is consistently named in the early
      *Ṭabaqāt al-Ṣūfiyya* literature as one of the foundational
      transmitters of the Ḥasan al-Baṣri ascetic circle into the
      formal Sufi silsila, appearing in the chains of the
      Naqshbandi, Qadiri, Shadhili, and most other major Sunni
      ṭuruq. Ibn Ḥajar in *Tahdhīb al-Tahdhīb* judges him a "ṣadūq"
      hadith narrator; the early Sufi compilers (al-Sulami,
      Abu Nuʿaym in *Ḥilyat al-Awliyāʾ*) preserve his sayings and
      his celebrated repentance narrative.
    description_ar: |
      توفي الإمام حبيب بن محمد العجمي البصري — الزاهد البصري الفارسي
      الأصل من جيل التصوف الزُّهدي الأول، تلميذ الإمام الحسن البصري،
      وشيخ داود الطائي الذي تواصل به السلسلة الزُّهدية العراقية
      الأولى إلى السري السقطي والجنيد البغدادي — بالبصرة. واختلف
      أهل التراجم في سنة وفاته فقيل ١١٩ وقيل ١٢٠ وقيل ١٢٥ وقيل ١٣٠ هـ.
      وهو مذكور في عامة كتب «طبقات الصوفية» الباكرة من نواقل دائرة
      الحسن البصري الزُّهدية إلى التصوف الرسمي، يرد في أسانيد النقشبندية
      والقادرية والشاذلية وعامة الطرق السنية الكبرى. وقد قال فيه
      ابن حجر في «تهذيب التهذيب» إنه «صدوق»، وحفظ مؤلفو التصوف
      الباكرون (السلمي وأبو نعيم في «حلية الأولياء») أقواله وقصة
      توبته المشهورة.
    description_fr: |
      Ḥabīb ibn Muḥammad al-ʿAjamī al-Baṣrī — ascète basrien
      d'origine perse de la première génération ascético-soufie
      (*zuhd*), disciple d'al-Ḥasan al-Baṣrī et à son tour maître
      de Dāwūd al-Ṭāʾī par qui la chaîne ascétique irakienne
      ancienne se prolonge jusqu'à al-Sirrī al-Saqaṭī et al-Junayd
      al-Baghdādī — mourut à Basra. Les sources classiques rapportent
      diversement son année de mort comme 119, 120, 125 ou 130 H.
      Il est constamment nommé dans la littérature précoce des
      *Ṭabaqāt al-Ṣūfiyya* comme l'un des transmetteurs fondateurs
      du cercle ascétique d'al-Ḥasan al-Baṣrī vers la *silsila*
      soufie formelle, apparaissant dans les chaînes des Naqshbandiyya,
      Qādiriyya, Shādhiliyya et la plupart des autres grandes
      *ṭuruq* sunnites. Ibn Ḥajar, dans *Tahdhīb al-Tahdhīb*, le
      juge comme un narrateur de hadith *ṣadūq* ; les compilateurs
      soufis précoces (al-Sulamī, Abū Nuʿaym dans *Ḥilyat al-Awliyāʾ*)
      préservent ses paroles et le récit célèbre de son repentir.
