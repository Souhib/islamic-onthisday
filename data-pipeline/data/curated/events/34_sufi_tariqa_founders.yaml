  - slug: death-of-abu-najib-al-suhrawardi
    category: scholar
    title_en: Death of Abu Najīb al-Suhrawardī
    title_ar: وفاة أبي النجيب السهروردي
    title_fr: Mort d'Abū al-Najīb al-Suhrawardī
    description_en: |
      Abu al-Najib ʿAbd al-Qahir al-Suhrawardi — Persian Shafiʿi
      jurist trained in Baghdad, professor of Shafiʿi law at the
      Niẓāmiyya madrasa, and the founder of the Suhrawardiyya
      ṭarīqa whose final classical formalisation was completed by
      his nephew ʿUmar — died in Baghdad at age about 71. His
      *Ādab al-Murīdīn* ("Etiquette of the Spiritual Aspirants")
      established a foundational genre in Sufi adab literature,
      codifying the ethics, daily discipline, and spiritual rights
      and duties of the path within strict Sunni-Shariʿa framing;
      the work remained the model imitated by every later
      Suhrawardiyya and Naqshbandiyya manual of conduct. Among his
      direct disciples were Aḥmad al-Ghazali (younger brother of
      the philosopher) and ʿAbd al-Qadir al-Jīlani's circle. He
      lectured publicly at the Baghdad ribat he had founded on the
      west bank of the Tigris.
    description_ar: |
      توفي الإمام أبو النجيب عبد القاهر السهروردي — العالم الفارسي
      الشافعي المذهب، الذي تخرّج بمدارس بغداد ودرّس الفقه الشافعي
      بالنظامية ببغداد، ومؤسس الطريقة السهروردية التي أنجز ابن
      أخيه عمر تأطيرها الكلاسيكي النهائي — ببغداد عن نحو إحدى
      وسبعين سنة. وقد أسس كتابه «آداب المريدين» جنساً أصلياً في
      أدب التصوف، يقنن أخلاق السالكين وأوقات نظام يومهم وحقوقهم
      وواجباتهم في إطار الشريعة السنية الصارم؛ وظل المتن الذي
      تحاكيه عامة كتب الآداب اللاحقة في السهروردية والنقشبندية.
      وأخذ عنه أحمد الغزالي شقيق الفيلسوف، وحلقة عبد القادر الجيلاني.
      ودرّس علناً في رباطه الذي أسسه على الضفة الغربية من دجلة ببغداد.
    description_fr: |
      Abū al-Najīb ʿAbd al-Qāhir al-Suhrawardī — juriste shāfiʿite
      d'origine perse formé à Bagdad, professeur de droit shāfiʿite
      à la madrasa Niẓāmiyya, et fondateur de la *ṭarīqa
      Suhrawardiyya* dont la formalisation classique définitive
      sera achevée par son neveu ʿUmar — mourut à Bagdad à l'âge
      d'environ 71 ans. Son *Ādāb al-Murīdīn* (« Convenances des
      aspirants ») établit un genre fondateur dans la littérature
      *adab* soufie, codifiant l'éthique, la discipline quotidienne
      et les droits et devoirs spirituels de la voie dans un cadre
      sunnite-charʿique strict; l'ouvrage demeura le modèle imité
      par tous les manuels de conduite suhrawardiyya et
      naqshbandiyya ultérieurs. Parmi ses disciples directs figurent
      Aḥmad al-Ghazālī (frère cadet du philosophe) et le cercle
      d'ʿAbd al-Qādir al-Jīlānī. Il enseigna publiquement au
      *ribāṭ* qu'il avait fondé sur la rive ouest du Tigre à Bagdad.
