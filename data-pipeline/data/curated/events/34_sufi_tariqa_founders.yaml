  - slug: death-of-sahl-al-tustari
    category: scholar
    title_en: Death of Sahl al-Tustarī — early classical Sufi
    title_ar: وفاة سهل التستري — من أعلام التصوف الكلاسيكي الباكر
    title_fr: Mort de Sahl al-Tustarī — soufi classique ancien
    description_en: |
      Abu Muḥammad Sahl ibn ʿAbdullah al-Tustari — Persian Sunni
      Sufi mystic, contemporary and senior of al-Junayd al-Baghdadi,
      and the eponymous master of the Sālimiyya school of theology
      — died in Basra at age about 80. He was raised in Tustar in
      Khuzestan, settled later in Basra, and his short *Tafsīr* on
      the Qurʾan — preserved through his pupil Ibn Sālim — is the
      earliest substantial Sufi commentary on the Qurʾan and the
      foundational text of the genre that would culminate in
      al-Sulami's *Ḥaqāʾiq al-Tafsīr*. His doctrine of *nūr
      Muḥammadi* ("the Muhammadan light"), of the primordial
      pact and of *yaqīn* (certitude) shaped subsequent Sufi
      psychology. His *Riʿāyat al-Ḥuqūq* on spiritual rights and
      duties became a standard ascetic-ethical text. al-Hujwiri
      in *Kashf al-Maḥjūb* and al-Qushayri in *al-Risāla* both
      treat him as one of the cornerstones of the Sunni Sufi
      foundation.
    description_ar: |
      توفي أبو محمد سهل بن عبد الله التستري — الفارسي السني الصوفي،
      معاصر الجنيد البغدادي وأكبر منه سناً، وسلف الطائفة السالمية
      في علم الكلام السني — بالبصرة عن نحو ثمانين سنة. ولد بتستر
      من أرض خوزستان ثم استوطن البصرة، وله «تفسير» قصير على القرآن
      رواه عنه تلميذه ابن سالم، وهو أقدم تفسير صوفي ضخم على القرآن،
      والأصل في الجنس الذي بلغ ذروته في «حقائق التفسير» للسلمي.
      ومذهبه في «النور المحمدي» والعهد الأزلي و«اليقين» شكّل علم
      النفس الصوفي اللاحق. وكتابه «رعاية الحقوق» في الحقوق والواجبات
      الروحية صار من أصول كتب الزهد والأخلاق. وقد عدّه الهجويري في
      «كشف المحجوب» والقشيري في «الرسالة» من أركان أصول التصوف
      السني.
    description_fr: |
      Abū Muḥammad Sahl ibn ʿAbdullāh al-Tustarī — mystique soufi
      sunnite d'origine perse, contemporain et aîné d'al-Junayd
      al-Baghdādī, et le maître éponyme de l'école théologique
      sālimiyya — mourut à Basra à l'âge d'environ 80 ans. Élevé
      à Tustar au Khūzestān, établi plus tard à Basra, son court
      *Tafsīr* sur le Coran — préservé à travers son disciple
      Ibn Sālim — est le plus ancien commentaire soufi substantiel
      du Coran et le texte fondateur du genre qui culminera dans
      les *Ḥaqāʾiq al-Tafsīr* d'al-Sulamī. Sa doctrine du *nūr
      Muḥammadī* (« la lumière muḥammadienne »), du pacte primordial
      et du *yaqīn* (certitude) façonna la psychologie soufie
      ultérieure. Sa *Riʿāyat al-Ḥuqūq* sur les droits et devoirs
      spirituels devint un texte ascético-éthique standard. al-Hujwīrī
      dans *Kashf al-Maḥjūb* et al-Qushayrī dans *al-Risāla* le
      traitent tous deux comme l'un des piliers de la fondation
      soufie sunnite.
    canonical_hijri: {year: 283, precision: year}
    canonical_gregorian: {date: 896-02-25, precision: year, method: tabular_conversion}
