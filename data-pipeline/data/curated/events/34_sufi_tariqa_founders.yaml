# Wave 21 of curated event additions (2026-04-27).
# 12 deaths of foundational Sunni Sufi figures: tariqa founders, major shaykhs,
# Naqshbandi precursors, early ascetics, and the metaphysician al-Jīlī.
# All accepted in mainstream Sunni Sufi tradition. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # MAGHREBI SHAYKHS — al-Shādhilī's master + Tijāniyya founder
  # =========================================================================

  - slug: death-of-abd-al-salam-ibn-mashish
    category: scholar
    title_en: Death of ʿAbd al-Salām ibn Mashīsh — master of al-Shādhilī
    title_ar: وفاة عبد السلام بن مشيش — شيخ الشاذلي
    title_fr: Mort de ʿAbd al-Salām ibn Mashīsh — maître d'al-Shādhilī
    description_en: |
      ʿAbd al-Salam ibn Mashish al-ʿAlami al-Idrisi — Maghrebi shaykh
      of the Jabal al-ʿAlam in northern Morocco, claimed descendant
      of the Prophet ﷺ through al-Hasan ra, and the spiritual master
      to whom Abu al-Ḥasan al-Shadhili traced the foundation of his
      ṭarīqa — was killed at his mountain hermitage by a heretical
      pretender. He was about 62. He left no formal writings, but
      his short *al-Ṣalāt al-Mashīshiyya* — a celebrated litany of
      blessing upon the Prophet ﷺ — remains in active recitation
      across the Maghrebi Sufi tradition. Through his sole disciple
      al-Shadhili, the Shadhili silsila and every later Maghrebi
      Sufi chain (Darqawiyya, ʿAlawiyya, Yashruṭiyya, Madaniyya)
      passes through him; he is therefore foundational for the
      entire Maghrebi-Egyptian-Levantine Shadhili tradition. His
      shrine at Jabal al-ʿAlam remains a major pilgrimage site for
      Moroccan Sufis.
    description_ar: |
      قُتل الشيخ عبد السلام بن مشيش العَلَمي الإدريسي — شيخ المغرب
      بجبل العَلَم بشمال المغرب، الحسني النسب من ذرية النبي ﷺ، والمربي
      الذي أسند إليه أبو الحسن الشاذلي تأسيس طريقته — في خلوته بالجبل
      على يد متنبئ متهلوس، وهو في نحو الثانية والستين من عمره. لم يصنف
      كتاباً، غير أن ورده القصير «الصلاة المشيشية» في الصلاة على
      النبي ﷺ لا يزال متداولاً قراءةً في عامة التصوف المغربي. وعن
      طريق تلميذه الأوحد الشاذلي تتسلسل سلسلة الشاذلية وكل ما تفرع
      عنها من طرق المغرب اللاحقة (الدرقاوية والعلاوية واليشرطية
      والمدنية)، فهو أصل لتراث الشاذلية في المغرب ومصر والشام بعامته.
      ولا يزال ضريحه في جبل العلم من أعظم مزارات الصوفية بالمغرب.
    description_fr: |
      ʿAbd al-Salām ibn Mashīsh al-ʿAlamī al-Idrīsī — shaykh maghrébin
      du Jabal al-ʿAlam, dans le nord du Maroc, descendant revendiqué
      du Prophète ﷺ par al-Ḥasan ra, et maître spirituel auquel
      Abū al-Ḥasan al-Shādhilī fit remonter la fondation de sa
      *ṭarīqa* — fut tué dans son ermitage de montagne par un
      prétendant hérétique. Il avait environ 62 ans. Il ne laissa
      aucun écrit formel, mais sa courte *al-Ṣalāt al-Mashīshiyya*
      — célèbre litanie de bénédiction sur le Prophète ﷺ — demeure
      en récitation active à travers toute la tradition soufie
      maghrébine. Par son unique disciple al-Shādhilī, la *silsila*
      shādhiliyya et toutes les chaînes soufies maghrébines
      ultérieures (Darqāwiyya, ʿAlāwiyya, Yashruṭiyya, Madaniyya)
      passent par lui; il est donc fondateur pour l'ensemble de la
      tradition shādhiliyya maghrébo-égypto-levantine. Son sanctuaire
      au Jabal al-ʿAlam demeure un site de pèlerinage majeur pour
      les soufis marocains.
