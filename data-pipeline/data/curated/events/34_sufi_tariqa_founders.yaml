  - slug: death-of-ibrahim-al-dasuqi
    category: scholar
    title_en: Death of Ibrāhīm al-Dasūqī — founder of the Burhāniyya/Dasūqiyya
    title_ar: وفاة إبراهيم الدسوقي — مؤسس الطريقة البرهانية الدسوقية
    title_fr: Mort d'Ibrāhīm al-Dasūqī — fondateur de la Burhāniyya/Dasūqiyya
    description_en: |
      Burhan al-Din Ibrahim ibn ʿAbd al-ʿAziz al-Dasuqi — Egyptian
      shaykh born and resident at Dasuq in the western Nile Delta,
      and the founder of the Burhāniyya (also called Dasūqiyya)
      ṭarīqa, the fourth of the four "great qutb" Egyptian Sufi
      orders alongside the Shadhiliyya, Aḥmadiyya (Badawiyya), and
      Rifaʿiyya — died at Dasuq at age about 43. His brother Musa
      Abu al-ʿImran was a celebrated Maliki jurist; al-Dasuqi
      himself was trained in both Shafiʿi and Maliki fiqh and is
      reputed to have memorised at remarkable speed all the major
      texts of the Egyptian classical curriculum. His *Ḥizb al-
      Dasuqi* and *Jawharat al-Taḥqīq* remain in active recitation
      across the Burhaniyya. The order spread from Egypt into the
      Sudan, where it remains one of the dominant Sufi traditions
      under twentieth-century reformer Muḥammad ʿUthman ʿAbduh
      al-Burhani. His shrine at Dasuq remains a major regional
      pilgrimage site.
    description_ar: |
      توفي الشيخ برهان الدين إبراهيم بن عبد العزيز الدسوقي — الشيخ
      المصري المولود المقيم بدسوق في غرب دلتا النيل، مؤسس الطريقة
      البرهانية (المعروفة كذلك بالدسوقية)، رابعة الطرق المصرية
      الكبرى مع الشاذلية والأحمدية البدوية والرفاعية — بدسوق عن نحو
      ثلاث وأربعين سنة. وكان أخوه موسى أبو العمران فقيهاً مالكياً
      مشهوراً، وقد تعلم الدسوقي الفقه على المذهبين الشافعي
      والمالكي، وروي عنه ضبطه ضبطاً سريعاً فائقاً لأمهات نصوص المنهج
      المصري الكلاسيكي. ولا يزال «حزب الدسوقي» و«جوهرة التحقيق»
      من أوراده تتداول قراءةً في عامة البرهانية. وانتقلت الطريقة
      من مصر إلى السودان، فهي اليوم من غالب طرق التصوف هناك بزعامة
      المُجدد الشيخ محمد عثمان عبده البرهاني في القرن العشرين. ولا
      يزال ضريحه بدسوق من أكبر مزارات الإقليم.
    description_fr: |
      Burhān al-Dīn Ibrāhīm ibn ʿAbd al-ʿAzīz al-Dasūqī — shaykh
      égyptien né et résidant à Dasūq dans le Delta occidental du
      Nil, et fondateur de la *ṭarīqa Burhāniyya* (aussi appelée
      Dasūqiyya), quatrième des quatre grands ordres soufis
      égyptiens « du *qutb* » aux côtés de la Shādhiliyya, de
      l'Aḥmadiyya (Badawiyya) et de la Rifāʿiyya — mourut à Dasūq
      à l'âge d'environ 43 ans. Son frère Mūsā Abū al-ʿImrān fut
      un juriste malikite renommé; al-Dasūqī lui-même fut formé en
      *fiqh* shāfiʿite et malikite, et la tradition rapporte qu'il
      mémorisa à une vitesse remarquable tous les textes majeurs
      du curriculum classique égyptien. Son *Ḥizb al-Dasūqī* et
      sa *Jawharat al-Taḥqīq* demeurent en récitation active à
      travers la Burhāniyya. L'ordre s'étendit de l'Égypte au
      Soudan, où il demeure l'une des traditions soufies dominantes
      sous le réformateur du XXe siècle Muḥammad ʿUthmān ʿAbduh
      al-Burhānī. Son sanctuaire à Dasūq demeure un site de
      pèlerinage régional majeur.
    canonical_hijri: {year: 676, precision: year}
    canonical_gregorian: {date: 1277-11-20, precision: year, method: tabular_conversion}
