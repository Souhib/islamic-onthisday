  - slug: death-of-al-hajjaj-ibn-matar
    category: scholar_death
    title_en: Death of al-Ḥajjāj ibn Yūsuf ibn Maṭar — First Arabic Euclid
    title_ar: وفاة الحجّاج بن يوسف بن مَطَر — أوّل مُعرِّبٍ لإقليدس
    title_fr: Mort d'al-Ḥajjāj ibn Yūsuf ibn Maṭar — premier traducteur arabe d'Euclide
    description_en: |
      Abū Muḥammad al-Ḥajjāj ibn Yūsuf ibn Maṭar — translator
      attached to the courts of the ʿAbbāsid caliphs Hārūn al-Rashīd
      and al-Maʾmūn — died early in the third century AH, with a
      death-date attested only loosely (c.210 AH / ~825 CE). He
      produced the first complete Arabic translation of Euclid's
      *Elements* (*Kitāb al-Uṣūl fī al-Handasa*), in two recensions:
      a Hārūnian version (the *al-Hārūnī*) and a revised Maʾmūnian
      version (the *al-Maʾmūnī*). His translations of Ptolemy's
      *Almagest* (the first Arabic version, predating the
      Isḥāq-Thābit recension by a generation) underlay all
      subsequent Arabic Ptolemaic astronomy. Al-Ḥajjāj's *Elements*
      remained the Arabic mathematical mainstream until the
      Isḥāq–Thābit ibn Qurra revision around 290 AH/900 CE
      superseded it.
    description_ar: |
      توفي أبو محمد الحجّاج بن يوسف بن مَطَر — مترجمٌ من حلقة
      الخليفتين العباسيَّين هارون الرشيد والمأمون — في أوائل
      القرن الثالث الهجري، ولم تُحفظ سنةُ وفاته إلا على وجه
      التقدير (نحو ٢١٠ هـ / ~٨٢٥ م). أنتج أوّلَ ترجمةٍ عربيةٍ
      كاملةٍ لـ«أصول» إقليدس («كتاب الأصول في الهندسة») في
      نسختَين: الهارونية («الهاروني») والمأمونية المنقَّحة
      («المأموني»). وكانت ترجمته لـ«المجسطي» لبطليموس أوّلَ
      نسخةٍ عربيةٍ، تسبق تنقيح إسحاق-ثابت بجيل، فبُنيت عليها
      كلُّ علم الفلك البطلميّ العربيّ اللاحق. وبقيت ترجمته لـ
      «الأصول» العمدةَ الرياضيةَ العربيةَ حتى نقّحها إسحاق
      ابن حُنين وثابت بن قرة نحو ٢٩٠ هـ/٩٠٠ م.
    description_fr: |
      Abū Muḥammad al-Ḥajjāj ibn Yūsuf ibn Maṭar — traducteur
      attaché aux cours des califes ʿabbāsides Hārūn al-Rashīd
      puis al-Maʾmūn — mourut au début du IIIe siècle de l'hégire,
      la date étant attestée seulement de manière approchée
      (~210 H / ~825 EC). Il produisit la première traduction
      arabe complète des *Éléments* d'Euclide (*Kitāb al-Uṣūl fī
      al-Handasa*), en deux recensions : une version hārūnienne
      (*al-Hārūnī*) et une version maʾmūnienne révisée
      (*al-Maʾmūnī*). Sa traduction de l'*Almageste* de Ptolémée
      (la première version arabe, antérieure d'une génération à
      la recension Isḥāq-Thābit) servit de fondement à toute
      l'astronomie ptolémaïque arabe ultérieure. Les *Éléments*
      d'al-Ḥajjāj demeurèrent la référence mathématique arabe
      jusqu'à la révision Isḥāq-Thābit ibn Qurra autour de 290 H
      / 900 EC.
    canonical_hijri: {year: 210, precision: year}
    canonical_gregorian: {date: 825-01-01, precision: year, method: tabular_conversion}
