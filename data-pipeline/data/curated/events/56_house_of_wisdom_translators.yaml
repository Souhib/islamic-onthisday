  - slug: death-of-yahya-ibn-adi-al-mantiqi
    category: scholar_death
    title_en: Death of Yaḥyā ibn ʿAdī al-Manṭiqī — Successor of al-Fārābī
    title_ar: وفاة يحيى بن عدي المنطقي — خليفة الفارابي
    title_fr: Mort de Yaḥyā ibn ʿAdī al-Manṭiqī — successeur d'al-Fārābī
    description_en: |
      Abū Zakariyyāʾ Yaḥyā ibn ʿAdī al-Manṭiqī al-Takrītī —
      Jacobite Christian-Arab logician of Baghdad, student of
      Mattā ibn Yūnus and al-Fārābī, who succeeded al-Fārābī as
      head of the Baghdad Peripatetic school — died at Baghdad on
      Friday in Dhū al-Qaʿda 363 AH (August 974 CE), aged 81. He
      revised, copied, or translated nearly the whole Aristotelian
      organon and a substantial part of the Greek philosophical
      corpus available in Baghdad in the fourth century AH; his
      surviving treatise *Tahdhīb al-Akhlāq* (Refinement of
      Character) is the earliest Arabic systematic treatise on
      moral psychology in the Aristotelian tradition. He composed
      defences of the Christian Trinity in Arabic philosophical
      idiom (replying to al-Kindī's polemic and to Abū ʿĪsā
      al-Warrāq) and tutored two generations of Muslim and
      Christian students alike — including Abū Sulaymān al-Sijistānī
      and Ibn al-Khammār. Ibn Khallikān gives 363 AH at Baghdad.
    description_ar: |
      توفي أبو زكريا يحيى بن عدي المنطقي التكريتي — منطقيٌّ
      عربيٌّ نصرانيٌّ يعقوبيٌّ ببغداد، تلميذُ متّى بن يونس
      والفارابي، وخليفةُ الفارابي على مجلس مشّائية بغداد —
      ببغداد يومَ الجمعة في ذي القعدة سنة ٣٦٣ هـ (أغسطس ٩٧٤ م)
      عن إحدى وثمانين سنة. راجع أو نسخ أو ترجم كلَّ المنطق
      الأرسطيّ تقريباً، وقسماً وافياً ممّا تيسّر في بغداد من
      الفلسفة اليونانية في القرن الرابع الهجري؛ ورسالته الباقية
      «تهذيب الأخلاق» هي أقدمُ تأليفٍ عربيٍّ منهجيٍّ في علم
      النفس الأخلاقيّ على المنهج الأرسطي. وكتب رسائلَ في
      الدفاع عن التثليث النصرانيّ بلغة الفلسفة العربية (يردّ
      على ردود الكِنْدي وعلى أبي عيسى الورّاق)، وعلَّم جيلَين
      من تلاميذ المسلمين والنصارى معاً — منهم أبو سليمان
      السجستانيّ وابن الخمَّار. ضبط ابن خلكان وفاته سنة ٣٦٣ هـ
      ببغداد.
    description_fr: |
      Abū Zakariyyāʾ Yaḥyā ibn ʿAdī al-Manṭiqī al-Takrītī —
      logicien arabe chrétien jacobite de Bagdad, élève de Mattā
      ibn Yūnus et d'al-Fārābī, qui succéda à al-Fārābī à la tête
      de l'école péripatéticienne bagdadienne — mourut à Bagdad
      un vendredi de Dhū al-Qaʿda 363 H (août 974 EC), à 81 ans.
      Il révisa, copia ou traduisit la quasi-totalité de l'*Organon*
      aristotélicien et une part substantielle du corpus
      philosophique grec disponible à Bagdad au IVe siècle de
      l'hégire ; son traité conservé *Tahdhīb al-Akhlāq*
      (Raffinement du caractère) est le plus ancien traité
      systématique arabe de psychologie morale aristotélicienne.
      Il composa des défenses de la Trinité chrétienne en idiome
      philosophique arabe (en réponse à la polémique d'al-Kindī
      et à Abū ʿĪsā al-Warrāq) et forma deux générations
      d'élèves musulmans et chrétiens — dont Abū Sulaymān
      al-Sijistānī et Ibn al-Khammār. Ibn Khallikān donne 363 H
      à Bagdad.
