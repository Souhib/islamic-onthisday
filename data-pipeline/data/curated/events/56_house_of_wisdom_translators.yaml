  - slug: death-of-qusta-ibn-luqa
    category: scholar_death
    title_en: Death of Qusṭā ibn Lūqā al-Baʿlabakkī — Translator-Physician
    title_ar: وفاة قُسطا بن لوقا البعلبكّي — المترجم الطبيب
    title_fr: Mort de Qusṭā ibn Lūqā al-Baʿlabakkī — traducteur et médecin
    description_en: |
      Qusṭā ibn Lūqā al-Baʿlabakkī — Christian-Arab polymath of
      Greek descent born at Baʿlabakk and active at Baghdad and
      later at the Armenian court of King Sanḥarib — died in
      Armenia around 300 AH (~912 CE), with the year approximate
      and the place of death debated. He worked across philosophy,
      medicine, mathematics, and astronomy: he translated several
      Greek mathematical and mechanical works (Hero's *Mechanics*,
      Diophantus's *Arithmetica* in part, Aristarchus, Autolycus,
      Theodosius), and authored the original treatise *On the
      Difference between the Soul and the Spirit* (*Risāla fī al-
      Farq bayna al-Nafs wa-l-Rūḥ*) translated into Latin under
      the title *De Differentia Spiritus et Animae*, where it
      became one of the four texts prescribed in the Paris
      Faculty of Arts in 1255 (alongside three Aristotelian
      treatises). His medical compendium influenced Ibn Sīnā's
      *Qānūn*. Year-precision is retained because classical Sunni
      sources do not converge on month or day.
    description_ar: |
      توفي قُسطا بن لوقا البعلبكّيّ — موسوعيٌّ عربيٌّ نصرانيٌّ
      ذو أصل يونانيّ، وُلد ببعلبك واشتغل ببغداد ثم انتقل إلى بلاط
      الملك سنحاريب الأرمنيّ — في أرمينيا نحو سنة ٣٠٠ هـ (~٩١٢ م)،
      والسنة تقريبية، ومكان الوفاة محلُّ خلاف. عمل في الفلسفة
      والطب والرياضيات والفلك معاً: ترجم عدداً من المؤلَّفات
      اليونانية الرياضية والميكانيكية (كتاب «الحيل» لهيرون،
      وأجزاء من «الحساب» لديوفنطس، وأرسطرخس، وأوطولوقس،
      وثاوذوسيوس)، وألَّف «رسالة في الفرق بين النفس والروح» التي
      تُرجمت إلى اللاتينية تحت اسم *De Differentia Spiritus et
      Animae*، فصارت من النصوص الأربعة المقرَّرة في كلية الآداب
      بباريس سنة ١٢٥٥ م (إلى جانب ثلاث رسائل أرسطية). وأثَّرت
      موسوعتُه الطبية في «القانون» لابن سينا. وتُكتَفى دقّة السنة
      هنا، إذ لا تتفق مصادر أهل السنة الكلاسيكية على شهرٍ ولا يوم.
    description_fr: |
      Qusṭā ibn Lūqā al-Baʿlabakkī — polymathe arabe chrétien
      d'origine grecque, né à Baʿlabakk et actif à Bagdad puis à
      la cour du roi arménien Sanḥarib — mourut en Arménie vers
      300 H (~912 EC), l'année étant approximative et le lieu
      du décès débattu. Il travailla simultanément la philosophie,
      la médecine, les mathématiques et l'astronomie : il traduisit
      plusieurs œuvres grecques mathématiques et mécaniques (la
      *Mécanique* de Héron, des parties de l'*Arithmétique* de
      Diophante, Aristarque, Autolycus, Théodose), et rédigea le
      *Risāla fī al-Farq bayna al-Nafs wa-l-Rūḥ* (Sur la différence
      entre l'âme et l'esprit), traduit en latin sous le titre *De
      Differentia Spiritus et Animae* — il devint l'un des quatre
      textes prescrits à la Faculté des arts de Paris en 1255 (à
      côté de trois traités aristotéliciens). Son compendium
      médical influença le *Qānūn* d'Ibn Sīnā. La précision
      annuelle est retenue car les sources sunnites classiques ne
      convergent ni sur le mois ni sur le jour.
    canonical_hijri: {year: 300, precision: year}
    canonical_gregorian: {date: 912-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death c.300 AH / 912 CE in Armenia; year approximate."
      - source_key: editorial
        notes: "Classical wafayāt do not converge on a precise date; year-only."
    people: [[qusta-ibn-luqa, died]]
    tags: [abbasid, scholar, translator, physician, christian, baalbek, baghdad, armenia, translation-movement, latin-reception]
    importance: notable
    verified: true
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Qusta_ibn_Luqa"

  - slug: death-of-matta-ibn-yunus
    category: scholar_death
    title_en: Death of Mattā ibn Yūnus al-Qunnāʾī — Founder of the Baghdad Peripatetic School
    title_ar: وفاة متّى بن يونس القُنَّائي — مؤسس مدرسة بغداد المشّائية
    title_fr: Mort de Mattā ibn Yūnus al-Qunnāʾī — fondateur de l'école péripatéticienne de Bagdad
    description_en: |
      Abū Bishr Mattā ibn Yūnus (Yūnān) al-Qunnāʾī — Nestorian
      Christian-Arab logician of Baghdad, head of the Baghdad
      Peripatetic school and teacher of al-Fārābī — died at Baghdad
      in 328 AH (940 CE). He produced the canonical Arabic
      translations of Aristotle's *Posterior Analytics* and
      *Poetics*, and a fresh recension of the *Sophistical
      Refutations*; his glosses on Porphyry's *Isagoge* and on
      Alexander of Aphrodisias's commentaries shaped the Baghdad
      logical curriculum. He is the central figure of the famous
      330 AH Baghdad debate on logic versus grammar, where the
      grammarian Abū Saʿīd al-Sīrāfī argued (against Mattā) that
      Greek logic could not be lifted out of Greek grammar — a
      foundational episode for Arabic philosophy of language.
      Al-Fārābī inherited Mattā's chair, Yaḥyā ibn ʿAdī succeeded
      al-Fārābī, and the lineage continued for two centuries. Ibn
      Khallikān places his death in 328 AH.
    description_ar: |
      توفي أبو بشر متّى بن يونس (يونان) القُنَّائي — منطقيٌّ
      عربيٌّ نسطوريٌّ ببغداد، رأسُ مدرسة بغداد المشّائية، وأستاذُ
      الفارابي — ببغداد سنة ٣٢٨ هـ (٩٤٠ م). أنتج الترجمات
      العربية المعتمَدة لـ«التحليلات الأُخَر» و«الشعر» لأرسطو،
      ونسخةً مجدَّدةً من «المغالطات»؛ وحواشيه على «إيساغوجي»
      فرفريوس وعلى شروح الإسكندر الأفروديسيّ هي التي رسمت منهج
      المنطق ببغداد. وهو محور المناظرة الشهيرة في بغداد سنة
      ٣٣٠ هـ في «المنطق والنحو»، إذ احتجَّ النحويُّ أبو سعيد
      السيرافيُّ (ضدّ متّى) أن المنطق اليوناني لا يُنزع من نحوه
      اليونانيّ — وهي حادثةٌ تأسيسية في فلسفة اللغة العربية.
      ورث الفارابي مجلسَ متّى، وخلَف الفارابيَّ يحيى بن عدي،
      فاستمرّ السندُ قرنين. وضبط ابن خلكان وفاته سنة ٣٢٨ هـ.
    description_fr: |
      Abū Bishr Mattā ibn Yūnus (Yūnān) al-Qunnāʾī — logicien
      arabe chrétien nestorien de Bagdad, chef de l'école
      péripatéticienne bagdadienne et maître d'al-Fārābī — mourut
      à Bagdad en 328 H (940 EC). Il produisit les traductions
      arabes canoniques des *Seconds Analytiques* et de la
      *Poétique* d'Aristote, ainsi qu'une nouvelle recension des
      *Réfutations sophistiques* ; ses gloses sur l'*Isagoge* de
      Porphyre et les commentaires d'Alexandre d'Aphrodise
      façonnèrent le curriculum logique de Bagdad. Il est la
      figure centrale du célèbre débat de Bagdad de 330 H sur la
      logique et la grammaire, où le grammairien Abū Saʿīd
      al-Sīrāfī soutint (contre Mattā) que la logique grecque ne
      saurait être détachée de la grammaire grecque — épisode
      fondateur pour la philosophie arabe du langage. Al-Fārābī
      hérita de la chaire de Mattā ; Yaḥyā ibn ʿAdī succéda à
      al-Fārābī, et la lignée se poursuivit deux siècles. Ibn
      Khallikān situe sa mort en 328 H.
    canonical_hijri: {year: 328, precision: year}
    canonical_gregorian: {date: 940-01-01, precision: year, method: tabular_conversion}
