  - slug: death-of-ishaq-ibn-hunayn
    category: scholar_death
    title_en: Death of Isḥāq ibn Ḥunayn — Translator of Aristotle
    title_ar: وفاة إسحاق بن حُنين — مترجم أرسطو
    title_fr: Mort d'Isḥāq ibn Ḥunayn — traducteur d'Aristote
    description_en: |
      Abū Yaʿqūb Isḥāq ibn Ḥunayn ibn Isḥāq al-ʿIbādī — Christian-
      Arab translator and physician of Baghdad, son of Ḥunayn ibn
      Isḥāq — died on Friday in Rabīʿ al-Ākhir 298 AH (December 910
      CE), with sources giving the year unanimously and the day
      attested only by Ibn Abī Uṣaybiʿa. While his father had
      specialised in Galenic medicine, Isḥāq concentrated on
      Aristotelian philosophy, producing the Arabic versions of
      Aristotle's *Metaphysics*, *Physics*, *On the Heavens*, *On
      Generation and Corruption*, *On the Soul*, *Nicomachean
      Ethics*, and *Topics* that became the canonical translations
      used by al-Fārābī, Ibn Sīnā, and the Baghdad Peripatetics.
      With Thābit ibn Qurra he revised the Arabic *Almagest* to
      what became the standard recension. He also translated
      Euclid's *Data*, the Pseudo-Aristotelian *De Plantis*, and
      Themistius's paraphrases. Ibn Khallikān gives the year of
      death; al-Dhahabī notices him in *Tārīkh al-Islām* under 298 AH.
    description_ar: |
      توفي أبو يعقوب إسحاق بن حُنين بن إسحاق العباديّ — مترجمٌ
      عربيٌّ نصرانيٌّ وطبيبٌ ببغداد، ابنُ حُنين بن إسحاق — يومَ
      الجمعة في ربيع الآخر سنة ٢٩٨ هـ (ديسمبر ٩١٠ م)، وأجمعت
      المصادر على السنة، ولم يضبط اليوم إلا ابن أبي أصيبعة.
      اختصّ أبوه بطبّ جالينوس، فاختصّ هو بفلسفة أرسطو، فأنتج
      الترجماتِ العربيةَ لـ«ما بعد الطبيعة» و«الطبيعيات» و«السماء»
      و«الكون والفساد» و«النفس» و«الأخلاق إلى نيقوماخوس»
      و«الجدل» — التي صارت النسخَ الكلاسيكيةَ التي اعتمدها
      الفارابي وابن سينا وحلقة بغداد المشّائية. وراجع مع ثابت
      ابن قرة «المجسطي» العربيَّ في النسخة التي صارت المعتمدة.
      وترجم كذلك «المعطيات» لإقليدس، و«النبات» المنحول إلى أرسطو،
      وشروحَ ثاميسطيوس. وضبط ابن خلكان السنة؛ وأَلمَّ به الذهبيُّ
      في «تاريخ الإسلام» في وفيات سنة ٢٩٨ هـ.
    description_fr: |
      Abū Yaʿqūb Isḥāq ibn Ḥunayn ibn Isḥāq al-ʿIbādī — traducteur
      arabe chrétien et médecin de Bagdad, fils de Ḥunayn ibn
      Isḥāq — mourut un vendredi de Rabīʿ al-Ākhir 298 H
      (décembre 910 EC), les sources s'accordant sur l'année et le
      jour n'étant attesté que par Ibn Abī Uṣaybiʿa. Tandis que
      son père s'était spécialisé dans la médecine galénique,
      Isḥāq se consacra à la philosophie aristotélicienne,
      produisant les versions arabes de la *Métaphysique*, de la
      *Physique*, du *De Caelo*, du *De la génération et de la
      corruption*, du *De Anima*, de l'*Éthique à Nicomaque* et des
      *Topiques* d'Aristote — qui devinrent les traductions
      canoniques utilisées par al-Fārābī, Ibn Sīnā et les
      péripatéticiens bagdadiens. Avec Thābit ibn Qurra il révisa
      l'*Almageste* arabe dans la recension qui devint la
      référence. Il traduisit aussi les *Données* d'Euclide, le
      *De Plantis* pseudo-aristotélicien, et les paraphrases de
      Thémistius. Ibn Khallikān donne l'année ; al-Dhahabī le
      mentionne dans *Tārīkh al-Islām* sous 298 H.
    canonical_hijri: {year: 298, month: 4, precision: month}
    canonical_gregorian: {date: 910-12-01, precision: month, method: tabular_conversion}
