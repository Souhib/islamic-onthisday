# Wave 56 of curated event additions (2026-04-27).
# The Graeco-Arabic translation movement of 8th-10th century Baghdad —
# the scholars who, under ʿAbbāsid caliphal patronage from al-Manṣūr to
# the Buwayhids, rendered the Greek scientific and philosophical corpus
# (and a Pahlavi/Sanskrit/Syriac sub-stream) into Arabic, generating the
# textual foundation on which falsafa, ḥikma, and the Islamic exact
# sciences were built. Many of these figures were Arab Christians
# (Mattā ibn Yūnus, Yaḥyā ibn ʿAdī, Qusṭā ibn Lūqā, ʿAbd al-Masīḥ
# al-Ḥimṣī, Yaḥyā ibn al-Biṭrīq) or Sabians (the Banū Thābit lineage —
# Sinān ibn Thābit) working under Muslim patronage; their work became
# canonical input to Islamic intellectual history. We frame each
# entry by what they translated and how those translations entered
# the Arabic scholarly mainstream, without religious-affiliation
# extrapolation. There is precedent for this scope in the wave-43
# physician entries (Ibn Jumayʿ — Jewish; Yūḥannā ibn Māsawayh —
# Christian).
#
# Date precision: most translation-movement scholars are attested only
# at year-precision in the classical Sunni biographical sources (Ibn
# Khallikān, al-Dhahabī, Ibn Kathīr) — and several are at "approximate
# year" only (Qusṭā ibn Lūqā, ʿAbd al-Masīḥ, al-Ḥajjāj ibn Maṭar). We
# preserve that precision honestly. The only day-precise entry here is
# the death of Ibn al-Muqaffaʿ (executed by order of al-Manṣūr) which
# is itself contested — set as year-precision with disputed flag.
#
# Source-key inventory check (against sources.yaml as of 2026-04-27):
# we use ibn_khallikan_wafayat, dhahabi_siyar, dhahabi_tarikh_islam,
# ibn_kathir_bidaya, ibn_athir_kamil, tabari_tarikh, ei2, editorial.
# (Ibn al-Nadīm's Fihrist and Ibn Abī Uṣaybiʿa's ʿUyūn al-Anbāʾ are the
# native sources for translator biography but are not yet entries in
# sources.yaml; their content is folded into the EI2 + editorial
# claims here. When/if those source-keys are added, claims should be
# updated.)
#
# Trilingual en/ar/fr throughout. Hadith refs intentionally omitted —
# no narration directly anchors a translation event.

events:
  # =========================================================================
  # EARLY ʿABBĀSID PRECURSORS (2nd c. AH / 8th c. CE)
  # =========================================================================

  - slug: death-of-ibn-al-muqaffa
    category: scholar_death
    title_en: Death of Ibn al-Muqaffaʿ — Translator of Kalīla wa-Dimna
    title_ar: مقتل ابن المقفَّع — مترجم «كليلة ودمنة»
    title_fr: Mort d'Ibn al-Muqaffaʿ — traducteur de Kalīla wa-Dimna
    description_en: |
      Abū Muḥammad ʿAbd Allāh ibn al-Muqaffaʿ — Persian secretary
      and prose stylist of the early ʿAbbāsid chancery, born a
      Zoroastrian under the name Rūzbih and converted to Islam in
      adulthood — was put to death by order of the caliph
      al-Manṣūr around 139 AH (~756-759 CE), at the instigation of
      the governor of Baṣra Sufyān ibn Muʿāwiya al-Muhallabī.
      Classical sources disagree on the exact year (Ibn Khallikān
      gives c.142 AH; Ibn al-Athīr 139 AH); we record the cluster
      as 139 AH and flag the dispute. Ibn al-Muqaffaʿ rendered the
      Pahlavi *Karīrak ud Damanak* — itself a Middle-Persian
      translation of the Sanskrit *Pañcatantra* — into the Arabic
      *Kalīla wa-Dimna*, founding Arabic adab prose and seeding
      every later mirror-for-princes literature. He also translated
      the *Khwadāy-Nāmag* (Sasanian royal chronicle) and
      Aristotle's *Categories*, *On Interpretation*, and *Prior
      Analytics* (likely from Pahlavi intermediaries) — the first
      Aristotelian logic texts to circulate in Arabic.
    description_ar: |
      قُتل أبو محمد عبد الله بن المقفَّع — كاتب الديوان العباسي
      المبكِّر وأديب النثر العربي، وُلِد مجوسياً باسم رُوزْبِه
      وأسلم في كهولته — بأمر الخليفة المنصور نحو سنة ١٣٩ هـ
      (~٧٥٦-٧٥٩ م)، بسعيٍ من والي البصرة سفيان بن معاوية
      المهلَّبي. واختلفت المصادر القديمة في تاريخ مقتله: ضبطه
      ابن خلكان نحو ١٤٢ هـ، وابن الأثير ١٣٩ هـ؛ وأخذنا بتاريخ
      ١٣٩ هـ مع الإشارة إلى الخلاف. ونقل ابن المقفَّع كتاب
      «كَرِيرَك أُد دَمَنَك» الفارسي البهلويّ — وهو ذاته ترجمة
      وسطية فارسية لـ«پنجَتَنترا» السنسكريتي — إلى العربية في
      كتاب «كليلة ودمنة»، فأسّس النثر الأدبي العربي وقدَّم النموذج
      الذي أَلهَم كل أدب «نصائح الملوك» اللاحق. كما ترجم «خداي-
      نامه» (السجلّ الملكي الساسانيّ)، و«المقولات» و«العبارة»
      و«التحليلات الأولى» لأرسطو (يرجَّح عن وسطية بهلوية) —
      وهي أوّل ما تُداول من نصوص المنطق الأرسطي في العربية.
    description_fr: |
      Abū Muḥammad ʿAbd Allāh ibn al-Muqaffaʿ — secrétaire persan
      et prosateur de la chancellerie ʿabbāside des débuts, né
      zoroastrien sous le nom de Rūzbih et converti à l'islam à
      l'âge adulte — fut mis à mort sur ordre du calife al-Manṣūr
      vers 139 H (~756-759 EC), à l'instigation du gouverneur de
      Baṣra, Sufyān ibn Muʿāwiya al-Muhallabī. Les sources
      classiques divergent sur l'année exacte : Ibn Khallikān
      donne ~142 H ; Ibn al-Athīr 139 H ; nous retenons 139 H en
      signalant la divergence. Ibn al-Muqaffaʿ rendit le moyen-
      perse *Karīrak ud Damanak* — lui-même version pehlevie du
      sanskrit *Pañcatantra* — en l'arabe *Kalīla wa-Dimna*,
      fondant la prose adab arabe et fournissant le modèle de
      toute la littérature « miroir des princes » ultérieure. Il
      traduisit aussi le *Khwadāy-Nāmag* (chronique royale
      sassanide) et les *Catégories*, *De l'interprétation* et
      les *Premiers analytiques* d'Aristote (vraisemblablement par
      des intermédiaires pehlevis) — les premiers textes de
      logique aristotélicienne à circuler en arabe.
    canonical_hijri: {year: 139, precision: year}
    canonical_gregorian: {date: 757-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Year 139 AH for execution by order of al-Manṣūr at Baṣra."
      - source_key: ibn_khallikan_wafayat
        notes: "Wafayāt entry; gives c.142 AH (alternative)."
      - source_key: tabari_tarikh
        notes: "Notice within the events of al-Manṣūr's reign."
      - source_key: ei2
    people: [[ibn-al-muqaffa, died], [al-mansur-abbasid, leader]]
    tags: [abbasid, scholar, translator, adab, persian, baghdad, basra, translation-movement, kalila-wa-dimna]
    importance: notable
