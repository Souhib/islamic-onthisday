  - slug: death-of-muhammad-ibn-musa-banu-shakir
    category: scholar_death
    title_en: Death of Muḥammad ibn Mūsā ibn Shākir — Eldest of the Banū Mūsā
    title_ar: وفاة محمد بن موسى بن شاكر — كبير بني موسى
    title_fr: Mort de Muḥammad ibn Mūsā ibn Shākir — l'aîné des Banū Mūsā
    description_en: |
      Abū Jaʿfar Muḥammad ibn Mūsā ibn Shākir — eldest of the three
      Banū Mūsā brothers (Muḥammad, Aḥmad, and al-Ḥasan), wealthy
      ʿAbbāsid courtiers and the chief private patrons of the
      translation movement — died at Baghdad in 259 AH (873 CE).
      Together with his brothers he subsidised Ḥunayn ibn Isḥāq's
      translation workshop (paying him 500 gold dinars a month
      according to Ibn Abī Uṣaybiʿa), commissioned the missions
      that recovered Greek manuscripts from Byzantium, and
      personally co-authored the *Kitāb al-Ḥiyal* (Book of Ingenious
      Devices) — a treatise of about a hundred mechanical
      contrivances (siphons, automata, valves, conical valves) that
      transmitted Hellenistic engineering to the Arabic and later
      Latin tradition. Muḥammad's own contributions concentrated
      on geometry and astronomy; he supervised the geodetic
      measurement of a degree of the meridian commissioned by
      al-Maʾmūn near Sinjār. Ibn Khallikān gives 259 AH at Baghdad.
    description_ar: |
      توفي أبو جعفر محمد بن موسى بن شاكر — كبيرُ بني موسى
      الثلاثة (محمد وأحمد والحسن)، وأعيانُ الحاشية العباسية،
      وكبارُ الرعاة الخاصّين لحركة الترجمة — ببغداد سنة ٢٥٩ هـ
      (٨٧٣ م). تكفّل مع أخوَيه بنفقة حلقة حُنين بن إسحاق في
      الترجمة (يُعطيه خمسَ مئة دينار ذهب في الشهر بحسب ابن
      أبي أصيبعة)، وأرسلوا البعثات التي استجلبت المخطوطات
      اليونانية من بلاد الروم، وشاركوا بأنفسهم في تأليف «كتاب
      الحِيَل» — رسالةً تحوي نحو مئة آلةٍ ميكانيكية (سيفونات
      وآلاتٍ ذاتية الحركة وصمامات بشكل مخروط) فنقل بذلك
      الهندسةَ الميكانيكيةَ الهلِّينستيةَ إلى التراث العربي ثمّ
      اللاتيني. واختصّ محمدٌ نفسه بالهندسة والفلك؛ وأشرف على
      قياس درجةٍ من خطّ الزوال قرب سنجار بأمر المأمون. ضبط ابن
      خلكان وفاته سنة ٢٥٩ هـ ببغداد.
    description_fr: |
      Abū Jaʿfar Muḥammad ibn Mūsā ibn Shākir — aîné des trois
      frères Banū Mūsā (Muḥammad, Aḥmad et al-Ḥasan), riches
      courtisans ʿabbāsides et principaux mécènes privés du
      mouvement de traduction — mourut à Bagdad en 259 H (873
      EC). Avec ses frères, il subventionna l'atelier de traduction
      de Ḥunayn ibn Isḥāq (lui versant 500 dinars d'or par mois
      selon Ibn Abī Uṣaybiʿa), commandita les missions qui
      ramenèrent de Byzance des manuscrits grecs, et co-rédigea
      personnellement le *Kitāb al-Ḥiyal* (Livre des dispositifs
      ingénieux) — traité d'une centaine de mécanismes (siphons,
      automates, vannes coniques) qui transmit l'ingénierie
      hellénistique à la tradition arabe puis latine. Les
      contributions propres de Muḥammad portèrent sur la géométrie
      et l'astronomie ; il supervisa la mesure géodésique d'un
      degré du méridien près de Sinjār commanditée par al-Maʾmūn.
      Ibn Khallikān donne 259 H à Bagdad.
    canonical_hijri: {year: 259, precision: year}
    canonical_gregorian: {date: 873-01-01, precision: year, method: tabular_conversion}
