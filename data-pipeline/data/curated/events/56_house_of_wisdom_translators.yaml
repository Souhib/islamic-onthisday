  - slug: death-of-sinan-ibn-thabit
    category: scholar_death
    title_en: Death of Sinān ibn Thābit — Court Physician and Mathematician
    title_ar: وفاة سنان بن ثابت — طبيب البلاط والرياضي
    title_fr: Mort de Sinān ibn Thābit — médecin de cour et mathématicien
    description_en: |
      Abū Saʿīd Sinān ibn Thābit ibn Qurra al-Ḥarrānī — son of the
      mathematician-translator Thābit ibn Qurra, Sabian by descent
      (later converted to Islam under caliphal pressure), chief
      physician (*raʾīs al-aṭibbāʾ*) of Baghdad under the ʿAbbāsid
      caliphs al-Muqtadir, al-Qāhir, and al-Rāḍī — died at Baghdad
      in 331 AH (943 CE). As chief physician he organised the
      Baghdad hospital system, instituted the first systematic
      examination of physicians (in 319 AH / 931 CE, after a
      patient's death prompted al-Muqtadir to act), and supervised
      a mobile prison-clinic. His mathematical work continued his
      father's: a treatise on the elements of geometry, a history
      of the Sabian community, and astronomical observations
      coordinated with the Baghdad scientific milieu. His son
      Thābit ibn Sinān continued the family historiography
      tradition. Ibn Khallikān gives 331 AH.
    description_ar: |
      توفي أبو سعيد سنان بن ثابت بن قرّة الحرّاني — ابن المترجم
      الرياضي ثابت بن قرة، صابئيُّ الأصل (ثم أسلم تحت ضغط
      الخلافة)، ورئيسُ الأطباء ببغداد في خلافة المقتدر والقاهر
      والراضي — ببغداد سنة ٣٣١ هـ (٩٤٣ م). نظَّم بصفته رئيسَ
      الأطباء أمرَ مستشفيات بغداد، واستحدث أوّلَ نظامٍ لامتحان
      الأطباء (سنة ٣١٩ هـ / ٩٣١ م، بعد وفاة مريضٍ دفعت المقتدرَ
      إلى التحرّك)، وأشرف على عيادةٍ متنقّلة للسجون. واستأنف
      الإنتاجَ الرياضيّ عن أبيه: رسالةً في عناصر الهندسة،
      وتاريخاً للصابئة، ورصداً فلكياً منسَّقاً مع الوسط العلمي
      ببغداد. وخلَفه ابنه ثابت بن سنان فاستمرَّت الأسرةُ في
      التأريخ. ضبط ابن خلكان وفاته سنة ٣٣١ هـ.
    description_fr: |
      Abū Saʿīd Sinān ibn Thābit ibn Qurra al-Ḥarrānī — fils du
      mathématicien-traducteur Thābit ibn Qurra, sabéen d'origine
      (plus tard converti à l'islam sous pression califale),
      médecin en chef (*raʾīs al-aṭibbāʾ*) de Bagdad sous les
      califes ʿabbāsides al-Muqtadir, al-Qāhir et al-Rāḍī —
      mourut à Bagdad en 331 H (943 EC). Comme médecin en chef,
      il organisa le système hospitalier de Bagdad, institua le
      premier examen systématique des médecins (en 319 H / 931
      EC, après que la mort d'un patient eut poussé al-Muqtadir à
      agir), et supervisa une clinique-prison mobile. Son œuvre
      mathématique prolongea celle de son père : un traité sur
      les éléments de la géométrie, une histoire de la
      communauté sabéenne, et des observations astronomiques
      coordonnées avec le milieu scientifique bagdadien. Son fils
      Thābit ibn Sinān continua la tradition historiographique
      de la famille. Ibn Khallikān donne 331 H.
