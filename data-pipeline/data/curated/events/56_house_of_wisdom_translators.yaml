  - slug: death-of-ali-ibn-yahya-al-munajjim
    category: scholar_death
    title_en: Death of ʿAlī ibn Yaḥyā al-Munajjim — Astronomer-Courtier of the Banū al-Munajjim
    title_ar: وفاة علي بن يحيى المنجِّم — فلكي البلاط من بني المنجِّم
    title_fr: Mort de ʿAlī ibn Yaḥyā al-Munajjim — astronome de cour des Banū al-Munajjim
    description_en: |
      Abū al-Ḥasan ʿAlī ibn Yaḥyā ibn Abī Manṣūr al-Munajjim —
      ʿAbbāsid courtier-astrologer of Persian descent and the most
      visible figure of the Banū al-Munajjim dynasty of court
      astrologers and translators (his father Yaḥyā had directed
      al-Maʾmūn's astronomical observations at Shammāsiyya) — died
      at Sāmarrā in 275 AH (888 CE). His Baghdad library, the *Khizāna
      al-Ḥikma*, drew Greek manuscripts and translators alike; he
      was the patron and friend of al-Kindī and the host of the
      famous Christian-Muslim *risāla*-exchange between his cousin
      al-Hāshimī and ʿAbd al-Masīḥ al-Kindī. The Banū al-Munajjim
      family produced four generations of astrological-literary
      court figures attached to the caliphs from al-Maʾmūn to
      al-Muktafī. Al-Dhahabī notices ʿAlī ibn Yaḥyā within the
      year 275 AH.
    description_ar: |
      توفي أبو الحسن علي بن يحيى بن أبي منصور المنجِّم —
      منجِّمٌ من حاشية الخلافة العباسية، فارسيُّ الأصل، وأبرزُ
      أعلام أسرة بني المنجِّم من منجِّمي البلاط ومترجميه (كان
      أبوه يحيى قد أشرف على أرصاد المأمون في الشمَّاسية) —
      بسامرّاء سنة ٢٧٥ هـ (٨٨٨ م). جذبت مكتبته «خزانة الحكمة»
      ببغداد المخطوطاتِ اليونانيةَ والمترجمين معاً؛ وكان راعياً
      للكِنْدي وصديقَه، ومضيفَ المراسلة الشهيرة («الرسالة») بين
      ابن عمه الهاشمي وعبد المسيح الكِنْدي النصرانيّ. وأنجبت
      أسرة بني المنجِّم أربعةَ أجيال من رجال البلاط في التنجيم
      والأدب، اتّصلوا بالخلفاء من المأمون إلى المكتفي. وذكر
      الذهبيُّ علي بن يحيى في وفيات سنة ٢٧٥ هـ.
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn Yaḥyā ibn Abī Manṣūr al-Munajjim —
      astrologue de cour ʿabbāside d'origine persane et la figure
      la plus visible de la dynastie des Banū al-Munajjim,
      astrologues et traducteurs de cour (son père Yaḥyā avait
      dirigé les observations astronomiques d'al-Maʾmūn à
      Shammāsiyya) — mourut à Sāmarrāʾ en 275 H (888 EC). Sa
      bibliothèque bagdadienne, la *Khizānat al-Ḥikma*, attira à
      la fois les manuscrits grecs et les traducteurs ; il fut
      mécène et ami d'al-Kindī, et hôte du célèbre échange de
      *risāla* islamo-chrétien entre son cousin al-Hāshimī et
      ʿAbd al-Masīḥ al-Kindī. La famille Banū al-Munajjim donna
      quatre générations de courtisans-lettrés rattachés aux
      califes d'al-Maʾmūn jusqu'à al-Muktafī. Al-Dhahabī mentionne
      ʿAlī ibn Yaḥyā dans les wafayāt de 275 H.
