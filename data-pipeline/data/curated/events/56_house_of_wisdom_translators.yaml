      - source_key: ei2
        is_canonical: true
        notes: "Floruit under al-Rashīd and al-Maʾmūn; death c.210 AH approximate."
      - source_key: editorial
        notes: "Death year is loose; Ibn al-Nadīm preserves bibliography but no precise wafāh."
