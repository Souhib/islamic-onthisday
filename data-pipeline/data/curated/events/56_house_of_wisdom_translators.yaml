  - slug: death-of-abd-al-masih-al-himsi
    category: scholar_death
    title_en: Death of ʿAbd al-Masīḥ ibn Nāʿima al-Ḥimṣī — Translator of the Theology of Aristotle
    title_ar: وفاة عبد المسيح بن ناعمة الحمصي — مترجم «أثولوجيا أرسطوطاليس»
    title_fr: Mort de ʿAbd al-Masīḥ ibn Nāʿima al-Ḥimṣī — traducteur de la Théologie d'Aristote
    description_en: |
      ʿAbd al-Masīḥ ibn ʿAbd Allāh ibn Nāʿima al-Ḥimṣī — Christian-
      Arab translator of Ḥimṣ active at Baghdad in the early third
      century AH, attached to the circle of al-Kindī — died in the
      first half of the third century, with the year only loosely
      attested (c.220 AH / ~835 CE). He produced the Arabic
      paraphrase of books IV-VI of Plotinus's *Enneads* under the
      title *Uthūlūjiyā Arisṭū-ṭālīs* (*Theology of Aristotle*) —
      a paraphrase wrongly attributed to Aristotle that became the
      principal channel of Neoplatonic metaphysics into Arabic
      falsafa. Through this misattribution, the entire al-Kindī
      tradition, then al-Fārābī and Ibn Sīnā, read Plotinus as
      Aristotle, fundamentally shaping classical Islamic
      metaphysics. His Arabic version of the *Sophistical
      Refutations* (*Kitāb al-Mughālaṭāt*) preceded the Mattā ibn
      Yūnus recension.
    description_ar: |
      توفي عبد المسيح بن عبد الله بن ناعمة الحمصيّ — مترجمٌ
      عربيٌّ نصرانيٌّ من حمص، اشتغل ببغداد في أوائل القرن الثالث
      الهجري في حلقة الكِنْدي — في النصف الأول من ذلك القرن،
      ولم تُحفظ السنة إلا على وجه التقدير (نحو ٢٢٠ هـ / ~٨٣٥
      م). أنتج العربيةَ المتسامحةَ للمقالات الرابعة إلى السادسة
      من «التاسوعات» لأفلوطين تحت اسم «أثولوجيا أرسطوطاليس»
      («لاهوت أرسطو») — وهي مفارقةٌ شارحةٌ نُسبت خطأً إلى أرسطو
      فصارت القناةَ الأهمّ التي دخلت بها ميتافيزيقا الأفلاطونية
      المحدَثة إلى الفلسفة العربية. وبسبب هذه النسبة الخاطئة
      قرأت تقليديةُ الكِنْدي بأكملها ثم الفارابي وابن سينا أفلوطينَ
      على أنه أرسطو، فتحدّدت بذلك المعالم الميتافيزيقيّة للفلسفة
      الإسلامية الكلاسيكية. وسبَقت ترجمتُه لـ«المغالطات» نسخةَ
      متى بن يونس.
    description_fr: |
      ʿAbd al-Masīḥ ibn ʿAbd Allāh ibn Nāʿima al-Ḥimṣī — traducteur
      arabe chrétien de Ḥimṣ, actif à Bagdad au début du IIIe
      siècle de l'hégire, rattaché au cercle d'al-Kindī — mourut
      dans la première moitié du IIIe siècle, l'année n'étant
      attestée qu'approximativement (~220 H / ~835 EC). Il produisit
      la paraphrase arabe des livres IV-VI des *Ennéades* de Plotin
      sous le titre *Uthūlūjiyā Arisṭū-ṭālīs* (*Théologie
      d'Aristote*) — paraphrase faussement attribuée à Aristote,
      qui devint le principal canal d'entrée de la métaphysique
      néoplatonicienne dans la falsafa arabe. Par cette
      mésattribution, toute la tradition d'al-Kindī, puis al-Fārābī
      et Ibn Sīnā, lurent Plotin comme Aristote, façonnant en
      profondeur la métaphysique islamique classique. Sa version
      arabe des *Réfutations sophistiques* (*Kitāb al-Mughālaṭāt*)
      précéda la recension de Mattā ibn Yūnus.
    canonical_hijri: {year: 220, precision: year}
    canonical_gregorian: {date: 835-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Floruit early 3rd c. AH at Baghdad in al-Kindī's circle; death year approximate."
      - source_key: editorial
        notes: "No classical wafayāt entry preserves a precise death-date; precision: year."
