  - slug: death-of-yahya-ibn-al-bitriq
    category: scholar_death
    title_en: Death of Yaḥyā ibn al-Biṭrīq — Translator under al-Maʾmūn
    title_ar: وفاة يحيى بن البطريق — مترجم عصر المأمون
    title_fr: Mort de Yaḥyā ibn al-Biṭrīq — traducteur sous al-Maʾmūn
    description_en: |
      Yaḥyā (or Yūḥannā) ibn al-Biṭrīq — Christian-Arab translator
      of the early ninth-century ʿAbbāsid court, attached to the
      caliph al-Maʾmūn's translation circle in Baghdad — died
      around 200 AH (~815 CE), with the year only approximately
      attested. He produced the first Arabic versions of Plato's
      *Timaeus*, Aristotle's *Meteorology*, *On the Soul*, and
      *On the Heavens*, working from Syriac intermediaries; his
      translations were criticised by Ḥunayn ibn Isḥāq a generation
      later as overly literal but remained foundational because
      they constituted the first textual access. He is also
      credited with the Arabic version of the pseudo-Aristotelian
      *Sirr al-Asrār* (*Secretum Secretorum*), the most-copied work
      of medieval Latin Europe through later translation.
    description_ar: |
      توفي يحيى (أو يوحنا) بن البطريق — مترجمٌ عربيٌّ نصرانيٌّ
      من بلاط المأمون العباسي في أوائل القرن الثالث الهجري،
      ومن حلقة الترجمة ببغداد — نحو سنة ٢٠٠ هـ (~٨١٥ م)، ولم
      تُحفظ السنة إلا على وجه التقريب. أنتج أوّلَ ترجماتٍ عربيةٍ
      لـ«طيماوس» أفلاطون، و«الآثار العلوية» لأرسطو، و«النفس»،
      و«السماء والعالم» — مقتفياً وسائط سريانية. وانتقد حُنين
      بن إسحاق ترجماته في الجيل التالي بأنها حرفية مفرطة، غير
      أنها بقيت أساساً لكونها أوّلَ منفذٍ نصّي. ويُنسب إليه أيضاً
      تعريب «سرّ الأسرار» المنحول إلى أرسطو — الذي صار من أكثر
      كتب أوروبا اللاتينية الوسيطية تداولاً عبر ترجماتٍ لاحقة.
    description_fr: |
      Yaḥyā (ou Yūḥannā) ibn al-Biṭrīq — traducteur arabe chrétien
      de la cour ʿabbāside du début du IXe siècle, rattaché au
      cercle de traduction du calife al-Maʾmūn à Bagdad — mourut
      vers 200 H (~815 EC), l'année n'étant attestée
      qu'approximativement. Il produisit les premières versions
      arabes du *Timée* de Platon, des *Météorologiques*, du *De
      Anima*, et du *De Caelo* d'Aristote, à partir
      d'intermédiaires syriaques ; ses traductions furent
      critiquées par Ḥunayn ibn Isḥāq une génération plus tard
      comme trop littérales, mais demeurèrent fondatrices comme
      premier accès textuel. On lui attribue aussi la version
      arabe du pseudo-aristotélicien *Sirr al-Asrār* (*Secretum
      Secretorum*), l'œuvre la plus copiée de l'Europe latine
      médiévale par ses traductions ultérieures.
    canonical_hijri: {year: 200, precision: year}
    canonical_gregorian: {date: 815-01-01, precision: year, method: tabular_conversion}
