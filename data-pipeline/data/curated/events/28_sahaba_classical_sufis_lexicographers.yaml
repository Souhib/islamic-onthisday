  - slug: death-of-al-sulami
    category: scholar
    title_en: Death of al-Sulami — biographer of the Sufi tradition
    title_ar: وفاة السلمي — مؤرخ التصوف
    title_fr: Mort d'al-Sulamī — biographe de la tradition soufie
    description_en: |
      Abu ʿAbd al-Rahman Muhammad ibn al-Husayn al-Sulami al-
      Naysaburi — Shafiʿi-Ashʿari muḥaddith and Sufi author of
      Naysabur, principal teacher of al-Qushayri and ʿAbdullah
      al-Anṣari al-Harawi, and author of *Ṭabaqat al-Ṣufiyya*
      (the foundational biographical dictionary of early Sunni
      Sufi figures) — died in Naysabur at age about 86.
      *Ṭabaqat al-Ṣufiyya* preserved the biographies of 105
      early Sufi masters from Ibrahim ibn Adham to al-Sulami's
      own teachers; it underlies all later classical Sufi
      hagiography (Abu Nuʿaym's *Ḥilyat al-Awliyaʾ*, al-
      Qushayri's *Risala*, al-Hujwiri's *Kashf*) and through
      them the entire Sunni Sufi self-conception. His *Tafsir
      Ḥaqaʾiq al-Sufiyya* gathered the spiritual readings of
      the Qurʾan from the early Sufi tradition. His personal
      writings are valuable for the rare doctrinal positions
      he records from Sufis whose works did not otherwise
      survive (al-Junayd's letters, al-Hallaj's prose).
    description_ar: |
      توفي الإمام أبو عبد الرحمن محمد بن الحسين السلمي
      النيسابوري — محدث وصوفي شافعي أشعري بنيسابور، شيخ
      القشيري وعبد الله الأنصاري الهروي مباشرة، ومصنف «طبقات
      الصوفية» (المعجم البيوغرافي الأم لمشايخ التصوف السني
      الباكر) — بنيسابور عن نحو ست وثمانين سنة. حفظت «طبقات
      الصوفية» تراجم مئة وخمسة من مشايخ الصوفية المتقدمين من
      إبراهيم بن أدهم إلى مشايخ السلمي نفسه؛ وعليها قام كل ما
      جاء بعدها من تراث المناقب الصوفي الكلاسيكي («حلية
      الأولياء» لأبي نعيم، و«الرسالة القشيرية» للقشيري، و«كشف
      المحجوب» للهجويري) وعبرها قام كل تصور التصوف السني عن
      ذاته. وكتابه «تفسير حقائق الصوفية» يجمع القراءات الروحية
      للقرآن من التراث الصوفي الباكر. وكتاباته الشخصية ثمينة
      لأقوال عقدية نادرة يحفظها عن صوفية لم تصلنا أعمالهم
      المستقلة (رسائل الجنيد، نثر الحلاج).
    description_fr: |
      Abu ʿAbd al-Raḥmān Muḥammad ibn al-Ḥusayn al-Sulamī al-
      Naysabūrī — muḥaddith et auteur soufi shāfiʿite-ashʿarite
      de Naysabur, principal enseignant d'al-Qushayrī et
      d'ʿAbdullāh al-Anṣārī al-Harawī, et auteur des *Ṭabaqāt
      al-Ṣūfiyya* (le dictionnaire biographique fondateur des
      premières figures soufies sunnites) — mourut à Naysabur
      à l'âge d'environ 86 ans. Les *Ṭabaqāt al-Ṣūfiyya*
      préservèrent les biographies de 105 premiers maîtres
      soufis depuis Ibrāhīm ibn Adham jusqu'aux propres
      enseignants d'al-Sulamī; elles sous-tendent toute
      l'hagiographie soufie classique ultérieure (la *Ḥilyat
      al-Awliyāʾ* d'Abū Nuʿaym, la *Risāla* d'al-Qushayrī, le
      *Kashf* d'al-Hujwīrī) et à travers elles toute la
      conception soufie sunnite d'elle-même. Son *Tafsīr
      Ḥaqāʾiq al-Ṣūfiyya* rassembla les lectures spirituelles
      du Coran de la tradition soufie ancienne. Ses écrits
      personnels sont précieux pour les positions doctrinales
      rares qu'il consigne de soufis dont les œuvres n'ont
      pas survécu autrement (les lettres d'al-Junayd, la prose
      d'al-Ḥallāj).
    canonical_hijri: {year: 412, month: 3, day: 3, precision: day}
    canonical_gregorian: {date: 1021-06-15, precision: day, method: tabular_conversion}
