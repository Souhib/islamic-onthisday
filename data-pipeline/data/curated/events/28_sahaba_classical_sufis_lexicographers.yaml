  - slug: death-of-al-zabidi
    category: scholar
    title_en: Death of al-Zabidi — author of Taj al-ʿArus
    title_ar: وفاة الزبيدي — صاحب «تاج العروس»
    title_fr: Mort d'al-Zabīdī — auteur de *Tāj al-ʿArūs*
    description_en: |
      al-Sayyid Murtaḍa al-Zabidi — Yemeni-born Hanafi muḥaddith
      and lexicographer who emigrated to Cairo, foremost
      contemporary lexicographer of his age, and author of two
      monumental encyclopedic works: *Taj al-ʿArus min Jawahir
      al-Qamus* (the Crown of the Bride from the Jewels of the
      Qamus, a forty-volume commentary-elaboration on al-
      Fayruzabadi's *al-Qamus al-Muḥit* — the most extensive
      Arabic-Arabic dictionary ever compiled) and *Itḥaf al-
      Sada al-Muttaqin* (the Gift to the Pious Masters, a ten-
      volume commentary on al-Ghazali's *Iḥyaʾ ʿUlum al-Din*)
      — died in Cairo during a plague outbreak at age about
      60. *Taj al-ʿArus* preserves rare and obsolete Arabic
      vocabulary that survives nowhere else; it is the
      indispensable reference for advanced Arabic philology to
      this day. *Itḥaf al-Sada* is the most thorough
      verification of the hadith citations in the *Iḥyaʾ*
      (which had been criticised by earlier scholars including
      Ibn Taymiyya for using weak narrations); it remains the
      standard apparatus for studying al-Ghazali's masterwork.
    description_ar: |
      توفي السيد المرتضى الزبيدي — محدث ولغوي حنفي يمني
      المنشأ، هاجر إلى القاهرة، وأكبر معجمي عصره، ومصنف
      كتابين موسوعيين ضخمين: «تاج العروس من جواهر القاموس»
      (في أربعين مجلداً، شرح وتوسعة لـ«القاموس المحيط»
      للفيروزآبادي — أوسع معجم عربي-عربي ألف على الإطلاق)،
      و«إتحاف السادة المتقين» (في عشرة مجلدات، شرح
      «إحياء علوم الدين» للإمام الغزالي) — بالقاهرة في
      جائحة طاعون عن نحو ستين سنة. وحفظ «تاج العروس» مفردات
      عربية نادرة ومهجورة لا توجد في غيره؛ وهو المرجع الذي
      لا غنى عنه في فقه اللغة العربية الراقي إلى اليوم.
      أما «إتحاف السادة المتقين» فأدق تخريج لأحاديث «الإحياء»
      (الذي انتقد عليه السابقون من أمثال ابن تيمية استخدام
      روايات ضعيفة)؛ وهو المعدّ المعتمد لدراسة عمل الغزالي
      الكبير.
    description_fr: |
      al-Sayyid Murtaḍā al-Zabīdī — muḥaddith et lexicographe
      hanafite né au Yémen qui émigra au Caire, principal
      lexicographe contemporain de son âge, et auteur de deux
      œuvres encyclopédiques monumentales : *Tāj al-ʿArūs min
      Jawāhir al-Qāmūs* (la Couronne de la Mariée parmi les
      Joyaux du Qāmūs, un commentaire-élaboration en quarante
      volumes du *al-Qāmūs al-Muḥīṭ* d'al-Fayrūzābādī — le
      dictionnaire arabe-arabe le plus exhaustif jamais
      compilé) et *Itḥāf al-Sāda al-Muttaqīn* (le Cadeau aux
      Maîtres Pieux, un commentaire en dix volumes de l'*Iḥyāʾ
      ʿUlūm al-Dīn* d'al-Ghazālī) — mourut au Caire durant une
      épidémie de peste à l'âge d'environ 60 ans. *Tāj al-ʿArūs*
      préserve un vocabulaire arabe rare et obsolète qui ne
      survit nulle part ailleurs; c'est la référence
      indispensable pour la philologie arabe avancée à ce jour.
      *Itḥāf al-Sāda* est la vérification la plus minutieuse des
      citations de hadiths dans l'*Iḥyāʾ* (qui avait été
      critiqué par des savants antérieurs dont Ibn Taymiyya
      pour l'usage de narrations faibles); il demeure l'appareil
      standard pour étudier le chef-d'œuvre d'al-Ghazālī.
    canonical_hijri: {year: 1205, month: 8, day: 14, precision: day}
    canonical_gregorian: {date: 1791-04-17, precision: day, method: tabular_conversion}
