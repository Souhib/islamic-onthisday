  - slug: death-of-al-tabrizi
    category: scholar
    title_en: Death of Wali al-Din al-Tabrizi — author of Mishkat al-Maṣabiḥ
    title_ar: وفاة ولي الدين التبريزي — صاحب «مشكاة المصابيح»
    title_fr: Mort de Walī al-Dīn al-Tabrīzī — auteur de *Mishkāt al-Maṣābīḥ*
    description_en: |
      Wali al-Din Muhammad ibn ʿAbdullah al-Khaṭib al-Tabrizi —
      Persian-born Sunni Shafiʿi muḥaddith of Tabriz, author of
      *Mishkat al-Maṣabiḥ* — the most-circulated Sunni hadith
      compendium for non-specialists in classical Sunni
      circulation, from the Indian subcontinent to North
      Africa — died around 737 AH. *Mishkat al-Maṣabiḥ*
      reorganises and expands al-Baghawi's earlier *Maṣabiḥ
      al-Sunna* by adding hadiths from beyond the Six Books
      and providing systematic chapter-organisation; the work
      runs to about 6,000 hadiths. Mulla ʿAli al-Qari's
      *Mirqat al-Mafatiḥ* (a commentary in eleven volumes) is
      the most authoritative classical commentary on it. The
      *Mishkat* became the standard hadith textbook of
      Mughal-era and Ottoman-era madrasa systems; in the
      Indian subcontinent it remains a primary intermediate
      hadith text taught at Deobandi and Barelvi seminaries.
    description_ar: |
      توفي الإمام ولي الدين محمد بن عبد الله الخطيب التبريزي —
      محدث سني شافعي فارسي المنشأ من تبريز، ومصنف «مشكاة
      المصابيح» — أوسع متن حديث سني عند غير المتخصصين انتشاراً
      في الدوران السني الكلاسيكي، من شبه القارة الهندية إلى
      شمال أفريقيا — نحو سنة ٧٣٧ هـ. ويعيد «مشكاة المصابيح»
      ترتيب وتوسيع «مصابيح السنة» السابق للبغوي بإضافة أحاديث
      من خارج الكتب الستة وترتيبها على أبواب منهجية؛ ويستوعب
      الكتاب نحو ستة آلاف حديث. و«مرقاة المفاتيح» لملا علي
      القاري (شرح في أحد عشر مجلداً) هو أعلى الشروح الكلاسيكية
      اعتماداً عليه. وصارت «المشكاة» المتن الحديثي المعياري
      في نظم مدارس عصري المغول العثمانيين؛ وفي شبه القارة
      الهندية ما زال متناً حديثياً متوسطاً يُدرّس في معاهد
      الديوبندية والبريلوية.
    description_fr: |
      Walī al-Dīn Muḥammad ibn ʿAbdullāh al-Khaṭīb al-Tabrīzī —
      muḥaddith sunnite shāfiʿite né en Perse de Tabriz, auteur
      du *Mishkāt al-Maṣābīḥ* — le compendium de hadith sunnite
      le plus diffusé pour les non-spécialistes dans la
      circulation sunnite classique, du sous-continent indien
      à l'Afrique du Nord — mourut vers 737 H. *Mishkāt al-
      Maṣābīḥ* réorganise et élargit le *Maṣābīḥ al-Sunna*
      antérieur d'al-Baghawī en ajoutant des hadiths au-delà
      des Six Livres et en fournissant une organisation
      systématique par chapitres; l'ouvrage atteint environ
      6 000 hadiths. Le *Mirqāt al-Mafātīḥ* de Mullā ʿAlī al-
      Qārī (un commentaire en onze volumes) en est le
      commentaire classique le plus autoritatif. Le *Mishkāt*
      devint le manuel de hadith standard des systèmes de
      madrasas de l'ère moghole et de l'ère ottomane; dans le
      sous-continent indien il demeure un texte intermédiaire
      principal de hadith enseigné aux séminaires deobandites
      et barelwites.
    canonical_hijri: {year: 737, precision: year}
    canonical_gregorian: {date: 1337-01-01, precision: year, method: tabular_conversion}
