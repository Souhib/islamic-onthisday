  - slug: liberation-of-acre
    category: conquest
    title_en: Liberation of Acre — End of Crusader Outremer
    title_ar: تحرير عكا — نهاية الوجود الصليبي بالشام
    title_fr: Libération d'Acre — fin de l'Outremer croisé
    description_en: |
      The Mamluk army of Sultan al-Ashraf Khalil ibn Qalawun
      captured the city of Acre on the Levantine coast after
      a six-week siege, ending two centuries of Crusader
      political presence in the Levant. The Crusader Kingdom
      of Jerusalem — which had sustained itself in coastal
      enclaves for the century since Saladin's reconquest of
      Jerusalem in 583 AH (1187 CE) — collapsed entirely with
      Acre's fall: Tyre, Sidon, Beirut, and Tartus were
      abandoned by the Crusaders within weeks. The campaign
      was the final operational achievement of the project
      Qalawun had begun before his death in 689 AH (1290 CE);
      al-Ashraf Khalil completed it in his father's name. The
      siege engineers had built the largest assault force the
      Mamluk state ever assembled, including 92 catapult
      stations against the city's walls. The fall of Acre
      cemented the territorial recovery of the entire coastal
      Levant and is conventionally treated by historians as
      the formal end of the Crusades.
    description_ar: |
      دخل الجيش المملوكي للسلطان الأشرف خليل بن قلاوون مدينة
      عكا الساحلية بعد حصار ستة أسابيع، فأنهى قرنين من الوجود
      الصليبي السياسي بالشام. وانهارت مملكة بيت المقدس
      الصليبية — التي بقيت في جيوب ساحلية القرن الذي مضى منذ
      استرجاع صلاح الدين الأيوبي القدس سنة ٥٨٣ هـ (١١٨٧
      ميلادي) — كلياً مع سقوط عكا: فأخلى الصليبيون صور وصيدا
      وبيروت وطرطوس في أسابيع. وكانت الحملة الإنجاز التشغيلي
      الأخير لمشروع كان قلاوون قد بدأه قبل وفاته سنة ٦٨٩ هـ
      (١٢٩٠ ميلادي)؛ وأكمله ابنه الأشرف خليل باسم أبيه. وبنى
      مهندسو الحصار أكبر قوة هجومية جمعتها دولة المماليك،
      منها ٩٢ منجنيقاً مرتبة على أسوار المدينة. ورسخ سقوط
      عكا الاسترجاع الإقليمي للساحل الشامي كله، ويعالجه
      المؤرخون اصطلاحاً بوصفه النهاية الرسمية للحملات
      الصليبية.
    description_fr: |
      L'armée mamelouke du sultan al-Ashraf Khalīl ibn Qalāwūn
      s'empara de la ville d'Acre sur la côte levantine après
      un siège de six semaines, mettant fin à deux siècles de
      présence politique croisée au Levant. Le royaume croisé
      de Jérusalem — qui s'était maintenu dans des enclaves
      côtières pendant le siècle écoulé depuis la reconquête
      par Saladin de Jérusalem en 583 H (1187 EC) — s'effondra
      entièrement avec la chute d'Acre : Tyr, Sidon, Beyrouth
      et Tartous furent abandonnés par les Croisés en l'espace
      de semaines. La campagne fut l'aboutissement opérationnel
      final du projet que Qalāwūn avait entrepris avant sa
      mort en 689 H (1290 EC); al-Ashraf Khalīl le compléta au
      nom de son père. Les ingénieurs du siège construisirent
      la plus grande force d'assaut que l'État mamelouk eût
      jamais rassemblée, dont 92 stations de catapulte contre
      les murs de la ville. La chute d'Acre cimenta la
      récupération territoriale de tout le Levant côtier et
      est conventionnellement traitée par les historiens
      comme la fin formelle des Croisades.
