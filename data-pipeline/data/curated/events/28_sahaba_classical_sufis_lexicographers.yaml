  - slug: death-of-al-damiri
    category: scholar
    title_en: Death of al-Damiri — Author of Ḥayat al-Ḥayawan
    title_ar: وفاة الدميري — صاحب «حياة الحيوان»
    title_fr: Mort d'al-Damīrī — auteur de *Ḥayāt al-Ḥayawān*
    description_en: |
      Kamal al-Din Muhammad ibn Musa al-Damiri — Egyptian
      Shafiʿi-trained Sunni scholar and author of *Ḥayat al-
      Ḥayawan al-Kubra* (the Greater Life of Animals), the
      most extensive zoological-folkloric encyclopedia of the
      classical Sunni tradition — died in Cairo at age about
      66. *Ḥayat al-Ḥayawan* in two volumes catalogues 1,069
      animal species (real and legendary) with full
      descriptions of their physical characteristics, habits,
      legal rulings on their consumption (Sharia category by
      animal), the hadiths in which they appear, the proverbs
      built around them, the medicinal applications of their
      parts, and dream-interpretation associations. The work
      synthesises the classical zoological tradition (al-Jaḥiẓ's
      *Kitab al-Ḥayawan*, al-Qazwini's *ʿAjaʾib al-Makhluqat*)
      with Sunni jurisprudential discussion of each species.
      It served as both a popular reference and a Shafiʿi fiqh
      manual on animal-related rulings; al-Damiri's other major
      work, *al-Najm al-Wahhaj*, is a Shafiʿi commentary on al-
      Nawawi's *Minhaj al-Ṭalibin*.
    description_ar: |
      توفي الإمام كمال الدين محمد بن موسى الدميري — عالم سني
      مصري متخرج على الشافعية، ومصنف «حياة الحيوان الكبرى» —
      أوسع موسوعة في علم الحيوان والفلكلور في التراث السني
      الكلاسيكي — بالقاهرة عن نحو ست وستين سنة. ويفهرس «حياة
      الحيوان» في مجلدين ١٠٦٩ نوعاً من الحيوان (حقيقياً
      وأسطورياً) بأوصاف كاملة لخصائصها الجسدية وعاداتها
      وأحكامها الفقهية في الأكل (تصنيف الشريعة بحسب الحيوان)
      والأحاديث الواردة فيها والأمثال المضروبة بها والاستعمالات
      الدوائية لأجزائها والإحالات في تعبير الرؤيا. ويجمع
      الكتاب التراث الزولوجي الكلاسيكي («كتاب الحيوان» للجاحظ
      و«عجائب المخلوقات» للقزويني) إلى البحث الفقهي السني
      لكل نوع. وخدم في آن واحد مرجعاً شعبياً وكتاب فقه شافعي
      في الأحكام الحيوانية. وعمله الآخر «النجم الوهاج» شرح
      شافعي على «منهاج الطالبين» للنووي.
    description_fr: |
      Kamāl al-Dīn Muḥammad ibn Mūsā al-Damīrī — savant sunnite
      égyptien formé à l'école shāfiʿite et auteur de *Ḥayāt
      al-Ḥayawān al-Kubrā* (la Grande Vie des Animaux),
      l'encyclopédie zoologico-folklorique la plus exhaustive
      de la tradition sunnite classique — mourut au Caire à
      l'âge d'environ 66 ans. *Ḥayāt al-Ḥayawān* en deux volumes
      catalogue 1 069 espèces animales (réelles et légendaires)
      avec des descriptions complètes de leurs caractéristiques
      physiques, leurs habitudes, les jugements juridiques sur
      leur consommation (catégorie de la *sharīʿa* par animal),
      les hadiths où elles apparaissent, les proverbes
      construits autour d'elles, les applications médicinales
      de leurs parties, et les associations en interprétation
      des rêves. L'ouvrage synthétise la tradition zoologique
      classique (*Kitāb al-Ḥayawān* d'al-Jāḥiẓ, *ʿAjāʾib al-
      Makhlūqāt* d'al-Qazwīnī) avec la discussion
      jurisprudentielle sunnite de chaque espèce. Il servit à
      la fois de référence populaire et de manuel de fiqh
      shāfiʿite sur les jugements relatifs aux animaux. Son
      autre œuvre majeure, *al-Najm al-Wahhāj*, est un
      commentaire shāfiʿite du *Minhāj al-Ṭālibīn* d'al-Nawawī.
    canonical_hijri: {year: 808, month: 3, day: 3, precision: day}
    canonical_gregorian: {date: 1405-08-29, precision: day, method: tabular_conversion}
