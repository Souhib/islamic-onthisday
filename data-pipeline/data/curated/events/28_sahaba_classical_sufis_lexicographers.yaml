  - slug: death-of-ibn-ajiba
    category: scholar
    title_en: Death of Aḥmad ibn ʿAjiba — Maliki-Shadhili Mufassir
    title_ar: وفاة أحمد ابن عجيبة — مفسر المالكية الشاذلية
    title_fr: Mort d'Aḥmad ibn ʿAjība — mufassir malikite-shādhilite
    description_en: |
      Abu al-ʿAbbas Aḥmad ibn ʿAjiba al-Hasani al-Anjari — Maliki
      Sufi shaykh of the Darqawi sub-branch of the Shadhili
      tariqa in late-Ottoman Morocco, and author of *al-Baḥr al-
      Madid fi Tafsir al-Qurʾan al-Majid* (the Vast Sea in the
      Commentary of the Glorious Qurʾan), a multi-volume tafsir
      that synthesises classical Sunni *tafsir bi-l-maʾthur*
      with the spiritual readings of the Sunni Sufi tradition
      — died at his retreat near Tetouan during a plague
      outbreak. He was about 60. His autobiography *al-Fahrasa*
      provides one of the few personal accounts of an early
      modern Maghrebi Sufi shaykh's training, intellectual
      engagement, and spiritual development. He commented
      extensively on Ibn ʿAṭaʾillah's *Hikam* (his commentary
      *Iqaẓ al-Himam* is among the most circulated). His
      tafsir, modest in length compared with al-Wahidi's or al-
      Razi's, became a classical reference in late-Ottoman
      Maghrebi tafsir tradition.
    description_ar: |
      توفي الشيخ أبو العباس أحمد ابن عجيبة الحسني الأنجري —
      صوفي مالكي شاذلي درقاوي في المغرب أواخر العصر العثماني،
      ومصنف «البحر المديد في تفسير القرآن المجيد»، تفسير
      متعدد المجلدات يجمع بين تفسير المأثور السني الكلاسيكي
      والقراءات الروحية للتراث الصوفي السني — في خلوته قرب
      تطوان في جائحة طاعون. وقد ناهز الستين. وكتابه «الفهرسة»
      من القلة من التراجم الذاتية لمشايخ الصوفية المغربية في
      العصر الحديث المبكر يصور التدريب والاشتباك الفكري
      والتطور الروحي. وشرح «الحكم» لابن عطاء الله الإسكندري
      شرحاً موسعاً (شرحه «إيقاظ الهمم» من أوسع الشروح
      انتشاراً). أما تفسيره — وهو متواضع الطول قياساً بتفسير
      الواحدي أو الرازي — فصار مرجعاً كلاسيكياً في تراث تفسير
      أواخر العصر العثماني المغربي.
    description_fr: |
      Abu al-ʿAbbās Aḥmad ibn ʿAjība al-Ḥasanī al-Anjarī —
      shaykh soufi malikite de la sous-branche Darqāwī de la
      *ṭarīqa Shādhiliyya* au Maroc de la fin de l'ère
      ottomane, et auteur d'*al-Baḥr al-Madīd fī Tafsīr al-
      Qurʾān al-Majīd* (la Vaste Mer dans le Commentaire du
      Glorieux Coran), un tafsir multi-volumes qui synthétise
      le *tafsīr bi-l-maʾthūr* sunnite classique avec les
      lectures spirituelles de la tradition soufie sunnite —
      mourut à son retraite près de Tétouan durant une épidémie
      de peste. Il avait environ 60 ans. Son autobiographie
      *al-Fahrasa* fournit l'un des rares récits personnels de
      la formation, de l'engagement intellectuel et du
      développement spirituel d'un shaykh soufi maghrébin
      moderne précoce. Il commenta abondamment les *Ḥikam*
      d'Ibn ʿAṭāʾillāh (son commentaire *Iqāẓ al-Himam* est
      parmi les plus diffusés). Son tafsir, modeste en longueur
      comparé à ceux d'al-Wāḥidī ou d'al-Rāzī, devint une
      référence classique dans la tradition de tafsir maghrébine
      de la fin de l'ère ottomane.
    canonical_hijri: {year: 1224, precision: year}
    canonical_gregorian: {date: 1809-01-01, precision: year, method: tabular_conversion}
