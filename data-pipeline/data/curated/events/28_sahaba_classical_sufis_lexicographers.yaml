  - slug: death-of-anwar-shah-al-kashmiri
    category: scholar
    title_en: Death of Anwar Shah al-Kashmiri
    title_ar: وفاة أنور شاه الكشميري
    title_fr: Mort d'Anwar Shāh al-Kashmīrī
    description_en: |
      Anwar Shah al-Kashmiri — Indian Sunni Hanafi-Maturidi
      muḥaddith, principal teacher of hadith at the Dār al-
      ʿUlum Deoband for sixteen years, and the foremost
      twentieth-century Indian commentator on Ṣaḥiḥ al-Bukhari
      — died in Deoband at age about 60. His four-volume
      *Fayḍ al-Bari ʿala Ṣaḥiḥ al-Bukhari* (assembled by his
      students from his Bukhari lectures) is among the most
      cited modern Hanafi commentaries on the Bukhari hadith
      corpus; his treatise *Khatm al-Nabiyyin* (the Seal of the
      Prophets) was a foundational Indian Sunni response to
      the Aḥmadiyya movement's claim of post-Prophetic
      revelation. He emigrated from Kashmir to Deoband as a
      student and remained there for the rest of his life,
      teaching generations of Deobandi-tradition scholars
      (including the later Pakistani-Indian muḥaddithun
      Maḥmud al-Ḥasan Kandhlawi and Muhammad Zakariyya
      Kandhlawi). Modern Indian Hanafi orthodoxy remains
      decisively shaped by his transmission of late-classical
      and Mughal-era hadith scholarship.
    description_ar: |
      توفي الشيخ أنور شاه الكشميري — محدث سني هندي حنفي
      ماتريدي، شيخ الحديث بدار العلوم ديوبند ست عشرة سنة،
      وأكبر شارح هندي لـ«صحيح البخاري» في القرن العشرين —
      بديوبند عن نحو ستين سنة. وكتابه «فيض الباري على صحيح
      البخاري» في أربعة مجلدات (جمعه طلابه من دروسه على
      البخاري) من أكثر شروح البخاري الحنفية الحديثة إحالة
      عليه؛ ورسالته «خاتم النبيين» في ختم الأنبياء هي رد
      هندي سني أساسي على ادعاء الحركة الأحمدية النبوة بعد
      النبي ﷺ. هاجر من كشمير إلى ديوبند طالباً وأقام بها
      بقية عمره، فدرّس أجيالاً من علماء التراث الديوبندي
      (منهم المحدثان الباكستانيان-الهنديان محمود الحسن
      الكاندهلوي ومحمد زكريا الكاندهلوي). ولا تزال العقيدة
      السنية الهندية الحنفية الحديثة متشكلة بصورة حاسمة
      بنقله للعلم الحديثي السني المتأخر والعصر المغولي.
    description_fr: |
      Anwar Shāh al-Kashmīrī — muḥaddith sunnite indien
      hanafite-māturīdite, principal enseignant du hadith à
      Dār al-ʿUlūm Deoband pendant seize ans, et le commentateur
      indien du XXe siècle le plus éminent du Ṣaḥīḥ al-Bukhārī
      — mourut à Deoband à l'âge d'environ 60 ans. Son *Fayḍ
      al-Bārī ʿalā Ṣaḥīḥ al-Bukhārī* en quatre volumes (assemblé
      par ses élèves à partir de ses leçons sur al-Bukhārī)
      est parmi les commentaires hanafites modernes les plus
      cités sur le corpus de hadiths d'al-Bukhārī; son traité
      *Khatm al-Nabiyyīn* (le Sceau des Prophètes) fut une
      réponse sunnite indienne fondatrice à la revendication
      du mouvement aḥmadiyya d'une révélation post-prophétique.
      Il émigra du Cachemire à Deoband comme étudiant et y
      demeura le reste de sa vie, enseignant des générations
      de savants de la tradition deobandie (dont les muḥaddithūn
      pakistano-indiens ultérieurs Maḥmūd al-Ḥasan Kandhlawī
      et Muḥammad Zakariyyā Kandhlawī). L'orthodoxie hanafite
      indienne moderne demeure façonnée de manière décisive
      par sa transmission de l'érudition hadith sunnite
      tardo-classique et de l'ère moghole.
    canonical_hijri: {year: 1352, month: 10, day: 3, precision: day}
    canonical_gregorian: {date: 1933-05-28, precision: day, method: attested}
