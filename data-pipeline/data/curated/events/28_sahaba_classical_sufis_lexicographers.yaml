  - slug: death-of-ibn-al-mulaqqin
    category: scholar
    title_en: Death of Ibn al-Mulaqqin — Shafiʿi Hadith Master
    title_ar: وفاة ابن الملقن — حافظ الشافعية
    title_fr: Mort d'Ibn al-Mulaqqin — maître shāfiʿite du hadith
    description_en: |
      Siraj al-Din Abu Hafs ʿUmar ibn ʿAli ibn al-Mulaqqin —
      Egyptian Shafiʿi muḥaddith of late-Mamluk Cairo, one of
      the most prolific authors in classical Sunni history
      (his works exceed 300 titles), and master of Ibn Hajar
      al-ʿAsqalani — died in Cairo during a plague outbreak at
      age about 81. His major works include *al-Tawḍiḥ li-
      Sharḥ al-Jamiʿ al-Ṣaḥiḥ* (a 35-volume commentary on
      Sahih al-Bukhari, the most extensive Shafiʿi commentary
      on the work outside Ibn Hajar's *Fatḥ al-Bari*), *al-
      Badr al-Munir fi Takhrij al-Aḥadith wa-l-Athar* (an 11-
      volume verification of the hadith citations in al-Rafiʿi's
      Shafiʿi fiqh manual), and *Mukhtaṣar Tadhkirat al-
      Mawḍuʿat* (an abridgement of forged-hadith literature).
      Through his prodigious output and his teaching of Ibn
      Hajar he is one of the principal nodes by which late-
      classical Sunni hadith scholarship reached the early
      Ottoman generation.
    description_ar: |
      توفي الإمام سراج الدين أبو حفص عمر بن علي ابن الملقن —
      محدث شافعي مصري في أواخر المماليك بالقاهرة، وأحد أوفر
      المصنفين في تاريخ السنة الكلاسيكي (تجاوزت كتبه ثلاث مئة
      عنوان)، وشيخ ابن حجر العسقلاني — بالقاهرة في جائحة
      طاعون عن نحو إحدى وثمانين سنة. ومن أبرز كتبه: «التوضيح
      لشرح الجامع الصحيح» (شرح في خمسة وثلاثين مجلداً على
      «صحيح البخاري»، أوسع شرح شافعي على الكتاب خارج «فتح
      الباري» لابن حجر)، و«البدر المنير في تخريج الأحاديث
      والآثار» (تخريج في أحد عشر مجلداً لأحاديث «شرح الكبير»
      الفقهي للرافعي الشافعي)، و«مختصر تذكرة الموضوعات»
      (مختصر في كتب الموضوعات). وعبر إنتاجه الضخم وتدريسه
      ابن حجر صار من العقد الكبرى التي وصل بها تراث الحديث
      السني الكلاسيكي المتأخر إلى الجيل العثماني المبكر.
    description_fr: |
      Sirāj al-Dīn Abu Ḥafṣ ʿUmar ibn ʿAlī ibn al-Mulaqqin —
      muḥaddith shāfiʿite égyptien du Caire mamelouk tardif,
      l'un des auteurs les plus prolifiques de l'histoire
      sunnite classique (ses œuvres dépassent 300 titres), et
      maître d'Ibn Ḥajar al-ʿAsqalānī — mourut au Caire durant
      une épidémie de peste à l'âge d'environ 81 ans. Ses
      œuvres majeures incluent *al-Tawḍīḥ li-Sharḥ al-Jāmiʿ al-
      Ṣaḥīḥ* (un commentaire en 35 volumes sur le Ṣaḥīḥ d'al-
      Bukhārī, le commentaire shāfiʿite le plus exhaustif de
      l'ouvrage en dehors du *Fatḥ al-Bārī* d'Ibn Ḥajar), *al-
      Badr al-Munīr fī Takhrīj al-Aḥādīth wa-l-Athār* (une
      vérification en 11 volumes des citations de hadiths dans
      le manuel de fiqh shāfiʿite d'al-Rāfiʿī), et *Mukhtaṣar
      Tadhkirat al-Mawḍūʿāt* (un abrégé de la littérature des
      hadiths forgés). À travers sa production prodigieuse et
      son enseignement d'Ibn Ḥajar, il est l'un des principaux
      nœuds par lesquels l'érudition sunnite tardo-classique
      du hadith parvint à la génération ottomane précoce.
    canonical_hijri: {year: 804, month: 3, day: 16, precision: day}
    canonical_gregorian: {date: 1401-10-25, precision: day, method: tabular_conversion}
