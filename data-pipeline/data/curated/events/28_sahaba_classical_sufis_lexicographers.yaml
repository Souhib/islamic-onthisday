  - slug: death-of-ubada-ibn-al-samit
    category: companion
    title_en: Death of ʿUbada ibn al-Ṣamit ra
    title_ar: وفاة عبادة بن الصامت رضي الله عنه
    title_fr: Mort d'ʿUbāda ibn al-Ṣāmit ra
    description_en: |
      Abu al-Walid ʿUbada ibn al-Ṣamit al-Anṣari al-Khazraji —
      Companion who took the second Pledge of ʿAqaba as one of
      twelve *naqib* (clan-chiefs) of the Anṣar appointed by
      the Prophet ﷺ, qaḍi of Palestine and Syria under ʿUmar
      and ʿUthman ra (the first qaḍi appointed in the conquered
      Levant), and the first to teach Qurʾan and hadith in
      Syria — died at Ramla in Palestine at age about 72. The
      Prophet ﷺ assigned him to teach Qurʾan to the Suffa
      (the residents of the Mosque of Medina); among his
      students who emerged from this assignment were al-Fudayl
      ibn ʿIyad and al-Ḥasan al-Baṣri's master Abu al-Saʿib.
      He narrated the foundational hadith on the punishment for
      adultery and theft (Bukhari) and on the *bayʿa* of the
      Anṣar to the Prophet ﷺ in Medina (the *bayʿat al-rijal*
      and *bayʿat al-nisaʾ* hadith of Sahih al-Bukhari). He
      famously confronted ʿUthman's governor Muʿawiya in Syria
      over a financial dispute and went directly to Medina
      rather than yield.
    description_ar: |
      توفي أبو الوليد عبادة بن الصامت الأنصاري الخزرجي رضي الله
      عنه — صحابي بايع رسول الله ﷺ في بيعة العقبة الثانية أحد
      اثني عشر نقيباً للأنصار، وقاضي فلسطين والشام في خلافتي
      عمر وعثمان رضي الله عنهما (أول قاض ولي قضاء بلاد الشام
      المفتوحة)، وأول من علّم القرآن والحديث في الشام —
      بالرملة في فلسطين عن نحو اثنتين وسبعين سنة. أمره النبي ﷺ
      بتعليم أهل الصفة (سكان مسجد المدينة) القرآن؛ ومن تلامذته
      الذين تخرجوا في تلك المهمة الفضيل بن عياض وأبو السائب
      شيخ الحسن البصري. روى الحديث الأم في عقوبة الزنا والسرقة
      (البخاري) وفي بيعة الأنصار للنبي ﷺ بالمدينة (حديث «بيعة
      الرجال» و«بيعة النساء» في «صحيح البخاري»). وعرفت مواجهته
      الشهيرة لمعاوية رضي الله عنه والي عثمان على الشام في
      نزاع مالي حيث ذهب مباشرة إلى المدينة بدلاً من الإذعان.
    description_fr: |
      Abū al-Walīd ʿUbāda ibn al-Ṣāmit al-Anṣārī al-Khazrajī —
      Compagnon qui prit le second Serment d'ʿAqaba comme l'un
      des douze *naqīb* (chefs de clans) des Anṣār désignés par
      le Prophète ﷺ, *qāḍī* de Palestine et de Syrie sous ʿUmar
      et ʿUthmān ra (le premier *qāḍī* nommé dans le Levant
      conquis), et le premier à enseigner le Coran et le hadith
      en Syrie — mourut à Ramla en Palestine à l'âge d'environ
      72 ans. Le Prophète ﷺ le chargea d'enseigner le Coran aux
      *Ṣuffa* (les résidents de la Mosquée de Médine); parmi
      ses élèves issus de cette mission figuraient al-Fuḍayl
      ibn ʿIyāḍ et le maître d'al-Ḥasan al-Baṣrī, Abū al-Sāʾib.
      Il narra le hadith fondateur sur la punition de l'adultère
      et du vol (Bukhārī) et sur la *bayʿa* des Anṣār au
      Prophète ﷺ à Médine (le hadith *bayʿat al-rijāl* et
      *bayʿat al-nisāʾ* de Ṣaḥīḥ al-Bukhārī). Il confronta
      célèbrement le gouverneur d'ʿUthmān, Muʿāwiya, en Syrie au
      sujet d'un différend financier et alla directement à
      Médine plutôt que de céder.
