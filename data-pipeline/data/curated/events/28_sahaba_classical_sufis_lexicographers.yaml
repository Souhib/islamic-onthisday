  - slug: death-of-uqba-ibn-amir-al-juhani
    category: companion
    title_en: Death of ʿUqba ibn ʿAmir al-Juhani ra
    title_ar: وفاة عقبة بن عامر الجهني رضي الله عنه
    title_fr: Mort de ʿUqba ibn ʿĀmir al-Juhanī ra
    description_en: |
      Abu Ḥammad ʿUqba ibn ʿAmir al-Juhani — Companion who
      walked beside the Prophet's ﷺ camel during the Hijra
      preliminaries, leading qari of the Companions in the
      Egyptian frontier, governor of Egypt under Muʿawiya ra
      (replacing ʿAmr ibn al-ʿAṣ ra in the office), and the
      Companion to whom the *Muʿawwidhatayn* (Surahs al-Falaq
      and al-Nas, Q 113-114) were taught directly by the
      Prophet ﷺ as a foundational protective recitation —
      died in Egypt and was buried at the Muqaṭṭam hill
      cemetery overlooking Cairo. He was about 65. He narrated
      55 hadiths in the Six Books, several of them principal
      sources for the eschatology of the Last Days (his report
      on the Mahdi from the Prophet's ﷺ family is preserved in
      Abu Dawud), the funeral practice (his hadith on the
      *talqin* of the dying), and the recommended frequency of
      reciting the Muʿawwidhatayn after each prayer (a Sunna
      that became universal Sunni practice through his
      transmission).
    description_ar: |
      توفي أبو حماد عقبة بن عامر الجهني رضي الله عنه — صحابي
      مشى إلى جانب ناقة رسول الله ﷺ في مقدمات الهجرة، وكبير
      قراء الصحابة في ثغر مصر، ووالي مصر في عهد معاوية رضي
      الله عنه (خلفاً لعمرو بن العاص رضي الله عنه في المنصب)،
      والصحابي الذي علّمه النبي ﷺ المعوذتين (سورتا الفلق والناس،
      ١١٣-١١٤) مباشرة قراءة وقاية أصلية — بمصر، ودفن في
      مقبرة المقطم المطلة على القاهرة. وقد ناهز الخامسة
      والستين. روى ٥٥ حديثاً في الكتب الستة، منها مصادر
      رئيسية في أحاديث آخر الزمان (روايته في المهدي من آل
      بيت النبي ﷺ محفوظة عند أبي داود)، وفي الجنائز (حديثه
      في تلقين الميت)، وفي مواظبة قراءة المعوذتين بعد كل
      صلاة (وهي سنة صارت من العمل العام عند أهل السنة عبر
      روايته).
    description_fr: |
      Abū Ḥammād ʿUqba ibn ʿĀmir al-Juhanī — Compagnon qui
      marcha aux côtés du chameau du Prophète ﷺ durant les
      préliminaires de la Hijra, principal *qārī* des Compagnons
      dans la frontière égyptienne, gouverneur d'Égypte sous
      Muʿāwiya ra (remplaçant ʿAmr ibn al-ʿĀṣ ra dans le poste),
      et le Compagnon à qui les *Muʿawwidhatayn* (les sourates
      al-Falaq et al-Nās, Q 113-114) furent enseignées
      directement par le Prophète ﷺ comme récitation protectrice
      fondatrice — mourut en Égypte et fut enterré au cimetière
      de la colline du Muqaṭṭam surplombant Le Caire. Il avait
      environ 65 ans. Il narra 55 hadiths dans les Six Livres,
      plusieurs sources principales pour l'eschatologie des
      Derniers Jours (son rapport sur le Mahdī de la famille
      du Prophète ﷺ est préservé chez Abū Dāwūd), pour la
      pratique funéraire (son hadith sur le *talqīn* du mourant),
      et pour la fréquence recommandée de réciter les
      *Muʿawwidhatayn* après chaque prière (une Sunna qui devint
      pratique universelle sunnite à travers sa transmission).
