  - slug: death-of-ibn-daqiq-al-id
    category: scholar
    title_en: Death of Ibn Daqiq al-ʿId — Mujtahid Mutlaq
    title_ar: وفاة ابن دقيق العيد — المجتهد المطلق
    title_fr: Mort d'Ibn Daqīq al-ʿĪd — mujtahid muṭlaq
    description_en: |
      Taqi al-Din Abu al-Fatḥ Muhammad ibn ʿAli ibn Daqiq al-
      ʿId al-Qushayri — Egyptian-born Sunni jurist trained in
      both Maliki and Shafiʿi madhāhib, qaḍi al-quḍa of Egypt
      under the Mamluks, and the scholar widely acknowledged
      across Sunni doxography as a *mujtahid muṭlaq* —
      independent in his juristic reasoning rather than
      bound to a single madhhab — died in Cairo at age about
      77. His *Iḥkam al-Aḥkam Sharḥ ʿUmdat al-Aḥkam* (a fiqh
      commentary on ʿAbd al-Ghani al-Maqdisi's hadith digest)
      is the foundational reference of late-Mamluk Sunni
      hadith-law synthesis; his *al-Iqtirah fi Bayan al-
      Iṣṭilaḥ* (on hadith methodology) was praised by Ibn
      Hajar al-ʿAsqalani as the most refined of all post-Ibn
      al-Ṣalaḥ methodological treatises. He served as qaḍi
      with notorious refusal of stipend, lived in personal
      poverty despite the office, and was a model of the
      independent-minded Sunni jurist that the Sunni canon
      has held as a regulating archetype.
    description_ar: |
      توفي القاضي تقي الدين أبو الفتح محمد بن علي ابن دقيق العيد
      القشيري — فقيه سني مصري المنشأ، تلقى الفقه على المالكية
      والشافعية معاً، وقاضي قضاة مصر في عصر المماليك،
      والعالم الذي اتفقت كتب الطبقات السنية على أنه «مجتهد
      مطلق» — لا متقيد بمذهب — بالقاهرة عن نحو سبع وسبعين
      سنة. وكتابه «إحكام الأحكام شرح عمدة الأحكام» (شرح فقهي
      على متن الحديث لعبد الغني المقدسي) المرجع الأصلي في
      الجمع بين الحديث والفقه السني في أواخر المماليك؛ و«الاقتراح
      في بيان الاصطلاح» (في مصطلح الحديث) أثنى عليه ابن حجر
      العسقلاني بأنه أحكم متن مصطلح بعد ابن الصلاح. وعمل
      قاضياً مع رفضه الراتب علناً، وعاش في فقر شخصي مع تولّيه
      المنصب، وهو نموذج للفقيه السني المستقل الذي حفظه التراث
      السني نموذجاً ضابطاً.
    description_fr: |
      Taqī al-Dīn Abū al-Fatḥ Muḥammad ibn ʿAlī ibn Daqīq al-
      ʿĪd al-Qushayrī — juriste sunnite né en Égypte formé aux
      écoles malikite et shāfiʿite, *qāḍī al-quḍāʾ* d'Égypte
      sous les Mamelouks, et le savant largement reconnu à
      travers la doxographie sunnite comme *mujtahid muṭlaq* —
      indépendant dans son raisonnement juristique plutôt que
      lié à un madhhab unique — mourut au Caire à l'âge
      d'environ 77 ans. Son *Iḥkām al-Aḥkām Sharḥ ʿUmdat al-
      Aḥkām* (un commentaire fiqh sur le condensé de hadiths
      d'ʿAbd al-Ghanī al-Maqdisī) est la référence fondatrice
      de la synthèse hadith-droit sunnite mamelouke tardive;
      son *al-Iqtirāḥ fī Bayān al-Iṣṭilāḥ* (sur la méthodologie
      du hadith) fut loué par Ibn Ḥajar al-ʿAsqalānī comme le
      plus raffiné de tous les traités méthodologiques post-
      Ibn al-Ṣalāḥ. Il servit comme *qāḍī* avec un refus
      notoire de stipendia, vécut dans la pauvreté personnelle
      malgré la charge, et fut un modèle du juriste sunnite
      indépendant que le canon sunnite a retenu comme archétype
      régulateur.
    canonical_hijri: {year: 702, month: 1, day: 11, precision: day}
    canonical_gregorian: {date: 1302-09-04, precision: day, method: tabular_conversion}
