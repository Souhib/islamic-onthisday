  - slug: death-of-hasan-al-attar
    category: scholar
    title_en: Death of Ḥasan al-ʿAṭṭar — Modernizing Shaykh of al-Azhar
    title_ar: وفاة حسن العطار — شيخ الأزهر المجدد
    title_fr: Mort de Ḥasan al-ʿAṭṭār — shaykh modernisateur d'al-Azhar
    description_en: |
      Ḥasan ibn Muhammad al-ʿAṭṭar al-Khalwati — Egyptian Sunni
      Shafiʿi-Ashʿari polymath and Shaykh of al-Azhar (1247-
      1250 AH / 1830-1834 CE), the first 19th-century Azhar
      head to seriously engage with European intellectual
      production — died in Cairo at age about 70. He spent
      years in Damascus and Istanbul during his early career,
      maintaining correspondence with Ottoman Sunni
      contemporaries; back at al-Azhar he was the principal
      teacher of Rifaʿa al-Tahṭawi (whose Paris mission and
      *Takhliṣ al-Ibriz* would inaugurate Arab cultural
      modernism). He encouraged the founding of the Bulaq
      printing press and the introduction of European-style
      book-printing of classical Arabic texts. His own works
      include the *Ḥashiya* on Aḥmad al-Damanhuri's *Sharḥ al-
      Sullam fi al-Manṭiq* (a logic textbook), poetry collections,
      and a *Maqamat* in classical Arabic. He represents the
      bridge between late-classical Azhari scholarship and the
      modernist Arab cultural movement of the 19th century.
    description_ar: |
      توفي الشيخ حسن بن محمد العطار الخلوتي — موسوعي مصري سني
      شافعي أشعري وشيخ الجامع الأزهر (١٢٤٧-١٢٥٠ هـ / ١٨٣٠-
      ١٨٣٤ ميلادي)، وأول شيخ للأزهر في القرن التاسع عشر
      اشتبك جدياً بالإنتاج الفكري الأوروبي — بالقاهرة عن نحو
      سبعين سنة. أمضى سنوات بدمشق وإسطنبول في أول عهده،
      مراسلاً معاصريه السنة العثمانيين؛ وعند عودته إلى الأزهر
      كان شيخ رفاعة الطهطاوي الأكبر (الذي ستكون بعثته إلى
      باريس وكتابه «تخليص الإبريز» مفتتح الحداثة الثقافية
      العربية). وشجع تأسيس مطبعة بولاق وإدخال طباعة الكتب
      على النمط الأوروبي للنصوص العربية الكلاسيكية. وأعماله
      الخاصة منها «الحاشية» على «شرح السلم في المنطق» لأحمد
      الدمنهوري (مقرر في علم المنطق)، ودواوين شعر، و«مقامات»
      بالعربية الكلاسيكية. وهو الجسر بين علم الأزهر الكلاسيكي
      المتأخر والحركة الثقافية الإصلاحية العربية في القرن
      التاسع عشر.
    description_fr: |
      Ḥasan ibn Muḥammad al-ʿAṭṭār al-Khalwatī — polymathe
      sunnite égyptien shāfiʿite-ashʿarite et Shaykh d'al-Azhar
      (1247-1250 H / 1830-1834 EC), le premier dirigeant
      azhari du XIXe siècle à s'engager sérieusement avec la
      production intellectuelle européenne — mourut au Caire
      à l'âge d'environ 70 ans. Il passa des années à Damas et
      à Istanbul au début de sa carrière, entretenant
      correspondance avec ses contemporains sunnites ottomans;
      de retour à al-Azhar il fut le principal enseignant de
      Rifāʿa al-Ṭahṭāwī (dont la mission parisienne et le
      *Takhlīṣ al-Ibrīz* inaugureraient le modernisme culturel
      arabe). Il encouragea la fondation de l'imprimerie de
      Bulaq et l'introduction de l'imprimerie européenne des
      textes arabes classiques. Ses œuvres propres incluent la
      *Ḥāshiya* sur le *Sharḥ al-Sullam fī al-Manṭiq* d'Aḥmad
      al-Damanhūrī (un manuel de logique), des recueils de
      poésie et des *Maqāmāt* en arabe classique. Il représente
      le pont entre l'érudition azharie tardo-classique et le
      mouvement culturel réformiste arabe du XIXe siècle.
    canonical_hijri: {year: 1250, month: 1, day: 19, precision: day}
    canonical_gregorian: {date: 1834-05-28, precision: day, method: tabular_conversion}
