  - slug: death-of-said-ibn-amir
    category: companion
    title_en: Death of Saʿid ibn ʿAmir al-Jumaḥi ra — Ascetic Governor of Ḥims
    title_ar: وفاة سعيد بن عامر الجمحي رضي الله عنه — الزاهد والي حمص
    title_fr: Mort de Saʿīd ibn ʿĀmir al-Jumaḥī ra — gouverneur ascète de Ḥims
    description_en: |
      Abu ʿAmir Saʿid ibn ʿAmir al-Jumaḥi — Companion who
      embraced Islam at the Conquest of Mecca, governor of
      Ḥims under ʿUmar ibn al-Khaṭṭab ra, and the celebrated
      ascetic-governor whose personal poverty was so striking
      that ʿUmar himself sent his wife to investigate the
      household's destitution — died at Ḥims at age about 40.
      The classical chronicles (Ibn Saʿd, al-Ṭabari) preserve
      ʿUmar's visit and the discovery that Saʿid was paying
      his entire stipend out as charity, leaving his family
      with one shared cloak and a clay vessel. ʿUmar wept and
      ordered him a continuing supplement; Saʿid resisted and
      gave the supplement away too. His five-year governorship
      of Ḥims established the model of Madinan-style austere
      Sunni governance against the wealth that Damascus would
      come to embody two decades later under the Umayyads. He
      is buried in Ḥims; his tomb remained a Ḥimsi pilgrimage
      site through the Ottoman era.
    description_ar: |
      توفي أبو عامر سعيد بن عامر الجمحي رضي الله عنه — صحابي
      أسلم يوم فتح مكة، وولي حمص لعمر بن الخطاب رضي الله عنه،
      والزاهد الوالي الذي كانت حاله من الفقر مدهشة حتى أن عمر
      رضي الله عنه أرسل زوجته للتحقق من فاقة بيته — بحمص عن نحو
      أربعين سنة. وتحفظ كتب التاريخ القديمة (ابن سعد والطبري)
      زيارة عمر وكشفها أن سعيداً كان ينفق راتبه كله صدقة، حتى
      ظل على أسرته رداء واحد مشترك ووعاء من خزف. فبكى عمر
      وأمر له برزق دائم، فمد سعيد له يد الرفض وأنفق ذلك أيضاً
      صدقة. وأطلقت ولايته على حمص خمس سنين نموذج الحكم السني
      الزاهد على نمط المدينة المنورة في وجه الترف الذي ستجسده
      دمشق بعد عقدين تحت بني أمية. ودفن بحمص؛ وظل قبره مزاراً
      حمصياً إلى العصر العثماني.
    description_fr: |
      Abu ʿĀmir Saʿīd ibn ʿĀmir al-Jumaḥī — Compagnon qui
      embrassa l'Islam à la conquête de La Mecque, gouverneur
      de Ḥims sous ʿUmar ibn al-Khaṭṭāb ra, et le célèbre
      gouverneur-ascète dont la pauvreté personnelle était si
      frappante qu'ʿUmar lui-même envoya son épouse pour enquêter
      sur le dénuement du foyer — mourut à Ḥims à l'âge
      d'environ 40 ans. Les chroniques classiques (Ibn Saʿd,
      al-Ṭabarī) préservent la visite d'ʿUmar et la découverte
      que Saʿīd reversait l'intégralité de sa stipendia en
      charité, laissant à sa famille un manteau partagé et un
      récipient en argile. ʿUmar pleura et lui ordonna un
      supplément continu; Saʿīd résista et reversa également
      le supplément en charité. Son mandat de gouverneur de Ḥims
      pendant cinq ans établit le modèle de gouvernance sunnite
      austère de style médinois face à la richesse que Damas
      en viendrait à incarner deux décennies plus tard sous les
      Omeyyades. Il est enterré à Ḥims; sa tombe demeura un
      site de pèlerinage ḥimsi jusqu'à l'ère ottomane.
