  - slug: death-of-al-qushayri
    category: scholar
    title_en: Death of al-Qushayri — author of al-Risala al-Qushayriyya
    title_ar: وفاة القشيري — صاحب «الرسالة القشيرية»
    title_fr: Mort d'al-Qushayrī — auteur de *al-Risāla al-Qushayriyya*
    description_en: |
      Abu al-Qasim ʿAbd al-Karim ibn Hawazin al-Qushayri al-
      Naysaburi — Shafiʿi-Ashʿari Sufi shaykh of Naysabur,
      successor of his father-in-law Abu ʿAli al-Daqqaq, and
      author of *al-Risala al-Qushayriyya fi ʿIlm al-
      Taṣawwuf* — the most influential systematic treatise on
      Sunni Sufism in the entire classical tradition — died in
      Naysabur at age about 89. *al-Risala* presents the
      biographies of 83 early Sufi masters and the technical
      vocabulary of inward religious experience (*tawba*,
      *tawakkul*, *zuhd*, *yaqīn*, *muḥabba*, etc.) within
      strict Shafiʿi-Ashʿari orthodoxy. The work was the
      principal text by which the second-generation Baghdad
      Sufi tradition was disseminated across the Sunni world;
      al-Ghazali drew on it heavily for the framework of his
      *Iḥyaʾ ʿUlum al-Din*. His *Lataʾif al-Isharat* is a
      classical Sunni Sufi tafsir; his polemics against
      Karramism and Muʿtazila in Naysabur shaped that city's
      decisive turn back to mainstream Sunni-Ashʿari orthodoxy.
    description_ar: |
      توفي الإمام أبو القاسم عبد الكريم بن هوازن القشيري
      النيسابوري — صوفي شافعي أشعري بنيسابور، خليفة شيخه
      وحموه أبي علي الدقاق، ومصنف «الرسالة القشيرية في علم
      التصوف» — أعظم متن صوفي سني منهجي في التراث الكلاسيكي
      كله — بنيسابور عن نحو تسع وثمانين سنة. وتقدم «الرسالة»
      تراجم ثلاثة وثمانين صوفياً من المتقدمين، ومصطلحات
      التجربة الدينية الباطنية (التوبة والتوكل والزهد واليقين
      والمحبة وغيرها) في إطار العقيدة الشافعية الأشعرية الصارمة.
      وكان الكتاب الأساس الذي وصل به تراث صوفية بغداد الجيل
      الثاني إلى عامة العالم السني؛ واستفاد منه الإمام الغزالي
      كثيراً في هيكل «إحياء علوم الدين». و«لطائف الإشارات» له
      تفسير قرآني صوفي سني كلاسيكي؛ ونقاشاته الفقهية ضد
      الكرامية والمعتزلة بنيسابور صاغت تحول تلك المدينة
      الحاسم إلى عقيدة أهل السنة الأشعرية المركزية.
    description_fr: |
      Abu al-Qāsim ʿAbd al-Karīm ibn Hawāzin al-Qushayrī al-
      Naysabūrī — shaykh soufi shāfiʿite-ashʿarite de Naysabur,
      successeur de son beau-père Abū ʿAli al-Daqqāq, et
      auteur d'*al-Risāla al-Qushayriyya fī ʿIlm al-Taṣawwuf*
      — le traité systématique le plus influent sur le
      soufisme sunnite dans toute la tradition classique —
      mourut à Naysabur à l'âge d'environ 89 ans. *al-Risāla*
      présente les biographies de 83 premiers maîtres soufis et
      le vocabulaire technique de l'expérience religieuse
      intérieure (*tawba*, *tawakkul*, *zuhd*, *yaqīn*,
      *muḥabba*, etc.) dans une orthodoxie shāfiʿite-ashʿarite
      stricte. L'ouvrage fut le texte principal par lequel la
      tradition soufie bagdadienne de seconde génération fut
      diffusée à travers le monde sunnite; al-Ghazālī s'en
      inspira fortement pour le cadre de son *Iḥyāʾ ʿUlūm
      al-Dīn*. Son *Laṭāʾif al-Ishārāt* est un tafsir soufi
      sunnite classique; ses polémiques contre le karrāmisme
      et les muʿtazilites à Naysabur façonnèrent le retour
      décisif de cette ville à l'orthodoxie sunnite-ashʿarite
      du courant principal.
