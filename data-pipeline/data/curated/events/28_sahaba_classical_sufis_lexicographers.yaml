  - slug: death-of-al-hujwiri
    category: scholar
    title_en: Death of al-Hujwiri — author of Kashf al-Maḥjub
    title_ar: وفاة الهجويري — صاحب «كشف المحجوب»
    title_fr: Mort d'al-Hujwīrī — auteur de *Kashf al-Maḥjūb*
    description_en: |
      Abu al-Hasan ʿAli ibn ʿUthman al-Hujwiri al-Ghaznawi —
      Sunni Hanafi-Maturidi Sufi from Ghazna in Afghanistan
      who emigrated to Lahore in the Punjab as part of the
      Ghaznavid expansion into India, and author of *Kashf al-
      Maḥjub* (the Unveiling of the Veiled), the first major
      treatise on Sufism written in Persian — died in Lahore.
      He was about 65. *Kashf al-Maḥjub* in Persian became the
      foundational Sufi reference for the entire Persianate-
      Indian Sunni world: every later Persian-Indian Sufi
      handbook traces methodological lineage to it. He is
      buried at his shrine at Data Darbar in Lahore (his Persian
      laqab *Data Ganj Bakhsh* — "Bestower of Treasure" —
      attached to him posthumously through Khwaja Moinuddin
      Chishti's visit to his grave) which remains the largest
      single Sufi pilgrimage site in Pakistan, drawing
      hundreds of thousands of visitors weekly. The Lahore
      shrine became the spiritual gateway through which
      Chishti and Suhrawardi tariqa networks entered the
      Indian subcontinent.
    description_ar: |
      توفي الإمام أبو الحسن علي بن عثمان الهجويري الغزنوي —
      صوفي حنفي ماتريدي سني من غزنة في أفغانستان، هاجر إلى
      لاهور في البنجاب ضمن التوسع الغزنوي على الهند، ومصنف
      «كشف المحجوب» — أول متن كبير في علم التصوف بالفارسية —
      بلاهور. وقد ناهز الخامسة والستين. وصار «كشف المحجوب»
      بالفارسية المرجع الصوفي الأم لعموم العالم الفارسي-
      الهندي السني: كل متن صوفي فارسي-هندي لاحق يرفع نسبه
      المنهجي إليه. ودفن في مقامه «داتا دربار» بلاهور (لقبه
      الفارسي «داتا غنج بخش» — «معطي الكنز» — لحقه بعد وفاته
      بزيارة الخواجه معين الدين الجشتي قبره) الذي ما زال
      أكبر مزار صوفي منفرد في باكستان، يأم مئات الألوف من
      الزوار أسبوعياً. وصار مقام لاهور البوابة الروحية التي
      دخلت بها شبكتا الجشتية والسهروردية شبه القارة الهندية.
    description_fr: |
      Abu al-Ḥasan ʿAlī ibn ʿUthmān al-Hujwīrī al-Ghaznawī —
      soufi sunnite hanafite-māturīdite de Ghazna en Afghanistan
      qui émigra à Lahore au Pendjab dans le cadre de l'expansion
      ghaznévide en Inde, et auteur du *Kashf al-Maḥjūb* (le
      Dévoilement du Voilé), le premier grand traité sur le
      soufisme écrit en persan — mourut à Lahore. Il avait
      environ 65 ans. *Kashf al-Maḥjūb* en persan devint la
      référence soufie fondatrice pour tout le monde sunnite
      persanate-indien : chaque manuel soufi persan-indien
      ultérieur trace une filiation méthodologique vers lui. Il
      est enterré à son sanctuaire de Data Darbar à Lahore (son
      *laqab* persan *Dātā Ganj Bakhsh* — « Donneur de
      Trésor » — lui fut attaché à titre posthume par la visite
      de Khwāja Moinuddīn Chishtī à sa tombe) qui demeure le
      plus grand sanctuaire soufi unique au Pakistan, attirant
      des centaines de milliers de visiteurs chaque semaine. Le
      sanctuaire de Lahore devint la porte spirituelle par
      laquelle les réseaux de *ṭarīqa* Chishtī et Suhrawardī
      entrèrent dans le sous-continent indien.
    canonical_hijri: {year: 465, precision: year}
