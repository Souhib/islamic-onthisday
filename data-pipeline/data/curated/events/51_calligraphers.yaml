  - slug: death-of-ahmed-karahisari
    category: scholar_death
    title_en: Death of Aḥmad Karahisārī — Calligrapher of the Süleymāniyye
    title_ar: وفاة أحمد قَرَه حِصَاريّ — خطّاط جامع السليمانية
    title_fr: Mort d'Aḥmad Karahisārī — calligraphe de la Süleymāniyye
    description_en: |
      Aḥmad Şemseddīn Karahisārī ("of Karahisar", in central
      Anatolia) — Ottoman master who broke from the dominant
      *Şeyh Hamdullāh* school to revive a more austere Yāqūtī
      style, and the calligrapher charged by Sultan Süleymān
      al-Qānūnī with the monumental Qurʾānic inscriptions
      throughout the Süleymāniyye Mosque (completed 964 AH /
      1557 CE) and the great *muṣḥaf* now preserved in the
      Topkapı Sarayı (TIEM 458) — died at Istanbul in 963 AH
      (1556 CE), aged about ninety. His student Ḥasan Çelebī
      executed the surface-level inscriptions of the mosque
      from Karahisārī's masters and his own; the *jelî thuluth*
      cartouches in the dome and on the *miḥrāb* are arguably
      the highest achievement of monumental Qurʾānic epigraphy
      in the Islamic world. Year-precision retained as the
      classical Ottoman biographers (Müstaḳīmzāde, ʿAtāʾī)
      give the year without a day.
    description_ar: |
      توفي أحمد شمس الدين قَرَه حصاري — نسبةً إلى قَرَه حصار
      وسط الأناضول — الإمامُ العثماني الذي خالف مدرسةَ الشيخ
      حمد الله السائدة فأحيا الأسلوبَ الياقوتيَّ المتقشِّف،
      وكلَّفه السلطان سليمان القانوني بالنقوش القرآنية الضخمة
      في جامع السليمانية (الذي اكتمل سنة ٩٦٤ هـ / ١٥٥٧ م)
      وبكتابة المصحف الكبير المحفوظ اليوم في طوبقابي سرايي
      برقم TIEM 458 — في إستانبول سنة ٩٦٣ هـ (١٥٥٦ م) عن نحو
      تسعين سنة. وأنجز تلميذه حسن چلبي النقوش الظاهرة في
      الجامع نقلاً عن أصول قَرَه حصاري وأصوله هو؛ وخراطيش
      «الجلي ثلث» في القبة وفي المحراب من أرفع منجزات الكتابة
      القرآنية الضخمة في عالم الإسلام. وأُبقي على دقة السنة
      لأنّ كتب التراجم العثمانية القديمة (المستقيم زاده،
      عطائي) تذكر السنة دون اليوم.
    description_fr: |
      Aḥmad Şemseddīn Karahisārī (« de Karahisar », en
      Anatolie centrale) — maître ottoman qui rompit avec
      l'école dominante de *Şeyh Hamdullāh* pour faire revivre
      un style yāqūtī plus austère, et le calligraphe à qui le
      sultan Süleymān al-Qānūnī confia les inscriptions
      coraniques monumentales de la mosquée de Süleymāniyye
      (achevée en 964 H / 1557 EC) et le grand *muṣḥaf*
      aujourd'hui conservé au Topkapı Sarayı (TIEM 458) —
      mourut à Istanbul en 963 H (1556 EC), à environ
      quatre-vingt-dix ans. Son élève Ḥasan Çelebī exécuta les
      inscriptions visibles de la mosquée d'après les modèles
      de Karahisārī et les siens propres ; les cartouches en
      *jelî thuluth* de la coupole et du *miḥrāb* sont sans
      doute la plus haute réalisation d'épigraphie coranique
      monumentale du monde islamique. La précision annuelle
      est retenue, les biographes ottomans classiques
      (Müstaḳīmzāde, ʿAtāʾī) donnant l'année sans le jour.
