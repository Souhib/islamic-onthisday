  - slug: death-of-mustafa-rakim
    category: scholar_death
    title_en: Death of Muṣṭafā Rāḳım — Reformer of Ottoman Jelî Thuluth
    title_ar: وفاة مصطفى راقم — مجدِّد الجلي ثلث العثماني
    title_fr: Mort de Muṣṭafā Rāḳım — réformateur du jelî thuluth ottoman
    description_en: |
      Muṣṭafā Rāḳım Efendi — Ottoman master and chief
      calligrapher to the imperial mint and the chancellery
      under Sultan Maḥmūd II, the figure who reformed the
      *jelî thuluth* (the monumental thuluth used for mosque
      inscriptions and imperial *ṭuġrās*) by integrating the
      proportional aesthetics of Ḥāfiẓ ʿOsmān's *naskh* into
      the rounded forms of the great script — died at
      Istanbul in 1241 AH (1826 CE), aged about sixty-eight.
      He executed the imperial *ṭuġrās* of Maḥmūd II, the
      mosque inscriptions of Nusretiye and many of the period's
      grand-inscription commissions; his reform was decisive
      and is regarded by Ottoman historians of calligraphy as
      the second turning point in the great-script tradition,
      after Ḥāfiẓ ʿOsmān. His students Mehmed Şefḳatullāh
      and Sami Efendi extended the Rāḳım style into the late
      Ottoman period. The biographer Ḥabīb (Ḥabīb-i Iṣfahānī)
      gives the year of death as 1241 AH.
    description_ar: |
      توفي مصطفى راقم أفندي — الإمامُ العثماني وكبير خطّاطي
      دار الضرب الإمبراطوري والديوان في عهد السلطان محمود
      الثاني، الذي جدَّد خط «الجلي ثلث» (وهو الثلث الضخم الذي
      يكتب به نقوش الجوامع والطغراءات الإمبراطورية) بأن أدخل
      عليه جماليات النسبة من خط حافظ عثمان النسخي إلى أشكال
      الثلث المستديرة — في إستانبول سنة ١٢٤١ هـ (١٨٢٦ م) عن
      نحو ثمانٍ وستين سنة. وكتب طغراءات محمود الثاني، ونقوش
      جامع نُصرتية، وكثيراً من النقوش الكبرى لتلك المرحلة؛
      وأَعَدّ مؤرّخو الخط العثمانيُّون إصلاحَه نقطةَ تحوّلٍ
      ثانيةً في تقليد الخطّ الجليّ بعد حافظ عثمان. ومن
      تلامذته محمد شفقت الله وسامي أفندي اللذان حملا أسلوب
      راقم إلى أواخر العصر العثماني. وأرَّخ المؤرّخ حبيب
      (حبيب الإصفهاني) سنةَ وفاته بـ١٢٤١ هـ.
    description_fr: |
      Muṣṭafā Rāḳım Efendi — maître ottoman et calligraphe en
      chef de l'hôtel des monnaies impérial et de la
      chancellerie sous le sultan Maḥmūd II, la figure qui
      réforma le *jelî thuluth* (le thuluth monumental utilisé
      pour les inscriptions de mosquée et les *ṭuġrās*
      impériales) en intégrant l'esthétique proportionnée du
      naskh de Ḥāfiẓ ʿOsmān aux formes arrondies de la grande
      écriture — mourut à Istanbul en 1241 H (1826 EC), âgé
      d'environ soixante-huit ans. Il exécuta les *ṭuġrās*
      impériales de Maḥmūd II, les inscriptions de la mosquée
      Nusretiye et bon nombre des grandes commandes
      épigraphiques de l'époque ; sa réforme est considérée par
      les historiens ottomans de la calligraphie comme le
      second tournant dans la tradition du jelî, après Ḥāfiẓ
      ʿOsmān. Ses élèves Mehmed Şefḳatullāh et Sami Efendi
      étendirent le style Rāḳım jusqu'à la fin de la période
      ottomane. Le biographe Ḥabīb (Ḥabīb-i Iṣfahānī) donne
      l'année de décès à 1241 H.
    canonical_hijri: {year: 1241, precision: year}
    canonical_gregorian: {date: 1826-01-01, precision: year, method: tabular_conversion}
