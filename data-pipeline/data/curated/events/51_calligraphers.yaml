  - slug: death-of-sami-efendi
    category: scholar_death
    title_en: Death of Sami Efendi — Last Master of the Ottoman Calligraphic Synthesis
    title_ar: وفاة سامي أفندي — خاتمة المدرسة الخطية العثمانية
    title_fr: Mort de Sami Efendi — dernier maître de la synthèse calligraphique ottomane
    description_en: |
      İsmāʿīl Hakkī Sāmī Efendi — Ottoman calligrapher who
      brought together every major late-Ottoman lineage
      (Rāḳım's *jelî thuluth* via Şefik Bey, Yesarī's *taʿlīq*,
      and Ḥāfiẓ ʿOsmān's *naskh*) into a single mature synthesis,
      and the master who taught nearly every Ottoman calligrapher
      of the early-twentieth-century generation — died at
      Istanbul in 1330 AH (1912 CE), aged about seventy-five.
      He held the chancellery post of *Niṣānjī* (calligrapher
      of the imperial *ṭuġrā*) under Sultan ʿAbdülḥamīd II, and
      his pupils included Naẓīf Bey, Kāmil Akdik, Ahmed Karahisarlı
      Hulûsi, and Ḥamīd Aytaç — the chain through whom Ottoman
      calligraphy passed into the Republican Turkish and modern
      Arab calligraphic worlds. Year-precision retained.
    description_ar: |
      توفي إسماعيل حقي سامي أفندي — الخطّاط العثماني الذي
      جمع في يديه كلَّ سلاسل أواخر العصر العثماني (جلي ثلث
      راقم عبر شفيق بك، وتعليق يساري، ونسخ حافظ عثمان) في
      توليفةٍ متكاملة، والمعلِّمُ الذي تخرّج به أكثرُ خطاطي
      الجيل العثماني الأخير في مطالع القرن العشرين — في
      إستانبول سنة ١٣٣٠ هـ (١٩١٢ م) عن نحو خمس وسبعين سنة.
      وتولّى منصب «النشانجي» — أي خطّاط الطغراء الإمبراطورية —
      في عهد السلطان عبد الحميد الثاني، وكان من تلامذته
      نظيف بك، وكامل آقديك، وأحمد قَرَه حصارلي خلوصي، وحامد
      الآمدي — السلسلة التي بها انتقل الخط العثماني إلى
      العالم الخطي التركي الجمهوري والعربي الحديث.
    description_fr: |
      İsmāʿīl Hakkī Sāmī Efendi — calligraphe ottoman qui
      rassembla en sa personne toutes les principales lignées
      ottomanes tardives (le jelî thuluth de Rāḳım par Şefik
      Bey, le taʿlīq de Yesarī, et le naskh de Ḥāfiẓ ʿOsmān)
      dans une synthèse mûrie, et le maître qui forma la
      quasi-totalité des calligraphes ottomans de la génération
      du début du XXe siècle — mourut à Istanbul en 1330 H
      (1912 EC), âgé d'environ soixante-quinze ans. Il occupa
      la charge chancelière de *Niṣānjī* (calligraphe de la
      *ṭuġrā* impériale) sous le sultan ʿAbdülḥamīd II, et ses
      élèves comprirent Naẓīf Bey, Kāmil Akdik, Ahmed
      Karahisarlı Hulûsi et Ḥamīd Aytaç — la chaîne par
      laquelle la calligraphie ottomane passa dans le monde
      calligraphique turc républicain et arabe moderne. La
      précision annuelle est retenue.
