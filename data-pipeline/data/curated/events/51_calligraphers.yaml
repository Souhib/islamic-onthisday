      - source_key: ei2
        is_canonical: true
        notes: "EI2 entry; death 1241 AH / 1826 CE at Istanbul; age c. 68."
      - source_key: editorial
        notes: "Cross-checked against Ḥabīb's late-Ottoman calligrapher biographies."
    people: [[mustafa-rakim, died]]
    tags: [ottoman, calligrapher, istanbul, jeli-thuluth, tugra, mahmud-ii, nusretiye]
    importance: notable
    verified: true
    verification_status: single_source

  - slug: death-of-sefik-bey
    category: scholar_death
    title_en: Death of Şefik Bey — Ottoman Master of the Celî Thuluth
    title_ar: وفاة شفيق بك — إمام الجلي ثلث في أواخر العثمانيين
    title_fr: Mort de Şefik Bey — maître ottoman du celî thuluth
    description_en: |
      Mehmed Şefīḳ Bey — Ottoman calligrapher of the Tanẓīmāt
      generation, student of Mehmed Khulūsī (d. 1291 AH) and
      thus in the *silsile* of Muṣṭafā Rāḳım, and the
      calligrapher who executed the great *jelî thuluth*
      inscriptions inside the Aya Sofya during the 1849 CE
      restoration commissioned by Sultan ʿAbdülmecid (the eight
      circular medallions of names and the dome calligraphy
      visible there today are mostly his and his teacher's)
      — died at Istanbul in 1297 AH (1880 CE). He was a
      teacher of Sami Efendi and his style decisively shaped
      the late-Ottoman jelî tradition in the half-century
      between Rāḳım and Sami. Year-precision retained as the
      late-Ottoman biographers do not preserve a day.
    description_ar: |
      توفي محمد شفيق بك — خطّاطٌ عثمانيٌّ من جيل التنظيمات،
      تلميذ محمد خلوصي (المتوفى سنة ١٢٩١ هـ) وبه يتصل سندُه
      بسلسلة مصطفى راقم، والذي كتب نقوش «الجلي ثلث» الكبرى
      داخل آيا صوفيا في تجديد سنة ١٢٦٥ هـ (١٨٤٩ م) الذي أمر
      به السلطان عبد المجيد (وأكثر المداليات الثمانية الكبرى
      التي تحمل أسماء الخلفاء وكتابات القبة هي بخطه وخطّ
      شيخه) — في إستانبول سنة ١٢٩٧ هـ (١٨٨٠ م). وعلَّم سامي
      أفندي، وكان أسلوبُه الفاصلَ في صياغة تقليد الجلي ثلث
      الأواخر بين راقم وسامي. وأُبقي على دقة السنة لأنّ كتب
      التراجم العثمانية المتأخرة لم تحفظ يوم وفاته.
    description_fr: |
      Mehmed Şefīḳ Bey — calligraphe ottoman de la génération
      des Tanẓīmāt, élève de Mehmed Khulūsī (m. 1291 H) et donc
      dans la *silsile* de Muṣṭafā Rāḳım, et le calligraphe
      qui exécuta les grandes inscriptions en *jelî thuluth* à
      l'intérieur d'Aya Sofya lors de la restauration de
      1849 EC commandée par le sultan ʿAbdülmecid (les huit
      médaillons circulaires des noms et la calligraphie de
      la coupole visibles aujourd'hui sont pour la plupart de
      sa main et de celle de son maître) — mourut à Istanbul
      en 1297 H (1880 EC). Il fut professeur de Sami Efendi et
      son style modela de manière décisive la tradition du
      jelî thuluth de la fin de l'époque ottomane, dans le
      demi-siècle séparant Rāḳım de Sami. La précision
      annuelle est retenue car les biographes tardifs
      n'enregistrent pas le jour.
