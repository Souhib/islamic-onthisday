  - slug: death-of-mehmed-esad-yesari
    category: scholar_death
    title_en: Death of Mehmed Esad Yesari — Master of the Taʿlīq Hand
    title_ar: وفاة محمد أسعد يساري — إمام التعليق
    title_fr: Mort de Mehmed Esad Yesari — maître du taʿlīq
    description_en: |
      Mehmed Esʿad Yesarī — Ottoman calligrapher of the
      eighteenth century, born in Istanbul with paralysis of
      the right side (whence the epithet *yesarī*, "left-
      handed", which he made his pen-name) and trained to
      write left-handed under Demokratīzāde Aḥmed and Şuhde
      Efendi — died at Istanbul in 1213 AH (1798 CE). He took
      the *taʿlīq* (Persian: *naskh-taʿlīq*) hand, which had
      until then been treated as a Persian foreign script in
      Ottoman lands, and reworked it in a distinctly Ottoman
      idiom that made *taʿlīq* one of the canonical six
      Ottoman hands. His son Yesarī-zāde Mustafa ʿİzzet (d.
      1265 AH) extended the achievement into the *jelî taʿlīq*
      cartouches that ornament Mahmūd II's mosque inscriptions.
      Müstaḳīmzāde and ʿAtāʾī's continuators give the year
      without the day.
    description_ar: |
      توفي محمد أسعد يساري — خطّاط عثماني من القرن الثامن
      عشر، ولد بإستانبول مصاباً بشللٍ في شقّه الأيمن (ومن ثم
      سُمّي «يساري» — أي الكاتب باليسرى — فاتخذها لقباً)،
      وتعلَّم الكتابة باليسرى على ديمقراطي زاده أحمد وشهدة
      أفندي — في إستانبول سنة ١٢١٣ هـ (١٧٩٨ م). وأخذ خطَّ
      «التعليق» (المسمَّى بالفارسية «نسخ تعليق»)، الذي كان
      يُعدّ في الديار العثمانية خطاً فارسياً وافداً، فأعاد
      صياغته في أسلوبٍ عثمانيٍّ متميّز جعل التعليق في عداد
      الأقلام الستة العثمانية الكلاسيكية. وامتدّت إنجازاتُه
      على يد ابنه يساري زاده مصطفى عزَّت (المتوفى سنة ١٢٦٥ هـ)
      إلى خراطيش «الجلي تعليق» التي تزيِّن نقوش جوامع محمود
      الثاني. وأرَّخ المستقيم زاده ومتمِّمو عطائي وفاتَه
      بالسنة دون اليوم.
    description_fr: |
      Mehmed Esʿad Yesarī — calligraphe ottoman du XVIIIe
      siècle, né à Istanbul avec une paralysie du côté droit
      (d'où le nom de plume *yesarī*, « gaucher », qu'il
      adopta) et formé à écrire de la main gauche sous
      Demokratīzāde Aḥmed et Şuhde Efendi — mourut à Istanbul
      en 1213 H (1798 EC). Il prit le *taʿlīq* (persan
      *naskh-taʿlīq*), qui jusqu'alors était traité en domaine
      ottoman comme une écriture persane importée, et le
      retravailla en un idiome distinctement ottoman qui fit
      du *taʿlīq* l'une des six écritures canoniques
      ottomanes. Son fils Yesarī-zāde Mustafā ʿİzzet (m.
      1265 H) étendit cette œuvre aux cartouches en *jelî
      taʿlīq* qui ornent les inscriptions des mosquées de
      Mahmūd II. Müstaḳīmzāde et les continuateurs d'ʿAtāʾī
      donnent l'année sans le jour.
    canonical_hijri: {year: 1213, precision: year}
    canonical_gregorian: {date: 1798-01-01, precision: year, method: tabular_conversion}
