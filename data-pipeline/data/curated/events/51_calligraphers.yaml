  # =========================================================================
  # OTTOMAN-ERA MASTERS
  # =========================================================================

  - slug: death-of-seyh-hamdullah
    category: scholar_death
    title_en: Death of Şeyh Hamdullah of Amasya — Founder of the Ottoman Calligraphic School
    title_ar: وفاة الشيخ حمد الله الأماسيّ — مؤسس المدرسة الخطية العثمانية
    title_fr: Mort de Şeyh Hamdullah d'Amasya — fondateur de l'école calligraphique ottomane
    description_en: |
      Şeyh Ḥamdullāh ibn Muṣṭafā Dede al-Amāsī — Anatolian
      master of the Yāqūtī tradition, calligraphy tutor to
      Sultan Bāyezīd II in Amasya before the latter's accession,
      and the figure who reworked the six scripts of Yāqūt
      al-Mustaʿṣimī into the distinctly Ottoman idiom that
      governed all subsequent imperial calligraphy until the
      twentieth century — died at Istanbul in 926 AH (1520 CE)
      at an advanced age. He produced an estimated forty-seven
      complete *muṣḥafs* in his hand, more than a thousand
      *enʿām* (devotional booklets) and *kıt'a* (single sheets),
      and the architectural inscriptions of Bāyezīd II's
      mosque complex on the Golden Horn. His students Şükrullāh
      Khalīfa, Pīr Muḥammad, and his son Muṣṭafā Dede founded
      the *silsile* through which Hamdullāh's *naskh* and
      *thuluth* were transmitted by ijāza-chain through Ḥāfiẓ
      ʿOsmān (d. 1110 AH) into modern Ottoman calligraphy. The
      Ottoman biographer Müstaḳīmzāde gives 926 AH in the
      *Tuḥfe-i Ḫaṭṭāṭīn*.
    description_ar: |
      توفي الشيخ حمد الله بن مصطفى دده الأماسيّ — إمامُ
      المدرسة الياقوتية في الأناضول، ومعلّم الخط للسلطان
      بايزيد الثاني في أماسية قبل توليه السلطنة، والذي أعاد
      صياغة الأقلام الستة الياقوتية في أسلوبٍ عثمانيٍّ متميّز
      حكَم سائر الخط الإمبراطوري حتى القرن العشرين — في
      إستانبول سنة ٩٢٦ هـ (١٥٢٠ م) وقد جاوز السنّ. وكتب — على
      ما يُقدَّر — سبعةً وأربعين مصحفاً كاملاً بخطه، وأكثر من
      ألف «إنعام» و«قطعة»، ونقوش جامع بايزيد الثاني المعمارية
      على القرن الذهبي بالقسطنطينية. وتلامذته شكر الله خليفة،
      وپير محمد، وابنه مصطفى دده، أسّسوا «السلسلة» التي بها
      انتقل نسخُ حمد الله وثلثُه بالإجازة عبر حافظ عثمان
      (المتوفى سنة ١١١٠ هـ) إلى الخط العثماني الحديث. وضبط
      المستقيم زاده تاريخَ وفاته بـسنة ٩٢٦ هـ في «تحفة
      الخطّاطين».
    description_fr: |
      Şeyh Ḥamdullāh ibn Muṣṭafā Dede al-Amāsī — maître
      anatolien de la tradition yāqūtī, professeur de
      calligraphie du sultan Bāyezīd II à Amasya avant
      l'accession de ce dernier au trône, et la figure qui
      retravailla les six écritures de Yāqūt al-Mustaʿṣimī en
      un idiome ottoman distinct qui régit toute la
      calligraphie impériale ultérieure jusqu'au XXe siècle —
      mourut à Istanbul en 926 H (1520 EC) à un âge avancé.
      Il produisit selon les estimations quarante-sept *muṣḥafs*
      complets de sa main, plus d'un millier d'*enʿām*
      (livrets de piété) et de *kıt'a* (feuillets), ainsi que
      les inscriptions architecturales du complexe-mosquée de
      Bāyezīd II sur la Corne d'Or. Ses élèves Şükrullāh
      Khalīfa, Pīr Muḥammad et son fils Muṣṭafā Dede fondèrent
      la *silsile* par laquelle le naskh et le thuluth de
      Hamdullāh furent transmis par chaîne d'ijāza, via Ḥāfiẓ
      ʿOsmān (m. 1110 H), dans la calligraphie ottomane
      moderne. Le biographe ottoman Müstaḳīmzāde donne 926 H
      dans le *Tuḥfe-i Ḫaṭṭāṭīn*.
