  - slug: death-of-hafiz-osman
    category: scholar_death
    title_en: Death of Ḥāfiẓ ʿOsmān — Codifier of Ottoman Naskh
    title_ar: وفاة حافظ عثمان — مُحكِم النسخ العثماني
    title_fr: Mort de Ḥāfiẓ ʿOsmān — codificateur du naskh ottoman
    description_en: |
      Ḥāfiẓ ʿOsmān Efendi — Ottoman master, student of
      Derviş ʿAlī (d. 1084 AH) and through him in the *silsile*
      of Şeyh Hamdullāh, calligraphy tutor to Sultans Aḥmad II
      and Muṣṭafā II, and the figure whose *naskh* hand
      became the Ottoman printing-press standard for Qurʾān
      production from the eighteenth century onward — died at
      Istanbul in 1110 AH (1698 CE) at age about fifty-six.
      He is reported to have written twenty-five complete
      *muṣḥafs* in his hand, of which several survive; the
      first lithographic Qurʾān printed in Cairo in 1864 was
      made directly from a Ḥāfiẓ ʿOsmān model, and his
      lettering remains the basis of the most widely-printed
      modern Arabic naskh Qurʾāns. His students included Yedikuleli
      Seyyid ʿAbdullāh, who transmitted the *silsile* into the
      eighteenth-century revival. Müstaḳīmzāde dates his death
      to Jumādā I 1110 AH; year-precision is retained because
      day-precision is contested across the late biographers.
    description_ar: |
      توفي حافظ عثمان أفندي — الإمامُ العثماني، تلميذ درويش
      علي (المتوفى سنة ١٠٨٤ هـ) وبه يتصل سندُه بسلسلة الشيخ
      حمد الله، ومعلّمُ الخط للسلطانين أحمد الثاني ومصطفى
      الثاني، والذي صار خطُّه النسخيّ المعتمدَ في طباعة
      المصاحف العثمانية منذ القرن الثاني عشر الهجري — في
      إستانبول سنة ١١١٠ هـ (١٦٩٨ م) عن نحو ست وخمسين سنة. ويُروى
      أنّه كتب خمسةً وعشرين مصحفاً كاملاً بخطه، نجا منها
      عدد؛ وقد طُبع المصحف الحجري الأول بالقاهرة سنة ١٢٨٠ هـ
      مباشرةً عن نموذج حافظ عثمان، ولا يزال خطُّه أساسَ أوسع
      المصاحف النسخية المطبوعة انتشاراً اليوم. ومن تلامذته
      السيد عبد الله اليديكولوي الذي نقل السلسلةَ إلى صاحبية
      القرن الثاني عشر الهجري. ويؤرّخ المستقيم زاده وفاتَه
      بجمادى الأولى ١١١٠ هـ؛ وأُبقي هنا على دقة السنة لأنّ
      كتب التراجم تختلف في تحديد اليوم.
    description_fr: |
      Ḥāfiẓ ʿOsmān Efendi — maître ottoman, élève de Derviş
      ʿAlī (m. 1084 H) et par lui dans la *silsile* de Şeyh
      Hamdullāh, professeur de calligraphie des sultans Aḥmad II
      et Muṣṭafā II, et la figure dont la main de *naskh*
      devint la norme des presses ottomanes pour la production
      de Corans à partir du XVIIIe siècle — mourut à Istanbul
      en 1110 H (1698 EC), âgé d'environ cinquante-six ans. Il
      aurait écrit, selon la tradition, vingt-cinq *muṣḥafs*
      complets de sa main, dont plusieurs survivent ; le
      premier Coran lithographié imprimé au Caire en 1864 fut
      réalisé directement à partir d'un modèle de Ḥāfiẓ
      ʿOsmān, et son tracé demeure la base des Corans en naskh
      arabe modernes les plus largement imprimés. Ses élèves
      incluaient Yedikuleli Seyyid ʿAbdullāh, qui transmit la
      *silsile* dans la renaissance du XVIIIe siècle.
      Müstaḳīmzāde date sa mort à Jumādā I 1110 H ; la
      précision annuelle est retenue car les biographes tardifs
      divergent sur le jour exact.
    canonical_hijri: {year: 1110, precision: year}
    canonical_gregorian: {date: 1698-01-01, precision: year, method: tabular_conversion}
