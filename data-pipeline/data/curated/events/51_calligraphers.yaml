# Wave 51 of curated event additions (2026-04-27).
# Major Muslim calligraphers and codifiers of the Arabic / Ottoman
# script: Ibn Muqla, Ibn al-Bawwāb, Yāqūt al-Mustaʿṣimī, Şeyh Hamdullah
# of Amasya, Aḥmad Karahisārī, Ḥāfiẓ ʿOsmān, Mustafa Râkım, Mehmed
# Esad Yesari, Şefik Bey, and Sami Efendi.
#
# The early ʿAbbāsid trio (Ibn Muqla, Ibn al-Bawwāb, Yāqūt
# al-Mustaʿṣimī) is well-attested in the classical Sunni biographical
# corpus — Ibn Khallikān's *Wafayāt al-Aʿyān* anchors their dates
# and al-Dhahabī's *Siyar* / *Tārīkh al-Islām* / Ibn Kathīr's *Bidāya*
# corroborates. Yāqūt al-Mustaʿṣimī (the calligrapher) is carefully
# disambiguated from Yāqūt al-Ḥamawī (the geographer, d. 626 AH).
#
# The Ottoman cluster (Hamdullah, Karahisārī, Ḥāfiẓ ʿOsmān, Râkım,
# Yesari, Şefik, Sami Efendi) post-dates Ibn Khallikān (d. 681 AH)
# and al-Dhahabī (d. 748 AH) so the classical wafayāt literature
# does not cover them. They are attested in late Ottoman
# biographical works (Müstakimzâde Süleyman Saʿdeddin's *Tuḥfe-i
# Ḫaṭṭāṭīn* — the standard biographical dictionary of Ottoman
# calligraphers, completed 1173 AH / 1759 CE — and ʿAtāʾī's
# *Hadāʾiq al-Ḥaqāʾiq fī Takmilat al-Shaqāʾiq*) plus EI2; we mark
# them as `single_source` to be honest about the corpus thinning
# out for this period.
#
# İsmail Hakkı Altunbezer (d. 1946) is intentionally skipped — he
# falls outside the classical biographical tradition.
#
# Hadith refs intentionally omitted (no narration directly anchors
# a calligrapher's death).

events:
  # =========================================================================
  # ʿABBĀSID-ERA CODIFIERS OF THE PROPORTIONAL SCRIPT
  # =========================================================================

  - slug: death-of-ibn-muqla
    category: scholar_death
    title_en: Death of Ibn Muqla — Codifier of the Proportional Script
    title_ar: وفاة ابن مقلة — واضع الخط المنسوب
    title_fr: Mort d'Ibn Muqla — codificateur de l'écriture proportionnée
    description_en: |
      Abū ʿAlī Muḥammad ibn ʿAlī ibn Muqla — ʿAbbāsid vizier
      under three caliphs (al-Muqtadir, al-Qāhir, al-Rāḍī) and
      the architect of the *al-khaṭṭ al-mansūb* ("proportional
      script") system that subordinated Arabic letterforms to a
      mathematical canon based on the rhombic dot, the *alif*,
      and the inscribed circle — died in prison at Baghdad in
      Shawwāl 328 AH (July 940 CE). His political career
      ended in catastrophe: al-Rāḍī, the last caliph to wield
      real power, ordered his right hand amputated in 326 AH
      after a failed conspiracy, then his tongue cut out, and
      he died of his wounds in confinement two years later.
      Yet the lettering reform he had pushed through during
      his vizierates — fixing the six classical hands (*muḥaqqaq*,
      *naskh*, *thuluth*, *rayḥān*, *tawqīʿ*, *riqāʿ*) on a
      proportional basis — became the foundation of every later
      Arabic and Ottoman calligraphic tradition. Ibn Khallikān
      preserves the date and circumstances in detail; al-Dhahabī
      corroborates in *Tārīkh al-Islām* among the year-328 AH
      wafayāt; Ibn Kathīr's *al-Bidāya* gives the parallel notice.
    description_ar: |
      توفي أبو علي محمد بن علي بن مقلة — وزير ثلاثة من خلفاء
      بني العباس (المقتدر والقاهر والراضي)، وواضع نظام «الخط
      المنسوب» الذي ربط حروف العربية بقانونٍ هندسيٍّ يقوم على
      النقطة المعينية والألف والدائرة المحيطة بها — في سجنه
      ببغداد في شوال سنة ٣٢٨ هـ (يوليو ٩٤٠ م). وانتهت حياته
      السياسية إلى نكبةٍ كاملة: أمر الراضي — آخر خلفاء بني
      العباس الفعليّين — بقطع يده اليمنى سنة ٣٢٦ هـ بعد فتنةٍ
      دبرها، ثم بقطع لسانه، فمات في الاعتقال من جراحه بعد
      عامين. ومع ذلك صار إصلاح الكتابة الذي سنَّه في وزاراته —
      وهو ضبط الأقلام الستة الكلاسيكية (المحقق والنسخ والثلث
      والريحان والتوقيع والرقاع) على قاعدة النسبة — أساسَ كل
      ما تلاه من المدارس الخطية العربية والعثمانية. ضبط ابن
      خلكان تاريخ وفاته وملابساتها بالتفصيل؛ وأَلمَّ به الذهبي
      في وفيات «تاريخ الإسلام» سنة ٣٢٨ هـ؛ ورواه ابن كثير في
      «البداية والنهاية» نحواً منه.
    description_fr: |
      Abū ʿAlī Muḥammad ibn ʿAlī ibn Muqla — vizir ʿabbāside
      sous trois califes (al-Muqtadir, al-Qāhir, al-Rāḍī) et
      architecte du système d'*al-khaṭṭ al-mansūb* (« écriture
      proportionnée ») qui soumit les lettres arabes à un canon
      mathématique fondé sur le point rhombique, l'*alif* et le
      cercle inscrit — mourut en prison à Bagdad en Shawwāl 328 H
      (juillet 940 EC). Sa carrière politique se termina en
      catastrophe : al-Rāḍī, dernier calife à détenir un pouvoir
      réel, fit amputer sa main droite en 326 H après une
      conspiration manquée, puis lui fit couper la langue, et il
      mourut de ses blessures en détention deux ans plus tard.
      La réforme calligraphique qu'il avait imposée pendant ses
      vizirats — fixant les six écritures classiques (*muḥaqqaq*,
      *naskh*, *thuluth*, *rayḥān*, *tawqīʿ*, *riqāʿ*) sur une
      base proportionnée — devint pourtant le fondement de toutes
      les traditions calligraphiques arabes et ottomanes
      ultérieures. Ibn Khallikān préserve la date et les
      circonstances en détail ; al-Dhahabī corrobore dans
      *Tārīkh al-Islām* parmi les wafayāt de l'an 328 H ; Ibn
      Kathīr dans *al-Bidāya* en donne la notice parallèle.
    canonical_hijri: {year: 328, month: 10, precision: month}
    canonical_gregorian: {date: 940-07-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death in Shawwāl 328 AH at Baghdad in confinement; full account of the amputations and tongue-cutting under al-Rāḍī."
      - source_key: dhahabi_tarikh_islam
        notes: "Year-328 AH wafayāt entry."
      - source_key: ibn_kathir_bidaya
        notes: "Death notice in al-Bidāya wa-l-Nihāya, year 328 AH."
    people: [[ibn-muqla, died]]
    tags: [abbasid, calligrapher, vizier, baghdad, khatt-mansub, proportional-script]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ibn_Muqla"

  - slug: death-of-ibn-al-bawwab
    category: scholar_death
    title_en: Death of Ibn al-Bawwāb — Refiner of the Rounded Scripts
    title_ar: وفاة ابن البوّاب — مهذِّب الأقلام الرشيقة
    title_fr: Mort d'Ibn al-Bawwāb — perfectionneur des écritures arrondies
    description_en: |
      Abū al-Ḥasan ʿAlī ibn Hilāl, known as Ibn al-Bawwāb
      ("son of the doorkeeper") — Būyid-era calligrapher of
      Baghdad, librarian to the vizier Bahāʾ al-Dawla, and the
      figure who took Ibn Muqla's proportional system and
      refined the rounded hands (*naskh*, *muḥaqqaq*,
      *rayḥān*) into the form they would hold for the next
      five centuries — died at Baghdad in 413 AH (1022 CE).
      His celebrated didactic poem on the art of writing,
      the *Qaṣīda Rāʾiyya* (also known as the *ʿAqd al-Khaṭṭ*),
      was memorised by every later master, and the only
      complete Qurʾān in his hand to have survived (1000 CE,
      now Chester Beatty Library Is. 1431) is the earliest
      extant Qurʾān in the post-Ibn-Muqla proportional naskh.
      Ibn Khallikān gives the date as 413 AH at Baghdad — some
      later sources prefer 423 AH but Ibn Khallikān's earlier
      date is followed by al-Dhahabī in *Tārīkh al-Islām* and
      is the consensus position.
    description_ar: |
      توفي أبو الحسن علي بن هلال المعروف بابن البوّاب — خطّاطُ
      بغداد في العصر البويهي، وخازنُ كتب الوزير بهاء الدولة،
      والذي أخذ نظام ابن مقلة المنسوب فهذَّب الأقلام الرشيقة
      (النسخ والمحقق والريحان) فاتّخذتْ صورتَها التي صحبتها
      خمسة قرون بعدَه — ببغداد سنة ٤١٣ هـ (١٠٢٢ م). وقصيدته
      التعليمية «الرائية» في علم الخط (وتُعرف أيضاً بـ«عقد
      الخط») حفظها كلُّ خطّاطٍ بعده، والمصحفُ الوحيد بخطه الذي
      وصل إلينا كاملاً (سنة ١٠٠٠ م، محفوظٌ اليوم في مكتبة
      تشِستر بيتي بدبلن برقم Is. 1431) هو أقدم مصحفٍ موجودٍ
      بالنسخ المنسوب الذي أعقب ابن مقلة. وأرَّخ ابن خلكان وفاتَه
      بـسنة ٤١٣ هـ ببغداد — وآثر بعض المتأخرين سنةَ ٤٢٣ هـ،
      غير أنّ تاريخ ابن خلكان الأقدم تابعَه عليه الذهبي في
      «تاريخ الإسلام» وهو الراجح.
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn Hilāl, connu sous le nom d'Ibn
      al-Bawwāb (« fils du portier ») — calligraphe bagdādien
      de l'époque būyide, bibliothécaire du vizir Bahāʾ
      al-Dawla, et la figure qui prit le système proportionné
      d'Ibn Muqla pour perfectionner les écritures arrondies
      (*naskh*, *muḥaqqaq*, *rayḥān*) dans la forme qu'elles
      conserveraient pendant les cinq siècles suivants — mourut
      à Bagdad en 413 H (1022 EC). Son célèbre poème didactique
      sur l'art de l'écriture, la *Qaṣīda Rāʾiyya* (également
      connue sous le nom d'*ʿAqd al-Khaṭṭ*), fut mémorisé par
      tous les maîtres ultérieurs, et le seul Coran complet de
      sa main à avoir survécu (1000 EC, aujourd'hui Chester
      Beatty Library, Is. 1431) est le plus ancien Coran
      existant en naskh proportionné post-Ibn-Muqla. Ibn
      Khallikān donne la date de 413 H à Bagdad — certaines
      sources tardives préfèrent 423 H, mais la date plus
      ancienne d'Ibn Khallikān est suivie par al-Dhahabī dans
      *Tārīkh al-Islām* et constitue la position consensuelle.
    canonical_hijri: {year: 413, precision: year}
    canonical_gregorian: {date: 1022-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated 413 AH at Baghdad; alternative 423 AH attributed to later authorities."
      - source_key: dhahabi_tarikh_islam
        notes: "Follows the 413 AH date in the year-413 wafayāt section."
      - source_key: ei2
    people: [[ibn-al-bawwab, died]]
    tags: [abbasid, buyid, calligrapher, baghdad, naskh, muhaqqaq, raihaniyya, mushaf]
    importance: notable
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date
    source_url: "https://en.wikipedia.org/wiki/Ibn_al-Bawwab"

  - slug: death-of-yaqut-al-mustasimi
    category: scholar_death
    title_en: Death of Yāqūt al-Mustaʿṣimī — Qibla of the Calligraphers
    title_ar: وفاة ياقوت المستعصمي — قبلة الخطاطين
    title_fr: Mort de Yāqūt al-Mustaʿṣimī — qibla des calligraphes
    description_en: |
      Jamāl al-Dīn Abū al-Majd Yāqūt ibn ʿAbdallāh
      al-Mustaʿṣimī — secretary, librarian, and calligrapher
      of the last ʿAbbāsid caliph al-Mustaʿṣim biʾllāh (whence
      his nisba), survivor of the Mongol sack of Baghdad in
      656 AH (1258 CE), and the master who refined the *aqlām
      al-sitta* (the six classical scripts) to such a degree
      that he was known to later tradition as *qiblat
      al-kuttāb* ("the qibla of the calligraphers") — died at
      Baghdad in 698 AH (1298 CE). He should not be confused
      with his contemporary Yāqūt al-Ḥamawī (d. 626 AH), the
      great Khurāsānian geographer; Yāqūt al-Mustaʿṣimī is the
      calligrapher. He invented the oblique-cut reed pen
      (*qalam* with *jalfa* angled in a single direction) that
      gave the Yāqūtī ductus its signature crispness, and he
      trained — directly or via his students — the cluster of
      "six masters" (al-sittat al-mutaʾakhkhirūn) who would
      carry the Yāqūtī tradition into Persianate and Ottoman
      calligraphy. Most sources, including Ibn Kathīr's *al-Bidāya
      wa-l-Nihāya* and Ibn Ḥajar's *al-Durar al-Kāmina* (year-698
      wafayāt entry), give 698 AH; some Persian sources prefer
      696 AH. Year-precision is retained as the day is not
      preserved.
    description_ar: |
      توفي جمال الدين أبو المجد ياقوت بن عبد الله المستعصمي —
      كاتبُ المستعصم بالله آخر خلفاء بني العباس (ومن نسبته
      إليه)، ومن نجا من نكبة بغداد التي ارتكبها المغول سنة
      ٦٥٦ هـ (١٢٥٨ م)، والإمامُ الذي بلغ بالأقلام الستة
      الكلاسيكية مبلغاً جعله في عرف من جاء بعده «قبلة الكتّاب» —
      ببغداد سنة ٦٩٨ هـ (١٢٩٨ م). ولا يُخلط بينه وبين معاصره
      ياقوت الحموي الجغرافي الخراساني (المتوفى سنة ٦٢٦ هـ)؛
      فياقوت المستعصمي هو الخطّاط. وأبدع في قطّ القلم قطّاً
      مائلاً («جلفةً») في جهةٍ واحدة، فاكتسب الخطّ الياقوتيّ
      وضوحه المميز، وتخرّج به مباشرةً أو على تلامذته «الستّةُ
      المتأخرون» الذين حملوا تقليده إلى الخطّ الفارسي ثمّ
      العثماني. ويُؤرّخ كثيرٌ من المصادر — منها ابن كثير في
      «البداية والنهاية»، وابن حجر في «الدرر الكامنة» في وفيات
      سنة ٦٩٨ هـ — وفاتَه بسنة ٦٩٨ هـ، وآثر بعضُ المصادر
      الفارسية سنةَ ٦٩٦ هـ. وأُبقي على دقة السنة لأنّ يومَ
      الوفاة لم يُحفظ.
    description_fr: |
      Jamāl al-Dīn Abū al-Majd Yāqūt ibn ʿAbdallāh
      al-Mustaʿṣimī — secrétaire, bibliothécaire et calligraphe
      du dernier calife ʿabbāside al-Mustaʿṣim biʾllāh (d'où sa
      nisba), survivant du sac mongol de Bagdad en 656 H
      (1258 EC), et le maître qui perfectionna les *aqlām
      al-sitta* (les six écritures classiques) à un tel degré
      que la tradition postérieure le connut sous le nom de
      *qiblat al-kuttāb* (« qibla des calligraphes ») — mourut
      à Bagdad en 698 H (1298 EC). À ne pas confondre avec son
      contemporain Yāqūt al-Ḥamawī (m. 626 H), le grand
      géographe khurāsānien ; Yāqūt al-Mustaʿṣimī est le
      calligraphe. Il inventa la coupe oblique du calame (le
      *jalfa* incliné d'un seul côté) qui donna au ductus
      yāqūtī sa netteté caractéristique, et il forma —
      directement ou par ses élèves — le groupe des « six
      maîtres » (al-sittat al-mutaʾakhkhirūn) qui porteraient
      la tradition yāqūtī jusque dans les calligraphies persane
      et ottomane. La plupart des sources, dont *al-Bidāya
      wa-l-Nihāya* d'Ibn Kathīr et *al-Durar al-Kāmina* d'Ibn
      Ḥajar (notice de l'an 698 H), donnent 698 H ; certaines
      sources persanes préfèrent 696 H. La précision annuelle
      est retenue car le jour de la mort n'est pas conservé.
    canonical_hijri: {year: 698, precision: year}
    canonical_gregorian: {date: 1298-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Year-698 AH wafayāt notice in al-Bidāya wa-l-Nihāya."
      - source_key: dhahabi_tarikh_islam
        notes: "Death notice in Tārīkh al-Islām under year 698 AH (some Persian sources give 696 AH)."
      - source_key: ei2
        notes: "EI2 entry — confirms the disambiguation from Yāqūt al-Ḥamawī (d. 626 AH)."
    people: [[yaqut-al-mustasimi, died]]
    tags: [abbasid, calligrapher, baghdad, mongol-survivor, aqlam-sitta, mustasim, yaquti-ductus]
    importance: notable
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date
