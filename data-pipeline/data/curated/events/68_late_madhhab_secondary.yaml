  # =========================================================================
  # MALIKI — THE EGYPTIAN UṢŪLĪ AND THE CANONICAL MUKHTAṢAR
  # =========================================================================

  - slug: death-of-al-qarafi
    category: scholar_death
    title_en: Death of Shihāb al-Dīn al-Qarāfī — Author of *al-Furūq* and *al-Dhakhīra*
    title_ar: وفاة شهاب الدين القرافي — مصنف «الفروق» و«الذخيرة»
    title_fr: Mort de Shihāb al-Dīn al-Qarāfī — auteur d'*al-Furūq* et d'*al-Dhakhīra*
    description_en: |
      Abū al-ʿAbbās Shihāb al-Dīn Aḥmad ibn Idrīs al-Ṣanhājī al-Qarāfī,
      foremost Maliki jurist and uṣūlī of seventh-century AH Egypt and
      author of two pillar works — *al-Dhakhīra* (an encyclopaedic
      Maliki *furūʿ* compendium) and *Anwār al-Burūq fī Anwāʾ al-Furūq*
      (the foundational treatise on legal distinctions, *al-furūq*) —
      died in Cairo at age about sixty. His student al-Bājī had been
      the last great Maliki uṣūlī of al-Andalus; al-Qarāfī carried
      the school's theoretical apparatus eastward and remade it under
      the influence of Fakhr al-Dīn al-Rāzī's school, leaving behind
      an uṣūl reformulation that still defines Maliki theoretical
      jurisprudence. He also authored *al-Iḥkām fī Tamyīz al-Fatāwā
      ʿan al-Aḥkām* on the theory of judicial review and *al-Yawāqīt
      fī Aḥkām al-Mawāqīt*. Ibn Ḥajar covers him in *al-Durar al-
      Kāmina*; Ibn al-ʿImād confirms in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام أبو العباس شهاب الدين أحمد بن إدريس الصنهاجي
      القرافي — كبير فقهاء المالكية وأصولييهم في مصر في القرن
      السابع الهجري، ومصنف الكتابين الجليلين «الذخيرة» في فروع
      المذهب المالكي و«أنوار البروق في أنواء الفروق» الذي هو الكتاب
      المؤسس في الفروق الفقهية — بالقاهرة عن نحو ستين سنة. كان شيخه
      الباجي آخر كبار أصولية المالكية بالأندلس، فحمل القرافي العدة
      الأصولية للمذهب إلى المشرق، وأعاد صياغتها في ضوء طريقة الإمام
      فخر الدين الرازي وأصحابه، فصار له في أصول المالكية إعادة بناء
      ما تزال هي إطار النظر إلى يوم الناس. وله أيضاً «الإحكام في
      تمييز الفتاوى عن الأحكام» في نظرية القضاء، و«اليواقيت في
      أحكام المواقيت». ترجم له ابن حجر في «الدرر الكامنة»، ووافقه
      ابن العماد في «شذرات الذهب».
    description_fr: |
      Abū al-ʿAbbās Shihāb al-Dīn Aḥmad ibn Idrīs al-Ṣanhājī al-Qarāfī,
      le plus grand juriste et uṣūlī malikite de l'Égypte du VIIᵉ
      siècle de l'Hégire et auteur de deux ouvrages-piliers —
      *al-Dhakhīra* (un compendium encyclopédique de *furūʿ*
      malikite) et *Anwār al-Burūq fī Anwāʾ al-Furūq* (le traité
      fondateur sur les distinctions juridiques, *al-furūq*) — mourut
      au Caire à l'âge d'environ soixante ans. Son maître al-Bājī
      avait été le dernier grand uṣūlī malikite d'al-Andalus;
      al-Qarāfī porta l'appareil théorique de l'école vers
      l'Orient et le refit sous l'influence de l'école de Fakhr
      al-Dīn al-Rāzī, laissant une refondation de l'*uṣūl*
      malikite qui définit toujours la jurisprudence théorique
      de l'école. Il composa également *al-Iḥkām fī Tamyīz
      al-Fatāwā ʿan al-Aḥkām* sur la théorie de la révision
      judiciaire et *al-Yawāqīt fī Aḥkām al-Mawāqīt*. Ibn Ḥajar
      le traite dans *al-Durar al-Kāmina*; Ibn al-ʿImād le
      confirme dans *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 684, precision: year}
    canonical_gregorian: {date: 1285-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
      - source_key: ibn_imad_shadharat
      - source_key: ei2
    people: [[al-qarafi, subject]]
    tags: [maliki, fiqh, usul, furuq, dhakhira, cairo, mamluk]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Qarafi"

  - slug: death-of-khalil-al-jundi
    category: scholar_death
    title_en: Death of Khalīl al-Jundī — Author of *al-Mukhtaṣar al-Khalīl*
    title_ar: وفاة خليل الجندي — صاحب «المختصر» في فقه المالكية
    title_fr: Mort de Khalīl al-Jundī — auteur d'*al-Mukhtaṣar al-Khalīl*
    description_en: |
      Khalīl ibn Isḥāq al-Jundī al-Mālikī, the most influential late-
      Mamluk Maliki jurist of Egypt and author of *al-Mukhtaṣar*
      (universally known across the Maliki world simply as
      *Mukhtaṣar Khalīl*), died in Cairo. His *Mukhtaṣar* compresses
      the Maliki *furūʿ* into a fewer-than-three-hundred-page
      reference whose terse formulations encode the *muʿtamad*
      position of the school on every standard legal question —
      becoming the canonical teaching matn of Maliki fiqh from
      Egypt and the Sudan to West Africa, the Maghrib, and the
      Hijaz. Generations of subsequent Maliki scholarship — Bahrām,
      al-Mawwāq, al-Ḥaṭṭāb, al-Dasūqī, ʿIllīsh — consist principally
      of commentaries (*shurūḥ*) and ḥāshiyas on his *Mukhtaṣar*.
      Ibn Ḥajar gives the standard biographical notice in *al-
      Durar al-Kāmina*; Ibn al-ʿImād corroborates the death notice
      in *Shadharāt al-Dhahab* under 776 AH (some sources prefer
      767 AH; we follow the *Durar* / *Shadharāt* attestation).
    description_ar: |
      توفي الإمام خليل بن إسحاق الجندي المالكي — أعظم فقهاء المالكية
      في مصر في أواخر دولة المماليك ومصنف «المختصر» المعروف في
      عامة بلاد المالكية بـ«مختصر خليل» — بالقاهرة. اختصر «المختصر»
      فروع المذهب المالكي في كتيب لم يبلغ ثلاث مئة صحيفة، تختزن
      عباراته الموجزة المعتمد من أقوال أصحاب المذهب في كل مسألة
      من المسائل الفقهية المشهورة، فصار متن التدريس المعتمد للمذهب
      المالكي من مصر والسودان وغرب أفريقيا إلى المغرب والحجاز.
      وعامة العلم المالكي من بعده — بهرام والمواق والحطاب والدسوقي
      وعليش — تدور أساساً على شروح وحواشٍ على «المختصر». ترجم له
      ابن حجر في «الدرر الكامنة»، وأرّخ ابن العماد وفاته في
      «شذرات الذهب» سنة ست وسبعين وسبعمئة (وقيل سبع وستين، ولكنا
      اخترنا التاريخ الذي نص عليه الإمامان معاً).
    description_fr: |
      Khalīl ibn Isḥāq al-Jundī al-Mālikī, le juriste malikite le plus
      influent de l'Égypte de la fin de l'époque mamelouke et auteur
      d'*al-Mukhtaṣar* (universellement connu dans le monde malikite
      comme *Mukhtaṣar Khalīl*), mourut au Caire. Son *Mukhtaṣar*
      condense les *furūʿ* malikites en un ouvrage de moins de
      trois cents pages dont les formulations laconiques encodent
      la position *muʿtamad* de l'école sur chaque question
      juridique standard — devenant le *matn* canonique
      d'enseignement du fiqh malikite de l'Égypte et du Soudan à
      l'Afrique de l'Ouest, au Maghreb et au Hedjaz. Des
      générations entières d'érudition malikite ultérieure —
      Bahrām, al-Mawwāq, al-Ḥaṭṭāb, al-Dasūqī, ʿIllīsh — consistent
      principalement en commentaires (*shurūḥ*) et *ḥāshiyas* sur
      son *Mukhtaṣar*. Ibn Ḥajar donne la notice biographique
      standard dans *al-Durar al-Kāmina*; Ibn al-ʿImād corrobore
      l'avis de décès dans *Shadharāt al-Dhahab* à l'année 776 H
      (certaines sources préfèrent 767 H; nous suivons
      l'attestation de *Durar* / *Shadharāt*).
    canonical_hijri: {year: 776, precision: year}
    canonical_gregorian: {date: 1374-01-01, precision: year, method: attested}
