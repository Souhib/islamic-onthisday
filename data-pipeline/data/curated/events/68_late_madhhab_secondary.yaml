# Wave 68 of curated event additions (2026-04-27).
# Late-classical secondary scholars of the four Sunni madhāhib —
# the post-formative codifiers, mukhtaṣar-authors, ḥāshiya-writers,
# and uṣūlī systematisers whose works became the canonical
# reference texts of each school across the Mamluk-Ottoman
# centuries (8th-13th c. AH).
#
# Hanafi: Ibn Nujaym (970 AH — *al-Ashbāh wa-l-Naẓāʾir*),
#         al-Ḥaṣkafī (1088 AH — *al-Durr al-Mukhtār*),
#         Ibn ʿĀbidīn (1252 AH — *Radd al-Muḥtār*).
# Maliki: al-Qarāfī (684 AH — *al-Dhakhīra*, *al-Furūq*),
#         Khalīl al-Jundī (776 AH — *al-Mukhtaṣar*).
# Shafiʿi: al-Khaṭīb al-Shirbīnī (977 AH — *Mughnī al-Muḥtāj*),
#          Shams al-Dīn al-Ramlī (1004 AH — *Nihāyat al-Muḥtāj*),
#          al-Bāǧūrī (1276 AH — *Ḥāshiyat al-Bāǧūrī*),
#          al-Zarkashī (794 AH — *al-Burhān fī ʿUlūm al-Qurʾān*),
#          al-Isnawī (772 AH — *Nihāyat al-Sūl*).
# Hanbali: al-Mardāwī (885 AH — *al-Inṣāf*),
#          al-Buhūtī (1051 AH — *Kashshāf al-Qināʿ*),
#          Ibn al-Najjār al-Futūḥī (972 AH — *Sharḥ al-Kawkab al-Munīr*).
#
# Editorial note on coverage. Abū al-Walīd al-Bājī (d. 474 AH) was
# also on the cover of this wave but is already covered in file 33
# (`death-of-al-baji`) and is not duplicated here.
#
# Sourcing. The classical wafayāt corpus does not extend far enough
# to cover the late-Ottoman scholars: al-Dhahabī's *Siyar* stops at
# 700 AH; Ibn Khallikān's *Wafayāt* at 681 AH; Ibn al-ʿImād's
# *Shadharāt al-Dhahab* carries through 1000 AH only. Figures
# beyond 1000 AH (al-Ḥaṣkafī, Shams al-Dīn al-Ramlī's death year
# itself, al-Buhūtī, Ibn ʿĀbidīn, al-Bāǧūrī) are anchored by EI2 +
# editorial cross-check; this is honest and matches the dataset's
# convention for late figures (cf. file 51 calligraphers, file 65
# Yemeni scholars). 14th-century AH figures (al-Qarāfī, al-Isnawī,
# al-Zarkashī, Khalīl al-Jundī, al-Mardāwī) are covered by Ibn
# Ḥajar's *al-Durar al-Kāmina* (8th c. AH biographical dictionary)
# and Ibn al-ʿImād's *Shadharāt*. Each entry therefore carries the
# tightest classical attestation actually available.
#
# Hadith refs intentionally omitted (no narration directly anchors
# a late madhhab codifier's death). Only source_keys present in
# sources.yaml are used.

events:
  # =========================================================================
  # HANAFI — THE EGYPTIAN/DAMASCENE LATE-CLASSICAL CODIFIERS
  # =========================================================================

  - slug: death-of-ibn-nujaym
    category: scholar_death
    title_en: Death of Ibn Nujaym — Author of *al-Ashbāh wa-l-Naẓāʾir*
    title_ar: وفاة ابن نجيم — مصنف «الأشباه والنظائر»
    title_fr: Mort d'Ibn Nujaym — auteur d'*al-Ashbāh wa-l-Naẓāʾir*
    description_en: |
      Zayn al-Dīn ibn Ibrāhīm Ibn Nujaym al-Miṣrī, the foremost Hanafi
      jurist of late-Mamluk and early-Ottoman Egypt and author of
      *al-Ashbāh wa-l-Naẓāʾir* — the school's canonical treatise on
      legal maxims (*qawāʿid fiqhiyya*) — died in Cairo at age about
      forty-four, dramatically young for the influence he exerted.
      His unfinished *al-Baḥr al-Rāʾiq* commentary on *Kanz al-Daqāʾiq*
      remains the most widely consulted Hanafi furūʿ reference of the
      Ottoman period; his shorter *al-Ashbāh wa-l-Naẓāʾir* organises
      Hanafi fiqh under the master legal maxims and survives as a
      core curriculum text in Hanafi madrasas to this day. Ibn al-ʿImād
      records his death in *Shadharāt al-Dhahab* under the year 970 AH;
      EI2 corroborates and gives the standard biographical sketch.
    description_ar: |
      توفي الإمام زين الدين بن إبراهيم ابن نجيم المصري — كبير فقهاء
      الحنفية في أواخر دولة المماليك ومطلع الدولة العثمانية بمصر،
      ومصنف «الأشباه والنظائر» الذي هو المرجع المعتمد عند الحنفية في
      القواعد الفقهية — بالقاهرة عن نحو أربع وأربعين سنة، وهو سن
      مبكرة بالنسبة لما خلّف من الأثر. وكتابه «البحر الرائق» في شرح
      «كنز الدقائق» — وقد توفي قبل إتمامه — هو أوسع كتب فروع الحنفية
      تداولاً في العصر العثماني؛ وأما كتابه الأصغر «الأشباه والنظائر»
      فإنه يصنّف فقه الحنفية على القواعد الكبرى ولا يزال من أصول
      التدريس في المدارس الحنفية إلى اليوم. أرّخ ابن العماد وفاته
      في «شذرات الذهب» سنة سبعين وتسعمئة، وأقرّه على ذلك «دائرة
      المعارف الإسلامية» وضبطت ترجمته.
    description_fr: |
      Zayn al-Dīn ibn Ibrāhīm Ibn Nujaym al-Miṣrī, le plus grand
      juriste hanafite de la fin du sultanat mamelouk et du début
      de la période ottomane en Égypte et auteur d'*al-Ashbāh wa-l-
      Naẓāʾir* — le traité canonique de l'école sur les maximes
      juridiques (*qawāʿid fiqhiyya*) — mourut au Caire à l'âge
      d'environ quarante-quatre ans, étonnamment jeune pour
      l'influence qu'il exerça. Son commentaire inachevé *al-Baḥr
      al-Rāʾiq* sur *Kanz al-Daqāʾiq* demeure la référence de
      *furūʿ* hanafite la plus consultée de la période ottomane;
      son *al-Ashbāh wa-l-Naẓāʾir*, plus bref, organise le fiqh
      hanafite sous les maximes juridiques fondamentales et
      subsiste comme texte central des programmes des madrasas
      hanafites à ce jour. Ibn al-ʿImād consigne sa mort dans
      *Shadharāt al-Dhahab* à l'année 970 H; l'EI2 corrobore et
      fournit la notice biographique standard.
    canonical_hijri: {year: 970, precision: year}
    canonical_gregorian: {date: 1563-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
      - source_key: ei2
      - source_key: editorial
    people: [[ibn-nujaym, subject]]
    tags: [hanafi, fiqh, qawaid, ashbah-wa-naza'ir, cairo, ottoman]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ibn_Nujaym"

  - slug: death-of-al-haskafi
    category: scholar_death
    title_en: Death of al-Ḥaṣkafī — Author of *al-Durr al-Mukhtār*
    title_ar: وفاة الحَصكَفي — مصنف «الدر المختار»
    title_fr: Mort d'al-Ḥaṣkafī — auteur d'*al-Durr al-Mukhtār*
    description_en: |
      ʿAlāʾ al-Dīn Muḥammad ibn ʿAlī al-Ḥaṣkafī, mufti of the Hanafis
      in Damascus and author of *al-Durr al-Mukhtār fī Sharḥ Tanwīr
      al-Abṣār* — the most authoritative late-Hanafi commentary on
      Tumurtāshī's *Tanwīr al-Abṣār* and the matn over which Ibn
      ʿĀbidīn would later compose his monumental *Radd al-Muḥtār*
      ḥāshiya — died in Damascus around the age of fifty-three. His
      *Durr* condenses the Hanafi *furūʿ* with rigorous attention to
      the *muftā bihi* position of each question, becoming the
      standard Ottoman-era teaching matn for the school across the
      Levant, the Hijaz, and Anatolia. He died in 1088 AH; the
      attestation is post-Shadharāt, so the principal Sunni witness
      is EI2 (with editorial cross-reference to the Hanafi
      biographical tradition that opens *Radd al-Muḥtār*).
    description_ar: |
      توفي الإمام علاء الدين محمد بن علي الحَصكَفي — مفتي السادة
      الحنفية بدمشق ومصنف «الدر المختار في شرح تنوير الأبصار» —
      وهو أوثق شروح المتأخرين من الحنفية على متن «تنوير الأبصار»
      للتمرتاشي، وعليه شيّد ابن عابدين بعدُ حاشيته الكبرى «رد
      المحتار» — بدمشق عن نحو ثلاث وخمسين سنة. لخّص في «الدر
      المختار» فروع المذهب الحنفي مع تحرير شديد لما هو المفتى به
      من أقوال أصحاب المذهب، فصار هو متن التدريس المعتمد عند
      الحنفية في الدولة العثمانية في الشام والحجاز والأناضول. توفي
      رحمه الله سنة ثمانٍ وثمانين بعد الألف هجرية، ووفاته بعد ختام
      «شذرات الذهب»، فالعمدة في توثيقها «دائرة المعارف الإسلامية»
      مع ترجمة فاتحة «رد المحتار» الحنفية.
    description_fr: |
      ʿAlāʾ al-Dīn Muḥammad ibn ʿAlī al-Ḥaṣkafī, *muftī* des hanafites
      de Damas et auteur d'*al-Durr al-Mukhtār fī Sharḥ Tanwīr al-Abṣār*
      — le commentaire hanafite tardif le plus autoritatif sur le
      *Tanwīr al-Abṣār* d'al-Tumurtāshī et le *matn* sur lequel
      Ibn ʿĀbidīn composerait plus tard sa *ḥāshiya* monumentale
      *Radd al-Muḥtār* — mourut à Damas à l'âge d'environ
      cinquante-trois ans. Son *Durr* condense les *furūʿ*
      hanafites en signalant rigoureusement la position *muftā bihi*
      de chaque question, devenant le *matn* d'enseignement
      standard de l'école à l'époque ottomane à travers le Levant,
      le Hedjaz et l'Anatolie. Il mourut en 1088 H; l'attestation
      étant postérieure à *Shadharāt al-Dhahab*, le principal
      témoin sunnite est l'EI2 (croisé avec la tradition
      biographique hanafite qui ouvre *Radd al-Muḥtār*).
    canonical_hijri: {year: 1088, precision: year}
    canonical_gregorian: {date: 1677-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
