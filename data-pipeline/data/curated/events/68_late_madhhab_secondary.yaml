  - slug: death-of-ibn-al-najjar-al-futuhi
    category: scholar_death
    title_en: Death of Ibn al-Najjār al-Futūḥī — Author of *Sharḥ al-Kawkab al-Munīr*
    title_ar: وفاة ابن النجار الفتوحي — مصنف «شرح الكوكب المنير»
    title_fr: Mort d'Ibn al-Najjār al-Futūḥī — auteur de *Sharḥ al-Kawkab al-Munīr*
    description_en: |
      Taqī al-Dīn Muḥammad ibn Aḥmad Ibn al-Najjār al-Futūḥī,
      Hanbali jurist and uṣūlī of late-Mamluk Cairo and author of
      *Mukhtaṣar al-Taḥrīr* and his own commentary thereon
      *Sharḥ al-Kawkab al-Munīr* — the central late-Hanbali matn
      and commentary on the principles of jurisprudence (*uṣūl al-
      fiqh*) — died in Cairo at age about seventy-six. *al-Kawkab
      al-Munīr* compresses Ibn Mufliḥ's *al-Taḥrīr* and Ibn al-
      Lahhām's elaborations into a single matn-and-commentary that
      became the standard Hanbali uṣūl text. He also composed
      *Muntahā al-Irādāt* (a furūʿ matn merging al-Ḥajjāwī's *al-
      Iqnāʿ* with al-Tujībī's *al-Tanqīḥ*) — itself the basis of
      al-Buhūtī's later *Sharḥ Muntahā al-Irādāt*. Ibn al-ʿImād
      records the death in *Shadharāt al-Dhahab* under 972 AH; EI2
      corroborates and gives the principal Sunni biographical
      sketch.
    description_ar: |
      توفي الإمام تقي الدين محمد بن أحمد ابن النجار الفتوحي — فقيه
      الحنابلة وأصوليهم بالقاهرة في أواخر دولة المماليك، ومصنف
      «مختصر التحرير» وشرحه «شرح الكوكب المنير» — وهو المتن
      والشرح المعتمدان عند المتأخرين من الحنابلة في أصول الفقه —
      بالقاهرة عن نحو ست وسبعين سنة. اختصر في «الكوكب المنير»
      «التحرير» لابن مفلح مع زيادات ابن اللحام في متن وشرح صارا
      مرجع التدريس الأصولي عند الحنابلة. وله «منتهى الإرادات»
      المتن الذي جمع بين «الإقناع» للحجاوي و«التنقيح» للتجيبي،
      وعليه شيد البهوتي بعدُ شرحه الكبير «شرح منتهى الإرادات».
      أرّخ ابن العماد وفاته في «شذرات الذهب» سنة اثنتين وسبعين
      وتسعمئة، وأقرّه «دائرة المعارف الإسلامية» على ذلك.
    description_fr: |
      Taqī al-Dīn Muḥammad ibn Aḥmad Ibn al-Najjār al-Futūḥī,
      juriste et uṣūlī hanbalite du Caire de la fin de l'époque
      mamelouke et auteur de *Mukhtaṣar al-Taḥrīr* et de son propre
      commentaire *Sharḥ al-Kawkab al-Munīr* — le *matn* et le
      commentaire centraux des hanbalites tardifs sur les
      principes de la jurisprudence (*uṣūl al-fiqh*) — mourut au
      Caire à l'âge d'environ soixante-seize ans. *al-Kawkab al-
      Munīr* condense le *Taḥrīr* d'Ibn Mufliḥ et les
      élaborations d'Ibn al-Lahhām en un seul *matn*-et-
      commentaire qui devint le texte d'*uṣūl* hanbalite standard.
      Il composa aussi *Muntahā al-Irādāt* (un *matn* de *furūʿ*
      fusionnant l'*Iqnāʿ* d'al-Ḥajjāwī avec le *Tanqīḥ* d'al-
      Tujībī) — lui-même la base du *Sharḥ Muntahā al-Irādāt*
      ultérieur d'al-Buhūtī. Ibn al-ʿImād consigne la mort dans
      *Shadharāt al-Dhahab* à l'année 972 H; l'EI2 corrobore et
      donne la notice biographique sunnite principale.
    canonical_hijri: {year: 972, precision: year}
    canonical_gregorian: {date: 1564-01-01, precision: year, method: attested}
