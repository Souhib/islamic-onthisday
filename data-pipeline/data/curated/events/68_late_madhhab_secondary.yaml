  - slug: death-of-al-zarkashi
    category: scholar_death
    title_en: Death of Badr al-Dīn al-Zarkashī — Author of *al-Burhān fī ʿUlūm al-Qurʾān*
    title_ar: وفاة بدر الدين الزركشي — مصنف «البرهان في علوم القرآن»
    title_fr: Mort de Badr al-Dīn al-Zarkashī — auteur d'*al-Burhān fī ʿUlūm al-Qurʾān*
    description_en: |
      Badr al-Dīn Muḥammad ibn Bahādur al-Zarkashī, polymath Shāfiʿī
      jurist of Mamluk Cairo and author of *al-Burhān fī ʿUlūm al-
      Qurʾān* — the foundational systematic treatise on the Qurʾanic
      sciences (which al-Suyūṭī's later *al-Itqān* expressly takes
      as its base) — died in Cairo at age about fifty. He wrote in
      every Shāfiʿī discipline: *al-Manthūr fī al-Qawāʿid* on legal
      maxims, *al-Baḥr al-Muḥīṭ fī Uṣūl al-Fiqh* (an encyclopaedic
      Shāfiʿī uṣūl reference), *al-Diyaba fī Sharḥ al-Tadhkira* in
      ḥadīth, *al-Iʿlām bi-Faḍl al-Aʿlām* in fiqh, and a still-read
      ḥāshiya on al-Bukhārī. Ibn Ḥajar gives a long notice in
      *al-Durar al-Kāmina*; Ibn al-ʿImād confirms in *Shadharāt
      al-Dhahab* under 794 AH.
    description_ar: |
      توفي الإمام بدر الدين محمد بن بهادر الزركشي — العلامة
      الموسوعي في فقه الشافعية بالقاهرة المملوكية ومصنف «البرهان
      في علوم القرآن» الذي هو الكتاب المؤسس في تقنين علوم القرآن
      تقنيناً منظماً (وعليه عوّل السيوطي في «الإتقان» مصرحاً) —
      بالقاهرة عن نحو خمسين سنة. صنّف في كل فروع المعرفة الشافعية:
      «المنثور في القواعد» في القواعد الفقهية، و«البحر المحيط في
      أصول الفقه» الذي هو الموسوعة الأصولية الشافعية، و«شرح
      التذكرة» في الحديث، و«الإعلام بفضل الأعلام» في الفقه،
      وحاشية لا تزال متداولة على «صحيح البخاري». ترجم له ابن حجر
      ترجمة طويلة في «الدرر الكامنة»، وأقرّه ابن العماد في
      «شذرات الذهب» سنة أربع وتسعين وسبعمئة.
    description_fr: |
      Badr al-Dīn Muḥammad ibn Bahādur al-Zarkashī, juriste
      shāfiʿite polymathe du Caire mamelouk et auteur d'*al-Burhān
      fī ʿUlūm al-Qurʾān* — le traité systématique fondateur sur
      les sciences du Coran (sur lequel al-Suyūṭī fondera
      explicitement son *al-Itqān* postérieur) — mourut au Caire à
      l'âge d'environ cinquante ans. Il écrivit dans chaque
      discipline shāfiʿite : *al-Manthūr fī al-Qawāʿid* sur les
      maximes juridiques, *al-Baḥr al-Muḥīṭ fī Uṣūl al-Fiqh* (une
      référence encyclopédique d'*uṣūl* shāfiʿite), *Sharḥ al-
      Tadhkira* en hadith, *al-Iʿlām bi-Faḍl al-Aʿlām* en fiqh, et
      une *ḥāshiya* toujours lue sur al-Bukhārī. Ibn Ḥajar donne
      une longue notice dans *al-Durar al-Kāmina*; Ibn al-ʿImād
      confirme dans *Shadharāt al-Dhahab* à l'année 794 H.
