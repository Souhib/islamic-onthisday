  - slug: death-of-al-isnawi
    category: scholar_death
    title_en: Death of Jamāl al-Dīn al-Isnawī — Author of *Nihāyat al-Sūl*
    title_ar: وفاة جمال الدين الإسنوي — مصنف «نهاية السول»
    title_fr: Mort de Jamāl al-Dīn al-Isnawī — auteur de *Nihāyat al-Sūl*
    description_en: |
      Jamāl al-Dīn ʿAbd al-Raḥīm ibn al-Ḥasan al-Isnawī, leading
      Shāfiʿī uṣūlī of late-Mamluk Egypt and author of *Nihāyat al-
      Sūl fī Sharḥ Minhāj al-Wuṣūl* — the canonical commentary on
      al-Bayḍāwī's *Minhāj al-Wuṣūl ilā ʿIlm al-Uṣūl* and the
      central Shāfiʿī uṣūl matn of the period — died in Cairo at
      age about sixty-eight. He composed major works in every
      Shāfiʿī branch: *al-Tamhīd fī Takhrīj al-Furūʿ ʿalā al-Uṣūl*
      (a model treatise on uṣūl-furūʿ derivation), *al-Muhimmāt*
      (a critical apparatus on al-Nawawī's *Rawḍa* and al-Rāfiʿī's
      *Sharḥ al-Wajīz*), and *Ṭabaqāt al-Shāfiʿiyya*. Ibn Ḥajar
      treats him at length in *al-Durar al-Kāmina*; Ibn al-ʿImād
      records the death under 772 AH in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام جمال الدين عبد الرحيم بن الحسن الإسنوي — كبير
      أصوليي الشافعية في مصر في أواخر عهد المماليك ومصنف «نهاية
      السول في شرح منهاج الوصول» — وهو شرح المعتمد على «منهاج
      الوصول إلى علم الأصول» للبيضاوي ومن أمهات متون الأصول
      الشافعية في عصره — بالقاهرة عن نحو ثمانٍ وستين سنة. وله
      تصانيف في كل أبواب المذهب الشافعي: «التمهيد في تخريج الفروع
      على الأصول» الذي هو أسوة في الباب، و«المهمات» وهو
      الانتقادات على «الروضة» للنووي و«شرح الوجيز» للرافعي،
      و«طبقات الشافعية». أطال ابن حجر ترجمته في «الدرر الكامنة»،
      وأرّخ ابن العماد وفاته في «شذرات الذهب» سنة اثنتين وسبعين
      وسبعمئة.
    description_fr: |
      Jamāl al-Dīn ʿAbd al-Raḥīm ibn al-Ḥasan al-Isnawī, principal
      uṣūlī shāfiʿite de l'Égypte de la fin de l'époque mamelouke
      et auteur de *Nihāyat al-Sūl fī Sharḥ Minhāj al-Wuṣūl* — le
      commentaire canonique du *Minhāj al-Wuṣūl ilā ʿIlm al-Uṣūl*
      d'al-Bayḍāwī et le *matn* central d'*uṣūl* shāfiʿite de la
      période — mourut au Caire à l'âge d'environ soixante-huit
      ans. Il composa des ouvrages majeurs dans chaque branche
      shāfiʿite : *al-Tamhīd fī Takhrīj al-Furūʿ ʿalā al-Uṣūl*
      (un traité-modèle de dérivation *uṣūl*-*furūʿ*),
      *al-Muhimmāt* (un appareil critique sur la *Rawḍa* d'al-Nawawī
      et le *Sharḥ al-Wajīz* d'al-Rāfiʿī) et *Ṭabaqāt al-Shāfiʿiyya*.
      Ibn Ḥajar le traite longuement dans *al-Durar al-Kāmina*; Ibn
      al-ʿImād consigne la mort à l'année 772 H dans *Shadharāt
      al-Dhahab*.
    canonical_hijri: {year: 772, precision: year}
    canonical_gregorian: {date: 1370-01-01, precision: year, method: attested}
