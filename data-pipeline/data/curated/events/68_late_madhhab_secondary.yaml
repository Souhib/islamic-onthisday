  - slug: death-of-ibn-abidin
    category: scholar_death
    title_en: Death of Ibn ʿĀbidīn — Author of *Radd al-Muḥtār*
    title_ar: وفاة ابن عابدين — مصنف «رد المحتار»
    title_fr: Mort d'Ibn ʿĀbidīn — auteur de *Radd al-Muḥtār*
    description_en: |
      Muḥammad Amīn ibn ʿUmar Ibn ʿĀbidīn al-Dimashqī, mufti of the
      Hanafis in late-Ottoman Damascus and author of *Radd al-Muḥtār
      ʿalā al-Durr al-Mukhtār* — the colossal seven-volume ḥāshiya
      that effectively closed the Hanafi madhhab's classical
      development by adjudicating every disputed *muftā bihi*
      position from al-Sarakhsī through al-Ḥaṣkafī — died in Damascus
      at age about fifty. *Radd al-Muḥtār* (also called *Ḥāshiyat
      Ibn ʿĀbidīn*) is treated across the contemporary Hanafi world,
      from Cairo to the Indian subcontinent, as the final word on
      what the school holds; no Hanafi mufti opens a fatwa file
      without it. He left a major collection of fatāwā (*al-ʿUqūd
      al-Durriyya*) and a treatise on legal customs (*Nashr al-ʿUrf*).
      His death in 1252 AH falls beyond Ibn al-ʿImād's *Shadharāt*;
      EI2 is the principal Sunni-canonical attestation.
    description_ar: |
      توفي الإمام محمد أمين بن عمر ابن عابدين الدمشقي — مفتي السادة
      الحنفية بدمشق في أواخر العهد العثماني، ومصنف «رد المحتار على
      الدر المختار» الذي هو الحاشية الكبرى في سبع مجلدات، أغلق بها
      المذهب الحنفي عمليّاً في تطوره الكلاسيكي بترجيحه ما هو المفتى
      به في كل مسألة عن السرخسي ومن بعده إلى الحَصكَفي — بدمشق عن
      نحو خمسين سنة. وكتاب «رد المحتار» — المعروف بـ«حاشية ابن
      عابدين» — هو القول الفصل في فقه الحنفية المعاصر من القاهرة
      إلى الهند، لا يخلو منه مكتب مفتٍ حنفي في فتاواه. وله مجموعة
      فتاوى كبرى هي «العقود الدرية»، ورسالة في العرف هي «نشر العرف».
      وفاته رحمه الله في سنة اثنتين وخمسين ومئتين بعد الألف، وهي
      بعد ختام «شذرات الذهب»، فالعمدة في توثيقها عند أهل السنة
      «دائرة المعارف الإسلامية».
    description_fr: |
      Muḥammad Amīn ibn ʿUmar Ibn ʿĀbidīn al-Dimashqī, *muftī* des
      hanafites de Damas à la fin de la période ottomane et auteur
      de *Radd al-Muḥtār ʿalā al-Durr al-Mukhtār* — la *ḥāshiya*
      colossale en sept volumes qui clôt effectivement le
      développement classique de l'école hanafite en arbitrant
      toute position *muftā bihi* contestée d'al-Sarakhsī jusqu'à
      al-Ḥaṣkafī — mourut à Damas à l'âge d'environ cinquante ans.
      *Radd al-Muḥtār* (aussi appelé *Ḥāshiyat Ibn ʿĀbidīn*) est
      traité à travers le monde hanafite contemporain, du Caire au
      sous-continent indien, comme le mot final sur ce que tient
      l'école; aucun *muftī* hanafite n'ouvre un dossier de fatwa
      sans lui. Il laissa une grande collection de *fatāwā*
      (*al-ʿUqūd al-Durriyya*) et un traité sur les coutumes
      juridiques (*Nashr al-ʿUrf*). Sa mort en 1252 H est
      postérieure aux *Shadharāt* d'Ibn al-ʿImād; l'EI2 constitue
      la principale attestation au sein du canon sunnite.
    canonical_hijri: {year: 1252, precision: year}
    canonical_gregorian: {date: 1836-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
