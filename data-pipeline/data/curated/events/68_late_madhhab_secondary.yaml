  - slug: death-of-al-mardawi
    category: scholar_death
    title_en: Death of ʿAlāʾ al-Dīn al-Mardāwī — Author of *al-Inṣāf*
    title_ar: وفاة علاء الدين المرداوي — مصنف «الإنصاف»
    title_fr: Mort de ʿAlāʾ al-Dīn al-Mardāwī — auteur d'*al-Inṣāf*
    description_en: |
      ʿAlāʾ al-Dīn Abū al-Ḥasan ʿAlī ibn Sulaymān al-Mardāwī al-
      Ṣāliḥī, the foremost Hanbali jurist of the late Mamluk era and
      author of *al-Inṣāf fī Maʿrifat al-Rājiḥ min al-Khilāf* — the
      canonical reference adjudicating the *muʿtamad* position in
      every disputed question of the Hanbali school — died in
      Damascus at age about sixty-eight. *al-Inṣāf* arbitrates
      between the conflicting transmissions of Aḥmad ibn Ḥanbal's
      positions across his major students and is the indispensable
      adjudicator without which post-Mardāwī Hanbali fiqh cannot
      function. He also composed *Taḥrīr al-Manqūl* on uṣūl al-fiqh
      and *Tanqīḥ al-Mushbiʿ*, both teaching matns. Ibn al-ʿImād
      records the death in *Shadharāt al-Dhahab* under 885 AH; EI2
      gives the standard biographical notice.
    description_ar: |
      توفي الإمام علاء الدين أبو الحسن علي بن سليمان المرداوي
      الصالحي — كبير فقهاء الحنابلة في أواخر دولة المماليك ومصنف
      «الإنصاف في معرفة الراجح من الخلاف» — وهو المرجع المعتمد في
      ترجيح المعتمد عند الحنابلة في كل مسألة وقع فيها الخلاف —
      بدمشق عن نحو ثمانٍ وستين سنة. حكَّم «الإنصاف» بين الروايات
      المتباينة عن الإمام أحمد بن حنبل عند أصحابه الكبار، وهو
      الفيصل الذي بدونه لا يستقيم الفقه الحنبلي بعد المرداوي. وله
      أيضاً «تحرير المنقول» في أصول الفقه و«تنقيح المشبع» — وكلاهما
      من متون التدريس. أرّخ ابن العماد وفاته في «شذرات الذهب»
      سنة خمس وثمانين وثمانمئة، وأقرّه على ذلك «دائرة المعارف
      الإسلامية» في ترجمته الشاملة.
    description_fr: |
      ʿAlāʾ al-Dīn Abū al-Ḥasan ʿAlī ibn Sulaymān al-Mardāwī al-
      Ṣāliḥī, le plus grand juriste hanbalite de la fin de l'époque
      mamelouke et auteur d'*al-Inṣāf fī Maʿrifat al-Rājiḥ min al-
      Khilāf* — la référence canonique qui arbitre la position
      *muʿtamad* dans toute question contestée de l'école
      hanbalite — mourut à Damas à l'âge d'environ soixante-huit
      ans. *al-Inṣāf* arbitre entre les transmissions
      contradictoires des positions d'Aḥmad ibn Ḥanbal chez ses
      principaux élèves et est l'arbitre indispensable sans lequel
      le fiqh hanbalite post-Mardāwī ne peut fonctionner. Il
      composa aussi *Taḥrīr al-Manqūl* sur l'*uṣūl al-fiqh* et
      *Tanqīḥ al-Mushbiʿ*, tous deux *matns* d'enseignement. Ibn
      al-ʿImād consigne la mort dans *Shadharāt al-Dhahab* à
      l'année 885 H; l'EI2 donne la notice biographique standard.
    canonical_hijri: {year: 885, precision: year}
    canonical_gregorian: {date: 1480-01-01, precision: year, method: attested}
