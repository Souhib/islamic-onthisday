  - slug: death-of-al-khatib-al-shirbini
    category: scholar_death
    title_en: Death of al-Khaṭīb al-Shirbīnī — Author of *Mughnī al-Muḥtāj*
    title_ar: وفاة الخطيب الشربيني — مصنف «مغني المحتاج»
    title_fr: Mort d'al-Khaṭīb al-Shirbīnī — auteur de *Mughnī al-Muḥtāj*
    description_en: |
      Shams al-Dīn Muḥammad ibn Aḥmad al-Khaṭīb al-Shirbīnī, leading
      Shāfiʿī jurist of Cairo at the close of the Mamluk era and the
      opening of the Ottoman, and author of *Mughnī al-Muḥtāj ilā
      Maʿrifat Maʿānī Alfāẓ al-Minhāj* — one of the two definitive
      late-Shāfiʿī commentaries on al-Nawawī's *Minhāj al-Ṭālibīn*
      (the other being Shams al-Dīn al-Ramlī's *Nihāyat al-Muḥtāj*)
      — died in Cairo around 977 AH. His *Mughnī al-Muḥtāj* is the
      standard reference for the Egyptian-Shāfiʿī *muʿtamad*
      tradition that flowed from al-Nawawī through Ibn Ḥajar al-
      Haytamī and the Ramlī family. He also composed *al-Iqnāʿ fī
      Ḥall Alfāẓ Abī Shujāʿ* (a widely-taught Shāfiʿī primer) and a
      tafsīr (*al-Sirāj al-Munīr*). Ibn al-ʿImād records the death
      in *Shadharāt al-Dhahab* under 977 AH; EI2 corroborates and
      gives the standard biographical sketch.
    description_ar: |
      توفي الإمام شمس الدين محمد بن أحمد الخطيب الشربيني — كبير
      فقهاء الشافعية بالقاهرة في خاتمة دولة المماليك ومطلع الدولة
      العثمانية، ومصنف «مغني المحتاج إلى معرفة معاني ألفاظ المنهاج»
      الذي هو أحد الشرحين القاطعين على «منهاج الطالبين» للنووي عند
      المتأخرين من الشافعية (والثاني «نهاية المحتاج» لشمس الدين
      الرملي) — بالقاهرة سنة سبع وسبعين وتسعمئة. و«مغني المحتاج»
      هو المرجع المعتمد عند الشافعية المصريين في طبقة المعتمد التي
      تنتظم من النووي إلى ابن حجر الهيتمي وأهل بيت الرملي. وله
      أيضاً «الإقناع في حل ألفاظ أبي شجاع» — وهو من أوسع متون
      الشافعية تداولاً في التدريس — وتفسير «السراج المنير». أرّخ
      وفاته ابن العماد في «شذرات الذهب» سنة سبع وسبعين وتسعمئة،
      ووافقه على ذلك «دائرة المعارف الإسلامية» في ترجمته الشاملة.
    description_fr: |
      Shams al-Dīn Muḥammad ibn Aḥmad al-Khaṭīb al-Shirbīnī, premier
      juriste shāfiʿite du Caire à la clôture de l'époque mamelouke
      et à l'ouverture de l'époque ottomane, et auteur de *Mughnī
      al-Muḥtāj ilā Maʿrifat Maʿānī Alfāẓ al-Minhāj* — l'un des deux
      commentaires shāfiʿites tardifs définitifs sur le *Minhāj
      al-Ṭālibīn* d'al-Nawawī (l'autre étant *Nihāyat al-Muḥtāj* de
      Shams al-Dīn al-Ramlī) — mourut au Caire vers 977 H. Son
      *Mughnī al-Muḥtāj* est la référence standard de la tradition
      *muʿtamad* shāfiʿite égyptienne qui s'est écoulée d'al-
      Nawawī à travers Ibn Ḥajar al-Haytamī et la famille Ramlī. Il
      composa aussi *al-Iqnāʿ fī Ḥall Alfāẓ Abī Shujāʿ* (un manuel
      d'introduction shāfiʿite très enseigné) et un *tafsīr* (*al-
      Sirāj al-Munīr*). Ibn al-ʿImād consigne la mort dans
      *Shadharāt al-Dhahab* à l'année 977 H; l'EI2 corrobore et
      donne la notice biographique standard.
    canonical_hijri: {year: 977, precision: year}
    canonical_gregorian: {date: 1570-01-01, precision: year, method: attested}
