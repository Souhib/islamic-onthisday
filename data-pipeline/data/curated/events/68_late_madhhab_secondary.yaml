  - slug: death-of-al-bajuri
    category: scholar_death
    title_en: Death of Ibrāhīm al-Bāǧūrī — Shaykh al-Azhar and Author of the *Ḥāshiya*
    title_ar: وفاة إبراهيم الباجوري — شيخ الأزهر ومصنف «الحاشية»
    title_fr: Mort d'Ibrāhīm al-Bāǧūrī — Shaykh al-Azhar et auteur de la *Ḥāshiya*
    description_en: |
      Ibrāhīm ibn Muḥammad al-Bāǧūrī, Shāfiʿī jurist, Ashʿarī
      mutakallim, and Shaykh al-Azhar, died in Cairo at age about
      seventy-four. He authored the still-taught *Ḥāshiyat al-
      Bāǧūrī ʿalā Sharḥ Ibn Qāsim al-Ghazzī* (also known as
      *Ḥāshiyat al-Bāǧūrī ʿalā Sharḥ al-Ghazzī ʿalā Matn Abī
      Shujāʿ*) — the principal late-Azharī teaching commentary on
      Shāfiʿī fiqh through Abū Shujāʿ's *Ghāyat al-Ikhtiṣār*. His
      Ashʿarī ḥāshiyas — on al-Sanūsī's *Umm al-Barāhīn* and on
      al-Laqqānī's *Jawharat al-Tawḥīd* — remained the standard
      Azharī creedal teaching texts deep into the twentieth century.
      He served as Shaykh al-Azhar from 1263 AH until his death in
      1276/1277 AH (the dating of his last weeks varies by a few
      months across the sources). His death falls beyond Ibn al-
      ʿImād's *Shadharāt*; the principal Sunni-canonical witness
      is EI2.
    description_ar: |
      توفي الإمام إبراهيم بن محمد الباجوري — فقيه الشافعية والعالم
      الأشعري وشيخ الأزهر — بالقاهرة عن نحو أربع وسبعين سنة. صنّف
      «حاشية الباجوري على شرح ابن قاسم الغزي على متن أبي شجاع» —
      وهي شرح التدريس الأزهري المعتمد على فقه الشافعية من جهة
      «غاية الاختصار» لأبي شجاع وما دار في فلكها — ولا تزال إلى
      يومنا. ولحاشيتيه الأشعريتين — على «أم البراهين» للسنوسي
      وعلى «جوهرة التوحيد» للقاني — مكانة المتن المعتمد في
      التدريس العقدي بالأزهر إلى أعماق القرن العشرين الميلادي.
      تولى مشيخة الأزهر سنة ثلاث وستين ومئتين بعد الألف، وبقي
      عليها حتى توفي رحمه الله سنة ست وسبعين أو سبع وسبعين بعد
      الألف ومئتين، وفي ضبط أسبوعه الأخير بعض التذبذب بين
      المصادر. وفاته بعد ختام «شذرات الذهب»، فالعمدة في توثيقها
      عند أهل السنة «دائرة المعارف الإسلامية».
    description_fr: |
      Ibrāhīm ibn Muḥammad al-Bāǧūrī, juriste shāfiʿite,
      *mutakallim* ashʿarī et Shaykh al-Azhar, mourut au Caire à
      l'âge d'environ soixante-quatorze ans. Il composa la
      *Ḥāshiyat al-Bāǧūrī ʿalā Sharḥ Ibn Qāsim al-Ghazzī* (aussi
      appelée *Ḥāshiyat al-Bāǧūrī ʿalā Sharḥ al-Ghazzī ʿalā Matn
      Abī Shujāʿ*) toujours enseignée — le principal commentaire
      d'enseignement azharite tardif sur le fiqh shāfiʿite à
      travers la *Ghāyat al-Ikhtiṣār* d'Abū Shujāʿ. Ses *ḥāshiyas*
      ashʿarites — sur l'*Umm al-Barāhīn* d'al-Sanūsī et sur la
      *Jawharat al-Tawḥīd* d'al-Laqqānī — demeurèrent les textes
      d'enseignement de credo standard d'al-Azhar jusque tard
      dans le XXᵉ siècle. Il servit comme Shaykh al-Azhar de
      1263 H jusqu'à sa mort en 1276/1277 H (la datation de ses
      dernières semaines varie de quelques mois selon les
      sources). Sa mort est postérieure aux *Shadharāt* d'Ibn al-
      ʿImād; le principal témoin sunnite est l'EI2.
    canonical_hijri: {year: 1276, precision: year}
    canonical_gregorian: {date: 1860-01-01, precision: year, method: attested}
