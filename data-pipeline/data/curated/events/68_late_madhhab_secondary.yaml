  - slug: death-of-shams-al-din-al-ramli
    category: scholar_death
    title_en: Death of Shams al-Dīn al-Ramlī — Author of *Nihāyat al-Muḥtāj*
    title_ar: وفاة شمس الدين الرملي — مصنف «نهاية المحتاج»
    title_fr: Mort de Shams al-Dīn al-Ramlī — auteur de *Nihāyat al-Muḥtāj*
    description_en: |
      Shams al-Dīn Muḥammad ibn Aḥmad al-Ramlī, "the lesser Shāfiʿī"
      (*al-Shāfiʿī al-Ṣaghīr*), mufti of the Shāfiʿīs in Ottoman
      Cairo and author of *Nihāyat al-Muḥtāj ilā Sharḥ al-Minhāj* —
      the parallel and equally authoritative late-Shāfiʿī
      commentary on al-Nawawī's *Minhāj al-Ṭālibīn* alongside al-
      Khaṭīb al-Shirbīnī's *Mughnī al-Muḥtāj* — died in Cairo at
      age about eighty in 1004 AH. He inherited his uṣūl and *furūʿ*
      from his father Shihāb al-Dīn al-Ramlī (d. 957 AH), the
      foremost Shāfiʿī authority of his own generation, and trained
      the next layer of Egyptian-Shāfiʿī fuqahāʾ. Beyond *Nihāyat
      al-Muḥtāj*, he composed *Ghāyat al-Bayān* (a commentary on
      Ibn al-Wardī's *al-Bahja*) and a major fatāwā collection.
      His death falls beyond Ibn al-ʿImād's *Shadharāt* close-out
      year; the principal Sunni-canonical attestation is EI2,
      cross-checked editorially against the seminary biographical
      tradition.
    description_ar: |
      توفي الإمام شمس الدين محمد بن أحمد الرملي — المعروف بـ«الشافعي
      الصغير» — مفتي السادة الشافعية بالقاهرة في الدولة العثمانية،
      ومصنف «نهاية المحتاج إلى شرح المنهاج» — وهو الشرح المعتمد
      الموازي لـ«مغني المحتاج» للخطيب الشربيني على «منهاج الطالبين»
      للنووي عند المتأخرين من الشافعية — بالقاهرة عن نحو ثمانين
      سنة في سنة أربع بعد الألف. تلقى أصوله وفروعه عن أبيه شهاب
      الدين الرملي (ت ٩٥٧ هـ) — كبير شافعية عصره — وأخرج طبقة من
      فقهاء الشافعية المصريين. وله سوى «نهاية المحتاج» «غاية
      البيان» في شرح «البهجة» لابن الوردي، ومجموعة فتاوى كبرى.
      وفاته بعد ختام «شذرات الذهب»، فالعمدة في توثيقها عند أهل
      السنة «دائرة المعارف الإسلامية» مع المراجعة الإسنادية في
      ترجمات أهل الشام والقاهرة.
    description_fr: |
      Shams al-Dīn Muḥammad ibn Aḥmad al-Ramlī, « le plus petit
      Shāfiʿī » (*al-Shāfiʿī al-Ṣaghīr*), *muftī* des shāfiʿites du
      Caire ottoman et auteur de *Nihāyat al-Muḥtāj ilā Sharḥ al-
      Minhāj* — le commentaire shāfiʿite tardif parallèle et
      également autoritatif sur le *Minhāj al-Ṭālibīn* d'al-Nawawī,
      aux côtés du *Mughnī al-Muḥtāj* d'al-Khaṭīb al-Shirbīnī —
      mourut au Caire à l'âge d'environ quatre-vingts ans en
      1004 H. Il hérita son *uṣūl* et ses *furūʿ* de son père
      Shihāb al-Dīn al-Ramlī (m. 957 H), première autorité
      shāfiʿite de sa propre génération, et forma la couche
      suivante des fuqahāʾ shāfiʿites égyptiens. Outre *Nihāyat
      al-Muḥtāj*, il composa *Ghāyat al-Bayān* (un commentaire sur
      la *Bahja* d'Ibn al-Wardī) et un grand recueil de *fatāwā*.
      Sa mort est postérieure à l'année de clôture des *Shadharāt*
      d'Ibn al-ʿImād; la principale attestation au sein du canon
      sunnite est l'EI2, croisée éditorialement avec la tradition
      biographique des séminaires.
    canonical_hijri: {year: 1004, precision: year}
    canonical_gregorian: {date: 1596-01-01, precision: year, method: attested}
