  - slug: death-of-al-buhuti
    category: scholar_death
    title_en: Death of Manṣūr al-Buhūtī — Author of *Kashshāf al-Qināʿ*
    title_ar: وفاة منصور البهوتي — مصنف «كشاف القناع»
    title_fr: Mort de Manṣūr al-Buhūtī — auteur de *Kashshāf al-Qināʿ*
    description_en: |
      Manṣūr ibn Yūnus al-Buhūtī, Shaykh al-Ḥanābila of Egypt and
      author of *Kashshāf al-Qināʿ ʿan Matn al-Iqnāʿ* — the
      monumental six-volume Hanbali fiqh commentary on al-Ḥajjāwī's
      *al-Iqnāʿ li-Ṭālib al-Intifāʿ* — died in Cairo at age about
      eighty. He also composed *Sharḥ Muntahā al-Irādāt* (his
      commentary on Ibn al-Najjār al-Futūḥī's matn) and a tighter
      teaching synthesis *al-Rawḍ al-Murbiʿ Sharḥ Zād al-
      Mustaqniʿ*; the *Kashshāf*–*Sharḥ Muntahā* pair are the twin
      standard references for late-Hanbali fiqh and frame the
      curriculum at the Najdī revival of the eighteenth century AH.
      His death in 1051 AH falls beyond the close-out year of Ibn
      al-ʿImād's *Shadharāt al-Dhahab*; the principal Sunni-
      canonical attestation is EI2 (cross-checked editorially
      against the Hanbali biographical tradition that opens the
      *Kashshāf* itself).
    description_ar: |
      توفي الإمام منصور بن يونس البهوتي — شيخ الحنابلة بمصر، ومصنف
      «كشاف القناع عن متن الإقناع» — وهو الموسوعة الفقهية في ست
      مجلدات شرحاً على «الإقناع لطالب الانتفاع» للحجاوي — بالقاهرة
      عن نحو ثمانين سنة. وله أيضاً «شرح منتهى الإرادات» شرحاً على
      متن ابن النجار الفتوحي، وله «الروض المربع شرح زاد المستقنع»
      الذي هو من أوسع شروح المتأخرين من الحنابلة في التدريس.
      و«الكشاف» مع «شرح المنتهى» هما المرجعان المعتمدان لفقه
      الحنابلة المتأخرين، وعليهما يقوم منهج التدريس في الإحياء
      النجدي في القرن الثاني عشر الهجري. وفاته رحمه الله سنة
      إحدى وخمسين بعد الألف، وهي بعد ختام «شذرات الذهب»، فالعمدة
      في توثيقها عند أهل السنة «دائرة المعارف الإسلامية» مع
      المراجعة الإسنادية في ترجمات أهل القاهرة المفصلة في صدور
      «الكشاف» نفسه.
    description_fr: |
      Manṣūr ibn Yūnus al-Buhūtī, Shaykh al-Ḥanābila d'Égypte et
      auteur de *Kashshāf al-Qināʿ ʿan Matn al-Iqnāʿ* — le
      commentaire monumental de fiqh hanbalite en six volumes sur
      l'*Iqnāʿ li-Ṭālib al-Intifāʿ* d'al-Ḥajjāwī — mourut au Caire
      à l'âge d'environ quatre-vingts ans. Il composa aussi
      *Sharḥ Muntahā al-Irādāt* (son commentaire sur le *matn*
      d'Ibn al-Najjār al-Futūḥī) et une synthèse pédagogique plus
      ramassée *al-Rawḍ al-Murbiʿ Sharḥ Zād al-Mustaqniʿ*; le
      couple *Kashshāf*–*Sharḥ Muntahā* constitue les deux
      références standards du fiqh hanbalite tardif et structure
      le curriculum du renouveau najdī du XIIIᵉ siècle de
      l'Hégire. Sa mort en 1051 H est postérieure à l'année de
      clôture des *Shadharāt al-Dhahab* d'Ibn al-ʿImād; la
      principale attestation au sein du canon sunnite est l'EI2
      (croisée éditorialement avec la tradition biographique
      hanbalite qui ouvre le *Kashshāf* lui-même).
    canonical_hijri: {year: 1051, precision: year}
    canonical_gregorian: {date: 1641-01-01, precision: year, method: attested}
