  - slug: death-of-ubayd-allah-ahrar
    category: scholar_death
    title_en: Death of Khwāja ʿUbayd Allāh Aḥrār — Naqshbandī master of Timurid Central Asia
    title_ar: وفاة الخواجة عبيد الله الأحرار — شيخ النقشبندية في آسيا الوسطى التيمورية
    title_fr: Mort de Khwāja ʿUbayd Allāh Aḥrār — maître naqshbandī de l'Asie centrale timouride
    description_en: |
      Khwāja Nāṣir al-Dīn ʿUbayd Allāh ibn Maḥmūd al-Shāshī
      al-Tāshkandī, known as Khwāja Aḥrār ("the Free") — Sunni
      Hanafi Naqshbandī master of Tashkent and Samarqand, principal
      disciple of Yaʿqūb Charkhī, and the figure under whom the
      Naqshbandiyya became the politically dominant Sufi order of
      late-Timurid Central Asia — died at Kāmangarān near
      Samarqand on 29 Rabīʿ I 895 AH (20 February 1490 CE) per
      Ibn al-ʿImād in *Shadharāt al-Dhahab* and Jāmī's
      *Nafaḥāt al-Uns* (Jāmī had been Aḥrār's disciple). For more
      than half a century he served as the spiritual master and
      political broker of the Timurid courts of Samarqand,
      Bukhārā, Herat, and Tashkent, mediating between rival
      princes (most notably Sulṭān Abū Saʿīd Mīrzā and Sulṭān
      Aḥmad Mīrzā) and shaping the religious culture of the
      late Timurid umarāʾ. His Persian *Faqarāt al-ʿĀrifīn*
      (Sayings of the Knowers) and *Risāla-yi Wālidiyya*
      (translated into Chaghatāy Turkic by his disciple Bābur,
      founder of the Mughal dynasty) carried Naqshbandī
      teaching into the Mughal world; through Bābur and his
      descendants, Naqshbandī influence extended into India,
      where it would be consolidated by Aḥmad Sirhindī (d.
      1034 AH). Aḥrār is the great pivot from the early
      Khwājagān-Naqshbandī piety to the imperial-political
      Naqshbandiyya of the Mughal-Ottoman age.
    description_ar: |
      توفي الخواجة ناصر الدين عبيد الله بن محمود الشاشي
      الطاشكندي، المعروف بـ«الخواجة الأحرار» (أي الحر) — شيخ
      صوفي سني حنفي نقشبندي من طاشكند وسمرقند، تلميذ يعقوب
      الجرخي الأكبر، والشيخ الذي صارت الطريقة النقشبندية على
      يديه الطريقةَ المهيمنة سياسياً في آسيا الوسطى التيمورية
      المتأخرة — بـ«كامَنگران» قرب سمرقند في ٢٩ ربيع الأول سنة
      ٨٩٥ هـ (٢٠ شباط ١٤٩٠ م) على ما أثبته ابن العماد في
      «شذرات الذهب» والجامي في «نفحات الأنس» (وكان الجامي من
      تلاميذ الأحرار). فلأكثر من نصف قرن، اضطلع بمشيخة الإرشاد
      والوساطة السياسية بين بلاطات التيموريين في سمرقند وبخارى
      وهراة وطاشكند، وأصلح بين أمرائها المتنازعين (وأشهرهم
      السلطان أبو سعيد ميرزا والسلطان أحمد ميرزا)، وشكّل ثقافة
      الأمراء التيموريين الدينية. وكتاباه الفارسيان «فقرات
      العارفين» و«الرسالة الوالدية» (التي ترجمها إلى الجَغطائية
      تلميذُه بابر، مؤسس الدولة المغولية الكبرى في الهند) نقلا
      تعليم النقشبندية إلى العالم المغولي؛ ومن طريق بابر
      وذريّته امتدّ نفوذ النقشبندية إلى الهند، حيث يستتبّ
      على يد أحمد السرهندي (ت ١٠٣٤ هـ). فالأحرار هو المحور
      الأكبر في الانتقال من تقوى الخواجگان-النقشبندية الباكرة
      إلى نقشبندية العصر المغولي-العثماني الإمبراطورية.
    description_fr: |
      Khwāja Nāṣir al-Dīn ʿUbayd Allāh ibn Maḥmūd al-Shāshī
      al-Tāshkandī, dit Khwāja Aḥrār (« le Libre ») — maître
      soufi sunnite ḥanafite naqshbandī de Tachkent et de
      Samarcande, principal disciple de Yaʿqūb Charkhī, et figure
      sous laquelle la naqshbandiyya devint l'ordre soufi
      politiquement dominant de l'Asie centrale timouride
      tardive — mourut à Kāmangarān près de Samarcande le
      29 Rabīʿ I 895 H (20 février 1490 EC) selon Ibn al-ʿImād
      dans les *Shadharāt al-Dhahab* et Jāmī dans les *Nafaḥāt
      al-Uns* (Jāmī avait été le disciple d'Aḥrār). Pendant plus
      d'un demi-siècle, il fut maître spirituel et médiateur
      politique des cours timourides de Samarcande, Boukhārā,
      Hérat et Tachkent, intervenant entre princes rivaux
      (notamment le sultan Abū Saʿīd Mīrzā et le sultan Aḥmad
      Mīrzā) et façonnant la culture religieuse des *umarāʾ*
      timourides tardifs. Ses ouvrages persans *Faqarāt
      al-ʿĀrifīn* (Paroles des connaissants) et la *Risāla-yi
      Wālidiyya* (traduite en turc tchaghatā'i par son disciple
      Bābur, fondateur de la dynastie moghole) portèrent
      l'enseignement naqshbandī dans le monde moghol ; par
      Bābur et ses descendants, l'influence naqshbandī
      s'étendit en Inde, où elle serait consolidée par Aḥmad
      Sirhindī (m. 1034 H). Aḥrār est le grand pivot du passage
      de la piété khwājagān-naqshbandī ancienne à la
      naqshbandiyya impériale-politique de l'âge moghol-ottoman.
    canonical_hijri: {year: 895, month: 3, day: 29, precision: day}
    canonical_gregorian: {date: 1490-02-20, precision: day, method: tabular_conversion}
