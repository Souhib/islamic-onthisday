  - slug: death-of-yaqub-charkhi
    category: scholar_death
    title_en: Death of Yaʿqūb Charkhī — Naqshbandī master of Hisar
    title_ar: وفاة يعقوب الجرخي — شيخ النقشبندية بحصار
    title_fr: Mort de Yaʿqūb Charkhī — maître naqshbandī de Hisar
    description_en: |
      Mawlānā Yaʿqūb ibn ʿUthmān al-Charkhī al-Ghaznawī — Sunni
      Hanafi Naqshbandī master originally of Charkh (a village
      near Ghaznī in modern Afghanistan), settled at Ḥalghatū
      near Ḥiṣār-i Shādmān (modern southern Tajikistan), trained
      in fiqh and tafsīr at Herat and Cairo before becoming the
      principal disciple of ʿAlāʾ al-Dīn al-ʿAṭṭār, and the master
      who initiated ʿUbayd Allāh Aḥrār into the Naqshbandī
      *silsila* — died at Ḥalghatū in 851 AH (~1447 CE) per
      Ibn Ḥajar al-ʿAsqalānī in *al-Durar al-Kāmina* (in its
      addenda) and Jāmī in *Nafaḥāt al-Uns*. His Persian-language
      writings include the *Risāla-yi Unsiyya* (a record of his
      conversations with ʿAlāʾ al-Dīn al-ʿAṭṭār), the *Risāla-yi
      Abdāliyya*, and a Persian commentary on Najm al-Dīn al-Dāya
      al-Rāzī's *Mirṣād al-ʿIbād*. He thus stands at the centre
      of the chain through which the Naqshbandiyya would, under
      his pupil Aḥrār, become the dominant Sufi order of late
      Timurid Central Asia and a major political-religious force
      across the Mughal-Ottoman-Persianate world for the next
      four centuries.
    description_ar: |
      توفي مولانا يعقوب بن عثمان الجرخي الغزنوي — شيخ صوفي سني
      حنفي نقشبندي، أصلُه من «جَرخ» (قرية قرب غزنة في أفغانستان
      اليوم)، استوطن «حلغتو» قرب حصار شادمان (في جنوب طاجيكستان
      اليوم)، تلقى الفقه والتفسير بهراة والقاهرة قبل أن يصبح
      تلميذ علاء الدين العطار الأكبر، والشيخ الذي أدخل عبيد
      الله الأحرار في سلسلة النقشبندية — بـ«حلغتو» سنة ٨٥١ هـ
      (~١٤٤٧ م) كما أثبت ذلك ابن حجر العسقلاني في ملحقات «الدرر
      الكامنة» والجامي في «نفحات الأنس». وله بالفارسية كتب،
      منها «الرسالة الأنسية» (وفيها مسجَّلٌ من مكالماته مع علاء
      الدين العطار)، و«الرسالة الأبدالية»، وشرحٌ بالفارسية على
      «مرصاد العباد» لنجم الدين الداية الرازي. فهو الحلقة
      المركزية في السلسلة التي ستصبح بفضل تلميذه الأحرار طريقةَ
      التصوف المهيمنة في آسيا الوسطى التيمورية المتأخرة، وقوةً
      سياسية-دينية كبرى في العالم المغولي-العثماني-الفارسي
      على مدى أربعة قرون لاحقة.
    description_fr: |
      Mawlānā Yaʿqūb ibn ʿUthmān al-Charkhī al-Ghaznawī — maître
      soufi sunnite ḥanafite naqshbandī originaire de Charkh
      (village près de Ghaznī en Afghanistan actuel), établi à
      Ḥalghatū près de Ḥiṣār-i Shādmān (sud du Tadjikistan
      actuel), formé en *fiqh* et en *tafsīr* à Hérat et au
      Caire avant de devenir le principal disciple de ʿAlāʾ
      al-Dīn al-ʿAṭṭār, et le maître qui initia ʿUbayd Allāh
      Aḥrār à la *silsila* naqshbandī — mourut à Ḥalghatū en
      851 H (~1447 EC) selon Ibn Ḥajar al-ʿAsqalānī dans les
      addenda d'*al-Durar al-Kāmina* et selon Jāmī dans les
      *Nafaḥāt al-Uns*. Ses écrits persans incluent la
      *Risāla-yi Unsiyya* (consignation de ses entretiens avec
      ʿAlāʾ al-Dīn al-ʿAṭṭār), la *Risāla-yi Abdāliyya* et un
      commentaire persan du *Mirṣād al-ʿIbād* de Najm al-Dīn
      al-Dāya al-Rāzī. Il se tient ainsi au centre de la chaîne
      par laquelle la naqshbandiyya allait devenir, sous son
      disciple Aḥrār, l'ordre soufi dominant de l'Asie centrale
      timouride tardive et une force politico-religieuse majeure
      à travers le monde moghol-ottoman-persanat pendant les
      quatre siècles suivants.
