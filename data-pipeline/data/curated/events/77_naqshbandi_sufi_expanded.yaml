  - slug: death-of-muhammad-parsa
    category: scholar_death
    title_en: Death of Muḥammad Pārsā — Naqshbandī author of *Faṣl al-Khiṭāb*
    title_ar: وفاة محمد پارسا — صاحب «فصل الخطاب» النقشبندي
    title_fr: Mort de Muḥammad Pārsā — auteur naqshbandī du *Faṣl al-Khiṭāb*
    description_en: |
      Khwāja Muḥammad ibn Muḥammad al-Ḥāfiẓī al-Bukhārī, known
      as Muḥammad Pārsā ("the Pious") — Sunni Hanafi Naqshbandī
      scholar of Bukhārā, direct disciple of Bahāʾ al-Dīn
      Naqshband, and the principal literary voice of the early
      Naqshbandiyya — died at Madīna while returning from the
      pilgrimage in Dhū al-Ḥijja 822 AH (December 1419 / January
      1420 CE), as recorded by Ibn Ḥajar al-ʿAsqalānī in *al-Durar
      al-Kāmina* and by Ibn al-ʿImād in *Shadharāt al-Dhahab*.
      His Persian-language *Faṣl al-Khiṭāb* (The Decisive Word)
      systematised the Khwājagān-Naqshbandī doctrinal teaching for
      the first time, treating the silsila al-dhahab, the eight
      Khwājagān principles, the three Naqshbandī additions, and
      the order's positions on tawḥīd and the relation of the
      Sufi path to Hanafi fiqh; his shorter *Risāla-yi
      Qudsiyya* preserves the recorded sayings of his master
      Naqshband. Together these two works are the foundational
      written corpus of the Naqshbandiyya, transmitted from
      Pārsā's son Abū Naṣr to Yaʿqūb Charkhī, ʿUbayd Allāh Aḥrār,
      Jāmī (whose *Nafaḥāt al-Uns* draws extensively on Pārsā's
      *Faṣl al-Khiṭāb*), and the post-Timurid Naqshbandī
      tradition. He was buried at Madīna near Baqīʿ al-Gharqad.
    description_ar: |
      توفي الخواجة محمد بن محمد الحافظي البخاري، المعروف بمحمد
      پارسا (أي «الورع») — عالم سني حنفي نقشبندي من بخارى،
      تلميذ بهاء الدين النقشبند مباشرة، والصوت الأدبي الأكبر
      للنقشبندية الأولى — بالمدينة المنورة في طريق عودته من
      الحج في ذي الحجة سنة ٨٢٢ هـ (كانون الأول ١٤١٩ / كانون
      الثاني ١٤٢٠ م)، كما أثبت ذلك ابن حجر العسقلاني في «الدرر
      الكامنة» وابن العماد في «شذرات الذهب». وكتابُه الفارسي
      «فصل الخطاب» أوّل من نظّم تعليم الخواجگان-النقشبندية
      المذهبي، يبحث في سلسلة الذهب وأصول الخواجگان الثمانية
      وزيادات النقشبند الثلاثة، وموقف الطريقة من التوحيد، وعلاقة
      الطريق الصوفي بفقه الحنفية. وفي رسالته الأقصر «الرسالة
      القدسية» حفظ أقوال شيخه النقشبند المنقولة. فهذان الكتابان
      هما المتن المؤسس المكتوب للنقشبندية، انتقل عن ابنه أبي
      نصر إلى يعقوب الجرخي ثم عبيد الله الأحرار ثم الجامي
      (الذي اعتمد عليه «نفحات الأنس» اعتماداً مستفيضاً) ثم
      التراث النقشبندي بعد التيموريين. ودُفن بالمدينة قرب
      بقيع الغرقد.
    description_fr: |
      Khwāja Muḥammad ibn Muḥammad al-Ḥāfiẓī al-Bukhārī, connu
      sous le nom de Muḥammad Pārsā (« le Pieux ») — savant
      sunnite ḥanafite naqshbandī de Boukhārā, disciple direct
      de Bahāʾ al-Dīn Naqshband, et principale voix littéraire
      de la naqshbandiyya ancienne — mourut à Médine sur le
      chemin du retour du pèlerinage, en Dhū al-Ḥijja 822 H
      (décembre 1419 / janvier 1420 EC), ainsi que le consignent
      Ibn Ḥajar al-ʿAsqalānī dans *al-Durar al-Kāmina* et
      Ibn al-ʿImād dans les *Shadharāt al-Dhahab*. Son
      *Faṣl al-Khiṭāb* (« Le Discours décisif »), en persan,
      systématisa pour la première fois la doctrine khwājagān-
      naqshbandī, traitant de la *silsila al-dhahab*, des huit
      principes khwājagān, des trois ajouts de Naqshband, des
      positions de l'ordre sur le *tawḥīd* et de la relation de
      la voie soufie au *fiqh* ḥanafite ; sa plus brève *Risāla-yi
      Qudsiyya* préserve les paroles consignées de son maître
      Naqshband. Ces deux ouvrages constituent le corpus écrit
      fondateur de la naqshbandiyya, transmis du fils de Pārsā
      Abū Naṣr à Yaʿqūb Charkhī, ʿUbayd Allāh Aḥrār, Jāmī (dont
      les *Nafaḥāt al-Uns* puisent largement dans le *Faṣl
      al-Khiṭāb*) et la tradition naqshbandī post-timouride. Il
      fut enseveli à Médine près de Baqīʿ al-Gharqad.
