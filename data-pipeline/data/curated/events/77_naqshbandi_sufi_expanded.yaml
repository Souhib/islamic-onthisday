  - slug: death-of-arif-al-riwgari
    category: scholar_death
    title_en: Death of Khwāja ʿĀrif al-Riwgarī — second Khwājagān master
    title_ar: وفاة الخواجة عارف الريوگري — ثاني مشايخ الخواجگان
    title_fr: Mort de Khwāja ʿĀrif al-Riwgarī — deuxième maître khwājagān
    description_en: |
      Khwāja ʿĀrif al-Riwgarī (also Rīvgarī) — Sunni Hanafi
      Sufi master of Riwgar, a village near Bukhārā in
      Transoxiana, principal disciple of ʿAbd al-Khāliq
      al-Ghujdawānī and the second master of the seven (or
      eight) early Khwājagān whose chain culminates in Bahāʾ
      al-Dīn Naqshband — died at Riwgar in 616 AH (~1219 CE)
      per the Khwājagān biographical tradition preserved in
      Jāmī's *Nafaḥāt al-Uns* and reflected in EI2. He
      transmitted Ghujdawānī's eight principles to his own
      successor, Maḥmūd Anjīr Faghnawī, and is the central
      historical link in the *silsila al-dhahab* between the
      founder of the Khwājagān path and the order's
      consolidation under Faghnawī, Rāmītanī, and finally
      Naqshband. Although Riwgarī left no formal writings, his
      teaching is preserved in the early Naqshbandī manuals
      (notably the *Anīs al-Ṭālibīn*, the *Maqāmāt-i Naqshbandī*,
      and Jāmī's *Nafaḥāt al-Uns*) and through the practical
      transmission of the Khwājagān method itself.
    description_ar: |
      توفي الخواجة عارف الريوگري — شيخ صوفي سني حنفي من قرية
      «ريوگر» قرب بخارى في ما وراء النهر، تلميذ عبد الخالق
      الغجدواني الأكبر، وثاني مشايخ الخواجگان السبعة (أو الثمانية)
      الذين تنتهي بهم السلسلة إلى بهاء الدين النقشبند —
      بـ«ريوگر» سنة ٦١٦ هـ (~١٢١٩ م) على الرواية المحفوظة في
      تراث الخواجگان، ونقلها الجامي في «نفحات الأنس» وتعتمدها
      دائرة المعارف الإسلامية الثانية. ونقل أصول شيخه الغجدواني
      الثمانية إلى خَلَفه محمود أنجير الفغنوي، فهو حلقة الوصل
      التاريخية المركزية في «سلسلة الذهب» بين مؤسس طريق
      الخواجگان واستتباب الطريق على يد الفغنوي ثم الراميتني ثم
      النقشبند. ولئن لم يخلّف الريوگري كتاباً منظماً، فإن
      تعليمه محفوظ في كتب النقشبندية الأولى — لا سيما «أنيس
      الطالبين» و«مقامات النقشبندي» و«نفحات الأنس» للجامي —
      وفي النقل العملي لمنهج الخواجگان نفسه.
    description_fr: |
      Khwāja ʿĀrif al-Riwgarī (aussi Rīvgarī) — maître soufi
      sunnite ḥanafite de Riwgar, village près de Boukhārā en
      Transoxiane, principal disciple de ʿAbd al-Khāliq
      al-Ghujdawānī et deuxième des sept (ou huit) maîtres
      khwājagān anciens dont la chaîne culmine en Bahāʾ al-Dīn
      Naqshband — mourut à Riwgar en 616 H (~1219 EC), selon
      la tradition biographique khwājagān préservée dans les
      *Nafaḥāt al-Uns* de Jāmī et reflétée par l'EI2. Il
      transmit les huit principes de Ghujdawānī à son propre
      successeur, Maḥmūd Anjīr Faghnawī, et constitue le
      maillon historique central de la *silsila al-dhahab*
      entre le fondateur de la voie khwājagān et la consolidation
      de l'ordre sous Faghnawī, Rāmītanī, puis Naqshband. Bien
      que Riwgarī n'ait laissé aucun écrit formel, son
      enseignement est préservé dans les premiers manuels
      naqshbandī — notamment l'*Anīs al-Ṭālibīn*, les
      *Maqāmāt-i Naqshbandī* et les *Nafaḥāt al-Uns* de Jāmī
      — et par la transmission pratique de la méthode khwājagān
      elle-même.
