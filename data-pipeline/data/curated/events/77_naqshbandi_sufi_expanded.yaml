        is_canonical: true
        notes: "Death at Faghna 628 AH per Khwājagān biographical tradition; alt 715 AH ruled out by silsila chronology."
      - source_key: editorial
        notes: "Introduced public dhikr-i jahr alongside Ghujdawānī's silent dhikr-i khafī."
    people: [[mahmud-anjir-faghnawi, died]]
