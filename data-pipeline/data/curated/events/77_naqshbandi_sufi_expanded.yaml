  - slug: death-of-ali-al-ramitani
    category: scholar_death
    title_en: Death of Khwāja ʿAlī al-Rāmītanī — Khwājagān master "Ḥaḍrat-i ʿAzīzān"
    title_ar: وفاة الخواجة علي الراميتني — «حضرت عزيزان» شيخ الخواجگان
    title_fr: Mort de Khwāja ʿAlī al-Rāmītanī — maître khwājagān « Ḥaḍrat-i ʿAzīzān »
    description_en: |
      Khwāja ʿAlī al-Rāmītanī, known in the Persian-language
      Khwājagān biographical tradition as *Ḥaḍrat-i ʿAzīzān*
      ("the Beloved Master") — Sunni Hanafi Sufi master of
      Rāmītan in the Bukhārā oasis of Transoxiana, principal
      disciple of Maḥmūd Anjīr Faghnawī, and the fourth master
      of the early Khwājagān chain — died at Khwārazm in 721
      AH (~1321 CE) at an advanced age (the *Nafaḥāt al-Uns*
      tradition gives ~120 years), per the Khwājagān biographical
      transmission preserved in Jāmī's *Nafaḥāt al-Uns* and
      reflected in EI2. He had moved late in life from Bukhārā
      to Khwārazm under the patronage of the Chaghatāʾid Mongol
      court of Transoxiana, where his teaching shaped the
      religious orientation of the post-conversion Mongol
      aristocracy of Central Asia. He transmitted the
      Khwājagān method to Muḥammad Bābā Sammāsī (d. 755 AH),
      whose disciple Amīr Kulāl was the master of Bahāʾ al-Dīn
      Naqshband. Among his recorded sayings, the Khwājagān
      tradition gives him the maxim that "the *dhikr* of the
      heart in the marketplace is more pleasing to God than the
      *dhikr* of the tongue in the mosque" — programmatic for
      the Naqshbandī commitment to interior practice in the
      midst of worldly engagement (*khalwat dar anjuman*).
    description_ar: |
      توفي الخواجة علي الراميتني، المعروف في تراث الخواجگان
      الفارسي بـ«حضرة عزيزان» (الشيخ المحبوب) — شيخ صوفي سني
      حنفي من «راميتن» في واحة بخارى بما وراء النهر، تلميذ
      محمود أنجير الفغنوي الأكبر، ورابع مشايخ سلسلة الخواجگان
      الأوائل — بخوارزم سنة ٧٢١ هـ (~١٣٢١ م) عن عمر متقدم
      (يذكر تراث «نفحات الأنس» نحو مئة وعشرين سنة) على الرواية
      المحفوظة في تراث الخواجگان، ونقلها الجامي في «نفحات الأنس»
      وتعتمدها دائرة المعارف الإسلامية الثانية. وكان قد انتقل
      في أواخر حياته من بخارى إلى خوارزم في كنف بلاط الجَغطائيين
      المغول في ما وراء النهر، فأثّر تعليمه في توجّه أرستقراطية
      المغول الإسلامية في آسيا الوسطى بعد الإسلام. ونقل منهج
      الخواجگان إلى محمد بابا السمّاسي (ت ٧٥٥ هـ)، وتلميذُ
      السمّاسي أمير كلال هو شيخ بهاء الدين النقشبند. ومن أقواله
      التي يحفظها تراث الخواجگان قوله: «ذكر القلب في السوق أحبّ
      إلى الله من ذكر اللسان في المسجد» — وهو منهجٌ تأسيسي
      لالتزام النقشبندية بالعمل الباطن في وسط الانخراط في
      الدنيا («خلوت در انجمن»).
    description_fr: |
      Khwāja ʿAlī al-Rāmītanī, connu dans la tradition
      biographique khwājagān persane comme *Ḥaḍrat-i ʿAzīzān*
      (« le Maître bien-aimé ») — maître soufi sunnite ḥanafite
      de Rāmītan dans l'oasis de Boukhārā en Transoxiane,
      principal disciple de Maḥmūd Anjīr Faghnawī, et quatrième
      maître de la chaîne khwājagān ancienne — mourut à Khwārazm
      en 721 H (~1321 EC) à un âge avancé (la tradition des
      *Nafaḥāt al-Uns* lui donne environ 120 ans), selon la
      transmission biographique khwājagān préservée par Jāmī
      dans les *Nafaḥāt al-Uns* et reflétée par l'EI2. Il avait
      tardivement quitté Boukhārā pour Khwārazm sous le
      patronage de la cour mongole tchaghatā'ide de Transoxiane,
      où son enseignement façonna l'orientation religieuse de
      l'aristocratie mongole d'Asie centrale après la conversion.
      Il transmit la méthode khwājagān à Muḥammad Bābā Sammāsī
      (m. 755 H), dont le disciple Amīr Kulāl fut le maître de
      Bahāʾ al-Dīn Naqshband. Parmi ses paroles consignées,
      la tradition khwājagān lui prête la maxime « le *dhikr*
      du cœur au marché est plus agréable à Dieu que le *dhikr*
      de la langue à la mosquée » — programme de l'engagement
      naqshbandī à la pratique intérieure au cœur de la vie
      mondaine (*khalwat dar anjuman*).
