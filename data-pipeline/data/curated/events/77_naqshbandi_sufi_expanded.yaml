    title_ar: وفاة الخواجة محمود أنجير الفغنوي — ثالث مشايخ الخواجگان
    title_fr: Mort de Khwāja Maḥmūd Anjīr Faghnawī — troisième maître khwājagān
    description_en: |
      Khwāja Maḥmūd Anjīr Faghnawī — Sunni Hanafi Sufi master
      of Faghna (or Anjīr-Faghn), a village in the Bukhārā oasis
      of Transoxiana, principal disciple of ʿĀrif al-Riwgarī, and
      the third master of the early Khwājagān chain — died at
      Faghna in 628 AH (~1230 CE) according to the dominant
      Khwājagān biographical transmission preserved in Jāmī's
      *Nafaḥāt al-Uns* and reflected in EI2; some Persian
      *tadhkira* sources push his death to 715 AH, an attestation
      not supported by the chronological constraints of the
      silsila (his pupil ʿAlī al-Rāmītanī died in 721 AH at age
      ~120). We follow the 628 AH year. The Khwājagān tradition
      assigns to him a key methodological development: the open
      practice of vocal *dhikr* in group sessions (*dhikr-i jahr*)
      alongside the silent inward *dhikr-i khafī* he had inherited
      from Ghujdawānī, on the principle that the visible practice
      could draw outsiders toward the inner discipline. The
      tension between vocal and silent *dhikr* would remain a
      defining theme of the Khwājagān-Naqshbandī tradition for
      the next six centuries; under Bahāʾ al-Dīn Naqshband (d.
      791 AH), the silent inward *dhikr-i khafī* would prevail
      as the order's normative practice.
    description_ar: |
      توفي الخواجة محمود أنجير الفغنوي — شيخ صوفي سني حنفي من
      «فغنة» (أو «أنجير-فغن»)، قرية في واحة بخارى بما وراء
      النهر، تلميذ عارف الريوگري الأكبر، وثالث مشايخ سلسلة
      الخواجگان الأوائل — بـ«فغنة» سنة ٦٢٨ هـ (~١٢٣٠ م) على
      الرواية المهيمنة في تراث الخواجگان التي حفظها الجامي في
      «نفحات الأنس» وتعتمدها دائرة المعارف الإسلامية الثانية،
      وذكر بعض كتب التراجم الفارسية سنة ٧١٥ هـ، وهي رواية
      تعارض القيود الزمنية لسلسلة المشيخة (إذ توفي تلميذه علي
      الراميتني سنة ٧٢١ هـ عن نحو مئة وعشرين سنة). ونحن نتابع
      سنة ٦٢٨ هـ. ونسب إليه تراث الخواجگان تطويراً منهجياً
      رئيساً: ممارسةَ الذكر الجهري في حلقات الجماعة («ذكر جهر»)
      إلى جانب الذكر الخفي الباطني الذي ورثه عن الغجدواني، على
      أصل أن الممارسة الظاهرة تجذب الخارجين إلى التهذيب
      الباطن. وظلّ التوتر بين الذكر الجهري والخفي ثيمة محورية
      في طريق الخواجگان-النقشبندية على مدى ستة قرون لاحقة، ثم
      رجح في عهد بهاء الدين النقشبند (ت ٧٩١ هـ) الذكر الخفي
      الباطن لتكون هي عبادة الطريقة المعيارية.
    description_fr: |
      Khwāja Maḥmūd Anjīr Faghnawī — maître soufi sunnite
      ḥanafite de Faghna (ou Anjīr-Faghn), village de l'oasis
      de Boukhārā en Transoxiane, principal disciple de ʿĀrif
      al-Riwgarī et troisième maître de la chaîne khwājagān
      ancienne — mourut à Faghna en 628 H (~1230 EC), selon la
      tradition khwājagān dominante préservée dans les
      *Nafaḥāt al-Uns* de Jāmī et reflétée par l'EI2 ; certains
      *tadhkira* persans repoussent sa mort à 715 H, attestation
      qui contredit les contraintes chronologiques de la
      *silsila* (son disciple ʿAlī al-Rāmītanī mourut en 721 H
      à l'âge d'environ 120 ans). Nous suivons l'année 628 H.
      La tradition khwājagān lui attribue un développement
      méthodologique majeur : la pratique ouverte du *dhikr*
      vocal en assemblée (*dhikr-i jahr*) à côté du *dhikr-i
      khafī* silencieux et intérieur hérité de Ghujdawānī, sur
      le principe que la pratique visible pouvait attirer les
      profanes vers la discipline intérieure. La tension entre
      *dhikr* vocal et silencieux resterait un thème déterminant
      de la tradition khwājagān-naqshbandī pendant les six
      siècles suivants ; sous Bahāʾ al-Dīn Naqshband (m. 791
      H), le *dhikr-i khafī* silencieux et intérieur prévaudrait
      comme pratique normative de l'ordre.
    canonical_hijri: {year: 628, precision: year}
    canonical_gregorian: {date: 1230-01-01, precision: year, method: tabular_conversion}
