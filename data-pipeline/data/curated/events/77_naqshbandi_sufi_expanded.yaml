  - slug: death-of-ibn-ata-allah-al-iskandari
    category: scholar_death
    title_en: Death of Ibn ʿAṭāʾ Allāh al-Iskandarī — author of the *Ḥikam al-ʿAṭāʾiyya*
    title_ar: وفاة ابن عطاء الله السكندري — صاحب «الحكم العطائية»
    title_fr: Mort d'Ibn ʿAṭāʾ Allāh al-Iskandarī — auteur des *Ḥikam ʿaṭāʾiyya*
    description_en: |
      Tāj al-Dīn Abū al-Faḍl Aḥmad ibn Muḥammad ibn ʿAbd al-Karīm
      ibn ʿAṭāʾ Allāh al-Judhāmī al-Iskandarī — Sunni Maliki Sufi
      master of Alexandria, the third master of the Shādhiliyya
      after Abū al-Ḥasan al-Shādhilī and Abū al-ʿAbbās al-Mursī,
      pupil of al-Mursī, teacher of fiqh at the Manṣūriyya madrasa
      and of Sufism at al-Azhar in Cairo, and the figure who first
      committed the oral teaching of the Shādhiliyya to writing —
      died at Cairo in Jumādā II 709 AH (November 1309 CE), as
      recorded by al-Dhahabī in *Tārīkh al-Islām*, by Ibn Kathīr
      in *al-Bidāya wa al-Nihāya*, by Ibn Ḥajar in his
      biographical notices, and by Ibn al-ʿImād in *Shadharāt
      al-Dhahab*. His *al-Ḥikam al-ʿAṭāʾiyya* (Aphorisms) — a
      compact corpus of around 264 maxims on tawḥīd, ʿubūdiyya,
      and the disciplining of the self — became the most
      commented-upon Sufi text in Sunni history, with major
      commentaries by Ibn ʿAbbād al-Rundī (d. 792 AH), Aḥmad
      Zarrūq (d. 899 AH), and Ibn ʿAjība (d. 1224 AH). His
      *Laṭāʾif al-Minan* preserved the *manāqib* of his master
      al-Mursī and grand-master al-Shādhilī; his *Miftāḥ
      al-Falāḥ* fixed the litany discipline of the order; his
      *Tāj al-ʿArūs* gathered the practical teaching of the
      Shādhilī path. He is buried in the Qarāfa cemetery of
      Cairo at the foot of the Muqaṭṭam.
    description_ar: |
      توفي تاج الدين أبو الفضل أحمد بن محمد بن عبد الكريم بن
      عطاء الله الجُذَامي السكندري — شيخ صوفي سني مالكي من
      الإسكندرية، ثالث مشايخ الشاذلية بعد أبي الحسن الشاذلي
      وأبي العباس المرسي، تلميذ المرسي، ومدرّس الفقه بمدرسة
      المنصورية والتصوف بالأزهر في القاهرة، وأول من قيّد تعليم
      الشاذلية المنقول كتابةً — بالقاهرة في جمادى الآخرة سنة
      ٧٠٩ هـ (تشرين الثاني ١٣٠٩ م) كما أثبت ذلك الذهبي في
      «تاريخ الإسلام»، وابن كثير في «البداية والنهاية»، وابن
      حجر في تراجمه، وابن العماد في «شذرات الذهب». وكتابه
      «الحكم العطائية» — مجموعةٌ مُكتنزة في نحو ٢٦٤ حكمة في
      التوحيد والعبودية ورياضة النفس — هو أكثر متن صوفي شُرح
      في تاريخ السنّة، ومن أكبر شُرّاحه ابن عبّاد الرندي
      (ت ٧٩٢ هـ)، وأحمد زرّوق (ت ٨٩٩ هـ)، وابن عجيبة
      (ت ١٢٢٤ هـ). وفي «لطائف المنن» حفظ مناقب شيخه المرسي
      وشيخ شيخه الشاذلي؛ وفي «مفتاح الفلاح» نظَّم ورد
      الطريقة؛ وفي «تاج العروس» جمع تعليم طريق الشاذلية
      العملي. ودُفن بمقبرة القرافة في القاهرة عند سفح المقطّم.
    description_fr: |
      Tāj al-Dīn Abū al-Faḍl Aḥmad ibn Muḥammad ibn ʿAbd al-Karīm
      ibn ʿAṭāʾ Allāh al-Judhāmī al-Iskandarī — maître soufi
      sunnite mālikite d'Alexandrie, troisième maître de la
      *shādhiliyya* après Abū al-Ḥasan al-Shādhilī et Abū
      al-ʿAbbās al-Mursī, disciple d'al-Mursī, professeur de
      *fiqh* à la madrasa Manṣūriyya et de soufisme à al-Azhar
      au Caire, et figure qui mit pour la première fois par
      écrit l'enseignement oral de la shādhiliyya — mourut au
      Caire en Jumādā II 709 H (novembre 1309 EC), ainsi que le
      consignent al-Dhahabī dans le *Tārīkh al-Islām*, Ibn
      Kathīr dans *al-Bidāya wa al-Nihāya*, Ibn Ḥajar dans ses
      notices biographiques et Ibn al-ʿImād dans les *Shadharāt
      al-Dhahab*. Ses *al-Ḥikam al-ʿAṭāʾiyya* (Aphorismes) —
      corpus compact d'environ 264 maximes sur le *tawḥīd*,
      l'*ʿubūdiyya* et la discipline du soi — sont devenus le
      texte soufi le plus commenté de l'histoire sunnite, avec
      des commentaires majeurs par Ibn ʿAbbād al-Rundī (m. 792
      H), Aḥmad Zarrūq (m. 899 H) et Ibn ʿAjība (m. 1224 H).
      Ses *Laṭāʾif al-Minan* préservèrent les *manāqib* de son
      maître al-Mursī et de son grand-maître al-Shādhilī ; son
      *Miftāḥ al-Falāḥ* fixa la discipline des litanies de
      l'ordre ; son *Tāj al-ʿArūs* rassembla l'enseignement
      pratique de la voie shādhilī. Il est enseveli au cimetière
      de la Qarāfa au Caire, au pied du Muqaṭṭam.
