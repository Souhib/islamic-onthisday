# Wave 31 of curated event additions (2026-04-27).
# Sufi shaykhs not previously covered: the Khwājagān masters of
# Transoxiana whose silsila culminates in Bahāʾ al-Dīn Naqshband
# (already in the dataset), the immediate Naqshbandī successors
# down through ʿUbayd Allāh Aḥrār, the Yasawiyya founder Aḥmad
# Yasawī, and the two senior Shādhilī shaykhs of late-13th-century
# Alexandria — Abū al-ʿAbbās al-Mursī and his disciple Ibn ʿAṭāʾ
# Allāh al-Iskandarī — both already cited extensively in the
# Sunnī Sufi canon.
#
# All firmly mainstream Sunni:
# - Khwājagān / Naqshbandiyya: Hanafi-Maturidi Transoxianan Sufi
#   line, foundational for Central Asian, Mughal, and Ottoman
#   Sunni piety; explicitly anti-bid'a and rooted in the ṣuḥba
#   of the Companions through the silsila al-dhahab back to
#   Abū Bakr ra (and a parallel line through ʿAlī ra).
# - Yasawiyya: foundational Turkic Sufi ṭarīqa, Hanafi-Maturidi,
#   the ground from which the Bektāshiyya later branched (the
#   Yasawī line itself stays firmly Sunni; later branches are a
#   separate question and not endorsed here).
# - Shādhiliyya: Maliki-Shafi'i Maghrebi-Egyptian-Levantine
#   ṭarīqa, with Ibn ʿAṭāʾ Allāh's *al-Ḥikam al-ʿAṭāʾiyya* and
#   *Laṭāʾif al-Minan* as the literary foundation of Sunni
#   Sufi reflection on the path.
#
# Dates: most figures are year-precise in the classical canon.
# Abū al-ʿAbbās al-Mursī's death on 25 Dhū al-Qaʿda 686 AH and
# Ibn ʿAṭāʾ Allāh's death in Jumādā II 709 AH are well attested
# to the day/month respectively. Ghujdawānī's date is contested
# in the Khwājagān biographical tradition (575 vs. 595 vs. 617
# AH); we follow 575 AH per Jāmī's *Nafaḥāt al-Uns* and EI2,
# and flag the dispute. Faghnawī's death is given variously as
# 628 AH and 715 AH; we follow 628 AH per the dominant Khwājagān
# transmission, with the dispute flagged.
#
# Already covered elsewhere and intentionally not duplicated here:
# Bahāʾ al-Dīn Naqshband (d. 791 AH — *death-of-naqshband*),
# Aḥmad al-Tijānī (d. 1230 AH — *death-of-ahmad-al-tijani*),
# Abū al-Ḥasan al-Shādhilī (d. 656 AH — *death-of-al-shadhili*).
#
# Coverage in the classical Sunni canon: Ibn Khallikān
# (*Wafayāt al-Aʿyān*) for al-Mursī and the early Maghrebi
# Shādhilīs; al-Dhahabī (*Siyar Aʿlām al-Nubalāʾ* and *Tārīkh
# al-Islām*) for the Khwājagān, al-Mursī, and Ibn ʿAṭāʾ Allāh;
# Ibn Kathīr (*al-Bidāya wa al-Nihāya*) and Ibn al-ʿImād
# (*Shadharāt al-Dhahab*) for the same; Ibn Ḥajar (*al-Durar
# al-Kāmina*) for the 8th-century AH figures (Aḥrār's master
# Yaʿqūb Charkhī, ʿAlāʾ al-Dīn al-ʿAṭṭār); EI2 supplements
# throughout. Trilingual en/ar/fr; no hadith refs needed.

events:
  # =========================================================================
  # YASAWIYYA — Aḥmad Yasawī (d. 562 AH, Yasi/Türkistan)
  # =========================================================================

  - slug: death-of-ahmad-yasawi
    category: scholar_death
    title_en: Death of Khwāja Aḥmad Yasawī — founder of the Yasawiyya
    title_ar: وفاة الخواجة أحمد يسوي — مؤسس الطريقة اليسوية
    title_fr: Mort de Khwāja Aḥmad Yasawī — fondateur de la Yasawiyya
    description_en: |
      Khwāja Aḥmad ibn Ibrāhīm ibn Maḥmūd ibn Iftikhār Yasawī —
      Turkic-language Sunni Hanafi-Maturidi Sufi master of Yasi
      (later renamed Türkistan, in modern southern Kazakhstan), and
      the figure to whom the classical Central Asian biographical
      tradition attributes the founding of the Yasawiyya, the first
      Sufi ṭarīqa to develop a sustained Turkic-language religious
      literature — died at Yasi in 562 AH (~1166 CE) at an
      advanced age, as recorded by Jāmī in *Nafaḥāt al-Uns* and
      adopted by the modern academic consensus reflected in EI2.
      He had studied with Yūsuf al-Hamadhānī (d. 535 AH) — the
      shared master from whose chain the Khwājagān / Naqshbandī
      line of Transoxiana also descends through ʿAbd al-Khāliq
      al-Ghujdawānī — making him the senior contemporary of
      Ghujdawānī and a foundational figure for Turkic Sunni
      piety. His Turkic-language *Dīwān-i Ḥikmat* (Book of Wisdom)
      is the earliest sustained corpus of Sufi verse in a Turkic
      language and shaped religious devotion across the Qipchaq
      steppe, the Volga, Anatolia, and the Indian-Mughal Turkic
      world. The mausoleum complex built over his tomb at
      Türkistan by Tīmūr (Tamerlane) in 798 AH (1395 CE) remains
      one of the great surviving monuments of Timurid architecture
      and a major pilgrimage site of Central Asian Sunnism.
    description_ar: |
      توفي الخواجة أحمد بن إبراهيم بن محمود بن افتخار يسوي —
      شيخ صوفي سني حنفي ماتُريدي تركي اللسان من «يَسي» (التي سمّيت
      بعدُ تركستان، في جنوب كازاخستان اليوم)، ومن إليه تنسب كتب
      تراجم آسيا الوسطى الكلاسيكية تأسيسَ الطريقة اليسوية، وهي
      أول طريقة صوفية أنتجت تراثاً دينياً تركياً مستداماً —
      بـ«يَسي» سنة ٥٦٢ هـ (~١١٦٦ م) عن عمر متقدم، كما حفظ ذلك
      الجامي في «نفحات الأنس»، واعتمده الإجماع الأكاديمي الحديث
      في دائرة المعارف الإسلامية الثانية. كان قد أخذ عن يوسف
      الهمذاني (ت ٥٣٥ هـ) — وهو نفسه الشيخ المشترك الذي تنحدر
      عنه أيضاً سلسلة الخواجگان والنقشبندية في ما وراء النهر
      من طريق عبد الخالق الغجدواني — فهو معاصر كبير لعبد الخالق
      الغجدواني، وأصلٌ مؤسس للتديّن السني التركي. وديوانُه
      التركي «ديوان الحكمة» أقدمُ ديوان شعر صوفي مستدام بلسان
      تركي، وتشكّلت به التقوى الدينية في سهوب القبجاق ووادي
      الفولغا والأناضول والعالم التركي الهندي المغولي. ولا
      يزال مزار قبره الذي بناه تيمور سنة ٧٩٨ هـ (١٣٩٥ م) في
      تركستان من أعظم آثار العمارة التيمورية الباقية، ومن أبرز
      مزارات السنّة في آسيا الوسطى.
    description_fr: |
      Khwāja Aḥmad ibn Ibrāhīm ibn Maḥmūd ibn Iftikhār Yasawī —
      maître soufi sunnite ḥanafite-māturīdite turcophone de Yasi
      (renommée plus tard Türkistan, dans l'actuel sud du
      Kazakhstan), et figure à laquelle la tradition biographique
      classique d'Asie centrale attribue la fondation de la
      Yasawiyya, première *ṭarīqa* soufie à développer une
      littérature religieuse soutenue en langue turque — mourut
      à Yasi en 562 H (~1166 EC) à un âge avancé, ainsi que le
      consigne Jāmī dans les *Nafaḥāt al-Uns* et qu'en témoigne
      le consensus académique moderne reflété par l'EI2. Il
      avait étudié avec Yūsuf al-Hamadhānī (m. 535 H) — maître
      commun de la chaîne dont descend également la lignée
      khwājagān / naqshbandī de Transoxiane par ʿAbd al-Khāliq
      al-Ghujdawānī — ce qui en fait un contemporain majeur de
      Ghujdawānī et une figure fondatrice de la piété sunnite
      turcique. Son *Dīwān-i Ḥikmat* (Livre de sagesse) en
      langue turque est le plus ancien corpus soutenu de poésie
      soufie dans une langue turcique et a façonné la dévotion
      religieuse à travers la steppe qiptchaque, la Volga,
      l'Anatolie et le monde turc indo-moghol. Le complexe
      funéraire bâti sur sa tombe à Türkistan par Tīmūr (Tamerlan)
      en 798 H (1395 EC) demeure l'un des grands monuments
      survivants de l'architecture timouride et un site de
      pèlerinage majeur du sunnisme centre-asiatique.
