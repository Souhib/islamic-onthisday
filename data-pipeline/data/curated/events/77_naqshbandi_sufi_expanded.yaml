  # =========================================================================
  # KHWĀJAGĀN — the masters of Transoxiana, predecessors of Naqshband
  # =========================================================================

  - slug: death-of-abd-al-khaliq-al-ghujdawani
    category: scholar_death
    title_en: Death of Khwāja ʿAbd al-Khāliq al-Ghujdawānī — codifier of the Khwājagān path
    title_ar: وفاة الخواجة عبد الخالق الغجدواني — واضع أصول طريق الخواجگان
    title_fr: Mort de Khwāja ʿAbd al-Khāliq al-Ghujdawānī — codificateur de la voie khwājagān
    description_en: |
      Khwāja ʿAbd al-Khāliq ibn ʿAbd al-Jamīl al-Ghujdawānī —
      Sunni Hanafi-Maturidi Sufi master of Ghujdawān (a town in
      the Bukhārā oasis of modern Uzbekistan), disciple of Yūsuf
      al-Hamadhānī, and the figure traditionally credited with
      formulating the eight foundational practical principles
      (Persian *kalimāt-i qudsiyya*) that govern the Khwājagān
      and later Naqshbandī Sufi method — died at Ghujdawān in
      575 AH (~1179 CE) per the dominant Khwājagān biographical
      tradition preserved in Jāmī's *Nafaḥāt al-Uns* and reflected
      in EI2; Persian *tadhkira* sources offer 595 AH and 617 AH
      as alternative attestations. We follow the 575 AH year
      preserved by Jāmī, while flagging the dispute. The eight
      principles he established — *hūsh dar dam* (awareness in
      the breath), *naẓar bar qadam* (watch on the step), *safar
      dar waṭan* (journey within the homeland), *khalwat dar
      anjuman* (solitude in the crowd), *yād-kard*, *bāz-gasht*,
      *nigāh-dāsht*, and *yād-dāsht* — became the practical
      backbone of the Khwājagān path; Bahāʾ al-Dīn Naqshband
      added three more (*wuqūf-i zamānī*, *wuqūf-i ʿadadī*,
      *wuqūf-i qalbī*) in the 8th century AH to complete the
      eleven Naqshbandī principles. Ghujdawānī's grave at
      Ghujdawān remains a pilgrimage site, and his teaching is
      transmitted through the chain Ghujdawānī → ʿĀrif al-Riwgarī
      → Maḥmūd Anjīr Faghnawī → ʿAlī al-Rāmītanī → Muḥammad Bābā
      Sammāsī → Amīr Kulāl → Bahāʾ al-Dīn Naqshband.
    description_ar: |
      توفي الخواجة عبد الخالق بن عبد الجميل الغجدواني — شيخ
      صوفي سني حنفي ماتُريدي من «غُجدوان» (بلدة في واحة بخارى
      بأوزبكستان اليوم)، تلميذ يوسف الهمذاني، ومن تنسب إليه
      كتب تراجم الخواجگان صياغةَ الأصول العملية الثمانية
      («كَلَمات قُدسية» بالفارسية) التي ترتكز عليها طريقة
      الخواجگان وتفرّع عنها لاحقاً النقشبندية — بغُجدوان سنة
      ٥٧٥ هـ (~١١٧٩ م) على الرواية المهيمنة في تراث الخواجگان
      التي حفظها الجامي في «نفحات الأنس» وتعتمدها دائرة
      المعارف الإسلامية الثانية، وذكرت بعض كتب التراجم الفارسية
      سنة ٥٩٥ هـ وسنة ٦١٧ هـ. ونحن نتابع سنة ٥٧٥ هـ التي حفظها
      الجامي، مع الإشارة إلى الخلاف. وأصوله الثمانية —
      «هوش در دم» (الحضور مع النفس)، و«نظر بر قدم» (حفظ النظر
      تحت القدم)، و«سفر در وطن» (السفر داخل الوطن)، و«خلوت در
      انجمن» (الخلوة في الجلوة)، و«ياد كرد»، و«باز گشت»،
      و«نگاه داشت»، و«ياد داشت» — صارت العمود الفقري لعمل
      طريق الخواجگان؛ وأضاف بهاء الدين النقشبند ثلاثة أصول أخر
      («وقوف زماني»، و«وقوف عددي»، و«وقوف قلبي») في القرن
      الثامن الهجري لتكتمل بها أصول النقشبندية الأحد عشر. ولا
      يزال قبره بغُجدوان مزاراً، وعن طريقه تتسلسل السلسلة:
      الغجدواني → عارف الريوگري → محمود أنجير الفغنوي → علي
      الراميتني → محمد بابا السمّاسي → أمير كلال → بهاء الدين
      النقشبند.
    description_fr: |
      Khwāja ʿAbd al-Khāliq ibn ʿAbd al-Jamīl al-Ghujdawānī —
      maître soufi sunnite ḥanafite-māturīdite de Ghujdawān
      (bourgade de l'oasis de Boukhārā, en Ouzbékistan actuel),
      disciple de Yūsuf al-Hamadhānī, et figure à laquelle la
      tradition attribue la formulation des huit principes
      pratiques fondamentaux (en persan *kalimāt-i qudsiyya*)
      qui régissent la méthode soufie khwājagān puis naqshbandī —
      mourut à Ghujdawān en 575 H (~1179 EC), selon la tradition
      khwājagān dominante préservée par les *Nafaḥāt al-Uns* de
      Jāmī et reflétée par l'EI2 ; les *tadhkira* persans donnent
      également 595 H et 617 H comme dates alternatives. Nous
      suivons l'année 575 H préservée par Jāmī tout en signalant
      le différend. Les huit principes qu'il établit — *hūsh
      dar dam* (la conscience dans le souffle), *naẓar bar
      qadam* (le regard sur le pas), *safar dar waṭan* (le
      voyage à l'intérieur de la patrie), *khalwat dar anjuman*
      (la solitude dans la foule), *yād-kard*, *bāz-gasht*,
      *nigāh-dāsht* et *yād-dāsht* — devinrent l'épine dorsale
      pratique de la voie khwājagān ; Bahāʾ al-Dīn Naqshband
      en ajouta trois autres (*wuqūf-i zamānī*, *wuqūf-i
      ʿadadī*, *wuqūf-i qalbī*) au VIIIe siècle H pour
      compléter les onze principes naqshbandī. Sa tombe à
      Ghujdawān demeure un lieu de pèlerinage, et son
      enseignement se transmet par la chaîne : Ghujdawānī →
      ʿĀrif al-Riwgarī → Maḥmūd Anjīr Faghnawī → ʿAlī al-Rāmītanī
      → Muḥammad Bābā Sammāsī → Amīr Kulāl → Bahāʾ al-Dīn
      Naqshband.
