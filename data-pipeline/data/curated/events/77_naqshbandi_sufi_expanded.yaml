  # SHĀDHILIYYA — al-Mursī and Ibn ʿAṭāʾ Allāh of Alexandria
  # =========================================================================

  - slug: death-of-abu-al-abbas-al-mursi
    category: scholar_death
    title_en: Death of Abū al-ʿAbbās al-Mursī — second master of the Shādhiliyya
    title_ar: وفاة أبي العباس المرسي — ثاني مشايخ الشاذلية
    title_fr: Mort d'Abū al-ʿAbbās al-Mursī — deuxième maître de la shādhiliyya
    description_en: |
      Abū al-ʿAbbās Aḥmad ibn ʿUmar al-Anṣārī al-Mursī — Andalusi-
      born Sunni Maliki Sufi master of Murcia (in modern southeast
      Spain), who emigrated as a young man to Tunis after the
      Reconquista pressure on al-Andalus, met Abū al-Ḥasan
      al-Shādhilī (d. 656 AH) at Tunis, became his principal
      disciple and travel-companion through North Africa and into
      Egypt, and succeeded him as the second master of the
      Shādhiliyya — died at Alexandria on 25 Dhū al-Qaʿda 686 AH
      (31 December 1287 CE) at age about 70, as recorded by Ibn
      Khallikān in *Wafayāt al-Aʿyān*, by al-Dhahabī in *Siyar
      Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām*, and by Ibn Kathīr
      in *al-Bidāya wa al-Nihāya*. For thirty years he had
      directed the Shādhilī khānaqāh of Alexandria, training the
      next generation of Shādhilī shaykhs (most centrally Ibn
      ʿAṭāʾ Allāh al-Iskandarī, his principal pupil) and shaping
      the order's distinct Mamluk-Egyptian profile: a non-monastic
      Sufism rooted in Maliki and Shafiʿi fiqh, opposed to
      antinomian display, and explicitly compatible with worldly
      vocation. His tomb-mosque at Alexandria — rebuilt under the
      Khedives and again in the 20th century — remains today the
      principal Shādhilī pilgrimage site of Egypt.
    description_ar: |
      توفي أبو العباس أحمد بن عمر الأنصاري المُرسي — صوفي سني
      مالكي أندلسي المولد، من مرسية (في جنوب شرق إسبانيا اليوم)،
      هاجر شاباً إلى تونس بعد ضغط حروب الاسترداد على الأندلس،
      فلقي أبا الحسن الشاذلي (ت ٦٥٦ هـ) بتونس، فصار أكبر
      تلاميذه ورفيقه في رحلته في شمال إفريقيا ومصر، ثم خَلَفه
      في مشيخة الطريقة الشاذلية — بالإسكندرية يوم ٢٥ ذي القعدة
      سنة ٦٨٦ هـ (٣١ كانون الأول ١٢٨٧ م) عن نحو سبعين سنة،
      كما أثبت ذلك ابن خلكان في «وفيات الأعيان»، والذهبي في
      «سير أعلام النبلاء» و«تاريخ الإسلام»، وابن كثير في
      «البداية والنهاية». وقد توّلى رئاسة زاوية الشاذلية
      بالإسكندرية ثلاثين سنة، فأخرج الطبقة التالية من مشايخ
      الشاذلية (وأظهرهم تلميذُه الأكبر ابن عطاء الله
      السكندري)، وشكّل لهجة الطريقة المتميزة في عصر المماليك
      المصري: تصوّفٌ غيرُ رهباني، يستند إلى فقه المالكية
      والشافعية، يعادي العَرَض الشَّطَحاني، ويُجوِّز الكسبَ
      والعمل. ولا يزال مسجد ضريحه بالإسكندرية — الذي أعيد
      بناؤه في عهد الخديوية ثم في القرن العشرين — أكبر مزار
      شاذلي في مصر.
    description_fr: |
      Abū al-ʿAbbās Aḥmad ibn ʿUmar al-Anṣārī al-Mursī — soufi
      sunnite mālikite né en Andalousie, à Murcie (sud-est de
      l'Espagne actuelle), qui émigra jeune à Tunis sous la
      pression de la Reconquista en al-Andalus, rencontra Abū
      al-Ḥasan al-Shādhilī (m. 656 H) à Tunis, devint son
      principal disciple et compagnon de voyage à travers
      l'Afrique du Nord et l'Égypte, puis lui succéda comme
      deuxième maître de la *shādhiliyya* — mourut à Alexandrie
      le 25 Dhū al-Qaʿda 686 H (31 décembre 1287 EC) à l'âge
      d'environ 70 ans, ainsi que le consignent Ibn Khallikān
      dans les *Wafayāt al-Aʿyān*, al-Dhahabī dans les *Siyar
      Aʿlām al-Nubalāʾ* et le *Tārīkh al-Islām*, et Ibn Kathīr
      dans *al-Bidāya wa al-Nihāya*. Pendant trente ans il
      dirigea la *khānaqāh* shādhilī d'Alexandrie, formant la
      génération suivante des shaykhs shādhilī (au premier chef
      son disciple principal Ibn ʿAṭāʾ Allāh al-Iskandarī) et
      façonnant le profil propre de l'ordre dans l'Égypte
      mamelouke : un soufisme non monastique enraciné dans le
      *fiqh* mālikite et shāfiʿīte, opposé aux manifestations
      antinomistes et explicitement compatible avec une
      vocation séculière. Sa mosquée funéraire à Alexandrie —
      reconstruite sous les Khédives puis au XXe siècle —
      demeure aujourd'hui le principal site de pèlerinage
      shādhilī d'Égypte.
