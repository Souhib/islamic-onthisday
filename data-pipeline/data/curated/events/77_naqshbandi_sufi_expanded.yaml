  - slug: death-of-alaa-al-din-al-attar
    category: scholar_death
    title_en: Death of ʿAlāʾ al-Dīn al-ʿAṭṭār — successor of Bahāʾ al-Dīn Naqshband
    title_ar: وفاة علاء الدين العطار — خليفة بهاء الدين النقشبند
    title_fr: Mort de ʿAlāʾ al-Dīn al-ʿAṭṭār — successeur de Bahāʾ al-Dīn Naqshband
    description_en: |
      Khwāja ʿAlāʾ al-Dīn Muḥammad ibn Muḥammad al-Bukhārī
      al-ʿAṭṭār — Sunni Hanafi Naqshbandī master of Bukhārā,
      son-in-law and primary successor of Bahāʾ al-Dīn Naqshband
      (d. 791 AH), and the figure under whom the order's
      consolidation in Transoxiana proceeded after the founder's
      death — died at Chaghāniyān (the upper-Oxus region of
      Transoxiana) in 802 AH (~1400 CE), as recorded by Ibn Ḥajar
      al-ʿAsqalānī in *al-Durar al-Kāmina fī Aʿyān al-Miʾa
      al-Thāmina* and by Ibn al-ʿImād in *Shadharāt al-Dhahab*.
      He had inherited from Naqshband the silent-inward *dhikr-i
      khafī* as the order's normative practice and trained the
      next generation of Naqshbandī masters — most centrally
      Yaʿqūb Charkhī (d. 851 AH), whose pupil ʿUbayd Allāh Aḥrār
      would extend Naqshbandī influence across Timurid Central
      Asia. His sayings, preserved by Yaʿqūb Charkhī in the
      *Risāla-yi Unsiyya* and by Jāmī in *Nafaḥāt al-Uns*,
      fixed the post-Naqshband normative tone of the order:
      attentive to fiqh, anti-bidʿa, suspicious of ecstatic
      display, and centred on the silsila al-dhahab tracing the
      order back to Abū Bakr ra.
    description_ar: |
      توفي الخواجة علاء الدين محمد بن محمد البخاري العطار —
      شيخ صوفي سني حنفي نقشبندي من بخارى، صهرُ بهاء الدين
      النقشبند (ت ٧٩١ هـ) وخليفته الأكبر، وعلى يديه استتبت
      الطريقة في ما وراء النهر بعد مؤسسها — بـ«جَغَانيان» في
      أعالي جيحون من ما وراء النهر سنة ٨٠٢ هـ (~١٤٠٠ م) كما
      أثبت ذلك ابن حجر العسقلاني في «الدرر الكامنة في أعيان
      المئة الثامنة» وابن العماد في «شذرات الذهب». ورِث عن
      النقشبند الذكر الخفي الباطن باعتباره عبادة الطريقة
      المعيارية، وأخرج الطبقة التالية من مشايخ النقشبندية —
      وأظهرهم يعقوب الجَرخي (ت ٨٥١ هـ) الذي كان تلميذُه عبيد
      الله الأحرار سيوسّع نفوذ النقشبندية في آسيا الوسطى
      التيمورية. ونقل أقواله يعقوب الجرخي في «الرسالة الأنسية»،
      ونقلها الجامي في «نفحات الأنس»، فحدّدت لهجة الطريقة
      الميزانية ما بعد النقشبند: التزام بالفقه، ورفض للبدعة،
      وتشكك في المشاهدة الجهرية، وتمسك بسلسلة الذهب التي تنتهي
      بأبي بكر الصديق رضي الله عنه.
    description_fr: |
      Khwāja ʿAlāʾ al-Dīn Muḥammad ibn Muḥammad al-Bukhārī
      al-ʿAṭṭār — maître soufi sunnite ḥanafite naqshbandī de
      Boukhārā, gendre et principal successeur de Bahāʾ al-Dīn
      Naqshband (m. 791 H), figure sous laquelle s'opère la
      consolidation de l'ordre en Transoxiane après la mort du
      fondateur — mourut à Chaghāniyān (région du haut-Oxus en
      Transoxiane) en 802 H (~1400 EC), ainsi que le consignent
      Ibn Ḥajar al-ʿAsqalānī dans *al-Durar al-Kāmina fī Aʿyān
      al-Miʾa al-Thāmina* et Ibn al-ʿImād dans les *Shadharāt
      al-Dhahab*. Il avait hérité de Naqshband le *dhikr-i
      khafī* silencieux et intérieur comme pratique normative
      de l'ordre, et forma la génération suivante des maîtres
      naqshbandī — au premier chef Yaʿqūb Charkhī (m. 851 H),
      dont le disciple ʿUbayd Allāh Aḥrār étendrait l'influence
      naqshbandī dans l'Asie centrale timouride. Ses paroles,
      préservées par Yaʿqūb Charkhī dans la *Risāla-yi Unsiyya*
      et par Jāmī dans les *Nafaḥāt al-Uns*, fixèrent le ton
      normatif post-Naqshband de l'ordre : attentif au *fiqh*,
      anti-*bidʿa*, méfiant à l'égard des manifestations
      extatiques et centré sur la *silsila al-dhahab* qui fait
      remonter l'ordre à Abū Bakr ra.
