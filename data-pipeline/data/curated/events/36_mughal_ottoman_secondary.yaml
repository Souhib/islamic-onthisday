  - slug: death-of-mumtaz-mahal
    category: ruler
    title_en: Death of Mumtāz Maḥall
    title_ar: وفاة ممتاز محل
    title_fr: Mort de Mumtāz Maḥall
    description_en: |
      Arjumand Bānū Bēgum, titled Mumtāz Maḥal (the Chosen of the
      Palace) — chief consort of Shāh Jahān, niece of Nūr Jahān,
      and the first lady of the Mughal court at the height of its
      cultural prestige — died at Burhanpur in the Deccan from
      postpartum haemorrhage after thirty hours of labour with her
      fourteenth child. She was 38. Her three-year tenure as
      *malika* (1037-1040 AH / 1628-1631 CE) had been one of
      unusual political intimacy: Shāh Jahān entrusted her with the
      imperial seal *muhr-i-uẓmā* and consulted her on state
      matters, and contemporary chroniclers including ʿAbd al-Ḥamīd
      Lāhōrī describe her as his closest counsellor. Upon her
      death he is said to have observed three months of mourning
      and to have aged visibly from grief. Her body, temporarily
      buried at Burhanpur, was transferred to Agra after six
      months and laid in the foundation chamber of the mausoleum
      that became the Tāj Maḥal — the most extensive monument-of-
      love programme in pre-modern Islamic architecture, completed
      twenty-two years later under the architect Ustād Aḥmad Lāhawrī.
    description_ar: |
      توفيت أرجمند بانو بيگم الملقبة بـ«ممتاز محل» (مختارة القصر)
      — زوج شاه جهان الكبرى، وابنة أخي نور جهان، وسيدة بلاط الدولة
      المغولية في أوج ازدهارها — في «برهانبور» بالديكان من نزيف ما
      بعد الولادة بعد ثلاثين ساعة من المخاض بمولودها الرابع عشر.
      وقد ناهزت الثامنة والثلاثين. وكان عهدها ملكةً ثلاث سنين
      (١٠٣٧-١٠٤٠ هـ / ١٦٢٨-١٦٣١ ميلادي) من أبرز ما عرفه البلاط
      المغولي شخصية: ائتمنها شاه جهان على «المهر العظم» وشاورها
      في شؤون الدولة، ووصفها معاصروها ومنهم عبد الحميد اللاهوري
      بأنها أقرب وزرائه. ويروى أنه أعلن الحداد ثلاثة أشهر بعد
      وفاتها وشاب من الأسى. ودفنت في «برهانبور» مؤقتاً ثم نقلت
      بعد ستة أشهر إلى أكره ووضعت في غرفة قاعدة الضريح الذي صار
      «تاج محل» — أكبر مشروع معماري ترجم الحب في تاريخ العمارة
      الإسلامية ما قبل الحديث، استكمل بعد اثنتين وعشرين سنة على
      يد المعمار «أستاد أحمد اللاهوري».
    description_fr: |
      Arjumand Bānū Bēgum, titrée Mumtāz Maḥall (l'Élue du Palais)
      — épouse principale de Shāh Jahān, nièce de Nūr Jahān, et
      première dame de la cour moghole à l'apogée de son prestige
      culturel — mourut à Burhānpūr dans le Deccan d'une hémorragie
      post-partum après trente heures de travail à son quatorzième
      enfant. Elle avait 38 ans. Son règne de trois ans en tant
      que *malika* (1037-1040 H / 1628-1631 EC) avait été d'une
      intimité politique inhabituelle : Shāh Jahān lui confia le
      sceau impérial *muhr-i-uẓmā* et la consultait sur les
      affaires d'État, et les chroniqueurs contemporains, dont
      ʿAbd al-Ḥamīd Lāhōrī, la décrivent comme sa conseillère la
      plus proche. À sa mort il aurait observé trois mois de deuil
      et vieilli visiblement de chagrin. Son corps, inhumé
      temporairement à Burhānpūr, fut transféré à Agra après six
      mois et déposé dans la chambre de fondation du mausolée
      devenu le Tāj Maḥal — le plus vaste programme monumental
      d'amour de l'architecture islamique pré-moderne, achevé
      vingt-deux ans plus tard sous l'architecte Ustād Aḥmad
      Lāhawrī.
