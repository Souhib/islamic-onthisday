  - slug: death-of-bayezid-ii
    category: ruler
    title_en: Death of Sultan Bāyezīd II
    title_ar: وفاة السلطان بايزيد الثاني
    title_fr: Mort du sultan Bāyezīd II
    description_en: |
      Bāyezīd II ibn Meḥmed al-Fātiḥ — eighth Ottoman sultan and
      son of the conqueror of Constantinople, called *al-ʿAdlī*
      (the Just) and *Ṣūfī* for his pious temperament — died at
      Havsa in Thrace one month after abdicating the throne in
      favour of his son Selīm I (the future *Yāvuz*) on 17 Ṣafar
      918 (25 April 1512 CE). He was 64. His thirty-one-year reign
      (886-918 AH / 1481-1512 CE) consolidated the conquests of
      Meḥmed II rather than expanding them: he codified the *qānūn*
      law that became the standard secular complement to Sharia in
      Ottoman administration, fought the Mamluks of Egypt to a
      stalemate (894-896 AH), conquered the Peloponnese from
      Venice (904-907 AH / 1499-1502 CE), and had to suppress the
      Qizilbāsh uprising of Şāh-qulu (917 AH / 1511 CE) backed
      from Tabriz by the new Safavid Shāh Ismāʿīl. In 897 AH
      (1492 CE) he ordered the Ottoman navy under Kemāl Reʾīs to
      ferry Sephardic Jews and Andalusi Muslims expelled from
      Spain to Ottoman ports, a humanitarian programme that
      transformed Salonica and Istanbul demographically. He was
      the leading Ottoman patron of the *ʿulamāʾ* and built the
      Bāyezīd II mosque complex at Istanbul, Edirne, and Amasya.
    description_ar: |
      توفي السلطان بايزيد الثاني بن محمد الفاتح — ثامن سلاطين
      الدولة العثمانية وابن فاتح القسطنطينية، الملقب بـ«العدلي»
      وبـ«الصوفي» لتقواه — في «هَفسا» بتراقيا بعد شهر من تنازله
      عن العرش لابنه سليم الأول (الذي صار «ياووز» القاطع) في ١٧
      صفر ٩١٨ (٢٥ أبريل ١٥١٢ ميلادي). وقد ناهز الرابعة والستين.
      رسخ عهده الذي امتد إحدى وثلاثين سنة (٨٨٦-٩١٨ هـ / ١٤٨١-١٥١٢
      ميلادي) فتوحات والده محمد الفاتح ولم يتوسع كثيراً: قنن
      «القانون» السلطاني الذي صار التكميل العلماني الشريعة في
      الإدارة العثمانية، ووقف للمماليك ندّاً (٨٩٤-٨٩٦ هـ)، وافتتح
      «بيلوبونيز» من البندقية (٩٠٤-٩٠٧ هـ / ١٤٩٩-١٥٠٢ ميلادي)،
      واضطر إلى قمع ثورة القزلباش لـ«شاه قُلي» (٩١٧ هـ / ١٥١١
      ميلادي) المدعومة من تبريز من الشاه الصفوي الناشئ إسماعيل.
      وفي سنة ٨٩٧ هـ (١٤٩٢ ميلادي) أمر الأسطول العثماني تحت كمال
      ريس بنقل اليهود السفارديم والمسلمين الأندلسيين المطرودين
      من إسبانيا إلى موانئ الدولة، وهو عمل إنساني غير ديموغرافياً
      مدينتي «سالونيك» وإسطنبول. وكان أبرز سلاطين بني عثمان رعاية
      للعلماء، وبنى مجمع جامع بايزيد الثاني بإسطنبول وأدرنة
      وأماسيا.
    description_fr: |
      Bāyezīd II ibn Meḥmed al-Fātiḥ — huitième sultan ottoman et
      fils du conquérant de Constantinople, surnommé *al-ʿAdlī*
      (le Juste) et *Ṣūfī* pour son tempérament pieux — mourut à
      Havsa en Thrace un mois après avoir abdiqué le trône en
      faveur de son fils Selīm Ier (le futur *Yāvuz*) le 17 Ṣafar
      918 (25 avril 1512 EC). Il avait 64 ans. Son règne de
      trente et un ans (886-918 H / 1481-1512 EC) consolida les
      conquêtes de Meḥmed II plutôt que de les étendre : il
      codifia la loi *qānūn* qui devint le complément séculier
      standard de la Sharia dans l'administration ottomane, fit
      face à l'Égypte mamelouke en un statu quo (894-896 H),
      conquit le Péloponnèse à Venise (904-907 H / 1499-1502 EC),
      et dut réprimer le soulèvement qizilbāsh de Şāh-qulu (917 H
      / 1511 EC) appuyé depuis Tabriz par le nouveau Shāh safavide
      Ismāʿīl. En 897 H (1492 EC) il ordonna à la flotte ottomane
      sous Kemāl Reʾīs d'évacuer les Juifs séfarades et les
      Musulmans andalous expulsés d'Espagne vers les ports
      ottomans, programme humanitaire qui transforma
      démographiquement Salonique et Istanbul. Il fut le grand
      mécène ottoman des *ʿulamāʾ* et bâtit le complexe de la
      mosquée Bāyezīd II à Istanbul, Edirne et Amasya.
    canonical_hijri: {year: 918, month: 2, day: 29, precision: day}
    canonical_gregorian: {date: 1512-05-26, precision: day, method: tabular_conversion}
