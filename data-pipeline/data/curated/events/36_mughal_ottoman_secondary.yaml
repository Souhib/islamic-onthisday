  - slug: death-of-koprulu-fazil-ahmad-pasha
    category: ruler
    title_en: Death of Köprülü Fāḍil Aḥmad Pasha
    title_ar: وفاة كوبريلي فاضل أحمد باشا
    title_fr: Mort de Köprülü Fāḍil Aḥmad Pasha
    description_en: |
      Köprülü Fāḍil Aḥmad Pasha — son and successor of Köprülü
      Meḥmed Pasha, second of the Köprülü grand viziers, lettered
      *muḥaddith*-trained scholar (hence his epithet *fāḍil*, the
      learned) and the longest-serving fully empowered grand vizier
      of the Ottoman seventeenth century — died at his estate in
      Çorlu near Istanbul after fifteen years in office. He was
      about 41 and his health had been broken by nine years on
      campaign. Appointed at his father's death in 1072 AH (1661
      CE), he conducted the Austro-Turkish War of 1073-1075 AH
      (1663-1664 CE) culminating in Ottoman victory at the
      capture of Nové Zámky and the Treaty of Vasvár, completed
      the long siege of Candia by capturing the Venetian stronghold
      after twenty-four years of intermittent operations (1080 AH
      / 1669 CE) thus ending Crete's status as the last Christian
      island of the eastern Mediterranean, and led the Polish-
      Ottoman War of 1083-1087 AH (1672-1676 CE) including the
      capture of Kamianets-Podilskyi. He was the last Ottoman
      statesman to expand the empire on three fronts simultaneously;
      the catastrophic Vienna campaign under his successor and
      cousin Kara Muṣṭafā Pasha would reverse much of his work.
    description_ar: |
      توفي الصدر الأعظم كوبريلي فاضل أحمد باشا — ابن كوبريلي محمد
      باشا وخليفته، ثاني صدور آل كوبريلي، عالم أديب درس الحديث
      الشريف (ومن ثم نُعت بـ«فاضل»)، وأطول الصدور العظام تمكيناً
      من السلطة في القرن السابع عشر العثماني — في ضيعته بـ«تشورلو»
      قرب إسطنبول بعد خمس عشرة سنة في الصدارة. وقد ناهز الواحدة
      والأربعين، وقد أنهك جسده تسع سنين في الحملات. عُيّن عند
      وفاة أبيه سنة ١٠٧٢ هـ (١٦٦١ ميلادي)، وقاد الحرب النمساوية-
      التركية لسنوات ١٠٧٣-١٠٧٥ هـ (١٦٦٣-١٦٦٤ ميلادي) المنتهية
      بانتصار العثمانيين بفتح «نوفي زامكي» ومعاهدة «فاسفار»،
      وأكمل حصار «كنديا» بفتح المعقل البندقي بعد أربع وعشرين
      سنة من العمليات المتقطعة (١٠٨٠ هـ / ١٦٦٩ ميلادي) فأنهى به
      مكانة كريت آخر جزيرة مسيحية في شرق المتوسط، وقاد الحرب
      البولندية-العثمانية لسنوات ١٠٨٣-١٠٨٧ هـ (١٦٧٢-١٦٧٦ ميلادي)
      منها فتح «كاميانتس بودولسكي». وهو آخر ساسة الدولة العثمانية
      في توسيعها على ثلاث جبهات في آن واحد؛ وستعكس حملة فيينا
      الكارثية بقيادة خليفته وابن عمه «قره مصطفى باشا» جل عمله.
    description_fr: |
      Köprülü Fāḍil Aḥmad Pasha — fils et successeur de Köprülü
      Meḥmed Pasha, deuxième des grands vizirs Köprülü, savant
      lettré formé à la science du hadith (d'où son épithète
      *fāḍil*, le savant) et le grand vizir pleinement autonomé
      le plus longtemps en poste du XVIIe siècle ottoman — mourut
      dans son domaine de Çorlu près d'Istanbul après quinze ans
      à ce poste. Il avait environ 41 ans, et sa santé avait été
      brisée par neuf années de campagne. Nommé à la mort de son
      père en 1072 H (1661 EC), il mena la guerre austro-turque
      de 1073-1075 H (1663-1664 EC) culminant en victoire ottomane
      à la prise de Nové Zámky et au traité de Vasvár, acheva le
      long siège de Candie en prenant le bastion vénitien après
      vingt-quatre ans d'opérations intermittentes (1080 H /
      1669 EC) mettant ainsi fin au statut de la Crète comme
      dernière île chrétienne de la Méditerranée orientale, et
      mena la guerre polono-ottomane de 1083-1087 H (1672-1676
      EC) incluant la prise de Kamianets-Podilskyi. Il fut le
      dernier homme d'État ottoman à étendre l'empire sur trois
      fronts simultanément; la campagne catastrophique de Vienne
      sous son successeur et cousin Kara Muṣṭafā Pasha en
      renverserait l'essentiel de l'œuvre.
