  - slug: death-of-nur-jahan
    category: ruler
    title_en: Death of Nūr Jahān
    title_ar: وفاة نور جهان
    title_fr: Mort de Nūr Jahān
    description_en: |
      Mihr al-Nisāʾ Bēgum, titled Nūr Jahān (Light of the World) —
      twentieth and final wife of Emperor Jahāngīr, *de facto*
      regent during the last decade of his reign as opium and
      illness reduced him, and the only Mughal empress to have
      coinage struck in her name — died in Lahore at age 68 and
      was buried in her own tomb at Shāhdara Bāgh beside the
      mausoleum of Jahāngīr. After Jahāngīr's death in 1037 AH
      (1627 CE) she had backed her son-in-law Shahryār against
      Shāh Jahān; her brother Āṣaf Khān (Mumtāz Maḥall's father)
      sided with Shāh Jahān, and Nūr Jahān spent her remaining
      eighteen years in dignified retirement on a state pension.
      Her architectural programme included the Tomb of Iʿtimād al-
      Dawla (her father's mausoleum at Agra, 1031-1037 AH /
      1622-1628 CE) — the inlaid marble *parchin kārī* of which
      anticipated the Tāj Maḥal — together with gardens and
      caravanserais along the Mughal trunk roads. She is the
      principal female political figure of the Indian Muslim
      seventeenth century.
    description_ar: |
      توفيت السيدة مهر النساء بيگم الملقبة بـ«نور جهان» (نور
      العالم) — العشرون والأخيرة من زوجات الإمبراطور جهانكير،
      الحاكمة فعلاً في العقد الأخير من حكمه إذ هد قواه الأفيون
      والمرض، والإمبراطورة المغولية الوحيدة التي ضربت العملة
      باسمها — في لاهور عن ثمان وستين سنة ودفنت في ضريح من
      بنائها بـ«شاهدرة باغ» إلى جوار ضريح جهانكير. وكانت قد
      تحالفت بعد وفاة جهانكير سنة ١٠٣٧ هـ (١٦٢٧ ميلادي) مع
      صهرها «شهريار» في وجه شاه جهان؛ ولكن أخاها «آصف خان»
      (والد ممتاز محل) انحاز إلى شاه جهان، فقضت نور جهان السنوات
      الثماني عشرة الباقية من عمرها في تقاعد كريم على راتب
      دولة. ومن آثارها العمارة ضريح «اعتماد الدولة» (مقبرة أبيها
      بأكره ١٠٣١-١٠٣٧ هـ / ١٦٢٢-١٦٢٨ ميلادي) — وما رصع به من
      الرخام بـ«پرچن كاري» ميز الأسلوب الذي استلهمه «تاج محل» —
      مع البساتين والخانات على طرق الدولة المغولية الكبرى. وهي
      الشخصية السياسية النسائية الأبرز في القرن السابع عشر
      الإسلامي بشبه القارة الهندية.
    description_fr: |
      Mihr al-Nisāʾ Bēgum, titrée Nūr Jahān (Lumière du Monde) —
      vingtième et dernière épouse de l'empereur Jahāngīr, régente
      *de facto* pendant la dernière décennie de son règne alors
      que l'opium et la maladie le diminuaient, et seule
      impératrice moghole à avoir fait frapper monnaie à son nom —
      mourut à Lahore à 68 ans et fut inhumée dans son propre
      mausolée à Shāhdara Bāgh, à côté du tombeau de Jahāngīr.
      Après la mort de Jahāngīr en 1037 H (1627 EC), elle avait
      soutenu son gendre Shahryār contre Shāh Jahān; son frère
      Āṣaf Khān (père de Mumtāz Maḥall) prit le parti de Shāh
      Jahān, et Nūr Jahān passa ses dix-huit dernières années en
      retraite digne sur pension d'État. Son programme architectural
      incluait le tombeau d'Iʿtimād al-Dawla (mausolée de son père
      à Agra, 1031-1037 H / 1622-1628 EC) — dont le marbre incrusté
      en *parchīn kārī* anticipa le Tāj Maḥal — ainsi que des
      jardins et caravansérails le long des grandes routes
      mogholes. Elle est la principale figure politique féminine
      de l'Inde musulmane du XVIIe siècle.
    canonical_hijri: {year: 1055, month: 10, day: 28, precision: day}
    canonical_gregorian: {date: 1645-12-17, precision: day, method: tabular_conversion}
