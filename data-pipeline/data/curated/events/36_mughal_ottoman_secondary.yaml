  - slug: death-of-bahadur-shah-i
    category: ruler
    title_en: Death of Bahādur Shāh I
    title_ar: وفاة بهادر شاه الأول
    title_fr: Mort de Bahādur Shāh Ier
    description_en: |
      Qutb al-Dīn Muḥammad Muʿaẓẓam Shāh ʿĀlam Bahādur Shāh — son
      and successor of Aurangzeb, seventh Mughal emperor, who
      acceded at age 63 after winning the war of succession against
      his brother Aʿẓam Shāh at Jajau (1119 AH / 1707 CE) — died
      in Lahore at age 68 after a five-year reign. He inherited an
      empire formally at its territorial maximum but already strained
      from forty-nine years of Aurangzeb's Deccan campaigns; his
      reign managed Sikh resistance under Banda Singh Bahādur, the
      Marathas, and a Rajput crisis with the Kachhwāhā and Rāṭhōr
      houses. Conciliatory toward the Sikhs, he was the first Mughal
      ruler to attempt rapprochement after the executions of the
      Sikh Gurus and made *jāgīr* concessions to Banda. His sudden
      death at Lahore set off a Mughal succession war among his
      four sons, decisively breaking imperial unity. Historians of
      the *Riyāḍ al-Salāṭīn* tradition mark his reign as the start
      of the Mughal political decline that culminated in the
      eighteenth-century regional successor states (the Hyderabad
      Niẓāmat, Awadh, the Marathas, and Bengal).
    description_ar: |
      توفي قطب الدين محمد معظم شاه عالم بهادر شاه — ابن أورنجزيب
      وخليفته، سابع أباطرة الدولة المغولية الإسلامية، الذي ولي
      الملك عن ثلاث وستين سنة بعد انتصاره في حرب الخلافة على
      أخيه أعظم شاه في «جاجوُ» سنة ١١١٩ هـ (١٧٠٧ ميلادي) — في
      لاهور عن ثمان وستين سنة بعد عهد امتد خمس سنين. ورث دولة
      كانت رسماً في أوج اتساعها الجغرافي لكنها أنهكت بعد تسع
      وأربعين سنة من حملات أورنجزيب على الديكان؛ وكان عهده يديرُ
      مقاومة السيخ تحت «باندا سنغ بهادر»، وهجوم الماراتها، وأزمة
      الراجبوت من بيوت «كاتشواها» و«راتور». وكان مصالحاً للسيخ،
      وأول حاكم مغولي حاول التقارب معهم بعد إعدام «قرناء» السيخ،
      ومنح «باندا» إقطاعات. ومن وفاته المفاجئة بلاهور أشعلت حرب
      خلافة بين أبنائه الأربعة فحطمت وحدة الدولة. ويعد مؤرخو
      «رياض السلاطين» عهده بدء التراجع السياسي المغولي الذي بلغ
      ذروته في الدول الإقليمية الخلف للقرن الثامن عشر (نظامة
      حيدر آباد، وأود، والماراتها، والبنغال).
    description_fr: |
      Quṭb al-Dīn Muḥammad Muʿaẓẓam Shāh ʿĀlam Bahādur Shāh — fils
      et successeur d'Aurangzeb, septième empereur moghol,
      monté sur le trône à 63 ans après avoir gagné la guerre de
      succession contre son frère Aʿẓam Shāh à Jajau (1119 H /
      1707 EC) — mourut à Lahore à 68 ans après un règne de cinq
      ans. Il hérita d'un empire formellement à son extension
      territoriale maximale mais déjà éprouvé par quarante-neuf
      ans des campagnes d'Aurangzeb au Deccan; son règne gérait
      la résistance sikh sous Banda Singh Bahādur, les Marathes,
      et une crise rajpoute avec les maisons Kachhwāhā et Rāṭhōr.
      Conciliateur envers les sikhs, il fut le premier souverain
      moghol à tenter un rapprochement après les exécutions des
      Gurus sikhs et fit des concessions de *jāgīr* à Banda. Sa
      mort soudaine à Lahore déclencha une guerre de succession
      entre ses quatre fils, brisant définitivement l'unité
      impériale. Les historiens de la tradition *Riyāḍ al-Salāṭīn*
      marquent son règne comme le début du déclin politique
      moghol qui culmina dans les États successeurs régionaux du
      XVIIIe siècle (le Niẓāmat de Hyderabad, l'Awadh, les
      Marathes, et le Bengale).
    canonical_hijri: {year: 1124, month: 1, day: 19, precision: day}
    canonical_gregorian: {date: 1712-02-27, precision: day, method: tabular_conversion}
