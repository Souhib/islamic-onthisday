  - slug: death-of-mahmud-ii
    category: ruler
    title_en: Death of Sultan Maḥmūd II
    title_ar: وفاة السلطان محمود الثاني
    title_fr: Mort du sultan Maḥmūd II
    description_en: |
      Sultan Maḥmūd II ibn ʿAbd al-Ḥamīd I — thirtieth Ottoman
      sultan and the architect of the empire's nineteenth-century
      reconstruction, often compared by contemporaries and later
      historians to Peter the Great of Russia for the depth of
      his institutional reforms — died of tuberculosis at Çamlıca
      in Istanbul. He was 53. His thirty-one-year reign (1223-1255
      AH / 1808-1839 CE) effected the *Vakʿa-yi Ḫayrīye* (the
      Auspicious Incident) of 15 Dhū al-Qiʿda 1241 (15 June 1826
      CE) abolishing the Janissary corps after they revolted, and
      replacing them with the Western-modelled *Asākir-i Manṣūre-yi
      Muḥammadīye*. His subsequent administrative reforms — the
      first Ottoman ministries, the first government gazette
      *Taqwīm-i Veqāyiʿ* (1247 AH / 1831 CE), the first European-
      style census, the first Imperial School of Medicine and the
      Imperial Military Academy, and the structured curtailment of
      the *ʿulamāʾ*'s administrative role — set the institutional
      foundations of the Tanzimat era under his son ʿAbd al-Majīd I.
      During his reign Greece was lost to the Greek War of
      Independence (1244-1245 AH / 1828-1830 CE) and Algeria fell
      to French invasion (1246 AH / 1830 CE) — the territorial
      cost of the empire's slow internal modernisation.
    description_ar: |
      توفي السلطان محمود الثاني بن عبد الحميد الأول — ثلاثون
      سلاطين الدولة العثمانية ومهندس إعادة بنائها في القرن التاسع
      عشر، كثيراً ما قارنه معاصروه ومن بعدهم بـ«بطرس الأكبر» في
      روسيا لعمق إصلاحاته المؤسسية — من السل في «جاملي جا»
      بإسطنبول. وقد ناهز الثالثة والخمسين. وحقق عهده الذي امتد
      إحدى وثلاثين سنة (١٢٢٣-١٢٥٥ هـ / ١٨٠٨-١٨٣٩ ميلادي)
      «الواقعة الخيرية» في ١٥ ذي القعدة ١٢٤١ (١٥ يونيو ١٨٢٦
      ميلادي) بإلغاء جيش الإنكشارية بعد ثورتهم وإحلال «العساكر
      المنصورة المحمدية» على الطراز الأوروبي محلهم. وأسست
      إصلاحاته الإدارية اللاحقة — أوائل الوزارات العثمانية،
      وجريدة الدولة «تقويم وقايع» (١٢٤٧ هـ / ١٨٣١ ميلادي)، وأول
      تعداد على الطريقة الأوروبية، والمدرسة الإمبراطورية للطب،
      والأكاديمية العسكرية الإمبراطورية، وتقليص دور العلماء في
      الإدارة بحدود مرسومة — البنية التحتية المؤسسية لعهد
      «التنظيمات» الذي أعقبه على يد ابنه عبد المجيد الأول. وفي
      عهده ذهبت اليونان بحرب الاستقلال اليونانية (١٢٤٤-١٢٤٥ هـ /
      ١٨٢٨-١٨٣٠ ميلادي) وسقطت الجزائر للغزو الفرنسي (١٢٤٦ هـ /
      ١٨٣٠ ميلادي) — ثمن إقليمي للحداثة الداخلية البطيئة للدولة.
    description_fr: |
      Sultan Maḥmūd II ibn ʿAbd al-Ḥamīd Ier — trentième sultan
      ottoman et architecte de la reconstruction de l'empire au
      XIXe siècle, souvent comparé par ses contemporains et les
      historiens postérieurs à Pierre le Grand de Russie pour la
      profondeur de ses réformes institutionnelles — mourut de la
      tuberculose à Çamlıca à Istanbul. Il avait 53 ans. Son
      règne de trente et un ans (1223-1255 H / 1808-1839 EC)
      réalisa la *Vakʿa-yi Ḫayrīye* (l'Heureux Événement) du
      15 Dhū al-Qiʿda 1241 (15 juin 1826 EC) en abolissant le
      corps des janissaires après leur révolte et en les
      remplaçant par les *Asākir-i Manṣūre-yi Muḥammadīye* sur
      le modèle occidental. Ses réformes administratives ultérieures
      — premiers ministères ottomans, premier journal officiel
      *Taqwīm-i Veqāyiʿ* (1247 H / 1831 EC), premier recensement
      à l'européenne, première École impériale de médecine et
      Académie militaire impériale, et la limitation structurée du
      rôle administratif des *ʿulamāʾ* — posèrent les fondations
      institutionnelles de l'ère des Tanzimat sous son fils ʿAbd
      al-Majīd Ier. Durant son règne la Grèce fut perdue à la
      guerre d'indépendance grecque (1244-1245 H / 1828-1830 EC)
      et l'Algérie tomba à l'invasion française (1246 H /
      1830 EC) — le coût territorial de la modernisation
      intérieure lente de l'empire.
