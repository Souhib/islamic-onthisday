  - slug: death-of-dara-shikoh
    category: ruler
    title_en: Execution of Dārā Shikōh
    title_ar: مقتل دارا شكوه
    title_fr: Exécution de Dārā Shikōh
    description_en: |
      Muhammad Dārā Shikōh — eldest son of Shāh Jahān and Mumtāz
      Mahal, designated heir, Qādirī Sufi disciple of Miyān Mīr and
      Mullā Shāh Badakhshī, and the most controversial of the
      Mughal princes for his syncretist intellectual programme —
      was executed in Delhi at age 44 by the order of his younger
      brother Aurangzeb after losing the war of succession at
      Sāmūgarh (1068 AH / 1658 CE) and being captured in flight to
      the Persian frontier. He was paraded through Delhi in chains
      and convicted of *takfīr*-grade *ilḥād* (apostasy/heresy) by
      a panel of *ʿulamāʾ* on the basis of his works. His scholarly
      output included *Majmaʿ al-Baḥrayn* (the Confluence of the
      Two Seas), arguing that Vedānta and Sufism agree at the
      meta­physical core, and *Sirr al-Akbar* (1067 AH / 1657 CE),
      his Persian translation of fifty Upanishads — a project that
      drew from Hindu and Muslim *ʿulamāʾ* together at Banaras and
      that William Jones, Anquetil-Duperron, and Schopenhauer would
      later read in European translation. Sunni orthodoxy regarded
      his theology as heterodox; the Aurangzeb succession sealed
      the line of Mughal religious-political reorientation toward
      Sharia-conservative governance.
    description_ar: |
      أُعدم الأمير محمد دارا شكوه — أكبر أبناء شاه جهان وممتاز محل،
      ولي العهد المعين، والمريد القادري للشيخ ميان مير والملا شاه
      البدخشي، وأشد أبناء الأسرة المغولية إثارة للجدل لمشروعه
      الفكري التوفيقي — بدلهي عن أربع وأربعين سنة بأمر أخيه أصغره
      أورنجزيب بعد هزيمته في حرب الخلافة في «سامُوجَر» سنة ١٠٦٨
      هـ (١٦٥٨ ميلادي) واعتقاله في فراره إلى الحدود الفارسية. وطيف
      به مكبلاً في دلهي ثم أدانته هيئة من العلماء بالردة-الإلحاد
      على أساس مصنفاته. ومن إنتاجه العلمي «مجمع البحرين» يحاجج فيه
      أن «الفيدانتا» والتصوف يتفقان في صميمهما الميتافيزيقي،
      و«سر الأكبر» سنة ١٠٦٧ هـ (١٦٥٧ ميلادي) ترجمته الفارسية لخمسين
      «أوبانيشاد» — مشروع شارك فيه علماء من الهندوس والمسلمين معاً
      في «بنارس»، وقرأه فيما بعد ويليام جونز وأنكوتيل-دوبيرون
      وشوبنهاور بالترجمات الأوروبية. واعتبرت السنة عقيدته منحرفة؛
      وحسمت خلافة أورنجزيب التحول الديني-السياسي المغولي نحو حكم
      شرعي تقليدي.
    description_fr: |
      Muḥammad Dārā Shikōh — fils aîné de Shāh Jahān et de Mumtāz
      Maḥall, héritier désigné, disciple soufi qādirī de Miyān
      Mīr et de Mullā Shāh Badakhshī, et le plus controversé des
      princes moghols pour son programme intellectuel syncrétiste —
      fut exécuté à Delhi à l'âge de 44 ans sur ordre de son frère
      cadet Aurangzeb après la défaite de la guerre de succession
      à Sāmūgaṛh (1068 H / 1658 EC) et sa capture lors de sa fuite
      vers la frontière perse. Il fut promené dans Delhi enchaîné
      et condamné pour *ilḥād* (apostasie/hérésie) par un panel
      d'*ʿulamāʾ* sur la base de ses œuvres. Sa production
      savante incluait le *Majmaʿ al-Baḥrayn* (la Confluence des
      Deux Mers), soutenant que le Vedānta et le soufisme
      concordent dans leur noyau métaphysique, et le *Sirr al-Akbar*
      (1067 H / 1657 EC), sa traduction persane de cinquante
      Upanishads — un projet qui réunit des *ʿulamāʾ* hindous et
      musulmans à Bénarès, lu plus tard par William Jones,
      Anquetil-Duperron et Schopenhauer en traductions européennes.
      L'orthodoxie sunnite tint sa théologie pour hétérodoxe; la
      succession d'Aurangzeb scella la réorientation religio-
      politique moghole vers une gouvernance sharī ʿa-conservatrice.
