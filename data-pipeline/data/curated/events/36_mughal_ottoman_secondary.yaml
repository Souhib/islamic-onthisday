  - slug: death-of-koprulu-mehmed-pasha
    category: ruler
    title_en: Death of Köprülü Meḥmed Pasha
    title_ar: وفاة كوبريلي محمد باشا
    title_fr: Mort de Köprülü Meḥmed Pasha
    description_en: |
      Köprülü Meḥmed Pasha — Albanian-origin grand vizier under
      Sultan Meḥmed IV, the founder of the Köprülü dynasty of
      grand viziers that would dominate Ottoman government for
      half a century — died at Edirne after five years in office.
      He was about 86. Appointed in Şawwāl 1066 AH (September 1656
      CE) at the depths of the mid-seventeenth-century Ottoman
      crisis — Venetian blockade of the Dardanelles, Janissary
      revolts in Istanbul, fiscal collapse, and the Köprülü family
      legend that the elderly statesman accepted office only on the
      condition of *tafwīḍ muṭlaq* (absolute and unappealable
      authority) — he restored Ottoman state capacity through
      ruthless executions of corrupt officials, broke the Venetian
      blockade by recapturing Tenedos and Lemnos (1067 AH /
      1657 CE), suppressed the Abaza Ḥasan Pasha revolt in
      Anatolia (1068-1069 AH / 1658-1659 CE), and reasserted
      central control over Transylvania and the Crimea. His son
      Fāḍil Aḥmad Pasha succeeded him, and his nephew Kara Muṣṭafā
      Pasha would later besiege Vienna in 1094 AH (1683 CE).
      Ottoman historiography credits him with extending the empire's
      life by a century.
    description_ar: |
      توفي الصدر الأعظم كوبريلي محمد باشا — صدر السلطان محمد
      الرابع من أصول ألبانية، ومؤسس آل كوبريلي من الصدور العظام
      الذين هيمنوا على إدارة الدولة العثمانية نصف قرن — في أدرنة
      بعد خمس سنين في الصدارة. وقد ناهز السادسة والثمانين. عُيّن
      في شوال ١٠٦٦ هـ (سبتمبر ١٦٥٦ ميلادي) في أحرج لحظات أزمة
      منتصف القرن السابع عشر العثمانية — حصار البندقية للدردنيل،
      وثورات الإنكشارية في إسطنبول، والإفلاس المالي، ورواية آل
      كوبريلي الشهيرة أن الشيخ ما قبل الصدارة إلا بشرط «تفويض
      مطلق» (سلطة لا تنازع) — فأعاد للدولة قدرتها بإعدامات حازمة
      للفاسدين، وكسر حصار البندقية باسترداد «تيندوس» و«ليمنوس»
      (١٠٦٧ هـ / ١٦٥٧ ميلادي)، وقمع ثورة «أبزة حسن باشا» في
      الأناضول (١٠٦٨-١٠٦٩ هـ / ١٦٥٨-١٦٥٩ ميلادي)، وأعاد السيطرة
      المركزية على ترانسلفانيا والقريم. وخلفه ابنه «فاضل أحمد
      باشا»، وابن أخيه «قره مصطفى باشا» سيحاصر فيينا فيما بعد
      سنة ١٠٩٤ هـ (١٦٨٣ ميلادي). ويعد المؤرخون العثمانيون أنه
      مدّ في عمر الدولة قرناً.
    description_fr: |
      Köprülü Meḥmed Pasha — grand vizir d'origine albanaise sous
      le sultan Meḥmed IV, fondateur de la dynastie Köprülü des
      grands vizirs qui dominerait le gouvernement ottoman un
      demi-siècle — mourut à Edirne après cinq ans à ce poste. Il
      avait environ 86 ans. Nommé en Shawwāl 1066 H (septembre
      1656 EC) au plus profond de la crise ottomane du milieu du
      XVIIe siècle — blocus vénitien des Dardanelles, révoltes
      janissaires à Istanbul, effondrement fiscal, et la légende
      des Köprülü selon laquelle le vieil homme d'État n'accepta
      la charge qu'à condition d'un *tafwīḍ muṭlaq* (autorité
      absolue et sans appel) — il rétablit la capacité étatique
      ottomane par d'impitoyables exécutions de fonctionnaires
      corrompus, brisa le blocus vénitien en reprenant Ténédos
      et Lemnos (1067 H / 1657 EC), réprima la révolte d'Abaza
      Ḥasan Pasha en Anatolie (1068-1069 H / 1658-1659 EC), et
      réaffirma le contrôle central sur la Transylvanie et la
      Crimée. Son fils Fāḍil Aḥmad Pasha lui succéda, et son
      neveu Kara Muṣṭafā Pasha assiégerait plus tard Vienne en
      1094 H (1683 EC). L'historiographie ottomane lui attribue
      d'avoir prolongé la vie de l'empire d'un siècle.
