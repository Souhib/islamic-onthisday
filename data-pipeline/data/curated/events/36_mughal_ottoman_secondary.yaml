  - slug: death-of-sher-shah-suri
    category: ruler
    title_en: Death of Sher Shāh Sūrī
    title_ar: وفاة شير شاه السوري
    title_fr: Mort de Sher Shāh Sūrī
    description_en: |
      Farīd al-Dīn Shēr Shāh Sūrī — Pashtun emperor of north India
      who interrupted the Mughal era by driving Humāyūn into exile
      (947 AH / 1540 CE) and ruling the subcontinent from Delhi for
      five years — died at Kalinjar fort in modern-day Uttar Pradesh
      from the explosion of a powder magazine during the siege of
      the Hindu fortress. He was about 73. Born in Sasaram (Bihar)
      to a Sūr Pashtun *jagirdar* family, he rose through Afghan
      service to defeat Humāyūn at Chausa (946 AH / 1539 CE) and
      Kannauj (947 AH / 1540 CE). His five-year Sūrī sultanate
      rationalised the land revenue system into a measured *zabt*
      assessment (later inherited and refined by Akbar's *dīwān*
      Todar Mal), built the imperial postal *dāk* relay, struck
      the standardised silver *rupiya* (the precursor of the modern
      rupee), and rebuilt the Grand Trunk Road from Sonargaon
      (Bengal) to Kabul with caravanserais and shade trees every
      *kos*. His mausoleum at Sasaram in the middle of an
      artificial lake is the masterpiece of Indo-Afghan architecture
      and the architectural bridge between the Lodi and Mughal
      styles. His son Islām Shāh continued the dynasty briefly;
      Humāyūn returned in 962 AH (1555 CE) to reclaim Delhi.
    description_ar: |
      توفي السلطان فريد الدين شير شاه السوري — الإمبراطور الباشتوني
      الذي قطع عهد الدولة المغولية الإسلامية بإخراجه همايون إلى
      المنفى سنة ٩٤٧ هـ (١٥٤٠ ميلادي) فحكم شبه القارة الهندية من
      دلهي خمس سنين — في حصن «كالنجار» بأوتر برديش الحديثة من انفجار
      مخزن البارود في حصاره للقلعة الهندوسية. وقد ناهز الثالثة
      والسبعين. وُلد في «ساساران» ببهار من أسرة باشتونية سورية من
      أصحاب الإقطاعات، فتدرج في الخدمة الأفغانية حتى هزم همايون في
      «جوسا» سنة ٩٤٦ هـ (١٥٣٩ ميلادي) و«كنوج» سنة ٩٤٧ هـ (١٥٤٠
      ميلادي). ورتبت سلطنته القصيرة نظام خراج الأرض في تقدير محدد
      (ضبط) ورثه أكبر بعده ونقحه ديوانه «تودر مال»، وأسس بريد الدولة
      المنقول (داك)، وضرب «الروبية» الفضية الموحدة (سلف الروبية
      الحديثة)، وأعاد بناء «الطريق العظيم» (Grand Trunk Road) من
      «سُنَرغاون» في البنغال إلى كابل مع الخانات وأشجار الظل في كل
      «كوس». وضريحه في «ساساران» وسط بحيرة صناعية هو رائعة العمارة
      الهندية-الأفغانية والجسر المعماري بين الطرازين اللوديي
      والمغولي. وخلفه ابنه إسلام شاه قليلاً ثم عاد همايون سنة ٩٦٢ هـ
      (١٥٥٥ ميلادي) ليستعيد دلهي.
    description_fr: |
      Farīd al-Dīn Sher Shāh Sūrī — empereur pachtoune du nord de
      l'Inde qui interrompit l'ère moghole en chassant Humāyūn en
      exil (947 H / 1540 EC) et gouverna le sous-continent depuis
      Delhi pendant cinq ans — mourut à la forteresse de Kalinjar,
      dans l'actuel Uttar Pradesh, de l'explosion d'une poudrière
      lors du siège de la forteresse hindoue. Il avait environ
      73 ans. Né à Sasaram (Bihar) dans une famille pachtoune
      sūrī de *jagīrdārs*, il s'éleva par le service afghan jusqu'à
      vaincre Humāyūn à Chausa (946 H / 1539 EC) et Kannauj (947 H
      / 1540 EC). Son sultanat sūrī de cinq ans rationalisa le
      système des revenus fonciers en une évaluation *zabt* mesurée
      (héritée et raffinée plus tard par le *dīwān* d'Akbar Todar
      Mal), bâtit le service postal impérial à relais (*dāk*),
      frappa la *rupiya* d'argent normalisée (précurseur de la
      roupie moderne), et reconstruisit la Grand Trunk Road de
      Sonargaon (Bengale) à Kaboul avec des caravansérails et des
      arbres d'ombrage à chaque *kos*. Son mausolée à Sasaram, au
      milieu d'un lac artificiel, est le chef-d'œuvre de
      l'architecture indo-afghane et le pont architectural entre
      les styles lodī et moghol. Son fils Islām Shāh continua
      brièvement la dynastie; Humāyūn revint en 962 H (1555 EC)
      reconquérir Delhi.
