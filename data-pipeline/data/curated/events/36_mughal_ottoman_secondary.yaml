  - slug: death-of-selim-ii
    category: ruler
    title_en: Death of Sultan Selīm II
    title_ar: وفاة السلطان سليم الثاني
    title_fr: Mort du sultan Selīm II
    description_en: |
      Selīm II ibn Süleymān al-Qānūnī — eleventh Ottoman sultan
      and son of Süleymān the Magnificent and Ḥurrem Sultan, the
      first sultan of the Ottoman dynasty to leave the personal
      command of campaigns to his grand vizier — died at the Topkapı
      palace in Istanbul at age 50 from a fall on the marble floor
      of the *ḥarem* hammam. His eight-year reign (974-982 AH /
      1566-1574 CE) was administratively dominated by the grand
      vizier Sokollu Meḥmed Pasha, who managed the empire with
      virtual sovereignty: Cyprus was annexed from Venice (978-979
      AH / 1570-1571 CE), Tunis was taken from the Spanish (981 AH
      / 1574 CE), and the Ottoman fleet was destroyed at Lepanto
      by the Holy League (979 AH / 1571 CE) only to be rebuilt
      within a single shipbuilding season. Selīm patronised the
      architect Sinān, whose Selīmīye mosque at Edirne — the
      culminating work of classical Ottoman architecture, completed
      in 982 AH (1574 CE) — was commissioned during his reign.
      He was succeeded by his son Murād III.
    description_ar: |
      توفي السلطان سليم الثاني بن سليمان القانوني — حادي عشر
      سلاطين الدولة العثمانية وابن سليمان القانوني وحرّم سلطان،
      وأول سلاطين بني عثمان في توكيل قيادة الحملات إلى صدره
      الأعظم — في قصر «طوبقابي» بإسطنبول عن خمسين سنة من سقطة على
      رخام حمام الحرم. وكان عهده الذي امتد ثماني سنين (٩٧٤-٩٨٢ هـ
      / ١٥٦٦-١٥٧٤ ميلادي) إدارياً بقيادة الصدر الأعظم «صوقللي
      محمد باشا» الذي ساس الدولة بسلطان شبه مطلق: ضمت قبرص من
      البندقية (٩٧٨-٩٧٩ هـ / ١٥٧٠-١٥٧١ ميلادي)، وفُتحت تونس من
      الإسبان (٩٨١ هـ / ١٥٧٤ ميلادي)، ودمر الأسطول العثماني في
      «ليبانتو» على يد التحالف المقدس (٩٧٩ هـ / ١٥٧١ ميلادي) ثم
      أعيد بناؤه في موسم بناء سفن واحد. ورعى سليم المعمار «سنان»،
      وكلفت في عهده بناية «جامع السليمية» في أدرنة — ذروة العمارة
      العثمانية الكلاسيكية، اكتملت سنة ٩٨٢ هـ (١٥٧٤ ميلادي).
      وخلفه ابنه مراد الثالث.
    description_fr: |
      Selīm II ibn Süleymān al-Qānūnī — onzième sultan ottoman
      et fils de Süleymān le Magnifique et de Ḥurrem Sultan,
      premier sultan de la dynastie ottomane à laisser le
      commandement personnel des campagnes à son grand vizir —
      mourut au palais de Topkapı à Istanbul à 50 ans d'une chute
      sur le marbre du hammam du *ḥarem*. Son règne de huit ans
      (974-982 H / 1566-1574 EC) fut administrativement dominé
      par le grand vizir Sokollu Meḥmed Pasha, qui dirigea
      l'empire avec une souveraineté virtuelle : Chypre fut
      annexée à Venise (978-979 H / 1570-1571 EC), Tunis fut
      prise aux Espagnols (981 H / 1574 EC), et la flotte
      ottomane fut détruite à Lépante par la Sainte Ligue (979 H
      / 1571 EC) avant d'être reconstruite en une seule saison
      de chantier naval. Selīm fit construire par l'architecte
      Sinān la mosquée Selīmīye d'Edirne — œuvre culminante de
      l'architecture ottomane classique, achevée en 982 H (1574
      EC) — commandée sous son règne. Son fils Murād III lui
      succéda.
