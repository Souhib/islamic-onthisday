  - slug: death-of-sokollu-mehmed-pasha
    category: ruler
    title_en: Death of Sokollu Meḥmed Pasha
    title_ar: وفاة صوقللي محمد باشا
    title_fr: Mort de Sokollu Meḥmed Pasha
    description_en: |
      Sokollu Meḥmed Pasha — Ottoman grand vizier of Bosnian Serb
      origin, recruited as a child through the *devşirme* system
      from Sokolovići (modern-day Bosnia and Herzegovina), and
      grand vizier under three sultans (Süleymān al-Qānūnī, Selīm
      II, and Murād III) for fourteen years and three months,
      the longest single tenure in Ottoman history — was assassinated
      at the Imperial Council (*Dīvān-i Hümāyūn*) in Istanbul by a
      dagger-wielding dervish petitioner. He was about 73. From his
      first appointment in 972 AH (1565 CE) until his death he was
      the de facto manager of the empire, conducting the Cyprus
      campaign (978 AH / 1570 CE), rebuilding the Ottoman fleet
      after Lepanto in a single winter, taking Tunis from the
      Spanish (981 AH / 1574 CE), and integrating Yemen and the
      Hejaz under direct administration. His patronage of the
      architect Sinān produced a series of complexes including
      the Sokollu Meḥmed Pasha mosques at Kadırga (Istanbul), Lüleburgaz,
      and the bridge at Drina at Višegrad in his Bosnian homeland —
      the bridge that would later inspire Ivo Andrić's Nobel-prize
      novel. He represents the Ottoman peak of *devşirme*-class
      governance.
    description_ar: |
      اغتيل الصدر الأعظم صوقللي محمد باشا — صدر الدولة العثمانية
      من أصول صربية بوسنية، التحق وهو طفل بنظام «الدفشيرمة» من
      «صوقولوفيتشي» (في البوسنة والهرسك الحديثة)، والصدر الأعظم
      تحت ثلاثة سلاطين (سليمان القانوني وسليم الثاني ومراد الثالث)
      أربع عشرة سنة وثلاثة أشهر، أطول صدارة عظمى في تاريخ بني
      عثمان — في مجلس الديوان الهمايوني بإسطنبول على يد درويش
      رافع رقعة طاعن بخنجر. وقد ناهز الثالثة والسبعين. ومن تعيينه
      أول مرة سنة ٩٧٢ هـ (١٥٦٥ ميلادي) إلى وفاته كان مدير الدولة
      الفعلي، فقاد حملة قبرص (٩٧٨ هـ / ١٥٧٠ ميلادي)، وأعاد بناء
      الأسطول بعد «ليبانتو» في شتاء واحد، وفتح تونس من الإسبان
      (٩٨١ هـ / ١٥٧٤ ميلادي)، وأدمج اليمن والحجاز في الإدارة
      المباشرة. ورعايته للمعمار «سنان» أنتجت سلسلة من المجمعات
      منها جامع صوقللي محمد باشا في «قاضي رغة» بإسطنبول و«لُوله
      برغاز» وجسر «درينا» في «فيشيغراد» بمسقط رأسه البوسني — الجسر
      الذي ألهم فيما بعد رواية «إيفو أندريتش» الحائزة على جائزة
      نوبل. وهو يمثل ذروة الإدارة الدفشيرمية في الدولة العثمانية.
    description_fr: |
      Sokollu Meḥmed Pasha — grand vizir ottoman d'origine serbo-
      bosniaque, recruté enfant par le système *devşirme* depuis
      Sokolovići (Bosnie-Herzégovine actuelle), et grand vizir
      sous trois sultans (Süleymān al-Qānūnī, Selīm II et Murād
      III) pendant quatorze ans et trois mois, la plus longue
      durée à ce poste dans l'histoire ottomane — fut assassiné
      au Conseil impérial (*Dīvān-i Hümāyūn*) à Istanbul par un
      derviche pétitionnaire armé d'un poignard. Il avait environ
      73 ans. Depuis sa première nomination en 972 H (1565 EC)
      jusqu'à sa mort, il fut le gestionnaire de fait de l'empire,
      menant la campagne de Chypre (978 H / 1570 EC), reconstruisant
      la flotte ottomane après Lépante en un seul hiver, prenant
      Tunis aux Espagnols (981 H / 1574 EC), et intégrant le Yémen
      et le Hijaz à l'administration directe. Son mécénat de
      l'architecte Sinān produisit une série de complexes dont les
      mosquées Sokollu Meḥmed Pasha à Kadırga (Istanbul) et
      Lüleburgaz, et le pont sur la Drina à Višegrad, dans sa
      Bosnie natale — pont qui inspirerait plus tard le roman
      d'Ivo Andrić, prix Nobel. Il représente l'apogée de la
      gouvernance ottomane par la classe *devşirme*.
