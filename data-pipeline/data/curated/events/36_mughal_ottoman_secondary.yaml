  - slug: death-of-abd-al-rahim-khan-i-khanan
    category: scholar
    title_en: Death of ʿAbd al-Raḥīm Khān-i-Khānān
    title_ar: وفاة عبد الرحيم خان خانان
    title_fr: Mort de ʿAbd al-Raḥīm Khān-i-Khānān
    description_en: |
      Khānzāda Mīrzā Khān ʿAbd al-Raḥīm — son of Akbar's regent
      Bayrām Khān, one of the *Navaratna* (nine gems) of Akbar's
      court, *khān-i-khānān* (commander-in-chief) under Akbar and
      Jahāngīr, and the great trilingual poet of the Mughal court
      who composed in Persian, Hindi, and Sanskrit — died in Delhi
      and was buried in his own tomb on Mathura Road near the
      mausoleum of Humāyūn. He was about 70. Militarily he
      conquered Gujarat for Akbar, suppressed the Khandesh and
      Deccan campaigns, and led the Sindh expedition. As a man of
      letters he translated his grand-uncle Bābur's Chagatai
      *Bāburnāma* into Persian — the standard text by which Mughal
      historiography accessed its founder's memoir — and composed
      the *Rahīm dohe*, Hindi couplets that entered the Indian
      vernacular canon and remain a staple of school literature.
      His patronage of Hindi poets including the blind devotee
      Sūrdās is part of the Mughal cultural confluence under
      Akbar-Jahāngīr.
    description_ar: |
      توفي خانزاده ميرزا خان عبد الرحيم — ابن وصي أكبر «بيرام
      خان»، وأحد «النَّوارَتنا» (الجواهر التسعة) في بلاط أكبر،
      «خان الخانان» (قائد القواد) تحت أكبر وجهانكير، والشاعر
      المغولي المتقن ثلاث لغات (الفارسية والهندية والسنسكريتية) —
      بدلهي ودفن في مقبرة من بنائه على «طريق ماثورا» قرب ضريح
      همايون. وقد ناهز السبعين. غزا في عسكره ولاية غجرات لأكبر،
      وأخمد حملات «خاندِش» والديكان، وقاد بعثة السند. وكتاباً
      ترجم مذكرات جده الكبير بابر الجاغطائية «بابرنامه» إلى
      الفارسية — النص المعتمد الذي قرأت به التواريخ المغولية
      مذكرات مؤسس دولتهم — ونظم «دوهات رحيم» وهي أبيات هندية
      ثنائية دخلت في الذاكرة الهندية الشعبية وما زالت من ركائز
      أدب المدارس. ومن جوانب تلاقح الثقافات في عصري أكبر-جهانكير
      رعايته للشعراء الهنود ومنهم الضرير «سُور داس».
    description_fr: |
      Khānzāda Mīrzā Khān ʿAbd al-Raḥīm — fils du régent d'Akbar
      Bayrām Khān, l'un des *Navaratna* (neuf gemmes) de la cour
      d'Akbar, *khān-i-khānān* (commandant en chef) sous Akbar et
      Jahāngīr, et le grand poète trilingue de la cour moghole
      qui composa en persan, en hindi et en sanskrit — mourut à
      Delhi et fut inhumé dans son propre mausolée sur Mathura
      Road, près du tombeau de Humāyūn. Il avait environ 70 ans.
      Militairement, il conquit le Gujarat pour Akbar, réprima
      les campagnes du Khandesh et du Deccan, et mena l'expédition
      du Sindh. Comme homme de lettres, il traduisit le *Bāburnāma*
      en chagatai de son grand-oncle Bābur en persan — le texte
      standard par lequel l'historiographie moghole accédait aux
      mémoires de son fondateur — et composa les *Rahīm dohe*,
      distiques hindis entrés dans le canon vernaculaire indien
      et qui restent un classique de la littérature scolaire. Son
      mécénat des poètes hindis, dont le dévot aveugle Sūrdās,
      illustre la confluence culturelle moghole sous Akbar-Jahāngīr.
