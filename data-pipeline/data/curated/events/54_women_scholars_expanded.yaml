  - slug: death-of-shuhda-al-katiba
    category: scholar_death
    title_en: Death of Shuhda al-Kātiba — Fakhr al-Nisāʾ of Baghdad
    title_ar: وفاة شهدة الكاتبة — فخر النساء ببغداد
    title_fr: Mort de Shuhda al-Kātiba — Fakhr al-Nisāʾ de Bagdad
    description_en: |
      Shuhda bint Abī Naṣr Aḥmad ibn al-Faraj al-Ibrī al-Dīnawarī,
      known as al-Kātiba ("the calligrapher") and styled Fakhr
      al-Nisāʾ ("Pride of Women") — Baghdadi muḥadditha and
      master of the Arabic scribal hand whose audience-sessions
      under the great qubba of the Niẓāmiyya quarter were attended
      by ḥadīth students from across the eastern Islamic lands —
      died at Baghdad in Muḥarram 574 AH (June 1178 CE), having
      lived close to a hundred lunar years. Married to the
      ʿAbbāsid notable Thiqat al-Dawla Abū al-Ḥasan ibn al-
      Anbārī, she received a long ijāza-chain from her father and
      from the leading Baghdadi traditionists of the late fifth
      century, becoming one of the principal women through whom
      the late ʿAbbāsid generation transmitted classical ḥadīth.
      Ibn Khallikān fixes her death year and place; al-Dhahabī
      notices her in the *Siyar* with the wafayāt of 574.
    description_ar: |
      توفيت شهدةُ بنت أبي نصر أحمد بن الفرج الإبريِّ الدِّينَوريِّ،
      المعروفة بالكاتبة، الملقَّبة بفخر النساء — محدِّثةُ بغداد
      وإمامةُ الخطِّ العربيِّ التي كان مجلسُ سماعها تحت قُبَّة
      المدرسة النظامية يقصده طلَّابُ الحديث من المشرق الإسلاميِّ
      كلِّه — ببغداد في محرَّم سنة أربع وسبعين وخمسمئة للهجرة
      (الموافق يونيو ١١٧٨ م)، وقد قاربت المئة من عمرها. تزوَّجت
      بثقة الدولة أبي الحسن بن الأنباريِّ من أعيان الدولة
      العباسية، وتلقَّت إجازاتٍ طويلة الإسناد عن أبيها وعن
      كبار محدِّثي بغداد في أواخر القرن الخامس، فصارت من أهم
      النساء اللواتي حمل الجيلُ المتأخِّر في العصر العباسي عن
      طريقهنَّ روايةَ الحديث الكلاسيكية. أثبت ابن خلكان وفاتَها
      سنةً ومكاناً؛ وذكرها الذهبيُّ في «السير» في وفيات ٥٧٤ هـ.
    description_fr: |
      Shuhda bint Abī Naṣr Aḥmad ibn al-Faraj al-Ibrī al-Dīnawarī,
      dite al-Kātiba (« la calligraphe ») et titrée Fakhr al-
      Nisāʾ (« Fierté des femmes ») — muḥadditha bagdadienne et
      maître de l'écriture arabe dont les séances d'audition
      sous la grande coupole du quartier niẓāmite étaient
      fréquentées par des étudiants en hadith venus de tout
      l'Orient islamique — mourut à Bagdad en muḥarram 574 H
      (juin 1178 EC), ayant vécu près de cent années lunaires.
      Mariée au notable ʿabbāside Thiqat al-Dawla Abū al-Ḥasan
      ibn al-Anbārī, elle reçut une longue chaîne d'ijāzas de
      son père et des principaux traditionnistes bagdadiens de
      la fin du Ve siècle, devenant l'une des principales femmes
      par qui la génération ʿabbāside tardive transmit le hadith
      classique. Ibn Khallikān fixe son année et son lieu de
      décès ; al-Dhahabī la mentionne dans les *Siyar* parmi
      les wafayāt de 574.
    canonical_hijri: {year: 574, precision: year}
    canonical_gregorian: {date: 1178-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated Muḥarram 574 AH at Baghdad; Fakhr al-Nisāʾ titled, master calligrapher and muḥadditha."
      - source_key: dhahabi_siyar
        notes: "Notice in the Siyar among wafayāt of 574 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Year 574 AH wafayāt notice in the Bidāya."
    people: [[shuhda-al-katiba, died]]
    tags: [abbasid, seljuk, scholar, muhadditha, calligraphy, baghdad, women-scholars]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-zaynab-al-shariyya
    category: scholar_death
    title_en: Death of Zaynab al-Shaʿriyya — Muḥadditha of Nishapur
    title_ar: وفاة زينب الشعرية — محدِّثةُ نيسابور
    title_fr: Mort de Zaynab al-Shaʿriyya — muḥadditha de Nishapur
    description_en: |
      Zaynab bint ʿAbd al-Raḥmān ibn al-Ḥasan al-Shaʿrī al-
      Naysabūriyya — muḥadditha of late-Saljūq Nishapur whose
      ijāza was sought by traveling ḥadīth students passing
      through Khurāsān on their way to or from Baghdad and
      Mecca — died in 615 AH (1218 CE) on the eve of the Mongol
      catastrophe that would destroy her city. She heard from
      ʿAbd al-Ghāfir al-Fārisī and the late-fifth-century
      Naysabūrī chains, and her notebooks preserved high-isnād
      copies of works that vanished a generation later. Al-
      Dhahabī notices her in the *Siyar* among wafayāt of 615
      and praises her uprightness and the breadth of her
      audition-record.
    description_ar: |
      توفيت زينبُ بنت عبد الرحمن بن الحسن الشعريِّ النيسابوريَّةُ
      — محدِّثةُ نيسابور في أواخر العصر السلجوقيِّ، التي كان
      الرحَّالةُ من طلَّاب الحديث يقصدون إجازتها وهم في طريقهم
      إلى بغداد ومكة أو منهما — سنة خمس عشرة وستمئة للهجرة
      (الموافق ١٢١٨ م)، وذلك على عتبة النكبة المغولية التي
      دمَّرت مدينتها. سمعت من عبد الغافر الفارسيِّ ومن أسانيد
      نيسابور في أواخر القرن الخامس، وحفظت كرَّاساتها نسخاً
      عاليةَ الإسناد لكتبٍ ضاعت بعدها بجيل. ذكرها الذهبيُّ في
      «السير» في وفيات ٦١٥ هـ وأثنى على صلاحها وسعة سماعها.
    description_fr: |
      Zaynab bint ʿAbd al-Raḥmān ibn al-Ḥasan al-Shaʿrī al-
      Naysabūriyya — muḥadditha de la Nishapur saljūqide
      tardive dont l'ijāza était recherchée par les étudiants
      itinérants en hadith passant par le Khurāsān en route
      vers Bagdad et La Mecque ou en revenant — mourut en 615 H
      (1218 EC), à la veille de la catastrophe mongole qui
      détruirait sa ville. Elle entendit ʿAbd al-Ghāfir al-Fārisī
      et les chaînes nishapuriennes de la fin du Ve siècle, et
      ses cahiers conservaient des copies à isnād élevé d'œuvres
      qui disparurent une génération plus tard. Al-Dhahabī la
      mentionne dans les *Siyar* parmi les wafayāt de 615 et
      loue sa droiture et l'ampleur de son répertoire
      d'auditions.
    canonical_hijri: {year: 615, precision: year}
