    verified: true
    verification_status: single_source

  - slug: death-of-umm-hani-al-abdari
    category: scholar_death
    title_en: Death of Umm Hāniʾ al-ʿAbdarī — Egyptian Muḥadditha and Poet
    title_ar: وفاة أم هانئ مريم العبدريّة — محدِّثة مصر وشاعرتها
    title_fr: Mort d'Umm Hāniʾ al-ʿAbdarī — muḥadditha et poétesse d'Égypte
    description_en: |
      Umm Hāniʾ Maryam bint Muḥammad ibn ʿAbd al-Raḥmān al-
      Hūrīnī al-ʿAbdariyya al-Miṣriyya — Cairene muḥadditha
      and poet of late-Mamlūk Egypt who studied with the
      leading Cairene shaykhs of her generation including the
      polymath Jalāl al-Dīn al-Suyūṭī and the historian al-
      Sakhāwī, and who composed devotional verse in praise of
      the Prophet ﷺ — died at Cairo in 871 AH (1466 CE) at
      about the age of seventy. She was one of the women whom
      al-Sakhāwī notices in *al-Ḍawʾ al-Lāmiʿ* with detailed
      audition-records, and her ijāza-chains pass through to
      the early-Ottoman generation of Egyptian ḥadīth scholars.
      Ibn al-ʿImād in *Shadharāt al-Dhahab* gives the year of
      death; al-Sakhāwī's biographical entry is the principal
      classical source for her training and works.
    description_ar: |
      توفيت أمُّ هانئ مريمُ بنت محمد بن عبد الرحمن الهوريني
      العبدريَّةُ المصريَّةُ — محدِّثةُ القاهرة وشاعرتها في
      أواخر العصر المملوكي، التي تتلمذت على كبار شيوخ القاهرة
      في جيلها ومنهم العلَّامةُ جلال الدين السيوطيُّ والمؤرِّخُ
      السخاويُّ، ونظمت في مديح النبيِّ ﷺ — بالقاهرة سنة إحدى
      وسبعين وثمانمئة للهجرة (الموافق ١٤٦٦ م) عن نحو سبعين
      سنة. وهي من النساء اللواتي ذكرهنَّ السخاويُّ في «الضوء
      اللامع» بإسناد مفصَّل للسماع، ومرَّت أسانيدها إلى جيل
      محدِّثي مصر في أوائل العصر العثماني. ضبط ابن العماد
      في «شذرات الذهب» سنةَ وفاتها؛ وترجمتُها عند السخاويِّ
      هي أوسع المصادر الكلاسيكية لتكوينها وآثارها.
    description_fr: |
      Umm Hāniʾ Maryam bint Muḥammad ibn ʿAbd al-Raḥmān al-
      Hūrīnī al-ʿAbdariyya al-Miṣriyya — muḥadditha cairote
      et poétesse de l'Égypte mamlūke tardive qui étudia
      auprès des principaux shaykhs cairotes de sa génération,
      dont le polymathe Jalāl al-Dīn al-Suyūṭī et l'historien
      al-Sakhāwī, et composa des poèmes de louange du Prophète
      ﷺ — mourut au Caire en 871 H (1466 EC), âgée d'environ
      soixante-dix ans. Elle figure parmi les femmes
      qu'al-Sakhāwī mentionne dans *al-Ḍawʾ al-Lāmiʿ* avec
      des registres d'audition détaillés, et ses chaînes
      d'ijāza se prolongent jusqu'à la génération des
      traditionnistes égyptiens du début de l'époque
      ottomane. Ibn al-ʿImād dans les *Shadharāt al-Dhahab*
      donne l'année du décès ; la notice biographique
      d'al-Sakhāwī est la source classique principale pour
      sa formation et ses œuvres.
