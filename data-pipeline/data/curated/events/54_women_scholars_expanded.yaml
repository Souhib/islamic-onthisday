  - slug: death-of-bayi-khanum
    category: scholar_death
    title_en: Death of Bāyī Khānum — Mughal Scholar of Akbar's Court
    title_ar: وفاة بايي خانم — عالمةُ بلاط أكبر المغولي
    title_fr: Mort de Bāyī Khānum — savante mughale de la cour d'Akbar
    description_en: |
      Bāyī Khānum — Mughal scholar of Akbar's mature reign,
      member of the learned women's circle around Salīma Sulṭān
      Begam and Gulbadan Begam, and author of poetry and
      occasional prose in Persian — died c. 982 AH (1574 CE).
      Trained in Persian literature, theology, and the
      household scholarship that the Tīmūrid-Mughal women
      sustained from Bābur onward, she was among the women
      whose libraries circulated within the *ḥaram-i shāhī* and
      whose ijāzas in Qurʾān-recitation were sought by the
      pupils of the Khānzāda begams. Notice of her year of
      death is preserved in the Mughal ṭabaqāt tradition (Abū
      al-Faḍl's *Akbarnāma* / *Āʾīn-i Akbarī*) and in later
      South-Asian biographical compendia. The classical
      sources do not record a specific day or month, so we
      retain year-precision only.
    description_ar: |
      توفيت بايي خانم — عالمةُ البلاط المغولي في عهد أكبر
      الناضج، ومن جماعة النساء العلميَّات المحيطات بسليمة
      سلطان بيغم وجلبدن بيغم، ولها شعرٌ ونثرٌ بالفارسية —
      نحو سنة اثنتين وثمانين وتسعمئة للهجرة (الموافق ١٥٧٤ م).
      نشأت على الأدب الفارسي وعلم الكلام، وكانت من حملة
      التقليد العلمي الذي حفظته نساءُ البيت التيموريِّ-المغوليِّ
      منذ بابر، وكانت كتب مكتبتها تتداولها سيِّدات «الحرم
      الشاهي»، وكان طالباتُ الخانزاده بيغمات يقصدنها لإجازة
      تلاوة القرآن. حُفظ ذكرُ سنة وفاتها في تقليد طبقات
      المغول (أبو الفضل في «أكبرنامه» و«آيين أكبري») وفي
      كتب التراجم الهندية المتأخِّرة. لا تذكر المصادر
      الكلاسيكية يوماً ولا شهراً، فنلتزم بدقة السنة.
    description_fr: |
      Bāyī Khānum — savante mughale du règne mûr d'Akbar,
      membre du cercle des femmes lettrées autour de Salīma
      Sulṭān Begam et de Gulbadan Begam, et auteur de poésie
      et de prose occasionnelle en persan — mourut vers 982 H
      (1574 EC). Formée à la littérature persane, à la
      théologie et à l'érudition domestique que les femmes
      tīmūrides-mughales perpétuèrent depuis Bābur, elle figura
      parmi les femmes dont les bibliothèques circulaient dans
      le *ḥaram-i shāhī* et dont les ijāzas de récitation
      coranique étaient sollicitées par les disciples des
      Khānzāda begams. La mention de son année de décès est
      conservée dans la tradition des ṭabaqāt mughales
      (l'*Akbarnāma* / *Āʾīn-i Akbarī* d'Abū al-Faḍl) et dans
      les recueils biographiques sud-asiatiques postérieurs.
      Les sources classiques ne consignent ni jour ni mois,
      d'où la précision à l'année.
