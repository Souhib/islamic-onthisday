  - slug: death-of-maryam-al-adhurbayjaniyya
    category: scholar_death
    title_en: Death of Maryam al-Ādhurbayjānī — Late-Mamlūk Female Jurist
    title_ar: وفاة مريم بنت عبد القادر الأذربيجانية — فقيهةُ أواخر العصر المملوكي
    title_fr: Mort de Maryam al-Ādhurbayjānī — juriste de la fin de l'ère mamlūke
    description_en: |
      Maryam bint ʿAbd al-Qādir al-Ādhurbayjānī — late-Mamlūk
      female jurist of Ādharbayjānī origin who settled in the
      central Islamic lands and became one of the women cited
      in the biographical record of the ninth Islamic century
      for her command of fiqh and ḥadīth — died c. 870 AH
      (1466 CE). Notices of her are preserved in Ibn al-ʿImād's
      *Shadharāt al-Dhahab* among the wafayāt of the late ninth
      century AH, where her competence in legal questions and
      her transmission-record are mentioned. Year-only precision
      is retained because the classical sources do not record a
      specific day or month.
    description_ar: |
      توفيت مريمُ بنت عبد القادر الأذربيجانيَّةُ — فقيهةُ
      أواخر العصر المملوكي من أصلٍ أذربيجانيٍّ استقرَّت في
      الأمصار الإسلامية المركزية، وممَّن ذُكر في تراجم القرن
      التاسع الهجري لإتقانها الفقهَ والحديث — نحو سنة سبعين
      وثمانمئة للهجرة (الموافق ١٤٦٦ م). وحفظت ترجمتُها في
      «شذرات الذهب» لابن العماد ضمن وفيات أواخر القرن التاسع،
      حيث ذُكر تمكُّنها في المسائل الفقهية وأسانيد روايتها.
      نلتزم بدقة السنة لأن المصادر الكلاسيكية لا تذكر يوماً
      ولا شهراً.
    description_fr: |
      Maryam bint ʿAbd al-Qādir al-Ādhurbayjānī — juriste de
      la fin de l'époque mamlūke d'origine ādharbayjānie,
      installée dans les terres islamiques centrales, et l'une
      des femmes citées dans le registre biographique du IXe
      siècle de l'Hégire pour sa maîtrise du fiqh et du hadith
      — mourut vers 870 H (1466 EC). Ses notices sont conservées
      dans les *Shadharāt al-Dhahab* d'Ibn al-ʿImād parmi les
      wafayāt de la fin du IXe siècle, où sont mentionnés ses
      compétences juridiques et son répertoire de transmission.
      La précision à l'année est retenue, les sources classiques
      ne consignant ni jour ni mois.
    canonical_hijri: {year: 870, precision: year}
    canonical_gregorian: {date: 1466-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
        notes: "Wafayāt notice c. 870 AH; female jurist of Ādharbayjānī origin in the central lands."
    people: [[maryam-al-adhurbayjaniyya, died]]
    tags: [mamluk, scholar, jurist, women-scholars, faqiha]
