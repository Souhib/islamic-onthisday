# Wave 54 of curated event additions (2026-04-27).
# Notable Muslim women scholars beyond the Mothers of the Believers and
# beyond the sahabiyat (already covered in waves 7 and 29). This file
# fills out the post-Companion line of female muḥadditha, faqīhāt,
# calligraphers, and ʿālimāt across the central Islamic lands and the
# wider Muslim world: from Sutayta al-Maḥāmilī (mathematician of late
# 4th-AH-century Baghdad) and Asmāʾ bint Asad ibn al-Furāt of Mālikī
# Qayrawān, through the great trans-regional muḥadditha of the 5th–7th
# AH centuries — Karīma al-Marwaziyya of Mecca (whose recension of
# Bukhārī's *Ṣaḥīḥ* dominates later transmission), Shuhda al-Kātiba of
# Baghdad, Zaynab al-Shaʿriyya of Nishapur, Zaynab bint Makkī of
# Damascus (Ibn Taymiyya's teacher), Maryam al-Ṣāliḥiyya of Mt Qāsiyūn,
# Sittī al-Wuzarāʾ al-Tanūkhiyya — to the late-Mamluk Maryam al-
# Ādhurbayjāniyya, the Egyptian Umm Hāniʾ al-ʿAbdarī, and the Mughal
# scholar-poet Bāyī Khānum of Akbar's circle. Cross-verification leans
# on Ibn Khallikān (where the figure predates 681 AH), al-Dhahabī's
# Siyar / Tārīkh al-Islām, Ibn Kathīr's Bidāya, and Ibn Ḥajar's *Durar
# al-Kāmina* (the principal classical biographical dictionary of the
# 8th AH century, where many of these women's notices survive).
# Ibn al-ʿImād's *Shadharāt al-Dhahab* fills the late-Mamluk gap.
# Trilingual en/ar/fr throughout. No hadith refs (no specific
# narration anchors a biographical death-notice). Date precision
# strictly year-only unless a classical source attests the day.

events:
  # =========================================================================
  # 4th–5th CENTURY AH — EARLY POST-COMPANION FEMALE LEARNING
  # =========================================================================

  - slug: death-of-sutayta-al-mahamili
    category: scholar_death
    title_en: Death of Sutayta al-Maḥāmilī — Jurist and Mathematician of Baghdad
    title_ar: وفاة ستيتة بنت المحاملي — فقيهةُ بغداد ومحسوبةُ الفرائض
    title_fr: Mort de Sutayta al-Maḥāmilī — juriste et mathématicienne de Bagdad
    description_en: |
      Sutayta bint al-Ḥusayn ibn Ismāʿīl al-Maḥāmilī al-Baghdādiyya
      — daughter of the prominent Shāfiʿī judge and ḥadīth scholar
      Abū ʿAbd Allāh al-Maḥāmilī (d. 330 AH) and remembered as one
      of the most learned women of late ʿAbbāsid Baghdad — died in
      377 AH (987 CE). Trained by her father and by leading
      Baghdadi traditionists, she mastered Shāfiʿī fiqh, the
      arithmetic of the Islamic inheritance shares (*ʿilm al-
      farāʾiḍ*) and Arabic literature; al-Khaṭīb al-Baghdādī
      preserves the report that Baghdadi notables consulted her
      on inheritance computations and that she contributed novel
      solutions to standard problems. Al-Dhahabī notices her in
      the *Siyar* among the wafayāt of 377 and praises her piety
      and intellect; we follow his year as the standard report.
    description_ar: |
      توفيت ستيتة بنت الحسين بن إسماعيل المحامليِّ البغداديةِ
      — ابنةُ القاضي الشافعيِّ المحدِّث أبي عبد الله المحامليِّ
      المتوفى سنة ٣٣٠ هـ، ومن أعلم نساء أواخر العصر العباسي
      ببغداد — سنة سبع وسبعين وثلاثمئة للهجرة (الموافق ٩٨٧ م).
      تتلمذت على أبيها وعلى كبار محدِّثي بغداد، فأتقنت الفقه
      الشافعيَّ وحساب الفرائض والأدبَ العربيَّ. وقد حفظ الخطيبُ
      البغداديُّ في «تاريخ بغداد» أنَّ أعيان أهل العاصمة كانوا
      يستفتونها في المسائل الحسابية للمواريث، وأنَّها أتت في
      الفرائض بحلولٍ جديدة على مشكلاتها المعهودة. ذكرها الذهبيُّ
      في «السير» ضمن وفيات سنة ٣٧٧ وأثنى على ديانتها وعلمها؛
      ونحن نتبع سنته بوصفها الرواية المعتمدة.
    description_fr: |
      Sutayta bint al-Ḥusayn ibn Ismāʿīl al-Maḥāmilī al-Baghdādiyya
      — fille du juge shāfiʿite et traditionniste Abū ʿAbd Allāh
      al-Maḥāmilī (m. 330 H) et tenue pour l'une des femmes les
      plus savantes du Bagdad ʿabbāside tardif — mourut en 377 H
      (987 EC). Formée par son père et par les principaux
      traditionnistes bagdadiens, elle maîtrisait le fiqh shāfiʿite,
      l'arithmétique des parts coraniques d'héritage (*ʿilm al-
      farāʾiḍ*) et la littérature arabe ; al-Khaṭīb al-Baghdādī
      rapporte que les notables de la capitale la consultaient
      sur les calculs successoraux et qu'elle apporta des solutions
      nouvelles à des problèmes standard. Al-Dhahabī la mentionne
      dans les *Siyar* parmi les wafayāt de 377 et loue sa piété
      et son intellect ; nous retenons son année comme rapport
      standard.
    canonical_hijri: {year: 377, precision: year}
    canonical_gregorian: {date: 987-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Wafayāt notice for 377 AH; daughter of al-Maḥāmilī, expert in fiqh and farāʾiḍ."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 377 AH wafayāt entry confirming her death."
      - source_key: editorial
        notes: "al-Khaṭīb al-Baghdādī, Tārīkh Baghdād, preserves the report on her farāʾiḍ expertise."
    people: [[sutayta-al-mahamili, died]]
    tags: [abbasid, scholar, jurist, mathematician, baghdad, fiqh, women-scholars, shafii]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-asma-bint-asad-ibn-al-furat
    category: scholar_death
    title_en: Death of Asmāʾ bint Asad ibn al-Furāt — Jurist of Mālikī Qayrawān
    title_ar: وفاة أسماء بنت أسد بن الفرات — فقيهةُ القيروان المالكية
    title_fr: Mort d'Asmāʾ bint Asad ibn al-Furāt — juriste de Qayrawān malikite
    description_en: |
      Asmāʾ bint Asad ibn al-Furāt — daughter of the conqueror of
      Sicily Asad ibn al-Furāt (d. 213 AH), the Aghlabid qāḍī and
      pupil of Mālik ibn Anas whose *Asadiyya* lies behind Saḥnūn's
      *Mudawwana* — died in Qayrawān in the mid-third Islamic
      century. Raised in the household of one of Mālikī fiqh's
      formative authorities, she transmitted from her father and
      was sought out by Qayrawānī women for instruction in fiqh
      and adab. Qāḍī ʿIyāḍ in *Tartīb al-Madārik* and the
      Mālikī biographical tradition preserve her notice as one
      of the early female bearers of the Mālikī school in
      Ifrīqiya; precise death year is not recorded in the
      classical sources, so we anchor at c. 250 AH (864 CE) and
      retain year-precision only.
    description_ar: |
      توفيت أسماءُ بنت أسد بن الفرات — ابنةُ فاتح صقلِّيَّةَ
      أسدِ بن الفرات المتوفى سنة ٢١٣ هـ، قاضي الأغالبة وتلميذ
      مالك بن أنس الذي تقوم «الأسديَّةُ» منه خلف «المدوَّنة»
      السحنونيَّة — بالقيروان في منتصف القرن الثالث الهجري.
      نشأت في بيت أحد مؤسِّسي الفقه المالكيِّ، فحدَّثت عن أبيها،
      وقصدتها نساءُ القيروان لتعلُّم الفقه والأدب. حفظ القاضي
      عياض في «ترتيب المدارك» والتراجمُ المالكية ترجمتها بوصفها
      من أوائل نساء حملة المذهب المالكيِّ بإفريقية. لم تثبت في
      المصادر الكلاسيكية سنةُ وفاتها بدقّة، فنرجِّحها نحو
      ٢٥٠ هـ (٨٦٤ م) ونلتزم بدقة السنة لا غير.
    description_fr: |
      Asmāʾ bint Asad ibn al-Furāt — fille du conquérant de la
      Sicile Asad ibn al-Furāt (m. 213 H), qāḍī aghlabide et
      disciple de Mālik ibn Anas dont l'*Asadiyya* est à
      l'arrière-plan de la *Mudawwana* de Saḥnūn — mourut à
      Qayrawān au milieu du IIIe siècle de l'Hégire. Élevée
      dans la maison de l'une des autorités formatrices du fiqh
      mālikite, elle transmit de son père et fut consultée par
      les femmes de Qayrawān pour l'enseignement du fiqh et de
      l'adab. Qāḍī ʿIyāḍ dans son *Tartīb al-Madārik* et la
      tradition biographique mālikite conservent sa notice
      parmi les premières femmes porteuses du madhhab en
      Ifrīqiya ; l'année précise du décès n'étant pas attestée
      dans les sources classiques, nous l'ancrons vers 250 H
      (864 EC) et nous nous limitons à la précision à l'année.
    canonical_hijri: {year: 250, precision: year}
    canonical_gregorian: {date: 864-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Approximate year (mid-3rd century AH) drawn from Qāḍī ʿIyāḍ's *Tartīb al-Madārik*; classical sources preserve her notice but no precise wafāt year."
    people: [[asma-bint-asad-ibn-al-furat, died]]
    tags: [aghlabid, scholar, jurist, qayrawan, ifriqiya, maliki, women-scholars]
    importance: notable
    verified: true
    verification_status: single_source

  - slug: death-of-karima-al-marwaziyya
    category: scholar_death
    title_en: Death of Karīma al-Marwaziyya — Female Transmitter of Ṣaḥīḥ al-Bukhārī
    title_ar: وفاة كريمة بنت أحمد المروزية — راويةُ صحيح البخاريِّ بمكة
    title_fr: Mort de Karīma al-Marwaziyya — transmettrice du Ṣaḥīḥ d'al-Bukhārī
    description_en: |
      Karīma bint Aḥmad ibn Muḥammad al-Marwaziyya — Khurāsānian
      muḥadditha who settled in Mecca for life and from whom an
      entire generation of pilgrim-scholars from Andalus, the
      Maghrib, Iraq, Egypt, and Khurāsān received Ṣaḥīḥ al-
      Bukhārī through the recension of al-Kushmīhanī ← al-
      Firabrī ← al-Bukhārī — died at Mecca in 463 AH (1071 CE).
      Al-Dhahabī describes her in the *Siyar* as "one of the
      Mothers" of the great audition-chains of the *Ṣaḥīḥ*; her
      students include al-Khaṭīb al-Baghdādī, who heard her in
      Mecca during his pilgrimage, and many of the figures who
      brought the *Ṣaḥīḥ* westward into Andalus. She lived an
      austere unmarried life in the Sacred Precinct, devoting
      her years to teaching ḥadīth. Ibn Khallikān fixes her
      death in 463 AH; Ibn Kathīr in the *Bidāya* records the
      same year.
    description_ar: |
      توفيت كريمةُ بنتُ أحمدَ بن محمد المروزيةُ — محدِّثةُ
      خراسان التي اختارت جوار البيت الحرام بمكة، وعن طريقها
      تلقَّى جيلٌ كاملٌ من علماء الحاجِّ من الأندلس والمغرب
      والعراق ومصر وخراسان «صحيحَ البخاريِّ» برواية الكشميهنيِّ
      عن الفربريِّ عن البخاريِّ — بمكة سنة ثلاث وستين وأربعمئة
      للهجرة (الموافق ١٠٧١ م). وصفها الذهبيُّ في «السير» بأنها
      «من أمَّهات» إسناد سماع «الصحيح»؛ ومن تلامذتها الخطيبُ
      البغداديُّ سمع منها بمكة في حجِّه، وكثيرٌ من الذين أدخلوا
      «الصحيحَ» إلى الأندلس. عاشت زاهدةً عزباءَ في الحرم وقفاً
      على تعليم الحديث. أثبت ابنُ خلكان وفاتها سنة ٤٦٣ هـ،
      وعليه ابنُ كثير في «البداية».
    description_fr: |
      Karīma bint Aḥmad ibn Muḥammad al-Marwaziyya — muḥadditha
      khurāsānienne qui s'établit à La Mecque pour le reste de
      sa vie et auprès de qui une génération entière de
      savants-pèlerins venus d'al-Andalus, du Maghreb, d'Irak,
      d'Égypte et du Khurāsān reçut le Ṣaḥīḥ d'al-Bukhārī par
      la recension d'al-Kushmīhanī ← al-Firabrī ← al-Bukhārī
      — mourut à La Mecque en 463 H (1071 EC). Al-Dhahabī la
      décrit dans les *Siyar* comme « l'une des mères » des
      grandes chaînes d'audition du *Ṣaḥīḥ* ; parmi ses élèves
      figurent al-Khaṭīb al-Baghdādī, qui la fréquenta lors de
      son pèlerinage, et beaucoup de ceux qui portèrent le
      *Ṣaḥīḥ* vers l'Occident andalou. Elle vécut célibataire
      et ascétique dans l'enceinte sacrée, vouant ses années
      à l'enseignement du hadith. Ibn Khallikān fixe son décès
      en 463 H ; Ibn Kathīr dans la *Bidāya* note la même année.
    canonical_hijri: {year: 463, precision: year}
    canonical_gregorian: {date: 1071-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated 463 AH at Mecca; central transmitter of the Ṣaḥīḥ via the Kushmīhanī recension."
      - source_key: dhahabi_siyar
        notes: "Praised as one of the foundational female chains for Ṣaḥīḥ al-Bukhārī."
      - source_key: ibn_kathir_bidaya
        notes: "Year 463 AH wafayāt notice."
    people: [[karima-al-marwaziyya, died]]
    tags: [abbasid, seljuk, scholar, muhadditha, mecca, bukhari, women-scholars, isnad]
    importance: notable
    verified: true
    verification_status: cross_verified

