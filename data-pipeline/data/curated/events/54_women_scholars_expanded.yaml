  # =========================================================================
  # 7th CENTURY AH — DAMASCUS, THE GREAT FEMALE TRANSMITTERS
  # =========================================================================

  - slug: death-of-zaynab-bint-makki
    category: scholar_death
    title_en: Death of Zaynab bint Makkī — Damascene Muḥadditha and Teacher of Ibn Taymiyya
    title_ar: وفاة زينب بنت مكي الحرّانية — شيخةُ ابن تيمية بدمشق
    title_fr: Mort de Zaynab bint Makkī — muḥadditha de Damas, maîtresse d'Ibn Taymiyya
    description_en: |
      Zaynab bint Makkī ibn ʿAlī al-Ḥarrānī al-Dimashqiyya —
      Damascene muḥadditha whose long life made her the *musnida*
      of Syria in her old age, and whose audition-circle in the
      Banū ʿAsākir quarter included the young Taqī al-Dīn Ibn
      Taymiyya, the historian al-Birzālī, the imām al-Mizzī, and
      al-Dhahabī himself, who later filled the *Siyar* with her
      notice — died in Dhū al-Ḥijja 688 AH (December 1289 CE) at
      Damascus, having reached approximately ninety-four lunar
      years. Born in Ḥarrān around 595 AH, she heard from many
      of the principal Damascene and Ḥarrānī shaykhs of the
      early seventh century and held some of the highest ijāza-
      chains in Syria when she died; her notebooks underlie the
      sevent-century isnāds that Ibn Taymiyya cites in his fatāwā
      and rasāʾil. Al-Dhahabī fixes her death in 688 AH and
      praises her piety and probity at length.
    description_ar: |
      توفيت زينبُ بنت مكيِّ بن عليٍّ الحرَّانيَّةُ الدمشقيَّةُ
      — محدِّثةُ دمشق التي بلغ بها العمرُ أن صارت مسندةَ
      الشام، وكان مجلسُ سماعها بحارة بني عساكر يحضره الشابُّ
      تقيُّ الدين ابنُ تيميَّةَ، والمؤرِّخُ البرزاليُّ، والمزِّيُّ
      إمامُ الجرح والتعديل، والذهبيُّ نفسُه الذي سيُفصِّل
      ترجمتَها لاحقاً في «السير» — في ذي الحجة سنة ثمان
      وثمانين وستمئة للهجرة (الموافق ديسمبر ١٢٨٩ م) بدمشق،
      وقد بلغت نحواً من أربع وتسعين سنة قمرية. وُلدت بحرَّان
      نحو سنة ٥٩٥ هـ، وسمعت من كثيرٍ من شيوخ دمشق وحرَّان
      في أوائل القرن السابع، وكانت إذ ماتت من أعلى الناس
      إسناداً بالشام؛ وعن طريقها يأتي كثيرٌ من إسناد ابن
      تيميَّةَ في فتاويه ورسائله إلى رجال القرن السابع. أثبت
      الذهبيُّ وفاتَها سنة ٦٨٨ هـ وأطنب في الثناء على ديانتها
      وأمانتها.
    description_fr: |
      Zaynab bint Makkī ibn ʿAlī al-Ḥarrānī al-Dimashqiyya —
      muḥadditha damascène dont la longévité fit la *musnida*
      de la Syrie au soir de sa vie, et dont le cercle
      d'audition dans le quartier des Banū ʿAsākir comptait le
      jeune Taqī al-Dīn Ibn Taymiyya, l'historien al-Birzālī,
      l'imām al-Mizzī et al-Dhahabī lui-même, qui remplirait
      plus tard les *Siyar* de sa notice — mourut en dhū al-
      ḥijja 688 H (décembre 1289 EC) à Damas, ayant atteint
      environ quatre-vingt-quatorze années lunaires. Née à
      Ḥarrān vers 595 H, elle entendit nombre des principaux
      shaykhs damascènes et ḥarrāniens du début du VIIe siècle
      et détenait à sa mort certaines des chaînes d'ijāza les
      plus élevées de Syrie ; c'est par elle que passent
      beaucoup des isnāds du VIIe siècle que cite Ibn Taymiyya
      dans ses fatwās et épîtres. Al-Dhahabī fixe son décès
      en 688 H et fait son éloge longuement.
    canonical_hijri: {year: 688, month: 12, precision: month}
    canonical_gregorian: {date: 1289-12-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Death dated Dhū al-Ḥijja 688 AH at Damascus; teacher of Ibn Taymiyya, al-Mizzī, al-Birzālī, and al-Dhahabī."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 688 AH wafayāt entry confirming the month and place."
      - source_key: ibn_kathir_bidaya
        notes: "Bidāya year 688 AH wafayāt notice; musnida of Syria."
    people: [[zaynab-bint-makki, died]]
    tags: [mamluk, scholar, muhadditha, damascus, harran, ibn-taymiyya, women-scholars, isnad]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-sitti-al-wuzara
    category: scholar_death
    title_en: Death of Sittī al-Wuzarāʾ — Damascene Muḥadditha
    title_ar: وفاة ستِّ الوزراء التَّنوخية — محدِّثةُ دمشق
    title_fr: Mort de Sittī al-Wuzarāʾ — muḥadditha de Damas
    description_en: |
      Sittī al-Wuzarāʾ bint ʿUmar ibn Asʿad al-Tanūkhiyya al-
      Dimashqiyya — Damascene muḥadditha and one of the late-
      seventh-century female *musnidāt* of Syria, who held a
      direct samāʿ from Ibn al-Zabīdī of the *Ṣaḥīḥ* and was
      sought out for ijāza by the Mamlūk-era ḥadīth scholars
      of Damascus and Cairo — died at Damascus on 5 Dhū al-
      Qaʿda 716 AH (19 January 1317 CE), aged about ninety-
      two. She is one of the principal women in al-Dhahabī's
      ʿulūʾ-isnād chains for the *Ṣaḥīḥ*. Ibn Ḥajar in *al-
      Durar al-Kāmina* gives day and place precisely; al-
      Dhahabī notices her in *Tārīkh al-Islām* with year 716,
      and Ibn Kathīr in the *Bidāya* records the same.
    description_ar: |
      توفيت ستُّ الوزراء بنت عمر بن أسعد التنوخيَّةُ الدمشقيَّةُ
      — محدِّثةُ دمشق ومن مسنِدات الشام في أواخر القرن السابع
      الهجري، التي تحمل سماعَ «صحيح البخاري» مباشرةً عن ابن
      الزَّبيديِّ، وكان أعلامُ الحديث في عصر المماليك بدمشق
      والقاهرة يقصدون إجازتها — بدمشق في الخامس من ذي القعدة
      سنة ست عشرة وسبعمئة للهجرة (الموافق ١٩ يناير ١٣١٧ م)،
      عن نحو اثنتين وتسعين سنة. وهي من أهم النساء في إسناد
      الذهبيِّ العالي لـ«الصحيح». ضبط ابنُ حجر في «الدرر
      الكامنة» يومَ وفاتها ومكانَها بدقة؛ وذكرها الذهبيُّ في
      «تاريخ الإسلام» في وفيات ٧١٦ هـ، وعليه ابنُ كثير في
      «البداية».
    description_fr: |
      Sittī al-Wuzarāʾ bint ʿUmar ibn Asʿad al-Tanūkhiyya al-
      Dimashqiyya — muḥadditha damascène et l'une des
      *musnidāt* féminines de la fin du VIIe siècle de
      l'Hégire en Syrie, qui détenait l'audition directe du
      *Ṣaḥīḥ* d'al-Bukhārī auprès d'Ibn al-Zabīdī et dont les
      savants mamlūks du hadith de Damas et du Caire
      sollicitaient l'ijāza — mourut à Damas le 5 dhū al-
      qaʿda 716 H (19 janvier 1317 EC), âgée d'environ quatre-
      vingt-douze ans. Elle est l'une des principales femmes
      des chaînes à isnād élevé d'al-Dhahabī pour le *Ṣaḥīḥ*.
      Ibn Ḥajar dans *al-Durar al-Kāmina* donne le jour et le
      lieu avec précision ; al-Dhahabī la mentionne dans
      *Tārīkh al-Islām* à l'année 716, et Ibn Kathīr dans la
      *Bidāya* note la même.
    canonical_hijri: {year: 716, month: 11, day: 5, precision: day}
    canonical_gregorian: {date: 1317-01-19, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Death dated 5 Dhū al-Qaʿda 716 AH at Damascus; samāʿ of the Ṣaḥīḥ from Ibn al-Zabīdī."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 716 AH wafayāt notice."
      - source_key: ibn_kathir_bidaya
        notes: "Bidāya year 716 AH wafayāt entry."
    people: [[sitti-al-wuzara, died]]
    tags: [mamluk, scholar, muhadditha, damascus, women-scholars, isnad, bukhari]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-maryam-al-salihiyya
    category: scholar_death
    title_en: Death of Maryam al-Ṣāliḥiyya — Fakhr al-Nisāʾ of Mt Qāsiyūn
    title_ar: وفاة فخر النساء مريم بنت أحمد الصالحية — مسنِدةُ قاسيون
    title_fr: Mort de Maryam al-Ṣāliḥiyya — Fakhr al-Nisāʾ du mont Qāsiyūn
    description_en: |
      Fakhr al-Nisāʾ Maryam bint Aḥmad ibn Muḥammad al-
      Maqdisiyya al-Ṣāliḥiyya — Damascene muḥadditha settled
      in the Ḥanbalī Maqdisī community on the slope of Mount
      Qāsiyūn (al-Ṣāliḥiyya), one of the late-Mamlūk female
      bearers of the family-isnād established by the
      descendants of the Banū Qudāma — died at al-Ṣāliḥiyya
      in 805 AH (1402 CE). She heard from the Maqdisī women
      and men of the previous generation and gave ijāza to
      the leading Damascene and Cairene ḥadīth students of
      her time. Ibn Ḥajar in *al-Durar al-Kāmina* notices
      her in the wafayāt of 805 AH; the entry shows the
      transmission lineage.
    description_ar: |
      توفيت فخر النساء مريم بنت أحمد بن محمد المقدسيَّةُ
      الصالحيَّةُ — محدِّثةُ دمشق المقيمةُ في الجماعة
      الحنبليَّة المقدسيَّة بسفح جبل قاسيون (الصالحيَّة)، ومن
      حملة إسناد آل قُدامة في النساء في أواخر العصر المملوكي
      — بالصالحيَّة سنة خمس وثمانمئة للهجرة (الموافق ١٤٠٢ م).
      سمعت من نساء المقادسة ورجالهم في الجيل الذي سبقها،
      وأجازت أعلامَ الحديث في دمشق والقاهرة في عصرها. ذكرها
      ابنُ حجر في «الدرر الكامنة» في وفيات ٨٠٥ هـ، ويظهر في
      ترجمتها سندُ الرواية الأسريِّ.
    description_fr: |
      Fakhr al-Nisāʾ Maryam bint Aḥmad ibn Muḥammad al-
      Maqdisiyya al-Ṣāliḥiyya — muḥadditha damascène établie
      dans la communauté ḥanbalite maqdisite du flanc du mont
      Qāsiyūn (al-Ṣāliḥiyya), l'une des porteuses féminines de
      l'isnād familial constitué par les descendants des Banū
      Qudāma à la fin de l'époque mamlūke — mourut à al-
      Ṣāliḥiyya en 805 H (1402 EC). Elle entendit les femmes
      et les hommes maqdisites de la génération précédente et
      donna l'ijāza aux principaux étudiants de hadith
      damascènes et cairotes de son temps. Ibn Ḥajar la
      mentionne dans *al-Durar al-Kāmina* parmi les wafayāt
      de 805 H ; sa notice montre la chaîne de transmission.
    canonical_hijri: {year: 805, precision: year}
    canonical_gregorian: {date: 1402-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Wafayāt notice for 805 AH; Maqdisī family-isnād transmitter at al-Ṣāliḥiyya."
      - source_key: ibn_imad_shadharat
        notes: "Year 805 AH entry confirming her death and lineage."
    people: [[maryam-al-salihiyya, died]]
    tags: [mamluk, scholar, muhadditha, damascus, salihiyya, hanbali, women-scholars]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-umm-al-khayr-al-hijaziyya
    category: scholar_death
    title_en: Death of Umm al-Khayr al-Ḥijāziyya — Damascene Muḥadditha
    title_ar: وفاة أمِّ الخير الحجازيَّة — محدِّثة دمشق
    title_fr: Mort d'Umm al-Khayr al-Ḥijāziyya — muḥadditha de Damas
    description_en: |
      Umm al-Khayr Saʿīda bint Aḥmad al-Dimashqiyya, known as
      al-Ḥijāziyya for her long sojourn in the Sacred Precinct
      where she received high-isnād samāʿ — Damascene muḥadditha
      of the eighth Islamic century whose ijāza-chains were
      sought by Mamlūk-era pilgrims and ḥadīth students who
      crossed Syria on their way to or from Mecca — died at
      Damascus in the eighth century AH. She held audition-
      certificates from a number of the late-seventh-century
      Damascene shaykhs and was, with Sittī al-Wuzarāʾ and
      Maryam al-Ṣāliḥiyya, one of the women whose family
      isnāds the late-Mamlūk muḥaddithūn relied on. Ibn Ḥajar
      in *al-Durar al-Kāmina* preserves her notice; the
      classical sources do not record a specific year, so we
      anchor at c. 770 AH (1369 CE).
    description_ar: |
      توفيت أمُّ الخير سعيدةُ بنت أحمد الدمشقيَّةُ، الملقَّبةُ
      بالحجازيَّة لطول إقامتها بالحرم الشريف وسماعها فيه
      الإسنادَ العالي — محدِّثةُ دمشق في القرن الثامن الهجري،
      التي كان حجَّاج الشام وطلَّاب الحديث في عصر المماليك
      يلتمسون إجازتها وهم في طريقهم إلى مكة أو منها —
      بدمشق في القرن الثامن الهجري. حملت أسانيد سماعٍ من
      جملة من شيوخ دمشق في أواخر القرن السابع، وكانت مع
      ستِّ الوزراء ومريم الصالحيَّة من النساء اللواتي اعتمد
      عليهنَّ محدِّثو أواخر العصر المملوكي في إسناد الأسرة.
      حفظ ابنُ حجر في «الدرر الكامنة» ترجمتَها؛ ولم تُذكر في
      المصادر الكلاسيكية سنةُ الوفاة بدقَّة، فنرجِّحها نحو
      ٧٧٠ هـ (١٣٦٩ م).
    description_fr: |
      Umm al-Khayr Saʿīda bint Aḥmad al-Dimashqiyya, dite
      al-Ḥijāziyya en raison de son long séjour dans
      l'enceinte sacrée où elle reçut un samāʿ à isnād élevé
      — muḥadditha damascène du VIIIe siècle de l'Hégire dont
      les chaînes d'ijāza étaient sollicitées par les pèlerins
      mamlūks et les étudiants de hadith qui traversaient la
      Syrie en route vers La Mecque ou en revenant — mourut à
      Damas au VIIIe siècle de l'Hégire. Elle détenait des
      certificats d'audition d'un certain nombre de shaykhs
      damascènes de la fin du VIIe siècle et figurait, avec
      Sittī al-Wuzarāʾ et Maryam al-Ṣāliḥiyya, parmi les femmes
      dont les muḥaddithūn de la fin de l'époque mamlūke
      tiraient les isnāds familiaux. Ibn Ḥajar dans *al-Durar
      al-Kāmina* en conserve la notice ; les sources classiques
      ne consignent pas d'année précise, et nous l'ancrons
      vers 770 H (1369 EC).
    canonical_hijri: {year: 770, precision: year}
    canonical_gregorian: {date: 1369-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "Notice in al-Durar al-Kāmina; specific death year not preserved, anchor c. 770 AH."
    people: [[umm-al-khayr-al-hijaziyya, died]]
    tags: [mamluk, scholar, muhadditha, damascus, mecca, women-scholars]
    importance: notable
