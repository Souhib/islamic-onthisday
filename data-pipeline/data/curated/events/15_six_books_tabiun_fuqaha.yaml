  - slug: death-of-al-shaybani
    category: scholar
    title_en: Death of Muhammad ibn al-Hasan al-Shaybani
    title_ar: وفاة محمد بن الحسن الشيباني
    title_fr: Mort de Muḥammad ibn al-Ḥasan al-Shaybani
    description_en: |
      Muhammad ibn al-Hasan al-Shaybani, the senior student of Abu
      Hanifa after Abu Yusuf and the chief codifier of the Hanafi
      madhhab through his six "Books of the Apparent Narration"
      (*Kutub Ẓahir al-Riwaya*) — *al-Mabsut*, *al-Jamiʿ al-Kabir*,
      *al-Jamiʿ al-Saghir*, *al-Siyar al-Kabir*, *al-Siyar al-Saghir*,
      and *al-Ziyadat* — died at Rayy in the company of the Caliph
      Harun al-Rashid at age 58. His *al-Siyar al-Kabir* is the
      foundational treatise of Islamic international law. Imam
      al-Shafiʿi was his student in Iraq and credited him with shaping
      his own juristic method: "I carried from Muhammad ibn al-Hasan
      a camel-load of books."
    description_ar: |
      توفي الإمام محمد بن الحسن الشيباني — كبير أصحاب أبي حنيفة بعد
      أبي يوسف، ومدوّن المذهب الحنفي عبر كتبه الستة المعروفة بـ«كتب
      ظاهر الرواية»: «المبسوط» و«الجامع الكبير» و«الجامع الصغير»
      و«السير الكبير» و«السير الصغير» و«الزيادات» — بالريّ في معسكر
      الخليفة هارون الرشيد عن ثمانٍ وخمسين سنة. وكتابه «السير الكبير»
      هو الأساس في فقه القانون الدولي الإسلامي. وقد قرأ عليه الإمام
      الشافعي بالعراق فقال: «حملت عن محمد بن الحسن وقر بعير من الكتب».
    description_fr: |
      Muḥammad ibn al-Ḥasan al-Shaybani, l'élève principal d'Abu Hanifa
      après Abu Yusuf et le codificateur en chef de l'école hanafite à
      travers ses six « Livres de la Transmission Apparente »
      (*Kutub Ẓāhir al-Riwāya*) — *al-Mabsūṭ*, *al-Jāmiʿ al-Kabīr*,
      *al-Jāmiʿ al-Ṣaghīr*, *al-Siyar al-Kabīr*, *al-Siyar al-Ṣaghīr*
      et *al-Ziyādāt* — mourut à Rayy dans l'entourage du calife Harun
      al-Rashid à l'âge de 58 ans. Son *al-Siyar al-Kabīr* est le
      traité fondateur du droit international islamique. L'imam
      al-Shāfiʿi fut son élève en Irak et lui attribua la formation
      de sa propre méthode juridique : « j'ai emporté de Muḥammad ibn
      al-Ḥasan une charge de chameau de livres ».
    canonical_hijri: {year: 189, precision: year}
    canonical_gregorian: {date: 805-01-01, precision: year, method: attested}
