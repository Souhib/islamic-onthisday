# Wave 2 of curated event additions (2026-04-26).
# 3 muhaddithun of the Six Books + 2 hadith giants + 3 senior sahaba +
# 3 tabi'un + 4 classical fuqaha. Each event attested in classical Sunni
# sources (al-Dhahabi Siyar, Ibn Khallikan Wafayat al-A'yan, Ibn al-Athir
# al-Kamil, Ibn Hajar Tahdhib, etc.). Trilingual (en/ar/fr).

events:
  # =========================================================================
  # MUHADDITHUN OF THE SIX BOOKS + MAJOR HADITH SCHOLARS
  # =========================================================================

  - slug: death-of-abu-dawud
    category: scholar
    title_en: Death of Imam Abu Dawud al-Sijistani
    title_ar: وفاة الإمام أبي داود السجستاني
    title_fr: Mort de l'imam Abu Dawud al-Sijistani
    description_en: |
      Sulayman ibn al-Ash'ath al-Sijistani, compiler of the Sunan — the
      third of the Six Books of Sunni hadith — died in Basra at age 73.
      He travelled across Khurasan, Iraq, the Hijaz, Egypt, the Levant,
      and the Jazira to gather some five hundred thousand traditions, of
      which he selected 4,800 for his Sunan, focusing exclusively on
      hadiths bearing on legal rulings (ahadith al-ahkam). His
      letter-treatise to the people of Mecca explaining his methodology
      remains a foundational text in hadith criticism.
    description_ar: |
      توفي الإمام سليمان بن الأشعث السجستاني — صاحب «السنن» التي هي ثالث
      الكتب الستة عند أهل السنة — بالبصرة عن ثلاث وسبعين سنة. طاف
      رحمه الله بلاد خراسان والعراق والحجاز ومصر والشام والجزيرة، فجمع
      نحواً من خمس مئة ألف حديث، انتقى منها لكتابه «السنن» نحو أربعة
      آلاف وثمان مئة حديث، اقتصر فيها على أحاديث الأحكام. ورسالته إلى
      أهل مكة في وصف منهجه في كتابه من أصول علم مصطلح الحديث إلى يوم الناس.
    description_fr: |
      Sulayman ibn al-Ashʿath al-Sijistani, compilateur des *Sunan* — le
      troisième des Six Livres du hadith sunnite — mourut à Bassora à
      l'âge de 73 ans. Il parcourut le Khurasan, l'Irak, le Hedjaz,
      l'Égypte, le Levant et la Jazira pour rassembler environ cinq cent
      mille traditions, dont il retint 4 800 pour ses *Sunan*, en se
      concentrant exclusivement sur les hadiths portant sur les règles
      juridiques (*aḥādīth al-aḥkām*). Sa lettre-traité aux habitants
      de La Mecque exposant sa méthodologie demeure un texte fondateur
      de la critique du hadith.
    canonical_hijri: {year: 275, month: 10, day: 16, precision: day}
    canonical_gregorian: {date: 889-02-21, precision: day, method: tabular_conversion}
