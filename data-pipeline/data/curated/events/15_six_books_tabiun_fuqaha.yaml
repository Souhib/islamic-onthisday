  - slug: death-of-sahnun
    category: scholar
    title_en: Death of Saḥnun ibn Saʿid al-Tanukhi
    title_ar: وفاة سحنون بن سعيد التنوخي
    title_fr: Mort de Saḥnun ibn Saʿid al-Tanukhi
    description_en: |
      Saḥnun (ʿAbd al-Salam ibn Saʿid) al-Tanukhi, qadi of Ifriqiya
      and author of *al-Mudawwana al-Kubra* — the second-most
      authoritative reference in the Maliki madhhab after the *Muwattaʾ*
      itself — died in Qayrawan at age about 80. *al-Mudawwana*
      records the legal positions of Imam Malik as transmitted through
      Ibn al-Qasim, with Saḥnun's own incorporations and refinements;
      it became the canonical Maliki fiqh manual across North Africa
      and al-Andalus for nearly a millennium. As qadi he was famed for
      his unbending integrity, refusing the office until he had been
      assured of full independence from political interference.
    description_ar: |
      توفي الإمام سحنون (عبد السلام بن سعيد) التنوخي — قاضي إفريقية
      ومصنف «المدونة الكبرى» التي هي أعلى مرجع في المذهب المالكي
      بعد «الموطأ» نفسه — بالقيروان عن نحو ثمانين سنة. سجلت «المدونة»
      فقه الإمام مالك من رواية ابن القاسم مع زيادات سحنون وتنقيحاته،
      فصارت المرجع الفقهي القانوني للمذهب المالكي في عامة شمال
      أفريقيا والأندلس قرابة ألف سنة. وعرف رحمه الله في القضاء
      بصلابته في الحق فلم يقبل القضاء حتى ضُمنت له السلطة المستقلة
      عن السلطان.
    description_fr: |
      Saḥnun (ʿAbd al-Salam ibn Saʿid) al-Tanukhi, qāḍī d'Ifriqiya et
      auteur d'*al-Mudawwana al-Kubrā* — la seconde référence la plus
      autoritative dans l'école malikite après la *Muwaṭṭaʾ* elle-même
      — mourut à Qayrawan à l'âge d'environ 80 ans. *al-Mudawwana*
      consigne les positions juridiques de l'imam Malik telles que
      transmises par Ibn al-Qāsim, avec les incorporations et
      raffinements propres à Saḥnun; elle devint le manuel canonique
      de fiqh malikite à travers l'Afrique du Nord et al-Andalus
      pendant près de mille ans. Comme qāḍī il était célèbre pour son
      intégrité inflexible, refusant la charge jusqu'à avoir l'assurance
      d'une indépendance totale vis-à-vis de l'ingérence politique.
    canonical_hijri: {year: 240, month: 7, precision: month}
    canonical_gregorian: {date: 854-12-01, precision: month, method: tabular_conversion}
