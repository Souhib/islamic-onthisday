  - slug: death-of-al-tahawi
    category: scholar
    title_en: Death of Imam al-Ṭahawi
    title_ar: وفاة الإمام الطحاوي
    title_fr: Mort de l'imam al-Ṭahawi
    description_en: |
      Abu Jaʿfar Ahmad ibn Muhammad al-Tahawi, foremost Hanafi jurist
      of his generation and author of *al-ʿAqida al-Ṭahawiyya* — the
      single most widely studied creedal text in Sunni Islam, taught
      across Hanafi, Shafiʿi, and Maliki seminaries to this day —
      died in Egypt at age about 92. Originally trained Shafiʿi (his
      maternal uncle was al-Muzani, al-Shafiʿi's senior pupil), he
      transferred to the Hanafi madhhab as a young man. Beyond the
      *ʿAqida*, his *Sharḥ Maʿani al-Athar* and *Sharḥ Mushkil al-Athar*
      remain pillar references for hadith fiqh.
    description_ar: |
      توفي الإمام أبو جعفر أحمد بن محمد الطحاوي — كبير فقهاء الحنفية
      في عصره وصاحب «العقيدة الطحاوية» التي هي أوسع متون العقيدة عند
      أهل السنة انتشاراً وتدريساً، تُقرأ في حلقات الحنفية والشافعية
      والمالكية إلى اليوم — بمصر عن نحو اثنتين وتسعين سنة. كان رحمه
      الله شافعي النشأة، وخاله المزني كبير أصحاب الإمام الشافعي، ثم
      انتقل إلى المذهب الحنفي شاباً. وفضلاً عن «العقيدة» فإن كتابيه
      «شرح معاني الآثار» و«شرح مشكل الآثار» من أركان فقه الحديث.
    description_fr: |
      Abu Jaʿfar Aḥmad ibn Muḥammad al-Ṭahawi, le plus grand juriste
      hanafite de sa génération et auteur d'*al-ʿAqīda al-Ṭaḥāwiyya*
      — le texte de credo sunnite le plus étudié au monde, enseigné
      à travers les madrasas hanafites, shafiʿites et malikites jusqu'à
      ce jour — mourut en Égypte à l'âge d'environ 92 ans. D'abord
      formé chafiʿite (son oncle maternel était al-Muzani, élève
      principal d'al-Shāfiʿi), il passa à l'école hanafite jeune
      homme. Outre la *ʿAqīda*, son *Sharḥ Maʿānī al-Āthār* et son
      *Sharḥ Mushkil al-Āthār* demeurent des références piliers du
      fiqh des hadiths.
    canonical_hijri: {year: 321, month: 11, precision: month}
    canonical_gregorian: {date: 933-11-01, precision: month, method: tabular_conversion}
