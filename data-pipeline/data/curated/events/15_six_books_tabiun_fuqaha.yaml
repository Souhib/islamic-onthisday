  - slug: death-of-talha-ibn-ubaydullah
    category: companion
    title_en: Martyrdom of Ṭalḥa ibn ʿUbaydullah ra
    title_ar: استشهاد طلحة بن عبيد الله رضي الله عنه
    title_fr: Martyre de Ṭalḥa ibn ʿUbaydullah ra
    description_en: |
      Talha ibn ʿUbaydullah al-Taymi — one of the ten Companions
      promised Paradise, eighth to embrace Islam, and the man whose
      hand the Prophet ﷺ used as a shield at Uhud (sustaining injuries
      that left it permanently maimed) — was killed at the Battle of
      the Camel near Basra at age about sixty. He was hit by a stray
      arrow in the leg and bled to death; some narrations name Marwan
      ibn al-Hakam as the archer, settling an old grudge. The Prophet ﷺ
      had named him *Talha al-Khayr* and *al-Fayyad* — Talha the Good
      and the Generous — for his decisive bravery at Uhud.
    description_ar: |
      استشهد طلحة بن عبيد الله التيمي رضي الله عنه — أحد العشرة المبشرين
      بالجنة، وثامن من أسلم في الإسلام، وصاحب اليد التي اتخذها رسول
      الله ﷺ ترساً في غزوة أحد فأصيبت إصابة شلتها — في معركة الجمل قرب
      البصرة وقد ناهز الستين. أصابه سهم طائش في رجله فنزف حتى مات؛ وفي
      بعض الروايات أن الذي رماه مروان بن الحكم ثأراً قديماً. وقد سماه
      النبي ﷺ «طلحة الخير» و«طلحة الفياض» لشجاعته الحاسمة يوم أحد.
    description_fr: |
      Ṭalḥa ibn ʿUbaydullah al-Taymi — l'un des dix compagnons promis
      au Paradis, huitième à embrasser l'Islam, et celui dont la main
      servit de bouclier au Prophète ﷺ à Uḥud (subissant des blessures
      qui la laissèrent estropiée à vie) — fut tué à la bataille du
      Chameau près de Bassora à l'âge d'environ soixante ans. Il fut
      frappé par une flèche perdue à la jambe et mourut au sang; certaines
      narrations désignent Marwan ibn al-Ḥakam comme l'archer, réglant
      une vieille rancune. Le Prophète ﷺ l'avait nommé *Ṭalḥa al-Khayr*
      et *al-Fayyāḍ* — Ṭalḥa le Bon et le Généreux — pour sa bravoure
      décisive à Uḥud.
