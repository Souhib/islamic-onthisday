  - slug: death-of-al-nasai
    category: scholar
    title_en: Death of Imam al-Nasaʾi
    title_ar: وفاة الإمام النسائي
    title_fr: Mort de l'imam al-Nasaʾi
    description_en: |
      Ahmad ibn Shuʿayb al-Nasaʾi, compiler of *al-Sunan al-Sughra*
      (also known as *al-Mujtaba*) — the fifth of the Six Books — died
      in his late eighties. The most stringent of the Six Books authors
      after al-Bukhari and Muslim, his Sunan applies a finer sieve than
      Abu Dawud or al-Tirmidhi: many later scholars rank him second only
      to the two Sahihs. He died after being assaulted in Damascus for
      his book *Khasaʾis ʿAli* defending the merits of ʿAli ra against
      contemporary Umayyad partisans; some sources say he died in Ramla,
      others in Mecca where he had asked to be carried.
    description_ar: |
      توفي الإمام أحمد بن شعيب النسائي — صاحب «السنن الصغرى» المعروفة
      بـ«المجتبى»، خامس الكتب الستة — وقد ناهز التسعين. كان أشد أصحاب
      الكتب الستة تشدداً في الرجال بعد البخاري ومسلم، حتى عد كثير من
      المتأخرين «سننه» تالية للصحيحين في الرتبة. توفي رحمه الله بعد
      أن أوذي بدمشق بسبب كتابه «خصائص علي» في فضائل أمير المؤمنين علي
      رضي الله عنه ردّاً على من تنقصه من بقايا أهل الشام؛ فقيل توفي
      بالرملة، وقيل: حُمل إلى مكة بناءً على طلبه فمات بها.
    description_fr: |
      Aḥmad ibn Shuʿayb al-Nasaʾi, compilateur d'*al-Sunan al-Ṣughra*
      (également connu sous le nom d'*al-Mujtaba*) — cinquième des Six
      Livres — mourut âgé de près de quatre-vingt-dix ans. C'est le plus
      rigoureux des auteurs des Six Livres après al-Bukhari et Muslim;
      ses *Sunan* appliquent un crible plus fin qu'Abu Dawud ou al-Tirmidhi,
      au point que beaucoup de savants tardifs les placent immédiatement
      après les deux *Ṣaḥīḥ*. Il mourut après avoir été agressé à Damas
      à cause de son livre *Khaṣaʾiṣ ʿAli* défendant les mérites de
      ʿAli ra contre les partisans omeyyades de son temps; certaines
      sources le font mourir à Ramla, d'autres à La Mecque où il avait
      demandé à être transporté.
    canonical_hijri: {year: 303, precision: year}
    canonical_gregorian: {date: 915-01-01, precision: year, method: attested}
