  - slug: death-of-ibn-hibban
    category: scholar
    title_en: Death of Ibn Ḥibban al-Busti
    title_ar: وفاة ابن حبان البستي
    title_fr: Mort d'Ibn Ḥibban al-Busti
    description_en: |
      Muhammad ibn Hibban al-Busti, qadi, polymath, and compiler of
      *al-Ṣaḥiḥ* (commonly known as *Ṣaḥiḥ Ibn Ḥibban*) and the
      foundational rijal work *al-Thiqat*, died in Bust (in present-day
      Afghanistan). His *Ṣaḥiḥ* applies stricter authentication criteria
      than the Sunan compilers and is widely treated as the third Ṣaḥiḥ
      after al-Bukhari and Muslim. His critical apparatus on hadith
      narrators in *al-Thiqat* and *al-Majruhin* shaped the later science
      of jarh and taʿdil decisively. He served as qadi of Samarqand and
      taught widely across Khurasan.
    description_ar: |
      توفي الإمام محمد بن حبان البستي — القاضي والمحدث الموسوعي وصاحب
      «الصحيح» المعروف بـ«صحيح ابن حبان» وكتاب «الثقات» الذي هو من أصول
      علم الرجال — في بست (في أفغانستان اليوم). شرط ابن حبان في صحيحه
      أشد من شرط أصحاب السنن، حتى عدّه كثير من العلماء الصحيح الثالث
      بعد صحيحي البخاري ومسلم. وكتاباه «الثقات» و«المجروحين» أثرا في
      علم الجرح والتعديل تأثيراً عميقاً عند المتأخرين. وقد ولي قضاء
      سمرقند ودرّس في عامة بلاد خراسان.
    description_fr: |
      Muḥammad ibn Ḥibban al-Busti, juge, polymathe et compilateur d'*al-
      Ṣaḥīḥ* (communément appelé *Ṣaḥīḥ Ibn Ḥibban*) ainsi que de
      l'ouvrage fondateur de critique des transmetteurs *al-Thiqāt*,
      mourut à Bust (dans l'actuel Afghanistan). Son *Ṣaḥīḥ* applique des
      critères d'authentification plus stricts que les compilateurs des
      Sunan et est largement traité comme le troisième *Ṣaḥīḥ* après
      al-Bukhari et Muslim. Son appareil critique sur les narrateurs de
      hadith dans *al-Thiqāt* et *al-Majrūḥīn* a façonné de manière
      décisive la science postérieure du *jarḥ* et du *taʿdīl*. Il fut
      qāḍī de Samarcande et enseigna largement à travers le Khurasan.
    canonical_hijri: {year: 354, month: 10, precision: month}
    canonical_gregorian: {date: 965-10-01, precision: month, method: tabular_conversion}
    claims:
