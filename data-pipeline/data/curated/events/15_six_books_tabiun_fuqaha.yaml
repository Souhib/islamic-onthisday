  - slug: death-of-ibn-sirin
    category: scholar
    title_en: Death of Muhammad ibn Sirin
    title_ar: وفاة محمد بن سيرين
    title_fr: Mort de Muḥammad ibn Sirin
    description_en: |
      Muhammad ibn Sirin al-Basri — son of a freedman of Anas ibn
      Malik ra, leading tabiʿi jurist and muḥaddith of Basra, and
      proverbial master of the science of dream interpretation
      (*taʿbir al-ruʾya*) in the Sunni tradition — died in Basra at
      age about 77, around a hundred days after his contemporary and
      counterpart Hasan al-Basri. He is the originator of the famous
      principle "this knowledge is religion, so look at whom you take
      your religion from" — the foundational maxim of isnad criticism.
      The book *Tafsir al-Ahlam al-Kabir* attributed to him is in fact
      a later compilation drawing on his teachings.
    description_ar: |
      توفي الإمام محمد بن سيرين البصري — مولى أنس بن مالك رضي الله عنه،
      وكبير فقهاء التابعين ومحدثيهم في البصرة، والمضرب به المثل في
      علم تعبير الرؤيا في تراث أهل السنة — بالبصرة عن نحو سبع وسبعين
      سنة، وذلك بعد وفاة قرينه الحسن البصري بنحو مئة يوم. وعنه القاعدة
      المشهورة في علم الإسناد: «إن هذا العلم دين، فانظروا عمن تأخذون
      دينكم». وأما كتاب «تفسير الأحلام الكبير» المنسوب إليه فهو في
      الحقيقة مجموع متأخر يجمع تعاليمه.
    description_fr: |
      Muḥammad ibn Sirin al-Baṣri — fils d'un affranchi d'Anas ibn
      Malik ra, juriste et muḥaddith tabiʿi de premier plan à Bassora,
      et maître proverbial de la science de l'interprétation des rêves
      (*taʿbīr al-ruʾyā*) dans la tradition sunnite — mourut à Bassora
      à l'âge d'environ 77 ans, une centaine de jours après son
      contemporain et homologue Ḥasan al-Baṣri. C'est l'auteur du
      célèbre principe « ce savoir est religion, regardez donc de qui
      vous prenez votre religion » — maxime fondatrice de la critique
      des chaînes de transmission. Le livre *Tafsir al-Aḥlam al-Kabīr*
      qui lui est attribué est en réalité une compilation tardive
      s'appuyant sur ses enseignements.
    canonical_hijri: {year: 110, month: 10, precision: month}
    canonical_gregorian: {date: 729-01-01, precision: month, method: tabular_conversion}
