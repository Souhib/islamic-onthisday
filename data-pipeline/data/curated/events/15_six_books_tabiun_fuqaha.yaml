    people: [[al-tahawi, subject]]
    tags: [hanafi, creed, aqida, egypt, abbasid]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Tahawi"

  - slug: death-of-al-qadi-iyad
    category: scholar
    title_en: Death of al-Qaḍi ʿIyaḍ
    title_ar: وفاة القاضي عياض
    title_fr: Mort d'al-Qaḍi ʿIyaḍ
    description_en: |
      Abu al-Faḍl ʿIyaḍ ibn Musa al-Yaḥṣubi, qadi of Ceuta and Granada,
      foremost Maliki authority of the western Islamic world in his
      generation, and author of *al-Shifa bi-Taʿrif Ḥuquq al-Muṣṭafa*
      — the most widely circulated work of devotion to the Prophet ﷺ
      in Sunni Islam — died in Marrakesh at age about 68. *al-Shifa*
      was carried in saddlebags from Andalusia to Java; even today it
      is recited communally during Mawlid gatherings across the Muslim
      world. His *Tartib al-Madarik* is the canonical biographical
      dictionary of Maliki scholars. He fell out of favour with the
      Almohad regime over his loyalty to the deposed Almoravids; some
      classical sources suggest he was poisoned in Marrakesh.
    description_ar: |
      توفي القاضي أبو الفضل عياض بن موسى اليحصبي — قاضي سبتة وغرناطة،
      وكبير المالكية في الغرب الإسلامي في عصره، ومصنف «الشفا بتعريف
      حقوق المصطفى» — وهو أوسع كتب التعظيم النبوي ﷺ انتشاراً عند أهل
      السنة — بمراكش عن نحو ثمانٍ وستين سنة. حُمل «الشفا» في الخروج
      من الأندلس إلى جاوة، وما زال يُقرأ في حلقات المولد في العالم
      الإسلامي إلى يومنا. وكتابه «ترتيب المدارك» هو المرجع المعتمد
      في تراجم علماء المالكية. وقد انقلب عليه الموحدون لولائه
      للمرابطين المخلوعين، وفي بعض المصادر القديمة أنه سُمّ بمراكش.
    description_fr: |
      Abu al-Faḍl ʿIyāḍ ibn Mūsā al-Yaḥṣubi, qāḍī de Ceuta et de
      Grenade, plus grande autorité malikite du monde islamique
      occidental de sa génération et auteur d'*al-Shifāʾ bi-Taʿrīf
      Ḥuqūq al-Muṣṭafā* — l'ouvrage de dévotion au Prophète ﷺ le plus
      largement diffusé dans l'islam sunnite — mourut à Marrakech à
      l'âge d'environ 68 ans. *al-Shifāʾ* fut porté en sacoches
      d'al-Andalus jusqu'à Java; aujourd'hui encore il est récité en
      assemblée lors des veillées du Mawlid à travers le monde
      musulman. Son *Tartīb al-Madārik* est le dictionnaire
      biographique canonique des savants malikites. Il tomba en
      disgrâce auprès du régime almohade en raison de sa loyauté aux
      Almoravides déchus; certaines sources classiques suggèrent qu'il
      fut empoisonné à Marrakech.
