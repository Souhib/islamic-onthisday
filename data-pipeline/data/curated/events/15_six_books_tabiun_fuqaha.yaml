  - slug: death-of-ibn-majah
    category: scholar
    title_en: Death of Imam Ibn Majah
    title_ar: وفاة الإمام ابن ماجه
    title_fr: Mort de l'imam Ibn Majah
    description_en: |
      Muhammad ibn Yazid Ibn Majah al-Qazwini, compiler of the Sunan
      that completes the Six Books, died in Qazvin at age 64. His
      Sunan, organised by chapters of fiqh, contains roughly 4,300
      hadiths; later critics noted that Ibn Majah included a small
      number of weak narrations that the other compilers had
      excluded — a fact transparently catalogued in al-Mizzi's *Tuhfat
      al-Ashraf* and al-Dhahabi's *Mizan al-Iʿtidal*. The work was
      formally added to the Six Books canon by Abu al-Fadl al-Maqdisi
      (d. 507 AH).
    description_ar: |
      توفي الإمام محمد بن يزيد ابن ماجه القزويني — صاحب «السنن» التي
      أكملت الكتب الستة — بقزوين عن أربع وستين سنة. كتابه «السنن»
      مرتب على أبواب الفقه ويحتوي على نحو أربعة آلاف وثلاث مئة حديث،
      وقد نبه المتأخرون إلى أن ابن ماجه أدخل في كتابه عدداً يسيراً من
      الأحاديث الضعيفة التي تركها سائر أصحاب الكتب الستة، وهو أمر
      موثق بشفافية في «تحفة الأشراف» للمزي و«ميزان الاعتدال» للذهبي.
      وأدخل أبو الفضل المقدسي (ت ٥٠٧ هـ) كتابه رسمياً في عداد الكتب
      الستة.
    description_fr: |
      Muḥammad ibn Yazid Ibn Majah al-Qazwini, compilateur des *Sunan*
      qui complètent les Six Livres, mourut à Qazvin à l'âge de 64 ans.
      Ses *Sunan*, organisées par chapitres de fiqh, contiennent environ
      4 300 hadiths; les critiques tardifs ont relevé qu'Ibn Majah y
      avait inclus un petit nombre de narrations faibles que les autres
      compilateurs avaient exclues — fait transparent catalogué dans
      *Tuḥfat al-Ashraf* d'al-Mizzi et *Mizan al-Iʿtidal* d'al-Dhahabi.
      L'ouvrage fut formellement intégré au canon des Six Livres par
      Abu al-Faḍl al-Maqdisi (m. 507 H).
    canonical_hijri: {year: 273, month: 9, day: 22, precision: day}
    canonical_gregorian: {date: 887-02-19, precision: day, method: tabular_conversion}
