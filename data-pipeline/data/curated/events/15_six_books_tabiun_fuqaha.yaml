  - slug: death-of-al-zubayr-ibn-al-awwam
    category: companion
    title_en: Martyrdom of al-Zubayr ibn al-ʿAwwam ra
    title_ar: استشهاد الزبير بن العوام رضي الله عنه
    title_fr: Martyre d'al-Zubayr ibn al-ʿAwwam ra
    description_en: |
      al-Zubayr ibn al-ʿAwwam — first cousin of the Prophet ﷺ through
      his aunt Safiyya, husband of Asma bint Abi Bakr, one of the ten
      Companions promised Paradise (al-ʿasharatu al-mubashsharun bi-l-
      jannah), and disciple of the Prophet ﷺ from the earliest days
      of Mecca — was killed at the age of 64 after withdrawing from the
      Battle of the Camel near Basra. He was struck down while praying
      in the Wadi al-Sibaʿ by ʿAmr ibn Jurmuz; ʿAli ra, on hearing of
      it, declared "give the killer of Ibn Safiyya tidings of Hellfire."
      The Prophet ﷺ had named him *ḥawari rasul Allah* — the disciple
      of the Messenger of Allah ﷺ.
    description_ar: |
      استشهد الزبير بن العوام رضي الله عنه — ابن عمة النبي ﷺ صفية بنت
      عبد المطلب، وزوج أسماء بنت أبي بكر، وأحد العشرة المبشرين بالجنة،
      وحواري رسول الله ﷺ، ومن السابقين الأولين في الإسلام — عن أربع
      وستين سنة بعد انسحابه من معركة الجمل قرب البصرة. قتله غدراً عمرو
      بن جرموز وهو يصلي في وادي السباع، فلما بلغ ذلك علياً رضي الله
      عنه قال: «بشّر قاتل ابن صفية بالنار». وقد سمّاه النبي ﷺ
      «حواريّ» في الحديث المتفق على صحته.
    description_fr: |
      al-Zubayr ibn al-ʿAwwam — cousin germain du Prophète ﷺ par sa
      tante Ṣafiyya, époux d'Asma bint Abi Bakr, l'un des dix
      compagnons à qui le Paradis fut promis (*al-ʿasharatu al-mubashsharun
      bi-l-jannah*) et disciple du Prophète ﷺ depuis les premiers jours
      de La Mecque — fut tué à 64 ans après s'être retiré de la bataille
      du Chameau près de Bassora. Il fut frappé alors qu'il priait dans
      le Wadi al-Sibaʿ par ʿAmr ibn Jurmuz; ʿAli ra, en l'apprenant,
      déclara : « annoncez au tueur d'Ibn Ṣafiyya la nouvelle du Feu ».
      Le Prophète ﷺ l'avait nommé *ḥawari rasul Allah* — le disciple du
      Messager d'Allah ﷺ.
    canonical_hijri: {year: 36, month: 6, precision: month}
