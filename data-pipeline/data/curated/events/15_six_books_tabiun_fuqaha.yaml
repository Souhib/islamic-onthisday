  - slug: death-of-al-zuhri
    category: scholar
    title_en: Death of Imam al-Zuhri (Ibn Shihab)
    title_ar: وفاة الإمام الزهري (ابن شهاب)
    title_fr: Mort de l'imam al-Zuhri (Ibn Shihab)
    description_en: |
      Muhammad ibn Muslim ibn Shihab al-Zuhri — the first scholar to
      systematically codify hadith in writing under the official
      patronage of the Umayyad caliph ʿUmar ibn ʿAbd al-ʿAziz ra, and
      the linchpin tabiʿi-tabiʿi narrator through whom an enormous
      portion of the canonical hadith corpus passes — died on his
      estate at Shaghb-Bada outside Medina at age about 72. Malik
      called him "the imam in hadith of his time"; al-Layth said
      "I never saw a scholar more comprehensive than al-Zuhri." His
      fixation of an organised hadith register at the caliph's
      direction is a turning point in the history of the science.
    description_ar: |
      توفي الإمام محمد بن مسلم بن شهاب الزهري — أول من دوّن الحديث تدويناً
      منهجياً بأمر الخليفة عمر بن عبد العزيز رضي الله عنه، وعمود إسناد
      جل الكتب الستة في طبقة كبار التابعين — في ضيعته بـ«شغب وبدا» على
      حدود الحجاز عن نحو اثنتين وسبعين سنة. قال عنه مالك بن أنس:
      «إمام أهل الحديث في زمانه»، وقال الليث بن سعد: «ما رأيت عالماً
      أجمع من ابن شهاب». وتقييده الديوان المنظم للحديث بأمر الخليفة
      نقطة تحول في تاريخ هذا العلم.
    description_fr: |
      Muḥammad ibn Muslim ibn Shihab al-Zuhri — le premier savant à
      codifier systématiquement le hadith par écrit sous le mécénat
      officiel du calife omeyyade ʿUmar ibn ʿAbd al-ʿAziz ra, et le
      narrateur tabiʿi-tabiʿi pivot par qui passe une part énorme du
      corpus canonique du hadith — mourut sur son domaine de Shaghb-
      Bada en dehors de Médine, à l'âge d'environ 72 ans. Malik
      l'appela « l'imam du hadith de son temps »; al-Layth dit
      « je n'ai jamais vu un savant plus exhaustif qu'al-Zuhri ». Sa
      fixation d'un registre organisé du hadith sur ordre califal
      constitue un tournant dans l'histoire de la science.
    canonical_hijri: {year: 124, month: 9, precision: month}
    canonical_gregorian: {date: 742-07-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_sad_tabaqat
      - source_key: ibn_khallikan_wafayat
