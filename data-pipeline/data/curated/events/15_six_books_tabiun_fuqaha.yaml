  - slug: death-of-sad-ibn-muadh
    category: companion
    title_en: Death of Saʿd ibn Muʿadh ra — "the Throne of the Most Merciful Shook"
    title_ar: وفاة سعد بن معاذ رضي الله عنه
    title_fr: Mort de Saʿd ibn Muʿadh ra — « le Trône du Tout-Miséricordieux a tremblé »
    description_en: |
      Saʿd ibn Muʿadh, chief of the Aws and one of the most beloved
      companions of the Prophet ﷺ, died of an arrow wound from the
      Battle of the Trench shortly after rendering the binding judgement
      on Banu Qurayza. He was about 37. The Prophet ﷺ said at his
      death: "The Throne of the Most Merciful shook for the death of
      Saʿd ibn Muʿadh" (Bukhari and Muslim). His body was carried by
      seventy thousand angels, and the Prophet ﷺ stood at his grave
      and said his bier had been "constricted by the grave for an
      instant, then released." Saʿd's conversion brought all of Banu
      ʿAbd al-Ashhal into Islam in a single day.
    description_ar: |
      توفي سعد بن معاذ رضي الله عنه — سيد الأوس وأحب الناس إلى رسول
      الله ﷺ — عن نحو سبع وثلاثين سنة، متأثراً بسهم أصابه يوم الخندق،
      وذلك بعد أن حكم في بني قريظة الحكم الذي صادف حكم الله من فوق سبع
      سماوات. قال النبي ﷺ يوم وفاته: «اهتزّ عرش الرحمن لموت سعد بن
      معاذ» (متفق عليه). وشهد جنازته سبعون ألف ملك، ووقف النبي ﷺ على
      قبره فقال: «لقد ضُمّ ضمّة ثم فُرّج عنه». وقد كان إسلامه سبباً
      في إسلام بني عبد الأشهل جميعاً في يوم واحد.
    description_fr: |
      Saʿd ibn Muʿadh, chef des Aws et l'un des compagnons les plus
      aimés du Prophète ﷺ, mourut d'une blessure par flèche reçue à la
      bataille de la Tranchée, peu après avoir rendu le jugement
      contraignant sur les Banu Qurayẓa. Il avait environ 37 ans. Le
      Prophète ﷺ dit à sa mort : « le Trône du Tout-Miséricordieux a
      tremblé pour la mort de Saʿd ibn Muʿadh » (Bukhari et Muslim).
      Soixante-dix mille anges portèrent son corps, et le Prophète ﷺ
      se tint sur sa tombe et dit que sa bière avait été « comprimée
      par la tombe un instant, puis relâchée ». La conversion de Saʿd
      avait amené tous les Banu ʿAbd al-Ashhal à l'Islam en un seul jour.
    canonical_hijri: {year: 5, month: 11, precision: month}
    canonical_gregorian: {date: 627-04-01, precision: month, method: tabular_conversion}
