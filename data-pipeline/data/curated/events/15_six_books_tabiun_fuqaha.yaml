  - slug: death-of-al-tabarani
    category: scholar
    title_en: Death of al-Hafiz al-Tabarani
    title_ar: وفاة الحافظ الطبراني
    title_fr: Mort du ḥāfiẓ al-Ṭabarani
    description_en: |
      Sulayman ibn Ahmad al-Tabarani, the foremost hadith preserver of
      his generation and author of the three monumental *Muʿjams* —
      *al-Kabir*, *al-Awsat*, and *al-Saghir* — died in Isfahan at age
      100. The *Muʿjam al-Kabir* arranges roughly 60,000 hadiths by
      Companion narrator (a sahaba-keyed concordance still essential to
      hadith research today). He travelled for thirty-three years
      collecting traditions across Egypt, the Hijaz, Yemen, the Levant,
      Iraq, and Persia. al-Dhahabi calls him "the Imam, the muhaddith
      of the world" (*imam al-dunya*).
    description_ar: |
      توفي الحافظ سليمان بن أحمد الطبراني — حافظ زمانه ومصنف المعاجم
      الثلاثة الكبرى: «الكبير» و«الأوسط» و«الصغير» — بأصبهان عن مئة سنة.
      «المعجم الكبير» مرتب على مسانيد الصحابة ويضم نحواً من ستين ألف
      حديث، وهو إلى يوم الناس مرجع لا غنى عنه في علم الحديث. طاف رحمه
      الله ثلاثاً وثلاثين سنة في طلب الحديث ما بين مصر والحجاز واليمن
      والشام والعراق وفارس. قال عنه الذهبي: «الإمام، محدث الإسلام، حافظ
      الدنيا».
    description_fr: |
      Sulayman ibn Aḥmad al-Ṭabarani, le plus grand préservateur du
      hadith de sa génération et auteur des trois monumentaux *Muʿjam*
      — *al-Kabir*, *al-Awsaṭ* et *al-Ṣaghir* — mourut à Ispahan à
      l'âge de 100 ans. Le *Muʿjam al-Kabir* organise environ 60 000
      hadiths par compagnon narrateur (concordance par sahaba qui reste
      indispensable à la recherche en hadith aujourd'hui). Il voyagea
      trente-trois ans pour rassembler des traditions à travers l'Égypte,
      le Hedjaz, le Yémen, le Levant, l'Irak et la Perse. al-Dhahabi le
      qualifie de « l'imam, le muḥaddith du monde » (*imām al-dunyā*).
    canonical_hijri: {year: 360, month: 11, day: 28, precision: day}
    canonical_gregorian: {date: 971-09-17, precision: day, method: tabular_conversion}
