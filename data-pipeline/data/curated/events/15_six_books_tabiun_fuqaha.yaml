  - slug: death-of-said-ibn-al-musayyib
    category: scholar
    title_en: Death of Saʿid ibn al-Musayyib
    title_ar: وفاة سعيد بن المسيب
    title_fr: Mort de Saʿid ibn al-Musayyib
    description_en: |
      Saʿid ibn al-Musayyib al-Makhzumi — foremost of the seven jurists
      of Medina (*al-fuqaha al-sabʿa*), son-in-law of Abu Hurayra ra,
      and the senior tabiʿi authority on hadith narration after the
      generation of Companions — died in Medina at age about 79. He was
      famous for his independence from court power: he refused to
      pledge allegiance to ʿAbd al-Malik ibn Marwan's two sons as heirs
      and was publicly flogged for it. ʿUmar ibn ʿAbd al-ʿAziz, then
      governor of Medina, declined to enter Saʿid's mosque circle out
      of deference. al-Zuhri called him "the most learned of the people"
      among the tabiʿin.
    description_ar: |
      توفي سعيد بن المسيب المخزومي — أعلم أهل المدينة في عصره وسيد
      الفقهاء السبعة، وزوج بنت أبي هريرة رضي الله عنه، وكبير التابعين
      في رواية الحديث بعد جيل الصحابة — بالمدينة المنورة عن نحو تسع
      وسبعين سنة. اشتهر باستقلاله عن السلطان، فلما بايع الناس لابنَي
      عبد الملك بن مروان بولاية العهد أبى أن يبايع، فجلده الوالي
      علناً. وكان عمر بن عبد العزيز — وهو يومئذ والي المدينة — يهاب
      أن يدخل حلقة سعيد في المسجد إجلالاً له. قال عنه الزهري: «كان
      أعلم الناس» يعني من التابعين.
    description_fr: |
      Saʿid ibn al-Musayyib al-Makhzumi — le plus éminent des sept
      jurisconsultes de Médine (*al-fuqahāʾ al-sabʿa*), gendre d'Abu
      Hurayra ra, et la plus haute autorité tabiʿi en matière de
      transmission du hadith après la génération des Compagnons —
      mourut à Médine à l'âge d'environ 79 ans. Il était célèbre pour
      son indépendance vis-à-vis du pouvoir : il refusa de prêter
      allégeance aux deux fils d'ʿAbd al-Malik ibn Marwan comme
      héritiers et fut publiquement fouetté pour cela. ʿUmar ibn
      ʿAbd al-ʿAziz, alors gouverneur de Médine, déclinait d'entrer
      dans le cercle de Saʿid à la mosquée par déférence. al-Zuhri
      le qualifia du « plus savant des hommes » parmi les tabiʿūn.
    canonical_hijri: {year: 94, precision: year}
    canonical_gregorian: {date: 712-01-01, precision: year, method: attested}
    claims:
