  - slug: death-of-abu-bakr
    category: rashidun
    title_en: Death of Abu Bakr as-Siddiq
    title_ar: وفاة أبي بكر الصديق
    title_fr: Décès d'Abū Bakr al-Ṣiddīq
    description_en: |
      The first caliph and closest companion of the Prophet ﷺ passed away in
      Madinah at age 63 after a brief illness. His two-year caliphate saw the
      successful conclusion of the Ridda wars, the beginning of the Islamic
      conquest of the Sasanian and Byzantine territories, and the first
      compilation of the Qur'an into a single mushaf under his direction.
      He was buried beside the Prophet ﷺ in the Rawda.
    description_fr: |
      Le premier calife et compagnon le plus proche du Prophète ﷺ
      mourut à Médine à l'âge de 63 ans après une brève maladie. Son
      califat de deux ans vit la conclusion victorieuse des guerres
      de Ridda, le début de l'expansion en Syrie et en Iraq, et la
      première compilation du Coran. Il fut enterré près du Prophète
      ﷺ.
    description_ar: |
      تُوفِّي أبو بكرٍ الصدِّيقُ — أوَّل الخلفاء وأقرب أصحاب النبي ﷺ —
      بالمدينة عن ثلاثٍ وستين سنةً بعد مرضٍ يسير. وقد شَهِد عهدُه
      القصيرُ (سنتان) خاتمةَ حروب الردَّة، وبدايةَ الفتوح في الشام
      والعراق، وجمعَ القرآن في المصحف الأوَّل. ودُفن إلى جوار النبي ﷺ.
    canonical_hijri: {year: 13, month: 6, day: 22, precision: day}
    canonical_gregorian: {date: 634-08-23, precision: day, method: attested}
    claims:
      - source_key: ibn_sad_tabaqat
        hijri: {year: 13, month: 6, day: 22, precision: day}
        is_canonical: true
      - source_key: tabari_tarikh
    people: [[abu-bakr-as-siddiq, died]]
    tags: [rashidun, caliph, madinah]
    verified: true

  - slug: conquest-of-jerusalem-umar
    category: conquest
    title_en: Conquest of Jerusalem by Caliph Umar
    title_ar: فتح القدس
    title_fr: Conquête de Jérusalem par le calife ʿUmar
    description_en: |
      Caliph Umar ibn al-Khattab entered Jerusalem (Iliya/Aelia) personally
      after a peaceful surrender negotiated with Patriarch Sophronius. Umar's
      covenant (al-'Uhda al-'Umariyya) guaranteed Christians the safety of their
      lives, churches, and property. He prayed at the Aqsa precinct, and notably
      refused to pray inside the Church of the Holy Sepulchre so that later
      Muslims would not convert it into a mosque.
    description_fr: |
      Le calife ʿUmar ibn al-Khaṭṭāb entra personnellement à Jérusalem
      (Iliyāʾ / Aelia) après une reddition pacifique négociée avec le
      patriarche Sophrone. Le pacte de ʿUmar (al-ʿUhda al-ʿUmariyya)
      garantissait aux chrétiens la sécurité de leurs personnes,
      biens et lieux de culte. Le calife refusa de prier dans
      l'église du Saint-Sépulcre par crainte qu'elle ne soit ensuite
      convertie en mosquée — geste préservant le lieu de culte
      chrétien.
    description_ar: |
      دخل الخليفة عمر بن الخطَّاب القدسَ (إيلياء) بنفسه بعد تسليمٍ
      سلميٍّ تفاوض عليه البطريرك صَفرونيوس. وضمنت العهدة العمريَّة
      للنصارى أنفسَهم وأموالَهم وكنائسَهم. وقد أبى عمرُ أن يصلِّيَ في
      كنيسة القيامة خشيةَ أن تُحوَّل بعده مسجدًا، حفاظًا على المعبد
      النصرانيِّ.
    canonical_hijri: {year: 16, month: 4, precision: month}
    canonical_gregorian: {date: 637-04-15, precision: month, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_athir_kamil
    people: [[umar-ibn-al-khattab, leader]]
    tags: [rashidun, conquest, jerusalem, al-aqsa]
    verified: true

  - slug: battle-of-yarmouk
    category: battle
    title_en: Battle of Yarmouk
    title_ar: معركة اليرموك
    title_fr: Bataille du Yarmūk
    description_en: |
      The decisive six-day battle between the Muslim army under Khalid ibn
      al-Walid and the Byzantine forces of Emperor Heraclius, fought along the
      Yarmouk river (modern Syria-Jordan border). The Muslim victory effectively
      ended Byzantine rule over the Levant, opening the region to Islam within
      a few years.
    description_fr: |
      Bataille décisive de six jours entre l'armée musulmane sous
      Khālid ibn al-Walīd et les forces byzantines de l'empereur
      Héraclius, livrée le long de la rivière Yarmūk (frontière
      syro-jordanienne actuelle). La victoire musulmane brisa
      irréversiblement la puissance byzantine au Levant et ouvrit la
      voie à la conquête de la Syrie, de la Palestine et de l'Égypte.
    description_ar: |
      معركةٌ فاصلةٌ دامت ستَّة أيَّامٍ بين الجيش الإسلامي بقيادة خالد
      بن الوليد والجيش البيزنطيِّ تحت الإمبراطور هرقل، على ضفاف نهر
      اليرموك (الحدود السوريَّة-الأردنيَّة اليوم). كَسَر النصرُ
      الإسلاميُّ القوَّةَ البيزنطيَّة في بلاد الشام كسرًا لا رَجعةَ
      فيه، وفُتحت الطريقُ أمام فتح الشام وفلسطين ومصر.
    canonical_hijri: {year: 15, month: 5, precision: month}
    canonical_gregorian: {date: 636-08-20, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "Six-day battle concluding on the sixth day, traditionally 20 August 636."
      - source_key: ibn_athir_kamil
    people: [[khalid-ibn-al-walid, leader]]
    tags: [rashidun, battle, byzantine, levant, khalid]
    verified: true

  - slug: battle-of-qadisiyyah
    category: battle
    title_en: Battle of al-Qadisiyyah
    title_ar: معركة القادسية
    title_fr: Bataille d'al-Qādisiyya
    description_en: |
      The decisive battle between the Muslim army under Sa'd ibn Abi Waqqas and
      the Sasanian Persian forces led by Rustam Farrukhzad. The four-day battle
      broke the military backbone of the Sasanian Empire, opening Iraq and
      subsequently Iran to Islam. Traditionally dated to late 15 AH or early 16 AH.
    description_fr: |
      Bataille décisive entre l'armée musulmane sous Saʿd ibn Abī
      Waqqāṣ et les forces sassanides perses commandées par Rustam
      Farrukhzād. La bataille de quatre jours brisa l'épine
      dorsale militaire de l'empire sassanide ; les Perses se
      retirèrent vers Ctésiphon, qui tomba peu après. La victoire
      ouvrit l'Iraq et l'Iran à l'Islam.
    description_ar: |
      معركةٌ فاصلةٌ بين الجيش الإسلامي بقيادة سعد بن أبي وقَّاص والجيش
      السَّاسانيِّ الفارسيِّ تحت رستم فرُّخْزاد. كسرت معركةُ الأيَّام
      الأربعة العمودَ الفقريَّ العسكريَّ للإمبراطوريَّة الساسانيَّة،
      فانكفأ الفُرسُ إلى المدائن (طيسفون) التي سقطت قريبًا بعدها.
      وفتح هذا النصرُ العراقَ وفارسَ أمام الإسلام.
    canonical_hijri: {year: 15, precision: year}
    canonical_gregorian: {date: 636-11-16, precision: year, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
    tags: [rashidun, battle, persia, sasanian, iraq]
    verified: true

  - slug: death-of-umar
    category: rashidun
    title_en: Martyrdom of Caliph Umar ibn al-Khattab
    title_ar: استشهاد عمر بن الخطاب
    title_fr: Martyre du calife ʿUmar ibn al-Khaṭṭāb
    description_en: |
      The second caliph was stabbed during the Fajr prayer in the Prophet's ﷺ
      mosque in Madinah by Abu Lu'lu'a al-Majusi, a Persian slave bearing a
      grievance. He died three days later after appointing a consultative
      committee (shura) of six senior Companions to choose his successor. Under
      his ten-year caliphate, the Islamic state expanded to include all of
      Arabia, the Levant, Egypt, Iraq, and much of Persia.
    description_fr: |
      Le deuxième calife fut poignardé pendant la prière du Fajr
      dans la mosquée du Prophète ﷺ à Médine par Abū Luʾluʾa
      al-Majūsī, esclave perse porteur d'un grief personnel. Il
      mourut trois jours plus tard après avoir nommé un conseil de
      six (la shūrā) pour choisir son successeur. Son califat de
      dix ans avait vu la conquête de la Syrie, de la Palestine, de
      l'Iraq, de l'Iran et de l'Égypte, et la mise en place de
      l'administration islamique.
    description_ar: |
      طُعن الخليفةُ الثاني في صلاة الفجر بمسجد النبي ﷺ بالمدينة على
      يد أبي لؤلؤة المجوسيِّ، وكان عبدًا فارسيًّا حاملًا ضغينةً.
      تُوفِّي بعد ثلاثة أيَّامٍ بعد أن جعل الأمر شُورى بين ستَّةٍ من
      الصحابة. وقد رأت خلافتُه التي امتدَّت عشرَ سنواتٍ فتحَ الشام
      وفلسطين والعراق وفارس ومصر، وتأسيس النِّظام الإداريِّ
      الإسلاميِّ.
    canonical_hijri: {year: 23, month: 12, day: 26, precision: day}
    canonical_gregorian: {date: 644-11-03, precision: day, method: attested}
    claims:
      - source_key: bukhari_sahih
        notes: "Narration of the attack during Fajr."
        is_canonical: true
      - source_key: tabari_tarikh
      - source_key: ibn_sad_tabaqat
    people: [[umar-ibn-al-khattab, killed]]
    tags: [rashidun, caliph, madinah, martyrdom]
    verified: true

  - slug: death-of-uthman
    category: rashidun
    title_en: Martyrdom of Caliph Uthman ibn Affan
    title_ar: استشهاد عثمان بن عفان
    title_fr: Martyre du calife ʿUthmān ibn ʿAffān
    description_en: |
      The third caliph was killed in his own home in Madinah by rebels who had
      besieged him for weeks. He was reading the Qur'an at the moment of his
      death, and drops of his blood are said to have fallen on the verse
      (2:137) "Allah will suffice you against them." His caliphate produced the
      standardized Uthmanic codex of the Qur'an (mushaf), which remains the
      textual basis of all printed Qur'ans.
    description_fr: |
      Le troisième calife fut tué dans sa propre maison à Médine par
      des rebelles qui l'avaient assiégé pendant des semaines. Il
      lisait le Coran au moment de sa mort, et des gouttes de son
      sang tomberaient sur le verset (2:137) : « Allah te suffira
      contre eux. » Son meurtre déclencha la Première Fitna et la
      période d'instabilité qui s'ensuivit. Sous son califat, le
      muṣḥaf ʿuthmānien fut standardisé et envoyé aux principales
      villes.
    description_ar: |
      قُتل الخليفةُ الثالثُ في بيته بالمدينة على أيدي الثُّوَّار الذين
      حاصروه أسابيعَ. كان يقرأ القرآنَ حين قُتل، ويُروى أنَّ قطراتٍ
      من دمه سقطت على الآية: «فسيكفيكهم الله» (البقرة 137:2). وأفضى
      اغتياله إلى الفتنة الكبرى الأولى وما تلاها من اضطرابٍ. وفي
      خلافته جُمع الناسُ على المصحف العثماني، فأُرسلت نُسَخُه إلى
      الأمصار.
    canonical_hijri: {year: 35, month: 12, day: 18, precision: day}
    canonical_gregorian: {date: 656-06-17, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_sad_tabaqat
    people: [[uthman-ibn-affan, killed]]
    tags: [rashidun, caliph, madinah, martyrdom, quran-codex]
    verified: true

  - slug: death-of-ali
    category: rashidun
    title_en: Martyrdom of Caliph Ali ibn Abi Talib
    title_ar: استشهاد علي بن أبي طالب
    title_fr: Martyre du calife ʿAlī ibn Abī Ṭālib
    description_en: |
      The fourth caliph was struck with a poisoned sword by the Khariji
      assassin Ibn Muljam while entering the Grand Mosque of Kufa for the
      Fajr prayer. He died two days later. His caliphate saw the first civil
      war (fitna) including the Battle of the Camel and the Battle of Siffin
      against Mu'awiya. He is buried in Najaf.
    description_fr: |
      Le quatrième calife fut frappé d'un sabre empoisonné par
      l'assassin khārijite Ibn Muljam alors qu'il entrait dans la
      Grande Mosquée de Kūfa pour la prière du Fajr. Il mourut deux
      jours plus tard. Son califat avait connu la première guerre
      civile de l'Islam — la bataille du Chameau et celle de Ṣiffīn —
      et l'apparition des Khārijites. Avec sa mort prit fin la
      période des Khulafāʾ al-Rāshidūn ; le califat passa à Muʿāwiya
      et le centre de gravité politique se déplaça à Damas.
    description_ar: |
      ضُرب الخليفةُ الرابعُ بسيفٍ مسمومٍ على يد الخارجيِّ ابن مُلجَمٍ
      وهو داخلٌ المسجدَ الجامعَ بالكوفة لصلاة الفجر. تُوفِّي بعد
      يومين. وقد عَرَفَت خلافتُه أُولى الفتن — معركةَ الجمل وصفِّين —
      وظهورَ الخوارج. وبموته انتهى عهدُ الخلفاء الراشدين؛ وانتقلت
      الخلافةُ إلى معاوية، وانتقل ثقلُ السياسة إلى دمشقَ.
    canonical_hijri: {year: 40, month: 9, day: 21, precision: day}
    canonical_gregorian: {date: 661-01-28, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_sad_tabaqat
    people: [[ali-ibn-abi-talib, killed]]
    tags: [rashidun, caliph, kufa, martyrdom, ramadan]
    verified: true

  - slug: battle-of-the-camel
    category: battle
    title_en: Battle of the Camel (Jamal)
    title_ar: معركة الجمل
    title_fr: Bataille du Chameau (al-Jamal)
    description_en: |
      The first battle of the First Fitna, fought outside Basra between the
      forces of Caliph Ali and a coalition led by Aisha, Talha, and al-Zubayr
      who demanded retribution for the assassination of Uthman. The battle was
      named for the camel upon which Aisha observed the fighting. Ali's
      victory consolidated his caliphate but the civil wars would continue.
    description_fr: |
      Première bataille de la Première Fitna, livrée à l'extérieur de
      Baṣra entre les forces du calife ʿAlī et une coalition dirigée
      par ʿĀʾisha, Ṭalḥa et al-Zubayr qui réclamaient justice pour
      l'assassinat de ʿUthmān. La bataille tira son nom du chameau
      monté par ʿĀʾisha au centre du champ. Ṭalḥa et al-Zubayr
      tombèrent ; ʿĀʾisha fut traitée avec respect et raccompagnée
      à Médine. Les sources sunnites considèrent l'épisode comme
      une tragédie sans qualifier les protagonistes.
    description_ar: |
      أوَّل معارك الفتنة الكبرى الأولى، وقعت قرب البصرة بين جند
      الخليفة عليٍّ وتحالفٍ بقيادة عائشةَ وطلحةَ والزبير، مطالبين
      بالقصاص من قَتَلَة عثمانَ. سُمِّيت بذلك لجَمَل عائشةَ في وسط
      المعركة. قُتل طلحةُ والزبيرُ، وأُكرمت أمُّ المؤمنين عائشةُ
      ورُدَّت إلى المدينة. وتعدُّ المصادر السنيَّة هذه الحادثة
      مأساةً، دون تجريح الأعلام فيها.
    canonical_hijri: {year: 36, month: 6, day: 10, precision: day}
    canonical_gregorian: {date: 656-12-08, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
    people: [[ali-ibn-abi-talib, leader]]
    tags: [rashidun, fitna, basra]
    verified: true

