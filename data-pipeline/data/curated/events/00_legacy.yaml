  - slug: fall-of-constantinople
    category: conquest
    title_en: Conquest of Constantinople (Istanbul)
    title_ar: فتح القسطنطينية
    title_fr: Conquête de Constantinople (Istanbul)
    description_en: |
      After a 53-day siege, Sultan Mehmed II — thereafter called al-Fatih ("the
      Conqueror") — entered Constantinople, ending the 1,123-year-old Eastern
      Roman Empire. The twenty-one-year-old sultan entered Hagia Sophia and
      prayed the first Jumu'ah prayer there the following Friday. The event
      fulfilled a hadith narrated in the Musnad of Ahmad: "Constantinople
      will surely be conquered; what an excellent commander her commander, and
      what an excellent army that army." The city would become the capital
      of the Ottoman Empire for the next 470 years.
    description_fr: |
      Après un siège de 53 jours, le sultan Meḥmed II — désormais
      appelé al-Fātiḥ (« le Conquérant ») — entra à Constantinople,
      mettant fin à 1 123 ans d'Empire romain d'Orient. Le sultan
      de vingt-et-un ans entra à Hagia Sophia le jour même et
      ordonna sa conversion en mosquée — fonction qu'elle occupa
      jusqu'à ce qu'Atatürk en fît un musée en 1934 ; elle fut
      reconvertie en mosquée en 2020. La conquête fit de la ville
      la capitale de l'Empire ottoman pour les 470 années suivantes.
    description_ar: |
      بعد حصارٍ دام ثلاثةً وخمسين يومًا، دخل السلطانُ محمَّد الثاني —
      الذي عُرف من ذلك الحين بالفاتح — القسطنطينيَّةَ، فأنهى ثلاثةً
      وعشرين بعد المئةِ والألفِ سنةً من الإمبراطوريَّة الرومانيَّة
      الشَّرقيَّة. دَخَل السلطانُ ابنُ الواحدة والعشرين كنيسةَ آيا
      صوفيا في يومه، وأمر بتحويلها مسجدًا — وهي وظيفةٌ ظلَّت عليها
      حتى جعلها أتاتورك متحفًا سنة 1934، ثم أُعِيدت مسجدًا سنة 2020.
      وصارت المدينةُ بهذا الفتح عاصمةَ الدولة العثمانيَّة لأربعةٍ
      وسبعين بعد الأربعمئةِ سنة.
    canonical_hijri: {year: 857, month: 4, day: 20, precision: day}
    canonical_gregorian: {date: 1453-05-29, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[mehmed-ii, leader]]
    tags: [ottoman, conquest, constantinople, istanbul, al-fatih, hadith-fulfillment]
    verified: true

  - slug: battle-of-mohacs
    category: battle
    title_en: Battle of Mohács
    title_ar: معركة موهاكس
    title_fr: Bataille de Mohács
    description_en: |
      Sultan Suleiman the Magnificent decisively defeated the Hungarian army
      of King Louis II at Mohács in southern Hungary, killing the king and
      much of the Hungarian nobility. The victory brought most of Hungary
      under Ottoman rule and opened the path to the first Siege of Vienna
      three years later. It marks the Ottoman high-water mark in central
      Europe.
    description_fr: |
      Le sultan Soliman le Magnifique défit de manière décisive
      l'armée hongroise du roi Louis II à Mohács, dans le sud de la
      Hongrie, tuant le roi et la majeure partie de la noblesse
      hongroise. La victoire amena la majeure partie de la Hongrie
      sous administration ottomane pendant un siècle et demi et fit
      des Habsbourg les voisins occidentaux directs des Ottomans —
      fixant la frontière qui définirait la diplomatie européenne
      des trois siècles suivants.
    description_ar: |
      هَزَم السلطانُ سليمانُ القانونيُّ الجيشَ المجريَّ تحت الملك
      لُوي الثاني في موهاكسَ بجنوب المجر هزيمةً ساحقةً، فقُتل الملك
      ومعظم نُبلاء المجر. وأَدَّى النصرُ إلى ضمِّ معظم المجر إلى
      الإدارة العثمانيَّة قرنًا ونصفًا، وجعل آلَ هابسبورغ جيرانَ
      العثمانيِّين الغربيِّين المباشرين — فثَبَّتت الحدودَ التي
      ستحدِّد الدبلوماسيَّةَ الأوروبيَّةَ ثلاثةَ قرون.
    canonical_hijri: {year: 932, month: 12, day: 21, precision: day}
    canonical_gregorian: {date: 1526-08-29, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[suleiman-the-magnificent, leader]]
    tags: [ottoman, battle, hungary, suleiman]
    verified: true

  - slug: death-of-suleiman
    category: caliph_event
    title_en: Death of Sultan Suleiman the Magnificent
    title_ar: وفاة السلطان سليمان القانوني
    title_fr: Décès du sultan Soliman le Magnifique
    description_en: |
      Suleiman I — known in the West as "the Magnificent" and to his subjects
      as "al-Qanuni" (the Lawgiver) for his codification of Ottoman law — died
      during the siege of Szigetvár in Hungary. Under his 46-year reign the
      Ottoman Empire reached its zenith in wealth, territorial extent, and
      cultural achievement. His death was concealed for weeks so the campaign
      could continue.
    description_fr: |
      Soliman Iᵉʳ — connu en Occident comme « le Magnifique » et
      auprès de ses sujets comme al-Qānūnī (« le Législateur ») pour
      sa codification du droit ottoman — mourut durant le siège de
      Szigetvár en Hongrie. Sous son règne de 46 ans, l'Empire
      ottoman atteignit sa plus grande extension géographique et son
      apogée culturel : architecture sinanienne, codification
      juridique, et littérature classique. Sa mort fut tenue secrète
      pendant plusieurs semaines pour préserver le moral de l'armée.
    description_ar: |
      تُوفِّي السلطانُ سليمانُ الأوَّل — الذي عُرف في الغرب
      بـ«العظيم»، وعند رعيَّته بالقانونيِّ لتدوينه التشريعَ العثمانيَّ —
      في حصار مدينة سيغيتفار بالمجر. وفي عهده الذي امتدَّ ستًّا
      وأربعين سنةً بلغت الدولةُ العثمانيَّةُ أقصى اتِّساعها الجغرافيِّ
      وذِروَتها الثقافيَّة: عمارةُ سنانٍ، وتدوينُ القانون، والأدبُ
      الكلاسيكيُّ العثمانيُّ. كُتم نبأُ موته أسابيعَ إبقاءً على معنويَّات
      الجيش.
    canonical_hijri: {year: 974, month: 4, day: 21, precision: day}
    canonical_gregorian: {date: 1566-09-06, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[suleiman-the-magnificent, died]]
    tags: [ottoman, sultan, hungary]
    verified: true

  - slug: death-of-suyuti
    category: scholar_death
    title_en: Death of Imam al-Suyuti
    title_ar: وفاة الإمام السيوطي
    title_fr: Décès de l'imam al-Suyūṭī
    description_en: |
      One of the most prolific Muslim scholars of all time, credited with
      approximately 600 works across tafsir, hadith, fiqh, Arabic language,
      and history — including the "Tafsir al-Jalalayn" (co-authored with his
      teacher al-Mahalli), "al-Itqan fi Ulum al-Qur'an," and "Tarikh al-
      Khulafa'." He spent his final decades in seclusion on Rawda Island in
      the Nile, refusing all company and visitors.
    description_fr: |
      L'un des savants musulmans les plus prolifiques de l'histoire,
      à qui l'on attribue environ 600 ouvrages couvrant le tafsīr,
      le ḥadīth, le fiqh, la langue arabe et l'histoire — y compris
      le « Tafsīr al-Jalālayn » (coécrit avec son maître al-Maḥallī).
      Il se retira à 40 ans dans son ermitage du Caire (Rawḍat
      al-Miqyās), refusant toute charge officielle. Il mourut au
      Caire à 60 ans.
    description_ar: |
      من أكثر علماء المسلمين تأليفًا في التاريخ، نُسب إليه نحو ستِّ
      مئة مصنَّفٍ في التفسير والحديث والفقه واللغة العربيَّة
      والتاريخ — منها «تفسير الجلالَين» مع شيخه المحلِّي. اعتزل في
      الأربعين من عمره في خَلوته بروضة المقياس بالقاهرة، رافضًا
      كلَّ منصبٍ رسميٍّ. تُوفِّي بالقاهرة عن ستِّين سنة.
    canonical_hijri: {year: 911, month: 10, day: 19, precision: day}
    canonical_gregorian: {date: 1505-10-17, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[as-suyuti, died]]
    tags: [mamluk-ottoman, scholar, cairo, egypt]
    verified: true
