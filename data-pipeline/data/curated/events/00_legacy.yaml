  - slug: founding-of-baghdad
    category: founding
    title_en: Founding of Baghdad (Madinat al-Salam)
    title_ar: تأسيس بغداد
    title_fr: Fondation de Bagdad (Madīnat al-Salām)
    description_en: |
      Caliph al-Mansur laid the foundations of his new round capital "City of
      Peace" (Madinat al-Salam) on the west bank of the Tigris. Designed by
      astrologers and engineers as a perfect circle, the city would grow over
      the next century into the intellectual capital of the medieval world,
      home to the House of Wisdom (Bayt al-Hikma) and the center of the
      Abbasid golden age.
    description_fr: |
      Le calife al-Manṣūr posa les fondations de sa nouvelle capitale
      ronde, « Cité de la Paix » (Madīnat al-Salām), sur la rive
      ouest du Tigre. Conçue par des astrologues et des ingénieurs
      comme un cercle parfait, la ville deviendrait le centre du
      commerce, de la science et de la théologie islamiques pendant
      cinq siècles. À son apogée sous Hārūn al-Rashīd et al-Maʾmūn,
      elle abritait peut-être un million d'habitants — la plus grande
      ville du monde à son époque.
    description_ar: |
      وَضَع الخليفةُ المنصورُ أسسَ عاصمته الجديدة المدوَّرة «مدينةَ
      السلام» على الضفَّة الغربيَّة من دجلة. صَمَّمها المنجِّمون
      والمهندسون دائرةً تامَّة الاستدارة، وستصير بعد ذلك مركزَ
      التجارة والعلم والكلام في العالم الإسلامي خمسةَ قرون. وفي
      ذِروتها زمن هارون الرشيد والمأمون كان عددُ سكَّانها قد يبلغ
      مليون نسمةٍ — أكبرَ مدن العالم في عصرها.
    canonical_hijri: {year: 145, month: 5, day: 2, precision: day}
    canonical_gregorian: {date: 762-07-30, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_athir_kamil
    people: [[al-mansur-abbasid, leader]]
    tags: [abbasid, baghdad, founding, madinat-al-salam]
    verified: true

  - slug: death-of-abu-hanifa
    category: scholar_death
    title_en: Death of Imam Abu Hanifa al-Nu'man
    title_ar: وفاة الإمام أبي حنيفة
    title_fr: Décès de l'imam Abū Ḥanīfa al-Nuʿmān
    description_en: |
      Eponym of the Hanafi madhhab and the earliest of the four great Sunni
      imams, Abu Hanifa died in Baghdad — reportedly in prison after refusing
      the position of chief judge offered by Caliph al-Mansur. He is buried in
      the al-A'zamiyya district of Baghdad, where a shrine bearing his name
      was later built by Seljuk patronage.
    description_fr: |
      Éponyme du madhhab ḥanafite et le plus ancien des quatre grands
      imams sunnites, Abū Ḥanīfa mourut à Bagdad — selon les rapports
      en prison, après avoir refusé le poste de juge en chef offert
      par le calife al-Manṣūr. Ses positions juridiques, conservées
      et étendues par ses étudiants Abū Yūsuf et al-Shaybānī,
      deviendraient le madhhab des califats ottoman et moghol et la
      tradition la plus suivie de l'Islam aujourd'hui.
    description_ar: |
      تُوفِّي إمامُ المذهب الحنفيِّ، أَقدمُ الأئمَّة السنِّيِّين
      الأربعةِ، ببغدادَ — وقد رُويَ أنَّه مات في السجن بعد امتناعه
      عن قضاء المنصور. ونقل اجتهاداتِه أصحابُه أبو يوسفَ ومحمَّدُ بنُ
      الحسن الشيبانيِّ، فصارت المذهبَ الرسميَّ للدولتَين العثمانيَّة
      والمغوليَّة (المغول الكبار)، وأكثرَ المذاهب أتباعًا في عالم
      اليوم.
    canonical_hijri: {year: 150, precision: year}
    canonical_gregorian: {date: 767-06-15, precision: year, method: reconstructed}
    claims:
      - source_key: dhahabi_siyar
        hijri: {year: 150, precision: year}
        is_canonical: true
      - source_key: openiti
        hijri: {year: 150, precision: year}
        notes: "AuthorID 0150AbuHanifa."
    people: [[abu-hanifa, died]]
    tags: [abbasid, scholar, baghdad, madhhab, hanafi]
    verified: true

  - slug: death-of-malik
    category: scholar_death
    title_en: Death of Imam Malik ibn Anas
    title_ar: وفاة الإمام مالك بن أنس
    title_fr: Décès de l'imam Mālik ibn Anas
    description_en: |
      Eponym of the Maliki madhhab and author of "al-Muwatta'" — the earliest
      surviving book of Islamic law and one of the foundations of hadith
      literature. He spent his entire life in Madinah, where his school of law
      was rooted in the practice (amal) of its people. He is buried in the
      Baqi' cemetery in Madinah.
    description_fr: |
      Éponyme du madhhab mālikite et auteur d'al-Muwaṭṭaʾ — le plus
      ancien livre de droit islamique conservé et l'une des bases de
      la littérature ḥadīthique. Il passa toute sa vie à Médine, où
      ses étudiants vinrent du monde islamique entier. Il fut
      publiquement fouetté par le gouverneur abbasside pour avoir
      émis une fatwa à laquelle le calife s'opposait — incident qui
      renforça plutôt qu'il ne diminua son autorité.
    description_ar: |
      إمامُ المذهب المالكيِّ، صاحبُ «الموطَّأ» — أقدم كتب الفقه
      الإسلاميِّ المحفوظة وأحد أُصول كتب الحديث. أقام طُولَ عمره
      بالمدينة، يقصد إليه طلَّاب العلم من سائر الأقطار. ضُرب علنيًّا
      بأمر الوالي العبَّاسيِّ بسبب فتوى عارضت الخليفةَ — وكانت هذه
      الحادثةُ سببَ رسوخ مكانته لا تَهَتُّكها.
    canonical_hijri: {year: 179, month: 3, precision: month}
    canonical_gregorian: {date: 795-06-15, precision: month, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        hijri: {year: 179, month: 3, precision: month}
