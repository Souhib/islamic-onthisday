        notes: "Month Rabi' al-Awwal."
      - source_key: openiti
        hijri: {year: 179, precision: year}
        notes: "AuthorID 0179MalikIbnAnas."
    people: [[malik-ibn-anas, died]]
    tags: [abbasid, scholar, madinah, madhhab, maliki, muwatta]
    verified: true

  - slug: death-of-harun-al-rashid
    category: caliph_event
    title_en: Death of Caliph Harun al-Rashid
    title_ar: وفاة هارون الرشيد
    title_fr: Décès du calife Hārūn al-Rashīd
    description_en: |
      The fifth Abbasid caliph, under whose reign the Islamic empire reached
      the peak of its wealth and cultural prestige, died in Tus (near Mashhad
      in modern Iran) while on a military campaign. His reign corresponded to
      the formative decades of the House of Wisdom and the flourishing of
      scholars like Imam al-Shafi'i in Baghdad.
    description_fr: |
      Le cinquième calife abbasside, sous le règne duquel l'empire
      islamique atteignit le sommet de sa richesse et de son prestige
      culturel, mourut à Ṭūs (près de Mashhad dans l'Iran moderne)
      lors d'une campagne militaire. Son règne couvre l'âge d'or des
      Mille et une nuits — et sa division du domaine entre ses fils
      al-Amīn et al-Maʾmūn provoqua la guerre civile abbasside qui
      fragiliserait le califat à long terme.
    description_ar: |
      خامسُ الخلفاء العبَّاسيِّين، الذي بلغت الدولةُ الإسلاميَّةُ في
      عهده ذروةَ ثرائها وسؤددها الثقافيِّ، تُوفِّي بطُوسَ (قرب
      مَشهدَ في إيرانَ اليوم) في حملةٍ عسكريَّةٍ. وعهدُه هو زمنُ
      العصر الذهبيِّ — زمنُ ألف ليلةٍ وليلة. وقد أَدَّى تقسيمُه
      الدولةَ بين ولدَيه الأمين والمأمون إلى الفتنة العبَّاسيَّة التي
      أَوْهَنت الخلافةَ مديدًا.
    canonical_hijri: {year: 193, month: 3, day: 3, precision: day}
    canonical_gregorian: {date: 809-03-24, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_athir_kamil
    people: [[harun-al-rashid, died]]
    tags: [abbasid, caliph, khorasan]
    verified: true

  - slug: death-of-shafii
    category: scholar_death
    title_en: Death of Imam al-Shafi'i
    title_ar: وفاة الإمام الشافعي
    title_fr: Décès de l'imam al-Shāfiʿī
    description_en: |
      Eponym of the Shafi'i madhhab and founder of Islamic legal theory (usul
      al-fiqh) through his landmark work "al-Risala." He died in Fustat
      (Old Cairo) on the last day of Rajab. His tomb at al-Qarafa cemetery in
      Cairo has been a site of visitation for over a millennium.
    description_fr: |
      Éponyme du madhhab shāfiʿite et fondateur de la science des
      fondements du droit (uṣūl al-fiqh) à travers son œuvre marquante
      « al-Risāla ». Il mourut à Fusṭāṭ (Vieux Caire) le dernier jour
      de Rajab. Sa tombe à al-Qarāfa devint un centre majeur de
      visite ; un mausolée fut construit au-dessus d'elle par les
      Ayyoubides au XIIIᵉ siècle. Son madhhab prédomine en Égypte, au
      Levant, en Asie du Sud-Est et dans les régions côtières
      africaines.
    description_ar: |
      إمامُ المذهب الشافعيِّ، ومؤسِّسُ علم أصول الفقه بكتابه «الرسالة».
      تُوفِّي بالفسطاط (مصرَ القديمة) في آخر رجبٍ. وصار قبرُه بالقرافة
      مَزارًا عظيمًا، أقام عليه الأيُّوبيُّون قُبَّةً في القرن الثالث
      عشر الميلاديِّ. ومذهبُه هو الراجح في مصر والشام وجنوب شرقي
      آسيا والمناطق السَّاحليَّة في إفريقيَّةَ.
    canonical_hijri: {year: 204, month: 7, day: 30, precision: day}
    canonical_gregorian: {date: 820-01-20, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        hijri: {year: 204, month: 7, day: 30, precision: day}
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
    people: [[ash-shafii, died]]
    tags: [abbasid, scholar, fustat, cairo, madhhab, shafii, usul-al-fiqh]
    verified: true

  - slug: death-of-ahmad-ibn-hanbal
    category: scholar_death
    title_en: Death of Imam Ahmad ibn Hanbal
    title_ar: وفاة الإمام أحمد بن حنبل
    title_fr: Décès de l'imam Aḥmad ibn Ḥanbal
    description_en: |
      Eponym of the Hanbali madhhab and the most prolific hadith-collecting
      imam among the four — his "Musnad" contains approximately 27,000
      hadiths. He famously endured imprisonment and flogging during the Mihna
      (inquisition) under three Abbasid caliphs over the question of the
      createdness of the Qur'an, refusing to recant. He is buried in Baghdad.
    description_fr: |
      Éponyme du madhhab ḥanbalite et le plus prolifique compilateur
      de ḥadīth parmi les quatre imams — son « Musnad » contient
      environ 27 000 ḥadīths. Il endura la prison et la flagellation
      durant la Miḥna mu'tazilite pour avoir refusé de souscrire à la
      doctrine de la « création du Coran ». Sa fermeté en fit
      l'icône des Ahl al-Sunna ; sa mort à Bagdad fut suivie par des
      funérailles auxquelles, selon les rapports, des centaines de
      milliers de personnes assistèrent.
    description_ar: |
      إمامُ المذهب الحنبليِّ، وأوسعُ الأئمَّة الأربعة جمعًا للحديث —
      مسندُه يحوي نحو سبعةٍ وعشرين ألف حديثٍ. صبر على السجن والجلد
      في محنة خلق القرآن لرفضه القولَ بخلق القرآن. وثَبَّت موقفُه
      مكانتَه عَلَمًا لأهل السنَّة والجماعة. ومات ببغدادَ، فشيَّعه —
      كما تَذكُر المصادر — مئاتُ الألوف.
    canonical_hijri: {year: 241, month: 3, day: 12, precision: day}
    canonical_gregorian: {date: 855-07-31, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        hijri: {year: 241, month: 3, day: 12, precision: day}
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: openiti
        hijri: {year: 241, precision: year}
    people: [[ahmad-ibn-hanbal, died]]
    tags: [abbasid, scholar, baghdad, madhhab, hanbali, mihna]
    verified: true

  - slug: death-of-bukhari
    category: scholar_death
    title_en: Death of Imam al-Bukhari
    title_ar: وفاة الإمام البخاري
    title_fr: Décès de l'imam al-Bukhārī
    description_en: |
      Author of "al-Jami' al-Sahih" — the most rigorously authenticated hadith
      collection in Sunni Islam. He compiled his Sahih from approximately
      600,000 narrations over 16 years. He died in Khartank near Samarqand on
      the night of Eid al-Fitr, 1 Shawwal 256 AH. His Sahih remains the most
      authoritative book in Islam after the Qur'an itself.
    description_fr: |
      Auteur d'« al-Jāmiʿ al-Ṣaḥīḥ » — la collection de ḥadīths la
      plus rigoureusement authentifiée de l'Islam sunnite. Il compila
      son Ṣaḥīḥ à partir d'environ 600 000 narrations sur 16 ans. Il
      mourut à Khartank près de Samarcande après avoir été contraint
      de quitter Nīshāpūr puis Bukhārā à la suite de tensions avec
      les autorités locales. Son corps aurait dégagé un parfum durant
      des jours. Sa tombe à Khartank reste un sanctuaire majeur en
      Asie centrale.
    description_ar: |
      صاحبُ «الجامع الصحيح»، أَدَقِّ كتب الحديث في أهل السنَّة. جَمَع
      صحيحَه من نحو ستِّ مئة ألف حديثٍ خلال ستَّ عشرة سنةً. تُوفِّي
      بخَرتَنكَ قُرب سمرقندَ بعد أن أُلجِئَ إلى مغادرة نيسابورَ ثم
      بخارى لخلافٍ مع الولاة. ويُروى أنَّ جسده فاحت منه رائحةُ المسك
      أيَّامًا. ولا يزال قبرُه بخرتنك من أعظم المزارات في آسيا الوسطى.
    canonical_hijri: {year: 256, month: 10, day: 1, precision: day}
    canonical_gregorian: {date: 870-09-01, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        hijri: {year: 256, month: 10, day: 1, precision: day}
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: openiti
        hijri: {year: 256, precision: year}
    people: [[al-bukhari, died]]
    tags: [abbasid, scholar, muhaddith, sahih, samarqand]
    verified: true

  - slug: death-of-muslim
    category: scholar_death
    title_en: Death of Imam Muslim ibn al-Hajjaj
    title_ar: وفاة الإمام مسلم
    title_fr: Décès de l'imam Muslim ibn al-Ḥajjāj
    description_en: |
      Author of "Sahih Muslim" — ranked alongside Sahih al-Bukhari as the most
      authentic hadith collection. He was a student of al-Bukhari and spent
      fifteen years compiling approximately 7,500 hadiths (with repetitions)
      from an initial pool of 300,000. He died in Nishapur at age 55.
    description_fr: |
      Auteur de « Ṣaḥīḥ Muslim » — classé aux côtés de Ṣaḥīḥ
      al-Bukhārī comme la collection ḥadīthique la plus authentique.
      Élève d'al-Bukhārī, il passa quinze ans à compiler environ
      7 500 ḥadīths (avec leurs chaînes — ~3 000 hadiths uniques). Il
      mourut à Nīshāpūr ; son tombeau y a perduré et fut restauré
      plusieurs fois.
    description_ar: |
      صاحبُ «صحيح مسلمٍ»، الذي رُتِّب عند الجمهور قرين «صحيح
      البخاريِّ» في الصِّحَّة. كان من تلامذة البخاريِّ، وقضى خمسَ
      عشرة سنةً في تأليف صحيحه الذي يضمُّ نحو سبعةِ آلافٍ وخمسِ
      مئة حديثٍ بأسانيدها. تُوفِّي بنيسابورَ، وما زال قبرُه فيها
      ورُمِّمَ مرَّاتٍ.
    canonical_hijri: {year: 261, month: 5, day: 25, precision: day}
    canonical_gregorian: {date: 875-05-07, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        hijri: {year: 261, month: 5, day: 25, precision: day}
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: openiti
        hijri: {year: 261, precision: year}
    people: [[muslim-ibn-al-hajjaj, died]]
    tags: [abbasid, scholar, muhaddith, sahih, nishapur]
    verified: true

  - slug: death-of-tirmidhi
    category: scholar_death
    title_en: Death of Imam al-Tirmidhi
    title_ar: وفاة الإمام الترمذي
    title_fr: Décès de l'imam al-Tirmidhī
    description_en: |
      Author of "al-Jami'" (Sunan al-Tirmidhi) — one of the six canonical
      hadith collections. He pioneered the systematic classification of
      hadith by legal strength (sahih, hasan, da'if) and the documentation
      of the legal positions of the madhhabs after each hadith. He went
      blind in his later years and died in Bugh, Khorasan.
    description_fr: |
      Auteur d'« al-Jāmiʿ » (Sunan al-Tirmidhī) — l'une des six
      collections canoniques de ḥadīth. Il fut pionnier de la
      classification systématique des ḥadīths par force juridique
      (ṣaḥīḥ, ḥasan, ḍaʿīf) et de la documentation des opinions des
      Compagnons et des juristes-suivants. Étudiant d'al-Bukhārī et
      auteur prolifique, il devint aveugle à la fin de sa vie et
      mourut à Tirmidh dans l'actuel Tadjikistan-Ouzbékistan.
    description_ar: |
      صاحبُ «الجامع» (سنن الترمذيِّ)، وهو من الكتب الستَّة. كان رائدًا
      في التصنيف المنهجيِّ للحديث بحسب القوَّة (صحيح، حسن، ضعيف)
      وفي توثيق آراء الصحابة والتابعين. تتلمذ على البخاريِّ وكثُرت
      تصانيفه. كُفَّ بصرُه آخر عمره، وتُوفِّي بترمذَ في حدود طاجيكستان
      وأوزبكستان اليوم.
    canonical_hijri: {year: 279, month: 12, day: 13, precision: day}
    canonical_gregorian: {date: 892-10-08, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
    people: [[at-tirmidhi, died]]
    tags: [abbasid, scholar, muhaddith, khorasan]
    verified: true

  - slug: death-of-tabari
    category: scholar_death
    title_en: Death of Imam al-Tabari
    title_ar: وفاة الإمام الطبري
    title_fr: Décès de l'imam al-Ṭabarī
    description_en: |
      Author of "Tarikh al-Rusul wa'l-Muluk" — the foundational history of
      Islam and the prophets — and "Jami' al-Bayan," one of the most
      comprehensive classical tafsirs of the Qur'an. A polymath who founded
      his own short-lived madhhab (the Jariri school), he died in Baghdad at
      approximately 86 years of age.
    description_fr: |
      Auteur de « Tārīkh al-Rusul wa-l-Mulūk » — l'histoire fondatrice
      de l'Islam et des prophètes — et de « Jāmiʿ al-Bayān », l'un
      des tafsīr classiques les plus complets du Coran. Polymathe qui
      fonda son propre madhhab juridique (le ṭabarite, qui ne survécut
      pas plusieurs siècles), il vécut et mourut à Bagdad. Ses
      œuvres, particulièrement le Tafsīr et l'Histoire, restent des
      sources premières indispensables au savoir islamique classique.
    description_ar: |
      صاحبُ «تاريخ الرُّسُل والملوك»، التاريخِ الأمِّ للإسلام والأنبياء،
      و«جامع البيان» من أوسع تفاسير القرآن الكلاسيكيَّة. كان ذا
      علومٍ متعدِّدةٍ، وأسَّس مذهبًا فقهيًّا (الطبريَّ) لم يُعَمَّر
      قرونًا. عاش ومات ببغدادَ. ولا يزال «التفسير» و«التاريخ» من
      أهمِّ المصادر الأوَّليَّة للعلوم الإسلاميَّة الكلاسيكيَّة.
    canonical_hijri: {year: 310, month: 10, day: 28, precision: day}
    canonical_gregorian: {date: 923-02-17, precision: day, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: openiti
        hijri: {year: 310, precision: year}
    people: [[at-tabari, died]]
    tags: [abbasid, scholar, baghdad, historian, mufassir]
    verified: true

  # =========================================================================
  # FATIMID AND NORTH AFRICA
  # =========================================================================

  - slug: founding-of-qarawiyyin
    category: founding
    title_en: Founding of al-Qarawiyyin University
    title_ar: تأسيس جامعة القرويين
    title_fr: Fondation de l'université al-Qarawiyyīn
    description_en: |
      Fatima al-Fihri, a woman of Tunisian origin living in Fez, endowed the
      mosque and teaching institution that would become al-Qarawiyyin — the
      oldest continuously operating university in the world according to UNESCO
      and the Guinness World Records. It remains active today.
    description_fr: |
      Fāṭima al-Fihrī, femme d'origine tunisienne vivant à Fès, dota
      la mosquée et l'institution d'enseignement qui deviendraient
      al-Qarawiyyīn — la plus ancienne université en activité
      continue au monde selon l'UNESCO et le Guinness. Des savants
      y enseignèrent qui marquèrent la civilisation : le philosophe
      juif Maïmonide, le pape Sylvestre II (Gerbert d'Aurillac), Ibn
      Khaldūn, et d'autres.
    description_ar: |
      أَوقَفَتْ فاطمةُ الفِهْريَّةُ — وهي من أصلٍ تونسيٍّ نازلةٍ بفاسٍ —
      المسجدَ ومدرسةَ التعليم اللذَين سيصيران جامعةَ القرويِّين،
      أَقدمَ جامعةٍ تُمارِسُ نشاطَها في العالم باعترافِ اليونسكو
      ومَوسوعةِ غينيس. درس فيها أعلامٌ من حضاراتٍ شتَّى: الفيلسوفُ
      اليهوديُّ ابنُ ميمونَ (موسى بنُ ميمون)، والبابا سيلفستر الثاني
      (جربرت أوريلاكَ)، وابنُ خلدونٍ، وغيرهم.
    canonical_hijri: {year: 245, precision: year}
    canonical_gregorian: {date: 859-06-15, precision: year, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    tags: [north-africa, founding, morocco, fez, qarawiyyin, knowledge]
    verified: true

  - slug: founding-of-cairo
    category: founding
    title_en: Founding of al-Qahira (Cairo)
    title_ar: تأسيس القاهرة
    title_fr: Fondation d'al-Qāhira (Le Caire)
    description_en: |
      The Fatimid general Jawhar al-Siqilli laid the foundations of a new
      capital north of the existing administrative city of Fustat. The new
      city was named al-Qahira — "the Victorious" — after the planet Mars
      (al-Qahir) which was ascendant at the moment of founding. Within three
      years al-Azhar mosque would be built within its walls.
    description_fr: |
      Le général fatimide Jawhar al-Ṣiqillī posa les fondations d'une
      nouvelle capitale au nord de la cité administrative existante
      de Fusṭāṭ. La ville fut nommée al-Qāhira — « la Victorieuse » —
      d'après la planète Mars (al-Qāhir) qui dominait au moment du
      tracé. Le Caire serait la capitale de l'Égypte islamique pour
      les mille ans suivants, sous Fatimides, Ayyoubides, Mamlouks et
      Ottomans.
    description_ar: |
      وَضَع القائدُ الفاطميُّ جوهرٌ الصِّقِلِّيُّ أُسسَ عاصمةٍ جديدةٍ
      إلى الشَّمال من مدينة الفسطاط الإداريَّة. وسُمِّيت المدينةُ
      «القاهرةَ» نسبةً إلى المرِّيخ (القاهر) الذي كان طالعًا حين
      تخطيطها. وستظلُّ القاهرةُ عاصمةَ مصر الإسلاميَّة ألفَ سنةٍ
      تباعًا، تحت الفاطميِّين والأيُّوبيِّين والمماليك والعثمانيِّين.
    canonical_hijri: {year: 358, month: 8, day: 17, precision: day}
    canonical_gregorian: {date: 969-07-06, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    tags: [fatimid, founding, cairo, egypt]
    verified: true

  - slug: founding-of-al-azhar
    category: founding
    title_en: Founding of al-Azhar Mosque
    title_ar: تأسيس الجامع الأزهر
    title_fr: Fondation de la mosquée al-Azhar
    description_en: |
      Al-Azhar — "the most resplendent" — was founded by the Fatimids in their
      new capital Cairo. By the late eleventh century it had developed from a
      Friday mosque into a teaching institution, and after Saladin's reconquest
      of Egypt it became (and remains) the most prominent center of Sunni
      religious learning in the world.
    description_fr: |
      Al-Azhar — « la plus resplendissante » — fut fondée par les
      Fatimides dans leur nouvelle capitale du Caire. À la fin du
      XIᵉ siècle elle s'était développée d'une mosquée du vendredi
      en institution d'enseignement, et après le retour de l'Égypte
      au sunnisme par Saladin, elle devint l'institution sunnite la
      plus prestigieuse de la planète — fonction qu'elle remplit
      depuis plus de mille ans.
    description_ar: |
      أُسِّس الجامعُ الأزهرُ — «الأكثرُ بهاءً» — على يد الفاطميِّين في
      عاصمتهم الجديدة القاهرة. وأَوْشَك أن يصير في أواخر القرن الحادي
      عشر مؤسَّسةً تعليميَّةً بعد أن كان مجرَّد جامعٍ للجمعة. ومنذ
      إعادة صلاحِ الدِّينِ مصرَ إلى أهل السنَّة، بات الأزهرُ أهمَّ
      المؤسَّسات السنِّيَّة في العالم — ومنذ ذلك الحين وهو على هذا
      العهد لأكثر من ألف سنة.
    canonical_hijri: {year: 361, month: 8, precision: month}
    canonical_gregorian: {date: 972-06-22, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    tags: [fatimid, founding, cairo, al-azhar, knowledge]
    verified: true

  # =========================================================================
  # AL-ANDALUS
  # =========================================================================

  - slug: abd-al-rahman-i-enters-andalus
    category: founding
    title_en: Abd al-Rahman I Enters al-Andalus
    title_ar: دخول عبد الرحمن الداخل الأندلس
    title_fr: ʿAbd al-Raḥmān Iᵉʳ entre en al-Andalus
    description_en: |
      The sole surviving Umayyad prince, who had escaped the Abbasid massacre
      of his family, crossed into al-Andalus after years of flight across
      Palestine and North Africa. Within a year he would defeat the Abbasid-
      appointed governor and establish the independent Emirate of Cordoba,
      which would last 275 years and give rise to some of the greatest
      flowering of Islamic civilization.
    description_fr: |
      L'unique prince omeyyade survivant, qui avait échappé au
      massacre abbasside de sa famille, traversa en al-Andalus après
      des années de fuite à travers la Palestine et l'Afrique du
      Nord. En un an, il vainquit le gouverneur abbasside et instaura
      l'émirat omeyyade indépendant de Cordoue, qui durerait deux
      siècles et demi avant de se proclamer califat sous ʿAbd
      al-Raḥmān III.
    description_ar: |
      عَبَر إلى الأندلس آخرُ أمراء بني أميَّةَ الناجين من مذبحة
      العبَّاسيِّين لأهله، بعد سنواتٍ من الفرار عَبر فلسطينَ
      وشمال إفريقيَّةَ. وفي عامٍ هزم واليَ العبَّاسيِّين، وأَسَّس
      إمارةَ بني أميَّة المستقلَّة بقُرطُبةَ، التي امتدَّت قرنين
      ونصفًا قبل أن تُعلَن خلافةً على يد عبد الرحمن الناصر.
    canonical_hijri: {year: 138, precision: year}
    canonical_gregorian: {date: 755-08-14, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    people: [[abd-al-rahman-i, leader]]
    tags: [al-andalus, umayyad, founding, cordoba]
    verified: true

  - slug: founding-great-mosque-cordoba
    category: founding
    title_en: Founding of the Great Mosque of Cordoba
    title_ar: تأسيس جامع قرطبة
    title_fr: Fondation de la Grande Mosquée de Cordoue
    description_en: |
      Abd al-Rahman I purchased the shared Visigothic basilica from the
      Christian community of Cordoba and began construction of a new
      congregational mosque on the site — the building that would become known
      as La Mezquita. Expanded by successive Umayyad rulers into one of the
      largest mosques in the medieval world, it remains a unesco-listed
      monument today.
    description_fr: |
      ʿAbd al-Raḥmān Iᵉʳ acheta la basilique wisigothe partagée à la
      communauté chrétienne de Cordoue et entama la construction
      d'une nouvelle mosquée congrégationnelle sur le site — l'édifice
      qui deviendrait la mythique Mezquita à doubles arcs en fer à
      cheval. Les califes omeyyades ultérieurs l'agrandirent jusqu'à
      ce qu'elle devienne la deuxième plus grande mosquée du monde
      musulman, dépassée seulement par celle de Bagdad. Elle fut
      convertie en cathédrale après 1236.
    description_ar: |
      اشترى عبدُ الرحمن الداخل الكنيسةَ القُوطيَّةَ المشتركةَ من
      نصارى قُرطُبةَ، وشرع في بناء مسجدٍ جامعٍ على موقعها — وهو
      البناءُ الذي سيُعرف بـ«المسجد الجامع» (لاحقًا La Mezquita)،
      بأَقواسه المضاعفة على شكل حدوة الفرس. وَسَّعه خلفاءُ بني أميَّة
      المتأخِّرون حتى صار ثانيَ أكبر مسجدٍ في العالم الإسلاميِّ بعد
      مسجد بغدادَ. وحُوِّل إلى كاتدرائيَّةٍ بعد سنة 1236م.
    canonical_hijri: {year: 169, precision: year}
    canonical_gregorian: {date: 785-06-01, precision: year, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    people: [[abd-al-rahman-i, leader]]
    tags: [al-andalus, founding, cordoba, mosque]
    verified: true

  - slug: fall-of-granada
    category: conquest
    title_en: Fall of Granada — End of al-Andalus
    title_ar: سقوط غرناطة
    title_fr: Chute de Grenade — fin d'al-Andalus
    description_en: |
      After ten years of war, the last Muslim emir of Iberia, Muhammad XII
      (Boabdil) of the Nasrid dynasty, surrendered Granada to the Catholic
      Monarchs Ferdinand and Isabella. The treaty initially guaranteed freedom
      of worship to Muslims, but within a decade forced conversions and
      expulsions began. The event ended nearly 800 years of Muslim presence
      in the Iberian peninsula.
    # 2 Rabīʿ al-Awwal 897 AH per the historically attested Treaty signing
    # date (al-Maqqarī, Nafḥ al-Ṭīb; Wikipedia · Granada War). Earlier YAML
    # had month: 7 (Rajab), which is the wrong month — fixed 2026-04-26.
    description_fr: |
      Après dix ans de guerre, le dernier émir musulman d'Ibérie,
      Muḥammad XII (Boabdil) de la dynastie naṣride, livra Grenade
      aux Rois Catholiques Ferdinand et Isabelle. Le traité
      garantissait initialement aux musulmans liberté religieuse et
      droits de propriété, mais ces clauses furent
      systématiquement bafouées dans les décennies suivantes,
      menant aux conversions forcées (1502), à l'expulsion des
      moriscos (1609), et à la fin de l'islam ouvert dans la
      péninsule Ibérique.
    description_ar: |
      بعد عشر سنواتٍ من الحرب، سَلَّم آخرُ أمير مسلمٍ في الأندلس
      محمَّد الثاني عشر (أبو عبد الله الصغير) من بني نَصرٍ غَرناطةَ
      للملكَين الكاثوليكيَّين فرديناند وإيزابيلَّا. ووعدَتْ معاهدةُ
      التسليم المسلمين بحريَّة الدين وحفظ الأملاك، لكنَّ هذه
      الشروطَ نُقِضت في العقود التالية: التحويلاتُ القَسْريَّة سنة
      1502، وطردُ الموريسكيِّين سنة 1609، فانتهى الإسلامُ المُعلَن
      في الأندلس.
    canonical_hijri: {year: 897, month: 3, day: 2, precision: day}
    canonical_gregorian: {date: 1492-01-02, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    tags: [al-andalus, fall, nasrid, reconquista, granada]
    verified: true

  # =========================================================================
  # CRUSADES AND SALADIN
  # =========================================================================

  - slug: first-crusade-fall-of-jerusalem
    category: battle
    title_en: First Crusade — Fall of Jerusalem to the Crusaders
    title_ar: سقوط القدس في الحملة الصليبية الأولى
    title_fr: Première Croisade — chute de Jérusalem
    description_en: |
      After a five-week siege, the armies of the First Crusade under Godfrey
      of Bouillon breached the walls of Jerusalem. The subsequent massacre
      killed nearly the entire Muslim and Jewish population of the city. The
      Dome of the Rock was converted into a church and al-Aqsa into a palace
      of the crusader kings. The city would remain under crusader rule for
      88 years until Saladin's reconquest.
    description_fr: |
      Après un siège de cinq semaines, les armées de la Première
      Croisade sous Godefroy de Bouillon enfoncèrent les murs de
      Jérusalem. Le massacre qui s'ensuivit tua presque toute la
      population musulmane et juive de la ville — des chroniques
      chrétiennes elles-mêmes décrivent les rues « jonchées de
      cadavres » et les croisés avançant « jusqu'aux genoux dans le
      sang ». Les musulmans tentèrent en vain de défendre la
      mosquée al-Aqṣā ; les Templiers la convertirent en quartier
      général. La libération par Saladin n'aurait lieu que 88 ans
      plus tard.
    description_ar: |
      بعد حصارٍ دام خمسةَ أسابيعَ، اقتحم جيشُ الحملة الصليبيَّة
      الأولى بقيادة غودفري دو بويون أسوارَ القدس. وأَعقَب ذلك مذبحةٌ
      أَفنت أهلَها المسلمين واليهودَ تقريبًا — حتى المؤرِّخون النصارى
      أنفسُهم وصفوا الشوارعَ «المغطَّاةَ بالجثث»، والصليبيِّين
      يخوضون «حتى الرُّكَب في الدم». وحاول المسلمون عبثًا الدفاعَ
      عن المسجد الأقصى، فحوَّله الفرسانُ المعبدِيُّون إلى مَقَرٍّ
      لقيادتهم. ولن يأتي تحريرُه على يد صلاح الدِّين إلا بعد ثمانٍ
      وثمانين سنة.
    canonical_hijri: {year: 492, month: 8, day: 23, precision: day}
    canonical_gregorian: {date: 1099-07-15, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    tags: [crusades, jerusalem, al-aqsa]
    verified: true

  - slug: death-of-ghazali
    category: scholar_death
    title_en: Death of Imam al-Ghazali (Hujjat al-Islam)
    title_ar: وفاة الإمام الغزالي
    title_fr: Décès de l'imam al-Ghazālī (Ḥujjat al-Islām)
    description_en: |
      Author of "Ihya' 'Ulum al-Din" (The Revival of the Religious Sciences)
      and one of the most influential Muslim thinkers of the medieval world.
      After a decade of spiritual seclusion following a crisis of doubt at
      the peak of his academic career in Baghdad, he returned to teaching in
      his native Tus, where he died at age 55. His synthesis of fiqh, kalam,
      and Sufism reshaped Sunni orthodoxy for centuries.
    description_fr: |
      Auteur d'« Iḥyāʾ ʿulūm al-dīn » (La revivification des sciences
      religieuses) et l'un des penseurs musulmans les plus influents
      du monde médiéval. Après une décennie de retraite spirituelle
      consécutive à une crise de la foi documentée dans son
      autobiographique « al-Munqidh min al-Ḍalāl », il revint à
      l'enseignement à Ṭūs où il mourut. Son intégration du fiqh, du
      kalām et du taṣawwuf sunnite a façonné la pensée musulmane
      depuis.
    description_ar: |
      صاحبُ «إحياء علوم الدِّين»، وأحدُ أكثر مفكِّري الإسلام تأثيرًا في
      العالم الوسيط. بعد عشر سنواتٍ من العزلة الروحيَّة إثرَ أزمةٍ
      إيمانيَّةٍ سَجَّلها في «المنقذ من الضلال»، عاد إلى التعليم
      بطُوسَ ومات بها. وظلَّ مَنْحاه — جامعًا بين الفقه والكلام
      والتصوُّف السنِّيِّ — رافدًا للفكر الإسلاميِّ منذ ذلك الحين.
    canonical_hijri: {year: 505, month: 6, day: 14, precision: day}
    canonical_gregorian: {date: 1111-12-19, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: openiti
        hijri: {year: 505, precision: year}
    people: [[al-ghazali, died]]
    tags: [seljuk, scholar, khorasan, ihya, sufism]
    verified: true

  - slug: battle-of-hattin
    category: battle
    title_en: Battle of Hattin
    title_ar: معركة حطين
    title_fr: Bataille de Ḥaṭṭīn
    description_en: |
      The decisive battle of the Second Crusader Kingdom's end. Saladin drew
      the crusader army of King Guy of Lusignan into the waterless plain of
      Hattin in Galilee, where thirst, Muslim archers, and brush fires broke
      the crusader formation. The "True Cross" relic was captured. Within
      three months nearly every crusader stronghold in the Levant had fallen
      or surrendered, culminating in the liberation of Jerusalem.
    description_fr: |
      Bataille décisive de la fin du Second Royaume des Croisés.
      Saladin attira l'armée croisée du roi Guy de Lusignan dans la
      plaine sans eau de Ḥaṭṭīn en Galilée, où la soif, les archers
      musulmans et un incendie de broussailles brisèrent la
      chevalerie franque. Le roi Guy fut capturé et la Vraie Croix —
      porte-relique de l'armée croisée — fut prise. La défaite ouvrit
      la voie à la libération de Jérusalem trois mois plus tard.
    description_ar: |
      المعركةُ الفاصلةُ التي أنهت مملكةَ الصليبيِّين الثانية. أَوقَع
      صلاحُ الدِّين بجيش الصليبيِّين بقيادة الملك جاي دو لوزينيان في
      سهلٍ بلا ماءٍ بحطِّينَ بالجليل، فكَسَرَ العَطَشُ ورُمَاةُ
      المسلمين وحريقُ الأشواكِ خيلَ الإفرنج. أُسِر الملكُ جاي،
      واستُحوِذ على الصليب الأكبر — تَعويذَة الصليبيِّين العسكريَّة.
      وفتحت الهزيمةُ الطريقَ لتحرير القدس بعد ثلاثة أشهر.
    canonical_hijri: {year: 583, month: 7, day: 24, precision: day}
    canonical_gregorian: {date: 1187-07-04, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    people: [[salahuddin-al-ayyubi, leader]]
    tags: [ayyubid, crusades, saladin, hattin, galilee]
    verified: true

  - slug: saladin-conquest-of-jerusalem
    category: conquest
    title_en: Saladin's Liberation of Jerusalem
    title_ar: فتح صلاح الدين للقدس
    title_fr: Libération de Jérusalem par Saladin
    description_en: |
      Saladin entered Jerusalem after negotiated surrender by Balian of Ibelin.
      In stark contrast to the massacre of 1099, the reconquest was bloodless
      and the Christian inhabitants were allowed to ransom themselves or depart
      unharmed. The crosses were removed from the Dome of the Rock and the
      first Friday prayer in 88 years was held at al-Aqsa. The date coincided
      with the anniversary of al-Isra wal-Mi'raj.
    description_fr: |
      Saladin entra à Jérusalem après une reddition négociée par
      Balian d'Ibelin. Contrairement au massacre de 1099, la
      reconquête se fit sans effusion de sang et les habitants
      chrétiens furent autorisés à se racheter ou à partir avec
      leurs biens. L'église du Saint-Sépulcre resta sous garde
      chrétienne ; l'Esplanade des Mosquées fut purifiée et la
      mosquée al-Aqṣā restaurée à sa fonction. La conduite de
      Saladin contraste durablement avec celle de la Première
      Croisade.
    description_ar: |
      دخل صلاحُ الدِّين القدسَ بعد تسليمٍ تَفاوض عليه بليان دِيبيلين.
      وعلى نقيض مجزرة سنة 1099م، تمَّ التحريرُ بلا إراقة دماء،
      وأُذن للنصارى بفداء أنفسهم أو الخروج بأموالهم. وبقيت كنيسةُ
      القيامة تحت حراسةٍ نصرانيَّةٍ؛ وطُهِّرت ساحةُ المسجد الأقصى،
      وأُعِيد المسجدُ إلى وظيفته. وسلوكُ صلاح الدِّين على هذا النحو
      ظلَّ موضعَ مقابلةٍ تاريخيَّةٍ مع الحملة الصليبيَّة الأولى.
    canonical_hijri: {year: 583, month: 10, day: 27, precision: day}
    canonical_gregorian: {date: 1187-10-02, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
    people: [[salahuddin-al-ayyubi, leader]]
    tags: [ayyubid, crusades, saladin, jerusalem, al-aqsa]
    verified: true

  - slug: death-of-saladin
    category: caliph_event
    title_en: Death of Salah al-Din al-Ayyubi (Saladin)
    title_ar: وفاة صلاح الدين الأيوبي
    title_fr: Décès de Ṣalāḥ al-Dīn al-Ayyūbī (Saladin)
    description_en: |
      The founder of the Ayyubid dynasty, who had reunited Egypt and Syria
      under Sunni rule and liberated Jerusalem from the crusaders, died in
      Damascus at age 56, leaving almost no personal wealth — what remained
      in his treasury (one dinar and forty dirhams) was insufficient to pay
      for his shroud. His tomb stands adjacent to the Umayyad Mosque in
      Damascus.
    description_fr: |
      Le fondateur de la dynastie ayyoubide, qui avait réuni l'Égypte
      et la Syrie sous gouvernement sunnite et libéré Jérusalem des
      croisés, mourut à Damas à 56 ans, ne laissant presque aucun
      patrimoine personnel — selon les rapports, ce qui restait dans
      le trésor n'aurait pas suffi à couvrir ses funérailles. Son
      tombeau dans la cour de la mosquée des Omeyyades demeure un
      lieu très visité.
    description_ar: |
      تُوفِّي مؤسِّسُ الدولة الأيُّوبيَّة — الذي وحَّد مصرَ والشامَ
      تحت سلطانٍ سُنِّيٍّ وحرَّر القدس من الصليبيِّين — بدمشقَ عن
      ستٍّ وخمسين سنةً، لا يكاد يَترُكُ مالًا شخصيًّا؛ ويُقال إنَّ
      ما تبقَّى في خزينته ما كان يكفي مؤونةَ كفنه. وقبرُه في صحن
      الجامع الأمويِّ بدمشقَ مَزارٌ مَشهور.
    canonical_hijri: {year: 589, month: 2, day: 27, precision: day}
    canonical_gregorian: {date: 1193-03-04, precision: day, method: attested}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
    people: [[salahuddin-al-ayyubi, died]]
    tags: [ayyubid, saladin, damascus, death]
    verified: true

  # =========================================================================
  # MONGOL ERA
  # =========================================================================

  - slug: sack-of-baghdad
    category: battle
    title_en: Mongol Sack of Baghdad
    title_ar: سقوط بغداد على يد المغول
    title_fr: Sac de Bagdad par les Mongols
    description_en: |
      After a 13-day siege, the Mongol army under Hulagu Khan breached Baghdad
      and slaughtered its inhabitants over a week — classical sources estimate
      the dead at hundreds of thousands. The last Abbasid caliph al-Musta'sim
      was wrapped in a carpet and trampled to death. The Grand Library and
      centuries of scholarship were destroyed, with the Tigris reportedly
      running black with ink and red with blood. The date marks the end of
      the Abbasid caliphate in its historical form.
    description_fr: |
      Après un siège de 13 jours, l'armée mongole sous Hulagu Khan
      enfonça Bagdad et massacra ses habitants pendant une semaine —
      les sources classiques estiment les morts à plusieurs centaines
      de milliers. Le dernier calife abbasside al-Mustaʿṣim fut
      exécuté (selon la coutume mongole, en l'enroulant dans un tapis
      et en le faisant fouler par les chevaux). Les bibliothèques —
      y compris la Bayt al-Ḥikma — furent brûlées, leurs ouvrages
      jetés au Tigre dont l'eau, dit-on, devint noire d'encre puis
      rouge de sang. La fin du califat de cinq siècles.
    description_ar: |
      بعد حصارٍ دام ثلاثةَ عشرَ يومًا، اقتحم جيشُ المغول بقيادة
      هولاكو بغدادَ، وأعمل القتلَ في أهلها أسبوعًا — وقدَّر بعضُ
      المؤرِّخين القتلى بمئات الألوف. وقُتل آخرُ خلفاء بني العبَّاس
      المستعصمُ على عادة المغول (لُفَّ بسجَّادٍ ودِيستْ عليه الخيل).
      أُحرقت المكتبات — ومنها بيتُ الحكمة — وأُلقي ما فيها من كتبٍ
      في دجلة، فاسوَدَّ ماؤه — على ما يُروى — من المداد ثم احمرَّ
      بالدم. وكانت نهايةَ خلافةٍ امتدَّت خمسةَ قرون.
    canonical_hijri: {year: 656, month: 2, day: 4, precision: day}
    canonical_gregorian: {date: 1258-02-10, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    tags: [mongol, baghdad, abbasid-end, tragedy]
    verified: true

  - slug: battle-of-ain-jalut
    category: battle
    title_en: Battle of Ain Jalut
    title_ar: معركة عين جالوت
    title_fr: Bataille de ʿAyn Jālūt
    description_en: |
      The Mamluk army under Sultan Qutuz and the future sultan Baybars
      defeated the Mongol general Kitbuqa at Ayn Jalut (Spring of Goliath) in
      Palestine. It was the first decisive defeat of the Mongols in open
      battle and is traditionally seen as the stopping point of their westward
      expansion, saving the remaining Islamic heartlands from the fate of
      Baghdad.
    description_fr: |
      L'armée mamelouke sous le sultan Quṭuz et le futur sultan
      Baybars défit le général mongol Kitbuqa à ʿAyn Jālūt (Source de
      Goliath) en Palestine. Ce fut la première défaite décisive
      des Mongols en bataille rangée et arrêta leur avance vers
      l'ouest. La bataille consolida le sultanat mamelouk
      nouvellement établi en Égypte et au Levant et préserva le cœur
      musulman occidental d'une éventuelle conquête mongole.
    description_ar: |
      هزم جيشُ المماليك بقيادة السلطان قُطُز ومن بعده الظاهر بَيبَرس
      القائدَ المغوليَّ كِتْبُغا في عين جالوتَ بفلسطينَ. كانت
      الهزيمةَ الأولى الفاصلةَ للمغول في معركةٍ مفتوحةٍ، فأَوْقَفَت
      زحفَهم غربًا. وثَبَّتت المعركةُ سلطنةَ المماليك الناشئة في مصر
      والشام، وحفظت قلبَ الإسلام الغربيَّ من فتحٍ مغوليٍّ مرتقَب.
    canonical_hijri: {year: 658, month: 9, day: 25, precision: day}
    canonical_gregorian: {date: 1260-09-03, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[baybars, participant]]
    tags: [mamluk, mongol, battle, palestine]
    verified: true

