  - slug: death-of-nawawi
    category: scholar_death
    title_en: Death of Imam al-Nawawi
    title_ar: وفاة الإمام النووي
    title_fr: Décès de l'imam al-Nawawī
    description_en: |
      Author of "Riyad al-Salihin," "al-Arba'in al-Nawawiyya" (the Forty
      Hadith), the "Minhaj" commentary on Sahih Muslim, and foundational
      works of the late Shafi'i madhhab. He led an ascetic life in Damascus
      and refused all paid teaching positions. He died at age 44 in his
      native Nawa, Syria.
    description_fr: |
      Auteur de « Riyāḍ al-Ṣāliḥīn », « al-Arbaʿīn al-Nawawiyya »
      (les Quarante Hadiths), du commentaire « al-Minhāj » sur Ṣaḥīḥ
      Muslim, et d'œuvres fondatrices du madhhab shāfiʿite tardif.
      Il mena une vie ascétique à Damas, refusa toute fonction
      officielle et mourut à 44 ans dans son village natal de Nawā
      près de Damas. Sa production demeure, à ce jour, parmi les plus
      lues de la littérature islamique.
    description_ar: |
      إمامُ المذهب الشافعيِّ المتأخِّر، صاحبُ «رياض الصالحين»
      و«الأربعين النوويَّة» وشرح صحيح مسلمٍ «المنهاج». عاش بدمشقَ
      زاهدًا، ورفض المناصبَ الرسميَّةَ، وتُوفِّي في الرابعة والأربعين
      بقريته نَوَى قُربَ دمشقَ. ولا تزال مصنَّفاتُه إلى يومنا من
      أكثر كتب الإسلام انتشارًا.
    canonical_hijri: {year: 676, month: 7, day: 24, precision: day}
    canonical_gregorian: {date: 1277-12-22, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
    people: [[an-nawawi, died]]
    tags: [mamluk, scholar, damascus, shafii]
    verified: true

  - slug: death-of-ibn-taymiyya
    category: scholar_death
    title_en: Death of Shaykh al-Islam Ibn Taymiyya
    title_ar: وفاة شيخ الإسلام ابن تيمية
    title_fr: Décès de Shaykh al-Islām Ibn Taymiyya
    description_en: |
      One of the most consequential medieval Muslim thinkers, author of more
      than three hundred works on theology, law, and refutation of heterodox
      sects. He died in the Damascus citadel where he had been imprisoned
      for his legal opinions, leaving unfinished commentaries on the Qur'an
      and fiqh. His influence on later revivalist movements — from Ibn al-
      Qayyim to Muhammad ibn Abd al-Wahhab — has been profound.
    description_fr: |
      L'un des penseurs musulmans médiévaux les plus conséquents,
      auteur de plus de trois cents ouvrages de théologie, de droit
      et de réfutation des sectes hétérodoxes. Il mourut dans la
      citadelle de Damas où il avait été incarcéré par les autorités
      mameloukes pour ses opinions juridiques. Ses critiques contre
      le kalām, le taṣawwuf populaire et certaines pratiques
      innovantes inspireraient les mouvements de réforme du XVIIIᵉ
      siècle au présent. Étudiant et héritier intellectuel direct
      d'Ibn Qayyim al-Jawziyya.
    description_ar: |
      من أعظم مفكِّري الإسلام المتأخِّرين، صاحبُ ما يَزيد على ثلاث
      مئة مصنَّفٍ في العقيدة والفقه والردِّ على الفِرَق الباطنة.
      تُوفِّي في قلعة دمشقَ سجينًا بأمر سلطاتِ المماليك بسبب آرائه
      الفقهيَّة. وستُلهم انتقاداتُه للكلام والتصوُّف الشعبيِّ وبعض
      البدع حركاتِ الإصلاح من القرن الثامن عشر إلى يومنا. ابنُ
      قيِّم الجوزيَّة هو أوَّلُ تلاميذه ووارثه الفكريّ.
    canonical_hijri: {year: 728, month: 11, day: 20, precision: day}
    canonical_gregorian: {date: 1328-09-26, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: openiti
        hijri: {year: 728, precision: year}
    people: [[ibn-taymiyya, died]]
    tags: [mamluk, scholar, damascus]
    verified: true

  - slug: death-of-ibn-al-qayyim
    category: scholar_death
    title_en: Death of Ibn Qayyim al-Jawziyya
    title_ar: وفاة ابن قيم الجوزية
    title_fr: Décès d'Ibn Qayyim al-Jawziyya
    description_en: |
      Principal student of Ibn Taymiyya and prolific author whose works
      include "Zad al-Ma'ad," "Madarij al-Salikin," and "I'lam al-Muwaqqi'in."
      He was imprisoned alongside his teacher and took leadership of the
      revivalist circle after Ibn Taymiyya's death. He died in Damascus and
      is buried in the Bab al-Saghir cemetery.
    description_fr: |
      Principal élève d'Ibn Taymiyya et auteur prolifique dont les
      œuvres comprennent « Zād al-Maʿād », « Madārij al-Sālikīn »
      et « Iʿlām al-Muwaqqiʿīn ». Il fut emprisonné aux côtés de son
      maître et prit la tête de l'école taymiyyenne après la mort
      d'Ibn Taymiyya en 1328. Sa synthèse de la jurisprudence, du
      taṣawwuf et de l'éthique sunnite influença profondément la
      tradition ḥanbalite et les mouvements de réforme ultérieurs.
    description_ar: |
      أوَّلُ تلامذة ابن تيميَّة، ومن أوسع المؤلِّفين تصنيفًا؛ ومن
      كتبه «زادُ المعاد» و«مدارجُ السالكين» و«إعلامُ المُوقِّعين».
      سُجن مع شيخه، وتولَّى زعامةَ المدرسة التيميَّة بعد وفاة ابن
      تيميَّةَ سنة 1328م. وكان لِجَمعه بين الفقه والتصوُّف والأخلاق
      السنِّيَّة أثرٌ بالغٌ في المذهب الحنبليِّ وحركات الإصلاح
      اللاحقة.
    canonical_hijri: {year: 751, month: 7, day: 13, precision: day}
    canonical_gregorian: {date: 1350-09-15, precision: day, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
    people: [[ibn-al-qayyim, died]]
    tags: [mamluk, scholar, damascus]
    verified: true

  - slug: death-of-ibn-kathir
    category: scholar_death
    title_en: Death of Ibn Kathir
    title_ar: وفاة ابن كثير
    title_fr: Décès d'Ibn Kathīr
    description_en: |
      Author of "Tafsir al-Qur'an al-'Azim" — one of the most widely read
      classical tafsirs — and "al-Bidaya wa'l-Nihaya," a monumental universal
      history. A student of Ibn Taymiyya, he served as chief mufti and
      professor in Damascus. He went blind in his final years and died in
      his native Damascus.
    description_fr: |
      Auteur de « Tafsīr al-Qurʾān al-ʿAẓīm » — l'un des tafsīr
      classiques les plus lus — et d'« al-Bidāya wa-l-Nihāya »,
      histoire universelle monumentale. Élève d'Ibn Taymiyya, il
      servit comme grand mufti shāfiʿite de Damas. Il devint aveugle
      à la fin de sa vie ; sa veuve continua à lire pour lui les
      œuvres qu'il continua à dicter.
    description_ar: |
      صاحبُ «تفسير القرآن العظيم» — وهو من أوسع التفاسير الكلاسيكيَّة
      انتشارًا — و«البداية والنهاية»، التاريخ الأمميِّ الضخم. كان من
      تلامذة ابن تيميَّةَ، وتولَّى الإفتاء الشافعيَّ بدمشقَ. كُفَّ
      بصرُه آخر عمره؛ فاستمرَّت زوجتُه تَقرأ له الكتب التي بقي
      يُمليها.
    canonical_hijri: {year: 774, month: 8, precision: month}
    canonical_gregorian: {date: 1373-02-15, precision: month, method: attested}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
    people: [[ibn-kathir, died]]
    tags: [mamluk, scholar, damascus, mufassir, historian]
    verified: true

  - slug: death-of-ibn-khaldun
    category: scholar_death
    title_en: Death of Ibn Khaldun
    title_ar: وفاة ابن خلدون
    title_fr: Décès d'Ibn Khaldūn
    description_en: |
      Author of the "Muqaddima" — widely regarded as the founding work of
      sociology, historiography, and the philosophy of history. After a career
      in the courts of the Maghreb and al-Andalus, he settled in Cairo as
      Maliki chief justice. He is buried in the Sufi cemetery outside Bab
      al-Nasr in Cairo.
    description_fr: |
      Auteur de la « Muqaddima » — largement reconnue comme l'œuvre
      fondatrice de la sociologie, de l'historiographie et de la
      philosophie de l'histoire. Après une carrière dans les cours
      du Maghreb et d'al-Andalus, il s'installa au Caire où il servit
      comme juge en chef mālikite. Il mourut à 73 ans et fut enterré
      dans le cimetière soufi près de Bāb al-Naṣr.
    description_ar: |
      صاحبُ «المقدِّمة»، التي يُعدُّها كثيرون مُؤسِّسةً لعلم الاجتماع
      والتاريخ والفلسفة التاريخيَّة. بعد خدمته في بلاطات المغرب
      والأندلس، استقرَّ بالقاهرة وتولَّى قضاءَ المالكيَّة الكبير.
      تُوفِّي عن ثلاثٍ وسبعين سنةً، ودُفن في مدافن الصوفيَّة قُرب
      باب النصر.
    canonical_hijri: {year: 808, month: 7, day: 26, precision: day}
    canonical_gregorian: {date: 1406-03-17, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[ibn-khaldun, died]]
    tags: [mamluk, scholar, cairo, historian, sociology, maghreb]
    verified: true

  - slug: death-of-ibn-hajar
    category: scholar_death
    title_en: Death of Ibn Hajar al-'Asqalani
    title_ar: وفاة ابن حجر العسقلاني
    title_fr: Décès d'Ibn Ḥajar al-ʿAsqalānī
    description_en: |
      Author of "Fath al-Bari" — the definitive commentary on Sahih al-Bukhari
      — as well as "al-Isaba fi Tamyiz al-Sahaba," "Tahdhib al-Tahdhib," and
      numerous other foundational works in hadith, rijal, and history. He
      served for decades as chief Shafi'i judge of Egypt and is buried in
      al-Qarafa cemetery, Cairo.
    description_fr: |
      Auteur de « Fatḥ al-Bārī » — le commentaire de référence sur
      Ṣaḥīḥ al-Bukhārī — ainsi que d'« al-Iṣāba fī Tamyīz al-Ṣaḥāba »,
      « Tahdhīb al-Tahdhīb » et de nombreuses autres œuvres
      fondatrices en ḥadīth, rijāl et histoire. Il fut grand juge
      shāfiʿite d'Égypte sous les Mamelouks pendant plus de vingt
      ans. Il mourut au Caire ; ses funérailles auraient été suivies
      par 50 000 personnes.
    description_ar: |
      صاحبُ «فتح الباري» — أعظم شروح صحيح البخاريِّ — و«الإصابة في
      تمييز الصحابة» و«تهذيب التهذيب» وكثيرٍ من المصنَّفات الأمَّهات
      في الحديث والرجال والتاريخ. تولَّى قضاءَ الشافعيَّة الأكبر
      في مصر زمن المماليك أكثرَ من عشرين سنةً. تُوفِّي بالقاهرة،
      وحضر جنازتَه — كما تُذكر المصادر — خمسون ألفًا.
    canonical_hijri: {year: 852, month: 12, day: 28, precision: day}
    canonical_gregorian: {date: 1449-02-22, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
    people: [[ibn-hajar-al-asqalani, died]]
    tags: [mamluk, scholar, cairo, hadith, fath-al-bari]
    verified: true

