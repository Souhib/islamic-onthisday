  - slug: karbala
    category: umayyad
    title_en: Battle of Karbala — Martyrdom of al-Husayn ibn Ali
    title_ar: كربلاء - استشهاد الإمام الحسين
    title_fr: Bataille de Karbalāʾ — Martyre d'al-Ḥusayn ibn ʿAlī
    description_en: |
      al-Husayn ibn Ali, grandson of the Prophet ﷺ, was killed along with 72
      companions and family members on the plain of Karbala by forces loyal to
      the Umayyad caliph Yazid ibn Mu'awiya. His severed head was sent to
      Damascus. The day, 10 Muharram (Ashura), remains one of the most
      commemorated dates in Islamic history. Husayn's stand is central to Shia
      Islamic identity and is mourned throughout the Muslim world.
    description_fr: |
      Al-Ḥusayn ibn ʿAlī, petit-fils du Prophète ﷺ, fut tué avec 72
      compagnons et membres de sa famille dans la plaine de Karbalāʾ
      par des forces fidèles au calife omeyyade Yazīd ibn Muʿāwiya.
      Sa tête tranchée fut envoyée à Damas. L'épisode est l'événement
      central du calendrier émotionnel chiite (commémoré chaque
      ʿĀshūrāʾ) ; les sources sunnites le pleurent universellement
      comme un martyre, tout en distinguant le deuil sobre de la
      Sunna des rituels chiites de ʿĀshūrāʾ.
    description_ar: |
      قُتل الحسينُ بنُ عليٍّ، سِبطُ النبي ﷺ، ومعه نحوُ اثنين وسبعين
      من أهله وصحبه في صحراء كربلاء على يد قواتٍ موالية للخليفة
      الأمويِّ يزيدَ بن معاوية. وأُرسل رأسُه الشريف إلى دمشقَ. وتمثِّل
      هذه الحادثةُ ركنَ التقويم العاطفيِّ الشيعيِّ (تُحيا كلَّ
      عاشوراء)؛ أمَّا أهل السنَّة فيرونها استشهادًا يُحزنُ له، مع
      تمييز الذِّكرى السنِّيَّة الهادئة عن طقوس عاشوراء عند الشيعة.
    canonical_hijri: {year: 61, month: 1, day: 10, precision: day}
    canonical_gregorian: {date: 680-10-10, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_athir_kamil
      - source_key: ibn_kathir_bidaya
    people: [[husayn-ibn-ali, killed], [yazid-ibn-muawiya, opposed]]
    tags: [umayyad, martyrdom, karbala, ahl-al-bayt, ashura, muharram]
    verified: true

  - slug: death-of-muawiya
    category: umayyad
    title_en: Death of Mu'awiya ibn Abi Sufyan
    title_ar: وفاة معاوية بن أبي سفيان
    title_fr: Décès de Muʿāwiya ibn Abī Sufyān
    description_en: |
      The founder of the Umayyad dynasty and first of its caliphs died in
      Damascus after a 19-year caliphate. His bequest of the caliphate to his
      son Yazid transformed the Islamic state from an elected institution into
      a hereditary monarchy — a decision that would directly precipitate the
      tragedy of Karbala.
    description_fr: |
      Le fondateur de la dynastie omeyyade et premier de ses califes
      mourut à Damas après un califat de 19 ans. Sa transmission du
      califat à son fils Yazīd transforma l'État islamique d'une
      institution élective en monarchie héréditaire, déclenchant la
      Deuxième Fitna et le martyre d'al-Ḥusayn quelques mois plus
      tard. Sous Muʿāwiya, l'empire s'étendit jusqu'au Khorāsān à
      l'est et à la Tunisie à l'ouest, avec les premiers sièges
      musulmans de Constantinople.
    description_ar: |
      تُوفِّي مؤسِّسُ الدولة الأمويَّة وأوَّلُ خلفائها بدمشقَ بعد خلافةٍ
      دامت تسعَ عشرة سنةً. وقد حوَّل توريثُه ابنَه يزيدَ الدولةَ
      الإسلاميَّةَ من نظامٍ تَعاقُدِيٍّ إلى مُلكٍ وراثيٍّ، فأشعلت
      الفتنةُ الكبرى الثانية واستُشهد الحسينُ بعد أشهرٍ. وفي عهده
      امتدَّت الدولةُ إلى خراسانَ شرقًا وتونسَ غربًا، وكانت أوَّل
      حصاراتٍ مسلمةٍ للقسطنطينيَّة.
    canonical_hijri: {year: 60, month: 4, precision: month}
    canonical_gregorian: {date: 680-04-29, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
    people: [[muawiya-ibn-abi-sufyan, died]]
    tags: [umayyad, caliph, damascus]
    verified: true

  - slug: battle-of-guadalete-tariq
    category: conquest
    title_en: Battle of Guadalete — Muslim Entry into Iberia
    title_ar: معركة وادي لكة
    title_fr: Bataille de Guadalete — entrée musulmane dans la péninsule Ibérique
    description_en: |
      Tariq ibn Ziyad, the Berber commander serving the Umayyad governor of
      North Africa Musa ibn Nusayr, defeated the Visigothic king Roderic at the
      Guadalete river in southern Iberia. Tariq had crossed from Ceuta and
      landed at the rock now bearing his name (Jabal Tariq / Gibraltar). The
      battle opened Iberia to seven centuries of Muslim rule.
    description_fr: |
      Ṭāriq ibn Ziyād, commandant berbère au service du gouverneur
      omeyyade d'Afrique du Nord Mūsā ibn Nuṣayr, vainquit le roi
      wisigoth Roderic au fleuve Guadalete dans le sud de la
      péninsule Ibérique. Ṭāriq avait traversé depuis Tanger en
      empruntant le détroit qui porterait désormais son nom (Jabal
      Ṭāriq → Gibraltar). La bataille brisa le pouvoir wisigoth ; en
      trois ans, presque toute la péninsule fut sous contrôle
      musulman.
    description_ar: |
      هَزَم طارقُ بنُ زيادٍ — القائدُ البربريُّ في خدمة والي الأمويِّين
      على شمال إفريقيَّةَ موسى بن نصيرٍ — الملكَ القُوطي الغربيَّ
      لذريقَ على نهر وادي لكَّةَ بجنوب الأندلس. كان طارقٌ قد عبر من
      طنجةَ في المضيق الذي سيُسمَّى باسمه (جبل طارقٍ). وكسرت المعركةُ
      ملك القوط الغربيِّين، فدانت الأندلسُ كلُّها للمسلمين خلال ثلاث
      سنين.
    canonical_hijri: {year: 92, precision: year}
    canonical_gregorian: {date: 711-07-19, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
      - source_key: ibn_athir_kamil
    people: [[tariq-ibn-ziyad, leader]]
    tags: [umayyad, conquest, iberia, al-andalus, gibraltar]
    verified: true

  - slug: death-of-umar-ibn-abd-al-aziz
    category: umayyad
    title_en: Death of Umar ibn Abd al-Aziz
    title_ar: وفاة عمر بن عبد العزيز
    title_fr: Décès de ʿUmar ibn ʿAbd al-ʿAzīz
    description_en: |
      The eighth Umayyad caliph, widely considered "the fifth Rashidun caliph"
      for his justice and asceticism, died after a two-and-a-half year caliphate.
      He reversed many Umayyad excesses, returning confiscated lands, halting
      the cursing of Ali from the minbars, and reforming the tax code to extend
      justice to non-Arab Muslims (mawali).
    description_fr: |
      Le huitième calife omeyyade, largement considéré comme « le
      cinquième Rāshidūn » pour sa justice et son ascétisme, mourut
      après un califat de deux ans et demi. Il renversa nombre des
      excès omeyyades, restituant les biens spoliés, abolissant la
      malédiction publique de ʿAlī, et instaurant une administration
      fondée sur la responsabilité fiscale et l'équité. Beaucoup le
      croient empoisonné par les détenteurs d'intérêts qu'il avait
      menacés.
    description_ar: |
      تُوفِّي ثامنُ خلفاء بني أميَّةَ، الذي يَعدُّه كثيرٌ من أهل العلم
      خامسَ الراشدين عدلًا وزُهدًا، بعد خلافةٍ امتدَّت سنتين ونصفًا.
      ردَّ كثيرًا من تجاوزات الأمويِّين: أرجع المظالم، وأبطل سَبَّ
      عليٍّ على المنابر، وأقام إدارةً قوامُها المحاسبةُ ماليًّا
      والإنصافُ. ويُرجِّحُ كثيرٌ أنَّه سُمَّ على يد ذوي مصالحَ
      هدَّدَها بعدله.
    canonical_hijri: {year: 101, month: 2, day: 25, precision: day}
    canonical_gregorian: {date: 720-02-10, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
      - source_key: ibn_sad_tabaqat
    people: [[umar-ibn-abd-al-aziz, died]]
    tags: [umayyad, caliph, ascetic]
    verified: true

  - slug: battle-of-tours
    category: battle
    title_en: Battle of Tours (Balat al-Shuhada)
    title_ar: معركة بلاط الشهداء
    title_fr: Bataille de Tours (Balāṭ al-Shuhadāʾ)
    description_en: |
      An Umayyad raiding force under Abd al-Rahman al-Ghafiqi, governor of
      al-Andalus, was defeated by the Frankish leader Charles Martel near Tours
      in central France. The governor was killed in battle — the site is known
      in Arabic as "the court of the martyrs" (Balat al-Shuhada). The battle
      marked the furthest European advance of the Umayyad armies north of the
      Pyrenees.
    description_fr: |
      Une force de razzia omeyyade sous ʿAbd al-Raḥmān al-Ghāfiqī,
      gouverneur d'al-Andalus, fut défaite par le chef franc Charles
      Martel près de Tours, dans le centre de la France. Le
      gouverneur fut tué dans la bataille — d'où son nom arabe Balāṭ
      al-Shuhadāʾ (« Pavé des martyrs »). La bataille a longtemps été
      présentée par les historiens occidentaux comme un tournant ;
      les historiens modernes la considèrent davantage comme la fin
      des grandes incursions plutôt que comme un blocage stratégique.
    description_ar: |
      هُزم فيها سَريَّةٌ أمويَّةٌ غازيةٌ بقيادة عبد الرحمن الغافقيِّ،
      والي الأندلس، أمام الفرنجيِّ شارل مارتل قُربَ تورَ في وسط
      فرنسا. قُتل الواليُ في المعركة — ومن هنا اسمُها العربيُّ:
      بلاطُ الشهداء. وقد جعلها المؤرِّخون الغربيُّون قديمًا منعطفًا
      تاريخيًّا، أمَّا المعاصرون فيرَونها نهايةَ الغزوات الكبرى لا
      حاجزًا استراتيجيًّا.
    canonical_hijri: {year: 114, month: 10, precision: month}
    canonical_gregorian: {date: 732-10-10, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
      - source_key: ibn_athir_kamil
    tags: [umayyad, battle, europe, frankia]
    verified: true

  - slug: battle-of-the-zab
    category: battle
    title_en: Battle of the Zab — Fall of the Umayyads
    title_ar: معركة الزاب
    title_fr: Bataille du Zāb — chute des Omeyyades
    description_en: |
      The decisive battle of the Abbasid Revolution, fought on the banks of the
      Greater Zab river in modern Iraq. The last Umayyad caliph Marwan II was
      defeated by Abbasid forces under Abdullah ibn Ali. Marwan fled to Egypt
      where he was killed, ending 89 years of Umayyad rule. The sole surviving
      Umayyad prince, Abd al-Rahman, escaped to al-Andalus and founded the
      Emirate of Cordoba.
    description_fr: |
      Bataille décisive de la révolution abbasside, livrée sur les
      rives du Grand Zāb dans l'Iraq actuel. Le dernier calife
      omeyyade Marwān II fut défait par les forces abbassides sous
      ʿAbdullāh ibn ʿAlī. Marwān fut traqué jusqu'en Égypte et tué
      quelques mois plus tard. La bataille mit fin à 90 ans de
      domination omeyyade et inaugura le califat abbasside, qui
      déplacerait sa capitale à Bagdad et durerait 500 ans.
    description_ar: |
      المعركةُ الفاصلةُ في الثورة العبَّاسيَّة، وقعت على ضفاف الزاب
      الأكبر في العراق. هزم العبَّاسيُّون بقيادة عبد الله بن عليٍّ
      آخرَ خلفاء بني أميَّة مروانَ الثاني. وتُتُبِّع مروانُ في مصر
      وقُتل بعد أشهرٍ. أنهت المعركةُ تسعينَ عامًا من حكم بني أميَّةَ،
      وأَوْحَت بقيام الدولة العبَّاسيَّة التي ستجعل بغدادَ عاصمتَها
      وتمتدُّ خمسةَ قرون.
    canonical_hijri: {year: 132, month: 2, day: 11, precision: day}
    canonical_gregorian: {date: 750-01-25, precision: day, method: attested}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
    tags: [umayyad, abbasid, battle, iraq, revolution]
    verified: true

