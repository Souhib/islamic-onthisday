  - slug: death-of-yunus-emre
    category: scholar
    title_en: Death of Yunus Emre — Anatolian Sufi poet
    title_ar: وفاة يونس أمره — صوفي الأناضول وشاعرها
    title_fr: Mort de Yunus Emre — poète soufi d'Anatolie
    description_en: |
      Yunus Emre — Sunni Anatolian Turkmen mystic poet, contemporary
      of the Beylik period that preceded the rise of the Ottoman
      state, and the founding voice of the Turkish-language Sufi
      lyric tradition — died, by the consensus of the early
      hagiographies, in Anatolia. He was about 82. Composing
      almost exclusively in vernacular Turkish (rather than the
      Persian and Arabic of court literature), he made the
      classical themes of Sunni Sufism — *tawakkul*, *muhabba*,
      love of the Prophet ﷺ, the transient nature of the world —
      accessible to peasants, weavers, and dervishes for whom the
      Persian poetry of Rumi was inaccessible. His *Divan* and
      *Risaletü'n-Nushiyye* remain canonical texts of Turkish
      literature, taught in every Turkish school. UNESCO declared
      1991 the international Year of Yunus Emre.
    description_ar: |
      توفي يونس أمره — متصوف سني تركماني من أناضول البيليكات قبل
      قيام الدولة العثمانية، والمؤسس الصوتي للأدب الصوفي باللغة
      التركية — في الأناضول، كما اتفقت كتب المناقب الباكرة. وقد
      ناهز الثانية والثمانين. نظم شعره كله تقريباً بالتركية الدارجة
      لا بالفارسية والعربية اللتين كانتا لغتي البلاط، فأوصل المعاني
      الكبرى للتصوف السني — التوكل والمحبة، ومحبة النبي ﷺ، وفناء
      الدنيا — إلى الفلاحين والنساجين والدراويش الذين كانت فارسية
      الرومي بعيدة عن أفهامهم. وما زال «ديوانه» و«رسالة النصيحة»
      من أمهات نصوص الأدب التركي، مقررة في كل مدرسة تركية. وأعلنت
      اليونسكو سنة ١٩٩١ ميلادي «سنة يونس أمره» العالمية.
    description_fr: |
      Yunus Emre — poète mystique sunnite turkmène anatolien,
      contemporain de la période des beyliks qui précéda l'essor
      de l'État ottoman, et la voix fondatrice de la tradition
      lyrique soufie en langue turque — mourut, selon le consensus
      des hagiographies anciennes, en Anatolie. Il avait environ
      82 ans. Composant presque exclusivement en turc vernaculaire
      (plutôt qu'en persan et en arabe des littératures de cour),
      il rendit les thèmes classiques du soufisme sunnite — le
      *tawakkul*, la *muhabba*, l'amour du Prophète ﷺ, la nature
      éphémère du monde — accessibles aux paysans, tisserands et
      derviches pour qui la poésie persane de Rūmī était
      inaccessible. Son *Dīvān* et son *Risāletü'n-Nuṣḥiyye*
      demeurent des textes canoniques de la littérature turque,
      enseignés dans toutes les écoles turques. L'UNESCO déclara
      1991 année internationale de Yunus Emre.
