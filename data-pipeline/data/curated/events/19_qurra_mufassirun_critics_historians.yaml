  - slug: death-of-ali-ibn-al-madini
    category: scholar
    title_en: Death of ʿAli ibn al-Madini
    title_ar: وفاة علي بن المديني
    title_fr: Mort de ʿAli ibn al-Madīnī
    description_en: |
      ʿAli ibn ʿAbdallah ibn al-Madini — third member of the
      master-trio of hadith critics (with Yaḥya al-Qaṭṭan and
      al-Bukhari), Aḥmad ibn Ḥanbal's foremost teacher in rijal
      assessment, and the man whom al-Bukhari himself said: "I have
      never seen myself small in the presence of any scholar except
      ʿAli ibn al-Madini" — died at Samarra at age about 73. His
      *al-ʿIlal* (the science of detecting hidden defects in chains)
      established the genre and remains one of the most technical
      books of classical hadith criticism. He yielded under
      pressure during the Mihna; this concession, like Yaḥya ibn
      Maʿin's, drew sharp public criticism from Aḥmad ibn Ḥanbal
      who refused to associate with him for years afterwards.
    description_ar: |
      توفي الإمام علي بن عبد الله بن المديني — ثالث الحفاظ النقاد
      الكبار (مع يحيى القطان والبخاري)، وكبير شيوخ أحمد بن حنبل في
      الجرح والتعديل، والذي قال عنه البخاري: «ما استصغرت نفسي عند
      أحد إلا عند علي بن المديني» — بسامراء عن نحو ثلاث وسبعين سنة.
      وكتابه «العلل» في علم العلل (كشف ما خفي من علل الإسناد) أسس
      هذا الفن وما زال من أعمق كتب نقد الحديث الكلاسيكي. ولان في
      محنة خلق القرآن، فعابت عليه هذه الفلتة كما عيب على يحيى بن
      معين، وقاطعه أحمد بن حنبل سنوات لذلك علناً.
    description_fr: |
      ʿAli ibn ʿAbdallāh ibn al-Madīnī — troisième membre du trio
      maître des critiques de hadith (avec Yaḥyā al-Qaṭṭān et
      al-Bukhārī), principal maître d'Aḥmad ibn Ḥanbal en évaluation
      des *rijāl*, et l'homme dont al-Bukhārī lui-même dit : « je
      ne me suis jamais vu petit en présence d'un savant sinon
      ʿAli ibn al-Madīnī » — mourut à Samarra à l'âge d'environ
      73 ans. Son *al-ʿIlal* (la science de détecter les défauts
      cachés dans les chaînes) établit le genre et reste l'un des
      livres les plus techniques de la critique classique du hadith.
      Il céda sous la pression durant la *Miḥna*; cette concession,
      comme celle de Yaḥyā ibn Maʿīn, valut une critique publique
      tranchée d'Aḥmad ibn Ḥanbal qui refusa de s'associer à lui
      pendant des années par la suite.
    canonical_hijri: {year: 234, precision: year}
    canonical_gregorian: {date: 849-01-01, precision: year, method: attested}
