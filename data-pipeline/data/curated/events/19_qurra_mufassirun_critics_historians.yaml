  - slug: death-of-ibn-al-shatir
    category: scientist
    title_en: Death of Ibn al-Shaṭir — astronomer of the Umayyad Mosque
    title_ar: وفاة ابن الشاطر — فلكي الجامع الأموي
    title_fr: Mort d'Ibn al-Shāṭir — astronome de la Grande Mosquée des Omeyyades
    description_en: |
      ʿAla al-Din ʿAli ibn al-Shaṭir — chief muwaqqit
      (timekeeper) of the Umayyad Mosque in Damascus and the
      foremost reformer of Ptolemaic planetary models in the
      Mamluk era — died in Damascus at age about 73. His *Nihayat
      al-Suʾl fi Taṣḥiḥ al-Uṣūl* presented planetary models that
      eliminated the Ptolemaic equant and produced predictive
      results matching observation more closely than Ptolemy's;
      Copernicus's lunar and Mercury models in *De Revolutionibus*
      are mathematically identical to Ibn al-Shaṭir's, transmitted
      via Greek-Byzantine intermediaries — a finding established by
      Owen Gingerich and Noel Swerdlow that fundamentally
      reframed the historical relationship between Islamic
      astronomy and the Copernican revolution. He also designed and
      installed the magnificent sundial on the minaret of the
      Umayyad Mosque, still functioning today.
    description_ar: |
      توفي علاء الدين علي بن الشاطر — موقّت الجامع الأموي بدمشق،
      وأكبر مصلحي النماذج الفلكية البطلمية في عصر المماليك — بدمشق
      عن نحو ثلاث وسبعين سنة. وكتابه «نهاية السؤل في تصحيح الأصول»
      عرض نماذج للحركة الكوكبية تخلصت من «المعدّل» (equant) البطلمي،
      وأخرجت تنبؤات أقرب إلى الرصد من بطليموس. ونماذج كوبرنيكوس
      للقمر وعطارد في «حركات الأجرام السماوية» مطابقة رياضياً لنماذج
      ابن الشاطر، انتقلت إليه عبر وسطاء بيزنطيين-إغريقيين — وهذا ما
      أثبته أوين غينغريتش ونويل سويردلو، فأعاد ضبط العلاقة التاريخية
      بين الفلك الإسلامي والثورة الكوبرنيكية. كما صمّم ابن الشاطر
      وركّب المزولة الشمسية الباهرة على مئذنة الجامع الأموي، وما
      تزال تعمل إلى اليوم.
    description_fr: |
      ʿAla al-Dīn ʿAli ibn al-Shāṭir — *muwaqqit* en chef
      (chronométreur) de la Grande Mosquée des Omeyyades à Damas et
      le principal réformateur des modèles planétaires ptoléméens à
      l'ère mamelouke — mourut à Damas à l'âge d'environ 73 ans.
      Son *Nihāyat al-Suʾl fī Taṣḥīḥ al-Uṣūl* présenta des modèles
      planétaires qui éliminèrent l'*équant* ptoléméen et produisirent
      des résultats prédictifs s'accordant avec l'observation plus
      étroitement que ceux de Ptolémée; les modèles lunaires et de
      Mercure de Copernic dans *De Revolutionibus* sont mathématiquement
      identiques à ceux d'Ibn al-Shāṭir, transmis via des
      intermédiaires gréco-byzantins — une découverte établie par
      Owen Gingerich et Noel Swerdlow qui a fondamentalement
      reformulé la relation historique entre l'astronomie islamique
      et la révolution copernicienne. Il conçut et installa
      également le magnifique cadran solaire sur le minaret de la
      Grande Mosquée des Omeyyades, encore fonctionnel aujourd'hui.
