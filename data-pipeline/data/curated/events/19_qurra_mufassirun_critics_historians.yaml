  - slug: death-of-khabbab-ibn-al-aratt
    category: companion
    title_en: Death of Khabbab ibn al-Aratt ra — early martyr of Mecca
    title_ar: وفاة خباب بن الأرت رضي الله عنه — من أوائل المعذبين في الإسلام
    title_fr: Mort de Khabbāb ibn al-Aratt ra — martyr ancien de La Mecque
    description_en: |
      Khabbāb ibn al-Aratt al-Tamimi, sixth man to embrace Islam in
      Mecca and one of the most severely tortured Companions for
      his faith — burning coals were laid on his back until they
      were extinguished by the fat of his own flesh — died in Kufa
      at age about 73. He was a smith by trade, a freedman of Umm
      Anmār, and the narrator of the celebrated hadith in which the
      Companions complained of Quraysh's persecution to the Prophet ﷺ
      while he reclined on his cloak in the shadow of the Kaʿba,
      and the Prophet ﷺ replied: "Among those before you a man
      would be put in a pit and have a saw set to his head and be
      cleaved in two, yet that would not turn him from his religion"
      (Bukhari). ʿAli ra prayed over him, having stopped on his
      way to Ṣiffīn to do so. He was the first Muslim to be buried
      outside Medina or Mecca.
    description_ar: |
      توفي خباب بن الأرت التميمي رضي الله عنه — سادس من أسلم في
      مكة، وأحد أشد الصحابة عذاباً في سبيل الله، فقد كانت قريش
      تضع الجمر على ظهره حتى لا تطفئه إلا شحوم بدنه — بالكوفة عن
      نحو ثلاث وسبعين سنة. كان حداداً قيناً، ومولى لأم أنمار، وراوي
      الحديث المشهور الذي شكا فيه الصحابة عذاب قريش إلى رسول الله ﷺ
      وهو متوسد بردة له في ظل الكعبة، فقال له ﷺ: «قد كان من قبلكم
      ليؤخذ الرجل فيُحفر له في الأرض ثم يؤتى بالمنشار فيوضع على
      رأسه فيشق باثنتين، ما يصده ذلك عن دينه» (رواه البخاري). وصلى
      عليه علي رضي الله عنه، توقّف لذلك في طريقه إلى صفين. وهو أول
      مسلم دُفن خارج مكة والمدينة.
    description_fr: |
      Khabbāb ibn al-Aratt al-Tamīmī, sixième homme à embrasser
      l'Islam à La Mecque et l'un des Compagnons les plus
      sévèrement torturés pour sa foi — des charbons ardents étaient
      placés sur son dos jusqu'à ce qu'ils s'éteignent dans la
      graisse même de sa chair — mourut à Koufa à l'âge d'environ
      73 ans. Il était forgeron de métier, affranchi d'Umm Anmār,
      et le narrateur du célèbre hadith dans lequel les Compagnons
      se plaignirent de la persécution de Quraysh au Prophète ﷺ
      alors qu'il reposait sur son manteau à l'ombre de la Kaʿba,
      et le Prophète ﷺ répondit : « parmi ceux qui vous ont précédés,
      un homme était placé dans une fosse et l'on posait une scie
      sur sa tête et il était fendu en deux, et cela ne le détournait
      pas de sa religion » (Bukhārī). ʿAli ra pria sur lui, s'étant
      arrêté en chemin vers Ṣiffīn pour le faire. Il fut le premier
      musulman à être enterré hors de Médine ou de La Mecque.
    canonical_hijri: {year: 37, precision: year}
