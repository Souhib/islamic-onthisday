  - slug: death-of-yahya-ibn-main
    category: scholar
    title_en: Death of Yaḥya ibn Maʿin
    title_ar: وفاة يحيى بن معين
    title_fr: Mort de Yaḥyā ibn Maʿīn
    description_en: |
      Abu Zakariyya Yaḥya ibn Maʿin al-Baghdadi — close companion
      of Aḥmad ibn Ḥanbal and ʿAli ibn al-Madini, and the most
      celebrated single critic of hadith narrators in the Sunni
      tradition — died at Medina while on the Hajj, at age about
      77. He was buried in al-Baqiʿ. Two of his works survive: a
      *Tarīkh* and *Maʿrifat al-Rijāl*, both books of biographical
      assessment of hadith transmitters, foundational to the entire
      science of rijal. He famously said: "We wrote down hadith from
      reliable men and from liars; we wrote from the liars so that
      we might know what to reject." Aḥmad ibn Ḥanbal said: "Every
      hadith Yaḥya doesn't know is not a hadith." During the Mihna
      he was tried but, unlike his companion Aḥmad, did not endure
      with full firmness — a regret he expressed for the rest of
      his life.
    description_ar: |
      توفي الإمام أبو زكريا يحيى بن معين البغدادي — قرين الإمام أحمد
      بن حنبل وعلي بن المديني، وأشهر ناقد للرواة على الإطلاق في
      تراث أهل السنة — بالمدينة المنورة وهو في حجه عن نحو سبع
      وسبعين سنة. ودفن في البقيع. وله من المصنفات «التاريخ» و«معرفة
      الرجال»، كلاهما في أحوال رواة الحديث، وهما من أصول علم الرجال.
      ومن قوله المشهور: «إنما كتبنا الحديث عن الثقات وعن الكذابين؛
      كتبنا عن الكذابين لنعرف ما يُترك». وقال أحمد بن حنبل: «كل
      حديث لا يعرفه يحيى فليس بحديث». وفي محنة خلق القرآن امتُحن
      فلم يثبت ثبوت قرينه أحمد، وندم على ذلك ما عاش.
    description_fr: |
      Abu Zakariyyā Yaḥyā ibn Maʿīn al-Baghdādī — compagnon proche
      d'Aḥmad ibn Ḥanbal et d'ʿAli ibn al-Madīnī, et le plus célèbre
      critique unique de transmetteurs de hadith dans la tradition
      sunnite — mourut à Médine alors qu'il accomplissait le Ḥajj,
      à l'âge d'environ 77 ans. Il fut enterré à al-Baqīʿ. Deux de
      ses œuvres ont survécu : un *Tārīkh* et *Maʿrifat al-Rijāl*,
      tous deux livres d'évaluation biographique des transmetteurs
      de hadith, fondateurs de toute la science des *rijāl*. Il
      disait : « nous avons consigné les hadiths d'hommes fiables
      et de menteurs; nous avons consigné des menteurs pour savoir
      ce qu'il fallait rejeter ». Aḥmad ibn Ḥanbal dit : « tout
      hadith que Yaḥyā ne connaît pas n'est pas un hadith ». Lors
      de la *Miḥna*, il fut éprouvé mais, contrairement à son
      compagnon Aḥmad, ne tint pas avec la fermeté pleine — un
      regret qu'il exprima jusqu'à la fin de sa vie.
    canonical_hijri: {year: 233, month: 12, precision: month}
    canonical_gregorian: {date: 848-08-01, precision: month, method: tabular_conversion}
