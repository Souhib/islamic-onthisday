  # =========================================================================
  # HADITH CRITICS — MASTERS OF AL-JARH WA-L-TA'DIL
  # =========================================================================

  - slug: death-of-yahya-al-qattan
    category: scholar
    title_en: Death of Yaḥya ibn Saʿid al-Qaṭṭan — pioneer of hadith criticism
    title_ar: وفاة يحيى بن سعيد القطان — رائد علم الجرح والتعديل
    title_fr: Mort de Yaḥyā ibn Saʿid al-Qaṭṭān — pionnier de la critique du hadith
    description_en: |
      Yaḥya ibn Saʿid al-Qaṭṭan al-Tamimi — Basran muḥaddith and
      the first scholar to systematically apply formal authentication
      criteria to the chain of transmitters (*al-jarḥ wa-l-taʿdīl*)
      as a freestanding discipline — died in Basra at age about 78.
      He was the master of Aḥmad ibn Ḥanbal, ʿAli ibn al-Madini,
      and Yaḥya ibn Maʿin (the trio whose verdicts ground the
      science of rijal). Aḥmad ibn Ḥanbal said: "I have never seen
      with my eyes the like of Yaḥya al-Qaṭṭan." His decisive
      gradings of narrators set the framework that al-Bukhari and
      Muslim would inherit two generations later when assembling
      the two Ṣaḥīḥs. He prayed five hundred rakaʿat each night and
      never missed a Friday prayer in fifty years.
    description_ar: |
      توفي الإمام يحيى بن سعيد القطان التميمي البصري — أول من قنن
      علم الجرح والتعديل علماً مستقلاً، فطبق على رواة الحديث معايير
      منهجية في التوثيق والتجريح — بالبصرة عن نحو ثمانٍ وسبعين سنة.
      وهو شيخ الإمام أحمد بن حنبل وعلي بن المديني ويحيى بن معين،
      وهم الثلاثة الذين قام عليهم علم الرجال. قال الإمام أحمد: «ما
      رأت عيناي مثل يحيى بن سعيد القطان». وأحكامه الفاصلة في الرواة
      هي الإطار الذي ورثه عنه البخاري ومسلم بعد جيلين عند إخراج
      الصحيحين. وكان يصلي خمس مئة ركعة كل ليلة، ولم يفته جامع
      الجمعة خمسين سنة.
    description_fr: |
      Yaḥyā ibn Saʿīd al-Qaṭṭān al-Tamīmī — muḥaddith de Bassora
      et le premier savant à appliquer systématiquement des critères
      formels d'authentification à la chaîne des transmetteurs
      (*al-jarḥ wa-l-taʿdīl*) comme discipline autonome — mourut à
      Bassora à l'âge d'environ 78 ans. Il fut le maître d'Aḥmad
      ibn Ḥanbal, d'ʿAli ibn al-Madīnī et de Yaḥyā ibn Maʿīn (le
      trio dont les verdicts fondent la science des *rijāl*). Aḥmad
      ibn Ḥanbal dit : « je n'ai jamais vu de mes yeux le pareil
      de Yaḥyā al-Qaṭṭān ». Ses appréciations décisives sur les
      transmetteurs posèrent le cadre qu'al-Bukhari et Muslim
      hériteraient deux générations plus tard pour réunir les deux
      *Ṣaḥīḥ*. Il priait cinq cents rakʿats chaque nuit et ne
      manqua pas une prière du vendredi en cinquante ans.
    canonical_hijri: {year: 198, precision: year}
    canonical_gregorian: {date: 813-01-01, precision: year, method: attested}
