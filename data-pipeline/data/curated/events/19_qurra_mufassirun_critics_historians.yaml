  - slug: death-of-al-wahidi
    category: scholar
    title_en: Death of al-Waḥidi — pioneer of Asbab al-Nuzul
    title_ar: وفاة الواحدي — رائد علم أسباب النزول
    title_fr: Mort d'al-Wāḥidī — pionnier d'Asbāb al-Nuzūl
    description_en: |
      Abu al-Hasan ʿAli ibn Aḥmad al-Wahidi al-Naysaburi — Shafiʿi
      mufassir and grammarian of Naysabur, foremost student of the
      lexicographer al-Thaʿlabi, and author of the foundational
      work *Asbab al-Nuzul* (the standalone genre treating the
      historical occasions of revelation of individual Qurʾanic
      verses) — died in Naysabur at age about 70. Beyond *Asbab
      al-Nuzul*, his three tafsir works (*al-Basit*, *al-Wasit*,
      and *al-Wajiz*) became standard reading across the eastern
      Sunni world, and *al-Wajiz* in particular was the basis on
      which al-Ghazali later modeled his summary of fiqh of the
      same title. His grammatical commentary on the *Diwan* of al-
      Mutanabbi remained the standard reference for that text.
    description_ar: |
      توفي الإمام أبو الحسن علي بن أحمد الواحدي النيسابوري — مفسر
      وعالم لغة على مذهب الشافعية بنيسابور، وكبير تلاميذ المعجمي
      الثعلبي، ومصنف «أسباب النزول»، الكتاب الأول في علم أسباب
      النزول مفرداً عن بقية علوم القرآن — بنيسابور عن نحو سبعين
      سنة. وفضلاً عن «أسباب النزول» فإن تفاسيره الثلاثة («البسيط»
      و«الوسيط» و«الوجيز») صارت من المقررات في عامة المشرق السني،
      واتخذ الإمام الغزالي من «الوجيز» قالباً لكتابه الفقهي بنفس
      الاسم. وشرحه النحوي على ديوان المتنبي ظل المرجع المعتمد
      لذلك الديوان.
    description_fr: |
      Abu al-Ḥasan ʿAli ibn Aḥmad al-Wāḥidī al-Naysabūri — mufassir
      et grammairien shāfiʿite de Naysabur, premier élève du
      lexicographe al-Thaʿlabī, et auteur de l'œuvre fondatrice
      *Asbāb al-Nuzūl* (le genre autonome traitant des circonstances
      historiques de révélation des versets coraniques individuels)
      — mourut à Naysabur à l'âge d'environ 70 ans. Outre *Asbāb
      al-Nuzūl*, ses trois œuvres de tafsir (*al-Basīṭ*, *al-Wasīṭ*
      et *al-Wajīz*) devinrent des lectures standard à travers tout
      le monde sunnite oriental, et *al-Wajīz* en particulier servit
      de modèle au résumé de fiqh du même titre par al-Ghazāli. Son
      commentaire grammatical du *Dīwān* d'al-Mutanabbī demeura la
      référence standard de ce texte.
