  - slug: death-of-al-maqrizi
    category: scholar
    title_en: Death of al-Maqrizi — Egyptian historian
    title_ar: وفاة المقريزي — مؤرخ مصر
    title_fr: Mort d'al-Maqrīzī — historien d'Égypte
    description_en: |
      Taqi al-Din Aḥmad ibn ʿAli al-Maqrizi — Mamluk-era Egyptian
      Shafiʿi qadi, polymath historian, and the foremost chronicler
      of medieval Cairo — died in Cairo at age about 80. His *al-
      Mawaʿiz wa-l-Iʿtibar bi-Dhikr al-Khiṭaṭ wa-l-Athar* (commonly
      *al-Khiṭaṭ al-Maqrizīya*) is a topographical-historical
      encyclopedia of Egypt and Cairo, recording every quarter,
      mosque, madrasa, market, and waqf foundation in the city
      with the historical events tied to each — the indispensable
      source for medieval Cairene urbanism. His *al-Sulūk li-
      Maʿrifat Duwal al-Mulūk* is the standard chronicle of the
      Mamluk and Ayyubid periods. *Imtaʿ al-Asmaʿ* preserves a
      detailed sira-tradition for the Prophet ﷺ. He was a frequent
      victim of the political and economic crises of late Mamluk
      Egypt, which his *Ighatha al-Umma bi-Kashf al-Ghumma* analyses
      with rare economic acuity.
    description_ar: |
      توفي الإمام تقي الدين أحمد بن علي المقريزي — قاضي شافعية مصر
      في عصر المماليك، والمؤرخ الموسوعي وكبير مؤرخي القاهرة الوسطى —
      بالقاهرة عن نحو ثمانين سنة. وكتابه «المواعظ والاعتبار بذكر
      الخطط والآثار» (المعروف بـ«الخطط المقريزية») موسوعة جغرافية-
      تاريخية لمصر والقاهرة، يسجل كل حي ومسجد ومدرسة وسوق ووقف في
      المدينة مع ما تعلق به من حوادث، وهو المرجع الذي لا غنى عنه
      في عمران القاهرة في العصر الوسيط. وكتابه «السلوك لمعرفة دول
      الملوك» التاريخ المعتمد للعصرين الأيوبي والمملوكي. وفي «إمتاع
      الأسماع» سيرة نبوية مفصلة. وعانى رحمه الله أزمات مصر السياسية
      والاقتصادية في أواخر المماليك، وحلل أزمتها الاقتصادية في
      «إغاثة الأمة بكشف الغمة» تحليلاً اقتصادياً يندر مثله في عصره.
    description_fr: |
      Taqi al-Dīn Aḥmad ibn ʿAli al-Maqrīzī — qāḍī shāfiʿite
      égyptien de l'ère mamelouke, historien polymathe et le plus
      grand chroniqueur du Caire médiéval — mourut au Caire à l'âge
      d'environ 80 ans. Son *al-Mawāʿiẓ wa-l-Iʿtibār bi-Dhikr al-
      Khiṭaṭ wa-l-Āthār* (communément *al-Khiṭaṭ al-Maqrīzīya*)
      est une encyclopédie topographique-historique de l'Égypte et
      du Caire, consignant chaque quartier, mosquée, madrasa, marché
      et fondation *waqf* de la ville avec les événements historiques
      qui leur sont liés — la source indispensable pour l'urbanisme
      cairote médiéval. Son *al-Sulūk li-Maʿrifat Duwal al-Mulūk*
      est la chronique standard des périodes mamelouke et ayyoubide.
      *Imtāʿ al-Asmāʿ* préserve une tradition *sīra* détaillée pour
      le Prophète ﷺ. Il fut fréquemment victime des crises politiques
      et économiques de la fin de l'Égypte mamelouke, que son
      *Ighāthat al-Umma bi-Kashf al-Ghumma* analyse avec une acuité
      économique rare.
