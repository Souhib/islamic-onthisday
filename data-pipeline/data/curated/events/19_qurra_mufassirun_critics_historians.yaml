# Wave 6 of curated event additions (2026-04-26).
# 3 remaining major qurra' (completing the seven canonical readers)
# + 3 mufassirun + 3 hadith critics (al-jarh wa-l-ta'dil masters)
# + 3 historians + 1 senior sahabi + 1 astronomer + 1 anatolian sufi poet.
# Each event attested in classical Sunni sources. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # REMAINING MAJOR QURRA' (THE SEVEN CANONICAL READERS)
  # =========================================================================

  - slug: death-of-ibn-kathir-al-makki
    category: scholar
    title_en: Death of Ibn Kathir al-Makki — qari of Mecca
    title_ar: وفاة ابن كثير المكي — قارئ مكة
    title_fr: Mort d'Ibn Kathīr al-Makki — récitateur de La Mecque
    description_en: |
      ʿAbdullah ibn Kathir al-Dari al-Makki — Persian-origin tabiʿi
      and one of the seven canonical reciters (*al-qurraʾ al-sabʿa*),
      qari of Mecca and the master from whose two students al-Bazzī
      and Qunbul descend the readings of the Hijazi tradition — died
      in Mecca at age about 75. Not to be confused with the much
      later historian Ibn Kathīr al-Dimashqī (d. 774 AH) who
      authored *al-Bidāya wa-l-Nihāya*. Ibn Kathir al-Makki took his
      recitation from Mujāhid ibn Jabr and Darbās the freedman of
      Ibn ʿAbbās, who had it directly from Ubayy ibn Kaʿb ra. al-
      Shāfiʿi, who was raised in Mecca, used to read in his
      transmission. The Bazzī and Qunbul recitations are preserved
      in scholarly transmission today though not in standard
      circulation.
    description_ar: |
      توفي الإمام عبد الله بن كثير الداري المكي — تابعي من أصول
      فارسية وأحد القراء السبعة، وقارئ أهل مكة والإمام الذي أخرج
      تلميذاه البزّي وقنبل روايتيه اللتين سادتا في قراءة أهل الحجاز
      — بمكة المكرمة عن نحو خمس وسبعين سنة. ولا يُخلط بينه وبين ابن
      كثير الدمشقي المتأخر (ت ٧٧٤ هـ) صاحب «البداية والنهاية». وأخذ
      ابن كثير المكي القراءة عن مجاهد بن جبر وعن دِرباس مولى ابن
      عباس عن أبيّ بن كعب رضي الله عنه. وكان الإمام الشافعي — وقد
      نشأ بمكة — يقرأ بقراءته. ولا تزال روايتا البزي وقنبل محفوظتين
      في الأسانيد المعتمدة وإن لم تكونا في الدوران العام.
    description_fr: |
      ʿAbdallāh ibn Kathīr al-Dāri al-Makki — tabiʿi d'origine
      persane et l'un des sept récitateurs canoniques (*al-qurrāʾ
      al-sabʿa*), récitateur de La Mecque et le maître dont les
      deux élèves al-Bazzī et Qunbul firent descendre les lectures
      de la tradition hedjazienne — mourut à La Mecque à l'âge
      d'environ 75 ans. À ne pas confondre avec l'historien beaucoup
      plus tardif Ibn Kathīr al-Dimashqī (m. 774 H) qui rédigea
      *al-Bidāya wa-l-Nihāya*. Ibn Kathīr al-Makki prit sa
      récitation de Mujāhid ibn Jabr et de Darbās l'affranchi d'Ibn
      ʿAbbās, qui la tenaient directement d'Ubayy ibn Kaʿb ra.
      al-Shāfiʿi, élevé à La Mecque, lisait dans sa transmission.
      Les récitations al-Bazzī et Qunbul sont préservées aujourd'hui
      dans la transmission savante, bien que non en circulation
      standard.
    canonical_hijri: {year: 120, precision: year}
    canonical_gregorian: {date: 738-01-01, precision: year, method: attested}
