  - slug: death-of-ibn-khallikan
    category: scholar
    title_en: Death of Ibn Khallikan — author of Wafayat al-Aʿyan
    title_ar: وفاة ابن خلكان — صاحب «وفيات الأعيان»
    title_fr: Mort d'Ibn Khallikān — auteur de Wafayāt al-Aʿyān
    description_en: |
      Shams al-Din Aḥmad ibn Muḥammad Ibn Khallikan — Shafiʿi
      qadi of Damascus and author of *Wafayat al-Aʿyan wa-Anbaʾ
      Abnaʾ al-Zaman*, the standard general biographical dictionary
      of the medieval Sunni tradition — died in Damascus at age
      about 73. *Wafayat al-Aʿyan* contains 855 entries on
      historically prominent figures from the Companions to the
      mid-7th century AH, deliberately organised by death-date
      rather than by category to surface what each generation
      collectively contributed; the work became the model imitated
      by every later biographical dictionary in Arabic, including
      al-Dhahabi's *Tarikh al-Islam* and Ibn Hajar's *Inbaʾ al-
      Ghumr*. Ibn Khallikan studied with the family of Ibn al-Athir
      historians at Mosul; his judgements are uniformly cited as
      authoritative.
    description_ar: |
      توفي القاضي شمس الدين أحمد بن محمد ابن خلكان — قاضي قضاة
      الشافعية بدمشق، ومصنف «وفيات الأعيان وأنباء أبناء الزمان»،
      المعجم البيوغرافي العام المعتمد في تراث أهل السنة في العصور
      الوسطى — بدمشق عن نحو ثلاث وسبعين سنة. ويضم «وفيات الأعيان»
      ٨٥٥ ترجمة لأعلام الإسلام من الصحابة إلى منتصف القرن السابع
      الهجري، ورتبه ابن خلكان عن قصد بحسب سنوات الوفاة لا
      بالموضوعات ليبرز إسهام كل جيل مجتمعاً؛ فصار قالب كل المعاجم
      البيوغرافية بالعربية بعده، ومنها «تاريخ الإسلام» للذهبي
      و«إنباء الغمر» لابن حجر العسقلاني. وأخذ ابن خلكان عن آل ابن
      الأثير المؤرخين بالموصل، وأحكامه يُحال إليها مرجعاً عند
      المتأخرين.
    description_fr: |
      Shams al-Dīn Aḥmad ibn Muḥammad Ibn Khallikān — qāḍī shāfiʿite
      de Damas et auteur de *Wafayāt al-Aʿyān wa-Anbāʾ Abnāʾ al-
      Zamān*, le dictionnaire biographique général de référence de
      la tradition sunnite médiévale — mourut à Damas à l'âge
      d'environ 73 ans. *Wafayāt al-Aʿyān* contient 855 notices sur
      des figures historiques éminentes depuis les Compagnons
      jusqu'au milieu du VIIe siècle de l'Hégire, délibérément
      organisées par date de décès plutôt que par catégorie afin de
      faire émerger ce que chaque génération collectivement
      apporta; l'œuvre devint le modèle imité par tout dictionnaire
      biographique arabe ultérieur, y compris *Tārīkh al-Islām*
      d'al-Dhahabī et *Inbāʾ al-Ghumr* d'Ibn Ḥajar. Ibn Khallikān
      étudia auprès de la famille des historiens Ibn al-Athīr à
      Mossoul; ses jugements sont uniformément cités comme faisant
      autorité.
    canonical_hijri: {year: 681, month: 11, precision: month}
    canonical_gregorian: {date: 1282-10-01, precision: month, method: tabular_conversion}
