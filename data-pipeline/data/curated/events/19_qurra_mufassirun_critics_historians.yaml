  - slug: death-of-al-kisai
    category: scholar
    title_en: Death of al-Kisaʾi — qari and grammarian of Kufa
    title_ar: وفاة الكسائي — قارئ الكوفة وإمام النحو
    title_fr: Mort d'al-Kisāʾī — récitateur et grammairien de Koufa
    description_en: |
      ʿAli ibn Hamza al-Kisaʾi — last of the seven canonical
      reciters in chronological order, leading representative of
      the Kufan school of Arabic grammar (the rival of Abu ʿAmr's
      Basran tradition), and tutor to the future Abbasid caliphs
      al-Amin and al-Maʾmun — died at Rayy in the company of Caliph
      Harun al-Rashid at age about 70. His recitation was the
      preferred reading at the Abbasid court, transmitted to us
      principally through Abu al-Harith al-Layth and al-Duri ʿan
      al-Kisaʾi. The famous "debate of the slipper" (*masʾalat al-
      naʿl*) at the court of Harun al-Rashid, in which al-Kisaʾi
      and Sibawayhi clashed over a point of grammar with the
      Bedouin arbiter siding with al-Kisaʾi, broke Sibawayhi's
      Basran reputation and consolidated Kufan grammatical authority
      for two generations.
    description_ar: |
      توفي الإمام علي بن حمزة الكسائي — آخر القراء السبعة في الترتيب
      الزمني، وزعيم مدرسة الكوفة في النحو (غريمة مدرسة البصرة بقيادة
      أبي عمرو)، ومؤدب الخلفاء العباسيين الأمين والمأمون — بالريّ
      في صحبة الخليفة هارون الرشيد عن نحو سبعين سنة. كانت قراءته هي
      القراءة المفضلة في البلاط العباسي، ووصلت إلينا أساساً برواية
      أبي الحارث الليث والدوري عن الكسائي. و«مسألة الزنبور» (وقيل
      «النعل») في مجلس هارون الرشيد، التي تنازع فيها الكسائي وسيبويه
      في مسألة نحوية فحكم الأعرابي للكسائي، كسرت مكانة سيبويه ورسّخت
      السلطة النحوية للكوفيين جيلين كاملين.
    description_fr: |
      ʿAli ibn Ḥamza al-Kisāʾī — dernier des sept récitateurs
      canoniques par ordre chronologique, principal représentant de
      l'école de grammaire arabe de Koufa (rivale de la tradition
      basrienne d'Abu ʿAmr), et précepteur des futurs califes
      abbassides al-Amīn et al-Maʾmūn — mourut à Rayy en compagnie
      du calife Hārūn al-Rashīd à l'âge d'environ 70 ans. Sa
      récitation était la lecture préférée à la cour abbasside,
      transmise jusqu'à nous principalement par Abū al-Ḥārith
      al-Layth et al-Dūrī ʿan al-Kisāʾī. Le célèbre « débat du
      soulier » (*masʾalat al-naʿl*) à la cour de Hārūn al-Rashīd,
      dans lequel al-Kisāʾī et Sībawayhi s'affrontèrent sur un point
      de grammaire et où le bédouin arbitre trancha en faveur
      d'al-Kisāʾī, brisa la réputation basrienne de Sībawayhi et
      consolida l'autorité grammaticale koufienne pour deux
      générations.
    canonical_hijri: {year: 189, precision: year}
    canonical_gregorian: {date: 805-01-01, precision: year, method: attested}
