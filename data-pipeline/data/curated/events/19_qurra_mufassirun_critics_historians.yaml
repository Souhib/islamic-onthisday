  - slug: death-of-al-shawkani
    category: scholar
    title_en: Death of al-Shawkani — Yemeni reformer
    title_ar: وفاة الشوكاني — مجتهد اليمن
    title_fr: Mort d'al-Shawkani — réformateur du Yémen
    description_en: |
      Muhammad ibn ʿAli al-Shawkani al-Sanʿani — Yemeni jurist,
      mufassir, muḥaddith, and chief qadi of Sanaa under three
      Zaydi imams — died in Sanaa at age about 76. Born in the Zaydi
      milieu, he ultimately rejected madhhab taqlid and called for
      direct ijtihad from Qurʾan and authentic Sunna across the four
      Sunni madhāhib equally; his tafsir *Fatḥ al-Qadīr* combines
      *tafsīr bi-l-maʾthūr* and *tafsīr bi-l-raʾy*, and his hadith
      handbook *Nayl al-Awṭar* (commentary on al-Majd ibn Taymiyya's
      *Muntaqā al-Akhbar*) is one of the most-cited fiqh-cum-hadith
      compendia of the late premodern Sunni tradition. Modern Salafi
      reformers from Rashid Riḍa to al-Albani consistently invoke
      his independence from madhhab boundaries as their precedent.
    description_ar: |
      توفي الإمام محمد بن علي الشوكاني الصنعاني — فقيه ومفسر ومحدث
      اليمن، وقاضي قضاة صنعاء في عهد ثلاثة من أئمة الزيدية — بصنعاء
      عن نحو ست وسبعين سنة. نشأ في الوسط الزيدي ثم انتهى إلى رفض
      التقليد المذهبي ودعا إلى الاجتهاد المباشر من الكتاب والسنة
      الصحيحة في حدود المذاهب السنية الأربعة على السواء؛ وتفسيره
      «فتح القدير» يجمع بين التفسير بالمأثور والتفسير بالرأي،
      وكتابه «نيل الأوطار» في الحديث (شرح «منتقى الأخبار» للمجد بن
      تيمية) من أكثر المتون الفقهية-الحديثية إحالةً عليه في تراث
      أهل السنة في أواخر العصر قبل الحديث. ومجتهدو السلفية المعاصرون
      من رشيد رضا إلى الألباني يعدّون استقلاله عن التقيد بالمذاهب
      سابقةً لاجتهادهم.
    description_fr: |
      Muḥammad ibn ʿAli al-Shawkānī al-Ṣanʿānī — juriste, mufassir,
      muḥaddith yéménite et grand qāḍī de Sanaa sous trois imams
      zaydites — mourut à Sanaa à l'âge d'environ 76 ans. Né dans
      le milieu zaydite, il finit par rejeter le *taqlīd* madhhabite
      et appela à l'*ijtihād* direct à partir du Coran et de la
      Sunna authentique à travers les quatre madhāhib sunnites de
      manière égale; son tafsir *Fatḥ al-Qadīr* combine *tafsīr
      bi-l-maʾthūr* et *tafsīr bi-l-raʾy*, et son manuel de hadith
      *Nayl al-Awṭār* (commentaire de *Muntaqā al-Akhbār* d'al-Majd
      ibn Taymiyya) est l'un des compendiums fiqh-hadith les plus
      cités de la tradition sunnite pré-moderne tardive. Les
      réformateurs salafis modernes, de Rashīd Riḍā à al-Albānī,
      invoquent constamment son indépendance des frontières
      madhhabiques comme précédent.
