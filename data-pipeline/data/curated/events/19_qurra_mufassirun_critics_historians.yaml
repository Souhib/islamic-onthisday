  - slug: death-of-al-baghawi
    category: scholar
    title_en: Death of al-Baghawi — Muḥyi al-Sunna
    title_ar: وفاة البغوي — مُحيي السنة
    title_fr: Mort d'al-Baghawī — Muḥyi al-Sunna
    description_en: |
      Abu Muḥammad al-Husayn ibn Masʿud al-Baghawi — Shafiʿi jurist,
      mufassir, and muḥaddith of Khurasan, honoured with the laqab
      *Muḥyi al-Sunna* ("Reviver of the Sunna") and *Rukn al-Din*
      ("Pillar of the Religion") — died at Marv al-Rudh at age
      about 80. His tafsir *Maʿalim al-Tanzil* is the most-read
      mid-length classical Sunni commentary, distilled from al-
      Thaʿlabi's longer *al-Kashf wa-l-Bayan* and famously praised
      by Ibn Taymiyya as "free of bidʿa, and of the lies that fill
      al-Thaʿlabi and al-Wahidi." His *Sharḥ al-Sunna* in fifteen
      volumes is a hadith manual organised by chapters of fiqh,
      cited by every later Shafiʿi authority. *Maṣabiḥ al-Sunna*,
      his hadith abridgement, became the basis of al-Tabrizi's
      enormously influential *Mishkat al-Maṣabiḥ*.
    description_ar: |
      توفي الإمام أبو محمد الحسين بن مسعود البغوي — فقيه ومفسر ومحدث
      الشافعية بخراسان، الملقب بـ«محيي السنة» و«ركن الدين» — بمرو
      الروذ عن نحو ثمانين سنة. تفسيره «معالم التنزيل» أكثر تفاسير
      أهل السنة المتوسطة الحجم انتشاراً، استخلصه من «الكشف والبيان»
      للثعلبي، وأثنى عليه ابن تيمية فقال: «هو سالم من البدعة، ومن
      الكذب الذي ملأ الثعلبي والواحدي تفسيريهما». وكتابه «شرح السنة»
      في خمسة عشر مجلداً متن في الحديث مرتب على أبواب الفقه، يُعتمد
      عليه عند كل المتأخرين الشافعية. ومختصره الحديثي «مصابيح
      السنة» كان أصل كتاب التبريزي «مشكاة المصابيح» الواسع الانتشار.
    description_fr: |
      Abu Muḥammad al-Ḥusayn ibn Masʿūd al-Baghawī — juriste,
      mufassir et muḥaddith shāfiʿite du Khurasan, honoré du laqab
      *Muḥyi al-Sunna* (« Revivificateur de la Sunna ») et *Rukn
      al-Dīn* (« Pilier de la Religion ») — mourut à Marv al-Rudh
      à l'âge d'environ 80 ans. Son tafsir *Maʿālim al-Tanzīl* est
      le commentaire sunnite classique de longueur moyenne le plus
      lu, distillé du *al-Kashf wa-l-Bayān* d'al-Thaʿlabī et
      célèbrement loué par Ibn Taymiyya comme « libre de *bidʿa* et
      des mensonges dont al-Thaʿlabī et al-Wāḥidī remplissent leurs
      tafsirs ». Son *Sharḥ al-Sunna* en quinze volumes est un
      manuel de hadith organisé par chapitres de fiqh, cité par
      toute autorité shāfiʿite ultérieure. *Maṣābīḥ al-Sunna*, son
      abrégé de hadith, devint la base du *Mishkāt al-Maṣābīḥ*
      énormément influent d'al-Tabrīzī.
    canonical_hijri: {year: 516, precision: year}
    canonical_gregorian: {date: 1122-01-01, precision: year, method: attested}
