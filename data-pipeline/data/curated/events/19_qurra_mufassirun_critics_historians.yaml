  # =========================================================================

  - slug: death-of-al-waqidi
    category: scholar
    title_en: Death of al-Waqidi — early biographer of the Maghazi
    title_ar: وفاة الواقدي — مؤرخ المغازي
    title_fr: Mort d'al-Wāqidī — biographe ancien des Maghāzī
    description_en: |
      Muhammad ibn ʿUmar al-Waqidi — Madinan-born qadi of Baghdad
      under al-Maʾmun and the most extensive early historian of
      the Prophetic campaigns (*maghazi*) — died in Baghdad at age
      about 78. His *Kitab al-Maghazi* — by far the most detailed
      surviving early account of the Prophet's ﷺ military
      expeditions — covers each event of the Medinan period in
      meticulous chronology, with full geographical and prosopo-
      graphical apparatus. Although the later muḥaddith critics
      (al-Bukhari, al-Nasaʾi, Aḥmad ibn Ḥanbal) graded him weak in
      isnad-criticism for his loose practice with chains — the
      maghazi material itself is too rich and too well embedded in
      the Madinan tradition to dismiss; al-Tabari draws on him
      heavily, as do all later sira writers.
    description_ar: |
      توفي الإمام محمد بن عمر الواقدي — مدني المنشأ، قاضي بغداد في
      عهد المأمون، وأوسع المؤرخين الأوائل في أخبار المغازي النبوية —
      ببغداد عن نحو ثمانٍ وسبعين سنة. وكتابه «المغازي» أوسع ما وصلنا
      من سير الغزوات النبوية، يستوفي أخبار العصر المدني في تواريخ
      دقيقة مع جهازه الجغرافي والتراجمي الكامل. ومع أن متأخري نقاد
      الحديث (البخاري والنسائي وأحمد) ضعفوه في النقل الإسنادي بسبب
      تساهله في الأسانيد، فإن مادة المغازي عنده أوفر من أن تُترك
      وأرسخ في تراث المدينة، فاعتمد عليه الطبري بكثرة، وكذلك كل
      كتاب سيرة بعده.
    description_fr: |
      Muḥammad ibn ʿUmar al-Wāqidī — natif de Médine, qāḍī de Bagdad
      sous al-Maʾmūn et l'historien ancien le plus exhaustif des
      campagnes prophétiques (*maghāzī*) — mourut à Bagdad à l'âge
      d'environ 78 ans. Son *Kitāb al-Maghāzī* — de loin le récit
      ancien le plus détaillé survivant des expéditions militaires
      du Prophète ﷺ — couvre chaque événement de la période
      médinoise dans une chronologie méticuleuse, avec un appareil
      géographique et prosopographique complet. Bien que les
      critiques de hadith ultérieurs (al-Bukhārī, al-Nasāʾī, Aḥmad
      ibn Ḥanbal) l'aient classé faible en critique d'*isnād* pour
      sa pratique souple des chaînes — le matériau *maghāzī* lui-
      même est trop riche et trop bien ancré dans la tradition
      médinoise pour être écarté; al-Ṭabari y puise largement, de
      même que tous les biographes ultérieurs du Prophète ﷺ.
    canonical_hijri: {year: 207, month: 4, precision: month}
    canonical_gregorian: {date: 822-09-01, precision: month, method: tabular_conversion}
    claims:
