    importance: notable
    verification_status: cross_verified

  - slug: death-of-abu-amr-al-basri
    category: scholar
    title_en: Death of Abu ʿAmr al-Basri — qari and grammarian of Basra
    title_ar: وفاة أبي عمرو البصري — قارئ البصرة وإمام النحو
    title_fr: Mort d'Abu ʿAmr al-Baṣrī — récitateur et grammairien de Bassora
    description_en: |
      Abu ʿAmr ibn al-ʿAlaʾ al-Mazini al-Tamimi al-Basri — one of
      the seven canonical reciters and the foremost master of
      Arabic grammar in his generation — died in Kufa at age about
      80. He was reckoned by classical philologists as the founder
      of the Basran school of Arabic grammar, the rival tradition
      to al-Khalil ibn Aḥmad's Kufan school; al-Aṣmaʿi and Yunus
      ibn Habib were among his students. His recitation, transmitted
      to us through al-Susi (d. 261 AH) and al-Duri (d. 246 AH),
      remained in active liturgical use across parts of the Maghreb
      into the modern era. Sources differ on the year of his death
      between 154 and 157 AH.
    description_ar: |
      توفي الإمام أبو عمرو بن العلاء المازني التميمي البصري — أحد
      القراء السبعة، وكبير علماء النحو في زمانه — بالكوفة عن نحو
      ثمانين سنة. وعدّه أئمة اللغة الكلاسيكية مؤسس مدرسة البصرة
      النحوية، التي كانت غريمة مدرسة الكوفة بقيادة الخليل بن أحمد؛
      ومن تلامذته الأصمعي ويونس بن حبيب. ووصلت قراءته إلينا برواية
      السوسي (ت ٢٦١ هـ) والدوري (ت ٢٤٦ هـ)، وظلت قراءته في
      الاستخدام في بعض جهات المغرب إلى العصر الحديث. واختلف المصادر
      في سنة وفاته بين ١٥٤ و١٥٧ هـ.
    description_fr: |
      Abu ʿAmr ibn al-ʿAlāʾ al-Māzinī al-Tamīmī al-Baṣrī — l'un des
      sept récitateurs canoniques et le plus grand maître de la
      grammaire arabe de sa génération — mourut à Koufa à l'âge
      d'environ 80 ans. Il était considéré par les philologues
      classiques comme le fondateur de l'école de grammaire arabe
      de Bassora, la tradition rivale de l'école koufienne d'al-
      Khalīl ibn Aḥmad; al-Aṣmaʿi et Yūnus ibn Ḥabīb comptaient
      parmi ses élèves. Sa récitation, transmise jusqu'à nous par
      al-Sūsī (m. 261 H) et al-Dūrī (m. 246 H), demeura en usage
      liturgique actif dans certaines parties du Maghreb jusqu'à
      l'époque moderne. Les sources divergent sur l'année de sa
      mort entre 154 et 157 H.
    canonical_hijri: {year: 154, precision: year}
    canonical_gregorian: {date: 770-01-01, precision: year, method: attested}
