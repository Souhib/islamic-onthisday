  # =========================================================================
  # ANDALUSI ASTRONOMY
  # =========================================================================

  - slug: death-of-al-zarqali
    category: scholar_death
    title_en: Death of al-Zarqālī (Azarchel) — Astronomer of Toledo and Cordoba
    title_ar: وفاة الزرقاليّ — فلكيّ طليطلة وقرطبة
    title_fr: Mort d'al-Zarqālī (Azarchel) — astronome de Tolède et Cordoue
    description_en: |
      Abū Isḥāq Ibrāhīm ibn Yaḥyā al-Naqqāsh al-Zarqālī — Andalusi
      Sunni astronomer and instrument-maker, originally a metalsmith
      at Toledo in the *ṭāʾifa* of the Banū Dhū al-Nūn, then at
      Cordoba under the ʿAbbādids and Almoravids — died around
      493 AH (1100 CE) at Cordoba. He led the Toledo team that
      produced the *Toledan Tables* (the most accurate planetary
      tables in eleventh-century Europe, used continuously for
      two centuries until al-Zarqālī's own pupil-tradition
      produced the *Alfonsine Tables* in Castile). He invented an
      improved universal astrolabe (the *ṣafīḥa zarqāliyya* or
      *azafea*, transliterated into Latin as *saphaea*) usable at
      any latitude, replacing the latitude-specific plates of the
      classical Arabic and Greek instruments. His observations
      detected variation in the apsidal motion of the solar orbit
      — a finding cited by Copernicus in *De Revolutionibus*.
    description_ar: |
      توفي أبو إسحاق إبراهيم بن يحيى النقّاش الزرقاليّ — فلكيٌّ
      أندلسيٌّ سنّيٌّ وصانعُ آلاتٍ، نشأ نقّاشاً (صائغ معادن) في
      طليطلة في طائفة بني ذي النون، ثم انتقل إلى قرطبة في عهد
      العبّاديين والمرابطين — نحو سنة ٤٩٣ هـ (١١٠٠ م) بقرطبة.
      ترأَّس فريق طليطلة الذي أنتج «الأزياج الطليطلية» (أدقّ
      جدولٍ كوكبيٍّ في أوروبا في القرن الحادي عشر، استُخدم
      قرنين متّصلين حتى أنتج تلامذته في النهج «أزياج ألفونسو»
      بقشتالة). واخترع إسطرلاباً عالمياً مطوّراً («الصفيحة
      الزرقالية») يصلح في كلّ عرضٍ جغرافيٍّ، فاستغنى به عن
      صفائح الإسطرلاب الكلاسيكية المخصّصة لكلّ عرضٍ. وكشفت
      أرصاده تغيراً في حركة الأوج الشمسي — وهو نتيجةٌ استشهد
      بها كوبرنيكوس في «دوران الأفلاك».
    description_fr: |
      Abū Isḥāq Ibrāhīm ibn Yaḥyā al-Naqqāsh al-Zarqālī —
      astronome sunnite andalou et facteur d'instruments, à
      l'origine orfèvre métallurgiste à Tolède dans la *ṭāʾifa*
      des Banū Dhī al-Nūn, puis à Cordoue sous les ʿAbbādides et
      les Almoravides — mourut vers 493 H (1100 EC) à Cordoue.
      Il dirigea l'équipe tolédane qui produisit les *Tables
      tolédanes* (les tables planétaires les plus exactes de
      l'Europe du XIe siècle, utilisées en continu pendant deux
      siècles jusqu'à ce que la tradition issue de ses propres
      disciples produise les *Tables alphonsines* en Castille).
      Il inventa un astrolabe universel perfectionné (*ṣafīḥa
      zarqāliyya* ou *azafea*, translittéré en latin *saphaea*)
      utilisable à toute latitude, remplaçant les plaques propres
      à chaque latitude des instruments arabes et grecs classiques.
      Ses observations décelèrent une variation dans le mouvement
      apsidal de l'orbite solaire — un résultat cité par Copernic
      dans *De Revolutionibus*.
    canonical_hijri: {year: 493, precision: year}
    canonical_gregorian: {date: 1100-01-01, precision: year, method: tabular_conversion}
