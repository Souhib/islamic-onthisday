  - slug: death-of-al-farghani
    category: scholar_death
    title_en: Death of Aḥmad al-Farghānī (Alfraganus)
    title_ar: وفاة أحمد الفرغاني
    title_fr: Mort d'Aḥmad al-Farghānī (Alfraganus)
    description_en: |
      Abū al-ʿAbbās Aḥmad ibn Muḥammad ibn Kathīr al-Farghānī —
      Transoxanian astronomer of the House of Wisdom under the
      ʿAbbāsid caliphs al-Maʾmūn and al-Mutawakkil, later employed
      by the latter as the engineer of the Nilometer at Fusṭāṭ —
      died around 247 AH (~861 CE), with the exact day not
      preserved in the classical Sunni biographical sources. His
      *Jawāmiʿ ʿIlm al-Nujūm* (Compendium of the Science of the
      Stars) was the standard Latin-medieval introduction to
      Ptolemaic astronomy under the title *Elementa Astronomica*,
      translated by John of Seville (1135) and Gerard of Cremona
      (twelfth century); Dante refers to its data on the size of
      the Earth in the *Convivio*. He calculated the obliquity of
      the ecliptic, the precession of the equinoxes, and the
      diameter of the Earth at values closer to modern measurement
      than any predecessor. Year-precision is retained because
      classical sources do not converge on the day or month.
    description_ar: |
      توفي أبو العباس أحمد بن محمد بن كثير الفرغاني — فلكيٌّ
      ما وراء النهري من علماء «بيت الحكمة» في خلافتَي المأمون
      والمتوكل، ثمّ استعمله المتوكلُ مهندساً لمقياس النيل بفسطاط
      مصر — نحو سنة ٢٤٧ هـ (~٨٦١ م)، ولم تُحفظ في المصادر
      الإسلامية الكلاسيكية تواريخُ يومه أو شهره. وقد كان كتابه
      «جوامع علم النجوم» المدخلَ المعتمد لعلم الفلك البطلميّ في
      أوروبا اللاتينية الوسيطية تحت اسم *Elementa Astronomica*،
      ترجمه جون السيفلي (سنة ١١٣٥ م) ثم جيرارد الكريموني (في
      القرن الثاني عشر)؛ ويستشهد دانتي ببياناته عن حجم الأرض
      في «الوليمة» (*Convivio*). وحسَب ميلَ فلك البروج ومقدارَ
      تقدّم الاعتدالين وقطرَ الأرض بقيمٍ أقربَ إلى القياس الحديث
      من سابقيه. ويُكتفى هنا بدقّة السنة لأن المصادر القديمة
      لا تتفق على اليوم ولا الشهر.
    description_fr: |
      Abū al-ʿAbbās Aḥmad ibn Muḥammad ibn Kathīr al-Farghānī —
      astronome transoxianais de la Maison de la Sagesse sous les
      califes ʿabbāsides al-Maʾmūn et al-Mutawakkil, puis employé
      par ce dernier comme ingénieur du nilomètre de Fusṭāṭ —
      mourut vers 247 H (~861 EC), le jour exact n'étant pas
      préservé dans les sources biographiques sunnites classiques.
      Son *Jawāmiʿ ʿIlm al-Nujūm* (Compendium de la science des
      étoiles) fut l'introduction standard latino-médiévale à
      l'astronomie ptolémaïque sous le titre *Elementa Astronomica*,
      traduit par Jean de Séville (1135) et Gérard de Crémone (XIIe
      siècle) ; Dante fait référence à ses données sur la taille
      de la Terre dans le *Convivio*. Il calcula l'obliquité de
      l'écliptique, la précession des équinoxes et le diamètre de
      la Terre à des valeurs plus proches de la mesure moderne
      qu'aucun prédécesseur. La précision annuelle est retenue car
      les sources classiques ne convergent pas sur le jour ni le
      mois.
