  # =========================================================================
  # MARĀGHA OBSERVATORY (ʿABBĀSID-MONGOL TRANSITION)
  # =========================================================================

  - slug: death-of-nasir-al-din-al-tusi
    category: scholar_death
    title_en: Death of Naṣīr al-Dīn al-Ṭūsī — Director of the Marāgha Observatory
    title_ar: وفاة نصير الدين الطوسي — رئيس مرصد مراغة
    title_fr: Mort de Naṣīr al-Dīn al-Ṭūsī — directeur de l'observatoire de Marāgha
    description_en: |
      Muḥammad ibn Muḥammad ibn al-Ḥasan al-Ṭūsī, Naṣīr al-Dīn —
      Khurāsānian polymath who, after the Mongol sack of Baghdad
      in 656 AH (1258 CE), persuaded Hülegü to fund the construction
      of the Marāgha observatory in Azerbaijan and assemble there
      a multinational team of astronomers (al-ʿUrḍī from Damascus,
      Quṭb al-Dīn al-Shīrāzī, Muḥyī al-Dīn al-Maghribī, the
      Chinese astronomer Fu Mengji) — died at Baghdad on 18
      Dhū al-Ḥijja 672 AH (25 June 1274 CE), aged 75. His
      *al-Tadhkira fī ʿIlm al-Hayʾa* introduced the *Ṭūsī couple*,
      a geometric construction generating linear motion from two
      circular motions, used to replace the Ptolemaic equant; the
      identical construction reappears in Copernicus's *De
      Revolutionibus* via Greek manuscript intermediaries. His
      *Zīj-i Īlkhānī* gave the most accurate planetary tables of
      its era, and his *Taḥrīr* recensions of Euclid, Ptolemy,
      Apollonius, and Archimedes were the standard textbooks of
      the eastern Islamic schools for three centuries. His
      astronomical contribution belongs to shared Islamic
      civilizational heritage; this entry confines itself to
      that scientific dimension. Ibn Kathīr's *Bidāya* notes him
      under the year 672 AH; Dhahabī's *Tārīkh al-Islām* gives the
      same dating.
    description_ar: |
      توفي محمد بن محمد بن الحسن الطوسي نصير الدين — موسوعيٌّ
      خراسانيٌّ أقنع هولاكو بعد سقوط بغداد سنة ٦٥٦ هـ (١٢٥٨ م)
      بأن يُمَوِّل بناءَ مرصد مراغة بأذربيجان وأن يُجمع فيه
      فريقٌ علميٌّ متعدّد الجنسيات (العُرضي من دمشق، وقطب
      الدين الشيرازي، ومحيي الدين المغربي، والفلكيُّ الصينيُّ
      «فو منگ‌جي») — ببغداد يوم الثامن عشر من ذي الحجة سنة
      ٦٧٢ هـ (الموافق ٢٥ يونيو ١٢٧٤ م) عن خمس وسبعين سنة.
      وأدخل في «التذكرة في علم الهيئة» «زوج الطوسي»، وهو بناء
      هندسيٌّ يولِّد حركةً مستقيمةً من حركتين دائريّتين، استُعمل
      لاستبدال «معدِّل المسير» البطلميّ؛ وعاد البناءُ ذاتُه إلى
      الظهور في «دوران الأفلاك» لكوبرنيكوس عبر مخطوطاتٍ يونانيةٍ
      وسيطة. وأنتج «الزيج الإلخاني» أدقَّ جداول كوكبيةٍ في عصره،
      وكانت «تحاريره» على إقليدس وبطليموس وأبلونيوس وأرخميدس
      هي الكتب المعتمدة في مدارس الشرق الإسلامي ثلاثة قرون.
      ويقتصر هذا الموجز على الجانب العلمي الفلكيّ بوصفه إرثاً
      حضاريّاً إسلامياً مشتركاً. وذكر ابن كثير وفاتَه في
      «البداية والنهاية» في حوادث سنة ٦٧٢ هـ، وأَورَد الذهبيُّ
      في «تاريخ الإسلام» التاريخَ نفسه.
    description_fr: |
      Muḥammad ibn Muḥammad ibn al-Ḥasan al-Ṭūsī, Naṣīr al-Dīn —
      polymathe khurāsānien qui, après le sac mongol de Bagdad en
      656 H (1258 EC), persuada Hülegü de financer la construction
      de l'observatoire de Marāgha en Azerbaïdjan et d'y rassembler
      une équipe multinationale d'astronomes (al-ʿUrḍī de Damas,
      Quṭb al-Dīn al-Shīrāzī, Muḥyī al-Dīn al-Maghribī, l'astronome
      chinois Fu Mengji) — mourut à Bagdad le 18 Dhū al-Ḥijja
      672 H (25 juin 1274 EC), à 75 ans. Sa *al-Tadhkira fī ʿIlm
      al-Hayʾa* introduisit le *couple d'al-Ṭūsī*, une construction
      géométrique générant un mouvement rectiligne à partir de
      deux mouvements circulaires, utilisée pour remplacer
      l'équant ptolémaïque ; la construction identique réapparaît
      dans *De Revolutionibus* de Copernic par l'intermédiaire de
      manuscrits grecs. Son *Zīj-i Īlkhānī* donna les tables
      planétaires les plus exactes de son époque, et ses
      recensions *Taḥrīr* d'Euclide, Ptolémée, Apollonius et
      Archimède furent les manuels standards des écoles
      islamiques orientales durant trois siècles. Sa contribution
      astronomique appartient à l'héritage civilisationnel
      islamique partagé ; cette notice se cantonne à cette
      dimension scientifique. Le *Bidāya* d'Ibn Kathīr le
      mentionne sous l'année 672 H ; le *Tārīkh al-Islām*
      d'al-Dhahabī donne la même datation.
    canonical_hijri: {year: 672, month: 12, day: 18, precision: day}
    canonical_gregorian: {date: 1274-06-25, precision: day, method: attested}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Recorded in the wafayāt of 672 AH; date 18 Dhū al-Ḥijja attested."
      - source_key: dhahabi_tarikh_islam
      - source_key: ei2
    people: [[nasir-al-din-al-tusi, died]]
