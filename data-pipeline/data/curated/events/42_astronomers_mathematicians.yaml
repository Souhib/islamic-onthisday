  - slug: completion-of-zij-i-ilkhani
    category: scholar_death
    title_en: Completion of the *Zīj-i Īlkhānī* at Marāgha
    title_ar: إتمام «الزيج الإيلخاني» بمرصد مراغة
    title_fr: Achèvement du *Zīj-i Īlkhānī* à l'observatoire de Marāgha
    description_en: |
      Naṣīr al-Dīn al-Ṭūsī's team at the Marāgha observatory
      completed the *Zīj-i Īlkhānī* — the new Persian astronomical
      handbook commissioned by the Īlkhānid ruler Hülegü — around
      670 AH (~1271 CE), after roughly twelve years of continuous
      observation that began with the observatory's founding in
      657 AH. The handbook gave new mean motions for the Sun, Moon,
      and planets, recalibrated the obliquity of the ecliptic, and
      issued tables for ephemerides, eclipses, and planetary
      visibility based on the Marāgha team's own twelve-year
      record rather than on the inherited Ptolemaic constants.
      Translated into Greek and Latin by the early fourteenth
      century, the *Zīj-i Īlkhānī* was the most-used set of
      astronomical tables across Islamic Asia for two centuries
      until superseded by Ulugh Beg's *Zīj-i Sulṭānī*. Year-
      precision is retained because the classical sources name
      the work but not the day of its presentation.
    description_ar: |
      أتمَّ فريقُ نصير الدين الطوسي بمرصد مراغة «الزيج الإيلخاني»
      — وهو الزيج الفارسيُّ الجديد الذي أمر بتأليفه الإيلخانُ
      هولاكو — نحو سنة ٦٧٠ هـ (~١٢٧١ م)، بعد قرابة اثنتي عشرة
      سنةً من الرصد المتواصل بدأت بتأسيس المرصد سنة ٦٥٧ هـ.
      ودوَّن الزيجُ متوسطاتٍ جديدةً لحركات الشمس والقمر والكواكب،
      وأعاد ضبطَ ميل فلك البروج، وأصدر جداولَ التقاويم الفلكية
      والكسوفات والخسوفات وقابلية رؤية الكواكب بناءً على رصد
      فريق مراغة نفسه طيلة الاثنتي عشرة سنة، لا على الثوابت
      البطلمية الموروثة. وتُرجم الزيجُ إلى اليونانية واللاتينية
      في مطلع القرن الرابع عشر الميلادي، فكان أكثر الجداول
      الفلكية استخداماً عبر آسيا الإسلامية قرنين متّصلين حتى
      نُسخ بـ«الزيج السلطاني» لأُلُغ بِك. ودقّة السنة محفوظة
      لأنّ المصادر الكلاسيكية تذكر العمل دون يوم التقديم.
    description_fr: |
      L'équipe de Naṣīr al-Dīn al-Ṭūsī à l'observatoire de Marāgha
      acheva le *Zīj-i Īlkhānī* — le nouveau manuel astronomique
      persan commandé par le souverain īlkhānide Hülegü — vers
      670 H (~1271 EC), après environ douze années d'observation
      continue commencées avec la fondation de l'observatoire en
      657 H. Le manuel donna de nouveaux mouvements moyens pour
      le Soleil, la Lune et les planètes, recalibra l'obliquité
      de l'écliptique et publia des tables d'éphémérides, d'éclipses
      et de visibilité planétaire fondées sur le relevé propre de
      l'équipe de Marāgha sur douze ans plutôt que sur les
      constantes ptolémaïques héritées. Traduit en grec et en
      latin au début du XIVe siècle, le *Zīj-i Īlkhānī* fut
      l'ensemble de tables astronomiques le plus utilisé à
      travers l'Asie islamique durant deux siècles, jusqu'à ce
      qu'il fût supplanté par le *Zīj-i Sulṭānī* d'Ulugh Beg. La
      précision annuelle est retenue parce que les sources
      classiques nomment l'œuvre mais non le jour de sa
      présentation.
    canonical_hijri: {year: 670, precision: year}
    canonical_gregorian: {date: 1271-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Composition completed c.670 AH; the work itself names Hülegü, who died 663 AH, suggesting completion under his successor Abaqa."
      - source_key: editorial
    people: [[nasir-al-din-al-tusi, subject]]
    tags: [ilkhanid, mongol-era, astronomy, maragha, zij, observatory]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Z%C4%ABj-i_%C4%AAlkh%C4%81n%C4%AB"

  # =========================================================================
  # SAMARQAND OBSERVATORY ERA (TIMURID)
  # =========================================================================

  - slug: founding-of-samarqand-observatory
    category: founding
    title_en: Founding of the Samarqand Observatory by Ulugh Beg
    title_ar: تأسيس مرصد سمرقند على يد ألغ بِك
    title_fr: Fondation de l'observatoire de Samarcande par Ulugh Beg
    description_en: |
      Ulugh Beg, Timurid governor of Transoxiana and grandson of
      Tīmūr, founded the Samarqand observatory around 823 AH
      (~1420 CE) on a hill outside the city, equipping it with
      the largest astronomical instruments of the medieval world
      — including a 40-metre meridian sextant (the *Fakhrī
      sextant*) sunk into the bedrock for unprecedented stability,
      portions of which remain visible at the site today. The
      observatory's scientific staff at its peak comprised the
      mathematician al-Kāshī (its first director), Qāḍī Zāda
      al-Rūmī, and ʿAlī Qushjī, with Ulugh Beg himself as
      working participant rather than mere patron. Their thirty
      years of continuous observation produced the *Zīj-i
      Sulṭānī* (1437/8), the most accurate stellar catalogue
      between Ptolemy and Tycho Brahe. Year-precision retained
      because the founding is firmly attested for c.823 AH but
      the exact day is not preserved.
    description_ar: |
      أسَّس ألغ بِك، حاكم ما وراء النهر التيموري وحفيد تيمور،
      مرصدَ سمرقند نحو سنة ٨٢٣ هـ (~١٤٢٠ م) على تلٍّ خارج
      المدينة، وجهَّزه بأكبر آلات الرصد الفلكيّ في العالم
      الوسيط — منها سدسٌ نصف-نهاريٌّ فخريٌّ بطول أربعين متراً
      محفورٌ في الصخر الأم لمنع الاهتزاز، ولا تزال أجزاء منه
      مرئيةً اليوم في الموقع. وضمَّ طاقم المرصد العلميُّ في أوج
      نشاطه الرياضيَّ الكاشيَّ (أوّل مديريه)، وقاضي زاده
      الرومي، وعليَّ قُشجي، مع ألغ بِك نفسه شريكاً في العمل
      الرصدي لا راعياً فحسب. وأنتج رصدُهم المتواصل ثلاثين عاماً
      «الزيج السلطاني» (سنة ٨٤١ هـ) أدقَّ فهرس نجوم بين بطليموس
      وتيكو براهي. وأُبقي على دقة السنة لأنّ التأسيس مثبتٌ
      نحو سنة ٨٢٣ هـ ولكنّ يوماً بعينه غير محفوظ.
    description_fr: |
      Ulugh Beg, gouverneur timouride de Transoxiane et petit-fils
      de Tīmūr, fonda l'observatoire de Samarcande vers 823 H
      (~1420 EC) sur une colline à l'extérieur de la ville,
      l'équipant des plus grands instruments astronomiques du
      monde médiéval — dont un sextant méridien de 40 mètres (le
      *sextant Fakhrī*) creusé dans la roche-mère pour une
      stabilité sans précédent, dont des portions demeurent
      visibles sur le site aujourd'hui. Le personnel scientifique
      de l'observatoire à son apogée comprenait le mathématicien
      al-Kāshī (son premier directeur), Qāḍī Zāda al-Rūmī et
      ʿAlī Qushjī, avec Ulugh Beg lui-même comme participant aux
      observations plutôt que simple mécène. Trente années
      d'observation continue produisirent le *Zīj-i Sulṭānī*
      (1437/8), le catalogue stellaire le plus exact entre
      Ptolémée et Tycho Brahé. La précision annuelle est retenue
      car la fondation est solidement attestée pour c.823 H mais
      le jour exact n'est pas préservé.
    canonical_hijri: {year: 823, precision: year}
    canonical_gregorian: {date: 1420-01-01, precision: year, method: tabular_conversion}
