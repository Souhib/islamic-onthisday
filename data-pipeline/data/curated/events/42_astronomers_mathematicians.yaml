  - slug: death-of-ali-qushji
    category: scholar_death
    title_en: Death of ʿAlī Qushjī — Astronomer of Samarqand and Istanbul
    title_ar: وفاة علي قُشجي — فلكي سمرقند والقسطنطينية
    title_fr: Mort d'ʿAlī Qushjī — astronome de Samarcande et Istanbul
    description_en: |
      ʿAlāʾ al-Dīn ʿAlī ibn Muḥammad al-Samarqandī, known as ʿAlī
      Qushjī (the falconer's son) — Sunni astronomer-mathematician
      of the Samarqand observatory under Ulugh Beg, and the only
      one of the senior Samarqand staff to outlive Ulugh Beg's
      assassination in 853 AH; he carried the observatory's
      scientific tradition west, joining first the Aq Qoyunlu
      court at Tabrīz and then, in 877 AH (1473 CE), accepting
      Sultan Meḥmed II's invitation to Istanbul, where he taught
      at the Ayasofya madrasa — died at Istanbul in Shaʿbān 879
      AH (December 1474 CE). His *Risāla fī al-Hayʾa* and *Risāla
      fī al-Ḥisāb*, written in Persian and translated into
      Arabic by his own pen, became the introductory astronomy
      and arithmetic textbooks of the Ottoman madrasa system. He
      is credited with arguments rejecting the Aristotelian
      requirement that astronomical hypotheses must reflect
      physical reality — a methodological shift that some
      historians of science see as a step toward the autonomy
      of mathematical astronomy from natural philosophy.
    description_ar: |
      توفي علاء الدين علي بن محمد السمرقندي المعروف بعليّ قُشجي
      («ابن البيزدار») — فلكيٌّ ورياضيٌّ سنّيٌّ من رجال مرصد
      سمرقند في زمن ألغ بِك، وهو الوحيد من كبار طاقم سمرقند
      الذي بقي بعد اغتيال ألغ بِك سنة ٨٥٣ هـ، فنقل تراث
      المرصد العلميَّ غرباً منضمّاً أوّلاً إلى بلاط آق قويونلو
      بتبريز، ثم لبَّى سنة ٨٧٧ هـ (١٤٧٣ م) دعوةَ السلطان محمد
      الفاتح إلى القسطنطينية، فدرَّس بمدرسة آيا صوفيا — وتوفي
      بالقسطنطينية في شعبان سنة ٨٧٩ هـ (الموافق ديسمبر ١٤٧٤ م).
      وصارت رسالتاه «في الهيئة» و«في الحساب»، اللتان كتبهما
      أوّل أمره بالفارسية ثم نقلهما إلى العربية بنفسه، الكتب
      المعتمدة في تدريس مبادئ علمَي الفلك والحساب في المدرسة
      العثمانية. ونُسبت إليه حججٌ ترفض اشتراط الفلسفة الأرسطية
      أن تكون الفرضيات الفلكية معبّرةً عن الواقع الفيزيائي —
      وهو تحوّلٌ منهجيٌّ يرى فيه بعضُ مؤرخي العلم خطوةً نحو
      استقلال الفلك الرياضي عن الفلسفة الطبيعية.
    description_fr: |
      ʿAlāʾ al-Dīn ʿAlī ibn Muḥammad al-Samarqandī, connu comme
      ʿAlī Qushjī (le fils du fauconnier) — astronome-mathématicien
      sunnite de l'observatoire de Samarcande sous Ulugh Beg, et
      le seul du personnel principal de Samarcande à survivre à
      l'assassinat d'Ulugh Beg en 853 H ; il porta la tradition
      scientifique de l'observatoire vers l'ouest, rejoignant
      d'abord la cour des Aq Qoyunlu à Tabrīz, puis, en 877 H
      (1473 EC), acceptant l'invitation du sultan Meḥmed II à
      Istanbul, où il enseigna à la madrasa d'Ayasofya — mourut
      à Istanbul en Shaʿbān 879 H (décembre 1474 EC). Sa *Risāla
      fī al-Hayʾa* et sa *Risāla fī al-Ḥisāb*, écrites en persan
      et traduites en arabe par lui-même, devinrent les manuels
      d'introduction à l'astronomie et à l'arithmétique du
      système des madrasas ottomanes. On lui attribue des
      arguments rejetant l'exigence aristotélicienne selon
      laquelle les hypothèses astronomiques doivent refléter la
      réalité physique — un déplacement méthodologique que
      certains historiens des sciences voient comme un pas vers
      l'autonomie de l'astronomie mathématique par rapport à la
      philosophie naturelle.
