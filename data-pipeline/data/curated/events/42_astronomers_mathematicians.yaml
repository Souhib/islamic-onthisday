  - slug: death-of-ibrahim-ibn-sinan
    category: scholar_death
    title_en: Death of Ibrāhīm ibn Sinān ibn Thābit — Mathematician of the Sabian Lineage
    title_ar: وفاة إبراهيم بن سنان بن ثابت — رياضي الأسرة الصابئية
    title_fr: Mort d'Ibrāhīm ibn Sinān ibn Thābit — mathématicien de la lignée sabéenne
    description_en: |
      Abū Isḥāq Ibrāhīm ibn Sinān ibn Thābit ibn Qurra — grandson
      of Thābit ibn Qurra and son of Sinān, mathematician and
      astronomer of the Buwayhid-era Baghdad scientific milieu —
      died in 335 AH (946 CE), aged about 38, leaving behind a
      remarkable corpus relative to his short life. His treatise
      on the quadrature of the parabola gave a more elegant proof
      than Archimedes had achieved, by an integration method that
      would not be rediscovered in Europe for seven centuries; his
      *Kitāb fī Ḥarakāt al-Shams* (On the Motions of the Sun)
      reformulated key results of Ptolemy with corrections. Ibn
      Khallikān preserves an entry on him within his father's
      and grandfather's notice; al-Dhahabī's *Siyar* confirms the
      year of death.
    description_ar: |
      توفي أبو إسحاق إبراهيم بن سنان بن ثابت بن قرّة — حفيد
      ثابت بن قرة وابن سنان، وأحد رياضيي بغداد وفلكيّيها في
      الوسط العلمي البويهي — سنة ٣٣٥ هـ (٩٤٦ م) عن نحو ثمان
      وثلاثين سنة، تاركاً ميراثاً علمياً ضخماً قياساً بقصر عمره.
      قدَّم في رسالته في تربيع القطع المكافئ برهاناً أوجزَ من
      برهان أرخميدس، باعتماد طريقةٍ تكامليةٍ لم يُعد اكتشافها
      في أوروبا إلا بعد سبعة قرون؛ وأعاد في «كتاب في حركات
      الشمس» صياغةَ نتائج بطليموس مع تصحيحاتٍ مهمّة. وذكره ابن
      خلّكان في ترجمتَي والده وجدّه؛ وأكّد الذهبيُّ في «سير
      أعلام النبلاء» سنة وفاته.
    description_fr: |
      Abū Isḥāq Ibrāhīm ibn Sinān ibn Thābit ibn Qurra — petit-
      fils de Thābit ibn Qurra et fils de Sinān, mathématicien et
      astronome du milieu scientifique bagdadien à l'époque
      buwayhide — mourut en 335 H (946 EC), à environ 38 ans,
      laissant derrière lui un corpus remarquable au regard de la
      brièveté de sa vie. Son traité sur la quadrature de la
      parabole donna une démonstration plus élégante que celle
      qu'avait obtenue Archimède, par une méthode d'intégration
      qui ne serait redécouverte en Europe qu'au bout de sept
      siècles ; son *Kitāb fī Ḥarakāt al-Shams* (Sur les mouvements
      du Soleil) reformula des résultats clés de Ptolémée avec
      corrections. Ibn Khallikān en conserve une notice dans
      celles de son père et de son grand-père ; le *Siyar*
      d'al-Dhahabī confirme l'année de décès.
    canonical_hijri: {year: 335, precision: year}
    canonical_gregorian: {date: 946-01-01, precision: year, method: tabular_conversion}
