  - slug: death-of-qadi-zada-al-rumi
    category: scholar_death
    title_en: Death of Qāḍī Zāda al-Rūmī — Director of the Samarqand Observatory
    title_ar: وفاة قاضي زاده الرومي — مدير مرصد سمرقند
    title_fr: Mort de Qāḍī Zāda al-Rūmī — directeur de l'observatoire de Samarcande
    description_en: |
      Ṣalāḥ al-Dīn Mūsā ibn Muḥammad ibn Maḥmūd, known as Qāḍī
      Zāda al-Rūmī (the son of the qāḍī, Anatolian) — Anatolian
      Sunni mathematician-astronomer who travelled east to
      Samarqand around 810 AH (~1407 CE), became Ulugh Beg's
      teacher in mathematics and astronomy, and after al-Kāshī's
      death in 832 AH succeeded him as the director of the
      Samarqand observatory — died around 840 AH (~1436/7 CE)
      at Samarqand, just before the *Zīj-i Sulṭānī* was finalised.
      His commentary on Maḥmūd al-Chaghmīnī's *Mulakhkhaṣ fī
      al-Hayʾa* became the principal Ottoman-era astronomy
      textbook, and his *Risāla fī Istikhrāj Jayb Daraja Wāḥida*
      (Treatise on the Sine of One Degree) gave a numerical
      approximation accurate to several decimal places, refining
      al-Kāshī's earlier method. Year-precision retained.
    description_ar: |
      توفي صلاح الدين موسى بن محمد بن محمود، المعروف بقاضي زاده
      الرومي — رياضيٌّ وفلكيٌّ سنّيٌّ من بلاد الروم (الأناضول)،
      ارتحل شرقاً إلى سمرقند نحو سنة ٨١٠ هـ (~١٤٠٧ م)، فصار
      شيخَ ألغ بِك في الرياضيات والفلك، ثم خلَف الكاشيَّ بعد
      وفاته سنة ٨٣٢ هـ في رئاسة مرصد سمرقند — بسمرقند نحو سنة
      ٨٤٠ هـ (~١٤٣٦/٧ م)، قُبيل إتمام «الزيج السلطاني». وكان
      شرحه لـ«الملخّص في الهيئة» لمحمود الجغميني هو الكتاب
      المعتمد لتدريس علم الفلك في العصر العثماني، ورسالته في
      «استخراج جيب درجة واحدة» قدّمت تقريباً عددياً بدقّة عدّة
      منازل عشرية صقلت طريقةَ الكاشي. ودقة السنة محفوظة.
    description_fr: |
      Ṣalāḥ al-Dīn Mūsā ibn Muḥammad ibn Maḥmūd, connu comme
      Qāḍī Zāda al-Rūmī (le fils du qāḍī, anatolien) —
      mathématicien-astronome sunnite anatolien qui voyagea vers
      l'est jusqu'à Samarcande vers 810 H (~1407 EC), devint le
      maître d'Ulugh Beg en mathématiques et en astronomie, et
      après la mort d'al-Kāshī en 832 H lui succéda comme
      directeur de l'observatoire de Samarcande — mourut vers
      840 H (~1436/7 EC) à Samarcande, juste avant que le *Zīj-i
      Sulṭānī* ne soit finalisé. Son commentaire sur le
      *Mulakhkhaṣ fī al-Hayʾa* de Maḥmūd al-Chaghmīnī devint le
      manuel d'astronomie principal de l'époque ottomane, et sa
      *Risāla fī Istikhrāj Jayb Daraja Wāḥida* (Traité sur le
      sinus d'un degré) donna une approximation numérique précise
      à plusieurs décimales, raffinant la méthode antérieure
      d'al-Kāshī. La précision annuelle est retenue.
