  - slug: completion-of-zij-i-sultani
    category: scholar_death
    title_en: Completion of Ulugh Beg's *Zīj-i Sulṭānī*
    title_ar: إتمام «الزيج السلطاني» لأُلُغ بِك
    title_fr: Achèvement du *Zīj-i Sulṭānī* d'Ulugh Beg
    description_en: |
      Ulugh Beg and the Samarqand observatory team — by then
      under the directorship of Qāḍī Zāda al-Rūmī following
      al-Kāshī's death in 832 AH and Qāḍī Zāda's own subsequent
      death — completed the *Zīj-i Sulṭānī* around 841 AH
      (1437/8 CE), the culminating stellar and planetary catalogue
      of medieval Islamic astronomy. Its catalogue of 1,018 fixed
      stars was the first comprehensive recalibration of the
      Ptolemaic *Almagest* catalogue since antiquity, and remained
      unsurpassed until Tycho Brahe's *Stellarum Inerrantium
      Restitutio* (~1598 CE) — and was used by Brahe himself in
      compiling his own catalogue. The *Zīj-i Sulṭānī* was
      translated into Latin by Thomas Hyde at Oxford in 1665.
      Year-precision retained: classical sources mark its
      completion in the late 1430s without a precise day.
    description_ar: |
      أتمَّ ألغ بِك وفريقُ مرصد سمرقند — وقد آلت رئاستُه إلى
      قاضي زاده الرومي بعد وفاة الكاشي سنة ٨٣٢ هـ، ثم وفاة قاضي
      زاده نفسه — «الزيج السلطاني» نحو سنة ٨٤١ هـ (١٤٣٧/٨ م)،
      وهو الذُّروة في فهارس النجوم والكواكب في الفلك الإسلامي
      الوسيط. وكان فهرس نجومه الثوابت — وعدُّها ألفٌ وثمانية
      عشر نجماً — أوّل ضبطٍ شاملٍ يُعاد به فهرس «المجسطي»
      البطلميّ منذ العصور القديمة، وبقي بلا نظير حتى أصدر
      تيكو براهي *Stellarum Inerrantium Restitutio* (نحو سنة
      ١٥٩٨ م) — بل استعان به براهي نفسه في تأليف فهرسه. وتُرجم
      «الزيج السلطاني» إلى اللاتينية على يد توماس هايد بأكسفورد
      سنة ١٦٦٥ م. ودقة السنة محفوظة: تذكر المصادرُ القديمة
      إتمامَه في أواخر ثلاثينيات القرن التاسع الهجري دون يومٍ
      بعينه.
    description_fr: |
      Ulugh Beg et l'équipe de l'observatoire de Samarcande —
      alors sous la direction de Qāḍī Zāda al-Rūmī à la suite de
      la mort d'al-Kāshī en 832 H, puis de la mort de Qāḍī Zāda
      lui-même — achevèrent le *Zīj-i Sulṭānī* vers 841 H
      (1437/8 EC), catalogue stellaire et planétaire culminant
      de l'astronomie islamique médiévale. Son catalogue de 1 018
      étoiles fixes fut le premier recalibrage exhaustif du
      catalogue de l'*Almageste* de Ptolémée depuis l'Antiquité,
      et demeura insurpassé jusqu'au *Stellarum Inerrantium
      Restitutio* de Tycho Brahé (~1598 EC) — et fut utilisé par
      Brahé lui-même pour compiler son propre catalogue. Le
      *Zīj-i Sulṭānī* fut traduit en latin par Thomas Hyde à
      Oxford en 1665. La précision annuelle est retenue : les
      sources classiques marquent son achèvement à la fin des
      années 1430 sans jour précis.
