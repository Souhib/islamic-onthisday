  - slug: death-of-abu-mashar-al-balkhi
    category: scholar_death
    title_en: Death of Abū Maʿshar al-Balkhī (Albumasar)
    title_ar: وفاة أبي معشر البلخي
    title_fr: Mort d'Abū Maʿshar al-Balkhī (Albumasar)
    description_en: |
      Abū Maʿshar Jaʿfar ibn Muḥammad ibn ʿUmar al-Balkhī —
      Khurāsānian astronomer of the early ʿAbbāsid period, drawn
      late in life into the scholarly study of the Ptolemaic
      planetary system after a long career as a hadith-traditionist
      — died at Wāsiṭ on Wednesday 28 Ramaḍān 272 AH (9 March
      886 CE) at the reported age of 100. His handbook of
      astronomical reckoning, *al-Madkhal al-Kabīr ilā ʿIlm Aḥkām
      al-Nujūm*, was translated into Latin twice in the twelfth
      century (by John of Seville and Hermann of Carinthia) and
      became the principal medieval-Latin gateway to Aristotelian
      natural philosophy via its long methodological introduction.
      His *Kitāb al-Qirānāt* on planetary conjunctions shaped
      Latin astronomical discussion until Kepler. Ibn Khallikān
      preserves the date and location precisely; al-Dhahabī gives
      a near-equivalent notice in *Siyar Aʿlām al-Nubalāʾ*.
    description_ar: |
      توفي أبو معشر جعفر بن محمد بن عمر البلخيّ — فلكيٌّ خراسانيٌّ
      من أوائل العصر العباسي، انصرف إلى دراسة نظام الأفلاك
      البطلميّ في أواخر عمره بعد عمرٍ طويل في الحديث — بواسط
      ليلة الأربعاء الثامن والعشرين من رمضان سنة ٢٧٢ هـ (الموافق
      ٩ مارس ٨٨٦ م) عن مئة سنة. وقد تُرجم كتابه «المدخل الكبير
      إلى علم أحكام النجوم» إلى اللاتينية مرّتين في القرن الثاني
      عشر الميلادي (لجون السيفلي ولهرمن الكارنثياني)، فصار البوّابة
      اللاتينية الوسيطية الكبرى إلى الفلسفة الطبيعية الأرسطية
      عبر مقدّمته المنهجية المسهبة. كما رسم كتابه «القرانات»
      في اقترانات الكواكب مسارَ النقاش الفلكي اللاتيني إلى عصر
      كپلر. ضبط ابن خلكان تاريخ وفاته ومكانها بدقة؛ وأَلمَّ به
      الذهبيُّ في «سير أعلام النبلاء» إلماماً قريباً منه.
    description_fr: |
      Abū Maʿshar Jaʿfar ibn Muḥammad ibn ʿUmar al-Balkhī —
      astronome khurāsānien du début de la période ʿabbāside,
      attiré tardivement vers l'étude du système planétaire
      ptolémaïque après une longue carrière comme traditionniste
      du hadith — mourut à Wāsiṭ le mercredi 28 Ramaḍān 272 H
      (9 mars 886 EC), à l'âge réputé de 100 ans. Son manuel de
      computation astronomique, *al-Madkhal al-Kabīr ilā ʿIlm
      Aḥkām al-Nujūm*, fut traduit en latin à deux reprises au
      XIIe siècle (par Jean de Séville et Hermann de Carinthie)
      et devint la principale porte d'entrée médiévale-latine
      vers la philosophie naturelle aristotélicienne par sa longue
      introduction méthodologique. Son *Kitāb al-Qirānāt* sur les
      conjonctions planétaires façonna la discussion astronomique
      latine jusqu'à Kepler. Ibn Khallikān préserve la date et le
      lieu avec précision ; al-Dhahabī donne une notice quasi
      équivalente dans *Siyar Aʿlām al-Nubalāʾ*.
