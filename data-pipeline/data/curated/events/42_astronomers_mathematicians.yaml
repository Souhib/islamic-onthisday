  - slug: death-of-al-qabisi
    category: scholar_death
    title_en: Death of al-Qabīṣī — Astronomer of Aleppo
    title_ar: وفاة القبيصي — فلكي حلب
    title_fr: Mort d'al-Qabīṣī — astronome d'Alep
    description_en: |
      Abū al-Ṣaqr ʿAbd al-ʿAzīz ibn ʿUthmān al-Qabīṣī — Mosul-born
      astronomer-mathematician active at the Ḥamdānid court of
      Sayf al-Dawla in Aleppo, student of the Mosul mathematician
      ʿImrān ibn Aḥmad — died around 356 AH (~967 CE), with day-
      precision not attested. His *al-Madkhal ilā Ṣināʿat Aḥkām
      al-Nujūm* (Introduction to Astronomy), composed for Sayf
      al-Dawla, was translated into Latin in the twelfth century
      by John of Seville under the title *Liber Introductorius*
      and went through more than a dozen Latin printings between
      1473 and 1521 — making al-Qabīṣī, with al-Farghānī and
      Abū Maʿshar, one of the three Arabic astronomical authors
      most read in late-medieval and early-modern Europe. His
      *Risāla fī Awsāṭ al-Kawākib* (On Mean Planetary Motions)
      gave a critical examination of the Ptolemaic equant.
    description_ar: |
      توفي أبو الصقر عبد العزيز بن عثمان القبيصيّ — فلكيٌّ ورياضيٌّ
      مولده الموصل، اشتغل في بلاط سيف الدولة الحمداني بحلب،
      وتلميذ الرياضيّ الموصليّ عمران بن أحمد — نحو سنة ٣٥٦ هـ
      (~٩٦٧ م)، ولم تُحفظ دقة اليوم. وقد تُرجم كتابه «المدخل
      إلى صناعة أحكام النجوم» الذي ألّفه لسيف الدولة إلى
      اللاتينية في القرن الثاني عشر على يد جون السيفلي تحت
      عنوان *Liber Introductorius*، وطُبع في أوروبا أكثرَ من
      عشر طبعاتٍ لاتينيةٍ بين سنتَي ١٤٧٣ و١٥٢١ — فصار القبيصيُّ
      إلى جانب الفرغاني وأبي معشر من أكثر مؤلفي الفلك العرب
      قراءةً في أوروبا أواخر العصر الوسيط ومطلع الحديث. وفي
      «رسالته في أوساط الكواكب» نقدٌ منهجيٌّ لمعدِّل المسير
      البطلميّ.
    description_fr: |
      Abū al-Ṣaqr ʿAbd al-ʿAzīz ibn ʿUthmān al-Qabīṣī — astronome-
      mathématicien né à Mossoul, actif à la cour ḥamdānide de
      Sayf al-Dawla à Alep, disciple du mathématicien mossouliote
      ʿImrān ibn Aḥmad — mourut vers 356 H (~967 EC), le jour
      n'étant pas attesté. Son *al-Madkhal ilā Ṣināʿat Aḥkām
      al-Nujūm* (Introduction à l'astronomie), composé pour Sayf
      al-Dawla, fut traduit en latin au XIIe siècle par Jean de
      Séville sous le titre *Liber Introductorius* et connut plus
      d'une douzaine d'éditions latines entre 1473 et 1521 —
      faisant d'al-Qabīṣī, avec al-Farghānī et Abū Maʿshar, l'un
      des trois auteurs astronomiques arabes les plus lus dans
      l'Europe tardo-médiévale et moderne. Sa *Risāla fī Awsāṭ
      al-Kawākib* (Des mouvements moyens planétaires) donna un
      examen critique de l'équant ptolémaïque.
    canonical_hijri: {year: 356, precision: year}
    canonical_gregorian: {date: 967-01-01, precision: year, method: tabular_conversion}
