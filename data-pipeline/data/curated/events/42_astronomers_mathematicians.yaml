# Wave 26 of curated event additions (2026-04-27).
# Major Muslim astronomers and mathematicians whose deaths or works
# constitute well-attested anchor points in the history of science:
# Thābit ibn Qurra, Naṣīr al-Dīn al-Ṭūsī, ʿUmar al-Khayyām, Abū Maʿshar
# al-Balkhī, Ibrāhīm ibn Sinān, al-Farghānī, al-Zarqālī, al-Qabīṣī,
# Qāḍī Zāda al-Rūmī, ʿAlī Qushjī, plus three civilization-anchor
# events: the founding of the Samarqand observatory and the completion
# of the Zīj-i Īlkhānī and Zīj-i Sulṭānī. Most figures here lie
# alongside (rather than within) the wafayāt / siyar mainstream that
# focused on muḥaddithūn and fuqahāʾ; we cite Ibn Khallikan and
# al-Dhahabi where they cover the figure, and supplement with EI2 +
# editorial for the late-Timurid / early-Ottoman cluster (which post-
# dates Ibn Khallikan d.681 and al-Dhahabi d.748). Naṣīr al-Dīn
# al-Ṭūsī's astronomical contribution is described as shared scientific
# heritage; his Twelver theological positions are out of scope per
# the project's Sunni editorial framing. Trilingual en/ar/fr throughout.
# Hadith refs intentionally omitted across the file (no narration
# directly anchors a scientific event in this corpus).

events:
  # =========================================================================
  # ʿABBĀSID-ERA TRANSLATORS, ASTRONOMERS, MATHEMATICIANS
  # =========================================================================

  - slug: death-of-thabit-ibn-qurra
    category: scholar_death
    title_en: Death of Thābit ibn Qurra — Translator-Mathematician of Baghdad
    title_ar: وفاة ثابت بن قرة الحرّاني — مترجم بغداد ورياضيها
    title_fr: Mort de Thābit ibn Qurra — traducteur-mathématicien de Bagdad
    description_en: |
      Abū al-Ḥasan Thābit ibn Qurra al-Ḥarrānī — Sabian scholar
      of Ḥarrān turned Baghdad-court polymath under the ʿAbbāsid
      caliphs al-Muʿtaḍid and al-Muktafī, and the principal
      reviser of the early Arabic translations of Euclid's
      *Elements*, Ptolemy's *Almagest*, and the works of
      Archimedes, Apollonius, and Theodosius — died in Baghdad
      on Thursday 26 Ṣafar 288 AH (18 February 901 CE) at age
      about 67. His original mathematical work extended Greek
      number theory to amicable numbers (he proved the rule that
      bears his name), generalised the Pythagorean theorem, and
      anticipated the integral calculus in his computation of
      the volume of the paraboloid of revolution. He founded a
      scientific dynasty: his son Sinān, his grandsons Thābit ibn
      Sinān and Ibrāhīm ibn Sinān, all became leading mathematicians
      of the next two generations. Ibn Khallikān gives the date
      and place of death precisely; al-Dhahabī notices him in
      *Tārīkh al-Islām* among the scientific notables of his year.
    description_ar: |
      توفي أبو الحسن ثابت بن قرة الحرّاني — عالمٌ صابئيٌّ من حرّان
      انتقل إلى بلاط بغداد العباسي في خلافة المعتضد والمكتفي،
      ومُهذِّبُ الترجمات العربية الأولى لـ«أصول» إقليدس و«المجسطي»
      لبطليموس وأعمال أرخميدس وأبلونيوس وثاوذوسيوس — ببغداد
      يوم الخميس السادس والعشرين من صفر سنة ٢٨٨ هـ (الموافق ١٨
      فبراير ٩٠١ م) عن نحو سبع وستين سنة. ومدّ إنتاجه الأصيل
      نظريّةَ الأعداد اليونانية إلى الأعداد المتحابّة (فأقام
      القاعدة المعروفة باسمه)، وعمّم نظرية فيثاغورس، وقدّم في
      حساب حجم الجسم المتولّد من القطع المكافئ إرهاصاتٍ بحساب
      التكامل. وأسّس أسرةً علميةً متّصلة: ابنه سنان، وحفيداه
      ثابت بن سنان وإبراهيم بن سنان، صاروا من أبرز رياضيي
      الجيلَين التاليَين. وضبط ابن خلكان تاريخَ وفاته ومكانها
      تحديداً، وأَلمَّ به الذهبيُّ في «تاريخ الإسلام» في وفيات
      السنة المذكورة.
    description_fr: |
      Abū al-Ḥasan Thābit ibn Qurra al-Ḥarrānī — savant sabéen
      de Ḥarrān devenu polymathe à la cour bagdadienne sous les
      califes ʿabbāsides al-Muʿtaḍid et al-Muktafī, et principal
      réviseur des premières traductions arabes des *Éléments*
      d'Euclide, de l'*Almageste* de Ptolémée et des œuvres
      d'Archimède, d'Apollonius et de Théodose — mourut à Bagdad
      le jeudi 26 Ṣafar 288 H (18 février 901 EC), à environ 67
      ans. Son œuvre originale prolongea la théorie grecque des
      nombres jusqu'aux nombres amiables (il établit la règle qui
      porte son nom), généralisa le théorème de Pythagore et
      anticipa le calcul intégral dans son calcul du volume du
      paraboloïde de révolution. Il fonda une dynastie scientifique
      : son fils Sinān, ses petits-fils Thābit ibn Sinān et
      Ibrāhīm ibn Sinān, devinrent tous des mathématiciens de
      premier plan des deux générations suivantes. Ibn Khallikān
      donne précisément la date et le lieu de la mort ; al-Dhahabī
      le mentionne dans *Tārīkh al-Islām* parmi les notables
      scientifiques de son année.
