  # =========================================================================
  # SALJUQ-ERA POLYMATHS
  # =========================================================================

  - slug: death-of-umar-al-khayyam
    category: scholar_death
    title_en: Death of ʿUmar al-Khayyām — Mathematician-Astronomer of Nishapur
    title_ar: وفاة عمر الخيّام — رياضي نيسابور وفلكيّها
    title_fr: Mort d'ʿUmar al-Khayyām — mathématicien-astronome de Nishapur
    description_en: |
      Ghiyāth al-Dīn Abū al-Fatḥ ʿUmar ibn Ibrāhīm al-Khayyāmī —
      Persian mathematician, astronomer, and poet of the late
      Saljuq period, head of the observatory commissioned at
      Iṣfahān by Sulṭān Malikshāh and Niẓām al-Mulk — died at
      Nishapur in 517 AH (1131 CE), with year-precision the
      earliest unanimous attestation. His *Risāla fī Sharḥ Mā
      Ashkala min Muṣādarāt Kitāb Uqlīdis* developed a critique
      of Euclid's parallel postulate that approached non-Euclidean
      geometry by way of the Saccheri quadrilateral six centuries
      before Saccheri. His algebraic treatise classified cubic
      equations into fourteen cases and gave geometric solutions
      via conic sections — the most advanced work in cubic
      algebra before Sharaf al-Dīn al-Ṭūsī. The Iṣfahān
      observatory under his direction produced the *Zīj-i
      Malikshāhī* and reformed the Persian solar calendar (the
      *Jalālī* calendar) to a precision unmatched by the
      Gregorian reform of 1582. Ibn Khallikān gives the year and
      place of death; Ibn Kathīr's *Bidāya* records him among the
      learned of his era.
    description_ar: |
      توفي غياث الدين أبو الفتح عمر بن إبراهيم الخيّاميّ —
      رياضيٌّ وفلكيٌّ وشاعرٌ فارسيٌّ من أواخر العصر السلجوقي،
      ورئيس المرصد الذي أمر بإنشائه السلطان ملكشاه ووزيره نظام
      الملك بأصفهان — بنيسابور سنة ٥١٧ هـ (١١٣١ م) ودقّة السنة
      هي أول ما تتفق عليه المصادر. وفي «رسالة في شرح ما أشكل من
      مصادرات كتاب أقليدس» نقدٌ لمسلّمة التوازي الإقليدية مهَّد
      السبيلَ إلى ما يشبه الهندسة اللا-إقليدية عبر «رباعي
      ساكيري» قبل ساكيري بستة قرون. وأقام في رسالته الجبرية
      أربعة عشر صنفاً للمعادلات التكعيبية وأَتَى لها بحلول
      هندسية بالمقاطع المخروطية — وهو أعمق ما نُتج في الجبر
      التكعيبيّ قبل شرف الدين الطوسي. وأنتج مرصدُ أصفهان تحت
      إشرافه «الزيج الملكشاهي» وأصلح التقويم الشمسيَّ الفارسي
      («التقويم الجلالي») بدقّةٍ لم يبلغها الإصلاح الغريغوري
      سنة ١٥٨٢ م. ضبط ابن خلكان السنة والمكان؛ وأَلمَّ به ابن
      كثير في «البداية والنهاية» في رجال عصره.
    description_fr: |
      Ghiyāth al-Dīn Abū al-Fatḥ ʿUmar ibn Ibrāhīm al-Khayyāmī —
      mathématicien, astronome et poète persan de la fin de la
      période saldjoukide, dirigeant de l'observatoire commissionné
      à Iṣfahān par le sultan Malikshāh et le vizir Niẓām al-Mulk
      — mourut à Nishapur en 517 H (1131 EC), la précision
      annuelle étant la première attestation sur laquelle convergent
      les sources. Sa *Risāla fī Sharḥ Mā Ashkala min Muṣādarāt
      Kitāb Uqlīdis* développa une critique du postulat des
      parallèles d'Euclide qui s'approcha de la géométrie non-
      euclidienne par le biais du quadrilatère de Saccheri, six
      siècles avant Saccheri. Son traité algébrique classa les
      équations cubiques en quatorze cas et en donna des solutions
      géométriques via les sections coniques — l'œuvre la plus
      avancée en algèbre cubique avant Sharaf al-Dīn al-Ṭūsī.
      L'observatoire d'Iṣfahān sous sa direction produisit le
      *Zīj-i Malikshāhī* et réforma le calendrier solaire persan
      (le calendrier *Jalālī*) avec une précision non égalée par
      la réforme grégorienne de 1582. Ibn Khallikān donne l'année
      et le lieu du décès ; le *Bidāya* d'Ibn Kathīr le mentionne
      parmi les savants de son époque.
    canonical_hijri: {year: 517, precision: year}
    canonical_gregorian: {date: 1131-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death year 517 AH at Nishapur; day-precision not preserved."
      - source_key: ibn_kathir_bidaya
      - source_key: ei2
    people: [[umar-al-khayyam, died]]
