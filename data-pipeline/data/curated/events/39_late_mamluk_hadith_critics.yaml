  - slug: death-of-ibn-al-wazir-al-yamani
    category: scholar
    title_en: Death of Ibn al-Wazīr al-Yamānī — Sunni Reformer of Yemen
    title_ar: وفاة ابن الوزير اليماني — مجدِّد سنّة في اليمن
    title_fr: Mort d'Ibn al-Wazīr al-Yamānī — réformateur sunnite du Yémen
    description_en: |
      Muḥammad ibn Ibrāhīm ibn ʿAlī ibn al-Murtaḍā Ibn al-Wazīr
      al-Yamānī (775–840 AH / 1373–1437 CE) — Yemeni scholar
      raised within the Zaydī tradition who, after a sustained
      study of Sunni hadith and uṣūl, embraced Sunni
      methodology in his *al-ʿAwāṣim wa-l-Qawāṣim fī al-Dhabb
      ʿan Sunnat Abī al-Qāsim* (a defence of the Sunni hadith
      tradition against the rationalist Muʿtazilī-Zaydī
      critique) and *al-Rawḍ al-Bāsim*, an abridgement of the
      same — died of plague at Ṣanʿāʾ in 840 AH (1437 CE),
      aged 65. His critique of taqlīd and his insistence on
      direct engagement with the Qurʾān, the *Saḥīḥayn* and
      the wider Sunni hadith corpus would influence the later
      Yemeni Sunni revivalist tradition through Muḥammad ibn
      Ismāʿīl al-Amīr al-Ṣanʿānī and al-Shawkānī, and the
      modern Salafi current more broadly.
    description_ar: |
      توفي محمد بن إبراهيم بن علي بن المرتضى ابن الوزير اليماني
      (٧٧٥–٨٤٠ هـ / ١٣٧٣–١٤٣٧ ميلادي) — العالم اليماني الذي
      نشأ في كنف المذهب الزيدي ثم بعد مطالعة طويلة لكتب
      الحديث وأصول السنّة سلك مسلك أهل السنّة، فصنّف «العواصم
      والقواصم في الذبّ عن سنّة أبي القاسم» في الذبّ عن سنّة
      رسول الله ﷺ والردّ على المعارضين من المعتزلة والزيدية
      الشيعة، و«الروض الباسم» مختصره — في صنعاء بمرض الطاعون
      سنة ٨٤٠ هـ (الموافق ١٤٣٧ ميلادي) وله من العمر خمس
      وستون سنة. وقد ترك نقده للتقليد ومنهجه في الرجوع المباشر
      إلى الكتاب والصحيحين وعموم كتب الحديث السنية أثراً عميقاً
      في الحركة السنّية اليمانية اللاحقة من محمد بن إسماعيل
      الأمير الصنعاني والشوكاني، وفي التيار السلفي الحديث على
      اتساعه.
    description_fr: |
      Muḥammad ibn Ibrāhīm ibn ʿAlī ibn al-Murtaḍā Ibn al-Wazīr
      al-Yamānī (775–840 H / 1373–1437 EC) — savant yéménite
      formé dans la tradition zaydite qui, après une longue
      étude des hadiths sunnites et des *uṣūl*, adopta la
      méthode sunnite dans *al-ʿAwāṣim wa-l-Qawāṣim fī al-Dhabb
      ʿan Sunnat Abī al-Qāsim* (défense du hadith sunnite
      contre la critique muʿtazilite-zaydite rationaliste) et
      dans son abrégé *al-Rawḍ al-Bāsim* — mourut à Ṣanʿāʾ
      durant une épidémie de peste en 840 H (1437 EC) à l'âge
      de 65 ans. Sa critique du taqlīd et sa volonté de
      revenir directement au Coran, aux *Ṣaḥīḥayn* et au
      corpus hadithien sunnite plus large allaient nourrir le
      renouveau sunnite yéménite postérieur — à travers
      Muḥammad ibn Ismāʿīl al-Amīr al-Ṣanʿānī et al-Shawkānī
      — ainsi que le courant salafi moderne au sens large.
    canonical_hijri: {year: 840, precision: year}
    canonical_gregorian: {date: 1437-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Year 840 AH per al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ and Ibn al-ʿImād's Shadharāt al-Dhahab; al-Shawkānī's al-Badr al-Ṭāliʿ likewise."
      - source_key: ei2
    people: [[ibn-al-wazir-al-yamani, subject]]
    tags: [yemen, sanaa, sunni-revivalist, hadith, anti-taqlid, zawaid]
    importance: notable
    verification_status: cross_verified

  - slug: death-of-al-bisati
    category: scholar
    title_en: Death of al-Bisāṭī — Mamluk Mālikī Chief Judge of Egypt
    title_ar: وفاة البساطي — قاضي قضاة المالكية بمصر
    title_fr: Mort d'al-Bisāṭī — grand qāḍī mālikite de l'Égypte mamelouke
    description_en: |
      Shams al-Dīn Abū ʿAbd Allāh Muḥammad ibn Aḥmad ibn ʿUthmān
      al-Bisāṭī al-Mālikī — Egyptian Mālikī jurist, contemporary
      of al-Damīrī and Ibn Ḥajar al-ʿAsqalānī, and chief Mālikī
      qāḍī (qāḍī al-quḍāh) of Cairo under the Mamluks — died
      on Thursday 12 Ramaḍān 842 AH (27 February 1439 CE) of
      colic. He had taught uṣūl al-fiqh and Mālikī fiqh at
      al-Madrasa al-Ṣāliḥiyya and other Cairo madrasas, and his
      tenure as chief qāḍī coincided with the long Cairo
      regency of Sultan Barsbāy. His textbook *al-Mughnī fī
      Sharḥ al-Iḍāḥ fī al-Manṭiq* on logic and his commentary
      on Ibn al-Ḥājib's *Mukhtaṣar* on Mālikī uṣūl al-fiqh
      circulated widely through the late-Mamluk and Ottoman
      Maghribi madrasas.
    description_ar: |
      توفي شمس الدين أبو عبد الله محمد بن أحمد بن عثمان
      البساطي المالكي — الفقيه المالكي المصري، معاصر الدميري
      وابن حجر العسقلاني، قاضي قضاة المالكية بالقاهرة في الدولة
      المملوكية — يوم الخميس ١٢ رمضان سنة ٨٤٢ هـ (الموافق
      ٢٧ فيفري ١٤٣٩ ميلادي) بمرض القولنج. وكان قد درّس أصول
      الفقه والفقه المالكي بالمدرسة الصالحية وغيرها بالقاهرة،
      وتولى القضاء في عهد السلطان برسباي الطويل. ودرس عليه
      الطلبة كتابه «المغني في شرح الإيضاح في المنطق» وشرحه على
      «مختصر ابن الحاجب» في أصول الفقه المالكي، وانتشرت أيضاً
      في مدارس المغرب في أواخر العصر المملوكي والعثماني.
    description_fr: |
      Shams al-Dīn Abū ʿAbd Allāh Muḥammad ibn Aḥmad ibn
      ʿUthmān al-Bisāṭī al-Mālikī — juriste mālikite égyptien,
      contemporain d'al-Damīrī et d'Ibn Ḥajar al-ʿAsqalānī,
      grand qāḍī mālikite (qāḍī al-quḍāh) du Caire sous les
      Mamelouks — mourut un jeudi 12 Ramaḍān 842 H (27 février
      1439 EC) d'une colique. Il avait enseigné l'uṣūl al-fiqh
      et le fiqh mālikite à la madrasa al-Ṣāliḥiyya et dans
      d'autres établissements du Caire, et sa charge de grand
      qāḍī coïncida avec le long règne mamelouk du sultan
      Barsbāy. Son manuel *al-Mughnī fī Sharḥ al-Iḍāḥ fī
      al-Manṭiq* sur la logique et son commentaire sur le
      *Mukhtaṣar* d'Ibn al-Ḥājib en uṣūl al-fiqh mālikite
      circulèrent largement dans les madrasas tardo-mameloukes
      et ottomanes du Maghreb.
    canonical_hijri: {year: 842, month: 9, day: 12, precision: day}
    canonical_gregorian: {date: 1439-02-27, precision: day, method: tabular_conversion}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "12 Ramaḍān 842 AH per al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ (cause of death: qulanj/colic); reproduced in Ibn al-ʿImād's Shadharāt al-Dhahab."
      - source_key: ei2
    people: [[al-bisati, subject]]
    tags: [mamluk, egypt, cairo, maliki, qadi-al-qudah, fiqh, usul]
    importance: notable
    verification_status: cross_verified

  - slug: death-of-al-birmawi
    category: scholar
    title_en: Death of al-Birmāwī — Cairo Shāfiʿī Jurist and *Uṣūlī*
    title_ar: وفاة البرماوي — الفقيه الشافعي الأصولي بالقاهرة
    title_fr: Mort d'al-Birmāwī — juriste shāfiʿite et *uṣūlī* du Caire
    description_en: |
      Shams al-Dīn Abū ʿAbd Allāh Muḥammad ibn ʿAbd al-Dāʾim
      al-Nuʿaymī al-ʿAsqalānī al-Birmāwī al-Miṣrī al-Shāfiʿī
      (763–831 AH / 1362–1428 CE) — Egyptian Shāfiʿī jurist,
      uṣūlī, and hadith scholar trained in Cairo and Jerusalem
      — died at Jerusalem in 831 AH (1428 CE), aged 68. His
      *al-Alfiyya fī Uṣūl al-Fiqh* (a thousand-line versified
      epitome of Shāfiʿī uṣūl al-fiqh, modelled on Ibn Mālik's
      *Alfiyya* in grammar) became one of the standard Shāfiʿī
      teaching texts in late-Mamluk and Ottoman madrasas. He
      also composed *al-Lāmiʿ al-Ṣabīḥ bi-Sharḥ al-Jāmiʿ
      al-Ṣaḥīḥ*, a commentary on Bukhārī's *Ṣaḥīḥ* less
      voluminous than Ibn Ḥajar's but widely circulated, and
      shorter works on *muṣṭalaḥ al-ḥadīth* and Shāfiʿī fiqh.
    description_ar: |
      توفي شمس الدين أبو عبد الله محمد بن عبد الدائم بن موسى
      ابن عبد الدائم النعيمي العسقلاني البِرماوي المصري الشافعي
      (٧٦٣–٨٣١ هـ / ١٣٦٢–١٤٢٨ ميلادي) — الفقيه المصري
      الشافعي الأصولي والمحدِّث، الذي تلقّى العلم بالقاهرة
      والقدس — ببيت المقدس سنة ٨٣١ هـ (الموافق ١٤٢٨ ميلادي)
      وقد ناهز الثامنة والستين. ومنظومته «الألفية في أصول
      الفقه» — على وزن ألف بيت في أصول الفقه الشافعي، على
      منوال ألفية ابن مالك في النحو — صارت من أمّهات الكتب
      الدراسية في المذهب الشافعي بمدارس آخر العصر المملوكي
      والعثماني. ولـه كذلك «اللامع الصبيح بشرح الجامع الصحيح»
      شرحاً على صحيح البخاري دون شرح ابن حجر في الحجم وأوسع
      منه انتشاراً في الطلبة، وكتب أصغر في مصطلح الحديث
      والفقه الشافعي.
    description_fr: |
      Shams al-Dīn Abū ʿAbd Allāh Muḥammad ibn ʿAbd al-Dāʾim
      al-Nuʿaymī al-ʿAsqalānī al-Birmāwī al-Miṣrī al-Shāfiʿī
      (763–831 H / 1362–1428 EC) — juriste shāfiʿite, uṣūlī
      et hadithien égyptien formé au Caire et à Jérusalem —
      mourut à Jérusalem en 831 H (1428 EC) à l'âge de 68
      ans. Son *al-Alfiyya fī Uṣūl al-Fiqh* (épitomé versifié
      en mille vers de l'uṣūl al-fiqh shāfiʿite, calqué sur
      l'*Alfiyya* d'Ibn Mālik en grammaire) devint l'un des
      textes pédagogiques shāfiʿites de référence dans les
      madrasas tardo-mameloukes et ottomanes. Il composa
      également *al-Lāmiʿ al-Ṣabīḥ bi-Sharḥ al-Jāmiʿ al-Ṣaḥīḥ*,
      commentaire sur le *Ṣaḥīḥ* d'al-Bukhārī moins
      volumineux que celui d'Ibn Ḥajar mais largement
      diffusé, et de plus courts traités de *muṣṭalaḥ
      al-ḥadīth* et de fiqh shāfiʿite.
    canonical_hijri: {year: 831, precision: year}
    canonical_gregorian: {date: 1428-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Year 831 AH per al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ and Ibn al-ʿImād's Shadharāt al-Dhahab; place of death (Jerusalem) cross-attested."
      - source_key: ei2
    people: [[al-birmawi, subject]]
    tags: [mamluk, egypt, jerusalem, shafii, usul, fiqh, hadith]
    importance: notable
    verification_status: cross_verified

