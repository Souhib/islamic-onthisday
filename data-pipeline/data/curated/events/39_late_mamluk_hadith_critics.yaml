  # MAMLUK CHANCELLERY + LEXICOGRAPHY
  # =========================================================================

  - slug: death-of-al-qalqashandi
    category: scholar
    title_en: Death of al-Qalqashandī — Chancellor and Author of *Ṣubḥ al-Aʿshā*
    title_ar: وفاة القلقشندي — صاحب «صبح الأعشى في صناعة الإنشا»
    title_fr: Mort d'al-Qalqashandī — chancelier mamelouk et auteur de *Ṣubḥ al-Aʿshā*
    description_en: |
      Shihāb al-Dīn Aḥmad ibn ʿAlī al-Qalqashandī al-Fazārī al-
      Shāfiʿī — Egyptian Sunni jurist, chancellery secretary in
      the Mamluk *dīwān al-inshāʾ*, and author of the fourteen-
      volume encyclopaedia of administration *Ṣubḥ al-Aʿshā fī
      Ṣināʿat al-Inshāʾ* — died at Cairo in 821 AH (1418 CE).
      *Ṣubḥ al-Aʿshā*, completed circa 814 AH (1412 CE), is the
      single most detailed surviving description of late-medieval
      Islamic statecraft, chancery formulae, geography, postal
      and intelligence networks, and protocol; modern historians
      of the Mamluk sultanate from David Ayalon onwards have
      treated it as a foundational documentary source. He also
      authored *Nihāyat al-Arab fī Maʿrifat Ansāb al-ʿArab*, a
      genealogical reference for Arab tribes.
    description_ar: |
      توفي شهاب الدين أحمد بن علي القلقشندي الفزاري الشافعي —
      الفقيه السني المصري، وكاتب ديوان الإنشاء في الدولة
      المملوكية، وصاحب موسوعة «صبح الأعشى في صناعة الإنشا»
      في أربعة عشر مجلداً — بالقاهرة سنة ٨٢١ هـ (الموافق
      ١٤١٨ ميلادي). و«صبح الأعشى» الذي فرغ من تأليفه نحو
      سنة ٨١٤ هـ (١٤١٢ ميلادي) هو أوفى وصف وصلنا إلى يومنا
      للدولة الإسلامية في أواخر القرون الوسطى من جهة فقه
      الكتابة الديوانية والجغرافيا وشبكات البريد والاستخبارات
      ومراسم البلاط؛ وقد عوّل عليه مؤرخو الدولة المملوكية في
      العصر الحديث من ديڤيد أيالون فمن بعده وعَدُّوه مصدراً
      وثائقياً مؤسِّساً. وله أيضاً «نهاية الأرب في معرفة
      أنساب العرب» مرجعاً في أنساب القبائل العربية.
    description_fr: |
      Shihāb al-Dīn Aḥmad ibn ʿAlī al-Qalqashandī al-Fazārī
      al-Shāfiʿī — juriste sunnite égyptien, secrétaire de la
      chancellerie *dīwān al-inshāʾ* sous les Mamelouks et
      auteur de l'encyclopédie administrative en quatorze
      volumes *Ṣubḥ al-Aʿshā fī Ṣināʿat al-Inshāʾ* — mourut
      au Caire en 821 H (1418 EC). *Ṣubḥ al-Aʿshā*, achevé
      vers 814 H (1412 EC), est la description la plus
      détaillée qui nous soit parvenue de l'État islamique
      tardo-médiéval — formulaires chancelliers, géographie,
      réseaux postaux et de renseignement, protocole — et les
      historiens modernes du sultanat mamelouk, de David
      Ayalon aux contemporains, le tiennent pour une source
      documentaire fondatrice. Il composa aussi *Nihāyat
      al-Arab fī Maʿrifat Ansāb al-ʿArab*, un manuel de
      référence en généalogie tribale arabe.
    canonical_hijri: {year: 821, precision: year}
    canonical_gregorian: {date: 1418-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Year 821 AH attested by al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ; al-Dhahabī's Tārīkh al-Islām only covers up to 700 AH but later muḥaddith continuations reproduce the same date."
      - source_key: ei2
    people: [[al-qalqashandi, subject]]
    tags: [mamluk, egypt, cairo, shafii, chancellery, encyclopedia]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Qalqashandi"

  - slug: death-of-al-fayruzabadi
    category: scholar
    title_en: Death of al-Fayrūzābādī — Author of *al-Qāmūs al-Muḥīṭ*
    title_ar: وفاة الفيروزآبادي — صاحب «القاموس المحيط»
    title_fr: Mort d'al-Fayrūzābādī — auteur d'*al-Qāmūs al-Muḥīṭ*
    description_en: |
      Majd al-Dīn Abū al-Ṭāhir Muḥammad ibn Yaʿqūb al-Shīrāzī
      al-Fayrūzābādī — Persian Shāfiʿī lexicographer, traveller
      across Anatolia, Egypt, the Ḥijāz, and Yemen, and chief
      qāḍī of Zabīd under the Rasūlid sultans — died at Zabīd
      in 817 AH (1415 CE), aged about 84. His *al-Qāmūs
      al-Muḥīṭ* — a single-volume Arabic-Arabic dictionary that
      condensed the much larger lexica of al-Jawharī, al-Azharī,
      Ibn Sīda and Ibn Manẓūr into a usable reference — became
      the standard Arabic dictionary of the late-medieval and
      Ottoman period and remained so until the lithograph age,
      when it served in turn as the base text for al-Zabīdī's
      forty-volume *Tāj al-ʿArūs*. He also produced extensive
      Qurʾānic and hadith works including *Baṣāʾir Dhawī
      al-Tamyīz* and a commentary on *Ṣaḥīḥ al-Bukhārī* (now
      lost).
    description_ar: |
      توفي مجد الدين أبو الطاهر محمد بن يعقوب الشيرازي
      الفيروزآبادي — اللغوي الشافعي الفارسي، الرحّالة في بلاد
      الروم ومصر والحجاز واليمن، وقاضي قضاة زبيد في عهد بني
      رسول — بزبيد سنة ٨١٧ هـ (الموافق ١٤١٥ ميلادي) وقد
      ناهز الرابعة والثمانين. و«القاموس المحيط» معجمه العربي
      في مجلد واحد، وقد لخّص فيه معجمات الجوهري والأزهري وابن
      سيده وابن منظور الكبار في مرجع عملي نافع — صار المعجم
      المعتمد في أواخر العصور الوسطى وفي عهد الدولة العثمانية
      وظلّ كذلك حتى العصر الطباعي، إذ اتخذه الزبيدي بعد قرون
      أصلاً لمعجمه الكبير «تاج العروس من جواهر القاموس» في
      أربعين مجلداً. وله أيضاً مصنفات قرآنية وحديثية واسعة منها
      «بصائر ذوي التمييز في لطائف الكتاب العزيز» وشرح على
      صحيح البخاري ضاع.
    description_fr: |
      Majd al-Dīn Abū al-Ṭāhir Muḥammad ibn Yaʿqūb al-Shīrāzī
      al-Fayrūzābādī — lexicographe shāfiʿite persan, voyageur
      en Anatolie, en Égypte, au Ḥijāz et au Yémen, grand qāḍī
      de Zabīd sous les sultans rasūlides — mourut à Zabīd
      en 817 H (1415 EC) à l'âge d'environ 84 ans. Son
      *al-Qāmūs al-Muḥīṭ* — dictionnaire arabe-arabe en un seul
      volume condensant les vastes lexiques d'al-Jawharī,
      al-Azharī, Ibn Sīda et Ibn Manẓūr en un ouvrage de
      consultation maniable — devint le dictionnaire arabe de
      référence dans l'Islam tardo-médiéval et ottoman et le
      demeura jusqu'à l'ère lithographique, lorsque al-Zabīdī
      le prit pour texte de base de son *Tāj al-ʿArūs* en
      quarante volumes. Il composa également d'importants
      travaux coraniques et hadithiens, dont *Baṣāʾir Dhawī
      al-Tamyīz* et un commentaire perdu sur le *Ṣaḥīḥ
      al-Bukhārī*.
    canonical_hijri: {year: 817, precision: year}
    canonical_gregorian: {date: 1415-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Year 817 AH attested across Sunni biographical literature (al-Sakhāwī, Ibn Ḥajar's continuation of Tārīkh al-Islām, Ibn al-ʿImād); month flagged."
      - source_key: ei2
    people: [[al-fayruzabadi, subject]]
    tags: [shafii, persian, lexicography, yemen, zabid, rasulid]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Fairuzabadi"

