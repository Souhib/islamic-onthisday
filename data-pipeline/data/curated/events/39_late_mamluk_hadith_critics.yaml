  - slug: death-of-fadlullah-ibn-ruzbihan-al-khunji
    category: scholar
    title_en: Death of Faḍlullāh ibn Rūzbihān al-Khunjī — Sunni Refuter of Safavid Shīʿism
    title_ar: وفاة فضل الله بن روزبهان الخنجي — الردُّ السنّي على الصفويين
    title_fr: Mort de Faḍlullāh ibn Rūzbihān al-Khunjī — réfutateur sunnite du chiisme safavide
    description_en: |
      Faḍlullāh ibn Rūzbihān al-Khunjī al-Shīrāzī al-Iṣfahānī
      (circa 860–927 AH / circa 1456–1521 CE) — Sunni-Persian
      jurist, Ashʿarī theologian, and chronicler successively
      attached to the Aqquyunlu of Tabrīz, the Uzbek (Shaybanid)
      court at Samarqand-Bukhārā, and the early Mughal milieu
      — died at Bukhārā in 927 AH, aged about 64. His *Ibṭāl
      Nahj al-Bāṭil*, a point-by-point Sunni response to
      al-ʿAllāma al-Ḥillī's Twelver-Shīʿī polemic *Nahj
      al-Ḥaqq wa-Kashf al-Ṣidq*, became the canonical Sunni
      reply to Safavid Shia state theology and was repeatedly
      reprinted (notably by Shāh Walīullāh's son ʿAbd al-ʿAzīz
      al-Dihlawī, who built his *Tuḥfa Ithnā ʿAshariyya* on
      its arguments). His *Tārīkh-i ʿĀlam-Ārā-yi Amīnī* —
      annalistic chronicle of Aqquyunlu Sultan Yaʿqūb — and
      his *Mihmān-Nāma-yi Bukhārā* (record of the Uzbek court
      under Muḥammad Shaybānī Khān) remain primary sources for
      late-Tīmūrid and early-Safavid Iran.
    description_ar: |
      توفي فضل الله بن روزبهان الخنجي الشيرازي الأصبهاني
      (نحو ٨٦٠–٩٢٧ هـ / نحو ١٤٥٦–١٥٢١ ميلادي) — الفقيه
      السنّي الفارسي والمتكلم الأشعري والمؤرخ الذي تنقّل في
      بلاطات آق قويونلو بتبريز ثم بلاط الأوزبك (الشيبانيين)
      بسمرقند وبخارى ثم في أوائل العصر المغولي بالهند —
      ببخارى سنة ٩٢٧ هـ، وقد ناهز الرابعة والستين. وكتابه
      «إبطال نهج الباطل» جاء جواباً سنياً مفصّلاً على «نهج
      الحقّ وكشف الصدق» للعلامة الحلّي الإمامي، فصار الردّ
      السنّي المعتمد على عقيدة الدولة الصفوية، وأُعيد طبعه
      مراراً، وبنى عليه الشاه عبد العزيز الدهلوي «تحفته
      الاثنا عشرية». ولا يزال «تاريخ عالم آراي أميني» —
      حوليات السلطان يعقوب الأقّ قويونلوي — و«مهمان نامه
      بخارا» — وصفه بلاطَ محمد شيباني خان الأوزبكي — من
      المصادر الأولية لتاريخ إيران في أواخر العصر التيموري
      وأوائل الصفوي.
    description_fr: |
      Faḍlullāh ibn Rūzbihān al-Khunjī al-Shīrāzī al-Iṣfahānī
      (vers 860–927 H / vers 1456–1521 EC) — juriste sunnite
      persan, théologien ashʿarīte et chroniqueur attaché
      successivement aux Aqquyunlu de Tabrīz, à la cour
      ouzbek (Shaybanide) de Samarqand-Boukhara, puis au
      premier milieu moghol — mourut à Boukhara en 927 H à
      l'âge d'environ 64 ans. Son *Ibṭāl Nahj al-Bāṭil*,
      réponse sunnite point par point à la polémique
      duodécimaine *Nahj al-Ḥaqq wa-Kashf al-Ṣidq* d'al-
      ʿAllāma al-Ḥillī, devint la réplique sunnite canonique
      à la théologie d'État du chiisme safavide et fut
      maintes fois rééditée (notamment par Shāh ʿAbd al-ʿAzīz
      al-Dihlawī, fils de Shāh Walīullāh, qui en fit la
      base de son *Tuḥfa Ithnā ʿAshariyya*). Son *Tārīkh-i
      ʿĀlam-Ārā-yi Amīnī* — annales du sultan aqquyunlu
      Yaʿqūb — et son *Mihmān-Nāma-yi Bukhārā* — relation de
      la cour ouzbek sous Muḥammad Shaybānī Khān — restent
      des sources primaires majeures pour l'Iran de la fin
      des Timourides et du début des Safavides.
