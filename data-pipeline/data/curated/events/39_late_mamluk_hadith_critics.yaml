  - slug: death-of-al-munawi
    category: scholar
    title_en: Death of ʿAbd al-Raʾūf al-Munāwī — Author of *Fayḍ al-Qadīr*
    title_ar: وفاة عبد الرؤوف المناوي — صاحب «فيض القدير»
    title_fr: Mort d'ʿAbd al-Raʾūf al-Munāwī — auteur de *Fayḍ al-Qadīr*
    description_en: |
      Zayn al-Dīn Muḥammad ʿAbd al-Raʾūf ibn Tāj al-ʿĀrifīn
      al-Munāwī al-Ḥaddādī al-Shāfiʿī (952–1031 AH / 1545–
      1622 CE) — Egyptian Shāfiʿī polymath of Cairo, hadith
      scholar, biographer, and one of the principal late-
      Mamluk-Ottoman commentators on al-Suyūṭī — died at
      Cairo in 1031 AH, aged about 79. His six-volume *Fayḍ
      al-Qadīr Sharḥ al-Jāmiʿ al-Ṣaghīr* — a major commentary
      on al-Suyūṭī's *al-Jāmiʿ al-Ṣaghīr* (a hadith compendium
      drawn from the Six Books and beyond) — became the
      single most-circulated commentary on a hadith mukhtaṣar
      across the Ottoman period. He also produced *al-
      Kawākib al-Durriyya fī Tarājim al-Sāda al-Ṣūfiyya*, a
      biographical dictionary of Sufi masters; *al-Taʿārīf*,
      a dictionary of technical terms in Islamic sciences;
      and a commentary on al-Suyūṭī's *Khulāṣat al-Bayān fī
      ʿIlm al-Qurʾān*. His son Tāj al-ʿĀrifīn al-Munāwī
      continued the family scholarship in Cairo into the
      mid-eleventh century AH.
    description_ar: |
      توفي زين الدين محمد عبد الرؤوف بن تاج العارفين المُناوي
      الحدّادي الشافعي (٩٥٢–١٠٣١ هـ / ١٥٤٥–١٦٢٢ ميلادي) —
      الفقيه الشافعي المصري الموسوعي بالقاهرة، المحدِّث
      المترجم، وأحد كبار شرّاح السيوطي في أواخر العصر المملوكي
      وأوائل العثماني — بالقاهرة سنة ١٠٣١ هـ، وقد ناهز
      التاسعة والسبعين. وشرحه «فيض القدير شرح الجامع الصغير»
      في ستة مجلدات على «الجامع الصغير» للسيوطي — وهو مختصر
      حديثي مستلّ من الكتب الستة وغيرها — صار أكثر شروح
      المختصرات الحديثية تداولاً في العصر العثماني. وله أيضاً
      «الكواكب الدرّية في تراجم السادة الصوفية» في طبقات
      الصوفية، و«التعاريف» في اصطلاحات العلوم الإسلامية،
      وشرحٌ على «خلاصة البيان في علم القرآن» للسيوطي. وقد
      تابع ولده تاج العارفين المناوي العلمَ في القاهرة إلى
      أواسط القرن الحادي عشر الهجري.
    description_fr: |
      Zayn al-Dīn Muḥammad ʿAbd al-Raʾūf ibn Tāj al-ʿĀrifīn
      al-Munāwī al-Ḥaddādī al-Shāfiʿī (952–1031 H / 1545–
      1622 EC) — polymathe shāfiʿite égyptien du Caire,
      hadithien, biographe et l'un des principaux
      commentateurs tardo-mamelouks et ottomans d'al-Suyūṭī —
      mourut au Caire en 1031 H à l'âge d'environ 79 ans.
      Son *Fayḍ al-Qadīr Sharḥ al-Jāmiʿ al-Ṣaghīr* en six
      volumes, vaste commentaire d'al-*Jāmiʿ al-Ṣaghīr* d'al-
      Suyūṭī (compendium hadithien tiré des Six Livres et
      d'autres recueils), devint le commentaire d'un
      mukhtaṣar hadithien le plus diffusé de toute l'époque
      ottomane. Il produisit également *al-Kawākib
      al-Durriyya fī Tarājim al-Sāda al-Ṣūfiyya* (dictionnaire
      biographique de maîtres soufis), *al-Taʿārīf*
      (dictionnaire des termes techniques des sciences
      islamiques) et un commentaire sur la *Khulāṣat al-Bayān
      fī ʿIlm al-Qurʾān* d'al-Suyūṭī. Son fils Tāj al-ʿĀrifīn
      al-Munāwī perpétua l'érudition familiale au Caire
      jusqu'au milieu du XIe siècle de l'Hégire.
    canonical_hijri: {year: 1031, precision: year}
    canonical_gregorian: {date: 1622-01-01, precision: year, method: attested}
