  # SUBKĪ FAMILY
  # =========================================================================

  - slug: death-of-baha-al-din-al-subki
    category: scholar
    title_en: Death of Bahāʾ al-Dīn al-Subkī — Brother of Tāj al-Dīn
    title_ar: وفاة بهاء الدين السبكي — أخو تاج الدين
    title_fr: Mort de Bahāʾ al-Dīn al-Subkī — frère de Tāj al-Dīn
    description_en: |
      Bahāʾ al-Dīn Aḥmad ibn ʿAlī ibn ʿAbd al-Kāfī ibn Tamām
      al-Subkī al-Shāfiʿī — Egyptian Shāfiʿī jurist, son of
      the chief qāḍī Taqī al-Dīn al-Subkī and younger brother
      of the *Ṭabaqāt al-Shāfiʿiyya al-Kubrā* author Tāj al-Dīn
      al-Subkī — died on Friday 21 Dhū al-Qaʿda 773 AH
      (26 May 1372 CE) at Cairo, aged about 53. He had served
      as qāḍī in several Egyptian and Levantine cities, taught
      Shāfiʿī fiqh at the major Cairo and Damascus madrasas,
      and assisted his brother in the editorial work on the
      *Ṭabaqāt*; his own compositions (especially in adab and
      poetry) are preserved more thinly than his brother's,
      but Tāj al-Dīn dedicates several chapters of the
      *Ṭabaqāt* to mutual teachers, and Ibn Ḥajar in
      *al-Durar al-Kāmina* gives the Bahāʾ al-Dīn-attested
      transmissions special weight on questions of late-
      thirteenth-century Cairene Shāfiʿī biography.
    description_ar: |
      توفي بهاء الدين أحمد بن علي بن عبد الكافي بن تمام
      السبكي الشافعي — الفقيه الشافعي المصري، ابنُ قاضي
      القضاة تقي الدين السبكي، وأخو صاحب «طبقات الشافعية
      الكبرى» تاج الدين السبكي الأصغرُ — يوم الجمعة ٢١ ذي
      القعدة سنة ٧٧٣ هـ (الموافق ٢٦ ماي ١٣٧٢ ميلادي)
      بالقاهرة، وقد ناهز الثالثة والخمسين. وقد تولى القضاء في
      عدة بلدان من مصر والشام، ودرّس الفقه الشافعي بكبرى
      مدارس القاهرة ودمشق، وأعان أخاه على تحرير «الطبقات»؛
      وقد ضاع أكثر مصنفاته في الأدب والشعر، ولكن تاج الدين
      أفرد له ولشيوخه فصولاً في «الطبقات»، وقد عوّل ابن حجر
      في «الدرر الكامنة» على رواياته في تراجم شافعية القاهرة
      من أواخر القرن السابع.
    description_fr: |
      Bahāʾ al-Dīn Aḥmad ibn ʿAlī ibn ʿAbd al-Kāfī ibn Tamām
      al-Subkī al-Shāfiʿī — juriste shāfiʿite égyptien, fils
      du grand qāḍī Taqī al-Dīn al-Subkī et frère cadet de
      l'auteur des *Ṭabaqāt al-Shāfiʿiyya al-Kubrā* Tāj al-Dīn
      al-Subkī — mourut un vendredi 21 Dhū al-Qaʿda 773 H
      (26 mai 1372 EC) au Caire à l'âge d'environ 53 ans. Il
      avait exercé la charge de qāḍī dans plusieurs villes
      d'Égypte et du Levant, enseigné le fiqh shāfiʿite dans
      les principales madrasas du Caire et de Damas, et
      secondé son frère dans le travail éditorial des
      *Ṭabaqāt*. Ses propres œuvres (surtout en adab et
      poésie) sont conservées plus parcimonieusement que
      celles de son frère, mais Tāj al-Dīn lui consacre
      plusieurs chapitres des *Ṭabaqāt* sur leurs maîtres
      communs, et Ibn Ḥajar accorde dans *al-Durar al-Kāmina*
      un poids particulier aux transmissions remontant à
      Bahāʾ al-Dīn pour la prosopographie shāfiʿite cairote
      de la fin du septième siècle.
    canonical_hijri: {year: 773, month: 11, day: 21, precision: day}
    canonical_gregorian: {date: 1372-05-26, precision: day, method: tabular_conversion}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "21 Dhū al-Qaʿda 773 AH per Ibn Ḥajar's al-Durar al-Kāmina and al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān himself died in 681 AH; the entry on Bahāʾ al-Dīn was added by the late-Mamluk continuators of Wafayāt al-Aʿyān (al-Wāfī, al-Yūnīnī tradition)."
    people: [[baha-al-din-al-subki, subject], [taj-al-din-al-subki, subject], [taqi-al-din-al-subki, subject]]
    tags: [mamluk, egypt, cairo, damascus, shafii, qadi, subki-family]
    importance: notable
    verification_status: cross_verified

