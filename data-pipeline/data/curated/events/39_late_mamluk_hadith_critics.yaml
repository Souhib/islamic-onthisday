# Wave 26 of curated event additions (2026-04-27).
# Late Mamluk-era Sunni scholars and hadith critics — the eighth-to-tenth-
# century-AH (fourteenth-to-sixteenth-century-CE) generation that defined
# the late-classical Sunni canon: chancellors and lexicographers
# (al-Qalqashandī, al-Fayrūzābādī), Bukhārī commentators (al-Qastallānī),
# Damascene and Egyptian muḥaddithūn / zawāʾid compilers (Ibn Nāṣir
# al-Dīn al-Dimashqī, Aḥmad ibn Abī Bakr al-Buṣīrī), Yemeni reformist
# muḥaddith critics of taqlīd (Ibn al-Wazīr al-Yamānī), Mamluk Mālikī
# qāḍī al-quḍāhs (al-Bisāṭī), Cairo Shāfiʿī uṣūlī jurists (al-Birmāwī),
# Subkī family scholars (Bahāʾ al-Dīn al-Subkī), late-Saljūq–Anatolian
# Sufi-philosophers of the Akbarī school (Ṣadr al-Dīn al-Qūnawī),
# Sunnī-Persian Aqquyunlu / Shaybanid theologians who refuted nascent
# Safavid Shīʿism (Faḍlullāh ibn Rūzbihān al-Khunjī), and Cairo Shāfiʿī
# polymaths who closed the long fifteenth-century commentary tradition
# (ʿAbd al-Raʾūf al-Munāwī). All twelve are mainstream Sunnī figures
# attested in classical biographical literature (al-Sakhāwī's *al-Ḍawʾ
# al-Lāmiʿ*, al-Suyūṭī's tabaqāt, Ibn al-ʿImād's *Shadharāt al-Dhahab*,
# al-Shawkānī's *al-Badr al-Ṭāliʿ*) and in the modern reference works
# (al-Dhahabī's *Tārīkh al-Islām*, Ibn Khallikān's *Wafayāt al-Aʿyān*
# for the earlier figures, EI2). None are sahaba; none carry hadith
# refs. Trilingual en/ar/fr throughout.

events:
