  - slug: death-of-al-qastallani
    category: scholar
    title_en: Death of al-Qasṭallānī — Bukhārī Commentator
    title_ar: وفاة القسطلاني — شارح صحيح البخاري
    title_fr: Mort d'al-Qasṭallānī — commentateur du *Ṣaḥīḥ* d'al-Bukhārī
    description_en: |
      Shihāb al-Dīn Aḥmad ibn Muḥammad al-Qasṭallānī — Egyptian
      Shāfiʿī muḥaddith and qārī, student of al-Sakhāwī and
      al-Suyūṭī — died at Cairo on 8 Muḥarram 923 AH (31
      January 1517 CE), in the very weeks following the
      Ottoman conquest of Mamluk Egypt. He was about 67. His
      most enduring work is *Irshād al-Sārī li-Sharḥ Ṣaḥīḥ
      al-Bukhārī*, a massive commentary on Bukhārī's *Ṣaḥīḥ*
      that remained one of the four standard Sunni
      commentaries on the work alongside Ibn Ḥajar's *Fatḥ
      al-Bārī*, al-ʿAynī's *ʿUmdat al-Qārī*, and al-Kirmānī's
      *al-Kawākib al-Darārī*. He also wrote *al-Mawāhib
      al-Laduniyya bi-l-Minaḥ al-Muḥammadiyya*, a sīra widely
      circulated through the Ottoman period and commented on
      by al-Zurqānī.
    description_ar: |
      توفي شهاب الدين أحمد بن محمد القسطلاني — المحدّث المصري
      الشافعي القارئ، تلميذ السخاوي والسيوطي — بالقاهرة يوم
      ٨ محرم ٩٢٣ هـ (الموافق ٣١ جانفي ١٥١٧ ميلادي)، أي في
      الأسابيع الأولى بُعيد فتح السلطان سليم الأول مصرَ
      المملوكية. وقد ناهز السابعة والستين. وأشهر مصنفاته
      «إرشاد الساري لشرح صحيح البخاري»، شرح ضخم لصحيح البخاري
      ظلّ من الشروح السنية الأربعة المعتمدة على الكتاب إلى
      جانب «فتح الباري» لابن حجر و«عمدة القاري» للعيني
      و«الكواكب الدراري» للكرماني. وله أيضاً «المواهب اللدنية
      بالمنح المحمدية» في السيرة النبوية، تداولتها أيدي طلبة
      العلم طوال العهد العثماني وشرحها الزرقاني.
    description_fr: |
      Shihāb al-Dīn Aḥmad ibn Muḥammad al-Qasṭallānī —
      muḥaddith shāfiʿite et qāriʾ égyptien, élève d'al-Sakhāwī
      et d'al-Suyūṭī — mourut au Caire le 8 Muḥarram 923 H
      (31 janvier 1517 EC), dans les semaines qui suivirent
      la conquête ottomane de l'Égypte mamelouke. Il avait
      environ 67 ans. Son ouvrage le plus durable est *Irshād
      al-Sārī li-Sharḥ Ṣaḥīḥ al-Bukhārī*, vaste commentaire
      du *Ṣaḥīḥ* d'al-Bukhārī, demeuré l'un des quatre
      commentaires sunnites de référence avec le *Fatḥ
      al-Bārī* d'Ibn Ḥajar, le *ʿUmdat al-Qārī* d'al-ʿAynī
      et *al-Kawākib al-Darārī* d'al-Kirmānī. Il écrivit
      également *al-Mawāhib al-Laduniyya bi-l-Minaḥ
      al-Muḥammadiyya*, sīra largement diffusée durant
      l'époque ottomane et commentée par al-Zurqānī.
    canonical_hijri: {year: 923, month: 1, day: 8, precision: day}
    canonical_gregorian: {date: 1517-01-31, precision: day, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "8 Muḥarram 923 AH per al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ and Ibn al-ʿImād's Shadharāt al-Dhahab; both reproduce the date stated in the late-Mamluk Cairo necrologies that continue Tārīkh al-Islām."
      - source_key: ei2
    people: [[al-qastallani, subject]]
    tags: [mamluk, ottoman, egypt, cairo, shafii, muhaddith, bukhari-commentary]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Qastallani"

  - slug: death-of-ibn-nasir-al-din-al-dimashqi
    category: scholar
    title_en: Death of Ibn Nāṣir al-Dīn al-Dimashqī — Damascene Muḥaddith
    title_ar: وفاة ابن ناصر الدين الدمشقي — محدّث دمشق
    title_fr: Mort d'Ibn Nāṣir al-Dīn al-Dimashqī — muḥaddith de Damas
    description_en: |
      Shams al-Dīn Muḥammad ibn ʿAbd Allāh ibn Muḥammad ibn
      Aḥmad ibn Mujāhid al-Qaysī al-Dimashqī al-Shāfiʿī, known
      as Ibn Nāṣir al-Dīn — Damascene Shāfiʿī muḥaddith, head
      of the Dār al-Ḥadīth al-Ashrafiyya, and one of the
      principal hadith critics of ninth-century-AH Damascus —
      was killed in Rabīʿ al-Ākhir 842 AH (October 1438 CE)
      by raiders in a village outside Damascus. He was 65.
      His *al-Radd al-Wāfir ʿalā man Zaʿama anna man Sammā Ibn
      Taymiyya Shaykh al-Islām Kāfir* — a refutation of those
      who declared Ibn Taymiyya's defenders kāfir — and his
      *Tawḍīḥ al-Mushtabih* (a corrective expansion of
      al-Dhahabī's *Mushtabih* in the science of names of
      narrators) became standard reference works among later
      Sunni muḥaddithūn from al-Sakhāwī and al-Suyūṭī through
      the Ottoman period.
    description_ar: |
      استُشهد شمس الدين محمد بن عبد الله بن محمد بن أحمد بن
      مجاهد القيسي الدمشقي الشافعي، المعروف بـابن ناصر الدين —
      محدّث دمشق الشافعي، وشيخ دار الحديث الأشرفية بها، وأحد
      كبار نقّاد الحديث في القرن التاسع الهجري — في ربيع الآخر
      سنة ٨٤٢ هـ (الموافق أكتوبر ١٤٣٨ ميلادي)، إذ قتلته جماعة
      من المغيرين في قرية من قرى دمشق. وقد ناهز الخامسة
      والستين. وكتابه «الردّ الوافر على من زعم أنّ من سمّى ابن
      تيمية شيخ الإسلام كافر» في الذبّ عمّن ذبّ عن ابن تيمية،
      و«توضيح المشتبه» الذي وسّع به «المشتبه» للذهبي في علم
      أسماء الرجال — صارا بعد ذلك من المراجع المعتمدة عند
      المحدّثين السنّة من السخاوي والسيوطي إلى عصر الدولة
      العثمانية.
    description_fr: |
      Shams al-Dīn Muḥammad ibn ʿAbd Allāh ibn Muḥammad ibn
      Aḥmad ibn Mujāhid al-Qaysī al-Dimashqī al-Shāfiʿī, connu
      sous le nom d'Ibn Nāṣir al-Dīn — muḥaddith shāfiʿite
      damascène, directeur de la Dār al-Ḥadīth al-Ashrafiyya
      et l'un des principaux critiques du hadith dans le
      Damas du IXe siècle de l'Hégire — fut tué en Rabīʿ
      al-Ākhir 842 H (octobre 1438 EC) par des pillards dans
      un village des environs de Damas. Il avait 65 ans. Son
      *al-Radd al-Wāfir* (réfutation de ceux qui déclaraient
      kāfir les défenseurs d'Ibn Taymiyya) et son *Tawḍīḥ
      al-Mushtabih* — élargissement correctif du *Mushtabih*
      d'al-Dhahabī dans la science des noms des transmetteurs
      — devinrent des ouvrages de référence chez les
      muḥaddithūn sunnites postérieurs, d'al-Sakhāwī et
      al-Suyūṭī jusqu'à l'époque ottomane.
    canonical_hijri: {year: 842, month: 4, precision: month}
    canonical_gregorian: {date: 1438-10-01, precision: month, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Rabīʿ al-Ākhir 842 AH per al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ; reproduced in Ibn al-ʿImād's Shadharāt al-Dhahab. Day-precision flagged: classical sources differ on the exact day of his murder."
      - source_key: ei2
    people: [[ibn-nasir-al-din-al-dimashqi, subject]]
    tags: [mamluk, damascus, shafii, muhaddith, hadith-criticism, ibn-taymiyya-tradition]
    importance: notable
    verification_status: cross_verified

  - slug: death-of-ahmad-al-busiri-al-misri
    category: scholar
    title_en: Death of Aḥmad al-Buṣīrī al-Miṣrī — Compiler of *Itḥāf al-Khiyara*
    title_ar: وفاة أحمد البوصيري المصري — صاحب «إتحاف الخيرة المهرة»
    title_fr: Mort d'Aḥmad al-Buṣīrī al-Miṣrī — auteur d'*Itḥāf al-Khiyara al-Mahara*
    description_en: |
      Shihāb al-Dīn Aḥmad ibn Abī Bakr ibn Ismāʿīl al-Kinānī
      al-Buṣīrī al-Miṣrī al-Shāfiʿī — Egyptian Sunni muḥaddith
      and *zawāʾid* compiler, student of al-ʿIrāqī and Ibn
      Ḥajar al-ʿAsqalānī — died at Cairo in 840 AH (1436–37
      CE). His major work *Itḥāf al-Khiyara al-Mahara
      bi-Zawāʾid al-Masānīd al-ʿAshara* extracts the hadiths
      contained in the ten foundational *Masānīd* (the *Musnad*
      of al-Ṭayālisī, *al-Muṣannaf* of ʿAbd al-Razzāq and Ibn
      Abī Shayba, and the *Musnads* of Aḥmad, al-Ḥumaydī,
      Musaddad, Ibn Abī Usāma, ʿAbd ibn Ḥumayd, Ibn Manīʿ,
      and Abū Yaʿlā) that are absent from the Six Books — a
      project that, alongside the *zawāʾid* of al-Haythamī and
      Ibn Ḥajar, completed the medieval Sunni effort to
      systematise the corpus of authentic and graded hadith
      outside the Six Books. He distinguished himself from his
      far more famous near-contemporary Sharaf al-Dīn al-Buṣīrī
      (the *Burda* poet) by being primarily a hadith critic.
    description_ar: |
      توفي شهاب الدين أحمد بن أبي بكر بن إسماعيل الكناني
      البوصيري المصري الشافعي — المحدّث السنّي المصري وصاحب
      الزوائد، تلميذ العراقي وابن حجر العسقلاني — بالقاهرة سنة
      ٨٤٠ هـ (الموافق ١٤٣٦–١٤٣٧ ميلادي). وأكبر مصنفاته «إتحاف
      الخيرة المهرة بزوائد المسانيد العشرة» جمع فيه ما زاد على
      الكتب الستة من أحاديث المسانيد العشرة — مسند الطيالسي،
      ومصنّف عبد الرزاق، ومصنّف ابن أبي شيبة، ومسند الإمام
      أحمد، ومسند الحميدي، ومسند مسدد، ومسند ابن أبي أسامة،
      ومسند عبد بن حميد، ومسند ابن منيع، ومسند أبي يعلى — وهذا
      المشروع، إلى جانب زوائد الهيثمي وزوائد ابن حجر، أتمّ
      المسعى السنّي الوسيط في جمع زيادات الصحيح والحسن من
      الحديث على الكتب الستة. وقد امتاز عن سميِّه الأشهر شرف
      الدين البوصيري صاحب «البردة» بأنه محدّث ناقد للأخبار.
    description_fr: |
      Shihāb al-Dīn Aḥmad ibn Abī Bakr ibn Ismāʿīl al-Kinānī
      al-Buṣīrī al-Miṣrī al-Shāfiʿī — muḥaddith sunnite
      égyptien et compilateur de *zawāʾid*, élève d'al-ʿIrāqī
      et d'Ibn Ḥajar al-ʿAsqalānī — mourut au Caire en 840 H
      (1436–37 EC). Son principal ouvrage *Itḥāf al-Khiyara
      al-Mahara bi-Zawāʾid al-Masānīd al-ʿAshara* extrait les
      hadiths contenus dans les dix *Masānīd* fondateurs (le
      *Musnad* d'al-Ṭayālisī, les *Muṣannaf* d'ʿAbd al-Razzāq
      et d'Ibn Abī Shayba, les *Musnads* d'Aḥmad, al-Ḥumaydī,
      Musaddad, Ibn Abī Usāma, ʿAbd ibn Ḥumayd, Ibn Manīʿ
      et Abū Yaʿlā) absents des Six Livres — projet qui, avec
      les *zawāʾid* d'al-Haythamī et d'Ibn Ḥajar, parachève
      l'effort sunnite médiéval de systématisation du corpus
      hadithien authentique extérieur aux Six Livres. Il se
      distinguait de son célèbre quasi-homonyme Sharaf al-Dīn
      al-Buṣīrī, l'auteur de la *Burda*, par sa qualité de
      critique du hadith.
    canonical_hijri: {year: 840, precision: year}
    canonical_gregorian: {date: 1436-01-01, precision: year, method: attested}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Year 840 AH per al-Sakhāwī's al-Ḍawʾ al-Lāmiʿ; reproduced in Ibn al-ʿImād's Shadharāt al-Dhahab."
      - source_key: ei2
    people: [[ahmad-al-busiri-al-misri, subject]]
    tags: [mamluk, egypt, cairo, shafii, muhaddith, zawaid, hadith-criticism]
    importance: notable
    verification_status: cross_verified

