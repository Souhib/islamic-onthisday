  # =========================================================================
  # YAḤYĀ AL-ʿĀMIRĪ AL-ḤARANĪ — Yemeni Sunni historian-jurist
  # =========================================================================

  - slug: death-of-yahya-al-amiri-harani
    category: scholar_death
    title_en: Death of Yaḥyā ibn Abī Bakr al-ʿĀmirī al-Ḥaranī
    title_ar: وفاة يحيى بن أبي بكر العامري الحرّاني
    title_fr: Mort de Yaḥyā ibn Abī Bakr al-ʿĀmirī al-Ḥaranī
    description_en: |
      Yaḥyā ibn Abī Bakr ibn Muḥammad al-ʿĀmirī al-Ḥaranī al-
      Yamanī — Sunni Shāfiʿī jurist, historian, and biographer
      of Yemen, author of the *al-Riyāḍ al-Mustaṭāba fī Jumlat
      man Rawā fī al-Ṣaḥīḥayn min al-Ṣaḥāba* (a register of the
      Companions whose narrations appear in the two Ṣaḥīḥs),
      *Bahjat al-Maḥāfil wa Ujmal al-Wasāʾil* (a sīra-and-
      shamāʾil compendium with a versified frame), and the
      historical *al-Sulūk fī Ṭabaqāt al-ʿUlamāʾ wa al-Mulūk*
      (a tabaqāt of the scholars and rulers, particularly the
      ones of Yemen) — died in Yemen in 893 AH (~1488 CE). His
      *Bahjat al-Maḥāfil* in particular became a standard sīra
      reference in Yemen and the Hijaz through the Ottoman
      period, and his *al-Sulūk* — covering the scholars of
      Yemen down to his own ninth-century generation — is one
      of the principal sources for any biographical work on
      pre-modern Yemen.
    description_ar: |
      توفي يحيى بن أبي بكر بن محمد العامري الحرّاني اليماني —
      فقيه شافعي سني، ومؤرّخ، ومُترجِمٌ يماني، صاحبُ «الرياض
      المستطابة في جملة من روى في الصحيحين من الصحابة» (تعريف
      بصحابة رسول الله ﷺ الذين أخرج لهم البخاري ومسلم)،
      و«بهجة المحافل وأُجمَل الوسائل» (مَجموع في السيرة
      والشمائل بإطار منظوم)، و«السلوك في طبقات العلماء
      والملوك» (طبقاتٌ للعلماء والملوك ولا سيما علماء اليمن
      وملوكها) — باليمن سنة ٨٩٣ هـ (~١٤٨٨ م). وغدا كتابه
      «بهجة المحافل» مرجعاً سيرويّاً معتمداً باليمن والحجاز
      حتى العصر العثماني، وكتابه «السلوك» — وفيه تراجم علماء
      اليمن إلى عصره في القرن التاسع — أحدَ المصادر الأساسية
      في كل عمل ترجمي عن اليمن قبل العصر الحديث.
    description_fr: |
      Yaḥyā ibn Abī Bakr ibn Muḥammad al-ʿĀmirī al-Ḥaranī
      al-Yamanī — juriste shāfiʿīte sunnite, historien et
      biographe du Yémen, auteur d'*al-Riyāḍ al-Mustaṭāba fī
      Jumlat man Rawā fī al-Ṣaḥīḥayn min al-Ṣaḥāba* (registre
      des Compagnons dont les narrations figurent dans les deux
      Ṣaḥīḥs), de *Bahjat al-Maḥāfil wa Ujmal al-Wasāʾil*
      (compendium de sīra et de shamāʾil dans un cadre versifié),
      et de l'historique *al-Sulūk fī Ṭabaqāt al-ʿUlamāʾ
      wa al-Mulūk* (ṭabaqāt des savants et des souverains,
      particulièrement ceux du Yémen) — mourut au Yémen en 893
      H (~1488 EC). Son *Bahjat al-Maḥāfil* en particulier
      devint une référence-sīra standard au Yémen et au Hijāz
      à l'époque ottomane, et son *al-Sulūk* — couvrant les
      savants du Yémen jusqu'à sa propre génération du neuvième
      siècle — est l'une des principales sources pour tout
      travail biographique sur le Yémen prémoderne.
    canonical_hijri: {year: 893, precision: year}
    canonical_gregorian: {date: 1488-01-01, precision: year, method: tabular_conversion}
