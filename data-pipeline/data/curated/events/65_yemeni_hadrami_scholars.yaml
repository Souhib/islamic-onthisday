  # =========================================================================
  # ʿABD AL-RAḤMĀN AL-AHDAL
  # =========================================================================

  - slug: death-of-abd-al-rahman-al-ahdal
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān al-Ahdal — Mufti of Zabīd
    title_ar: وفاة عبد الرحمن الأهدل — مفتي زَبيد
    title_fr: Mort de ʿAbd al-Raḥmān al-Ahdal — muftī de Zabīd
    description_en: |
      ʿAbd al-Raḥmān ibn Sulaymān al-Ahdal — Sunni Shāfiʿī
      faqīh, muḥaddith and mufti of Zabīd in the Tihāma plain
      of Yemen, of the Ahdal sayyid family — was the principal
      bearer of the Zabīd hadith chains in the first half of
      the thirteenth century AH and the leading representative
      of the Sunni-Shāfiʿī tradition of Lower Yemen during the
      period of the early Yemeni response to the Wahhābī
      movement of central Arabia. He died at Zabīd in 1250 AH
      (~1834 CE), the same Hijri year as the major Ṣanʿānī
      reformer Muḥammad ibn ʿAlī al-Shawkānī (d. 1250 AH —
      already covered separately in this dataset). His
      *al-Nafas al-Yamānī wa al-Rūḥ al-Rayḥānī fī Ijāzāt
      al-Quḍāt Banī al-Shawkānī* and his teaching circle at
      Zabīd preserved for the early-Ottoman-revival period the
      Sunni-Shāfiʿī Ashʿarī formation of the Lower Yemen, in
      contrast to the Zaydī highlands and against the Wahhābī
      reform pressure, and constituted the principal *isnād*
      route by which late Yemeni hadith chains passed into
      colonial-period India and Indonesia.
    description_ar: |
      توفي عبد الرحمن بن سليمان الأهدل — فقيه شافعي سني،
      ومحدّث، ومفتي زَبيد بتِهامة اليمن، من بيت الأهدل
      السيادي — وهو حامل أسانيد زَبيد الرئيس في النصف الأول
      من القرن الثالث عشر الهجري، والممثّل الأكبر لتراث
      اليمن الأسفل السني الشافعي في عصر التجاوب اليمني الباكر
      مع الدعوة الوهابية في وسط الجزيرة. وتوفي بزَبيد سنة
      ١٢٥٠ هـ (~١٨٣٤ م)، وهي السنة نفسها التي توفي فيها
      المُجدِّدُ الصنعاني الكبير محمد بن علي الشوكاني (ت
      ١٢٥٠ هـ — وقد أُفرِد في موضع آخر من هذه القاعدة).
      وكتابه «النفس اليماني والروح الريحاني في إجازات قضاة
      بني الشوكاني» وحلقته بزَبيد حفظا في عصر إحياء أوائل
      العصر العثماني المتأخر التربيةَ السنيةَ الشافعيةَ
      الأشعريةَ في اليمن الأسفل في وجه الجبال الزيدية، وفي
      ظلّ ضغط الإصلاح الوهابي من جهة، فكانا الطريقَ الإسناديَّ
      الرئيسَ الذي عبره مرّت أسانيدُ اليمن المتأخرة إلى الهند
      وإلى أرخبيل جنوب شرق آسيا في العصر الاستعماري.
    description_fr: |
      ʿAbd al-Raḥmān ibn Sulaymān al-Ahdal — faqīh
      sunnite-shāfiʿīte, muḥaddith et muftī de Zabīd dans la
      plaine de la Tihāma au Yémen, de la famille sayyide
      al-Ahdal — fut le principal porteur des chaînes
      hadithiques de Zabīd dans la première moitié du XIIIᵉ
      siècle hégirien, et le grand représentant de la
      tradition sunnite-shāfiʿīte du Bas-Yémen à l'époque de
      la première réaction yéménite au mouvement wahhābī de
      l'Arabie centrale. Il mourut à Zabīd en 1250 H (~1834
      EC), la même année hégirienne que le grand réformateur
      ṣanʿānī Muḥammad ibn ʿAlī al-Shawkānī (m. 1250 H — déjà
      traité ailleurs dans cette base). Son *al-Nafas al-Yamānī
      wa al-Rūḥ al-Rayḥānī fī Ijāzāt al-Quḍāt Banī al-Shawkānī*
      et son cercle d'enseignement à Zabīd préservèrent, à
      l'époque du renouveau ottoman tardif, la formation
      sunnite-shāfiʿīte ashʿarite du Bas-Yémen face aux hauts
      plateaux zaydites et sous la pression réformiste wahhābī,
      et constituèrent la principale voie *isnād* par laquelle
      les chaînes hadithiques tardives du Yémen passèrent en
      Inde coloniale et en Indonésie.
    canonical_hijri: {year: 1250, precision: year}
    canonical_gregorian: {date: 1834-01-01, precision: year, method: tabular_conversion}
