  # =========================================================================
  # AḤMAD IBN ʿĪD AL-ḤABASHĪ — Hadhrami sayyid
  # =========================================================================

  - slug: death-of-ahmad-ibn-id-al-habashi
    category: scholar_death
    title_en: Death of Aḥmad ibn ʿĪd al-Ḥabashī — Bā ʿAlawī Sayyid of Tarīm
    title_ar: وفاة أحمد بن عيد الحبشي — السيد العَلَوي بتَريم
    title_fr: Mort de Aḥmad ibn ʿĪd al-Ḥabashī — sayyid Bā ʿAlawī de Tarīm
    description_en: |
      Aḥmad ibn ʿĪd ibn ʿAbd al-Raḥmān Bā ʿAlawī al-Ḥabashī —
      Sunni-Shāfiʿī faqīh, sayyid of Tarīm in Hadhramaut and
      shaykh of the Bā ʿAlawī ṭarīqa, of the al-Ḥabashī branch
      that descends from the Saqqāf line — was a tenth/eleventh-
      century Hijri Hadhrami master in the chain of teachers
      that produced the modern Bā ʿAlawī revival under ʿAbd
      Allāh al-Ḥaddād. The al-Ḥabashī sayyid family remained
      one of the principal scholarly houses of Hadhramaut and
      its Indian Ocean diaspora through the Ottoman and post-
      Ottoman periods, and the chain through this branch carried
      the Bā ʿAlawī Sufi-Shāfiʿī formation forward into the
      modern era. Classical biographical attestation outside
      the Bā ʿAlawī genealogical literature is thin; we record
      the entry honestly as `single_source`. Note: he is not to
      be confused with the modern Ḥaḍramī master ʿAbd Allāh
      ibn ʿAlawī al-Ḥaddād (d. 1132 AH), who is treated as a
      separate entry in this same file, nor with the more
      recent ʿAlī al-Ḥabashī (d. 1333 AH) of the modern
      al-Ḥabashī branch.
    description_ar: |
      كان أحمد بن عيد بن عبد الرحمن باعلوي الحبشي — فقيهاً
      شافعياً سنياً، سيداً من سادة تَريم بحضرموت وشيخاً من
      مشايخ الطريقة العَلَوية، من الفرع الحبشي المنحدر من
      سلسلة السقّاف — من شيوخ القرنين العاشر والحادي عشر
      الهجريين الحَضارمة، وهو في سلسلة المربّين الذين أَخْرَجوا
      نهضة بني علوي الحديثة على يد عبد الله الحدّاد. وظلّت
      أسرة الحبشي السيدية من البيوتات العلمية الكبرى بحضرموت
      وفي مهجرها الهندي طول العصر العثماني وما بعده، ومرّت
      بفرعها هذه التربيةُ العَلَويةُ الشافعيةُ الصوفيةُ إلى
      العصر الحديث. وأمّا التراجم خارج كتب أنساب وسلاسل بني
      علوي فقليلة في هذه الترجمة، ولذلك سجّلنا الحال بصدق
      `single_source`. تنبيه: لا يُخلَط بينه وبين الإمام
      الحدّاد ﴿عبد الله بن علوي الحدّاد ت ١١٣٢ هـ﴾ المذكور في
      هذا الملف نفسه على حدةٍ، ولا بالشيخ علي الحبشي ﴿ت ١٣٣٣
      هـ﴾ من فرع الحبشي المُتأخّر.
    description_fr: |
      Aḥmad ibn ʿĪd ibn ʿAbd al-Raḥmān Bā ʿAlawī al-Ḥabashī —
      faqīh sunnite-shāfiʿīte, sayyid de Tarīm au Hadhramaout
      et cheikh de la voie Bā ʿAlawī, de la branche al-Ḥabashī
      qui descend de la lignée Saqqāf — fut un maître ḥaḍramī
      des dixième et onzième siècles hégiriens, dans la chaîne
      des maîtres qui produisit le renouveau Bā ʿAlawī moderne
      sous ʿAbd Allāh al-Ḥaddād. La famille sayyide
      al-Ḥabashī demeura l'une des principales maisons
      savantes du Hadhramaout et de sa diaspora dans l'océan
      Indien, durant la période ottomane et au-delà, et la
      chaîne qui passe par cette branche transmit la formation
      Bā ʿAlawī shāfiʿīte-soufie jusqu'à l'époque moderne.
      L'attestation biographique classique en dehors de la
      littérature généalogique Bā ʿAlawī est mince ; nous
      enregistrons honnêtement cette entrée comme
      `single_source`. À noter : il ne doit pas être confondu
      avec ʿAbd Allāh ibn ʿAlawī al-Ḥaddād (m. 1132 H), traité
      à part dans ce même fichier, ni avec le plus récent
      ʿAlī al-Ḥabashī (m. 1333 H) de la branche moderne.
