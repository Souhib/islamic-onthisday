  # =========================================================================
  # ʿABD ALLĀH AL-ḤADDĀD — major Ḥaḍramī master, Sunni Shāfiʿī Sufi
  # =========================================================================

  - slug: death-of-abd-allah-al-haddad
    category: scholar_death
    title_en: Death of ʿAbd Allāh ibn ʿAlawī al-Ḥaddād — Imām of the Bā ʿAlawīs
    title_ar: وفاة الإمام عبد الله بن علوي الحدّاد — إمام بني علوي
    title_fr: Mort de ʿAbd Allāh ibn ʿAlawī al-Ḥaddād — Imām des Bā ʿAlawīs
    description_en: |
      ʿAbd Allāh ibn ʿAlawī ibn Muḥammad al-Ḥaddād — Sunni
      Shāfiʿī faqīh, Bā ʿAlawī sayyid, and Sufi master of Tarīm
      in Hadhramaut, blind from the age of four, the foremost
      Ḥaḍramī Sunni Sufi voice of the early modern period and
      the figure whose works became, and have remained, the
      standard formation texts of the Bā ʿAlawī tradition across
      Yemen, the Hijaz, the Hadhrami diaspora of the Indian
      Ocean rim, and South-East Asia — died at al-Ḥāwī near
      Tarīm in 1132 AH (~1720 CE). His *Risālat al-Muʿāwana wa
      al-Muẓāhara wa al-Muʾāzara li al-Rāghibīn min al-Muʾminīn
      fī Sulūk Ṭarīq al-Ākhira* (a sustained Sunni-Sufi ethical
      manual in the Ghazālian line), his *al-Naṣāʾiḥ al-Dīniyya
      wa al-Waṣāyā al-Īmāniyya* (a sermon-by-sermon spiritual
      directory), and his daily *Wird al-Imām al-Ḥaddād* (a set
      Qurʾānic-and-prophetic litany still recited every dawn
      and dusk in Hadhramaut and across the Hadhrami diaspora)
      together constitute the most-circulated body of practical
      Sunni-Shāfiʿī Sufi formation produced in the early modern
      Arab world. He was buried in the Zanbal cemetery of
      Tarīm, alongside the long Bā ʿAlawī line that runs from
      al-Muhājir, through Faqīh al-Muqaddam, al-Saqqāf, and
      al-Muḥdar to him.
    description_ar: |
      توفي الإمام عبد الله بن علوي بن محمد الحدّاد — فقيه
      شافعي سني، وسيد علوي، وشيخ تصوف بتَريم بحضرموت، ضرير
      منذ السنة الرابعة، وأكبر ألسنة التصوف السني الحضرمي في
      مطلع العصر الحديث، والذي صارت كتبه ولا تزال نصوصَ
      التربية المعتمدة في الطريقة العلوية باليمن والحجاز
      ومهجر الحضارمة في حواشي المحيط الهندي وأرخبيل جنوب
      شرق آسيا — بمنطقة الحاوي قُرب تَريم سنة ١١٣٢ هـ (~١٧٢٠
      م). و«رسالة المعاونة والمظاهرة والمؤازرة للراغبين من
      المؤمنين في سلوك طريق الآخرة» (دليلٌ تربوي صوفي سني
      مستدام على نَهج الإمام الغزالي)، و«النصائح الدينية
      والوصايا الإيمانية» (موعظة بعد موعظة في تربية السلوك)،
      و«ورد الإمام الحدّاد» اليومي (مجموع من القرآن والأذكار
      النبوية ما زال يُتلى كلّ بكرة وعشيّة بحضرموت وفي مهجر
      الحضارمة) — هذه الثلاثة معاً تُكوّن أكثر مدوّنة في
      التربية السنية الشافعية الصوفية انتشاراً وأخرجها العالم
      العربي في مطلع العصر الحديث. ودُفن في مقبرة زنبل بتَريم
      بجوار سلسلة بني علوي الطويلة التي تمتدّ من المهاجر،
      مروراً بالفقيه المقدّم والسقّاف والمحضار، إليه.
    description_fr: |
      ʿAbd Allāh ibn ʿAlawī ibn Muḥammad al-Ḥaddād — faqīh
      sunnite-shāfiʿīte, sayyid Bā ʿAlawī et maître soufi de
      Tarīm au Hadhramaout, aveugle dès l'âge de quatre ans,
      la voix soufie sunnite ḥaḍramī majeure du début de
      l'époque moderne, et la figure dont les œuvres devinrent
      — et demeurent — les textes de formation standards de la
      tradition Bā ʿAlawī au Yémen, au Hijāz, dans la diaspora
      ḥaḍramī de l'océan Indien et en Asie du Sud-Est — mourut
      à al-Ḥāwī, près de Tarīm, en 1132 H (~1720 EC). Sa
      *Risālat al-Muʿāwana wa al-Muẓāhara wa al-Muʾāzara
      li al-Rāghibīn min al-Muʾminīn fī Sulūk Ṭarīq al-Ākhira*
      (manuel éthique soufi-sunnite soutenu, dans la ligne
      ghazālienne), ses *al-Naṣāʾiḥ al-Dīniyya wa al-Waṣāyā
      al-Īmāniyya* (suite d'exhortations spirituelles), et son
      *Wird al-Imām al-Ḥaddād* quotidien (litanie coranique et
      prophétique toujours récitée chaque aube et chaque
      crépuscule au Hadhramaout et dans la diaspora ḥaḍramī)
      forment ensemble le corpus le plus diffusé de formation
      pratique soufie sunnite-shāfiʿīte produit par le monde
      arabe du début de l'époque moderne. Il fut enseveli au
      cimetière Zanbal de Tarīm, aux côtés de la longue lignée
      Bā ʿAlawī qui va de al-Muhājir, en passant par le Faqīh
      al-Muqaddam, al-Saqqāf et al-Muḥdar, jusqu'à lui.
