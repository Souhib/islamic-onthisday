  # =========================================================================
  # ʿABD AL-RAḤMĀN AL-SAQQĀF — Ḥaḍramī Sufi master, Tarīm
  # =========================================================================

  - slug: death-of-abd-al-rahman-al-saqqaf
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān al-Saqqāf — Bā ʿAlawī Master of Tarīm
    title_ar: وفاة عبد الرحمن السقّاف — شيخ بني علوي بتَريم
    title_fr: Mort de ʿAbd al-Raḥmān al-Saqqāf — maître Bā ʿAlawī de Tarīm
    description_en: |
      ʿAbd al-Raḥmān ibn Muḥammad ibn ʿAlī Bā ʿAlawī al-Saqqāf —
      Sunni-Shāfiʿī faqīh, Sufi master of the Bā ʿAlawī line of
      Tarīm in Hadhramaut, and the figure whose epithet *al-Saqqāf*
      ("the rooftop one"), reportedly given because he stood
      above his peers as a roof stands above a house, would
      become the most-cited surname of the Hadhrami sayyid
      diaspora — died at Tarīm in 819 AH (~1416 CE). A
      seventh-generation descendant of Faqīh al-Muqaddam through
      the Bā ʿAlawī line, he is one of the central figures in
      the Tarīm Sufi-Shāfiʿī lineage; his student-circle and
      his sons (notably ʿUmar al-Muḥdar, the next entry in this
      file) carried the Bā ʿAlawī formation forward into the
      ninth Hijri century, and the Saqqāf branch he founded
      remains today the most numerically substantial of the
      sayyid families of Hadhramaut and the Hadhrami Indian
      Ocean diaspora. He was buried in the Zanbal cemetery of
      Tarīm, the burial ground of the Bā ʿAlawī masters that
      remains a major site of Hadhrami religious memory.
    description_ar: |
      توفي عبد الرحمن بن محمد بن علي باعلوي السقّاف — فقيه
      شافعي سني وشيخ تصوّف من بني علوي بتَريم بحضرموت،
      والشخصية التي صار لقبها «السقّاف» — الذي يُذكَر أنه
      أُطلِق عليه لتسامُيه فوق أقرانه كما يَسموقَفُ السقفُ
      على البيت — أكثر الألقاب ذكراً في مهجر السادة الحضارمة
      — بتَريم سنة ٨١٩ هـ (~١٤١٦ م). وهو من ذرّية الفقيه
      المقدّم في الجيل السابع عبر سلسلة بني علوي، وأحد المحاور
      الكبرى في سلسلة تَريم الصوفية الشافعية؛ وحَمَل أبناؤه
      (لا سيما عمر المحضار التالي ذِكره في هذا الملف) وحَلْقَتُه
      التربيةَ العَلَويةَ إلى القرن التاسع الهجري، وما زال
      الفرعُ السقّافيُّ الذي أنشأه أكثرَ بيوتات السادة عدداً
      في حضرموت وفي مهجر الحضارمة الهندي حتى اليوم. ودُفن في
      مقبرة زنبل بتَريم، مقبرة شيوخ بني علوي التي ما زالت
      موضعاً عظيماً من مواضع الذاكرة الدينية الحضرمية.
    description_fr: |
      ʿAbd al-Raḥmān ibn Muḥammad ibn ʿAlī Bā ʿAlawī al-Saqqāf —
      faqīh sunnite-shāfiʿīte, maître soufi de la lignée Bā
      ʿAlawī de Tarīm au Hadhramaout, et figure dont l'épithète
      *al-Saqqāf* (« celui du toit »), donnée, selon la tradition,
      parce qu'il s'élevait au-dessus de ses pairs comme un toit
      domine une maison, deviendrait le nom de famille le plus
      cité de la diaspora sayyide ḥaḍramī — mourut à Tarīm en
      819 H (~1416 EC). Descendant à la septième génération du
      Faqīh al-Muqaddam par la lignée Bā ʿAlawī, il est l'une
      des figures centrales de la lignée soufie-shāfiʿīte de
      Tarīm ; son cercle d'élèves et ses fils (notamment ʿUmar
      al-Muḥdar, l'entrée suivante de ce fichier) portèrent la
      formation Bā ʿAlawī dans le neuvième siècle hégirien, et
      la branche Saqqāf qu'il fonda demeure aujourd'hui la plus
      nombreuse des familles sayyides du Hadhramaout et de la
      diaspora ḥaḍramī de l'océan Indien. Il fut enseveli au
      cimetière Zanbal de Tarīm, lieu de sépulture des maîtres
      Bā ʿAlawī, qui demeure un haut lieu de la mémoire
      religieuse ḥaḍramī.
    canonical_hijri: {year: 819, precision: year}
    canonical_gregorian: {date: 1416-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death year 819 AH at Tarīm; founder of the Saqqāf branch of Bā ʿAlawī sayyids."
      - source_key: editorial
        notes: "Burial in Zanbal cemetery of Tarīm; transmitter of the Bā ʿAlawī Sufi-Shāfiʿī chain."
    people: [[abd-al-rahman-al-saqqaf, died]]
