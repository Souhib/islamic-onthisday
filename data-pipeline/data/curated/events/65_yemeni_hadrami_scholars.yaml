  # =========================================================================
  # SULAYMĀN AL-AHDAL — Zabīd muḥaddith
  # =========================================================================

  - slug: death-of-sulayman-al-ahdal
    category: scholar_death
    title_en: Death of Sulaymān al-Ahdal — Zabīd Muḥaddith
    title_ar: وفاة سليمان الأهدل — محدّث زَبيد
    title_fr: Mort de Sulaymān al-Ahdal — muḥaddith de Zabīd
    description_en: |
      Sulaymān ibn Yaḥyā ibn ʿUmar al-Ahdal — Sunni Shāfiʿī
      muḥaddith of Zabīd in the Tihāma plain of Yemen, of the
      Ahdal sayyid family that constituted, alongside the
      al-Mizjājī line, the principal hadith-transmitting house
      of Tihāma in the eleventh and twelfth centuries Hijri —
      died at Zabīd in 1197 AH (~1782 CE). The Ahdal hadith
      circle of Zabīd was in this period the principal node by
      which the Yemen-Indian-Hijazi-Maghrebi *isnād* of Sunni
      hadith transmission passed: students of Sulaymān al-Ahdal
      and his contemporaries Murtaḍa al-Zabīdī (d. 1205 AH,
      author of *Tāj al-ʿArūs* and *Itḥāf al-Sāda al-Muttaqīn*),
      Muḥammad Ḥayāt al-Sindī, and the Madanī muḥaddithūn of
      the period passed the Yemeni-Madanī chains forward to
      Shāh Walī Allāh in India and to the West African revivers,
      making Zabīd in this era one of the most important
      Sunni hadith centres of the Indian Ocean rim.
    description_ar: |
      توفي سليمان بن يحيى بن عمر الأهدل — محدّث شافعي سني
      بزَبيد بتِهامة اليمن، من بيت الأهدل السيادي الذي صار
      مع آل المزجاجي البيتَ الرئيس لرواية الحديث بتِهامة في
      القرنين الحادي عشر والثاني عشر الهجريين — بزَبيد سنة
      ١١٩٧ هـ (~١٧٨٢ م). وكانت حلقة الأهدل بزَبيد في هذا
      العصر العقدةَ الرئيسة التي عبرها مرّت الأسانيدُ
      اليمنية-الهندية-الحجازية-المغربية للحديث السني: تلاميذ
      سليمان الأهدل ومُعاصِريه — مرتضى الزبيدي (ت ١٢٠٥ هـ
      صاحب «تاج العروس» و«إتحاف السادة المتقين»)، ومحمد
      حياة السندي، ومحدّثو المدينة في زمانهم — حملوا
      الأسانيد اليمنية-المدنية إلى شاه ولي الله الدهلوي
      بالهند وإلى مُحيي حركات إفريقيا الغربية، فصارت زَبيد
      في هذا العصر من أهمّ مَنازل الحديث السنية في حواشي
      المحيط الهندي.
    description_fr: |
      Sulaymān ibn Yaḥyā ibn ʿUmar al-Ahdal — muḥaddith
      sunnite-shāfiʿīte de Zabīd dans la plaine de la Tihāma
      au Yémen, de la famille sayyide al-Ahdal qui constituait,
      aux côtés de la lignée al-Mizjājī, la principale maison
      de transmission hadithique de la Tihāma aux onzième et
      douzième siècles hégiriens — mourut à Zabīd en 1197 H
      (~1782 EC). Le cercle hadithique des Ahdal à Zabīd fut,
      à cette époque, le principal nœud par lequel passa
      l'*isnād* yéméno-indo-ḥijāzī-maghrébin de la transmission
      hadithique sunnite : les élèves de Sulaymān al-Ahdal et
      de ses contemporains — Murtaḍa al-Zabīdī (m. 1205 H,
      auteur du *Tāj al-ʿArūs* et de l'*Itḥāf al-Sāda
      al-Muttaqīn*), Muḥammad Ḥayāt al-Sindī, et les muḥaddithūn
      de Médine de cette génération — transmirent les chaînes
      yéméno-médinoises à Shāh Walī Allāh en Inde et aux
      revivificateurs d'Afrique de l'Ouest, faisant de Zabīd,
      à cette époque, l'un des centres hadithiques sunnites
      les plus importants de la lisière de l'océan Indien.
    canonical_hijri: {year: 1197, precision: year}
    canonical_gregorian: {date: 1782-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death year 1197 AH at Zabīd; principal Yemeni hadith node of the late 12th century AH."
    people: [[sulayman-al-ahdal, died]]
