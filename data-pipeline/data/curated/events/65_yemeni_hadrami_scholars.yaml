  # =========================================================================
  # FAQĪH AL-MUQADDAM — founder of the Bā ʿAlawī Sufi line
  # =========================================================================

  - slug: death-of-faqih-al-muqaddam
    category: scholar_death
    title_en: Death of Faqīh al-Muqaddam — Founder of the Bā ʿAlawī Sufi Line
    title_ar: وفاة الفقيه المقدّم — مؤسّس الطريقة العَلَوية بحضرموت
    title_fr: Mort du Faqīh al-Muqaddam — fondateur de la voie soufie Bā ʿAlawī
    description_en: |
      Muḥammad ibn ʿAlī Bā ʿAlawī, called *al-Faqīh al-Muqaddam*
      ("the foremost jurist"), Sunni-Shāfiʿī faqīh and Sufi
      master of Tarīm in Hadhramaut and the man traditionally
      credited with founding the distinctive Bā ʿAlawī ṭarīqa —
      a Ḥaḍramī Sunni Sufi line that synthesises Shāfiʿī fiqh,
      Ashʿarī ʿaqīda, and a Ghazālian ethical-Sufi formation
      transmitted through the chain of Abū Madyan al-Maghribī
      and onward — died at Tarīm in 653 AH (~1255 CE). The
      sayyid descendant of Aḥmad al-Muhājir, he is the figure
      from whom every later Bā ʿAlawī master traces their *isnād*
      of the path: ʿAbd al-Raḥmān al-Saqqāf, ʿUmar al-Muḥdar,
      Aḥmad ibn ʿĪd al-Ḥabashī, and ultimately ʿAbd Allāh
      al-Ḥaddād all sit downstream from him in the Tarīm Sufi
      lineage. Tradition reports that he received the formal
      *khirqa* from Abū Madyan's chain via Maghribī travellers
      and codified for Hadhramaut a sober, sharīʿa-bound Sufi
      practice that has remained the dominant religious idiom
      of Hadhramaut and the Hadhrami diaspora across the Indian
      Ocean for the eight centuries since.
    description_ar: |
      توفي محمد بن علي باعلوي الملقّب بـ«الفقيه المقدّم» — فقيه
      شافعي سني وشيخ تصوف بتَريم بحضرموت، والذي يُعدّ في
      التراث المؤسسَ للطريقة العَلَوية الحضرمية المتميزة — وهي
      طريقة سنية صوفية تجمع بين فقه الشافعية وعقيدة الأشاعرة
      وتربية صوفية أخلاقية على نَهج الإمام الغزالي تتصل أسانيدها
      بسلسلة الشيخ أبي مدين المغربي وما فوقها — بتَريم سنة ٦٥٣
      هـ (~١٢٥٥ م). وهو الحفيد الحُسَيني السيّد لأحمد بن عيسى
      المهاجر، وإليه ينتهي كل ما بعده من شيوخ بني علوي بأسانيد
      الطريق: عبد الرحمن السقاف، وعمر المُحضار، وأحمد بن عيد
      الحبشي، وعبد الله الحدّاد كلهم من ذرّيّته أو من تلامذة
      تلامذته في سلسلة تَريم الصوفية. وتذكر التراجم أنه أخذ
      الخرقة الرسمية من سلسلة أبي مدين بواسطة رحّالة مغاربة،
      وقعّد لحضرموت ممارسةً صوفية مَهديّةً ملتزمةً بالشريعة، صارت
      منذ ثمانية قرون اللغةَ الدينية المهيمنة على حضرموت
      وعلى مهجر الحضارمة في حواشي المحيط الهندي.
    description_fr: |
      Muḥammad ibn ʿAlī Bā ʿAlawī, dit *al-Faqīh al-Muqaddam*
      (« le juriste prééminent »), faqīh sunnite-shāfiʿīte et
      maître soufi de Tarīm au Hadhramaout, et l'homme à qui la
      tradition attribue la fondation de la voie distinctive Bā
      ʿAlawī — une lignée soufie sunnite ḥaḍramī qui synthétise
      le fiqh shāfiʿīte, la ʿaqīda ashʿarite et une formation
      éthico-soufie d'esprit ghazālien transmise par la chaîne
      d'Abū Madyan al-Maghribī et au-delà — mourut à Tarīm en
      653 H (~1255 EC). Descendant sayyide d'Aḥmad al-Muhājir,
      il est la figure dont tout maître Bā ʿAlawī ultérieur
      retrace son *isnād* du chemin : ʿAbd al-Raḥmān al-Saqqāf,
      ʿUmar al-Muḥdar, Aḥmad ibn ʿĪd al-Ḥabashī et finalement
      ʿAbd Allāh al-Ḥaddād s'inscrivent tous en aval de lui
      dans la lignée soufie de Tarīm. La tradition rapporte
      qu'il reçut la *khirqa* formelle de la chaîne d'Abū Madyan
      par l'intermédiaire de voyageurs maghrébins, et qu'il
      codifia pour le Hadhramaout une pratique soufie sobre et
      attachée à la sharīʿa, demeurée depuis huit siècles
      l'idiome religieux dominant du Hadhramaout et de la
      diaspora ḥaḍramī à travers l'océan Indien.
    canonical_hijri: {year: 653, precision: year}
    canonical_gregorian: {date: 1255-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death year 653 AH at Tarīm; founder of Bā ʿAlawī ṭarīqa."
      - source_key: editorial
        notes: "Bā ʿAlawī genealogical-Sufi literature uniformly traces all later masters back to Faqīh al-Muqaddam."
