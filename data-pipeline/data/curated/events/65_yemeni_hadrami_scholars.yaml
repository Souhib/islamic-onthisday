  # =========================================================================
  # ʿUMAR AL-MUḤDAR — son of al-Saqqāf
  # =========================================================================

  - slug: death-of-umar-al-muhdar
    category: scholar_death
    title_en: Death of ʿUmar al-Muḥdar — Bā ʿAlawī Successor at Tarīm
    title_ar: وفاة عمر المُحضار — خَلَف بني علوي بتَريم
    title_fr: Mort de ʿUmar al-Muḥdar — successeur Bā ʿAlawī à Tarīm
    description_en: |
      ʿUmar ibn ʿAbd al-Raḥmān al-Saqqāf Bā ʿAlawī, called *al-
      Muḥdar* — Sunni-Shāfiʿī faqīh and Sufi master of Tarīm in
      Hadhramaut, the son and chief successor of ʿAbd al-Raḥmān
      al-Saqqāf, and the figure who carried the Bā ʿAlawī
      Shāfiʿī-Sufi formation forward into the ninth Hijri
      century — died at Tarīm in 833 AH (~1430 CE). His epithet
      *al-Muḥdar* ("the present, the attentive") was attached to
      him, the tradition reports, because he was unfailingly
      present at every gathering of dhikr and every juristic
      session held in Tarīm in his time. He was the formative
      teacher of the next generation of Bā ʿAlawī sayyids and
      his ḥalqa at Tarīm functioned as the principal seminary of
      Hadhramaut for the second quarter of the ninth Hijri
      century. He too was buried in the Zanbal cemetery of
      Tarīm, alongside his father and the broader Bā ʿAlawī
      lineage.
    description_ar: |
      توفي عمر بن عبد الرحمن السقّاف باعلوي الملقّب بـ«المُحضار»
      — فقيه شافعي سني وشيخ تصوف بتَريم بحضرموت، ابن عبد الرحمن
      السقّاف وخليفته الأكبر، الذي حَمَل التربية العَلَوية
      الشافعية الصوفية إلى القرن التاسع الهجري — بتَريم سنة
      ٨٣٣ هـ (~١٤٣٠ م). ولُقِّب بالمُحضار — كما تذكر التراجم —
      لأنه كان يَحضُر كلَّ مجلس ذكر وكلَّ مجلس فقه يُعقد بتَريم
      في زمانه ولا يتخلَّف عنه. وكان المربّيَ المؤسِّسَ للجيل
      التالي من سادة بني علوي، وكانت حلقته بتَريم الكُتّابَ
      الرئيسَ لحضرموت طوال الربع الثاني من القرن التاسع الهجري.
      ودُفن أيضاً في مقبرة زنبل بتَريم بجوار أبيه وفي ضريحٍ
      من ضريح أهل بيته الكِرام.
    description_fr: |
      ʿUmar ibn ʿAbd al-Raḥmān al-Saqqāf Bā ʿAlawī, dit
      *al-Muḥdar* — faqīh sunnite-shāfiʿīte et maître soufi de
      Tarīm au Hadhramaout, fils et principal successeur de
      ʿAbd al-Raḥmān al-Saqqāf, et figure qui porta la formation
      Bā ʿAlawī shāfiʿīte-soufie dans le neuvième siècle
      hégirien — mourut à Tarīm en 833 H (~1430 EC). Son
      épithète *al-Muḥdar* (« le présent, l'attentif ») lui fut
      donnée, selon la tradition, parce qu'il assistait
      invariablement à chaque assemblée de dhikr et chaque
      session juridique tenue à Tarīm de son temps. Il fut le
      maître formateur de la génération suivante de sayyids
      Bā ʿAlawī, et son ḥalqa à Tarīm fonctionna comme le
      principal séminaire du Hadhramaout durant le deuxième
      quart du neuvième siècle hégirien. Il fut, lui aussi,
      enseveli au cimetière Zanbal de Tarīm, aux côtés de son
      père et de la lignée Bā ʿAlawī.
