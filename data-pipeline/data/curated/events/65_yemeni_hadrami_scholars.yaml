        is_canonical: true
        notes: "Death year 893 AH in Yemen recorded in Shadharāt al-Dhahab."
      - source_key: ei2
        notes: "Sunni Shāfiʿī jurist-historian of Yemen; Bahjat al-Maḥāfil and al-Sulūk authoritative."
