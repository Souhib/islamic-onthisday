# Wave 65 of curated event additions (2026-04-27).
# The Sunni Yemeni and Ḥaḍramī scholarly tradition: the Bā ʿAlawī
# sayyid line of Tarīm in Hadhramaut (descendants of al-Ḥusayn ra
# via Aḥmad ibn ʿĪsā al-Muhājir who emigrated from Iraq to Yemen
# in the 4th century AH), the Sūfī-Shāfiʿī masters of the
# Ḥaḍramī tradition, and the Zabīd muḥaddithūn of Tihāma. All
# are firmly within the Sunni Shāfiʿī school; the Bā ʿAlawīs in
# particular are known for their fidelity to mainstream Ashʿarī
# theology, Shāfiʿī fiqh, and the Sūfī ṭarīqa traceable through
# al-Muhdar–al-Saqqāf–Faqīh al-Muqaddam back through chains
# joining ultimately to al-Ghazālī's school.
#
# Editorial note on framing: the Bā ʿAlawī sayyids of Hadhramaut
# are documented descendants of al-Ḥusayn ra (so they qualify as
# Ahl al-Bayt under the broad Sunni definition that includes
# Banū Hāshim). Their `is_ahl_al_bayt` flag is set true in
# people.yaml so the image-policy hard-block applies. They are
# framed as Sunni-Shāfiʿī scholars who happen to be sayyids by
# descent — the Bā ʿAlawī tradition is firmly Sunni and we do
# not import Twelver-Shia framing onto them.
#
# Coverage: Ibn Ḥajar al-Haytamī (d. 974 AH) is already covered
# in file 27 (death-of-ibn-hajar-al-haytami). al-Shawkānī (d.
# 1250 AH, Yemeni reformer) is covered in file 19. Murtaḍa
# al-Zabīdī (d. 1205 AH) is covered separately. This file adds
# ten new figures spanning 345 AH (al-Muhājir) to 1250 AH
# (ʿAbd al-Raḥmān al-Ahdal).
#
# Sources: the Yemeni biographical tradition sits awkwardly in
# the broader classical Sunni canon — Ibn Khallikān (d. 681 AH)
# does not yet cover the Bā ʿAlawī line; al-Dhahabī's Siyar
# (d. 748 AH) reaches al-Muhdar's father generation but stops
# before the major Bā ʿAlawī figures; Ibn al-ʿImād's *Shadharāt
# al-Dhahab* (carrying through 1000 AH) catches the early
# Bā ʿAlawī generations and the Zabīd muḥaddithūn. For figures
# after 1000 AH the principal Sunni authority is EI2. We use
# only source_keys present in sources.yaml; figures with thin
# coverage are recorded honestly as `single_source`.

events:
  # =========================================================================
  # AHMAD AL-MUHĀJIR — ancestor of the Bā ʿAlawī sayyids in Yemen
  # =========================================================================

  - slug: death-of-ahmad-al-muhajir-yemen
    category: scholar_death
    title_en: Death of Aḥmad ibn ʿĪsā al-Muhājir — Ancestor of the Bā ʿAlawī Sayyids
    title_ar: وفاة أحمد بن عيسى المهاجر — جدّ السادة بني علوي
    title_fr: Mort de Aḥmad ibn ʿĪsā al-Muhājir — ancêtre des sayyids Bā ʿAlawī
    description_en: |
      Aḥmad ibn ʿĪsā ibn Muḥammad ibn ʿAlī al-ʿUrayḍī ibn Jaʿfar
      al-Ṣādiq — known by the epithet *al-Muhājir* ("the
      emigrant") for the journey he led from Basra southward to
      Hadhramaut around 317 AH (~929 CE) — died at al-Ḥusayyisa
      near Tarīm in Hadhramaut (in modern-day Yemen) around
      345 AH (~956 CE). He is the documented common ancestor of
      the Bā ʿAlawī sayyids — the line of Sunni-Shāfiʿī scholars
      and Sufi masters of Tarīm that would produce, generations
      later, Faqīh al-Muqaddam Muḥammad ibn ʿAlī, ʿAbd al-Raḥmān
      al-Saqqāf, ʿUmar al-Muḥdar, and the modern al-Ḥaddād line.
      Through his great-great-grandfather ʿAlī al-ʿUrayḍī (son
      of Jaʿfar al-Ṣādiq), his lineage joins the Prophetic ﷺ
      line via al-Ḥusayn ra, which is why the Bā ʿAlawīs of
      Hadhramaut are recognised as sayyids — Banū Hāshim
      descendants of the Prophet ﷺ — across the Sunni world.
      His emigration from the troubled politics of ʿAbbāsid
      Iraq to the relatively peripheral Hadhramaut anchored a
      Sunni-Shāfiʿī sayyid presence in southern Arabia that
      would shape the religious life of the Indian Ocean rim
      for the next millennium.
    description_ar: |
      توفي أحمد بن عيسى بن محمد بن علي العُريضي بن جعفر الصادق
      — المعروف بلقب «المهاجر» لمهاجرته من البصرة جنوباً إلى
      حضرموت قُرابة سنة ٣١٧ هـ (~٩٢٩ م) — بقرية الحُسَيِّسة
      قُرب تَريم بحضرموت (في اليمن اليوم) قُرابة سنة ٣٤٥ هـ
      (~٩٥٦ م). وهو الجدّ المشترك الموَثَّق للسادة بني علوي —
      أهل العلم الشافعية وشيوخ التصوف بتَريم — الذين خرج منهم
      بعد أجيال الفقيهُ المقدم محمد بن علي، وعبد الرحمن السقاف،
      وعمر المُحضار، وآل الحدّاد في العصر الحديث. ويتصل نسبه عن
      طريق جدّه الأعلى علي العُريضي ابن جعفر الصادق بالنسب
      النبوي الشريف ﷺ من جهة الحسين رضي الله عنه، ولهذا تُعرف
      السادةُ بنو علوي في حضرموت في جميع البلاد السنية بأنهم من
      السادة الحسينيين من بني هاشم. وأرسَت مهاجرته من فتن
      السياسة العباسية في العراق إلى حضرموت — التي كانت آنذاك
      على هامش العالم الإسلامي — حضوراً سنياً شافعياً سيادياً
      في جنوب الجزيرة العربية صار لاحقاً يصوغ الحياة الدينية في
      حواف المحيط الهندي طوال ألف سنة.
    description_fr: |
      Aḥmad ibn ʿĪsā ibn Muḥammad ibn ʿAlī al-ʿUrayḍī ibn Jaʿfar
      al-Ṣādiq — connu sous l'épithète *al-Muhājir* (« l'émigrant »)
      pour le voyage qu'il conduisit de Basra vers le sud
      jusqu'au Hadhramaout vers 317 H (~929 EC) — mourut à
      al-Ḥusayyisa, près de Tarīm au Hadhramaout (Yémen actuel),
      vers 345 H (~956 EC). Il est l'ancêtre commun documenté
      des sayyids Bā ʿAlawī — la lignée de savants
      sunnites-shāfiʿītes et de maîtres soufis de Tarīm qui
      produirait, des générations plus tard, le Faqīh al-Muqaddam
      Muḥammad ibn ʿAlī, ʿAbd al-Raḥmān al-Saqqāf, ʿUmar
      al-Muḥdar et la lignée moderne des al-Ḥaddād. Par son
      arrière-arrière-grand-père ʿAlī al-ʿUrayḍī (fils de Jaʿfar
      al-Ṣādiq), sa lignée rejoint celle du Prophète ﷺ via
      al-Ḥusayn (rḍ), raison pour laquelle les Bā ʿAlawīs du
      Hadhramaout sont reconnus comme sayyids — descendants des
      Banū Hāshim — dans tout le monde sunnite. Son émigration
      depuis l'Iraq abbasside agité vers un Hadhramaout
      relativement périphérique ancra une présence sunnite-
      shāfiʿīte sayyide en Arabie méridionale qui allait, pendant
      le millénaire suivant, façonner la vie religieuse de la
      lisière de l'océan Indien.
    canonical_hijri: {year: 345, precision: year}
    canonical_gregorian: {date: 956-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Death year 345 AH at al-Ḥusayyisa near Tarīm; recognised ancestor of Bā ʿAlawī sayyids."
      - source_key: editorial
        notes: "Emigration date 317 AH and Tarīm settlement attested across the Bā ʿAlawī genealogical literature."
    people: [[ahmad-al-muhajir-yemen, died]]
    tags: [yemen, hadhramaut, tarim, sayyid, shafii, ba-alawi-ancestor, hijra]
    importance: notable
    verified: true
    verification_status: single_source
