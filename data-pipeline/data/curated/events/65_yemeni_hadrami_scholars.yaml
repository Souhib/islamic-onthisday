  # =========================================================================
  # IBN AL-DAYBĀʿ — Zabīd muḥaddith and historian of Yemen
  # =========================================================================

  - slug: death-of-ibn-al-daybaa
    category: scholar_death
    title_en: Death of Ibn al-Daybāʿ — Zabīd Muḥaddith and Historian of Yemen
    title_ar: وفاة ابن الديبع — محدّث زبيد ومؤرّخ اليمن
    title_fr: Mort d'Ibn al-Daybāʿ — muḥaddith de Zabīd et historien du Yémen
    description_en: |
      Wajīh al-Dīn ʿAbd al-Raḥmān ibn ʿAlī ibn Muḥammad al-
      Shaybānī al-Zabīdī, known as *Ibn al-Daybāʿ* — Sunni
      Shāfiʿī muḥaddith, mawlid composer, and historian of
      Zabīd in the Tihāma coastal plain of Yemen, then a major
      seat of Sunni hadith scholarship under the late Ṭāhirid
      and early Ottoman Yemeni periods — died at Zabīd in
      944 AH (~1537 CE). His prose-and-verse *Mawlid* (the
      *Mawlid al-Daybāʿ*) became, alongside the *Mawlid* of
      al-Barzanjī, the most-recited Sunni mawlid text across
      Yemen, the Hadhrami diaspora, and South-East Asia. His
      historical works — *Bughyat al-Mustafīd fī Akhbār Madīnat
      Zabīd*, *Qurrat al-ʿUyūn fī Akhbār al-Yaman al-Maymūn*,
      and *al-Faḍl al-Mazīd ʿalā Bughyat al-Mustafīd* — are the
      principal narrative sources for the political and
      scholarly history of Yemen from the late Rasūlid through
      the Ṭāhirid period and the first Ottoman conquest.
    description_ar: |
      توفي وجيه الدين عبد الرحمن بن علي بن محمد الشيباني
      الزبيدي المعروف بـ«ابن الديبع» — محدّث شافعي سني،
      وناظمُ مَولد، ومؤرخُ زَبيد بتِهامة اليمن، وكانت زَبيد
      حينئذٍ مِن أعظم مَنازل علم الحديث السني في عصر الدولة
      الطاهرية المتأخرة وأوائل العصر العثماني باليمن — بزَبيد
      سنة ٩٤٤ هـ (~١٥٣٧ م). وصارت قصيدته في المولد النبوي —
      «مولد الديبع» — مع «مولد البرزنجي» أكثرَ نصوص المولد
      السنية إنشاداً في اليمن وفي مهجر الحضارمة وفي أرخبيل
      جنوب شرق آسيا. وكتبه التاريخية: «بُغية المستفيد في
      أخبار مدينة زَبيد»، و«قُرّة العيون في أخبار اليمن
      الميمون»، و«الفضل المزيد على بُغية المستفيد» — هي
      المصادر الرئيسة لتاريخ اليمن السياسي والعلمي مِن أواخر
      الدولة الرسولية مروراً بالطاهرية إلى الفتح العثماني الأول.
    description_fr: |
      Wajīh al-Dīn ʿAbd al-Raḥmān ibn ʿAlī ibn Muḥammad al-
      Shaybānī al-Zabīdī, dit *Ibn al-Daybāʿ* — muḥaddith
      sunnite-shāfiʿīte, compositeur de mawlid et historien de
      Zabīd dans la plaine côtière de la Tihāma au Yémen, alors
      grand siège de l'érudition hadithique sunnite sous la fin
      des Ṭāhirides et le début de la période ottomane — mourut
      à Zabīd en 944 H (~1537 EC). Son *Mawlid* en prose et
      vers (*Mawlid al-Daybāʿ*) devint, aux côtés du *Mawlid*
      d'al-Barzanjī, le texte de mawlid sunnite le plus récité
      au Yémen, dans la diaspora ḥaḍramī et en Asie du Sud-Est.
      Ses ouvrages historiques — *Bughyat al-Mustafīd fī Akhbār
      Madīnat Zabīd*, *Qurrat al-ʿUyūn fī Akhbār al-Yaman
      al-Maymūn* et *al-Faḍl al-Mazīd ʿalā Bughyat al-Mustafīd*
      — sont les principales sources narratives pour l'histoire
      politique et savante du Yémen depuis la fin des Rasūlides,
      en passant par les Ṭāhirides, jusqu'à la première conquête
      ottomane.
    canonical_hijri: {year: 944, precision: year}
    canonical_gregorian: {date: 1537-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
        notes: "Death year 944 AH at Zabīd recorded in Shadharāt al-Dhahab."
      - source_key: ei2
        notes: "Bughyat al-Mustafīd and Mawlid al-Daybāʿ standard references in Yemen and the Hadhrami world."
    people: [[ibn-al-daybaa, died]]
