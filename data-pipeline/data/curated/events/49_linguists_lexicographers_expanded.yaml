  - slug: death-of-al-asmai
    category: scholar_death
    title_en: Death of al-Aṣmaʿī — Master of Arabic Lexicography and Pre-Islamic Poetry
    title_ar: وفاة الأصمعيِّ — إمامُ اللغة والشعر الجاهلي
    title_fr: Mort d'al-Aṣmaʿī — maître de la lexicographie arabe et de la poésie préislamique
    description_en: |
      Abū Saʿīd ʿAbd al-Malik ibn Qurayb al-Aṣmaʿī al-Bāhilī —
      most-cited transmitter of the dīwāns of pre-Islamic and
      early Islamic Arabic poetry, lexicographer, and central
      authority for later philologists who quote him as *qāla
      al-Aṣmaʿī* — died at Baṣra in 213 AH (828 CE). His treatises
      on the horse (*Kitāb al-Khayl*), the camel (*Kitāb al-Ibil*),
      the date palm (*Kitāb al-Nakhl*), and human anatomy
      (*Kitāb Khalq al-Insān*) lie at the foundation of Arabic
      lexicography's *kutub al-mawḍūʿāt* tradition; the redacted
      poetic anthology *al-Aṣmaʿiyyāt* preserves sixty-six pre-
      Islamic and Mukhaḍram odes. Ibn Khallikān gives 213 AH at
      Baṣra as the standard report; al-Dhahabī reports the same
      year in *Tārīkh al-Islām*, while noting alternative dates
      of 215 or 216 AH from minority transmitters.
    description_ar: |
      توفي أبو سعيد عبد الملك بن قريب الأصمعيُّ الباهليُّ — أرفعُ
      رواةِ دواوين الشعر الجاهلي وصدر الإسلام، ومن أئمة اللغة،
      ومرجعُ مَن جاء بعده من اللغويين بقولهم «قال الأصمعي» —
      بالبصرة سنة ثلاث عشرة ومئتين للهجرة (الموافق ٨٢٨ م).
      وفي كتبه عن «الخيل» و«الإبل» و«النخل» و«خلق الإنسان»
      أصلُ تقاليد «كتب الموضوعات» في علم العربية؛ وفي مجموعه
      «الأصمعيّات» ستٌّ وستون قصيدةً جاهليةً ومخضرَمة. أثبت ابن
      خلكان وفاتَه سنة ٢١٣ بالبصرة، وعليه الذهبيُّ في «تاريخ
      الإسلام»، وذكر بعضُ الرواة سنة ٢١٥ أو ٢١٦.
    description_fr: |
      Abū Saʿīd ʿAbd al-Malik ibn Qurayb al-Aṣmaʿī al-Bāhilī —
      transmetteur le plus cité des dīwāns de la poésie arabe
      préislamique et du début de l'islam, lexicographe et
      autorité centrale des philologues postérieurs qui le citent
      par *qāla al-Aṣmaʿī* — mourut à Baṣra en 213 H (828 EC).
      Ses traités sur le cheval (*Kitāb al-Khayl*), le chameau
      (*Kitāb al-Ibil*), le palmier-dattier (*Kitāb al-Nakhl*)
      et l'anatomie humaine (*Kitāb Khalq al-Insān*) fondent la
      tradition lexicographique des *kutub al-mawḍūʿāt* ;
      l'anthologie poétique *al-Aṣmaʿiyyāt* préserve soixante-six
      odes préislamiques et mukhaḍram. Ibn Khallikān donne 213 H
      à Baṣra comme date standard ; al-Dhahabī confirme dans
      *Tārīkh al-Islām*, tout en signalant les dates alternatives
      de 215 ou 216 H rapportées par une minorité.
    canonical_hijri: {year: 213, precision: year}
    canonical_gregorian: {date: 828-01-01, precision: year, method: tabular_conversion}
