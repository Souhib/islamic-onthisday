  - slug: death-of-ibn-hisham-al-ansari-al-nahwi
    category: scholar_death
    title_en: Death of Ibn Hishām al-Anṣārī — Author of *Mughnī al-Labīb*
    title_ar: وفاة ابن هشام الأنصاريِّ النحويِّ — صاحب «مغني اللبيب»
    title_fr: Mort d'Ibn Hishām al-Anṣārī — auteur de *Mughnī al-Labīb*
    description_en: |
      Jamāl al-Dīn Abū Muḥammad ʿAbd Allāh ibn Yūsuf ibn Hishām
      al-Anṣārī al-Miṣrī — Mamlūk-era Cairene grammarian whose
      teaching in Cairo eclipsed all his contemporaries and whose
      analytical synthesis Ibn Khaldūn would later compare to
      Sībawayh's — died at Cairo on 5 Dhū al-Qaʿda 761 AH (16
      September 1360 CE). His *Mughnī al-Labīb ʿan Kutub al-
      Aʿārīb*, organised by the function of grammatical particles
      (ḥurūf), abandons the inherited word-class taxonomy in
      favour of an analytical treatment of how each particle
      governs syntax; with his *Awḍaḥ al-Masālik* on the *Alfiyya*
      of Ibn Mālik, *Qaṭr al-Nadā*, and *Shudhūr al-Dhahab*, it
      formed the core late-Mamlūk grammatical curriculum and
      remains a standard university text. Ibn Kathīr's *Bidāya*
      gives the precise day and place; al-Dhahabī's continuators
      and EI2 corroborate.
    description_ar: |
      توفي جمالُ الدين أبو محمد عبد الله بن يوسف بن هشام
      الأنصاريُّ المصريُّ — نحويُّ القاهرة في العصر المملوكي،
      الذي طبَّق صيتُ تدريسه على معاصريه وجعل ابنُ خلدون يقارن
      تحليلَه التركيبيَّ بسيبويه — بالقاهرة في الخامس من ذي
      القعدة سنة إحدى وستين وسبعمئة للهجرة (الموافق ١٦ سبتمبر
      ١٣٦٠ م). و«مغني اللبيب عن كتب الأعاريب» نظَّمه على
      الحروف لا على أبواب الأقسام التقليدية، فصار معالجةً
      تحليليةً لكلِّ حرفٍ بحسب عمله في التركيب؛ ومع «أوضح
      المسالك» شرحه على ألفية ابن مالك، و«قطر الندى»، و«شذور
      الذهب»، شكَّل قلبَ منهج النحو في أواخر العصر المملوكي،
      وما يزال متناً جامعياً معتمَداً. ضبط ابن كثير في «البداية»
      اليومَ والمكان؛ وأكَّد ذلك متابعو الذهبيِّ والموسوعةُ
      الإسلامية الثانية.
    description_fr: |
      Jamāl al-Dīn Abū Muḥammad ʿAbd Allāh ibn Yūsuf ibn Hishām
      al-Anṣārī al-Miṣrī — grammairien cairote de l'époque
      mamlūke dont l'enseignement au Caire éclipsa tous ses
      contemporains et dont Ibn Khaldūn comparera plus tard la
      synthèse analytique à celle de Sībawayh — mourut au Caire
      le 5 Dhū al-Qaʿda 761 H (16 septembre 1360 EC). Son
      *Mughnī al-Labīb ʿan Kutub al-Aʿārīb*, organisé selon la
      fonction des particules grammaticales (ḥurūf), abandonne
      la taxonomie héritée des classes de mots au profit d'un
      traitement analytique de la régence syntaxique de chaque
      particule ; avec son *Awḍaḥ al-Masālik* sur l'*Alfiyya*
      d'Ibn Mālik, son *Qaṭr al-Nadā* et son *Shudhūr al-Dhahab*,
      il forma le noyau du curriculum grammatical de la fin de
      l'époque mamlūke et reste un manuel universitaire standard.
      La *Bidāya* d'Ibn Kathīr donne précisément le jour et le
      lieu ; les continuateurs d'al-Dhahabī et l'EI2 corroborent.
    canonical_hijri: {year: 761, month: 11, day: 5, precision: day}
    canonical_gregorian: {date: 1360-09-16, precision: day, method: attested}
