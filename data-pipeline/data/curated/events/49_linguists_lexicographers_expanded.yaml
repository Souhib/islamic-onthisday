  - slug: death-of-ibn-jinni
    category: scholar_death
    title_en: Death of Ibn Jinnī — Author of *al-Khaṣāʾiṣ*
    title_ar: وفاة ابن جنِّي — صاحب «الخصائص»
    title_fr: Mort d'Ibn Jinnī — auteur d'*al-Khaṣāʾiṣ*
    description_en: |
      Abū al-Fatḥ ʿUthmān ibn Jinnī al-Mawṣilī — student and
      closest collaborator of the great poet-philologist Abū al-
      Ṭayyib al-Mutanabbī, and the most theoretical Arabic
      grammarian of the classical age — died at Baghdad on Friday
      27 Ṣafar 392 AH (15 January 1002 CE). His *al-Khaṣāʾiṣ*
      raises Arabic grammatical theory from the descriptive level
      of Sībawayh's *Kitāb* to a systematic philosophy of language,
      treating root-derivation, etymology by phonetic resemblance
      (*al-ishtiqāq al-akbar*), the conventionality versus
      naturalness of language, and the underlying causes (*ʿilal*)
      of grammatical rules; his *Sirr Ṣināʿat al-Iʿrāb* and his
      commentaries on al-Mutanabbī are equally seminal. Ibn
      Khallikān fixes the day; al-Dhahabī gives a near-equivalent
      notice in *Siyar Aʿlām al-Nubalāʾ*.
    description_ar: |
      توفي أبو الفتح عثمان بن جنّي الموصليُّ — تلميذُ أبي الطيب
      المتنبّي وصاحبُه الألصق به، وأكثرُ نحاة العصر الكلاسيكي
      نظرية — ببغداد ليلة الجمعة السابع والعشرين من صفر سنة
      اثنتين وتسعين وثلاثمئة للهجرة (الموافق ١٥ يناير ١٠٠٢ م).
      وفي «الخصائص» نقل النظرَ النحوي العربي من مستوى وصف
      الظواهر في «كتاب» سيبويه إلى فلسفةٍ منظَّمة للغة، باحثاً
      في اشتقاق الجذور والاشتقاق الأكبر بالقرابة الصوتية،
      وفي مسألة التواضع وأصل اللغة، وفي علل النحو؛ ولكتابه
      «سرّ صناعة الإعراب» وشروحه على المتنبّي مكانةٌ مماثلة.
      ضبط ابنُ خلكان يومَ وفاته؛ وأَلمَّ به الذهبيُّ في «سير
      أعلام النبلاء» إلماماً قريباً منه.
    description_fr: |
      Abū al-Fatḥ ʿUthmān ibn Jinnī al-Mawṣilī — disciple et
      collaborateur le plus proche du grand poète-philologue
      al-Mutanabbī, et le plus théoricien des grammairiens arabes
      de l'époque classique — mourut à Bagdad le vendredi 27
      Ṣafar 392 H (15 janvier 1002 EC). Son *al-Khaṣāʾiṣ* élève
      la théorie grammaticale arabe du niveau descriptif du
      *Kitāb* de Sībawayh à une philosophie systématique du
      langage, traitant de la dérivation des racines, de
      l'étymologie par ressemblance phonétique (*al-ishtiqāq
      al-akbar*), de la conventionalité ou naturalité de la
      langue, et des causes (*ʿilal*) des règles grammaticales ;
      son *Sirr Ṣināʿat al-Iʿrāb* et ses commentaires d'al-
      Mutanabbī sont également séminaux. Ibn Khallikān fixe le
      jour ; al-Dhahabī donne une notice quasi équivalente dans
      *Siyar Aʿlām al-Nubalāʾ*.
    canonical_hijri: {year: 392, month: 2, day: 27, precision: day}
