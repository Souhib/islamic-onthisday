  - slug: death-of-al-jawhari-al-sihah
    category: scholar_death
    title_en: Death of al-Jawharī — Author of *al-Ṣiḥāḥ*
    title_ar: وفاة الجوهريِّ — صاحب «الصحاح»
    title_fr: Mort d'al-Jawharī — auteur d'*al-Ṣiḥāḥ*
    description_en: |
      Abū Naṣr Ismāʿīl ibn Ḥammād al-Jawharī al-Fārābī — Turkic-
      Khurāsānian lexicographer who travelled deep into the Arabian
      Peninsula to learn Arabic from the Bedouin firsthand before
      settling at Nīsābūr — died at Nīsābūr around 393 AH (1003 CE),
      reportedly after falling from the roof of the Old Mosque
      while attempting an experimental flight. His *Tāj al-Lugha
      wa-Ṣiḥāḥ al-ʿArabīya*, known simply as *al-Ṣiḥāḥ*, abandoned
      the phonetic order of al-Khalīl and the root-permutation
      order of Ibn Durayd in favour of the alphabetical-by-rhyme
      order (entries arranged by the last consonant of the root,
      then by the first), an organisation that became standard
      for centuries and underlies al-Fīrūzābādī's *Qāmūs* and
      al-Zabīdī's *Tāj al-ʿArūs*. Sources disagree on the exact
      death year (some give 398 or 400 AH); we follow Ibn Khallikān
      and al-Dhahabī's preferred date of c.393 AH and flag the
      uncertainty.
    description_ar: |
      توفي أبو نصر إسماعيل بن حمّاد الجوهريُّ الفارابيُّ —
      لغويٌّ تركيٌّ خراسانيٌّ توغَّل في جزيرة العرب يأخذ اللسانَ
      عن الأعراب مشافهةً قبل أن يستقرَّ بنيسابور — بنيسابور
      نحو سنة ثلاث وتسعين وثلاثمئة للهجرة (الموافق ١٠٠٣ م)،
      على ما رُوي من سقوطه من سطح الجامع الأقدم في تجربة طيرانٍ
      لم تكتمل. و«تاج اللغة وصحاح العربية» المعروف بـ«الصحاح»
      ترك فيه ترتيبَ الخليل الصوتي وترتيبَ ابن دريد على
      التقاليب، واختار ترتيبَ القافية (الباب الآخر من الجذر،
      ثم فصل أوله)، فصار هذا الترتيبُ هو السائدَ قروناً، وعليه
      بنى الفيروزآباديُّ «القاموسَ» والزَّبيديُّ «تاجَ العروس».
      اختلفت الرواياتُ في سنة وفاته، وقيل ٣٩٨ أو ٤٠٠؛ ونحن
      نتبع ما رجَّحه ابن خلكان والذهبيُّ من نحو سنة ٣٩٣ هـ،
      ونُنبِّه على ما في الباب من خلاف.
    description_fr: |
      Abū Naṣr Ismāʿīl ibn Ḥammād al-Jawharī al-Fārābī —
      lexicographe turc-khurāsānien qui s'enfonça dans la péninsule
      Arabique pour apprendre l'arabe directement auprès des
      Bédouins avant de s'établir à Nīsābūr — mourut à Nīsābūr
      vers 393 H (1003 EC), selon la tradition après une chute
      du toit de la Vieille Mosquée lors d'une tentative de vol
      expérimental. Son *Tāj al-Lugha wa-Ṣiḥāḥ al-ʿArabīya*,
      connu simplement comme *al-Ṣiḥāḥ*, abandonna l'ordre
      phonétique d'al-Khalīl et l'ordre des permutations d'Ibn
      Durayd au profit de l'ordre alphabétique-par-rime (entrées
      classées par la dernière consonne de la racine, puis par
      la première), organisation qui devint standard pendant
      des siècles et qui sous-tend le *Qāmūs* d'al-Fīrūzābādī
      et le *Tāj al-ʿArūs* d'al-Zabīdī. Les sources divergent
      sur l'année exacte (certaines donnent 398 ou 400 H) ;
      nous retenons la date privilégiée par Ibn Khallikān et
      al-Dhahabī, vers 393 H, et signalons l'incertitude.
    canonical_hijri: {year: 393, precision: year}
    canonical_gregorian: {date: 1003-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated c. 393 AH at Nīsābūr; alternative reports 398 / 400 AH noted."
      - source_key: dhahabi_siyar
        notes: "Notice in Siyar; date uncertainty acknowledged."
      - source_key: ei2
    people: [[al-jawhari-lexicographer, died]]
    tags: [abbasid, scholar, linguist, lexicographer, nishapur, sihah]
    importance: notable
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date
    source_url: "https://en.wikipedia.org/wiki/Al-Jawhari"

  - slug: death-of-ibn-sida-al-andalusi
    category: scholar_death
    title_en: Death of Ibn Sīda al-Andalusī — Author of *al-Muḥkam*
    title_ar: وفاة ابن سِيدَه الأندلسيِّ — صاحب «المحكم»
    title_fr: Mort d'Ibn Sīda al-Andalusī — auteur d'*al-Muḥkam*
    description_en: |
      Abū al-Ḥasan ʿAlī ibn Ismāʿīl ibn Sīda al-Mursī al-Andalusī
      — blind lexicographer of Mursiya (Murcia) and Dāniya (Denia)
      under the Mujāhidid amīrs of post-caliphal al-Andalus, who
      compiled the largest Andalusī Arabic dictionary — died at
      Dāniya on 25 Rabīʿ II 458 AH (25 March 1066 CE). His *al-
      Muḥkam wa-l-Muḥīṭ al-Aʿẓam*, in seventeen volumes, follows
      al-Khalīl's phonetic order and consciously aims to surpass
      the *Tahdhīb* of al-Azharī by integrating Andalusī, Maghribī,
      and Mashriqī lexical material; his thematically-organised
      *al-Mukhaṣṣaṣ*, in seventeen volumes, is the largest Arabic
      lexicon-by-subject ever compiled and remained a primary
      onomasiological reference into the modern era. Ibn Khallikān
      gives the day and place; al-Dhahabī confirms in *Tārīkh
      al-Islām*.
    description_ar: |
      توفي أبو الحسن علي بن إسماعيل بن سِيدَه المُرسيُّ الأندلسيُّ
      — لغويُّ مُرسية ودانية الأعمى في عصر المجاهدين أمراء
      الأندلس بعد سقوط الخلافة، وصاحبُ أكبر معاجم العربية
      الأندلسية — بدانية في الخامس والعشرين من ربيع الآخر سنة
      ثمانٍ وخمسين وأربعمئة للهجرة (الموافق ٢٥ مارس ١٠٦٦ م).
      وفي «المحكم والمحيط الأعظم» في سبعة عشر مجلداً اتَّبع
      ترتيبَ الخليل الصوتي، واعياً سعيُه إلى تجاوز «تهذيب»
      الأزهري بدمجه المادةَ المعجميةَ الأندلسيةَ والمغربيةَ
      والمشرقية؛ و«المخصَّص» في سبعة عشر مجلداً هو أكبر
      المعاجم الموضوعية في تاريخ العربية، وظلَّ مرجعاً
      أُنوماسيولوجياً رئيساً إلى العصر الحديث. ضبط ابن خلكان
      اليومَ والمكان؛ وأكَّد ذلك الذهبيُّ في «تاريخ الإسلام».
    description_fr: |
      Abū al-Ḥasan ʿAlī ibn Ismāʿīl ibn Sīda al-Mursī al-Andalusī
      — lexicographe aveugle de Mursiya (Murcie) et Dāniya
      (Denia) sous les amīrs mujāhidides d'al-Andalus post-
      califale, qui compila le plus grand dictionnaire arabe
      andalousien — mourut à Dāniya le 25 Rabīʿ II 458 H
      (25 mars 1066 EC). Son *al-Muḥkam wa-l-Muḥīṭ al-Aʿẓam*,
      en dix-sept volumes, suit l'ordre phonétique d'al-Khalīl
      et vise consciemment à surpasser le *Tahdhīb* d'al-Azharī
      en intégrant la matière lexicale andalousienne, maghrébine
      et mashriqī ; son *al-Mukhaṣṣaṣ*, lexique thématique en
      dix-sept volumes, est le plus grand lexique arabe par
      sujet jamais compilé et resta une référence onomasiologique
      primaire jusqu'à l'époque moderne. Ibn Khallikān donne
      le jour et le lieu ; al-Dhahabī confirme dans *Tārīkh
      al-Islām*.
    canonical_hijri: {year: 458, month: 4, day: 25, precision: day}
    canonical_gregorian: {date: 1066-03-25, precision: day, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated 25 Rabīʿ II 458 AH at Dāniya."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 458 AH wafayāt notice."
      - source_key: ei2
    people: [[ibn-sida-al-andalusi, died]]
    tags: [andalus, scholar, linguist, lexicographer, murcia, denia, muhkam]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Ibn_Sida"

  # =========================================================================
  # MAQĀMĀT — RHETORICAL CAPSTONE OF THE 6th CENTURY AH
  # =========================================================================

  - slug: death-of-al-hariri-al-basri
    category: scholar_death
    title_en: Death of al-Ḥarīrī al-Baṣrī — Author of the *Maqāmāt*
    title_ar: وفاة الحريريِّ البصريِّ — صاحب «المقامات»
    title_fr: Mort d'al-Ḥarīrī al-Baṣrī — auteur des *Maqāmāt*
    description_en: |
      Abū Muḥammad al-Qāsim ibn ʿAlī al-Ḥarīrī al-Baṣrī — Saljūq-
      era Iraqi grammarian, philologist, and master of *sajʿ*
      (rhymed prose) — died at Baṣra on 6 Rajab 516 AH (10
      September 1122 CE). His fifty *Maqāmāt al-Ḥarīrī*, narrated
      by the credulous merchant al-Ḥārith ibn Hammām and centred
      on the eloquent vagabond Abū Zayd al-Sarūjī, are the most-
      copied work of classical Arabic literature after the Qurʾān
      and Bukhārī's *Ṣaḥīḥ*; they served as the standard advanced
      lexical-rhetorical training-text for centuries and inspired
      later imitations in Persian, Hebrew, and Syriac. His grammar
      manual *Mulḥat al-Iʿrāb* (a versified didactic poem) and
      *Durrat al-Ghawwāṣ fī Awhām al-Khawāṣṣ* (correction of
      common educated solecisms) became standard pedagogical
      tools. Ibn Khallikān fixes the day and place; al-Dhahabī
      confirms in *Siyar Aʿlām al-Nubalāʾ*.
    description_ar: |
      توفي أبو محمد القاسمُ بن علي الحريريُّ البصريُّ — نحويُّ
      العصر السلجوقي بالعراق ولغويُّه وإمامُ السجع — بالبصرة
      في السادس من رجب سنة ست عشرة وخمسمئة للهجرة (الموافق
      ١٠ سبتمبر ١١٢٢ م). و«مقامات الحريري» الخمسون، يرويها
      التاجر الساذج الحارثُ بن همّام عن المتشرِّد البليغ أبي
      زيد السروجيِّ، أكثرُ ما نُسخ في الأدب العربي الكلاسيكي
      بعد القرآن الكريم و«صحيح» البخاري؛ صارت قروناً النصَّ
      التدريبيَّ المعتمَدَ في اللسان والبلاغة المتقدَّمين، وألهمت
      محاكياتٍ بالفارسية والعبرية والسريانية. ومتنه «ملحة
      الإعراب» المنظومة الديداكتيكية، و«درّة الغوّاص في أوهام
      الخواصّ» في تصحيح أوهام الخاصة، صارا من أدوات التدريس
      المعتمدة. ضبط ابن خلكان اليومَ والمكان؛ وأكَّد ذلك
      الذهبيُّ في «سير أعلام النبلاء».
    description_fr: |
      Abū Muḥammad al-Qāsim ibn ʿAlī al-Ḥarīrī al-Baṣrī —
      grammairien, philologue et maître du *sajʿ* (prose rimée)
      iraqien à l'époque saljūqide — mourut à Baṣra le 6 Rajab
      516 H (10 septembre 1122 EC). Ses cinquante *Maqāmāt
      al-Ḥarīrī*, narrées par le marchand crédule al-Ḥārith ibn
      Hammām autour du vagabond éloquent Abū Zayd al-Sarūjī,
      sont l'œuvre la plus copiée de la littérature arabe
      classique après le Coran et le *Ṣaḥīḥ* de Bukhārī ; elles
      servirent pendant des siècles de manuel avancé d'entraînement
      lexico-rhétorique et inspirèrent des imitations en persan,
      hébreu et syriaque. Son manuel grammatical *Mulḥat al-Iʿrāb*
      (poème didactique versifié) et son *Durrat al-Ghawwāṣ fī
      Awhām al-Khawāṣṣ* (correction des solécismes courants des
      lettrés) devinrent des outils pédagogiques standards. Ibn
      Khallikān fixe le jour et le lieu ; al-Dhahabī confirme
      dans *Siyar Aʿlām al-Nubalāʾ*.
    canonical_hijri: {year: 516, month: 7, day: 6, precision: day}
    canonical_gregorian: {date: 1122-09-10, precision: day, method: attested}
