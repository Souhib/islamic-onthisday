  # =========================================================================
  # AYYŪBID / MAMLŪK SYNTHESIS — CLOSING THE CLASSICAL TRADITION
  # =========================================================================

  - slug: death-of-ibn-malik-al-andalusi
    category: scholar_death
    title_en: Death of Ibn Mālik — Author of the *Alfiyya*
    title_ar: وفاة ابن مالك الأندلسيِّ — صاحب «الألفية»
    title_fr: Mort d'Ibn Mālik al-Andalusī — auteur de l'*Alfiyya*
    description_en: |
      Jamāl al-Dīn Abū ʿAbd Allāh Muḥammad ibn ʿAbd Allāh ibn
      Mālik al-Ṭāʾī al-Jayyānī al-Andalusī — Andalusī-born
      grammarian who emigrated to Damascus and taught at the
      ʿĀdiliyya madrasa under Ayyūbid and early Mamlūk patronage —
      died at Damascus on 12 Shaʿbān 672 AH (21 February 1274 CE)
      at age about seventy-two. His *al-Khulāṣa al-Alfīya*, almost
      universally known as the *Alfiyyat Ibn Mālik*, is a thousand-
      verse mnemonic poem that synthesises the entire Arabic
      grammatical tradition into rajaz couplets memorisable in a
      single year of study; with the commentary of his son Badr
      al-Dīn and the standard later glosses of Ibn ʿAqīl, al-
      Ushmūnī, and others, it became the obligatory grammar-
      curriculum text from Cairo and Damascus to the western
      Maghrib and Sokoto. His *al-Tashīl* and *al-Kāfiya al-
      Shāfiya* extend the same project at greater length. Ibn
      Kathīr fixes the day and place; al-Dhahabī's *Tārīkh al-
      Islām* confirms.
    description_ar: |
      توفي جمالُ الدين أبو عبد الله محمدُ بن عبد الله بن مالك
      الطائيُّ الجيّانيُّ الأندلسيُّ — نحويٌّ أندلسيُّ المولد،
      هاجر إلى دمشق ودرَّس بالمدرسة العادلية في رعاية الأيوبيين
      ومطلع الدولة المملوكية — بدمشق في الثاني عشر من شعبان سنة
      اثنتين وسبعين وستمئة للهجرة (الموافق ٢١ فبراير ١٢٧٤ م)
      عن نحو اثنتين وسبعين سنة. و«الخلاصة الألفية» المعروفة
      بـ«ألفية ابن مالك» منظومةٌ في ألف بيتٍ من الرجز اختصر
      فيها سائر التراث النحوي العربي حتى يحفظَه المتعلِّمُ في
      سنةٍ واحدة؛ ومع شرح ابنه بدر الدين وحواشي ابن عقيل
      والأشموني، صارت المنهجَ النحوي الإلزامي من القاهرة
      ودمشق إلى المغرب الأقصى وسوكوتو. و«التسهيل» و«الكافية
      الشافية» يمدّان المشروعَ نفسَه. ضبط ابن كثير اليومَ
      والمكان؛ وأكَّد ذلك الذهبيُّ في «تاريخ الإسلام».
    description_fr: |
      Jamāl al-Dīn Abū ʿAbd Allāh Muḥammad ibn ʿAbd Allāh ibn
      Mālik al-Ṭāʾī al-Jayyānī al-Andalusī — grammairien né
      en al-Andalus qui émigra à Damas et enseigna à la madrasa
      ʿĀdiliyya sous le patronage ayyūbide puis mamlūk — mourut
      à Damas le 12 Shaʿbān 672 H (21 février 1274 EC), à environ
      soixante-douze ans. Son *al-Khulāṣa al-Alfīya*, universellement
      connue comme l'*Alfiyyat Ibn Mālik*, est un poème mnémotechnique
      de mille vers qui synthétise toute la tradition grammaticale
      arabe en distiques rajaz mémorisables en une seule année
      d'étude ; avec le commentaire de son fils Badr al-Dīn et
      les gloses standards d'Ibn ʿAqīl, d'al-Ushmūnī et d'autres,
      il devint le manuel grammatical obligatoire du Caire et de
      Damas jusqu'au Maghrib extrême et à Sokoto. Son *al-Tashīl*
      et son *al-Kāfiya al-Shāfiya* prolongent le même projet.
      Ibn Kathīr fixe le jour et le lieu ; al-Dhahabī confirme
      dans *Tārīkh al-Islām*.
