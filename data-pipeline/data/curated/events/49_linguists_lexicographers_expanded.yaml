  - slug: death-of-al-mubarrad
    category: scholar_death
    title_en: Death of al-Mubarrad — Author of *al-Kāmil*
    title_ar: وفاة المبرَّدِ — صاحب «الكامل»
    title_fr: Mort d'al-Mubarrad — auteur d'*al-Kāmil*
    description_en: |
      Abū al-ʿAbbās Muḥammad ibn Yazīd al-Azdī, known as al-Mubarrad
      — head of the Baṣran grammatical school in Baghdad after the
      generation of Sībawayh and al-Akhfash al-Awsaṭ, and the great
      rival of Aḥmad ibn Yaḥyā Thaʿlab who led the Kūfan school —
      died at Baghdad in 286 AH (900 CE). His *al-Kāmil fī al-Lugha
      wa-l-Adab* gathers grammatical analysis, pre-Islamic and
      Umayyad poetry, Khārijite and ʿAlid speeches, and lexical
      anecdotes into a four-volume miscellany that became one of
      the most-quoted source-books of the Arabic tradition; his
      *al-Muqtaḍab* is the most influential systematic Baṣran
      grammar after the *Kitāb* of Sībawayh, organising its
      doctrine for an Abbasid readership. Ibn Khallikān fixes the
      death year and place; al-Dhahabī's *Tārīkh al-Islām* notices
      him in the wafayāt of 286.
    description_ar: |
      توفي أبو العباس محمد بن يزيد الأزديُّ المعروف بالمبرَّد —
      إمامُ مدرسة البصرة في النحو ببغداد بعد طبقة سيبويه والأخفش
      الأوسط، وغريمُ أحمد بن يحيى ثعلب رئيسِ المدرسة الكوفية —
      ببغداد سنة ست وثمانين ومئتين للهجرة (الموافق ٩٠٠ م).
      وفي «الكامل في اللغة والأدب» جمع البحثَ النحوي وأشعار
      الجاهلية وبني أمية وخطب الخوارج والعلويين والنوادر
      اللغوية في أربعة أجزاء صارت من أكثر مصادر المكتبة العربية
      اقتباساً؛ و«المقتضب» أعمقُ ما خلَّفته البصرةُ في النحو
      المنظَّم بعد «كتاب» سيبويه، يصوغ مذهبَها لقرّاء العصر
      العباسي. ضبط ابنُ خلكان وفاتَه؛ وذكره الذهبيُّ في وفيات
      سنة ٢٨٦ من «تاريخ الإسلام».
    description_fr: |
      Abū al-ʿAbbās Muḥammad ibn Yazīd al-Azdī, dit al-Mubarrad
      — chef de l'école grammaticale de Baṣra à Bagdad après la
      génération de Sībawayh et d'al-Akhfash al-Awsaṭ, et grand
      rival d'Aḥmad ibn Yaḥyā Thaʿlab qui dirigeait l'école de
      Kūfa — mourut à Bagdad en 286 H (900 EC). Son *al-Kāmil fī
      al-Lugha wa-l-Adab* rassemble en quatre volumes l'analyse
      grammaticale, la poésie préislamique et umayyade, les
      discours khārijites et ʿalides, et les anecdotes lexicales,
      devenant l'un des recueils les plus cités de la tradition
      arabe ; son *al-Muqtaḍab* est la grammaire baṣrienne
      systématique la plus influente après le *Kitāb* de Sībawayh,
      organisant sa doctrine pour un lectorat abbasside. Ibn
      Khallikān fixe l'année et le lieu ; al-Dhahabī, dans
      *Tārīkh al-Islām*, le mentionne dans les wafayāt de 286.
    canonical_hijri: {year: 286, precision: year}
    canonical_gregorian: {date: 900-01-01, precision: year, method: tabular_conversion}
