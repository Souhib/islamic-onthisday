# Wave 49 of curated event additions (2026-04-27).
# Major Arabic linguists, grammarians, and lexicographers whose deaths or
# whose foundational works constitute well-attested anchor points in the
# history of the ʿArabīya. Sībawayh, al-Khalīl ibn Aḥmad al-Farāhīdī, and
# al-Zabīdī (Tāj al-ʿArūs) are already in the dataset (waves 25 and 28);
# al-Fayrūzābādī (Qāmūs author) is in wave 39. This file fills out the
# remaining mainstream lexicographic/grammatical line: al-Aṣmaʿī and
# Abū ʿUbayda from the early Baṣra philological school; al-Mubarrad
# from the Baṣra-Baghdad transition; Ibn Durayd, al-Azharī, Ibn Jinnī,
# al-Jawharī, Ibn Sīda for the foundational classical dictionaries
# and grammatical works (Jamhara, Tahdhīb, Khaṣāʾiṣ, Ṣiḥāḥ, Muḥkam);
# al-Ḥarīrī for the Maqāmāt as the lexical-rhetorical capstone of the
# 5th–6th AH century; and Ibn Mālik (Alfiyya), Ibn Manẓūr (Lisān
# al-ʿArab), and Ibn Hishām al-Anṣārī (Mughnī al-Labīb) for the late-
# Ayyūbid / early-Mamlūk synthesis that closed the classical philological
# tradition. Cross-verification leans on Ibn Khallikān's wafayāt entries
# (where the figure predates 681 AH), supplemented by al-Dhahabī's
# Siyar / Tārīkh al-Islām and Ibn Kathīr's Bidāya for the Mamlūk-era
# figures. EI2 supplied as third source for the most-attested cases.
# Trilingual en/ar/fr throughout. No hadith refs (no narration
# directly anchors a philological event). Date precision uses day only
# where the classical sources explicitly attest the day.

events:
  # =========================================================================
  # EARLY BAṢRA PHILOLOGICAL SCHOOL — 2nd–3rd CENTURY AH
  # =========================================================================

  - slug: death-of-abu-ubayda-mamar-ibn-al-muthanna
    category: scholar_death
    title_en: Death of Abū ʿUbayda Maʿmar ibn al-Muthannā — Philologist of Early Baṣra
    title_ar: وفاة أبي عبيدة مَعمَر بن المثنّى — لغويُّ البصرة الأوّل
    title_fr: Mort d'Abū ʿUbayda Maʿmar ibn al-Muthannā — philologue des débuts de Baṣra
    description_en: |
      Abū ʿUbayda Maʿmar ibn al-Muthannā al-Taymī, mawlā of Banū
      Taym — one of the founders of the Baṣran philological school
      and the principal early collector of *ayyām al-ʿArab* (the
      battle-days of the pre-Islamic Arabs) and *gharīb al-Qurʾān*
      — died at Baṣra in 209 AH (824 CE). His *Majāz al-Qurʾān*
      is the earliest surviving systematic philological commentary
      on the Qurʾān, treating its rhetorical figures (majāz) as a
      species of ordinary Arabic usage; his *Naqāʾiḍ Jarīr wa-l-
      Farazdaq* preserves the lexical and ethnographic content of
      Umayyad satirical poetry. Ibn Khallikān fixes the year at
      209 AH while noting that some give 210 or 211; we follow
      209 as the majority of the sources cited (al-Dhahabī also
      gives 209 in *Tārīkh al-Islām*) and flag the disagreement.
    description_ar: |
      توفي أبو عبيدة مَعمَر بن المثنّى التيميُّ مولاهم — أحدُ
      مؤسِّسي مدرسة البصرة في علوم اللسان، والمعوَّلُ عليه في
      جمع «أيام العرب» قبل الإسلام و«غريب القرآن» — بالبصرة
      سنة تسع ومئتين للهجرة (الموافق ٨٢٤ م). وكتابُه «مجاز
      القرآن» أقدمُ ما وصلنا من شروح القرآن اللغوية المنظَّمة،
      جعل فيه المجازَ ضرباً من ضروب كلام العرب لا أمراً
      مفارقاً له؛ وكتابُه «نقائض جرير والفرزدق» يحفظ المحتوى
      اللغويَّ والإثنوغرافيَّ لأهاجي الشعر الأموي. وقد رجَّح ابن
      خلكان وفاتَه سنة ٢٠٩، ونقل قولَ مَن جعلها سنة ٢١٠ أو
      ٢١١؛ ونحن نتبع ٢٠٩ بوصفها رأيَ الجمهور (وعليها أيضاً
      الذهبيُّ في «تاريخ الإسلام»)، ونُنبِّه على الخلاف.
    description_fr: |
      Abū ʿUbayda Maʿmar ibn al-Muthannā al-Taymī, mawlā des
      Banū Taym — l'un des fondateurs de l'école philologique
      de Baṣra et le principal collecteur précoce des *ayyām
      al-ʿArab* (les journées guerrières des Arabes préislamiques)
      et du *gharīb al-Qurʾān* — mourut à Baṣra en 209 H (824 EC).
      Son *Majāz al-Qurʾān* est le plus ancien commentaire
      philologique systématique du Coran qui nous soit parvenu,
      traitant ses figures rhétoriques (majāz) comme une espèce
      de l'usage arabe ordinaire ; ses *Naqāʾiḍ Jarīr wa-l-Farazdaq*
      préservent le contenu lexical et ethnographique de la
      poésie satirique umayyade. Ibn Khallikān fixe l'année à
      209 H en notant que certains donnent 210 ou 211 ; nous
      retenons 209 comme position majoritaire (également retenue
      par al-Dhahabī dans *Tārīkh al-Islām*) et signalons le
      désaccord.
