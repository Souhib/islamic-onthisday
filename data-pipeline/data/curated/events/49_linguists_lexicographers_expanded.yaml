  # =========================================================================
  # FOUNDATIONAL CLASSICAL DICTIONARIES — 4th–5th CENTURY AH
  # =========================================================================

  - slug: death-of-ibn-durayd
    category: scholar_death
    title_en: Death of Ibn Durayd — Author of *al-Jamhara*
    title_ar: وفاة ابن دريد — صاحب «الجمهرة»
    title_fr: Mort d'Ibn Durayd — auteur d'*al-Jamhara*
    description_en: |
      Abū Bakr Muḥammad ibn al-Ḥasan ibn Durayd al-Azdī — Baṣran
      philologist, lexicographer, and poet of *al-Maqṣūra* (the
      famous didactic ode in alif maqṣūra rhyme) — died at Baghdad
      on Wednesday 18 Shaʿbān 321 AH (12 August 933 CE) at age
      ninety-three. His *Jamharat al-Lugha* is the second great
      Arabic dictionary after al-Khalīl's *Kitāb al-ʿAyn*, organised
      by tripartite root-permutation rather than by phonetic order
      and consciously designed as a more accessible alternative;
      his *al-Ishtiqāq* on Arabic etymology and tribal nomenclature
      is one of the founding works of Arabic onomastics. Ibn
      Khallikān gives the day and place of death precisely;
      al-Dhahabī notices him in the *Siyar* among the linguistic
      authorities of his year.
    description_ar: |
      توفي أبو بكر محمد بن الحسن بن دريد الأزديُّ — لغويُّ
      البصرة وصاحب «المقصورة» الشعرية الشهيرة — ببغداد يوم
      الأربعاء الثامن عشر من شعبان سنة إحدى وعشرين وثلاثمئة
      للهجرة (الموافق ١٢ أغسطس ٩٣٣ م) عن ثلاث وتسعين سنة.
      و«جمهرة اللغة» ثانيةُ المعاجم العربية الكبرى بعد «كتاب
      العين» للخليل، رتَّبها على تقاليب الجذر الثلاثيّ لا على
      الترتيب الصوتيِّ، وصاغها مدخلاً ميسَّراً أكثر؛ و«الاشتقاق»
      من أوائل ما كُتب في الاشتقاق العربي وفي علم الأنساب
      اللغوي للقبائل. ضبط ابنُ خلكان يومَ وفاته ومكانَها بدقّة؛
      وأَلمَّ به الذهبيُّ في «السير» في وفيات سنته بين أهل
      اللسان.
    description_fr: |
      Abū Bakr Muḥammad ibn al-Ḥasan ibn Durayd al-Azdī —
      philologue baṣrien, lexicographe et poète d'*al-Maqṣūra*
      (la célèbre ode didactique en rime alif maqṣūra) — mourut
      à Bagdad le mercredi 18 Shaʿbān 321 H (12 août 933 EC),
      à quatre-vingt-treize ans. Son *Jamharat al-Lugha* est le
      deuxième grand dictionnaire arabe après le *Kitāb al-ʿAyn*
      d'al-Khalīl, ordonné selon les permutations du trilitère
      racine plutôt que selon l'ordre phonétique, et conçu
      sciemment comme une alternative plus accessible ; son
      *al-Ishtiqāq* sur l'étymologie arabe et la nomenclature
      tribale est un texte fondateur de l'onomastique arabe.
      Ibn Khallikān donne précisément le jour et le lieu de la
      mort ; al-Dhahabī le mentionne dans les *Siyar* parmi les
      autorités linguistiques de son année.
    canonical_hijri: {year: 321, month: 8, day: 18, precision: day}
    canonical_gregorian: {date: 933-08-12, precision: day, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated Wednesday 18 Shaʿbān 321 AH at Baghdad, age 93."
      - source_key: dhahabi_siyar
        notes: "Notice in Siyar among the linguists of 321 AH."
      - source_key: ei2
