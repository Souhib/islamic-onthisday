  - slug: death-of-ibn-manzur
    category: scholar_death
    title_en: Death of Ibn Manẓūr — Compiler of *Lisān al-ʿArab*
    title_ar: وفاة ابن منظور — جامع «لسان العرب»
    title_fr: Mort d'Ibn Manẓūr — compilateur de *Lisān al-ʿArab*
    description_en: |
      Jamāl al-Dīn Abū al-Faḍl Muḥammad ibn Mukarram ibn Manẓūr
      al-Ifrīqī al-Miṣrī — Mamlūk-era Egyptian lexicographer of
      North African paternal descent who served as a chancery
      secretary in Cairo and as judge in Tripoli — died at
      Cairo in Shaʿbān 711 AH (December 1311 CE) at about
      eighty-one. His *Lisān al-ʿArab*, in twenty volumes,
      conflates the entries of five earlier dictionaries — al-
      Azharī's *Tahdhīb*, Ibn Sīda's *Muḥkam*, al-Jawharī's
      *Ṣiḥāḥ*, Ibn al-Athīr's *al-Nihāya*, and al-Ṣaghānī's
      *al-Takmila* — into a single comprehensive root-organised
      reference, ordered by the last consonant of the root in
      the manner of *al-Ṣiḥāḥ*; it remains the most-consulted
      pre-modern Arabic dictionary, the principal reference of
      classical-text editors, and the empirical base of the
      modern Cairo Arabic Language Academy's lexicography.
      Ibn Kathīr's *Bidāya* notices him in 711; al-Dhahabī's
      *Tārīkh al-Islām* confirms.
    description_ar: |
      توفي جمالُ الدين أبو الفضل محمد بن مكرم بن منظور الإفريقيُّ
      المصريُّ — لغويُّ مصرَ في العصر المملوكي وأصلُه من
      إفريقية، عمل كاتباً في ديوان الإنشاء بالقاهرة وقاضياً
      بطرابلس — بالقاهرة في شعبان سنة إحدى عشرة وسبعمئة للهجرة
      (الموافق ديسمبر ١٣١١ م) عن نحو إحدى وثمانين سنة. و«لسان
      العرب» في عشرين مجلداً أدمج فيه مادةَ خمسة معاجم سابقة
      — «تهذيب» الأزهري و«محكم» ابن سِيدَه و«صحاح» الجوهري
      و«نهاية» ابن الأثير و«تكملة» الصاغاني — في معجم جامع
      مرتَّبٍ على الجذور بآخر الحرف على طريقة «الصحاح»؛ وهو
      أكثرُ المعاجم العربية التراثية مراجعةً، ومرجعُ محقِّقي
      نصوص التراث، والمادةُ التجريبيةُ الأولى لمعجمية مجمع
      اللغة العربية بالقاهرة. ذكره ابن كثير في «البداية» في
      وفيات ٧١١؛ وأكَّد ذلك الذهبيُّ في «تاريخ الإسلام».
    description_fr: |
      Jamāl al-Dīn Abū al-Faḍl Muḥammad ibn Mukarram ibn Manẓūr
      al-Ifrīqī al-Miṣrī — lexicographe égyptien de l'époque
      mamlūke d'ascendance paternelle nord-africaine, qui servit
      comme secrétaire de la chancellerie au Caire et comme
      juge à Tripoli — mourut au Caire en Shaʿbān 711 H
      (décembre 1311 EC), à environ quatre-vingt-un ans. Son
      *Lisān al-ʿArab*, en vingt volumes, condense les entrées
      de cinq dictionnaires antérieurs — le *Tahdhīb* d'al-
      Azharī, le *Muḥkam* d'Ibn Sīda, le *Ṣiḥāḥ* d'al-Jawharī,
      la *Nihāya* d'Ibn al-Athīr et la *Takmila* d'al-Ṣaghānī
      — en une référence exhaustive organisée par racine,
      classée par la dernière consonne à la manière du *Ṣiḥāḥ* ;
      il reste le dictionnaire arabe prémoderne le plus consulté,
      la référence principale des éditeurs de textes classiques
      et la base empirique de la lexicographie de l'Académie
      arabe du Caire. Ibn Kathīr le mentionne dans la *Bidāya*
      en 711 ; al-Dhahabī confirme dans *Tārīkh al-Islām*.
    canonical_hijri: {year: 711, month: 8, precision: month}
    canonical_gregorian: {date: 1311-12-01, precision: month, method: tabular_conversion}
