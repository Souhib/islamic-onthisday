  - slug: death-of-al-azhari
    category: scholar_death
    title_en: Death of al-Azharī — Author of *Tahdhīb al-Lugha*
    title_ar: وفاة الأزهريِّ الهرويِّ — صاحب «تهذيب اللغة»
    title_fr: Mort d'al-Azharī — auteur de *Tahdhīb al-Lugha*
    description_en: |
      Abū Manṣūr Muḥammad ibn Aḥmad al-Azharī al-Harawī — Khurāsānian
      Shāfiʿī jurist and lexicographer who spent two years as a
      Qarmaṭian captive among the Bedouin of Najd, an experience
      he turned into a unique linguistic field-notebook — died in
      his native Herat in 370 AH (980–981 CE) at about eighty-two.
      His *Tahdhīb al-Lugha*, in roughly fifteen volumes, follows
      al-Khalīl's phonetic ordering but corrects, supplements, and
      polices the lexicographic record against earlier compilers
      whom he considered to have transmitted unreliable usage; it
      became the principal source-mine for Ibn Manẓūr's *Lisān
      al-ʿArab* three centuries later. Ibn Khallikān gives the year
      and place; al-Dhahabī confirms in *Tārīkh al-Islām* among
      the wafayāt of 370.
    description_ar: |
      توفي أبو منصور محمد بن أحمد الأزهريُّ الهرويُّ — فقيهٌ
      شافعيٌّ ولغويٌّ خراسانيٌّ، أُسِر في يد القرامطة سنتين بين
      أعراب نجد، فجعل من أسره مذكرةً ميدانيةً لغوية فريدة —
      بهراة مسقط رأسه سنة سبعين وثلاثمئة للهجرة (الموافق
      ٩٨٠–٩٨١ م) عن نحو اثنتين وثمانين سنة. و«تهذيب اللغة» في
      نحو خمسة عشر مجلداً تابع فيه ترتيب الخليل الصوتي، وصحَّح
      وزاد وحرَّر السجلَّ المعجميَّ في وجه مَن قبله ممن رأى
      روايتَهم غيرَ موثوقة؛ فصار المصدرَ الرئيسَ لـ«لسان العرب»
      لابن منظور بعد ثلاثة قرون. ضبط ابنُ خلكان السنةَ والمكان؛
      وأكَّد ذلك الذهبيُّ في وفيات ٣٧٠ من «تاريخ الإسلام».
    description_fr: |
      Abū Manṣūr Muḥammad ibn Aḥmad al-Azharī al-Harawī —
      juriste shāfiʿite et lexicographe khurāsānien qui passa deux
      ans en captivité qarmate parmi les Bédouins du Nejd,
      expérience qu'il convertit en un carnet linguistique de
      terrain unique — mourut dans sa Herat natale en 370 H
      (980–981 EC), à environ quatre-vingt-deux ans. Son
      *Tahdhīb al-Lugha*, en une quinzaine de volumes, suit
      l'ordonnancement phonétique d'al-Khalīl mais corrige,
      complète et police le registre lexicographique contre les
      compilateurs antérieurs jugés peu fiables ; il devint la
      source-carrière principale du *Lisān al-ʿArab* d'Ibn
      Manẓūr trois siècles plus tard. Ibn Khallikān donne l'année
      et le lieu ; al-Dhahabī confirme dans *Tārīkh al-Islām*
      parmi les wafayāt de 370.
    canonical_hijri: {year: 370, precision: year}
    canonical_gregorian: {date: 980-07-19, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Death dated 370 AH at Herat, age c. 82."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 370 AH wafayāt notice."
      - source_key: ei2
