  # =========================================================================
  # BOOK COMPLETION — al-SUYŪṬĪ'S *al-MUZHIR*
  # =========================================================================

  - slug: completion-of-al-suyuti-muzhir
    category: book_completion
    title_en: Completion of al-Suyūṭī's *al-Muzhir fī ʿUlūm al-Lugha*
    title_ar: إتمام السيوطيّ «المُزهِر في علوم اللغة»
    title_fr: Achèvement d'*al-Muzhir fī ʿUlūm al-Lugha* d'al-Suyūṭī
    description_en: |
      Jalāl al-Dīn al-Suyūṭī (d. 911 AH) — the polymath of late-
      Mamlūk Cairo whose biography is itself among this dataset's
      anchor entries — completed *al-Muzhir fī ʿUlūm al-Lugha
      wa-Anwāʿihā* during the period of his major scholarly
      productivity in the late ninth Islamic century, and the
      work circulated in Cairo before his withdrawal from public
      teaching in 891 AH. *al-Muzhir* is the first systematic
      survey of the Arabic linguistic disciplines (*ʿulūm al-
      lugha*) — etymology, dialectology, semantics, polysemy,
      synonymy, transmission of lexical material, and the history
      of dictionaries — modelled deliberately on Ibn al-Ṣalāḥ's
      structuring of the hadith sciences in the *Muqaddima*. It
      preserves citations from many earlier philological works
      now wholly lost and remains the standard reference for the
      history of Arabic linguistics. Year-precision is retained
      because the classical sources name the work as a product
      of al-Suyūṭī's mature period without giving a day of
      completion; we follow Ibn al-ʿImād's approximate dating
      via *Shadharāt al-Dhahab* and confirm via EI2.
    description_ar: |
      أتمَّ جلالُ الدين السيوطيُّ — المتوفى سنة ٩١١ هـ، وعلَمُ
      القاهرة المملوكية المتأخّرة الذي تنتظمه ترجمةٌ مستقلَّة
      في هذه المجموعة — كتابَه «المُزهِر في علوم اللغة وأنواعها»
      في فترة إنتاجه العلمي الكبير في أواخر القرن التاسع الهجري،
      وتداوله الناسُ بالقاهرة قبل انقطاعه عن التعليم العامِّ
      سنة ٨٩١ هـ. و«المُزهِر» أوّلُ مسحٍ منظَّمٍ لعلوم العربية
      — الاشتقاق وعلم اللهجات والدلالة والمشترك والمترادف
      وأسانيد المادة المعجمية وتاريخ المعاجم — مَبنيًّا على
      منهج ابن الصلاح في تقعيد علوم الحديث في «المقدّمة».
      ويحفظ الكتابُ نقولاً من كتبٍ لغويةٍ كثيرةٍ ضاعت بأصولها،
      وما يزال المرجعَ المعتمدَ في تاريخ علوم اللغة العربية.
      نلتزم بدقة السنة لأن المصادر تذكر الكتاب من إنتاج طوره
      الناضج دون يومٍ لإتمامه؛ ونتبع تقديرَ ابن العماد في
      «شذرات الذهب» ونؤكِّده بالموسوعة الإسلامية الثانية.
    description_fr: |
      Jalāl al-Dīn al-Suyūṭī (m. 911 H) — polymathe du Caire
      mamlūk tardif dont la biographie figure parmi les entrées-
      pivots de cette base — acheva *al-Muzhir fī ʿUlūm al-Lugha
      wa-Anwāʿihā* pendant la période de sa grande productivité
      savante à la fin du IXe siècle de l'Hégire, et l'ouvrage
      circulait au Caire avant son retrait de l'enseignement
      public en 891 H. *al-Muzhir* est le premier panorama
      systématique des sciences linguistiques arabes (*ʿulūm
      al-lugha*) — étymologie, dialectologie, sémantique, polysémie,
      synonymie, transmission de la matière lexicale et histoire
      des dictionnaires — modelé délibérément sur la structuration
      des sciences du hadith par Ibn al-Ṣalāḥ dans la *Muqaddima*.
      Il conserve des citations de nombreux ouvrages philologiques
      antérieurs entièrement perdus et reste la référence standard
      pour l'histoire de la linguistique arabe. La précision à
      l'année est retenue car les sources classiques mentionnent
      l'œuvre comme un produit de la maturité d'al-Suyūṭī sans
      donner de jour d'achèvement ; nous suivons la datation
      approximative d'Ibn al-ʿImād dans *Shadharāt al-Dhahab*
      et confirmons via l'EI2.
    canonical_hijri: {year: 890, precision: year}
    canonical_gregorian: {date: 1485-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "al-Muzhir dated to al-Suyūṭī's mature productive period (c. 880s–890s AH)."
      - source_key: editorial
        notes: "Year approximated to c. 890 AH from Ibn al-ʿImād's *Shadharāt al-Dhahab*; classical sources do not preserve a precise completion day."
    people: [[as-suyuti, authored]]
