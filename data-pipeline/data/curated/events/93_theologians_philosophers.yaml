  - slug: death-of-al-bayadi
    category: scholar_death
    title_en: Death of al-Bayāḍī — Author of *Ishārāt al-Marām*
    title_ar: وفاة البَياضي — مصنف «إشارات المرام»
    title_fr: Mort d'al-Bayāḍī — auteur d'*Ishārāt al-Marām*
    description_en: |
      Kamāl al-Dīn Aḥmad ibn Ḥasan al-Bayāḍī, Ottoman Hanafi-
      Māturīdī mutakallim and *qāḍī ʿaskar* in the Ottoman judicial
      hierarchy, died in 1098 AH. His *Ishārāt al-Marām min ʿIbārāt
      al-Imām* — a systematic Māturīdī kalām reading of Abū
      Ḥanīfa's theological epistles (*al-Fiqh al-Akbar* and the
      five short risālas) — is the most extensive single-volume
      Māturīdī systematisation produced in the Ottoman period and
      remains a standard reference for the school. He also composed
      *Uṣūl al-Munīfa li-l-Imām Abī Ḥanīfa*, a parallel collection
      of Abū Ḥanīfa's theological positions. al-Bayāḍī's project
      was the Ottoman counterpart to the Maghrebī Ashʿarī
      systematisations of al-Sanūsī and al-Lāqānī: the consolidation
      of mainstream Sunni kalām in catechetical, school-defining
      form. EI2 carries his entry; the death in 1098 AH falls just
      after Ibn al-ʿImād's *Shadharāt al-Dhahab* terminus, so the
      principal Sunni-canonical attestation here is EI2 with
      editorial cross-reference to the Hanafi biographical tradition
      in Ottoman ṭabaqāt literature.
    description_ar: |
      توفي الإمام كمال الدين أحمد بن حسن البَياضي — متكلم الحنفية
      الماتريدية في العهد العثماني وقاضي العسكر في السلك القضائي
      العثماني — سنة ثمان وتسعين بعد الألف. وكتابه «إشارات المرام
      من عبارات الإمام» قراءةٌ كلامية ماتريدية منهجية لرسائل أبي
      حنيفة العقدية («الفقه الأكبر» والرسائل الخمس الصغرى) — وهو
      أوسع كتاب جامع في علم الكلام الماتريدي صنّف في العهد العثماني،
      ولا يزال مرجعاً معتمداً في المذهب. وله كذلك «أصول المنيفة
      للإمام أبي حنيفة» جامعاً مذاهب أبي حنيفة الكلامية. ومشروع
      البَياضي العثماني نظيرٌ لمشروع التأصيل الأشعري المغربي عند
      السنوسي واللقاني: تثبيت أصول كلام أهل السنة في صورة منهجية
      مدرسية. ترجم له «دائرة المعارف الإسلامية»؛ ووفاته سنة ثمان
      وتسعين بعد الألف بعد ختام «شذرات الذهب» لابن العماد، فالعمدة
      في توثيقها عند أهل السنة «دائرة المعارف الإسلامية» مع تراجم
      الحنفية في طبقات العثمانيين.
    description_fr: |
      Kamāl al-Dīn Aḥmad ibn Ḥasan al-Bayāḍī, *mutakallim* hanafite-
      māturīdite ottoman et *qāḍī ʿaskar* dans la hiérarchie
      judiciaire ottomane, mourut en 1098 H. Son *Ishārāt al-Marām
      min ʿIbārāt al-Imām* — lecture *kalāmique* māturīdite
      systématique des épîtres théologiques d'Abū Ḥanīfa
      (*al-Fiqh al-Akbar* et les cinq courtes *risālas*) — est la
      systématisation māturīdite en un volume la plus étendue
      produite à l'époque ottomane et demeure une référence
      standard pour l'école. Il composa également *Uṣūl al-Munīfa
      li-l-Imām Abī Ḥanīfa*, une collection parallèle des positions
      théologiques d'Abū Ḥanīfa. Le projet d'al-Bayāḍī fut le
      pendant ottoman des systématisations ashʿarites maghrébines
      d'al-Sanūsī et d'al-Lāqānī: la consolidation du *kalām*
      sunnite mainstream sous une forme catéchétique structurante
      pour l'école. L'EI2 porte sa notice; la mort en 1098 H tombe
      juste après le terminus des *Shadharāt al-Dhahab* d'Ibn
      al-ʿImād, de sorte que la principale attestation sunnite-
      canonique ici est l'EI2 croisée avec la tradition
      biographique hanafite dans les *ṭabaqāt* ottomans.
