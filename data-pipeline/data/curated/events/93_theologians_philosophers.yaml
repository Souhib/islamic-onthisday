  - slug: death-of-al-laqani
    category: scholar_death
    title_en: Death of Burhān al-Dīn al-Lāqānī — Author of *Jawharat al-Tawḥīd*
    title_ar: وفاة برهان الدين اللقاني — مصنف «جوهرة التوحيد»
    title_fr: Mort de Burhān al-Dīn al-Lāqānī — auteur de la *Jawharat al-Tawḥīd*
    description_en: |
      Burhān al-Dīn Ibrāhīm ibn Ibrāhīm al-Lāqānī, Maliki-Ashʿarī
      mutakallim of al-Azhar and one of the leading creedal
      teachers of his generation in Cairo, died on his return from
      pilgrimage in 1041 AH. His *Jawharat al-Tawḥīd* — a 144-line
      versified Ashʿarī creed (*urjūza*) — became, alongside
      al-Sanūsī's *Umm al-Barāhīn*, the most-memorised Ashʿarī
      catechism across the Sunni world, particularly in Maliki
      Egypt and the Maghreb. He himself wrote two commentaries on
      it (*Hidāyat al-Murīd* and *ʿUmdat al-Murīd*); his son ʿAbd
      al-Salām al-Lāqānī wrote the standard commentary *Itḥāf
      al-Murīd*, and al-Bāǧūrī (1276 AH) the most-used later
      ḥāshiya. Ibn al-ʿImād records his death under 1041 AH in the
      final volume of *Shadharāt al-Dhahab*; EI2 corroborates and
      gives the standard biographical sketch.
    description_ar: |
      توفي الإمام برهان الدين إبراهيم بن إبراهيم اللقاني — متكلم
      المالكية الأشاعرة بالأزهر، أحد أئمة العقيدة في طبقته في
      القاهرة — في رجوعه من الحجّ سنة إحدى وأربعين بعد الألف.
      وأرجوزته «جوهرة التوحيد» في مئة أربع وأربعين بيتاً نظماً
      لعقيدة الأشاعرة، صارت — إلى جانب «أم البراهين» للسنوسي — أكثر
      متون العقيدة حفظاً في بلاد أهل السنة، ولا سيما في مصر المالكية
      والمغرب. شرحها هو نفسه شرحين هما «هداية المريد» و«عمدة المريد»؛
      وشرحها ابنه عبد السلام اللقاني الشرح المعتمد «إتحاف المريد»؛
      ووضع عليها الباجوري المتوفى سنة ست وسبعين ومئتين بعد الألف
      أشهر الحواشي المتأخرة. أرّخ ابن العماد وفاته في الجزء الأخير
      من «شذرات الذهب» سنة إحدى وأربعين بعد الألف، وأقرّه «دائرة
      المعارف الإسلامية» وضبطت ترجمته.
    description_fr: |
      Burhān al-Dīn Ibrāhīm ibn Ibrāhīm al-Lāqānī, *mutakallim*
      malikite-ashʿarite d'al-Azhar et l'un des principaux maîtres
      de credo de sa génération au Caire, mourut au retour du
      pèlerinage en 1041 H. Sa *Jawharat al-Tawḥīd* — un credo
      ashʿarite versifié en 144 vers (*urjūza*) — devint, aux
      côtés de l'*Umm al-Barāhīn* d'al-Sanūsī, le catéchisme
      ashʿarite le plus mémorisé à travers le monde sunnite, en
      particulier dans l'Égypte malikite et le Maghreb. Il en
      écrivit lui-même deux commentaires (*Hidāyat al-Murīd* et
      *ʿUmdat al-Murīd*); son fils ʿAbd al-Salām al-Lāqānī rédigea
      le commentaire standard *Itḥāf al-Murīd*, et al-Bāǧūrī
      (1276 H) la *ḥāshiya* postérieure la plus utilisée. Ibn
      al-ʿImād consigne sa mort à l'année 1041 H dans le volume
      final des *Shadharāt al-Dhahab*; l'EI2 corrobore et fournit
      la notice biographique standard.
