  - slug: death-of-al-shahrastani
    category: scholar_death
    title_en: Death of ʿAbd al-Karīm al-Shahrastānī — Author of *al-Milal wa-l-Niḥal*
    title_ar: وفاة عبد الكريم الشهرستاني — مصنف «الملل والنحل»
    title_fr: Mort de ʿAbd al-Karīm al-Shahrastānī — auteur d'*al-Milal wa-l-Niḥal*
    description_en: |
      Abū al-Fatḥ Muḥammad ibn ʿAbd al-Karīm al-Shahrastānī, Shafiʿi-
      Ashʿarī mutakallim, historian of religions, and pupil of Abū
      al-Muẓaffar al-Khawāfī and other late-Juwaynian Ashʿarīs, died
      in his native Shahrastān (Khurāsān) in 548 AH. His *al-Milal
      wa-l-Niḥal* — a comprehensive doxography of the religions and
      philosophical schools of the world organised under a careful
      classificatory scheme — remains the single most-cited
      pre-modern Sunni source on sectarian and philosophical
      diversity, including the only surviving systematic exposition
      of pre-Socratic Greek thought in classical Arabic. His
      *Nihāyat al-Aqdām fī ʿIlm al-Kalām* is a major Ashʿarī kalām
      treatise structured around twenty problems (*qawāʿid*) and
      stands alongside al-Juwaynī's *al-Irshād* and al-Rāzī's
      *Muḥaṣṣal* as a pillar of the school. Ibn Khallikān records
      his death in *Wafayāt al-Aʿyān*; al-Dhahabī corroborates in
      *Tārīkh al-Islām*; Ibn al-ʿImād confirms in *Shadharāt
      al-Dhahab*.
    description_ar: |
      توفي الإمام أبو الفتح محمد بن عبد الكريم الشهرستاني — متكلم
      الشافعية الأشاعرة، ومؤرّخ الفرق والديانات، تلميذ أبي المظفر
      الخوافي وغيره من أشاعرة طبقة الجويني المتأخرة — في بلده
      شهرستان من أرض خراسان سنة ثمان وأربعين وخمسمئة. وكتابه «الملل
      والنحل» — وهو دائرة جامعة لأديان العالم ومذاهبه الفلسفية ضمن
      تصنيف منهجي محكم — لا يزال أوثق ما يحتجّ به كتب أهل السنة قبل
      الحداثة في الفرق والمذاهب الفكرية، وفيه التفصيل الوحيد الباقي
      في العربية الكلاسيكية للفكر اليوناني قبل سقراط. وكتابه «نهاية
      الإقدام في علم الكلام» من كبار كتب الكلام الأشعري، نظمه على
      عشرين قاعدة، يقوم في المذهب إلى جانب «الإرشاد» للجويني
      و«المحصّل» للرازي. أرّخ ابن خلكان وفاته في «وفيات الأعيان»،
      وأقرّه الذهبي في «تاريخ الإسلام»، وكذا ابن العماد في «شذرات
      الذهب».
    description_fr: |
      Abū al-Fatḥ Muḥammad ibn ʿAbd al-Karīm al-Shahrastānī,
      *mutakallim* shafiʿite-ashʿarite, historien des religions et
      disciple d'Abū al-Muẓaffar al-Khawāfī et d'autres ashʿarites
      de la génération post-Juwaynīenne, mourut dans sa Shahrastān
      natale (Khurāsān) en 548 H. Son *al-Milal wa-l-Niḥal* — une
      doxographie exhaustive des religions et écoles philosophiques
      du monde organisée selon un schéma classificatoire soigneux —
      demeure la source sunnite pré-moderne la plus citée sur la
      diversité sectaire et philosophique, et inclut la seule
      exposition systématique conservée de la pensée grecque
      pré-socratique en arabe classique. Sa *Nihāyat al-Aqdām fī
      ʿIlm al-Kalām* est un traité majeur de *kalām* ashʿarite
      structuré autour de vingt problèmes (*qawāʿid*) et se tient
      aux côtés de l'*Irshād* d'al-Juwaynī et du *Muḥaṣṣal* d'al-Rāzī
      comme pilier de l'école. Ibn Khallikān consigne sa mort dans
      *Wafayāt al-Aʿyān*; al-Dhahabī corrobore dans *Tārīkh al-Islām*;
      Ibn al-ʿImād confirme dans *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 548, precision: year}
    canonical_gregorian: {date: 1153-01-01, precision: year, method: attested}
