  - slug: death-of-abu-al-yusr-al-bazdawi
    category: scholar_death
    title_en: Death of Abū al-Yusr al-Bazdawī — Hanafi-Māturīdī Uṣūlī of Samarqand
    title_ar: وفاة أبي اليُسر البَزدَوي — أصولي الحنفية الماتريدية بسمرقند
    title_fr: Mort d'Abū al-Yusr al-Bazdawī — uṣūlī hanafite-māturīdite de Samarcande
    description_en: |
      Abū al-Yusr Muḥammad ibn Muḥammad al-Bazdawī, qāḍī of Samarqand
      and one of the leading Hanafi-Māturīdī uṣūlīs of the fifth
      century AH, died at Bukhara in 493 AH. His *Kitāb fīhi
      Maʿrifat al-Ḥujaj al-Sharʿiyya* (often called *Uṣūl al-Bazdawī*)
      and his *Kitāb al-Uṣūl* anchored the Samarqandī branch of
      Hanafi uṣūl al-fiqh, distinct in emphasis from the Iraqi-
      Khurāsānī line; his theological treatise *Uṣūl al-Dīn*
      transmits the Māturīdī ʿaqīda in its formative phase. His
      brother Fakhr al-Islām ʿAlī al-Bazdawī (482 AH) authored the
      more famous *Kanz al-Wuṣūl ilā Maʿrifat al-Uṣūl*; the two
      Bazdawī brothers together fixed the Hanafi-Māturīdī uṣūl
      curriculum that ʿAlāʾ al-Dīn al-Bukhārī would later codify
      in *Kashf al-Asrār*. al-Dhahabī records his death in *Siyar
      Aʿlām al-Nubalāʾ* under the year 493 AH and Ibn al-ʿImād
      corroborates in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام أبو اليُسر محمد بن محمد البَزدَوي — قاضي سمرقند
      وأحد كبار أصوليي الحنفية الماتريدية في القرن الخامس الهجري —
      ببخارى سنة ثلاث وتسعين وأربعمئة. كتابه «معرفة الحجج الشرعية»
      المعروف بـ«أصول البَزدَوي»، وكتابه «الأصول»، أسسا فرع أصول
      الفقه الحنفي السمرقندي، وكان متميزاً في موارده عن الفرع
      العراقي الخراساني؛ ورسالته الكلامية «أصول الدين» نقل بها
      عقيدة أهل السنة الماتريدية في طورها التأسيسي. وأخوه فخر
      الإسلام علي البَزدَوي المتوفى سنة اثنتين وثمانين وأربعمئة هو
      مصنف «كنز الوصول إلى معرفة الأصول» الأشهر؛ والأخوان البَزدَويان
      جميعاً ضبطا منهج الأصول عند الحنفية الماتريدية الذي شرحه فيما
      بعد علاء الدين البخاري في «كشف الأسرار». أرّخ الذهبي وفاته في
      «سير أعلام النبلاء» سنة ثلاث وتسعين وأربعمئة، وأقرّه ابن العماد
      في «شذرات الذهب».
    description_fr: |
      Abū al-Yusr Muḥammad ibn Muḥammad al-Bazdawī, *qāḍī* de
      Samarcande et l'un des principaux uṣūlīs hanafites-māturīdites
      du Ve siècle hégirien, mourut à Boukhara en 493 H. Son *Kitāb
      fīhi Maʿrifat al-Ḥujaj al-Sharʿiyya* (souvent appelé *Uṣūl
      al-Bazdawī*) et son *Kitāb al-Uṣūl* fixèrent la branche
      samarcandaise de l'uṣūl al-fiqh hanafite, distincte par ses
      accents de la lignée irako-khurāsānienne; son traité
      théologique *Uṣūl al-Dīn* transmet la ʿaqīda māturīdite dans
      sa phase formatrice. Son frère Fakhr al-Islām ʿAlī al-Bazdawī
      (482 H) composa le plus célèbre *Kanz al-Wuṣūl ilā Maʿrifat
      al-Uṣūl*; les deux frères Bazdawī fixèrent ensemble le
      programme d'uṣūl hanafite-māturīdite que ʿAlāʾ al-Dīn
      al-Bukhārī codifierait plus tard dans *Kashf al-Asrār*.
      al-Dhahabī consigne sa mort dans *Siyar Aʿlām al-Nubalāʾ* à
      l'année 493 H et Ibn al-ʿImād corrobore dans *Shadharāt
      al-Dhahab*.
