  - slug: death-of-al-iji-mawaqif
    category: scholar_death
    title_en: Death of ʿAḍud al-Dīn al-Ījī — Author of *al-Mawāqif fī ʿIlm al-Kalām*
    title_ar: وفاة عضد الدين الإيجي — مصنف «المواقف في علم الكلام»
    title_fr: Mort de ʿAḍud al-Dīn al-Ījī — auteur d'*al-Mawāqif fī ʿIlm al-Kalām*
    description_en: |
      ʿAḍud al-Dīn ʿAbd al-Raḥmān ibn Aḥmad al-Ījī, Shafiʿi-Ashʿarī
      *qāḍī* and *mutakallim* of Shīrāz under the Mongol Ilkhānate
      and the Muẓaffarid dynasty, died imprisoned at the fortress
      of Dīrāmīyān (near Kirmān) in 756 AH after a political
      reverse. His *al-Mawāqif fī ʿIlm al-Kalām* is the canonical
      late-Ashʿarī kalām compendium — the work that, with al-Sharīf
      al-Jurjānī's commentary *Sharḥ al-Mawāqif*, defines the
      standard post-classical Sunni kalām curriculum from the
      Timurid period through the late Ottoman madrasas. He also
      composed *al-ʿAqāʾid al-ʿAḍudiyya* (a brief Ashʿarī creed
      that itself drew the major commentary of al-Dawānī) and
      *al-Mukhtaṣar fī Uṣūl al-Fiqh* on Shafiʿi uṣūl. Ibn Ḥajar
      al-ʿAsqalānī gives the death-year in *al-Durar al-Kāmina*;
      Ibn al-ʿImād corroborates in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام عضد الدين عبد الرحمن بن أحمد الإيجي — قاضي
      الشافعية الأشاعرة ومتكلمهم بشيراز في عهد الإيلخانية المغولية
      ودولة المظفّريين — محبوساً في قلعة ديرامِيان قرب كرمان سنة ست
      وخمسين وسبعمئة بعد حادثة سياسية انقلبت عليه. وكتابه «المواقف
      في علم الكلام» هو المتن المعتمد في كلام الأشاعرة المتأخرين —
      وهو وشرحه «شرح المواقف» للسيد الشريف الجرجاني عليه يضبطان
      منهج كلام أهل السنة المتأخر في مدارس الدولة التيمورية وما
      بعدها إلى أواخر العثمانيين. وله «العقائد العضدية» في الأشعرية
      على الاختصار وعليها شرح الدواني الكبير، و«المختصر في أصول
      الفقه» في أصول الشافعية. ذكر وفاته ابن حجر العسقلاني في
      «الدرر الكامنة»، وأقرّه ابن العماد في «شذرات الذهب».
    description_fr: |
      ʿAḍud al-Dīn ʿAbd al-Raḥmān ibn Aḥmad al-Ījī, *qāḍī* et
      *mutakallim* shafiʿite-ashʿarite de Shīrāz sous l'ilkhānat
      mongol et la dynastie Muẓaffaride, mourut emprisonné à la
      forteresse de Dīrāmīyān (près de Kirmān) en 756 H après un
      revers politique. Son *al-Mawāqif fī ʿIlm al-Kalām* est le
      compendium canonique du *kalām* ashʿarite tardif — l'œuvre
      qui, avec le commentaire d'al-Sharīf al-Jurjānī *Sharḥ
      al-Mawāqif*, définit le programme standard de *kalām* sunnite
      post-classique de l'époque timouride aux madrasas ottomanes
      tardives. Il composa également *al-ʿAqāʾid al-ʿAḍudiyya* (un
      bref credo ashʿarite qui attira lui-même le commentaire majeur
      d'al-Dawānī) et *al-Mukhtaṣar fī Uṣūl al-Fiqh* sur l'uṣūl
      shafiʿite. Ibn Ḥajar al-ʿAsqalānī donne l'année de sa mort
      dans *al-Durar al-Kāmina*; Ibn al-ʿImād corrobore dans
      *Shadharāt al-Dhahab*.
