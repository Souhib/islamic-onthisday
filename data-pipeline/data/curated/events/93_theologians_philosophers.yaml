  - slug: death-of-ala-al-din-al-bukhari
    category: scholar_death
    title_en: Death of ʿAlāʾ al-Dīn al-Bukhārī — Author of *Kashf al-Asrār*
    title_ar: وفاة علاء الدين البخاري — مصنف «كشف الأسرار»
    title_fr: Mort de ʿAlāʾ al-Dīn al-Bukhārī — auteur de *Kashf al-Asrār*
    description_en: |
      ʿAlāʾ al-Dīn ʿAbd al-ʿAzīz ibn Aḥmad al-Bukhārī, late-classical
      Hanafi-Māturīdī uṣūlī of Bukhara, died in 730 AH. His
      *Kashf al-Asrār ʿan Uṣūl Fakhr al-Islām al-Bazdawī* is the
      most authoritative commentary on Fakhr al-Islām al-Bazdawī's
      *Kanz al-Wuṣūl* — and through it the canonical exposition
      of Samarqandī Hanafi uṣūl al-fiqh that all later Hanafi
      uṣūlīs of the Mamluk and Ottoman periods consulted. He also
      composed *al-Tawḍīḥ ʿalā al-Tanqīḥ* on Ṣadr al-Sharīʿa
      al-Maḥbūbī's *al-Tanqīḥ*. The pairing of *Kashf al-Asrār* and
      Ṣadr al-Sharīʿa's *al-Tawḍīḥ* (the latter then commented by
      al-Taftāzānī's *al-Talwīḥ*) defines the late Hanafi uṣūl
      curriculum down to the modern Indo-Pakistani madrasas. Ibn
      Ḥajar al-ʿAsqalānī records his death in *al-Durar al-Kāmina*;
      Ibn al-ʿImād confirms in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام علاء الدين عبد العزيز بن أحمد البخاري — أصولي
      الحنفية الماتريدية في الطور المتأخر بمدينة بخارى — سنة ثلاثين
      وسبعمئة. وكتابه «كشف الأسرار عن أصول فخر الإسلام البَزدَوي»
      هو أوثق شروح «كنز الوصول» لفخر الإسلام البَزدَوي، وبه صارت
      أصول الفقه الحنفية السمرقندية كما يقررها متأخرو الحنفية في
      دولتي المماليك والعثمانيين، فإليه يرجعون. وله كذلك «التوضيح
      على التنقيح» شرحاً لـ«تنقيح الأصول» لصدر الشريعة المحبوبي.
      وثنائية «كشف الأسرار» و«التوضيح» — الذي شرحه بعدُ التفتازاني
      في «التلويح» — هي عماد منهج أصول الفقه عند متأخري الحنفية في
      مدارس الهند وباكستان إلى يومنا. أرّخ ابن حجر العسقلاني وفاته
      في «الدرر الكامنة»، وأقرّه ابن العماد في «شذرات الذهب».
    description_fr: |
      ʿAlāʾ al-Dīn ʿAbd al-ʿAzīz ibn Aḥmad al-Bukhārī, uṣūlī
      hanafite-māturīdite de la phase classique tardive à Boukhara,
      mourut en 730 H. Son *Kashf al-Asrār ʿan Uṣūl Fakhr al-Islām
      al-Bazdawī* est le commentaire le plus autoritatif du *Kanz
      al-Wuṣūl* de Fakhr al-Islām al-Bazdawī — et constitue ainsi
      l'exposition canonique de l'uṣūl al-fiqh hanafite samarcandais
      que tous les uṣūlīs hanafites postérieurs des époques
      mamelouke et ottomane consultèrent. Il composa également
      *al-Tawḍīḥ ʿalā al-Tanqīḥ* sur *al-Tanqīḥ* de Ṣadr al-Sharīʿa
      al-Maḥbūbī. Le couple *Kashf al-Asrār* et *al-Tawḍīḥ* — ce
      dernier ensuite commenté par *al-Talwīḥ* d'al-Taftāzānī —
      définit le programme d'uṣūl hanafite tardif jusque dans les
      madrasas indo-pakistanaises modernes. Ibn Ḥajar al-ʿAsqalānī
      consigne sa mort dans *al-Durar al-Kāmina*; Ibn al-ʿImād
      confirme dans *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 730, precision: year}
    canonical_gregorian: {date: 1330-01-01, precision: year, method: attested}
