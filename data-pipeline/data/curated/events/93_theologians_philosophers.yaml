  - slug: death-of-siraj-al-din-al-urmawi
    category: scholar_death
    title_en: Death of Sirāj al-Dīn al-Urmawī — Author of *Maṭāliʿ al-Anwār*
    title_ar: وفاة سراج الدين الأرموي — مصنف «مطالع الأنوار»
    title_fr: Mort de Sirāj al-Dīn al-Urmawī — auteur de *Maṭāliʿ al-Anwār*
    description_en: |
      Sirāj al-Dīn Maḥmūd ibn Abī Bakr al-Urmawī, Shafiʿi-Ashʿarī
      jurist and chief judge (*qāḍī al-quḍāt*) of Konya under the
      Anatolian Seljuks, died in Konya in 682 AH. Trained in the
      tradition of Fakhr al-Dīn al-Rāzī, he wrote *Maṭāliʿ al-Anwār*
      — a logic-and-kalām compendium that became one of the most-
      taught manuals of formal logic in the post-classical Sunni
      curriculum, alongside al-Kātibī al-Qazwīnī's *al-Shamsiyya*
      — and *al-Taḥṣīl min al-Maḥṣūl*, an abridgement of al-Rāzī's
      *al-Maḥṣūl* in uṣūl al-fiqh. He also composed *Bayān al-Ḥaqq*
      and *Lubāb al-Arbaʿīn*. His judicial appointment in Konya
      placed him at the centre of the same Seljuk court patronage
      that supported Sadr al-Dīn al-Qūnawī's circle, but al-Urmawī's
      own work remains squarely in mainstream Ashʿarī kalām and
      Shafiʿi uṣūl. Ibn Khallikān records his death; al-Dhahabī
      corroborates in *Tārīkh al-Islām*; Ibn al-ʿImād confirms in
      *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام سراج الدين محمود بن أبي بكر الأرموي — فقيه
      الشافعية الأشاعرة وقاضي القضاة بقونية في دولة سلاجقة الروم —
      بقونية سنة اثنتين وثمانين وستمئة. تخرّج على مدرسة فخر الدين
      الرازي، وصنّف «مطالع الأنوار» جامعاً بين المنطق والكلام، فصار
      من أكثر متون المنطق تدريساً في المنهج السني المتأخر إلى جانب
      «الشمسية» للكاتبي القزويني، وله «التحصيل من المحصول» مختصراً
      «المحصول» للرازي في أصول الفقه، و«بيان الحق» و«لباب الأربعين».
      وقد ولّاه السلاجقة قضاء قونية حيث كان فيها حلقة صدر الدين
      القونوي تحت رعاية البلاط نفسه، غير أن الأرموي ثبت على متن
      الكلام الأشعري وأصول الفقه الشافعية في علميه. أرّخ ابن خلكان
      وفاته، وأقرّه الذهبي في «تاريخ الإسلام»، وابن العماد في
      «شذرات الذهب».
    description_fr: |
      Sirāj al-Dīn Maḥmūd ibn Abī Bakr al-Urmawī, juriste shafiʿite-
      ashʿarite et grand juge (*qāḍī al-quḍāt*) de Konya sous les
      Seldjoukides d'Anatolie, mourut à Konya en 682 H. Formé dans
      la tradition de Fakhr al-Dīn al-Rāzī, il écrivit *Maṭāliʿ
      al-Anwār* — un manuel de logique et de *kalām* qui devint
      l'un des manuels de logique formelle les plus enseignés du
      programme sunnite post-classique, aux côtés d'*al-Shamsiyya*
      d'al-Kātibī al-Qazwīnī — et *al-Taḥṣīl min al-Maḥṣūl*, un
      abrégé d'*al-Maḥṣūl* d'al-Rāzī en uṣūl al-fiqh. Il composa
      également *Bayān al-Ḥaqq* et *Lubāb al-Arbaʿīn*. Sa
      nomination judiciaire à Konya le plaça au cœur du même
      patronage seldjoukide qui soutenait le cercle de Ṣadr al-Dīn
      al-Qūnawī, mais l'œuvre propre d'al-Urmawī reste fermement
      dans le *kalām* ashʿarite mainstream et l'uṣūl shafiʿite.
      Ibn Khallikān consigne sa mort; al-Dhahabī corrobore dans
      *Tārīkh al-Islām*; Ibn al-ʿImād confirme dans *Shadharāt
      al-Dhahab*.
    canonical_hijri: {year: 682, precision: year}
    canonical_gregorian: {date: 1283-01-01, precision: year, method: attested}
