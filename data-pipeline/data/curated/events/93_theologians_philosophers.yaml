  - slug: death-of-sayf-al-din-al-amidi
    category: scholar_death
    title_en: Death of Sayf al-Dīn al-Āmidī — Author of *al-Iḥkām fī Uṣūl al-Aḥkām*
    title_ar: وفاة سيف الدين الآمدي — مصنف «الإحكام في أصول الأحكام»
    title_fr: Mort de Sayf al-Dīn al-Āmidī — auteur d'*al-Iḥkām fī Uṣūl al-Aḥkām*
    description_en: |
      Sayf al-Dīn ʿAlī ibn Abī ʿAlī al-Āmidī, Shafiʿi-Ashʿarī uṣūlī
      and *mutakallim* of Damascus and a pivotal figure in the
      transmission of late-Ashʿarī kalām into the Ayyubid era, died
      in Damascus in 631 AH and was buried at the foot of Mount
      Qāsiyūn. His *al-Iḥkām fī Uṣūl al-Aḥkām* — a four-volume
      systematic treatise on uṣūl al-fiqh organised dialectically
      — became the single most-studied uṣūl text in the Mamluk
      and Ottoman Shafiʿi curriculum, summarised by al-Subkī, Ibn
      al-Ḥājib, and others, and remains a primary classical
      reference today. His *Abkār al-Afkār fī Uṣūl al-Dīn* is a
      parallel comprehensive Ashʿarī kalām treatise. Originally
      Hanbali, then Shafiʿi, he absorbed the dialectical method of
      Fakhr al-Dīn al-Rāzī's school and brought it westward into
      Syria. Ibn Khallikān records his death in *Wafayāt al-Aʿyān*;
      al-Dhahabī corroborates in *Siyar Aʿlām al-Nubalāʾ*; Ibn Kathīr
      confirms in *al-Bidāya wa-l-Nihāya*.
    description_ar: |
      توفي الإمام سيف الدين علي بن أبي علي الآمدي — أصولي الشافعية
      الأشاعرة ومتكلمها بدمشق، أحد أئمة المذهب الذين نقلوا الكلام
      الأشعري المتأخر إلى العصر الأيوبي — بدمشق سنة إحدى وثلاثين
      وستمئة، ودُفن بسفح جبل قاسيون. وكتابه «الإحكام في أصول
      الأحكام» — في أربع مجلدات منهجياً جدلياً — صار المتن الأشهر
      تدريساً في أصول الفقه الشافعية في عصر المماليك والعثمانيين،
      اختصره السبكي وابن الحاجب وغيرهما، ولا يزال من أوائل المصادر
      الكلاسيكية إلى اليوم. وكتابه «أبكار الأفكار في أصول الدين»
      كتاب جامع نظير في علم الكلام الأشعري. وكان حنبلياً ثم تحول إلى
      الشافعية، فاستوعب منهج الجدل الكلامي عند مدرسة فخر الدين
      الرازي ونقله إلى الشام. أرّخ ابن خلكان وفاته في «وفيات الأعيان»،
      وأقرّه الذهبي في «سير أعلام النبلاء»، وابن كثير في «البداية
      والنهاية».
    description_fr: |
      Sayf al-Dīn ʿAlī ibn Abī ʿAlī al-Āmidī, uṣūlī shafiʿite-
      ashʿarite et *mutakallim* de Damas et figure pivotale dans
      la transmission du *kalām* ashʿarite tardif vers l'ère
      ayyoubide, mourut à Damas en 631 H et fut inhumé au pied du
      mont Qāsiyūn. Son *al-Iḥkām fī Uṣūl al-Aḥkām* — traité
      systématique en quatre volumes sur l'uṣūl al-fiqh organisé
      dialectiquement — devint le texte d'uṣūl le plus étudié dans
      le programme shafiʿite mamelouk et ottoman, résumé par
      al-Subkī, Ibn al-Ḥājib et d'autres, et demeure une référence
      classique de premier plan aujourd'hui. Ses *Abkār al-Afkār
      fī Uṣūl al-Dīn* sont un traité exhaustif parallèle de *kalām*
      ashʿarite. Originairement hanbalite, puis shafiʿite, il
      absorba la méthode dialectique de l'école de Fakhr al-Dīn
      al-Rāzī et la porta vers l'ouest en Syrie. Ibn Khallikān
      consigne sa mort dans *Wafayāt al-Aʿyān*; al-Dhahabī corrobore
      dans *Siyar Aʿlām al-Nubalāʾ*; Ibn Kathīr confirme dans
      *al-Bidāya wa-l-Nihāya*.
    canonical_hijri: {year: 631, precision: year}
    canonical_gregorian: {date: 1233-01-01, precision: year, method: attested}
