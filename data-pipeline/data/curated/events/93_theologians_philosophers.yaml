  - slug: death-of-abu-al-muin-al-nasafi
    category: scholar_death
    title_en: Death of Abū al-Muʿīn al-Nasafī — Author of *Tabṣirat al-Adilla*
    title_ar: وفاة أبي المُعين النَسَفي — مصنف «تبصرة الأدلة»
    title_fr: Mort d'Abū al-Muʿīn al-Nasafī — auteur de *Tabṣirat al-Adilla*
    description_en: |
      Maymūn ibn Muḥammad Abū al-Muʿīn al-Nasafī, the foremost
      Māturīdī theologian of his age and the figure who effectively
      systematised the school after al-Māturīdī himself, died in
      508 AH. His *Tabṣirat al-Adilla fī Uṣūl al-Dīn* is the
      foundational long-form Māturīdī kalām treatise — a
      comprehensive defence of Ahl al-Sunna against the Muʿtazila,
      the philosophers, and the dualists, written within the
      Samarqandī tradition that traces back through al-Māturīdī
      to Abū Ḥanīfa's *al-Fiqh al-Akbar*. His *al-Tamhīd li-Qawāʿid
      al-Tawḥīd* offers the same arguments in shorter compass and
      remains a standard intermediate text. Najm al-Dīn al-Nasafī
      (537 AH), author of the later *al-ʿAqāʾid al-Nasafiyya* matn,
      was his pupil's pupil and inherited the school through this
      transmission. al-Dhahabī records his death in *Siyar Aʿlām
      al-Nubalāʾ*; Ibn al-ʿImād confirms in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام ميمون بن محمد أبو المُعين النَسَفي — كبير متكلمي
      الماتريدية في عصره، والذي ضبط أصول المذهب بعد الماتريدي
      نفسه — سنة ثمان وخمسمئة. وكتابه «تبصرة الأدلة في أصول الدين»
      هو المؤسس في كلام الماتريدية المطوّل، يقرّر مذهب أهل السنة في
      الردّ على المعتزلة والفلاسفة والثنوية، ضمن خط سمرقند العائد
      إلى الماتريدي وحتى «الفقه الأكبر» لأبي حنيفة. ومختصره «التمهيد
      لقواعد التوحيد» يقدّم تلك الحجج باختصار، ولا يزال من المتون
      الوسطى المعتمدة. وأمّا نجم الدين النَسَفي المتوفى سنة سبع
      وثلاثين وخمسمئة مصنف متن «العقائد النسفية» المتأخر فهو تلميذ
      لتلميذه، وعنه ورث المذهب الماتريدي. أرّخ الذهبي وفاته في «سير
      أعلام النبلاء»، وأقرّه ابن العماد في «شذرات الذهب».
    description_fr: |
      Maymūn ibn Muḥammad Abū al-Muʿīn al-Nasafī, le plus grand
      théologien māturīdite de son temps et la figure qui systématisa
      effectivement l'école après al-Māturīdī lui-même, mourut en
      508 H. Sa *Tabṣirat al-Adilla fī Uṣūl al-Dīn* est le traité
      fondateur du *kalām* māturīdite long-format — une défense
      exhaustive d'Ahl al-Sunna contre les Muʿtazilites, les
      philosophes et les dualistes, écrite dans la tradition de
      Samarcande remontant à travers al-Māturīdī jusqu'à *al-Fiqh
      al-Akbar* d'Abū Ḥanīfa. Son *al-Tamhīd li-Qawāʿid al-Tawḥīd*
      offre les mêmes arguments en plus court et demeure un texte
      intermédiaire standard. Najm al-Dīn al-Nasafī (537 H), auteur
      du *matn* postérieur *al-ʿAqāʾid al-Nasafiyya*, fut le disciple
      de son disciple et hérita ainsi de l'école par cette
      transmission. al-Dhahabī consigne sa mort dans *Siyar Aʿlām
      al-Nubalāʾ*; Ibn al-ʿImād confirme dans *Shadharāt al-Dhahab*.
