# Wave 93 of curated event additions (2026-04-27).
# Mainstream Sunni theologians, philosophers, and uṣūlīs not
# previously covered — anchored squarely in Ashʿarī, Māturīdī,
# and Ḥanafī-Māturīdī kalām and uṣūl al-fiqh. Strictly within
# the four-madhhab Sunni bar (EDITORIAL.md rule 8): no Akbarian
# school figures (Ibn ʿArabī, al-Qūnawī, al-Jīlī, al-Tilimsānī,
# Ibn Sabʿīn), no executed-for-heresy figures (al-Ḥallāj,
# ʿAyn al-Quḍāt, al-Suhrawardī al-Maqtūl), no Tijanī figures,
# no Twelver Shia compilers, no Muʿtazilī figures framed
# doctrinally.
#
# Coverage of this wave:
#
# Māturīdī kalām anchors:
#   - Abū al-Yusr al-Bazdawī (493 AH — Hanafi-Māturīdī uṣūlī)
#   - Abū al-Muʿīn al-Nasafī (508 AH — *Tabṣirat al-Adilla*,
#     foundational Māturīdī kalām treatise)
#   - ʿAlāʾ al-Dīn al-Bukhārī (730 AH — *Kashf al-Asrār*
#     commentary on al-Bazdawī's uṣūl)
#   - al-Bayāḍī (1098 AH — *Ishārāt al-Marām*, Ottoman
#     Māturīdī kalām systematisation)
#
# Ashʿarī kalām and uṣūl al-fiqh:
#   - al-Shahrastānī (548 AH — *al-Milal wa-l-Niḥal* and
#     *Nihāyat al-Aqdām fī ʿIlm al-Kalām*)
#   - Sayf al-Dīn al-Āmidī (631 AH — *al-Iḥkām fī Uṣūl
#     al-Aḥkām* and *Abkār al-Afkār*)
#   - Sirāj al-Dīn al-Urmawī (682 AH — *Maṭāliʿ al-Anwār*
#     logic-kalām compendium)
#   - al-Ījī ʿAḍud al-Dīn (756 AH — *al-Mawāqif fī ʿIlm
#     al-Kalām*)
#   - al-Sharīf al-Jurjānī (816 AH — *Sharḥ al-Mawāqif*
#     and *al-Taʿrīfāt*)
#   - al-Lāqānī (1041 AH — *Jawharat al-Tawḥīd*, Ashʿarī
#     creed *matn* in Maliki Egypt)
#   - Aḥmad al-Dardīr (1201 AH — *al-Kharīda al-Bahiyya*,
#     a versified Ashʿarī creed)
#
# Sourcing. Pre-1000 AH figures are anchored in the classical
# wafayāt corpus (Ibn Khallikān, al-Dhahabī's *Siyar* and
# *Tārīkh al-Islām*, Ibn Kathīr's *Bidāya*, Ibn Ḥajar's
# *al-Durar al-Kāmina*, Ibn al-ʿImād's *Shadharāt al-Dhahab*).
# Post-1000 AH figures (al-Lāqānī, al-Bayāḍī, al-Dardīr) carry
# the latest classical witness available — Ibn al-ʿImād through
# his terminal year (al-Lāqānī alone falls inside *Shadharāt*) —
# plus EI2 and editorial cross-reference, matching the
# convention established for late figures elsewhere in the
# dataset (cf. file 68 for the late-madhhab codifiers).
#
# Year-precision is used throughout. Several of these figures
# have day-precise dates in single classical witnesses (e.g.
# Ibn Khallikān gives 4 Ṣafar 631 for al-Āmidī), but the
# day-precise attestations are not unanimous across the
# canonical sources, and the dataset's convention for
# theologian deaths is to use the precision that classical
# sources cross-confirm. Year is what they agree on.

events:
