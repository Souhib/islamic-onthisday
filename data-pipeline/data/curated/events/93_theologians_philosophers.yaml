  - slug: death-of-al-sharif-al-jurjani
    category: scholar_death
    title_en: Death of al-Sharīf al-Jurjānī — Author of *al-Taʿrīfāt* and *Sharḥ al-Mawāqif*
    title_ar: وفاة السيد الشريف الجرجاني — مصنف «التعريفات» و«شرح المواقف»
    title_fr: Mort d'al-Sharīf al-Jurjānī — auteur des *Taʿrīfāt* et de *Sharḥ al-Mawāqif*
    description_en: |
      al-Sayyid al-Sharīf ʿAlī ibn Muḥammad al-Jurjānī, Shafiʿi-
      Ashʿarī polymath of Timurid Shīrāz, foremost commentator of
      al-Ījī and the figure who fixed the late-Sunni technical
      lexicon, died in Shīrāz in 816 AH. His *Sharḥ al-Mawāqif* is
      the indispensable companion to al-Ījī's *al-Mawāqif* and
      together with it forms the canonical post-classical Sunni
      kalām pair. His *al-Taʿrīfāt* is the standard dictionary of
      Islamic technical terminology across kalām, fiqh, uṣūl,
      logic, grammar, and Sufism, in continuous madrasa use to
      this day. He also composed glosses on al-Taftāzānī's *Sharḥ
      al-Maqāṣid*, on al-Bayḍāwī's *Anwār al-Tanzīl*, and on the
      logic and grammar curriculum (*Ḥāshiyat al-Sayyid* on
      al-Kātibī's *al-Shamsiyya*). His confrontations with
      al-Taftāzānī at the Timurid court of Samarqand are a
      formative chapter in the late-Sunni intellectual tradition.
      Ibn Ḥajar al-ʿAsqalānī gives the death-year in *al-Durar
      al-Kāmina*; Ibn al-ʿImād confirms in *Shadharāt al-Dhahab*.
    description_ar: |
      توفي الإمام السيد الشريف علي بن محمد الجرجاني — أحد أعلام
      الموسوعيين من الشافعية الأشاعرة في تيمورية شيراز، أكبر شرّاح
      الإيجي، وضابط لغة المصطلحات في علوم أهل السنة المتأخرين —
      بشيراز سنة ست عشرة وثمانمئة. وشرحه «شرح المواقف» على «مواقف»
      الإيجي صاحبه ضرورة عند طلبة الكلام، يكوّن معه ثنائية المتن
      المعتمد في الكلام السني المتأخر. وكتابه «التعريفات» هو معجم
      المصطلحات في الكلام والفقه والأصول والمنطق والنحو والتصوف،
      لا يستغني عنه طالب علم في المدارس إلى اليوم. وله حواشٍ على
      «شرح المقاصد» للتفتازاني، و«أنوار التنزيل» للبيضاوي، وحاشيته
      المعروفة بـ«حاشية السيد» على «شمسية» الكاتبي في المنطق. وأمّا
      مناظراته مع التفتازاني في بلاط تيمور بسمرقند فهي من فصول
      التراث الفكري السني المتأخر المؤسسة. ذكر وفاته ابن حجر في
      «الدرر الكامنة»، وأقرّه ابن العماد في «شذرات الذهب».
    description_fr: |
      al-Sayyid al-Sharīf ʿAlī ibn Muḥammad al-Jurjānī, polymathe
      shafiʿite-ashʿarite du Shīrāz timouride, le plus grand
      commentateur d'al-Ījī et la figure qui fixa le lexique
      technique sunnite tardif, mourut à Shīrāz en 816 H. Son
      *Sharḥ al-Mawāqif* est le compagnon indispensable des
      *Mawāqif* d'al-Ījī, et ensemble ils forment le couple
      canonique du *kalām* sunnite post-classique. Ses *Taʿrīfāt*
      sont le dictionnaire standard de la terminologie technique
      islamique à travers le *kalām*, le fiqh, l'uṣūl, la logique,
      la grammaire et le tasawwuf, en usage continu dans les
      madrasas jusqu'à ce jour. Il composa également des gloses
      sur le *Sharḥ al-Maqāṣid* d'al-Taftāzānī, sur les *Anwār
      al-Tanzīl* d'al-Bayḍāwī, et sur le programme de logique et
      de grammaire (*Ḥāshiyat al-Sayyid* sur *al-Shamsiyya*
      d'al-Kātibī). Ses confrontations avec al-Taftāzānī à la cour
      timouride de Samarcande constituent un chapitre fondateur de
      la tradition intellectuelle sunnite tardive. Ibn Ḥajar
      al-ʿAsqalānī donne l'année de sa mort dans *al-Durar
      al-Kāmina*; Ibn al-ʿImād confirme dans *Shadharāt al-Dhahab*.
