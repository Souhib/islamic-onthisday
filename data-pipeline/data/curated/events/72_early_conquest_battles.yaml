# Wave 72 of curated event additions (2026-04-27).
# 14 early Islamic conquest battles and sieges of the 1st-2nd centuries
# AH not yet in the dataset. Covers Khalid ibn al-Walid's Iraq campaign
# of 12 AH (al-Walaja, Ullais, al-Anbar, Faraz), the Levant campaign
# under Abu Bakr and Umar (Ajnadayn, Fahl), the post-Qadisiyya thrust
# into Persia (Jalulaʾ, conquest of al-Madaʾin/Ctesiphon, Isfahan,
# Hamadhan), the late-Rashidun-Umayyad penetration of Khurasan (Marw),
# Qutayba ibn Muslim's Transoxanian campaign (Samarqand), Muhammad
# ibn al-Qasim's advance to Multan, and the Aghlabid conquest of
# Palermo on Sicily. Already covered elsewhere and intentionally not
# duplicated: Battle of Yarmouk (00_legacy), Battle of Qadisiyyah
# (00_legacy), Battle of Buwayb and Marj al-Suffar (26_), Battle of
# Nahavand and Conquest of Damascus (02_rashidun_additions),
# Muhammad ibn Qasim's overall Sind campaign (03_umayyad_abbasid),
# Muslim Conquest of Sicily begins under Asad ibn al-Furat
# (14_classical_companions_scholars).
#
# All events attested in al-Tabari Tarikh al-Rusul wa'l-Muluk (the
# essential early-Islamic chronicle) and cross-verified with at least
# one of: Ibn al-Athir al-Kamil fi al-Tarikh, Ibn Kathir al-Bidaya
# wa'l-Nihaya, al-Dhahabi Tarikh al-Islam. Dates follow the al-Tabari
# year-attestation; many of these early battles attest only the year,
# not the month or day. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # KHALID IBN AL-WALID'S IRAQ CAMPAIGN — 12 AH / 633 CE
  # =========================================================================

  - slug: battle-of-al-walaja
    category: battle
    title_en: Battle of al-Walaja — Khalid ibn al-Walid's Double Envelopment in Iraq
    title_ar: معركة الولجة — خالد بن الوليد في فتح العراق
    title_fr: Bataille d'al-Walaja — la double enveloppe de Khālid ibn al-Walīd en Irak
    description_en: |
      The fourth pitched engagement of Khālid ibn al-Walīd's Iraq
      campaign of 12 AH, fought on the lower Euphrates west of
      al-Ḥīra against a combined Sasanian-Arab Christian force
      under the Persian commander Andarzaghar. al-Ṭabarī describes
      Khālid drawing up two concealed reserves on the flanks and
      executing a double envelopment that crushed the Persian
      centre — a manoeuvre Western military historians liken to
      Hannibal's encirclement at Cannae. The victory cleared the
      route to Ullais and brought the Christian Arab tribes of
      the lower Euphrates into the Muslim sphere. al-Ṭabarī and
      Ibn al-Athīr both place al-Walaja in Ṣafar 12 AH; precision
      below the year is reported only by al-Ṭabarī. We follow
      al-Ṭabarī's year and month attestation as the dominant
      classical record.
    description_ar: |
      المعركة الميدانية الرابعة من حملة خالد بن الوليد في فتح
      العراق سنة ١٢ هـ، جرت على الفرات الأدنى غربي الحيرة، ضد
      تحالف ساساني عربي مسيحي قاده القائد الفارسي «أندرزغر».
      يصف الطبري كيف أعدّ خالد كمينين مستترين على الجناحين
      ونفّذ التفافاً مزدوجاً سحق به قلب الجيش الفارسي — وهي
      مناورة شبهها مؤرخو الحرب في الغرب بحصار حنبعل في كانّيه.
      وفتح النصر الطريقَ إلى أُليس، وأدخل قبائلَ نصارى العرب
      على الفرات الأدنى في فلك الإسلام. ويذكر الطبري وابن الأثير
      أن المعركة كانت في صفر سنة ١٢ هـ، وانفرد الطبري بتحديد
      الشهر دون اليوم. وقد تابعنا روايته بحكم تقدّمه ودقّته في
      الإسناد التاريخي.
    description_fr: |
      Le quatrième engagement rangé de la campagne irakienne de
      Khālid ibn al-Walīd en 12 H, livré sur l'Euphrate inférieur
      à l'ouest d'al-Ḥīra contre une force combinée sassanide–arabe
      chrétienne commandée par le chef perse Andarzaghar.
      al-Ṭabarī décrit Khālid disposant deux réserves dissimulées
      sur les ailes et exécutant une double enveloppe qui écrasa
      le centre perse — une manœuvre que les historiens militaires
      occidentaux comparent à l'encerclement d'Hannibal à Cannes.
      La victoire ouvrit la route d'Ullais et fit basculer les
      tribus arabes chrétiennes de l'Euphrate inférieur dans la
      sphère musulmane. al-Ṭabarī et Ibn al-Athīr placent tous
      deux al-Walaja en Ṣafar 12 H; la précision en deçà de
      l'année n'est rapportée que par al-Ṭabarī. Nous suivons sa
      lecture comme le record classique dominant.
    canonical_hijri: {year: 12, month: 2, precision: month}
    canonical_gregorian: {date: 633-05-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the battle of al-Walaja under the events of 12 AH and describes Khālid's double envelopment of Andarzaghar's army."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil fi al-Tārīkh confirms al-Walaja in 12 AH and the engagement on the lower Euphrates."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya enters the battle under 12 AH."
    people: [[khalid-ibn-al-walid, leader]]
    tags: [rashidun, battle, iraq, euphrates, khalid, sasanian]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-ullais
    category: battle
    title_en: Battle of Ullais — Khalid Crushes the Sasanian-Arab Coalition on the Euphrates
    title_ar: معركة أُلَّيس — خالد يسحق التحالف الفارسي العربي على الفرات
    title_fr: Bataille d'Ullais — Khālid écrase la coalition sassanide-arabe sur l'Euphrate
    description_en: |
      Fought a few days after al-Walaja in 12 AH on a tributary
      of the Euphrates near the modern Iraqi-Kuwaiti border,
      Ullais saw Khālid ibn al-Walīd defeat a second Sasanian-Arab
      Christian army under the Persian commander Jaban and the
      Banū Bakr ibn Wāʾil. al-Ṭabarī reports the famous "river of
      blood" episode in which Khālid had vowed to make blood run
      like water if granted victory; the chronicler notes that
      after the slaughter the field was so soaked that mills along
      the banks could not be turned. Modern historians read the
      detail as rhetorical hyperbole emphasising the totality of
      the rout — the Sasanian field army in lower Iraq ceased to
      exist as a coherent force and the road to al-Ḥīra was opened.
      al-Ṭabarī, Ibn al-Athīr, and Ibn Kathīr all enter the
      engagement under 12 AH.
    description_ar: |
      جرت بعد الولجة بأيام سنة ١٢ هـ على رافد من روافد الفرات
      قرب الحدود العراقية الكويتية الحالية. هزم فيها خالد بن
      الوليد جيشاً ثانياً فارسياً عربياً مسيحياً بقيادة القائد
      الفارسي «جابان» وبني بكر بن وائل. ويذكر الطبري قصة «نهر
      الدم» الشهيرة، إذ كان خالد قد نذر — إن فتح الله عليه — أن
      يجري الدم في النهر كالماء، فلما وقعت الواقعة بُلّت ضفافه
      دماً حتى عجزت الأرحاء التي عليه عن الدوران. ويرى مؤرخو
      الحرب الحديثون في هذا التفصيل مبالغة بلاغية تؤكد كمال
      الهزيمة — إذ زال جيش الفرس الميداني في جنوبي العراق ولم
      يعد قوة منظّمة، وانفتح الطريق إلى الحيرة. وقد دوّن المعركة
      الطبري وابن الأثير وابن كثير في حوادث سنة ١٢ هـ.
    description_fr: |
      Livrée quelques jours après al-Walaja en 12 H sur un
      affluent de l'Euphrate près de l'actuelle frontière
      irako-koweïtienne, Ullais vit Khālid ibn al-Walīd vaincre
      une seconde armée sassanido-arabe chrétienne commandée par
      le Perse Jabān et les Banū Bakr ibn Wāʾil. al-Ṭabarī
      rapporte le fameux épisode du « fleuve de sang » : Khālid
      avait juré de faire couler le sang comme de l'eau si la
      victoire lui était accordée; le chroniqueur note qu'après
      le massacre les rives furent tellement imbibées que les
      moulins n'y pouvaient plus tourner. Les historiens modernes
      y lisent une hyperbole rhétorique soulignant l'ampleur de
      la déroute — l'armée sassanide de campagne en Irak inférieur
      cessa d'exister comme force cohérente et la route d'al-Ḥīra
      fut ouverte. al-Ṭabarī, Ibn al-Athīr et Ibn Kathīr
      enregistrent tous l'engagement sous l'année 12 H.
    canonical_hijri: {year: 12, month: 2, precision: month}
    canonical_gregorian: {date: 633-05-15, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī describes the engagement at Ullais under 12 AH and reports the 'river of blood' episode."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr enters Ullais under 12 AH following al-Walaja."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr confirms the engagement in 12 AH."
    people: [[khalid-ibn-al-walid, leader]]
    tags: [rashidun, battle, iraq, euphrates, khalid, sasanian]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: conquest-of-al-anbar
    category: siege
    title_en: Conquest of al-Anbār — "the Battle of the Eyes" on the Upper Euphrates
    title_ar: فتح الأنبار — «ذات العيون» على الفرات الأعلى
    title_fr: Conquête d'al-Anbār — la « bataille des yeux » sur le haut Euphrate
    description_en: |
      Following the fall of al-Ḥīra in 12 AH, Khālid ibn al-Walīd
      marched north along the Euphrates to the fortified Sasanian
      provincial capital of al-Anbār — a major granary on a bend
      of the river that had once been the Lakhmid winter quarters.
      The siege is remembered as Dhāt al-ʿUyūn ("the Affair of
      the Eyes") because al-Ṭabarī records that Khālid ordered
      his archers to target the defenders' eyes specifically —
      a thousand eyes were said to have been put out in a single
      day — until the Sasanian commander negotiated capitulation
      on terms. The fortified city fell intact, its grain stores
      were taken to provision the Muslim army, and the population
      remained Christian under the *jizya*. al-Anbār would later
      become the first Abbasid capital before the founding of
      Baghdad. Both al-Ṭabarī and Ibn al-Athīr place the conquest
      in 12 AH.
    description_ar: |
      بعد فتح الحيرة سنة ١٢ هـ، سار خالد بن الوليد شمالاً مع
      الفرات إلى عاصمة الإقليم الساسانية المحصّنة «الأنبار» —
      مخزن غلال كبير على منحنى من النهر، كانت فيما مضى مشتى
      ملوك المناذرة اللخميين. وعُرف الحصار بـ«ذات العيون» لأن
      الطبري ذكر أن خالداً أمر رماته بأن يقصدوا أعين المدافعين
      على الأسوار خاصة، فقُلعت ألفُ عينٍ في يوم واحد، حتى أذعن
      القائد الفارسي للصلح بشروط، فسلَّم المدينة المحصّنة سالمةً،
      وأُخذت أهراؤها مَؤونةً للجيش، وبقي أهلها على نصرانيتهم
      تحت الجزية. وستصبح الأنبار لاحقاً أولَ عاصمة عبّاسية قبل
      تأسيس بغداد. ويضع الطبري وابن الأثير الفتح في سنة ١٢ هـ.
    description_fr: |
      Après la chute d'al-Ḥīra en 12 H, Khālid ibn al-Walīd
      marcha vers le nord le long de l'Euphrate jusqu'à la
      capitale provinciale sassanide fortifiée d'al-Anbār — un
      grand grenier à blé sur un coude du fleuve, ancien
      quartier d'hiver des Lakhmides. Le siège est resté connu
      sous le nom de Dhāt al-ʿUyūn (« l'Affaire des yeux »)
      parce qu'al-Ṭabarī rapporte que Khālid ordonna à ses
      archers de viser précisément les yeux des défenseurs sur
      les remparts — mille yeux auraient été crevés en une
      seule journée — jusqu'à ce que le commandant sassanide
      négociât la capitulation. La ville fortifiée tomba intacte,
      ses greniers approvisionnèrent l'armée musulmane, et la
      population resta chrétienne sous la *jizya*. al-Anbār
      deviendrait plus tard la première capitale abbasside avant
      la fondation de Bagdad. al-Ṭabarī et Ibn al-Athīr placent
      tous deux la conquête en 12 H.
    canonical_hijri: {year: 12, precision: year}
    canonical_gregorian: {date: 633-07-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī describes the siege of al-Anbār under 12 AH and the 'Dhāt al-ʿUyūn' archery episode."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr confirms the conquest in 12 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr enters the conquest of al-Anbār under 12 AH."
    people: [[khalid-ibn-al-walid, leader]]
    tags: [rashidun, siege, iraq, euphrates, khalid, sasanian, anbar]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: battle-of-firad
    category: battle
    title_en: Battle of Firāḍ — Khalid's Last Engagement in Iraq before Syria
    title_ar: معركة الفِراض — آخر مواقع خالد في العراق قبل التحوّل إلى الشام
    title_fr: Bataille de Firāḍ — le dernier engagement de Khālid en Irak avant la Syrie
    description_en: |
      The last battle of Khālid ibn al-Walīd's Iraq campaign,
      fought at Firāḍ on the upper Euphrates near the Byzantine
      frontier in Dhū al-Qaʿda 12 AH. al-Ṭabarī describes the
      engagement as a three-way confrontation: Khālid faced a
      combined force of Sasanian regulars, Byzantine federates
      from the Banū Taghlib, and Christian Arabs of Iyād and
      Namir who had crossed the river to oppose the Muslim
      advance. Khālid let the coalition cross the Euphrates to
      his side, then defeated it in detail. The battle ended
      Sasanian-Byzantine cooperation on the upper Euphrates and
      cleared the strategic flank for the diversion of Khālid's
      force to the Levant — the famous overland march across
      the Syrian Desert to Damascus the following Muharram of
      13 AH. al-Ṭabarī gives Dhū al-Qaʿda 12 AH as the date;
      Ibn al-Athīr confirms the year and the redirection to
      Syria immediately after.
    description_ar: |
      آخر مواقع خالد بن الوليد في حملة العراق، جرت في الفِراض
      على الفرات الأعلى قرب التخوم البيزنطية في ذي القعدة سنة
      ١٢ هـ. ويصفها الطبري مواجهةً ثلاثية: واجه خالد فيها
      قواتٍ مشتركةً من الفرس النظاميين، وحلفاءَ الروم من بني
      تغلب، ومن نصارى العرب من إياد ونمر الذين عبروا النهر
      ليعارضوا التقدّم الإسلامي. أذن خالد للتحالف بأن يعبر
      الفرات إلى جهته، ثم هزمه شذراً مذراً. وأنهت المعركةُ
      التعاونَ الساساني البيزنطي على الفرات الأعلى، وأمَّنت
      الجناحَ الاستراتيجي لتحويل قوة خالد إلى بلاد الشام —
      ذلك المسير البرّي الشهير عبر بادية الشام إلى دمشق في
      محرم من العام التالي ١٣ هـ. ويذكر الطبري التاريخ في ذي
      القعدة سنة ١٢ هـ، ويؤكد ابن الأثير السنة وتوجّه خالد
      من فوره إلى الشام.
    description_fr: |
      La dernière bataille de la campagne irakienne de Khālid
      ibn al-Walīd, livrée à Firāḍ sur le haut Euphrate près
      de la frontière byzantine en Dhū al-Qaʿda 12 H. al-Ṭabarī
      la décrit comme une confrontation tripartite : Khālid
      affronta une force combinée de réguliers sassanides, de
      fédérés byzantins des Banū Taghlib et d'Arabes chrétiens
      d'Iyād et Namir qui avaient traversé le fleuve pour
      s'opposer à l'avancée musulmane. Khālid laissa la coalition
      passer l'Euphrate de son côté, puis la défit en détail.
      La bataille mit fin à la coopération sassanide-byzantine
      sur le haut Euphrate et dégagea le flanc stratégique pour
      la diversion de la force de Khālid vers le Levant — la
      célèbre marche terrestre à travers le désert syrien
      jusqu'à Damas en Muḥarram 13 H. al-Ṭabarī donne Dhū
      al-Qaʿda 12 H comme date; Ibn al-Athīr confirme l'année
      et la redirection immédiate vers la Syrie.
    canonical_hijri: {year: 12, month: 11, precision: month}
    canonical_gregorian: {date: 634-01-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters Firāḍ under Dhū al-Qaʿda 12 AH and describes Khālid's three-way engagement before the redeployment to Syria."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr confirms Firāḍ in 12 AH and immediately precedes the Syrian campaign."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr enters Firāḍ under 12 AH."
    people: [[khalid-ibn-al-walid, leader]]
    tags: [rashidun, battle, iraq, euphrates, khalid, sasanian, byzantine]
    importance: notable
