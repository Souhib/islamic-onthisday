  # =========================================================================

  - slug: founding-of-united-arab-emirates
    category: political_event
    title_en: Founding of the United Arab Emirates
    title_ar: قيام دولة الإمارات العربية المتحدة
    title_fr: Fondation des Émirats arabes unis
    description_en: |
      Six of the seven former Trucial States of the lower Gulf
      coast — Abū Ẓaby, Dubayy, al-Shāriqa, ʿAjmān, Umm
      al-Quwayn, and al-Fujayra — federated to form the United
      Arab Emirates (*al-Imārāt al-ʿArabiyya al-Muttaḥida*) on
      14 Shawwāl 1391 AH (2 December 1971 CE), one day after
      the British protective treaties of 1820, 1853, 1892, and
      subsequent agreements lapsed. Ras al-Khaymah joined as
      the seventh emirate on 10 February 1972. Shaykh Zāyid
      ibn Sulṭān Āl Nahyān of Abū Ẓaby — long-serving emir of
      the largest member-state — was elected the first
      president of the federation, and Shaykh Rāshid ibn Saʿīd
      Āl Maktūm of Dubayy was named first vice-president and
      prime minister. The federation contains a Sunni Mālikī
      and Hanbalī majority, the historic Bani Yas, Qawasim, and
      other Arab tribal confederations of the lower Gulf, and
      since the 1958 oil discoveries has become one of the
      principal financial and commercial centres of the wider
      Arab and Muslim world. The 2 December is observed
      annually as the National Day.
    description_ar: |
      اتحدت ست من الإمارات السبع الساحلية في الخليج العربي
      السفلي — أبو ظبي ودبي والشارقة وعجمان وأم القيوين
      والفجيرة — في «دولة الإمارات العربية المتحدة» يوم
      ١٤ شوال سنة ١٣٩١ هـ (الموافق ٢ ديسمبر ١٩٧١ ميلادي)،
      بعد يوم واحد من انقضاء معاهدات الحماية البريطانية
      السابقة لسنة ١٨٢٠ و١٨٥٣ و١٨٩٢ ميلادي وما تلاها. ثم
      انضمت رأس الخيمة إمارةً سابعةً في ١٠ فيفري ١٩٧٢
      ميلادي. وانتُخب الشيخ زايد بن سلطان آل نهيان أمير
      أبو ظبي — وهي كبرى الإمارات الأعضاء — أوّلَ رئيس
      للاتحاد، وعُيّن الشيخ راشد بن سعيد آل مكتوم أمير
      دبي نائباً للرئيس ورئيساً للوزراء. والاتحاد ذو
      أغلبية سنية مالكية وحنبلية، يحوي القبائل العربية
      التاريخية في الخليج السفلي من بني ياس والقواسم
      وغيرهم، وقد صار منذ اكتشافات النفط سنة ١٩٥٨ ميلادي
      أحد أكبر المراكز المالية والتجارية في العالمين
      العربي والإسلامي عامة. ويُحتفل بـ٢ ديسمبر سنوياً
      عيداً وطنياً.
    description_fr: |
      Six des sept anciens États de la Trêve de la côte
      inférieure du Golfe — Abū Ẓaby, Dubayy, al-Shāriqa,
      ʿAjmān, Umm al-Quwayn et al-Fujayra — fédèrent leurs
      souverainetés pour former les Émirats arabes unis (*al-
      Imārāt al-ʿArabiyya al-Muttaḥida*) le 14 Shawwāl
      1391 H (2 décembre 1971 EC), un jour après l'expiration
      des traités de protection britanniques de 1820, 1853,
      1892 et accords subséquents. Ras al-Khaymah rejoignit
      la fédération comme septième émirat le 10 février 1972.
      Le cheikh Zāyid ibn Sulṭān Āl Nahyān d'Abū Ẓaby —
      émir de longue date du plus grand des États membres —
      fut élu premier président de la fédération, et le
      cheikh Rāshid ibn Saʿīd Āl Maktūm de Dubayy nommé
      premier vice-président et Premier ministre. La
      fédération abrite une majorité sunnite malikite et
      ḥanbalite, les confédérations tribales arabes
      historiques du Golfe inférieur — les Bani Yas, les
      Qawasim et autres — et est devenue depuis les
      découvertes pétrolières de 1958 l'un des principaux
      centres financiers et commerciaux du monde arabe et
      musulman au sens large. Le 2 décembre est célébré
      chaque année comme fête nationale.
    canonical_hijri: {year: 1391, month: 10, day: 13, precision: day}
    canonical_gregorian: {date: 1971-12-02, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-Imārāt al-ʿArabiyya al-Muttaḥida' dates the founding of the federation to 2 December 1971 with six emirates, joined by Ras al-Khaymah on 10 February 1972."
      - source_key: editorial
