  - slug: independence-of-brunei-1984
    category: political_event
    title_en: Independence of Brunei
    title_ar: استقلال بروناي
    title_fr: Indépendance de Brunei
    description_en: |
      The Sultanate of Brunei Darussalam — the historic
      Malay-Muslim sultanate of north-western Borneo, founded
      according to local tradition in the late thirteenth or
      early fourteenth century and consolidated under Sultan
      Bolkiah (r. 1485-1524 CE) at the height of its
      regional power — regained full independence from the
      United Kingdom on 27 Rabīʿ al-Ākhir 1404 AH (1 January
      1984 CE), ending a British protectorate that had been in
      force since 1888. Sultan Ḥasan al-Bolkiah Muʿizz al-Dīn
      Wa al-Dawla — the 29th sultan, who had ascended the
      throne in 1967 — assumed the offices of head of state,
      prime minister, minister of defence, and minister of
      finance, and the *Melayu Islam Beraja* ("Malay Islamic
      Monarchy") doctrine became the official national
      philosophy. Brunei is a Sunni Shāfiʿī country and the
      sultan is the religious head as well as the political
      sovereign; the *Mahkamah Syariah* operates as the
      state's Islamic-law jurisdiction alongside the civil
      courts. Brunei joined the United Nations and ASEAN in
      1984 and the Organisation of Islamic Cooperation in
      1984. The 23 February is observed as the National Day,
      following the 1984 ratification of the formal
      independence ceremony.
    description_ar: |
      استرجعت سلطنة بروناي دار السلام — السلطنة الملاوية
      المسلمة التاريخية في شمال غرب جزيرة بورنيو، التي تروي
      التقاليد المحلية تأسيسها في أواخر القرن السابع الهجري
      أو مطلع الثامن، وبلغت أوجها في عهد السلطان بلكيه
      (المتوفى نحو سنة ٩٣٠ هـ / ١٥٢٤ ميلادي) — استقلالها
      الكامل عن المملكة المتحدة يوم ٢٧ ربيع الآخر سنة
      ١٤٠٤ هـ (الموافق فاتح جانفي ١٩٨٤ ميلادي)، فأنهت بذلك
      الحماية البريطانية القائمة منذ سنة ١٨٨٨ ميلادي.
      وتولّى السلطان حسن البلقيه معز الدين والدولة — السلطان
      التاسع والعشرون، الذي اعتلى العرش سنة ١٩٦٧ ميلادي —
      مناصبَ رئيس الدولة ورئيس الوزراء ووزير الدفاع ووزير
      المالية، وصارت عقيدة «ملايو إسلام براجا» («الملكية
      الإسلامية الملاوية») الفلسفة الرسمية الوطنية. وبروناي
      بلد سني شافعي، السلطان فيها رأس الدين ورأس السلطة
      السياسية، وتعمل «المحكمة الشرعية» قضاءً شرعياً إلى
      جانب القضاء المدني. وانضمت بروناي إلى الأمم المتحدة
      ورابطة دول جنوب شرق آسيا (آسيان) سنة ١٩٨٤ ميلادي،
      وإلى منظمة التعاون الإسلامي في تلك السنة. ويحتفل
      بـ٢٣ فيفري عيداً وطنياً، تخليداً لمراسم الاستقلال
      الرسمية سنة ١٩٨٤ ميلادي.
    description_fr: |
      Le Sultanat du Brunei Darussalam — sultanat malais-
      musulman historique du nord-ouest de Bornéo, fondé selon
      la tradition locale à la fin du XIIIe ou au début du
      XIVe siècle EC et consolidé sous le sultan Bolkiah
      (r. 1485-1524 EC) à l'apogée de sa puissance régionale —
      retrouva sa pleine indépendance du Royaume-Uni le
      27 Rabīʿ al-Ākhir 1404 H (1er janvier 1984 EC), mettant
      fin à un protectorat britannique en vigueur depuis
      1888. Le sultan Ḥasan al-Bolkiah Muʿizz al-Dīn Wa
      al-Dawla — 29e sultan, monté sur le trône en 1967 —
      assuma les fonctions de chef d'État, Premier ministre,
      ministre de la Défense et ministre des Finances, et la
      doctrine du *Melayu Islam Beraja* (« Monarchie
      islamique malaise ») devint la philosophie nationale
      officielle. Brunei est un pays sunnite shāfiʿite, le
      sultan en est le chef religieux autant que le souverain
      politique, et la *Mahkamah Syariah* fonctionne comme
      juridiction islamique de l'État aux côtés des tribunaux
      civils. Brunei adhéra à l'Organisation des Nations
      unies et à l'ASEAN en 1984, ainsi qu'à l'Organisation
      de la Coopération islamique cette même année. Le 23
      février est célébré comme fête nationale,
      commémorant la cérémonie officielle d'indépendance
      de 1984.
