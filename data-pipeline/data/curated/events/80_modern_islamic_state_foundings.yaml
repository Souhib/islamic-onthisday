  - slug: independence-of-tunisia-1956
    category: political_event
    title_en: Independence of Tunisia
    title_ar: استقلال تونس
    title_fr: Indépendance de la Tunisie
    description_en: |
      The Regency of Tunis recovered its sovereignty by the
      Franco-Tunisian protocol signed in Paris on 7 Shaʿbān
      1375 AH (20 March 1956 CE), terminating the French
      protectorate that had been imposed by the Treaty of Bardo
      in 1881 and the al-Marsā Convention of 1883. The bey
      Muḥammad VIII al-Amīn remained head of state for one
      year; on 25 July 1957 the Constituent Assembly abolished
      the beylicate and declared the Tunisian Republic, with
      Ḥabīb Būrqība — leader of the Néo-Destour and the
      principal architect of the independence negotiations — as
      first president. The new republic adopted the *Code du
      Statut Personnel* on 13 August 1956, a substantial reform
      of Mālikī personal-status law (abolition of polygamy,
      raising of marriage age, formalisation of divorce
      procedure) that remained unique in the Arab world for
      decades. Tunisia, a Sunni Mālikī country with the
      historic al-Zaytūna mosque-university at Tunis (founded
      85 AH/704 CE), joined the Arab League and the United
      Nations in 1956. The 20 March is observed annually as
      the national independence day.
    description_ar: |
      استرجعت إيالة تونس سيادتها بالبروتوكول الفرنسي التونسي
      الموقّع بباريس يوم ٧ شعبان سنة ١٣٧٥ هـ (الموافق ٢٠
      مارس ١٩٥٦ ميلادي)، فأنهى الحمايةَ الفرنسية التي فرضت
      بمعاهدة باردو سنة ١٢٩٨ هـ (١٨٨١ ميلادي) واتفاقية المرسى
      سنة ١٣٠٠ هـ (١٨٨٣ ميلادي). وبقي الباي محمد الأمين رأسَ
      الدولة سنةً واحدة، ثم ألغى المجلس التأسيسي البايليك
      في ٢٥ جويلية ١٩٥٧ ميلادي وأعلن «الجمهورية التونسية»،
      وانتُخب الحبيب بورقيبة — زعيم الحزب الحرّ الدستوري
      الجديد ومهندس مفاوضات الاستقلال — أوّلَ رئيس لها.
      واعتمدت الجمهورية الجديدة «مجلة الأحوال الشخصية» في
      ١٣ أوت ١٩٥٦ ميلادي، وهي إصلاح كبير لأحكام الأحوال
      الشخصية في الفقه المالكي (تحريم تعدد الزوجات ورفع سن
      الزواج وتقنين الطلاق)، فظلَّ تشريعاً متفرداً في
      العالم العربي عقوداً. وتونس بلد سني مالكي يحوي جامع
      الزيتونة العتيق بتونس العاصمة (المؤسس سنة ٨٥ هـ /
      ٧٠٤ ميلادي). وانضمت تونس إلى الجامعة العربية والأمم
      المتحدة سنة ١٩٥٦ ميلادي. ويحتفل بـ٢٠ مارس سنوياً
      عيداً للاستقلال الوطني.
    description_fr: |
      La Régence de Tunis recouvra sa souveraineté par le
      protocole franco-tunisien signé à Paris le 7 Shaʿbān
      1375 H (20 mars 1956 EC), mettant fin au protectorat
      français imposé par le traité du Bardo en 1881 et la
      convention d'al-Marsā en 1883. Le bey Muḥammad VIII
      al-Amīn demeura chef d'État pendant un an ; le 25
      juillet 1957 l'Assemblée constituante abolit le
      beylicat et proclama la République tunisienne, avec
      Ḥabīb Būrqība — chef du Néo-Destour et principal
      architecte des négociations d'indépendance — comme
      premier président. La nouvelle république adopta le
      *Code du Statut Personnel* le 13 août 1956, réforme
      substantielle du droit personnel malikite (abolition de
      la polygamie, élévation de l'âge de mariage,
      formalisation du divorce) restée unique dans le monde
      arabe pendant des décennies. La Tunisie, pays sunnite
      malikite abritant la mosquée-université historique d'al-
      Zaytūna à Tunis (fondée en 85 H/704 EC), adhéra à la
      Ligue arabe et à l'Organisation des Nations unies en
      1956. Le 20 mars est célébré chaque année comme fête
      nationale de l'indépendance.
    canonical_hijri: {year: 1375, month: 8, day: 7, precision: day}
    canonical_gregorian: {date: 1956-03-20, precision: day, method: attested}
