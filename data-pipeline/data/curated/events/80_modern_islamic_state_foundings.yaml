  - slug: independence-of-lebanon-1943
    category: political_event
    title_en: Lebanese Independence
    title_ar: استقلال لبنان
    title_fr: Indépendance du Liban
    description_en: |
      The Republic of Lebanon — a Christian-Muslim plural society
      detached from greater Syria under the French Mandate of
      1920 — achieved de facto independence on 24 Dhū al-Qaʿda
      1362 AH (22 November 1943 CE), the date the French
      authorities released President Bishāra al-Khūrī, prime
      minister Riyāḍ al-Ṣulḥ, and the cabinet that they had
      arrested ten days earlier for amending the constitution to
      remove French oversight. The amendment had passed unanimously
      on 8 November 1943; on 22 November General Catroux ordered
      the release of the imprisoned ministers under combined
      Lebanese, Arab, British, and American pressure, and the
      flag of independent Lebanon — adopted on 7 December 1943
      with its central cedar — replaced the Mandate flag. The
      National Pact (*al-Mīthāq al-Waṭanī*) of summer 1943,
      negotiated between al-Khūrī and al-Ṣulḥ, distributed the
      principal political offices between Maronite Christian,
      Sunni Muslim, and Shīʿī Muslim communities — the Maronite
      presidency, Sunni premiership, Shīʿī speakership — and
      remains the constitutional framework of the modern republic.
      The country has a Sunni and Shīʿī Muslim plurality of long
      standing and contains numerous foundational sites of
      Islamic learning along the Mediterranean littoral.
    description_ar: |
      نالت الجمهورية اللبنانية — وهي مجتمع متعدد بين المسيحيين
      والمسلمين فُصل عن سوريا الكبرى تحت الانتداب الفرنسي سنة
      ١٩٢٠ ميلادي — استقلالها الفعلي يوم ٢٤ ذي القعدة سنة
      ١٣٦٢ هـ (الموافق ٢٢ نوفمبر ١٩٤٣ ميلادي) وهو اليوم الذي
      أفرجت فيه السلطات الفرنسية عن رئيس الجمهورية بشارة
      الخوري ورئيس الوزراء رياض الصلح والوزراء الذين كانت قد
      اعتقلتهم قبل عشرة أيام بسبب تعديل الدستور لإزالة الوصاية
      الفرنسية. وكان التعديل قد أُقرَّ بالإجماع يوم ٨ نوفمبر؛
      وفي ٢٢ نوفمبر أمر الجنرال كاترو بالإفراج عن الوزراء
      المعتقلين تحت ضغط لبناني وعربي وبريطاني وأمريكي مشترك،
      وحلَّت راية لبنان المستقل — التي اعتُمدت في ٧ ديسمبر
      ١٩٤٣ ميلادي بأرزتها الوسطى — محل علم الانتداب. وقد
      وزّع «الميثاق الوطني» الذي تفاهم عليه الخوري والصلح في
      صيف ١٩٤٣ ميلادي المناصبَ السياسية الكبرى بين الموارنة
      المسيحيين والسنّة المسلمين والشيعة المسلمين — رئاسة
      الجمهورية للمارونية ورئاسة الوزراء للسنة ورئاسة المجلس
      للشيعة — وما يزال الإطار الدستوري للجمهورية الحديثة.
      ولبنان ذو أكثرية مسلمة سنية وشيعية تاريخية، وتنتشر فيه
      مواقع تأسيسية للتعلم الإسلامي على الساحل المتوسطي.
    description_fr: |
      La République libanaise — société plurielle
      chrétienne-musulmane détachée de la Grande Syrie sous le
      mandat français de 1920 — accéda à l'indépendance de fait
      le 24 Dhū al-Qaʿda 1362 H (22 novembre 1943 EC), date à
      laquelle les autorités françaises libérèrent le président
      Bishāra al-Khūrī, le Premier ministre Riyāḍ al-Ṣulḥ et le
      cabinet qu'elles avaient arrêtés dix jours plus tôt pour
      avoir amendé la constitution afin de supprimer la tutelle
      française. L'amendement avait été adopté à l'unanimité le
      8 novembre 1943 ; le 22 novembre, le général Catroux
      ordonna la libération des ministres emprisonnés sous la
      pression conjointe libanaise, arabe, britannique et
      américaine, et le drapeau du Liban indépendant — adopté
      le 7 décembre 1943 avec son cèdre central — remplaça le
      drapeau du mandat. Le Pacte national (*al-Mīthāq
      al-Waṭanī*) de l'été 1943, négocié entre al-Khūrī et
      al-Ṣulḥ, distribua les principales charges politiques
      entre maronites chrétiens, sunnites musulmans et chiites
      musulmans — présidence maronite, primature sunnite,
      présidence du parlement chiite — et demeure le cadre
      constitutionnel de la république moderne. Le pays a une
      pluralité musulmane sunnite et chiite ancienne et abrite
      de nombreux sites fondateurs de savoir islamique sur le
      littoral méditerranéen.
    canonical_hijri: {year: 1362, month: 11, day: 24, precision: day}
    canonical_gregorian: {date: 1943-11-22, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Lubnān' dates Lebanese de facto independence to 22 November 1943, the day of the release of the arrested government."
      - source_key: editorial
        notes: "Editorial summary; date corroborated in standard Lebanese, French, and Anglophone Middle East political histories."
    tags: [lebanon, modern, independence, french-mandate, national-pact, levant]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Lebanese_Independence_Day"

  - slug: independence-of-indonesia-1945
    category: political_event
    title_en: Indonesian Declaration of Independence
    title_ar: إعلان استقلال إندونيسيا
    title_fr: Déclaration d'indépendance de l'Indonésie
    description_en: |
      Sukarno and Mohammad Hatta — the two principal nationalist
      leaders of the Dutch East Indies — proclaimed the
      independence of the Republic of Indonesia (*Republik
      Indonesia*) at Sukarno's residence on Jalan Pegangsaan
      Timur 56 in Jakarta at 10:00 a.m. on 8 Ramaḍān 1364 AH
      (17 August 1945 CE), two days after the Japanese surrender
      that ended World War II in the Pacific. Indonesia became
      the most populous Muslim-majority state in the world — a
      status it has held continuously since — and the Pancasila
      framework adopted in 1945 made belief in one God the first
      foundational principle of the republic. Dutch military
      attempts to reverse the proclamation through two
      "police actions" (1947, 1948) were defeated; the
      Netherlands transferred sovereignty under the Round Table
      Conference agreement on 27 December 1949. The Indonesian
      republic dates its founding from the 17 August 1945
      proclamation, observed annually as the national day. The
      preamble of the 1945 constitution is opened with the
      *basmala* in Arabic and Indonesian.
    description_ar: |
      أعلن أحمد سوكارنو ومحمد حتّا — الزعيمان الوطنيان لجزر
      الهند الشرقية الهولندية — استقلال جمهورية إندونيسيا
      (*Republik Indonesia*) في دار سوكارنو بشارع بيجانجسأن
      تيمور رقم ٥٦ بجاكرتا في الساعة العاشرة صباحاً يوم
      ٨ رمضان سنة ١٣٦٤ هـ (الموافق ١٧ أوت ١٩٤٥ ميلادي)،
      بعد يومين من استسلام اليابان الذي أنهى الحرب العالمية
      الثانية في المحيط الهادئ. وصارت إندونيسيا أكبر دولة
      ذات أغلبية مسلمة في العالم سكاناً، وما زالت كذلك
      دون انقطاع، ووضع دستور سنة ١٩٤٥ ميلادي «الباندجاسيلا»
      أساساً للجمهورية، أوّلُ مبادئها «الإيمان بإله واحد».
      وقد أخفقت محاولات الجيش الهولندي إلغاء الإعلان
      بـ«عمليتين شرطيتين» سنة ١٩٤٧ و١٩٤٨ ميلادي، ونقلت
      هولندا السيادة باتفاقية مؤتمر المائدة المستديرة في
      ٢٧ ديسمبر ١٩٤٩ ميلادي. وتُؤرِّخ الجمهورية الإندونيسية
      تأسيسها من إعلان ١٧ أوت ١٩٤٥ ميلادي، ويُحتفل به سنوياً
      عيداً وطنياً. وافتُتحت ديباجة دستور سنة ١٩٤٥ ميلادي
      بالبسملة بالعربية والإندونيسية.
    description_fr: |
      Sukarno et Mohammad Hatta — les deux principaux dirigeants
      nationalistes des Indes néerlandaises — proclamèrent
      l'indépendance de la République d'Indonésie (*Republik
      Indonesia*) à la résidence de Sukarno, Jalan Pegangsaan
      Timur 56 à Jakarta, à 10 heures, le 8 Ramaḍān 1364 H
      (17 août 1945 EC), deux jours après la capitulation
      japonaise qui mit fin à la Seconde Guerre mondiale dans
      le Pacifique. L'Indonésie devint l'État à majorité
      musulmane le plus peuplé du monde — statut qu'elle
      conserve sans interruption — et le cadre du Pancasila
      adopté en 1945 fit de la foi en un Dieu unique le
      premier principe fondateur de la république. Les
      tentatives militaires néerlandaises de revenir sur la
      proclamation par deux « actions de police » (1947, 1948)
      furent défaites ; les Pays-Bas transférèrent la
      souveraineté en vertu de l'accord de la Conférence de la
      table ronde le 27 décembre 1949. La République
      indonésienne date sa fondation de la proclamation du
      17 août 1945, célébrée chaque année comme fête nationale.
      Le préambule de la constitution de 1945 s'ouvre par la
      *basmala* en arabe et en indonésien.
    canonical_hijri: {year: 1364, month: 9, day: 8, precision: day}
    canonical_gregorian: {date: 1945-08-17, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Indūnīsiyā' dates the Sukarno-Hatta proclamation to 17 August 1945."
      - source_key: editorial
        notes: "Editorial summary; date universally attested in Indonesian and Dutch sources and observed as the national day."
    tags: [indonesia, modern, independence, dutch-east-indies, sukarno, hatta, pancasila, southeast-asia]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Proclamation_of_Indonesian_Independence"

  - slug: independence-of-pakistan-1947
    category: political_event
    title_en: Pakistan Independence
    title_ar: استقلال باكستان
    title_fr: Indépendance du Pakistan
    description_en: |
      The Dominion of Pakistan came into being at midnight on the
      night of 27-28 Ramaḍān 1366 AH (14-15 August 1947 CE), as
      the British Indian Empire was partitioned into two
      successor states under the Indian Independence Act passed
      by the British parliament on 18 July 1947. Muḥammad ʿAlī
      Jinnāḥ — leader of the All-India Muslim League and the
      principal architect of the demand for a separate Muslim
      homeland — was sworn in as the first governor-general at
      Karachi on 15 August. The new state contained a Sunni and
      Shīʿī Muslim majority and was constituted in two non-
      contiguous wings (West Pakistan, comprising the Indus
      basin, and East Pakistan in the Bengal delta) separated by
      a thousand miles of Indian territory. The arrangement
      lasted until East Pakistan seceded in 1971 to form
      Bangladesh. Pakistan adopted its first constitution on
      23 March 1956, declaring itself the Islamic Republic of
      Pakistan, the first state in modern history to adopt the
      formal title "Islamic Republic." The intellectual
      foundations had been articulated by ʿAllāma Muḥammad
      Iqbāl in his 1930 Allahabad address, and pursued
      politically by Jinnāḥ from 1940 onward through the
      Lahore Resolution.
    description_ar: |
      قامت دولة باكستان (الدومنيون) في منتصف ليلة ٢٧-٢٨ رمضان
      سنة ١٣٦٦ هـ (ليلة ١٤-١٥ أوت ١٩٤٧ ميلادي)، إذ قُسّمت
      الإمبراطورية البريطانية الهندية إلى دولتين وريثتين بموجب
      «قانون استقلال الهند» الذي أقرّه البرلمان البريطاني في
      ١٨ جويلية ١٩٤٧ ميلادي. وأدّى محمد علي جناح — زعيم
      الرابطة الإسلامية الهندية ومهندس مطلب الوطن الإسلامي
      المستقل — اليمين أوّلَ حاكم عام للدولة في كراتشي يوم
      ١٥ أوت. وكانت الدولة الناشئة ذات أغلبية مسلمة سنية
      وشيعية وتتألف من جناحين غير متصلين: «باكستان الغربية»
      في حوض السند، و«باكستان الشرقية» في دلتا البنغال،
      يفصل بينهما ألف ميل من الأرض الهندية. ودام هذا الترتيب
      إلى انفصال «باكستان الشرقية» سنة ١٩٧١ ميلادي لتُعلن
      دولةَ بنغلاديش. واعتمدت باكستان دستورها الأول في ٢٣
      مارس ١٩٥٦ ميلادي مُعلنةً نفسها «جمهورية باكستان
      الإسلامية»، فكانت أول دولة في التاريخ الحديث تتسمى
      بهذا الاسم الرسمي. وكانت الأسس الفكرية قد أرساها
      العلامة محمد إقبال في خطاب الله أباد سنة ١٩٣٠
      ميلادي، وتابعها سياسياً جناح من سنة ١٩٤٠ ميلادي عبر
      قرار لاهور.
    description_fr: |
      Le Dominion du Pakistan vint à l'existence à minuit, dans
      la nuit du 27 au 28 Ramaḍān 1366 H (14-15 août 1947 EC),
      lorsque l'Empire britannique des Indes fut partitionné en
      deux États successeurs en vertu de l'Indian Independence
      Act adopté par le parlement britannique le 18 juillet
      1947. Muḥammad ʿAlī Jinnāḥ — chef de la Ligue musulmane
      panindienne et principal architecte de la demande d'une
      patrie musulmane séparée — prêta serment comme premier
      gouverneur général à Karachi le 15 août. Le nouvel État,
      à majorité musulmane sunnite et chiite, comprenait deux
      ailes non contiguës — le Pakistan occidental, dans le
      bassin de l'Indus, et le Pakistan oriental dans le delta
      du Bengale — séparées par mille miles de territoire
      indien. Cet arrangement dura jusqu'à la sécession du
      Pakistan oriental en 1971, devenant le Bangladesh. Le
      Pakistan adopta sa première constitution le 23 mars 1956
      en se déclarant République islamique du Pakistan,
      première dans l'histoire moderne à adopter le titre
      formel de « République islamique ». Les fondements
      intellectuels avaient été articulés par ʿAllāma Muḥammad
      Iqbāl dans son discours d'Allahabad de 1930 et poursuivis
      politiquement par Jinnāḥ à partir de 1940 par la
      Résolution de Lahore.
    canonical_hijri: {year: 1366, month: 9, day: 27, precision: day}
    canonical_gregorian: {date: 1947-08-14, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Bākistān' dates the establishment of the Dominion of Pakistan to the midnight of 14-15 August 1947 under the Indian Independence Act."
      - source_key: editorial
        notes: "Editorial summary; date universally attested in British, Indian, and Pakistani sources and observed as the Pakistani national day."
    tags: [pakistan, modern, independence, partition, jinnah, muslim-league, south-asia]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Independence_Day_(Pakistan)"

  - slug: partition-of-british-india-1947
    category: political_event
    title_en: Partition of British India
    title_ar: تقسيم الهند البريطانية
    title_fr: Partition de l'Inde britannique
    description_en: |
      The British Indian Empire formally ceased to exist at
      midnight on the night of 14-15 August 1947 (28 Ramaḍān
      1366 AH), and was divided into the Dominion of Pakistan
      (declared the day before) and the Dominion of India,
      which assumed sovereignty on 15 August 1947 (28 Ramaḍān
      1366 AH). The Radcliffe Boundary Award, drawn over five
      weeks by the British jurist Cyril Radcliffe and published
      on 17 August, partitioned the Muslim-majority provinces
      of Punjab and Bengal between the two new states. The
      ensuing population transfer became the largest sudden
      human migration of the twentieth century: an estimated
      14-18 million people crossed the new border in either
      direction, predominantly Hindus and Sikhs moving east
      and Muslims moving west; communal violence in the Punjab
      and elsewhere claimed an estimated several hundred
      thousand to over a million lives. The trauma of partition
      shaped the political imagination of both successor states
      and the relationship between Hindu and Muslim communities
      across South Asia for generations afterward.
    description_ar: |
      انتهت الإمبراطورية البريطانية الهندية رسمياً في منتصف ليلة
      ١٤-١٥ أوت ١٩٤٧ ميلادي (الموافق ٢٨ رمضان سنة ١٣٦٦ هـ)،
      وقُسّمت إلى «دومنيون باكستان» (الذي أُعلن قبلها بيوم) و
      «دومنيون الهند» الذي تسلّم السيادة في ١٥ أوت ١٩٤٧
      ميلادي (الموافق ٢٨ رمضان سنة ١٣٦٦ هـ). وقد قسّم «قرار
      رادكليف لترسيم الحدود» الذي رسمه القاضي البريطاني سيريل
      رادكليف في خمسة أسابيع وأُعلن في ١٧ أوت ١٩٤٧ ميلادي،
      الإقليمين ذوَي الأغلبية المسلمة — البنجاب والبنغال —
      بين الدولتين الناشئتين. وصار التنقل السكاني الذي أعقب
      ذلك أكبر هجرة بشرية مفاجئة في القرن العشرين: نحو
      ١٤-١٨ مليون نفس عبروا الحدود الجديدة في الاتجاهين،
      أكثرهم هندوس وسيخ هاجروا شرقاً ومسلمون هاجروا غرباً؛
      وأودى العنف الطائفي في البنجاب وغيرها بحياة ما قُدّر
      بمئات الآلاف إلى أكثر من مليون نسمة. وقد رسمت صدمة
      التقسيم خيال الدولتين الوريثتين السياسي والعلاقةَ بين
      المسلمين والهندوس في جنوب آسيا لأجيال لاحقة.
    description_fr: |
      L'Empire britannique des Indes cessa formellement
      d'exister à minuit, dans la nuit du 14 au 15 août 1947
      (28 Ramaḍān 1366 H), et fut partagé entre le Dominion du
      Pakistan (déclaré la veille) et le Dominion de l'Inde,
      qui assuma la souveraineté le 15 août 1947 (28 Ramaḍān
      1366 H). La sentence-frontière Radcliffe, tracée en cinq
      semaines par le juriste britannique Cyril Radcliffe et
      publiée le 17 août, partagea les provinces à majorité
      musulmane du Pendjab et du Bengale entre les deux
      nouveaux États. Le transfert de population qui s'ensuivit
      fut la plus grande migration humaine soudaine du XXe
      siècle : on estime qu'entre 14 et 18 millions de personnes
      traversèrent la nouvelle frontière dans les deux sens —
      principalement des hindous et des sikhs vers l'est, des
      musulmans vers l'ouest — et que les violences
      communautaires au Pendjab et ailleurs firent plusieurs
      centaines de milliers à plus d'un million de morts. Le
      traumatisme de la partition façonna l'imaginaire
      politique des deux États successeurs et la relation
      entre communautés musulmane et hindoue à travers l'Asie
      du Sud pour des générations.
    canonical_hijri: {year: 1366, month: 9, day: 28, precision: day}
    canonical_gregorian: {date: 1947-08-15, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Hind' and 'Bākistān' date the partition of British India and the transfer of sovereignty to India to 15 August 1947."
      - source_key: editorial
        notes: "Editorial summary; date universally attested and observed as the Indian Independence Day."
    tags: [india, pakistan, modern, partition, radcliffe, mass-migration, south-asia]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Partition_of_India"

