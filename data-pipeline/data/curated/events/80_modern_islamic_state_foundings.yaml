# Wave 80 of curated event additions (2026-04-27).
# Founding moments of modern Muslim-majority nation-states. Fourteen
# day-precise events covering the political emergence of independent
# Muslim-majority polities from the long colonial twentieth century:
# Egyptian quasi-independence under Fuʾād I (1922), the proclamation
# of the Kingdom of Saudi Arabia (1932), the entry of Iraq into the
# League of Nations (1932), the unilateral release of Lebanon from
# the French Mandate (1943), Sukarno-Hatta's declaration of
# Indonesian independence (1945), the establishment of Pakistan and
# the Partition of British India (1947), the post-Suez/Bandung wave
# of African and North-African independences (Sudan, Morocco,
# Tunisia 1956 — Malaya 1957 — Algeria 1962), the formation of the
# United Arab Emirates (1971), and the late completion of the
# decolonisation cycle in Brunei (1984).
#
# Editorial framing — strictly factual and politically neutral.
# These are political-historical milestones in the emergence of the
# modern Muslim-state system, presented without endorsement of any
# particular government, party, or ideology. None of these events is
# a religious-doctrinal event; their relevance to Islamic-world
# history is structural — they mark the legal-political vehicles
# through which Muslim-majority populations entered the post-Ottoman
# and post-colonial international order. The constitutional question
# of whether and how these states embodied or departed from Islamic
# legal-political tradition is treated elsewhere.
#
# Sourcing — the standard secondary cross-reference pair for this
# era is EI2 + the editorial compilation. EI2 carries detailed
# articles on each of the relevant countries (s.v. Miṣr, al-Mamlaka
# al-ʿArabiyya al-Suʿūdiyya, al-ʿIrāḳ, Lubnān, Indūnīsiyā, Bākistān,
# al-Sūdān, al-Maghrib, Tūnis, Malayzia, al-Jazāʾir, al-Imārāt
# al-ʿArabiyya al-Muttaḥida, Brūnāy) covering the independence
# transition.
#
# All dates are independently verifiable in standard reference works
# (EI2, Britannica, Oxford Dictionary of Islam, country-specific
# academic histories). Hijri dates derived by tabular conversion via
# convertdate.islamic — when the user-facing description gives a
# slightly different Hijri day, this reflects sighting-based vs.
# tabular calendar variation; the canonical Hijri date stored here
# follows the tabular method consistently used across this dataset.
#
# Trilingual en/ar/fr throughout. Slug "abolition-of-caliphate"
# (1924) already exists in 08_modern_scholars.yaml and is not
# duplicated here.

events:
  # =========================================================================
  # POST-OTTOMAN ARAB INDEPENDENCES (1922-1932)
  # =========================================================================

  - slug: independence-of-egypt-1922
    category: political_event
    title_en: Unilateral British Declaration of Egyptian Independence
    title_ar: التصريح البريطاني الانفرادي باستقلال مصر
    title_fr: Déclaration unilatérale britannique d'indépendance de l'Égypte
    description_en: |
      Britain issued the unilateral Declaration to Egypt — known as
      the *Taṣrīḥ* of 28 February 1922 — ending the protectorate
      that had been imposed in 1914 and recognising Egypt as a
      formally independent state under Sultan Aḥmad Fuʾād, who
      took the title King Fuʾād I on 15 March 1922. The
      declaration reserved four "absolutely reserved matters" to
      British discretion (security of imperial communications, the
      defence of Egypt, the protection of foreign interests and
      minorities, and the Sudan), so the sovereignty was partial;
      full juridical independence followed only with the 1936
      Anglo-Egyptian Treaty and complete sovereignty with the
      1956 evacuation of British forces from the Suez Canal Zone.
      Nonetheless the 1922 declaration is the date from which
      modern Egypt counts its existence as an independent state in
      the international order. The 1923 constitution that followed
      established a parliamentary monarchy on a Belgian model and
      framed the political life of the kingdom until the Free
      Officers' coup of 1952.
    description_ar: |
      أصدرت المملكة المتحدة التصريح الانفرادي لمصر — المعروف
      بـ«تصريح ٢٨ فبراير سنة ١٩٢٢ ميلادي» — منهيةً به الحماية
      التي فُرضت سنة ١٩١٤ ميلادي ومعترفةً بمصر دولةً مستقلة
      رسمياً برئاسة السلطان أحمد فؤاد الذي تلقّب «ملك مصر فؤاد
      الأول» في ١٥ مارس من تلك السنة. غير أن التصريح استبقى
      أربع «مسائل محفوظة بالمطلق» للسلطة البريطانية وهي: أمن
      المواصلات الإمبراطورية، والدفاع عن مصر، وحماية المصالح
      الأجنبية والأقليات، ومسألة السودان؛ فكانت السيادة
      جزئيةً، ولم تكتمل الاستقلالية القانونية إلا بمعاهدة سنة
      ١٩٣٦ ميلادي ولم تتم السيادة الكاملة إلا بإجلاء القوات
      البريطانية عن منطقة قناة السويس سنة ١٩٥٦ ميلادي. ومع
      ذلك يُعدّ تصريح سنة ١٩٢٢ ميلادي تاريخَ ميلاد مصر
      الحديثة دولةً مستقلةً في النظام الدولي. وقد صدر في إثره
      دستور سنة ١٩٢٣ ميلادي مؤسِّساً ملكية برلمانية على
      النموذج البلجيكي، وحدَّد الحياة السياسية للمملكة إلى
      انقلاب الضباط الأحرار سنة ١٩٥٢ ميلادي.
    description_fr: |
      Le Royaume-Uni publia la Déclaration unilatérale à l'Égypte
      — le *Taṣrīḥ* du 28 février 1922 — mettant fin au
      protectorat imposé en 1914 et reconnaissant l'Égypte comme
      État formellement indépendant sous le sultan Aḥmad Fuʾād,
      qui prit le titre de roi Fuʾād Ier le 15 mars 1922. La
      déclaration réservait quatre « matières absolument
      réservées » à la discrétion britannique (sécurité des
      communications impériales, défense de l'Égypte, protection
      des intérêts étrangers et des minorités, Soudan) ; la
      souveraineté restait donc partielle, et la pleine
      indépendance juridique ne suivit qu'avec le traité
      anglo-égyptien de 1936, et la souveraineté entière avec
      l'évacuation des forces britanniques de la zone du canal
      de Suez en 1956. Néanmoins la déclaration de 1922 est la
      date à laquelle l'Égypte moderne compte son existence
      d'État indépendant dans l'ordre international. La
      constitution de 1923 qui s'ensuivit établit une monarchie
      parlementaire sur le modèle belge et encadra la vie
      politique du royaume jusqu'au coup d'État des Officiers
      libres de 1952.
    canonical_hijri: {year: 1340, month: 7, day: 1, precision: day}
    canonical_gregorian: {date: 1922-02-28, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Miṣr' dates the unilateral declaration to 28 February 1922 and the assumption of the royal title by Fuʾād I to 15 March 1922."
      - source_key: editorial
        notes: "Editorial summary; date corroborated in standard Egyptian and British diplomatic histories of the inter-war Middle East."
    tags: [egypt, modern, independence, british-protectorate, fuad-i, monarchy]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Unilateral_Declaration_of_Egyptian_Independence"

  - slug: proclamation-of-kingdom-of-saudi-arabia
    category: political_event
    title_en: Proclamation of the Kingdom of Saudi Arabia
    title_ar: إعلان المملكة العربية السعودية
    title_fr: Proclamation du royaume d'Arabie saoudite
    description_en: |
      ʿAbd al-ʿAzīz ibn ʿAbd al-Raḥmān Āl Saʿūd — who had recovered
      al-Riyāḍ in 1319 AH/1902 CE and reunified Najd, al-Aḥsāʾ,
      and the Ḥijāz over the following three decades — issued
      Royal Decree no. 2716 unifying the dual Kingdom of the
      Ḥijāz and Najd under a single name on 21 Jumādā al-Awwal
      1351 AH (23 September 1932 CE). The new state was called
      *al-Mamlaka al-ʿArabiyya al-Suʿūdiyya* (Kingdom of Saudi
      Arabia) and ʿAbd al-ʿAzīz was proclaimed its founding king.
      The proclamation completed the political vehicle that the
      First (1744-1818) and Second (1824-1891) Saudi states had
      pursued, founded on the eighteenth-century pact of
      al-Dirʿiyya between Muḥammad ibn Saʿūd and the Najdī
      Sunni-Ḥanbalī reformer Muḥammad ibn ʿAbd al-Wahhāb. The
      kingdom contained the two holy sanctuaries of Mecca and
      Medina, and the date is observed annually as the Saudi
      National Day.
    description_ar: |
      أصدر الملك عبد العزيز بن عبد الرحمن آل سعود — الذي كان قد
      استرد الرياض سنة ١٣١٩ هـ (١٩٠٢ ميلادي) ووحّد نجدًا
      والأحساء والحجاز في العقود الثلاثة التي تلتها — المرسومَ
      الملكي رقم ٢٧١٦ بتوحيد المملكتين التوأمين «مملكة الحجاز
      ونجد» باسم واحد يوم ٢١ جمادى الأولى سنة ١٣٥١ هـ (الموافق
      ٢٣ سبتمبر ١٩٣٢ ميلادي)، فسميت الدولة الجديدة «المملكة
      العربية السعودية» وأُعلن عبد العزيز ملكاً مؤسساً لها.
      وقد أتمّ هذا الإعلان المركبَ السياسي الذي كانت تسعى إليه
      الدولتان السعوديتان الأولى (١١٥٧-١٢٣٣ هـ) والثانية
      (١٢٤٠-١٣٠٩ هـ)، مرتكزتين على ميثاق الدرعية بين الأمير
      محمد بن سعود والشيخ النجدي السني الحنبلي محمد بن عبد
      الوهاب في القرن الثاني عشر الهجري. وضمّت المملكة
      الحرمين الشريفين بمكة المكرمة والمدينة المنورة، ويحتفل
      بهذا اليوم كل سنة بوصفه «اليوم الوطني السعودي».
    description_fr: |
      ʿAbd al-ʿAzīz ibn ʿAbd al-Raḥmān Āl Saʿūd — qui avait
      repris al-Riyāḍ en 1319 H/1902 EC et réunifié le Najd,
      al-Aḥsāʾ et le Ḥijāz au cours des trois décennies
      suivantes — promulgua le décret royal n° 2716 unifiant
      le double royaume du Ḥijāz et du Najd sous un nom
      unique le 21 Jumādā al-Awwal 1351 H (23 septembre 1932
      EC). Le nouvel État reçut le nom d'*al-Mamlaka
      al-ʿArabiyya al-Suʿūdiyya* (Royaume d'Arabie saoudite)
      et ʿAbd al-ʿAzīz fut proclamé roi fondateur. La
      proclamation acheva le véhicule politique que le Premier
      (1744-1818) et le Second (1824-1891) États saʿūdī avaient
      poursuivi, fondé sur le pacte d'al-Dirʿiyya du XVIIIe
      siècle entre Muḥammad ibn Saʿūd et le réformateur
      najdī sunnite-ḥanbalī Muḥammad ibn ʿAbd al-Wahhāb. Le
      royaume englobait les deux sanctuaires saints de La
      Mecque et Médine, et la date est commémorée chaque
      année comme la fête nationale saoudienne.
    canonical_hijri: {year: 1351, month: 5, day: 22, precision: day}
    canonical_gregorian: {date: 1932-09-23, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-Mamlaka al-ʿArabiyya al-Suʿūdiyya' and 'Ibn Saʿūd' date the unification proclamation to 23 September 1932 (Royal Decree no. 2716)."
      - source_key: editorial
        notes: "Editorial summary; standard date in Saudi historiography and the date of the official Saudi National Day."
    people: [[abd-al-aziz-ibn-saud, leader]]
    tags: [saudi-arabia, najd, hijaz, modern, independence, monarchy, ibn-saud, founding]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Saudi_Arabia"

  - slug: independence-of-iraq-1932
    category: political_event
    title_en: Iraqi Independence and Entry into the League of Nations
    title_ar: استقلال العراق ودخوله عصبة الأمم
    title_fr: Indépendance de l'Iraq et entrée à la Société des Nations
    description_en: |
      The Kingdom of Iraq, under King Fayṣal I of the Hāshimite
      house, was admitted to the League of Nations as a fully
      sovereign state on 2 Jumādā al-Thāniyya 1351 AH (3 October
      1932 CE), formally ending the British Mandate that had been
      established by the San Remo conference of 1920. Iraq thus
      became the first Arab Mandate territory to achieve full
      international recognition as an independent state. The
      transition rested on the Anglo-Iraqi Treaty of 1930, which
      converted the Mandate into a treaty-relationship of alliance
      and granted Britain continuing military bases at al-Ḥabbāniyya
      and al-Shuʿayba. The 1925 constitution remained in force, the
      Hāshimite monarchy ruled from Baghdad until the 14 July 1958
      revolution, and the modern Iraqi state — its borders, its
      institutions, its civil and personal-status codes (the latter
      drafted by ʿAbd al-Razzāq al-Sanhūrī in 1951) — dates from
      this entry into the international order.
    description_ar: |
      قبلت المملكة العراقية الهاشمية في عهد الملك فيصل الأول
      عضواً كاملَ السيادة في عصبة الأمم يوم ٢ جمادى الآخرة سنة
      ١٣٥١ هـ (الموافق ٣ أكتوبر ١٩٣٢ ميلادي)، فأنهت بذلك رسمياً
      الانتداب البريطاني الذي أُسس بمؤتمر سان ريمو سنة ١٩٢٠
      ميلادي. وكان العراق بذلك أوّلَ بلد عربي تحت الانتداب
      ينال الاعتراف الدولي الكامل بوصفه دولةً مستقلة. وقد قامت
      هذه النقلة على المعاهدة الأنجلو-عراقية سنة ١٩٣٠ ميلادي
      التي حوّلت الانتداب إلى علاقة تحالف تعاهدية ومنحت
      بريطانيا قواعد عسكرية ثابتة في الحبانية والشعيبة. وبقي
      دستور سنة ١٩٢٥ ميلادي ساريَ المفعول، وحكمت الأسرة
      الهاشمية من بغداد إلى ثورة ١٤ تموز/يوليو ١٩٥٨ ميلادي.
      ومن هذا الدخول في النظام الدولي تؤرّخ الدولة العراقية
      الحديثة حدودَها ومؤسساتِها وقوانينَها المدنية وقوانين
      الأحوال الشخصية — وقد صاغ القانون المدني العراقي العلامةُ
      عبد الرزاق السنهوري سنة ١٣٧٠ هـ (١٩٥١ ميلادي).
    description_fr: |
      Le Royaume d'Iraq, sous le roi Fayṣal Ier de la maison
      hāshimite, fut admis à la Société des Nations comme État
      pleinement souverain le 2 Jumādā al-Thāniyya 1351 H
      (3 octobre 1932 EC), mettant fin formellement au mandat
      britannique établi par la conférence de San Remo en 1920.
      L'Iraq devenait ainsi le premier territoire arabe sous
      mandat à obtenir la pleine reconnaissance internationale
      en tant qu'État indépendant. La transition reposait sur
      le traité anglo-iraqien de 1930, qui transformait le
      mandat en relation conventionnelle d'alliance et accordait
      à la Grande-Bretagne des bases militaires permanentes à
      al-Ḥabbāniyya et al-Shuʿayba. La constitution de 1925
      demeura en vigueur, la monarchie hāshimite régna depuis
      Bagdad jusqu'à la révolution du 14 juillet 1958, et l'État
      iraquien moderne — ses frontières, ses institutions, ses
      codes civil et de statut personnel (le premier rédigé par
      ʿAbd al-Razzāq al-Sanhūrī en 1951) — date de cette
      entrée dans l'ordre international.
    canonical_hijri: {year: 1351, month: 6, day: 2, precision: day}
    canonical_gregorian: {date: 1932-10-03, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-ʿIrāḳ' dates the admission of the Hāshimite Kingdom of Iraq to the League of Nations to 3 October 1932."
      - source_key: editorial
        notes: "Editorial summary; date confirmed in League of Nations records and standard Iraqi political histories."
    tags: [iraq, hashemite, modern, independence, mandate, league-of-nations, faysal-i]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Mandatory_Iraq"

