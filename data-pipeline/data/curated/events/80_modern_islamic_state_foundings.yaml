    source_url: "https://en.wikipedia.org/wiki/Tunisian_independence"

  - slug: independence-of-malaya-1957
    category: political_event
    title_en: Independence of the Federation of Malaya
    title_ar: استقلال اتحاد الملايو
    title_fr: Indépendance de la Fédération de Malaisie
    description_en: |
      The Federation of Malaya — a confederation of nine Malay
      sultanates plus Penang and Malacca — gained independence
      from the British Empire on 5 Ṣafar 1377 AH (31 August
      1957 CE), with the *Yang di-Pertuan Agong* Tuanku Abdul
      Rahman ibni al-Marhum Tuanku Muhammad of Negeri Sembilan
      as the elected federal monarch and Tunku Abdul Rahman
      Putra al-Haj — the leader of the United Malays National
      Organisation (UMNO) and the Alliance Party — as first
      prime minister. The federation expanded in 1963 by
      incorporating Sabah, Sarawak, and Singapore (the last
      separating in 1965) to become the modern Federation of
      Malaysia. Malaysia is a Sunni Shāfiʿī country with Islam
      as the religion of the Federation and a constitutional
      monarchy in which the federal kingship rotates among the
      nine state sultans. The Sultans of the Malay states are
      the constitutional heads of Islam in their respective
      states, perpetuating an Islamic political tradition that
      goes back to the conversion of the Sultanate of Malacca
      under Parameswara/Iskandar Shāh in the early fifteenth
      century. The 31 August is observed as *Hari Merdeka*.
    description_ar: |
      نال اتحاد الملايو — وهو اتحاد كونفدرالي بين تسع سلطنات
      ملاوية وبينانغ وملقا — استقلاله عن الإمبراطورية
      البريطانية يوم ٥ صفر سنة ١٣٧٧ هـ (الموافق ٣١ أوت ١٩٥٧
      ميلادي)، بعد أن اختير الـ«يانغ ديبرتوان أغونغ» تونكو
      عبد الرحمن ابن المرحوم تونكو محمد سلطان ولاية نغري
      سيمبيلان ملِكاً اتحادياً منتخباً، وتولّى تونكو عبد
      الرحمن بوترا الحاج — زعيم المنظمة الوطنية الملايوية
      المتحدة (أمنو) وحزب التحالف — رئاسةَ الوزراء أوّلَ
      مرة. وتوسّع الاتحاد سنة ١٩٦٣ ميلادي بضم صباح وساراواك
      وسنغافورة (التي انفصلت سنة ١٩٦٥ ميلادي) فصار اتحاد
      ماليزيا الحديث. وماليزيا بلد سني شافعي، الإسلام دين
      الاتحاد فيها، ونظامها ملكية دستورية تتداور فيها العرش
      الاتحادي بين سلاطين الولايات التسعة. وسلاطين ولايات
      الملايو هم الرؤساء الدستوريون للشؤون الإسلامية في
      ولاياتهم، استمراراً لتقليد سياسي إسلامي يرجع إلى إسلام
      سلطنة ملقا في عهد بارامسوارا/إسكندر شاه في مطلع القرن
      التاسع الهجري. ويحتفل بـ٣١ أوت بـ«هاري ميرديكا».
    description_fr: |
      La Fédération de Malaisie — confédération de neuf
      sultanats malais plus Penang et Malacca — accéda à
      l'indépendance de l'Empire britannique le 5 Ṣafar 1377 H
      (31 août 1957 EC), avec le *Yang di-Pertuan Agong*
      Tuanku Abdul Rahman ibni al-Marhum Tuanku Muhammad du
      Negeri Sembilan comme monarque fédéral élu, et Tunku
      Abdul Rahman Putra al-Haj — chef de l'Organisation
      nationale des Malais unis (UMNO) et du parti de
      l'Alliance — comme premier Premier ministre. La
      fédération s'élargit en 1963 par l'incorporation du
      Sabah, du Sarawak et de Singapour (cette dernière s'en
      séparant en 1965) pour devenir la Fédération moderne de
      Malaisie. La Malaisie est un pays sunnite shāfiʿite,
      l'Islam y est la religion de la Fédération, et son
      régime est une monarchie constitutionnelle où la
      royauté fédérale tourne entre les neuf sultans des
      États. Les sultans des États malais sont les chefs
      constitutionnels des affaires islamiques dans leur État
      respectif, perpétuant une tradition politique islamique
      remontant à l'islamisation du Sultanat de Malacca sous
      Parameswara/Iskandar Shāh au début du XVe siècle.
      Le 31 août est célébré comme *Hari Merdeka*.
    canonical_hijri: {year: 1377, month: 2, day: 4, precision: day}
    canonical_gregorian: {date: 1957-08-31, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Malayzia' dates the independence of the Federation of Malaya from the United Kingdom to 31 August 1957."
      - source_key: editorial
        notes: "Editorial summary; date observed annually as Hari Merdeka, the Malaysian national day."
    tags: [malaysia, malaya, modern, independence, british-empire, shafii, southeast-asia, hari-merdeka]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Hari_Merdeka"

  - slug: independence-of-algeria-1962
    category: political_event
    title_en: Independence of Algeria
    title_ar: استقلال الجزائر
    title_fr: Indépendance de l'Algérie
    description_en: |
      The People's Democratic Republic of Algeria proclaimed its
      independence from France on 3 Ṣafar 1382 AH (5 July 1962
      CE), exactly 132 years to the day after the French capture
      of Algiers on 5 July 1830. The proclamation came after the
      Évian Accords of 19 March 1962 — which ended the
      seven-and-a-half-year war of national liberation
      (1954-1962) launched by the Front de Libération Nationale
      (FLN) under leaders including Aḥmad Ben Bella, Hocine
      Aït Ahmed, Mohamed Boudiaf, Houari Boumédiène, and Krim
      Belkacem — and the self-determination referendum of
      1 July 1962 in which over 99 % of Algerian voters chose
      independence. The conflict cost an estimated several
      hundred thousand to over a million Algerian lives and
      forced the departure of approximately 800,000 European
      *pieds-noirs* settlers. Independent Algeria was a Sunni
      Mālikī country whose pre-1830 religious and intellectual
      heritage — Tlemcen, Constantine, Algiers, and the Saharan
      *zawāyā* — had been the subject of the twentieth-century
      reformist programme of ʿAbd al-Ḥamīd Ibn Bādīs and the
      Association of Algerian Muslim ʿUlamāʾ. The 5 July is
      observed annually as the national independence day.
    description_ar: |
      أعلنت الجمهورية الجزائرية الديمقراطية الشعبية استقلالها
      من فرنسا يوم ٣ صفر سنة ١٣٨٢ هـ (الموافق ٥ جويلية ١٩٦٢
      ميلادي)، أي بعد ١٣٢ سنة بالتمام والكمال من سقوط مدينة
      الجزائر في يد القوات الفرنسية يوم ٥ جويلية ١٨٣٠
      ميلادي. وجاء الإعلان بعد «اتفاقيات إيفيان» يوم ١٩ مارس
      ١٩٦٢ ميلادي — التي أنهت حرب التحرير الوطني التي دامت
      سبع سنوات ونصفاً (١٩٥٤-١٩٦٢ ميلادي) وقادتها «جبهة
      التحرير الوطني» بزعامة جماعة من بينهم أحمد بن بلّة
      وحسين آيت أحمد ومحمد بوضياف وهواري بومدين وكريم بلقاسم
      — وبعد استفتاء تقرير المصير في فاتح جويلية ١٩٦٢
      ميلادي الذي اختار فيه ما يربو على ٩٩٪ من الناخبين
      الجزائريين الاستقلال. وقد خلَّف الصراع مئات الآلاف من
      الشهداء الجزائريين قُدِّروا بأكثر من المليون، وأرغم
      على الرحيل نحو ثمانمائة ألف من المستوطنين الأوروبيين
      («الأقدام السوداء»). وكانت الجزائر المستقلة بلداً
      سنياً مالكياً لتراثٍ ديني وعلمي قبل سنة ١٨٣٠ ميلادي —
      تلمسان وقسنطينة والجزائر والزوايا الصحراوية — كان
      موضوع المشروع الإصلاحي للشيخ عبد الحميد بن باديس
      و«جمعية العلماء المسلمين الجزائريين» في القرن العشرين.
      ويحتفل بـ٥ جويلية سنوياً عيداً للاستقلال الوطني.
    description_fr: |
      La République algérienne démocratique et populaire
      proclama son indépendance de la France le 3 Ṣafar 1382 H
      (5 juillet 1962 EC), exactement 132 ans jour pour jour
      après la prise d'Alger par les forces françaises le 5
      juillet 1830. La proclamation suivit les accords d'Évian
      du 19 mars 1962 — qui mirent fin à la guerre de libération
      nationale longue de sept ans et demi (1954-1962),
      conduite par le Front de Libération Nationale (FLN) sous
      des dirigeants tels qu'Aḥmad Ben Bella, Hocine Aït
      Ahmed, Mohamed Boudiaf, Houari Boumédiène et Krim
      Belkacem — et le référendum d'autodétermination du
      1er juillet 1962, dans lequel plus de 99 % des électeurs
      algériens choisirent l'indépendance. Le conflit coûta
      la vie à plusieurs centaines de milliers d'Algériens —
      jusqu'à plus d'un million selon certaines estimations —
      et força le départ d'environ 800 000 colons européens
      (*pieds-noirs*). L'Algérie indépendante était un pays
      sunnite malikite dont l'héritage religieux et
      intellectuel d'avant 1830 — Tlemcen, Constantine, Alger
      et les *zawāyā* sahariennes — avait été l'objet du
      programme réformiste du XXe siècle de ʿAbd al-Ḥamīd Ibn
      Bādīs et de l'Association des Oulémas Musulmans
      Algériens. Le 5 juillet est célébré chaque année comme
      fête nationale de l'indépendance.
    canonical_hijri: {year: 1382, month: 2, day: 3, precision: day}
    canonical_gregorian: {date: 1962-07-05, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-Jazāʾir' dates Algerian independence from France to 5 July 1962, the date of the formal proclamation following the 1 July self-determination referendum."
      - source_key: editorial
        notes: "Editorial summary; date observed annually as the Algerian national independence day."
    people: [[abd-al-hamid-ibn-badis, subject]]
    tags: [algeria, modern, independence, french-colonial, fln, maliki, north-africa, evian]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Independence_Day_(Algeria)"

