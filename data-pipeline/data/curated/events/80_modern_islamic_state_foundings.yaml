  - slug: independence-of-sudan-1956
    category: political_event
    title_en: Independence of Sudan
    title_ar: استقلال السودان
    title_fr: Indépendance du Soudan
    description_en: |
      The Republic of the Sudan declared its independence from the
      Anglo-Egyptian Condominium on 18 Jumādā al-Awwal 1375 AH
      (1 January 1956 CE), becoming the first sub-Saharan African
      country and the first state in the modern Arab League to
      gain full independence in the post-Suez decolonisation wave.
      The condominium had been established by the 1899
      Anglo-Egyptian agreement after the Mahdī's state was
      destroyed at the Battle of Karari (Omdurman) in 1898.
      Following the 1953 self-government statute, a parliament
      elected in late 1953 voted unanimously on 19 December
      1955 to declare independence; the British and Egyptian
      flags were lowered at the People's Palace in Khartoum on
      1 January 1956. The new state had a Sunni Muslim majority
      and a substantial Christian and traditionalist minority in
      the south; the unresolved north-south question would
      generate two civil wars and ultimately the secession of
      South Sudan in 2011. The Sudanese national day is
      observed annually on 1 January.
    description_ar: |
      أعلنت جمهورية السودان استقلالها عن الحكم الثنائي الأنجلو-
      مصري يوم ١٨ جمادى الأولى سنة ١٣٧٥ هـ (الموافق فاتح
      جانفي ١٩٥٦ ميلادي)، فكانت بذلك أوّلَ بلد في إفريقيا
      جنوب الصحراء وأوّلَ دولة في جامعة الدول العربية الحديثة
      تنال استقلالها الكامل في موجة التحرر التي تلت العدوان
      على السويس. وكان الحكم الثنائي قد أسس باتفاقية أنجلو-
      مصرية سنة ١٨٩٩ ميلادي بعد سقوط الدولة المهدية في معركة
      كرري (أم درمان) سنة ١٨٩٨ ميلادي. وعقب قانون الحكم
      الذاتي سنة ١٩٥٣ ميلادي صوّت البرلمان المنتخب أواخر
      تلك السنة بالإجماع على إعلان الاستقلال يوم ١٩ ديسمبر
      ١٩٥٥ ميلادي، فأُنزل العلمان البريطاني والمصري في قصر
      الشعب بالخرطوم في فاتح جانفي ١٩٥٦ ميلادي. وكانت الدولة
      الجديدة ذات أغلبية مسلمة سنية وأقلية مسيحية وتقليدية
      كبيرة في الجنوب؛ وستفضي مسألة الشمال-الجنوب التي لم
      تُحسم إلى حربين أهليتين ثم إلى انفصال جنوب السودان سنة
      ٢٠١١ ميلادي. ويُحتفل بالعيد الوطني السوداني سنوياً في
      أول يوم من السنة الميلادية.
    description_fr: |
      La République du Soudan déclara son indépendance du
      condominium anglo-égyptien le 18 Jumādā al-Awwal 1375 H
      (1er janvier 1956 EC), devenant le premier pays
      d'Afrique subsaharienne et le premier État de la Ligue
      arabe moderne à obtenir sa pleine indépendance dans la
      vague de décolonisation post-Suez. Le condominium avait
      été établi par l'accord anglo-égyptien de 1899 après la
      destruction de l'État mahdiste à la bataille de Karari
      (Omdurman) en 1898. À la suite du statut d'autonomie de
      1953, le parlement élu fin 1953 vota à l'unanimité le
      19 décembre 1955 la déclaration d'indépendance ; les
      drapeaux britannique et égyptien furent abaissés au
      Palais du peuple à Khartoum le 1er janvier 1956. Le
      nouvel État avait une majorité musulmane sunnite et une
      minorité chrétienne et traditionaliste substantielle au
      sud ; la question nord-sud non résolue allait engendrer
      deux guerres civiles et finalement la sécession du Soudan
      du Sud en 2011. La fête nationale soudanaise est célébrée
      chaque année le 1er janvier.
    canonical_hijri: {year: 1375, month: 5, day: 18, precision: day}
    canonical_gregorian: {date: 1956-01-01, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 'al-Sūdān' dates Sudanese independence from the Anglo-Egyptian Condominium to 1 January 1956."
      - source_key: editorial
        notes: "Editorial summary; date observed annually as the Sudanese national day."
    tags: [sudan, modern, independence, anglo-egyptian-condominium, africa, khartoum]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Independence_of_Sudan"

  - slug: independence-of-morocco-1956
    category: political_event
    title_en: Independence of Morocco
    title_ar: استقلال المغرب
    title_fr: Indépendance du Maroc
    description_en: |
      The Sultanate of Morocco regained its sovereignty when
      France revoked the Treaty of Fes (1912) — the legal
      instrument of the French Protectorate — in a joint
      Franco-Moroccan declaration signed in Paris on 19 Rajab
      1375 AH (2 March 1956 CE). Spain followed suit on
      7 April 1956, ending the parallel Spanish Protectorate
      over the northern zone (Tangier and the Rif) and the
      southern zone (Tarfaya and Ifni). The sultan Sīdī Muḥammad
      ibn Yūsuf, exiled by the French in 1953 and recalled in
      November 1955 amid mass protest, took the title King
      Muḥammad V on 14 August 1957 and reigned over the
      reunified Sherifian Kingdom of Morocco. Morocco — a
      Sunni Mālikī country with the historic Qarawiyyīn at
      Fes (founded 245 AH/859 CE), the Moulay Idrīs sanctuary
      (172 AH/789 CE), and the Marrākesh and Fes-Madhīna
      religious complexes — joined the Arab League and the
      United Nations in 1956. Independence was celebrated on
      18 November (the date of King Muḥammad V's return from
      exile in 1955) until 1962 when 2 March was added as the
      formal independence anniversary.
    description_ar: |
      استرجعت المملكة المغربية سيادتها لما ألغت فرنسا معاهدة
      فاس (سنة ١٩١٢ ميلادي) — السند القانوني للحماية
      الفرنسية — بإعلان فرنسي مغربي مشترك وقّع في باريس يوم
      ١٩ رجب سنة ١٣٧٥ هـ (الموافق فاتح مارس ١٩٥٦ ميلادي).
      وتبعتها إسبانيا في ٧ أفريل ١٩٥٦ ميلادي فأنهت الحماية
      الإسبانية الموازية على المنطقة الشمالية (طنجة والريف)
      والمنطقة الجنوبية (طرفاية وإفني). وتلقّب السلطان سيدي
      محمد بن يوسف — الذي نفته فرنسا سنة ١٩٥٣ ميلادي وأعادته
      تحت ضغط شعبي في نوفمبر ١٩٥٥ ميلادي — بـ«الملك محمد
      الخامس» في ١٤ أوت ١٩٥٧ ميلادي، فحكم المملكة الشريفة
      المغربية الموحَّدة. والمغرب بلد سني مالكي يحوي جامع
      القرويين بفاس (المؤسس سنة ٢٤٥ هـ / ٨٥٩ ميلادي) وضريح
      مولاي إدريس (سنة ١٧٢ هـ / ٧٨٩ ميلادي) ومجمعَي مراكش
      وفاس الدينيَّين. وانضم المغرب إلى الجامعة العربية
      والأمم المتحدة سنة ١٩٥٦ ميلادي. وكان عيد الاستقلال
      يحتفل به في ١٨ نوفمبر (يوم عودة الملك محمد الخامس من
      المنفى سنة ١٩٥٥ ميلادي) إلى أن أُضيف ٢ مارس عيداً
      رسمياً للاستقلال سنة ١٩٦٢ ميلادي.
    description_fr: |
      Le Sultanat du Maroc retrouva sa souveraineté lorsque la
      France abrogea le traité de Fès (1912) — instrument
      juridique du Protectorat français — par une déclaration
      franco-marocaine commune signée à Paris le 19 Rajab
      1375 H (2 mars 1956 EC). L'Espagne suivit le 7 avril
      1956, mettant fin au protectorat espagnol parallèle sur
      la zone nord (Tanger et le Rif) et la zone sud (Tarfaya
      et Ifni). Le sultan Sīdī Muḥammad ibn Yūsuf — exilé par
      la France en 1953 et rappelé en novembre 1955 sous la
      pression populaire — prit le titre de roi Muḥammad V
      le 14 août 1957 et régna sur le Royaume chérifien du
      Maroc réunifié. Le Maroc — pays sunnite malikite
      abritant la Qarawiyyīn historique de Fès (fondée en
      245 H/859 EC), le sanctuaire de Moulay Idrīs
      (172 H/789 EC) et les complexes religieux de Marrakech
      et de la médina de Fès — adhéra à la Ligue arabe et à
      l'Organisation des Nations unies en 1956. L'indépendance
      fut célébrée le 18 novembre (date du retour d'exil du
      roi Muḥammad V en 1955) jusqu'à ce qu'en 1962 le 2 mars
      soit ajouté comme anniversaire officiel de
      l'indépendance.
    canonical_hijri: {year: 1375, month: 7, day: 19, precision: day}
    canonical_gregorian: {date: 1956-03-02, precision: day, method: attested}
