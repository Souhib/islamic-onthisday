      - source_key: ei2
        is_canonical: true
        notes: "EI2 'Tūnis' dates the Franco-Tunisian protocol of independence to 20 March 1956."
      - source_key: editorial
        notes: "Editorial summary; date observed annually as the Tunisian national independence day."
    tags: [tunisia, modern, independence, french-protectorate, maliki, north-africa, bourguiba, zaytuna]
    importance: notable
