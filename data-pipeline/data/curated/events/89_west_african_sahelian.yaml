  - slug: death-of-modibo-adama
    category: ruler_death
    title_en: Death of Modibo Adama — Founder of the Adamawa Emirate
    title_ar: وفاة موديبو أدما — مؤسس إمارة أدماوة
    title_fr: Mort de Modibo Adama — fondateur de l'émirat d'Adamawa
    description_en: |
      Modibo Adama ibn Ardo Hasana — Fulbe Mālikī scholar of the
      Yola region of present-day northern Cameroon and northeastern
      Nigeria, granted the green flag of jihad by Shaykh ʿUthmān
      dan Fodio at Sokoto in 1224 AH / 1809 CE as commander of
      the southeastern frontier of the Sokoto Caliphate, and the
      founder of the Adamawa Emirate (named after him) which from
      his capital Yola — laid out in 1257 AH / 1841 CE — extended
      Sokoto's authority over a vast region of northern Cameroon,
      eastern Nigeria, southern Chad, and the northern Central
      African Republic — died at Yola on 23 Ramaḍān 1263 AH /
      4 September 1847 CE. He was about 61. The Adamawa Emirate
      he founded was the largest of the Sokoto Caliphate's eastern
      emirates, and persisted as a tributary of Sokoto under his
      sons and grandsons until the German colonial conquest of
      Yola in 1901 CE divided the emirate between German Kamerun
      and British Northern Nigeria. His name remains in the
      contemporary toponymy of *Adamawa State* in Nigeria and
      the *Adamaoua Region* of Cameroon.
    description_ar: |
      توفي «موديبو أدما» بن أردو حسنة — الفقيه المالكي الفلاني من
      منطقة «يولا» في شمال الكاميرون وشمال شرق نيجيريا اليوم،
      الذي قلده الشيخ عثمان بن فودي بصكتو الراية الخضراء للجهاد
      أميراً للحدود الجنوبية الشرقية لخلافة صكتو سنة ١٢٢٤ هـ/١٨٠٩
      ميلادي، ومؤسس إمارة أدماوة (المنسوبة إليه) التي بسطت من
      عاصمته يولا — التي خطها سنة ١٢٥٧ هـ/١٨٤١ ميلادي — سلطة صكتو
      على رقعة واسعة من شمال الكاميرون وشرق نيجيريا وجنوب تشاد
      وشمال أفريقيا الوسطى — بيولا يوم ٢٣ رمضان سنة ١٢٦٣ هـ/٤
      سبتمبر ١٨٤٧ ميلادي. وقد ناهز الحادية والستين. وكانت إمارة
      أدماوة التي أسسها أكبر إمارات خلافة صكتو الشرقية، وبقيت
      تابعة لصكتو في عهد أبنائه وأحفاده إلى أن قسمها الفتح
      الاستعماري الألماني ليولا سنة ١٩٠١ ميلادي بين «الكاميرون
      الألمانية» و«نيجيريا الشمالية البريطانية». وما زال اسمه قائماً
      في تسمية «ولاية أدماوة» في نيجيريا و«إقليم أداماوا» في
      الكاميرون.
    description_fr: |
      Modibo Adama ibn Ardo Hasana — érudit mālikite peul de la
      région de Yola dans l'actuel nord du Cameroun et nord-est
      du Nigeria, à qui le Cheikh ʿUthmān dan Fodio remit à Sokoto
      en 1224 H / 1809 EC l'étendard vert du jihad comme commandant
      de la frontière sud-est du califat de Sokoto, et fondateur
      de l'émirat d'Adamawa (nommé d'après lui) qui, depuis sa
      capitale Yola — tracée en 1257 H / 1841 EC — étendit
      l'autorité de Sokoto sur une vaste région du nord du
      Cameroun, de l'est du Nigeria, du sud du Tchad et du nord
      de la République centrafricaine — mourut à Yola le 23
      Ramaḍān 1263 H / 4 septembre 1847 EC. Il avait environ 61
      ans. L'émirat d'Adamawa qu'il fonda fut le plus grand des
      émirats orientaux du califat de Sokoto, et persista comme
      tributaire de Sokoto sous ses fils et petits-fils jusqu'à
      ce que la conquête coloniale allemande de Yola en 1901 EC
      partage l'émirat entre le *Kamerun* allemand et la *Northern
      Nigeria* britannique. Son nom demeure dans la toponymie
      contemporaine de l'*État d'Adamawa* au Nigeria et de la
      *région de l'Adamaoua* au Cameroun.
    canonical_hijri: {year: 1263, month: 9, day: 23, precision: day}
    canonical_gregorian: {date: 1847-09-04, precision: day, method: attested}
