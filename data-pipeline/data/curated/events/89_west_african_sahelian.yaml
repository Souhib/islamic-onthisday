  - slug: death-of-ahmad-al-bakkay-al-kunti
    category: scholar_death
    title_en: Death of Aḥmad al-Bakkāy al-Kuntī — Timbuktu Qādirī Refuter
    title_ar: وفاة أحمد البكاي الكنتي — شيخ القادرية بتنبكتو
    title_fr: Mort d'Aḥmad al-Bakkāy al-Kuntī — réfutateur qādirī de Tombouctou
    description_en: |
      Shaykh Aḥmad al-Bakkāy ibn Muḥammad al-Kuntī — Mālikī
      scholar and Qādirī shaykh of the al-Kunta family of
      Timbuktu, grand-nephew and continuator of the Saharan
      Qādirī renewer Sīdī Mukhtār al-Kuntī (d. 1226 AH / 1811 CE),
      and senior al-Kunta authority of Timbuktu through the
      Massina Caliphate and into the early Tukulor occupation —
      died at Timbuktu after the Tukulor conquest. He was
      approximately in his sixties. He is best known for the
      protection he extended to the German explorer Heinrich
      Barth during Barth's 1853-1854 CE stay in Timbuktu (a
      letter exchange preserved in Barth's *Reisen und
      Entdeckungen* attests al-Bakkāy's safe-conduct guarantee
      and his Mālikī jurisprudential reasoning over the
      treatment of a non-Muslim traveller), and for his public
      epistolary refutation of al-Ḥājj ʿUmar Tāl's casting of
      the Sunni Mālikī Massina Caliphate as legitimate target of
      jihad in the campaigns of 1278-9 AH / 1862-3 CE. The
      al-Bakkāy correspondence with ʿUmar Tāl remains one of the
      principal nineteenth-century West African Sunni
      jurisprudential debates over the legitimacy of jihad
      against fellow Muslims.
    description_ar: |
      توفي الشيخ أحمد البكاي بن محمد الكنتي — الفقيه المالكي وشيخ
      الطريقة القادرية في أسرة الكنتيين بتنبكتو، وحفيد أخي مجدد
      القادرية الصحراوية سيدي المختار الكنتي (ت ١٢٢٦ هـ/١٨١١
      ميلادي) واستمرار شيخ الكنتيين الأبرز في تنبكتو منذ عصر
      دولة الماسينا إلى صدر الاحتلال التكروري — في تنبكتو بعد
      الفتح التكروري. وقد ناهز الستين. وأشهر ما خلّف من خبرٍ
      الحماية التي بسطها على الرحالة الألماني هاينريش بارت في
      مقامه بتنبكتو سنة ١٨٥٣–١٨٥٤ ميلادي (وفي رحلة بارت «أسفار
      واستكشافات» مراسلات شاهدة على ضمان البكاي للأمان وتحليل
      فقهي مالكي لمعاملة الرحالة من غير المسلمين)، ورده العلني
      في مراسلاته على الحاج عمر تال في حملاته سنة ١٢٧٨–١٢٧٩
      هـ/١٨٦٢–١٨٦٣ ميلادي مدّعياً أن خلافة الماسينا السنية
      المالكية تستحق الجهاد. وما زالت مراسلات البكاي مع عمر تال
      من أهم المناقشات الفقهية السنية في القرن التاسع عشر بغرب
      أفريقيا حول مشروعية جهاد المسلمين بعضهم بعضاً.
    description_fr: |
      Cheikh Aḥmad al-Bakkāy ibn Muḥammad al-Kuntī — érudit
      mālikite et cheikh qādirī de la famille Kunta de Tombouctou,
      petit-neveu et continuateur du rénovateur qādirī saharien
      Sīdī Mukhtār al-Kuntī (m. 1226 H / 1811 EC), et figure
      principale de l'autorité kuntīa de Tombouctou de l'époque
      du califat de la Massina jusqu'au début de l'occupation
      toucouleur — mourut à Tombouctou après la conquête
      toucouleur. Il avait environ soixante ans. Il est surtout
      connu pour la protection qu'il accorda à l'explorateur
      allemand Heinrich Barth lors du séjour de Barth à Tombouctou
      en 1853-1854 EC (une correspondance conservée dans le
      *Reisen und Entdeckungen* de Barth atteste le sauf-conduit
      d'al-Bakkāy et son raisonnement jurisprudentiel mālikite
      sur le traitement d'un voyageur non musulman), et pour sa
      réfutation épistolaire publique du jugement d'al-Ḥājj ʿUmar
      Tāl qualifiant le califat sunnite mālikite de la Massina de
      cible légitime de jihad dans les campagnes de 1278-9 H /
      1862-3 EC. La correspondance al-Bakkāy avec ʿUmar Tāl
      demeure l'un des principaux débats jurisprudentiels sunnites
      ouest-africains du XIXe siècle sur la légitimité du jihad
      contre des musulmans coreligionnaires.
