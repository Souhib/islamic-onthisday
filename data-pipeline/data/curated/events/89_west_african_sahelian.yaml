# Wave 89 of curated event additions (2026-04-27).
# West African and Sahelian Islamic state events not yet captured in
# the existing wave-18 (death-of-usman-dan-fodio, death-of-ahmadou-
# bamba) or wave-37 (mansas, askia, Tondibi, Timbuktu chroniclers,
# nineteenth-century mujahids, Cheikh Sidiyya Bābā) coverage.
# Twelve entries spanning six centuries of West African and
# Sahelian Sunni history: the medieval Mali pilgrimage of Mansa
# Mūsā (724 AH/1324 CE), the death of Mansa Sulaymān whose court
# Ibn Baṭṭūṭa visited (761 AH/1360 CE), the Songhai pilgrimage of
# Askia Muḥammad (902-903 AH/1496-7 CE), the death of Sīdī Mukhtār
# al-Kuntī (1226 AH/1811 CE), the founding of the Sokoto Caliphate
# (1219 AH/1804 CE), the founding of the Massina Caliphate's
# capital Hamdullāhi (1234 AH/1819 CE), the death of Modibo Adama
# (1263 AH/1847 CE), al-Ḥājj ʿUmar Tāl's conquest of Massina
# (1278 AH/1862 CE), the death of Aḥmad al-Bakkāy al-Kuntī
# (1281 AH/1865 CE), the death of Sīdiyya al-Kabīr (1284 AH/1868
# CE), the founding of Touba by Aḥmadu Bamba (1305 AH/1887 CE),
# and the British conquest of Sokoto (1320 AH/1903 CE). All Sunni
# mainstream Mālikī, Tijānī, Qādirī, or Mouride figures and events;
# trilingual en/ar/fr; no hadith refs needed. Sources: ei2 +
# editorial across all entries.

events:
  # =========================================================================
  # MEDIEVAL MALI AND SONGHAI — PILGRIMAGES
  # =========================================================================

  - slug: mansa-musa-pilgrimage-to-mecca
    category: rihlah
    title_en: Mansa Mūsā's Pilgrimage to Mecca
    title_ar: حجة مَنْسا موسى إلى مكة
    title_fr: Pèlerinage de Mansa Mūsā à La Mecque
    description_en: |
      Mansa Mūsā I — ninth *mansa* of the Mali Empire — set out
      from his capital Niani at the head of a caravan reportedly
      numbering tens of thousands of attendants, soldiers, and
      slaves, and laden with so much gold that his transit through
      Cairo on the way to and from Mecca disrupted the Egyptian
      monetary economy. The Egyptian historian Ibn Faḍl Allāh
      al-ʿUmari, writing about a decade after the Hajj from
      interviews with Cairene officials who had hosted the mansa,
      records that Mūsā's prodigious distribution of gold in alms
      depressed the metal's price in the Cairo market by roughly
      twelve percent and that the dinar did not fully recover its
      pre-Hajj value until al-ʿUmari's own day. al-Maqrīzī confirms
      the disruption a century later. The pilgrimage placed Mali
      on the medieval Old World's mental map: the Catalan Atlas of
      1375 CE depicts Mūsā enthroned in the Sahel holding a
      golden orb. On his return Mūsā brought back Mālikī jurists
      and the Granadan architect Abū Isḥāq al-Sāḥilī, who designed
      the great mosques of Timbuktu and Gao that anchored the
      city's later role as a pole of West African Sunni learning.
    description_ar: |
      خرج مَنْسا موسى الأول — تاسع مَناسي إمبراطورية مالي — من عاصمته
      نياني على رأس قافلة يُحكى عددها بعشرات الألوف من الحاشية
      والجند والعبيد، ومحملة من الذهب بقدر زعزع نظام النقد المصري
      حين مرور المنسا بالقاهرة ذهاباً وإياباً. وذكر المؤرخ المصري
      ابن فضل الله العمري — بعد حجة موسى بنحو عقد، نقلاً عن من
      استضافه من رجال الدولة بالقاهرة — أن إنفاق المنسا الجزيل من
      الذهب صدقاتٍ أسقط ثمن الذهب في سوق القاهرة نحو اثني عشر بالمئة،
      ولم يَعُد الدينار إلى ما كان عليه قبل حجته إلى زمن العمري نفسه.
      وأكد المقريزي بعده بقرن هذا الاضطراب. ورسّخت الحجة مالي على
      خريطة العالم القديم في ذهن أوروبا: فقد صور أطلس قطلونيا سنة
      ١٣٧٥ ميلادي المنسا جالساً على عرشه في الساحل ممسكاً كرة من
      ذهب. وعاد موسى ومعه فقهاء المالكية والمعماري الغرناطي أبو
      إسحاق الساحلي، فبنى مساجد تنبكتو وجاو الكبرى التي رسّخت دور
      المدينة لاحقاً قطباً من أقطاب العلم السني في غرب أفريقيا.
    description_fr: |
      Mansa Mūsā Ier — neuvième *mansa* de l'empire du Mali — partit
      de sa capitale Niani à la tête d'une caravane comptant, selon
      les récits, des dizaines de milliers de serviteurs, soldats
      et esclaves, et si chargée d'or que son passage par Le Caire
      à l'aller et au retour de La Mecque perturba l'économie
      monétaire égyptienne. L'historien égyptien Ibn Faḍl Allāh
      al-ʿUmarī, écrivant une dizaine d'années après le Hajj à
      partir d'entretiens avec les fonctionnaires cairotes qui
      avaient reçu le mansa, rapporte que la prodigieuse
      distribution d'or en aumônes par Mūsā fit chuter le prix du
      métal sur le marché du Caire d'environ douze pour cent, et
      que le dinar ne retrouva pleinement sa valeur d'avant le
      Hajj qu'à l'époque même d'al-ʿUmarī. al-Maqrīzī confirma
      cette perturbation un siècle plus tard. Le pèlerinage inscrivit
      le Mali sur la carte mentale de l'Ancien Monde médiéval :
      l'Atlas catalan de 1375 EC représente Mūsā trônant au Sahel,
      tenant un globe d'or. À son retour, Mūsā ramena des juristes
      mālikites et l'architecte grenadin Abū Isḥāq al-Sāḥilī, qui
      conçut les grandes mosquées de Tombouctou et de Gao ancrant
      le rôle ultérieur de la ville comme pôle de l'érudition
      sunnite ouest-africaine.
    canonical_hijri: {year: 724, precision: year}
    canonical_gregorian: {date: 1324-01-01, precision: year, method: attested}
