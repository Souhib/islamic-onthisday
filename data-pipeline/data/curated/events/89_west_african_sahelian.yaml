  - slug: tukulor-conquest-of-massina
    category: conquest
    title_en: Tukulor Conquest of Massina — al-Ḥājj ʿUmar Tāl Takes Ḥamdullāhi
    title_ar: فتح التكرور للماسينا — استيلاء الحاج عمر تال على حمد الله
    title_fr: Conquête toucouleur de la Massina — al-Ḥājj ʿUmar Tāl prend Ḥamdullāhi
    description_en: |
      al-Ḥājj ʿUmar ibn Saʿīd Tāl al-Fūtī al-Tijānī — Tukulor
      Mālikī scholar of the Senegal valley, principal transmitter
      of the Tijāniyya Sufi order into West Africa, and founder
      of the Tukulor Empire after his jihad of 1268 AH / 1852 CE
      against the polytheist Bambara of Kaarta and Segou —
      defeated the Massina forces of Aḥmadu III ibn Aḥmadu II
      ibn Aḥmadu Lobbo at the battle of Cayawal on 14 Dhū al-Qaʿda
      1278 AH / 13 May 1862 CE and entered the Massina capital
      Ḥamdullāhi shortly after, ending the Qādirī-Mālikī Massina
      Caliphate as an independent polity and incorporating it
      into the Tijānī Tukulor state. The conquest was contested
      across the Sunni West-African scholarly community: the
      al-Kunta-line Qādirī shaykh Aḥmad al-Bakkāy of Timbuktu
      issued a public refutation against ʿUmar Tāl's casting of
      Massina as polytheist or apostate, on the grounds that
      Massina had been a Sunni Mālikī state for two generations.
      A subsequent Fulbe revolt against the Tukulor occupation
      in 1280 AH / 1864 CE led to the death of al-Ḥājj ʿUmar Tāl
      himself in the cliffs of Deguembéré near Bandiagara. The
      Tukulor Empire's western Sūdān successor states (under
      Aḥmadu Sékou and Tijānī ibn Saʿīd Tāl) persisted until the
      French colonial conquest of the late nineteenth century.
    description_ar: |
      هزم الحاج عمر بن سعيد تال الفوتي التيجاني — فقيه مالكي
      تكروري من أهل وادي السنغال، وأبرز ناقلي الطريقة التيجانية
      إلى غرب أفريقيا، ومؤسس دولة التكرور بعد جهاده على بمبارا
      كارتا وسيغو الوثنيين سنة ١٢٦٨ هـ/١٨٥٢ ميلادي — جيوش الماسينا
      تحت قيادة أحمد الثالث بن أحمد الثاني بن أحمد لبو في معركة
      «كياوال» يوم ١٤ ذي القعدة سنة ١٢٧٨ هـ/١٣ مايو ١٨٦٢ ميلادي،
      ودخل عاصمة الماسينا «حمد الله» بعدها بقليل، فأنهى خلافة
      الماسينا القادرية المالكية بوصفها دولة مستقلة وضمها إلى
      دولة التكرور التيجانية. وكان الفتح موضع خلاف في حلقات
      علماء أهل السنة في غرب أفريقيا: فأصدر شيخ الطريقة القادرية
      الكنتي «أحمد البكاي» بتنبكتو رداً علنياً على ادعاء عمر تال
      أن الماسينا كانت دولة شرك أو ردة، محتجاً بأن الماسينا كانت
      دولة سنية مالكية جيلين متعاقبين. وأدت ثورة الفلانيين على
      الاحتلال التكروري للماسينا سنة ١٢٨٠ هـ/١٨٦٤ ميلادي إلى مقتل
      الحاج عمر تال نفسه في شعاب «دغمبيري» قرب «بانديغرا». وظلت
      دول التكرور الخلف في السودان الغربي (في عهد أحمد سيكو
      وتيجاني بن سعيد تال) قائمة إلى الفتح الاستعماري الفرنسي في
      أواخر القرن التاسع عشر.
    description_fr: |
      al-Ḥājj ʿUmar ibn Saʿīd Tāl al-Fūtī al-Tijānī — érudit
      mālikite toucouleur de la vallée du Sénégal, principal
      transmetteur de l'ordre soufi tijānī en Afrique de l'Ouest,
      et fondateur de l'empire toucouleur après son jihad de
      1268 H / 1852 EC contre les Bambara polythéistes du Kaarta
      et du Ségou — défit les forces de la Massina d'Aḥmadu III
      ibn Aḥmadu II ibn Aḥmadu Lobbo à la bataille de Cayawal le
      14 Dhū al-Qaʿda 1278 H / 13 mai 1862 EC et entra peu après
      dans la capitale de la Massina, Ḥamdullāhi, mettant fin au
      califat qādirī-mālikite de la Massina comme polité
      indépendante et l'incorporant à l'État toucouleur tijānī.
      La conquête fut contestée dans la communauté savante sunnite
      ouest-africaine : le cheikh qādirī de la branche kuntī
      Aḥmad al-Bakkāy de Tombouctou émit une réfutation publique
      contre la qualification par ʿUmar Tāl de la Massina comme
      polythéiste ou apostate, au motif que la Massina avait été
      un État sunnite mālikite pendant deux générations. Une
      révolte peule subséquente contre l'occupation toucouleur
      en 1280 H / 1864 EC entraîna la mort d'al-Ḥājj ʿUmar Tāl
      lui-même dans les falaises de Déguembéré près de Bandiagara.
      Les États successeurs de l'empire toucouleur dans le Sūdān
      occidental (sous Aḥmadu Sékou et Tijānī ibn Saʿīd Tāl)
      persistèrent jusqu'à la conquête coloniale française de la
      fin du XIXe siècle.
