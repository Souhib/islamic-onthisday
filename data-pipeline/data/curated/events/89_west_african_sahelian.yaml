  - slug: british-conquest-of-sokoto-caliphate
    category: political_event
    title_en: British Conquest of the Sokoto Caliphate
    title_ar: الفتح الإنجليزي على خلافة صكتو
    title_fr: Conquête britannique du califat de Sokoto
    description_en: |
      Sultan Muḥammad Aṭṭāhirū I — twelfth caliph of the Sokoto
      Caliphate founded by Shaykh ʿUthmān dan Fodio a century
      earlier — was defeated by a British colonial force under
      Frederick Lugard, High Commissioner of the Northern Nigeria
      Protectorate, on 16 Dhū al-Qaʿda 1320 AH / 15 March 1903 CE
      at the Battle of Sokoto. The city of Sokoto was occupied
      the same day, and the Caliphate was formally absorbed into
      the British Northern Nigeria Protectorate. Aṭṭāhirū I refused
      submission and led a *hijra* of his supporters eastward
      toward Mecca; he was overtaken by a British column at the
      Battle of Burmi on 27 July 1903 and killed in the field.
      The thirty-odd Sokoto emirates (Kano, Katsina, Zaria,
      Bauchi, Adamawa, and others) were each absorbed under
      indirect rule, retaining their emirs as British-appointed
      administrators of Mālikī Islamic law in personal status
      matters but stripped of military and external sovereignty.
      The Caliphate's century of independent existence (1219 AH /
      1804 CE — 1320 AH / 1903 CE) thus ended; the title of
      *amīr al-muʾminīn* became, in British colonial usage, the
      Sultan of Sokoto, an office that persists to this day as
      the senior religious authority for Sunni Muslims in
      Northern Nigeria.
    description_ar: |
      هُزم السلطان محمد الطاهر الأول — ثاني عشر خلفاء صكتو من
      الخلافة التي أسسها الشيخ عثمان بن فودي قبل قرن — أمام قوة
      استعمارية بريطانية بقيادة المفوض السامي لمحمية شمال
      نيجيريا «فردريك لوغارد»، يوم ١٦ ذي القعدة سنة ١٣٢٠ هـ/١٥
      مارس ١٩٠٣ ميلادي في «معركة صكتو». واحتلت مدينة صكتو في
      اليوم نفسه، وضمت الخلافة رسمياً إلى محمية شمال نيجيريا
      البريطانية. ورفض الطاهر الأول التسليم وقاد هجرة بأنصاره
      شرقاً نحو مكة، فأدركته فرقة بريطانية في معركة «برمي» يوم
      ٢٧ يوليو ١٩٠٣ ميلادي فقتل فيها. واستوعبت إمارات صكتو الثلاثون
      ونيف (كانو، قتسينا، زاريا، باوتشي، أدماوة، وغيرها) كل
      منها على حدة تحت «الحكم غير المباشر»، فأبقت على أمرائها
      منصبين من قبل الإنجليز قائمين على فقه المالكية في الأحوال
      الشخصية ولكن مسلوبي السلطان العسكري والخارجي. فانتهى بذلك
      قرن من استقلال الخلافة (١٢١٩ هـ/١٨٠٤ ميلادي — ١٣٢٠ هـ/١٩٠٣
      ميلادي)؛ وانقلب لقب «أمير المؤمنين» في الاستعمال الاستعماري
      الإنجليزي لقب «سلطان صكتو»، وهو منصب باقٍ إلى اليوم سلطةً
      دينية كبرى لمسلمي شمال نيجيريا من أهل السنة.
    description_fr: |
      Le sultan Muḥammad Aṭṭāhirū Ier — douzième calife du califat
      de Sokoto fondé par Cheikh ʿUthmān dan Fodio un siècle plus
      tôt — fut défait par une force coloniale britannique sous
      Frederick Lugard, haut-commissaire du Protectorat du Nord
      Nigeria, le 16 Dhū al-Qaʿda 1320 H / 15 mars 1903 EC à la
      bataille de Sokoto. La ville de Sokoto fut occupée le même
      jour, et le califat fut formellement absorbé au sein du
      Protectorat britannique du Nord Nigeria. Aṭṭāhirū Ier refusa
      la soumission et conduisit une *hijra* de ses partisans
      vers l'est en direction de La Mecque ; il fut rattrapé par
      une colonne britannique à la bataille de Burmi le 27 juillet
      1903 et tué sur le champ de bataille. Les quelque trente
      émirats de Sokoto (Kano, Katsina, Zaria, Bauchi, Adamawa et
      autres) furent absorbés sous *Indirect Rule*, conservant
      leurs émirs comme administrateurs de la loi islamique
      mālikite en matière de statut personnel nommés par les
      Britanniques, mais dépouillés de souveraineté militaire et
      extérieure. Le siècle d'existence indépendante du califat
      (1219 H / 1804 EC — 1320 H / 1903 EC) prit ainsi fin ; le
      titre d'*amīr al-muʾminīn* devint, dans l'usage colonial
      britannique, celui de sultan de Sokoto — fonction qui
      persiste à ce jour comme principale autorité religieuse
      des musulmans sunnites du nord du Nigeria.
