  - slug: founding-of-hamdullahi-massina
    category: founding
    title_en: Founding of Ḥamdullāhi — Capital of the Massina Caliphate
    title_ar: تأسيس حمد الله — عاصمة خلافة الماسينا
    title_fr: Fondation de Ḥamdullāhi — capitale du califat de la Massina
    description_en: |
      Shaykh Aḥmadu Lobbo (Seku Aamadu) — Fulbe Mālikī jurist and
      Qādirī Sufi disciple of the al-Kunta school of Timbuktu,
      victor over the Bambara-aligned Fulbe lords of the Inner
      Niger Delta in the jihad of 1233-1234 AH / 1818 CE — laid
      out the new capital city of *Ḥamdullāhi* ("Praise to God")
      on the open Sahel north of Mopti as the seat of his
      theocratic *Diina* state in 1234 AH / 1819 CE. The city
      was deliberately separated from the older trading and
      scholarly centres of Djenné and Timbuktu, planned around a
      central congregational mosque and a council-house for the
      *majlis* of forty *ʿulamāʾ* who governed the Massina
      Caliphate's strict Mālikī-law administration, and ringed
      with palaces for Aḥmadu Lobbo and his successors. Around
      Ḥamdullāhi developed approximately six hundred Quranic
      schools and a pastoral-resource code regulating access to
      the Niger floodplain that remains studied to this day.
      Ḥamdullāhi served as the Massina capital from 1234 AH /
      1819 CE until its sack and partial destruction by the
      Tukulor armies of al-Ḥājj ʿUmar Tāl on 14 Dhū al-Qaʿda
      1278 AH / 13 May 1862 CE.
    description_ar: |
      اختط الشيخ أحمد لبو (أسكي أحمد) — فقيه مالكي فلاني، ومريد
      قادري على طريقة الكنتيين بتنبكتو، والمنتصر على لوارد فلانيي
      البمبارا من إقليم النيجر الداخلي في جهاد سنة ١٢٣٣–١٢٣٤
      هـ/١٨١٨ ميلادي — مدينته الجديدة عاصمةً «حمد الله» (أي ثناءً
      على الله) في سهل الساحل المفتوح شمال «موبتي» مقراً لدولته
      الدينية «الدينة» سنة ١٢٣٤ هـ/١٨١٩ ميلادي. وفصلت المدينة
      عمداً عن مراكز التجارة والعلم القديمة من جني وتنبكتو،
      ورسمت حول مسجد جامع مركزي ودار شورى لمجلس أربعين من العلماء
      تتولى إدارة دولة الماسينا على مذهب مالك الصارم، وأحاطت بها
      قصور أحمد لبو وخلفائه. ونشأت حول حمد الله نحو ست مئة مدرسة
      قرآنية وقانون رعوي ينظم الانتفاع بسهل النيجر الفيضي ما زال
      موضع دراسة المختصين. وكانت حمد الله عاصمة الماسينا منذ سنة
      ١٢٣٤ هـ/١٨١٩ ميلادي إلى أن نهبتها وأصابتها بتخريب جزئي جيوش
      التكرور بقيادة الحاج عمر تال يوم ١٤ ذي القعدة سنة ١٢٧٨
      هـ/١٣ مايو ١٨٦٢ ميلادي.
    description_fr: |
      Cheikh Aḥmadu Lobbo (Seku Aamadu) — juriste mālikite peul et
      disciple soufi qādirī de l'école kuntī de Tombouctou,
      vainqueur des seigneurs peuls alliés des Bambara du Delta
      intérieur du Niger lors du jihad de 1233-1234 H / 1818 EC —
      traça la nouvelle capitale *Ḥamdullāhi* (« Louange à Dieu »)
      sur le Sahel ouvert au nord de Mopti, siège de son État
      théocratique *Diina*, en 1234 H / 1819 EC. La ville fut
      délibérément séparée des anciens centres commerciaux et
      savants de Djenné et de Tombouctou, planifiée autour d'une
      grande mosquée congrégationnelle et d'une maison du conseil
      pour le *majlis* des quarante *ʿulamāʾ* qui gouvernaient
      l'administration de la loi mālikite stricte du califat de
      la Massina, et entourée des palais d'Aḥmadu Lobbo et de ses
      successeurs. Autour de Ḥamdullāhi se développèrent environ
      six cents écoles coraniques et un code pastoral régulant
      l'accès à la plaine d'inondation du Niger, encore étudié
      aujourd'hui. Ḥamdullāhi resta la capitale de la Massina de
      1234 H / 1819 EC jusqu'à son sac et sa destruction partielle
      par les armées toucouleurs d'al-Ḥājj ʿUmar Tāl le 14
      Dhū al-Qaʿda 1278 H / 13 mai 1862 EC.
