  - slug: askia-muhammad-pilgrimage-to-mecca
    category: rihlah
    title_en: Askia Muḥammad's Pilgrimage to Mecca
    title_ar: حجة أسكيا محمد إلى مكة
    title_fr: Pèlerinage d'Askia Muḥammad à La Mecque
    description_en: |
      al-Ḥājj Muḥammad ibn Abī Bakr Tūré (Askia Muḥammad I) — first
      ruler of the Askia dynasty of the Songhai Empire after deposing
      Sunni ʿAlī's son Sunni Bāru in 898 AH / 1493 CE — set out from
      Gao on a Hajj that would last roughly two years, traversing
      the trans-Saharan caravan routes via the Egyptian Mamluk
      capital. The Songhai chroniclers (the *Tārīkh al-Sūdān* of
      ʿAbd al-Raḥmān al-Saʿdī and the *Tārīkh al-Fattāsh* of the
      Kati family) record that during his stay in Cairo the
      Sharīfian ʿAbbāsid caliph al-Mutawakkil II (the residual
      Cairo-based ʿAbbāsid line under Mamluk patronage) invested
      Askia Muḥammad with the title of *khalīfa* of the western
      Sūdān. In Mecca he met the Egyptian Mālikī jurist Jalāl al-Dīn
      al-Suyūṭī (then resident in the Holy Cities), who issued legal
      opinions for him on points of governance. Askia Muḥammad
      returned to Gao with a corps of Mālikī scholars and books
      that, joining the existing Timbuktu Sankoré tradition,
      consolidated the Mālikī rite as the legal-administrative
      framework of the Songhai state for the next century until
      the Saadi conquest of 999 AH / 1591 CE.
    description_ar: |
      خرج الحاج محمد بن أبي بكر توري (أسكيا محمد الأول) — أول حكام
      الأسرة الأسكية من إمبراطورية صنغاي بعد عزله ابن السلطان سني
      علي «سني بارو» سنة ٨٩٨ هـ/١٤٩٣ ميلادي — من جاو على حجة
      امتدت قرابة سنتين قطع فيها طرق القوافل عبر الصحراء على عاصمة
      المماليك بمصر. وذكر مؤرخو صنغاي (في «تاريخ السودان» لعبد
      الرحمن السعدي و«تاريخ الفتاش» لأسرة كعت) أن الخليفة العباسي
      الشريف المتوكل الثالث في القاهرة (الفرع العباسي المتأخر برعاية
      المماليك) قلده في إقامته بالقاهرة خلافة السودان الغربي. وفي
      مكة لقي الفقيه المالكي المصري جلال الدين السيوطي (وكان يومئذ
      مقيماً بالحرمين)، فاستفتاه في مسائل من الحكم فأفتاه. وعاد
      أسكيا محمد إلى جاو ومعه فرقة من فقهاء المالكية والكتب،
      انضمت إلى تقليد سنكوري التنبكتي القائم، فرسّخت المذهب المالكي
      إطاراً تشريعياً وإدارياً لدولة صنغاي قرناً كاملاً قبل الفتح
      السعدي سنة ٩٩٩ هـ/١٥٩١ ميلادي.
    description_fr: |
      al-Ḥājj Muḥammad ibn Abī Bakr Tūré (Askia Muḥammad Ier) —
      premier souverain de la dynastie askia de l'empire du
      Songhaï après avoir déposé le fils de Sunni ʿAlī, Sunni Bāru,
      en 898 H / 1493 EC — partit de Gao pour un Hajj qui durerait
      environ deux ans, traversant les routes caravanières
      transsahariennes via la capitale mamelouke égyptienne. Les
      chroniqueurs songhaï (le *Tārīkh al-Sūdān* d'ʿAbd al-Raḥmān
      al-Saʿdī et le *Tārīkh al-Fattāsh* de la famille Kati)
      rapportent que durant son séjour au Caire, le calife abbasside
      chérifien al-Mutawakkil II (la lignée abbasside résiduelle
      du Caire sous patronage mamelouk) investit Askia Muḥammad
      du titre de *khalīfa* du Sūdān occidental. À La Mecque, il
      rencontra le juriste mālikite égyptien Jalāl al-Dīn al-Suyūṭī
      (alors résident dans les Villes Saintes), qui lui rendit des
      avis juridiques sur des questions de gouvernement. Askia
      Muḥammad rentra à Gao avec un corps d'érudits mālikites et
      des livres qui, rejoignant la tradition existante de Sankoré
      à Tombouctou, consolidèrent le rite mālikite comme cadre
      juridico-administratif de l'État songhaï pendant le siècle
      suivant, jusqu'à la conquête saadienne de 999 H / 1591 EC.
