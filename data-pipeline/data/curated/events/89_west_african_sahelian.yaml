  - slug: death-of-mansa-sulayman
    category: ruler_death
    title_en: Death of Mansa Sulaymān — Mali Empire Visited by Ibn Baṭṭūṭa
    title_ar: وفاة مَنْسا سليمان — صاحب الإمبراطورية في زمن ابن بطوطة
    title_fr: Mort de Mansa Sulaymān — empire du Mali visité par Ibn Baṭṭūṭa
    description_en: |
      Mansa Sulaymān ibn Abī Bakr — half-brother of Mansa Mūsā I
      and tenth *mansa* of the Mali Empire after the brief reign
      of Mūsā's son Maghan I — died in his capital Niani after
      roughly twenty-four years on the throne. His reign is the
      best-attested of all medieval Mali because the Maghrebi
      traveller Ibn Baṭṭūṭa visited Mali in 753-754 AH / 1352-
      1353 CE and was hosted at the mansa's court for eight
      months, recording in his *Riḥla* a detailed first-person
      description of the Friday assembly, the *ʿīd* festival
      observances, the strict adherence of the population to the
      Mālikī rite, the Mande poetic praises of the *jeli*, and
      the public pious veneration of the Qurʾān to the point of
      Qurʾanic memorisation being a precondition of release for
      enslaved children. Ibn Khaldūn confirms Sulaymān's place in
      the dynastic line in his *Kitāb al-ʿIbar*. The wealth and
      Mālikī piety of Mali under Sulaymān continued the patterns
      established under Mansa Mūsā, but a succession crisis at
      his death precipitated the gradual decline of imperial Mali
      across the next century.
    description_ar: |
      توفي مَنْسا سليمان بن أبي بكر — أخو مَنْسا موسى الأول لأبيه
      وعاشر مَناسي إمبراطورية مالي بعد ملك ابن موسى «ماغان الأول»
      اليسير — في عاصمته نياني بعد قرابة أربع وعشرين سنة على العرش.
      وعهده أوفر عهود مالي الوسيطة توثيقاً، إذ زار الرحالة المغاربي
      ابن بطوطة بلاد مالي سنة ٧٥٣–٧٥٤ هـ/١٣٥٢–١٣٥٣ ميلادي، وأقام
      في حضرة المنسا ثمانية أشهر مكرماً، فسجل في «رحلته» وصفاً
      مفصلاً من شاهد عين لجمعة المسلمين، ولشعائر العيد، والتزام
      أهل البلد التزاماً صارماً بمذهب مالك، ولأناشيد المدح المندية
      لـ«الجلي»، ولتعظيم القرآن في عموم الشعب حتى صار حفظه شرطاً
      في عتق صبيان الرقيق. وأكد ابن خلدون موضع سليمان في السلسلة
      في «كتاب العبر». واستمر الثراء والتديّن المالكي في عهد سليمان
      على نهج مَنْسا موسى، إلا أن أزمة الخلافة بعد وفاته بدأت
      انحدار دولة مالي الإمبراطورية تدريجياً في القرن التالي.
    description_fr: |
      Mansa Sulaymān ibn Abī Bakr — demi-frère de Mansa Mūsā Ier
      et dixième *mansa* de l'empire du Mali après le bref règne
      du fils de Mūsā, Maghan Ier — mourut dans sa capitale Niani
      après environ vingt-quatre ans sur le trône. Son règne est
      le mieux attesté de tout le Mali médiéval car le voyageur
      maghrébin Ibn Baṭṭūṭa visita le Mali en 753-754 H / 1352-
      1353 EC et fut reçu à la cour du mansa pendant huit mois,
      consignant dans sa *Riḥla* une description détaillée de
      première main de l'assemblée du vendredi, des observances
      du *ʿīd*, de la stricte adhésion de la population au rite
      mālikite, des louanges poétiques mandé des *jeli*, et de
      la vénération publique pieuse du Coran au point que la
      mémorisation coranique était une condition de libération
      des enfants asservis. Ibn Khaldūn confirme la place de
      Sulaymān dans la lignée dynastique dans son *Kitāb al-ʿIbar*.
      La richesse et la piété mālikite du Mali sous Sulaymān
      poursuivirent les schémas établis sous Mansa Mūsā, mais
      une crise de succession à sa mort précipita le déclin
      graduel du Mali impérial au cours du siècle suivant.
