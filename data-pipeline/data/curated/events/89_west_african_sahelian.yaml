  - slug: death-of-sidiyya-al-kabir
    category: scholar_death
    title_en: Death of Sīdiyya al-Kabīr — Mauritanian Qādirī Founder
    title_ar: وفاة سيدية الكبير — مؤسس قادرية موريتانيا
    title_fr: Mort de Sīdiyya al-Kabīr — fondateur qādirī mauritanien
    description_en: |
      Sīdiyya al-Kabīr ibn al-Mukhtār al-Hayballī — Mālikī Mauritanian
      scholar of the Trārza emirate, founder of the *Sīdiyya* family
      *zāwiya* of Boutilimit in southern Mauritania, transmitter of
      the Saharan Qādiriyya from his teacher Sīdī Mukhtār al-Kuntī
      of Azawād (d. 1226 AH / 1811 CE), and great-grandfather of
      the later Cheikh Sidiyya Bābā (d. 1342 AH / 1924 CE) — died
      in southern Mauritania at advanced age. He was approximately
      in his eighties. His scholarly correspondence, preserved in
      the Boutilimit family archives, ranges across Mālikī fiqh,
      Qādirī devotional doctrine, and the practical jurisprudence
      of the desert tribes; together with the Kunta zāwiya at
      Azawād it formed the Saharan Qādirī axis that consolidated
      Sunni religious authority across Mauritania, the western
      Sahara, and northern Senegal in the nineteenth century, and
      that supplied much of the religious vocabulary of the
      Mauritanian *zāwiya* system the French colonial administration
      would later confront in the early twentieth century.
    description_ar: |
      توفي سيدية الكبير بن المختار الهيبلي — الفقيه المالكي الموريتاني
      من إمارة الترارزة، مؤسس زاوية أسرة «السيدية» في «بوتلميت»
      في جنوب موريتانيا، وناقل القادرية الصحراوية عن شيخه سيدي
      المختار الكنتي بأزواد (ت ١٢٢٦ هـ/١٨١١ ميلادي)، وجد جد الشيخ
      «سيدية بابا» المتأخر (ت ١٣٤٢ هـ/١٩٢٤ ميلادي) — في جنوب
      موريتانيا عن سن متقدمة. وقد ناهز الثمانين. ومراسلاته العلمية
      المحفوظة في أرشيف الأسرة ببوتلميت تتناول فقه المالكية وعقيدة
      القادرية والفقه العملي لقبائل البادية. وكانت زاويته إلى جانب
      زاوية الكنتيين بأزواد قطباً للقادرية الصحراوية رسّخ السلطة
      الدينية السنية في موريتانيا والصحراء الغربية وشمال السنغال
      في القرن التاسع عشر، وأمد نظام الزوايا الموريتاني بمعظم معجمه
      الفقهي الذي ستواجهه الإدارة الاستعمارية الفرنسية في صدر
      القرن العشرين.
    description_fr: |
      Sīdiyya al-Kabīr ibn al-Mukhtār al-Hayballī — érudit
      mauritanien mālikite de l'émirat du Trārza, fondateur de la
      *zāwiya* familiale des *Sīdiyya* à Boutilimit dans le sud de
      la Mauritanie, transmetteur de la Qādiriyya saharienne par
      son maître Sīdī Mukhtār al-Kuntī de l'Azawād (m. 1226 H /
      1811 EC), et arrière-grand-père du futur Cheikh Sidiyya Bābā
      (m. 1342 H / 1924 EC) — mourut dans le sud de la Mauritanie
      à un âge avancé. Il avait environ quatre-vingts ans. Sa
      correspondance savante, conservée dans les archives familiales
      de Boutilimit, embrasse le fiqh mālikite, la doctrine
      dévotionnelle qādirī et la jurisprudence pratique des tribus
      du désert ; elle formait, aux côtés de la zāwiya kuntī
      d'Azawād, l'axe qādirī saharien qui consolida l'autorité
      religieuse sunnite en Mauritanie, dans le Sahara occidental
      et dans le nord du Sénégal au XIXe siècle, et fournit une
      grande part du vocabulaire religieux du système des *zāwiya*
      mauritaniennes que l'administration coloniale française
      affronterait au début du XXe siècle.
