  - slug: founding-of-sokoto-caliphate
    category: dynastic_founding
    title_en: Founding of the Sokoto Caliphate — Hijra of ʿUthmān dan Fodio
    title_ar: قيام خلافة صكتو — هجرة عثمان بن فودي
    title_fr: Fondation du califat de Sokoto — hégire de ʿUthmān dan Fodio
    description_en: |
      Shaykh ʿUthmān ibn Muḥammad ibn Fudi (Hausa: dan Fodio) —
      Mālikī jurist of the al-Kunta-line Qādirī Sufi order in
      what is today northwestern Nigeria — declared *hijra* with
      his followers from Degel to Gudu on 12 Dhū al-Qaʿda 1218 AH /
      21 February 1804 CE in defiance of the Hausa sultanate of
      Gobir, then proclaimed jihad against the established Hausa
      rulers in 1219 AH / 1804 CE. The decisive battle of Tabkin
      Kwatto on 6 Rabīʿ I 1219 AH / 16 June 1804 CE secured the
      jihad's first major victory; the cumulative campaigns of
      the next four years overthrew the Hausa kingdoms of Gobir,
      Katsina, Kano, Zaria, and others, replacing them with
      *emirates* governed by Fulani *amīr al-muʾminīn*-appointed
      lieutenants. Shaykh ʿUthmān received the title *amīr
      al-muʾminīn* and assumed religious authority over what would
      become the Sokoto Caliphate — the largest African polity of
      the nineteenth century, ruling at its height most of present-
      day northern Nigeria, southern Niger, and parts of Cameroon
      and Burkina Faso, and persisting until the British conquest
      of 1320 AH / 1903 CE. The Caliphate's founding works
      (*Iḥyāʾ al-Sunna wa-Ikhmād al-Bidʿa*, *Bayān Wujūb al-Hijra*)
      laid out its legal-theological foundations in the classical
      Mālikī-Qādirī register.
    description_ar: |
      أعلن الشيخ عثمان بن محمد بن فودي — فقيه على مذهب الإمام مالك
      ومريد للطريقة القادرية في فرع الكنتيين بشمال غربي نيجيريا
      اليوم — الهجرة من «دغل» إلى «غدو» مع أصحابه يوم ١٢ ذي القعدة
      سنة ١٢١٨ هـ/٢١ فبراير ١٨٠٤ ميلادي مقاومةً لسلطنة الهوسا في
      «غوبر»، ثم أعلن الجهاد على ملوك الهوسا في سنة ١٢١٩ هـ/١٨٠٤
      ميلادي. وأحرزت معركة «طبكين كواتو» يوم ٦ ربيع الأول سنة ١٢١٩
      هـ/١٦ يونيو ١٨٠٤ ميلادي للجهاد أول انتصاراته الكبرى؛ وأسقطت
      حملات السنوات الأربع التالية ممالك الهوسا في «غوبر» و«قتسينا»
      و«كانو» و«زاريا» وغيرها، فأقيمت محلها إمارات يحكمها لواء أمير
      المؤمنين من الفلانيين. وتولى الشيخ عثمان لقب أمير المؤمنين
      وسلطة الدين على ما سيصير خلافة صكتو — أكبر دولة في أفريقيا في
      القرن التاسع عشر، حكمت في أوج اتساعها معظم شمال نيجيريا اليوم
      وجنوب النيجر وأطرافاً من الكاميرون وبوركينا فاسو، واستمرت إلى
      الفتح الإنجليزي سنة ١٣٢٠ هـ/١٩٠٣ ميلادي. وقد أرست مصنفات الشيخ
      المؤسسة (وأبرزها «إحياء السنة وإخماد البدعة» و«بيان وجوب
      الهجرة») الأسس الفقهية والعقدية للخلافة على المنهاج المالكي
      القادري الكلاسيكي.
    description_fr: |
      Cheikh ʿUthmān ibn Muḥammad ibn Fudi (haoussa : dan Fodio) —
      juriste mālikite et soufi de l'ordre qādirī dans la branche
      kuntī de l'actuel nord-ouest du Nigeria — déclara la *hijra*
      avec ses partisans de Degel à Gudu le 12 Dhū al-Qaʿda 1218 H /
      21 février 1804 EC en défiance du sultanat haoussa de Gobir,
      puis proclama le jihad contre les souverains haoussa établis
      en 1219 H / 1804 EC. La bataille décisive de Tabkin Kwatto
      le 6 Rabīʿ I 1219 H / 16 juin 1804 EC remporta la première
      victoire majeure du jihad ; les campagnes cumulées des quatre
      années suivantes renversèrent les royaumes haoussa de Gobir,
      Katsina, Kano, Zaria et autres, les remplaçant par des
      *émirats* gouvernés par des lieutenants peuls nommés par
      l'*amīr al-muʾminīn*. Cheikh ʿUthmān reçut le titre d'*amīr
      al-muʾminīn* et prit l'autorité religieuse sur ce qui
      deviendrait le califat de Sokoto — la plus grande polité
      africaine du XIXe siècle, gouvernant à son apogée la plus
      grande partie du nord du Nigeria actuel, du sud du Niger et
      de portions du Cameroun et du Burkina Faso, et persistant
      jusqu'à la conquête britannique de 1320 H / 1903 EC. Les
      ouvrages fondateurs du califat (*Iḥyāʾ al-Sunna wa-Ikhmād
      al-Bidʿa*, *Bayān Wujūb al-Hijra*) en posèrent les bases
      juridico-théologiques dans le registre classique mālikite-
      qādirī.
