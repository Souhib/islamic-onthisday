  # =========================================================================
  # SAHARAN AND SAHELIAN QĀDIRĪ MASTERS
  # =========================================================================

  - slug: death-of-sidi-mukhtar-al-kunti
    category: scholar_death
    title_en: Death of Sīdī Mukhtār al-Kuntī — Saharan Qādirī Renewer
    title_ar: وفاة سيدي المختار الكنتي — مجدد القادرية الصحراوية
    title_fr: Mort de Sīdī Mukhtār al-Kuntī — rénovateur qādirī saharien
    description_en: |
      Sīdī al-Mukhtār al-Kabīr ibn Aḥmad al-Kuntī — Mālikī scholar
      and Qādirī shaykh of the al-Kunta tribal-scholarly federation
      of the Saharan-Sahelian Azawād region around Timbuktu, the
      figure to whom the modern Sahelian renewal of the Qādiriyya
      Sufi order is attributed, and the most-cited Sunni West-
      African ʿālim of the late twelfth and early thirteenth hijri
      centuries — died at his zāwiya in the Azawād near Timbuktu
      on 19 Shaʿbān 1226 AH / 8 September 1811 CE. He was about
      82. His extensive works of Sufi *taṣawwuf* (most prominently
      the *Kashf wa-l-Bayān*), tafsīr, and Mālikī fiqh, together
      with his correspondence networks across the Sahara from
      Mauritania to Hausaland, shaped the religious vocabulary
      of nineteenth-century West African reform: ʿUthmān dan Fodio
      took initiation in the al-Kunta-renewed Qādiriyya, Aḥmadu
      Lobbo of Massina drew on his teachings, and the al-Kunta
      family remained the principal religious authority in
      Timbuktu through the Massina period.
    description_ar: |
      توفي سيدي المختار الكبير بن أحمد الكنتي — الفقيه المالكي
      وشيخ الطريقة القادرية في تكتل أسرة الكنتيين العلمية القبلية
      في أزواد الصحراوي الساحلي حول تنبكتو، صاحب التجديد الحديث
      للطريقة القادرية في الساحل، وأكثر علماء أهل السنة في غرب
      أفريقيا في أواخر القرن الثاني عشر وأوائل الثالث عشر الهجريين
      تأثيراً — في زاويته بأزواد قرب تنبكتو يوم ١٩ شعبان سنة ١٢٢٦
      هـ/٨ سبتمبر ١٨١١ ميلادي. وقد ناهز الثانية والثمانين. ومصنفاته
      الواسعة في التصوف (وأبرزها «الكشف والبيان») وفي التفسير
      وفقه المالكية، مع شبكات مراسلاته الممتدة عبر الصحراء من
      موريتانيا إلى أرض الهوسا، صاغت معجم الإصلاح في غرب أفريقيا
      في القرن التاسع عشر: فأخذ عثمان بن فودي الورد القادري المجدد
      على يد الكنتيين، واستفاد منه أحمد لبو في الماسينا، وبقيت
      أسرة الكنتيين المرجع الديني الأول في تنبكتو إلى عصر دولة
      الماسينا.
    description_fr: |
      Sīdī al-Mukhtār al-Kabīr ibn Aḥmad al-Kuntī — érudit mālikite
      et cheikh qādirī de la fédération tribale-savante des Kunta
      de la région saharo-sahélienne de l'Azawād autour de
      Tombouctou, figure à qui l'on attribue le renouveau sahélien
      moderne de la Qādiriyya, et plus cité des ʿulamāʾ sunnites
      ouest-africains de la fin du XIIe et du début du XIIIe
      siècles hégiriens — mourut à sa zāwiya de l'Azawād près de
      Tombouctou le 19 Shaʿbān 1226 H / 8 septembre 1811 EC. Il
      avait environ 82 ans. Ses vastes ouvrages de *taṣawwuf*
      (au premier rang desquels le *Kashf wa-l-Bayān*), de tafsīr
      et de fiqh mālikite, joints à ses réseaux de correspondance
      à travers le Sahara de la Mauritanie au pays haoussa,
      façonnèrent le vocabulaire religieux du réformisme
      ouest-africain au XIXe siècle : ʿUthmān dan Fodio reçut
      l'initiation dans la Qādiriyya rénovée par les Kunta, Aḥmadu
      Lobbo de la Massina puisa dans ses enseignements, et la
      famille Kunta demeura la principale autorité religieuse de
      Tombouctou jusqu'à l'époque de la Massina.
    canonical_hijri: {year: 1226, month: 8, day: 19, precision: day}
    canonical_gregorian: {date: 1811-09-08, precision: day, method: attested}
