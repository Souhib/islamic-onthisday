  # =========================================================================
  # LATE-SAMARRA RECOVERY ERA
  # =========================================================================

  - slug: death-of-al-muktafi
    category: ruler_death
    title_en: Death of Caliph al-Muktafī bi-Allāh
    title_ar: وفاة الخليفة المكتفي بالله
    title_fr: Mort du calife al-Muktafī bi-Allāh
    description_en: |
      ʿAlī al-Muktafī bi-Allāh ibn al-Muʿtaḍid, seventeenth
      Abbasid caliph (reigned 289-295 AH), died at Baghdad
      after a reign of about six and a half years, at age
      about thirty-three. He continued the recovery
      programme of his father al-Muʿtaḍid: ending the
      separate Tūlūnid emirate over Egypt and Syria by
      sending the army that overthrew Hārūn ibn Khumārawayh
      and reincorporated those provinces into direct
      caliphal administration in 292 AH; defeating the
      Qarāmiṭa raid that struck the Syrian desert; and
      decisively beating back the Byzantine summer offensive
      against the ʿAwāṣim. His death in Dhū al-Qaʿda 295 AH
      from chronic illness brought to the throne his
      thirteen-year-old brother Jaʿfar al-Muqtadir, whose
      long but troubled reign would mark the beginning of
      the visible decline of the central caliphate. al-
      Ṭabarī, who lived through al-Muktafī's reign, gives
      the most detailed contemporary record.
    description_ar: |
      توفي علي المكتفي بالله بن المعتضد — سابع عشر خلفاء
      بني العباس (حكم من ٢٨٩ إلى ٢٩٥ هـ) — ببغداد بعد ست
      سنين ونصف من الخلافة، عن نحو ثلاث وثلاثين سنة. واصل
      عهده برنامج النهضة الذي بدأه أبوه المعتضد: فأنهى
      إمارة بني طولون المستقلة على مصر والشام بإرساله
      الجيش الذي خلع هارون بن خمارويه وأعاد المنطقتين إلى
      الإدارة المركزية للخلافة سنة ٢٩٢ هـ، وقهر غارة
      القرامطة على بادية الشام، وردّ الصائفة البيزنطية
      عن الثغور والعواصم. ولما توفي في ذي القعدة سنة ٢٩٥
      هـ من علة طويلة، تولى الخلافة أخوه جعفر المقتدر
      وهو ابن ثلاث عشرة سنة، فبدأ بحُكمه الطويل المضطرب
      انحدار الخلافة المركزية الظاهر. وأطول الروايات هي
      رواية الطبري معاصر العهد.
    description_fr: |
      ʿAlī al-Muktafī bi-Allāh ibn al-Muʿtaḍid, dix-septième
      calife abbasside (règne 289-295 H), mourut à Baghdād
      après un règne d'environ six ans et demi, âgé d'environ
      trente-trois ans. Il poursuivit le programme de
      redressement de son père al-Muʿtaḍid : il mit fin à
      l'émirat séparé des Ṭūlūnides sur l'Égypte et la Syrie
      en envoyant l'armée qui déposa Hārūn ibn Khumārawayh
      et réintégra ces provinces dans l'administration
      califale directe en 292 H ; défit le raid qarmate qui
      frappa le désert syrien ; et repoussa de manière
      décisive l'offensive d'été byzantine contre les
      ʿAwāṣim. Sa mort en Dhū al-Qaʿda 295 H d'une longue
      maladie porta au trône son frère de treize ans Jaʿfar
      al-Muqtadir, dont le règne, long mais agité, marquerait
      le début du déclin visible du califat central. al-
      Ṭabarī, contemporain du règne d'al-Muktafī, en donne
      le récit le plus détaillé.
    canonical_hijri: {year: 295, month: 11, day: 13, precision: day}
    canonical_gregorian: {date: 908-08-19, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of al-Muktafī at Baghdad in Dhū al-Qaʿda 295 AH and the immediate bayʿa of his thirteen-year-old brother al-Muqtadir."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil places the death of al-Muktafī in 295 AH and follows al-Ṭabarī's chronology."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 295 AH for the death of al-Muktafī and the succession of al-Muqtadir."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ gives the standard caliphal entry placing al-Muktafī's death in Dhū al-Qaʿda 295 AH."
    people: [[al-muktafi, died], [al-mutadid, subject], [al-muqtadir, leader]]
    tags: [abbasid, caliph, baghdad, tulunid, qarmati]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: assassination-of-al-muqtadir
    category: assassination
    title_en: Assassination of Caliph al-Muqtadir bi-Allāh
    title_ar: مقتل الخليفة المقتدر بالله
    title_fr: Assassinat du calife al-Muqtadir bi-Allāh
    description_en: |
      Jaʿfar al-Muqtadir bi-Allāh ibn al-Muʿtaḍid,
      eighteenth Abbasid caliph (reigned 295-320 AH), was
      killed in battle outside the gates of Baghdad on the
      day his army marched out against the rebel Turkish
      commander Muʾnis al-Muẓaffar — once his own most
      loyal general, now turned against him — at age about
      thirty-eight, after a quarter-century of progressively
      weakening rule. His reign had begun at thirteen with
      the dominance of viziers and queen-mother Shaghab,
      saw the founding of the Fāṭimid caliphate in Ifrīqiya
      (297 AH), the Qarāmiṭa raid on the Hajj caravan and
      the catastrophic Qarmatian sack of Baṣra (311 AH) and
      Mecca (317 AH), repeated military mutinies, and the
      progressive collapse of caliphal finances. Muʾnis's
      forces overwhelmed the caliph's small bodyguard
      outside the Shammāsiyya gate; al-Muqtadir was struck
      down in the field and his head carried back to the
      camp. He was succeeded by his brother al-Qāhir.
      Classical Sunni historians treat his death as the
      formal opening of the period in which the Abbasid
      caliphate ceased to exercise effective rule.
    description_ar: |
      قُتل الخليفة جعفر المقتدر بالله بن المعتضد — ثامن
      عشر خلفاء بني العباس (حكم من ٢٩٥ إلى ٣٢٠ هـ) —
      في الميدان أمام أبواب بغداد يوم خروج جيشه على
      القائد التركي الثائر عليه مؤنس المظفر — وكان من
      أوفى قواده فانقلب عليه — عن نحو ثمان وثلاثين سنة،
      بعد ربع قرن من حكم متآكل. بدأ عهده وهو ابن ثلاث
      عشرة سنة في كَنَف الوزراء وأمّه السيدة شغب، وشهد
      قيام الخلافة الفاطمية بإفريقية (٢٩٧ هـ)، وغارات
      القرامطة على ركب الحج، ونهب القرامطة الفظيع للبصرة
      (٣١١ هـ) ولمكة (٣١٧ هـ)، وتمرّدات عسكرية متتابعة،
      وانهيار خزانة الخلافة. اجتاحت قوات مؤنس حرس
      الخليفة القليل أمام باب الشمّاسية، فضُرب المقتدر
      في الميدان وحُمل رأسه إلى المعسكر. وتولى الخلافة
      من بعده أخوه القاهر. ويُعدّ المؤرخون السنّة
      الكلاسيكيون قتلتَه الافتتاح الرسمي للحقبة التي
      كفّت فيها الخلافة العباسية عن الحكم الفعلي.
    description_fr: |
      Jaʿfar al-Muqtadir bi-Allāh ibn al-Muʿtaḍid,
      dix-huitième calife abbasside (règne 295-320 H), fut
      tué au combat aux portes de Baghdād le jour où son
      armée sortit contre le commandant turc rebelle Muʾnis
      al-Muẓaffar — naguère son plus fidèle général, alors
      retourné contre lui — âgé d'environ trente-huit ans,
      après un quart de siècle de règne progressivement
      affaibli. Son règne, commencé à treize ans sous la
      tutelle des vizirs et de la reine-mère Shaghab, vit
      la fondation du califat fāṭimide en Ifrīqiya (297 H),
      le raid qarmate sur la caravane du Hajj et le sac
      catastrophique de Baṣra (311 H) et de La Mecque (317
      H) par les Qarmates, des mutineries militaires
      répétées et l'effondrement progressif des finances
      califales. Les troupes de Muʾnis submergèrent la
      petite garde du calife devant la porte de la
      Shammāsiyya ; al-Muqtadir fut frappé sur le champ
      de bataille et sa tête rapportée au camp. Lui succéda
      son frère al-Qāhir. Les historiens sunnites
      classiques tiennent sa mort pour l'ouverture formelle
      de la période où le califat abbasside cessa d'exercer
      le pouvoir effectif.
    canonical_hijri: {year: 320, month: 10, day: 28, precision: day}
    canonical_gregorian: {date: 932-11-06, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Muqtadir in battle against Muʾnis on Wednesday 28 Shawwāl 320 AH outside the Shammāsiyya gate of Baghdad."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives 320 AH for the killing of al-Muqtadir and follows the narrative of his betrayal by Muʾnis."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms 320 AH for the killing of al-Muqtadir and gives the obituary."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the killing of al-Muqtadir in Shawwāl 320 AH and the accession of al-Qāhir."
    people: [[al-muqtadir, died], [al-qahir, leader]]
    tags: [abbasid, caliph, baghdad, assassination, munis, fatimid, qarmati]
    importance: major
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-radi
    category: ruler_death
    title_en: Death of Caliph al-Rāḍī bi-Allāh
    title_ar: وفاة الخليفة الراضي بالله
    title_fr: Mort du calife al-Rāḍī bi-Allāh
    description_en: |
      Muḥammad al-Rāḍī bi-Allāh ibn al-Muqtadir, twentieth
      Abbasid caliph (reigned 322-329 AH), died at Baghdad
      after a reign of about six and a half years, at age
      about thirty-one. His reign is conventionally taken
      by classical Sunni historians as the formal end of
      effective Abbasid rule: it was during his caliphate
      that he created the post of *amīr al-umarāʾ* —
      grand-emir — and conferred it on Ibn Rāʾiq, opening
      the long period in which the caliph reigned as
      figurehead while a military dictator commanded the
      treasury, the army, and the Friday khuṭba. Al-
      Masʿūdī, who knew him personally, described him as
      the last caliph to lead the prayer in person, to
      pronounce the khuṭba, to hold open *maẓālim* sessions,
      and to maintain the dignity of the caliphal court.
      He was succeeded by his brother al-Muttaqī. al-
      Dhahabī gives him a long and notably sympathetic
      obituary; Ibn Kathīr remarks that with him died "the
      caliphate as it had been."
    description_ar: |
      توفي الخليفة محمد الراضي بالله بن المقتدر — عشرون
      خلفاء بني العباس (حكم من ٣٢٢ إلى ٣٢٩ هـ) — ببغداد
      بعد ست سنين ونصف من الخلافة، عن نحو إحدى وثلاثين
      سنة. وتقليديّاً يعدّ المؤرخون السنّة الكلاسيكيون
      عهدَه نهاية الحكم العباسي الفعلي رسمياً: ففي خلافته
      أحدث منصب «أمير الأمراء» وقلّده ابن رائق، فبدأت
      الحقبة الطويلة التي صار فيها الخليفة رمزاً، وصار
      الديكتاتور العسكري متصرّفاً في خزانة الدولة وجيشها
      وخطبة الجمعة. ووصفه المسعودي — الذي عرفه شخصياً —
      بأنه آخر خليفة صلّى بالناس بنفسه، وخطب فيهم
      بنفسه، وعقد مجالس المظالم، وحفظ لقصر الخلافة
      هيبتَه. وخلفه أخوه المتقي. وأورد الذهبي ترجمته
      الطويلة وتعاطف فيها معه؛ وقال ابن كثير إنّ بموته
      انتهت «الخلافة كما كانت».
    description_fr: |
      Muḥammad al-Rāḍī bi-Allāh ibn al-Muqtadir, vingtième
      calife abbasside (règne 322-329 H), mourut à Baghdād
      après un règne d'environ six ans et demi, âgé
      d'environ trente et un ans. Les historiens sunnites
      classiques tiennent traditionnellement son règne pour
      la fin formelle du pouvoir abbasside effectif : c'est
      sous son califat qu'il créa la charge d'*amīr al-
      umarāʾ* — grand émir — et la conféra à Ibn Rāʾiq,
      ouvrant la longue période où le calife régna en
      figurant pendant qu'un dictateur militaire
      commandait le Trésor, l'armée et la khuṭba du
      vendredi. al-Masʿūdī, qui le connut personnellement,
      le décrivit comme le dernier calife à diriger lui-
      même la prière, à prononcer la khuṭba, à tenir des
      audiences de *maẓālim* en personne et à maintenir la
      dignité de la cour califale. Il fut suivi par son
      frère al-Muttaqī. al-Dhahabī lui consacre un
      obituaire long et notablement empathique ; Ibn Kathīr
      observe qu'avec lui mourut « le califat tel qu'il
      avait été ».
    canonical_hijri: {year: 329, month: 3, day: 15, precision: day}
    canonical_gregorian: {date: 940-12-23, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Rāḍī at Baghdad in Rabīʿ al-Awwal 329 AH and the bayʿa of al-Muttaqī."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives 329 AH for the death of al-Rāḍī, transmits al-Masʿūdī's appraisal of him as the last 'real' caliph, and remarks that with him died the caliphate as it had been."
      - source_key: dhahabi_siyar
        notes: "al-Dhahabī's Siyar Aʿlām al-Nubalāʾ gives a long and sympathetic obituary placing al-Rāḍī's death in 329 AH."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ confirms 329 AH for the death of al-Rāḍī and the succession of al-Muttaqī."
    people: [[al-radi, died], [al-muttaqi, leader]]
    tags: [abbasid, caliph, baghdad, amir-al-umara, ibn-raiq]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: blinding-of-al-muttaqi
    category: political_event
    title_en: Blinding and Deposition of Caliph al-Muttaqī
    title_ar: سَمل الخليفة المتقي وخلعه
    title_fr: Aveuglement et déposition du calife al-Muttaqī
    description_en: |
      Ibrāhīm al-Muttaqī li-Allāh ibn al-Muqtadir, twenty-
      first Abbasid caliph (reigned 329-333 AH), was seized,
      blinded, and deposed at al-Sindiyya on the road back
      to Baghdad in Ṣafar 333 AH by the Turkish strongman
      Tūzūn — the *amīr al-umarāʾ* who had become master
      of the caliphate — after the caliph had foolishly
      accepted Tūzūn's safe-conduct to return to the
      capital. Al-Muttaqī had spent the bulk of his short
      reign in flight from successive *umarāʾ al-umarāʾ*,
      seeking refuge with the Ḥamdānids at al-Mawṣil and
      with the Ikhshīdid regent Muḥammad ibn Ṭughj at al-
      Raqqa, and had imagined a final negotiated return.
      His blinding was the first public mutilation of a
      reigning Abbasid caliph by his own military
      commanders and stunned the Sunni world. His cousin
      ʿAbd Allāh al-Mustakfī was raised in his place and
      al-Muttaqī himself, blind and stripped of authority,
      lived out his last quarter-century quietly in Baghdad
      and died about 357 AH. Ibn al-Athīr and Ibn Kathīr
      both treat the event as the lowest point yet of the
      Anarchy at Baghdad.
    description_ar: |
      أُمسك بالخليفة إبراهيم المتقي لله بن المقتدر — حادي
      وعشرون خلفاء بني العباس (حكم من ٣٢٩ إلى ٣٣٣ هـ) —
      في «السنديّة» في طريق العودة إلى بغداد في صفر سنة
      ٣٣٣ هـ، فسُملت عيناه وخُلع، على يد القائد التركي
      توزون — أمير الأمراء الذي أمسك بزمام الخلافة —
      بعد أن قبل المتقي حمقاً أمانَه وأقبل عائداً إلى
      العاصمة. وكان المتقي قد قضى جلّ خلافته القصيرة
      هارباً من أمراء الأمراء المتتابعين، يستجير بالحمدانيين
      بالموصل، وبالأخشيدي محمد بن طغج بالرقة، ثم تخيّل
      عودة بمفاوضة. وكانت سَمْل عينيه أوّل تشويه علني
      لخليفة عباسي قائم من قواد جنده، فأذهلت العالم
      السنّي. وبويع مكانه ابن عمه عبد الله المستكفي،
      فعاش المتقي نفسه — أعمى مسلوب السلطة — رُبعَ
      قرن أخير في بغداد بهدوء، وتوفي نحو ٣٥٧ هـ. ويعدّ
      ابن الأثير وابن كثير الحادثة أحطّ نقاط فتنة بغداد.
    description_fr: |
      Ibrāhīm al-Muttaqī li-Allāh ibn al-Muqtadir, vingt-
      et-unième calife abbasside (règne 329-333 H), fut
      saisi, aveuglé et déposé à al-Sindiyya sur la route
      du retour à Baghdād en Ṣafar 333 H par l'homme fort
      turc Tūzūn — l'*amīr al-umarāʾ* devenu maître du
      califat — après que le calife eut imprudemment
      accepté le sauf-conduit de Tūzūn pour rentrer dans la
      capitale. al-Muttaqī avait passé l'essentiel de son
      bref règne en fuite devant les *umarāʾ al-umarāʾ*
      successifs, cherchant refuge auprès des Ḥamdānides à
      al-Mawṣil et auprès du régent ikhshīdide Muḥammad
      ibn Ṭughj à al-Raqqa, imaginant un retour négocié.
      Son aveuglement fut la première mutilation publique
      d'un calife abbasside régnant par ses propres
      commandants militaires et stupéfia le monde sunnite.
      Son cousin ʿAbd Allāh al-Mustakfī fut élevé à sa
      place et al-Muttaqī lui-même, aveugle et dépouillé
      de l'autorité, vécut paisiblement à Baghdād son
      dernier quart de siècle et mourut vers 357 H. Ibn
      al-Athīr et Ibn Kathīr tiennent l'événement pour le
      point le plus bas de l'anarchie de Baghdād.
    canonical_hijri: {year: 333, month: 2, day: 22, precision: day}
    canonical_gregorian: {date: 944-10-19, precision: day, method: tabular_conversion}
    disputed: true
    dispute_about: date
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil places the seizure and blinding of al-Muttaqī by Tūzūn at al-Sindiyya in Ṣafar 333 AH; classical historians vary between Ṣafar 21, 22, and 24 — we follow the majority date of 22 Ṣafar reported in al-Kāmil."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives 333 AH for the blinding and deposition of al-Muttaqī and the accession of al-Mustakfī."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms Ṣafar 333 AH for the blinding of al-Muttaqī."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the blinding of al-Muttaqī in Ṣafar 333 AH at al-Sindiyya by Tūzūn and the immediate bayʿa of al-Mustakfī."
    people: [[al-muttaqi, died], [al-mustakfi, leader]]
    tags: [abbasid, caliph, baghdad, blinding, deposition, tuzun, amir-al-umara]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: blinding-of-al-mustakfi
    category: political_event
    title_en: Blinding and Deposition of Caliph al-Mustakfī
    title_ar: سَمل الخليفة المستكفي وخلعه
    title_fr: Aveuglement et déposition du calife al-Mustakfī
    description_en: |
      ʿAbd Allāh al-Mustakfī bi-Allāh ibn al-Muktafī,
      twenty-second Abbasid caliph (reigned 333-334 AH),
      was seized in his own palace at Baghdad in Jumādā al-
      Ākhira 334 AH, blinded, and deposed by the Buyid amīr
      Aḥmad Muʿizz al-Dawla, who had entered Baghdad eleven
      months earlier and made himself *amīr al-umarāʾ*. The
      classical chroniclers report that the Buyid commander
      first bowed before the caliph at his audience, then
      seized him by the hand, dragged him from the throne,
      and ordered his eyes put out on the spot; the caliph
      was then thrown into prison, where he died about
      four years later. The accession of the Buyid amīr to
      effective rule of Iraq under a powerless Abbasid
      caliph — al-Mustakfī's cousin al-Muṭīʿ was raised in
      his place — formally inaugurates the Buyid period of
      caliphal history (334-447 AH), in which the
      caliphate retained the Friday khuṭba and the
      sovereign coinage but the Buyids governed. Sunni
      historians register the event as a lasting wound to
      the office of the caliphate.
    description_ar: |
      أُمسك بالخليفة عبد الله المستكفي بالله بن المكتفي —
      ثاني وعشرون خلفاء بني العباس (حكم من ٣٣٣ إلى ٣٣٤ هـ)
      — في قصره ببغداد في جمادى الآخرة سنة ٣٣٤ هـ،
      فسُملت عيناه وخُلع، على يد الأمير البويهي أحمد
      مُعزّ الدولة الذي كان قد دخل بغداد قبلها بأحد عشر
      شهراً وجعل نفسه أمير الأمراء. ويذكر المؤرخون
      الكلاسيكيون أنّ الأمير البويهي ركع أوّل الأمر بين
      يدي الخليفة في مجلسه، ثم أمسك بيده فاجترَّه عن
      السرير، وأمر بسَمل عينيه في مكانه، ثم أُلقي في
      السجن حتى مات نحو أربع سنين بعد ذلك. وبتولية
      الأمير البويهي حُكم العراق الفعلي تحت خلافة عباسية
      منزوعة السلطة — وقد بويع ابن عم المستكفي المطيع
      لله مكانه — يفتتح رسمياً عهد البويهيين في تاريخ
      الخلافة (٣٣٤-٤٤٧ هـ)، إذ احتفظت الخلافة بالخطبة
      الجامعة والسكّة، وحكم البويهيون. ويسجّل المؤرخون
      السنّة الحادثة جُرحاً دائماً لمنصب الخلافة.
    description_fr: |
      ʿAbd Allāh al-Mustakfī bi-Allāh ibn al-Muktafī,
      vingt-deuxième calife abbasside (règne 333-334 H),
      fut saisi dans son propre palais de Baghdād en
      Jumādā al-Ākhira 334 H, aveuglé et déposé par
      l'émir buyide Aḥmad Muʿizz al-Dawla, qui était entré
      à Baghdād onze mois plus tôt et s'était fait
      *amīr al-umarāʾ*. Les chroniqueurs classiques
      rapportent que le commandant buyide se prosterna
      d'abord devant le calife dans son audience, puis le
      saisit par la main, l'arracha du trône et ordonna
      qu'on lui crevât les yeux sur place ; le calife fut
      ensuite jeté en prison, où il mourut environ quatre
      ans plus tard. L'accession de l'émir buyide au
      gouvernement effectif de l'Irak sous un calife
      abbasside dépouillé de pouvoir — son cousin al-
      Muṭīʿ fut élevé à sa place — inaugure formellement
      la période buyide de l'histoire califale (334-447 H),
      au cours de laquelle le califat conserva la khuṭba du
      vendredi et la monnaie souveraine, mais où les
      Buyides gouvernèrent. Les historiens sunnites
      enregistrent l'événement comme une blessure durable
      pour l'office du califat.
    canonical_hijri: {year: 334, month: 6, day: 22, precision: day}
    canonical_gregorian: {date: 946-02-03, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the seizure and blinding of al-Mustakfī by Muʿizz al-Dawla in Jumādā al-Ākhira 334 AH at the caliphal palace and the immediate bayʿa of al-Muṭīʿ."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 334 AH for the blinding of al-Mustakfī and the start of effective Buyid rule at Baghdad."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām gives Jumādā al-Ākhira 334 AH for the blinding of al-Mustakfī."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the blinding and deposition of al-Mustakfī by Muʿizz al-Dawla in 334 AH and the accession of al-Muṭīʿ."
    people: [[al-mustakfi, died]]
    tags: [abbasid, caliph, baghdad, buyid, muizz-al-dawla, blinding, deposition]
    importance: major
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # SELJUK-ERA REVIVAL — al-Mustarshid, al-Rāshid, al-Muqtafī, al-Mustaḍīʾ
  # =========================================================================

  - slug: assassination-of-al-mustarshid
    category: assassination
    title_en: Assassination of Caliph al-Mustarshid
    title_ar: مقتل الخليفة المسترشد
    title_fr: Assassinat du calife al-Mustarshid
    description_en: |
      al-Faḍl al-Mustarshid bi-Allāh ibn al-Mustaẓhir,
      twenty-ninth Abbasid caliph (reigned 512-529 AH), was
      assassinated by Bāṭinī Ismaʿili agents — the so-
      called Nizārī *fidāʾiyyīn* of Alamūt, universally
      condemned by Sunni mainstream — at the Seljuk camp
      outside Marāgha after a year of captivity in the
      hands of sultan Masʿūd ibn Muḥammad. The caliph had
      attempted to reassert direct caliphal command over
      Iraq by leading an army out of Baghdad against the
      Seljuks; he was defeated near Hamadhān in 529 AH
      and taken prisoner. After negotiations between sultan
      Masʿūd and his officers had reached a settlement
      under which the caliph was to be restored to Baghdad
      stripped of his army, he was struck down in his tent
      while at his ablutions by Bāṭiniyya assassins.
      Classical Sunni sources are unanimous that the
      Bāṭiniyya carried out the killing; some report it as
      arranged by the Seljuks, others as an independent
      Ismaʿili strike. He was the first Abbasid caliph
      assassinated by the Bāṭiniyya, and the event sealed
      the lasting Sunni hostility to the Alamūt sect.
    description_ar: |
      اغتال الخليفةَ الفضلَ المسترشد بالله بن المستظهر —
      تاسع وعشرين خلفاء بني العباس (حكم من ٥١٢ إلى ٥٢٩
      هـ) — رجالٌ من الباطنية الإسماعيليين — وهم فدائيو
      «ألموت» النزاريون الذين أجمع جمهور أهل السنة على
      تكفير منهجهم — في معسكر السلاجقة قرب مراغة، بعد
      سنة من الأسر في يد السلطان مسعود بن محمد. كان
      المسترشد قد حاول استرداد الأمر العباسي على العراق
      بقيادته جيشاً من بغداد ضد السلاجقة، فهُزم قرب
      هَمَذَان سنة ٥٢٩ هـ وأُسر. وبعد أن اتفق السلطان
      مسعود وقواده على إعادة الخليفة إلى بغداد منزوع
      الجند، طعنه فدائيو الباطنية وهو في خيمته يتوضأ.
      وأجمع المؤرخون الكلاسيكيون من أهل السنة على أنّ
      الباطنية هم المنفذون، فمنهم من جعل الحادثةَ بتدبير
      السلاجقة، ومنهم من رآها ضربةً إسماعيلية مستقلّة.
      وكان أوّل خليفة عباسي يقتله الباطنية، وحدّدت
      الحادثة العداوة السنّية الدائمة لطائفة ألموت.
    description_fr: |
      al-Faḍl al-Mustarshid bi-Allāh ibn al-Mustaẓhir,
      vingt-neuvième calife abbasside (règne 512-529 H),
      fut assassiné par des agents bāṭinīs ismaʿīlis — les
      *fidāʾiyyīn* nizārīs d'Alamūt, condamnés par
      l'unanimité du sunnisme classique — au camp seldjuq
      à proximité de Marāgha, après une année de captivité
      aux mains du sultan Masʿūd ibn Muḥammad. Le calife
      avait tenté de rétablir le commandement califal direct
      sur l'Irak en menant une armée de Baghdād contre les
      Seldjuqs ; il fut défait près de Hamadhān en 529 H
      et fait prisonnier. Après que les négociations entre
      le sultan Masʿūd et ses officiers eurent abouti à
      un accord pour ramener le calife à Baghdād dépouillé
      de son armée, il fut frappé sous sa tente alors qu'il
      faisait ses ablutions par des assassins bāṭinīs. Les
      sources sunnites classiques sont unanimes à attribuer
      l'exécution aux Bāṭinīs ; certaines la disent
      organisée par les Seldjuqs, d'autres y voient une
      frappe ismaʿīlienne indépendante. Il fut le premier
      calife abbasside assassiné par les Bāṭinīs, et
      l'événement scella l'hostilité durable des sunnites
      à la secte d'Alamūt.
    canonical_hijri: {year: 529, month: 11, day: 17, precision: day}
    canonical_gregorian: {date: 1135-09-05, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the assassination of al-Mustarshid in his tent at the Seljuk camp near Marāgha by Bāṭinī agents in Dhū al-Qaʿda 529 AH."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives 529 AH for the killing of al-Mustarshid by the Bāṭiniyya and notes the disagreement among historians whether sultan Masʿūd was implicated."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms Dhū al-Qaʿda 529 AH for the assassination of al-Mustarshid by Bāṭiniyya assassins."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the killing of al-Mustarshid by the Bāṭiniyya in 529 AH and the accession of his son al-Rāshid."
    people: [[al-mustarshid, died], [al-rashid-abbasid, leader]]
