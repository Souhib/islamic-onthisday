  - slug: death-of-al-muqtafi
    category: ruler_death
    title_en: Death of Caliph al-Muqtafī li-Amr Allāh
    title_ar: وفاة الخليفة المقتفي لأمر الله
    title_fr: Mort du calife al-Muqtafī li-Amr Allāh
    description_en: |
      Muḥammad al-Muqtafī li-Amr Allāh ibn al-Mustaẓhir,
      thirty-first Abbasid caliph (reigned 530-555 AH),
      died at Baghdad after a quarter-century reign at age
      about sixty-three. Raised to the throne in 530 AH
      after the deposition of his nephew al-Rāshid, his
      reign coincided with the long collapse of Seljuk
      central authority in Iraq, and he became the first
      Abbasid caliph in two centuries to recover real
      sovereignty over the Iraqi heartland: he raised his
      own troops, expelled the last Seljuk *shiḥnas*
      (military governors) from Baghdad, defeated the
      Seljuk sultan's army outside the city in 552 AH,
      and re-established direct caliphal authority from
      Baghdad to Wāsiṭ. He patronised the Sunni traditional
      sciences in the wake of the Bāṭinī assassinations
      of his predecessors, and his reign is treated by
      classical Sunni historians as the formal opening of
      the late-Abbasid revival that would culminate under
      his great-grandson al-Nāṣir li-Dīn Allāh. He was
      succeeded by his son al-Mustanjid.
    description_ar: |
      توفي الخليفة محمد المقتفي لأمر الله بن المستظهر —
      حادي وثلاثون خلفاء بني العباس (حكم من ٥٣٠ إلى ٥٥٥
      هـ) — ببغداد بعد ربع قرن من الخلافة، عن نحو ثلاث
      وستين سنة. تولى الخلافة سنة ٥٣٠ هـ بعد خلع ابن
      أخيه الراشد، فوافق عهدُه انهيارَ سلطة السلاجقة
      المركزية الطويلَ على العراق، فكان أوّل خليفة
      عباسي منذ قرنين يستردّ السيادة الفعلية على قلب
      العراق: جنّد جنده الخاص، وأخرج آخر «شِحَن»
      السلاجقة من بغداد، وهزم جيش السلطان السلجوقي خارج
      العاصمة سنة ٥٥٢ هـ، وأعاد سلطان الخلافة المباشر
      من بغداد إلى واسط. ورعى علوم أهل السنة في إثر
      اغتيالات الباطنية لأسلافه، ويعدّ المؤرخون السنّة
      الكلاسيكيون عهدَه فاتحةً رسمية للنهضة العباسية
      المتأخرة التي بلغت ذروتها على يد حفيده الناصر
      لدين الله. وخلفه ابنه المستنجد.
    description_fr: |
      Muḥammad al-Muqtafī li-Amr Allāh ibn al-Mustaẓhir,
      trente et unième calife abbasside (règne 530-555 H),
      mourut à Baghdād après un règne d'un quart de
      siècle, âgé d'environ soixante-trois ans. Élevé au
      trône en 530 H après la déposition de son neveu al-
      Rāshid, son règne coïncida avec le long effondrement
      de l'autorité centrale seldjoukide en Irak, et il
      devint le premier calife abbasside depuis deux
      siècles à recouvrer une véritable souveraineté sur
      le cœur irakien : il leva ses propres troupes,
      expulsa les derniers *shiḥnas* (gouverneurs
      militaires) seldjoukides de Baghdād, défit l'armée
      du sultan seldjoukide aux abords de la ville en
      552 H et rétablit l'autorité califale directe de
      Baghdād à Wāsiṭ. Il fut le mécène des sciences
      sunnites traditionnelles à la suite des assassinats
      bāṭinīs de ses prédécesseurs, et son règne est
      considéré par les historiens sunnites classiques
      comme l'ouverture formelle de la renaissance
      abbasside tardive qui culminerait sous son arrière-
      petit-fils al-Nāṣir li-Dīn Allāh. Lui succéda son
      fils al-Mustanjid.
    canonical_hijri: {year: 555, month: 3, day: 2, precision: day}
    canonical_gregorian: {date: 1160-03-19, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Muqtafī at Baghdad in Rabīʿ al-Awwal 555 AH and the bayʿa of his son al-Mustanjid."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives 555 AH for the death of al-Muqtafī, his recovery of caliphal authority over Iraq, and the succession of al-Mustanjid."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām confirms Rabīʿ al-Awwal 555 AH for the death of al-Muqtafī."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the death of al-Muqtafī in 555 AH and praises his recovery of effective caliphal rule over Iraq."
    people: [[al-muqtafi, died], [al-mustanjid, leader]]
    tags: [abbasid, caliph, baghdad, seljuk, late-abbasid-revival]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: death-of-al-mustadi
    category: ruler_death
    title_en: Death of Caliph al-Mustaḍīʾ bi-Amr Allāh
    title_ar: وفاة الخليفة المستضيء بأمر الله
    title_fr: Mort du calife al-Mustaḍīʾ bi-Amr Allāh
    description_en: |
      al-Ḥasan al-Mustaḍīʾ bi-Amr Allāh ibn al-Mustanjid,
      thirty-third Abbasid caliph (reigned 566-575 AH),
      died at Baghdad after a reign of about nine years,
      at age about thirty-eight. His caliphate coincided
      with the abolition of the Fāṭimid caliphate of
      Cairo by Ṣalāḥ al-Dīn al-Ayyūbī in 567 AH and the
      restoration of the Sunni Abbasid khuṭba in Egypt
      after two centuries of Ismaʿili rule — a victory
      Ṣalāḥ al-Dīn formally credited to the caliph at
      Baghdad and that won al-Mustaḍīʾ a stature in Sunni
      memory disproportionate to his actual rule. He
      patronised Ḥanbalī scholars at Baghdad and continued
      the policy of his father al-Mustanjid of suppressing
      Bāṭinī cells in the city. He was succeeded by his
      son al-Nāṣir li-Dīn Allāh, whose forty-six-year
      reign would mark the apex of late-Abbasid recovery.
      Classical Sunni historians remember al-Mustaḍīʾ above
      all as the caliph in whose name the Friday khuṭba
      was finally restored over Egypt.
    description_ar: |
      توفي الخليفة الحسن المستضيء بأمر الله بن المستنجد
      — ثالث وثلاثون خلفاء بني العباس (حكم من ٥٦٦ إلى
      ٥٧٥ هـ) — ببغداد بعد نحو تسع سنين من الخلافة، عن
      نحو ثمان وثلاثين سنة. وقد وافق عهده إلغاءَ
      الخلافة الفاطمية بالقاهرة على يد صلاح الدين
      الأيوبي سنة ٥٦٧ هـ، وردَّ الخطبة العباسية السنّية
      على مصر بعد قرنين من حُكم الإسماعيليين — وهو
      انتصار نسبه صلاح الدين رسمياً إلى الخليفة ببغداد،
      فأكسب المستضيء في الذاكرة السنّية مكانةً تفوق ما
      كان له من سلطان فعلي. ورعى المستضيء الحنابلة
      ببغداد، وواصل سياسة أبيه المستنجد في قمع
      الباطنية بالعاصمة. وخلفه ابنه الناصر لدين الله،
      الذي شهدت خلافته الطويلة (ست وأربعون سنة) ذروة
      النهضة العباسية المتأخرة. ويذكره المؤرخون السنّة
      الكلاسيكيون قبل كل شيء بأنه الخليفة الذي أُعيدت
      الخطبة الجامعة على مصر باسمه.
    description_fr: |
      al-Ḥasan al-Mustaḍīʾ bi-Amr Allāh ibn al-Mustanjid,
      trente-troisième calife abbasside (règne 566-575 H),
      mourut à Baghdād après un règne d'environ neuf ans,
      âgé d'environ trente-huit ans. Son califat coïncida
      avec l'abolition du califat fāṭimide du Caire par
      Ṣalāḥ al-Dīn al-Ayyūbī en 567 H et la restauration
      de la khuṭba abbasside sunnite en Égypte après deux
      siècles de pouvoir ismaʿīli — victoire que Ṣalāḥ
      al-Dīn attribua formellement au calife de Baghdād
      et qui valut à al-Mustaḍīʾ une stature dans la
      mémoire sunnite disproportionnée par rapport à son
      pouvoir effectif. Il fut le mécène des savants
      ḥanbalites à Baghdād et poursuivit la politique de
      son père al-Mustanjid de répression des cellules
      bāṭinīes dans la capitale. Lui succéda son fils al-
      Nāṣir li-Dīn Allāh, dont le règne de quarante-six
      ans marquerait l'apogée de la renaissance abbasside
      tardive. Les historiens sunnites classiques se
      souviennent d'al-Mustaḍīʾ avant tout comme du calife
      au nom duquel la khuṭba du vendredi fut enfin
      rétablie en Égypte.
    canonical_hijri: {year: 575, month: 12, day: 1, precision: day}
    canonical_gregorian: {date: 1180-05-05, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Mustaḍīʾ at Baghdad in Dhū al-Ḥijja 575 AH and the bayʿa of his son al-Nāṣir li-Dīn Allāh."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 575 AH for the death of al-Mustaḍīʾ and credits Ṣalāḥ al-Dīn's restoration of the Abbasid khuṭba in Egypt to his caliphate."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām places the death of al-Mustaḍīʾ in Dhū al-Ḥijja 575 AH."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the death of al-Mustaḍīʾ in Dhū al-Ḥijja 575 AH and the accession of al-Nāṣir li-Dīn Allāh."
    people: [[al-mustadi, died], [al-mustanjid, subject]]
