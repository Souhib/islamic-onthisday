# Wave 92 of curated event additions (2026-04-27).
# 12 dated events covering Abbasid caliphs, regents, and viziers not yet in
# the dataset: deaths of al-Hādī, the great viziers Yaḥyā ibn Khālid al-
# Barmakī and al-Faḍl ibn al-Rabīʿ, the late-Samarra-recovery and Anarchy
# at Baghdad caliphs (al-Muktafī, al-Muqtadir, al-Rāḍī), the blinded
# puppets of the Buyid prelude (al-Muttaqī, al-Mustakfī), and the four
# Seljuk-era caliphs whose reigns mark the brief Abbasid revival of the
# 12th century (al-Mustarshid assassinated, al-Rāshid deposed and killed,
# al-Muqtafī, al-Mustaḍīʾ). All entries are attested in classical Sunni
# sources (al-Ṭabarī, Ibn al-Athīr al-Kāmil, Ibn Kathīr al-Bidāya wa-l-
# Nihāya, al-Dhahabī Tārīkh al-Islām and Siyar Aʿlām al-Nubalāʾ, Ibn
# Khallikān Wafayāt al-Aʿyān, al-Suyūṭī Tārīkh al-Khulafāʾ). Trilingual
# (en/ar/fr).

events:
  # =========================================================================
  # EARLY ABBASID — al-Hādī
  # =========================================================================

  - slug: death-of-al-hadi-abbasid
    category: ruler_death
    title_en: Death of Caliph al-Hādī
    title_ar: وفاة الخليفة الهادي
    title_fr: Mort du calife al-Hādī
    description_en: |
      Mūsā al-Hādī ibn al-Mahdī, fourth Abbasid caliph
      (reigned 169-170 AH), died at ʿĪsābādh outside Baghdad
      after a reign of barely fourteen months at age about
      twenty-five. Eldest son of al-Mahdī and elder brother
      of Hārūn al-Rashīd, he had taken the throne on his
      father's death in Muḥarram 169 AH and immediately
      tried to set aside the succession arrangement that
      named Hārūn his heir, attempting to designate his own
      young son Jaʿfar in his place — a move that aligned
      his mother al-Khayzurān, the powerful Yemeni concubine
      of al-Mahdī, against him. Classical sources transmit
      the persistent tradition that al-Khayzurān engineered
      al-Hādī's death by suffocation to secure Hārūn's
      succession; al-Ṭabarī presents the report without
      endorsing it. He was buried at ʿĪsābādh and Hārūn al-
      Rashīd was acclaimed caliph the same night, a smooth
      transition that owed much to the planning of Yaḥyā
      ibn Khālid al-Barmakī.
    description_ar: |
      توفي الخليفة موسى الهادي بن المهدي — رابع خلفاء بني
      العباس (حكم من ١٦٩ إلى ١٧٠ هـ) — بِعِيسَابَاذ خارج
      بغداد، بعد خلافة لم تتجاوز أربعة عشر شهراً، عن نحو
      خمس وعشرين سنة. كان الأكبر من أبناء المهدي والأخ
      الأكبر لهارون الرشيد، تولى الخلافة بوفاة أبيه في
      المحرم سنة ١٦٩ هـ، ثم سعى من فوره إلى نقض ترتيب
      الخلافة الذي جعل هارون ولي عهده، فأراد البيعة لابنه
      الصغير جعفر بدلاً منه — وهو ما حمل أمَّه الخيزران،
      جارية المهدي اليمنية ذات النفوذ، على أن تنقلب عليه.
      وتنقل المصادر الكلاسيكية الرواية المتواترة بأن
      الخيزران دبّرت موته خنقاً لتُمكّن هارون من الخلافة؛
      ويذكر الطبري الخبر دون أن يجزم به. ودُفن بعِيسَابَاذ،
      وبويع هارون الرشيد ليلتَه، انتقالٌ يسير دبّره يحيى
      بن خالد البرمكي.
    description_fr: |
      Mūsā al-Hādī ibn al-Mahdī, quatrième calife abbasside
      (règne 169-170 H), mourut à ʿĪsābādh, à l'extérieur
      de Baghdād, après un règne d'à peine quatorze mois,
      âgé d'environ vingt-cinq ans. Fils aîné d'al-Mahdī
      et frère aîné de Hārūn al-Rashīd, il avait pris le
      trône à la mort de son père en Muḥarram 169 H et tenté
      aussitôt de défaire l'arrangement successoral qui
      faisait de Hārūn son héritier, cherchant à désigner
      à sa place son propre fils mineur Jaʿfar — geste qui
      retourna contre lui sa propre mère al-Khayzurān,
      puissante concubine yéménite d'al-Mahdī. Les sources
      classiques transmettent la tradition persistante selon
      laquelle al-Khayzurān fit étouffer al-Hādī pour
      assurer la succession de Hārūn; al-Ṭabarī rapporte
      l'information sans la cautionner. Il fut enseveli à
      ʿĪsābādh et Hārūn al-Rashīd fut acclamé calife la nuit
      même, transition aisée que l'on doit en grande partie
      à la planification de Yaḥyā ibn Khālid al-Barmakī.
    canonical_hijri: {year: 170, month: 3, day: 15, precision: day}
    canonical_gregorian: {date: 786-09-18, precision: day, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of al-Hādī at ʿĪsābādh on the night of Friday 15 Rabīʿ al-Awwal 170 AH and the bayʿa of Hārūn al-Rashīd the same night; he reports the al-Khayzurān suffocation tradition without endorsement."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Hādī under 170 AH, follows al-Ṭabarī, and gives the night-time bayʿa of Hārūn."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya gives 170 AH and reports the suffocation tradition as one of several accounts."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī in Tārīkh al-Khulafāʾ confirms the date and place of al-Hādī's death and the immediate accession of Hārūn al-Rashīd."
    people: [[al-hadi-abbasid, died], [harun-al-rashid, leader], [yahya-ibn-khalid-al-barmaki, subject]]
    tags: [abbasid, caliph, baghdad, isabadh, harun-al-rashid, succession]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # BARMAKID VIZIER — Yaḥyā ibn Khālid
  # =========================================================================

  - slug: death-of-yahya-ibn-khalid-al-barmaki
    category: ruler_death
    title_en: Death of Yaḥyā ibn Khālid al-Barmakī in Prison
    title_ar: وفاة يحيى بن خالد البرمكي في السجن
    title_fr: Mort de Yaḥyā ibn Khālid al-Barmakī en prison
    description_en: |
      Yaḥyā ibn Khālid ibn Barmak — head of the Barmakid
      family of Persian secretaries who had administered
      the Abbasid state for nearly two decades, foster-
      father (kāfil) of caliph Hārūn al-Rashīd, and the
      effective architect of Abbasid government from al-
      Mahdī's reign onward — died in prison at al-Raqqa
      in Muḥarram 190 AH, at age about seventy. After the
      execution of his son Jaʿfar at al-ʿUmr in Ṣafar 187
      AH and the seizure of all Barmakid estates, Yaḥyā
      and his other sons al-Faḍl and Mūsā had been
      imprisoned at al-Raqqa, where the caliph was then
      residing. The classical sources preserve the famous
      letter Yaḥyā wrote in his last weeks reflecting on
      worldly fortune, and al-Ṭabarī reports that Hārūn
      himself was reduced to tears when news of his
      foster-father's death reached him. Yaḥyā's death
      closed the Barmakid era; his administrative methods
      and patronage of letters were treated as a model by
      later viziers.
    description_ar: |
      توفي يحيى بن خالد بن برمك — رأس آل برمك من كتّاب
      الفرس الذين دبَّروا أمور الدولة العباسية قرابة
      عقدين، وكافل الخليفة هارون الرشيد، والمهندس الفعلي
      لإدارة الدولة العباسية منذ عهد المهدي — في سجنه
      بالرَّقَّة في المحرم سنة ١٩٠ هـ، عن نحو سبعين سنة.
      وكان قد سُجن في الرقة — حيث كان الخليفة آنذاك —
      هو وابناه الفضل وموسى بعد قتلة جعفر بن يحيى بِالعُمر
      في صفر سنة ١٨٧ هـ، وبعد مصادرة جميع ضياع آل برمك.
      وتحفظ المصادر الكلاسيكية الرسالةَ المشهورة التي
      كتبها يحيى في أواخر أيامه يتأمل فيها صروف الدنيا،
      وروى الطبري أنّ هارون نفسه بكى لمّا جاءه نعي كافله.
      وأقفلت وفاة يحيى عهد البرامكة، وقد عدّ من جاء بعده
      من الوزراء سياستَه ورعايته للأدب نموذجاً يُحتذى.
    description_fr: |
      Yaḥyā ibn Khālid ibn Barmak — chef de la famille
      barmécide de secrétaires perses qui administra
      l'État abbasside pendant près de vingt ans, kāfil
      (père nourricier) du calife Hārūn al-Rashīd et
      véritable architecte de l'administration abbasside
      depuis le règne d'al-Mahdī — mourut en prison à al-
      Raqqa en Muḥarram 190 H, âgé d'environ soixante-dix
      ans. Après l'exécution de son fils Jaʿfar à al-ʿUmr
      en Ṣafar 187 H et la confiscation de tous les biens
      barmécides, Yaḥyā et ses autres fils al-Faḍl et Mūsā
      avaient été emprisonnés à al-Raqqa, où résidait alors
      le calife. Les sources classiques préservent la lettre
      fameuse que Yaḥyā écrivit dans ses dernières semaines,
      méditant sur la fortune mondaine, et al-Ṭabarī rapporte
      que Hārūn lui-même fut réduit aux larmes à la nouvelle
      de la mort de son père nourricier. La mort de Yaḥyā
      clôt l'ère barmécide; ses méthodes administratives et
      son mécénat littéraire furent considérés comme un
      modèle par les vizirs ultérieurs.
    canonical_hijri: {year: 190, month: 1, precision: month}
    canonical_gregorian: {date: 805-12-15, precision: month, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī enters the death of Yaḥyā ibn Khālid in prison at al-Raqqa in Muḥarram 190 AH and reports Hārūn's grief on receiving the news."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil follows al-Ṭabarī, placing Yaḥyā's death in 190 AH at al-Raqqa."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān gives the standard biographical entry on Yaḥyā ibn Khālid al-Barmakī, his role as Hārūn's kāfil, and his death in prison at al-Raqqa in 190 AH at age about seventy."
      - source_key: dhahabi_siyar
        notes: "al-Dhahabī's Siyar Aʿlām al-Nubalāʾ contains the obituary of Yaḥyā ibn Khālid and confirms 190 AH."
    people: [[yahya-ibn-khalid-al-barmaki, died], [harun-al-rashid, leader], [jafar-al-barmaki, subject]]
    tags: [abbasid, vizier, barmakid, harun-al-rashid, raqqa, prison]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # POST-BARMAKID VIZIER — al-Faḍl ibn al-Rabīʿ
  # =========================================================================

  - slug: death-of-al-fadl-ibn-al-rabi
    category: ruler_death
    title_en: Death of the Vizier al-Faḍl ibn al-Rabīʿ
    title_ar: وفاة الوزير الفضل بن الربيع
    title_fr: Mort du vizir al-Faḍl ibn al-Rabīʿ
    description_en: |
      al-Faḍl ibn al-Rabīʿ ibn Yūnus — chamberlain (ḥājib)
      of caliph Hārūn al-Rashīd, principal architect of the
      downfall of the Barmakids whose place at the head of
      the administration he then took, and vizier of al-
      Amīn during the civil war against al-Maʾmūn — died at
      Baghdad in 208 AH at age about seventy. Originally a
      mawlā of the Abbasid family who rose through the
      caliphal palace service, he was widely held by the
      classical sources to have engineered the destruction
      of his Barmakid rivals in 187 AH; after Hārūn's death
      at Ṭūs in 193 AH he led the imperial caravan back
      from Khurāsān to Baghdad rather than surrender it to
      al-Maʾmūn, an act that helped trigger the civil war.
      He went into hiding after al-Amīn's killing in 198
      AH, was eventually pardoned by al-Maʾmūn, and lived
      out his last years in retirement. al-Ṭabarī, Ibn al-
      Athīr, and Ibn Khallikān all cite him as the cautionary
      example of the courtier whose ambition consumed the
      house of his rivals before turning on him.
    description_ar: |
      توفي الفضل بن الربيع بن يونس — حاجب الخليفة هارون
      الرشيد، والمهندس الأكبر لنكبة البرامكة الذي ورثهم
      في رأس الإدارة، ووزير الأمين في حربه على المأمون —
      ببغداد سنة ٢٠٨ هـ، عن نحو سبعين سنة. وكان في الأصل
      من موالي بني العباس ترقى في خدمة قصر الخلافة، وقد
      ذهب أكثر المؤرخين الكلاسيكيين إلى أنه دبّر إزاحة
      منافسيه من البرامكة سنة ١٨٧ هـ؛ ولما مات هارون بطوس
      سنة ١٩٣ هـ ساق الموكب الخلافي عائداً من خراسان إلى
      بغداد ولم يسلّمه إلى المأمون، وهو ما أسهم في إشعال
      الحرب الأهلية. ثم اختفى بعد قتلة الأمين سنة ١٩٨ هـ،
      وعفا عنه المأمون بعد ذلك، فعاش بقية أيامه في عزلة.
      ويسوقه الطبري وابن الأثير وابن خلكان مثلاً من أمثلة
      صاحب البلاط الذي أكلته أمَّتُه بعد أن أكل بها بيت
      منافسيه.
    description_fr: |
      al-Faḍl ibn al-Rabīʿ ibn Yūnus — chambellan (ḥājib)
      du calife Hārūn al-Rashīd, principal artisan de la
      chute des Barmécides dont il prit ensuite la place à
      la tête de l'administration, et vizir d'al-Amīn dans
      la guerre civile contre al-Maʾmūn — mourut à Baghdād
      en 208 H, âgé d'environ soixante-dix ans. Mawlā de
      la famille abbasside parvenu par le service du palais
      califal, les sources classiques l'ont largement tenu
      pour l'ordonnateur de la destruction de ses rivaux
      barmécides en 187 H; après la mort de Hārūn à Ṭūs
      en 193 H, il ramena la caravane impériale de Khurāsān
      à Baghdād plutôt que de la livrer à al-Maʾmūn, geste
      qui contribua à déclencher la guerre civile. Il prit
      la fuite après la mort d'al-Amīn en 198 H, fut
      finalement gracié par al-Maʾmūn, et passa ses
      dernières années dans la retraite. al-Ṭabarī, Ibn
      al-Athīr et Ibn Khallikān le citent comme l'exemple
      du courtisan dont l'ambition consuma la maison de ses
      rivaux avant de se retourner contre lui.
    canonical_hijri: {year: 208, precision: year}
    canonical_gregorian: {date: 823-11-27, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī gives the death of al-Faḍl ibn al-Rabīʿ under 208 AH and devotes earlier passages to his role in the fall of the Barmakids and the imperial caravan affair after Ṭūs."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr in al-Kāmil enters the death of al-Faḍl ibn al-Rabīʿ under 208 AH at Baghdad."
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān's Wafayāt al-Aʿyān contains the biographical entry on al-Faḍl ibn al-Rabīʿ, places his death in 208 AH, and details his role in the Barmakid affair and the civil war."
    people: [[al-fadl-ibn-al-rabi, died], [harun-al-rashid, subject], [al-amin, leader], [al-mamun, leader]]
    tags: [abbasid, vizier, baghdad, barmakid, civil-war, harun-al-rashid]
    importance: notable
