  - slug: death-of-al-rashid-abbasid
    category: ruler_death
    title_en: Death of Caliph al-Rāshid bi-Allāh
    title_ar: وفاة الخليفة الراشد بالله
    title_fr: Mort du calife al-Rāshid bi-Allāh
    description_en: |
      al-Manṣūr al-Rāshid bi-Allāh ibn al-Mustarshid,
      thirtieth Abbasid caliph (reigned 529-530 AH), was
      assassinated at Iṣfahān in 532 AH after a single
      year of effective reign and a further two years in
      exile. Raised to the throne in Dhū al-Qaʿda 529 AH
      on the news of his father's killing by the Bāṭiniyya
      at Marāgha, he immediately raised the army of Baghdad
      against the Seljuk sultan Masʿūd ibn Muḥammad,
      whom he held responsible for the elder caliph's
      death. He was defeated, deposed by the chief qāḍī
      of Baghdad in 530 AH at sultan Masʿūd's pressure on
      the technicality of having been declared *fāsiq*,
      and replaced by his uncle al-Muqtafī. He fled to
      Iṣfahān, where he was killed by Bāṭinī agents in
      his sickbed in Ramaḍān 532 AH — the second consecutive
      Abbasid caliph assassinated by the Alamūt sect.
      Classical Sunni historians treat his fate as the
      direct continuation of his father's, and the
      consolidation of the lesson that the caliphate could
      not survive open war on the Seljuk sultanate.
    description_ar: |
      اغتيل الخليفة المنصور الراشد بالله بن المسترشد —
      ثلاثون خلفاء بني العباس (حكم من ٥٢٩ إلى ٥٣٠ هـ) —
      بأصبهان سنة ٥٣٢ هـ، بعد سنة واحدة من الخلافة
      الفعلية وسنتين أخريين من المنفى. وكان قد بويع في
      ذي القعدة سنة ٥٢٩ هـ على نبأ قتل أبيه على يد
      الباطنية بمراغة، فجمع من فوره جند بغداد على
      السلطان السلجوقي مسعود بن محمد الذي حمّله مسؤولية
      مقتل أبيه. فهُزم وخُلع بفتوى قاضي قضاة بغداد
      تحت ضغط السلطان مسعود سنة ٥٣٠ هـ بحجّة الفسق،
      وبويع مكانه عمُّه المقتفي. ففرّ إلى أصبهان حتى
      قُتل هناك بأيدي الباطنية وهو على فراش مرضه في
      رمضان سنة ٥٣٢ هـ — وهو ثاني خليفة عباسي على
      التوالي يقتله أصحاب ألموت. ويعدّ المؤرخون السنّة
      الكلاسيكيون مصرعه استمراراً مباشراً لمصرع أبيه،
      وترسّخاً للدرس بأنّ الخلافة لا تطيق الحرب
      المكشوفة على السلطنة السلجوقية.
    description_fr: |
      al-Manṣūr al-Rāshid bi-Allāh ibn al-Mustarshid,
      trentième calife abbasside (règne 529-530 H), fut
      assassiné à Iṣfahān en 532 H, après une seule année
      de règne effectif et deux années supplémentaires
      d'exil. Élevé au trône en Dhū al-Qaʿda 529 H sur la
      nouvelle de l'assassinat de son père par les
      Bāṭinīs à Marāgha, il leva aussitôt l'armée de
      Baghdād contre le sultan seldjoukide Masʿūd ibn
      Muḥammad, qu'il tenait pour responsable de la mort
      du calife précédent. Il fut défait, déposé par le
      grand cadi de Baghdād sous la pression du sultan
      Masʿūd en 530 H sur le motif technique d'avoir été
      déclaré *fāsiq*, et remplacé par son oncle al-
      Muqtafī. Il s'enfuit à Iṣfahān, où il fut tué par
      des agents bāṭinīs dans son lit de malade en Ramaḍān
      532 H — le deuxième calife abbasside consécutif
      assassiné par la secte d'Alamūt. Les historiens
      sunnites classiques tiennent son sort pour le
      prolongement direct de celui de son père et la
      consolidation de la leçon que le califat ne pouvait
      survivre à une guerre ouverte contre le sultanat
      seldjoukide.
    canonical_hijri: {year: 532, month: 9, day: 25, precision: day}
    canonical_gregorian: {date: 1138-06-13, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr in al-Kāmil enters the assassination of al-Rāshid by Bāṭinī agents at Iṣfahān in Ramaḍān 532 AH and details his deposition in 530 AH and the accession of al-Muqtafī."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr in al-Bidāya wa-l-Nihāya confirms 532 AH for the killing of al-Rāshid at Iṣfahān by the Bāṭiniyya."
      - source_key: dhahabi_tarikh_islam
        notes: "al-Dhahabī's Tārīkh al-Islām places the killing of al-Rāshid at Iṣfahān in Ramaḍān 532 AH."
      - source_key: suyuti_tarikh_khulafa
        notes: "al-Suyūṭī's Tārīkh al-Khulafāʾ records the killing of al-Rāshid by the Bāṭiniyya at Iṣfahān in Ramaḍān 532 AH."
    people: [[al-rashid-abbasid, died], [al-mustarshid, subject], [al-muqtafi, leader]]
