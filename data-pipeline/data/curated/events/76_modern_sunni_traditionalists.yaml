  - slug: death-of-ibn-uthaymin
    category: scholar_death
    title_en: Death of Muḥammad ibn Ṣāliḥ al-ʿUthaymīn — Saudi Muḥaddith-Faqīh of ʿUnayza
    title_ar: وفاة الشيخ محمد بن صالح العثيمين — محدث وفقيه عنيزة بنجد
    title_fr: Mort de Muḥammad ibn Ṣāliḥ al-ʿUthaymīn — muḥaddith-faqīh saoudien de ʿUnayza
    description_en: |
      Muḥammad ibn Ṣāliḥ ibn Muḥammad al-ʿUthaymīn —
      Saudi Sunni Ḥanbalī jurist and muḥaddith of ʿUnayza
      in al-Qaṣīm, longtime imām and khaṭīb of the Great
      Mosque of ʿUnayza, professor at the Imām Muḥammad
      ibn Saʿūd Islamic University branch in al-Qaṣīm, and
      member of the Council of Senior Scholars from 1407
      AH (1986 CE) — died at Jeddah on 15 Shawwāl 1421 AH
      (11 January 2001 CE) at age 72, and was buried at
      Mecca. Born at ʿUnayza in 1347 AH (1929 CE), he was
      a senior pupil of ʿAbd al-Raḥmān ibn Saʿdī (author
      of *Taysīr al-Karīm al-Raḥmān*) and a close
      colleague of ʿAbd al-ʿAzīz ibn Bāz. His authored
      *Sharḥ al-Mumtiʿ ʿalā Zād al-Mustaqniʿ* in fifteen
      volumes is among the most widely circulated
      contemporary Ḥanbalī fiqh commentaries; he also
      authored *Sharḥ al-ʿAqīda al-Wāsiṭiyya*, *Sharḥ
      Riyāḍ al-Ṣāliḥīn*, *Sharḥ Bulūgh al-Marām*, and an
      extensive corpus of recorded lessons and fatwas.
      He continued to teach into his final illness.
    description_ar: |
      توفي الشيخ محمد بن صالح بن محمد العثيمين — الفقيه
      السني الحنبلي والمحدث ابن عنيزة من إقليم القصيم
      بنجد، إمام وخطيب الجامع الكبير بعنيزة سنين طويلة،
      أستاذ بفرع جامعة الإمام محمد بن سعود الإسلامية
      بالقصيم، وعضو هيئة كبار العلماء منذ سنة ١٤٠٧ هـ
      (١٩٨٦ ميلادي) — بجدة يوم ١٥ شوال سنة ١٤٢١ هـ
      (الموافق ١١ جانفي ٢٠٠١ ميلادي) عن اثنتين وسبعين
      سنة، ودفن بمكة المكرمة. ولد بعنيزة سنة ١٣٤٧ هـ
      (١٩٢٩ ميلادي)، وكان من كبار تلامذة العلامة عبد
      الرحمن بن سعدي صاحب «تيسير الكريم الرحمن»، ومن
      ملازمي الشيخ عبد العزيز بن باز. ومن أكبر مصنفاته
      «الشرح الممتع على زاد المستقنع» في خمسة عشر مجلداً
      من أوسع شروح الفقه الحنبلي المعاصر تداولاً، كما
      صنّف «شرح العقيدة الواسطية» و«شرح رياض الصالحين»
      و«شرح بلوغ المرام»، وله مجموع كبير من الدروس
      المسجّلة والفتاوى. ولم ينقطع عن التدريس إلى مرض
      وفاته.
    description_fr: |
      Muḥammad ibn Ṣāliḥ ibn Muḥammad al-ʿUthaymīn —
      juriste sunnite ḥanbalite et muḥaddith saoudien de
      ʿUnayza dans la région d'al-Qaṣīm, longtemps imām
      et khaṭīb de la Grande Mosquée de ʿUnayza,
      professeur à l'antenne de l'Université islamique
      Imām Muḥammad ibn Saʿūd à al-Qaṣīm et membre du
      Conseil des grands savants à partir de 1407 H
      (1986 EC) — mourut à Djeddah le 15 Shawwāl 1421 H
      (11 janvier 2001 EC) à l'âge de 72 ans et fut
      enterré à La Mecque. Né à ʿUnayza en 1347 H
      (1929 EC), il fut un élève senior de ʿAbd al-
      Raḥmān ibn Saʿdī (auteur de *Taysīr al-Karīm al-
      Raḥmān*) et un proche collègue de ʿAbd al-ʿAzīz
      ibn Bāz. Son *Sharḥ al-Mumtiʿ ʿalā Zād al-
      Mustaqniʿ* en quinze volumes figure parmi les
      commentaires de fiqh ḥanbalite contemporains les
      plus largement diffusés; il rédigea aussi *Sharḥ
      al-ʿAqīda al-Wāsiṭiyya*, *Sharḥ Riyāḍ al-Ṣāliḥīn*,
      *Sharḥ Bulūgh al-Marām* et un vaste corpus de
      leçons enregistrées et de fatwas. Il continua
      d'enseigner jusqu'à sa dernière maladie.
