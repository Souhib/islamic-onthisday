# Wave 76 of curated event additions (2026-04-27).
# Late-twentieth and early-twenty-first century Sunni scholars not yet
# covered by the dataset. Eleven figures spanning the breadth of the
# canonical Sunni-traditionalist landscape: the Saudi Ḥanbalī-Athari
# tradition (Ibn Bāz, al-ʿUthaymīn), the Yemeni muḥaddith milieu
# (al-Wādiʿī), the Aleppine Hanafi muḥaddith tradition (Abū Ghudda),
# the Meccan Mālikī sayyid tradition (Muḥammad ibn ʿAlawī al-Mālikī
# al-Ḥasanī), the Moroccan Mālikī muḥaddith tradition (al-Ghumārī),
# the Egyptian Azharī mufassir tradition (al-Shaʿrāwī, al-Muṭīʿī),
# the Mauritanian-Saudi Mālikī mufassir tradition (al-Shinqīṭī),
# the Syrian-Jordanian Hanafi jurisprudence tradition (al-Zarqāʾ),
# and the Damascene-Madinan muḥaddith tradition (Muḥammad ʿAwwāma).
# All figures are presented factually-historically, without endorsement
# or condemnation. The dataset is broad-Sunni and treats all
# canonical-Sunni scholars equally — no contemporary intra-Muslim
# polemic terms; just contributions, works, and place of death.
# Sources: EI2/EI3 supplements, academic biographies, and editorial
# compilation cross-checking institutional records and obituaries.
# No hadith refs. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # SAUDI ḤANBALĪ-ATHARI TRADITION
  # =========================================================================

  - slug: death-of-ibn-baz
    category: scholar_death
    title_en: Death of ʿAbd al-ʿAzīz ibn Bāz — Grand Muftī of Saudi Arabia
    title_ar: وفاة الإمام عبد العزيز بن باز — مفتي عام المملكة العربية السعودية
    title_fr: Mort de ʿAbd al-ʿAzīz ibn Bāz — Grand Muftī d'Arabie saoudite
    description_en: |
      ʿAbd al-ʿAzīz ibn ʿAbd Allāh ibn Bāz — Saudi Sunni
      Ḥanbalī-Athari jurist, head of the Permanent Committee
      for Scholarly Research and Iftāʾ from 1971, president
      of the Council of Senior Scholars, and Grand Muftī of
      the Kingdom of Saudi Arabia from 1414 AH (1993 CE)
      until his death — died at al-Ṭāʾif on 27 Muḥarram
      1420 AH (13 May 1999 CE) at age 88, and was buried
      at Mecca. Born at Riyadh in 1330 AH (1912 CE), he
      lost his sight in adolescence, studied with Muḥammad
      ibn Ibrāhīm Āl al-Shaykh (the previous Grand Muftī)
      and a circle of Najdi scholars, taught at the
      Islamic University of Madīna (1961-1970, including
      a long term as vice-president and then president),
      and from 1975 chaired the General Presidency for
      Scholarly Research and Iftāʾ. His authored and
      compiled fatwa collections (notably *Majmūʿ Fatāwā
      wa-Maqālāt Mutanawwiʿa* in some thirty volumes) and
      his radio lessons on al-Bukhārī and Bulūgh al-Marām
      circulated widely across the Arabic-speaking Sunni
      world. He was awarded the King Faisal International
      Prize for Service to Islam in 1402 AH (1982 CE).
    description_ar: |
      توفي الإمام عبد العزيز بن عبد الله بن باز — الفقيه
      السني الحنبلي الأثري السعودي، رئيس اللجنة الدائمة
      للبحوث العلمية والإفتاء منذ سنة ١٣٩١ هـ (١٩٧١
      ميلادي)، ورئيس هيئة كبار العلماء، ومفتي عام المملكة
      العربية السعودية منذ سنة ١٤١٤ هـ (١٩٩٣ ميلادي) إلى
      وفاته — بالطائف يوم ٢٧ محرم سنة ١٤٢٠ هـ (الموافق
      ١٣ ماي ١٩٩٩ ميلادي) عن ثمان وثمانين سنة، ودفن بمكة
      المكرمة. ولد بالرياض سنة ١٣٣٠ هـ (١٩١٢ ميلادي)،
      وفقد بصره في شبابه، وتلقى العلم على الشيخ محمد بن
      إبراهيم آل الشيخ — مفتي عام المملكة قبله — وحلقة
      من علماء نجد، ودرّس بالجامعة الإسلامية بالمدينة
      المنورة (سنة ١٣٨١-١٣٩٠ هـ / ١٩٦١-١٩٧٠ ميلادي)،
      ونائباً للجامعة ثم رئيساً لها، ثم تولى الرئاسة
      العامة للبحوث العلمية والإفتاء منذ سنة ١٣٩٥ هـ
      (١٩٧٥ ميلادي). ومجاميع فتاويه ومقالاته (وأشهرها
      «مجموع فتاوى ومقالات متنوعة» في نحو ثلاثين مجلداً)
      ودروسه الإذاعية على «صحيح البخاري» و«بلوغ المرام»
      منتشرة في العالم السني الناطق بالعربية. ومُنح
      جائزة الملك فيصل العالمية لخدمة الإسلام سنة
      ١٤٠٢ هـ (١٩٨٢ ميلادي).
    description_fr: |
      ʿAbd al-ʿAzīz ibn ʿAbd Allāh ibn Bāz — juriste sunnite
      ḥanbalite-athari saoudien, président du Comité
      permanent pour la recherche scientifique et l'iftāʾ à
      partir de 1971, président du Conseil des grands
      savants, et Grand Muftī du Royaume d'Arabie saoudite
      de 1414 H (1993 EC) jusqu'à sa mort — mourut à al-
      Ṭāʾif le 27 Muḥarram 1420 H (13 mai 1999 EC) à l'âge
      de 88 ans et fut enterré à La Mecque. Né à Riyad en
      1330 H (1912 EC), il perdit la vue à l'adolescence,
      étudia auprès de Muḥammad ibn Ibrāhīm Āl al-Shaykh
      (le précédent Grand Muftī) et d'un cercle de savants
      najdis, enseigna à l'Université islamique de Médine
      (1961-1970, y compris un long mandat comme vice-
      président puis président), et présida à partir de
      1975 la Présidence générale pour la recherche
      scientifique et l'iftāʾ. Ses recueils de fatwas et
      ses articles (notamment *Majmūʿ Fatāwā wa-Maqālāt
      Mutanawwiʿa* en une trentaine de volumes) et ses
      leçons radiophoniques sur al-Bukhārī et *Bulūgh al-
      Marām* circulèrent largement dans le monde sunnite
      arabophone. Il reçut le Prix international du roi
      Fayṣal pour le service de l'Islam en 1402 H
      (1982 EC).
    canonical_hijri: {year: 1420, month: 1, day: 27, precision: day}
    canonical_gregorian: {date: 1999-05-13, precision: day, method: attested}
