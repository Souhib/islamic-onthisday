  - slug: death-of-abd-al-fattah-abu-ghudda
    category: scholar_death
    title_en: Death of ʿAbd al-Fattāḥ Abū Ghudda — Aleppine Hanafi Muḥaddith
    title_ar: وفاة الشيخ عبد الفتاح أبو غدة — محدث حلب الحنفي
    title_fr: Mort de ʿAbd al-Fattāḥ Abū Ghudda — muḥaddith ḥanafite alépin
    description_en: |
      ʿAbd al-Fattāḥ ibn Muḥammad Abū Ghudda al-Ḥalabī —
      Syrian Sunni Hanafi muḥaddith of Aleppo, longtime
      professor at the College of Sharīʿa of Damascus
      University and at the Imām Muḥammad ibn Saʿūd
      Islamic University in Riyadh, and one of the
      foremost twentieth-century editors of classical
      Sunni hadith and *muṣṭalaḥ* texts — died at Riyadh
      on 16 Shawwāl 1417 AH (24 February 1997 CE) at age
      80, and was buried at the al-Baqīʿ cemetery in
      Madīna at his explicit request. Born at Aleppo in
      1336 AH (1917 CE), he graduated from al-Azhar in
      *uṣūl al-dīn*, returned to Aleppo to teach, and
      from the 1960s settled in Saudi Arabia where he
      taught for over two decades. His scholarly editions
      include the *Risāla* of Imām al-Sakhāwī, al-
      Lakhnawī's *al-Rafʿ wa-l-Takmīl*, *al-Ajwiba al-
      Fāḍila* of al-Lakhnawī, ʿAbd al-Ḥayy al-Lakhnawī's
      *Ẓafar al-Amānī*, and dozens of other classical
      Hanafi-hadith works. He was a senior representative
      of the Aleppine Hanafi-Naqshbandī scholarly tradition
      and a teacher of muḥaddithūn across the Arab world.
    description_ar: |
      توفي الشيخ عبد الفتاح بن محمد أبو غدة الحلبي —
      المحدث السني الحنفي السوري ابن حلب، أستاذ كلية
      الشريعة بجامعة دمشق سنين طويلة وبجامعة الإمام
      محمد بن سعود الإسلامية بالرياض، ومن أكبر محققي
      كتب الحديث ومصطلحه السنية الكلاسيكية في القرن
      العشرين الميلادي — بالرياض يوم ١٦ شوال سنة
      ١٤١٧ هـ (الموافق ٢٤ فيفري ١٩٩٧ ميلادي) عن ثمانين
      سنة، ودفن بمقبرة البقيع بالمدينة المنورة بناءً
      على وصيته. ولد بحلب سنة ١٣٣٦ هـ (١٩١٧ ميلادي)،
      وتخرج من الأزهر الشريف في أصول الدين، وعاد إلى
      حلب للتدريس، ثم استقر في المملكة العربية السعودية
      منذ ستينات القرن العشرين الميلادي ودرّس بها أكثر
      من عقدين. ومن تحقيقاته: «الرسالة» للإمام السخاوي،
      و«الرفع والتكميل» للكنوي، و«الأجوبة الفاضلة»
      للكنوي، و«ظفر الأماني» لعبد الحي اللكنوي، وعشرات
      من كتب الحديث السنية الحنفية الكلاسيكية. وكان من
      كبار ممثلي مدرسة الحلبيين الحنفية النقشبندية،
      وأستاذاً للمحدثين في العالم العربي.
    description_fr: |
      ʿAbd al-Fattāḥ ibn Muḥammad Abū Ghudda al-Ḥalabī —
      muḥaddith sunnite ḥanafite syrien d'Alep,
      longtemps professeur à la Faculté de Sharīʿa de
      l'Université de Damas et à l'Université islamique
      Imām Muḥammad ibn Saʿūd à Riyad, et l'un des plus
      grands éditeurs de textes classiques sunnites de
      hadith et de *muṣṭalaḥ* du XXe siècle — mourut à
      Riyad le 16 Shawwāl 1417 H (24 février 1997 EC) à
      l'âge de 80 ans et fut enterré au cimetière al-
      Baqīʿ à Médine selon son testament explicite. Né
      à Alep en 1336 H (1917 EC), il fut diplômé d'al-
      Azhar en *uṣūl al-dīn*, retourna enseigner à Alep,
      puis s'installa en Arabie saoudite à partir des
      années 1960 où il enseigna durant plus de deux
      décennies. Ses éditions érudites comprennent la
      *Risāla* de l'Imām al-Sakhāwī, *al-Rafʿ wa-l-
      Takmīl* d'al-Lakhnawī, *al-Ajwiba al-Fāḍila* d'al-
      Lakhnawī, *Ẓafar al-Amānī* de ʿAbd al-Ḥayy al-
      Lakhnawī, et des dizaines d'autres ouvrages
      classiques ḥanafites de hadith. Il fut un
      représentant senior de la tradition savante
      ḥanafite-naqshbandīe d'Alep et un maître pour les
      muḥaddithūn du monde arabe.
