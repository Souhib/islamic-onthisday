  # =========================================================================
  # DAMASCENE-MADINAN MUḤADDITH TRADITION
  # =========================================================================

  - slug: death-of-muhammad-awwama
    category: scholar_death
    title_en: Death of Muḥammad ʿAwwāma — Damascene-Madinan Hanafi Muḥaddith
    title_ar: وفاة الشيخ محمد عوامة — المحدث الحنفي الدمشقي المدني
    title_fr: Mort de Muḥammad ʿAwwāma — muḥaddith ḥanafite damasco-madinan
    description_en: |
      Muḥammad ʿAwwāma — Syrian-born Sunni Hanafi
      muḥaddith of Damascene origin, longtime resident
      and teacher in Madīna where he had settled in the
      1980s, and one of the foremost contemporary
      editors of the classical Sunni hadith and
      *muṣṭalaḥ* canon — died at Madīna in 1444 AH
      (2023 CE) at age 84, and was buried at the
      al-Baqīʿ cemetery in Madīna. Born at Aleppo
      in 1358 AH (1940 CE) and trained at Damascus and
      al-Azhar, he was a senior pupil of ʿAbd al-Fattāḥ
      Abū Ghudda and inherited the latter's editorial
      project on the classical Hanafi-hadith canon. His
      annotated editions include *al-Muṣannaf* of Ibn
      Abī Shayba in twenty-six volumes, *Sunan al-
      Nasāʾī* (with reference to the al-Sindī
      commentary), *Taqrīb al-Tahdhīb* of Ibn Ḥajar al-
      ʿAsqalānī (a foundational *rijāl* reference), and
      al-Sakhāwī's *Fatḥ al-Mughīth*. His authored
      monograph *Adab al-Ikhtilāf fī Masāʾil al-ʿIlm
      wa-l-Dīn*, *Athar al-Ḥadīth al-Sharīf fī
      Ikhtilāf al-Aʾimma al-Fuqahāʾ*, and his *Fatāwā*
      circulate widely.
    description_ar: |
      توفي الشيخ محمد عوامة — المحدث السني الحنفي
      السوري الأصل الدمشقي، نزيل المدينة المنورة منذ
      ثمانينات القرن العشرين الميلادي، ومن أبرز محققي
      تراث الحديث ومصطلحه السني الكلاسيكي في عصرنا —
      بالمدينة المنورة سنة ١٤٤٤ هـ (الموافق ٢٠٢٣
      ميلادي) عن أربع وثمانين سنة، ودفن بمقبرة البقيع
      بالمدينة المنورة. ولد بحلب سنة ١٣٥٨ هـ
      (١٩٤٠ ميلادي)، وتلقى العلم بدمشق والأزهر،
      وكان من كبار تلامذة الشيخ عبد الفتاح أبو غدة
      ووريثه في مشروع تحقيق تراث الحديث السني
      الكلاسيكي. ومن تحقيقاته: «المصنف» لابن أبي
      شيبة في ستة وعشرين مجلداً، و«سنن النسائي»
      بإضافة شرح السندي، و«تقريب التهذيب» لابن حجر
      العسقلاني (وهو من أمهات مراجع الرجال)، و«فتح
      المغيث» للسخاوي. ومن مؤلفاته: «أدب الاختلاف
      في مسائل العلم والدين» و«أثر الحديث الشريف
      في اختلاف الأئمة الفقهاء» و«فتاويه» منتشرة
      انتشاراً واسعاً.
    description_fr: |
      Muḥammad ʿAwwāma — muḥaddith sunnite ḥanafite
      d'origine damascène né en Syrie, longtemps
      résident et enseignant à Médine où il s'était
      installé dans les années 1980, et l'un des
      plus éminents éditeurs contemporains du canon
      classique sunnite du hadith et du *muṣṭalaḥ* —
      mourut à Médine en 1444 H (2023 EC) à l'âge
      de 84 ans et fut enterré au cimetière al-Baqīʿ
      à Médine. Né à Alep en 1358 H (1940 EC) et
      formé à Damas et à al-Azhar, il fut un élève
      senior de ʿAbd al-Fattāḥ Abū Ghudda et hérita
      du projet éditorial de ce dernier sur le canon
      classique ḥanafite-hadith. Ses éditions
      annotées comprennent le *Muṣannaf* d'Ibn Abī
      Shayba en vingt-six volumes, les *Sunan al-
      Nasāʾī* (avec le commentaire d'al-Sindī), le
      *Taqrīb al-Tahdhīb* d'Ibn Ḥajar al-ʿAsqalānī
      (référence fondamentale de *rijāl*) et le
      *Fatḥ al-Mughīth* d'al-Sakhāwī. Sa monographie
      *Adab al-Ikhtilāf fī Masāʾil al-ʿIlm wa-l-
      Dīn*, *Athar al-Ḥadīth al-Sharīf fī Ikhtilāf
      al-Aʾimma al-Fuqahāʾ* et ses *Fatāwā*
      circulent largement.
    canonical_hijri: {year: 1444, precision: year}
    claims:
