  # MECCAN-MADINAN MĀLIKĪ SAYYID TRADITION
  # =========================================================================

  - slug: death-of-muhammad-alawi-al-maliki
    category: scholar_death
    title_en: Death of al-Sayyid Muḥammad ibn ʿAlawī al-Mālikī al-Ḥasanī — Meccan Mālikī Sayyid Scholar
    title_ar: وفاة السيد محمد بن علوي المالكي الحسني — العالم المكي المالكي السيد
    title_fr: Mort d'al-Sayyid Muḥammad ibn ʿAlawī al-Mālikī al-Ḥasanī — savant mālikite-sayyid mecquois
    description_en: |
      al-Sayyid Muḥammad ibn ʿAlawī ibn ʿAbbās al-Mālikī
      al-Ḥasanī — Meccan Sunni Mālikī jurist and
      muḥaddith of Hashemite Hasanī sayyid descent,
      longtime teacher in the Sacred Mosque of Mecca
      where his father al-Sayyid ʿAlawī had taught before
      him, and one of the foremost twentieth-century
      representatives of the Ḥaramayn traditional
      scholarly milieu — died at Mecca on 15 Ramaḍān
      1425 AH (29 October 2004 CE) at age 60, and was
      buried at the al-Maʿlā cemetery in Mecca near his
      ancestors. Born at Mecca in 1365 AH (1944 CE), he
      held a doctorate from al-Azhar (1971), taught at
      Umm al-Qurā University in Mecca, and authored a
      large corpus of works on hadith, tafsīr, sīra, and
      ʿaqīda within the broader Sunni-traditional and
      Ḥaramayn-tariqa milieu — including *Mafāhīm yajib
      an Tuṣaḥḥaḥ*, *al-Anwār al-Bāhiyya min Isrāʾ wa-
      Miʿrāj*, and a multi-volume *Sharḥ Sīrat Ibn
      Hishām*. His funeral was led at the Sacred Mosque
      and drew vast crowds across the Sunni traditional
      world.
    description_ar: |
      توفي السيد محمد بن علوي بن عباس المالكي الحسني —
      الفقيه السني المالكي والمحدث ابن مكة المكرمة من
      آل بيت النبي ﷺ من فرع السادة الحسنيين، أستاذ
      الحرم المكي الشريف سنين طويلة على عقب والده
      السيد علوي، ومن أبرز ممثلي مدرسة الحرمين
      التراثية في القرن العشرين الميلادي — بمكة المكرمة
      يوم ١٥ رمضان سنة ١٤٢٥ هـ (الموافق ٢٩ أكتوبر
      ٢٠٠٤ ميلادي) عن ستين سنة، ودفن بمقبرة المعلاة
      بمكة قرب أسلافه. ولد بمكة المكرمة سنة ١٣٦٥ هـ
      (١٩٤٤ ميلادي)، وحاز الدكتوراه من الأزهر الشريف
      سنة ١٣٩١ هـ (١٩٧١ ميلادي)، ودرّس بجامعة أم
      القرى بمكة المكرمة، وله مجموع كبير من المؤلفات
      في الحديث والتفسير والسيرة والعقيدة في مدرسة
      الحرمين السنية التراثية، منها: «مفاهيم يجب أن
      تصحح» و«الأنوار البهية من إسراء ومعراج خير
      البرية» و«شرح سيرة ابن هشام» في عدة مجلدات.
      وصُلي عليه بالحرم المكي الشريف، وحضر جنازته
      جموع غفيرة من العالم السني التراثي.
    description_fr: |
      al-Sayyid Muḥammad ibn ʿAlawī ibn ʿAbbās al-Mālikī
      al-Ḥasanī — juriste sunnite mālikite et muḥaddith
      mecquois de descendance hachémite ḥasanīe-sayyid,
      longtemps enseignant à la Mosquée sacrée de La
      Mecque où son père al-Sayyid ʿAlawī avait enseigné
      avant lui, et l'un des plus éminents représentants
      du XXe siècle du milieu savant traditionnel des
      Ḥaramayn — mourut à La Mecque le 15 Ramaḍān
      1425 H (29 octobre 2004 EC) à l'âge de 60 ans et
      fut enterré au cimetière al-Maʿlā à La Mecque
      auprès de ses ancêtres. Né à La Mecque en 1365 H
      (1944 EC), il était docteur d'al-Azhar (1971),
      enseigna à l'Université Umm al-Qurā à La Mecque,
      et rédigea un vaste corpus d'œuvres sur le hadith,
      le tafsīr, la sīra et la ʿaqīda dans le milieu
      sunnite traditionnel des Ḥaramayn — notamment
      *Mafāhīm yajib an Tuṣaḥḥaḥ*, *al-Anwār al-
      Bāhiyya min Isrāʾ wa-Miʿrāj* et un *Sharḥ Sīrat
      Ibn Hishām* en plusieurs volumes. Ses funérailles
      furent célébrées à la Mosquée sacrée et
      réunirent des foules immenses à travers le
      monde sunnite traditionnel.
    canonical_hijri: {year: 1425, month: 9, day: 15, precision: day}
    canonical_gregorian: {date: 2004-10-29, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI3 supplement records death at Mecca on 15 Ramaḍān 1425 / 29 October 2004."
      - source_key: editorial
        notes: "Burial at al-Maʿlā cemetery in Mecca and Hasanī sayyid descent attested in standard biographies and Saudi obituaries of 2004."
