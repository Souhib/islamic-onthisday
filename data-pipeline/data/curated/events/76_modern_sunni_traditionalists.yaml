  # MAURITANIAN-SAUDI MĀLIKĪ MUFASSIR TRADITION
  # =========================================================================

  - slug: death-of-muhammad-amin-al-shinqiti
    category: scholar_death
    title_en: Death of Muḥammad al-Amīn al-Shinqīṭī — Mauritanian Mālikī Mufassir of *Aḍwāʾ al-Bayān*
    title_ar: وفاة الشيخ محمد الأمين الشنقيطي — المفسر المالكي الموريتاني صاحب «أضواء البيان»
    title_fr: Mort de Muḥammad al-Amīn al-Shinqīṭī — mufassir mālikite mauritanien de *Aḍwāʾ al-Bayān*
    description_en: |
      Muḥammad al-Amīn ibn Muḥammad al-Mukhtār al-Jaknī
      al-Shinqīṭī — Mauritanian Sunni Mālikī mufassir,
      faqīh, and uṣūlī of the Jakanī branch of the
      Shinqīṭī scholarly tradition, longtime professor
      at the Islamic University of Madīna (1381-1393 AH
      / 1961-1973 CE) and member of the Council of
      Senior Scholars of Saudi Arabia from its inaugural
      session in 1391 AH (1971 CE) — died at Mecca on
      22 Dhū al-Qaʿda 1393 AH (17 December 1973 CE) at
      age 76, having travelled to Mecca for the Ḥajj
      season. He was buried at the al-Maʿlā cemetery in
      Mecca. Born in the Mauritanian Sahara around
      1325 AH (1907 CE) into a Berber-Mauritanian
      family of Mālikī jurists, he migrated to the
      Hijaz in 1367 AH (1947 CE). His magnum opus
      *Aḍwāʾ al-Bayān fī Īḍāḥ al-Qurʾān bi-l-Qurʾān*
      in seven volumes — a Qurʾan-by-Qurʾan tafsīr
      compiled at Madīna — is among the foremost
      twentieth-century Sunni mufassir works and
      remains a standard reference in Saudi and Arab
      Sunni teaching circles. His student ʿAṭiyya
      Sālim completed the final volume after his death.
    description_ar: |
      توفي الشيخ محمد الأمين بن محمد المختار الجكني
      الشنقيطي — المفسر السني المالكي الموريتاني
      الفقيه الأصولي من فرع الجكنيين بالمحظرة
      الشنقيطية، أستاذ الجامعة الإسلامية بالمدينة
      المنورة (سنة ١٣٨١-١٣٩٣ هـ / ١٩٦١-١٩٧٣ ميلادي)،
      وعضو هيئة كبار العلماء بالمملكة العربية
      السعودية في دورتها الافتتاحية سنة ١٣٩١ هـ
      (١٩٧١ ميلادي) — بمكة المكرمة يوم ٢٢ ذي القعدة
      سنة ١٣٩٣ هـ (الموافق ١٧ ديسمبر ١٩٧٣ ميلادي)
      عن ست وسبعين سنة، وكان قد قدم مكة لموسم الحج،
      ودفن بمقبرة المعلاة بمكة. ولد بصحراء
      موريتانيا نحو سنة ١٣٢٥ هـ (١٩٠٧ ميلادي) في
      أسرة بربرية موريتانية من فقهاء المالكية،
      وهاجر إلى الحجاز سنة ١٣٦٧ هـ (١٩٤٧ ميلادي).
      وأكبر مؤلفاته «أضواء البيان في إيضاح القرآن
      بالقرآن» في سبعة مجلدات تفسير القرآن
      بالقرآن جمعه بالمدينة المنورة، وهو من أبرز
      كتب التفسير السنية في القرن العشرين الميلادي
      وما يزال مرجعاً معتمداً في حلقات التدريس
      السنية بالمملكة العربية السعودية والعالم
      العربي. وقد أتم تلميذه عطية سالم المجلد
      الأخير بعد وفاته.
    description_fr: |
      Muḥammad al-Amīn ibn Muḥammad al-Mukhtār al-
      Jaknī al-Shinqīṭī — mufassir, faqīh et uṣūlī
      sunnite mālikite mauritanien de la branche
      jaknīe de la tradition savante shinqīṭīe,
      longtemps professeur à l'Université islamique
      de Médine (1381-1393 H / 1961-1973 EC) et
      membre du Conseil des grands savants d'Arabie
      saoudite dès sa session inaugurale en 1391 H
      (1971 EC) — mourut à La Mecque le 22 Dhū al-
      Qaʿda 1393 H (17 décembre 1973 EC) à l'âge de
      76 ans, étant venu à La Mecque pour la saison
      du Ḥajj. Il fut enterré au cimetière al-Maʿlā
      à La Mecque. Né dans le Sahara mauritanien
      vers 1325 H (1907 EC) dans une famille
      berbère-mauritanienne de juristes mālikites,
      il émigra au Hedjaz en 1367 H (1947 EC). Son
      œuvre majeure *Aḍwāʾ al-Bayān fī Īḍāḥ al-
      Qurʾān bi-l-Qurʾān* en sept volumes — un
      tafsīr du Coran par le Coran compilé à
      Médine — figure parmi les plus grandes œuvres
      mufassir sunnites du XXe siècle et demeure une
      référence standard dans les cercles
      d'enseignement sunnite saoudiens et arabes.
      Son élève ʿAṭiyya Sālim acheva le dernier
      volume après sa mort.
    canonical_hijri: {year: 1393, month: 11, day: 22, precision: day}
    canonical_gregorian: {date: 1973-12-17, precision: day, method: attested}
