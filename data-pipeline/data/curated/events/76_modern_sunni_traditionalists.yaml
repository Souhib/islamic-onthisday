  # =========================================================================
  # EGYPTIAN AZHARĪ MUFASSIR TRADITION
  # =========================================================================

  - slug: death-of-mitwalli-al-sharawi
    category: scholar_death
    title_en: Death of Muḥammad Mitwallī al-Shaʿrāwī — Egyptian Azharī Mufassir
    title_ar: وفاة الإمام محمد متولي الشعراوي — مفسر الأزهر المصري
    title_fr: Mort de Muḥammad Mitwallī al-Shaʿrāwī — mufassir azharī égyptien
    description_en: |
      Muḥammad Mitwallī al-Shaʿrāwī — Egyptian Sunni
      Ashʿarī Azharī mufassir of Daqādūs in al-Daqahliyya,
      former Minister of Awqāf of Egypt (1976-1978),
      member of the Council of Senior Scholars of al-
      Azhar, and the most widely viewed twentieth-century
      Arabic-language television exegete of the Qurʾan —
      died at Cairo on 22 Ṣafar 1419 AH (17 June 1998
      CE) at age 86, and was buried at his home village
      of Daqādūs. Born in 1329 AH (1911 CE), he
      graduated from al-Azhar (1941), taught in Saudi
      Arabia and Algeria during the 1950s and 1960s, and
      from 1973 became famous through his weekly
      Egyptian-television *Khawāṭir Ḥawl al-Qurʾān al-
      Karīm* programme, transcribed and published in
      twenty-eight volumes as *Tafsīr al-Shaʿrāwī*. He
      received the King Faisal International Prize for
      Service to Islam in 1419 AH (1998 CE) months
      before his death. His Egyptian-Arabic exegetical
      style and his oral *bayān* of the Qurʾan made him
      a household reference across the Arabic-speaking
      Sunni world.
    description_ar: |
      توفي الإمام محمد متولي الشعراوي — المفسر السني
      الأشعري الأزهري المصري ابن دقادوس بمحافظة
      الدقهلية، وزير الأوقاف بمصر (سنة ١٣٩٦-١٣٩٨ هـ /
      ١٩٧٦-١٩٧٨ ميلادي)، وعضو هيئة كبار العلماء
      بالأزهر الشريف، ومن أوسع المفسرين تأثيراً عبر
      التلفزيون باللغة العربية في القرن العشرين
      الميلادي — بالقاهرة يوم ٢٢ صفر سنة ١٤١٩ هـ
      (الموافق ١٧ جوان ١٩٩٨ ميلادي) عن ست وثمانين
      سنة، ودفن بقريته دقادوس. ولد سنة ١٣٢٩ هـ
      (١٩١١ ميلادي)، وتخرج من الأزهر الشريف سنة
      ١٣٦٠ هـ (١٩٤١ ميلادي)، ودرّس في المملكة
      العربية السعودية والجزائر في خمسينات وستينات
      القرن العشرين الميلادي، واشتهر منذ سنة
      ١٣٩٣ هـ (١٩٧٣ ميلادي) ببرنامجه التلفزيوني
      الأسبوعي «خواطر حول القرآن الكريم»، الذي طُبع
      بعد ذلك في ثمانية وعشرين مجلداً باسم «تفسير
      الشعراوي». ومُنح جائزة الملك فيصل العالمية
      لخدمة الإسلام سنة ١٤١٩ هـ (١٩٩٨ ميلادي)
      قبل وفاته بأشهر. وأسلوبه التفسيري بالعامية
      المصرية وبيانه الشفوي للقرآن الكريم جعلا
      منه مرجعاً معروفاً في العالم السني الناطق
      بالعربية.
    description_fr: |
      Muḥammad Mitwallī al-Shaʿrāwī — mufassir sunnite
      ashʿarite azharī égyptien de Daqādūs dans la
      province d'al-Daqahliyya, ancien ministre des
      Awqāf d'Égypte (1976-1978), membre du Conseil
      des grands savants d'al-Azhar, et le plus
      largement suivi des exégètes coraniques
      arabophones du XXe siècle à la télévision —
      mourut au Caire le 22 Ṣafar 1419 H (17 juin
      1998 EC) à l'âge de 86 ans et fut enterré dans
      son village natal de Daqādūs. Né en 1329 H
      (1911 EC), il fut diplômé d'al-Azhar (1941),
      enseigna en Arabie saoudite et en Algérie dans
      les années 1950 et 1960, et devint célèbre à
      partir de 1973 grâce à son émission télévisée
      hebdomadaire égyptienne *Khawāṭir Ḥawl al-
      Qurʾān al-Karīm*, transcrite et publiée en
      vingt-huit volumes sous le titre *Tafsīr al-
      Shaʿrāwī*. Il reçut le Prix international du
      roi Fayṣal pour le service de l'Islam en
      1419 H (1998 EC) quelques mois avant sa mort.
      Son style exégétique en arabe dialectal
      égyptien et son *bayān* oral du Coran firent
      de lui une référence familière dans le monde
      sunnite arabophone.
    canonical_hijri: {year: 1419, month: 2, day: 22, precision: day}
    canonical_gregorian: {date: 1998-06-17, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 / EI3 supplement records death at Cairo on 22 Ṣafar 1419 / 17 June 1998."
      - source_key: editorial
        notes: "Egyptian Ministry of Awqāf tenure 1976-1978, *Khawāṭir* television programme, and burial at Daqādūs attested in Egyptian press of 1998 and standard biographies."
