  - slug: death-of-muhammad-najib-al-mutii
    category: scholar_death
    title_en: Death of Muḥammad Najīb al-Muṭīʿī — Egyptian Shāfiʿī Faqīh and Completer of *al-Majmūʿ*
    title_ar: وفاة الشيخ محمد نجيب المطيعي — الفقيه الشافعي المصري ومتمم «المجموع»
    title_fr: Mort de Muḥammad Najīb al-Muṭīʿī — faqīh shāfiʿite égyptien et achever du *Majmūʿ*
    description_en: |
      Muḥammad Najīb al-Muṭīʿī — Egyptian Sunni Shāfiʿī
      jurist and Azharī scholar of Cairo, longtime
      teacher in the religious institutes of al-Azhar
      and member of the post-1920s Shāfiʿī revivalist
      circle in Egypt, best known as the completer of
      the unfinished sections of al-Imām al-Nawawī's
      *al-Majmūʿ Sharḥ al-Muhadhdhab* — died at Cairo
      in 1414 AH (1994 CE) at an advanced age. His
      *Takmilat al-Majmūʿ* extended al-Nawawī's
      thirteenth-century commentary, which had stopped
      mid-way through *Kitāb al-Buyūʿ*, through the
      remaining chapters of the *Muhadhdhab* of al-
      Shīrāzī to its end, drawing on the comparative
      Shāfiʿī jurisprudential tradition (Ibn al-Ṣalāḥ,
      Ibn al-Rifʿa, al-Subkī, al-Suyūṭī, al-Ramlī, Ibn
      Ḥajar al-Haythamī) and on contemporary
      jurisprudential discussion. His completion is the
      standard reference text for the second half of
      the *Majmūʿ* in modern editions and remains in
      use in Sunni Shāfiʿī teaching circles in Egypt,
      Yemen, the Hijaz, and Southeast Asia.
    description_ar: |
      توفي الشيخ محمد نجيب المطيعي — الفقيه السني
      الشافعي والعالم الأزهري المصري ابن القاهرة،
      أستاذ المعاهد الدينية الأزهرية سنين طويلة، ومن
      حلقة الإحياء الشافعي بمصر بعد عشرينات القرن
      العشرين الميلادي، اشتهر بإكمال «المجموع شرح
      المهذب» للإمام النووي — بالقاهرة سنة ١٤١٤ هـ
      (الموافق ١٩٩٤ ميلادي) عن عمر طويل. واستكمل
      «تكملته» شرح الإمام النووي السبع قروني الذي
      توقف في نصف «كتاب البيوع»، وأتم بقية أبواب
      «المهذب» للشيرازي إلى آخره، يستفيد من تراث
      الفقه الشافعي المقارن (ابن الصلاح وابن الرفعة
      والسبكي والسيوطي والرملي وابن حجر الهيتمي) ومن
      المسائل الفقهية المعاصرة. وتكملته هي المرجع
      المعتمد في النصف الثاني من «المجموع» في
      الطبعات الحديثة، ولا تزال متداولة في حلقات
      الفقه الشافعي السنية بمصر واليمن والحجاز
      وجنوب شرق آسيا.
    description_fr: |
      Muḥammad Najīb al-Muṭīʿī — juriste sunnite
      shāfiʿite et savant azharī égyptien du Caire,
      longtemps enseignant aux instituts religieux
      d'al-Azhar et membre du cercle de réveil
      shāfiʿite en Égypte après les années 1920,
      surtout connu pour avoir achevé les sections
      inachevées du *al-Majmūʿ Sharḥ al-Muhadhdhab*
      de l'Imām al-Nawawī — mourut au Caire en
      1414 H (1994 EC) à un âge avancé. Sa
      *Takmilat al-Majmūʿ* prolongea le commentaire
      d'al-Nawawī du XIIIe siècle, interrompu au
      milieu du *Kitāb al-Buyūʿ*, jusqu'aux chapitres
      restants du *Muhadhdhab* d'al-Shīrāzī, en
      s'appuyant sur la tradition jurisprudentielle
      shāfiʿite comparée (Ibn al-Ṣalāḥ, Ibn al-Rifʿa,
      al-Subkī, al-Suyūṭī, al-Ramlī, Ibn Ḥajar al-
      Haythamī) et sur les discussions
      jurisprudentielles contemporaines. Son
      complément est le texte de référence pour la
      seconde moitié du *Majmūʿ* dans les éditions
      modernes et demeure en usage dans les cercles
      d'enseignement shāfiʿite sunnite en Égypte, au
      Yémen, au Hedjaz et en Asie du Sud-Est.
    canonical_hijri: {year: 1414, precision: year}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Death in Cairo in 1414 AH / 1994 CE attested in modern Shāfiʿī biographical references; precise day not consistently reported across sources, so year-precision is used."
    people: [[muhammad-najib-al-mutii, died]]
