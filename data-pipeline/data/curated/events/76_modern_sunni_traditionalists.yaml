  - slug: death-of-muqbil-al-wadii
    category: scholar_death
    title_en: Death of Muqbil ibn Hādī al-Wādiʿī — Yemeni Muḥaddith of Damm āj
    title_ar: وفاة الشيخ مقبل بن هادي الوادعي — محدث دماج باليمن
    title_fr: Mort de Muqbil ibn Hādī al-Wādiʿī — muḥaddith yéménite de Damm āj
    description_en: |
      Muqbil ibn Hādī ibn Quflā al-Wādiʿī al-Hamdānī —
      Yemeni Sunni muḥaddith of the Wādiʿa tribe in
      northern Yemen, founder of the Dār al-Ḥadīth
      seminary at Dammāj near Saʿda (1399 AH / 1979 CE),
      and a doctoral graduate of the Islamic University of
      Madīna in *ʿulūm al-ḥadīth* — died at a Jeddah
      hospital on 1 Jumādā al-Ūlā 1422 AH (21 July 2001
      CE) following treatment for liver disease, and was
      buried at Mecca. He had studied at the Islamic
      University of Madīna with ʿAbd al-ʿAzīz ibn Bāz and
      Muḥammad Nāṣir al-Dīn al-Albānī, and was deported
      from Madīna in 1979 in connection with the Juhaymān
      al-ʿUtaybī affair, returning to Yemen where he
      established the Dammāj seminary in his home village.
      His works include *al-Jāmiʿ al-Ṣaḥīḥ mimmā laysa fī
      al-Ṣaḥīḥayn*, *al-Ṣaḥīḥ al-Musnad min Asbāb al-
      Nuzūl*, and *Iʿlām al-Anām bi-Khurūj al-Khawārij*.
      He trained a generation of Sunni hadith students
      from across the Arab world and the Yemeni diaspora.
    description_ar: |
      توفي الشيخ مقبل بن هادي بن قفلة الوادعي الهمداني —
      المحدث السني اليمني من قبيلة وادعة بشمال اليمن،
      مؤسس دار الحديث بدماج قرب صعدة سنة ١٣٩٩ هـ (١٩٧٩
      ميلادي)، الحاصل على الدكتوراه من الجامعة الإسلامية
      بالمدينة المنورة في علوم الحديث — بمستشفى بجدة
      يوم غرة جمادى الأولى سنة ١٤٢٢ هـ (الموافق ٢١
      جويلية ٢٠٠١ ميلادي) إثر علاج لمرض الكبد، ودفن
      بمكة المكرمة. وكان قد درس بالجامعة الإسلامية
      بالمدينة المنورة على الشيخ عبد العزيز بن باز
      والشيخ محمد ناصر الدين الألباني، وأُبعد من
      المدينة المنورة سنة ١٣٩٩ هـ (١٩٧٩ ميلادي) في
      حادثة جهيمان العتيبي، ثم عاد إلى بلده اليمن وأسس
      دار الحديث بدماج بقريته الأصلية. ومن مؤلفاته:
      «الجامع الصحيح مما ليس في الصحيحين» و«الصحيح
      المسند من أسباب النزول» و«إعلام الأنام بخروج
      الخوارج». وقد ربى جيلاً من طلبة الحديث السنيين
      من العالم العربي والشتات اليمني.
    description_fr: |
      Muqbil ibn Hādī ibn Quflā al-Wādiʿī al-Hamdānī —
      muḥaddith sunnite yéménite de la tribu Wādiʿa du
      nord du Yémen, fondateur du séminaire Dār al-Ḥadīth
      à Dammāj près de Ṣaʿda (1399 H / 1979 EC), et
      docteur de l'Université islamique de Médine en
      sciences du hadith — mourut dans un hôpital de
      Djeddah le 1 Jumādā al-Ūlā 1422 H (21 juillet 2001
      EC) après un traitement pour une maladie du foie,
      et fut enterré à La Mecque. Il avait étudié à
      l'Université islamique de Médine auprès de ʿAbd
      al-ʿAzīz ibn Bāz et de Muḥammad Nāṣir al-Dīn al-
      Albānī, et fut expulsé de Médine en 1979 en
      relation avec l'affaire de Juhaymān al-ʿUtaybī,
      retournant au Yémen où il établit le séminaire de
      Dammāj dans son village natal. Ses œuvres
      comprennent *al-Jāmiʿ al-Ṣaḥīḥ mimmā laysa fī al-
      Ṣaḥīḥayn*, *al-Ṣaḥīḥ al-Musnad min Asbāb al-Nuzūl*
      et *Iʿlām al-Anām bi-Khurūj al-Khawārij*. Il forma
      une génération d'étudiants sunnites en hadith
      issus du monde arabe et de la diaspora yéménite.
    canonical_hijri: {year: 1422, month: 5, day: 1, precision: day}
    canonical_gregorian: {date: 2001-07-21, precision: day, method: attested}
    claims:
