  - slug: death-of-mustafa-al-zarqa
    category: scholar_death
    title_en: Death of Muṣṭafā al-Zarqāʾ — Syrian Hanafi Jurist of *al-Madkhal al-Fiqhī al-ʿĀmm*
    title_ar: وفاة الشيخ مصطفى الزرقا — الفقيه الحنفي السوري صاحب «المدخل الفقهي العام»
    title_fr: Mort de Muṣṭafā al-Zarqāʾ — juriste ḥanafite syrien du *Madkhal al-Fiqhī al-ʿĀmm*
    description_en: |
      Muṣṭafā Aḥmad al-Zarqāʾ — Syrian Sunni Hanafi
      jurist of Aleppo and one of the foremost twentieth-
      century theorists of Islamic legal codification,
      longtime professor at the Faculties of Sharīʿa and
      Law of Damascus University, professor at the
      College of Sharīʿa of the University of Jordan
      (from 1966), and at Imām Muḥammad ibn Saʿūd
      Islamic University in Riyadh — died at Riyadh on
      19 Rabīʿ al-Awwal 1420 AH (3 July 1999 CE) at age
      95, and was buried at Amman in Jordan. Born at
      Aleppo in 1322 AH (1904 CE) into the Hanafi
      scholarly Zarqāʾ family, he was the son of Aḥmad
      al-Zarqāʾ (author of *Sharḥ al-Qawāʿid al-
      Fiqhiyya*). His magnum opus *al-Madkhal al-Fiqhī
      al-ʿĀmm ilā al-Fiqh al-Islāmī fī Thawbihi al-
      Jadīd* in three volumes, *Sharḥ al-Qawāʿid al-
      Fiqhiyya* (in continuation of his father), and
      his *Fatāwā* are among the most widely circulated
      modern Sunni Hanafi jurisprudence references in
      the Arabic-speaking world. He was a member of
      the Damascus Arab Academy of Sciences, the OIC
      International Islamic Fiqh Academy in Jeddah, and
      received the King Faisal International Prize for
      Service to Islam in 1404 AH (1984 CE).
    description_ar: |
      توفي الشيخ مصطفى أحمد الزرقا — الفقيه السني
      الحنفي السوري ابن حلب، ومن أبرز منظري التقنين
      الإسلامي في القرن العشرين الميلادي، أستاذ
      كليتي الشريعة والحقوق بجامعة دمشق سنين طويلة،
      وأستاذ كلية الشريعة بالجامعة الأردنية منذ سنة
      ١٣٨٦ هـ (١٩٦٦ ميلادي)، وأستاذ جامعة الإمام
      محمد بن سعود الإسلامية بالرياض — بالرياض يوم
      ١٩ ربيع الأول سنة ١٤٢٠ هـ (الموافق ٣ جويلية
      ١٩٩٩ ميلادي) عن خمس وتسعين سنة، ودفن بعمان
      بالأردن. ولد بحلب سنة ١٣٢٢ هـ (١٩٠٤ ميلادي)
      في الأسرة الزرقاء الحنفية العلمية، وهو ابن
      الشيخ أحمد الزرقا صاحب «شرح القواعد الفقهية».
      وأكبر مؤلفاته «المدخل الفقهي العام إلى الفقه
      الإسلامي في ثوبه الجديد» في ثلاثة مجلدات،
      وإكماله «شرح القواعد الفقهية» لوالده، و«فتاوى
      مصطفى الزرقا» من أوسع مراجع الفقه السني
      الحنفي الحديث تداولاً في العالم الناطق
      بالعربية. وكان عضواً بالمجمع العلمي العربي
      بدمشق، ومجمع الفقه الإسلامي الدولي بجدة
      التابع لمنظمة التعاون الإسلامي، ومُنح جائزة
      الملك فيصل العالمية لخدمة الإسلام سنة
      ١٤٠٤ هـ (١٩٨٤ ميلادي).
    description_fr: |
      Muṣṭafā Aḥmad al-Zarqāʾ — juriste sunnite
      ḥanafite syrien d'Alep et l'un des plus
      éminents théoriciens du XXe siècle de la
      codification juridique islamique, longtemps
      professeur aux Facultés de Sharīʿa et de Droit
      de l'Université de Damas, professeur à la
      Faculté de Sharīʿa de l'Université de Jordanie
      (à partir de 1966) et à l'Université islamique
      Imām Muḥammad ibn Saʿūd à Riyad — mourut à
      Riyad le 19 Rabīʿ al-Awwal 1420 H (3 juillet
      1999 EC) à l'âge de 95 ans et fut enterré à
      Amman en Jordanie. Né à Alep en 1322 H
      (1904 EC) dans la famille savante ḥanafite des
      Zarqāʾ, il était le fils d'Aḥmad al-Zarqāʾ
      (auteur de *Sharḥ al-Qawāʿid al-Fiqhiyya*).
      Son œuvre majeure *al-Madkhal al-Fiqhī al-ʿĀmm
      ilā al-Fiqh al-Islāmī fī Thawbihi al-Jadīd* en
      trois volumes, *Sharḥ al-Qawāʿid al-Fiqhiyya*
      (en continuation de son père) et ses *Fatāwā*
      figurent parmi les références ḥanafites
      sunnites modernes les plus largement diffusées
      dans le monde arabophone. Il fut membre de
      l'Académie arabe de Damas, de l'Académie
      internationale du fiqh islamique de l'OCI à
      Jeddah, et reçut le Prix international du roi
      Fayṣal pour le service de l'Islam en 1404 H
      (1984 EC).
    canonical_hijri: {year: 1420, month: 3, day: 19, precision: day}
    canonical_gregorian: {date: 1999-07-03, precision: day, method: attested}
