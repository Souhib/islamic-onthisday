  - slug: death-of-abd-allah-al-ghumari
    category: scholar_death
    title_en: Death of ʿAbd Allāh ibn al-Ṣiddīq al-Ghumārī — Moroccan Mālikī Muḥaddith of Tangier
    title_ar: وفاة الشيخ عبد الله بن الصديق الغماري — محدث طنجة المالكي المغربي
    title_fr: Mort de ʿAbd Allāh ibn al-Ṣiddīq al-Ghumārī — muḥaddith mālikite marocain de Tanger
    description_en: |
      ʿAbd Allāh ibn Muḥammad ibn al-Ṣiddīq al-Ghumārī
      al-Ḥasanī — Moroccan Sunni Mālikī muḥaddith of the
      Ghumāra Berber region of northern Morocco, head of
      the family-Sufi Ṣiddīqiyya tradition centred at
      Tangier after the deaths of his elder brothers
      Aḥmad and ʿAbd al-ʿAzīz, doctoral graduate of al-
      Azhar (1942) and pupil of Muḥammad Bakhīt al-Muṭīʿī
      and Muḥammad Zāhid al-Kawtharī — died at Tangier
      on 19 Shaʿbān 1413 AH (12 February 1993 CE) at age
      83. Born at Tangier in 1328 AH (1910 CE) into the
      learned Ghumārī family, he authored more than
      one hundred works on hadith, *muṣṭalaḥ*, fiqh, and
      *ʿaqīda* — including *al-Iʿlām bi-Anna al-Tasawwuf
      min Sharīʿat al-Islām*, *al-Burhān al-Jalī fī
      Taḥqīq Intisāb al-Ṣūfiyya ilā ʿAlī*, his commentary
      on al-Suyūṭī's *al-Itqān*, and his *Risāla fī
      Aḥkām al-Aḍāhī*. He was also a frequent
      correspondent with the leading muḥaddithūn of
      Egypt, Syria, and the Hijaz, and was awarded the
      Moroccan Wisām al-Kafāʾa min al-Darja al-Mumtāza
      shortly before his death.
    description_ar: |
      توفي الشيخ عبد الله بن محمد بن الصديق الغماري
      الحسني — المحدث السني المالكي المغربي من بلاد
      غمارة شمال المغرب، شيخ الطريقة الصديقية الأسرية
      الصوفية بطنجة بعد وفاة أخويه الأكبرين أحمد وعبد
      العزيز، الحاصل على الدكتوراه من الأزهر الشريف
      سنة ١٣٦١ هـ (١٩٤٢ ميلادي)، تلميذ الشيخ محمد
      بخيت المطيعي والشيخ محمد زاهد الكوثري — بطنجة
      يوم ١٩ شعبان سنة ١٤١٣ هـ (الموافق ١٢ فيفري
      ١٩٩٣ ميلادي) عن ثلاث وثمانين سنة. ولد بطنجة
      سنة ١٣٢٨ هـ (١٩١٠ ميلادي) في الأسرة الغمارية
      العلمية، وله ما يزيد على مائة مصنف في الحديث
      ومصطلحه والفقه والعقيدة، منها: «الإعلام بأن
      التصوف من شريعة الإسلام» و«البرهان الجلي في
      تحقيق انتساب الصوفية إلى علي» وحاشيته على
      «الإتقان» للسيوطي و«رسالة في أحكام الأضاحي».
      وكان مكاتباً مع كبار محدثي مصر والشام والحجاز
      في عصره، ومُنح وسام الكفاءة المغربي من الدرجة
      الممتازة قبيل وفاته.
    description_fr: |
      ʿAbd Allāh ibn Muḥammad ibn al-Ṣiddīq al-Ghumārī
      al-Ḥasanī — muḥaddith sunnite mālikite marocain
      de la région berbère ghumāra du nord du Maroc,
      chef de la tradition familiale-soufie ṣiddīqīe
      centrée à Tanger après la mort de ses frères
      aînés Aḥmad et ʿAbd al-ʿAzīz, docteur d'al-Azhar
      (1942) et élève de Muḥammad Bakhīt al-Muṭīʿī et
      Muḥammad Zāhid al-Kawtharī — mourut à Tanger le
      19 Shaʿbān 1413 H (12 février 1993 EC) à l'âge
      de 83 ans. Né à Tanger en 1328 H (1910 EC) dans
      la famille savante des Ghumārī, il rédigea plus
      d'une centaine d'ouvrages sur le hadith, le
      *muṣṭalaḥ*, le fiqh et la *ʿaqīda* — notamment
      *al-Iʿlām bi-Anna al-Tasawwuf min Sharīʿat al-
      Islām*, *al-Burhān al-Jalī fī Taḥqīq Intisāb
      al-Ṣūfiyya ilā ʿAlī*, son commentaire d'al-
      Suyūṭī *al-Itqān* et sa *Risāla fī Aḥkām al-
      Aḍāhī*. Il fut aussi un correspondant régulier
      des grands muḥaddithūn d'Égypte, de Syrie et du
      Hedjaz et reçut le Wisām al-Kafāʾa marocain de
      première classe peu avant sa mort.
    canonical_hijri: {year: 1413, month: 8, day: 19, precision: day}
    canonical_gregorian: {date: 1993-02-12, precision: day, method: attested}
