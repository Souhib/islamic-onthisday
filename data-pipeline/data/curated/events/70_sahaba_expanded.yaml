  - slug: death-of-thawban-mawla-rasul-allah
    category: companion
    title_en: Death of Thawbān ra — Freedman of the Prophet ﷺ
    title_ar: وفاة ثوبان رضي الله عنه — مولى رسول الله ﷺ
    title_fr: Mort de Thawbān ra — affranchi du Prophète ﷺ
    description_en: |
      Thawbān ibn Bujdud — sahabi of disputed origin (some
      sources say from Yemen, others from al-Sarāt) whom the
      Prophet ﷺ purchased and freed, and who chose to remain in
      the Prophet's ﷺ service for the rest of the Prophet's ﷺ
      life and never leave Medina until his master died — died
      at Ḥimṣ in Syria in 54 AH during the caliphate of
      Muʿāwiya ra. After the Prophet's ﷺ death he settled in
      Ramla in Palestine and then in Ḥimṣ. He is the Companion
      of the famous ḥadīth on the *Ṭāʾifa Manṣūra* (the
      victorious group): "a group of my Umma will not cease to
      be victorious upon the truth, not harmed by those who
      forsake them or oppose them, until the command of Allah
      comes" (Muslim 1920); the ḥadīth on the seventy-two
      misguided sects (Tirmidhī 2640, *ṣaḥīḥ* by al-Albānī);
      and the ḥadīth on the nations gathering against the
      Muslims like a feast: "yes, you will be many on that day,
      but you will be froth like the froth of the sea" (Abū
      Dāwūd 4297, *ṣaḥīḥ* by al-Albānī).
    description_ar: |
      توفي ثوبان بن بُجدد رضي الله عنه — صحابي مختلف في أصله
      (قيل من اليمن وقيل من السراة)، اشتراه النبي ﷺ فأعتقه،
      فاختار البقاء في خدمة رسول الله ﷺ بقية حياته ولم يفارق
      المدينة حتى مات سيده ﷺ — بحمص في الشام سنة أربع وخمسين
      للهجرة في خلافة معاوية رضي الله عنه. وبعد وفاة النبي ﷺ
      نزل الرملة بفلسطين ثم حمص. وهو صاحب الحديث المشهور في
      الطائفة المنصورة: «لا تزال طائفة من أمتي ظاهرين على
      الحق، لا يضرهم من خذلهم ولا من خالفهم، حتى يأتي أمر
      الله» (مسلم ١٩٢٠)، وحديث افتراق الأمة على ثلاث وسبعين
      فرقة (الترمذي ٢٦٤٠، صححه الألباني)، وحديث تداعي الأمم
      على المسلمين كالمأدبة: «بل أنتم يومئذٍ كثير، ولكنكم
      غثاء كغثاء السيل» (أبو داود ٤٢٩٧، صححه الألباني).
    description_fr: |
      Thawbān ibn Bujdud — sahabi d'origine disputée (certaines
      sources disent du Yémen, d'autres d'al-Sarāt) que le
      Prophète ﷺ acheta et affranchit, et qui choisit de rester
      au service du Prophète ﷺ pour le reste de la vie du
      Prophète ﷺ et de ne jamais quitter Médine jusqu'à la
      mort de son maître — mourut à Ḥimṣ en Syrie en 54 H
      durant le califat de Muʿāwiya ra. Après la mort du
      Prophète ﷺ il s'installa à Ramla en Palestine puis à
      Ḥimṣ. Il est le Compagnon du célèbre ḥadīth sur la
      *Ṭāʾifa Manṣūra* (le groupe victorieux) : « un groupe
      de ma Umma ne cessera d'être victorieux sur la vérité,
      non lésé par ceux qui l'abandonnent ou s'y opposent,
      jusqu'à ce que vienne l'ordre d'Allah » (Muslim 1920) ;
      le ḥadīth sur les soixante-douze sectes égarées
      (Tirmidhī 2640, *ṣaḥīḥ* par al-Albānī) ; et le ḥadīth
      sur les nations se rassemblant contre les musulmans
      comme un festin : « oui, vous serez nombreux ce jour-là,
      mais vous serez écume comme l'écume de la mer » (Abū
      Dāwūd 4297, *ṣaḥīḥ* par al-Albānī).
    canonical_hijri: {year: 54, precision: year}
    canonical_gregorian: {date: 674-01-01, precision: year, method: attested}
