  - slug: death-of-usama-ibn-zayd
    category: companion
    title_en: Death of Usāma ibn Zayd ra — Beloved of the Prophet ﷺ
    title_ar: وفاة أسامة بن زيد رضي الله عنه — حِبّ رسول الله ﷺ
    title_fr: Mort d'Usāma ibn Zayd ra — bien-aimé du Prophète ﷺ
    description_en: |
      Usāma ibn Zayd ibn Ḥāritha al-Kalbī — son of Zayd ibn
      Ḥāritha ra (the Prophet's ﷺ freedman and adopted son
      before the abrogation of legal adoption) and Umm Ayman ra
      (the Prophet's ﷺ nursemaid), raised in the Prophet's ﷺ
      household and called by him *al-Ḥibb ibn al-Ḥibb* ("the
      beloved son of the beloved") — died at al-Jurf near Medina
      during the caliphate of Muʿāwiya ra around 54 AH at age
      about 75. The Prophet ﷺ appointed him commander of the
      Syrian expedition (the Usāma campaign) at age 18 in his
      final illness, an appointment some Muhājirūn questioned
      due to his youth; the Prophet ﷺ ascended the *minbar* and
      said: "If you criticise his command, you criticised his
      father's command before — and by Allah he was worthy of
      it, and was the most beloved of people to me, and this
      one is among the most beloved of people to me after him"
      (Bukhārī 4250, Muslim 2426). The expedition was paused at
      the Prophet's ﷺ death and dispatched by Abū Bakr ra as
      his first act as Caliph despite enormous internal
      opposition. Usāma never participated in any of the *fitan*
      (the wars between Companions) on the principle of his
      famous ḥadīth-incident at Ḥuraqāt where he killed a man
      who had pronounced the *shahāda* under threat, prompting
      the Prophet's ﷺ rebuke: "did you split open his heart?"
      (Bukhārī 4269, Muslim 96).

      Classical biographers diverge on the year: Ibn Saʿd's
      *Ṭabaqāt* and al-Dhahabī's *Siyar* favour 54 AH, while
      Ibn Ḥajar's *Iṣāba* records 58 or 59 AH as alternative
      attestations. We follow Ibn Saʿd as the earlier and more
      directly attested authority.
    description_ar: |
      توفي أسامة بن زيد بن حارثة الكلبي رضي الله عنه — ابن زيد
      بن حارثة مولى رسول الله ﷺ ومتبناه قبل نسخ التبني، وأم أيمن
      حاضنة رسول الله ﷺ، تربى في بيت النبي ﷺ، وكان النبي ﷺ
      يدعوه «الحبّ ابن الحبّ» — في «الجرف» قرب المدينة في خلافة
      معاوية رضي الله عنه نحو سنة أربع وخمسين عن نحو خمس وسبعين
      سنة. أمّره النبي ﷺ على سرية الشام (سرية أسامة) وهو ابن
      ثماني عشرة في مرضه الأخير، فتكلم بعض المهاجرين في إمارته
      لحداثة سنه، فصعد النبي ﷺ المنبر فقال: «إن تطعنوا في
      إمارته فقد كنتم تطعنون في إمارة أبيه من قبل، وايم الله
      إن كان لخليقاً للإمارة، وإن كان لمن أحب الناس إليّ، وإن
      هذا لمن أحب الناس إليّ بعده» (البخاري ٤٢٥٠، مسلم ٢٤٢٦).
      وقد توقفت السرية بوفاة النبي ﷺ ثم أنفذها أبو بكر رضي الله
      عنه أول عمله في الخلافة رغم المعارضة الشديدة. ولم يدخل
      أسامة في شيء من الفتن بين الصحابة بعد قصته المشهورة في
      «الحرقات» إذ قتل رجلاً قد نطق بالشهادة عند تهديده،
      فعاتبه النبي ﷺ: «أفلا شققت عن قلبه؟» (البخاري ٤٢٦٩،
      مسلم ٩٦).

      اختلف المترجمون في سنة وفاته: ابن سعد في «الطبقات»
      والذهبي في «السير» يرجحان سنة ٥٤ هـ، فيما ذكر ابن حجر
      في «الإصابة» سنة ٥٨ أو ٥٩ هـ قولين آخرين. ونعتمد ابن
      سعد لأسبقيته وقربه من العصر.
    description_fr: |
      Usāma ibn Zayd ibn Ḥāritha al-Kalbī — fils de Zayd ibn
      Ḥāritha ra (l'affranchi et fils adoptif du Prophète ﷺ
      avant l'abrogation de l'adoption légale) et d'Umm Ayman
      ra (la nourrice du Prophète ﷺ), élevé dans la maisonnée
      du Prophète ﷺ et appelé par lui *al-Ḥibb ibn al-Ḥibb*
      (« le bien-aimé fils du bien-aimé ») — mourut à al-Jurf
      près de Médine durant le califat de Muʿāwiya ra vers 54 H
      à l'âge d'environ 75 ans. Le Prophète ﷺ le désigna
      commandant de l'expédition syrienne (la campagne d'Usāma)
      à l'âge de 18 ans dans sa dernière maladie, désignation
      contestée par certains Muhājirūn en raison de sa jeunesse ;
      le Prophète ﷺ monta sur le *minbar* et dit : « si vous
      critiquez son commandement, vous critiquiez celui de son
      père avant — et par Allah il en était digne, et il était
      le plus aimé des gens auprès de moi, et celui-ci est
      parmi les plus aimés des gens auprès de moi après lui »
      (Bukhārī 4250, Muslim 2426). L'expédition fut suspendue
      à la mort du Prophète ﷺ et envoyée par Abū Bakr ra comme
      son premier acte en tant que Calife malgré une énorme
      opposition interne. Usāma ne participa à aucune des
      *fitan* (les guerres entre Compagnons) en raison du
      principe de son célèbre incident à Ḥuraqāt où il tua un
      homme qui avait prononcé la *shahāda* sous la menace,
      suscitant la réprimande du Prophète ﷺ : « as-tu fendu
      son cœur ? » (Bukhārī 4269, Muslim 96).

      Les biographes classiques divergent sur l'année : les
      *Ṭabaqāt* d'Ibn Saʿd et le *Siyar* d'al-Dhahabī
      privilégient 54 H, tandis que l'*Iṣāba* d'Ibn Ḥajar
      enregistre 58 ou 59 H comme attestations alternatives.
      Nous suivons Ibn Saʿd comme l'autorité la plus ancienne
      et la plus directement attestée.
