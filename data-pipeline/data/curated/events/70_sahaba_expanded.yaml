  - slug: death-of-abu-waqid-al-laythi
    category: companion
    title_en: Death of Abū Wāqid al-Laythī ra
    title_ar: وفاة أبي واقد الليثي رضي الله عنه
    title_fr: Mort d'Abū Wāqid al-Laythī ra
    description_en: |
      al-Ḥārith ibn ʿAwf — Abū Wāqid al-Laythī al-Kinānī — sahabi
      who embraced Islam at the Conquest of Mecca (8 AH) and
      participated with the Prophet ﷺ at Ḥunayn, al-Ṭāʾif, and the
      Farewell Pilgrimage — died at Mecca during the Pilgrimage
      season, having moved there from Medina in his old age. He
      was about 75. He is the narrator of the famous ḥadīth
      preserved in al-Bukhārī and Muslim about the three groups
      who came to the Prophet ﷺ in the mosque: one sat in the
      circle, one sat in a gap, and one turned away — the Prophet ﷺ
      ruled that the first sought refuge with Allah and Allah
      sheltered him, the second was shy and Allah was shy of
      him, while the third turned away and Allah turned away
      from him (Bukhārī 66, Muslim 2176). He participated at
      Ḥunayn in the famous incident of the *dhāt anwāṭ* tree,
      when some new converts asked the Prophet ﷺ to designate a
      tree on which they could hang their weapons for blessing
      as the polytheists did, prompting the Prophet's ﷺ rebuke
      that "you have said the very thing the Children of Israel
      said to Mūsā: make for us a god as they have gods."
    description_ar: |
      توفي الحارث بن عوف — أبو واقد الليثي الكناني رضي الله عنه —
      صحابي أسلم يوم فتح مكة سنة ثمان وشهد مع رسول الله ﷺ
      حنيناً والطائف وحجة الوداع — بمكة في موسم الحج وقد انتقل
      إليها من المدينة في آخر عمره، عن نحو خمس وسبعين سنة. وهو
      راوي الحديث المشهور المتفق عليه في ثلاثة نفر أتوا رسول
      الله ﷺ في المسجد فجلس أحدهم في الحلقة، وجلس الآخر في
      الفرجة، وأعرض الثالث ذاهباً، فقال ﷺ: «أما أحدهم فأوى إلى
      الله فآواه الله، وأما الآخر فاستحيا فاستحيا الله منه،
      وأما الثالث فأعرض فأعرض الله عنه» (البخاري ٦٦، مسلم ٢١٧٦).
      وحضر في حنين قصة «ذات أنواط» الشهيرة، إذ سأل بعض حدثاء
      الإسلام رسولَ الله ﷺ أن يجعل لهم شجرة يعلقون عليها أسلحتهم
      للتبرك كما يفعل المشركون، فقال ﷺ: «قلتم والذي نفسي بيده
      كما قالت بنو إسرائيل لموسى: اجعل لنا إلهاً كما لهم آلهة».
    description_fr: |
      al-Ḥārith ibn ʿAwf — Abū Wāqid al-Laythī al-Kinānī — sahabi
      qui embrassa l'Islam à la Conquête de La Mecque (8 H) et
      participa aux côtés du Prophète ﷺ à Ḥunayn, à al-Ṭāʾif et
      au Pèlerinage d'Adieu — mourut à La Mecque durant la saison
      du Pèlerinage, après s'y être installé depuis Médine dans
      sa vieillesse. Il avait environ 75 ans. Il est le narrateur
      du célèbre ḥadīth préservé dans al-Bukhārī et Muslim au
      sujet des trois personnes qui vinrent au Prophète ﷺ dans
      la mosquée : l'un s'assit dans le cercle, l'un s'assit dans
      un interstice, et l'un se détourna — le Prophète ﷺ jugea
      que le premier chercha refuge auprès d'Allah et Allah lui
      donna refuge, le second eut pudeur et Allah eut pudeur
      envers lui, tandis que le troisième se détourna et Allah
      se détourna de lui (Bukhārī 66, Muslim 2176). Il assista à
      Ḥunayn au célèbre incident de l'arbre *dhāt anwāṭ*, lorsque
      quelques nouveaux convertis demandèrent au Prophète ﷺ de
      désigner un arbre sur lequel ils pourraient suspendre leurs
      armes pour la bénédiction à la manière des polythéistes,
      ce qui suscita la réprimande du Prophète ﷺ : « vous avez
      dit la chose même que les Enfants d'Israël dirent à Mūsā :
      fais-nous un dieu comme ils ont des dieux ».
