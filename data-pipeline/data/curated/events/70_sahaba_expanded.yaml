  - slug: death-of-fadala-ibn-ubayd
    category: companion
    title_en: Death of Faḍāla ibn ʿUbayd al-Anṣārī ra
    title_ar: وفاة فضالة بن عبيد الأنصاري رضي الله عنه
    title_fr: Mort de Faḍāla ibn ʿUbayd al-Anṣārī ra
    description_en: |
      Faḍāla ibn ʿUbayd ibn Nāfidh al-Anṣārī al-Awsī — Madinan
      sahabi of the Aws who pledged the Bayʿat al-Riḍwān at
      al-Ḥudaybiyya (6 AH), participated at Khaybar and the
      Conquest of Mecca, and was appointed by Muʿāwiya ra as
      *qāḍī* of Damascus and commander of the maritime jihād
      against the Byzantines — died in Damascus during
      Muʿāwiya's caliphate around 53 AH. Muʿāwiya himself
      carried his bier on his shoulders, saying: "carry me up —
      you have made me bereaved of a man like him; I will not
      find his like again." He is the Companion of several
      ḥadīths in the Six Books on the rules of *qiṣāṣ*, on the
      prohibition of ribā in gold-for-gold transactions of
      differing weight, and on supplication.

      Classical biographers diverge on the year between 53 and
      69 AH; we follow Ibn Saʿd's *Ṭabaqāt* and al-Dhahabī's
      *Siyar* with 53 AH as the dominant attestation, consistent
      with Muʿāwiya ra (d. 60 AH) attending and carrying his
      bier. Ibn Ḥajar's *Iṣāba* records the late date as a
      minority position.
    description_ar: |
      توفي فضالة بن عبيد بن نافذ الأنصاري الأوسي رضي الله عنه —
      صحابي مدني من الأوس بايع تحت الشجرة بيعة الرضوان عام
      الحديبية سنة ست، وشهد خيبر وفتح مكة، وولاه معاوية رضي
      الله عنه قضاء دمشق وقيادة الجهاد البحري ضد الروم —
      بدمشق في خلافة معاوية نحو سنة ثلاث وخمسين للهجرة. وحمل
      معاوية رضي الله عنه نعشه على عاتقه فقال: «احملوني، فقد
      أعدمتموني مثله، لن أجد مثله بعده». وهو صاحب أحاديث في
      الكتب الستة في أحكام القصاص، والنهي عن الربا في بيع
      الذهب بالذهب متفاضلاً، وفي الدعاء.

      اختلف المترجمون في سنة وفاته بين ٥٣ و٦٩ هـ؛ ونتبع طبقات
      ابن سعد وسير الذهبي بسنة ٥٣ هـ بوصفها الأكثر تواتراً،
      وهي المتسقة مع حضور معاوية رضي الله عنه (المتوفى ٦٠ هـ)
      جنازته وحمله نعشه. وذكر ابن حجر في «الإصابة» التاريخ
      المتأخر قولاً قليلاً.
    description_fr: |
      Faḍāla ibn ʿUbayd ibn Nāfidh al-Anṣārī al-Awsī — sahabi
      médinois des Aws qui prêta la Bayʿat al-Riḍwān à
      al-Ḥudaybiyya (6 H), participa à Khaybar et à la
      Conquête de La Mecque, et fut désigné par Muʿāwiya ra
      *qāḍī* de Damas et commandant du jihād maritime contre
      les Byzantins — mourut à Damas durant le califat de
      Muʿāwiya vers 53 H. Muʿāwiya lui-même porta son cercueil
      sur ses épaules disant : « portez-moi en haut — vous m'avez
      privé d'un homme tel que lui ; je ne trouverai plus son
      pareil ». Il est le Compagnon de plusieurs ḥadīths dans
      les Six Livres sur les règles du *qiṣāṣ*, sur
      l'interdiction du ribā dans les transactions or-contre-or
      de poids différents, et sur l'invocation.

      Les biographes classiques divergent sur l'année entre 53
      et 69 H ; nous suivons les *Ṭabaqāt* d'Ibn Saʿd et le
      *Siyar* d'al-Dhahabī avec 53 H comme attestation
      dominante, conforme à la présence de Muʿāwiya ra
      (m. 60 H) à ses funérailles et au port de son cercueil.
      Ibn Ḥajar dans l'*Iṣāba* enregistre la date tardive
      comme position minoritaire.
