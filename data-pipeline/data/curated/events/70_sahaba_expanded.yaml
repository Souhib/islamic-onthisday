  - slug: death-of-shaddad-ibn-aws
    category: companion
    title_en: Death of Shaddād ibn Aws al-Anṣārī ra
    title_ar: وفاة شداد بن أوس الأنصاري رضي الله عنه
    title_fr: Mort de Shaddād ibn Aws al-Anṣārī ra
    description_en: |
      Shaddād ibn Aws ibn Thābit al-Anṣārī al-Khazrajī — nephew
      of Ḥassān ibn Thābit ra (the Prophet's ﷺ poet), Madinan
      sahabi of the Khazraj known for his combination of
      *ḥilm* (forbearance), eloquence, and ascetic worship —
      died at Bayt al-Maqdis (Jerusalem) in 58 AH during the
      caliphate of Muʿāwiya ra at age 75. He had settled in
      Palestine after the conquests and was buried near Bāb
      al-Raḥma in Jerusalem, where his shrine is still
      identified within the Bāb al-Raḥma cemetery adjacent to
      al-Aqṣā. He is the Companion of *Sayyid al-Istighfār*
      ("the master of seeking forgiveness") preserved in
      al-Bukhārī (Bukhārī 6306) — the prayer the Prophet ﷺ
      taught him: *Allāhumma anta rabbī, lā ilāha illā anta,
      khalaqtanī wa-anā ʿabduka...* — "whoever says it during
      the day with certainty and dies that day before evening,
      he is among the people of Paradise; and whoever says it
      at night with certainty and dies before morning, he is
      among the people of Paradise." He also narrated the
      ḥadīth on *iḥsān* in slaughter being mandatory.
    description_ar: |
      توفي شدّاد بن أوس بن ثابت الأنصاري الخزرجي رضي الله عنه —
      ابن أخي حسان بن ثابت رضي الله عنه شاعر النبي ﷺ، صحابي
      مدني من الخزرج عُرف بالحلم والبيان والعبادة الزاهدة —
      ببيت المقدس سنة ثمان وخمسين للهجرة في خلافة معاوية
      رضي الله عنه عن خمس وسبعين سنة. سكن فلسطين بعد الفتوح
      ودُفن قريباً من باب الرحمة بالقدس، ومقامه هناك معروف في
      مقبرة باب الرحمة الملاصقة للأقصى. وهو صاحب «سيد
      الاستغفار» في صحيح البخاري (البخاري ٦٣٠٦) الذي علمه
      النبي ﷺ: «اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا
      عبدك...» — «من قالها من النهار موقناً بها فمات من
      يومه قبل أن يمسي فهو من أهل الجنة، ومن قالها من الليل
      وهو موقن بها فمات قبل أن يصبح فهو من أهل الجنة». وروى
      أيضاً حديث وجوب الإحسان في الذبح.
    description_fr: |
      Shaddād ibn Aws ibn Thābit al-Anṣārī al-Khazrajī — neveu
      de Ḥassān ibn Thābit ra (le poète du Prophète ﷺ), sahabi
      médinois de la Khazraj connu pour la combinaison de
      *ḥilm* (longanimité), d'éloquence et d'adoration
      ascétique — mourut à Bayt al-Maqdis (Jérusalem) en 58 H
      durant le califat de Muʿāwiya ra à l'âge de 75 ans. Il
      s'était installé en Palestine après les conquêtes et fut
      enterré près de Bāb al-Raḥma à Jérusalem, où son
      sanctuaire est toujours identifié dans le cimetière de
      Bāb al-Raḥma adjacent à al-Aqṣā. Il est le Compagnon
      de *Sayyid al-Istighfār* (« le maître de la demande de
      pardon ») préservé dans al-Bukhārī (Bukhārī 6306) — la
      prière que le Prophète ﷺ lui enseigna : *Allāhumma anta
      rabbī, lā ilāha illā anta, khalaqtanī wa-anā ʿabduka...*
      — « celui qui la dit pendant le jour avec certitude et
      meurt ce jour avant le soir est parmi les gens du
      Paradis ; et celui qui la dit la nuit avec certitude et
      meurt avant le matin est parmi les gens du Paradis ».
      Il rapporta également le ḥadīth sur l'*iḥsān* dans
      l'égorgement étant obligatoire.
    canonical_hijri: {year: 58, precision: year}
    canonical_gregorian: {date: 678-01-01, precision: year, method: attested}
