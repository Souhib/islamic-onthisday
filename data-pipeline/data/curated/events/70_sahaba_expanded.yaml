  - slug: death-of-abu-lubaba-ibn-abd-al-mundhir
    category: companion
    title_en: Death of Abū Lubāba ibn ʿAbd al-Mundhir al-Anṣārī ra
    title_ar: وفاة أبي لبابة بن عبد المنذر الأنصاري رضي الله عنه
    title_fr: Mort d'Abū Lubāba ibn ʿAbd al-Mundhir al-Anṣārī ra
    description_en: |
      Bashīr ibn ʿAbd al-Mundhir — Abū Lubāba al-Anṣārī al-Awsī —
      Madinan sahabi of the Aws tribe, one of the twelve *naqībs*
      selected at the second pledge of al-ʿAqaba, and the
      Companion appointed by the Prophet ﷺ as governor of Medina
      whenever the Prophet ﷺ left the city on a campaign — died
      in Medina around 50 AH, during the late caliphate of
      Muʿāwiya ra. He is the Companion of the famous incident
      preserved in classical *sīra* literature: when sent as
      negotiator to Banū Qurayẓa during their siege (5 AH),
      they asked him whether they should accept the Prophet's ﷺ
      arbitration and Abū Lubāba pointed to his throat
      indicating slaughter. Realising he had betrayed God and
      His Messenger by signalling, he tied himself to a pillar
      of the Prophet's mosque vowing not to leave until Allah
      forgave him. He remained tied for six nights — his
      daughter coming to untie him only at prayer times — until
      the verse of repentance was revealed (Q. 9:102):
      "And others have acknowledged their sins; they had mixed
      a righteous deed with another bad one." The Prophet ﷺ
      personally untied him when news of the forgiveness came.

      Sources record his death between the caliphate of ʿAlī ra
      and the caliphate of Muʿāwiya ra; we follow the late-50-AH
      attestation in Ibn Ḥajar's *Iṣāba* and Ibn Saʿd's *Ṭabaqāt*
      as the dominant position, with a minority earlier dating
      noted by some classical biographers.
    description_ar: |
      توفي بشير بن عبد المنذر — أبو لبابة الأنصاري الأوسي رضي
      الله عنه — صحابي مدني من الأوس، أحد النقباء الاثني عشر
      ليلة بيعة العقبة الثانية، وكان النبي ﷺ يستخلفه على
      المدينة كلما خرج لغزوة — بالمدينة المنورة نحو سنة خمسين
      للهجرة في أواخر خلافة معاوية رضي الله عنه. وهو صاحب
      القصة المشهورة في كتب السيرة: لما أرسله النبي ﷺ إلى بني
      قريظة لما حاصرهم سنة خمس فسألوه: «أتنزل على حكم محمد؟»
      فأشار بيده إلى حلقه أنه الذبح. فأدرك أنه خان الله
      ورسوله بإشارته فربط نفسه بسارية في مسجد النبي ﷺ وأقسم
      ألا يحلها أحد إلا الله — فبقي مربوطاً ست ليالٍ، تأتيه
      ابنته في أوقات الصلاة فتحلّه — حتى نزلت آية التوبة
      ﴿وَآخَرُونَ اعْتَرَفُوا بِذُنُوبِهِمْ خَلَطُوا عَمَلًا
      صَالِحًا وَآخَرَ سَيِّئًا﴾ [التوبة ١٠٢]، فحلّه النبي ﷺ
      بنفسه حين بُشّر بقبول توبته.

      اختلف المترجمون في وفاته بين خلافة علي وخلافة معاوية رضي
      الله عنهما؛ ونعتمد ما ذكره ابن حجر في «الإصابة» وابن سعد
      في «الطبقات» من أنها في أواخر الخمسينات الهجرية بوصفه
      القول الأرجح، وأشار بعض المتقدمين إلى تاريخ أبكر بوصفه
      قولاً قليلاً.
    description_fr: |
      Bashīr ibn ʿAbd al-Mundhir — Abū Lubāba al-Anṣārī al-Awsī —
      sahabi médinois de la tribu Aws, l'un des douze *naqībs*
      désignés à la seconde Allégeance d'al-ʿAqaba, et le
      Compagnon que le Prophète ﷺ désignait gouverneur de Médine
      chaque fois qu'il quittait la ville en campagne — mourut à
      Médine vers 50 H, à la fin du califat de Muʿāwiya ra. Il
      est le Compagnon du célèbre incident préservé dans la
      littérature classique de la *sīra* : lorsqu'envoyé comme
      négociateur auprès des Banū Qurayẓa durant leur siège
      (5 H), ceux-ci lui demandèrent s'ils devaient accepter
      l'arbitrage du Prophète ﷺ et Abū Lubāba pointa sa gorge
      indiquant l'égorgement. Réalisant qu'il avait trahi Dieu
      et Son Messager par ce signe, il s'attacha à un pilier de
      la mosquée du Prophète ﷺ jurant de ne pas s'en délier
      jusqu'à ce qu'Allah lui pardonnât. Il resta attaché six
      nuits — sa fille venant le détacher uniquement aux heures
      de la prière — jusqu'à ce que le verset de repentir fût
      révélé (Q. 9:102) : « D'autres ont reconnu leurs péchés ;
      ils avaient mêlé une bonne action à une autre mauvaise ».
      Le Prophète ﷺ le délia lui-même lorsque la nouvelle du
      pardon parvint.

      Les sources rapportent sa mort entre les califats d'ʿAlī
      et de Muʿāwiya ra ; nous suivons l'attestation de la fin
      des années 50 H dans l'*Iṣāba* d'Ibn Ḥajar et les
      *Ṭabaqāt* d'Ibn Saʿd comme position dominante, avec une
      datation antérieure minoritaire notée par certains
      biographes classiques.
