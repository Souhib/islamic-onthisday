  - slug: death-of-abdullah-ibn-mughaffal-al-muzani
    category: companion
    title_en: Death of ʿAbdullāh ibn Mughaffal al-Muzanī ra
    title_ar: وفاة عبد الله بن مغفل المزني رضي الله عنه
    title_fr: Mort d'ʿAbdullāh ibn Mughaffal al-Muzanī ra
    description_en: |
      ʿAbdullāh ibn Mughaffal al-Muzanī — sahabi who pledged the
      Bayʿat al-Riḍwān (the Pledge of Satisfaction) under the
      tree at al-Ḥudaybiyya in 6 AH and was one of the seven
      Anṣārī-affiliated *bukāʾūn* ("the weepers") who came to
      the Prophet ﷺ asking for mounts to join the Tabūk
      expedition and were turned back when none could be
      provided, weeping that they were missing the campaign
      (Q. 9:92) — died in Basra during the caliphate of Yazīd
      ibn Muʿāwiya around 59-60 AH. He settled in Basra after
      the conquests and became one of the senior teachers of
      the city, narrating numerous ḥadīths preserved in the
      Six Books, including the foundational ḥadīth on
      *qirāʾat al-Fātiḥa* in prayer, the prohibition of striking
      animals on the face, and the Sunnah of saying *Bismillāh*
      before slaughter. al-Ḥasan al-Baṣrī ra studied under
      him directly.
    description_ar: |
      توفي عبد الله بن مغفل المزني رضي الله عنه — صحابي بايع تحت
      الشجرة بيعة الرضوان عام الحديبية سنة ست، وكان أحد البكائين
      السبعة من الأنصار الذين أتوا رسول الله ﷺ يستحملونه إلى
      تبوك فلم يجد ما يحملهم عليه فردهم وهم يبكون حزناً على
      فوات الغزوة، نزل فيهم قول الله تعالى ﴿وَلَا عَلَى الَّذِينَ
      إِذَا مَا أَتَوْكَ لِتَحْمِلَهُمْ﴾ [التوبة ٩٢] — بالبصرة في
      خلافة يزيد بن معاوية نحو سنة تسع وخمسين وستين للهجرة. سكن
      البصرة بعد الفتوح وصار من كبار أئمتها، وروى أحاديث كثيرة
      في الكتب الستة، منها أصول في قراءة الفاتحة في الصلاة،
      والنهي عن الضرب في الوجه، وسنة التسمية عند الذبح. وأخذ
      عنه الحسن البصري رحمه الله مباشرة.
    description_fr: |
      ʿAbdullāh ibn Mughaffal al-Muzanī — sahabi qui prêta la
      Bayʿat al-Riḍwān (l'Allégeance de la Satisfaction) sous
      l'arbre à al-Ḥudaybiyya en 6 H, et fut l'un des sept
      *bukāʾūn* (« les pleureurs ») affiliés aux Anṣār qui
      vinrent au Prophète ﷺ demandant des montures pour rejoindre
      l'expédition de Tabūk et furent renvoyés lorsqu'aucune ne
      put être fournie, pleurant de manquer la campagne (Q. 9:92)
      — mourut à Bassora durant le califat de Yazīd ibn
      Muʿāwiya vers 59-60 H. Il s'installa à Bassora après les
      conquêtes et devint l'un des maîtres séniors de la ville,
      rapportant de nombreux ḥadīths préservés dans les Six
      Livres, notamment le ḥadīth fondateur sur la *qirāʾat
      al-Fātiḥa* dans la prière, l'interdiction de frapper les
      animaux sur le visage, et la sunna de dire *Bismillāh*
      avant l'égorgement. al-Ḥasan al-Baṣrī ra étudia
      directement sous sa direction.
