  - slug: death-of-abu-al-darda
    category: companion
    title_en: Death of Abū al-Dardāʾ al-Anṣārī ra — Sage of the Umma
    title_ar: وفاة أبي الدرداء الأنصاري رضي الله عنه — حكيم الأمة
    title_fr: Mort d'Abū al-Dardāʾ al-Anṣārī ra — sage de la Umma
    description_en: |
      ʿUwaymir ibn Mālik (or ibn Zayd) al-Anṣārī al-Khazrajī —
      Abū al-Dardāʾ — Madinan sahabi of the Khazraj who
      embraced Islam late at the Battle of Badr's eve (the
      last of his clan to convert), but devoted himself so
      thoroughly to worship and learning that the Prophet ﷺ
      called him *Ḥakīm Hādhihi al-Umma* ("the Sage of this
      Umma") — died at Damascus in 32 AH during the caliphate
      of ʿUthmān ra. He was appointed by ʿUmar ra as the first
      *qāḍī* of Damascus and led the early Quranic teaching
      circle at the Umayyad Mosque (then the Cathedral of
      St John before its conversion), instructing reportedly
      sixteen hundred students daily — a foundational moment
      for the school of *qirāʾāt* of Syria. He is the Companion
      of the famous ḥadīth: "scholars are heirs of the
      prophets; the prophets did not bequeath dinars or
      dirhams, they bequeathed knowledge — whoever takes from
      it has taken an abundant share" (Abū Dāwūd 3641,
      Tirmidhī 2682, *ṣaḥīḥ* by al-Albānī). His wife Umm
      al-Dardāʾ al-Ṣughrā became one of the major *tābiʿiyyāt*
      jurists of Damascus after his death.
    description_ar: |
      توفي عويمر بن مالك (وقيل ابن زيد) الأنصاري الخزرجي —
      أبو الدرداء رضي الله عنه — صحابي مدني من الخزرج، أسلم
      متأخراً يوم بدر (آخر أهل داره إسلاماً)، فعكف على
      العبادة والعلم حتى سماه النبي ﷺ «حكيم هذه الأمة» —
      بدمشق سنة اثنتين وثلاثين للهجرة في خلافة عثمان رضي
      الله عنه. ولاه عمر رضي الله عنه قضاء دمشق وكان أول
      قاضٍ بها، وقعد في الجامع الأموي (وكان حينئذ كنيسة
      مار يوحنا قبل تحويلها) فعلّم القرآن نحو ألف وستمئة
      تلميذ يومياً — ولحظةٌ تأسيسيةٌ لمدرسة القراءات بالشام.
      وهو صاحب الحديث المشهور: «العلماء ورثة الأنبياء، إن
      الأنبياء لم يورّثوا ديناراً ولا درهماً، إنما ورّثوا
      العلم، فمن أخذ به أخذ بحظ وافر» (أبو داود ٣٦٤١،
      الترمذي ٢٦٨٢، صححه الألباني). وزوجته أم الدرداء
      الصغرى صارت من كبار فقيهات التابعيات بدمشق بعده.
    description_fr: |
      ʿUwaymir ibn Mālik (ou ibn Zayd) al-Anṣārī al-Khazrajī —
      Abū al-Dardāʾ — sahabi médinois de la Khazraj qui
      embrassa l'Islam tardivement à la veille de la bataille
      de Badr (le dernier de son clan à se convertir), mais se
      consacra si pleinement à l'adoration et au savoir que
      le Prophète ﷺ l'appela *Ḥakīm Hādhihi al-Umma* (« le
      Sage de cette Umma ») — mourut à Damas en 32 H durant
      le califat d'ʿUthmān ra. Il fut désigné par ʿUmar ra
      comme premier *qāḍī* de Damas et dirigea le premier
      cercle d'enseignement coranique à la Mosquée des
      Omeyyades (alors la Cathédrale de Saint Jean avant sa
      conversion), instruisant rapporte-t-on seize cents
      élèves par jour — un moment fondateur pour l'école des
      *qirāʾāt* de Syrie. Il est le Compagnon du célèbre
      ḥadīth : « les savants sont les héritiers des prophètes ;
      les prophètes n'ont pas légué de dinars ou de dirhams,
      ils ont légué le savoir — quiconque en prend a pris une
      part abondante » (Abū Dāwūd 3641, Tirmidhī 2682,
      *ṣaḥīḥ* par al-Albānī). Son épouse Umm al-Dardāʾ
      al-Ṣughrā devint l'une des principales juristes
      *tābiʿiyyāt* de Damas après sa mort.
