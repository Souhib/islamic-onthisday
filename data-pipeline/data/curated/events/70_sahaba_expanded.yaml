  - slug: death-of-rafi-ibn-khadij
    category: companion
    title_en: Death of Rāfiʿ ibn Khadīj al-Anṣārī ra
    title_ar: وفاة رافع بن خديج الأنصاري رضي الله عنه
    title_fr: Mort de Rāfiʿ ibn Khadīj al-Anṣārī ra
    description_en: |
      Rāfiʿ ibn Khadīj al-Anṣārī al-Awsī — Madinan sahabi of
      the Aws, presented for service at Badr at age 13 but
      turned back by the Prophet ﷺ for being too young, then
      accepted at Uḥud and present at every subsequent ghazwa,
      where he was struck in the chest by an arrow at Uḥud
      whose head remained in him until his death — died in
      Medina in 74 AH at age 86. Just before his death the
      arrowhead worked itself out of his chest, and Rāfiʿ said:
      "this is the *shahāda* I have awaited for sixty years."
      He is the Companion of the foundational ḥadīth in the
      Six Books on the *muḥāqala* and *muzābana* sharecropping
      practices: "we used to lease land for a third or a
      quarter of the produce, then the Messenger of Allah ﷺ
      forbade it" (Bukhārī 2339, Muslim 1547); on slaughter
      with reed-stems and stones being permissible "as long as
      the blood is shed and the name of Allah is mentioned"
      (Bukhārī 2488, Muslim 1968); and on Friday prayer being
      obligatory.
    description_ar: |
      توفي رافع بن خديج الأنصاري الأوسي رضي الله عنه — صحابي
      مدني من الأوس، عُرض على النبي ﷺ يوم بدر وله ثلاث عشرة
      سنة فردّه لصغره، ثم أجازه يوم أحد وشهد ما بعدها من
      الغزوات، أصابه سهم في صدره يوم أحد بقي نصلُه فيه إلى
      موته — بالمدينة سنة أربع وسبعين للهجرة عن ست وثمانين
      سنة. وعند موته خرج النصل من صدره فقال رافع: «هذه
      الشهادة التي انتظرتها ستين سنة». وهو صاحب الحديث الأصل
      في الكتب الستة في النهي عن المحاقلة والمزابنة: «كنا
      نكري الأرض على الثلث والربع، فنهى رسول الله ﷺ عنها»
      (البخاري ٢٣٣٩، مسلم ١٥٤٧)، وحديث الذبح بالقصب والحجر
      ما دام الدم مسفوحاً واسم الله مذكوراً (البخاري ٢٤٨٨،
      مسلم ١٩٦٨)، وحديث وجوب الجمعة.
    description_fr: |
      Rāfiʿ ibn Khadīj al-Anṣārī al-Awsī — sahabi médinois des
      Aws, présenté pour le service à Badr à l'âge de 13 ans
      mais renvoyé par le Prophète ﷺ pour être trop jeune,
      puis accepté à Uḥud et présent à toutes les ghazwa
      ultérieures, frappé en pleine poitrine par une flèche à
      Uḥud dont la pointe demeura en lui jusqu'à sa mort —
      mourut à Médine en 74 H à l'âge de 86 ans. Juste avant
      sa mort la pointe de la flèche se dégagea de sa
      poitrine, et Rāfiʿ dit : « voici la *shahāda* que
      j'attendais depuis soixante ans ». Il est le Compagnon
      du ḥadīth fondateur dans les Six Livres sur les pratiques
      de métayage *muḥāqala* et *muzābana* : « nous avions
      l'habitude de louer la terre pour un tiers ou un quart
      du produit, puis le Messager d'Allah ﷺ l'interdit »
      (Bukhārī 2339, Muslim 1547) ; sur l'égorgement avec des
      tiges de roseau et des pierres étant permis « tant que
      le sang est versé et le nom d'Allah est mentionné »
      (Bukhārī 2488, Muslim 1968) ; et sur la prière du
      vendredi étant obligatoire.
