# Wave: Major Sahaba (Companions of the Prophet ﷺ) — Expanded death events
# (2026-04-27).
# Adds 11 senior sahaba whose deaths were not yet in the dataset:
# Abū Wāqid al-Laythī, Abū Lubāba ibn ʿAbd al-Mundhir, ʿAbdullāh ibn
# Mughaffal al-Muzanī, Usāma ibn Zayd, al-Nuʿmān ibn Bashīr,
# Faḍāla ibn ʿUbayd, Thawbān (mawlā of the Prophet ﷺ), Abū Umāma
# al-Bāhilī, Rāfiʿ ibn Khadīj, Shaddād ibn Aws, Abū al-Dardāʾ.
# All sahaba — image_blocked. Each event attested in ≥2 of:
# Ibn Ḥajar al-Iṣāba, al-Dhahabī Siyar, Ibn Saʿd Ṭabaqāt, al-Ṭabarī
# Tārīkh, Ibn al-Athīr al-Kāmil, Ibn Kathīr al-Bidāya, Ibn Khallikān
# Wafayāt. Trilingual (en/ar/fr).

events:
