  - slug: death-of-abu-amama-al-bahili
    category: companion
    title_en: Death of Abū Umāma al-Bāhilī ra
    title_ar: وفاة أبي أمامة الباهلي رضي الله عنه
    title_fr: Mort d'Abū Umāma al-Bāhilī ra
    description_en: |
      Ṣudayy ibn ʿAjlān al-Bāhilī — Abū Umāma al-Bāhilī —
      sahabi of the Bāhila tribe who participated in the
      Battle of the Ditch (5 AH) and was sent by the Prophet ﷺ
      to summon his tribe to Islam — died at Ḥimṣ in 86 AH
      during the caliphate of ʿAbd al-Malik ibn Marwān at age
      about 91 (some sources 81). He was the last Companion of
      the Prophet ﷺ to die in Syria, and one of the longest-
      lived. He narrated 250 ḥadīths preserved in the Six
      Books and Aḥmad's *Musnad*, including the ḥadīth on the
      virtues of Sūrat al-Baqara (Muslim 804): "recite the
      *Zahrāwayn* — al-Baqara and Āl ʿImrān — for they will
      come on the Day of Judgement as two clouds shading their
      reciter"; the ḥadīth on greeting (*salām*) being the
      means by which Allah strengthens love between believers
      (Muslim 54); and the ḥadīth that the *Qurʾān* will
      intercede for those who recite it.
    description_ar: |
      توفي صُديّ بن عجلان الباهلي — أبو أمامة الباهلي رضي الله
      عنه — صحابي من باهلة شهد مع النبي ﷺ الخندق سنة خمس
      وأرسله النبي ﷺ داعياً إلى الإسلام في قومه — بحمص سنة
      ست وثمانين للهجرة في خلافة عبد الملك بن مروان عن نحو
      إحدى وتسعين سنة (وقيل إحدى وثمانين). وكان آخر صحابي
      مات بالشام، ومن أطول الصحابة عمراً. روى نحو مئتين
      وخمسين حديثاً في الكتب الستة ومسند أحمد، منها حديث فضل
      سورة البقرة (مسلم ٨٠٤): «اقرؤوا الزهراوين البقرة وآل
      عمران، فإنهما يأتيان يوم القيامة كأنهما غمامتان تظلان
      صاحبهما»، وحديث السلام أنه به يقوي الله المحبة بين
      المؤمنين (مسلم ٥٤)، وحديث أن القرآن يشفع لقارئه يوم
      القيامة.
    description_fr: |
      Ṣudayy ibn ʿAjlān al-Bāhilī — Abū Umāma al-Bāhilī —
      sahabi de la tribu Bāhila qui participa à la bataille du
      Fossé (5 H) et fut envoyé par le Prophète ﷺ pour appeler
      sa tribu à l'Islam — mourut à Ḥimṣ en 86 H durant le
      califat d'ʿAbd al-Malik ibn Marwān à l'âge d'environ
      91 ans (certaines sources 81). Il fut le dernier
      Compagnon du Prophète ﷺ à mourir en Syrie, et l'un des
      plus longs-vivants. Il rapporta 250 ḥadīths préservés
      dans les Six Livres et le *Musnad* d'Aḥmad, notamment
      le ḥadīth sur les vertus de la sourate al-Baqara
      (Muslim 804) : « récitez les *Zahrāwayn* — al-Baqara et
      Āl ʿImrān — car ils viendront au Jour du Jugement
      comme deux nuages ombrageant leur récitant » ; le ḥadīth
      sur le salut (*salām*) comme moyen par lequel Allah
      renforce l'amour entre les croyants (Muslim 54) ; et le
      ḥadīth selon lequel le *Qurʾān* intercédera pour ceux
      qui le récitent.
    canonical_hijri: {year: 86, precision: year}
