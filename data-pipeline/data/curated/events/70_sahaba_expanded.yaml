  - slug: death-of-al-numan-ibn-bashir
    category: companion
    title_en: Death of al-Nuʿmān ibn Bashīr al-Anṣārī ra
    title_ar: وفاة النعمان بن بشير الأنصاري رضي الله عنه
    title_fr: Mort d'al-Nuʿmān ibn Bashīr al-Anṣārī ra
    description_en: |
      al-Nuʿmān ibn Bashīr al-Anṣārī al-Khazrajī — first male
      child born to the Anṣār after the Hijra (born in Shaʿbān
      2 AH), brought to the Prophet ﷺ at fourteen days old to
      have his palate softened with chewed dates (*taḥnīk*)
      and named — was killed at Bayrūt (Beirut) in 64-65 AH
      during the *fitna* following the death of Yazīd ibn
      Muʿāwiya, while serving as Umayyad governor of Ḥimṣ.
      He had supported the caliphal claim of ʿAbdullāh ibn
      al-Zubayr ra in Syria; when ʿAbd al-Malik ibn Marwān's
      forces gained control he fled toward the coast and was
      killed by tribal pursuers. He is the Companion of the
      foundational ḥadīth on *ḥalāl* and *ḥarām* preserved in
      both *Ṣaḥīḥayn*: "the lawful is clear and the unlawful
      is clear, and between them are doubtful matters about
      which many of the people do not know" — Bukhārī 52,
      Muslim 1599 — and the ḥadīth on the believers as one
      body: "if any organ aches, the entire body responds with
      sleeplessness and fever" (Bukhārī 6011, Muslim 2586). He
      was about 64.

      Classical sources diverge on the precise year of his
      killing between 64 and 65 AH; we follow Ibn Saʿd's
      *Ṭabaqāt* and al-Ṭabarī's *Tārīkh* with 65 AH (the year of
      Marj Rāhiṭ and the consolidation of Marwanid control over
      Syria) as the dominant attestation.
    description_ar: |
      قُتل النعمان بن بشير الأنصاري الخزرجي رضي الله عنه — أول
      مولود ذكر للأنصار بعد الهجرة (وُلد في شعبان سنة اثنتين)،
      حُمل إلى النبي ﷺ ابنَ أربع عشرة ليلة فحنّكه بالتمر وسماه
      — ببيروت سنة أربع أو خمس وستين للهجرة في الفتنة بعد وفاة
      يزيد بن معاوية، وهو والي حمص. وكان قد دعا لعبد الله بن
      الزبير رضي الله عنه بالشام؛ فلما استولى جيش عبد المُلك
      بن مروان فرّ نحو الساحل فقتلته القبائل. وهو صاحب الحديث
      الأصل في الحلال والحرام المتفق عليه: «الحلال بيّن
      والحرام بيّن، وبينهما مشتبهات لا يعلمهن كثير من الناس»
      (البخاري ٥٢، مسلم ١٥٩٩)، وحديث المؤمنين كالجسد: «إذا
      اشتكى منه عضو تداعى له سائر الجسد بالسهر والحمى»
      (البخاري ٦٠١١، مسلم ٢٥٨٦). وكان عمره نحو أربع وستين
      سنة.

      اختلفت المصادر الكلاسيكية في تحديد سنة قتله بين ٦٤
      و٦٥ هـ؛ ونعتمد طبقات ابن سعد وتاريخ الطبري بسنة ٦٥ هـ
      (سنة مرج راهط واستقرار سيطرة المروانيين على الشام)
      بوصفها الأكثر تواتراً.
    description_fr: |
      al-Nuʿmān ibn Bashīr al-Anṣārī al-Khazrajī — premier
      enfant mâle né aux Anṣār après la Hijra (né en Shaʿbān 2 H),
      conduit au Prophète ﷺ à quatorze jours pour qu'il lui
      adoucisse le palais avec des dattes mâchées (*taḥnīk*) et
      le nomme — fut tué à Beyrouth en 64-65 H durant la *fitna*
      qui suivit la mort de Yazīd ibn Muʿāwiya, alors qu'il
      servait comme gouverneur omeyyade de Ḥimṣ. Il avait
      soutenu la prétention califale d'ʿAbdullāh ibn al-Zubayr
      ra en Syrie ; lorsque les forces d'ʿAbd al-Malik ibn
      Marwān prirent le contrôle, il fuit vers la côte et fut
      tué par des poursuivants tribaux. Il est le Compagnon du
      ḥadīth fondateur sur le *ḥalāl* et le *ḥarām* préservé
      dans les deux *Ṣaḥīḥayn* : « le licite est clair et
      l'illicite est clair, et entre les deux il y a des
      matières douteuses que beaucoup de gens ne connaissent
      pas » (Bukhārī 52, Muslim 1599) — et du ḥadīth sur les
      croyants comme un seul corps : « si un organe souffre,
      tout le corps répond par l'insomnie et la fièvre »
      (Bukhārī 6011, Muslim 2586). Il avait environ 64 ans.

      Les sources classiques divergent sur l'année précise de
      son meurtre entre 64 et 65 H ; nous suivons les
      *Ṭabaqāt* d'Ibn Saʿd et le *Tārīkh* d'al-Ṭabarī avec
      65 H (l'année de Marj Rāhiṭ et de la consolidation du
      contrôle marwanide sur la Syrie) comme attestation
      dominante.
