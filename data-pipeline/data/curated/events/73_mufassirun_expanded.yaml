  # =========================================================================
  # 13th CENTURY AH — late-Ottoman Hanafi-Sufi synthesis
  # =========================================================================

  - slug: death-of-mahmud-al-alusi
    category: scholar_death
    title_en: Death of Maḥmūd al-Ālūsī — Baghdadi mufassir, author of *Rūḥ al-Maʿānī*
    title_ar: وفاة محمود الآلوسي — مفسّر بغداد، صاحب «روح المعاني»
    title_fr: Mort de Maḥmūd al-Ālūsī — mufassir baghdadien, auteur de *Rūḥ al-Maʿānī*
    description_en: |
      Shihāb al-Dīn Abū al-Thanāʾ Maḥmūd ibn ʿAbd Allāh al-Ālūsī al-
      Ḥusaynī al-Baghdādī — Sunni Hanafi (with later Shāfiʿī
      affiliation) and Sufi-leaning Naqshbandī mufassir of late-
      Ottoman Baghdad, *muftī* of Baghdad under the Ottomans, and
      principal author of one of the last great pre-modern Sunni
      tafsirs — died at Baghdad on 25 Dhū al-Qaʿda 1270 AH (19 July
      1854 CE). His *Rūḥ al-Maʿānī fī Tafsīr al-Qurʾān al-ʿAẓīm wa-
      al-Sabʿ al-Mathānī*, composed over the closing decades of his
      life, is a vast synthesis bringing together the linguistic-
      rhetorical material of al-Zamakhsharī, the *aḥkām al-Qurʾān*
      tradition, the kalāmic theology of the Ashʿarī-Māturīdī mainstream,
      and Sufi *ishārāt* in the Naqshbandī register, with its own
      apparatus of source-criticism for the *isrāʾīliyyāt*; it
      became a standard scholarly tafsir of the late-Ottoman and
      modern Sunni Arab world. He is the founder of the Ālūsī
      family of Baghdadi scholars (his son Nuʿmān, grandson Maḥmūd
      Shukrī al-Ālūsī, etc.). EI2 places the death day-precise on
      25 Dhū al-Qaʿda 1270.
    description_ar: |
      توفي شهاب الدين أبو الثناء محمود بن عبد الله الآلوسي الحسيني
      البغدادي — حنفي السنة في أصله (وانتهى إلى الشافعية)، نقشبندي
      المنزع الصوفي، مفسّر بغداد في أواخر عهد العثمانيين، ومفتيها،
      وصاحب آخر التفاسير الكبرى السنية قبل الحقبة الحديثة — ببغداد
      في الخامس والعشرين من ذي القعدة سنة سبعين ومئتين وألف للهجرة
      (الموافق ١٩ يوليو ١٨٥٤م). و«روح المعاني في تفسير القرآن العظيم
      والسبع المثاني» الذي صنّفه في أواخر عمره جامعٌ بين علوم اللغة
      والبلاغة على أصول الزمخشري، وأحكام القرآن، وعلم الكلام على
      مذهب أهل السنة الأشاعرة الماتريدية، والإشارات الصوفية على ذوق
      النقشبندية، مع جهاز نقدٍ للإسرائيليات؛ وصار من معتمدات تفاسير
      أواخر العصر العثماني والعالم العربي السني الحديث. وهو رأسُ
      آل الآلوسي البغداديين العلمية (ابنه نعمان، وحفيده محمود شكري
      الآلوسي... إلخ). وثبَّت دائرة المعارف الإسلامية يوم وفاته في
      الخامس والعشرين من ذي القعدة ١٢٧٠ هـ.
    description_fr: |
      Shihāb al-Dīn Abū al-Thanāʾ Maḥmūd ibn ʿAbd Allāh al-Ālūsī al-
      Ḥusaynī al-Baghdādī — sunnite ḥanafīte (avec rattachement
      ultérieur au shāfiʿīsme) et mufassir d'inclination soufie
      naqshbandīe à Bagdad sous l'Empire ottoman finissant, *muftī*
      de Bagdad pour les Ottomans et auteur de l'un des derniers
      grands tafsīrs sunnites pré-modernes — mourut à Bagdad le
      25 Dhū al-Qaʿda 1270 H (19 juillet 1854 EC). Son *Rūḥ al-
      Maʿānī fī Tafsīr al-Qurʾān al-ʿAẓīm wa-al-Sabʿ al-Mathānī*,
      composé durant les dernières décennies de sa vie, est une
      vaste synthèse réunissant le matériel linguistique et
      rhétorique d'al-Zamakhsharī, la tradition des *aḥkām al-Qurʾān*,
      la théologie kalāmīque ashʿarīte-māturīdīte du courant
      majoritaire et les *ishārāt* soufies de registre naqshbandī,
      avec un appareil propre de critique des *isrāʾīliyyāt* ; il
      devint un tafsīr savant de référence du monde arabe sunnite
      ottoman finissant et moderne. Il est le fondateur de la
      lignée savante des Ālūsī de Bagdad (son fils Nuʿmān, son
      petit-fils Maḥmūd Shukrī al-Ālūsī, etc.). L'EI2 fixe le décès
      au jour près au 25 Dhū al-Qaʿda 1270 H.
    canonical_hijri: {year: 1270, month: 11, day: 25, precision: day}
    canonical_gregorian: {date: 1854-07-19, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 art. 'al-Ālūsī, Maḥmūd b. ʿAbd Allāh': died 25 Dhū al-Qaʿda 1270 / 19 July 1854 at Baghdad."
      - source_key: editorial
        notes: "Confirmed by the Ālūsī-family biographical record (Nuʿmān al-Ālūsī's *Jalāʾ al-ʿAynayn* and the introduction to standard editions of *Rūḥ al-Maʿānī*)."
    people: [[mahmud-al-alusi, died]]
