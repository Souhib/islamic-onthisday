# Wave 73 of curated event additions (2026-04-27).
# Major Sunni mufassirūn (Qurʾān commentators) whose deaths are well
# attested in the classical biographical canon and whose works occupy a
# settled place in the Sunni tafsir tradition. The dataset already covers
# al-Ṭabarī, al-Zamakhsharī, al-Bayḍāwī, al-Qurṭubī, Ibn Kathīr, Fakhr
# al-Dīn al-Rāzī, al-Suyūṭī, Ibn ʿAṭiyya, al-Wāḥidī, al-Baghawī, Najm
# al-Dīn ʿUmar al-Nasafī, al-Maḥallī, al-Shawkānī, Abū Ḥayyān al-Gharnāṭī,
# Ibn ʿĀshūr, al-Marāghī, al-Ṣābūnī, Anwar Shāh al-Kashmīrī, and Sayyid
# Quṭb. This wave fills out the remaining mainstream Sunni line:
#
#   - the early Hanafi tafsir current: Abū al-Layth al-Samarqandī's
#     *Baḥr al-ʿUlūm* (4th c. AH), al-Jaṣṣāṣ's *Aḥkām al-Qurʾān*
#     (legal-exegesis genre, 4th c. AH), and Hāfiẓ al-Dīn al-Nasafī's
#     *Madārik al-Tanzīl* (8th c. AH);
#   - the Khurāsānī-Shāfiʿī line of source-tafsir from which al-Wāḥidī
#     drew: Abū Isḥāq al-Thaʿlabī's *al-Kashf wa-al-Bayān* (5th c. AH);
#   - the Mamlūk-era condensation of al-Baghawī into the broader
#     compilation tradition: ʿAlāʾ al-Dīn al-Khāzin al-Baghdādī's
#     *Lubāb al-Taʾwīl* (8th c. AH);
#   - the Andalusi-Maghrebi Mālikī line: Ibn Juzayy al-Kalbī's
#     *al-Tashīl li-ʿUlūm al-Tanzīl* (8th c. AH) and
#     ʿAbd al-Raḥmān al-Thaʿālibī's *al-Jawāhir al-Ḥisān* (9th c. AH);
#   - the Ottoman court synthesis: Abū al-Suʿūd al-ʿImādī's *Irshād
#     al-ʿAql al-Salīm* (10th c. AH);
#   - the late-Ottoman Hanafi-Sufi synthesis: Maḥmūd al-Ālūsī's
#     *Rūḥ al-Maʿānī* (13th c. AH);
#   - the Najdi salafi tafsir: ʿAbd al-Raḥmān al-Saʿdī's *Taysīr al-
#     Karīm al-Raḥmān* (14th c. AH).
#
# Cross-verification follows the editorial protocol: classical figures
# (through 1000 AH) are sourced from Ibn Khallikān's *Wafayāt al-Aʿyān*
# (where the figure predates 681 AH), al-Dhahabī's *Siyar Aʿlām al-
# Nubalāʾ* and *Tārīkh al-Islām* (through 748 AH), Ibn Kathīr's *al-
# Bidāya wa-l-Nihāya*, Ibn Ḥajar's *al-Durar al-Kāmina* (8th c. AH
# wafayāt), and Ibn al-ʿImād's *Shadharāt al-Dhahab* (through 1000 AH).
# Modern figures (al-Ālūsī, d. 1270 AH; al-Saʿdī, d. 1376 AH) are
# attested via EI2 with editorial cross-reference. Trilingual en/ar/fr
# throughout. No hadith refs (no narration directly anchors a
# tafsīr-author wafayāt). Date precision uses month/day only where the
# classical sources explicitly attest the day; year-precision otherwise.

events:
  # =========================================================================
  # 4th CENTURY AH — early Hanafi tafsir and the legal-exegesis genre
  # =========================================================================

  - slug: death-of-al-jassas
    category: scholar_death
    title_en: Death of al-Jaṣṣāṣ — Hanafi author of *Aḥkām al-Qurʾān*
    title_ar: وفاة الجصّاص — صاحب «أحكام القرآن» من فقهاء الحنفية
    title_fr: Mort d'al-Jaṣṣāṣ — auteur ḥanafīte d'*Aḥkām al-Qurʾān*
    description_en: |
      Abū Bakr Aḥmad ibn ʿAlī al-Rāzī, known as al-Jaṣṣāṣ ("the
      Plasterer"), the leading Hanafi jurist of mid-4th-century AH
      Baghdad and the principal heir to the Iraqi Hanafi school after
      al-Karkhī — died at Baghdad on 7 Dhū al-Ḥijja 370 AH (15 June
      981 CE). His *Aḥkām al-Qurʾān*, a verse-by-verse legal commentary
      organised by sūra and ranging across the entire mushaf, is the
      earliest fully systematic Hanafi work in the *aḥkām al-Qurʾān*
      genre and the principal Hanafi counterpart to al-Ṭabarī's
      narrative-exegetical *Jāmiʿ al-Bayān*; his *Sharḥ Mukhtaṣar
      al-Ṭaḥāwī* and *Sharḥ Mukhtaṣar al-Karkhī* set the standard
      Hanafi commentaries on the early Iraqi *mukhtaṣar* literature.
      The death-date 7 Dhū al-Ḥijja 370 is reported by Ibn Khallikān
      in *Wafayāt al-Aʿyān* and confirmed by al-Dhahabī in *Siyar Aʿlām
      al-Nubalāʾ* and *Tārīkh al-Islām* and by Ibn al-ʿImād in
      *Shadharāt al-Dhahab*; he was buried in Baghdad.
    description_ar: |
      توفي أبو بكر أحمد بن علي الرازي المعروف بالجصّاص — إمام الحنفية
      ببغداد في منتصف القرن الرابع، ووارث رئاسة مذهب أهل العراق بعد
      أبي الحسن الكرخي — ببغداد في السابع من ذي الحجة سنة سبعين
      وثلاث مئة (الموافق ١٥ يونيو ٩٨١م). و«أحكام القرآن» تفسيره
      الفقهي المرتَّب على ترتيب المصحف من أقدم ما وُضع منهجياً في
      جنس «أحكام القرآن» عند الحنفية، وهو نظير «جامع البيان» للطبري
      من جهة الفقه، كما أن «شرح مختصر الطحاوي» و«شرح مختصر الكرخي»
      له صار مرجع الحنفية في شرح المختصرات العراقية. وقد أثبت
      تاريخَ وفاته في السابع من ذي الحجة سنة ٣٧٠ ابنُ خلكان في
      «وفيات الأعيان»، وأكّده الذهبي في «سير أعلام النبلاء»
      و«تاريخ الإسلام»، وابن العماد في «شذرات الذهب»؛ ودُفن ببغداد.
    description_fr: |
      Abū Bakr Aḥmad ibn ʿAlī al-Rāzī, dit al-Jaṣṣāṣ (« le Plâtrier »),
      principal juriste ḥanafīte de Bagdad au milieu du IVᵉ siècle de
      l'Hégire et héritier de la direction de l'école irakienne après
      al-Karkhī, mourut à Bagdad le 7 Dhū al-Ḥijja 370 H (15 juin
      981 EC). Son *Aḥkām al-Qurʾān*, commentaire juridique versets
      par verset organisé selon l'ordre du muṣḥaf et couvrant
      l'ensemble du Coran, est la plus ancienne œuvre ḥanafīte
      pleinement systématique du genre *aḥkām al-Qurʾān* et le
      pendant ḥanafīte du *Jāmiʿ al-Bayān* exégétique-narratif d'al-
      Ṭabarī ; ses *Sharḥ Mukhtaṣar al-Ṭaḥāwī* et *Sharḥ Mukhtaṣar
      al-Karkhī* fixent les commentaires ḥanafītes de référence sur
      la littérature des *mukhtaṣar* irakiens anciens. La date du
      7 Dhū al-Ḥijja 370 est rapportée par Ibn Khallikān dans les
      *Wafayāt al-Aʿyān*, confirmée par al-Dhahabī dans les *Siyar
      Aʿlām al-Nubalāʾ* et le *Tārīkh al-Islām* ainsi que par Ibn
      al-ʿImād dans les *Shadharāt al-Dhahab* ; il fut inhumé à Bagdad.
    canonical_hijri: {year: 370, month: 12, day: 7, precision: day}
    canonical_gregorian: {date: 981-06-15, precision: day, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafayāt al-Aʿyān: died at Baghdad on 7 Dhū al-Ḥijja 370 AH."
      - source_key: dhahabi_siyar
        notes: "Siyar Aʿlām al-Nubalāʾ confirms 370 AH at Baghdad."
      - source_key: dhahabi_tarikh_islam
        notes: "Tārīkh al-Islām corroborates 7 Dhū al-Ḥijja 370 AH."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab places death in 370 AH."
      - source_key: ei2
    people: [[al-jassas, died]]
    tags: [abbasid, scholar, mufassir, hanafi, baghdad, ahkam-al-quran, fiqh]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Jassas"

  - slug: death-of-abu-al-layth-al-samarqandi
    category: scholar_death
    title_en: Death of Abū al-Layth al-Samarqandī — Hanafi mufassir of Transoxiana, author of *Baḥr al-ʿUlūm*
    title_ar: وفاة أبي الليث السمرقندي — مفسّر الحنفية بما وراء النهر، صاحب «بحر العلوم»
    title_fr: Mort d'Abū al-Layth al-Samarqandī — mufassir ḥanafīte de Transoxiane, auteur du *Baḥr al-ʿUlūm*
    description_en: |
      Abū al-Layth Naṣr ibn Muḥammad ibn Aḥmad ibn Ibrāhīm al-Samarqandī,
      called *Imām al-Hudā* ("Imam of Right Guidance") — Hanafi
      mufassir, jurist, and ascetic of Transoxiana, and the leading
      Sunni Hanafi exegete of late-4th-century AH Samarqand — died,
      according to the majority of the classical biographers, in 373
      AH (983 CE); a minority of reports give 375 AH or, less commonly,
      393 AH, and the disagreement is recorded by al-Dhahabī himself.
      We follow 373 as the position adopted by the majority of the
      Hanafi *ṭabaqāt* and by Ibn al-ʿImād in *Shadharāt al-Dhahab*.
      His *Tafsīr al-Samarqandī*, also known as *Baḥr al-ʿUlūm* (Sea
      of Sciences), is one of the earliest complete Hanafi tafsirs to
      survive and was a principal source for later Transoxianan
      exegesis through Hāfiẓ al-Dīn al-Nasafī; his *Tanbīh al-Ghāfilīn*
      and *Bustān al-ʿĀrifīn* circulated for centuries as standard
      Sunni works of moral and ascetic counsel.
    description_ar: |
      توفي أبو الليث نصر بن محمد بن أحمد بن إبراهيم السمرقندي،
      الملقّب بـ«إمام الهدى» — مفسّر الحنفية وفقيهُهم وزاهدُهم بما
      وراء النهر، وكبير مفسّري السنة الحنفية بسمرقند في أواخر
      القرن الرابع — على الراجح من أقوال أصحاب التراجم سنة ثلاث
      وسبعين وثلاث مئة للهجرة (الموافق ٩٨٣م). وذكر بعضهم سنة ٣٧٥،
      وقول شاذ بسنة ٣٩٣، وقد نقل الذهبي الخلاف. ونحن نتبع ٣٧٣
      وعليه جمهور طبقات الحنفية، وابن العماد في «شذرات الذهب».
      وتفسيره المعروف بـ«تفسير السمرقندي» أو «بحر العلوم» من
      أقدم تفاسير الحنفية الكاملة الواصلة إلينا، ومادةٌ رئيسة
      لمن جاء بعده من مفسّري ما وراء النهر إلى حافظ الدين النسفي؛
      وكتاباه «تنبيه الغافلين» و«بستان العارفين» سارت بهما الركبان
      في وعظ السنة وأخلاق التصوف الزُّهدي قروناً.
    description_fr: |
      Abū al-Layth Naṣr ibn Muḥammad ibn Aḥmad ibn Ibrāhīm al-Samar-
      qandī, surnommé *Imām al-Hudā* (« Imām de la juste direction »)
      — mufassir, juriste et ascète ḥanafīte de Transoxiane, premier
      exégète sunnite ḥanafīte de Samarqand à la fin du IVᵉ siècle de
      l'Hégire — mourut, selon la position majoritaire des biographes
      classiques, en 373 H (983 EC) ; une minorité donne 375 H, et
      un report rare 393 H — divergence consignée par al-Dhahabī
      lui-même. Nous retenons 373, position majoritaire dans les
      *ṭabaqāt* ḥanafītes et chez Ibn al-ʿImād dans les *Shadharāt
      al-Dhahab*. Son *Tafsīr al-Samarqandī*, également connu sous le
      nom de *Baḥr al-ʿUlūm* (« La Mer des sciences »), est l'un des
      plus anciens tafsīrs ḥanafītes complets qui nous soient parvenus
      et l'une des sources principales de l'exégèse transoxianienne
      ultérieure jusqu'à Ḥāfiẓ al-Dīn al-Nasafī ; ses *Tanbīh al-
      Ghāfilīn* et *Bustān al-ʿĀrifīn* furent durant des siècles des
      ouvrages sunnites de référence en matière d'exhortation et de
      conseil ascétique.
    canonical_hijri: {year: 373, precision: year}
    canonical_gregorian: {date: 983-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Siyar Aʿlām al-Nubalāʾ records 373 AH and notes the minority report of 375."
      - source_key: dhahabi_tarikh_islam
        notes: "Tārīkh al-Islām also gives 373 AH for Abū al-Layth."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab adopts 373 AH."
      - source_key: ei2
    people: [[abu-al-layth-al-samarqandi, died]]
    tags: [abbasid, samanid, scholar, mufassir, hanafi, samarqand, transoxiana, bahr-al-ulum]
