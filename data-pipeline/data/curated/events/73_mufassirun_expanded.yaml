  - slug: martyrdom-of-ibn-juzayy-al-kalbi
    category: scholar_death
    title_en: Martyrdom of Ibn Juzayy al-Kalbī at the Battle of Tarifa — Mālikī Andalusi mufassir, author of *al-Tashīl li-ʿUlūm al-Tanzīl*
    title_ar: استشهاد ابن جزي الكلبي في معركة طريف — مفسّر المالكية الأندلسي صاحب «التسهيل لعلوم التنزيل»
    title_fr: Martyre d'Ibn Juzayy al-Kalbī à la bataille de Tarifa — mufassir mālikīte andalou, auteur d'*al-Tashīl li-ʿUlūm al-Tanzīl*
    description_en: |
      Abū al-Qāsim Muḥammad ibn Aḥmad ibn Muḥammad ibn ʿAbd Allāh ibn
      Yaḥyā ibn Juzayy al-Kalbī al-Gharnāṭī — Mālikī Sunni jurist,
      mufassir, and *qāriʾ* of Granada under the Naṣrid dynasty —
      was killed in battle at the defeat of the combined Naṣrid-
      Marīnid army by Castile and Portugal at Tarifa (the Battle of
      Río Salado) on 7 Jumādā I 741 AH (30 October 1340 CE), in his
      late forties. His *al-Tashīl li-ʿUlūm al-Tanzīl* is a concise
      Mālikī-Ashʿarī tafsir prized for its clarity and used as a
      teaching text from the late Naṣrid period through Maghrebi and
      sub-Saharan African Mālikī milieus into the modern period; his
      *al-Qawānīn al-Fiqhiyya fī Talkhīṣ Madhhab al-Mālikiyya* is one
      of the standard short Mālikī fiqh manuals. The death-date of
      7 Jumādā I 741 AH at Tarifa is given by Lisān al-Dīn Ibn al-
      Khaṭīb in *al-Iḥāṭa fī Akhbār Gharnāṭa* and by Ibn Ḥajar in
      *al-Durar al-Kāmina*; he is a *distinct figure* from his son
      Abū ʿAbd Allāh Muḥammad ibn Juzayy (d. 757 AH), the redactor
      of Ibn Baṭṭūṭa's *Riḥla*, with whom he is sometimes confused.
    description_ar: |
      استُشهد أبو القاسم محمد بن أحمد بن محمد بن عبد الله بن يحيى
      ابن جزي الكلبي الغرناطي — مالكي سني، فقيه ومفسّر ومقرئ غرناطة
      في عصر بني نصر — في موقعة طريف (معركة وادي السلادو) لمّا
      انهزم جيش بني نصر وبني مرين أمام قشتالة والبرتغال، يوم السابع
      من جمادى الأولى سنة إحدى وأربعين وسبع مئة للهجرة (الموافق ٣٠
      أكتوبر ١٣٤٠م)، عن نحو سبع وأربعين سنة. و«التسهيل لعلوم التنزيل»
      تفسير مالكي أشعري متوسط، اشتُهر بسهولة عبارته، فاتُّخذ مدرسةً
      من أواخر عهد بني نصر إلى المالكية في المغرب وأفريقيا جنوب
      الصحراء إلى عصرنا؛ و«القوانين الفقهية في تلخيص مذهب المالكية»
      من أمهات مختصرات الفقه المالكي. وأثبت تاريخ الوفاة في طريف
      يوم السابع من جمادى الأولى ٧٤١ لسانُ الدين بن الخطيب في
      «الإحاطة في أخبار غرناطة»، وابنُ حجر في «الدرر الكامنة». وهو
      مغايرٌ لابنه أبي عبد الله محمد بن جزي (ت ٧٥٧ هـ) محرّر «رحلة
      ابن بطوطة»، وكثيراً ما يقع الالتباس بينهما.
    description_fr: |
      Abū al-Qāsim Muḥammad ibn Aḥmad ibn Muḥammad ibn ʿAbd Allāh
      ibn Yaḥyā ibn Juzayy al-Kalbī al-Gharnāṭī — sunnite mālikīte,
      juriste, mufassir et *qāriʾ* de Grenade sous la dynastie
      naṣride — fut tué au combat lors de la défaite de l'armée
      naṣride-marīnide face à la Castille et au Portugal à Tarifa
      (bataille du Río Salado) le 7 Jumādā I 741 H (30 octobre
      1340 EC), à près de quarante-sept ans. Son *al-Tashīl li-
      ʿUlūm al-Tanzīl* est un tafsīr mālikīte-ashʿarīte concis
      prisé pour la clarté de son expression, utilisé comme manuel
      scolaire depuis la fin de l'époque naṣride dans les milieux
      mālikītes du Maghreb et de l'Afrique subsaharienne jusqu'à
      la période contemporaine ; ses *Qawānīn al-Fiqhiyya fī Talkhīṣ
      Madhhab al-Mālikiyya* comptent parmi les manuels de fiqh
      mālikīte abrégés de référence. La date du 7 Jumādā I 741 H
      à Tarifa est donnée par Lisān al-Dīn Ibn al-Khaṭīb dans
      *al-Iḥāṭa fī Akhbār Gharnāṭa* et par Ibn Ḥajar dans *al-Durar
      al-Kāmina* ; il s'agit *d'une figure distincte* de son fils
      Abū ʿAbd Allāh Muḥammad ibn Juzayy (m. 757 H), réviseur de
      la *Riḥla* d'Ibn Baṭṭūṭa, avec lequel il est parfois confondu.
    canonical_hijri: {year: 741, month: 5, day: 7, precision: day}
    canonical_gregorian: {date: 1340-10-30, precision: day, method: attested}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "al-Durar al-Kāmina: killed at the Battle of Tarifa on 7 Jumādā I 741 AH."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab places death at Tarifa in 741 AH."
      - source_key: ei2
    people: [[ibn-juzayy-al-kalbi, died]]
    tags: [nasrid, marinid, scholar, mufassir, maliki, granada, andalusia, reconquista, tarifa, rio-salado, martyrdom]
    importance: notable
    verified: true
    verification_status: cross_verified
