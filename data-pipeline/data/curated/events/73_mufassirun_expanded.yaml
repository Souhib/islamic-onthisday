  # =========================================================================
  # 14th CENTURY AH — modern Najdi salafi tafsir
  # =========================================================================

  - slug: death-of-abd-al-rahman-al-saadi
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān al-Saʿdī — Najdi Hanbali mufassir of ʿUnayza, author of *Taysīr al-Karīm al-Raḥmān*
    title_ar: وفاة عبد الرحمن السعدي — مفسّر عنيزة الحنبلي النجدي، صاحب «تيسير الكريم الرحمن»
    title_fr: Mort de ʿAbd al-Raḥmān al-Saʿdī — mufassir ḥanbalīte najdī d'ʿUnayza, auteur du *Taysīr al-Karīm al-Raḥmān*
    description_en: |
      Abū ʿAbd Allāh ʿAbd al-Raḥmān ibn Nāṣir ibn ʿAbd Allāh al-Saʿdī
      al-Tamīmī — Najdi Hanbali Sunni mufassir, jurist, and head of
      the religious establishment of ʿUnayza in al-Qaṣīm — died at
      ʿUnayza on 23 Jumādā II 1376 AH (24 January 1957 CE). His
      *Taysīr al-Karīm al-Raḥmān fī Tafsīr Kalām al-Mannān*, often
      called *Tafsīr al-Saʿdī* — a single-volume Hanbali-salafi
      tafsir written in plain Arabic and aimed at the educated
      non-specialist — became the most widely circulated modern
      Sunni tafsir in the Arabian Peninsula and beyond, used as a
      standard teaching text in Salafi educational milieus in the
      late 20th and early 21st centuries; his *Manhaj al-Sālikīn*
      (fiqh), *al-Qawāʿid al-Ḥisān fī Tafsīr al-Qurʾān*, and *Tawḍīḥ
      al-Kāfiya al-Shāfiya* (verse commentary on Ibn Qayyim's
      *Nūniyya*) entered the Hanbali curriculum across the same
      region. He was the principal teacher of Muḥammad ibn Ṣāliḥ
      al-ʿUthaymīn and ʿAbd Allāh ibn ʿAbd al-Raḥmān al-Bassām, two
      of the leading 20th-century Hanbali jurists. The day-precise
      date is recorded in the standard biographies and in the
      introductions to printed editions of *Tafsīr al-Saʿdī*.
    description_ar: |
      توفي أبو عبد الله عبد الرحمن بن ناصر بن عبد الله السعدي
      التميمي — حنبلي سني نجدي، مفسّر، فقيه، ورأس العلم بعنيزة في
      منطقة القصيم — بعنيزة في الثالث والعشرين من جمادى الآخرة سنة
      ست وسبعين وثلاث مئة وألف للهجرة (الموافق ٢٤ يناير ١٩٥٧م).
      و«تيسير الكريم الرحمن في تفسير كلام المنّان» المعروف بـ«تفسير
      السعدي» — تفسير حنبلي سلفي في مجلَّد، صاغه بعربية ميسّرة
      موجَّهة إلى المثقّف غير المتخصِّص — صار أوسع التفاسير السنية
      الحديثة انتشاراً في الجزيرة العربية وما حولها، واتُّخذ كتاباً
      مدرسياً معتمداً في الأوساط التعليمية السلفية في أواخر القرن
      العشرين ومطلع الحادي والعشرين؛ و«منهاج السالكين» في الفقه،
      و«القواعد الحسان في تفسير القرآن»، و«توضيح الكافية الشافية»
      شرحُه على «النونية» لابن القيم — كل ذلك صار في برامج التعليم
      الحنبلي بالإقليم نفسه. وكان أبرز شيوخ محمد بن صالح العثيمين
      وعبد الله بن عبد الرحمن البسّام، من كبار فقهاء الحنابلة في
      القرن العشرين. وأثبت يومَ وفاته على وجه التحديد كتبُ
      التراجم المعتمدة ومقدّمات طبعات «تفسير السعدي».
    description_fr: |
      Abū ʿAbd Allāh ʿAbd al-Raḥmān ibn Nāṣir ibn ʿAbd Allāh al-
      Saʿdī al-Tamīmī — sunnite ḥanbalīte najdī, mufassir, juriste
      et chef de l'établissement religieux de la ville d'ʿUnayza
      au Qaṣīm — mourut à ʿUnayza le 23 Jumādā II 1376 H (24 janvier
      1957 EC). Son *Taysīr al-Karīm al-Raḥmān fī Tafsīr Kalām al-
      Mannān*, souvent appelé *Tafsīr al-Saʿdī* — tafsīr ḥanbalīte-
      salafī en un seul volume, rédigé dans un arabe accessible
      destiné à un lectorat cultivé non spécialiste — est devenu le
      tafsīr sunnite moderne le plus largement diffusé dans la
      péninsule Arabique et au-delà, utilisé comme texte d'enseig-
      nement de référence dans les milieux éducatifs salafistes de
      la fin du XXᵉ et du début du XXIᵉ siècle ; son *Manhaj al-
      Sālikīn* (fiqh), ses *Qawāʿid al-Ḥisān fī Tafsīr al-Qurʾān*
      et son *Tawḍīḥ al-Kāfiya al-Shāfiya* (commentaire de la
      *Nūniyya* d'Ibn Qayyim) sont entrés dans le cursus ḥanbalīte
      de la même région. Il fut le principal maître de Muḥammad
      ibn Ṣāliḥ al-ʿUthaymīn et de ʿAbd Allāh ibn ʿAbd al-Raḥmān
      al-Bassām, deux des plus grands juristes ḥanbalītes du XXᵉ
      siècle. La date précise au jour près est consignée par les
      biographies de référence et les introductions des éditions
      imprimées du *Tafsīr al-Saʿdī*.
    canonical_hijri: {year: 1376, month: 6, day: 23, precision: day}
    canonical_gregorian: {date: 1957-01-24, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 / EI3 entry on al-Saʿdī: died 23 Jumādā II 1376 / 24 January 1957 at ʿUnayza."
      - source_key: editorial
        notes: "Confirmed by biographical introductions in standard editions of *Tafsīr al-Saʿdī* (Mu'assasat al-Risāla, Dār Ibn al-Jawzī) and by Ibn al-ʿUthaymīn's biographical notice of his teacher."
