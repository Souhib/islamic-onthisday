  - slug: death-of-al-khazin-al-baghdadi
    category: scholar_death
    title_en: Death of al-Khāzin al-Baghdādī — Mamlūk-era mufassir, author of *Lubāb al-Taʾwīl*
    title_ar: وفاة الخازن البغدادي — مفسّر المماليك، صاحب «لباب التأويل»
    title_fr: Mort d'al-Khāzin al-Baghdādī — mufassir mamlūk, auteur du *Lubāb al-Taʾwīl*
    description_en: |
      ʿAlāʾ al-Dīn ʿAlī ibn Muḥammad ibn Ibrāhīm al-Baghdādī al-Shīḥī,
      known as al-Khāzin ("the Librarian", from his service as
      *khāzin al-kutub* — keeper of the books — at the Sumaysāṭiyya
      khānqāh in Damascus) — Shāfiʿī Sunni mufassir, hadith
      transmitter, and historian of the Mamlūk Levant — died at
      Aleppo in 741 AH (1340-41 CE). His *Lubāb al-Taʾwīl fī Maʿānī
      al-Tanzīl* is a popular abridgement and reordering of al-
      Baghawī's *Maʿālim al-Tanzīl* with supplementary material from
      al-Thaʿlabī, and circulated for centuries as a school-text-
      length Sunni tafsir across the Mamlūk and Ottoman lands; his
      *Maqbūl al-Manqūl min ʿIlmay al-Jadal wa-l-Uṣūl* and his
      condensation of al-Bayhaqī's *Dalāʾil al-Nubuwwa* are also
      attested. Ibn Ḥajar in *al-Durar al-Kāmina* fixes the death
      year at 741 AH at Aleppo, with a minority report of 725 AH
      noted; Ibn al-ʿImād in *Shadharāt al-Dhahab* records the same.
      We follow 741 with the majority of the Sunni biographers and
      flag the disagreement.
    description_ar: |
      توفي علاء الدين علي بن محمد بن إبراهيم البغدادي الشيحي
      المعروف بالخازن (لقيامه بخزانة كتب الخانقاه السميساطية بدمشق) —
      شافعي سني، مفسّر، محدّث، ومؤرّخ من رجال المماليك في الشام —
      بحلب سنة إحدى وأربعين وسبع مئة للهجرة (الموافق ١٣٤٠–١٣٤١م).
      و«لباب التأويل في معاني التنزيل» اختصارٌ شعبي ل«معالم التنزيل»
      للبغوي مع زيادات من الثعلبي، سار في بلاد المماليك والعثمانيين
      قروناً تفسيراً متوسطاً للتدريس؛ وله «المقبول المنقول من علمَي
      الجدل والأصول»، واختصارُ «دلائل النبوّة» للبيهقي. وقد ضبط
      وفاتَه ابنُ حجر في «الدرر الكامنة» سنة ٧٤١ بحلب وأشار إلى
      قول مَن ذكرها سنة ٧٢٥، وعليه ابن العماد في «شذرات الذهب».
      ونحن نتبع ٧٤١ بوصفه قول الجمهور وننبّه على الخلاف.
    description_fr: |
      ʿAlāʾ al-Dīn ʿAlī ibn Muḥammad ibn Ibrāhīm al-Baghdādī al-
      Shīḥī, dit al-Khāzin (« le Bibliothécaire », pour son service
      de *khāzin al-kutub* — garde des livres — à la khānqāh
      sumaysāṭīte de Damas) — sunnite shāfiʿīte, mufassir,
      transmetteur de hadiths et historien du Levant mamlūk — mourut
      à Alep en 741 H (1340-1341 EC). Son *Lubāb al-Taʾwīl fī Maʿānī
      al-Tanzīl* est un abrégé populaire des *Maʿālim al-Tanzīl*
      d'al-Baghawī, réorganisé et augmenté de matériel emprunté à
      al-Thaʿlabī, qui circula pendant des siècles dans le monde
      mamlūk et ottoman comme tafsīr sunnite de format scolaire ;
      on lui attribue également le *Maqbūl al-Manqūl min ʿIlmay
      al-Jadal wa-l-Uṣūl* et un abrégé des *Dalāʾil al-Nubuwwa* d'al-
      Bayhaqī. Ibn Ḥajar dans *al-Durar al-Kāmina* fixe la mort en
      741 H à Alep, en signalant le report minoritaire de 725 H ;
      Ibn al-ʿImād confirme dans les *Shadharāt al-Dhahab*. Nous
      retenons 741 H comme position majoritaire et signalons la
      divergence.
    canonical_hijri: {year: 741, precision: year}
    canonical_gregorian: {date: 1340-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "al-Durar al-Kāmina: died 741 AH at Aleppo; minority report of 725 AH noted."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab confirms 741 AH."
      - source_key: ei2
    people: [[al-khazin-al-baghdadi, died]]
