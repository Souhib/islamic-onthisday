  # =========================================================================
  # 8th CENTURY AH — Mamlūk-era and Andalusi-Maghrebi tafsir compilation
  # =========================================================================

  - slug: death-of-hafiz-al-din-al-nasafi
    category: scholar_death
    title_en: Death of Hāfiẓ al-Dīn al-Nasafī — Hanafi-Māturīdī author of *Madārik al-Tanzīl*
    title_ar: وفاة حافظ الدين النسفي — صاحب «مدارك التنزيل» من حنفية ماتريدية
    title_fr: Mort de Ḥāfiẓ al-Dīn al-Nasafī — auteur ḥanafīte-māturīdīte des *Madārik al-Tanzīl*
    description_en: |
      Ḥāfiẓ al-Dīn Abū al-Barakāt ʿAbd Allāh ibn Aḥmad ibn Maḥmūd
      al-Nasafī — Hanafi jurist and Māturīdī theologian of Transoxiana
      and ʿIrāq al-ʿAjam, principal late-medieval consolidator of the
      Hanafi-Māturīdī synthesis — died at Idhaj in Khūzistān while
      returning from a journey, in 710 AH (1310 CE). He is a *distinct
      figure* from Najm al-Dīn ʿUmar al-Nasafī (d. 537 AH, author of
      the famous Māturīdī creed *al-ʿAqāʾid al-Nasafiyya*) who shares
      the nisba; the two are routinely confused. Ḥāfiẓ al-Dīn's
      *Madārik al-Tanzīl wa-Ḥaqāʾiq al-Taʾwīl* — a medium-length
      Hanafi-Māturīdī tafsir distilling the language of al-Zamakh-
      sharī's *Kashshāf* with its Muʿtazilī content corrected to
      Sunni-Māturīdī standards — became one of the standard tafsirs
      of the Hanafi-Ottoman world, alongside al-Bayḍāwī and Abū al-
      Suʿūd; his *Kanz al-Daqāʾiq* (fiqh), *al-Manār* with auto-
      commentary *Kashf al-Asrār* (uṣūl), and *al-Wāfī*/*al-Kāfī*
      (fiqh) form the central late-Hanafi school texts. Ibn Ḥajar
      records the death in *al-Durar al-Kāmina*, Ibn al-ʿImād in
      *Shadharāt al-Dhahab*.
    description_ar: |
      توفي حافظ الدين أبو البركات عبد الله بن أحمد بن محمود النسفي —
      حنفي ماتريدي السنة، فقيه ما وراء النهر وعراق العجم، وعمدة
      المتأخرين في تنسيق التركيب الحنفي الماتريدي — بإذج من خوزستان
      منصرفه من سفر، سنة عشر وسبع مئة للهجرة (الموافق ١٣١٠م). وهو
      شخص مغاير لنجم الدين عمر النسفي (ت ٥٣٧ هـ) صاحب «العقائد
      النسفية» الماتريدية المشهورة، وهما يَلتبسان كثيراً. وتفسيره
      «مدارك التنزيل وحقائق التأويل» — تفسير حنفي ماتريدي متوسط جمع
      صياغة «الكشاف» الزمخشرية وأخرج عنها الاعتزال إلى مذهب أهل
      السنة الماتريدية — صار من تفاسير العالم الحنفي العثماني
      المعتمدة بجوار البيضاوي وأبي السعود؛ و«كنز الدقائق» في الفقه،
      و«المنار» وشرحه ذاته «كشف الأسرار» في الأصول، و«الوافي»
      و«الكافي» في الفقه من أمهات نصوص الحنفية المتأخرة. وقد ضبط
      وفاتَه ابنُ حجر في «الدرر الكامنة» وابن العماد في «شذرات
      الذهب».
    description_fr: |
      Ḥāfiẓ al-Dīn Abū al-Barakāt ʿAbd Allāh ibn Aḥmad ibn Maḥmūd
      al-Nasafī — juriste ḥanafīte et théologien māturīdīte de
      Transoxiane et d'ʿIrāq al-ʿAjam, principal consolidateur tardo-
      médiéval de la synthèse ḥanafīte-māturīdīte — mourut à Idhaj
      au Khūzistān, en revenant d'un voyage, en 710 H (1310 EC). Il
      constitue *une figure distincte* de Najm al-Dīn ʿUmar al-Nasafī
      (m. 537 H), auteur du célèbre credo māturīdīte *al-ʿAqāʾid al-
      Nasafiyya*, dont il partage la *nisba* — les deux sont souvent
      confondus. Ses *Madārik al-Tanzīl wa-Ḥaqāʾiq al-Taʾwīl* —
      tafsīr ḥanafī-māturīdī de longueur moyenne reprenant la langue
      du *Kashshāf* d'al-Zamakhsharī tout en en expurgeant le contenu
      muʿtazilīte au profit du sunnisme māturīdīte — devinrent l'un
      des tafsīrs canoniques du monde ḥanafī-ottoman aux côtés
      d'al-Bayḍāwī et d'Abū al-Suʿūd ; ses *Kanz al-Daqāʾiq* (fiqh),
      *al-Manār* avec son auto-commentaire *Kashf al-Asrār* (uṣūl) et
      *al-Wāfī* / *al-Kāfī* (fiqh) figurent parmi les textes
      centraux de l'école ḥanafīte tardive. Ibn Ḥajar consigne sa
      mort dans *al-Durar al-Kāmina*, Ibn al-ʿImād dans les
      *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 710, precision: year}
