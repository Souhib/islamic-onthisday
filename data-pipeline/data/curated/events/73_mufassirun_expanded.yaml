  - slug: death-of-al-thaalibi-al-maliki
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān al-Thaʿālibī — Mālikī Sunni mufassir of Algiers, author of *al-Jawāhir al-Ḥisān*
    title_ar: وفاة عبد الرحمن الثعالبي — مفسّر مالكية الجزائر، صاحب «الجواهر الحسان»
    title_fr: Mort de ʿAbd al-Raḥmān al-Thaʿālibī — mufassir mālikīte sunnite d'Alger, auteur d'*al-Jawāhir al-Ḥisān*
    description_en: |
      Abū Zayd ʿAbd al-Raḥmān ibn Muḥammad ibn Makhlūf al-Thaʿālibī
      al-Jazāʾirī — Mālikī Sunni mufassir, jurist, and Sufi-leaning
      preacher of central Maghreb, principal late-medieval consolidator
      of the Algerian Mālikī school under the late Ḥafṣid-Zayyānid
      polity — died at Algiers in 875 AH (1471 CE) at an advanced age.
      His *al-Jawāhir al-Ḥisān fī Tafsīr al-Qurʾān*, often called
      *Tafsīr al-Thaʿālibī*, is the most-circulated Mālikī tafsir of
      the Maghrebi tradition, drawing principally on Ibn ʿAṭiyya's
      *al-Muḥarrar al-Wajīz* with substantial Mālikī-juridical and
      Sunni-Ash'arī supplementation; his *al-ʿUlūm al-Fākhira fī al-
      Naẓar fī Umūr al-Ākhira* and *al-Ānīs* compilations belong to
      the same Sunni-Sufi devotional and eschatological tradition. He
      is *not to be confused with* the litterateur Abū Manṣūr
      al-Thaʿālibī of Nīsābūr (d. 429 AH, *Yatīmat al-Dahr*) — same
      *nisba*, different schools, different centuries. His tomb in
      the Casbah of Algiers (Sīdī ʿAbd al-Raḥmān) became one of the
      principal Mālikī shrines of the Maghreb. Ibn al-ʿImād in
      *Shadharāt al-Dhahab* records the death in 875 AH.
    description_ar: |
      توفي أبو زيد عبد الرحمن بن محمد بن مخلوف الثعالبي الجزائري —
      مالكي سني، مفسّر، فقيه، وواعظ ذو نزعة صوفية في المغرب الأوسط،
      وعمدةُ المتأخرين في تجميع المدرسة المالكية الجزائرية في أواخر
      عصر الحفصيين والزيانيين — بمدينة الجزائر سنة خمس وسبعين
      وثمان مئة للهجرة (الموافق ١٤٧١م) عن سنّ عالية. و«الجواهر الحسان
      في تفسير القرآن» المعروف بـ«تفسير الثعالبي» أكثر تفسير مالكي
      انتشاراً في تراث المغرب، اعتمد فيه أساساً على «المحرّر الوجيز»
      لابن عطية مع زيادات فقهية مالكية وكلامية سنية أشعرية معتبرة؛
      وله «العلوم الفاخرة في النظر في أمور الآخرة» و«الأنيس» على
      نفس النفَس السني الصوفي في أبواب الزهد والآخرة. وهو غير
      الأديب أبي منصور الثعالبي النيسابوري (ت ٤٢٩ هـ) صاحب «يتيمة
      الدهر» — جمعتهما النسبة وفرّقتهما المدرسة والقرن. وضريحه في
      قصبة الجزائر (سيدي عبد الرحمن) من كبرى المزارات المالكية في
      المغرب. وقد أثبت وفاتَه ابنُ العماد في «شذرات الذهب» سنة ٨٧٥ هـ.
    description_fr: |
      Abū Zayd ʿAbd al-Raḥmān ibn Muḥammad ibn Makhlūf al-Thaʿālibī
      al-Jazāʾirī — sunnite mālikīte, mufassir, juriste et prédicateur
      d'inclination soufie du Maghreb central, principal consolidateur
      tardo-médiéval de l'école mālikīte algéroise sous les
      souverainetés finissantes ḥafṣide et zayyānide — mourut à
      Alger en 875 H (1471 EC) à un âge avancé. Son *al-Jawāhir al-
      Ḥisān fī Tafsīr al-Qurʾān*, souvent appelé *Tafsīr al-Thaʿālibī*,
      est le tafsīr mālikīte le plus diffusé de la tradition
      maghrébine, s'appuyant principalement sur le *Muḥarrar al-
      Wajīz* d'Ibn ʿAṭiyya et y ajoutant un appareil juridique
      mālikīte et théologique ashʿarīte substantiel ; ses *ʿUlūm al-
      Fākhira fī al-Naẓar fī Umūr al-Ākhira* et son *Ānīs* relèvent de
      la même tradition sunnite-soufie de dévotion et d'eschatologie.
      Il *ne doit pas être confondu* avec le littérateur Abū Manṣūr
      al-Thaʿālibī de Nīsābūr (m. 429 H, *Yatīmat al-Dahr*) — même
      *nisba*, écoles et siècles différents. Son mausolée dans la
      Casbah d'Alger (Sīdī ʿAbd al-Raḥmān) est l'un des principaux
      sanctuaires mālikītes du Maghreb. Ibn al-ʿImād consigne la
      mort en 875 H dans les *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 875, precision: year}
    canonical_gregorian: {date: 1471-01-01, precision: year, method: tabular_conversion}
