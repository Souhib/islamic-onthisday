  - slug: death-of-abu-al-suud-al-imadi
    category: scholar_death
    title_en: Death of Abū al-Suʿūd al-ʿImādī — Ottoman Shaykh al-Islām, author of *Irshād al-ʿAql al-Salīm*
    title_ar: وفاة أبي السعود العمادي — شيخ الإسلام العثماني، صاحب «إرشاد العقل السليم»
    title_fr: Mort d'Abū al-Suʿūd al-ʿImādī — Shaykh al-Islām ottoman, auteur d'*Irshād al-ʿAql al-Salīm*
    description_en: |
      Abū al-Suʿūd Muḥammad ibn Muḥammad ibn Muṣṭafā al-ʿImādī —
      Hanafi-Māturīdī Sunni jurist and mufassir, *Shaykh al-Islām* of
      the Ottoman empire under sultans Süleymān I (r. 926–974 AH) and
      Selīm II — died at Istanbul on 5 Jumādā I 982 AH (23 August
      1574 CE), eight days after Süleymān's son Selīm. His *Irshād
      al-ʿAql al-Salīm ilā Mazāyā al-Kitāb al-Karīm*, dedicated to
      Süleymān, is the central Ottoman tafsir, modelled on al-Bayḍāwī
      and al-Zamakhsharī's *Kashshāf* (with its Muʿtazilī content
      reformulated in Sunni-Māturīdī terms) and synthesising rhetorical,
      grammatical, and theological commentary in a polished court-
      Arabic register; it became, alongside al-Bayḍāwī's *Anwār al-
      Tanzīl*, the standard tafsir of the Ottoman madrasa system. As
      Shaykh al-Islām he issued the legal opinions framing the imperial
      *qānūn* of Süleymān and, in the Hanafi-Māturīdī polemic against
      doctrinal innovations, set the terms of late-Ottoman religious
      policy. The death-date 5 Jumādā I 982 AH at Istanbul is recorded
      by Ibn al-ʿImād in *Shadharāt al-Dhahab* and by Ṭāshkubrīzāda's
      continuator and is universally adopted in the Ottoman
      biographical tradition.
    description_ar: |
      توفي أبو السعود محمد بن محمد بن مصطفى العِمادي — حنفي ماتريدي
      السنة، فقيه ومفسّر، شيخ الإسلام في الدولة العثمانية في عهد
      السلطان سليمان الأول (٩٢٦–٩٧٤ هـ) ومن بعده سليم الثاني — في
      الآستانة يوم الخامس من جمادى الأولى سنة اثنتين وثمانين وتسع
      مئة للهجرة (الموافق ٢٣ أغسطس ١٥٧٤م)، بعد وفاة السلطان سليم
      ابن سليمان بثمانية أيام. وتفسيره «إرشاد العقل السليم إلى مزايا
      الكتاب الكريم» المُهدى إلى السلطان سليمان عمدةُ التفاسير
      العثمانية، نُسج على منوال «أنوار التنزيل» للبيضاوي و«الكشاف»
      للزمخشري — مع تحرير ما فيه من اعتزال إلى مذهب أهل السنة
      الماتريدية — جمع فيه الفنّ البلاغي واللغوي والكلامي بأسلوب
      عربي رفيع، وصار مع «أنوار التنزيل» تفسير المدرسة العثمانية
      الرسمي. ومن مقام شيخ الإسلام أفتى بالقوانين العثمانية في
      عصر سليمان وصاغ الكلام السني الرسمي في مسائل البدع. وأثبت
      وفاتَه في الخامس من جمادى الأولى ٩٨٢ بالآستانة ابنُ العماد
      في «شذرات الذهب» وذيل طاش كبري زاده، وعليه التقليد العثماني.
    description_fr: |
      Abū al-Suʿūd Muḥammad ibn Muḥammad ibn Muṣṭafā al-ʿImādī —
      sunnite ḥanafīte-māturīdīte, juriste et mufassir, *Shaykh
      al-Islām* de l'Empire ottoman sous les sultans Soliman Iᵉʳ
      (r. 926-974 H) et Selīm II — mourut à Istanbul le 5 Jumādā I
      982 H (23 août 1574 EC), huit jours après le fils de Soliman,
      Selīm. Son *Irshād al-ʿAql al-Salīm ilā Mazāyā al-Kitāb al-
      Karīm*, dédié à Soliman, est le tafsīr central de l'époque
      ottomane, calqué sur le *Anwār al-Tanzīl* d'al-Bayḍāwī et le
      *Kashshāf* d'al-Zamakhsharī (le contenu muʿtazilīte de ce
      dernier étant reformulé en termes sunnites-māturīdītes), et
      synthétisant le commentaire rhétorique, grammatical et
      théologique dans un arabe de cour soigné ; il devint, aux
      côtés du *Anwār al-Tanzīl*, le tafsīr de référence du système
      madrasal ottoman. En qualité de *Shaykh al-Islām*, il émit
      les *fatāwā* qui encadrèrent le *qānūn* impérial soliman et
      fixa les termes de la politique religieuse ottomane tardive.
      La date du 5 Jumādā I 982 H à Istanbul est consignée par Ibn
      al-ʿImād dans les *Shadharāt al-Dhahab* et par les continuateurs
      de Ṭāshkubrīzāda, et universellement adoptée dans la
      tradition biographique ottomane.
    canonical_hijri: {year: 982, month: 5, day: 5, precision: day}
    canonical_gregorian: {date: 1574-08-23, precision: day, method: attested}
    claims:
      - source_key: ibn_imad_shadharat
        is_canonical: true
        notes: "Shadharāt al-Dhahab: died 5 Jumādā I 982 AH at Istanbul."
      - source_key: ei2
        notes: "EI2 art. 'Abu'l-Suʿūd' confirms 5 Jumādā I 982 AH / 23 August 1574."
      - source_key: editorial
        notes: "Ottoman biographical tradition (Ṭāshkubrīzāda's continuators, ʿAṭāʾī's Shaqāʾiq al-Nuʿmāniyya supplement) corroborate the day-precise date."
    people: [[abu-al-suud-al-imadi, died], [suleyman-the-magnificent, subject]]
    tags: [ottoman, scholar, mufassir, hanafi, maturidi, istanbul, shaykh-al-islam, irshad-al-aql-al-salim]
    importance: notable
