  # =========================================================================
  # 5th CENTURY AH — the Khurāsānī source-tafsir tradition
  # =========================================================================

  - slug: death-of-abu-ishaq-al-thalabi
    category: scholar_death
    title_en: Death of Abū Isḥāq al-Thaʿlabī — Khurāsānī mufassir, author of *al-Kashf wa-al-Bayān*
    title_ar: وفاة أبي إسحاق الثعلبي — مفسّر خراسان، صاحب «الكشف والبيان»
    title_fr: Mort d'Abū Isḥāq al-Thaʿlabī — mufassir khurāsānien, auteur d'*al-Kashf wa-al-Bayān*
    description_en: |
      Abū Isḥāq Aḥmad ibn Muḥammad ibn Ibrāhīm al-Thaʿlabī al-Naysābūrī
      — Shāfiʿī Sunni mufassir of Nīsābūr, central figure in the
      Khurāsānī source-tafsir tradition that absorbed the Iraqi
      narrative material of al-Ṭabarī and synthesised it with
      grammatical, lexical, and *qirāʾāt* commentary — died at Nīsābūr
      in Muḥarram 427 AH (November 1035 CE). His *al-Kashf wa-al-Bayān
      ʿan Tafsīr al-Qurʾān* is the most cited single source in
      al-Wāḥidī's *al-Basīṭ* and *al-Wasīṭ*, and one of the principal
      sources for al-Baghawī's *Maʿālim al-Tanzīl*; his *ʿArāʾis al-
      Majālis fī Qiṣaṣ al-Anbiyāʾ* became the standard medieval
      *qiṣaṣ al-anbiyāʾ* compendium across the Sunni heartlands. Al-
      Dhahabī in *Siyar Aʿlām al-Nubalāʾ* and *Tārīkh al-Islām* fixes
      the death in Muḥarram 427 AH, and Ibn al-ʿImād in *Shadharāt
      al-Dhahab* gives the same year.
    description_ar: |
      توفي أبو إسحاق أحمد بن محمد بن إبراهيم الثعلبي النيسابوري —
      شافعي سني، مفسّر نيسابور، ومن أعمدة مدرسة المصادر التفسيرية
      الخراسانية التي استوعبت مادة الطبري الإخبارية وجمعت إليها
      علوم النحو واللغة والقراءات — بنيسابور في محرّم سنة سبع وعشرين
      وأربع مئة للهجرة (الموافق نوفمبر ١٠٣٥م). و«الكشف والبيان عن
      تفسير القرآن» أكثر مصدر مفرد نقل عنه الواحدي في «البسيط»
      و«الوسيط»، ومن أهم مصادر «معالم التنزيل» للبغوي؛ و«عرائس
      المجالس في قصص الأنبياء» له صار مرجع السنة في فنّ قصص الأنبياء
      في القرون الوسطى من المشرق إلى المغرب. وقد أثبت الذهبي وفاتَه
      في محرم ٤٢٧ في «سير أعلام النبلاء» و«تاريخ الإسلام»، وعليه
      ابن العماد في «شذرات الذهب».
    description_fr: |
      Abū Isḥāq Aḥmad ibn Muḥammad ibn Ibrāhīm al-Thaʿlabī al-
      Naysābūrī — sunnite shāfiʿīte, mufassir de Nīsābūr et figure
      centrale de la tradition khurāsānīe du tafsīr-source qui absorba
      le matériel narratif irakien d'al-Ṭabarī et le synthétisa avec
      le commentaire grammatical, lexical et celui des *qirāʾāt* —
      mourut à Nīsābūr en Muḥarram 427 H (novembre 1035 EC). Son
      *al-Kashf wa-al-Bayān ʿan Tafsīr al-Qurʾān* est la source unique
      la plus citée du *Basīṭ* et du *Wasīṭ* d'al-Wāḥidī ainsi qu'une
      des sources principales du *Maʿālim al-Tanzīl* d'al-Baghawī ;
      ses *ʿArāʾis al-Majālis fī Qiṣaṣ al-Anbiyāʾ* devinrent le
      compendium médiéval de référence pour les *qiṣaṣ al-anbiyāʾ*
      dans l'ensemble du dār al-Islām sunnite. Al-Dhahabī, dans les
      *Siyar Aʿlām al-Nubalāʾ* et le *Tārīkh al-Islām*, fixe la mort
      en Muḥarram 427 H, et Ibn al-ʿImād confirme dans les
      *Shadharāt al-Dhahab*.
    canonical_hijri: {year: 427, month: 1, precision: month}
    canonical_gregorian: {date: 1035-11-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: dhahabi_siyar
        is_canonical: true
        notes: "Siyar Aʿlām al-Nubalāʾ: died Muḥarram 427 AH at Nīsābūr."
      - source_key: dhahabi_tarikh_islam
        notes: "Tārīkh al-Islām corroborates Muḥarram 427 AH."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab adopts 427 AH."
      - source_key: ei2
    people: [[abu-ishaq-al-thalabi, died]]
