  - slug: death-of-ibn-al-arabi-al-maafiri
    category: scholar
    title_en: Death of Abu Bakr Ibn al-ʿArabī al-Maʿāfirī — *Aḥkām al-Qurʾān*
    title_ar: وفاة أبي بكر ابن العربي المعافري
    title_fr: Mort d'Abu Bakr Ibn al-ʿArabī al-Maʿāfirī
    description_en: |
      Abu Bakr Muhammad ibn ʿAbd Allah Ibn al-ʿArabī al-Maʿāfirī al-
      Ishbīlī, the most celebrated Andalusi Maliki of the sixth century
      AH and qadi of Seville, died near Fez at age about 73 while
      returning from exile. As a young man he travelled with his father
      to the Mashriq, where he studied under al-Ghazali, Abu Bakr
      al-Shashi, and the leading masters of Baghdad and Damascus. His
      *Aḥkām al-Qurʾān* is the principal Maliki tafsir of legal verses
      (*āyāt al-aḥkām*) and remains foundational in seminary curricula
      to this day, alongside *al-Jami al-Sahih* (his commentary on
      al-Tirmidhi's Jamiʿ) and the polemical *al-ʿAwāṣim min al-Qawāṣim*
      defending the Companions against historical attacks. He served as
      qadi of Seville and was politically involved in the transition
      between Almoravid and Almohad rule.
    description_ar: |
      توفي القاضي الإمام أبو بكر محمد بن عبد الله ابن العربي المعافري
      الإشبيلي — أشهر مالكية الأندلس في القرن السادس الهجري وقاضي إشبيلية
      — قرب فاس عن نحو ثلاث وسبعين سنة في طريق عودته من المنفى. رحل في
      شبابه مع أبيه إلى المشرق فأخذ عن الإمام الغزالي وأبي بكر الشاشي
      وكبار شيوخ بغداد ودمشق. وكتابه «أحكام القرآن» هو أهم تفسير مالكي
      لآيات الأحكام، وهو إلى يومنا من الكتب الدراسية المعتمدة في حلقات
      الفقه، إلى جانب «العارضة» شرحه على «جامع الترمذي»، و«العواصم من
      القواصم» في الذبّ عن الصحابة في وجه الطعون التاريخية. ولي قضاء
      إشبيلية، وكان له دور سياسي في الانتقال من الدولة المرابطية إلى
      الدولة الموحدية.
    description_fr: |
      Abu Bakr Muḥammad ibn ʿAbd Allāh Ibn al-ʿArabī al-Maʿāfirī al-
      Ishbīlī, le malikite andalou le plus célèbre du VIe siècle de
      l'Hégire et qāḍī de Séville, mourut près de Fès à l'âge d'environ
      73 ans, sur le chemin du retour de l'exil. Jeune homme, il voyagea
      avec son père vers le Mashriq, où il étudia auprès d'al-Ghazālī,
      d'Abu Bakr al-Shāshī et des maîtres principaux de Bagdad et de
      Damas. Son *Aḥkām al-Qurʾān* est le tafsir malikite par excellence
      des versets juridiques (*āyāt al-aḥkām*) et demeure fondamental
      dans les curricula de séminaire jusqu'à ce jour, aux côtés de
      *al-ʿĀriḍa* (son commentaire du *Jāmiʿ* d'al-Tirmidhī) et de la
      polémique *al-ʿAwāṣim min al-Qawāṣim* qui défend les Compagnons
      contre les attaques historiques. Il occupa la charge de qāḍī de
      Séville et fut politiquement impliqué dans la transition entre la
      domination almoravide et almohade.
