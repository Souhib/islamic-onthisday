  - slug: death-of-al-mawwaq-al-abdari
    category: scholar
    title_en: Death of al-Mawwāq al-ʿAbdarī of Granada
    title_ar: وفاة المواق العبدري الغرناطي
    title_fr: Mort d'al-Mawwāq al-ʿAbdarī de Grenade
    description_en: |
      Abu ʿAbd Allah Muhammad ibn Yūsuf al-ʿAbdarī al-Gharnāṭī, known as
      al-Mawwāq, the last great Maliki jurist of Nasrid Granada, died
      shortly before — by some classical accounts in the very year of —
      the fall of the city to the Catholic Monarchs in 897 AH (1492 CE).
      He served as muftī and *khaṭīb* of the Great Mosque of Granada
      and composed *al-Tāj wa-l-Iklīl li-Mukhtaṣar Khalīl* — a major
      commentary on Khalīl ibn Isḥāq's *Mukhtaṣar* that ranks alongside
      the works of al-Ḥaṭṭāb and al-Mawwāq's contemporary al-Ubbī as
      one of the foundational Maghrebi commentaries on the standard
      Maliki primer. Through his fatwas in the final years of Muslim
      Granada he confronted unprecedented questions of *aḥkām al-
      mustaḍʿafīn* — the rulings binding upon Muslims under non-Muslim
      sovereignty — that would shape Maghrebi jurisprudence on the
      Mudejars and Moriscos for the next century.
    description_ar: |
      توفي الإمام أبو عبد الله محمد بن يوسف العبدري الغرناطي المعروف
      بالمواق — آخر كبار فقهاء المالكية في غرناطة الناصرية — قبيل سقوط
      المدينة في يد الفرنجة الإسبان سنة سبع وتسعين وثمانمائة هجرية، بل
      في السنة نفسها بحسب بعض المصادر القديمة. ولي رحمه الله الإفتاء
      والخطابة بالمسجد الجامع بغرناطة، وصنّف «التاج والإكليل لمختصر
      خليل» من أعظم شروح «مختصر خليل»، يقرن إلى شرح الحطّاب وشرح الأبّي
      من معاصريه ومن الشروح الأساسية المغربية للمتن الجامع للمذهب
      المالكي. وفي فتاواه في السنوات الأخيرة من غرناطة المسلمة عالج
      مسائل غير مسبوقة في أحكام المستضعفين تحت ولاية غير المسلمين، فكان
      لها أثر بالغ في فقه المغاربة في شأن المدجّنين والموريسكيين قرناً
      بعده.
    description_fr: |
      Abu ʿAbd Allāh Muḥammad ibn Yūsuf al-ʿAbdarī al-Gharnāṭī, connu
      sous le nom d'al-Mawwāq, le dernier grand juriste malikite de la
      Grenade nasride, mourut peu avant — selon certaines relations
      classiques l'année même de — la chute de la ville aux Rois
      Catholiques en 897 AH (1492 EC). Muftī et *khaṭīb* de la Grande
      Mosquée de Grenade, il composa *al-Tāj wa-l-Iklīl li-Mukhtaṣar
      Khalīl* — commentaire majeur du *Mukhtaṣar* de Khalīl ibn Isḥāq
      qui se range, aux côtés des œuvres d'al-Ḥaṭṭāb et de son
      contemporain al-Ubbī, parmi les commentaires maghrébins
      fondamentaux du manuel malikite standard. Par ses fatwas durant
      les ultimes années de la Grenade musulmane, il aborda des
      questions inédites d'*aḥkām al-mustaḍʿafīn* — les règles
      contraignantes pour les musulmans sous souveraineté non
      musulmane — qui allaient forger la jurisprudence maghrébine sur
      les Mudéjars et les Morisques pendant le siècle suivant.
