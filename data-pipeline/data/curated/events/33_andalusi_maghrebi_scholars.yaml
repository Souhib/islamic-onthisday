# Wave 20 of curated event additions (2026-04-27).
# Twelve deaths of Andalusi and Maghrebi scholars — muḥaddithūn, Maliki
# fuqaha, Sufi-jurists, theologians, and grammarians spanning from the
# third Hijri century (Ifriqiya–al-Andalus formation) through the ninth
# Hijri (Tlemcen, Granada on the eve of the Reconquista). Each entry is
# attested in classical Sunni biographical works (al-Dhahabi *Siyar*,
# Ibn Khallikan *Wafayat*, Ibn Kathir *Bidaya*, Ibn Saʿd *Tabaqat*,
# *Tarikh al-Islam*) cross-referenced against EI2 for the western
# Islamic specialists. Trilingual (en/ar/fr).
#
# Note: Ibn Rushd al-Hafid (Averroes, d. 595 AH) and Ibn ʿAbd al-Barr
# (d. 463 AH) already appear in the dataset; the present file adds
# Ibn Rushd al-Jadd (the grandfather, d. 520 AH) and Ibn al-Hajib
# (d. 646 AH) in their place, alongside ten further specialists.

events:
  # =========================================================================
  # FORMATIVE PERIOD — IFRIQIYA / EGYPT / AL-ANDALUS (3rd c. AH)
  # =========================================================================

  - slug: death-of-baqi-ibn-makhlad
    category: scholar
    title_en: Death of Baqī ibn Makhlad al-Andalusi
    title_ar: وفاة بقيّ بن مخلد الأندلسي
    title_fr: Mort de Baqī ibn Makhlad al-Andalusi
    description_en: |
      Abu ʿAbd al-Rahman Baqī ibn Makhlad al-Qurṭubi, the foremost
      muḥaddith of al-Andalus in his generation, died in Cordoba at age
      about 75. He travelled twice from Iberia to the eastern lands —
      reaching Iraq, the Hijaz, Egypt, and the Levant — to study under
      Ahmad ibn Hanbal, ʿAli ibn al-Madini, Yahya ibn Maʿin, and the
      senior pupils of Imam al-Shafiʿi. His monumental *Musnad* arranged
      hadith on the Companion-narrator pattern and reportedly contained
      tens of thousands of traditions, surpassing the Musnads of the
      Mashriq in scale; only fragments survive today. He grafted the
      eastern science of hadith onto Maliki al-Andalus despite intense
      resistance from the established jurists of Cordoba, who viewed his
      preference for ḥadīth-based reasoning as a threat to their
      Mudawwana-centred curriculum. al-Dhahabi calls him "the imam of
      al-Andalus, a sea of hadith."
    description_ar: |
      توفي الإمام أبو عبد الرحمن بقيّ بن مخلد القرطبي — كبير محدثي الأندلس
      في عصره — بقرطبة عن نحو خمس وسبعين سنة. رحل رحمه الله إلى المشرق
      مرتين، فبلغ العراق والحجاز ومصر والشام، فسمع من الإمام أحمد بن حنبل
      وعلي بن المديني ويحيى بن معين وكبار أصحاب الإمام الشافعي. وكتابه
      «المسند» مرتب على مسانيد الصحابة، وقيل إنه يحوي عشرات الألوف من
      الأحاديث، تفوق به على مسانيد المشرق في الحجم، ولم يبق منه إلى يومنا
      إلا قطع. غرس رحمه الله علم الحديث المشرقي في الأندلس المالكية رغم
      مقاومة فقهاء قرطبة الذين رأوا في تقديمه الحديث على الرأي تهديداً
      لمنهجهم القائم على «المدونة». قال عنه الذهبي: «إمام الأندلس، بحر
      الحديث».
    description_fr: |
      Abu ʿAbd al-Raḥman Baqī ibn Makhlad al-Qurṭubī, le plus grand
      muḥaddith d'al-Andalus de sa génération, mourut à Cordoue à l'âge
      d'environ 75 ans. Il voyagea deux fois de la péninsule Ibérique
      vers l'Orient — atteignant l'Irak, le Hedjaz, l'Égypte et le
      Levant — pour étudier auprès d'Aḥmad ibn Ḥanbal, ʿAli ibn al-Madīnī,
      Yaḥyā ibn Maʿīn et des élèves principaux d'al-Shāfiʿī. Son
      monumental *Musnad*, organisé selon le compagnon-narrateur,
      contiendrait des dizaines de milliers de traditions, dépassant les
      Musnads orientaux par son ampleur; seuls des fragments en
      subsistent. Il greffa la science orientale du hadith sur l'al-
      Andalus malikite malgré la vive résistance des juristes établis de
      Cordoue, qui voyaient dans sa préférence pour le raisonnement par
      hadith une menace contre leur curriculum centré sur la *Mudawwana*.
      al-Dhahabi le qualifie d'« imam d'al-Andalus, mer de hadith ».
    canonical_hijri: {year: 276, precision: year}
    canonical_gregorian: {date: 889-10-19, precision: year, method: tabular_conversion}
