  - slug: death-of-ibn-rushd-al-jadd
    category: scholar
    title_en: Death of Ibn Rushd al-Jadd — *al-Bayān wa-l-Taḥṣīl*
    title_ar: وفاة ابن رشد الجدّ
    title_fr: Mort d'Ibn Rushd al-Jadd
    description_en: |
      Abu al-Walīd Muhammad ibn Aḥmad ibn Rushd, "al-Jadd" — the
      grandfather of the philosopher Averroes (Ibn Rushd al-Ḥafīd) and
      himself the foremost Maliki jurist of al-Andalus in his generation
      — died in Cordoba at age 68. Qadi al-jamāʿa (chief judge) of
      Cordoba and chief mufti of the Almoravid state, he composed
      *al-Bayān wa-l-Taḥṣīl wa-l-Sharḥ wa-l-Tawjīh wa-l-Taʿlīl li-Masāʾil
      al-Mustakhraja* — a vast commentary on al-ʿUtbi's *Mustakhraja*
      that became a primary reference of Maliki furūʿ literature
      throughout the Maghrib and West Africa for centuries. His
      *al-Muqaddimāt al-Mumahhidāt* is a foundational introduction to
      the Maliki manuals of fiqh. Politically, he advised the Almoravid
      amir Yusuf ibn Tashfin and his son ʿAli on matters of jihad and
      governance; his fatwas helped legitimise the deposition of the
      taifa kings of al-Andalus.
    description_ar: |
      توفي القاضي أبو الوليد محمد بن أحمد بن رشد الجدّ — جدّ الفيلسوف ابن
      رشد الحفيد، وكبير مالكية الأندلس في زمانه — بقرطبة عن ثمانٍ وستين
      سنة. ولي قضاء الجماعة بقرطبة، وكان مفتي الدولة المرابطية،
      وصنّف «البيان والتحصيل والشرح والتوجيه والتعليل لمسائل المستخرجة»
      وهو شرح ضخم على «مستخرجة» العتبي صار مرجعاً أساسياً في فروع المذهب
      المالكي في المغرب وغرب أفريقيا قروناً. وكتابه «المقدمات الممهدات»
      مدخل أساسي إلى متون الفقه المالكي. وأشار رحمه الله على الأمير
      المرابطي يوسف بن تاشفين وابنه علي في مسائل الجهاد والحكم، وأفتى
      بفتاوى أعانت على شرعنة عزل ملوك الطوائف بالأندلس.
    description_fr: |
      Abu al-Walīd Muḥammad ibn Aḥmad ibn Rushd, dit « al-Jadd » — le
      grand-père du philosophe Averroès (Ibn Rushd al-Ḥafīd) et lui-même
      le plus grand juriste malikite d'al-Andalus de sa génération —
      mourut à Cordoue à l'âge de 68 ans. Qāḍī al-jamāʿa (juge en chef)
      de Cordoue et mufti suprême de l'État almoravide, il composa
      *al-Bayān wa-l-Taḥṣīl wa-l-Sharḥ wa-l-Tawjīh wa-l-Taʿlīl li-Masāʾil
      al-Mustakhraja* — vaste commentaire de la *Mustakhraja* d'al-ʿUtbī
      qui devint la référence primaire de la littérature *furūʿ*
      malikite à travers le Maghreb et l'Afrique de l'Ouest pendant des
      siècles. Ses *al-Muqaddimāt al-Mumahhidāt* constituent une
      introduction fondamentale aux manuels malikites de fiqh. Sur le
      plan politique, il conseilla l'émir almoravide Yusuf ibn Tāshfīn
      et son fils ʿAlī en matière de jihad et de gouvernance; ses fatwas
      contribuèrent à légitimer la déposition des rois de taifas
      d'al-Andalus.
