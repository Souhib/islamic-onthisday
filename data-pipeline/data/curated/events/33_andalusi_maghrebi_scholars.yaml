  - slug: death-of-al-turtushi
    category: scholar
    title_en: Death of al-Ṭurṭūshī — *Sirāj al-Mulūk*
    title_ar: وفاة الطرطوشي صاحب «سراج الملوك»
    title_fr: Mort d'al-Ṭurṭūshī, auteur de *Sirāj al-Mulūk*
    description_en: |
      Abu Bakr Muhammad ibn al-Walīd al-Fihrī al-Ṭurṭūshī, born in
      Tortosa in the northern frontier of al-Andalus and settled in
      Fatimid Alexandria, died there in his late sixties. His *Sirāj
      al-Mulūk* (The Lamp of Kings), composed for the Fatimid vizier
      al-Maʾmūn al-Baṭāʾiḥī, is the most influential mirror-for-princes
      in the western Islamic tradition — a manual of statecraft, ethics,
      and jurisprudence drawing on Qurʾan, Sunna, and the sayings of
      ancient kings, comparable in stature to al-Ghazali's *Naṣīḥat
      al-Mulūk* in the eastern tradition. He was uncompromising in his
      Sunni Maliki orthodoxy and wrote against the Ismaili doctrines of
      his Fatimid hosts; he is also remembered for issuing the legal
      opinion (*fatwa*) authorising the Almoravid amir Yusuf ibn Tashfin
      to depose the taifa kings of al-Andalus and unify the peninsula
      under a single Sunni ruler.
    description_ar: |
      توفي الإمام أبو بكر محمد بن الوليد الفهري الطرطوشي — المولود
      بطرطوشة في ثغر الأندلس الشمالي والمستوطن إسكندرية الفاطميين — في
      الإسكندرية عن نحو سبع وستين سنة. وكتابه «سراج الملوك» — صنّفه
      للوزير الفاطمي المأمون البطائحي — أعظم ما ألف في «الآداب السلطانية»
      في الغرب الإسلامي، وهو دليل في السياسة الشرعية والأخلاق والفقه يستمد
      من القرآن والسنة وأقوال ملوك الأقدمين، يقاس به كتاب الإمام الغزالي
      «نصيحة الملوك» في المشرق. كان رحمه الله صلباً في عقيدة أهل السنة
      المالكية، وردّ على عقائد الإسماعيلية الفاطمية في كتب مفردة، وقد
      ذكر له أنه أفتى بإذن الأمير المرابطي يوسف بن تاشفين في خلع ملوك
      الطوائف وتوحيد الأندلس تحت راية سنية واحدة.
    description_fr: |
      Abu Bakr Muḥammad ibn al-Walīd al-Fihrī al-Ṭurṭūshī, né à Tortosa
      sur la marche septentrionale d'al-Andalus et établi dans
      l'Alexandrie fatimide, y mourut à environ soixante-sept ans. Son
      *Sirāj al-Mulūk* (La Lampe des rois), composé pour le vizir
      fatimide al-Maʾmūn al-Baṭāʾiḥī, est le plus influent miroir des
      princes de la tradition islamique occidentale — un manuel de
      statecraft, d'éthique et de jurisprudence puisant dans le Qurʾān,
      la Sunna et les sentences des rois antiques, comparable en
      stature à *Naṣīḥat al-Mulūk* d'al-Ghazālī dans la tradition
      orientale. Intransigeant dans son orthodoxie malikite sunnite, il
      écrivit contre les doctrines ismaéliennes de ses hôtes fatimides;
      on lui attribue également la fatwa autorisant l'émir almoravide
      Yusuf ibn Tāshfīn à déposer les rois de taifas d'al-Andalus et à
      unifier la péninsule sous un souverain sunnite unique.
    canonical_hijri: {year: 520, precision: year}
