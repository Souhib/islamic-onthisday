  - slug: death-of-al-sanusi
    category: scholar
    title_en: Death of Imam al-Sanūsī of Tlemcen
    title_ar: وفاة الإمام السنوسي التلمساني
    title_fr: Mort de l'imam al-Sanūsī de Tlemcen
    description_en: |
      Abu ʿAbd Allah Muhammad ibn Yūsuf al-Sanūsī al-Tilimsānī, the
      foremost Ashʿarī theologian of post-Marinid North Africa, died in
      Tlemcen at age about 64 after a brief illness. His *al-ʿAqīda al-
      Ṣughrā* (the "Smaller Creed", also called *Umm al-Barāhīn*) became
      the most-taught Ashʿarī creed manual across the entire Maghrib and
      West African Sahel, recited and memorised in seminaries from Fez
      to Timbuktu and Sokoto down to the present day. He composed a
      graded curriculum of three creeds — *Ṣughrā*, *Wusṭā*, and *Kubrā*
      — each scaling the same Ashʿarī content for a different student
      level, alongside auto-commentaries (*sharḥ*). The *Ṣughrā*'s
      famous opening exposition of the *ḥukm al-ʿaqlī* — wājib, mustaḥīl,
      jāʾiz — set the conceptual entry point of West African theological
      pedagogy for five centuries.
    description_ar: |
      توفي الإمام أبو عبد الله محمد بن يوسف السنوسي التلمساني — كبير
      أشاعرة المغرب بعد الدولة المرينية — بتلمسان عن نحو أربع وستين سنة
      بعد علة يسيرة. وكتابه «العقيدة الصغرى» المعروف بـ«أم البراهين» صار
      أوسع متون العقيدة الأشعرية تدريساً في عامة المغرب والساحل الأفريقي
      الغربي، يقرأ ويحفظ في حلقات العلم من فاس إلى تنبكتو وسوكوتو إلى
      يومنا. وقد ألّف رحمه الله سلسلة متدرجة من ثلاث عقائد: «الصغرى»
      و«الوسطى» و«الكبرى»، كل واحدة تعالج مضمون العقيدة الأشعرية لطالب
      في طبقة معينة، مع شروحها بقلمه. وافتتاحية «الصغرى» في الحكم
      العقلي — الواجب والمستحيل والجائز — صارت المدخل المفهومي للتعليم
      العقدي في غرب أفريقيا خمسة قرون.
    description_fr: |
      Abu ʿAbd Allāh Muḥammad ibn Yūsuf al-Sanūsī al-Tilimsānī, le plus
      grand théologien ashʿarite de l'Afrique du Nord post-mérinide,
      mourut à Tlemcen à l'âge d'environ 64 ans, après une brève
      maladie. Son *al-ʿAqīda al-Ṣughrā* (le « Petit Credo », appelé
      aussi *Umm al-Barāhīn*) devint le manuel de credo ashʿarite le
      plus enseigné dans tout le Maghreb et le Sahel ouest-africain,
      récité et mémorisé dans les séminaires de Fès à Tombouctou et
      Sokoto jusqu'à nos jours. Il composa un curriculum gradué de
      trois credo — *Ṣughrā*, *Wusṭā* et *Kubrā* — chacun abordant le
      même contenu ashʿarite pour un niveau d'élève différent, avec
      auto-commentaires (*sharḥ*). La célèbre ouverture du *Ṣughrā*
      sur le *ḥukm al-ʿaqlī* — *wājib*, *mustaḥīl*, *jāʾiz* — établit
      le point d'entrée conceptuel de la pédagogie théologique ouest-
      africaine pendant cinq siècles.
