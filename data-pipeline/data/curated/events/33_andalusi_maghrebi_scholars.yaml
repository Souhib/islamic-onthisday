  - slug: death-of-ibn-al-arif-al-sinhaji
    category: scholar
    title_en: Death of Ibn al-ʿArīf al-Ṣinhājī — *Maḥāsin al-Majālis*
    title_ar: وفاة ابن العريف الصنهاجي
    title_fr: Mort d'Ibn al-ʿArīf al-Ṣinhājī
    description_en: |
      Abu al-ʿAbbas Ahmad ibn Muhammad ibn Mūsā Ibn al-ʿArīf al-Ṣinhājī,
      Sufi-jurist of Almería and one of the principal masters of Andalusi
      Sufism in the half-century before Muḥyī al-Dīn Ibn ʿArabī, died in
      Marrakesh at age about 53 shortly after being summoned to the
      Almoravid court on accusations of heterodoxy. His *Maḥāsin al-
      Majālis* — a concise treatise organised around the stations of the
      Sufi path (*maqāmāt*) including knowledge, certainty, longing, and
      love — was widely read across the western Islamic world and
      received in due course a celebrated commentary by Ibn ʿAbbād al-
      Rondī in the eighth century AH. He was a senior representative of
      the Andalusi inheritance of Ibn Masarra's mystical tradition,
      reformulated within rigorous Maliki orthodoxy. Some classical
      sources indicate that he died under circumstances suggesting
      poisoning by his political adversaries.
    description_ar: |
      توفي الإمام أبو العباس أحمد بن محمد بن موسى ابن العريف الصنهاجي —
      الزاهد المالكي بالمرية وأحد كبار شيوخ التصوف الأندلسي في النصف قرن
      الذي سبق محيي الدين ابن عربي — بمراكش عن نحو ثلاث وخمسين سنة، بعد
      أن استُدعي إلى البلاط المرابطي بتهم في عقيدته. وكتابه «محاسن
      المجالس» — رسالة موجزة مرتبة على مقامات السالكين من العلم واليقين
      والشوق والمحبة — انتشر في الغرب الإسلامي وشرحه ابن عبّاد الرندي في
      القرن الثامن الهجري. وكان رحمه الله من ورثة تراث ابن مسرّة الصوفي
      في الأندلس، يصوغه في إطار مالكي سنّي محكم. وأشارت بعض المصادر إلى
      أنه توفي في ظروف تومئ إلى أنه سُمّ على يد خصومه السياسيين.
    description_fr: |
      Abu al-ʿAbbās Aḥmad ibn Muḥammad ibn Mūsā Ibn al-ʿArīf al-Ṣinhājī,
      soufi-juriste d'Almería et l'un des principaux maîtres du soufisme
      andalous dans le demi-siècle qui précéda Muḥyī al-Dīn Ibn ʿArabī,
      mourut à Marrakech à l'âge d'environ 53 ans, peu après avoir été
      convoqué à la cour almoravide sous des accusations d'hétérodoxie.
      Son *Maḥāsin al-Majālis* — traité concis organisé autour des
      stations de la voie soufie (*maqāmāt*) telles que la connaissance,
      la certitude, le désir et l'amour — fut largement lu à travers
      l'Occident musulman et reçut en son temps un commentaire célèbre
      d'Ibn ʿAbbād al-Rondī au VIIIe siècle de l'Hégire. Représentant de
      premier plan de l'héritage andalou de la tradition mystique d'Ibn
      Masarra, reformulée dans une orthodoxie malikite rigoureuse,
      certaines sources classiques indiquent qu'il mourut dans des
      circonstances suggérant un empoisonnement par ses adversaires
      politiques.
    canonical_hijri: {year: 536, precision: year}
    canonical_gregorian: {date: 1141-09-27, precision: day, method: attested}
