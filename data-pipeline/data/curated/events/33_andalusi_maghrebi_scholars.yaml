  - slug: death-of-ibn-abd-al-hakam
    category: scholar
    title_en: Death of Ibn ʿAbd al-Ḥakam — Author of *Futūḥ Miṣr wa-l-Maghrib*
    title_ar: وفاة ابن عبد الحكم صاحب «فتوح مصر والمغرب»
    title_fr: Mort d'Ibn ʿAbd al-Ḥakam, auteur des *Futūḥ Miṣr wa-l-Maghrib*
    description_en: |
      Abu al-Qasim ʿAbd al-Rahman ibn ʿAbd Allah ibn ʿAbd al-Hakam
      al-Qurashi al-Misri — Egyptian Maliki jurist and historian, son of
      one of the senior Maliki transmitters of the Mudawwana tradition —
      died in Fustat aged about 70. His *Futūḥ Miṣr wa-Akhbāruhā wa-l-
      Maghrib wa-l-Andalus* is the earliest extant Arabic narrative of
      the Muslim conquest of Egypt, North Africa, and al-Andalus, and a
      foundational source for every later historian of the Maghrib —
      al-Tabari, al-Baladhuri, al-Maqrizi, and Ibn ʿIdhari all draw on
      it. The work preserves traditions about the conquest of Egypt by
      ʿAmr ibn al-ʿAṣ ra, the campaigns of ʿUqba ibn Nafiʿ, and the early
      Berber–Arab interactions of Ifriqiya that no other surviving source
      records. He was tested under the Mihna along with his brothers and
      transmitted Maliki fiqh to a generation of Egyptian and Maghrebi
      students.
    description_ar: |
      توفي الإمام أبو القاسم عبد الرحمن بن عبد الله بن عبد الحكم القرشي
      المصري — فقيه مالكية مصر ومؤرخها، وابن أحد كبار الناقلين عن أصحاب
      مالك في رواية «المدونة» — بفسطاط مصر عن نحو سبعين سنة. وكتابه
      «فتوح مصر وأخبارها والمغرب والأندلس» أقدم ما وصلنا في النصوص
      العربية في فتح مصر وشمال أفريقيا والأندلس، وهو المرجع الذي عليه
      مدار كل من أرّخ للمغرب من بعده — الطبري والبلاذري والمقريزي
      وابن عذاري كلهم منه استمدوا. وفي الكتاب أخبار في فتح عمرو بن العاص
      رضي الله عنه لمصر، وغزوات عقبة بن نافع، وأول لقاء العرب بالبربر في
      إفريقية لم يحفظها مصدر آخر. وقد امتُحن في «المحنة» مع إخوته، وروى
      الفقه المالكي لطبقة من الفقهاء المصريين والمغاربة.
    description_fr: |
      Abu al-Qāsim ʿAbd al-Raḥmān ibn ʿAbd Allāh ibn ʿAbd al-Ḥakam
      al-Qurashī al-Miṣrī — juriste malikite et historien égyptien, fils
      de l'un des transmetteurs principaux de la tradition orale de la
      *Mudawwana* — mourut à Fusṭāṭ à environ 70 ans. Son *Futūḥ Miṣr
      wa-Akhbāruhā wa-l-Maghrib wa-l-Andalus* est le plus ancien récit
      arabe conservé de la conquête musulmane de l'Égypte, de l'Afrique
      du Nord et d'al-Andalus, et la source fondamentale dont dépendent
      tous les historiens postérieurs du Maghreb — al-Ṭabari, al-
      Balādhuri, al-Maqrīzī et Ibn ʿIdhārī s'en inspirent. L'ouvrage
      conserve des traditions sur la conquête de l'Égypte par ʿAmr ibn
      al-ʿĀṣ ra, les campagnes de ʿUqba ibn Nāfiʿ et les premiers
      contacts arabo-berbères en Ifriqiya qu'aucune autre source
      survivante ne consigne. Il fut éprouvé lors de la *miḥna* avec ses
      frères et transmit le fiqh malikite à une génération d'élèves
      égyptiens et maghrébins.
