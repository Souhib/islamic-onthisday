  - slug: death-of-ibn-mughith-al-tulaytuli
    category: scholar
    title_en: Death of Ibn Mughīth al-Ṭulayṭulī
    title_ar: وفاة ابن مغيث الطليطلي
    title_fr: Mort d'Ibn Mughīth al-Ṭulayṭulī
    description_en: |
      Abu Jaʿfar Ahmad ibn Mughīth ibn Aḥmad al-Ṣadafī al-Ṭulayṭulī, the
      foundational Maliki jurist of Toledo (Ṭulayṭula) and one of the
      principal authorities of fifth-century-AH al-Andalus on the
      practical fiqh of contracts, died around the age of seventy as the
      city stood on the verge of its fall to the Castilians. His
      *al-Muqniʿ fi ʿIlm al-Shurūṭ* — a compendium of model legal
      formularies (*shurūṭ*) for marriage, sale, lease, and waqf
      contracts — became a standard reference across the western Islamic
      world for drafting valid Maliki instruments, and survived in
      multiple recensions in Maghrebi and Egyptian manuscript libraries.
      al-Dhahabi includes him in *Tarikh al-Islam* as one of the senior
      Andalusi muftis of his generation, instrumental in the survival of
      Maliki legal practice through the disintegration of the Caliphate
      of Cordoba.
    description_ar: |
      توفي الفقيه أبو جعفر أحمد بن مغيث بن أحمد الصدفي الطليطلي — كبير
      مالكية طليطلة ومن أعلام أهل الأندلس في القرن الخامس الهجري في فقه
      الشروط والعقود — عن نحو سبعين سنة، وذلك في الأعوام التي شارفت فيها
      المدينة على السقوط في يد القشتاليين. وكتابه «المقنع في علم الشروط»
      جمع نماذج العقود الشرعية في النكاح والبيع والإجارة والوقف، فصار
      مرجعاً معتمداً في الغرب الإسلامي لتحرير الوثائق الفقهية على المذهب
      المالكي، وحفظ في نسخ عدة في المكتبات المغربية والمصرية. ذكره الذهبي
      في «تاريخ الإسلام» في كبار مفتي الأندلس في طبقته، وكان له أثر في
      بقاء الممارسة الفقهية المالكية أثناء تفكك خلافة قرطبة.
    description_fr: |
      Abu Jaʿfar Aḥmad ibn Mughīth ibn Aḥmad al-Ṣadafī al-Ṭulayṭulī, le
      juriste malikite fondateur de Tolède (Ṭulayṭula) et l'une des
      principales autorités de l'al-Andalus du Ve siècle de l'Hégire en
      matière de fiqh pratique des contrats, mourut à environ soixante-
      dix ans, alors que la ville était à la veille de sa chute aux
      Castillans. Son *al-Muqniʿ fī ʿIlm al-Shurūṭ* — recueil de
      formulaires juridiques types (*shurūṭ*) pour les contrats de
      mariage, de vente, de location et de waqf — devint une référence
      standard dans tout l'Occident musulman pour la rédaction
      d'instruments malikites valides et survécut dans plusieurs
      recensions au sein des bibliothèques de manuscrits maghrébines et
      égyptiennes. al-Dhahabi le mentionne dans son *Tarikh al-Islam*
      parmi les principaux muftis andalous de sa génération, instrumental
      dans la survie de la pratique juridique malikite à travers la
      désintégration du califat de Cordoue.
    canonical_hijri: {year: 459, precision: year}
    canonical_gregorian: {date: 1067-05-09, precision: year, method: tabular_conversion}
