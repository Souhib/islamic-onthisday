  - slug: death-of-ibn-al-hajib
    category: scholar
    title_en: Death of Ibn al-Ḥājib — *al-Mukhtaṣar*
    title_ar: وفاة ابن الحاجب صاحب «المختصر»
    title_fr: Mort d'Ibn al-Ḥājib, auteur de *al-Mukhtaṣar*
    description_en: |
      Jamāl al-Dīn Abu ʿAmr ʿUthman ibn ʿUmar Ibn al-Ḥājib al-Mālikī, the
      most influential Maliki jurist of the seventh century AH and a
      foundational grammarian of post-classical Arabic, died in
      Alexandria at about 75. His Maliki *Mukhtaṣar* — known as
      *Jāmiʿ al-Ummahāt* or simply *Mukhtaṣar Ibn al-Ḥājib* — was the
      principal Maliki fiqh primer in seminaries from Egypt to Timbuktu
      until it was eventually displaced by Khalīl ibn Isḥāq's
      *Mukhtaṣar* in the ninth century AH. In Arabic grammar, his
      *al-Kāfiya* (on syntax) and *al-Shāfiya* (on morphology) became
      the two universal pedagogical texts of the post-Mongol Sunni
      world, generating hundreds of commentaries from Bukhara to Fez.
      The first to merge the doctrines of Egyptian Maliki with those
      of the Maghreb, he taught widely in Cairo, Damascus, and
      Alexandria.
    description_ar: |
      توفي الإمام جمال الدين أبو عمرو عثمان بن عمر ابن الحاجب المالكي —
      أعظم مالكية القرن السابع الهجري ومن أئمة العربية بعد المرحلة
      الكلاسيكية — بالإسكندرية عن نحو خمس وسبعين سنة. وكتابه «جامع
      الأمهات» المعروف بـ«مختصر ابن الحاجب» هو المتن الأساسي في فقه
      المالكية في حلقات العلم من مصر إلى تنبكتو، حتى أزاحه «مختصر خليل»
      في القرن التاسع الهجري. وفي النحو فإن كتابيه «الكافية» في النحو
      و«الشافية» في الصرف صارا المتنين الجامعين في علم العربية في عامة
      العالم السنّي بعد سقوط بغداد، وعليهما مئات الشروح من بخارى إلى
      فاس. وكان رحمه الله أول من جمع بين فقه المالكية المصرية والمغربية،
      ودرّس بالقاهرة ودمشق والإسكندرية.
    description_fr: |
      Jamāl al-Dīn Abu ʿAmr ʿUthmān ibn ʿUmar Ibn al-Ḥājib al-Mālikī, le
      juriste malikite le plus influent du VIIe siècle de l'Hégire et un
      grammairien fondateur de l'arabe post-classique, mourut à
      Alexandrie à environ 75 ans. Son *Mukhtaṣar* malikite — connu
      sous le nom de *Jāmiʿ al-Ummahāt* ou simplement *Mukhtaṣar Ibn
      al-Ḥājib* — fut le manuel principal de fiqh malikite dans les
      séminaires d'Égypte à Tombouctou jusqu'à ce qu'il soit
      éventuellement supplanté par le *Mukhtaṣar* de Khalīl ibn Isḥāq
      au IXe siècle de l'Hégire. En grammaire arabe, son *al-Kāfiya*
      (syntaxe) et son *al-Shāfiya* (morphologie) devinrent les deux
      textes pédagogiques universels du monde sunnite post-mongol,
      générant des centaines de commentaires de Boukhara à Fès. Premier
      à fusionner les doctrines du malikisme égyptien avec celles du
      Maghreb, il enseigna abondamment au Caire, à Damas et à
      Alexandrie.
