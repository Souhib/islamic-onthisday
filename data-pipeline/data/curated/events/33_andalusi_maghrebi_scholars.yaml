  - slug: death-of-al-burzuli
    category: scholar
    title_en: Death of al-Burzulī — *Nawāzil al-Burzulī*
    title_ar: وفاة البرزلي صاحب «النوازل»
    title_fr: Mort d'al-Burzulī, auteur des *Nawāzil al-Burzulī*
    description_en: |
      Abu al-Qāsim ibn Aḥmad al-Balawī al-Burzulī, the foremost Tunisian
      Maliki jurist of the late ninth century AH and prayer leader at
      the Zaytūna mosque of Tunis for about fifty years, died at an
      advanced age. His monumental *Jāmiʿ Masāʾil al-Aḥkām mimmā Nazala
      bi-l-Muftīn wa-l-Ḥukkām* — commonly known as *Nawāzil al-Burzulī*
      — gathered Maliki fatwas of Ifriqiya from the third century AH
      onward, organised by chapter of fiqh, and became the foundational
      Maghrebi *nawāzil* compilation, drawn upon by every later
      Maghrebi muftī from al-Wansharīsī (whose *Miʿyār* preserves much
      Burzulī material) to the modern reformist scholars of the
      Zaytūna. Through his teaching at the Zaytūna he transmitted
      Maliki fiqh to a generation of North African and West African
      students whose authority shaped the Saharan trade-route
      seminaries.
    description_ar: |
      توفي الإمام أبو القاسم بن أحمد البلوي البرزلي — كبير مالكية إفريقية
      في أواخر القرن التاسع الهجري وإمام جامع الزيتونة بتونس قرابة خمسين
      سنة — في سنّ متقدمة. وكتابه الضخم «جامع مسائل الأحكام مما نزل
      بالمفتين والحكام» المعروف بـ«نوازل البرزلي» جمع فتاوى مالكية
      إفريقية منذ القرن الثالث الهجري، مرتبة على أبواب الفقه، فصار أصلاً
      لفقه النوازل في المغرب لا يستغني عنه مفتٍ مغربي بعده — اعتمده
      الونشريسي في «المعيار» الذي نقل عنه نقولاً واسعة، وإلى علماء
      الزيتونة المعاصرين. ودرّس بجامع الزيتونة طبقة من طلبة شمال أفريقيا
      وغربها كان لها أثر في توطيد علوم المالكية في حلقات الطرق التجارية
      الصحراوية.
    description_fr: |
      Abu al-Qāsim ibn Aḥmad al-Balawī al-Burzulī, le plus grand
      juriste malikite tunisien de la fin du IXe siècle de l'Hégire et
      imam de la mosquée Zaytūna de Tunis pendant environ cinquante
      ans, mourut à un âge avancé. Son monumental *Jāmiʿ Masāʾil al-
      Aḥkām mimmā Nazala bi-l-Muftīn wa-l-Ḥukkām* — communément appelé
      *Nawāzil al-Burzulī* — rassembla les fatwas malikites d'Ifriqiya
      depuis le IIIe siècle de l'Hégire, organisées par chapitre de
      fiqh, et devint la compilation fondatrice des *nawāzil*
      maghrébins, exploitée par tous les muftis maghrébins
      postérieurs — d'al-Wansharīsī (dont le *Miʿyār* conserve
      d'amples extraits) jusqu'aux savants réformistes modernes de la
      Zaytūna. Par son enseignement à la Zaytūna, il transmit le fiqh
      malikite à une génération d'étudiants nord-africains et ouest-
      africains dont l'autorité forgea les séminaires des routes
      caravanières sahariennes.
    canonical_hijri: {year: 841, precision: year}
    canonical_gregorian: {date: 1437-12-23, precision: year, method: tabular_conversion}
