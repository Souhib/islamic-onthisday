  - slug: death-of-al-baji
    category: scholar
    title_en: Death of Abu al-Walīd al-Bājī
    title_ar: وفاة أبي الوليد الباجي
    title_fr: Mort d'Abu al-Walīd al-Bājī
    description_en: |
      Abu al-Walīd Sulayman ibn Khalaf al-Bājī, foremost Andalusi Maliki
      jurist and *uṣūlī* of his generation, died in Almeria at age about
      69. After thirteen years of study in Mecca, Baghdad, Mosul, and
      Aleppo — where he sat with the senior Shafiʿi-Ashʿari masters of
      the Mashriq — he returned to al-Andalus carrying the eastern
      science of *uṣūl al-fiqh* into a Maliki environment that had
      hitherto resisted speculative legal theory. His *al-Muntaqa* is a
      magisterial commentary on Imam Malik's *Muwaṭṭaʾ*, and his *Ihkām
      al-Fuṣūl fī Aḥkām al-Uṣūl* is among the earliest systematic Maliki
      *uṣūl* treatises. He composed the polemical *Risāla* in reply to a
      Christian monk's letter to the Muslims of Spain — frequently
      identified in modern scholarship with correspondence directed
      across the Mediterranean to the Norman court — and engaged in
      celebrated public disputations defending Sunni Maliki orthodoxy
      against Christian polemic.
    description_ar: |
      توفي الفقيه الأصولي أبو الوليد سليمان بن خلف الباجي — كبير مالكية
      الأندلس في عصره وإمام أصولها — بالمرية عن نحو تسع وستين سنة. أقام
      رحمه الله ثلاث عشرة سنة في طلب العلم بمكة وبغداد والموصل وحلب،
      فأخذ عن كبار الشافعية الأشعرية في المشرق، ثم عاد إلى الأندلس فحمل
      علم أصول الفقه إلى بيئة مالكية كانت تتحرز من النظر العقلي في
      الأحكام. وكتابه «المنتقى» شرح بديع لـ«موطأ» الإمام مالك، وكتابه
      «إحكام الفصول في أحكام الأصول» من أوائل ما صنف في أصول المالكية على
      المنهج المنظم. وقد كتب «الرسالة» في الردّ على رسالة راهب نصراني
      بعث بها إلى مسلمي الأندلس، وقد رجّح الباحثون المعاصرون أنها رسالة
      وردت من بلاط النورمان، وعقد رحمه الله مناظرات مشهورة في الذبّ عن
      عقيدة أهل السنة المالكية في وجه الجدل النصراني.
    description_fr: |
      Abu al-Walīd Sulaymān ibn Khalaf al-Bājī, le plus grand juriste
      malikite et *uṣūlī* d'al-Andalus de sa génération, mourut à
      Almería à l'âge d'environ 69 ans. Après treize ans d'études à La
      Mecque, à Bagdad, à Mossoul et à Alep — où il fréquenta les
      maîtres shafiʿites-ashʿarites du Mashriq — il revint en al-Andalus
      en portant la science orientale d'*uṣūl al-fiqh* dans un milieu
      malikite qui résistait jusqu'alors à la théorie juridique
      spéculative. Son *al-Muntaqā* est un commentaire magistral du
      *Muwaṭṭaʾ* de l'imam Malik, et son *Iḥkām al-Fuṣūl fī Aḥkām al-
      Uṣūl* compte parmi les premiers traités malikites systématiques
      d'*uṣūl*. Il composa la *Risāla* polémique en réponse à la lettre
      d'un moine chrétien adressée aux musulmans d'Espagne — que
      l'érudition moderne identifie souvent avec une correspondance
      transmise à travers la Méditerranée jusqu'à la cour normande — et
      mena des disputations publiques célèbres défendant l'orthodoxie
      malikite sunnite contre la polémique chrétienne.
