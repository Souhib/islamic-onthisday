  # =========================================================================
  # MAJOR BATTLES
  # =========================================================================

  - slug: battle-of-ankara
    category: battle
    title_en: Battle of Ankara — Timur defeats Bayezid I
    title_ar: معركة أنقرة — تيمور يهزم بايزيد الأول
    title_fr: Bataille d'Ankara — Tamerlan défait Bayezid Ier
    description_en: |
      On the plain of Çubuk near Ankara, the army of Timur (Tamerlane)
      decisively defeated the Ottoman forces of Sultan Bayezid I
      (Yıldırım, "the Thunderbolt"), capturing the sultan himself
      after a daylong battle. Bayezid died in Timurid captivity
      eight months later. The defeat triggered the *Fetret Devri*
      ("Interregnum") — eleven years of civil war among Bayezid's
      four sons during which the Ottoman state nearly disintegrated;
      the surviving brother Mehmed I would only restore unity in
      816 AH. The battle is also marked by the irony that it
      reprieved the Byzantine Empire — Bayezid had been on the verge
      of completing the conquest of Constantinople a decade before
      its eventual fall — postponing the city's capture until
      Mehmed II in 1453 CE.
    description_ar: |
      في سهل «جوبوق» قرب أنقرة هزم جيش تيمورلنك جيش الدولة العثمانية
      هزيمة فاصلة، وقادها السلطان بايزيد الأول الملقب بـ«يلدرم»
      (الصاعقة)، فأسره تيمور بعد قتال يوم كامل. وتوفي بايزيد في
      الأسر عند تيمور بعد ثمانية أشهر. وأطلقت الهزيمة عصر «الفترة»
      في تاريخ العثمانيين، وهو إحدى عشرة سنة من حرب أهلية بين أبناء
      بايزيد الأربعة كادت أن تنهي الدولة، فلم يستطع توحيدها إلا أخوه
      محمد الأول الباقي سنة ٨١٦ هـ. ومن مفارقات المعركة أنها أنقذت
      الدولة البيزنطية: فقد كان بايزيد على وشك إكمال فتح القسطنطينية
      قبل عقد من ذلك، فأرجأ ذلك إلى عصر السلطان محمد الفاتح سنة
      ١٤٥٣ ميلادي.
    description_fr: |
      Dans la plaine de Çubuk près d'Ankara, l'armée de Timur
      (Tamerlan) défit de manière décisive les forces ottomanes du
      sultan Bayezid Ier (Yıldırım, « la Foudre »), capturant le
      sultan lui-même après une bataille d'une journée. Bayezid
      mourut en captivité timouride huit mois plus tard. La défaite
      déclencha la *Fetret Devri* (« Interrègne ») — onze années
      de guerre civile entre les quatre fils de Bayezid pendant
      lesquelles l'État ottoman faillit se désintégrer; le frère
      survivant Mehmed Ier ne restaurerait l'unité qu'en 816 H.
      La bataille est aussi marquée par l'ironie qu'elle accorda
      un sursis à l'Empire byzantin — Bayezid était sur le point
      d'achever la conquête de Constantinople une décennie auparavant
      — repoussant la prise de la ville à Mehmed II en 1453 EC.
    canonical_hijri: {year: 804, month: 12, precision: month}
    canonical_gregorian: {date: 1402-07-01, precision: month, method: attested}
