  - slug: conquest-of-hims
    category: conquest
    title_en: Conquest of Ḥims (Emesa)
    title_ar: فتح حمص
    title_fr: Conquête de Ḥims (Émèse)
    description_en: |
      The strategic Byzantine fortress city of Ḥims (Emesa) in
      central Syria fell to the Muslim army shortly after the Battle
      of Yarmuk, surrendered by terms of capitulation negotiated
      between its bishop and the Muslim commander Abu ʿUbayda ibn
      al-Jarrah ra. The terms — a fixed jizya per adult male in
      exchange for protection of life, property, churches, and the
      free practice of religion — became a referenced model for
      subsequent Levantine surrenders. The fall of Ḥims completed
      the Muslim conquest of central Syria and opened the route to
      northern Syria; Aleppo and Antioch would fall within the
      following year. Ḥims subsequently became a major center of
      sahaba settlement: many Companions, including Khālid ibn
      al-Walīd ra (whose tomb remains there), would die in or near
      it.
    description_ar: |
      سلّمت مدينة حمص الحصينة في وسط الشام — قاعدة الروم في تلك الجهة
      — للجيش الإسلامي بعيد معركة اليرموك صلحاً، عقد فيه أسقف
      المدينة مع القائد المسلم أبي عبيدة بن الجراح رضي الله عنه.
      وكانت شروط الصلح — جزية مقدرة على البالغين من الرجال في مقابل
      حقن الدماء وحفظ الأموال والكنائس وإقامة شعائر دينهم — نموذجاً
      اقتُدي به في صلوحات الشام التالية. وأكمل سقوط حمص فتح وسط
      الشام وفتح الطريق إلى شماله؛ فسقطت حلب وأنطاكية في السنة
      التالية. وصارت حمص بعد ذلك مستقراً كبيراً للصحابة، فمات بها
      أو بالقرب منها كثير منهم، وعلى رأسهم خالد بن الوليد رضي الله
      عنه الذي لا يزال قبره فيها.
    description_fr: |
      La cité-forteresse byzantine stratégique de Ḥims (Émèse) au
      centre de la Syrie tomba aux mains de l'armée musulmane peu
      après la bataille du Yarmouk, capitulant aux termes négociés
      entre son évêque et le commandant musulman Abū ʿUbayda ibn
      al-Jarrāḥ ra. Les conditions — une jizya fixe par homme adulte
      en échange de la protection des vies, des biens, des églises
      et de la libre pratique de la religion — devinrent un modèle
      référent pour les capitulations levantines ultérieures. La
      chute de Ḥims acheva la conquête musulmane de la Syrie
      centrale et ouvrit la route vers la Syrie du Nord; Alep et
      Antioche tomberaient dans l'année suivante. Ḥims devint par
      la suite un centre majeur de peuplement des Compagnons : de
      nombreux Compagnons, dont Khālid ibn al-Walīd ra (dont la
      tombe s'y trouve toujours), y moururent ou à proximité.
    canonical_hijri: {year: 15, precision: year}
