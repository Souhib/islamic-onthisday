  - slug: death-of-baybars
    category: ruler
    title_en: Death of Sultan Baybars
    title_ar: وفاة السلطان الظاهر بيبرس
    title_fr: Mort du sultan Baybars
    description_en: |
      al-Ẓāhir Rukn al-Din Baybars al-Bunduqdari, fourth Mamluk
      sultan of Egypt and the most consequential ruler of the Baḥri
      Mamluk era — restorer of the ʿAbbasid caliphate in Cairo after
      the Mongol sack of Baghdad, victor over the Crusaders at
      Antioch (1268 CE) and Krak des Chevaliers (1271 CE), reformer
      of the postal *barīd* system across the Mamluk realm, and
      patron of major architectural projects in Cairo and Damascus —
      died at Damascus at age about 54 of an illness later attributed
      by some sources to poison meant for the Ayyubid prince
      al-Malik al-Qāhir, which he drank by mistake from a shared cup.
      His reign of seventeen years stabilised the Mamluk state and
      established the framework for two and a half centuries of
      Mamluk rule.
    description_ar: |
      توفي السلطان الظاهر ركن الدين بيبرس البندقداري — رابع سلاطين
      المماليك البحرية بمصر، وأبرز سلاطين هذا الجيل: مُعيد الخلافة
      العباسية إلى القاهرة بعد سقوط بغداد على المغول، وفاتح أنطاكية
      على الصليبيين سنة ١٢٦٨ ميلادي وحصن الفرسان سنة ١٢٧١ ميلادي،
      ومنظِّم البريد عبر دولة المماليك، وراعي المعمار في القاهرة
      ودمشق — بدمشق عن نحو أربع وخمسين سنة بداء لاحقت بعضُ المصادر
      أنه سمّ كان معدّاً للأمير الأيوبي الملك القاهر فشربه بيبرس
      بالخطأ من قدح مشترك. ودولته التي امتدت سبع عشرة سنة استقرّت
      بدولة المماليك وأرست الإطار الذي سمح لها بالاستمرار قرنين
      ونصف بعد ذلك.
    description_fr: |
      al-Ẓāhir Rukn al-Dīn Baybars al-Bunduqdārī, quatrième sultan
      mamelouk d'Égypte et le souverain le plus conséquent de l'ère
      mamelouke baḥrī — restaurateur du califat abbasside au Caire
      après le sac mongol de Bagdad, vainqueur des Croisés à Antioche
      (1268 EC) et au Krak des Chevaliers (1271 EC), réformateur du
      système postal *barīd* à travers le royaume mamelouk, et mécène
      de projets architecturaux majeurs au Caire et à Damas — mourut
      à Damas à l'âge d'environ 54 ans d'une maladie plus tard
      attribuée par certaines sources à un poison destiné au prince
      ayyoubide al-Malik al-Qāhir, qu'il aurait bu par erreur dans
      une coupe partagée. Son règne de dix-sept ans stabilisa l'État
      mamelouk et posa le cadre des deux siècles et demi de domination
      mamelouke qui suivirent.
    canonical_hijri: {year: 676, month: 7, precision: month}
    canonical_gregorian: {date: 1277-07-01, precision: month, method: tabular_conversion}
