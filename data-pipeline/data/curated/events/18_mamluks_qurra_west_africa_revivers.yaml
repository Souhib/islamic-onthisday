  - slug: death-of-said-nursi
    category: scholar
    title_en: Death of Bediüzzaman Said Nursi
    title_ar: وفاة بديع الزمان سعيد النورسي
    title_fr: Mort de Bediüzzaman Said Nursi
    description_en: |
      Bediüzzaman ("the Wonder of the Age") Said Nursi — Sunni
      Kurdish-Turkish scholar of the late Ottoman and early Turkish
      Republic, author of the *Risale-i Nur* (Letters of Light), a
      6,000-page Qurʾanic commentary in modern Turkish addressing
      the spiritual and intellectual challenges posed to Islamic
      faith by 20th-century materialism — died in Urfa, southeastern
      Turkey. He was about 83. He had been imprisoned, exiled, and
      his writings repeatedly banned by the Kemalist Turkish
      Republic; he composed most of the *Risale-i Nur* in prison or
      under house arrest. His distinctive method combines classical
      Sunni-Ashʿari theology with engagement with modern science and
      philosophy, framed not as theological scholasticism but as
      meditations on Qurʾanic verses ("words" / *sözler*). The
      Nurcu movement that grew from his students remains one of the
      largest Islamic intellectual currents in modern Turkey.
    description_ar: |
      توفي الإمام بديع الزمان سعيد النورسي — العالم السني الكردي
      التركي في أواخر الدولة العثمانية وأوائل الجمهورية التركية،
      ومصنف «رسائل النور» وهي تفسير قرآني في ست آلاف صفحة باللغة
      التركية الحديثة يجيب فيه عن إشكالات المادية في القرن العشرين
      على العقيدة الإسلامية — في «أورفة» جنوب شرق تركيا. وقد ناهز
      الثالثة والثمانين. وقد سجنته الحكومات الكمالية ونفته ومنعت
      كتبه مراراً، فألف معظم «رسائل النور» في السجن أو تحت الإقامة
      الجبرية. ويجمع منهجه بين علم الكلام الأشعري الكلاسيكي
      والاشتباك مع العلوم والفلسفة الحديثة، عبر مذاكرات على آيات
      القرآن سماها «الكلمات». وما زالت حركة «النورسية» من تلامذته
      من أكبر التيارات الفكرية الإسلامية في تركيا الحديثة.
    description_fr: |
      Bediüzzaman (« la Merveille de l'Époque ») Said Nursi — savant
      sunnite kurde-turc de la fin de l'Empire ottoman et du début
      de la République turque, auteur de la *Risale-i Nur* (Lettres
      de Lumière), un commentaire coranique de 6 000 pages en turc
      moderne traitant des défis spirituels et intellectuels posés
      à la foi islamique par le matérialisme du XXe siècle —
      mourut à Urfa, dans le sud-est de la Turquie. Il avait environ
      83 ans. Il fut emprisonné, exilé, et ses écrits furent
      maintes fois interdits par la République turque kémaliste; il
      composa la majeure partie de la *Risale-i Nur* en prison ou
      en résidence surveillée. Sa méthode distinctive combine la
      théologie sunnite-ashʿarite classique avec l'engagement avec
      la science et la philosophie modernes, présenté non comme une
      scolastique théologique mais comme des méditations sur les
      versets coraniques (« paroles » / *sözler*). Le mouvement
      *Nurcu* issu de ses élèves demeure l'un des plus grands
      courants intellectuels islamiques de la Turquie moderne.
