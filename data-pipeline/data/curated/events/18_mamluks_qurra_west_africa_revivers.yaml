  - slug: death-of-qalawun
    category: ruler
    title_en: Death of Sultan al-Manṣur Qalawun
    title_ar: وفاة السلطان المنصور قلاوون
    title_fr: Mort du sultan al-Manṣūr Qalāwūn
    description_en: |
      al-Manṣur Sayf al-Din Qalawun al-Alfi — seventh Mamluk sultan
      of Egypt, founder of the Qalāwūnid dynastic line that would
      hold the Cairo throne for over a century, and the sultan
      whose victory over the Mongol Ilkhanate at the second Battle
      of Ḥims in 680 AH ended Mongol westward expansion definitively
      — died at his camp outside Cairo while preparing the campaign
      that would, under his son al-Ashraf Khalīl, complete the
      reconquest of the Crusader Levant by taking Acre. He was about
      75. His reign saw the construction of the great Bīmāristān
      al-Manṣurī complex in Cairo, one of the largest and most
      advanced hospitals of the medieval world, with separate wards
      for fevers, eye diseases, surgery, and mental illness, all
      served from its waqf endowment in perpetuity.
    description_ar: |
      توفي السلطان المنصور سيف الدين قلاوون الألفي — سابع سلاطين
      المماليك بمصر، ومؤسس الفرع القلاووني الذي حكم القاهرة قرناً
      ونيفاً، والسلطان الذي قطع توسع المغول الإيلخانيين غرباً قطعاً
      نهائياً بنصره عليهم في معركة حمص الثانية سنة ٦٨٠ هـ — في
      معسكره خارج القاهرة وهو يُعد الحملة التي ستكمل، بقيادة ابنه
      الأشرف خليل، استعادة الشام من الصليبيين بفتح عكا. وقد ناهز
      الخامسة والسبعين. وفي عهده شُيّد البيمارستان المنصوري الضخم
      بالقاهرة، أحد أكبر مستشفيات العالم الإسلامي وأرقاها في عصره،
      مع أجنحة منفصلة للحميات وأمراض العين والجراحة والأمراض
      العقلية، تعمل أبد الدهر من ريع وقفها.
    description_fr: |
      al-Manṣūr Sayf al-Dīn Qalāwūn al-Alfī — septième sultan
      mamelouk d'Égypte, fondateur de la lignée dynastique
      qalāwūnide qui détiendrait le trône cairote pendant plus d'un
      siècle, et le sultan dont la victoire sur l'Ilkhanat mongol
      à la seconde bataille de Ḥims en 680 H mit fin de manière
      définitive à l'expansion mongole vers l'ouest — mourut à son
      campement hors du Caire alors qu'il préparait la campagne qui
      achèverait, sous son fils al-Ashraf Khalīl, la reconquête du
      Levant croisé par la prise d'Acre. Il avait environ 75 ans.
      Son règne vit la construction du grand complexe du Bīmāristān
      al-Manṣūrī au Caire, l'un des plus grands et plus avancés
      hôpitaux du monde médiéval, avec des sections séparées pour
      les fièvres, les maladies oculaires, la chirurgie et la maladie
      mentale, toutes desservies à perpétuité par sa fondation *waqf*.
    canonical_hijri: {year: 689, month: 11, precision: month}
    canonical_gregorian: {date: 1290-11-01, precision: month, method: tabular_conversion}
