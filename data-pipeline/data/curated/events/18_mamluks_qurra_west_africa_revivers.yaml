  - slug: death-of-asim-al-kufi
    category: scholar
    title_en: Death of ʿĀṣim al-Kūfi — qari of the Ḥafṣ recitation
    title_ar: وفاة عاصم الكوفي — قارئ رواية حفص
    title_fr: Mort de ʿĀṣim al-Kūfi — récitateur de la lecture de Ḥafṣ
    description_en: |
      ʿĀṣim ibn Abi al-Najud al-Asadi al-Kūfi — one of the seven
      canonical reciters (*al-qurraʾ al-sabʿa*) recognised by Ibn
      Mujahid (d. 324 AH) and the master from whose two students
      Ḥafṣ ibn Sulaymān and Shuʿba ibn ʿAyyāsh the *Qirāʾat* readings
      that became dominant across the Sunni world descend — died
      in Kufa at age about 80. The *Ḥafṣ ʿan ʿĀṣim* recitation is
      today the standard text of the Qurʾan across the entire
      Islamic east — Egypt, the Levant, Iraq, Turkey, Iran (for
      Sunnis), the Indian subcontinent, Southeast Asia, and Sub-
      Saharan East Africa — and the version used in virtually every
      printed Muṣḥaf since the 1924 Egyptian standard. ʿĀṣim
      received his transmission directly from Abu ʿAbd al-Raḥmān
      al-Sulami, who had received it from ʿAli, ʿUthman, Ibn Masʿud,
      and Ubayy ibn Kaʿb ra. Sources differ slightly on the year of
      his death between 127 and 128 AH.
    description_ar: |
      توفي الإمام عاصم بن أبي النجود الأسدي الكوفي — أحد القراء السبعة
      الذين قنن قراءاتهم ابن مجاهد (ت ٣٢٤ هـ)، والإمام الذي أخرج
      تلميذاه حفص بن سليمان وشعبة بن عياش روايتيه اللتين سادت قراءاتهما
      عالم أهل السنة — بالكوفة عن نحو ثمانين سنة. ورواية «حفص عن
      عاصم» هي اليوم النص الرسمي للقرآن في عامة المشرق الإسلامي:
      مصر والشام والعراق وتركيا وفارس (عند أهل السنة) وشبه القارة
      الهندية وجنوب شرق آسيا وأفريقيا الشرقية تحت الصحراء، وهي
      الرواية المعتمدة في كل المصاحف المطبوعة منذ المصحف الأميري
      المصري سنة ١٩٢٤ ميلادي. وأخذ عاصم القراءة عن أبي عبد الرحمن
      السلمي عن علي وعثمان وابن مسعود وأبي بن كعب رضي الله عنهم.
      واختلفت المصادر في سنة وفاته بين ١٢٧ و١٢٨ هـ.
    description_fr: |
      ʿĀṣim ibn Abī al-Najūd al-Asadi al-Kūfi — l'un des sept
      récitateurs canoniques (*al-qurrāʾ al-sabʿa*) reconnus par
      Ibn Mujāhid (m. 324 H) et le maître dont les deux élèves
      Ḥafṣ ibn Sulaymān et Shuʿba ibn ʿAyyāsh produisirent les
      lectures qui deviendraient dominantes dans le monde sunnite —
      mourut à Koufa à l'âge d'environ 80 ans. La récitation
      *Ḥafṣ ʿan ʿĀṣim* est aujourd'hui le texte standard du Coran
      à travers tout l'Orient islamique — Égypte, Levant, Irak,
      Turquie, Iran (pour les sunnites), sous-continent indien, Asie
      du Sud-Est et Afrique sub-saharienne orientale — et la version
      utilisée dans pratiquement chaque *Muṣḥaf* imprimé depuis
      l'édition égyptienne de 1924. ʿĀṣim reçut sa transmission
      directement d'Abū ʿAbd al-Raḥmān al-Sulamī, qui l'avait reçue
      d'ʿAlī, d'ʿUthmān, d'Ibn Masʿūd et d'Ubayy ibn Kaʿb ra. Les
      sources divergent légèrement entre 127 et 128 H pour l'année
      de sa mort.
