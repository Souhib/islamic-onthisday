  - slug: death-of-nafi-al-madani
    category: scholar
    title_en: Death of Nafiʿ al-Madani — qari of Warsh and Qalun
    title_ar: وفاة نافع المدني — قارئ روايتي ورش وقالون
    title_fr: Mort de Nāfiʿ al-Madanī — récitateur des lectures Warsh et Qālūn
    description_en: |
      Nafiʿ ibn ʿAbd al-Raḥmān al-Madani al-Laythi — one of the
      seven canonical reciters and the master from whose two
      students Warsh (d. 197 AH) and Qālun (d. 220 AH) descend the
      readings that became the standard text of the Qurʾan across
      the Islamic west — died in Medina at age about 70. The *Warsh
      ʿan Nafiʿ* recitation is today the standard text across the
      entire Maghreb (Morocco, Algeria, Tunisia, Mauritania) and
      West Africa from Senegal to Niger; the *Qālun ʿan Nafiʿ*
      recitation is standard in Libya. Nafiʿ took his recitation
      from seventy of the Tabiʿūn of Medina, who had it from the
      Companions ra. Imam Malik ibn Anas remarked of him: "the
      reading of the people of Medina is the Sunna" — using
      *qirāʾat ahl al-Madīna* as a synonym for the canonical
      practice of the Prophet's ﷺ city.
    description_ar: |
      توفي الإمام نافع بن عبد الرحمن المدني الليثي — أحد القراء
      السبعة، والإمام الذي أخرج تلميذاه ورش (ت ١٩٧ هـ) وقالون
      (ت ٢٢٠ هـ) روايتيه اللتين سادت قراءاتهما عالم المغرب الإسلامي —
      بالمدينة المنورة عن نحو سبعين سنة. ورواية «ورش عن نافع» هي
      اليوم النص الرسمي للقرآن في عامة المغرب الإسلامي: المغرب
      والجزائر وتونس وموريتانيا، وفي غرب أفريقيا من السنغال إلى
      النيجر. ورواية «قالون عن نافع» النص الرسمي في ليبيا. وأخذ نافع
      قراءته عن سبعين تابعياً من أهل المدينة من الصحابة رضي الله
      عنهم. وقال عنه الإمام مالك بن أنس: «قراءة أهل المدينة سنة»،
      بمعنى أنها العمل المعتمد في مدينة النبي ﷺ.
    description_fr: |
      Nāfiʿ ibn ʿAbd al-Raḥmān al-Madanī al-Laythi — l'un des sept
      récitateurs canoniques et le maître dont les deux élèves
      Warsh (m. 197 H) et Qālūn (m. 220 H) produisirent les lectures
      qui deviendraient le texte standard du Coran dans tout
      l'Occident islamique — mourut à Médine à l'âge d'environ
      70 ans. La récitation *Warsh ʿan Nāfiʿ* est aujourd'hui le
      texte standard à travers tout le Maghreb (Maroc, Algérie,
      Tunisie, Mauritanie) et l'Afrique de l'Ouest du Sénégal au
      Niger; la récitation *Qālūn ʿan Nāfiʿ* est standard en Libye.
      Nāfiʿ prit sa récitation de soixante-dix tābiʿūn de Médine,
      qui l'avaient reçue des Compagnons ra. L'imam Mālik ibn Anas
      a remarqué à son sujet : « la lecture des gens de Médine est
      la Sunna » — utilisant *qirāʾat ahl al-Madīna* comme synonyme
      de la pratique canonique de la ville du Prophète ﷺ.
    canonical_hijri: {year: 169, precision: year}
    canonical_gregorian: {date: 785-01-01, precision: year, method: attested}
