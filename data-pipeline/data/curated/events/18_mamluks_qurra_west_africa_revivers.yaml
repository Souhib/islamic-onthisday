  - slug: death-of-usman-dan-fodio
    category: scholar
    title_en: Death of ʿUthman dan Fodio — Founder of the Sokoto Caliphate
    title_ar: وفاة عثمان بن فودي — مؤسس خلافة صكتو
    title_fr: Mort de ʿUthmān dan Fodio — fondateur du califat de Sokoto
    description_en: |
      Shaykh ʿUthman ibn Muhammad ibn Fudi (Hausa: dan Fodio) —
      Maliki jurist of the Qadiriyya Sufi order, leader of the
      Fulani jihad of 1804 against the Hausa kingdoms of northern
      Nigeria, and founder of the Sokoto Caliphate which at its
      height ruled most of present-day northern Nigeria, Niger,
      Cameroon, and Burkina Faso — died at Sokoto. He was about
      63. His scholarly output is vast: more than 100 works in
      Arabic, Fulfulde, and Hausa, including the major works
      *Iḥyaʾ al-Sunna wa-Ikhmād al-Bidʿa* and *Bayan Wujub al-
      Hijra*, which laid out the legal and theological foundations
      of his reform movement. The Sokoto Caliphate he founded was
      the largest African polity of the nineteenth century until
      the British conquest of 1903; its scholarly tradition shaped
      West African Islam to the present.
    description_ar: |
      توفي الشيخ عثمان بن محمد بن فودي — فقيه على مذهب الإمام مالك
      ومريد للطريقة القادرية الصوفية، وقائد جهاد الفولانيين سنة
      ١٢١٩ هـ على ممالك الهوسا في شمال نيجيريا، ومؤسس خلافة صكتو
      التي بلغت في أوج اتساعها معظم شمال نيجيريا والنيجر وأطراف
      الكاميرون وبوركينا فاسو اليوم — بصكتو عن نحو ثلاث وستين سنة.
      وله إنتاج علمي واسع: ما يزيد على مئة مصنف بالعربية والفولانية
      والهوسا، منها «إحياء السنة وإخماد البدعة» و«بيان وجوب الهجرة»،
      اللذان أرسيا الأسس الفقهية والعقدية لحركته الإصلاحية. وكانت
      خلافة صكتو أكبر دولة في أفريقيا في القرن التاسع عشر إلى أن
      احتلها الإنجليز سنة ١٩٠٣ ميلادي، وأثرت موروثها العلمي في
      الإسلام الغرب إفريقي إلى يومنا.
    description_fr: |
      Cheikh ʿUthmān ibn Muḥammad ibn Fudi (haoussa : dan Fodio) —
      juriste malikite de l'ordre soufi Qādiriyya, chef du jihad
      peul de 1804 contre les royaumes haoussa du nord du Nigeria,
      et fondateur du califat de Sokoto qui, à son apogée, gouverna
      l'essentiel du nord de l'actuel Nigeria, du Niger, du Cameroun
      et du Burkina Faso — mourut à Sokoto. Il avait environ 63 ans.
      Sa production savante est vaste : plus de 100 ouvrages en
      arabe, en peul et en haoussa, dont les œuvres majeures
      *Iḥyāʾ al-Sunna wa-Ikhmād al-Bidʿa* et *Bayān Wujūb al-Hijra*,
      qui posèrent les fondements juridiques et théologiques de son
      mouvement réformateur. Le califat de Sokoto qu'il fonda fut
      la plus grande entité politique africaine du XIXe siècle
      jusqu'à la conquête britannique de 1903; sa tradition savante
      façonna l'islam ouest-africain jusqu'à nos jours.
    canonical_hijri: {year: 1232, month: 7, precision: month}
