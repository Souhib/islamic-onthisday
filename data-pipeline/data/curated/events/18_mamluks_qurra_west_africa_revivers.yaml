  - slug: death-of-al-marghinani
    category: scholar
    title_en: Death of al-Marghinani — author of al-Hidaya
    title_ar: وفاة المرغيناني — صاحب «الهداية»
    title_fr: Mort d'al-Marghinānī — auteur d'al-Hidāya
    description_en: |
      Burhān al-Din ʿAli ibn Abi Bakr al-Marghinani — Hanafi jurist
      of Farghana and author of *al-Hidāya fi Sharḥ Bidāyat al-
      Mubtadi*, the most-studied Hanafi fiqh manual from the
      Mughal era to the present — died at Marghīnan at age about
      82. *al-Hidāya* operates as a self-commentary on his own
      shorter *Bidāyat al-Mubtadi* and synthesises the two main
      strands of the Ḥanafi tradition (the Iraqi-Khurasani-Bukharan
      lineage of al-Sarakhsi and the Samarqandi lineage of al-
      Khaṣṣāf and al-Saʿdi) into the single canonical formulation
      that subsequent commentaries (e.g. al-ʿAyni's *al-Bināya*)
      would systematically expand. It was the basis of Mughal court
      jurisprudence and was translated into English by Charles
      Hamilton in 1791 to serve as the Anglo-Muḥammadan code in
      British India.
    description_ar: |
      توفي الإمام برهان الدين علي بن أبي بكر المرغيناني — فقيه الحنفية
      بفرغانة، ومصنف «الهداية في شرح بداية المبتدي»، أكثر متون فقه
      الحنفية تدريساً من عصر الدولة المغولية إلى اليوم — بمرغينان
      عن نحو اثنتين وثمانين سنة. و«الهداية» شرح من المؤلف على متنه
      الأصغر «بداية المبتدي»، يجمع بين فرعي المذهب الحنفي الكبيرين
      (سلسلة العراق وخراسان وبخارى عن السرخسي، وسلسلة سمرقند عن
      الخصاف والسعدي) في صياغة معتمدة واحدة وسعت شروحها لاحقاً (كـ
      «البناية» للعيني). وكان عمدة قضاء البلاط المغولي في الهند،
      وترجمه تشارلز هاملتون إلى الإنجليزية سنة ١٧٩١ ميلادي ليكون
      عمدة القانون «الأنجلو-محمدي» في الهند البريطانية.
    description_fr: |
      Burhān al-Dīn ʿAli ibn Abī Bakr al-Marghinānī — juriste
      hanafite du Ferghana et auteur d'*al-Hidāya fī Sharḥ Bidāyat
      al-Mubtadi*, le manuel de fiqh ḥanafite le plus étudié de
      l'ère moghole jusqu'à nos jours — mourut à Marghīnan à l'âge
      d'environ 82 ans. *al-Hidāya* fonctionne comme un auto-
      commentaire de son propre texte abrégé *Bidāyat al-Mubtadi*
      et synthétise les deux principales branches de la tradition
      ḥanafite (la lignée irako-khurāsānī-boukhārienne d'al-Sarakhsī
      et la lignée samarcandi d'al-Khaṣṣāf et al-Saʿdi) en une
      formulation canonique unique que les commentaires ultérieurs
      (par ex. *al-Bināya* d'al-ʿAynī) développeraient
      systématiquement. Elle fut le fondement de la jurisprudence
      de la cour moghole et fut traduite en anglais par Charles
      Hamilton en 1791 pour servir de code anglo-mahométan en Inde
      britannique.
