  - slug: death-of-al-adil
    category: ruler
    title_en: Death of Sultan al-ʿĀdil — Saladin's Brother
    title_ar: وفاة السلطان الملك العادل أبي بكر — أخو صلاح الدين
    title_fr: Mort du sultan al-ʿĀdil — frère de Saladin
    description_en: |
      al-Malik al-ʿĀdil Sayf al-Din Abu Bakr ibn Ayyub — younger
      brother of Saladin and second sultan of the unified Ayyubid
      sultanate — died at ʿĀlqīn near Damascus at age about 73 while
      preparing to confront the Fifth Crusade then disembarking on
      Damietta. Known to the Crusader chroniclers as *Saphadin*, he
      was Saladin's most trusted lieutenant during the campaigns
      against the Crusader states; after his brother's death he
      consolidated the disputed succession by displacing Saladin's
      sons one after another, finally taking the throne himself in
      596 AH. His twenty-year reign maintained the Ayyubid
      confederation, repaired the economy after the wars of the
      Third Crusade, and concluded a long armistice with the Crusader
      Kingdom of Jerusalem that lasted until shortly before his death.
    description_ar: |
      توفي السلطان الملك العادل سيف الدين أبو بكر بن أيوب — أصغر
      إخوة صلاح الدين الأيوبي وثاني سلاطين السلطنة الأيوبية الموحدة
      — في «عالقين» قرب دمشق عن نحو ثلاث وسبعين سنة وهو يستعد
      لمواجهة الحملة الصليبية الخامسة الناحطة على دمياط. وعرفه مؤرخو
      الفرنجة باسم «سفادين»، وكان ساعد أخيه الأيمن في حروب الفرنجة؛
      وبعد وفاة أخيه اجتمع له ملك الأيوبيين بإقصاء أبناء أخيه واحداً
      تلو الآخر فاستقل بالسلطنة سنة ٥٩٦ هـ. حكم عشرين سنة حافظ فيها
      على وحدة الكنفدرالية الأيوبية، وأصلح الاقتصاد بعد حروب الحملة
      الصليبية الثالثة، وعقد هدنة طويلة مع مملكة بيت المقدس
      الصليبية ظلّت قائمة إلى قبيل وفاته.
    description_fr: |
      al-Malik al-ʿĀdil Sayf al-Dīn Abū Bakr ibn Ayyūb — frère cadet
      de Saladin et deuxième sultan du sultanat ayyoubide unifié —
      mourut à ʿĀlqīn près de Damas à l'âge d'environ 73 ans alors
      qu'il se préparait à affronter la cinquième croisade en train
      de débarquer à Damiette. Connu des chroniqueurs croisés sous
      le nom de *Saphadin*, il fut le lieutenant le plus fidèle de
      Saladin durant les campagnes contre les États croisés; après
      la mort de son frère il consolida la succession contestée en
      déplaçant les fils de Saladin l'un après l'autre, prenant
      finalement le trône lui-même en 596 H. Son règne de vingt ans
      maintint la confédération ayyoubide, restaura l'économie après
      les guerres de la troisième croisade, et conclut un long
      armistice avec le royaume croisé de Jérusalem qui dura jusqu'à
      peu avant sa mort.
