  - slug: death-of-ibn-al-salah
    category: scholar
    title_en: Death of Ibn al-Ṣalaḥ — codifier of Hadith Methodology
    title_ar: وفاة ابن الصلاح — مدوّن مصطلح الحديث
    title_fr: Mort d'Ibn al-Ṣalāḥ — codificateur de la méthodologie du hadith
    description_en: |
      Abu ʿAmr ʿUthman ibn ʿAbd al-Raḥmān al-Shahrazuri, known as
      Ibn al-Ṣalaḥ — chief muḥaddith of Damascus, head of the Dār
      al-Ḥadīth al-Ashrafiyya, and author of the *Muqaddima fi
      ʿUlum al-Ḥadīth* (often simply *Muqaddimat Ibn al-Ṣalaḥ*),
      the foundational systematic treatise of hadith methodology
      in classical Sunni Islam — died in Damascus at age about 66.
      The *Muqaddima* defined the categories *ṣaḥīḥ*, *ḥasan*, and
      *ḍaʿīf*, and the sub-disciplines of hadith criticism that
      every later manual (al-Nawawi's *Taqrīb*, al-ʿIrāqi's *Alfīya*,
      Ibn Ḥajar's *Nukhba*) would refine but never replace. It is
      the single most-cited work of *muṣṭalaḥ al-ḥadīth* in the
      entire Sunni tradition.
    description_ar: |
      توفي الإمام أبو عمرو عثمان بن عبد الرحمن الشهرزوري المعروف بابن
      الصلاح — كبير محدثي دمشق، شيخ دار الحديث الأشرفية، ومصنف
      «المقدمة في علوم الحديث» (المعروفة بـ«مقدمة ابن الصلاح»)،
      وهي الكتاب الأم في علم مصطلح الحديث عند أهل السنة من بعده —
      بدمشق عن نحو ست وستين سنة. وفي «المقدمة» قنّن ابن الصلاح أقسام
      الحديث: الصحيح والحسن والضعيف، وفروع الجرح والتعديل التي
      ستوسعها كل المتون اللاحقة («تقريب» النووي و«ألفية» العراقي
      و«نخبة الفكر» لابن حجر) دون أن تستبدل أصلها. وهو أكثر كتب
      علم المصطلح إحالةً عليه عند أهل السنة قاطبةً.
    description_fr: |
      Abu ʿAmr ʿUthmān ibn ʿAbd al-Raḥmān al-Shahrazūri, connu sous
      le nom d'Ibn al-Ṣalāḥ — chef muḥaddith de Damas, directeur de
      la *Dār al-Ḥadīth al-Ashrafiyya*, et auteur de la *Muqaddima
      fī ʿUlūm al-Ḥadīth* (souvent simplement *Muqaddimat Ibn al-
      Ṣalāḥ*), le traité systématique fondateur de la méthodologie
      du hadith dans l'islam sunnite classique — mourut à Damas à
      l'âge d'environ 66 ans. La *Muqaddima* définit les catégories
      *ṣaḥīḥ*, *ḥasan* et *ḍaʿīf*, et les sous-disciplines de la
      critique du hadith que tout manuel ultérieur (le *Taqrīb*
      d'al-Nawawi, l'*Alfīya* d'al-ʿIrāqi, la *Nukhba* d'Ibn Ḥajar)
      raffinerait sans jamais remplacer. C'est l'œuvre de
      *muṣṭalaḥ al-ḥadīth* la plus citée de toute la tradition
      sunnite.
    canonical_hijri: {year: 643, month: 4, precision: month}
    canonical_gregorian: {date: 1245-09-01, precision: month, method: tabular_conversion}
