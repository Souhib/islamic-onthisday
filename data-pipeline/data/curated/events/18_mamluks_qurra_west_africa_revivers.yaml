# Wave 5 of curated event additions (2026-04-26).
# 4 mamluk/ayyubid sultans + 2 qurra' (Quran reciters) + 3 hanafi/hanbali
# fuqaha + 1 muhaddith + 2 west african revivers + 1 modern reviver
# + 2 major battles (Hims, Ankara). Each event attested in classical
# Sunni sources or, for modern figures, well-documented contemporary
# Sunni biographical works. Trilingual (en/ar/fr).

events:
  # =========================================================================
  # MAMLUK + AYYUBID SULTANS
  # =========================================================================

  - slug: death-of-qutuz
    category: ruler
    title_en: Assassination of Sultan Qutuz — Victor of ʿAyn Jalut
    title_ar: مقتل السلطان قطز — بطل عين جالوت
    title_fr: Assassinat du sultan Quṭuz — vainqueur de ʿAyn Jālūt
    description_en: |
      al-Muẓaffar Sayf al-Din Quṭuz, third Mamluk sultan of Egypt
      and the commander whose strategic decision to confront the
      Mongols in the Galilee — rather than abandon Egypt — produced
      the decisive victory at ʿAyn Jalut on 25 Ramaḍān 658 AH, was
      assassinated forty-two days later in the Sinai while returning
      to Cairo. He was killed by a faction of his own emirs led by
      Baybars, who succeeded him on the throne. Quṭuz had reportedly
      promised Baybars the governorship of Aleppo after the victory
      and reneged. Despite the brevity of his reign (less than a
      year), he occupies an iconic place in classical Mamluk
      historiography as the man who broke the Mongol myth of
      invincibility — "had he not stood at ʿAyn Jalut, the Mongols
      would have wintered in Cairo" (al-Maqrīzī).
    description_ar: |
      اغتيل السلطان المظفر سيف الدين قطز — ثالث سلاطين دولة المماليك
      بمصر، وقائد المعركة التي قرر فيها مواجهة المغول في الجليل بدلاً
      من ترك مصر، فأخرج بذلك نصر عين جالوت الفاصل في ٢٥ رمضان سنة
      ٦٥٨ للهجرة — في سيناء بعد اثنين وأربعين يوماً وهو في طريق
      عودته إلى القاهرة. قتله أمراء من بطانته بقيادة الظاهر بيبرس
      الذي خلفه على العرش. وكانت الرواية أن قطز وعد بيبرس بنيابة
      حلب بعد النصر فلم يفِ. ومع قصر مدة سلطته (أقل من سنة) فإنه
      يحتل مكانة شاهقة في تاريخ المماليك الكلاسيكي بوصفه الرجل الذي
      كسر أسطورة المغول التي لا تقهر — قال المقريزي: «لولا قيامه
      بعين جالوت لشتى المغول بالقاهرة».
    description_fr: |
      al-Muẓaffar Sayf al-Dīn Quṭuz, troisième sultan mamelouk
      d'Égypte et le commandant dont la décision stratégique
      d'affronter les Mongols en Galilée — plutôt que d'abandonner
      l'Égypte — produisit la victoire décisive de ʿAyn Jālūt le
      25 Ramaḍān 658 H, fut assassiné quarante-deux jours plus tard
      dans le Sinaï alors qu'il regagnait Le Caire. Il fut tué par
      une faction de ses propres émirs menée par Baybars, qui lui
      succéda sur le trône. Quṭuz aurait promis à Baybars le
      gouvernorat d'Alep après la victoire puis se serait rétracté.
      Malgré la brièveté de son règne (moins d'un an), il occupe
      une place iconique dans l'historiographie mamelouke classique
      comme l'homme qui brisa le mythe d'invincibilité mongol —
      « s'il ne s'était dressé à ʿAyn Jālūt, les Mongols auraient
      hiverné au Caire » (al-Maqrīzī).
    canonical_hijri: {year: 658, month: 11, precision: month}
    canonical_gregorian: {date: 1260-10-01, precision: month, method: tabular_conversion}
