  - slug: death-of-ibn-qudama
    category: scholar
    title_en: Death of Ibn Qudama al-Maqdisi — author of al-Mughni
    title_ar: وفاة ابن قدامة المقدسي — صاحب «المغني»
    title_fr: Mort d'Ibn Qudāma al-Maqdisi — auteur d'al-Mughnī
    description_en: |
      Muwaffaq al-Din ʿAbdallah ibn Aḥmad ibn Qudama al-Maqdisi —
      foremost Hanbali jurist of his generation, author of *al-
      Mughnī* (the most extensive comparative fiqh work in the
      Hanbali madhhab and across the four Sunni schools), and
      participant in the campaigns of Saladin against the Crusaders
      — died in Damascus on Saturday, ʿĪd al-Fiṭr (1 Shawwal) 620
      AH at age about 80. *al-Mughnī* operates as a comparative
      commentary on the *Mukhtaṣar* of al-Khiraqi and reaches
      thirteen large volumes in modern print; it engages every
      classical madhhab on every chapter of fiqh. Beyond fiqh, his
      *Lumʿat al-Iʿtiqād* is a foundational Hanbali creedal text
      and his *Rawḍat al-Nāẓir* a major work of legal-theory
      (uṣūl). He was praised by Ibn Taymiyya, who said: "After
      al-Awzaʿi none has entered the Levant the like of Muwaffaq
      al-Din ibn Qudama."
    description_ar: |
      توفي الإمام موفق الدين عبد الله بن أحمد ابن قدامة المقدسي —
      كبير فقهاء الحنابلة في عصره، ومصنف «المغني» (أوسع كتاب فقه
      مقارن في المذهب الحنبلي وفي المذاهب الأربعة جميعاً)، وممن
      شهد غزوات صلاح الدين الأيوبي ضد الصليبيين — بدمشق يوم السبت
      عيد الفطر (أول شوال) سنة ٦٢٠ هـ عن نحو ثمانين سنة. و«المغني»
      شرح مقارن على «مختصر» الخرقي ويبلغ ثلاثة عشر مجلداً ضخماً في
      الطبعات الحديثة، يستعرض في كل باب من أبواب الفقه أقوال أئمة
      المذاهب. وفضلاً عن الفقه فإن «لمعة الاعتقاد» له أصل من أصول
      عقيدة الحنابلة و«روضة الناظر» مرجع مهم في علم أصول الفقه.
      أثنى عليه ابن تيمية فقال: «ما دخل الشام بعد الأوزاعي مثل ابن
      قدامة».
    description_fr: |
      Muwaffaq al-Dīn ʿAbdallāh ibn Aḥmad ibn Qudāma al-Maqdisi —
      plus grand juriste hanbalite de sa génération, auteur d'*al-
      Mughnī* (l'œuvre de fiqh comparé la plus vaste dans le madhhab
      hanbalite et à travers les quatre écoles sunnites), et
      participant aux campagnes de Saladin contre les Croisés —
      mourut à Damas un samedi, jour de l'ʿĪd al-Fiṭr (1er Shawwāl)
      620 H, à l'âge d'environ 80 ans. *al-Mughnī* fonctionne comme
      un commentaire comparatif du *Mukhtaṣar* d'al-Khiraqī et
      atteint treize gros volumes dans les éditions modernes; il
      traite chaque madhhab classique dans chaque chapitre du fiqh.
      Au-delà du fiqh, sa *Lumʿat al-Iʿtiqād* est un texte de credo
      hanbalite fondamental, et sa *Rawḍat al-Nāẓir* une œuvre
      majeure de théorie juridique (*uṣūl*). Il fut loué par Ibn
      Taymiyya, qui dit : « après al-Awzāʿi, le Levant n'a vu entrer
      personne de la trempe de Muwaffaq al-Dīn ibn Qudāma ».
    canonical_hijri: {year: 620, month: 10, day: 1, precision: day}
    canonical_gregorian: {date: 1223-11-04, precision: day, method: tabular_conversion}
