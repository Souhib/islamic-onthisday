  - slug: death-of-al-sarakhsi
    category: scholar
    title_en: Death of al-Sarakhsi — Hanafi master of al-Mabsuṭ
    title_ar: وفاة السرخسي — صاحب «المبسوط» في الفقه الحنفي
    title_fr: Mort d'al-Sarakhsi — maître hanafite d'al-Mabsūṭ
    description_en: |
      Shams al-Aʾimma Muhammad ibn Aḥmad al-Sarakhsi — foremost
      Hanafi jurist of his generation in Transoxiana, qadi of
      Bukhara, and author of *al-Mabsūṭ* (thirty volumes), the
      standard reference of Ḥanafi fiqh from his own day until the
      present — died at Marghīnan in Farghana at age about 90.
      *al-Mabsūṭ* was famously dictated entirely from memory while
      al-Sarakhsi was imprisoned at the bottom of a well at
      Awzajand by the Qarakhanid ruler whom he had publicly
      criticised; his students gathered at the well's mouth and
      transcribed each book as he dictated it from below. The
      monumental work runs to nearly fifteen thousand pages in
      modern print and remains the most extensive single Sunni fiqh
      manual ever composed in any madhhab.
    description_ar: |
      توفي شمس الأئمة محمد بن أحمد السرخسي — كبير فقهاء الحنفية في
      عصره بما وراء النهر، وقاضي بخارى، ومصنف «المبسوط» في ثلاثين
      مجلداً، وهو المرجع المعتمد في المذهب الحنفي من عصره إلى يومنا —
      بمرغينان في فرغانة عن نحو تسعين سنة. وقد أملى «المبسوط» كله
      من حفظه وهو سجين في قعر بئر بأوزجند بأمر الحاكم القراخاني
      الذي انتقده الإمام علناً؛ فكان طلابه يجتمعون عند فم البئر
      ويستملون منه كل كتاب وهو يمليه من الأسفل. ويبلغ الكتاب
      الموسوعي قرابة خمسة عشر ألف صفحة في طبعاته الحديثة، فيعد
      أوسع كتاب فقه سني ألفه أحد قط في أي مذهب.
    description_fr: |
      Shams al-Aʾimma Muḥammad ibn Aḥmad al-Sarakhsi — plus grand
      juriste hanafite de sa génération en Transoxiane, qāḍī de
      Boukhara, et auteur d'*al-Mabsūṭ* (trente volumes), la
      référence standard du fiqh ḥanafite depuis son époque jusqu'à
      ce jour — mourut à Marghīnan en Ferghana à l'âge d'environ
      90 ans. *al-Mabsūṭ* fut, fait célèbre, dicté entièrement de
      mémoire alors qu'al-Sarakhsi était emprisonné au fond d'un
      puits à Awzajand par le souverain qarakhanide qu'il avait
      publiquement critiqué; ses élèves se rassemblaient à la
      margelle du puits et transcrivaient chaque livre à mesure
      qu'il le dictait d'en bas. L'œuvre monumentale s'étend sur
      près de quinze mille pages dans son édition moderne et reste
      le plus vaste manuel de fiqh sunnite jamais composé dans
      n'importe quel madhhab.
    canonical_hijri: {year: 483, precision: year}
    canonical_gregorian: {date: 1090-01-01, precision: year, method: attested}
