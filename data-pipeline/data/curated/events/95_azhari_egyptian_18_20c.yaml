  - slug: death-of-muhammad-sayyid-tantawi
    category: scholar_death
    title_en: Death of Muḥammad Sayyid Ṭanṭāwī — Grand Imām of al-Azhar
    title_ar: وفاة الإمام محمد سيد طنطاوي — شيخ الجامع الأزهر
    title_fr: Mort de Muḥammad Sayyid Ṭanṭāwī — Grand Imām d'al-Azhar
    description_en: |
      Muḥammad Sayyid Ṭanṭāwī — Egyptian Sunni Ḥanafī
      jurist and Qurʾanic-sciences scholar, Grand Muftī
      of Egypt 1986-1996, and Grand Imām of al-Azhar
      (Shaykh al-Azhar) from March 1996 until his
      death — died of a heart attack at the King Khālid
      airport in Riyadh on 24 Rabīʿ al-Awwal 1431 AH
      (10 March 2010 CE) while preparing to return to
      Cairo from a King Faisal Prize ceremony, at age
      81. Born at Salīm al-Sharqiyya in Sūhāj (Upper
      Egypt) in 1928 CE and graduated from al-Azhar's
      Faculty of Theology in 1958 CE with a doctorate
      on Qurʾanic exegesis (1966), he taught at the
      Islamic University of Medina (1972-1980) before
      returning to lead the Tafsīr department at
      al-Azhar's Faculty of Theology. His major works
      include the fifteen-volume Qurʾanic exegesis
      *al-Tafsīr al-Wasīṭ li-l-Qurʾān al-Karīm*, a
      doctrinal exposition *Banū Isrāʾīl fī al-Qurʾān
      wa-l-Sunna*, and *Aḥkām al-Ḥajj wa-l-ʿUmra*. As
      Grand Imām he chaired al-Azhar through fourteen
      years of administrative consolidation and was
      buried in Medina in the al-Baqīʿ cemetery
      following the funeral prayer at the Prophet's
      ﷺ Mosque.
    description_ar: |
      توفي الإمام الأكبر محمد سيد طنطاوي — الفقيه السني
      الحنفي ومفسر القرآن الكريم المصري، مفتي الديار
      المصرية ما بين سنة ١٤٠٦ هـ (١٩٨٦ ميلادي) وسنة
      ١٤١٦ هـ (١٩٩٦ ميلادي)، وشيخ الجامع الأزهر منذ
      مارس سنة ١٤١٦ هـ (١٩٩٦ ميلادي) إلى وفاته —
      بسكتة قلبية في مطار الملك خالد بالرياض يوم
      ٢٤ ربيع الأول سنة ١٤٣١ هـ (الموافق ١٠ مارس
      ٢٠١٠ ميلادي) وهو يستعد للعودة إلى القاهرة من
      حفل جائزة الملك فيصل العالمية، عن إحدى وثمانين
      سنة. ولد بقرية سليم الشرقية بسوهاج بصعيد مصر
      سنة ١٩٢٨ ميلادي، وتخرج من كلية أصول الدين
      بالأزهر سنة ١٩٥٨ ميلادي، ونال الدكتوراه في
      التفسير سنة ١٩٦٦ ميلادي، ودرّس بالجامعة
      الإسلامية بالمدينة المنورة (١٩٧٢-١٩٨٠)، ثم
      عاد إلى رئاسة قسم التفسير بكلية أصول الدين
      بالأزهر. ومن أكبر مصنفاته «التفسير الوسيط
      للقرآن الكريم» في خمسة عشر جزءاً، و«بنو
      إسرائيل في القرآن والسنة»، و«أحكام الحج
      والعمرة». وقد قاد الأزهر بصفته شيخاً أربع
      عشرة سنة من التماسك الإداري، ودفن بالبقيع
      بالمدينة المنورة بعد الصلاة عليه في المسجد
      النبوي الشريف ﷺ.
    description_fr: |
      Muḥammad Sayyid Ṭanṭāwī — juriste sunnite ḥanafite
      égyptien et savant en sciences coraniques, Grand
      Muftī d'Égypte de 1986 à 1996, et Grand Imām
      d'al-Azhar (Shaykh al-Azhar) de mars 1996 jusqu'à
      sa mort — mourut d'une crise cardiaque à
      l'aéroport du roi Khālid de Riyad le 24 Rabīʿ
      al-Awwal 1431 H (10 mars 2010 EC) alors qu'il
      s'apprêtait à rentrer au Caire après la cérémonie
      du Prix international du roi Fayṣal, âgé de
      81 ans. Né à Salīm al-Sharqiyya à Sūhāj
      (Haute-Égypte) en 1928 EC et diplômé de la
      Faculté de théologie d'al-Azhar en 1958 EC avec
      un doctorat en exégèse coranique (1966), il
      enseigna à l'Université islamique de Médine
      (1972-1980) avant de revenir diriger le
      Département de tafsīr de la Faculté de théologie
      d'al-Azhar. Ses œuvres majeures comprennent
      l'exégèse coranique en quinze volumes *al-Tafsīr
      al-Wasīṭ li-l-Qurʾān al-Karīm*, l'exposé
      doctrinal *Banū Isrāʾīl fī al-Qurʾān wa-l-Sunna*
      et *Aḥkām al-Ḥajj wa-l-ʿUmra*. En tant que Grand
      Imām, il dirigea al-Azhar pendant quatorze ans
      de consolidation administrative et fut enterré
      à Médine dans le cimetière al-Baqīʿ après la
      prière funéraire à la mosquée du Prophète ﷺ.
