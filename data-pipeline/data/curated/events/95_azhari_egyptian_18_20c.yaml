  - slug: death-of-ibrahim-al-saqqa-shafii
    category: scholar_death
    title_en: Death of Ibrāhīm al-Saqqā — Shāfiʿī Shaykh of al-Azhar
    title_ar: وفاة الشيخ إبراهيم السقا — شيخ الشافعية بالأزهر
    title_fr: Mort d'Ibrāhīm al-Saqqā — Shaykh shāfiʿite d'al-Azhar
    description_en: |
      Ibrāhīm ibn ʿAlī al-Saqqā al-Shāfiʿī al-Azharī —
      Egyptian Sunni Shāfiʿī jurist and Ashʿarī
      theologian, longtime Shaykh of the Shāfiʿī
      riwāq at al-Azhar in late-Ottoman Cairo, and one
      of the senior teachers of the generation of
      Muḥammad ʿAbduh — died at Cairo in 1298 AH
      (1881 CE), aged about ninety. Born at Saqqā in
      the Egyptian Delta in the early thirteenth
      century AH, he studied at al-Azhar under
      Muḥammad al-Amīr al-Ṣaghīr, Muḥammad al-Damanhūrī
      al-Shāfiʿī, and others, and became the leading
      Shāfiʿī authority of late-nineteenth-century
      Egypt before his retirement on grounds of age.
      His students included Ibrāhīm al-Bājūrī
      (Shaykh al-Azhar 1847-1860), Ḥasan al-ʿAdawī
      al-Ḥamzāwī, and Muḥammad ʿAbduh, through whom
      the Shāfiʿī teaching tradition of nineteenth-
      century al-Azhar passed into the modernist
      generation. He authored several Ḥāshiya works on
      Shāfiʿī fiqh manuals and on al-Sanūsī's *Umm
      al-Barāhīn* in Ashʿarī ʿaqīda.
    description_ar: |
      توفي الشيخ إبراهيم بن علي السقا الشافعي الأزهري
      — الفقيه السني الشافعي والمتكلم الأشعري المصري،
      شيخ رواق الشافعية بالأزهر في أواخر العهد
      العثماني سنين طويلة، ومن كبار شيوخ جيل الإمام
      محمد عبده — بالقاهرة سنة ١٢٩٨ هـ (الموافق
      ١٨٨١ ميلادي) عن نحو تسعين سنة. ولد بقرية السقا
      بالدلتا المصرية في مستهل القرن الثالث عشر
      الهجري، وتعلم بالأزهر على محمد الأمير الصغير
      ومحمد الدمنهوري الشافعي وغيرهما، ثم صار
      المرجع الشافعي الأكبر بمصر في أواخر القرن
      التاسع عشر الميلادي قبل أن يعتزل التدريس
      لكبر سنه. ومن تلامذته الإمام إبراهيم الباجوري
      (شيخ الأزهر ١٢٦٣-١٢٧٧ هـ) وحسن العدوي الحمزاوي
      ومحمد عبده، الذين انتقل بهم تراث التدريس
      الشافعي بالأزهر التاسع عشر إلى جيل الإصلاح.
      وله حواش متعددة على متون الفقه الشافعي وعلى
      «أم البراهين» للسنوسي في علم العقيدة الأشعرية.
    description_fr: |
      Ibrāhīm ibn ʿAlī al-Saqqā al-Shāfiʿī al-Azharī —
      juriste sunnite shāfiʿite et théologien ashʿarite
      égyptien, longtemps Shaykh du *riwāq* shāfiʿite
      d'al-Azhar dans le Caire ottoman tardif, et l'un
      des enseignants seniors de la génération de
      Muḥammad ʿAbduh — mourut au Caire en 1298 H
      (1881 EC), âgé d'environ quatre-vingt-dix ans.
      Né à Saqqā dans le delta égyptien au début du
      XIIIe siècle de l'hégire, il étudia à al-Azhar
      auprès de Muḥammad al-Amīr al-Ṣaghīr, de
      Muḥammad al-Damanhūrī al-Shāfiʿī et d'autres, et
      devint l'autorité shāfiʿite la plus citée de
      l'Égypte de la fin du XIXe siècle avant de se
      retirer de l'enseignement pour raisons d'âge.
      Parmi ses disciples figurèrent Ibrāhīm al-Bājūrī
      (Shaykh d'al-Azhar 1847-1860), Ḥasan al-ʿAdawī
      al-Ḥamzāwī et Muḥammad ʿAbduh, par lesquels la
      tradition d'enseignement shāfiʿite d'al-Azhar
      du XIXe siècle passa à la génération réformiste.
      Il rédigea plusieurs *Ḥāshiya* sur des manuels de
      fiqh shāfiʿite et sur l'*Umm al-Barāhīn*
      d'al-Sanūsī en ʿaqīda ashʿarite.
