  - slug: death-of-muhammad-al-amir-al-maliki-al-kabir
    category: scholar_death
    title_en: Death of Muḥammad al-Amīr al-Mālikī al-Kabīr — Mālikī Master of al-Azhar
    title_ar: وفاة الإمام محمد الأمير المالكي الكبير — شيخ المالكية بالأزهر
    title_fr: Mort de Muḥammad al-Amīr al-Mālikī al-Kabīr — maître mālikite d'al-Azhar
    description_en: |
      Muḥammad ibn Muḥammad ibn Aḥmad ibn ʿAbd al-Qādir
      al-Sinbāwī al-Mālikī al-Azharī, known as al-Amīr
      al-Kabīr — Egyptian Sunni Mālikī jurist and
      ḥadīth scholar of al-Azhar, distinguished from
      his son Muḥammad al-Amīr al-Ṣaghīr — died at
      Cairo in 1232 AH (1817 CE), aged about
      seventy-eight. Born at Sinbāw near Aḥmad
      al-Badawī's shrine at Ṭanṭā in 1154 AH (1742 CE),
      he studied at al-Azhar under ʿAlī al-Ṣaʿīdī
      al-ʿAdawī, Aḥmad al-Dardīr, Muḥammad al-Murtaḍā
      al-Zabīdī, and others, and became the most cited
      Mālikī authority of late-eighteenth- and
      early-nineteenth-century Egypt. His *al-Majmūʿ*
      (also known as *Mukhtaṣar al-Amīr*) — a concise
      Mālikī fiqh manual following Khalīl's *Mukhtaṣar*
      together with his own *Ḥāshiya al-Iklīl* on it —
      is widely used as a foundational textbook in
      Mālikī teaching circles in Egypt and the Sahel.
      He also produced *Ḥāshiya* commentaries on
      Bukhārī's *Ṣaḥīḥ*, on al-Ṣaghīr's *Mughnī al-Labīb*
      in syntax, and on al-Sanūsī's *Umm al-Barāhīn* in
      ʿaqīda.
    description_ar: |
      توفي الإمام محمد بن محمد بن أحمد بن عبد القادر
      السنباوي المالكي الأزهري، المعروف بالأمير الكبير
      — الفقيه السني المالكي والمحدث الأزهري المصري،
      تمييزاً له عن ولده محمد الأمير الصغير — بالقاهرة
      سنة ١٢٣٢ هـ (الموافق ١٨١٧ ميلادي) عن نحو ثمان
      وسبعين سنة. ولد بسنباو قرب مقام السيد أحمد
      البدوي بطنطا سنة ١١٥٤ هـ (الموافق ١٧٤٢ ميلادي)،
      وتعلم بالأزهر على علي الصعيدي العدوي وأحمد
      الدردير ومحمد المرتضى الزبيدي وغيرهم، ثم صار من
      أكثر العلماء المالكية المصريين تداولاً في
      أواخر القرن الثاني عشر الهجري ومستهل الثالث
      عشر. و«المجموع» (المعروف بـ«مختصر الأمير») —
      وهو متن مالكي مختصر على نهج «مختصر» خليل، مع
      «حاشيته الإكليل» عليه — من المتون التأسيسية
      المتداولة في حلقات تدريس المذهب المالكي بمصر
      والساحل. وله أيضاً حواش على «صحيح» البخاري،
      وعلى «مغني اللبيب» لابن هشام، وعلى «أم
      البراهين» للسنوسي في علم العقيدة.
    description_fr: |
      Muḥammad ibn Muḥammad ibn Aḥmad ibn ʿAbd al-Qādir
      al-Sinbāwī al-Mālikī al-Azharī, connu sous le nom
      d'al-Amīr al-Kabīr — juriste sunnite mālikite et
      muḥaddith d'al-Azhar, à distinguer de son fils
      Muḥammad al-Amīr al-Ṣaghīr — mourut au Caire en
      1232 H (1817 EC), âgé d'environ soixante-dix-huit
      ans. Né à Sinbāw près du sanctuaire d'Aḥmad
      al-Badawī à Ṭanṭā en 1154 H (1742 EC), il étudia
      à al-Azhar auprès d'ʿAlī al-Ṣaʿīdī al-ʿAdawī,
      d'Aḥmad al-Dardīr, de Muḥammad al-Murtaḍā
      al-Zabīdī et d'autres, et devint l'autorité
      mālikite la plus citée d'Égypte à la fin du
      XVIIIe et au début du XIXe siècle. Son
      *al-Majmūʿ* (également connu sous le nom de
      *Mukhtaṣar al-Amīr*) — un manuel concis de fiqh
      mālikite suivant le *Mukhtaṣar* de Khalīl, avec
      sa propre *Ḥāshiyat al-Iklīl* — est largement
      utilisé comme manuel fondamental dans les
      cercles mālikites en Égypte et au Sahel. Il
      produisit également des *Ḥāshiya* sur le *Ṣaḥīḥ*
      d'al-Bukhārī, sur le *Mughnī al-Labīb* d'Ibn
      Hishām en syntaxe, et sur l'*Umm al-Barāhīn*
      d'al-Sanūsī en ʿaqīda.
