  - slug: death-of-abd-al-munim-al-khafaji
    category: scholar_death
    title_en: Death of Muḥammad ʿAbd al-Munʿim al-Khafājī — Azharī Scholar of Arabic Literature
    title_ar: وفاة الدكتور محمد عبد المنعم الخفاجي — أديب الأزهر
    title_fr: Mort de Muḥammad ʿAbd al-Munʿim al-Khafājī — savant azharī de littérature arabe
    description_en: |
      Muḥammad ʿAbd al-Munʿim al-Khafājī — Egyptian
      Sunni Ashʿarī scholar of Arabic literature,
      Azhari critical-tradition historian, longtime
      professor of literature and rhetoric at the
      Faculty of Arabic Language of al-Azhar
      University, and prolific author and editor in
      classical Arabic letters — died at Cairo in
      1417 AH (1996 CE) at age about eighty. Born in
      1335 AH (1916 CE), he was educated at al-Azhar
      and at the Egyptian universities, and held the
      chair of literature at the Faculty of Arabic
      Language until his retirement. His three-volume
      *al-Azhar fī Alf ʿĀm* — first published in 1374
      AH (1954 CE) and reissued in expanded editions
      — is one of the principal Arabic-language
      institutional histories of al-Azhar across its
      thousand-year span. His additional corpus
      includes critical editions of Ibn Sallām al-
      Jumaḥī's *Ṭabaqāt Fuḥūl al-Shuʿarāʾ*, of Ibn
      Sinān al-Khafājī's *Sirr al-Faṣāḥa*, several
      volumes on the modern Arabic literary
      renaissance, and the *al-Jāmiʿ al-Azhar wa-
      Tārīkh al-Sūfiyya* devoted to the institutional
      relations between al-Azhar and the Egyptian
      Sufi orders.
    description_ar: |
      توفي الدكتور محمد عبد المنعم الخفاجي — الأديب
      السني الأشعري المصري ومؤرخ التراث النقدي
      الأزهري، أستاذ الأدب والبلاغة بكلية اللغة
      العربية بجامعة الأزهر سنين طويلة، والمصنف
      والمحقق المكثر في الأدب العربي الكلاسيكي —
      بالقاهرة سنة ١٤١٧ هـ (الموافق ١٩٩٦ ميلادي)
      عن نحو ثمانين سنة. ولد سنة ١٣٣٥ هـ (الموافق
      ١٩١٦ ميلادي)، وتعلم بالأزهر وبالجامعات
      المصرية، وتقلد كرسي الأدب بكلية اللغة
      العربية إلى تقاعده. وكتابه «الأزهر في ألف
      عام» في ثلاثة مجلدات — الذي نشر سنة ١٣٧٤ هـ
      (١٩٥٤ ميلادي) وأعيد إصداره في طبعات موسعة —
      من أبرز التواريخ المؤسسية للأزهر باللغة
      العربية على امتداد ألف سنة. ومن مصنفاته
      وتحقيقاته أيضاً: تحقيق «طبقات فحول الشعراء»
      لابن سلام الجمحي، و«سر الفصاحة» لابن سنان
      الخفاجي، ومجلدات في النهضة الأدبية العربية
      الحديثة، و«الجامع الأزهر وتاريخ الصوفية»
      المخصص لعلاقات الأزهر بالطرق الصوفية المصرية.
    description_fr: |
      Muḥammad ʿAbd al-Munʿim al-Khafājī — savant
      sunnite ashʿarite égyptien de littérature
      arabe, historien de la tradition critique
      azharī, longtemps professeur de littérature et
      de rhétorique à la Faculté de langue arabe de
      l'Université d'al-Azhar, et auteur et éditeur
      prolifique en lettres arabes classiques —
      mourut au Caire en 1417 H (1996 EC) âgé
      d'environ quatre-vingts ans. Né en 1335 H
      (1916 EC), il fut formé à al-Azhar et dans les
      universités égyptiennes, et occupa la chaire
      de littérature à la Faculté de langue arabe
      jusqu'à sa retraite. Son ouvrage *al-Azhar fī
      Alf ʿĀm* en trois volumes — publié pour la
      première fois en 1374 H (1954 EC) et réédité
      en éditions augmentées — est l'une des
      principales histoires institutionnelles
      d'al-Azhar en arabe sur ses mille ans
      d'existence. Son corpus inclut également les
      éditions critiques des *Ṭabaqāt Fuḥūl
      al-Shuʿarāʾ* d'Ibn Sallām al-Jumaḥī et du
      *Sirr al-Faṣāḥa* d'Ibn Sinān al-Khafājī,
      plusieurs volumes sur la renaissance littéraire
      arabe moderne, et le *al-Jāmiʿ al-Azhar wa-
      Tārīkh al-Sūfiyya* consacré aux relations
      institutionnelles entre al-Azhar et les ordres
      soufis égyptiens.
