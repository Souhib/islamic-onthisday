# Wave 95 of curated event additions (2026-04-27).
# Ten Egyptian al-Azhar shaykhs and Egyptian mainstream Sunni scholars
# spanning the late 18th, 19th, and 20th centuries CE — the late-Mamluk
# / early-Ottoman Maliki commentators who shaped the modern Maliki
# textbook tradition (Aḥmad al-Dardīr, Muḥammad ibn Aḥmad al-Dasūqī,
# Muḥammad al-Amīr al-Mālikī al-Kabīr), the late-Ottoman Azhari
# Shafiʿi-Maliki-Hanafi triumvirate that dominated 19th-century
# Egyptian Sunni scholarship (Ibrāhīm al-Saqqā, Muḥammad ʿIllaysh,
# Muḥammad al-Mahdī al-ʿAbbāsī), and the major 20th-century Egyptian
# Sunni voices in modern uṣūl, comparative fiqh, and Azhari
# literature-and-letters (Muḥammad Abū Zahra, ʿAbd al-Wahhāb Khallāf,
# ʿAbd al-Munʿim al-Khafājī, Muḥammad Sayyid Ṭanṭāwī). Already-covered
# Egyptian Azhari figures (Ibrāhīm al-Dasūqī the 13th-c. Sufi
# founder, Muṣṭafā al-Marāghī, Salīm al-Bishrī, Muḥammad al-Ghazālī
# al-Saqqā, al-Albānī, ʿAbd al-Ḥalīm Maḥmūd, Muḥammad Bakhīt
# al-Muṭīʿī) are skipped. All entries are presented factually-
# historically as mainstream Sunni Azhari scholarship (Ḥanafī /
# Shāfiʿī / Mālikī fiqh + Ashʿarī kalam), without contemporary intra-
# Muslim polemic, endorsement, or condemnation. Sources: EI2 / EI3
# where available, modern academic biographies, and editorial
# compilation. No hadith refs. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # LATE-18th / EARLY-19th c. MALIKI COMMENTATORS OF AL-AZHAR
  # =========================================================================

  - slug: death-of-ahmad-al-dardir
    category: scholar_death
    title_en: Death of Aḥmad al-Dardīr — Mālikī Shaykh of al-Azhar and Author of *al-Sharḥ al-Kabīr*
    title_ar: وفاة الإمام أحمد الدردير — شيخ المالكية بالأزهر وصاحب «الشرح الكبير»
    title_fr: Mort d'Aḥmad al-Dardīr — Shaykh mālikite d'al-Azhar et auteur du *Sharḥ al-Kabīr*
    description_en: |
      Aḥmad ibn Muḥammad al-ʿAdawī al-Mālikī al-Azharī, known
      as al-Dardīr — Egyptian Sunni Mālikī jurist, Ashʿarī
      theologian, Khalwatī Sufi master, and Shaykh of the
      Mālikī riwāq at al-Azhar — died at Cairo on 6 Rabīʿ
      al-Awwal 1201 AH (27 December 1786 CE) and was buried
      next to his master Muḥammad ibn Sālim al-Ḥifnī in the
      Khalwatī precinct in Cairo. Born at Banī ʿAdī in
      Upper Egypt in 1127 AH (1715 CE), he studied at
      al-Azhar under al-Ḥifnī, ʿAlī al-Ṣaʿīdī al-ʿAdawī, and
      others before himself becoming the leading Mālikī
      teacher of late-eighteenth-century Cairo. His major
      works — *al-Sharḥ al-Kabīr* and *al-Sharḥ al-Ṣaghīr*
      on Khalīl ibn Isḥāq's *Mukhtaṣar*, and *al-Kharīda
      al-Bahiyya* with its self-commentary — became the
      central reference textbooks of the modern Mālikī
      school across North Africa, the Sahel, and Egypt,
      and his student Muḥammad ibn Aḥmad al-Dasūqī's
      *Ḥāshiya* on the *Sharḥ al-Kabīr* remains the most
      consulted late Mālikī marginal commentary today.
      The whole of al-Azhar attended his funeral prayer.
    description_ar: |
      توفي الإمام أحمد بن محمد العدوي المالكي الأزهري،
      المعروف بالدردير — الفقيه السني المالكي المصري،
      والمتكلم الأشعري، والشيخ الصوفي الخلوتي، وشيخ رواق
      المالكية بالأزهر — بالقاهرة يوم ٦ ربيع الأول سنة
      ١٢٠١ هـ (الموافق ٢٧ ديسمبر ١٧٨٦ ميلادي)، ودفن
      بجوار شيخه محمد بن سالم الحفني في خلوة الخلوتية
      بالقاهرة. ولد ببني عدي بصعيد مصر سنة ١١٢٧ هـ
      (الموافق ١٧١٥ ميلادي)، وتعلم بالأزهر على الحفني
      وعلي الصعيدي العدوي وغيرهما، ثم صار شيخ المالكية
      الأكبر بمصر في أواخر القرن الثاني عشر الهجري
      الميلادي الثامن عشر. ومن أكبر مؤلفاته «الشرح
      الكبير» و«الشرح الصغير» على «مختصر» خليل بن
      إسحاق، و«الخريدة البهية» مع شرحها، وقد صارت من
      أمهات المراجع المدرسية للمذهب المالكي الحديث
      بشمال أفريقيا والساحل ومصر، وما تزال «حاشية»
      تلميذه محمد بن أحمد الدسوقي على «الشرح الكبير»
      من أكثر الحواشي المالكية المتأخرة تداولاً.
      وحضر الأزهر بأكمله جنازته.
    description_fr: |
      Aḥmad ibn Muḥammad al-ʿAdawī al-Mālikī al-Azharī,
      connu sous le nom d'al-Dardīr — juriste sunnite
      mālikite égyptien, théologien ashʿarite, maître soufi
      khalwatī et Shaykh du *riwāq* mālikite d'al-Azhar —
      mourut au Caire le 6 Rabīʿ al-Awwal 1201 H
      (27 décembre 1786 EC) et fut enterré à côté de son
      maître Muḥammad ibn Sālim al-Ḥifnī dans la khalwa
      khalwatī du Caire. Né à Banī ʿAdī en Haute-Égypte
      en 1127 H (1715 EC), il étudia à al-Azhar auprès
      d'al-Ḥifnī, ʿAlī al-Ṣaʿīdī al-ʿAdawī et d'autres,
      avant de devenir lui-même le principal enseignant
      mālikite du Caire de la fin du XVIIIe siècle. Ses
      œuvres majeures — *al-Sharḥ al-Kabīr* et *al-Sharḥ
      al-Ṣaghīr* sur le *Mukhtaṣar* de Khalīl ibn Isḥāq,
      et *al-Kharīda al-Bahiyya* avec son auto-commentaire
      — devinrent les manuels centraux de l'école mālikite
      moderne en Afrique du Nord, au Sahel et en Égypte;
      la *Ḥāshiya* de son disciple Muḥammad ibn Aḥmad
      al-Dasūqī sur le *Sharḥ al-Kabīr* demeure le
      commentaire marginal mālikite tardif le plus
      consulté à ce jour. L'ensemble d'al-Azhar assista à
      sa prière funéraire.
    canonical_hijri: {year: 1201, month: 3, day: 6, precision: day}
    canonical_gregorian: {date: 1786-12-27, precision: day, method: tabular_conversion}
