  - slug: death-of-muhammad-abu-zahra
    category: scholar_death
    title_en: Death of Muḥammad Abū Zahra — Author of *Tārīkh al-Madhāhib al-Islāmiyya*
    title_ar: وفاة الإمام محمد أبو زهرة — صاحب «تاريخ المذاهب الإسلامية»
    title_fr: Mort de Muḥammad Abū Zahra — auteur de *Tārīkh al-Madhāhib al-Islāmiyya*
    description_en: |
      Muḥammad Aḥmad Muṣṭafā Abū Zahra — Egyptian Sunni
      Ḥanafī jurist and historian of Islamic legal
      schools, longtime professor of comparative law at
      the Faculty of Law of Cairo University and dean
      of the Department of Islamic Studies of its
      Faculty of Law (1933-1958), and one of the
      foremost Sunni voices in twentieth-century
      Arabic comparative-fiqh and madhhab history —
      died at Cairo on 19 Rabīʿ al-Awwal 1394 AH
      (12 April 1974 CE) at age about seventy-six.
      Born at al-Maḥalla al-Kubrā in 1316 AH (1898
      CE), he studied at the College of Sharīʿa Judges
      and at Dār al-ʿUlūm. His monographs on the
      madhhab founders — *Abū Ḥanīfa: Ḥayātuhū wa-
      ʿAṣruhū wa-Ārāʾuhū wa-Fiqhuhū* and parallel
      volumes on Mālik, al-Shāfiʿī, and Ibn Ḥanbal,
      and on Ibn Taymiyya, Zayd ibn ʿAlī, Jaʿfar
      al-Ṣādiq, and Ibn Ḥazm — together with his
      *Tārīkh al-Madhāhib al-Islāmiyya* in two volumes
      and his *Uṣūl al-Fiqh*, are the standard Arabic
      reference set on Sunni and broader madhhab
      history at undergraduate level. He served on
      the Islamic Research Council of al-Azhar and on
      the OIC International Islamic Fiqh Academy
      committees from their inception.
    description_ar: |
      توفي الإمام محمد أحمد مصطفى أبو زهرة — الفقيه
      السني الحنفي المصري ومؤرخ المذاهب الإسلامية،
      أستاذ الفقه المقارن بكلية الحقوق بجامعة القاهرة
      وعميد قسم الدراسات الإسلامية بها سنين طويلة
      (١٣٥٢-١٣٧٨ هـ)، ومن أكبر الأصوات السنية في
      الفقه المقارن وتاريخ المذاهب باللغة العربية في
      القرن العشرين الميلادي — بالقاهرة يوم
      ١٩ ربيع الأول سنة ١٣٩٤ هـ (الموافق ١٢ أبريل
      ١٩٧٤ ميلادي) عن نحو ست وسبعين سنة. ولد بالمحلة
      الكبرى سنة ١٣١٦ هـ (الموافق ١٨٩٨ ميلادي)،
      وتعلم بمدرسة القضاء الشرعي وبدار العلوم.
      وأبحاثه عن أئمة المذاهب: «أبو حنيفة: حياته
      وعصره وآراؤه وفقهه» وأخواتها على مالك
      والشافعي وابن حنبل، وعلى ابن تيمية وزيد بن
      علي وجعفر الصادق وابن حزم، مع «تاريخ
      المذاهب الإسلامية» في مجلدين و«أصول الفقه»
      من أمهات المراجع المدرسية العربية في تاريخ
      المذاهب السنية وما يتاخمها على المستوى
      الجامعي. كان عضواً بمجمع البحوث الإسلامية
      بالأزهر وبلجان مجمع الفقه الإسلامي الدولي
      منذ نشأته.
    description_fr: |
      Muḥammad Aḥmad Muṣṭafā Abū Zahra — juriste sunnite
      ḥanafite égyptien et historien des écoles
      juridiques islamiques, longtemps professeur de
      droit comparé à la Faculté de droit de
      l'Université du Caire et doyen du Département
      d'études islamiques de sa Faculté de droit
      (1933-1958), et l'une des voix sunnites les plus
      éminentes du droit comparé arabe et de l'histoire
      des écoles juridiques au XXe siècle — mourut au
      Caire le 19 Rabīʿ al-Awwal 1394 H (12 avril
      1974 EC) âgé d'environ soixante-seize ans. Né à
      al-Maḥalla al-Kubrā en 1316 H (1898 EC), il
      étudia au Collège des Juges de la Sharīʿa et à
      Dār al-ʿUlūm. Ses monographies sur les fondateurs
      des écoles — *Abū Ḥanīfa : Ḥayātuhū wa-ʿAṣruhū
      wa-Ārāʾuhū wa-Fiqhuhū* et les volumes parallèles
      sur Mālik, al-Shāfiʿī et Ibn Ḥanbal, et sur Ibn
      Taymiyya, Zayd ibn ʿAlī, Jaʿfar al-Ṣādiq et Ibn
      Ḥazm — ainsi que son *Tārīkh al-Madhāhib
      al-Islāmiyya* en deux volumes et son *Uṣūl
      al-Fiqh*, constituent l'ensemble de référence
      standard en arabe sur l'histoire des écoles
      sunnites et apparentées au niveau universitaire.
      Il siégea au Conseil de la recherche islamique
      d'al-Azhar et aux commissions de l'Académie
      internationale du fiqh islamique de l'OCI dès sa
      fondation.
