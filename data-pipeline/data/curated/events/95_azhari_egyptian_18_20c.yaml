  - slug: death-of-al-dasuqi-muhammad-maliki
    category: scholar_death
    title_en: Death of Muḥammad ibn Aḥmad al-Dasūqī — Mālikī Author of *Ḥāshiyat al-Dasūqī*
    title_ar: وفاة الشيخ محمد بن أحمد الدسوقي — المالكي صاحب «حاشية الدسوقي»
    title_fr: Mort de Muḥammad ibn Aḥmad al-Dasūqī — mālikite, auteur de la *Ḥāshiyat al-Dasūqī*
    description_en: |
      Muḥammad ibn Aḥmad ibn ʿArafa al-Dasūqī al-Mālikī
      al-Azharī — Egyptian Sunni Mālikī jurist, longtime
      teacher of fiqh at al-Azhar, and author of the
      most consulted late Mālikī marginal commentary on
      Aḥmad al-Dardīr's *al-Sharḥ al-Kabīr* — died at
      Cairo in 1230 AH (April 1815 CE), aged about
      seventy. Born at Dasūq in the Egyptian Delta in
      the mid-twelfth century AH, he studied at al-Azhar
      under al-Dardīr, Muḥammad al-Amīr al-Kabīr, and
      others, eventually inheriting al-Dardīr's chair as
      a leading Mālikī teacher of the institution. His
      *Ḥāshiya ʿalā al-Sharḥ al-Kabīr* — printed in
      multiple multi-volume editions from the late
      nineteenth century onward — is, with the
      *Mawāhib al-Jalīl* of al-Ḥaṭṭāb and the *Ḥāshiya*
      of al-Ṣāwī, one of the three central late
      Mālikī marginal-commentary references on Khalīl
      ibn Isḥāq's *Mukhtaṣar* used in modern teaching
      of the school across the Mālikī world. He also
      authored a *Ḥāshiya* on Saʿd al-Dīn al-Taftāzānī's
      *Mukhtaṣar al-Maʿānī* in rhetoric and a *Ḥāshiya*
      on al-Sanūsī's *Umm al-Barāhīn* in ʿaqīda.
    description_ar: |
      توفي الشيخ محمد بن أحمد بن عرفة الدسوقي المالكي
      الأزهري — الفقيه السني المالكي المصري، المدرّس
      للفقه بالأزهر سنين طويلة، وصاحب أشهر الحواشي
      المالكية المتأخرة على «الشرح الكبير» لأحمد
      الدردير — بالقاهرة سنة ١٢٣٠ هـ (في أبريل ١٨١٥
      ميلادي) عن نحو سبعين سنة. ولد بدسوق في الدلتا
      المصرية في منتصف القرن الثاني عشر الهجري،
      وتعلم بالأزهر على الدردير ومحمد الأمير الكبير
      وغيرهما، ثم خلف الدردير في كرسي تدريس المذهب.
      و«حاشيته على الشرح الكبير» المطبوعة في طبعات
      متعددة من المجلدات منذ أواخر القرن التاسع
      عشر الميلادي، هي مع «مواهب الجليل» للحطّاب
      و«حاشية» الصاوي من أوسع الحواشي المالكية
      المتأخرة على «مختصر» خليل بن إسحاق المتداولة
      في تدريس المذهب اليوم في العالم المالكي. وله
      أيضاً «حاشية على مختصر المعاني» لسعد الدين
      التفتازاني في علم البلاغة و«حاشية على أم
      البراهين» للسنوسي في علم العقيدة.
    description_fr: |
      Muḥammad ibn Aḥmad ibn ʿArafa al-Dasūqī al-Mālikī
      al-Azharī — juriste sunnite mālikite égyptien,
      longtemps professeur de fiqh à al-Azhar, et
      auteur du commentaire marginal mālikite tardif
      le plus consulté sur l'*al-Sharḥ al-Kabīr*
      d'Aḥmad al-Dardīr — mourut au Caire en 1230 H
      (avril 1815 EC), âgé d'environ soixante-dix ans.
      Né à Dasūq dans le delta égyptien au milieu du
      XIIe siècle de l'hégire, il étudia à al-Azhar
      auprès d'al-Dardīr, de Muḥammad al-Amīr al-Kabīr
      et d'autres, et hérita à terme la chaire
      d'enseignement mālikite d'al-Dardīr. Sa
      *Ḥāshiya ʿalā al-Sharḥ al-Kabīr* — imprimée en
      plusieurs éditions multivolumes depuis la fin du
      XIXe siècle — est, avec le *Mawāhib al-Jalīl*
      d'al-Ḥaṭṭāb et la *Ḥāshiya* d'al-Ṣāwī, l'un des
      trois principaux commentaires marginaux mālikites
      tardifs sur le *Mukhtaṣar* de Khalīl ibn Isḥāq
      utilisés dans l'enseignement moderne de l'école
      à travers le monde mālikite. Il rédigea
      également une *Ḥāshiya* sur le *Mukhtaṣar
      al-Maʿānī* de Saʿd al-Dīn al-Taftāzānī en
      rhétorique et une *Ḥāshiya* sur l'*Umm al-Barāhīn*
      d'al-Sanūsī en ʿaqīda.
    canonical_hijri: {year: 1230, precision: year}
    canonical_gregorian: {date: 1815-04-15, precision: month, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Article 'al-Dasūḳī, Muḥammad b. Aḥmad' in EI2 records death 1230 / April 1815 at Cairo."
      - source_key: editorial
        notes: "Pupillage under al-Dardīr and corpus of marginal commentaries on Khalīl, al-Taftāzānī, and al-Sanūsī attested in standard Mālikī biographical sources."
