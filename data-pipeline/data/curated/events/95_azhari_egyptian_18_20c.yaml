  - slug: death-of-muhammad-illaysh
    category: scholar_death
    title_en: Death of Muḥammad ʿIllaysh — Mālikī Mufti of al-Azhar
    title_ar: وفاة الشيخ محمد عليش — مفتي المالكية بالأزهر
    title_fr: Mort de Muḥammad ʿIllaysh — muftī mālikite d'al-Azhar
    description_en: |
      Muḥammad ibn Aḥmad ibn Muḥammad ʿIllaysh — Egyptian
      Sunni Mālikī jurist and Ashʿarī theologian of
      Tripolitanian origin, Mālikī Muftī of al-Azhar
      from 1270 AH (1854 CE), and the leading Mālikī
      authority of mid- and late-nineteenth-century
      Egypt — died in custody at the Citadel of Cairo
      on 26 Rajab 1299 AH (13 June 1882 CE), aged 82,
      after his arrest in connection with the ʿUrābī
      revolt against the Khedive's government, in
      which he had refused to issue a fatwa
      condemning the rebellion. Born at Cairo in 1217
      AH (1802 CE), he studied at al-Azhar under
      Muḥammad al-Amīr al-Ṣaghīr, Ibrāhīm al-Bājūrī,
      and others. His major works include the eight-
      volume *Fatḥ al-ʿAlī al-Mālik fī al-Fatwā ʿalā
      Madhhab al-Imām Mālik* — the most extensive
      Mālikī fatwa collection of the nineteenth
      century — and *Manḥ al-Jalīl ʿalā Mukhtaṣar
      Khalīl* in commentary on Khalīl ibn Isḥāq's
      *Mukhtaṣar*. His disciples included his son
      ʿAbd al-Raḥmān ʿIllaysh and the ʿAlawī sayyid-
      Mālikī teaching tradition of Cairo and Mecca
      transmitted through Aḥmad al-Sharīf al-Sanūsī
      and others.
    description_ar: |
      توفي الشيخ محمد بن أحمد بن محمد عليش — الفقيه
      السني المالكي والمتكلم الأشعري المصري الطرابلسي
      الأصل، مفتي المالكية بالأزهر منذ سنة ١٢٧٠ هـ
      (١٨٥٤ ميلادي)، والمرجع المالكي الأكبر بمصر في
      منتصف وأواخر القرن التاسع عشر الميلادي —
      محبوساً بقلعة القاهرة يوم ٢٦ رجب سنة ١٢٩٩ هـ
      (الموافق ١٣ جوان ١٨٨٢ ميلادي) عن اثنتين
      وثمانين سنة، إثر اعتقاله في أحداث الثورة
      العرابية على حكومة الخديوي، وكان قد امتنع عن
      إصدار فتوى تذم الثوار. ولد بالقاهرة سنة
      ١٢١٧ هـ (الموافق ١٨٠٢ ميلادي)، وتعلم بالأزهر
      على محمد الأمير الصغير وإبراهيم الباجوري
      وغيرهما. ومن أكبر مصنفاته «فتح العلي المالك في
      الفتوى على مذهب الإمام مالك» في ثمانية مجلدات،
      وهو من أوسع مجاميع الفتاوى المالكية في القرن
      التاسع عشر، و«منح الجليل على مختصر خليل» في
      شرح «مختصر» خليل بن إسحاق. ومن تلامذته ابنه
      عبد الرحمن عليش وتراث التدريس المالكي السادة
      العلويين بالقاهرة ومكة المنقول بأحمد الشريف
      السنوسي وغيره.
    description_fr: |
      Muḥammad ibn Aḥmad ibn Muḥammad ʿIllaysh — juriste
      sunnite mālikite et théologien ashʿarite égyptien
      d'origine tripolitaine, *muftī* mālikite d'al-Azhar
      à partir de 1270 H (1854 EC), et l'autorité
      mālikite la plus citée de l'Égypte du milieu et de
      la fin du XIXe siècle — mourut en détention à la
      Citadelle du Caire le 26 Rajab 1299 H (13 juin
      1882 EC), âgé de 82 ans, après son arrestation
      dans le cadre de la révolte d'ʿUrābī contre le
      gouvernement du Khédive, durant laquelle il avait
      refusé d'émettre une fatwa condamnant la rébellion.
      Né au Caire en 1217 H (1802 EC), il étudia à
      al-Azhar auprès de Muḥammad al-Amīr al-Ṣaghīr,
      d'Ibrāhīm al-Bājūrī et d'autres. Ses œuvres
      majeures comprennent le *Fatḥ al-ʿAlī al-Mālik
      fī al-Fatwā ʿalā Madhhab al-Imām Mālik* en huit
      volumes — la plus vaste collection de fatwas
      mālikites du XIXe siècle — et le *Manḥ al-Jalīl
      ʿalā Mukhtaṣar Khalīl* en commentaire du
      *Mukhtaṣar* de Khalīl ibn Isḥāq. Ses disciples
      comprirent son fils ʿAbd al-Raḥmān ʿIllaysh et
      la tradition d'enseignement mālikite des sayyid
      ʿalawī du Caire et de la Mecque transmise via
      Aḥmad al-Sharīf al-Sanūsī et d'autres.
