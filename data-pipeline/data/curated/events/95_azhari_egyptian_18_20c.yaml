  - slug: death-of-abd-al-wahhab-khallaf
    category: scholar_death
    title_en: Death of ʿAbd al-Wahhāb Khallāf — Egyptian Author of *ʿIlm Uṣūl al-Fiqh*
    title_ar: وفاة الشيخ عبد الوهاب خلاف — صاحب «علم أصول الفقه»
    title_fr: Mort de ʿAbd al-Wahhāb Khallāf — auteur égyptien de *ʿIlm Uṣūl al-Fiqh*
    description_en: |
      ʿAbd al-Wahhāb Khallāf — Egyptian Sunni Ḥanafī
      jurist of al-Azhar and the College of Sharīʿa
      Judges (Madrasat al-Quḍāh al-Sharʿiyya), longtime
      professor of *uṣūl al-fiqh* at the Faculty of Law
      of Cairo University from 1934, and author of the
      most widely used twentieth-century Sunni
      undergraduate textbook on legal theory — died at
      Cairo in 1376 AH (1956 CE) aged 67 (lunar) /
      68 (solar). Born at Kafr al-Zayyāt in the
      Egyptian Delta in 1306 AH (1888 CE) and graduated
      from the College of Sharīʿa Judges in 1334 AH
      (1915 CE), he served as Inspector of Sharīʿa
      Courts in the Egyptian ministry of justice from
      1924, then transferred to academic teaching at
      Cairo University. His *ʿIlm Uṣūl al-Fiqh* — a
      single-volume Arabic textbook first published in
      1942 and reprinted in over forty editions — is
      the standard introductory manual on Sunni legal
      theory in Arab and translated Asian curricula
      together with that of Manāʿ al-Qaṭṭān. His
      additional works include *al-Siyāsa al-Sharʿiyya*,
      *Maṣādir al-Tashrīʿ al-Islāmī fī mā lā Naṣṣa
      fīh*, and *Aḥkām al-Aḥwāl al-Shakhṣiyya fī
      al-Sharīʿa al-Islāmiyya*.
    description_ar: |
      توفي الشيخ عبد الوهاب خلاف — الفقيه السني الحنفي
      المصري الأزهري وخريج «مدرسة القضاء الشرعي»،
      أستاذ أصول الفقه بكلية الحقوق بجامعة القاهرة
      منذ سنة ١٣٥٢ هـ (١٩٣٤ ميلادي)، وصاحب أكثر
      الكتب الجامعية السنية في القرن العشرين تداولاً
      في علم أصول الفقه — بالقاهرة سنة ١٣٧٦ هـ
      (الموافق ١٩٥٦ ميلادي) عن سبع وستين سنة قمرية.
      ولد بكفر الزيات بالدلتا المصرية سنة ١٣٠٦ هـ
      (الموافق ١٨٨٨ ميلادي)، وتخرج من «مدرسة القضاء
      الشرعي» سنة ١٣٣٤ هـ (١٩١٥ ميلادي)، وعمل
      مفتشاً بالمحاكم الشرعية في وزارة العدل
      المصرية منذ سنة ١٣٤٢ هـ (١٩٢٤ ميلادي)، ثم
      انتقل إلى التدريس بجامعة القاهرة. وكتابه
      «علم أصول الفقه» — في مجلد واحد، نشر سنة
      ١٣٦١ هـ (١٩٤٢ ميلادي) وأعيد طبعه أكثر من
      أربعين طبعة — هو الكتاب التمهيدي السائد في
      أصول الفقه السني في المناهج العربية والمناهج
      الآسيوية المترجمة، إلى جانب كتاب مناع القطان.
      ومن مصنفاته أيضاً: «السياسة الشرعية» و«مصادر
      التشريع الإسلامي فيما لا نص فيه» و«أحكام
      الأحوال الشخصية في الشريعة الإسلامية».
    description_fr: |
      ʿAbd al-Wahhāb Khallāf — juriste sunnite ḥanafite
      égyptien d'al-Azhar et du Collège des Juges de la
      Sharīʿa (Madrasat al-Quḍāh al-Sharʿiyya), longtemps
      professeur d'*uṣūl al-fiqh* à la Faculté de droit
      de l'Université du Caire à partir de 1934, et
      auteur du manuel universitaire sunnite de théorie
      juridique le plus largement utilisé au XXe siècle
      — mourut au Caire en 1376 H (1956 EC) âgé de
      67 ans (lunaire) / 68 (solaire). Né à Kafr
      al-Zayyāt dans le delta égyptien en 1306 H
      (1888 EC) et diplômé du Collège des Juges de la
      Sharīʿa en 1334 H (1915 EC), il servit comme
      Inspecteur des cours de la Sharīʿa au ministère
      égyptien de la Justice à partir de 1924, puis
      passa à l'enseignement académique à l'Université
      du Caire. Son *ʿIlm Uṣūl al-Fiqh* — un manuel en
      un volume publié pour la première fois en 1942
      et réimprimé en plus de quarante éditions — est
      le manuel introductif standard sur la théorie
      juridique sunnite dans les cursus arabes et
      asiatiques traduits, avec celui de Manāʿ
      al-Qaṭṭān. Ses autres œuvres comprennent
      *al-Siyāsa al-Sharʿiyya*, *Maṣādir al-Tashrīʿ
      al-Islāmī fī mā lā Naṣṣa fīh* et *Aḥkām
      al-Aḥwāl al-Shakhṣiyya fī al-Sharīʿa
      al-Islāmiyya*.
