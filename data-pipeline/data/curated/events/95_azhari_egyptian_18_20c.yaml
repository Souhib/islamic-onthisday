        is_canonical: true
        notes: "Article 'al-Dardīr, Aḥmad ibn Muḥammad' in EI2 records death 6 Rabīʿ al-Awwal 1201 / 27 December 1786 at Cairo."
      - source_key: editorial
        notes: "Khalwatī initiation through al-Ḥifnī and his role as Shaykh of the Mālikī riwāq at al-Azhar attested in standard Egyptian Mālikī biographies."
