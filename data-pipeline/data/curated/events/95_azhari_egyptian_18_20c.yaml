  - slug: death-of-al-mahdi-al-abbasi-hanafi
    category: scholar_death
    title_en: Death of Muḥammad al-Mahdī al-ʿAbbāsī — Ḥanafī Grand Muftī of Egypt
    title_ar: وفاة الشيخ محمد المهدي العباسي — مفتي الديار المصرية الحنفي
    title_fr: Mort de Muḥammad al-Mahdī al-ʿAbbāsī — Grand Muftī ḥanafite d'Égypte
    description_en: |
      Muḥammad al-Mahdī ibn Muḥammad Amīn al-ʿAbbāsī —
      Egyptian Sunni Ḥanafī jurist, Grand Muftī of
      Egypt from 1264 AH (1848 CE) until 1314 AH
      (1897 CE) with brief intervals, and Shaykh
      al-Azhar in 1287-1299 AH (1870-1881 CE) — died
      at Cairo in 1315 AH (1897 CE) aged about
      seventy. Born at Cairo in 1242 AH (1827 CE) into
      the long-established al-ʿAbbāsī family of
      Ḥanafī jurists, he succeeded his father as
      Grand Muftī of Egypt and shaped the
      institutional consolidation of Egyptian Ḥanafī
      fatwa practice as the Khedival state was
      modernising. His seven-volume *al-Fatāwā
      al-Mahdiyya fī al-Waqāʾiʿ al-Miṣriyya* —
      collected from his fatwas issued between 1264
      AH (1848 CE) and 1314 AH (1897 CE) — is a
      principal source for the social, economic, and
      legal history of nineteenth-century Egypt and
      the most widely cited Ḥanafī fatwa collection
      of the period. He resigned his Azhar
      shaykhdom on the eve of the ʿUrābī revolt
      and was succeeded as Grand Muftī by ʿAbd
      al-Qādir al-Rāfiʿī.
    description_ar: |
      توفي الشيخ محمد المهدي بن محمد أمين العباسي —
      الفقيه السني الحنفي المصري، مفتي الديار
      المصرية منذ سنة ١٢٦٤ هـ (١٨٤٨ ميلادي) إلى سنة
      ١٣١٤ هـ (١٨٩٧ ميلادي) مع فترات قصار، وشيخ
      الجامع الأزهر سنة ١٢٨٧ إلى ١٢٩٩ هـ (١٨٧٠-١٨٨١
      ميلادي) — بالقاهرة سنة ١٣١٥ هـ (الموافق ١٨٩٧
      ميلادي) عن نحو سبعين سنة. ولد بالقاهرة سنة
      ١٢٤٢ هـ (الموافق ١٨٢٧ ميلادي) في أسرة العباسي
      الحنفية المصرية الراسخة في الفتوى، وخلف أباه
      في منصب الإفتاء، وصاغ التماسك المؤسسي للفتوى
      المصرية الحنفية في زمن تحديث الدولة الخديوية.
      و«الفتاوى المهدية في الوقائع المصرية» في
      سبعة مجلدات، المجموعة من فتاويه ما بين سنة
      ١٢٦٤ و١٣١٤ هـ (١٨٤٨-١٨٩٧ ميلادي)، من أهم
      المصادر للتاريخ الاجتماعي والاقتصادي والقانوني
      لمصر في القرن التاسع عشر الميلادي، ومن أوسع
      مجاميع الفتاوى الحنفية تداولاً في تلك الحقبة.
      اعتزل مشيخة الأزهر عشية الثورة العرابية، وخلفه
      في الإفتاء عبد القادر الرافعي.
    description_fr: |
      Muḥammad al-Mahdī ibn Muḥammad Amīn al-ʿAbbāsī —
      juriste sunnite ḥanafite égyptien, Grand Muftī
      d'Égypte de 1264 H (1848 EC) à 1314 H (1897 EC)
      avec de brefs intervalles, et Shaykh d'al-Azhar
      en 1287-1299 H (1870-1881 EC) — mourut au Caire
      en 1315 H (1897 EC) âgé d'environ soixante-dix
      ans. Né au Caire en 1242 H (1827 EC) dans la
      famille al-ʿAbbāsī de juristes ḥanafites
      égyptiens de longue date, il succéda à son père
      comme Grand Muftī d'Égypte et façonna la
      consolidation institutionnelle de la pratique
      égyptienne ḥanafite de la fatwa pendant la
      modernisation de l'État khédival. Son
      *al-Fatāwā al-Mahdiyya fī al-Waqāʾiʿ
      al-Miṣriyya* en sept volumes — réuni à partir de
      ses fatwas émises entre 1264 H (1848 EC) et
      1314 H (1897 EC) — est une source principale
      pour l'histoire sociale, économique et
      juridique de l'Égypte du XIXe siècle, et la
      collection de fatwas ḥanafites la plus
      largement citée de la période. Il démissionna de
      la *mashyakha* d'al-Azhar à la veille de la
      révolte d'ʿUrābī, et eut pour successeur au
      poste de Grand Muftī ʿAbd al-Qādir al-Rāfiʿī.
    canonical_hijri: {year: 1315, precision: year}
    canonical_gregorian: {date: 1897-06-02, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Article 'al-Mahdī al-ʿAbbāsī, Muḥammad' in EI2 records death 1315 AH / 1897 CE at Cairo."
      - source_key: editorial
        notes: "Tenure as Grand Muftī of Egypt 1264-1314 AH and Shaykh al-Azhar 1287-1299 AH attested in Rudolph Peters, *The Fatwas of Muhammad al-ʿAbbasi al-Mahdi*, *Islamic Law and Society* 1.1 (1994)."
