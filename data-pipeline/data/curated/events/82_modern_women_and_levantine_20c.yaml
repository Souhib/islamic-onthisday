  # TUNISIAN-AZHARI FIQH
  # =========================================================================

  - slug: death-of-muhammad-al-madani
    category: scholar_death
    title_en: Death of Muḥammad al-Madanī — Tunisian-Azhari Fiqh Scholar
    title_ar: وفاة الشيخ محمد المدني — العالم التونسي الأزهري الفقيه
    title_fr: Mort de Muḥammad al-Madanī — savant tunisien-azharien du fiqh
    description_en: |
      Muḥammad al-Madanī — Tunisian-born Sunni Mālikī
      jurist, longtime professor at the Zaytūna and
      thereafter at al-Azhar, dean of the Faculty of
      Sharīʿa at al-Azhar in the 1960s, founding editor
      of the al-Azhar journal *Liwāʾ al-Islām*, and
      member of the Academy of the Arabic Language —
      died at Cairo in 1387 AH (1968 CE). Born in
      Tunisia in 1325 AH (1907 CE), he studied at the
      Zaytūna Mosque-University before moving to Egypt
      in the 1930s, where he completed his doctoral
      training at al-Azhar under the early modernised
      Faculty of Sharīʿa. As a Mālikī jurist he wrote on
      *uṣūl al-fiqh*, comparative *fiqh* across the
      four Sunni madhāhib, and the place of Islamic
      legal reasoning in the modern Arab states. His
      authored works include *al-Mujtamaʿ al-Islāmī
      kamā Yunaẓẓimuhu al-Qurʾān* (a multi-volume
      study of the Qurʾanic vision of social order),
      *Aṣālat al-Sharīʿa al-Islāmiyya wa-Khatm al-
      Risāla*, and edited articles in *Liwāʾ al-Islām*
      across the period.
    description_ar: |
      توفي الشيخ محمد المدني — الفقيه السني المالكي
      التونسي الأصل، أستاذ جامع الزيتونة والأزهر
      الشريف سنين طويلة، عميد كلية الشريعة بالأزهر في
      ستينات القرن العشرين الميلادي، ورئيس تحرير مجلة
      الأزهر «لواء الإسلام» ومؤسسها، وعضو مجمع اللغة
      العربية — بالقاهرة سنة ١٣٨٧ هـ (الموافق ١٩٦٨
      ميلادي). ولد بتونس سنة ١٣٢٥ هـ (١٩٠٧ ميلادي)،
      ودرس بجامع الزيتونة، ثم انتقل إلى مصر في
      ثلاثينات القرن العشرين الميلادي حيث أتمّ
      دراسته الجامعية بكلية الشريعة المُنشأة حديثاً
      بالأزهر. كتب على المذهب المالكي وفي أصول الفقه
      وفقه المقارنة بين المذاهب السنية الأربعة
      ومكانة الاجتهاد الإسلامي في الدول العربية
      الحديثة. ومن مؤلفاته: «المجتمع الإسلامي كما
      ينظمه القرآن» في عدة أجزاء، و«أصالة الشريعة
      الإسلامية وختم الرسالة»، ومقالات حررها بـ«لواء
      الإسلام» على مدى عقود.
    description_fr: |
      Muḥammad al-Madanī — juriste sunnite mālikite né
      en Tunisie, longtemps professeur à la Zaytūna
      puis à al-Azhar, doyen de la Faculté de Sharīʿa
      d'al-Azhar dans les années 1960, rédacteur en
      chef fondateur de la revue d'al-Azhar *Liwāʾ
      al-Islām*, et membre de l'Académie de la Langue
      Arabe — mourut au Caire en 1387 H (1968 EC). Né
      en Tunisie en 1325 H (1907 EC), il étudia à la
      Mosquée-Université Zaytūna avant de s'installer
      en Égypte dans les années 1930, où il compléta
      sa formation doctorale à al-Azhar dans la
      Faculté de Sharīʿa nouvellement modernisée. En
      tant que juriste mālikite il écrivit sur l'*uṣūl
      al-fiqh*, le fiqh comparé entre les quatre
      écoles sunnites et la place du raisonnement
      juridique islamique dans les États arabes
      modernes. Ses œuvres comprennent *al-Mujtamaʿ
      al-Islāmī kamā Yunaẓẓimuhu al-Qurʾān* (une
      étude en plusieurs volumes de la vision
      coranique de l'ordre social), *Aṣālat al-
      Sharīʿa al-Islāmiyya wa-Khatm al-Risāla* et
      ses éditoriaux dans *Liwāʾ al-Islām* tout au
      long de cette période.
    canonical_hijri: {year: 1387, precision: year}
    canonical_gregorian: {date: 1968-01-01, precision: year, method: tabular_conversion}
