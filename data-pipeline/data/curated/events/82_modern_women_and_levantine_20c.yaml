  # MODERN MUSLIM WOMEN SCHOLARS
  # =========================================================================

  - slug: death-of-bint-al-shati
    category: scholar_death
    title_en: Death of Bint al-Shāṭiʾ — ʿĀʾisha ʿAbd al-Raḥmān, Egyptian Qurʾān Scholar
    title_ar: وفاة بنت الشاطئ — الدكتورة عائشة عبد الرحمن الباحثة المصرية في القرآن الكريم
    title_fr: Mort de Bint al-Shāṭiʾ — ʿĀʾisha ʿAbd al-Raḥmān, savante égyptienne du Coran
    description_en: |
      ʿĀʾisha bint Muḥammad ʿAlī ʿAbd al-Raḥmān, writing
      under the pen-name Bint al-Shāṭiʾ ("Daughter of the
      [Nile] Shore") — Egyptian Sunni scholar of Arabic
      literature and Qurʾanic studies, doctorate in Arabic
      literature from Cairo's Fuʾād I (later Cairo)
      University in 1950, and longtime professor of
      Qurʾanic studies at ʿAyn Shams University in Cairo
      and Qarawiyyīn-affiliated faculties in Morocco —
      died at Cairo on 12 Shaʿbān 1419 AH (1 December
      1998 CE) at age 86. Born at Dimyāṭ on the
      Mediterranean Egyptian coast in 1913, she was the
      wife and intellectual partner of the Azharī mufassir
      Amīn al-Khūlī. Her two-volume *al-Tafsīr al-Bayānī
      lil-Qurʾān al-Karīm* developed an influential
      *bayānī* (rhetorical-stylistic) approach to
      Qurʾanic exegesis applied especially to the short
      Meccan suras. Her broader corpus includes *al-Iʿjāz
      al-Bayānī lil-Qurʾān*, *Maqāl fī al-Insān: Dirāsa
      Qurʾāniyya*, biographies of the *Mothers of the
      Believers* and of the Prophet's ﷺ daughters, and
      novels and Arabic-literature studies. She was one
      of the most-cited Arab Sunni women academics of the
      twentieth century.
    description_ar: |
      توفيت الدكتورة عائشة بنت محمد علي عبد الرحمن،
      المعروفة بالاسم الأدبي بنت الشاطئ — العالمة
      السنية المصرية في الأدب العربي والدراسات
      القرآنية، حاصلة على دكتوراه الأدب العربي من
      جامعة فؤاد الأول (جامعة القاهرة لاحقاً) سنة
      ١٣٧٠ هـ (١٩٥٠ ميلادي)، وأستاذة الدراسات
      القرآنية بجامعة عين شمس بالقاهرة وبكليات
      ملحقة بجامعة القرويين بالمغرب سنين طويلة —
      بالقاهرة يوم ١٢ شعبان سنة ١٤١٩ هـ (الموافق
      ١ ديسمبر ١٩٩٨ ميلادي) عن ست وثمانين سنة. ولدت
      بمدينة دمياط على الساحل المصري المتوسطي سنة
      ١٣٣٢ هـ (١٩١٣ ميلادي)، وكانت زوجة المفسر
      الأزهري الشيخ أمين الخولي وشريكته الفكرية.
      وتفسيرها «التفسير البياني للقرآن الكريم» في
      جزأين أرسى منهجاً «بيانياً» (بلاغياً
      أسلوبياً) مؤثراً في تفسير القرآن الكريم
      طبقته خاصة على السور المكية القصيرة. ومن
      مؤلفاتها الأخرى: «الإعجاز البياني للقرآن»،
      و«مقال في الإنسان: دراسة قرآنية»، وتراجم
      «أمهات المؤمنين» وتراجم بنات النبي ﷺ، فضلاً
      عن روايات ودراسات في الأدب العربي. وهي من
      أكثر العالمات السنيات العربيات استشهاداً بهنّ
      في القرن العشرين الميلادي.
    description_fr: |
      ʿĀʾisha bint Muḥammad ʿAlī ʿAbd al-Raḥmān,
      écrivant sous le nom de plume Bint al-Shāṭiʾ
      (« Fille de la rive [du Nil] ») — savante
      sunnite égyptienne de littérature arabe et
      d'études coraniques, docteure en littérature
      arabe de l'Université Fuʾād I (plus tard
      Université du Caire) en 1950, et longtemps
      professeure d'études coraniques à l'Université
      ʿAyn Shams au Caire et dans les facultés
      affiliées à al-Qarawiyyīn au Maroc — mourut au
      Caire le 12 Shaʿbān 1419 H (1er décembre 1998
      EC) à l'âge de 86 ans. Née à Damiette sur la
      côte méditerranéenne d'Égypte en 1913, elle fut
      l'épouse et la partenaire intellectuelle du
      mufassir azharien Amīn al-Khūlī. Son *al-
      Tafsīr al-Bayānī lil-Qurʾān al-Karīm* en deux
      volumes développa une approche *bayānī*
      (rhétorico-stylistique) influente de l'exégèse
      coranique appliquée en particulier aux courtes
      sourates mecquoises. Son corpus comprend
      également *al-Iʿjāz al-Bayānī lil-Qurʾān*,
      *Maqāl fī al-Insān: Dirāsa Qurʾāniyya*, des
      biographies des *Mères des Croyants* et des
      filles du Prophète ﷺ, ainsi que des romans et
      des études de littérature arabe. Elle figure
      parmi les femmes universitaires sunnites
      arabes les plus citées du XXe siècle.
    canonical_hijri: {year: 1419, month: 8, day: 12, precision: day}
    canonical_gregorian: {date: 1998-12-01, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Article 'ʿAbd al-Raḥmān, ʿĀʾisha (Bint al-Shāṭiʾ)' in EI2 supplements records death December 1998 in Cairo."
      - source_key: editorial
        notes: "Doctorate at Fuʾād I University (1950), academic career at ʿAyn Shams, and authored corpus including the two-volume *al-Tafsīr al-Bayānī* attested in standard biographies."
