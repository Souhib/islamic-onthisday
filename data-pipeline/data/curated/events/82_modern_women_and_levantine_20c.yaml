# Wave 30 of curated event additions (2026-04-27).
# Twelve modern figures: two notable Egyptian Muslim women scholars
# (Bint al-Shāṭiʾ — ʿĀʾisha ʿAbd al-Raḥmān, and Zaynab al-Ghazālī),
# and ten 19th–20th century Sunni scholars from Egypt, the Levant,
# and Tunisia previously absent from the dataset. Coverage spans
# the late-Ottoman Beiruti Sufi-traditionalist (al-Nabhānī), the
# Egyptian Hanafī muftī (Bakhīt al-Muṭīʿī), the Damascene reformist
# circle (al-Qāsimī, al-Jazāʾirī), the Shaykhs of al-Azhar before
# and after Maḥmūd Shaltūt (Salīm al-Bishrī, Muḥammad al-Khaḍir
# Ḥusayn), Tunisian-Azhari fiqh (Muḥammad al-Madanī), the Egyptian
# Azharī modernist (Muḥammad al-Bahī), the Brotherhood-adjacent
# Egyptian muḥaddith and organizer of *al-Fatḥ al-Rabbānī*
# (ʿAbd al-Raḥmān al-Bannā al-Sāʿātī, father of Ḥasan al-Bannā),
# and the Syrian Islamic-revivalist scholar (Saʿīd Ḥawwā). All
# entries are presented factually-historically, without
# endorsement or condemnation, and span the broad Sunni
# spectrum (Sufi-traditionalist, Ash'arī-Māturīdī, modernist-
# Azhari, Brotherhood). Already-covered figures (Maḥmūd Shaltūt,
# Aḥmad Ḥasan al-Bāqūrī, Muḥammad ibn Ibrāhīm Āl al-Shaykh,
# al-Albānī, Muṣṭafā ʿAbd al-Razzāq al-Sanhūrī) are skipped.
# Sources: EI2, EI3 where available, academic biographies, and
# editorial compilation. No hadith refs. Trilingual en/ar/fr
# throughout.

events:
  # =========================================================================
  # LATE-OTTOMAN BEIRUTI SUFI TRADITIONALIST
  # =========================================================================

  - slug: death-of-yusuf-al-nabhani
    category: scholar_death
    title_en: Death of Yūsuf al-Nabhānī — Beiruti Sunni Sufi-Traditionalist
    title_ar: وفاة الشيخ يوسف النبهاني — العالم السني الصوفي البيروتي
    title_fr: Mort de Yūsuf al-Nabhānī — savant sunnite traditionaliste-soufi de Beyrouth
    description_en: |
      Yūsuf ibn Ismāʿīl al-Nabhānī — late-Ottoman Sunni
      Shāfiʿī-Sufi scholar, judge of the *Maḥkama Niẓāmiyya*
      Court of Appeal in Beirut for some twenty-five years
      until 1909, defender of the classical madhhab system
      and of the *mawlid*-celebrating Sufi tradition against
      the rising Salafiyya current of his day — died at
      Beirut on 8 Ramaḍān 1350 AH (16 January 1932 CE) at
      age about eighty-three. Born at Ijzim near Haifa
      (Palestine) and educated at al-Azhar in Cairo, he
      held judicial posts in the Ottoman vilayets of Latakia,
      Mosul (where he served as president of the criminal
      court), and Beirut. His Arabic corpus of more than
      forty-eight published works includes the two-volume
      devotional compilation *Saʿādat al-Dārayn fī al-Ṣalāh
      ʿalā Sayyid al-Kawnayn ﷺ*, the *mawlid*-defending
      *Jawāhir al-Biḥār fī Faḍāʾil al-Nabī al-Mukhtār ﷺ*
      in four volumes, *Shawāhid al-Ḥaqq fī al-Istighātha
      bi-Sayyid al-Khalq ﷺ*, and a wide range of poetic
      and prose celebrations of the Prophet's ﷺ
      excellences within the late-Ottoman Sunni
      Sufi-traditionalist current.
    description_ar: |
      توفي العلامة الشيخ يوسف بن إسماعيل النبهاني — العالم
      السني الشافعي الصوفي العثماني المتأخر، رئيس قضاة
      المحكمة النظامية للاستئناف ببيروت نحو خمس وعشرين
      سنة إلى سنة ١٣٢٧ هـ (١٩٠٩ ميلادي)، ومدافع عن
      نظام المذاهب الكلاسيكي وعن تراث المولد الصوفي
      السني في وجه التيار السلفي الناهض في عصره —
      ببيروت يوم ٨ رمضان سنة ١٣٥٠ هـ (الموافق ١٦ جانفي
      ١٩٣٢ ميلادي) عن نحو ثلاث وثمانين سنة. ولد بقرية
      إجزم قرب حيفا بفلسطين، وتعلم بالأزهر الشريف
      بالقاهرة، وتقلد القضاء في ولايات اللاذقية والموصل
      (حيث كان رئيس محكمة الجزاء بها) وبيروت. ومن
      مصنفاته العربية المنشورة وهي تزيد على ثمانٍ
      وأربعين كتاباً «سعادة الدارين في الصلاة على سيد
      الكونين ﷺ» في جزأين، و«جواهر البحار في فضائل
      النبي المختار ﷺ» في أربعة مجلدات في الذب عن
      المولد، و«شواهد الحق في الاستغاثة بسيد الخلق ﷺ»،
      ومجموعات شعرية ونثرية كبيرة في إبراز شمائل
      النبي ﷺ ضمن التيار السني الصوفي التقليدي
      العثماني المتأخر.
    description_fr: |
      Yūsuf ibn Ismāʿīl al-Nabhānī — savant sunnite shāfiʿite-
      soufi de la fin de l'époque ottomane, président de la
      cour d'appel *Maḥkama Niẓāmiyya* de Beyrouth pendant
      environ vingt-cinq ans jusqu'en 1909, défenseur du
      système classique des écoles juridiques et de la
      tradition soufie de célébration du *mawlid* face au
      courant salafiyya montant de son époque — mourut à
      Beyrouth le 8 Ramaḍān 1350 H (16 janvier 1932 EC)
      à l'âge d'environ quatre-vingt-trois ans. Né à
      Ijzim près de Haïfa (Palestine) et formé à al-Azhar
      au Caire, il occupa des charges judiciaires dans les
      vilayets ottomans de Lattaquié, Mossoul (où il
      présida la cour pénale) et Beyrouth. Son corpus
      arabe de plus de quarante-huit ouvrages publiés
      comprend la compilation dévotionnelle en deux
      volumes *Saʿādat al-Dārayn fī al-Ṣalāh ʿalā Sayyid
      al-Kawnayn ﷺ*, le *Jawāhir al-Biḥār fī Faḍāʾil
      al-Nabī al-Mukhtār ﷺ* en quatre volumes consacré à
      la défense du *mawlid*, *Shawāhid al-Ḥaqq fī al-
      Istighātha bi-Sayyid al-Khalq ﷺ*, et un large
      éventail de célébrations poétiques et prosaïques
      des excellences du Prophète ﷺ au sein du courant
      sunnite soufi-traditionaliste de la fin de l'époque
      ottomane.
    canonical_hijri: {year: 1350, month: 9, day: 8, precision: day}
    canonical_gregorian: {date: 1932-01-16, precision: day, method: attested}
