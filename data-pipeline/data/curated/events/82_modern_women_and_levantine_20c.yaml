  - slug: death-of-abd-al-rahman-al-banna-al-saati
    category: scholar_death
    title_en: Death of ʿAbd al-Raḥmān al-Bannā al-Sāʿātī — Organizer of *al-Fatḥ al-Rabbānī*
    title_ar: وفاة الشيخ عبد الرحمن البنا الساعاتي — مرتب «الفتح الرباني»
    title_fr: Mort de ʿAbd al-Raḥmān al-Bannā al-Sāʿātī — éditeur de *al-Fatḥ al-Rabbānī*
    description_en: |
      ʿAbd al-Raḥmān ibn Muḥammad ibn Aḥmad al-Bannā al-
      Sāʿātī — Egyptian Sunni Hanafī muḥaddith and the
      father of Ḥasan al-Bannā, founder of the Society of
      the Muslim Brotherhood — died at Cairo in
      1378 AH (1958 CE) at age about eighty. Born at
      al-Maḥmūdiyya near Alexandria in 1298 AH (1881 CE),
      he studied at al-Azhar before settling at his home
      mosque in al-Maḥmūdiyya, where he combined his
      living as a watch-repairer (whence the *nisba*
      *al-Sāʿātī*, "the watchmaker") with the long
      labour of organising the Musnad of Imām Aḥmad ibn
      Ḥanbal alphabetically by Companion-narrator. The
      result, *al-Fatḥ al-Rabbānī li-Tartīb Musnad al-
      Imām Aḥmad ibn Ḥanbal al-Shaybānī*, in twenty-
      three volumes with the accompanying *Bulūgh al-
      Amānī fī Asrār al-Fatḥ al-Rabbānī* commentary, is
      one of the major modern reorganisations of a
      classical hadith collection and remains widely
      consulted across the Sunni world. He also authored
      a sīra in verse (*al-Sīra al-Naẓmiyya*) and a
      manual of forty selected hadiths.
    description_ar: |
      توفي الشيخ عبد الرحمن بن محمد بن أحمد البنا
      الساعاتي — المحدث السني الحنفي المصري ووالد
      الإمام حسن البنا مؤسس جماعة الإخوان المسلمين —
      بالقاهرة سنة ١٣٧٨ هـ (الموافق ١٩٥٨ ميلادي) عن
      نحو ثمانين سنة. ولد ببلدة المحمودية بمحافظة
      البحيرة بالقرب من الإسكندرية سنة ١٢٩٨ هـ
      (١٨٨١ ميلادي)، ودرس بالأزهر الشريف ثم استقر
      بمسجد بلدته بالمحمودية، حيث جمع بين الكسب من
      مهنة إصلاح الساعات (ومنها نسبته «الساعاتي»)
      وبين العمل العلمي الطويل في ترتيب «مسند
      الإمام أحمد بن حنبل» على أبواب الفقه. وقد
      تمخّض هذا الجهد عن «الفتح الرباني لترتيب
      مسند الإمام أحمد بن حنبل الشيباني» في ثلاثة
      وعشرين مجلداً مع شرحه «بلوغ الأماني في أسرار
      الفتح الرباني»، وهو من أكبر التحقيقات الحديثة
      على مجموع حديثي كلاسيكي، ولا يزال متداولاً في
      العالم السني. وله أيضاً «السيرة النظمية» في
      السيرة النبوية شعراً، و«الأربعون النبوية»
      المختارة.
    description_fr: |
      ʿAbd al-Raḥmān ibn Muḥammad ibn Aḥmad al-Bannā
      al-Sāʿātī — muḥaddith sunnite hanafite égyptien
      et père de Ḥasan al-Bannā, fondateur de la
      Société des Frères musulmans — mourut au Caire
      en 1378 H (1958 EC) à l'âge d'environ quatre-
      vingts ans. Né à al-Maḥmūdiyya près d'Alexandrie
      en 1298 H (1881 EC), il étudia à al-Azhar avant
      de s'établir dans la mosquée de sa ville natale
      à al-Maḥmūdiyya, où il combina son métier de
      réparateur d'horloges (d'où la *nisba*
      *al-Sāʿātī*, « l'horloger ») avec le long
      travail de réorganisation alphabétique-thématique
      du Musnad de l'imam Aḥmad ibn Ḥanbal. Le résultat,
      *al-Fatḥ al-Rabbānī li-Tartīb Musnad al-Imām
      Aḥmad ibn Ḥanbal al-Shaybānī*, en vingt-trois
      volumes accompagné de son commentaire *Bulūgh
      al-Amānī fī Asrār al-Fatḥ al-Rabbānī*, est l'une
      des grandes réorganisations modernes d'une
      collection classique de hadith et demeure
      largement consultée dans le monde sunnite. Il
      rédigea également une sīra en vers (*al-Sīra
      al-Naẓmiyya*) et un manuel de quarante hadiths
      choisis.
    canonical_hijri: {year: 1378, precision: year}
    canonical_gregorian: {date: 1958-09-08, precision: day, method: attested}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Death in 1378 AH / September 1958 in Cairo attested in standard Egyptian biographical sources; precise day variously reported across the secondary literature, so day-attested Gregorian is used with year-precision Hijri."
    people: [[abd-al-rahman-al-banna-al-saati, died], [hassan-al-banna, subject]]
