      - source_key: ei2
        is_canonical: true
        notes: "Article 'al-Bishrī, Salīm' in EI2 records death February 1917 in Cairo; standard biographies give Rabīʿ al-Thānī 1335 AH."
      - source_key: editorial
        notes: "Two terms as Shaykh of al-Azhar (1900–1904, 1909–1916) and Mālikī fatwa corpus attested in al-Azhar institutional records."
    people: [[salim-al-bishri, died]]
