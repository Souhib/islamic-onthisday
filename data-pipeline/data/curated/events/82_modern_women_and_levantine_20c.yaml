  - slug: death-of-tahir-al-jazairi
    category: scholar_death
    title_en: Death of Ṭāhir al-Jazāʾirī — Damascene Educator and Reformer
    title_ar: وفاة الشيخ طاهر الجزائري — المربي والمصلح الدمشقي
    title_fr: Mort de Ṭāhir al-Jazāʾirī — éducateur et réformateur damascène
    description_en: |
      Ṭāhir ibn Ṣāliḥ al-Jazāʾirī — Damascene Sunni scholar
      of Algerian descent, founding figure of late-Ottoman
      Syrian educational reform, founder of the Ẓāhiriyya
      Library (*Dār al-Kutub al-Ẓāhiriyya*) in Damascus in
      1880 and the *Sulṭāniyya* Library in 1903, and one
      of the principal teachers of the Damascene reformist
      circle that produced Jamāl al-Dīn al-Qāsimī, Muḥammad
      Kurd ʿAlī, and Salīm al-Bukhārī — died at Damascus on
      14 Rabīʿ al-Thānī 1338 AH (5 January 1920 CE) at
      age 68. Born in Damascus in 1268 AH (1851 CE) of a
      Maghrebī family that had migrated from Algeria after
      the French conquest, he served the Ottoman Ministry
      of Public Instruction in Damascus from 1875 onward
      and was charged with reorganising public-school
      curricula in Greater Syria. His authored corpus
      includes *Tawjīh al-Naẓar ilā Uṣūl al-Athar* on the
      sciences of hadith, *al-Tibyān li-Baʿḍ al-Mabāḥith
      al-Mutaʿalliqa bi-l-Qurʾān ʿalā Ṭarīq al-Itqān*,
      and a series of pedagogical primers in Arabic
      grammar and arithmetic widely used in late-Ottoman
      schools.
    description_ar: |
      توفي الشيخ طاهر بن صالح الجزائري — العالم السني
      الدمشقي ذو الأصل الجزائري، الرائد في إصلاح
      التعليم بالشام في أواخر العهد العثماني، مؤسس
      المكتبة الظاهرية (دار الكتب الظاهرية) بدمشق سنة
      ١٢٩٧ هـ (١٨٨٠ ميلادي) والمكتبة السلطانية سنة
      ١٣٢١ هـ (١٩٠٣ ميلادي)، وأحد كبار شيوخ حلقة
      الإصلاح الدمشقية التي خرج منها جمال الدين
      القاسمي ومحمد كرد علي وسليم البخاري — بدمشق يوم
      ١٤ ربيع الثاني سنة ١٣٣٨ هـ (الموافق ٥ جانفي
      ١٩٢٠ ميلادي) عن ثمان وستين سنة. ولد بدمشق سنة
      ١٢٦٨ هـ (١٨٥١ ميلادي) لأسرة مغربية مهاجرة من
      الجزائر بعد الاحتلال الفرنسي، وعمل في نظارة
      المعارف العثمانية بدمشق منذ سنة ١٢٩٢ هـ (١٨٧٥
      ميلادي)، وأنيط به تنظيم مناهج المدارس العامة
      ببلاد الشام. ومن مؤلفاته: «توجيه النظر إلى أصول
      الأثر» في علوم الحديث، و«التبيان لبعض المباحث
      المتعلقة بالقرآن على طريق الإتقان»، وسلسلة من
      الكتب التعليمية الميسرة في النحو والحساب
      المتداولة في مدارس الدولة العثمانية المتأخرة.
    description_fr: |
      Ṭāhir ibn Ṣāliḥ al-Jazāʾirī — savant sunnite
      damascène d'origine algérienne, figure fondatrice
      de la réforme de l'enseignement syrien à la fin de
      l'époque ottomane, fondateur de la Bibliothèque
      Ẓāhiriyya (*Dār al-Kutub al-Ẓāhiriyya*) à Damas en
      1880 et de la Bibliothèque *Sulṭāniyya* en 1903,
      et l'un des principaux maîtres du cercle
      réformiste damascène d'où sortirent Jamāl al-Dīn
      al-Qāsimī, Muḥammad Kurd ʿAlī et Salīm al-Bukhārī
      — mourut à Damas le 14 Rabīʿ al-Thānī 1338 H
      (5 janvier 1920 EC) à l'âge de 68 ans. Né à Damas
      en 1268 H (1851 EC) dans une famille maghrébine
      ayant émigré d'Algérie après la conquête française,
      il servit le Ministère ottoman de l'Instruction
      Publique à Damas à partir de 1875 et fut chargé de
      la réorganisation des programmes scolaires
      publics en Grande Syrie. Son corpus comprend
      *Tawjīh al-Naẓar ilā Uṣūl al-Athar* sur les
      sciences du hadith, *al-Tibyān li-Baʿḍ al-Mabāḥith
      al-Mutaʿalliqa bi-l-Qurʾān ʿalā Ṭarīq al-Itqān* et
      une série de manuels pédagogiques de grammaire
      arabe et d'arithmétique largement utilisés dans
      les écoles ottomanes tardives.
