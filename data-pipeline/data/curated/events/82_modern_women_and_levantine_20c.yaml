  - slug: death-of-muhammad-al-khadir-husayn
    category: scholar_death
    title_en: Death of Muḥammad al-Khaḍir Ḥusayn — Tunisian Shaykh of al-Azhar
    title_ar: وفاة الشيخ محمد الخضر حسين — شيخ الأزهر التونسي
    title_fr: Mort de Muḥammad al-Khaḍir Ḥusayn — Shaykh tunisien d'al-Azhar
    description_en: |
      Muḥammad al-Khaḍir ibn al-Ḥusayn ibn ʿAlī Ibn ʿUmar
      — Tunisian-born Sunni Mālikī jurist and Sufi, Shaykh
      of al-Azhar from October 1952 to January 1954,
      founding member of the Academy of the Arabic
      Language in Cairo, and leading figure of the post-
      colonial North African Sunni scholarly diaspora —
      died at Cairo on 13 Rajab 1377 AH (3 February 1958
      CE) at age 82. Born at Nefta (south Tunisia) in
      1293 AH (1876 CE), he studied at the Zaytūna
      Mosque-University in Tunis and later taught
      Mālikī fiqh, *uṣūl*, and Arabic literature there
      before leaving Tunisia under French Protectorate
      pressure for Damascus in 1912 and ultimately
      Cairo in 1920. He served on al-Azhar's Council of
      Senior Scholars and edited the journal *Liwāʾ al-
      Islām*. His written corpus includes *Naqḍ Kitāb
      fī al-Shiʿr al-Jāhilī* (a critical response to
      Ṭāhā Ḥusayn's *On Pre-Islamic Poetry*), *al-
      Qiyās fī al-Lugha al-ʿArabiyya*, *Naqḍ Kitāb
      al-Islām wa Uṣūl al-Ḥukm* (against ʿAlī ʿAbd al-
      Rāziq), *al-Daʿwa ilā al-Iṣlāḥ*, and a published
      *Dīwān* of his Arabic poetry.
    description_ar: |
      توفي الإمام محمد الخضر بن الحسين بن علي بن عمر —
      الفقيه السني المالكي والصوفي التونسي الأصل،
      شيخ الأزهر الشريف من ذي الحجة سنة ١٣٧١ هـ
      (أكتوبر ١٩٥٢ ميلادي) إلى جمادى الأولى سنة ١٣٧٣ هـ
      (جانفي ١٩٥٤ ميلادي)، والعضو المؤسس لمجمع اللغة
      العربية بالقاهرة، ومن أكابر علماء المهجر السني
      المغاربي بعد الاستعمار — بالقاهرة يوم ١٣ رجب
      سنة ١٣٧٧ هـ (الموافق ٣ فيفري ١٩٥٨ ميلادي) عن
      اثنتين وثمانين سنة. ولد بمدينة نفطة بالجنوب
      التونسي سنة ١٢٩٣ هـ (١٨٧٦ ميلادي)، ودرس بجامع
      الزيتونة بتونس، ثم درّس فيه الفقه المالكي
      وأصوله والآداب العربية، حتى غادر تونس تحت ضغط
      الحماية الفرنسية إلى دمشق سنة ١٣٣٠ هـ (١٩١٢
      ميلادي) واستقر بالقاهرة سنة ١٣٣٩ هـ (١٩٢٠
      ميلادي). وكان عضواً في هيئة كبار العلماء
      بالأزهر، ومحرراً لمجلة «لواء الإسلام». ومن
      مؤلفاته: «نقض كتاب في الشعر الجاهلي» (رد على
      كتاب الدكتور طه حسين)، و«القياس في اللغة
      العربية»، و«نقض كتاب الإسلام وأصول الحكم» (رد
      على الأستاذ علي عبد الرازق)، و«الدعوة إلى
      الإصلاح»، وديوان شعره.
    description_fr: |
      Muḥammad al-Khaḍir ibn al-Ḥusayn ibn ʿAlī ibn ʿUmar
      — juriste sunnite mālikite et soufi d'origine
      tunisienne, Shaykh d'al-Azhar d'octobre 1952 à
      janvier 1954, membre fondateur de l'Académie de
      la Langue Arabe au Caire, et figure de proue de la
      diaspora savante sunnite nord-africaine
      post-coloniale — mourut au Caire le 13 Rajab
      1377 H (3 février 1958 EC) à l'âge de 82 ans. Né
      à Nefta (sud de la Tunisie) en 1293 H (1876 EC),
      il étudia à la Mosquée-Université Zaytūna à Tunis
      et y enseigna ensuite le fiqh mālikite, l'*uṣūl*
      et la littérature arabe, avant de quitter la
      Tunisie sous la pression du Protectorat français
      pour Damas en 1912 puis Le Caire en 1920. Il fut
      membre du Conseil des Grands Savants d'al-Azhar
      et rédacteur de la revue *Liwāʾ al-Islām*. Son
      corpus comprend *Naqḍ Kitāb fī al-Shiʿr al-
      Jāhilī* (une réponse critique au *De la poésie
      pré-islamique* de Ṭāhā Ḥusayn), *al-Qiyās fī
      al-Lugha al-ʿArabiyya*, *Naqḍ Kitāb al-Islām wa
      Uṣūl al-Ḥukm* (contre ʿAlī ʿAbd al-Rāziq), *al-
      Daʿwa ilā al-Iṣlāḥ* et un *Dīwān* publié de ses
      poèmes arabes.
    canonical_hijri: {year: 1377, month: 7, day: 13, precision: day}
    canonical_gregorian: {date: 1958-02-03, precision: day, method: attested}
    claims:
      - source_key: ei2
