  - slug: death-of-salim-al-bishri
    category: scholar_death
    title_en: Death of Salīm al-Bishrī — Mālikī Shaykh of al-Azhar
    title_ar: وفاة الشيخ سليم البشري — شيخ الأزهر المالكي
    title_fr: Mort de Salīm al-Bishrī — Shaykh mālikite d'al-Azhar
    description_en: |
      Salīm al-Bishrī — Egyptian Sunni Mālikī jurist and
      Shaykh of al-Azhar across two terms (1900–1904 and
      1909–1916), notable defender of the four Sunni
      madhāhib in the era of late-Ottoman reformism, and
      one of the senior signatories of the early
      twentieth-century *fatwā* literature on banking and
      modern legal questions — died at Cairo in Rabīʿ al-
      Thānī 1335 AH (corresponding to mid-February 1917 CE).
      Born in 1248 AH (1832 CE) at al-Maḥalla al-Kubrā in
      the Egyptian Delta, he studied at al-Azhar under
      Ibrāhīm al-Saqqā, Muḥammad ʿIlīsh, and other Mālikī
      masters of the period. As Shaykh of al-Azhar he
      oversaw the second major modernisation of the Azharī
      curriculum and presided over much of the institutional
      contest between the traditionalist and reformist
      currents of the early twentieth century. He authored
      *al-Anwār al-Saniyya ʿalā al-Durar al-Bahiyya*, a
      Mālikī commentary on the *Durar* of al-Bījūrī, and
      a number of fatwa collections preserved in the
      *Majmūʿ Fatāwā Shaykh al-Azhar*.
    description_ar: |
      توفي الشيخ سليم البشري — الفقيه السني المالكي
      المصري، شيخ الأزهر الشريف في فترتين (سنة ١٣١٨ هـ
      / ١٩٠٠ ميلادي إلى سنة ١٣٢٢ هـ / ١٩٠٤ ميلادي،
      وسنة ١٣٢٧ هـ / ١٩٠٩ ميلادي إلى سنة ١٣٣٣ هـ /
      ١٩١٦ ميلادي)، ومدافع بارز عن المذاهب السنية
      الأربعة في عصر الإصلاح العثماني المتأخر، وأحد
      كبار الموقعين على فتاوى مطلع القرن العشرين
      الميلادي في المسائل المصرفية والقانونية الحديثة
      — بالقاهرة في ربيع الثاني سنة ١٣٣٥ هـ (الموافق
      منتصف فيفري ١٩١٧ ميلادي). ولد سنة ١٢٤٨ هـ
      (١٨٣٢ ميلادي) بالمحلة الكبرى بدلتا مصر، ودرس
      بالأزهر على الشيخ إبراهيم السقا والشيخ محمد
      عليش وغيرهما من أعلام المالكية في عصره. وأشرف
      أثناء مشيخته للأزهر على ثاني كبرى موجات تطوير
      مناهج الأزهر، وعاصر معظم الصراع المؤسسي بين
      تيار التقليد وتيار الإصلاح في مطلع القرن
      العشرين. ومن مؤلفاته «الأنوار السنية على الدرر
      البهية» شرح على «الدرر» للشيخ البيجوري على
      المذهب المالكي، ومجاميع فتاوى محفوظة في
      «مجموع فتاوى شيخ الأزهر».
    description_fr: |
      Salīm al-Bishrī — juriste sunnite mālikite égyptien
      et Shaykh d'al-Azhar pour deux mandats (1900–1904
      et 1909–1916), défenseur notable des quatre écoles
      sunnites à l'époque du réformisme ottoman tardif,
      et l'un des principaux signataires de la
      littérature fatwa du début du XXe siècle sur la
      banque et les questions juridiques modernes —
      mourut au Caire en Rabīʿ al-Thānī 1335 H
      (correspondant à la mi-février 1917 EC). Né en
      1248 H (1832 EC) à al-Maḥalla al-Kubrā dans le
      Delta égyptien, il étudia à al-Azhar sous Ibrāhīm
      al-Saqqā, Muḥammad ʿIlīsh et d'autres maîtres
      mālikites de l'époque. Comme Shaykh d'al-Azhar
      il supervisa la seconde grande modernisation du
      programme azharien et présida à une grande partie
      de la lutte institutionnelle entre les courants
      traditionaliste et réformiste du début du XXe
      siècle. Il rédigea *al-Anwār al-Saniyya ʿalā
      al-Durar al-Bahiyya*, un commentaire mālikite des
      *Durar* d'al-Bījūrī, et plusieurs recueils de
      fatwas conservés dans le *Majmūʿ Fatāwā Shaykh
      al-Azhar*.
    canonical_hijri: {year: 1335, month: 4, precision: month}
    canonical_gregorian: {date: 1917-02-15, precision: month, method: attested}
