  - slug: death-of-zaynab-al-ghazali
    category: scholar_death
    title_en: Death of Zaynab al-Ghazālī — Egyptian Women's Islamic Activist
    title_ar: وفاة السيدة زينب الغزالي — الداعية المصرية إلى التنظيم النسائي الإسلامي
    title_fr: Mort de Zaynab al-Ghazālī — militante islamique égyptienne pour l'organisation des femmes
    description_en: |
      Zaynab Muḥammad al-Ghazālī al-Jubaylī — Egyptian
      Sunni preacher and founder of the *Jamāʿat al-
      Sayyidāt al-Muslimāt* (Society of Muslim Women,
      established in 1936) — died at Cairo on 27 Jumādā
      al-Thāniya 1426 AH (3 August 2005 CE) at age 88.
      Born at Mīt Yaʿīsh in the Daqahliyya governorate of
      the Egyptian Delta in 1917, she was educated in
      Egypt's first generation of women's religious
      schooling and trained briefly with Hudā Shaʿrāwī's
      Egyptian Feminist Union before founding her own
      organisation oriented around women's religious
      education and Qurʾanic teaching. From the 1940s
      she was associated with the Society of the Muslim
      Brotherhood, was arrested in 1965 in the Nasser-
      era crackdown, and spent six years in detention.
      Her prison memoir *Ayyām min Ḥayātī* ("Days from
      My Life", 1977) circulates widely. Her authored
      corpus also includes *Naẓarāt fī Kitāb Allāh*, a
      multi-volume Qurʾanic reflection, and several
      pamphlets on women's religious life and
      organisation. She continued writing and giving
      lessons at the Cairo home where she taught women
      students until shortly before her death.
    description_ar: |
      توفيت السيدة الداعية زينب محمد الغزالي الجبيلي
      — الداعية السنية المصرية ومؤسسة «جماعة السيدات
      المسلمات» (تأسست سنة ١٣٥٥ هـ / ١٩٣٦ ميلادي) —
      بالقاهرة يوم ٢٧ جمادى الآخرة سنة ١٤٢٦ هـ
      (الموافق ٣ أوت ٢٠٠٥ ميلادي) عن ثمان وثمانين
      سنة. ولدت بقرية ميت يعيش بمحافظة الدقهلية في
      دلتا مصر سنة ١٣٣٦ هـ (١٩١٧ ميلادي)، وتعلمت في
      الجيل الأول من تعليم البنات الديني بمصر،
      وتدربت قليلاً مع الاتحاد النسائي المصري للسيدة
      هدى شعراوي ثم أسست تنظيمها الخاص الموجه نحو
      التعليم الديني للنساء وتعليم القرآن الكريم.
      ومنذ أربعينات القرن العشرين الميلادي ارتبطت
      بجماعة الإخوان المسلمين، واعتُقلت سنة ١٣٨٤ هـ
      (١٩٦٥ ميلادي) في حملة القمع في عهد جمال عبد
      الناصر، وسُجنت ست سنوات. ومذكرات سجنها «أيام
      من حياتي» (سنة ١٣٩٧ هـ / ١٩٧٧ ميلادي)
      منتشرة. ومن مؤلفاتها أيضاً: «نظرات في كتاب
      الله» في عدة مجلدات في التأمل القرآني، وعدد
      من الكتيبات في الحياة والتنظيم الدينيين
      للنساء. وقد ظلت تكتب وتدرّس بدارها بالقاهرة
      للطالبات حتى قبيل وفاتها.
    description_fr: |
      Zaynab Muḥammad al-Ghazālī al-Jubaylī —
      prédicatrice sunnite égyptienne et fondatrice de
      la *Jamāʿat al-Sayyidāt al-Muslimāt* (Société
      des Femmes Musulmanes, fondée en 1936) — mourut
      au Caire le 27 Jumādā al-Thāniya 1426 H (3 août
      2005 EC) à l'âge de 88 ans. Née à Mīt Yaʿīsh
      dans le gouvernorat de Daqahliyya dans le Delta
      égyptien en 1917, elle reçut une formation
      religieuse dans la première génération de
      l'enseignement religieux pour les femmes en
      Égypte et travailla brièvement avec l'Union
      Féministe Égyptienne de Hudā Shaʿrāwī avant de
      fonder sa propre organisation centrée sur
      l'éducation religieuse des femmes et
      l'enseignement coranique. À partir des années
      1940 elle fut associée à la Société des Frères
      musulmans, fut arrêtée en 1965 lors de la
      répression nassérienne, et passa six ans en
      détention. Ses mémoires de prison *Ayyām min
      Ḥayātī* (« Jours de ma vie », 1977) circulent
      largement. Son corpus comprend également
      *Naẓarāt fī Kitāb Allāh*, une réflexion
      coranique en plusieurs volumes, et plusieurs
      brochures sur la vie et l'organisation
      religieuses des femmes. Elle continua à écrire
      et à enseigner dans sa maison du Caire jusqu'à
      peu avant sa mort.
