  - slug: death-of-muhammad-bakhit-al-mutii
    category: scholar_death
    title_en: Death of Muḥammad Bakhīt al-Muṭīʿī — Egyptian Hanafī Muftī
    title_ar: وفاة الشيخ محمد بخيت المطيعي — مفتي الديار المصرية الحنفي
    title_fr: Mort de Muḥammad Bakhīt al-Muṭīʿī — muftī hanafite égyptien
    description_en: |
      Muḥammad Bakhīt al-Muṭīʿī — Egyptian Sunni Ḥanafī
      jurist, Grand Muftī of the Egyptian Republic (then
      Kingdom) from 1914 until his retirement in 1920,
      teacher of *fiqh* and *uṣūl* at al-Azhar for over
      thirty years, and one of the most prolific authors
      of independent legal opinions in early-twentieth-
      century Egypt — died at Cairo on 9 Ramaḍān 1354 AH
      (5 December 1935 CE) at age about seventy-nine.
      Born in 1856 at al-Muṭīʿa in Asyūṭ Province, he
      studied at al-Azhar from 1869 onward and was
      certified as a qualified jurist in 1892. As Grand
      Muftī he authored some of the most-cited Hanafī
      fatwas of the period on banking interest, currency,
      printed Qurʾāns, photography, and adaptations of
      Islamic family law to early-modern conditions.
      His authored works include the multi-volume
      *Sullam al-Wuṣūl li-Sharḥ Nihāyat al-Sūl* on
      Hanafī uṣūl al-fiqh, *Aḥkām al-Sharīʿa al-
      Islāmiyya fī al-Aḥwāl al-Shakhṣiyya*, and
      polemical responses to ʿAlī ʿAbd al-Rāziq's
      *al-Islām wa Uṣūl al-Ḥukm*.
    description_ar: |
      توفي الشيخ محمد بخيت المطيعي — الفقيه السني
      الحنفي المصري، مفتي الديار المصرية في عهد المملكة
      من سنة ١٣٣٢ هـ (١٩١٤ ميلادي) إلى تقاعده سنة
      ١٣٣٨ هـ (١٩٢٠ ميلادي)، ومدرس الفقه وأصول الفقه
      بالأزهر الشريف ما يزيد على ثلاثين سنة، وأحد أكثر
      مفتي مصر بداية القرن العشرين الميلادي إنتاجاً
      للفتاوى المستقلة — بالقاهرة يوم ٩ رمضان سنة
      ١٣٥٤ هـ (الموافق ٥ ديسمبر ١٩٣٥ ميلادي) عن نحو
      تسع وسبعين سنة. ولد سنة ١٢٧٢ هـ (١٨٥٦ ميلادي)
      بقرية المطيعة بمحافظة أسيوط، ودخل الأزهر سنة
      ١٢٨٦ هـ (١٨٦٩ ميلادي)، ونال «العالمية» سنة ١٣٠٩
      هـ (١٨٩٢ ميلادي). ومن أشهر فتاويه الحنفية في
      عصره: في الفائدة المصرفية والعملة وطباعة المصحف
      الشريف والتصوير وتطبيق الأحكام الشرعية لأحوال
      الأسرة المسلمة في الواقع الحديث المبكر. ومن
      مؤلفاته «سلم الوصول لشرح نهاية السول» في أصول
      الفقه على المذهب الحنفي في عدة مجلدات، و«أحكام
      الشريعة الإسلامية في الأحوال الشخصية»، وردّ
      على «الإسلام وأصول الحكم» للأستاذ علي عبد
      الرازق.
    description_fr: |
      Muḥammad Bakhīt al-Muṭīʿī — juriste sunnite hanafite
      égyptien, Grand Muftī de la République (alors
      Royaume) d'Égypte de 1914 jusqu'à sa retraite en
      1920, enseignant de *fiqh* et d'*uṣūl* à al-Azhar
      pendant plus de trente ans, et l'un des auteurs les
      plus prolifiques d'opinions juridiques indépendantes
      en Égypte du début du XXe siècle — mourut au Caire
      le 9 Ramaḍān 1354 H (5 décembre 1935 EC) à l'âge
      d'environ soixante-dix-neuf ans. Né en 1856 à
      al-Muṭīʿa dans la province d'Asyūṭ, il étudia à
      al-Azhar à partir de 1869 et fut certifié juriste
      qualifié en 1892. Comme Grand Muftī il rédigea
      certaines des fatwas hanafites les plus citées de
      l'époque sur l'intérêt bancaire, la monnaie, le
      Coran imprimé, la photographie et l'adaptation du
      droit de la famille islamique aux conditions de
      la première modernité. Ses œuvres comprennent le
      *Sullam al-Wuṣūl li-Sharḥ Nihāyat al-Sūl* en
      plusieurs volumes sur l'*uṣūl al-fiqh* hanafite,
      *Aḥkām al-Sharīʿa al-Islāmiyya fī al-Aḥwāl al-
      Shakhṣiyya*, et des réponses polémiques à
      *al-Islām wa Uṣūl al-Ḥukm* de ʿAlī ʿAbd al-Rāziq.
    canonical_hijri: {year: 1354, month: 9, day: 9, precision: day}
    canonical_gregorian: {date: 1935-12-05, precision: day, method: attested}
