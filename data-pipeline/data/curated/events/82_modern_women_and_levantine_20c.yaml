  # =========================================================================
  # AZHARI MODERNIST
  # =========================================================================

  - slug: death-of-muhammad-al-bahi
    category: scholar_death
    title_en: Death of Muḥammad al-Bahī — Egyptian Azharī Modernist
    title_ar: وفاة الشيخ محمد البهي — المفكر الأزهري المصري الحديث
    title_fr: Mort de Muḥammad al-Bahī — moderniste azharien égyptien
    description_en: |
      Muḥammad al-Bahī — Egyptian Sunni Azharī scholar of
      Islamic philosophy and modern thought, holder of a
      doctorate from Hamburg University (1936), longtime
      professor at al-Azhar's Faculty of Uṣūl al-Dīn,
      Egyptian Minister of Endowments (*Awqāf*) and
      al-Azhar Affairs in the early 1960s, and one of the
      principal Azharī voices in the post-1952 republican
      reorganisation of al-Azhar — died at Cairo in 1402
      AH (corresponding to 1982 CE) at age 77. Born at
      Maḥallat Bahī in the Egyptian Delta in 1905, he
      studied at al-Azhar before being sent to Germany
      in the 1930s for the doctorate that produced his
      *al-Janīb al-Ilāhī min al-Tafkīr al-Islāmī*
      ("The Theological Side of Islamic Thought"). His
      authored corpus includes *al-Fikr al-Islāmī al-
      Ḥadīth wa Ṣilatuhu bi-l-Istiʿmār al-Gharbī* (a
      controversial polemical study on modern Islamic
      thought and Western colonialism, repeatedly
      reissued), *al-Dīn wa-l-Dawla*, *al-Jānib al-
      Siyāsī fī Ḥayāt Muḥammad ﷺ*, and a number of
      lectures preserved by al-Azhar's research
      services.
    description_ar: |
      توفي الدكتور الشيخ محمد البهي — العالم السني
      الأزهري المصري في الفلسفة الإسلامية والفكر
      الإسلامي الحديث، الحاصل على درجة الدكتوراه من
      جامعة هامبورغ سنة ١٣٥٥ هـ (١٩٣٦ ميلادي)، أستاذ
      كلية أصول الدين بالأزهر سنين طويلة، ووزير
      الأوقاف وشؤون الأزهر بمصر في مطلع ستينات القرن
      العشرين الميلادي، وأحد أبرز أصوات الأزهر في
      إعادة تنظيم الأزهر بعد ثورة سنة ١٣٧١ هـ (١٩٥٢
      ميلادي) — بالقاهرة سنة ١٤٠٢ هـ (الموافق ١٩٨٢
      ميلادي) عن سبع وسبعين سنة. ولد بقرية محلة
      البهي في دلتا مصر سنة ١٣٢٣ هـ (١٩٠٥ ميلادي)،
      ودرس بالأزهر، ثم أرسل إلى ألمانيا في
      ثلاثينات القرن العشرين الميلادي للدكتوراه التي
      أصدر منها كتابه «الجانب الإلهي من التفكير
      الإسلامي». ومن مؤلفاته: «الفكر الإسلامي
      الحديث وصلته بالاستعمار الغربي» (وهو دراسة
      جدلية أُعيد طبعها كثيراً)، و«الدين والدولة»،
      و«الجانب السياسي في حياة محمد ﷺ»، ومحاضرات
      محفوظة في المراكز البحثية بالأزهر.
    description_fr: |
      Muḥammad al-Bahī — savant sunnite azharien
      égyptien spécialiste de la philosophie islamique
      et de la pensée moderne, docteur de l'Université
      de Hambourg (1936), longtemps professeur à la
      Faculté d'Uṣūl al-Dīn d'al-Azhar, ministre
      égyptien des Awqāf et des Affaires d'al-Azhar au
      début des années 1960, et l'une des principales
      voix azhariennes dans la réorganisation
      républicaine d'al-Azhar après 1952 — mourut au
      Caire en 1402 H (correspondant à 1982 EC) à
      l'âge de 77 ans. Né à Maḥallat Bahī dans le
      Delta égyptien en 1905, il étudia à al-Azhar
      avant d'être envoyé en Allemagne dans les
      années 1930 pour le doctorat dont sortit *al-
      Janīb al-Ilāhī min al-Tafkīr al-Islāmī* (« Le
      côté théologique de la pensée islamique »).
      Ses œuvres comprennent *al-Fikr al-Islāmī al-
      Ḥadīth wa Ṣilatuhu bi-l-Istiʿmār al-Gharbī*
      (une étude polémique controversée sur la
      pensée islamique moderne et le colonialisme
      occidental, fréquemment rééditée), *al-Dīn wa-
      l-Dawla*, *al-Jānib al-Siyāsī fī Ḥayāt
      Muḥammad ﷺ*, et un certain nombre de
      conférences conservées par les services de
      recherche d'al-Azhar.
    canonical_hijri: {year: 1402, precision: year}
    canonical_gregorian: {date: 1982-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: editorial
        is_canonical: true
        notes: "Death in 1402 AH / 1982 CE in Cairo attested in Egyptian Azhari biographical sources; precise day not unambiguously preserved, so year-precision is used."
