  - slug: death-of-jamal-al-din-al-qasimi
    category: scholar_death
    title_en: Death of Jamāl al-Dīn al-Qāsimī — Damascene Reformist Scholar
    title_ar: وفاة العلامة جمال الدين القاسمي — العالم الدمشقي المصلح
    title_fr: Mort de Jamāl al-Dīn al-Qāsimī — savant réformiste damascène
    description_en: |
      Muḥammad Jamāl al-Dīn al-Qāsimī — Damascene Sunni
      Shāfiʿī-then-non-aligned scholar, leading figure of
      the late-Ottoman Damascene reformist (*iṣlāḥ*)
      circle that included Ṭāhir al-Jazāʾirī and ʿAbd
      al-Razzāq al-Bīṭār, and active correspondent of
      Muḥammad Rashīd Riḍā's *al-Manār* in Cairo —
      died at Damascus on 23 Jumādā al-Ūlā 1332 AH
      (18 April 1914 CE) at age fifty-one. Born at the
      Qaymariyya quarter of Damascus in 1283 AH (1866
      CE), he was the son and pupil of the Shāfiʿī
      scholar Muḥammad Saʿīd al-Qāsimī. His seventeen-
      volume Qurʾanic exegesis *Maḥāsin al-Taʾwīl*,
      published posthumously, drew on classical Sunni
      tafsīr while engaging late-nineteenth-century
      reformist concerns. Other works include *Qawāʿid
      al-Taḥdīth min Funūn Muṣṭalaḥ al-Ḥadīth* on the
      science of hadith terminology, *Iṣlāḥ al-Masājid
      min al-Bidaʿ wa-l-ʿAwāʾid*, and the auto-
      biographical *Dalāʾil al-Tawḥīd*.
    description_ar: |
      توفي العلامة محمد جمال الدين القاسمي — العالم
      السني الدمشقي الشافعي الأصل المتحرر من التقليد
      المذهبي في آخر أمره، أحد أبرز أعلام حلقة الإصلاح
      الدمشقية العثمانية المتأخرة مع الشيخ طاهر
      الجزائري والشيخ عبد الرزاق البيطار، ومن
      المراسلين النشطين لمجلة «المنار» للسيد محمد رشيد
      رضا بالقاهرة — بدمشق يوم ٢٣ جمادى الأولى سنة
      ١٣٣٢ هـ (الموافق ١٨ أفريل ١٩١٤ ميلادي) عن إحدى
      وخمسين سنة. ولد بحارة القيمرية بدمشق سنة ١٢٨٣ هـ
      (١٨٦٦ ميلادي)، وكان نجل الشيخ الشافعي محمد سعيد
      القاسمي وتلميذه. وتفسيره القرآني «محاسن التأويل»
      في سبعة عشر مجلداً نُشر بعد وفاته، يجمع فيه
      المؤلف بين التفسير السني الكلاسيكي وقضايا
      الإصلاح في أواخر القرن التاسع عشر الميلادي. ومن
      مؤلفاته «قواعد التحديث من فنون مصطلح الحديث»
      في علوم الحديث، و«إصلاح المساجد من البدع
      والعوائد»، و«دلائل التوحيد».
    description_fr: |
      Muḥammad Jamāl al-Dīn al-Qāsimī — savant sunnite
      damascène d'origine shāfiʿite et de tendance
      indépendante en fin de carrière, figure de proue
      du cercle réformiste (*iṣlāḥ*) damascène ottoman
      tardif aux côtés de Ṭāhir al-Jazāʾirī et ʿAbd
      al-Razzāq al-Bīṭār, et correspondant actif de la
      revue *al-Manār* de Muḥammad Rashīd Riḍā au
      Caire — mourut à Damas le 23 Jumādā al-Ūlā 1332 H
      (18 avril 1914 EC) à l'âge de cinquante et un
      ans. Né dans le quartier Qaymariyya de Damas en
      1283 H (1866 EC), il fut le fils et l'élève du
      savant shāfiʿite Muḥammad Saʿīd al-Qāsimī. Son
      exégèse coranique en dix-sept volumes *Maḥāsin
      al-Taʾwīl*, publiée à titre posthume, puise dans
      le tafsīr sunnite classique tout en engageant les
      préoccupations réformistes de la fin du XIXe
      siècle. Ses autres œuvres comprennent *Qawāʿid
      al-Taḥdīth min Funūn Muṣṭalaḥ al-Ḥadīth* sur la
      science du hadith, *Iṣlāḥ al-Masājid min al-Bidaʿ
      wa-l-ʿAwāʾid* et l'autobiographique *Dalāʾil
      al-Tawḥīd*.
    canonical_hijri: {year: 1332, month: 5, day: 23, precision: day}
    canonical_gregorian: {date: 1914-04-18, precision: day, method: attested}
