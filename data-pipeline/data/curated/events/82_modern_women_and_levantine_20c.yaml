  # =========================================================================

  - slug: death-of-said-hawwa
    category: scholar_death
    title_en: Death of Saʿīd Ḥawwā — Syrian Islamic-Revivalist Scholar
    title_ar: وفاة الشيخ سعيد حوى — العالم السوري من رواد الإحياء الإسلامي
    title_fr: Mort de Saʿīd Ḥawwā — savant syrien révivaliste
    description_en: |
      Saʿīd Ḥawwā — Syrian Sunni Hanafī scholar, Sufi
      affiliate of the Naqshbandī order, longtime
      ideologue of the Syrian branch of the Muslim
      Brotherhood, and prolific author of works in tafsīr,
      *taṣawwuf*, and political-theological reflection —
      died at Amman, Jordan on 9 Shaʿbān 1409 AH
      (9 March 1989 CE) at age 53 after several years of
      illness and exile. Born at Ḥamāh in 1935, he
      graduated from Damascus University's Faculty of
      Sharīʿa in 1961, taught for several years in
      Saudi Arabia, and was repeatedly imprisoned in
      Syria during the late 1960s and 1970s for his
      writings and his activism. After 1982 he settled in
      Amman, where he completed the eleven-volume
      Qurʾanic exegesis *al-Asās fī al-Tafsīr*. His
      authored corpus also includes the eight-volume
      *al-Asās fī al-Sunna*, *Tarbiyatunā al-Rūḥiyya*
      (a manual of Sufi spiritual training), *al-Islām*,
      *Allāh*, *al-Rasūl*, and *Hādhihi Tajribatī wa
      Hādhihi Shahādatī*, his late-life autobiography.
    description_ar: |
      توفي الشيخ سعيد حوى — العالم السني الحنفي السوري،
      المنتسب إلى الطريقة النقشبندية الصوفية، ومن
      أبرز منظّري فرع الإخوان المسلمين بسوريا سنين
      طويلة، والمصنف المكثر في التفسير والتصوف
      والتأمل العقدي السياسي — بمدينة عمّان بالمملكة
      الأردنية يوم ٩ شعبان سنة ١٤٠٩ هـ (الموافق
      ٩ مارس ١٩٨٩ ميلادي) عن ثلاث وخمسين سنة بعد
      مرض طويل وغربة. ولد بحماة سنة ١٣٥٤ هـ
      (١٩٣٥ ميلادي)، وتخرج من كلية الشريعة بجامعة
      دمشق سنة ١٣٨١ هـ (١٩٦١ ميلادي)، ودرّس بضع
      سنوات بالمملكة العربية السعودية، واعتُقل مراراً
      بسوريا في أواخر ستينات وفي سبعينات القرن
      العشرين الميلادي بسبب كتاباته ونشاطه. وبعد
      سنة ١٤٠٢ هـ (١٩٨٢ ميلادي) استقر بعمّان وأتمّ
      هناك تفسيره القرآني «الأساس في التفسير» في
      أحد عشر مجلداً. ومن مؤلفاته الأخرى: «الأساس
      في السنة» في ثمانية مجلدات، و«تربيتنا الروحية»،
      و«الإسلام»، و«الله»، و«الرسول»، و«هذه تجربتي
      وهذه شهادتي» سيرته الذاتية في أواخر حياته.
    description_fr: |
      Saʿīd Ḥawwā — savant sunnite hanafite syrien,
      affilié à la confrérie soufie naqshbandī,
      longtemps idéologue de la branche syrienne des
      Frères musulmans, et auteur prolifique d'œuvres
      en tafsīr, *taṣawwuf* et réflexion
      politico-théologique — mourut à Amman, Jordanie,
      le 9 Shaʿbān 1409 H (9 mars 1989 EC) à l'âge de
      53 ans après plusieurs années de maladie et
      d'exil. Né à Ḥamāh en 1935, il fut diplômé de la
      Faculté de Sharīʿa de l'Université de Damas en
      1961, enseigna plusieurs années en Arabie
      saoudite et fut emprisonné à plusieurs reprises
      en Syrie à la fin des années 1960 et 1970 pour
      ses écrits et son militantisme. Après 1982 il
      s'établit à Amman, où il compléta l'exégèse
      coranique en onze volumes *al-Asās fī al-
      Tafsīr*. Son corpus comprend également *al-Asās
      fī al-Sunna* en huit volumes, *Tarbiyatunā al-
      Rūḥiyya* (un manuel de formation spirituelle
      soufie), *al-Islām*, *Allāh*, *al-Rasūl* et
      *Hādhihi Tajribatī wa Hādhihi Shahādatī*, son
      autobiographie tardive.
    canonical_hijri: {year: 1409, month: 8, day: 9, precision: day}
    canonical_gregorian: {date: 1989-03-09, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Modern academic references record death in Amman 9 March 1989."
      - source_key: editorial
        notes: "Syrian Brotherhood role, Naqshbandī affiliation, and authored corpus including the eleven-volume *al-Asās fī al-Tafsīr* attested in standard biographies."
    people: [[said-hawwa, died]]
    tags: [modern, scholar, syria, jordan, amman, hanafi, naqshbandi, ikhwan, mufassir, twentieth-century]
    importance: notable
    verified: true
    verification_status: cross_verified
