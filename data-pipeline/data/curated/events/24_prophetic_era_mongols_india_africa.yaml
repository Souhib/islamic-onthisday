  - slug: death-of-tamim-al-dari
    category: companion
    title_en: Death of Tamim al-Dari ra
    title_ar: وفاة تميم الداري رضي الله عنه
    title_fr: Mort de Tamīm al-Dārī ra
    description_en: |
      Abu Ruqayya Tamim ibn Aws al-Dari — Christian merchant of
      the Banu al-Dar (a Lakhmid clan from al-Dūm in Palestine)
      who embraced Islam in 9 AH and became one of the foremost
      Companion-narrators of eschatological hadith — died around
      40 AH in Syria. He is the Companion who narrated to the
      Prophet ﷺ the famous *ḥadīth al-jassasa* (the Antichrist
      and the Beast) preserved in Sahih Muslim, after sea-storm
      survivors he travelled with had landed on a strange island
      and met both: the Prophet ﷺ confirmed the report and made
      it part of the Sunna. He was the first Christian convert
      to lead the Muslim community in *qiyam al-layl* recitation
      during Ramadan in Medina at ʿUmar's ra direction. He
      retired to Bayt Jibrin in Palestine where his land grant
      from the Prophet ﷺ remained in his lineage for centuries.
    description_ar: |
      توفي أبو رقية تميم بن أوس الداري رضي الله عنه — تاجر نصراني
      من بني الدار (حي من لخم من «الدوم» في فلسطين) أسلم سنة
      تسع للهجرة، وصار من أكبر الصحابة في رواية أحاديث الفتن
      وأشراط الساعة — نحو سنة أربعين للهجرة بالشام. وهو الصحابي
      الذي روى للنبي ﷺ حديث «الجساسة» المشهور (في الدجال والدابة)
      المحفوظ في «صحيح مسلم»، إذ كان رفقاءُ سفر بحري عاصف معهم
      قد نزلوا في جزيرة غريبة فلقوا الدابة والدجال؛ فأقر النبي ﷺ
      روايته وأدخلها في السنة. وهو أول نصراني أسلم وأمَّ المسلمين
      في صلاة قيام رمضان بالمدينة بأمر عمر رضي الله عنه. واعتزل
      رحمه الله إلى «بيت جبرين» في فلسطين، حيث ظل إقطاع النبي ﷺ
      له فيها في ذريته قروناً.
    description_fr: |
      Abū Ruqayya Tamīm ibn Aws al-Dārī — marchand chrétien des
      Banū al-Dār (un clan lakhmide d'al-Dūm en Palestine) qui
      embrassa l'Islam en 9 H et devint l'un des principaux
      Compagnons-narrateurs de hadiths eschatologiques — mourut
      vers 40 H en Syrie. Il est le Compagnon qui narra au
      Prophète ﷺ le célèbre *ḥadīth al-jassāsa* (l'Antéchrist et
      la Bête) préservé dans Ṣaḥīḥ Muslim, après que des
      compagnons de voyage maritime survivants à une tempête
      avec lesquels il voyageait avaient débarqué sur une île
      étrange et rencontré les deux : le Prophète ﷺ confirma le
      récit et le fit partie de la Sunna. Il fut le premier
      converti chrétien à diriger la communauté musulmane en
      récitation de *qiyām al-layl* pendant le Ramadan à Médine
      sur la direction d'ʿUmar ra. Il se retira à Bayt Jibrīn
      en Palestine où sa concession de terres du Prophète ﷺ
      resta dans sa lignée pendant des siècles.
