  - slug: death-of-muhammad-ibn-tughluq
    category: ruler
    title_en: Death of Sultan Muhammad ibn Tughluq
    title_ar: وفاة السلطان محمد بن تغلق
    title_fr: Mort du sultan Muḥammad ibn Tughluq
    description_en: |
      Muhammad ibn Tughluq, second sultan of the Tughluqid
      dynasty of Delhi (reigned 725-752 AH / 1325-1351 CE), one
      of the most learned and most controversial sovereigns of
      medieval India, died in Sindh on a campaign to suppress a
      revolt — at age about 60. His reign saw the Delhi Sultanate
      reach its greatest territorial extent (extending across
      virtually the entire Indian subcontinent) but also its
      most catastrophic policy experiments: the forced relocation
      of the capital from Delhi to Daulatabad in the Deccan
      (depopulating Delhi), the introduction of token copper
      currency that triggered hyperinflation, and military
      campaigns into Khurasan and the Himalayas that bankrupted
      the treasury. He was a personal patron of Ibn Battuta (who
      served as his qadi for years and recorded the reign in
      detail in his *Riḥla*), of Hindi-Persian translation
      projects, and of the Chishti and Suhrawardi Sufi networks.
      His death enabled the gradual consolidation of the Mughal-
      precursor regional sultanates of Bengal, Gujarat, and the
      Bahmanis.
    description_ar: |
      توفي السلطان محمد بن تغلق — ثاني سلاطين الدولة التغلقية
      بدلهي (حكم من ٧٢٥ إلى ٧٥٢ هـ / ١٣٢٥-١٣٥١ ميلادي)، وأحد
      أعلم سلاطين الهند الإسلامية في القرون الوسطى وأكثرهم إثارة
      للجدل — في السند وهو في حملة قمع لثورة، وقد ناهز الستين.
      وبلغت سلطنة دلهي في عهده أقصى رقعتها الجغرافية (تمتد على
      عامة شبه القارة الهندية)، وشهدت في الوقت ذاته أعظم
      التجارب الكارثية في السياسة: إكراه السكان على نقل العاصمة
      من دلهي إلى دولت آباد في الدكن (فأخلى دلهي)، وإصدار
      عملة نحاسية رمزية أطلقت تضخماً جامحاً، وحملات عسكرية إلى
      خراسان وجبال الهملايا أفلست بيت المال. وكان رحمه الله
      راعياً شخصياً لابن بطوطة (الذي عمل قاضياً عنده سنين وسجل
      عهده في «الرحلة» مفصلاً)، ومشاريع ترجمة هندية-فارسية،
      وشبكتي الشاذلية الجشتية والسهروردية الصوفيتين. وأطلق موته
      التبلور التدريجي للسلطنات المحلية التي ستسبق الدولة
      المغولية: البنغال وكجرات والبهمنيين.
    description_fr: |
      Muḥammad ibn Tughluq, deuxième sultan de la dynastie
      tughluquide de Delhi (règne 725-752 H / 1325-1351 EC), l'un
      des souverains les plus érudits et les plus controversés
      de l'Inde médiévale, mourut au Sindh lors d'une campagne
      pour réprimer une révolte — à l'âge d'environ 60 ans. Son
      règne vit le sultanat de Delhi atteindre sa plus grande
      extension territoriale (s'étendant sur pratiquement tout
      le sous-continent indien) mais aussi ses expériences
      politiques les plus catastrophiques : le transfert forcé
      de la capitale de Delhi à Daulatabad dans le Deccan
      (dépeuplant Delhi), l'introduction d'une monnaie de cuivre
      symbolique qui déclencha une hyperinflation, et des
      campagnes militaires au Khurasan et dans l'Himalaya qui
      mirent le trésor en faillite. Il fut le mécène personnel
      d'Ibn Baṭṭūṭa (qui servit comme son *qāḍī* pendant des
      années et consigna le règne en détail dans sa *Riḥla*),
      des projets de traduction hindi-persan, et des réseaux
      soufis Chishtī et Suhrawardī. Sa mort permit la
      consolidation progressive des sultanats régionaux
      pré-moghols du Bengale, du Gujarat et des Bahmanides.
    canonical_hijri: {year: 752, month: 12, precision: month}
    canonical_gregorian: {date: 1351-03-01, precision: month, method: tabular_conversion}
