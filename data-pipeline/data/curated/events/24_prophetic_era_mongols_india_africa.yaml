  - slug: death-of-abu-al-hasan-al-nadwi
    category: scholar
    title_en: Death of Sayyid Abu al-Hasan ʿAli al-Nadwi
    title_ar: وفاة السيد أبو الحسن علي الندوي
    title_fr: Mort de Sayyid Abū al-Ḥasan ʿAlī al-Nadwī
    description_en: |
      Sayyid Abu al-Hasan ʿAli al-Hasani al-Nadwi — Indian Sunni
      scholar of Lucknow, rector of Dār al-ʿUlum Nadwat al-
      ʿUlamāʾ (the central Indian Sunni seminary that draws its
      methodology from Shah Waliullah and combines Hanafi fiqh
      with engagement with modern thought), and author of more
      than fifty books in Arabic and Urdu including *Madha
      Khasira al-ʿAlam bi-Inḥiṭaṭ al-Muslimin* ("What the World
      Lost by the Decline of the Muslims"), the single most
      widely read Indian Sunni book in twentieth-century Arabic
      circulation — died in Raebareli, Uttar Pradesh, at age 86.
      He served on the Founding Committee of the Muslim World
      League and the Islamic Fiqh Academy of Jeddah, and lectured
      across the Arab world from Damascus to Cairo to Riyadh.
      His four-volume *Sira al-Nabawiyya* in Arabic became a
      modern Indian-Sunni classic. He chaired the All-India
      Muslim Personal Law Board and was the most senior Indian
      Sunni interlocutor with the global Arab Sunni mainstream
      for decades.
    description_ar: |
      توفي السيد أبو الحسن علي الحسني الندوي — عالم سني هندي من
      لكناو، عميد دار العلوم ندوة العلماء (الحوزة السنية الهندية
      المركزية التي تستمد منهجها من شاه ولي الله، وتجمع بين
      الفقه الحنفي والاشتباك مع الفكر الحديث)، ومصنف ما يزيد
      على خمسين كتاباً بالعربية والأردية، منها «ماذا خسر العالم
      بانحطاط المسلمين»، أوسع كتاب سني هندي انتشاراً بالعربية
      في القرن العشرين — في «راي بريلي» في ولاية أوتر برديش
      الهندية عن ست وثمانين سنة. وخدم في اللجنة المؤسسة
      لرابطة العالم الإسلامي ومجمع الفقه الإسلامي بجدة، وألقى
      محاضراته في عامة العالم العربي من دمشق إلى القاهرة إلى
      الرياض. وصار كتابه «السيرة النبوية» في أربعة مجلدات
      بالعربية كلاسيكاً سنياً هندياً حديثاً. ورأس مجلس الأحوال
      الشخصية للمسلمين في الهند كافة، وكان كبير المحاورين
      السنيين الهنود مع التيار العربي السني العام عقوداً.
    description_fr: |
      Sayyid Abū al-Ḥasan ʿAlī al-Ḥasanī al-Nadwī — savant sunnite
      indien de Lucknow, recteur de Dār al-ʿUlūm Nadwat al-
      ʿUlamāʾ (le séminaire sunnite indien central qui tire sa
      méthodologie de Shah Walīullāh et combine fiqh hanafite
      avec engagement avec la pensée moderne), et auteur de
      plus de cinquante livres en arabe et en ourdou dont
      *Mādhā Khasira al-ʿĀlam bi-Inḥiṭāṭ al-Muslimīn* (« Ce
      que le monde a perdu avec le déclin des musulmans »), le
      livre sunnite indien unique le plus largement lu en
      circulation arabe du XXe siècle — mourut à Raebareli, en
      Uttar Pradesh, à l'âge de 86 ans. Il siégea au comité
      fondateur de la Ligue islamique mondiale et de l'Académie
      du fiqh islamique de Djeddah, et donna des conférences à
      travers le monde arabe de Damas au Caire à Riyad. Sa
      *Sīra al-Nabawiyya* en quatre volumes en arabe devint un
      classique sunnite indien moderne. Il présida le conseil
      du droit personnel des musulmans de toute l'Inde et fut
      le principal interlocuteur sunnite indien avec le courant
      général sunnite arabe mondial pendant des décennies.
