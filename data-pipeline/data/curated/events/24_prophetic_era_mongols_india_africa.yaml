  - slug: public-proclamation-at-safa
    category: prophetic
    title_en: Public Proclamation of Islam at Mt. Ṣafa
    title_ar: الجهر بالدعوة على جبل الصفا
    title_fr: Proclamation publique de l'Islam au mont al-Ṣafā
    description_en: |
      Three years after the first revelation, Allah commanded
      the Prophet ﷺ in the Qurʾan: "Warn your nearest
      kinsmen" (Q 26:214) and, separately, "Proclaim openly
      what you have been commanded, and turn away from the
      polytheists" (Q 15:94). The Prophet ﷺ accordingly climbed
      Mt. Ṣafa adjacent to the Sacred Mosque, summoned the
      assembled Quraysh by tribe and clan, and asked: "If I
      told you a cavalry was coming from behind that mountain,
      would you believe me?" They answered: "We have never known
      you to lie." He then proclaimed his prophetic mission
      openly. Abu Lahab cursed him on the spot — the abuse
      occasioning the revelation of Sūrat al-Masad (Q 111). The
      proclamation marks the transition from the secret three-
      year mission of teaching close family and friends to the
      public mission that Quraysh would oppose for the next
      decade.
    description_ar: |
      بعد ثلاث سنين من نزول أول الوحي أمر الله رسوله ﷺ في القرآن:
      ﴿وَأَنْذِرْ عَشِيرَتَكَ الْأَقْرَبِينَ﴾ [الشعراء: ٢١٤]،
      ثم: ﴿فَاصْدَعْ بِمَا تُؤْمَرُ وَأَعْرِضْ عَنِ الْمُشْرِكِينَ﴾
      [الحجر: ٩٤]. فصعد النبي ﷺ جبل الصفا الملاصق للمسجد الحرام،
      ودعا قريشاً بطناً بطناً وقبيلة قبيلة، وسألهم: «أرأيتم لو
      أخبرتكم أن خيلاً بالوادي تريد أن تغير عليكم، أكنتم مصدقي؟»
      قالوا: «ما جربنا عليك إلا صدقاً». فجهر ﷺ ببعثته جهراً.
      فلعنه أبو لهب في موضعه — وفي ذلك نزول سورة المسد (سورة
      ١١١). والجهر بالدعوة هو الانتقال من الدعوة السرية ثلاث
      سنين لذوي القرابة والأصحاب إلى الدعوة العامة التي
      ستعاديها قريش طوال عقد كامل.
    description_fr: |
      Trois ans après la première révélation, Allah ordonna au
      Prophète ﷺ dans le Coran : « avertis ta proche parenté »
      (Q 26:214) et, séparément : « proclame ouvertement ce
      qui t'a été ordonné, et détourne-toi des polythéistes »
      (Q 15:94). Le Prophète ﷺ gravit en conséquence le mont
      al-Ṣafā adjacent à la Mosquée Sacrée, convoqua les Quraysh
      assemblés par tribu et clan, et demanda : « si je vous
      disais qu'une cavalerie venait de derrière cette montagne,
      me croiriez-vous ? » Ils répondirent : « nous ne t'avons
      jamais connu menteur ». Il proclama alors ouvertement sa
      mission prophétique. Abū Lahab le maudit sur place —
      injure occasionnant la révélation de la sourate al-Masad
      (Q 111). La proclamation marque la transition de la
      mission secrète de trois ans d'enseignement aux proches
      famille et amis à la mission publique que Quraysh
      combattrait pendant la décennie suivante.
