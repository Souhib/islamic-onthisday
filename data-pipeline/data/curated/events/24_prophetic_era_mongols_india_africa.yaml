  - slug: death-of-moinuddin-chishti
    category: scholar
    title_en: Death of Khwaja Moinuddin Chishti
    title_ar: وفاة خواجه معين الدين الجشتي
    title_fr: Mort de Khwāja Moinuddin Chishtī
    description_en: |
      Khwaja Muʿin al-Din Chishti — Persian-born Sunni Sufi
      scholar of the Chishti tariqa, who emigrated from Sijistan
      to Delhi during the early Ghurid expansion and settled
      permanently at Ajmer in Rajasthan, founding the Chishti
      order in India — died at Ajmer at age about 95. His
      thirty-year teaching mission at Ajmer drew converts from
      across Hindu-majority north India and established the
      Chishti as the principal Sufi network of the Indian
      subcontinent. Distinct from later Naqshbandi-Mujaddidi
      reform Sufism, the Chishti order embraced indigenous
      cultural forms — Hindi-Urdu hagiographic poetry, the use
      of qawwali musical recitation, and Hindu interfaith
      hospitality — within a strict Sharia framework. His
      *darga* at Ajmer remains the largest Sufi pilgrimage
      destination in the Indian subcontinent, drawing over
      400,000 visitors at the annual ʿurs commemorating his
      death. Through him, Bahaʾ al-Din Zakariya, Niẓam al-Din
      Awliya, and Naṣir al-Din Maḥmud "Chiragh-i Delhi" — every
      classical Indian Sufi master of the Delhi sultanate era —
      traces his initiatic chain.
    description_ar: |
      توفي الخواجه معين الدين الجشتي — صوفي سني فارسي المولد على
      مذهب الطريقة الجشتية، هاجر من سجستان إلى دلهي في بداية
      التوسع الغوري واستقر دائماً في «أجمير» في راجستان، فأسس
      الطريقة الجشتية في الهند — في أجمير عن نحو خمس وتسعين سنة.
      وحركة تدريسه ثلاثين سنة في أجمير اجتذبت معتنقين من عامة
      شمال الهند الذي يغلب عليه الهندوس، وأسست الجشتية شبكة
      الطرق الصوفية الكبرى في شبه القارة الهندية. وامتيازاً
      عن النقشبندية المجدّدية الإصلاحية اللاحقة، تبنّت الجشتية
      المعالم الثقافية المحلية — الشعر الهندي-الأردي في المناقب،
      وإنشاد القوّالي الموسيقي، وضيافة العبادة بين الأديان —
      في إطار الشريعة الصارم. وما زال «درغاه» شيخه بأجمير أكبر
      مزار صوفي في شبه القارة الهندية، يأم سنوياً أكثر من أربع
      مئة ألف زائر في «العرس» ذكرى وفاته. وعبر شيخ الإسلام
      الجشتي تنحدر سلاسل بهاء الدين زكريا ونظام الدين أولياء
      وناصر الدين محمود «جراغ دلهي» — كل أعلام التصوف الهندي
      الكلاسيكي في عصر سلطنة دلهي.
    description_fr: |
      Khwāja Muʿīn al-Dīn Chishtī — savant soufi sunnite né en
      Perse de la *ṭarīqa Chishtiyya*, qui émigra du Sistan à
      Delhi durant la première expansion ghuride et s'installa
      définitivement à Ajmer au Rajasthan, fondant l'ordre
      Chishtī en Inde — mourut à Ajmer à l'âge d'environ 95 ans.
      Sa mission d'enseignement de trente ans à Ajmer attira des
      convertis de tout le nord de l'Inde majoritairement
      hindou et établit la Chishtiyya comme le principal réseau
      soufi du sous-continent indien. Distincte du soufisme
      réformiste Naqshbandiyya-Mujaddidiyya ultérieur, l'ordre
      Chishtī embrassa les formes culturelles indigènes — la
      poésie hagiographique hindi-ourdou, l'usage de la
      récitation musicale *qawwālī*, et l'hospitalité
      interconfessionnelle hindoue — dans un cadre strict de
      *sharīʿa*. Sa *dargāh* à Ajmer demeure la plus grande
      destination de pèlerinage soufie du sous-continent indien,
      attirant plus de 400 000 visiteurs lors du *ʿurs* annuel
      commémorant sa mort. À travers lui, Bahāʾ al-Dīn Zakarīya,
      Niẓām al-Dīn Awliyā et Naṣīr al-Dīn Maḥmūd « Chirāgh-i
      Delhi » — chaque maître soufi indien classique de l'ère
      du sultanat de Delhi — fait remonter sa chaîne initiatique.
