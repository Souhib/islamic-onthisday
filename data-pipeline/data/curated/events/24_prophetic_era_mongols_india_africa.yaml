  - slug: death-of-al-karaji
    category: scientist
    title_en: Death of al-Karaji — algebraist of Baghdad
    title_ar: وفاة الكرجي — جبرى بغداد
    title_fr: Mort d'al-Karajī — algébriste de Bagdad
    description_en: |
      Abu Bakr Muhammad ibn al-Husayn al-Karaji — mathematician
      who flourished at the Buyid court in Baghdad, author of
      the foundational algebra texts *al-Fakhri* and *al-Badiʿ*,
      and the scholar who effected the first complete
      separation of algebra from geometry in mathematical
      history — died at Rayy. He developed the systematic theory
      of polynomials and introduced what would later be called
      *mathematical induction* in his proof of the formula for
      the sum of integral cubes. His treatment of integer-power
      arithmetic in *al-Fakhri* runs parallel to the methods
      formalised in Europe by François Viète in the late 16th
      century — a six-hundred-year priority. His engineering
      treatise *Inbat al-Miyah al-Khafiyya* on subterranean
      water-extraction (qanat construction) is the earliest
      complete manual on the subject in any language; it
      remained the standard reference for Persian-Iraqi qanat
      engineers into the early modern period.
    description_ar: |
      توفي الإمام أبو بكر محمد بن الحسين الكرجي — رياضياتي ازدهر
      في بلاط البويهيين ببغداد، ومصنف كتابي الجبر الأصليين
      «الفخري» و«البديع»، والعالم الذي أحدث أول فصل تام للجبر
      عن الهندسة في تاريخ الرياضيات — بالريّ. طور النظرية
      المنهجية لكثيرات الحدود، وأدخل ما سيسمى لاحقاً «الاستقراء
      الرياضي» في برهانه لقانون مجموع المكعبات الصحيحة. وخوضه
      في حساب القوى الصحيحة في «الفخري» يجري بمناهج موازية
      لما رسمه فرنسوا فييت في أوروبا في أواخر القرن السادس
      عشر — أسبقية بست مئة سنة. وأما كتابه الهندسي «إنباط
      المياه الخفية» في استنباط القنوات الجوفية، فهو أقدم متن
      كامل في هذا الموضوع بأي لغة؛ وظل المرجع المعتمد للقنواتية
      الفارسية-العراقية إلى العصر الحديث المبكر.
    description_fr: |
      Abū Bakr Muḥammad ibn al-Ḥusayn al-Karajī — mathématicien
      qui prospéra à la cour bouyide de Bagdad, auteur des
      textes algébriques fondateurs *al-Fakhrī* et *al-Badīʿ*,
      et le savant qui effectua la première séparation complète
      de l'algèbre de la géométrie dans l'histoire des
      mathématiques — mourut à Rayy. Il développa la théorie
      systématique des polynômes et introduisit ce qui serait
      plus tard appelé l'*induction mathématique* dans sa
      démonstration de la formule de la somme des cubes
      entiers. Son traitement de l'arithmétique des puissances
      entières dans *al-Fakhrī* suit des méthodes parallèles à
      celles formalisées en Europe par François Viète à la
      fin du XVIe siècle — une antériorité de six cents ans.
      Son traité d'ingénierie *Inbāṭ al-Miyāh al-Khafiyya* sur
      l'extraction d'eau souterraine (construction de *qanat*)
      est le plus ancien manuel complet sur le sujet dans toute
      langue; il demeura la référence standard pour les
      ingénieurs persano-irakiens de *qanat* jusqu'à l'époque
      moderne précoce.
