  - slug: martyrdom-of-hamza
    category: companion
    title_en: Martyrdom of Ḥamza ibn ʿAbd al-Muṭṭalib ra — Sayyid al-Shuhadāʾ
    title_ar: استشهاد حمزة بن عبد المطلب رضي الله عنه — سيد الشهداء
    title_fr: Martyre de Ḥamza ibn ʿAbd al-Muṭṭalib ra — *Sayyid al-Shuhadāʾ*
    description_en: |
      Ḥamza ibn ʿAbd al-Muṭṭalib — paternal uncle of the Prophet ﷺ
      and his foster-brother (both nursed by Thuwayba), one of
      the first noble Quraysh men to embrace Islam (in the sixth
      year of the prophetic mission), and the warrior whose
      conversion provided crucial protection for the early
      Meccan Muslims — fell martyred at the Battle of Uhud (3
      AH) at the hand of Wahshi ibn Ḥarb, an Abyssinian slave
      promised freedom by Hind bint ʿUtba in revenge for her
      father's death at Badr. He was about 58. His body was
      mutilated by Hind, who chewed his liver in retaliation.
      The Prophet ﷺ wept over his body — the only time
      classical sources record his sustained public grief over a
      Companion's death — and named him *Sayyid al-Shuhadāʾ*
      (Master of the Martyrs). Wahshi later embraced Islam after
      the conquest of Mecca; the Prophet ﷺ accepted his
      conversion but asked him not to appear in his presence
      thereafter.
    description_ar: |
      استشهد حمزة بن عبد المطلب رضي الله عنه — عم النبي ﷺ من
      أبيه وأخوه من الرضاعة (أرضعتهما ثويبة)، وأحد أوائل أشراف
      قريش الذين دخلوا في الإسلام (في السنة السادسة من البعثة)،
      والمحارب الذي وفّر إسلامه حماية حاسمة للمسلمين الأوائل بمكة —
      في غزوة أحد سنة ثلاث للهجرة على يد وحشي بن حرب، عبد حبشي
      وعدته هند بنت عتبة بالعتق ثأراً لأبيها يوم بدر. وكان عمره
      نحو ثمان وخمسين سنة. ومثّلت هند بجسده فبقرت كبده وعضّته.
      وبكى النبي ﷺ عليه — وهي المرة الوحيدة التي تذكر فيها
      المصادر القديمة حزنه العلني المتواصل على وفاة صحابي — وسماه
      «سيد الشهداء». وأسلم وحشي بعد فتح مكة فقبل النبي ﷺ إسلامه
      وسأله أن يحجب وجهه عنه بعد ذلك.
    description_fr: |
      Ḥamza ibn ʿAbd al-Muṭṭalib — oncle paternel du Prophète ﷺ
      et son frère de lait (tous deux allaités par Thuwayba),
      l'un des premiers hommes nobles de Quraysh à embrasser
      l'Islam (la sixième année de la mission prophétique), et
      le guerrier dont la conversion apporta une protection
      cruciale aux premiers musulmans mecquois — tomba martyr à
      la bataille d'Uḥud (3 H) de la main de Waḥshī ibn Ḥarb,
      esclave abyssinien à qui Hind bint ʿUtba avait promis la
      liberté en vengeance de la mort de son père à Badr. Il
      avait environ 58 ans. Son corps fut mutilé par Hind, qui
      mâcha son foie en représailles. Le Prophète ﷺ pleura sur
      son corps — la seule fois que les sources classiques
      consignent son chagrin public soutenu pour la mort d'un
      Compagnon — et le nomma *Sayyid al-Shuhadāʾ* (Maître des
      Martyrs). Waḥshī embrassa plus tard l'Islam après la
      conquête de La Mecque; le Prophète ﷺ accepta sa conversion
      mais lui demanda de ne plus apparaître en sa présence.
