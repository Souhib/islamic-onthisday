  - slug: year-of-the-elephant
    category: prophetic
    title_en: Year of the Elephant — Defeat of Abraha
    title_ar: عام الفيل — هزيمة أبرهة
    title_fr: Année de l'Éléphant — défaite d'Abraha
    description_en: |
      Abraha al-Ashram, Christian Aksumite viceroy of Yemen,
      marched on Mecca with an army that included a war
      elephant (whose name *Maḥmūd* gave the campaign its Arabic
      name) intending to destroy the Kaʿba and divert Arabian
      pilgrimage to a cathedral he had built at Sanaa. The army
      was destroyed before reaching the city by a flock of
      birds carrying stones of *sijjīl* (baked clay) — the event
      memorialised in Sūrat al-Fīl (Q 105): "Have you not seen
      what your Lord did to the Companions of the Elephant?"
      The same year — by the consensus of classical Muslim
      historians, fifty days after the Elephant Year — the
      Prophet ﷺ was born to Amina bint Wahb in the Banu Hashim
      quarter of Mecca. The synchrony framed his birth as a
      divine sign in the very year Allah had defended His House.
      The Year of the Elephant is conventionally dated 570 CE,
      though Western scholarship sometimes proposes 552 CE based
      on Yemeni inscriptions; classical Muslim chronology is
      uniform.
    description_ar: |
      زحف أبرهة الأشرم نائب الحبشة الأكسومية النصرانية على اليمن
      إلى مكة المكرمة بجيش فيه فيل حربي اسمه «محمود» نوى أن يهدم
      الكعبة المشرفة ويحول الحج العربي إلى كنيسة كان قد شيدها
      بصنعاء. فأهلك الله جيشه قبل أن يبلغ المدينة بطيور أبابيل
      ترميهم بحجارة من سجيل — وهي القصة التي يخلدها قول الله
      تعالى: ﴿أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَابِ
      الْفِيلِ﴾ [الفيل: ١]. وفي السنة نفسها — على إجماع المؤرخين
      المسلمين الأوائل، بعد عام الفيل بخمسين يوماً — ولد النبي
      ﷺ لآمنة بنت وهب في حي بني هاشم بمكة. فجعل التزامن مولده
      ﷺ آية إلهية في السنة نفسها التي حمى فيها الله بيته.
      ويؤرخ عام الفيل اصطلاحاً سنة ٥٧٠ ميلادي، وإن اقترحت
      بعض الأبحاث الغربية سنة ٥٥٢ ميلادي بناء على نقوش يمنية؛
      والتاريخ الإسلامي القديم على رواية واحدة.
    description_fr: |
      Abraha al-Ashram, vice-roi chrétien aksumite du Yémen,
      marcha sur La Mecque avec une armée qui comprenait un
      éléphant de guerre (dont le nom *Maḥmūd* donna à la
      campagne son nom arabe) avec l'intention de détruire la
      Kaʿba et de détourner le pèlerinage arabe vers une
      cathédrale qu'il avait fait construire à Sanaa. L'armée
      fut détruite avant d'atteindre la ville par une nuée
      d'oiseaux portant des pierres de *sijjīl* (argile cuite)
      — événement immortalisé dans la sourate al-Fīl (Q 105) :
      « N'as-tu pas vu ce que ton Seigneur a fait des Compagnons
      de l'Éléphant ? » La même année — par consensus des
      historiens musulmans classiques, cinquante jours après
      l'Année de l'Éléphant — le Prophète ﷺ naquit d'Āmina bint
      Wahb dans le quartier des Banū Hāshim à La Mecque. La
      synchronie présenta sa naissance comme un signe divin
      dans l'année même où Allah avait défendu Sa Maison.
      L'Année de l'Éléphant est conventionnellement datée de
      570 EC, bien que la recherche occidentale propose parfois
      552 EC sur la base d'inscriptions yéménites; la chronologie
      musulmane classique est uniforme.
