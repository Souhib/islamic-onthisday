  - slug: death-of-abdullah-ibn-salam
    category: companion
    title_en: Death of ʿAbdullah ibn Salam ra
    title_ar: وفاة عبد الله بن سلام رضي الله عنه
    title_fr: Mort d'ʿAbdallāh ibn Salām ra
    description_en: |
      Abu Yusuf ʿAbdullah ibn Salam al-Isra'ili — leading rabbi
      of the Banu Qaynuqaʿ tribe of Medina, scholar of the
      Hebrew scriptures, and the most prominent Jewish convert
      to Islam during the Madinan period (he embraced Islam on
      the day of the Prophet's ﷺ arrival at Quba) — died in
      Medina at age about 80. He recognised the Prophet ﷺ from
      Hebrew prophetic descriptions and submitted three test
      questions whose answers, he said, only a true prophet
      could know — he received them and embraced Islam on the
      spot. He kept his conversion hidden initially, asking the
      Prophet ﷺ to summon his Jewish kinsmen and inquire about
      him before disclosure — an episode preserved in detail by
      al-Bukhari. The hadith *kana minkum hadhihi al-amma rajulun*
      ("there was among this nation a man") in which the Prophet ﷺ
      confirmed his Paradise refers to him.
    description_ar: |
      توفي أبو يوسف عبد الله بن سلام الإسرائيلي رضي الله عنه — كبير
      أحبار يهود بني قينقاع بالمدينة، عالم بالعبرية وكتب الأنبياء،
      وأبرز من أسلم من اليهود في العصر المدني (دخل في الإسلام يوم
      وصول النبي ﷺ إلى قباء) — بالمدينة المنورة عن نحو ثمانين سنة.
      عرف رحمه الله النبي ﷺ من أوصاف الأنبياء في التوراة، وعرض
      عليه ثلاث مسائل اختبارية قال إنه ما كان يعرف جوابها إلا
      نبي حق — فأجابه النبي ﷺ فأسلم في موضعه. وكتم إسلامه أول
      الأمر طلباً منه إلى النبي ﷺ أن يستدعي إخوانه اليهود
      ويسألهم عنه قبل أن يخبرهم — وهي القصة التي يحفظها البخاري
      في صحيحه مفصلة. وحديث «كان منكم هذه الأمة رجل» الذي بشره
      فيه النبي ﷺ بالجنة فيه نزل.
    description_fr: |
      Abū Yūsuf ʿAbdullāh ibn Salām al-Isrāʾīlī — rabbin principal
      de la tribu des Banū Qaynuqāʿ à Médine, savant des
      écritures hébraïques, et le plus éminent converti juif à
      l'Islam pendant la période médinoise (il embrassa l'Islam
      le jour de l'arrivée du Prophète ﷺ à Qubāʾ) — mourut à
      Médine à l'âge d'environ 80 ans. Il reconnut le Prophète ﷺ
      à partir des descriptions prophétiques hébraïques et soumit
      trois questions-test dont les réponses, dit-il, seul un
      vrai prophète pouvait les connaître — il les reçut et
      embrassa l'Islam sur place. Il garda d'abord sa conversion
      cachée, demandant au Prophète ﷺ de convoquer ses parents
      juifs et de se renseigner à son sujet avant la divulgation
      — épisode préservé en détail par al-Bukhārī. Le hadith
      *kāna minkum hādhihi al-umma rajulun* (« il y eut parmi
      cette nation un homme ») dans lequel le Prophète ﷺ confirma
      son entrée au Paradis fait référence à lui.
    canonical_hijri: {year: 43, precision: year}
