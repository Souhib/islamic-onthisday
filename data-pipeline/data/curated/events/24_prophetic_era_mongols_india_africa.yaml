  - slug: death-of-al-khazini
    category: scientist
    title_en: Death of al-Khazini — Mizan al-Hikma
    title_ar: وفاة الخازني — صاحب «ميزان الحكمة»
    title_fr: Mort d'al-Khāzinī — auteur du *Mīzān al-Ḥikma*
    description_en: |
      Abu al-Fath ʿAbd al-Rahman al-Khazini — Byzantine-origin
      slave-emancipated polymath at the Saljuq court at Marv,
      author of *Kitab Mizan al-Ḥikma* (the Book of the Balance
      of Wisdom), the most extensive medieval treatise on
      hydrostatics and the physics of weighing — died around
      530 AH. *Mizan al-Ḥikma* presents the theoretical and
      experimental basis for measurement of specific gravity
      with greater accuracy than any work of European hydrostatics
      until Galileo and Stevin in the late 16th century. He
      tabulated the specific gravities of fifty substances
      (metals, gemstones, liquids) with errors of less than 1%
      — values still cited in twentieth-century scientific-
      history publications. His astronomical handbook *al-Zij
      al-Sanjari* was produced at the order of Saljuq Sultan
      Sanjar; his treatise *Ḥawadith al-ʿAlam* on world phenomena
      addresses optical, atmospheric, and physiological questions
      with the systematic experimental orientation that
      characterised the broader Marv-Khurasan school.
    description_ar: |
      توفي الإمام أبو الفتح عبد الرحمن الخازني — عالم موسوعي من
      أصول رومية، عتيق في بلاط السلاجقة بـ«مرو»، ومصنف «كتاب
      ميزان الحكمة»، أوسع متن في علم الهيدروستاتيكا وفيزياء
      الوزن في العصور الوسطى — نحو سنة ٥٣٠ هـ. ويقدم «ميزان
      الحكمة» الأساس النظري والتجريبي لقياس الكثافة النوعية
      بدقة تفوق دقة أي عمل في الهيدروستاتيكا الأوروبية حتى
      غاليليو وستيفن في أواخر القرن السادس عشر. سجل في جداوله
      الكثافات النوعية لخمسين مادة (معادن وأحجار كريمة وسوائل)
      بنسب خطأ أقل من ١٪ — وهي القيم التي ما زالت تستشهد بها
      منشورات تاريخ العلم في القرن العشرين. أما زيجه الفلكي
      «الزيج السنجري» فأخرجه بأمر السلطان السلجوقي سنجر؛
      ورسالته «حوادث العالم» في ظواهر العالم تخوض في مسائل
      البصريات والأرصاد الجوية والفسيولوجيا بالتوجه التجريبي
      المنهجي الذي يميز مدرسة مرو-خراسان الأوسع.
    description_fr: |
      Abū al-Fatḥ ʿAbd al-Raḥmān al-Khāzinī — polymathe d'origine
      byzantine émancipé d'esclavage à la cour seldjoukide de
      Merv, auteur du *Kitāb Mīzān al-Ḥikma* (Le Livre de la
      Balance de la Sagesse), le traité médiéval le plus
      exhaustif sur l'hydrostatique et la physique de la pesée
      — mourut vers 530 H. *Mīzān al-Ḥikma* présente la base
      théorique et expérimentale pour la mesure de la gravité
      spécifique avec une précision supérieure à tout ouvrage
      d'hydrostatique européen jusqu'à Galilée et Stevin à la
      fin du XVIe siècle. Il dressa des tables de gravités
      spécifiques de cinquante substances (métaux, pierres
      précieuses, liquides) avec des erreurs inférieures à 1%
      — valeurs encore citées dans les publications
      d'historiographie scientifique du XXe siècle. Son manuel
      astronomique *al-Zīj al-Sanjarī* fut produit sur l'ordre
      du sultan seldjoukide Sanjar; son traité *Ḥawādith al-
      ʿĀlam* sur les phénomènes mondiaux traite de questions
      optiques, atmosphériques et physiologiques avec
      l'orientation expérimentale systématique qui caractérisa
      l'école plus large de Marv-Khurasan.
