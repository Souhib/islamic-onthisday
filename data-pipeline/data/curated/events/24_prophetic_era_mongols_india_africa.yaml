  - slug: boycott-of-banu-hashim
    category: prophetic
    title_en: Quraysh Boycott of Banū Hāshim and Banū al-Muṭṭalib
    title_ar: حصار قريش لبني هاشم وبني المطلب
    title_fr: Boycott de Quraysh contre les Banū Hāshim et Banū al-Muṭṭalib
    description_en: |
      The leaders of Quraysh, after seven years of failing to
      stop the Prophet's ﷺ public preaching, signed a written
      pact and posted it in the Kaʿba: no Meccan would marry
      from, sell food to, or buy from the Banū Hāshim and Banū
      al-Muṭṭalib clans (the Prophet's ﷺ extended kin and his
      protectors) until they handed him over for execution. The
      two clans, including their non-Muslim members under the
      pact-leadership of Abu Ṭalib, retreated to a narrow
      mountain valley known as *Shiʿb Abi Ṭalib*. The boycott
      lasted three years. Family members on the outside smuggled
      food in at night; some Muslims among the besieged died of
      starvation. The pact was finally broken when five Quraysh
      youths (led by Hisham ibn ʿAmr) prevailed on the rest to
      annul it; they discovered the parchment had been eaten by
      termites except for the words *bi-ismika Allāhumma* ("In
      Your name, O Allah") at its head — a sign the Prophet ﷺ
      had foretold to his uncle. Khadīja and Abu Ṭalib both
      died within months of the boycott's end, in what became
      called the *ʿĀm al-Ḥuzn* (Year of Sorrow).
    description_ar: |
      كتب سادة قريش — بعد سبع سنين من عجزهم عن إيقاف دعوة النبي ﷺ
      الجاهرة — صحيفة معاهدة معلقة في الكعبة: ألا يناكح أحدُ
      أهلِ مكة بني هاشم وبني المطلب (قرابة النبي ﷺ وحماته)، ولا
      يبيع لهم طعاماً ولا يبتاع منهم، حتى يسلموه إليهم للقتل.
      فاعتزل بنو هاشم وبنو المطلب — بمن فيهم غير المسلمين منهم
      تحت قيادة المعاهدة لأبي طالب — في شعب أبي طالب الجبلي
      الضيق. ودام الحصار ثلاث سنين. وكان بعض ذوي القربى من خارج
      الشعب يهربون لهم الطعام ليلاً، وبعض المسلمين منهم مات
      جوعاً. وانكسرت الصحيفة آخر الأمر بفعل خمسة من فتيان قريش
      (بقيادة هشام بن عمرو) أقنعوا سائرَهم بنقضها؛ فاكتشفوا أن
      الأرضة قد أكلت رق الصحيفة كلَّه إلا «باسمك اللهم» في
      رأسها — وهي آية أخبر بها النبي ﷺ عمَّه قبل ذلك. وتوفي
      كل من خديجة وأبي طالب رضي الله عنهما في غضون أشهر من
      انتهاء الحصار، فيما صار يعرف بـ«عام الحزن».
    description_fr: |
      Les chefs de Quraysh, après sept ans d'échec à arrêter la
      prédication publique du Prophète ﷺ, signèrent un pacte
      écrit et l'affichèrent dans la Kaʿba : aucun Mecquois ne
      se marierait avec, ne vendrait de la nourriture à, ni
      n'achèterait des Banū Hāshim et Banū al-Muṭṭalib (les
      parents étendus du Prophète ﷺ et ses protecteurs) jusqu'à
      ce qu'ils le livrent à l'exécution. Les deux clans, y
      compris leurs membres non musulmans sous la direction du
      pacte par Abū Ṭālib, se retirèrent dans une vallée
      montagneuse étroite connue comme *Shiʿb Abī Ṭālib*. Le
      boycott dura trois ans. Des membres de la famille à
      l'extérieur faisaient passer en contrebande de la
      nourriture la nuit; certains musulmans parmi les assiégés
      moururent de faim. Le pacte fut finalement brisé lorsque
      cinq jeunes Quraysh (menés par Hishām ibn ʿAmr) convainquirent
      le reste de l'annuler; ils découvrirent que le parchemin
      avait été mangé par les termites sauf les mots *bi-ismika
      Allāhumma* (« En Ton nom, ô Allah ») à sa tête — un
      signe que le Prophète ﷺ avait prédit à son oncle. Khadīja
      et Abū Ṭālib moururent tous deux dans les mois qui
      suivirent la fin du boycott, dans ce qui devint appelé
      l'*ʿĀm al-Ḥuzn* (Année de Tristesse).
    canonical_hijri: {year: -7, precision: year}
