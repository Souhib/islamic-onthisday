  - slug: mongol-siege-of-bukhara
    category: battle
    title_en: Mongol Sack of Bukhara
    title_ar: استباحة المغول بخارى
    title_fr: Sac mongol de Boukhara
    description_en: |
      Genghis Khan's Mongol army arrived before the walls of
      Bukhara during his invasion of the Khwarazmian empire.
      The garrison sortied and was annihilated; the citizens
      surrendered, but Genghis Khan personally rode his horse
      into the central Friday mosque, threw down its Qurʾans
      under his soldiers' feet, and declared in a speech to
      the assembled population (preserved verbatim by Juwayni
      and translated by Ibn al-Athir) that he was the punishment
      of God sent against them for their sins. The city was then
      systematically pillaged for five days; classical Muslim
      sources record that 30,000 of the male inhabitants were
      slaughtered and the surviving women, children, and skilled
      craftsmen deported into Mongol service. The fire that
      ensued from the looting destroyed the bulk of the city.
      Bukhara — the cradle of al-Bukhari and one of the great
      hadith centres of the Islamic east — never fully recovered
      its pre-Mongol intellectual stature. Ibn al-Athir's
      eyewitness account in *al-Kāmil fī al-Tārīkh* opens with
      the famous line: "If anyone were to say that since God
      created Adam no calamity like this had befallen humanity,
      he would be telling the truth."
    description_ar: |
      وصل جيش جنكيز خان المغولي إلى أسوار بخارى في غزوته للدولة
      الخوارزمية. خرجت الحامية فأبيدت، فاستسلم أهل المدينة، فدخل
      جنكيز خان بنفسه على فرسه إلى الجامع الكبير، وألقى مصاحف
      القرآن تحت أقدام جنوده، وألقى خطبة في الناس المجتمعين (يحفظها
      الجويني نصاً ويترجمها ابن الأثير) قال فيها إنه عقاب الله
      المسلط عليهم بسبب ذنوبهم. ثم استبيحت المدينة خمسة أيام؛
      وذكرت كتب التاريخ الإسلامي القديمة أن ثلاثين ألفاً من رجال
      أهلها قتلوا، وسيقت من بقي من النساء والأطفال والصناع المهرة
      عبيداً للمغول. وأحرق ما اشتعل من النهب معظم المدينة. وبخارى
      — مهد الإمام البخاري وأحد أعظم مراكز الحديث في المشرق
      الإسلامي — لم تستعد قط مكانتها العلمية قبل المغول. ويفتتح
      ابن الأثير شاهد العصر روايته في «الكامل» بالعبارة المشهورة:
      «لو قيل إن العالم منذ خلق الله آدم إلى الآن لم يبتل بمثله
      لكان قائله صادقاً».
    description_fr: |
      L'armée mongole de Gengis Khan arriva devant les murs de
      Boukhara durant son invasion de l'empire khwarezmien. La
      garnison sortit et fut anéantie; les citoyens capitulèrent,
      mais Gengis Khan chevaucha personnellement jusqu'à la
      grande mosquée du vendredi, jeta ses Corans sous les pieds
      de ses soldats et déclara dans un discours à la population
      assemblée (préservé verbatim par Juwaynī et traduit par
      Ibn al-Athīr) qu'il était le châtiment de Dieu envoyé
      contre eux pour leurs péchés. La ville fut ensuite
      systématiquement pillée pendant cinq jours; les sources
      musulmanes classiques rapportent que 30 000 des habitants
      mâles furent massacrés et les femmes, enfants et artisans
      qualifiés survivants déportés au service mongol.
      L'incendie qui s'ensuivit du pillage détruisit l'essentiel
      de la ville. Boukhara — berceau d'al-Bukhārī et l'un des
      grands centres de hadith de l'Orient islamique — ne
      retrouva jamais pleinement sa stature intellectuelle
      pré-mongole. Le récit de témoin oculaire d'Ibn al-Athīr
      dans *al-Kāmil fī al-Tārīkh* s'ouvre par la célèbre
      phrase : « si quelqu'un disait que depuis que Dieu créa
      Adam une calamité comme celle-ci ne s'était abattue sur
      l'humanité, il dirait la vérité ».
    canonical_hijri: {year: 617, month: 2, precision: month}
    canonical_gregorian: {date: 1220-02-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
      - source_key: ibn_kathir_bidaya
      - source_key: dhahabi_tarikh_islam
    tags: [mongols, bukhara, khwarazm, genghis-khan, transoxiana, catastrophe]
    importance: major
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Siege_of_Bukhara_(1220)"

  - slug: founding-of-maragha-observatory
    category: foundation
    title_en: Founding of the Maragha Observatory
    title_ar: تأسيس مرصد مراغة
    title_fr: Fondation de l'observatoire de Marāgha
    description_en: |
      Hulagu Khan, recently the conqueror of Baghdad and now
      consolidating Ilkhanid rule across Persia, ordered the
      construction of a state-funded astronomical observatory
      at Maragha in northwestern Iran on the recommendation of
      the polymath Naṣir al-Din al-Ṭusi, whom he had taken
      from the Ismaʿili fortress at Alamut into his court. The
      observatory was completed within four years and remained
      in operation for nearly a century, becoming the leading
      research observatory of the medieval world. Its scientists
      — including al-Ṭusi himself, Quṭb al-Din al-Shirazi, and
      Mu'ayyad al-Din al-ʿUrdi — produced the *Zīj-i Ilkhāni*
      (the most accurate astronomical handbook of its time),
      developed the *Ṭusi couple* and the ʿUrdi lemma (geometric
      devices later used by Copernicus to reform planetary
      models without explicit attribution), and trained a
      generation of astronomers whose work spread to Damascus,
      Cairo, and Samarqand. The library housed an estimated
      400,000 volumes drawn from across the Mongol-conquered
      lands. The observatory was destroyed in the Timurid
      raids of the late 14th century.
    description_ar: |
      أمر هولاكو خان — فاتح بغداد حديثاً والمستقر بسلطان
      الإيلخانيين على بلاد فارس — ببناء مرصد فلكي تموله الدولة
      في «مراغة» شمال غرب إيران، بناء على إشارة من الموسوعي نصير
      الدين الطوسي الذي أخرجه من قلعة الإسماعيلية الباطنية في
      آلموت إلى بلاطه. واستكمل بناء المرصد في أربع سنين، وظل
      عاملاً قرابة قرن، فصار مرصد الأبحاث الرائد في العالم في
      العصور الوسطى. وأخرج علماؤه — منهم الطوسي نفسه وقطب الدين
      الشيرازي ومؤيد الدين العرضي — «الزيج الإيلخاني» (أدق زيج
      فلكي في زمنه)، وطوروا «شكل الطوسي» و«قاعدة العرضي» (أداتين
      هندسيتين استخدمهما كوبرنيكوس لاحقاً في تنقيح النماذج
      الكوكبية دون نسبتهما إليهما)، ودرّبوا جيلاً من الفلكيين
      انتشر علمهم إلى دمشق والقاهرة وسمرقند. وضمت مكتبته نحو
      أربع مئة ألف مجلد جلبت من البلاد التي فتحها المغول. ودمر
      المرصد في غزوات تيمور لنك في أواخر القرن الرابع عشر
      الميلادي.
    description_fr: |
      Hulagu Khan, récent conquérant de Bagdad et désormais
      consolidant le règne ilkhanide sur la Perse, ordonna la
      construction d'un observatoire astronomique financé par
      l'État à Marāgha dans le nord-ouest de l'Iran sur la
      recommandation du polymathe Naṣīr al-Dīn al-Ṭūsī, qu'il
      avait fait sortir de la forteresse ismaélienne d'Alamut
      pour le ramener à sa cour. L'observatoire fut achevé en
      quatre ans et demeura en activité près d'un siècle,
      devenant l'observatoire de recherche de référence du
      monde médiéval. Ses scientifiques — dont al-Ṭūsī lui-
      même, Quṭb al-Dīn al-Shīrāzī et Muʾayyad al-Dīn al-ʿUrḍī
      — produisirent le *Zīj-i Īlkhānī* (le manuel astronomique
      le plus précis de son temps), développèrent le *couple
      de Ṭūsī* et le lemme d'ʿUrḍī (dispositifs géométriques
      plus tard utilisés par Copernic pour réformer les modèles
      planétaires sans attribution explicite), et formèrent une
      génération d'astronomes dont les travaux se diffusèrent
      à Damas, au Caire et à Samarcande. La bibliothèque abrita
      quelque 400 000 volumes provenant de toutes les terres
      conquises par les Mongols. L'observatoire fut détruit
      lors des raids timourides de la fin du XIVe siècle.
    canonical_hijri: {year: 657, precision: year}
    canonical_gregorian: {date: 1259-01-01, precision: year, method: tabular_conversion}
