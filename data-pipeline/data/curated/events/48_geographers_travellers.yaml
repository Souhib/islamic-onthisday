  - slug: death-of-al-istakhri-geographer
    category: scholar_death
    title_en: Death of al-Iṣṭakhrī — Author of *al-Masālik wa-l-Mamālik*
    title_ar: وفاة الإصطخري — صاحب «المسالك والممالك»
    title_fr: Mort d'al-Iṣṭakhrī — auteur d'*al-Masālik wa-l-Mamālik*
    description_en: |
      Abū Isḥāq Ibrāhīm ibn Muḥammad al-Fārisī al-Iṣṭakhrī —
      geographer of the Persian city of Iṣṭakhr (near Persepolis)
      and second pillar of the so-called Balkhī school after Abū
      Zayd al-Balkhī (d. 322 AH, whose lost geographical work he
      revised) — died in or about 346 AH (957 CE). His *Kitāb
      al-Masālik wa-l-Mamālik* — also called *Ṣuwar al-Aqālīm* —
      organised the inhabited world into twenty climates and
      paired the descriptive text with twenty regional maps,
      making it the first Arabic geography to integrate
      cartography fully with prose description. The work was
      enlarged and revised by his pupil and successor Ibn
      Ḥawqal. The exact day and month of death are not preserved
      in the classical sources; the year is reconstructed from
      Ibn Ḥawqal's biographical preface and the *Fihrist*.
    description_ar: |
      توفي أبو إسحاق إبراهيم بن محمد الفارسي الإصطخري — جغرافيُّ
      مدينة إصطخر الفارسية (قرب برسبوليس)، والركنُ الثاني من
      «المدرسة البلخية» بعد أبي زيد البلخي (المتوفى سنة ٣٢٢ هـ
      الذي راجع كتابه الجغرافي المفقود) — في حدود سنة ست
      وأربعين وثلاثمئة للهجرة (٩٥٧ م). ورتَّب كتابه «المسالك
      والممالك» — ويسمَّى أيضاً «صور الأقاليم» — معمورةَ الأرض
      على عشرين إقليماً، وقرن النصَّ الوصفيَّ بعشرين خريطة
      إقليمية، فكان أوّل كتابٍ جغرافي عربي يُدمج فيه الرسم
      الكارتوغرافي بالوصف النصي إدماجاً تامّاً. وقد وسَّعه
      تلميذه وخليفته ابن حوقل وراجعه. ولم تحفظ المصادرُ القديمة
      اليومَ ولا الشهر؛ والسنةُ مستنبطة من مقدمة ابن حوقل
      البيوغرافية ومن «الفهرست».
    description_fr: |
      Abū Isḥāq Ibrāhīm ibn Muḥammad al-Fārisī al-Iṣṭakhrī —
      géographe de la ville persane d'Iṣṭakhr (près de Persépolis)
      et second pilier de la dite école balkhīenne après Abū
      Zayd al-Balkhī (m. 322 H, dont il révisa l'ouvrage
      géographique perdu) — mourut vers 346 H (957 EC). Son
      *Kitāb al-Masālik wa-l-Mamālik* — aussi appelé *Ṣuwar al-
      Aqālīm* — organise le monde habité en vingt climats et
      apparie le texte descriptif à vingt cartes régionales,
      faisant de l'œuvre la première géographie arabe à intégrer
      pleinement la cartographie à la description en prose.
      L'ouvrage fut élargi et révisé par son disciple et
      successeur Ibn Ḥawqal. Le jour et le mois exacts du décès
      ne sont pas conservés dans les sources classiques ;
      l'année est reconstruite à partir de la préface
      biographique d'Ibn Ḥawqal et du *Fihrist*.
    canonical_hijri: {year: 346, precision: year}
    canonical_gregorian: {date: 957-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'al-Iṣṭakhrī' gives c. 346/957; year-precision only."
      - source_key: editorial
        notes: "Cross-checked against the introduction to de Goeje's *Bibliotheca Geographorum Arabicorum* I and Ibn Ḥawqal's preface to *Ṣūrat al-Arḍ*."
    people: [[al-istakhri, died]]
    tags: [buyid, geographer, cartography, persia, masalik, balkhi-school]
    importance: notable
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Estakhri"

  - slug: death-of-ibn-hawqal
    category: scholar_death
    title_en: Death of Ibn Ḥawqal — Author of *Ṣūrat al-Arḍ*
    title_ar: وفاة ابن حوقل — صاحب «صورة الأرض»
    title_fr: Mort d'Ibn Ḥawqal — auteur de *Ṣūrat al-Arḍ*
    description_en: |
      Abū al-Qāsim Muḥammad ibn ʿAlī ibn Ḥawqal al-Naṣībī — Mosul-
      born merchant-traveller turned geographer and (it appears
      from his eastern provinces) Fāṭimid intelligence operative
      — died after 367 AH (after 977 CE), with the year
      sometimes given as 367 AH and sometimes c. 380 AH. He spent
      thirty years (331-362 AH / 943-973 CE) traversing the lands
      of Islam from Andalus and the Maghrib through Egypt, Iraq,
      Khurāsān and Sind, before fixing his observations in
      *Kitāb Ṣūrat al-Arḍ* — a thoroughgoing revision and
      expansion of al-Iṣṭakhrī, with new maps and especially rich
      eyewitness material on Sicily, the Maghrib, and Khazaria.
      Year-precision is retained because the classical sources do
      not converge on a date.
    description_ar: |
      توفي أبو القاسم محمد بن علي بن حوقل النصيبيُّ — تاجرٌ
      رحَّالٌ من أهل الموصل، انقلب جغرافيّاً ومخبراً للفاطميين
      على ما يلوح من أخباره في المشرق — بعد سنة سبعٍ وستين
      وثلاثمئة للهجرة (بعد ٩٧٧ م)، وقد قيل في وفاته سنة ٣٦٧ هـ
      وقيل نحو ٣٨٠ هـ. وقد قضى ثلاثين سنة (٣٣١–٣٦٢ هـ /
      ٩٤٣–٩٧٣ م) في الترحال بين بلاد الإسلام من الأندلس والمغرب
      إلى مصر والعراق وخراسان والسند، ثم سَطَّر مشاهداته في
      «كتاب صورة الأرض» — مراجعة شاملة لكتاب الإصطخري وتوسعة
      له، بخرائط جديدة ومادة مشاهدةٍ غزيرةٍ خاصةً في صقلية
      والمغرب وبلاد الخزر. ويُكتفى بدقّة السنة لعدم اتفاق
      المصادر على تاريخ.
    description_fr: |
      Abū al-Qāsim Muḥammad ibn ʿAlī ibn Ḥawqal al-Naṣībī —
      marchand-voyageur originaire de Mossoul devenu géographe
      et (il apparaît à la lecture de ses provinces orientales)
      agent de renseignement fāṭimide — mourut après 367 H
      (après 977 EC), l'année étant donnée tantôt à 367 H tantôt
      vers 380 H. Il passa trente ans (331-362 H / 943-973 EC)
      à parcourir les pays d'Islam, de l'Andalus et du Maghreb à
      l'Égypte, l'Irak, le Khurāsān et le Sind, avant de fixer
      ses observations dans son *Kitāb Ṣūrat al-Arḍ* — révision
      et expansion approfondies d'al-Iṣṭakhrī, avec de nouvelles
      cartes et un matériel d'observation particulièrement riche
      sur la Sicile, le Maghreb et la Khazarie. Précision
      annuelle conservée — les sources classiques ne convergent
      pas sur une date.
    canonical_hijri: {year: 367, precision: year}
    canonical_gregorian: {date: 977-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Ibn Ḥawḳal' gives 'after 367/977', following the testimony of Ibn al-Nadīm; some later sources place the death c. 380/990 — year-precision retained because no classical source converges."
      - source_key: editorial
        notes: "Alternative date c. 380/990 noted in Kramers' introduction to the second Leiden edition (1938-39)."
    people: [[ibn-hawqal, died]]
