  - slug: completion-of-taqwim-al-buldan
    category: book_completion
    title_en: Completion of Abū al-Fidāʾ's *Taqwīm al-Buldān*
    title_ar: إتمام «تقويم البلدان» لأبي الفداء
    title_fr: Achèvement du *Taqwīm al-Buldān* d'Abū al-Fidāʾ
    description_en: |
      al-Malik al-Muʾayyad Ismāʿīl ibn ʿAlī ibn Maḥmūd Abū al-
      Fidāʾ al-Ayyūbī — Ayyūbid prince of Hama under Mamlūk
      suzerainty, historian, and geographer — completed his
      *Taqwīm al-Buldān* ("The Sketch of Countries") in 721 AH
      (1321 CE). The work is a tabular world geography giving
      latitude, longitude, climate, and short prose entries for
      every important city of the inhabited world, organised by
      the seven Ptolemaic climates. Abū al-Fidāʾ synthesised
      Ibn Ḥawqal, al-Idrīsī, Yāqūt, and Ibn Saʿīd al-Maghribī
      into a single coordinate-based reference; the work was
      partly translated into Latin by John Greaves in the
      seventeenth century and into French by Joseph Reinaud and
      Stanislas Guyard in the nineteenth — the first major
      Arabic geographical work to enter the European
      Orientalist canon. Internal references to events of 721 AH
      establish the date.
    description_ar: |
      أتمَّ الملك المؤيد إسماعيل بن علي بن محمود أبو الفداء
      الأيوبيُّ — أمير حماة الأيوبي تحت سيادة المماليك،
      المؤرخُ والجغرافي — كتابَه «تقويم البلدان» سنة إحدى وعشرين
      وسبعمئة للهجرة (١٣٢١ م). والكتاب جغرافيا عالمية مرتَّبة في
      جداول، يضع عرضَ كلِّ مدينة وطولَها ومناخَها ومدخلاً نثرياً
      موجزاً عنها، مرتَّبةً على الأقاليم البطلمية السبعة. وقد
      مزج أبو الفداء ابنَ حوقل والإدريسيَّ وياقوتَ وابنَ سعيد
      المغربي في مرجع واحد قائم على الإحداثيات؛ وتُرجم الكتاب
      جزئياً إلى اللاتينية على يد جون غريفز في القرن السابع عشر،
      وإلى الفرنسية على يد جوزيف رينو وستانيسلاس غيار في القرن
      التاسع عشر — وكان أوّل عمل جغرافي عربي كبير يدخل المدوّنة
      الاستشراقية الأوروبية. والإشارات الداخلية إلى أحداث
      سنة ٧٢١ هـ هي مستندُ التاريخ.
    description_fr: |
      al-Malik al-Muʾayyad Ismāʿīl ibn ʿAlī ibn Maḥmūd Abū al-
      Fidāʾ al-Ayyūbī — prince ayyūbide de Hama sous suzeraineté
      mamelouke, historien et géographe — acheva son *Taqwīm
      al-Buldān* ("Tableau des Pays") en 721 H (1321 EC).
      L'ouvrage est une géographie mondiale tabulaire qui donne
      la latitude, la longitude, le climat et une notice en
      prose brève pour chaque ville importante du monde habité,
      organisée selon les sept climats ptolémaïques. Abū al-Fidāʾ
      synthétisa Ibn Ḥawqal, al-Idrīsī, Yāqūt et Ibn Saʿīd al-
      Maghribī en une référence unique fondée sur les coordonnées ;
      l'œuvre fut partiellement traduite en latin par John
      Greaves au XVIIe siècle et en français par Joseph Reinaud
      et Stanislas Guyard au XIXe — la première œuvre
      géographique arabe majeure à entrer dans le canon
      orientaliste européen. Les références internes à des
      événements de 721 H établissent la date.
    canonical_hijri: {year: 721, precision: year}
    canonical_gregorian: {date: 1321-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Abū al-Fidāʾ' dates *Taqwīm al-Buldān* to 721/1321."
      - source_key: editorial
        notes: "Cross-checked against Reinaud-Guyard, *Géographie d'Aboulféda*, Paris 1848-83, vol. I introduction."
    people: [[abu-al-fida, author]]
