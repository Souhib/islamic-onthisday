  - slug: completion-of-ahsan-al-taqasim
    category: book_completion
    title_en: Completion of al-Muqaddasī's *Aḥsan al-Taqāsīm*
    title_ar: إتمام «أحسن التقاسيم» للمقدسي
    title_fr: Achèvement d'*Aḥsan al-Taqāsīm* d'al-Muqaddasī
    description_en: |
      Abū ʿAbd Allāh Muḥammad ibn Aḥmad al-Muqaddasī — known also
      as al-Bashshārī, born at al-Quds (Jerusalem) c. 335 AH,
      grandson of an architect of the city's walls — completed
      his *Aḥsan al-Taqāsīm fī Maʿrifat al-Aqālīm* ("Best
      Divisions for Knowledge of the Provinces") in 375 AH (985-
      986 CE). The work is the methodological masterpiece of the
      Balkhī school: a fourteen-province survey of the Islamic
      world built on twenty years of personal travel, written in
      a self-reflective prose that distinguishes what the author
      saw, what he was told, and what he read — a discipline
      anticipating modern source-criticism. al-Muqaddasī describes
      Mecca, Medina, Jerusalem, Baghdad, Cairo, Cordoba, Bukhārā
      and Samarqand from autopsy. The work is dated by the
      author's own statement that he composed it under the
      Sāmānid amīr Nūḥ ibn Manṣūr (regn. 365-387 AH).
    description_ar: |
      أتمَّ أبو عبد الله محمد بن أحمد المقدسيُّ — المعروف
      أيضاً بالبشَّاري، المولود ببيت المقدس نحو سنة ٣٣٥ هـ،
      وحفيد أحد بنّائي سور المدينة — كتابَه «أحسن التقاسيم
      في معرفة الأقاليم» سنة خمسٍ وسبعين وثلاثمئة للهجرة
      (٩٨٥–٩٨٦ م). والكتاب درّةُ المنهج عند المدرسة البلخية:
      مَسْحٌ لأقاليم العالم الإسلامي الأربعة عشر، بُني على
      عشرين سنة من الترحال الشخصي، بنثرٍ تأملي يميّز فيه
      المؤلفُ ما رآه عيناً مما سمعه ومما قرأه — منهجٌ يستبق
      نقدَ المصادر الحديث. ويصف المقدسي مكةَ والمدينةَ والقدسَ
      وبغدادَ والقاهرةَ وقرطبةَ وبخارى وسمرقند مشاهدةً. ومستندُ
      التاريخ تصريحُ المؤلف بأنه ألّفه في عهد الأمير الساماني
      نوح بن منصور (٣٦٥–٣٨٧ هـ).
    description_fr: |
      Abū ʿAbd Allāh Muḥammad ibn Aḥmad al-Muqaddasī — dit aussi
      al-Bashshārī, né à al-Quds (Jérusalem) vers 335 H, petit-
      fils d'un architecte des remparts de la ville — acheva son
      *Aḥsan al-Taqāsīm fī Maʿrifat al-Aqālīm* ("Meilleures
      Divisions pour la connaissance des provinces") en 375 H
      (985-986 EC). L'ouvrage est le chef-d'œuvre méthodologique
      de l'école balkhīenne : un relevé en quatorze provinces du
      monde islamique fondé sur vingt années de voyages
      personnels, rédigé dans une prose réflexive qui distingue
      ce que l'auteur a vu, ce qu'on lui a rapporté et ce qu'il
      a lu — une discipline qui anticipe la critique des sources
      moderne. al-Muqaddasī décrit La Mecque, Médine, Jérusalem,
      Bagdad, Le Caire, Cordoue, Boukhārā et Samarcande
      d'autopsie. La datation repose sur la déclaration même de
      l'auteur, qui affirme avoir composé l'ouvrage sous l'émir
      sāmānide Nūḥ ibn Manṣūr (r. 365-387 H).
    canonical_hijri: {year: 375, precision: year}
    canonical_gregorian: {date: 985-01-01, precision: year, method: tabular_conversion}
