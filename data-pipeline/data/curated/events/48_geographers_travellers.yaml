  - slug: death-of-abu-al-fida
    category: scholar_death
    title_en: Death of Abū al-Fidāʾ — Prince-Historian of Hama
    title_ar: وفاة أبي الفداء — الملك المؤرخ صاحب حماة
    title_fr: Mort d'Abū al-Fidāʾ — prince-historien de Hama
    description_en: |
      al-Malik al-Muʾayyad Ismāʿīl ibn ʿAlī ibn Maḥmūd Abū al-
      Fidāʾ al-Ayyūbī — last Ayyūbid sovereign of Hama (under
      Mamlūk suzerainty), historian of *al-Mukhtaṣar fī Akhbār
      al-Bashar* (a universal history continuing Ibn al-Athīr to
      his own day), and author of the geographical *Taqwīm al-
      Buldān* — died at Hama on 23 Muḥarram 732 AH (27 October
      1331 CE) at the age of 60. His historical work was
      continued by his son al-Afḍal Muḥammad and circulated
      widely in the Mamlūk world; portions reached Europe via
      sixteenth- and seventeenth-century Latin translations and
      shaped the early Orientalist understanding of Islamic
      history. Ibn Kathīr records the death in *al-Bidāya wa-l-
      Nihāya* under year 732; al-Dhahabī notices him in his
      late *Tārīkh al-Islām* dhayl. The day is preserved in
      Mamlūk-era biographical sources.
    description_ar: |
      توفي الملك المؤيد إسماعيل بن علي بن محمود أبو الفداء
      الأيوبيُّ — آخرُ سلاطين بني أيوب بحماة تحت سيادة المماليك،
      صاحبُ كتاب «المختصر في أخبار البشر» (تاريخ عام يصل تاريخَ
      ابن الأثير بزمنه) ومصنف «تقويم البلدان» الجغرافي — بحماة
      يوم الثالث والعشرين من محرم سنة اثنتين وثلاثين وسبعمئة
      للهجرة (الموافق ٢٧ أكتوبر ١٣٣١ م) عن ستين سنة. واصَلَ
      تاريخَه ابنُه الأفضل محمد، ودار الكتاب في عالم المماليك
      دوراناً واسعاً؛ ووصلت أجزاء منه إلى أوروبا في ترجماتٍ
      لاتينية في القرنين السادس عشر والسابع عشر، فصاغت فهمَ
      الاستشراق الأوّل لتاريخ الإسلام. وأَلمَّ بوفاته ابنُ
      كثير في «البداية والنهاية» في وفيات سنة ٧٣٢ هـ، وذكره
      الذهبيُّ في ذيل «تاريخ الإسلام». واليومُ محفوظٌ في
      المصادر البيوغرافية المملوكية.
    description_fr: |
      al-Malik al-Muʾayyad Ismāʿīl ibn ʿAlī ibn Maḥmūd Abū al-
      Fidāʾ al-Ayyūbī — dernier souverain ayyūbide de Hama (sous
      suzeraineté mamelouke), historien d'*al-Mukhtaṣar fī
      Akhbār al-Bashar* (histoire universelle prolongeant celle
      d'Ibn al-Athīr jusqu'à son propre temps) et auteur de la
      géographie *Taqwīm al-Buldān* — mourut à Hama le 23
      Muḥarram 732 H (27 octobre 1331 EC), à l'âge de 60 ans.
      Son œuvre historique fut continuée par son fils al-Afḍal
      Muḥammad et circula largement dans le monde mamelouk ; des
      portions parvinrent en Europe par des traductions latines
      des XVIe et XVIIe siècles et façonnèrent la compréhension
      orientaliste primitive de l'histoire islamique. Ibn Kathīr
      consigne le décès dans *al-Bidāya wa-l-Nihāya* aux décès
      de l'année 732 ; al-Dhahabī le mentionne dans le *dhayl*
      tardif de son *Tārīkh al-Islām*. Le jour est conservé dans
      les sources biographiques d'époque mamelouke.
    canonical_hijri: {year: 732, month: 1, day: 23, precision: day}
    canonical_gregorian: {date: 1331-10-27, precision: day, method: attested}
    claims:
      - source_key: ibn_kathir_bidaya
        is_canonical: true
        notes: "Wafayāt of year 732 AH; al-Bidāya records 23 Muḥarram at Hama."
      - source_key: dhahabi_tarikh_islam
        notes: "Late dhayl of Tārīkh al-Islām (al-Dhahabī d. 748) records the death of his contemporary Abū al-Fidāʾ in 732 AH."
      - source_key: ei2
