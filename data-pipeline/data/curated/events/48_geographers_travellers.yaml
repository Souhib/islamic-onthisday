        notes: "Cross-checked against Basil Anthony Collins' English translation (1994) and André Miquel's *La géographie humaine du monde musulman* (Paris-The Hague, 1967-88) IV.103-9."
    people: [[al-muqaddasi-al-bashshari, author]]
