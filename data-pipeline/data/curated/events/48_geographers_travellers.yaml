  # =========================================================================
  # ANDALUS — al-BAKRĪ
  # =========================================================================

  - slug: death-of-al-bakri-al-andalusi
    category: scholar_death
    title_en: Death of al-Bakrī — Geographer of Muslim Spain and the Maghrib
    title_ar: وفاة البكري الأندلسي — جغرافيُّ الأندلس والمغرب
    title_fr: Mort d'al-Bakrī — géographe de l'Espagne musulmane et du Maghreb
    description_en: |
      Abū ʿUbayd ʿAbd Allāh ibn ʿAbd al-ʿAzīz al-Bakrī — Andalusi
      historian-geographer of the Ṭāʾifa period, son of the
      ruler of Huelva and Saltés, lived between Almería, Cordoba
      and Seville under the patronage of the ʿAbbādids — died at
      Cordoba in Shawwāl 487 AH (October-November 1094 CE). His
      *Kitāb al-Masālik wa-l-Mamālik* is the principal Arabic
      source for the early history of West Africa, the Mali-
      Senegal trans-Saharan trade routes, and the Almoravid
      conquest of the Sahel; though he never travelled himself,
      he compiled the work from merchant testimony, embassy
      reports, and the lost works of earlier geographers. His
      *Muʿjam mā Istaʿjam* — a dictionary of Arabian place names
      keyed to the pre-Islamic poetic corpus — anchored the study
      of the *jāhiliyya* geographical layer that later toponymic
      scholarship would refine. Ibn Khallikān gives the month and
      year precisely; al-Dhahabī notices him in *Tārīkh al-Islām*
      under year 487 AH.
    description_ar: |
      توفي أبو عبيد عبد الله بن عبد العزيز البكريُّ — مؤرخٌ
      جغرافيٌّ أندلسي من عصر الطوائف، ابن صاحب وَلْبَة وشَلْطِيش،
      عاش بين المريّة وقرطبة وإشبيليّة في كنف بني عبَّاد — بقرطبة
      في شوال سنة سبع وثمانين وأربعمئة للهجرة (أكتوبر–نوفمبر
      ١٠٩٤ م). وكتابه «المسالك والممالك» المصدرُ العربي الأول
      لتاريخ غرب أفريقيا الباكر وطرق التجارة عبر الصحراء بين
      مالي والسنغال، وفتح المرابطين للساحل؛ ومع أنه لم يرحل بنفسه
      فقد جمع كتابه من شهادة التجار وتقارير السفارات وأعمال
      الجغرافيين السابقين المفقودة. وأرسى «معجم ما استعجم» —
      وهو معجمٌ لأسماء أماكن الجزيرة العربية مفهرَسٌ على شعر
      الجاهلية — دراسةَ الطبقة الجغرافية الجاهلية التي
      صقلتها بحوث المواضع التالية. ضبط ابن خلكان شهرَ الوفاة
      وسنتها؛ وأَلمَّ به الذهبيُّ في «تاريخ الإسلام» في
      وفيات سنة ٤٨٧ هـ.
    description_fr: |
      Abū ʿUbayd ʿAbd Allāh ibn ʿAbd al-ʿAzīz al-Bakrī —
      historien-géographe andalou de la période des taifas, fils
      du souverain de Huelva et de Saltés, vécut entre Almería,
      Cordoue et Séville sous le patronage des ʿAbbādides —
      mourut à Cordoue en Shawwāl 487 H (octobre-novembre 1094
      EC). Son *Kitāb al-Masālik wa-l-Mamālik* est la principale
      source arabe pour l'histoire ancienne de l'Afrique de
      l'Ouest, les routes commerciales transsahariennes Mali-
      Sénégal et la conquête almoravide du Sahel ; bien qu'il
      n'ait jamais voyagé lui-même, il composa l'ouvrage à
      partir de témoignages de marchands, de rapports
      d'ambassade et des œuvres perdues de géographes antérieurs.
      Son *Muʿjam mā Istaʿjam* — dictionnaire des toponymes
      arabes indexé sur le corpus poétique préislamique — ancra
      l'étude de la strate géographique *jāhilī* que la
      lexicographie toponymique ultérieure raffinera. Ibn
      Khallikān donne précisément le mois et l'année ; al-Dhahabī
      le mentionne dans *Tārīkh al-Islām* aux décès de l'année
      487 H.
    canonical_hijri: {year: 487, month: 10, precision: month}
    canonical_gregorian: {date: 1094-10-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafāh: Shawwāl 487 AH at Cordoba, in the entry on Abū ʿUbayd al-Bakrī."
      - source_key: dhahabi_tarikh_islam
        notes: "Year 487 AH wafayāt entry."
      - source_key: ei2
    people: [[al-bakri-al-andalusi, died]]
    tags: [andalus, taifa, geographer, cordoba, west-africa, mali, ghana, masalik]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Bakri"

  # =========================================================================
  # AYYŪBID-ERA — YĀQŪT al-ḤAMAWĪ
  # =========================================================================

  - slug: completion-of-mujam-al-buldan
    category: book_completion
    title_en: Completion of Yāqūt al-Ḥamawī's *Muʿjam al-Buldān*
    title_ar: إتمام «معجم البلدان» لياقوت الحموي
    title_fr: Achèvement du *Muʿjam al-Buldān* de Yāqūt al-Ḥamawī
    description_en: |
      Yāqūt ibn ʿAbd Allāh al-Ḥamawī al-Rūmī — Greek-born
      manumitted slave of a Baghdad merchant, turned scholar and
      bookseller, and one of the most relentless collectors of
      written knowledge in the medieval Islamic world — completed
      the first redaction of his *Muʿjam al-Buldān* ("Dictionary
      of Countries") at Mosul in 621 AH (1224 CE). The work is
      the most comprehensive Arabic geographical dictionary of
      its era: an alphabetical encyclopedia of more than ten
      thousand toponyms covering every named place in the lands
      of Islam (and a great many beyond), each with etymology,
      coordinates, history, biographies of associated scholars,
      and verses of poetry. Yāqūt revised the work continuously
      until 625 AH; the dating of the first redaction is
      established by the author's own colophons and confirmed by
      Ibn Khallikān in his biographical notice.
    description_ar: |
      أتمَّ ياقوت بن عبد الله الحمويُّ الروميُّ — رومي المولد
      مولىً مُعتَقٌ لتاجر بغدادي، انقلب عالماً ووَرَّاقاً، وكان
      من أشدّ جامعي العلم المكتوب في العالم الإسلامي الوسيط —
      التحرير الأوّل من «معجم البلدان» بالموصل سنة إحدى وعشرين
      وستمئة للهجرة (١٢٢٤ م). والكتاب أوسعُ معجم جغرافي عربي في
      عصره: موسوعةٌ أبجدية لأكثر من عشرة آلاف اسم موضع، تشمل
      كلَّ موضع مسمَّى في بلاد الإسلام (وأماكن كثيرة خارجها)،
      مع اشتقاق الاسم وإحداثياته وتاريخه وتراجم علمائه وأبيات
      شعر فيه. وراجعه ياقوت متواصلاً حتى سنة ٦٢٥ هـ؛ وتاريخُ
      التحرير الأول من نصوص المؤلف نفسه يؤيّده ابنُ خلكان
      في ترجمته.
    description_fr: |
      Yāqūt ibn ʿAbd Allāh al-Ḥamawī al-Rūmī — esclave d'origine
      grecque affranchi d'un marchand bagdadien, devenu savant et
      libraire, et l'un des plus opiniâtres collecteurs de
      savoir écrit du monde islamique médiéval — acheva la
      première rédaction de son *Muʿjam al-Buldān* ("Dictionnaire
      des Pays") à Mossoul en 621 H (1224 EC). L'ouvrage est le
      plus exhaustif dictionnaire géographique arabe de son
      époque : une encyclopédie alphabétique de plus de dix
      mille toponymes couvrant chaque lieu nommé des pays
      d'Islam (et beaucoup au-delà), avec étymologie,
      coordonnées, histoire, biographies des savants associés et
      vers de poésie pour chacun. Yāqūt révisa l'œuvre sans
      relâche jusqu'en 625 H ; la datation de la première
      rédaction repose sur les colophons mêmes de l'auteur et
      est confirmée par Ibn Khallikān dans sa notice
      biographique.
    canonical_hijri: {year: 621, precision: year}
    canonical_gregorian: {date: 1224-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Biographical entry on Yāqūt records the first Mosul redaction at 621 AH."
      - source_key: ei2
        notes: "EI2 article 'Yāḳūt al-Rūmī' confirms the 621/1224 first-redaction date."
      - source_key: editorial
        notes: "Yāqūt's own colophons attest 621 AH."
    people: [[yaqut-al-hamawi, author]]
