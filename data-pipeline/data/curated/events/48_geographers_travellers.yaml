    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Yaqut_al-Hamawi"

  - slug: death-of-yaqut-al-hamawi
    category: scholar_death
    title_en: Death of Yāqūt al-Ḥamawī at Aleppo
    title_ar: وفاة ياقوت الحموي بحلب
    title_fr: Mort de Yāqūt al-Ḥamawī à Alep
    description_en: |
      Yāqūt ibn ʿAbd Allāh al-Ḥamawī al-Rūmī — author of the
      *Muʿjam al-Buldān* (the most comprehensive Arabic
      geographical dictionary of its era) and the *Muʿjam al-
      Udabāʾ* (a parallel biographical dictionary of literary
      scholars) — died at Aleppo on 20 Ramaḍān 626 AH
      (12 August 1229 CE) at the home of the Ayyūbid amīr ʿIzz
      al-Dīn ibn Shaddād. He had fled the Mongol advance from
      Marv across northern Syria the previous year and never
      recovered his Khurāsānian library. His two great
      *muʿjams* between them preserve much of the geography and
      literary biography of the lands the Mongols would shortly
      destroy — Yāqūt's work is one of the principal channels
      through which knowledge of pre-Mongol Khurāsān reached
      later centuries. Ibn Khallikān, who knew him, gives the day
      precisely; al-Dhahabī confirms the date in *Siyar Aʿlām al-
      Nubalāʾ*.
    description_ar: |
      توفي ياقوت بن عبد الله الحمويُّ الرومي — مصنفُ «معجم
      البلدان» (أوسعِ معجمٍ جغرافي عربي في عصره) و«معجم الأدباء»
      (المعجم البيوغرافي الموازي لعلماء الأدب) — بحلب يوم
      العشرين من رمضان سنة ست وعشرين وستمئة للهجرة (الموافق ١٢
      أغسطس ١٢٢٩ م) في دار الأمير الأيوبي عزّ الدين بن شدّاد.
      وكان قد فرّ في السنة السابقة من زحف المغول على مرو فعبر
      شمالَ الشام، ولم يستردّ مكتبته الخراسانية. ومعجماه الكبيران
      حفظا كثيراً من جغرافيا البلاد التي كان المغول على وشك
      تخريبها وترجماتِ أدبائها — وعمل ياقوت من أكبر القنوات
      التي وصلت بها معرفة خراسان قبل المغول إلى القرون التالية.
      ضبط ابن خلكان — وقد عرفه — تاريخَ الوفاة بدقة، وأكّده
      الذهبيُّ في «سير أعلام النبلاء».
    description_fr: |
      Yāqūt ibn ʿAbd Allāh al-Ḥamawī al-Rūmī — auteur du *Muʿjam
      al-Buldān* (le plus exhaustif dictionnaire géographique
      arabe de son époque) et du *Muʿjam al-Udabāʾ* (le
      dictionnaire biographique parallèle des savants littéraires)
      — mourut à Alep le 20 Ramaḍān 626 H (12 août 1229 EC), au
      domicile de l'émir ayyūbide ʿIzz al-Dīn ibn Shaddād. Il
      avait fui l'avance mongole depuis Marv à travers la Syrie
      du Nord l'année précédente et ne récupéra jamais sa
      bibliothèque khurāsānienne. Ses deux grands *muʿjams*
      préservent à eux deux une part considérable de la
      géographie et de la biographie littéraire des contrées que
      les Mongols allaient bientôt détruire — l'œuvre de Yāqūt
      est l'un des principaux canaux par lesquels la connaissance
      du Khurāsān prémongol parvint aux siècles ultérieurs. Ibn
      Khallikān, qui le connaissait, donne le jour avec
      précision ; al-Dhahabī confirme la date dans *Siyar Aʿlām
      al-Nubalāʾ*.
    canonical_hijri: {year: 626, month: 9, day: 20, precision: day}
    canonical_gregorian: {date: 1229-08-12, precision: day, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafāh: 20 Ramaḍān 626 AH at Aleppo, in the home of Ibn Shaddād — Ibn Khallikān had personal acquaintance with the deceased."
      - source_key: dhahabi_siyar
        notes: "Confirms date and location in the entry on Yāqūt."
      - source_key: ei2
    people: [[yaqut-al-hamawi, died]]
    tags: [ayyubid, geographer, lexicographer, aleppo, mongols, mujam, marv, baghdad]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Yaqut_al-Hamawi"

  # =========================================================================
  # ĪLKHĀNID-ERA — ZAKARIYĀʾ al-QAZWĪNĪ
  # =========================================================================

  - slug: death-of-zakariya-al-qazwini
    category: scholar_death
    title_en: Death of Zakariyāʾ al-Qazwīnī — Author of *ʿAjāʾib al-Makhlūqāt*
    title_ar: وفاة زكريا القزويني — صاحب «عجائب المخلوقات»
    title_fr: Mort de Zakariyāʾ al-Qazwīnī — auteur d'*ʿAjāʾib al-Makhlūqāt*
    description_en: |
      Zakariyāʾ ibn Muḥammad ibn Maḥmūd al-Qazwīnī — Persian
      qāḍī of Wāsiṭ and al-Ḥilla under the early Īlkhānid
      administration of Iraq, and author of two of the most
      widely copied works of late-medieval Arabic natural
      history — died in 682 AH (1283 CE). His *ʿAjāʾib al-
      Makhlūqāt wa-Gharāʾib al-Mawjūdāt* ("Wonders of Creation
      and Marvels of Existence") is a cosmography arranged
      ascending from minerals through plants and animals to
      angels and the celestial spheres; his *Āthār al-Bilād wa-
      Akhbār al-ʿIbād* ("Monuments of the Lands and Histories of
      Their Inhabitants") is an alphabetical geographical
      dictionary that complements Yāqūt with stronger emphasis
      on cultural and natural marvels. Both circulated for
      centuries in lavishly illustrated manuscripts across the
      Persian, Turkish, and Arab worlds. Year-precision is
      retained because the day is not preserved.
    description_ar: |
      توفي زكريا بن محمد بن محمود القزويني — قاضي واسط والحلة في
      الإدارة الإيلخانية الأولى للعراق، ومصنفُ كتابَين من أوسع
      ما اشتهر من كتب التاريخ الطبيعي العربية في أواخر العصر
      الوسيط — سنة اثنتين وثمانين وستمئة للهجرة (١٢٨٣ م). وكتابه
      «عجائب المخلوقات وغرائب الموجودات» موسوعة كونية مرتَّبة
      صعوداً من المعادن إلى النبات إلى الحيوان فإلى الملائكة
      والأفلاك السماوية؛ وكتابه «آثار البلاد وأخبار العباد»
      معجمٌ جغرافي مرتَّب على حروف المعجم، يكمّل ياقوتَ بإيلاء
      أوسعَ للعجائب الثقافية والطبيعية. وقد دار الكتابان في
      القرون التالية في نسخٍ مزخرفة الرسوم في العالم الفارسي
      والتركي والعربي. ويُكتفى بدقّة السنة لعدم حفظ اليوم.
    description_fr: |
      Zakariyāʾ ibn Muḥammad ibn Maḥmūd al-Qazwīnī — qāḍī persan
      de Wāsiṭ et d'al-Ḥilla sous l'administration īlkhānide
      première de l'Irak, auteur de deux des œuvres d'histoire
      naturelle arabes les plus copiées de la fin du Moyen Âge —
      mourut en 682 H (1283 EC). Ses *ʿAjāʾib al-Makhlūqāt wa-
      Gharāʾib al-Mawjūdāt* ("Merveilles de la Création et
      Étrangetés de l'Existence") sont une cosmographie organisée
      de manière ascendante, des minéraux aux végétaux aux
      animaux jusqu'aux anges et aux sphères célestes ; ses
      *Āthār al-Bilād wa-Akhbār al-ʿIbād* ("Monuments des Pays
      et Histoires de leurs Habitants") forment un dictionnaire
      géographique alphabétique qui complète Yāqūt avec une
      emphase plus marquée sur les merveilles culturelles et
      naturelles. Les deux œuvres ont circulé pendant des siècles
      en manuscrits richement illustrés à travers les mondes
      persan, turc et arabe. Précision annuelle conservée — le
      jour n'est pas préservé.
