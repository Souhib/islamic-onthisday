# Wave 27 of curated event additions (2026-04-27).
# Major Muslim geographers, travellers, cartographers, and historical-
# geographers whose deaths or principal works constitute well-attested
# anchors in the history of Islamic geography. Already covered elsewhere
# in the dataset and not repeated here: al-Idrīsī, Ibn Baṭṭūṭa, Ibn
# Jubayr, al-Bīrūnī (in 09_scientists_polymaths / 13_cities_works /
# 23_linguists_poets_travelers_polymaths), al-Masʿūdī (in
# 20_uncle_martyrs_andalus_ottomans), Ibn Faḍlān's Volga embassy (in
# 23_linguists_poets_travelers_polymaths).
#
# This file covers: al-Yaʿqūbī, Ibn Khurradādhbih, al-Iṣṭakhrī,
# Ibn Ḥawqal, al-Muqaddasī al-Bashshārī, al-Bakrī al-Andalusī,
# Yāqūt al-Ḥamawī (death + Muʿjam al-Buldān completion),
# Zakariyāʾ al-Qazwīnī, Abū al-Fidāʾ (death + Taqwīm al-Buldān
# completion), and the completion of al-Yaʿqūbī's Kitāb al-Buldān.
# Piri Reis (d. 962/1553) and Evliya Çelebi (d. ~1093/1682) were
# considered but dropped — Ottoman-era chronicles outside the
# wafayāt / siyar mainstream are not represented in sources.yaml,
# and our editorial bar (≥1 classical Sunni source for single_source
# or ≥2 for cross_verified) cannot be honoured for either figure
# from the source-keys available. Trilingual en/ar/fr throughout.
# No hadith refs (no narration anchors a geographical event in this
# corpus).

events:
  # =========================================================================
  # ʿABBĀSID-ERA FIRST-GENERATION GEOGRAPHERS (3rd c. AH)
  # =========================================================================

  - slug: completion-of-kitab-al-buldan-al-yaqubi
    category: book_completion
    title_en: Completion of al-Yaʿqūbī's *Kitāb al-Buldān*
    title_ar: إتمام «كتاب البلدان» لليعقوبي
    title_fr: Achèvement du *Kitāb al-Buldān* d'al-Yaʿqūbī
    description_en: |
      Aḥmad ibn Abī Yaʿqūb ibn Wāḍiḥ al-Yaʿqūbī — ʿAbbāsid
      historian-administrator who served the Ṭāhirids in Khurāsān
      and the Ṭūlūnids in Egypt — completed his *Kitāb al-Buldān*
      ("Book of Countries") in 278 AH (891 CE). The work is the
      earliest surviving general geography in Arabic: a route-
      and-province description of the four quarters of the
      Caliphate organised around the road network from Baghdad,
      with population, fiscal, and ethnographic detail drawn
      from his own travels through Armenia, Khurāsān, India, and
      North Africa. Together with his world-history *Tārīkh
      al-Yaʿqūbī*, the *Buldān* anchored the descriptive-
      geography genre that would culminate in al-Iṣṭakhrī, Ibn
      Ḥawqal, and al-Muqaddasī. Internal dating in the manuscript
      (the work refers to events of 278 AH and to the reigning
      caliph al-Muʿtaḍid) is the basis for the year; classical
      biographers preserve no narrower precision.
    description_ar: |
      أتمَّ أحمد بن أبي يعقوب بن واضح اليعقوبيُّ — المؤرخ والكاتب
      العباسي الذي خدم الطاهريين بخراسان والطولونيين بمصر — كتابَه
      «البلدان» سنة ثمانٍ وسبعين ومئتين للهجرة (٨٩١ م). والكتاب
      أقدمُ ما بقي من الجغرافيا العامة بالعربية: وصفٌ للطرق
      والكور في الأرباع الأربعة للخلافة، مرتَّبٌ حول شبكة طرق
      بغداد، يجمع تفاصيل سكانية وخراجية وإثنوغرافية استقاها
      من رحلاته في أرمينيا وخراسان والهند وشمال أفريقيا. وقد
      أرسى «البلدان» مع كتابه التاريخي «تاريخ اليعقوبي» تقليدَ
      الجغرافيا الوصفية الذي سيتوّج عند الإصطخري وابن حوقل
      والمقدسي. والمصدر في تاريخ التأليف هو إشارات الكتاب نفسه
      إلى أحداث سنة ٢٧٨ هـ وإلى الخليفة المعتضد بالله؛ ولم تحفظ
      المصادر القديمة دقّةً أضيق من ذلك.
    description_fr: |
      Aḥmad ibn Abī Yaʿqūb ibn Wāḍiḥ al-Yaʿqūbī — historien-
      administrateur ʿabbāside au service des Ṭāhirides au
      Khurāsān et des Ṭūlūnides en Égypte — acheva son *Kitāb
      al-Buldān* ("Livre des Pays") en 278 H (891 EC). L'ouvrage
      est la plus ancienne géographie générale en arabe qui nous
      soit parvenue : une description par routes et par provinces
      des quatre quartiers du califat, organisée autour du réseau
      routier de Bagdad, avec des détails démographiques, fiscaux
      et ethnographiques tirés de ses propres voyages en Arménie,
      au Khurāsān, en Inde et en Afrique du Nord. Avec son
      histoire universelle *Tārīkh al-Yaʿqūbī*, le *Buldān* a
      ancré le genre de la géographie descriptive qui culminera
      avec al-Iṣṭakhrī, Ibn Ḥawqal et al-Muqaddasī. La datation
      repose sur les références internes du manuscrit (le texte
      cite des événements de 278 H et le calife régnant al-
      Muʿtaḍid) ; les biographes classiques ne conservent pas de
      précision plus étroite.
    canonical_hijri: {year: 278, precision: year}
    canonical_gregorian: {date: 891-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'al-Yaʿḳūbī' dates the *Kitāb al-Buldān* to 278 AH from internal references to al-Muʿtaḍid and to events of that year."
      - source_key: editorial
        notes: "Cross-checked against the Leiden edition (de Goeje, *Bibliotheca Geographorum Arabicorum* VII, 1892) and the introduction to Gaston Wiet's French translation (Cairo, 1937)."
    people: [[al-yaqubi-geographer, author]]
    tags: [abbasid, geography, baghdad, masalik, encyclopedia, route-description]
    importance: notable
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Al-Yaqubi"

  - slug: death-of-al-yaqubi-geographer
    category: scholar_death
    title_en: Death of al-Yaʿqūbī — Earliest Surviving Arabic Geographer
    title_ar: وفاة اليعقوبي — أقدم جغرافيي العرب الباقين
    title_fr: Mort d'al-Yaʿqūbī — le plus ancien géographe arabe conservé
    description_en: |
      Aḥmad ibn Abī Yaʿqūb ibn Wāḍiḥ al-Yaʿqūbī — author of
      *Kitāb al-Buldān* and *Tārīkh al-Yaʿqūbī*, the earliest
      surviving Arabic descriptive geography and one of the
      earliest surviving universal histories in the language —
      died in or about 284 AH (897-898 CE), most likely in Egypt
      where he had served the Ṭūlūnid administration. Classical
      Sunni biographers do not preserve a narrower date; the year
      is reconstructed from the absence of further dated work in
      his bibliography after this point and from the testimony of
      the *Fihrist* of Ibn al-Nadīm. He shaped the route-and-
      province genre that al-Iṣṭakhrī, Ibn Ḥawqal, and al-
      Muqaddasī would refine over the following century. We
      retain year-precision because no source converges on a
      month or a day.
    description_ar: |
      توفي أحمد بن أبي يعقوب بن واضح اليعقوبيُّ — مصنفُ «كتاب
      البلدان» و«تاريخ اليعقوبي»، أقدمِ جغرافيا وصفية عربية
      باقية وأحد أقدم تواريخ العالم العربية الباقية — في حدود
      سنة أربعٍ وثمانين ومئتين للهجرة (٨٩٧-٨٩٨ م)، والأرجح أن
      وفاته كانت بمصر التي خدم فيها الإدارة الطولونية. ولم تحفظ
      المصادرُ السنية الكلاسيكية تاريخاً أدقّ من ذلك؛ والسنة
      مستنبطة من انقطاع أعماله المؤرَّخة بعد ذلك التاريخ ومن
      شهادة «الفهرست» لابن النديم. وقد رسَخَ تقليدَ المسالك
      والممالك الذي صقَله الإصطخريُّ وابنُ حوقل والمقدسيُّ في
      القرن التالي. ويُكتفى هنا بدقّة السنة لعدم اتفاق المصادر
      على شهر أو يوم.
    description_fr: |
      Aḥmad ibn Abī Yaʿqūb ibn Wāḍiḥ al-Yaʿqūbī — auteur du
      *Kitāb al-Buldān* et du *Tārīkh al-Yaʿqūbī*, la plus
      ancienne géographie descriptive arabe conservée et l'une
      des plus anciennes histoires universelles dans cette langue
      qui nous soient parvenues — mourut vers 284 H (897-898 EC),
      probablement en Égypte où il avait servi l'administration
      ṭūlūnide. Les biographes sunnites classiques ne conservent
      pas de date plus précise ; l'année est reconstruite à
      partir de l'absence d'œuvres datées après ce point dans sa
      bibliographie et du témoignage du *Fihrist* d'Ibn al-
      Nadīm. Il a façonné le genre des routes-et-provinces que
      al-Iṣṭakhrī, Ibn Ḥawqal et al-Muqaddasī raffineront au
      siècle suivant. Précision annuelle conservée — aucune
      source ne converge sur un mois ou un jour.
    canonical_hijri: {year: 284, precision: year}
    canonical_gregorian: {date: 897-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'al-Yaʿḳūbī' gives c. 284/897-898; year-precision only."
      - source_key: editorial
        notes: "Date reconstructed from Ibn al-Nadīm's *Fihrist* and the absence of later dated work."
    people: [[al-yaqubi-geographer, died]]
    tags: [abbasid, geographer, historian, baghdad, egypt, tulunid, masalik]
    importance: notable
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Al-Yaqubi"

  - slug: death-of-ibn-khurradadhbih
    category: scholar_death
    title_en: Death of Ibn Khurradādhbih — Master of the Postal-Geography
    title_ar: وفاة ابن خرداذبه — صاحب «المسالك والممالك»
    title_fr: Mort d'Ibn Khurradādhbih — maître de la géographie postale
    description_en: |
      Abū al-Qāsim ʿUbayd Allāh ibn ʿAbd Allāh ibn Khurradādhbih —
      Persian convert from a Zoroastrian noble family who rose to
      direct the ʿAbbāsid postal-and-intelligence service (*dīwān
      al-barīd wa-l-khabar*) under the caliphs al-Wāthiq and al-
      Muʿtamid — died in or about 300 AH (911 CE) in Iraq. His
      *Kitāb al-Masālik wa-l-Mamālik* ("Book of Routes and
      Realms"), composed from official postal-service records, is
      the earliest surviving Arabic systematic geography and the
      foundational text of the *masālik wa mamālik* genre that
      every later geographer down to Yāqūt would adapt. He
      preserves the earliest Arabic notice of the maritime route
      to China via the Persian Gulf and the Indian Ocean. The
      classical sources retain year-precision only; the *Fihrist*
      of Ibn al-Nadīm dates the death within the first decade of
      the 4th century AH.
    description_ar: |
      توفي أبو القاسم عبيد الله بن عبد الله بن خرداذبه — الفارسي
      المسلم من بيتٍ مجوسيٍّ نبيل، ارتفع إلى رئاسة ديوان البريد
      والخبر العباسي في خلافتَي الواثق والمعتمد — في حدود سنة
      ثلاثمئة للهجرة (٩١١ م) بالعراق. وكتابه «المسالك والممالك»
      الذي ألَّفه من سجلات البريد الرسمية أقدمُ ما بقي من
      الجغرافيا العربية المنهجية وأصلُ فنّ المسالك والممالك الذي
      اقتفاه كلُّ من جاء بعده إلى ياقوت. وفيه أقدمُ خبر عربي عن
      الطريق البحري إلى الصين عبر الخليج الفارسي والمحيط الهندي.
      ولم تحفظ المصادر القديمة سوى دقّة السنة؛ ويؤرّخ «الفهرست»
      لابن النديم وفاتَه في العقد الأول من القرن الرابع الهجري.
    description_fr: |
      Abū al-Qāsim ʿUbayd Allāh ibn ʿAbd Allāh ibn Khurradādhbih —
      converti persan d'une famille noble zoroastrienne, parvenu
      à diriger le service postal et de renseignement ʿabbāside
      (*dīwān al-barīd wa-l-khabar*) sous les califes al-Wāthiq
      et al-Muʿtamid — mourut vers 300 H (911 EC) en Irak. Son
      *Kitāb al-Masālik wa-l-Mamālik* ("Livre des Routes et des
      Royaumes"), composé à partir des registres officiels du
      service postal, est la plus ancienne géographie arabe
      systématique conservée et le texte fondateur du genre
      *masālik wa mamālik* que tous les géographes ultérieurs,
      jusqu'à Yāqūt, adapteront. Il conserve la première mention
      arabe de la route maritime vers la Chine par le golfe
      Persique et l'océan Indien. Les sources classiques ne
      retiennent que la précision annuelle ; le *Fihrist* d'Ibn
      al-Nadīm date le décès dans la première décennie du IVe
      siècle de l'Hégire.
    canonical_hijri: {year: 300, precision: year}
    canonical_gregorian: {date: 911-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "EI2 article 'Ibn Khurradādhbih' gives c. 300/911."
      - source_key: editorial
        notes: "Cross-checked against Ibn al-Nadīm, *Fihrist*, and de Goeje's introduction to *Bibliotheca Geographorum Arabicorum* VI."
    people: [[ibn-khurradadhbih, died]]
    tags: [abbasid, geographer, postal-service, masalik, baghdad, persia]
    importance: notable
    verification_status: single_source
    source_url: "https://en.wikipedia.org/wiki/Ibn_Khordadbeh"

