  - slug: death-of-wahb-ibn-munabbih
    category: scholar
    title_en: Death of Wahb ibn Munabbih — Yemeni Tabiʿi Polymath
    title_ar: وفاة وهب بن منبه — تابعي اليمن وموسوعيها
    title_fr: Mort de Wahb ibn Munabbih — polymathe tabiʿī yéménite
    description_en: |
      Abu ʿAbdullah Wahb ibn Munabbih al-Ṣanʿani al-Yamani —
      Yemeni Sunni tabiʿi of Persian descent, member of the
      delegation that ʿAli ibn Abi Ṭalib ra dispatched south,
      qadi of Sanaa under the Umayyads, and the foremost
      Sunni narrator of the *isrāʾiliyyāt* (transmitted accounts
      of the pre-Islamic prophets and biblical narratives) for
      his generation — died in Sanaa at age about 80. His *Kitab
      al-Mubtadaʾ* was the most extensive single source for the
      pre-Islamic prophetic narratives transmitted into Sunni
      tafsir; al-Ṭabari quotes him repeatedly in *Jamiʿ al-
      Bayan* on the histories of Adam, Nuh, Ibrahim, Yusuf, and
      Musa. He was probably the original conduit by which the
      *Kitab Daniyal* and parts of Jewish-Christian apocalyptic
      literature reached the Sunni hadith corpus through
      Yemen, where significant Jewish and Christian populations
      had preserved these traditions. His later critics
      (Aḥmad ibn Ḥanbal, the early Hanbalis) treated him as a
      generally reliable transmitter of Yemeni-isolated material.
    description_ar: |
      توفي الإمام أبو عبد الله وهب بن منبه الصنعاني اليمني —
      تابعي سني يمني من أصول فارسية، ومن وفد بعثه علي بن أبي
      طالب رضي الله عنه إلى اليمن، وقاضي صنعاء في عهد بني أمية،
      وأكبر ناقلي «الإسرائيليات» (الأخبار المنقولة عن أنبياء
      ما قبل الإسلام والروايات التوراتية) في جيل التابعين —
      بصنعاء عن نحو ثمانين سنة. وكتابه «المبتدأ» أوسع مصدر منفرد
      لأخبار الأنبياء قبل الإسلام التي دخلت في تفاسير أهل
      السنة؛ ينقل عنه الطبري في «جامع البيان» مراراً في أخبار
      آدم ونوح وإبراهيم ويوسف وموسى عليهم السلام. ولعله المصدر
      الأصلي الذي وصل به «كتاب دانيال» وبعض الأدب الرؤياوي
      اليهودي-المسيحي إلى التراث الحديثي السني عبر اليمن، حيث
      حفظت جاليات يهودية ومسيحية مهمة هذه التراثات. وعدّه
      ناقدوه المتأخرون (أحمد بن حنبل وأوائل الحنابلة) ثقة في
      الجملة في رواية المنفرد اليمني.
    description_fr: |
      Abu ʿAbdullāh Wahb ibn Munabbih al-Ṣanʿānī al-Yamanī —
      tabiʿī sunnite yéménite de descendance persane, membre
      de la délégation qu'ʿAlī ibn Abī Ṭālib ra dépêcha au sud,
      *qāḍī* de Sanaa sous les Omeyyades, et le principal
      narrateur sunnite des *isrāʾīliyyāt* (récits transmis des
      prophètes préislamiques et narrations bibliques) pour sa
      génération — mourut à Sanaa à l'âge d'environ 80 ans. Son
      *Kitāb al-Mubtadaʾ* fut la source unique la plus exhaustive
      des récits prophétiques préislamiques transmis dans le
      tafsir sunnite; al-Ṭabarī le cite à plusieurs reprises
      dans le *Jamiʿ al-Bayān* sur les histoires d'Ādam, Nūḥ,
      Ibrāhīm, Yūsuf et Mūsā. Il fut probablement le canal
      original par lequel le *Kitāb Dāniyāl* et des parties de
      la littérature apocalyptique judéo-chrétienne parvinrent
      au corpus du hadith sunnite à travers le Yémen, où des
      populations juives et chrétiennes significatives avaient
      préservé ces traditions. Ses critiques ultérieurs (Aḥmad
      ibn Ḥanbal, les premiers hanbalites) le traitèrent comme
      un transmetteur globalement fiable du matériau yéménite
      isolé.
