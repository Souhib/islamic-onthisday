  - slug: death-of-al-mughira-ibn-shuba
    category: companion
    title_en: Death of al-Mughira ibn Shuʿba ra
    title_ar: وفاة المغيرة بن شعبة رضي الله عنه
    title_fr: Mort d'al-Mughīra ibn Shuʿba ra
    description_en: |
      al-Mughira ibn Shuʿba al-Thaqafi — Companion who embraced
      Islam after the Treaty of Ḥudaybiyya, governor of Basra
      under ʿUmar ra, governor of Kufa under both ʿUmar ra and
      Muʿawiya ra, and one of the four men whom contemporaries
      reckoned the most politically astute Arabs of his
      generation (the others being Muʿawiya, ʿAmr ibn al-ʿAṣ,
      and Ziyad ibn Abi Sufyan) — died in Kufa at age about 70
      during the plague of 50 AH. He was the Companion present
      at the Treaty of Ḥudaybiyya in 6 AH carrying the Quraysh
      banner, and the Companion who proposed the *takbīr* on
      the rooftops of Kufa to wake the populace for prayer.
      He narrated 136 hadiths in the Six Books, including the
      foundational hadith on wiping over the *khuffayn* (leather
      socks) in ablution. Classical Sunni assessment of his
      political conduct varies; al-Dhahabi treats him as a
      Companion of acknowledged worldly skill who served the
      umma in difficult times.
    description_ar: |
      توفي المغيرة بن شعبة الثقفي رضي الله عنه — صحابي أسلم
      بعد صلح الحديبية، وتولى البصرة في خلافة عمر بن الخطاب
      رضي الله عنه، والكوفة في خلافتي عمر ومعاوية رضي الله
      عنهما، وأحد أربعة عدّهم معاصروه أدهى دهاة العرب في عصره
      (والآخرون معاوية وعمرو بن العاص وزياد بن أبي سفيان) —
      بالكوفة عن نحو سبعين سنة في طاعون عام ٥٠ هـ. وكان حاضراً
      صلح الحديبية سنة ست للهجرة حاملاً راية قريش، والصحابي
      الذي اقترح التكبير على ظهور بيوت الكوفة لإيقاظ الناس
      للصلاة. روى ١٣٦ حديثاً في الكتب الستة، منها الحديث
      الأصلي في المسح على الخفين في الوضوء. واختلف فقهاء
      أهل السنة في تقدير مسلكه السياسي؛ ويعدّه الذهبي
      صحابياً معترفاً به في الدهاء الدنيوي خدم الأمة في
      عصرها العسير.
    description_fr: |
      al-Mughīra ibn Shuʿba al-Thaqafī — Compagnon qui embrassa
      l'Islam après le Traité d'al-Ḥudaybiyya, gouverneur de
      Bassora sous ʿUmar ra, gouverneur de Koufa sous ʿUmar ra
      et Muʿāwiya ra, et l'un des quatre hommes que les
      contemporains tenaient pour les Arabes les plus
      politiquement astucieux de leur génération (les autres
      étant Muʿāwiya, ʿAmr ibn al-ʿĀṣ et Ziyād ibn Abī Sufyān)
      — mourut à Koufa à l'âge d'environ 70 ans durant la peste
      de 50 H. Il fut le Compagnon présent au Traité d'al-
      Ḥudaybiyya en 6 H portant la bannière de Quraysh, et le
      Compagnon qui proposa le *takbīr* depuis les toits de
      Koufa pour réveiller la population pour la prière. Il
      narra 136 hadiths dans les Six Livres, dont le hadith
      fondateur sur l'essuyage sur les *khuffayn* (chaussettes
      de cuir) lors des ablutions. L'évaluation sunnite
      classique de sa conduite politique varie; al-Dhahabī le
      traite comme un Compagnon d'habileté mondaine reconnue
      qui servit la *umma* en des temps difficiles.
