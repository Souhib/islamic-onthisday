      - source_key: dhahabi_siyar
        is_canonical: true
      - source_key: ibn_khallikan_wafayat
      - source_key: ibn_kathir_bidaya
    people: [[ibn-wahb, subject], [malik-ibn-anas, subject]]
    tags: [maliki, egypt, fiqh, abbasid, muwattaʾ]
    importance: notable
    verification_status: cross_verified

  - slug: death-of-ibn-al-qasim
    category: scholar
    title_en: Death of Ibn al-Qasim al-ʿUtaqi — Architect of al-Mudawwana
    title_ar: وفاة ابن القاسم العتقي — مؤسس «المدونة»
    title_fr: Mort d'Ibn al-Qāsim al-ʿUtaqī — architecte d'*al-Mudawwana*
    description_en: |
      Abu ʿAbdullah ʿAbd al-Rahman ibn al-Qasim al-ʿUtaqi al-
      Miṣri — Egyptian Maliki jurist, foremost of the four
      founding companions of the Egyptian Maliki school, and
      the scholar through whom 95 percent of *al-Mudawwana
      al-Kubra* (the canonical Maliki text recorded by Saḥnun)
      runs as primary source-narrator — died in Cairo at age
      about 60. He spent fifty years studying under Imam Malik
      in Medina before returning to Egypt; his memorisation of
      Malik's positions across the entire span of fiqh provided
      the comprehensive transmission that no other student
      matched. The systematic Saḥnun-Ibn al-Qasim-Malik chain
      is the spine of the Maghrebi-Andalusian Maliki tradition,
      and *al-Mudawwana* through it became the operational
      reference for the Maliki madhhab from North Africa to
      al-Andalus to Sub-Saharan West Africa. Imam Malik said:
      "There is no one I have taught who carried as much from
      me as Ibn al-Qasim." His personal piety was such that he
      reportedly performed Hajj on foot every year for the last
      forty years of his life.
    description_ar: |
      توفي الإمام أبو عبد الله عبد الرحمن بن القاسم العتقي
      المصري — فقيه مالكي مصري، كبير الأربعة المؤسسين لمذهب
      مالكية مصر، والعالم الذي تمر به ٩٥ في المئة من «المدونة
      الكبرى» (المتن المالكي الذي سجله سحنون) راوياً أصلياً
      أساسياً — بالقاهرة عن نحو ستين سنة. أمضى خمسين سنة في
      القراءة على الإمام مالك بالمدينة قبل أن يعود إلى مصر؛
      وحفظه لأقوال مالك في عامة أبواب الفقه قدّم رواية شاملة
      ما تساوى معها أحد من سائر تلامذة مالك. وسلسلة سحنون-ابن
      القاسم-مالك المنهجية هي عمود تراث المالكية في المغرب
      الإسلامي والأندلس، وعبرها صارت «المدونة» المرجع الفعلي
      للمذهب المالكي من شمال أفريقيا إلى الأندلس إلى أفريقيا
      الغربية تحت الصحراء. قال الإمام مالك فيه: «ما حمل عني
      أحد كحمل ابن القاسم». ومن تقواه الشخصية أنه كان يحج راجلاً
      كل سنة في آخر أربعين سنة من حياته كما تذكر المصادر.
    description_fr: |
      Abu ʿAbdullāh ʿAbd al-Raḥmān ibn al-Qāsim al-ʿUtaqī al-
      Miṣrī — juriste malikite égyptien, le plus éminent des
      quatre Compagnons fondateurs de l'école malikite
      égyptienne, et le savant à travers qui 95 pour cent
      d'*al-Mudawwana al-Kubra* (le texte malikite canonique
      consigné par Saḥnūn) s'écoule comme source-narrateur
      primaire — mourut au Caire à l'âge d'environ 60 ans. Il
      passa cinquante ans à étudier sous l'imam Mālik à Médine
      avant de retourner en Égypte; sa mémorisation des
      positions de Mālik à travers l'ensemble du fiqh fournit
      la transmission exhaustive qu'aucun autre élève n'égala.
      La chaîne systématique Saḥnūn-Ibn al-Qāsim-Mālik est la
      colonne vertébrale de la tradition malikite maghrébine-
      andalouse, et *al-Mudawwana* à travers elle devint la
      référence opérationnelle du madhhab malikite de l'Afrique
      du Nord à al-Andalus à l'Afrique occidentale sub-
      saharienne. L'imam Mālik dit : « il n'y a personne que
      j'aie enseigné qui ait emporté autant de moi qu'Ibn al-
      Qāsim ». Sa piété personnelle était telle, dit-on, qu'il
      accomplit le Ḥajj à pied chaque année durant les quarante
      dernières années de sa vie.
    canonical_hijri: {year: 191, precision: year}
    canonical_gregorian: {date: 806-01-01, precision: year, method: attested}
