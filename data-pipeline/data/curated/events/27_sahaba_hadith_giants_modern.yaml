  - slug: death-of-ibn-hajar-al-haytami
    category: scholar
    title_en: Death of Ibn Ḥajar al-Haytami
    title_ar: وفاة ابن حجر الهيتمي
    title_fr: Mort d'Ibn Ḥajar al-Haytamī
    description_en: |
      Aḥmad ibn Muhammad ibn Hajar al-Haytami al-Saʿdi — Shafiʿi
      jurist of Mecca, not to be confused with the earlier
      hadith master Ibn Ḥajar al-ʿAsqalani (d. 852 AH) — died
      in Mecca at age about 65. He was one of the great late-
      classical Shafiʿi authorities, with works that remain
      operational references in Shafiʿi fiqh today: *Tuḥfat al-
      Muḥtaj* (his commentary on al-Nawawi's *Minhaj al-
      Ṭalibin*) is the most authoritative Shafiʿi fatwa
      reference for late-period rulings. His *al-Fatawa al-
      Kubra al-Fiqhiyya* compiles his fatwa output as the
      principal mufti of Mecca. *al-Ṣawaʿiq al-Muḥriqa fi al-
      Radd ʿala Ahl al-Bidaʿ wa-l-Zandaqa* is a major polemical
      work defending Sunni-Shafiʿi positions against Shia and
      Muʿtazili challenges; *Sharḥ al-Hamziyya* is his
      celebrated commentary on al-Buṣiri's prophetological poem.
      His personal asceticism — he refused all stipends and
      lived from his own labour — became proverbial among the
      Hijazi scholarly community of his generation.
    description_ar: |
      توفي الإمام أحمد بن محمد بن حجر الهيتمي السعدي — فقيه
      شافعي بمكة المكرمة، ولا يخلط بينه وبين المحدث الأكبر ابن
      حجر العسقلاني (ت ٨٥٢ هـ) — بمكة عن نحو خمس وستين سنة.
      وهو أحد كبار المرجعية الشافعية في أواخر العصر الكلاسيكي،
      وكتبه ما زالت من المراجع الفعلية في الفقه الشافعي اليوم:
      «تحفة المحتاج» (شرحه على «منهاج الطالبين» للنووي) أعلى
      مرجع للفتاوى الشافعية في الأحكام المتأخرة. ومجلداته
      «الفتاوى الكبرى الفقهية» تجمع فتاواه إذ كان مفتي مكة
      المعتمد. و«الصواعق المحرقة في الرد على أهل البدع
      والزندقة» متن جدلي كبير في الدفاع عن مذهب أهل السنة
      الشافعية في وجه التحديات الشيعية والمعتزلية؛ و«شرح
      الهمزية» شرحه الذائع على قصيدة البوصيري في النبي ﷺ.
      وأما زهده الشخصي — رفض كل راتب وعاش من كسبه — فقد صار
      مضرب المثل عند علماء الحجاز في عصره.
    description_fr: |
      Aḥmad ibn Muḥammad ibn Ḥajar al-Haytamī al-Saʿdī —
      juriste shāfiʿite de La Mecque, à ne pas confondre avec
      le maître antérieur du hadith Ibn Ḥajar al-ʿAsqalānī
      (m. 852 H) — mourut à La Mecque à l'âge d'environ 65 ans.
      Il fut l'une des grandes autorités shāfiʿites tardo-
      classiques, avec des œuvres qui demeurent des références
      opérationnelles dans le fiqh shāfiʿite aujourd'hui :
      *Tuḥfat al-Muḥtāj* (son commentaire du *Minhāj al-
      Ṭālibīn* d'al-Nawawī) est la référence shāfiʿite la plus
      autoritative pour les décisions de la période tardive.
      Ses *Fatāwā al-Kubrā al-Fiqhiyya* compilent sa production
      de fatwas comme principal mufti de La Mecque. *al-
      Ṣawāʿiq al-Muḥriqa fī al-Radd ʿalā Ahl al-Bidaʿ wa-l-
      Zandaqa* est une œuvre polémique majeure défendant les
      positions sunnites-shāfiʿites contre les défis chiites
      et muʿtazilites; *Sharḥ al-Hamziyya* est son commentaire
      célèbre sur le poème prophétologique d'al-Būṣīrī. Son
      ascétisme personnel — il refusa toute stipendia et vécut
      de son propre travail — devint proverbial dans la
      communauté savante hedjazienne de sa génération.
    canonical_hijri: {year: 974, precision: year}
    canonical_gregorian: {date: 1567-01-01, precision: year, method: tabular_conversion}
