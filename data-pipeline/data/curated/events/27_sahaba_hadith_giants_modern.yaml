  - slug: death-of-sufyan-ibn-uyayna
    category: scholar
    title_en: Death of Sufyan ibn ʿUyayna — Mecca Hadith Giant
    title_ar: وفاة سفيان بن عيينة — حافظ مكة
    title_fr: Mort de Sufyān ibn ʿUyayna — géant du hadith à La Mecque
    description_en: |
      Abu Muhammad Sufyan ibn ʿUyayna al-Hilali al-Kufi — Sunni
      muḥaddith who emigrated from Kufa to Mecca and became
      the foremost hadith authority of the Hijaz for forty years
      until his death — died in Mecca at age about 91. He was
      one of the principal direct teachers of Imam al-Shafiʿi
      (who studied under him in Mecca for years), Imam Aḥmad
      ibn Ḥanbal, and ʿAli ibn al-Madini; the trio of Aḥmad,
      Ibn al-Madini, and Yaḥya ibn Maʿin all reckoned him among
      the foremost narrators of his generation. al-Shafiʿi said:
      "If not for Malik and Sufyan ibn ʿUyayna, the knowledge
      of the Hijaz would have died." Imam Aḥmad ranked him
      "the greatest of all hadith narrators in both isnad and
      meaning." His narrations from al-Zuhri are particularly
      strong; he is one of the principal links by which the
      al-Zuhri-mediated foundational hadith reached the
      generation of the Six Books.
    description_ar: |
      توفي الإمام أبو محمد سفيان بن عيينة الهلالي الكوفي — محدث
      سني هاجر من الكوفة إلى مكة وصار كبير محدثي الحجاز أربعين
      سنة حتى وفاته — بمكة المكرمة عن نحو إحدى وتسعين سنة. وهو
      أحد أكابر شيوخ الإمام الشافعي (قرأ عليه بمكة سنين)،
      والإمام أحمد بن حنبل، وعلي بن المديني؛ والثلاثة (أحمد وابن
      المديني ويحيى بن معين) عدّوه من كبار رواة جيله. قال
      الشافعي: «لولا مالك وسفيان بن عيينة لذهب علم الحجاز».
      وقال أحمد عنه: «أعلم الناس بالحديث إسناداً ومعنى». وأما
      روايته عن الزهري فبالغة القوة؛ وهو أحد العقد الكبرى التي
      وصلت بها أحاديث الزهري الأم إلى جيل أصحاب الكتب الستة.
    description_fr: |
      Abu Muḥammad Sufyān ibn ʿUyayna al-Hilālī al-Kūfī —
      muḥaddith sunnite qui émigra de Koufa à La Mecque et
      devint la principale autorité de hadith du Hedjaz pendant
      quarante ans jusqu'à sa mort — mourut à La Mecque à l'âge
      d'environ 91 ans. Il fut l'un des principaux maîtres
      directs de l'imam al-Shāfiʿī (qui étudia sous lui à La
      Mecque pendant des années), de l'imam Aḥmad ibn Ḥanbal,
      et d'ʿAlī ibn al-Madīnī; le trio Aḥmad, Ibn al-Madīnī et
      Yaḥyā ibn Maʿīn le comptait tous parmi les principaux
      narrateurs de sa génération. al-Shāfiʿī dit : « sans
      Mālik et Sufyān ibn ʿUyayna, la science du Hedjaz serait
      morte ». L'imam Aḥmad le classa « le plus grand de tous
      les narrateurs de hadith tant en *isnād* qu'en sens ».
      Ses narrations d'al-Zuhrī sont particulièrement solides;
      il est l'un des principaux liens par lesquels le hadith
      fondateur médiatisé par al-Zuhrī parvint à la génération
      des Six Livres.
