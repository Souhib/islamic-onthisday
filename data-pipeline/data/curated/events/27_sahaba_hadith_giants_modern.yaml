  - slug: death-of-abdullah-ibn-amr
    category: companion
    title_en: Death of ʿAbdullah ibn ʿAmr ibn al-ʿAṣ ra
    title_ar: وفاة عبد الله بن عمرو بن العاص رضي الله عنه
    title_fr: Mort d'ʿAbdallāh ibn ʿAmr ibn al-ʿĀṣ ra
    description_en: |
      Abu Muhammad ʿAbdullah ibn ʿAmr ibn al-ʿAṣ — son of the
      famous general ʿAmr ibn al-ʿAṣ ra (conqueror of Egypt),
      among the youngest Companions to embrace Islam (some
      sources say he embraced before his father), and the
      Companion who recorded hadith in writing during the
      Prophet's ﷺ lifetime when the Prophet ﷺ explicitly
      permitted him to do so — died in Egypt at age about 72.
      His written collection, *al-Ṣaḥifa al-Ṣadiqa*, contained
      reportedly 1,000 hadiths recorded directly from the
      Prophet ﷺ; it was inherited by his descendant ʿAmr ibn
      Shuʿayb and underlies a substantial portion of the hadith
      preserved through the Egyptian transmission line. He read
      the Torah and the Bible (in his pre-Islamic education) as
      well as the Qurʾan, and was one of the very few sahaba
      to do so. His narrations on personal piety and balanced
      worship — the famous hadith on fasting and prayer where
      the Prophet ﷺ corrected his over-zealousness (Bukhari) —
      are foundational guidance against extremism in worship.
    description_ar: |
      توفي أبو محمد عبد الله بن عمرو بن العاص رضي الله عنه — ابن
      القائد المشهور عمرو بن العاص رضي الله عنه (فاتح مصر)،
      ومن أصغر الصحابة إسلاماً (وذكر بعض المصادر أنه أسلم قبل
      أبيه)، والصحابي الذي كتب الحديث في حياة رسول الله ﷺ
      بإذن صريح من النبي ﷺ — بمصر عن نحو اثنتين وسبعين سنة.
      وجمعه الكتابي «الصحيفة الصادقة» يحوي قرابة ألف حديث رواها
      عن النبي ﷺ مباشرة؛ ورثها عنه حفيده عمرو بن شعيب فبنى عليها
      جزء كبير من الحديث المحفوظ بسلسلة الإسناد المصرية. وكان
      رحمه الله يقرأ التوراة والإنجيل (في تعليمه الجاهلي) إلى
      جانب القرآن، وهو من القلة من الصحابة الذين فعلوا ذلك.
      ورواياته في تقوى الفرد والتوازن في العبادة — حديثه المشهور
      في الصيام والصلاة إذ صحح النبي ﷺ فيه إفراطه (متفق عليه) —
      هي إرشاد أصلي ضد التشدد في العبادة.
    description_fr: |
      Abu Muḥammad ʿAbdullāh ibn ʿAmr ibn al-ʿĀṣ — fils du
      célèbre général ʿAmr ibn al-ʿĀṣ ra (conquérant de
      l'Égypte), parmi les plus jeunes Compagnons à embrasser
      l'Islam (certaines sources disent qu'il embrassa avant son
      père), et le Compagnon qui consigna les hadiths par écrit
      durant la vie du Prophète ﷺ lorsque le Prophète ﷺ le lui
      permit explicitement — mourut en Égypte à l'âge d'environ
      72 ans. Sa collection écrite, *al-Ṣaḥīfa al-Ṣādiqa*,
      contenait, dit-on, 1 000 hadiths consignés directement du
      Prophète ﷺ; elle fut héritée par son descendant ʿAmr ibn
      Shuʿayb et sous-tend une portion substantielle des
      hadiths préservés à travers la lignée de transmission
      égyptienne. Il lisait la Torah et la Bible (dans son
      éducation préislamique) ainsi que le Coran, et fut l'un
      des très rares sahaba à le faire. Ses narrations sur la
      piété personnelle et le culte équilibré — le célèbre
      hadith sur le jeûne et la prière où le Prophète ﷺ corrigea
      son zèle excessif (Bukhārī) — constituent des conseils
      fondateurs contre l'extrémisme dans le culte.
