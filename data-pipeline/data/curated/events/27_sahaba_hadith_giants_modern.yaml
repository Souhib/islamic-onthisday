  - slug: death-of-ahmad-zarruq
    category: scholar
    title_en: Death of Aḥmad Zarruq — Reformer of Maliki Sufism
    title_ar: وفاة أحمد زرّوق — مجدد التصوف المالكي
    title_fr: Mort d'Aḥmad Zarrūq — réformateur du soufisme malikite
    description_en: |
      Shihab al-Din Aḥmad ibn Aḥmad Zarruq al-Burnusi al-Fasi
      al-Maliki — Maliki Sufi shaykh of Fes who emigrated to
      Libyan Misrata, foremost Maliki commentator on Ibn ʿAṭaʾ-
      illah's *Hikam* (his *Sharḥ al-Hikam* is the most-cited
      classical commentary), and the founding figure of the
      *Zarruqiyya* sub-branch of the Shadhili tariqa — died at
      Misrata at age about 53. He systematised what he called
      "the conditions" (*ʿurūṭ*) of authentic Sufism in his
      *Qawaʿid al-Taṣawwuf* (Foundations of Sufism), 217 rules
      that defined Maliki-Shadhili orthodoxy against the
      ecstatic excesses he saw in some contemporary Sufi
      groups: every Sufi practice must be defensible from the
      Sharia; every shaykh must be a fiqh-trained scholar; no
      tariqa initiation can override the binding obligations
      of the madhhab. His framework decisively shaped Maghrebi
      Sufi orthodoxy from the 9th century AH onward and
      remains the canonical reference for Maliki-Sufi
      reform-mindedness today.
    description_ar: |
      توفي الإمام شهاب الدين أحمد بن أحمد زرّوق البرنسي الفاسي
      المالكي — صوفي مالكي فاسي هاجر إلى مصراتة في ليبيا،
      وكبير مفسري المالكية لـ«الحكم» لابن عطاء الله الإسكندري
      («شرح الحكم» له أكثر شروح الحكم الكلاسيكية إحالة عليه)،
      ومؤسس الفرع «الزرّوقي» من الطريقة الشاذلية — بمصراتة عن
      نحو ثلاث وخمسين سنة. وقنّن ما سمّاه «شروط» التصوف
      الصحيح في كتابه «قواعد التصوف»، ٢١٧ قاعدة حددت العقيدة
      المالكية الشاذلية في وجه الشطح الذي رأى عند بعض المتصوفة
      المعاصرين له: كل عمل صوفي يجب أن يكون له دليل من
      الشريعة؛ وكل شيخ يجب أن يكون فقيهاً متمكناً؛ ولا
      تستطيع طريقة بانتسابها أن تنسخ واجبات المذهب الملزمة.
      وأحكم هيكله العقيدة المالكية الصوفية من القرن التاسع
      الهجري فصاعداً، ولا يزال المرجع المعتمد في تجديد
      المذهب المالكي الصوفي اليوم.
    description_fr: |
      Shihāb al-Dīn Aḥmad ibn Aḥmad Zarrūq al-Burnusī al-Fāsī
      al-Mālikī — shaykh soufi malikite de Fès qui émigra vers
      Misrata en Libye, principal commentateur malikite des
      *Ḥikam* d'Ibn ʿAṭāʾillāh al-Iskandarī (son *Sharḥ al-Ḥikam*
      est le commentaire classique le plus cité), et la figure
      fondatrice de la sous-branche *Zarrūqiyya* de la *ṭarīqa
      Shādhiliyya* — mourut à Misrata à l'âge d'environ 53 ans.
      Il systématisa ce qu'il appela les « conditions » (*ʿurūṭ*)
      du soufisme authentique dans ses *Qawāʿid al-Taṣawwuf*
      (Fondements du Soufisme), 217 règles qui définirent
      l'orthodoxie malikite-shādhilite contre les excès
      extatiques qu'il voyait dans certains groupes soufis
      contemporains : chaque pratique soufie doit être
      défendable depuis la *sharīʿa*; chaque shaykh doit être un
      savant formé en fiqh; aucune initiation de *ṭarīqa* ne peut
      l'emporter sur les obligations contraignantes du madhhab.
      Son cadre façonna de manière décisive l'orthodoxie soufie
      maghrébine à partir du IXe siècle de l'Hégire et demeure
      la référence canonique pour la sensibilité réformiste
      malikite-soufie aujourd'hui.
