  - slug: death-of-ibn-ashur
    category: scholar
    title_en: Death of Muhammad al-Ṭahir ibn ʿAshur
    title_ar: وفاة محمد الطاهر ابن عاشور
    title_fr: Mort de Muḥammad al-Ṭāhir ibn ʿĀshūr
    description_en: |
      Muhammad al-Ṭahir ibn Muhammad ibn ʿAshur — Tunisian
      Maliki Sunni scholar, Shaykh al-Islam of Tunisia and
      reform-rector of al-Zaytuna university (Tunisia's
      counterpart to al-Azhar) for thirty years, and author of
      the monumental *al-Taḥrir wa-l-Tanwir* — a 30-volume
      Qurʾan tafsir that became the most influential modern
      Sunni Maghrebi commentary, balancing classical Maliki-
      Ashʿari scholarship with engagement with modern textual,
      linguistic, and historical methodologies — died in Tunis
      at age about 94. His *Maqaṣid al-Shariʿa al-Islamiyya* (a
      systematic treatise on the higher objectives of Sharia,
      drawing on al-Shaṭibi's *Muwafaqat*) became a foundational
      modern reference in *maqasid* theory and is taught
      across Sunni seminaries today. He was a towering presence
      in twentieth-century Sunni reformist scholarship,
      maintaining classical methodological rigour while
      addressing contemporary jurisprudential, social, and
      educational questions.
    description_ar: |
      توفي العلامة محمد الطاهر بن محمد ابن عاشور — فقيه مالكي
      سني تونسي، شيخ الإسلام بتونس ومجدد جامع الزيتونة (نظير
      الأزهر في تونس) ثلاثين سنة، ومصنف «التحرير والتنوير»
      الموسوعي — تفسير قرآني في ثلاثين مجلداً صار أكثر تفاسير
      السنة المغربية الحديثة تأثيراً، يوازن بين البحث المالكي
      الأشعري الكلاسيكي والاشتباك مع المناهج النصية واللغوية
      والتاريخية الحديثة — بتونس عن نحو أربع وتسعين سنة. وكتابه
      «مقاصد الشريعة الإسلامية» (متن منهجي في المقاصد العليا
      للشريعة، يستفيد من «الموافقات» للشاطبي) صار مرجعاً حديثاً
      أساسياً في علم المقاصد، يُقرأ في عامة معاهد العلوم السنية
      اليوم. وكان رحمه الله شخصية شاهقة في علم السنة الإصلاحي
      في القرن العشرين، يحفظ الصرامة المنهجية الكلاسيكية مع
      اشتباكه بالمسائل الفقهية والاجتماعية والتربوية المعاصرة.
    description_fr: |
      Muḥammad al-Ṭāhir ibn Muḥammad ibn ʿĀshūr — savant sunnite
      malikite tunisien, Cheikh ul-Islam de Tunisie et recteur-
      réformateur de l'université d'al-Zaytūna (la contrepartie
      tunisienne d'al-Azhar) pendant trente ans, et auteur du
      monumental *al-Taḥrīr wa-l-Tanwīr* — un tafsir coranique
      en 30 volumes qui devint le commentaire sunnite maghrébin
      moderne le plus influent, équilibrant l'érudition
      classique malikite-ashʿarite avec l'engagement avec les
      méthodologies textuelles, linguistiques et historiques
      modernes — mourut à Tunis à l'âge d'environ 94 ans. Son
      *Maqāṣid al-Sharīʿa al-Islāmiyya* (un traité systématique
      sur les objectifs supérieurs de la *sharīʿa*, s'appuyant
      sur les *Muwāfaqāt* d'al-Shāṭibī) devint une référence
      moderne fondatrice dans la théorie des *maqāṣid* et est
      enseigné à travers les séminaires sunnites aujourd'hui.
      Il fut une présence dominante dans l'érudition réformiste
      sunnite du XXe siècle, maintenant la rigueur méthodologique
      classique tout en abordant les questions
      jurisprudentielles, sociales et éducatives contemporaines.
