  - slug: rebuilding-of-kaaba-black-stone
    category: prophetic
    title_en: Rebuilding of the Kaʿba and Placement of the Black Stone
    title_ar: بناء الكعبة ووضع الحجر الأسود
    title_fr: Reconstruction de la Kaʿba et placement de la Pierre noire
    description_en: |
      A flash flood in the Meccan valley some five years before
      the start of the Prophetic mission damaged the structure
      of the Kaʿba beyond repair. Quraysh decided to demolish
      and rebuild it — and after some hesitation (since they
      feared retribution from the One who dwelt in it) Abu
      Wahb ibn Manaf began the demolition. The clans of Quraysh
      divided the rebuilding among themselves: each clan took
      a section. When the building reached the height of the
      Black Stone, a dispute broke out among the clans — each
      claiming the honour of placing the Stone in its corner.
      The dispute nearly came to bloodshed. The eldest among
      them proposed: "Let the first to enter the Sacred Mosque
      tomorrow morning judge between us." The first to enter
      was Muhammad ibn ʿAbdallah ﷺ — then 35, not yet a prophet
      — whom Quraysh universally called *al-Amin* (the
      Trustworthy). When told the dispute, he asked for a cloak,
      placed the Black Stone on it, and instructed each clan
      chief to take a corner of the cloak; together they
      raised it to its place, and he set the Stone with his own
      hand. The episode established his reputation for wisdom
      that would remain when the prophetic mission began five
      years later.
    description_ar: |
      أصاب الكعبة سيل في وادي مكة قبل بعثة النبي ﷺ نحو خمس
      سنوات أتلف بنيانها فلم يصلح. فعزمت قريش على هدمها وبنائها
      — وبعد توقف منها لخوفها من بطش من فيها، شرع أبو وهب بن
      مناف في الهدم. وقسّمت بطون قريش البناء بينها: لكل بطن
      ركن. ولما بلغ البناء موضع الحجر الأسود اختصمت القبائل
      — كلٌّ يدعي الشرف بوضع الحجر في موضعه. وكاد الخلاف يفضي
      إلى دماء. فأشار شيخهم: «اجعلوا أول داخل من باب المسجد
      الحرام غدوة هو حكمكم». فكان أول داخل محمد بن عبد الله ﷺ
      — وعمره خمس وثلاثون سنة، لم يبعث بعدُ — والذي عم قريش
      كلها بتسميته «الأمين». فلما عرضوا عليه الخلاف، طلب رداء،
      ووضع عليه الحجر الأسود، وأمر شيخ كل قبيلة أن يأخذ بطرف
      من الرداء؛ فرفعوه جميعاً إلى موضعه، فوضعه ﷺ بيده. وأرست
      الحادثة شهرته بالحكمة التي ستبقى لما ابتدأت البعثة بعد
      خمس سنين.
    description_fr: |
      Une crue éclair dans la vallée mecquoise quelque cinq ans
      avant le début de la mission prophétique endommagea la
      structure de la Kaʿba au-delà de toute réparation. Quraysh
      décida de la démolir et de la reconstruire — et après
      quelque hésitation (car ils craignaient le châtiment de
      Celui qui y résidait), Abū Wahb ibn Manāf entreprit la
      démolition. Les clans de Quraysh se partagèrent la
      reconstruction : chaque clan prit une section. Lorsque
      le bâtiment atteignit la hauteur de la Pierre noire, une
      dispute éclata entre les clans — chacun revendiquant
      l'honneur de placer la Pierre dans son coin. La dispute
      faillit aboutir à un bain de sang. L'aîné parmi eux
      proposa : « que le premier à entrer dans la Mosquée
      Sacrée demain matin nous juge ». Le premier à entrer fut
      Muḥammad ibn ʿAbdallāh ﷺ — alors âgé de 35 ans, pas
      encore prophète — que Quraysh appelait universellement
      *al-Amīn* (le Digne de confiance). Quand on lui exposa la
      dispute, il demanda un manteau, plaça la Pierre noire
      dessus, et ordonna à chaque chef de clan de prendre un
      coin du manteau; ensemble ils l'élevèrent à sa place, et
      il posa la Pierre de sa propre main. L'épisode établit
      sa réputation de sagesse qui demeurerait lorsque la
      mission prophétique commencerait cinq ans plus tard.
