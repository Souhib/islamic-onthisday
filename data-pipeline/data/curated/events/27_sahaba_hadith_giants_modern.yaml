  - slug: death-of-taqi-al-din-al-subki
    category: scholar
    title_en: Death of Taqi al-Din al-Subki
    title_ar: وفاة تقي الدين السبكي
    title_fr: Mort de Taqī al-Dīn al-Subkī
    description_en: |
      Taqi al-Din ʿAli ibn ʿAbd al-Kafi al-Subki — Shafiʿi-
      Ashʿari jurist, qadi al-quḍa of Damascus, foremost
      Shafiʿi authority of his age and the principal critic of
      Ibn Taymiyya during the latter's controversies in
      Damascus — died in Cairo at age about 73. His written
      polemics against Ibn Taymiyya — *Shifaʾ al-Saqam fi
      Ziyarat Khayr al-Anam* (defending the legitimacy of
      visiting the Prophet's ﷺ tomb), *al-Sayf al-Ṣaqil* (on
      Ashʿari theology against Ibn Taymiyya's position on the
      divine attributes), and *al-Iʿtibar bi-Baqaʾ al-Janna
      wa-l-Nar* (on the eternity of paradise and hell) —
      became canonical Shafiʿi-Ashʿari counter-arguments. He
      was the father of Tāj al-Din al-Subki (author of *Ṭabaqat
      al-Shafiʿiyya*) and ʿAbd al-Wahhab al-Subki. al-Dhahabi,
      despite siding with Ibn Taymiyya on doctrinal issues, said
      of him: "Taqi al-Din is the most learned of all Shafiʿis
      I have known."
    description_ar: |
      توفي الإمام تقي الدين علي بن عبد الكافي السبكي — فقيه
      شافعي أشعري، قاضي قضاة دمشق، وكبير الشافعية في عصره
      وأبرز ناقد لابن تيمية في خلافاته بدمشق — بالقاهرة عن
      نحو ثلاث وسبعين سنة. وكتبه الجدلية ضد ابن تيمية — «شفاء
      السقام في زيارة خير الأنام» (في إثبات شرعية زيارة قبر
      النبي ﷺ)، و«السيف الصقيل» (في العقيدة الأشعرية ضد قول
      ابن تيمية في الصفات)، و«الاعتبار ببقاء الجنة والنار»
      (في خلود الجنة والنار) — صارت ردوداً شافعية أشعرية
      كلاسيكية. وكان والد تاج الدين السبكي (مصنف «طبقات
      الشافعية الكبرى») وعبد الوهاب السبكي. قال عنه الذهبي،
      مع وقوفه إلى جانب ابن تيمية في المسائل العقدية: «تقي
      الدين أعلم من رأينا من الشافعية».
    description_fr: |
      Taqī al-Dīn ʿAlī ibn ʿAbd al-Kāfī al-Subkī — juriste
      shāfiʿite-ashʿarite, *qāḍī al-quḍāʾ* de Damas, principale
      autorité shāfiʿite de son âge et le critique principal
      d'Ibn Taymiyya durant les controverses de ce dernier à
      Damas — mourut au Caire à l'âge d'environ 73 ans. Ses
      polémiques écrites contre Ibn Taymiyya — *Shifāʾ al-
      Saqam fī Ziyārat Khayr al-Anām* (défendant la légitimité
      de la visite de la tombe du Prophète ﷺ), *al-Sayf al-
      Ṣaqīl* (sur la théologie ashʿarite contre la position
      d'Ibn Taymiyya sur les attributs divins), et *al-Iʿtibār
      bi-Baqāʾ al-Janna wa-l-Nār* (sur l'éternité du paradis et
      de l'enfer) — devinrent des contre-arguments shāfiʿites-
      ashʿarites canoniques. Il fut le père de Tāj al-Dīn al-
      Subkī (auteur des *Ṭabaqāt al-Shāfiʿiyya*) et d'ʿAbd al-
      Wahhāb al-Subkī. al-Dhahabī, malgré sa prise de parti
      pour Ibn Taymiyya sur des questions doctrinales, dit de
      lui : « Taqī al-Dīn est le plus savant de tous les
      Shāfiʿites que j'aie connus ».
    canonical_hijri: {year: 756, month: 7, day: 3, precision: day}
    canonical_gregorian: {date: 1355-07-14, precision: day, method: tabular_conversion}
