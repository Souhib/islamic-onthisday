  - slug: death-of-hammad-ibn-salama
    category: scholar
    title_en: Death of Hammad ibn Salama — Basra Hadith Master
    title_ar: وفاة حماد بن سلمة — محدث البصرة
    title_fr: Mort de Ḥammād ibn Salama — maître du hadith à Bassora
    description_en: |
      Abu Salama Hammad ibn Salama ibn Dinar al-Baṣri — leading
      Sunni muḥaddith of Basra in the second-century AH
      generation, foremost narrator of Thabit al-Bunani's
      transmission of Anas ibn Malik ra and the entire Basran
      Companion-tradition, and one of the principal teachers
      both of Yaḥya ibn Saʿid al-Qaṭṭan (the founder of formal
      hadith criticism) and the early Basran Sufis — died in
      Basra at age about 80. Imam Aḥmad ranked him "the most
      reliable transmitter from Thabit"; al-Bukhari narrates
      from him in *al-Adab al-Mufrad* but rarely in the *Ṣaḥiḥ*
      itself (preferring chains through younger transmitters
      whose memory he could verify); Muslim, Abu Dawud, al-
      Tirmidhi, and al-Nasaʾi all narrate from him in their
      Sunan. His positions on the divine attributes anchored
      the Basran Athari tradition. He was a freedman of the
      Tamim tribe.
    description_ar: |
      توفي الإمام أبو سلمة حماد بن سلمة بن دينار البصري — كبير
      محدثي البصرة في جيل القرن الثاني الهجري، أعلم تلاميذ
      ثابت البناني في رواية أنس بن مالك رضي الله عنه وعامة
      تراث الصحابة البصري، وأحد كبار شيوخ يحيى بن سعيد القطان
      (مؤسس النقد الحديثي) والصوفية الباكر بالبصرة — بالبصرة
      عن نحو ثمانين سنة. قال أحمد فيه: «أوثق من روى عن
      ثابت». روى عنه البخاري في «الأدب المفرد» ولكن نادراً في
      الصحيح نفسه (إيثاراً لأسانيد عبر رواة أصغر يمكن التحقق
      من حفظهم)؛ وروى عنه مسلم وأبو داود والترمذي والنسائي
      في سننهم. وأقواله في الصفات أصل من أصول التراث الأثري
      البصري. وكان رحمه الله مولى لتميم.
    description_fr: |
      Abu Salama Ḥammād ibn Salama ibn Dīnār al-Baṣrī —
      principal muḥaddith sunnite de Bassora dans la génération
      du IIe siècle de l'Hégire, principal narrateur de la
      transmission de Thābit al-Bunānī d'Anas ibn Mālik ra et
      de l'ensemble de la tradition des Compagnons basriens, et
      l'un des principaux enseignants à la fois de Yaḥyā ibn
      Saʿīd al-Qaṭṭān (le fondateur de la critique formelle du
      hadith) et des premiers soufis basriens — mourut à Bassora
      à l'âge d'environ 80 ans. L'imam Aḥmad le classa « le
      transmetteur le plus fiable de Thābit »; al-Bukhārī
      narre de lui dans *al-Adab al-Mufrad* mais rarement dans
      le *Ṣaḥīḥ* lui-même (préférant les chaînes par des
      transmetteurs plus jeunes dont il pouvait vérifier la
      mémoire); Muslim, Abū Dāwūd, al-Tirmidhī et al-Nasāʾī
      narrent tous de lui dans leurs *Sunan*. Ses positions sur
      les attributs divins ancrèrent la tradition athari
      basrienne. C'était un affranchi de la tribu de Tamīm.
