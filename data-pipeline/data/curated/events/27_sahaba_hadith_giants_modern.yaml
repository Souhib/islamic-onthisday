  - slug: marriage-of-khadija-and-muhammad
    category: prophetic
    title_en: Marriage of Khadīja bint Khuwaylid ra and Muhammad ﷺ
    title_ar: زواج خديجة بنت خويلد رضي الله عنها بالنبي محمد ﷺ
    title_fr: Mariage de Khadīja bint Khuwaylid ra et de Muḥammad ﷺ
    description_en: |
      The Prophet Muhammad ﷺ — at the age of 25, having recently
      returned from his second commercial expedition to Syria
      on Khadīja's behalf with profits unprecedented for her
      caravan — married Khadīja bint Khuwaylid, a widowed
      Quraysh noblewoman of about 40, in Mecca. The marriage
      was contracted between her uncle ʿAmr ibn Asad and the
      Prophet's ﷺ uncles Abu Ṭalib and Ḥamza, with a *mahr* of
      twenty young camels. They lived together for 25 years
      until Khadīja's death in the 10th year of the prophetic
      mission; she bore him all his children except Ibrāhīm
      (who was Maria the Copt's son), including the Prophet's
      ﷺ daughters Ruqayya, Umm Kulthūm, Zaynab, and Fāṭima ra.
      Throughout the 25 years he took no other wife. When the
      first revelation came at Cave Hira, it was to Khadīja
      that he turned for reassurance; her words ("By Allah, He
      will never bring you to grief") established her as the
      first believer. The Prophet ﷺ never ceased praising her
      after her death; ʿAʾisha ra famously said: "I was never
      jealous of any woman as I was jealous of Khadīja."
    description_ar: |
      تزوج النبي محمد ﷺ — وعمره خمس وعشرون سنة، عائداً حديثاً
      من رحلته التجارية الثانية إلى الشام في تجارة خديجة بأرباح
      غير مسبوقة لقافلتها — السيدة خديجة بنت خويلد، أرملة
      شريفة قرشية ناهزت الأربعين، بمكة المكرمة. وعقد العقد
      بين عمها عمرو بن أسد وأعمام النبي ﷺ أبي طالب وحمزة،
      على صداق عشرين من البكور. وعاشا معاً خمساً وعشرين سنة
      إلى وفاتها رضي الله عنها في السنة العاشرة من البعثة؛ وولدت
      له ولده كله إلا إبراهيم (وأمه مارية القبطية)، ومنهن
      بناته رضي الله عنهن رقية وأم كلثوم وزينب وفاطمة. وفي
      خمس وعشرين سنة لم يتزوج عليها أحداً. ولما نزل الوحي
      الأول بغار حراء، فرّ النبي ﷺ إليها يستأنس بها؛ فأرسلت
      كلمتها: «والله ما يخزيك الله أبداً»، فثبتت في بناء أول
      مؤمنة. ولم ينقطع النبي ﷺ عن مدحها بعد موتها؛ قالت عائشة
      رضي الله عنها: «ما غرت من امرأة ما غرت من خديجة».
    description_fr: |
      Le Prophète Muḥammad ﷺ — à l'âge de 25 ans, étant
      récemment revenu de sa seconde expédition commerciale en
      Syrie pour le compte de Khadīja avec des bénéfices sans
      précédent pour sa caravane — épousa Khadīja bint Khuwaylid,
      une noble veuve qurashite d'environ 40 ans, à La Mecque.
      Le mariage fut contracté entre son oncle ʿAmr ibn Asad
      et les oncles du Prophète ﷺ Abū Ṭālib et Ḥamza, avec un
      *mahr* de vingt jeunes chamelles. Ils vécurent ensemble
      25 ans jusqu'à la mort de Khadīja la 10e année de la
      mission prophétique; elle lui donna tous ses enfants sauf
      Ibrāhīm (qui était le fils de Maria la Copte), y compris
      les filles du Prophète ﷺ Ruqayya, Umm Kulthūm, Zaynab et
      Fāṭima ra. Pendant ces 25 ans, il ne prit aucune autre
      épouse. Lorsque la première révélation vint à la grotte
      de Ḥirāʾ, c'est vers Khadīja qu'il se tourna pour être
      réconforté; ses paroles (« Par Allah, Il ne te causera
      jamais de chagrin ») l'établirent comme la première
      croyante. Le Prophète ﷺ ne cessa jamais de la louer après
      sa mort; ʿĀʾisha ra dit célèbrement : « Je n'ai jamais
      été jalouse d'aucune femme autant que je l'ai été de
      Khadīja ».
    canonical_hijri: {year: -28, precision: year}
    canonical_gregorian: {date: 595-04-01, precision: year, method: attested}
