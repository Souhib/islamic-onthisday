  # =========================================================================
  # MALIKI EGYPTIAN FOUNDERS
  # =========================================================================

  - slug: death-of-ibn-wahb
    category: scholar
    title_en: Death of ʿAbdullah ibn Wahb — Maliki of Egypt
    title_ar: وفاة عبد الله بن وهب — مالكي مصر
    title_fr: Mort d'ʿAbdallāh ibn Wahb — malikite d'Égypte
    description_en: |
      Abu Muhammad ʿAbdullah ibn Wahb al-Qurashi al-Miṣri — son
      of a freedman of the Qurashi clan, leading direct student
      of Imam Malik in Egypt (he travelled annually to Medina
      to study), and one of the four founding companions of the
      Egyptian Maliki school (with Ibn al-Qāsim, Ashhab, and
      al-Mughira) — died in Cairo at age about 72. He was the
      most prolific compiler of Malik's own hadith and fiqh
      narrations: his *Jamiʿ ibn Wahb* and his *Muwaṭṭaʾ* (his
      personal recension of Malik's *Muwaṭṭaʾ*) preserve
      Malik's positions on hundreds of legal questions not
      preserved in al-Qaʿnabi's standard recension. He refused
      every appointment to qaḍi and lived in personal piety on
      his Cairo estate. His positions occupy a major part of
      the cross-references between Maliki and Hanafi schools
      preserved in Saḥnun's *al-Mudawwana*. Imam Malik said
      of him: "Ibn Wahb is a scholar of jurisprudence" — high
      praise from one who was sparing in compliments.
    description_ar: |
      توفي الإمام أبو محمد عبد الله بن وهب القرشي المصري — مولى
      لقريش، أعلم تلاميذ الإمام مالك مباشرة في مصر (كان يرحل
      كل سنة إلى المدينة المنورة للقراءة عليه)، وأحد الأربعة
      المؤسسين لمذهب مالكية مصر (مع ابن القاسم وأشهب
      والمغيرة) — بالقاهرة عن نحو اثنتين وسبعين سنة. وهو أوفر
      من جمع روايات الإمام مالك في الحديث والفقه: «الجامع» له
      و«الموطأ» (روايته الخاصة لـ«موطأ» مالك) يحفظان أقوال مالك
      في مئات المسائل التي لم تحفظ في رواية القعنبي المعتمدة.
      ورفض رحمه الله كل ترشيح للقضاء، وعاش في تقواه الخاصة في
      ضيعته بالقاهرة. وأقواله تشغل جزءاً كبيراً من المسائل
      المتقاطعة بين المذهبين المالكي والحنفي المحفوظة في
      «المدونة» لسحنون. قال عنه الإمام مالك: «ابن وهب فقيه»
      وكلمة عظيمة من رجل كان مقتصداً في الثناء.
    description_fr: |
      Abu Muḥammad ʿAbdullāh ibn Wahb al-Qurashī al-Miṣrī — fils
      d'un affranchi du clan qurashite, principal élève direct
      de l'imam Mālik en Égypte (il voyageait annuellement à
      Médine pour étudier), et l'un des quatre Compagnons
      fondateurs de l'école malikite égyptienne (avec Ibn al-
      Qāsim, Ashhab et al-Mughīra) — mourut au Caire à l'âge
      d'environ 72 ans. Il fut le compilateur le plus prolifique
      des narrations propres à Mālik en hadith et en fiqh : son
      *Jāmiʿ ibn Wahb* et son *Muwaṭṭaʾ* (sa recension
      personnelle du *Muwaṭṭaʾ* de Mālik) préservent les
      positions de Mālik sur des centaines de questions
      juridiques non préservées dans la recension standard
      d'al-Qaʿnabī. Il refusa toute nomination à *qāḍī* et
      vécut dans la piété personnelle sur son domaine cairote.
      Ses positions occupent une part majeure des références
      croisées entre les écoles malikite et hanafite préservées
      dans *al-Mudawwana* de Saḥnūn. L'imam Mālik dit de lui :
      « Ibn Wahb est un savant de jurisprudence » — louange
      élevée venant d'un homme avare en compliments.
    canonical_hijri: {year: 197, precision: year}
    canonical_gregorian: {date: 813-01-01, precision: year, method: attested}
