  - slug: death-of-sayyid-sabiq
    category: scholar
    title_en: Death of Sayyid Sabiq — Author of Fiqh al-Sunnah
    title_ar: وفاة السيد سابق — صاحب «فقه السنة»
    title_fr: Mort de Sayyid Sābiq — auteur de *Fiqh al-Sunna*
    description_en: |
      al-Sayyid Sabiq al-Tihami — Egyptian Sunni Shafiʿi-trained
      scholar with strong Maliki and Ḥanafi engagement, author
      of *Fiqh al-Sunnah* (the most-circulated modern Sunni
      fiqh manual in any language), and member of the founding
      generation of the Muslim Brotherhood educational network
      under Ḥasan al-Banna — died in Cairo at age about 85.
      *Fiqh al-Sunnah* in three volumes presents the
      jurisprudential rulings of all four Sunni madhāhib on
      every chapter of fiqh organised by topic, framed in
      modern Arabic accessible to non-specialists, with
      emphasis on returning to the strongest hadith evidence
      from the Six Books rather than blind adherence to any
      single madhhab. The work has been translated into more
      than twenty languages and has shaped contemporary Sunni
      jurisprudential consciousness across the global Muslim
      diaspora more than perhaps any single twentieth-century
      Arabic-language work.
    description_ar: |
      توفي الشيخ السيد سابق التهامي — فقيه سني مصري متربٍّ على
      الشافعية مع اشتباك واسع بالمالكية والحنفية، ومصنف «فقه
      السنة» (أوسع متن فقه سني حديث انتشاراً بأي لغة)، ومن
      جيل التأسيس الإخواني التعليمي عند الإمام حسن البنا —
      بالقاهرة عن نحو خمس وثمانين سنة. ويقدم «فقه السنة» في
      ثلاثة مجلدات أحكام المذاهب السنية الأربعة على كل أبواب
      الفقه مرتبة موضوعياً، بعربية حديثة ميسرة لغير
      المتخصصين، مع تركيز على الرجوع إلى أقوى دليل من الكتب
      الستة بدلاً من التقليد الأعمى لأي مذهب منفرد. وترجم
      الكتاب إلى أكثر من عشرين لغة، وشكل الوعي الفقهي السني
      المعاصر عبر شتات المسلمين العالمي على نطاق ربما لا
      يضاهيه فيه أي عمل عربي منفرد في القرن العشرين.
    description_fr: |
      al-Sayyid Sābiq al-Tihāmī — savant sunnite égyptien
      formé à l'école shāfiʿite avec un fort engagement
      malikite et hanafite, auteur de *Fiqh al-Sunna* (le
      manuel sunnite moderne de fiqh le plus diffusé en toute
      langue), et membre de la génération fondatrice du réseau
      éducatif des Frères musulmans sous Ḥasan al-Bannā —
      mourut au Caire à l'âge d'environ 85 ans. *Fiqh al-Sunna*
      en trois volumes présente les jugements jurisprudentiels
      des quatre madhāhib sunnites sur chaque chapitre du fiqh
      organisé par sujet, formulé en arabe moderne accessible
      aux non-spécialistes, avec un accent mis sur le retour
      à la preuve du hadith la plus solide tirée des Six Livres
      plutôt que sur l'adhésion aveugle à un seul madhhab.
      L'ouvrage a été traduit dans plus de vingt langues et a
      façonné la conscience jurisprudentielle sunnite
      contemporaine à travers la diaspora musulmane mondiale
      à un point que peut-être aucun ouvrage arabophone unique
      du XXe siècle ne dépasse.
