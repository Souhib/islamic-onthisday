  - slug: death-of-mahmud-shaltut
    category: scholar
    title_en: Death of Maḥmud Shaltut — Shaykh of al-Azhar
    title_ar: وفاة محمود شلتوت — شيخ الأزهر
    title_fr: Mort de Maḥmūd Shaltūt — Shaykh d'al-Azhar
    description_en: |
      Maḥmud Shaltut — Egyptian Sunni jurist and Shaykh of al-
      Azhar (1377-1383 AH / 1958-1963 CE), reformer who
      undertook the most extensive single restructuring of al-
      Azhar in the modern era (Law 103 of 1961 CE establishing
      the modern Azhar university with its parallel religious
      and secular faculties), and famous in Sunni-Shia
      ecumenical history for his fatwa permitting Sunnis to
      follow Twelver Shia (Jaʿfari) jurisprudence in
      transactions — died in Cairo at age about 70. His tafsir
      *Tafsir al-Qurʾan al-Karim* covers about ten parts of the
      Qurʾan; his *al-Fatawa* compiles his contemporary
      jurisprudential opinions on issues of modern social and
      political life. Together with Mustafa al-Maraghi (his
      predecessor) he represents the modernist-reformist
      Egyptian Sunni current that shaped twentieth-century
      Arab religious thought through Azhar's institutional
      reach.
    description_ar: |
      توفي الشيخ محمود شلتوت — فقيه سني مصري، وشيخ الجامع
      الأزهر (١٣٧٧-١٣٨٣ هـ / ١٩٥٨-١٩٦٣ ميلادي)، وأكبر مصلحي
      إعادة هيكلة الأزهر في العصر الحديث (القانون ١٠٣ لسنة
      ١٩٦١ ميلادي الذي أنشأ جامعة الأزهر الحديثة بكلياتها
      الدينية والمدنية المتوازية)، والشهير في تاريخ التقارب
      السني-الشيعي بفتواه التي تجيز للسنة العمل بالفقه الشيعي
      الجعفري في المعاملات — بالقاهرة عن نحو سبعين سنة. وله
      «تفسير القرآن الكريم» يستوعب نحو عشرة أجزاء من القرآن؛
      ومجلدات «الفتاوى» تجمع آراءه الفقهية المعاصرة في مسائل
      الحياة الاجتماعية والسياسية الحديثة. وهو والشيخ مصطفى
      المراغي (سلفه) يمثلان التيار الإصلاحي التحديثي السني
      المصري الذي صاغ الفكر الديني العربي في القرن العشرين
      بفضل امتداد الأزهر المؤسسي.
    description_fr: |
      Maḥmūd Shaltūt — juriste sunnite égyptien et Shaykh d'al-
      Azhar (1377-1383 H / 1958-1963 EC), réformateur qui
      entreprit la restructuration unique la plus étendue
      d'al-Azhar à l'ère moderne (la loi 103 de 1961 EC
      établissant l'université moderne d'al-Azhar avec ses
      facultés religieuses et laïques parallèles), et célèbre
      dans l'histoire œcuménique sunnite-chiite pour sa fatwa
      permettant aux sunnites de suivre la jurisprudence chiite
      duodécimaine (jaʿfarite) dans les transactions — mourut
      au Caire à l'âge d'environ 70 ans. Son tafsir *Tafsīr
      al-Qurʾān al-Karīm* couvre environ dix parties du Coran;
      ses *al-Fatāwā* compilent ses opinions jurisprudentielles
      contemporaines sur les questions de la vie sociale et
      politique moderne. Avec Muṣṭafā al-Marāghī (son
      prédécesseur) il représente le courant moderniste-
      réformiste sunnite égyptien qui façonna la pensée
      religieuse arabe du XXe siècle à travers la portée
      institutionnelle d'al-Azhar.
