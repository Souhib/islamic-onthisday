# Wave 33 of curated event additions (2026-04-27).
#
# Mamluk-era hadith critics, Shāfiʿī fuqahāʾ, and Sunni biographers
# not yet covered in earlier waves. Eleven figures span 581-807 AH
# / 1185-1405 CE: the Andalusian Mālikī Sīra commentator al-Suhaylī
# (d. 581 AH); the Damascene Shāfiʿī "Sulṭān al-ʿUlamāʾ" al-ʿIzz
# ibn ʿAbd al-Salām (d. 660 AH); the Damascene Shāfiʿī fiqh teacher
# Ibn al-Farkāḥ (d. 721 AH); the Damascene Shāfiʿī muḥaddith
# al-Khaṭīb al-Dimashqī (Ibn Kathīr's father-in-law and author of
# the *Manhaj al-Wuṣūl* uṣūl al-fiqh manual, d. 744 AH); the Cairo
# Mamluk biographer al-Ṣafadī (d. 764 AH); the Aleppine Shāfiʿī
# fiqh authority al-Adhraʿī (d. 783 AH); the Damascene-Egyptian
# uṣūlī-muḥaddith al-ʿAlāʾī (d. 761 AH); the Yemeni Shāfiʿī
# Sufi-biographer al-Yāfiʿī (d. 768 AH); the polymath plague
# chronicler Ibn al-Wardī (d. 749 AH); the Cairo *zawāʾid*-master
# al-Haythamī Nūr al-Dīn (d. 807 AH, distinct from Ibn Ḥajar
# al-Haytamī of 974 AH); and his teacher al-ʿIrāqī Zayn al-Dīn
# (d. 806 AH), author of the *Alfiyyat al-ʿIrāqī* in *muṣṭalaḥ
# al-ḥadīth* and the *Mughnī ʿan Ḥaml al-Asfār* on the references
# of al-Ghazālī's *Iḥyāʾ*.
#
# All eleven are mainstream Sunnī figures attested in classical
# biographical literature: Ibn Ḥajar al-ʿAsqalānī's *al-Durar
# al-Kāmina* (the standard reference for the eighth AH century),
# Ibn al-ʿImād's *Shadharāt al-Dhahab*, Ibn Khallikān's *Wafayāt
# al-Aʿyān* (for figures through 681 AH), Ibn Kathīr's *al-Bidāya
# wa al-Nihāya*, al-Dhahabī's *Tārīkh al-Islām* (for figures
# through 748 AH and a few subsequent dhayl continuations), and
# EI2 where editorial framing is needed. None are Sahaba; none
# carry hadith refs. Trilingual en/ar/fr throughout. category =
# scholar_death.

events:
  # =========================================================================
  # 6th CENTURY AH — al-Suhaylī, Andalusian Mālikī commentator on the Sīra
  # =========================================================================

  - slug: death-of-al-suhayli
    category: scholar_death
    title_en: Death of al-Suhaylī — Andalusian Mālikī commentator on the *Sīra*
    title_ar: وفاة السهيلي — صاحب «الروض الأنف» في شرح سيرة ابن هشام
    title_fr: Mort d'al-Suhaylī — commentateur andalou mālikīte de la Sīra
    description_en: |
      Abū al-Qāsim ʿAbd al-Raḥmān ibn ʿAbd Allāh ibn Aḥmad al-
      Suhaylī al-Khathʿamī al-Andalusī — Mālikī jurist, hadith
      transmitter, philologist, and Qurʾān commentator from Suhayl
      (a village near Málaga in al-Andalus), and author of *al-Rawḍ
      al-Unuf fī Sharḥ al-Sīra al-Nabawiyya li-Ibn Hishām*, the
      foundational classical Sunni commentary on Ibn Hishām's
      recension of the prophetic biography — died at Marrakesh in
      581 AH (1185 CE), aged about 73, in the entourage of the
      Almohad caliph Abū Yaʿqūb Yūsuf who had summoned him to court
      despite his advanced blindness. *al-Rawḍ al-Unuf* explicates
      the philology, genealogies, ḥadīth chains, and Qurʾānic
      cross-references of the *Sīra* in two large volumes; it is
      cited by every later Sunni Sīra-commentator (al-Shāmī,
      al-Ḥalabī, al-Diyārbakrī) and by the Maghribī biographical
      tradition through Ibn Khaldūn. He also composed *al-Taʿrīf
      wa-al-Iʿlām fī-mā Ubhima fī al-Qurʾān min al-Asmāʾ wa-al-
      Aʿlām*, a classic on the unnamed persons in the Qurʾān, and
      *Natāʾij al-Fikr fī al-Naḥw*. al-Dhahabī describes him as
      "ḥāfiẓ, ʿallāma, baṣīr al-qalb" — the master of insight whose
      physical sight was lost.
    description_ar: |
      توفي أبو القاسم عبد الرحمن بن عبد الله بن أحمد السهيلي الخثعمي
      الأندلسي — فقيه مالكي ومحدث ولغوي ومفسر، نسبته إلى سهيل قرية
      من قرى مالقة بالأندلس، وصاحب «الروض الأنف في شرح السيرة النبوية
      لابن هشام» الذي هو الشرح السني الكلاسيكي المؤسس لرواية ابن
      هشام للسيرة — بمراكش سنة ٥٨١ هـ (الموافق ١١٨٥ ميلادي) عن نحو
      ثلاث وسبعين سنة، وكان قد قدم على الخليفة الموحدي أبي يعقوب
      يوسف الذي استدعاه إلى البلاط على ما كان به من العمى التام.
      و«الروض الأنف» يبسط في مجلدين كبيرين فقه اللغة والأنساب
      وأسانيد الأحاديث ومعارضات القرآن في «السيرة»، وهو معتمد كل
      من جاء بعده من شراح السيرة عند أهل السنة (الشامي والحلبي
      والديار بكري) ومن المؤرخين المغاربة إلى ابن خلدون. وله أيضاً
      «التعريف والإعلام فيما أبهم في القرآن من الأسماء والأعلام»
      وهو من كلاسيكيات الباب، و«نتائج الفكر في النحو». قال عنه
      الذهبي: «الحافظ العلامة، بصير القلب» — يشير إلى ما فتح الله
      عليه من البصيرة بعد أن فقد البصر.
    description_fr: |
      Abū al-Qāsim ʿAbd al-Raḥmān ibn ʿAbd Allāh ibn Aḥmad al-
      Suhaylī al-Khathʿamī al-Andalusī — juriste mālikīte,
      transmetteur de hadiths, philologue et exégète coranique
      originaire de Suhayl (un village près de Málaga en al-Andalus)
      et auteur d'*al-Rawḍ al-Unuf fī Sharḥ al-Sīra al-Nabawiyya
      li-Ibn Hishām*, le commentaire sunnite classique fondateur
      de la recension de la biographie prophétique d'Ibn Hishām —
      mourut à Marrakech en 581 H (1185 EC), âgé d'environ 73 ans,
      dans l'entourage du calife almohade Abū Yaʿqūb Yūsuf qui
      l'avait convoqué à la cour malgré sa cécité totale.
      *al-Rawḍ al-Unuf* explicite, en deux gros volumes, la
      philologie, les généalogies, les chaînes de transmission et
      les renvois coraniques de la *Sīra* ; il est cité par tous
      les commentateurs sunnites postérieurs de la *Sīra*
      (al-Shāmī, al-Ḥalabī, al-Diyārbakrī) et par la tradition
      historiographique maghrébine jusqu'à Ibn Khaldūn. Il composa
      également *al-Taʿrīf wa-al-Iʿlām fī-mā Ubhima fī al-Qurʾān
      min al-Asmāʾ wa-al-Aʿlām*, classique sur les personnes
      anonymes dans le Coran, ainsi que *Natāʾij al-Fikr fī
      al-Naḥw*. al-Dhahabī le décrit comme « ḥāfiẓ, ʿallāma,
      baṣīr al-qalb » — le maître de la perspicacité dont la vue
      physique avait été perdue.
    canonical_hijri: {year: 581, precision: year}
    canonical_gregorian: {date: 1185-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafayāt al-Aʿyān gives 581 AH at Marrakesh, age c. 73."
      - source_key: dhahabi_siyar
        notes: "Siyar Aʿlām al-Nubalāʾ confirms 581 AH."
      - source_key: ibn_kathir_bidaya
        notes: "al-Bidāya wa al-Nihāya places death 581 AH."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab corroborates 581 AH."
    people: [[al-suhayli, died]]
    tags: [andalus, maliki, sira, marrakesh, almohad, hadith]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Al-Suhayli"

  # =========================================================================
  # 7th CENTURY AH — al-ʿIzz ibn ʿAbd al-Salām, "Sulṭān al-ʿUlamāʾ"
  # =========================================================================

  - slug: death-of-al-izz-ibn-abd-al-salam
    category: scholar_death
    title_en: Death of al-ʿIzz ibn ʿAbd al-Salām — *Sulṭān al-ʿUlamāʾ*
    title_ar: وفاة العز بن عبد السلام — سلطان العلماء
    title_fr: Mort d'al-ʿIzz ibn ʿAbd al-Salām — *Sulṭān al-ʿUlamāʾ*
    description_en: |
      ʿIzz al-Dīn Abū Muḥammad ʿAbd al-ʿAzīz ibn ʿAbd al-Salām
      al-Sulamī al-Dimashqī al-Shāfiʿī — Damascene-then-Egyptian
      Shāfiʿī jurist, uṣūlī, and political-religious authority,
      universally titled *Sulṭān al-ʿUlamāʾ* (Sultan of the
      Scholars) by the Sunni tradition, and author of *Qawāʿid
      al-Aḥkām fī Maṣāliḥ al-Anām* — the foundational Sunni
      treatise on the higher objectives (*maqāṣid*) of the
      Sharīʿa — died at Cairo in 660 AH (1262 CE), aged about 83.
      As khaṭīb of the Umayyad Mosque of Damascus he had publicly
      sold the indebted Mamlūk amīrs at auction to fund the
      treasury after the disgrace of their illegal cumulative
      manumissions, an act recorded by Ibn Khallikān as the most
      celebrated public ḥisba precedent of the Mamlūk century.
      Pupils included the Mālikī al-Qarāfī (the *maqāṣid* line
      flows from al-ʿIzz to al-Qarāfī to al-Shāṭibī), Ibn Daqīq
      al-ʿĪd, and the historian Ibn al-ʿAṭṭār. al-Dhahabī's
      *Siyar* devotes one of its longest entries to him.
    description_ar: |
      توفي عز الدين أبو محمد عبد العزيز بن عبد السلام السلمي
      الدمشقي الشافعي — فقيه شافعي وأصولي ومرجع علمي وسياسي
      دمشقي ثم مصري، اتفق أهل السنة على تلقيبه «سلطان العلماء»،
      صاحب «قواعد الأحكام في مصالح الأنام» الذي هو التأصيل
      المؤسس لمقاصد الشريعة عند أهل السنة — بالقاهرة سنة ٦٦٠ هـ
      (الموافق ١٢٦٢ ميلادي) عن نحو ثلاث وثمانين سنة. وكان قد
      تولى الخطابة بجامع بني أمية بدمشق، وأمر ببيع أمراء
      المماليك في المزاد العلني ثمناً لرقابهم لما تبين أنهم لم
      يعتقوا قبل توليتهم المناصب — وهي قصة دونها ابن خلكان بوصفها
      أشهر سابقة للحسبة العامة في تاريخ الدولة المملوكية. ومن
      تلامذته القرافي المالكي (وهو حلقة وصل بين العز والشاطبي
      في تأصيل المقاصد) وابن دقيق العيد وابن العطار. وقد أفرد
      الذهبي ترجمة العز في «السير» بطول هو من أطول التراجم.
    description_fr: |
      ʿIzz al-Dīn Abū Muḥammad ʿAbd al-ʿAzīz ibn ʿAbd al-Salām
      al-Sulamī al-Dimashqī al-Shāfiʿī — juriste shāfiʿīte
      damascène puis égyptien, uṣūlī et autorité politico-
      religieuse universellement intitulé *Sulṭān al-ʿUlamāʾ*
      (Sultan des savants) par la tradition sunnite, et auteur
      de *Qawāʿid al-Aḥkām fī Maṣāliḥ al-Anām* — traité fondateur
      sunnite des finalités supérieures (*maqāṣid*) de la
      Sharīʿa — mourut au Caire en 660 H (1262 EC), âgé d'environ
      83 ans. Khaṭīb de la Grande Mosquée des Omeyyades de Damas,
      il fit publiquement vendre aux enchères les amīrs mamelouks
      endettés au profit du Trésor après que furent révélés leurs
      affranchissements cumulatifs illégaux — geste consigné par
      Ibn Khallikān comme le précédent de *ḥisba* publique le
      plus célèbre du siècle mamelouk. Parmi ses élèves : le
      mālikīte al-Qarāfī (la lignée *maqāṣid* va d'al-ʿIzz à
      al-Qarāfī à al-Shāṭibī), Ibn Daqīq al-ʿĪd et l'historien
      Ibn al-ʿAṭṭār. Les *Siyar* d'al-Dhahabī lui consacrent
      l'une de leurs plus longues notices.
    canonical_hijri: {year: 660, month: 1, precision: month}
    canonical_gregorian: {date: 1261-12-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafayāt al-Aʿyān gives Jumādā I 660 AH at Cairo."
      - source_key: dhahabi_siyar
        notes: "Siyar Aʿlām al-Nubalāʾ confirms 660 AH."
      - source_key: ibn_kathir_bidaya
        notes: "al-Bidāya wa al-Nihāya places death 660 AH at Cairo."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab corroborates 660 AH."
    people: [[al-izz-ibn-abd-al-salam, died]]
    tags: [shafii, damascus, cairo, mamluk, ayyubid, maqasid, sultan-al-ulama]
    importance: notable
    verified: true
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Izz_al-Din_ibn_%27Abd_al-Salam"

  # =========================================================================
  # 8th CENTURY AH — Damascene Shāfiʿī teaching circle
  # =========================================================================

  - slug: death-of-ibn-al-farkah
    category: scholar_death
    title_en: Death of Tāj al-Dīn Ibn al-Farkāḥ — Damascene Shāfiʿī fiqh teacher
    title_ar: وفاة تاج الدين ابن الفركاح — شيخ الشافعية بدمشق
    title_fr: Mort de Tāj al-Dīn Ibn al-Farkāḥ — maître shāfiʿīte de Damas
    description_en: |
      Tāj al-Dīn Abū Muḥammad ʿAbd al-Raḥmān ibn Ibrāhīm ibn Ḍiyāʾ
      al-Fazārī al-Miṣrī al-Dimashqī, known as Ibn al-Farkāḥ —
      Egyptian-Damascene Shāfiʿī jurist, son of the Bādharāʾiyya
      mudarris Burhān al-Dīn al-Fazārī and one of the most
      influential teachers of fiqh in late-Mamluk Damascus, whose
      circle at the Bādharāʾiyya and the Umayyad Mosque trained
      virtually every Damascene Shāfiʿī authority of the next
      generation — died at Damascus in 690 AH or 705 AH (the date
      used here is 690 AH following Ibn Kathīr's *al-Bidāya wa
      al-Nihāya*; al-Dhahabī's *Tārīkh al-Islām* records 690 AH;
      Ibn Ḥajar in *al-Durar al-Kāmina* allows for the variant
      705 AH for the related Burhān al-Dīn). His pupils included
      al-Mizzī, al-Dhahabī, Ibn Taymiyya, al-Kamāl ibn al-Zamlakānī,
      and al-Subkī al-Kabīr; his lectures on al-Shīrāzī's *al-
      Tanbīh* and on al-Ghazālī's *al-Wajīz* shaped the curriculum
      of the Damascene Shāfiʿī school for the entire eighth
      century AH. He authored a commentary on *al-Tanbīh* and
      glosses on *al-Wajīz*.
    description_ar: |
      توفي تاج الدين أبو محمد عبد الرحمن بن إبراهيم بن ضياء
      الفزاري المصري الدمشقي المعروف بابن الفركاح — فقيه شافعي
      مصري دمشقي، ابن مدرس البادرائية برهان الدين الفزاري، وأحد
      أوسع شيوخ الفقه أثراً بدمشق في أواخر العصر المملوكي، ربى
      في حلقته بالبادرائية والجامع الأموي عامة شيوخ المذهب
      الشافعي بدمشق في الجيل التالي — بدمشق سنة ٦٩٠ هـ على ما
      رجحه ابن كثير في «البداية والنهاية» وأثبته الذهبي في
      «تاريخ الإسلام»، وذكر ابن حجر في «الدرر الكامنة» الاختلاف
      مع برهان الدين والده الذي توفي ٧٠٥ هـ. ومن تلامذته المزي
      والذهبي وابن تيمية وكمال الدين ابن الزملكاني والسبكي
      الكبير. ودروسه على «التنبيه» للشيرازي و«الوجيز» للغزالي
      حدّدت منهج المدرسة الشافعية الدمشقية طيلة القرن الثامن
      الهجري. وله شرح على «التنبيه» وحواشٍ على «الوجيز».
    description_fr: |
      Tāj al-Dīn Abū Muḥammad ʿAbd al-Raḥmān ibn Ibrāhīm ibn Ḍiyāʾ
      al-Fazārī al-Miṣrī al-Dimashqī, connu comme Ibn al-Farkāḥ —
      juriste shāfiʿīte égyptien-damascène, fils du mudarris de
      la Bādharāʾiyya Burhān al-Dīn al-Fazārī, et l'un des
      enseignants de fiqh les plus influents du Damas mamelouk
      tardif, dont le cercle à la Bādharāʾiyya et à la Mosquée
      des Omeyyades forma pratiquement toutes les autorités
      shāfiʿītes damascènes de la génération suivante — mourut à
      Damas en 690 H selon Ibn Kathīr (*al-Bidāya wa al-Nihāya*)
      et al-Dhahabī (*Tārīkh al-Islām*) ; Ibn Ḥajar dans *al-Durar
      al-Kāmina* admet la variante 705 H pour son père Burhān
      al-Dīn. Parmi ses élèves : al-Mizzī, al-Dhahabī, Ibn
      Taymiyya, al-Kamāl ibn al-Zamlakānī et al-Subkī al-Kabīr.
      Ses leçons sur *al-Tanbīh* d'al-Shīrāzī et sur *al-Wajīz*
      d'al-Ghazālī modelèrent le curriculum de l'école shāfiʿīte
      damascène pendant tout le VIIIᵉ siècle de l'hégire. Il
      composa un commentaire sur *al-Tanbīh* et des gloses sur
      *al-Wajīz*.
    canonical_hijri: {year: 690, precision: year}
    canonical_gregorian: {date: 1291-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: dhahabi_tarikh_islam
        is_canonical: true
        notes: "Tārīkh al-Islām attests 690 AH at Damascus."
      - source_key: ibn_kathir_bidaya
        notes: "al-Bidāya wa al-Nihāya places death 690 AH."
      - source_key: ibn_hajar_durar
        notes: "al-Durar al-Kāmina confirms; gives the family date table."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab corroborates 690 AH."
    people: [[ibn-al-farkah, died]]
    tags: [shafii, damascus, mamluk, fiqh, badhraiyya, fazari]
    importance: notable
    verified: true
    verification_status: cross_verified

  # =========================================================================
  # 8th CENTURY AH — al-Khaṭīb al-Dimashqī al-Kattānī (744 AH)
  # =========================================================================

  - slug: death-of-al-khatib-al-dimashqi-al-kattani
    category: scholar_death
    title_en: Death of al-Khaṭīb al-Dimashqī al-Kattānī — Shāfiʿī uṣūlī
    title_ar: وفاة الخطيب الدمشقي الكتاني — شافعي أصولي
    title_fr: Mort d'al-Khaṭīb al-Dimashqī al-Kattānī — uṣūlī shāfiʿīte
    description_en: |
      ʿAlāʾ al-Dīn Abū al-Ḥasan ʿAlī ibn ʿAbd al-Kāfī al-Subkī's
      Damascene contemporary Shams al-Dīn Muḥammad ibn Aḥmad ibn
      ʿUthmān ibn Qāyimāz al-Kattānī al-Dimashqī al-Khaṭīb — son-
      in-law of Ibn Kathīr (his daughter Zaynab married Ibn Kathīr,
      a relationship Ibn Kathīr records in *al-Bidāya wa al-
      Nihāya*), Shāfiʿī muḥaddith and uṣūlī, and khaṭīb of the
      Umayyad Mosque of Damascus — died of plague at Damascus in
      Rabīʿ I 744 AH (1343 CE). He authored *Manhaj al-Wuṣūl ilā
      ʿIlm al-Uṣūl*, a Shāfiʿī uṣūl al-fiqh manual that remained
      standard reading at the Damascene Shāfiʿī madrasas through
      the ninth century AH; the work is cited by al-Subkī's
      *Ṭabaqāt al-Shāfiʿiyya al-Kubrā* and by Ibn Ḥajar's *al-
      Durar al-Kāmina*. He also produced abridgements of hadith
      manuals widely used in Damascene teaching circles.
    description_ar: |
      توفي شمس الدين أبو عبد الله محمد بن أحمد بن عثمان بن
      قايماز الكتاني الدمشقي الخطيب — صهر ابن كثير (تزوج ابنته
      زينب من ابن كثير على ما ذكره ابن كثير نفسه في «البداية
      والنهاية»)، محدث شافعي وأصولي، وخطيب الجامع الأموي بدمشق
      — بدمشق في طاعون ربيع الأول سنة ٧٤٤ هـ (الموافق ١٣٤٣
      ميلادي). وله «منهج الوصول إلى علم الأصول»، متن في أصول
      الفقه على المذهب الشافعي ظل من المعتمد في تدريس مدارس
      دمشق الشافعية إلى القرن التاسع الهجري؛ ومن مَنْ أحال إليه
      السبكي في «طبقات الشافعية الكبرى» وابن حجر في «الدرر
      الكامنة». وله أيضاً مختصرات في الحديث ذُكرت من المتداولة
      في حلقات دمشق.
    description_fr: |
      Shams al-Dīn Abū ʿAbd Allāh Muḥammad ibn Aḥmad ibn ʿUthmān
      ibn Qāyimāz al-Kattānī al-Dimashqī al-Khaṭīb — beau-père
      d'Ibn Kathīr (sa fille Zaynab épousa Ibn Kathīr, lien
      qu'Ibn Kathīr lui-même mentionne dans *al-Bidāya wa al-
      Nihāya*), muḥaddith shāfiʿīte et uṣūlī, et khaṭīb de la
      Mosquée des Omeyyades de Damas — mourut de la peste à
      Damas en Rabīʿ I 744 H (1343 EC). Il composa *Manhaj al-
      Wuṣūl ilā ʿIlm al-Uṣūl*, manuel d'uṣūl al-fiqh shāfiʿīte
      qui demeura lecture standard dans les madrasas shāfiʿītes
      damascènes jusqu'au IXᵉ siècle de l'hégire ; l'ouvrage est
      cité dans les *Ṭabaqāt al-Shāfiʿiyya al-Kubrā* d'al-Subkī
      et dans *al-Durar al-Kāmina* d'Ibn Ḥajar. Il rédigea
      également des abrégés de manuels de hadith largement
      employés dans les cercles d'enseignement damascènes.
