      - source_key: ibn_hajar_durar
        is_canonical: true
        notes: "al-Durar al-Kāmina — 8 Shaʿbān 806 AH at Cairo."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab confirms 806 AH."
      - source_key: ei2
        notes: "EI2 art. 'al-ʿIrāqī' confirms the date and the *Alfiyya*."
    people: [[zayn-al-din-al-iraqi, died]]
