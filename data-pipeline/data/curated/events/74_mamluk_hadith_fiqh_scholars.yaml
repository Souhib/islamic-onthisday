  # =========================================================================
  # 8th CENTURY AH — Ibn al-Wardī (749 AH), Shāfiʿī jurist-historian
  # =========================================================================

  - slug: death-of-ibn-al-wardi
    category: scholar_death
    title_en: Death of Ibn al-Wardī — Shāfiʿī jurist, plague chronicler, and poet
    title_ar: وفاة ابن الوردي — شافعي وفقيه ومؤرخ ومرثية الطاعون
    title_fr: Mort d'Ibn al-Wardī — juriste shāfiʿīte, chroniqueur de la peste, et poète
    description_en: |
      Zayn al-Dīn Abū Ḥafṣ ʿUmar ibn Muẓaffar ibn ʿUmar ibn al-
      Wardī al-Maʿarrī al-Ḥalabī al-Shāfiʿī — Aleppine Shāfiʿī
      jurist, poet, naḥwī, and historian, author of the verse-
      didactic *Bahjat al-Ḥawādī* (a *Bahjat* on Shāfiʿī fiqh
      stylised after Ibn Mālik's *Alfiyya*), the geographical-
      historical *Khazāʾin al-Qaṣr* (also known as *Tatimmat al-
      Mukhtaṣar fī Akhbār al-Bashar*, a continuation of Abū
      al-Fidāʾ's universal history through 749 AH), and the
      celebrated *Risālat al-Naba ʿan al-Wabāʾ* — a first-person
      eyewitness chronicle of the Black Death's arrival in Aleppo
      in 748-749 AH — died of plague at Aleppo in Dhū al-Ḥijja
      749 AH (March 1349 CE), aged about 60. His *Risāla* on the
      plague is the most famous Sunni Arabic literary response
      to the Black Death and is still read as both a historical
      document and a spiritual meditation on mortality. (To be
      distinguished from the later cosmographer Sirāj al-Dīn ʿUmar
      ibn al-Wardī, fl. 9th AH, to whom the world-map *Kharīdat
      al-ʿAjāʾib* is attributed.)
    description_ar: |
      توفي زين الدين أبو حفص عمر بن مظفر بن عمر ابن الوردي
      المعري الحلبي الشافعي — فقيه شافعي حلبي وشاعر ونحوي ومؤرخ،
      صاحب «بهجة الحاوي» (منظومة في فقه الشافعية على وزن «ألفية»
      ابن مالك)، و«خزائن القصر» المعروف بـ«تتمة المختصر في أخبار
      البشر» (ذيل لتاريخ أبي الفداء العام إلى سنة ٧٤٩ هـ)، و«رسالة
      النبأ عن الوباء» الشهيرة — وهي شهادة عيان من ضمير المتكلم
      على وصول الموت الأسود إلى حلب سنتي ٧٤٨-٧٤٩ هـ — توفي رحمه
      الله بالطاعون بحلب في ذي الحجة سنة ٧٤٩ هـ (الموافق آذار
      ١٣٤٩ ميلادي) عن نحو ستين سنة. ورسالته في الوباء أشهر ما
      ترك العرب من الأدب السني في الجواب على الموت الأسود، وما
      زالت تُقرأ على وجهيها: شهادة تاريخية وتأمل روحاني في الفناء.
      (ويتميز عن سراج الدين عمر ابن الوردي المتأخر القرن التاسع
      الذي تنسب إليه «خريدة العجائب» في الجغرافيا.)
    description_fr: |
      Zayn al-Dīn Abū Ḥafṣ ʿUmar ibn Muẓaffar ibn ʿUmar ibn al-
      Wardī al-Maʿarrī al-Ḥalabī al-Shāfiʿī — juriste shāfiʿīte
      d'Alep, poète, grammairien et historien, auteur de la
      *Bahjat al-Ḥawādī* (versification didactique du fiqh
      shāfiʿīte calquée sur l'*Alfiyya* d'Ibn Mālik), de
      *Khazāʾin al-Qaṣr* connu sous le titre *Tatimmat al-
      Mukhtaṣar fī Akhbār al-Bashar* (continuation de l'histoire
      universelle d'Abū al-Fidāʾ jusqu'en 749 H), et de la
      célèbre *Risālat al-Naba ʿan al-Wabāʾ* — chronique
      autobiographique de l'arrivée de la peste noire à Alep en
      748-749 H — mourut de la peste à Alep en Dhū al-Ḥijja 749 H
      (mars 1349 EC), âgé d'environ 60 ans. Sa *Risāla* sur la
      peste est la réponse littéraire arabe sunnite la plus
      célèbre à la peste noire ; elle est toujours lue à la fois
      comme document historique et méditation spirituelle sur la
      mortalité. (À distinguer du cosmographe ultérieur Sirāj
      al-Dīn ʿUmar ibn al-Wardī, IXᵉ siècle de l'hégire, à qui
      l'on attribue la carte-monde *Kharīdat al-ʿAjāʾib*.)
