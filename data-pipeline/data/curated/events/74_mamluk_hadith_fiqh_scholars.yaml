  # =========================================================================
  # 8th CENTURY AH — al-Ṣafadī, Mamluk biographer (764 AH)
  # =========================================================================

  - slug: death-of-al-safadi
    category: scholar_death
    title_en: Death of al-Ṣafadī — author of *al-Wāfī bi-l-Wafayāt*
    title_ar: وفاة الصفدي — صاحب «الوافي بالوفيات»
    title_fr: Mort d'al-Ṣafadī — auteur d'*al-Wāfī bi-l-Wafayāt*
    description_en: |
      Ṣalāḥ al-Dīn Abū al-Ṣafāʾ Khalīl ibn Aybak ibn ʿAbd Allāh
      al-Ṣafadī — Mamluk Egyptian-Syrian Sunni biographer, poet,
      and chancery secretary, and author of *al-Wāfī bi-l-Wafayāt*
      — the largest biographical dictionary in Arabic literature
      after al-Dhahabī's *Tārīkh al-Islām*, comprising more than
      14,000 entries on Islamic and pre-Islamic figures across
      thirty volumes — died of plague at Damascus in Shawwāl
      764 AH (July 1363 CE), aged about 68. He served as
      kātib al-darj in the chanceries of Cairo, Aleppo, Ṣafad,
      and Damascus, and produced over forty other works,
      including the *Aʿyān al-ʿAṣr wa-Aʿwān al-Naṣr* (a wafayāt
      dictionary specifically of his eighth-century AH
      contemporaries) and the literary anthology *al-Ghayth
      al-Musajjam fī Sharḥ Lāmiyyat al-ʿAjam*, a commentary on
      al-Ṭughrāʾī's celebrated qaṣīda. *al-Wāfī* is the single
      most cited Mamluk-period biographical reference in modern
      academic Islamic studies.
    description_ar: |
      توفي صلاح الدين أبو الصفاء خليل بن أيبك بن عبد الله
      الصفدي — مؤرخ التراجم السني المملوكي وأديب وكاتب الديوان
      مصري شامي، وصاحب «الوافي بالوفيات» الذي هو أكبر معاجم
      الترجمة في الأدب العربي بعد «تاريخ الإسلام» للذهبي،
      ويضم أكثر من أربعة عشر ألف ترجمة لأعلام الإسلام وما قبله
      في ثلاثين مجلداً — توفي رحمه الله بالطاعون بدمشق في
      شوال سنة ٧٦٤ هـ (الموافق تموز ١٣٦٣ ميلادي) عن نحو ثمان
      وستين سنة. خدم كاتب الدرج في دواوين القاهرة وحلب وصفد
      ودمشق، وصنف أكثر من أربعين كتاباً، منها «أعيان العصر
      وأعوان النصر» (معجم وفيات لمعاصريه القرن الثامن خاصة)
      و«الغيث المسجم في شرح لامية العجم» — شرح القصيدة الطغرائية
      المشهورة. و«الوافي» اليوم أكثر مراجع الترجمة المملوكية
      إحالة في الدراسات الإسلامية الأكاديمية الحديثة.
    description_fr: |
      Ṣalāḥ al-Dīn Abū al-Ṣafāʾ Khalīl ibn Aybak ibn ʿAbd Allāh
      al-Ṣafadī — biographe sunnite mamelouk égypto-syrien,
      poète et secrétaire de chancellerie, auteur d'*al-Wāfī bi-
      l-Wafayāt* — le plus grand dictionnaire biographique de la
      littérature arabe après le *Tārīkh al-Islām* d'al-Dhahabī,
      comportant plus de 14 000 notices sur les figures
      islamiques et préislamiques en trente volumes — mourut de
      la peste à Damas en Shawwāl 764 H (juillet 1363 EC), âgé
      d'environ 68 ans. Il servit comme kātib al-darj dans les
      chancelleries du Caire, d'Alep, de Ṣafad et de Damas, et
      composa plus de quarante autres ouvrages, dont *Aʿyān al-
      ʿAṣr wa-Aʿwān al-Naṣr* (dictionnaire de wafayāt
      spécifiquement consacré à ses contemporains du VIIIᵉ siècle
      de l'hégire) et l'anthologie littéraire *al-Ghayth al-
      Musajjam fī Sharḥ Lāmiyyat al-ʿAjam*, commentaire sur la
      célèbre qaṣīda d'al-Ṭughrāʾī. *al-Wāfī* est la référence
      biographique mamelouke la plus citée dans les études
      islamiques académiques modernes.
    canonical_hijri: {year: 764, month: 10, precision: month}
    canonical_gregorian: {date: 1363-07-01, precision: month, method: tabular_conversion}
