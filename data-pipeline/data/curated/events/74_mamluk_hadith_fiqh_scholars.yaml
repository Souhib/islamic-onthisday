  # =========================================================================
  # 8th CENTURY AH — al-Yāfiʿī, Yemeni Shāfiʿī Sufi-biographer (768 AH)
  # =========================================================================

  - slug: death-of-al-yafii
    category: scholar_death
    title_en: Death of al-Yāfiʿī — Yemeni Shāfiʿī Sufi-biographer
    title_ar: وفاة اليافعي — صوفي شافعي يماني ومؤرخ
    title_fr: Mort d'al-Yāfiʿī — soufi-biographe yéménite shāfiʿīte
    description_en: |
      ʿAfīf al-Dīn Abū Muḥammad ʿAbd Allāh ibn Asʿad ibn ʿAlī al-
      Yāfiʿī al-Yamanī al-Shāfiʿī — Yemeni Shāfiʿī Sufi
      muḥaddith, hagiographer, and historian, long resident at
      Mecca, author of *Mirʾāt al-Janān wa-ʿIbrat al-Yaqẓān* (a
      year-by-year world chronicle from the hijra through 750 AH
      that is the principal Sunni Yemeni-Meccan parallel to the
      Damascene-Egyptian *Bidāya* and *Shadharāt* tradition),
      *Rawḍ al-Rayyāḥīn fī Ḥikāyāt al-Ṣāliḥīn* (a celebrated
      compendium of stories of the righteous, widely read across
      the Sunni world for six centuries), and a Sufi *Khulāṣat
      al-Mafākhir* devoted to ʿAbd al-Qādir al-Jīlānī — died at
      Mecca in Jumādā II 768 AH (February 1367 CE), aged about
      70. al-Sakhāwī's *al-Ḍawʾ al-Lāmiʿ* and Ibn Ḥajar's *al-
      Durar al-Kāmina* both treat him as the senior Sunni Sufi
      authority of the Ḥaramayn in his generation.
    description_ar: |
      توفي عفيف الدين أبو محمد عبد الله بن أسعد بن علي اليافعي
      اليماني الشافعي — صوفي يماني شافعي ومحدث ومؤلف تراجم
      ومؤرخ، طال مقامه بمكة، صاحب «مرآة الجنان وعبرة اليقظان»
      (تاريخ سنوي شامل من الهجرة إلى سنة ٧٥٠ هـ يوازي عند أهل
      السنة في اليمن والحرمين كتاب «البداية» و«الشذرات» في الشام
      ومصر)، و«روض الرياحين في حكايات الصالحين» (مجموع شهير
      من أخبار الصالحين قُرئ في العالم السني ست قرون)، وكتاب
      «خلاصة المفاخر» في فضائل عبد القادر الجيلاني — توفي رحمه
      الله بمكة المكرمة في جمادى الآخرة سنة ٧٦٨ هـ (الموافق
      شباط ١٣٦٧ ميلادي) عن نحو سبعين سنة. وقد اعتمده السخاوي
      في «الضوء اللامع» وابن حجر في «الدرر الكامنة» مرجعاً سنياً
      صوفياً للحرمين في جيله.
    description_fr: |
      ʿAfīf al-Dīn Abū Muḥammad ʿAbd Allāh ibn Asʿad ibn ʿAlī al-
      Yāfiʿī al-Yamanī al-Shāfiʿī — soufi shāfiʿīte yéménite,
      muḥaddith, hagiographe et historien, longtemps résident à
      La Mecque, auteur de *Mirʾāt al-Janān wa-ʿIbrat al-Yaqẓān*
      (chronique universelle année par année depuis l'hégire
      jusqu'en 750 H, principal pendant sunnite yéménite-meccois
      de la tradition damascène-égyptienne de la *Bidāya* et des
      *Shadharāt*), de *Rawḍ al-Rayyāḥīn fī Ḥikāyāt al-Ṣāliḥīn*
      (recueil célèbre de récits des pieux, largement lu dans le
      monde sunnite pendant six siècles) et d'un *Khulāṣat al-
      Mafākhir* soufie consacré à ʿAbd al-Qādir al-Jīlānī —
      mourut à La Mecque en Jumādā II 768 H (février 1367 EC),
      âgé d'environ 70 ans. *al-Ḍawʾ al-Lāmiʿ* d'al-Sakhāwī et
      *al-Durar al-Kāmina* d'Ibn Ḥajar le tiennent tous deux
      pour la principale autorité sunnite-soufie des Ḥaramayn de
      sa génération.
