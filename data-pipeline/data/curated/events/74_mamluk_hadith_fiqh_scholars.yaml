        is_canonical: true
        notes: "al-Durar al-Kāmina — Dhū al-Ḥijja 749 AH at Aleppo of plague."
      - source_key: ibn_kathir_bidaya
        notes: "al-Bidāya wa al-Nihāya places death 749 AH at Aleppo of plague."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab corroborates Dhū al-Ḥijja 749 AH."
    people: [[ibn-al-wardi, died]]
