  # =========================================================================
  # 8th CENTURY AH — al-Adhraʿī (783 AH), Aleppine Shāfiʿī
  # =========================================================================

  - slug: death-of-al-adhrai
    category: scholar_death
    title_en: Death of Shihāb al-Dīn al-Adhraʿī — Aleppine Shāfiʿī authority
    title_ar: وفاة شهاب الدين الأذرعي — إمام الشافعية بحلب
    title_fr: Mort de Shihāb al-Dīn al-Adhraʿī — autorité shāfiʿīte d'Alep
    description_en: |
      Shihāb al-Dīn Abū al-ʿAbbās Aḥmad ibn Ḥamdān ibn Aḥmad al-
      Adhraʿī al-Ḥalabī al-Shāfiʿī — Aleppine Shāfiʿī jurist,
      qāḍī, and author of *Qūt al-Muḥtāj fī Sharḥ al-Minhāj* (a
      commentary on al-Nawawī's *Minhāj al-Ṭālibīn*) and *al-
      Tawassuṭ wa-al-Fatḥ bayna al-Rawḍa wa-al-Sharḥ* (a
      mediating commentary between al-Nawawī's *al-Rawḍa* and
      al-Rāfiʿī's *al-Sharḥ al-Kabīr* — the two great late-
      classical Shāfiʿī references) — died at Aleppo in Jumādā
      II 783 AH (September 1381 CE), aged about 75. His
      mediating commentaries became standard Shāfiʿī references
      in Aleppo, Damascus, and Cairo through the ninth and tenth
      centuries AH; al-Subkī's *Ṭabaqāt al-Shāfiʿiyya al-Kubrā*
      praises him as "the imam of the Shāfiʿīs of Aleppo and the
      Syrian frontier." Pupils included al-Sirāj al-Bulqīnī's
      circle in Cairo.
    description_ar: |
      توفي شهاب الدين أبو العباس أحمد بن حمدان بن أحمد الأذرعي
      الحلبي الشافعي — فقيه شافعي حلبي وقاضٍ، وصاحب «قوت المحتاج
      في شرح المنهاج» (شرح على «منهاج الطالبين» للنووي) و«التوسط
      والفتح بين الروضة والشرح» (شرح وسطي بين «روضة الطالبين»
      للنووي و«الشرح الكبير» للرافعي، وهما عمدتا المذهب الشافعي
      في أواخر العصر الكلاسيكي) — توفي رحمه الله بحلب في جمادى
      الآخرة سنة ٧٨٣ هـ (الموافق أيلول ١٣٨١ ميلادي) عن نحو خمس
      وسبعين سنة. وصارت شروحه التوسطية مرجعاً معتمداً عند
      الشافعية بحلب ودمشق والقاهرة في القرنين التاسع والعاشر؛
      ووصفه السبكي في «طبقات الشافعية الكبرى» بأنه «إمام شافعية
      حلب والثغر الشامي». ومن تلامذته من أتى إلى حلقة سراج الدين
      البلقيني بالقاهرة.
    description_fr: |
      Shihāb al-Dīn Abū al-ʿAbbās Aḥmad ibn Ḥamdān ibn Aḥmad al-
      Adhraʿī al-Ḥalabī al-Shāfiʿī — juriste shāfiʿīte d'Alep,
      qāḍī, et auteur de *Qūt al-Muḥtāj fī Sharḥ al-Minhāj*
      (commentaire du *Minhāj al-Ṭālibīn* d'al-Nawawī) et d'*al-
      Tawassuṭ wa-al-Fatḥ bayna al-Rawḍa wa-al-Sharḥ* (commentaire
      médian entre la *Rawḍat al-Ṭālibīn* d'al-Nawawī et le
      *Sharḥ al-Kabīr* d'al-Rāfiʿī — les deux grandes références
      shāfiʿītes tardo-classiques) — mourut à Alep en Jumādā II
      783 H (septembre 1381 EC), âgé d'environ 75 ans. Ses
      commentaires médians devinrent les références standards
      des shāfiʿītes d'Alep, de Damas et du Caire pendant les
      IXᵉ et Xᵉ siècles de l'hégire ; les *Ṭabaqāt al-Shāfiʿiyya
      al-Kubrā* d'al-Subkī le qualifient d'« imam des shāfiʿītes
      d'Alep et de la marche syrienne ». Parmi ses élèves : des
      affiliés du cercle de Sirāj al-Dīn al-Bulqīnī au Caire.
    canonical_hijri: {year: 783, month: 6, precision: month}
    canonical_gregorian: {date: 1381-09-01, precision: month, method: tabular_conversion}
