  # =========================================================================
  # 8th CENTURY AH — al-ʿAlāʾī Ṣalāḥ al-Dīn (761 AH), uṣūlī-muḥaddith
  # =========================================================================

  - slug: death-of-al-alai
    category: scholar_death
    title_en: Death of Ṣalāḥ al-Dīn al-ʿAlāʾī — Shāfiʿī muḥaddith and uṣūlī
    title_ar: وفاة صلاح الدين العلائي — محدث وأصولي شافعي
    title_fr: Mort de Ṣalāḥ al-Dīn al-ʿAlāʾī — muḥaddith et uṣūlī shāfiʿīte
    description_en: |
      Ṣalāḥ al-Dīn Abū Saʿīd Khalīl ibn Kaykaldī ibn ʿAbd Allāh
      al-ʿAlāʾī al-Dimashqī al-Maqdisī al-Shāfiʿī — Damascene-
      Jerusalemite Shāfiʿī muḥaddith, uṣūlī, and shaykh al-ḥadīth
      at the Ṣalāḥiyya madrasa in Jerusalem — died at Jerusalem
      in Muḥarram 761 AH (December 1359 CE), aged about 67. His
      *Jāmiʿ al-Taḥṣīl fī Aḥkām al-Marāsīl* is one of the most
      cited classical Sunni monographs on the science of *mursal*
      (Successor-omitted) hadith and remains a standard reference
      in *muṣṭalaḥ al-ḥadīth* education today; al-Suyūṭī cites it
      throughout *Tadrīb al-Rāwī*. He also composed *al-Fuṣūl
      al-Mufīda fī al-Wāw al-Mazīda* on Qurʾānic syntax,
      *al-Tanbīhāt al-Mujmala ʿalā al-Mawāḍiʿ al-Mushkila* on
      problematic hadiths, *al-Wajīz fī Dhikr al-Majāz wa-al-Ḥaqīqa*
      on usūl al-fiqh, and a substantial commentary on *al-
      Muḥarrar* of Ibn ʿAbd al-Hādī.
    description_ar: |
      توفي صلاح الدين أبو سعيد خليل بن كيكلدي بن عبد الله العلائي
      الدمشقي المقدسي الشافعي — محدث شافعي دمشقي مقدسي وأصولي
      وشيخ الحديث بالمدرسة الصلاحية ببيت المقدس — ببيت المقدس
      في محرم سنة ٧٦١ هـ (الموافق كانون الأول ١٣٥٩ ميلادي) عن
      نحو سبع وستين سنة. وله «جامع التحصيل في أحكام المراسيل»
      وهو من أوسع التأصيلات السنية الكلاسيكية في علم المراسيل
      التابعية، ولا يزال مرجعاً قائماً في تدريس مصطلح الحديث
      إلى يومنا، وقد أحال إليه السيوطي في «تدريب الراوي» إحالات
      كثيرة. وله أيضاً «الفصول المفيدة في الواو المزيدة» في
      نحو القرآن، و«التنبيهات المجملة على المواضع المشكلة» في
      مشكل الحديث، و«الوجيز في ذكر المجاز والحقيقة» في أصول
      الفقه، وشرح كبير على «المحرر» لابن عبد الهادي.
    description_fr: |
      Ṣalāḥ al-Dīn Abū Saʿīd Khalīl ibn Kaykaldī ibn ʿAbd Allāh
      al-ʿAlāʾī al-Dimashqī al-Maqdisī al-Shāfiʿī — muḥaddith
      shāfiʿīte damascène-jérusalémite, uṣūlī et shaykh al-ḥadīth
      à la madrasa al-Ṣalāḥiyya de Jérusalem — mourut à Jérusalem
      en Muḥarram 761 H (décembre 1359 EC), âgé d'environ 67 ans.
      Son *Jāmiʿ al-Taḥṣīl fī Aḥkām al-Marāsīl* est l'une des
      monographies sunnites classiques les plus citées sur la
      science du *mursal* (hadith dont le Successeur a omis le
      Compagnon) et demeure une référence standard de
      l'enseignement du *muṣṭalaḥ al-ḥadīth* ; al-Suyūṭī le cite
      d'un bout à l'autre du *Tadrīb al-Rāwī*. Il composa
      également *al-Fuṣūl al-Mufīda fī al-Wāw al-Mazīda* sur la
      syntaxe coranique, *al-Tanbīhāt al-Mujmala ʿalā al-Mawāḍiʿ
      al-Mushkila* sur les hadiths difficiles, *al-Wajīz fī Dhikr
      al-Majāz wa-al-Ḥaqīqa* sur l'uṣūl al-fiqh, et un commentaire
      substantiel sur *al-Muḥarrar* d'Ibn ʿAbd al-Hādī.
    canonical_hijri: {year: 761, month: 1, precision: month}
    canonical_gregorian: {date: 1359-11-01, precision: month, method: tabular_conversion}
