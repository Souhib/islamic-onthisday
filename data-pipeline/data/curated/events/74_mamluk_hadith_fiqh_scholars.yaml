  # =========================================================================
  # 9th CENTURY AH — al-ʿIrāqī Zayn al-Dīn (806 AH), Cairo *muḥaddith*
  # =========================================================================

  - slug: death-of-zayn-al-din-al-iraqi
    category: scholar_death
    title_en: Death of Zayn al-Dīn al-ʿIrāqī — author of the *Alfiyyat al-ʿIrāqī*
    title_ar: وفاة زين الدين العراقي — صاحب «ألفية العراقي» في مصطلح الحديث
    title_fr: Mort de Zayn al-Dīn al-ʿIrāqī — auteur de l'*Alfiyyat al-ʿIrāqī*
    description_en: |
      Zayn al-Dīn Abū al-Faḍl ʿAbd al-Raḥīm ibn al-Ḥusayn ibn ʿAbd
      al-Raḥmān al-ʿIrāqī al-Mihrānī al-Shāfiʿī — Cairo Shāfiʿī
      muḥaddith, qāḍī, and shaykh al-ḥadīth at the Ḍāhiriyya
      al-Qadīma; the foremost teacher of *muṣṭalaḥ al-ḥadīth* of
      his generation; teacher of Ibn Ḥajar al-ʿAsqalānī and of
      al-Haythamī (who married his daughter); and author of two
      seminal works — the *Alfiyya fī Muṣṭalaḥ al-Ḥadīth* (a
      thousand-verse poem on the science of hadith terminology
      that quickly became the standard madrasa text in *muṣṭalaḥ*,
      with commentaries by his son al-Walī al-ʿIrāqī, al-
      Sakhāwī, and al-Suyūṭī) and *al-Mughnī ʿan Ḥaml al-Asfār
      fī al-Asfār fī Takhrīj mā fī al-Iḥyāʾ min al-Akhbār* (a
      hadith-takhrīj of all narrations cited in al-Ghazālī's
      *Iḥyāʾ ʿUlūm al-Dīn*, the most cited Sunni isnād
      verification of any tasawwuf-classic) — died at Cairo on
      8 Shaʿbān 806 AH (21 February 1404 CE), aged 81. Ibn
      Ḥajar's *al-Durar al-Kāmina* records his teachers, his
      students, and his works in detail; al-Sakhāwī's *al-Ḍawʾ
      al-Lāmiʿ* is a continuation built on the same foundation.
    description_ar: |
      توفي زين الدين أبو الفضل عبد الرحيم بن الحسين بن عبد الرحمن
      العراقي المهراني الشافعي — محدث شافعي بالقاهرة وقاضٍ وشيخ
      الحديث بالظاهرية القديمة، رأس محدثي زمانه في مصطلح الحديث،
      وشيخ ابن حجر العسقلاني والهيثمي (الذي تزوج ابنته)، وصاحب
      عملين مؤسسين — «الألفية في مصطلح الحديث» (منظومة في ألف
      بيت في علم مصطلح الحديث، صارت من فورها متناً معتمداً في
      التدريس بالمدارس، شرحها ابنه ولي الدين والسخاوي والسيوطي)،
      و«المغني عن حمل الأسفار في الأسفار في تخريج ما في الإحياء
      من الأخبار» (تخريج لأحاديث «إحياء علوم الدين» للغزالي وأشهر
      تحقيق سني للأسانيد في كتاب صوفي كلاسيكي) — توفي رحمه الله
      بالقاهرة في الثامن من شعبان سنة ٨٠٦ هـ (الموافق ٢١ شباط
      ١٤٠٤ ميلادي) عن إحدى وثمانين سنة. وقد فصل ابن حجر في
      «الدرر الكامنة» في شيوخه وتلامذته ومصنفاته، وبنى السخاوي
      «الضوء اللامع» على الأساس نفسه.
    description_fr: |
      Zayn al-Dīn Abū al-Faḍl ʿAbd al-Raḥīm ibn al-Ḥusayn ibn ʿAbd
      al-Raḥmān al-ʿIrāqī al-Mihrānī al-Shāfiʿī — muḥaddith
      shāfiʿīte du Caire, qāḍī, et shaykh al-ḥadīth à la
      Ẓāhiriyya al-Qadīma ; principal enseignant de *muṣṭalaḥ al-
      ḥadīth* de sa génération ; maître d'Ibn Ḥajar al-ʿAsqalānī
      et d'al-Haythamī (qui épousa sa fille) ; et auteur de deux
      ouvrages séminaux — l'*Alfiyya fī Muṣṭalaḥ al-Ḥadīth*
      (poème de mille vers sur la science de la terminologie du
      hadith, devenu rapidement le manuel standard de *muṣṭalaḥ*
      en madrasa, avec commentaires par son fils al-Walī al-
      ʿIrāqī, al-Sakhāwī et al-Suyūṭī) et *al-Mughnī ʿan Ḥaml al-
      Asfār fī al-Asfār fī Takhrīj mā fī al-Iḥyāʾ min al-Akhbār*
      (takhrīj de tous les hadiths cités dans l'*Iḥyāʾ ʿUlūm al-
      Dīn* d'al-Ghazālī, la vérification d'isnād sunnite la plus
      citée d'un classique du taṣawwuf) — mourut au Caire le
      8 Shaʿbān 806 H (21 février 1404 EC), âgé de 81 ans.
      *al-Durar al-Kāmina* d'Ibn Ḥajar consigne ses maîtres, ses
      élèves et ses œuvres en détail ; *al-Ḍawʾ al-Lāmiʿ* d'al-
      Sakhāwī est une continuation bâtie sur la même fondation.
    canonical_hijri: {year: 806, month: 8, day: 8, precision: day}
    canonical_gregorian: {date: 1404-02-21, precision: day, method: tabular_conversion}
