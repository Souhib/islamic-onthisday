  # =========================================================================
  # 9th CENTURY AH — al-Haythamī Nūr al-Dīn (807 AH), *zawāʾid* master
  # =========================================================================

  - slug: death-of-nur-al-din-al-haythami
    category: scholar_death
    title_en: Death of Nūr al-Dīn al-Haythamī — author of *Majmaʿ al-Zawāʾid*
    title_ar: وفاة نور الدين الهيثمي — صاحب «مجمع الزوائد ومنبع الفوائد»
    title_fr: Mort de Nūr al-Dīn al-Haythamī — auteur de *Majmaʿ al-Zawāʾid*
    description_en: |
      Nūr al-Dīn Abū al-Ḥasan ʿAlī ibn Abī Bakr ibn Sulaymān al-
      Haythamī al-Qāhirī al-Shāfiʿī — Cairo Shāfiʿī muḥaddith
      and the master of the *zawāʾid* genre (compendia of hadith
      found in one collection but not in another), companion and
      son-in-law of his teacher Zayn al-Dīn al-ʿIrāqī, and author
      of *Majmaʿ al-Zawāʾid wa-Manbaʿ al-Fawāʾid* — the
      foundational ten-volume Sunni compendium of hadiths added
      by Aḥmad's *Musnad*, al-Bazzār's *Musnad*, Abū Yaʿlā's
      *Musnad*, and al-Ṭabarānī's three *Muʿjams* over the Six
      Books — died at Cairo on 19 Ramaḍān 807 AH (21 March
      1405 CE), aged 72. (Note: distinct from Ibn Ḥajar al-
      Haytamī of 974 AH, with whom he is often confused due to
      orthographic similarity.) He also produced eight other
      *zawāʾid* monographs, *Mawārid al-Ẓamʾān ilā Zawāʾid Ibn
      Ḥibbān* (the supplement to Ibn Ḥibbān's Ṣaḥīḥ), and *Bughyat
      al-Bāḥith ʿan Zawāʾid Musnad al-Ḥārith*. His son-in-law
      relationship to al-ʿIrāqī (and his student-teacher
      relationship to Ibn Ḥajar al-ʿAsqalānī, who likewise
      married into al-ʿIrāqī's family) anchored the great Cairo
      hadith-criticism circle of the early ninth century AH.
    description_ar: |
      توفي نور الدين أبو الحسن علي بن أبي بكر بن سليمان الهيثمي
      القاهري الشافعي — محدث قاهري شافعي وإمام علم الزوائد
      (وهي مصنفات في الأحاديث الزائدة عند بعض المصنفين دون بعض)،
      صاحب وصهر شيخه زين الدين العراقي، وصاحب «مجمع الزوائد
      ومنبع الفوائد» — موسوعة الزوائد السنية المؤسِّسة في عشرة
      مجلدات تجمع زيادات «مسند» أحمد و«مسند» البزار و«مسند» أبي
      يعلى و«المعاجم الثلاثة» للطبراني على الكتب الستة — توفي
      رحمه الله بالقاهرة في التاسع عشر من رمضان سنة ٨٠٧ هـ
      (الموافق ٢١ آذار ١٤٠٥ ميلادي) عن اثنتين وسبعين سنة. (تنبيه:
      يتميز عن ابن حجر الهيتمي المتوفى سنة ٩٧٤ هـ، ويختلطان كثيراً
      لتشابه الرسم.) وله أيضاً ثمان مصنفات أخرى في الزوائد، منها
      «موارد الظمآن إلى زوائد ابن حبان» و«بغية الباحث عن زوائد
      مسند الحارث». ومصاهرته للعراقي (مع مصاهرة ابن حجر العسقلاني
      للأسرة نفسها) رسخت حلقة نقد الحديث الكبرى بالقاهرة في أوائل
      القرن التاسع.
    description_fr: |
      Nūr al-Dīn Abū al-Ḥasan ʿAlī ibn Abī Bakr ibn Sulaymān al-
      Haythamī al-Qāhirī al-Shāfiʿī — muḥaddith shāfiʿīte du
      Caire et maître du genre des *zawāʾid* (recueils de
      hadiths attestés dans une collection mais non dans une
      autre), compagnon et gendre de son maître Zayn al-Dīn al-
      ʿIrāqī, et auteur de *Majmaʿ al-Zawāʾid wa-Manbaʿ al-
      Fawāʾid* — la compilation sunnite fondatrice en dix
      volumes des hadiths ajoutés par le *Musnad* d'Aḥmad, le
      *Musnad* d'al-Bazzār, le *Musnad* d'Abū Yaʿlā et les trois
      *Muʿjams* d'al-Ṭabarānī par-delà les Six Livres — mourut
      au Caire le 19 Ramaḍān 807 H (21 mars 1405 EC), âgé de
      72 ans. (À distinguer d'Ibn Ḥajar al-Haytamī mort en 974 H,
      avec lequel il est souvent confondu en raison de la
      similitude orthographique.) Il composa également huit
      autres monographies de *zawāʾid*, *Mawārid al-Ẓamʾān ilā
      Zawāʾid Ibn Ḥibbān* (supplément au Ṣaḥīḥ d'Ibn Ḥibbān) et
      *Bughyat al-Bāḥith ʿan Zawāʾid Musnad al-Ḥārith*. Sa
      relation de gendre à al-ʿIrāqī (avec celle d'Ibn Ḥajar
      al-ʿAsqalānī, qui épousa également une parente de la même
      famille) ancra le grand cercle de critique du hadith du
      Caire au début du IXᵉ siècle de l'hégire.
    canonical_hijri: {year: 807, month: 9, day: 19, precision: day}
    canonical_gregorian: {date: 1405-03-21, precision: day, method: tabular_conversion}
