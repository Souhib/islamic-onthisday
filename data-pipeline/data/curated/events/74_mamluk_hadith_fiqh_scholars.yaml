      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab corroborates 807 AH."
      - source_key: ei2
        notes: "EI2 art. 'al-Haythamī, Nūr al-Dīn' confirms 807 AH and the *Majmaʿ al-Zawāʾid*."
