        is_canonical: true
        notes: "al-Durar al-Kāmina — Jumādā II 783 AH at Aleppo."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab corroborates 783 AH."
      - source_key: ei2
        notes: "EI2 art. 'al-Adhraʿī' confirms 783 AH and surveys *Qūt al-Muḥtāj*."
