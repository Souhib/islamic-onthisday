  # =========================================================================
  # QURʾANIC SCIENCES IN MODERN PUBLISHING
  # =========================================================================

  - slug: death-of-manna-al-qattan
    category: scholar_death
    title_en: Death of Manāʿ al-Qaṭṭān — Author of *Mabāḥith fī ʿUlūm al-Qurʾān*
    title_ar: وفاة الشيخ مناع القطان — صاحب «مباحث في علوم القرآن»
    title_fr: Mort de Manāʿ al-Qaṭṭān — auteur de *Mabāḥith fī ʿUlūm al-Qurʾān*
    description_en: |
      Manāʿ ibn Khalīl al-Qaṭṭān — Egyptian-born Sunni
      scholar of Qurʾanic sciences, graduate of al-Azhar
      and longtime professor at the Islamic University of
      Imām Muḥammad ibn Saʿūd in Riyadh and director of
      its higher institute of judiciary, author of the
      widely circulated reference manual *Mabāḥith fī
      ʿUlūm al-Qurʾān* and *Mabāḥith fī ʿUlūm al-Ḥadīth*
      — died at Riyadh on 25 Rabīʿ al-Awwal 1420 AH
      (9 July 1999 CE) at age 74. He had moved to Saudi
      Arabia in the 1950s and spent the bulk of his
      teaching career at Imām University, where his
      twin manuals on the sciences of the Qurʾan and the
      sciences of hadith became among the most widely
      used Sunni undergraduate textbooks in those
      subjects across the Arab world and translated into
      Turkish, Indonesian, and Malay. He also published
      *Tārīkh al-Tashrīʿ al-Islāmī* and a treatise on
      Islamic legislation in modern legal codification.
    description_ar: |
      توفي الشيخ مناع بن خليل القطان — العالم السني
      المصري الأصل في علوم القرآن، خريج الأزهر وأستاذ
      جامعة الإمام محمد بن سعود الإسلامية بالرياض سنين
      طويلة ومدير المعهد العالي للقضاء فيها، صاحب
      «مباحث في علوم القرآن» و«مباحث في علوم الحديث»
      المتداولين انتشاراً واسعاً — بالرياض يوم
      ٢٥ ربيع الأول سنة ١٤٢٠ هـ (الموافق ٩ جويلية ١٩٩٩
      ميلادي) عن أربع وسبعين سنة. وكان قد انتقل إلى
      المملكة العربية السعودية في خمسينات القرن العشرين
      الميلادي، وأمضى جلّ مسيرته التدريسية بجامعة
      الإمام، وصار كتاباه التوأمان في علوم القرآن
      وعلوم الحديث من أكثر الكتب الجامعية السنية
      تداولاً في تلكم المادتين بالعالم العربي، وتُرجما
      إلى التركية والإندونيسية والملايو. ونشر أيضاً
      «تاريخ التشريع الإسلامي» ورسالة في التقنين
      الإسلامي الحديث.
    description_fr: |
      Manāʿ ibn Khalīl al-Qaṭṭān — savant sunnite né en
      Égypte, spécialiste des sciences coraniques,
      diplômé d'al-Azhar et longtemps professeur à
      l'Université islamique Imām Muḥammad ibn Saʿūd à
      Riyad et directeur de son institut supérieur de la
      magistrature, auteur du manuel de référence
      largement diffusé *Mabāḥith fī ʿUlūm al-Qurʾān*
      et de *Mabāḥith fī ʿUlūm al-Ḥadīth* — mourut à
      Riyad le 25 Rabīʿ al-Awwal 1420 H (9 juillet
      1999 EC) à l'âge de 74 ans. Il s'était installé
      en Arabie saoudite dans les années 1950 et passa
      l'essentiel de sa carrière d'enseignement à
      l'Université Imām, où ses deux manuels jumeaux sur
      les sciences du Coran et les sciences du hadith
      devinrent parmi les manuels universitaires
      sunnites les plus largement utilisés dans ces
      matières à travers le monde arabe et furent
      traduits en turc, indonésien et malais. Il publia
      également *Tārīkh al-Tashrīʿ al-Islāmī* et un
      traité sur la législation islamique dans la
      codification juridique moderne.
