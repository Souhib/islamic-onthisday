  - slug: death-of-ashraf-ali-thanwi
    category: scholar_death
    title_en: Death of Ashraf ʿAlī Thānwī — Indian Deobandī Reformer
    title_ar: وفاة الإمام أشرف علي التهانوي — المصلح الديوبندي الهندي
    title_fr: Mort de Ashraf ʿAlī Thānwī — réformateur déobandī indien
    description_en: |
      Ashraf ʿAlī Thānwī — South Asian Sunni Hanafī
      jurist, Sufi master, and prolific writer of the
      Deobandī school, longtime resident at Thana
      Bhawan in north India — died at Thana Bhawan
      on 16 Rajab 1362 AH (corresponding to 19-20
      July 1943 CE) at age 80. Born in 1280 AH
      (1863 CE), he graduated from Dār al-ʿUlūm
      Deoband in 1301 AH (1883 CE), taught for
      fourteen years at the Madrasa Jāmiʿ al-ʿUlūm of
      Kanpur, and from 1315 AH (1897 CE) settled at
      Thana Bhawan as the principal spiritual master of
      the Imdadiyya Chishtī Sufi line. His Urdu
      collected works run to several hundred volumes
      and include *Bayān al-Qurʾān* (a multi-volume
      Urdu Qurʾanic exegesis), *Bahishtī Zēwar* (a
      celebrated handbook of Hanafī fiqh for women),
      *Imdād al-Fatāwā*, *al-Iqtiṣād fī al-Taqlīd
      wa-l-Ijtihād*, and the *Maktūbāt-i Ḥakīm al-
      Ummat*. The honorific *Ḥakīm al-Ummat*
      ("physician of the community") accompanied him
      across his late career. He shaped the
      twentieth-century South Asian Deobandī
      scholarly and Sufi tradition more directly than
      any single contemporary, and his disciples
      included Mufti Muḥammad Shafīʿ ʿUthmānī and
      Muḥammad Idrīs Kāndhalawī.
    description_ar: |
      توفي الإمام أشرف علي التهانوي — الفقيه السني
      الحنفي والشيخ الصوفي والمصنف المكثر من علماء
      ديوبند بشبه القارة الهندية، المقيم بثانه بهون
      شمال الهند سنين طويلة — بثانه بهون يوم ١٦ رجب
      سنة ١٣٦٢ هـ (الموافق ١٩-٢٠ جويلية ١٩٤٣
      ميلادي) عن ثمانين سنة. ولد سنة ١٢٨٠ هـ
      (الموافق ١٨٦٣ ميلادي)، وتخرج من دار العلوم
      ديوبند سنة ١٣٠١ هـ (١٨٨٣ ميلادي)، ودرّس أربع
      عشرة سنة بمدرسة جامع العلوم بكانبور، ثم استقر
      منذ سنة ١٣١٥ هـ (١٨٩٧ ميلادي) بثانه بهون
      شيخاً للطريقة الإمدادية الجشتية الصوفية. وآثاره
      الأردية المجموعة في عدة مئات من المجلدات،
      منها: «بيان القرآن» تفسير القرآن الكريم
      بالأردية في عدة مجلدات، و«بهشتي زيور» وهو
      الدليل الفقهي الشهير للنساء على المذهب
      الحنفي، و«إمداد الفتاوى»، و«الاقتصاد في
      التقليد والاجتهاد»، و«مكتوبات حكيم الأمت».
      ولُقّب «حكيم الأمة» في أواخر سيرته العلمية.
      وقد صاغ تراث ديوبند العلمي والصوفي بشبه القارة
      في القرن العشرين الميلادي تأثيراً مباشراً لا
      يبلغه فيه أحد من معاصريه، ومن تلامذته المفتي
      محمد شفيع العثماني والمولانا محمد إدريس
      الكاندهلوي.
    description_fr: |
      Ashraf ʿAlī Thānwī — juriste sunnite hanafite
      sud-asiatique, maître soufi et écrivain
      prolifique de l'école déobandī, longtemps
      résident à Thana Bhawan dans l'Inde du Nord —
      mourut à Thana Bhawan le 16 Rajab 1362 H
      (correspondant aux 19-20 juillet 1943 EC) à
      l'âge de 80 ans. Né en 1280 H (1863 EC), il
      fut diplômé de Dār al-ʿUlūm Deoband en 1301 H
      (1883 EC), enseigna pendant quatorze ans à la
      Madrasa Jāmiʿ al-ʿUlūm de Kanpur, et à partir
      de 1315 H (1897 EC) s'installa à Thana Bhawan
      comme principal maître spirituel de la voie
      soufie chishtī Imdādiyya. Ses œuvres complètes
      en ourdou s'élèvent à plusieurs centaines de
      volumes et comprennent *Bayān al-Qurʾān* (une
      exégèse coranique en ourdou en plusieurs
      volumes), *Bahishtī Zēwar* (un célèbre manuel
      de fiqh hanafite pour les femmes), *Imdād al-
      Fatāwā*, *al-Iqtiṣād fī al-Taqlīd wa-l-Ijtihād*
      et les *Maktūbāt-i Ḥakīm al-Ummat*. Le titre
      honorifique *Ḥakīm al-Ummat* (« médecin de la
      communauté ») l'accompagna durant la fin de sa
      carrière. Il façonna la tradition savante et
      soufie déobandī sud-asiatique du XXe siècle plus
      directement qu'aucun contemporain, et parmi ses
      disciples figurèrent Muftī Muḥammad Shafīʿ
      ʿUthmānī et Muḥammad Idrīs Kāndhalawī.
