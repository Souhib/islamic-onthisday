  - slug: death-of-muhammad-idris-kandhalawi
    category: scholar_death
    title_en: Death of Mawlānā Muḥammad Idrīs Kāndhalawī — Pakistani Deobandī Muḥaddith
    title_ar: وفاة المولانا محمد إدريس الكاندهلوي — المحدث الديوبندي الباكستاني
    title_fr: Mort de Mawlānā Muḥammad Idrīs Kāndhalawī — muḥaddith déobandī pakistanais
    description_en: |
      Muḥammad Idrīs Kāndhalawī — South Asian Sunni
      Hanafī muḥaddith of the Deobandī school, born at
      Kandhla (north India) in 1316 AH (1899 CE),
      educated at the Maẓāhir al-ʿUlūm seminary at
      Saharanpur and at Dār al-ʿUlūm Deoband, and
      longtime professor of hadith at the Jāmiʿa
      Ashrafiyya seminary in Lahore (founded 1947) —
      died at Lahore in 1394 AH (July 1974 CE) at age
      75. He was a senior disciple of Ashraf ʿAlī
      Thānwī and a relative of the Kāndhalawī scholarly
      family of the Tablīghī Jamāʿat. His Urdu and
      Arabic works on hadith and fiqh include the eight-
      volume Urdu commentary on al-Bukhārī *al-Tʿalīq al-
      Ṣabīh ʿalā Mishkāt al-Maṣābīḥ* (in some editions),
      his commentary on Riyāḍ al-Ṣāliḥīn, and a sīra
      compendium *Sīrat al-Muṣṭafā ﷺ* in three volumes
      that became one of the standard Urdu sīra
      references in twentieth-century Pakistani Deobandī
      seminaries. He trained generations of Hanafī
      scholars in the post-partition South Asian
      Sunni hadith tradition.
    description_ar: |
      توفي المولانا محمد إدريس الكاندهلوي — المحدث
      السني الحنفي الديوبندي من شبه القارة الهندية،
      المولود بكاندهلة شمال الهند سنة ١٣١٦ هـ
      (الموافق ١٨٩٩ ميلادي)، الذي تلقى العلم
      بمظاهر العلوم بسهارنبور وبدار العلوم ديوبند،
      وأستاذ الحديث في الجامعة الأشرفية بلاهور
      (المؤسسة سنة ١٣٦٦ هـ / ١٩٤٧ ميلادي) سنين طويلة
      — بلاهور سنة ١٣٩٤ هـ (في جويلية ١٩٧٤ ميلادي)
      عن خمس وسبعين سنة. وكان من كبار تلامذة الإمام
      أشرف علي التهانوي، ومن أسرة الكاندهلويين
      العلمية ذات الصلة بجماعة التبليغ. ومن مؤلفاته
      بالأردية والعربية في الحديث والفقه: شرح
      «مشكاة المصابيح» في ثمانية مجلدات (في بعض
      الطبعات)، وشرحه لـ«رياض الصالحين»، و«سيرة
      المصطفى ﷺ» في ثلاثة مجلدات، الذي صار من
      المراجع السيرية الأردية المعتمدة في المعاهد
      الديوبندية الباكستانية بالقرن العشرين الميلادي.
      وقد ربى أجيالاً من العلماء السنيين الأحناف في
      تراث الحديث السني بشبه القارة بعد التقسيم.
    description_fr: |
      Muḥammad Idrīs Kāndhalawī — muḥaddith sunnite
      hanafite sud-asiatique de l'école déobandī, né à
      Kandhla (Inde du Nord) en 1316 H (1899 EC),
      formé au séminaire Maẓāhir al-ʿUlūm de Saharanpur
      et à Dār al-ʿUlūm Deoband, et longtemps
      professeur de hadith au séminaire Jāmiʿa
      Ashrafiyya de Lahore (fondé en 1947) — mourut à
      Lahore en 1394 H (juillet 1974 EC) à l'âge de
      75 ans. Il fut un disciple senior d'Ashraf ʿAlī
      Thānwī et un membre de la famille savante
      Kāndhalawī liée à la Tablīghī Jamāʿat. Ses
      œuvres en ourdou et en arabe sur le hadith et
      le fiqh comprennent un commentaire en huit
      volumes du *Mishkāt al-Maṣābīḥ* (dans certaines
      éditions), son commentaire de *Riyāḍ al-Ṣāliḥīn*
      et un compendium de sīra *Sīrat al-Muṣṭafā ﷺ*
      en trois volumes, devenu l'une des références
      sīra ourdoues standard dans les séminaires
      déobandīs pakistanais du XXe siècle. Il forma
      des générations de savants hanafites dans la
      tradition sud-asiatique du hadith sunnite
      d'après la partition.
