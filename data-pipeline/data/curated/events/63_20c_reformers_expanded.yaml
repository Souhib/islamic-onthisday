  # USUL AND CONTEMPORARY SUNNI THOUGHT
  # =========================================================================

  - slug: death-of-taha-jabir-al-alwani
    category: scholar_death
    title_en: Death of Ṭāhā Jābir al-ʿAlwānī — Iraqi-American Uṣūl Scholar
    title_ar: وفاة طه جابر العلواني — العالم العراقي الأمريكي في أصول الفقه
    title_fr: Mort de Ṭāhā Jābir al-ʿAlwānī — savant uṣūl irako-américain
    description_en: |
      Ṭāhā Jābir al-ʿAlwānī — Iraqi-born Sunni Shāfiʿī
      jurist and uṣūl scholar, doctor of *uṣūl al-fiqh*
      from al-Azhar (1973), founding president of the
      International Institute of Islamic Thought in
      Herndon, Virginia (from 1981) and of the Fiqh
      Council of North America, and longtime president
      of the Cordoba University graduate institute in the
      United States — died at Cairo on 24 Jumādā al-Ūlā
      1437 AH (4 March 2016 CE) at age 80. He had been a
      member of the OIC International Islamic Fiqh
      Academy in Jeddah and a leading voice in the
      Anglophone discourse on contemporary uṣūl, *fiqh
      al-aqalliyyāt* (jurisprudence for Muslim
      minorities), and the *maqāṣid* tradition. His
      writings include *Uṣūl al-Fiqh al-Islāmī*,
      *Adab al-Ikhtilāf fī al-Islām*, *Madkhal ilā Fiqh
      al-Aqalliyyāt*, and a Qurʾanic-sciences treatise on
      the unity of the Qurʾan, several of which appear
      in English translation.
    description_ar: |
      توفي العلامة طه جابر العلواني — الفقيه السني
      الشافعي العراقي الأصل، الحاصل على دكتوراه في أصول
      الفقه من الأزهر الشريف سنة ١٣٩٣ هـ (١٩٧٣ ميلادي)،
      الرئيس المؤسس للمعهد العالمي للفكر الإسلامي
      بهيرندون بفرجينيا منذ سنة ١٤٠١ هـ (١٩٨١ ميلادي)،
      وللمجمع الفقهي بأمريكا الشمالية، ورئيس جامعة
      قرطبة العليا بالولايات المتحدة سنين طويلة —
      بالقاهرة يوم ٢٤ جمادى الأولى سنة ١٤٣٧ هـ (الموافق
      ٤ مارس ٢٠١٦ ميلادي) عن ثمانين سنة. وكان عضواً
      بمجمع الفقه الإسلامي الدولي بجدة التابع لمنظمة
      التعاون الإسلامي، ومن أبرز أصوات الفقه الإسلامي
      المعاصر باللغة الإنجليزية في «فقه الأقليات»
      ومقاصد الشريعة. ومن مؤلفاته: «أصول الفقه
      الإسلامي» و«أدب الاختلاف في الإسلام» و«مدخل إلى
      فقه الأقليات» ورسالة في علوم القرآن في وحدة
      الكتاب العزيز. وعدد منها مترجم إلى الإنجليزية.
    description_fr: |
      Ṭāhā Jābir al-ʿAlwānī — juriste et savant en
      *uṣūl al-fiqh* sunnite shāfiʿite né en Iraq,
      docteur en *uṣūl al-fiqh* d'al-Azhar (1973),
      président fondateur de l'International Institute
      of Islamic Thought à Herndon en Virginie (à partir
      de 1981) et du Fiqh Council of North America, et
      longtemps président de l'institut supérieur de la
      Cordoba University aux États-Unis — mourut au
      Caire le 24 Jumādā al-Ūlā 1437 H (4 mars 2016 EC)
      à l'âge de 80 ans. Il fut membre de l'Académie
      internationale du fiqh islamique de l'OCI à Jeddah
      et l'une des principales voix du discours
      anglophone sur l'*uṣūl* contemporain, le *fiqh al-
      aqalliyyāt* (jurisprudence pour les minorités
      musulmanes) et la tradition des *maqāṣid*. Ses
      écrits comprennent *Uṣūl al-Fiqh al-Islāmī*,
      *Adab al-Ikhtilāf fī al-Islām*, *Madkhal ilā
      Fiqh al-Aqalliyyāt* et un traité de sciences
      coraniques sur l'unité du Coran, dont plusieurs
      paraissent en traduction anglaise.
    canonical_hijri: {year: 1437, month: 5, day: 24, precision: day}
    canonical_gregorian: {date: 2016-03-04, precision: day, method: attested}
