  - slug: death-of-hasan-al-hudaybi
    category: scholar_death
    title_en: Death of Ḥasan al-Huḍaybī — Second General Guide of the Egyptian Muslim Brotherhood
    title_ar: وفاة حسن الهضيبي — المرشد العام الثاني للإخوان المسلمين بمصر
    title_fr: Mort de Ḥasan al-Huḍaybī — second Guide général des Frères musulmans égyptiens
    description_en: |
      Ḥasan Ismāʿīl al-Huḍaybī — Egyptian Sunni jurist and
      former counsellor at the Egyptian Court of Cassation,
      second General Guide (*al-Murshid al-ʿĀmm*) of the
      Society of the Muslim Brotherhood from October 1951
      until his death — died at Cairo on 15 Shawwāl 1393 AH
      (11 November 1973 CE) at age 82. He had succeeded the
      assassinated Ḥasan al-Bannā at the head of the
      organisation, was arrested and tried in the Brotherhood
      crackdowns of 1954 and again in 1965, and remained in
      detention or under house arrest for much of the next
      decade. His treatise *Duʿāh lā Quḍāh* ("Preachers, not
      Judges"), compiled in the late 1960s under his name and
      published in 1977, articulates an explicit Brotherhood
      Sunni juristic refutation of the takfīrī positions
      associated with the Quṭbist current within the Egyptian
      prison camps, and remains a primary text for the
      organisation's mainstream theological self-understanding.
    description_ar: |
      توفي الأستاذ حسن إسماعيل الهضيبي — الفقيه السني المصري
      والمستشار السابق بمحكمة النقض، والمرشد العام الثاني
      لجماعة الإخوان المسلمين منذ ذي الحجة سنة ١٣٧٠ هـ
      (أكتوبر ١٩٥١ ميلادي) إلى وفاته — بالقاهرة يوم ١٥ شوال
      سنة ١٣٩٣ هـ (الموافق ١١ نوفمبر ١٩٧٣ ميلادي) عن اثنتين
      وثمانين سنة. خلف الإمام حسن البنا في رئاسة الجماعة بعد
      اغتياله، واعتُقل وحوكم في حملتي القمع سنة ١٣٧٣ هـ
      (١٩٥٤ ميلادي) وسنة ١٣٨٥ هـ (١٩٦٥ ميلادي) ثم استمر في
      السجن أو الإقامة الجبرية معظم العقد التالي. وكتابه
      «دعاة لا قضاة» الذي جُمع باسمه أواخر ستينات القرن
      العشرين الميلادي ونُشر سنة ١٣٩٧ هـ (١٩٧٧ ميلادي)
      تأصيل فقهي سني صريح لرفض مواقف التكفير المنسوبة إلى
      تيار قطبي داخل المعسكرات المصرية، وما يزال نصاً
      تأسيسياً للفهم اللاهوتي السائد في الجماعة.
    description_fr: |
      Ḥasan Ismāʿīl al-Huḍaybī — juriste sunnite égyptien et
      ancien conseiller à la Cour de cassation égyptienne,
      second Guide général (*al-Murshid al-ʿĀmm*) de la
      Société des Frères musulmans d'octobre 1951 jusqu'à sa
      mort — mourut au Caire le 15 Shawwāl 1393 H
      (11 novembre 1973 EC) à l'âge de 82 ans. Il avait
      succédé à Ḥasan al-Bannā assassiné à la tête de
      l'organisation, fut arrêté et jugé lors des répressions
      des Frères en 1954 et de nouveau en 1965, et demeura
      en détention ou en résidence surveillée pendant la
      majeure partie de la décennie suivante. Son traité
      *Duʿāh lā Quḍāh* (« Prédicateurs, non juges »),
      compilé sous son nom à la fin des années 1960 et
      publié en 1977, articule une réfutation juridique
      sunnite explicite des positions takfīrites associées
      au courant quṭbiste dans les camps de prison égyptiens,
      et demeure un texte primaire pour
      l'auto-compréhension théologique mainstream de
      l'organisation.
    canonical_hijri: {year: 1393, month: 10, day: 15, precision: day}
    canonical_gregorian: {date: 1973-11-11, precision: day, method: attested}
