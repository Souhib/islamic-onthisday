  # PAKISTANI DEOBANDĪ SCHOLARSHIP
  # =========================================================================

  - slug: death-of-mufti-muhammad-shafi-uthmani
    category: scholar_death
    title_en: Death of Muftī Muḥammad Shafīʿ ʿUthmānī — First Grand Muftī of Pakistan
    title_ar: وفاة المفتي محمد شفيع العثماني — أول مفتي عام لباكستان
    title_fr: Mort du Muftī Muḥammad Shafīʿ ʿUthmānī — premier Grand Muftī du Pakistan
    description_en: |
      Muftī Muḥammad Shafīʿ ʿUthmānī — South Asian
      Sunni Hanafī jurist of the Deobandī school,
      formerly *muftī aʿẓam* of the Dār al-ʿUlūm
      Deoband in pre-partition India, founding patron
      of the Dār al-ʿUlūm of Karachi (1951), and the
      first Grand Muftī of Pakistan after independence
      — died at Karachi on 12 Shawwāl 1396 AH
      (6 October 1976 CE) at age 79. He was a student
      of Ashraf ʿAlī Thānwī and the father of the
      contemporary jurists Muftī Muḥammad Taqī ʿUthmānī
      and Muftī Muḥammad Rafīʿ ʿUthmānī. His major
      work is the eight-volume Urdu Qurʾanic exegesis
      *Maʿārif al-Qurʾān*, drafted from the late
      1960s, in which Hanafī fiqh, classical Sunni
      tafsīr, and contemporary moral and legal questions
      are integrated; an English translation appeared
      from 1995. His fatwas on Pakistan's early
      constitutional and Islamic-finance debates shaped
      the Deobandī jurisprudential voice in the new
      republic, and his Karachi seminary continued to
      train Sunni Hanafī scholars from across the
      subcontinent and the diaspora after his death.
    description_ar: |
      توفي المفتي محمد شفيع العثماني — الفقيه السني
      الحنفي على مذهب أهل ديوبند بشبه القارة الهندية،
      مفتي عام دار العلوم ديوبند بالهند قبل التقسيم،
      مؤسس راعي دار العلوم بكراتشي سنة ١٣٧٠ هـ (١٩٥١
      ميلادي)، وأول مفتي عام لباكستان بعد الاستقلال —
      بكراتشي يوم ١٢ شوال سنة ١٣٩٦ هـ (الموافق
      ٦ أكتوبر ١٩٧٦ ميلادي) عن تسع وسبعين سنة. وكان
      من تلامذة الإمام أشرف علي التهانوي، وهو والد
      الفقيهين المعاصرين المفتي محمد تقي العثماني
      والمفتي محمد رفيع العثماني. وأكبر مؤلفاته
      «معارف القرآن» تفسير القرآن الكريم بالأردية في
      ثمانية مجلدات شرع فيه أواخر ستينات القرن
      العشرين الميلادي يجمع فيه بين الفقه الحنفي
      والتفسير السني الكلاسيكي والقضايا الأخلاقية
      والقانونية المعاصرة، وقد ترجم إلى الإنجليزية
      منذ سنة ١٤١٥ هـ (١٩٩٥ ميلادي). وفتاويه في
      المسائل الدستورية الأولى لباكستان والمالية
      الإسلامية صاغت الصوت الفقهي الديوبندي في
      الجمهورية الجديدة، وما تزال جامعته بكراتشي
      تربي العلماء السنيين الأحناف من شبه القارة
      والمهاجر بعد وفاته.
    description_fr: |
      Muftī Muḥammad Shafīʿ ʿUthmānī — juriste sunnite
      hanafite sud-asiatique de l'école déobandī,
      ancien *muftī aʿẓam* de Dār al-ʿUlūm Deoband
      dans l'Inde pré-partition, patron fondateur du
      Dār al-ʿUlūm de Karachi (1951) et premier Grand
      Muftī du Pakistan après l'indépendance — mourut
      à Karachi le 12 Shawwāl 1396 H (6 octobre 1976
      EC) à l'âge de 79 ans. Il fut élève d'Ashraf
      ʿAlī Thānwī et est le père des juristes
      contemporains Muftī Muḥammad Taqī ʿUthmānī et
      Muftī Muḥammad Rafīʿ ʿUthmānī. Son œuvre
      majeure est l'exégèse coranique en ourdou en
      huit volumes *Maʿārif al-Qurʾān*, rédigée à
      partir de la fin des années 1960, dans laquelle
      sont intégrés le fiqh hanafite, le tafsīr
      sunnite classique et les questions morales et
      juridiques contemporaines; une traduction
      anglaise parut à partir de 1995. Ses fatwas sur
      les débats constitutionnels et de finance
      islamique des premières années du Pakistan
      façonnèrent la voix juridique déobandī dans la
      nouvelle république, et son séminaire de
      Karachi continua à former des savants sunnites
      hanafites venant de tout le sous-continent et
      de la diaspora après sa mort.
    canonical_hijri: {year: 1396, month: 10, day: 12, precision: day}
    canonical_gregorian: {date: 1976-10-06, precision: day, method: attested}
