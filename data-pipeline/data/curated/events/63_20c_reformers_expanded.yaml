  - slug: death-of-abu-al-ala-al-mawdudi
    category: scholar_death
    title_en: Death of Abū al-Aʿlā al-Mawdūdī — Founder of Jamāʿat-i Islāmī
    title_ar: وفاة أبي الأعلى المودودي — مؤسس الجماعة الإسلامية
    title_fr: Mort d'Abū al-Aʿlā al-Mawdūdī — fondateur de la Jamāʿat-i Islāmī
    description_en: |
      Abū al-Aʿlā al-Mawdūdī — South Asian Sunni Hanafī
      scholar, journalist, and political thinker, founder of
      Jamāʿat-i Islāmī (1941) and one of the most influential
      twentieth-century South Asian Islamic-revivalist
      intellectuals — died at Buffalo, New York on
      1 Dhū al-Qaʿda 1399 AH (22 September 1979 CE) at age 75
      while undergoing medical treatment for kidney disease,
      and was buried in his home at Ichhra in Lahore. Largely
      self-trained after a classical Indo-Persian Islamic
      education, he was editor of *Tarjumān al-Qurʾān* from
      1932 onward, founded Jamāʿat-i Islāmī in Lahore on the
      eve of partition, and led the organisation until 1972.
      His writings — the six-volume Urdu Qurʾanic exegesis
      *Tafhīm al-Qurʾān*, *al-Khilāfa wa-l-Mulk*, *Iʿādat-i
      Niẓām-i Khilāfat*, and *Khuṭbāt* — circulate widely
      in Urdu, Arabic, English, Persian, Turkish, and
      Indonesian, and shaped the political vocabulary of
      twentieth-century Sunni revivalism in the
      subcontinent and beyond. He was awarded the inaugural
      King Faisal International Prize for Service to Islam
      in 1979, months before his death.
    description_ar: |
      توفي العلامة أبو الأعلى المودودي — العالم السني
      الحنفي وصحفي ومفكر سياسي من شبه القارة الهندية،
      مؤسس «الجماعة الإسلامية» سنة ١٣٦٠ هـ (١٩٤١ ميلادي)
      وأحد أبرز رواد الإحياء الإسلامي السني في شبه القارة
      في القرن العشرين الميلادي — بمدينة بوفالو بولاية
      نيويورك يوم غرة ذي القعدة سنة ١٣٩٩ هـ (الموافق
      ٢٢ سبتمبر ١٩٧٩ ميلادي) عن خمس وسبعين سنة في رحلة
      علاجية من داء الكلى، ودفن بداره بحي إيتشهرا في
      لاهور. وكان قد تكوّن غالباً تكويناً ذاتياً بعد
      تربية إسلامية هندية فارسية كلاسيكية، وتولى تحرير
      مجلة «ترجمان القرآن» منذ سنة ١٣٥١ هـ (١٩٣٢ ميلادي)،
      وأسس «الجماعة الإسلامية» بلاهور عشية تقسيم الهند،
      وقاد الجماعة إلى سنة ١٣٩٢ هـ (١٩٧٢ ميلادي).
      ومؤلفاته: تفسير القرآن الكريم بالأردية في ستة
      مجلدات «تفهيم القرآن»، و«الخلافة والملك»، و«إعادة
      نظام الخلافة»، و«الخطبات» منتشرة بالأردية والعربية
      والإنجليزية والفارسية والتركية والإندونيسية، وقد
      صاغت اللغة السياسية للإحياء الإسلامي السني في
      القرن العشرين بشبه القارة وما وراءها. ومُنح جائزة
      الملك فيصل العالمية لخدمة الإسلام في دورتها الأولى
      سنة ١٣٩٩ هـ (١٩٧٩ ميلادي) قبل وفاته بأشهر.
    description_fr: |
      Abū al-Aʿlā al-Mawdūdī — savant sunnite hanafite
      sud-asiatique, journaliste et penseur politique,
      fondateur de la Jamāʿat-i Islāmī (1941) et l'un des
      intellectuels révivalistes islamiques sud-asiatiques
      les plus influents du XXe siècle — mourut à Buffalo,
      New York, le 1 Dhū al-Qaʿda 1399 H (22 septembre
      1979 EC) à l'âge de 75 ans alors qu'il y suivait un
      traitement médical pour insuffisance rénale, et fut
      enterré à son domicile d'Ichhra à Lahore. Largement
      autodidacte après une éducation islamique indo-persane
      classique, il dirigea la rédaction de *Tarjumān al-
      Qurʾān* à partir de 1932, fonda la Jamāʿat-i Islāmī à
      Lahore à la veille de la partition, et dirigea
      l'organisation jusqu'en 1972. Ses écrits — l'exégèse
      coranique en six volumes en ourdou *Tafhīm al-
      Qurʾān*, *al-Khilāfa wa-l-Mulk*, *Iʿādat-i Niẓām-i
      Khilāfat* et *Khuṭbāt* — circulent largement en
      ourdou, arabe, anglais, persan, turc et indonésien,
      et façonnèrent le vocabulaire politique du
      révivalisme sunnite sud-asiatique du XXe siècle et
      au-delà. Il reçut le premier Prix international du
      roi Fayṣal pour le service de l'Islam en 1979,
      quelques mois avant sa mort.
    canonical_hijri: {year: 1399, month: 11, day: 1, precision: day}
    canonical_gregorian: {date: 1979-09-22, precision: day, method: attested}
