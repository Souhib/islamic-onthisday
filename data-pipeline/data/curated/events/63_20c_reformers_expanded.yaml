  - slug: death-of-said-ramadan-al-buti
    category: scholar_death
    title_en: Killing of Muḥammad Saʿīd Ramaḍān al-Būṭī — Damascene Ashʿarī-Shāfiʿī Scholar
    title_ar: مقتل العلامة محمد سعيد رمضان البوطي — العالم الدمشقي الأشعري الشافعي
    title_fr: Mort de Muḥammad Saʿīd Ramaḍān al-Būṭī — savant ashʿarite-shāfiʿite damascène
    description_en: |
      Muḥammad Saʿīd Ramaḍān al-Būṭī — Syrian Sunni
      Ashʿarī-Shāfiʿī jurist of Kurdish origin, longtime
      professor and dean of the College of Sharīʿa at
      Damascus University, author of *Fiqh al-Sīra al-
      Nabawiyya*, *Kubrā al-Yaqīniyyāt al-Kawniyya*, and
      *al-Lā-Madhhabiyya akhtar Bidʿa Tuhaddid al-
      Sharīʿa al-Islāmiyya* — was killed alongside
      forty-two others, including his grandson, when a
      bomb exploded during his evening Qurʾan-tafsīr
      lesson at the al-Īmān Mosque in the al-Mazraʿa
      district of Damascus on 9 Jumādā al-Ūlā 1434 AH
      (21 March 2013 CE) during the Syrian war. He was
      84. Trained at al-Azhar, he taught for over fifty
      years at Damascus and held the chair of *ʿaqīda*
      and comparative *fiqh*. He was widely cited across
      the Sunni Arabic-speaking world as one of the
      foremost contemporary expositors of mainstream
      Ashʿarī theology and Shāfiʿī fiqh, and authored
      more than sixty works in the religious sciences.
      The bombing was condemned across the Sunni Muslim
      world; responsibility was disputed and remains
      formally unattributed.
    description_ar: |
      قُتل العلامة محمد سعيد رمضان البوطي — الفقيه السني
      السوري الأشعري الشافعي ذو الأصل الكردي، أستاذ
      وعميد كلية الشريعة بجامعة دمشق سنين طويلة، صاحب
      «فقه السيرة النبوية» و«كبرى اليقينيات الكونية»
      و«اللامذهبية أخطر بدعة تهدد الشريعة الإسلامية» —
      مع اثنين وأربعين آخرين منهم حفيده عند انفجار قنبلة
      في درس التفسير المسائي بمسجد الإيمان بحي المزرعة
      بدمشق يوم ٩ جمادى الأولى سنة ١٤٣٤ هـ (الموافق
      ٢١ مارس ٢٠١٣ ميلادي) في الحرب السورية. وقد ناهز
      الرابعة والثمانين. تخرج من الأزهر، ودرّس بجامعة
      دمشق ما يزيد على نصف قرن، وتقلد كرسي العقيدة
      والفقه المقارن. وعدّه الناطقون بالعربية في العالم
      السني من أكبر شارحي العقيدة الأشعرية والفقه
      الشافعي في عصره، وله أكثر من ستين مصنفاً في
      العلوم الشرعية. وقد استنكر العالم السني تفجير
      المسجد، ولم يُعرف بشكل رسمي من نفّذه إلى الآن.
    description_fr: |
      Muḥammad Saʿīd Ramaḍān al-Būṭī — juriste sunnite
      ashʿarite-shāfiʿite syrien d'origine kurde,
      longtemps professeur et doyen de la Faculté de
      Sharīʿa de l'Université de Damas, auteur de *Fiqh
      al-Sīra al-Nabawiyya*, *Kubrā al-Yaqīniyyāt al-
      Kawniyya* et *al-Lā-Madhhabiyya akhtar Bidʿa
      Tuhaddid al-Sharīʿa al-Islāmiyya* — fut tué avec
      quarante-deux autres personnes, dont son
      petit-fils, lors de l'explosion d'une bombe pendant
      sa leçon de tafsīr coranique à la mosquée al-Īmān
      du quartier al-Mazraʿa à Damas, le 9 Jumādā al-
      Ūlā 1434 H (21 mars 2013 EC), durant la guerre
      syrienne. Il avait 84 ans. Formé à al-Azhar, il
      enseigna pendant plus de cinquante ans à Damas et
      occupa la chaire de *ʿaqīda* et de *fiqh* comparé.
      Il fut largement cité dans le monde arabe sunnite
      comme l'un des plus éminents exposants
      contemporains de la théologie ashʿarite mainstream
      et du fiqh shāfiʿite, et rédigea plus de soixante
      ouvrages dans les sciences religieuses. L'attentat
      fut condamné à travers le monde musulman sunnite;
      la responsabilité fut contestée et demeure
      formellement non attribuée.
    canonical_hijri: {year: 1434, month: 5, day: 9, precision: day}
    canonical_gregorian: {date: 2013-03-21, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Modern academic references record death by mosque bombing in Damascus on 21 March 2013."
      - source_key: editorial
        notes: "Damascus University career and authored corpus of over sixty volumes attested in standard biographies."
