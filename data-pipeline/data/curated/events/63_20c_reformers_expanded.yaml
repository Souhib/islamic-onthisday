# Wave 28b of curated event additions (2026-04-27).
# Twentieth-century Sunni intellectual figures and reformers not yet covered
# by the dataset. Ten figures spanning the Egyptian Brotherhood ideologues
# (Quṭb, al-Hudaybī), the South Asian Islamic-revivalist Jamāʿat-i Islāmī
# founder (al-Mawdūdī), the Austrian Muslim convert and Qurʾan translator
# (Muḥammad Asad), the Iraqi-American uṣūl scholar (al-ʿAlwānī), the
# Damascene Ashʿarī-Shāfiʿī scholar (al-Būṭī), the Saudi Qurʾanic-sciences
# scholar (al-Qaṭṭān), the Pakistani Deobandī jurists (Muḥammad Shafīʿ
# ʿUthmānī, Muḥammad Idrīs Kāndhalawī), and the Indian Deobandī reformer
# (Ashraf ʿAlī Thānwī). Already-covered figures (Sanhūrī, ʿAbduh,
# al-Bannā, al-Albānī, Ahmad Shākir, al-Qaraḍāwī, al-Zuḥaylī, Said Nursī,
# Iqbāl, ʿAbd al-Ḥalīm Maḥmūd, Muḥammad al-Ghazālī al-Saqqā, al-Afghānī,
# Rashīd Riḍā) are skipped. All ten figures are presented factually-
# historically, without endorsement or condemnation; political and
# ideological controversies are described as such and not adjudicated.
# Sources: EI2, EI3 (where available), academic biographies, and
# editorial compilation. No hadith refs. Trilingual en/ar/fr throughout.

events:
  # =========================================================================
  # EGYPTIAN BROTHERHOOD INTELLECTUALS
  # =========================================================================

  - slug: death-of-sayyid-qutb
    category: scholar_death
    title_en: Execution of Sayyid Quṭb — Egyptian Brotherhood Ideologue
    title_ar: إعدام سيد قطب — مفكر الإخوان المسلمين بمصر
    title_fr: Exécution de Sayyid Quṭb — idéologue des Frères musulmans égyptiens
    description_en: |
      Sayyid Quṭb Ibrāhīm Ḥusayn al-Shādhilī — Egyptian Sunni
      author, literary critic, and prominent ideologue of the
      Muslim Brotherhood (*al-Ikhwān al-Muslimūn*) from the
      mid-1950s onward — was executed by hanging at Liman Ṭura
      prison in Cairo in the early hours of 13 Jumādā al-Ūlā
      1386 AH (29 August 1966 CE) on charges of plotting against
      the Nasser government, alongside two co-defendants. He
      was 60. Educated at Dār al-ʿUlūm in Cairo and originally
      a literary writer and ministry of education official, he
      joined the Brotherhood after returning from study in the
      United States in 1950. His major works include the
      thirty-juzʾ Qurʾanic exegesis *Fī Ẓilāl al-Qurʾān*,
      composed largely during his imprisonment from 1954
      onward, the social-justice treatise *al-ʿAdāla al-
      Ijtimāʿiyya fī al-Islām*, and *Maʿālim fī al-Ṭarīq*
      (1964) — the short ideological tract whose state-
      indictment served as the principal evidence at his
      trial. His execution was contested across the Sunni Arab
      world at the time and continues to mark a major rupture
      in the political history of the Egyptian Brotherhood.
    description_ar: |
      أُعدم سيد قطب إبراهيم حسين الشاذلي — الكاتب والناقد
      الأدبي السني المصري، ومن أبرز منظّري جماعة الإخوان
      المسلمين منذ منتصف خمسينات القرن العشرين الميلادي —
      شنقاً بسجن ليمان طُره بالقاهرة فجر يوم ١٣ جمادى الأولى
      سنة ١٣٨٦ هـ (الموافق ٢٩ أوت ١٩٦٦ ميلادي) بتهمة التخطيط
      لقلب نظام حكم جمال عبد الناصر، ومعه متهمان آخران. وقد
      ناهز الستين. تخرج من «دار العلوم» بالقاهرة، وكان أصلاً
      أديباً وموظفاً بوزارة المعارف، ثم انضم إلى الإخوان عند
      عودته من بعثة دراسية بالولايات المتحدة سنة ١٣٧٠ هـ
      (١٩٥٠ ميلادي). ومن أكبر مصنفاته «في ظلال القرآن» في
      ثلاثين جزءاً، الذي أنجز معظمه أثناء سجنه منذ سنة ١٣٧٤
      هـ (١٩٥٤ ميلادي)، وكتاب «العدالة الاجتماعية في
      الإسلام»، و«معالم في الطريق» (سنة ١٣٨٤ هـ / ١٩٦٤
      ميلادي) — الكتيب الأيديولوجي الذي جعلته النيابة الدليل
      الرئيس في محاكمته. وقد أثار إعدامه جدلاً واسعاً في
      العالم العربي السني آنذاك، ولا يزال نقطة قطيعة كبرى
      في التاريخ السياسي للإخوان المسلمين بمصر.
    description_fr: |
      Sayyid Quṭb Ibrāhīm Ḥusayn al-Shādhilī — auteur sunnite
      égyptien, critique littéraire et idéologue éminent des
      Frères musulmans (*al-Ikhwān al-Muslimūn*) à partir du
      milieu des années 1950 — fut exécuté par pendaison à la
      prison de Liman Ṭura au Caire à l'aube du 13 Jumādā
      al-Ūlā 1386 H (29 août 1966 EC) sous l'inculpation de
      complot contre le gouvernement de Nasser, aux côtés de
      deux co-accusés. Il avait 60 ans. Formé à Dār al-ʿUlūm
      au Caire, écrivain littéraire et fonctionnaire du
      ministère de l'Éducation à l'origine, il rejoignit les
      Frères musulmans à son retour d'un séjour d'études aux
      États-Unis en 1950. Ses œuvres majeures comprennent
      l'exégèse coranique en trente *juzʾ* *Fī Ẓilāl al-
      Qurʾān*, composée en grande partie durant son
      emprisonnement à partir de 1954, le traité de justice
      sociale *al-ʿAdāla al-Ijtimāʿiyya fī al-Islām* et
      *Maʿālim fī al-Ṭarīq* (1964) — le bref opuscule
      idéologique dont l'incrimination par l'État servit de
      principal élément de preuve à son procès. Son exécution
      fut contestée à travers le monde arabe sunnite à
      l'époque et marque toujours une rupture majeure dans
      l'histoire politique des Frères musulmans égyptiens.
    canonical_hijri: {year: 1386, month: 5, day: 13, precision: day}
    canonical_gregorian: {date: 1966-08-29, precision: day, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
        notes: "Article 'Sayyid Quṭb' in EI2 records execution date 29 August 1966."
      - source_key: editorial
        notes: "Trial proceedings and execution at Liman Ṭura widely attested in Egyptian press of the period."
