  - slug: death-of-muhammad-asad
    category: scholar_death
    title_en: Death of Muḥammad Asad (Leopold Weiss) — European-Muslim Translator of the Qurʾan
    title_ar: وفاة محمد أسد (ليوبولد فايس) — مترجم القرآن الكريم إلى الإنجليزية
    title_fr: Mort de Muḥammad Asad (Leopold Weiss) — traducteur européen du Coran
    description_en: |
      Muḥammad Asad — born Leopold Weiss in Lemberg
      (Austrian Galicia, now Lviv) on 12 July 1900,
      Austrian-Jewish journalist who entered Islam in
      Berlin in 1926, friend of King ʿAbd al-ʿAzīz Āl
      Saʿūd, founding figure of the Pakistan Department
      of Islamic Reconstruction in 1947 and Pakistan's
      minister-plenipotentiary at the United Nations from
      1952 — died at Mijas in southern Spain on
      16 Shaʿbān 1412 AH (20 February 1992 CE) at age 91
      and was buried in the Muslim cemetery of Granada.
      His autobiography *The Road to Mecca* (1954) is one
      of the most widely read twentieth-century European-
      Muslim conversion narratives. His English Qurʾan
      translation and commentary *The Message of the
      Qurʾān* (begun in the 1960s and published in 1980)
      and his earlier translation of *Ṣaḥīḥ al-Bukhārī*
      stand among the major contributions to Sunni
      Qurʾanic scholarship in European languages. He
      also drafted parts of the early constitutional
      proposals for Pakistan as an Islamic state in
      collaboration with the country's founders.
    description_ar: |
      توفي العلامة محمد أسد — وهو ليوبولد فايس المولود
      بمدينة لمبرغ (غاليتسيا النمساوية، ليفيف اليوم)
      يوم ١٢ جويلية ١٩٠٠ ميلادي، صحفي يهودي نمساوي دخل
      في الإسلام ببرلين سنة ١٣٤٤ هـ (١٩٢٦ ميلادي)،
      وصديق الملك عبد العزيز آل سعود، ومؤسس قسم إعادة
      البناء الإسلامي بباكستان سنة ١٣٦٦ هـ (١٩٤٧
      ميلادي)، ووزير باكستان المفوض لدى الأمم المتحدة
      منذ سنة ١٣٧١ هـ (١٩٥٢ ميلادي) — بمدينة ميخاس
      جنوب إسبانيا يوم ١٦ شعبان سنة ١٤١٢ هـ (الموافق
      ٢٠ فيفري ١٩٩٢ ميلادي) عن إحدى وتسعين سنة، ودفن
      بالمقبرة الإسلامية بغرناطة. وسيرته الذاتية
      «الطريق إلى مكة» (سنة ١٣٧٤ هـ / ١٩٥٤ ميلادي) من
      أشهر روايات الدخول في الإسلام لمسلمي أوروبا في
      القرن العشرين الميلادي، وترجمته الإنجليزية للقرآن
      الكريم وتفسيره «رسالة القرآن» (بدأت في ستينات
      القرن العشرين وصدرت سنة ١٤٠٠ هـ / ١٩٨٠ ميلادي)
      وترجمته السابقة لـ«صحيح البخاري» من أكبر
      الإسهامات في نشر العلم السني للقرآن باللغات
      الأوروبية. وقد شارك أيضاً في صياغة بعض الاقتراحات
      الدستورية الأولى لباكستان بوصفها دولة إسلامية مع
      مؤسسي البلد.
    description_fr: |
      Muḥammad Asad — né Leopold Weiss à Lemberg (Galicie
      autrichienne, aujourd'hui Lviv) le 12 juillet 1900,
      journaliste juif autrichien entré en Islam à Berlin
      en 1926, ami du roi ʿAbd al-ʿAzīz Āl Saʿūd, figure
      fondatrice du Département de la Reconstruction
      Islamique du Pakistan en 1947 et ministre
      plénipotentiaire du Pakistan auprès des Nations
      Unies à partir de 1952 — mourut à Mijas dans le sud
      de l'Espagne le 16 Shaʿbān 1412 H (20 février 1992
      EC) à l'âge de 91 ans et fut enterré au cimetière
      musulman de Grenade. Son autobiographie *The Road
      to Mecca* (1954) est l'un des récits de conversion
      européen-musulman les plus lus du XXe siècle. Sa
      traduction anglaise du Coran et son commentaire
      *The Message of the Qurʾān* (entamé dans les
      années 1960 et publié en 1980) ainsi que sa
      traduction antérieure du *Ṣaḥīḥ al-Bukhārī*
      figurent parmi les contributions majeures à
      l'érudition coranique sunnite en langues
      européennes. Il rédigea également des parties des
      premières propositions constitutionnelles du
      Pakistan en tant qu'État islamique en collaboration
      avec les fondateurs du pays.
