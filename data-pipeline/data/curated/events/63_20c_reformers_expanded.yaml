        notes: "Modern academic references record death in Karachi 6 October 1976."
      - source_key: editorial
        notes: "Founding role at Dār al-ʿUlūm Karachi and first Grand Muftī of Pakistan attested in standard biographies."
    people: [[mufti-muhammad-shafi, died], [ashraf-ali-thanwi, subject]]
