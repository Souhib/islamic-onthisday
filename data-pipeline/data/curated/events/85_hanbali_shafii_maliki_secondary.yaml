  - slug: death-of-ibn-aqil-al-baghdadi
    category: scholar_death
    title_en: Death of Ibn ʿAqīl al-Baghdādī — author of *al-Funūn*
    title_ar: وفاة ابن عقيل البغدادي — صاحب «الفنون»
    title_fr: Mort d'Ibn ʿAqīl al-Baghdādī — auteur d'*al-Funūn*
    description_en: |
      Abū al-Wafāʾ ʿAlī ibn ʿAqīl ibn Muḥammad al-Baghdādī al-Ḥanbalī
      al-Ẓafarī — leading Ḥanbalī jurist, theologian and uṣūlī of
      late-Saljūq Baghdad, author of the colossal multi-volume
      *Kitāb al-Funūn* (a vast notebook of fiqh, theology, polemics,
      grammar, mysticism and personal reflection — the largest single-
      author book in the medieval Arabic tradition by some classical
      estimates) and *al-Wāḍiḥ fī Uṣūl al-Fiqh* — died at Baghdad on
      Friday 12 Jumādā al-Awlā 513 AH (~21 August 1119 CE) at age
      about 80, per al-Dhahabī's *Siyar*, Ibn Khallikān's *Wafayāt*,
      and Ibn al-Jawzī's *al-Muntaẓam* (Ibn al-Jawzī himself attended
      his teaching circle). Ibn ʿAqīl had earlier come under attack
      from rigorist Ḥanbalī colleagues for studying with Muʿtazilī
      teachers; he made a famous public retraction (the *Tawba*
      preserved in his own works), and his subsequent output became
      the principal vehicle through which the school engaged seriously
      with kalām and uṣūl. *al-Wāḍiḥ* is one of the foundational works
      of Ḥanbalī uṣūl al-fiqh.
    description_ar: |
      توفي الإمام أبو الوفاء علي بن عقيل بن محمد البغدادي الحنبلي
      الظفري — كبير فقهاء الحنابلة في بغداد في أواخر العهد السلجوقي
      ومتكلمهم وأصوليهم، صاحب الكتاب الموسوعي الضخم «كتاب الفنون» —
      وهو دفتر فقه وكلام ومناظرات ولغة وتصوف ومجالس ذاتية، عُدّ من
      أكبر كتاب صنف من تأليف رجل واحد في التراث العربي الوسيط — وكتاب
      «الواضح في أصول الفقه» — ببغداد يوم الجمعة الثاني عشر من جمادى
      الأولى سنة ٥١٣ هـ (~٢١ أغسطس ١١١٩ م) عن نحو ثمانين سنة، كما
      حفظ ذلك الذهبي في «السير» وابن خلكان في «الوفيات» وابن الجوزي
      في «المنتظم» — وكان ابن الجوزي نفسه من حضّار حلقته. وقد كان ابن
      عقيل قد تعرض في شبابه لطعن بعض شيوخ الحنابلة المشددين بسبب
      أخذه عن شيوخ معتزلة، فأعلن توبته الشهيرة (وهي «التوبة» المحفوظة
      في تصانيفه)، ثم صار من بعدها الواجهة العلمية التي عبر بها
      المذهب إلى علم الكلام والأصول جدّياً. و«الواضح» من أوائل أصول
      الفقه الحنبلي.
    description_fr: |
      Abū al-Wafāʾ ʿAlī ibn ʿAqīl ibn Muḥammad al-Baghdādī al-Ḥanbalī
      al-Ẓafarī — juriste, théologien et uṣūlī ḥanbalite de premier
      plan dans le Bagdad saljūqide tardif, auteur du colossal
      *Kitāb al-Funūn* (un vaste cahier de fiqh, de théologie, de
      polémique, de grammaire, de mystique et de réflexion personnelle
      — selon certaines estimations classiques, le plus grand livre
      d'un seul auteur de la tradition arabe médiévale) et d'*al-Wāḍiḥ
      fī Uṣūl al-Fiqh* — mourut à Bagdad le vendredi 12 Jumādā I 513 H
      (~21 août 1119 EC) à l'âge d'environ 80 ans, selon les *Siyar*
      d'al-Dhahabī, les *Wafayāt* d'Ibn Khallikān et al-*Muntaẓam*
      d'Ibn al-Jawzī (lequel avait personnellement assisté à son
      cercle d'enseignement). Plus jeune, Ibn ʿAqīl avait été attaqué
      par les ḥanbalites rigoristes pour avoir étudié auprès de
      maîtres muʿtazilites ; il prononça la fameuse rétractation
      publique (la *Tawba* préservée dans ses propres écrits), et sa
      production ultérieure devint le principal véhicule par lequel
      l'école s'engagea sérieusement avec le kalām et les uṣūl.
      *al-Wāḍiḥ* est l'un des ouvrages fondateurs des uṣūl al-fiqh
      ḥanbalites.
