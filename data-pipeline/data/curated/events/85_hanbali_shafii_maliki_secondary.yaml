  - slug: death-of-abu-hamid-al-isfaraini
    category: scholar_death
    title_en: Death of Abū Ḥāmid al-Isfarāʾīnī — *Imām al-Aṣḥāb* of his time
    title_ar: وفاة أبي حامد الإسفراييني — إمام الأصحاب في زمانه
    title_fr: Mort d'Abū Ḥāmid al-Isfarāʾīnī — *imām al-aṣḥāb* de son temps
    description_en: |
      Abū Ḥāmid Aḥmad ibn Muḥammad ibn Aḥmad al-Isfarāʾīnī — leading
      Shāfiʿī jurist of late-Buyid Baghdad, mufti of his generation
      and head of the largest Shāfiʿī teaching circle in the capital
      (some 700 students); author of a celebrated *Taʿlīqa* on Shāfiʿī
      fiqh that became the basis of much subsequent Iraqī Shāfiʿī
      scholarship; and styled by later Shāfiʿīs as *Imām al-Aṣḥāb*
      ("imam of the school's companions") — died at Baghdad on Friday
      23 Shawwāl 406 AH (~5 April 1016 CE) at age 62, per al-Dhahabī's
      *Siyar*, Ibn Khallikān's *Wafayāt*, and al-Subkī's *Ṭabaqāt
      al-Shāfiʿiyya al-Kubrā*. Through Abū Ḥāmid passes the chain of
      Shāfiʿī uṣūl-and-furūʿ in Baghdad to al-Māwardī (his student),
      al-Maḥāmilī (his contemporary), and on to the later Niẓāmiyya
      generation. He is to be carefully distinguished from his
      contemporaries Abū al-ʿAbbās ibn Surayj (d. 306) and Abū
      Isḥāq al-Isfarāʾīnī (d. 418) — the latter is the famous Ashʿarī
      mutakallim, with whom Abū Ḥāmid is sometimes confused.
    description_ar: |
      توفي الإمام أبو حامد أحمد بن محمد بن أحمد الإسفراييني — كبير
      فقهاء الشافعية ببغداد في أواخر العصر البويهي، ومفتي عصره وكبير
      حلق التدريس في العاصمة — قيل بلغ تلامذته نحو سبع مئة طالب —
      وصاحب «التعليقة» المعروفة في فقه الشافعية التي صارت أصلاً لكثير
      من تصانيف العراقيين بعدها، ولقبه المتأخرون من الشافعية بـ«إمام
      الأصحاب» — ببغداد يوم الجمعة الثالث والعشرين من شوال سنة ٤٠٦
      هـ (~٥ أبريل ١٠١٦ م) عن اثنتين وستين سنة كما حفظ ذلك الذهبي في
      «السير» وابن خلكان في «الوفيات» والسبكي في «طبقات الشافعية
      الكبرى». وعن أبي حامد ينتقل سند الشافعية في الأصول والفروع
      ببغداد إلى الماوردي تلميذه، والمحاملي قرينه، ثم إلى طبقة
      النظامية. ولا يخلط بينه وبين قرينيه أبي العباس بن سريج (ت ٣٠٦)
      وأبي إسحاق الإسفراييني (ت ٤١٨) — وهذا الأخير هو المتكلم الأشعري
      المشهور، يقع الخلط بينهما عند بعض الباحثين.
    description_fr: |
      Abū Ḥāmid Aḥmad ibn Muḥammad ibn Aḥmad al-Isfarāʾīnī — juriste
      shāfiʿīte de premier plan dans le Bagdad bouyide tardif, muftī
      de sa génération et tête du plus grand cercle d'enseignement
      shāfiʿīte de la capitale (quelque 700 disciples) ; auteur d'une
      célèbre *Taʿlīqa* en fiqh shāfiʿīte qui servit de base à une
      grande partie de la production irakienne ultérieure ; et
      qualifié par les shāfiʿītes tardifs d'*Imām al-Aṣḥāb* (« imam
      des compagnons de l'école ») — mourut à Bagdad le vendredi
      23 Shawwāl 406 H (~5 avril 1016 EC) à l'âge de 62 ans, selon
      les *Siyar* d'al-Dhahabī, les *Wafayāt* d'Ibn Khallikān et les
      *Ṭabaqāt al-Shāfiʿiyya al-Kubrā* d'al-Subkī. Par Abū Ḥāmid
      passe la chaîne shāfiʿīte d'uṣūl et de furūʿ à Bagdad, vers
      al-Māwardī (son disciple), al-Maḥāmilī (son contemporain) et
      la génération ultérieure de la Niẓāmiyya. Il est à distinguer
      soigneusement de ses contemporains Abū al-ʿAbbās ibn Surayj
      (m. 306) et Abū Isḥāq al-Isfarāʾīnī (m. 418) — ce dernier
      étant le célèbre mutakallim ashʿarīte, avec lequel Abū Ḥāmid
      est parfois confondu.
    canonical_hijri: {year: 406, month: 10, day: 23, precision: day}
    canonical_gregorian: {date: 1016-04-05, precision: day, method: tabular_conversion}
