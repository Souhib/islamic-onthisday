  - slug: death-of-harmala-ibn-yahya
    category: scholar_death
    title_en: Death of Ḥarmala ibn Yaḥyā — Egyptian transmitter of al-Shāfiʿī's *Mabsūṭ*
    title_ar: وفاة حرملة بن يحيى — راوي «المبسوط» للشافعي بمصر
    title_fr: Mort de Ḥarmala ibn Yaḥyā — transmetteur égyptien du *Mabsūṭ* d'al-Shāfiʿī
    description_en: |
      Abū Ḥafṣ Ḥarmala ibn Yaḥyā ibn ʿAbd Allāh al-Tujībī al-Miṣrī —
      senior Egyptian disciple of Imam Muḥammad ibn Idrīs al-Shāfiʿī,
      transmitter of his *Mabsūṭ* (a lost-but-cited corpus of fiqh
      *masāʾil* on which al-Shāfiʿī's later Egyptian-recension *Umm*
      drew), and a named teacher of Imam Muslim, Ibn Mājah and Abū
      Ḥātim al-Rāzī — died at Egypt in Shawwāl 243 AH (~February 858
      CE) at about age 77, per al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ*
      and Ibn Khallikān's *Wafayāt al-Aʿyān*. Ḥarmala held an
      ambivalent reputation in the post-Shāfiʿī ḥadīth-criticism
      tradition: al-Nasāʾī weakened him as a transmitter of certain
      Egyptian narrations on Ibn Wahb (*ḍaʿīf*), while Ibn Maʿīn,
      Imam Muslim and the bulk of the Shāfiʿiyya considered him
      reliable in the school's own *masāʾil* and treated him as the
      main living conduit of his master's later positions. He must
      not be confused with Ḥarmala mawlā Usāma ibn Zayd, the early
      Companion-era figure.
    description_ar: |
      توفي الإمام أبو حفص حرملة بن يحيى بن عبد الله التجيبي المصري —
      كبير أصحاب الإمام محمد بن إدريس الشافعي بمصر، وراوي كتابه
      «المبسوط» — وهو من أصول الشافعي القديمة التي بُنيت عليها
      «الأم» في طبعة مصر — وهو من شيوخ الإمام مسلم وابن ماجه وأبي
      حاتم الرازي — بمصر في شوال سنة ٢٤٣ هـ (~فبراير ٨٥٨ م) عن نحو
      سبع وسبعين سنة، كما حفظ ذلك الذهبي في «السير» وابن خلكان في
      «الوفيات». وكانت ترجمته في كتب الجرح والتعديل ذات وجهين: ضعفه
      النسائي في رواياته المصرية عن ابن وهب، وكان ابن معين والإمام
      مسلم وعامة الشافعية يرونه ثقة في مسائل المذهب نفسه، يعتمدون
      عليه في نقل المتأخر من قول الإمام الشافعي. ولا يخلط بينه وبين
      حرملة مولى أسامة بن زيد رضي الله عنه من جيل الصحابة.
    description_fr: |
      Abū Ḥafṣ Ḥarmala ibn Yaḥyā ibn ʿAbd Allāh al-Tujībī al-Miṣrī —
      disciple égyptien éminent de l'imam Muḥammad ibn Idrīs
      al-Shāfiʿī, transmetteur de son *Mabsūṭ* (corpus de *masāʾil*
      de fiqh perdu mais cité, dont la recension égyptienne tardive
      de l'*Umm* dérive en partie), et maître nommé de l'imam
      Muslim, d'Ibn Mājah et d'Abū Ḥātim al-Rāzī — mourut en Égypte
      en Shawwāl 243 H (~février 858 EC) à l'âge d'environ 77 ans,
      selon les *Siyar Aʿlām al-Nubalāʾ* d'al-Dhahabī et les
      *Wafayāt al-Aʿyān* d'Ibn Khallikān. Ḥarmala avait une
      réputation ambivalente dans la critique post-shāfiʿīte du
      ḥadīth : al-Nasāʾī le déclara faible (*ḍaʿīf*) dans certaines
      narrations égyptiennes par Ibn Wahb, tandis qu'Ibn Maʿīn,
      l'imam Muslim et l'ensemble des shāfiʿītes le tenaient pour
      fiable dans les *masāʾil* internes de l'école et le traitaient
      comme le principal vivant relais des positions tardives de
      son maître. Il est à ne pas confondre avec Ḥarmala mawlā
      Usāma ibn Zayd, figure de l'époque des Compagnons.
    canonical_hijri: {year: 243, month: 10, precision: month}
    canonical_gregorian: {date: 858-02-01, precision: month, method: tabular_conversion}
