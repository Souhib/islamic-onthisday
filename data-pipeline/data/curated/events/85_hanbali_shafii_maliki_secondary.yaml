  - slug: death-of-al-furani
    category: scholar_death
    title_en: Death of al-Furānī — Shāfiʿī master of Marv-Rūdh
    title_ar: وفاة الفوراني — شيخ الشافعية في مرو الروذ
    title_fr: Mort d'al-Furānī — maître shāfiʿīte de Marv-Rūdh
    description_en: |
      Abū al-Qāsim ʿAbd al-Raḥmān ibn Muḥammad ibn Aḥmad al-Furānī
      al-Marwazī — leading Khurāsānian Shāfiʿī jurist of his
      generation, head of the Shāfiʿī teaching circle at Marv-Rūdh,
      author of *al-ʿUmda*, *al-Ibāna ʿan Aḥkām al-Diyāna* (a
      foundational late-Khurāsānian Shāfiʿī compendium that al-Juwaynī
      and the Marv-Rūdhī school built upon), and notable opponent
      in fiqh debate of his contemporary al-Qāḍī Ḥusayn al-Marwarrūdhī
      — died at Marv-Rūdh in 461 AH (~1069 CE) per al-Dhahabī's *Siyar*
      and al-Subkī's *Ṭabaqāt al-Shāfiʿiyya al-Kubrā*. Through
      al-Furānī's *Ibāna* and the Marv-Rūdhī teaching tradition runs
      a substantial portion of the Khurāsānian Shāfiʿī line that
      culminates in Imam al-Ḥaramayn al-Juwaynī (d. 478 AH) and his
      student al-Ghazālī (d. 505 AH); he is the master under whom
      al-Juwaynī was raised in his Marv-Rūdh phase.
    description_ar: |
      توفي الإمام أبو القاسم عبد الرحمن بن محمد بن أحمد الفوراني
      المروزي — كبير فقهاء الشافعية في خراسان في عصره، وشيخ حلقة
      الشافعية في مرو الروذ، وصاحب «العمدة» و«الإبانة عن أحكام
      الديانة» (وهو من الكتب الشافعية الكبرى عند الخراسانيين بُنيت
      عليها مدرسة مرو الروذ، وأخذ منها الجويني وغيره)، وكان قرينه
      في الفقه القاضي حسين المروروذي مع كثير من المناظرات بينهما —
      بمرو الروذ سنة ٤٦١ هـ (~١٠٦٩ م) كما حفظ ذلك الذهبي في «السير»
      والسبكي في «طبقات الشافعية الكبرى». وعبر «الإبانة» وتراث مدرسة
      مرو الروذ ينتقل قدر كبير من المذهب الشافعي الخراساني إلى إمام
      الحرمين الجويني (ت ٤٧٨ هـ) ثم إلى تلميذه الغزالي (ت ٥٠٥ هـ)؛
      وعنه أخذ الجويني في مرحلته المرو روذية.
    description_fr: |
      Abū al-Qāsim ʿAbd al-Raḥmān ibn Muḥammad ibn Aḥmad al-Furānī
      al-Marwazī — juriste shāfiʿīte khurasanien de premier plan
      de sa génération, tête du cercle d'enseignement shāfiʿīte de
      Marv-Rūdh, auteur d'*al-ʿUmda*, d'*al-Ibāna ʿan Aḥkām al-
      Diyāna* (compendium shāfiʿīte khurasanien tardif fondateur,
      sur lequel al-Juwaynī et l'école de Marv-Rūdh s'appuyèrent)
      et adversaire notoire dans les débats de fiqh de son
      contemporain al-Qāḍī Ḥusayn al-Marwarrūdhī — mourut à Marv-
      Rūdh en 461 H (~1069 EC) selon les *Siyar* d'al-Dhahabī et
      les *Ṭabaqāt al-Shāfiʿiyya al-Kubrā* d'al-Subkī. Par
      l'*Ibāna* d'al-Furānī et la tradition d'enseignement de
      Marv-Rūdh passe une part substantielle de la lignée shāfiʿīte
      khurasanienne qui culmine en Imam al-Ḥaramayn al-Juwaynī
      (m. 478 H) et son élève al-Ghazālī (m. 505 H) ; il est le
      maître auprès duquel al-Juwaynī fut formé dans sa phase de
      Marv-Rūdh.
    canonical_hijri: {year: 461, precision: year}
    canonical_gregorian: {date: 1069-01-01, precision: year, method: attested}
