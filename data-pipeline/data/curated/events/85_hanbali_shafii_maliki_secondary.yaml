  - slug: death-of-al-mazari
    category: scholar_death
    title_en: Death of al-Māzarī — Mālikī master of Ifrīqiyya, author of *al-Muʿlim*
    title_ar: وفاة المازري — كبير مالكية إفريقية وصاحب «المعلم»
    title_fr: Mort d'al-Māzarī — maître mālikīte d'Ifrīqiyya, auteur d'*al-Muʿlim*
    description_en: |
      Abū ʿAbd Allāh Muḥammad ibn ʿAlī ibn ʿUmar al-Tamīmī al-Māzarī —
      the leading Mālikī jurist, theologian and ḥadīth scholar of
      Ifrīqiyya in his generation, author of *al-Muʿlim bi-Fawāʾid
      Muslim* (the principal North-African Mālikī commentary on
      Ṣaḥīḥ Muslim, later expanded into *Ikmāl al-Muʿlim* by al-Qāḍī
      ʿIyāḍ and *Ikmāl al-Ikmāl* by Ubayy al-Ḥusaynī), as well as
      *Īḍāḥ al-Maḥṣūl* (a commentary on al-Ghazālī's *al-Mustaṣfā*
      that engages closely with the Niẓāmiyya tradition's uṣūl
      al-fiqh) — died at al-Mahdiyya (in modern Tunisia) in 536 AH
      (~1141 CE) at age about 83, per Ibn Khallikān's *Wafayāt*,
      al-Dhahabī's *Siyar*, and Ibn Farḥūn's *al-Dībāj al-Mudhahhab
      fī Maʿrifat Aʿyān ʿUlamāʾ al-Madhhab*. al-Māzarī's nisba
      derives from the Sicilian town of Mazara (his family origin);
      he himself worked in Mahdiyya rather than Sicily. He stands
      as the principal North-African Mālikī jurisconsult of the
      late Zīrid / early Almohad era and a key transmissional bridge
      between the Khurāsānian Shāfiʿī uṣūl tradition and the western
      Mālikī school.
    description_ar: |
      توفي الإمام أبو عبد الله محمد بن علي بن عمر التميمي المازري —
      كبير مالكية إفريقية في عصره فقهاً وكلاماً وحديثاً، وصاحب
      «المعلم بفوائد مسلم» وهو الشرح المغاربي الكبير على «صحيح مسلم»
      الذي أكمله القاضي عياض «إكمال المعلم» ثم أكمله الأبي الحسيني
      «إكمال الإكمال»، وكتاب «إيضاح المحصول» وهو شرح على «المستصفى»
      للغزالي يحاور فيه تراث النظامية في أصول الفقه — بالمهدية (في
      تونس اليوم) سنة ٥٣٦ هـ (~١١٤١ م) عن نحو ثلاث وثمانين سنة كما
      حفظ ذلك ابن خلكان في «الوفيات» والذهبي في «السير» وابن فرحون
      في «الديباج المذهب في معرفة أعيان علماء المذهب». ونسبة
      المازري إلى مدينة مازر بصقلية أصل أسرته، وأما هو فاستوطن
      المهدية ولم يستوطن صقلية. وهو الفقيه المغاربي المالكي الأكبر
      في أواخر العهد الزيري وأوائل العهد الموحدي، ومن أهم وسائط
      نقل تراث الأصول الخراساني الشافعي إلى المذهب المالكي الغربي.
    description_fr: |
      Abū ʿAbd Allāh Muḥammad ibn ʿAlī ibn ʿUmar al-Tamīmī al-Māzarī
      — juriste, théologien et muḥaddith mālikīte de premier plan
      en Ifrīqiyya de sa génération, auteur d'*al-Muʿlim bi-Fawāʾid
      Muslim* (principal commentaire mālikīte nord-africain de
      *Ṣaḥīḥ Muslim*, ultérieurement développé en *Ikmāl al-Muʿlim*
      par le qāḍī ʿIyāḍ et *Ikmāl al-Ikmāl* par Ubayy al-Ḥusaynī),
      ainsi que d'*Īḍāḥ al-Maḥṣūl* (commentaire d'*al-Mustaṣfā*
      d'al-Ghazālī qui dialogue étroitement avec la tradition d'uṣūl
      al-fiqh de la Niẓāmiyya) — mourut à al-Mahdiyya (Tunisie
      actuelle) en 536 H (~1141 EC) à l'âge d'environ 83 ans, selon
      les *Wafayāt* d'Ibn Khallikān, les *Siyar* d'al-Dhahabī et
      *al-Dībāj al-Mudhahhab fī Maʿrifat Aʿyān ʿUlamāʾ al-Madhhab*
      d'Ibn Farḥūn. La *nisba* d'al-Māzarī renvoie à la ville
      sicilienne de Mazara (origine familiale) ; lui-même travailla
      à Mahdiyya plutôt qu'en Sicile. Il fut le principal
      jurisconsulte mālikīte nord-africain de la fin de l'époque
      zīride et du début de l'époque almohade, et un pont
      transmissionnel essentiel entre la tradition d'uṣūl shāfiʿīte
      khurasanienne et l'école mālikīte occidentale.
