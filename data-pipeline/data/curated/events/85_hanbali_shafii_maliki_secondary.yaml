  - slug: death-of-ibn-hubayra
    category: scholar_death
    title_en: Death of al-Wazīr Ibn Hubayra — Ḥanbalī jurist-vizier of the late ʿAbbāsid caliphate
    title_ar: وفاة الوزير ابن هبيرة — الفقيه الحنبلي ووزير أواخر العباسيين
    title_fr: Mort du vizir Ibn Hubayra — juriste ḥanbalite et vizir abbasside tardif
    description_en: |
      ʿAwn al-Dīn Abū al-Muẓaffar Yaḥyā ibn Muḥammad ibn Hubayra
      al-Shaybānī al-Baghdādī al-Dūrī — Ḥanbalī jurist, ḥadīth scholar
      and vizier (*al-wazīr*) of the ʿAbbāsid caliphs al-Muqtafī and
      al-Mustanjid for more than fifteen years; author of *al-Ifṣāḥ
      ʿan Maʿānī al-Ṣiḥāḥ*, a comparative ḥadīth-and-fiqh commentary
      on Ṣaḥīḥ al-Bukhārī and Ṣaḥīḥ Muslim notable for systematic
      cross-school *ikhtilāf* — died at Baghdad on Sunday 13 Jumādā
      al-Awlā 560 AH (~28 March 1165 CE) at age about 60, per Ibn
      Khallikān's *Wafayāt*, al-Dhahabī's *Siyar*, and Ibn al-Jawzī's
      *al-Muntaẓam*. Several classical sources transmit suspicions
      that he was poisoned by an enemy in his household; al-Dhahabī
      records the report without endorsing it. As vizier he funded
      ḥadīth circles in Baghdad, restored Ḥanbalī teaching positions
      across the capital, and drew Ibn al-Jawzī into the literary
      court — a pattern of patronage that helped consolidate the
      Ḥanbalī revival of the late 6th century AH.
    description_ar: |
      توفي الوزير عون الدين أبو المظفر يحيى بن محمد بن هبيرة الشيباني
      البغدادي الدُّوري — فقيه الحنابلة ومحدثهم، ووزير الخليفتين
      المقتفي والمستنجد العباسيَّيْن نحو خمس عشرة سنة، وصاحب «الإفصاح
      عن معاني الصحاح» وهو شرح ووجوه فقهية على «الصحيحين» تميز
      ببسط مسائل الخلاف بين المذاهب — ببغداد يوم الأحد الثالث عشر من
      جمادى الأولى سنة ٥٦٠ هـ (~٢٨ مارس ١١٦٥ م) عن نحو ستين سنة كما
      حفظ ذلك ابن خلكان في «الوفيات» والذهبي في «السير» وابن الجوزي
      في «المنتظم». وقد روت بعض المصادر القديمة شبهة أنه سُمَّ من
      قبل بعض من في بيته، نقل ذلك الذهبي من غير ترجيح. وكان ابن
      هبيرة في وزارته يمول حلقات الحديث ببغداد ويعيد للحنابلة مواقعهم
      التعليمية في عاصمة الخلافة، واصطنع ابن الجوزي في حضرته الأدبية
      — وهو مسلك ساعد على إحياء المذهب الحنبلي في أواخر القرن السادس.
    description_fr: |
      ʿAwn al-Dīn Abū al-Muẓaffar Yaḥyā ibn Muḥammad ibn Hubayra
      al-Shaybānī al-Baghdādī al-Dūrī — juriste et muḥaddith
      ḥanbalite, et vizir (*al-wazīr*) des califes abbassides
      al-Muqtafī et al-Mustanjid pendant plus de quinze ans ; auteur
      d'*al-Ifṣāḥ ʿan Maʿānī al-Ṣiḥāḥ*, un commentaire ḥadīthique-et-
      fiqh comparatif sur les *Ṣaḥīḥ* d'al-Bukhārī et de Muslim,
      remarquable pour son traitement systématique de l'*ikhtilāf*
      entre les écoles — mourut à Bagdad le dimanche 13 Jumādā I
      560 H (~28 mars 1165 EC) à l'âge d'environ 60 ans, selon les
      *Wafayāt* d'Ibn Khallikān, les *Siyar* d'al-Dhahabī et al-
      *Muntaẓam* d'Ibn al-Jawzī. Plusieurs sources classiques
      rapportent des soupçons d'empoisonnement par un ennemi de sa
      maison ; al-Dhahabī consigne la rumeur sans l'avaliser. Comme
      vizir, il finançait les cercles de ḥadīth à Bagdad, restaura
      les postes d'enseignement ḥanbalites dans la capitale et
      attira Ibn al-Jawzī à sa cour littéraire — schéma de mécénat
      qui contribua à consolider la renaissance ḥanbalite de la fin
      du VIe siècle hégirien.
    canonical_hijri: {year: 560, month: 5, day: 13, precision: day}
    canonical_gregorian: {date: 1165-03-28, precision: day, method: tabular_conversion}
