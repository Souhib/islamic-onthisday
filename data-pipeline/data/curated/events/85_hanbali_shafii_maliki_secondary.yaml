# Wave 33 of curated event additions (2026-04-27).
# Twelve secondary-yet-canonical Sunni jurists of the Ḥanbalī, Shāfiʿī
# and Mālikī schools whose deaths are well attested in the classical
# wafayāt corpus (al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ*, Ibn Khallikān's
# *Wafayāt al-Aʿyān*, Ibn Kathīr's *al-Bidāya wa-l-Nihāya*, Ibn al-ʿImād
# al-Ḥanbalī's *Shadharāt al-Dhahab*, al-Dhahabī's *Tārīkh al-Islām*,
# and the school-internal Ṭabaqāt — Ibn Abī Yaʿlā for Ḥanbalīs, al-Subkī
# for Shāfiʿīs, Qāḍī ʿIyāḍ and Ibn Farḥūn for Mālikīs).
#
# Already covered elsewhere and intentionally not duplicated here:
# Abū al-Ḥasan ʿAlī al-Lakhmī (death-of-al-lakhmi, file 26),
# Abū al-Walīd al-Bājī (death-of-al-baji), al-Khallāl
# (death-of-al-khallal), al-Muzanī (death-of-al-muzani), al-Khiraqī
# (death-of-al-khiraqi), al-Qādī Abū Yaʿlā al-Farrāʾ (none yet, deferred).
#
# Coverage:
#   Ḥanbalī (5): al-Marrūdhī (d. 275 AH), Ibn Baṭṭa al-ʿUkbarī
#   (d. 387 AH), Ibn al-Bannāʾ al-Ḥanbalī (d. 471 AH), Ibn ʿAqīl
#   al-Baghdādī (d. 513 AH), al-Wazīr Ibn Hubayra (d. 560 AH).
#   Shāfiʿī (5): Ḥarmala ibn Yaḥyā (d. 243 AH), Abū Ḥāmid al-Isfarāʾīnī
#   (d. 406 AH), Abū al-Ḥasan al-Maḥāmilī (d. 415 AH), al-Furānī
#   (d. 461 AH), al-Qaffāl al-Shāshī (d. 507 AH).
#   Mālikī (2): Ibn al-Qaṣṣār al-Baghdādī (d. 398 AH), al-Māzarī
#   (d. 536 AH).
#
# Date precision is the highest the classical sources actually attest:
# year-precise for figures whose month is contested (al-Marrūdhī,
# Ibn Baṭṭa, Ibn al-Qaṣṣār, al-Furānī, al-Māzarī), month-precise where
# the dominant transmission gives a month (Ibn al-Bannāʾ, Ḥarmala,
# Abū Ḥāmid al-Isfarāʾīnī, Abū al-Ḥasan al-Maḥāmilī, al-Qaffāl al-
# Shāshī), and day-precise only where multiple classical sources concur
# (Ibn ʿAqīl 12 Jumādā I 513 AH; Ibn Hubayra 13 Jumādā I 560 AH).
#
# Disputes flagged: Ibn al-Qaṣṣār 397 vs 398 AH (we follow 398 AH per
# Qāḍī ʿIyāḍ's *Tartīb al-Madārik* and the Subkī-cited tradition;
# al-Dhahabī gives 397). All trilingual (en/ar/fr); no hadith refs
# (biographical death events). Only Sunni framing; no QIDs (per
# 2026-04-26 audit policy).

events:
  # =========================================================================
  # ḤANBALĪ SCHOOL — FIVE SECONDARY MASTERS
  # =========================================================================

  - slug: death-of-al-marrudhi
    category: scholar_death
    title_en: Death of Abū Bakr al-Marrūdhī — chief disciple of Imam Aḥmad
    title_ar: وفاة أبي بكر المروذي — كبير أصحاب الإمام أحمد
    title_fr: Mort d'Abū Bakr al-Marrūdhī — disciple en chef de l'imam Aḥmad
    description_en: |
      Abū Bakr Aḥmad ibn Muḥammad ibn al-Ḥajjāj al-Marrūdhī (often
      transliterated al-Marwazī) — the closest companion and senior
      transmitter of Imam Aḥmad ibn Ḥanbal, the man who washed Aḥmad's
      body and led his funeral prayer in 241 AH, and the principal
      narrator of *Masāʾil Aḥmad* in the form preserved by Ḥanbalī
      tradition — died at Baghdad in Jumādā al-Awwal 275 AH (~September
      888 CE), per al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ* and Ibn Abī
      Yaʿlā's *Ṭabaqāt al-Ḥanābila*. Aḥmad was reportedly so attached
      to him that he said, "All my companions are like a single hand
      to me, except Abū Bakr al-Marrūdhī — for he is in my heart."
      Through al-Marrūdhī passes a substantial fraction of the Ḥanbalī
      *uṣūl* — the school's *Masāʾil*, the recorded responses of Aḥmad
      on questions of fiqh, ḥadīth criticism and creed — and his small
      treatise *al-Waraʿ* on scrupulousness in livelihood is among
      the earliest surviving Ḥanbalī ethical works.
    description_ar: |
      توفي الإمام أبو بكر أحمد بن محمد بن الحجاج المرّوذي — أخص أصحاب
      الإمام أحمد بن حنبل وكبير الرواة عنه، والذي تولى غسله والصلاة
      عليه سنة ٢٤١ هـ، وهو الراوي الأول لـ«مسائل أحمد» على نسختها
      التي اعتمدها الحنابلة — ببغداد في جمادى الأولى سنة ٢٧٥ هـ
      (~سبتمبر ٨٨٨ م) كما حفظ ذلك الذهبي في «السير» وابن أبي يعلى في
      «طبقات الحنابلة». روي أن الإمام أحمد كان يقول: «أصحابي كلهم بمنزلة
      اليد الواحدة عندي، إلا أبا بكر المرّوذي فإنه في قلبي». وعن طريقه
      تنتقل كثير من أصول المذهب الحنبلي ومسائل أحمد ومواقفه في الفقه
      والحديث والاعتقاد. ورسالته الصغيرة في «الورع» من أقدم تصانيف
      الزهد عند الحنابلة الواصلة إلينا.
    description_fr: |
      Abū Bakr Aḥmad ibn Muḥammad ibn al-Ḥajjāj al-Marrūdhī (souvent
      translittéré al-Marwazī) — le plus proche compagnon et premier
      transmetteur de l'imam Aḥmad ibn Ḥanbal, l'homme qui lava son
      corps et conduisit sa prière funéraire en 241 H, et le narrateur
      principal des *Masāʾil Aḥmad* sous la forme préservée par la
      tradition ḥanbalite — mourut à Bagdad en Jumādā I 275 H (~septembre
      888 EC), selon les *Siyar Aʿlām al-Nubalāʾ* d'al-Dhahabī et les
      *Ṭabaqāt al-Ḥanābila* d'Ibn Abī Yaʿlā. Aḥmad lui aurait été si
      attaché qu'il disait : « tous mes compagnons sont pour moi comme
      une seule main, sauf Abū Bakr al-Marrūdhī — car il est dans mon
      cœur ». Une part substantielle des *uṣūl* ḥanbalites — les
      *Masāʾil* de l'école, les réponses consignées d'Aḥmad sur les
      questions de fiqh, de critique du ḥadīth et de credo — passe par
      al-Marrūdhī, et son petit traité *al-Waraʿ* sur le scrupule
      figure parmi les premiers écrits éthiques ḥanbalites conservés.
    canonical_hijri: {year: 275, precision: year}
    canonical_gregorian: {date: 888-01-01, precision: year, method: attested}
