        is_canonical: true
        notes: "Siyar 13:173 — death at Baghdad Jumādā I 275 AH; closest companion of Aḥmad."
      - source_key: ibn_kathir_bidaya
        notes: "Year-275 chronicle entry in al-Bidāya wa-l-Nihāya."
