  - slug: death-of-ibn-al-qassar-al-maliki
    category: scholar_death
    title_en: Death of Ibn al-Qaṣṣār al-Mālikī — author of *ʿUyūn al-Adilla*
    title_ar: وفاة ابن القصّار المالكي — صاحب «عيون الأدلة»
    title_fr: Mort d'Ibn al-Qaṣṣār al-Mālikī — auteur d'*ʿUyūn al-Adilla*
    description_en: |
      al-Qāḍī Abū al-Ḥasan ʿAlī ibn ʿUmar ibn al-Qaṣṣār al-Baghdādī
      al-Mālikī — leading Mālikī jurist and qādī of Buyid-era Baghdad,
      and author of the *ʿUyūn al-Adilla fī Masāʾil al-Khilāf bayna
      Fuqahāʾ al-Amṣār* (commonly *ʿUyūn al-Adilla*) — one of the
      foundational Mālikī comparative-fiqh works, treating the legal
      controversies between the schools with citations of the
      Mālikī, Ḥanafī and Shāfiʿī positions across the chapters of
      furūʿ — died at Baghdad in 398 AH (~1007 CE), per Qāḍī ʿIyāḍ's
      *Tartīb al-Madārik wa-Taqrīb al-Masālik* and al-Subkī (citing
      him in *Ṭabaqāt*); we follow this date as the majority position.
      al-Dhahabī's *Siyar* gives 397 AH as an alternative — the
      dispute is over a single year and the difference reflects
      whether the source counts the lunar or court-administrative
      year. He is the senior local Mālikī authority of Baghdad in
      his generation and a teacher of al-Qāḍī ʿAbd al-Wahhāb al-
      Baghdādī al-Mālikī.
    description_ar: |
      توفي القاضي أبو الحسن علي بن عمر بن القصّار البغدادي المالكي —
      كبير فقهاء المالكية ببغداد في العصر البويهي وقاضيها، وصاحب
      «عيون الأدلة في مسائل الخلاف بين فقهاء الأمصار» المعروف بـ«عيون
      الأدلة»، وهو من أمهات كتب المالكية في فقه الخلاف بين المذاهب،
      يبسط القول في المسائل الفقهية مستوعباً مذاهب المالكية والحنفية
      والشافعية في جميع أبواب الفروع — ببغداد سنة ٣٩٨ هـ (~١٠٠٧ م)
      كما حفظ ذلك القاضي عياض في «ترتيب المدارك وتقريب المسالك»
      ونقل عنه السبكي في «الطبقات»، وعليه نعتمد لكونه قول الأكثر.
      وقد ذكر الذهبي في «السير» سنة ٣٩٧ هـ بدلاً من ذلك، والخلاف
      بينهما في سنة واحدة فقط ويرجع إلى نوع السنة المعتبرة (هلالية أم
      ديوانية). وهو من كبار أعلام مالكية بغداد المحليين في عصره وشيخ
      القاضي عبد الوهاب البغدادي المالكي.
    description_fr: |
      al-Qāḍī Abū al-Ḥasan ʿAlī ibn ʿUmar ibn al-Qaṣṣār al-Baghdādī
      al-Mālikī — juriste et qāḍī mālikīte de premier plan dans le
      Bagdad bouyide, auteur d'*ʿUyūn al-Adilla fī Masāʾil al-Khilāf
      bayna Fuqahāʾ al-Amṣār* (couramment *ʿUyūn al-Adilla*) — l'un
      des ouvrages mālikites fondateurs de fiqh comparé, traitant
      les controverses légales entre les écoles avec citation des
      positions mālikites, ḥanafites et shāfiʿītes à travers les
      chapitres des furūʿ — mourut à Bagdad en 398 H (~1007 EC),
      selon le *Tartīb al-Madārik wa-Taqrīb al-Masālik* du qāḍī
      ʿIyāḍ et al-Subkī (le citant dans ses *Ṭabaqāt*) ; nous
      suivons cette datation, position majoritaire. Les *Siyar*
      d'al-Dhahabī donnent en alternative 397 H — le différend porte
      sur une seule année et reflète le choix du calendrier (lunaire
      ou administratif). Il est l'autorité mālikite locale principale
      à Bagdad de sa génération et le maître d'al-Qāḍī ʿAbd al-
      Wahhāb al-Baghdādī al-Mālikī.
    canonical_hijri: {year: 398, precision: year}
    canonical_gregorian: {date: 1007-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafayāt 3:329 — death at Baghdad; ʿUyūn al-Adilla as principal work."
      - source_key: dhahabi_siyar
        notes: "Siyar 17:84 — gives 397 AH (alternative); year-disagreement noted."
      - source_key: ibn_kathir_bidaya
        notes: "Year-398 chronicle entry in al-Bidāya wa-l-Nihāya 11:343."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab obituary under 398 AH 3:152."
