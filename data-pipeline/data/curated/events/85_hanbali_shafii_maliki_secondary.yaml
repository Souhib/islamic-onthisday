  - slug: death-of-al-shashi-al-qaffal
    category: scholar_death
    title_en: Death of Abū Bakr al-Shāshī al-Qaffāl — author of *Ḥilyat al-ʿUlamāʾ*
    title_ar: وفاة أبي بكر الشاشي القفّال — صاحب «حلية العلماء»
    title_fr: Mort d'Abū Bakr al-Shāshī al-Qaffāl — auteur de *Ḥilyat al-ʿUlamāʾ*
    description_en: |
      Faḫr al-Islām Abū Bakr Muḥammad ibn Aḥmad ibn al-Ḥusayn al-Shāshī
      al-Fāriqī al-Qaffāl al-Mustaẓhirī — leading Shāfiʿī jurist of
      Saljūq Baghdad and one of the senior teachers of fiqh at the
      Niẓāmiyya after Abū Isḥāq al-Shīrāzī, where he succeeded the
      latter's circle; author of *Ḥilyat al-ʿUlamāʾ fī Maʿrifat
      Madhāhib al-Fuqahāʾ* (also styled *al-Mustaẓhirī*, in honour of
      the Caliph al-Mustaẓhir bi-Llāh), one of the foundational
      Shāfiʿī comparative-fiqh works on the four schools' positions
      — died at Baghdad in Shawwāl 507 AH (~March 1114 CE) at age
      about 78, per Ibn Khallikān's *Wafayāt al-Aʿyān*, al-Dhahabī's
      *Siyar*, and Ibn al-ʿImād's *Shadharāt al-Dhahab*. He is to be
      carefully distinguished from the earlier al-Qaffāl al-Kabīr
      al-Shāshī (Muḥammad ibn ʿAlī, d. 365 AH), the Khurāsānian
      muḥaddith and Shāfiʿī uṣūlī of an entirely earlier generation;
      the two are conflated in some later compendia.
    description_ar: |
      توفي الإمام فخر الإسلام أبو بكر محمد بن أحمد بن الحسين الشاشي
      الفارقي القفّال المستظهري — كبير فقهاء الشافعية ببغداد في
      العصر السلجوقي، وأحد كبار مدرسي الفقه بالنظامية بعد أبي إسحاق
      الشيرازي، خلفه في حلقة التدريس بها، وصاحب «حلية العلماء في
      معرفة مذاهب الفقهاء» (المعروف بـ«المستظهري» نسبة إلى الخليفة
      المستظهر بالله)، وهو من الكتب الكبرى عند الشافعية في فقه
      الخلاف بين المذاهب الأربعة — ببغداد في شوال سنة ٥٠٧ هـ (~مارس
      ١١١٤ م) عن نحو ثمانٍ وسبعين سنة كما حفظ ذلك ابن خلكان في
      «الوفيات» والذهبي في «السير» وابن العماد في «الشذرات». ويفرق
      بدقة بين هذا وبين القفال الكبير الشاشي الخراساني (محمد بن علي
      ت ٣٦٥ هـ)، المحدث الأصولي الشافعي من جيل سابق بعيد؛ وقع الخلط
      بينهما في بعض المصنفات المتأخرة.
    description_fr: |
      Faḫr al-Islām Abū Bakr Muḥammad ibn Aḥmad ibn al-Ḥusayn
      al-Shāshī al-Fāriqī al-Qaffāl al-Mustaẓhirī — juriste shāfiʿīte
      de premier plan dans le Bagdad saljūqide et l'un des grands
      maîtres de fiqh de la Niẓāmiyya après Abū Isḥāq al-Shīrāzī
      auquel il succéda dans son cercle ; auteur de *Ḥilyat al-ʿUlamāʾ
      fī Maʿrifat Madhāhib al-Fuqahāʾ* (aussi nommé *al-Mustaẓhirī*,
      en l'honneur du calife al-Mustaẓhir bi-Llāh), l'un des grands
      ouvrages shāfiʿītes de fiqh comparé des quatre écoles —
      mourut à Bagdad en Shawwāl 507 H (~mars 1114 EC) à l'âge
      d'environ 78 ans, selon les *Wafayāt al-Aʿyān* d'Ibn Khallikān,
      les *Siyar* d'al-Dhahabī et les *Shadharāt al-Dhahab* d'Ibn
      al-ʿImād. Il est à distinguer soigneusement de l'antérieur
      al-Qaffāl al-Kabīr al-Shāshī (Muḥammad ibn ʿAlī, m. 365 H),
      le muḥaddith et uṣūlī shāfiʿīte khurasanien d'une génération
      entièrement antérieure ; les deux sont confondus dans certains
      recueils tardifs.
    canonical_hijri: {year: 507, month: 10, precision: month}
    canonical_gregorian: {date: 1114-03-01, precision: month, method: tabular_conversion}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
        notes: "Wafayāt 4:201 — death Shawwāl 507 AH at Baghdad; Ḥilyat al-ʿUlamāʾ as principal work."
      - source_key: dhahabi_siyar
        notes: "Siyar 19:393 — confirms Shawwāl 507 AH, age ~78; succeeded al-Shīrāzī at the Niẓāmiyya."
      - source_key: ibn_kathir_bidaya
        notes: "Year-507 chronicle entry in al-Bidāya wa-l-Nihāya 12:181."
      - source_key: ibn_imad_shadharat
        notes: "Shadharāt al-Dhahab obituary under 507 AH 4:18."
