  - slug: death-of-ibn-battah-al-ukbari
    category: scholar_death
    title_en: Death of Ibn Baṭṭa al-ʿUkbarī — author of *al-Ibāna al-Kubrā*
    title_ar: وفاة ابن بطة العكبري — صاحب «الإبانة الكبرى»
    title_fr: Mort d'Ibn Baṭṭa al-ʿUkbarī — auteur d'*al-Ibāna al-Kubrā*
    description_en: |
      Abū ʿAbd Allāh ʿUbayd Allāh ibn Muḥammad ibn Muḥammad ibn Ḥamdān
      al-ʿUkbarī, known as Ibn Baṭṭa — Ḥanbalī jurist, traditionist
      and creedal authority of ʿUkbarā (a town on the Tigris north of
      Baghdad), and author of *al-Ibāna ʿan Sharīʿat al-Firqa al-Nājiya*
      (commonly known as *al-Ibāna al-Kubrā*) — one of the foundational
      Sunni creedal compendia of the late 4th-century AH Baghdadi
      Ḥanbalī tradition — died at ʿUkbarā in 387 AH (~997 CE) at age
      about 84, per al-Dhahabī's *Siyar* and Ibn al-ʿImād's *Shadharāt
      al-Dhahab*. *al-Ibāna al-Kubrā* preserves ḥadīth-supported
      formulations of the Sunni position on the divine attributes,
      *qadar*, the status of the Companions, and the early Khārijī /
      Muʿtazilī controversies; it is one of the earliest extant works
      to systematize the Ḥanbalī creedal corpus before al-Lalakāʾī's
      *Sharḥ Uṣūl Iʿtiqād*. Some later ḥadīth critics (notably
      al-Khaṭīb al-Baghdādī and al-Dhahabī himself) flagged
      transmissional weaknesses in parts of his hearing chains while
      preserving him in the higher rank of the *thiqāt* overall.
    description_ar: |
      توفي الإمام أبو عبد الله عبيد الله بن محمد بن محمد بن حمدان العكبري
      المعروف بـابن بطّة — فقيه الحنابلة ومحدثهم وعالم العقيدة في
      عُكْبَرَى (بلدة على دجلة شمال بغداد)، وصاحب «الإبانة عن شريعة
      الفرقة الناجية» المعروفة بـ«الإبانة الكبرى»، وهو من المصنفات
      الكبرى عند أهل السنة في علم الاعتقاد في تراث الحنابلة البغداديين
      أواخر القرن الرابع — بعكبرى سنة ٣٨٧ هـ (~٩٩٧ م) عن نحو أربع
      وثمانين سنة كما في «سير أعلام النبلاء» للذهبي و«شذرات الذهب»
      لابن العماد. تحفظ «الإبانة الكبرى» تقريرات أهل السنة في الصفات
      والقدر ومنزلة الصحابة والرد على الخوارج والمعتزلة بأسانيدها،
      وهي من أقدم المتون التي بسطت العقيدة الحنبلية تأصيلاً قبل «شرح
      أصول الاعتقاد» للالكائي. وقد نبه بعض النقاد المتأخرين كالخطيب
      البغدادي والذهبي إلى لين في بعض أسانيد سماعاته مع إبقائه في
      جملة الثقات.
    description_fr: |
      Abū ʿAbd Allāh ʿUbayd Allāh ibn Muḥammad ibn Muḥammad ibn Ḥamdān
      al-ʿUkbarī, dit Ibn Baṭṭa — juriste, traditionniste et autorité
      en credo ḥanbalite à ʿUkbarā (ville du Tigre au nord de Bagdad),
      et auteur d'*al-Ibāna ʿan Sharīʿat al-Firqa al-Nājiya* (connue
      sous le nom d'*al-Ibāna al-Kubrā*) — l'un des grands recueils
      de credo sunnite de la tradition ḥanbalite bagdadienne de la
      fin du IVe siècle hégirien — mourut à ʿUkbarā en 387 H (~997 EC)
      à l'âge d'environ 84 ans, selon les *Siyar* d'al-Dhahabī et les
      *Shadharāt al-Dhahab* d'Ibn al-ʿImād. *al-Ibāna al-Kubrā*
      préserve les formulations ḥadīthiques sunnites sur les attributs
      divins, le *qadar*, la rang des Compagnons et les premières
      controverses khārijites et muʿtazilites ; c'est l'un des plus
      anciens ouvrages systématiques du corpus créédal ḥanbalite,
      antérieur au *Sharḥ Uṣūl Iʿtiqād* d'al-Lalakāʾī. Plusieurs
      critiques ḥadīthiques tardifs (notamment al-Khaṭīb al-Baghdādī
      et al-Dhahabī lui-même) ont signalé des faiblesses
      transmissionnelles dans certaines de ses chaînes d'audition,
      tout en le maintenant dans le rang supérieur des *thiqāt*.
    canonical_hijri: {year: 387, precision: year}
    canonical_gregorian: {date: 997-01-01, precision: year, method: attested}
    claims:
