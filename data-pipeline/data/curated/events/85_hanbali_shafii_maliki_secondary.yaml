  - slug: death-of-abu-al-hasan-al-mahamili
    category: scholar_death
    title_en: Death of Abū al-Ḥasan al-Maḥāmilī — Shāfiʿī mufti and author of *al-Lubāb*
    title_ar: وفاة أبي الحسن المحاملي — مفتي الشافعية وصاحب «اللباب»
    title_fr: Mort d'Abū al-Ḥasan al-Maḥāmilī — muftī shāfiʿīte et auteur d'*al-Lubāb*
    description_en: |
      Abū al-Ḥasan Aḥmad ibn Muḥammad ibn Aḥmad al-Ḍabbī al-Maḥāmilī
      al-Baghdādī — Shāfiʿī jurist of late-Buyid Baghdad, student of
      Abū Ḥāmid al-Isfarāʾīnī (with whom he constituted a teaching
      pair at the city's Shāfiʿī circles), and author of three
      compact and influential fiqh manuals — *al-Tajrīd*, *al-Lubāb*
      (an important late Iraqī Shāfiʿī compendium), and *al-Majmūʿ*
      — died at Baghdad in Rabīʿ al-Awwal 415 AH (~May 1024 CE) at
      age about 67, per al-Dhahabī's *Siyar*, Ibn Khallikān's
      *Wafayāt*, and al-Subkī's *Ṭabaqāt al-Shāfiʿiyya al-Kubrā*.
      *al-Lubāb* in particular is repeatedly cited by al-Nawawī in
      his *Majmūʿ Sharḥ al-Muhadhdhab* and was a fixture of pre-
      Ghazālī Iraqī Shāfiʿī instruction. He is the *grand-father*
      of Sutayta bint al-Maḥāmilī, the celebrated Shāfiʿī
      jurist-arithmetician (d. 377 AH) — a different generation; he
      is to be carefully distinguished from his earlier kinsman
      al-Qāḍī Abū ʿAbd Allāh al-Maḥāmilī (d. 330 AH), the muḥaddith.
    description_ar: |
      توفي الإمام أبو الحسن أحمد بن محمد بن أحمد الضبّي المحاملي
      البغدادي — فقيه الشافعية ببغداد في أواخر العصر البويهي،
      تلميذ أبي حامد الإسفراييني (وكانا قرينين في الفتيا في حلق
      الشافعية بالعاصمة)، وصاحب ثلاثة كتب فقه مختصرة مؤثرة:
      «التجريد» و«اللباب» (من أمات كتب العراقيين الشافعية المتأخرة)
      و«المجموع» — ببغداد في ربيع الأول سنة ٤١٥ هـ (~مايو ١٠٢٤ م)
      عن نحو سبع وستين سنة، كما حفظ ذلك الذهبي في «السير» وابن خلكان
      في «الوفيات» والسبكي في «طبقات الشافعية الكبرى». وكتاب «اللباب»
      من الكتب التي يكثر النووي من النقل عنها في «المجموع شرح المهذب»،
      وكان مقرراً من مقررات الشافعية العراقيين قبل الغزالي. وهو جد
      ستيتة بنت المحاملي الفقيهة الحاسبة الشافعية المشهورة (ت ٣٧٧ هـ)
      من جيل سابق، ويُحذر من الخلط بينه وبين قريبه القاضي أبي عبد
      الله المحاملي المحدث (ت ٣٣٠ هـ).
    description_fr: |
      Abū al-Ḥasan Aḥmad ibn Muḥammad ibn Aḥmad al-Ḍabbī al-Maḥāmilī
      al-Baghdādī — juriste shāfiʿīte du Bagdad bouyide tardif,
      disciple d'Abū Ḥāmid al-Isfarāʾīnī (avec lequel il formait un
      tandem dans les cercles shāfiʿītes de la capitale), et auteur
      de trois manuels de fiqh compacts et influents — *al-Tajrīd*,
      *al-Lubāb* (compendium shāfiʿīte tardif important pour les
      Irakiens) et *al-Majmūʿ* — mourut à Bagdad en Rabīʿ I 415 H
      (~mai 1024 EC) à l'âge d'environ 67 ans, selon les *Siyar*
      d'al-Dhahabī, les *Wafayāt* d'Ibn Khallikān et les *Ṭabaqāt
      al-Shāfiʿiyya al-Kubrā* d'al-Subkī. *al-Lubāb* en particulier
      est cité à plusieurs reprises par al-Nawawī dans son *Majmūʿ
      Sharḥ al-Muhadhdhab* et fut un texte de référence dans
      l'enseignement shāfiʿīte irakien pré-ghazālien. Il est le
      grand-père de Sutayta bint al-Maḥāmilī, la célèbre juriste-
      arithméticienne shāfiʿīte (m. 377 H) — d'une génération
      antérieure ; à ne pas confondre avec son parent plus ancien
      al-Qāḍī Abū ʿAbd Allāh al-Maḥāmilī, le muḥaddith (m. 330 H).
    canonical_hijri: {year: 415, month: 3, precision: month}
    canonical_gregorian: {date: 1024-05-01, precision: month, method: tabular_conversion}
