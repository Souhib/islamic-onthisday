  - slug: death-of-ibn-al-banna-al-hanbali
    category: scholar_death
    title_en: Death of Ibn al-Bannāʾ al-Ḥanbalī — Baghdadi polymath of the school
    title_ar: وفاة ابن البناء الحنبلي — موسوعي بغداد من فقهاء المذهب
    title_fr: Mort d'Ibn al-Bannāʾ al-Ḥanbalī — polymathe bagdadien de l'école
    description_en: |
      Abū ʿAlī al-Ḥasan ibn Aḥmad ibn ʿAbd Allāh ibn al-Bannāʾ — Ḥanbalī
      jurist, mufassir, traditionist, grammarian and notable diarist
      of late-Buyid Baghdad, author of works in tafsīr, fiqh, uṣūl,
      and a pioneering autobiographical journal preserved in part by
      Ibn al-Jawzī — died at Baghdad on Tuesday 5 Rajab 471 AH
      (~January 1079 CE), per Ibn Rajab's *Dhayl Ṭabaqāt al-Ḥanābila*
      and al-Dhahabī's *Siyar Aʿlām al-Nubalāʾ*. Some classical
      sources record the burial on 6 Rajab; we follow the day-of-
      death given in Ibn Rajab and reported by Ibn al-Jawzī. He was
      a student of al-Qāḍī Abū Yaʿlā al-Farrāʾ and a teacher of the
      Sharīf Abū Jaʿfar al-Hāshimī, fitting in the same generation
      that produced Ibn ʿAqīl. The breadth of his output (over 150
      titles attested) and his fragmentary diary make him an unusually
      well-documented figure of the late-Abbasid Baghdadi madhhab.
    description_ar: |
      توفي الإمام أبو علي الحسن بن أحمد بن عبد الله ابن البنّاء الحنبلي
      — فقيه ومفسر ومحدث ولغوي وصاحب يوميات شخصية من فقهاء بغداد في
      أواخر العهد البويهي، له تصانيف في التفسير والفقه والأصول، ومذكرة
      شخصية رائدة لم يصلنا منها إلا فقرات حفظها ابن الجوزي — ببغداد
      يوم الثلاثاء الخامس من رجب سنة ٤٧١ هـ (~يناير ١٠٧٩ م) كما حفظ
      ذلك ابن رجب في «ذيل طبقات الحنابلة» والذهبي في «السير». ذكر
      بعض المصادر أن دفنه كان يوم السادس من رجب، ونعتمد يوم الوفاة
      كما عند ابن رجب وابن الجوزي. تتلمذ على القاضي أبي يعلى الفرّاء،
      وعلّم الشريف أبا جعفر الهاشمي، فهو من طبقة ابن عقيل. وسعة
      تصانيفه (أكثر من ١٥٠ كتاباً) ومذكرته الناجية من الضياع تجعله
      من أحسن أعلام المذهب البغدادي توثيقاً في تلك الحقبة.
    description_fr: |
      Abū ʿAlī al-Ḥasan ibn Aḥmad ibn ʿAbd Allāh ibn al-Bannāʾ —
      juriste ḥanbalite, mufassir, traditionniste, grammairien et
      auteur d'un journal personnel notable du Bagdad bouyide tardif ;
      il composa des ouvrages de tafsīr, de fiqh et d'uṣūl ainsi
      qu'un journal autobiographique pionnier dont des fragments
      furent préservés par Ibn al-Jawzī — mourut à Bagdad le mardi
      5 Rajab 471 H (~janvier 1079 EC), selon le *Dhayl Ṭabaqāt
      al-Ḥanābila* d'Ibn Rajab et les *Siyar Aʿlām al-Nubalāʾ*
      d'al-Dhahabī. Certaines sources classiques placent l'inhumation
      au 6 Rajab ; nous suivons la date de décès retenue par Ibn
      Rajab et Ibn al-Jawzī. Disciple du qāḍī Abū Yaʿlā al-Farrāʾ
      et maître du sharīf Abū Jaʿfar al-Hāshimī, il appartient à la
      génération qui produisit Ibn ʿAqīl. L'étendue de ses écrits
      (plus de 150 titres attestés) et son journal partiellement
      conservé en font l'une des figures les mieux documentées du
      madhhab bagdadien de cette période.
    canonical_hijri: {year: 471, month: 7, day: 5, precision: day}
    canonical_gregorian: {date: 1079-01-13, precision: day, method: tabular_conversion}
