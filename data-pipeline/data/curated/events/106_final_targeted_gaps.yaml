  - slug: death-of-sayyida-nafisa
    category: scholar_death
    title_en: Death of Sayyida Nafisa — Granddaughter of al-Hasan
    title_ar: وفاة السيدة نفيسة — حفيدة الحسن
    title_fr: Mort de Sayyida Nafisa — petite-fille d'al-Hasan
    description_en: |
      Sayyida Nafisa bint al-Hasan ibn Zayd ibn al-Hasan ibn Ali
      ibn Abi Talib — great-granddaughter of the Prophet's ﷺ
      grandson al-Hasan, and one of the most renowned female
      scholars of early Islamic Egypt — died in Cairo in 208 AH /
      824 CE. She was a muhadditha who transmitted hadith from
      Malik ibn Anas and other Medinan scholars. Ibn Khallikan
      records that her funeral prayer was led by the governor of
      Egypt and that the entire population of Fustat attended her
      burial at the foot of the Muqattam Hills. Her tomb remains
      a site of visitation in Cairo. She represents the
      continuation of Ahl al-Bayt scholarship in the generation
      after the Tabi'in.
    description_ar: |
      توفيت السيدة نفيسة بنت الحسن بن زيد بن الحسن بن علي بن
      أبي طالب — حفيدة حفيد النبي ﷺ الحسن، ومن أشهر
      العالمات في مصر الإسلامية الأولى — بالقاهرة سنة ٢٠٨
      هـ/٨٢٤ ميلادي. وكانت محدثة تروي عن مالك بن أنس وغيره
      من علماء المدينة. وذكر ابن خلّكان أن صلاة الجنازة
      عليها أداها والي مصر، وحضر دفنها عموم أهل الفسطاط.
      وضريحها بأقدام جبل المقطم مقصد زائرين إلى اليوم.
      وهي تمثل استمرار علم أهل البيت في الجيل الذي يلي
      التابعين.
    description_fr: |
      Sayyida Nafisa bint al-Hasan ibn Zayd ibn al-Hasan ibn Ali
      ibn Abi Talib — arrière-petite-fille d'al-Hasan, petit-fils
      du Prophète ﷺ, et l'une des savantes les plus renommées
      de l'Égypte islamique primitive — mourut au Caire en
      208 H / 824 EC. Elle était une muḥadditha qui transmettait
      le hadith de Malik ibn Anas et d'autres savants de Médine.
      Ibn Khallikān rapporte que sa prière funéraire fut dirigée
      par le gouverneur d'Égypte et que toute la population de
      Fusṭāṭ assista à son enterrement au pied des collines du
      Muqaṭṭam. Sa tombe demeure un lieu de visite au Caire.
      Elle représente la continuation de l'érudition des Ahl
      al-Bayt dans la génération suivant les Tabi'in.
    canonical_hijri: {year: 208, precision: year}
    canonical_gregorian: {date: 824-01-01, precision: year, method: attested}
    claims:
      - source_key: ibn_khallikan_wafayat
        is_canonical: true
      - source_key: editorial
    people: [[sayyida-nafisa, subject]]
    tags: [egypt, cairo, ahl-al-bayt, hadith, female-scholar, tabiin]
    importance: notable
