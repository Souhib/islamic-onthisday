  - slug: death-of-makhdum-jahaniyan
    category: scholar_death
    title_en: Death of Makhdum Jahaniyan Jahangasht — Chishti Saint of Multan
    title_ar: وفاة مخدوم جهانيان جهانگشت — شيخ الشيوخ الجشتية بملتان
    title_fr: Mort de Makhdum Jahaniyan Jahangasht — saint chishti de Multan
    description_en: |
      Jalal al-Din Jahaniyan Jahangasht — Indian Chishti Sufi
      shaykh of Multan, known as "the world-traveller" for his
      extensive journeys across the Islamic world from Mecca to
      Central Asia — died in Uchh (present-day Pakistan) in 785 AH /
      1384 CE at about ninety. He was the spiritual successor of
      Nasir al-Din Chiragh-i Dihli and the teacher of Bahauddin
      Zakariya Multani. His Sufi doctrine emphasized strict
      adherence to the Shari'a as the foundation of the tariqa,
      and he opposed the antinomian tendencies of some later Sufi
      groups. His tomb in Uchh remains one of the most important
      pilgrimage sites in Pakistani Punjab.
    description_ar: |
      توفي جلال الدين جهانيان جهانگشت — الشيخ الصوفي
      الجشتي الهندي بملتان، المعروف بـ«جهانگشت» (المسافر
      حول العالم) لرحلاته الواسعة في العالم الإسلامي من
      مكة إلى آسيا الوسطى — بأوتش (باكستان اليوم) سنة ٧٨٥
      هـ/١٣٨٤ ميلادي عن تسعين سنة. وكان خليفة نصير الدين
      «تشيرة دلهي» وشيخ بهاء الدين زكريا الملتاني. وقد
      أكدت عقيدته الصوفية التزاماً صارماً بالشريعة كأساس
      للطريقة، وعارض ميول بعض الفرق الصوفية اللاحقة
      المناهضة للأحكام. وضريحه بأوتش من أهم مقاصد
      الزيارة في البنجاب الباكستاني.
    description_fr: |
      Jalal al-Din Jahaniyan Jahangasht — cheikh soufi chishti
      indien de Multan, connu comme « le voyageur du monde »
      pour ses voyages étendus à travers le monde islamique de
      La Mecque à l'Asie centrale — mourut à Uchh (Pakistan
      actuel) en 785 H / 1384 EC à environ quatre-vingt-dix
      ans. Il fut le successeur spirituel de Nasir al-Din
      Chiragh-i Dihli et le maître de Bahauddin Zakariya
      Multani. Sa doctrine soufie mettait l'accent sur
      l'adhérence stricte à la Sharī'a comme fondement de la
      ṭarīqa, et il s'opposa aux tendances antinomiques de
      certains groupes soufis ultérieurs. Sa tombe à Uchh
      demeure l'un des sites de pèlerinage les plus importants
      du Pendjab pakistanais.
