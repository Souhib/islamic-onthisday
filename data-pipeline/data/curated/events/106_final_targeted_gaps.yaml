  - slug: death-of-umm-salamah
    category: prophetic_era
    title_en: Death of Umm Salamah — Wise Counsel of the Prophet
    title_ar: وفاة أم سلمة — حكيمة النبي ﷺ
    title_fr: Mort de Umm Salamah — sage conseil du Prophète
    description_en: |
      Umm Salamah Hind bint Abi Umayya — the Prophet's ﷺ wife
      after Khadija and Aisha, the most politically astute of
      the Mothers of the Believers, and the source of numerous
      legal rulings in hadith — died in Medina in 59 AH /
      680 CE at about eighty-four. She was the last of the
      Prophet's ﷺ wives to die. Her hadiths on marriage,
      pilgrimage, and family law are cited in all six canonical
      collections. She is famous for her counsel to the Prophet
      ﷺ at Hudaybiyyah, when she advised him to shave his head
      and sacrifice his animal to show the Companions that the
      treaty was not a defeat. The Prophet ﷺ followed her advice
      and the Companions followed him.
    description_ar: |
      توفيت أم سلمة هند بنت أبي أمية — زوجة النبي ﷺ بعد
      خديجة وعائشة، وأحكم أمهات المؤمنين سياسياً، ومصدر
      أحكام فقهية كثيرة في الحديث — بالمدينة سنة ٥٩ هـ/٦٨٠
      ميلادي عن أربع وثمانين سنة. وكانت آخر أزواج النبي ﷺ
      وفاة. وأحاديثها في النكاح والحج وأحكام الأسرة مروية
      في جميع الكتب الستة. وهي مشهورة بمشورتها للنبي ﷺ يوم
      الحديبية، حين نصحته أن يحلق رأسه ويُضحي ليري
      الصحابة أن الصلح ليس هزيمة. فاتبع النبي ﷺ نصيحتها
      واتبعه الصحابة.
    description_fr: |
      Umm Salamah Hind bint Abi Umayya — épouse du Prophète ﷺ
      après Khadija et Aisha, la plus politiquement avisée des
      Mères des Croyants, et source de nombreux arrêts juridiques
      dans le hadith — mourut à Médine en 59 H / 680 EC à
      environ quatre-vingt-quatre ans. Elle fut la dernière des
      épouses du Prophète ﷺ à décéder. Ses hadiths sur le
      mariage, le pèlerinage et le droit familial sont cités
      dans les six collections canoniques. Elle est célèbre pour
      son conseil au Prophète ﷺ à Hudaybiyya, lorsqu'elle lui
      conseilla de se raser la tête et de sacrifier son animal
      pour montrer aux Compagnons que le traité n'était pas une
      défaite. Le Prophète ﷺ suivit son conseil et les
      Compagnons le suivirent.
    canonical_hijri: {year: 59, precision: year}
    canonical_gregorian: {date: 680-01-01, precision: year, method: attested}
    claims:
      - source_key: bukhari_sahih
        is_canonical: true
      - source_key: editorial
    people: [[umm-salamah, subject]]
    tags: [medina, mother-of-believers, hadith, hudaybiyyah, ahl-al-bayt]
    importance: notable
    verification_status: cross_verified
    source_url: "https://en.wikipedia.org/wiki/Umm_Salamah"

  - slug: death-of-muhammad-al-maghili
    category: scholar_death
    title_en: Death of Muhammad al-Maghili — Advisor to the Askias
    title_ar: وفاة محمد المغيلي — مستشار الأسكيين
    title_fr: Mort de Muhammad al-Maghili — conseiller des Askias
    description_en: |
      Muhammad ibn Abd al-Karim al-Maghili — North African Maliki
      jurist of Tlemcen who travelled to the Songhai Empire and
      became the principal religious advisor to Askia Muhammad I —
      died in the Air region of present-day Niger around 910 AH /
      1505 CE. He is credited with institutionalizing Maliki law
      as the governing code of the Songhai state and advising Askia
      Muhammad on the proper conduct of jihad against non-Muslim
      neighbors. His fatwas on governance in African Muslim
      polities circulated widely across the Sahel and influenced
      the legal framework of the Sokoto Caliphate three centuries
      later. Ibn Khaldun's continuators mention him as the link
      between North African and West African Maliki scholarship.
    description_ar: |
      توفي محمد بن عبد الكريم المغيلي — الفقيه المالكي
      المغاربي من تلمسان الذي سافر إلى إمبراطورية صنغاي
      فصار المستشار الديني الرئيسي لأسكيا محمد الأول —
      بإقليم آير في النيجر الحالية نحو سنة ٩١٠ هـ/١٥٠٥
      ميلادي. ويُنسب إليه ترسيخ المالكية كمنهج حاكم في
      دولة صنغاي، وإفتاؤه لأسكيا محمد في سلوك الجهاد ضد
      الجيران غير المسلمين. وفتاواه في حكم الممالك
      الإسلامية الأفريقية انتشرت في الساحل فأثرت في
      الإطار القانوني لخلافة صكتو بعد ثلاثة قرون. وذكره
      مستمرّو ابن خلدون حلقة الوصل بين الفقه المالكي
      المغاربي والغرب أفريقي.
    description_fr: |
      Muhammad ibn Abd al-Karim al-Maghili — juriste malikite
      nord-africain de Tlemcen qui voyagea jusqu'à l'empire du
      Songhaï et devint le principal conseiller religieux
      d'Askia Muḥammad Ier — mourut dans la région de l'Aïr
      dans l'actuel Niger vers 910 H / 1505 EC. On lui
      attribue l'institutionnalisation du droit malikite comme
      code directeur de l'État songhaï et ses fatwas sur la
      conduite du jihad contre les voisins non-musulmans.
      Ses fatwas sur la gouvernance des polités musulmanes
      africaines circulèrent largement à travers le Sahel et
      influencèrent le cadre juridique du califat de Sokoto
      trois siècles plus tard. Les continuateurs d'Ibn
      Khaldūn le mentionnent comme le lien entre l'érudition
      malikite nord-africaine et ouest-africaine.
    canonical_hijri: {year: 910, precision: year}
    canonical_gregorian: {date: 1505-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    people: [[muhammad-al-maghili, subject]]
    tags: [west-africa, songhai, tlemcen, maliki, advisor, askia]
    importance: notable
    verification_status: cross_verified
