  - slug: death-of-zheng-he
    category: explorer_death
    title_en: Death of Zheng He — Admiral of the Ming Treasure Fleets
    title_ar: وفاة جنخ خه — أمير الأساطيل الكنزية المينغية
    title_fr: Mort de Zheng He — amiral des flottes du trésor des Ming
    description_en: |
      Zheng He (Ma He, later Hajj Muhammad) — the Hui Muslim
      admiral who led seven great maritime expeditions between
      1405 and 1433 on behalf of the Ming dynasty, reaching
      Southeast Asia, India, the Persian Gulf, and the east
      coast of Africa — died at sea during the return voyage
      of the seventh expedition in 1433 CE. Born in Yunnan
      province to a Muslim family that claimed descent from
      a early governor of the province during the Mongol Yuan
      dynasty, he was captured as a boy, castrated, and became
      a eunuch in the Ming imperial household. His fleets —
      comprising hundreds of ships and tens of thousands of
      sailors — were the largest maritime expeditions in world
      history before the modern era. He established diplomatic
      relations with dozens of states and protected Chinese
      Muslim communities abroad. His tomb in Nanjing is a
      national monument.
    description_ar: |
      توفي جنخ خه (ما خه، لاحقاً الحاج محمد) — الأدميرال
      الحوي المسلم الذي قاد سبع حملات بحرية كبرى بين ١٤٠٥
      و١٤٣٣ ميلادي نيابة عن سلالة مينغ، وصلت جنوب شرق
      آسيا والهند والخليج الفارسي وساحل شرق أفريقيا —
      في البحر أثناء رحلة العودة من الحملة السابعة سنة
      ١٤٣٣ ميلادي. وُلد في مقاطعة يونان لأسرة مسلمة
      تدّعي النسب من حاكم مقاطعة مبكر في عهد سلالة
      يوان المغولية، فأُسر وهو صبي وخصي فصار خصياً
      في البلاط الإمبراطوري المينغي. وأساطيله — المؤلفة
      من مئات السفن وعشرات الآلاف من البحارة — كانت
      أكبر الحملات البحرية في التاريخ العالمي قبل العصر
      الحديث. وأقام علاقات دبلوماسية مع عشرات الدول
      وحماى المجتمعات الإسلامية الصينية في الخارج.
      وضريحه بنانجينغ نصب تذكاري وطني.
    description_fr: |
      Zheng He (Ma He, plus tard Hajj Muhammad) — l'amiral
      hui musulman qui dirigea sept grandes expéditions
      maritimes entre 1405 et 1433 au nom de la dynastie
      Ming, atteignant l'Asie du Sud-Est, l'Inde, le Golfe
      persique et la côte est de l'Afrique — mourut en mer
      lors du voyage de retour de la septième expédition en
      1433 EC. Né dans la province du Yunnan dans une famille
      musulmane qui revendiquait la descendance d'un premier
      gouverneur de la province sous la dynastie mongole Yuan,
      il fut capturé enfant, castré, et devint eunuque dans la
      maison impériale Ming. Ses flottes — composées de
      centaines de navires et de dizaines de milliers de
      marins — furent les plus grandes expéditions maritimes
      de l'histoire mondiale avant l'ère moderne. Il établit
      des relations diplomatiques avec des dizaines d'États
      et protégea les communautés musulmanes chinoises à
      l'étranger. Sa tombe à Nankin est un monument national.
    canonical_hijri: {year: 836, precision: year}
    canonical_gregorian: {date: 1433-01-01, precision: year, method: attested}
