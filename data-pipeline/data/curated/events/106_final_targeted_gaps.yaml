  - slug: death-of-shibli-al-numani
    category: scholar_death
    title_en: Death of Shibli al-Nu'mani — Founder of Nadwat al-Ulama
    title_ar: وفاة شبلي النعماني — مؤسس ندوة العلماء
    title_fr: Mort de Shibli al-Nu'mani — fondateur de Nadwat al-Ulama
    description_en: |
      Shibli al-Nu'mani — Indian Sunni Hanafi scholar, historian,
      and the founding spirit of Nadwat al-Ulama in Lucknow, the
      institution that sought a middle path between the Deobandi
      and Barelwi movements — died in Lucknow in 1332 AH / 1914
      CE at about sixty-eight. His multi-volume al-Faruq (on
      Umar ibn al-Khattab) and al-Ma'mun (on the Abbasid caliph)
      pioneered a modern historiographical approach to Islamic
      biography in Urdu. He taught that Muslims must recover
      their intellectual self-confidence by studying their own
      history critically rather than through colonial lenses.
      Nadwat al-Ulama remains one of the major seminaries of
      South Asia.
    description_ar: |
      توفي شبلي النعماني — العالم السني الهندي الحنفي،
      والمؤرخ، والروح المؤسسة لـ«ندوة العلماء» بلكناو،
      المؤسسة التي سعت لطريق وسط بين المدرستين الديوبندية
      والبريلوية — بلكناو سنة ١٣٣٢ هـ/١٩١٤ ميلادي عن ثمان
      وستين سنة. وكتاباه «الفاروق» (في عمر بن الخطاب)
      و«المأمون» (في الخليفة العباسي) أرسيا منهجاً
      تاريخياً حديثاً في كتابة السيرة بالأردية. وكان
      يعلّم أن على المسلمين استعادة ثقتهم الفكرية بدراسة
      تاريخهم بشكل نقدي لا من خلال العدسات الاستعمارية.
      ولا تزال ندوة العلماء من كبار المدارس في جنوب آسيا.
    description_fr: |
      Shibli al-Nu'mani — savant sunnite indien hanafite,
      historien et esprit fondateur de Nadwat al-Ulama à
      Lucknow, l'institution qui chercha une voie médiane
      entre les mouvements deobandi et barelwi — mourut à
      Lucknow en 1332 H / 1914 EC à environ soixante-huit
      ans. Ses ouvrages en plusieurs volumes al-Fārūq (sur
      Umar ibn al-Khaṭṭāb) et al-Ma'mūn (sur le calife
      abbasside) inaugurèrent une approche historiographique
      moderne de la biographie islamique en ourdou. Il
      enseigna que les musulmans devaient retrouver leur
      confiance intellectuelle en étudiant leur propre
      histoire de manière critique plutôt que par des
      lentilles coloniales. Nadwat al-Ulama demeure l'un
      des principaux séminaires de l'Asie du Sud.
    canonical_hijri: {year: 1332, precision: year}
    canonical_gregorian: {date: 1914-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
