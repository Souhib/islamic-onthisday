  - slug: death-of-abd-al-haqq-al-dehlawi
    category: scholar_death
    title_en: Death of Abd al-Haqq al-Dehlawi — Hadith Scholar of Delhi
    title_ar: وفاة عبد الحق الدهلوي — محدث دلهي
    title_fr: Mort d'Abd al-Haqq al-Dehlawi — muḥaddith de Delhi
    description_en: |
      Abd al-Haqq ibn Sayf al-Din al-Dehlawi — Indian Sunni
      Hanafi hadith scholar of Delhi, author of Akhbar al-Akhyar
      (biographies of the saints) and Madarij al-Nubuwwah (on
      the stages of prophethood) — died in Delhi in 1052 AH /
      1642 CE at about seventy. He was a contemporary of Shah
      Jahan and served as imam of the imperial mosque. His
      Akhbar al-Akhyar remains a standard reference for Sufi
      biographies in the Indian subcontinent, and his Madarij
      al-Nubuwwah is a major Persian work on the Prophet's ﷺ
      character and miracles. He represents the continuation of
      the pre-Waliullah hadith tradition in Mughal India.
    description_ar: |
      توفي عبد الحق بن سيف الدين الدهلوي — المحدث السني
      الهندي الحنفي بدلهي، صاحب «أخبار الأخيار» (تراجم
      الأولياء) و«مدارج النبوة» (في مراتب النبوة) — بدلهي
      سنة ١٠٥٢ هـ/١٦٤٢ ميلادي عن سبعين سنة. وكان معاصراً
      لشاه جهان وإماماً للجامع الإمبراطوري. و«أخبار
      الأخيار» لا تزال مرجعاً معتمداً في التراجم الصوفية
      بشبه القارة الهندية، و«مدارج النبوة» من كبار
      المصنفات الفارسية في شمائل النبي ﷺ ومعجزاته.
      ويمثل استمرار تراث الحديث قبل الولي اللهي في
      الهند المغولية.
    description_fr: |
      Abd al-Haqq ibn Sayf al-Din al-Dehlawi — muḥaddith
      sunnite indien hanafite de Delhi, auteur d'Akhbār
      al-Akhyār (biographies des saints) et de Madārij
      al-Nubuwwa (sur les étapes de la prophétie) — mourut
      à Delhi en 1052 H / 1642 EC à environ soixante-dix ans.
      Il fut contemporain de Shāh Jahān et imām de la
      mosquée impériale. Son Akhbār al-Akhyār demeure une
      référence standard pour les biographies soufies dans
      le sous-continent indien, et son Madārij al-Nubuwwa
      est un ouvrage persan majeur sur le caractère et les
      miracles du Prophète ﷺ. Il représente la continuation
      de la tradition du hadith pré-walīullāhī dans l'Inde
      moghole.
    canonical_hijri: {year: 1052, precision: year}
    canonical_gregorian: {date: 1642-01-01, precision: year, method: attested}
