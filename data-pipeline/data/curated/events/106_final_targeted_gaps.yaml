  - slug: death-of-idris-alooma
    category: ruler_death
    title_en: Death of Idris Alooma — Restorer of Kanem-Bornu
    title_ar: وفاة إدريس العلومي — مجدد كنعم-بورنو
    title_fr: Mort d'Idris Alooma — restaurateur du Kanem-Bornu
    description_en: |
      Idris ibn Ali Alooma — the Mai (king) of the Kanem-Bornu
      Empire in the central Sudan, under whose reign (c. 1564–1596
      CE) the empire reached its territorial and cultural zenith —
      died in Bornu around 1004 AH / 1596 CE. He was the first
      ruler of the region to import firearms from North Africa and
      the Ottoman Empire, and he invited Maliki scholars from Egypt
      and the Maghreb to his court at Ngazargamu. The Diwan of the
      sultans of Bornu, the empire's chronicle, credits him with
      standardizing Islamic taxation, building mosques, and
      extending Kanem-Bornu's authority over the trans-Saharan
      trade routes from Libya to Lake Chad. His reign represents
      the peak of state Islamization in the central Sudan before
      the Atlantic slave trade destabilized the region.
    description_ar: |
      توفي إدريس بن علي العلومي — «الماي» (الملك) لإمبراطورية
      كنعم-بورنو في السودان الأوسط، التي بلغت في عهده (نحو
      ٩٧٢–١٠٠٤ هـ/١٥٦٤–١٥٩٦ ميلادي) أقصى اتساعها
      الحضاري والسياسي — ببورنو نحو سنة ١٠٠٤ هـ/١٥٩٦
      ميلادي. وكان أول حكام الإقليم يستورد البنادق من
      شمال أفريقيا والدولة العثمانية، واستضاف فقهاء
      مالكيين من مصر والمغرب في بلاطه بنغازرغمو. وينسب
      إليه ديوان سلاطين بورنو (تاريخ الإمبراطورية) توحيد
      الضرائب الإسلامية وبناء المساجد وبسط سلطة كنعم-بورنو
      على طرق التجارة عبر الصحراء من ليبيا إلى تشاد.
      ويمثل عهده ذروة تأسيس الدولة الإسلامية في السودان
      الأوسط قبل أن يزعزع تجارة الرقيق الأطلسي الإقليم.
    description_fr: |
      Idris ibn Ali Alooma — le Mai (roi) de l'empire du
      Kanem-Bornu dans le Soudan central, sous le règne duquel
      (c. 1564–1596 EC) l'empire atteignit son zénith
      territorial et culturel — mourut au Bornu vers 1004 H /
      1596 EC. Il fut le premier souverain de la région à
      importer des armes à feu d'Afrique du Nord et de l'Empire
      ottoman, et il invita des juristes malikites d'Égypte et
      du Maghreb à sa cour de Ngazargamu. Le Diwan des sultans
      du Bornu, la chronique de l'empire, lui attribue
      l'uniformisation de la fiscalité islamique, la
      construction de mosquées et l'extension de l'autorité du
      Kanem-Bornu sur les routes commerciales transsahariennes
      de la Libye au lac Tchad. Son règne représente l'apogée
      de l'islamisation étatique dans le Soudan central avant
      que la traite atlantique n'ébranle la région.
    canonical_hijri: {year: 1004, precision: year}
    canonical_gregorian: {date: 1596-01-01, precision: year, method: attested}
    claims:
      - source_key: ei2
        is_canonical: true
      - source_key: editorial
    people: [[idris-alooma, subject]]
