# Wave 106 — Final targeted gap-filling events (2026-04-30).
# Covers major Sunni figures and milestones genuinely absent from the
# existing dataset: two of the Four Imams (Malik, Shafi'i); the Mujaddid
# of the second millennium (Ahmad Sirhindi); foundational female figures
# (Sayyida Nafisa, Umm Salamah); Kanem-Bornu (Idris Alooma); West African
# scholarly advisory (al-Maghili); Chinese Muslim exploration (Zheng He);
# and South Asian hadith and Chishti lines.

events:
  - slug: death-of-ahmad-sirhindi
    category: scholar_death
    title_en: Death of Ahmad Sirhindi — Mujaddid Alf Thani
    title_ar: وفاة أحمد السرهندي — مجدد الألف الثاني
    title_fr: Mort d'Ahmad Sirhindi — Mujaddid Alf Thani
    description_en: |
      Ahmad al-Faruqi al-Sirhindi — the "Renewer of the Second
      Millennium," Indian Naqshbandi Sufi scholar, and the most
      influential figure in the restoration of Sunni orthodoxy
      in Mughal India after the heterodox innovations of Akbar's
      court — died in Sirhind in 1034 AH / 1624 CE at about
      sixty-three. His letters (Maktubat) to Mughal nobles and
      scholars defended the Shari'a against syncretism and
      established the Naqshbandi-Mujaddidi order as the
      dominant Sufi path of South Asia. Shah Waliullah later
      called him "the paragon of this age." His tomb in Sirhind
      remains one of the most visited in the Indian subcontinent.
    description_ar: |
      توفي أحمد الفاروقي السرهندي — «مجدد الألف الثاني»،
      والعالم الصوفي النقشبندي الهندي، وأكثر الشخصيات
      تأثيراً في استعادة السنة في الهند المغولية بعد
      البدع المحدثة في بلاط أكبر — بسرهند سنة ١٠٣٤ هـ/١٦٢٤
      ميلادي عن ثلاث وستين سنة. ورسائله «المكتوبات» إلى
      نبلاء المغول وعلمائهم دافعت عن الشريعة ضد التوفيقية،
      وأرسخت الطريقة النقشبندية المجددية قطباً صوفياً مهماً
      في جنوب آسيا. وسمّاه الشاه ولي الله لاحقاً «قدوة
      الزمان». وضريحه بسرهند من أكثر الأضرحة زيارة في
      شبه القارة الهندية.
    description_fr: |
      Ahmad al-Faruqi al-Sirhindi — le « Renouveleur du
      Deuxième Millénaire », savant soufi naqshbandī indien
      et figure la plus influente dans la restauration de
      l'orthodoxie sunnite dans l'Inde moghole après les
      innovations hétérodoxes de la cour d'Akbar — mourut
      à Sirhind en 1034 H / 1624 EC à environ soixante-trois
      ans. Ses lettres (Maktūbāt) aux nobles et savants
      moghols défendirent la Sharī'a contre le syncrétisme
      et établirent la ṭarīqa naqshbandī-mujaddidī comme la
      voie soufie dominante de l'Asie du Sud. Shāh Walīullāh
      l'appela plus tard « le modèle de cette époque ». Sa
      tombe à Sirhind demeure l'une des plus visitées du
      sous-continent indien.
    canonical_hijri: {year: 1034, precision: year}
    canonical_gregorian: {date: 1624-01-01, precision: year, method: attested}
