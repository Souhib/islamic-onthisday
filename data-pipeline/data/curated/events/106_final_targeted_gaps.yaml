  - slug: death-of-sidi-yahya-al-tadlisi
    category: scholar_death
    title_en: Death of Sidi Yahya al-Tadlisi — Third Mosque of Timbuktu
    title_ar: وفاة سيدي يحيى التادلسي — ثالث مساجد تنبكتو
    title_fr: Mort de Sidi Yahya al-Tadlisi — troisième mosquée de Tombouctou
    description_en: |
      Sidi Yahya al-Tadlisi — Andalusian-born Maliki scholar
      who settled in Timbuktu and after whom the Sidi Yahya
      mosque was named, the third of the great mosque-madrasas
      of Timbuktu alongside the Djinguereber and Sankore —
      died in Timbuktu around 874 AH / 1469 CE. The mosque
      that bears his name was built in the same period as the
      other two great mosques, and together they formed the
      triangular scholarly complex that made Timbuktu the
      pre-eminent center of Sunni learning in the western
      Sudan. Al-Sa'di mentions him in the Tarikh al-Sudan as
      one of the early immigrant scholars who established the
      city's reputation for knowledge.
    description_ar: |
      توفي سيدي يحيى التادلسي — الفقيه المالكي الأندلسي
      المولد الذي استقر بتنبكتو ونُسبت إليه مسجد «سيدي
      يحيى»، ثالث المساجد الكبرى بتنبكتو إلى جانب
      «جنغرابر» و«سنكوري» — بتنبكتو نحو سنة ٨٧٤ هـ/١٤٦٩
      ميلادي. وقد بُني المسجد الذي يحمل اسمه في الفترة
      نفسها التي شهدت بناء المسجدين الآخرين، فكونوا معاً
      المجمع العلمي المثلث الذي جعل تنبكتو المركز
      الأبرز للعلم السني في السودان الغربي. وذكره
      السعدي في «تاريخ السودان» من جملة العلماء
      المهاجرين الأوائل الذين رسّخوا شهرة المدينة
      بالعلم.
    description_fr: |
      Sidi Yahya al-Tadlisi — juriste malikite d'origine
      andalouse qui s'installa à Tombouctou et dont la
      mosquée Sidi Yahya prit le nom, la troisième des
      grandes mosquées-madrasas de Tombouctou aux côtés de
      Djinguereber et Sankoré — mourut à Tombouctou vers
      874 H / 1469 EC. La mosquée qui porte son nom fut
      construite à la même période que les deux autres
      grandes mosquées, et ensemble elles formèrent le
      complexe savant triangulaire qui fit de Tombouctou
      le centre prééminent de l'érudition sunnite du
      Soudan occidental. Al-Saʿdī le mentionne dans le
      Tārīkh al-Sūdān comme l'un des premiers savants
      immigrants qui établirent la réputation de la ville
      pour le savoir.
