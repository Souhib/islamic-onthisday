  - slug: death-of-abd-al-razzaq-al-sanhuri
    category: scholar
    title_en: Death of ʿAbd al-Razzāq al-Sanhūrī — Codifier of Arab Civil Law
    title_ar: وفاة عبد الرزاق السنهوري — مقنن القانون المدني العربي
    title_fr: Mort de ʿAbd al-Razzāq al-Sanhūrī — codificateur du droit civil arabe
    description_en: |
      ʿAbd al-Razzāq Aḥmad al-Sanhūrī — Egyptian Sunni jurist
      of Alexandria, doctor of law from the University of Lyon
      (1926), professor of civil law at Cairo University and
      Baghdad Law College, and the principal drafter of the
      modern civil codes of Egypt (1948), Iraq (1951), Syria
      (1949), Libya (1953), and contributor to the codes of
      Kuwait, Sudan, and Bahrain — died at Alexandria on 27
      Jumādā al-Awwal 1391 AH (21 July 1971 CE) at age 75.
      He served as president of the Egyptian Council of State
      (Majlis al-Dawla) from 1949 to 1954 until forcibly
      dismissed for opposing military rule. His ten-volume
      *al-Wasīṭ fī Sharḥ al-Qānūn al-Madanī al-Jadīd*,
      published 1952-1970, weaves Mālikī and Hanafī fiqh
      together with French civil-law doctrine into a single
      systematic treatment, and remains the standard reference
      work for Arabic civil-law practice. He was Sunni in
      training and orientation; his project to integrate
      classical Sunni *muʿāmalāt* into modern Arab civil
      codes is widely regarded as the most consequential
      twentieth-century rapprochement between Islamic and
      modern positive law.
    description_ar: |
      توفي العلامة عبد الرزاق أحمد السنهوري — الفقيه السني
      المصري بالإسكندرية، الحاصل على الدكتوراه في القانون من
      جامعة ليون سنة ١٣٤٤ هـ (١٩٢٦ ميلادي)، أستاذ القانون
      المدني بجامعة القاهرة وبكلية الحقوق ببغداد، والصائغ
      الأول للقوانين المدنية الحديثة لمصر (سنة ١٣٦٧ هـ /
      ١٩٤٨ ميلادي) والعراق (سنة ١٣٧٠ هـ / ١٩٥١ ميلادي)
      وسوريا (سنة ١٣٦٨ هـ / ١٩٤٩ ميلادي) وليبيا (سنة ١٣٧٢ هـ
      / ١٩٥٣ ميلادي)، والمشارك في تقنين الكويت والسودان
      والبحرين — بالإسكندرية يوم ٢٧ جمادى الأولى سنة ١٣٩١ هـ
      (الموافق ٢١ جويلية ١٩٧١ ميلادي) عن خمس وسبعين سنة.
      وتولى رئاسة مجلس الدولة المصري من سنة ١٣٦٨ إلى ١٣٧٤ هـ
      (١٩٤٩-١٩٥٤ ميلادي) إلى أن أُعفي عسكرياً لمعارضته الحكم
      العسكري. وكتابه «الوسيط في شرح القانون المدني الجديد»
      في عشرة مجلدات، الصادر بين ١٣٧١ و١٣٩٠ هـ (١٩٥٢-١٩٧٠
      ميلادي)، يجمع بين الفقه المالكي والحنفي والفقه المدني
      الفرنسي في معالجة منهجية واحدة، وما يزال المرجع المعتمد
      في ممارسة القانون المدني العربي. وكان رحمه الله سنياً
      في النشأة والاتجاه؛ ومشروعه في إدماج المعاملات السنية
      الكلاسيكية في القوانين المدنية العربية الحديثة من أكبر
      محاولات التقارب بين الفقه الإسلامي والقانون الوضعي
      الحديث في القرن العشرين.
    description_fr: |
      ʿAbd al-Razzāq Aḥmad al-Sanhūrī — juriste sunnite
      égyptien d'Alexandrie, docteur en droit de l'Université
      de Lyon (1926), professeur de droit civil à
      l'Université du Caire et à la Faculté de droit de
      Bagdad, et principal rédacteur des codes civils modernes
      d'Égypte (1948), d'Iraq (1951), de Syrie (1949), de
      Libye (1953), et contributeur aux codes du Koweït, du
      Soudan et de Bahreïn — mourut à Alexandrie le 27
      Jumādā al-Awwal 1391 H (21 juillet 1971 EC) à l'âge de
      75 ans. Il fut président du Conseil d'État égyptien
      (Majlis al-Dawla) de 1949 à 1954, jusqu'à son
      écartement forcé pour son opposition au régime
      militaire. Son ouvrage en dix volumes *al-Wasīṭ fī Sharḥ
      al-Qānūn al-Madanī al-Jadīd*, publié de 1952 à 1970,
      tisse ensemble le fiqh malikite et hanafite et la
      doctrine civiliste française dans un traitement
      systématique unique, et demeure la référence standard
      de la pratique civile arabe. Sunnite par formation et
      orientation, son projet d'intégrer les *muʿāmalāt*
      sunnites classiques dans les codes civils arabes
      modernes est largement considéré comme le rapprochement
      le plus conséquent du XXe siècle entre droit islamique
      et droit positif moderne.
