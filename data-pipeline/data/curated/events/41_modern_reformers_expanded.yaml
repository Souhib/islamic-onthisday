  - slug: death-of-abd-al-halim-mahmud
    category: scholar
    title_en: Death of ʿAbd al-Ḥalīm Maḥmūd — Shaykh of al-Azhar
    title_ar: وفاة الشيخ عبد الحليم محمود — شيخ الأزهر
    title_fr: Mort de ʿAbd al-Ḥalīm Maḥmūd — Cheikh d'al-Azhar
    description_en: |
      ʿAbd al-Ḥalīm Maḥmūd — Egyptian Sunni Azharī scholar,
      Sufi-reformist thinker, and the 40th Grand Shaykh of
      al-Azhar from Muḥarram 1393 AH (March 1973 CE) until
      his death — died at Cairo on 15 Dhū al-Qaʿda 1398 AH
      (17 October 1978 CE) at age 68. He had memorised the
      Qurʾan in childhood, graduated from al-Azhar in 1932,
      and earned a doctorate in philosophy from the Sorbonne
      in 1940 with a thesis on al-Ḥārith al-Muḥāsibī. As
      Shaykh of al-Azhar he combined classical Sunni
      scholarship with a marked Sufi orientation, defended
      the integration of *taṣawwuf* within Sunni orthodoxy,
      championed the systematic teaching of philosophy
      alongside the religious sciences, and pressed for
      Islamic-law reform — among other measures advocating a
      minimum marriage age of sixteen for girls. His
      biographical works on Sunni Sufi figures — al-Muḥāsibī,
      al-Junayd, Abū al-Ḥasan al-Shādhilī, and others — are
      among the most widely read modern Arabic introductions
      to the Sunni Sufi tradition.
    description_ar: |
      توفي الشيخ عبد الحليم محمود — العالم السني الأزهري
      المصري والمفكر الصوفي الإصلاحي، شيخ الجامع الأزهر
      الأربعون من محرم سنة ١٣٩٣ هـ (مارس ١٩٧٣ ميلادي) إلى
      وفاته — بالقاهرة يوم ١٥ ذي القعدة سنة ١٣٩٨ هـ (الموافق
      ١٧ أكتوبر ١٩٧٨ ميلادي) عن ثمان وستين سنة. حفظ القرآن
      في الصغر، وتخرج من الأزهر سنة ١٣٥١ هـ (١٩٣٢ ميلادي)،
      ونال الدكتوراه في الفلسفة من جامعة السوربون سنة ١٣٥٩
      هـ (١٩٤٠ ميلادي) برسالة في الإمام الحارث المحاسبي.
      ولما تولى مشيخة الأزهر جمع بين العلم السني الكلاسيكي
      والاتجاه الصوفي السني الواضح، فدافع عن إدراج التصوف
      في صلب أهل السنة، وأقام تدريس الفلسفة بانتظام مع علوم
      الشريعة، ودعا إلى إصلاح قانون الأحوال الشخصية — ومن
      ذلك تحديد سن الزواج بالنسبة للفتاة بست عشرة سنة. وله
      رحمه الله ترجمات للأعلام السنيين الصوفيين — كالحارث
      المحاسبي والجنيد البغدادي وأبي الحسن الشاذلي وغيرهم
      — هي من أوسع مداخل قراء العربية المعاصرين إلى تراث
      التصوف السني.
    description_fr: |
      ʿAbd al-Ḥalīm Maḥmūd — savant sunnite azharī égyptien,
      penseur soufi-réformateur, et 40e Grand Cheikh d'al-Azhar
      de Muḥarram 1393 H (mars 1973 EC) jusqu'à sa mort —
      mourut au Caire le 15 Dhū al-Qaʿda 1398 H (17 octobre
      1978 EC) à l'âge de 68 ans. Il avait mémorisé le Coran
      dans l'enfance, fut diplômé d'al-Azhar en 1932, et
      obtint un doctorat de philosophie à la Sorbonne en 1940
      avec une thèse sur al-Ḥārith al-Muḥāsibī. Comme Cheikh
      d'al-Azhar il conjugua l'érudition sunnite classique à
      une orientation soufie marquée, défendit l'intégration
      du *taṣawwuf* dans l'orthodoxie sunnite, soutint
      l'enseignement systématique de la philosophie aux côtés
      des sciences religieuses, et pressa pour la réforme du
      droit personnel — préconisant entre autres un âge
      minimum de mariage de seize ans pour les filles. Ses
      ouvrages biographiques sur les figures soufies sunnites
      — al-Muḥāsibī, al-Junayd, Abū al-Ḥasan al-Shādhilī et
      d'autres — comptent parmi les introductions arabes
      modernes les plus lues à la tradition soufie sunnite.
