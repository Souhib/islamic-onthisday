  - slug: death-of-muhammad-ali-al-sabuni
    category: scholar
    title_en: Death of Muḥammad ʿAlī al-Ṣābūnī — Author of *Ṣafwat al-Tafāsīr*
    title_ar: وفاة محمد علي الصابوني — صاحب «صفوة التفاسير»
    title_fr: Mort de Muḥammad ʿAlī al-Ṣābūnī — auteur de *Ṣafwat al-Tafāsīr*
    description_en: |
      Muḥammad ʿAlī al-Ṣābūnī — Syrian Sunni Hanafī-Māturīdī
      scholar of Aleppo and prolific contemporary writer on
      tafsīr, ḥadīth, fiqh, and Qurʾanic sciences, best known
      for his condensed Qurʾanic exegesis *Ṣafwat al-Tafāsīr*
      (a digest drawing principally on al-Ṭabarī, Ibn Kathīr,
      and al-Qurṭubī) — died at Yalova in Turkey on 5 Shaʿbān
      1442 AH (19 March 2021 CE) at age 91. He had taught at
      Umm al-Qurā University in Mecca for many years before
      returning eastward in his later life. His other works
      include *Mukhtaṣar Tafsīr Ibn Kathīr*, *Rawāʾiʿ al-Bayān
      fī Tafsīr Āyāt al-Aḥkām*, and *al-Tibyān fī ʿUlūm al-
      Qurʾān*; together they form one of the most widely
      circulated condensed-tafsīr corpuses in modern Sunni
      publishing, translated into Turkish, Bosnian, Urdu, and
      Indonesian, and used in thousands of Sunni mosques and
      study circles worldwide.
    description_ar: |
      توفي الشيخ محمد علي الصابوني — العالم السني السوري على
      المذهب الحنفي الماتريدي بمدينة حلب، والمصنف المعاصر
      المكثر في علوم التفسير والحديث والفقه وعلوم القرآن،
      أشهر مؤلفاته «صفوة التفاسير» وهو تفسير مختصر معتمد
      أساساً على «جامع البيان» للطبري و«تفسير القرآن العظيم»
      لابن كثير و«الجامع لأحكام القرآن» للقرطبي — بمدينة يالوا
      التركية يوم ٥ شعبان سنة ١٤٤٢ هـ (الموافق ١٩ مارس ٢٠٢١
      ميلادي) عن إحدى وتسعين سنة. درّس بجامعة أم القرى بمكة
      المكرمة سنين طويلة قبل أن يعود شرقاً في أواخر عمره.
      ومن مؤلفاته الأخرى: «مختصر تفسير ابن كثير» و«روائع
      البيان في تفسير آيات الأحكام» و«التبيان في علوم القرآن».
      ومجموع هذه الكتب يكوّن أحد أوسع مدوّنات التفسير
      المختصر تداولاً في الطباعة السنية المعاصرة، ترجمت إلى
      التركية والبوسنية والأردية والإندونيسية، وتدرّس في
      آلاف المساجد والدوارس السنية حول العالم.
    description_fr: |
      Muḥammad ʿAlī al-Ṣābūnī — savant sunnite syrien
      hanafite-maturidite d'Alep et écrivain contemporain
      prolifique en *tafsīr*, *ḥadīth*, *fiqh* et sciences
      coraniques, le plus connu pour son exégèse coranique
      condensée *Ṣafwat al-Tafāsīr* (un abrégé puisant
      principalement chez al-Ṭabarī, Ibn Kathīr et al-
      Qurṭubī) — mourut à Yalova en Turquie le 5 Shaʿbān
      1442 H (19 mars 2021 EC) à l'âge de 91 ans. Il enseigna
      pendant de longues années à l'Université Umm al-Qurā à
      La Mecque avant de revenir vers l'orient en fin de vie.
      Ses autres ouvrages comprennent *Mukhtaṣar Tafsīr Ibn
      Kathīr*, *Rawāʾiʿ al-Bayān fī Tafsīr Āyāt al-Aḥkām* et
      *al-Tibyān fī ʿUlūm al-Qurʾān*; ensemble ils constituent
      l'un des corpus de *tafsīr* abrégé les plus largement
      diffusés dans l'édition sunnite moderne, traduits en
      turc, bosniaque, ourdou et indonésien, et utilisés dans
      des milliers de mosquées et de cercles d'étude sunnites
      dans le monde entier.
