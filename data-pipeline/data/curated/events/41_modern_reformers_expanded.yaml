  # PAN-ISLAMIC REFORM
  # =========================================================================

  - slug: death-of-jamal-al-din-al-afghani
    category: scholar
    title_en: Death of Jamāl al-Dīn al-Afghānī — Pan-Islamic Reformer
    title_ar: وفاة جمال الدين الأفغاني — رائد الجامعة الإسلامية
    title_fr: Mort de Jamāl al-Dīn al-Afghānī — réformateur panislamique
    description_en: |
      Jamāl al-Dīn al-Afghānī (also known as al-Asadābādī) — a
      late-nineteenth-century Muslim political activist, journalist
      and intellectual whose travels through Iran, Afghanistan,
      India, Egypt, France, and the Ottoman lands made him the
      leading public voice of pan-Islamic reform in his
      generation, and the principal teacher of Muḥammad ʿAbduh
      in Cairo — died of cancer of the jaw at Istanbul on
      5 Shawwāl 1314 AH (9 March 1897 CE) and was buried there.
      He was about 58. Together with ʿAbduh he co-edited the
      Paris-based journal *al-ʿUrwa al-Wuthqa* (1884) which
      called for Muslim political solidarity against European
      colonial expansion and for institutional reform of Sunni
      learning. His twin themes — that Islamic civilisation
      possessed the rational and ethical resources for renewal,
      and that political weakness flowed from intellectual
      stagnation rather than from religion itself — defined the
      framework within which both Salafi-modernist and later
      Sunni reformist currents would develop.
    description_ar: |
      توفي جمال الدين الأفغاني (المعروف أيضاً بالأسد آبادي) —
      من أبرز الناشطين السياسيين والصحفيين والمفكرين المسلمين
      في أواخر القرن التاسع عشر، صاحب الرحلات الطويلة في
      إيران وأفغانستان والهند ومصر وفرنسا والدولة العثمانية،
      والصوت العام الأكبر للجامعة الإسلامية الإصلاحية في جيله،
      وأستاذ الإمام محمد عبده الأكبر في القاهرة — بسرطان الفك
      بالأستانة يوم ٥ شوال سنة ١٣١٤ هـ (الموافق ٩ مارس ١٨٩٧
      ميلادي) ودفن بها. وقد ناهز الثامنة والخمسين. وقد أصدر
      مع تلميذه محمد عبده مجلة «العروة الوثقى» في باريس سنة
      ١٣٠١ هـ (١٨٨٤ ميلادي) داعياً فيها إلى التضامن السياسي
      الإسلامي في وجه التوسع الاستعماري الأوروبي وإلى الإصلاح
      المؤسسي للتعليم السني. وفكرتاه التوأمتان — أن الحضارة
      الإسلامية تملك من الموارد العقلية والأخلاقية ما يكفي
      للنهضة، وأن الضعف السياسي إنما ينشأ من الجمود الفكري
      لا من الدين نفسه — قعّدتا الإطار الذي تفرعت عنه تيارات
      السلفية الحديثة وحركات الإصلاح السني اللاحقة.
    description_fr: |
      Jamāl al-Dīn al-Afghānī (également connu sous le nom
      d'al-Asadābādī) — militant politique, journaliste et
      intellectuel musulman de la fin du XIXe siècle dont les
      voyages à travers l'Iran, l'Afghanistan, l'Inde, l'Égypte,
      la France et les terres ottomanes firent de lui la
      principale voix publique de la réforme panislamique de
      sa génération, et le maître principal de Muḥammad ʿAbduh
      au Caire — mourut d'un cancer de la mâchoire à Istanbul
      le 5 Shawwāl 1314 H (9 mars 1897 EC) et y fut enterré.
      Il avait environ 58 ans. Avec ʿAbduh il co-dirigea la
      revue parisienne *al-ʿUrwa al-Wuthqa* (1884), qui appela
      à la solidarité politique musulmane face à l'expansion
      coloniale européenne et à la réforme institutionnelle de
      l'enseignement sunnite. Ses deux thèmes jumeaux — que la
      civilisation islamique possédait les ressources
      rationnelles et éthiques pour son renouveau, et que la
      faiblesse politique découlait de la stagnation
      intellectuelle plutôt que de la religion elle-même —
      définirent le cadre dans lequel se développeraient à la
      fois les courants salafi-modernistes et les courants
      réformistes sunnites ultérieurs.
