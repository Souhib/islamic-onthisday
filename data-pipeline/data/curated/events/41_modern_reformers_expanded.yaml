  - slug: death-of-maruf-al-dawalibi
    category: scholar
    title_en: Death of Maʿrūf al-Dawālībī — Syrian Hanafī Scholar-Statesman
    title_ar: وفاة معروف الدواليبي — العالم الحنفي السوري ورجل الدولة
    title_fr: Mort de Maʿrūf al-Dawālībī — savant et homme d'État syrien hanafite
    description_en: |
      Maʿrūf al-Dawālībī — Syrian Sunni Hanafī jurist of Aleppo,
      doctor of law from the Sorbonne, twice prime minister of
      Syria (briefly in 1370 AH / 1951 CE and again in 1381-
      1382 AH / 1961-1962 CE), founding figure of the Muslim
      World League's organisation of contemporary Islamic
      jurisprudence, and after 1383 AH (1963 CE) advisor on
      Islamic affairs to successive Saudi kings — died at
      Riyadh on 22 Dhū al-Qaʿda 1424 AH (15 January 2004 CE)
      at age 94 and was buried at al-Baqīʿ Cemetery in Medina.
      He had combined a classical Hanafī training with a
      doctorate in comparative civil law from Paris, and his
      writings on Islamic law in modern legal codification
      sought to articulate a Hanafī framework able to inform
      twentieth-century Muslim states. He participated in the
      Islamic Conference of Mecca and the Muslim World League
      from their early years and was a longstanding voice in
      the OIC's deliberative bodies.
    description_ar: |
      توفي العلامة معروف الدواليبي — الفقيه السني السوري على
      المذهب الحنفي بمدينة حلب، الحاصل على الدكتوراه في القانون
      من السوربون، ورئيس وزراء سوريا في فترتين قصيرتين (سنة
      ١٣٧٠ هـ / ١٩٥١ ميلادي ثم سنة ١٣٨١-١٣٨٢ هـ / ١٩٦١-١٩٦٢
      ميلادي)، ومن مؤسسي تنظيم الفقه الإسلامي المعاصر برابطة
      العالم الإسلامي، ومستشار الشؤون الإسلامية للملوك
      السعوديين منذ سنة ١٣٨٣ هـ (١٩٦٣ ميلادي) — بالرياض يوم
      ٢٢ ذي القعدة سنة ١٤٢٤ هـ (الموافق ١٥ جانفي ٢٠٠٤ ميلادي)
      عن أربع وتسعين سنة، ودفن بمقبرة البقيع بالمدينة المنورة.
      وقد جمع رحمه الله بين الدراسة الفقهية الحنفية الكلاسيكية
      ودكتوراه في القانون المدني المقارن من باريس، وفي مؤلفاته
      عن الفقه الإسلامي والتقنين الحديث محاولة لصياغة إطار
      حنفي قابل للإلهام في الدول الإسلامية المعاصرة. وشارك في
      مؤتمر مكة الإسلامي ورابطة العالم الإسلامي منذ أول
      تأسيسهما، وكان صوتاً متواصلاً في الهيئات التشاورية
      لمنظمة التعاون الإسلامي.
    description_fr: |
      Maʿrūf al-Dawālībī — juriste sunnite syrien hanafite
      d'Alep, docteur en droit de la Sorbonne, deux fois
      Premier ministre de Syrie (brièvement en 1370 H / 1951
      EC puis en 1381-1382 H / 1961-1962 EC), figure
      fondatrice de l'organe de fiqh contemporain de la Ligue
      islamique mondiale, et conseiller des affaires
      islamiques de plusieurs rois saoudiens à partir de 1383 H
      (1963 EC) — mourut à Riyad le 22 Dhū al-Qaʿda 1424 H
      (15 janvier 2004 EC) à l'âge de 94 ans et fut enterré
      au cimetière al-Baqīʿ à Médine. Il alliait une
      formation hanafite classique à un doctorat en droit
      civil comparé de Paris, et ses écrits sur le droit
      islamique dans la codification moderne cherchaient à
      formuler un cadre hanafite susceptible d'éclairer les
      États musulmans du XXe siècle. Il participa à la
      Conférence islamique de La Mecque et à la Ligue
      islamique mondiale dès leurs premières années, et fut
      une voix durable dans les organes consultatifs de l'OCI.
