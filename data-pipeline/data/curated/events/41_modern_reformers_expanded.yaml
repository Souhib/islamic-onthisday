  - slug: death-of-wahbah-al-zuhayli
    category: scholar
    title_en: Death of Wahbah al-Zuḥaylī — Author of *al-Fiqh al-Islāmī wa-Adillatuhu*
    title_ar: وفاة الشيخ وهبة الزحيلي — صاحب «الفقه الإسلامي وأدلته»
    title_fr: Mort de Wahbah al-Zuḥaylī — auteur d'*al-Fiqh al-Islāmī wa-Adillatuhu*
    description_en: |
      Wahbah Muṣṭafā al-Zuḥaylī — Syrian Sunni jurist of the
      Hanafī and Shāfiʿī schools (formed in classical Hanafī
      training in Damascus and a Cairo-Azharī doctoral
      programme in Shāfiʿī comparative fiqh), longtime chair
      of Islamic jurisprudence at the College of Sharīʿa of
      Damascus University, and one of the most authoritative
      contemporary writers on Islamic law — died on 22 Shawwāl
      1436 AH (8 August 2015 CE) at age 83. His comprehensive
      *al-Fiqh al-Islāmī wa-Adillatuhu* (eight volumes), his
      *al-Tafsīr al-Munīr* (sixteen volumes), and his treatises
      on the law of contracts, treaties, and international
      humanitarian relations in Islamic law are standard
      reference works in Sunni colleges across the Arab
      world, Turkey, and South Asia. He was a signatory of
      both the Amman Message (1425 AH / 2004 CE) and *A Common
      Word* (1428 AH / 2007 CE) and was widely cited as one
      of the foremost expositors of comparative Sunni fiqh
      in his generation.
    description_ar: |
      توفي العلامة وهبة بن مصطفى الزحيلي — الفقيه السني
      السوري على المذهبين الحنفي والشافعي (تخرج بالدراسة
      الفقهية الحنفية الكلاسيكية بدمشق ثم دكتوراه أزهرية
      قاهرية في الفقه الشافعي المقارن)، ورئيس قسم الفقه
      الإسلامي بكلية الشريعة بجامعة دمشق سنين طويلة، ومن أكبر
      مصنفي الفقه الإسلامي المعتمدين في عصره — يوم ٢٢ شوال
      سنة ١٤٣٦ هـ (الموافق ٨ أوت ٢٠١٥ ميلادي) عن ثلاث وثمانين
      سنة. وكتابه الجامع «الفقه الإسلامي وأدلته» في ثمانية
      مجلدات و«التفسير المنير» في ستة عشر مجلداً ومصنفاته في
      فقه العقود والمعاهدات والعلاقات الإنسانية الدولية في
      الإسلام مراجع معتمدة في كليات الشريعة بالعالم العربي
      وتركيا وشبه القارة الهندية. ومن الموقعين على «رسالة
      عمّان» سنة ١٤٢٥ هـ (٢٠٠٤ ميلادي) و«كلمة سواء» سنة
      ١٤٢٨ هـ (٢٠٠٧ ميلادي)، وعدّه كثير من معاصريه من أكبر
      شارحي الفقه السني المقارن في جيله.
    description_fr: |
      Wahbah Muṣṭafā al-Zuḥaylī — juriste sunnite syrien des
      écoles hanafite et shāfiʿite (formé dans l'érudition
      hanafite classique de Damas puis dans un doctorat
      azharī cairote de fiqh shāfiʿite comparé), titulaire de
      longue date de la chaire de jurisprudence islamique à
      la Faculté de Sharīʿa de l'Université de Damas, et l'un
      des écrivains contemporains les plus autorisés sur le
      droit islamique — mourut le 22 Shawwāl 1436 H (8 août
      2015 EC) à l'âge de 83 ans. Son ouvrage exhaustif
      *al-Fiqh al-Islāmī wa-Adillatuhu* (huit volumes), son
      *al-Tafsīr al-Munīr* (seize volumes) et ses traités
      sur le droit des contrats, des traités internationaux
      et des relations humanitaires internationales en droit
      islamique sont des références standard dans les
      facultés sunnites du monde arabe, de la Turquie et du
      sous-continent indien. Il fut signataire à la fois du
      Message d'Amman (1425 H / 2004 EC) et de *A Common
      Word* (1428 H / 2007 EC), et fut largement cité comme
      l'un des plus éminents exposants du fiqh sunnite
      comparé de sa génération.
