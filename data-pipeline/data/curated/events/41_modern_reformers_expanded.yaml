  - slug: death-of-ahmad-hasan-al-baquri
    category: scholar
    title_en: Death of Aḥmad Ḥasan al-Bāqūrī — Azharī Scholar and Minister of Awqāf
    title_ar: وفاة أحمد حسن الباقوري — العالم الأزهري ووزير الأوقاف
    title_fr: Mort d'Aḥmad Ḥasan al-Bāqūrī — savant azharī et ministre des Awqāf
    description_en: |
      Aḥmad Ḥasan al-Bāqūrī — Egyptian Sunni Azharī scholar
      and statesman, born in the village of Bāqūr in Asyūṭ
      governorate, graduate of al-Azhar, minister of awqāf
      (religious endowments) of Egypt from 8 September 1951
      to 24 October 1959, and director of al-Azhar
      University from 1383 to 1388 AH (1964-1969 CE) — died
      at London on 11 Dhū al-Ḥijja 1405 AH (28 August 1985
      CE) during medical treatment, and was buried in Cairo.
      He was 78. He authored a number of works on Islamic
      philosophy, *taṣawwuf*, and interfaith engagement, and
      served as a member of the Cairo Arabic Language Academy
      and other academic bodies. He had been a member of the
      Muslim Brotherhood's guidance bureau in his early
      career and composed an early anthem at the request of
      its founder, but resigned from the organisation in
      1952 upon accepting his ministerial position; from
      that point his career was that of an Azharī state
      scholar and educator.
    description_ar: |
      توفي الشيخ أحمد حسن الباقوري — العالم السني الأزهري
      ورجل الدولة المصري، المولود بقرية باقور بمحافظة أسيوط،
      المتخرج من الأزهر، ووزير الأوقاف بمصر من ٧ ذي الحجة
      سنة ١٣٧٠ هـ (٨ سبتمبر ١٩٥١ ميلادي) إلى ٢١ ربيع الآخر
      سنة ١٣٧٩ هـ (٢٤ أكتوبر ١٩٥٩ ميلادي)، ومدير جامعة الأزهر
      من سنة ١٣٨٣ إلى ١٣٨٨ هـ (١٩٦٤-١٩٦٩ ميلادي) — بلندن
      يوم ١١ ذي الحجة سنة ١٤٠٥ هـ (الموافق ٢٨ أوت ١٩٨٥
      ميلادي) في رحلة علاجية، ودفن بالقاهرة. وقد ناهز الثامنة
      والسبعين. وله مصنفات في الفلسفة الإسلامية والتصوف
      والحوار الديني، وكان عضواً في مجمع اللغة العربية
      بالقاهرة وفي عدد من الهيئات الأكاديمية. وكان قد انتمى
      في صدر شبابه إلى مكتب الإرشاد بالإخوان المسلمين ونظم
      نشيدها الأول بطلب من المؤسس، لكنه استقال من التنظيم
      سنة ١٣٧١ هـ (١٩٥٢ ميلادي) عند قبوله الوزارة؛ ومنذئذ
      كانت سيرته سيرة عالم أزهري في مؤسسات الدولة وفي
      التربية.
    description_fr: |
      Aḥmad Ḥasan al-Bāqūrī — savant sunnite azharī égyptien
      et homme d'État, né dans le village de Bāqūr, dans le
      gouvernorat d'Asyūṭ, diplômé d'al-Azhar, ministre des
      *awqāf* (fondations religieuses) d'Égypte du 8
      septembre 1951 au 24 octobre 1959, et directeur de
      l'Université al-Azhar de 1383 à 1388 H (1964-1969 EC)
      — mourut à Londres le 11 Dhū al-Ḥijja 1405 H (28 août
      1985 EC) en traitement médical, et fut enterré au
      Caire. Il avait 78 ans. Il composa plusieurs ouvrages
      de philosophie islamique, de *taṣawwuf* et d'engagement
      interreligieux, et fut membre de l'Académie de la
      langue arabe du Caire et d'autres organismes
      académiques. Il avait été membre du bureau de guidance
      des Frères musulmans en début de carrière et avait
      composé un hymne à la demande de son fondateur, mais
      démissionna de l'organisation en 1952 lorsqu'il accepta
      son poste ministériel; dès lors sa carrière fut celle
      d'un savant azharī d'État et d'un éducateur.
