  - slug: death-of-abd-al-hamid-ibn-badis
    category: scholar
    title_en: Death of ʿAbd al-Ḥamīd Ibn Bādīs — Founder of the Association of Algerian Muslim ʿUlamāʾ
    title_ar: وفاة عبد الحميد بن باديس — مؤسس جمعية العلماء المسلمين الجزائريين
    title_fr: Mort de ʿAbd al-Ḥamīd Ibn Bādīs — fondateur de l'Association des Oulémas Musulmans Algériens
    description_en: |
      ʿAbd al-Ḥamīd Ibn Bādīs al-Ṣanhājī — Algerian Sunni Mālikī
      scholar, mufassir, and educator of Constantine, founder
      of the Association of Algerian Muslim ʿUlamāʾ (*Jamʿiyyat
      al-ʿUlamāʾ al-Muslimīn al-Jazāʾiriyyīn*) in 1349 AH (1931
      CE), and the principal architect of the twentieth-century
      Algerian Sunni reformist movement under French colonial
      rule — died at Constantine on 8 Rabīʿ al-Awwal 1359 AH
      (16 April 1940 CE) after a long struggle with diabetes.
      He was about 50. His Qurʾanic exegesis lessons at the
      Sīdī Lakhdar Mosque, his journal *al-Shihāb*, and the
      educational network of Arabic-Islamic schools that the
      Association built — "Islam is our religion, Arabic is
      our language, Algeria is our homeland" — anchored the
      Algerian-Muslim cultural identity that would carry into
      the post-1954 independence movement. His funeral drew
      eight thousand mourners. He was a student of Muḥammad
      al-Ṭāhir Ibn ʿĀshūr in Tunis and corresponded with
      Rashīd Riḍā in Cairo.
    description_ar: |
      توفي الإمام عبد الحميد بن باديس الصنهاجي — العالم السني
      الجزائري على المذهب المالكي ومفسر القرآن والمربي بقسنطينة،
      ومؤسس «جمعية العلماء المسلمين الجزائريين» سنة ١٣٤٩ هـ
      (الموافق ١٩٣١ ميلادي)، والمهندس الأول لحركة الإصلاح السني
      الجزائرية في القرن العشرين تحت الاحتلال الفرنسي — بقسنطينة
      يوم ٨ ربيع الأول سنة ١٣٥٩ هـ (الموافق ١٦ أفريل ١٩٤٠
      ميلادي) بعد صراع طويل مع داء السكري. وقد ناهز الخمسين.
      ودروسه التفسيرية بمسجد سيدي لخضر، ومجلته «الشهاب»، وشبكة
      المدارس الإسلامية العربية التي أسستها الجمعية — وشعارها
      «الإسلام ديننا، والعربية لغتنا، والجزائر وطننا» — رسّخت
      الهوية الجزائرية المسلمة الثقافية التي حملتها حركة
      الاستقلال بعد سنة ١٩٥٤ ميلادي. وحضر جنازته رحمه الله نحو
      ثمانية آلاف. وكان قد قرأ على الإمام محمد الطاهر بن عاشور
      بتونس وراسل الشيخ محمد رشيد رضا بالقاهرة.
    description_fr: |
      ʿAbd al-Ḥamīd Ibn Bādīs al-Ṣanhājī — savant sunnite
      algérien malikite, *mufassir* et éducateur de Constantine,
      fondateur de l'Association des Oulémas Musulmans
      Algériens (*Jamʿiyyat al-ʿUlamāʾ al-Muslimīn al-
      Jazāʾiriyyīn*) en 1349 H (1931 EC), et principal architecte
      du mouvement réformiste sunnite algérien du XXe siècle
      sous la colonisation française — mourut à Constantine le
      8 Rabīʿ al-Awwal 1359 H (16 avril 1940 EC) après une
      longue lutte contre le diabète. Il avait environ 50 ans.
      Ses leçons d'exégèse coranique à la mosquée de Sīdī
      Lakhdar, sa revue *al-Shihāb*, et le réseau d'écoles
      arabo-islamiques bâti par l'Association — « l'Islam est
      notre religion, l'arabe notre langue, l'Algérie notre
      patrie » — ancrèrent l'identité culturelle algérienne
      musulmane qui se prolongerait dans le mouvement
      d'indépendance post-1954. Ses funérailles rassemblèrent
      huit mille personnes. Il avait étudié auprès de Muḥammad
      al-Ṭāhir Ibn ʿĀshūr à Tunis et entretenait une
      correspondance avec Rashīd Riḍā au Caire.
