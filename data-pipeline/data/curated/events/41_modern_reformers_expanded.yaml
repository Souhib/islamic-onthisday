  - slug: death-of-allal-al-fasi
    category: scholar
    title_en: Death of ʿAllāl al-Fāsī — Moroccan Salafi-Reformist Nationalist
    title_ar: وفاة علال الفاسي — السلفي الإصلاحي ورائد الحركة الوطنية المغربية
    title_fr: Mort de ʿAllāl al-Fāsī — réformiste salafi et nationaliste marocain
    description_en: |
      ʿAllāl al-Fāsī al-Fihrī — Moroccan Sunni Mālikī scholar,
      jurist, poet, and political leader, founder of the
      Istiqlāl Party in 1944, and the principal voice of the
      Salafi-reformist current in twentieth-century Moroccan
      Sunni scholarship — died of a heart attack at Bucharest
      on 20 Rabīʿ al-Thānī 1394 AH (13 May 1974 CE) while on
      a visit to lobby Romanian leadership over the Western
      Sahara dispute. He was about 64. Trained at the
      Qarawiyyīn in Fes, he was exiled by the French
      Protectorate to Gabon (1937-1946) and then to Cairo,
      where he engaged with the Arab nationalist and Islamic
      reformist circles of Rashīd Riḍā and his successors. His
      *al-Naqd al-Dhātī* ("Self-Critique"), *Maqāṣid al-Sharīʿa
      al-Islāmiyya wa-Makārimuhā*, and his collected fatwas
      argued for an Islamic constitutional and juridical
      framework drawing on classical Mālikī fiqh together with
      the modern science of *maqāṣid*. He led the Istiqlāl
      Party until his death and was succeeded by Mʾḥammad
      Boucetta.
    description_ar: |
      توفي العلامة علال الفاسي الفهري — العالم السني المغربي
      على المذهب المالكي، الفقيه والشاعر والقائد السياسي،
      مؤسس حزب «الاستقلال» سنة ١٣٦٣ هـ (١٩٤٤ ميلادي)، والصوت
      الأكبر للتيار السلفي الإصلاحي في الفقه السني المغربي
      في القرن العشرين — بسكتة قلبية ببوخارست يوم ٢٠ ربيع
      الآخر سنة ١٣٩٤ هـ (الموافق ١٣ ماي ١٩٧٤ ميلادي) في زيارة
      للضغط على القيادة الرومانية في قضية الصحراء الغربية.
      وقد ناهز الرابعة والستين. وقد تخرج من جامعة القرويين
      بفاس، ونفته السلطات الفرنسية الحامية إلى الغابون (١٩٣٧-
      ١٩٤٦ ميلادي) ثم إلى القاهرة حيث خالط أوساط القومية
      العربية والإصلاح الإسلامي على تراث الشيخ محمد رشيد رضا
      وخلفائه. وكتبه «النقد الذاتي» و«مقاصد الشريعة الإسلامية
      ومكارمها» وفتاويه المجموعة كلها تأصيل لإطار دستوري
      وقانوني إسلامي مستفيد من الفقه المالكي الكلاسيكي ومن
      علم المقاصد الحديث. وقاد حزب الاستقلال إلى وفاته،
      وخلفه الأستاذ امحمد بوستة.
    description_fr: |
      ʿAllāl al-Fāsī al-Fihrī — savant sunnite marocain
      malikite, juriste, poète et chef politique, fondateur du
      parti Istiqlāl en 1944, et principale voix du courant
      salafi-réformiste dans l'érudition sunnite marocaine du
      XXe siècle — mourut d'une crise cardiaque à Bucarest le
      20 Rabīʿ al-Thānī 1394 H (13 mai 1974 EC) lors d'une
      visite destinée à influencer les dirigeants roumains sur
      le dossier du Sahara occidental. Il avait environ 64 ans.
      Formé à la Qarawiyyīn de Fès, il fut exilé par le
      Protectorat français au Gabon (1937-1946) puis au Caire,
      où il fréquenta les cercles du nationalisme arabe et du
      réformisme islamique dans la lignée de Rashīd Riḍā et de
      ses successeurs. Ses *al-Naqd al-Dhātī* (« Auto-critique »),
      *Maqāṣid al-Sharīʿa al-Islāmiyya wa-Makārimuhā* et ses
      fatwas recueillies plaidèrent pour un cadre constitutionnel
      et juridique islamique fondé sur le fiqh malikite
      classique conjugué à la science moderne des *maqāṣid*.
      Il dirigea le parti Istiqlāl jusqu'à sa mort et eut pour
      successeur Mʾḥammad Boucetta.
