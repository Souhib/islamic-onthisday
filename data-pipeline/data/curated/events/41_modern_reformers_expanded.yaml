  - slug: death-of-muhammad-bashir-al-ibrahimi
    category: scholar
    title_en: Death of Muḥammad Bashīr al-Ibrāhīmī — Successor of Ibn Bādīs
    title_ar: وفاة محمد البشير الإبراهيمي — خليفة ابن باديس
    title_fr: Mort de Muḥammad al-Bashīr al-Ibrāhīmī — successeur d'Ibn Bādīs
    description_en: |
      Muḥammad Bashīr al-Ibrāhīmī — Algerian Sunni Mālikī scholar
      and reformer, second president of the Association of
      Algerian Muslim ʿUlamāʾ (1940-1965 CE) following the death
      of Ibn Bādīs, and the figure who carried the Algerian
      reformist movement through French colonial repression,
      independence, and the early years of the post-1962 republic
      — died at Setif on 19 Muḥarram 1385 AH (20 May 1965 CE).
      He was 75. He had spent fourteen years (1938-1952) in the
      Hijaz teaching at the Madrasat al-Falāḥ in Mecca, and on
      his return led the *jamʿiyya* through both the war of
      independence and its aftermath. After 1962 he served as
      *imām* and *khaṭīb* of the Ketchaoua Mosque in Algiers; he
      opposed the socialist policies of the Ben Bella government
      publicly and was placed under house arrest, dying less than
      a month before the coup that ousted Ben Bella. His
      collected works in five volumes — *Āthār Muḥammad al-Bashīr
      al-Ibrāhīmī* — preserve forty years of reformist
      journalism, sermons, and theological writing.
    description_ar: |
      توفي الإمام محمد البشير الإبراهيمي — العالم السني الجزائري
      على المذهب المالكي ومن كبار المصلحين، الرئيس الثاني
      لـ«جمعية العلماء المسلمين الجزائريين» (١٣٥٩-١٣٨٥ هـ /
      ١٩٤٠-١٩٦٥ ميلادي) بعد وفاة الشيخ ابن باديس، الذي حمل
      حركة الإصلاح الجزائرية عبر القمع الاستعماري الفرنسي
      والاستقلال وسنوات الجمهورية الأولى بعد سنة ١٩٦٢ ميلادي —
      بسطيف يوم ١٩ محرم سنة ١٣٨٥ هـ (الموافق ٢٠ ماي ١٩٦٥
      ميلادي) عن خمس وسبعين سنة. أمضى أربع عشرة سنة بالحجاز
      (١٣٥٧-١٣٧١ هـ / ١٩٣٨-١٩٥٢ ميلادي) درّس فيها بمدرسة
      الفلاح بمكة المكرمة، ولما رجع قاد الجمعية في حرب
      الاستقلال وما بعدها. وبعد سنة ١٩٦٢ ميلادي تولى الإمامة
      والخطابة بمسجد كتشاوة بالعاصمة، وعارض جهاراً سياسات
      الاشتراكية في حكومة بن بلة فوضع تحت الإقامة الجبرية،
      وتوفي رحمه الله قبل أقل من شهر من الانقلاب الذي أطاح
      ببن بلة. وآثاره المجموعة في خمسة مجلدات — «آثار محمد
      البشير الإبراهيمي» — تحفظ أربعين سنة من الكتابة الإصلاحية
      الصحفية والخطب والمؤلفات العقدية.
    description_fr: |
      Muḥammad al-Bashīr al-Ibrāhīmī — savant sunnite algérien
      malikite et réformateur, deuxième président de l'Association
      des Oulémas Musulmans Algériens (1940-1965 EC) après la
      mort d'Ibn Bādīs, et la figure qui porta le mouvement
      réformiste algérien à travers la répression coloniale
      française, l'indépendance et les premières années de la
      république post-1962 — mourut à Sétif le 19 Muḥarram
      1385 H (20 mai 1965 EC). Il avait 75 ans. Il avait passé
      quatorze ans (1938-1952) au Hedjaz à enseigner à la
      Madrasat al-Falāḥ à La Mecque, et à son retour dirigea
      la *jamʿiyya* à travers la guerre d'indépendance et ses
      lendemains. Après 1962 il servit comme *imām* et *khaṭīb*
      de la mosquée Ketchaoua à Alger; il s'opposa publiquement
      aux politiques socialistes du gouvernement Ben Bella et
      fut placé en résidence surveillée, mourant moins d'un mois
      avant le coup d'État qui renversa Ben Bella. Ses œuvres
      complètes en cinq volumes — *Āthār Muḥammad al-Bashīr
      al-Ibrāhīmī* — préservent quarante ans de journalisme
      réformiste, de sermons et d'écrits théologiques.
