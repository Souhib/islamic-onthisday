# Wave 28 of curated event additions (2026-04-27).
# Nineteenth- and twentieth-century Sunni revivers, reformers, jurists, and
# Azharī / Damascene / Maghrebī scholars not yet present in the dataset.
# Twelve mainstream Sunni figures whose deaths are well attested in modern
# reference works (EI2 + standard biographies). Categories: pan-Islamic
# reformers (al-Afghānī); Algerian reformist movement (Ibn Bādīs,
# al-Ibrāhīmī); Maghrebī scholars (Mukhtār al-Sūsī, ʿAllāl al-Fāsī);
# Levantine and Egyptian late-twentieth-century scholars (al-Ṣābūnī,
# al-Ghazālī al-Saqqā, ʿAbd al-Ḥalīm Maḥmūd, al-Dawālībī, al-Zuḥaylī);
# Egyptian jurist-statesmen (al-Sanhūrī, al-Bāqūrī). All twelve are
# post-classical Sunni figures attested in EI2 / academic references; none
# are sahaba; none carry hadith refs. Trilingual en/ar/fr throughout.
# Framing strictly factual and neutral on political affiliations.

events:
