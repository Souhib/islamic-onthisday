  - slug: death-of-muhammad-al-ghazali-al-saqqa
    category: scholar
    title_en: Death of Muḥammad al-Ghazālī al-Saqqā — Egyptian Azharī Reformist
    title_ar: وفاة الشيخ محمد الغزالي السقا — الأزهري الإصلاحي
    title_fr: Mort de Muḥammad al-Ghazālī al-Saqqā — réformiste azharī égyptien
    description_en: |
      Muḥammad al-Ghazālī al-Saqqā — Egyptian Sunni Azharī
      preacher, scholar, and one of the most widely read
      twentieth-century Arabic-language Islamic essayists,
      author of *Fiqh al-Sīra* (a study of the Prophet's ﷺ
      biography in light of fiqh and contemporary moral
      challenges), *Khuluq al-Muslim*, *Jaddid Ḥayātaka*, and
      ninety-odd further works — died on 18 Shawwāl 1416 AH
      (9 March 1996 CE) at age 78 and was buried in al-Baqīʿ
      Cemetery in Medina. He graduated from al-Azhar in 1941
      and held teaching posts in Mecca, Doha, and Algiers,
      and chaired the academic council of the International
      Institute of Islamic Thought in Cairo. He combined an
      Azharī Sunni scholarly identity with a sustained
      programme of moral and intellectual renewal addressed
      to the Arabic-reading public, and his 1989 work *al-
      Sunna al-Nabawiyya bayna Ahl al-Fiqh wa-Ahl al-Ḥadīth*
      sparked a major Sunni scholarly debate over hadith
      methodology that continues to be cited.
    description_ar: |
      توفي الشيخ محمد الغزالي السقا — الداعية والعالم السني
      الأزهري المصري، ومن أكثر مؤلفي الفكر الإسلامي العربي
      انتشاراً في القرن العشرين، صاحب «فقه السيرة» (دراسة في
      السيرة النبوية على ضوء الفقه والتحديات الأخلاقية
      المعاصرة) و«خلق المسلم» و«جدد حياتك» وما يزيد على تسعين
      مصنفاً — يوم ١٨ شوال سنة ١٤١٦ هـ (الموافق ٩ مارس ١٩٩٦
      ميلادي) عن ثمان وسبعين سنة، ودفن بمقبرة البقيع بالمدينة
      المنورة. تخرج من الأزهر سنة ١٣٦٠ هـ (١٩٤١ ميلادي)،
      وتقلب في التدريس بمكة والدوحة والجزائر، وترأس المجلس
      الأكاديمي للمعهد العالمي للفكر الإسلامي بالقاهرة. وجمع
      رحمه الله بين الانتماء الأزهري السني الكلاسيكي ومشروع
      مستمر للتجديد الأخلاقي والفكري موجّه إلى القارئ العربي،
      وأثار كتابه «السنة النبوية بين أهل الفقه وأهل الحديث»
      الصادر سنة ١٤٠٩ هـ (١٩٨٩ ميلادي) جدلاً سنياً علمياً
      كبيراً في منهج الحديث ما يزال مرجعاً.
    description_fr: |
      Muḥammad al-Ghazālī al-Saqqā — prédicateur, savant
      sunnite azharī égyptien et l'un des essayistes
      islamiques de langue arabe les plus lus du XXe siècle,
      auteur de *Fiqh al-Sīra* (étude de la biographie
      prophétique ﷺ à la lumière du fiqh et des défis moraux
      contemporains), *Khuluq al-Muslim*, *Jaddid Ḥayātaka*,
      et de plus de quatre-vingt-dix autres ouvrages — mourut
      le 18 Shawwāl 1416 H (9 mars 1996 EC) à l'âge de 78 ans
      et fut enterré au cimetière al-Baqīʿ à Médine. Diplômé
      d'al-Azhar en 1941, il occupa des postes
      d'enseignement à La Mecque, Doha et Alger, et présida
      le conseil académique de l'Institut International de
      la Pensée Islamique au Caire. Il combinait une identité
      savante azharī sunnite avec un programme soutenu de
      renouveau moral et intellectuel adressé au public
      arabophone, et son ouvrage de 1989 *al-Sunna al-
      Nabawiyya bayna Ahl al-Fiqh wa-Ahl al-Ḥadīth* déclencha
      un débat sunnite scientifique majeur sur la méthodologie
      du hadith encore cité aujourd'hui.
