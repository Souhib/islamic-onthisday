  - slug: death-of-mukhtar-al-susi
    category: scholar
    title_en: Death of Muḥammad al-Mukhtār al-Sūsī — Historian of the Souss
    title_ar: وفاة محمد المختار السوسي — مؤرخ سوس
    title_fr: Mort de Muḥammad al-Mukhtār al-Sūsī — historien du Souss
    description_en: |
      Muḥammad al-Mukhtār al-Sūsī — Moroccan Sunni Mālikī scholar,
      poet, and historian of the Berber-Arabic Souss region of
      southern Morocco — died at Rabat on 28 Jumādā al-Ākhira
      1383 AH (15 November 1963 CE) at age about 65. After
      classical training at Marrakech, Fes, and the Qarawiyyīn,
      he served as judge and minister of awqāf in early
      independent Morocco. His monumental Arabic-language
      biographical and topographical works on the scholars,
      zawiyas, and history of the Souss — *al-Maʿsūl* (twenty
      volumes), *Ilīgh qadīman wa-ḥadīthan*, *Sūs al-ʿālima*,
      and *Khilāl Jazūla* — are the principal Sunni reference
      works for the religious and intellectual history of
      southwestern Morocco from the medieval period onward.
      He combined classical Mālikī scholarship with the field
      methods of modern Arabic historiography and laid the
      documentary foundation for the study of Berber Sunni
      ʿulamāʾ.
    description_ar: |
      توفي الشيخ محمد المختار السوسي — العالم السني المغربي على
      المذهب المالكي والشاعر والمؤرخ لمنطقة سوس البربرية
      العربية في جنوب المغرب — بالرباط يوم ٢٨ جمادى الآخرة
      سنة ١٣٨٣ هـ (الموافق الجمعة ١٥ نوفمبر ١٩٦٣ ميلادي) عن
      نحو خمس وستين سنة. وبعد أن أخذ العلم بمراكش وفاس
      والقرويين، تولى القضاء والوزارة (وزارة الأوقاف) في فجر
      المغرب المستقل. ومؤلفاته العربية الكبرى في تراجم العلماء
      وزوايا العلم وتاريخ سوس — «المعسول» (في عشرين مجلداً)
      و«إيليغ قديماً وحديثاً» و«سوس العالمة» و«خلال جزولة» —
      هي المراجع السنية الأصلية للتاريخ العلمي والديني لجنوب
      غرب المغرب من العصر الوسيط فما بعد. وقد جمع رحمه الله
      بين الدراسة الفقهية المالكية الكلاسيكية ومناهج البحث
      الميداني للتأريخ العربي الحديث، فأرسى الأساس الوثائقي
      لدراسة العلماء السنيين البربر.
    description_fr: |
      Muḥammad al-Mukhtār al-Sūsī — savant sunnite marocain
      malikite, poète et historien de la région berbéro-arabe
      du Souss au sud du Maroc — mourut à Rabat le 28 Jumādā
      al-Ākhira 1383 H (15 novembre 1963 EC) à l'âge d'environ
      65 ans. Après une formation classique à Marrakech, Fès
      et à la Qarawiyyīn, il servit comme juge et ministre des
      *awqāf* dans le Maroc nouvellement indépendant. Ses
      œuvres monumentales en arabe sur les savants, les
      *zawiyas* et l'histoire du Souss — *al-Maʿsūl* (vingt
      volumes), *Ilīgh qadīman wa-ḥadīthan*, *Sūs al-ʿālima*
      et *Khilāl Jazūla* — sont les principales références
      sunnites pour l'histoire religieuse et intellectuelle du
      sud-ouest marocain depuis l'époque médiévale. Il
      combinait l'érudition malikite classique aux méthodes de
      terrain de l'historiographie arabe moderne et posa le
      fondement documentaire de l'étude des *ʿulamāʾ* sunnites
      berbères.
