# Foundings of major Islamic cities and capitals not already covered by file
# 13 (Basra, Kūfa, Fusṭāṭ, Qayrawān, Marrakesh) or earlier files (Baghdad,
# Cairo, Madīnat al-Zahrāʾ, al-Azhar, Qarawiyyīn, the Cordoba mosque).
# Each entry is attested in ≥2 classical Sunni sources (al-Ṭabarī,
# Ibn al-Athīr, Ibn Kathīr, al-Dhahabī, Ibn Khallikān). Trilingual (en/ar/fr).

events:
  # =========================================================================
  # UMAYYAD GARRISON / ADMINISTRATIVE CITIES
  # =========================================================================

  - slug: founding-of-wasit
    category: founding
    title_en: Founding of Wāsiṭ by al-Ḥajjāj
    title_ar: تأسيس واسط على يد الحجاج
    title_fr: Fondation de Wāsiṭ par al-Ḥajjāj
    description_en: |
      al-Ḥajjāj ibn Yūsuf al-Thaqafī, the Umayyad governor of Iraq under
      Caliph ʿAbd al-Malik ibn Marwān, founded Wāsiṭ ("the middle [city]")
      on the western bank of the Tigris between Kūfa and Baṣra to garrison
      his loyal Syrian troops away from the rebellious populations of the
      two older Iraqi miṣrs. The site was chosen for its equidistance from
      the rival Iraqi cities, hence its name. al-Ḥajjāj built his
      governor's palace and the congregational mosque (Masjid al-Jāmiʿ
      bi-Wāsiṭ), and he was buried there in 95 AH. Wāsiṭ remained a major
      Iraqi administrative and intellectual centre — the home of the
      Wāsiṭī school of Qurʾanic recitation — until the medieval shifting
      of the Tigris depopulated it by the 9th/15th century.
    description_ar: |
      أسس الحجاج بن يوسف الثقفي — والي العراق للخليفة الأموي عبد الملك بن
      مروان — مدينة واسط ("الوسطى") على الضفة الغربية من دجلة بين الكوفة
      والبصرة، ليُسكن فيها جنده الشاميين الموالين بعيداً عن سكان المصرَين
      العراقيَّين الأقدمَين الذين كثرت فيهم الفتن. اختير الموقع لتوسطه بين
      المدينتين، ومن ثم اسمها. وبنى الحجاج فيها قصر الإمارة والجامع الكبير
      (المسجد الجامع بواسط)، ودُفن بها سنة ٩٥ هـ. وظلت واسط مركزاً عراقياً
      كبيراً في الإدارة والعلم — منها مدرسة الإقراء الواسطية — حتى أخلتها
      تحولات مجرى دجلة في أواخر القرن التاسع الهجري.
    description_fr: |
      al-Ḥajjāj ibn Yūsuf al-Thaqafī, gouverneur omeyyade d'Iraq sous le
      calife ʿAbd al-Malik ibn Marwān, fonda Wāsiṭ (« [la ville] médiane »)
      sur la rive occidentale du Tigre, entre Koufa et Bassora, afin d'y
      cantonner ses troupes syriennes fidèles à l'écart des populations
      agitées des deux miṣrs irakiens plus anciens. Le site fut choisi pour
      son équidistance entre les deux cités rivales, d'où son nom. al-Ḥajjāj
      y bâtit le palais du gouverneur et la mosquée congrégationnelle
      (Masjid al-Jāmiʿ bi-Wāsiṭ), et y fut enterré en 95 AH. Wāsiṭ demeura
      un grand centre administratif et intellectuel irakien — siège de
      l'école wāsiṭī de récitation coranique — jusqu'à ce que les
      déplacements médiévaux du Tigre la dépeuplent au IXe/XVe siècle.
    canonical_hijri: {year: 83, precision: year}
    canonical_gregorian: {date: 702-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī, Tārīkh: foundation in 83 AH on al-Ḥajjāj's order during the reign of ʿAbd al-Malik."
      - source_key: ibn_athir_kamil
        notes: "Ibn al-Athīr, al-Kāmil: confirms al-Ḥajjāj's foundation between Kūfa and Baṣra."
      - source_key: ibn_khallikan_wafayat
        notes: "Biography of al-Ḥajjāj — foundation, palace, and burial there."
    people: [[abd-al-malik-ibn-marwan, leader]]
    tags: [umayyad, founding, iraq, wasit, hajjaj, garrison]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-ramla
    category: founding
    title_en: Founding of al-Ramla by Sulaymān ibn ʿAbd al-Malik
    title_ar: تأسيس الرملة على يد سليمان بن عبد الملك
    title_fr: Fondation de Ramla par Sulaymān ibn ʿAbd al-Malik
    description_en: |
      Sulaymān ibn ʿAbd al-Malik, while still serving as governor of
      Jund Filasṭīn for his brother Caliph al-Walīd I, founded al-Ramla
      ("the sandy place") in the coastal plain of Palestine to replace
      nearby Lydda (Ludd) as the provincial capital. He laid out the city
      plan, built a governor's residence, the White Mosque (al-Masjid
      al-Abyaḍ), and underground cisterns for water supply. al-Ramla
      remained the only major Muslim-founded city in Palestine and the
      administrative capital of the province until the Crusader period;
      it housed the offices that supplied Jerusalem and was a node on
      the Damascus–Cairo postal road.
    description_ar: |
      أسس سليمان بن عبد الملك — وهو على إمرة جند فلسطين لأخيه الخليفة
      الوليد الأول — مدينة الرملة (موضعها رمل) في سهل فلسطين الساحلي
      لتحل محل اللد المجاورة عاصمةً للجند. خطّ المدينة، وبنى دار الإمارة،
      والمسجد الجامع المعروف بالمسجد الأبيض، وصهاريج الماء الجوفية. وبقيت
      الرملة المدينة الإسلامية الوحيدة الكبرى التي بُنيت في فلسطين وعاصمة
      الجند إلى زمن الصليبيين، وفيها دواوين تموين بيت المقدس، وعليها كان
      طريق البريد بين دمشق ومصر.
    description_fr: |
      Sulaymān ibn ʿAbd al-Malik, alors gouverneur du Jund Filasṭīn pour
      son frère le calife al-Walīd Ier, fonda al-Ramla (« le lieu sablonneux »)
      dans la plaine côtière de Palestine pour remplacer la voisine Lydda
      (Ludd) comme capitale provinciale. Il en traça le plan, bâtit la
      résidence du gouverneur, la Mosquée Blanche (al-Masjid al-Abyaḍ) et
      des citernes souterraines pour l'eau. al-Ramla demeura la seule
      grande ville musulmane fondée en Palestine et la capitale
      administrative de la province jusqu'à l'époque croisée ; elle
      abritait les bureaux d'approvisionnement de Jérusalem et constituait
      un relais de la route postale Damas–Le Caire.
    canonical_hijri: {year: 96, precision: year}
    canonical_gregorian: {date: 715-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī, Tārīkh: Sulaymān's foundation while still governor of Palestine."
      - source_key: ibn_athir_kamil
      - source_key: ibn_kathir_bidaya
    people: [[al-walid-i, leader]]
    tags: [umayyad, founding, palestine, ramla, sulayman, white-mosque]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-tunis
    category: founding
    title_en: Re-founding of Tūnis by Ḥassān ibn al-Nuʿmān
    title_ar: تأسيس تونس على يد حسان بن النعمان
    title_fr: Refondation de Tunis par Ḥassān ibn al-Nuʿmān
    description_en: |
      Ḥassān ibn al-Nuʿmān al-Ghassānī, the Umayyad commander who broke
      the Berber-Byzantine resistance in Ifrīqiya by defeating al-Kāhina,
      established Tūnis as a Muslim city on the site of the older Punic-
      Byzantine settlement at the head of its lagoon. He ordered the
      construction of a naval arsenal (dār al-ṣināʿa) — among the earliest
      in the Muslim Mediterranean — together with the Zaytūna mosque,
      which would grow to become the foundational university of the
      Maghreb. Tūnis would gradually eclipse al-Qayrawān as the political
      capital of Ifrīqiya by the Hafsid period (7th/13th century).
    description_ar: |
      أنشأ حسان بن النعمان الغساني — قائد الفتح الأموي الذي قضى على
      المقاومة البربرية البيزنطية في إفريقية بعد هزيمة الكاهنة — مدينة
      تونس مدينةً إسلامية على موضع المستوطنة البونيقية البيزنطية القديمة
      عند رأس بحيرتها. وأمر ببناء دار الصناعة البحرية — من أقدم دور
      الصناعة في المتوسط الإسلامي — وجامع الزيتونة الذي صار جامعة المغرب
      المؤسِّسة. وأخذت تونس تطغى تدريجياً على القيروان عاصمةً لإفريقية
      حتى صارت كذلك في العصر الحفصي (القرن السابع الهجري).
    description_fr: |
      Ḥassān ibn al-Nuʿmān al-Ghassānī, le chef omeyyade qui brisa la
      résistance berbéro-byzantine en Ifrīqiya en défaisant al-Kāhina,
      établit Tunis comme cité musulmane sur le site de l'ancienne
      implantation punico-byzantine à la tête de sa lagune. Il ordonna la
      construction d'un arsenal naval (dār al-ṣināʿa) — parmi les plus
      anciens de la Méditerranée musulmane — ainsi que de la mosquée
      Zaytūna, qui allait devenir l'université fondatrice du Maghreb.
      Tunis allait peu à peu éclipser Kairouan comme capitale politique
      de l'Ifrīqiya à partir de l'époque ḥafside (VIIe/XIIIe siècle).
    canonical_hijri: {year: 79, precision: year}
    canonical_gregorian: {date: 698-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: Ḥassān's foundation after defeating al-Kāhina."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr, al-Bidāya wa-l-Nihāya: events of 79 AH, foundation of arsenal."
    tags: [umayyad, founding, ifriqiya, tunis, zaytuna, maghreb]
    importance: notable
    verified: true
    verification_status: cross_verified

