  # NORTH AFRICAN / WESTERN MUSLIM CAPITALS
  # =========================================================================

  - slug: founding-of-fes
    category: founding
    title_en: Founding of Fās (Fes) by Idrīs II
    title_ar: تأسيس فاس على يد إدريس الثاني
    title_fr: Fondation de Fès par Idrīs II
    description_en: |
      Idrīs II ibn Idrīs ibn ʿAbd Allāh, the second Idrīsid amīr of
      Morocco, established Fās as the capital of his nascent Muslim state
      on the Wādī Fās, expanding the small settlement his father had
      begun on the river's eastern bank into the bipartite city of ʿUdwat
      al-Andalus and ʿUdwat al-Qarawiyyīn. The two banks were settled
      respectively by Andalusian refugees from the Rabaḍ uprising of
      Cordoba (818 CE) and by Arab refugees from al-Qayrawān, giving the
      city its name. From this nucleus would emerge — within two
      generations — the Qarawiyyīn mosque-university (founded 245 AH,
      already covered as a separate entry) and Fās's enduring role as the
      primary Sunni Mālikī intellectual centre of the western Maghreb.
      Classical sources differ slightly on the precise year of Idrīs II's
      foundation: we follow Ibn Khaldūn and the Idrīsid chronicles giving
      192 AH; some Andalusi sources give 193 AH.
    description_ar: |
      أسس إدريس الثاني بن إدريس بن عبد الله — أمير الأدارسة الثاني
      بالمغرب — مدينة فاس عاصمةً لدولته الإسلامية الناشئة على وادي فاس،
      ووسع المستوطنة الصغيرة التي بدأها أبوه على الضفة الشرقية من النهر،
      حتى أضحت المدينة شِقَّيْن: عُدوة الأندلس وعُدوة القرويين. سكن الضفتين
      على التوالي مهاجرو ربض قرطبة الفارّين من سحقها بأمر الحكم بن هشام
      سنة ٢٠٢ هـ، ومهاجرون عرب من القيروان، فأخذت المدينة منهم اسمها.
      ومن هذه النواة نهض جامع القرويين الجامعي بعد جيلين (سنة ٢٤٥ هـ،
      وله مدخل مستقل)، وثبتت لفاس مكانتها مركزاً رئيساً للسنّة المالكية
      في غرب المغرب. واختلفت المصادر القديمة في سنة التأسيس بسنة واحدة:
      اخترنا قول ابن خلدون والمصادر الإدريسية ١٩٢ هـ؛ وفي بعض المصادر
      الأندلسية ١٩٣ هـ.
    description_fr: |
      Idrīs II ibn Idrīs ibn ʿAbd Allāh, deuxième amīr idrīside du Maroc,
      établit Fès comme capitale de son État musulman naissant sur le Wādī
      Fās, élargissant la petite implantation que son père avait commencée
      sur la rive orientale du fleuve pour en faire une ville bipartite :
      ʿUdwat al-Andalus et ʿUdwat al-Qarawiyyīn. Les deux rives furent
      respectivement peuplées par des réfugiés andalous fuyant le
      soulèvement du Rabaḍ de Cordoue (818 EC) et par des réfugiés arabes
      de Kairouan, donnant à la ville son nom. De ce noyau allaient
      émerger en deux générations la mosquée-université de la Qarawiyyīn
      (fondée en 245 AH, traitée comme entrée distincte) et le rôle
      durable de Fès comme principal centre intellectuel sunnite mālikī
      du Maghreb occidental. Les sources classiques diffèrent d'une année
      sur la date exacte : nous suivons Ibn Khaldūn et les chroniques
      idrīsides qui donnent 192 AH ; certaines sources andalouses donnent
      193 AH.
    canonical_hijri: {year: 192, precision: year}
    canonical_gregorian: {date: 808-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: Idrīs II's foundation of the second bank of Fās."
      - source_key: ibn_kathir_bidaya
      - source_key: ibn_khallikan_wafayat
        notes: "Biography of Idrīs II — foundation and reign at Fās."
    people: [[idris-ii, leader]]
    tags: [idrisid, founding, maghreb, fes, qarawiyyin, maliki]
    importance: notable
    verified: true
    verification_status: cross_verified
    disputed: true
    dispute_about: date

  - slug: founding-of-mahdiya
    category: founding
    title_en: Founding of al-Mahdiyya by ʿUbayd Allāh
    title_ar: تأسيس المهدية على يد عبيد الله
    title_fr: Fondation d'al-Mahdiyya par ʿUbayd Allāh
    description_en: |
      ʿUbayd Allāh, founder of the Fāṭimid caliphate in Ifrīqiya, laid the
      foundations of al-Mahdiyya on a coastal peninsula south of al-Qayrawān
      as the new capital of his state. The site was chosen for its
      defensibility — sea on three sides, isthmus walled across — at a
      time when his rule was contested by the Sunni Mālikī populations of
      the interior. al-Mahdiyya was inaugurated as the seat of the
      Caliphate in 308 AH, replacing al-Raqqāda outside al-Qayrawān; it
      remained a capital until the Fāṭimid move to Cairo in 362 AH, then
      a Zīrid capital, and finally a major Mediterranean port through the
      Norman and Hafsid centuries. The walls and the Great Mosque of
      al-Mahdiyya survive as among the earliest surviving Fāṭimid-era
      monuments.
    description_ar: |
      وضع عبيد الله — مؤسس الخلافة الفاطمية بإفريقية — أسس مدينة المهدية
      في شبه جزيرة ساحلية جنوبي القيروان عاصمةً لدولته. اختار الموقع
      لمناعته — البحر يحيط به من ثلاث جهات، ويُعرض البر بسور — في زمن
      كانت سلطته فيه منازَعةً من سكان الداخلية السنّة المالكية. ودشّن
      المهدية مقراً للخلافة سنة ٣٠٨ هـ، فحلت محل الرقّادة الفاطمية خارج
      القيروان، وبقيت عاصمةً حتى ارتحل الفاطميون إلى القاهرة سنة ٣٦٢ هـ،
      ثم صارت عاصمةً للزيريين، ومرفأً متوسطياً كبيراً عبر القرون النورمانية
      والحفصية. ولا تزال أسوارها وجامعها الكبير من أقدم الآثار الفاطمية
      الباقية.
    description_fr: |
      ʿUbayd Allāh, fondateur du califat fāṭimide en Ifrīqiya, posa les
      fondations d'al-Mahdiyya sur une péninsule côtière au sud de
      Kairouan, comme nouvelle capitale de son État. Le site fut choisi
      pour sa défensibilité — la mer sur trois côtés, l'isthme barré par
      une muraille — à une époque où son autorité était contestée par les
      populations sunnites mālikī de l'intérieur. al-Mahdiyya fut
      inaugurée comme siège du califat en 308 AH, remplaçant al-Raqqāda
      aux abords de Kairouan ; elle resta capitale jusqu'au transfert
      fāṭimide au Caire en 362 AH, puis devint capitale zīride, puis grand
      port méditerranéen à travers les siècles normand et ḥafside. Les
      remparts et la Grande Mosquée d'al-Mahdiyya comptent parmi les plus
      anciens monuments fāṭimides subsistants.
    canonical_hijri: {year: 308, precision: year}
    canonical_gregorian: {date: 921-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil, sub anno 308: ʿUbayd Allāh inaugurates al-Mahdiyya as capital."
      - source_key: ibn_kathir_bidaya
        notes: "Ibn Kathīr, al-Bidāya: foundation and inauguration of al-Mahdiyya."
    people: [[ubayd-allah-al-mahdi, leader]]
    tags: [fatimid, founding, ifriqiya, mahdiya, caliphal-city]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-tlemcen-agadir
    category: founding
    title_en: Idrīsid Foundation of Agadir-Tlemcen
    title_ar: تأسيس تلمسان (أكادير) على يد الأدارسة
    title_fr: Fondation idrīside de Tlemcen (Agadir)
    description_en: |
      Idrīs I ibn ʿAbd Allāh, founder of the Idrīsid dynasty in
      Morocco, established the citadel-town of Agadir on the site of
      the older Roman Pomaria — the kernel of what would become the
      Muslim city of Tlemcen — during his consolidation of Idrīsid
      authority in the central Maghreb. He rebuilt the walls and is
      reported to have founded the original Friday mosque on the site
      that the Almoravid Yūsuf ibn Tāshfīn would later expand. Agadir
      became the seed-city of Tlemcen, which under the Almoravid,
      Almohad, and Zayyānid dynasties grew into the principal capital
      of the central Maghreb and a major Sunni Mālikī intellectual
      centre — home to scholars such as al-Sanūsī (d. 895 AH).
    description_ar: |
      أنشأ إدريس الأول بن عبد الله — مؤسس الدولة الإدريسية بالمغرب —
      مدينة أكادير الحصينة على موقع بُمارية الرومانية القديمة — وهي
      نواة ما صار يُعرف بمدينة تلمسان الإسلامية — في توطيده لسلطان
      الأدارسة بالمغرب الأوسط. أعاد بناء أسوارها، ويُذكر أنه أنشأ بها
      أول جامع للجمعة في الموقع الذي وسّعه يوسف بن تاشفين المرابطي بعدُ.
      صارت أكادير نواة تلمسان التي نمت في عهد المرابطين والموحدين والزيانيين
      عاصمةً كبرى للمغرب الأوسط ومركزاً علمياً سنياً مالكياً — منها
      السنوسي (ت ٨٩٥ هـ).
    description_fr: |
      Idrīs Ier ibn ʿAbd Allāh, fondateur de la dynastie idrīside au
      Maroc, fonda la cité-citadelle d'Agadir sur le site de l'ancienne
      Pomaria romaine — le noyau de ce qui allait devenir la ville
      musulmane de Tlemcen — lors de sa consolidation de l'autorité
      idrīside dans le Maghreb central. Il en releva les murailles et
      l'on rapporte qu'il y fonda la mosquée du vendredi originelle, sur
      le site que l'Almoravide Yūsuf ibn Tāshfīn devait par la suite
      agrandir. Agadir devint la cité-mère de Tlemcen qui, sous les
      Almoravides, les Almohades et les Zayyānides, allait devenir la
      principale capitale du Maghreb central et un grand centre
      intellectuel sunnite mālikī — patrie d'érudits tels qu'al-Sanūsī
      (m. 895 AH).
    canonical_hijri: {year: 174, precision: year}
    canonical_gregorian: {date: 790-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: Idrīs I's consolidation, foundation of Agadir."
      - source_key: ibn_khallikan_wafayat
        notes: "Biography of Idrīs I — foundation and works in central Maghreb."
    people: [[idris-i, leader]]
    tags: [idrisid, founding, maghreb, tlemcen, agadir, maliki]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-algiers-ziri
    category: founding
    title_en: Re-founding of Algiers (al-Jazāʾir) by Buluqqīn ibn Zīrī
    title_ar: تأسيس الجزائر على يد بُلُقّين بن زيري
    title_fr: Refondation d'Alger par Buluqqīn ibn Zīrī
    description_en: |
      Buluqqīn ibn Zīrī, founder of the Zīrid dynasty in the central
      Maghreb under Fāṭimid suzerainty, re-established the coastal city
      of al-Jazāʾir Banī Mazghannā ("the islands of the Banū Mazghannā")
      as a Muslim port on the site of the older Roman Icosium. The city,
      from which the modern country derives its name, was settled around
      a small islet-archipelago opposite the bay (whence "al-Jazāʾir")
      and grew into a regional commercial hub under the Zīrid, Almoravid,
      and Almohad dynasties before becoming a major Mediterranean
      corsair-state base under the early Ottomans. Buluqqīn also founded
      Miliana and re-founded Médéa in the same campaign of urban
      consolidation across the central Maghreb.
    description_ar: |
      أعاد بُلُقّين بن زيري — مؤسس الدولة الزيرية بالمغرب الأوسط تحت
      الولاية الفاطمية — إنشاء مدينة الجزائر بني مزغنة مدينةً ساحلية
      إسلامية على موضع إيكوزيوم الرومانية القديمة. ومنها أخذت الدولة
      الحديثة اسمها، وقد نشأت حول جُزَيرات قبالة الخليج (ومن ثم اسم
      "الجزائر")، ونمت مرفأً تجارياً إقليمياً في عهود الزيريين والمرابطين
      والموحدين قبل أن تصير قاعدةً متوسطية كبرى لدولة الجهاد البحري في
      أوائل العصر العثماني. وأسس بُلُقّين كذلك مدينة مليانة وأعاد إنشاء
      المدية في حملة العمران نفسها بالمغرب الأوسط.
    description_fr: |
      Buluqqīn ibn Zīrī, fondateur de la dynastie zīride dans le Maghreb
      central sous suzeraineté fāṭimide, restaura la cité côtière
      d'al-Jazāʾir Banī Mazghannā (« les îles des Banū Mazghannā ») comme
      port musulman sur le site de l'ancienne Icosium romaine. La ville,
      dont le pays moderne tire son nom, fut établie autour d'un petit
      archipel d'îlots faisant face à la baie (d'où « al-Jazāʾir ») et
      devint un pôle commercial régional sous les Zīrides, les Almoravides
      et les Almohades, avant de devenir une grande base d'État corsaire
      méditerranéen sous les Ottomans. Buluqqīn fonda également Miliana
      et refonda Médéa lors de la même campagne de consolidation urbaine
      à travers le Maghreb central.
    canonical_hijri: {year: 362, precision: year}
    canonical_gregorian: {date: 972-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: Buluqqīn's foundation of al-Jazāʾir, Miliana, Médéa."
      - source_key: ibn_kathir_bidaya
    people: [[buluqqin-ibn-ziri, leader]]
    tags: [zirid, founding, maghreb, algiers, jazair, fatimid]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-rabat-almohad
    category: founding
    title_en: Almohad Foundation of Ribāṭ al-Fatḥ (Rabat)
    title_ar: تأسيس رباط الفتح على يد الموحدين
    title_fr: Fondation almohade de Ribāṭ al-Fatḥ (Rabat)
    description_en: |
      The Almohad caliph Yaʿqūb al-Manṣūr, in the wake of his great
      victory over Castile at the Battle of Alarcos (al-Arak, 591 AH),
      ordered the foundation of a fortified launching-base on the
      Atlantic mouth of the Wādī Bū Raqrāq, expanding the small ribāṭ
      his grandfather ʿAbd al-Muʾmin had built earlier. He named the new
      city Ribāṭ al-Fatḥ ("the camp of victory") and projected an
      enormous congregational mosque whose unfinished minaret — Ṣawmaʿat
      Ḥassān — survives as one of the most celebrated monuments of
      western Islamic architecture. Though the project was abandoned
      after Yaʿqūb's death and the city did not flourish until the
      Marinid period, Rabat remains the modern capital of Morocco.
    description_ar: |
      أمر الخليفة الموحدي يعقوب المنصور — في أعقاب نصره الكبير على
      قشتالة في معركة الأرك (٥٩١ هـ) — بإنشاء قاعدة محصّنة على مصبّ
      وادي أبي رقراق على المحيط الأطلسي، وسّع بها الرباط الصغير الذي
      كان جده عبد المؤمن قد بناه قبله، وسماها رباط الفتح. وخطط لها
      جامعاً ضخماً ما تزال صومعته غير المكتملة — صومعة حسّان — من
      أشهر معالم العمارة الإسلامية الغربية. وقد أُقفر المشروع بعد وفاة
      يعقوب، ولم تزدهر المدينة إلا في العهد المريني، لكنها صارت اليوم
      عاصمة المملكة المغربية.
    description_fr: |
      Le calife almohade Yaʿqūb al-Manṣūr, dans le sillage de sa grande
      victoire sur la Castille à la bataille d'Alarcos (al-Arak, 591 AH),
      ordonna la fondation d'une base fortifiée à l'embouchure
      atlantique du Wādī Bū Raqrāq, agrandissant le petit ribāṭ que son
      grand-père ʿAbd al-Muʾmin y avait précédemment construit. Il
      nomma la nouvelle ville Ribāṭ al-Fatḥ (« le camp de la victoire »)
      et projeta une immense mosquée congrégationnelle dont le minaret
      inachevé — Ṣawmaʿat Ḥassān — subsiste comme l'un des monuments
      les plus célèbres de l'architecture islamique occidentale. Bien
      que le projet ait été abandonné après la mort de Yaʿqūb et que la
      ville n'ait connu d'essor qu'à l'époque mérīnide, Rabat est
      aujourd'hui la capitale moderne du Maroc.
    canonical_hijri: {year: 591, precision: year}
    canonical_gregorian: {date: 1195-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: Yaʿqūb's victory at Alarcos and foundation of Ribāṭ al-Fatḥ."
      - source_key: ibn_kathir_bidaya
    people: [[yaqub-al-mansur-almohad, leader]]
    tags: [almohad, founding, maghreb, rabat, ribat-al-fath, hassan-tower]
    importance: notable
    verified: true
    verification_status: cross_verified

