  - slug: founding-of-shiraz
    category: founding
    title_en: Founding of Shīrāz by Muḥammad ibn al-Qāsim
    title_ar: تأسيس شيراز على يد محمد بن القاسم
    title_fr: Fondation de Shīrāz par Muḥammad ibn al-Qāsim
    description_en: |
      Muḥammad ibn al-Qāsim al-Thaqafī (cousin of al-Ḥajjāj) and his
      Umayyad lieutenants founded the city of Shīrāz in the Persian
      province of Fārs as a garrison administrative centre after the
      Muslim conquest of the Sasanian heartland under Caliph ʿAbd
      al-Malik. The settlement, on a fertile inland plain, replaced the
      older Sasanian centre of Iṣṭakhr as the regional capital. Under
      the later Buyids and Saljuqs, Shīrāz grew into one of the great
      cultural cities of medieval Iran — the home of the Sunni Shāfiʿī
      polymath Ibn Khafīf, the Shāfiʿī faqīh al-Shīrāzī (the great Sunni
      jurist of the Niẓāmiyya, d. 476 AH), and later of Saʿdī and Ḥāfiẓ.
    description_ar: |
      أنشأ محمد بن القاسم الثقفي (ابن عم الحجاج) وولاة الأمويين معه
      مدينة شيراز في إقليم فارس قاعدةً إدارية وعسكرية بعد فتح الإسلام
      لقلب الإمبراطورية الساسانية في عهد الخليفة عبد الملك. فحلّت المدينة،
      وهي على سهل داخلي خصيب، محل اصطخر الساسانية القديمة عاصمةً للإقليم.
      ثم نمت شيراز في عهد البويهيين والسلاجقة لتصبح من كبريات حواضر إيران
      الإسلامية الكلاسيكية — منها العالم السني الشافعي ابن خفيف، ومنها
      الشيرازي الشافعي فقيه النظامية الكبير (ت ٤٧٦ هـ)، وفيها بعدُ
      السعدي والحافظ.
    description_fr: |
      Muḥammad ibn al-Qāsim al-Thaqafī (cousin d'al-Ḥajjāj) et ses
      lieutenants omeyyades fondèrent la cité de Shīrāz dans la province
      persane du Fārs comme centre administratif et militaire après la
      conquête musulmane du cœur sassanide sous le calife ʿAbd al-Malik.
      L'établissement, sur une plaine intérieure fertile, remplaça
      l'ancien centre sassanide d'Iṣṭakhr comme capitale régionale. Sous
      les Bouyides et les Seldjoukides ultérieurs, Shīrāz devint l'une
      des grandes villes culturelles de l'Iran médiéval — patrie du
      polymathe sunnite shāfiʿī Ibn Khafīf, du fuqāhā shāfiʿī al-Shīrāzī
      (le grand juriste sunnite de la Niẓāmiyya, m. 476 AH), et plus tard
      de Saʿdī et de Ḥāfiẓ.
    canonical_hijri: {year: 74, precision: year}
    canonical_gregorian: {date: 693-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī, Tārīkh: Umayyad foundation of Shīrāz under Muḥammad ibn al-Qāsim, sub annis 74-75."
      - source_key: ibn_athir_kamil
    tags: [umayyad, founding, persia, shiraz, fars, garrison]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-anjar-walid
    category: founding
    title_en: Founding of ʿAnjar by al-Walīd I
    title_ar: تأسيس عنجر على يد الوليد بن عبد الملك
    title_fr: Fondation de ʿAnjar par al-Walīd Ier
    description_en: |
      Caliph al-Walīd I ibn ʿAbd al-Malik, alongside his great
      construction projects in Damascus (the Umayyad Mosque) and Madīna
      (rebuilding of the Prophet's Mosque), founded the residential-
      commercial city of ʿAnjar in the Beqāʿ valley of present-day
      Lebanon, on the road between Damascus and the Mediterranean coast.
      Built to a strict Roman-grid plan inherited from late-antique urban
      practice, ʿAnjar was the first wholly new Umayyad city in
      al-Shām — a planned summer capital with a palace complex, a
      tetrapylon, public baths, and rows of shops bordering a
      cardo-decumanus axis. It was abandoned within a generation after
      the fall of the Umayyads, and its remarkably intact ruins are now
      among the best-preserved early-Islamic urban sites.
    description_ar: |
      أنشأ الخليفة الوليد بن عبد الملك — إلى جانب مشاريعه العمرانية
      الكبرى في دمشق (الجامع الأموي) والمدينة (تجديد المسجد النبوي) —
      مدينة عنجر السكنية التجارية في سهل البقاع بلبنان الحالي على طريق
      دمشق إلى ساحل المتوسط. خُطّت المدينة بنظام شطرنجي روماني صارم
      موروث من حواضر الأواخر الرومانية، فكانت أول مدينة أموية كاملة في
      الشام تُبنى من جديد — عاصمة صيف مخططة، فيها قصر، ورباعي أبواب،
      وحمامات عامة، وصفوف من الحوانيت على محور كاردو-ديكومانوس. وأُقفرت
      عنجر بعد جيل من سقوط الأمويين، وأنقاضها السليمة على نحو لافت من
      أكثر المواقع الإسلامية المبكرة احتفاظاً بمعالمها.
    description_fr: |
      Le calife al-Walīd Ier ibn ʿAbd al-Malik, parallèlement à ses
      grands chantiers de Damas (la Mosquée des Omeyyades) et de Médine
      (reconstruction de la Mosquée du Prophète), fonda la cité
      résidentielle et commerciale de ʿAnjar dans la vallée de la Beqāʿ
      du Liban actuel, sur la route reliant Damas au littoral
      méditerranéen. Bâtie selon un plan en damier romain strict hérité
      de la pratique urbaine tardo-antique, ʿAnjar fut la première ville
      omeyyade entièrement nouvelle d'al-Shām — capitale d'été planifiée,
      dotée d'un palais, d'un tétrapyle, de bains publics et de rangées
      de boutiques bordant un axe cardo-decumanus. Elle fut abandonnée
      en l'espace d'une génération après la chute des Omeyyades, et ses
      ruines remarquablement intactes comptent aujourd'hui parmi les
      sites urbains des débuts de l'islam les mieux conservés.
    canonical_hijri: {year: 96, precision: year}
    canonical_gregorian: {date: 715-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: foundation works of al-Walīd's reign in al-Shām."
      - source_key: tabari_tarikh
        notes: "al-Ṭabarī, Tārīkh: events of al-Walīd I's reign — building programmes."
    people: [[al-walid-i, leader]]
    tags: [umayyad, founding, syria-lebanon, anjar, beqaa, walid-i]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-mansura-sind
    category: founding
    title_en: Founding of al-Manṣūra in Sind
    title_ar: تأسيس المنصورة في السند
    title_fr: Fondation d'al-Manṣūra au Sind
    description_en: |
      ʿAmr ibn Muḥammad ibn al-Qāsim al-Thaqafī (a descendant of the
      conqueror of Sind) founded the garrison-capital of al-Manṣūra
      in lower Sind — present-day Pakistan — under the Abbasid Caliph
      al-Manṣūr, after whom the city was named. The city replaced
      al-Sharr (Brahmanabad) as the seat of Muslim governance in Sind
      and was built on the eastern bank of the Indus River. al-Manṣūra
      remained the capital of Sind through the Habbarid period and was
      one of the four chief cities described by the Arab geographers
      al-Iṣṭakhrī and Ibn Ḥawqal in the 4th/10th century, alongside
      Multān, Daybul, and Qusdar. It was destroyed during the Ghaznavid
      conquests and never rebuilt.
    description_ar: |
      أسس عمرو بن محمد بن القاسم الثقفي — من ذرية فاتح السند — مدينة
      المنصورة في السند الأسفل (باكستان الحالية) عاصمةً وقاعدةً عسكرية،
      وذلك في عهد الخليفة العباسي المنصور الذي سُمّيت باسمه. حلت المنصورة
      محل المدينة القديمة (الشرّ، براهم آباد) مقراً للحكم الإسلامي في
      السند، وبُنيت على الضفة الشرقية من نهر السند. وبقيت المنصورة
      عاصمة السند طوال عهد الهبّاريين، وكانت من المدن الأربع الكبرى
      التي وصفها الجغرافيون العرب الإصطخري وابن حوقل في القرن الرابع
      الهجري، إلى جانب الملتان والديبل والقصدار. ثم خُرّبت في الفتوحات
      الغزنوية ولم يُعد بناؤها.
    description_fr: |
      ʿAmr ibn Muḥammad ibn al-Qāsim al-Thaqafī (descendant du conquérant
      du Sind) fonda la cité-garnison d'al-Manṣūra dans le Sind
      inférieur — actuel Pakistan — sous le calife abbāsside al-Manṣūr,
      dont la ville prit le nom. La cité remplaça al-Sharr (Brahmanabad)
      comme siège du pouvoir musulman au Sind et fut bâtie sur la rive
      orientale de l'Indus. al-Manṣūra demeura capitale du Sind durant
      la période ḥabbāride, et figurait parmi les quatre principales
      cités décrites par les géographes arabes al-Iṣṭakhrī et Ibn Ḥawqal
      au IVe/Xe siècle, aux côtés de Multān, Daybul et Qusdar. Elle fut
      détruite lors des conquêtes ghaznāvides et ne fut jamais reconstruite.
