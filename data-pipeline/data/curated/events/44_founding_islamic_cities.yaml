  - slug: founding-of-samarra
    category: founding
    title_en: Founding of Sāmarrāʾ by al-Muʿtaṣim
    title_ar: تأسيس سامراء على يد المعتصم
    title_fr: Fondation de Sāmarrāʾ par al-Muʿtaṣim
    description_en: |
      Caliph al-Muʿtaṣim bi-Allāh, finding that the friction between his
      Turkish guard and the Baghdadi populace had become unmanageable,
      moved the Abbasid capital northward up the Tigris and founded
      Sāmarrāʾ ("Surra man raʾā" — "he who saw it rejoiced"). Over the
      next half-century, eight Abbasid caliphs ruled from Sāmarrāʾ rather
      than Baghdad, building the great Spiral Minaret (al-Malwiyya) and
      Mosque of al-Mutawakkil — for a time the largest mosque in the
      world. The city was abandoned as the seat of the Caliphate by 279
      AH when al-Muʿtamid returned to Baghdad, but its mosques and the
      adjoining ʿAskarī shrine remained major Sunni religious sites.
    description_ar: |
      نقل الخليفة المعتصم بالله عاصمة الخلافة العباسية شمالاً على نهر
      دجلة لما اشتد الاحتكاك بين حرسه التركي وأهل بغداد، فأنشأ سامراء
      ("سُرَّ من رأى"). وقد حكم منها — لا من بغداد — ثمانية خلفاء عباسيين
      على مدى نصف قرن، وبُنيت فيها المئذنة الملوية الكبرى وجامع المتوكل
      الذي كان وقت بنائه أعظم مساجد الدنيا مساحةً. وزال عنها كرسي الخلافة
      سنة ٢٧٩ هـ حين رجع المعتمد إلى بغداد، لكن جوامعها ومرقد الإمامين
      الحسن العسكري وأبيه ظلت من المعالم السنية الكبرى.
    description_fr: |
      Le calife al-Muʿtaṣim bi-Allāh, constatant que les frictions entre
      sa garde turque et la population de Bagdad étaient devenues
      ingérables, déplaça la capitale abbāsside vers le nord, en remontant
      le Tigre, et fonda Sāmarrāʾ (« Surra man raʾā » : « celui qui la vit
      se réjouit »). Pendant le demi-siècle suivant, huit califes
      abbāssides régnèrent depuis Sāmarrāʾ et non depuis Bagdad, y bâtissant
      le Grand Minaret en spirale (al-Malwiyya) et la Mosquée d'al-Mutawakkil
      — un temps la plus grande mosquée du monde. La ville fut abandonnée
      comme siège du califat en 279 AH lorsque al-Muʿtamid revint à
      Bagdad, mais ses mosquées et le mausolée ʿAskarī adjacent demeurèrent
      des sanctuaires sunnites majeurs.
    canonical_hijri: {year: 221, precision: year}
    canonical_gregorian: {date: 836-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: tabari_tarikh
        is_canonical: true
        notes: "al-Ṭabarī, Tārīkh, sub anno 221: al-Muʿtaṣim moves the capital and founds Sāmarrāʾ."
      - source_key: ibn_athir_kamil
      - source_key: ibn_kathir_bidaya
    people: [[al-mutasim, leader]]
    tags: [abbasid, founding, iraq, samarra, mutasim, malwiyya]
    importance: notable
    verified: true
    verification_status: cross_verified

  - slug: founding-of-al-qatai
    category: founding
    title_en: Founding of al-Qaṭāʾiʿ by Ibn Ṭūlūn
    title_ar: تأسيس القطائع على يد ابن طولون
    title_fr: Fondation d'al-Qaṭāʾiʿ par Ibn Ṭūlūn
    description_en: |
      Aḥmad ibn Ṭūlūn, the Turkic-origin governor who founded the Tulunid
      dynasty by establishing Egypt's de facto independence from Abbasid
      Baghdad, laid out al-Qaṭāʾiʿ ("the wards") immediately north of
      al-Fusṭāṭ as the new administrative capital of his autonomous
      state. The city was organised into wards (qaṭāʾiʿ) for his
      different troop contingents — Turks, Sudanese, Greeks, Berbers —
      with a parade ground, a royal palace (Dār al-Imāra), a hippodrome,
      and the great congregational mosque that bears his name (Masjid Ibn
      Ṭūlūn, completed 265 AH), one of the oldest surviving mosques in
      Africa and the only major monument from the city to survive its
      destruction by the Abbasid restoration in 292 AH.
    description_ar: |
      أنشأ أحمد بن طولون — مؤسس الدولة الطولونية، الذي حقق لمصر استقلالاً
      عملياً عن خلافة بغداد — مدينة القطائع شمال الفسطاط مباشرةً عاصمةً
      إدارية لدولته. قُسِّمت المدينة قطائع لأجناده المختلفين من الأتراك
      والسودان والروم والبربر، وفيها ميدان عرض الجند، ودار الإمارة،
      والميدان، والجامع العظيم الذي يحمل اسمه (جامع ابن طولون، أُكمل
      سنة ٢٦٥ هـ) — من أقدم المساجد الباقية في أفريقيا، والمعلم الكبير
      الوحيد الذي نجا من إتلاف القطائع حين أعاد العباسيون مصر إلى سلطانهم
      سنة ٢٩٢ هـ.
    description_fr: |
      Aḥmad ibn Ṭūlūn, gouverneur d'origine turque qui fonda la dynastie
      des Ṭūlūnides en obtenant pour l'Égypte une indépendance de fait
      vis-à-vis de Bagdad ʿabbāsside, traça al-Qaṭāʾiʿ (« les quartiers »)
      immédiatement au nord d'al-Fusṭāṭ comme nouvelle capitale
      administrative de son État autonome. La ville était organisée en
      quartiers (qaṭāʾiʿ) pour ses différents contingents — Turcs,
      Soudanais, Grecs, Berbères — avec un champ de parade, un palais
      royal (Dār al-Imāra), un hippodrome et la grande mosquée
      congrégationnelle qui porte son nom (Masjid Ibn Ṭūlūn, achevée en
      265 AH), l'une des plus anciennes mosquées subsistantes d'Afrique
      et le seul grand monument de la cité à avoir survécu à sa
      destruction lors de la restauration abbasside en 292 AH.
    canonical_hijri: {year: 256, precision: year}
    canonical_gregorian: {date: 870-01-01, precision: year, method: tabular_conversion}
    claims:
      - source_key: ibn_athir_kamil
        is_canonical: true
        notes: "Ibn al-Athīr, al-Kāmil: Ibn Ṭūlūn lays out al-Qaṭāʾiʿ as his capital."
      - source_key: ibn_kathir_bidaya
      - source_key: ibn_khallikan_wafayat
        notes: "Ibn Khallikān, biography of Aḥmad ibn Ṭūlūn — foundation and the great mosque."
    people: [[ibn-tulun, leader]]
    tags: [abbasid, founding, egypt, qatai, ibn-tulun, tulunid]
    importance: notable
    verified: true
    verification_status: cross_verified

