# Famous authentic hadith narratives (from Sahih al-Bukhari, Sahih Muslim,
# or otherwise sahih by scholarly consensus). Each entry cites the primary
# collection and reference number where available.

lessons:
  - slug: hadith-seven-shaded
    category: hadith_narrative
    title_en: The Seven Whom Allah Will Shade on the Day of Judgment
    title_fr: Les sept que Dieu ombragera au Jour du Jugement
    title_ar: السبعة الذين يظلّهم الله يوم القيامة
    description_en: |
      The Prophet ﷺ said: "There are seven whom Allah will shade in His
      shade on the day when there will be no shade but His: a just
      leader; a youth who grew up in the worship of Allah; a man whose
      heart is attached to the mosques; two who love one another for
      the sake of Allah, meeting upon that and parting upon that; a man
      whom a woman of beauty and position invited [to wrongdoing], and
      he said 'I fear Allah'; one who gave in charity so secretly that
      his left hand did not know what his right hand gave; and one who
      remembered Allah in seclusion, and his eyes overflowed."
    description_fr: |
      Le Prophète ﷺ a dit : « Sept que Dieu ombragera de Son ombre le
      jour où il n'y aura d'ombre que la Sienne : un dirigeant juste ;
      un jeune qui a grandi dans l'adoration d'Allah ; un homme dont le
      cœur est attaché aux mosquées ; deux qui s'aiment pour la cause
      d'Allah, se rencontrant pour cela et se séparant sur cela ; un
      homme qu'une femme de beauté et de rang a invité [au mal] et qui
      a dit : « Je crains Allah » ; celui qui a donné en aumône si
      secrètement que sa main gauche n'a pas su ce que sa main droite
      avait donné ; et celui qui s'est souvenu d'Allah dans l'isolement,
      et ses yeux ont débordé de larmes. »
    description_ar: |
      قال النبي ﷺ: «سبعةٌ يُظِلُّهم الله في ظلِّه يوم لا ظلَّ إلا ظلُّه:
      إمامٌ عادلٌ، وشابٌّ نشأ في عبادة الله، ورجلٌ قلبُه معلَّقٌ بالمساجد،
      ورجلان تحابَّا في الله اجتمعا عليه وتفرَّقا عليه، ورجلٌ دعتْه امرأةٌ
      ذاتُ منصبٍ وجمالٍ فقال: إني أخاف الله، ورجلٌ تصدَّق بصدقةٍ فأخفاها
      حتى لا تعلم شمالُه ما تُنفق يمينُه، ورجلٌ ذكر الله خاليًا ففاضت
      عيناه».
    reference: Sahih al-Bukhari 660, Sahih Muslim 1031
    hadith_refs: "Bukhari 660, Muslim 1031"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) notes that the seven categories cover every social station — ruler, youth, worshipper, friend, tempted man, secret giver, and weeping rememberer — showing that Allah's shade is not limited to one class. Al-Nawawī (Sharḥ Muslim) adds that the hadith establishes mercy and justice as the defining virtues of leadership. It is frequently cited in classical works on governance and spiritual excellence.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) note que les sept catégories couvrent toutes les conditions sociales — souverain, jeune, adorateur, ami, homme tenté, donateur secret et pleureur en invocation — montrant que l'ombre d'Allah ne se limite pas à une seule classe. Al-Nawawī (Sharḥ Muslim) ajoute que ce ḥadīth établit la miséricorde et la justice comme vertus définissantes du leadership. Il est fréquemment cité dans les œuvres classiques sur la gouvernance et l'excellence spirituelle.
    source_notes_ar: |
      يُشِيرُ ابنُ حَجَرٍ (فَتْحُ البَارِي) إِلَى أَنَّ السَّبْعَ فِئَاتٍ تَشْمَلُ كُلَّ مَرَاتِبِ المُجْتَمَعِ — الحَاكِمَ وَالشَّابَّ وَالعَابِدَ وَالصَّدِيقَ وَالمُجَرَّبَ وَالسِّرِّيَّ وَالبَاكِي — مُبَيِّنًا أَنَّ ظِلَّ اللهِ لاَ يَخْتَصُّ بِطَبَقَةٍ وَاحِدَةٍ. وَيَزِيدُ النَّوَوِيُّ (شَرْحُ مُسْلِمٍ) أَنَّ هَذَا الحَدِيثَ يُقِيمُ الرَّحْمَةَ وَالعَدْلَ رُكْنَيْ قِيَادَةٍ صَالِحَةٍ. وَهُوَ مِنْ أَكْثَرِ الأَحَادِيثِ اسْتِشْهَادًا فِي الكُتُبِ الكَلاسِيكِيَّةِ فِي الحُكْمِ وَالإِحْسَانِ.
    display_day_of_year: 7

  - slug: hadith-thirsty-dog
    category: hadith_narrative
    title_en: The Man Who Gave Water to a Thirsty Dog
    title_fr: L'homme qui donna à boire à un chien assoiffé
    title_ar: الرجل الذي سقى الكلب العطشان
    description_en: |
      The Prophet ﷺ said: "While a man was walking, he felt thirsty and
      went down a well and drank water from it. On climbing out, he saw
      a dog panting and eating mud from extreme thirst. The man said:
      'This dog is suffering from the same problem as that of mine.' So
      he filled his shoe with water, held it in his teeth, climbed up,
      and gave the dog to drink. Allah was grateful to him for his good
      deed and forgave him." The Companions asked: "O Messenger of
      Allah, is there a reward for us in serving animals?" He said:
      "There is a reward for serving any living creature."
    description_fr: |
      Le Prophète ﷺ a raconté : « Pendant qu'un homme marchait, il eut
      soif et descendit dans un puits pour y boire. En remontant, il vit
      un chien haletant qui mangeait la boue tant il avait soif. L'homme
      dit : « Ce chien souffre du même mal que moi. » Il remplit alors
      sa chaussure d'eau, la tint entre ses dents, remonta et donna à
      boire au chien. Allah lui en fut reconnaissant et lui pardonna. »
      Les Compagnons demandèrent : « Ô Messager d'Allah, sommes-nous
      récompensés pour le service rendu aux animaux ? » Il répondit :
      « Servir tout être vivant est récompensé. »
    description_ar: |
      روى النبي ﷺ: «بينما رجلٌ يمشي اشتدَّ عليه العطشُ فنزل بئرًا فشرب
      منها، فلما خرج إذا كلبٌ يلهَث يأكل الثرى من العطش، فقال الرجل: لقد
      بلغ هذا الكلبَ من العطشِ مثلُ الذي كان قد بلغ منِّي، فملأ خُفَّه
      ماءً ثم أمسكه بفِيه ورقي حتى سقاه، فشكر الله له فغفر له». فقال
      الصحابة: «يا رسول الله، وإنَّ لنا في البهائم أجرًا؟» قال: «في كلِّ
      كَبِدٍ رَطْبَةٍ أجرٌ».
    reference: Sahih al-Bukhari 2363, Sahih Muslim 2244
    hadith_refs: "Bukhari 2363, Muslim 2244"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) observes that the hadith establishes a general principle: any living creature benefits from a Muslim's mercy, and Allah rewards such mercy with forgiveness. Al-Nawawī notes that the man's use of his shoe — despite its normal impurity — demonstrates that necessity overrides usual rules in acts of compassion. This became a foundational proof for the permissibility of using impure vessels when no alternative exists.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) observe que ce ḥadīth établit un principe général : tout être vivant bénéficie de la miséricorde d'un musulman, et Allah récompense cette miséricorde par le pardon. Al-Nawawī note que l'usage de sa chaussure par l'homme — malgré son impureté habituelle — démontre que la nécessité prime sur les règles ordinaires dans les actes de compassion. Ce ḥadīth devint une preuve fondatrice de la permissibilité d'utiliser des récipients impurs en l'absence d'alternative.
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي) أَنَّ هَذَا الحَدِيثَ يُؤَسِّسُ أَصْلًا عَامًّا: كُلُّ كَائِنٍ حَيٍّ يَنْتَفِعُ بِرَحْمَةِ المُسْلِمِ، وَاللهُ يُكَافِئُ هَذِهِ الرَّحْمَةَ بِالمَغْفِرَةِ. وَيُشِيرُ النَّوَوِيُّ إِلَى أَنَّ اسْتِعْمَالَ الرَّجُلِ لِنَعْلِهِ — عَلَى الرَّغْمِ مِنْ نَجَاسَتِهِ العَادِيَّةِ — يُثْبِتُ أَنَّ الضَّرُورَةَ تَعْلُو عَلَى الأَحْكَامِ العَادِيَّةِ فِي أَعْمَالِ الرَّأْفَةِ. وَصَارَ هَذَا حُجَّةً أَصْلِيَّةً عَلَى جَوَازِ اسْتِعْمَالِ الأَوَانِي النَّجِسَةِ عِنْدَ فَقْدِ البَدِيلِ.
    display_day_of_year: 12

  - slug: hadith-cat-imprisoned
    category: hadith_narrative
    title_en: The Woman Punished Because of a Cat
    title_fr: La femme châtiée à cause d'un chat
    title_ar: المرأة التي عُذِّبت في هرَّة
    description_en: |
      The Prophet ﷺ said: "A woman was punished on account of a cat
      which she had imprisoned until it died. She entered the Fire
      because of it. She did not give it food or water when she
      imprisoned it, nor did she set it free to eat from the insects of
      the earth." The hadith juxtaposes directly against the story of
      the thirsty dog — showing that mercy and cruelty to animals both
      have real consequences in the hereafter.
    description_fr: |
      Le Prophète ﷺ a dit : « Une femme fut châtiée à cause d'un chat
      qu'elle avait emprisonné jusqu'à ce qu'il meure. Elle entra en
      Enfer à cause de lui : elle ne lui donnait ni nourriture ni eau
      tant qu'elle le retenait, et elle ne le libérait pas non plus pour
      qu'il se nourrisse des insectes de la terre. » Le ḥadīth fait
      directement écho au récit du chien assoiffé — montrant que la
      miséricorde et la cruauté envers les animaux ont chacune des
      conséquences réelles dans l'au-delà.
    description_ar: |
      قال النبي ﷺ: «عُذِّبت امرأةٌ في هرَّةٍ سَجَنَتْها حتى ماتت، فدخلت فيها
      النار؛ لا هي أطعمتْها وسقتْها إذ حبستْها، ولا هي تركتْها تأكل من
      خشاش الأرض». ويأتي هذا الحديث في مقابلة مباشرة لحديث الكلب العطشان
      — مبيِّنًا أنَّ الرحمة والقسوة على الحيوان كلتيهما تترتَّب عليهما
      عواقبُ حقيقيَّةٌ في الآخرة.
    reference: Sahih al-Bukhari 3482, Sahih Muslim 2242
    hadith_refs: "Bukhari 3482, Muslim 2242"
    source_notes: |
      Ibn Ḥajar explains that the hadith proves imprisonment without provision is active cruelty, not mere neglect, and earns Hellfire. Al-Nawawī adds that the woman's sin was not simply owning the cat but denying it the two necessities: food and the freedom to seek food. This hadith underlies the classical fiqh ruling that animals must be fed by their keepers.
    source_notes_fr: |
      Ibn Ḥajar explique que ce ḥadīth prouve qu'emprisonner sans nourrir est une cruauté active, non une simple négligence, et mérite le Feu de l'Enfer. Al-Nawawī ajoute que le péché de la femme n'était pas simplement de posséder le chat, mais de lui refuser deux nécessités : la nourriture et la liberté de la chercher. Ce ḥadīth fonde le ruling classique du fiqh selon lequel les animaux doivent être nourris par leurs gardiens.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ أَنَّ هَذَا الحَدِيثَ يُثْبِتُ أَنَّ الحَبْسَ بِلاَ إِطْعَامٍ قَسْوَةٌ فَاعِلَةٌ لاَ تَقْصِيرٌ مُجَرَّدٌ، وَيَسْتَحِقُّ النَّارَ. وَيَزِيدُ النَّوَوِيُّ أَنَّ إِثْمَ المَرْأَةِ لَمْ يَكُنْ فِي مُجَرَّدِ مِلْكِهَا لِلْقِطَّةِ، بَلْ فِي مَنْعِهَا لَهَا ضَرُورَتَيْنِ: الطَّعَامَ وَحُرِّيَّةَ الطَّلَبِ. وَهَذَا الحَدِيثُ يَقِفُ وَرَاءَ الحُكْمِ الفِقْهِيِّ القَدِيمِ بِأَنَّ مُرَبِّيَ الحَيَوَانَاتِ مُلْزَمٌ بِإِطْعَامِهَا.
    display_day_of_year: 17

  - slug: hadith-uways-al-qarni
    category: hadith_narrative
    title_en: Uways al-Qarni — Known in the Heavens, Unknown on Earth
    title_fr: Uways al-Qaranī — connu dans les cieux, ignoré sur terre
    title_ar: أويس القَرَني — معروفٌ في السماء، مجهولٌ في الأرض
    description_en: |
      The Prophet ﷺ foretold to 'Umar ibn al-Khattab the coming of a man
      named Uways from Yemen — described as suffering from leucoderma,
      devoted to his mother — and instructed Umar to seek his
      supplication for forgiveness if he met him. 'Umar asked each
      year's Yemeni pilgrims until he found Uways, who confirmed the
      details, and 'Umar said: "Seek forgiveness for me." Classical
      commentators (al-Nawawi in Sharh Sahih Muslim) summarised Uways
      as "the best of the Tabi'un" on the strength of this hadith and
      its reception. The narrative makes Uways the pattern of the
      unknown saint — unrecognised in the earthly register but prominent
      among the angels, by virtue of devotion and care for his mother.
    description_fr: |
      Le Prophète ﷺ annonça à ʿUmar ibn al-Khaṭṭāb la venue d'un homme
      nommé Uways du Yémen — décrit comme atteint de leucodermie et
      dévoué à sa mère — et lui ordonna de solliciter sa supplication
      pour le pardon s'il le rencontrait. ʿUmar interrogea chaque année
      les pèlerins yéménites jusqu'à ce qu'il trouve Uways, qui confirma
      les signes, et ʿUmar lui dit : « Demande pardon pour moi. » Les
      commentateurs classiques (al-Nawawī dans Sharḥ Ṣaḥīḥ Muslim) ont
      résumé Uways comme « le meilleur des Tābiʿīn » sur la foi de ce
      ḥadīth. Le récit fait d'Uways le modèle du saint inconnu —
      ignoré du registre terrestre mais éminent parmi les anges, par la
      vertu de sa dévotion et de son soin envers sa mère.
    description_ar: |
      أخبر النبي ﷺ عمرَ بنَ الخطَّاب بقدوم رجلٍ من اليمن اسمه أويس —
      وَصَفَه بالبَرَص وبالبرِّ بأمِّه — وأمره أن يلتمس منه الاستغفار إن
      لقيه. فكان عمرُ يسأل أهلَ اليمن في كلِّ موسمٍ حتى وجده، فأكَّد
      الأوصاف، فقال له عمر: «استغفر لي». ولخَّص الشرَّاح الكبار (النوويُّ
      في شرح صحيح مسلم) أويسًا بأنه «خير التابعين» اعتمادًا على هذا
      الحديث. ويصير أويسٌ في هذه الرواية مثالَ الوليِّ المجهول — لا يعرفه
      أهلُ الأرض، ولكنَّه شهيرٌ في الملأ الأعلى ببرِّه بأمِّه وعبادته.
    reference: Sahih Muslim 2542
    source_notes: |
      Al-Nawawī (Sharḥ Muslim) calls Uways "the best of the Tābiʿīn" on the strength of this hadith, noting that the Prophet's ﷺ instruction to ʿUmar ra to seek his supplication establishes the legitimacy of requesting duʿāʾ from the righteous. Ibn Ḥajar adds that Uways's leucoderma and devotion to his mother elevated him above those more visible in society. The hadith affirms that spiritual rank is not measured by worldly recognition.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Muslim) qualifie Uways de « le meilleur des Tābiʿīn » sur la foi de ce ḥadīth, notant que l'instruction du Prophète ﷺ à ʿUmar (qu'Allah l'agrée) de solliciter sa supplication établit la légitimité de demander la duʿāʾ des pieux. Ibn Ḥajar ajoute que le leucoderme d'Uways et son dévouement à sa mère l'ont élevé au-dessus de ceux qui sont plus visibles dans la société. Ce ḥadīth affirme que le rang spirituel ne se mesure pas à la reconnaissance mondaine.
    source_notes_ar: |
      يُسَمِّي النَّوَوِيُّ (شَرْحُ مُسْلِمٍ) أُوَيْسًا «خَيْرَ التَّابِعِينَ» بِسَبَبِ هَذَا الحَدِيثِ، مُشِيرًا إِلَى أَنَّ تَوْجِيهَ النَّبِيِّ ﷺ لِعُمَرَ رَضِيَ اللهُ عَنْهُ بِطَلَبِ دُعَائِهِ يُثْبِتُ جَوَازَ اسْتِرْسَالِ دُعَاءِ الصَّالِحِينَ. وَيَزِيدُ ابنُ حَجَرٍ أَنَّ بَرَصَ أُوَيْسٍ وَبِرَّهُ بِأُمِّهِ رَفَعَاهُ فَوْقَ مَنْ هُمْ أَظْهَرُ فِي المُجْتَمَعِ. وَيُؤَكِّدُ هَذَا الحَدِيثُ أَنَّ المَنْزِلَةَ الرُّوحِيَّةَ لاَ تُقَاسُ بِالشُّهْرَةِ الدُّنْيَوِيَّةِ.
    display_day_of_year: 27
    hadith_refs: "Muslim 2542"

  - slug: hadith-prostitute-and-dog
    category: hadith_narrative
    title_en: A Prostitute Forgiven for Giving Water to a Dog
    title_fr: Une prostituée pardonnée pour avoir abreuvé un chien
    title_ar: البَغِيُّ التي غُفِر لها بسقي كلبٍ
    description_en: |
      The Prophet ﷺ narrated: "A prostitute from the Children of Israel
      saw a dog on a hot day going around a well, its tongue hanging out
      from thirst. She took off her shoe, tied it with her head-cover,
      and drew up some water for it. Allah forgave her on account of
      that." The hadith — reported alongside that of the cat — emphasises
      that mercy can atone for lives otherwise defined by sin, and that
      Allah's forgiveness is not constrained by the standing of a deed's
      author.
    description_fr: |
      Le Prophète ﷺ a rapporté : « Une prostituée des Banū Isrāʾīl vit
      un chien tourner autour d'un puits par un jour de chaleur, la
      langue pendante de soif. Elle ôta sa chaussure, l'attacha à son
      voile et puisa de l'eau pour lui. Allah lui pardonna pour cela. »
      Le ḥadīth — rapporté en parallèle de celui du chat — souligne
      que la miséricorde peut racheter des vies autrement marquées par
      le péché, et que le pardon divin n'est pas conditionné par le
      rang social de l'auteur d'une bonne action.
    description_ar: |
      روى النبي ﷺ: «بينما كلبٌ يطوف ببئرٍ قد كاد يقتله العطشُ، إذ رأته
      بَغِيٌّ من بَغَايا بني إسرائيل، فنزعت موقَها فاستقت له فسقتْه إيَّاه،
      فغُفِر لها به». ويرد هذا الحديث مَقْرونًا بحديث الهرَّة — مؤكِّدًا
      أنَّ الرحمة تُكَفِّر حتى الحياةَ الموسومة بالذنوب، وأنَّ الغفران
      الإلهيَّ لا يحدُّه مقامُ صاحب العمل في المجتمع.
    reference: Sahih al-Bukhari 3321, Sahih Muslim 2245
    hadith_refs: "Bukhari 3321, Muslim 2245"
    source_notes: |
      Ibn Ḥajar notes that this hadith — paired with the cat hadith — establishes that mercy to animals can expiate even major sins when it reflects a heart still capable of compassion. Al-Nawawī adds that the woman's profession made her socially contemptible, yet a single act of mercy reached Allah directly, illustrating that divine judgment bypasses human hierarchies. This is a classical proof that sincerity, not social standing, determines acceptance.

    source_notes_fr: |
      Ibn Ḥajar note que ce ḥadīth — jumelé avec celui du chat — établit que la miséricorde envers les animaux peut expier même les péchés majeurs lorsqu'elle reflète un cœur encore capable de compassion. Al-Nawawī ajoute que la profession de cette femme la rendait méprisable aux yeux de la société, pourtant un seul acte de miséricorde atteignit Allah directement, illustrant que le jugement divin court-circuite les hiérarchies humaines. C'est une preuve classique que c'est la sincérité, non la condition sociale, qui détermine l'acceptation.
    source_notes_ar: |
      يُشِيرُ ابنُ حَجَرٍ إِلَى أَنَّ هَذَا الحَدِيثَ — مَعَ حَدِيثِ القِطَّةِ — يُثْبِتُ أَنَّ الرَّأْفَةَ بِالحَيَوَانَاتِ تُكَفِّرُ حَتَّى الكَبَائِرَ إِذَا كَانَتْ مِنْ قَلْبٍ لَمْ يَفْقِدْ رَحْمَتَهُ. وَيَزِيدُ النَّوَوِيُّ أَنَّ مِهْنَتَهَا جَعَلَتْهَا حَقِيرَةً فِي أَعْيُنِ النَّاسِ، وَلَكِنَّ فِعْلَةَ رَحْمَةٍ وَاحِدَةً وَصَلَتْ إِلَى اللهِ مُبَاشَرَةً، مُوَضِّحَةً أَنَّ الحُكْمَ الإِلَهِيَّ يَتَجَاوَزُ التَّرَاتُبَاتِ البَشَرِيَّةِ. وَهَذِهِ حُجَّةٌ قَدِيمَةٌ عَلَى أَنَّ الإِخْلَاصَ لاَ المَنْزِلَةَ الاجْتِمَاعِيَّةَ يُعَيِّنُ القَبُولَ.
    display_day_of_year: 37

  - slug: hadith-umar-conversion
    category: hadith_narrative
    title_en: The Conversion of Umar ibn al-Khattab
    title_fr: La conversion de ʿUmar ibn al-Khaṭṭāb
    title_ar: إسلام عمر بن الخطَّاب
    description_en: |
      Umar ibn al-Khattab set out with a drawn sword to kill the Prophet
      ﷺ. On the way he learnt that his sister Fatima and her husband had
      accepted Islam. Furious, he burst into their house, struck his
      sister, then — seeing the blood and her steadfastness — felt
      remorse and asked to read what they had. They refused unless he
      performed ghusl (he was in the state of minor ritual impurity).
      He washed and read the opening of Surah Ta-Ha. His heart opened at
      once; he went to the Prophet ﷺ and declared his Islam. The
      Muslims, until then worshipping in hiding, prayed openly at the
      Ka'ba for the first time.
    description_fr: |
      ʿUmar ibn al-Khaṭṭāb sortit, l'épée tirée, pour tuer le Prophète
      ﷺ. En chemin, il apprit que sa sœur Fāṭima et son mari avaient
      embrassé l'Islam. Furieux, il fit irruption chez eux et frappa sa
      sœur ; voyant le sang et sa fermeté, il se repentit et demanda à
      lire ce qu'ils avaient. Ils refusèrent tant qu'il ne fit pas le
      ghusl (il était en état d'impureté mineure). Il se lava et lut le
      début de la sourate Ṭā Hā. Son cœur s'ouvrit aussitôt ; il alla
      auprès du Prophète ﷺ et déclara son Islam. Les musulmans, qui
      jusque-là priaient en cachette, prièrent pour la première fois
      ouvertement à la Kaʿba.
    description_ar: |
      خرج عمر بن الخطَّاب وسيفُه مسلولٌ يريد قتل النبي ﷺ، فأُخبِر في
      الطريق أنَّ أختَه فاطمة وزوجها قد أسلما. فاحتدَّ ودخل عليهما فضرب
      أختَه، فلمَّا رأى الدم وثباتَها ندم وطلب أن يقرأ ما عندهما. فأبَيا
      حتى يغتسل (كان جنبًا)، فاغتسل وقرأ مطلع سورة طه، فانشرح قلبُه
      للحال، فجاء النبيَّ ﷺ وأعلن إسلامَه. وصلَّى المسلمون — وكانوا حتى
      ذلك الحين يصلُّون سرًّا — لأوَّل مرَّةٍ ظاهرين عند الكعبة.
    reference: al-Sira al-Nabawiyya (Ibn Hisham); cf. classical muhaddithin
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) treats ʿUmar's conversion as a turning point in Islamic history, noting that the Prophet ﷺ had prayed for Allah to strengthen Islam through one of two men — ʿUmar or Abū Jahl. Al-Nawawī adds that ʿUmar's public declaration of Islam at the Kaʿba, immediately after his conversion, demonstrated that true faith generates courage rather than caution. While narrated in sīra works, the incident is corroborated by multiple Companion reports.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) traite la conversion de ʿUmar comme un tournant de l'histoire islamique, notant que le Prophète ﷺ avait prié Allah pour renforcer l'Islām par l'un de deux hommes — ʿUmar ou Abū Jahl. Al-Nawawī ajoute que la déclaration publique de l'Islām par ʿUmar à la Kaʿba, immédiatement après sa conversion, démontra que la vraie foi engendre le courage plutôt que la prudence. Bien que rapportée dans les œuvres de sīra, l'incident est corroboré par de multiples récits de Compagnons.
    source_notes_ar: |
      يَعْتَبِرُ ابنُ حَجَرٍ (فَتْحُ البَارِي) إِسْلاَمَ عُمَرَ نُقْطَةَ تَحَوُّلٍ فِي التَّارِيخِ الإِسْلاَمِيِّ، مُشِيرًا إِلَى أَنَّ النَّبِيَّ ﷺ كَانَ قَدْ دَعَا اللهَ أَنْ يُعَزَّزَ الإِسْلاَمَ بِأَحَدِ رَجُلَيْنِ — عُمَرَ أَوْ أَبِي جَهْلٍ. وَيَزِيدُ النَّوَوِيُّ أَنَّ إِعْلاَنَ عُمَرَ لإِسْلاَمِهِ عَلَانِيَةً عِنْدَ الكَعْبَةِ مُبَاشَرَةً بَعْدَ إِسْلاَمِهِ كَانَ بُرْهَانًا عَلَى أَنَّ الإِيمَانَ الحَقِيقِيَّ يُنْتِجُ الشَّجَاعَةَ لاَ الحَذَرَ. وَعَلَى الرَّغْمِ مِنْ أَنَّهَا مَذْكُورَةٌ فِي كُتُبِ السِّيرَةِ، فَإِنَّ الحَادِثَةَ مُؤَيَّدَةٌ بِرِوَايَاتٍ مُتَعَدِّدَةٍ لِلصَّحَابَةِ.
    display_day_of_year: 47

  - slug: hadith-salman-conversion
    category: hadith_narrative
    title_en: The Conversion of Salman al-Farisi
    title_fr: La conversion de Salmān al-Fārisī
    title_ar: إسلام سلمان الفارسي
    description_en: |
      Salman, the son of a Persian Zoroastrian village chief, was drawn
      from his father's religion to Christianity, then followed a
      succession of righteous bishops across Syria who each pointed him
      to the next. The last directed him to seek the final prophet,
      describing his marks: the seal of prophethood between his
      shoulders, his acceptance of gifts but refusal of charity. On the
      way, a tribe enslaved him and brought him to Yathrib. There he met
      the Prophet ﷺ, tested the signs, and embraced Islam. He was the
      companion who proposed the digging of the Trench at the siege of
      Madinah. The Prophet ﷺ called him: "Salman is one of us, Ahl
      al-Bayt."
    description_fr: |
      Salmān, fils du chef d'un village zoroastrien perse, fut détourné
      de la religion de son père vers le christianisme, puis suivit une
      succession d'évêques pieux à travers la Syrie qui chacun le
      renvoyaient au suivant. Le dernier l'orienta vers la recherche du
      prophète final, en lui décrivant ses signes : le sceau de la
      prophétie entre les épaules, son acceptation des présents mais
      son refus de l'aumône. En route, une tribu le réduisit en
      esclavage et l'amena à Yathrib. Il y rencontra le Prophète ﷺ,
      vérifia les signes et embrassa l'Islam. Ce fut lui qui proposa de
      creuser le Fossé lors du siège de Madīna. Le Prophète ﷺ dit de
      lui : « Salmān est des nôtres, Ahl al-Bayt. »
    description_ar: |
      كان سلمان ابنَ زعيم قريةٍ مجوسيَّةٍ فارسيَّة، فانصرف عن دين أبيه إلى
      النصرانيَّة، ثم تتبَّع جماعةً من الرهبان الصالحين في الشام، يُحيله كلُّ
      واحدٍ إلى من بعده. فأرشده آخرُهم إلى طلبِ النبيِّ الخاتم وذكر له
      علاماته: خاتمَ النبوَّة بين كتفيه، وقَبولَه الهديَّة دون الصدقة.
      فاسترقَّتْه قبيلةٌ في الطريق وجاءت به إلى يثرب، فلقي النبيَّ ﷺ،
      واختبر العلامات وأسلم. وهو الذي أشار بحفر الخندق في غزوة الأحزاب،
      فقال فيه النبي ﷺ: «سلمانُ منَّا أهلَ البيت».
    reference: Ibn Hisham, al-Sira al-Nabawiyya; al-Shama'il al-Muhammadiyya 21 (Hasan); Musnad Ahmad (long-form Salman narration)
    source_notes: |
      Ibn Ḥajar traces Salmān's journey through three religions as a divine preparation that made him uniquely able to recognize the final Prophet ﷺ. Al-Nawawī notes that the Prophet's ﷺ statement "Salman is one of us, Ahl al-Bayt" is a unique honor for a non-Arab Companion, establishing that lineage in Islam is measured by faith and service, not blood. The hadith is frequently cited in discussions of racial equality in the ummah.
    source_notes_fr: |
      Ibn Ḥajar retrace le parcours de Salmān à travers trois religions comme une préparation divine qui le rendit unique en capacité de reconnaître le Prophète final ﷺ. Al-Nawawī note que la déclaration du Prophète ﷺ « Salmān est des nôtres, Ahl al-Bayt » est un honneur unique pour un Compagnon non-arabe, établissant que la lignée en Islām se mesure à la foi et au service, non au sang. Ce ḥadīth est fréquemment cité dans les discussions sur l'égalité raciale dans la umma.
    source_notes_ar: |
      يَتَتَبَّعُ ابنُ حَجَرٍ رِحْلَةَ سَلْمَانَ عَبْرَ ثَلاَثِ دِيَانَاتٍ كَإِعْدَادٍ إِلَهِيٍّ جَعَلَهُ قَادِرًا بِشَكْلٍ فَرِيدٍ عَلَى التَّعَرُّفِ إِلَى النَّبِيِّ الخَاتِمِ ﷺ. وَيُشِيرُ النَّوَوِيُّ إِلَى أَنَّ قَوْلَ النَّبِيِّ ﷺ «سَلْمَانُ مِنَّا أَهْلَ البَيْتِ» هُوَ تَشْرِيفٌ فَرِيدٌ لِصَحَابِيٍّ غَيْرِ عَرَبِيٍّ، مُؤَسِّسًا أَنَّ النَّسَبَ فِي الإِسْلاَمِ يُقَاسُ بِالإِيمَانِ وَالخِدْمَةِ لاَ بِالدَّمِ. وَيُسْتَشْهَدُ بِهَذَا الحَدِيثِ كَثِيرًا فِي مَبَاحِثِ المُسَاوَاةِ العِرْقِيَّةِ فِي الأُمَّةِ.
    display_day_of_year: 57

  - slug: hadith-bedouin-mosque
    category: hadith_narrative
    title_en: The Bedouin Who Urinated in the Mosque
    title_fr: Le bédouin qui urina dans la mosquée
    title_ar: الأعرابي الذي بال في المسجد
    description_en: |
      A bedouin entered the Prophet's ﷺ mosque in Madinah and began to
      urinate in a corner. The Companions rushed to stop him, but the
      Prophet ﷺ restrained them: "Leave him; do not interrupt him." When
      he had finished, the Prophet ﷺ called him over and said gently:
      "These mosques are not fit for any urine or filth; they are for
      the remembrance of Allah, the prayer, and the recitation of the
      Qur'an." He then ordered a bucket of water to be poured over the
      spot. The bedouin later said: "May Allah have mercy on me and
      Muhammad, and no one else."
    description_fr: |
      Un bédouin entra dans la mosquée du Prophète ﷺ à Madīna et se
      mit à uriner dans un coin. Les Compagnons se précipitèrent pour
      l'arrêter, mais le Prophète ﷺ les retint : « Laissez-le, ne
      l'interrompez pas. » Lorsqu'il eut terminé, le Prophète ﷺ
      l'appela et lui dit avec douceur : « Ces mosquées ne sont
      destinées ni à l'urine ni à la souillure ; elles sont pour
      l'évocation d'Allah, la prière et la récitation du Coran. » Il
      ordonna ensuite qu'un seau d'eau soit versé sur l'endroit. Le
      bédouin dit plus tard : « Ô Allah, fais-moi miséricorde et fais
      miséricorde à Muḥammad, et à personne d'autre. »
    description_ar: |
      دخل أعرابيٌّ مسجدَ النبيِّ ﷺ بالمدينة، فقام يبول في ناحيةٍ منه.
      فأسرع الصحابة إليه ليكفُّوه، فقال النبي ﷺ: «دَعُوه ولا تُزْرِمُوه».
      فلما فرغ، دعاه النبي ﷺ ولاطفَه: «إنَّ هذه المساجد لا تصلح لشيءٍ
      من هذا البول ولا القَذَر، إنما هي لذكر الله، والصلاة، وقراءة
      القرآن». ثم أمر بذَنوبٍ من ماءٍ فأُهريق على الموضع. وقال الأعرابيُّ
      بعد ذلك: «اللهم ارحمني ومحمَّدًا، ولا ترحم معنا أحدًا».
    reference: Sahih al-Bukhari 220, Sahih Muslim 285
    hadith_refs: "Bukhari 220, Muslim 285"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) explains that the Prophet's ﷺ gentle correction — after allowing the man to finish — demonstrates the pedagogical principle of not interrupting a wrongdoer mid-act, lest he become defensive. Al-Nawawī adds that the command to pour water over the impurity established the fiqh ruling that liquid impurity in a mosque is removed by washing, not merely covering. The hadith remains a standard text in works on adab and mosque etiquette.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) explique que la correction douce du Prophète ﷺ — après avoir laissé l'homme terminer — démontre le principe pédagogique selon lequel il ne faut pas interrompre un fautif en plein acte, de peur qu'il ne se ferme. Al-Nawawī ajoute que l'ordre de verser de l'eau sur l'impureté a établi le ruling du fiqh selon lequel l'impureté liquide dans une mosquée s'élimine par le lavage, non pas simplement par le recouvrement. Ce ḥadīth demeure un texte standard dans les œuvres sur l'adab et l'étiquette mosquée.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي) أَنَّ تَوْجِيهَ النَّبِيِّ ﷺ بِرِفْقٍ — بَعْدَ أَنْ تَرَكَ الرَّجُلَ يُنْهِي فِعْلَهُ — يُبَيِّنُ أَصْلًا تَرْبَوِيًّا: لاَ تَقْطِعْ عَلَى المُذْنِبِ فِي وَسَطِ فِعْلِهِ كَيْ لاَ يَنْغَلِقَ. وَيَزِيدُ النَّوَوِيُّ أَنَّ أَمْرَهُ بِصَبِّ المَاءِ عَلَى النَّجَاسَةِ أَسَّسَ الحُكْمَ الفِقْهِيَّ بِأَنَّ النَّجَاسَةَ السَّائِلَةَ فِي المَسْجِدِ تُزَالُ بِالغَسْلِ لاَ بِالسَّتْرِ فَقَطْ. وَيَبْقَى هَذَا الحَدِيثُ نَصًّا قِيَاسِيًّا فِي كُتُبِ الأَدَبِ وَآدَابِ المَسَاجِدِ.
    display_day_of_year: 67

  - slug: hadith-mu-adh-i-love-you
    category: hadith_narrative
    title_en: "O Mu'adh, I Love You"
    title_fr: « Ô Muʿādh, je t'aime »
    title_ar: «يا معاذُ، إنِّي أحبُّك»
    description_en: |
      The Prophet ﷺ took Mu'adh ibn Jabal's hand and said: "O Mu'adh, by
      Allah, I love you." Then he said: "I advise you, O Mu'adh — do not
      leave off saying after every prayer: 'Allahumma a'inni 'ala
      dhikrika wa shukrika wa husni 'ibadatik' (O Allah, help me to
      remember You, to thank You, and to worship You well)." The hadith
      preserves both an expression of personal love from the Prophet ﷺ
      toward one of his close companions and a specific supplication
      that has become standard in the post-prayer litany.
    description_fr: |
      Le Prophète ﷺ prit la main de Muʿādh ibn Jabal et lui dit :
      « Ô Muʿādh, par Allah, je t'aime. » Puis il ajouta : « Je te
      recommande, ô Muʿādh — ne manque pas de dire après chaque prière :
      « Allāhumma aʿinnī ʿalā dhikrika wa shukrika wa ḥusni ʿibādatik »
      (Ô Allah, aide-moi à T'évoquer, à Te remercier et à T'adorer comme
      il convient). » Le ḥadīth conserve à la fois une expression
      d'amour personnel du Prophète ﷺ envers l'un de ses proches
      Compagnons et une supplication précise devenue partie intégrante
      de l'Adhkār d'après-prière.
    description_ar: |
      أخذ النبيُّ ﷺ بيد معاذ بن جبلٍ وقال: «يا معاذُ، والله إنِّي
      أحبُّك». ثم قال: «أُوصيك يا معاذُ، لا تَدَعَنَّ في دُبُر كلِّ صلاةٍ
      أن تقول: اللهم أَعِنِّي على ذكرك وشكرك وحسن عبادتك». فجمع هذا
      الحديث بين إعلانٍ شخصيٍّ من النبي ﷺ بحبِّ أحد أَخَصِّ صحبه، ودعاءٍ
      بعينه صار رُكنًا في أذكار ما بعد الصلاة.
    reference: Sunan Abi Dawud 1522, Sunan an-Nasa'i 1303; graded sahih
    hadith_refs: "Abu Dawud 1522, Nasa'i 1303"
    source_notes: |
      Al-Nawawī (Sharḥ Muslim) notes that the Prophet's ﷺ declaration of love for Muʿādh was not mere affection but a confirmation of his spiritual excellence, since the Prophet ﷺ did not express love lightly. Ibn Ḥajar adds that the supplication taught in this hadith — for dhikr, shukr, and ḥusn al-ʿibāda — became a cornerstone of the post-prayer litany. The hadith is graded ṣaḥīḥ by al-Albānī and is transmitted with a sound chain.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Muslim) note que la déclaration d'amour du Prophète ﷺ pour Muʿādh n'était pas une simple affection, mais une confirmation de son excellence spirituelle, car le Prophète ﷺ n'exprimait pas l'amour à la légère. Ibn Ḥajar ajoute que la supplication enseignée dans ce ḥadīth — pour le dhikr, le shukr et le ḥusn al-ʿibāda — est devenue une pierre angulaire de la liturgie d'après-prière. Ce ḥadīth est gradé ṣaḥīḥ par al-Albānī et transmis avec une chaîne saine.
    source_notes_ar: |
      يُشِيرُ النَّوَوِيُّ (شَرْحُ مُسْلِمٍ) إِلَى أَنَّ إِعْلاَنَ حُبِّ النَّبِيِّ ﷺ لِمُعَاذٍ لَمْ يَكُنْ مُجَرَّدَ مَحَبَّةٍ بَلْ تَأْكِيدًا لِفَضْلِهِ الرُّوحِيِّ، إِذْ لَمْ يَكُنِ النَّبِيُّ ﷺ يُبَالِغُ فِي التَّعْبِيرِ عَنِ الحُبِّ. وَيَزِيدُ ابنُ حَجَرٍ أَنَّ الدُّعَاءَ الَّذِي عَلَّمَهُ هَذَا الحَدِيثُ — فِي الذِّكْرِ وَالشُّكْرِ وَحُسْنِ العِبَادَةِ — صَارَ رُكْنًا مِنْ أَرْكَانِ الأَذْكَارِ بَعْدَ الصَّلاَةِ. وَهَذَا الحَدِيثُ صَحِيحُ العِلَّةِ عِنْدَ الأَلبَانِيِّ، مَرْوِيٌّ بِسَنَدٍ قَوِيٍّ.
    display_day_of_year: 77

  - slug: hadith-three-questions-of-grave
    category: hadith_narrative
    title_en: The Three Questions of the Grave
    title_fr: Les trois questions de la tombe
    title_ar: أسئلة القبر الثلاثة
    description_en: |
      The Prophet ﷺ described the interrogation every person undergoes
      after death: two angels come and ask, "Who is your Lord?" (the
      answer for the believer: "My Lord is Allah"), "What is your
      religion?" ("My religion is Islam"), and "What do you say about
      this man who was sent among you?" ("He is Muhammad, the Messenger
      of Allah"). The believer's grave is then made spacious and
      illuminated until the resurrection. The Prophet ﷺ used to seek
      refuge with Allah from the punishment of the grave at the end of
      every salah.
    description_fr: |
      Le Prophète ﷺ a décrit l'interrogatoire que subit toute personne
      après la mort : deux anges viennent et demandent : « Qui est ton
      Seigneur ? » (la réponse du croyant : « Mon Seigneur est Allah »),
      « Quelle est ta religion ? » (« Ma religion est l'Islam »), et
      « Que dis-tu de cet homme qui fut envoyé parmi vous ? » (« Il est
      Muḥammad, le Messager d'Allah »). La tombe du croyant est alors
      élargie et illuminée jusqu'à la résurrection. Le Prophète ﷺ
      cherchait refuge auprès d'Allah contre le châtiment de la tombe à
      la fin de chaque ṣalāh.
    description_ar: |
      وصف النبيُّ ﷺ سؤال القبر الذي يخضع له كلُّ إنسانٍ بعد الموت:
      يأتيه ملكان فيقولان: «من ربُّك؟» (فيقول المؤمن: «ربيَ الله»)،
      «ما دينُك؟» («ديني الإسلام»)، «ما تقول في هذا الرجل الذي بُعث
      فيكم؟» («هو محمدٌ رسول الله»)، فيُفسَح للمؤمن في قبره ويُنوَّر له
      إلى يوم البعث. وكان النبي ﷺ يستعيذ بالله من عذاب القبر في خاتمة
      كلِّ صلاة.
    reference: Sunan Abi Dawud 4753 (Sahih per al-Albani); supplementary narrations of al-Bara' ibn 'Azib in Musnad Ahmad
    source_notes: |
      Ibn Ḥajar explains that the three questions correspond to the three foundations of religion: Lord (tawḥīd), religion (dīn), and messenger (risāla). Al-Nawawī adds that the believer's ability to answer firmly is not a test of memorisation but of lived conviction — a heart habituated to these truths responds naturally. The hadith is the primary textual basis for the orthodox belief in the trial of the grave, affirmed by Ahl al-Sunna.
    source_notes_fr: |
      Ibn Ḥajar explique que les trois questions correspondent aux trois fondements de la religion : Seigneur (tawḥīd), religion (dīn) et messager (risāla). Al-Nawawī ajoute que la capacité du croyant à répondre avec fermeté n'est pas une épreuve de mémorisation mais de conviction vécue — un cœur habitué à ces vérités répond naturellement. Ce ḥadīth est la base textuelle principale de la croyance orthodoxe à l'épreuve de la tombe, affirmée par Ahl al-Sunna.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ أَنَّ الثَّلاَثَةَ أَسْئِلَةٍ تُقَابِلُ أُصُولَ الدِّينِ الثَّلاَثَةَ: الرُّبُوبِيَّةُ (التَّوْحِيدُ) وَالدِّينُ وَالرِّسَالَةُ. وَيَزِيدُ النَّوَوِيُّ أَنَّ قُدْرَةَ المُؤْمِنِ عَلَى الإِجَابَةِ بِثَبَاتٍ لَيْسَتْ امْتِحَانَ حِفْظٍ بَلْ امْتِحَانَ يَقِينٍ مَعِيشٍ — فَالقَلْبُ الَّذِي تَعَوَّدَ هَذِهِ الحَقَائِقَ يَجِيبُ بِطَبْعِهِ. وَهَذَا الحَدِيثُ هُوَ الأَصْلُ النَّصِّيُّ الأَوَّلُ لِلْعَقِيدَةِ الأُرْثُوذُكسِيَّةِ فِي فِتْنَةِ القَبْرِ، الَّتِي يُؤَكِّدُهَا أَهْلُ السُّنَّةِ.
    display_day_of_year: 87
    hadith_refs: "Abu Dawud 4753"

  - slug: hadith-do-not-get-angry
    category: hadith_narrative
    title_en: "Do Not Become Angry"
    title_fr: « Ne te mets pas en colère »
    title_ar: «لا تَغْضَب»
    description_en: |
      A man came to the Prophet ﷺ and said: "Advise me." He said: "Do
      not become angry." The man repeated his request several times;
      each time the Prophet ﷺ gave the same answer: "Do not become
      angry." The hadith has become a principle of Islamic ethics: the
      management of anger is not a peripheral virtue but the core of
      practical religion, because almost every destructive act —
      whether of speech, property, violence, or family rupture —
      originates in a moment of unrestrained anger.
    description_fr: |
      Un homme vint voir le Prophète ﷺ et dit : « Conseille-moi. » Il
      répondit : « Ne te mets pas en colère. » L'homme répéta sa demande
      plusieurs fois ; chaque fois, le Prophète ﷺ donna la même
      réponse : « Ne te mets pas en colère. » Ce ḥadīth est devenu un
      principe de l'éthique islamique : la maîtrise de la colère n'est
      pas une vertu accessoire mais le cœur même de la religion vécue,
      car presque tout acte destructeur — qu'il soit de parole, de
      patrimoine, de violence ou de rupture familiale — naît d'un
      instant de colère non maîtrisée.
    description_ar: |
      جاء رجلٌ إلى النبي ﷺ فقال: «أوصِني». فقال: «لا تَغْضَب». فردَّد
      الرجل سؤاله مرارًا، يقول له النبي ﷺ في كلِّ مرَّةٍ: «لا تَغْضَب».
      وصار هذا الحديث أصلًا من أصول الأخلاق الإسلاميَّة: ضبطُ الغضب ليس
      فضيلةً ثانويَّةً بل لُبَّ الدين العمليِّ، لأنَّ كلَّ عملٍ هَدَّامٍ
      في الكلام أو المال أو العنف أو القطيعة يولد في لحظة غضبٍ غير
      مكبوحٍ.
    reference: Sahih al-Bukhari 6116
    hadith_refs: "Bukhari 6116"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) notes that the Prophet ﷺ repeated "do not become angry" three times not because anger itself is prohibited — righteous indignation for Allah's sake is praiseworthy — but because unrestrained anger destroys reason and religion together. Al-Nawawī adds that this hadith heads the section on anger in his Forty Hadith, establishing emotional regulation as foundational to character. It is a primary proof in works on akhlāq and tazkiyah.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) note que le Prophète ﷺ a répété « ne te mets pas en colère » trois fois non pas parce que la colère elle-même est interdite — l'indignation vertueuse pour la cause d'Allah est louable — mais parce que la colère débridée détruit la raison et la religion ensemble. Al-Nawawī ajoute que ce ḥadīth ouvre la section sur la colère dans ses Quarante Hadiths, établissant la régulation émotionnelle comme fondement du caractère. C'est une preuve principale dans les œuvres sur l'akhlāq et la tazkiyah.
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي) أَنَّ النَّبِيَّ ﷺ كَرَّرَ «لاَ تَغْضَبْ» ثَلاَثَ مَرَّاتٍ لاَ لِأَنَّ الغَضَبَ ذَاتَهُ مَحْظُورٌ — فَإِنَّ الغَيْظَ الصَّالِحَ فِي سَبِيلِ اللهِ مَحْمُودٌ — بَلْ لِأَنَّ الغَضَبَ المُطْلَقَ يُدَمِّرُ العَقْلَ وَالدِّينَ مَعًا. وَيَزِيدُ النَّوَوِيُّ أَنَّ هَذَا الحَدِيثَ يَفْتَتِحُ بَابَ الغَضَبِ فِي أَرْبَعِينِيَّتِهِ، مُؤَسِّسًا ضَبْطَ الانْفِعَالَاتِ رُكْنًا لِلأَخْلاَقِ. وَهُوَ حُجَّةٌ أُصُولِيَّةٌ فِي كُتُبِ الأَخْلاَقِ وَالتَّزْكِيَةِ.
    display_day_of_year: 97

  - slug: hadith-muslim-is-brother
    category: hadith_narrative
    title_en: "A Muslim Is the Brother of a Muslim"
    title_fr: « Le musulman est le frère du musulman »
    title_ar: «المسلم أخو المسلم»
    description_en: |
      The Prophet ﷺ said: "A Muslim is the brother of a Muslim — he does
      not wrong him, does not forsake him, and does not belittle him.
      Taqwa is here" — and he pointed to his chest three times. "It is
      enough evil for a person to belittle his Muslim brother. Every
      Muslim is sacred to every other Muslim: his blood, his property,
      and his honour." The hadith articulates the basic structure of
      Muslim communal ethics.
    description_fr: |
      Le Prophète ﷺ a dit : « Le musulman est le frère du musulman —
      il ne lui fait pas tort, ne l'abandonne pas et ne le méprise pas.
      La piété est ici » — et il pointa sa poitrine trois fois. « Il
      suffit comme mal à un homme de mépriser son frère musulman. Tout
      musulman est sacré pour tout autre musulman : son sang, ses biens
      et son honneur. » Le ḥadīth énonce la structure fondamentale de
      l'éthique communautaire musulmane.
    description_ar: |
      قال النبي ﷺ: «المسلمُ أخو المسلم، لا يَظلمُه ولا يَخْذلُه ولا
      يَحْقِرُه. التَّقوى هاهنا» — وأشار إلى صدره ثلاثًا. «بحسب امرئٍ من
      الشَّرِّ أن يَحْقِر أخاه المسلم. كلُّ المسلمِ على المسلم حرامٌ:
      دمُه ومالُه وعِرْضُه». فهذا الحديث يُحْكِم البنيةَ الأساسيَّةَ
      للأخلاق الجماعيَّة المسلمة.
    reference: Sahih Muslim 2564
    hadith_refs: "Muslim 2564"
    source_notes: |
      Al-Nawawī (Sharḥ Muslim) explains that the hadith establishes five protections for every Muslim: blood, property, honour, companionship, and shelter from belittlement. Ibn Ḥajar adds that the threefold repetition of "does not wrong, forsake, or belittle" mirrors the threefold destruction these sins cause — to the individual, the relationship, and the community. This hadith is foundational to classical works on Islamic social ethics and contract law.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Muslim) explique que ce ḥadīth établit cinq protections pour chaque musulman : le sang, les biens, l'honneur, la compagnie et l'abri du mépris. Ibn Ḥajar ajoute que la répétition triple de « ne fait pas tort, n'abandonne pas et ne méprise pas » reflète la destruction triple que ces péchés causent — à l'individu, à la relation et à la communauté. Ce ḥadīth est fondamental pour les œuvres classiques sur l'éthique sociale islamique et le droit des contrats.
    source_notes_ar: |
      يُفَسِّرُ النَّوَوِيُّ (شَرْحُ مُسْلِمٍ) أَنَّ هَذَا الحَدِيثَ يُقِيمُ خَمْسَ حُمَيَّاتٍ لِكُلِّ مُسْلِمٍ: الدَّمَ وَالمَالَ وَالعِرْضَ وَالصُّحْبَةَ وَالحِمَايَةَ مِنَ الاحْتِقَارِ. وَيَزِيدُ ابنُ حَجَرٍ أَنَّ التَّثْلِيثَ فِي «لاَ يَظْلِمُ وَلاَ يَخْذُلُ وَلاَ يَحْقِرُ» يُقَابِلُ التَّثْلِيثَ فِي الدَّمَارِ الَّذِي تُحْدِثُهُ هَذِهِ الذُّنُوبُ — فِي الشَّخْصِ وَالعِلاقَةِ وَالمُجْتَمَعِ. وَهَذَا الحَدِيثُ رُكْنٌ فِي الكُتُبِ الكَلاسِيكِيَّةِ عَلَى الأَخْلاَقِ الاجْتِمَاعِيَّةِ الإِسْلاَمِيَّةِ وَقَانُونِ العُقُودِ.
    display_day_of_year: 107

  - slug: hadith-value-of-time
    category: hadith_narrative
    title_en: "Two Blessings Many Overlook"
    title_fr: Deux bénédictions que beaucoup négligent
    title_ar: نعمتان مغبونٌ فيهما كثيرٌ من الناس
    description_en: |
      The Prophet ﷺ said: "Two blessings that most people are deceived
      regarding: health and free time." The brief hadith is one of the
      most-cited pieces of Prophetic wisdom in classical tazkiya
      literature. Al-Ghazali opens the section on time-management in
      Ihya' 'Ulum al-Din with it; Ibn al-Qayyim expands it into a
      treatise on the uses and abuses of a life span.
    description_fr: |
      Le Prophète ﷺ a dit : « Deux bénédictions à propos desquelles la
      plupart des gens sont trompés : la santé et le temps libre. »
      Ce bref ḥadīth est l'une des sentences prophétiques les plus
      citées dans la littérature classique de la tazkiya. Al-Ghazālī
      ouvre la section sur la gestion du temps de l'Iḥyāʾ ʿulūm al-dīn
      par ce ḥadīth ; Ibn al-Qayyim en a tiré tout un traité sur les
      usages et les abus de la durée d'une vie.
    description_ar: |
      قال النبي ﷺ: «نعمتان مغبونٌ فيهما كثيرٌ من الناس: الصِّحَّة
      والفراغ». فهذا الحديث القصير من أكثر كلمات النبي حضورًا في كتب
      التزكية الكلاسيكيَّة. افتتح به الغزاليُّ بابَ تنظيم الوقت في
      إحياء علوم الدين، وأقام عليه ابنُ القيِّم رسالةً كاملةً في حقِّ
      العمر وما يُهدر منه.
    reference: Sahih al-Bukhari 6412
    hadith_refs: "Bukhari 6412"
    source_notes: |
      Ibn Ḥajar notes that health and free time are singled out because they are the two capitals that, once lost, cannot be repurchased — unlike wealth, which can be regained. Al-Nawawī adds that the hadith uses the word "deceived" (maghrūr) deliberately: most people imagine they have time, only to discover at death that their capital was spent on trivialities. This is a standard text in works on time-management and spiritual accounting (muḥāsaba).
    source_notes_fr: |
      Ibn Ḥajar note que la santé et le temps libre sont mis en avant parce que ce sont les deux capitaux qui, une fois perdus, ne peuvent être rachetés — contrairement à la richesse, qui peut être regagnée. Al-Nawawī ajoute que le ḥadīth utilise le mot « trompé » (maghrūr) délibérément : la plupart des gens imaginent avoir du temps, pour découvrir à la mort que leur capital fut dépensé en futilités. C'est un texte standard dans les œuvres sur la gestion du temps et la reddition de comptes spirituelle (muḥāsaba).
    source_notes_ar: |
      يُشِيرُ ابنُ حَجَرٍ إِلَى أَنَّ الصِّحَّةَ وَالفَرَاغَ يُبْرَزَانِ لِأَنَّهُمَا رَأْسُ مَالَيْنِ لاَ يُسْتَعَادَانِ بَعْدَ فَقْدِهِمَا — بِخِلاَفِ المَالِ الَّذِي يُمْكِنُ اسْتِرْجَاعُهُ. وَيَزِيدُ النَّوَوِيُّ أَنَّ الحَدِيثَ اسْتَعْمَلَ كَلِمَةَ «مَغْرُورٍ» عَمْدًا: أَكْثَرُ النَّاسِ يَظُنُّونَ أَنَّ وَقْتَهُمْ طَوِيلٌ، ثُمَّ يَكْتَشِفُونَ عِنْدَ المَوْتِ أَنَّ رَأْسَ مَالِهِمْ صُرِفَ فِي التَّفَاهَاتِ. وَهَذَا نَصٌّ قِيَاسِيٌّ فِي كُتُبِ تَنْظِيمِ الوَقْتِ وَالمُحَاسَبَةِ الرُّوحِيَّةِ.
    display_day_of_year: 117

  - slug: hadith-sincere-advice
    category: hadith_narrative
    title_en: "The Religion Is Advice"
    title_fr: « La religion, c'est le conseil sincère »
    title_ar: «الدِّينُ النَّصيحة»
    description_en: |
      The Prophet ﷺ said: "The religion is nasiha (sincere counsel)."
      The Companions asked: "To whom, O Messenger of Allah?" He replied:
      "To Allah, to His Book, to His Messenger, to the leaders of the
      Muslims, and to the common Muslims." Imam al-Nawawi placed this
      hadith seventh in his Forty and said it is "one of the hadiths
      upon which Islam turns." It locates the centre of religion in the
      disposition of the heart toward Allah's Book, the sunnah, and the
      Muslim community — an orientation, not merely a practice.
    description_fr: |
      Le Prophète ﷺ a dit : « La religion, c'est la naṣīḥa (le
      conseil sincère). » Les Compagnons demandèrent : « Envers qui, ô
      Messager d'Allah ? » Il répondit : « Envers Allah, envers Son
      Livre, envers Son Messager, envers les dirigeants des musulmans
      et envers la masse des musulmans. » L'imām al-Nawawī a placé ce
      ḥadīth en septième position de ses Quarante et a dit qu'il est
      « l'un des ḥadīths sur lesquels l'Islam tourne ». Il situe le
      centre de la religion dans la disposition du cœur envers le Livre
      d'Allah, la sunna et la communauté musulmane — une orientation,
      non un simple ensemble de pratiques.
    description_ar: |
      قال النبي ﷺ: «الدِّينُ النَّصيحة». قالوا: «لمن يا رسولَ الله؟»
      قال: «للهِ، ولكتابه، ولرسوله، ولأئمَّة المسلمين، وعامَّتهم». وقد
      جعله الإمام النوويُّ سابع أحاديث أربعينيَّته، وقال إنه «من
      الأحاديث التي يدور عليها الإسلام». فهو يجعل قطبَ الدين توجُّهَ
      القلب لكتاب الله وسنَّة رسوله وجماعة المسلمين — توجُّهًا، لا
      مجرَّد أداءٍ.
    reference: Sahih Muslim 55, Sunan Abi Dawud 4944
    hadith_refs: "Muslim 55, Abu Dawud 4944"
    source_notes: |
      Al-Nawawī (Sharḥ Muslim) calls this hadith "one upon which the religion turns" and explains that naṣīḥa to Allah means sincerity in worship, to His Book means following it, to His Messenger means following the sunna, and to leaders means commanding them to justice. Ibn Ḥajar adds that naṣīḥa to common Muslims means wishing for them what one wishes for oneself. The hadith appears in al-Nawawī's Forty Hadith and is central to understanding the communal dimension of Islam.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Muslim) qualifie ce ḥadīth de « l'un de ceux sur lesquels tourne la religion » et explique que la naṣīḥa envers Allah signifie la sincérité dans l'adoration, envers Son Livre signifie le suivre, envers Son Messager signifie suivre la sunna, et envers les dirigeants signifie leur commander la justice. Ibn Ḥajar ajoute que la naṣīḥa envers les musulmans ordinaires signifie leur souhaiter ce qu'on se souhaite à soi-même. Ce ḥadīth figure dans les Quarante Hadiths d'al-Nawawī et est central pour comprendre la dimension communautaire de l'Islām.
    source_notes_ar: |
      يُسَمِّي النَّوَوِيُّ (شَرْحُ مُسْلِمٍ) هَذَا الحَدِيثَ «أَحَدَ مَحَاوِرِ الدِّينِ» وَيُفَسِّرُ أَنَّ النَّصِيحَةَ لِلَّهِ تَعْنِي الإِخْلَاصَ فِي العِبَادَةِ، وَلِكِتَابِهِ تَعْنِي اتِّبَاعَهُ، وَلِرَسُولِهِ تَعْنِي اتِّبَاعَ السُّنَّةِ، وَلِلأُمَرَاءِ تَعْنِي الأَمْرَ بِالعَدْلِ. وَيَزِيدُ ابنُ حَجَرٍ أَنَّ النَّصِيحَةَ لِلْمُسْلِمِينَ الْعَامَّةِ تَعْنِي تَمَنِّيَ مَا يَتَمَنَّاهُ الإِنْسَانُ لِنَفْسِهِ. وَهَذَا الحَدِيثُ وَارِدٌ فِي أَرْبَعِينِيَّةِ النَّوَوِيِّ وَهُوَ مَحْوَرِيٌّ فِي فَهْمِ البُعْدِ الجَمَاعِيِّ لِلإِسْلاَمِ.
    display_day_of_year: 127

  - slug: hadith-ansar-muhajirun
    category: hadith_narrative
    title_en: "The Ansar — Love of Them Is Iman"
    title_fr: Les Anṣār — leur amour est foi
    title_ar: الأنصار — حبُّهم إيمانٌ
    description_en: |
      The Prophet ﷺ said of the Ansar — the Muslims of Madinah who
      received the emigrants of Makkah — "None loves them except a
      believer, and none hates them except a hypocrite. Whoever loves
      them, Allah loves him; and whoever hates them, Allah hates him."
      The hadith preserves the unique status of the Ansar in Islamic
      history: the tribe that welcomed the Prophet ﷺ at the Hijra,
      sheltered the first Muslim state, and whose name has come to
      stand for every community that receives refuge-seekers for the
      sake of Allah.
    description_fr: |
      Le Prophète ﷺ a dit des Anṣār — les musulmans de Madīna qui
      accueillirent les émigrants de La Mecque — : « Nul ne les aime
      sinon un croyant, et nul ne les déteste sinon un hypocrite.
      Quiconque les aime, Allah l'aime ; et quiconque les déteste,
      Allah le déteste. » Le ḥadīth fixe le statut unique des Anṣār
      dans l'histoire islamique : la tribu qui accueillit le Prophète
      ﷺ lors de la Hijra, abrita le premier État musulman, et dont le
      nom est venu désigner toute communauté qui reçoit des
      demandeurs de refuge pour la cause d'Allah.
    description_ar: |
      قال النبي ﷺ في الأنصار — أهل المدينة الذين أَوَوا مهاجري مكَّة —:
      «آيةُ الإيمان حبُّ الأنصار، وآيةُ النِّفاق بُغضُ الأنصار. من
      أحبَّهم أحبَّه الله، ومن أبغضَهم أبغضَه الله». فقد أَثْبَت هذا
      الحديث للأنصار مكانتَهم الفريدةَ في التاريخ الإسلاميِّ: قبيلةً
      أوَتْ النبيَّ ﷺ في الهجرة، وحَمَتْ أوَّل دولةٍ مسلمةٍ، وصار اسمُهم
      اسمًا لكلِّ جماعةٍ تأوي طالبَ مأوًى في سبيل الله.
    reference: Sahih al-Bukhari 3783, Sahih Muslim 75
    hadith_refs: "Bukhari 3783, Muslim 75"
    source_notes: |
      Ibn Ḥajar explains that the Ansār's unique virtue was not merely hosting the Muhājirīn but sharing their wealth and family without expectation of return. Al-Nawawī adds that the hadith's pairing of divine love with human love establishes a theological principle: love for the sake of Allah is not sentimental but an act of faith that attracts divine love in return. This hadith is foundational to the doctrine of al-walāʾ wa-l-barāʾ in its positive dimension.
    source_notes_fr: |
      Ibn Ḥajar explique que la vertu unique des Ansār ne résidait pas seulement dans l'hébergement des Muhājirīn, mais dans le partage de leurs biens et de leur famille sans attente de retour. Al-Nawawī ajoute que le jumelage de l'amour divin avec l'amour humain dans ce ḥadīth établit un principe théologique : l'amour pour la cause d'Allah n'est pas sentimental, mais un acte de foi qui attire l'amour divin en retour. Ce ḥadīth est fondamental pour la doctrine de al-walāʾ wa-l-barāʾ dans sa dimension positive.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ أَنَّ فَضْلَ الأَنْصَارِ لَمْ يَكُنْ فِي مُجَرَّدِ إِضَافَةِ المُهَاجِرِينَ، بَلْ فِي مُشَارَكَتِهِمْ أَمْوَالَهُمْ وَأَهْلِيهِمْ بِدُونِ مُقَابَلَةٍ. وَيَزِيدُ النَّوَوِيُّ أَنَّ مُقَارَنَةَ الحُبِّ الإِلَهِيِّ بِالحُبِّ البَشَرِيِّ فِي هَذَا الحَدِيثِ تُؤَسِّسُ أَصْلًا عَقَدِيًّا: الحُبُّ فِي سَبِيلِ اللهِ لَيْسَ عَاطِفَةً بَلْ عَمَلَ إِيمَانٍ يَجْذِبُ الحُبَّ الإِلَهِيَّ مُقَابَلَةً. وَهَذَا الحَدِيثُ أَصْلٌ فِي عَقِيدَةِ الوَلاَءِ وَالبَرَاءِ مِنْ حَيْثُ بُعْدُهَا الإِيجَابِيُّ.
    display_day_of_year: 137

  - slug: hadith-ten-promised-paradise
    category: hadith_narrative
    title_en: The Ten Companions Promised Paradise
    title_fr: Les dix Compagnons à qui le Paradis fut promis
    title_ar: العشرة المبشَّرون بالجنَّة
    description_en: |
      The Prophet ﷺ named ten of his Companions as guaranteed Paradise
      in this life: Abu Bakr, Umar, Uthman, Ali, Talha ibn Ubaydullah,
      al-Zubayr ibn al-Awwam, Sa'd ibn Abi Waqqas, Sa'id ibn Zayd, Abd
      al-Rahman ibn Awf, and Abu Ubayda ibn al-Jarrah. They are known
      collectively as "al-'Ashara al-Mubashsharuna bil-Janna" — the ten
      promised Paradise. Every one of them was a major figure in the
      establishment of the early Muslim community; seven fought at
      Badr; most held leading military or administrative positions in
      the Rashidun caliphate.
    description_fr: |
      Le Prophète ﷺ nomma dix de ses Compagnons à qui le Paradis fut
      garanti dès cette vie : Abū Bakr, ʿUmar, ʿUthmān, ʿAlī, Ṭalḥa
      ibn ʿUbaydullāh, al-Zubayr ibn al-ʿAwwām, Saʿd ibn Abī Waqqāṣ,
      Saʿīd ibn Zayd, ʿAbd al-Raḥmān ibn ʿAwf et Abū ʿUbayda ibn
      al-Jarrāḥ. On les appelle collectivement « al-ʿAshara
      al-Mubashsharūna bi-l-Janna » — les dix promis au Paradis. Tous
      furent des figures majeures de la fondation de la première
      communauté musulmane ; sept combattirent à Badr ; la plupart
      occupèrent des fonctions militaires ou administratives de
      premier plan dans le califat des Rāshidūn.
    description_ar: |
      سَمَّى النبي ﷺ عشرةً من صحابته بالجنَّة في حياتهم: أبا بكرٍ،
      وعمرَ، وعثمانَ، وعليًّا، وطلحةَ بنَ عبيد الله، والزبيرَ بنَ
      العوَّام، وسعدَ بنَ أبي وقَّاص، وسعيدَ بنَ زيد، وعبدَ الرحمن بنَ
      عوف، وأبا عُبيدةَ بنَ الجرَّاح. ويُعرفون مجتمعين بالعَشَرة
      المبشَّرين بالجنَّة. كانوا جميعهم من كبار من أقاموا المجتمعَ
      المسلم الأوَّل؛ سبعةٌ منهم شهدوا بدرًا، ومعظمهم تولَّى مناصبَ
      قياديَّةً عسكريَّةً أو إداريَّةً في خلافة الراشدين.
    reference: Jami' at-Tirmidhi 3747, Sunan Abi Dawud 4649; sahih
    hadith_refs: "Tirmidhi 3747, Abu Dawud 4649"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) notes that the ten were promised Paradise in this life — before death and before any sin could be committed — through the Prophet's ﷺ explicit testimony, which is a form of divine confirmation. Al-Nawawī adds that this promise does not absolve them of accountability but demonstrates that their collective excellence was so manifest that the Prophet ﷺ could guarantee their fate. The list is accepted unanimously by Ahl al-Sunna as a mark of their pre-eminence.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) note que les dix furent promis le Paradis en cette vie — avant la mort et avant tout péché — par le témoignage explicite du Prophète ﷺ, qui est une forme de confirmation divine. Al-Nawawī ajoute que cette promesse ne les dispense pas de responsabilité, mais démontre que leur excellence collective était si manifeste que le Prophète ﷺ pouvait garantir leur sort. La liste est acceptée unanimement par Ahl al-Sunna comme marque de leur prééminence.
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي) أَنَّ العَشَرَةَ وُعِدُوا الجَنَّةَ فِي هَذِهِ الدُّنْيَا — قَبْلَ المَوْتِ وَقَبْلَ أَيِّ ذَنْبٍ — بِشَهَادَةِ النَّبِيِّ ﷺ الصَّرِيحَةِ، وَهِيَ صُورَةٌ مِنَ التَّأْكِيدِ الإِلَهِيِّ. وَيَزِيدُ النَّوَوِيُّ أَنَّ هَذَا الوَعْدَ لاَ يُعْفِيهِمْ مِنَ المُسَاءَلَةِ، بَلْ يُبَيِّنُ أَنَّ فَضْلَهُمْ الجَمَاعِيَّ كَانَ بَيِّنًا لِلدَّرَجَةِ الَّتِي يَسْتَطِيعُ النَّبِيُّ ﷺ مَعَهَا أَنْ يَضْمَنَ مَصِيرَهُمْ. وَقَدْ أَجْمَعَ أَهْلُ السُّنَّةِ عَلَى هَذِهِ اللَّائِحَةِ كَعَلاَمَةٍ لِتَقَدُّمِهِمْ.
    display_day_of_year: 147

  - slug: hadith-make-easy
    category: hadith_narrative
    title_en: "Make Things Easy, Do Not Make Them Difficult"
    title_fr: « Facilitez et ne rendez pas difficile »
    title_ar: «يَسِّروا ولا تُعسِّروا»
    description_en: |
      The Prophet ﷺ instructed Mu'adh ibn Jabal and Abu Musa al-Ash'ari
      as he sent them to Yemen: "Make things easy and do not make them
      difficult. Give good news and do not repel people. Cooperate and
      do not differ." The hadith condenses the pastoral approach the
      Prophet ﷺ required of those who taught the religion to people:
      lowering the threshold of engagement, preferring encouragement
      over rebuke, maintaining unity in ministry.
    description_fr: |
      Le Prophète ﷺ dit à Muʿādh ibn Jabal et Abū Mūsā al-Ashʿarī au
      moment de les envoyer au Yémen : « Facilitez et ne rendez pas
      difficile. Annoncez la bonne nouvelle et ne repoussez pas les
      gens. Coopérez et ne divergez pas. » Le ḥadīth condense l'approche
      pastorale que le Prophète ﷺ exigeait de ceux qui enseignaient la
      religion aux gens : abaisser le seuil d'engagement, préférer
      l'encouragement au reproche, maintenir l'unité dans le ministère.
    description_ar: |
      قال النبي ﷺ لمعاذ بن جبل وأبي موسى الأشعري حين بعثهما إلى اليمن:
      «يَسِّروا ولا تُعسِّروا، وبَشِّروا ولا تُنَفِّروا، وتطاوعا ولا
      تختلفا». فاختصر هذا الحديث الأسلوبَ الذي ألزم به النبيُّ ﷺ من
      يبلِّغ الدين للناس: تخفيفُ بابِ الدخول، وتقديمُ التبشير على
      الإنذار، والتزامُ الوحدة في الدعوة.
    reference: Sahih al-Bukhari 69, Sahih Muslim 1733
    hadith_refs: "Bukhari 69, Muslim 1733"
    source_notes: |
      Ibn Ḥajar explains that "make things easy" (yassirū) is a governing principle of Islamic law: the Messenger ﷺ did not send teachers to impose difficulty but to lower barriers to entry. Al-Nawawī adds that "give good news" (bashshirū) precedes "do not repel" (tunaffirū) deliberately — encouragement is primary, while deterrence is only a last resort. This hadith is cited by classical jurists as a proof for the principle of facilitation (taysīr) in fatwā and teaching.
    source_notes_fr: |
      Ibn Ḥajar explique que « rendre les choses faciles » (yassirū) est un principe directeur du droit islamique : le Messager ﷺ n'envoyait pas des enseignants pour imposer la difficulté, mais pour abaisser les seuils d'accès. Al-Nawawī ajoute que « donnez la bonne nouvelle » (bashshirū) précède « ne repoussez pas » (tunaffirū) délibérément — l'encouragement est primaire, tandis que la dissuasion n'est qu'un dernier recours. Ce ḥadīth est cité par les juristes classiques comme preuve du principe de facilitation (taysīr) dans la fatwā et l'enseignement.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ أَنَّ «يَسِّرُوا» هُوَ أَصْلٌ حَاكِمٌ فِي الشَّرِيعَةِ: أَرْسَلَ الرَّسُولُ ﷺ المُعَلِّمِينَ لِتَسْهِيلِ الأُمُورِ لاَ لِتَفْرِيعِ الصُّعُوبَاتِ. وَيَزِيدُ النَّوَوِيُّ أَنَّ «بَشِّرُوا» تَسْبِقُ «وَلاَ تُنَفِّرُوا» عَمْدًا — فَالتَّشْجِيعُ أَصْلٌ وَالتَّنْفِيرُ آخِرُ المَرَاتِبِ. وَيَسْتَشْهِدُ بِهَذَا الحَدِيثِ الفُقَهَاءُ الكِلَاسِيكِيُّونَ دَلِيلًا عَلَى قَاعِدَةِ التَّيْسِيرِ فِي الفَتْوَى وَالتَّعْلِيمِ.
    display_day_of_year: 157

  - slug: hadith-best-of-you
    category: hadith_narrative
    title_en: "The Best of You Is the One Who Learns the Qur'an and Teaches It"
    title_fr: « Le meilleur d'entre vous est celui qui apprend le Coran et l'enseigne »
    title_ar: «خيرُكم من تَعَلَّم القرآن وعلَّمه»
    description_en: |
      The Prophet ﷺ said: "The best of you is the one who learns the
      Qur'an and teaches it." Uthman ibn Affan narrated the hadith. The
      brief saying reorients an entire ethic of value: not wealth, rank,
      lineage, or even general piety, but specifically the labour of
      receiving and transmitting the Book is named as the standard of
      "the best" in this community.
    description_fr: |
      Le Prophète ﷺ a dit : « Le meilleur d'entre vous est celui qui
      apprend le Coran et l'enseigne. » ʿUthmān ibn ʿAffān rapporta ce
      ḥadīth. Cette brève parole réoriente toute une éthique de la
      valeur : ni la richesse, ni le rang, ni la lignée, ni même la
      piété générale, mais précisément le travail d'accueil et de
      transmission du Livre est désigné comme le critère du « meilleur »
      dans cette communauté.
    description_ar: |
      قال النبي ﷺ: «خيرُكم من تَعَلَّم القرآن وعلَّمه»، رواه عثمان بن
      عفَّان رضي الله عنه. فهذا القول الموجز يعيد ضبط معيار الفضل في
      الأمَّة: لا المال ولا الجاه ولا النسب ولا حتى مطلق التقوى، بل
      خصوصُ تَلَقِّي الكتاب وتبليغه.
    reference: Sahih al-Bukhari 5027
    hadith_refs: "Bukhari 5027"
    source_notes: |
      Ibn Ḥajar notes that the hadith does not say "the most knowledgeable" or "the most ascetic" but "the one who learns and teaches," establishing transmission as the highest communal virtue. Al-Nawawī adds that ʿUthmān ra — known for his beautiful recitation — was chosen as the narrator to emphasise that the Qur'an must be both learned personally and passed on. This hadith heads many classical works on the etiquette of teaching and seeking knowledge.
    source_notes_fr: |
      Ibn Ḥajar note que le ḥadīth ne dit pas « le plus savant » ou « le plus ascète », mais « celui qui apprend et enseigne », établissant la transmission comme la vertu communautaire suprême. Al-Nawawī ajoute que ʿUthmān (qu'Allah l'agrée) — connu pour sa belle récitation — fut choisi comme rapporteur pour souligner que le Coran doit être à la fois appris personnellement et transmis. Ce ḥadīth ouvre de nombreuses œuvres classiques sur l'étiquette de l'enseignement et de la quête du savoir.
    source_notes_ar: |
      يُشِيرُ ابنُ حَجَرٍ إِلَى أَنَّ الحَدِيثَ لَمْ يَقُلْ «أَعْلَمُكُمْ» وَلاَ «أَزْهَدُكُمْ» بَلْ «مَنْ تَعَلَّمَ القُرْآنَ وَعَلَّمَهُ»، مُؤَسِّسًا عَلَى أَنَّ النَّقْلَ هُوَ أَفْضَلُ فَضِيلَةٍ جَمَاعِيَّةٍ. وَيَزِيدُ النَّوَوِيُّ أَنَّ اخْتِيَارَ عُثْمَانَ رَضِيَ اللهُ عَنْهُ — المَشْهُورِ بِحُسْنِ تِلَاوَتِهِ — رَاوِيًا لِلحَدِيثِ يُؤَكِّدُ أَنَّ القُرْآنَ يَجِبُ أَنْ يُتَعَلَّمَ شَخْصِيًّا وَيُنْقَلَ. وَيَفْتَتِحُ هَذَا الحَدِيثُ كَثِيرًا مِنَ الكُتُبِ الكَلاسِيكِيَّةِ فِي آدَابِ التَّعْلِيمِ وَطَلَبِ العِلْمِ.
    display_day_of_year: 167

  - slug: hadith-smile-is-charity
    category: hadith_narrative
    title_en: Every Joint Owes a Charity Every Day
    title_fr: Sur chaque articulation une aumône chaque jour
    title_ar: على كلِّ سُلَامى صدقةٌ في كلِّ يومٍ
    description_en: |
      The Prophet ﷺ said: "Every joint of a person owes a charity every
      day the sun rises. To judge justly between two people is charity.
      To help a man with his mount — lifting him onto it or lifting his
      belongings onto it — is charity. A good word is charity. Every step
      you take to the prayer is charity. Removing harm from the road is
      charity." The hadith universalises sadaqa beyond wealth: it
      becomes a continuous embodied practice — of speech, effort, and
      attention — that every Muslim can offer in any circumstance.
    description_fr: |
      Le Prophète ﷺ a dit : « Chaque articulation d'un homme doit une
      aumône chaque jour où le soleil se lève. Juger avec justice entre
      deux personnes est une aumône. Aider un homme avec sa monture —
      le hisser dessus ou y hisser ses bagages — est une aumône. Une
      bonne parole est une aumône. Chaque pas que tu fais vers la
      prière est une aumône. Écarter du mal de la route est une
      aumône. » Le ḥadīth universalise la ṣadaqa au-delà du patrimoine :
      elle devient une pratique incarnée et continue — de parole,
      d'effort et d'attention — que tout musulman peut offrir en toute
      circonstance.
    description_ar: |
      قال النبي ﷺ: «على كلِّ سُلَامى من الناس صدقةٌ، كلَّ يومٍ تطلع فيه
      الشمسُ: تَعْدِل بين اثنين صدقةٌ، وتُعين الرجل على دابَّته فتحمله
      عليها أو ترفع له عليها متاعه صدقةٌ، والكلمةُ الطيِّبةُ صدقةٌ، وكلُّ
      خطوةٍ تخطوها إلى الصلاة صدقةٌ، وتُميط الأذى عن الطريق صدقةٌ». فقد
      وَسَّع هذا الحديثُ مفهومَ الصدقة من الباب الماليِّ إلى عبادةٍ
      متَّصلةٍ في القول والفعل والانتباه، يستطيع كلُّ مسلمٍ أن يقدِّمها
      في أيِّ حالٍ.
    reference: Sahih al-Bukhari 2989, Sahih Muslim 1009
    hadith_refs: "Bukhari 2989, Muslim 1009"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) explains that the hadith expands ṣadaqa from a financial transaction to a continuous moral obligation — every joint of the body owes a daily charity. Al-Nawawī adds that judging justly between two people is singled out first because it is the most difficult and most meritorious non-material charity. The hadith is foundational to Islamic social ethics, proving that poverty is no barrier to goodness.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) explique que le ḥadīth étend la ṣadaqa d'une transaction financière à une obligation morale continue — chaque articulation du corps doit une aumône quotidienne. Al-Nawawī ajoute que juger avec justice entre deux personnes est mis en avant parce que c'est la charité non matérielle la plus difficile et la plus méritoire. Ce ḥadīth est fondamental pour l'éthique sociale islamique, prouvant que la pauvreté n'est pas un obstacle à la bonté.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي) أَنَّ هَذَا الحَدِيثَ يُوَسِّعُ مَفْهُومَ الصَّدَقَةِ مِنَ الصِّفْقَةِ المَالِيَّةِ إِلَى وَاجِبٍ أَخْلَاقِيٍّ مُتَصِلٍ — كُلُّ مَفْصِلٍ مِنَ الجِسْمِ عَلَيْهِ صَدَقَةٌ يَوْمِيَّةٌ. وَيَزِيدُ النَّوَوِيُّ أَنَّ الحُكْمَ بِالعَدْلِ بَيْنَ الِاثْنَيْنِ يُقَدَّمُ لِأَنَّهُ أَصْعَبُ صَدَقَةٍ غَيْرِ مَادِّيَّةٍ وَأَكْثَرُهَا أَجْرًا. وَهَذَا الحَدِيثُ أَصْلٌ فِي الأَخْلاَقِ الاجْتِمَاعِيَّةِ الإِسْلاَمِيَّةِ، يُثْبِتُ أَنَّ الفَقْرَ لَيْسَ حَاجِزًا عَلَى الخَيْرِ.
    display_day_of_year: 177

  - slug: hadith-the-religion-is-ease
    category: hadith_narrative
    title_en: "The Religion Is Ease"
    title_fr: « La religion est facilité »
    title_ar: «إنَّ الدِّينَ يُسرٌ»
    description_en: |
      The Prophet ﷺ said: "The religion is ease. No one makes the
      religion difficult except that it overwhelms him. So aim for what
      is right, come close to it, receive the glad tidings, and seek
      help in the morning, the evening, and a portion of the night."
      Scholars have treated this hadith as a governing principle of
      Islamic law (fiqh), cited whenever facility vs. stringency comes
      into question.
    description_fr: |
      Le Prophète ﷺ a dit : « La religion est facilité. Nul ne durcit
      la religion sans qu'elle ne le submerge. Visez donc le juste,
      approchez-vous-en, recevez la bonne nouvelle, et cherchez le
      secours le matin, le soir et une partie de la nuit. » Les savants
      ont traité ce ḥadīth comme un principe directeur du droit
      islamique (fiqh), invoqué chaque fois que se pose la question de
      la facilité contre la rigueur.
    description_ar: |
      قال النبي ﷺ: «إنَّ الدِّينَ يُسرٌ، ولن يُشادَّ الدينَ أحدٌ إلا
      غَلَبَه، فسَدِّدوا وقاربوا، وأبشروا، واستعينوا بالغُدوة والرَّوْحة
      وشيءٍ من الدُّلْجة». وقد تعامل العلماء مع هذا الحديث قاعدةً
      حاكمةً في الفقه، يَستحضرونها كلَّما عُرضت مسألةٌ بين التَّيسير
      والتَّشديد.
    reference: Sahih al-Bukhari 39
    hadith_refs: "Bukhari 39"
    source_notes: |
      Ibn Ḥajar explains that this hadith is not a licence for laxity but a prohibition of self-imposed hardship that exceeds the sharīʿa's limits. Al-Nawawī notes that the Prophet ﷺ added "aim for what is right" (saddidū) to prevent the misuse of this principle as an excuse for negligence. This hadith is one of the five major proofs for the fiqh maxim "hardship begets facilitation" (al-mashaqqa tajlīb al-taysīr).
    source_notes_fr: |
      Ibn Ḥajar explique que ce ḥadīth n'est pas une licence pour le laxisme, mais une interdiction de s'imposer des difficultés qui dépassent les limites de la sharīʿa. Al-Nawawī note que le Prophète ﷺ a ajouté « visez le juste milieu » (saddidū) pour empêcher l'abus de ce principe comme excuse à la négligence. Ce ḥadīth est l'une des cinq preuves majeures pour la maxime juridique du fiqh « la difficulté appelle la facilitation » (al-mashaqqa tajlīb al-taysīr).
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ أَنَّ هَذَا الحَدِيثَ لَيْسَ رُخْصَةً فِي التَّسَاهُلِ، بَلْ نَهْيًا عَنِ افْتِرَاءِ المَشَقَّاتِ الَّتِي تَجْاوَزُ حُدُودَ الشَّرِيعَةِ. وَيَلْحَظُ النَّوَوِيُّ أَنَّ النَّبِيَّ ﷺ أَضَافَ «سَدِّدُوا» لِيَمْنَعَ اسْتِغْلاَلَ هَذَا الأَصْلِ ذَرِيعَةً لِلتَّقْصِيرِ. وَهَذَا الحَدِيثُ مِنَ الأَدِلَّةِ الخَمْسَةِ الكُبْرَى لِقَاعِدَةِ «المَشَقَّةُ تَجْلِبُ التَّيْسِيرَ» فِي الفِقْهِ.
    display_day_of_year: 187

  - slug: hadith-nightly-descent
    category: hadith_narrative
    title_en: The Nightly Descent
    title_fr: La descente nocturne
    title_ar: النزول الإلهيُّ كلَّ ليلةٍ
    description_en: |
      The Prophet ﷺ said: "Our Lord, the Blessed, the Exalted, descends
      every night to the nearest heaven when one-third of the last part
      of the night is left, saying: 'Who is calling upon Me, that I may
      answer him? Who is asking of Me, that I may grant him? Who is
      seeking My forgiveness, that I may forgive him?'" Classical
      scholars treat this hadith as foundational for the virtue of the
      last third of the night for supplication and for the canonical
      position that Allah's attributes — here, His descent — are
      affirmed according to what suits His majesty, without
      anthropomorphism and without denial of the wording.
    description_fr: |
      Le Prophète ﷺ a dit : « Notre Seigneur, le Béni, le Très-Haut,
      descend chaque nuit vers le ciel le plus bas lorsqu'il reste un
      tiers de la dernière partie de la nuit, en disant : « Qui
      M'invoque, que Je lui réponde ? Qui Me demande, que Je lui
      donne ? Qui sollicite Mon pardon, que Je lui pardonne ? » » Les
      savants classiques tiennent ce ḥadīth pour fondateur quant à la
      vertu du dernier tiers de la nuit pour la supplication, et
      quant à la position canonique selon laquelle les attributs
      d'Allah — ici Sa descente — sont affirmés selon ce qui sied à Sa
      majesté, sans anthropomorphisme et sans déni du texte.
    description_ar: |
      قال النبي ﷺ: «يَنزل ربُّنا تباركَ وتعالى كلَّ ليلةٍ إلى السماء
      الدنيا حين يبقى ثلثُ الليل الآخِر، فيقول: من يدعوني فأستجيبَ له؟
      من يسألُني فأعطِيَه؟ من يستغفرُني فأغفرَ له؟». ويعدُّ هذا الحديث
      عند العلماء أصلًا لفضل ثلث الليل الآخر للدعاء، وأصلًا لمذهب أهل
      السنَّة في الصفات: إثبات ما أثبته رسولُ الله ﷺ — كالنزول — على ما
      يليق بجلال الله، بلا تشبيهٍ ولا تعطيلٍ.
    reference: Sahih al-Bukhari 1145, Sahih Muslim 758
    hadith_refs: "Bukhari 1145, Muslim 758"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) explains that this hadith is the primary proof for the orthodox position on divine attributes: affirming what the Prophet ﷺ affirmed — descent — without asking "how" (bilā kayf) and without taʾṭīl (denial). Al-Nawawī adds that the last third of the night is singled out because sleep has dispersed and the sincere caller meets Allah in seclusion. This is a foundational text for the Ahl al-Sunna doctrine of ṣifāt.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) explique que ce ḥadīth est la preuve principale de la position orthodoxe sur les attributs divins : affirmer ce qu'a affirmé le Prophète ﷺ — la descente — sans demander « comment » (bilā kayf) et sans taʾṭīl (dénégation). Al-Nawawī ajoute que le dernier tiers de la nuit est mis en avant parce que le sommeil s'est dispersé et que l'appelant sincère rencontre Allah en solitude. C'est un texte fondateur pour la doctrine des ṣifāt chez Ahl al-Sunna.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي) أَنَّ هَذَا الحَدِيثَ هُوَ الدَّلِيلُ الأَوَّلُ لِلْمَوْقِفِ الأُرْثُوذُكسِيِّ فِي الصِّفَاتِ الإِلَهِيَّةِ: الإِثْبَاتُ لِمَا أَثْبَتَهُ النَّبِيُّ ﷺ — النُّزُولَ — بِلاَ كَيْفَ وَبِلاَ تَعْطِيلٍ. وَيَزِيدُ النَّوَوِيُّ أَنَّ آخِرَ ثُلُثِ اللَّيْلِ يُخْتَارُ لِأَنَّ النَّوْمَ قَدْ تَفَرَّقَ وَالدَّاعِيَ الصَّادِقَ يُلاَقِي اللهَ وَحْدَهُ. وَهَذَا نَصٌّ أَسَاسِيٌّ فِي عَقِيدَةِ الصِّفَاتِ عِنْدَ أَهْلِ السُّنَّةِ.
    display_day_of_year: 197

  - slug: hadith-first-thing-reckoned
    category: hadith_narrative
    title_en: "The First of a Servant's Deeds to Be Reckoned"
    title_fr: Le premier acte du serviteur dont il rendra compte
    title_ar: أوَّل ما يُحاسَب به العبدُ
    description_en: |
      The Prophet ﷺ said: "The first of a servant's deeds to be judged
      on the Day of Resurrection will be the prayer. If it is sound,
      the rest of his deeds will be sound; and if it is corrupt, the
      rest of his deeds will be corrupt." The hadith makes the salah
      not merely one duty among many but the hinge on which the whole
      scale of one's deeds turns — the foundational unit whose
      soundness determines the structural integrity of everything else.
    description_fr: |
      Le Prophète ﷺ a dit : « La première chose dont un serviteur
      rendra compte le Jour de la Résurrection sera la prière. Si elle
      est saine, le reste de ses œuvres le sera ; et si elle est
      corrompue, le reste de ses œuvres le sera. » Le ḥadīth fait de
      la ṣalāh non pas un devoir parmi d'autres, mais la charnière sur
      laquelle pivote toute la balance de ses actes — l'unité
      fondamentale dont l'intégrité conditionne celle de tout le reste.
    description_ar: |
      قال النبي ﷺ: «أوَّل ما يُحاسَب به العبدُ يومَ القيامة الصلاةُ، فإن
      صَلَحَتْ صَلَحَ سائرُ عمله، وإن فَسَدَتْ فَسَدَ سائرُ عمله». فجَعَل
      الحديث الصلاةَ لا فريضةً بين فرائض، بل المحورَ الذي يدور عليه
      ميزانُ العمل كلِّه: إنِ استقامَتْ استقامَ البنيانُ، وإنِ اختَلَّت
      اختَلَّ.
    reference: Jami' at-Tirmidhi 413, Sunan an-Nasa'i 466; sahih
    hadith_refs: "Tirmidhi 413, Nasa'i 466"
    source_notes: |
      Ibn Ḥajar notes that the prayer's priority in reckoning reflects its status as the pillar of religion: if it stands, everything stands; if it falls, everything falls. Al-Nawawī adds that this hadith explains why the Prophet ﷺ warned that missing prayer deliberately is a grave danger — not because other deeds are unimportant, but because prayer is the hinge on which the whole structure turns. It is frequently cited in works on the importance of ṣalāh.
    source_notes_fr: |
      Ibn Ḥajar note que la priorité de la prière dans le jugement reflète son statut de pilier de la religion : si elle se dresse, tout se dresse ; si elle tombe, tout tombe. Al-Nawawī ajoute que ce ḥadīth explique pourquoi le Prophète ﷺ a mis en garde contre le danger de négliger délibérément la prière — non pas parce que les autres œuvres sont sans importance, mais parce que la prière est la charnière sur laquelle tourne toute la structure. Il est fréquemment cité dans les œuvres sur l'importance de la ṣalāh.
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ أَنَّ تَقَدُّمَ الصَّلاَةِ فِي الحِسَابِ يُجَسِّدُ مَكَانَتَهَا كَعَمُودِ الدِّينِ: إِنْ قَامَتْ قَامَ كُلُّ شَيْءٍ، وَإِنْ سَقَطَتْ سَقَطَ كُلُّ شَيْءٍ. وَيَزِيدُ النَّوَوِيُّ أَنَّ هَذَا الحَدِيثَ يُفَسِّرُ لِمَاذَا حَذَّرَ النَّبِيُّ ﷺ مِنْ خَطَرِ تَرْكِ الصَّلاَةِ عَمْدًا — لاَ لِأَنَّ سَائِرَ الأَعْمَالِ غَيْرُ مُهِمَّةٍ، بَلْ لِأَنَّ الصَّلاَةَ هِيَ المِفْصَالُ الَّذِي يَدُورُ عَلَيْهِ البِنَاءُ كُلُّهُ. وَهُوَ مِنْ أَكْثَرِ الأَحَادِيثِ اسْتِشْهَادًا فِي كُتُبِ أَهْمِيَّةِ الصَّلاَةِ.
    display_day_of_year: 207

  - slug: hadith-jumah-virtue
    category: hadith_narrative
    title_en: "The Best Day the Sun Rises On"
    title_fr: Le meilleur jour où le soleil se lève
    title_ar: خيرُ يومٍ طلعتْ فيه الشمسُ
    description_en: |
      The Prophet ﷺ said: "The best day upon which the sun has risen is
      Friday. On it Adam was created, on it he was admitted to Paradise,
      and on it he was expelled from it. The Hour will not come except
      on a Friday." He also said: "There is an hour on Friday in which
      no Muslim servant stands praying and asks Allah for something
      without Allah giving it to him." The hadiths together establish
      Friday as the weekly Muslim feast-day, a moment of concentrated
      spiritual opportunity throughout the day.
    description_fr: |
      Le Prophète ﷺ a dit : « Le meilleur jour où le soleil se lève
      est le vendredi. C'est en ce jour qu'Ādam fut créé, en ce jour
      qu'il fut admis au Paradis, et en ce jour qu'il en fut exclu.
      L'Heure ne surviendra qu'un vendredi. » Il dit également : « Il
      y a une heure le vendredi durant laquelle aucun serviteur
      musulman ne se tient en prière en demandant à Allah quelque
      chose sans qu'Allah ne le lui donne. » Ces deux ḥadīths
      ensemble établissent le vendredi comme la fête hebdomadaire des
      musulmans, un moment d'occasion spirituelle concentrée sur
      toute la durée du jour.
    description_ar: |
      قال النبي ﷺ: «خيرُ يومٍ طلعتْ فيه الشمسُ يومُ الجمعة: فيه خُلق
      آدمُ، وفيه أُدخل الجنَّة، وفيه أُخرج منها، ولا تقومُ الساعة إلا
      في يوم الجمعة». وقال أيضًا: «إنَّ في الجمعة لساعةً لا يوافقها
      عبدٌ مسلمٌ وهو قائمٌ يصلِّي يسأل الله شيئًا إلا أعطاه إيَّاه». فقد
      أثبتَ الحديثان معًا أنَّ الجمعة عيدُ المسلمين الأسبوعيُّ، وأنَّ
      اليومَ كلَّه مَعْدِنُ فضلٍ متَّصلٍ.
    reference: Sahih Muslim 854, Sahih al-Bukhari 935
    hadith_refs: "Muslim 854, Bukhari 935"
    source_notes: |
      Ibn Ḥajar explains that the special hour on Friday is not specified in the hadith precisely to encourage Muslims to devote the entire day to supplication rather than limiting it to one moment. Al-Nawawī adds that Ādam's creation, entry, and expulsion on Friday establishes a weekly cycle of creation-fall-redemption, centred on communal worship. The hadith is foundational to the obligation of Jumuʿa and its status as the weekly ʿĪd.
    source_notes_fr: |
      Ibn Ḥajar explique que l'heure privilégiée du vendredi n'est pas précisée dans le ḥadīth justement pour encourager les musulmans à consacrer toute la journée à la supplication plutôt que de la limiter à un instant. Al-Nawawī ajoute que la création, l'entrée et l'expulsion d'Ādam le vendredi établissent un cycle hebdomadaire de création-chute-rédemption, centré sur le culte communautaire. Ce ḥadīth est fondamental pour l'obligation de la Jumuʿa et son statut de ʿĪd hebdomadaire.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ أَنَّ السَّاعَةَ المُخْتَارَةَ يَوْمَ الجُمُعَةِ لَمْ تُحَدَّدْ فِي الحَدِيثِ عَمْدًا لِتَشْجِيعِ المُسْلِمِينَ عَلَى إِخْلاَصِ كُلِّ اليَوْمِ لِلدُّعَاءِ دُونَ حَصْرِهِ فِي لَحْظَةٍ. وَيَزِيدُ النَّوَوِيُّ أَنَّ خَلْقَ آدَمَ وَإِدْخَالَهُ وَإِخْرَاجَهُ يَوْمَ الجُمُعَةِ يُؤَسِّسُ دَائِرَةً أُسْبُوعِيَّةً لِلخَلْقِ وَالسُّقُوطِ وَالفِدَاءِ، تَتَمَحْوَرُ حَوْلَ العِبَادَةِ الجَمَاعِيَّةِ. وَهَذَا الحَدِيثُ رُكْنٌ فِي فَرْضِ الجُمُعَةِ وَمَكَانَتِهَا كَعِيدٍ أُسْبُوعِيٍّ.
    display_day_of_year: 217

