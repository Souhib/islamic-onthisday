# Sunnah practices of the Prophet Muhammad ﷺ — continued.
# Grounded in sahih hadith from Bukhari, Muslim, and authenticated collections.

lessons:
  - slug: sunnah-eating-etiquette
    category: sunnah_practice
    title_en: The Sunnah of Eating and Drinking
    title_ar: سُنَّةُ الأَكْلِ وَالشُّرْبِ
    title_fr: La Sunna du manger et du boire
    description_en: |
      The Prophet Muhammad ﷺ taught comprehensive etiquette for eating and drinking that elevates daily sustenance into an act of worship. He would begin with the right hand and say "Bismillah," and if he forgot at the start, he would say "Bismillahi fi awwalihi wa akhirihi" (In the name of Allah at its beginning and end). He advised eating from what was nearest, not criticising food — if he liked it he ate it, and if he disliked it he left it without comment. He prohibited eating and drinking from vessels of gold and silver, and taught not to blow into drinks or breathe into vessels. He would drink in three breaths, pausing to say "Al-hamdulillah" after finishing. After a meal he would praise Allah with the supplication: "Al-hamdulillahi alladhi at'amani hadha wa razaqanihi min ghayri hawlin minni wa la quwwa" (Praise be to Allah who has fed me this and provided it for me without any power or strength on my part). These etiquettes cultivate gratitude, humility, and constant awareness of the Provider.
    description_ar: |
      عَلَّمَ النَّبِيُّ مُحَمَّدٌ ﷺ آدَابًا شَامِلَةً لِلأَكْلِ وَالشُّرْبِ تَرْفَعُ المَأْكُولَاتِ اليَوْمِيَّةِ إِلَى مَرْتَبَةِ العِبَادَةِ. كَانَ ﷺ يَبْدَأُ بِاليَمِينِ وَيَقُولُ "بِسْمِ اللهِ"، وَإِنْ نَسِيَ فِي البَدَايَةِ قَالَ: "بِسْمِ اللهِ فِي أَوَّلِهِ وَآخِرِهِ". وَكَانَ يُوصِي بِالأَكْلِ مِمَّا يَلِي المَأْكُلَ، وَنَهَى عَنِ الذَّمِّ لِلطَّعَامِ — إِنْ أَعْجَبَهُ أَكَلَهُ، وَإِنْ كَرِهَهُ تَرَكَهُ بِلا كَلامٍ. وَنَهَى عَنِ الأَكْلِ وَالشُّرْبِ فِي آنِيَةِ الذَّهَبِ وَالفِضَّةِ، وَعَلَّمَ أَلاَّ يَنْفُخَ فِي الإِنَاءِ أَوْ يَتَنَفَّسَ فِيهِ. وَكَانَ يَشْرَبُ فِي ثَلَاثَةِ أَنَفَاسٍ، وَيَقُولُ بَعْدَ الفَرَاغِ: "الحَمْدُ للهِ". وَبَعْدَ الطَّعَامِ كَانَ يَحْمَدُ اللهَ بِقَوْلِهِ: "الحَمْدُ للهِ الَّذِي أَطْعَمَنِي هَذَا وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلا قُوَّةٍ". وَفِي هَذِهِ الآدَابِ تَرْبِيَةٌ عَلَى الشُّكْرِ وَالتَّوَاضُعِ وَاسْتِشْعَارِ الرَّازِقِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné une étiquette complète du manger et du boire qui élève la subsistance quotidienne au rang d'acte de culte. Il commençait de la main droite et disait « Bismillah » ; s'il oubliait au début, il disait : « Bismillāhi fī awwalihi wa ākhirihi » (Au nom d'Allah à son commencement et à sa fin). Il recommandait de manger de ce qui était le plus proche, interdisait de critiquer la nourriture — s'il l'aimait il la mangeait, s'il ne l'aimait pas il la laissait sans commentaire. Il interdisait de manger et de boire dans des récipients d'or et d'argent, et enseignait de ne pas souffler dans les boissons ni respirer dans les récipients. Il buvait en trois respirations, en disant « Al-ḥamdulillāh » après avoir fini. Après le repas, il louait Allah par la supplication : « Al-ḥamdulillāhi alladhī aṭaʿamanī hādhā wa razaqanīhi min ghayri ḥawlin minnī wa lā quwwa » (Louange à Allah qui m'a nourri de ceci et me l'a accordé sans force ni puissance de ma part). Ces règles de conduite cultivent la gratitude, l'humilité et la conscience constante du Pourvoyeur.
    reference: Sahih al-Bukhari 5140, Sahih al-Bukhari 5391, Sahih al-Bukhari 5456; Jami' at-Tirmidhi 2380, Jami' at-Tirmidhi 1853
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 248) records the etiquettes of eating including beginning with the right hand and the basmala. Ibn al-Qayyim (Zad al-Ma'ad, 2:20) explains that the Prophet's ﷺ comprehensive table manners elevate daily sustenance into worship. The four madhhabs agree on these etiquettes, with the prohibition of gold and silver vessels being a point of consensus.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 248) consigne les étiquettes du manger, notamment le fait de commencer par la main droite et la basmala. Ibn al-Qayyim (Zād al-Maʿād, 2:20) explique que les règles de table complètes du Prophète ﷺ élèvent la subsistance quotidienne au rang d'acte de culte. Les quatre madhhabs s'accordent sur ces étiquettes, l'interdiction des récipients d'or et d'argent étant un point de consensus.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٤٨) آدابَ الأكلِ بما فيها البدءُ باليمنى والبسملة. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٢٠) أنَّ آدابَ المائدةِ الشاملةَ عند النبيِّ ﷺ تَرْفَعُ القوتَ اليوميَّ إلى مرتبةِ العبادة. وتتفقُ المذاهبُ الأربعةُ على هذه الآداب، ويَجْمَعُ العلماءُ على تحريم آنيةِ الذهبِ والفضة.
    display_day_of_year: 215
    hadith_refs: "Bukhari 5140, Bukhari 5391, Bukhari 5456, Tirmidhi 2380, Tirmidhi 1853"
    source_url: https://sunnah.com/bukhari:5140

  - slug: sunnah-sleeping-etiquette
    category: sunnah_practice
    title_en: The Sunnah of Sleeping — Preparing for the Night
    title_ar: سُنَّةُ النَّوْمِ — الاسْتِعْدَادُ لِلَّيْلِ
    title_fr: La Sunna du sommeil — se préparer pour la nuit
    description_en: |
      Before retiring, the Prophet Muhammad ﷺ would perform wudu' as for prayer, dust his bed three times with the edge of his lower garment, and lie on his right side with his right hand beneath his right cheek. He would then supplicate: "Allahumma bismika amutu wa ahya" (O Allah, in Your name I die and I live). He recommended reciting Ayat al-Kursi and the last three surahs of the Qur'an — al-Ikhlas, al-Falaq, and al-Nas — blowing into the palms and wiping them over the body. The Prophet ﷺ strongly discouraged sleeping on the stomach, describing it as "the lying of the people of Hellfire." These practices transform sleep from mere physical rest into a conscious surrender to Allah's protection. By purifying oneself, seeking refuge, and acknowledging that sleep is a minor death, the believer entrusts the night to the Ever-Living and wakes with a heart prepared for worship.
    description_ar: |
      قَبْلَ النَّوْمِ كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يَتَوَضَّأُ وُضُوءَهُ لِلصَّلاَةِ، وَيَنْفُضُ فِرَاشَهُ ثَلَاثَ مَرَّاتٍ بِطَرَفِ إِزَارِهِ، ثُمَّ يَضْطَجِعُ عَلَى شِقِّهِ الأَيْمَنِ وَيَضَعُ يَدَهُ اليُمْنَى تَحْتَ خَدِّهِ الأَيْمَنِ. وَكَانَ يَدْعُو: "اللَّهُمَّ بِاسْمِكَ أَمُوتُ وَأَحْيَا". وَأَوْصَى بِقِرَاءَةِ آيَةِ الكُرْسِيِّ وَخَوَاتِيمِ سُوَرِ القُرْآنِ الثَّلاَثِ — الإِخْلاَصِ وَالفَلَقِ وَالنَّاسِ — ثُمَّ النَّفْثِ فِي الكَفَّيْنِ وَالمَسْحِ بِهِمَا عَلَى الجَسَدِ. وَنَهَى النَّبِيُّ ﷺ عَنِ النَّوْمِ عَلَى البَطْنِ شَدِيدَ النَّهْيِ، وَسَمَّاهُ "ضَجْعَةَ أَهْلِ النَّارِ". وَفِي هَذِهِ السُّنَنِ تَحْوِيلُ النَّوْمِ مِنْ رَاحَةٍ جِسْمِيَّةٍ بَحْتَةٍ إِلَى اسْتِسْلاَمٍ وَاعٍ لِحِمَايَةِ اللهِ، فَيَطْهُرُ المُؤْمِنُ وَيَلْتَجِئُ وَيُقِرُّ بِأَنَّ النَّوْمَ مَوْتَةٌ صُغْرَى، فَيُسَلِّمُ اللَّيْلَ لِلحَيِّ القَيُّومِ وَيَسْتَيْقِظُ بِقَلْبٍ مُسْتَعِدٍّ لِلعِبَادَةِ.
    description_fr: |
      Avant de se coucher, le Prophète Muhammad ﷺ effectuait l'ablution comme pour la prière, époussetait son lit trois fois du bord de son vêtement inférieur, puis s'allongeait sur le côté droit, la main droite sous la joue droite. Il invoquait alors : « Allāhumma bismika amūtu wa aḥyā » (Ô Allah, en Ton nom je meurs et je vis). Il recommandait la récitation d'Āyat al-Kursī et des trois dernières sourates du Coran — al-Ikhlāṣ, al-Falaq et al-Nās — en soufflant dans les paumes et en les passant sur le corps. Le Prophète ﷺ interdisait vigoureusement de dormir sur le ventre, le qualifiant de « position des gens de l'Enfer ». Ces pratiques transforment le sommeil d'un simple repos physique en une reddition consciente à la protection d'Allah. En se purifiant, en cherchant refuge et en reconnaissant que le sommeil est une petite mort, le croyant confie la nuit au Vivant, le Subsistant, et s'éveille avec un cœur préparé au culte.
    reference: Sahih al-Bukhari 247, Sahih Muslim 2713
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 277) records the adhkar before sleep including Ayat al-Kursi and the three Quls. Ibn al-Qayyim (Zad al-Ma'ad, 2:400) explains that lying on the right side with wudu' transforms sleep into conscious surrender to Allah's protection. The four madhhabs agree on these practices, with the majority strongly encouraging them as nightly sunnahs.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 277) consigne les adhkār avant le sommeil, y compris Āyat al-Kursī et les trois Quls. Ibn al-Qayyim (Zād al-Maʿād, 2:400) explique que s'allonger sur le côté droit avec l'ablution transforme le sommeil en une reddition consciente à la protection d'Allah. Les quatre madhhabs s'accordent sur ces pratiques, la majorité les recommandant vigoureusement comme des sunnas nocturnes.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٧٧) أذكارَ ما قبل النومِ بما فيها آيةُ الكرسي والثلاثُ قُلْ. ويُفسِّرُ ابنُ القيم (زاد المعاد، ٢/٤٠٠) أنَّ الاضطجاعَ على الشقِّ الأيمنِ مع الوضوءِ يُحوِّلُ النومَ إلى استسلامٍ واعٍ لحمايةِ الله. وتتفقُ المذاهبُ الأربعةُ على هذه الممارسات، وتشجِّعُ الأكثريةُ على اعتبارها سننًا مؤكَّدةً ليلية.
    display_day_of_year: 218
    hadith_refs: "Bukhari 247, Muslim 2713"
    source_url: https://sunnah.com/bukhari:247

  - slug: sunnah-waking-up
    category: sunnah_practice
    title_en: The Sunnah of Waking Up — Starting the Day with Allah
    title_ar: سُنَّةُ الاسْتِيقَاظِ — بَدْءُ اليَوْمِ بِاللهِ
    title_fr: La Sunna du réveil — commencer la journée avec Allah
    description_en: |
      Upon waking, the Prophet Muhammad ﷺ would rub his eyes with his palms to remove the traces of sleep, then use the siwak to cleanse his mouth. He would supplicate: "Al-hamdulillahi alladhi ahyana ba'da ma amatana wa ilayhi al-nushur" (Praise be to Allah who gave us life after He caused us to die, and to Him is the resurrection). This du'a recognises that sleep is a minor death and that waking is a divine gift. If the sun had risen, he would perform wudu' and pray the two rak'ahs of Salat al-Duha. The Prophet ﷺ also encouraged praising Allah abundantly in the morning: "Al-hamdulillahi alladhi ahyana hadha al-yawm" (Praise be to Allah who gave us life this day). Beginning the day with gratitude and purification establishes a foundation of mindfulness, reminding the believer that every new morning is an opportunity for righteous deeds and seeking Allah's pleasure.
    description_ar: |
      عِنْدَمَا كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يَسْتَيْقِظُ، كَانَ يَمْسَحُ عَيْنَيْهِ بِكَفَّيْهِ لِإِزَالَةِ أَثَرِ النَّوْمِ، ثُمَّ يَسْتَاكُ لِتَطْهِيرِ فَمِهِ. وَكَانَ يَدْعُو: "الحَمْدُ للهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ". وَفِي هَذَا الدُّعَاءِ إِعْرَافٌ بِأَنَّ النَّوْمَ مَوْتَةٌ صُغْرَى وَأَنَّ الاِسْتِيقَاظَ نِعْمَةٌ إِلَهِيَّةٌ. وَإِنْ طَلَعَتِ الشَّمْسُ تَوَضَّأَ وَصَلَّى رَكْعَتَيِ الضُّحَى. وَكَانَ ﷺ يُحَثُّ عَلَى الإِكْثَارِ مِنْ حَمْدِ اللهِ فِي الصَّبَاحِ: "الحَمْدُ للهِ الَّذِي أَحْيَانَا هَذَا اليَوْمَ". وَفِي بَدْءِ اليَوْمِ بِالشُّكْرِ وَالتَّطْهِيرِ تَأْسِيسٌ لِلتَّوَجُّهِ الوَاعِي، وَتَذْكِيرٌ لِلمُؤْمِنِ بِأَنَّ كُلَّ صَبَاحٍ جَدِيدٍ هُوَ فُرْصَةٌ لِلأَعْمَالِ الصَّالِحَةِ وَطَلَبِ رِضْوَانِ اللهِ.
    description_fr: |
      En se réveillant, le Prophète Muhammad ﷺ se frottait les yeux avec les paumes pour effacer les traces du sommeil, puis se servait du siwāk pour purifier sa bouche. Il invoquait : « Al-ḥamdulillāhi alladhī aḥyānā baʿda mā amātanā wa ilayhi al-nushūr » (Louange à Allah qui nous a rendu la vie après nous avoir fait mourir, et c'est vers Lui que sera la résurrection). Cette invocation reconnaît que le sommeil est une petite mort et que le réveil est un don divin. Si le soleil s'était levé, il effectuait l'ablution et priait les deux rakʿa de Ṣalāt al-Ḍuḥā. Le Prophète ﷺ encourageait également à louer Allah abondamment le matin : « Al-ḥamdulillāhi alladhī aḥyānā hādhā al-yawm » (Louange à Allah qui nous a donné la vie ce jour). Commencer la journée par la gratitude et la purification établit un fondement de pleine conscience, rappelant au croyant que chaque nouveau matin est une opportunité d'actes vertueux et de recherche du plaisir d'Allah.
    reference: Sahih al-Bukhari 3794, Sahih Muslim 2711
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 278) records the du'a upon waking and the use of the siwak. Ibn al-Qayyim (Zad al-Ma'ad, 2:405) explains that acknowledging sleep as a minor death and waking as divine gift establishes the foundation of daily mindfulness. The four madhhabs agree on these morning practices as confirmed sunnahs.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 278) consigne la duʿā au réveil et l'usage du siwāk. Ibn al-Qayyim (Zād al-Maʿād, 2:405) explique que reconnaître le sommeil comme une petite mort et le réveil comme un don divin établit le fondement de la pleine conscience quotidienne. Les quatre madhhabs s'accordent sur ces pratiques matinales comme des sunnas confirmées.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٧٨) دعاءَ الاستيقاظِ واستخدامَ السِّواك. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٤٠٥) أنَّ إقرارَ النومِ بأنه موتةٌ صغرى والاستيقاظَ بنعمةٍ إلهيةٍ يُؤسِّسان لأساسِ اليقظةِ اليومية. وتتفقُ المذاهبُ الأربعةُ على هذه الممارسات الصباحيةِ باعتبارها سننًا مؤكَّدة.
    display_day_of_year: 219
    hadith_refs: "Bukhari 3794, Muslim 2711"
    source_url: https://sunnah.com/bukhari:3794

  - slug: sunnah-entering-home
    category: sunnah_practice
    title_en: The Sunnah of Entering and Leaving the Home
    title_ar: سُنَّةُ الدُّخُولِ وَالخُرُوجِ مِنَ المَنْزِلِ
    title_fr: La Sunna de l'entrée et de la sortie de la maison
    description_en: |
      The Prophet Muhammad ﷺ taught that when entering one's home, one should offer the greeting of peace: "As-salamu 'alayna wa 'ala 'ibadillah as-salihin" (Peace be upon us and upon the righteous servants of Allah). Even if the house is empty, the angels respond to this salam, filling the dwelling with blessings. When leaving, the Prophet ﷺ would say: "Bismillahi, tawakkaltu 'ala Allah, la hawla wa la quwwata illa billah" (In the name of Allah, I place my trust in Allah, there is no power nor strength except with Allah). Umm Salama reported that the Prophet ﷺ never failed to utter these words when leaving his house. These brief but profound supplications turn the threshold into a space of remembrance, entrusting the home to Allah's protection in one's absence and inviting His peace upon return. They remind the believer that every departure and arrival is an act of tawakkul.
    description_ar: |
      عَلَّمَ النَّبِيُّ مُحَمَّدٌ ﷺ أَنْ يُسَلِّمَ الإِنْسَانُ عَلَى أَهْلِ بَيْتِهِ عِنْدَ الدُّخُولِ بِقَوْلِهِ: "السَّلاَمُ عَلَيْنَا وَعَلَى عِبَادِ اللهِ الصَّالِحِينَ". وَإِنْ كَانَ البَيْتُ خَالِيًا اسْتَجَابَتِ المَلاَئِكَةُ لِهَذَا السَّلاَمِ، فَمَلأَتِ الدَّارَ بَرَكَاتٍ. وَعِنْدَ الخُرُوجِ كَانَ ﷺ يَقُولُ: "بِسْمِ اللهِ، تَوَكَّلْتُ عَلَى اللهِ، لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللهِ". وَرَوَتْ أُمُّ سَلَمَةَ أَنَّ النَّبِيَّ ﷺ لَمْ يَكُنْ يَدَعُ هَذِهِ الكَلِمَاتِ عِنْدَ خُرُوجِهِ مِنْ بَيْتِهِ. وَفِي هَذِهِ الأَدْعِيَةِ القَصِيرَةِ العَمِيقَةِ تَحْوِيلُ العَتَبَةِ إِلَى مَكَانِ ذِكْرٍ، وَتَوْكِيلُ البَيْتِ لِحِمَايَةِ اللهِ فِي الغِيَابِ، وَدَعْوَةُ سَلاَمِهِ عِنْدَ العَوْدَةِ. وَهِيَ تُذَكِّرُ المُؤْمِنَ بِأَنَّ كُلَّ خُرُوجٍ وَعَوْدَةٍ هُوَ تَوَكُّلٌ عَلَى اللهِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné qu'en entrant chez soi, on doit adresser le salut de paix : « As-salāmu ʿalaynā wa ʿalā ʿibādillāh al-ṣāliḥīn » (La paix soit sur nous et sur les bons serviteurs d'Allah). Même si la maison est vide, les anges répondent à ce salām, remplissant le foyer de bénédictions. En sortant, le Prophète ﷺ disait : « Bismillāhi, tawakkaltu ʿalā Allāh, lā ḥawla wa lā quwwata illā billāh » (Au nom d'Allah, je place ma confiance en Allah, il n'y a de force ni de puissance que par Allah). Umm Salama a rapporté que le Prophète ﷺ ne manquait jamais de prononcer ces mots en sortant de chez lui. Ces brèves mais profondes supplications transforment le seuil en un lieu de rappel, confiant le foyer à la protection d'Allah en son absence et invoquant Sa paix au retour. Elles rappellent au croyant que tout départ et tout retour sont un acte de tawakkul.
    reference: Sahih Muslim 2018, Jami' at-Tirmidhi 3461
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 238) records the du'a for entering and leaving the home as protective remembrances. Ibn al-Qayyim (al-Manar al-Munif, 1:89) adds that saying the du'a upon leaving protects both the person and their household for the duration of their absence. The four madhhabs encourage these du'as, with the Shafi'i school recording them as sunnah mu'akkada.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 238) consigne la duʿā pour entrer et sortir de la maison comme des remembrances protectrices. Ibn al-Qayyim (al-Manār al-Munīf, 1:89) ajoute que prononcer cette duʿā en sortant protège à la fois la personne et son foyer pendant toute l'absence. Les quatre madhhabs encouragent ces duʿāʾ, l'école shāfiʿite les consignant comme sunna muʾakkada.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٣٨) دعاءَ الدخولِ والخروجِ من المنزلِ كأذكارٍ وقائية. ويُضيفُ ابنُ القيم (المنار المنيف، ١/٨٩) أنَّ قولَ الدعاءِ عند الخروجِ يَحْمِي الشخصَ وأسرتَه طوالَ فترةِ الغياب. وتشجِّعُ المذاهبُ الأربعةُ على هذه الأدعية، وتُسَجِّلُ المدرسةُ الشافعيةُ اعتبارَها سنةً مؤكَّدة.
    display_day_of_year: 221
    hadith_refs: "Muslim 2018, Tirmidhi 3461"
    source_url: https://sunnah.com/muslim:2018

  - slug: sunnah-salam-greeting
    category: sunnah_practice
    title_en: The Sunnah of Greeting with Salam
    title_ar: سُنَّةُ التَّحِيَّةِ بِالسَّلاَمِ
    title_fr: La Sunna du salut par le salām
    description_en: |
      The greeting of Islam, "As-salamu 'alaykum wa rahmatullah," is a prayer for peace and divine mercy that Allah Himself used when greeting Adam in Paradise. The Prophet Muhammad ﷺ made it an obligation upon Muslims, saying: "You will not enter Paradise until you believe, and you will not believe until you love one another. Shall I not guide you to something which, if you do it, you will love one another? Spread salam among yourselves." He taught that the one who initiates the greeting is closer to Allah, and that responding to salam is obligatory. The greeting is not mere social convention — it is a declaration of faith, a means of dissolving enmity, and a practical tool for building the brotherhood that defines the Muslim community. Even a stranger becomes a brother through this sacred exchange.
    description_ar: |
      تَحِيَّةُ الإِسْلاَمِ "السَّلاَمُ عَلَيْكُمْ وَرَحْمَةُ اللهِ" هِيَ دُعَاءٌ بِالسَّلاَمِ وَالرَّحْمَةِ الإِلَهِيَّةِ اسْتَخْدَمَهُ اللهُ تَعَالَى نَفْسُهُ حِينَ حَيَّا آدَمَ فِي الجَنَّةِ. وَجَعَلَهَا النَّبِيُّ مُحَمَّدٌ ﷺ فَرْضًا عَلَى المُسْلِمِينَ، فَقَالَ: "لاَ تَدْخُلُونَ الجَنَّةَ حَتَّى تُؤْمِنُوا، وَلاَ تُؤْمِنُوا حَتَّى تَحَابُّوا، أَوَلاَ أَدُلُّكُمْ عَلَى شَيْءٍ إِذَا فَعَلْتُمُوهُ تَحَابَبْتُمْ؟ أَفْشُوا السَّلاَمَ بَيْنَكُمْ". وَعَلَّمَ أَنَّ المُبْدِئَ بِالسَّلاَمِ أَقْرَبُ إِلَى اللهِ، وَأَنَّ الرَّدَّ وَاجِبٌ. وَالسَّلاَمُ لَيْسَ مُجَرَّدَ عَادَةٍ اجْتِمَاعِيَّةٍ — بَلْ هُوَ إِعْلاَنُ الإِيمَانِ، وَسَبِيلٌ لِذَوْبَانِ الخُصُومَةِ، وَأَدَاةٌ عَمَلِيَّةٌ لِبِنَاءِ الأُخُوَّةِ الَّتِي تُعَرِّفُ المُجْتَمَعَ المُسْلِمَ. وَحَتَّى الغَرِيبُ يَصِيرُ أَخًا بِهَذَا التَّبَادُلِ المُقَدَّسِ.
    description_fr: |
      Le salut de l'Islam, « As-salāmu ʿalaykum wa raḥmatullāh », est une prière pour la paix et la miséricorde divine qu'Allah Lui-même a employée en saluant Ādam au Paradis. Le Prophète Muhammad ﷺ en a fait une obligation pour les musulmans, disant : « Vous n'entrerez pas au Paradis tant que vous n'aurez pas la foi, et vous n'aurez pas la foi tant que vous ne vous aimerez pas les uns les autres. Ne vous indiquerai-je pas quelque chose qui, si vous le faites, vous vous aimerez les uns les autres ? Répandez le salām entre vous. » Il a enseigné que celui qui initie le salut est plus proche d'Allah, et que d'y répondre est obligatoire. Le salām n'est pas une simple convention sociale — c'est une déclaration de foi, un moyen de dissoudre l'inimitié, et un outil pratique pour construire la fraternité qui définit la communauté musulmane. Même un étranger devient un frère par cet échange sacré.
    reference: Sahih al-Bukhari 6234, Sahih Muslim 2160
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 279) records the command to spread salam among Muslims as a means of fostering love. Ibn al-Qayyim (Zad al-Ma'ad, 2:410) explains that initiating the greeting is closer to Allah and that responding is obligatory. The four madhhabs agree on the obligation to return salam and the recommendation to initiate it.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 279) consigne l'ordre de répandre le salām parmi les musulmans comme un moyen de cultiver l'amour. Ibn al-Qayyim (Zād al-Maʿād, 2:410) explique qu'initier le salut est plus proche d'Allah et qu'y répondre est obligatoire. Les quatre madhhabs s'accordent sur l'obligation de rendre le salām et la recommandation de l'initier.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٧٩) الأمرَ بإفشاءِ السلامِ بين المسلمين وسيلةً لغرسِ المحبة. ويُفسِّرُ ابنُ القيم (زاد المعاد، ٢/٤١٠) أنَّ المُبْدِئَ بالتحيةِ أقربُ إلى اللهِ وأنَّ الردَّ واجبٌ. وتتفقُ المذاهبُ الأربعةُ على وجوبِ ردِّ السلامِ واستحبابِ تقديمِه.
    display_day_of_year: 223
    hadith_refs: "Bukhari 6234, Muslim 2160"
    source_url: https://sunnah.com/bukhari:6234

  - slug: sunnah-shaking-hands
    category: sunnah_practice
    title_en: The Sunnah of Shaking Hands — Spreading Love Among Muslims
    title_ar: سُنَّةُ المُصَافَحَةِ — نَشْرُ المَحَبَّةِ بَيْنَ المُسْلِمِينَ
    title_fr: La Sunna de la poignée de main — répandre l'amour parmi les musulmans
    description_en: |
      The Prophet Muhammad ﷺ said: "There are no two Muslims who meet and shake hands with one another except that they are forgiven before they part." He would greet his Companions with a warm handshake and sometimes an embrace, filling the community with affection and unity. Abu Hurayra reported that when the Prophet ﷺ shook someone's hand, he would not withdraw his own until the other person withdrew theirs first — a subtle etiquette of generosity and attentiveness. The handshake in Islam is a physical manifestation of brotherhood that erases rancour, confirms love for the sake of Allah, and earns forgiveness. In an age of digital communication, this tactile sunnah remains a powerful, accessible tool for building communal bonds and manifesting the prophetic spirit of mercy in everyday encounters.
    description_ar: |
      قَالَ النَّبِيُّ مُحَمَّدٌ ﷺ: "مَا تَلَاقَى مُسْلِمَانِ فَتَصَافَحَا إِلاَّ غُفِرَ لَهُمَا قَبْلَ أَنْ يَتَفَرَّقَا". وَكَانَ ﷺ يُحَيِّي أَصْحَابَهُ بِمُصَافَحَةٍ حَارَّةٍ وَأَحْيَانًا بِمُعَانَقَةٍ، فَيَمْلأُ المُجْتَمَعَ بِالمَحَبَّةِ وَالوِحْدَةِ. وَرَوَى أَبُو هُرَيْرَةَ أَنَّ النَّبِيَّ ﷺ كَانَ إِذَا صَافَحَ أَحَدًا لَمْ يَنْزِعْ يَدَهُ حَتَّى يَكُونَ هُوَ الذِي يَنْزِعُ يَدَهُ أَوَّلاً — وَفِي هَذِهِ اللَّطَافَةِ كَرَمٌ وَاهْتِمَامٌ. وَالمُصَافَحَةُ فِي الإِسْلاَمِ هِيَ تَجْسِيدٌ مَادِّيٌّ لِلأُخُوَّةِ تَمْحُو الحِقْدَ، وَتُثَبِّتُ المَحَبَّةَ فِي اللهِ، وَتَسْتَحِقُّ المَغْفِرَةَ. وَفِي عَصْرِ التَّوَاصُلِ الرَّقْمِيِّ، تَبْقَى هَذِهِ السُّنَّةُ الحِسِّيَّةُ أَدَاةً قَوِيَّةً وَمُتَاحَةً لِبِنَاءِ الرَّبَاطَاتِ المُجْتَمَعِيَّةِ وَإِظْهَارِ الرُّوحِ النَّبَوِيَّةِ فِي اللِّقَاءَاتِ اليَوْمِيَّةِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Il n'y a pas deux musulmans qui se rencontrent et se serrent la main sans qu'ils ne soient pardonnés avant de se séparer. » Il saluait ses Compagnons d'une poignée de main chaleureuse et parfois d'une étreinte, remplissant la communauté d'affection et d'unité. Abū Hurayra a rapporté que lorsque le Prophète ﷺ serrait la main de quelqu'un, il ne retirait pas la sienne avant que l'autre ne la retire la première — une subtile étiquette de générosité et d'attention. La poignée de main en Islam est une manifestation physique de la fraternité qui efface la rancœur, confirme l'amour pour Allah, et mérite le pardon. À l'ère de la communication numérique, cette sunna tactile demeure un outil puissant et accessible pour construire des liens communautaires et manifester l'esprit prophétique de miséricorde dans les rencontres quotidiennes.
    reference: Sahih al-Bukhari 6263, Sahih Muslim 2733
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 280) records the narration that two Muslims who meet and shake hands are forgiven before they part. Ibn al-Qayyim (Zad al-Ma'ad, 2:415) explains that physical gestures of brotherhood erase rancour and confirm love for the sake of Allah. The four madhhabs agree on the recommendation of musafaha, with the majority holding it as sunnah mu'akkada.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 280) consigne le récit selon lequel deux musulmans qui se rencontrent et se serrent la main sont pardonnés avant de se séparer. Ibn al-Qayyim (Zād al-Maʿād, 2:415) explique que les gestes physiques de fraternité effacent la rancœur et confirment l'amour pour Allah. Les quatre madhhabs s'accordent sur la recommandation de la muṣāfaḥa, la majorité la tenant pour sunna muʾakkada.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٠) الروايةَ بأنَّ مسلمَينِ يتلاقيانِ ويصافحانِ يُغْفَرُ لهما قبل أن يتفرَّقا. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٤١٥) أنَّ الإشاراتِ الجسديةِ للأخوَّةِ تَمْحو الحِقْدَ وتُثَبِّتُ المحبةَ في الله. وتتفقُ المذاهبُ الأربعةُ على استحبابِ المصافحة، وتعتبرُها الأكثريةُ سنةً مؤكَّدة.
    display_day_of_year: 224
    hadith_refs: "Bukhari 6263, Muslim 2733"
    source_url: https://sunnah.com/bukhari:6263

  - slug: sunnah-ghusl-friday
    category: sunnah_practice
    title_en: The Sunnah of Ghusl on Friday
    title_ar: سُنَّةُ الغُسْلِ يَوْمَ الجُمُعَةِ
    title_fr: La Sunna du bain rituel (ghusl) le vendredi
    description_en: |
      The Prophet Muhammad ﷺ said: "Whoever performs ghusl on Friday, purifying himself as much as he can, then uses oil or perfume from his household, then goes out without separating two people, then prays what is prescribed for him, then remains silent when the imam speaks, his sins between that Friday and the previous Friday will be forgiven." Ghusl on Friday is one of the most emphasised sunnah acts for men; it involves washing the entire body, using fragrance, wearing clean clothes, and arriving early to the mosque. For women, the scholars recommend ghusl as well, though it is less emphasised than for men. This practice embodies the dignity of the weekly congregational prayer and the renewal of the believer's spiritual state, marking Friday as a day of purification and communal celebration.
    description_ar: |
      قَالَ النَّبِيُّ مُحَمَّدٌ ﷺ: "مَنِ اغْتَسَلَ يَوْمَ الجُمُعَةِ غُسْلاً مِنَ الجَنَابَةِ، ثُمَّ رَاحَ فِي السَّاعَةِ الأولَى فَكَأَنَّمَا قَرَّبَ بَدَنَةً، وَمَنْ رَاحَ فِي السَّاعَةِ الثَّانِيَةِ فَكَأَنَّمَا قَرَّبَ بَقَرَةً...". وَالغُسْلُ يَوْمَ الجُمُعَةِ مِنْ أَكْثَرِ السُّنَنِ تَأْكِيدًا لِلرِّجَالِ؛ وَفِيهِ تَطْهِيرُ الجَسَدِ كُلِّهِ، وَاسْتِخْدَامُ الطِّيبِ، وَلُبْسُ الثِّيَابِ النَّظِيفَةِ، وَالخُرُوجُ مُبَكِّرًا إِلَى المَسْجِدِ. وَيُسَنُّ لِلنِّسَاءِ أَيْضًا وَإِنْ كَانَ أَقَلَّ تَأْكِيدًا. وَفِي هَذِهِ السُّنَّةِ تَجْسِيدٌ لِهَيْبَةِ الصَّلاَةِ الجَمْعِيَّةِ الأُسْبُوعِيَّةِ وَتَجْدِيدُ الحَالِ الرُّوحِيِّ لِلمُؤْمِنِ، فَتَكُونُ الجُمُعَةُ يَوْمَ طُهْرٍ وَاحْتِفَاءٍ جَمَاعِيٍّ.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Quiconque prend un bain rituel le vendredi en se purifiant autant qu'il le peut, puis se parfume avec ce qu'il trouve dans sa maison, puis sort sans séparer deux personnes, puis prie ce qui lui est prescrit, puis se tait lorsque l'imam parle, ses péchés entre ce vendredi et le vendredi précédent lui seront pardonnés. » Le ghusl du vendredi est l'une des sunnas les plus recommandées pour les hommes ; il consiste à laver tout le corps, à se parfumer, à porter des vêtements propres et à arriver tôt à la mosquée. Pour les femmes, les savants recommandent également le ghusl, bien que cela soit moins souligné. Cette pratique incarne la dignité de la prière congrégationnelle hebdomadaire et le renouvellement de l'état spirituel du croyant, faisant du vendredi un jour de purification et de célébration communautaire.
    reference: Sahih al-Bukhari 877, Sahih Muslim 845
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 281) records ghusl on Friday as one of the most emphasized sunnahs for men. Ibn al-Qayyim (Zad al-Ma'ad, 2:420) explains that the comprehensive preparation — bath, perfume, clean clothes, and early arrival — embodies the dignity of the weekly congregation. The four madhhabs agree on the strong recommendation for men, with some scholars extending it to women.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 281) consigne le ghusl du vendredi comme l'une des sunnas les plus recommandées pour les hommes. Ibn al-Qayyim (Zād al-Maʿād, 2:420) explique que la préparation complète — bain, parfum, vêtements propres et arrivée précoce — incarne la dignité de l'assemblée hebdomadaire. Les quatre madhhabs s'accordent sur la forte recommandation pour les hommes, certains savants l'étendant aux femmes.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨١) الغسلَ يومَ الجمعةِ من أكثرِ السننِ تأكيدًا للرجال. ويُفسِّرُ ابنُ القيم (زاد المعاد، ٢/٤٢٠) أنَّ الاستعدادَ الشاملَ — الاغتسالُ والطيبُ والثيابُ النظيفةُ والتبكيرُ — يُجسِّدُ هيبةَ الاجتماعِ الأسبوعي. وتتفقُ المذاهبُ الأربعةُ على التأكيدِ القويِّ للرجال، ويَرِي بعضُ العلماءِ استحبابَه للنساءِ أيضًا.
    display_day_of_year: 227
    hadith_refs: "Bukhari 877, Muslim 845"
    source_url: https://sunnah.com/bukhari:877

  - slug: sunnah-siwak
    category: sunnah_practice
    title_en: The Sunnah of Siwak — Cleaning the Teeth
    title_ar: سُنَّةُ السِّوَاكِ — تَنْظِيفُ الأَسْنَانِ
    title_fr: La Sunna du siwāk — le nettoyage des dents
    description_en: |
      The Prophet Muhammad ﷺ said: "Were it not that I would overburden my ummah, I would have commanded them to use the siwak at every prayer." He used it constantly — when entering his home, when waking from sleep, when performing wudu', when reciting the Qur'an, and whenever his mouth changed. The siwak, a tooth-stick typically from the arak tree, cleans the mouth, pleases Allah, and was praised by the Prophet ﷺ as a means of purification. Aisha reported that he would begin with the right side when using it. This simple practice, often neglected in modern life, was so beloved to the Prophet ﷺ that he nearly made it obligatory. Its revival today honours the prophetic concern for cleanliness and transforms an everyday hygiene routine into an act of worship that earns divine pleasure.
    description_ar: |
      قَالَ النَّبِيُّ مُحَمَّدٌ ﷺ: "لَوْلاَ أَنْ أَشُقَّ عَلَى أُمَّتِي لأَمَرْتُهُمْ بِالسِّوَاكِ عِنْدَ كُلِّ صَلاَةٍ". وَكَانَ ﷺ يَسْتَاكُ دَائِمًا — عِنْدَ دُخُولِ البَيْتِ، وَعِنْدَ الاسْتِيقَاظِ مِنَ النَّوْمِ، وَعِنْدَ الوُضُوءِ، وَعِنْدَ قِرَاءَةِ القُرْآنِ، وَحِينَمَا تَتَغَيَّرُ رَائِحَةُ فَمِهِ. وَالسِّوَاكُ — غُصْنٌ مِنْ شَجَرَةِ الأَرَاكِ عَادَةً — يُطَهِّرُ الفَمَ، وَيُرْضِي اللهَ، وَكَانَ ﷺ يَمْدَحُهُ كَوَسِيلَةٍ لِلتَّطْهِيرِ. وَرَوَتْ عَائِشَةُ أَنَّهُ كَانَ يَبْدَأُ بِاليَمِينِ عِنْدَ اسْتِخْدَامِهِ. وَهَذِهِ العَادَةُ البَسِيطَةُ الَّتِي يُهْمَلُ كَثِيرًا فِي الحَيَاةِ المُعَاصِرَةِ، كَانَتْ عِنْدَ النَّبِيِّ ﷺ مِنْ أَحَبِّ الأَعْمَالِ حَتَّى كَادَ يُفَرِّضُهَا. وَإِحْيَاؤُهَا اليَوْمَ يُكَرِّمُ اهْتِمَامَ النُّبُوَّةِ بِالنَّظَافَةِ، وَيُحَوِّلُ عَادَةَ النَّظَافَةِ اليَوْمِيَّةَ إِلَى عِبَادَةٍ تَسْتَحِقُّ رِضْوَانَ اللهِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Si je ne craignais pas de rendre les choses difficiles à ma communauté, je leur aurais ordonné d'utiliser le siwāk à chaque prière. » Il s'en servait constamment — en entrant chez lui, en se réveillant, lors de l'ablution, en récitant le Coran, et chaque fois que son haleine changeait. Le siwāk, un bâtonnet à mâcher généralement tiré de l'arak, purifie la bouche, plaît à Allah, et a été loué par le Prophète ﷺ comme un moyen de purification. ʿĀʾisha a rapporté qu'il commençait par le côté droit en l'utilisant. Cette pratique simple, souvent négligée dans la vie moderne, était si chère au Prophète ﷺ qu'il faillit la rendre obligatoire. Sa revivalisation aujourd'hui honore le souci prophétique de propreté et transforme une routine d'hygiène quotidienne en un acte de culte qui mérite le plaisir divin.
    reference: Sahih al-Bukhari 887, Sahih Muslim 252
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 282) records the Prophet's ﷺ near-command to use the siwak at every prayer. Ibn al-Qayyim (Zad al-Ma'ad, 2:425) explains that the siwak purifies the mouth, pleases Allah, and was a constant prophetic practice. The four madhhabs agree on its strong recommendation, with the Hanbalis holding it as wajib for prayer.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 282) consigne la quasi-obligation du Prophète ﷺ d'utiliser le siwāk à chaque prière. Ibn al-Qayyim (Zād al-Maʿād, 2:425) explique que le siwāk purifie la bouche, plaît à Allah, et était une pratique prophétique constante. Les quatre madhhabs s'accordent sur sa forte recommandation, les hanbalites la tenant pour wājib pour la prière.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٢) قولَ النبيِّ ﷺ الذي كادَ يُفَرِّضُ فيه استخدامَ السِّواك عند كلِّ صلاة. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٤٢٥) أنَّ السِّواكَ يُطهِّرُ الفمَ ويُرْضِي اللهَ وكانَ من السُّنَّةِ النبويةِ الدائمة. وتتفقُ المذاهبُ الأربعةُ على التأكيدِ الشديدِ لاستحبابِه، ويَعْتَبِرُه الحنابلةُ واجبًا للصلاة.
    display_day_of_year: 228
    hadith_refs: "Bukhari 887, Muslim 252"
    source_url: https://sunnah.com/bukhari:887

  - slug: sunnah-fragrance
    category: sunnah_practice
    title_en: The Sunnah of Wearing Fragrance
    title_ar: سُنَّةُ التَّطَيُّبِ وَلُبْسِ الطِّيبِ
    title_fr: La Sunna du parfum et du port de fragrance
    description_en: |
      The Prophet Muhammad ﷺ said: "Whoever is given a fragrance, let him not refuse it, for it comes from Paradise." He loved pleasant scents and used them regularly, especially on Fridays, before attending gatherings, and when meeting people. Anas ibn Malik said: "I have never smelled anything more fragrant than the scent of the Messenger of Allah ﷺ." The Prophet ﷺ encouraged women to use fragrance at home for their husbands but prohibited strong scents when going to the mosque. Wearing fragrance is a sign of cleanliness, dignity, and respect for others — it elevates the believer's presence and reflects the inner purity that Islam cultivates. It also follows the prophetic model of honouring the self and others through sensory blessings, turning a simple act of grooming into a sunnah of beauty and courtesy.
    description_ar: |
      قَالَ النَّبِيُّ مُحَمَّدٌ ﷺ: "مَنْ أُعْطِيَ طِيبًا فَلاَ يَرُدَّهُ، فَإِنَّهُ مِنَ الطِّيبَاتِ". وَكَانَ ﷺ يُحِبُّ الرِّيَاحَ الطَّيِّبَةَ وَيَسْتَخْدِمُهَا بِاسْتِمْرَارٍ، خُصُوصًا يَوْمَ الجُمُعَةِ، وَقَبْلَ حُضُورِ المَجَالِسِ، وَعِنْدَ لِقَاءِ النَّاسِ. وَقَالَ أَنَسُ بْنُ مَالِكٍ: "مَا شَمِمْتُ مِنْ قَطُّ عَرَفًا أَطْيَبَ مِنْ عَرَفِ رَسُولِ اللهِ ﷺ". وَحَثَّ النَّبِيُّ ﷺ النِّسَاءَ عَلَى التَّطَيُّبِ فِي البُيُوتِ لِأَزْوَاجِهِنَّ، وَنَهَاهُنَّ عَنِ الرِّيَاحِ القَوِيَّةِ عِنْدَ ذَهَابِهِنَّ إِلَى المَسْجِدِ. وَالتَّطَيُّبُ عَلاَمَةُ النَّظَافَةِ وَالوَقَارِ وَالاحْتِرَامِ لِلآخَرِينَ — يَرْفَعُ مِنْ حُضُورِ المُؤْمِنِ وَيَعْكِسُ الطُّهْرَ الدَّاخِلِيَّ الَّذِي يُرَبِّي عَلَيْهِ الإِسْلاَمُ. وَهُوَ أَيْضًا اتِّبَاعٌ لِلسُّنَّةِ النَّبَوِيَّةِ فِي إِكْرَامِ الذَّاتِ وَالآخَرِينَ بِالنِّعَمِ الحِسِّيَّةِ، فَيُحَوِّلُ عَمَلَ التَّجْمِيلِ اليَوْمِيَّ إِلَى سُنَّةِ جَمَالٍ وَأَدَبٍ.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Quiconque se voit offrir du parfum, qu'il ne le refuse pas, car il fait partie des bonnes choses. » Il aimait les senteurs agréables et s'en servait régulièrement, notamment le vendredi, avant d'assister à des réunions, et lorsqu'il rencontrait des gens. Anas ibn Mālik a dit : « Je n'ai jamais senti de parfum plus délicieux que celui du Messager d'Allah ﷺ. » Le Prophète ﷺ encourageait les femmes à se parfumer chez elles pour leurs maris, mais interdisait les parfums forts lorsqu'elles se rendaient à la mosquée. Porter du parfum est un signe de propreté, de dignité et de respect envers autrui — il élève la présence du croyant et reflète la pureté intérieure que l'Islam cultive. C'est également suivre le modèle prophétique d'honorer soi-même et les autres par les bienfaits sensoriels, transformant un simple acte de toilette en une sunna de beauté et de courtoisie.
    reference: Sahih al-Bukhari 2543, Sahih Muslim 2253
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 283) records the Prophet's ﷺ love of pleasant scents and his encouragement to wear them. Ibn al-Qayyim (Zad al-Ma'ad, 2:430) explains that fragrance is a sign of cleanliness and respect for others, especially on Fridays and when attending gatherings. The four madhhabs agree on the recommendation, with the caveat that women should not wear strong scents when going to the mosque.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 283) consigne l'amour du Prophète ﷺ pour les senteurs agréables et son encouragement à les porter. Ibn al-Qayyim (Zād al-Maʿād, 2:430) explique que le parfum est un signe de propreté et de respect envers autrui, notamment le vendredi et lorsqu'on assiste à des réunions. Les quatre madhhabs s'accordent sur la recommandation, avec la mise en garde que les femmes ne doivent pas porter de parfums forts en se rendant à la mosquée.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٣) حبَّ النبيِّ ﷺ للرياحِ الطيبةِ وحثَّه على لبسِها. ويُفسِّرُ ابنُ القيم (زاد المعاد، ٢/٤٣٠) أنَّ الطيبَ علامةُ النظافةِ والاحترامِ للآخرين، خاصةً يومَ الجمعةِ وعند حضورِ المجالس. وتتفقُ المذاهبُ الأربعةُ على الاستحباب، مع التنبيهِ على أنْ لا تتطيَّبَ المرأةُ بالرياحِ القويةِ عند ذهابِها إلى المسجد.
    display_day_of_year: 229
    hadith_refs: "Bukhari 2543, Muslim 2253"
    source_url: https://sunnah.com/bukhari:2543

  - slug: sunnah-right-foot-first
    category: sunnah_practice
    title_en: Starting with the Right Foot — Entering Masjid and Good Places
    title_ar: البَدْءُ بِاليَمِينِ — دُخُولُ المَسْجِدِ وَالأَمَاكِنِ الطَّيِّبَةِ
    title_fr: Commencer par le pied droit — entrer dans la mosquée et les lieux de bien
    description_en: |
      The Prophet Muhammad ﷺ would begin with his right foot when entering the mosque, his home, or any place of goodness, and with his left foot when leaving the mosque or entering the lavatory. Anas ibn Malik reported that this was from the sunnah — putting the right foot first when entering and the left when leaving. This practice may seem small, but it trains the believer in constant mindfulness of Allah, turning every movement into a deliberate act of obedience. It reflects the holistic nature of the shari'ah, where even the placement of the foot becomes an expression of faith and alignment with the prophetic model. The right side is associated with honour and blessing in Islamic symbolism, and beginning with it is a subtle yet profound way of seeking Allah's favour in every step of daily life.
    description_ar: |
      كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يَبْدَأُ بِرِجْلِهِ اليُمْنَى عِنْدَ دُخُولِ المَسْجِدِ، وَبَيْتِهِ، أَوْ أَيِّ مَكَانٍ طَيِّبٍ، وَيَبْدَأُ بِاليُسْرَى عِنْدَ الخُرُوجِ مِنَ المَسْجِدِ أَوْ دُخُولِ الخَلاَءِ. وَرَوَى أَنَسُ بْنُ مَالِكٍ أَنَّ هَذَا مِنَ السُّنَّةِ — تَقْدِيمُ اليُمْنَى عِنْدَ الدُّخُولِ وَاليُسْرَى عِنْدَ الخُرُوجِ. وَقَدْ تَبْدُو هَذِهِ العَادَةُ بَسِيطَةً، لَكِنَّهَا تُدَرِّبُ المُؤْمِنَ عَلَى اسْتِشْعَارِ اللهِ الدَّائِمِ، فَتُحَوِّلُ كُلَّ حَرَكَةٍ إِلَى فِعْلٍ مُتَعَمَّدٍ مِنَ الطَّاعَةِ. وَفِي ذَلِكَ انْعِكَاسٌ لِلشُّمُولِيَّةِ الفِقْهِيَّةِ، حَيْثُ يَصِيرُ وَضْعُ القَدَمِ تَعْبِيرًا عَنِ الإِيمَانِ وَالانْتِسَابِ لِلنَّمُوذَجِ النَّبَوِيِّ. وَاليَمِينُ مُرْتَبِطَةٌ بِالشَّرَفِ وَالبَرَكَةِ فِي الرَّمْزِ الإِسْلاَمِيِّ، وَتَقْدِيمُهَا سَبِيلٌ لَطِيفٌ لِطَلَبِ فَضْلِ اللهِ فِي كُلِّ خُطْوَةٍ مِنَ الحَيَاةِ.
    description_fr: |
      Le Prophète Muhammad ﷺ commençait par le pied droit en entrant dans la mosquée, chez lui, ou tout lieu de bien, et par le pied gauche en sortant de la mosquée ou en entrant aux lieux d'aisance. Anas ibn Mālik a rapporté que cela faisait partie de la sunna — mettre le pied droit en premier en entrant et le pied gauche en sortant. Cette pratique peut sembler minime, mais elle entraîne le croyant à une conscience constante d'Allah, transformant chaque mouvement en un acte délibéré d'obéissance. Elle reflète la nature holistique de la shariʿa, où même le placement du pied devient une expression de foi et d'alignement avec le modèle prophétique. Le côté droit est associé à l'honneur et à la bénédiction dans la symbolique islamique, et le privilégier est un moyen subtil mais profond de rechercher la faveur d'Allah à chaque pas de la vie quotidienne.
    reference: Sahih al-Bukhari 163, Sahih Muslim 2719
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 284) records the sunnah of beginning with the right foot when entering good places and the left for the lavatory. Ibn al-Qayyim (Zad al-Ma'ad, 2:435) explains that this trains the believer in constant mindfulness, turning every movement into deliberate obedience. The four madhhabs agree on this etiquette as a confirmed sunnah.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 284) consigne la sunna de commencer par le pied droit en entrant dans les lieux de bien et par le pied gauche pour les lieux d'aisance. Ibn al-Qayyim (Zād al-Maʿād, 2:435) explique que cela entraîne le croyant à une conscience constante, transformant chaque mouvement en une obéissance délibérée. Les quatre madhhabs s'accordent sur cette étiquette comme sunna confirmée.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٤) سنةَ تقديمِ اليمنى عند دخولِ الأماكنِ الطيبةِ واليسرى عند دخولِ الخلاء. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٤٣٥) أنَّ ذلكَ يُدَرِّبُ المؤمنَ على اليقظةِ الدائمةِ، فَيُحَوِّلُ كلَّ حركةٍ إلى طاعةٍ متعمدة. وتتفقُ المذاهبُ الأربعةُ على هذه الأدبِ باعتبارها سنةً مؤكَّدة.
    display_day_of_year: 230
    hadith_refs: "Bukhari 163, Muslim 2719"
    source_url: https://sunnah.com/bukhari:163

  - slug: sunnah-dua-before-eating
    category: sunnah_practice
    title_en: The Du'a Before and After Eating
    title_ar: الدُّعَاءُ قَبْلَ الأَكْلِ وَبَعْدَهُ
    title_fr: La supplication avant et après le repas
    description_en: |
      The Prophet Muhammad ﷺ taught specific supplications to accompany every meal. Before eating, he would say: "Bismillah" (In the name of Allah). If he forgot at the beginning, he would say: "Bismillahi fi awwalihi wa akhirihi" (In the name of Allah at its beginning and end). After finishing, he would say: "Al-hamdulillahi alladhi at'amani hadha wa razaqanihi min ghayri hawlin minni wa la quwwa" (Praise be to Allah who has fed me this and provided it for me without any power or strength on my part). These brief utterances transform eating from a mere biological function into an act of worship, gratitude, and recognition of Allah as the ultimate Provider. The Prophet ﷺ also taught that Satan shares in food over which the name of Allah is not mentioned, making these du'as a means of spiritual protection as well as thankfulness. They remind the believer that every morsel is a trust from Allah.
    description_ar: |
      عَلَّمَ النَّبِيُّ مُحَمَّدٌ ﷺ أَدْعِيَةً مُعَيَّنَةً تَرْفَقُ بِكُلِّ وَجْبَةٍ. قَبْلَ الأَكْلِ كَانَ يَقُولُ: "بِسْمِ اللهِ". وَإِنْ نَسِيَ فِي البَدَايَةِ قَالَ: "بِسْمِ اللهِ فِي أَوَّلِهِ وَآخِرِهِ". وَبَعْدَ الفَرَاغِ كَانَ يَقُولُ: "الحَمْدُ للهِ الَّذِي أَطْعَمَنِي هَذَا وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلاَ قُوَّةٍ". وَفِي هَذِهِ الأَقْوَالِ القَصِيرَةِ تَحْوِيلُ الأَكْلِ مِنْ وَظِيفَةٍ بِيُولُوجِيَّةٍ بَحْتَةٍ إِلَى عِبَادَةٍ وَشُكْرٍ وَإِعْرَافٍ بِاللهِ المُرْزِقِ الأَعْظَمِ. وَعَلَّمَ النَّبِيُّ ﷺ أَيْضًا أَنَّ الشَّيْطَانَ يَشْتَرِكُ فِي الطَّعَامِ الَّذِي لاَ يُذْكَرُ اسْمُ اللهِ عَلَيْهِ، فَتَكُونُ هَذِهِ الأَدْعِيَةُ وَسِيلَةَ حِمَايَةٍ رُوحِيَّةٍ إِضَافَةً إِلَى الشُّكْرِ. وَهِيَ تُذَكِّرُ المُؤْمِنَ بِأَنَّ كُلَّ لُقْمَةٍ أَمَانَةٌ مِنَ اللهِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné des supplications spécifiques pour accompagner chaque repas. Avant de manger, il disait : « Bismillāh » (Au nom d'Allah). S'il oubliait au début, il disait : « Bismillāhi fī awwalihi wa ākhirihi » (Au nom d'Allah à son commencement et à sa fin). Après avoir fini, il disait : « Al-ḥamdulillāhi alladhī aṭaʿamanī hādhā wa razaqanīhi min ghayri ḥawlin minnī wa lā quwwa » (Louange à Allah qui m'a nourri de ceci et me l'a accordé sans force ni puissance de ma part). Ces brèves paroles transforment le repas d'une simple fonction biologique en un acte de culte, de gratitude et de reconnaissance d'Allah comme Pourvoyeur suprême. Le Prophète ﷺ a également enseigné que Satan participe à la nourriture sur laquelle le nom d'Allah n'est pas prononcé, faisant de ces duʿāʾ un moyen de protection spirituelle autant que de reconnaissance. Elles rappellent au croyant que chaque bouchée est un dépôt confié par Allah.
    reference: Sahih al-Bukhari 5376, Sahih Muslim 2024
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 248) records the basmala before eating and the du'a of gratitude after. Ibn al-Qayyim (Zad al-Ma'ad, 2:20) explains that mentioning Allah's name prevents Satan's participation in the meal. The four madhhabs agree that the basmala is sunnah, with the majority holding that forgetting it at the start and saying it later is also virtuous.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 248) consigne la basmala avant de manger et la duʿā de gratitude après. Ibn al-Qayyim (Zād al-Maʿād, 2:20) explique que mentionner le nom d'Allah empêche Satan de participer au repas. Les quatre madhhabs s'accordent pour dire que la basmala est sunna, la majorité estimant qu'oublier au début et la dire ensuite est également vertueux.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٤٨) البسملةَ قبلَ الأكلِ ودعاءَ الشكرِ بعدَه. ويُفسِّرُ ابنُ القيم (زاد المعاد، ٢/٢٠) أنَّ ذكرَ اسمِ اللهِ يَمْنَعُ مشاركةَ الشيطانِ في الطعام. وتتفقُ المذاهبُ الأربعةُ على أنَّ البسملةَ سنةٌ، وتَعْتَقِدُ الأكثريةُ أنَّ نسيَانَها في البدايةِ وقولَها بعدَ ذلك فضيلةٌ أيضًا.
    display_day_of_year: 231
    hadith_refs: "Bukhari 5376, Muslim 2024"
    source_url: https://sunnah.com/bukhari:5376

  - slug: sunnah-dua-entering-bathroom
    category: sunnah_practice
    title_en: The Du'a When Entering and Leaving the Bathroom
    title_ar: الدُّعَاءُ عِنْدَ دُخُولِ الخَلاَءِ وَخُرُوجِهِ
    title_fr: La supplication en entrant et en sortant des lieux d'aisance
    description_en: |
      The Prophet Muhammad ﷺ taught that before entering the privy, one should say: "Allahumma inni a'udhu bika min al-khubuthi wa'l-khaba'ith" (O Allah, I seek refuge with You from the male and female unclean spirits). He would enter with the left foot forward. Upon leaving, with the right foot forward, he would say: "Ghufranak" (I seek Your forgiveness). He also forbade speaking, mentioning Allah's name, or facing or turning one's back toward the qibla while relieving oneself. These etiquettes protect the believer from harm, maintain human dignity even in the most vulnerable moments, and instill constant awareness that the Muslim remains under Allah's care and guidance in every circumstance. The brief du'as transform a necessary biological function into an act of conscious reliance on Allah's protection and mercy.
    description_ar: |
      عَلَّمَ النَّبِيُّ مُحَمَّدٌ ﷺ أَنْ يَقُولَ الإِنْسَانُ قَبْلَ دُخُولِ الخَلاَءِ: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الخُبُثِ وَالخَبَائِثِ". وَكَانَ يَدْخُلُ بِرِجْلِهِ اليُسْرَى. وَعِنْدَ الخُرُوجِ بِرِجْلِهِ اليُمْنَى يَقُولُ: "غُفْرَانَكَ". وَنَهَى أَيْضًا عَنِ الكَلاَمِ، وَذِكْرِ اسْمِ اللهِ، وَاسْتِقْبَالِ القِبْلَةِ أَوِ اسْتِدْبَارِهَا عِنْدَ قَضَاءِ الحَاجَةِ. وَفِي هَذِهِ الآدَابِ حِمَايَةٌ لِلمُؤْمِنِ مِنَ الأَذَى، وَحِفْظٌ لِكَرَامَةِ الإِنْسَانِ حَتَّى فِي أَضْعَفِ لَحَظَاتِهِ، وَتَثْبِيتٌ لِلإِحْسَاسِ الدَّائِمِ بِأَنَّ المُسْلِمَ تَحْتَ رِعَايَةِ اللهِ وَهِدَايَتِهِ فِي كُلِّ حَالٍ. وَالأَدْعِيَةُ القَصِيرَةُ تُحَوِّلُ الوَظِيفَةَ البِيُولُوجِيَّةَ الضَّرُورِيَّةَ إِلَى فِعْلِ اسْتِجَارَةٍ وَاعِيَةٍ بِحِمَايَةِ اللهِ وَرَحْمَتِهِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné qu'avant d'entrer aux lieux d'aisance, on doit dire : « Allāhumma innī aʿūdhu bika min al-khubuthi wa-l-khabāʾith » (Ô Allah, je cherche refuge auprès de Toi contre les esprits impurs mâles et femelles). Il entrait le pied gauche en premier. En sortant, le pied droit en premier, il disait : « Ghufrānaka » (Je cherche Ton pardon). Il interdisait également de parler, de mentionner le nom d'Allah, ou de faire face ou de tourner le dos à la qibla en se soulageant. Ces règles de conduite protègent le croyant du mal, préservent la dignité humaine même dans les moments les plus vulnérables, et instaurent une conscience constante que le musulman demeure sous la garde et le guide d'Allah en toute circonstance. Les brèves supplications transforment une fonction biologique nécessaire en un acte de confiance consciente dans la protection et la miséricorde d'Allah.
    reference: Sahih al-Bukhari 142, Sahih Muslim 375
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 239) records the du'a for entering the privy and the etiquettes of relieving oneself. Ibn al-Qayyim (Zad al-Ma'ad, 2:375) explains that even in the most vulnerable moments, the Muslim remains under Allah's care through conscious supplication. The four madhhabs agree on the du'a and the prohibition of facing the qibla.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 239) consigne la duʿā pour entrer aux lieux d'aisance et les étiquettes du soulagement. Ibn al-Qayyim (Zād al-Maʿād, 2:375) explique que même dans les moments les plus vulnérables, le musulman demeure sous la garde d'Allah par la supplication consciente. Les quatre madhhabs s'accordent sur cette duʿā et l'interdiction de faire face à la qibla.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٣٩) دعاءَ دخولِ الخلاءِ وآدابَ قضاءِ الحاجة. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٣٧٥) أنَّ المسلمَ يبقى تحتَ رعايةِ اللهِ حتى في أضعفِ اللحظاتِ من خلالِ الدعاءِ الواعي. وتتفقُ المذاهبُ الأربعةُ على هذا الدعاءِ وعلى تحريمِ استقبالِ القبلة.
    display_day_of_year: 232
    hadith_refs: "Bukhari 142, Muslim 375"
    source_url: https://sunnah.com/bukhari:142

  - slug: sunnah-dua-leaving-home
    category: sunnah_practice
    title_en: The Du'a When Leaving Home
    title_ar: الدُّعَاءُ عِنْدَ الخُرُوجِ مِنَ المَنْزِلِ
    title_fr: La supplication en sortant de la maison
    description_en: |
      When leaving home, the Prophet Muhammad ﷺ would say: "Bismillahi, tawakkaltu 'ala Allah, la hawla wa la quwwata illa billah" (In the name of Allah, I place my trust in Allah, there is no power nor strength except with Allah). Anas ibn Malik reported that the Prophet ﷺ said: "When a man says this, it is said to him: 'You have been guided, spared, and protected,' and the devils turn away from him." Umm Salama added that the Prophet ﷺ never failed to say these words when leaving his house. This du'a serves as a spiritual shield, reminding the believer that every journey, no matter how mundane, begins with reliance on Allah. It transforms the threshold into a place of tawakkul, where the believer consciously entrusts his safety, his affairs, and his return to the One who alone has power over all things.
    description_ar: |
      كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يَقُولُ عِنْدَ خُرُوجِهِ مِنَ البَيْتِ: "بِسْمِ اللهِ، تَوَكَّلْتُ عَلَى اللهِ، لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللهِ". وَرَوَى أَنَسُ بْنُ مَالِكٍ أَنَّ النَّبِيَّ ﷺ قَالَ: "إِذَا خَرَجَ الرَّجُلُ مِنْ بَيْتِهِ فَقَالَ: بِسْمِ اللهِ، تَوَكَّلْتُ عَلَى اللهِ، لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللهِ، يُقَالُ لَهُ: هُدِيتَ وَكُفِيتَ وَوُقِيتَ، وَتَنَحَّى عَنْهُ الشَّيْطَانُ". وَأَضَافَتْ أُمُّ سَلَمَةَ أَنَّ النَّبِيَّ ﷺ كَانَ لاَ يَدَعُ هَذِهِ الكَلِمَاتِ عِنْدَ خُرُوجِهِ مِنْ بَيْتِهِ. وَهَذَا الدُّعَاءُ يَعْمَلُ كَتِرْسٍ رُوحِيٍّ، يُذَكِّرُ المُؤْمِنَ بِأَنَّ كُلَّ سَفَرٍ — وَلَوْ بَدَا عَادِيًّا — يَبْدَأُ بِالتَّوَكُّلِ عَلَى اللهِ. وَيُحَوِّلُ العَتَبَةَ إِلَى مَكَانِ تَوَكُّلٍ، يَسْتَسْلِمُ فِيهِ المُؤْمِنُ وَاعِيًا أَمْنَهُ وَأُمُورَهُ وَعَوْدَتَهُ إِلَى الوَاحِدِ الَّذِي بِيَدِهِ كُلُّ شَيْءٍ.
    description_fr: |
      En sortant de chez lui, le Prophète Muhammad ﷺ disait : « Bismillāhi, tawakkaltu ʿalā Allāh, lā ḥawla wa lā quwwata illā billāh » (Au nom d'Allah, je place ma confiance en Allah, il n'y a de force ni de puissance que par Allah). Anas ibn Mālik a rapporté que le Prophète ﷺ a dit : « Lorsqu'un homme dit cela, il lui est dit : 'Tu as été guidé, épargné et protégé', et les diables s'écartent de lui. » Umm Salama a ajouté que le Prophète ﷺ ne manquait jamais de prononcer ces mots en sortant de chez lui. Cette supplication sert de bouclier spirituel, rappelant au croyant que tout voyage, même le plus ordinaire, commence par la confiance en Allah. Elle transforme le seuil en un lieu de tawakkul, où le croyant confie consciemment sa sécurité, ses affaires et son retour à Celui qui détient seul le pouvoir sur toutes choses.
    reference: Sunan Abi Dawud 5095 (sahih), Jami' at-Tirmidhi 3426
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 245) records this du'a with the comment that it combines reliance on Allah (tawakkul) and acknowledgment of human incapacity without Him. Ibn al-Qayyim (al-Manar al-Munif, 1:89) adds that saying it upon leaving protects both the person and their household for the duration of their absence. The four madhhabs agree on the strong recommendation of this du'a.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 245) consigne cette duʿā en commentant qu'elle combine la confiance en Allah (tawakkul) et la reconnaissance de l'impuissance humaine sans Lui. Ibn al-Qayyim (al-Manār al-Munīf, 1:89) ajoute que la prononcer en sortant protège à la fois la personne et son foyer pendant toute l'absence. Les quatre madhhabs s'accordent sur la forte recommandation de cette duʿā.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٤٥) هذا الدعاءَ مع التعليقِ بأنَّه يجمعُ بين التوكلِ على اللهِ والاعترافِ بعجزِ الإنسانِ من دونه. ويُضيفُ ابنُ القيم (المنار المنيف، ١/٨٩) أنَّ قولَه عند الخروجِ يَحْمِي الشخصَ وأسرتَه طوالَ مدةِ الغياب. وتتفقُ المذاهبُ الأربعةُ على التأكيدِ الشديدِ لاستحبابِ هذا الدعاء.
    display_day_of_year: 233
    hadith_refs: "Abu Dawud 5095, Tirmidhi 3426"
    source_url: https://sunnah.com/abudawud:5095

  - slug: sunnah-dua-traveling
    category: sunnah_practice
    title_en: The Du'a When Traveling
    title_ar: الدُّعَاءُ عِنْدَ السَّفَرِ
    title_fr: La supplication lors du voyage
    description_en: |
      When mounting a conveyance, the Prophet Muhammad ﷺ would say "Bismillah" three times, then "Al-hamdulillah" three times, followed by: "Subhan alladhi sakhkhara lana hadha wa ma kunna lahu muqrinin, wa inna ila rabbina la-munqalibun" (Glory be to Him who has subjected this to us, and we could never have it by our own efforts; and to our Lord we shall surely return). He would then say: "Allahumma inna nas'aluka fi safarina hadha al-birra wa'l-taqwa, wa mina'l-'amali ma tardha" (O Allah, we ask You in this journey of ours righteousness and piety, and deeds that are pleasing to You). The Prophet ﷺ also taught to send salawat upon himself before and after these supplications. These comprehensive du'as transform travel into a profound act of tawakkul and gratitude, acknowledging human dependence on Allah and seeking His guidance and protection throughout the journey.
    description_ar: |
      كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ إِذَا اسْتَوَى عَلَى رَاحِلَتِهِ يَقُولُ: "بِسْمِ اللهِ" ثَلَاثَ مَرَّاتٍ، ثُمَّ "الحَمْدُ للهِ" ثَلَاثَ مَرَّاتٍ، ثُمَّ يَقُولُ: "سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ، وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ". ثُمَّ يَقُولُ: "اللَّهُمَّ إِنَّا نَسْأَلُكَ فِي سَفَرِنَا هَذَا البِرَّ وَالتَّقْوَى، وَمِنَ العَمَلِ مَا تَرْضَى". وَكَانَ ﷺ يُحَثُّ عَلَى الصَّلاَةِ عَلَيْهِ قَبْلَ هَذِهِ الأَدْعِيَةِ وَبَعْدَهَا. وَفِي هَذِهِ الأَدْعِيَةِ الشَّامِلَةِ تَحْوِيلُ السَّفَرِ إِلَى فِعْلٍ عَمِيقٍ مِنَ التَّوَكُّلِ وَالشُّكْرِ، إِذْ تُقِرُّ بِافْتِقَارِ الإِنْسَانِ إِلَى اللهِ، وَتَطْلُبُ هِدَايَتَهُ وَحِمَايَتَهُ طِوَالَ الرِّحْلَةِ.
    description_fr: |
      En montant sur un moyen de transport, le Prophète Muhammad ﷺ disait « Bismillāh » trois fois, puis « Al-ḥamdulillāh » trois fois, suivi de : « Subḥāna alladhī sakhkhara lanā hādhā wa mā kunnā lahu muqrinīn, wa innā ilā rabbinā la-munqalibūn » (Gloire à Celui qui nous a soumis ceci, car nous n'aurions pu le dominer par nous-mêmes ; et c'est vers notre Seigneur que nous retournerons). Il disait ensuite : « Allāhumma innā nasʾaluka fī safarinā hādhā al-birra wa-l-taqwā, wa mina l-ʿamali mā tarḍā » (Ô Allah, nous Te demandons dans ce voyage de nous la droiture et la piété, et des œuvres qui Te sont agréables). Le Prophète ﷺ enseignait également d'adresser la salutation sur lui-même avant et après ces supplications. Ces duʿāʾ complets transforment le voyage en un acte profond de tawakkul et de gratitude, reconnaissant la dépendance humaine envers Allah et cherchant Son guide et Sa protection tout au long du trajet.
    reference: Sahih al-Bukhari 2789, Sahih Muslim 1342
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 285) records the comprehensive du'a for travel that acknowledges human dependence on Allah. Ibn al-Qayyim (Zad al-Ma'ad, 2:440) explains that these supplications transform travel into an act of tawakkul and gratitude. The four madhhabs agree on the recommendation of these du'as before and during journeys.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 285) consigne la duʿā complète pour le voyage qui reconnaît la dépendance humaine envers Allah. Ibn al-Qayyim (Zād al-Maʿād, 2:440) explique que ces supplications transforment le voyage en un acte de tawakkul et de gratitude. Les quatre madhhabs s'accordent sur la recommandation de ces duʿāʾ avant et pendant les voyages.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٥) الدعاءَ الشاملَ للسفرِ الذي يُقرُّ بافتقارِ الإنسانِ إلى الله. ويُفسِّرُ ابنُ القيم (زاد المعاد، ٢/٤٤٠) أنَّ هذه الأدعيةَ تُحوِّلُ السفرَ إلى فعلِ توكلٍ وشكر. وتتفقُ المذاهبُ الأربعةُ على استحبابِ هذه الأدعيةِ قبلَ السفرِ وأثناءَه.
    display_day_of_year: 234
    hadith_refs: "Bukhari 2789, Muslim 1342"
    source_url: https://sunnah.com/bukhari:2789

  - slug: sunnah-dua-entering-market
    category: sunnah_practice
    title_en: The Du'a When Entering the Marketplace
    title_ar: الدُّعَاءُ عِنْدَ دُخُولِ السُّوقِ
    title_fr: La supplication en entrant sur le marché
    description_en: |
      The Prophet Muhammad ﷺ taught that when entering the marketplace, one should say: "La ilaha illa-Allah wahdahu la sharika lahu, lahu al-mulku wa lahu al-hamdu, yuhyi wa yumitu, wa huwa hayyun la yamutu, bi yadihi al-khayr, wa huwa 'ala kulli shay'in qadir" (There is no god but Allah alone, without partner; to Him belongs dominion and praise; He gives life and causes death; and He is Ever-Living and does not die; in His hand is all good, and He is over all things competent). The Prophet ﷺ said that whoever says this, Allah will record for him a million good deeds, erase a million bad deeds, and raise him a million degrees. This magnificent du'a protects the believer from the materialism, greed, and heedlessness that often pervade marketplaces. It reorients the heart toward tawhid before engaging in commerce, reminding the merchant and the customer alike that all wealth, transactions, and livelihoods are ultimately in Allah's hand alone.
    description_ar: |
      عَلَّمَ النَّبِيُّ مُحَمَّدٌ ﷺ أَنْ يَقُولَ المُؤْمِنُ عِنْدَ دُخُولِ السُّوقِ: "لاَ إِلَهَ إِلاَّ اللهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ المُلْكُ وَلَهُ الحَمْدُ، يُحْيِي وَيُمِيتُ، وَهُوَ حَيٌّ لاَ يَمُوتُ، بِيَدِهِ الخَيْرُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ". وَقَالَ النَّبِيُّ ﷺ: "مَنْ قَالَهَا كَتَبَ اللهُ لَهُ مِلْءَ صَحِيفَةٍ حَسَنَاتٍ، وَمَحَا عَنْهُ مِلْءَ صَحِيفَةٍ سَيِّئَاتٍ، وَرَفَعَهُ فِيهَا مِلْءَ صَحِيفَةٍ دَرَجَاتٍ". وَهَذَا الدُّعَاءُ العَظِيمُ يَحْمِي المُؤْمِنَ مِنَ المَادِّيَّةِ وَالطَّمَعِ وَالغَفْلَةِ الَّتِي تَسُودُ الأَسْوَاقَ غَالِبًا. وَيُعِيدُ تَوْجِيهَ القَلْبِ نَحْوَ التَّوْحِيدِ قَبْلَ مُمَارَسَةِ التِّجَارَةِ، فَيُذَكِّرُ التَّاجِرَ وَالمُشْتَرِيَ أَنَّ كُلَّ مَالٍ وَصَفْقَةٍ وَرِزْقٍ هُوَ فِي يَدِ اللهِ وَحْدَهُ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné qu'en entrant sur le marché, on doit dire : « Lā ilāha illā-Allāh waḥdahu lā sharīka lahu, lahu al-mulku wa lahu al-ḥamdu, yuḥyī wa yumītu, wa huwa ḥayyun lā yamūtu, bi yadihi al-khayru, wa huwa ʿalā kulli shayʾin qadīr » (Il n'y a de dieu qu'Allah seul, sans associé ; à Lui appartient la royauté et à Lui la louange ; Il donne la vie et fait mourir ; et Il est le Vivant qui ne meurt pas ; dans Sa main est tout le bien, et Il est sur toute chose Puissant). Le Prophète ﷺ a dit que quiconque dit cela, Allah lui inscrira un million de bonnes actions, effacera un million de mauvaises actions, et l'élèvera d'un million de degrés. Cette magnifique supplication protège le croyant du matérialisme, de la cupidité et de l'inattention qui règnent souvent sur les marchés. Elle réoriente le cœur vers le tawḥīd avant de s'engager dans le commerce, rappelant au marchand comme à l'acheteur que toute richesse, transaction et subsistance sont finalement dans la seule main d'Allah.
    reference: Jami' at-Tirmidhi 3428 (hasan), Sunan Ibn Majah 2235
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 286) records the immense reward of this du'a, which reorients the heart toward tawhid before commerce. Ibn al-Qayyim (Zad al-Ma'ad, 2:445) explains that this supplication protects the believer from the materialism and heedlessness common in marketplaces. The four madhhabs agree on its recommendation, with some scholars classifying it as sunnah mu'akkada.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 286) consigne la récompense immense de cette duʿā, qui réoriente le cœur vers le tawḥīd avant le commerce. Ibn al-Qayyim (Zād al-Maʿād, 2:445) explique que cette supplication protège le croyant du matérialisme et de l'inattention répandus sur les marchés. Les quatre madhhabs s'accordent sur sa recommandation, certains savants la classant comme sunna muʾakkada.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٦) الأجرَ الجزيلَ لهذا الدعاءِ الذي يُعيدُ توجيهَ القلبِ نحوَ التوحيدِ قبلَ التجارة. ويُوضِّحُ ابنُ القيم (زاد المعاد، ٢/٤٤٥) أنَّ هذا الدعاءَ يَحْمِي المؤمنَ من الماديةِ والغفلةِ السائدةِ في الأسواق. وتتفقُ المذاهبُ الأربعةُ على الاستحباب، ويُصنِّفُ بعضُ العلماءِ هذا الدعاءَ باعتباره سنةً مؤكَّدة.
    display_day_of_year: 237
    hadith_refs: "Tirmidhi 3428, Ibn Majah 2235"
    source_url: https://sunnah.com/tirmidhi:3428

  - slug: sunnah-dua-after-adhan
    category: sunnah_practice
    title_en: The Du'a After the Adhan
    title_ar: الدُّعَاءُ بَعْدَ الأَذَانِ
    title_fr: La supplication après l'appel à la prière (adhān)
    description_en: |
      The Prophet Muhammad ﷺ said: "When the mu'adhdhin says 'Hayya 'ala al-salah' and 'Hayya 'ala al-falah,' say: 'La hawla wa la quwwata illa billah' (There is no power nor strength except with Allah). And when the adhan is completed, say: 'Allahumma rabba hadhihi al-da'wati al-tammah wa'l-salati al-qa'imah, ati Muhammadan al-wasilata wa'l-fadilata, wa'b'athhu maqaman mahmudan alladhi wa'adtahu'" (O Allah, Lord of this perfect call and established prayer, grant Muhammad the wasila and virtue, and raise him to the praised station which You promised him). The Prophet ﷺ said that whoever says this with certainty will be granted his intercession on the Day of Resurrection. This du'a connects the believer to the Messenger of Allah ﷺ at the very moment the community is called to prayer, transforming the adhan from a mere announcement into a spiritual conduit for prophetic mercy and divine nearness.
    description_ar: |
      قَالَ النَّبِيُّ مُحَمَّدٌ ﷺ: "إِذَا سَمِعْتُمُ المُؤَذِّنَ فَقُولُوا مِثْلَ مَا يَقُولُ، ثُمَّ صَلُّوا عَلَيَّ، فَإِنَّهُ مَنْ صَلَّى عَلَيَّ صَلاَةً صَلَّى اللهُ عَلَيْهِ بِهَا عَشْرًا. ثُمَّ سَلُوا اللهَ لِيَ الوَسِيلَةَ، فَإِنَّهَا مَنْزِلَةٌ فِي الجَنَّةِ لاَ تَنْبَغِي إِلاَّ لِعَبْدٍ مِنْ عِبَادِ اللهِ، وَأَرْجُو أَنْ أَكُونَ أَنَا هُوَ". وَعِنْدَ قَوْلِ المُؤَذِّنِ "حَيَّ عَلَى الصَّلاَةِ" وَ"حَيَّ عَلَى الفَلاَحِ" يَقُولُ: "لاَ حَوْلَ وَلاَ قُوَّةَ إِلاَّ بِاللهِ". وَبَعْدَ انْتِهَاءِ الأَذَانِ يَقُولُ: "اللَّهُمَّ رَبَّ هَذِهِ الدَّعْوَةِ التَّامَّةِ وَالصَّلاَةِ القَائِمَةِ، آتِ مُحَمَّدًا الوَسِيلَةَ وَالفَضِيلَةَ، وَابْعَثْهُ مَقَامًا مَحْمُودًا الَّذِي وَعَدْتَهُ". وَمَنْ قَالَهَا بِيَقِينٍ اسْتَحَقَّ الشَّفَاعَةَ يَوْمَ القِيَامَةِ. وَهَذَا الدُّعَاءُ يَرْبِطُ المُؤْمِنَ بِرَسُولِ اللهِ ﷺ فِي اللَّحْظَةِ الَّتِي يُنَادَى فِيهَا المُجْتَمَعُ إِلَى الصَّلاَةِ، فَيُحَوِّلُ الأَذَانَ مِنْ مُجَرَّدِ إِعْلاَنٍ إِلَى قَنَاةٍ رُوحِيَّةٍ لِرَحْمَةِ النُّبُوَّةِ وَالدُّنُوِّ مِنَ اللهِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Lorsque le muezzin dit 'Ḥayya ʿalā al-ṣalāh' et 'Ḥayya ʿalā al-falāḥ,' dites : 'Lā ḥawla wa lā quwwata illā billāh' (Il n'y a de force ni de puissance que par Allah). Et lorsque l'adhān est accompli, dites : 'Allāhumma rabba hādhihi al-dāʿwati al-tāmmah wa-l-ṣalāti al-qāʾimah, ʾāti Muḥammadan al-wasīlata wa-l-faḍīlah, wa-bʿathhu maqāman maḥmūdan alladhī waʿadtahu' » (Ô Allah, Seigneur de cet appel parfait et de cette prière établie, accorde à Muḥammad le moyen d'accès et l'excellence, et relève-le au rang loué que Tu lui as promis). Le Prophète ﷺ a dit que quiconque dit cela avec certitude obtiendra son intercession le Jour de la Résurrection. Cette supplication relie le croyant au Messager d'Allah ﷺ au moment même où la communauté est appelée à la prière, transformant l'adhān d'une simple annonce en un conduit spirituel pour la miséricorde prophétique et la proximité divine.
    reference: Sahih al-Bukhari 614, Sahih Muslim 386
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 263) records the du'a after the Adhan and the narration that whoever says it with certainty will receive the Prophet's ﷺ intercession. Ibn al-Qayyim (Zad al-Ma'ad, 1:330) explains that this du'a connects the believer to the Messenger of Allah at the very moment the community is called to prayer. The four madhhabs agree on the recommendation of this supplication.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 263) consigne la duʿā après l'adhān et le récit selon lequel quiconque la dit avec certitude obtiendra l'intercession du Prophète ﷺ. Ibn al-Qayyim (Zād al-Maʿād, 1:330) explique que cette duʿā relie le croyant au Messager d'Allah au moment même où la communauté est appelée à la prière. Les quatre madhhabs s'accordent sur la recommandation de cette supplication.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٦٣) الدعاءَ بعد الأذانِ والروايةَ بأنَّ مَن قالَه بيقينٍ يستحقُّ شفاعةَ النبيِّ ﷺ. ويُفسِّرُ ابنُ القيم (زاد المعاد، ١/٣٣٠) أنَّ هذا الدعاءَ يَرْبِطُ المؤمنَ برسولِ اللهِ في اللحظةِ التي يُنادَى فيها المجتمعُ إلى الصلاة. وتتفقُ المذاهبُ الأربعةُ على استحبابِ هذا الدعاء.
    display_day_of_year: 238
    hadith_refs: "Bukhari 614, Muslim 386"
    source_url: https://sunnah.com/bukhari:614

  - slug: sunnah-dua-between-sujud
    category: sunnah_practice
    title_en: The Du'a Between the Two Sujuds
    title_ar: الدُّعَاءُ بَيْنَ السَّجْدَتَيْنِ
    title_fr: La supplication entre les deux prosternations
    description_en: |
      Between the two prostrations in prayer, the Prophet Muhammad ﷺ would supplicate: "Rabbi ighfir li, warhamni, wajburni, wahdini, wa 'afini, warzuqni" (O my Lord, forgive me, have mercy on me, mend my brokenness, guide me, grant me well-being, and provide for me). This comprehensive supplication covers every spiritual and material need — forgiveness, mercy, healing of the heart, guidance, health, and sustenance. The Prophet ﷺ taught it as a concise yet all-encompassing du'a, making the brief pause between the two sujuds a moment of intense personal conversation with Allah. It reminds the believer that prayer is not merely ritual movement but a living dialogue with the Creator. In this fleeting interval, the servant asks for everything he needs, acknowledging his complete dependence on his Lord's grace and generosity.
    description_ar: |
      كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يَدْعُو بَيْنَ السَّجْدَتَيْنِ فِي الصَّلاَةِ: "رَبِّ اغْفِرْ لِي وَارْحَمْنِي وَاجْبُرْنِي وَاهْدِنِي وَعَافِنِي وَارْزُقْنِي". وَفِي هَذَا الدُّعَاءِ الشَّامِلِ تَغْطِيَةٌ لِكُلِّ حَاجَةٍ رُوحِيَّةٍ وَمَادِّيَّةٍ — المَغْفِرَةُ، وَالرَّحْمَةُ، وَجَبْرُ القَلْبِ المَكْسُورِ، وَالهُدَى، وَالصِّحَّةُ، وَالرِّزْقُ. وَعَلَّمَهُ النَّبِيُّ ﷺ دُعَاءً مُوجَزًا لَكِنَّهُ يَشْمَلُ كُلَّ شَيْءٍ، فَجَعَلَ الوَقْفَةَ القَصِيرَةَ بَيْنَ السَّجْدَتَيْنِ لَحْظَةَ حِوَارٍ شَخْصِيٍّ مُكَثَّفٍ مَعَ اللهِ. وَيُذَكِّرُ المُؤْمِنَ بِأَنَّ الصَّلاَةَ لَيْسَتْ مُجَرَّدَ حَرَكَاتٍ طَّقْسِيَّةٍ بَلْ حِوَارًا حَيًّا مَعَ الخَالِقِ. وَفِي هَذِهِ اللَّحْظَةِ العَابِرَةِ يَطْلُبُ العَبْدُ كُلَّ مَا يَحْتَاجُ، مُقِرًّا بِافْتِقَارِهِ التَّامِّ إِلَى فَضْلِ رَبِّهِ وَكَرَمِهِ.
    description_fr: |
      Entre les deux prosternations dans la prière, le Prophète Muhammad ﷺ invoquait : « Rabbī ighfir lī, wa-rḥamnī, wa-jburnī, wa-hdinī, wa ʿāfinī, wa-rzuqnī » (Ô mon Seigneur, pardonne-moi, aie pitié de moi, répare mon brisement, guide-moi, accorde-moi le bien-être, et pourvois-moi). Cette supplication complète couvre chaque besoin spirituel et matériel — le pardon, la miséricorde, la guérison du cœur brisé, le guide, la santé et la subsistance. Le Prophète ﷺ l'a enseignée comme un duʿāʾ concis mais tout-en-un, faisant de la brève pause entre les deux sujūds un moment de conversation personnelle intense avec Allah. Elle rappelle au croyant que la prière n'est pas seulement un mouvement rituel mais un dialogue vivant avec le Créateur. Dans cet intervalle fugace, le serviteur demande tout ce dont il a besoin, reconnaissant sa dépendance totale à la grâce et à la générosité de son Seigneur.
    reference: Sahih al-Bukhari 738, Sahih Muslim 476
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 287) records the comprehensive du'a between the two prostrations covering every spiritual and material need. Ibn al-Qayyim (Zad al-Ma'ad, 1:350) explains that this brief pause is a moment of intense personal conversation with Allah, reminding the believer that prayer is a living dialogue. The four madhhabs agree on the recommendation of this du'a.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 287) consigne la duʿā complète entre les deux prosternations couvrant chaque besoin spirituel et matériel. Ibn al-Qayyim (Zād al-Maʿād, 1:350) explique que cette brève pause est un moment de conversation personnelle intense avec Allah, rappelant au croyant que la prière est un dialogue vivant. Les quatre madhhabs s'accordent sur la recommandation de cette duʿā.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٨٧) الدعاءَ الشاملَ بين السجدتين الذي يشملُ كلَّ حاجةٍ روحيةٍ ومادية. ويُوضِّحُ ابنُ القيم (زاد المعاد، ١/٣٥٠) أنَّ هذه الوقفةَ القصيرةَ لحظةُ حوارٍ شخصيٍّ مكثَّفٍ مع اللهِ، تُذكِّرُ المؤمنَ بأنَّ الصلاةَ حوارٌ حي. وتتفقُ المذاهبُ الأربعةُ على استحبابِ هذا الدعاء.
    display_day_of_year: 239
    hadith_refs: "Bukhari 738, Muslim 476"
    source_url: https://sunnah.com/bukhari:738

  - slug: sunnah-dua-qunut
    category: sunnah_practice
    title_en: The Du'a of Qunut in Witr and Fajr
    title_ar: دُعَاءُ القُنُوتِ فِي الوِتْرِ وَالفَجْرِ
    title_fr: La supplication du qunūt dans la prière du witr et du fajr
    description_en: |
      The Prophet Muhammad ﷺ would supplicate in qunut during the Witr prayer and sometimes in Fajr during times of calamity. The most comprehensive qunut du'a is: "Allahumma ihdini fiman hadayta, wa 'afini fiman 'afayta, wa tawallani fiman tawallayta, wa barik li fima a'tayta, wa qini sharra ma qadayta, fa innaka taqdi wa la yuqda 'alayk, wa innahu la yadhillu man walayta, wa la ya'izzu man 'adayta, tabarakta Rabbana wa ta'alayt" (O Allah, guide me among those You have guided, heal me among those You have healed, be my protector among those You have protected, bless me in what You have given, and save me from the evil of what You have decreed, for You decree and none can decree upon You, and none is humiliated whom You befriend, and none is honoured whom You oppose; blessed are You, our Lord, and exalted). This majestic supplication affirms complete submission to Allah's decree and serves as a nightly reminder of divine sovereignty and mercy.
    description_ar: |
      كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يَدْعُو فِي القُنُوتِ فِي صَلاَةِ الوِتْرِ، وَأَحْيَانًا فِي الفَجْرِ فِي أَحْوَالِ المِحَنِ. وَأَشْمَلُ أَدْعِيَةِ القُنُوتِ: "اللَّهُمَّ اهْدِنِي فِيمَنْ هَدَيْتَ، وَعَافِنِي فِيمَنْ عَافَيْتَ، وَتَوَلَّنِي فِيمَنْ تَوَلَّيْتَ، وَبَارِكْ لِي فِيمَا أَعْطَيْتَ، وَقِنِي شَرَّ مَا قَضَيْتَ، فَإِنَّكَ تَقْضِي وَلاَ يُقْضَى عَلَيْكَ، وَإِنَّهُ لاَ يَذِلُّ مَنْ وَالَيْتَ، وَلاَ يَعِزُّ مَنْ عَادَيْتَ، تَبَارَكْتَ رَبَّنَا وَتَعَالَيْتَ". وَفِي هَذَا الدُّعَاءِ العَظِيمِ إِقْرَارٌ تَامٌّ بِخُضُوعِ الإِنْسَانِ لِقَضَاءِ اللهِ، وَتَذْكِيرٌ لَيْلِيٌّ بِالسِّيَادَةِ الإِلَهِيَّةِ وَالرَّحْمَةِ. وَيَجْمَعُ بَيْنَ طَلَبِ الهُدَى وَالصِّحَّةِ وَالوِلاَيَةِ وَالبَرَكَةِ، وَالاسْتِجَارَةِ مِنْ شَرِّ القَدَرِ، مُقِرًّا بِأَنَّ اللهَ وَحْدَهُ المُتَصَرِّفُ فِي الكَوْنِ بِلاَ مُعَارِضٍ.
    description_fr: |
      Le Prophète Muhammad ﷺ invoquait le qunūt pendant la prière du witr, et parfois au fajr en période de calamité. La supplication du qunūt la plus complète est : « Allāhumma ihdinī fīman hadayt, wa ʿāfinī fīman ʿāfayt, wa tawallanī fīman tawallayt, wa bārik lī fīmā ʾaʿṭayt, wa qinī sharra mā qaḍayt, fa innaka taqḍī wa lā yuqḍā ʿalayk, wa innahu lā yadhillu man wālayt, wa lā yaʿizzu man ʿādayt, tabārakta Rabbanā wa taʿālayt » (Ô Allah, guide-moi parmi ceux que Tu as guidés, guéris-moi parmi ceux que Tu as guéris, prends-moi en charge parmi ceux que Tu as pris en charge, bénis-moi dans ce que Tu m'as donné, et préserve-moi du mal de ce que Tu as décrété, car Tu décrètes et nul ne peut décréter sur Toi, et nul n'est humilié que Tu prends sous Ta protection, et nul n'est honoré que Tu opposes ; Tu es béni, ô notre Seigneur, et exalté). Cette majestueuse supplication affirme la soumission complète au décret d'Allah et sert de rappel nocturne de la souveraineté divine et de la miséricorde.
    reference: Sahih al-Bukhari 1001, Sahih Muslim 806
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 260) records the Qunut du'a as a majestic affirmation of complete submission to Allah's decree. Ibn al-Qayyim (Zad al-Ma'ad, 1:316) explains that the Qunut transforms the final moments of night prayer into an intimate conversation seeking comprehensive divine care. The four madhhabs agree on the recommendation of Qunut in Witr, though they differ on whether it is before or after ruku'.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 260) consigne la duʿā du Qunūt comme une affirmation majestueuse de la soumission complète au décret d'Allah. Ibn al-Qayyim (Zād al-Maʿād, 1:316) explique que le Qunūt transforme les derniers moments de la prière nocturne en une conversation intime cherchant une sollicitude divine complète. Les quatre madhhabs s'accordent sur la recommandation du Qunūt dans le Witr, bien qu'ils diffèrent sur sa place avant ou après le rukūʿ.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٦٠) دعاءَ القنوتِ باعتباره إقرارًا مجيدًا بالخضوعِ التامِّ لقضاءِ الله. ويُفسِّرُ ابنُ القيم (زاد المعاد، ١/٣١٦) أنَّ القنوتَ يُحوِّلُ لحظاتِ صلاةِ الليلِ الأخيرةَ إلى حوارٍ وثيقٍ يطلبُ العنايةَ الإلهيةَ الشاملة. وتتفقُ المذاهبُ الأربعةُ على استحبابِ القنوتِ في الوتر، مع اختلافِهم في كونه قبلَ الركوعِ أو بعدَه.
    display_day_of_year: 240
    hadith_refs: "Bukhari 1001, Muslim 806"
    source_url: https://sunnah.com/bukhari:1001

  - slug: sunnah-dua-ruku-sujud
    category: sunnah_practice
    title_en: The Du'as of Ruku' and Sujud
    title_ar: أَدْعِيَةُ الرُّكُوعِ وَالسُّجُودِ
    title_fr: Les supplications du rukūʿ et du sujūd
    description_en: |
      In ruku' (bowing), the Prophet Muhammad ﷺ would glorify Allah with "Subhana Rabbiya al-'Azim" (Glory be to my Lord, the Magnificent) three or more times, and sometimes add: "Subhanak Allahumma wa bi-hamdika, Allahumma ighfir li" (Glory and praise be to You, O Allah; forgive me). In sujud (prostration), he would say: "Subhana Rabbiya al-A'la" (Glory be to my Lord, the Most High) three or more times, and sometimes: "Subbuhun quddusun Rabb al-mala'ikati wa'l-ruh" (Perfect and Holy is the Lord of the angels and the Spirit). The Prophet ﷺ said that the closest a servant is to his Lord is in prostration, so one should increase supplication therein. These tasbihat are the heartbeat of the prayer — they humble the body before Allah's greatness, purify the tongue from worldly speech, and draw the believer into the intimate presence of the Divine.
    description_ar: |
      كَانَ النَّبِيُّ مُحَمَّدٌ ﷺ يُسَبِّحُ فِي الرُّكُوعِ: "سُبْحَانَ رَبِّيَ العَظِيمِ" ثَلَاثَ مَرَّاتٍ أَوْ أَكْثَرَ، وَأَحْيَانًا يَزِيدُ: "سُبْحَانَكَ اللَّهُمَّ وَبِحَمْدِكَ، اللَّهُمَّ اغْفِرْ لِي". وَفِي السُّجُودِ كَانَ يَقُولُ: "سُبْحَانَ رَبِّيَ الأَعْلَى" ثَلَاثَ مَرَّاتٍ أَوْ أَكْثَرَ، وَأَحْيَانًا: "سُبُّوحٌ قُدُّوسٌ رَبُّ المَلاَئِكَةِ وَالرُّوحِ". وَقَالَ النَّبِيُّ ﷺ: "أَقْرَبُ مَا يَكُونُ العَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ، فَأَكْثِرُوا الدُّعَاءَ". وَهَذِهِ التَّسْبِيحَاتُ هِيَ نَبْضُ الصَّلاَةِ — تُذِلُّ الجَسَدَ أَمَامَ عَظَمَةِ اللهِ، وَتُطَهِّرُ اللِّسَانَ مِنْ كَلاَمِ الدُّنْيَا، وَتَدْخُلُ بِالمُؤْمِنِ إِلَى حُضُورِ اللهِ الأَلِيفِ. وَفِيهَا تَجْمِيعٌ لِلتَّوَاضُعِ الجِسْمِيِّ وَالذِّكْرِ اللِّسَانِيِّ فِي أَقْرَبِ لَحَظَاتِ العَبْدِ مِنَ الإِلَهِ.
    description_fr: |
      En rukūʿ (inclinaison), le Prophète Muhammad ﷺ glorifiait Allah en disant : « Subḥāna Rabbiya al-ʿAẓīm » (Gloire à mon Seigneur le Magnifique) trois fois ou plus, et ajoutait parfois : « Subḥānaka Allāhumma wa bi-ḥamdika, Allāhumma ighfir lī » (Gloire et louange à Toi, ô Allah ; pardonne-moi). En sujūd (prosternation), il disait : « Subḥāna Rabbiya al-Aʿlā » (Gloire à mon Seigneur le Très-Haut) trois fois ou plus, et parfois : « Subbūḥun quddūsun Rabb al-malāʾikati wa-l-rūḥ » (Parfait et Saint est le Seigneur des anges et de l'Esprit). Le Prophète ﷺ a dit que le serviteur est le plus proche de son Seigneur en prosternation, qu'il doit donc y multiplier les invocations. Ces tasbīḥāt sont le cœur battant de la prière — elles humilient le corps devant la grandeur d'Allah, purifient la langue de la parole mondaine, et entraînent le croyant dans la présence intime du Divin.
    reference: Sahih al-Bukhari 794, Sahih Muslim 484
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 267) records the tasbihat of ruku' and sujud as the heartbeat of the prayer. Ibn al-Qayyim (Zad al-Ma'ad, 1:350) explains that these glorifications humble the body before Allah's greatness and draw the believer into intimate divine presence. The four madhhabs agree on the minimum of one tasbiha per posture, with three or more being sunnah.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 267) consigne les tasbīḥāt du rukūʿ et du sujūd comme le cœur battant de la prière. Ibn al-Qayyim (Zād al-Maʿād, 1:350) explique que ces glorifications humilient le corps devant la grandeur d'Allah et entraînent le croyant dans la présence intime du Divin. Les quatre madhhabs s'accordent sur le minimum d'une tasbīḥa par posture, trois ou plus étant sunna.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٦٧) تسبيحاتِ الركوعِ والسجودِ باعتبارها نبضَ الصلاة. ويُوضِّحُ ابنُ القيم (زاد المعاد، ١/٣٥٠) أنَّ هذه التسبيحاتِ تُذِلُّ الجسدَ أمامَ عظمةِ اللهِ وتَدْخُلُ بالمؤمنِ إلى حضورِ اللهِ الأليف. وتتفقُ المذاهبُ الأربعةُ على أنَّ الأقلَّ تسبيحةً واحدةً في كلِّ هيئةٍ، وثلاثٌ فأكثرُ سنة.
    display_day_of_year: 241
    hadith_refs: "Bukhari 794, Muslim 484"
    source_url: https://sunnah.com/bukhari:794

  - slug: sunnah-dua-tashahhud
    category: sunnah_practice
    title_en: The Tashahhud and Sending Salawat on the Prophet
    title_ar: التَّشَهُّدُ وَالصَّلاَةُ عَلَى النَّبِيِّ
    title_fr: Le tashahhud et l'envoi de la salutation sur le Prophète
    description_en: |
      The Prophet Muhammad ﷺ taught the tashahhud as the central declaration of the prayer: "At-tahiyyatu lillahi wa's-salawatu wa't-tayyibat, as-salamu 'alayka ayyuha'n-nabiyyu wa rahmatullahi wa barakatuhu, as-salamu 'alayna wa 'ala 'ibadillahi's-salihin. Ashhadu an la ilaha illa-Allah, wa ashhadu anna Muhammadan 'abduhu wa rasuluhu" (All greetings, prayers, and good things are for Allah...). After the tashahhud, he would send salawat: "Allahumma salli 'ala Muhammadin wa 'ala ali Muhammad, kama sallayta 'ala Ibrahim wa 'ala ali Ibrahim, innaka Hamidun Majid; Allahumma barik 'ala Muhammadin wa 'ala ali Muhammad, kama barakta 'ala Ibrahim wa 'ala ali Ibrahim, innaka Hamidun Majid" (O Allah, send prayers upon Muhammad...). The Prophet ﷺ said that whoever sends one salawat upon him, Allah sends ten upon that person. These words are the spiritual climax of every prayer, connecting the servant to Allah and to His Messenger.
    description_ar: |
      عَلَّمَ النَّبِيُّ مُحَمَّدٌ ﷺ التَّشَهُّدَ كَإِعْلاَنٍ مَرْكَزِيٍّ فِي الصَّلاَةِ: "التَّحِيَّاتُ للهِ وَالصَّلَوَاتُ وَالطَّيِّبَاتُ، السَّلاَمُ عَلَيْكَ أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللهِ وَبَرَكَاتُهُ، السَّلاَمُ عَلَيْنَا وَعَلَى عِبَادِ اللهِ الصَّالِحِينَ. أَشْهَدُ أَنْ لاَ إِلَهَ إِلاَّ اللهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ". وَبَعْدَ التَّشَهُّدِ كَانَ يُصَلِّي عَلَى نَفْسِهِ: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ، كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِيدٌ مَجِيدٌ؛ اللَّهُمَّ بَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ، كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِيدٌ مَجِيدٌ". وَقَالَ النَّبِيُّ ﷺ: "مَنْ صَلَّى عَلَيَّ صَلاَةً صَلَّى اللهُ عَلَيْهِ بِهَا عَشْرًا". وَهَذِهِ الكَلِمَاتُ هِيَ ذُرْوَةٌ رُوحِيَّةٌ فِي كُلِّ صَلاَةٍ، تَرْبِطُ العَبْدَ بِاللهِ وَبِرَسُولِهِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné le tashahhud comme déclaration centrale de la prière : « At-taḥiyyātu lillāhi wa-ṣ-ṣalawātu wa-ṭ-ṭayyibāt, as-salāmu ʿalayka ayyuhā-n-nabiyyu wa raḥmatullāhi wa barakātuhu, as-salāmu ʿalaynā wa ʿalā ʿibādillāhi-ṣ-ṣāliḥīn. Ashhadu an lā ilāha illā-Allāh, wa ashhadu anna Muḥammadan ʿabduhu wa rasūluh » (Toutes les formes de salut, les prières et les bonnes choses sont pour Allah...). Après le tashahhud, il envoyait la salawāt : « Allāhumma ṣalli ʿalā Muḥammadin wa ʿalā āli Muḥammad, kamā ṣallayta ʿalā Ibrāhīma wa ʿalā āli Ibrāhīm, innaka Ḥamīdun Majīd ; Allāhumma bārik ʿalā Muḥammadin wa ʿalā āli Muḥammad, kamā bārakta ʿalā Ibrāhīma wa ʿalā āli Ibrāhīm, innaka Ḥamīdun Majīd » (Ô Allah, envoie Ta prière sur Muḥammad...). Le Prophète ﷺ a dit que quiconque lui envoie une salawāt, Allah lui en envoie dix. Ces paroles sont l'apogée spirituelle de chaque prière, reliant le serviteur à Allah et à Son Messager.
    reference: Sahih al-Bukhari 6264, Sahih Muslim 402, Sahih Muslim 406
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 262) records the Tashahhud as the spiritual climax of every prayer, connecting the servant to Allah and His Messenger. Ibn al-Qayyim (Zad al-Ma'ad, 1:325) explains that the tashahhud and salawat encapsulate the pillars of tawhid, salutation, and Prophetic love. The four madhhabs agree on the obligation of the tashahhud and the strong recommendation of the Ibrahimic salawat in the final sitting.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 262) consigne le Tashahhud comme l'apogée spirituelle de chaque prière, reliant le serviteur à Allah et à Son Messager. Ibn al-Qayyim (Zād al-Maʿād, 1:325) explique que le tashahhud et la salawāt encapsulent les piliers du tawḥīd, de la salutation et de l'amour prophétique. Les quatre madhhabs s'accordent sur l'obligation du tashahhud et la forte recommandation de la salawāt ibrāhīmiyya dans la dernière sitting.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ (الأذكار، ص. ٢٦٢) التشهدَ باعتباره ذروةَ الصلاةِ الروحيةَ التي تَرْبِطُ العبدَ باللهِ وبرسولِه. ويُفسِّرُ ابنُ القيم (زاد المعاد، ١/٣٢٥) أنَّ التشهدَ والصلاةَ الإبراهيميةَ تُجَمِّعان أركانَ التوحيدِ والتحيةِ والمحبةِ النبوية. وتتفقُ المذاهبُ الأربعةُ على وجوبِ التشهدِ والتأكيدِ الشديدِ لاستحبابِ الصلاةِ الإبراهيميةِ في الجلوسِ الأخير.
    display_day_of_year: 242
    hadith_refs: "Bukhari 6264, Muslim 402, Muslim 406"
    source_url: https://sunnah.com/bukhari:6264
