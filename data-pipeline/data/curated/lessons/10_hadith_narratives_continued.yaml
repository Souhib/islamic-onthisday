# Additional hadith narratives (continued). Each entry cites the primary
# collection and reference number where available. All hadiths are sahih
# or graded hasan by Darussalam / al-Albānī / Arnāʾūṭ as noted.

lessons:
  - slug: hadith-hellfire-wrapped-in-desires
    category: hadith_narrative
    title_en: Hellfire Wrapped in Desires and Paradise Wrapped in Hardships
    title_ar: جهنم محاطة بالشهوات والجنة محاطة بالمكاره
    title_fr: L'Enfer est enveloppé de désirs et le Paradis est enveloppé d'épreuves
    description_en: |
      The Prophet ﷺ said: "Hellfire is surrounded by all kinds of desires
      and passions, while Paradise is surrounded by all kinds of disliked,
      undesirable things." The hadith inverts human instinct: what the soul
      naturally rushes toward — wealth, fame, illicit pleasure — is the
      perimeter of the Fire, while what it naturally flees — hardship,
      discipline, patience, and self-denial — is the perimeter of Paradise.
      Ibn al-Qayyim observed in al-Jawab al-Kafi that the path to salvation
      is therefore counter-intuitive to the lower self (nafs): it requires
      choosing the difficult over the easy, the bitter over the sweet, in
      the short term, for the sake of eternal outcomes. The narrative is a
      diagnostic tool for the believer: whenever a choice feels difficult
      but virtuous, it is a gate of Paradise; whenever it feels easy but
      sinful, it is a gate of Hellfire. In an age of instant gratification,
      this hadith is a radical call to retrain desire so that the soul
      learns to crave what benefits it and shun what destroys it.
    description_ar: |
      قال النبي ﷺ: «حُجِبَتِ النَّارُ بِالشَّهَوَاتِ، وَحُجِبَتِ الجَنَّةُ بِالمَكَارِهِ».
      يُقلِبُ هذا الحديثُ الفطرةَ البشريةَ رأسًا على عقب: فما تندفعُ إليه النفسُ
      طبيعةً — المالُ، الشهرةُ، اللذةُ المحرَّمة — هو حافةُ النار، وما تفرُّ منه
      طبيعةً — المشقةُ، الانضباطُ، الصبرُ، تركِ الشهوات — هو حافةُ الجنة.
      لاحظ ابنُ القيِّم في «الجواب الكافي» أن طريقَ النجاةِ يخالفُ إذنَ النفسَ
      الأمَّارةَ بالسوء: إنه يقتضي اختيارَ الشاقِّ على السهل، والمرِّ على الحلو،
      في الأجلِ القصير، مقابلَ مصيرٍ خالد. والحديثُ أداةُ تشخيصٍ للمؤمن: كلما
      كان الاختيارُ صعبًا ولكن فاضلًا، فهو بابُ جنة، وكلما كان سهلًا ولكن
      مأثومًا، فهو بابُ نار. وفي عصرِ الإشباعِ الفوري، يُعدُّ هذا الحديثُ دعوةً
      ثوريةً إلى إعادةِ تدريبِ الشهوةِ حتى تتعلَّمَ النفسُ أن تشتاقَ لما ينفعُها
      وأن تتجنبَ ما يهلكُها.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « L'Enfer est entouré de toutes sortes
      de désirs et de passions, tandis que le Paradis est entouré de choses
      désagréables et indésirables. » Ce hadith inverse l'instinct humain :
      ce vers quoi l'âme se précipite naturellement — la richesse, la gloire,
      le plaisir illicite — constitue le périmètre de l'Enfer, tandis que
      ce qu'elle fuit naturellement — l'épreuve, la discipline, la patience
      et le renoncement — constitue le périmètre du Paradis. Ibn al-Qayyim
      remarqua dans al-Jawab al-Kafi que le chemin du salut est donc
      contre-intuitif pour le bas-self (nafs) : il exige de choisir le
      difficile plutôt que le facile, l'amer plutôt que le doux, à court
      terme, en vue d'une destinée éternelle. Ce récit est un instrument
      de diagnostic pour le croyant : chaque fois qu'un choix semble
      difficile mais vertueux, c'est une porte du Paradis ; chaque fois
      qu'il semble facile mais pécheur, c'est une porte de l'Enfer. À une
      époque de gratification instantanée, ce hadith est un appel radical
      à rééduquer le désir pour que l'âme apprenne à aspirer à ce qui lui
      est bénéfique et à fuir ce qui la détruit.
    reference: Sahih al-Bukhari 6487, Sahih Muslim 2822
    hadith_refs: "Bukhari 6487, Muslim 2822"
    source_notes: |
      Ibn al-Qayyim (al-Jawāb al-Kāfī) observed that the path to salvation is counter-intuitive to the lower self: it requires choosing the difficult over the easy in the short term for eternal outcomes. Ibn Ḥajar adds that the hadith uses spatial imagery — surrounding — to indicate that the path to each destination is continuous: one is always either approaching Paradise or approaching Hellfire through one's choices. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn al-Qayyim (al-Jawāb al-Kāfī) observa que le chemin du salut est contre-intuitif pour le bas-self : il exige de choisir le difficile plutôt que le facile à court terme en vue d'une destinée éternelle. Ibn Ḥajar ajoute que le hadith utilise une image spatiale — l'entourage — pour indiquer que le chemin vers chaque destination est continu. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ الْقَيِّمِ فِي «الْجَوَابِ الْكَافِي» أَنَّ طَرِيقَ النَّجَاةِ يُخَالِفُ طَبْعَ النَّفْسِ: يَقْتَضِي اخْتِيَارَ الشَّاقِّ فِي الْأَجَلِ الْقَصِيرِ لِأَجْلِ مَصِيرٍ خَالِدٍ. وَيُضِيفُ ابْنُ حَجَرٍ أَنَّ الْحَدِيثَ يَسْتَعِيرُ صُورَةَ الْإِحَاطَةِ لِيُوَضِّحَ أَنَّ الطَّرِيقَ إِلَى كُلِّ غَايَةٍ مُسْتَمِرٌّ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 154
    source_url: https://sunnah.com/bukhari:6487

  - slug: hadith-istighfar-and-rain
    category: hadith_narrative
    title_en: Seeking Forgiveness Brings the Rain — The Connection Between Sin and Drought
    title_ar: الاستغفار يأتي بالمطر — الرابط بين الذنب والجفاف
    title_fr: La demande de pardon fait tomber la pluie — le lien entre le péché et la sécheresse
    description_en: |
      The Prophet ﷺ taught that the natural world is not morally neutral:
      rain, fertility, and sustenance are tied to the spiritual condition of
      a community. When a people persist in sin and refuse to seek
      forgiveness, divine mercy can be withheld — not as arbitrary
      punishment, but as the natural consequence of turning away from the
      Source of all mercy. Conversely, when a community turns to Allah in
      sincere istighfar, the heavens open with blessings. Ibn Rajab, in his
      commentary on the hadiths of divine punishment, noted that drought
      and famine in the prophetic tradition are often spiritual symptoms
      before they are meteorological events. The lesson is both communal and
      personal: the individual who regularises istighfar finds his own life
      irrigated with unexpected openings, while the community that
      collectively repents finds its barren lands — literal and figurative —
      green again. This hadith reconnects ecology with ethics, teaching that
      the health of the earth and the purity of the heart are not separate
      domains but two faces of a single covenant.
    description_ar: |
      علَّم النبي ﷺ أن العالم الطبيعي ليس محايدًا أخلاقيًّا: فالمطرُ والخصبُ
      والرزقُ مرتبطان بالحالة الروحية للأمة. وإذا أصرتْ أمةٌ على الذنبِ وامتنعتْ
      عن الاستغفار، قد يُحجب عنها الرحمةُ — لا انتقامًا اعتباطيًّا، بل كنتيجةٍ
      طبيعيةٍ للإعراض عن مصدر كل رحمة. وبالعكس، إذا تابتْ الأمةُ إلى الله
      باستغفارٍ صادقٍ، انفتحتْ السماواتُ بالبركات. لاحظ ابنُ رجبٍ الحنبلي في
      تعليقه على أحاديث العقوبة الإلهية أن الجفافَ والمجاعةَ في السُّنة غالبًا ما
      يكونان أعراضًا روحيةً قبل أن يكونا ظواهر مناخية. والدرسُ فرديٌّ وجماعيٌّ
      معًا: من يُكثِر الاستغفارَ تجدُ حياته مرويةً بفتحاتٍ غير متوقعة، والأمةُ
      التي تتوبُ جمعاء تجدُ أرضَها اليبابَ — حقيقيةً ومجازيةً — تخضرُ من جديد.
      ويُعيدُ هذا الحديثُ ربطَ البيئةِ بالأخلاق، مُعلِّمًا أنَّ صحةَ الأرضِ ونقاءَ
      القلبِ ليسا مجالين منفصلين بل وجهين لعهدٍ واحد.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné que le monde naturel n'est pas
      moralement neutre : la pluie, la fertilité et les subsistances sont
      liées à l'état spirituel d'une communauté. Lorsqu'un peuple persiste
      dans le péché et refuse de demander pardon, la miséricorde divine peut
      être retenue — non comme un châtiment arbitraire, mais comme la
      conséquence naturelle du détournement de la Source de toute miséricorde.
      Inversement, lorsqu'une communauté se tourne vers Allah dans un
      istighfar sincère, les cieux s'ouvrent de bénédictions. Ibn Rajab,
      dans son commentaire sur les hadiths du châtiment divin, nota que la
      sécheresse et la famine dans la tradition prophétique sont souvent des
      symptômes spirituels avant d'être des événements météorologiques. La
      leçon est à la fois collective et personnelle : l'individu qui
      régularise l'istighfar voit sa propre vie irriguée d'ouvertures
      inattendues, tandis que la communauté qui se repent collectivement voit
      ses terres stériles — littérales et figurées — reverdir. Ce hadith
      reconnecte l'écologie avec l'éthique, enseignant que la santé de la
      terre et la pureté du cœur ne sont pas des domaines séparés mais deux
      faces d'un seul et même pacte.
    reference: Sahih Muslim 2740, Sunan Abi Dawud 1171
    hadith_refs: "Muslim 2740, Abu Dawud 1171"
    source_notes: |
      Ibn Rajab, in his commentary on the hadiths of divine punishment, noted that drought and famine in the prophetic tradition are often spiritual symptoms before they are meteorological events. Al-Nawawī adds that the connection between sin and the withholding of rain establishes a communal responsibility: the spiritual condition of the ummah affects its material provision. The hadith is narrated in Ṣaḥīḥ Muslim.
    source_notes_fr: |
      Ibn Rajab, dans son commentaire sur les hadiths du châtiment divin, nota que la sécheresse et la famine dans la tradition prophétique sont souvent des symptômes spirituels avant d'être des événements météorologiques. Al-Nawawī ajoute que le lien entre le péché et le retrait de la pluie établit une responsabilité communautaire : l'état spirituel de la oumma affecte sa provision matérielle. Le hadith est narraté dans Ṣaḥīḥ Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ رَجَبٍ فِي شَرْحِ أَحَادِيثِ الْعِقَابِ أَنَّ الْجُفُوفَ وَالْمَجَاعَةَ فِي السُّنَّةِ أَعْرَاضٌ رُوحِيَّةٌ قَبْلَ أَنْ تَكُونَ ظَوَاهِرَ مَنَاخِيَّةً. وَيُضِيفُ النَّوَوِيُّ أَنَّ الرَّابِطَ بَيْنَ الذَّنْبِ وَحَجْبِ الْمَطَرِ يُقِيمُ مَسْؤُولِيَّةً جَمَاعِيَّةً: حَالُ الْأُمَّةِ الرُّوحِيَّةُ يُؤَثِّرُ فِي رِزْقِهَا. رُوِيَ فِي صَحِيحِ مُسْلِمٍ.
    display_day_of_year: 155

  - slug: hadith-five-before-five
    category: hadith_narrative
    title_en: Five Before Five — Seizing Life Before Death
    title_ar: خمسٌ قبل خمسٍ — اغتنام الحياة قبل الموت
    title_fr: Cinq avant cinq — Saisir la vie avant la mort
    description_en: |
      The Prophet ﷺ said: "Take advantage of five before five: your youth
      before your old age, your health before your sickness, your wealth
      before your poverty, your free time before your preoccupation, and your
      life before your death." The hadith is a structured inventory of human
      capital — each item is a resource that depreciates irreversibly. Ibn
      Rajab, in Jami' al-Ulum wa al-Hikam, explained that the Prophet ﷺ did
      not merely advise haste; he defined the exact commodities of the soul
      that can be invested for eternity. Youth is capital for worship and
      struggle; health is capital for good deeds; wealth is capital for
      charity and Hajj; free time is capital for learning and dhikr; and life
      itself is the container for all other capital. The narrative forces the
      listener to audit his accounts: what remains of these five, and how
      much has been spent on what yields no return?
    description_ar: |
      قال النبي ﷺ: «اغتنم خمسًا قبل خمسٍ: شبابَك قبل هرمِك، وصحتَك قبل سقمِك،
      وغناك قبل فقرِك، وفراغَك قبل شغلِك، وحياتَك قبل موتِك». هذا الحديثُ جردةُ
      حسابٍ منظمةٌ لرأس المال البشري: كلُّ بندٍ منها موردٌ يهبطُ قيمتُه بلا عودة.
      فسَّر ابنُ رجبٍ في «جامع العلوم والحكم» أن النبي ﷺ لم يُنصحْ بالعجلةِ
      فحسب، بل حدَّدَ السِّلعَ الدقيقةَ للنفسِ التي يمكن أن تُستثمَرَ للأبد.
      الشبابُ رأسُ مالٍ للعبادةِ والجهاد، والصحةُ رأسُ مالٍ للأعمال الصالحة،
      والغنى رأسُ مالٍ للصدقةِ والحج، والفراغُ رأسُ مالٍ للعلمِ والذكر، والحياةُ
      ذاتُها وعاءُ كلِّ رؤوس الأموال الأخرى. والحديثُ يُجبرُ السامعَ على مراجعةِ
      حساباتِه: كم بقي من هذه الخمسة، وكم أُنفِقَ فيما لا يُدرِّ عائدًا؟
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Saisis cinq choses avant cinq autres :
      ta jeunesse avant ta vieillesse, ta santé avant ta maladie, ta
      richesse avant ta pauvreté, ton temps libre avant ton occupation, et
      ta vie avant ta mort. » Ce hadith est un inventaire structuré du
      capital humain : chaque élément est une ressource qui se déprécie
      irréversiblement. Ibn Rajab, dans Jami' al-Ulum wa al-Hikam, expliqua
      que le Prophète ﷺ ne conseilla pas seulement la hâte ; il définissait
      les marchandises exactes de l'âme qui peuvent être investies pour
      l'éternité. La jeunesse est un capital pour l'adoration et le jihad ;
      la santé est un capital pour les bonnes œuvres ; la richesse est un
      capital pour la charité et le Hajj ; le temps libre est un capital
      pour l'apprentissage et le dhikr ; et la vie elle-même est le récipient
      de tous les autres capitaux. Ce récit force l'auditeur à auditer ses
      comptes : que reste-t-il de ces cinq, et combien a été dépensé en ce
      qui ne rapporte aucun dividende ?
    reference: Hakim 4185, sahih; al-Albani, Sahih al-Targhib 1076
    hadith_refs: "Hakim 4185, Sahih al-Targhib 1076"
    source_notes: |
      Ibn Rajab (Jāmiʿ al-ʿUlūm) explained that the Prophet ﷺ did not merely advise haste; he defined the exact commodities of the soul that can be invested for eternity. Ibn Ḥajar adds that the list is ordered by typical sequence of loss: youth ages first, then health fails, then wealth diminishes, then time fills, then life ends. The hadith is graded ṣaḥīḥ by al-Albānī and is a standard text in works on time-management.
    source_notes_fr: |
      Ibn Rajab (Jāmiʿ al-ʿUlūm) expliqua que le Prophète ﷺ ne conseilla pas seulement la hâte ; il définissait les marchandises exactes de l'âme qui peuvent être investies pour l'éternité. Ibn Ḥajar ajoute que la liste est ordonnée selon la séquence typique de la perte : la jeunesse vieillit d'abord, puis la santé décline, puis les richesses diminuent, puis le temps se remplit, puis la vie s'achève. Le hadith est gradé ṣaḥīḥ par al-Albānī.
    source_notes_ar: |
      فَسَّرَ ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ» أَنَّ النَّبِيَّ ﷺ لَمْ يُنَصِّحْ بِالْعَجَلَةِ فَحَسْبُ، بَلْ حَدَّدَ سِلَعَ النَّفْسِ الَّتِي تُسْتَثْمَرُ لِلْأَبَدِ. وَيُضِيفُ ابْنُ حَجَرٍ أَنَّ الْقَائِمَةَ مُرَتَّبَةٌ بِحَسَبِ تَعَاقُبِ الْخُسْرَانِ: الشَّبَابُ يَشِيبُ، ثُمَّ الصِّحَّةُ تَضْعُفُ، ثُمَّ الْمَالُ يَنْفَدُ، ثُمَّ الْوَقْتُ يَمْتَلِئُ، ثُمَّ الْحَيَاةُ تَنْقَضِي. حَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالصَّحَاحِ.
    display_day_of_year: 156

  - slug: hadith-trials-of-the-grave
    category: hadith_narrative
    title_en: The Trials of the Grave — Munkar and Nakir
    title_ar: فتنة القبر — منكر ونكير
    title_fr: Les épreuves de la tombe — Munkar et Nakir
    description_en: |
      The Prophet ﷺ described what happens to every soul after burial: two
      angels, Munkar and Nakir, come with terrifying appearance and ask three
      questions — "Who is your Lord? What is your religion? What do you say
      about this man who was sent among you?" For the believer, the grave
      becomes spacious and illuminated; for the disbeliever or hypocrite, it
      narrows and darkness closes in. Al-Nawawi, in his commentary on Sahih
      Muslim, emphasised that the answers are not a test of memory but of
      the heart's preparation: a life lived in submission to Allah, in the
      practice of Islam, and in love for the Messenger ﷺ, produces answers
      that flow naturally. Ibn Hajar added that the trial of the grave is
      the first station of the Hereafter, and its outcome sets the pattern
      for everything that follows — making the preparation for it the most
      urgent task of this life.
    description_ar: |
      وصف النبي ﷺ ما يحدثُ لكلِّ نفسٍ بعد الدفن: يأتي مَلَكان، منكرٌ ونكير، على
      هيئةٍ مُرعبةٍ ويسألان ثلاثَ أسئلة: «من ربُّك؟ وما دينُك؟ وما تقولُ في
      هذا الرجلِ الذي بُعث فيكم؟» فالمؤمنُ تتَّسعُ قبرُه ويُنَوَّرُ، وكافرُ أو
      منافقُ تضيقُ عليه ويغشاه الظلامُ. أكَّد النوويُّ في شرحه لصحيح مسلم أن
      الإجاباتَ ليست امتحانَ حفظٍ بل استعدادَ قلبٍ: فحياةُ الانقيادِ لله،
      وممارسةُ الإسلام، وحبُّ الرسول ﷺ، تُنتجُ إجاباتٍ تَفِيضُ طبيعةً.
      وأضاف ابنُ حجرٍ أن فتنةَ القبرِ هي أولُ منازل الآخرة، ونتيجتُها تضع
      النمطَ لكلِّ ما يلي — مما يجعلُ التأهُّبَ لها أعجلَ واجباتِ الحياة
      الدنيا.
    description_fr: |
      Le Prophète Muhammad ﷺ décrivit ce qui arrive à chaque âme après
      l'inhumation : deux anges, Munkar et Nakir, viennent avec une
      apparence terrifiante et posent trois questions — « Qui est ton
      Seigneur ? Quelle est ta religion ? Que dis-tu de cet homme qui a été
      envoyé parmi vous ? » Pour le croyant, la tombe devient spacieuse et
      illuminée ; pour le mécréant ou l'hypocrite, elle se rétrécit et les
      ténèbres s'y abattent. Al-Nawawi, dans son commentaire sur Sahih
      Muslim, souligna que les réponses ne sont pas un test de mémoire mais
      une mesure de la préparation du cœur : une vie vécue dans la
      soumission à Allah, dans la pratique de l'Islam et dans l'amour du
      Messager ﷺ, produit des réponses qui coulent de source. Ibn Hajar
      ajouta que l'épreuve de la tombe est la première station de
      l'au-delà, et son issue détermine le cours de tout ce qui suit — ce
      qui fait de la préparation à cette épreuve la tâche la plus urgente
      de cette vie.
    reference: Jami' at-Tirmidhi 1071 (sahih), Sunan Abi Dawud 4753 (sahih)
    hadith_refs: "Tirmidhi 1071, Abu Dawud 4753"
    source_notes: |
      Al-Nawawī (Sharḥ Muslim) emphasised that the answers are not a test of memory but of the heart's preparation. Ibn Ḥajar added that the trial of the grave is the first station of the Hereafter, and its outcome sets the pattern for everything that follows. The hadith is narrated in Jāmiʿ al-Tirmidhī and Sunan Abī Dāwūd, graded ṣaḥīḥ by al-Albānī.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Muslim) souligna que les réponses ne sont pas un test de mémoire mais une mesure de la préparation du cœur. Ibn Ḥajar ajouta que l'épreuve de la tombe est la première station de l'au-delà, et son issue détermine le cours de tout ce qui suit. Le hadith est narraté dans Jāmiʿ al-Tirmidhī et Sunan Abī Dāwūd, gradé ṣaḥīḥ par al-Albānī.
    source_notes_ar: |
      أَكَّدَ النَّوَوِيُّ فِي «شَرْحِ صَحِيحِ مُسْلِمٍ» أَنَّ الْإِجَابَاتِ لَيْسَتْ امْتِحَانَ حِفْظٍ بَلْ اسْتِعْدَادَ قَلْبٍ. وَأَضَافَ ابْنُ حَجَرٍ أَنَّ فِتْنَةَ الْقَبْرِ هِيَ أَوَّلُ مَنَازِلِ الْآخِرَةِ. رُوِيَ فِي جَامِعِ التِّرْمِذِيِّ وَسُنَنِ أَبِي دَاوُدَ، وَحَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالصَّحَاحِ.
    display_day_of_year: 158
    source_url: https://sunnah.com/abudawud:4753

  - slug: hadith-shafa-a-of-the-prophet
    category: hadith_narrative
    title_en: The Shafa'a of the Prophet — The Greatest Station on the Day of Judgment
    title_ar: شفاعة النبي — المقام المحمود يوم القيامة
    title_fr: La shafa'a du Prophète — la plus grande station au Jour du Jugement
    description_en: |
      On the Day of Judgment, when humanity will stand in unbearable terror
      waiting for reckoning to begin, they will rush from prophet to prophet
      seeking intercession. Each will decline, citing his own need, until
      they reach Muhammad ﷺ. He will accept the station of praise (maqam
      mahmud) promised in the Qur'an, prostrate beneath the Throne, and seek
      permission to intercede for all of creation. His intercession will
      have multiple stages: first to begin the reckoning, then to save
      sinners from Hellfire, and finally to admit believers into Paradise.
      Ibn Hajar, in Fath al-Bari, noted that the Prophet's unique status as
      the Seal of Prophethood and the Beloved of Allah makes his
      intercession comprehensive. The narrative teaches that the highest
      honor in the Hereafter belongs to the one who is most useful to others
      — and that loving and following the Prophet ﷺ in this life is the
      currency that purchases his advocacy in the next.
    description_ar: |
      يوم القيامة، حين تقفُ البشريةُ في رُعبٍ لا يُطاقِ انتظارًا لبدء الحساب،
      تُسرِعُ من نبيٍّ إلى نبيٍّ تطلبُ الشفاعةَ. فيعتذرُ كلٌّ منهم باحتياجِه،
      حتى تصلَ إلى محمدٍ ﷺ. فيقبلُ مقامَ المحمودِ الموعودَ في القرآن، ويسجدُ
      تحتَ العرش، ويستأذنُ في الشفاعةِ لجميع الخلق. وشفاعته ﷺ مراحلُ متعددة:
      أولُها في إطلاق الحساب، ثم في إنقاذِ المذنبين من النار، وأخيرًا في
      إدخالِ المؤمنين الجنة. لاحظ ابنُ حجرٍ في «فتح الباري» أن مقامَ النبي ﷺ
      الفريدَ خاتمَ الأنبياء وحبيبَ الله يجعلُ شفاعتَه شاملةً. والحديثُ يُعلِّم
      أن أرفعَ الشرفِ في الآخرةِ لمن كانَ أنفعَ للناس، وأنَّ محبَّةَ النبي ﷺ
      واتباعَه في الدنيا هي العملةُ التي تشتري شفاعتَه في الآخرة.
    description_fr: |
      Au Jour du Jugement, alors que l'humanité se tiendra dans une terreur
      insoutenable en attendant le début du jugement, elle courra de
      prophète en prophète cherchant l'intercession. Chacun déclinera, citant
      son propre besoin, jusqu'à ce qu'elle parvienne à Muhammad ﷺ. Il
      acceptera le station de louange (maqam mahmud) promise dans le Coran,
      se prosternera sous le Trône, et demandera la permission d'intercéder
      pour toute la création. Son intercession comportera plusieurs étapes :
      d'abord pour commencer le jugement, ensuite pour sauver les pécheurs
      de l'Enfer, et enfin pour faire entrer les croyants au Paradis. Ibn
      Hajar, dans Fath al-Bari, nota que le statut unique du Prophète ﷺ en
      tant que Sceau des Prophètes et Bien-aimé d'Allah rend son
      intercession compréhensive. Ce récit enseigne que le plus haut
      honneur dans l'au-delà appartient à celui qui est le plus utile aux
      autres — et qu'aimer et suivre le Prophète ﷺ dans cette vie est la
      monnaie qui achète son plaidoyer dans l'autre.
    reference: Sahih al-Bukhari 4712, Sahih Muslim 193
    hadith_refs: "Bukhari 4712, Muslim 193"
    quran_refs: "17:79"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) noted that the Prophet's ﷺ unique status as the Seal of Prophethood and the Beloved of Allah makes his intercession comprehensive. Al-Nawawī adds that the three stages of intercession — beginning reckoning, saving sinners, admitting believers — cover every need of humanity on the Day of Judgment. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) nota que le statut unique du Prophète ﷺ en tant que Sceau des Prophètes et Bien-aimé d'Allah rend son intercession comprehensive. Al-Nawawī ajoute que les trois étapes de l'intercession — commencer le jugement, sauver les pécheurs, faire entrer les croyants — couvrent chaque besoin de l'humanité au Jour du Jugement. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ مَقَامَ النَّبِيِّ ﷺ خَاتَمَ الْأَنْبِيَاءِ وَحَبِيبَ اللهِ يَجْعَلُ شَفَاعَتَهُ شَامِلَةً. وَيُضِيفُ النَّوَوِيُّ أَنَّ مَرَاحِلَ الشَّفَاعَةِ الثَّلَاثَ تُغَطِّي كُلَّ حَاجَةٍ لِلْبَشَرِ يَوْمَ الْقِيَامَةِ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 159
    source_url: https://sunnah.com/bukhari:4712

  - slug: hadith-intercession-of-believers
    category: hadith_narrative
    title_en: The Intercession of Believers — When the Righteous Plead for Others
    title_ar: شفاعة المؤمنين — حين يتوسَّط الصالحون لغيرهم
    title_fr: L'intercession des croyants — quand les pieux plaident pour les autres
    description_en: |
      After the prophets have interceded, Allah will permit righteous
      believers to plead for their family members, their neighbours, and
      even strangers whose good deeds they witnessed. Some will enter
      Paradise by the intercession of their children; others by the
      advocacy of a friend who remembered them in supplication. Ibn Hajar,
      in his commentary on the hadith of intercession in Sahih al-Bukhari,
      explained that this is not a violation of divine justice but its
      fulfilment: the bonds of faith and love forged in this life are
      recognised and rewarded in the next. The narrative transforms the
      concept of individual salvation into a communal ecology — every good
      deed done for another becomes a seed that may grow into a tree of
      shade on the Day of Judgment. It also instils humility: today's
      small kindness may tomorrow become the argument that delivers a soul
      from Hellfire.
    description_ar: |
      بعد أن تشفعَ الأنبياءُ، يأذنُ اللهُ للمؤمنين الصالحين بالتوسُّط لأقاربهم
      وجيرانهم وحتى لغرباءَ شهدوا لهم بعملٍ صالحٍ. فيدخلُ بعضُهم الجنةَ بشفاعةِ
      أبنائهم، وآخرون بدعوةِ صديقٍ ذكرَهم فيها. فسَّر ابنُ حجرٍ في تعليقه على
      حديث الشفاعة في صحيح البخاري أن هذا ليس انتهاكًا للعدالة الإلهية بل
      تحقيقًا لها: فصِلاتُ الإيمانِ والمحبةِ التي تُشكَّلُ في الدنيا تُعترفُ بها
      وتُجازَى في الآخرة. ويُحوِّل الحديثُ مفهومَ الخلاصِ الفردي إلى بيئةٍ
      جماعية: كلُّ عملٍ صالحٍ يُؤدَّى لغيرِه يصيرُ بذرةً قد تنمو إلى شجرةٍ
      ظليلةٍ يوم القيامة. ويُغرسُ التواضعَ أيضًا: فلعلَّ لطافةً صغيرةً اليومَ
      تصيرُ غدًا حُجَّةً تُنجي نفسًا من النار.
    description_fr: |
      Après que les prophètes auront intercédé, Allah permettra aux
      croyants pieux de plaider pour leurs proches, leurs voisins, et même
      pour des étrangers dont ils ont témoigné les bonnes œuvres. Certains
      entreront au Paradis par l'intercession de leurs enfants ; d'autres
      par l'advocature d'un ami qui les a mentionnés dans sa supplication.
      Ibn Hajar, dans son commentaire sur le hadith de l'intercession dans
      Sahih al-Bukhari, expliqua que cela ne viole pas la justice divine
      mais la réalise : les liens de foi et d'amour forgés dans cette vie
      sont reconnus et récompensés dans l'autre. Ce récit transforme le
      concept de salut individuel en une écologie communautaire — chaque
      bonne action faite pour autrui devient une graine qui peut grandir en
      un arbre d'ombre au Jour du Jugement. Il inculque aussi l'humilité :
      la petite gentillesse d'aujourd'hui peut demain devenir l'argument
      qui sauve une âme de l'Enfer.
    reference: Sahih al-Bukhari 7474, Sahih Muslim 263
    hadith_refs: "Bukhari 7474, Muslim 263"
    source_notes: |
      Ibn Ḥajar explained that this is not a violation of divine justice but its fulfilment: the bonds of faith forged in this life are recognised in the next. Al-Nawawī adds that the hadith elevates everyday kindness to eschatological significance — a small good deed may become the argument that delivers a soul from Hellfire. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn Ḥajar expliqua que cela ne viole pas la justice divine mais la réalise : les liens de foi forgés dans cette vie sont reconnus et récompensés dans l'autre. Al-Nawawī ajoute que ce hadith élève la bonté quotidienne à une signification eschatologique. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      فَسَّرَ ابْنُ حَجَرٍ أَنَّ هَذَا لَيْسَ انْتِهَاكًا لِلْعَدَالَةِ بَلْ تَحْقِيقًا لَهَا: صِلَاتُ الْإِيمَانِ فِي الدُّنْيَا تُعْتَرَفُ فِي الْآخِرَةِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الْحَدِيثَ يَرْفَعُ الْمَعْرُوفَ الْيَوْمِيَّ إِلَى دَلَالَةٍ أُخْرَوِيَّةٍ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 161
    source_url: https://sunnah.com/bukhari:7474

  - slug: hadith-hawd-of-the-prophet
    category: hadith_narrative
    title_en: The Hawd (Basin) of the Prophet — A River Wider Than the Distance of a Month's Journey
    title_ar: حوض النبي — نهرٌ أطولُ من مسيرة شهر
    title_fr: Le Hawd (bassin) du Prophète — une rivière plus large qu'un mois de voyage
    description_en: |
      The Prophet ﷺ described his Hawd on the Day of Resurrection as a
      vast basin whose length is a month's journey, whose water is whiter
      than milk, sweeter than honey, and more fragrant than musk. Its
      vessels are as numerous as the stars, and whoever drinks from it will
      never thirst again. Some of his followers, however, will be driven
      away from it like stray camels — those who introduced innovations
      after him or turned against his sunnah. Ibn Hajar, in Fath al-Bari,
      noted that the Hawd is both a literal mercy and a symbolic boundary:
      it separates those who remained loyal to the Messenger's way from
      those who abandoned it. The narrative thus carries both consolation
      and warning — the promise of refreshment for the faithful, and the
      peril of exclusion for those who treated the prophetic legacy with
      contempt.
    description_ar: |
      وصف النبي ﷺ حوضَه يوم القيامة بأنه غَمْرٌ طويلُ المدى كمسيرة شهر، ماؤه
      أبيضُ من اللبن، وأحلى من العسل، وأطيبُ ريحًا من المسك. آنيتُه عددُ نجوم
      السماء، ومن شربَ منه لم يظمأْ بعدها أبدًا. غيرَ أنَّ بعضَ أتباعِه سيُطردُ
      عنه كالضَّالَّةِ من الإبل — أولئك الذين أحدثوا في الدينِ بعدَه أو
      تآمروا على سُنَّتِه. لاحظ ابنُ حجرٍ في «فتح الباري» أن الحوضَ رحمةٌ
      حسيةٌ وحدٌّ رمزيٌّ في آنٍ واحد: يفصلُ بين الملتزمين بطريقةِ الرسولِ
      والمتخلين عنها. والحديثُ إذن يحملُ التبشيرَ والتحذيرَ معًا — وعدَ
      الريّ للمخلصين، وخطرَ الإبعادِ لمن استخفَّ بالإرثِ النبوي.
    description_fr: |
      Le Prophète Muhammad ﷺ décrivit son Hawd au Jour de la Résurrection
      comme un vaste bassin dont la longueur équivaut à un mois de voyage,
      dont l'eau est plus blanche que le lait, plus douce que le miel, et
      plus parfumée que le musc. Ses récipients sont aussi nombreux que les
      étoiles, et quiconque en boira n'aura plus jamais soif. Certains de
      ses partisans, cependant, en seront chassés comme des chameaux
      égarés — ceux qui introduisirent des innovations après lui ou se
      retournèrent contre sa sunna. Ibn Hajar, dans Fath al-Bari, nota que
      le Hawd est à la fois une miséricorde littérale et une frontière
      symbolique : il sépare ceux qui sont restés fidèles à la voie du
      Messager de ceux qui l'ont abandonnée. Ce récit porte donc à la fois
      consolation et avertissement — la promesse de rafraîchissement pour
      les fidèles, et le péril d'exclusion pour ceux qui ont traité avec
      mépris l'héritage prophétique.
    reference: Sahih al-Bukhari 6581, Sahih Muslim 2302
    hadith_refs: "Bukhari 6581, Muslim 2302"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) noted that the Ḥawḍ is both a literal mercy and a symbolic boundary: it separates those who remained loyal to the Messenger's way from those who abandoned it. Al-Nawawī adds that the description of its water as whiter than milk and sweeter than honey uses sensory language to convey spiritual realities that transcend earthly experience. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) nota que le Ḥawḍ est à la fois une miséricorde littérale et une frontière symbolique : il sépare ceux qui sont restés fidèles à la voie du Messager de ceux qui l'ont abandonnée. Al-Nawawī ajoute que la description de son eau comme plus blanche que le lait et plus douce que le miel utilise un langage sensoriel pour transmettre des réalités spirituelles. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ الْحَوْضَ رَحْمَةٌ حِسِّيَّةٌ وَحَدٌّ رَمْزِيٌّ: يَفْصِلُ بَيْنَ الْمُلْتَزِمِينَ وَالْمُتَخَلِّينَ. وَيُضِيفُ النَّوَوِيُّ أَنَّ وَصْفَ مَائِهِ بِالْبَيَاضِ وَالْحُلْوِ يَسْتَعِيرُ اللُّغَةَ الْحِسِّيَّةَ لِتَوْصِيلِ الْحَقَائِقِ الرُّوحِيَّةِ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 163
    source_url: https://sunnah.com/bukhari:6581

  - slug: hadith-straight-path-over-hellfire
    category: hadith_narrative
    title_en: The Straight Path Over Hellfire — Crossing the Sirat
    title_ar: الصراط المستقيم فوق جهنم — عبورُ الجسر
    title_fr: La voie droite au-dessus de l'Enfer — traverser le Sirat
    description_en: |
      The Prophet ﷺ said that the Sirat — the bridge over Hellfire — is
      sharper than a sword and thinner than a hair. The believers will cross
      it at different speeds: some will fly across like lightning, some like
      the wind, some will run, some will walk, and some will crawl, scratched
      but ultimately saved. The hypocrites and disbelievers will slip and
      fall into the flames below. Ibn al-Qayyim, in his writings on the
      Hereafter, explained that the Sirat is the externalisation of one's
      inner life: those whose hearts were attached to Allah in this world
      cross with ease, while those whose hearts were divided between Allah
      and their desires stumble. The narrative makes the abstract doctrine
      of Judgment visceral: every sin that slowed the heart in this life
      becomes a weight on the bridge; every act of sincerity becomes wings.
    description_ar: |
      قال النبي ﷺ إن الصراطَ — الجسرَ فوق جهنم — أحَدُّ من السيف، وأدقُّ من
      الشعرة. يعبرُه المؤمنون بسرعاتٍ متفاوتة: بعضُهم كالبرق، وبعضُهم كالريح،
      وبعضُهم يركضُ أو يمشي أو يزحفُ مخدوشًا ثم يُنقَذُ أخيرًا. أما المنافقون
      والكافرون فيزلقون ويسقطون في اللهيبِ أسفلَ منه. فسَّر ابنُ القيِّم في
      كتاباته عن الآخرة أن الصراطَ هو تجسيدُ الحياة الباطنة: من كانت قلوبُهم
      متعلِّقةً بالله في الدنيا عبَرُوا بيسر، ومن كانت قلوبُهم منقسمةً بين
      الله وشهواتِها تَعَثَّروا. ويجعلُ الحديثُ العقيدةَ المجردةَ عن
      القيامةِ حسيةً: كلُّ ذنبٍ أبطأَ القلبَ في الدنيا يصيرُ ثقلًا على
      الجسر، وكلُّ عملٍ صادقٍ يصيرُ جناحًا.
    description_fr: |
      Le Prophète Muhammad ﷺ dit que le Sirat — le pont au-dessus de
      l'Enfer — est plus tranchant qu'une épée et plus fin qu'un cheveu.
      Les croyants le traverseront à des vitesses différentes : certains
      comme l'éclair, d'autres comme le vent, d'autres courront,
      marcheront, ou ramperont, éraflés mais finalement sauvés. Les
      hypocrites et les mécréants glisseront et tomberont dans les flammes
      en contrebas. Ibn al-Qayyim, dans ses écrits sur l'au-delà, expliqua
      que le Sirat est l'extériorisation de la vie intérieure : ceux dont
      les cœurs étaient attachés à Allah dans ce monde traversent avec
      aisance, tandis que ceux dont les cœurs étaient partagés entre Allah
      et leurs désirs trébuchent. Ce récit rend viscérale la doctrine
      abstraite du Jugement : chaque péché qui a ralenti le cœur dans cette
      vie devient un poids sur le pont ; chaque acte de sincérité devient
      des ailes.
    reference: Sahih al-Bukhari 7439, Sahih Muslim 183
    hadith_refs: "Bukhari 7439, Muslim 183"
    source_notes: |
      Ibn al-Qayyim explained that the Ṣirāṭ is the externalisation of one's inner life: those whose hearts were attached to Allah cross with ease, while those whose hearts were divided stumble. Ibn Ḥajar adds that the varying speeds of crossing reflect the varying degrees of certainty and detachment achieved in this life. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn al-Qayyim expliqua que le Ṣirāṭ est l'extériorisation de la vie intérieure : ceux dont les cœurs étaient attachés à Allah traversent avec aisance, tandis que ceux dont les cœurs étaient partagés trébuchent. Ibn Ḥajar ajoute que les vitesses variables de traversée reflètent les degrés variés de certitude et de détachement atteints dans cette vie. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      فَسَّرَ ابْنُ الْقَيِّمِ أَنَّ الصِّرَاطَ هُوَ تَجْسِيدُ الْحَيَاةِ الْبَاطِنَةِ: مَنْ تَعَلَّقَ قَلْبُهُ بِاللهِ عَبَرَ بِيُسْرٍ. وَيُضِيفُ ابْنُ حَجَرٍ أَنَّ تَفَاوُتَ السُّرَعِ يَعْكِسُ تَفَاوُتَ دَرَجَاتِ الْيَقِينِ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 164
    source_url: https://sunnah.com/bukhari:7439

  - slug: hadith-scales-of-deeds
    category: hadith_narrative
    title_en: The Scales of Deeds — When a Single Good Deed Outweighs Mountains
    title_ar: موازين الأعمال — حين يُثقلُ عملٌ صالحٌ واحدٌ الجبال
    title_fr: La balance des œuvres — quand une seule bonne action pèse plus lourd que des montagnes
    description_en: |
      On the Day of Judgment, every person's deeds — good and evil — will
      be placed on a vast scale (mizan) whose plates are as wide as the
      heavens and earth. The Prophet ﷺ said that a single card bearing
      "la ilaha illa Allah" can outweigh a lifetime of sins, and a single
      bad deed can tip the scale toward ruin if there is no repentance.
      Ibn Hajar, in Fath al-Bari, explained that the weight is not
      quantitative but qualitative: the sincerity (ikhlas) behind an action
      gives it density in the sight of Allah. The Qur'an describes the
      scales explicitly: "We shall set up the balances of justice on the Day
      of Resurrection, so no soul will be wronged in the least" (21:47).
      The narrative is both terrifying and hopeful — terrifying because
      nothing is hidden, hopeful because even a small genuine deed can
      outweigh mountains of ostentation.
    description_ar: |
      يوم القيامة، تُوضَعُ أعمالُ كلِّ إنسانٍ — خيرُها وشرُّها — على ميزانٍ
      عظيمٍ كَفتاه بعرضِ السماواتِ والأرض. قال النبي ﷺ إنَّ صحيفةً فيها «لا إله
      إلا الله» قد تُثقِلُ على حياةٍ من الذنوب، وعملَ شرٍّ واحدٍ قد يُميلُ
      الكفَّةَ نحوَ الهلاكِ إن لم يكن توبة. فسَّر ابنُ حجرٍ في «فتح الباري» أن
      الوزنَ ليس كميًّا بل كيفيًّا: فالإخلاصُ وراء العملِ يمنحُه كثافةً عند
      الله. ويصف القرآنُ الموازينَ صراحةً: «وَنَضَعُ الْمَوَازِينَ الْقِسْطَ
      لِيَوْمِ الْقِيَامَةِ فَلَا تُظْلَمُ نَفْسٌ شَيْئًا» (الأنبياء ٢١:٤٧).
      والحديثُ مرعبٌ ومُبشِّرٌ في آنٍ واحد: مرعبٌ لأنَّ لا شيءَ يُخفى،
      ومُبشِّرٌ لأنَّ عملًا صغيرًا صادقًا قد يَطغى على جبالٍ من الرياء.
    description_fr: |
      Au Jour du Jugement, les œuvres de chaque personne — bonnes et
      mauvaises — seront placées sur une vaste balance (mizan) dont les
      plateaux sont aussi larges que les cieux et la terre. Le Prophète
      Muhammad ﷺ dit qu'une simple carte portant « la ilaha illa Allah »
      peut l'emporter sur une vie de péchés, et qu'une seule mauvaise action
      peut faire basculer la balance vers la ruine s'il n'y a pas de
      repentir. Ibn Hajar, dans Fath al-Bari, expliqua que le poids n'est
      pas quantitatif mais qualitatif : la sincérité (ikhlas) derrière une
      action lui donne de la densité aux yeux d'Allah. Le Coran décrit
      explicitement les balances : « Nous établirons les balances de la
      justice le jour de la Résurrection, et aucune âme ne sera lésée en
      quoi que ce soit » (21:47). Ce récit est à la fois terrifiant et
      plein d'espoir — terrifiant car rien n'est caché, plein d'espoir car
      même une petite action sincère peut l'emporter sur des montagnes
      d'ostentation.
    reference: Sahih Muslim 4836, Jami' at-Tirmidhi 2634
    hadith_refs: "Muslim 4836, Tirmidhi 2634"
    quran_refs: "7:8, 21:47, 23:102-103, 101:6-9"
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī) explained that the weight is not quantitative but qualitative: the sincerity (ikhlāṣ) behind an action gives it density in the sight of Allah. Al-Nawawī adds that the scales are a mercy as much as a judgment: "no soul will be wronged in the least" (Q 21:47). The hadith is narrated in Ṣaḥīḥ Muslim.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī) expliqua que le poids n'est pas quantitatif mais qualitatif : la sincérité (ikhlāṣ) derrière une action lui donne de la densité aux yeux d'Allah. Al-Nawawī ajoute que les balances sont une miséricorde autant qu'un jugement. Le hadith est narraté dans Ṣaḥīḥ Muslim.
    source_notes_ar: |
      فَسَّرَ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ الْوَزْنَ لَيْسَ كَمِّيًّا بَلْ كَيْفِيًّا: فَالْإِخْلَاصُ يُعْطِي الْعَمَلَ كَثَافَةً عِنْدَ اللهِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الْمِيزَانَ رَحْمَةٌ بِقَدْرِ مَا هُوَ حُكْمٌ. رُوِيَ فِي صَحِيحِ مُسْلِمٍ.
    display_day_of_year: 166
    source_url: https://sunnah.com/muslim:4836

  - slug: hadith-book-of-deeds
    category: hadith_narrative
    title_en: The Book of Deeds — Given in the Right Hand
    title_ar: كتاب الأعمال — مَن أُعطيَ كتابَه بيمينِه
    title_fr: Le livre des œuvres — remis dans la main droite
    description_en: |
      The Prophet ﷺ said that on the Day of Resurrection, every person
      will be given his book of deeds: those who receive it in their right
      hand will have an easy reckoning, exclaiming in joy, "Read my book!
      Indeed, I was certain that I would meet my account." Those who
      receive it behind their back or in their left hand will cry out for
      destruction upon themselves. Ibn Rajab, in his commentary on the
      names of the Hereafter, noted that the "right hand" symbolises
      honour and transparency, while the "left" or "behind the back"
      symbolises shame and concealment. The narrative invites each believer
      to live as though the book is already being written — because it is.
      Every glance, every word, every intention is being recorded by angels
      who neither tire nor err, and the pages are being compiled for a
      presentation that cannot be postponed or rewritten.
    description_ar: |
      قال النبي ﷺ إنه يوم القيامة يُعطَى كلُّ إنسانٍ كتابَ أعمالِه: من أُعطيَ
      كتابَه بيمينِه فله حسابٌ يسير، يقولُ مسرورًا: «ها اقرؤوا كتابيه، إنِّي
      ظننتُ أنِّي ملاقٍ حسابيه». ومن أُعطيَ كتابَه خلفَ ظهرِه أو بشمالِه
      يصرخُ هلاكًا على نفسِه. لاحظ ابنُ رجبٍ في تعليقه على أسماء الآخرة أن
      «اليد اليمنى» ترمزُ إلى العزِّ والانكشاف، بينما «اليسرى» أو «خلف الظهر»
      ترمزُ إلى الخزي والإخفاء. والحديثُ يدعو كلَّ مؤمنٍ أن يعيشَ وكأنَّ
      الكتابَ يُكتبُ الآن — لأنه كذلك. كلُّ نظرةٍ، وكلمةٍ، ونيةٍ تُسجَّلُ
      بملائكةٍ لا يُعيُّون ولا يُخطئون، والصفحاتُ تُجمَّعُ لعرضٍ لا يُمكنُ
      تأجيلُه ولا إعادةُ كتابتِه.
    description_fr: |
      Le Prophète Muhammad ﷺ dit qu'au Jour de la Résurrection, chaque
      personne recevra son livre des œuvres : ceux qui le reçoivent dans
      la main droite auront un jugement facile, s'écriant de joie : « Lis
      mon livre ! En vérité, j'étais certain que je rencontrerais mon
      compte. » Ceux qui le reçoivent derrière le dos ou dans la main
      gauche crieront destruction sur eux-mêmes. Ibn Rajab, dans son
      commentaire sur les noms de l'au-delà, nota que la « main droite »
      symbolise l'honneur et la transparence, tandis que la « gauche » ou
      « derrière le dos » symbolise la honte et la dissimulation. Ce récit
      invite chaque croyant à vivre comme si le livre était déjà en train
      d'être écrit — car c'est le cas. Chaque regard, chaque parole, chaque
      intention est enregistré par des anges qui ne se fatiguent pas et ne
      se trompent pas, et les pages sont compilées pour une présentation
      qui ne peut être ni reportée ni réécrite.
    reference: Sahih al-Bukhari 6538, Sahih Muslim 2762
    hadith_refs: "Bukhari 6538, Muslim 2762"
    quran_refs: "69:19-29, 84:7-12"
    source_notes: |
      Ibn Rajab noted that the "right hand" symbolises honour and transparency, while the "left" or "behind the back" symbolises shame and concealment. Al-Nawawī adds that the book is already being written — every glance, word, and intention is recorded by angels who neither tire nor err. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn Rajab nota que la « main droite » symbolise l'honneur et la transparence, tandis que la « gauche » ou « derrière le dos » symbolise la honte et la dissimulation. Al-Nawawī ajoute que le livre est déjà en train d'être écrit — chaque regard, parole et intention est enregistré par des anges. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ رَجَبٍ أَنَّ «الْيَدَ الْيُمْنَى» تَرْمِزُ إِلَى الْعِزِّ وَالانْكِشَافِ، وَ«الْيُسْرَى» إِلَى الْخَزْيِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الْكِتَابَ يُكْتَبُ فِي كُلِّ لَحْظَةٍ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 168
    source_url: https://sunnah.com/bukhari:6538

  - slug: hadith-answering-in-grave
    category: hadith_narrative
    title_en: Answering in the Grave — The Believer's Testimony
    title_ar: الجواب في القبر — شهادةُ المؤمن
    title_fr: Répondre dans la tombe — le témoignage du croyant
    description_en: |
      When the angels Munkar and Nakir question the deceased, the believer
      answers with clarity and firmness: "My Lord is Allah, my religion is
      Islam, and my Prophet is Muhammad." His voice is strong, his posture
      upright, his certainty unshakeable. The hypocrite or disbeliever,
      by contrast, stammers, "I don't know, I heard people saying something
      and I said it too." Al-Nawawi explained in Sharh Sahih Muslim that
      the difference in response is not a matter of information but of
      conviction: the believer lived these truths, while the other merely
      repeated them socially. Ibn Hajar added that the grave expands for
      the truthful and contracts for the liar, so that the very space
      around the deceased becomes a mirror of the soul's interior. The
      grave, therefore, is the first courtroom where the prosecution cannot
      be deceived by appearances or pedigree. It only recognises the truth
      that has been internalised through years of prayer, patience, and
      love for the Messenger ﷺ. The lesson is existential: faith must be
      more than membership; it must be identity woven into every fibre of
      character.
    description_ar: |
      حين يسألُ ملَكا القبرِ منكرٌ ونكيرُ الميِّت، يجيبُ المؤمنُ بوضوحٍ وثبات:
      «ربِّي الله، وديني الإسلام، ونبيِّي محمد». صوتُه قويٌّ، وقامتُه
      منتصبةٌ، ويقينُه لا يتزعزع. أما المنافقُ أو الكافرُ فيتلكأ: «لا أدري،
      سمعتُ الناسَ يقولون شيئًا فقلتُه». فسَّر النوويُّ في «شرح صحيح مسلم» أن
      الفارقَ في الإجابة ليس مسألةَ معلوماتٍ بل مسألةَ اقتناع: فالمؤمنُ عاشَ
      هذه الحقائق، بينما الآخرُ ردَّدَها اجتماعيًّا فحسب. وأضاف ابنُ حجرٍ أنَّ
      القبرَ يتَّسعُ للصادقِ ويضيقُ على الكاذب، بحيثِ يصيرُ الفضاءُ حولَ
      الميِّتِ مرآةً لباطنِ نفسِه. والقبرُ إذن هو أولُ محكمةٍ لا يمكنُ خداعُ
      الادِّعاء فيها بالمظاهرِ أو النسب. إنما يعترفُ بالحقيقةِ التي استُوطنتْ
      في القلبِ على مدى سنواتٍ من الصلاةِ والصبرِ وحبِّ الرسول ﷺ. والدرسُ
      وجوديٌّ: الإيمانُ يجب أن يكونَ أكثرَ من انتماء، يجب أن يكونَ هويةً
      تتخلَّلُ كلَّ نسيجِ الخلق.
    description_fr: |
      Lorsque les anges Munkar et Nakir interrogent le défunt, le croyant
      répond avec clarté et fermeté : « Mon Seigneur est Allah, ma religion
      est l'Islam, et mon Prophète est Muhammad. » Sa voix est forte, sa
      posture droite, sa certitude inébranlable. L'hypocrite ou le mécréant,
      en revanche, bégaie : « Je ne sais pas, j'ai entendu les gens dire
      quelque chose et je l'ai répété. » Al-Nawawi expliqua dans Sharh
      Sahih Muslim que la différence de réponse n'est pas une question
      d'information mais de conviction : le croyant a vécu ces vérités,
      tandis que l'autre les a simplement répétées socialement. Ibn Hajar
      ajouta que la tombe s'élargit pour le véridique et se rétrécit pour
      le menteur, de sorte que l'espace autour du défunt devient un miroir
      de l'intérieur de l'âme. La tombe est donc la première salle d'audience
      où l'accusation ne peut être trompée par les apparences ou la
      généalogie. Elle ne reconnaît que la vérité qui a été intériorisée
      au fil des années de prière, de patience et d'amour pour le Messager
      ﷺ. La leçon est existentielle : la foi doit être plus qu'une
      appartenance ; elle doit être une identité tissée dans chaque fibre
      du caractère.
    reference: Jami' at-Tirmidhi 1071 (sahih), Sunan Abi Dawud 4751
    hadith_refs: "Tirmidhi 1071, Abu Dawud 4751"
    source_notes: |
      Al-Nawawī explained that the difference in response is not a matter of information but of conviction: the believer lived these truths, while the other merely repeated them socially. Ibn Ḥajar added that the grave expands for the truthful and contracts for the liar. The hadith is narrated in Jāmiʿ al-Tirmidhī and Sunan Abī Dāwūd, graded ṣaḥīḥ by al-Albānī.
    source_notes_fr: |
      Al-Nawawī expliqua que la différence de réponse n'est pas une question d'information mais de conviction : le croyant a vécu ces vérités, tandis que l'autre les a simplement répétées socialement. Ibn Ḥajar ajouta que la tombe s'élargit pour le véridique et se rétrécit pour le menteur. Le hadith est narraté dans Jāmiʿ al-Tirmidhī et Sunan Abī Dāwūd, gradé ṣaḥīḥ par al-Albānī.
    source_notes_ar: |
      فَسَّرَ النَّوَوِيُّ أَنَّ الْفَارِقَ لَيْسَ مَعْلُومَاتٍ بَلْ اقْتِنَاعٌ: الْمُؤْمِنُ عَاشَ الْحَقَائِقِ، وَالْآخَرُ رَدَّدَهَا. وَأَضَافَ ابْنُ حَجَرٍ أَنَّ الْقَبْرَ يَتَّسِعُ لِلصَّادِقِ وَيَضِيقُ عَلَى الْكَاذِبِ. رُوِيَ فِي جَامِعِ التِّرْمِذِيِّ وَسُنَنِ أَبِي دَاوُدَ، وَحَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالصَّحَاحِ.
    display_day_of_year: 169
    source_url: https://sunnah.com/abudawud:4751

  - slug: hadith-death-as-a-reminder
    category: hadith_narrative
    title_en: Death as a Reminder — Remember the Destroyer of Pleasures
    title_ar: الموت تذكرة — اذكروا هاذم اللذات
    title_fr: La mort comme rappel — Souvenez-vous du destructeur des plaisirs
    description_en: |
      The Prophet ﷺ said: "Frequently remember the destroyer of pleasures,"
      meaning death. In a community obsessed with youth, beauty, wealth, and
      entertainment, this command is subversive: it asks the believer to keep
      the end in view at every moment of enjoyment, so that pleasure is
      tempered by perspective and does not become addiction. Ibn Rajab
      devoted an entire treatise, al-Tadhkira fi Ahwal al-Mawta, to the
      spiritual discipline of remembering death. He argued that the
      remembrance of death is not morbid but medicinal: it cures greed,
      vanity, procrastination in worship, and fear of poverty. The Prophet
      ﷺ himself would frequently supplicate, "O Allah, make the best of my
      life its end, and the best of my deeds their last, and the best of my
      days the day I meet You." The narrative teaches that dying well is
      the fruit of living with death in mind.
    description_ar: |
      قال النبي ﷺ: «أكثروا ذكرَ هاذمِ اللذات» يعني الموت. في أمةٍ مهووسةٍ
      بالشبابِ والجمالِ والمالِ والترفيه، هذا الأمرُ ثوريٌّ: يطلبُ من المؤمن أن
      يُبقي النهايةَ نصبَ عينيه في كلِّ لحظةِ لذة، حتى تتصفَّحَ المتعةُ بالمنظورِ
      ولا تصيرَ إدمانًا. خصَّص ابنُ رجبٍ رسالةً كاملةً، «التذكرة في أحوال
      الموتى وأحوال الآخرة»، للتربية الروحية على ذكرِ الموت. وحاجج بأنَّ ذكرَ
      الموت ليس مَوْتوريًّا بل دوائيًّا: يُداوي الطمعَ، والغرورَ، والتسويفَ في
      العبادة، والخوفَ من الفقر. وكان النبي ﷺ يكثرُ من الدعاء: «اللهم اجعلْ
      خيرَ عمري آخرَه، وخيرَ عملي خواتيمَه، وخيرَ أيامي يومَ ألقاك». والحديثُ
      يُعلِّم أنَّ حسنَ الخاتمةِ ثمرةُ العيشِ مع الموتِ في الذهن.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Souvenez-vous fréquemment du
      destructeur des plaisirs », c'est-à-dire la mort. Dans une
      communauté obsédée par la jeunesse, la beauté, la richesse et le
      divertissement, ce commandement est subversif : il demande au
      croyant de garder la fin en vue à chaque moment de jouissance, de
      sorte que le plaisir soit tempéré par la perspective et ne devienne
      pas une addiction. Ibn Rajab consacra un traité entier, al-Tadhkira
      fi Ahwal al-Mawta, à la discipline spirituelle du souvenir de la
      mort. Il soutint que le souvenir de la mort n'est pas morbide mais
      médicinal : il guérit la cupidité, la vanité, la procrastination
      dans l'adoration et la peur de la pauvreté. Le Prophète ﷺ lui-même
      suppliait fréquemment : « Ô Allah, fais que le meilleur de ma vie
      soit sa fin, que le meilleur de mes œuvres soit leur dernière, et
      que le meilleur de mes jours soit celui où je Te rencontre. » Ce
      récit enseigne que bien mourir est le fruit de vivre avec la mort
      à l'esprit.
    reference: Jami' at-Tirmidhi 2307 (hasan), Sunan Ibn Majah 4258
    hadith_refs: "Tirmidhi 2307, Ibn Majah 4258"
    quran_refs: "3:185, 21:35, 29:57, 62:8"
    source_notes: |
      Ibn Rajab devoted an entire treatise, al-Tadhkira fī Aḥwāl al-Mawtā, to the spiritual discipline of remembering death. Al-Nawawī notes that the Prophet's ﷺ frequent supplication for a good end demonstrates that death is not merely an event but the harvest of a life. The hadith is graded ḥasan by al-Albānī.
    source_notes_fr: |
      Ibn Rajab consacra un traité entier, al-Tadhkira fī Aḥwāl al-Mawtā, à la discipline spirituelle du souvenir de la mort. Al-Nawawī note que la supplication fréquente du Prophète ﷺ pour une bonne fin démontre que la mort n'est pas seulement un événement mais la moisson d'une vie. Le hadith est gradé ḥasan par al-Albānī.
    source_notes_ar: |
      خَصَّصَ ابْنُ رَجَبٍ رِسَالَةً كَامِلَةً، «التَّذْكِرَةَ فِي أَحْوَالِ الْمَوْتَى»، لِلتَّرْبِيَةِ عَلَى ذِكْرِ الْمَوْتِ. وَيُلَاحِظُ النَّوَوِيُّ أَنَّ كَثْرَةَ دُعَاءِ النَّبِيِّ ﷺ بِحُسْنِ الْخَاتِمَةِ تُبَيِّنُ أَنَّ الْمَوْتَ حَصَادُ الْحَيَاةِ. حَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالْحَسَنِ.
    display_day_of_year: 170
    source_url: https://sunnah.com/tirmidhi:2307

  - slug: hadith-visiting-graves
    category: hadith_narrative
    title_en: Visiting Graves — A Lesson in Humility
    title_ar: زيارة القبور — درسٌ في التواضع
    title_fr: Visiter les tombes — une leçon d'humilité
    description_en: |
      The Prophet ﷺ taught that visiting graves is a reminder of the
      Hereafter and a cure for the heart's hardness. He himself visited the
      grave of his mother and wept, causing those around him to weep as
      well. He taught the supplication: "Peace be upon you, O inhabitants of
      the graves — believers and Muslims. We will, if Allah wills, join you."
      Ibn Hajar noted in Fath al-Bari that the Prophet ﷺ initially forbade
      women from visiting graves because of the risk of excessive lamentation,
      but later permitted it when the community matured in understanding.
      The core lesson is humility: standing over a grave strips away the
      illusions of status, beauty, and power. The mighty and the meek lie
      beneath the same earth, and the dust that covers them will one day
      cover the visitor too. The graveyard is thus the most honest classroom.
    description_ar: |
      علَّم النبي ﷺ أنَّ زيارةَ القبورِ تذكرةٌ بالآخرةِ ودواءٌ لقسوةِ القلب.
      فقد زارَ قبرَ أُمِّه وبكى، حتى أبكى مَن حولَه. وعلَّم الدعاءَ: «السلامُ
      عليكم أهلَ الديارِ من المؤمنينَ والمسلمين، وإنَّا إن شاءَ الله بكم
      لاحقون». لاحظ ابنُ حجرٍ في «فتح الباري» أن النبي ﷺ كان قد نهى النساءَ عن
      زيارةِ القبورِ في البداية خوفًا من الولوعِ في النياحة، ثم أذنَ لهنَّ حين
      نضجَ الفهمُ الجماعي. والدرسُ الجوهريُّ التواضعُ: الوقوفُ على قبرٍ يُسلِّخُ
      عن أوهامِ المكانةِ والجمالِ والقوة. العظيمُ والحقيرُ تحتَ ترابٍ واحد،
      والغبارُ الذي يغشاهم سيغشى الزائرَ يومًا ما. ومن ثمَّ فالمقبرةُ هي
      الصفُّ الأصدقُ.
    description_fr: |
      Le Prophète Muhammad ﷺ enseigna que visiter les tombes est un
      rappel de l'au-delà et un remède à la dureté du cœur. Il visita
      lui-même la tombe de sa mère et pleura, provoquant les larmes de
      ceux qui l'entouraient. Il enseigna la supplication : « La paix soit
      sur vous, habitants des demeures, parmi les croyants et les musulmans.
      Nous vous rejoindrons, si Allah le veut. » Ibn Hajar nota dans Fath
      al-Bari que le Prophète ﷺ avait initialement interdit aux femmes de
      visiter les tombes en raison du risque de lamentation excessive, mais
      leur permit plus tard lorsque la communauté eut mûri dans sa
      compréhension. La leçon essentielle est l'humilité : se tenir sur une
      tombe dépouille des illusions de statut, de beauté et de pouvoir. Les
      puissants et les humbles reposent sous la même terre, et la poussière
      qui les recouvre recouvrira un jour le visiteur aussi. Le cimetière
      est donc la salle de classe la plus honnête.
    reference: Sahih Muslim 977, Sunan Abi Dawud 3234
    hadith_refs: "Muslim 977, Abu Dawud 3234"
    source_notes: |
      Ibn Ḥajar noted that the Prophet ﷺ initially forbade women from visiting graves because of the risk of excessive lamentation, but later permitted it when the community matured in understanding. Al-Nawawī adds that the supplication taught — "We will, if Allah wills, join you" — expresses hope without despair and acceptance without fatalism. The hadith is narrated in Ṣaḥīḥ Muslim.
    source_notes_fr: |
      Ibn Ḥajar nota que le Prophète ﷺ avait initialement interdit aux femmes de visiter les tombes en raison du risque de lamentation excessive, mais leur permit plus tard lorsque la communauté eut mûri dans sa compréhension. Al-Nawawī ajoute que la supplication enseignée — « Nous vous rejoindrons, si Allah le veut » — exprime l'espoir sans désespoir. Le hadith est narraté dans Ṣaḥīḥ Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ حَجَرٍ أَنَّ النَّبِيَّ ﷺ كَانَ قَدْ نَهَى النِّسَاءَ عَنْ زِيَارَةِ الْقُبُورِ خَوْفًا مِنَ الْوَلْوَعِ، ثُمَّ أَذِنَ لَهُنَّ حِينَ نَضَجَ الْفَهْمُ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الدُّعَاءَ «وَإِنَّا إِنْ شَاءَ اللهُ بِكُمْ لَاحِقُونَ» يُعَبِّرُ عَنْ رَجَاءٍ بِلَا يَأْسٍ. رُوِيَ فِي صَحِيحِ مُسْلِمٍ.
    display_day_of_year: 171
    source_url: https://sunnah.com/muslim:977

  - slug: hadith-dua-of-parents
    category: hadith_narrative
    title_en: The Dua of Parents — Faster Than the Sword
    title_ar: دعوة الوالدين — أسرعُ من السيف
    title_fr: La du'a des parents — plus rapide que l'épée
    description_en: |
      The Prophet ﷺ said that there are three supplications that are
      answered without doubt: the supplication of the one who has been
      wronged, the supplication of the traveller, and the supplication of a
      parent for his child. He also warned that the curse of a parent
      against his child is answered. Al-Nawawi, in his commentary on Sahih
      Muslim, explained that the parent's dua carries special weight
      because of the unique spiritual authority Allah has vested in the
      parent-child bond: the parent is the immediate human source of life,
      nurture, and protection, and Allah honours this role by making the
      parent's tongue an instrument of divine decree for the child. The
      narrative is both an encouragement to parents to be constant in
      blessing their children, and a warning to children that no armour —
      not wealth, not status, not physical strength — can deflect a parent's
      curse once it has been pronounced in justice.
    description_ar: |
      قال النبي ﷺ إنَّ هناك ثلاثَ دعواتٍ مُستجاباتٍ بلا ريب: دعوةُ المظلوم،
      ودعوةُ المسافر، ودعوةُ الوالدِ لولدِه. وحذَّر أيضًا من أنَّ لعنةَ الوالدِ
      لولدِه مُستجابة. فسَّر النوويُّ في شرحه لصحيح مسلم أن دعوةَ الوالدِ
      تتسمُ بوزنٍ خاصٍّ لأنَّ اللهَ أودعَ في رابطةِ الوالدِ بالولدِ سلطةً
      روحيةً فريدةً: فالوالدُ هو المصدرُ البشريُّ المباشرُ للحياةِ والرعايةِ
      والحماية، ويُكرِّمُ اللهُ هذا الدورَ بجعلِ لسانِ الوالدِ آلةَ قضاءٍ
      إلهيٍّ للولد. والحديثُ تشجيعٌ للآباءِ على الإكثارِ من دعواتِ البركةِ
      لأبنائِهم، وتحذيرٌ للأبناءِ من أنَّ لا درعَ — لا مالَ ولا مكانةَ ولا
      قوةً جسديةً — يمكنُ أن يصُدَّ لعنةَ والدٍ أُطلِقتْ بعدالة.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit qu'il y a trois supplications qui sont
      exaucées sans aucun doute : la supplication de celui qui a été lésé,
      la supplication du voyageur, et la supplication d'un parent pour son
      enfant. Il avertit également que la malédiction d'un parent contre son
      enfant est exaucée. Al-Nawawi, dans son commentaire sur Sahih Muslim,
      expliqua que la du'a du parent porte un poids spécial en raison de
      l'autorité spirituelle unique qu'Allah a conférée au lien
      parent-enfant : le parent est la source humaine immédiate de vie, de
      soin et de protection, et Allah honore ce rôle en faisant de la langue
      du parent un instrument du décret divin pour l'enfant. Ce récit est à
      la fois une encouragement aux parents à bénir constamment leurs
      enfants, et un avertissement aux enfants qu'aucune armure — ni
      richesse, ni statut, ni force physique — ne peut dévier la malédiction
      d'un parent une fois qu'elle a été prononcée en justice.
    reference: Sahih Muslim 2620, Jami' at-Tirmidhi 1899
    hadith_refs: "Muslim 2620, Tirmidhi 1899"
    quran_refs: "17:24"
    source_notes: |
      Al-Nawawī explained that the parent's duʿāʾ carries special weight because of the unique spiritual authority Allah has vested in the parent-child bond. Ibn Ḥajar adds that the three answered supplications — of the wronged, the traveller, and the parent — share a common thread: they are all uttered by those in a state of vulnerability or responsibility that attracts divine mercy. The hadith is narrated in Ṣaḥīḥ Muslim.
    source_notes_fr: |
      Al-Nawawī expliqua que la duʿāʾ du parent porte un poids spécial en raison de l'autorité spirituelle unique qu'Allah a conférée au lien parent-enfant. Ibn Ḥajar ajoute que les trois supplications exaucées — du lésé, du voyageur et du parent — partagent un fil commun : elles sont prononcées par des personnes dans un état de vulnérabilité qui attire la miséricorde divine. Le hadith est narraté dans Ṣaḥīḥ Muslim.
    source_notes_ar: |
      فَسَّرَ النَّوَوِيُّ أَنَّ دُعَاءَ الْوَالِدِ يَتَمَيَّزُ بِوَزْنٍ خَاصٍّ لِسُلْطَةٍ رُوحِيَّةٍ أَوْدَعَهَا اللهُ فِي الرَّابِطَةِ. وَيُضِيفُ ابْنُ حَجَرٍ أَنَّ الثَّلَاثَ دَعَوَاتٍ يَجْمَعُهُنَّ الضَّعْفُ الْمُسْتَجِيبُ لِلرَّحْمَةِ. رُوِيَ فِي صَحِيحِ مُسْلِمٍ.
    display_day_of_year: 173
    source_url: https://sunnah.com/muslim:2620

  - slug: hadith-obedience-to-parents
    category: hadith_narrative
    title_en: Obedience to Parents — Paradise at the Feet of Mothers
    title_ar: بر الوالدين — الجنةُ تحتَ أقدامِ الأمهات
    title_fr: L'obéissance aux parents — le Paradis est aux pieds des mères
    description_en: |
      A man came to the Prophet ﷺ asking permission to join a military
      expedition. The Prophet ﷺ asked, "Is your mother alive?" He said,
      "Yes." The Prophet ﷺ said, "Cling to her feet, for there is Paradise."
      In another narration, the Prophet ﷺ said that Allah has forbidden
      disobedience to parents. Ibn Hajar explained that the mother's feet
      are specified because she bears the primary burden of pregnancy,
      childbirth, and nursing — a sacrifice that no child can repay. The
      hadith does not mean one should literally worship the mother, but
      that serving her with devotion is a path to Paradise so direct that
      it is as though Paradise itself is located beneath her feet. The
      narrative reorients the entire economy of honour: in a culture that
      celebrated warrior glory, the Prophet ﷺ placed the highest medal at
      the feet of the one who stayed home and raised a child.
    description_ar: |
      جاء رجلٌ إلى النبي ﷺ يستأذنُه في الغزوِ. فسألَه النبي ﷺ: «أحيٌّ والدتُك؟»
      قال: نعم. قال: «الزمْها فإنَّ الجنةَ عند رِجْليها». وفي روايةٍ أخرى قال
      النبي ﷺ إنَّ اللهَ حرَّمَ عقوقَ الوالدين. فسَّر ابنُ حجرٍ أنَّ إشارةَ
      «الأقدام» تخصُّ الأمَّ لأنها تتحملُ العبءَ الأكبرَ من الحملِ والولادةِ
      والرضاعةِ — تضحيةٌ لا يمكنُ للولدِ أن يُوفِّيَها. والحديثُ لا يعني
      عبادةَ الأمِّ حرفيًّا، بل أنَّ خدمتَها بتفانٍ هو طريقٌ إلى الجنةِ مباشرٌ
      لدرجةِ أنَّ الجنةَ ذاتَها كأنَّها موضوعةٌ تحتَ قدميها. ويُعيد الحديثُ
      توجيهَ كلِّ اقتصادِ الشرف: في ثقافةٍ كانت تُمجِّدُ المجدَ الحربيَّ، وضع
      النبي ﷺ أرفعَ وسامٍ عند قدمَي من بقيتْ في البيتِ تربّي طفلًا.
    description_fr: |
      Un homme vint vers le Prophète Muhammad ﷺ demandant la permission de
      rejoindre une expédition militaire. Le Prophète ﷺ demanda : « Ta mère
      est-elle vivante ? » Il répondit : « Oui. » Le Prophète ﷺ dit :
      « Attache-toi à ses pieds, car c'est là le Paradis. » Dans une autre
      narration, le Prophète ﷺ dit qu'Allah a interdit la désobéissance envers
      les parents. Ibn Hajar expliqua que les pieds de la mère sont
      spécifiés parce qu'elle porte le fardeau principal de la grossesse,
      de l'accouchement et de l'allaitement — un sacrifice qu'aucun enfant
      ne peut rembourser. Le hadith ne signifie pas qu'il faut littéralement
      adorer la mère, mais que la servir avec dévotion est un chemin vers le
      Paradis si direct que c'est comme si le Paradis lui-même était situé
      sous ses pieds. Ce récit réoriente toute l'économie de l'honneur :
      dans une culture qui célébrait la gloire guerrière, le Prophète ﷺ
      plaça la plus haute médaille aux pieds de celle qui restait à la
      maison pour élever un enfant.
    reference: Sahih Muslim 2548, Sahih al-Bukhari 5971
    hadith_refs: "Muslim 2548, Bukhari 5971"
    quran_refs: "17:23, 31:14-15"
    source_notes: |
      Ibn Ḥajar explained that the mother's feet are specified because she bears the primary burden of pregnancy, childbirth, and nursing — a sacrifice that no child can repay. Al-Nawawī adds that the hadith does not mean one should literally worship the mother, but that serving her with devotion is a path to Paradise so direct that it is as though Paradise itself is located beneath her feet. The hadith is narrated in Ṣaḥīḥ Muslim and al-Bukhārī.
    source_notes_fr: |
      Ibn Ḥajar expliqua que les pieds de la mère sont spécifiés parce qu'elle porte le fardeau principal de la grossesse, de l'accouchement et de l'allaitement — un sacrifice qu'aucun enfant ne peut rembourser. Al-Nawawī ajoute que le hadith ne signifie pas qu'il faut littéralement adorer la mère, mais que la servir avec dévotion est un chemin vers le Paradis si direct que c'est comme si le Paradis lui-même était situé sous ses pieds. Le hadith est narraté dans Ṣaḥīḥ Muslim et al-Bukhārī.
    source_notes_ar: |
      فَسَّرَ ابْنُ حَجَرٍ أَنَّ إِشَارَةَ الْأَقْدَامِ تَخُصُّ الْأُمَّ لِأَنَّهَا تَحْمِلُ أَثْقَلَ أَعْبَاءِ الْحَمْلِ وَالْوِلَادَةِ وَالرِّضَاعَةِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الْحَدِيثَ لَا يَعْنِي عِبَادَتَهَا حَرْفِيًّا، بَلْ أَنَّ خِدْمَتَهَا طَرِيقٌ إِلَى الْجَنَّةِ. رُوِيَ فِي صَحِيحِ مُسْلِمٍ وَالْبُخَارِيِّ.
    display_day_of_year: 174
    source_url: https://sunnah.com/muslim:2548

  - slug: hadith-rights-of-neighbors
    category: hadith_narrative
    title_en: The Rights of Neighbors — Almost Made Them Heirs
    title_ar: حقوق الجيران — كادَ يُورِّثُهُم
    title_fr: Les droits des voisins — on faillit en faire des héritiers
    description_en: |
      The Prophet ﷺ said that the rights of the neighbor are so great that
      he almost made them heirs alongside family members. He specified that
      a neighbor is not merely the one whose door is adjacent, but extends
      to forty houses in every direction. The rights include sharing food,
      protecting honour, visiting in illness, and relieving distress. Ibn
      Hajar, in Fath al-Bari, noted that the Prophet ﷺ came close to making
      neighbors heirs because the Qur'an had already established that
      inheritance belongs to relatives, but the proximity of the statement
      indicates the immense spiritual and social weight of neighbourliness.
      The narrative challenges the modern ethic of privacy and autonomy: it
      establishes that living near someone creates a covenant of mutual
      responsibility enforceable by Allah Himself, who will ask on the Day
      of Judgment how each person treated those geographically closest to him.
    description_ar: |
      قال النبي ﷺ إنَّ حقوقَ الجارِ عظيمةٌ لدرجةِ أنَّه كادَ أن يجعلَهُم
      وُرَّاثًا إلى جانبِ الأقارب. وحدَّد أنَّ الجارَ ليس من يُجاورُ بابَه
      فحسب، بل يمتدُّ إلى أربعينَ دارًا في كلِّ جهة. وتشملُ الحقوقُ إطعامَ
      الطعامِ، وحمايةَ العرضِ، وعيادةَ المريضِ، وإغاثةَ الملهوفِ. لاحظ ابنُ حجرٍ
      في «فتح الباري» أنَّ النبي ﷺ كادَ يجعلَ الجيرانَ وُرَّاثًا لأنَّ القرآنَ
      قد أثبتَ أنَّ الميراثَ للأقارب، لكنَّ قربَ التصريحِ يدلُّ على الوزنِ
      الروحي والاجتماعي الهائلِ للجوار. والحديثُ يتحدَّى الأخلاقَ الحديثةَ
      القائمةَ على الخصوصيةِ والاستقلالية: فهو يُرسِّخُ أنَّ العيشَ بجوارِ
      أحدٍ يُنشئُ عهدًا من المسؤوليةِ المتبادلةِ يُحاسبُ عليه اللهُ ذاتُه،
      وسيسألُ يوم القيامةِ كيف عاملَ كلُّ إنسانٍ من كانَ أقربَ جغرافيًّا إليه.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit que les droits du voisin sont si grands
      qu'il a failli en faire des héritiers aux côtés des membres de la
      famille. Il précisa qu'un voisin n'est pas seulement celui dont la
      porte est adjacente, mais s'étend jusqu'à quarante maisons dans
      chaque direction. Les droits incluent le partage de la nourriture, la
      protection de l'honneur, la visite en cas de maladie et le soulagement
      de la détresse. Ibn Hajar, dans Fath al-Bari, nota que le Prophète ﷺ
      faillit faire des voisins des héritiers parce que le Coran avait déjà
      établi que l'héritage appartient aux parents, mais la proximité de
      l'affirmation indique l'immense poids spirituel et social du
      voisinage. Ce récit défie l'éthique moderne de la vie privée et de
      l'autonomie : il établit que vivre près de quelqu'un crée un pacte de
      responsabilité mutuelle régi par Allah Lui-même, qui demandera au
      Jour du Jugement comment chaque personne a traité ceux qui lui
      étaient géographiquement les plus proches.
    reference: Sahih al-Bukhari 6015, Sahih Muslim 2625
    hadith_refs: "Bukhari 6015, Muslim 2625"
    quran_refs: "4:36"
    source_notes: |
      Ibn Ḥajar noted that the Prophet ﷺ came close to making neighbours heirs because the Qur'an had already established that inheritance belongs to relatives, but the proximity of the statement indicates the immense spiritual and social weight of neighbourliness. Al-Nawawī adds that extending neighbourly rights to forty houses in every direction transforms locality into a network of covenantal responsibility. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Ibn Ḥajar nota que le Prophète ﷺ faillit faire des voisins des héritiers parce que le Coran avait déjà établi que l'héritage appartient aux parents, mais la proximité de l'affirmation indique l'immense poids spirituel et social du voisinage. Al-Nawawī ajoute qu'étendre les droits du voisinage à quarante maisons dans chaque direction transforme la localité en un réseau de responsabilité covenantale. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      لَاحَظَ ابْنُ حَجَرٍ أَنَّ النَّبِيَّ ﷺ كَادَ يَجْعَلُ الْجِيرَانَ وُرَّاثًا لِأَنَّ الْقُرْآنَ أَثْبَتَ الْمِيرَاثَ لِلْأَقَارِبِ، وَقُرْبُ التَّصْرِيحِ يَدُلُّ عَلَى وَزْنِ الْجِوَارِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ تَوْسِيعَ الْحَقِّ إِلَى أَرْبَعِينَ دَارًا يُحَوِّلُ الْمَحَلَّةَ إِلَى شَبَكَةِ مَسْؤُولِيَّةٍ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 178
    source_url: https://sunnah.com/bukhari:6015

  - slug: hadith-smiling-in-face-of-brother
    category: hadith_narrative
    title_en: Smiling in the Face of Your Brother — A Charity
    title_ar: التبسمُ في وجهِ أخيك — صدقةٌ
    title_fr: Sourire au visage de ton frère — une aumône
    description_en: |
      The Prophet ﷺ said that your smiling in the face of your brother is
      charity, that commanding good and forbidding evil is charity, that
      removing harm from the road is charity, and that pouring water from
      your bucket into your brother's bucket is charity. This hadith
      demolishes the notion that charity is only monetary: it turns every
      interaction into an opportunity for sadaqa. Al-Nawawi, in his
      commentary on this narration, observed that the Prophet ﷺ began with
      the smile because it is the most accessible act — it costs nothing,
      requires no preparation, and can be offered to anyone. Yet its
      spiritual yield is immense: it breaks hostility, establishes
      affection, and testifies to the inner tranquillity of the believer.
      The narrative thus universalises goodness: the poor and the rich, the
      scholar and the layman, are placed on equal footing in the currency
      of everyday kindness.
    description_ar: |
      قال النبي ﷺ: «تبسُّمُك في وجهِ أخيك لك صدقةٌ، وأمرُك بالمعروفِ ونهيُك
      عن المنكرِ صدقةٌ، وإماطتُك الحجرَ والشوكةَ عن الطريقِ لك صدقةٌ، وإفراغُك
      من دلْوِك في دلْوِ أخيك لك صدقةٌ». يُهدمُ هذا الحديثُ فكرةَ أنَّ الصدقةَ
      ماليةٌ فحسب: فهو يحوِّلُ كلَّ تفاعلٍ إلى فرصةٍ للصدقة. لاحظ النوويُّ في
      تعليقه على هذا الحديث أنَّ النبي ﷺ بدأ بالتبسُّمِ لأنه أيسرُ الأعمال — لا
      يكلفُ شيئًا، ولا يحتاجُ إلى تحضير، ويمكنُ أن يُقَدَّمَ لأيِّ أحد. غير أنَّ
      عائدَه الروحيَّ هائلٌ: يكسرُ العداوةَ، ويُرسِّخُ المودةَ، ويشهدُ على
      سكينةِ المؤمنِ الداخلية. ويجعلُ الحديثُ الخيرَ شاملاً: الفقيرُ والغنيُّ،
      والعالِمُ والعاميُّ، يقفون على قدمِ المساواةِ في عملةِ اللطفِ اليومي.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Ton sourire au visage de ton frère
      est une aumône, commander le bien et interdire le mal est une
      aumône, enlever un obstacle de la route est une aumône, et verser de
      ton seau dans le seau de ton frère est une aumône. » Ce hadith
      démolit l'idée que la charité n'est que monétaire : il transforme
      chaque interaction en une opportunité de sadaqa. Al-Nawawi, dans son
      commentaire sur cette narration, observa que le Prophète ﷺ commença
      par le sourire parce que c'est l'acte le plus accessible : il ne
      coûte rien, ne nécessite aucune préparation, et peut être offert à
      quiconque. Pourtant, son rendement spirituel est immense : il brise
      l'hostilité, établit l'affection, et témoigne de la tranquillité
      intérieure du croyant. Ce récit universalise donc la bonté : le
      pauvre et le riche, le savant et le profane, se retrouvent sur un
      pied d'égalité dans la monnaie de la gentillesse quotidienne.
    reference: Jami' at-Tirmidhi 1956 (hasan), Sunan Ibn Majah 3754
    hadith_refs: "Tirmidhi 1956, Ibn Majah 3754"
    source_notes: |
      Al-Nawawī observed that the Prophet ﷺ began with the smile because it is the most accessible act — it costs nothing, requires no preparation, and can be offered to anyone. Ibn Ḥajar adds that the hadith universalises goodness: the poor and the rich, the scholar and the layman, are placed on equal footing in the currency of everyday kindness. The hadith is graded ḥasan by al-Albānī.
    source_notes_fr: |
      Al-Nawawī observa que le Prophète ﷺ commença par le sourire parce que c'est l'acte le plus accessible — il ne coûte rien, ne nécessite aucune préparation, et peut être offert à quiconque. Ibn Ḥajar ajoute que le hadith universalise la bonté : le pauvre et le riche, le savant et le profane, se retrouvent sur un pied d'égalité dans la monnaie de la gentillesse quotidienne. Le hadith est gradé ḥasan par al-Albānī.
    source_notes_ar: |
      لَاحَظَ النَّوَوِيُّ أَنَّ النَّبِيَّ ﷺ بَدَأَ بِالتَّبَسُّمِ لِأَنَّهُ أَيْسَرُ الْأَعْمَالِ — لَا يَكْلِفُ شَيْئًا. وَيُضِيفُ ابْنُ حَجَرٍ أَنَّ الْحَدِيثَ يُحَوِّلُ الْخَيْرَ إِلَى شَيْءٍ شَامِلٍ. حَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالْحَسَنِ.
    display_day_of_year: 179
    source_url: https://sunnah.com/tirmidhi:1956

  - slug: hadith-removing-harm-from-path
    category: hadith_narrative
    title_en: Removing Harm from the Path — A Branch of Iman
    title_ar: إماطةُ الأذى عن الطريق — شعبةٌ من الإيمان
    title_fr: Enlever le nuisible du chemin — une branche de la foi
    description_en: |
      The Prophet ﷺ said that iman has seventy-odd branches, and the
      highest is to say "la ilaha illa Allah," while the lowest is to
      remove a harmful object from the road. Ibn Hajar, in Fath al-Bari,
      explained that the hadith is not ranking deeds in terms of reward
      but in terms of visibility: the shahada is the innermost reality of
      faith, while removing harm is its most outward, social expression.
      The narrative thus reveals the architecture of iman as a structure
      that extends from the hidden certainties of the heart to the
      concrete responsibilities of public space. A believer cleans the road
      not because he expects thanks, but because the road belongs to Allah
      and its users are his brothers. The hadith also contains an ethic of
      maintenance: faith is not a private feeling but a public service, and
      the smallest act of civic care is counted as part of one's religion.
    description_ar: |
      قال النبي ﷺ: «الإيمانُ بضعٌ وسبعون شعبةً، فأفضلُها قولُ لا إله إلا الله،
      وأدناها إماطةُ الأذى عن الطريق». فسَّر ابنُ حجرٍ في «فتح الباري» أنَّ
      الحديثَ لا يُرتِّبُ الأعمالَ من حيث الثوابِ بل من حيث الظهور: فالشهادةُ
      هي باطنُ الإيمانِ الأعمق، وإماطةُ الأذى هي أظهرُ تعبيراتِه الاجتماعية.
      والحديثُ يُكشفُ إذن عن بنيةِ الإيمانِ كهيكلٍ يمتدُّ من يقينِ القلبِ
      الخفيِّ إلى المسؤولياتِ الملموسةِ للفضاء العام. المؤمنُ ينظفُ الطريقَ ليس
      لأنَّه ينتظرُ الشكرَ، بل لأنَّ الطريقَ يعودُ إلى الله ومُستخدِميه
      إخوانُه. والحديثُ يحتوي أيضًا على أخلاقيةِ الصيانة: فالإيمانُ ليس شعورًا
      خاصًّا بل خدمةً عامةً، وأصغرُ عملٍ من العنايةِ المدنيةِ يُحتسَبُ جزءًا من
      الدين.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « La foi a soixante-dix et quelques
      branches, et la meilleure est de dire "la ilaha illa Allah", tandis
      que la plus basse est d'enlever un objet nuisible du chemin. » Ibn
      Hajar, dans Fath al-Bari, expliqua que le hadith ne classe pas les
      œuvres en termes de récompense mais en termes de visibilité : la
      shahada est la réalité la plus intime de la foi, tandis qu'enlever un
      nuisible est son expression la plus extérieure et sociale. Ce récit
      révèle donc l'architecture de l'iman comme une structure qui s'étend
      des certitudes cachées du cœur aux responsabilités concrètes de
      l'espace public. Un croyant nettoie la route non pas parce qu'il
      attend des remerciements, mais parce que la route appartient à Allah
      et que ses usagers sont ses frères. Le hadith contient aussi une
      éthique d'entretien : la foi n'est pas un sentiment privé mais un
      service public, et le plus petit acte de civisme est compté comme
      faisant partie de sa religion.
    reference: Sahih Muslim 35, Sahih al-Bukhari 9
    hadith_refs: "Muslim 35, Bukhari 9"
    source_notes: |
      Ibn Ḥajar explained that the hadith is not ranking deeds in terms of reward but in terms of visibility: the shahāda is the innermost reality of faith, while removing harm is its most outward, social expression. Al-Nawawī adds that this hadith reveals the architecture of īmān as a structure extending from hidden certainties to concrete civic responsibilities. The hadith is narrated in Ṣaḥīḥ Muslim and al-Bukhārī.
    source_notes_fr: |
      Ibn Ḥajar expliqua que le hadith ne classe pas les œuvres en termes de récompense mais en termes de visibilité : la shahāda est la réalité la plus intime de la foi, tandis qu'enlever un nuisible est son expression la plus extérieure. Al-Nawawī ajoute que ce hadith révèle l'architecture de l'īmān comme une structure s'étendant des certitudes cachées aux responsabilités civiques concrètes. Le hadith est narraté dans Ṣaḥīḥ Muslim et al-Bukhārī.
    source_notes_ar: |
      فَسَّرَ ابْنُ حَجَرٍ أَنَّ الْحَدِيثَ لَا يُرَتِّبُ الْأَعْمَالَ بِالثَّوَابِ بَلْ بِالظُّهُورِ: الشَّهَادَةُ بَاطِنُ الْإِيمَانِ، وَإِمَاطَةُ الْأَذَى أَظْهَرُ تَعْبِيرَاتِهِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الْحَدِيثَ يُكْشِفُ عَنْ هَيْكَلِ الْإِيمَانِ. رُوِيَ فِي صَحِيحِ مُسْلِمٍ وَالْبُخَارِيِّ.
    display_day_of_year: 180
    source_url: https://sunnah.com/muslim:35

  - slug: hadith-speaking-good-or-remaining-silent
    category: hadith_narrative
    title_en: Speak Good or Remain Silent — Guarding the Tongue
    title_ar: قلْ خيرًا أو اصمتْ — حفظُ اللسان
    title_fr: Dis le bien ou tais-toi — la garde de la langue
    description_en: |
      The Prophet ﷺ said: "Whoever believes in Allah and the Last Day, let
      him speak good or remain silent." The hadith is brief but
      comprehensive: it places the entire burden of speech on the speaker.
      Before any word leaves the mouth, it must pass a two-part test — is
      it good, and if not, is silence preferable? Al-Nawawi placed this
      hadith among his Forty Hadith and commented that most sins enter
      through the tongue: backbiting, slander, false testimony, vain
      argument, and hurting others. Ibn al-Qayyim, in his treatise on the
      diseases of the tongue, explained that silence is not mere absence
      of sound but positive restraint — a jihad of the nafs against the
      impulse to speak. The narrative transforms speech from a reflex into
      a responsibility: the believer's tongue is a trust from Allah, and
      every utterance is either a deposit in the account of the Hereafter
      or a withdrawal.
    description_ar: |
      قال النبي ﷺ: «من كانَ يؤمنُ باللهِ واليومِ الآخرِ فليقلْ خيرًا أو ليصمتْ».
      الحديثُ موجزٌ لكنه شامع: فهو يضعُ عبءَ الكلامِ كلهُ على المتكلم. قبل أن
      يخرجَ من الفمِ أيُّ لفظٍ يجبُ أن يجتازَ اختبارًا مزدوجًا — هل هو خيرٌ،
      وإن لم يكنْ فهل الصمتُ أفضل؟ وضعَ النوويُّ هذا الحديثَ في أربعينيته
      وعلَّق بأنَّ أكثرَ الذنوبِ تدخلُ عن طريقِ اللسان: الغيبةُ، والبهتانُ،
      والشهادةُ الزورُ، والمراءُ، وإيذاءُ الآخرين. فسَّر ابنُ القيِّم في رسالته
      عن أمراض اللسان أنَّ الصمتَ ليس مجردَ غيابِ صوتٍ بل كبحًا إيجابيًّا —
      جهادُ النفسِ ضدَّ اندفاعِ الكلام. ويُحوِّل الحديثُ الكلامَ من انعكاسٍ
      عصبيٍّ إلى مسؤولية: لسانُ المؤمنِ أمانةٌ من الله، وكلُّ لفظٍ هو إما
      إيداعٌ في حسابِ الآخرةِ أو سحبٌ منه.
    description_fr: |
      Le Prophète Muhammad ﷺ a dit : « Quiconque croit en Allah et au Jour
      dernier, qu'il dise le bien ou qu'il se taise. » Ce hadith est bref
      mais exhaustif : il place l'entière charge de la parole sur celui qui
      parle. Avant qu'un mot ne quitte la bouche, il doit passer un test en
      deux parties — est-il bon, et sinon, le silence est-il préférable ?
      Al-Nawawi plaça ce hadith parmi ses Quarante Hadiths et commenta que
      la plupart des péchés entrent par la langue : médisance, calomnie,
      faux témoignage, vaine dispute, et blessure d'autrui. Ibn al-Qayyim,
      dans son traité sur les maladies de la langue, expliqua que le
      silence n'est pas le simple absence de son mais une retenue positive
      — un jihad du nafs contre l'impulsion de parler. Ce récit transforme
      la parole d'un réflexe en une responsabilité : la langue du croyant
      est un dépôt confié par Allah, et chaque énonciation est soit un
      dépôt sur le compte de l'au-delà, soit un retrait.
    reference: Sahih al-Bukhari 6018, Sahih Muslim 47
    hadith_refs: "Bukhari 6018, Muslim 47"
    quran_refs: "50:18"
    source_notes: |
      Al-Nawawī placed this hadith among his Forty Hadith and commented that most sins enter through the tongue: backbiting, slander, false testimony, and vain argument. Ibn al-Qayyim explained that silence is not mere absence of sound but positive restraint — a jihād of the nafs against the impulse to speak. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
    source_notes_fr: |
      Al-Nawawī plaça ce hadith parmi ses Quarante Hadiths et commenta que la plupart des péchés entrent par la langue : médisance, calomnie, faux témoignage et vaine dispute. Ibn al-Qayyim expliqua que le silence n'est pas le simple absence de son mais une retenue positive — un jihād du nafs contre l'impulsion de parler. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
    source_notes_ar: |
      وَضَعَ النَّوَوِيُّ هَذَا الْحَدِيثَ فِي أَرْبَعِينِيَّتِهِ وَعَلَّقَ بِأَنَّ أَكْثَرَ الذُّنُوبِ تَدْخُلُ مِنَ اللِّسَانِ. وَفَسَّرَ ابْنُ الْقَيِّمِ أَنَّ الصَّمْتَ لَيْسَ غَيَابَ صَوْتٍ بَلْ كَبْحًا إِيجَابِيًّا — جِهَادُ النَّفْسِ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
    display_day_of_year: 181
    source_url: https://sunnah.com/bukhari:6018
