  - slug: quran-story-the-owners-of-the-elephant
    category: quran_story
    title_en: "The Owners of the Elephant — When Birds Defeated an Army"
    title_ar: "أصحاب الفيل — حين هزمت الطيور جيوشاً"
    title_fr: "Les gens de l'éléphant — Quand des oiseaux vainquirent une armée"
    description_en: |
      In the year of the Prophet Muhammad's ﷺ birth, Abraha al-Ashram, the Abyssinian viceroy of Yemen, determined to destroy the Kaʿba in Mecca and divert Arab pilgrimage to his newly constructed cathedral in Sanaa. To accomplish this, he assembled a massive army that included war elephants, the tanks of the ancient world. The Quraysh, lacking the military means to resist such a force, retreated to the mountains and entrusted their defence to Allah alone.

      As the army approached Mecca, the lead elephant — named Maḥmūd — refused to advance toward the sanctuary, despite all coercion. Then Allah sent flights of small birds (*abābīl*) that pelted the invaders with stones of baked clay (*sijjīl*). Each stone struck its designated target with precision; the army was decimated, and Abraha fled in disgrace, his body reportedly rotting before he reached Yemen. The Quraysh recognised this as a divine vindication of the Kaʿba's sanctity, and the event became known as the Year of the Elephant.

      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, narrates the detailed reports of Ibn Isḥāq and others, noting that the birds were not merely natural creatures but instruments of direct divine intervention — each stone bore the name of its target. Al-Qurṭubī, in his *Tafsīr*, emphasises that Allah did not require angels or armies; the smallest of His creatures, carrying the smallest of projectiles, sufficed to demonstrate that protection of His House belongs to Him alone. Al-Ṭabarī preserves multiple *isnāds* confirming that the Arabs of Mecca neither fought nor negotiated, proving that reliance (*tawakkul*) upon Allah is itself a strategy. The lesson is one of proportion: the forces arrayed against truth may appear overwhelming, but the decisive factor is never numerical or technological — it is whose side Allah chooses. For the believer facing seemingly impossible odds, the *so what* is trust: has Allah ever failed to defend what is His?
    description_ar: |
      في عام مولد النبي ﷺ، عزم أبرهة الأشرم الوالي الحبشي لليمن على هدم الكعبة بمكة وتحويل الحج العربي إلى كاتدرائيته الجديدة بصنعاء. جمع جيشاً ضخماً ضمّ فيلةً حربيةً — دبابات العصر القديم. وقِرَشٌ عاجزون عسكرياً فانسحبوا إلى الجبال وسلّموا دفاعهم لله وحده.

      وبينما يقترب الجيش، امتنع الفيل المُقدّم — محمود — عن التقدم نحو الحرم رغم كل الإكراه. فأرسل الله طيوراً أبابيل ترميهم بحجارةٍ من سجيل. كل حجر أصاب هدفه بدقة؛ فُني الجيش وهرب أبرهة مذموماً، ويُروى أن جسده تعفّن قبل أن يصل اليمن. أدرك قريش أن ذلك تثبيتٌ إلهيٌ لحرمة الكعبة، وعُرف الحدث بعام الفيل.

      يذكر ابن كثير في البداية والنهاية بسند ابن إسحاق وغيره أن الطيور لم تكن مجرد مخلوقات طبيعية بل آلات تدخلٍ إلهي مباشر — كل حجر كان مكتوباً عليه اسم هدفه. ويُؤكد القرطبي أن الله لم يحتج إلى ملائكة أو جيوش؛ فأصغر مخلوقاته بحمل أصغر القذائف يكفي لإثبات أن حماية بيته له وحده. ويحفظ الطبري أسانيد متعددةٍ تُثبت أن مكة لم تقاتل ولا تفاوض، مُثبتةً أن التوكل على الله ذاته استراتيجية. العبرة: القوى المُصطفة ضد الحق قد تبدو ساحقةً، لكن العامل الحاسم ليس عددياً ولا تقنياً — بل من يختار الله نصرته.
    description_fr: |
      L'année de la naissance du Prophète Muhammad ﷺ, Abraha al-Ashram, le vice-roi abyssin du Yémen, décida de détruire la Kaʿba à La Mecque et de détourner le pèlerinage arabe vers sa cathédrale nouvellement construite à Sanaa. Pour cela, il rassembla une immense armée comprenant des éléphants de guerre, les chars de l'Antiquité. Les Quraysh, dépourvus des moyens militaires pour résister, se retirèrent dans les montagnes et confièrent leur défense à Allah seul.

      Alors que l'armée approchait de La Mecque, l'éléphant de tête — nommé Maḥmūd — refusa d'avancer vers le sanctuaire, malgré toute coercition. Alors Allah envoya des volées de petits oiseaux (*abābīl*) qui bombardèrent les envahisseurs de pierres d'argile cuite (*sijjīl*). Chaque pierre frappa sa cible désignée avec précision ; l'armée fut décimée, et Abraha s'enfuit dans la honte, son corps se serait décomposé avant qu'il n'atteigne le Yémen. Les Quraysh reconnurent en ceci une justification divine de la sainteté de la Kaʿba, et l'événement devint connu comme l'Année de l'Éléphant.

      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, rapporte les récits détaillés d'Ibn Isḥāq et d'autres, notant que les oiseaux n'étaient pas de simples créatures naturelles mais des instruments d'intervention divine directe — chaque pierre portait le nom de sa cible. Al-Qurṭubī, dans son *Tafsīr*, insiste sur le fait qu'Allah n'eut besoin ni d'anges ni d'armées ; la plus petite de Ses créatures, portant le plus petit des projectiles, suffit à démontrer que la protection de Sa Maison Lui appartient seule. Al-Ṭabarī conserve multiples *isnāds* confirmant que les Arabes de La Mecque ne combattirent ni ne négocièrent, prouvant que la confiance (*tawakkul*) en Allah est elle-même une stratégie. La leçon est une leçon de proportion : les forces rangées contre la vérité peuvent sembler écrasantes, mais le facteur décisif n'est jamais numérique ou technologique — c'est de quel côté Allah se range.
    reference: "Qur'an 105:1-5 (Surah al-Fil)"
    source_notes: |
      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, narrates the detailed reports of Ibn Isḥāq, noting that the birds were instruments of direct divine intervention — each stone bore the name of its target. Al-Qurṭubī emphasises that Allah did not require angels or armies; the smallest of His creatures sufficed to demonstrate that protection of His House belongs to Him alone.
    source_notes_fr: |
      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, rapporte les récits détaillés d'Ibn Isḥāq, notant que les oiseaux étaient des instruments d'intervention divine directe — chaque pierre portait le nom de sa cible. Al-Qurṭubī insiste sur le fait qu'Allah n'eut besoin ni d'anges ni d'armées ; la plus petite de Ses créatures suffit à démontrer que la protection de Sa Maison Lui appartient seul.
    source_notes_ar: |
      يَرْوِي ابنُ كَثِيرٍ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» رِوَايَاتِ ابْنِ إِسْحَاقَ المُفَصَّلَةَ، مُلَاحِظًا أَنَّ الطُّيُورَ كَانَتْ آلَاتِ تَدَخُّلٍ إِلَهِيٍّ مُبَاشِرٍ — كُلُّ حَجَرٍ كَانَ مَكْتُوبًا عَلَيْهِ اسْمُ هَدَفِهِ. وَيُؤَكِّدُ القُرْطُبِيُّ أَنَّ اللهَ لَمْ يَحْتَجْ إِلَى مَلَائِكَةٍ وَلاَ جُيُوشٍ؛ فَأَصْغَرُ خَلْقِهِ كَانَ يَكْفِي لِإِثْبَاتِ أَنَّ حِمَايَةَ بَيْتِهِ لَهُ وَحْدَهُ.
