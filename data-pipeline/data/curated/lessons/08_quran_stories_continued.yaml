  - slug: quran-story-the-night-journey
    category: quran_story
    title_en: "The Night Journey (Isra') — From the Haram to the Aqsa"
    title_ar: "الإسراء — من الحرم إلى الأقصى"
    title_fr: "Le Voyage nocturne (Isrāʾ) — Du Ḥaram à l'Aqṣā"
    description_en: |
      The Isrāʾ, the Night Journey, is one of the most extraordinary events in Islamic history. The Prophet Muhammad ﷺ was transported from the Sacred Mosque in Mecca to the Furthest Mosque (*al-Masjid al-Aqṣā*) in Jerusalem, a distance of over twelve hundred kilometres, in a single night — not by conventional travel but by divine conveyance. At the Aqṣā, he led the prophets in prayer, signifying the continuity of revelation and his primacy among Allah's messengers. The journey was both physical and spiritual; the Qurʾān describes it as a test of faith for the believers and a trial for the disbelievers, who mocked the apparent impossibility of the claim.

      The classical scholars emphasise that this event established the sacred connection between the two *ḥarams* — Mecca and Jerusalem — and that the Prophet's leadership of the prayers confirmed his universal prophethood. The journey was followed immediately by the Miʿrāj, the Ascension, though the two are distinct experiences and are treated separately in the Qurʾānic narrative.

      Ibn Kathīr, in his *Tafsīr*, narrates the detailed *ḥadīth* of the Isrāʾ from Anas ibn Mālik and others, noting that the Prophet ﷺ was awake throughout, not dreaming. Al-Qurṭubī discusses the theological implications: if Allah can transport a human across such distances in an instant, then the resurrection of bodies and the gathering of souls on the Last Day are equally within His power. Al-Ṭabarī preserves the early scholarly debates about whether the journey was bodily or spiritual, concluding with the majority view that it was both — the body travelled, but the mode of travel transcended natural law. The lesson is that Allah's power is not bounded by geography or physics; what is impossible for creation is effortless for the Creator. The *so what* is a recalibration of our concept of possibility — do we limit Allah by what we consider feasible?
    description_ar: |
      الإسراء من أعجب الأحداث في التاريخ الإسلامي. نُقل النبي ﷺ من المسجد الحرام بمكة إلى المسجد الأقصى بالقدس — مسافةٌ تزيد على ألف ومائتي كيلومتر — في ليلةٍ واحدةٍ، لا بالسفر الاعتيادي بل بالتنقلة الإلهية. في الأقصى أمّ الأنبياء في صلاةٍ، مُعلناً استمرارية الوحي وتقدمه في رسالات الله. كان الرحلة جسديةً وروحيةً؛ يصفها القرآن اختبار إيمانٍ للمؤمنين وفتنةً للكافرين الذين سخروا من الادعاء الظاهري المستحيل.

      يؤكد العلماء الكلاسيكيون أن الحدث أسّس الارتباط المقدّس بين الحرمين — مكة والقدس — وأن إمامة النبي ﷺ للصلاة أكّدت نبوته الكونية. تلت الرحلة مباشرةً المعراج، لكنهما تجربتان منفصلتان في السرد القرآني.

      يروي ابن كثير في تفسيره أحاديث الإسراء المفصّلة من أنس بن مالك وغيره، مُؤكداً أن النبي ﷺ كان يقظاً طوال الرحلة لا حلماً. ويناقش القرطبي الآثار اللاهوتية: إذا كان الله يستطيع نقل إنسانٍ عبر هذه المسافات في لحظةٍ، فإعادة الأجساد وحشر الأرواح يوم القيامة في مقدوره تماماً. ويحفظ الطبري المناقشات المبكرة حول كون الرحلة جسديةً أو روحيةً، خاتماً بالرأي الراجح بأنها كانت كلتيهما — جسدٌ سافر لكن الأسلوب تخطى القانون الطبيعي. العبرة: قدرة الله لا تُقيّدها الجغرافيا ولا الفيزياء؛ المستحيل على الخلق يسيرٌ على الخالق.
    description_fr: |
      L'Isrāʾ, le Voyage nocturne, est l'un des événements les plus extraordinaires de l'histoire islamique. Le Prophète Muhammad ﷷ fut transporté de la Mosquée Sacrée de La Mecque à la Mosquée la plus lointaine (*al-Masjid al-Aqṣā*) à Jérusalem, une distance de plus de douze cents kilomètres, en une seule nuit — non pas par un voyage conventionnel mais par un transport divin. À l'Aqṣā, il dirigea la prière des prophètes, signifiant la continuité de la révélation et sa primauté parmi les messagers d'Allah. Le voyage était à la fois physique et spirituel ; le Coran le décrit comme une épreuve de foi pour les croyants et une tentation pour les mécréants, qui se moquèrent de l'impossibilité apparente de cette affirmation.

      Les savants classiques insistent sur le fait que cet événement établit le lien sacré entre les deux *ḥarams* — La Mecque et Jérusalem — et que la direction de la prière par le Prophète confirmait sa prophétie universelle. Le voyage fut immédiatement suivi par le Miʿrāj, l'Ascension, bien que les deux soient des expériences distinctes et soient traitées séparément dans le récit coranique.

      Ibn Kathīr, dans son *Tafsīr*, rapporte le *ḥadīth* détaillé de l'Isrāʾ d'Anas ibn Mālik et d'autres, notant que le Prophète ﷷ fut éveillé tout du long, non pas en rêve. Al-Qurṭubī discute des implications théologiques : si Allah peut transporter un être humain sur de telles distances en un instant, alors la résurrection des corps et le rassemblement des âmes au Jour Dernier sont également en Son pouvoir. Al-Ṭabarī conserve les débats savants anciens sur la question de savoir si le voyage était corporel ou spirituel, concluant avec l'opinion majoritaire qu'il fut les deux — le corps voyagea, mais le mode de voyage transcenda la loi naturelle. La leçon est que le pouvoir d'Allah n'est pas limité par la géographie ou la physique ; ce qui est impossible pour la création est sans effort pour le Créateur.
    reference: "Qur'an 17:1 (Surah al-Isra); Bukhari 3207, Muslim 263"
    source_notes: |
      Ibn Kathīr narrates the detailed *ḥadīth* of the Isrāʾ from Anas ibn Mālik, noting that the Prophet ﷺ was awake throughout, not dreaming. Al-Qurṭubī discusses the theological implications: if Allah can transport a human across such distances in an instant, then the resurrection of bodies and the gathering of souls on the Last Day are equally within His power.
    source_notes_fr: |
      Ibn Kathīr rapporte le *ḥadīth* détaillé de l'Isrāʾ d'Anas ibn Mālik, notant que le Prophète ﷺ fut éveillé tout du long, non pas en rêve. Al-Qurṭubī discute des implications théologiques : si Allah peut transporter un être humain sur de telles distances en un instant, alors la résurrection des corps et le rassemblement des âmes au Jour Dernier sont également en Son pouvoir.
    source_notes_ar: |
      يَرْوِي ابنُ كَثِيرٌ فِي تَفْسِيرِهِ أَحَادِيثَ الْإِسْرَاءِ الْمُفَصَّلَةَ مِنْ أَنَسِ بْنِ مَالِكٍ، مُلَاحِظًا أَنَّ النَّبِيَّ ﷺ كَانَ يَقِظًا طَوَالَ الرِّحْلَةِ لَا حَالِمًا. وَيَنَاقِشُ الْقُرْطُبِيُّ الْآثَارَ اللَّاهُوتِيَّةَ: إِذَا كَانَ اللهُ يَسْتَطِيعُ نَقْلَ إِنْسَانٍ عَبْرَ هَذِهِ الْمَسَافَاتِ فِي لَحْظَةٍ، فَإِعَادَةُ الْأَجْسَادِ وَحَشْرُ الْأَرْوَاحِ يَوْمَ الْقِيَامَةِ فِي مَقْدُورِهِ تَمَامًا.
    display_day_of_year: 111
    quran_refs: "17:1"
    hadith_refs: "Bukhari 3207, Muslim 263"
