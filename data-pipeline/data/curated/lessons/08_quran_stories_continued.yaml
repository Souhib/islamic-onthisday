  - slug: quran-story-the-ascension-miraj
    category: quran_story
    title_en: "The Ascension (Mi'raj) — When the Prophet Met His Lord"
    title_ar: "المعراج — حين لقّي نبيه ربَّه"
    title_fr: "L'Ascension (Miʿrāj) — Quand le Prophète rencontra son Seigneur"
    description_en: |
      Following the Isrāʾ, the Prophet Muhammad ﷺ ascended through the seven heavens, accompanied by the Angel Jibrīl (Gabriel). At each heaven, he met a prophet: Ādam, Yaḥyā (John) and ʿĪsā (Jesus), Yūsuf (Joseph), Idrīs, Hārūn (Aaron), and Mūsā (Moses). At the seventh heaven, he approached the *Lote Tree of the Furthest Boundary* (*Sidrat al-Muntahā*), beyond which Jibrīl could not pass. The Prophet ﷺ continued alone into the Divine Presence, where he received the command for the five daily prayers (*ṣalāh*) — initially fifty, reduced to five through the intercession of Mūsā, who warned that the community would be unable to bear fifty.

      The Qurʾān alludes to this journey with majestic reserve, stating that the Prophet ﷺ saw "of the greatest signs of his Lord." The classical scholars debated the nature of what was seen, but the consensus is that the Miʿrāj was a direct encounter that confirmed the Prophet's unique station and established the centrality of prayer in Islamic life.

      Ibn Kathīr, in his *Tafsīr*, compiles the extensive *ḥadīth* narrations from Anas ibn Mālik and others, emphasising that the Prophet ﷺ was fully conscious and that the events occurred in real time, not in a vision. Al-Qurṭubī discusses the reduction of the prayers from fifty to five as a mercy — the five prayers carry the reward of fifty, demonstrating that Allah's generosity exceeds His demands. Al-Ṭabarī preserves the early view that the Miʿrāj was the occasion on which the Prophet's heart was purified, preparing him for the weight of revelation. The lesson is that nearness to Allah is possible but requires transcendence of ordinary limits; prayer is the bridge. The *so what* is an invitation to treat each *ṣalāh* as a small Miʿrāj — a meeting with the Divine.
    description_ar: |
      عقب الإسراء، عرج النبي ﷺ إلى السماوات السبع برفقة جبريل عليه السلام. في كل سماء لقي نبياً: آدم ويحيى وعيسى ويوسف وإدريس وهارون وموسى. في السماء السابعة اقترب من سدرة المنتهى حيث لا يجوز لجبريل أن يتجاوزها. واصل النبي ﷺ وحده إلى حضرة الله، حيث تسلّم أمر الصلوات الخمس — خمسون في البدء، خُفّضت إلى خمسةٍ بشفاعة موسى الذي حذّر من عجز الأمة عن خمسين.

      يشير القرآن إلى الرحلة باحتشامٍ مهيب، مُعلناً أن النبي ﷺ "رأى من آيات ربه الكبرى". ناقش العلماء الكلاسيكيون طبيعة ما رأى، لكن الإجماع أن المعراج لقاءٌ مباشرٌ أكّد مقام النبي ﷺ الفريد وأسّس مركزية الصلاة في الحياة الإسلامية.

      يجمع ابن كثير في تفسيره الأحاديث المطوّلة من أنس بن مالك وغيره، مُؤكداً أن النبي ﷺ كان مُدركاً تماماً وأن الأحداث وقعت في زمنٍ حقيقي لا رؤيا. ويناقش القرطبي تخفيض الصلوات من خمسين إلى خمس كرحمةٍ — الخمس تجلب أجر الخمسين، مُثبتةً أن كرم الله يفوق مطالبه. ويحفظ الطبري الرأي المبكر بأن المعراج كان المناسبة التي طُهّر فيها قلب النبي ﷺ استعداداً لوحي السماوات. العبرة: القرب من الله ممكنٌ لكنه يتطلب تجاوز الحدود الاعتيادية؛ الصلاة جسرٌ. الدعوة لاعتبار كل صلاةٍ معراجاً مصغّراً — لقاءً بالإله.
    description_fr: |
      Après l'Isrāʾ, le Prophète Muhammad ﷷ monta à travers les sept cieux, accompagné de l'Ange Jibrīl (Gabriel). À chaque ciel, il rencontra un prophète : Ādam, Yaḥyā (Jean) et ʿĪsā (Jésus), Yūsuf (Joseph), Idrīs, Hārūn (Aaron) et Mūsā (Moïse). Au septième ciel, il approcha du *Lote Tree de la Limite extrême* (*Sidrat al-Muntahā*), au-delà duquel Jibrīl ne pouvait passer. Le Prophète ﷷ continua seul dans la Présence Divine, où il reçut le commandement des cinq prières quotidiennes (*ṣalāh*) — initialement cinquante, réduites à cinq par l'intercession de Mūsā, qui avertit que la communauté ne pourrait supporter cinquante.

      Le Coran fait allusion à ce voyage avec une réserve majestueuse, déclarant que le Prophète ﷷ vit « des plus grands signes de son Seigneur. » Les savants classiques débattirent de la nature de ce qui fut vu, mais le consensus est que le Miʿrāj fut une rencontre directe qui confirma le station unique du Prophète et établit la centralité de la prière dans la vie islamique.

      Ibn Kathīr, dans son *Tafsīr*, compile les narrations *ḥadīth* étendues d'Anas ibn Mālik et d'autres, insistant sur le fait que le Prophète ﷷ fut pleinement conscient et que les événements se déroulèrent en temps réel, non pas dans une vision. Al-Qurṭubī discute de la réduction des prières de cinquante à cinq comme une miséricorde — les cinq prières portent la récompense de cinquante, démontrant que la générosité d'Allah dépasse Ses exigences. Al-Ṭabarī conserve l'ancienne opinion selon laquelle le Miʿrāj fut l'occasion où le cœur du Prophète fut purifié, le préparant au poids de la révélation. La leçon est que la proximité avec Allah est possible mais exige la transcendance des limites ordinaires ; la prière est le pont.
    reference: "Qur'an 53:1-18, 17:60, 81:19-25; Bukhari 3207, Muslim 162"
    source_notes: |
      Ibn Kathīr compiles the extensive *ḥadīth* narrations from Anas ibn Mālik, emphasising that the Prophet ﷺ was fully conscious and that the events occurred in real time, not in a vision. Al-Qurṭubī discusses the reduction of the prayers from fifty to five as a mercy — the five prayers carry the reward of fifty, demonstrating that Allah's generosity exceeds His demands.
    source_notes_fr: |
      Ibn Kathīr compile les narrations *ḥadīth* étendues d'Anas ibn Mālik, insistant sur le fait que le Prophète ﷺ fut pleinement conscient et que les événements se déroulèrent en temps réel, non pas dans une vision. Al-Qurṭubī discute de la réduction des prières de cinquante à cinq comme une miséricorde — les cinq prières portent la récompense de cinquante, démontrant que la générosité d'Allah dépasse Ses exigences.
    source_notes_ar: |
      يَجْمَعُ ابنُ كَثِيرٌ فِي تَفْسِيرِهِ الْأَحَادِيثَ الْمُطَوَّلَةَ مِنْ أَنَسِ بْنِ مَالِكٍ، مُؤَكِّدًا أَنَّ النَّبِيَّ ﷺ كَانَ مُدْرِكًا تَمَامًا وَأَنَّ الْأَحْدَاثَ وَقَعَتْ فِي زَمَنٍ حَقِيقِيٍّ لَا رُؤْيَا. وَيَنَاقِشُ الْقُرْطُبِيُّ تَخْفِيضَ الصَّلَوَاتِ مِنْ خَمْسِينَ إِلَى خَمْسٍ كَرَحْمَةٍ — الْخَمْسُ تَجْلِبُ أَجْرَ الْخَمْسِينَ، مُثْبِتَةً أَنَّ كَرَمَ اللهِ يَفُوقُ مُطَالِبَهُ.
