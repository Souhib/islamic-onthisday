  - slug: quran-story-the-munafiqun
    category: quran_story
    title_en: "The Hypocrites (Munafiqun) — When Words Mask Hearts"
    title_ar: "المنافقون — حين تُخفي الألسنة القلوب"
    title_fr: "Les Hypocrites (Munāfiqūn) — Quand les mots masquent les cœurs"
    description_en: |
      The Qurʾān devotes more attention to the hypocrites (*munāfiqūn*) than to the outright disbelievers, recognising that hidden corruption poses a greater danger to the Muslim community than open opposition. The archetypal hypocrite was ʿAbd Allāh ibn Ubayy ibn Salūl, a Medinan leader who nominally accepted Islam but continuously undermined it from within. When the Muslims marched to Uḥud, he withdrew his three hundred supporters at the last moment, nearly causing catastrophe. When the Prophet ﷺ married Zaynab bint Jaḥsh, he spread slander. When the Prophet ﷺ accepted the Treaty of Ḥudaybiyya, he openly questioned the terms.

      The Qurʾān exposes their psychology with surgical precision: they say with their tongues what is not in their hearts; they claim to believe but seek to deceive Allah and the believers; they are in the lowest depth of the Fire. Surah al-Munāfiqūn opens with the declaration that when the hypocrites come to the Prophet ﷺ, they swear by Allah that they are with him, but Allah bears witness that they are certainly liars.

      Ibn Kathīr, in his *Tafsīr*, traces the specific historical occasions for these revelations, noting that the hypocrites were often wealthy and socially prominent, making their influence particularly insidious. Al-Qurṭubī emphasises that the Qurʾān's detailed description of hypocrisy serves as a mirror — every Muslim is commanded to examine whether their public declarations match their private intentions. Al-Ṭabarī preserves the early consensus that the *munāfiqūn* were more dangerous than the *mushrikūn* because they could not be identified by appearance alone. The lesson is that sincerity (*ikhlāṣ*) is not merely a virtue but a survival mechanism for the community; a single hypocrite in a position of trust can do more damage than an army of open enemies. The believer's *so what* is an uncompromising self-examination: are my public religiosity and my private conduct aligned, or am I performing Islam while performing against it?
    description_ar: |
      يخصّص القرآن للمنافقين اهتماماً يفوق اهتمامه بالكافرين الصريحين، مدركاً أن الفساد الخفي أشدّ ضرراً على الجماعة المسلمة من المعارضة العلنية. المنافق الأرخيتيبي كان عبد الله بن أبيّ بن سلول، زعيمٌ مدنيٌّ ظاهره الإسلام لكنه أضمر الخراب من الداخل. حين زحف المسلمون إلى أحد، سحب ثلاثمائة من أنصاره في اللحظة الأخيرة، كاد يسبب كارثةً. حين تزوّج النبي ﷺ زينب بنت جحش، نشر القذف. وحين قبل النبي ﷺ صلح الحديبية، استنكر الشروط علناً.

      يكشف القرآن نفسيتهم بدقةٍ جراحيةٍ: يقولون بألسنتهم ما ليس في قلوبهم؛ يزعون الإيمان ويحاولون خداع الله والمؤمنين؛ هم في الدرك الأسفل من النار. تفتتح سورة المنافقون بالتصريح أن المنافقين حين يأتون النبي ﷺ يحلفون بالله إنهم معه، لكن الله يشهد أنهم لكاذبون.

      يتتبع ابن كثير في تفسيره المناسبات التاريخية المحددة لهذه الآيات، مُلاحظاً أن المنافقين كانوا غالباً أثرياءً مرموقين اجتماعياً، مما جعل نفوذهم خبيثاً بشكلٍ خاص. ويؤكد القرطبي أن الوصف القرآني المفصّل للنفاق يعمل مرآةً — يُأمر كل مسلم بفحص ما إذا كانت أقواله العلنية تتوافق مع نواياه الخاصة. ويحفظ الطبري إجماع السلف بأن المنافقين أشدّ خطراً من المشركين لأنهم لا يُعرفون بالمظهر. العبرة: الإخلاص ليس مجرد فضيلة بل آلية بقاء للجماعة؛ المنافق الواحد في موقع ثقةٍ يُحدث ضرراً يفوق جيشاً من الأعداء العلنيين. المحاسبة الصارمة: هل تتوازن ديانيتي العلنية مع سلوكي الخاص، أم أؤدّي الإسلام وأتآمر عليه؟
    description_fr: |
      Le Coran consacre plus d'attention aux hypocrites (*munāfiqūn*) qu'aux mécréants déclarés, reconnaissant que la corruption cachée constitue un danger plus grand pour la communauté musulmane que l'opposition ouverte. L'hypocrite archétypal était ʿAbd Allāh ibn Ubayy ibn Salūl, un leader médinois qui accepta nominalement l'Islam mais le sapait continuellement de l'intérieur. Quand les musulmans marchèrent sur Uḥud, il retira ses trois cents partisans au dernier moment, faillant provoquer une catastrophe. Quand le Prophète ﷷ épousa Zaynab bint Jaḥsh, il répandit la calomnie. Quand le Prophète ﷷ accepta le Traité de Ḥudaybiyya, il remit publiquement en question les termes.

      Le Coran expose leur psychologie avec une précision chirurgicale : ils disent de leurs langues ce qui n'est pas dans leurs cœurs ; ils prétendent croire mais cherchent à tromper Allah et les croyants ; ils sont dans le fond le plus bas du Feu. La Sourate al-Munāfiqūn s'ouvre sur la déclaration que quand les hypocrites viennent au Prophète ﷷ, ils jurent par Allah qu'ils sont avec lui, mais Allah témoigne qu'ils sont assurément des menteurs.

      Ibn Kathīr, dans son *Tafsīr*, retrace les occasions historiques spécifiques de ces révélations, notant que les hypocrites étaient souvent riches et socialement éminents, rendant leur influence particulièrement insidieuse. Al-Qurṭubī insiste sur le fait que la description coranique détaillée de l'hypocrisie sert de miroir — chaque musulman est commandé d'examiner si ses déclarations publiques correspondent à ses intentions privées. Al-Ṭabarī conserve le consensus ancien selon lequel les *munāfiqūn* étaient plus dangereux que les *mushrikūn* car ils ne pouvaient être identifiés par l'apparence seule. La leçon est que la sincérité (*ikhlāṣ*) n'est pas seulement une vertu mais un mécanisme de survie pour la communauté ; un seul hypocrite en position de confiance peut causer plus de dégâts qu'une armée d'ennemis ouverts. La leçon pour le croyant est un examen de conscience sans compromis : ma religiosité publique et ma conduite privée sont-elles alignées, ou est-ce que je joue l'Islam tout en agissant contre lui ?
    reference: "Qur'an 63:1-8 (Surah al-Munafiqun), 33:60-62 (Surah al-Ahzab)"
    source_notes: |
      Ibn Kathīr traces the specific historical occasions for these revelations, noting that the hypocrites were often wealthy and socially prominent, making their influence particularly insidious. Al-Qurṭubī emphasises that the Qur'an's detailed description of hypocrisy serves as a mirror — every Muslim is commanded to examine whether their public declarations match their private intentions.
    source_notes_fr: |
      Ibn Kathīr retrace les occasions historiques spécifiques de ces révélations, notant que les hypocrites étaient souvent riches et socialement éminents, rendant leur influence particulièrement insidieuse. Al-Qurṭubī insiste sur le fait que la description coranique détaillée de l'hypocrisie sert de miroir — chaque musulman est commandé d'examiner si ses déclarations publiques correspondent à ses intentions privées.
    source_notes_ar: |
      يَتَتَبَّعُ ابنُ كَثِيرٌ الْمُنَاسَبَاتِ التَّارِيخِيَّةِ الْمُحَدَّدَةِ لِهَذِهِ الْآيَاتِ، مُلَاحِظًا أَنَّ الْمُنَافِقِينَ كَانُوا غَالِبًا أَثْرِيَاءَ مَرْمُوقِينَ اجْتِمَاعِيًّا، مِمَّا جَعَلَ نُفُوذَهُمْ خَبِيثًا بِشَكْلٍ خَاصٍّ. وَيُؤَكِّدُ الْقُرْطُبِيُّ أَنَّ الْوَصْفَ الْقُرْآنِيَّ الْمُفَصَّلَ لِلنِّفَاقِ يَعْمَلُ مِرْآةً — يُؤْمَرُ كُلُّ مُسْلِمٍ بِفَحْصِ مَا إِذَا كَانَتْ أَقْوَالُهُ الْعَلَانِيَّةُ تَتَوَافَقُ مَعَ نَوَايَاهُ الْخَاصَّةِ.
