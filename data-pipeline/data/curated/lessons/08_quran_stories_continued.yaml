  - slug: quran-story-the-people-of-ad
    category: quran_story
    title_en: "The People of Ad — The Wind That Destroyed"
    title_ar: "قوم عاد — الريح التي أهلكت"
    title_fr: "Le peuple de ʿĀd — Le vent qui détruisit"
    description_en: |
      ʿĀd were the successors to the people of Nūḥ (Noah), granted physical stature and strength unmatched in the region. Their prophet was Hūd, upon him be peace, a noble Arab who called them to abandon their idolatry and to acknowledge Allah as the sole source of their blessings. They responded with defiance, boasting of their fortress-cities and their lineage. Hūd warned them that their material power was a loan, not an entitlement, and that Allah could replace them with another people who would not worship false gods. They challenged him to bring the punishment he threatened, believing their fortifications invincible.

      After a period of drought designed to awaken them, Allah sent against them a furious wind — not merely a storm, but a *rīḥ al-ʿaqīm* (sterile wind) that stripped vegetation, flayed skin, and toppled their proud structures. It blew for seven nights and eight days without respite. When it subsided, ʿĀd were found sprawled in their ruins as if they had been hollow trunks of palm trees, their immense bodies now carrion for the desolation they had created.

      Ibn Kathīr, in his *Tafsīr*, collects the reports describing this wind as possessing a destructive consciousness — it would lift a man and hurl him against a mountain, or bury him in the sand. Al-Qurṭubī notes that the drought preceding the wind was *istidrāj* (a gradual drawing-out), giving them opportunity after opportunity to repent. Al-Ṭabarī preserves the early scholarly view that ʿĀd's crime was *takabbur* (arrogance) rooted in their physical superiority — they believed their bodies made them immune to divine accountability. The lesson is a warning against all forms of structural pride: national, racial, economic, or institutional. The wind that destroyed ʿĀd still blows in history, and every civilisation that confuses its own strength with permanent entitlement risks becoming its next victim. The believer's *so what* is sobering: what fortress have I built that I believe will save me from Allah's decree?
    description_ar: |
      كان عاد خلفاً لقوم نوح، مُنعمين بجثةٍ وقوةٍ لا تُضاهى. نبيّهم هود عليه السلام، عربيٌّ كريم، دعاهم لترك عبادة الأصنام والاعتراف بالله مصدر نعمهم. أجابوا بالتمرد متبجحين بمدنهم المحصّنة وأنسابهم. حذّرهم هود بأن قوتهم المادية أمانة لا استحقاق، وأن الله يستخلف عليهم غيرهم. تحدّوه بإنزال العذاب ظانّين حصونهم منيعة.

      بعد جفافٍ استيقاظي، أرسل الله عليهم ريحاً صرصراً — ليست عاصفةً فحسب بل ريحاً عقيمةً تجرد النبات وتسلخ الجلد وتقلع الصروح. هبّت سبع ليالٍ وثمانية أيامٍ لا تُفتر. ولما سكنت، وجدوا عاد منبطحةً في خرابهم كأجذاع نخلٍ خاوية، أجسادهم الضخمة جيفاً للقفر الذي صنعوه.

      يجمع ابن كثير رواياتٍ تصف الريح بأنها كانت ذات وعيٍ هدام: ترفع الرجل وتطرحه على الجبل أو تدفنه في الرمال. ويلاحظ القرطبي أن الجفاف السابق كان استدراجاً يمنحهم فرصةً تلو الأخرى للتوبة. ويحفظ الطبري رأي السلف بأن جريمة عاد كانت الكبر المتأصّل في تفوقهم البدني — ظنوا أجسادهم حصانةً من المساءلة الإلهية. العبرة تحذيرٌ من كلّ تكبرٍ هيكلي: وطني أو عرقي أو مؤسسي. الريح التي أهلكت عاد لا تزال تهبّ في التاريخ، وكلّ حضارةٍ تُخلط قوتها بالاستحقاق الدائم تكون ضحيتها التالية.
    description_fr: |
      ʿĀd succédèrent au peuple de Nūḥ (Noé), dotés d'une taille et d'une force physiques sans égales dans la région. Leur prophète était Hūd, sur lui la paix, un noble Arabe qui les appela à abandonner leur idolâtrie et à reconnaître Allah comme seule source de leurs bénédictions. Ils répondirent par le défi, se vantant de leurs cités-forteresses et de leur lignée. Hūd les avertit que leur puissance matérielle était un prêt, non un droit, et qu'Allah pouvait les remplacer par un autre peuple qui n'adorerait pas de faux dieux. Ils le défiaient d'amener le châtiment qu'il menaçait, croyant leurs fortifications invincibles.

      Après une période de sécheresse destinée à les réveiller, Allah envoya contre eux un vent furieux — non pas simplement une tempête, mais un *rīḥ al-ʿaqīm* (vent stérile) qui dépouilla la végétation, écorcha la peau et renversa leurs fières structures. Il souffla pendant sept nuits et huit jours sans relâche. Quand il se calma, on trouva ʿĀd étendus dans leurs ruines comme des troncs creux de palmiers, leurs immenses corps maintenant charognes pour le désert qu'ils avaient créé.

      Ibn Kathīr, dans son *Tafsīr*, rassemble les rapports décrivant ce vent comme possédant une conscience destructrice — il soulevait un homme et le projetait contre une montagne, ou l'ensevelissait dans le sable. Al-Qurṭubī note que la sécheresse précédant le vent était un *istidrāj* (appel graduel), leur donnant occasion après occasion de se repentir. Al-Ṭabarī conserve l'avis savant ancien selon lequel le crime de ʿĀd était le *takabbur* (arrogance) enraciné dans leur supériorité physique — ils croyaient leurs corps immunisés contre la responsabilité divine. La leçon est un avertissement contre toutes les formes de fierté structurelle : nationale, raciale, économique ou institutionnelle. Le vent qui détruisit ʿĀd souffle encore dans l'histoire.
    reference: "Qur'an 11:50-60 (Surah Hud), 41:15-16 (Surah Fussilat), 46:21-26 (Surah al-Ahqaf)"
    source_notes: |
      Ibn Kathīr collects reports describing the wind as possessing a destructive consciousness — it would lift a man and hurl him against a mountain, or bury him in the sand. Al-Qurṭubī notes that the drought preceding the wind was *istidrāj* (a gradual drawing-out), giving them opportunity after opportunity to repent.
    source_notes_fr: |
      Ibn Kathīr rassemble les rapports décrivant ce vent comme possédant une conscience destructrice — il soulevait un homme et le projetait contre une montagne, ou l'ensevelissait dans le sable. Al-Qurṭubī note que la sécheresse précédant le vent était un *istidrāj* (appel graduel), leur donnant occasion après occasion de se repentir.
    source_notes_ar: |
      يَجْمَعُ ابنُ كَثِيرٌ رِوَايَاتٍ تَصِفُ الرِّيحَ بِأَنَّهَا كَانَتْ ذَاتَ وَعْيٍ هَدَّامٍ: تَرْفَعُ الرَّجُلَ وَتَطْرَحُهُ عَلَى الجَبَلِ أَوْ تَدْفِنُهُ فِي الرِّمَالِ. وَيَلْحَظُ القُرْطُبِيُّ أَنَّ الجَفَافَ السَّابِقَ كَانَ اسْتِدْرَاجًا يُمَنِّحُهُمْ فُرْصَةً تَلُو الأُخْرَى لِلتَّوْبَةِ.
