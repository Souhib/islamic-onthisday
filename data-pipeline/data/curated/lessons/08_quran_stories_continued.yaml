  - slug: quran-story-the-owners-of-the-garden
    category: quran_story
    title_en: "The Owners of the Garden — Greed and Its Consequence"
    title_ar: "أصحاب الجنّة — الطمع وعاقبته"
    title_fr: "Les propriétaires du jardin — L'avarice et sa conséquence"
    description_en: |
      The Qurʾān tells of pious brothers who inherited a flourishing garden from their righteous father. He had taught them to give a portion of its produce to the poor, but after his death, they conspired to harvest before dawn, excluding the destitute. They swore to carry out this plan, though one among them — the least assertive, yet the most righteous — counselled against it, reminding them to say "if Allah wills" and to fear the punishment of the needy whose portion they were stealing. They dismissed his warning and proceeded with their scheme.

      While they slept, Allah sent a fire that consumed the entire garden by morning. When they arrived at dawn, they found it blackened and barren. At first they blamed each other for their ruin; then the righteous brother reminded them that he had warned them. They acknowledged their wrongdoing and turned to Allah in repentance, praying to be granted something better in exchange. The Qurʾān closes the account by affirming that such is the punishment of the Hereafter — far greater — and that the punishment of this world is but a warning for those who would take heed.

      Ibn Kathīr, drawing from the *tafsīr* of Ibn ʿAbbās, notes that the fire was not merely physical but a removal of *baraka* (blessing) itself; the land remained, but its fruitfulness departed. Al-Qurṭubī emphasises that their oath to sin before dawn was itself a measure of their hearts' corruption — they did not merely neglect charity, they actively conspired against it. Al-Ṭabarī preserves the early report that their father's piety had established a *waqf* (endowment) for the poor, making their act not only greed but a violation of a sacred trust. The lesson is piercing: wealth is a stewardship, not a possession. To hoard it at the expense of the vulnerable is to invite its removal. For the believer, the *so what* is an audit of our own resources — what have we been entrusted with, and whom have we excluded?
    description_ar: |
      يحكي القرآن عن إخوةٍ متّقين ورثوا جنّةً مثمرةً عن أبيهم الصالح. كان يعلّمهم إعطاء حظّةٍ من ثمارها للفقراء، لكن بعد وفاته تآمروا على الحصاد قبل الفجر مستبعدين المساكين. أقسموا على تنفيذ المخطط، مع أن أحدهم — الأقل فرضاً والأتقى — نصحهم بأن يقولوا "إن شاء الله" وأن يخشوا عقاب المحرومين. فأهملوا تحذيره ونفّذوا مكرهم.

      بينما ناموا، أرسل الله ناراً أتلفت الجنّة بحلول الصباح. فلما وصلوا عند الفجر وجدوها محترقةً يابسةً. في البدء تلاوموا، ثم ذكّرهم الأخ الصالح بتحذيره. أقرّوا بذنبهم وتابوا إلى الله سائلين البديل الأفضل. ويُختم القرآن بأن عذاب الآخرة أشدّ، وأن عذاب الدنيا إنذارٌ للمعتبرين.

      يذكر ابن كثير برواية ابن عباس أن النار لم تكن جسديةً فحسب بل كانت سحباً للبركة؛ بقيت الأرض لكن خُصبتها ذهبت. ويُشدّد القرطبي على أن قسمهم بالمعصية قبل الفجر كان دلالةً على فساد قلوبهم؛ لم يُهملوا الصدقة فحسب بل تآمروا عليها. ويحفظ الطبري روايةً مبكرةً بأن تقوى أبيهم أسّست وقفاً للفقراء، فكان فعلهم ليس طمعاً فحسب بل خيانةً لأمانةٍ مقدسة. العبرة: المال وديعة لا ملك. حصره على حساب الضعفاء دعوةٌ لزواله. ندعو المؤمن إلى محاسبة موارده: ما الذي أُؤتمنّ عليه، ومن استثنيت؟
    description_fr: |
      Le Coran raconte l'histoire de frères pieux qui héritèrent d'un jardin florissant de leur père vertueux. Il leur avait appris à en consacrer une portion aux pauvres, mais après sa mort, ils conspirèrent pour récolter avant l'aube, excluant les nécessiteux. Ils jurèrent de mener à bien ce plan, bien que l'un d'eux — le moins affirmé, mais le plus vertueux — les conseillât d'ajouter « si Allah le veut » et de craindre le châtiment des démunis dont ils volaient la part. Imesse détournèrent son avertissement et exécutèrent leur plan.

      Pendant qu'ils dormaient, Allah envoya un feu qui consuma tout le jardin au matin. Quand ils arrivèrent à l'aube, ils le trouvèrent noirci et stérile. D'abord ils se blâmèrent mutuellement ; puis le frère vertueux leur rappela qu'il les avait avertis. Ils reconnurent leur faute et se tournèrent vers Allah en repentance, priant pour recevoir quelque chose de meilleur en échange. Le Coran conclut en affirmant que le châtiment de l'au-delà est bien plus grand, et que celui de ce monde n'est qu'un avertissement pour ceux qui veulent bien écouter.

      Ibn Kathīr, s'appuyant sur le *tafsīr* d'Ibn ʿAbbās, note que le feu n'était pas seulement physique mais un retrait de la *baraka* (bénédiction) elle-même ; la terre demeura, mais sa fertilité disparut. Al-Qurṭubī insiste sur le fait que leur serment de pécher avant l'aube était lui-même une mesure de la corruption de leurs cœurs — ils n'avaient pas seulement négligé la charité, ils avaient activement conspiré contre elle. Al-Ṭabarī conserve le rapport ancien selon lequel la piété de leur père avait établi un *waqf* (fondation) pour les pauvres, rendant leur acte non seulement avare mais une violation d'un trust sacré. La leçon est cinglante : la richesse est une intendance, non une possession. L'accumuler aux dépens des vulnérables, c'est inviter son retrait.
    reference: "Qur'an 68:17-33 (Surah al-Qalam)"
    source_notes: |
      Ibn Kathīr notes that the fire was not merely physical but a removal of *baraka* itself; the land remained, but its fruitfulness departed. Al-Ṭabarī preserves the early report that their father's piety had established a *waqf* for the poor, making their act not only greed but a violation of a sacred trust.
    source_notes_fr: |
      Ibn Kathīr note que le feu n'était pas seulement physique mais un retrait de la *baraka* elle-même ; la terre demeura, mais sa fertilité disparut. Al-Ṭabarī conserve le rapport ancien selon lequel la piété de leur père avait établi un *waqf* pour les pauvres, rendant leur acte non seulement avare mais une violation d'un trust sacré.
    source_notes_ar: |
      يُلَاحِظُ ابنُ كَثِيرٍ أَنَّ النَّارَ لَمْ تَكُنْ جَسَدِيَّةً فَحَسْبُ بَلْ كَانَتْ سَحْبًا لِلْبَرَكَةِ؛ بَقِيَتِ الأَرْضُ لَكِنَّ خُصُوبَتَهَا ذَهَبَتْ. وَيَحْفِظُ الطَّبَرِيُّ رِوَايَةً مُبَكِّرَةً بِأَنَّ تَقْوَى أَبِيهِمْ أَسَّسَتْ وَقْفًا لِلْفُقَرَاءِ، فَكَانَ فِعْلُهُمْ لَيْسَ طَمَعًا فَحَسْبُ بَلْ خِيَانَةً لِأَمَانَةٍ مُقَدَّسَةٍ.
    display_day_of_year: 91
    quran_refs: "68:17-33"
    hadith_refs: "Bukhari 1400, Muslim 1023"
    source_url: ""

  - slug: quran-story-the-people-of-thamud
    category: quran_story
    title_en: "The People of Thamud — The She-Camel of Allah"
    title_ar: "قوم ثمود — ناقة الله"
    title_fr: "Le peuple de Thamoud — La chamelle d'Allah"
    description_en: |
      Thamūd were a mighty people who carved their dwellings into mountains and excelled in construction. Allah sent them a prophet from among themselves — Ṣāliḥ, upon him be peace — who called them to abandon the worship of idols and to serve Allah alone. They demanded a miracle as proof, and Ṣāliḥ, with divine permission, pointed to a solid rock from which a pregnant she-camel would emerge as a *muʿjiza*. The camel became a living test: she would drink from their well on alternate days, and they were forbidden from harming her. For a time, the people marvelled, but their leaders, resenting the restriction on their water, conspired to hamstring her.

      A wicked man among them carried out the deed, and the entire community was implicated by their collective assent or silence. Ṣāliḥ warned them that they had three days before punishment would descend. They mocked him, but on the third day, a deafening cry (*ṣayḥa*) seized them, and an overwhelming earthquake levelled their carved homes. They were found dead in their dwellings, fallen forward as if prostrating — a grim irony for a people who had refused the true prostration of worship.

      Ibn Kathīr, in his *Tafsīr*, compiles the reports that the camel's emergence from solid rock was a miracle of creation (*ikhrāj*), parallel to the creation of Adam without parents. Al-Qurṭubī, in *al-Jāmiʿ*, highlights that the she-camel was not merely a sign but a *mīthāq* (solemn covenant); harming her was breaking their treaty with Allah. Al-Ṭabarī preserves the early consensus that Thamūd's crime was compounded by their arrogance — they were a people of *ʿimāra* (civilisation) who mistook material grandeur for divine favour. The lesson is timeless: prosperity is a trial, not a proof of virtue. When blessings become the basis for defiance, they transform rapidly into evidence for prosecution. The believer asks: has any modern privilege become my she-camel — a gift I resent rather than treasure?
    description_ar: |
      كان ثمود قوماً عُتاةً ينحتون مساكنهم من الجبال ويبهرون في البناء. فبعث الله فيهم نبياً منهم — صالحاً عليه السلام — دعاهم إلى ترك عبادة الأصنام وتوحيد الله. طالبوه بمعجزةٍ فأشار إلى صخرةٍ صماء تنبثق منها ناقةٌ حاملةً معجزةً. صارت الناقة اختباراً حياً: تشرب من بئريهم يوماً ويوماً، ونُهوا عن إيذائها. دهشوا مدةً، لكن كبراءهم كرهوا قيودهم على الماء فتآمروا على عقرها.

      نفّذ أشريرهم الفعل، واشتركت القومية بالرضوخ أو الصمت. حذّرهم صالح بأن لهم ثلاثة أيامٍ قبل نزول العقاب. سخروا منه، لكن يوم الثالثة أخذتهم الصيحة وزلزالٌ مدمرٌ رمى بمساكنهم المنحوتة. وجدوا جثثاً في دورهم ساقطةً على وجوههم كالساجدين — سخريةٌ مرعبةٌ لقومٍ أبوا السجود الحقيقي.

      يجمع ابن كثير في تفسيره رواياتٍ تُبيّن أن خروج الناقة من الصخر كانت معجزة إخراجٍ توازي خلق آدم. ويُبرز القرطبي أن الناقة لم تكن آيةً فحسب بل ميثاقاً؛ عقرها نقضٌ للعهد الإلهي. ويحفظ الطبري إجماع السلف على أن جريمة ثمود تفاقمت بكبريائهم — كانوا قوم عمارةٍ ظنوا العظمة المادية دلالةً على رضى الله. العبرة: النعمة اختبار لا برهان على الفضيلة. حين تصير المكاسب أساساً للتمرد تتحوّل بسرعةٍ إلى حجةٍ للإدانة.
    description_fr: |
      Thamūd était un peuple puissant qui taillait ses demeures dans les montagnes et excellait dans la construction. Allah leur envoya un prophète d'entre eux — Ṣāliḥ, sur lui la paix — qui les appela à abandonner le culte des idoles et à servir Allah seul. Ils exigèrent un miracle comme preuve, et Ṣāliḥ, avec la permission divine, désigna un rocher solide d'où émergerait une chamelle pleine comme *muʿjiza*. La chamelle devint une épreuve vivante : elle boirait à leur puits un jour sur deux, et il leur était interdit de lui faire du mal. Pendant un temps, le peuple s'émerveilla, mais ses chefs, ressentant la restriction sur leur eau, conspirèrent pour lui trancher les jarrets.

      Un méchant parmi eux exécuta le forfait, et toute la communauté fut impliquée par son assentiment collectif ou son silence. Ṣāliḥ les avertit qu'ils avaient trois jours avant que le châtiment ne descende. Ils se moquèrent de lui, mais le troisième jour, un cri assourdissant (*ṣayḥa*) les saisit, et un tremblement de terre écrasant ras leurs demeures taillées. On les trouva morts dans leurs habitations, tombés en avant comme en prostration — une ironie sinistre pour un peuple qui avait refusé la vraie prosternation de l'adoration.

      Ibn Kathīr, dans son *Tafsīr*, compile les rapports selon lesquels l'émergence de la chamelle du rocher était un miracle de création (*ikhrāj*), parallèle à la création d'Adam sans parents. Al-Qurṭubī, dans *al-Jāmiʿ*, souligne que la chamelle n'était pas seulement un signe mais un *mīthāq* (pacte solennel) ; lui faire du mal était rompre leur traité avec Allah. Al-Ṭabarī conserve le consensus ancien selon lequel le crime de Thamūd fut aggravé par leur arrogance — c'étaient un peuple de *ʿimāra* (civilisation) qui confondirent la grandeur matérielle avec la faveur divine. La leçon est intemporelle : la prospérité est une épreuve, non une preuve de vertu.
    reference: "Qur'an 11:61-68 (Surah Hud), 26:141-159 (Surah al-Shu'ara), 54:23-31 (Surah al-Qamar)"
    source_notes: |
      Ibn Kathīr compiles reports that the camel's emergence from solid rock was a miracle of creation (*ikhrāj*), parallel to the creation of Ādam without parents. Al-Qurṭubī highlights that the she-camel was not merely a sign but a *mīthāq* (solemn covenant); harming her was breaking their treaty with Allah.
    source_notes_fr: |
      Ibn Kathīr compile les rapports selon lesquels l'émergence de la chamelle du rocher était un miracle de création (*ikhrāj*), parallèle à la création d'Ādam sans parents. Al-Qurṭubī souligne que la chamelle n'était pas seulement un signe mais un *mīthāq* (pacte solennel) ; lui faire du mal était rompre leur traité avec Allah.
    source_notes_ar: |
      يَجْمَعُ ابنُ كَثِيرٌ رِوَايَاتٍ تُبَيِّنُ أَنَّ خُرُوجَ النَّاقَةِ مِنَ الصَّخْرِ كَانَتْ مُعْجِزَةَ إِخْرَاجٍ تُوَازِي خَلْقَ آدَمَ بِلَا وَالِدَيْنِ. وَيُبَرِّزُ القُرْطُبِيُّ أَنَّ النَّاقَةَ لَمْ تَكُنْ آيَةً فَحَسْبُ بَلْ مِيثَاقًا؛ عَقْرُهَا نَقْضٌ لِلْعَهْدِ الإِلَهِيِّ.
