  - slug: quran-story-the-story-of-uzayr
    category: quran_story
    title_en: "Uzayr and the Dead City — A Hundred Years Pass in a Sleep"
    title_ar: "عزير والمدينة الميتة — مئة عامٍ في نومةٍ"
    title_fr: "ʿUzayr et la ville morte — Cent ans passent dans un sommeil"
    description_en: |
      The Qurʾān presents the story of ʿUzayr (Ezra), a pious Israelite who passed by a town that had been utterly destroyed — its roofs collapsed, its doors fallen, its walls crumbling. He wondered how Allah could revive this place after its death. In response, Allah caused him to die for a hundred years, then raised him up. His food remained fresh, untouched by decay, while his donkey had decomposed to bare bones. When Allah reassembled the donkey before his eyes — restoring flesh, then life, then movement — ʿUzayr understood that Allah is over all things competent.

      The classical exegetes differ on whether ʿUzayr was a prophet or merely a righteous man, but they agree on the story's purpose: to demonstrate Allah's power over time, decay, and resurrection. The hundred years were not a punishment but a pedagogy; ʿUzayr's question was sincere, and Allah answered it with direct experience rather than mere argument.

      Ibn Kathīr, in his *Tafsīr*, compiles the reports that ʿUzayr's sleep was a gentle death from which he was restored whole, preserving his food as a sign and decomposing his donkey as a contrast. Al-Qurṭubī emphasises that the restoration of the donkey — bone by bone, sinew by sinew — is a precise parallel to the resurrection of human beings on the Last Day, making this story an eschatological proof. Al-Ṭabarī preserves the early view that ʿUzayr's astonishment upon waking was the intended effect: if a man can be restored after a century, then the resurrection of all humanity after millennia is equally within Allah's power. The lesson is that our notions of time and impossibility are human constraints, not divine ones. The *so what* is a consolation for the grieving and the anxious: what seems irreversibly lost to time is never lost to Allah.
    description_ar: |
      يعرض القرآن قصة عزير — إسرائيليٌّ تقيٌّ مرّ بقريةٍ خربت كلياً — أسقفها منهارةٌ وأبوابها ساقطةٌ وجدرانها متآكلةٌ. تساءل كيف يحيي الله هذه البلدة بعد موتها. فأماته الله مئة عامٍ ثم بعثه. بقي طعامه طازجاً بلا تعفّن، بينما تحلّل حماره عظماً عريضاً. حين أعاد الله تركيب الحمار أمام عينيه — لحماً ثم روحاً ثم حركة — أدرك عزير أن الله على كل شيءٍ قدير.

      يختلف المفسّرون الكلاسيكيون في كون عزير نبياً أو رجلاً صالحاً فحسب، لكنهم يتفقون على الغرض: إثبات قدرة الله على الزمن والتحلل والبعث. المئة عامٍ لم تكن عقاباً بل تربيةً؛ كان سؤال عزير صادقاً وأجابه الله بالتجربة المباشرة لا بالجدل المجرد.

      يجمع ابن كثير في تفسيره رواياتٍ تُفيد بأن نوم عزير كان موتاً هيناً أُعيد منه سليماً، محافظاً على طعامه علامةً ومحلّلاً حماره تناقضاً. ويؤكد القرطبي أن إعادة الحمار — عظماً عظماً وعصباً عصباً — توازيٌ دقيقٌ لبعث البشر يوم القيامة، مُحوّلةً القصة برهاناً إسكاتولوجياً. ويحفظ الطبري الرأي المبكر بأن دهشة عزير عند استيقاظه كانت التأثير المقصود: إذا استعاد إنسانٌ حياته بعد قرنٍ، فبعث البشرية جمعاء بعد آلاف السنين في مقدور الله تماماً. العبرة: مفاهيمنا للزمن والاستحالة قيودٌ بشريةٌ لا إلهية. العزاء للحزين والقلق: ما يبدو مفقوداً للزمن إلى الأبد ليس مفقوداً على الله.
    description_fr: |
      Le Coran présente l'histoire de ʿUzayr (Esdras), un Israélite pieux qui passa près d'une ville qui avait été complètement détruite — ses toits effondrés, ses portes tombées, ses murs en ruine. Il se demanda comment Allah pourrait ranimer cet endroit après sa mort. En réponse, Allah le fit mourir pendant cent ans, puis le ressuscita. Sa nourriture resta fraîche, intacte par la décomposition, tandis que son âne s'était décomposé jusqu'aux os nus. Quand Allah réassembla l'âne devant ses yeux — restaurant la chair, puis la vie, puis le mouvement — ʿUzayr comprit qu'Allah est sur toute chose puissant.

      Les exégètes classiques diffèrent sur la question de savoir si ʿUzayr était un prophète ou simplement un homme vertueux, mais ils s'accordent sur le but de l'histoire : démontrer le pouvoir d'Allah sur le temps, la décomposition et la résurrection. Les cent ans n'étaient pas un châtiment mais une pédagogie ; la question de ʿUzayr était sincère, et Allah y répondit par l'expérience directe plutôt que par un simple argument.

      Ibn Kathīr, dans son *Tafsīr*, compile les rapports selon lesquels le sommeil de ʿUzayr était une mort douce dont il fut restauré intact, préservant sa nourriture comme signe et décomposant son âne comme contraste. Al-Qurṭubī insiste sur le fait que la restauration de l'âne — os par os, tendon par tendon — est un parallèle précis de la résurrection des êtres humains au Jour Dernier, faisant de cette histoire une preuve eschatologique. Al-Ṭabarī conserve l'ancienne opinion selon laquelle l'étonnement de ʿUzayr en se réveillant était l'effet recherché : si un homme peut être restauré après un siècle, alors la résurrection de toute l'humanité après des millénaires est également en le pouvoir d'Allah. La leçon est que nos notions de temps et d'impossibilité sont des contraintes humaines, pas divines. La consolation pour les endeuillés et les anxieux : ce qui semble irrémédiablement perdu dans le temps n'est jamais perdu pour Allah.
    reference: "Qur'an 2:259 (Surah al-Baqara)"
    source_notes: |
      Ibn Kathīr compiles reports that ʿUzayr's sleep was a gentle death from which he was restored whole, preserving his food as a sign and decomposing his donkey as a contrast. Al-Qurṭubī emphasises that the restoration of the donkey — bone by bone, sinew by sinew — is a precise parallel to the resurrection of human beings on the Last Day, making this story an eschatological proof.
    source_notes_fr: |
      Ibn Kathīr compile les rapports selon lesquels le sommeil de ʿUzayr était une mort douce dont il fut restauré intact, préservant sa nourriture comme signe et décomposant son âne comme contraste. Al-Qurṭubī insiste sur le fait que la restauration de l'âne — os par os, tendon par tendon — est un parallèle précis de la résurrection des êtres humains au Jour Dernier, faisant de cette histoire une preuve eschatologique.
    source_notes_ar: |
      يَجْمَعُ ابنُ كَثِيرٌ رِوَايَاتٍ تُفِيدُ بِأَنَّ نَوْمَ عُزَيْرٍ كَانَ مَوْتًا هَيِّنًا أُعِيدَ مِنْهُ سَلِيمًا، مُحَافِظًا عَلَى طَعَامِهِ عَلَامَةً وَمُحَلِّلًا حِمَارَهُ تَنَاقُضًا. وَيُؤَكِّدُ الْقُرْطُبِيُّ أَنَّ إِعَادَةَ الْحِمَارِ — عَظْمًا عَظْمًا وَعَصَبًا عَصَبًا — تَوَازُنٌ دَقِيقٌ لِبَعْثِ الْإِنْسَانِ يَوْمَ الْقِيَامَةِ، مُحَوِّلَةً الْقِصَّةَ بُرْهَانًا إِسْكَاتُولُوجِيًّا.
