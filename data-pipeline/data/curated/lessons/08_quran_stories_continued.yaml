  - slug: quran-story-the-conquest-of-mecca-in-quran
    category: quran_story
    title_en: "The Conquest of Mecca in the Qur'an — Mercy Over Vengeance"
    title_ar: "فتح مكة في القرآن — الرحمة فوق الانتقام"
    title_fr: "La conquête de La Mecque dans le Coran — La miséricorde plutôt que la vengeance"
    description_en: |
      In the eighth year AH, the Prophet Muhammad ﷺ entered Mecca at the head of an army of approximately ten thousand believers — the same city that had expelled him, tortured his Companions, and waged war against him for two decades. The Quraysh expected annihilation. Instead, the Prophet ﷺ announced a general amnesty, declaring that those who entered the house of Abū Sufyān (the Quraysh leader who had submitted) were safe, those who locked their doors were safe, and those who entered the sacred mosque were safe. He then addressed the assembled Meccans with the words of Yūsuf (Joseph) to his brothers: "No blame will there be upon you today. Allah will forgive you; and He is the most merciful of the merciful."

      The Qurʾān had foretold this moment in Surah al-Fatḥ, revealed during the Treaty of Ḥudaybiyya two years earlier, when victory seemed impossible. It announced that Allah would grant a manifest victory, forgive past sins, guide the believers, and subdue the hearts of the Meccans — which is precisely what occurred. Some of the most virulent enemies of Islam, witnessing this clemency, embraced the faith on the spot.

      Ibn Kathīr, in his *Tafsīr*, notes that the Prophet's choice to pardon rather than punish was not strategic weakness but the fulfilment of his character as described in the Qurʾān — a mercy to the worlds. Al-Qurṭubī emphasises that Surah al-Naṣr, with its command to glorify Allah and seek forgiveness after victory, was revealed precisely to prevent triumphalism; the conquest was an occasion for humility, not hubris. Al-Ṭabarī records that the Prophet destroyed the idols around the Kaʿba with his own hand, saying, "Truth has come and falsehood has departed," establishing that mercy toward people is compatible with, indeed requires, the eradication of false worship. The lesson is that real strength is measured by restraint, not retaliation. The *so what* challenges the believer: when we finally gain the upper hand, do we become what we once fought against, or do we transcend it?
    description_ar: |
      في السنة الثامنة للهجرة، دخل النبي ﷺ مكة على رأس جيشٍ نحو عشرة آلاف مسلم — تلك المدينة التي أخرجته وعذّبت صحابته وحاربته عقدين. توقع قريش الإبادة. لكن النبي ﷺ أعلن عفواً عاماً: من دخل دار أبي سفيان فهو آمن، ومن أغلق بابه فهو آمن، ومن دخل المسجد الحرام فهو آمن. ثم خاطب مكة بكلمات يوسف لإخوته: "لا تثريب عليكم اليوم يغفر الله لكم وهو أرحم الراحمين."

      بشّر القرآن بهذه اللحظة في سورة الفتح، نازلةً أثناء صلح الحديبية قبل عامين حين بدا النصر مستحيلاً. أعلن الله نصراً مبيناً ومغفرةً وهدايةً وتسخيناً لقلوب قريش — وهذا ما حصل بالضبط. فشهد بعض ألدّ أعداء الإسلام هذه الرحمة فأسلموا في الحال.

      يذكر ابن كثير أن اختيار النبي ﷺ للعفو لا العقاب لم يكن ضعفاً استراتيجياً بل تحقيقاً لخلقه المُعلن في القرآن رحمةً للعالمين. ويؤكد القرطبي أن سورة النصر بأمرها بالتسبيح والاستغفار بعد النصر نزلت تحديداً لمنع النصرانية؛ الفتح مناسبةٌ للتواضع لا الغطرسة. ويسجل الطبري أن النبي ﷺ هدم الأصنام بيده حول الكعبة قائلاً: "جاء الحق وزهق الباطل"، مُثبتاً أن الرحمة بالناس تتطلب إزالة العبادة الباطلة. العبرة: القوة الحقيقية تُقاس بالضبط لا الردّ.
    description_fr: |
      En la huitième année de l'Hégire, le Prophète Muhammad ﷷ entra à La Mecque à la tête d'une armée d'environ dix mille croyants — la même ville qui l'avait expulsé, torturé ses Compagnons et fait la guerre contre lui pendant deux décennies. Les Quraysh s'attendaient à l'anéantissement. Au lieu de cela, le Prophète ﷷ annonça une amnistie générale, déclarant que ceux qui entraient dans la maison d'Abū Sufyān (le chef qurayshite qui s'était soumis) étaient en sécurité, ceux qui fermaient leurs portes étaient en sécurité, et ceux qui entraient dans la mosquée sacrée étaient en sécurité. Il s'adressa ensuite aux Mecquois assemblés avec les paroles de Yūsuf (Joseph) à ses frères : « Il n'y aura aucun reproche contre vous aujourd'hui. Allah vous pardonnera ; et Il est le plus miséricordieux des miséricordieux. »

      Le Coran avait prédit ce moment dans la Sourate al-Fatḥ, révélée lors du Traité de Ḥudaybiyya deux ans plus tôt, quand la victoire semblait impossible. Il annonça qu'Allah accorderait une victoire manifeste, pardonnerait les péchés passés, guiderait les croyants et soumettrait les cœurs des Mecquois — ce qui advint précisément. Certains des ennemis les plus virulents de l'Islam, témoins de cette clémence, embrassèrent la foi sur-le-champ.

      Ibn Kathīr, dans son *Tafsīr*, note que le choix du Prophète de pardonner plutôt que punir n'était pas une faiblesse stratégique mais l'accomplissement de son caractère tel que décrit dans le Coran — une miséricorde pour les mondes. Al-Qurṭubī insiste sur le fait que la Sourate al-Naṣr, avec son commandement de glorifier Allah et de chercher le pardon après la victoire, fut révélée précisément pour prévenir le triomphalisme ; la conquête était une occasion d'humilité, pas d'orgueil. Al-Ṭabarī rapporte que le Prophète détruisit les idoles autour de la Kaʿba de sa propre main, disant : « La vérité est venue et le faux s'est envolé », établissant que la miséricorde envers les gens est compatible avec, et exige même, l'éradication du faux culte. La leçon est que la vraie force se mesure à la retenue, non à la rétorsion.
    reference: "Qur'an 48:1-4 (Surah al-Fath), 110:1-3 (Surah al-Nasr)"
    source_notes: |
      Ibn Kathīr notes that the Prophet's choice to pardon rather than punish was not strategic weakness but the fulfilment of his character as described in the Qur'an — a mercy to the worlds. Al-Qurṭubī emphasises that Surah al-Naṣr, with its command to glorify Allah and seek forgiveness after victory, was revealed precisely to prevent triumphalism.
    source_notes_fr: |
      Ibn Kathīr note que le choix du Prophète de pardonner plutôt que punir n'était pas une faiblesse stratégique mais l'accomplissement de son caractère tel que décrit dans le Coran — une miséricorde pour les mondes. Al-Qurṭubī insiste sur le fait que la Sourate al-Naṣr, avec son commandement de glorifier Allah et de chercher le pardon après la victoire, fut révélée précisément pour prévenir le triomphalisme.
    source_notes_ar: |
      يُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ اخْتِيَارَ النَّبِيِّ ﷺ لِلْعَفْوِ لَا الْعِقَابِ لَمْ يَكُنْ ضَعْفًا اسْتِرَاتِيجِيًّا بَلْ تَحْقِيقًا لِخُلُقِهِ الْمُعْلَنِ فِي الْقُرْآنِ رَحْمَةً لِلْعَالَمِينَ. وَيُؤَكِّدُ الْقُرْطُبِيُّ أَنَّ سُورَةَ النَّصْرِ بِأَمْرِهَا بِالتَّسْبِيحِ وَالِاسْتِغْفَارِ بَعْدَ النَّصْرِ نَزَلَتْ تَحْدِيدًا لِمَنْعِ النَّصْرَانِيَّةِ.
