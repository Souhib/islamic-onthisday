  - slug: quran-story-the-first-revelation
    category: quran_story
    title_en: "The First Revelation — 'Read in the Name of Your Lord'"
    title_ar: "الوحي الأول — اقرأ باسم ربك"
    title_fr: "La première révélation — « Lis au nom de ton Seigneur »"
    description_en: |
      In the Cave of Ḥirāʾ on the Mountain of Light (*Jabal al-Nūr*) near Mecca, the Prophet Muhammad ﷺ was deep in his habitual retreat when the Angel Jibrīl appeared to him with a command that would transform human history: "Read!" The Prophet ﷺ, who was unlettered, replied that he could not read. Jibrīl embraced him until he could bear it no longer, then released him and repeated the command. This occurred three times, after which the first verses of Surah al-ʿAlaq were revealed: "Read in the name of your Lord who created — created man from a clinging clot. Read, and your Lord is the most generous, who taught by the pen, taught man that which he knew not."

      The Prophet ﷺ fled the cave in terror, hearing the voice of Jibrīl reassuring him, and returned to Khadīja, who wrapped him in a cloak and comforted him. She took him to her cousin Waraqa ibn Nawfal, a Christian scholar who recognised the description of the angel as the same one who had come to Mūsā, and declared that Muhammad ﷺ was the prophet of his people.

      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, traces the psychological trajectory of the Prophet ﷺ from terror to acceptance, noting that the embrace of Jibrīl was not punishment but preparation — the weight of revelation required a fortified constitution. Al-Qurṭubī emphasises that the first word revealed was "Read" (*iqraʾ*), establishing knowledge, inquiry, and literacy as foundational to the Islamic project. Al-Ṭabarī preserves the early reports that the Prophet's illiteracy was itself a proof of the Qurʾān's miraculous nature — he could not have composed it. The lesson is that divine calling often arrives as disturbance before it becomes direction; the initial encounter with truth is frequently frightening. The *so what* asks: when we are called to something beyond our capacity, do we flee like the Prophet initially did, or do we find our Khadīja — the community that believes in us until we believe in ourselves?
    description_ar: |
      في غار حراء بجبل النور قرب مكة، كان النبي ﷺ في اعتكافه المعتاد حين ظهر له جبريل بأمرٍ سيُغير التاريخ البشري: "اقرأ!" فأجاب النبي ﷺ الأمي: "ما أنا بقارئ." فعانقه جبريل حتى بلغ منه الجهد، ثم تركه وأعاد الأمر. تكرر ذلك ثلاث مراتٍ، ثم نزلت آيات سورة العلق الأولى: "اقرأ باسم ربك الذي خلق، خلق الإنسان من علق. اقرأ وربك الأكرم، الذي علّم بالقلم، علّم الإنسان ما لم يعلم."

      هرب النبي ﷺ من الغار مذعوراً، يسمع تسلية جبريل، وعاد إلى خديجة فلفّته بثوبٍ وآوته. أخذته إلى ابن عمها ورقة بن نوفل — عالمٌ نصرانيٌّ عرف وصف الملك بأنه نفسه الذي جاء لموسى، وأعلن أن محمداً ﷺ نبيّ قومه.

      يتتبع ابن كثير في البداية والنهاية المسار النفسي للنبي ﷺ من الفزع إلى القبول، مُلاحظاً أن عناق جبريل لم يكن عقاباً بل تجهيزاً — ثقل الوحي يتطلب بنيةً مُقوّاة. ويؤكد القرطبي أن أول كلمةٍ نزلت "اقرأ"، مُأسّساً للعلم والاستقصاء والمحوية كقاعدةٍ للمشروع الإسلامي. ويحفظ الطبري رواياتٍ مبكرةً بأمية النبي ﷺ كانت برهاناً على إعجاز القرآن — لم يكن ليؤلفه. العبرة: النداء الإلهي غالباً يأتي اضطراباً قبل أن يصير توجيهاً؛ اللقاء الأول بالحق غالباً مخيف. السؤال: حين نُدعى لما يفوق طاقتنا، هل نفرّ كالنبي ﷺ في البدء، أم نجد "خديجتنا" — الجماعة التي تؤمن بنا حتى نؤمن بأنفسنا؟
    description_fr: |
      Dans la Grotte de Ḥirāʾ sur la Montagne de la Lumière (*Jabal al-Nūr*) près de La Mecque, le Prophète Muhammad ﷷ était en retraite habituelle quand l'Ange Jibrīl lui apparut avec un commandement qui transformerait l'histoire humaine : « Lis ! » Le Prophète ﷷ, qui était illettré, répondit qu'il ne savait pas lire. Jibrīl l'étreignit jusqu'à ce qu'il ne puisse plus le supporter, puis le relâcha et répéta le commandement. Cela se produisit trois fois, après quoi les premiers versets de la Sourate al-ʿAlaq furent révélés : « Lis au nom de ton Seigneur qui a créé — a créé l'homme d'un caillot de sang. Lis, et ton Seigneur est le plus généreux, qui a enseigné par la plume, a enseigné à l'homme ce qu'il ne savait pas. »

      Le Prophète ﷷ fuit la grotte en terré, entendant la voix de Jibrīl le rassurer, et retourna vers Khadīja, qui l'enveloppa dans un manteau et le réconforta. Elle l'emmena chez son cousin Waraqa ibn Nawfal, un savant chrétien qui reconnut la description de l'ange comme étant le même qui était venu à Mūsā, et déclara que Muhammad ﷷ était le prophète de son peuple.

      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, trace la trajectoire psychologique du Prophète ﷷ de la terreur à l'acceptation, notant que l'étreinte de Jibrīl n'était pas une punition mais une préparation — le poids de la révélation exigeait une constitution fortifiée. Al-Qurṭubī insiste sur le fait que le premier mot révélé fut « Lis » (*iqraʾ*), établissant la connaissance, l'enquête et l'alphabétisation comme fondements du projet islamique. Al-Ṭabarī conserve les rapports anciens selon lesquels l'illettrisme du Prophète était lui-même une preuve de la nature miraculeuse du Coran — il n'aurait pas pu le composer. La leçon est que l'appel divin arrive souvent comme une perturbation avant de devenir une direction ; la rencontre initiale avec la vérité est fréquemment effrayante.
    reference: "Qur'an 96:1-5 (Surah al-Alaq); Bukhari 4953, Muslim 160"
    source_notes: |
      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, traces the psychological trajectory of the Prophet ﷺ from terror to acceptance, noting that the embrace of Jibrīl was not punishment but preparation — the weight of revelation required a fortified constitution. Al-Qurṭubī emphasises that the first word revealed was "Read" (*iqraʾ*), establishing knowledge, inquiry, and literacy as foundational to the Islamic project.
    source_notes_fr: |
      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, trace la trajectoire psychologique du Prophète ﷺ de la terreur à l'acceptation, notant que l'étreinte de Jibrīl n'était pas une punition mais une préparation — le poids de la révélation exigeait une constitution fortifiée. Al-Qurṭubī insiste sur le fait que le premier mot révélé fut « Lis » (*iqraʾ*), établissant la connaissance, l'enquête et l'alphabétisation comme fondements du projet islamique.
    source_notes_ar: |
      يَتَتَبَّعُ ابنُ كَثِيرٌ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» الْمَسَارَ النَّفْسِيَّ لِلنَّبِيِّ ﷺ مِنَ الْفَزَعِ إِلَى الْقَبُولِ، مُلَاحِظًا أَنَّ عِنَاقَ جِبْرِيلَ لَمْ يَكُنْ عِقَابًا بَلْ تَجْهِيزًا — ثِقَلُ الْوَحْيِ يَتَطَلَّبُ بِنْيَةً مُقَوَّاةً. وَيُؤَكِّدُ الْقُرْطُبِيُّ أَنَّ أَوَّلَ كَلِمَةٍ نُزِلَتْ «اقْرَأْ»، مُؤَسِّسًا لِلْعِلْمِ وَالِاسْتِقْصَاءِ وَالْمَحْوِيَّةِ كَقَاعِدَةٍ لِلْمَشْرُوعِ الْإِسْلَامِيِّ.
