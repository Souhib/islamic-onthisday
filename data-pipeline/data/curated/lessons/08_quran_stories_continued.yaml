  - slug: quran-story-the-people-of-sabt
    category: quran_story
    title_en: "The People Who Broke the Sabbath — When Rules Become Tests"
    title_ar: "أصحاب السبت — حين تصير القواعد اختباراً"
    title_fr: "Les gens du Sabbat — Quand les règles deviennent des épreuves"
    description_en: |
      Among the Israelites of old, a certain community was commanded to observe the Sabbath with absolute strictness: no fishing on Saturday. The fish, aware of this prohibition, would appear in abundance on that day and vanish during the week — a miraculous phenomenon that should have reinforced gratitude and obedience. Instead, some residents devised a cunning loophole: they dug channels on Friday so that fish would swim into pools and become trapped, technically "caught" without active fishing on the Sabbath. Their legalism did not fool Allah. He transformed the transgressors into despised apes, making them a warning for their generation and all who would follow.

      Ibn Kathīr narrates that this was not a random punishment but a precise *muʿjiza* (miracle of destruction) that demonstrated Allah's power over both body and form. The transformed community remained alive for three days, visible to their neighbours, before perishing — a living sermon on the consequences of mocking divine commands. Al-Qurṭubī delves into the jurisprudential irony: the people sought to preserve the letter of the law while violating its spirit, a disease he identifies as *ḥiyal* (legal stratagems) that hollows out religion from within. Al-Ṭabarī preserves the view of the *salaf* that their crime was compounded by the clarity of the sign — the fish themselves were a divine mercy made into a temptation, and their response was to outwit rather than obey.

      The lesson transcends the specific case. Every Muslim faces modern equivalents: the *ḥiyal* that restructure debt to avoid *zakāt*, the technicalities that permit gossip while avoiding the word "backbiting," the scheduling tricks that circumvent prayer times. The story asks not whether we can find loopholes, but whether we truly wish to please Allah. The *so what* is a heart-check: are we students of cleverness, or students of submission?
    description_ar: |
      من بني إسرائيل قديماً، أمِرَت طائفةٌ بمراعاة السبت حظراً صارماً: لا صيد يوم السبت. وكانت الأسماك تكثر ظهورها ذلك اليوم وتختفي بقية الأسبوع — ظاهرةٌ خارقةٌ كان يجب أن تُعمّق الشكر والطاعة. لكن بعض السكان ابتكروا ثغرةً ماكرةً: حفروا قنواتٍ يوم الجمعة لتسبح فيها الأسماك وتُحبَس، فتُصاد "فنياً" دون صيدٍ فعليٍّ في السبت. لم يُخدع الله ببراغماتيتهم القانونية، فمسخهم قردةً خاسئين، جاعلاً إياهم عبرةً لعصرهم ولمن بعدهم.

      يروي ابن كثير أن هذا لم يكن عقاباً عشوائياً بل معجزة هلاكٍ أظهرت قدرة الله على الصورة والجوهر، وبقوا أحياءً ثلاثة أيامٍ يراهم جيرانهم قبل أن يفنوا — موعظةٌ حيةٌ بعواقب استهزاء الأوامر الإلهية. ويُحلّل القرطبي المفارقة الفقهية: أنهم حاولوا حفظ ظاهر القانون مع انتهاك روحه، وهو داء يُسمّى الحيل — يُفرّغ الدين من جوهره. ويحفظ الطبري رأي السلف بأن جريمتهم تفاقمت بسبب وضوح الآية؛ فالأسماك كانت رحمةً جُعلت فتنةً، وكان ردهم محاولةَ تفوّقٍ لا طاعةً.

      العبرة تتجاوز الحالة الخاصة. يواجه كل مسلم أمثلةً معاصرة: الحيل التي تُهيكل الديون لتفادي الزكاة، التفنّنات التي تبيح الغيبة دون لفظها، الحيل الجدولية لتفادي أوقات الصلاة. السؤال ليس هل نستطيع إيجاد ثغرات، بل هل نريد حقاً رضا الله.
    description_fr: |
      Parmi les anciens Israélites, une communauté reçut l'ordre d'observer le Sabbat avec une stricte rigueur : pas de pêche le samedi. Les poissons, conscients de cette interdiction, apparaissaient en abondance ce jour-là et disparaissaient le reste de la semaine — un phénomène miraculeux qui aurait dû renforcer la gratitude et l'obéissance. Au lieu de cela, certains habitants imaginèrent une astuce juridique : ils creusèrent des canaux le vendredi pour que les poissons s'y engouffrent et soient piégés, techniquement « pris » sans pêche active le jour du Sabbat. Leur légalisme ne trompa pas Allah. Il transforma les transgresseurs en singes méprisés, en faisant un avertissement pour leur génération et toutes celles qui suivraient.

      Ibn Kathīr rapporte qu'il ne s'agissait pas d'un châtiment arbitraire mais d'une *muʿjiza* (miracle de destruction) qui démontrait le pouvoir d'Allah sur le corps et la forme. La communauté transformée resta en vie pendant trois jours, visible par ses voisins, avant de périr — un sermon vivant sur les conséquences de se moquer des commandements divins. Al-Qurṭubī analyse l'ironie juridique : les gens cherchèrent à préserver la lettre de la loi tout en violant son esprit, une maladie qu'il identifie comme les *ḥiyal* (ruses juridiques) qui évidencent la religion de l'intérieur. Al-Ṭabarī conserve l'avis des *salaf* selon lequel leur crime fut aggravé par la clarté du signe — les poissons eux-mêmes étaient une miséricorde divine transformée en tentation, et leur réponse fut de ruser plutôt que d'obéir.

      La leçon dépasse le cas particulier. Chaque musulman fait face à des équivalents modernes : les *ḥiyal* qui restructurent les dettes pour éviter la *zakāt*, les subterfuges qui permettent le commérage tout en évitant le mot « médisance. » La question n'est pas de savoir si nous pouvons trouver des failles, mais si nous désirons vraiment plaire à Allah.
    reference: "Qur'an 2:65-66 (Surah al-Baqara), 7:163-166 (Surah al-A'raf)"
    source_notes: |
      Ibn Kathīr narrates that this was not a random punishment but a precise *muʿjiza* demonstrating Allah's power over both body and form; the transformed community remained visible for three days before perishing. Al-Qurṭubī identifies their crime as *ḥiyal* (legal stratagems) that preserve the letter of the law while violating its spirit — a disease that hollows out religion from within.
    source_notes_fr: |
      Ibn Kathīr rapporte qu'il ne s'agissait pas d'un châtiment arbitraire mais d'une *muʿjiza* précise démontrant le pouvoir d'Allah sur le corps et la forme ; la communauté transformée resta visible pendant trois jours avant de périr. Al-Qurṭubī identifie leur crime comme des *ḥiyal* (ruses juridiques) qui préservent la lettre de la loi tout en violant son esprit — un mal qui évidemente la religion de l'intérieur.
    source_notes_ar: |
      يَرْوِي ابنُ كَثِيرٍ أَنَّ هَذَا لَمْ يَكُنْ عِقَابًا عَشْوَائِيًّا بَلْ مُعْجِزَةَ هَلَاكٍ أَظْهَرَتْ قُدْرَةَ اللهِ عَلَى الصُّورَةِ وَالجَوْهَرِ، وَبَقِيَتِ المُجْتَمَعُ المُمَسَّخُ ظَاهِرًا ثَلَاثَةَ أَيَّامٍ قَبْلَ أَنْ يَفْنَوْا. وَيُحَدِّدُ القُرْطُبِيُّ جَرِيمَتَهُمْ فِي الحِيَلِ — الَّتِي تَحْفَظُ ظَاهِرَ الشَّرِيعَةِ وَتُنْتَهِكُ بَاطِنَهَا — وَهُوَ دَاءٌ يُفَرِّغُ الدِّينَ مِنْ جَوْهَرِهِ.
    display_day_of_year: 90
    quran_refs: "2:65-66, 7:163-166"
    hadith_refs: "Bukhari 4606, Muslim 2789"
