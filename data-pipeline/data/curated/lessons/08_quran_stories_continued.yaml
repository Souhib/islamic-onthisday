  - slug: quran-story-the-battle-of-uhud-in-quran
    category: quran_story
    title_en: "The Battle of Uhud in the Qur'an — Discipline Over Numbers"
    title_ar: "غزوة أحد في القرآن — الانضباط فوق العدد"
    title_fr: "La bataille d'Uḥud dans le Coran — La discipline avant le nombre"
    description_en: |
      Following the victory at Badr, the Muslims faced the Quraysh again at the mountain of Uḥud. The Prophet Muhammad ﷺ positioned fifty archers on a strategic ridge with strict instructions not to leave their posts, regardless of whether the Muslims appeared to be winning or losing. The Muslim forces initially repelled the Meccan attack, and some of the archers, seeing the enemy in retreat, disobeyed the command and descended to collect spoils. Khālid ibn al-Walīd, then still a pagan commander of the Quraysh, exploited the gap and launched a cavalry charge from the rear that turned the tide.

      The Prophet ﷺ was wounded, rumours spread that he had been killed, and the Muslims were thrown into confusion. The Qurʾān addresses this moment with extraordinary candour: it acknowledges that the believers were shaken, that some fled, and that their disobedience — not their lack of courage — was the cause of their setback. Yet it also consoles them, affirming that Allah had already forgiven them and that the test was designed to distinguish the sincere from the hypocritical.

      Ibn Kathīr, in his *Tafsīr*, emphasises that the archers' error was not a failure of military judgment but of spiritual discipline — they prioritised immediate gain over explicit command. Al-Qurṭubī draws the jurisprudential lesson that obedience to legitimate leadership in matters of strategy is a religious obligation, not merely a tactical preference. Al-Ṭabarī preserves the early reports that the Prophet's own endurance of wounds at Uḥud became a model for the Companions: when they saw him bleeding yet unbowed, they regrouped. The lesson is that discipline — particularly the discipline to obey when victory seems to justify disobedience — is the decisive factor. The *so what* is a test of contemporary relevance: in our own lives, what "spoils" tempt us to abandon our assigned posts?
    description_ar: |
      بعد فتح بدر، واجه المسلمون قريشاً مرةً أخرى عند جبل أحد. وضع النبي ﷺ خمسين رامياً على تبةٍ استراتيجيةٍ وأمرهم صراحةً بعدم ترك مواقعهم مهما بدا أن المسلمين منتصرون أو مهزومون. صدّ المسلمون الهجمة المكية في البداية، فنزل بعض الرماة لجمع الغنائم مخالفين الأمر. استغل خالد بن الوليد — وقتها قائدٌ وثنيٌ لقريش — الثغرة وشنّ هجمةً خلفيةً قلبت الموازين.

      أُصيب النبي ﷺ، وتناقل الناس شائعة مقتله، فتخبط المسلمون. يتناول القرآن هذه اللحظة بصراحةٍ استثنائية: يعترف بارتجاف المؤمنين وهروب بعضهم، ويُقرّ بأن العصيان لا الجبن كان سبب النكسة. ثم يُسلّيهم مؤكداً أن الله قد تاب عليهم وأن الاختبار كان ليميّز الصادق من المنافق.

      يؤكد ابن كثير في تفسيره أن خطأ الرماة لم يكن سوء تقديرٍ عسكري بل ضعف انضباطٍ روحي — ركّزوا على الربح الفوري على الأمر الصريح. ويستخلص القرطبي الدرس الفقهي بأن طاعة القيادة الشرعية في الأمور الاستراتيجية واجبٌ ديني لا ميلٌ تكتيكي. ويحفظ الطبري رواياتٍ مبكرةً تُفيد بأن صمود النبي ﷺ رغم جراحه صار نموذجاً للصحابة: حين رأوه ينزف ولم يحنِ رأسه، استجمعوا شتاتهم. العبرة: الانضباط — خاصةً الانضباط على الطاعة حين يبدو النصر مبرراً للعصيان — هو العامل الحاسم.
    description_fr: |
      Après la victoire de Badr, les musulmans firent à nouveau face aux Quraysh à la montagne d'Uḥud. Le Prophète Muhammad ﷷ positionna cinquante archers sur une crête stratégique avec l'ordre strict de ne pas quitter leurs postes, que les musulmans semblent gagner ou perdre. Les forces musulmanes repoussèrent d'abord l'attaque mecquoise, et certains archers, voyant l'ennemi en retraite, désobéirent à l'ordre et descendirent pour collecter le butin. Khālid ibn al-Walīd, alors encore commandant païen des Quraysh, exploita la brèche et lança une charge de cavalerie par l'arrière qui renversa la situation.

      Le Prophète ﷷ fut blessé, des rumeurs se répandirent qu'il avait été tué, et les musulmans furent jetés dans la confusion. Le Coran aborde ce moment avec une candeur extraordinaire : il reconnaît que les croyants furent ébranlés, que certains prirent la fuite, et que leur désobéissance — pas leur manque de courage — fut la cause de leur revers. Pourtant il les console également, affirmant qu'Allah leur avait déjà pardonné et que l'épreuve avait été conçue pour distinguer les sincères des hypocrites.

      Ibn Kathīr, dans son *Tafsīr*, insiste sur le fait que l'erreur des archers n'était pas un échec de jugement militaire mais de discipline spirituelle — ils ont priorisé le gain immédiat sur l'ordre explicite. Al-Qurṭubī tire la leçon jurisprudentielle que l'obéissance au leadership légitime en matière de stratégie est une obligation religieuse, pas simplement une préférence tactique. Al-Ṭabarī conserve les rapports anciens selon lesquels l'endurance du Prophète face à ses blessures à Uḥud devint un modèle pour les Compagnons : quand ils le virent saigner mais courbé, ils se regroupèrent. La leçon est que la discipline — particulièrement la discipline d'obéir quand la victoire semble justifier la désobéissance — est le facteur décisif.
    reference: "Qur'an 3:121-122, 3:152-155 (Surah Aal Imran)"
    source_notes: |
      Ibn Kathīr emphasises that the archers' error was not a failure of military judgment but of spiritual discipline — they prioritised immediate gain over explicit command. Al-Qurṭubī draws the jurisprudential lesson that obedience to legitimate leadership in matters of strategy is a religious obligation, not merely a tactical preference.
    source_notes_fr: |
      Ibn Kathīr insiste sur le fait que l'erreur des archers n'était pas un échec de jugement militaire mais de discipline spirituelle — ils ont priorisé le gain immédiat sur l'ordre explicite. Al-Qurṭubī tire la leçon jurisprudentielle que l'obéissance au leadership légitime en matière de stratégie est une obligation religieuse, pas simplement une préférence tactique.
    source_notes_ar: |
      يُؤَكِّدُ ابنُ كَثِيرٌ أَنَّ خَطَأَ الرُّمَاةِ لَمْ يَكُنْ سُوءَ تَقْدِيرٍ عَسْكَرِيٍّ بَلْ ضَعْفَ انْضِبَاطٍ رُوحِيٍّ — رَكَّزُوا عَلَى الرِّبْحِ الفَوْرِيِّ عَلَى الأَمْرِ الصَّرِيحِ. وَيَسْتَخْلِصُ القُرْطُبِيُّ الدَّرْسَ الفِقْهِيَّ بِأَنَّ طَاعَةَ القِيَادَةِ الشَّرْعِيَّةِ فِي الأُمُورِ الِاسْتِرَاتِيجِيَّةِ وَاجِبٌ دِينِيٌّ لَا مَيْلٌ تَكْتِيكِيٌّ.
