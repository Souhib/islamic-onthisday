  - slug: quran-story-the-trench-in-quran
    category: quran_story
    title_en: "The Trench in the Qur'an — When the Believers Dug Their Own Salvation"
    title_ar: "الخندق في القرآن — حين حفر المؤمنون خلاصهم"
    title_fr: "Le Fossé dans le Coran — Quand les croyants creusèrent leur propre salut"
    description_en: |
      In the fifth year AH, a confederation of Arab tribes and Jewish allies — numbering approximately ten thousand fighters — marched on Medina to annihilate the Muslim community. The Prophet Muhammad ﷺ, in a strategic innovation attributed to the Persian convert Salmān al-Fārisī, ordered the digging of a deep trench (*khandaq*) on Medina's exposed northern front, while the city's natural fortifications and existing walls protected the other approaches. The Muslims — barely three thousand in number — worked through severe winter hunger, tying stones against their stomachs to suppress the pangs, while the Prophet ﷺ himself laboured alongside them until dust whitened his beard.

      The confederates were unprepared for siege warfare and camped for weeks, unable to cross the trench. During this stalemate, internal divisions emerged among the allies, and a severe storm — described in the *Sīra* as tearing their tents and extinguishing their fires — completed their demoralisation. They withdrew without a decisive battle, and the Qurʾān describes this as a victory achieved by Allah's direct intervention: "Allah turned back those who disbelieved in their rage; they gained no advantage."

      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, records the extraordinary accounts of the believers' perseverance — some digging through solid rock, others reciting poetry of praise while starving. Al-Qurṭubī notes that the Surah al-Aḥzāb was revealed in its entirety during this crisis, making the trench not merely a military event but a revelatory moment. Al-Ṭabarī preserves the consensus that the storm was not natural but a *muʿjiza* of deliverance. The lesson is that salvation often requires undignified labour — the believers were not saved by a miracle that spared them effort, but by effort that invited miracle. The *so what* is a call to embrace the inglorious, patient work that precedes divine relief.
    description_ar: |
      في السنة الخامسة للهجرة، زحفت حلفٌ من القبائل العربية والحلفاء اليهود — نحو عشرة آلاف مقاتل — على المدينة لإبادة الجماعة المسلمة. أمر النبي ﷺ — بابتكارٍ استراتيجيٍّ ينسب إلى السلمان الفارسي — بحفر خندقٍ عميقٍ على الجبهة الشمالية المكشوفة، بينما تحصينات المدينة الطبيعية والأسوار حمت الجهات الأخرى. عمل المسلمون — ثلاثة آلاف تقريباً — في جوعٍ شتويٍّ قاسٍ، يربطون الحجارة على بطونهم ليُخفّفوا الجوع، والنبي ﷺ يعمل بينهم حتى بيضّ الغبار لحيته.

      لم يكن الاحتلال المُحاصِر مستعدّاً لحرب الحصار، فخيّموا أسابيع عاجزين عن عبور الخندق. خلال الطريق المسدود، ظهرت انشقاقاتٌ داخليةٌ في الحلفاء، وأكملت عاصفةٌ عنيفةٌ — وصفت في السيرة بتمزيق خيامهم وإطفاء نيرانهم — إحباطهم. انسحبوا دون معركةٍ حاسمةٍ، ويصف القرآن ذلك نصراً تحقق بتدخلٍ إلهيٍّ مباشر: "ردَّ الله الذين كفروا بغيظهم لم ينالوا خيراً."

      يسجل ابن كثير في البداية والنهاية رواياتٍ استثنائيةً عن مثابرة المؤمنين — يحفرون الصخر ويرتلون الشعر حامدين وهم جياع. ويلاحظ القرطبي أن سورة الأحزاب نزلت جملةً خلال هذه الأزمة، مُحوّلةً الخندق من حدثٍ عسكريٍ إلى لحظةٍ وحيانية. ويحفظ الطبري إجماع السلف بأن العاصفة لم تكن طبيعية بل معجزة نجاة. العبرة: الخلاص غالباً يتطلب عملاً مرهقاً — لم يُنقذ المؤمنون بمعجزةٍ أعفتهم من الجهد، بل بجهدٍ استدعى المعجزة. الدعوة لاحتضان العمل الصامت المتواضع الذي يسبق الفرج الإلهي.
    description_fr: |
      En la cinquième année de l'Hégire, une confédération de tribus arabes et d'alliés juifs — environ dix mille combattants — marcha sur Médine pour anéantir la communauté musulmane. Le Prophète Muhammad ﷷ, dans une innovation stratégique attribuée au converti perse Salmān al-Fārisī, ordonna le creusement d'un fossé profond (*khandaq*) sur le front nord exposé de Médine, tandis que les fortifications naturelles de la ville et les murailles existantes protégeaient les autres approches. Les musulmans — à peine trois mille — travaillèrent sous une faim hivernale sévère, attachant des pierres contre leur ventre pour supprimer les douleurs, tandis que le Prophète ﷷ lui-même travaillait à leurs côtés jusqu'à ce que la poussière blanchisse sa barbe.

      Les confédérés n'étaient pas préparés à la guerre de siège et campèrent pendant des semaines, incapables de traverser le fossé. Durant cette impasse, des divisions internes apparurent parmi les alliés, et une tempête violente — décrite dans la *Sīra* comme déchirant leurs tentes et éteignant leurs feux — acheva leur démoralisation. Ils se retirèrent sans bataille décisive, et le Coran décrit cela comme une victoire réalisée par l'intervention directe d'Allah : « Allah repoussa ceux qui ont mécru dans leur rage ; ils n'ont obtenu aucun avantage. »

      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, consigne les récits extraordinaires de la persévérance des croyants — certains creusant à travers le roc, d'autres récitant de la poésie de louange tout en jeûnant. Al-Qurṭubī note que la Sourate al-Aḥzāb fut révélée dans son intégralité durant cette crise, faisant du fossé non seulement un événement militaire mais un moment révélateur. Al-Ṭabarī conserve le consensus selon lequel la tempête n'était pas naturelle mais une *muʿjiza* de délivrance. La leçon est que le salut exige souvent un travail indigne — les croyants ne furent pas sauvés par un miracle qui les épargna d'effort, mais par un effort qui invita le miracle.
    reference: "Qur'an 33:9-27 (Surah al-Ahzab)"
    source_notes: |
      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, records the extraordinary accounts of the believers' perseverance — some digging through solid rock, others reciting poetry of praise while starving. Al-Qurṭubī notes that Surah al-Aḥzāb was revealed in its entirety during this crisis, making the trench not merely a military event but a revelatory moment.
    source_notes_fr: |
      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, consigne les récits extraordinaires de la persévérance des croyants — certains creusant à travers le roc, d'autres récitant de la poésie de louange tout en jeûnant. Al-Qurṭubī note que la Sourate al-Aḥzāb fut révélée dans son intégralité durant cette crise, faisant du fossé non seulement un événement militaire mais un moment révélateur.
    source_notes_ar: |
      يُسَجِّلُ ابنُ كَثِيرٌ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» رِوَايَاتٍ اسْتِثْنَائِيَّةً عَنْ مُثَابَرَةِ المُؤْمِنِينَ — بَعْضُهُمْ يَحْفِرُونَ الصَّخْرَ وَآخَرُونَ يَرْتِلُونَ الشِّعْرَ حَامِدِينَ وَهُمْ جِيَاعٌ. وَيَلْحَظُ القُرْطُبِيُّ أَنَّ سُورَةَ الأَحْزَابِ نَزَلَتْ جُمْلَةً خِلَالَ هَذِهِ الأَزْمَةِ، مُحَوِّلَةً الخَنْدَقَ مِنْ حَدَثٍ عَسْكَرِيٍّ إِلَى لَحْظَةٍ وَحْيَانِيَّةٍ.
