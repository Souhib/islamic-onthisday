  - slug: quran-story-the-hijra
    category: quran_story
    title_en: "The Hijra — When the Prophet Left Everything for Allah"
    title_ar: "الهجرة — حين ترك النبي ﷺ كل شيء لله"
    title_fr: "L'Hégire — Quand le Prophète quitta tout pour Allah"
    description_en: |
      After thirteen years of persecution in Mecca, the Prophet Muhammad ﷺ received divine permission to migrate to Medina. The Quraysh, learning of his planned departure, conspired to assassinate him by selecting one young man from each clan to strike simultaneously, thereby distributing the blame across the tribe and preventing blood feud. The Prophet ﷺ, informed of the plot by revelation, instructed ʿAlī ibn Abī Ṭālib to sleep in his bed as a decoy, while he and Abū Bakr slipped out under cover of darkness.

      They took refuge in the Cave of Thawr for three days, during which a spider wove a web across the entrance and a dove nested there — natural camouflage that convinced the pursuers the cave had been undisturbed. When the Quraysh reached the cave's mouth, Abū Bakr expressed fear, and the Prophet ﷺ reassured him with words that became immortal: "What do you think of two when Allah is their third?" They then completed the arduous journey to Medina, where they were received with jubilation by the Ansār (the Helpers).

      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, narrates the detailed reports of the migration, emphasising that the Prophet's departure was not flight but strategic obedience — every step was divinely guided. Al-Qurṭubī, in his *Tafsīr* of the relevant verses, notes that the Hijra marked the transition from passive endurance to active state-building; the Muslim community was now a political as well as spiritual entity. Al-Ṭabarī preserves the early consensus that the Hijra was the event from which the Islamic calendar was later dated, signifying its structural importance. The lesson is that sometimes obedience requires leaving everything familiar — home, security, and reputation — for a destination known only to Allah. The *so what* is a question of readiness: what would we leave if Allah asked us to leave?
    description_ar: |
      بعد ثلاثة عشر عاماً من الاضطهاد بمكة، أذن الله للنبي ﷺ بالهجرة إلى المدينة. علمت قريش بمغادرته المزمعة فتآمروا على اغتياله باختيار فتى من كل قبيلةٍ ليضربوا دفعةً واحدةً، موزعين الذنب ومتفادين الثأر. أبلغه الله المكيدة بالوحي، فأمر علي بن أبي طالب بالنوم في فراشه كطعمٍ، بينما انسلّ هو وأبو بكر في ظلام الليل.

      التجأوا إلى غار ثور ثلاثة أيام، حيث نسجت عنكبوتةٌ خيوطها على فم الغار وعشّت حمامةٌ — تمويهٌ طبيعيٌ أقنع المطاردين بأن الغار لم يُقتحم. حين بلغ قريش فم الغار، أبدى أبو بكر خوفاً، فأسلاه النبي ﷺ بكلماتٍ خلدها التاريخ: "ما ظنك باثنين الله ثالثهما؟" ثم أكملا الرحلة الشاقة إلى المدينة، حيث استقبلهما الأنصار بالتهليل.

      يروي ابن كثير في البداية والنهاية روايات الهجرة المفصّلة، مُؤكداً أن مغادرة النبي ﷺ لم تكن فراراً بل طاعةٍ استراتيجية — كل خطوةٍ كانت موجهةً إلهياً. ويلاحظ القرطبي في تفسيره للآيات ذات الصلة أن الهجرة مثّلت الانتقال من الصبر السلبي إلى بناء الدولة؛ أصبحت الأمة الإسلامية كياناً سياسياً وروحياً. ويحفظ الطبري إجماع السلف بأن الهجرة كانت الحدث الذي أُرّخ منه التقويم الإسلامي لاحقاً، مُعلناً أهميته البنيوية. العبرة: الطاعة أحياناً تتطلب ترك كل ما هو مألوف — الوطن والأمن والسمعة — إلى وجهةٍ يعلمها الله وحده. السؤال: ماذا نترك لو طلب الله منا المغادرة؟
    description_fr: |
      Après treize ans de persécution à La Mecque, le Prophète Muhammad ﷷ reçut la permission divine d'émigrer à Médine. Les Quraysh, ayant appris son départ prévu, conspirèrent pour l'assassiner en sélectionnant un jeune homme de chaque clan pour frapper simultanément, distribuant ainsi la culpabilité à travers la tribu et évitant la vendetta. Le Prophète ﷷ, informé du complot par révélation, ordonna à ʿAlī ibn Abī Ṭālib de dormir dans son lit comme leurre, tandis que lui et Abū Bakr s'éclipsèrent sous couvert de l'obscurité.

      Ils se réfugièrent dans la Grotte de Thawr pendant trois jours, durant lesquels une araignée tissa sa toile à l'entrée et une colombe y nicha — un camouflage naturel qui convainquit les poursuivants que la grotte n'avait pas été perturbée. Quand les Quraysh atteignirent l'orifice de la grotte, Abū Bakr exprima sa peur, et le Prophète ﷷ le rassura avec des mots devenus immortels : « Que penses-tu de deux quand Allah est leur troisième ? » Ils achevèrent ensuite le périlleux voyage jusqu'à Médine, où ils furent accueillis avec jubilation par les Anṣār (les Auxiliaires).

      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, rapporte les récits détaillés de l'émigration, insistant sur le fait que le départ du Prophète ﷷ n'était pas une fuite mais une obéissance stratégique — chaque pas était divinement guidé. Al-Qurṭubī, dans son *Tafsīr* des versets pertinents, note que l'Hégire marqua la transition de l'endurance passive à la construction étatique ; la communauté musulmane était désormais une entité politique aussi bien que spirituelle. Al-Ṭabarī conserve le consensus ancien selon lequel l'Hégire fut l'événement à partir duquel le calendrier islamique fut ultérieurement daté, signalant son importance structurelle. La leçon est que l'obéissance exige parfois de quitter tout ce qui est familier — le foyer, la sécurité et la réputation — pour une destination connue d'Allah seul.
    reference: "Qur'an 9:40, 8:72 (Surah al-Tawba / al-Anfal); Bukhari 3905, Muslim 3018"
    source_notes: |
      Ibn Kathīr, in *al-Bidāya wa-l-Nihāya*, narrates the detailed reports of the migration, emphasising that the Prophet's departure was not flight but strategic obedience — every step was divinely guided. Al-Qurṭubī notes that the Hijra marked the transition from passive endurance to active state-building; the Muslim community was now a political as well as spiritual entity.
    source_notes_fr: |
      Ibn Kathīr, dans *al-Bidāya wa-l-Nihāya*, rapporte les récits détaillés de l'émigration, insistant sur le fait que le départ du Prophète ﷺ n'était pas une fuite mais une obéissance stratégique — chaque pas était divinement guidé. Al-Qurṭubī note que l'Hégire marqua la transition de l'endurance passive à la construction étatique ; la communauté musulmane était désormais une entité politique aussi bien que spirituelle.
    source_notes_ar: |
      يُرَوِّي ابنُ كَثِيرٌ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» رِوَايَاتِ الْهِجْرَةِ الْمُفَصَّلَةَ، مُؤَكِّدًا أَنَّ مُغَادَرَةَ النَّبِيِّ ﷺ لَمْ تَكُنْ فِرَارًا بَلْ طَاعَةً اسْتِرَاتِيجِيَّةً — كُلُّ خُطْوَةٍ كَانَتْ مُوَجَّهَةً إِلَهِيًّا. وَيَلْحَظُ الْقُرْطُبِيُّ أَنَّ الْهِجْرَةَ مَثَّلَتِ الِانْتِقَالَ مِنَ الصَّبْرِ السَّلْبِيِّ إِلَى بِنَاءِ الدَّوْلَةِ؛ أَصْبَحَتِ الْأُمَّةُ الْإِسْلَامِيَّةُ كَيَانًا سِيَاسِيًّا وَرُوحِيًّا.
