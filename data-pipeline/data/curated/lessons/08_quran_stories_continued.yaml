  - slug: quran-story-the-battle-of-badr-in-quran
    category: quran_story
    title_en: "The Battle of Badr in the Qur'an — Victory Through Patience"
    title_ar: "غزوة بدر في القرآن — النصر بالصبر"
    title_fr: "La bataille de Badr dans le Coran — La victoire par la patience"
    description_en: |
      The Battle of Badr, fought on the 17th of Ramaḍān in the second year AH, pitted approximately 313 Muslims against nearly a thousand well-equipped Meccan warriors. The Muslims were poorly armed, some armed only with sticks, and the Prophet Muhammad ﷺ spent the entire night before the battle in prayer, weeping and supplicating Allah for victory. The Qurʾān describes this engagement not merely as a military encounter but as a divine appointment: Allah promised to reinforce the believers with a thousand angels if they stood firm, and He made the enemy appear few in their eyes while making the Muslims appear few in the enemy's eyes — a precise calibration of perception designed to test sincerity.

      When combat began, the Prophet ﷺ threw a handful of sand toward the Quraysh, and Allah sent a wind that blinded the enemy and sowed confusion among their ranks. The Muslim forces routed the Meccans, killing many of their leaders and capturing others. The Qurʾān declares that the Muslims slew only a fraction of the enemy while Allah slew the rest — a theological statement that shifts the locus of causation from human effort to divine will.

      Ibn Kathīr, in his *Tafsīr*, compiles the reports that the angels were visible to some of the Companions, notably bearing the names of the enemy leaders they had been assigned to strike. Al-Qurṭubī emphasises that the promise of angelic support was conditional upon patience (*ṣabr*) — had the Muslims fled, the angels would not have descended. Al-Ṭabarī preserves the early *tafsīr* that Badr was a *miḥān* (crucible) in which Allah distinguished the steadfast from the wavering. The lesson is that numerical and material inferiority is irrelevant when divine support is present, but divine support is not automatic — it is earned through perseverance, prayer, and unwavering trust. The believer's *so what* is a calibration of confidence: do we place our hope in our resources, or in the One who owns all resources?
    description_ar: |
      وقعت غزوة بدر في السابع عشر من رمضان السنة الثانية للهجرة، حيث واجه نحو 313 مسلماً قرابة ألف محاربٍ مكيٍّ مجهزٍ تجهيزاً جيداً. كان المسلمون ضعاف التسليح، بعضهم يحمل العصي، وقضى النبي ﷺ الليلة كلها في دعاءٍ وابتهالٍ لله بالنصر. يصف القرآن المعركة ليس صداماً عسكرياً فحسب بل موعداً إلهياً: وعد الله بتعزيز المؤمنين بألفٍ من الملائكة إن ثبتوا، وجعل العدوّ قليلاً في أعينهم والمؤمنين قليلين في أعين العدوّ — توليفةٌ دقيقةٌ للإدراك لاختبار الإخلاص.

      حين بدأ القتال، رمى النبي ﷺ بكفٍ من ترابٍ نحو قريش، فأرسل الله ريحاً تُعمي العدوّ وتلقي فيهم الرعب. هزم المسلمون مكة وقتلوا من قادتها وأسروا آخرين. يصرح القرآن أن المسلمين قتلوا جزءاً من العدوّ والله قتل الباقي — تصريحٌ يُحوّل محور العلّة من الجهد البشري إلى المشيئة الإلهية.

      يجمع ابن كثير رواياتٍ تُفيد برؤية بعض الصحابة للملائكة واضحةً، وقد كُتبت على أجنحتها أسماء من قُدّر لهم الضرب. ويُؤكد القرطبي أن وعد النصر الملائكي كان مشروطاً بالصبر — لو فَرّ المسلمون لما نزلت الملائكة. ويحفظ الطبري تفسير السلف بأن بدر كانت مِحْناً تميّز فيها الله الثابت من المتردد. العبرة: التفوق العددي والمادي لا قيمة له مع النصر الإلهي، لكن النصر الإلهي ليس تلقائياً — إنه يُكتسب بالصبر والدعاء والتوكل.
    description_fr: |
      La bataille de Badr, livrée le 17 Ramaḍān de la deuxième année de l'Hégire, opposa environ 313 musulmans à près de mille guerriers mecquois bien équipés. Les musulmans étaient pauvrement armés, certains ne disposant que de bâtons, et le Prophète Muhammad ﷺ passa toute la nuit précédant la bataille en prière, en larmes et en supplication à Allah pour la victoire. Le Coran décrit cet affrontement non pas simplement comme une rencontre militaire mais comme un rendez-vous divin : Allah promit de renforcer les croyants avec mille anges s'ils tenaient bon, et Il fit paraître l'ennemi peu nombreux à leurs yeux tout en faisant paraître les musulmans peu nombreux aux yeux de l'ennemi — une calibration précise de la perception destinée à tester la sincérité.

      Quand le combat commença, le Prophète ﷺ jeta une poignée de sable vers les Quraysh, et Allah envoya un vent qui aveugla l'ennemi et sema la confusion dans ses rangs. Les forces musulmanes mirent en déroute les Mecquois, tuant nombre de leurs chefs et en capturant d'autres. Le Coran déclare que les musulmans ne tuèrent qu'une fraction de l'ennemi tandis qu'Allah tua le reste — une affirmation théologique qui déplace le lieu de la causalité de l'effort humain à la volonté divine.

      Ibn Kathīr, dans son *Tafsīr*, compile les rapports selon lesquels les anges étaient visibles pour certains Compagnons, portant notamment les noms des chefs ennemis auxquels ils avaient été assignés. Al-Qurṭubī insiste sur le fait que la promesse du soutien angélique était conditionnelle à la patience (*ṣabr*) — si les musulmans avaient fui, les anges ne seraient pas descendus. Al-Ṭabarī conserve l'ancien *tafsīr* selon lequel Badr fut un *miḥān* (creuset) dans lequel Allah distingua les constants des hésitants. La leçon est que l'infériorité numérique et matérielle est sans importance quand le soutien divin est présent, mais le soutien divin n'est pas automatique — il se mérite par la persévérance, la prière et la confiance inebranlable.
    reference: "Qur'an 3:123-126 (Surah Aal Imran), 8:5-19 (Surah al-Anfal)"
    source_notes: |
      Ibn Kathīr compiles reports that the angels were visible to some of the Companions, notably bearing the names of the enemy leaders they had been assigned to strike. Al-Qurṭubī emphasises that the promise of angelic support was conditional upon patience (*ṣabr*) — had the Muslims fled, the angels would not have descended.
    source_notes_fr: |
      Ibn Kathīr compile les rapports selon lesquels les anges étaient visibles pour certains Compagnons, portant notamment les noms des chefs ennemis auxquels ils avaient été assignés. Al-Qurṭubī insiste sur le fait que la promesse du soutien angélique était conditionnelle à la patience (*ṣabr*) — si les musulmans avaient fui, les anges ne seraient pas descendus.
    source_notes_ar: |
      يَجْمَعُ ابنُ كَثِيرٌ رِوَايَاتٍ تُفِيدُ بِرُؤْيَةِ بَعْضِ الصَّحَابَةِ لِلْمَلَائِكَةِ وَاضِحَةً، وَقَدْ كُتِبَتْ عَلَى أَجْنِحَتِهَا أَسْمَاءُ مَنْ قُدِّرَ لَهُمُ الضَّرْبُ. وَيُؤَكِّدُ القُرْطُبِيُّ أَنَّ وَعْدَ النَّصْرِ المَلَائِكِيِّ كَانَ مُشَرُوطًا بِالصَّبْرِ — لَوْ فَرَّ المُسْلِمُونَ لَمَا نَزَلَتِ المَلَائِكَةُ.
