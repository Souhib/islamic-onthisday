- slug: hadith-man-who-asked-for-too-much
  category: hadith_narrative
  title_en: The Man Who Asked for Too Much — The Two Gardens Parable
  title_ar: الرجل الذي طلب كثيرًا — مثل الجنتين
  title_fr: L'homme qui demanda trop — la parabole des deux jardins
  description_en: |
    The Prophet ﷺ recited the parable of two gardens belonging to a man who, upon entering one, boasted of its permanence and questioned the Hereafter. His believing companion urged him to remember Allah and warned that Satan could lead him astray. The man replied with defiant pride: "If you think I am less than you in wealth and children, perhaps my Lord will give me something better than your garden, and perhaps He will send upon it a thunderbolt from the sky so that it becomes a barren plain." The Qur'an records that Allah did indeed send a calamity upon the gardens, reducing them to ruin, and the man clutched at his head in remorse, lamenting that he had associated none with his Lord — yet his repentance came too late to restore what arrogance had destroyed. Ibn al-Qayyim, in al-Fawa'id, explains that the parable illustrates how greed and ingratitude compound each other: the man not only refused to thank Allah but actively challenged His power. Al-Saʿdī adds that the phrase "if Allah wills" (insha'Allah) is the antidote to this spiritual disease. For the Muslim today, the lesson is that every blessing carries the seeds of its own destruction if met with pride rather than gratitude, and that the only safe posture before divine favor is humble dependence.
  description_ar: |
    قال النبي ﷺ بِتَلَاوَةِ مَثَلِ رَجُلٍ دَخَلَ جَنَّتَهُ فَافْتَخَرَ بِدَوَامِهَا وَأَنْكَرَ الْآخِرَةَ. فَذَكَّرَهُ صَاحِبُهُ بِاللَّهِ وَحَذَّرَهُ مِنْ وَسَاوِسِ الشَّيْطَانِ. فَأَجَابَ بِكِبْرٍ: «لَئِنْ كُنْتَ تَرَانِي أَقَلَّ مِنْكَ مَالًا وَوَلَدًا، فَعَسَى رَبِّي أَنْ يُؤْتِيَنِ خَيْرًا مِنْ جَنَّتِكَ، وَأَنْ يُرْسِلَ عَلَيْهَا حُصْبَانًا مِنَ السَّمَاءِ فَتُصْبِحَ صَعِيدًا زَلَقًا». فَأَرْسَلَ اللَّهُ عَلَى جَنَّتَيْهِ عَذَابًا فَصَارَتَا حَبِيسَتَيْنِ، وَأَخَذَ الرَّجُلُ يَقْرِضُ بِيَدِهِ عَلَى رَأْسِهِ نَدَامَةً. يُوَضِّحُ ابْنُ الْقَيِّمِ فِي «الْفَوَائِدِ» أَنَّ الْمَثَلَ يُبَيِّنُ كَيْفَ يَتَرَاكَبُ الطَّمَعُ وَالْكُفْرَانُ: لَمْ يَكْتَفِ الرَّجُلُ بِعَدَمِ الشُّكْرِ، بَلْ تَحَدَّى قُدْرَةَ اللَّهِ. وَيُضِيفُ الصَّعْدِيُّ أَنَّ عِلَّاجَ هَذَا الدَّاءِ هُوَ قَوْلُ «إِنْ شَاءَ اللَّهُ». دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ كُلَّ نِعْمَةٍ تَحْمِلُ بُذُورَ هَلَاكِهَا إِذَا قُوبِلَتْ بِالْكِبْرِ لَا بِالشُّكْرِ، وَأَنَّ الْوَضْعَةَ الْآمِنَةَ أَمَامَ الْفَضْلِ الْإِلَهِيِّ هِيَ التَّوَاضُعُ وَالِاعْتِمَادُ عَلَى اللَّهِ.
  description_fr: |
    Le Prophète Muhammad ﷺ récita la parabole de deux jardins appartenant à un homme qui, en entrant dans l'un d'eux, se vanta de sa permanence et mit en doute l'Au-delà. Son compagnon croyant l'exhorta à se souvenir d'Allah et l'avertit que Satan pourrait l'égarrer. L'homme répondit avec une fierté défiunte : « Si tu me trouves inférieur à toi en richesse et en enfants, peut-être que mon Seigneur me donnera mieux que ton jardin, et peut-être qu'Il enverra sur lui un éclair du ciel pour qu'il devienne une plaine aride. » Le Coran rapporte qu'Allah envoya en effet un châtiment sur les jardins, les réduisant en ruine, et l'homme se prit la tête entre les mains de remords, se lamentant qu'il n'avait associé personne à son Seigneur — pourtant son repentir vint trop tard pour restaurer ce que l'arrogance avait détruit. Ibn al-Qayyim, dans al-Fawa'id, explique que la parabole illustre comment la cupidité et l'ingratitude se renforcent mutuellement : l'homme non seulement refusa de remercier Allah mais défia activement Sa puissance. Al-Saʿdī ajoute que la phrase « si Allah le veut » (insha'Allah) est l'antidote à cette maladie spirituelle. Pour le musulman d'aujourd'hui, la leçon est que chaque bénédiction porte en elle les germes de sa propre destruction si elle est accueillie avec orgueil plutôt qu'avec gratitude, et que la seule posture sûre devant la faveur divine est la dépendance humble.
  reference: Sahih Muslim 2963; Qur'an 18:32-44
  hadith_refs: Muslim 2963
  quran_refs: 18:32-44
  source_notes: |
    Ibn al-Qayyim (al-Fawāʾid) explains that the parable illustrates how greed and ingratitude compound each other. Al-Saʿdī adds that the phrase "if Allah wills" (inshāʾAllāh) is the antidote to this spiritual disease. The parable is narrated in Ṣaḥīḥ Muslim and corresponds to Qur'an 18:32-44.
  source_notes_fr: |
    Ibn al-Qayyim (al-Fawāʾid) explique que la parabole illustre comment la cupidité et l'ingratitude se renforcent mutuellement. Al-Saʿdī ajoute que la phrase « si Allah le veut » (inshāʾAllāh) est l'antidote à cette maladie spirituelle. La parabole est narratée dans Ṣaḥīḥ Muslim et correspond au Qur'an 18:32-44.
  source_notes_ar: |
    يُوَضِّحُ ابْنُ الْقَيِّمِ فِي «الْفَوَائِدِ» أَنَّ الْمَثَلَ يُبَيِّنُ كَيْفَ يَتَرَاكَبُ الطَّمَعُ وَالْكُفْرَانُ. وَيُضِيفُ الصَّعْدِيُّ أَنَّ عِلَّاجَ هَذَا الدَّاءِ هُوَ قَوْلُ «إِنْ شَاءَ اللَّهُ». رُوِيَ فِي صَحِيحِ مُسْلِمٍ وَيُطَابِقُ سُورَةَ الْكَهْفِ ٣٢-٤٤.
