  source_notes_ar: |
    يُسَمِّي النَّوَوِيُّ فِي «شَرْحِ صَحِيحِ مُسْلِمٍ» هَذَا «أُمَّ الْأَحَادِيثِ» لِأَنَّهُ يَشْمَلُ كُلَّ بُنْيَةِ الدِّينِ. وَيُضِيفُ ابْنُ رَجَبٍ أَنَّ الْمَرَاتِبَ الثَّلَاثَ تُمَثِّلُ تَجَلِّيَ النَّفْسِ تَدْرِيجِيًّا أَمَامَ رَبِّهَا. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
