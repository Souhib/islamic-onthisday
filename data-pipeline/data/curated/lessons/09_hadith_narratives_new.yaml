- slug: hadith-sahabi-who-gave-everything
  category: hadith_narrative
  title_en: The Sahabi Who Gave Everything — The Balance of Generosity
  title_ar: الصحابي الذي تصدق بكل شيء — توازن السخاء
  title_fr: Le Compagnon qui donna tout — l'équilibre de la générosité
  description_en: |
    Abu Dharr al-Ghifari, in a moment of spiritual fervor, distributed his entire wealth in charity, retaining nothing for his own sustenance or that of his family. When news reached the Prophet ﷺ, he did not praise the act but corrected the principle behind it. He taught Abu Dharr and the assembled Companions: "The upper hand is better than the lower hand. Begin with those you are responsible for. The best of charity is that which leaves something remaining." He emphasized that leaving one's dependents in need and forcing them to stretch their hands to others is not virtue but negligence. Ibn al-Qayyim, in Madārij al-Sālikīn, analyzes this hadith as a correction of the false dichotomy between world-renunciation and social responsibility: the true ascetic is not the one who divests himself of all means, but the one who uses his means wisely for Allah's sake while preserving his ability to continue serving. Al-Saʿdī adds that sustainable generosity is itself a form of long-term worship, whereas reckless giving that ends in dependency terminates the stream of goodness. For the Muslim today, this narrative provides the ethic of the balanced hand: give generously, but give in a way that keeps on giving.
  description_ar: |
    تَصَدَّقَ أَبُو ذَرٍّ الْغِفَارِيُّ بِكُلِّ مَالِهِ فِي لَحْظَةِ انْجِذَابٍ رُوحِيٍّ، فَلَمْ يُبْقِ شَيْئًا لِنَفْسِهِ أَوْ أَهْلِهِ. فَلَمَّا بَلَغَ النَّبِيَّ ﷺ لَمْ يُثَنِّ عَلَى الْفِعْلِ بَلْ صَحَّحَ الْمَبْدَأَ: «الْيَدُ الْعُلْيَا خَيْرٌ مِنَ الْيَدِ السُّفْلَى، وَابْدَأْ بِمَنْ تَعُولُ، وَخَيْرُ الصَّدَقَةِ مَا كَانَ عَنْ ظَهْرِ غِنًى». وَأَكَّدَ أَنَّ تَرْكَ الْمَعُولِينَ فِي حَاجَةٍ وَإِجْبَارَهُمْ عَلَى التَّسَوُّلِ لَيْسَ فَضْلًا بَلْ تَفْرِيطًا. يُحَلِّلُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» هَذَا الْحَدِيثَ تَصْحِيحًا لِلِاخْتِلَافِ الْكَاذِبِ بَيْنَ الزُّهْدِ وَالْمَسْؤُولِيَّةِ: الصِّدِّيقُ لَيْسَ مَنْ يَتَخَلَّى عَنِ الْوَسَائِلِ، بَلْ مَنْ يَسْتَعْمِلُهَا حِكْمَةً فِي سَبِيلِ اللَّهِ. وَيُضِيفُ الصَّعْدِيُّ أَنَّ السَّخَاءَ الْمُسْتَدَامَ عِبَادَةٌ طَوِيلَةُ الْمَدَى، بِخِلَافِ التَّبْذِيرِ الَّذِي يُفْضِي إِلَى الِاحْتِيَاجِ فَيَقْطَعُ جَدْوَلَ الْخَيْرِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنْ يُعْطِيَ بِيَدٍ مُتَوَازِنَةٍ: سَخِيًّا، لَكِنْ بِطَرِيقَةٍ تَضْمَنُ اسْتِمْرَارَ الْعَطَاءِ.
  description_fr: |
    Abu Dharr al-Ghifari, dans un moment de ferveur spirituelle, distribua toute sa fortune en aumône, ne conservant rien pour sa propre subsistance ou celle de sa famille. Lorsque la nouvelle parvint au Prophète Muhammad ﷺ, il ne loua pas l'acte mais corrigea le principe qui le sous-tendait. Il enseigna à Abu Dharr et aux Compagnons rassemblés : « La main supérieure vaut mieux que la main inférieure. Commencez par ceux dont vous êtes responsables. Le meilleur d'aumône est celui qui laisse quelque chose de restant. » Il souligna que laisser ses personnes à charge dans le besoin et les forcer à tendre la main vers autrui n'est pas une vertu mais une négligence. Ibn al-Qayyim, dans Madārij al-Sālikīn, analyse ce hadith comme une correction du faux dilemme entre le renoncement au monde et la responsabilité sociale : le véritable ascète n'est pas celui qui se dépouille de tous les moyens, mais celui qui les utilise sagement pour Allah tout en préservant sa capacité à continuer de servir. Al-Saʿdī ajoute que la générosité durable est elle-même une forme d'adoration à long terme, tandis que le don inconsidéré qui aboutit à la dépendance met fin au flot du bien. Pour le musulman d'aujourd'hui, ce récit fournit l'éthique de la main équilibrée : donnez généreusement, mais donnez de manière à ce que le don continue.
  reference: Sahih al-Bukhari 1427, Sahih Muslim 1035
  hadith_refs: Bukhari 1427, Muslim 1035
  source_notes: |
    Ibn al-Qayyim (Madārij al-Sālikīn) analyses this hadith as a correction of the false dichotomy between world-renunciation and social responsibility. Al-Saʿdī adds that sustainable generosity is itself a form of long-term worship, whereas reckless giving that ends in dependency terminates the stream of goodness. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
  source_notes_fr: |
    Ibn al-Qayyim (Madārij al-Sālikīn) analyse ce hadith comme une correction du faux dilemme entre le renoncement au monde et la responsabilité sociale. Al-Saʿdī ajoute que la générosité durable est elle-même une forme d'adoration à long terme, tandis que le don inconsidéré qui aboutit à la dépendance met fin au flot du bien. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
  source_notes_ar: |
    يُحَلِّلُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» هَذَا الْحَدِيثَ تَصْحِيحًا لِلِاخْتِلَافِ الْكَاذِبِ بَيْنَ الزُّهْدِ وَالْمَسْؤُولِيَّةِ. وَيُضِيفُ الصَّعْدِيُّ أَنَّ السَّخَاءَ الْمُسْتَدَامَ عِبَادَةٌ طَوِيلَةُ الْمَدَى. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
