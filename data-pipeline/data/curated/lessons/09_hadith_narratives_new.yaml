    يُفَرِّغُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» فُصُولًا كَامِلَةً لِهَذَا الْحَرْبِ الدَّاخِلِيِّ، مُفَسِّرًا أَنَّ النَّفْسَ كَالْفَرَسِ الْأَعْرَفِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ ضَبْطَ الْغَضَبِ تَمَيَّزَ بِهِ لِأَنَّهُ بَابُ جُلِّ الذُّنُوبِ. رُوِيَ فِي صَحِيحِ مُسْلِمٍ وَحَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالصَّحَاحِ.
