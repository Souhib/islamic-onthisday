- slug: hadith-splitting-moon
  category: hadith_narrative
  title_en: The Splitting of the Moon — A Sign Denied
  title_ar: انشقاق القمر — آية مُنكَرة
  title_fr: La division de la lune — un signe nié
  description_en: |
    Before the Hijra, the Quraysh of Makkah, exasperated by the Prophet's ﷺ persistence, demanded a miracle to prove his prophethood. That very night, the moon split into two distinct halves, one on either side of Mount Hira', so clearly that the Companions who witnessed it could see the gap between them. The event is narrated by multiple eyewitnesses — including Ibn Mas'ud, Anas ibn Malik, and Jubayr ibn Mut'im — through independent chains of transmission that meet the most stringent criteria of hadith criticism. Yet the Quraysh dismissed what they had seen with their own eyes, branding it sorcery and optical illusion. The Qur'an records the event in Surah al-Qamar: "The Hour has drawn near, and the moon has split. And if they see a sign, they turn away and say: continuing magic." Ibn Ḥajar, in Fath al-Bari, explains that this hadith is not merely a miraculous report but a lesson in the psychology of denial: those determined to reject truth will reject even perceptible evidence. Al-Saʿdī adds that the splitting was a mercy before the punishment — a final warning to a nation on the brink of destruction. For the Muslim today, the narrative teaches that signs are only beneficial for hearts willing to receive them, and that the greatest blindness is not of the eyes but of the soul.
  description_ar: |
    قَبْلَ الْهِجْرَةِ، طَلَبَتْ قُرَيْشٌ مِنَ النَّبِيِّ ﷺ آيَةً تُثْبِتُ نُبُوَّتَهُ. فَانْشَقَّ الْقَمَرُ تِلْكَ اللَّيْلَةَ نِصْفَيْنِ عَنْ يَمِينِ جَبَلِ حِرَاءَ وَعَنْ يَسَارِهِ، حَتَّى رَأَى الصَّحَابَةُ الْفُرْجَةَ بَيْنَهُمَا. وَرَوَاهُ شُهُودُ عِيَانٍ عَدَّةٌ - مِنْهُمْ ابْنُ مَسْعُودٍ وَأَنَسُ بْنُ مَالِكٍ وَجُبَيْرُ بْنُ مُطْعِمٍ - بِأَسَانِيدَ مُسْتَقِلَّةٍ تَبْلُغُ أَشَدَّ شَرَائِطِ النَّقْدِ. وَلَكِنَّ قُرَيْشًا أَنْكَرَتْ مَا شَاهَدَتْهُ بِأَعْيُنِهَا وَنَعَتْهُ بِالسِّحْرِ. يُفَسِّرُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ الْحَدِيثَ لَيْسَ مُجَرَّدَ رِوَايَةٍ مُعْجِزَةٍ، بَلْ دَرْسٌ فِي سِيكُولُوجِيَةِ الْإِنْكَارِ. وَيُضِيفُ الصَّعْدِيُّ أَنَّ الِانْشِقَاقَ كَانَ رَحْمَةً قَبْلَ الْعِقَابِ - تَحْذِيرًا أَخِيرًا لِقَوْمٍ عَلَى شَفَا الْهَلَاكِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ الْآيَاتِ لَا تَنْفَعُ إِلَّا الْقُلُوبَ الْمُسْتَعِدَّةَ لِلْقَبُولِ، وَأَنَّ أَعْظَمَ عَمًى لَيْسَ عَمَى الْبَصَرِ بَلْ عَمَى الْقَلْبِ.
  description_fr: |
    Avant l'Hégire, les Qurayshites de La Mecque, exaspérés par la persistance du Prophète Muhammad ﷺ, exigèrent un miracle pour prouver sa prophétie. Cette nuit même, la lune se divisa en deux moitiés distinctes, de part et d'autre du mont Hira', si clairement que les Compagnons qui l'observèrent purent voir l'espace entre elles. L'événement est rapporté par plusieurs témoins oculaires — dont Ibn Mas'ud, Anas ibn Malik et Jubayr ibn Mut'im — par des chaînes de transmission indépendantes qui satisfont aux critères les plus rigoureux de la critique du hadith. Pourtant, les Qurayshites renièrent ce qu'ils avaient vu de leurs propres yeux, le qualifiant de sorcellerie et d'illusion d'optique. Le Coran rapporte l'événement dans la sourate al-Qamar : « L'Heure s'est approchée et la lune s'est fendue. Et s'ils voient un signe, ils s'en détournent et disent : une magie continue. » Ibn Hajar, dans Fath al-Bari, explique que ce hadith n'est pas seulement un rapport miraculeux mais une leçon sur la psychologie du déni : ceux qui sont déterminés à rejeter la vérité rejetteront même la preuve perceptible. Al-Saʿdī ajoute que la division fut une miséricorde avant le châtiment — un dernier avertissement à une nation au bord de la destruction. Pour le musulman d'aujourd'hui, le récit enseigne que les signes ne profitent qu'aux cœurs disposés à les recevoir, et que la plus grande cécité n'est pas celle des yeux mais celle de l'âme.
  reference: Sahih al-Bukhari 3636, Sahih Muslim 2800; Qur'an 54:1
  hadith_refs: Bukhari 3636, Muslim 2800
  quran_refs: '54:1'
  source_notes: |
    Ibn Ḥajar (Fatḥ al-Bārī) explains that this hadith is not merely a miraculous report but a lesson in the psychology of denial: those determined to reject truth will reject even perceptible evidence. Al-Saʿdī adds that the splitting was a mercy before punishment — a final warning to a nation on the brink of destruction. The event is narrated with multiple independent chains by eyewitnesses.
  source_notes_fr: |
    Ibn Ḥajar (Fatḥ al-Bārī) explique que ce hadith n'est pas seulement un rapport miraculeux mais une leçon sur la psychologie du déni : ceux qui sont déterminés à rejeter la vérité rejetteront même la preuve perceptible. Al-Saʿdī ajoute que la division fut une miséricorde avant le châtiment — un dernier avertissement à une nation au bord de la destruction. L'événement est rapporté par plusieurs témoins oculaires par des chaînes indépendantes.
  source_notes_ar: |
    يُفَسِّرُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ الْحَدِيثَ لَيْسَ مُجَرَّدَ رِوَايَةٍ مُعْجِزَةٍ، بَلْ دَرْسٌ فِي سِيكُولُوجِيَةِ الْإِنْكَارِ. وَيُضِيفُ الصَّعْدِيُّ أَنَّ الِانْشِقَاقَ كَانَ رَحْمَةً قَبْلَ الْعِقَابِ — تَحْذِيرًا أَخِيرًا لِقَوْمٍ عَلَى شَفَا الْهَلَاكِ. وَقَدْ رَوَاهُ شُهُودُ عِيَانٍ بِأَسَانِيدَ مُسْتَقِلَّةٍ.
