- slug: hadith-man-with-99-scrolls
  category: hadith_narrative
  title_en: Ninety-Nine Scrolls and One Card — The Weight of Tawhid
  title_ar: تسع وتسعون سجلاً وكرت — ثقل التوحيد
  title_fr: Quatre-vingt-dix-neuf rouleaux et une carte — le poids du tawhid
  description_en: 'The Prophet ﷺ described a man who will be brought on the Day of Resurrection with ninety-nine scrolls of
    sins, each scroll stretching as far as the eye can see. Overwhelmed by the magnitude of his record, he will despair of
    any mercy. Then a small card will be brought forth, and on it will be written nothing but the testimony of faith: ''Ashhadu
    an la ilaha illa Allah wa anna Muhammadan rasulu Allah.'' The man will protest that this tiny card is nothing against
    the mountains of his misdeeds, but it will be placed in the scale and outweigh all ninety-nine scrolls — not because the
    words are magical, but because they represent a sincere covenant with Allah that endured beneath the surface of a sinful
    life. Ibn Rajab, in Jami'' al-''Ulum wa al-Hikam, explains that the hadith is not a license for sin but a lifeline for
    the despairing: the door of tawhid is never fully closed, and its weight in the divine scale transcends every other calculation.
    Al-Nawawi adds that the card''s superiority lies in its sincerity, not its size. For the Muslim today, this narrative
    is both hope and warning: hope that sincere faith can outweigh a lifetime of failure, and warning that without the anchoring
    weight of tawhid, even small scrolls of sin will sink the soul.'
  description_ar: 'وَصَفَ النَّبِيُّ ﷺ رَجُلًا يُؤْتَى يَوْمَ الْقِيَامَةِ بِتِسْعٍ وَتِسْعِينَ سِجِلًّا مِنَ الذُّنُوبِ،
    كُلُّ سِجِلٍّ مُدَّ بَصَرُهُ. فَيَيْأَسُ مِنَ الرَّحْمَةِ، ثُمَّ تُؤْتَى بِكَرَّةٍ صَغِيرَةٍ فِيهَا: أَشْهَدُ أَنْ لَا
    إِلَهَ إِلَّا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ. فَتُوضَعُ فِي الْمِيزَانِ فَتَطْغَى عَلَى السِّجِلَّاتِ. يُفَسِّرُ
    ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ وَالْحِكَمِ» أَنَّ الْحَدِيثَ لَيْسَ رُخْصَةً فِي الذُّنُوبِ، بَلْ حَبْلُ نَجَاةٍ
    لِلْيَائِسِينَ: بَابُ التَّوْحِيدِ لَا يُغْلَقُ أَبَدًا. وَيُضِيفُ النَّوَوِيُّ أَنَّ تَفَوُّقَ الْكَرَّةِ لَا يَعُودُ
    إِلَى حَجْمِهَا بَلْ إِلَى إِخْلَاصِهَا. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ التَّوْحِيدَ الصَّادِقَ قَادِرٌ عَلَى مُوَازَنَةِ
    عُمْرٍ مِنَ الْفَشَلِ، وَأَنَّهُ بِدُونِ وَزْنِ التَّوْحِيدِ تَغْرِقُ النَّفْسُ فِي أَصْغَرِ سِجِلٍّ.'
  description_fr: 'Le Prophète Muhammad ﷺ décrivit un homme qui sera amené au Jour de la Résurrection avec quatre-vingt-dix-neuf
    rouleaux de péchés, chaque rouleau s''étendant aussi loin que le regard peut porter. Accablé par l''ampleur de son dossier,
    il désespérera de toute miséricorde. Alors on lui apportera une petite carte sur laquelle sera écrite rien d''autre que
    le témoignage de foi : ''J''atteste qu''il n''y a de divinité digne d''adoration qu''Allah et que Muhammad est le Messager
    d''Allah.'' L''homme protestera que cette minuscule carte n''est rien face aux montagnes de ses méfaits, mais elle sera
    placée dans la balance et l''emportera sur les quatre-vingt-dix-neuf rouleaux — non pas parce que les mots sont magiques,
    mais parce qu''ils représentent un pacte sincère avec Allah qui a perduré sous la surface d''une vie pécheresse. Ibn Rajab,
    dans Jami'' al-''Ulum wa al-Hikam, explique que ce hadith n''est pas une permission de pécher mais une bouée de sauvetage
    pour les désespérés : la porte du tawhid n''est jamais complètement fermée, et son poids dans la balance divine transcende
    tout autre calcul. Al-Nawawi ajoute que la supériorité de la carte réside dans sa sincérité, non dans sa taille. Pour
    le musulman d''aujourd''hui, ce récit est à la fois espoir et avertissement : espoir que la foi sincère peut l''emporter
    sur une vie d''échecs, et avertissement que sans le poids ancrant du tawhid, même de petits rouleaux de péché feront sombrer
    l''âme.'
  reference: Jami' at-Tirmidhi 2638 (Hasan Sahih), Musnad Ahmad 11993
  hadith_refs: Tirmidhi 2638, Musnad Ahmad 11993
  source_notes: |
    Ibn Rajab (Jāmiʿ al-ʿUlūm) explains that this hadith is not a licence for sin but a lifeline for the despairing: the door of tawḥīd is never fully closed. Al-Nawawī adds that the card's superiority lies in its sincerity, not its size. The hadith is graded ḥasan ṣaḥīḥ by al-Albānī and is frequently cited in works on repentance and divine mercy.
  source_notes_fr: |
    Ibn Rajab (Jāmiʿ al-ʿUlūm) explique que ce hadith n'est pas une permission de pécher mais une bouée de sauvetage pour les désespérés : la porte du tawḥīd n'est jamais complètement fermée. Al-Nawawī ajoute que la supériorité de la carte réside dans sa sincérité, non dans sa taille. Le hadith est gradé ḥasan ṣaḥīḥ par al-Albānī et est fréquemment cité dans les ouvrages sur le repentir et la miséricorde divine.
  source_notes_ar: |
    يُفَسِّرُ ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ» أَنَّ الْحَدِيثَ لَيْسَ رُخْصَةً فِي الذُّنُوبِ، بَلْ حَبْلُ نَجَاةٍ لِلْيَائِسِينَ: بَابُ التَّوْحِيدِ لَا يُغْلَقُ أَبَدًا. وَيُضِيفُ النَّوَوِيُّ أَنَّ تَفَوُّقَ الْكَرَّةِ لَا يَعُودُ إِلَى حَجْمِهَا بَلْ إِلَى إِخْلَاصِهَا. حَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالْحَسَنِ الصَّحِيحِ، وَهُوَ مِنْ أَشْهَرِ الْأَحَادِيثِ فِي التَّوْبَةِ وَالرَّحْمَةِ.
  display_day_of_year: 131
  source_url: https://sunnah.com/tirmidhi:2638
- slug: hadith-garden-for-preserver
  category: hadith_narrative
  title_en: A Guarantee of Paradise — Guarding the Tongue and the Private Parts
  title_ar: ضمان الجنة — حفظ اللسان والفرج
  title_fr: Une garantie du Paradis — préserver la langue et les parties intimes
  description_en: |
    The Prophet ﷺ once made a breathtaking promise with a breathtaking condition: "Whoever guarantees me what is between his jaws and what is between his legs, I guarantee him Paradise." The hadith identifies the tongue and the private parts as the two gates through which the vast majority of human sin enters — gossip, backbiting, false testimony, and sexual transgression. It reduces the complexity of spiritual discipline to a single, uncompromising focus: guard these two, and you have guarded your hereafter. Al-Nawawi included this hadith in his Riyad al-Salihin and commented that it names the two organs most prone to weakness and hardest to discipline. Ibn al-Qayyim, in Madārij al-Sālikīn, writes that the tongue is the key to both good and evil — it can utter words that draw one near to Allah or words that cast one into the Fire. Ibn Ḥajar adds that the hadith uses the language of commerce — "guarantee" — to emphasize that this is a transaction of absolute certainty: control these two domains, and Paradise is contractually assured. For the Muslim today, this means vigilance over speech and chastity is not peripheral piety but the very core of salvation.
  description_ar: |
    قال النبي ﷺ: «مَنْ يَضْمَنْ لِي مَا بَيْنَ لَحْيَيْهِ وَمَا بَيْنَ رِجْلَيْهِ أَضْمَنْ لَهُ الْجَنَّةَ». يُحَدِّدُ الْحَدِيثُ اللِّسَانَ وَالْفَرْجَ بِمَثَابَةِ بَابَيْنِ تَدْخُلُ مِنْهُمَا جُلُّ الذُّنُوبِ: الْغِيبَةُ وَالنَّمِيمَةُ وَالشَّهَادَةُ الْكَاذِبَةُ وَالْفَوَاحِشُ. وَيُخَصِّصُ الْحَدِيثُ تَعَقِيدَ التَّرْبِيَةِ الرُّوحِيَّةِ فِي نُقْطَةٍ وَاحِدَةٍ: احْفَظْ هَذَيْنِ وَقَدْ حَفِظْتَ آخِرَتَكَ. أَدْخَلَ النَّوَوِيُّ هَذَا الْحَدِيثَ فِي «رِيَاضِ الصَّالِحِينَ» وَقَالَ: إِنَّهُ يُسَمِّي الْعُضْوَيْنِ الْأَكْثَرِ ضَعْفًا وَأَصْعَبِ ضَبْطًا. وَيَكْتُبُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ اللِّسَانَ مِفْتَاحُ الْخَيْرِ وَالشَّرِّ، فَهُوَ يَقُولُ كَلِمَةً تُقَرِّبُهُ مِنَ اللَّهِ وَكَلِمَةً تُطْرِفُهُ فِي النَّارِ. وَيُضِيفُ ابْنُ حَجَرٍ أَنَّ الْحَدِيثَ يَسْتَعِيرُ لُغَةَ التِّجَارَةِ - «الضَّمَانَ» - لِيُؤَكِّدَ أَنَّ هَذِهِ صَفْقَةُ يَقِينٍ مُطْلَقٍ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ الْمُرَابَطَةَ عَلَى اللِّسَانِ وَالْعِفَّةِ لَيْسَتْ تَقْوًى هَامِشِيَّةً، بَلْ هِيَ لُبُّ النَّجَاةِ ذَاتُهُ.
  description_fr: |
    Le Prophète Muhammad ﷺ fit un jour une promesse époustouflante assortie d'une condition époustouflante : « Quiconque me garantit ce qui se trouve entre ses mâchoires et ce qui se trouve entre ses jambes, je lui garantis le Paradis. » Ce hadith identifie la langue et les parties intimes comme les deux portes par lesquelles passe l'immense majorité des péchés humains — médisance, calomnie, faux témoignage et transgression sexuelle. Il réduit la complexité de la discipline spirituelle à un seul objectif implacable : préserver ces deux-là, et vous aurez préservé votre Au-delà. Al-Nawawi a inclus ce hadith dans ses Riyad al-Salihin et a commenté qu'il nomme les deux organes les plus enclins à la faiblesse et les plus difficiles à discipliner. Ibn al-Qayyim, dans Madārij al-Sālikīn, écrit que la langue est la clé du bien et du mal — elle peut prononcer des mots qui rapprochent d'Allah ou des mots qui précipitent au Feu. Ibn Hajar ajoute que le hadith emprunte le langage du commerce — « garantie » — pour souligner qu'il s'agit d'une transaction de certitude absolue : maîtriser ces deux domaines, et le Paradis est contractuellement assuré. Pour le musulman d'aujourd'hui, cela signifie que la vigilance sur la parole et la chasteté ne sont pas une piété marginale mais le cœur même du salut.
  reference: Sahih al-Bukhari 6474
  hadith_refs: Bukhari 6474
  source_notes: |
    Al-Nawawī included this hadith in his Riyāḍ al-Ṣāliḥīn and commented that it names the two organs most prone to weakness and hardest to discipline. Ibn al-Qayyim (Madārij al-Sālikīn) writes that the tongue is the key to both good and evil. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and is a standard text in works on guarding the senses.
  source_notes_fr: |
    Al-Nawawī a inclus ce hadith dans ses Riyāḍ al-Ṣāliḥīn et a commenté qu'il nomme les deux organes les plus enclins à la faiblesse et les plus difficiles à discipliner. Ibn al-Qayyim (Madārij al-Sālikīn) écrit que la langue est la clé du bien et du mal. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et est un texte de référence dans les ouvrages sur la garde des sens.
  source_notes_ar: |
    أَدْخَلَ النَّوَوِيُّ هَذَا الْحَدِيثَ فِي «رِيَاضِ الصَّالِحِينَ» وَقَالَ: إِنَّهُ يُسَمِّي الْعُضْوَيْنِ الْأَكْثَرِ ضَعْفًا وَأَصْعَبِ ضَبْطًا. وَيَكْتُبُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ اللِّسَانَ مِفْتَاحُ الْخَيْرِ وَالشَّرِّ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَهُوَ مِنْ الْنُّصُوصِ الْمِعْيَارِيَّةِ فِي حِفْظِ الْحَوَاسِّ.
  display_day_of_year: 133
  source_url: https://sunnah.com/bukhari:6474
- slug: hadith-slander-against-aisha
  category: hadith_narrative
  title_en: The Slander Against Aisha — When Lies Nearly Shook the State
  title_ar: الإفك — حين كادت الكذبة تهز الدولة
  title_fr: La calomnie contre Aicha — quand un mensonge faillit ébranler l'État
  description_en: 'The Prophet ﷺ led an expedition against the Banu al-Mustaliq, and on the return journey, Aisha — temporarily
    separated from the caravan after searching for a lost necklace — was escorted back to Madinah by Safwan ibn al-Mu''attal.
    A hypocrite named Abdullah ibn Ubayy seized upon the incident to spread a vicious slander that nearly ruptured the Muslim
    community. For a month, the Prophet ﷺ remained in anguish, consulting Companions and seeking guidance, while Aisha fell
    ill with fever and weeping. Finally, Allah revealed Surah al-Nur, verses 11-20, declaring the accusers liars and establishing
    the legal standard of four witnesses for charges of adultery — a standard so stringent that it functions more as protection
    than prosecution. Ibn Hajar, in Fath al-Bari, explains that the incident was a divine test of the community''s maturity:
    would they believe gossip or await evidence? Al-Nawawi adds that Aisha''s steadfastness became the model for every believer
    falsely accused. For the Muslim today, the narrative is a warning against the speed of rumor and the duty of dignified
    silence in the face of unproven accusation.'
  description_ar: 'خَرَجَ النَّبِيُّ ﷺ فِي غَزْوَةِ بَنِي الْمُصْطَلِقِ، وَتَأَخَّرَتْ عَائِشَةُ عَنِ الرَّكْبِ فِي طَلَبِ
    قِلَادَةٍ، فَرَافَقَهَا صَفْوَانُ بْنُ الْمُعَطَّلِ. فَانْتَشَرَ الْمُنَافِقُ عَبْدُ اللَّهِ بْنُ أُبَيٍّ شَائِعَةً كَادَتْ
    تُفَرِّقُ الْمُجْتَمَعَ. وَلَمْ يَنْزِلِ الْوَحْيُ إِلَّا بَعْدَ شَهْرٍ، فَأَنْزَلَ اللَّهُ سُورَةَ النُّورِ آيَاتِ الْإِفْكِ،
    وَأَقَامَ شَرْطَ الْأَرْبَعَةِ الشُّهُودِ. يُفَسِّرُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ الْحَادِثَةَ كَانَتْ اخْتِبَارًا
    لِنُضْجِ الْمُجْتَمَعِ: هَلْ يُصَدِّقُ الْإِشَاعَةَ أَمْ يَنْتَظِرُ الدَّلِيلَ؟ وَيُضِيفُ النَّوَوِيُّ أَنَّ صَبْرَ عَائِشَةَ
    صَارَ أُسْوَةً لِكُلِّ مُتَّهَمٍ بِبَاطِلٍ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ سُرْعَةَ الشَّائِعَةِ وَاجِبُ الْحَذَرِ
    مِنْهَا، وَأَنَّ الصَّمْتَ الْوَقُورَ فِي وَجْهِ التُّهَمَةِ الْمُجَرَّدَةِ فَضِيلَةٌ.'
  description_fr: 'Le Prophète Muhammad ﷺ conduisit une expédition contre les Banu al-Mustaliq, et sur le chemin du retour,
    Aicha — temporairement séparée de la caravane après avoir cherché un collier perdu — fut raccompagnée à Médine par Safwan
    ibn al-Mu''attal. Un hypocrite nommé Abdullah ibn Ubayy saisit l''incident pour répandre une méchante calomnie qui faillit
    rompre la communauté musulmane. Pendant un mois, le Prophète Muhammad ﷺ resta dans l''angoisse, consultant les Compagnons
    et cherchant la guidance, tandis qu''Aicha tombait malade de fièvre et de larmes. Finalement, Allah révéla la sourate
    al-Nur, versets 11-20, déclarant les accusateurs menteurs et établissant la norme juridique de quatre témoins pour les
    accusations d''adultère — une norme si stricte qu''elle fonctionne plus comme protection que comme poursuite. Ibn Hajar,
    dans Fath al-Bari, explique que l''incident fut un test divin de la maturité de la communauté : croira-t-elle les ragots
    ou attendra-t-elle des preuves ? Al-Nawawi ajoute que la fermeté d''Aicha devint le modèle pour tout croyant faussement
    accusé. Pour le musulman d''aujourd''hui, ce récit est un avertissement contre la vitesse de propagation des rumeurs et
    le devoir de silence digne face à une accusation non prouvée.'
  reference: Sahih al-Bukhari 4141, Sahih Muslim 2770; Qur'an 24:11-20
  hadith_refs: Bukhari 4141, Muslim 2770
  quran_refs: 24:11-20
  source_notes: |
    Ibn Ḥajar (Fatḥ al-Bārī) explains that the incident was a divine test of the community's maturity: would they believe gossip or await evidence? Al-Nawawī adds that ʿĀʾisha's steadfastness became the model for every believer falsely accused. The revelation of the liʿān procedure and the four-witness requirement in Sūrat al-Nūr is the legislative outcome of this event.
  source_notes_fr: |
    Ibn Ḥajar (Fatḥ al-Bārī) explique que cet incident fut un test divin de la maturité de la communauté : croira-t-elle les ragots ou attendra-t-elle des preuves ? Al-Nawawī ajoute que la fermeté dʿĀʾisha devint le modèle pour tout croyant faussement accusé. La révélation de la procédure du liʿān et de l'exigence de quatre témoins dans la Sūrat al-Nūr est l'aboutissement législatif de cet événement.
  source_notes_ar: |
    يُفَسِّرُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ الْحَادِثَةَ كَانَتْ اخْتِبَارًا لِنُضْجِ الْمُجْتَمَعِ: هَلْ يُصَدِّقُ الْإِشَاعَةَ أَمْ يَنْتَظِرُ الدَّلِيلَ؟ وَيُضِيفُ النَّوَوِيُّ أَنَّ صَبْرَ عَائِشَةَ صَارَ أُسْوَةً لِكُلِّ مُتَّهَمٍ بِبَاطِلٍ. وَإِنْزَالُ سُورَةِ النُّورِ بِشَرْطِ الْأَرْبَعَةِ الشُّهُودِ هُوَ الثَّمَرَةُ التَّشْرِيعِيَّةُ لِهَذَا الْحَادِثِ.
  display_day_of_year: 134
  source_url: https://sunnah.com/bukhari:4141
- slug: hadith-moderation-in-worship
  category: hadith_narrative
  title_en: Your Body Has a Right Over You — The Ethics of Moderation
  title_ar: إن لجسدك عليك حقاً — أخلاق الاعتدال
  title_fr: Ton corps a des droits sur toi — l'éthique de la modération
  description_en: 'Abdullah ibn Amr ibn al-As was so zealous in his devotion that he fasted continuously and prayed the entire
    night without sleep. When the Prophet ﷺ learned of this, he summoned him and taught a principle that governs all spiritual
    practice: ''Your body has a right over you, your eyes have a right over you, and your wife has a right over you.'' He
    instructed Abdullah to fast three days a month, or if he must do more, the fast of Dawud — half the days — and to pray
    at night but also to sleep. Ibn al-Qayyim, in Madārij al-Sālikīn, explains that this hadith corrects the disease of spiritual
    extremism, which often masquerades as piety while destroying the very vessels through which worship is sustained — the
    body, the family, and the mind. Al-Nawawi adds that the Prophet''s specific mention of the wife''s right establishes that
    relational duties are not obstacles to devotion but integral components of it. For the Muslim today, the narrative dismantles
    the cult of burnout masquerading as religious excellence: sustainable worship that honors every trust — physical, familial,
    and communal — is the true sunnah.'
  description_ar: 'كَانَ عَبْدُ اللَّهِ بْنُ عَمْرِو بْنِ الْعَاصِي يَصُومُ الدَّهْرَ وَيَقُومُ اللَّيْلَ كُلَّهُ. فَلَمَّا
    بَلَغَ النَّبِيَّ ﷺ دَعَاهُ وَعَلَّمَهُ: «إِنَّ لِجَسَدِكَ عَلَيْكَ حَقًّا، وَإِنَّ لِعَيْنِكَ عَلَيْكَ حَقًّا، وَإِنَّ
    لِزَوْجَتِكَ عَلَيْكَ حَقًّا». وَأَمَرَهُ بِصِيَامِ ثَلَاثَةِ أَيَّامٍ مِنْ كُلِّ شَهْرٍ، أَوْ صِيَامِ دَاوُدَ — نِصْفَ
    الدَّهْرِ — وَأَنْ يُصَلِّيَ وَيَنَامَ. يُحَلِّلُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ الْحَدِيثَ يُعَالِجُ
    مَرَضَ التَّشَدُّدِ الرُّوحِيِّ الَّذِي يَتَنَكَّرُ بِثِيَابِ التَّقْوَى وَيُدَمِّرُ آلاتِ الْعِبَادَةِ. وَيُضِيفُ النَّوَوِيُّ
    أَنَّ ذِكْرَ حَقِّ الزَّوْجَةِ يُقِيمُ أَنَّ الْوَاجِبَاتِ الْعِلَاقِيَّةَ لَيْسَتْ عَوَائِقَ بَلْ جُزْءًا مِنَ التَّقْوَى.
    دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ الِاسْتِهْلاكَ الْمَقْنَعَ بِالتَّمَيُّزِ الدِّينِيِّ لَيْسَ سُنَّةً، بَلْ الْعِبَادَةُ
    الْمُسْتَدَامَةُ الَّتِي تُكْرِمُ كُلَّ أَمَانَةٍ هِيَ السُّنَّةُ الْحَقِيقِيَّةُ.'
  description_fr: 'Abdullah ibn Amr ibn al-As était si zélé dans sa dévotion qu''il jeûnait continuellement et priait toute
    la nuit sans dormir. Lorsque le Prophète Muhammad ﷺ l''apprit, il le convoqua et lui enseigna un principe qui régit toute
    pratique spirituelle : ''Ton corps a des droits sur toi, tes yeux ont des droits sur toi, et ta femme a des droits sur
    toi.'' Il lui ordonna de jeûner trois jours par mois, ou s''il devait en faire davantage, le jeûne de Dawud — la moitié
    des jours — et de prier la nuit mais aussi de dormir. Ibn al-Qayyim, dans Madārij al-Sālikīn, explique que ce hadith corrige
    la maladie de l''extrémisme spirituel, qui se déguise souvent en piété tout en détruisant les vases mêmes par lesquels
    le culte se perpétue — le corps, la famille et l''esprit. Al-Nawawi ajoute que la mention spécifique du droit de la femme
    par le Prophète établit que les devoirs relationnels ne sont pas des obstacles à la dévotion mais des composantes intégrales
    de celle-ci. Pour le musulman d''aujourd''hui, ce récit démantèle le culte de l''épuisement professé comme excellence
    religieuse : le culte durable qui honore chaque confiance — physique, familiale et communautaire — est la véritable sunnah.'
  reference: Sahih al-Bukhari 1150, Sahih Muslim 1159
  hadith_refs: Bukhari 1150, Muslim 1159
  source_notes: |
    Ibn al-Qayyim (Madārij al-Sālikīn) explains that this hadith corrects the disease of spiritual extremism, which often masquerades as piety while destroying the vessels of worship. Al-Nawawī adds that the Prophet's ﷺ specific mention of the wife's right establishes that relational duties are integral components of devotion, not obstacles to it. The hadith is the primary proof for the obligation of moderation in worship.
  source_notes_fr: |
    Ibn al-Qayyim (Madārij al-Sālikīn) explique que ce hadith corrige la maladie de l'extrémisme spirituel, qui se déguise souvent en piété tout en détruisant les vases mêmes par lesquels le culte se perpétue. Al-Nawawī ajoute que la mention spécifique du droit de la femme par le Prophète ﷺ établit que les devoirs relationnels sont des composantes intégrales de la dévotion, et non des obstacles. Ce hadith est la preuve principale de l'obligation de modération dans le culte.
  source_notes_ar: |
    يُحَلِّلُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ الْحَدِيثَ يُعَالِجُ مَرَضَ التَّشَدُّدِ الرُّوحِيِّ الَّذِي يَتَنَكَّرُ بِثِيَابِ التَّقْوَى. وَيُضِيفُ النَّوَوِيُّ أَنَّ ذِكْرَ حَقِّ الزَّوْجَةِ يُقِيمُ أَنَّ الْوَاجِبَاتِ الْعِلَاقِيَّةَ لَيْسَتْ عَوَائِقَ بَلْ جُزْءًا مِنَ التَّقْوَى. وَهُوَ الدَّلِيلُ الْأَوَّلُ عَلَى وُجُوبِ الِاعْتِدَالِ فِي الْعِبَادَةِ.
  display_day_of_year: 138
  source_url: https://sunnah.com/bukhari:1150
- slug: hadith-preparation-for-the-hour
  category: hadith_narrative
  title_en: You Are With Whom You Love — Preparing for the Hour
  title_ar: مع من أحببت — الاستعداد للساعة
  title_fr: Tu seras avec celui que tu aimes — se préparer pour l'Heure
  description_en: 'A man came to the Prophet ﷺ and asked: ''When is the Hour?'' The Prophet ﷺ replied with a counter-question
    that redirected the entire conversation from curiosity to character: ''What have you prepared for it?'' The man answered:
    ''Not much — neither much prayer nor much fasting nor much charity, but I love Allah and His Messenger.'' The Prophet
    ﷺ looked at him and said: ''You will be with the one you love.'' This brief exchange became one of the most quoted reassurances
    in Islamic spirituality. Ibn Rajab, in Jami'' al-''Ulum wa al-Hikam, explains that love is not merely sentiment but an
    operative force that shapes behavior, companionship, and final destination. Al-Nawawi adds that the hadith elevates love
    to the status of a deed — not replacing action, but summarizing the disposition that makes action fruitful. For the Muslim
    today, the narrative redirects anxious speculation about timelines toward the only preparation that matters: cultivate
    love for the Prophet ﷺ and his way, for on the Day when all other preparations may prove insufficient, love will be the
    compass that carries you to your company.'
  description_ar: 'سَأَلَ رَجُلٌ النَّبِيَّ ﷺ: مَتَى السَّاعَةُ؟ فَرَدَّ بِسُؤَالٍ يُحَوِّلُ الْحِوَارَ مِنَ الْفُضُولِ إِلَى
    الشَّخْصِيَّةِ: «مَا أَعْدَدْتَ لَهَا؟» قَالَ: لَا كَثِيرَ صَلَاةٍ وَلَا صِيَامٍ وَلَا صَدَقَةٍ، وَلَكِنِّي أُحِبُّ اللَّهَ
    وَرَسُولَهُ. فَقَالَ: «أَنْتَ مَعَ مَنْ أَحْبَبْتَ». يُفَسِّرُ ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ وَالْحِكَمِ» أَنَّ
    الْمَحَبَّةَ لَيْسَتْ مُجَرَّدَ شُعُورٍ، بَلْ قُوَّةً فَاعِلَةً تُشَكِّلُ السُّلُوكَ وَالصُّحْبَةَ وَالْمَصِيرَ. وَيُضِيفُ
    النَّوَوِيُّ أَنَّ الْحَدِيثَ يَرْفَعُ الْمَحَبَّةَ إِلَى مَرْتَبَةِ الْعَمَلِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ التَّخَمُّنَ
    فِي الْمَوْاعِيدِ يُحَوَّلُهُ الْحَدِيثُ إِلَى التَّحَضِّرِ الْوَحِيدِ الْمُهِمِّ: اغْتَرِسْ الْمَحَبَّةَ لِلنَّبِيِّ
    ﷺ وَسُنَّتِهِ، فَإِنَّهَا فِي يَوْمِ يَعْجِزُ فِيهِ الْإِعْدَادُ الْآخَرُ تَكُونُ الْبُوصِلَةَ.'
  description_fr: 'Un homme vint au Prophète Muhammad ﷺ et demanda : ''Quand sera l''Heure ?'' Le Prophète répondit par une
    contre-question qui redirigea toute la conversation de la curiosité vers le caractère : ''Qu''as-tu préparé pour elle
    ?'' L''homme répondit : ''Pas grand-chose — ni beaucoup de prières, ni beaucoup de jeûnes, ni beaucoup de charité, mais
    j''aime Allah et Son Messager.'' Le Prophète Muhammad ﷺ le regarda et dit : ''Tu seras avec celui que tu aimes.'' Ce bref
    échange devint l''une des réassurances les plus citées dans la spiritualité islamique. Ibn Rajab, dans Jami'' al-''Ulum
    wa al-Hikam, explique que l''amour n''est pas seulement un sentiment mais une force opératoire qui façonne le comportement,
    la compagnie et la destination finale. Al-Nawawi ajoute que ce hadith élève l''amour au rang d''acte — ne remplaçant pas
    l''action, mais résumant la disposition qui rend l''action fructueuse. Pour le musulman d''aujourd''hui, ce récit redirige
    la spéculation anxieuse sur les échéances vers la seule préparation qui compte : cultiver l''amour pour le Prophète Muhammad
    ﷺ et sa voie, car au Jour où toutes les autres préparations pourront s''avérer insuffisantes, l''amour sera la boussole
    qui te mènera à ta compagnie.'
  reference: Sahih al-Bukhari 6447, Sahih Muslim 1181
  hadith_refs: Bukhari 6447, Muslim 1181
  source_notes: |
    Ibn Rajab (Jāmiʿ al-ʿUlūm) explains that love is not merely sentiment but an operative force that shapes behaviour, companionship, and final destination. Al-Nawawī adds that the hadith elevates love to the status of a deed — not replacing action, but summarising the disposition that makes action fruitful. This hadith is graded ṣaḥīḥ and is central to works on love for Allah and His Messenger.
  source_notes_fr: |
    Ibn Rajab (Jāmiʿ al-ʿUlūm) explique que l'amour n'est pas seulement un sentiment mais une force opératoire qui façonne le comportement, la compagnie et la destination finale. Al-Nawawī ajoute que ce hadith élève l'amour au rang d'acte — ne remplaçant pas l'action, mais résumant la disposition qui rend l'action fructueuse. Ce hadith est gradé ṣaḥīḥ et est central dans les ouvrages sur l'amour d'Allah et de Son Messager.
  source_notes_ar: |
    يُفَسِّرُ ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ» أَنَّ الْمَحَبَّةَ لَيْسَتْ مُجَرَّدَ شُعُورٍ، بَلْ قُوَّةً فَاعِلَةً تُشَكِّلُ السُّلُوكَ وَالصُّحْبَةَ وَالْمَصِيرَ. وَيُضِيفُ النَّوَوِيُّ أَنَّ الْحَدِيثَ يَرْفَعُ الْمَحَبَّةَ إِلَى مَرْتَبَةِ الْعَمَلِ. حَكَمَ عَلَيْهِ بِالصَّحَاحِ، وَهُوَ مِنْ أَهَمِّ النُّصُوصِ فِي مَحَبَّةِ اللهِ وَرَسُولِهِ.
  display_day_of_year: 139
  source_url: https://sunnah.com/bukhari:6447
- slug: hadith-masjid-al-dirar
  category: hadith_narrative
  title_en: The Mosque of Harm — When a Building Becomes a Trap
  title_ar: مسجد الضرار — حين يصير البناء فخاً
  title_fr: La mosquée du tort — quand un édifice devient un piège
  description_en: 'Before the Expedition of Tabuk, a group of hypocrites built a mosque at Quba'' and invited the Prophet
    ﷺ to pray in it, ostensibly to serve travelers and the sick. But their true purpose, as Allah revealed in Surah al-Tawbah,
    was to create a center of division, harm, and conspiracy against the believers. The Prophet ﷺ was still en route to Tabuk
    when the revelation came commanding him not to set foot in it and ordering the mosque to be burned to the ground. Ibn
    Kathir explains that this incident is the canonical boundary between genuine religious architecture — built for Allah
    alone — and institutionalized hypocrisy that weaponizes piety for political sabotage. Al-Nawawi adds that the command
    to destroy the mosque established the principle that places used to sow discord lose all sanctity. For the Muslim today,
    the narrative is a diagnostic tool: any space — physical or digital — that claims religious purpose while breeding division,
    backbiting, or conspiracy against the community is a masjid al-dirar, and the believer''s duty is to withdraw and warn.'
  description_ar: قَبْلَ غَزْوَةِ تَبُوكَ، بَنَى مُنَافِقُونَ مَسْجِدًا فِي قُبَاءَ وَدَعَوُا النَّبِيَّ ﷺ أَنْ يُصَلِّيَ
    فِيهِ. وَلَكِنَّ الْغَرَضَ الْحَقِيقِيَّ — كَمَا أَنْزَلَ اللَّهُ فِي سُورَةِ التَّوْبَةِ — كَانَ تَأْسِيسَ وَكَالَةِ
    تَفْرِيقٍ وَمَكْرٍ. فَأَمَرَ اللَّهُ النَّبِيَّ ﷺ أَلَّا يَقُومَ فِيهِ وَأَنْ يُحْرَقَ. يُوَضِّحُ ابْنُ كَثِيرٍ أَنَّ
    الْحَادِثَةَ تُقِيمُ الْحَدَّ بَيْنَ الْعِمَارَةِ الدِّينِيَّةِ الْخَالِصَةِ وَالنِّفَاقِ الْمُؤَسَّسِ الَّذِي يَسْتَثْمِرُ
    التَّقْوَى لِلتَّخَرِيبِ السِّيَاسِيِّ. وَيُضِيفُ النَّوَوِيُّ أَنَّ أَمْرَ الْهَدْمِ أَثْبَتَ أَنَّ الْأَمَاكِنَ الْمُسْتَعْمَلَةَ
    لِلشِّقَاقِ تَسْقُطُ حُرْمَتُهَا. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ كُلَّ فَضَاءٍ — مَادِيٍّ أَوْ رَقْمِيٍّ — يَدَّعِي
    الْغَرَضَ الدِّينِيَّ وَيُبَذِّرُ الْفُرْقَةَ فَهُوَ مَسْجِدُ ضَرَارٍ، وَعَلَى الْمُؤْمِنِ الِانْسِحَابُ وَالتَّحْذِيرُ.
  description_fr: 'Avant l''expédition de Tabuk, un groupe d''hypocrites construisit une mosquée à Quba'' et invita le Prophète
    Muhammad ﷺ à y prier, prétendument pour servir les voyageurs et les malades. Mais leur véritable objectif, comme Allah
    le révéla dans la sourate al-Tawbah, était de créer un centre de division, de tort et de complot contre les croyants.
    Le Prophète Muhammad ﷺ était encore en route pour Tabuk lorsque la révélation ordonna de ne pas y mettre les pieds et
    de brûler la mosquée. Ibn Kathir explique que cet incident marque la limite canonique entre l''architecture religieuse
    authentique — construite pour Allah seul — et l''hypocrisie institutionnalisée qui fait de la piété une arme de sabotage
    politique. Al-Nawawi ajoute que l''ordre de détruire la mosquée établit le principe que les lieux utilisés pour semer
    la discorde perdent toute sanctité. Pour le musulman d''aujourd''hui, ce récit est un outil diagnostique : tout espace
    — physique ou numérique — qui revendique un but religieux tout en nourrissant la division, la médisance ou le complot
    contre la communauté est un masjid al-dirar, et le devoir du croyant est de se retirer et d''avertir.'
  reference: Sahih al-Bukhari 470, Sahih Muslim 1071; Qur'an 9:107-110
  hadith_refs: Bukhari 470, Muslim 1071
  quran_refs: 9:107-110
  source_notes: |
    Ibn Kathīr explains that this incident marks the canonical boundary between genuine religious architecture and institutionalised hypocrisy. Al-Nawawī adds that the command to destroy the mosque established the principle that places used to sow discord lose all sanctity. The event is narrated in Ṣaḥīḥ al-Bukhārī and Muslim, and is the occasion for Qur'an 9:107-110.
  source_notes_fr: |
    Ibn Kathīr explique que cet incident marque la limite canonique entre l'architecture religieuse authentique et l'hypocrisie institutionnalisée. Al-Nawawī ajoute que l'ordre de détruire la mosquée a établi le principe que les lieux utilisés pour semer la discorde perdent toute sanctité. L'événement est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim, et est l'occasion du Qur'an 9:107-110.
  source_notes_ar: |
    يُوَضِّحُ ابْنُ كَثِيرٍ أَنَّ الْحَادِثَةَ تُقِيمُ الْحَدَّ بَيْنَ الْعِمَارَةِ الدِّينِيَّةِ الْخَالِصَةِ وَالنِّفَاقِ الْمُؤَسَّسِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ أَمْرَ الْهَدْمِ أَثْبَتَ أَنَّ الْأَمَاكِنَ الْمُسْتَعْمَلَةَ لِلشِّقَاقِ تَسْقُطُ حُرْمَتُهَا. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ، وَهِيَ سَبَبُ نُزُولِ سُورَةِ التَّوْبَةِ ١٠٧-١١٠.
  display_day_of_year: 140
