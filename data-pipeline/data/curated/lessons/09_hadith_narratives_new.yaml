- slug: hadith-blind-man-supplication
  category: hadith_narrative
  title_en: The Blind Man's Supplication — How Tawassul Taught a Lesson in Humility
  title_ar: دعاء الأعمى — كيف علَّم التوسل درساً في التواضع
  title_fr: La supplication de l'aveugle — comment le tawassul enseigna une leçon d'humilité
  description_en: 'A blind man came to the Prophet ﷺ complaining of his condition and asking the Prophet to pray for his healing.
    The Prophet ﷺ instructed him to perform ablution, pray two rak''ahs, and then supplicate: ''O Allah, I ask You and turn
    to You through Your Prophet Muhammad, the Prophet of mercy. O Muhammad, I turn to my Lord through you, so that my need
    may be fulfilled.'' The man did so and Allah restored his sight. This incident — narrated by Uthman ibn Hunayf — became
    the classical proof for the legitimacy of tawassul through the Prophet ﷺ in supplication. Ibn Taymiyya, in his Qa''ida
    fi al-Tawassul, acknowledges the authenticity of the narration and explains that the tawassul here is through the Prophet''s
    honored status with Allah, not through any independent power. Al-Nawawi adds that the blind man''s willingness to follow
    the Prophet''s specific instruction — rather than demanding an immediate miracle — demonstrated the very humility that
    made his supplication acceptable. For the Muslim today, the narrative teaches that the path to divine response is not
    entitlement but structured humility: prepare yourself, approach with proper protocol, and ask through the most beloved
    of intermediaries.'
  description_ar: 'أَتَى أَعْمَى إِلَى النَّبِيِّ ﷺ يَشْكُو بَصَرَهُ وَيَطْلُبُ الدُّعَاءَ. فَأَمَرَهُ النَّبِيُّ ﷺ بِالْوُضُوءِ
    وَصَلَاةِ رَكْعَتَيْنِ، ثُمَّ أَنْ يَدْعُوَ: «اللَّهُمَّ إِنِّي أَسْأَلُكَ وَأَتَوَجَّهُ إِلَيْكَ بِنَبِيِّكَ مُحَمَّدٍ
    نَبِيِّ الرَّحْمَةِ، يَا مُحَمَّدُ إِنِّي أَتَوَجَّهُ بِكَ إِلَى رَبِّي فِي حَاجَتِي هَذِهِ لِتُقْضَى لِي». فَفَعَلَ فَأَبْصَرَ.
    وَرَوَاهُ عُثْمَانُ بْنُ حُنَيْفٍ. يُفَسِّرُ ابْنُ تَيْمِيَّةَ فِي «قَاعِدَةِ التَّوَسُّلِ» أَنَّ التَّوَسُّلَ هُنَا بِحَقِّ
    النَّبِيِّ ﷺ عِنْدَ اللَّهِ لَا بِقُدْرَةٍ مُسْتَقِلَّةٍ. وَيُضِيفُ النَّوَوِيُّ أَنَّ اسْتِعْدَادَ الْأَعْمَى لِاتِّبَاعِ
    التَّعْلِيمَاتِ الدَّقِيقَةِ — دُونَ الِاكْتِفَاءِ بِمُعْجِزَةٍ فَوْرِيَّةٍ — كَانَ هُوَ التَّوَاضُعَ الَّذِي قَبِلَ الدُّعَاءَ.
    دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ طَرِيقَ الْإِجَابَةِ لَيْسَ الِادِّعَاءَ بَلْ التَّوَاضُعَ الْمُنَظَّمَ: حَضِّرْ نَفْسَكَ،
    وَتَوَجَّهْ بِالْأَدَبِ، وَاسْأَلْ بِأَحَبِّ الْوَسَائِطِ.'
  description_fr: 'Un aveugle vint au Prophète Muhammad ﷺ se plaindre de son état et demander au Prophète de prier pour sa
    guérison. Le Prophète Muhammad ﷺ lui ordonna de faire ses ablutions, de prier deux rak''ahs, puis de suppliquer : ''Ô
    Allah, je Te demande et me tourne vers Toi par Ton Prophète Muhammad, le Prophète de la miséricorde. Ô Muhammad, je me
    tourne vers mon Seigneur par toi, afin que mon besoin soit comblé.'' L''homme fit ainsi et Allah lui rendit la vue. Cet
    incident — rapporté par Uthman ibn Hunayf — devint la preuve classique de la légitimité du tawassul par le Prophète Muhammad
    ﷺ dans la supplication. Ibn Taymiyya, dans sa Qa''ida fi al-Tawassul, reconnaît l''authenticité de la narration et explique
    que le tawassul ici se fait par le statut honoré du Prophète auprès d''Allah, et non par un pouvoir indépendant. Al-Nawawi
    ajoute que la volonté de l''aveugle de suivre l''instruction précise du Prophète — plutôt que d''exiger un miracle immédiat
    — démontrait l''humilité même qui rendit sa supplication acceptable. Pour le musulman d''aujourd''hui, ce récit enseigne
    que le chemin vers la réponse divine n''est pas l''exigence mais l''humilité structurée : prépare-toi, approche avec le
    protocole approprié, et demande par le plus aimé des intermédiaires.'
  reference: Jami' at-Tirmidhi 3605 (Hasan Sahih), Sunan Ibn Majah 1385
  hadith_refs: Tirmidhi 3605, Ibn Majah 1385
  source_notes: |
    Ibn Taymiyya (Qāʿida fī al-Tawassul) acknowledges the authenticity of the narration and explains that the tawassul here is through the Prophet's ﷺ honoured status with Allah, not through any independent power. Al-Nawawī adds that the blind man's willingness to follow the Prophet's ﷺ specific instruction demonstrated the humility that made his supplication acceptable. The hadith is graded ḥasan ṣaḥīḥ by al-Albānī.
  source_notes_fr: |
    Ibn Taymiyya (Qāʿida fī al-Tawassul) reconnaît l'authenticité de la narration et explique que le tawassul ici se fait par le statut honoré du Prophète ﷺ auprès d'Allah, et non par un pouvoir indépendant. Al-Nawawī ajoute que la volonté de l'aveugle de suivre l'instruction précise du Prophète ﷺ a démontré l'humilité même qui rendit sa supplication acceptable. Le hadith est gradé ḥasan ṣaḥīḥ par al-Albānī.
  source_notes_ar: |
    يُقِرُّ ابْنُ تَيْمِيَّةَ فِي «قَاعِدَةِ التَّوَسُّلِ» بِصِحَّةِ الرِّوَايَةِ، وَيُوَضِّحُ أَنَّ التَّوَسُّلَ هُنَا بِحَقِّ النَّبِيِّ ﷺ عِنْدَ اللهِ لَا بِقُدْرَةٍ مُسْتَقِلَّةٍ. وَيُضِيفُ النَّوَوِيُّ أَنَّ اسْتِعْدَادَ الْأَعْمَى لِاتِّبَاعِ التَّعْلِيمَاتِ كَانَ هُوَ التَّوَاضُعَ الَّذِي قَبِلَ الدُّعَاءَ. حَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالْحَسَنِ الصَّحِيحِ.
  display_day_of_year: 141
  source_url: https://sunnah.com/tirmidhi:3605
- slug: hadith-last-man-to-enter-paradise
  category: hadith_narrative
  title_en: The Last Man to Enter Paradise — Mercy Beyond the Last Ember
  title_ar: آخر من يدخل الجنة — رحمة ما بعد الجمر الأخير
  title_fr: Le dernier homme à entrer au Paradis — la miséricorde au-delà de la dernière braise
  description_en: 'The Prophet ﷺ described the fate of the last man to be taken out of the Fire: after all others have entered
    Paradise, he remains in the lowest pit of Hell until Allah commands the angels to bring him forth. They find him charred
    and shrunken, and Allah commands that he be washed in the rivers of Paradise, clothed in garments of faith, and led to
    the gate of Paradise. There he will be given a paradise ten times the size of this world, and he will think it is all
    for him — yet he is the last and least of the inhabitants. Ibn Rajab, in Jami'' al-''Ulum wa al-Hikam, explains that this
    hadith is the outer limit of divine mercy: if even the last man from the Fire receives more than any earthly kingdom,
    then the generosity of Allah exceeds every human metric of justice. Al-Nawawi adds that the man''s initial despair and
    subsequent astonishment mirror the journey of every sinner who underestimates the scope of forgiveness. For the Muslim
    today, the narrative is an antidote to despair: no matter how far you feel from righteousness, the mercy of Allah extends
    beyond the last ember of the Fire to meet the sincere heart.'
  description_ar: 'وَصَفَ النَّبِيُّ ﷺ آخِرَ إِنْسَانٍ يُخْرَجُ مِنَ النَّارِ: بَعْدَ دُخُولِ الْجَمِيعِ، يَبْقَى فِي قَعْرِهَا
    حَتَّى يَأْمُرَ اللَّهُ الْمَلَائِكَةَ بِإِخْرَاجِهِ. فَيَجِدُونَهُ مُحْتَرِقًا مُنْكَمِشًا، فَيَأْمُرُ بِغُسْلِهِ فِي
    أَنْهَارِ الْجَنَّةِ وَكِسَائِهِ إِيمَانًا، ثُمَّ يُقَادُ إِلَى بَابِ الْجَنَّةِ فَيُعْطَى جَنَّةً عَشْرَةَ أَضْعَافِ
    الدُّنْيَا. يُفَسِّرُ ابْنُ رَجَبٌ أَنَّ هَذَا الْحَدِيثَ هُوَ الْحَدُّ الْأَقْصَى لِلرَّحْمَةِ: إِنْ كَانَ آخِرُ النَّاسِ
    يَنَالُ أَكْثَرَ مِنْ كُلِّ مَمْلَكَةٍ أَرْضِيَّةٍ، فَإِنَّ كَرَمَ اللَّهِ يَتَجَاوَزُ كُلَّ مِعْيَارٍ بَشَرِيٍّ. وَيُضِيفُ
    النَّوَوِيُّ أَنَّ يَأْسَهُ الْأَوَّلَ وَدَهْشَتَهُ اللَّاحِقَةَ يُجَسِّدَانِ رِحْلَةَ كُلِّ خَاطِئٍ يُقَلِّلُ مِنْ نِطَاقِ
    الْمَغْفِرَةِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ هَذَا الْحَدِيثَ تِرْيَاقُ الْيَأْسِ: لَا يَهْمَتَّ مِنْ بُعْدِكَ عَنِ
    الصَّلَاحِ، فَإِنَّ رَحْمَةَ اللَّهِ تَمْتَدُّ مَا بَعْدَ آخِرِ جَمْرَةٍ فِي النَّارِ.'
  description_fr: 'Le Prophète Muhammad ﷺ décrivit le sort du dernier homme à être retiré du Feu : après que tous les autres
    soient entrés au Paradis, il reste dans le gouffre le plus profond de l''Enfer jusqu''à ce qu''Allah ordonne aux anges
    de le faire sortir. Ils le trouvent calciné et ratatiné, et Allah ordonne qu''il soit lavé dans les rivières du Paradis,
    vêtu d''habits de foi, et conduit à la porte du Paradis. Là, on lui donnera un paradis dix fois plus grand que ce monde,
    et il pensera que tout cela est pour lui — pourtant il est le dernier et le plus petit des habitants. Ibn Rajab, dans
    Jami'' al-''Ulum wa al-Hikam, explique que ce hadith représente la limite extrême de la miséricorde divine : si même le
    dernier homme du Feu reçoit plus que n''importe quel royaume terrestre, alors la générosité d''Allah dépasse toute mesure
    humaine de justice. Al-Nawawi ajoute que le désespoir initial de l''homme et son étonnement subséquent reflètent le parcours
    de tout pécheur qui sous-estime l''étendue du pardon. Pour le musulman d''aujourd''hui, ce récit est un antidote au désespoir
    : peu importe à quel point tu te sens éloigné de la droiture, la miséricorde d''Allah s''étend au-delà de la dernière
    braise du Feu pour rejoindre le cœur sincère.'
  reference: Sahih al-Bukhari 6562, Sahih Muslim 183
  hadith_refs: Bukhari 6562, Muslim 183
  source_notes: |
    Ibn Rajab (Jāmiʿ al-ʿUlūm) explains that this hadith represents the outer limit of divine mercy: if even the last man from the Fire receives more than any earthly kingdom, Allah's generosity exceeds every human metric. Al-Nawawī adds that the man's initial despair and subsequent astonishment mirror the journey of every sinner who underestimates forgiveness. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
  source_notes_fr: |
    Ibn Rajab (Jāmiʿ al-ʿUlūm) explique que ce hadith représente la limite extrême de la miséricorde divine : si même le dernier homme du Feu reçoit plus que n'importe quel royaume terrestre, la générosité d'Allah dépasse toute mesure humaine. Al-Nawawī ajoute que le désespoir initial de l'homme et son étonnement subséquent reflètent le parcours de tout pécheur qui sous-estime l'étendue du pardon. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
  source_notes_ar: |
    يُفَسِّرُ ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ» أَنَّ هَذَا الْحَدِيثَ هُوَ الْحَدُّ الْأَقْصَى لِلرَّحْمَةِ: إِنْ كَانَ آخِرُ النَّاسِ يَنَالُ أَكْثَرَ مِنْ كُلِّ مَمْلَكَةٍ أَرْضِيَّةٍ، فَكَرَمُ اللهِ يَتَجَاوَزُ كُلَّ مِعْيَارٍ بَشَرِيٍّ. وَيُضِيفُ النَّوَوِيُّ أَنَّ يَأْسَهُ الْأَوَّلَ وَدَهْشَتَهُ يُجَسِّدَانِ رِحْلَةَ كُلِّ خَاطِئٍ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
  display_day_of_year: 143
  source_url: https://sunnah.com/bukhari:6562
- slug: hadith-two-men-in-hell
  category: hadith_narrative
  title_en: Two Tortured in the Fire — Guarding the Tongue and the Body
  title_ar: معذبان في النار — حفظ اللسان والبدن
  title_fr: Deux torturés dans le Feu — préserver la langue et le corps
  description_en: 'The Prophet ﷺ once passed by two graves and said: ''They are being punished, but not for anything major.
    One of them used not to guard himself from urine, and the other used to spread tales (namima).'' He then asked for a fresh
    palm branch, split it in two, and planted one on each grave, explaining: ''Perhaps their punishment will be lightened
    as long as these do not dry out.'' This hadith established two foundational principles simultaneously: ritual purity is
    not merely etiquette but a condition whose neglect carries otherworldly consequences, and the tongue''s power to destroy
    reputations is a grave sin that earns physical torture in the grave. Ibn Hajar, in Fath al-Bari, notes that the Prophet''s
    act of planting the fresh branches indicates that the living can intercede for the dead through sincere supplication and
    good deeds. Al-Nawawi adds that the two sins were singled out because they are universally underestimated — most people
    do not consider urine splashes or gossip to be ''major'' sins, yet the Prophet labeled their consequences as torture.
    For the Muslim today, the narrative is a double-edged warning: guard your physical purity with the same vigilance as your
    prayer, and guard your tongue with the same vigilance as your chastity.'
  description_ar: 'مَرَّ النَّبِيُّ ﷺ بِقَبْرَيْنِ فَقَالَ: «إِنَّهُمَا لَيُعَذَّبَانِ، وَمَا يُعَذَّبَانِ فِي كَبِيرٍ: أَمَّا
    أَحَدُهُمَا فَكَانَ لَا يَسْتَتِرُ مِنْ بَوْلِهِ، وَأَمَّا الْآخَرُ فَكَانَ يَمْشِي بِالنَّمِيمَةِ». ثُمَّ أَخَذَ جَرِيدَةً
    رَطْبَةً فَشَقَّهَا وَغَرَسَ مِنْهَا عَلَى كُلِّ قَبْرٍ وَاحِدَةً: «لَعَلَّهُ يُخَفَّفُ عَنْهُمَا مَا لَمْ يَيْبَسَا».
    يُشِيرُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» إِلَى أَنَّ غَرْسَ الْجَرِيدَةِ يُفِيدُ أَنَّ الْأَحْيَاءَ يَسْتَطِيعُونَ
    الشَّفَاعَةَ فِي الْأَمْوَاتِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ هَذَيْنِ الذَّنْبَيْنِ أُشِيرَ إِلَيْهِمَا لِأَنَّ النَّاسَ
    يَسْتَخِفُّونَ بِهِمَا. دَرْسُ الْمُسْلِمِ الْيَوْمَ تَحْذِيرٌ مُزْدَوَجٌ: احْفَظْ طُهْرَكَ الْبَدَنِيَّ بِمِثْلِ حِرَاسَةِ
    صَلَاتِكَ، وَاحْفَظْ لِسَانَكَ بِمِثْلِ حِرَاسَةِ عِفَّتِكَ.'
  description_fr: 'Le Prophète Muhammad ﷺ passa un jour près de deux tombes et dit : ''Ils sont châtiés, mais pas pour quelque
    chose de majeur. L''un d''eux ne se préservait pas de son urine, et l''autre répandait des ragots (namima).'' Il demanda
    ensuite une branche de palmier fraîche, la fendit en deux et en planta une sur chaque tombe, expliquant : ''Peut-être
    que leur châtiment sera allégé tant que celles-ci ne se dessèchent pas.'' Ce hadith établit deux principes fondamentaux
    simultanément : la pureté rituelle n''est pas seulement une question d''étiquette mais une condition dont la négligence
    a des conséquences ultraterrestres, et le pouvoir de la langue à détruire les réputations est un péché grave qui mérite
    une torture physique dans la tombe. Ibn Hajar, dans Fath al-Bari, note que l''acte du Prophète de planter les branches
    fraîches indique que les vivants peuvent intercéder pour les morts par la supplication sincère et les bonnes œuvres. Al-Nawawi
    ajoute que les deux péchés furent singuliers parce qu''ils sont universellement sous-estimés — la plupart des gens ne
    considèrent pas les éclaboussures d''urine ou les commérages comme des péchés ''majeurs'', pourtant le Prophète qualifia
    leurs conséquences de torture. Pour le musulman d''aujourd''hui, ce récit est un avertissement à double tranchant : préserve
    ta pureté physique avec la même vigilance que ta prière, et préserve ta langue avec la même vigilance que ta chasteté.'
  reference: Sahih al-Bukhari 216, Sahih Muslim 292
  hadith_refs: Bukhari 216, Muslim 292
  source_notes: |
    Ibn Ḥajar (Fatḥ al-Bārī) notes that the Prophet's ﷺ act of planting fresh branches indicates that the living can intercede for the dead through sincere supplication and good deeds. Al-Nawawī adds that the two sins were singled out because they are universally underestimated — most people do not consider urine splashes or gossip to be "major" sins. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
  source_notes_fr: |
    Ibn Ḥajar (Fatḥ al-Bārī) note que l'acte du Prophète ﷺ de planter des branches fraîches indique que les vivants peuvent intercéder pour les morts par la supplication sincère et les bonnes œuvres. Al-Nawawī ajoute que les deux péchés furent singulés parce qu'ils sont universellement sous-estimés. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
  source_notes_ar: |
    يُشِيرُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» إِلَى أَنَّ غَرْسَ الْجَرِيدَةِ يُفِيدُ أَنَّ الْأَحْيَاءَ يَسْتَطِيعُونَ الشَّفَاعَةَ فِي الْأَمْوَاتِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ هَذَيْنِ الذَّنْبَيْنِ أُشِيرَ إِلَيْهِمَا لِأَنَّ النَّاسَ يَسْتَخِفُّونَ بِهِمَا. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
  display_day_of_year: 144
