- slug: hadith-true-struggle
  category: hadith_narrative
  title_en: The True Struggle (Jihad al-Nafs) — Fighting the Inner Enemy
  title_ar: الجهاد الأكبر — قتال العدو الداخلي
  title_fr: La véritable lutte (jihad al-nafs) — combattre l'ennemi intérieur
  description_en: |
    The Prophet ﷺ said: "The strong one is not the one who wrestles others down; the strong one is the one who controls himself when angry." In another authentic narration, he described the greatest struggle as that against one's own soul — the jihad al-nafs that continues long after the battlefield is silent. Muslim 2581 and Tirmidhi 1621 preserve the prophetic teaching that the true warrior is not measured by victories over external enemies but by mastery over internal impulses: lust, greed, arrogance, and rage. Ibn al-Qayyim, in Madārij al-Sālikīn, devotes entire chapters to this inner warfare, explaining that the nafs is like an untamed horse that either carries its rider to Paradise or tramples him into the Fire. Al-Nawawi adds that controlling anger is singled out because it is the gateway to nearly every other sin — once anger breaches the walls of restraint, theft, slander, violence, and apostasy rush through. For the Muslim today, this narrative redefines strength: real courage is not the absence of fear or the dominance of others, but the daily, invisible struggle to govern the self in obedience to Allah.
  description_ar: |
    قال النبي ﷺ: «لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ، إِنَّمَا الشَّدِيدُ الَّذِي يَمْلِكُ نَفْسَهُ عِنْدَ الْغَضَبِ». وَفِي رِوَايَاتٍ صَحِيحَةٍ أُخْرَى وَصَفَ أَعْظَمَ الْجِهَادِ بِأَنَّهُ جِهَادُ النَّفْسِ الَّذِي يَسْتَمِرُّ بَعْدَ أَنْ يَخْتَنِقَ صَوْتُ الْمَعْرَكَةِ. يَحْفِظُ صَحِيحُ مُسْلِمٍ (٢٥٨١) وَالتِّرْمِذِيُّ (١٦٢١) التَّعْلِيمَ النَّبَوِيَّ بِأَنَّ الْمُجَاهِدَ الْحَقِيقِيَّ لَا يُقَاسُ بِانْتِصَارَاتِهِ عَلَى الْأَعْدَاءِ الْخَارِجِيِّينَ، بَلْ بِسَيْطَرَتِهِ عَلَى النَّزَعَاتِ الدَّاخِلِيَّةِ: الشَّهْوَةِ وَالطَّمَعِ وَالْكِبْرِ وَالْغَضَبِ. يُفَرِّغُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» فُصُولًا كَامِلَةً لِهَذَا الْحَرْبِ الدَّاخِلِيِّ، مُفَسِّرًا أَنَّ النَّفْسَ كَالْفَرَسِ الْأَعْرَفِ: إِمَّا أَنْ يَحْمِلَ رَاكِبَهُ إِلَى الْجَنَّةِ أَوْ يَدُسَّهُ فِي النَّارِ. وَيُضِيفُ النَّوَوِيُّ أَنَّ ضَبْطَ الْغَضَبِ تَمَيَّزَ بِهِ لِأَنَّهُ بَابُ جُلِّ الذُّنُوبِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّهُ يُعَرِّفُ الشَّجَاعَةَ مِنْ جَدِيدٍ: لَيْسَتِ الْجُرْأَةُ غِيَابَ الْخَوْفِ أَوْ تَسَيُّدَ الْآخَرِينَ، بَلْ هِيَ الْكِفَاحُ الْيَوْمِيُّ الْخَفِيُّ لِتَدْبِيرِ النَّفْسِ فِي طَاعَةِ اللَّهِ.
  description_fr: |
    Le Prophète Muhammad ﷺ dit : « Le fort n'est pas celui qui terrasse les autres ; le fort est celui qui se contrôle lui-même lorsqu'il est en colère. » Dans une autre narration authentique, il décrivit la plus grande lutte comme celle contre sa propre âme — le jihad al-nafs qui se poursuit longtemps après que le champ de bataille se soit tu. Muslim 2581 et Tirmidhi 1621 préservent l'enseignement prophétique selon lequel le véritable guerrier ne se mesure pas à ses victoires sur les ennemis extérieurs mais à sa maîtrise des impulsions intérieures : la luxure, la cupidité, l'arrogance et la rage. Ibn al-Qayyim, dans Madārij al-Sālikīn, consacre des chapitres entiers à cette guerre intérieure, expliquant que le nafs est comme un cheval indompté qui porte soit son cavalier au Paradis, soit le piétine au Feu. Al-Nawawi ajoute que le contrôle de la colère est particulièrement souligné car il est la porte d'entrée de presque tous les autres péchés — une fois la colère entrée par brèche, le vol, la calomnie, la violence et l'apostasie s'engouffrent. Pour le musulman d'aujourd'hui, ce récit redéfinit la force : le vrai courage n'est pas l'absence de peur ou la domination d'autrui, mais la lutte quotidienne et invisible pour gouverner le soi en obéissance à Allah.
  reference: Sahih Muslim 2581, Jami' at-Tirmidhi 1621
  hadith_refs: Muslim 2581, Tirmidhi 1621
  source_notes: |
    Ibn al-Qayyim (Madārij al-Sālikīn) devotes entire chapters to inner warfare, explaining that the nafs is like an untamed horse that either carries its rider to Paradise or tramples him into the Fire. Al-Nawawī adds that controlling anger is singled out because it is the gateway to nearly every other sin. The hadith is narrated in Ṣaḥīḥ Muslim and graded ṣaḥīḥ by al-Albānī.
