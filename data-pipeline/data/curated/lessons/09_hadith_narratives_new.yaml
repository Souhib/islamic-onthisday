lessons:
- slug: hadith-ashab-al-ukhdud
  category: hadith_narrative
  title_en: The Boy, the Monk, and the Tyrant — When Fire Bows to Faith
  title_ar: الغلام والراهب والملك — حين تنحني النار للإيمان
  title_fr: Le garçon, le moine et le tyran — quand le feu s'incline devant la foi
  description_en: 'The Prophet ﷺ narrated the story of a boy born to a believing mother under a tyrannical king who demanded
    to be worshipped as a god. The king''s sorcerer, growing old, sought a successor and found a young monk who taught the
    boy true monotheism. The boy''s healing powers — granted by Allah — attracted the king''s attention. Each time the king
    tried to kill him, Allah turned the execution into a miracle: arrows missed, a mountain collapsed around him harmlessly,
    and finally, when thrown into a blazing fire pit, the fire cooled into a garden for him while the onlookers perished.
    Before his martyrdom, the boy instructed the king that only the people''s collective testimony could kill him. They gathered
    on a high plain, he prayed, and an arrow struck him through the heart — but not before the entire nation embraced his
    faith. Ibn Kathir, in al-Bidaya wa al-Nihaya, explains that this hadith is a proof that sincere faith can transform instruments
    of destruction into means of salvation. Ibn Rajab adds that the boy''s strategy of collective witnessing ensured the da''wah
    outlived his body. For the Muslim today, the lesson is that tyrants build fires to silence truth, but the fire only reveals
    the faithful to the watching world.'
  description_ar: 'قال النبي ﷺ: «كَانَ فِيمَنْ كَانَ قَبْلَكُمْ مَلِكٌ وَكَانَ لَهُ سَاحِرٌ...» فَوَلَدَتْ أُمٌّ مُؤْمِنَةٌ
    غُلَامًا تَعَلَّمَ التَّوْحِيدَ مِنْ رَاهِبٍ، وَأَعْطَاهُ اللَّهُ شِفَاءَ الْأَمْرَاضِ. فَكُلَّمَا أَرَادَ الْمَلِكُ قَتْلَهُ
    نَجَاهُ اللَّهُ: سَهْمٌ يَخْطَئُ، وَجَبَلٌ يَعُودُ، وَنَارٌ تَصِيرُ جَنَّةً. ثُمَّ أَمَرَ الْغُلَامُ أَنْ يُقْتَلَ بِشَهَادَةِ
    النَّاسِ جَمِيعًا، فَصَلَّى وَقَتَلَهُ سَهْمٌ. يُفَسِّرُ ابْنُ كَثِيرٍ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» أَنَّ الْحَدِيثَ
    دَلِيلٌ عَلَى أَنَّ الْإِيمَانَ الْخَالِصَ يُحَوِّلُ آلَاتِ الْهَلَاكِ إِلَى وِسَاطِ نَجَاةٍ. وَيُضِيفُ ابْنُ رَجَبٍ أَنَّ
    تَدْبِيرَ الشَّهَادَةِ الْجَمَاعِيَّةَ ضَمِنَ أَنْ تَبْقَى الدَّعْوَةُ بَعْدَ رَحِيلِ الْجِسْمِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ
    أَنَّ الطَّغَاةَ يَبْنُونَ نِيرَانًا لِكَظْمِ الْحَقِّ، وَلَكِنَّ النَّارَ لَا تَكْظِمُ الْحَقَّ بَلْ تُظْهِرُهُ.'
  description_fr: 'Le Prophète Muhammad ﷺ raconta l''histoire d''un garçon né d''une mère croyante sous un roi tyrannique
    qui exigeait d''être adoré comme un dieu. Le sorcier du roi, devenu vieux, chercha un successeur et trouva un jeune moine
    qui enseigna au garçon le vrai monothéisme. Les pouvoirs de guérison du garçon — accordés par Allah — attirèrent l''attention
    du roi. Chaque fois que le roi tenta de le tuer, Allah transforma l''exécution en miracle : les flèches manquèrent leur
    cible, une montagne s''effondra autour de lui sans lui nuire, et finalement, lorsqu''on le jeta dans un brasier ardent,
    le feu se refroidit en un jardin pour lui tandis que les spectateurs périssaient. Avant son martyre, le garçon instruisit
    le roi que seul le témoignage collectif du peuple pourrait le tuer. Ils se rassemblèrent sur une plaine élevée, il pria,
    et une flèche lui transperça le cœur — mais pas avant que toute la nation n''embrasse sa foi. Ibn Kathir, dans al-Bidaya
    wa al-Nihaya, explique que ce hadith prouve que la foi sincère peut transformer les instruments de destruction en moyens
    de salut. Ibn Rajab ajoute que la stratégie du garçon de recourir au témoignage collectif assura que la da''wah survivrait
    à son corps. Pour le musulman d''aujourd''hui, la leçon est que les tyrans construisent des feux pour réduire le silence
    à la vérité, mais le feu ne fait que révéler les fidèles au monde qui observe.'
  reference: Sahih Muslim 3005, Sahih al-Bukhari 7033
  hadith_refs: Muslim 3005, Bukhari 7033
  source_notes: |
    Ibn Kathīr (al-Bidāya wa-l-Nihāya) treats this hadith as a proof that sincere faith transforms instruments of destruction into means of salvation. Ibn Rajab (Jāmiʿ al-ʿUlūm) adds that the boy's strategy of collective witnessing ensured the daʿwa outlived his body. The hadith is the primary narrative basis for Sūrat al-Burūj and is graded ṣaḥīḥ by al-Albānī.
  source_notes_fr: |
    Ibn Kathīr (al-Bidāya wa-l-Nihāya) traite ce hadith comme une preuve que la foi sincère transforme les instruments de destruction en moyens de salut. Ibn Rajab (Jāmiʿ al-ʿUlūm) ajoute que la stratégie du garçon de recourir au témoignage collectif assura que la daʿwa survivrait à son corps. Ce hadith est le fondement narratif principal de la Sūrat al-Burūj et est gradé ṣaḥīḥ par al-Albānī.
  source_notes_ar: |
    يَعْتَبِرُ ابْنُ كَثِيرٍ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» هَذَا الْحَدِيثَ دَلِيلًا عَلَى أَنَّ الْإِيمَانَ الْخَالِصَ يُحَوِّلُ آلَاتِ الْهَلَاكِ إِلَى وَسَائِطَ نَجَاةٍ. وَيُضِيفُ ابْنُ رَجَبٍ فِي «جَامِعِ الْعُلُومِ» أَنَّ تَدْبِيرَ الشَّهَادَةِ الْجَمَاعِيَّةَ ضَمِنَ أَنْ تَبْقَى الدَّعْوَةُ بَعْدَ رَحِيلِ الْجِسْمِ. وَهَذَا الْحَدِيثُ هُوَ الْأَصْلُ النَّظَرِيُّ الْأَوَّلُ لِسُورَةِ الْبُرُوجِ، وَقَدْ حَكَمَ عَلَيْهِ الْأَلْبَانِيُّ بِالصَّحَاحِ.
  display_day_of_year: 123
  source_url: https://sunnah.com/muslim:3005
- slug: hadith-jurayj-the-worshipper
  category: hadith_narrative
  title_en: Jurayj the Worshipper — When a Mother's Call Overrides the Prayer
  title_ar: جريج العابد — حين تسبق نداء الأم الصلاة
  title_fr: Jurayj l'adorateur — quand l'appel d'une mère prime sur la prière
  description_en: 'The Prophet ﷺ narrated the story of Jurayj, a devoted worshipper who built a hermitage and devoted himself
    to prayer and fasting. His mother once came to him while he was praying and called out, but he thought to himself: ''O
    Allah, my mother or my prayer?'' and continued praying. She left in anger. The next day she returned and he did the same.
    On the third day, she cursed him — not in malice but in maternal grief — saying: ''May you not die until you see the faces
    of prostitutes.'' Years later, a group of Israelites plotted against him: they sent a beautiful woman to seduce him, and
    when he refused, she accused him of fathering her child. The people dragged him out, destroyed his hermitage, and brought
    him to the king. At that moment, the infant in the woman''s arms spoke: ''O people, leave my father alone, for the one
    who did this to him is such-and-such a shepherd.'' Ibn Kathir notes that the speaking infant was a divine vindication
    of Jurayj''s innocence, but the deeper lesson is the mother''s right: Al-Nawawi explains that the hadith corrects the
    imbalance between ritual devotion and filial duty. For the Muslim today, the narrative is a warning that no spiritual
    height excuses neglect of parents, and that sincerity is tested not only in the prayer niche but in the living room.'
  description_ar: 'قال النبي ﷺ: «كَانَ جُرَيْجٌ عَابِدًا...» فَبَنَى صَوْمَعَةً وَتَفَرَّغَ لِلْعِبَادَةِ. فَجَاءَتْ أُمُّهُ
    وَهُوَ يُصَلِّي فَنَادَتْهُ، فَقَالَ فِي نَفْسِهِ: يَا رَبِّ أُمِّي أَوْ صَلَاتِي؟ وَاسْتَمَرَّ فِي صَلَاتِهِ. فَغَضِبَتْ
    وَدَعَتْ عَلَيْهِ. وَبَعْدَ سِنِينَ أَرْسَلَتْ إِلَيْهِ امْرَأَةٌ فَتَنَتْهُ فَلَمْ يَنْجَرِفْ، فَاتَّهَمَتْهُ بِالزِّنَا.
    فَهَدَمُوا صَوْمَعَتَهُ وَجَرُّوهُ، فَتَكَلَّمَ الطِّفْلُ فَبَرَّأَهُ. يُشِيرُ ابْنُ كَثِيرٍ إِلَى أَنَّ نُطْقَ الرَّضِيعِ
    كَانَ تَبْرِئَةً إِلَهِيَّةً، وَيُوَضِّحُ النَّوَوِيُّ أَنَّ الْحَدِيثَ يُصَحِّحُ الْمِيزَانَ بَيْنَ التَّفَرُّغِ الرُّوحِيِّ
    وَحَقِّ الْوَالِدَيْنِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ لَا قِمَّةً رُوحِيَّةَ تُبْرِّرُ إِهْمَالَ الْوَالِدَيْنِ،
    وَأَنَّ الْإِخْلَاصَ يُخْتَبَرُ لَا فِي الْمِحْرَابِ فَحَسْبُ بَلْ فِي بَيْتِ الْعَائِلَةِ.'
  description_fr: 'Le Prophète Muhammad ﷺ raconta l''histoire de Jurayj, un adorateur dévoué qui construisit une cellule et
    se consacra à la prière et au jeûne. Sa mère vint un jour le trouver tandis qu''il priait et l''appela, mais il pensa
    en lui-même : ''Ô Allah, ma mère ou ma prière ?'' et continua de prier. Elle partit en colère. Le lendemain, elle revint
    et il fit de même. Le troisième jour, elle le maudit — non par méchanceté mais par chagrin maternel — en disant : ''Puisses-tu
    ne pas mourir avant d''avoir vu les visages de prostituées.'' Des années plus tard, un groupe d''Israélites complota contre
    lui : ils envoyèrent une belle femme pour le séduire, et lorsqu''il refusa, elle l''accusa d''être le père de son enfant.
    Le peuple le traîna dehors, détruisit sa cellule et l''amena devant le roi. À ce moment, le nourrisson dans les bras de
    la femme parla : ''Ô gens, laissez mon père tranquille, car celui qui a fait cela à mon père est tel-et-tel berger.''
    Ibn Kathir note que le nourrisson parlant fut une justification divine de l''innocence de Jurayj, mais la leçon plus profonde
    est le droit de la mère : Al-Nawawi explique que ce hadith corrige le déséquilibre entre la dévotion rituelle et le devoir
    filial. Pour le musulman d''aujourd''hui, ce récit est un avertissement qu''aucune hauteur spirituelle n''excuse la négligence
    des parents, et que la sincérité est mise à l''épreuve non seulement dans la niche de prière mais aussi dans le salon.'
  reference: Sahih al-Bukhari 3436, Sahih Muslim 2550
  hadith_refs: Bukhari 3436, Muslim 2550
  source_notes: |
    Al-Nawawī (Sharḥ Muslim) explains that the hadith corrects the imbalance between ritual devotion and filial duty: the mother's call should have been answered. Ibn Kathīr notes that the speaking infant was a divine vindication of Jurayj's innocence, but the deeper lesson is that no spiritual height excuses neglect of parents. This hadith is cited in works on the rights of parents and the limits of individual asceticism.
  source_notes_fr: |
    Al-Nawawī (Sharḥ Muslim) explique que ce hadith corrige le déséquilibre entre la dévotion rituelle et le devoir filial : l'appel de la mère aurait dû être entendu. Ibn Kathīr note que le nourrisson parlant fut une justification divine de l'innocence de Jurayj, mais la leçon plus profonde est qu'aucune hauteur spirituelle n'excuse la négligence des parents. Ce hadith est cité dans les ouvrages sur les droits des parents et les limites de l'ascétisme individuel.
  source_notes_ar: |
    يُوَضِّحُ النَّوَوِيُّ فِي «شَرْحِ صَحِيحِ مُسْلِمٍ» أَنَّ هَذَا الْحَدِيثَ يُصَحِّحُ الْمِيزَانَ بَيْنَ التَّفَرُّغِ الرُّوحِيِّ وَحَقِّ الْوَالِدَيْنِ: كَانَ يَجِبُ أَنْ يُجَابَ نِدَاءُ الْأُمِّ. وَيُشِيرُ ابْنُ كَثِيرٍ إِلَى أَنَّ نُطْقَ الرَّضِيعِ كَانَ تَبْرِئَةً إِلَهِيَّةً، وَلَكِنَّ الدَّرْسَ الْأَعْمَقَ أَنَّ لَا قِمَّةً رُوحِيَّةَ تُبَرِّرُ إِهْمَالَ الْوَالِدَيْنِ. يُسْتَشْهَدُ بِهَذَا الْحَدِيثِ فِي كُتُبِ حُقُوقِ الْوَالِدَيْنِ وَحُدُودِ الزُّهْدِ الْفَرْدِيِّ.
  display_day_of_year: 124
  source_url: https://sunnah.com/bukhari:3436
- slug: hadith-wealthy-man-and-two-gardens
  category: hadith_narrative
  title_en: The Man with Two Gardens — When Wealth Becomes a Trial
  title_ar: صاحب الجنتين — حين يصير الغنى اختبارًا
  title_fr: L'homme aux deux jardins — quand la richesse devient une épreuve
  description_en: |
    The Prophet ﷺ recited the parable of a man whom Allah had blessed with two magnificent gardens, their date-palms in rows and their rivers flowing beneath them. The man, intoxicated by his possessions, entered one garden and declared: "I do not think this will ever perish, and I do not think the Hour will be established. Even if I am returned to my Lord, I will surely find something better than this in exchange." His believing companion reminded him to glorify Allah and warned him against the ingratitude of denying the One who had created him from dust and granted him all he possessed. But the man's gardens were struck by a divine calamity that reduced them to barren ruin, and he regretted his arrogance too late. Al-Saʿdī, in Taysīr al-Karīm al-Raḥmān, explains that this Qur'anic parable — narrated by the Prophet ﷺ — reveals how wealth transforms from blessing to trial when it breeds arrogance and forgetfulness of the Hereafter. Ibn al-Qayyim, in Madārij al-Sālikīn, warns that attachment to possessions hardens the heart more than poverty does. For the Muslim today, the lesson is to view wealth as a trust rather than a trophy, to say "if Allah wills" before every plan, and to remember that gardens are given as a test of gratitude, not proof of superiority.
  description_ar: |
    قال النبي ﷺ بِتَلَاوَةِ مَثَلِ رَجُلٍ آتَاهُ اللَّهُ جَنَّتَيْنِ مِنْ نَخِيلٍ وَأَنْهَارٍ، فَدَخَلَ إِحْدَاهُمَا وَقَالَ: «مَا أَظُنُّ أَنْ تَبِيدَ هَذِهِ أَبَدًا، وَمَا أَظُنُّ السَّاعَةَ قَائِمَةً...» فَذَكَّرَهُ صَاحِبُهُ الْمُؤْمِنُ أَنْ يُسَبِّحَ اللَّهَ وَلَا يَكْفُرَ بِخَالِقِهِ، فَأُصِيبَتْ جَنَّتَاهُ بِعَذَابٍ إِلَهِيٍّ فَصَارَتَا حَبِيسَتَيْنِ. يُبَيِّنُ الصَّعْدِيُّ فِي «تَيْسِيرِ الْكَرِيمِ الرَّحْمَانِ» أَنَّ هَذَا الْمَثَلَ الْقُرْآنِيَّ يَكْشِفُ كَيْفَ يَتَحَوَّلُ الْمَالُ مِنْ نِعْمَةٍ إِلَى امْتِحَانٍ إِذَا وَلَدَ الْكِبْرَ وَالْغَفْلَةَ. وَيُحَذِّرُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ الْتِصَاقَ الْقَلْبِ بِالدُّنْيَا يُقَسِّيهِ أَشَدَّ مِمَّا تُقَسِّيهِ الْفَاقَةُ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنْ يَنْظُرَ إِلَى الْمَالِ كِتَانَةً لَا كَأَسْهُمَةً، وَأَنْ يَقُولَ «إِنْ شَاءَ اللَّهُ» قَبْلَ كُلِّ خُطَّةٍ، وَأَنْ يَتَذَكَّرَ أَنَّ الْجِنَانَ تُؤْتَى امْتِحَانًا لِلشُّكْرِ لَا دَلِيلًا عَلَى التَّفَوُّقِ.
  description_fr: |
    Le Prophète Muhammad ﷺ a récité la parabole d'un homme qu'Allah avait comblé de deux magnifiques jardins, leurs palmiers en rangs et leurs rivières coulant en dessous. Ivre de ses possessions, l'homme entra dans l'un des jardins et déclara : « Je ne pense pas que cela périra jamais, et je ne pense pas que l'Heure aura lieu. Même si je suis ramené vers mon Seigneur, je trouverai assurément mieux en échange. » Son compagnon croyant lui rappela de glorifier Allah et le mit en garde contre l'ingratitude de nier Celui qui l'avait créé de la poussière et lui avait tout accordé. Mais les jardins de l'homme furent frappés par un châtiment divin qui les réduisit en une ruine stérile, et il regretta son arrogance trop tard. Al-Saʿdī, dans Taysīr al-Karīm al-Raḥmān, explique que cette parabole coranique — racontée par le Prophète ﷺ — révèle comment la richesse se transforme de bénédiction en épreuve lorsqu'elle engendre l'arrogance et l'oubli de l'Au-delà. Ibn al-Qayyim, dans Madārij al-Sālikīn, avertit que l'attachement aux possessions endurcit le cœur plus que la pauvreté. Pour le musulman d'aujourd'hui, la leçon est de considérer la richesse comme un dépôt et non un trophée, de dire « si Allah le veut » avant chaque projet, et de se souvenir que les jardins sont donnés pour tester la gratitude, non pour prouver la supériorité.
  reference: Sahih Muslim 2963; Qur'an 18:32-44
  hadith_refs: Muslim 2963
  quran_refs: 18:32-44
  source_notes: |
    Al-Saʿdī (Taysīr al-Karīm) explains that this Qur'anic parable reveals how wealth transforms from blessing to trial when it breeds arrogance. Ibn al-Qayyim (Madārij al-Sālikīn) warns that attachment to possessions hardens the heart more than poverty does. The parable is narrated in Ṣaḥīḥ Muslim and is the subject of extensive commentary in tafsīr works.
  source_notes_fr: |
    Al-Saʿdī (Taysīr al-Karīm) explique que cette parabole coranique révèle comment la richesse se transforme de bénédiction en épreuve lorsqu'elle engendre l'arrogance. Ibn al-Qayyim (Madārij al-Sālikīn) avertit que l'attachement aux possessions endurcit le cœur plus que la pauvreté. La parabole est narratée dans Ṣaḥīḥ Muslim et fait l'objet d'un commentaire approfondi dans les ouvrages de tafsīr.
  source_notes_ar: |
    يُبَيِّنُ الصَّعْدِيُّ فِي «تَيْسِيرِ الْكَرِيمِ» أَنَّ هَذَا الْمَثَلَ الْقُرْآنِيَّ يَكْشِفُ كَيْفَ يَتَحَوَّلُ الْمَالُ مِنْ نِعْمَةٍ إِلَى امْتِحَانٍ إِذَا وَلَدَ الْكِبْرَ. وَيُحَذِّرُ ابْنُ الْقَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ الْتِصَاقَ الْقَلْبِ بِالدُّنْيَا يُقَسِّيهِ أَشَدَّ مِمَّا تُقَسِّيهِ الْفَاقَةُ. رُوِيَ الْمَثَلُ فِي صَحِيحِ مُسْلِمٍ وَشَرَحَهُ الْمُفَسِّرُونَ بِإِسْهَابٍ.
  display_day_of_year: 125
  source_url: https://sunnah.com/muslim:2963
- slug: hadith-abu-dharr-and-charity
  category: hadith_narrative
  title_en: Abu Dharr and Charity — The Upper Hand is Better Than the Lower
  title_ar: أبو ذر والصدقة — اليد العليا خير من اليد السفلى
  title_fr: Abu Dharr et la charité — la main supérieure vaut mieux que la main inférieure
  description_en: |
    Abu Dharr al-Ghifari was renowned for his uncompromising asceticism and radical generosity. On one occasion, he gave away everything he owned in charity, leaving nothing for himself or his dependents. When the Prophet ﷺ learned of this, he gently reproached him and taught a foundational principle of Islamic social ethics: "The upper hand is better than the lower hand." He explained that the one who gives should begin with his own household, and that it is better to leave one's heirs in sufficiency than to leave them begging from others. The Prophet ﷺ further instructed that a person should set aside enough for himself and his family, then give from the surplus. Al-Nawawi, in Sharh Sahih Muslim, elaborates that this hadith establishes a middle path between miserliness and reckless divestment — both of which harm the community. Ibn Ḥajar, in Fath al-Bari, notes that the "upper hand" symbolizes self-sufficiency and dignity, while the "lower hand" represents dependency. For the Muslim today, this narrative corrects the notion that piety requires destitution; rather, sustainable generosity — preserving one's capacity to give repeatedly — is the higher virtue, and caring for one's family is itself an act of worship.
  description_ar: |
    كَانَ أَبُو ذَرٍّ الْغِفَارِيُّ يُعْرَفُ بِزُهْدِهِ الْمُطْلَقِ وَسَخَائِهِ الْجَذْلِ. فَتَصَدَّقَ ذَاتَ مَرَّةٍ بِكُلِّ مَا يَمْلِكُ، فَلَمَّا بَلَغَ النَّبِيَّ ﷺ أَنْبَأَهُ بِرِفْقٍ بِأَصْلٍ مِنْ أُصُولِ الْأَخْلَاقِ الِاجْتِمَاعِيَّةِ: «الْيَدُ الْعُلْيَا خَيْرٌ مِنَ الْيَدِ السُّفْلَى، وَابْدَأْ بِمَنْ تَعُولُ». وَأَوْضَحَ أَنَّ تَرْكَ الْوَرَثَةِ فِي غِنًى خَيْرٌ مِنْ تَرْكِهِمْ يَسْأَلُونَ النَّاسَ. يُفَصِّلُ النَّوَوِيُّ فِي «شَرْحِ صَحِيحِ مُسْلِمٍ» أَنَّ هَذَا الْحَدِيثَ يُقِيمُ طَرِيقًا وَسَطًا بَيْنَ الْبُخْلِ وَالتَّبْذِيرِ الْمُفْرِطِ. وَيَلْحَظُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ «الْيَدَ الْعُلْيَا» تَرْمِزُ إِلَى الِاكْتِفَاءِ وَالْعِزَّةِ، وَ«السُّفْلَى» إِلَى الِاحْتِيَاجِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ التَّقْوَى لَا تَتَطَلَّبُ الإفْلَاسَ، بَلْ السَّخَاءُ الْمُسْتَدَامُ الَّذِي يَحْفَظُ قُدْرَتَكَ عَلَى الْعَطَاءِ هُوَ الْفَضِيلَةُ الْعُلْيَا، وَرِعَايَةُ الْأَهْلِ عِبَادَةٌ بِذَاتِهَا.
  description_fr: |
    Abu Dharr al-Ghifari était renommé pour son ascétisme intransigeant et sa générosité radicale. Une fois, il donna tout ce qu'il possédait en aumône, ne laissant rien pour lui-même ni pour ses personnes à charge. Lorsque le Prophète Muhammad ﷺ l'apprit, il le réprimanda doucement et enseigna un principe fondamental de l'éthique sociale islamique : « La main supérieure vaut mieux que la main inférieure. » Il expliqua que celui qui donne devait commencer par sa propre maisonnée, et qu'il valait mieux laisser ses héritiers dans l'aisance que de les laisser mendier auprès d'autrui. Le Prophète ﷺ enseigna en outre qu'une personne devait se réserver de quoi vivre pour elle et sa famille, puis donner de l'excédent. Al-Nawawi, dans Sharh Sahih Muslim, développe que ce hadith établit une voie médiane entre l'avarice et le dépouillement inconsidéré — deux extrêmes qui nuisent à la communauté. Ibn Hajar, dans Fath al-Bari, note que la « main supérieure » symbolise l'autosuffisance et la dignité, tandis que la « main inférieure » représente la dépendance. Pour le musulman d'aujourd'hui, ce récit corrige l'idée que la piété exige la détresse ; au contraire, la générosité durable — qui préserve sa capacité à donner de manière répétée — est la vertu supérieure, et prendre soin de sa famille est en soi un acte d'adoration.
  reference: Sahih al-Bukhari 1427, Sahih Muslim 1035
  hadith_refs: Bukhari 1427, Muslim 1035
  source_notes: |
    Al-Nawawī (Sharḥ Muslim) explains that this hadith establishes a middle path between miserliness and reckless divestment — both of which harm the community. Ibn Ḥajar (Fatḥ al-Bārī) notes that the "upper hand" symbolises self-sufficiency and dignity, while the "lower hand" represents dependency. This is a foundational text for the fiqh of zakāt and sustainable charity.
  source_notes_fr: |
    Al-Nawawī (Sharḥ Muslim) explique que ce hadith établit une voie médiane entre l'avarice et le dépouillement inconsidéré — deux extrêmes qui nuisent à la communauté. Ibn Ḥajar (Fatḥ al-Bārī) note que la « main supérieure » symbolise l'autosuffisance et la dignité, tandis que la « main inférieure » représente la dépendance. C'est un texte fondateur pour le fiqh de la zakāt et de la charité durable.
  source_notes_ar: |
    يُفَصِّلُ النَّوَوِيُّ فِي «شَرْحِ صَحِيحِ مُسْلِمٍ» أَنَّ هَذَا الْحَدِيثَ يُقِيمُ طَرِيقًا وَسَطًا بَيْنَ الْبُخْلِ وَالتَّبْذِيرِ الْمُفْرِطِ. وَيَلْحَظُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ «الْيَدَ الْعُلْيَا» تَرْمِزُ إِلَى الِاكْتِفَاءِ وَالْعِزَّةِ، وَ«السُّفْلَى» إِلَى الِاحْتِيَاجِ. وَهُوَ نَصٌّ أَصْلِيٌّ فِي فِقْهِ الزَّكَاةِ وَالصَّدَقَةِ الْمُسْتَدَامَةِ.
