- slug: hadith-jibril-and-iman-islam-ihsan
  category: hadith_narrative
  title_en: The Hadith of Jibril — Islam, Iman, and Ihsan Defined
  title_ar: حديث جبريل — تعريف الإسلام والإيمان والإحسان
  title_fr: Le hadith de Jibril — l'Islam, l'iman et l'ihsan définis
  description_en: |
    One day, a man appeared before the Prophet ﷺ and the Companions in pristine white garments with intensely black hair, showing no signs of travel yet unknown to any of them. He sat before the Prophet ﷺ, placed his knees against the Prophet's knees, and asked with remarkable directness: "What is Islam?" The Prophet ﷺ answered: the five pillars. "What is iman?" Belief in Allah, His angels, His books, His messengers, the Last Day, and divine decree. "What is ihsan?" To worship Allah as though you see Him, for though you do not see Him, He sees you. Then he asked about the Hour and its signs. When the stranger departed, the Prophet ﷺ told the Companions: "That was Jibril, who came to teach you your religion." Al-Nawawi, in Sharh Sahih Muslim, calls this "the mother of hadiths" (umm al-ahadith) because it encompasses the entire structure of the religion in a single conversation. Ibn Rajab adds that the three levels — islam (outward submission), iman (inward conviction), and ihsan (spiritual excellence) — represent the progressive unveiling of the soul before its Lord. For the Muslim today, this hadith is the master curriculum: examine which level dominates your life, and strive to ascend from mere practice to presence.
  description_ar: |
    جَاءَ رَجُلٌ إِلَى النَّبِيِّ ﷺ فِي ثِيَابٍ بِيضٍ وَشَعْرٍ أَسْوَدَ، لَيْسَ فِيهِ أَثَرُ السَّفَرِ وَلَمْ يَعْرِفْهُ أَحَدٌ مِنَ الْحَاضِرِينَ. فَجَلَسَ إِلَيْهِ وَوَضَعَ رُكْبَتَيْهِ عَلَى رُكْبَتَيْهِ، وَسَأَلَ: «مَا الْإِسْلَامُ؟» فَأَجَابَ بِالْأَرْكَانِ الْخَمْسَةِ. «فَمَا الْإِيمَانُ؟» فَبِالْأَرْكَانِ السِّتَّةِ. «فَمَا الْإِحْسَانُ؟» أَنْ تَعْبُدَ اللَّهَ كَأَنَّكَ تَرَاهُ، فَإِنْ لَمْ تَكُنْ تَرَاهُ فَإِنَّهُ يَرَاكَ. ثُمَّ سَأَلَ عَنِ السَّاعَةِ وَأَشْرَاطِهَا. فَلَمَّا انْصَرَفَ قَالَ النَّبِيُّ ﷺ: «هَذَا جِبْرِيلُ أَتَاكُمْ يُعَلِّمُكُمْ دِينَكُمْ». يُسَمِّي النَّوَوِيُّ فِي «شَرْحِ صَحِيحِ مُسْلِمٍ» هَذَا «أُمَّ الْأَحَادِيثِ» لِأَنَّهُ يَشْمَلُ كُلَّ بُنْيَةِ الدِّينِ فِي حِوَارٍ وَاحِدٍ. وَيُضِيفُ ابْنُ رَجَبٍ أَنَّ الْمَرَاتِبَ الثَّلَاثَ - الْإِسْلَامُ وَالْإِيمَانُ وَالْإِحْسَانُ - تُمَثِّلُ تَجَلِّيَ النَّفْسِ تَدْرِيجِيًّا أَمَامَ رَبِّهَا. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ هَذَا الْحَدِيثَ هُوَ الْمِنْهَاجُ الْأُسَّاسِيُّ: رَاجِعْ أَيَّ مَرْتَبَةٍ تَسُودُ حَيَاتَكَ، وَاسْعَ لِلصُّعُودِ مِنَ الْمُمَارَسَةِ إِلَى الْمُشَاهَدَةِ.
  description_fr: |
    Un jour, un homme apparut devant le Prophète Muhammad ﷺ et les Compagnons vêtu de vêtements blancs immaculés avec des cheveux d'un noir intense, ne portant aucune trace de voyage mais inconnu de tous. Il s'assit devant le Prophète Muhammad ﷺ, posa ses genoux contre les genoux du Prophète, et demanda avec une directitude remarquable : « Qu'est-ce que l'Islam ? » Le Prophète répondit : les cinq piliers. « Qu'est-ce que l'iman ? » La foi en Allah, Ses anges, Ses livres, Ses messagers, le Jour dernier et le décret divin. « Qu'est-ce que l'ihsan ? » Adorer Allah comme si tu Le voyais, car si tu ne Le vois pas, Il te voit. Puis il demanda l'Heure et ses signes. Lorsque l'étranger partit, le Prophète Muhammad ﷺ dit aux Compagnons : « C'était Jibril, qui est venu vous enseigner votre religion. » Al-Nawawi, dans Sharh Sahih Muslim, appelle cela « la mère des hadiths » (umm al-ahadith) car elle englobe toute la structure de la religion en une seule conversation. Ibn Rajab ajoute que les trois niveaux — islam (soumission extérieure), iman (conviction intérieure) et ihsan (excellence spirituelle) — représentent le dévoilement progressif de l'âme devant son Seigneur. Pour le musulman d'aujourd'hui, ce hadith est le programme d'études principal : examinez quel niveau domine votre vie, et efforcez-vous de gravir les échelons de la simple pratique à la présence.
  reference: Sahih Muslim 8, Sahih al-Bukhari 50
  hadith_refs: Muslim 8, Bukhari 50
  source_notes: |
    Al-Nawawī (Sharḥ Muslim) calls this "the mother of hadiths" (umm al-aḥādīth) because it encompasses the entire structure of the religion in a single conversation. Ibn Rajab adds that the three levels — islām, īmān, and iḥsān — represent the progressive unveiling of the soul before its Lord. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
  source_notes_fr: |
