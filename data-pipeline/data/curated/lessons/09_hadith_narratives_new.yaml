- slug: hadith-hidden-treasure
  category: hadith_narrative
  title_en: '''I Was a Hidden Treasure'' — Why Isnad Criticism Matters'
  title_ar: «كنت كنزًا مخفيًا» — لماذا يهم نقد الإسناد
  title_fr: « J'étais un trésor caché » — pourquoi la critique de l'isnad importe
  description_en: |
    A saying widely circulated in Islamic literature attributes to Allah the words: "I was a hidden treasure, and I loved to be known, so I created creation that I might be known." Though poetic and theologically suggestive, classical hadith scholars have unanimously determined that this narration lacks any authenticated chain of transmission (isnad) back to the Prophet ﷺ. Ibn Taymiyya, in Majmu' al-Fatawa (18/122), wrote explicitly: "This is not among the words of the Prophet ﷺ, and there is no known chain for it." Al-Suyuti, in al-Durar al-Muntathira (no. 330), reached the same verdict, noting that the saying first appears in the works of Ibn Arabi and later Sufi authors without prophetic authority. The authentic purpose of creation is given in the Qur'an: "I did not create the jinn and mankind except to worship Me" (51:56). This case is a foundational lesson in the discipline of hadith criticism (al-jarh wa al-ta'dil): beauty of meaning does not authenticate a narration, and the absence of isnad renders even the most spiritually attractive saying inadmissible as prophetic speech. For the Muslim today, it teaches discernment: verify before you circulate, and let the rigor of transmission guard the purity of your faith.
  description_ar: |
    يَشِيعُ فِي الْأَدَبِ الْإِسْلَامِيِّ قَوْلٌ مَنْسُوبٌ إِلَى اللَّهِ: «كُنْتُ كَنْزًا مَخْفِيًّا فَأَحْبَبْتُ أَنْ أُعْرَفَ، فَخَلَقْتُ الْخَلْقَ لِأَعْرَفَ». وَرَغْمَ جَمَالِهِ الشِّعْرِيِّ، فَقَدْ أَجْمَعَ عُلَمَاءُ الْحَدِيثِ عَلَى أَنَّ هَذَا الْخَبَرَ لَا يَصِلُ إِسْنَادُهُ إِلَى النَّبِيِّ ﷺ. كَتَبَ ابْنُ تَيْمِيَّةَ فِي «مَجْمُوعِ الْفَتَاوَى» (١٨/١٢٢): «هَذَا لَيْسَ مِنْ كَلَامِ النَّبِيِّ ﷺ، وَلَيْسَ لَهُ إِسْنَادٌ مَعْلُومٌ». وَخَرِجَ السُّيُوطِيُّ فِي «الدُّرَرِ الْمُنْتَثِرَةِ» (٣٣٠) إِلَى نَتِيجَةٍ مُطَابِقَةٍ، مُلَاحِظًا أَنَّ الْقَوْلَ ظَهَرَ أَوَّلًا فِي كُتُبِ ابْنِ عَرَبِيَّ وَلَيْسَ لَهُ سُنَّةٌ نَبَوِيَّةٌ. وَالْغَرَضُ الْمُصَدَّقُ مِنَ الْخَلْقِ فِي الْقُرْآنِ: «وَمَا خَلَقْتُ الْجِنَّ وَالْإِنْسَ إِلَّا لِيَعْبُدُونِ» (٥١:٥٦). وَهَذَا مَوْضِعٌ تَأْسِيسِيٌّ فِي عِلْمِ النَّقْدِ: جَمَالُ الْمَعْنَى لَا يُصَحِّحُ الْخَبَرَ، وَعَدَمُ الْإِسْنَادِ يُبَطِّلُ أَجْمَلَ أَلْفَاظٍ. دَرْسُ الْمُسْلِمِ الْيَوْمَ التَّمَيُّزُ: تَحَقَّقْ قَبْلَ أَنْ تُنَشِّرَ، وَدَعْ صَرَامَةَ النَّقْلِ تَحْمِي طَهَارَةَ عَقِيدَتِكَ.
  description_fr: |
    Un dicton largement répandu dans la littérature islamique attribue à Allah ces mots : « J'étais un trésor caché, et J'ai aimé être connu, alors J'ai créé la création afin que Je sois connu. » Bien que poétique et théologiquement suggestif, les savants classiques du hadith ont unanimement déterminé que cette narration manque de toute chaîne de transmission authentifiée (isnad) remontant au Prophète Muhammad ﷺ. Ibn Taymiyya, dans Majmu' al-Fatawa (18/122), écrivit explicitement : « Ceci ne fait pas partie des paroles du Prophète Muhammad ﷺ, et il n'existe aucune chaîne connue pour cela. » Al-Suyuti, dans al-Durar al-Muntathira (n° 330), parvint au même verdict, notant que le dicton apparaît d'abord dans les œuvres d'Ibn Arabi et d'auteurs soufis ultérieurs sans autorité prophétique. Le but authentique de la création est donné dans le Coran : « Je n'ai créé les djinns et les humains que pour qu'ils M'adorent » (51:56). Ce cas est une leçon fondamentale dans la discipline de la critique du hadith (al-jarh wa al-ta'dil) : la beauté du sens n'authentifie pas une narration, et l'absence d'isnad rend inadmissible comme parole prophétique même le dicton le plus spirituellement attrayant. Pour le musulman d'aujourd'hui, cela enseigne le discernement : vérifiez avant de diffuser, et laissez la rigueur de la transmission garder la pureté de votre foi.
  source_url: https://islamqa.info/en/answers/20613
  reference: Ibn Taymiyya, Majmu' al-Fatawa 18/122; al-Suyuti, al-Durar al-Muntathira 330
  quran_refs: '51:56'
  source_notes: |
    Ibn Taymiyya (Majmūʿ al-Fatāwā 18/122) wrote explicitly: "This is not among the words of the Prophet ﷺ, and there is no known chain for it." Al-Suyūṭī (al-Durar al-Muntathira 330) reached the same verdict. The hadith is unanimously considered to have no authenticated isnād. This case is foundational in teaching that beauty of meaning does not authenticate a narration.
  source_notes_fr: |
    Ibn Taymiyya (Majmūʿ al-Fatāwā 18/122) écrivit explicitement : « Ceci ne fait pas partie des paroles du Prophète ﷺ, et il n'existe aucune chaîne connue pour cela. » Al-Suyūṭī (al-Durar al-Muntathira 330) parvint au même verdict. Le hadith est unanimement considéré comme dépourvu d'isnād authentifié. Ce cas est fondamental pour enseigner que la beauté du sens n'authentifie pas une narration.
  source_notes_ar: |
    كَتَبَ ابْنُ تَيْمِيَّةَ فِي «مَجْمُوعِ الْفَتَاوَى» (١٨/١٢٢): «هَذَا لَيْسَ مِنْ كَلَامِ النَّبِيِّ ﷺ، وَلَيْسَ لَهُ إِسْنَادٌ مَعْلُومٌ». وَخَرِجَ السُّيُوطِيُّ فِي «الدُّرَرِ الْمُنْتَثِرَةِ» (٣٣٠) إِلَى نَتِيجَةٍ مُطَابِقَةٍ. أَجْمَعَ الْعُلَمَاءُ عَلَى أَنَّ لَهُ إِسْنَادًا مُصَدَّقًا. وَهَذَا مَوْضِعٌ تَأْسِيسِيٌّ فِي أَنَّ جَمَالَ الْمَعْنَى لَا يُصَحِّحُ الْخَبَرَ.
  display_day_of_year: 146
- slug: hadith-khadijah-comforts-the-prophet
  category: hadith_narrative
  title_en: Khadijah's Embrace — The First Believer's Comfort
  title_ar: عناق خديجة — ستر الْمُؤْمِنَةِ الْأُولَى
  title_fr: L'étreinte de Khadija — le réconfort de la première croyante
  description_en: 'After the first revelation descended upon him in the cave of Hira'', the Prophet ﷺ descended in terror,
    his heart pounding, his body trembling. He entered his house and said to his wife Khadijah: ''Cover me, cover me!'' She
    wrapped him in a cloak and held him until the trembling subsided. He told her what had happened, and she — the first human
    being to hear the news — did not hesitate for a moment. She said: ''Never! By Allah, Allah will never disgrace you. You
    keep good relations with your relatives, you speak the truth, you bear the burden of the weak, you help the destitute,
    you honor the guest, and you assist those afflicted by calamity.'' Then she took him to her cousin Waraqa ibn Nawfal,
    a Christian scholar who confirmed that this was the same angel who had come to Moses. Ibn Hajar, in Fath al-Bari, emphasizes
    that Khadijah''s immediate response was not merely wifely consolation but theological discernment: she judged the event
    by the Prophet''s lifelong character, establishing the Sunni principle that revelation aligns with virtue, not vice versa.
    For the Muslim today, Khadijah''s embrace is the archetype of the believing community: when the world seems to crack open,
    the first response should not be skepticism but shelter, not analysis but presence.'
  description_ar: 'بَعْدَ نُزُولِ الْوَحْيِ الْأَوَّلِ فِي غَارِ حِرَاءَ، نَزَلَ النَّبِيُّ ﷺ مُرْتَعِدًا قَلْبُهُ، فَدَخَلَ
    بَيْتَهُ وَقَالَ لِخَدِيجَةَ: «زَمِّلُونِي زَمِّلُونِي». فَدَثَّرَتْهُ وَضَمَّتْهُ حَتَّى سَكَنَ. فَأَخْبَرَهَا، فَقَالَتْ:
    «كَلَّا وَاللَّهِ مَا يُخْزِيكَ اللَّهُ أَبَدًا، إِنَّكَ لَتَصِلُ الرَّحِمَ، وَتَحْمِلُ الْكَلَّ، وَتَكْسِبُ الْمَعْدُومَ،
    وَتَكْرِمُ الضَّيْفَ، وَتُعِينُ عَلَى نَوَائِبِ الْحَقِّ». ثُمَّ ذَهَبَتْ بِهِ إِلَى وَرَقَةَ بْنِ نَوْفَلٍ. يُؤَكِّدُ
    ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ رَدَّ خَدِيجَةَ لَمْ يَكُنْ مُجَرَّدَ تَعْزِيَةٍ، بَلْ تَمَيُّزًا عَقَائِدِيًّا:
    حَكَمَتْ عَلَى الْحَادِثَةِ بِخُلُقِ النَّبِيِّ ﷺ طِوَالَ حَيَاتِهِ. دَرْسُ الْمُسْلِمِ الْيَوْمَ أَنَّ عِنَاقَ خَدِيجَةَ
    هُوَ أُصُولُ الْمُجْتَمَعِ الْمُؤْمِنِ: حِينَ يَتَشَقَّقُ الْعَالَمُ، فَلْيَكُنِ الرَّدُّ الْأَوَّلُ لَيْسَ الشَّكَّ بَلْ
    الْحِمَايَةَ، لَا التَّحْلِيلَ بَلْ الْحُضُورَ.'
  description_fr: 'Après que la première révélation lui fut descendue dans la grotte de Hira'', le Prophète Muhammad ﷺ descendit
    terrorisé, son cœur battant, son corps tremblant. Il entra chez lui et dit à sa femme Khadija : ''Couvre-moi, couvre-moi
    !'' Elle l''enveloppa dans un manteau et le serra contre elle jusqu''à ce que le tremblement s''apaise. Il lui raconta
    ce qui s''était passé, et elle — le premier être humain à entendre la nouvelle — n''hésita pas un instant. Elle dit :
    ''Jamais ! Par Allah, Allah ne te déshonorera jamais. Tu entretiens de bonnes relations avec tes proches, tu dis la vérité,
    tu portes le fardeau des faibles, tu aides les indigents, tu honores l''hôte et tu assistes ceux que frappe le malheur.''
    Puis elle l''emmena chez son cousin Waraqa ibn Nawfal, un érudit chrétien qui confirma que c''était le même ange qui était
    venu à Moïse. Ibn Hajar, dans Fath al-Bari, souligne que la réponse immédiate de Khadija n''était pas seulement une consolation
    conjugale mais un discernement théologique : elle jugea l''événement d''après le caractère du Prophète tout au long de
    sa vie, établissant le principe sunnite selon lequel la révélation s''aligne sur la vertu, et non l''inverse. Pour le
    musulman d''aujourd''hui, l''étreinte de Khadija est l''archétype de la communauté croyante : lorsque le monde semble
    se fendre, la première réponse ne doit pas être le scepticisme mais l''abri, non l''analyse mais la présence.'
  reference: Sahih al-Bukhari 4953, Sahih Muslim 243
  hadith_refs: Bukhari 4953, Muslim 243
  source_notes: |
    Ibn Ḥajar (Fatḥ al-Bārī) emphasises that Khadīja's immediate response was not merely wifely consolation but theological discernment: she judged the event by the Prophet's ﷺ lifelong character. Al-Nawawī adds that her taking him to Waraqah established the principle of consulting knowledgeable people when confronted with extraordinary experiences. The hadith is narrated in Ṣaḥīḥ al-Bukhārī and Muslim.
  source_notes_fr: |
    Ibn Ḥajar (Fatḥ al-Bārī) souligne que la réponse immédiate de Khadīja n'était pas seulement une consolation conjugale mais un discernement théologique : elle jugea l'événement d'après le caractère du Prophète ﷺ tout au long de sa vie. Al-Nawawī ajoute qu'en l'emmenant vers Waraqah, elle établit le principe de consulter les savants face aux expériences extraordinaires. Le hadith est narraté dans Ṣaḥīḥ al-Bukhārī et Muslim.
  source_notes_ar: |
    يُؤَكِّدُ ابْنُ حَجَرٍ فِي «فَتْحِ الْبَارِي» أَنَّ رَدَّ خَدِيجَةَ لَمْ يَكُنْ مُجَرَّدَ تَعْزِيَةٍ، بَلْ تَمَيُّزًا عَقَائِدِيًّا: حَكَمَتْ عَلَى الْحَادِثَةِ بِخُلُقِ النَّبِيِّ ﷺ. وَيُضِيفُ النَّوَوِيُّ أَنَّ ذِهَابَهَا بِهِ إِلَى وَرَقَةَ أَثْبَتَ أَصْلَ الِاسْتِشَارَةِ. رُوِيَ فِي صَحِيحِ الْبُخَارِيِّ وَمُسْلِمٍ.
  display_day_of_year: 148
