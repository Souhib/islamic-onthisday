# Additional Quranic narratives, each sourced directly to the Qur'an.

lessons:
  - slug: ibrahim-and-ismail-building-kaaba
    category: quran_story
    title_en: Ibrahim and Isma'il Raise the Foundations of the Ka'ba
    description_en: |
      The Qur'an preserves the words of the supplication of Ibrahim and
      his son Isma'il ﷺ as they raised the walls of the Ka'ba: "Our Lord,
      accept from us — indeed You are the Hearing, the Knowing. Our Lord,
      make us submissive to You, and from our descendants a community
      submissive to You. And show us our rites and accept our
      repentance — indeed You are the Accepter of repentance, the
      Merciful. Our Lord, raise up among them a messenger from
      themselves, who will recite to them Your verses and teach them the
      Book and the wisdom and purify them. Indeed You are the Mighty,
      the Wise." The last petition — for a messenger from their
      descendants — was answered with the sending of the Prophet ﷺ over
      two and a half millennia later.
    reference: Surah al-Baqara 2:127-129
    source_notes: |
      Ibn Kathīr notes that the supplication for a messenger from among the descendants of Ibrāhīm was answered over two millennia later with the sending of the Prophet ﷺ, making this one of the longest-range prophecies in the Qur'an. Al-Ṭabarī records that Ibrāhīm and Ismāʿīl built the Kaʿba on its original foundations laid by Ādam, establishing a continuity of monotheist worship from the first prophet to the last.
    source_notes_fr: |
      Ibn Kathīr note que la supplication pour un messager parmi les descendants d'Ibrāhīm fut exaucée plus de deux millénaires plus tard avec l'envoi du Prophète ﷺ, ce qui fait de cela l'une des prophéties à plus longue portée du Coran. Al-Ṭabarī rapporte qu'Ibrāhīm et Ismāʿīl bâtirent la Kaʿba sur ses fondations originales posées par Ādam, établissant une continuité du culte monothéiste du premier prophète au dernier.
    source_notes_ar: |
      يُشِيرُ ابنُ كَثِيرٍ إِلَى أَنَّ الدُّعَاءَ بِبَعْثِ رَسُولٍ مِنْ ذُرِّيَّةِ إِبْرَاهِيمَ قَدْ اسْتُجِيبَ بَعْدَ أَكْثَرَ مِنْ أَلْفَيْ سَنَةٍ بِبَعْثِ النَّبِيِّ ﷺ، مِمَّا يَجْعَلُهُ مِنْ أَطْوَلِ النُّبُؤَاتِ مَدًى فِي القُرْآنِ. وَيَرْوِي الطَّبَرِيُّ أَنَّ إِبْرَاهِيمَ وَإِسْمَاعِيلَ بَنَيَا الكَعْبَةَ عَلَى أَسَاسِهَا الأَصْلِيِّ الَّذِي وَضَعَهُ آدَمُ، مُؤَسِّسَيْنِ اسْتِمْرَارِيَّةَ العِبَادَةِ المُوَحِّدَةِ مِنَ النَّبِيِّ الأَوَّلِ إِلَى الآخِرِ.
    display_day_of_year: 11
    quran_refs: "2:127-129"

  - slug: hajar-and-zamzam
    category: quran_story
    title_en: Hajar, Isma'il, and the Well of Zamzam
    description_en: |
      Ibrahim ﷺ left Hajar and the infant Isma'il ﷺ at a waterless valley
      near what would become Makkah — by the direct command of Allah.
      When her water was exhausted, Hajar ran between the hills of Safa
      and Marwa seven times in search of help. On her return to her son
      she found water springing forth at his feet — the well of Zamzam —
      which has flowed continuously since. Her act of searching became
      the sa'i ritual performed by every pilgrim to this day. The Prophet
      ﷺ said: "May Allah have mercy on the mother of Isma'il — had she
      left Zamzam to flow, it would have been a flowing spring." The
      Qur'an links these events to the sanctuary: "Indeed Safa and Marwa
      are among the symbols of Allah" (2:158).
    reference: Surah al-Baqara 2:158; Sahih al-Bukhari 3364 (the full narrative)
    source_notes: |
      Ibn Kathīr narrates in *al-Bidāya wa-l-Nihāya* that the well of Zamzam has flowed continuously since the time of Ismāʿīl, making it one of the oldest continuously active water sources in human history. Al-Qurṭubī notes that the saʿī ritual between Ṣafā and Marwa commemorates not merely a mother's search but a paradigm of active trust (*tawakkul*) combined with effort.
    source_notes_fr: |
      Ibn Kathīr rapporte dans *al-Bidāya wa-l-Nihāya* que le puits de Zamzam coule sans interruption depuis l'époque d'Ismāʿīl, ce qui en fait l'une des sources d'eau en activité continue les plus anciennes de l'histoire humaine. Al-Qurṭubī note que le rituel du saʿī entre Ṣafā et Marwa ne commémore pas seulement la quête d'une mère, mais illustre un paradigme de confiance active (*tawakkul*) alliée à l'effort.
    source_notes_ar: |
      يَرْوِي ابنُ كَثِيرٍ فِي «الْبِدَايَةِ وَالنِّهَايَةِ» أَنَّ بِئْرَ زَمْزَمَ تَجْرِي مُنْذُ عَهْدِ إِسْمَاعِيلَ بِلَا انْقِطَاعٍ، مِمَّا يَجْعَلُهَا مِنْ أَقْدَمِ مَنَابِعِ المَاءِ المُسْتَمِرَّةِ فِي تَارِيخِ البَشَرِيَّةِ. وَيُلَاحِظُ القُرْطُبِيُّ أَنَّ شَعِيرَةَ السَّعْيِ بَيْنَ الصَّفَا وَالمَرْوَةِ لَا تُجَسِّدُ مُجَرَّدَ بَحْثِ أُمٍّ، بَلْ تُمَثِّلُ نَمُوذَجًا لِلتَّوَكُّلِ الفَاعِلِ المُقْتَرِنِ بِالسَّعْيِ.
    display_day_of_year: 21
    quran_refs: "2:158, 14:37"
    hadith_refs: Bukhari 3364

  - slug: musa-nine-signs
    category: quran_story
    title_en: The Nine Signs Given to Musa ﷺ
    description_en: |
      Surah al-Isra' 17:101 refers to "nine clear signs" given to Musa ﷺ
      for Pharaoh. Classical mufassirin (al-Tabari, Ibn Kathir — citing
      Ibn 'Abbas, Mujahid, al-Sha'bi, Qatada) list them as: the
      staff-turned-snake, the white hand, the years of famine (sanin),
      the shortage of crops (naqs min ath-thamarat — both drawn from
      7:130), the flood, the locusts, the lice, the frogs, and the
      blood. Each in turn was met by Pharaoh and his elite with partial
      belief and subsequent return to defiance — until finally, at the
      parting of the sea (a later sign, not counted among the nine),
      they were drowned. The Qur'an repeatedly holds up the cycle as a
      moral parable: signs do not compel belief in hearts that choose
      arrogance.
    reference: Surah al-Isra' 17:101, Surah al-A'raf 7:130-135
    source_notes: |
      Ibn Kathīr, citing Ibn ʿAbbās, Mujāhid, al-Shaʿbī, and Qatāda, lists the nine signs as the staff, the white hand, famine, shortage of crops, flood, locusts, lice, frogs, and blood. Al-Qurṭubī observes that Pharaoh's cycle of partial belief and subsequent return to defiance demonstrates that signs do not compel belief in hearts that choose arrogance.
    source_notes_fr: |
      Ibn Kathīr, citant Ibn ʿAbbās, Mujāhid, al-Shaʿbī et Qatāda, énumère les neuf signes comme suit : le bâton, la main blanche, la famine, la pénurie de récoltes, l'inondation, les sauterelles, les poux, les grenouilles et le sang. Al-Qurṭubī observe que le cycle de Firaʿūn — croyance partielle suivie d'un retour à la rébellion — démontre que les signes ne contraignent pas la foi dans les cœurs qui choisissent l'arrogance.
    source_notes_ar: |
      يَعُدُّ ابنُ كَثِيرٍ — بِنَقْلِهِ عَنِ ابْنِ عَبَّاسٍ وَمُجَاهِدٍ وَالشَّعْبِيِّ وَقَتَادَةَ — الآيَاتِ التِّسْعَ فِي: العَصَا وَاليَدِ البَيْضَاءِ وَالسِّنِينَ وَنَقْصِ الثَّمَرَاتِ وَالطُّوفَانِ وَالجَرَادِ وَالقُمَلِ وَالضَّفَادِعِ وَالدَّمِ. وَيَلْحَظُ القُرْطُبِيُّ أَنَّ دَائِرَةَ فِرْعَوْنَ مِنَ الإِيمَانِ الجُزْئِيِّ ثُمَّ العَوْدَةِ إِلَى التَّمَرُّدِ تُبَيِّنُ أَنَّ الآيَاتِ لَا تُكَلِّبُ القُلُوبَ الَّتِي تَخْتَارُ الكِبْرَ عَلَى الإِيمَانِ.
    display_day_of_year: 31
    quran_refs: "17:101, 7:130-135"

  - slug: musa-speaking-with-allah
    category: quran_story
    title_en: Musa ﷺ Asks to See His Lord
    description_en: |
      When Musa ﷺ was called to Mount al-Tur to receive the Tablets, he
      asked: "My Lord, show me — let me see You." Allah answered: "You
      will not see Me, but look at the mountain. If it remains in its
      place, you will see Me." When his Lord manifested on the mountain,
      it crumbled to dust and Musa fell unconscious. When he recovered
      he said: "Glory to You — I turn to You in repentance, and I am
      the first of the believers" (Qur'an 7:143). Classical Sunni
      theology drew from this the principle that the vision of Allah in
      this world is impossible for human nature (as in the Mu'tazilite-
      Ash'arite disputes), though it is held that the believers will see
      Him in the Hereafter — attested in Sahih al-Bukhari 554 and Sahih
      Muslim 183.
    reference: Surah al-A'raf 7:143, Sahih al-Bukhari 554
    source_notes: |
      Ibn Kathīr notes that this verse became the foundational proof in Sunni theology that the vision of Allah in this world is impossible for human nature, though the believers will see Him in the Hereafter. Al-Qurṭubī adds that Mūsā's recovery and immediate repentance — "I am the first of the believers" — model how the righteous respond to the overwhelming majesty of Allah.
    source_notes_fr: |
      Ibn Kathīr note que ce verset devint la preuve fondatrice en théologie sunnite selon laquelle la vision d'Allah en ce monde est impossible pour la nature humaine, bien que les croyants Le verront dans l'au-delà. Al-Qurṭubī ajoute que le rétablissement de Mūsā et son repentir immédiat — « je suis le premier des croyants » — constituent le modèle de la réponse des justes face à la majesté écrasante d'Allah.
    source_notes_ar: |
      يُلَاحِظُ ابنُ كَثِيرٍ أَنَّ هَذِهِ الآيَةَ صَارَتِ الدَّلِيلَ الأَصْلِيَّ فِي العَقِيدَةِ السُّنِّيَّةِ عَلَى اسْتِحَالَةِ رُؤْيَةِ اللهِ فِي الدُّنْيَا عَلَى الفِطْرَةِ البَشَرِيَّةِ، وَإِنْ كَانَ المُؤْمِنُونَ سَيَرَوْنَهُ فِي الآخِرَةِ. وَيَزِيدُ القُرْطُبِيُّ أَنَّ اسْتِجْمَاعَ مُوسَى وَتَوْبَتَهُ الفَوْرِيَّةَ — «أَنَا أَوَّلُ المُؤْمِنِينَ» — يُجَسِّدَانِ كَيْفَ يَسْتَجِيبُ الصَّالِحُونَ لِعَظَمَةِ اللهِ الكَامِلَةِ.
    display_day_of_year: 41
    quran_refs: "7:143"
    hadith_refs: "Bukhari 554, Muslim 183"

  - slug: sulayman-and-the-horses
    category: quran_story
    title_en: Sulayman ﷺ and the Horses
    description_en: |
      The Qur'an describes an evening when Prophet Sulayman ﷺ was
      presented with thoroughbred horses. So absorbed was he in
      inspecting them that the sun set before he had performed his
      evening dhikr. The Qur'an reports his self-reproach — "I have
      loved the love of good (things — in the classical reading,
      the horses themselves) over the remembrance of my Lord until
      the sun disappeared behind the veil" — followed by his
      reaction, stroking their necks and legs. Classical scholars are
      divided on the meaning of 38:33 (*fa-tafiqa mashan bi-s-suqi
      wa-l-a'naq*): Ibn Kathir and al-Tabari read it as hamstringing
      the horses as an act of dedication to Allah; al-Razi and others
      read it as stroking and dedicating without slaughter. Both
      readings illustrate the same principle: the righteous returning
      instantly from heedlessness to Allah's remembrance.
    reference: Surah Sad 38:30-33
    source_notes: |
      Ibn Kathīr and al-Ṭabarī read the phrase *fa-tafiqa mashan bi-s-suqi wa-l-aʿnāq* as hamstringing the horses as an act of dedication to Allah. Al-Qurṭubī notes that the scene illustrates how the righteous return instantly from heedlessness to Allah's remembrance, turning even worldly distraction into an occasion for devotion.
    source_notes_fr: |
      Ibn Kathīr et al-Ṭabarī lisent l'expression *fa-tafiqa mashan bi-s-suqi wa-l-aʿnāq* comme signifiant l'achèvement des chevaux en acte de dédicace à Allah. Al-Qurṭubī note que la scène illustre comment les justes reviennent instantanément de l'inattention au rappel d'Allah, transformant même la distraction mondaine en occasion de dévotion.
    source_notes_ar: |
      يَقْرَأُ ابنُ كَثِيرٍ وَالطَّبَرِيُّ قَوْلَهُ تَعَالَى: ﴿فَطَفِقَ مَسْحًا بِالسُّوقِ وَالأَعْنَاقِ﴾ عَلَى أَنَّهُ عَقْرُ الخَيْلِ تَقَرُّبًا إِلَى اللهِ. وَيُشِيرُ القُرْطُبِيُّ إِلَى أَنَّ المَشْهَدَ يُبَيِّنُ كَيْفَ يَرْجِعُ الصَّالِحُونَ فَوْرًا مِنَ الغَفْلَةِ إِلَى ذِكْرِ اللهِ، مُحَوِّلِينَ حَتَّى الشُّغْلَ الدُّنْيَوِيَّ إِلَى مُنَاسَبَةٍ لِلتَّقَرُّبِ.
    display_day_of_year: 51
    quran_refs: "38:30-33"

  - slug: isa-miracles
    category: quran_story
    title_en: The Miracles of 'Isa ﷺ
    description_en: |
      The Qur'an preserves the miracles given to Prophet 'Isa ﷺ in his
      own words, directly: "I design for you from clay the likeness of a
      bird, then I breathe into it and it becomes a bird by Allah's
      permission. I heal the blind and the leper, and I revive the dead
      by Allah's permission. I inform you of what you eat and what you
      store in your houses" (3:49). These miracles were granted as
      proofs of his prophethood to the Bani Isra'il. The cradle-miracle
      — the infant 'Isa defending his mother Maryam from slander — is
      separately recorded in Surah Maryam 19:30-33.
    reference: Surah Aal 'Imran 3:49, Surah Maryam 19:30-33, Surah al-Ma'ida 5:110
    source_notes: |
      Ibn Kathīr explains that these miracles were granted as proofs of ʿĪsā's prophethood to Banī Isrāʾīl, not as demonstrations of independent divinity. Al-Qurṭubī emphasises that the cradle-miracle — the infant defending his mother from slander — was a sign of prophethood granted before any human instruction, establishing that Allah defends the righteous with means beyond human calculation.
    source_notes_fr: |
      Ibn Kathīr explique que ces miracles furent accordés comme preuves de la prophétie de ʿĪsā aux Banī Isrāʾīl, et non comme démonstrations d'une divinité indépendante. Al-Qurṭubī souligne que le miracle du berceau — le nourrisson défendant sa mère contre la calomnie — fut un signe de prophétie accordé avant toute instruction humaine, établissant qu'Allah défend les justes par des moyens qui dépassent tout calcul humain.
    source_notes_ar: |
      يُفَسِّرُ ابنُ كَثِيرٌ أَنَّ هَذِهِ المُعْجِزَاتِ أُعْطِيَتْ بُرْهَانًا عَلَى نُبُوَّةِ عِيسَى لِبَنِي إِسْرَائِيلَ، لاَ بِمَعْنَى إِثْبَاتِ أُلُوهِيَّةٍ مُسْتَقِلَّةٍ. وَيُؤَكِّدُ القُرْطُبِيُّ أَنَّ مُعْجِزَةَ المَهْدِ — رَضِيعٌ يُدَافِعُ عَنْ أُمِّهِ مِنَ القَذْفِ — كَانَتْ آيَةَ نُبُوَّةٍ مُنَحَّةً قَبْلَ أَيِّ تَعْلِيمٍ بَشَرِيٍّ، مُثْبِتَةً أَنَّ اللهَ يُدَافِعُ عَنِ الأَبْرَارِ بِسُبُلٍ تَتَجَاوَزُ الحِسَابَ البَشَرِيَّ.
    display_day_of_year: 61
    quran_refs: "3:49, 19:30-33, 5:110"
