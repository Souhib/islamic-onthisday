  - slug: quran-story-isa-speaking-from-cradle
    category: quran_story
    title_en: Isa Speaking from the Cradle — The Infant Prophet Defends His Mother
    title_ar: عِيسَى يَتَكَلَّمُ مِنَ المَهْدِ — الرَّضِيعُ النَّبِيُّ يُدَافِعُ عَنْ أُمِّهِ
    title_fr: ʿĪsā parle du berceau — le prophète nourrisson défend sa mère
    description_en: |
      When Maryam returned to her people carrying the infant Isa ʿalayhi as-salām, they
      accused her of a grave moral breach, knowing her to be from a
      righteous family. Instead of answering them directly, she pointed to
      the child. To their astonishment, the infant spoke with eloquence and
      authority: "Indeed I am the servant of Allah. He has given me the
      Scripture and made me a prophet. And He has made me blessed wherever
      I am, and has enjoined upon me prayer and zakat as long as I live,
      and [made me] dutiful to my mother, and He has not made me a wretched
      tyrant." Ibn Kathīr explains that this miracle was not merely to
      exonerate Maryam but to establish Isa's prophethood from the first
      moment of his earthly life. Al-Ṭabarī adds that the speech from the
      cradle silenced the slanderers completely, proving that Allah defends
      His righteous servants with means beyond human calculation. The lesson
      is that truth does not need human defenders; when Allah wills to
      vindicate the innocent, He provides a witness that no argument can
      refute.
    description_ar: |
      لَمَّا عَادَتْ مَرْيَمُ إِلَى قَوْمِهَا وَمَعَهَا الرَّضِيعُ عِيسَى عَلَيْهِ
      السَّلَامُ، اتَّهَمُوهَا بِانْتِهَاكٍ خَلُقِيٍّ كَبِيرٍ، وَهُمْ يَعْلَمُونَ أَنَّهَا
      مِنْ عَائِلَةٍ صَالِحَةٍ. بَدَلاً مِنَ الإِجَابَةِ عَلَيْهِمْ مُبَاشَرَةً، أَشَارَتْ
      إِلَى الطِّفْلِ. فَتَعَجَّبُوا حِينَ تَكَلَّمَ الرَّضِيعُ بِفَصَاحَةٍ وَسُلْطَةٍ:
      «إِنِّي عَبْدُ اللهِ آتَانِيَ الكِتَابَ وَجَعَلَنِي نَبِيًّا. وَجَعَلَنِي
      مُبَارَكًا أَيْنَ مَا كُنْتُ وَأَوْصَانِي بِالصَّلاَةِ وَالزَّكَاةِ مَا دُمْتُ
      حَيًّا. وَبَرًّا بِوَالِدَتِي وَلَمْ يَجْعَلْنِي جَبَّارًا شَقِيًّا». يُفَسِّرُ
      ابنُ كَثِيرٍ أَنَّ هَذِهِ المُعْجِزَةَ لَمْ تَكُنْ مُجَرَّدَ تَبْرِيءَةٍ
      لِمَرْيَمَ، بَلْ كَانَتْ تَأْسِيسًا لِنُبُوَّةِ عِيسَى مِنْ أَوَّلِ لَحْظَةٍ فِي
      حَيَاتِهِ الأَرْضِيَّةِ. وَيَزِيدُ الطَّبَرِيُّ أَنَّ الكَلاَمَ مِنَ المَهْدِ
      أَسْكَتَ المُفْتَرِينَ تَمَامًا، مُثْبِتًا أَنَّ اللهَ يُدَافِعُ عَنْ عِبَادِهِ
      الصَّالِحِينَ بِسُبُلٍ تَتَعَدَّى الحِسَابَ البَشَرِيَّ. الدَّرْسُ أَنَّ الحَقَّ لاَ
      يَحْتَاجُ إِلَى مُدَافِعِينَ بَشَرِيِّينَ؛ حِينَ يُرِيدُ اللهُ تَبْرِئَةَ
      البَرِيءِ، يُهَيِّئُ شَاهِدًا لاَ يَسْتَطِيعُ أَيُّ جِدَالٍ دَحْضَهُ.
    description_fr: |
      Lorsque Maryam retourna vers son peuple portant le nouveau-né ʿĪsā ʿalayhi as-salām, ils l'accusèrent d'une grave faute morale, sachant qu'elle était
      issue d'une famille vertueuse. Au lieu de leur répondre directement,
      elle désigna l'enfant. À leur stupéfaction, le nourrisson parla avec
      éloquence et autorité : « En vérité, je suis le serviteur d'Allah.
      Il m'a donné l'Écriture et m'a fait prophète. Il m'a rendu béni
      où que je sois, et m'a enjoint la prière et la zakat tant que je
      vivrai, et [m'a rendu] dévoué envers ma mère, et Il ne m'a pas fait
      un tyran misérable. » Ibn Kathīr explique que ce miracle n'était pas
      seulement pour innocenter Maryam, mais pour établir la prophétie de
      ʿĪsā dès le premier moment de sa vie terrestre. Al-Ṭabarī ajoute que la
      parole du berceau fit taire les calomniateurs complètement, prouvant
      qu'Allah défend Ses serviteurs vertueux par des moyens qui dépassent
      tout calcul humain. La leçon est que la vérité n'a pas besoin de
      défenseurs humains ; lorsqu'Allah veut innocenter l'innocent, Il
      fournit un témoin qu'aucun argument ne peut réfuter.
    reference: Surah Maryam 19:30-33, Surah Aal Imran 3:46
    source_notes: |
      Ibn Kathīr explains that this miracle was not merely to exonerate Maryam but to establish ʿĪsā's prophethood from the first moment of his earthly life. Al-Ṭabarī adds that the speech from the cradle silenced the slanderers completely, proving that Allah defends His righteous servants with means beyond human calculation.
    source_notes_fr: |
      Ibn Kathīr explique que ce miracle n'était pas seulement pour innocenter Maryam, mais pour établir la prophétie de ʿĪsā dès le premier moment de sa vie terrestre. Al-Ṭabarī ajoute que la parole du berceau fit taire les calomniateurs complètement, prouvant qu'Allah défend Ses serviteurs vertueux par des moyens qui dépassent tout calcul humain.
    source_notes_ar: |
      يُفَسِّرُ ابنُ كَثِيرٌ أَنَّ هَذِهِ المُعْجِزَةَ لَمْ تَكُنْ مُجَرَّدَ تَبْرِيءَةٍ لِمَرْيَمَ، بَلْ كَانَتْ تَأْسِيسًا لِنُبُوَّةِ عِيسَى مِنْ أَوَّلِ لَحْظَةٍ فِي حَيَاتِهِ الأَرْضِيَّةِ. وَيَزِيدُ الطَّبَرِيُّ أَنَّ الكَلاَمَ مِنَ المَهْدِ أَسْكَتَ المُفْتَرِينَ تَمَامًا، مُثْبِتًا أَنَّ اللهَ يُدَافِعُ عَنْ عِبَادِهِ الصَّالِحِينَ بِسُبُلٍ تَتَعَدَّى الحِسَابَ البَشَرِيَّ.
    display_day_of_year: 74
    quran_refs: "19:30-33, 3:46"
    source_url: https://quran.com/19

  - slug: quran-story-ashab-al-kahf
    category: quran_story
    title_en: The People of the Cave — Youth Who Chose Faith Over Fear
    title_ar: أَصْحَابُ الكَهْفِ — شَبَابٌ اِخْتَارُوا الإِيمَانَ عَلَى الخَوْفِ
    title_fr: Les Gens de la Caverne — des jeunes qui choisirent la foi plutôt que la peur
    description_en: |
      A group of believing youths fled their city to escape persecution by
      a tyrannical king who demanded they abandon their faith. They sought
      refuge in a cave, praying: "Our Lord, grant us from Yourself mercy
      and prepare for us from our affair right guidance." Allah caused them
      to sleep for three hundred and nine years — a sleep so deep that their
      dog stretched out its forelegs at the entrance. When they awoke, they
      believed they had slept but a day or part of a day, and sent one of
      their number to the city for food, only to discover that an entirely
      new generation had arisen that now honoured their legacy. Ibn Kathīr
      explains that the story is a proof of resurrection and a reassurance
      that Allah protects those who sacrifice for His sake. Al-Qurṭubī
      emphasises that their youth did not prevent them from choosing faith
      over the security of conformity. The lesson is that the courage to
      stand for truth in youth sets a precedent for generations to come, and
      that Allah's protection extends across centuries for those who trust Him.
    description_ar: |
      هَرَبَتْ فِئَةٌ مِنَ الشَّبَابِ المُؤْمِنِينَ مِنْ مَدِينَتِهِمْ لِيَنْجُوا مِنْ
      اضْطِهَادِ مَلِكٍ طَاغٍ كَانَ يَطْلُبُ مِنْهُمْ تَرْكَ إِيمَانِهِمْ. الْتَجَأُوا
      إِلَى كَهْفٍ، يَدْعُونَ: «رَبَّنَا آتِنَا مِنْ لَدُنْكَ رَحْمَةً وَهَيِّئْ لَنَا
      مِنْ أَمْرِنَا رَشَدًا». فَأَوْحَى اللهُ إِلَيْهِمْ أَنْ يَنَامُوا ثَلاَثَ مِائَةٍ
      وَتِسْعَ سِنِينَ — نَوْمٌ عَمِيقٌ حَتَّى أَنَّ كَلْبَهُمْ بَسَطَ ذِرَاعَيْهِ عَلَى
      الوَرِدِ. فَلَمَّا اسْتَيْقَظُوا، ظَنُّوا أَنَّهُمْ نَامُوا يَوْمًا أَوْ بَعْضَ
      يَوْمٍ، فَأَرْسَلُوا أَحَدَهُمْ إِلَى المَدِينَةِ لِيَطْلُبَ الطَّعَامَ، فَوَجَدُوا
      أَنَّ جِيلًا جَدِيدًا قَدْ نَشَأَ يُكَرِّمُ ذِكْرَهُمْ. يُفَسِّرُ ابنُ كَثِيرٍ
      أَنَّ القِصَّةَ بُرْهَانٌ عَلَى البَعْثِ وَطُمَأْنِينَةٌ عَلَى أَنَّ اللهَ
      يَحْمِي مَنْ ضَحَّى مِنْ أَجْلِهِ. وَيُؤَكِّدُ القُرْطُبِيُّ أَنَّ صِغَرَ سِنِّهِمْ
      لَمْ يَمْنَعْهُمْ مِنَ اخْتِيَارِ الإِيمَانِ عَلَى أَمَانِيَّةِ المُوَافَقَةِ.
      الدَّرْسُ أَنَّ شَجَاعَةَ الوُقُوفِ لِلْحَقِّ فِي الشَّبَابِ تَضَعُ سَابِقَةً
      لِلْأَجْيَالِ القَادِمَةِ، وَأَنَّ حِمَايَةَ اللهِ تَمْتَدُّ عَبْرَ القُرُونِ
      لِمَنْ يَتَوَكَّلُ عَلَيْهِ.
    description_fr: |
      Un groupe de jeunes croyants fuit leur ville pour échapper à la
      persécution d'un roi tyrannique qui exigeait qu'ils abandonnent leur
      foi. Ils cherchèrent refuge dans une caverne, priant : « Notre
      Seigneur, accorde-nous de Ta part miséricorde et prépare-nous dans
      notre affaire une droite guidance. » Allah les fit dormir trois cent
      neuf ans — un sommeil si profond que leur chien étendit ses pattes
      avant à l'entrée. Lorsqu'ils s'éveillèrent, ils crurent avoir dormi
      un jour ou une partie d'un jour, et envoyèrent l'un des leurs à la
      ville pour de la nourriture, découvrant qu'une génération entièrement
      nouvelle était née et honorait désormais leur héritage. Ibn Kathīr
      explique que l'histoire est une preuve de la résurrection et une
      assurance qu'Allah protège ceux qui sacrifient pour Lui. Al-Qurṭubī
      souligne que leur jeunesse ne les empêcha pas de choisir la foi plutôt
      que la sécurité de la conformité. La leçon est que le courage de se
      tenir pour la vérité dans la jeunesse établit un précédent pour les
      générations à venir, et que la protection d'Allah s'étend sur les
      siècles pour ceux qui Lui font confiance.
    reference: Surah al-Kahf 18:9-26
    source_notes: |
      Ibn Kathīr explains that the story is a proof of resurrection and a reassurance that Allah protects those who sacrifice for His sake. Al-Qurṭubī emphasises that their youth did not prevent them from choosing faith over the security of conformity, establishing that courage in youth sets a precedent for generations to come.
    source_notes_fr: |
      Ibn Kathīr explique que l'histoire est une preuve de la résurrection et une assurance qu'Allah protège ceux qui sacrifient pour Lui. Al-Qurṭubī souligne que leur jeunesse ne les empêcha pas de choisir la foi plutôt que la sécurité de la conformité, établissant que le courage dans la jeunesse crée un précédent pour les générations à venir.
    source_notes_ar: |
      يُفَسِّرُ ابنُ كَثِيرٌ أَنَّ القِصَّةَ بُرْهَانٌ عَلَى البَعْثِ وَطُمَأْنِينَةٌ عَلَى أَنَّ اللهَ يَحْمِي مَنْ ضَحَّى مِنْ أَجْلِهِ. وَيُؤَكِّدُ القُرْطُبِيُّ أَنَّ صِغَرَ سِنِّهِمْ لَمْ يَمْنَعْهُمْ مِنَ اخْتِيَارِ الإِيمَانِ عَلَى أَمَانِيَّةِ المُوَافَقَةِ، مُؤَسِّسًا أَنَّ الشَّجَاعَةَ فِي الشَّبَابِ تَضَعُ سَابِقَةً لِلْأَجْيَالِ القَادِمَةِ.
    display_day_of_year: 80
    quran_refs: "18:9-26"
    source_url: https://quran.com/18

  - slug: quran-story-ashab-al-kahf-and-the-dog
    category: quran_story
    title_en: The Dog of the People of the Cave — Even Animals in God's Protection
    title_ar: كَلْبُ أَصْحَابِ الكَهْفِ — حَتَّى الحَيَوَانَاتُ فِي حِمَايَةِ اللهِ
    title_fr: Le chien des Gens de la Caverne — même les animaux sous la protection d'Allah
    description_en: |
      When the believing youths fled to the cave, their dog accompanied them
      and stretched out its forelegs at the entrance — a detail the Qur'an
      preserves with remarkable specificity. The dog was not merely present;
      it was counted among their company in the sight of Allah. Ibn Kathīr
      notes that this detail teaches the believer that Allah's mercy and
      protection extend beyond the human realm to every creature that
      accompanies the righteous in their trials. Al-Qurṭubī adds that the
      dog's inclusion corrects the cultural assumption that dogs are inherently
      impure or excluded from divine concern; rather, context and association
      determine spiritual status. The Qur'an deliberately refuses to specify
      the exact number of the sleepers, directing attention instead to what
      matters: that Allah alone knows the unseen, and that even an animal in
      the company of the faithful is under His care. The lesson is that no
      living being is too insignificant for Allah's watchful protection when
      it is found in the service or companionship of the righteous.
    description_ar: |
      حِينَ لَجَأَ الشَّبَابُ المُؤْمِنُونَ إِلَى الكَهْفِ، رَافَقَهُمْ كَلْبُهُمْ
      وَبَسَطَ ذِرَاعَيْهِ عَلَى الوَرِدِ — تَفْصِيلٌ يَحْفَظُهُ القُرْآنُ بِدِقَّةٍ
      مُلْفِتَةٍ. لَمْ يَكُنِ الكَلْبُ مُجَرَّدَ حَاضِرٍ؛ بَلْ عُدَّ فِي صُحْبَتِهِمْ
      فِي عِلْمِ اللهِ. يُشِيرُ ابنُ كَثِيرٍ إِلَى أَنَّ هَذَا التَّفْصِيلَ يُعَلِّمُ
      المُؤْمِنَ أَنَّ رَحْمَةَ اللهِ وَحِمَايَتَهُ تَتَعَدَّى المَجَالَ البَشَرِيَّ
      إِلَى كُلِّ خَلْقٍ يُرَافِقُ الأَبْرَارَ فِي مِحَنِهِمْ. وَيُضِيفُ القُرْطُبِيُّ
      أَنَّ إِدْخَالَ الكَلْبِ يُصَحِّحُ الفَرْضِيَّةَ الثَّقَافِيَّةَ بِأَنَّ الكِلاَبَ
      نَجِسَةٌ بِذَاتِهَا أَوْ مَحْرُومَةٌ مِنَ العِنايَةِ الإِلَهِيَّةِ؛ بَلْ السِّيَاقُ
      وَالصُّحْبَةُ هُمَا الَّذِينَ يُحَدِّدَانِ المَنْزِلَةَ الرُّوحِيَّةَ. يَأْبَى
      القُرْآنُ بِقَصْدٍ أَنْ يُحَدِّدَ عَدَدَ النَّائِمِينَ، وَيُوَجِّهُ الانتِبَاهَ
      إِلَى مَا هُوَ أَهَمُّ: أَنَّ اللهَ وَحْدَهُ يَعْلَمُ الغَيْبَ، وَأَنَّ حَتَّى
      الحَيَوَانَ فِي صُحْبَةِ المُؤْمِنِينَ تَحْتَ رِعَايَتِهِ. الدَّرْسُ أَنَّهُ لاَ
      يَوجَدُ كَائِنٌ حَيٌّ صَغِيرٌ جِدًّا لِيَكُونَ تَحْتَ حِفْظِ اللهِ حِينَ يَكُونُ
      فِي خِدْمَةٍ أَوْ صُحْبَةِ الصَّالِحِينَ.
    description_fr: |
      Lorsque les jeunes croyants s'enfuirent vers la caverne, leur chien
      les accompagna et étendit ses pattes avant à l'entrée — un détail que
      le Coran conserve avec une remarquable précision. Le chien n'était pas
      simplement présent ; il était compté parmi leur compagnie aux yeux
      d'Allah. Ibn Kathīr note que ce détail enseigne au croyant que la
      miséricorde et la protection d'Allah s'étendent au-delà du domaine
      humain jusqu'à toute créature qui accompagne les justes dans leurs
      épreuves. Al-Qurṭubī ajoute que l'inclusion du chien corrige
      l'assumption culturelle selon laquelle les chiens seraient
      intrinsèquement impurs ou exclus de la sollicitude divine ; plutôt,
      c'est le contexte et l'association qui déterminent le statut spirituel.
      Le Coran refuse délibérément de spécifier le nombre exact des
      dormeurs, dirigeant l'attention vers ce qui importe : qu'Allah seul
      connaît l'invisible, et que même un animal en compagnie des fidèles
      est sous Son soin. La leçon est qu'aucun être vivant n'est trop
      insignifiant pour la protection attentive d'Allah lorsqu'il se trouve
      au service ou en compagnie des justes.
    reference: Surah al-Kahf 18:18, Surah al-Kahf 18:22
    source_notes: |
      Ibn Kathīr notes that the dog's inclusion teaches the believer that Allah's mercy and protection extend beyond the human realm to every creature that accompanies the righteous in their trials. Al-Qurṭubī adds that this detail corrects the cultural assumption that dogs are inherently impure or excluded from divine concern; rather, context and association determine spiritual status.
    source_notes_fr: |
