# Qur'anic stories — prophets and narratives from the Book of Allah.
# Each lesson is grounded in specific surah-and-verse ranges, with classical
# Sunni tafsir context and a clear "so what" for the Muslim reader.

lessons:
  - slug: quran-story-nuh-and-the-ark
    category: quran_story
    title_en: The Story of Nuh and the Ark — A Warning to the Arrogant
    title_ar: قِصَّةُ نُوحٍ وَالسَّفِينَةِ — تَحْذِيرٌ لِلْمُتَكَبِّرِينَ
    title_fr: L'histoire de Nūḥ et l'Arche — un avertissement aux arrogants
    description_en: |
      The Prophet Nuh ʿalayhi as-salām called his people to the worship of Allah alone for
      nine hundred and fifty years, yet only a handful responded. When Allah
      commanded him to build an Ark, the disbelievers mocked him openly,
      asking: "Why are you building a ship on dry land?" The flood came
      upon them from the earth and from the sky, and only those aboard the
      Ark survived — including Nuh, his family, and the pairs of animals
      that Allah had instructed him to carry. His own son refused to board,
      trusting instead in a mountain, and perished. Ibn Kathīr notes in his
      tafsir that the length of Nuh's mission demonstrates the extraordinary
      patience required of the prophets, while al-Ṭabarī records that the
      Ark's construction was itself a visible sign that the people chose to
      ridicule rather than reflect upon. The lesson is stark: arrogance
      hardens the heart against even the clearest warnings, and salvation
      belongs only to those who submit to Allah before it is too late.
    description_ar: |
      دَعَا النَّبِيُّ نُوحٌ عَلَيْهِ السَّلَامُ قَوْمَهُ إِلَى عِبَادَةِ اللهِ
      وَحْدَهُ تِسْعَمِائَةٍ وَخَمْسِينَ سَنَةً، فَلَمْ يُجِبْهُ إِلَّا قَلِيلٌ.
      وَلَمَّا أَمَرَهُ اللهُ بِبِنَاءِ السَّفِينَةِ، سَخِرَ مِنْهُ الكَافِرُونَ
      وَقَالُوا: «أَتَبْنِي سَفِينَةً فِي اليَابِسَةِ؟» ثُمَّ جَاءَ الطُّوفَانُ
      «مِنَ الأَرْضِ وَمِنَ السَّمَاءِ»، فَلَمْ يَنْجُ إِلَّا مَنْ كَانَ فِي
      السَّفِينَةِ مِنْ نُوحٍ وَأَهْلِهِ وَأَزْوَاجِ الحَيَوَانَاتِ الَّتِي
      أَمَرَهُ اللهُ بِحَمْلِهَا. وَأَبَى ابْنُ نُوحٍ أَنْ يَرْكَبَ مَعَهُ،
      فَآثَرَ الجَبَلَ فَهَلَكَ. يُشِيرُ ابنُ كَثِيرٍ فِي تَفْسِيرِهِ إِلَى
      أَنَّ طُولَ مُدَّةِ دَعْوَةِ نُوحٍ يُبَيِّنُ الصَّبْرَ العَجِيبَ الَّذِي
      تَحَلَّى بِهِ الأَنْبِيَاءُ، وَيَذْكُرُ الطَّبَرِيُّ أَنَّ بِنَاءَ
      السَّفِينَةِ كَانَ آيَةً بَيِّنَةً، لَكِنَّ القَوْمَ آثَرُوا السُّخْرِيَةَ
      عَلَى التَّأَمُّلِ. الدَّرْسُ وَاضِحٌ: إِنَّ الكِبْرَ يُقَسِّي القَلْبَ
      حَتَّى يَعْمَىَ عَنْ أَوْضَحِ النُّذُرِ، وَإِنَّ النَّجَاةَ لَا تَكُونُ
      إِلَّا لِمَنْ خَضَعَ لِلَّهِ قَبْلَ فَوَاتِ الأَوَانِ.
    description_fr: |
      Le Prophète Nūḥ ʿalayhi as-salām appela son peuple à l'adoration d'Allah seul pendant
      neuf cent cinquante ans, mais seuls quelques-uns lui répondirent.
      Lorsqu'Allah lui ordonna de construire l'Arche, les mécréants se
      moquèrent de lui : « Pourquoi bâtis-tu un navire sur la terre ferme ? »
      Le déluge vint « de la terre et du ciel », et seuls survécurent ceux
      qui se trouvaient dans l'Arche — Nūḥ, sa famille, et les couples
      d'animaux qu'Allah lui avait ordonné d'embarquer. Son propre fils
      refusa de monter, préférant se réfugier sur une montagne, et périt.
      Ibn Kathīr note dans son tafsir que la durée extraordinaire de la
      mission de Nūḥ montre la patience inouïe des prophètes, tandis qu'al-
      Ṭabarī rapporte que la construction de l'Arche était elle-même un signe
      visible que le peuple choisit de railler plutôt que de méditer. La
      leçon est limpide : l'arrogance endurcit le cœur face aux avertissements
      les plus clairs, et le salut n'est accordé qu'à ceux qui se soumettent
      à Allah avant qu'il ne soit trop tard.
    reference: Surah Nuh 71:1-28, Surah Hud 11:36-49, Surah al-Mu'minun 23:23-30
    source_notes: |
      Ibn Kathīr (Tafsīr, 71:1) notes that Nūḥ's nine-hundred-and-fifty-year mission demonstrates the extraordinary patience required of the prophets. Al-Ṭabarī records that the Ark's construction was itself a visible sign that the people chose to ridicule rather than reflect upon, illustrating how arrogance hardens the heart against even the clearest warnings.
    source_notes_fr: |
      Ibn Kathīr (Tafsīr, 71:1) note que la mission de Nūḥ, qui s'étendit sur neuf cent cinquante ans, illustre la patience extraordinaire exigée des prophètes. Al-Ṭabarī rapporte que la construction de l'Arche était elle-même un signe visible que le peuple choisit de railler plutôt que de méditer, illustrant comment l'arrogance endurcit le cœur face aux avertissements les plus clairs.
    source_notes_ar: |
      يُشِيرُ ابنُ كَثِيرٍ (تَفْسِيرُهُ، 71:1) إِلَى أَنَّ مُدَّةَ دَعْوَةِ نُوحٍ البَالِغَةَ تِسْعَمِائَةٍ وَخَمْسِينَ سَنَةً تُبَيِّنُ الصَّبْرَ العَجِيبَ الَّذِي تَحَلَّى بِهِ الأَنْبِيَاءُ. وَيَرْوِي الطَّبَرِيُّ أَنَّ بِنَاءَ السَّفِينَةِ كَانَ آيَةً بَيِّنَةً، لَكِنَّ القَوْمَ آثَرُوا السُّخْرِيَةَ عَلَى التَّأَمُّلِ، مُبَيِّنًا كَيْفَ يُقَسِّي الكِبْرُ القَلْبَ حَتَّى يَعْمَىَ عَنْ أَوْضَحِ النُّذُرِ.
    display_day_of_year: 1
    quran_refs: "71:1-28, 11:36-49, 23:23-30"
    source_url: https://quran.com/71

  - slug: quran-story-ibrahim-and-the-idols
    category: quran_story
    title_en: Ibrahim Smashes the Idols — The Birth of Tawhid
    title_ar: إِبْرَاهِيمُ يُحَطِّمُ الأَصْنَامَ — مِيلَادُ التَّوْحِيدِ
    title_fr: Ibrāhīm brise les idoles — la naissance du tawḥīd
    description_en: |
      Growing up in a land devoted to idolatry, the young Ibrahim ʿalayhi as-salām looked at
      the stars, the moon, and the sun in turn, reasoning that whatever sets
      cannot be divine. When his people left for a festival, he entered their
      temple and smashed every idol except the largest, hanging the axe upon
      its shoulders. When confronted, he told them to ask the remaining idol.
      Unable to answer their own contradiction, they tried to burn him alive;
      Allah commanded the fire to be "cool and safe upon Ibrahim." Al-
      Qurṭubī explains that Ibrahim's argument was not mere philosophy but a
      deliberate dismantling of the polytheist logic that attributed divinity
      to created things. Ibn Kathīr adds that the fire's coolness was a
      miracle proving that protection belongs to Allah alone. The lesson for
      the believer is that tawhid often requires standing alone against an
      entire society, and that Allah's protection is sufficient for whoever
      speaks the truth without fear.
    description_ar: |
      نَشَأَ إِبْرَاهِيمُ عَلَيْهِ السَّلَامُ فِي بِلَادٍ تَعْبُدُ الأَصْنَامَ،
      فَنَظَرَ إِلَى النُّجُومِ وَالقَمَرِ وَالشَّمْسِ وَاحِدًا بَعْدَ آخَرَ،
      وَاسْتَدَلَّ أَنَّ مَا يَغْرُبُ لاَ يَصْلُحُ أَنْ يَكُونَ إِلَهًا. وَلَمَّا
      خَرَجَ قَوْمُهُ إِلَى عِيدٍ، دَخَلَ هَيْكَلَهُمْ فَكَسَّرَ كُلَّ صَنَمٍ
      إِلَّا الكَبِيرَ، وَعَلَّقَ الفَأْسَ عَلَى كَتِفَيْهِ. وَلَمَّا سُئِلَ،
      قَالَ لَهُمْ: «سَلُوا هَذَا الكَبِيرَ». وَلَمَّا عَجَزُوا عَنْ مُوَاجَهَةِ
      تَنَاقُضِهِمْ، أَرَادُوا حَرْقَهُ، فَأَمَرَ اللهُ النَّارَ أَنْ تَكُونَ
      «بَرْدًا وَسَلَامًا عَلَى إِبْرَاهِيمَ». يُوضِّحُ القُرْطُبِيُّ أَنَّ
      حُجَّةَ إِبْرَاهِيمَ لَمْ تَكُنْ مُجَرَّدَ فَلْسَفَةٍ، بَلْ كَانَتْ
      هَدْمًا مُتَعَمَّدًا لِمَنْطِقِ المُشْرِكِينَ فِي نَسْبَةِ الأُلُوهِيَّةِ
      لِلْمَخْلُوقَاتِ. وَيَزِيدُ ابنُ كَثِيرٍ أَنَّ بُرُودَةَ النَّارِ كَانَتْ
      مُعْجِزَةً تُثْبِتُ أَنَّ الحِمَايَةَ لِلَّهِ وَحْدَهُ. الدَّرْسُ لِلْمُؤْمِنِ
      أَنَّ التَّوْحِيدَ يَتَطَلَّبُ أَحْيَانًا الوُقُوفَ وَحْدَهُ فِي وَجْهِ
      المُجْتَمَعِ كُلِّهِ، وَأَنَّ حِمَايَةَ اللهِ تَكْفِي مَنْ تَكَلَّمَ
      بِالحَقِّ بِلاَ خَوْفٍ.
    description_fr: |
      Ayant grandi dans un pays voué à l'idolâtrie, le jeune Ibrāhīm ʿalayhi as-salām
      observa successivement les étoiles, la lune et le soleil, en déduisant
      que ce qui se couche ne saurait être divin. Lorsque son peuple partit
      pour une fête, il pénétra dans leur temple et brisa toutes les idoles
      sauf la plus grande, suspendant la hache à ses épaules. Interrogé, il
      leur dit de demander à l'idole restante. Incapables de faire face à
      leur propre contradiction, ils tentèrent de le brûler vif ; Allah
      ordonna au feu d'être « frais et paisible sur Ibrāhīm ». Al-Qurṭubī
      explique que l'argument d'Ibrāhīm n'était pas une simple philosophie,
      mais une délibération méthodique de la logique polythéiste qui
      attribuait la divinité aux créatures. Ibn Kathīr ajoute que la
      fraîcheur du feu fut un miracle prouvant que la protection appartient
      à Allah seul. La leçon pour le croyant est que le tawḥīd exige parfois
      de se tenir seul face à toute une société, et que la protection
      d'Allah suffit à quiconque dit la vérité sans crainte.
    reference: Surah al-Anbiya 21:51-70, Surah al-Saffat 37:83-98
    source_notes: |
      Al-Qurṭubī explains that Ibrāhīm's argument was not mere philosophy but a deliberate dismantling of the polytheist logic that attributed divinity to created things. Ibn Kathīr adds that the fire's coolness was a miracle proving that protection belongs to Allah alone, and that it remained a sign for his people.
    source_notes_fr: |
      Al-Qurṭubī explique que l'argument d'Ibrāhīm n'était pas une simple philosophie, mais un démantèlement délibéré de la logique polythéiste qui attribuait la divinité aux créatures. Ibn Kathīr ajoute que la fraîcheur du feu fut un miracle prouvant que la protection appartient à Allah seul, et qu'elle demeura un signe pour son peuple.
    source_notes_ar: |
      يُوضِّحُ القُرْطُبِيُّ أَنَّ حُجَّةَ إِبْرَاهِيمَ لَمْ تَكُنْ مُجَرَّدَ فَلْسَفَةٍ، بَلْ كَانَتْ هَدْمًا مُتَعَمَّدًا لِمَنْطِقِ المُشْرِكِينَ فِي نَسْبَةِ الأُلُوهِيَّةِ لِلْمَخْلُوقَاتِ. وَيَزِيدُ ابنُ كَثِيرٌ أَنَّ بُرُودَةَ النَّارِ كَانَتْ مُعْجِزَةً تُثْبِتُ أَنَّ الحِمَايَةَ لِلَّهِ وَحْدَهُ، وَأَنَّهَا بَقِيَتْ آيَةً لِقَوْمِهِ.
    display_day_of_year: 2
    quran_refs: "21:51-70, 37:83-98"
    source_url: https://quran.com/21

  - slug: quran-story-lut-and-the-cities
    category: quran_story
    title_en: The Story of Lut and the Destroyed Cities
    title_ar: قِصَّةُ لُوطٍ وَالْمُدُنِ الْمُهْلَكَةِ
    title_fr: L'histoire de Lūṭ et les cités détruites
    description_en: |
      After receiving the angels who brought glad tidings to Ibrahim ʿalayhi as-salām, the
      same messengers were sent to warn the people of Lut ʿalayhi as-salām. The towns of the
      plain — Sodom and its surroundings — had descended into a depravity
      that no previous nation had openly practised. Lut ʿalayhi as-salām called them
      repeatedly to abandon their immorality and to honour the sacred bounds
      of Allah, but they threatened to expel him. The angels revealed to Lut
      that destruction was imminent; he and his believing family were
      evacuated by night, while his wife remained behind with the
      transgressors. At dawn, Allah overturned the cities and rained upon
      them stones of baked clay, each marked for its recipient. Ibn Kathīr
      and al-Ṭabarī both emphasise that the punishment was not arbitrary but
      a direct consequence of a sin that the people had institutionalised and
      refused to abandon despite repeated warnings. The lesson is that divine
      boundaries are non-negotiable, and that a believer must uphold moral
      clarity even when surrounded by collective depravity.
    description_ar: |
      بَعْدَ أَنْ بَشَّرُوا إِبْرَاهِيمَ عَلَيْهِ السَّلَامُ، أُرْسِلَ هَؤُلاَءِ
      المَلَائِكَةُ لِيُنْذِرُوا قَوْمَ لُوطٍ عَلَيْهِ السَّلَامُ. كَانَتْ مُدُنُ
      السَّوَاحِلِ — سَدُومَ وَمَا حَوْلَهَا — قَدْ سَقَطَتْ فِي فَجَاعَةٍ
      لَمْ يَتَصَرَّفْ بِهَا أُمَّةٌ قَبْلَهُمْ عَلَانِيَةً. دَعَاهُمْ لُوطٌ
      مِرَارًا إِلَى تَرْكِ فَوَاحِشِهِمْ وَاحْتِرَامِ حُدُودِ اللهِ، لَكِنَّهُمْ
      هَدَّدُوهُ بِالطَّرْدِ. فَأَخْبَرَتْهُ المَلَائِكَةُ أَنَّ الهَلَاكَ
      قَدْ حَانَ، فَأُخْرِجَ هُوَ وَأَهْلُهُ المُؤْمِنُونَ لَيْلًا، بَيْنَمَا
      بَقِيَتْ زَوْجَتُهُ مَعَ العَاصِينَ. فَلَمَّا أَصْبَحَ الصُّبْحُ، قَلَبَ
      اللهُ المُدُنَ وَأَمْطَرَ عَلَيْهَا حِجَارَةً مِنْ سِجِّيلٍ مُسَوَّمَةً
      عِنْدَ رَبِّكَ. يُؤَكِّدُ ابنُ كَثِيرٍ وَالطَّبَرِيُّ أَنَّ العِقَابَ
      لَمْ يَكُنْ عَشْوَائِيًّا، بَلْ كَانَ نَتِيجَةً مُبَاشِرَةً لِذَنْبٍ
      أَسَّسُوهُ فِي مُجْتَمَعِهِمْ وَأَبَوْا أَنْ يَتْرُكُوهُ رَغْمَ
      التَّحْذِيرَاتِ المُتَكَرِّرَةِ. الدَّرْسُ أَنَّ حُدُودَ اللهِ غَيْرُ
      قَابِلَةٍ لِلتَّفَاوُضِ، وَأَنَّ عَلَى المُؤْمِنِ أَنْ يَحْمِيَ
      الوَضْعِيَّةَ الأَخْلَاقِيَّةَ وَلَوْ كَانَ مُحَاطًا بِالفَجَاعَةِ
      المُجْتَمَعِيَّةِ.
    description_fr: |
      Après avoir annoncé la bonne nouvelle à Ibrāhīm ʿalayhi as-salām, les mêmes
      messagers furent envoyés pour avertir le peuple de Lūṭ ʿalayhi as-salām. Les cités
      de la plaine — Sodome et ses environs — étaient tombées dans une
      dépravation qu'aucune nation avant eux n'avait pratiquée ouvertement.
      Lūṭ ʿalayhi as-salām les appela à maintes reprises à abandonner leur immoralité et à
      respecter les limites sacrées d'Allah, mais ils le menacèrent
      d'expulsion. Les anges révélèrent à Lūṭ que la destruction était
      imminente ; lui et sa famille croyante furent évacués de nuit, tandis
      que son épouse demeura avec les transgresseurs. À l'aube, Allah
      renversa les cités et y fit pleuvoir des pierres d'argile, chacune
      marquée pour son destinataire. Ibn Kathīr et al-Ṭabarī insistent tous
      deux sur le fait que le châtiment n'était pas arbitraire, mais la
      conséquence directe d'un péché que le peuple avait institutionnalisé
      et refusait d'abandonner malgré les avertissements répétés. La leçon
      est que les limites divines ne sont pas négociables, et que le croyant
      doit maintenir sa clarté morale même lorsqu'il est entouré de
      dépravation collective.
    reference: Surah Hud 11:69-83, Surah al-Hijr 15:51-77
    source_notes: |
      Ibn Kathīr and al-Ṭabarī both emphasise that the punishment was not arbitrary but a direct consequence of a sin that the people had institutionalised and refused to abandon despite repeated warnings. Al-Qurṭubī notes that each stone of baked clay was marked for its recipient, demonstrating that divine justice is never indiscriminate.
    source_notes_fr: |
      Ibn Kathīr et al-Ṭabarī insistent tous deux sur le fait que le châtiment n'était pas arbitraire, mais la conséquence directe d'un péché que le peuple avait institutionnalisé et refusait d'abandonner malgré les avertissements répétés. Al-Qurṭubī note que chaque pierre d'argile cuite était marquée pour son destinataire, démontrant que la justice divine n'est jamais indiscriminée.
    source_notes_ar: |
      يُؤَكِّدُ ابنُ كَثِيرٍ وَالطَّبَرِيُّ أَنَّ العِقَابَ لَمْ يَكُنْ عَشْوَائِيًّا، بَلْ كَانَ نَتِيجَةً مُبَاشِرَةً لِذَنْبٍ أَسَّسُوهُ فِي مُجْتَمَعِهِمْ وَأَبَوْا أَنْ يَتْرُكُوهُ رَغْمَ التَّحْذِيرَاتِ المُتَكَرِّرَةِ. وَيُلَاحِظُ القُرْطُبِيُّ أَنَّ كُلَّ حَجَرٍ مِنْ سِجِّيلٍ كَانَ مُسَوَّمًا عِنْدَ رَبِّهِ، مُثْبِتًا أَنَّ العَدْلَ الإِلَهِيَّ لَا يَكُونُ عَمْوَمِيًّا أَبَدًا.
    display_day_of_year: 4
    quran_refs: "11:69-83, 15:51-77"
    source_url: https://quran.com/11

  - slug: quran-story-yusuf-in-the-well
    category: quran_story
    title_en: Yusuf Thrown into the Well — The Test of Brothers
    title_ar: يُوسُفُ فِي الجُبِّ — اِمْتِحَانُ الإِخْوَةِ
    title_fr: Yūsuf jeté dans le puits — l'épreuve des frères
    description_en: |
      The young Yusuf ʿalayhi as-salām saw in a dream eleven stars, the sun, and the moon
      prostrating before him — a vision of future honour that his father
      Ya'qub cautioned him not to reveal to his brothers. Consumed by envy,
      they conspired against him: first they asked their father to send him
      out with them, then they threw him into a dry well, and finally they
      sold him to a passing caravan for a few silver coins. They returned
      to Ya'qub stained with false blood, claiming a wolf had devoured their
      brother. Al-Saʿdī comments that the brothers' jealousy was a trial for
      the entire family, and that Allah often permits familial betrayal to
      prepare a prophet for a greater destiny. Ibn Kathīr notes that Ya'qub's
      patience — "fa sabrun jamil" — became the model for believers who lose
      what they love yet trust in Allah's hidden wisdom. The lesson is that
      envy destroys relationships from within, and that what appears to be
      ruin may in fact be the first step toward elevation by Allah's decree.
    description_ar: |
      رَأَى يُوسُفُ الصَّبِيُّ عَلَيْهِ السَّلَامُ فِي مَنَامِهِ أَحَدَ عَشَرَ
      كَوْكَبًا وَالشَّمْسَ وَالقَمَرَ سَاجِدِينَ لَهُ — رُؤْيَا شَرَفٍ مُسْتَقْبَلِيٍّ
      حَذَّرَهُ أَبُوهُ يَعْقُوبُ مِنْ إِفْشَائِهَا لِإِخْوَتِهِ. فَاسْتَعْلَتِ
      الغِيرَةُ فِي قُلُوبِهِمْ، فَتَآمَرُوا عَلَيْهِ: طَلَبُوا مِنْ أَبِيهِمْ
      أَنْ يُرْسِلَهُ مَعَهُمْ، ثُمَّ أَلْقَوْهُ فِي جُبٍّ يَابِسٍ، وَأَخِيرًا
      بَاعُوهُ لِقَافِلَةٍ مَارَّةٍ بِثَمَانِيَةِ دَرَاهِمَ. وَعَادُوا إِلَى
      يَعْقُوبَ وَقَدِ التَطَّخُوا بِدَمٍ كَذِبٍ، زَاعِمِينَ أَنَّ الذِّئْبَ
      قَدْ أَكَلَ أَخَاهُمْ. يُعَلِّقُ الصَّعْدِيُّ أَنَّ غِيرَةَ الإِخْوَةِ
      كَانَتِ امْتِحَانًا لِلْعَائِلَةِ كُلِّهَا، وَأَنَّ اللهَ يَأْذَنُ
      أَحْيَانًا بِخِيَانَةِ الأَقَارِبِ لِيُهَيِّئَ نَبِيًّا لِمَصِيرٍ أَعْظَمَ.
      وَيُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ صَبْرَ يَعْقُوبَ — «فَصَبْرٌ جَمِيلٌ» —
      صَارَ قُدْوَةً لِلْمُؤْمِنِينَ الَّذِينَ يَفْقِدُونَ مَا يُحِبُّونَ وَيَثِقُونَ
      بِحِكْمَةِ اللهِ الخَفِيَّةِ. الدَّرْسُ أَنَّ الحَسَدَ يُدَمِّرُ العَلَاقَاتِ
      مِنْ دَاخِلِهَا، وَأَنَّ مَا يَبْدُو خَرَابًا قَدْ يَكُونُ أَوَّلَ خُطْوَةٍ
      نَحْوَ الرَّفْعَةِ بِقَضَاءِ اللهِ.
    description_fr: |
      Le jeune Yūsuf ʿalayhi as-salām vit en rêve onze étoiles, le soleil et la lune se
      prosternant devant lui — une vision d'honneur futur que son père
      Yaʿqūb lui conseilla de ne point révéler à ses frères. Consumés par
      l'envie, ils conspirèrent contre lui : ils demandèrent à leur père de
      l'envoyer avec eux, puis le jetèrent dans un puits asséché, et
      finalement le vendirent à une caravane de passage pour quelques pièces
      d'argent. Ils revinrent vers Yaʿqūb souillés de faux sang, prétendant
      qu'un loup avait dévoré leur frère. Al-Saʿdī commente que la jalousie
      des frères fut une épreuve pour toute la famille, et qu'Allah permet
      parfois la trahison familiale pour préparer un prophète à un destin
      plus grand. Ibn Kathīr note que la patience de Yaʿqūb — « fa ṣabrīn
      jamīl » — devint le modèle des croyants qui perdent ce qu'ils aiment
      tout en faisant confiance à la sagesse cachée d'Allah. La leçon est
      que l'envie détruit les relations de l'intérieur, et que ce qui
      semble être une ruine peut en réalité être la première étape vers
      l'élévation par le décret d'Allah.
    reference: Surah Yusuf 12:4-20
    source_notes: |
      Al-Saʿdī comments that the brothers' jealousy was a trial for the entire family, and that Allah often permits familial betrayal to prepare a prophet for a greater destiny. Ibn Kathīr notes that Yaʿqūb's patience — *fa ṣabrun jamīl* — became the model for believers who lose what they love yet trust in Allah's hidden wisdom.
    source_notes_fr: |
      Al-Saʿdī commente que la jalousie des frères fut une épreuve pour toute la famille, et qu'Allah permet parfois la trahison familiale pour préparer un prophète à un destin plus grand. Ibn Kathīr note que la patience de Yaʿqūb — *fa ṣabrun jamīl* — devint le modèle des croyants qui perdent ce qu'ils aiment tout en faisant confiance à la sagesse cachée d'Allah.
    source_notes_ar: |
      يُعَلِّقُ الصَّعْدِيُّ أَنَّ غِيرَةَ الإِخْوَةِ كَانَتِ امْتِحَانًا لِلْعَائِلَةِ كُلِّهَا، وَأَنَّ اللهَ يَأْذَنُ أَحْيَانًا بِخِيَانَةِ الأَقَارِبِ لِيُهَيِّئَ نَبِيًّا لِمَصِيرٍ أَعْظَمَ. وَيُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ صَبْرَ يَعْقُوبَ — «فَصَبْرٌ جَمِيلٌ» — صَارَ قُدْوَةً لِلْمُؤْمِنِينَ الَّذِينَ يَفْقِدُونَ مَا يُحِبُّونَ وَيَثِقُونَ بِحِكْمَةِ اللهِ الخَفِيَّةِ.
    display_day_of_year: 5
    quran_refs: "12:4-20"
    source_url: https://quran.com/12

  - slug: quran-story-yusuf-in-egypt
    category: quran_story
    title_en: Yusuf in Egypt — From Prison to Power
    title_ar: يُوسُفُ فِي مِصْرَ — مِنَ السِّجْنِ إِلَى السُّلْطَةِ
    title_fr: Yūsuf en Égypte — de la prison au pouvoir
    description_en: |
      Sold into slavery in Egypt, the Prophet Yusuf ʿalayhi as-salām was purchased by a
      high-ranking official who recognised his noble character. When the
      official's wife attempted to seduce him and he refused, she accused
      him falsely; though evidence pointed to his innocence, he was cast
      into prison to protect the reputation of the elite. There he
      interpreted the dreams of two fellow prisoners, one of whom was later
      restored to the court of the king. When the king himself saw a
      troubling dream of seven fat cows devoured by seven lean ones, Yusuf
      was summoned and offered not only the interpretation but a
      comprehensive plan of resource management. The king appointed him
      treasurer over the storehouses of the land. Al-Qurṭubī highlights
      that Yusuf's innocence was preserved even in private temptation, and
      that his rise from prison to power demonstrates how Allah rewards
      steadfastness in hidden moments. The lesson is that integrity
      maintained when no human witness is present becomes the foundation for
      public honour granted by Allah.
    description_ar: |
      بُيعَ يُوسُفُ عَلَيْهِ السَّلَامُ عَبْدًا فِي مِصْرَ، فَاشْتَرَاهُ رَجُلٌ
      ذُو مَنْصِبٍ عَالٍ أَدْرَكَ فِيهِ شَرَفَ خُلُقِهِ. وَلَمَّا حَاوَلَتْ زَوْجَةُ
      صَاحِبِهِ اغْرَاءَهُ وَأَبَى، اتَّهَمَتْهُ بِالبَاطِلِ؛ وَرَغْمَ أَنَّ
      الدَّلِيلَ كَانَ يُشِيرُ إِلَى بَرَاءَتِهِ، أُلْقِيَ فِي السِّجْنِ
      لِحِفَاظَةِ سُمْعَةِ الطَّبَقَةِ الحَاكِمَةِ. وَهُنَاكَ فَسَّرَ رُؤْيَا
      سَجِينَيْنِ مَعَهُ، أَحَدُهُمَا أُعِيدَ إِلَى خِدْمَةِ المَلِكِ. فَلَمَّا
      رَأَى المَلِكُ رُؤْيَا مُزْعِجَةً لِسَبْعِ بَقَرَاتٍ سِمَانٍ أَكَلَتْهُنَّ
      سَبْعٌ عِجَافٌ، اسْتُدْعِيَ يُوسُفُ فَأَعْطَى لَيْسَ تَأْوِيلَهَا فَحَسْبُ،
      بَلْ خِطَّةً شَامِلَةً لِإِدَارَةِ المَوَارِدِ. فَوَلَّاهُ المَلِكُ
      خَزَائِنَ الأَرْضِ. يُبَيِّنُ القُرْطُبِيُّ أَنَّ عِفَّةَ يُوسُفَ حُفِظَتْ
      حَتَّى فِي التَّجْرُبَةِ الخَاصَّةِ، وَأَنَّ صُعُودَهُ مِنَ السِّجْنِ
      إِلَى السُّلْطَةِ يُظْهِرُ كَيْفَ يُكَافِئُ اللهُ الثَّبَاتَ فِي
      اللَّحَظَاتِ الخَفِيَّةِ. الدَّرْسُ أَنَّ الأَمَانَةَ الَّتِي تُحْفَظُ
      حِينَ لاَ يَكُونُ هُنَاكَ شَاهِدٌ بَشَرِيٌّ تَصِيرُ أَسَاسًا لِلشَّرَفِ
      العَلَنِيِّ الَّذِي يَمْنَحُهُ اللهُ.
    description_fr: |
      Vendu comme esclave en Égypte, le Prophète Yūsuf ʿalayhi as-salām fut acheté par un
      haut fonctionnaire qui reconnut en lui la noblesse de son caractère.
      Lorsque l'épouse de son maître tenta de le séduire et qu'il refusa,
      elle l'accusa faussement ; bien que les preuves indiquassent son
      innocence, il fut jeté en prison pour préserver la réputation de
      l'élite. Là-bas il interpréta les rêves de deux codétenus, dont l'un
      fut réintégré à la cour du roi. Lorsque le roi lui-même vit un rêve
      troublant de sept vaches grasses dévorées par sept maigres, Yūsuf fut
      convoqué et offrit non seulement l'interprétation mais un plan
      complet de gestion des ressources. Le roi le nomma trésorier des
      greniers du pays. Al-Qurṭubī souligne que l'innocence de Yūsuf fut
      préservée même dans la tentation privée, et que son ascension de la
      prison au pouvoir démontre comment Allah récompense la fermeté dans
      les moments cachés. La leçon est que l'intégrité maintenue lorsqu'aucun
      témoin humain n'est présente devient le fondement de l'honneur public
      accordé par Allah.
    reference: Surah Yusuf 12:21-57
    source_notes: |
      Al-Qurṭubī highlights that Yūsuf's innocence was preserved even in private temptation, and that his rise from prison to power demonstrates how Allah rewards steadfastness in hidden moments. Ibn Kathīr adds that Yūsuf's comprehensive plan of resource management established the prophetic model of leadership: attentive, measured, and grounded in trust in Allah.
    source_notes_fr: |
      Al-Qurṭubī souligne que l'innocence de Yūsuf fut préservée même dans la tentation privée, et que son ascension de la prison au pouvoir démontre comment Allah récompense la fermeté dans les moments cachés. Ibn Kathīr ajoute que le plan complet de gestion des ressources de Yūsuf établit le modèle prophétique de leadership : attentif, mesuré et ancré dans la confiance en Allah.
    source_notes_ar: |
      يُبَيِّنُ القُرْطُبِيُّ أَنَّ عِفَّةَ يُوسُفَ حُفِظَتْ حَتَّى فِي التَّجْرُبَةِ الخَاصَّةِ، وَأَنَّ صُعُودَهُ مِنَ السِّجْنِ إِلَى السُّلْطَةِ يُظْهِرُ كَيْفَ يُكَافِئُ اللهُ الثَّبَاتَ فِي اللَّحَظَاتِ الخَفِيَّةِ. وَيَزِيدُ ابنُ كَثِيرٌ أَنَّ خِطَّةَ يُوسُفَ الشَّامِلَةَ لِإِدَارَةِ المَوَارِدِ أَسَّسَتِ النَّمُوذَجَ النَّبَوِيَّ لِلقِيَادَةِ: يَقْظَانًا، مَعْتَدِلاً، وَمُتَجَذِّرًا فِي الثِّقَةِ بِاللهِ.
    display_day_of_year: 9
    quran_refs: "12:21-57"
    source_url: https://quran.com/12

  - slug: quran-story-yusuf-reunited
    category: quran_story
    title_en: Yusuf Reunited with His Family — Forgiveness Above Vengeance
    title_ar: يُوسُفُ يَلْتَقِي أَهْلَهُ — العَفْوُ فَوْقَ الانْتِقَامِ
    title_fr: Yūsuf retrouve sa famille — le pardon au-dessus de la vengeance
    description_en: |
      When famine struck Canaan, the brothers of Yusuf ʿalayhi as-salām came to Egypt seeking
      grain, not recognising the very brother they had betrayed. Yusuf
      tested their character by demanding they bring their youngest brother
      Benjamin, then concealed a royal cup in his baggage to detain him. The
      eldest brother offered to remain in his place, and the others returned
      to their father in shame. Eventually Yusuf revealed his identity with
      the words: "I am Yusuf, and this is my brother. Allah has certainly
      favoured us." He then asked: "Do you know what you did with Yusuf and
      his brother when you were ignorant?" They confessed their wrong, and he
      replied: "No blame upon you today; may Allah forgive you." Ibn al-
      Qayyim observes that Yusuf's forgiveness was not passive weakness but
      active mastery over the soul, turning what could have been vengeance
      into mercy. Ibn Kathīr adds that the entire narrative is structured as
      a proof that Allah brings good out of evil for those who trust Him.
      The lesson is that forgiveness breaks the cycle of retribution and
      restores what revenge can only destroy.
    description_ar: |
      لَمَّا أَصَابَ الكَنْعَانَ جُوعٌ، جَاءَ إِخْوَةُ يُوسُفَ عَلَيْهِ السَّلَامُ
      إِلَى مِصْرَ يَطْلُبُونَ الطَّعَامَ، فَلَمْ يَتَعَرَّفُوا عَلَى أَخِيهِمُ
      الَّذِي خَانُوهُ. اِمْتَحَنَ يُوسُفُ خُلُقَهُمْ بِطَلَبِ إِحْضَارِ
      أَخِيهِمُ الأَصْغَرِ بِنْيَامِينَ، ثُمَّ أَخْفَى صُوَّةً مَلَكِيَّةً فِي
      مَتَاعِهِ لِيُحْبِسَهُ. عَرَضَ أَكْبَرُهُمْ أَنْ يَبْقَى مَكَانَهُ،
      وَعَادَ الآخَرُونَ إِلَى أَبِيهِمْ خَجْلَانِينَ. فِي النِّهَايَةِ كَشَفَ
      يُوسُفُ عَنْ هَوِيَّتِهِ قَائِلاً: «أَنَا يُوسُفُ وَهَذَا أَخِي، قَدْ
      مَنَّ اللهُ عَلَيْنَا». ثُمَّ سَأَلَ: «هَلْ عَلِمْتُمْ مَا فَعَلْتُمْ
      بِيُوسُفَ وَأَخِيهِ إِذْ أَنْتُمْ جَاهِلُونَ؟» فَاعْتَرَفُوا بِظُلْمِهِمْ،
      فَأَجَابَ: «لاَ تَثْرِيبَ عَلَيْكُمُ اليَوْمَ، يَغْفِرُ اللهُ لَكُمْ».
      يَلْحَظُ ابنُ القَيِّمِ أَنَّ عَفْوَ يُوسُفَ لَمْ يَكُنْ ضَعْفًا سَّلْبِيًّا،
      بَلْ كَانَ سَيْطَرَةً فَاعِلَةً عَلَى النَّفْسِ، حَوَّلَ مَا كَانَ يُمْكِنُ
      أَنْ يَكُونَ انْتِقَامًا إِلَى رَحْمَةٍ. وَيَزِيدُ ابنُ كَثِيرٍ أَنَّ
      القِصَّةَ بِأَكْمَلِهَا مُبْنَاةٌ عَلَى أَنَّ اللهَ يُخْرِجُ الخَيْرَ مِنَ
      الشَّرِّ لِمَنْ يَتَوَكَّلُ عَلَيْهِ. الدَّرْسُ أَنَّ العَفْوَ يُحَطِّمُ
      دَائِرَةَ المُعَاقَبَةِ وَيُعِيدُ مَا لاَ يَسْتَطِيعُ الانْتِقَامُ إِصْلاَحَهُ.
    description_fr: |
      Lorsque la famine frappa Canaan, les frères de Yūsuf ʿalayhi as-salām vinrent en
      Égypte chercher du grain, sans reconnaître le frère même qu'ils
      avaient trahi. Yūsuf éprouva leur caractère en exigeant qu'ils
      amènent leur jeune frère Binyāmīn, puis dissimula une coupe royale
      dans ses bagages pour le retenir. Le frère aîné offrit de rester à sa
      place, et les autres retournèrent vers leur père dans la honte.
      Finalement Yūsuf révéla son identité en disant : « Je suis Yūsuf, et
      voici mon frère. Allah nous a certes accordé Ses faveurs. » Puis il
      demanda : « Savez-vous ce que vous avez fait à Yūsuf et à son frère
      lorsque vous étiez ignorants ? » Ils confessèrent leur tort, et il
      répondit : « Aucun reproche contre vous aujourd'hui ; qu'Allah vous
      pardonne. » Ibn al-Qayyim observe que le pardon de Yūsuf n'était pas
      une faiblesse passive, mais une maîtrise active de l'âme, transformant
      ce qui aurait pu être vengeance en miséricorde. Ibn Kathīr ajoute que
      tout le récit est structuré comme une preuve qu'Allah fait sortir le
      bien du mal pour ceux qui Lui font confiance. La leçon est que le
      pardon brise le cycle de la rétribution et restaure ce que la vengeance
      ne peut que détruire.
    reference: Surah Yusuf 12:58-101
    source_notes: |
      Ibn al-Qayyim observes that Yusuf's forgiveness was not passive weakness but active mastery over the soul, turning what could have been vengeance into mercy. Ibn Kathīr adds that the entire narrative is structured as a proof that Allah brings good out of evil for those who trust Him, making it one of the most theologically dense stories in the Qur'an.
    source_notes_fr: |
      Ibn al-Qayyim observe que le pardon de Yūsuf n'était pas une faiblesse passive, mais une maîtrise active de l'âme, transformant ce qui aurait pu être vengeance en miséricorde. Ibn Kathīr ajoute que tout le récit est structuré comme une preuve qu'Allah fait sortir le bien du mal pour ceux qui Lui font confiance, ce qui en fait l'un des récits les plus denses théologiquement dans le Coran.
    source_notes_ar: |
      يَلْحَظُ ابنُ القَيِّمِ أَنَّ عَفْوَ يُوسُفَ لَمْ يَكُنْ ضَعْفًا سَّلْبِيًّا، بَلْ كَانَ سَيْطَرَةً فَاعِلَةً عَلَى النَّفْسِ، حَوَّلَ مَا كَانَ يُمْكِنُ أَنْ يَكُونَ انْتِقَامًا إِلَى رَحْمَةٍ. وَيَزِيدُ ابنُ كَثِيرٌ أَنَّ القِصَّةَ بِأَكْمَلِهَا مُبْنَاةٌ عَلَى أَنَّ اللهَ يُخْرِجُ الخَيْرَ مِنَ الشَّرِّ لِمَنْ يَتَوَكَّلُ عَلَيْهِ، مِمَّا يَجْعَلُهَا مِنْ أَكْثَرِ القِصَصِ غِنًى بِالدَّلَالَةِ العَقَدِيَّةِ فِي القُرْآنِ.
    display_day_of_year: 14
    quran_refs: "12:58-101"
    source_url: https://quran.com/12

  - slug: quran-story-shuaib-and-the-merchants
    category: quran_story
    title_en: The Story of Shu'ayb and the Dishonest Merchants
    title_ar: قِصَّةُ شُعَيْبٍ وَالتُّجَّارِ الغَاشِّينَ
    title_fr: L'histoire de Shuʿayb et les marchands malhonnêtes
    description_en: |
      The Prophet Shu'ayb ʿalayhi as-salām was sent to the people of Madyan, a trading
      community that had corrupted the marketplace by systematically cheating
      in weights and measures. His message was direct and uncompromising:
      "Give full measure and weight with justice, and do not deprive people
      of their due, and do not spread corruption upon the earth after its
      reformation." He warned them that their economic crimes were not mere
      civil offences but acts of rebellion against Allah that would bring
      down divine punishment. The merchants mocked his lack of political
      power and threatened to stone him unless he abandoned his call. Allah
      destroyed them with a blast (al-sayha) and with the punishment of a
      shadowy day. Al-Qurṭubī devotes extensive commentary to this story,
      emphasising that commercial honesty is a pillar of social justice in
      Islam, and that tampering with scales is one of the most despised sins
      because it undermines the trust upon which communal life depends. The
      lesson is that economic justice is not separate from worship; cheating
      in trade is a form of corruption that invites the same divine wrath as
      open idolatry.
    description_ar: |
      أُرْسِلَ النَّبِيُّ شُعَيْبٌ عَلَيْهِ السَّلَامُ إِلَى قَوْمِ مَدْيَنَ،
      مُجْتَمَعٍ تِجَارِيٍّ أَفْسَدَ السُّوقَ بِالغِشِّ المُنَظَّمِ فِي المِكْيَالِ
      وَالمِيزَانِ. كَانَتْ رِسَالَتُهُ مُبَاشِرَةً وَغَيْرَ قَابِلَةٍ لِلتَّسَامُحِ:
      «أَوْفُوا الكَيْلَ وَالمِيزَانَ بِالقِسْطِ، وَلاَ تَبْخَسُوا النَّاسَ
      أَشْيَاءَهُمْ، وَلاَ تُفْسِدُوا فِي الأَرْضِ بَعْدَ إِصْلاَحِهَا». حَذَّرَهُمْ
      أَنَّ جَرَائِمَهُمُ الاقْتِصَادِيَّةَ لَيْسَتْ مُجَرَّدَ مَخَالَفَاتٍ مَدَنِيَّةٍ،
      بَلْ هِيَ أَعْمَالُ عِصْيَانٍ تَسْتَحِقُّ العِقَابَ الإِلَهِيَّ. سَخِرَ مِنْهُ
      التُّجَّارُ لِضَعْفِ نُفُوذِهِ السِّيَاسِيِّ، وَهَدَّدُوهُ بِالرَّجْمِ إِنْ لَمْ
      يَتْرُكْ دَعْوَتَهُ. فَأَهْلَكَهُمُ اللهُ بِالصَّيْحَةِ وَبِعَذَابِ يَوْمِ
      الظُّلَّةِ. يُفَصِّلُ القُرْطُبِيُّ فِي تَفْسِيرِهِ هَذِهِ القِصَّةَ، مُؤَكِّدًا
      أَنَّ الأَمَانَةَ التِّجَارِيَّةَ رُكْنٌ مِنْ أَرْكَانِ العَدْلِ الاجْتِمَاعِيِّ
      فِي الإِسْلاَمِ، وَأَنَّ التَّلاعُبَ بِالمَوَازِينِ مِنْ أَقْبَحِ الذُّنُوبِ
      لأَنَّهُ يُدَمِّرُ الثِّقَةَ الَّتِي يَقُومُ عَلَيْهَا الحَيَاةُ المُشْتَرَكَةُ.
      الدَّرْسُ أَنَّ العَدْلَ الاقْتِصَادِيَّ لَيْسَ مُنْفَصِلاً عَنِ العِبَادَةِ؛
      الغِشُّ فِي التِّجَارَةِ صُورَةٌ مِنَ الفَسَادِ تَسْتَحِقُّ سَخَطَ اللهِ كَمَا
      يَسْتَحِقُّهُ الشِّرْكُ الصَّرِيحُ.
    description_fr: |
      Le Prophète Shuʿayb ʿalayhi as-salām fut envoyé au peuple de Madyan, une communauté
      de marchands qui avait corrompu le marché en trichant systématiquement
      dans les poids et mesures. Son message était direct et sans compromis :
      « Donnez la juste mesure et le juste poids, ne privez pas les gens de
      ce qui leur revient, et ne semez pas la corruption sur terre après
      qu'elle eut été réformée. » Il les avertit que leurs crimes économiques
      n'étaient pas de simples infractions civiles, mais des actes de rébellion
      contre Allah qui attireraient le châtiment divin. Les marchands se
      moquèrent de son absence de pouvoir politique et le menacèrent de
      lapider s'il n'abandonnait pas son appel. Allah les détruisit par un
      souffle destructeur (al-ṣayḥa) et par le châtiment d'un jour
      d'obscurité. Al-Qurṭubī consacre un commentaire approfondi à cette
      histoire, soulignant que l'honnêteté commerciale est un pilier de la
      justice sociale en Islam, et que la falsification des balances est un
      des péchés les plus méprisés car elle saperait la confiance sur
      laquelle repose la vie commune. La leçon est que la justice économique
      n'est pas séparée de l'adoration ; la tromperie dans le commerce est
      une forme de corruption qui invite le même courroux divin que l'idolâtrie
      ouverte.
    reference: Surah Hud 11:84-95, Surah al-A'raf 7:85-93
    source_notes: |
      Al-Qurṭubī devotes extensive commentary to this story, emphasising that commercial honesty is a pillar of social justice in Islam, and that tampering with scales is one of the most despised sins because it undermines communal trust. Ibn Kathīr notes that Shuʿayb is called *khaṭīb al-anbiyāʾ* because the Qur'an preserves his orations more fully than those of many other prophets.
    source_notes_fr: |
      Al-Qurṭubī consacre un commentaire approfondi à cette histoire, soulignant que l'honnêteté commerciale est un pilier de la justice sociale en Islam, et que la falsification des balances est l'un des péchés les plus méprisés car elle saperait la confiance sur laquelle repose la vie commune. Ibn Kathīr note que Shuʿayb est appelé *khaṭīb al-anbiyāʾ* parce que le Coran a conservé ses harangues plus complètement que celles de bien d'autres prophètes.
    source_notes_ar: |
      يُفَصِّلُ القُرْطُبِيُّ فِي تَفْسِيرِهِ هَذِهِ القِصَّةَ، مُؤَكِّدًا أَنَّ الأَمَانَةَ التِّجَارِيَّةَ رُكْنٌ مِنْ أَرْكَانِ العَدْلِ الاجْتِمَاعِيِّ فِي الإِسْلاَمِ، وَأَنَّ التَّلاعُبَ بِالمَوَازِينِ مِنْ أَقْبَحِ الذُّنُوبِ لأَنَّهُ يُدَمِّرُ الثِّقَةَ الَّتِي يَقُومُ عَلَيْهَا الحَيَاةُ المُشْتَرَكَةُ. وَيُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ شُعَيْبًا يُلَقَّبُ بِخَطِيبِ الأَنْبِيَاءِ لِأَنَّ القُرْآنَ حَفِظَ خُطَبَهُ أَكْثَرَ تَفْصِيلًا مِنْ خُطَبِ كَثِيرٍ مِنَ الأَنْبِيَاءِ الآخَرِينَ.
    display_day_of_year: 20
    quran_refs: "11:84-95, 7:85-93"
    source_url: https://quran.com/11

  - slug: quran-story-musa-and-the-magicians
    category: quran_story
    title_en: Musa and the Magicians of Pharaoh — Truth Overwhelms Falsehood
    title_ar: مُوسَى وَسَحَرَةُ فِرْعَوْنَ — الحَقُّ يَغْلِبُ البَاطِلَ
    title_fr: Mūsā et les magiciens de Pharaon — la vérité submerge le faux
    description_en: |
      When Musa ʿalayhi as-salām returned to Egypt with the signs of Allah, Pharaoh
      summoned the most skilled magicians of the realm to discredit him
      before the assembled masses. The magicians threw their ropes and
      staffs, which appeared to move like serpents through sorcery, creating
      a spectacle of fear. Musa ʿalayhi as-salām cast down his staff, and it devoured their
      illusions — not by equal sorcery but by a genuine miracle from Allah.
      The magicians, recognising the distinction between trickery and divine
      power, fell down in prostration, declaring: "We believe in the Lord of
      the worlds, the Lord of Musa and Harun." Pharaoh threatened to crucify
      them, yet they refused to renounce their new faith. Ibn Kathīr
      highlights that their instantaneous conversion proves that sincere
      hearts can distinguish truth from falsehood no matter how impressive
      the latter appears. Al-Ṭabarī adds that the scene demonstrates the
      Qur'anic principle that falsehood is inevitably overwhelmed when it
      confronts the truth Allah supports. The lesson is that those who seek
      the truth sincerely will recognise it even when it comes from the most
      unexpected sources, while those who cling to power will deny it even
      when it is manifest.
    description_ar: |
      لَمَّا عَادَ مُوسَى عَلَيْهِ السَّلَامُ إِلَى مِصْرَ بِآيَاتِ اللهِ، اسْتَدْعَى
      فِرْعَوْنُ أَمْهَرَ سَحَرَةِ المَمْلَكَةِ لِيُفَنِّدُوهُ أَمَامَ الجُمُوعِ.
      أَلْقَى السَّحَرَةُ حِبَالَهُمْ وَعِصِيَّهُمْ، فَبَدَتْ كَأَنَّهَا تَسْعَى
      كَالحَيَّاتِ بِفِعْلِ السِّحْرِ، فَصَنَعُوا مَشْهَدَ رُعْبٍ. فَأَلْقَى مُوسَى
      عَصَاهُ، فَابْتَلَعَتْ أَكَاذِيبَهُمْ — لَيْسَ بِسِحْرٍ مُمَاثِلٍ، بَلْ بِمُعْجِزَةٍ
      حَقِيقِيَّةٍ مِنَ اللهِ. فَعَرَفَ السَّحَرَةُ الفَرْقَ بَيْنَ الخَدِيعَةِ
      وَالقُدْرَةِ الإِلَهِيَّةِ، فَخَرُّوا سُجَّدًا وَقَالُوا: «آمَنَّا بِرَبِّ
      العَالَمِينَ، رَبِّ مُوسَى وَهَارُونَ». هَدَّدَهُمْ فِرْعَوْنُ بِالصَّلْبِ،
      لَكِنَّهُمْ أَبَوْا أَنْ يَرْتَدُّوا عَنْ إِيمَانِهِمُ الجَدِيدِ. يُبَيِّنُ
      ابنُ كَثِيرٍ أَنَّ اِنْقِلَابَهُمُ الفَوْرِيَّ يُثْبِتُ أَنَّ القُلُوبَ
      المُخْلِصَةَ تَمْيِزُ الحَقَّ مِنَ البَاطِلِ وَلَوْ بَدَا الأَخِيرُ بَهِيًّا.
      وَيَزِيدُ الطَّبَرِيُّ أَنَّ المَشْهَدَ يُظْهِرُ المَبْدَأَ القُرْآنِيَّ الَّذِي
      يُفْرِضُ أَنَّ البَاطِلَ يُغْلَبُ حَتْمًا حِينَ يُوَاجِهُ الحَقَّ الَّذِي
      يَنْصُرُهُ اللهُ. الدَّرْسُ أَنَّ مَنْ طَلَبَ الحَقَّ بِإِخْلَاصٍ سَيَعْرِفُهُ
      وَلَوْ جَاءَ مِنْ أَغْرَبِ المَصَادِرِ، وَأَنَّ مَنْ تَمَسَّكَ بِالسُّلْطَةِ
      سَيُنْكِرُهُ حَتَّى حِينَ يَكُونُ بَيِّنًا.
    description_fr: |
      Lorsque Mūsā ʿalayhi as-salām retourna en Égypte avec les signes d'Allah, Pharaon
      convoqua les magiciens les plus habiles du royaume pour le discréditer
      devant les masses assemblées. Les magiciens jetèrent leurs cordes et
      leurs bâtons, qui semblèrent se mouvoir comme des serpents par la
      sorcellerie, créant un spectacle de terreur. Mūsā ʿalayhi as-salām jeta son bâton,
      et il dévora leurs illusions — non pas par une sorcellerie égale,
      mais par un véritable miracle d'Allah. Les magiciens, reconnaissant la
      distinction entre la tromperie et le pouvoir divin, se prosternèrent
      en déclarant : « Nous croyons au Seigneur des mondes, au Seigneur de
      Mūsā et de Hārūn. » Pharaon les menaça de crucifixion, mais ils
      refusèrent de renier leur nouvelle foi. Ibn Kathīr souligne que leur
      conversion instantanée prouve que les cœurs sincères peuvent distinguer
      le vrai du faux quelle que soit l'apparence impressionnante de ce
      dernier. Al-Ṭabarī ajoute que la scène démontre le principe coranique
      selon lequel le faux est inévitablement submergé lorsqu'il affronte la
      vérité qu'Allah soutient. La leçon est que ceux qui cherchent la
      vérité avec sincérité la reconnaîtront même lorsqu'elle vient des
      sources les plus inattendues, tandis que ceux qui s'accrochent au
      pouvoir la nieront même lorsqu'elle est manifeste.
    reference: Surah al-A'raf 7:103-126, Surah Ta-Ha 20:56-73
    source_notes: |
      Ibn Kathīr highlights that the magicians' instantaneous conversion proves that sincere hearts can distinguish truth from falsehood no matter how impressive the latter appears. Al-Ṭabarī adds that the scene demonstrates the Qur'anic principle that falsehood is inevitably overwhelmed when it confronts the truth Allah supports.
    source_notes_fr: |
      Ibn Kathīr souligne que la conversion instantanée des magiciens prouve que les cœurs sincères peuvent distinguer le vrai du faux quelle que soit l'apparence impressionnante de ce dernier. Al-Ṭabarī ajoute que la scène démontre le principe coranique selon lequel le faux est inévitablement submergé lorsqu'il affronte la vérité qu'Allah soutient.
    source_notes_ar: |
      يُبَيِّنُ ابنُ كَثِيرٌ أَنَّ اِنْقِلَابَهُمُ الفَوْرِيَّ يُثْبِتُ أَنَّ القُلُوبَ المُخْلِصَةَ تَمْيِزُ الحَقَّ مِنَ البَاطِلِ وَلَوْ بَدَا الأَخِيرُ بَهِيًّا. وَيَزِيدُ الطَّبَرِيُّ أَنَّ المَشْهَدَ يُظْهِرُ المَبْدَأَ القُرْآنِيَّ الَّذِي يُفْرِضُ أَنَّ البَاطِلَ يُغْلَبُ حَتْمًا حِينَ يُوَاجِهُ الحَقَّ الَّذِي يَنْصُرُهُ اللهُ.
    display_day_of_year: 23
    quran_refs: "7:103-126, 20:56-73"
    source_url: https://quran.com/7

  - slug: quran-story-musa-crossing-the-sea
    category: quran_story
    title_en: Musa Crosses the Sea — When the Impossible Becomes a Path
    title_ar: مُوسَى يَعْبُرُ البَحْرَ — حِينَ يَصِيرُ المُسْتَحِيلُ طَرِيقًا
    title_fr: Mūsā traverse la mer — quand l'impossible devient un chemin
    description_en: |
      After Pharaoh refused every sign and every warning, Musa ʿalayhi as-salām led the
      Children of Israel out of Egypt by night. When they reached the sea,
      Pharaoh's army pursued them with chariots and horses, and the people
      despaired. Musa ʿalayhi as-salām declared: "No — indeed with me is my Lord; He will
      guide me." Allah commanded him to strike the sea with his staff, and
      the waters parted into twelve paths, each as firm as a great mountain.
      The Israelites crossed safely; when Pharaoh attempted to follow, the
      waters closed over him and his army, drowning them all. Ibn Kathīr
      records that the sea's division was not a natural event but a
      suspension of physical law by the command of Allah, reminding
      believers that the laws of nature are servants, not masters. Al-
      Qurṭubī adds that Musa's refusal to panic teaches the believer to
      replace fear with trust when surrounded by apparent impossibilities.
      The lesson is that what blocks the path of the believer is merely a
      command away from becoming a path, and that tyrants who chase the
      righteous are swallowed by the very obstacles they believe will trap
      their victims.
    description_ar: |
      بَعْدَ أَنْ أَبَى فِرْعَوْنُ كُلَّ آيَةٍ وَكُلَّ تَحْذِيرٍ، خَرَجَ مُوسَى
      عَلَيْهِ السَّلَامُ بِبَنِي إِسْرَائِيلَ مِنْ مِصْرَ لَيْلًا. فَلَمَّا بَلَغُوا
      البَحْرَ، تَبِعَهُمْ جَيْشُ فِرْعَوْنَ بِمَرْكَبَاتِهِ وَخَيْلِهِ، فَيَئِسَ
      القَوْمُ. فَصَرَخَ مُوسَى: «كَلَّا إِنَّ مَعِيَ رَبِّي سَيَهْدِينِي».
      فَأَمَرَهُ اللهُ أَنْ يَضْرِبَ البَحْرَ بِعَصَاهُ، فَانْفَلَقَ إِلَى اثْنَتَيْ
      عَشْرَةَ طَرِيقًا كُلُّ طَرِيقٍ كَالطَّوْدِ العَظِيمِ. عَبَرَ بَنُو
      إِسْرَائِيلَ بِسَلاَمٍ؛ وَلَمَّا حَاوَلَ فِرْعَوْنُ التَّبِعَةَ، انْطَبَقَ
      المَاءُ عَلَيْهِ وَعَلَى جَيْشِهِ فَأَغْرَقَهُمْ جَمِيعًا. يَذْكُرُ ابنُ
      كَثِيرٍ أَنَّ انْشِقَاقَ البَحْرِ لَمْ يَكُنْ حَادِثَةً طَبِيعِيَّةً، بَلْ كَانَ
      تَعْطِيلاً لِقَانُونِ الطَّبِيعَةِ بِأَمْرِ اللهِ، مُذَكِّرًا المُؤْمِنِينَ
      بِأَنَّ قَوَانِينَ الكَوْنِ خُدَّامٌ لَيْسُوا سَادَةً. وَيُضِيفُ القُرْطُبِيُّ
      أَنَّ امْتِنَاعَ مُوسَى عَنِ اليَأْسِ يُعَلِّمُ المُؤْمِنَ أَنْ يُبْدِلَ
      الخَوْفَ بِالتَّوَكُّلِ حِينَ يَكُونُ مُحَاطًا بِمَا يَبْدُو مُسْتَحِيلاً.
      الدَّرْسُ أَنَّ مَا يَحْجُبُ طَرِيقَ المُؤْمِنِ إِنَّمَا يَفْصِلُهُ أَمْرٌ
      وَاحِدٌ عَنْ أَنْ يَصِيرَ طَرِيقًا، وَأَنَّ الطَّغَاةَ الَّذِينَ يَتْبَعُونَ
      الأَبْرَارَ يَبْتَلَعُهُمْ العَائِقُ نَفْسُهُ الَّذِي ظَنُّوهُ فَخًّا
      لِضَحَايَاهُمْ.
    description_fr: |
      Après que Pharaon eut rejeté chaque signe et chaque avertissement,
      Mūsā ʿalayhi as-salām conduisit les Enfants d'Israël hors d'Égypte de nuit. Lorsqu'ils
      atteignirent la mer, l'armée de Pharaon les poursuivit avec ses chars
      et ses chevaux, et le peuple désespéra. Mūsā ʿalayhi as-salām déclara : « Non —
      en vérité, mon Seigneur est avec moi ; Il me guidera. » Allah lui
      ordonna de frapper la mer de son bâton, et les eaux se divisèrent en
      douze chemins, chacun aussi solide qu'une grande montagne. Les
      Israélites traversèrent sains et saufs ; lorsque Pharaon tenta de
      suivre, les eaux se refermèrent sur lui et son armée, les noyant tous.
      Ibn Kathīr rapporte que la division de la mer n'était pas un événement
      naturel, mais une suspension des lois physiques par le commandement
      d'Allah, rappelant aux croyants que les lois de la nature sont des
      serviteurs, non des maîtres. Al-Qurṭubī ajoute que le refus de Mūsā
      de paniquer enseigne au croyant de remplacer la peur par la confiance
      lorsqu'il est entouré d'impossibilités apparentes. La leçon est que
      ce qui barre le chemin du croyant n'est qu'à un commandement de
      devenir un chemin, et que les tyrans qui poursuivent les justes sont
      engloutis par le même obstacle qu'ils croyaient piéger leurs victimes.
    reference: Surah al-Shu'ara 26:52-68, Surah al-Dukhan 44:17-33
    source_notes: |
      Ibn Kathīr records that the sea's division was not a natural event but a suspension of physical law by the command of Allah, reminding believers that the laws of nature are servants, not masters. Al-Qurṭubī adds that Mūsā's refusal to panic teaches the believer to replace fear with trust when surrounded by apparent impossibilities.
    source_notes_fr: |
      Ibn Kathīr rapporte que la division de la mer n'était pas un événement naturel, mais une suspension des lois physiques par le commandement d'Allah, rappelant aux croyants que les lois de la nature sont des serviteurs, non des maîtres. Al-Qurṭubī ajoute que le refus de Mūsā de paniquer enseigne au croyant de remplacer la peur par la confiance lorsqu'il est entouré d'impossibilités apparentes.
    source_notes_ar: |
      يَذْكُرُ ابنُ كَثِيرٌ أَنَّ انْشِقَاقَ البَحْرِ لَمْ يَكُنْ حَادِثَةً طَبِيعِيَّةً، بَلْ كَانَ تَعْطِيلاً لِقَانُونِ الطَّبِيعَةِ بِأَمْرِ اللهِ، مُذَكِّرًا المُؤْمِنِينَ بِأَنَّ قَوَانِينَ الكَوْنِ خُدَّامٌ لَيْسُوا سَادَةً. وَيُضِيفُ القُرْطُبِيُّ أَنَّ امْتِنَاعَ مُوسَى عَنِ اليَأْسِ يُعَلِّمُ المُؤْمِنَ أَنْ يُبْدِلَ الخَوْفَ بِالتَّوَكُّلِ حِينَ يَكُونُ مُحَاطًا بِمَا يَبْدُو مُسْتَحِيلاً.
    display_day_of_year: 24
    quran_refs: "26:52-68, 44:17-33"
