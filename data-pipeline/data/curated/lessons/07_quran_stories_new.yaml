  - slug: quran-story-dawud-and-jalut
    category: quran_story
    title_en: Dawud and Jalut — The Victory of Faith Over Strength
    title_ar: دَاوُدُ وَجَالُوتُ — نَصْرُ الإِيمَانِ عَلَى القُوَّةِ
    title_fr: Dāwūd et Jālūt — la victoire de la foi sur la force
    description_en: |
      When the Israelites demanded a king to lead them into battle, Allah
      appointed Talut (Saul), but most of his army deserted after a test at
      a river. A small remnant marched onward, among them the young Dawud ʿalayhi as-salām. They faced Jalut (Goliath), a warrior of terrifying size and
      armament, whose very presence had routed entire armies. The Qur'an
      records Dawud's refusal to wear heavy armour, his trust in Allah, and
      his single stone from a sling that struck Jalut down. Allah then gave
      Dawud "sovereignty and wisdom and taught him of what He willed." Ibn
      Kathīr notes that Dawud's victory was not merely military but
      theological: it proved that the outcome of battle belongs to Allah,
      not to numbers or equipment. Al-Saʿdī comments that the youth of
      Dawud teaches Muslims that Allah chooses whom He wills without regard
      for age or social standing. The lesson is that physical strength and
      material preparation are secondary to sincere reliance on Allah, and
      that one sincere heart can overcome what frightens multitudes.
    description_ar: |
      لَمَّا طَلَبَ بَنُو إِسْرَائِيلَ مَلِكًا يَقُودُهُمْ إِلَى القِتَالِ، وَلَّاهُمُ
      اللهُ طَالُوتَ، لَكِنَّ أَكْثَرَ جَيْشِهِ تَفَرَّقَ بَعْدَ اِمْتِحَانٍ فِي
      نَهْرٍ. فَسَارَ فِلْقٌ قَلِيلٌ، وَمِنْهُمُ الفَتَى دَاوُدُ عَلَيْهِ السَّلَامُ.
      وَاجَهُوا جَالُوتَ، مُحَارِبًا ذَا حَجْمٍ وَتَسْلِيحٍ يُرْعِبَانِ، كَانَا
      يَفُزِّعَانِ الجُيُوشَ بِمُجَرَّدِ وُجُودِهِ. يَسِيرُ القُرْآنُ فِي ذِكْرِ
      امْتِنَاعِ دَاوُدَ عَنْ لُبْسِ الدِّرْعِ الثَّقِيلَةِ، وَثِقَتِهِ بِاللهِ،
      وَحَجَرَةٍ وَاحِدَةٍ مِنْ مِقْلَاعِهِ أَطَاحَتْ بِجَالُوتَ. ثُمَّ أَعْطَاهُ
      اللهُ «المُلْكَ وَالحِكْمَةَ وَعَلَّمَهُ مِمَّا يَشَاءُ». يُشِيرُ ابنُ كَثِيرٍ
      إِلَى أَنَّ نَصْرَ دَاوُدَ لَمْ يَكُنْ عَسْكَرِيًّا فَحَسْبُ، بَلْ كَانَ
      عِقَادِيًّا: أَثْبَتَ أَنَّ نَتِيجَةَ المَعْرَكَةِ لِلَّهِ لاَ لِلْعَدَدِ
      وَلاَ لِلْعُدَّةِ. وَيُعَلِّقُ الصَّعْدِيُّ أَنَّ صِغَرَ سِنِّ دَاوُدَ يُعَلِّمُ
      المُسْلِمِينَ أَنَّ اللهَ يَخْتَارُ مَنْ يَشَاءُ بِغَيْرِ اعْتِبَارٍ لِلسِّنِّ
      أَوِ المَنْصِبِ الاجْتِمَاعِيِّ. الدَّرْسُ أَنَّ القُوَّةَ الجَسَدِيَّةَ
      وَالتَّأْهِيلَ المَادِّيَّ ثَانَوِيَّانِ أَمَامَ التَّوَكُّلِ الصَّادِقِ عَلَى
      اللهِ، وَأَنَّ قَلْبًا وَاحِدًا مُخْلِصًا يَسْتَطِيعُ أَنْ يَتَغَلَّبَ عَلَى
      مَا يُرْوِّعُ الجُمُوعَ.
    description_fr: |
      Lorsque les Enfants d'Israël réclamèrent un roi pour les conduire au
      combat, Allah désigna Ṭālūt (Saül), mais la majeure partie de son
      armée se dispersa après une épreuve à une rivière. Un petit reste
      poursuivit la marche, parmi eux le jeune Dāwūd ʿalayhi as-salām. Ils firent face à
      Jālūt (Goliath), un guerrier d'une taille et d'un armement terrifiants,
      dont la seule présence avait mis en déroute des armées entières. Le
      Coran rapporte le refus de Dāwūd de porter une lourde armure, sa
      confiance en Allah, et la pierre unique de sa fronde qui abattit
      Jālūt. Allah donna ensuite à Dāwūd « la souveraineté et la sagesse,
      et lui enseigna de ce qu'Il voulut ». Ibn Kathīr note que la victoire
      de Dāwūd n'était pas seulement militaire mais théologique : elle
      prouva que l'issue du combat appartient à Allah, non aux nombres ni
      à l'équipement. Al-Saʿdī commente que la jeunesse de Dāwūd enseigne
      aux musulmans qu'Allah choisit qui Il veut sans égard pour l'âge ou
      le statut social. La leçon est que la force physique et la préparation
      matérielle sont secondaires face à une confiance sincère en Allah, et
      qu'un seul cœur sincère peut surmonter ce qui effraie les multitudes.
    reference: Surah al-Baqara 2:249-251
    source_notes: |
      Al-Ṭabarī preserves the early reports that Dāwūd's victory was not merely physical but symbolic: the shepherd's sling overcoming the warrior's armour demonstrated that Allah's support, not material superiority, decides conflicts. Ibn Kathīr notes that Dāwūd's youth teaches Muslims that Allah chooses whom He wills without regard for age or social standing.
    source_notes_fr: |
      Al-Ṭabarī conserve les rapports anciens selon lesquels la victoire de Dāwūd n'était pas seulement physique mais symbolique : la fronde du berger surpassant l'armure du guerrier démontrait que c'est le soutien d'Allah, non la supériorité matérielle, qui décide des conflits. Ibn Kathīr note que la jeunesse de Dāwūd enseigne aux musulmans qu'Allah choisit qui Il veut sans égard pour l'âge ou le statut social.
    source_notes_ar: |
      يَحْفِظُ الطَّبَرِيُّ رِوَايَاتِ السَّلَفِ الَّتِي تُفِيدُ بِأَنَّ نَصْرَ دَاوُدَ لَمْ يَكُنْ جَسَدِيًّا فَحَسْبُ، بَلْ كَانَ رَمْزِيًّا: مِقْلَاعُ الرَّاعِي يَتَغَلَّبُ عَلَى دِرْعِ المُحَارِبِ مُثْبِتًا أَنَّ نَصْرَ اللهِ لاَ التَّفَوُّقَ المَادِيَّ هُوَ مَنْ يَحْسِمُ الصِّرَاعَاتِ. وَيُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ صِغَرَ سِنِّ دَاوُدَ يُعَلِّمُ المُسْلِمِينَ أَنَّ اللهَ يَخْتَارُ مَنْ يَشَاءُ بِغَيْرِ اعْتِبَارٍ لِلسِّنِّ أَوِ المَنْصِبِ الاجْتِمَاعِيِّ.
    display_day_of_year: 34
    quran_refs: "2:249-251"
    source_url: https://quran.com/2

  - slug: quran-story-dawud-and-the-sheep
    category: quran_story
    title_en: Dawud Judging Between Shepherds — Justice and Humility
    title_ar: دَاوُدُ يَحْكُمُ بَيْنَ الرُّعَاةِ — العَدْلُ وَالتَّوَاضُعُ
    title_fr: Dāwūd juge entre les bergers — la justice et l'humilité
    description_en: |
      Two disputants came to the court of Prophet Dawud ʿalayhi as-salām: one had ninety-nine
      ewes, the other had only one. The powerful claimant demanded that the
      single sheep be added to his flock. Dawud ʿalayhi as-salām began to rule in favour of
      the stronger party, but the narrative reveals that this was a test
      arranged by Allah. Dawud ʿalayhi as-salām recognised his error, fell down in
      prostration, and turned to Allah in repentance. The Qur'an describes
      him as "a repentant one," and Allah forgave him. Ibn Kathīr explains
      that the story demonstrates that even a prophet-king must guard against
      the subtle bias that favours the powerful, and that true justice
      requires continuous self-examination. Al-Qurṭubī adds that Dawud's
      immediate repentance is the model for every holder of authority: when
      error is recognised, correction must follow without delay or pride.
      The lesson is that justice is not a destination but a discipline, and
      that the moment one recognises a mistake is the moment to turn back to
      Allah — no matter how high one's station.
    description_ar: |
      جَاءَ خَصْمَانِ إِلَى قَصْرِ النَّبِيِّ دَاوُدَ عَلَيْهِ السَّلَامُ: أَحَدُهُمَا
      كَانَ لَهُ تِسْعٌ وَتِسْعُونَ نَعْجَةً، وَالآخَرُ كَانَ لَهُ نَعْجَةٌ
      وَاحِدَةٌ. طَالَبَ صَاحِبُ القُوَّةِ أَنْ تُضَافَ النَّعْجَةُ الوَحِيدَةُ إِلَى
      قَطِيعِهِ. بَدَأَ دَاوُدُ عَلَيْهِ السَّلَامُ فِي الحُكْمِ لِصَالِحِ الطَّرَفِ
      الأَقْوَى، لَكِنَّ القِصَّةَ تُفَصِّحُ أَنَّ هَذَا كَانَ امْتِحَانًا مِنَ
      اللهِ. أَدْرَكَ دَاوُدُ زَلَّتَهُ فَخَرَّ سَاجِدًا وَتَابَ إِلَى اللهِ.
      وَصَفَهُ القُرْآنُ بِأَنَّهُ «أَوَّابٌ»، فَغَفَرَ اللهُ لَهُ. يُفَسِّرُ ابنُ
      كَثِيرٌ أَنَّ القِصَّةَ تُبَيِّنُ أَنَّ مَلِكَ النَّبِيِّ — وَلَوْ كَانَ
      نَبِيًّا — يَجِبُ أَنْ يَحْتَرِسَ مِنَ الانْحِيَازِ الخَفِيِّ لِصَالِحِ
      الأَقْوِيَاءِ، وَأَنَّ العَدْلَ الحَقِيقِيَّ يَتَطَلَّبُ مُرَاجَعَةً ذَاتِيَّةً
      مُسْتَمِرَّةً. وَيُضِيفُ القُرْطُبِيُّ أَنَّ تَوْبَةَ دَاوُدَ الفَوْرِيَّةَ
      هِيَ القُدْوَةُ لِكُلِّ ذِي سُلْطَانٍ: حِينَ يُدْرِكُ الخَطَأَ، يَجِبُ أَنْ
      يَتْبَعَهُ الإِصْلاَحُ بِلاَ تَأْخِيرٍ وَلاَ كِبْرٍ. الدَّرْسُ أَنَّ العَدْلَ
      لَيْسَ وَصْفَةً نِهَائِيَّةً بَلْ هُوَ مِضْمَارٌ، وَأَنَّ لَحْظَةَ إِدْرَاكِ
      الخَطَأِ هِيَ لَحْظَةُ الرُّجُوعِ إِلَى اللهِ — وَلَوْ كَانَ المَقَامُ
      عَالِيًا.
    description_fr: |
      Deux plaideurs vinrent à la cour du Prophète Dāwūd ʿalayhi as-salām : l'un possédait
      quatre-vingt-dix-neuf brebis, l'autre n'en avait qu'une. Le plaignant
      puissant exigea que la brebis unique fût ajoutée à son troupeau. Dāwūd ʿalayhi as-salām commença à statuer en faveur de la partie la plus forte, mais le
      récit révèle que c'était une épreuve arrangée par Allah. Dāwūd ʿalayhi as-salām
      reconnut son erreur, se prosterna et se tourna vers Allah en
      repentance. Le Coran le décrit comme « un repentant », et Allah lui
      pardonna. Ibn Kathīr explique que l'histoire démontre que même un roi-
      prophète doit se garder du subtil biais qui favorise les puissants, et
      que la vraie justice exige un examen de soi continu. Al-Qurṭubī ajoute
      que la repentance immédiate de Dāwūd est le modèle pour tout détenteur
      d'autorité : lorsqu'une erreur est reconnue, la correction doit suivre
      sans délai ni orgueil. La leçon est que la justice n'est pas une
      destination mais une discipline, et que le moment où l'on reconnaît
      une faute est le moment de revenir à Allah — quelle que soit sa
      position élevée.
    reference: Surah al-Anbiya 21:78-82, Surah Sad 38:17-26
    source_notes: |
      Ibn Kathīr explains that the story demonstrates that even a prophet-king must guard against the subtle bias that favours the powerful, and that true justice requires continuous self-examination. Al-Qurṭubī adds that Dāwūd's immediate repentance is the model for every holder of authority: when error is recognised, correction must follow without delay or pride.
    source_notes_fr: |
      Ibn Kathīr explique que l'histoire démontre que même un roi-prophète doit se garder du subtil biais qui favorise les puissants, et que la vraie justice exige un examen de soi continu. Al-Qurṭubī ajoute que la repentance immédiate de Dāwūd est le modèle pour tout détenteur d'autorité : lorsqu'une erreur est reconnue, la correction doit suivre sans délai ni orgueil.
    source_notes_ar: |
      يُفَسِّرُ ابنُ كَثِيرٌ أَنَّ القِصَّةَ تُبَيِّنُ أَنَّ مَلِكَ النَّبِيِّ — وَلَوْ كَانَ نَبِيًّا — يَجِبُ أَنْ يَحْتَرِسَ مِنَ الانْحِيَازِ الخَفِيِّ لِصَالِحِ الأَقْوِيَاءِ، وَأَنَّ العَدْلَ الحَقِيقِيَّ يَتَطَلَّبُ مُرَاجَعَةً ذَاتِيَّةً مُسْتَمِرَّةً. وَيَزِيدُ القُرْطُبِيُّ أَنَّ تَوْبَةَ دَاوُدَ الفَوْرِيَّةَ هِيَ القُدْوَةُ لِكُلِّ ذِي سُلْطَانٍ: حِينَ يُدْرِكُ الخَطَأَ، يَجِبُ أَنْ يَتْبَعَهُ الإِصْلاَحُ بِلَا تَأْخِيرٍ وَلَا كِبْرٍ.
    display_day_of_year: 35
    quran_refs: "21:78-82, 38:17-26"
    source_url: https://quran.com/21

  - slug: quran-story-sulayman-and-the-hoopoe
    category: quran_story
    title_en: Sulayman and the Hoopoe — Knowledge from Unexpected Sources
    title_ar: سُلَيْمَانُ وَالهُدْهُدُ — عِلْمٌ مِنْ مَصَادِرَ غَيْرِ مُتَوَقَّعَةٍ
    title_fr: Sulaymān et la huppe — le savoir de sources inattendues
    description_en: |
      Allah granted Prophet Sulayman ʿalayhi as-salām a kingdom unparalleled in history,
      including dominion over the jinn, the wind, and the speech of birds.
      One day, while inspecting his forces, he noticed the absence of the
      hoopoe and threatened punishment if the bird did not present a valid
      excuse. The hoopoe returned with astonishing news: it had discovered a
      queen in the distant land of Saba' whose people worshipped the sun
      instead of Allah. Sulayman ʿalayhi as-salām did not dismiss the report because of its
      humble source; instead, he sent a letter calling her to submit to
      Allah alone. Al-Qurṭubī remarks that the hoopoe's role proves Allah
      can place crucial knowledge in the mouth of the smallest creature, and
      that the wise ruler listens before he judges. Ibn Kathīr adds that
      Sulayman's response — verification followed by diplomatic action —
      establishes the prophetic model of leadership: attentive, measured,
      and grounded in tawhid. The lesson is that no creature is too small to
      carry knowledge from Allah, and that the believer who cultivates
      attentiveness will find guidance in places others overlook.
    description_ar: |
      أَعْطَى اللهُ النَّبِيَّ سُلَيْمَانَ عَلَيْهِ السَّلَامُ مُلْكًا لَمْ يُنَافَسْ
      فِي التَّارِيخِ، شَامِلاً السَّيْطَرَةَ عَلَى الجِنِّ وَالرِّيَاحِ وَلُغَةِ
      الطَّيْرِ. فِي يَوْمٍ مِنَ الأَيَّامِ، بَيْنَمَا يَفْتِشُ جُيُوشَهُ، لَحِظَ
      غِيَابَ الهُدْهُدِ وَهَدَّدَهُ بِالعِقَابِ إِنْ لَمْ يَحْضُرْ بِعُذْرٍ مَقْبُولٍ.
      عَادَ الهُدْهُدُ بِخَبَرٍ مُدْهِشٍ: اكْتَشَفَ مَلِكَةً فِي أَرْضِ سَبَإٍ
      البَعِيدَةِ يَعْبُدُ شَعْبُهَا الشَّمْسَ عِوَضًا عَنِ اللهِ. لَمْ يَهْمِلْ
      سُلَيْمَانُ التَّقْرِيرَ لأَنَّ مَصْدَرَهُ مُتَوَاضِعٌ؛ بَلْ أَرْسَلَ إِلَيْهَا
      كِتَابًا يَدْعُوهَا إِلَى الانْخِيَاطِ لِلَّهِ وَحْدَهُ. يُعَلِّقُ القُرْطُبِيُّ
      أَنَّ دَوْرَ الهُدْهُدِ يُثْبِتُ أَنَّ اللهَ يَسْتَطِيعُ أَنْ يَضَعَ العِلْمَ
      الأَهَمَّ فِي فَمِ أَصْغَرِ خَلْقِهِ، وَأَنَّ الحَاكِمَ الحَكِيمَ يَسْمَعُ قَبْلَ
      أَنْ يَحْكُمَ. وَيَزِيدُ ابنُ كَثِيرٍ أَنَّ رَدَّ فِعْلِ سُلَيْمَانَ —
      التَّحَقُّقُ ثُمَّ العَمَلُ الدِّبْلُومَاسِيُّ — يُؤَسِّسُ النَّمُوذَجَ النَّبَوِيَّ
      لِلقِيَادَةِ: يَقْظَانًا، مَعْتَدِلاً، وَمُتَجَذِّرًا فِي التَّوْحِيدِ.
      الدَّرْسُ أَنَّهُ لاَ يَوجَدُ كَائِنٌ صَغِيرٌ جِدًّا لِيَحْمِلَ عِلْمًا مِنَ
      اللهِ، وَأَنَّ المُؤْمِنَ الَّذِي يُرَبِّي يَقْظَتَهُ سَيَجِدُ الهِدَايَةَ فِي
      أَمَاكِنَ يُهْمِلُهَا غَيْرُهُ.
    description_fr: |
      Allah accorda au Prophète Sulaymān ʿalayhi as-salām un royaume sans équivalent dans
      l'histoire, incluant la domination sur les djinns, le vent, et le
      langage des oiseaux. Un jour, tandis qu'il inspectait ses troupes, il
      remarqua l'absence de la huppe et la menaça de châtiment si elle ne
      présentait pas une excuse valable. La huppe revint avec une nouvelle
      stupéfiante : elle avait découvert une reine dans le lointain pays de
      Saba' dont le peuple adorait le soleil au lieu d'Allah. Sulaymān ʿalayhi as-salām ne
      dédaigna pas le rapport en raison de sa source humble ; au contraire,
      il envoya une lettre l'appelant à se soumettre à Allah seul. Al-
      Qurṭubī remarque que le rôle de la huppe prouve qu'Allah peut placer
      une connaissance cruciale dans la bouche de la plus petite créature,
      et que le sage souverain écoute avant de juger. Ibn Kathīr ajoute que
      la réponse de Sulaymān — vérification suivie d'une action diplomatique
      — établit le modèle prophétique de leadership : attentif, mesuré, et
      ancré dans le tawḥīd. La leçon est qu'aucune créature n'est trop
      petite pour porter la connaissance d'Allah, et que le croyant qui
      cultive l'attention trouvera la guidance là où d'autres ne voient rien.
    reference: Surah al-Naml 27:15-44
    source_notes: |
      Al-Qurṭubī remarks that the hoopoe's role proves Allah can place crucial knowledge in the mouth of the smallest creature, and that the wise ruler listens before he judges. Ibn Kathīr adds that Sulaymān's response — verification followed by diplomatic action — establishes the prophetic model of leadership: attentive, measured, and grounded in tawḥīd.
    source_notes_fr: |
      Al-Qurṭubī remarque que le rôle de la huppe prouve qu'Allah peut placer une connaissance cruciale dans la bouche de la plus petite créature, et que le sage souverain écoute avant de juger. Ibn Kathīr ajoute que la réponse de Sulaymān — vérification suivie d'une action diplomatique — établit le modèle prophétique de leadership : attentif, mesuré et ancré dans le tawḥīd.
    source_notes_ar: |
      يُعَلِّقُ القُرْطُبِيُّ أَنَّ دَوْرَ الهُدْهُدِ يُثْبِتُ أَنَّ اللهَ يَسْتَطِيعُ أَنْ يَضَعَ العِلْمَ الأَهَمَّ فِي فَمِ أَصْغَرِ خَلْقِهِ، وَأَنَّ الحَاكِمَ الحَكِيمَ يَسْمَعُ قَبْلَ أَنْ يَحْكُمَ. وَيَزِيدُ ابنُ كَثِيرٌ أَنَّ رَدَّ فِعْلِ سُلَيْمَانَ — التَّحَقُّقُ ثُمَّ العَمَلُ الدِّبْلُومَاسِيُّ — يُؤَسِّسُ النَّمُوذَجَ النَّبَوِيَّ لِلقِيَادَةِ: يَقْظَانًا، مَعْتَدِلاً، وَمُتَجَذِّرًا فِي التَّوْحِيدِ.
    display_day_of_year: 44
    quran_refs: "27:15-44"
    source_url: https://quran.com/27

  - slug: quran-story-sulayman-and-bilqis
    category: quran_story
    title_en: Sulayman and Bilqis — The Queen Who Submitted
    title_ar: سُلَيْمَانُ وَبِلْقِيسُ — المَلِكَةُ الَّتِي اسْتَسْلَمَتْ
    title_fr: Sulaymān et Bilqīs — la reine qui se soumit
    description_en: |
      Upon receiving the hoopoe's report, Prophet Sulayman ʿalayhi as-salām sent a letter to
      Bilqis, the Queen of Saba', calling her and her people to abandon
      sun-worship and submit to Allah alone. She consulted her council, who
      urged war; but she chose wisdom, deciding to send a gift and assess the
      situation herself. Sulayman ʿalayhi as-salām rejected the gift as a substitute for
      faith and demonstrated his kingdom's overwhelming power by having her
      throne brought to his court in the blink of an eye. When she entered
      his palace and saw its crystal floor, she mistook it for water and
      lifted her robe. Realising the extent of his prophetic authority, she
      declared: "My Lord, indeed I have wronged myself, and I submit with
      Sulayman to Allah, Lord of the worlds." Ibn Kathīr records that her
      submission was voluntary and intellectual — she recognised the truth
      and chose it without coercion. Al-Ṭabarī notes that her consultation
      of her council before deciding illustrates the virtue of deliberation.
      The lesson is that true strength is the strength to recognise truth
      and submit to it, and that the greatest victory is the conversion of a
      heart through wisdom rather than force.
    description_ar: |
      بَعْدَ تَلَقِّي تَقْرِيرِ الهُدْهُدِ، أَرْسَلَ النَّبِيُّ سُلَيْمَانُ عَلَيْهِ
      السَّلَامُ كِتَابًا إِلَى بِلْقِيسَ مَلِكَةِ سَبَإٍ، يَدْعُوهَا وَشَعْبَهَا إِلَى
      تَرْكِ عِبَادَةِ الشَّمْسِ وَالانْخِيَاطِ لِلَّهِ وَحْدَهُ. اسْتَشَارَتْ
      مَجْلِسَهَا الَّذِي دَعَا إِلَى الحَرْبِ؛ لَكِنَّهَا اخْتَارَتِ الحِكْمَةَ،
      فَقَرَّرَتْ أَنْ تُرْسِلَ هَدِيَّةً وَتَتَقَصَّى المَوْضُوعَ بِنَفْسِهَا. رَفَضَ
      سُلَيْمَانُ الهَدِيَّةَ كَبَدِيلٍ عَنِ الإِيمَانِ، وَأَبْدَى قُدْرَةَ مَمْلَكَتِهِ
      المُسْحِقَةَ بِإِحْضَارِ عَرْشِهَا إِلَى قَاعَتِهِ فِي لَمْحِ البَصَرِ.
      فَلَمَّا دَخَلَتْ قَصْرَهُ وَرَأَتْ أَرْضِيَّتَهُ المُرَكَّمَةَ، ظَنَّتْهَا مَاءً
      وَرَفَعَتْ ذَيْلَهَا. وَبِمُجَرَّدِ إِدْرَاكِهَا حَجْمَ سُلْطَانِهِ النَّبَوِيِّ،
      صَرَخَتْ: «رَبِّ إِنِّي ظَلَمْتُ نَفْسِي وَأَسْلَمْتُ مَعَ سُلَيْمَانَ لِلَّهِ
      رَبِّ العَالَمِينَ». يَسِيرُ ابنُ كَثِيرٌ فِي ذِكْرِ أَنَّ اسْتِسْلاَمَهَا كَانَ
      طَوْعِيًّا وَعَقْلِيًّا — عَرَفَتِ الحَقَّ وَاخْتَارَتْهُ بِلاَ إِكْرَاهٍ.
      وَيُشِيرُ الطَّبَرِيُّ إِلَى أَنَّ اسْتِشَارَتَهَا لِمَجْلِسِهَا قَبْلَ القَرَارِ
      تُجَسِّدُ فَضِيلَةَ التَّشَاوُرِ. الدَّرْسُ أَنَّ القُوَّةَ الحَقِيقِيَّةَ هِيَ
      القُوَّةُ عَلَى مَعْرِفَةِ الحَقِّ وَالاسْتِسْلاَمِ لَهُ، وَأَنَّ أَعْظَمَ نَصْرٍ
      هُوَ انْقِلاَبُ القَلْبِ بِالحِكْمَةِ لاَ بِالقُوَّةِ.
    description_fr: |
      Après avoir reçu le rapport de la huppe, le Prophète Sulaymān ʿalayhi as-salām envoya
      une lettre à Bilqīs, la reine de Saba', l'appelant elle et son peuple
      à abandonner l'adoration du soleil et à se soumettre à Allah seul.
      Elle consulta son conseil, qui prôna la guerre ; mais elle choisit la
      sagesse, décidant d'envoyer un présent et d'évaluer la situation elle-
      même. Sulaymān ʿalayhi as-salām rejeta le présent comme substitut à la foi et
      démontra la puissance écrasante de son royaume en faisant apporter son
      trône à sa cour en un clin d'œil. Lorsqu'elle entra dans son palais et
      vit son sol de cristal, elle le prit pour de l'eau et releva sa robe.
      Réalisant l'étendue de son autorité prophétique, elle déclara :
      « Seigneur, en vérité j'ai fait tort à moi-même, et je me soumets avec
      Sulaymān à Allah, Seigneur des mondes. » Ibn Kathīr rapporte que sa
      soumission fut volontaire et intellectuelle — elle reconnut la vérité
      et la choisit sans coercition. Al-Ṭabarī note que sa consultation du
      conseil avant de décider illustre la vertu de la délibération. La
      leçon est que la vraie force est la force de reconnaître la vérité et
      de s'y soumettre, et que la plus grande victoire est la conversion
      d'un cœur par la sagesse plutôt que par la force.
    reference: Surah al-Naml 27:22-44
    source_notes: |
      Ibn Kathīr records that Bilqīs's submission was voluntary and intellectual — she recognised the truth and chose it without coercion. Al-Ṭabarī notes that her consultation of her council before deciding illustrates the virtue of deliberation, a principle the Qur'an holds up as a mark of mature leadership.
    source_notes_fr: |
      Ibn Kathīr rapporte que la soumission de Bilqīs fut volontaire et intellectuelle — elle reconnut la vérité et la choisit sans coercition. Al-Ṭabarī note que sa consultation du conseil avant de décider illustre la vertu de la délibération, un principe que le Coran présente comme la marque d'un leadership mûr.
    source_notes_ar: |
      يَسِيرُ ابنُ كَثِيرٌ فِي ذِكْرِ أَنَّ اسْتِسْلاَمَهَا كَانَ طَوْعِيًّا وَعَقْلِيًّا — عَرَفَتِ الحَقَّ وَاخْتَارَتْهُ بِلَا إِكْرَاهٍ. وَيُشِيرُ الطَّبَرِيُّ إِلَى أَنَّ اسْتِشَارَتَهَا لِمَجْلِسِهَا قَبْلَ القَرَارِ تُجَسِّدُ فَضِيلَةَ التَّشَاوُرِ، وَهُوَ مَبْدَأٌ يَرْفَعُهُ القُرْآنُ عَلَامَةً عَلَى نُضْجِ القِيَادَةِ.
    display_day_of_year: 50
    quran_refs: "27:22-44"
    source_url: https://quran.com/27

  - slug: quran-story-ayyub-and-his-patience
    category: quran_story
    title_en: The Patience of Ayyub — When Affliction Becomes a Proof
    title_ar: صَبْرُ أَيُّوبَ — حِينَ يَصِيرُ البَلَاءُ بُرْهَانًا
    title_fr: La patience de Ayyūb — quand l'épreuve devient une preuve
    description_en: |
      The Prophet Ayyub ʿalayhi as-salām was tested with the loss of his wealth, his
      children, and his health over a prolonged period. His body was afflicted
      with a severe disease, yet his wife remained steadfast by his side,
      and he never despaired of Allah's mercy. When the trial reached its
      peak, he called upon his Lord: "Indeed adversity has touched me, and
      You are the Most Merciful of the merciful." Allah commanded him to
      strike the ground with his foot, and a spring of cool water gushed
      forth; he drank, washed, and was restored to health. His family and
      wealth were returned to him, doubled. Ibn al-Qayyim explains in his
      works on the heart that Ayyub's patience was not passive resignation
      but active trust, and that his supplication teaches the believer to
      complain only to Allah. Ibn Kathīr notes that the Qur'an praises him
      as "an excellent servant; truly he was one who turned often," making
      him a proof that affliction is not abandonment but a sign of divine
      love for those Allah intends to elevate. The lesson is that the
      believer's response to loss determines its outcome: patience turns
      calamity into purification, and the du'a of the distressed is never
      rejected.
    description_ar: |
      اِمْتُحِنَ النَّبِيُّ أَيُّوبُ عَلَيْهِ السَّلَامُ بِفَقْدِ مَالِهِ وَوَلَدِهِ
      وَصِحَّتِهِ عَلَى مَدَى فَتْرَةٍ طَوِيلَةٍ. أُصِيبَ جَسَدُهُ بِمَرَضٍ شَدِيدٍ،
      وَلَكِنَّ زَوْجَتَهُ بَقِيَتْ مُثَابِرَةً بِجَانِبِهِ، وَلَمْ يَيْأَسْ مِنْ
      رَحْمَةِ اللهِ. وَلَمَّا بَلَغَ البَلَاءُ ذُرْوَتَهُ، نَادَى رَبَّهُ: «أَنِّي
      مَسَّنِيَ الضُّرُّ وَأَنْتَ أَرْحَمُ الرَّاحِمِينَ». فَأَمَرَهُ اللهُ أَنْ
      يَضْرِبَ الأَرْضَ بِرِجْلِهِ، فَانْبَجَسَتْ عَيْنُ مَاءٍ بَارِدٍ؛ فَشَرِبَ
      وَاغْتَسَلَ وَعَادَ إِلَى صِحَّتِهِ. وَأُعِيدَتْ إِلَيْهِ عَائِلَتُهُ وَثَرْوَتُهُ
      مُضَاعَفَتَيْنِ. يُفَسِّرُ ابنُ القَيِّمِ فِي مُؤَلَّفَاتِهِ عَنِ القَلْبِ أَنَّ
      صَبْرَ أَيُّوبَ لَمْ يَكُنْ استِسْلاَمًا سَّلْبِيًّا، بَلْ كَانَ ثِقَةً فَاعِلَةً،
      وَأَنَّ دُعَاءَهُ يُعَلِّمُ المُؤْمِنَ أَنْ يَشْكُوَ إِلَى اللهِ وَحْدَهُ.
      وَيُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ القُرْآنَ يَمْدَحُهُ بِأَنَّهُ «نِعْمَ
      العَبْدُ إِنَّهُ أَوَّابٌ»، مُجَعِّلاً إِيَّاهُ بُرْهَانًا عَلَى أَنَّ البَلَاءَ
      لَيْسَ تَخْلِيَةً بَلْ عَلاَمَةُ مَحَبَّةٍ إِلَهِيَّةٍ لِمَنْ يُرِيدُ اللهُ
      رَفْعَهُمْ. الدَّرْسُ أَنَّ اسْتِجَابَةَ المُؤْمِنِ لِلْخَسَارَةِ تُحَدِّدُ
      نَتِيجَتَهَا: الصَّبْرُ يُحَوِّلُ المِحْنَةَ إِلَى تَطْهِيرٍ، وَدُعَاءُ
      المُضْطَرِّ لَنْ يُرَدَّ أَبَدًا.
    description_fr: |
      Le Prophète Ayyūb ʿalayhi as-salām fut éprouvé par la perte de sa fortune, de ses
      enfants et de sa santé sur une période prolongée. Son corps fut
      atteint d'une maladie grave, pourtant son épouse demeura fidèle à ses
      côtés, et il ne désespéra jamais de la miséricorde d'Allah. Lorsque
      l'épreuve atteignit son paroxysme, il invoqua son Seigneur : « En
      vérité, le malheur m'a touché, et Tu es le plus miséricordieux des
      miséricordieux. » Allah lui ordonna de frapper le sol de son pied, et
      une source d'eau fraîche jaillit ; il but, se lava, et retrouva la
      santé. Sa famille et sa fortune lui furent rendues, décuplées. Ibn al-
      Qayyim explique dans ses œuvres sur le cœur que la patience d'Ayyūb
      n'était pas une résignation passive mais une confiance active, et que
      sa supplication enseigne au croyant de ne se plaindre qu'à Allah.
      Ibn Kathīr note que le Coran le loue comme « un excellent serviteur ;
      en vérité il était un repentant », faisant de lui une preuve que
      l'épreuve n'est pas un abandon mais un signe d'amour divin pour ceux
      qu'Allah entend élever. La leçon est que la réponse du croyant face
      à la perte détermine son issue : la patience transforme le malheur en
      purification, et la duʿāʾ de celui qui est dans la détresse n'est
      jamais rejetée.
    reference: Surah al-Anbiya 21:83-84, Surah Sad 38:41-44
    source_notes: |
      Ibn al-Qayyim explains in *Madārij al-Sālikīn* that Ayyūb's patience was active trust, not passive resignation, and his supplication teaches the believer to complain only to Allah. Ibn Kathīr notes that the Qur'an praises him as *ʿawwāb* — one who turns often — making him a proof that affliction is a sign of divine love for those Allah intends to elevate.
    source_notes_fr: |
      Ibn al-Qayyim explique dans *Madārij al-Sālikīn* que la patience d'Ayyūb était une confiance active, non une résignation passive, et que sa supplication enseigne au croyant de ne se plaindre qu'à Allah. Ibn Kathīr note que le Coran le loue comme *ʿawwāb* — celui qui revient souvent — faisant de lui une preuve que l'épreuve est un signe d'amour divin pour ceux qu'Allah entend élever.
    source_notes_ar: |
      يُفَسِّرُ ابنُ القَيِّمِ فِي «مَدَارِجِ السَّالِكِينَ» أَنَّ صَبْرَ أَيُّوبَ كَانَ ثِقَةً فَاعِلَةً لاَ اسْتِسْلاَمًا سَّلْبِيًّا، وَأَنَّ دُعَاءَهُ يُعَلِّمُ المُؤْمِنَ أَنْ يَشْكُوَ إِلَى اللهِ وَحْدَهُ. وَيُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ القُرْآنَ يَمْدَحُهُ بِأَنَّهُ «عَوَّابٌ» — أَيْ كَثِيرُ الرُّجُوعِ — مُجَعِّلاً إِيَّاهُ بُرْهَانًا عَلَى أَنَّ البَلَاءَ عَلاَمَةُ مَحَبَّةٍ إِلَهِيَّةٍ لِمَنْ يُرِيدُ اللهُ رَفْعَهُمْ.
    display_day_of_year: 54
    quran_refs: "21:83-84, 38:41-44"
    source_url: https://quran.com/21

  - slug: quran-story-yunus-in-the-whale
    category: quran_story
    title_en: Yunus in the Belly of the Whale — The Du'a That Saved Him
    title_ar: يُونُسُ فِي بَطْنِ الحُوتِ — الدُّعَاءُ الَّذِي أَنْقَذَهُ
    title_fr: Yūnus dans le ventre de la baleine — la duʿāʾ qui le sauva
    description_en: |
      The Prophet Yunus ʿalayhi as-salām left his people in anger before receiving
      permission from Allah, believing that his mission had failed. He
      boarded a ship that nearly foundered in a storm; lots were cast, and
      he was thrown overboard into the raging sea. A great fish swallowed
      him, and he found himself in "layers of darkness" — the darkness of
      the sea, the darkness of the fish's belly, and the darkness of night.
      There, in the most desperate of circumstances, he called out: "There
      is no god but You; glory be to You. Indeed I have been of the
      wrongdoers." The fish cast him onto the shore, and Allah caused a
      vine to grow over him while he recovered. He then returned to his
      people, who had since believed — the only community in the Qur'an
      whose punishment was lifted after the prophet had departed. Ibn
      Kathīr records that Yunus's du'a contains the essence of repentance:
      acknowledgement of divine oneness, glorification, and confession of
      fault. The lesson is that no situation is beyond Allah's mercy, and
      that the sincere return to Allah in the depths of failure can reverse
      what seemed irreversible.
    description_ar: |
      تَرَكَ النَّبِيُّ يُونُسُ عَلَيْهِ السَّلَامُ قَوْمَهُ عَلَى غَضَبٍ قَبْلَ أَنْ
      يَأْذَنَ لَهُ اللهُ، مُظَنًّا أَنَّ مُهِمَّتَهُ قَدْ فَشِلَتْ. رَكِبَ سَفِينَةً
      كَادَتْ أَنْ تَنْكَسِرَ فِي عَاصِفَةٍ؛ فَأُلْقِيَتِ القُرْعَةُ فَطُرِحَ فِي
      البَحْرِ الهَائِجِ. ابْتَلَعَتْهُ سَمَكَةٌ عَظِيمَةٌ، فَوَجَدَ نَفْسَهُ فِي
      «ظُلُمَاتٍ» — ظُلْمَةِ البَحْرِ، وَظُلْمَةِ بَطْنِ الحُوتِ، وَظُلْمَةِ اللَّيْلِ.
      هُنَاكَ، فِي أَيْئِسِ الظُّرُوفِ، صَرَخَ: «لاَ إِلَهَ إِلاَّ أَنْتَ سُبْحَانَكَ
      إِنِّي كُنْتُ مِنَ الظَّالِمِينَ». فَطَرَحَتْهُ السَّمَكَةُ عَلَى الشَّاطِئِ،
      وَأَنْبَتَ اللهُ عَلَيْهِ شَجَرَةً مِنْ يَقْطِينٍ بَيْنَمَا يَتَعَافَى. ثُمَّ
      عَادَ إِلَى قَوْمِهِ الَّذِينَ آمَنُوا فِيما بَعْدُ — وَهُمُ الأُمَّةُ الوَحِيدَةُ
      فِي القُرْآنِ الَّتِي رُفِعَ عَنْهَا العِقَابُ بَعْدَ ذَهَابِ النَّبِيِّ.
      يَسِيرُ ابنُ كَثِيرٌ فِي ذِكْرِ أَنَّ دُعَاءَ يُونُسَ يَحْوِي جَوْهَرَ
      التَّوْبَةِ: الإِقْرَارُ بِوَحْدَانِيَّةِ اللهِ، وَالتَّسْبِيحُ، وَالاعْتِرَافُ
      بِالذَّنْبِ. الدَّرْسُ أَنَّهُ لاَ يُوجَدُ مَوْقِفٌ خَارِجٌ عَلَى رَحْمَةِ اللهِ،
      وَأَنَّ الرُّجُوعَ الصَّادِقَ إِلَى اللهِ فِي أَعْمَاقِ الفَشَلِ يَسْتَطِيعُ
      أَنْ يُعَكِّسَ مَا بَدَا غَيْرَ قَابِلٍ لِلانْقِلاَبِ.
    description_fr: |
      Le Prophète Yūnus ʿalayhi as-salām quitta son peuple en colère avant d'avoir reçu la
      permission d'Allah, croyant que sa mission avait échoué. Il monta sur
      un navire qui faillit sombrer dans une tempête ; on tira au sort, et
      il fut jeté par-dessus bord dans la mer déchaînée. Un grand poisson
      l'avala, et il se trouva dans des « ténèbres superposées » — la
      ténèbre de la mer, la ténèbre du ventre du poisson, et la ténèbre de
      la nuit. Là, dans les circonstances les plus désespérées, il cria :
      « Il n'y a de divinité que Toi ; gloire à Toi. En vérité j'ai été du
      nombre des injustes. » Le poisson le rejeta sur le rivage, et Allah
      fit pousser sur lui une plante de courge pendant qu'il se rétablissait.
      Il retourna ensuite vers son peuple, qui avait entre-temps cru — la
      seule communauté du Coran dont le châtiment fut levé après le départ
      du prophète. Ibn Kathīr rapporte que la duʿāʾ de Yūnus contient
      l'essence de la repentance : reconnaissance de l'unicité divine,
      glorification, et confession de la faute. La leçon est qu'aucune
      situation n'est hors de portée de la miséricorde d'Allah, et que le
      retour sincère à Allah au plus profond de l'échec peut renverser ce
      qui semblait irréversible.
    reference: Surah al-Saffat 37:139-148, Surah al-Anbiya 21:87-88
    source_notes: |
      Ibn Kathīr records that Yūnus's duʿā contains the essence of repentance: acknowledgement of divine oneness, glorification, and confession of fault. Al-Ṭabarī notes that his people's subsequent belief — after the prophet had departed — makes this the only story in the Qur'an where an entire community's punishment was lifted by repentance.
    source_notes_fr: |
      Ibn Kathīr rapporte que la duʿā de Yūnus contient l'essence de la repentance : reconnaissance de l'unicité divine, glorification et confession de la faute. Al-Ṭabarī note que la foi ultérieure de son peuple — après le départ du prophète — fait de cela le seul récit du Coran où le châtiment d'une communauté entière fut levé par la repentance.
    source_notes_ar: |
      يَسِيرُ ابنُ كَثِيرٌ فِي ذِكْرِ أَنَّ دُعَاءَ يُونُسَ يَحْوِي جَوْهَرَ التَّوْبَةِ: الإِقْرَارُ بِوَحْدَانِيَّةِ اللهِ، وَالتَّسْبِيحُ، وَالاعْتِرَافُ بِالذَّنْبِ. وَيَلْحَظُ الطَّبَرِيُّ أَنَّ إِيمَانَ قَوْمِهِ لاحِقًا — بَعْدَ ذَهَابِ النَّبِيِّ — يَجْعَلُ هَذَا القِصَّةَ الوَحِيدَةَ فِي القُرْآنِ الَّتِي رُفِعَ عَنْهَا عِقَابُ أُمَّةٍ كَامِلَةٍ بِالتَّوْبَةِ.
    display_day_of_year: 64
    quran_refs: "37:139-148, 21:87-88"
    source_url: https://quran.com/37

  - slug: quran-story-zakariyya-and-the-child
    category: quran_story
    title_en: Zakariyya and the Birth of Yahya — Prayer in Old Age
    title_ar: زَكَرِيَّا وَمِيلَادُ يَحْيَى — الدُّعَاءُ فِي الكِبَرِ
    title_fr: Zakariyyā et la naissance de Yaḥyā — la prière dans la vieillesse
    description_en: |
      Prophet Zakariyya ʿalayhi as-salām was advanced in years, and his wife had been barren
      throughout their life together. Yet when he saw Allah's provision
      reaching the young Maryam in her sanctuary without any visible human
      source, his heart was stirred to ask. He prayed in the sanctuary:
      "My Lord, grant me from Yourself good offspring. Indeed You hear
      supplications." The angels called to him while he stood praying:
      "Allah gives you glad tidings of Yahya, confirming a word from Allah,
      lordly and chaste and a prophet from among the righteous." Zakariyya
      asked for a sign, and was told that he would not speak to people for
      three nights except by gesture. Ibn Kathīr notes that Zakariyya's
      du'a was answered not because of his age but because of his sincerity
      and the occasion that prompted it — witnessing divine generosity
      toward another. Al-Qurṭubī adds that the prohibition on speaking was
      a sign of absorption in Allah's remembrance, and that Yahya's
      exceptional character was established before his birth by divine
      decree. The lesson is that Allah's power is not constrained by natural
      limits, and that the believer should never despair of receiving what
      seems impossible — the appropriate response is simply to ask.
    description_ar: |
      كَانَ النَّبِيُّ زَكَرِيَّا عَلَيْهِ السَّلَامُ قَدْ تَقَدَّمَ بِهِ السِّنُّ،
      وَكَانَتْ زَوْجَتُهُ عَاقِرًا طَوَالَ حَيَاتِهِمَا مَعًا. وَلَكِنْ حِينَ رَأَى
      رِزْقَ اللهِ يَصِلُ إِلَى مَرْيَمَ الصَّغِيرَةِ فِي مِحْرَابِهَا بِدُونِ أَيِّ
      مَصْدَرٍ بَشَرِيٍّ مَرْئِيٍّ، هَاجَ قَلْبُهُ لِلسُّؤَالِ. فَدَعَا فِي
      المِحْرَابِ: «رَبِّ هَبْ لِي مِنْ لَدُنْكَ ذُرِّيَّةً طَيِّبَةً إِنَّكَ سَمِيعُ
      الدُّعَاءِ». فَنَادَتْهُ المَلَائِكَةُ وَهُوَ قَائِمٌ يُصَلِّي: «يُبَشِّرُكَ
      اللهُ بِيَحْيَى مُصَدِّقًا بِكَلِمَةٍ مِنَ اللهِ وَسَيِّدًا وَحَصُورًا وَنَبِيًّا
      مِنَ الصَّالِحِينَ». طَلَبَ زَكَرِيَّا آيَةً، فَقِيلَ لَهُ إِنَّهُ لَنْ يُكَلِّمَ
      النَّاسَ ثَلاَثَ لَيَالٍ إِلاَّ رَمْزًا. يُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ
      إِجَابَةَ دُعَاءِ زَكَرِيَّا لَمْ تَكُنْ بِسَبَبِ سِنِّهِ، بَلْ بِسَبَبِ
      إِخْلَاصِهِ وَالْمَنَاسِبَةِ الَّتِي أَثَارَتْهُ — مُشَاهَدَةُ الكَرَمِ الإِلَهِيِّ
      مَعَ غَيْرِهِ. وَيُضِيفُ القُرْطُبِيُّ أَنَّ المَنْعَ مِنَ الكَلاَمِ كَانَ آيَةً
      عَلَى الانْغِمَاسِ فِي ذِكْرِ اللهِ، وَأَنَّ خُلُقَ يَحْيَى الفَائِقَ قَدْ تَمَّ
      تَأْسِيسُهُ قَبْلَ مِيلَادِهِ بِقَضَاءٍ إِلَهِيٍّ. الدَّرْسُ أَنَّ قُدْرَةَ اللهِ
      لاَ تُقَيَّدُ بِالحُدُودِ الطَّبِيعِيَّةِ، وَأَنَّ عَلَى المُؤْمِنِ أَلاَّ
      يَيْأَسَ مِنْ تَلَقِّي مَا يَبْدُو مُسْتَحِيلاً — فَالاسْتِجَابَةُ المُنَاسِبَةُ
      هِيَ بِبَسَاطَةٍ السُّؤَالُ.
    description_fr: |
      Le Prophète Zakariyyā ʿalayhi as-salām était avancé en âge, et son épouse avait été
      stérile tout au long de leur vie commune. Pourtant, lorsqu'il vit la
      provision d'Allah parvenir à la jeune Maryam dans son sanctuaire sans
      aucune source humaine visible, son cœur fut ému à demander. Il pria
      dans le sanctuaire : « Seigneur, accorde-moi de Ta part une
      descendance pie ; en vérité Tu écoutes la supplication. » Les anges
      l'appelèrent tandis qu'il priait debout : « Allah t'annonce la
      bonne nouvelle de Yaḥyā, confirmant une parole d'Allah, seigneurial,
      chaste et prophète du nombre des justes. » Zakariyyā demanda un signe,
      et on lui dit qu'il ne parlerait pas aux gens pendant trois nuits
      sinon par signes. Ibn Kathīr note que la duʿāʾ de Zakariyyā fut
      exaucée non pas à cause de son âge, mais à cause de sa sincérité et
      de l'occasion qui la suscita — le témoignage de la générosité divine
      envers un autre. Al-Qurṭubī ajoute que l'interdiction de parler était
      un signe d'absorption dans le rappel d'Allah, et que le caractère
      exceptionnel de Yaḥyā fut établi avant sa naissance par décret divin.
      La leçon est que la puissance d'Allah n'est pas contrainte par les
      limites naturelles, et que le croyant ne doit jamais désespérer de
      recevoir ce qui semble impossible — la réponse appropriée est
      simplement de demander.
    reference: Surah Maryam 19:2-15, Surah Aal Imran 3:37-41
    source_notes: |
      Ibn Kathīr notes that Zakariyyā's duʿā was answered not because of his age but because of his sincerity and the occasion that prompted it — witnessing divine generosity toward Maryam. Al-Qurṭubī adds that the prohibition on speaking was a sign of absorption in Allah's remembrance, and that Yaḥyā's exceptional character was established before his birth by divine decree.
    source_notes_fr: |
      Ibn Kathīr note que la duʿā de Zakariyyā fut exaucée non pas à cause de son âge, mais à cause de sa sincérité et de l'occasion qui la suscita — le témoignage de la générosité divine envers Maryam. Al-Qurṭubī ajoute que l'interdiction de parler était un signe d'absorption dans le rappel d'Allah, et que le caractère exceptionnel de Yaḥyā fut établi avant sa naissance par décret divin.
    source_notes_ar: |
      يُشِيرُ ابنُ كَثِيرٌ إِلَى أَنَّ إِجَابَةَ دُعَاءِ زَكَرِيَّا لَمْ تَكُنْ بِسَبَبِ سِنِّهِ، بَلْ بِسَبَبِ إِخْلَاصِهِ وَالْمَنَاسِبَةِ الَّتِي أَثَارَتْهُ — مُشَاهَدَةُ الكَرَمِ الإِلَهِيِّ مَعَ مَرْيَمَ. وَيَزِيدُ القُرْطُبِيُّ أَنَّ المَنْعَ مِنَ الكَلاَمِ كَانَ آيَةً عَلَى الانْغِمَاسِ فِي ذِكْرِ اللهِ، وَأَنَّ خُلُقَ يَحْيَى الفَائِقَ قَدْ تَمَّ تَأْسِيسُهُ قَبْلَ مِيلَادِهِ بِقَضَاءٍ إِلَهِيٍّ.
    display_day_of_year: 65
    quran_refs: "19:2-15, 3:37-41"
    source_url: https://quran.com/19

  - slug: quran-story-maryam-and-the-palm-tree
    category: quran_story
    title_en: Maryam and the Palm Tree — The Birth of Isa
    title_ar: مَرْيَمُ وَالنَّخْلَةُ — مِيلَادُ عِيسَى
    title_fr: Maryam et le palmier — la naissance de ʿĪsā
    description_en: |
      The angel Jibril appeared to Maryam with the news that she would bear
      a son by the word of Allah, without any human father. When the time
      of labour came upon her, she withdrew to a remote place and leaned
      against the trunk of a date-palm, crying out in pain and distress.
      A voice called to her from beneath her: "Do not grieve — your Lord
      has provided a stream beneath you. And shake toward you the trunk of
      the palm-tree; it will drop upon you ripe, fresh dates." She was
      instructed to eat, drink, and be contented, and to speak to no one
      if questioned. She then returned to her people carrying the infant
      Isa ʿalayhi as-salām, and he spoke from her arms in defence of his mother. Ibn
      Kathīr explains that the date-palm and the stream were miracles of
      divine provision in complete isolation, teaching that Allah sustains
      His servants even when all natural means are absent. Al-Qurṭubī adds
      that Maryam's solitude was a purification, and that the infant's
      speech was a sign of prophethood granted before any human instruction.
      The lesson is that Allah provides for the righteous in the most
      desolate of circumstances, and that His plans unfold even when they
      defy every human expectation.
    description_ar: |
      ظَهَرَ المَلَكُ جِبْرِيلُ لِمَرْيَمَ بِبُشْرَى أَنَّهَا سَتَلِدُ غُلاَمًا بِكَلِمَةٍ
      مِنَ اللهِ، بِدُونِ أَبٍ بَشَرِيٍّ. وَلَمَّا حَانَ وَقْتُ الوِلاَدَةِ، انْصَرَفَتْ
      إِلَى مَكَانٍ نَائٍ وَاسْتَنَدَتْ إِلَى جِذْعِ نَخْلَةٍ، تَصِيحُ مِنَ الأَلَمِ
      وَالضِّيقِ. فَنَادَاهَا صَوْتٌ مِنْ تَحْتِهَا: «لاَ تَحْزَنِي قَدْ جَعَلَ رَبُّكِ
      تَحْتَكِ سَرِيًّا. وَهُزِّي إِلَيْكِ بِجِذْعِ النَّخْلَةِ تُسَاقِطْ عَلَيْكِ
      رُطَبًا جَنِيًّا». أُمِرَتْ أَنْ تَأْكُلَ وَتَشْرَبَ وَتَقَرَّ عَيْنًا، وَأَنْ لاَ
      تُكَلِّمَ أَحَدًا إِنْ سُئِلَتْ. ثُمَّ عَادَتْ إِلَى قَوْمِهَا وَمَعَهَا الرَّضِيعُ
      عِيسَى عَلَيْهِ السَّلَامُ، فَتَكَلَّمَ مِنْ حِجْنِهَا دِفَاعًا عَنْ أُمِّهِ. يُفَسِّرُ
      ابنُ كَثِيرٍ أَنَّ النَّخْلَةَ وَالنَّبْعَ كَانَا مُعْجِزَتَيْ رِزْقٍ إِلَهِيٍّ فِي
      عَزْلَةٍ تَامَّةٍ، مُعَلِّمَيْنِ أَنَّ اللهَ يَرْزُقُ عِبَادَهُ حَتَّى حِينَ تَنْعَدِمُ
      السُّبُلُ الطَّبِيعِيَّةُ. وَيُضِيفُ القُرْطُبِيُّ أَنَّ عَزْلَةَ مَرْيَمَ كَانَتْ
      تَطْهِيرًا، وَأَنَّ كَلاَمَ الرَّضِيعِ كَانَ آيَةَ نُبُوَّةٍ مُنَحَّةً قَبْلَ أَنْ
      يَتَلَقَّى تَعْلِيمًا بَشَرِيًّا. الدَّرْسُ أَنَّ اللهَ يَرْزُقُ الأَبْرَارَ فِي
      أَقْحَامِ الظُّرُوفِ، وَأَنَّ مَشِيئَتَهُ تَتَجَلَّى حَتَّى حِينَ تَتَعَدَّى كُلَّ
      تَوَقُّعٍ بَشَرِيٍّ.
    description_fr: |
      L'ange Jibrīl apparut à Maryam avec la nouvelle qu'elle porterait un
      fils par la parole d'Allah, sans père humain. Lorsque le moment de
      l'accouchement vint, elle se retira dans un lieu éloigné et s'appuya
      contre le tronc d'un palmier, poussant des cris de douleur et d'angoisse.
      Une voix lui cria d'en bas : « Ne t'afflige pas — ton Seigneur a placé
      un ruisseau sous toi. Et secoue vers toi le tronc du palmier ; il
      fera tomber sur toi des dattes fraîches et mûres. » On lui ordonna de
      manger, de boire et de se réjouir, et de ne parler à personne si on
      l'interrogeait. Elle retourna ensuite vers son peuple portant le
      nouveau-né ʿĪsā ʿalayhi as-salām, et il parla de ses bras pour défendre sa mère.
      Ibn Kathīr explique que le palmier et le ruisseau furent des miracles
      de provision divine dans une isolation complète, enseignant qu'Allah
      sustente Ses serviteurs même lorsque tous les moyens naturels font
      défaut. Al-Qurṭubī ajoute que la solitude de Maryam fut une
      purification, et que la parole du nourrisson fut un signe de
      prophétie accordé avant toute instruction humaine. La leçon est qu'Allah
      pourvoit aux justes dans les circonstances les plus désolées, et que
      Ses desseins se déploient même lorsqu'ils défient toute attente humaine.
    reference: Surah Maryam 19:16-33
    source_notes: |
      Ibn Kathīr explains that the date-palm and the stream were miracles of divine provision in complete isolation, teaching that Allah sustains His servants even when all natural means are absent. Al-Qurṭubī adds that Maryam's solitude was a purification, and that the infant's speech was a sign of prophethood granted before any human instruction.
    source_notes_fr: |
      Ibn Kathīr explique que le palmier et le ruisseau furent des miracles de provision divine dans une isolation complète, enseignant qu'Allah sustente Ses serviteurs même lorsque tous les moyens naturels font défaut. Al-Qurṭubī ajoute que la solitude de Maryam fut une purification, et que la parole du nourrisson fut un signe de prophétie accordé avant toute instruction humaine.
    source_notes_ar: |
      يُفَسِّرُ ابنُ كَثِيرٌ أَنَّ النَّخْلَةَ وَالنَّبْعَ كَانَا مُعْجِزَتَيْ رِزْقٍ إِلَهِيٍّ فِي عَزْلَةٍ تَامَّةٍ، مُعَلِّمَيْنِ أَنَّ اللهَ يَرْزُقُ عِبَادَهُ حَتَّى حِينَ تَنْعَدِمُ السُّبُلُ الطَّبِيعِيَّةُ. وَيُضِيفُ القُرْطُبِيُّ أَنَّ عَزْلَةَ مَرْيَمَ كَانَتْ تَطْهِيرًا، وَأَنَّ كَلاَمَ الرَّضِيعِ كَانَ آيَةَ نُبُوَّةٍ مُنَحَّةً قَبْلَ أَنْ يَتَلَقَّى تَعْلِيمًا بَشَرِيًّا.
    display_day_of_year: 71
    quran_refs: "19:16-33"
