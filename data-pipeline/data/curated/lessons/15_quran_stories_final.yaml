  - slug: quran-story-salihs-she-camel
    category: quran_story
    title_en: The She-Camel of Salih
    title_ar: ناقة صالح
    title_fr: La chamelle de Salih
    description_en: |
      The people of Thamud asked their prophet Salih for a miracle to prove his mission. He prayed, and from a solid rock emerged a she-camel, ten months pregnant — a living, breathing creature born from stone. Allah said: "This is the she-camel of Allah — a sign for you; so let her graze in Allah's earth and do not harm her, or a painful punishment will seize you." The people of Thamud, however, could not accept that a miraculous animal should drink from their wells on alternate days. They hamstrung her, killing her. Salih warned them: "Enjoy yourselves in your homes for three days — that is a promise not to be denied." On the third day, a thunderbolt destroyed them. The lesson is that demanding miracles is often a form of resistance, not sincerity; and when proof is given, rejecting it invites swift retribution.
    description_ar: |
      طلب قوم ثمود من نبيهم صالح معجزة تثبت بعثته. فدعا، فخرجت من صخرة صماء ناقة عشراء — مخلوقة حية تتنفس من حجر. قال الله: «هذه ناقة الله لكم آية فذروها تأكل في أرض الله ولا تمسوها بسوءٍ فيأخذكم عذابٌ أليم». لكن قوم ثمود لم يقبلوا أن تشرب دابة معجزة من آبارهم يوماً عن يوم. فعقروها قتلاً. فحذرهم صالح: «تمتعوا في داركم ثلاثة أيام — ذلك وعدٌ غير مكذوب». ففي اليوم الثالث، أهلكتهم الصاعقة. والدرس أن طلب المعجزات غالباً مقاومة لا إخلاص؛ وحين تُعطى الحجة، فرفضها يستجلب العقاب السريع.
    description_fr: |
      Le peuple de Thamūd demanda à son prophète Ṣāliḥ un miracle pour prouver sa mission. Il pria, et d'un rocher solide sortit une chamelle, pleine de dix mois — une créature vivante et respirante née de la pierre. Allah dit : « Voici la chamelle d'Allah pour vous — un signe ; laissez-la donc paître dans la terre d'Allah et ne lui faites pas de mal, sinon un châtiment douloureux vous saisira. » Le peuple de Thamūd, cependant, ne pouvait accepter qu'un animal miraculeux bût à leurs puits un jour sur deux. Ils lui sectionnèrent les jarrets, la tuant. Ṣāliḥ les avertit : « Jouissez dans vos demeures pendant trois jours — c'est une promesse qui ne sera pas démentie. » Le troisième jour, la foudre les détruisit. La leçon est que demander des miracles est souvent une forme de résistance, pas de sincérité ; et quand la preuve est donnée, la rejeter invite à une rétribution rapide.
    reference: "al-Shuʿarāʾ 26:141-159"
    source_notes: |
      Ibn Kathīr compiles reports that the she-camel's emergence from solid rock was a miracle of creation (*ikhrāj*), parallel to the creation of Ādam without parents. Al-Qurṭubī highlights that the camel was not merely a sign but a *mīthāq* (solemn covenant); harming her was breaking their treaty with Allah.
    source_notes_fr: |
      Ibn Kathīr compile des rapports selon lesquels la sortie de la chamelle du rocher solide fut un miracle de création (*ikhrāj*), parallèle à la création d'Ādam sans parents. Al-Qurṭubī souligne que la chamelle n'était pas simplement un signe mais un *mīthāq* (pacte solennel) ; lui faire du mal était rompre leur traité avec Allah.
    source_notes_ar: |
      يجمع ابن كثير الروايات القائلة إن خروج الناقة من الصخرة الصماء كان معجزة إخراج (*ikhrāj*) موازية لخلق آدم بلا والدين. ويُبرز القرطبي أن الناقة لم تكن مجرد آية بل ميثاقاً صاعداً؛ إيذاؤها كان نقضاً لعهدهم مع الله.
    display_day_of_year: 18
    quran_refs: "26:141-159"
    hadith_refs: ""

  - slug: quran-story-magicians-of-pharaoh
    category: quran_story
    title_en: The Magicians Who Believed in Moses
    title_ar: السحرة الذين آمنوا بموسى
    title_fr: Les magiciens qui crurent en Moïse
    description_en: |
      When Moses threw his staff before Pharaoh's court, it became a serpent that swallowed the magicians' ropes and rods. The magicians — experts in illusion — recognized immediately that this was not sleight of hand but a miracle from Allah. They fell prostrate, declaring: "We believe in the Lord of the Worlds, the Lord of Moses and Aaron!" Pharaoh, enraged that his own entertainers had defected, threatened to cut off their hands and feet on opposite sides and crucify them. They replied without hesitation: "We will never prefer you over the clear proofs that have come to us. Do whatever you will; you can only judge for this worldly life. We have believed in our Lord that He may forgive us our sins." Pharaoh crucified them, but their martyrdom became one of the most powerful testimonies in the Qur'an. The lesson is that recognition of truth requires no elaborate proof — those who know, know — and that accepting truth can cost everything, yet it is the only choice worth making.
    description_ar: |
      حين طرح موسى عصاه أمام بلاط فرعون، صارت ثعباناً ابتلع حبال السحارة وعصيهم. فعرف السحارة — خبراء الوهم — فوراً أن هذا ليس خداعاً بل معجزة من الله. فخرّوا سجداً: «آمنا برب العالمين رب موسى وهارون!» فغضب فرعون أن مُسلِّيه انشقوا عنه، فهدد بقطع أيديهم وأرجلهم من خلاف وصلبهم. فأجابوا بلا تردد: «لن نؤثرك على ما جاءنا من البينات، وافعل ما أنت فاعل إنما تقضي هذه الحياة الدنيا، قد آمنا بربنا ليغفر لنا خطايانا». فصلبهم فرعون، لكن استشهادهم صار من أقوى الشهادات في القرآن. والدرس أن التعرف على الحق لا يحتاج برهاناً معقداً — من يعرف يعرف — وأن قبول الحق قد يكلف كل شيء، لكنه الخيار الوحيد المجدي.
    description_fr: |
      Lorsque Moïse jeta son bâton devant la cour de Pharaon, il devint un serpent qui avala les cordes et les bâtons des magiciens. Les magiciens — experts en illusion — reconnurent immédiatement que ce n'était pas une tromperie mais un miracle d'Allah. Ils tombèrent en prostration, déclarant : « Nous croyons au Seigneur des Mondes, au Seigneur de Moïse et d'Aaron ! » Pharaon, furieux que ses propres divertisseurs aient fait défection, menaça de leur couper les mains et les pieds en diagonale et de les crucifier. Ils répondirent sans hésitation : « Nous ne te préférerons jamais aux preuves évidentes qui nous sont parvenues. Fais ce que tu veux ; tu ne peux juger que pour cette vie terrestre. Nous avons cru en notre Seigneur pour qu'Il nous pardonne nos péchés. » Pharaon les crucifia, mais leur martyre devint l'un des témoignages les plus puissants du Coran. La leçon est que la reconnaissance de la vérité ne nécessite pas de preuve élaborée — ceux qui savent, savent — et qu'accepter la vérité peut coûter tout, mais c'est le seul choix qui vaille la peine.
    reference: "Ṭā Hā 20:56-73"
    source_notes: |
      Ibn Kathīr highlights that the magicians' instantaneous conversion proves that sincere hearts can distinguish truth from falsehood no matter how impressive the latter appears. Al-Qurṭubī notes that their martyrdom — accepting crucifixion rather than renouncing faith — became one of the most powerful testimonies in the Qur'an.
    source_notes_fr: |
      Ibn Kathīr souligne que la conversion instantanée des magiciens prouve que les cœurs sincères peuvent distinguer le vrai du faux quelle que soit l'impression que ce dernier produit. Al-Qurṭubī note que leur martyre — accepter la crucifixion plutôt que de renier la foi — devint l'un des témoignages les plus puissants du Coran.
    source_notes_ar: |
      يُبرز ابن كثير أن إسلام السحرة فوراً يُثبت أن القلوب الصادقة تستطيع التفريق بين الحق والباطل مهما بدى الأخير مهيباً. ويلاحظ القرطبي أن استشهادهم — قبول الصلب على التراجع عن الإيمان — صار من أقوى الشهادات في القرآن.
    display_day_of_year: 19
    quran_refs: "20:56-73"
    hadith_refs: ""

  - slug: quran-story-dhul-qarnayn
    category: quran_story
    title_en: Dhul-Qarnayn and the Barrier of Ya'juj and Ma'juj
    title_ar: ذو القرنين وسد يأجوج ومأجوج
    title_fr: Dhū al-Qarnayn et la barrière de Yaʾjūj et Maʾjūj
    description_en: |
      Dhul-Qarnayn — "the Two-Horned One," a righteous king granted vast power and knowledge by Allah — traveled to the ends of the earth. In one direction, he found a people living between two mountains, terrorized by the hordes of Ya'juj and Ma'juj (Gog and Magog), who would raid and devastate their lands. They offered him tribute if he would build a barrier between them. Dhul-Qarnayn constructed a massive wall of iron and molten copper, sealing the pass completely. He said: "This is a mercy from my Lord. But when the promise of my Lord comes, He will level it to dust." The Qur'an presents Dhul-Qarnayn not as a conqueror but as a just ruler who used his power to protect the weak and acknowledged that all his achievements were temporary before Allah's decree. The lesson is that power is legitimate only when it serves justice, and that every human construction — however mighty — is subject to divine will.
    description_ar: |
      ذو القرنين — «صاحب القرنين»، ملك صالح مُنعَم عليه بقوة وعلم واسعين من الله — سافر إلى أطراف الأرض. في جهة، وجد قوماً يعيشون بين جبلين، يُرهبهم جحافل يأجوج ومأجوج، الذين يغيرون ويُخربون أرضهم. عرضوا عليه الجزية لو بنا سداً بينهم. فبنى ذو القرنين حائطاً ضخماً من الحديد والنحاس المذاب، فأغلق الممر تماماً. قال: «هذا رحمة من ربي، فإذا جاء وعد ربي جعله دكاء». يقدم القرآن ذا القرنين لا فاتحاً بل حاكماً عادلاً استخدم قوته لحماية الضعفاء وأقر بأن جميع إنجازاته مؤقتة أمام قضاء الله. والدرس أن القوة مشروعة فقط حين تخدم العدل، وأن كل بناء بشري — ولو كان عظيماً — خاضع لمشيئة الله.
    description_fr: |
      Dhū al-Qarnayn — « Celui aux deux cornes », un roi juste à qui Allah avait accordé une vaste puissance et connaissance — voyagea jusqu'aux confins de la terre. Dans une direction, il trouva un peuple vivant entre deux montagnes, terrorisé par les hordes de Yaʾjūj et Maʾjūj (Gog et Magog), qui pillaient et dévastaient leurs terres. Ils lui offrirent un tribut s'il construisait une barrière entre eux. Dhū al-Qarnayn construisit un mur massif de fer et de cuivre fondu, scellant complètement le passage. Il dit : « C'est une miséricorde de mon Seigneur. Mais quand la promesse de mon Seigneur arrivera, Il le réduira en poussière. » Le Coran présente Dhū al-Qarnayn non pas comme un conquérant mais comme un souverain juste qui utilisa son pouvoir pour protéger les faibles et reconnut que tous ses accomplissements étaient temporaires devant le décret divin. La leçon est que le pouvoir n'est légitime que lorsqu'il sert la justice, et que toute construction humaine — si puissante soit-elle — est soumise à la volonté divine.
    reference: "al-Kahf 18:83-98"
    source_notes: |
      Ibn Kathīr notes that Dhū al-Qarnayn is presented not as a conqueror but as a just ruler who used his power to protect the weak and acknowledged that all achievements are temporary before Allah's decree. Al-Qurṭubī adds that the iron and copper barrier demonstrates that legitimate power serves justice, and that every human construction — however mighty — is subject to divine will.
    source_notes_fr: |
      Ibn Kathīr note que Dhū al-Qarnayn est présenté non pas comme un conquérant mais comme un souverain juste qui utilisa son pouvoir pour protéger les faibles et reconnut que tous ses accomplissements étaient temporaires devant le décret d'Allah. Al-Qurṭubī ajoute que la barrière de fer et de cuivre démontre que le pouvoir légitime sert la justice, et que toute construction humaine — si puissante soit-elle — est soumise à la volonté divine.
    source_notes_ar: |
      يُشير ابن كثير إلى أن ذا القرنين مُقدّم لا فاتحاً بل حاكماً عادلاً استخدم قوته لحماية الضعفاء وأقرّ بأن جميع إنجازاته مؤقتة أمام قضاء الله. ويضيف القرطبي أن السد الحديدي النحاسي يُثبت أن القوة المشروعة تخدم العدل، وأن كل بناء بشري — ولو كان عظيماً — خاضع لمشيئة الله.
    display_day_of_year: 20
    quran_refs: "18:83-98"
    hadith_refs: ""
