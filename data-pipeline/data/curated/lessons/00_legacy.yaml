  # FAMOUS AUTHENTIC HADITH NARRATIVES
  # =========================================================================

  - slug: hadith-of-jibril
    category: hadith_narrative
    title_en: The Hadith of Jibril (the Three Degrees of Religion)
    title_ar: حَدِيثُ جِبْرِيلَ — مَرَاتِبُ الدِّينِ الثَّلَاثُ
    title_fr: Le ḥadīth de Jibrīl (les trois degrés de la religion)
    description_en: |
      Umar ibn al-Khattab narrated: a man with very white clothing and very
      black hair came to the Prophet ﷺ. No one recognized him as a traveler,
      yet no one among us knew him. He sat with his knees touching the
      Prophet's ﷺ knees and asked: "What is Islam?" "What is Iman?" "What is
      Ihsan?" and "When is the Hour?" After he left, the Prophet ﷺ said: "That
      was Jibril. He came to you to teach you your religion." The hadith is
      considered the most comprehensive summary of the three degrees of din.
    description_ar: |
      رَوَى عُمَرُ بْنُ الخَطَّابِ رَضِيَ اللهُ عَنْهُ: أَتَى النَّبِيَّ ﷺ
      رَجُلٌ شَدِيدُ بَيَاضِ الثِّيَابِ شَدِيدُ سَوَادِ الشَّعْرِ، لَا يُرَى
      عَلَيْهِ أَثَرُ السَّفَرِ، وَلَا يَعْرِفُهُ مِنَّا أَحَدٌ. فَجَلَسَ
      إِلَى النَّبِيِّ ﷺ فَأَسْنَدَ رُكْبَتَيْهِ إِلَى رُكْبَتَيْهِ، وَسَأَلَهُ:
      "مَا الإِسْلَامُ؟" "وَمَا الإِيمَانُ؟" "وَمَا الإِحْسَانُ؟" "وَمَتَى
      السَّاعَةُ؟". فَلَمَّا انْصَرَفَ قَالَ النَّبِيُّ ﷺ: "ذَاكَ جِبْرِيلُ
      أَتَاكُمْ يُعَلِّمُكُمْ دِينَكُمْ". وَيُعَدُّ هَذَا الحَدِيثُ مِنْ
      أَجْمَعِ الأَحَادِيثِ لِبَيَانِ مَرَاتِبِ الدِّينِ الثَّلَاثِ.
    description_fr: |
      ʿUmar ibn al-Khaṭṭāb a rapporté : un homme aux vêtements d'un blanc
      éclatant et aux cheveux d'un noir intense vint au Prophète ﷺ. Aucune
      trace de voyage n'apparaissait sur lui, et nul parmi nous ne le
      connaissait. Il s'assit, ses genoux touchant les genoux du Prophète
      ﷺ, et demanda : "Qu'est-ce que l'Islām ?" "Qu'est-ce que l'Īmān ?"
      "Qu'est-ce que l'Iḥsān ?" et "Quand viendra l'Heure ?" Après son
      départ, le Prophète ﷺ dit : "C'était Jibrīl. Il est venu à vous pour
      vous enseigner votre religion." Ce ḥadīth est considéré comme le
      résumé le plus complet des trois degrés de la dīn.
    reference: Sahih Muslim 8, Sahih al-Bukhari 50
    hadith_refs: "Bukhari 50, Muslim 8"
    source_url: https://sunnah.com/muslim:8
    source_notes: |
      Imām al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 1:103–110) calls this hadith 'the pivot of Islam' (quṭb al-Islām) and devotes extensive commentary to each of the three levels. Ibn Ḥajar (Fatḥ al-Bārī, 1:120) explains that Jibrīl’s appearance in human form—without being recognized—was a miracle intended to make the teaching unforgettable.
    source_notes_fr: |
      L'imām al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 1:103–110) qualifie ce ḥadīth de « pivot de l'Islam » (quṭb al-Islām) et consacre un commentaire détaillé à chacun des trois niveaux. Ibn Ḥajar (Fatḥ al-Bārī, 1:120) explique que l'apparition de Jibrīl en forme humaine — sans être reconnu — était un miracle destiné à graver l'enseignement dans les mémoires.
    source_notes_ar: |
      يُسَمِّي الإِمَامُ النَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١:١٠٣–١١٠) هَذَا الحَدِيثَ «قُطْبَ الإِسْلَامِ» وَيُفَصِّلُ الشَّرْحَ لِكُلٍّ مِنَ المَرَاتِبِ الثَّلَاثِ. يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١:١٢٠) أَنَّ تَجَسُّدَ جِبْرِيلَ فِي صُورَةِ بَشَرٍ — بِدُونِ أَنْ يُتَعَرَّفَ — كَانَ مُعْجِزَةً هَدَفُهَا جَعْلُ التَّعْلِيمِ غَيْرَ مَنْسِيٍّ.
    display_day_of_year: 10

  - slug: hadith-three-men-in-cave
    category: hadith_narrative
    title_en: The Three Men Trapped in the Cave
    title_ar: حَدِيثُ الثَّلَاثَةِ الَّذِينَ أَوَوْا إِلَى الغَارِ
    title_fr: Les trois hommes piégés dans la caverne
    description_en: |
      Three men took shelter in a cave which was then sealed by a rolling
      boulder. Each prayed by a righteous deed: one by his care for his
      elderly parents; one by his fear of Allah that made him leave an act of
      sin despite the opportunity; one by his returning many years later an
      employee's wage that had grown through investment. After each
      supplication the rock moved, and on the third they emerged. The hadith
      teaches the immense power of sincere deeds done purely for Allah's sake.
    description_ar: |
      ثَلَاثَةٌ أَوَوْا إِلَى غَارٍ، فَانْحَدَرَتْ صَخْرَةٌ سَدَّتْ عَلَيْهِمْ
      بَابَهُ. فَتَوَسَّلَ كُلُّ وَاحِدٍ مِنْهُمْ إِلَى اللهِ بِعَمَلٍ
      صَالِحٍ: تَوَسَّلَ الأَوَّلُ بِبِرِّهِ بِوَالِدَيْهِ الكَبِيرَيْنِ،
      وَالثَّانِي بِخَوْفِهِ مِنَ اللهِ الَّذِي حَمَلَهُ عَلَى تَرْكِ
      المَعْصِيَةِ مَعَ القُدْرَةِ، وَالثَّالِثُ بِأَدَائِهِ أُجْرَةَ
      أَجِيرٍ بَعْدَ سِنِينَ بَعْدَ أَنْ نَمَّاهَا لَهُ. وَكُلَّمَا دَعَا
      أَحَدُهُمْ تَحَرَّكَتِ الصَّخْرَةُ، حَتَّى انْفَرَجَتْ بِالدَّعْوَةِ
      الثَّالِثَةِ فَخَرَجُوا. وَفِي الحَدِيثِ بَيَانُ عَظِيمِ أَثَرِ
      الأَعْمَالِ الخَالِصَةِ للهِ.
    description_fr: |
      Trois hommes s'abritèrent dans une caverne dont l'entrée fut scellée
      par un rocher roulant. Chacun invoqua par un acte vertueux : l'un par
      ses soins envers ses parents âgés ; l'un par sa crainte d'Allah qui
      lui fit délaisser un acte de péché malgré l'occasion ; l'un par sa
      restitution, des années plus tard, du salaire d'un employé qu'il
      avait fait fructifier. Après chaque invocation le rocher s'écarta,
      et au troisième ils sortirent. Le ḥadīth enseigne l'immense pouvoir
      des actes sincères accomplis purement pour Allah.
    reference: Sahih al-Bukhari 2215, Sahih Muslim 2743
    hadith_refs: "Bukhari 2215, Muslim 2743"
    source_url: https://sunnah.com/bukhari:2215
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 6:350) and al-ʿAynī (ʿUmdat al-Qārī, 12:180) note that this hadith demonstrates the legitimacy of tawassul through righteous deeds, provided one does not attribute independent efficacy to the deed itself. The story is ṣaḥīḥ and is frequently cited by scholars of taṣawwuf and fiqh alike.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 6:350) et al-ʿAynī (ʿUmdat al-Qārī, 12:180) notent que ce ḥadīth démontre la légitimité du tawassul par les œuvres vertueuses, à condition de ne pas attribuer d'efficacité indépendante à l'acte lui-même. L'histoire est ṣaḥīḥ et est fréquemment citée par les savants de taṣawwuf et de fiqh.
    source_notes_ar: |
      يُلَاحِظُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٦:٣٥٠) وَالعَيْنِيُّ (عُمْدَةُ القَارِي، ١٢:١٨٠) أَنَّ هَذَا الحَدِيثَ يُثْبِتُ جَوَازَ التَّوَسُّلِ بِالأَعْمَالِ الصَّالِحَةِ، مَا لَمْ يُنْسَبْ لِلْعَمَلِ نَفْسِهِ فِعْلٌ مُسْتَقِلٌّ. وَالقِصَّةُ صَحِيحَةٌ وَتُسْتَشْهَدُ بِهَا كَثِيرًا فِي كُتُبِ التَّصَوُّفِ وَالفِقْهِ عَلَى السَّوَاءِ.
    display_day_of_year: 40

  - slug: hadith-of-ihsan
    category: hadith_narrative
    title_en: "Worship Allah as if You See Him"
    title_ar: "اعْبُدِ اللهَ كَأَنَّكَ تَرَاهُ"
    title_fr: "Adore Allah comme si tu Le voyais"
    description_en: |
      From the same Hadith of Jibril: when asked "What is Ihsan?" the Prophet
      ﷺ replied: "Ihsan is that you worship Allah as though you see Him; and
      if you do not see Him, then indeed He sees you." This definition
      condenses the whole spiritual dimension of the religion — the
      cultivation of a constant awareness (muraqaba) of Allah's presence in
      every act, word, and thought.
    description_ar: |
      مِنْ حَدِيثِ جِبْرِيلَ نَفْسِهِ: لَمَّا سُئِلَ النَّبِيُّ ﷺ "مَا
      الإِحْسَانُ؟" قَالَ: "الإِحْسَانُ أَنْ تَعْبُدَ اللهَ كَأَنَّكَ
      تَرَاهُ، فَإِنْ لَمْ تَكُنْ تَرَاهُ فَإِنَّهُ يَرَاكَ". وَيُلَخِّصُ
      هَذَا التَّعْرِيفُ البُعْدَ الرُّوحِيَّ كُلَّهُ فِي الدِّينِ —
      اسْتِشْعَارُ المُرَاقَبَةِ الدَّائِمَةِ لِحُضُورِ اللهِ فِي كُلِّ
      فِعْلٍ وَقَوْلٍ وَخَاطِرٍ.
    description_fr: |
      Du même ḥadīth de Jibrīl : interrogé "Qu'est-ce que l'Iḥsān ?", le
      Prophète ﷺ répondit : "L'Iḥsān, c'est que tu adores Allah comme si
      tu Le voyais ; et si tu ne Le vois pas, certes Lui te voit." Cette
      définition condense toute la dimension spirituelle de la religion —
      la culture d'une conscience constante (murāqaba) de la présence
      d'Allah dans chaque acte, parole et pensée.
    reference: Sahih Muslim 8
    hadith_refs: "Muslim 8"
    source_url: https://sunnah.com/muslim:8
    source_notes: |
      Al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 1:108) explains iḥsān as the perfection of worship through constant awareness of Allah’s presence (murāqaba), a station above bare Islām and īmān. Ibn Rajab al-Ḥanbalī (Jāmiʿ al-ʿUlūm wa-l-Ḥikam, 1:55) devotes a chapter to this definition as the foundation of spiritual excellence in Sunni tradition.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 1:108) explique l'iḥsān comme la perfection de l'adoration par la conscience constante de la présence d'Allah (murāqaba), un degré au-delà de l'Islām et de l'īmān simples. Ibn Rajab al-Ḥanbalī (Jāmiʿ al-ʿUlūm wa-l-Ḥikam, 1:55) consacre un chapitre à cette définition comme fondement de l'excellence spirituelle dans la tradition sunnite.
    source_notes_ar: |
      يُفَسِّرُ النَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١:١٠٨) الإِحْسَانَ بِأَنَّهُ كَمَالُ العِبَادَةِ بِاسْتِشْعَارِ حُضُورِ اللهِ الدَّائِمِ (المُرَاقَبَةِ)، وَهُوَ مَقَامٌ فَوْقَ الإِسْلَامِ وَالإِيمَانِ المُجَرَّدَيْنِ. وَيُخَصِّصُ ابنُ رَجَبٍ الحَنْبَلِيُّ (جَامِعُ العُلُومِ وَالحِكَمِ، ١:٥٥) فَصْلًا لِهَذَا التَّعْرِيفِ كَأَسَاسٍ لِلتَّمَيُّزِ الرُّوحِيِّ فِي التُّرَاثِ السُّنِّيِّ.
    display_day_of_year: 70

  - slug: hadith-intention
    category: hadith_narrative
    title_en: "Actions Are by Intentions"
    title_ar: "إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ"
    title_fr: "Les actes ne valent que par les intentions"
    description_en: |
      Umar ibn al-Khattab narrated that the Prophet ﷺ said: "Actions are but
      by intentions, and every person will have only what he intended. So
      whoever's migration was to Allah and His Messenger, his migration is
      to Allah and His Messenger; and whoever's migration was to attain some
      worldly goal or to marry a woman, his migration is to that which he
      migrated for." Imam al-Bukhari placed this hadith at the very start of
      his Sahih, and Imam al-Shafi'i said it is one-third of all knowledge.
    description_ar: |
      رَوَى عُمَرُ بْنُ الخَطَّابِ رَضِيَ اللهُ عَنْهُ أَنَّ النَّبِيَّ ﷺ
      قَالَ: "إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ
      مَا نَوَى، فَمَنْ كَانَتْ هِجْرَتُهُ إِلَى اللهِ وَرَسُولِهِ
      فَهِجْرَتُهُ إِلَى اللهِ وَرَسُولِهِ، وَمَنْ كَانَتْ هِجْرَتُهُ
      لِدُنْيَا يُصِيبُهَا أَوِ امْرَأَةٍ يَنْكِحُهَا فَهِجْرَتُهُ إِلَى
      مَا هَاجَرَ إِلَيْهِ". وَقَدِ افْتَتَحَ الإِمَامُ البُخَارِيُّ
      صَحِيحَهُ بِهَذَا الحَدِيثِ، وَقَالَ الإِمَامُ الشَّافِعِيُّ: هُوَ
      ثُلُثُ العِلْمِ.
    description_fr: |
      ʿUmar ibn al-Khaṭṭāb a rapporté que le Prophète ﷺ a dit : "Les actes
      ne valent que par les intentions, et chacun n'aura que ce qu'il a eu
      pour intention. Celui dont l'émigration fut vers Allah et Son
      Messager, son émigration est vers Allah et Son Messager ; et celui
      dont l'émigration fut pour atteindre un but mondain ou épouser une
      femme, son émigration est vers ce vers quoi il a émigré." L'imām
      al-Bukhārī a placé ce ḥadīth à l'ouverture même de son Ṣaḥīḥ, et
      l'imām al-Shāfiʿī a dit qu'il représente le tiers de la science.
    reference: Sahih al-Bukhari 1, Sahih Muslim 1907
    hadith_refs: "Bukhari 1, Muslim 1907"
    source_url: https://sunnah.com/bukhari:1
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 1:9–15) provides a comprehensive commentary on why Imām al-Bukhārī opened his Ṣaḥīḥ with this hadith, noting that intention transforms outward acts into worship or sin. Imām al-Shāfiʿī’s statement that it is 'one-third of knowledge' is recorded by al-Bayhaqī in Maʿrifat al-Sunan wa-l-Āthār (1:220).
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 1:9–15) offre un commentaire complet sur la raison pour laquelle l'imām al-Bukhārī a ouvert son Ṣaḥīḥ par ce ḥadīth, notant que l'intention transforme les actes extérieurs en adoration ou en péché. La déclaration de l'imām al-Shāfiʿī selon laquelle il constitue « le tiers de la science » est rapportée par al-Bayhaqī dans Maʿrifat al-Sunan wa-l-Āthār (1:220).
    source_notes_ar: |
      يُقَدِّمُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١:٩–١٥) شَرْحًا جَامِعًا لِمَاذَا افتَتَحَ الإِمَامُ البُخَارِيُّ صَحِيحَهُ بِهَذَا الحَدِيثِ، مُشِيرًا إِلَى أَنَّ النِّيَّةَ تُحَوِّلُ الأَعْمَالَ الظَّاهِرَةَ إِمَّا إِلَى عِبَادَةٍ وَإِمَّا إِلَى مَعْصِيَةٍ. وَتَرْجِعُ عِبَارَةُ الإِمَامِ الشَّافِعِيِّ بِأَنَّهُ «ثُلُثُ العِلْمِ» إِلَى البَيْهَقِيِّ فِي مَعْرِفَةِ السُّنَنِ وَالآثَارِ (١:٢٢٠).
    display_day_of_year: 100

  - slug: hadith-two-words-beloved
    category: hadith_narrative
    title_en: "Two Words Beloved to the Most Merciful"
    title_ar: "كَلِمَتَانِ حَبِيبَتَانِ إِلَى الرَّحْمَنِ"
    title_fr: "Deux paroles chères au Tout-Miséricordieux"
    description_en: |
      The Prophet ﷺ said: "Two words are light on the tongue, heavy on the
      scale, and beloved to the Most Merciful: Subhan Allah wa bi-hamdih,
      Subhan Allah al-'Azim" (Glory be to Allah and His praise; glory be to
      Allah the Magnificent). The hadith is among the shortest and most
      practical teachings of the Prophet ﷺ on the virtues of remembrance.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ،
      ثَقِيلَتَانِ فِي المِيزَانِ، حَبِيبَتَانِ إِلَى الرَّحْمَنِ:
      سُبْحَانَ اللهِ وَبِحَمْدِهِ، سُبْحَانَ اللهِ العَظِيمِ". وَهَذَا
      الحَدِيثُ مِنْ أَخْصَرِ مَا عَلَّمَ النَّبِيُّ ﷺ وَأَيْسَرِهِ
      عَمَلًا فِي فَضَائِلِ الذِّكْرِ.
    description_fr: |
      Le Prophète ﷺ a dit : "Deux paroles sont légères sur la langue,
      lourdes dans la balance, et chères au Tout-Miséricordieux : Subḥān
      Allāh wa bi-ḥamdih, Subḥān Allāh al-ʿAẓīm" (Gloire à Allah et louange
      à Lui ; gloire à Allah le Magnifique). Ce ḥadīth figure parmi les
      enseignements les plus courts et les plus pratiques du Prophète ﷺ
      sur les vertus du dhikr.
    reference: Sahih al-Bukhari 6682, Sahih Muslim 2694
    hadith_refs: "Bukhari 6682, Muslim 2694"
    source_url: https://sunnah.com/bukhari:6682
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 11:210) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 17:65) note that these phrases are among the most reward-heavy forms of dhikr because they combine tasbīḥ, taḥmīd, and magnification of Allah. The hadith is mutawātir in meaning across multiple authentic chains.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 11:210) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 17:65) notent que ces phrases comptent parmi les formes de dhikr les plus rémunératrices car elles combinent tasbīḥ, taḥmīd et magnification d'Allah. Le ḥadīth est mutawātir en sens à travers de multiples chaînes authentiques.
    source_notes_ar: |
      يُلَاحِظُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١١:٢١٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٧:٦٥) أَنَّ هَاتَيْنِ العِبَارَتَيْنِ مِنْ أَكْثَرِ أَنْوَاعِ الذِّكْرِ أَجْرًا لِأَنَّهُمَا يَجْمَعَانِ التَّسْبِيحَ وَالتَّحْمِيدَ وَتَعْظِيمَ اللهِ. وَهَذَا الحَدِيثُ مُتَوَاتِرُ المَعْنَى فِي طُرُقٍ صَحِيحَةٍ مُتَعَدِّدَةٍ.
    display_day_of_year: 130

  - slug: hadith-forty-for-allah
    category: hadith_narrative
    title_en: "Whoever Worships Allah Sincerely for Forty Days"
    title_ar: "مَنْ أَخْلَصَ للهِ أَرْبَعِينَ يَوْمًا"
    title_fr: "Quiconque est sincère envers Allah pendant quarante jours"
    description_en: |
      The Prophet ﷺ taught: "Whoever is sincere to Allah for forty days, the
      springs of wisdom will appear from his heart upon his tongue." While
      the hadith is classified by some scholars as weak in isnad, its meaning
      is reflected in numerous sound traditions on the fruits of sincerity
      (ikhlas) and constancy. The principle — consistency of small righteous
      acts producing transformation — is affirmed by "The most beloved deeds
      to Allah are those done regularly, even if few" (Bukhari).
    description_ar: |
      وَرَدَ فِي بَعْضِ الرِّوَايَاتِ: "مَنْ أَخْلَصَ للهِ أَرْبَعِينَ
      صَبَاحًا، ظَهَرَتْ يَنَابِيعُ الحِكْمَةِ مِنْ قَلْبِهِ عَلَى
      لِسَانِهِ". وَقَدْ حَكَمَ بَعْضُ أَهْلِ الحَدِيثِ بِضَعْفِ إِسْنَادِ
      هَذَا الخَبَرِ، غَيْرَ أَنَّ مَعْنَاهُ تُعَضِّدُهُ نُصُوصٌ صَحِيحَةٌ
      كَثِيرَةٌ فِي ثَمَرَاتِ الإِخْلَاصِ وَالمُدَاوَمَةِ. وَهَذَا الأَصْلُ
      — أَنَّ المُدَاوَمَةَ عَلَى الأَعْمَالِ الصَّالِحَةِ القَلِيلَةِ
      تُحْدِثُ التَّغْيِيرَ — يُؤَكِّدُهُ قَوْلُ النَّبِيِّ ﷺ: "أَحَبُّ
      الأَعْمَالِ إِلَى اللهِ أَدْوَمُهَا وَإِنْ قَلَّ" (البُخَارِيُّ).
    description_fr: |
      Le Prophète ﷺ aurait enseigné : "Quiconque est sincère envers Allah
      pendant quarante jours, les sources de la sagesse jailliront de son
      cœur sur sa langue." Bien que ce ḥadīth soit classé faible (ḍaʿīf)
      dans son isnād par certains spécialistes, son sens se reflète dans
      de nombreuses traditions authentiques sur les fruits de la sincérité
      (ikhlāṣ) et de la constance. Le principe — la régularité de petits
      actes vertueux produisant une transformation — est confirmé par : "Les
      actes les plus aimés d'Allah sont ceux qui sont accomplis avec
      régularité, même s'ils sont peu nombreux" (al-Bukhārī).
    reference: Sahih al-Bukhari 6464 (on the cited principle)
    hadith_refs: "Bukhari 6464"
    source_url: https://sunnah.com/bukhari:6464
    source_notes: |
      Ibn al-Jawzī (al-Mawḍūʿāt, 2:214) and al-Suyūṭī (al-Laʾāliʾ al-Maṣnūʿa, 2:300) classify the specific wording about forty days as weak (ḍaʿīf) or fabricated. However, the underlying principle—that sincerity and constancy produce spiritual clarity—is sound and supported by authentic hadith such as 'Allah does not look at your forms but at your hearts' (Muslim 2564).
    source_notes_fr: |
      Ibn al-Jawzī (al-Mawḍūʿāt, 2:214) et al-Suyūṭī (al-Laʾāliʾ al-Maṣnūʿa, 2:300) classent le libellé spécifique sur quarante jours comme faible (ḍaʿīf) ou fabriqué. Cependant, le principe sous-jacent — que la sincérité et la constance produisent la clarté spirituelle — est solide et étayé par des hadiths authentiques tels que 'Allah ne regarde pas vos formes mais vos cœurs' (Muslim 2564).
    source_notes_ar: |
      يُصَنِّفُ ابنُ الجَوْزِيِّ (المَوْضُوعَاتُ، ٢:٢١٤) وَالسُّيُوطِيُّ (اللَّآلِئُ المَصْنُوعَةُ، ٢:٣٠٠) اللَّفْظَ الخَاصَّ بِالأَرْبَعِينَ يَوْمًا ضَعِيفًا أَوْ مَوْضُوعًا. غَيْرَ أَنَّ الأَصْلَ الْمُتَجَسِّدَ — أَنَّ الإِخْلَاصَ وَالمُدَاوَمَةَ يُنْتِجَانِ الوُضُوحَ الرُّوحِيَّ — ثَابِتٌ وَمُؤَيَّدٌ بِأَحَادِيثَ صَحِيحَةٍ مِثْلَ «إِنَّ اللهَ لاَ يَنْظُرُ إِلَى صُوَرِكُمْ وَلَكِنْ يَنْظُرُ إِلَى قُلُوبِكُمْ» (مُسْلِمٌ ٢٥٦٤).
    display_day_of_year: 160

  - slug: hadith-mercy-to-child
    category: hadith_narrative
    title_en: "He Who Does Not Show Mercy"
    title_ar: "مَنْ لَا يَرْحَمُ النَّاسَ"
    title_fr: "Celui qui ne fait pas miséricorde"
    description_en: |
      Al-Aqra' ibn Habis came to the Prophet ﷺ — astonished that he kissed
      his grandchildren — and said: "I have ten children and I have never
      kissed any of them." The Prophet ﷺ replied: "Can I put mercy in your
      heart if Allah has removed it?" The hadith reveals the central place
      of mercy in prophetic character. The companion narration "He who
      does not show mercy to our young ones nor honor our elders is not
      one of us" is well-attested in Tirmidhi 1919 (graded Hasan) on the
      principle of mercy to the young, though that narration's framing
      differs from the al-Aqra' incident above.
    description_ar: |
      جَاءَ الأَقْرَعُ بْنُ حَابِسٍ إِلَى النَّبِيِّ ﷺ مُتَعَجِّبًا حِينَ
      رَآهُ يُقَبِّلُ سِبْطَيْهِ، فَقَالَ: "إِنَّ لِي عَشَرَةً مِنَ الوَلَدِ،
      مَا قَبَّلْتُ مِنْهُمْ أَحَدًا". فَقَالَ النَّبِيُّ ﷺ: "أَوَأَمْلِكُ
      لَكَ أَنْ نَزَعَ اللهُ مِنْ قَلْبِكَ الرَّحْمَةَ؟". وَفِي الحَدِيثِ
      بَيَانُ مَنْزِلَةِ الرَّحْمَةِ فِي خُلُقِ النَّبِيِّ ﷺ. وَفِي رِوَايَةٍ
      صَحَّحَهَا التِّرْمِذِيُّ (1919) — وَهُوَ حَدِيثٌ حَسَنٌ —: "لَيْسَ
      مِنَّا مَنْ لَمْ يَرْحَمْ صَغِيرَنَا وَيُوَقِّرْ كَبِيرَنَا"، وَهِيَ
      رِوَايَةٌ مُسْتَقِلَّةٌ عَنْ حَادِثَةِ الأَقْرَعِ.
    description_fr: |
      Al-Aqraʿ ibn Ḥābis vint au Prophète ﷺ — étonné qu'il embrassât ses
      petits-enfants — et dit : "J'ai dix enfants et je n'en ai jamais
      embrassé un seul." Le Prophète ﷺ répondit : "Puis-je mettre la
      miséricorde dans ton cœur si Allah l'en a retirée ?" Le ḥadīth
      révèle la place centrale de la miséricorde dans le caractère
      prophétique. La narration apparentée "N'est pas des nôtres celui
      qui ne fait pas miséricorde à nos jeunes ni n'honore nos aînés"
      est bien attestée dans Tirmidhī 1919 (gradé ḥasan) — bien que son
      cadre diffère de l'incident d'al-Aqraʿ ci-dessus.
    reference: Sahih al-Bukhari 5997
    hadith_refs: "Bukhari 5997"
    source_url: https://sunnah.com/bukhari:5997
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:440) notes that the Prophet’s ﷺ kissing of his grandsons—Ḥasan and Ḥusayn ra—was a deliberate teaching against the sternness some Arabs associated with manhood. The companion narration on mercy to the young and honoring elders is graded ḥasan by al-Tirmidhī and ṣaḥīḥ by Ibn Ḥibbān, forming a cornerstone of Islamic ethics.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:440) note que le baiser du Prophète ﷺ à ses petits-fils — Ḥasan et Ḥusayn (qu'Allah les agrée) — était un enseignement délibéré contre la sévérité que certains Arabes associaient à la virilité. La narration compagnonne sur la miséricorde envers les jeunes et le respect des aînés est gradée ḥasan par al-Tirmidhī et ṣaḥīḥ par Ibn Ḥibbān, formant une pierre angulaire de l'éthique islamique.
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١٠:٤٤٠) أَنَّ تَقْبِيلَ النَّبِيِّ ﷺ لأَحْفَادِهِ — الحَسَنِ وَالحُسَيْنِ رَضِيَ اللهُ عَنْهُمَا — كَانَ تَعْلِيمًا مُتَعَمَّدًا ضِدَّ القَسْوَةِ الَّتِي رَبَطَهَا بَعْضُ العَرَبِ بِالرُّجُولَةِ. وَالرِّوَايَةُ المُرَافِقَةُ عَنِ الرَّحْمَةِ بِالصِّغَارِ وَإِكْرَامِ الكِبَارِ حَسَنَةٌ عِنْدَ التِّرْمِذِيِّ وَصَحِيحَةٌ عِنْدَ ابنِ حِبَّانٍ، وَهِيَ رُكْنٌ مِنْ أَرْكَانِ الأَخْلاَقِ الإِسْلاَمِيَّةِ.
    display_day_of_year: 190

  - slug: hadith-smile-charity
    category: hadith_narrative
    title_en: "Your Smile to Your Brother Is Charity"
    title_ar: "تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ صَدَقَةٌ"
    title_fr: "Ton sourire à ton frère est une aumône"
    description_en: |
      The Prophet ﷺ said: "Your smile to your brother is charity." And:
      "Do not belittle any act of kindness, even meeting your brother with a
      cheerful face." The hadith reframes charity (sadaqa) not as a matter of
      wealth alone but as a constant attitude of generosity — one that every
      Muslim, regardless of means, can practice continuously.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "تَبَسُّمُكَ فِي وَجْهِ أَخِيكَ لَكَ صَدَقَةٌ".
      وَقَالَ: "لَا تَحْقِرَنَّ مِنَ المَعْرُوفِ شَيْئًا وَلَوْ أَنْ
      تَلْقَى أَخَاكَ بِوَجْهٍ طَلْقٍ". وَفِي الحَدِيثِ تَوْسِيعٌ لِمَفْهُومِ
      الصَّدَقَةِ، فَلَيْسَتْ بِالمَالِ وَحْدَهُ، بَلْ هِيَ سَجِيَّةٌ
      دَائِمَةٌ مِنَ الكَرَمِ يَسَعُ كُلَّ مُسْلِمٍ أَنْ يُمَارِسَهَا.
    description_fr: |
      Le Prophète ﷺ a dit : "Ton sourire à ton frère est une aumône." Et :
      "Ne méprise aucun acte de bienfaisance, même rencontrer ton frère
      avec un visage radieux." Le ḥadīth recadre l'aumône (ṣadaqa) non plus
      comme une question de richesse seule, mais comme une attitude
      constante de générosité — que tout musulman, quels que soient ses
      moyens, peut pratiquer sans relâche.
    reference: Sahih Muslim 2626
    hadith_refs: "Muslim 2626"
    source_url: https://sunnah.com/muslim:2626
    source_notes: |
      Al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:120) explains that ṣadaqa in Islamic law usually refers to voluntary charity, but the Prophet ﷺ extended the term to every beneficial interaction. Ibn Ḥajar (Fatḥ al-Bārī, 9:380) records that the companion narration on meeting with a cheerful face is found in Ṣaḥīḥ Muslim and strengthens the broader meaning.
    source_notes_fr: |
      Al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:120) explique que la ṣadaqa en droit islamique désigne habituellement la charité volontaire, mais que le Prophète ﷺ a étendu le terme à toute interaction bénéfique. Ibn Ḥajar (Fatḥ al-Bārī, 9:380) rapporte que la narration compagnonne sur l'accueil avec un visage radieux se trouve dans Ṣaḥīḥ Muslim et renforce le sens élargi.
    source_notes_ar: |
      يُفَسِّرُ النَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٦:١٢٠) أَنَّ الصَّدَقَةَ فِي الشَّرِيعَةِ تُطْلَقُ عَلَى العَطِيَّةِ التَّطَوُّعِيَّةِ، غَيْرَ أَنَّ النَّبِيَّ ﷺ وَسَّعَ مَفْهُومَهَا لِيَشْمَلَ كُلَّ تَعَامُلٍ نَافِعٍ. وَيَنْقُلُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٩:٣٨٠) أَنَّ الرِّوَايَةَ المُرَافِقَةَ عَنِ اللِّقَاءِ بِوَجْهٍ طَلْقٍ وَارِدَةٌ فِي صَحِيحِ مُسْلِمٍ وَتُعَزِّزُ المَعْنَى الأَعْمَ.
    display_day_of_year: 220

  - slug: hadith-seek-knowledge-china
    category: hadith_narrative
    title_en: "Seeking Knowledge Is Obligatory upon Every Muslim"
    title_ar: "طَلَبُ العِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ"
    title_fr: "La quête du savoir est une obligation pour tout musulman"
    description_en: |
      The Prophet ﷺ said: "Whoever travels a path seeking knowledge,
      Allah will make easy for him a path to Paradise" (Sahih Muslim
      2699). The complementary phrase "Seeking knowledge is an
      obligation upon every Muslim" appears in Sunan Ibn Majah 224 — its
      isnad is graded da'if jiddan (very weak) by hadith specialists,
      though the matn (meaning) is corroborated through multiple paths
      and is widely accepted in usul al-fiqh. Scholars from Imam
      al-Shafi'i onward have understood this obligation to cover the
      knowledge every Muslim needs of their religion: purification,
      prayer, lawful and unlawful, and matters of belief.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا،
      سَهَّلَ اللهُ لَهُ بِهِ طَرِيقًا إِلَى الجَنَّةِ" (مُسْلِمٌ 2699).
      أَمَّا اللَّفْظُ المَكْمِلُ "طَلَبُ العِلْمِ فَرِيضَةٌ عَلَى كُلِّ
      مُسْلِمٍ"، فَفِي سُنَنِ ابْنِ مَاجَهْ (224)، وَإِسْنَادُهُ ضَعِيفٌ
      جِدًّا عِنْدَ أَهْلِ الحَدِيثِ، غَيْرَ أَنَّ مَتْنَهُ تُعَضِّدُهُ
      طُرُقٌ مُتَعَدِّدَةٌ، وَهُوَ مَقْبُولٌ فِي أُصُولِ الفِقْهِ. وَقَدْ
      فَهِمَ العُلَمَاءُ مِنْ زَمَنِ الإِمَامِ الشَّافِعِيِّ هَذَا الفَرْضَ
      عَلَى أَنَّهُ مَا يَحْتَاجُهُ المَرْءُ مِنَ العِلْمِ بِدِينِهِ:
      الطَّهَارَةِ، وَالصَّلَاةِ، وَالحَلَالِ وَالحَرَامِ، وَأُصُولِ
      الِاعْتِقَادِ.
    description_fr: |
      Le Prophète ﷺ a dit : "Quiconque emprunte une voie en quête de savoir,
      Allah lui facilite une voie vers le Paradis" (Ṣaḥīḥ Muslim 2699). La
      formule complémentaire "La quête du savoir est une obligation pour
      tout musulman" figure dans Sunan Ibn Mājah 224 — son isnād est gradé
      ḍaʿīf jiddan (très faible) par les spécialistes du ḥadīth, bien que
      son matn (sens) soit corroboré par plusieurs voies et largement
      accepté en uṣūl al-fiqh. Les savants depuis l'imām al-Shāfiʿī ont
      compris cette obligation comme couvrant le savoir dont tout musulman
      a besoin pour sa religion : la purification, la prière, le licite
      et l'illicite, et les principes de la croyance.
    reference: Sahih Muslim 2699 (Ibn Majah 224's chain is weak; matn corroborated)
    hadith_refs: "Muslim 2699"
    source_url: https://sunnah.com/muslim:2699
    source_notes: |
      Shaykh al-Albānī (Ṣaḥīḥ Sunan Ibn Mājah, 1:81) grades the chain of 'seeking knowledge is an obligation upon every Muslim' as very weak (ḍaʿīf jiddan), though he affirms the authenticity of 'whoever travels a path seeking knowledge…' (Muslim 2699). The obligation is nevertheless established in uṣūl al-fiqh through consensus (ijmāʿ) on the necessity of knowing how to worship.
    source_notes_fr: |
      Shaykh al-Albānī (Ṣaḥīḥ Sunan Ibn Mājah, 1:81) grade la chaîne de 'la quête du savoir est une obligation pour tout musulman' comme très faible (ḍaʿīf jiddan), bien qu'il affirme l'authenticité de 'quiconque emprunte une voie en quête de savoir…' (Muslim 2699). L'obligation est néanmoins établie en uṣūl al-fiqh par le consensus (ijmāʿ) sur la nécessité de savoir comment adorer.
    source_notes_ar: |
      يُصَنِّفُ الشَّيْخُ الأَلبَانِيُّ (صَحِيحُ سُنَنِ ابنِ مَاجَهْ، ١:٨١) سَنَدَ «طَلَبُ العِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ» ضَعِيفًا جِدًّا، وَلَكِنَّهُ يُؤَكِّدُ صِحَّةَ «مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا…» (مُسْلِمٌ ٢٦٩٩). وَالفَرِيضَةُ مُثْبَتَةٌ فِي أُصُولِ الفِقْهِ بِالإِجْمَاعِ عَلَى ضَرُورَةِ مَعْرِفَةِ كَيْفِيَّةِ العِبَادَةِ.
    display_day_of_year: 250

  - slug: hadith-muslim-brother
    category: hadith_narrative
    title_en: "None of You Believes"
    title_ar: "لَا يُؤْمِنُ أَحَدُكُمْ"
    title_fr: "Aucun de vous n'a la foi"
    description_en: |
      Anas ibn Malik narrated that the Prophet ﷺ said: "None of you truly
      believes until he loves for his brother what he loves for himself." A
      foundational ethical principle of Islam, cited by scholars as one of
      the axes upon which the religion turns. Imam al-Nawawi placed it as
      hadith 13 in his Forty.
    description_ar: |
      رَوَى أَنَسُ بْنُ مَالِكٍ رَضِيَ اللهُ عَنْهُ أَنَّ النَّبِيَّ ﷺ
      قَالَ: "لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ
      لِنَفْسِهِ". أَصْلٌ خُلُقِيٌّ جَامِعٌ فِي الإِسْلَامِ، عَدَّهُ
      العُلَمَاءُ مِنَ المَحَاوِرِ الَّتِي يَدُورُ عَلَيْهَا الدِّينُ، وَقَدْ
      جَعَلَهُ الإِمَامُ النَّوَوِيُّ الحَدِيثَ الثَّالِثَ عَشَرَ مِنْ
      أَرْبَعِينِيَّتِهِ.
    description_fr: |
      Anas ibn Mālik a rapporté que le Prophète ﷺ a dit : "Aucun de vous
      n'a véritablement la foi tant qu'il n'aime pas pour son frère ce
      qu'il aime pour lui-même." Principe éthique fondateur de l'Islām,
      cité par les savants comme l'un des axes sur lesquels tourne la
      religion. L'imām al-Nawawī l'a placé en treizième position dans son
      recueil des Quarante.
    reference: Sahih al-Bukhari 13, Sahih Muslim 45
    hadith_refs: "Bukhari 13, Muslim 45"
    source_url: https://sunnah.com/bukhari:13
    source_notes: |
      Al-Nawawī (Sharḥ al-Arbaʿīn, pp. 88–92) identifies this hadith as one of the five foundational principles of Islamic social ethics, placing it thirteenth in his Forty. Ibn Rajab (Jāmiʿ al-ʿUlūm, 2:180) notes that 'brother' here encompasses all Muslims regardless of race or status, reflecting the universal brotherhood affirmed by Ahl al-Sunna.
    source_notes_fr: |
      Al-Nawawī (Sharḥ al-Arbaʿīn, pp. 88–92) identifie ce ḥadīth comme l'un des cinq principes fondamentaux de l'éthique sociale islamique, le plaçant en treizième position dans ses Quarante. Ibn Rajab (Jāmiʿ al-ʿUlūm, 2:180) note que 'frère' ici englobe tous les musulmans sans distinction de race ni de statut, reflétant la fraternité universelle affirmée par Ahl al-Sunna.
    source_notes_ar: |
      يُحَدِّدُ النَّوَوِيُّ (شَرْحُ الأَرْبَعِينَ، ص. ٨٨–٩٢) هَذَا الحَدِيثَ كَوَاحِدٍ مِنَ الأُصُولِ الخَمْسَةِ لِلأَخْلاَقِ الاجْتِمَاعِيَّةِ الإِسْلاَمِيَّةِ، مُوَضِّعًا إِيَّاهُ فِي المَرْتَبَةِ الثَّالِثَةَ عَشْرَةَ مِنْ أَرْبَعِينِيَّتِهِ. وَيُشِيرُ ابنُ رَجَبٍ (جَامِعُ العُلُومِ، ٢:١٨٠) إِلَى أَنَّ «الأَخَ» هُنَا يَشْمَلُ جَمِيعَ المُسْلِمِينَ بِلاَ تَفْرِيقٍ عِرْقِيٍّ أَوْ مَنْزِلَةٍ، مُجَسِّدًا المُؤَاخَاةَ الكُونِيَّةَ الَّتِي يُؤَكِّدُهَا أَهْلُ السُّنَّةِ.
    display_day_of_year: 280

  - slug: hadith-good-word
    category: hadith_narrative
    title_en: "A Good Word Is Charity"
    title_ar: "الكَلِمَةُ الطَّيِّبَةُ صَدَقَةٌ"
    title_fr: "Une bonne parole est une aumône"
    description_en: |
      The Prophet ﷺ said: "A good word is charity," and: "Whoever believes in
      Allah and the Last Day, let him speak a good word or remain silent."
      Together these hadiths frame speech as a core site of moral action —
      every utterance is either a deed of goodness or an opportunity missed.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "الكَلِمَةُ الطَّيِّبَةُ صَدَقَةٌ"، وَقَالَ:
      "مَنْ كَانَ يُؤْمِنُ بِاللهِ وَاليَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا
      أَوْ لِيَصْمُتْ". وَفِي هَذَيْنِ الحَدِيثَيْنِ تَقْرِيرٌ أَنَّ
      الكَلَامَ مَحَلٌّ مَرْكَزِيٌّ لِلْعَمَلِ الأَخْلَاقِيِّ — فَكُلُّ
      نُطْقٍ إِمَّا فِعْلُ خَيْرٍ أَوْ فُرْصَةٌ ضَائِعَةٌ.
    description_fr: |
      Le Prophète ﷺ a dit : "Une bonne parole est une aumône," et : "Que
      celui qui croit en Allah et au Jour Dernier dise un bien ou se taise."
      Ensemble, ces ḥadīths érigent la parole en lieu central de l'action
      morale — chaque énoncé est soit un acte de bien, soit une occasion
      manquée.
    reference: Sahih al-Bukhari 2989, Sahih Muslim 47
    hadith_refs: "Bukhari 2989, Muslim 47"
    source_url: https://sunnah.com/bukhari:2989
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 5:320) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 1:75) explain that silence is praised when speech would be harmful, not as an absolute virtue. The combination of these two hadiths forms the classical Sunni framework for ethical speech: promote good, forbid evil, and refrain when neither is possible.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 5:320) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 1:75) expliquent que le silence est loué lorsque la parole serait nuisible, non comme une vertu absolue. La combinaison de ces deux ḥadīths forme le cadre sunnite classique pour la parole éthique : promouvoir le bien, interdire le mal, et se retenir lorsque ni l'un ni l'autre n'est possible.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٥:٣٢٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١:٧٥) أَنَّ الصَّمْتَ يُحْمَدُ إِذَا كَانَ الكَلاَمُ ضَارًّا، لاَ كَفَضِيلَةٍ مُطْلَقَةٍ. وَتَشْكِلُ هَاتَانِ الرِّوَايَتَانِ مَعًا الإِطَارَ السُّنِّيَّ الكَلاسِيكِيَّ لِلأَخْلاَقِ الكَلاَمِيَّةِ: نَشْرُ الخَيْرِ، وَنَهْيُ الشَّرِّ، وَالكَفُّ عِنْدَ عَدَمِ إِمْكَانِ أَحَدِهِمَا.
    display_day_of_year: 310

  - slug: hadith-best-of-you-to-family
    category: hadith_narrative
    title_en: "The Best of You"
    title_ar: "خَيْرُكُمْ خَيْرُكُمْ لِأَهْلِهِ"
    title_fr: "Le meilleur d'entre vous"
    description_en: |
      The Prophet ﷺ said: "The best of you is the best to his family, and I
      am the best of you to my family." In an era where many religious
      traditions confined spiritual excellence to withdrawal from the world,
      the Prophet ﷺ located it in the domestic sphere — in kindness to one's
      spouse, children, and kin. His own household life became the model.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "خَيْرُكُمْ خَيْرُكُمْ لِأَهْلِهِ، وَأَنَا
      خَيْرُكُمْ لِأَهْلِي". وَفِي عَصْرٍ حَصَرَتْ فِيهِ كَثِيرٌ مِنَ
      التَّقَالِيدِ الدِّينِيَّةِ الكَمَالَ الرُّوحِيَّ فِي الِاعْتِزَالِ،
      وَضَعَهُ النَّبِيُّ ﷺ فِي المَجَالِ الأُسَرِيِّ — فِي إِحْسَانِ
      الزَّوْجِ إِلَى زَوْجَتِهِ، وَالأَبِ إِلَى أَبْنَائِهِ وَأَهْلِهِ.
      وَكَانَتْ سِيرَتُهُ البَيْتِيَّةُ ﷺ هِيَ النَّمُوذَجَ.
    description_fr: |
      Le Prophète ﷺ a dit : "Le meilleur d'entre vous est celui qui est le
      meilleur envers sa famille, et je suis le meilleur d'entre vous
      envers ma famille." À une époque où de nombreuses traditions
      religieuses réservaient l'excellence spirituelle au retrait du
      monde, le Prophète ﷺ l'a située dans la sphère domestique — dans la
      bonté envers son conjoint, ses enfants et ses proches. Sa propre vie
      familiale est devenue le modèle.
    reference: Jami' al-Tirmidhi 3895
    hadith_refs: "Tirmidhi 3895"
    source_url: https://sunnah.com/tirmidhi:3895
    source_notes: |
      Al-Tirmidhī himself grades this hadith ḥasan ṣaḥīḥ, and Ibn Ḥajar (Fatḥ al-Bārī, 10:500) notes that the Prophet’s ﷺ qualification 'and I am the best of you to my family' makes him the living standard. Classical Sunni scholars—from al-Ghazālī to Ibn al-Qayyim—have used this hadith to reject monastic withdrawal and affirm marriage as the prophetic sunna.
    source_notes_fr: |
      Al-Tirmidhī lui-même grade ce ḥadīth ḥasan ṣaḥīḥ, et Ibn Ḥajar (Fatḥ al-Bārī, 10:500) note que la qualification du Prophète ﷺ 'et je suis le meilleur d'entre vous envers ma famille' en fait la norme vivante. Les savants sunnites classiques — d'al-Ghazālī à Ibn al-Qayyim — ont utilisé ce ḥadīth pour rejeter le retrait monastique et affirmer le mariage comme sunna prophétique.
    source_notes_ar: |
      يُصَنِّفُ التِّرْمِذِيُّ نَفْسُهُ هَذَا الحَدِيثَ حَسَنًا صَحِيحًا، وَيَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١٠:٥٠٠) أَنَّ إِضَافَةَ النَّبِيِّ ﷺ «وَأَنَا خَيْرُكُمْ لِأَهْلِي» تَجْعَلُهُ القُدْوَةَ الحَيَّةَ. وَاسْتَخْدَمَ العُلَمَاءُ السُّنِّيُّونَ — مِنَ الغَزَالِيِّ إِلَى ابنِ القَيِّمِ — هَذَا الحَدِيثَ لِرَفْضِ الاعْتِزَالِ الرَّهْبَانِيِّ وَإِثْبَاتِ الزَّوَاجِ سُنَّةً نَبَوِيَّةً.
    display_day_of_year: 340

