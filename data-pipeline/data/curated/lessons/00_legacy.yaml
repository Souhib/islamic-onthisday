  - slug: sunnah-truthfulness
    category: sunnah_practice
    title_en: The Sunnah of Truthfulness
    title_ar: سُنَّةُ الصِّدْقِ
    title_fr: La Sunna de la véracité (ṣidq)
    description_en: |
      The Prophet ﷺ said: "Truthfulness leads to righteousness, and
      righteousness leads to Paradise; and a man keeps speaking the truth
      until he is written with Allah as a truthful one (siddiq). Falsehood
      leads to transgression, and transgression leads to the Fire; and a
      man keeps telling lies until he is written with Allah as a liar."
      Scholars note that truthfulness encompasses the tongue, the heart,
      the intention, and every action — making it one of the most
      comprehensive moral principles.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "إِنَّ الصِّدْقَ يَهْدِي إِلَى البِرِّ،
      وَإِنَّ البِرَّ يَهْدِي إِلَى الجَنَّةِ، وَإِنَّ الرَّجُلَ
      لَيَصْدُقُ حَتَّى يُكْتَبَ عِنْدَ اللهِ صِدِّيقًا. وَإِنَّ الكَذِبَ
      يَهْدِي إِلَى الفُجُورِ، وَإِنَّ الفُجُورَ يَهْدِي إِلَى النَّارِ،
      وَإِنَّ الرَّجُلَ لَيَكْذِبُ حَتَّى يُكْتَبَ عِنْدَ اللهِ كَذَّابًا".
      وَنَبَّهَ العُلَمَاءُ إِلَى أَنَّ الصِّدْقَ يَشْمَلُ صِدْقَ
      اللِّسَانِ وَالقَلْبِ وَالنِّيَّةِ وَالعَمَلِ، فَكَانَ مِنْ
      أَجْمَعِ الأُصُولِ الأَخْلَاقِيَّةِ.
    description_fr: |
      Le Prophète ﷺ a dit : "La véracité conduit à la droiture, et la
      droiture conduit au Paradis ; et l'homme ne cesse de dire la vérité
      jusqu'à ce qu'il soit inscrit auprès d'Allah comme véridique
      (ṣiddīq). Le mensonge conduit à la transgression, et la transgression
      conduit au Feu ; et l'homme ne cesse de mentir jusqu'à ce qu'il soit
      inscrit auprès d'Allah comme menteur." Les savants soulignent que la
      véracité englobe la langue, le cœur, l'intention et chaque acte —
      ce qui en fait l'un des principes moraux les plus englobants.
    reference: Sahih al-Bukhari 6094, Sahih Muslim 2607
    hadith_refs: "Bukhari 6094, Muslim 2607"
    source_url: https://sunnah.com/bukhari:6094
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:480) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:110) note that this hadith establishes truthfulness as a comprehensive character trait (ṣidq) leading to the highest stations. The Prophet ﷺ was himself called al-Ṣiddīq—the truthful one—before prophethood, and Sunni scholars hold that persistent truthfulness until death is a sign of sincere faith.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:480) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:110) notent que ce ḥadīth établit la véracité comme un trait de caractère global (ṣidq) menant aux plus hauts rangs. Le Prophète ﷺ fut lui-même appelé al-Ṣiddīq — le véridique — avant la prophétie, et les savants sunnites tiennent que la véracité persistante jusqu'à la mort est un signe de foi sincère.
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١٠:٤٨٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٦:١١٠) أَنَّ هَذَا الحَدِيثَ يُقِيمُ الصِّدْقَ خُلُقًا جَامِعًا يَصِلُ بِصَاحِبِهِ إِلَى أَعْلَى المَرَاتِبِ. وَقَدْ لُقِّبَ النَّبِيُّ ﷺ بِالصِّدِّيقِ — أَيِ الصَّادِقِ — قَبْلَ النُّبُوَّةِ، وَيَعْتَقِدُ العُلَمَاءُ السُّنِّيُّونَ أَنَّ مُوَاظَبَةَ الصِّدْقِ إِلَى المَوْتِ عَلاَمَةٌ عَلَى إِيمَانٍ صَادِقٍ.
    display_day_of_year: 355
