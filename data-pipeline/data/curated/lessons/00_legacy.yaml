# Dateless Quran/Sunnah content. Each lesson has a stable display_day_of_year
# (1-366) so the same day shows the same lesson each year. All content is
# grounded in the Qur'an or authentic hadith (Sahih Bukhari / Sahih Muslim
# primarily). No speculative or weak narrations.
#
# Display days are assigned to spread Prophets' stories across the year,
# famous hadith narratives across another set, and Sunnah practices across
# a third. The orchestrator will verify there are no duplicate days.

lessons:
  # =========================================================================
  # PROPHETS OF THE QUR'AN
  # =========================================================================

  - slug: adam-creation
    category: quran_story
    title_en: The Creation of Adam ʿalayhi as-salām
    title_ar: خَلْقُ آدَمَ عَلَيْهِ السَّلَامُ
    title_fr: La création d'Ādam ﷺ
    description_en: |
      Allah fashioned Adam from clay and breathed into him of His spirit,
      teaching him "the names of all things." The angels were commanded to
      prostrate before him in honor, and all did so except Iblis who refused
      out of pride. Adam and his wife were placed in the Garden but led by
      Iblis's whispering to eat from the forbidden tree; they repented with
      the words Allah taught them, and were sent down to the earth as His
      stewards. The Qur'an recounts this across multiple chapters.
    description_ar: |
      خَلَقَ اللهُ آدَمَ مِنْ طِينٍ وَنَفَخَ فِيهِ مِنْ رُوحِهِ، وَعَلَّمَهُ
      "الأَسْمَاءَ كُلَّهَا". وَأَمَرَ المَلَائِكَةَ بِالسُّجُودِ لَهُ
      تَكْرِيمًا، فَسَجَدُوا جَمِيعًا إِلَّا إِبْلِيسَ أَبَى
      اسْتِكْبَارًا. أُسْكِنَ آدَمُ وَزَوْجُهُ الجَنَّةَ، فَوَسْوَسَ لَهُمَا
      إِبْلِيسُ حَتَّى أَكَلَا مِنَ الشَّجَرَةِ المَنْهِيِّ عَنْهَا، فَتَابَا
      بِالكَلِمَاتِ الَّتِي عَلَّمَهَا اللهُ آدَمَ، وَأُنْزِلَا إِلَى
      الأَرْضِ خُلَفَاءَ. وَيَذْكُرُ القُرْآنُ هَذِهِ القِصَّةَ فِي مَوَاضِعَ
      عَدِيدَةٍ.
    description_fr: |
      Allah façonna Ādam à partir d'argile et lui insuffla de Son esprit,
      lui enseignant "les noms de toutes choses". Les anges reçurent l'ordre
      de se prosterner devant lui en signe d'honneur, et tous s'exécutèrent
      sauf Iblīs qui refusa par orgueil. Ādam et son épouse furent placés au
      Paradis, mais conduits par les insufflations d'Iblīs, ils mangèrent
      de l'arbre interdit ; ils se repentirent par les paroles qu'Allah leur
      enseigna, et furent envoyés sur la terre comme Ses lieutenants. Le
      Coran relate cette histoire dans plusieurs sourates.
    reference: Surah al-Baqara 2:30-39, Surah al-A'raf 7:11-25, Surah Ta-Ha 20:115-123
    quran_refs: "2:30-39, 7:11-25, 20:115-123"
    source_url: https://quran.com/2/30-39
    source_notes: |
      Ibn Kathīr (al-Bidāya wa-l-Nihāya, 1:71–81) and al-Ṭabarī (Tafsīr, 1:185–195) detail the angels’ prostration and Iblīs’s refusal as a foundational event in Islamic cosmology. Ahl al-Sunna affirm that Ādam was created by Allah’s direct act without evolutionary process, and that the prostration was one of honor, not worship.
    source_notes_fr: |
      Ibn Kathīr (al-Bidāya wa-l-Nihāya, 1:71–81) et al-Ṭabarī (Tafsīr, 1:185–195) détaillent la prosternation des anges et le refus d'Iblīs comme un événement fondateur de la cosmologie islamique. Ahl al-Sunna affirment qu'Ādam fut créé par l'acte direct d'Allah sans processus évolutif, et que la prosternation était d'honneur, non d'adoration.
    source_notes_ar: |
      يُفَصِّلُ ابنُ كَثِيرٍ (البِدَايَةُ وَالنِّهَايَةُ، ١:٧١–٨١) وَالطَّبَرِيُّ (تَفْسِيرُ، ١:١٨٥–١٩٥) سُجُودَ المَلَائِكَةِ وَإِبْلِيسَ إِبَاءَهُ كَحَدَثٍ أَسَاسِيٍّ فِي الكَوْنِيَّاتِ الإِسْلَامِيَّةِ. يُؤَكِّدُ أَهْلُ السُّنَّةِ أَنَّ آدَمَ خُلِقَ بِفِعْلِ اللهِ المُبَاشِرِ بِدُونِ سِيرُورَةٍ تَطَوُّرِيَّةٍ، وَأَنَّ السُّجُودَ كَانَ تَكْرِيمًا لَا عِبَادَةً.
    display_day_of_year: 15

  - slug: nuh-the-ark
    category: quran_story
    title_en: Nuh ʿalayhi as-salām and the Ark
    title_ar: نُوحٌ عَلَيْهِ السَّلَامُ وَالسَّفِينَةُ
    title_fr: Nūḥ ʿalayhi as-salām et l'Arche
    description_en: |
      Nuh called his people to tawhid for 950 years, but only a few believed.
      When Allah commanded him to build the Ark, the disbelievers mocked him.
      The flood came — "from the earth and from the sky" — and only those in
      the Ark survived. Nuh's own son refused to board, saying he would climb
      a mountain to escape the water; Nuh prayed for him, but was told the son
      was "not of your family — he was unrighteous work." Surah Nuh and
      Surah Hud narrate the story in detail.
    description_ar: |
      دَعَا نُوحٌ عَلَيْهِ السَّلَامُ قَوْمَهُ إِلَى التَّوْحِيدِ
      تِسْعَمِائَةٍ وَخَمْسِينَ سَنَةً، فَلَمْ يُؤْمِنْ مَعَهُ إِلَّا قَلِيلٌ.
      وَلَمَّا أَمَرَهُ اللهُ بِبِنَاءِ السَّفِينَةِ، سَخِرَ مِنْهُ
      الكَافِرُونَ. ثُمَّ جَاءَ الطُّوفَانُ "مِنَ الأَرْضِ وَمِنَ السَّمَاءِ"،
      فَلَمْ يَنْجُ إِلَّا مَنْ كَانَ فِي السَّفِينَةِ. وَأَبَى ابْنُ
      نُوحٍ أَنْ يَرْكَبَ مَعَهُ، قَائِلًا إِنَّهُ سَيَأْوِي إِلَى جَبَلٍ
      يَعْصِمُهُ مِنَ المَاءِ، فَدَعَا لَهُ نُوحٌ، فَقِيلَ لَهُ إِنَّهُ
      "لَيْسَ مِنْ أَهْلِكَ، إِنَّهُ عَمَلٌ غَيْرُ صَالِحٍ". وَتَفَصِّلُ
      سُورَةُ نُوحٍ وَسُورَةُ هُودٍ هَذِهِ القِصَّةَ.
    description_fr: |
      Nūḥ ʿalayhi as-salām appela son peuple au tawḥīd pendant 950 ans, mais seuls
      quelques-uns crurent. Lorsqu'Allah lui ordonna de construire l'Arche,
      les mécréants se moquèrent de lui. Le déluge vint — "de la terre et du
      ciel" — et seuls survécurent ceux qui étaient dans l'Arche. Le propre
      fils de Nūḥ refusa de monter, disant qu'il escaladerait une montagne
      pour échapper à l'eau ; Nūḥ implora pour lui, mais il lui fut dit que
      son fils "n'est point de ta famille — c'est un acte non vertueux". Les
      sourates Nūḥ et Hūd narrent l'histoire en détail.
    reference: Surah Nuh 71, Surah Hud 11:25-48
    quran_refs: "71:1-28, 11:25-48"
    source_url: https://quran.com/71
    source_notes: |
      Classical exegetes such as al-Qurṭubī (Tafsīr, 10:380) and Ibn Kathīr note that the 950 years refer to Nūḥ’s call to his people before the flood, not his total lifespan. The drowning of his son—despite Nūḥ’s intercession—demonstrates that kinship does not override righteousness, a principle affirmed across Sunni tafsīr.
    source_notes_fr: |
      Les exégètes classiques tels qu'al-Qurṭubī (Tafsīr, 10:380) et Ibn Kathīr notent que les 950 ans désignent l'appel de Nūḥ à son peuple avant le déluge, et non sa durée de vie totale. La noyade de son fils — malgré l'intercession de Nūḥ — démontre que la parenté ne prime pas sur la droiture, un principe affirmé dans toute la tafsīr sunnite.
    source_notes_ar: |
      يُلَاحِظُ المُفَسِّرُونَ الكِلَاسِيكِيُّونَ مِثْلُ القُرْطُبِيِّ (تَفْسِيرُ، ١٠:٣٨٠) وَابْنِ كَثِيرٍ أَنَّ التِّسْعَ مِائَةٍ وَالخَمْسِينَ سَنَةً تَشِيرُ إِلَى دَعْوَةِ نُوحٍ لِقَوْمِهِ قَبْلَ الطُّوفَانِ، لَا إِلَى عُمْرِهِ الكُلِّيِّ. وَإِغْرَاقُ ابْنِهِ — عَلَى الرَّغْمِ مِنْ شَفَاعَةِ نُوحٍ — يُبَيِّنُ أَنَّ القَرَابَةَ لَا تَجُوزُ عَلَى البِرِّ، وَهَذَا أَصْلٌ مُؤَكَّدٌ فِي تَفْسِيرِ أَهْلِ السُّنَّةِ.
    display_day_of_year: 45

  - slug: ibrahim-the-sacrifice
    category: quran_story
    title_en: The Sacrifice of Ibrahim ʿalayhi as-salām and Isma'il ﷺ
    title_ar: قِصَّةُ الذَّبْحِ — إِبْرَاهِيمُ وَإِسْمَاعِيلُ عَلَيْهِمَا السَّلَامُ
    title_fr: Le sacrifice d'Ibrāhīm ʿalayhi as-salām et Ismāʿīl ʿalayhi as-salām
    description_en: |
      Ibrahim saw in a dream that he was slaughtering his son. When he told
      Isma'il, the son said: "O my father, do as you are commanded; you will
      find me, Allah willing, of the patient." As Ibrahim laid him down, Allah
      ransomed the son with a great sacrifice and praised them both. The event
      is commemorated every year in the ritual of Eid al-Adha during Hajj.
    description_ar: |
      رَأَى إِبْرَاهِيمُ عَلَيْهِ السَّلَامُ فِي مَنَامِهِ أَنَّهُ يَذْبَحُ
      ابْنَهُ. فَلَمَّا أَخْبَرَ إِسْمَاعِيلَ، قَالَ الِابْنُ: "يَا
      أَبَتِ افْعَلْ مَا تُؤْمَرُ، سَتَجِدُنِي إِنْ شَاءَ اللهُ مِنَ
      الصَّابِرِينَ". وَلَمَّا أَسْلَمَا وَتَلَّهُ لِلْجَبِينِ، فَدَى
      اللهُ الِابْنَ بِذِبْحٍ عَظِيمٍ، وَأَثْنَى عَلَيْهِمَا. وَتُحْيَا
      ذِكْرَى هَذَا الحَدَثِ سَنَوِيًّا فِي شَعِيرَةِ عِيدِ الأَضْحَى
      أَثْنَاءَ الحَجِّ.
    description_fr: |
      Ibrāhīm ʿalayhi as-salām vit en songe qu'il égorgeait son fils. Lorsqu'il en informa
      Ismāʿīl, le fils dit : "Ô mon père, fais ce qui t'est commandé ; tu me
      trouveras, si Allah le veut, parmi les patients." Lorsqu'Ibrāhīm
      l'eut couché, Allah racheta le fils par une victime expiatoire de
      grande valeur et fit leur éloge à tous deux. Cet événement est
      commémoré chaque année par le rite de l'Aïd al-Aḍḥā pendant le Ḥajj.
    reference: Surah al-Saffat 37:100-111
    quran_refs: "37:100-111"
    source_url: https://quran.com/37/100-111
    source_notes: |
      Ibn Kathīr (Tafsīr, 7:200) and al-Rāzī (Mafātīḥ al-Ghayb, 23:145) emphasize that the dream was a divine command and that the ransom (al-dhibḥ al-ʿaẓīm) was a great ram. The event is the basis for Eid al-Aḍḥā in all four Sunni madhhabs, with consensus (ijmāʿ) that it commemorates this trial.
    source_notes_fr: |
      Ibn Kathīr (Tafsīr, 7:200) et al-Rāzī (Mafātīḥ al-Ghayb, 23:145) soulignent que le songe était un commandement divin et que le rançonnement (al-dhibḥ al-ʿaẓīm) était un grand bélier. Cet événement est le fondement de l'Aïd al-Aḍḥā dans les quatre madhhabs sunnites, avec un consensus (ijmāʿ) sur le fait qu'il commémore cette épreuve.
    source_notes_ar: |
      يُؤَكِّدُ ابنُ كَثِيرٍ (تَفْسِيرُ، ٧:٢٠٠) وَالرَّازِيُّ (مَفَاتِيحُ الغَيْبِ، ٢٣:١٤٥) أَنَّ الرُّؤْيَا كَانَتْ أَمْرًا إِلَهِيًّا وَأَنَّ الفِدَاءَ (الذَّبْحُ العَظِيمُ) كَانَ كَبْشًا عَظِيمًا. وَهَذَا الحَدَثُ هُوَ أَسَاسُ عِيدِ الأَضْحَى فِي المَذَاهِبِ السُّنِّيَّةِ الأَرْبَعَةِ، وَقَدْ أَجْمَعَ العُلَمَاءُ عَلَى أَنَّهُ يُذَكِّرُ بِهَذِهِ التَّجْرِبَةِ.
    display_day_of_year: 75

  - slug: ibrahim-fire
    category: quran_story
    title_en: Ibrahim ʿalayhi as-salām Cast into the Fire
    title_ar: إِبْرَاهِيمُ عَلَيْهِ السَّلَامُ وَإِلْقَاؤُهُ فِي النَّارِ
    title_fr: Ibrāhīm ʿalayhi as-salām jeté dans le feu
    description_en: |
      Ibrahim broke the idols of his people, leaving only the largest, then
      invited them to ask the remaining idol who had done it. When they
      refused — because it could not speak — he pressed his argument home.
      The people built a great pyre and cast him into it, but Allah commanded
      the fire: "Be cool and peace upon Ibrahim." He emerged unharmed.
    description_ar: |
      حَطَّمَ إِبْرَاهِيمُ عَلَيْهِ السَّلَامُ أَصْنَامَ قَوْمِهِ
      وَلَمْ يُبْقِ إِلَّا كَبِيرَهَا، ثُمَّ دَعَاهُمْ إِلَى أَنْ
      يَسْأَلُوا الصَّنَمَ المُتَبَقِّيَ مَنْ فَعَلَ ذَلِكَ. فَلَمَّا
      امْتَنَعُوا — إِذْ لَا يَنْطِقُ — قَامَتْ عَلَيْهِمُ الحُجَّةُ.
      فَأَجَّجَ القَوْمُ نَارًا عَظِيمَةً وَأَلْقَوْهُ فِيهَا، فَأَمَرَ
      اللهُ النَّارَ: "كُونِي بَرْدًا وَسَلَامًا عَلَى إِبْرَاهِيمَ"،
      فَخَرَجَ مِنْهَا سَالِمًا.
    description_fr: |
      Ibrāhīm ʿalayhi as-salām brisa les idoles de son peuple, ne laissant que la plus
      grande, puis les invita à interroger l'idole restante sur l'auteur du
      forfait. Lorsqu'ils refusèrent — parce qu'elle ne pouvait parler — il
      tira l'argument à son terme. Le peuple construisit un immense bûcher
      et l'y jeta, mais Allah ordonna au feu : "Sois fraîcheur et paix sur
      Ibrāhīm." Il en sortit indemne.
    reference: Surah al-Anbiya 21:51-70
    quran_refs: "21:51-70"
    source_url: https://quran.com/21/51-70
    source_notes: |
      Al-Ṭabarī (Tafsīr, 16:70) records multiple reports that the fire became cool only by Allah’s direct command, not by natural means. Ibn Taymiyya (Majmūʿ al-Fatāwā, 12:458) notes this as one of the clear miracles (muʿjizāt) granted to the prophets, uncontested in Sunni theology.
    source_notes_fr: |
      Al-Ṭabarī (Tafsīr, 16:70) rapporte de multiples récits selon lesquels le feu ne devint frais que par l'ordre direct d'Allah, et non par des moyens naturels. Ibn Taymiyya (Majmūʿ al-Fatāwā, 12:458) le relève comme l'un des miracles évidents (muʿjizāt) accordés aux prophètes, incontesté en théologie sunnite.
    source_notes_ar: |
      يَرْوِي الطَّبَرِيُّ (تَفْسِيرُ، ١٦:٧٠) أَخْبَارًا مُتَعَدِّدَةً بِأَنَّ النَّارَ صَارَتْ بَرْدًا بِأَمْرِ اللهِ المُبَاشِرِ فَقَطْ، لَا بِأَسْبَابٍ طَبِيعِيَّةٍ. وَيُشِيرُ ابْنُ تَيْمِيَّةَ (مَجْمُوعُ الفَتَاوَى، ١٢:٤٥٨) إِلَى هَذَا كَوَاحِدٍ مِنَ المُعْجِزَاتِ الوَاضِحَةِ الَّتِي أُعْطِيَتْ لِلأَنْبِيَاءِ، وَهُوَ غَيْرُ مُتَنَازَعٍ فِيهِ فِي عِلْمِ الكَلَامِ السُّنِّيِّ.
    display_day_of_year: 105

  - slug: yusuf-the-well
    category: quran_story
    title_en: Yusuf ʿalayhi as-salām Cast into the Well
    title_ar: يُوسُفُ عَلَيْهِ السَّلَامُ وَإِلْقَاؤُهُ فِي الجُبِّ
    title_fr: Yūsuf ʿalayhi as-salām jeté dans le puits
    description_en: |
      The Qur'an calls the story of Yusuf "the best of stories" (ahsan al-
      qasas). Cast into a well by his jealous brothers, sold into slavery,
      tested in the house of al-'Aziz, imprisoned on a false accusation, and
      finally raised to be the overseer of Egypt — Yusuf's patience in every
      trial became the model of trust in Allah's plan. "And Allah is
      predominant over His affair, but most of the people do not know."
    description_ar: |
      سَمَّى القُرْآنُ قِصَّةَ يُوسُفَ عَلَيْهِ السَّلَامُ "أَحْسَنَ
      القَصَصِ". أُلْقِيَ فِي الجُبِّ بِأَيْدِي إِخْوَتِهِ الحَاسِدِينَ،
      وَبِيعَ رَقِيقًا، وَابْتُلِيَ فِي بَيْتِ العَزِيزِ، وَسُجِنَ بِتُهْمَةٍ
      بَاطِلَةٍ، ثُمَّ رُفِعَ أَخِيرًا لِيَلِيَ خَزَائِنَ مِصْرَ. وَكَانَ
      صَبْرُهُ فِي كُلِّ بَلَاءٍ نَمُوذَجًا فِي الثِّقَةِ بِتَدْبِيرِ
      اللهِ. "وَاللهُ غَالِبٌ عَلَى أَمْرِهِ وَلَكِنَّ أَكْثَرَ النَّاسِ
      لَا يَعْلَمُونَ".
    description_fr: |
      Le Coran qualifie l'histoire de Yūsuf de "la plus belle des récits"
      (aḥsan al-qaṣaṣ). Jeté dans un puits par ses frères jaloux, vendu
      comme esclave, éprouvé dans la maison d'al-ʿAzīz, emprisonné sur une
      fausse accusation, et finalement élevé à la charge de gérer les
      réserves d'Égypte — la patience de Yūsuf à chaque épreuve devint le
      modèle de la confiance dans le plan d'Allah. "Et Allah est souverain
      en Son décret, mais la plupart des gens ne savent pas."
    reference: Surah Yusuf 12 (entire surah)
    quran_refs: "12:1-111"
    source_url: https://quran.com/12
    source_notes: |
      Al-Qurṭubī (Tafsīr, 9:120) calls Sūrat Yūsuf 'the sūrah of patience and beauty' (sūrat al-ṣabr wa-l-jamāl), while al-Nawawī highlights it in his Forty as a model of trusting divine decree. Sunni scholars have long used this sūrah to teach the ethics of dealing with betrayal and temptation.
    source_notes_fr: |
      Al-Qurṭubī (Tafsīr, 9:120) qualifie la Sourate Yūsuf de « sourate de la patience et de la beauté » (sūrat al-ṣabr wa-l-jamāl), tandis qu'al-Nawawī la met en lumière dans ses Quarante comme un modèle de confiance dans le décret divin. Les savants sunnites utilisent depuis longtemps cette sourate pour enseigner l'éthique du face-à-face avec la trahison et la tentation.
    source_notes_ar: |
      يُسَمِّي القُرْطُبِيُّ (تَفْسِيرُ، ٩:١٢٠) سُورَةَ يُوسُفَ «سُورَةَ الصَّبْرِ وَالجَمَالِ»، بَيْنَمَا يُبَرِّزُهَا النَّوَوِيُّ فِي أَرْبَعِينِيَّتِهِ نَمُوذَجًا لِلثِّقَةِ بِالقَدَرِ الإِلَهِيِّ. وَقَدِ اسْتَخْدَمَ العُلَمَاءُ السُّنِّيُّونَ هَذِهِ السُّورَةَ مُنْذُ زَمَنٍ طَوِيلٍ فِي تَعْلِيمِ آدَابِ التَّعَامُلِ مَعَ الخِيَانَةِ وَالإِغْوَاءِ.
    display_day_of_year: 135

  - slug: musa-parting-the-sea
    category: quran_story
    title_en: Musa ʿalayhi as-salām and the Parting of the Sea
    title_ar: مُوسَى عَلَيْهِ السَّلَامُ وَفَلْقُ البَحْرِ
    title_fr: Mūsā ʿalayhi as-salām et la séparation de la mer
    description_en: |
      Fleeing Pharaoh's army with the Children of Israel, Musa arrived at the
      Red Sea. His companions feared they were trapped; Musa said: "Never!
      Indeed with me is my Lord; He will guide me." Allah commanded him to
      strike the sea with his staff, and it parted into two walls of water.
      Pharaoh pursued and was drowned — in his final moment declaring belief,
      but too late. The day is commemorated as Ashura; the Prophet ﷺ fasted
      on it and encouraged fasting.
    description_ar: |
      هَرَبَ مُوسَى عَلَيْهِ السَّلَامُ بِبَنِي إِسْرَائِيلَ مِنْ جَيْشِ
      فِرْعَوْنَ حَتَّى بَلَغَ البَحْرَ الأَحْمَرَ. خَافَ أَصْحَابُهُ أَنَّهُمْ
      مُدْرَكُونَ، فَقَالَ مُوسَى: "كَلَّا، إِنَّ مَعِيَ رَبِّي سَيَهْدِينِ".
      فَأَمَرَهُ اللهُ بِأَنْ يَضْرِبَ البَحْرَ بِعَصَاهُ، فَانْفَلَقَ
      فَكَانَ كُلُّ فِرْقٍ كَالطَّوْدِ العَظِيمِ. وَتَبِعَهُ فِرْعَوْنُ
      فَأُغْرِقَ، وَأَعْلَنَ إِيمَانَهُ فِي اللَّحْظَةِ الأَخِيرَةِ بَعْدَ
      فَوَاتِ الأَوَانِ. وَيُحْيَى هَذَا اليَوْمُ ذِكْرَى عَاشُورَاءَ، وَقَدْ
      صَامَهُ النَّبِيُّ ﷺ وَحَثَّ عَلَى صِيَامِهِ.
    description_fr: |
      Fuyant l'armée de Pharaon avec les Enfants d'Israël, Mūsā ʿalayhi as-salām arriva à
      la Mer Rouge. Ses compagnons craignirent d'être pris au piège ; Mūsā
      dit : "Non, certes ! Avec moi est mon Seigneur ; Il me guidera."
      Allah lui ordonna de frapper la mer de son bâton, et elle se sépara en
      deux murailles d'eau. Pharaon poursuivit et fut noyé — déclarant la
      foi à son ultime instant, mais trop tard. Ce jour est commémoré
      comme ʿĀshūrāʾ ; le Prophète ﷺ y jeûnait et en a encouragé le jeûne.
    reference: Surah al-Shu'ara 26:52-67, Surah Ta-Ha 20:77-79
    quran_refs: "26:52-67, 20:77-79"
    source_url: https://quran.com/26/52-67
    source_notes: |
      Ibn Kathīr (Tafsīr, 5:280) and al-Samʿānī (Tafsīr, 2:412) note that Pharaoh’s declaration of faith at drowning was rejected because it came under compulsion (istidrāj), not sincere repentance. The fast of ʿĀshūrāʾ is authentically established in Ṣaḥīḥ al-Bukhārī (2004) and Muslim (1130).
    source_notes_fr: |
      Ibn Kathīr (Tafsīr, 5:280) et al-Samʿānī (Tafsīr, 2:412) notent que la déclaration de foi de Pharaon au moment de la noyade fut rejetée parce qu'elle survint sous la contrainte (istidrāj), et non par un repentir sincère. Le jeûne de ʿĀshūrāʾ est authentiquement établi dans Ṣaḥīḥ al-Bukhārī (2004) et Muslim (1130).
    source_notes_ar: |
      يُلَاحِظُ ابنُ كَثِيرٍ (تَفْسِيرُ، ٥:٢٨٠) وَالسَّمْعَانِيُّ (تَفْسِيرُ، ٢:٤١٢) أَنَّ إِعْلَانَ فِرْعَوْنَ إِيمَانَهُ عِنْدَ الإِغْرَاقِ قَدْ رُفِضَ لِأَنَّهُ جَاءَ تَحْتَ الاضْطِرَارِ (الاسْتِدْرَاجِ)، لَا بِتَوْبَةٍ صَادِقَةٍ. وَقَدْ ثَبَتَ صِيَامُ عَاشُورَاءَ فِي صَحِيحِ البُخَارِيِّ (٢٠٠٤) وَمُسْلِمٍ (١١٣٠).
    display_day_of_year: 165

  - slug: musa-speaking-to-allah
    category: quran_story
    title_en: Musa ʿalayhi as-salām Speaks with His Lord at Mount Tur
    title_ar: مُوسَى عَلَيْهِ السَّلَامُ يُكَلِّمُ رَبَّهُ عِنْدَ الطُّورِ
    title_fr: Mūsā ʿalayhi as-salām s'entretient avec son Seigneur au mont Ṭūr
    description_en: |
      Allah spoke to Musa directly — making him "Kalim Allah" (the one who
      speaks with Allah). When Musa asked to see his Lord, he was told: "You
      will not see Me, but look at the mountain; if it remains in place, you
      will see Me." Allah manifested to the mountain, which crumbled to dust;
      Musa fell unconscious, and when he recovered he said: "I turn to You in
      repentance, and I am the first of the believers."
    description_ar: |
      كَلَّمَ اللهُ مُوسَى تَكْلِيمًا، فَكَانَ "كَلِيمَ اللهِ". وَلَمَّا
      سَأَلَ مُوسَى رُؤْيَةَ رَبِّهِ، قِيلَ لَهُ: "لَنْ تَرَانِي وَلَكِنِ
      انْظُرْ إِلَى الجَبَلِ فَإِنِ اسْتَقَرَّ مَكَانَهُ فَسَوْفَ تَرَانِي".
      فَلَمَّا تَجَلَّى رَبُّهُ لِلْجَبَلِ جَعَلَهُ دَكًّا وَخَرَّ مُوسَى
      صَعِقًا، فَلَمَّا أَفَاقَ قَالَ: "تُبْتُ إِلَيْكَ وَأَنَا أَوَّلُ
      المُؤْمِنِينَ".
    description_fr: |
      Allah parla directement à Mūsā ʿalayhi as-salām — en faisant ainsi "Kalīm Allāh"
      (celui à qui Allah a parlé). Lorsque Mūsā demanda à voir son
      Seigneur, il lui fut répondu : "Tu ne Me verras pas, mais regarde la
      montagne ; si elle demeure à sa place, tu Me verras." Allah Se
      manifesta à la montagne, qui s'effondra en poussière ; Mūsā tomba
      évanoui, et lorsqu'il reprit ses sens, il dit : "Je me repens à Toi,
      et je suis le premier des croyants."
    reference: Surah al-A'raf 7:142-145, Surah al-Nisa 4:164
    quran_refs: "7:142-145, 4:164"
    source_url: https://quran.com/7/142-145
    source_notes: |
      Al-Ṭabarī (Tafsīr, 9:85) explains that direct speech (taklīm) without intermediary is unique to Mūsā among prophets. Ahl al-Sunna hold—based on this passage and authentic hadith—that believers will see Allah in the Hereafter, while His essence is not seen in this life, as Ibn Taymiyya and others clarify.
    source_notes_fr: |
      Al-Ṭabarī (Tafsīr, 9:85) explique que la parole directe (taklīm) sans intermédiaire est propre à Mūsā parmi les prophètes. Ahl al-Sunna soutiennent — sur la base de ce passage et de hadiths authentiques — que les croyants verront Allah dans l'au-delà, tandis que Son essence n'est pas visible en cette vie, comme le précisent Ibn Taymiyya et d'autres.
    source_notes_ar: |
      يُفَسِّرُ الطَّبَرِيُّ (تَفْسِيرُ، ٩:٨٥) أَنَّ الكَلَامَ المُبَاشِرَ (التَّكْلِيمَ) بِدُونِ وَاسِطَةٍ خَاصٌّ بِمُوسَى عَلَيْهِ السَّلَامُ بَيْنَ الأَنْبِيَاءِ. يَعْتَقِدُ أَهْلُ السُّنَّةِ — اسْتِنَادًا إِلَى هَذَا النَّصِّ وَالأَحَادِيثِ الصَّحِيحَةِ — أَنَّ المُؤْمِنِينَ سَيَرَوْنَ اللهَ فِي الآخِرَةِ، وَأَنَّ ذَاتَهُ لَا تُرَى فِي هَذِهِ الحَيَاةِ، كَمَا يُوَضِّحُ ابْنُ تَيْمِيَّةَ وَغَيْرُهُ.
    display_day_of_year: 195

  - slug: maryam-the-birth-of-isa
    category: quran_story
    title_en: Maryam عليها السلام and the Birth of ʿIsa ʿalayhi as-salām
    title_ar: مَرْيَمُ عَلَيْهَا السَّلَامُ وَوِلَادَةُ عِيسَى عَلَيْهِ السَّلَامُ
    title_fr: Maryam ʿalayhā al-salām et la naissance de ʿĪsā ʿalayhi as-salām
    description_en: |
      Maryam, chosen and purified above the women of all worlds, withdrew to
      an eastern place where Jibril appeared to her as a man. She was given
      the glad tidings of a pure son. She withdrew in labor to a distant
      place, where Allah caused a stream to flow at her feet and ripe dates
      to fall from a dry palm. When she returned to her people carrying the
      infant, he spoke from the cradle: "Indeed, I am the servant of Allah;
      He has given me the Scripture and made me a prophet."
    description_ar: |
      اصْطَفَى اللهُ مَرْيَمَ وَطَهَّرَهَا عَلَى نِسَاءِ العَالَمِينَ،
      فَانْتَبَذَتْ مِنْ أَهْلِهَا مَكَانًا شَرْقِيًّا فَتَمَثَّلَ لَهَا
      جِبْرِيلُ بَشَرًا سَوِيًّا، وَبَشَّرَهَا بِغُلَامٍ زَكِيٍّ. ثُمَّ
      أَجَاءَهَا المَخَاضُ إِلَى مَكَانٍ قَصِيٍّ، فَأَجْرَى اللهُ تَحْتَ
      قَدَمَيْهَا سَرِيًّا، وَأَسَاقَطَ عَلَيْهَا مِنْ نَخْلَةٍ يَابِسَةٍ
      رُطَبًا جَنِيًّا. وَلَمَّا رَجَعَتْ إِلَى قَوْمِهَا تَحْمِلُهُ، نَطَقَ
      الطِّفْلُ مِنَ المَهْدِ: "إِنِّي عَبْدُ اللهِ آتَانِيَ الكِتَابَ
      وَجَعَلَنِي نَبِيًّا".
    description_fr: |
      Maryam, élue et purifiée au-dessus des femmes de tous les mondes, se
      retira en un lieu oriental où Jibrīl lui apparut sous la forme d'un
      homme. La bonne nouvelle d'un fils pur lui fut annoncée. Elle se
      retira au moment des douleurs en un lieu éloigné, où Allah fit
      couler un ruisseau à ses pieds et tomber des dattes mûres d'un
      palmier desséché. Lorsqu'elle revint vers son peuple portant le
      nourrisson, il parla du berceau : "Je suis vraiment le serviteur
      d'Allah ; Il m'a donné le Livre et fait de moi un prophète."
    reference: Surah Maryam 19:16-36, Surah Aal Imran 3:42-47
    quran_refs: "19:16-36, 3:42-47"
    source_url: https://quran.com/19/16-36
    source_notes: |
      Ibn Kathīr (Tafsīr, 6:310) and al-Qurṭubī (Tafsīr, 10:150) affirm the virgin birth and ʿĪsā’s speech from the cradle as miracles, not evidence of divinity. Ahl al-Sunna unanimously reject the Christian doctrine of sonship, holding ʿĪsā to be a prophet and servant of Allah, as the Qur’an and authentic Sunnah state.
    source_notes_fr: |
      Ibn Kathīr (Tafsīr, 6:310) et al-Qurṭubī (Tafsīr, 10:150) affirment la naissance virginale et la parole de ʿĪsā du berceau comme des miracles, et non comme une preuve de divinité. Ahl al-Sunna rejettent unanimement la doctrine chrétienne de la filiation, considérant ʿĪsā comme un prophète et un serviteur d'Allah, comme le stipulent le Coran et la Sunna authentique.
    source_notes_ar: |
      يُؤَكِّدُ ابنُ كَثِيرٍ (تَفْسِيرُ، ٦:٣١٠) وَالقُرْطُبِيُّ (تَفْسِيرُ، ١٠:١٥٠) الوِلَادَةَ البَتُولِيَّةَ وَكَلَامَ عِيسَى مِنَ المَهْدِ كَمُعْجِزَتَيْنِ، لَا كَدَلِيلٍ عَلَى الأُلُوهِيَّةِ. يَرْفُضُ أَهْلُ السُّنَّةِ إِجْمَاعًا عَقِيدَةَ النَّصَارَى فِي البُنُوَّةِ، وَيَعْتَقِدُونَ أَنَّ عِيسَى نَبِيٌّ وَعَبْدُ اللهِ، كَمَا وَرَدَ فِي القُرْآنِ وَالسُّنَّةِ الصَّحِيحَةِ.
    display_day_of_year: 225

  - slug: sulayman-the-ant
    category: quran_story
    title_en: Sulayman ʿalayhi as-salām and the Valley of the Ants
    title_ar: سُلَيْمَانُ عَلَيْهِ السَّلَامُ وَوَادِي النَّمْلِ
    title_fr: Sulaymān ʿalayhi as-salām et la vallée des fourmis
    description_en: |
      Prophet Sulayman was given dominion over jinn, men, and birds, and was
      taught the speech of all creatures. When his armies marched into the
      valley of the ants, a female ant called out: "O ants, enter your homes
      that you not be crushed by Sulayman and his soldiers while they
      perceive not." Sulayman smiled at her warning and prayed: "My Lord,
      enable me to be grateful for Your favor which You have bestowed upon
      me and upon my parents."
    description_ar: |
      أُوتِيَ سُلَيْمَانُ عَلَيْهِ السَّلَامُ مُلْكًا عَلَى الجِنِّ
      وَالإِنْسِ وَالطَّيْرِ، وَعُلِّمَ مَنْطِقَ كُلِّ شَيْءٍ. وَلَمَّا
      مَرَّتْ جُنُودُهُ بِوَادِي النَّمْلِ، نَادَتْ نَمْلَةٌ: "يَا أَيُّهَا
      النَّمْلُ ادْخُلُوا مَسَاكِنَكُمْ لَا يَحْطِمَنَّكُمْ سُلَيْمَانُ
      وَجُنُودُهُ وَهُمْ لَا يَشْعُرُونَ". فَتَبَسَّمَ سُلَيْمَانُ ضَاحِكًا
      مِنْ قَوْلِهَا، وَدَعَا: "رَبِّ أَوْزِعْنِي أَنْ أَشْكُرَ نِعْمَتَكَ
      الَّتِي أَنْعَمْتَ عَلَيَّ وَعَلَى وَالِدَيَّ".
    description_fr: |
      Le prophète Sulaymān ʿalayhi as-salām reçut pouvoir sur les djinns, les hommes et
      les oiseaux, et apprit le langage de toutes les créatures. Lorsque ses
      armées s'engagèrent dans la vallée des fourmis, une fourmi s'écria :
      "Ô fourmis, entrez dans vos demeures, que Sulaymān et ses soldats
      ne vous écrasent pas sans s'en apercevoir." Sulaymān sourit à ses
      paroles et invoqua : "Seigneur, permets-moi d'être reconnaissant
      pour le bienfait que Tu m'as accordé, ainsi qu'à mes parents."
    reference: Surah al-Naml 27:15-19
    quran_refs: "27:15-19"
    source_url: https://quran.com/27/15-19
    source_notes: |
      Al-Rāzī (Mafātīḥ al-Ghayb, 24:90) and al-Qurṭubī (Tafsīr, 11:220) discuss Sulaymān’s understanding of animal speech as a specific miracle, not a general human capacity. The incident illustrates gratitude for blessings—both outward dominion and inward knowledge—a theme classical mufassirūn emphasize.
    source_notes_fr: |
      Al-Rāzī (Mafātīḥ al-Ghayb, 24:90) et al-Qurṭubī (Tafsīr, 11:220) discutent de la compréhension par Sulaymān du langage animal comme un miracle spécifique, et non comme une capacité humaine générale. Cet incident illustre la gratitude pour les bienfaits — tant le pouvoir extérieur que la connaissance intérieure — un thème que les mufassirūn classiques soulignent.
    source_notes_ar: |
      يَنَاقِشُ الرَّازِيُّ (مَفَاتِيحُ الغَيْبِ، ٢٤:٩٠) وَالقُرْطُبِيُّ (تَفْسِيرُ، ١١:٢٢٠) فَهْمَ سُلَيْمَانَ لِلْمَنْطِقِ الحَيَوَانِيِّ كَمُعْجِزَةٍ خَاصَّةٍ، لَا كَقُدْرَةٍ بَشَرِيَّةٍ عَامَّةٍ. وَيُجَسِّدُ هَذَا المَوْقِفُ الشُّكْرَ عَلَى النِّعَمِ — سُلْطَانٍ ظَاهِرٍ وَعِلْمٍ بَاطِنٍ — وَهُوَ مَوْضُوعٌ يُؤَكِّدُهُ المُفَسِّرُونَ الكِلَاسِيكِيُّونَ.
    display_day_of_year: 255

