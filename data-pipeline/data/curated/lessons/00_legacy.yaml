  - slug: people-of-the-cave
    category: quran_story
    title_en: The People of the Cave (Ashab al-Kahf)
    title_ar: أَصْحَابُ الكَهْفِ
    title_fr: Les Gens de la Caverne (Aṣḥāb al-Kahf)
    description_en: |
      A group of young believers fled the polytheism of their city and took
      refuge in a cave. Allah preserved them in sleep, turning them from
      side to side, for what the Qur'an describes as "three hundred years
      and nine added" (18:25), immediately followed by "Say: Allah knows
      best how long they remained" (18:26) — the deferral of final
      knowledge to Allah being itself one of the lessons. When they awoke
      thinking they had slept a day or part of a day, one went to the city
      with a silver coin (*wariq*) for food, revealing their miraculous
      preservation to the now-monotheist population. The surah is recited
      on Fridays as a recommended Sunnah.
    description_ar: |
      فَرَّ فِتْيَةٌ مُؤْمِنُونَ مِنْ شِرْكِ مَدِينَتِهِمْ وَلَجَأُوا إِلَى
      الكَهْفِ، فَحَفِظَهُمُ اللهُ نَائِمِينَ، يُقَلِّبُهُمْ ذَاتَ اليَمِينِ
      وَذَاتَ الشِّمَالِ، مُدَّةً وَصَفَهَا القُرْآنُ بِأَنَّهَا "ثَلَاثُ
      مِائَةٍ سِنِينَ وَازْدَادُوا تِسْعًا" (الكهف 25)، ثُمَّ أَعْقَبَهَا
      بِقَوْلِهِ: "قُلِ اللهُ أَعْلَمُ بِمَا لَبِثُوا" (الكهف 26)، فَكَانَ
      رَدُّ العِلْمِ إِلَى اللهِ مِنْ جُمْلَةِ مَا تُعَلِّمُهُ القِصَّةُ.
      فَلَمَّا اسْتَيْقَظُوا وَظَنُّوا أَنَّهُمْ لَبِثُوا يَوْمًا أَوْ
      بَعْضَ يَوْمٍ، أَرْسَلُوا أَحَدَهُمْ بِوَرِقِهِمْ إِلَى المَدِينَةِ
      لِيَأْتِيَهُمْ بِطَعَامٍ، فَانْكَشَفَتْ مُعْجِزَةُ حِفْظِهِمْ
      لِلْأَهَالِي الَّذِينَ صَارُوا مُوَحِّدِينَ. وَتُسَنُّ قِرَاءَةُ
      السُّورَةِ يَوْمَ الجُمُعَةِ.
    description_fr: |
      Un groupe de jeunes croyants fuit le polythéisme de leur cité et
      se réfugia dans une caverne. Allah les conserva dans le sommeil, les
      tournant d'un côté à l'autre, pendant ce que le Coran décrit comme
      "trois cents ans, et neuf de plus" (18:25), immédiatement suivi par
      "Dis : Allah sait mieux combien de temps ils demeurèrent" (18:26) —
      le renvoi de la connaissance ultime à Allah étant lui-même l'une des
      leçons. Lorsqu'ils s'éveillèrent croyant n'avoir dormi qu'un jour ou
      une partie de jour, l'un d'eux se rendit à la ville avec une pièce
      d'argent (*wariq*) pour acheter de la nourriture, révélant leur
      conservation miraculeuse à la population devenue monothéiste. Il est
      recommandé (Sunna) de réciter cette sourate les vendredis.
    reference: Surah al-Kahf 18:9-26
    quran_refs: "18:9-26"
    source_url: https://quran.com/18/9-26
    source_notes: |
      Ibn Kathīr (Tafsīr, 5:150) and al-Ṭabarī (Tafsīr, 15:320) note that the precise number of sleepers is among the matters Allah deliberately left ambiguous, teaching Muslims to restrain speculation. Sunni scholars affirm this story as a miracle of divine preservation and a refutation of those who deny the resurrection.
    source_notes_fr: |
      Ibn Kathīr (Tafsīr, 5:150) et al-Ṭabarī (Tafsīr, 15:320) notent que le nombre exact des dormeurs compte parmi les sujets qu'Allah a délibérément laissés ambigus, enseignant aux musulmans à se refréner de spéculations. Les savants sunnites affirment cette histoire comme un miracle de la préservation divine et une réfutation de ceux qui nient la résurrection.
    source_notes_ar: |
      يُلَاحِظُ ابنُ كَثِيرٍ (تَفْسِيرُ، ٥:١٥٠) وَالطَّبَرِيُّ (تَفْسِيرُ، ١٥:٣٢٠) أَنَّ عَدَدَ الرِّقَادِ بِالتَّحْدِيدِ يَنْطَوِي عَلَى مَسَائِلَ تَرَكَهَا اللهُ عَمْدًا مُبْهَمَةً، لِيُعَلِّمَ المُسْلِمِينَ ضَبْطَ التَّنَظُّرِ. يُؤَكِّدُ العُلَمَاءُ السُّنِّيُّونَ هَذِهِ القِصَّةَ كَمُعْجِزَةٍ لِلْحِفْظِ الإِلَهِيِّ وَدَحْضٍ لِمَنْ يُنْكِرُونَ البَعْثَ.
    display_day_of_year: 30

  - slug: dhul-qarnayn
    category: quran_story
    title_en: Dhu al-Qarnayn and the Barrier
    title_ar: ذُو القَرْنَيْنِ وَالسَّدُّ
    title_fr: Dhū al-Qarnayn et la barrière
    description_en: |
      A righteous ruler whom Allah gave "means to all things," Dhu al-Qarnayn
      traveled to the setting and rising places of the sun, establishing
      justice. At a pass between two mountains he found a people afflicted by
      the ravages of Ya'juj and Ma'juj (Gog and Magog). He built a barrier of
      iron and molten copper that "Ya'juj and Ma'juj could not scale or
      breach" — saying: "This is a mercy from my Lord; but when the promise
      of my Lord comes, He will make it level."
    description_ar: |
      ذُو القَرْنَيْنِ حَاكِمٌ صَالِحٌ آتَاهُ اللهُ مِنْ كُلِّ شَيْءٍ
      سَبَبًا، فَسَارَ إِلَى مَغْرِبِ الشَّمْسِ وَمَطْلِعِهَا مُقِيمًا
      العَدْلَ. وَلَمَّا بَلَغَ بَيْنَ السَّدَّيْنِ، وَجَدَ قَوْمًا
      يُعَانُونَ مِنْ فَسَادِ يَأْجُوجَ وَمَأْجُوجَ، فَبَنَى لَهُمْ سَدًّا
      مِنْ زُبَرِ الحَدِيدِ وَالنُّحَاسِ المَصْهُورِ، فَلَمْ يَسْتَطِيعُوا
      "أَنْ يَظْهَرُوهُ وَمَا اسْتَطَاعُوا لَهُ نَقْبًا"، وَقَالَ: "هَذَا
      رَحْمَةٌ مِنْ رَبِّي، فَإِذَا جَاءَ وَعْدُ رَبِّي جَعَلَهُ دَكَّاءَ".
    description_fr: |
      Souverain juste à qui Allah donna "les moyens d'accès à toute chose",
      Dhū al-Qarnayn voyagea jusqu'aux lieux où le soleil se couche et se
      lève, instaurant la justice. À un défilé entre deux montagnes, il
      trouva un peuple affligé par les ravages de Yaʾjūj et Maʾjūj (Gog et
      Magog). Il construisit une barrière de fer et de cuivre fondu que
      "Yaʾjūj et Maʾjūj ne purent ni gravir ni percer", disant : "C'est
      une miséricorde de mon Seigneur ; et lorsque la promesse de mon
      Seigneur viendra, Il la nivellera."
    reference: Surah al-Kahf 18:83-98
    quran_refs: "18:83-98"
    source_url: https://quran.com/18/83-98
    source_notes: |
      Al-Ṭabarī (Tafsīr, 16:420) and Ibn Kathīr (Tafsīr, 5:180) report scholarly disagreement on whether Dhu al-Qarnayn was a prophet or a righteous king, with the latter view being more common among Ahl al-Sunna. The barrier (al-sadd) remains until the Hour, when Yaʾjūj and Maʾjūj will emerge, as detailed in authentic hadith in Ṣaḥīḥ Muslim (2880).
    source_notes_fr: |
      Al-Ṭabarī (Tafsīr, 16:420) et Ibn Kathīr (Tafsīr, 5:180) rapportent un désaccord savant sur le fait que Dhū al-Qarnayn fût un prophète ou un roi juste, la seconde opinion étant la plus répandue chez Ahl al-Sunna. La barrière (al-sadd) demeure jusqu'à l'Heure, moment où Yaʾjūj et Maʾjūj en sortiront, comme le détaille un hadith authentique de Ṣaḥīḥ Muslim (2880).
    source_notes_ar: |
      يَرْوِي الطَّبَرِيُّ (تَفْسِيرُ، ١٦:٤٢٠) وَابنُ كَثِيرٍ (تَفْسِيرُ، ٥:١٨٠) اخْتِلَافَ العُلَمَاءِ فِي كَوْنِ ذِي القَرْنَيْنِ نَبِيًّا أَوْ مَلِكًا صَالِحًا، وَالرَّأْيُ الثَّانِي هُوَ الأَشَهَرُ عِنْدَ أَهْلِ السُّنَّةِ. وَالسَّدُّ بَاقٍ إِلَى السَّاعَةِ، حِينَ يَخْرُجُ يَأْجُوجُ وَمَأْجُوجُ، كَمَا فَصَّلَ حَدِيثٌ صَحِيحٌ فِي صَحِيحِ مُسْلِمٍ (٢٨٨٠).
    display_day_of_year: 60

