  - slug: sunnah-miswak
    category: sunnah_practice
    title_en: The Sunnah of the Miswak
    title_ar: سُنَّةُ السِّوَاكِ
    title_fr: La Sunna du siwāk
    description_en: |
      The Prophet ﷺ said: "If I did not think it would be too difficult for
      my community, I would have commanded them to use the miswak before
      every prayer." He used it upon waking, before prayer, before entering
      the house, and at many other times. The miswak is from the araak tree
      and is reported to have medicinal properties that modern research
      has confirmed.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "لَوْلَا أَنْ أَشُقَّ عَلَى أُمَّتِي لَأَمَرْتُهُمْ
      بِالسِّوَاكِ عِنْدَ كُلِّ صَلَاةٍ". وَكَانَ ﷺ يَسْتَاكُ عِنْدَ
      الِاسْتِيقَاظِ، وَقَبْلَ الصَّلَاةِ، وَعِنْدَ دُخُولِ بَيْتِهِ،
      وَفِي مَوَاضِعَ كَثِيرَةٍ. وَالسِّوَاكُ مِنْ شَجَرَةِ الأَرَاكِ،
      وَلَهُ خَوَاصُّ طِبِّيَّةٌ أَثْبَتَهَا البَحْثُ الحَدِيثُ.
    description_fr: |
      Le Prophète ﷺ a dit : "Si je ne craignais d'imposer une trop grande
      gêne à ma communauté, je leur aurais ordonné d'utiliser le siwāk
      avant chaque prière." Il l'utilisait au réveil, avant la prière,
      avant d'entrer dans sa demeure, et en bien d'autres occasions. Le
      siwāk provient de l'arbre arāk et possède, selon les rapports, des
      propriétés médicinales que la recherche moderne a confirmées.
    reference: Sahih al-Bukhari 887, Sahih Muslim 252
    hadith_refs: "Bukhari 887, Muslim 252"
    source_url: https://sunnah.com/bukhari:887
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 2:380) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 4:110) record multiple narrations on the miswāk’s virtue, noting that the Prophet ﷺ used it at every change of state. The Ḥanbalī madhhab considers it strongly recommended (sunnah muʾakkada) before each prayer, while others view it as meritorious without being obligatory.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 2:380) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 4:110) rapportent de multiples narrations sur la vertu du siwāk, notant que le Prophète ﷺ l'utilisait à chaque changement d'état. Le madhhab ḥanbalī le considère fortement recommandé (sunnah muʾakkada) avant chaque prière, tandis que d'autres le voient comme méritoire sans être obligatoire.
    source_notes_ar: |
      يَرْوِي ابنُ حَجَرٍ (فَتْحُ البَارِي، ٢:٣٨٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ٤:١١٠) أَحَادِيثَ مُتَعَدِّدَةً فِي فَضْلِ السِّوَاكِ، مُشِيرَيْنِ إِلَى أَنَّ النَّبِيَّ ﷺ كَانَ يَسْتَاكُ عِنْدَ كُلِّ تَحَوُّلٍ. وَيَعْتَبِرُ المَذْهَبُ الحَنْبَلِيُّ السِّوَاكَ سُنَّةً مُؤَكَّدَةً قَبْلَ كُلِّ صَلاَةٍ، بَيْنَمَا يَرَاهُ غَيْرُهُمْ مُسْتَحَبًّا دُونَ وُجُوبٍ.
    display_day_of_year: 25

  - slug: sunnah-eating-adab
    category: sunnah_practice
    title_en: The Etiquettes of Eating
    title_ar: آدَابُ الطَّعَامِ
    title_fr: Les bonnes manières du repas
    description_en: |
      The Prophet ﷺ taught to say "Bismillah" before eating, to eat with the
      right hand, to eat from what is near to oneself, to not eat reclining
      or blowing into food, to lick the fingers before wiping them, and to
      praise Allah after eating. Meals are both a bodily necessity and a
      spiritual practice when done in the manner of the Prophet ﷺ.
    description_ar: |
      عَلَّمَ النَّبِيُّ ﷺ التَّسْمِيَةَ قَبْلَ الطَّعَامِ، وَالأَكْلَ
      بِاليَمِينِ، وَالأَكْلَ مِمَّا يَلِي الآكِلَ، وَنَهَى عَنِ الأَكْلِ
      مُتَّكِئًا أَوْ بِالنَّفْخِ فِي الطَّعَامِ، وَأَمَرَ بِلَعْقِ
      الأَصَابِعِ قَبْلَ مَسْحِهَا، وَبِحَمْدِ اللهِ بَعْدَ الفَرَاغِ.
      فَالطَّعَامُ ضَرُورَةٌ بَدَنِيَّةٌ وَعِبَادَةٌ رُوحِيَّةٌ مَعًا
      إِذَا كَانَ عَلَى هَدْيِ النَّبِيِّ ﷺ.
    description_fr: |
      Le Prophète ﷺ a enseigné de prononcer "Bismi-Llāh" avant de manger,
      de manger de la main droite, de manger de ce qui est près de soi, de
      ne pas manger accoudé ni de souffler dans la nourriture, de lécher
      les doigts avant de les essuyer, et de louer Allah après le repas.
      Les repas sont à la fois une nécessité corporelle et une pratique
      spirituelle lorsqu'ils sont accomplis à la manière du Prophète ﷺ.
    reference: Sahih al-Bukhari 5376, Sahih Muslim 2020, 2022
    hadith_refs: "Bukhari 5376, Muslim 2020, Muslim 2022"
    source_url: https://sunnah.com/bukhari:5376
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 9:450–460) and al-ʿAynī (ʿUmdat al-Qārī, 15:200) compile the eating etiquettes from dozens of authentic reports, emphasizing that these are not mere customs but embodied gratitude. The four Sunni madhhabs agree on the recommendation of eating with the right hand and saying the basmala, though they differ slightly on whether the basmala is obligatory or sunna.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 9:450–460) et al-ʿAynī (ʿUmdat al-Qārī, 15:200) compilent les étiquettes du repas à partir de dizaines de rapports authentiques, soulignant qu'il ne s'agit pas de simples coutumes mais d'une gratitude incarnée. Les quatre madhhabs sunnites s'accordent sur la recommandation de manger de la main droite et de dire la basmala, bien qu'ils diffèrent légèrement sur le caractère obligatoire ou sunna de la basmala.
    source_notes_ar: |
      يُجْمِعُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٩:٤٥٠–٤٦٠) وَالعَيْنِيُّ (عُمْدَةُ القَارِي، ١٥:٢٠٠) آدَابَ الطَّعَامِ مِنْ عُشُورٍ مِنَ الرِّوَايَاتِ الصَّحِيحَةِ، مُؤَكِّدَيْنِ أَنَّهَا لَيْسَتْ مُجَرَّدَ عَادَاتٍ بَلْ شُكْرًا مُتَجَسِّدًا. وَيَتَّفِقُ المَذَاهِبُ السُّنِّيَّةُ الأَرْبَعَةُ عَلَى اسْتِحْبَابِ الأَكْلِ بِاليَمِينِ وَالتَّسْمِيَةِ، وَإِنِ اخْتَلَفُوا قَلِيلاً فِي كَوْنِ البَسْمَلَةِ فَرْضًا أَمْ سُنَّةً.
    display_day_of_year: 55

  - slug: sunnah-sleep-adab
    category: sunnah_practice
    title_en: The Sunnah of Sleep
    title_ar: سُنَّةُ النَّوْمِ
    title_fr: La Sunna du sommeil
    description_en: |
      The Prophet ﷺ made ablution before sleeping, slept on his right side
      with his right hand under his cheek, recited Ayat al-Kursi, the last
      three surahs (al-Ikhlas, al-Falaq, al-Nas), and a supplication
      beginning "In Your name, O Allah, I die and I live." Upon waking he
      praised Allah: "All praise is to Allah who gave us life after having
      caused us to die, and to Him is the resurrection."
    description_ar: |
      كَانَ النَّبِيُّ ﷺ يَتَوَضَّأُ قَبْلَ النَّوْمِ، وَيَنَامُ عَلَى
      شِقِّهِ الأَيْمَنِ وَاضِعًا يَدَهُ اليُمْنَى تَحْتَ خَدِّهِ،
      وَيَقْرَأُ آيَةَ الكُرْسِيِّ وَالمُعَوِّذَاتِ الثَّلَاثَ (الإِخْلَاصَ
      وَالفَلَقَ وَالنَّاسَ)، وَيَدْعُو: "بِاسْمِكَ اللَّهُمَّ أَمُوتُ
      وَأَحْيَا". وَإِذَا اسْتَيْقَظَ حَمِدَ اللهَ: "الحَمْدُ للهِ الَّذِي
      أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ".
    description_fr: |
      Le Prophète ﷺ faisait ses ablutions avant de dormir, dormait sur son
      côté droit en plaçant sa main droite sous sa joue, récitait Āyat
      al-Kursī, les trois dernières sourates (al-Ikhlāṣ, al-Falaq, al-Nās),
      et une invocation commençant par "En Ton nom, ô Allah, je meurs et
      je vis." Au réveil il louait Allah : "Louange à Allah qui nous a
      fait revivre après nous avoir donné la mort, et c'est vers Lui que
      se fait la résurrection."
    reference: Sahih al-Bukhari 247, 5017, 6320, 6324
    hadith_refs: "Bukhari 247, Bukhari 5017, Bukhari 6320, Bukhari 6324"
    source_url: https://sunnah.com/bukhari:247
    source_notes: |
      Al-Nawawī (al-Adhkār, pp. 230–245) and Ibn al-Qayyim (al-Wābil al-Ṣayyib, pp. 100–110) provide detailed guidance on sleep based on the Prophet’s ﷺ practice, classifying the adhkār as strongly recommended. Ahl al-Sunna reject superstitious practices around sleep, grounding all night routines in authentic hadith and Qur’anic recitation.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, pp. 230–245) et Ibn al-Qayyim (al-Wābil al-Ṣayyib, pp. 100–110) fournissent des directives détaillées sur le sommeil fondées sur la pratique du Prophète ﷺ, classant les adhkār comme fortement recommandés. Ahl al-Sunna rejettent les pratiques superstitieuses autour du sommeil, fondant toutes les routines nocturnes sur des hadiths authentiques et la récitation coranique.
    source_notes_ar: |
      يُقَدِّمُ النَّوَوِيُّ (الأَذْكَارُ، ص. ٢٣٠–٢٤٥) وَابنُ القَيِّمِ (الوَابِلُ الصَّيِّبُ، ص. ١٠٠–١١٠) تَوْجِيهَاتٍ مُفَصَّلَةً عَنِ النَّوْمِ اسْتِنَادًا إِلَى سُنَّةِ النَّبِيِّ ﷺ، مُصَنِّفَيْنِ الأَذْكَارَ مُسْتَحَبَّةً بِشِدَّةٍ. يَرْفُضُ أَهْلُ السُّنَّةِ المُمَارَسَاتِ الخُرَافِيَّةَ حَوْلَ النَّوْمِ، وَيُؤَسِّسُونَ جَمِيعَ الوَرَائِبِ اللَّيْلِيَّةِ عَلَى الأَحَادِيثِ الصَّحِيحَةِ وَالتِّلاوَةِ القُرْآنِيَّةِ.
    display_day_of_year: 85

  - slug: sunnah-greeting-salaam
    category: sunnah_practice
    title_en: The Sunnah of Greeting with Salaam
    title_ar: سُنَّةُ إِفْشَاءِ السَّلَامِ
    title_fr: La Sunna de la salutation par le salām
    description_en: |
      The Prophet ﷺ said: "You will not enter Paradise until you believe;
      and you will not believe until you love one another. Shall I not guide
      you to something that, if you do it, you will love one another? Spread
      salaam among you." The greeting "As-salamu 'alaykum" — "Peace be upon
      you" — with its reply adding "wa-rahmatullah" and "wa-barakatuh"
      carries ten, twenty, or thirty rewards respectively.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "لَا تَدْخُلُونَ الجَنَّةَ حَتَّى تُؤْمِنُوا،
      وَلَا تُؤْمِنُوا حَتَّى تَحَابُّوا. أَوَلَا أَدُلُّكُمْ عَلَى شَيْءٍ
      إِذَا فَعَلْتُمُوهُ تَحَابَبْتُمْ؟ أَفْشُوا السَّلَامَ بَيْنَكُمْ".
      وَتَحِيَّةُ "السَّلَامُ عَلَيْكُمْ" يَزِيدُهَا الجَوَابُ
      "وَرَحْمَةُ اللهِ" ثُمَّ "وَبَرَكَاتُهُ"، فَتَبْلُغُ بِالأُولَى عَشْرَ
      حَسَنَاتٍ، ثُمَّ عِشْرِينَ، ثُمَّ ثَلَاثِينَ.
    description_fr: |
      Le Prophète ﷺ a dit : "Vous n'entrerez pas au Paradis tant que vous
      n'aurez pas la foi ; et vous n'aurez pas la foi tant que vous ne vous
      aimerez pas mutuellement. Ne vous indiquerai-je pas quelque chose qui,
      lorsque vous le ferez, vous vous aimerez ? Répandez le salām entre
      vous." La salutation "As-salāmu ʿalaykum" — "Que la paix soit sur
      vous" — avec sa réponse à laquelle on ajoute "wa-raḥmatu-Llāh" puis
      "wa-barakātuh" porte dix, vingt ou trente récompenses
      respectivement.
    reference: Sahih Muslim 54, Sunan Abi Dawud 5195
    hadith_refs: "Muslim 54, Abu Dawud 5195"
    source_url: https://sunnah.com/muslim:54
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 11:20) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:80) explain the reward gradations based on the completeness of the greeting and response. The obligation to spread salām is understood by Sunni scholars as both a social glue and a declaration of Islamic identity, with al-Bukhārī dedicating a chapter to it in his Ṣaḥīḥ.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 11:20) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:80) expliquent les gradations de récompense fondées sur la complétude de la salutation et de la réponse. L'obligation de répandre le salām est comprise par les savants sunnites comme un ciment social et une déclaration d'identité islamique, et al-Bukhārī lui consacre un chapitre dans son Ṣaḥīḥ.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١١:٢٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٦:٨٠) تَدَرُّجَ الأَجْرِ بِنَاءً عَلَى تَمَامِ التَّحِيَّةِ وَالجَوَابِ. يَفْهَمُ العُلَمَاءُ السُّنِّيُّونَ فَرْضَ إِفْشَاءِ السَّلَامِ وَسَائِلَ اجْتِمَاعِيَّةً وَإِعْلاَنًا لِلْهُوِيَّةِ الإِسْلاَمِيَّةِ، وَقَدْ خَصَّصَ لَهُ البُخَارِيُّ بَابًا فِي صَحِيحِهِ.
    display_day_of_year: 115

  - slug: sunnah-friday-prayer
    category: sunnah_practice
    title_en: The Virtue of Jumu'ah
    title_ar: فَضْلُ يَوْمِ الجُمُعَةِ
    title_fr: Le mérite du Vendredi (Jumuʿa)
    description_en: |
      The Prophet ﷺ said: "The best day on which the sun rises is Friday. On
      it Adam was created, on it he was admitted to Paradise, and on it he
      was taken out from it." He taught the Sunnah of ghusl (major ablution),
      wearing one's best clothes, using perfume, arriving early, reading
      Surah al-Kahf, and sending abundant salutations upon him ﷺ on this day.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "خَيْرُ يَوْمٍ طَلَعَتْ عَلَيْهِ الشَّمْسُ يَوْمُ
      الجُمُعَةِ، فِيهِ خُلِقَ آدَمُ، وَفِيهِ أُدْخِلَ الجَنَّةَ، وَفِيهِ
      أُخْرِجَ مِنْهَا". وَسَنَّ ﷺ الغُسْلَ يَوْمَ الجُمُعَةِ، وَلُبْسَ
      أَحْسَنِ الثِّيَابِ، وَالتَّطَيُّبَ، وَالتَّبْكِيرَ إِلَى الصَّلَاةِ،
      وَقِرَاءَةَ سُورَةِ الكَهْفِ، وَالإِكْثَارَ مِنَ الصَّلَاةِ عَلَيْهِ
      ﷺ فِي هَذَا اليَوْمِ.
    description_fr: |
      Le Prophète ﷺ a dit : "Le meilleur jour où se lève le soleil est le
      Vendredi. Ce jour-là Ādam fut créé, ce jour-là il fut admis au
      Paradis, et ce jour-là il en fut sorti." Il a enseigné la Sunna du
      ghusl (grande ablution), de revêtir ses plus beaux vêtements, de se
      parfumer, de se rendre tôt à la mosquée, de lire la sourate al-Kahf
      et de multiplier les bénédictions sur lui ﷺ ce jour-là.
    reference: Sahih Muslim 854, Sunan Abi Dawud 1047
    hadith_refs: "Muslim 854, Abu Dawud 1047"
    source_url: https://sunnah.com/muslim:854
    source_notes: |
      Ibn al-Qayyim (Zād al-Maʿād, 1:390) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 6:180) enumerate the Friday sunnas, noting that ghusl and reading Sūrat al-Kahf are practices with strong authentic support. The four Sunni madhhabs agree on the communal obligation (farḍ kifāya) of Jumuʿa for free adult males resident in a town.
    source_notes_fr: |
      Ibn al-Qayyim (Zād al-Maʿād, 1:390) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 6:180) énumèrent les sunnas du vendredi, notant que le ghusl et la lecture de Sūrat al-Kahf sont des pratiques fortement étayées par des sources authentiques. Les quatre madhhabs sunnites s'accordent sur l'obligation communautaire (farḍ kifāya) de la Jumuʿa pour les hommes adultes libres résidant dans une ville.
    source_notes_ar: |
      يَعُدُّ ابنُ القَيِّمِ (زَادُ المَعَادِ، ١:٣٩٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ٦:١٨٠) سُنَنَ الجُمُعَةِ، مُشِيرَيْنِ إِلَى أَنَّ الغُسْلَ وَقِرَاءَةَ سُورَةِ الكَهْفِ مُمَارَسَاتٍ ذَاتِ أَصْلٍ صَحِيحٍ قَوِيٍّ. وَيَتَّفِقُ المَذَاهِبُ السُّنِّيَّةُ الأَرْبَعَةُ عَلَى فَرْضِ الجُمُعَةِ الكِفَائِيِّ لِلرِّجَالِ الأَحْرَارِ البَالِغِينَ المُقِيمِينَ فِي المَدِينَةِ.
    display_day_of_year: 145

  - slug: sunnah-the-night-prayer
    category: sunnah_practice
    title_en: The Sunnah of Tahajjud (Night Prayer)
    title_ar: سُنَّةُ قِيَامِ اللَّيْلِ (التَّهَجُّدِ)
    title_fr: La Sunna du tahajjud (prière de nuit)
    description_en: |
      The Prophet ﷺ said: "The most excellent prayer after the obligatory
      prayers is the night prayer." He prayed eleven rak'ahs at night,
      sometimes thirteen, lengthening the recitation and the prostration.
      Allah describes those who pray at night in Surah al-Sajda 32:16:
      "They forsake their beds, calling upon their Lord in fear and hope."
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "أَفْضَلُ الصَّلَاةِ بَعْدَ الفَرِيضَةِ صَلَاةُ
      اللَّيْلِ". وَكَانَ ﷺ يُصَلِّي مِنَ اللَّيْلِ إِحْدَى عَشْرَةَ
      رَكْعَةً، وَأَحْيَانًا ثَلَاثَ عَشْرَةَ، يُطِيلُ القِرَاءَةَ
      وَالسُّجُودَ. وَوَصَفَ اللهُ القَائِمِينَ فِي قَوْلِهِ تَعَالَى
      فِي سُورَةِ السَّجْدَةِ (32: 16): "تَتَجَافَى جُنُوبُهُمْ عَنِ
      المَضَاجِعِ يَدْعُونَ رَبَّهُمْ خَوْفًا وَطَمَعًا".
    description_fr: |
      Le Prophète ﷺ a dit : "La meilleure prière après les prières
      obligatoires est la prière de nuit." Il accomplissait onze rakʿats
      la nuit, parfois treize, en prolongeant la récitation et la
      prosternation. Allah décrit ceux qui prient la nuit dans la sourate
      al-Sajda (32:16) : "Ils s'arrachent à leurs lits, invoquant leur
      Seigneur par crainte et par espoir."
    reference: Sahih Muslim 1163, Sahih al-Bukhari 1147
    hadith_refs: "Muslim 1163, Bukhari 1147"
    quran_refs: "32:16"
    source_url: https://sunnah.com/muslim:1163
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 3:200) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 6:50) detail the Prophet’s ﷺ night prayer as eleven rakʿahs including witr, a practice the Ṣaḥāba continued. Sunni scholars uniformly consider tahajjud the greatest voluntary prayer after the obligatory ones, with special virtue in the last third of the night.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 3:200) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 6:50) détaillent la prière nocturne du Prophète ﷺ comme onze rakʿahs incluant le witr, pratique que les Ṣaḥāba ont continuée. Les savants sunnites considèrent uniformément le tahajjud comme la plus grande prière volontaire après les prières obligatoires, avec une vertu particulière dans le dernier tiers de la nuit.
    source_notes_ar: |
      يُفَصِّلُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٣:٢٠٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ٦:٥٠) صَلاَةَ اللَّيْلِ النَّبَوِيَّةَ بِأَحَدَ عَشَرَ رَكْعَةً مَعَ الوِتْرِ، مُمَارَسَةً وَاصَلَهَا الصَّحَابَةُ. يَعْتَبِرُ العُلَمَاءُ السُّنِّيُّونَ التَّهَجُّدَ — بِإِجْمَاعٍ — أَفْضَلَ الصَّلاَةِ التَّطَوُّعِيَّةِ بَعْدَ الفَرَائِضِ، وَلَهُ فَضْلٌ خَاصٌّ فِي آخِرِ ثُلُثِ اللَّيْلِ.
    display_day_of_year: 175

  - slug: sunnah-fasting-mondays-thursdays
    category: sunnah_practice
    title_en: Fasting on Mondays and Thursdays
    title_ar: صِيَامُ الِاثْنَيْنِ وَالخَمِيسِ
    title_fr: Le jeûne du lundi et du jeudi
    description_en: |
      The Prophet ﷺ fasted regularly on Mondays and Thursdays, saying:
      "Deeds are presented to Allah on Mondays and Thursdays, and I love
      that my deeds be presented while I am fasting." He was also asked
      about fasting on Monday and replied: "That is the day on which I was
      born, and the day on which revelation began to come to me."
    description_ar: |
      كَانَ النَّبِيُّ ﷺ يَتَحَرَّى صِيَامَ الِاثْنَيْنِ وَالخَمِيسِ،
      وَقَالَ: "تُعْرَضُ الأَعْمَالُ يَوْمَ الِاثْنَيْنِ وَالخَمِيسِ،
      فَأُحِبُّ أَنْ يُعْرَضَ عَمَلِي وَأَنَا صَائِمٌ". وَلَمَّا سُئِلَ
      عَنْ صِيَامِ يَوْمِ الِاثْنَيْنِ قَالَ: "ذَاكَ يَوْمٌ وُلِدْتُ فِيهِ
      وَيَوْمٌ بُعِثْتُ — أَوْ أُنْزِلَ عَلَيَّ — فِيهِ".
    description_fr: |
      Le Prophète ﷺ jeûnait régulièrement les lundis et jeudis, disant :
      "Les actes sont présentés à Allah le lundi et le jeudi, et j'aime
      que mes actes soient présentés alors que je jeûne." Interrogé sur le
      jeûne du lundi, il répondit : "C'est le jour où je suis né, et le
      jour où la révélation a commencé à me parvenir."
    reference: Sahih Muslim 1162
    hadith_refs: "Muslim 1162"
    source_url: https://sunnah.com/muslim:1162
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 4:210) notes that the Prophet ﷺ gave two reasons for Monday fasting—his birth and the start of revelation—making it a sunna of gratitude. The presentation of deeds on these days is cited by scholars as divine encouragement to perform extra worship when one’s record is being reviewed.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 4:210) note que le Prophète ﷺ a donné deux raisons pour le jeûne du lundi — sa naissance et le début de la révélation — en faisant une sunna de gratitude. La présentation des œuvres ces jours-là est citée par les savants comme une encouragement divine à accomplir des œuvres supplémentaires lors de la révision du registre.
    source_notes_ar: |
      يُشِيرُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٤:٢١٠) إِلَى أَنَّ النَّبِيَّ ﷺ قَدَّمَ سَبَبَيْنِ لِصِيَامِ الِاثْنَيْنِ — مِيلَادَهُ وَبَدْءَ الوَحْيِ — مُجَعِّلًا إِيَّاهُ سُنَّةَ شُكْرٍ. وَيَسْتَشْهِدُ العُلَمَاءُ بِعَرْضِ الأَعْمَالِ هَذَيْنِ اليَوْمَيْنِ تَشْجِيعًا إِلَهِيًّا عَلَى الإِكْثَارِ مِنَ الطَّاعَاتِ عِنْدَ مُرَاجَعَةِ الدَّوَّانِ.
    display_day_of_year: 205

  - slug: sunnah-dhikr-after-prayer
    category: sunnah_practice
    title_en: Dhikr After the Obligatory Prayer
    title_ar: الذِّكْرُ دُبُرَ الصَّلَوَاتِ المَكْتُوبَةِ
    title_fr: Le dhikr après la prière obligatoire
    description_en: |
      The Prophet ﷺ taught to say after each obligatory prayer: "Astaghfir
      Allah" three times, followed by "Allahumma anta al-Salam wa minka
      al-salam tabarakta ya Dhal-Jalali wal-Ikram." He also taught saying
      Subhan Allah (33 times), Alhamdulillah (33), and Allahu Akbar (33 or
      34) completing with La ilaha illa Allah — a practice that the Prophet
      ﷺ said would bring forgiveness "even if one's sins were like the foam
      of the sea."
    description_ar: |
      عَلَّمَ النَّبِيُّ ﷺ أَنْ يُقَالَ دُبُرَ كُلِّ صَلَاةٍ مَكْتُوبَةٍ:
      "أَسْتَغْفِرُ اللهَ" ثَلَاثًا، ثُمَّ "اللَّهُمَّ أَنْتَ السَّلَامُ
      وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الجَلَالِ وَالإِكْرَامِ".
      وَعَلَّمَ أَيْضًا قَوْلَ "سُبْحَانَ اللهِ" ثَلَاثًا وَثَلَاثِينَ،
      وَ"الحَمْدُ للهِ" ثَلَاثًا وَثَلَاثِينَ، وَ"اللهُ أَكْبَرُ" ثَلَاثًا
      وَثَلَاثِينَ أَوْ أَرْبَعًا وَثَلَاثِينَ، خِتَامًا بِـ"لَا إِلَهَ
      إِلَّا اللهُ" — وَهِيَ عِبَادَةٌ قَالَ النَّبِيُّ ﷺ إِنَّهَا تُحَطُّ
      بِهَا الذُّنُوبُ "وَلَوْ كَانَتْ مِثْلَ زَبَدِ البَحْرِ".
    description_fr: |
      Le Prophète ﷺ a enseigné de dire après chaque prière obligatoire :
      "Astaghfir Allāh" trois fois, suivi de "Allāhumma anta al-Salām wa
      minka al-salām, tabārakta yā Dhā al-Jalāli wa-l-Ikrām." Il a aussi
      enseigné de dire Subḥān Allāh (33 fois), al-Ḥamdu li-Llāh (33 fois)
      et Allāhu Akbar (33 ou 34 fois), en clôturant par Lā ilāha illā
      Llāh — pratique dont le Prophète ﷺ a dit qu'elle apporte le pardon
      "même si les péchés étaient comme l'écume de la mer."
    reference: Sahih Muslim 591, 597
    hadith_refs: "Muslim 591, Muslim 597"
    source_url: https://sunnah.com/muslim:591
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 2:420) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 5:30) explain that the tasbīḥ, taḥmīd, and takbīr after prayer are strongly established (sunnah muʾakkada) in all four madhhabs. The narration about forgiveness 'like the foam of the sea' is found in Muslim with a sound chain, and scholars recommend it especially for those unable to perform much voluntary worship.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 2:420) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 5:30) expliquent que le tasbīḥ, le taḥmīd et le takbīr après la prière sont fortement établis (sunnah muʾakkada) dans les quatre madhhabs. La narration sur le pardon 'comme l'écume de la mer' se trouve dans Muslim avec une chaîne saine, et les savants la recommandent particulièrement pour ceux qui ne peuvent accomplir beaucoup d'œuvres volontaires.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٢:٤٢٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ٥:٣٠) أَنَّ التَّسْبِيحَ وَالتَّحْمِيدَ وَالتَّكْبِيرَ بَعْدَ الصَّلاَةِ مُثَبَّتَةٌ (سُنَّةٌ مُؤَكَّدَةٌ) فِي المَذَاهِبِ الأَرْبَعَةِ. وَرِوَايَةُ المَغْفِرَةِ «وَلَوْ كَانَتْ مِثْلَ زَبَدِ البَحْرِ» وَارِدَةٌ فِي مُسْلِمٍ بِسَنَدٍ صَحِيحٍ، وَيُوصِي بِهَا العُلَمَاءُ خَاصَّةً لِمَنْ لاَ يَسْتَطِيعُ كَثْرَةَ النَّوَافِلِ.
    display_day_of_year: 235

  - slug: sunnah-charity-every-day
    category: sunnah_practice
    title_en: "Every Day the Sun Rises"
    title_ar: "كُلَّ يَوْمٍ تَطْلُعُ فِيهِ الشَّمْسُ"
    title_fr: "Chaque jour où se lève le soleil"
    description_en: |
      The Prophet ﷺ said: "Every day the sun rises, charity is due on every
      joint of the human body. To reconcile two people is charity; to help
      a man onto his mount is charity; a good word is charity; every step
      taken to prayer is charity; and removing harm from the road is
      charity." The hadith reframes charity as a daily, embodied, continuous
      practice rather than an occasional payment.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "كُلُّ سُلَامَى مِنَ النَّاسِ عَلَيْهِ صَدَقَةٌ،
      كُلَّ يَوْمٍ تَطْلُعُ فِيهِ الشَّمْسُ: تَعْدِلُ بَيْنَ الِاثْنَيْنِ
      صَدَقَةٌ، وَتُعِينُ الرَّجُلَ فِي دَابَّتِهِ صَدَقَةٌ، وَالكَلِمَةُ
      الطَّيِّبَةُ صَدَقَةٌ، وَبِكُلِّ خُطْوَةٍ تَمْشِيهَا إِلَى الصَّلَاةِ
      صَدَقَةٌ، وَتُمِيطُ الأَذَى عَنِ الطَّرِيقِ صَدَقَةٌ". وَفِي الحَدِيثِ
      تَوْسِيعٌ لِمَفْهُومِ الصَّدَقَةِ، فَهِيَ مُمَارَسَةٌ يَوْمِيَّةٌ
      بَدَنِيَّةٌ مُتَّصِلَةٌ، لَا مُجَرَّدُ بَذْلٍ مَالِيٍّ عَارِضٍ.
    description_fr: |
      Le Prophète ﷺ a dit : "Chaque jour où se lève le soleil, une aumône
      est due de chaque articulation du corps humain. Réconcilier deux
      personnes est une aumône ; aider un homme à monter sa monture est
      une aumône ; une bonne parole est une aumône ; chaque pas vers la
      prière est une aumône ; et ôter ce qui nuit du chemin est une
      aumône." Le ḥadīth recadre l'aumône en pratique quotidienne,
      incarnée et continue, plutôt qu'en versement occasionnel.
    reference: Sahih al-Bukhari 2989, Sahih Muslim 1009
    hadith_refs: "Bukhari 2989, Muslim 1009"
    source_url: https://sunnah.com/bukhari:2989
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 5:320) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 12:80) explain that 'joint' (sulāmā) here refers to each joint’s potential for good, making charity a comprehensive obligation. This hadith is foundational to the Islamic understanding that ṣadaqa encompasses time, effort, and character—not merely wealth—an interpretation held by all Sunni jurists.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 5:320) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 12:80) expliquent que 'articulation' (sulāmā) désigne ici le potentiel de bienfaisance de chaque articulation, faisant de la charité une obligation globale. Ce ḥadīth est fondamental pour la compréhension islamique selon laquelle la ṣadaqa englobe le temps, l'effort et le caractère — non seulement la richesse — une interprétation partagée par tous les juristes sunnites.
    source_notes_ar: |
      يُفَسِّرُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ٥:٣٢٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٢:٨٠) أَنَّ «السُّلاَمَى» هُنَا تَعْنِي قُدْرَةَ كُلِّ مَفْصِلٍ عَلَى الخَيْرِ، مُجَعِّلَةً الصَّدَقَةَ وَاجِبًا شَامِلًا. وَهَذَا الحَدِيثُ أَصْلٌ فِي الفَهْمِ الإِسْلاَمِيِّ بِأَنَّ الصَّدَقَةَ تَشْمَلُ الوَقْتَ وَالجُهْدَ وَالخُلُقَ — لاَ المَالَ فَحَسْبُ — وَهُوَ تَأْوِيلٌ مُتَّفَقٌ عَلَيْهِ عِنْدَ جَمِيعِ الفُقَهَاءِ السُّنِّيِّينَ.
    display_day_of_year: 265

  - slug: sunnah-visiting-sick
    category: sunnah_practice
    title_en: The Sunnah of Visiting the Sick
    title_ar: سُنَّةُ عِيَادَةِ المَرِيضِ
    title_fr: La Sunna de la visite du malade
    description_en: |
      The Prophet ﷺ counted visiting the sick among the rights of one Muslim
      upon another, and taught: "When the Muslim visits his sick brother,
      he remains in the harvest of Paradise until he returns." He would sit
      with sick companions, ask about their condition, supplicate for them,
      and teach a specific du'a: "As'alu Allah al-'Azim Rabb al-'Arsh
      al-'Azim an yashfiyaka" — seven times for cure if the time of death
      has not yet come.
    description_ar: |
      عَدَّ النَّبِيُّ ﷺ عِيَادَةَ المَرِيضِ مِنْ حُقُوقِ المُسْلِمِ
      عَلَى أَخِيهِ، وَقَالَ: "إِنَّ المُسْلِمَ إِذَا عَادَ أَخَاهُ
      المُسْلِمَ لَمْ يَزَلْ فِي خُرْفَةِ الجَنَّةِ حَتَّى يَرْجِعَ".
      وَكَانَ يَجْلِسُ إِلَى المَرِيضِ مِنْ أَصْحَابِهِ، وَيَسْأَلُهُ عَنْ
      حَالِهِ، وَيَدْعُو لَهُ، وَعَلَّمَ دُعَاءً مَخْصُوصًا: "أَسْأَلُ
      اللهَ العَظِيمَ رَبَّ العَرْشِ العَظِيمِ أَنْ يَشْفِيَكَ" — يُقَالُ
      سَبْعَ مَرَّاتٍ، فَيُشْفَى المَرِيضُ إِنْ لَمْ يَكُنْ قَدْ حَضَرَ
      أَجَلُهُ.
    description_fr: |
      Le Prophète ﷺ comptait la visite du malade parmi les droits du
      musulman envers son frère, et a enseigné : "Lorsque le musulman
      rend visite à son frère malade, il demeure dans la récolte du
      Paradis jusqu'à son retour." Il s'asseyait auprès des compagnons
      malades, s'enquérait de leur état, invoquait pour eux, et a
      enseigné une duʿā' spécifique : "As'alu Llāha l-ʿAẓīm Rabba
      l-ʿArshi l-ʿAẓīm an yashfiyaka" — à dire sept fois pour la
      guérison, si le terme n'est pas encore venu.
    reference: Sahih Muslim 2568, Jami' al-Tirmidhi 2083
    hadith_refs: "Muslim 2568, Tirmidhi 2083"
    source_url: https://sunnah.com/muslim:2568
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:180) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:90) note that 'the harvest of Paradise' (khurfa al-janna) refers to the abundant reward of this simple act. The specific duʿāʾ for cure is reported in multiple collections with sound chains, and Sunni fiqh manuals classify visiting the sick as a confirmed sunna (sunnah muʾakkada).
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:180) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:90) notent que 'la récolte du Paradis' (khurfa al-janna) désigne la récompense abondante de ce simple acte. La duʿāʾ spécifique pour la guérison est rapportée dans plusieurs collections avec des chaînes saines, et les manuels de fiqh sunnites classent la visite du malade comme une sunna confirmée (sunnah muʾakkada).
    source_notes_ar: |
      يَلْحَظُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١٠:١٨٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٦:٩٠) أَنَّ «خُرْفَةَ الجَنَّةِ» تَعْنِي الأَجْرَ الوَافِرَ لِهَذَا العَمَلِ البَسِيطِ. وَالدُّعَاءُ المُخَصَّصُ لِلشِّفَاءِ مَرْوِيٌّ فِي مَجَامِيعَ مُتَعَدِّدَةٍ بِسَنَدٍ صَحِيحٍ، وَيُصَنِّفُهُ مُتَأَهِّلُو الفِقْهِ السُّنِّيُّ سُنَّةً مُؤَكَّدَةً.
    display_day_of_year: 295

  - slug: sunnah-gentleness
    category: sunnah_practice
    title_en: The Sunnah of Gentleness (Rifq)
    title_ar: سُنَّةُ الرِّفْقِ
    title_fr: La Sunna de la douceur (rifq)
    description_en: |
      The Prophet ﷺ said: "Gentleness is not put into anything without
      beautifying it, and it is not removed from anything without making it
      ugly." And to Aisha ra: "Allah is gentle and loves gentleness in all
      matters." The Prophet ﷺ lived this comprehensively — in his
      interactions with children, servants, strangers, opponents, animals,
      and even inanimate objects — establishing gentleness as the default
      register of Muslim conduct.
    description_ar: |
      قَالَ النَّبِيُّ ﷺ: "إِنَّ الرِّفْقَ لَا يَكُونُ فِي شَيْءٍ إِلَّا
      زَانَهُ، وَلَا يُنْزَعُ مِنْ شَيْءٍ إِلَّا شَانَهُ". وَقَالَ
      لِعَائِشَةَ رَضِيَ اللهُ عَنْهَا: "إِنَّ اللهَ رَفِيقٌ يُحِبُّ
      الرِّفْقَ فِي الأَمْرِ كُلِّهِ". وَقَدْ عَاشَ النَّبِيُّ ﷺ هَذَا
      الخُلُقَ شَامِلًا — مَعَ الصِّبْيَانِ، وَالخَدَمِ، وَالغُرَبَاءِ،
      وَالخُصُومِ، وَالحَيَوَانَاتِ، حَتَّى الجَمَادَاتِ — مُؤَسِّسًا
      الرِّفْقَ سِمَةً أَصْلِيَّةً لِسُلُوكِ المُسْلِمِ.
    description_fr: |
      Le Prophète ﷺ a dit : "La douceur n'est pas placée en quelque chose
      sans l'embellir, et n'en est pas retirée sans l'enlaidir." Et à
      ʿĀʾisha (qu'Allah l'agrée) : "Allah est doux et aime la douceur en
      toute chose." Le Prophète ﷺ a vécu cela de façon globale — dans ses
      rapports avec les enfants, les serviteurs, les étrangers, les
      adversaires, les animaux, et même les objets inanimés — instaurant
      la douceur comme registre par défaut de la conduite musulmane.
    reference: Sahih Muslim 2594, Sahih al-Bukhari 6024
    hadith_refs: "Muslim 2594, Bukhari 6024"
    source_url: https://sunnah.com/muslim:2594
    source_notes: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:500) and al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:100) document the Prophet’s ﷺ gentleness across every domain of life. Ahl al-Sunna understand rifq not as weakness but as strength directed by wisdom, a quality the Prophet ﷺ said Allah Himself possesses and loves in His servants.
    source_notes_fr: |
      Ibn Ḥajar (Fatḥ al-Bārī, 10:500) et al-Nawawī (Sharḥ Ṣaḥīḥ Muslim, 16:100) documentent la douceur du Prophète ﷺ dans chaque domaine de la vie. Ahl al-Sunna comprennent le rifq non comme une faiblesse mais comme une force dirigée par la sagesse, une qualité que le Prophète ﷺ dit qu'Allah Lui-même possède et aime chez Ses serviteurs.
    source_notes_ar: |
      يَسْجُلُ ابنُ حَجَرٍ (فَتْحُ البَارِي، ١٠:٥٠٠) وَالنَّوَوِيُّ (شَرْحُ صَحِيحِ مُسْلِمٍ، ١٦:١٠٠) رِفْقَ النَّبِيِّ ﷺ فِي كُلِّ مَجَالٍ مِنَ الحَيَاةِ. يَفْهَمُ أَهْلُ السُّنَّةِ الرِّفْقَ لَيْسَ ضُعْفًا بَلْ قُوَّةً تَهْتَدِي بِالحِكْمَةِ، وَهِيَ صِفَةٌ يَقُولُ النَّبِيُّ ﷺ إِنَّ اللهَ يَتَمَتَّعُ بِهَا وَيُحِبُّهَا فِي عِبَادِهِ.
