  - slug: quran-fact-environment
    category: quran_hadith_fact
    title_en: Environmental Stewardship in Islam
    title_ar: الوصاية البيئية في الإسلام
    title_fr: L'intendance environnementale en islam
    description_en: |
      Long before modern environmental movements, the Qur'an established humans as "stewards" (khulafa) of the earth, not its owners. "It is He who has made you successors upon the earth," and "We did not create the heavens and earth and what is between them in play." The Prophet ﷺ forbade the cutting of trees in enemy territory during warfare, the killing of animals for sport, and the wasteful use of water — even when performing ablution by a flowing river. He said: "If the Hour comes while one of you holds a sapling in his hand, let him plant it." The concept of israf (wastefulness) is condemned as the work of Satan. Every element of creation — animals, plants, water, air — is described as praising Allah in its own way. The lesson is that environmental destruction is not merely an ecological crisis but a spiritual failure — a betrayal of the trust (amana) that Allah placed upon humanity.
    description_ar: |
      قبل حركات البيئة الحديثة بقرون، جعل القرآن البشر «خلفاء» في الأرض لا مالكين لها. «هو الذي جعلكم خلائف في الأرض»، و«ما خلقنا السماوات والأرض وما بينهما لاعبين». ونهى النبي ﷺ عن قطع الأشجار في أرض العدو أثناء الحرب، وقتل الحيوان للتسلية، وإسراف الماء — حين الوضوء بجانب نهر جارٍ. قال: «إن قامت الساعة وبيد أحدكم فسيلة فليغرسها». مفهوم الإسراف مُدان باعتباره فعل الشيطان. ويُصف كل عنصر من الخلق — حيوانات ونباتات ومياه وهواء — بأنه يسبح الله بطريقته. والدرس أن التدمير البيئي ليس مجرد أزمة بيئية بل فشل روحي — خيانة للأمانة التي وكلها الله للبشرية.
    description_fr: |
      Bien avant les mouvements environnementaux modernes, le Coran établit les humains comme des « intendants » (khulafā) de la terre, pas ses propriétaires. « C'est Lui qui vous a fait successeurs sur la terre », et « Nous n'avons pas créé les cieux et la terre et ce qui est entre eux en vain. » Le Prophète ﷙ interdit la coupe des arbres sur le territoire ennemi pendant la guerre, le massacre d'animaux pour le sport, et le gaspillage de l'eau — même en faisant l'ablution près d'une rivière coulant. Il dit : « Si l'Heure arrive pendant que l'un de vous tient une pousse dans sa main, qu'il la plante. » Le concept d'isrāf (gaspillage) est condamné comme l'œuvre de Satan. Chaque élément de la création — animaux, plantes, eau, air — est décrit comme louant Allah à sa manière. La leçon est que la destruction environnementale n'est pas simplement une crise écologique mais un échec spirituel — une trahison de la confiance (amāna) qu'Allah a placée sur l'humanité.
    reference: "al-Anʿām 6:165, al-Isrāʾ 17:26-27"
    source_notes: |
      Qur'an 6:165 and 17:26-27 establish stewardship; Bukhārī and Muslim report the prohibition on wastefulness and the command to plant even if the Hour approaches, framing environmental care as a sacred trust (amāna).
    source_notes_fr: |
      Les versets 6:165 et 17:26-27 du Coran établissent l'intendance ; al-Bukhārī et Muslim rapportent l'interdiction du gaspillage et le commandement de planter même si l'Heure approche, encadrant le soin de l'environnement comme une confiance sacrée (amāna).
    source_notes_ar: |
      تُرسّخ الآيتان ٦:١٦٥ و١٧:٢٦-٢٧ الوصاية؛ يُبلّغ البخاري ومسلم عن تحريم الإسراف والأمر بالغرس ولو اقتربت الساعة، مُقدّمين العناية البيئية أمانةً مقدسة.
    display_day_of_year: 52
    quran_refs: "al-Anʿām 6:165, al-Isrāʾ 17:26-27"
    hadith_refs: ""

  - slug: quran-fact-animal-rights
    category: quran_hadith_fact
    title_en: Animal Rights in Islam — Mercy to All Living Creatures
    title_ar: حقوق الحيوان في الإسلام — الرحمة بكل الكائنات الحية
    title_fr: Les droits des animaux en islam — la miséricorde envers tous les êtres vivants
    description_en: |
      The Prophet ﷺ said: "There is reward in doing good to every living thing." He forbade the branding of animals on the face, the overloading of beasts of burden, and the tying up of animals without food or water. He once saw a donkey whose face had been branded and said: "May Allah curse the one who branded it." He taught that a woman entered Hell because she starved a cat, and a prostitute entered Paradise because she gave water to a thirsty dog. Animals are not merely property in Islamic law; they are sentient beings with rights to proper care, humane slaughter, and protection from cruelty. The Qur'an states that animals are communities like human communities: "There is no creature on earth or bird that flies with its wings but that they are communities like you." The lesson is that cruelty to animals is not a minor sin but a grave offense against the Creator who entrusted them to human care.
    description_ar: |
      قال النبي ﷺ: «لكل كبدٍ رطبةٍ أجر». ونهى عن وسم الحيوانات في الوجه، وعن إثقال دواب الحمل، وعن ربط الحيوان بلا طعام أو ماء. رأى يوماً حماراً وُسّم وجهه فقال: «لعن الله الذي وسمه». وعلّم أن امرأة دخلت النار لأنها حبست هرةً حتى ماتت، وامرأة دخلت الجنة لأنها سقت كلباً عطشاناً. الحيوانات ليست مجرد ملكية في الفقه الإسلامي؛ بل كائنات حيّة ذات حقوق في الرعاية السليمة والذبح الرحيم والحماية من القسوة. ويُخبر القرآن أن الحيوانات أمم كالناس: «وما من دابةٍ في الأرض ولا طائرٍ يطير بجناحيه إلا أممٌ أمثالكم». والدرس أن القسوة على الحيوانات ليست معصية صغيرة بل جريمة جسيمة ضد الخالق الذي وكلها للعناية البشرية.
    description_fr: |
      Le Prophète ﷺ dit : « Il y a une récompense à faire le bien à tout être vivant. » Il interdit le marquage des animaux sur le visage, la surcharge des bêtes de somme, et l'attachement d'animaux sans nourriture ni eau. Il vit un jour un âne dont le visage avait été marqué et dit : « Qu'Allah maudisse celui qui l'a marqué. » Il enseigna qu'une femme entra en Enfer parce qu'elle avait affamé un chat, et qu'une prostituée entra au Paradis parce qu'elle avait donné de l'eau à un chien assoiffé. Les animaux ne sont pas simplement des biens en droit islamique ; ce sont des êtres sensibles ayant droit à des soins appropriés, une abattage humaine, et une protection contre la cruauté. Le Coran déclare que les animaux sont des communautés comme les communautés humaines : « Il n'y a pas de créature sur terre ou d'oiseau qui vole de ses ailes sans qu'ils soient des communautés comme vous. » La leçon est que la cruauté envers les animaux n'est pas un péché mineur mais une offense grave contre le Créateur qui les a confiés aux soins humains.
    reference: "al-Anʿām 6:38, Muslim 2245"
    source_notes: |
      Qur'an 6:38 describes animals as communities; Muslim (2245) records the hadith on reward for kindness to every living thing, and Ibn Kathīr notes that cruelty to animals is a grave sin because it betrays the Creator's trust.
    source_notes_fr: |
      Le verset 6:38 du Coran décrit les animaux comme des communautés ; Muslim (2245) consigne le hadith sur la récompense de la bonté envers tout être vivant, et Ibn Kathīr note que la cruauté envers les animaux est un péché grave car elle trahit la confiance du Créateur.
    source_notes_ar: |
      يصف القرآن ٦:٣٨ الحيوانات بأنها أمم؛ يسجل مسلم (٢٢٤٥) الحديث في أجر الإحسان لكل كبد رطبة، ويُشير ابن كثير إلى أن القسوة على الحيوانات جريمة جسيمة لأنها تخون أمانة الخالق.
    display_day_of_year: 53
    quran_refs: "al-Anʿām 6:38"
    hadith_refs: "Muslim 2245"

  - slug: quran-fact-leadership
    category: quran_hadith_fact
    title_en: Leadership in Islam — Service, Not Domination
    title_ar: القيادة في الإسلام — خدمة لا هيمنة
    title_fr: Le leadership en islam — le service, pas la domination
    description_en: |
      The Prophet ﷺ defined leadership not as a privilege but as a burden of accountability. He said: "Each of you is a shepherd, and each of you is responsible for his flock." When a man asked him to appoint him as a governor, the Prophet ﷺ refused, saying: "We do not give this position to one who asks for it or is eager for it." The ideal leader in Islam is described as the "servant of the people" — a concept radically different from the monarchies and dictatorships that later dominated Muslim history. The first caliph, Abu Bakr, said in his inaugural address: "If I do well, support me; if I go astray, set me right." The Qur'an commands leaders to consult their people (shura) and warns that those who hoard wealth while their people starve will face severe punishment. The lesson is that authority in Islam is a trust (amana) from Allah, and its misuse is betrayal of the highest order.
    description_ar: |
      عرّف النبي ﷺ القيادة ليس امتيازاً بل عبء مساءلة. قال: «كلكم راعٍ وكلكم مسؤولٌ عن رعيته». حين طلب منه رجل أن يوليه ولاية، رفض قائلاً: «لا نُولي هذا العمل من سأله أو حرص عليه». القائد المثالي في الإسلام يُوصف «بعبد الناس» — مفهوم مختلف جذرياً عن الملكيات والديكتاتوريات التي سادت التاريخ المسلم لاحقاً. قال الخليفة الأول أبو بكر في خطبته التنصيبية: «إن أحسنت فأعينوني، وإن أسأت فقوموني». ويأمر القرآن القادة بشورى شعوبهم ويحذر أن الذين يكنزون المال وشعبهم يجوع سيواجهون عقوبة شديدة. والدرس أن السلطة في الإسلام أمانة من الله، وإساءة استخدامها خيانة من أعلى الدرجات.
    description_fr: |
      Le Prophète ﷙ définissait le leadership non pas comme un privilège mais comme un fardeau de responsabilité. Il dit : « Chacun de vous est un berger, et chacun de vous est responsable de son troupeau. » Quand un homme lui demanda de le nommer gouverneur, le Prophète ﷙ refusa, disant : « Nous ne donnons pas cette position à celui qui la demande ou qui la convoite. » Le leader idéal en islam est décrit comme le « serviteur du peuple » — un concept radicalement différent des monarchies et dictatures qui dominèrent plus tard l'histoire musulmane. Le premier calife, Abū Bakr, dit dans son discours inaugural : « Si je fais bien, soutenez-moi ; si je m'égare, redressez-moi. » Le Coran commande aux leaders de consulter leur peuple (shūrā) et avertit que ceux qui accumulent des richesses pendant que leur peuple meurt de faim feront face à une punition sévère. La leçon est que l'autorité en islam est une confiance (amāna) d'Allah, et son abus est une trahison du plus haut ordre.
    reference: "Āl ʿImrān 3:159, al-Shūrā 42:38"
    source_notes: |
      Qur'an 3:159 and 42:38 command consultation; Bukhārī and Muslim record the Prophet's ﷺ definition of leadership as service, and Ibn Kathīr notes that Abū Bakr's inaugural address established accountability as the essence of rule.
    source_notes_fr: |
      Les versets 3:159 et 42:38 du Coran commandent la consultation ; al-Bukhārī et Muslim consignent la définition par le Prophète ﷺ du leadership comme un service, et Ibn Kathīr note que le discours inaugural d'Abū Bakr établit la responsabilité comme l'essence du pouvoir.
    source_notes_ar: |
      تأمر الآيتان ٣:١٥٩ و٤٢:٣٨ بالشورى؛ يسجل البخاري ومسلم تعريف النبي ﷺ للقيادة بأنها خدمة، ويُشير ابن كثير إلى أن خطبة أبي بكر التنصيبية أرسَت المساءلة جوهر الحكم.
    display_day_of_year: 54
    quran_refs: "Āl ʿImrān 3:159, al-Shūrā 42:38"
    hadith_refs: ""

  - slug: quran-fact-interfaith
    category: quran_hadith_fact
    title_en: Interfaith Relations in Islam — Respect with Integrity
    title_ar: العلاقات بين الأديان في الإسلام — احترام مع نزاهة
    title_fr: Les relations interconfessionnelles en islam — le respect avec intégrité
    description_en: |
      The Qur'an does not command hatred of non-Muslims but distinguishes between theological disagreement and personal hostility: "Allah does not forbid you from those who do not fight you because of religion and do not expel you from your homes — from dealing kindly and justly with them." The Prophet ﷺ had Jewish neighbors, employed a Christian scribe, received a delegation of Christians from Najran in his mosque, and married a Jewish woman (Safiyyah) and a Christian woman (Maria the Copt). He said: "Whoever harms a dhimmi, I am his adversary on the Day of Judgment." At the same time, the Qur'an is unambiguous that Islam is the only religion acceptable to Allah: "And whoever seeks a religion other than Islam, it will not be accepted from him." The lesson is that Muslims can and should coexist peacefully with non-Muslims, but not at the cost of diluting their own faith.
    description_ar: |
      لا يأمر القرآن ببغض غير المسلمين بل يميّز بين الخلاف العقائدي والعداء الشخصي: «لا ينهاكم الله عن الذين لم يقاتلوكم في الدين ولم يُخرجوكم من دياركم أن تبروهم وتقسطوا إليهم». وكان للنبي ﷺ جيران يهود، واستخدم كاتباً مسيحياً، واستقبل وفداً من نجران المسيحي في مسجده، وتزوج امرأة يهودية (صفية) ومسيحية (ماريا القبطية). قال: «من آذى ذمياً فأنا خصمه يوم القيامة». وفي الوقت ذاته، القرآن واضح بأن الإسلام هو الدين الوحيد المقبول عند الله: «ومن يبتغِ غير الإسلام ديناً فلن يُقبل منه». والدرس أن المسلمين يستطيعون ويجب أن يتعايشوا بسلام مع غير المسلمين، لكن ليس على حساب تخفيف دينهم.
    description_fr: |
      Le Coran n'ordonne pas la haine des non-musulmans mais distingue entre le désaccord théologique et l'hostilité personnelle : « Allah ne vous interdit pas de bien faire et d'être justes envers ceux qui ne vous ont pas combattus pour la religion et ne vous ont pas chassés de vos demeures. » Le Prophète ﷙ avait des voisins juifs, employa un scribe chrétien, reçut une délégation de chrétiens de Najrān dans sa mosquée, et épousa une femme juive (Ṣafiyya) et une femme chrétienne (Māriya la Copte). Il dit : « Quiconque fait du tort à un dhimmī, je suis son adversaire au Jour du Jugement. » En même temps, le Coran est sans ambiguïté : l'islam est la seule religion acceptable pour Allah : « Et quiconque cherche une religion autre que l'islam, elle ne sera pas acceptée de lui. » La leçon est que les musulmans peuvent et doivent coexister pacifiquement avec les non-musulmans, mais pas au prix de diluer leur propre foi.
    reference: "al-Mumtaḥanah 60:8, Āl ʿImrān 3:85"
    source_notes: |
      Qur'an 60:8 permits kindness to peaceful non-Muslims; Bukhārī and Muslim record the Prophet's ﷺ protection of dhimmis, while 3:85 affirms Islam as the only religion acceptable to Allah, maintaining theological integrity alongside social respect.
    source_notes_fr: |
      Le verset 60:8 du Coran permet la bonté envers les non-musulmans pacifiques ; al-Bukhārī et Muslim consignent la protection par le Prophète ﷺ des dhimmīs, tandis que 3:85 affirme l'islam comme seule religion acceptable pour Allah, maintenant l'intégrité théologique aux côtés du respect social.
    source_notes_ar: |
      يبيح القرآن ٦٠:٨ الإحسان لغير المسلمين السلميين؛ يسجل البخاري ومسلم حماية النبي ﷺ للذميين، بينما تؤكد ٣:٨٥ أن الإسلام هو الدين الوحيد المقبول عند الله، محافظةً على النزاهة العقائدية إلى جانب الاحترام الاجتماعي.
    display_day_of_year: 55
    quran_refs: "al-Mumtaḥanah 60:8, Āl ʿImrān 3:85"
    hadith_refs: ""
