    hadith_refs: "Bukhari 5006, Muslim 819"

  - slug: quran-fact-preservation
    category: quran_hadith_fact
    title_en: How Was the Qur'an Preserved? — Compilation Under Abu Bakr and Uthman
    title_ar: كيف حُفظ القرآن؟ — الجمع في عهد أبي بكر وعثمان
    title_fr: Comment le Coran a-t-il été préservé ? — Compilation sous Abu Bakr et Uthman
    description_en: |
      The preservation of the Qur'an is a question of both faith and historical methodology. Unlike later scriptures, the Qur'an was memorized in its entirety by numerous Companions during the Prophet's lifetime, and simultaneously written down on various materials. After the Battle of Yamama, where many huffaz were martyred, Abu Bakr al-Siddiq ordered the first official compilation into a single manuscript (mushaf), entrusted to Zayd ibn Thabit. Bukhari and Muslim narrate this process with remarkable detail. During the caliphate of Uthman ibn Affan, as Islam spread to non-Arab lands and variant readings emerged, Uthman commissioned a standard codex and sent copies to the major Islamic centers, destroying other variants to prevent division. Ibn Kathīr, in *al-Bidaya wa-l-Nihaya*, emphasizes that every step was taken with the consensus of the Sahaba and through the most rigorous verification. Classical Sunni scholarship holds that the Uthmanic codex represents the Qur'an as recited by the Prophet ﷺ, not a human selection but a divinely overseen preservation. The practical relevance is immense: Muslims can recite the same text from Morocco to Indonesia, knowing it is the same words revealed to the Prophet ﷺ over fourteen centuries ago.
    description_ar: |
      حفظ القرآن مسألة إيمان ومنهجية تاريخية معًا. على عكس الكتب السماوية اللاحقة، حُفظ القرآن كاملًا في صدور عدد من الصحابة خلال حياة النبي ﷺ، وسُجل كتابةً في آن واحد على مواد مختلفة. بعد معركة اليمامة حيث استُشهد عدد من الحفاظ، أمر أبو بكر الصديق بأول جمع رسمي في مصحف واحد، وكلّف بذلك زيد بن ثابت. يروي البخاري ومسلم هذه العملية بتفاصيل ملحوظة. في خلافة عثمان بن عفان، مع انتشار الإسلام في بلاد غير عربية وظهور قراءات مختلفة، كلف عثمان بإعداد مصحف معياري وأرسل نسخًا إلى المراكز الإسلامية الكبرى، وأحرق النسخ الأخرى لمنع الاختلاف. يؤكد ابن كثير في «البداية والنهاية» أن كل خطوة تمت بإجماع الصحابة وبأدق التحقق. تجمع المدرسة السنية الكلاسيكية على أن المصحف العثماني يمثل القرآن كما تلاه النبي ﷺ، وليس اختيارًا بشريًا بل حفظًا إلهيًا. الأثر العملي هائل: يستطيع المسلمون تلاوة النص ذاته من المغرب إلى إندونيسيا، واثقين بأنه الكلمات نفسها التي نُزلت على النبي ﷺ قبل أكثر من أربعة عشر قرنًا.
    description_fr: |
      La préservation du Coran est une question à la fois de foi et de méthodologie historique. Contrairement aux Écritures ultérieures, le Coran a été mémorisé dans son intégralité par de nombreux Compagnons durant la vie du Prophète, et simultanément écrit sur divers matériaux. Après la bataille de Yamama, où de nombreux huffaz furent martyrisés, Abu Bakr al-Siddiq ordonna la première compilation officielle en un seul manuscrit (mushaf), confiée à Zayd ibn Thabit. Bukhari et Muslim narrent ce processus avec un remarquable détail. Durant le califat de Uthman ibn Affan, alors que l'islam se répandait dans des terres non arabes et que des lectures variantes émergeaient, Uthman commandita un codex standard et envoya des copies aux principaux centres islamiques, détruisant d'autres variantes pour prévenir la division. Ibn Kathīr, dans son *al-Bidaya wa-l-Nihaya*, souligne que chaque étape fut entreprise avec le consensus des Sahaba et à travers la vérification la plus rigoureuse. La tradition savante sunnite classique soutient que le codex uthmanien représente le Coran tel qu'il fut récité par le Prophète ﷺ, non pas une sélection humaine mais une préservation divinement supervisée. La pertinence pratique est immense : les musulmans peuvent réciter le même texte du Maroc à l'Indonésie, sachant qu'il s'agit des mêmes paroles révélées au Prophète ﷺ il y a plus de quatorze siècles.
    reference: "Bukhari 4986, Bukhari 4987, Muslim 1050; Ibn Kathir, al-Bidaya wa-l-Nihaya"
    source_notes: |
      Bukhārī (4986-4987) and Muslim (1050) narrate the compilations under Abū Bakr and ʿUthmān; Ibn Kathīr (al-Bidāya) emphasizes that every step was taken with Companion consensus and rigorous verification.
    source_notes_fr: |
      Bukhārī (4986-4987) et Muslim (1050) rapportent les compilations sous Abū Bakr et ʿUthmān ; Ibn Kathīr (al-Bidāya) souligne que chaque étape fut entreprise avec le consensus des Compagnons et une vérification rigoureuse.
    source_notes_ar: |
      يُروي البخاري (٤٩٨٦-٤٩٨٧) ومسلم (١٠٥٠) جمعَ المصحفِ في عهدِ أبي بكرٍ وعثمانَ؛ ويُؤكِّدُ ابنُ كثيرٍ (البداية) أنَّ كلَّ خطوةٍ تمَّتْ بإجماعِ الصحابةِ وبدقةِ التحقق.
    display_day_of_year: 253
