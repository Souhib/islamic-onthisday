  - slug: quran-fact-why-ramadan
    category: quran_hadith_fact
    title_en: Why Was Ramadan Chosen for Fasting?
    title_ar: لماذا اختير رمضان للصيام؟
    title_fr: Pourquoi Ramadan a-t-il été choisi pour le jeûne ?
    description_en: |
      The month of Ramadan occupies a unique place in the Islamic calendar, but the question of why this specific month was chosen for the obligation of fasting invites deeper reflection than mere calendrical observation. The Qur'an states: "The month of Ramadan is that in which the Qur'an was revealed as guidance for the people" (2:185). Ibn Kathīr explains that this verse establishes a connection between the physical discipline of fasting and the spiritual nourishment of the Qur'an — both were revealed in the same month, suggesting that self-restraint opens the heart to divine guidance. Bukhari and Muslim narrate that the Prophet ﷺ received the first revelation in Ramadan, making the month not only a time of fasting but a commemoration of the descent of the Qur'an itself. Classical Sunni scholarship holds that Ramadan was chosen because its timing — the ninth lunar month — creates a rhythm of devotion that is independent of seasonal or agricultural cycles, making it equally accessible to Muslims in every climate and century. Al-Nawawī, in his commentary on Muslim, notes that the Prophet ﷺ said, "When Ramadan enters, the gates of Paradise are opened," indicating that the month carries a special mercy that facilitates spiritual transformation. The practical relevance is that Ramadan is not merely a month of hunger but a divinely appointed season for recalibrating the soul.
    description_ar: |
      يحتل شهر رمضان مكانة فريدة في التقويم الإسلامي، لكن سؤال لماذا اختير هذا الشهر بالتحديد لفرض الصيام يدعو إلى تأمل أعمق من مجرد الملاحظة التقويمية. يقول القرآن: «شهر رمضان الذي أُنزل فيه القرآن هدىً للناس» (البقرة: 185). يشرح ابن كثير أن هذه الآية تؤسس رابطًا بين الانضباط الجسدي للصيام والتغذية الروحية للقرآن — فكلاهما نُزل في الشهر ذاته، مما يُشير إلى أن ضبط النفس يفتح القلب للهداية الإلهية. يروي البخاري ومسلم أن النبي ﷺ تلقى الوحي الأول في رمضان، مما يجعل الشهر ليس فقط وقتًا للصيام بل تذكارًا لنزول القرآن ذاته. تجمع المدرسة السنية الكلاسيكية على أن رمضان اختير لأن توقيته — الشهر القمري التاسع — يخلق إيقاعًا من التقوى مستقلًا عن الدورات الموسمية أو الزراعية، مما يجعله متاحًا بالتساوي للمسلمين في كل مناخ وكل قرن. يلاحظ النووي في شرحه على مسلم أن النبي ﷺ قال: «إذا دخل رمضان فُتحت أبواب الجنة»، مما يشير إلى أن الشهر يحمل رحمة خاصة تُيسّر التحول الروحي. الأثر العملي هو أن رمضان ليس مجرد شهر جوع بل موسمًا إلهيًا لإعادة معايرة الروح.
    description_fr: |
      Le mois de Ramadan occupe une place unique dans le calendrier islamique, mais la question de savoir pourquoi ce mois spécifique a été choisi pour l'obligation du jeûne invite à une réflexion plus profonde qu'une simple observation calendaire. Le Coran déclare : « Le mois de Ramadan est celui où le Coran a été révélé comme guidance pour les gens » (2:185). Ibn Kathīr explique que ce verset établit un lien entre la discipline physique du jeûne et la nourriture spirituelle du Coran — tous deux furent révélés dans le même mois, suggérant que la maîtrise de soi ouvre le cœur à la guidance divine. Bukhari et Muslim rapportent que le Prophète ﷺ reçut la première révélation durant Ramadan, faisant du mois non seulement un temps de jeûne mais une commémoration de la descente du Coran lui-même. La tradition savante sunnite classique soutient que Ramadan fut choisi parce que son calendrier — le neuvième mois lunaire — crée un rythme de dévotion indépendant des cycles saisonniers ou agricoles, le rendant également accessible aux musulmans de chaque climat et de chaque siècle. Al-Nawawī, dans son commentaire sur Muslim, note que le Prophète ﷺ a dit : « Quand Ramadan entre, les portes du Paradis sont ouvertes », indiquant que le mois porte une miséricorde spéciale qui facilite la transformation spirituelle. La pertinence pratique est que Ramadan n'est pas simplement un mois de faim mais une saison divinement désignée pour recalibrer l'âme.
    reference: "Qur'an 2:185 (Surah al-Baqarah); Bukhari 1901, Muslim 1079; Ibn Kathir, Tafsir al-Qur'an al-Azim"
    source_notes: |
      Bukhārī (1901) and Muslim (1079) place the first revelation in Ramadan; Ibn Kathīr notes that the lunar timing makes the fast equally accessible across climates, and al-Nawawī records the opening of Paradise's gates.
    source_notes_fr: |
      Bukhārī (1901) et Muslim (1079) situent la première révélation durant Ramadan ; Ibn Kathīr note que le calendrier lunaire rend le jeûne également accessible dans tous les climats, et al-Nawawī consigne l'ouverture des portes du Paradis.
    source_notes_ar: |
      يضعُ البخاري (١٩٠١) ومسلم (١٠٧٩) الوحيَ الأولَ في رمضانَ؛ ويلاحظُ ابنُ كثيرٌ أنَّ التوقيتَ القمريَّ يجعلُ الصومَ متاحًا بالتساوي في كلِّ المناخات، ويُسَجِّلُ النوويُّ فتحَ أبوابِ الجنة.
    display_day_of_year: 262
    quran_refs: "2:185"
    hadith_refs: "Bukhari 1901, Muslim 1079"

  - slug: quran-fact-zakat-purpose
    category: quran_hadith_fact
    title_en: What Is the True Purpose of Zakat?
    title_ar: ما هو المقصد الحقيقي للزكاة؟
    title_fr: Quel est le véritable but de la Zakat ?
    description_en: |
      Zakat is often reduced to a simple tax calculation, but the Qur'an presents it as one of the two pillars of Islam alongside prayer, with purposes that reach far beyond revenue collection. Surah al-Tawbah (9:60) specifies eight categories of zakat recipients, and the classical question is: why these eight, and what do they reveal about the social vision of Islam? Ibn Kathīr explains that the categories encompass both relief for the destitute (the poor, the needy, the indebted) and investment in communal strength (those whose hearts are to be reconciled, those in the path of Allah, the wayfarer). Al-Qurṭubī, in *al-Jami'*, emphasizes that zakat is not charity (*sadaqa*) but a right (*haqq*) that the poor hold over the wealth of the rich — it is divine redistribution, not voluntary generosity. The Qur'an compares the wealth of those who refuse zakat to a field destroyed by lightning (2:264), showing that hoarding corrupts both the individual soul and the social fabric. Classical Sunni scholarship holds that zakat purifies the giver's wealth and soul simultaneously, while maintaining the dignity of the recipient by framing assistance as a divine entitlement rather than human favor. The practical relevance is that zakat, correctly understood, is a comprehensive social institution that prevents wealth concentration, funds communal defense, and binds rich and poor in a relationship of mutual sacred obligation.
    description_ar: |
      غالبًا ما يُختزل مفهوم الزكاة في عملية حساب ضريبي بسيط، لكن القرآن يقدمها كأحد الركنين في الإسلام إلى جانب الصلاة، بمقاصد تمتد أبعد بكثير من جمع الإيرادات. تحدد سورة التوبة (9:60) ثماني فئات مستحقة للزكاة، والسؤال الكلاسيكي هو: لماذا هذه الثماني، وماذا تكشف عن الرؤية الاجتماعية في الإسلام؟ يشرح ابن كثير أن الفئات تشمل كلًا من الإغاثة للمحتاجين (الفقراء والمساكين والغارمين) والاستثمار في قوة الجماعة (المُؤَلَّفة قلوبهم وفي سبيل الله وابن السبيل). يؤكد القرطبي في «الجامع» أن الزكاة ليست صدقة بل حق يملكه الفقراء على مال الأغنياء — إنها إعادة توزيع إلهية لا كرمًا اختياريًا. يُشبه القرآن مال الذين يمتنعون عن الزكاة بزرع أصابه البرق (البقرة: 264)، مما يُظهر أن التكديس يُفسد الروح الفردية والنسيج الاجتماعي معًا. تجمع المدرسة السنية الكلاسيكية على أن الزكاة تُطهّر مال المعطي وروحه في آن واحد، مع الحفاظ على كرامة المستلم بأن تُؤطر المساعدة كحق إلهي لا فضلًا بشريًا. الأثر العملي هو أن الزكاة، بفهمها الصحيح، مؤسسة اجتماعية شاملة تمنع تركز الثروة وتموّل الدفاع الجماعي وتربط الغني والفقير في علاقة تكليف متبادد مقدس.
    description_fr: |
      La Zakat est souvent réduite à un simple calcul d'impôt, mais le Coran la présente comme l'un des deux piliers de l'islam aux côtés de la prière, avec des buts qui vont bien au-delà de la collecte de revenus. La sourate al-Tawbah (9:60) spécifie huit catégories de bénéficiaires de la zakat, et la question classique est : pourquoi ces huit, et que révèlent-elles sur la vision sociale de l'islam ? Ibn Kathīr explique que les catégories englobent à la fois le secours aux indigents (les pauvres, les nécessiteux, les endettés) et l'investissement dans la force communautaire (ceux dont les cœurs doivent être réconciliés, ceux qui sont sur le chemin d'Allah, le voyageur). Al-Qurṭubī, dans son *al-Jami'*, souligne que la zakat n'est pas une charité (*sadaqa*) mais un droit (*haqq*) que les pauvres détiennent sur la richesse des riches — c'est une redistribution divine, non une générosité volontaire. Le Coran compare la richesse de ceux qui refusent la zakat à un champ détruit par la foudre (2:264), montrant que l'accumulation corrompre à la fois l'âme individuelle et le tissu social. La tradition savante sunnite classique soutient que la zakat purifie simultanément la richesse et l'âme du donateur, tout en préservant la dignité du bénéficiaire en encadrant l'aide comme un droit divin plutôt qu'une faveur humaine. La pertinence pratique est que la zakat, correctement comprise, est une institution sociale complète qui prévient la concentration des richesses, finance la défense communautaire, et lie riches et pauvres dans une relation d'obligation sacrée mutuelle.
    reference: "Qur'an 9:60 (Surah al-Tawbah), 2:177 (Surah al-Baqarah), 2:261 (Surah al-Baqarah); Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Qurtubi, al-Jami' li-Ahkam al-Qur'an"
    source_notes: |
      Al-Qurṭubī (al-Jāmiʿ) frames zakāt as a divine right, not charity; Ibn Kathīr shows that its eight categories encompass both relief and communal investment, preventing wealth concentration.
    source_notes_fr: |
      Al-Qurṭubī (al-Jāmiʿ) présente la zakāt comme un droit divin, non une charité ; Ibn Kathīr montre que ses huit catégories englobent à la fois le secours et l'investissement communautaire, prévenant la concentration des richesses.
    source_notes_ar: |
      يُؤطِّرُ القرطبي (الجامع) الزكاةَ كحقٍّ إلهيٍّ لا كصدقة؛ ويُبيِّنُ ابنُ كثيرٌ أنَّ فئاتِها الثماني تضمُّ الإغاثةَ والاستثمارَ الجماعيَّ معًا، مما يمنعُ تركيزَ الثروة.
    display_day_of_year: 263
