  - slug: quran-fact-hajj-wisdom
    category: quran_hadith_fact
    title_en: The Wisdom of Hajj — Why These Specific Rituals?
    title_ar: حكمة الحج — لماذا هذه المناسك بالتحديد؟
    title_fr: La Sagesse du Hajj — Pourquoi ces rituels spécifiques ?
    description_en: |
      The rituals of Hajj — circumambulating the Kaaba, running between Safa and Marwa, standing at Arafat, pelting the jamarat — can appear arbitrary to the uninitiated. The scholarly question is whether these acts carry intrinsic meaning or are simply tests of obedience. The Qur'an links Hajj to the legacy of Ibrahim: "And when Ibrahim raised the foundations of the House with Ismail, 'Our Lord, accept from us'" (2:127). Ibn Kathīr explains that every ritual reenacts a moment from the lives of Ibrahim, Hajar, and Ismail, connecting the pilgrim to a sacred history that transcends time. Al-Qurṭubī adds that the uniformity of Hajj — all pilgrims wearing identical cloth, performing identical acts regardless of wealth or status — is itself the message: before Allah, all human distinctions dissolve. The classical Sunni position holds that Hajj combines worship with social renewal; the Qur'an commands that the pilgrim witness the benefits for themselves (22:28), which scholars interpret as both spiritual benefits and the worldly benefit of meeting Muslims from every nation. Ibn al-Qayyim, in *Zad al-Ma'ad*, describes Hajj as a rehearsal for death and resurrection: the ihram garments resemble burial shrouds, Arafat resembles the gathering of Judgment Day. The practical relevance is that Hajj is not tourism but a transformative encounter with divine history and human equality.
    description_ar: |
      قد تبدو مناسك الحج — الطواف بالكعبة والسعي بين الصفا والمروى والوقوف بعرفة ورمي الجمار — اعتباطية لمن لم يتعرف عليها. السؤال العلمي هو: هل تحمل هذه الأعمال معنًى جوهريًا أم هي مجرد اختبارات للطاعة؟ يربط القرآن الحج بإرث إبراهيم: «وإذ يرفع إبراهيم القواعد من البيت وإسماعيل ربَّنا تقبَّل منا» (البقرة: 127). يشرح ابن كثير أن كل منسك يُعيد تمثيل لحظة من حياة إبراهيم وهاجر وإسماعيل، مما يربط الحاج بتاريخ مقدس يتجاوز الزمن. يضيف القرطبي أن وحدة الحج — جميع الحجاج يرتدون لباسًا متطابقًا ويؤدون أعمالًا متطابقة بغض النظر عن الثروة أو المكانة — هي الرسالة ذاتها: أمام الله، تتلاشى كل التمييزات البشرية. تحمل المدرسة السنية الكلاسيكية أن الحج يجمع بين العبادة والتجديد الاجتماعي؛ يأمر القرآن أن يشهد الحاج المنفعة لأنفسهم (الحج: 28)، والذي فسّره العلماء بالمنفعة الروحية والمنفعة الدنيوية بلقاء مسلمين من كل أمة. يصف ابن القيم في «زاد المعاد» الحج بأنه بروفة للموت والبعث: ثياب الإحرام تشبه الكفن، وعرفات تشبه حشر يوم القيامة. الأثر العملي هو أن الحج ليس سياحة بل لقاء تحوّلي مع التاريخ الإلهي والمساواة البشرية.
    description_fr: |
      Les rituels du Hajj — la circumambulation de la Kaaba, la course entre Safa et Marwa, le séjour à Arafat, le jet des jamarat — peuvent sembler arbitraires à ceux qui ne les connaissent pas. La question savante est de savoir si ces actes portent un sens intrinsèque ou s'ils sont simplement des tests d'obéissance. Le Coran relie le Hajj à l'héritage d'Ibrahim : « Et quand Ibrahim éleva les fondations de la Maison avec Ismail : 'Notre Seigneur, accepte de nous' » (2:127). Ibn Kathīr explique que chaque rituel recrée un moment de la vie d'Ibrahim, Hajar et Ismail, connectant le pèlerin à une histoire sacrée qui transcende le temps. Al-Qurṭubī ajoute que l'uniformité du Hajj — tous les pèlerins portant des vêtements identiques, accomplissant des actes identiques indépendamment de la richesse ou du statut — est elle-même le message : devant Allah, toutes les distinctions humaines se dissolvent. La position savante sunnite classique soutient que le Hajj combine le culte et le renouveau social ; le Coran commande que le pèlerin en témoigne les bénéfices pour eux-mêmes (22:28), ce que les savants interprètent comme des bénéfices spirituels et le bénéfice mondain de rencontrer des musulmans de chaque nation. Ibn al-Qayyim, dans *Zad al-Ma'ad*, décrit le Hajj comme une répétition de la mort et de la résurrection : les vêtements d'ihram ressemblent aux linceuls, Arafat ressemble au rassemblement du Jour du Jugement. La pertinence pratique est que le Hajj n'est pas du tourisme mais une rencontre transformative avec l'histoire divine et l'égalité humaine.
    reference: "Qur'an 2:125-127 (Surah al-Baqarah), 22:27-28 (Surah al-Hajj); Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Qurtubi, al-Jami' li-Ahkam al-Qur'an"
    source_notes: |
      Ibn Kathīr links every rite to Ibrāhīm's family; Ibn al-Qayyim (Zād al-Maʿād) describes Ḥajj as a rehearsal for death and resurrection, and al-Qurṭubī emphasizes the dissolution of social distinction in identical white cloth.
    source_notes_fr: |
      Ibn Kathīr relie chaque rite à la famille d'Ibrāhīm ; Ibn al-Qayyim (Zād al-Maʿād) décrit le Ḥajj comme une répétition de la mort et de la résurrection, et al-Qurṭubī souligne l'effacement des distinctions sociales dans le même vêtement blanc.
    source_notes_ar: |
      يَرْبِطُ ابنُ كثيرٍ كلَّ منسكٍ بأسرةِ إبراهيمَ؛ ويَصِفُ ابنُ القيم (زاد المعاد) الحجَّ بأنَّه بروفةٌ للموتِ والبعثِ، ويُؤكِّدُ القرطبيُّ ذوبانَ التمايزِ الاجتماعيِّ في اللباسِ الأبيضِ الموحَّد.
    display_day_of_year: 264
    quran_refs: "2:125-127, 22:27-28"
    hadith_refs: ""

  - slug: quran-fact-salawat-on-prophet
    category: quran_hadith_fact
    title_en: Why Do Muslims Send Salawat on the Prophet?
    title_ar: لماذا يُصلّي المسلمون على النبي؟
    title_fr: Pourquoi les musulmans envoient-ils la Salawat sur le Prophète ?
    description_en: |
      The command to send blessings upon the Prophet Muhammad ﷺ appears in the Qur'an itself: "Indeed, Allah and His angels send blessings upon the Prophet. O you who believe, send blessings upon him and greet him with peace" (33:56). The scholarly question is: what does this act accomplish, and why is it presented as a divine command rather than a voluntary devotion? Ibn Kathīr explains in his tafsir that when a believer sends salawat, Allah returns ten blessings upon the sender, the angels pray for the sender's forgiveness, and the Prophet ﷺ himself responds to the greeting. Bukhari and Muslim report the hadith: "Whoever sends one salawat upon me, Allah sends ten upon him." The classical Sunni answer, articulated by al-Nawawī in his commentary on Muslim, holds that salawat is not merely praise of the Prophet ﷺ but a recognition of his unique station as the final messenger and the intercessor for his ummah. Al-Qurṭubī adds that the verse's placement in Surah al-Ahzab, which addresses the Prophet's domestic and public life, underscores that sending salawat is an affirmation of the legitimacy of his prophetic mission in every sphere. The practical relevance is that salawat transforms the believer's relationship with the Prophet ﷺ from historical admiration to active spiritual connection, and it is the only act of worship that Allah Himself performs and commands His creation to emulate.
    description_ar: |
      يظهر أمر إرسال الصلوات على النبي محمد ﷺ في القرآن ذاته: «إن الله وملائكته يُصلّون على النبي يا أيها الذين آمنوا صلُّوا عليه وسلِّموا تسليمًا» (الأحزاب: 56). السؤال العلمي هو: ماذا يُنجز هذا الفعل، ولماذا يُقدم كأمر إلهي بدلًا من تقوى اختيارية؟ يشرح ابن كثير في تفسيره أن حين يُرسل المؤمن صلاة، يُرد الله عشر صلوات على المرسل، ويستغفر الملائكة للمرسل، ويرد النبي ﷺ نفسه على التحية. يروي البخاري ومسلم الحديث: «من صلَّى عليّ صلاةً واحدةً صلّى الله عليه بها عشرًا». الإجابة السنية الكلاسيكية، كما صاغها النووي في شرحه على مسلم، تحمل أن الصلاة ليست مجرد ثناء على النبي ﷺ بل اعتراف بمكانته الفريدة كخاتم المرسلين وشفيع أمته. يضيف القرطبي أن موضع الآية في سورة الأحزاب، التي تتناول حياة النبي الخاصة والعامة، تؤكد أن إرسال الصلاة هو تأكيد لشرعية رسالته النبوية في كل مجال. الأثر العملي هو أن الصلاة تحوّل علاقة المؤمن بالنبي ﷺ من إعجاب تاريخي إلى تواصل روحي فعّال، وهي العبادة الوحيدة التي يؤديها الله ذاته ويأمر خلقه بمحاكاتها.
    description_fr: |
      L'ordre d'envoyer des bénédictions sur le Prophète Muhammad ﷺ apparaît dans le Coran lui-même : « En vérité, Allah et Ses anges envoient la Salawat sur le Prophète. Ô vous qui croyez, envoyez la Salawat sur lui et saluez-le avec respect » (33:56). La question savante est la suivante : qu'est-ce que cet acte accomplit, et pourquoi est-il présenté comme un commandement divin plutôt qu'une dévotion volontaire ? Ibn Kathīr explique dans son tafsir que lorsqu'un croyant envoie une salawat, Allah retourne dix bénédictions sur l'envoyeur, les anges prient pour le pardon de l'envoyeur, et le Prophète ﷺ lui-même répond au salut. Bukhari et Muslim rapportent le hadith : « Quiconque envoie une salawat sur moi, Allah en envoie dix sur lui. » La réponse savante sunnite classique, articulée par al-Nawawī dans son commentaire sur Muslim, soutient que la salawat n'est pas seulement une louange du Prophète ﷺ mais une reconnaissance de son statut unique en tant que dernier messager et intercesseur de sa oumma. Al-Qurṭubī ajoute que le placement du verset dans la sourate al-Ahzab, qui aborde la vie domestique et publique du Prophète, souligne qu'envoyer la salawat est une affirmation de la légitimité de sa mission prophétique dans chaque sphère. La pertinence pratique est que la salawat transforme la relation du croyant avec le Prophète ﷺ de l'admiration historique à une connexion spirituelle active, et c'est le seul acte de culte qu'Allah Lui-même accomplit et commande à Sa créature d'émuler.
    reference: "Qur'an 33:56 (Surah al-Ahzab); Bukhari 6357, Muslim 408; Ibn Kathir, Tafsir al-Qur'an al-Azim"
    source_notes: |
      Qur'an 33:56 commands it; Bukhārī (6357) and Muslim (408) record the tenfold return, and al-Nawawī explains that ṣalawāt recognizes the Prophet's ﷺ unique station as intercessor and final messenger.
    source_notes_fr: |
      Le Coran 33:56 l'ordonne ; Bukhārī (6357) et Muslim (408) consignent le retour décuplé, et al-Nawawī explique que la ṣalawāt reconnaît la station unique du Prophète ﷺ comme intercesseur et messager final.
    source_notes_ar: |
      يأمرُ القرآن (٣٣:٥٦) بها؛ ويُسَجِّلُ البخاري (٦٣٥٧) ومسلم (٤٠٨) ردَّ العشرِ، ويُفسِّرُ النوويُّ أنَّ الصلاةَ تعترفُ بالمكانةِ الفريدةِ للنبيِّ ﷺ شفيعًا وخاتمَ المرسلين.
    display_day_of_year: 267
    quran_refs: "33:56"
    hadith_refs: "Bukhari 6357, Muslim 408"

  - slug: quran-fact-jihad-meaning
    category: quran_hadith_fact
    title_en: What Does Jihad Actually Mean in the Qur'an and Sunnah?
    title_ar: ما معنى الجهاد حقًا في القرآن والسنة؟
    title_fr: Que signifie réellement le Jihad dans le Coran et la Sunna ?
    description_en: |
      The term jihad is among the most contested in Islamic discourse, often reduced in popular media to "holy war." The scholarly question is what the Qur'an and authentic Sunnah actually teach about this concept. The root j-h-d means "to strive" or "to exert effort," and the Qur'an uses it in multiple contexts: striving against the soul (29:69), striving with the Qur'an (25:52), and striving in the path of Allah with wealth and life (22:78). Bukhari opens his Sahih with the hadith: "The greatest jihad is a word of truth spoken to a tyrannical ruler," and Muslim reports that the Prophet ﷺ described the struggle against one's own desires as "the greater jihad." Ibn Kathīr explains that military jihad in classical Sunni jurisprudence is governed by strict conditions — it must be declared by a legitimate authority, it must not target non-combatants, and it must cease if the enemy sues for peace. The classical answer distinguishes between jihad al-nafs (internal struggle), jihad al-shaytan (struggle against Satan's whispers), and jihad al-kuffar (defensive military engagement when Muslim lives are threatened). Al-Nawawī, in his commentary on Muslim, notes that the vast majority of a Muslim's jihad is internal and perpetual, not external and episodic. The practical relevance is that understanding jihad as the comprehensive striving for divine pleasure — in knowledge, character, family, and community — prevents both the reduction of Islam to militarism and the neglect of legitimate self-defense.
    description_ar: |
      يُعدّ مصطلح الجهاد من أكثر المصطلحات خلافًا في الخطاب الإسلامي، وغالبًا ما يُختزل في الإعلام الشعبي إلى «الحرب المقدسة». السؤال العلمي هو ما يُعلمه القرآن والسنة الصحيحة فعلًا عن هذا المفهوم. تعني جذر ج-ه-د «الكدح» أو «بذل الجهد»، ويستخدم القرآن المصطلح في سياقات متعددة: الجهاد ضد النفس (العنكبوت: 69)، والجهاد بالقرآن (الفرقان: 52)، والجهاد في سبيل الله بالمال والنفس (الحج: 78). يفتتح البخاري صحيحه بالحديث: «أفضل الجهاد كلمة حق عند سلطان جائر»، ويروي مسلم أن النبي ﷺ وصف الجهاد ضد الشهوات الذاتية بأنه «الجهاد الأكبر». يشرح ابن كثير أن الجهاد العسكري في الفقه السني الكلاسيكي يخضع لشروط صارمة — يجب أن يُعلن من سلطة شرعية، ولا يستهدف غير المقاتلين، ويتوقف إذا طلب العدو السلم. الإجابة الكلاسيكية تميز بين جهاد النفس (الكفاح الداخلي) وجهاد الشيطان (الكفاح ضد وساوسه) وجهاد الكفار (المواجهة العسكرية الدفاعية حين تُهدد أرواح المسلمين). يلاحظ النووي في شرحه على مسلم أن الأغلبية الساحقة من جهاد المسلم داخلي ودائم، لا خارجي ومتقطع. الأثر العملي هو أن فهم الجهاد باعتباره الكدح الشامل لمرضاة الله — في العلم والأخلاق والأسرة والمجتمع — يمنع كلًا من اختزال الإسلام في العسكرية وإهمال الدفاع المشروع عن النفس.
    description_fr: |
      Le terme jihad est l'un des plus contestés dans le discours islamique, souvent réduit dans les médias populaires à la « guerre sainte ». La question savante est de savoir ce que le Coran et la Sunna authentique enseignent réellement sur ce concept. La racine j-h-d signifie « s'efforcer » ou « déployer une effort », et le Coran l'utilise dans de multiples contextes : lutter contre l'âme (29:69), lutter avec le Coran (25:52), et lutter sur le chemin d'Allah avec les biens et la vie (22:78). Bukhari ouvre son Sahih avec le hadith : « Le plus grand jihad est une parole de vérité adressée à un souverain tyrannique », et Muslim rapporte que le Prophète ﷺ a décrit la lutte contre ses propres désirs comme « le plus grand jihad ». Ibn Kathīr explique que le jihad militaire dans la jurisprudence sunnite classique est régi par des conditions strictes — il doit être déclaré par une autorité légitime, il ne doit pas cibler des non-combattants, et il doit cesser si l'ennemi demande la paix. La réponse classique distingue entre le jihad al-nafs (lutte interne), le jihad al-shaytan (lutte contre les murmures de Satan), et le jihad al-kuffar (engagement militaire défensif lorsque des vies musulmanes sont menacées). Al-Nawawī, dans son commentaire sur Muslim, note que la grande majorité du jihad d'un musulman est interne et perpétuelle, non externe et épisodique. La pertinence pratique est que comprendre le jihad comme l'effort global pour le plaisir divin — dans la connaissance, le caractère, la famille et la communauté — prévient à la fois la réduction de l'islam au militarisme et la négligence de la légitime défense de soi.
    reference: "Qur'an 29:69 (Surah al-Ankabut), 22:78 (Surah al-Hajj), 25:52 (Surah al-Furqan); Bukhari 40, Muslim 4636; Ibn Kathir, Tafsir al-Qur'an al-Azim"
    source_notes: |
      Bukhārī (40) opens with "a word of truth to a tyrant"; Muslim (4636) records the "greater jihad" against the soul. Ibn Kathīr notes that military jihad is strictly conditioned by classical fiqh, and al-Nawawī observes that internal struggle is the believer's perpetual duty.
    source_notes_fr: |
      Bukhārī (40) ouvre par « une parole de vérité à un tyran » ; Muslim (4636) consigne le « plus grand jihad » contre l'âme. Ibn Kathīr note que le jihad militaire est strictement conditionné par le fiqh classique, et al-Nawawī observe que la lutte interne est le devoir permanent du croyant.
    source_notes_ar: |
      يفتتحُ البخاري (٤٠) بـ«كلمةِ حقٍّ عند سلطانٍ جائر»؛ ويُسَجِّلُ مسلم (٤٦٣٦) «الجهادَ الأكبرَ» ضدَّ النفس. ويلاحظُ ابنُ كثيرٌ أنَّ الجهادَ العسكريَّ مقيَّدٌ بشروطِ الفقهِ الكلاسيكي، ويُبيِّنُ النوويُّ أنَّ الكفاحَ الداخليَّ واجبُ المؤمنِ الدائم.
