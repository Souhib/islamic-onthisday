  - slug: quran-fact-tafsir-types
    category: quran_hadith_fact
    title_en: The Types of Tafsir — Riwaya vs. Diraya
    title_ar: أنواع التفسير — الرواية والدراية
    title_fr: Les Types de Tafsir — Riwaya vs. Diraya
    description_en: |
      Classical Qur'anic exegesis is not a monolithic discipline but a structured field with distinct methodological branches. The primary division is between tafsir bi-l-riwaya (transmission-based) and tafsir bi-l-diraya (knowledge-based). Ibn Kathīr's famous introduction to his tafsir establishes the principle that tafsir bi-l-riwaya — drawing upon the Qur'an itself, the authentic Sunnah, and the reports of the Sahaba and Tabi'in — is the foundation and the safeguard against error. Al-Zarkashi, in *al-Burhan fi 'Ulum al-Qur'an*, explains that tafsir bi-l-diraya employs linguistic analysis, historical context, and rational inference, but only within boundaries set by transmitted knowledge. The classical Sunni answer to the question of authority is clear: no interpretation based purely on personal opinion (tafsir bi-l-ra'y) is valid if it contradicts the established transmission from the salaf. Al-Suyuti enumerates the sciences a mufassir must master — Arabic grammar, rhetoric, jurisprudence, theology, and hadith criticism — showing that tafsir is an interdisciplinary endeavor requiring lifelong study. The practical relevance is that Muslims today must distinguish between authoritative classical tafsir, which preserves the interpretive tradition of the early community, and speculative modern interpretations that may reflect ideological bias rather than the text's intent.
    description_ar: |
      التفسير القرآني الكلاسيكي ليس علمًا أحادي البنية بل حقل منظم ذو فروع منهجية مميزة. التقسيم الأساسي بين التفسير بالرواية والتفسير بالدراية. يؤسس ابن كثير في مقدمة تفسيره المشهورة لمبدأ أن التفسير بالرواية — المستقى من القرآن نفسه والسنة الصحيحة وآثار الصحابة والتابعين — هو الأساس والضمانة ضد الخطأ. يشرح الزركشي في «البرهان في علوم القرآن» أن التفسير بالدراية يستخدم التحليل اللغوي والسياق التاريخي والاستدلال العقلي، لكن فقط ضمن حدود تضعها المعرفة المنقولة. الإجابة السنية الكلاسيكية على سؤال السلطة واضحة: لا يصح تفسير مبني على الرأي الصرف إذا خالف المنقول المستقر عن السلف. يعدد السيوطي العلوم التي يجب على المفسر إتقانها — النحو والبلاغة والفقه والعقيدة ونقد الحديث — مما يُظهر أن التفسير مسعى بين تخصصات يتطلب دراسة مدى الحياة. الأثر العملي هو أن المسلمين اليوم يجب أن يميزوا بين التفسير الكلاسيكي المرجعي الذي يحفظ التقليد التفسيري للجماعة المبكرة، والتأويلات الحديثة التخمينية التي قد تعكس انحيازًا أيديولوجيًا بدلًا عن مقصد النص.
    description_fr: |
      L'exégèse coranique classique n'est pas une discipline monolithique mais un champ structuré avec des branches méthodologiques distinctes. La division principale se fait entre le tafsir bi-l-riwaya (basé sur la transmission) et le tafsir bi-l-diraya (basé sur la connaissance). L'introduction célèbre d'Ibn Kathīr à son tafsir établit le principe que le tafsir bi-l-riwaya — puisant dans le Coran lui-même, la Sunna authentique, et les récits des Sahaba et des Tabi'in — est le fondement et la sauvegarde contre l'erreur. Al-Zarkashi, dans son *al-Burhan fi 'Ulum al-Qur'an*, explique que le tafsir bi-l-diraya emploie l'analyse linguistique, le contexte historique et l'inférence rationnelle, mais seulement dans des limites fixées par la connaissance transmise. La réponse savante sunnite classique à la question de l'autorité est claire : aucune interprétation basée purement sur l'opinion personnelle (tafsir bi-l-ra'y) n'est valide si elle contredit la transmission établie des salaf. Al-Suyuti énumère les sciences qu'un mufassir doit maîtriser — grammaire arabe, rhétorique, jurisprudence, théologie et critique du hadith — montrant que le tafsir est une entreprise interdisciplinaire exigeant une étude tout au long de la vie. La pertinence pratique est que les musulmans d'aujourd'hui doivent distinguer entre le tafsir classique faisant autorité, qui préserve la tradition interprétative de la communauté primitive, et les interprétations modernes spéculatives qui peuvent refléter un biais idéologique plutôt que l'intention du texte.
    reference: "Ibn Kathir, Tafsir al-Qur'an al-Azim (introduction); al-Zarkashi, al-Burhan fi 'Ulum al-Qur'an"
    source_notes: |
      Ibn Kathīr's introduction privileges tafsīr bi-l-riwāya; al-Zarkashī (al-Burhān) explains that tafsīr bi-l-dirāya is valid only within boundaries set by transmitted knowledge from the Salaf.
    source_notes_fr: |
      L'introduction d'Ibn Kathīr privilégie le tafsīr bi-l-riwāya ; al-Zarkashī (al-Burhān) explique que le tafsīr bi-l-dirāya n'est valide que dans les limites fixées par la connaissance transmise des Salaf.
    source_notes_ar: |
      يُقدِّمُ ابنُ كثيرٌ في مقدِّمتِه التفسيرَ بالروايةَ؛ ويُوضِّحُ الزركشي (البرهان) أنَّ التفسيرَ بالدراية صالحٌ فقط ضمنَ الحدودِ التي تضعُها المعرفةُ المنقولةُ عن السلف.
