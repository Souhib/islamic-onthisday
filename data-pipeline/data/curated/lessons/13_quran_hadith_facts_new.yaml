  - slug: quran-fact-ijaz
    category: quran_hadith_fact
    title_en: The I'jaz (Inimitability) of the Qur'an — Why It Cannot Be Matched
    title_ar: إعجاز القرآن — لماذا لا يمكن مضاهاته؟
    title_fr: L'I'jaz (inimitabilité) du Coran — Pourquoi ne peut-il être égalé ?
    description_en: |
      The Qur'an challenges its audience directly: "Then bring a surah like it, if you are truthful" (2:23). This challenge has stood unmet for over fourteen centuries, and classical Sunni scholarship has devoted enormous intellectual energy to understanding why. Al-Baqillani, in his foundational *I'jaz al-Qur'an*, argues that the Qur'an's inimitability operates on multiple levels simultaneously — its linguistic precision, its rhetorical beauty, its predictive accuracy, its scientific consistency, and its legal comprehensiveness. Ibn Kathīr emphasizes that the challenge was issued to the most eloquent Arabs of the time, who were utterly incapable of meeting it despite having the strongest motive to do so. The classical answer distinguishes between two types of miracle: those that suspend natural law (like the splitting of the moon) and those that operate within natural law but exceed human capacity (like the Qur'an). The i'jaz is permanent — unlike the miracles of previous prophets, which were witnessed and then faded, the Qur'an remains present and recitable, its challenge renewable with every generation. The practical relevance is that the believer's confidence in the Qur'an is not based on nostalgia but on an ongoing, verifiable claim that invites scrutiny and withstands it.
    description_ar: |
      يتحدى القرآن جمهوره مباشرة: «فأتوا بسورةٍ من مثله إن كنتم صادقين» (البقرة: 23). وقد ظل هذا التحدي بلا رد لأكثر من أربعة عشر قرنًا، وكرّست المدرسة السنية الكلاسيكية طاقة فكرية هائلة لفهم السبب. يجادل الباقلاني في كتابه الأساسي «إعجاز القرآن» بأن إعجاز القرآن يعمل على مستويات متعددة في آن واحد — دقته اللغوية وجماله البلاغي وصحة تنبؤاته واتساقه العلمي وشموليته التشريعية. يؤكد ابن كثير أن التحدي وجه إلى أبلغ العرب في زمانه، الذين عجزوا تمامًا عن مجابهته رغم امتلاكهم أقوى الدوافع لذلك. الإجابة الكلاسيكية تميز بين نوعين من المعجزات: تلك التي تُعطل القانون الطبيعي (كانشقاق القمر) وتلك التي تعمل ضمن القانون الطبيعي لكن تتجاوز القدرة البشرية (كالقرآن). الإعجاز دائم — على عكس معجزات الأنبياء السابقين التي شُهِدت ثم تلاشت، يبقى القرآن حاضرًا قابلًا للتلاوة، وتحديه متجدد مع كل جيل. الأثر العملي هو أن ثقة المؤمن بالقرآن لا تقوم على الحنين إلى الماضي بل على ادعاء مستمر قابل للتدقيق ويصمد أمامه.
    description_fr: |
      Le Coran défie directement son auditoire : « Apportez donc une sourate semblable à lui, si vous êtes véridiques » (2:23). Ce défi est resté sans réponse pendant plus de quatorze siècles, et la tradition savante sunnite classique a consacré une énorme énergie intellectuelle à comprendre pourquoi. Al-Baqillani, dans son ouvrage fondateur *I'jaz al-Qur'an*, soutient que l'inimitabilité du Coran opère simultanément sur plusieurs niveaux — sa précision linguistique, sa beauté rhétorique, son exactitude prédictive, sa cohérence scientifique et son exhaustivité légale. Ibn Kathīr souligne que le défi a été lancé aux Arabes les plus éloquents de l'époque, qui furent totalement incapables d'y répondre malgré leur motivation la plus forte. La réponse classique distingue deux types de miracle : ceux qui suspendent les lois naturelles (comme la fission de la lune) et ceux qui opèrent dans les lois naturelles mais dépassent la capacité humaine (comme le Coran). L'i'jaz est permanent — contrairement aux miracles des prophètes précédents, qui furent témoignés puis disparurent, le Coran reste présent et récitable, son défi renouvelable à chaque génération. La pertinence pratique est que la confiance du croyant dans le Coran ne repose pas sur la nostalgie mais sur une revendication continue, vérifiable, qui résiste à l'examen.
    reference: "Qur'an 2:23 (Surah al-Baqarah), 10:38 (Surah Yunus), 17:88 (Surah al-Isra); al-Baqillani, I'jaz al-Qur'an"
    source_notes: |
      Al-Bāqillānī (Iʿjāz al-Qurʾān) argues the miracle operates on linguistic, rhetorical, and legal levels simultaneously; Ibn Kathīr notes the challenge was issued to the most eloquent Arabs, making their failure definitive.
    source_notes_fr: |
      Al-Bāqillānī (Iʿjāz al-Qurʾān) soutient que le miracle opère simultanément sur les plans linguistique, rhétorique et juridique ; Ibn Kathīr note que le défi fut lancé aux Arabes les plus éloquents, rendant leur échec définitif.
    source_notes_ar: |
      يجادل الباقلاني (إعجاز القرآن) بأنَّ المعجزةَ تعملُ على المستوياتِ اللغويةِ والبلاغيةِ والشرعيةِ معًا؛ ويلاحظُ ابنُ كثيرٍ أنَّ التحديَ وجَّهَ إلى أبلغِ العربِ، مما جعلَ عجزَهم حاسمًا.
