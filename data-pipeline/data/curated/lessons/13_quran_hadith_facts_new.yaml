  - slug: quran-fact-qiraat-seven
    category: quran_hadith_fact
    title_en: The Seven Qira'at — Why Are There Different Readings of the Qur'an?
    title_ar: القراءات السبع — لماذا هناك قراءات مختلفة للقرآن؟
    title_fr: Les Sept Qira'at — Pourquoi existe-t-il différentes lectures du Coran ?
    description_en: |
      The existence of multiple qira'at (readings) of the Qur'an is often misunderstood as textual corruption or contradiction. The scholarly reality is far more nuanced and reflects the richness of the Arabic language itself. The Prophet ﷺ received the Qur'an in multiple dialects to accommodate the various tribes of Arabia, as reported in Bukhari and Muslim. Ibn al-Jazari, the authoritative scholar of qira'at, explains in *al-Nashr fi al-Qira'at al-'Ashr* that the seven mutawatir qira'at — transmitted by chains so extensive that collusion is impossible — all descend from the Prophet ﷺ through the Sahaba and the Tabi'in. The differences are primarily in pronunciation, voweling, and occasional word substitution (e.g., "maliki" vs. "maliiki" in al-Fatiha), never in meaning that would affect creed or law. Al-Nawawī notes that the consensus of the ummah on the validity of the seven readings is itself a proof of their authenticity. Classical Sunni methodology holds that the qira'at are a mercy, not a confusion: they demonstrate that the Qur'an is a living, recited text that accommodates the phonetic diversity of the Muslim world while preserving a single, immutable meaning. The practical relevance is that Muslims can recite according to their authorized tradition while maintaining complete confidence in the unity of the revealed text.
    description_ar: |
      غالبًا ما يُفهم وجود قراءات متعددة للقرآن على أنه تحريف أو تناقض. الواقع العلمي أكثر دقة بكثير ويعكس غنى اللغة العربية نفسها. تلقى النبي ﷺ القرآن بعدة لهجات لاستيعاب قبائل الجزيرة العربية المختلفة، كما ورد في البخاري ومسلم. يشرح ابن الجزري، العالم المرجعي في القراءات، في «النشر في القراءات العشر» أن القراءات السبع المتواترة — المنقولة بأسانيد واسعة لدرجة يستحيل فيها التواطؤ — جميعها تنحدر من النبي ﷺ عبر الصحابة والتابعين. الاختلافات تكمن أساسًا في النطق والتشكيل والاستبدال الكلي أحيانًا (مثل «مالك» مقابل «ملك» في الفاتحة)، ولا تمس معنى يؤثر على العقيدة أو الحكم. يلاحظ النووي أن إجماع الأمة على صحة القراءات السبع هو بحد ذاته دليل على صحتها. تجمع المنهجية السنية الكلاسيكية على أن القراءات رحمة لا لبس: فهي تُظهر أن القرآن نص حي مُتلو يستوعب التنوع الصوتي للعالم الإسلامي مع الحفاظ على معنى واحد ثابت. الأثر العملي هو أن المسلمين يمكنهم التلاوة وفق تقليدهم المعتمد مع الحفاظ على ثقة كاملة في وحدة النص المنزل.
    description_fr: |
      L'existence de multiples qira'at (lectures) du Coran est souvent mal comprise comme une corruption ou une contradiction textuelle. La réalité savante est beaucoup plus nuancée et reflète la richesse de la langue arabe elle-même. Le Prophète ﷺ a reçu le Coran en plusieurs dialectes pour accommoder les différentes tribus d'Arabie, comme rapporté dans Bukhari et Muslim. Ibn al-Jazari, le savant faisant autorité sur les qira'at, explique dans son *al-Nashr fi al-Qira'at al-'Ashr* que les sept qira'at mutawatir — transmises par des chaînes si étendues qu'une collusion est impossible — descendent toutes du Prophète ﷺ par l'intermédiaire des Sahaba et des Tabi'in. Les différences concernent principalement la prononciation, la vocalisation et l'occasionnelle substitution de mots (par exemple, « maliki » contre « maliiki » dans al-Fatiha), jamais dans un sens qui affecterait la croyance ou la loi. Al-Nawawī note que le consensus de la oumma sur la validité des sept lectures est lui-même une preuve de leur authenticité. La méthodologie sunnite classique soutient que les qira'at sont une miséricorde, non une confusion : elles démontrent que le Coran est un texte vivant, récité, qui accommode la diversité phonétique du monde musulman tout en préservant un sens unique et immuable. La pertinence pratique est que les musulmans peuvent réciter selon leur tradition autorisée tout en maintenant une confiance complète dans l'unité du texte révélé.
    reference: "Bukhari 5006, Muslim 819; Ibn al-Jazari, al-Nashr fi al-Qira'at al-'Ashr"
    source_notes: |
      Ibn al-Jazarī (al-Nashr) establishes the seven mutawātir readings; al-Nawawī notes that the ummah's consensus on their validity is itself proof of authenticity, and that differences are in pronunciation, not meaning.
    source_notes_fr: |
      Ibn al-Jazarī (al-Nashr) établit les sept lectures mutawātir ; al-Nawawī note que le consensus de la oumma sur leur validité est lui-même une preuve d'authenticité, et que les différences concernent la prononciation, non le sens.
    source_notes_ar: |
      يُرسِّخُ ابنُ الجزري (النشر) القراءاتِ السبعَ المتواترةَ؛ ويلاحظُ النوويُّ أنَّ إجماعَ الأمةِ على صحتِها دليلٌ بحدِّ ذاته على صحتِها، وأنَّ الاختلافاتَ في النطقِ لا في المعنى.
    display_day_of_year: 252
