lessons:
  - slug: quran-fact-basmala-meaning
    category: quran_hadith_fact
    title_en: Why Does the Qur'an Begin with "Bismillah al-Rahman al-Rahim"?
    title_ar: لماذا يبدأ القرآن بـ "بسم الله الرحمن الرحيم"؟
    title_fr: Pourquoi le Coran commence-t-il par « Bismillah al-Rahman al-Rahim » ?
    description_en: |
      Every surah in the Qur'an except one begins with the Basmala — a formula so ubiquitous that its meaning is often taken for granted. The scholarly question is: why does the Qur'an choose this exact invocation? Al-Qurṭubī, in his *al-Jami' li-Ahkam al-Qur'an*, explains that every action of significance in Islam is begun with the name of Allah, establishing that all benefit and blessing flow from Him alone. The two names of mercy — al-Rahman and al-Rahim — are not redundant. Al-Rahman refers to Allah's all-encompassing mercy extended to all creation, while al-Rahim refers to His special mercy reserved for the believers in the Hereafter. Ibn Kathīr notes that the Basmala serves as a teaching device: before you read the speech of Allah, you remember His mercy, which transforms the reader's heart from apprehension to receptivity. Classical Sunni scholarship unanimously holds that the Basmala is a verse of Surah al-Fatiha and of every surah except Surah al-Tawbah. The practical relevance is immediate — every letter read after the Basmala is framed within a posture of humility and hope in divine mercy.
    description_ar: |
      تفتتح كل سورة في القرآن الكريم — باستثناء سورة واحدة — بالبسملة، وهي صيغة منتشرة لدرجة أن معناها غالبًا ما يُpassed over دون تفكر. السؤال العلمي هو: لماذا اختار القرآن هذا الدعاء بالتحديد؟ يوضح القرطبي في «الجامع لأحكام القرآن» أن كل عمل ذي قيمة في الإسلام يُستحبُّ أن يُفتتح باسم الله، مما يؤسس لحقيقة أن كل الخير والبركة تنبعان منه وحده. أما اسمَا الرحمة — الرحمن والرحيم — فليسا مترادفين. الرحمن تشير إلى رحمته الشاملة التي تمتدّ إلى كل الخلق، والرحيم تشير إلى رحمته الخاصة المخصوصة للمؤمنين في الآخرة. يشير ابن كثير إلى أن البسملة تُعدّ أداة تعليمية: قبل أن تقرأ كلام الله، تتذكر رحمته، مما يحوّل قلب القارئ من الخوف إلى الانقياد والقبول. يجمع العلماء السنّة على أن البسملة آية من سورة الفاتحة ومن كل سورة باستثناء سورة التوبة. الأثر العملي واضح — كل حرف يُقرأ بعد البسملة يُؤطر في تواضع وأمل في الرحمة الإلهية.
    description_fr: |
      Chaque sourate du Coran, à l'exception d'une, commence par la Basmala — une formule si répandue que sa signification est souvent négligée. La question savante est la suivante : pourquoi le Coran a-t-il choisi cette invocation précise ? Al-Qurṭubī, dans son *al-Jami' li-Ahkam al-Qur'an*, explique que toute action d'importance en islam doit commencer par le nom d'Allah, établissant ainsi que tout bienfait et toute bénédiction procèdent de Lui seul. Les deux noms de miséricorde — al-Rahman et al-Rahim — ne sont pas redondants. Al-Rahman désigne la miséricorde universelle d'Allah qui s'étend à toute la création, tandis qu'al-Rahim désigne Sa miséricorde particulière réservée aux croyants dans l'au-delà. Ibn Kathīr note que la Basmala sert d'outil pédagogique : avant de lire la parole d'Allah, on se souvient de Sa miséricorde, ce qui transforme le cœur du lecteur de l'appréhension à la réceptivité. La tradition savante sunnite s'accorde unanimement pour dire que la Basmala est un verset de la sourate al-Fatiha et de chaque sourate, à l'exception de la sourate al-Tawbah. La pertinence pratique est immédiate — chaque lettre lue après la Basmala est encadrée dans une posture d'humilité et d'espérance en la miséricorde divine.
    reference: "Qur'an 1:1 (Surah al-Fatiha); al-Qurtubi, al-Jami' li-Ahkam al-Qur'an"
    source_notes: |
      Al-Qurṭubī (al-Jāmiʿ) and Ibn Kathīr explain that the Basmala is a verse of every surah except al-Tawbah, and that al-Raḥmān and al-Raḥīm distinguish universal mercy from that reserved for believers in the Hereafter.
    source_notes_fr: |
      Al-Qurṭubī (al-Jāmiʿ) et Ibn Kathīr expliquent que la Basmala est un verset de chaque sourate sauf al-Tawbah, et qu'al-Raḥmān et al-Raḥīm distinguent la miséricorde universelle de celle réservée aux croyants dans l'au-delà.
    source_notes_ar: |
      يُوضِّحُ القرطبي (الجامع) وابنُ كثيرٍ أنَّ البسملةَ آيةٌ من كلِّ سورةٍ باستثناء سورةِ التوبة، وأنَّ الرحمنَ والرحيمَ يُميِّزان الرحمةَ الشاملةَ من تلك المخصوصةِ للمؤمنين في الآخرة.
    display_day_of_year: 243
    quran_refs: "1:1"
    hadith_refs: ""

  - slug: quran-fact-hamd-meaning
    category: quran_hadith_fact
    title_en: What Does "Alhamdulillah" Actually Mean?
    title_ar: ماذا تعني "الحمد لله" حقًا؟
    title_fr: Que signifie réellement « Alhamdulillah » ?
    description_en: |
      "Alhamdulillah" is perhaps the most frequently uttered phrase in a Muslim's life, yet its depth is rarely plumbed. The root *hamd* differs fundamentally from *shukr* (gratitude). As al-Raghib al-Isfahani clarifies in *al-Mufradat*, *hamd* is praise that flows from love, reverence, and the recognition of voluntary beneficence — it is inherently bound to the attributes of the one praised. Unlike gratitude, which can be a response to a specific gift, *hamd* encompasses praising Allah for His essence, His names, His actions, and His favors, whether perceived or hidden. Al-Zajjaj, in *Ma'ani al-Qur'an*, emphasizes that beginning the Qur'an with al-hamd establishes the foundation of all human existence: every breath, every provision, every guidance is a reason for praise. Ibn Kathīr notes that Surah al-Fatiha opens with this phrase to teach the believer that before asking for anything — as the rest of the surah does — one must first praise the One who gives. The classical Sunni answer is that "Alhamdulillah" is not merely gratitude for blessings received, but an all-encompassing acknowledgment that Allah alone is worthy of praise by virtue of who He is and what He does.
    description_ar: |
      «الحمد لله» هي العبارة الأكثر تكرارًا في حياة المسلم، ومع ذلك نادرًا ما يُغوص في أعماق معناها. يختلف أصل «الحمد» جوهريًا عن «الشكر». كما يوضح الراغب الأصفهاني في «المفردات»، الحمد هو الثناء المتدفق من الحب والتبجيل والإدراك للإحسان الاختياري — وهو مرتبط جوهريًا بصفات المثنى عليه. على عكس الشكر الذي يمكن أن يكون استجابة لنعمة محددة، يشمل الحمد حمد الله على ذاته وأسمائه وأفعاله ونعمه، المدركة والخفية. يؤكد الزجاج في «معاني القرآن» أن افتتاح القرآن بالحمد يؤسس لأساس كل الوجود البشري: كل نفس وكل رزق وكل هداية سبب للحمد. يشير ابن كثير إلى أن سورة الفاتحة تفتتح بهذه العبارة لتعليم المؤمن أنه قبل أن يطلب أي شيء — كما تفعل بقية السورة — يجب أن يُثني أولاً على من يعطي. الإجابة السنية الكلاسيكية هي أن «الحمد لله» ليست مجرد امتنان للنعم المتلقاة، بل اعتراف شامل بأن الله وحده مستحق للحمد بحكم ما هو عليه وما يفعله.
    description_fr: |
      « Alhamdulillah » est peut-être la phrase la plus fréquemment prononcée dans la vie d'un musulman, et pourtant sa profondeur est rarement explorée. La racine *hamd* diffère fondamentalement de *shukr* (gratitude). Comme le clarifie al-Raghib al-Isfahani dans son *al-Mufradat*, le *hamd* est une louange qui découle de l'amour, de la révérence et de la reconnaissance d'un bienfait volontaire — il est intrinsèquement lié aux attributs de celui qui est loué. Contrairement à la gratitude, qui peut être une réponse à un don spécifique, le *hamd* englobe la louange d'Allah pour Son essence, Ses noms, Ses actions et Ses faveurs, qu'elles soient perçues ou cachées. Al-Zajjaj, dans *Ma'ani al-Qur'an*, souligne qu'en commençant le Coran par al-hamd, on établit le fondement de toute existence humaine : chaque souffle, chaque provision, chaque guidance est une raison de louange. Ibn Kathīr note que la sourate al-Fatiha s'ouvre sur cette phrase pour apprendre au croyant qu'avant de demander quoi que ce soit — comme le fait le reste de la sourate — on doit d'abord louer Celui qui donne. La réponse savante sunnite classique est que « Alhamdulillah » n'est pas simplement une gratitude pour les bénédictions reçues, mais une reconnaissance globale qu'Allah seul est digne de louange en vertu de qui Il est et de ce qu'Il fait.
    reference: "Qur'an 1:2 (Surah al-Fatiha); al-Zajjaj, Ma'ani al-Qur'an; al-Raghib al-Isfahani, al-Mufradat"
    source_notes: |
      Al-Rāghib al-Iṣfahānī (al-Mufradāt) distinguishes ḥamd from shukr: ḥamd is praise rooted in love and reverence for the Benefactor's essence, encompassing both blessings seen and unseen.
    source_notes_fr: |
      Al-Rāghib al-Iṣfahānī (al-Mufradāt) distingue le ḥamd du shukr : le ḥamd est une louange enracinée dans l'amour et la révérence pour l'essence du Bienfaiteur, englobant les bienfaits visibles et invisibles.
    source_notes_ar: |
      يُميِّزُ الراغبُ الأصفهاني (المفردات) بين الحمدِ والشكرِ: الحمدُ ثناءٌ جذرُه الحبُّ والتبجيلُ لذاتِ المنعم، يشملُ النعمَ المشاهدةَ والغائبةَ.
    display_day_of_year: 244
    quran_refs: "1:2"
    hadith_refs: ""

  - slug: quran-fact-why-quran-repeats
    category: quran_hadith_fact
    title_en: Why Does the Qur'an Repeat Certain Phrases and Stories?
    title_ar: لماذا يكرر القرآن عبارات وقصصًا معينة؟
    title_fr: Pourquoi le Coran répète-t-il certaines phrases et certains récits ?
    description_en: |
      A casual reader of the Qur'an may notice that stories of the prophets, descriptions of Paradise and Hell, and certain doctrinal affirmations appear multiple times with subtle variations. The scholarly question is whether this repetition reflects redundancy or serves a deeper rhetorical and pedagogical purpose. Allah Himself describes the Qur'an as "a Book whose verses are perfected and then presented in detail" (Qur'an 11:1). Al-Suyuti, in *al-Itqan fi 'Ulum al-Qur'an*, catalogs the various modes of Qur'anic repetition — from exact reiteration to thematic recurrence with changed emphasis — and shows that each serves a distinct function. Ibn Kathīr explains that the story of Musa appears in over twenty passages not for narrative pleasure, but because each retelling highlights a different lesson: the danger of tyranny, the virtue of patience, the necessity of trusting Allah's plan. The classical Sunni answer holds that the Qur'an is not a linear book but a living discourse; its repetition is *tawkid* (emphasis) and *tatimma* (completion), ensuring that no essential truth is missed by any community in any era. The practical relevance is that the believer who returns to familiar passages with fresh eyes discovers layers of meaning impossible to exhaust in a single reading.
    description_ar: |
      قد يلاحظ قارئ القرآن العادي أن قصص الأنبياء ووصف الجنة والنار وبعض التأكيدات العقدية تظهر عدة مرات مع اختلافات طفيفة. السؤال العلمي هو: هل يعكس هذا التكرار التكرار البليغ أم يخدم غرضًا بلاغيًا وتربويًا أعمق؟ يصف الله سبحانه القرآن بنفسه بأنه «كتابٌ أُحكِمت آياته ثم فُصِّلت» (هود: 1). يُدرج السيوطي في «الإتقان في علوم القرآن» الأنماط المختلفة للتكرار القرآني — من الإعادة الحرفية إلى التكرار الموضوعي مع تغيير التركيز — ويُظهر أن كل نمط يخدم وظيفة مميزة. يشرح ابن كثير أن قصة موسى تظهر في أكثر من عشرين موضعًا ليس لأجل المتعة السردية، بل لأن كل رواية تسلط الضوء على درس مختلف: خطر الاستبداد، وفضيلة الصبر، وضرورة الثقة بمشيئة الله. تجيب المدرسة السنية الكلاسيكية بأن القرآن ليس كتابًا خطيًا بل خطابًا حيًا؛ تكراره هو تأكيد وإتمام، لضمان عدم إغفال أي حقيقة جوهرية من قبل أي أمة في أي عصر. الأثر العملي هو أن المؤمن الذي يعود إلى مقاطع مألوفة بعيون جديدة يكتشف طبقات من المعاني يستحيل استنفادها في قراءة واحدة.
    description_fr: |
      Un lecteur occasionnel du Coran peut remarquer que les histoires des prophètes, les descriptions du Paradis et de l'Enfer, et certaines affirmations doctrinales apparaissent plusieurs fois avec des variations subtiles. La question savante est de savoir si cette répétition reflète une redondance ou sert un but rhétorique et pédagogique plus profond. Allah Lui-même décrit le Coran comme « un Livre dont les versets sont parfaits, puis exposés en détail » (Coran 11:1). Al-Suyuti, dans son *al-Itqan fi 'Ulum al-Qur'an*, catalogue les divers modes de répétition coranique — de la réitération exacte à la récurrence thématique avec un accent modifié — et montre que chacun sert une fonction distincte. Ibn Kathīr explique que l'histoire de Musa apparaît dans plus de vingt passages non pour le plaisir narratif, mais parce que chaque récit met en lumière une leçon différente : le danger de la tyrannie, la vertu de la patience, la nécessité de faire confiance au plan d'Allah. La réponse savante sunnite classique soutient que le Coran n'est pas un livre linéaire mais un discours vivant ; sa répétition est un *tawkid* (emphasе) et une *tatimma* (complétion), garantissant qu'aucune vérité essentielle ne soit manquée par aucune communauté à aucune époque. La pertinence pratique est que le croyant qui revient sur des passages familiers avec un regard neuf découvre des couches de sens qu'il est impossible d'épuiser en une seule lecture.
    reference: "Qur'an 39:23 (Surah al-Zumar); Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Suyuti, al-Itqan fi 'Ulum al-Qur'an"
    source_notes: |
      Al-Suyūṭī (al-Itqān) catalogs modes of repetition as tawkīd and tatimma; Ibn Kathīr shows that each retelling of a prophetic story shifts emphasis to teach a distinct moral or legal lesson.
    source_notes_fr: |
      Al-Suyūṭī (al-Itqān) catalogue les modes de répétition comme tawkīd et tatimma ; Ibn Kathīr montre que chaque récit d'une histoire prophétique déplace l'accent pour enseigner une leçon morale ou juridique distincte.
    source_notes_ar: |
      يُدرِجُ السيوطي (الإتقان) أنماطَ التكرارِ على أنها تأكيدٌ وإتمام؛ ويُبيِّنُ ابنُ كثيرٍ أنَّ كلَّ روايةٍ لقصةٍ نبويةٍ تُحوِّلُ التركيزَ لتعليمِ درسٍ أخلاقيٍّ أو شرعيٍّ مميز.
    display_day_of_year: 245
    quran_refs: "39:23"
    hadith_refs: ""

  - slug: quran-fact-seven-mathani
    category: quran_hadith_fact
    title_en: The Seven Oft-Repeated Verses — Why Is al-Fatiha So Central?
    title_ar: السبع المثاني — لماذا تُعدّ الفاتحة محورية إلى هذا الحد؟
    title_fr: Les Sept Versets Répétés — Pourquoi al-Fatiha est-elle si centrale ?
    description_en: |
      The Prophet Muhammad ﷺ called Surah al-Fatiha "the greatest surah in the Qur'an" and "the seven oft-repeated verses" (al-sab' al-mathani). The question is: what makes these seven brief verses the cornerstone of every rak'a in prayer? Bukhari and Muslim report that the Prophet ﷺ said, "There is no prayer for the one who does not recite the Opening of the Book." Ibn Kathīr explains that al-Fatiha is unique because it contains the entirety of servitude to Allah: praise, gratitude, submission, and supplication. Al-Qurṭubī adds that the division of the surah into two halves — the first half addresses Allah's greatness and the second half addresses human need — mirrors the structure of all prophetic supplication. The name al-Fatiha itself means "the Opening," not merely because it opens the mushaf, but because it opens the heart to divine guidance. Classical scholars noted that the surah is a dialogue between the servant and his Lord: when the servant says "It is You we worship and You we ask for help," Allah responds, "This is between Me and My servant, and My servant shall have what he asks." The practical relevance is profound — every Muslim repeats these verses at least seventeen times daily, making them the most formative linguistic and spiritual structure in a believer's life.
    description_ar: |
      وصف النبي محمد ﷺ سورة الفاتحة بأنها «أعظم سورة في القرآن» و«السبع المثاني». السؤال هو: ما الذي يجعل هذه الآيات السبع القصيرة حجر الزاوية في كل ركعة من الصلاة؟ يُخرج البخاري ومسلم عن النبي ﷺ قوله: «لا صلاة لمن لم يقرأ بفاتحة الكتاب». يشرح ابن كثير أن الفاتحة فريدة لأنها تحتوي على مجموع العبودية لله: الثناء والشكر والخضوع والدعاء. يضيف القرطبي أن تقسيم السورة إلى نصفين — يتناول النصف الأول عظمة الله والنصف الثاني حاجة الإنسان — يعكس بنية كل دعاء نبوي. اسم الفاتحة يعني الافتتاح، ليس لأنها تفتتح المصحف فحسب، بل لأنها تفتتح القلب للهداية الإلهية. لاحظ العلماء الكلاسيكيون أن السورة حوار بين العبد وربه: حين يقول العبد «إيَّاك نعبد وإيَّاك نستعين»، يجيب الله: «هذا بيني وبين عبدي، و لعبدي ما سأل». الأثر العملي عميق — يكرر كل مسلم هذه الآيات سبع عشرة مرة يوميًا على الأقل، مما يجعلها البنية اللغوية والروحية الأكثر تشكيلاً في حياة المؤمن.
    description_fr: |
      Le Prophète Muhammad ﷺ a appelé la sourate al-Fatiha « la plus grande sourate du Coran » et « les sept versets répétés » (al-sab' al-mathani). La question est la suivante : qu'est-ce qui fait de ces sept brèves versets la pierre angulaire de chaque rak'a dans la prière ? Bukhari et Muslim rapportent que le Prophète ﷺ a dit : « Il n'y a pas de prière pour celui qui ne récite pas l'Ouverture du Livre. » Ibn Kathīr explique qu'al-Fatiha est unique car elle contient l'ensemble de la servitude envers Allah : louange, gratitude, soumission et supplication. Al-Qurṭubī ajoute que la division de la sourate en deux moitiés — la première moitié s'adresse à la grandeur d'Allah et la seconde au besoin humain — reflète la structure de toute supplication prophétique. Le nom al-Fatiha signifie « l'Ouverture », non pas seulement parce qu'elle ouvre le mushaf, mais parce qu'elle ouvre le cœur à la guidance divine. Les savants classiques ont noté que la sourate est un dialogue entre le serviteur et son Seigneur : lorsque le serviteur dit « C'est Toi que nous adorons et c'est Toi dont nous implorons le secours », Allah répond : « Ceci est entre Moi et Mon serviteur, et Mon serviteur obtiendra ce qu'il demande. » La pertinence pratique est profonde — chaque musulman répète ces versets au moins dix-sept fois par jour, ce qui en fait la structure linguistique et spirituelle la plus formatrice dans la vie d'un croyant.
    reference: "Qur'an 15:87 (Surah al-Hijr); Bukhari 4474, Muslim 394"
    source_notes: |
      Bukhārī (4474) and Muslim (394) record the obligation of al-Fātiḥa; Ibn Kathīr notes that it contains the entirety of servitude—praise, gratitude, submission, and supplication—and that the hadith qudsi describes a dialogue between servant and Lord.
    source_notes_fr: |
      Bukhārī (4474) et Muslim (394) consignent l'obligation d'al-Fātiḥa ; Ibn Kathīr note qu'elle contient l'ensemble de la servitude — louange, gratitude, soumission et supplication — et que le hadith qudsī décrit un dialogue entre le serviteur et son Seigneur.
    source_notes_ar: |
      يُسَجِّلُ البخاري (٤٤٧٤) ومسلم (٣٩٤) وجوبَ الفاتحة؛ ويلاحظُ ابنُ كثيرٍ أنَّها تضمُّ مجموعَ العبوديةِ — الثناءَ والشكرَ والخضوعَ والدعاءَ — وأنَّ الحديثَ القدسيَّ يصورُ حوارًا بين العبدِ وربِّه.
    display_day_of_year: 247
    quran_refs: "15:87"
    hadith_refs: "Bukhari 4474, Muslim 394"

  - slug: quran-fact-why-arabic
    category: quran_hadith_fact
    title_en: Why Was the Qur'an Revealed in Arabic?
    title_ar: لماذا نُزل القرآن باللغة العربية؟
    title_fr: Pourquoi le Coran a-t-il été révélé en arabe ?
    description_en: |
      The Qur'an repeatedly declares itself "an Arabic Qur'an" (12:2, 20:113, 39:28), a claim that invites scholarly reflection. Why Arabic, and not Hebrew, Syriac, or a universal celestial tongue? Ibn Kathīr, in his tafsir, explains that Allah chose Arabic because it was the language of the people to whom the final message was directly addressed, ensuring clarity and accessibility. But the choice was not merely pragmatic. Al-Suyuti, in *al-Itqan*, enumerates the unique linguistic features of Arabic — its vast lexical range, its derivational morphology, its capacity for brevity alongside precision — that make it uniquely suited to carry a miraculous, inimitable text. Classical Sunni scholarship holds that the Qur'an's Arabicity is intrinsic to its miracle: the challenge to produce a single surah like it (2:23) was issued to Arab eloquents in their own tongue, making the failure of the challenge definitive. Ibn al-Qayyim adds that every language carries the cognitive and cultural imprint of its people; Arabic, as the language of the desert Arabs who valued eloquence above all arts, provided the perfect medium for a revelation that would overwhelm human literary ambition. The practical relevance is that the Arabic of the Qur'an remains a living standard of the language, and every attempt at translation is acknowledged as interpretation, not equivalence.
    description_ar: |
      يُعلن القرآن مرارًا أنه «قرآنٌ عربيٌّ» (يوسف: 2، طه: 113، الزمر: 28)، وهو ادعاء يدعو إلى تأمل علمي. لماذا العربية وليس العبرانية أو السريانية أو لغة سماوية كونية؟ يشرح ابن كثير في تفسيره أن الله اختار العربية لأنها لغة القوم الذين وجهت إليهم الرسالة الخاتمة مباشرة، لضمان الوضوح واليسر. لكن الاختيار لم يكن مجرديًا فحسب. يعدد السيوطي في «الإتقان» السمات اللغوية الفريدة للعربية — مدى مفرداتها الواسع، وصرفها المشتق، وقدرتها على الإيجاز إلى جانب الدقة — مما يجعلها مناسبة بشكل فريد لحمل نص معجز لا يُقلَّد. تجمع المدرسة السنية الكلاسيكية على أن عروبة القرآن جوهرية في إعجازه: التحدي بإنتاج سورة مثله (البقرة: 23) وجه إلى بلغاء العرب بلغتهم، مما يجعل فشل التحدي حاسمًا. يضيف ابن القيم أن كل لغة تحمل البصمة المعرفية والثقافية لقومها؛ والعربية، كلغة بدو العرب الذين قدَّروا البلاغة فوق كل الفنون، قدمت الوسيط المثالي لوحي سيطغى على الطموح الأدبي البشري. الأثر العملي هو أن لغة القرآن العربية تظل معيارًا حيًا للغة، وكل محاولة للترجمة معترف بأنها تأويل لا تكافؤ.
    description_fr: |
      Le Coran déclare à plusieurs reprises être « un Coran en arabe » (12:2, 20:113, 39:28), une affirmation qui invite à une réflexion savante. Pourquoi l'arabe, et non l'hébreu, le syriaque ou une langue céleste universelle ? Ibn Kathīr, dans son tafsir, explique qu'Allah a choisi l'arabe parce que c'était la langue du peuple auquel le message final était directement adressé, assurant ainsi clarté et accessibilité. Mais le choix n'était pas seulement pragmatique. Al-Suyuti, dans son *al-Itqan*, énumère les caractéristiques linguistiques uniques de l'arabe — son vaste champ lexical, sa morphologie dérivationnelle, sa capacité à être concise tout en restant précise — qui la rendent particulièrement apte à porter un texte miraculeux et inimitable. La tradition savante sunnite classique soutient que l'arabité du Coran est intrinsèque à son miracle : le défi de produire une seule sourate comme lui (2:23) a été lancé aux éloquents arabes dans leur propre langue, rendant l'échec du défi définitif. Ibn al-Qayyim ajoute que chaque langue porte l'empreinte cognitive et culturelle de son peuple ; l'arabe, en tant que langue des Bédouins arabes qui valorisaient l'éloquence par-dessus tous les arts, fournissait le médium parfait pour une révélation qui submergerait l'ambition littéraire humaine. La pertinence pratique est que l'arabe du Coran reste une norme vivante de la langue, et toute tentative de traduction est reconnue comme une interprétation, non une équivalence.
    reference: "Qur'an 12:2 (Surah Yusuf), 20:113 (Surah Taha), 39:28 (Surah al-Zumar); Ibn Kathir, Tafsir al-Qur'an al-Azim"
    source_notes: |
      Ibn Kathīr and al-Suyūṭī (al-Itqān) explain that Arabic was chosen for clarity to the immediate recipients and because its derivational morphology and rhetorical precision made it the perfect vehicle for the challenge of iʿjāz.
    source_notes_fr: |
      Ibn Kathīr et al-Suyūṭī (al-Itqān) expliquent que l'arabe fut choisi pour sa clarté auprès des destinataires immédiats et parce que sa morphologie dérivationnelle et sa précision rhétorique en firent le véhicule parfait pour le défi de l'iʿjāz.
    source_notes_ar: |
      يشرح ابنُ كثيرٍ والسيوطي (الإتقان) أنَّ اللغةَ العربيةَ اختيرتْ للوضوحِ عند المخاطبينَ المباشرين، ولأنَّ صرفَها المشتقَّ ودقتَها البلاغيةَ جعلاها الوسيلةَ المثلى لتحدي الإعجاز.
