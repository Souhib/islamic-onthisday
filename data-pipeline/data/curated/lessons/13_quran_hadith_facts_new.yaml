  - slug: quran-fact-occasions-of-revelation
    category: quran_hadith_fact
    title_en: Occasions of Revelation — When and Why Verses Were Revealed
    title_ar: أسباب النزول — متى ولماذا نزلت الآيات
    title_fr: Les Occasions de Révélation — Quand et pourquoi les versets ont-ils été révélés ?
    description_en: |
      The question of when and why specific verses were revealed is not mere historical curiosity; it is essential to correct interpretation. Wahidi's *Asbab al-Nuzul* remains the foundational text in this science, collecting the chains of narration that connect reports about revelation to their sources. Ibn Kathīr's tafsir demonstrates the method in action: when a verse addresses a specific incident, knowing the incident clarifies the verse's intent without restricting its general application. The classical Sunni position, as elaborated by generations of mufassirun, holds that asbab al-nuzul serve three primary functions: they explain the immediate reason for a verse's descent, they illustrate how general principles apply to concrete situations, and they differentiate between universal legislation and context-specific rulings. Al-Nawawī, though primarily a hadith scholar, emphasized in his methodological writings that ignoring asbab al-nuzul leads to the grave error of applying verses to situations they were never meant to address — a mistake that can distort both law and creed. The practical relevance for every Muslim is that the Qur'an is not a static text dropped from heaven, but a living response to real human questions, conflicts, and needs, and it must be read with that responsiveness in mind.
    description_ar: |
      ليس سؤال متى ولماذا نزلت آيات محددة مجرد فضول تاريخي؛ بل هو ضروري للتفسير الصحيح. يبقى كتاب الواحدي «أسباب النزول» النص الأساسي في هذا العلم، حيث يجمع أسانيد الرواية التي تربط الأخبار عن النزول بمصادرها. يُظهر تفسير ابن كثير المنهج عمليًا: حين تخاطب آية حادثة محددة، فمعرفة الحادثة توضح مقصد الآية دون تقييد عموم تطبيقها. يحمل الموقف السني الكلاسيكي، كما فصّله أجيال من المفسرين، أن أسباب النزول تخدم ثلاث وظائف أساسية: تُعلل سبب نزول الآية المباشر، وتُظهر كيف تُطبق المبادئ العامة على مواقف ملموسة، وتميز بين التشريع الكوني والأحكام الخاصة بالسياق. أكد النووي، وإن كان عالم حديث بالأساس، في كتاباته المنهجية أن إهمال أسباب النزول يؤدي إلى خطأ جسيم بتطبيق آيات على مواقف لم تُنزل لأجلها — خطأ يمكن أن يشوه الحكم والعقيدة معًا. الأثر العملي لكل مسلم هو أن القرآن ليس نصًا ثابتًا أُلقي من السماء، بل استجابة حية لأسئلة بشرية حقيقية وصراعات وحاجات، ويجب أن يُقرأ مع هذا الاستجابة في الحسبان.
    description_fr: |
      La question de savoir quand et pourquoi des versets spécifiques ont été révélés n'est pas une simple curiosité historique ; elle est essentielle à une interprétation correcte. L'*Asbab al-Nuzul* de Wahidi reste le texte fondateur de cette science, rassemblant les chaînes de narration qui relient les récits sur la révélation à leurs sources. Le tafsir d'Ibn Kathīr démontre la méthode en action : lorsqu'un verset aborde un incident spécifique, connaître l'incident clarifie l'intention du verset sans restreindre son application générale. La position savante sunnite classique, telle qu'élaborée par des générations de mufassirun, soutient que les asbab al-nuzul servent trois fonctions principales : ils expliquent la raison immédiate de la descente d'un verset, ils illustrent comment les principes généraux s'appliquent à des situations concrètes, et ils différencient entre la législation universelle et les règles spécifiques au contexte. Al-Nawawī, bien que principalement savant en hadith, a souligné dans ses écrits méthodologiques qu'ignorer les asbab al-nuzul conduit à la grave erreur d'appliquer des versets à des situations auxquelles ils n'ont jamais été destinés — une erreur qui peut déformer à la fois la loi et la croyance. La pertinence pratique pour chaque musulman est que le Coran n'est pas un texte statique tombé du ciel, mais une réponse vivante à de vraies questions, conflits et besoins humains, et qu'il doit être lu avec cette réceptivité à l'esprit.
    reference: "Wahidi, Asbab al-Nuzul; Ibn Kathir, Tafsir al-Qur'an al-Azim"
    source_notes: |
      Wahidi and Ibn Kathīr use asbāb al-nuzūl to clarify intent; al-Nawawī warns that ignoring them leads to applying verses to unrelated contexts, a mistake that historically fueled sectarian error.
    source_notes_fr: |
      Wahidi et Ibn Kathīr utilisent les asbāb al-nuzūl pour clarifier l'intention ; al-Nawawī avertit que les ignorer conduit à appliquer des versets à des contextes non connexes, une erreur qui a historiquement alimenté l'erreur sectaire.
    source_notes_ar: |
      يستخدم الواحدي وابنُ كثيرٍ أسبابَ النزولِ لتوضيحِ المقصدِ؛ ويُحذِّرُ النوويُّ من أنَّ إهمالَها يؤدي إلى تطبيقِ آياتٍ على سياقاتٍ غيرِ ذاتِ صلة، وهو خطأٌ أذكى تاريخيًّا التطرفَ الطائفي.
