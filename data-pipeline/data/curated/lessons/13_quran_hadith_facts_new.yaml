  - slug: quran-fact-muhkam-and-mutashabih
    category: quran_hadith_fact
    title_en: Muhkam and Mutashabih — Clear Verses and Ambiguous Verses
    title_ar: المحكم والمتشابه — الآيات الواضحة والآيات المتشابهة
    title_fr: Muhkam et Mutashabih — Versets clairs et versets ambigus
    description_en: |
      The Qur'an itself acknowledges a distinction between verses that are muhkam (clear, decisive) and verses that are mutashabih (ambiguous, open to multiple interpretations). This self-aware distinction, found in Qur'an 3:7, raises a profound hermeneutical question: how does the believer know which verses are which, and how should ambiguous verses be handled? Ibn Kathīr explains that the muhkam verses are the foundation of the Book — they establish the core articles of faith, the pillars of worship, and the clear moral boundaries. The mutashabih verses, by contrast, contain meanings whose full depth may not be accessible to all readers, and which have historically been the terrain of sectarian dispute. Al-Qurṭubī, in his *al-Jami'*, emphasizes the Qur'an's own instruction: "Those firmly grounded in knowledge say, 'We believe in it; all is from our Lord.'" The classical Sunni position is that ambiguous verses must be referred back to clear verses, and that no interpretation may contradict what is decisively established. Ibn Ḥajar warned that the Mutazila and other speculative groups erred precisely by building doctrines on mutashabih verses while ignoring the muhkam. The practical relevance is that this framework protects the believer from theological confusion: when encountering difficult verses, one returns to the clear foundation rather than constructing novel theories.
    description_ar: |
      يعترف القرآن بنفسه بتمييز بين آيات محكمة (واضحة وحاسمة) وآيات متشابهة (غامضة وقابلة لتأويلات متعددة). هذا التمييز الواعي بنفسه، الوارد في آل عمران: 7، يرفع سؤالًا تأويليًا عميقًا: كيف يعرف المؤمن أي الآيات هي من أي النوعين، وكيف يجب التعامل مع الآيات المتشابهة؟ يشرح ابن كثير أن المحكمات هي أساس الكتاب — تؤسس لأركان الإيمان الجوهرية وركائب العبادة والحدود الأخلاقية الواضحة. أما المتشابهات فتحتوي على معانٍ قد لا تكون أعماقها متاحة لجميع القراء، وقد كانت تاريخيًا ساحة للخلاف الطائفي. يؤكد القرطبي في «الجامع» توجيه القرآن ذاته: «يقول الذين أُوتوا العلم 'آمنا به كلٌّ من عند ربِّنا'». الموقف السني الكلاسيكي هو أن المتشابه يُرد إلى المحكم، وأنه لا يجوز تأويل يخالف ما ثبت بشكل قاطع. حذّر ابن حجر من أن المعتزلة والفرق التأويلية الأخرى أخطأت بالضبط ببناء عقائد على آيات متشابهة مع إهمال المحكم. الأثر العملي هو أن هذا الإطار يحمي المؤمن من الارتباك العقدي: حين يواجه آيات صعبة، يعود إلى الأساس الواضح بدلًا من بناء نظريات مستحدثة.
    description_fr: |
      Le Coran lui-même reconnaît une distinction entre des versets qui sont muhkam (clairs, décisifs) et des versets qui sont mutashabih (ambigus, ouverts à de multiples interprétations). Cette distinction consciente d'elle-même, trouvée en Coran 3:7, soulève une question herméneutique profonde : comment le croyant sait-il quels versets sont lesquels, et comment les versets ambigus doivent-ils être traités ? Ibn Kathīr explique que les versets muhkam sont le fondement du Livre — ils établissent les articles centraux de la foi, les piliers du culte et les limites morales claires. Les versets mutashabih, en revanche, contiennent des sens dont la profondeur complète peut ne pas être accessible à tous les lecteurs, et qui ont historiquement été le terrain de dispute sectaire. Al-Qurṭubī, dans son *al-Jami'*, met l'accent sur l'instruction même du Coran : « Ceux qui sont fermement ancrés dans la connaissance disent : 'Nous y croyons ; tout est de notre Seigneur.' » La position savante sunnite classique est que les versets ambigus doivent être rapportés aux versets clairs, et qu'aucune interprétation ne peut contredire ce qui est établi de manière décisive. Ibn Ḥajar a averti que les Mutazila et autres groupes spéculatifs ont erré précisément en bâtissant des doctrines sur des versets mutashabih tout en ignorant les muhkam. La pertinence pratique est que ce cadre protège le croyant de la confusion théologique : lorsqu'on rencontre des versets difficiles, on retourne au fondement clair plutôt que de construire des théories nouvelles.
    reference: "Qur'an 3:7 (Surah Ali 'Imran); Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Qurtubi, al-Jami' li-Ahkam al-Qur'an"
    source_notes: |
      Qur'an 3:7 instructs the learned to affirm both; Ibn Kathīr explains that muhkam verses are the foundation, and Ibn Ḥajar warns against building doctrines on mutashābihāt while ignoring the decisive.
    source_notes_fr: |
      Le Coran 3:7 instruit les savants d'affirmer les deux ; Ibn Kathīr explique que les versets muhkam sont le fondement, et Ibn Ḥajar avertit contre l'erreur de bâtir des doctrines sur les mutashābihāt tout en négligeant les versets décisifs.
    source_notes_ar: |
      يأمرُ القرآن (٣:٧) أهلَ العلمِ بالإقرارِ بالمحكمِ والمتشابهِ معًا؛ ويُبيِّنُ ابنُ كثيرٌ أنَّ المحكماتِ هي الأساسُ، ويُحذِّرُ ابنُ حجرٍ من بناءِ العقائدِ على المتشابهاتِ مع إهمالِ المحكم.
