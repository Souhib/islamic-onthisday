  - slug: quran-fact-makki-vs-madani
    category: quran_hadith_fact
    title_en: Makki vs. Madani Surahs — The Difference in Style and Content
    title_ar: السور المكية والمدنية — الفرق في الأسلوب والمحتوى
    title_fr: Sourates Makki vs. Madani — La différence de style et de contenu
    description_en: |
      Classical Qur'anic scholarship divides the surahs into two categories: Makki (revealed before the Hijra) and Madani (revealed after). The distinction is not merely chronological; it reflects a profound shift in the Muslim community's circumstances and needs. Makki surahs tend to be shorter, with intense rhetorical force, focusing on tawhid, prophecy, the Hereafter, and moral exhortation. Madani surahs are generally longer, more legislative, addressing family law, criminal law, interfaith relations, and statecraft. Ibn Kathīr notes that the Makki period was one of spiritual formation — the community was small, persecuted, and in need of doctrinal fortification. The Madani period was one of social construction — the community now had political autonomy and needed detailed guidance for collective life. Al-Suyuti, in *al-Itqan*, provides methodological criteria for distinguishing the two: references to jihad and hypocrisy generally indicate Madani origin, while oaths by celestial phenomena and challenges to the Qur'an's inimitability point to Makki revelation. The practical relevance is that understanding this distinction prevents the error of reading legislative verses without their historical context, or reading spiritual verses as if they were legal codes.
    description_ar: |
      تقسم الدراسات القرآنية الكلاسيكية السور إلى فئتين: مكية (نزلت قبل الهجرة) ومدنية (نزلت بعدها). التمييز ليس مجرد تسلسل زمني؛ بل يعكس تحولًا عميقًا في ظروف المجتمع المسلم وحاجاته. تميل السور المكية إلى أن تكون أقصر، بقوة بلاغية مكثفة، تركز على التوحيد والنبوة والآخرة والموعظة الأخلاقية. السور المدنية أطول عمومًا، وأكثر تشريعية، تتناول الأحوال الشخصية والقانون الجنائي والعلاقات بين الأديان والسياسة الشرعية. يلاحظ ابن كثير أن الفترة المكية كانت فترة تكوين روحي — المجتمع كان صغيرًا ومضطهدًا وبحاجة إلى تقوية عقدية. الفترة المدنية كانت فترة بناء اجتماعي — المجتمع أصبح لديه استقلال سياسي وبحاجة إلى توجيه مفصل للحياة الجماعية. يقدم السيوطي في «الإتقان» معايير منهجية للتمييز بين الاثنين: الإشارة إلى الجهاد والنفاق غالبًا ما تشير إلى أصل مدني، بينما الأقسام بالظواهر السماوية والتحديات بإعجاز القرآن تشير إلى وحي مكي. الأثر العملي هو أن فهم هذا التمييز يمنع خطأ قراءة الآيات التشريعية دون سياقها التاريخي، أو قراءة الآيات الروحية وكأنها قوانين شرعية.
    description_fr: |
      La science coranique classique divise les sourates en deux catégories : Makki (révélées avant l'Hégire) et Madani (révélées après). La distinction n'est pas seulement chronologique ; elle reflète un changement profond dans les circonstances et les besoins de la communauté musulmane. Les sourates Makki ont tendance à être plus courtes, avec une force rhétorique intense, se concentrant sur le tawhid, la prophétie, l'au-delà et l'exhortation morale. Les sourates Madani sont généralement plus longues, plus législatives, traitant du droit de la famille, du droit pénal, des relations interconfessionnelles et de l'art de gouverner. Ibn Kathīr note que la période Makki était celle de la formation spirituelle — la communauté était petite, persécutée et avait besoin d'un renforcement doctrinal. La période Madani était celle de la construction sociale — la communauté avait désormais une autonomie politique et avait besoin de conseils détaillés pour la vie collective. Al-Suyuti, dans son *al-Itqan*, fournit des critères méthodologiques pour distinguer les deux : les références au jihad et à l'hypocrisie indiquent généralement une origine Madani, tandis que les serments par les phénomènes célestes et les défis à l'inimitabilité du Coran pointent vers une révélation Makki. La pertinence pratique est que comprendre cette distinction évite l'erreur de lire des versets législatifs sans leur contexte historique, ou de lire des versets spirituels comme s'ils étaient des codes juridiques.
    reference: "Qur'an 20:1 (Surah Taha), 2:1 (Surah al-Baqarah); Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Suyuti, al-Itqan fi 'Ulum al-Qur'an"
    source_notes: |
      Ibn Kathīr and al-Suyūṭī (al-Itqān) provide criteria: Makki surahs focus on tawḥīd, prophecy, and the Hereafter, while Madani surahs address legislation, statecraft, and social organization.
    source_notes_fr: |
      Ibn Kathīr et al-Suyūṭī (al-Itqān) fournissent des critères : les sourates Makki se concentrent sur le tawḥīd, la prophétie et l'au-delà, tandis que les sourates Madani traitent de la législation, de l'art de gouverner et de l'organisation sociale.
    source_notes_ar: |
      يُقدِّمُ ابنُ كثيرٍ والسيوطي (الإتقان) معاييرَ: السورُ المكيةُ تركِّزُ على التوحيدِ والنبوةِ والآخرة، والسورُ المدنيةُ تتناولُ التشريعَ والسياسةَ والتنظيمَ الاجتماعي.
