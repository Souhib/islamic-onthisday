  - slug: quran-fact-abrogation
    category: quran_hadith_fact
    title_en: Abrogation in the Qur'an — What Is Naskh and Why Did It Happen?
    title_ar: النسخ في القرآن — ما هو النسخ ولماذا وقع؟
    title_fr: L'abrogation dans le Coran — Qu'est-ce que le Naskh et pourquoi s'est-il produit ?
    description_en: |
      The concept of naskh (abrogation) is one of the most intellectually demanding topics in Qur'anic studies. The Qur'an itself mentions it: "We do not abrogate a verse or cause it to be forgotten except that We bring forth one better than it or similar to it" (2:106). The scholarly question is why the All-Knowing would reveal a ruling only to replace it later. Ibn Kathīr explains that naskh was a mercy: Allah gradually lifted burdens from the early Muslim community rather than imposing the full law at once. Al-Suyuti, in *al-Itqan*, classifies naskh into categories — some verses were abrogated in ruling but remain recited (like the verse of stoning, whose ruling remains though its text was withdrawn), while others were abrogated in both text and ruling. Classical Sunni scholarship, following the methodology of the salaf, approaches naskh with extreme caution; Ibn Ḥajar warned that every claim of abrogation must be supported by unambiguous evidence from the Qur'an, the Sunnah, or consensus. The practical relevance is that understanding naskh prevents the dangerous error of applying an abrogated ruling, and it deepens appreciation for the wisdom of divine legislation that accounts for human capacity and historical circumstance.
    description_ar: |
      يُعدّ موضوع النسخ من أكثر الموضوعات تحديًا فكريًا في الدراسات القرآنية. يذكر القرآن النسخ بنفسه: «ما ننسخ من آيةٍ أو نُنسِها نأتِ بخيرٍ منها أو مثلها» (البقرة: 106). السؤال العلمي هو: لماذا يُنزّل العليم حكمًا ثم يستبدله لاحقًا؟ يشرح ابن كثير أن النسخ كان رحمة: أن الله رفع الأثقال تدريجيًا عن المجتمع المسلم المبكر بدلًا من فرض الشريعة كاملة دفعة واحدة. يصنف السيوطي في «الإتقان» النسخ إلى فئات — بعض الآيات نُسخت حكمًا وبقيت تُتلى (كآية الرجم التي بقي حكمها رغم سحب نصها)، وبعضها نُسخت نصًا وحكمًا معًا. تتعامل المدرسة السنية الكلاسيكية، على منهج السلف، مع النسخ بأقصى درجات الحذر؛ وحذَّر ابن حجر من أن كل دعوى نسخ يجب أن تُؤيَّد بدليل صريح من القرآن أو السنة أو الإجماع. الأثر العملي هو أن فهم النسخ يمنع الخطأ الخطير بتطبيق حكم منسوخ، ويعمق التقدير لحكمة التشريع الإلهي الذي يُحيط بقدرة الإنسان والظرف التاريخي.
    description_fr: |
      Le concept de naskh (abrogation) est l'un des sujets les plus intellectuellement exigeants des études coraniques. Le Coran lui-même en fait mention : « Nous n'abrogeons aucun verset, ni Nous ne le faisons oublier, sans en apporter un meilleur ou un semblable » (2:106). La question savante est de savoir pourquoi l'Omniscient révélerait une règle pour la remplacer plus tard. Ibn Kathīr explique que le naskh était une miséricorde : Allah a levé progressivement les fardeaux de la jeune communauté musulmane plutôt que d'imposer la loi complète d'un seul coup. Al-Suyuti, dans son *al-Itqan*, classe le naskh en catégories — certains versets ont été abrogés dans leur règle mais restent récités (comme le verset de la lapidation, dont la règle demeure bien que son texte ait été retiré), tandis que d'autres ont été abrogés à la fois dans leur texte et leur règle. La tradition savante sunnite classique, suivant la méthodologie des salaf, aborde le naskh avec une extrême prudence ; Ibn Ḥajar a averti que toute prétention d'abrogation doit être soutenue par une preuve non ambiguë du Coran, de la Sunna ou du consensus. La pertinence pratique est que comprendre le naskh évite l'erreur dangereuse d'appliquer une règle abrogée, et approfondit l'appréciation de la sagesse de la législation divine qui tient compte de la capacité humaine et des circonstances historiques.
    reference: "Qur'an 2:106 (Surah al-Baqarah), 16:101 (Surah al-Nahl); Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Suyuti, al-Itqan fi 'Ulum al-Qur'an"
    source_notes: |
      Qur'an 2:106 sanctions naskh; Ibn Kathīr explains it as a mercy lifting burdens gradually, and Ibn Ḥajar warns that every claim of abrogation requires unambiguous evidence from Qur'an, Sunnah, or consensus.
    source_notes_fr: |
      Le Coran 2:106 sanctionne le naskh ; Ibn Kathīr l'explique comme une miséricorde levant les fardeaux graduellement, et Ibn Ḥajar avertit que toute prétention d'abrogation exige une preuve non ambiguë du Coran, de la Sunna ou du consensus.
    source_notes_ar: |
      يُجيزُ القرآن (٢:١٠٦) النسخَ؛ ويُفسِّرُ ابنُ كثيرٌ أنَّه رحمةٌ ترفعُ الأثقالَ تدريجيًّا، ويُحذِّرُ ابنُ حجرٍ من أنَّ كلَّ دعوى نسخٍ تستلزمُ دليلًا صريحًا من القرآنِ أو السنةِ أو الإجماع.
