  - slug: quran-fact-asbab-al-nuzul
    category: quran_hadith_fact
    title_en: Asbab al-Nuzul — Why Context Matters in Tafsir
    title_ar: أسباب النزول — لماذا السياق مهم في التفسير؟
    title_fr: Les Asbab al-Nuzul — Pourquoi le contexte est-il important dans le tafsir ?
    description_en: |
      The science of asbab al-nuzul (occasions of revelation) addresses a critical hermeneutical question: does knowing the historical context of a verse change its meaning? Wahidi's *Asbab al-Nuzul*, the earliest extant work on the subject, collects the reports about when, where, and why specific verses were revealed. Ibn Kathīr, in his tafsir, consistently cites these occasions to clarify the intent of the text. The classical Sunni position, articulated by al-Suyuti in *Lubab al-Nuqul*, holds that asbab al-nuzul serve several functions: they specify the general, restrict the absolute, explain the cause of legislation, and provide historical illustrations of universal principles. However, scholars caution that the occasion of revelation does not limit the verse to its original context; rather, it illuminates the wisdom behind the ruling while allowing the verse to retain its general applicability. Al-Qurṭubī emphasizes that ignoring asbab al-nuzul leads to the grave error of applying verses revealed about specific situations to unrelated contexts — a mistake that has historically fueled sectarianism and extremism. The practical relevance is that every Muslim who seeks to understand the Qur'an must approach it with historical awareness, not as a decontextualized rulebook but as a revealed response to real human situations.
    description_ar: |
      تتناول علم أسباب النزول مسألة تفسيرية حرجة: هل معرفة السياق التاريخي للآية يُغير معناها؟ يجمع كتاب الواحدي «أسباب النزول»، أقدم مصنف باقٍ في الموضوع، الأخبار عن متى وأين ولماذا نُزلت آيات محددة. يستشهد ابن كثير في تفسيره باستمرار بهذه المناسبات لتوضيح مقصد النص. يحمل الموقف السني الكلاسيكي، كما صاغه السيوطي في «لباب النقول»، أن أسباب النزول تخدم عدة وظائف: تخصيص العام وتقييد المطلق وتعليل الحكم وتقديم أمثلة تاريخية للمبادئ الكونية. لكن يحذّر العلماء من أن مناسبة النزول لا تحصر الآية في سياقها الأصلي؛ بل تُضيء الحكمة وراء الحكم مع السماح للآية بالاحتفاظ بعموم تطبيقها. يؤكد القرطبي أن إهمال أسباب النزول يؤدي إلى خطأ جسيم بتطبيق آيات نزلت في مواقف محددة على سياقات غير ذات صلة — خطأ أذكى تاريخيًا الطائفية والتطرف. الأثر العملي هو أن كل مسلم يسعى لفهم القرآن يجب أن يقترب منه بوعي تاريخي، لا ككتاب قواعد مجردة من السياق بل كاستجابة منزلة لمواقف بشرية حقيقية.
    description_fr: |
      La science des asbab al-nuzul (occasions de la révélation) aborde une question herméneutique cruciale : connaître le contexte historique d'un verset en change-t-il le sens ? L'ouvrage *Asbab al-Nuzul* de Wahidi, le plus ancien ouvrage existant sur le sujet, rassemble les récits sur le quand, le où et le pourquoi de la révélation de versets spécifiques. Ibn Kathīr, dans son tafsir, cite constamment ces occasions pour clarifier l'intention du texte. La position savante sunnite classique, articulée par al-Suyuti dans *Lubab al-Nuqul*, soutient que les asbab al-nuzul servent plusieurs fonctions : ils spécifient le général, restreignent l'absolu, expliquent la cause de la législation et fournissent des illustrations historiques de principes universels. Cependant, les savants mettent en garde contre l'idée que l'occasion de la révélation limite le verset à son contexte original ; plutôt, elle illumine la sagesse derrière la règle tout en permettant au verset de conserver sa portée générale. Al-Qurṭubī souligne qu'ignorer les asbab al-nuzul conduit à la grave erreur d'appliquer des versets révélés à des situations spécifiques à des contextes non connexes — une erreur qui a historiquement alimenté le sectarisme et l'extrémisme. La pertinence pratique est que tout musulman qui cherche à comprendre le Coran doit l'aborder avec une conscience historique, non pas comme un recueil de règles décontextualisées, mais comme une réponse révélée à des situations humaines réelles.
    reference: "Wahidi, Asbab al-Nuzul; Ibn Kathir, Tafsir al-Qur'an al-Azim; al-Suyuti, Lubab al-Nuqul fi Asbab al-Nuzul"
    source_notes: |
      Wahidi's Asbāb al-Nuzūl is the earliest extant work; al-Suyūṭī (Lubāb al-Nuqūl) holds that occasions specify the general and explain legislation without restricting universal application.
    source_notes_fr: |
      L'Asbāb al-Nuzūl de Wahidi est l'ouvrage le plus ancien encore existant ; al-Suyūṭī (Lubāb al-Nuqūl) soutient que les occasions spécifient le général et expliquent la législation sans restreindre l'application universelle.
    source_notes_ar: |
      يُعَدُّ كتابُ الواحدي «أسباب النزول» أقدمَ مصنفٍ باقٍ في الموضوع؛ ويُبيِّنُ السيوطي (لباب النقول) أنَّ أسبابَ النزولِ تُخصِّصُ العامَّ وتُعلِّلُ الحكمَ من دونِ تقييدِ التطبيقِ العامِّ.
