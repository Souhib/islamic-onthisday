# Sunnah practices of the Prophet ﷺ — prayer, worship, and communal rituals.
# Grounded in sahih hadith from Bukhari, Muslim, and verified collections.

lessons:
  - slug: sunnah-tahajjud-prayer
    category: sunnah_practice
    title_en: The Sunnah of Tahajjud — The Night Prayer
    title_ar: سُنَّةُ التَّهَجُّدِ — صَلَاةُ اللَّيْلِ
    title_fr: La Sunnah du Tahajjud — La Prière Nocturne
    description_en: |
      Tahajjud is the voluntary night prayer performed after sleeping and before the Fajr dawn. Allah commanded His Messenger ﷺ in Surah al-Isra: "Rise at night for prayer — an extra for you; perhaps your Lord will raise you to a praised station" (17:79). The Prophet ﷺ would sleep half the night, then rise in the last third to perform wudu' and pray between two and twelve rak'ahs with prolonged bowing and prostration. Aisha ra described him standing so long that his feet would swell, yet he would say: "Shall I not be a grateful servant?" The Tahajjud was obligatory upon him personally; for the Umma it is the most virtuous voluntary prayer and the means by which a servant draws nearest to Allah. The Prophet ﷺ taught: "Our Lord descends every night to the lowest heaven when the last third of the night remains, saying: Who will call upon Me that I may answer him? Who will ask of Me that I may give him?" Classical scholars have emphasized that Tahajjud polishes the heart, sharpens sincerity, and establishes a private communion unavailable in the day's distractions.
    description_ar: |
      التَّهَجُّدُ هُوَ الصَّلَاةُ التَّطَوُّعِيَّةُ الَّتِي تُؤَدَّى بَعْدَ النَّوْمِ وَقَبْلَ الفَجْرِ. أَمَرَ اللهُ رَسُولَهُ ﷺ فِي سُورَةِ الإِسْرَاءِ: ﴿وَمِنَ اللَّيْلِ فَتَهَجَّدْ بِهِ نَافِلَةً لَّكَ﴾ [الإسراء: ٧٩]. كَانَ النَّبِيُّ ﷺ يَنَامُ نِصْفَ اللَّيْلِ، ثُمَّ يَقُومُ فِي الثُّلُثِ الأَخِيرِ لِيَتَوَضَّأَ وَيُصَلِّيَ مِنْ رَكْعَتَيْنِ إِلَى اثْنَتَيْ عَشْرَةَ بِطُولِ الرُّكُوعِ وَالسُّجُودِ. وَصَفَتْهُ عَائِشَةُ رضي الله عنها أَنَّهُ كَانَ يَقُومُ حَتَّى تَتَوَرَّمَ قَدَمَاهُ، وَيَقُولُ: "أَفَلَا أَكُونُ عَبْدًا شَكُورًا". كَانَ فَرْضًا عَلَيْهِ شَخْصِيًّا، وَهُوَ أَفْضَلُ الصَّلَوَاتِ التَّطَوُّعِيَّةِ لِلأُمَّةِ، وَهُوَ السَّبِيلُ الَّذِي يَتَقَرَّبُ بِهِ العَبْدُ إِلَى اللهِ. عَنْهُ ﷺ: "يَنْزِلُ رَبُّنَا تَبَارَكَ وَتَعَالَى كُلَّ لَيْلَةٍ إِلَى السَّمَاءِ الدُّنْيَا حِينَ يَبْقَى ثُلُثُ اللَّيْلِ الآخِرُ، يَقُولُ: مَنْ يَدْعُونِي فَأَسْتَجِيبَ لَهُ؟ مَنْ يَسْأَلْنِي فَأُعْطِيَهُ؟". أَكَّدَ العُلَمَاءُ أَنَّ التَّهَجُّدَ يُجَلِّي القَلْبَ وَيُحَدِّدُ الإِخْلَاصَ وَيُؤَسِّسُ لِقُرْبٍ خَاصٍّ لا يُتَاحُ فِي زَحَامِ النَّهَارِ.
    description_fr: |
      Le Tahajjud est la prière surérogatoire de la nuit, accomplie après le sommeil et avant l'aube. Allah a commandé à Son Messager ﷺ dans la sourate al-Isrā : « Lève-toi la nuit pour prier, c'est une œuvre surérogatoire pour toi ; peut-être que ton Seigneur t'élèvera à une station louée » (17:79). Le Prophète Muhammad ﷺ dormait la moitié de la nuit, puis se levait pendant le dernier tiers pour faire ses ablutions et prier de deux à douze unités de prière, avec de longs inclinaisons et prosternements. ʿĀʾisha ra le décrivait debout si longtemps que ses pieds enflaient, et il disait : « Ne devrais-je pas être un serviteur reconnaissant ? » Le Tahajjud lui était obligatoire personnellement ; pour la communauté, c'est la prière surérogatoire la plus méritoire, le moyen par lequel le serviteur se rapproche le plus d'Allah. Le Prophète ﷺ a enseigné : « Notre Seigneur descend chaque nuit vers le ciel le plus proche, quand il reste le dernier tiers de la nuit, et dit : Qui invoquera-Moi pour que Je lui réponde ? Qui Me demandera pour que Je lui donne ? » Les savants classiques ont souligné que le Tahajjud polit le cœur, aiguise la sincérité, et établit une communion intime que les distractions du jour ne permettent pas.
    reference: Sahih al-Bukhari 1142, Sahih Muslim 758
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 255) records the virtues of Tahajjud and the Lord's descent to the lowest heaven. Ibn al-Qayyim (Zad al-Ma'ad, 1:305) explains that Tahajjud polishes the heart and establishes private communion with Allah. The four madhhabs agree on its excellence as the most virtuous voluntary prayer.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 255) rapporte les mérites du Tahajjud et la descente du Seigneur vers le ciel le plus proche. Ibn al-Qayyim (Zād al-Maʿād, 1:305) explique que le Tahajjud polit le cœur et établit une communion intime avec Allah. Les quatre madhhabs s'accordent sur son excellence comme prière surérogatoire la plus méritoire.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٥٥) فَضَائِلَ التَّهَجُّدِ وَنُزُولَ الرَّبِّ إِلَى السَّمَاءِ الدُّنْيَا. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٠٥) أَنَّ التَّهَجُّدَ يُجَلِّي الْقَلْبَ وَيُؤَسِّسُ لِقُرْبٍ خَاصٍّ مَعَ اللهِ. تَتَفَقُ الْمَذَاهِبُ الْأَرْبَعَةُ عَلَى أَنَّهُ أَفْضَلُ الصَّلَوَاتِ التَّطَوُّعِيَّةِ.
    display_day_of_year: 183
    hadith_refs: "Bukhari 1142, Muslim 758"

  - slug: sunnah-witr-prayer-detailed
    category: sunnah_practice
    title_en: The Sunnah of Witr Prayer — The Odd Prayer Before Dawn
    title_ar: سُنَّةُ صَلَاةِ الوِتْرِ — الصَّلَاةُ الوِتْرِيَّةُ قَبْلَ الفَجْرِ
    title_fr: La Sunnah de la Prière du Witr — La Prière Impaire avant l'Aube
    description_en: |
      Witr is the odd-numbered prayer that completes the night worship. The Prophet ﷺ said: "Allah is One and loves the odd, so pray Witr, O people of the Qur'an." He prayed it in one, three, five, seven, nine, or eleven rak'ahs, most commonly three. He would recite Surah al-A'la in the first rak'ah, Surah al-Kafirun in the second, and Surah al-Ikhlas in the third, sometimes adding the Qunut supplication in the final rak'ah before or after the ruku'. The Prophet ﷺ instructed: "Make the last prayer you pray at night the Witr." For those who feared they would not wake in the night, he recommended praying it before sleep. The majority of scholars classify Witr as a confirmed Sunnah, while the Hanafi school holds it to be wajib. Its performance marks the believer's completion of the day's devotional cycle and demonstrates love for what Allah loves — the odd.
    description_ar: |
      الوِتْرُ هُوَ الصَّلَاةُ الوِتْرِيَّةُ الَّتِي تُخْتَمُ بِهَا قِيَامُ اللَّيْلِ. قَالَ النَّبِيُّ ﷺ: "إِنَّ اللهَ وِتْرٌ يُحِبُّ الوِتْرَ، فَأَوْتِرُوا يَا أَهْلَ القُرْآنِ". كَانَ يُصَلِّيهَا رَكْعَةً أَوْ ثَلَاثًا أَوْ خَمْسًا أَوْ سَبْعًا أَوْ تِسْعًا أَوْ اثْنَتَيْ عَشْرَةَ، وَأَكْثَرُ مَا كَانَ يَفْعَلُ ثَلَاثًا. كَانَ يَقْرَأُ فِي الرَّكْعَةِ الأُولَى بِسُورَةِ الأَعْلَى، وَفِي الثَّانِيَةِ بِالكَافِرُونَ، وَفِي الثَّالِثَةِ بِالإِخْلَاصِ، وَرُبَّمَا أَضَافَ القُنُوتَ فِي الرَّكْعَةِ الأَخِيرَةِ. قَالَ ﷺ: "اجْعَلُوا آخِرَ صَلَاتِكُمْ بِاللَّيْلِ وِتْرًا". وَمَنْ خَافَ أَنْ لا يَسْتَيْقِظَ فِي آخِرِ اللَّيْلِ، أَمَرَهُ أَنْ يُوتِرَ قَبْلَ نَوْمِهِ. ذَهَبَ جُمْهُورُ العُلَمَاءِ إِلَى أَنَّهُ سُنَّةٌ مُؤَكَّدَةٌ، وَذَهَبَ الحَنَفِيَّةُ إِلَى أَنَّهُ وَاجِبٌ. أَدَاءُ الوِتْرِ يُعَلِّمُ المُؤْمِنَ إِتْمَامَ حَلْقَةِ العِبَادَةِ اليَوْمِيَّةِ وَيُظْهِرُ حُبَّ مَا يُحِبُّهُ اللهُ — الوِتْرُ.
    description_fr: |
      Le Witr est la prière impaire qui couronne l'office nocturne. Le Prophète Muhammad ﷺ a dit : « Allah est Unique et Il aime l'impair, alors priez le Witr, ô gens du Coran. » Il le priait en une, trois, cinq, sept, neuf ou onze unités, le plus souvent trois. Il récitait la sourate al-Aʿlā dans la première unité, al-Kāfirūn dans la seconde, et al-Ikhlāṣ dans la troisième, ajoutant parfois la supplication du Qunūt dans la dernière unité avant ou après l'inclinaison. Le Prophète ﷺ a enseigné : « Faites du Witr la dernière prière que vous priez la nuit. » Pour ceux qui craignaient de ne pas se réveiller, il recommandait de le prier avant de dormir. La majorité des savants classent le Witr comme sunnah muʾakkada, tandis que l'école ḥanafite le tient pour wājib. Son accomplissement marque pour le croyant l'achèvement du cycle dévotionnel quotidien et manifeste l'amour de ce qu'Allah aime — l'impair.
    reference: Sahih al-Bukhari 990, Sahih Muslim 752
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 259) records the Witr prayer as sunnah mu'akkada. Ibn al-Qayyim (Zad al-Ma'ad, 1:315) explains that the Qunut in Witr is recommended and the three-rak'ah format is most common. The majority classify Witr as sunnah mu'akkada, while the Hanafis hold it wajib.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 259) rapporte la prière du Witr comme sunnah muʾakkada. Ibn al-Qayyim (Zād al-Maʿād, 1:315) explique que le Qunūt dans le Witr est recommandé et que la formule de trois rakʿahs est la plus courante. La majorité classe le Witr comme sunnah muʾakkada, tandis que les ḥanafites le tiennent pour wājib.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٥٩) صَلَاةَ الْوِتْرِ سُنَّةً مُؤَكَّدَةً. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣١٥) أَنَّ الْقُنُوتَ فِي الْوِتْرِ مُسْتَحَبٌّ وَأَنَّ صِيغَةَ الثَّلَاثِ رَكَعَاتٍ هِيَ الْأَشْهَرُ. يَذْهَبُ الْجُمْهُورُ إِلَى أَنَّهُ سُنَّةٌ مُؤَكَّدَةٌ، وَيَذْهَبُ الْحَنَفِيَّةُ إِلَى وُجُوبِهِ.
    display_day_of_year: 184
    hadith_refs: "Bukhari 990, Muslim 752"

  - slug: sunnah-duha-prayer-detailed
    category: sunnah_practice
    title_en: The Sunnah of Duha (Forenoon) Prayer — Two Rak'ahs After Sunrise
    title_ar: سُنَّةُ صَلَاةِ الضُّحَى — رَكْعَتَانِ بَعْدَ الشُّرُوقِ
    title_fr: La Sunnah de la Prière du Dhuhā — Deux Unités après le Lever du Soleil
    description_en: |
      Salat al-Duha is the voluntary forenoon prayer performed after the sun has fully risen and before it reaches its zenith. The Prophet ﷺ said: "In each morning, charity is due upon every joint of a person's body, and the two rak'ahs of Duha are equivalent to all that charity." He routinely prayed between two and eight rak'ahs, sometimes referring to it as "Salat al-Awwabin" — the prayer of the penitent — and specifying its time as when the young camel's hooves are scorched by the heat of the sand. Abu Hurayra ra reported that his close companion ﷺ advised him with three things: fasting three days each month, praying two rak'ahs of Duha, and praying Witr before sleeping. The prayer serves as a spiritual mid-morning renewal, a moment to pause from worldly affairs and turn back to Allah with repentance and gratitude. Classical scholars noted that Duha is particularly meritorious for those who missed Tahajjud, offering them a second chance at the blessings of the forenoon.
    description_ar: |
      صَلَاةُ الضُّحَى هِيَ الصَّلَاةُ التَّطَوُّعِيَّةُ الَّتِي تُؤَدَّى بَعْدَ اِرْتِفَاعِ الشَّمْسِ وَقَبْلَ زَوَالِهَا. قَالَ النَّبِيُّ ﷺ: "فِي كُلِّ صُبْحٍ صَدَقَةٌ عَلَى كُلِّ مَفْصِلٍ مِنْ مَفَاصِلِ ابْنِ آدَمَ، وَتَكْفِيهِ رَكْعَتَانِ مِنَ الضُّحَى". كَانَ ﷺ يُصَلِّيهَا مِنْ رَكْعَتَيْنِ إِلَى ثَمَانٍ، وَسَمَّاهَا أَحْيَانًا "صَلَاةَ الأَوَّابِينَ"، وَحَدَّدَ وَقْتَهَا بِأَنَّهُ حِينَ تَحْمَى فِرَاشُ الأَجْرَبِ. أَخْبَرَ أَبُو هُرَيْرَةَ رضي الله عنه أَنَّ صَاحِبَهُ ﷺ أَوْصَاهُ بِثَلَاثٍ: صِيَامِ ثَلَاثَةِ أَيَّامٍ مِنْ كُلِّ شَهْرٍ، وَرَكْعَتَيِ الضُّحَى، وَالوِتْرِ قَبْلَ النَّوْمِ. تَعْمَلُ هَذِهِ الصَّلَاةُ تَجْدِيدًا رُوحِيًّا فِي نِصْفِ النَّهَارِ، وَفُرْصَةً لِلتَّوَقُّفِ عَنِ الشُّغُونِ الدُّنْيَوِيَّةِ وَالرُّجُوعِ إِلَى اللهِ بِالتَّوْبَةِ وَالشُّكْرِ. لَاحَظَ العُلَمَاءُ أَنَّ الضُّحَى فِي غَايَةِ الفَضْلِ لِمَنْ فَاتَهُ التَّهَجُّدُ، فَتُعَوِّضُهُ عَنْ بَرَكَاتِ اللَّيْلِ.
    description_fr: |
      La ṣalāt al-Ḍuḥā est la prière surérogatoire de la matinée, accomplie après que le soleil s'est pleinement levé et avant qu'il n'atteigne son zénith. Le Prophète Muhammad ﷺ a dit : « Chaque matin, une aumône est due sur chaque articulation du corps du fils d'Adam, et les deux unités de la Ḍuḥā lui suffisent comme aumône pour tout cela. » Il la priait régulièrement, de deux à huit unités, l'appelant parfois « ṣalāt al-Awwābīn » — la prière des repentants — et en précisant l'heure comme étant celle où les sabots du jeune chameau sont brûlés par la chaleur du sable. Abū Hurayra ra rapporta que son compagnon ﷺ lui conseilla trois choses : jeûner trois jours par mois, prier deux unités de Ḍuḥā, et prier le Witr avant de dormir. Cette prière constitue un renouveau spirituel en milieu de matinée, un moment de pause dans les affaires mondaines pour revenir à Allah avec repentance et gratitude. Les savants classiques ont noté que la Ḍuḥā est particulièrement méritoire pour ceux qui ont manqué le Tahajjud, leur offrant une seconde chance aux bénédictions de la matinée.
    reference: Sahih Muslim 719, Jami' at-Tirmidhi 476
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 258) records the narration that two rak'ahs of Duha suffice as charity for every joint. Ibn al-Qayyim (Zad al-Ma'ad, 1:310) notes that Salat al-Awwabin is another name for Duha, prayed when the sun is high. The four madhhabs agree on its recommendation.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 258) rapporte la narration selon laquelle deux rakʿahs de Ḍuḥā suffisent comme aumône pour chaque articulation. Ibn al-Qayyim (Zād al-Maʿād, 1:310) note que Ṣalāt al-Awwābīn est un autre nom de la Ḍuḥā, priée quand le soleil est haut. Les quatre madhhabs s'accordent sur sa recommandation.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٥٨) رِوَايَةَ أَنَّ رَكْعَتَيِ الضُّحَى تَكْفِي صَدَقَةً عَنْ كُلِّ مَفْصِلٍ. وَيُلَاحِظُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣١٠) أَنَّ صَلَاةَ الْأَوَّابِينَ اسْمٌ آخَرُ لِلضُّحَى. تَتَفَقُ الْمَذَاهِبُ الْأَرْبَعَةُ عَلَى اسْتِحْبَابِهَا.
    display_day_of_year: 185
    hadith_refs: "Muslim 719, Tirmidhi 476"

  - slug: sunnah-qunut-in-witr
    category: sunnah_practice
    title_en: The Qunut in Witr — Supplication in the Last Rak'ah
    title_ar: القُنُوتُ فِي الوِتْرِ — الدُّعَاءُ فِي الرَّكْعَةِ الأَخِيرَةِ
    title_fr: Le Qunūt dans le Witr — Supplication dans la Dernière Unité
    description_en: |
      The Qunut is a supplication recited during the standing position of prayer, and in the Witr it is traditionally performed in the final rak'ah. The Prophet ﷺ would sometimes supplicate aloud in the Witr before the ruku' and sometimes after it, demonstrating flexibility in timing. The classical Qunut du'a begins: "Allahumma ihdini fiman hadayta, wa 'afini fiman 'afayta, wa tawallani fiman tawallayta, wa barik li fima a'tayta, wa qini sharra ma qadayta" (O Allah, guide me among those You have guided, heal me among those You have healed, watch over me among those You have watched over, bless me in what You have given me, and protect me from the evil of what You have decreed). Classical scholars of the four schools have differed on whether the Qunut in Witr is performed before or after the ruku', with both positions well-attested from the Prophet's ﷺ practice. The supplication transforms the final moments of night prayer into an intimate conversation with Allah, seeking His comprehensive care in guidance, well-being, protection, and destiny.
    description_ar: |
      القُنُوتُ هُوَ الدُّعَاءُ الَّذِي يُقْرَأُ فِي القِيَامِ، وَفِي الوِتْرِ يُسْتَحَبُّ فِي الرَّكْعَةِ الأَخِيرَةِ. كَانَ النَّبِيُّ ﷺ يَدْعُو أَحْيَانًا جَهْرًا قَبْلَ الرُّكُوعِ وَأَحْيَانًا بَعْدَهُ، مُظْهِرًا سُنَّةَ التَّيَسُّرِ فِي الوَقْتِ. يَبْدَأُ الدُّعَاءُ المَشْهُورُ: "اللَّهُمَّ اهْدِنِي فِيمَنْ هَدَيْتَ، وَعَافِنِي فِيمَنْ عَافَيْتَ، وَتَوَلَّنِي فِيمَنْ تَوَلَّيْتَ، وَبَارِكْ لِي فِيمَا أَعْطَيْتَ، وَقِنِي شَرَّ مَا قَضَيْتَ". اخْتَلَفَ فُقَهَاءُ المَذَاهِبِ الأَرْبَعَةِ فِي أَنَّ القُنُوتَ قَبْلَ الرُّكُوعِ أَوْ بَعْدَهُ، وَكِلَا الوَجْهَيْنِ ثَابِتٌ عَنْ فِعْلِ النَّبِيِّ ﷺ. يُحَوِّلُ هَذَا الدُّعَاءُ لَحَظَاتِ نِهَايَةِ صَلَاةِ اللَّيْلِ إِلَى حِوَارٍ خَاصٍّ مَعَ اللهِ، يَطْلُبُ فِيهِ العَبْدُ عِنَايَتَهُ الشَّامِلَةَ فِي الهِدَايَةِ وَالعَافِيَةِ وَالحِمَايَةِ وَالقَدَرِ.
    description_fr: |
      Le Qunūt est une supplication récitée debout pendant la prière, et dans le Witr elle se pratique traditionnellement dans la dernière unité. Le Prophète Muhammad ﷺ suppliait parfois à haute voix dans le Witr avant l'inclinaison, et parfois après elle, démontrant une souplesse quant au moment. La supplication classique du Qunūt commence par : « Ô Allah, guide-moi parmi ceux que Tu as guidés, accorde-moi la santé parmi ceux que Tu as guéris, prends soin de moi parmi ceux dont Tu as pris soin, bénis-moi dans ce que Tu m'as donné, et préserve-moi du mal de ce que Tu as décrété. » Les savants des quatre écoles juridiques ont divergé sur la question de savoir si le Qunūt du Witr se fait avant ou après l'inclinaison, les deux positions étant bien attestées dans la pratique du Prophète ﷺ. La supplication transforme les derniers instants de la prière nocturne en une conversation intime avec Allah, où le serviteur sollicite Sa sollicitude globale en matière de guidance, de bien-être, de protection et de destin.
    reference: Sahih al-Bukhari 1001, Sahih Muslim 806
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 260) records the Qunut du'a in Witr as a confirmed sunnah. Ibn al-Qayyim (Zad al-Ma'ad, 1:316) explains that the Prophet ﷺ practiced Qunut both before and after ruku', demonstrating flexibility. The Shafi'i school holds Qunut before ruku', while the Hanafis prefer after; both are well-attested.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 260) rapporte le duʿā du Qunūt dans le Witr comme sunnah confirmée. Ibn al-Qayyim (Zād al-Maʿād, 1:316) explique que le Prophète ﷺ pratiqua le Qunūt avant et après le rukūʿ, démontrant la souplesse. L'école shāfiʿite place le Qunūt avant le rukūʿ, tandis que les ḥanafites préfèrent après ; les deux positions sont bien attestées.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٠) دُعَاءَ الْقُنُوتِ فِي الْوِتْرِ سُنَّةً مُؤَكَّدَةً. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣١٦) أَنَّ النَّبِيَّ ﷺ جَاوَزَ بَيْنَ الْقُنُوتِ قَبْلَ الرُّكُوعِ وَبَعْدَهُ. تَجْعَلُ الشَّافِعِيَّةُ الْقُنُوتَ قَبْلَ الرُّكُوعِ، وَالْحَنَفِيَّةُ بَعْدَهُ؛ وَكِلَاهُمَا ثَابِتٌ.
    display_day_of_year: 188
    hadith_refs: "Bukhari 1001, Muslim 806"

  - slug: sunnah-sujud-sahw
    category: sunnah_practice
    title_en: Sujud al-Sahw (Prostration of Forgetfulness) — Correcting Prayer Errors
    title_ar: سُجُودُ السَّهْوِ — تَصْحِيحُ أَخْطَاءِ الصَّلَاةِ
    title_fr: Le Sujūd al-Sahw (Prosternation de l'Oubli) — Corriger les Erreurs de Prière
    description_en: |
      Sujud al-Sahw consists of two extra prostrations performed to compensate for mistakes or omissions during prayer. The Prophet ﷺ demonstrated it when he added to or subtracted from the prayer — such as praying two instead of four rak'ahs, or forgetting the tashahhud. In one well-known instance, he led the prayer sitting due to illness and the congregation also sat; upon completing the prayer, he prostrated twice for forgetfulness and explained: "I am only a human being like you; I forget as you forget." The two prostrations are performed after the final tashahhud and before the taslim, though some scenarios require them before the taslim or after it based on the type of error. Classical jurists codified the conditions into three categories: doubt over the number of rak'ahs, additions to the prayer, and omissions. The practice embodies Islamic law's mercy: the worshipper is not punished for honest mistakes but is given a precise, simple mechanism to repair them.
    description_ar: |
      سُجُودُ السَّهْوِ هُوَ سُجُودَانِ إِضَافِيَّانِ يُؤَدَّيَانِ تَعْوِيضًا عَنِ الزِّيَادَةِ أَوِ النَّقْصِ فِي الصَّلَاةِ. أَظْهَرَهُ النَّبِيُّ ﷺ حِينَ زَادَ فِي الصَّلَاةِ أَوْ نَقَصَ مِنْهَا، كَالصَّلَاةِ بِرَكْعَتَيْنِ عِوَضًا عَنْ أَرْبَعٍ، أَوْ نِسْيَانِ التَّشَهُّدِ. فِي وَاقِعَةٍ مَشْهُورَةٍ، صَلَّى ﷺ جَالِسًا لِمَرَضٍ فَجَلَسَ المَأْمُومُونَ، ثُمَّ سَجَدَ سَجْدَتَيْ سَهْوٍ وَقَالَ: "إِنَّمَا أَنَا بَشَرٌ مِثْلُكُمْ، أَنْسَى كَمَا تَنْسَوْنَ". تُؤَدَّى السَّجْدَتَانِ بَعْدَ التَّشَهُّدِ الأَخِيرِ وَقَبْلَ التَّسْلِيمِ، وَقِيلَ فِي بَعْضِ الحَالَاتِ قَبْلَهُ أَوْ بَعْدَهُ حَسَبَ نَوْعِ الخَطَأِ. صَنَّفَ الفُقَهَاءُ الأَحْوَالَ إِلَى ثَلَاثَةِ أَنْوَاعٍ: الشَّكُّ فِي عَدَدِ الرَّكَعَاتِ، وَالزِّيَادَةُ عَلَى الصَّلَاةِ، وَالنَّقْصُ. يُجَسِّدُ هَذَا الفِعْلُ رَحْمَةَ الشَّرِيعَةِ: فَالمُصَلِّي لا يُعَاقَبُ عَلَى زَلَّةِ نِسْيَانٍ، بَلْ يُوَفَّرُ لَهُ أَسْلُوبٌ بَسِيطٌ دَقِيقٌ لإِصْلَاحِهَا.
    description_fr: |
      Le Sujūd al-Sahw consiste en deux prosternations supplémentaires accomplies pour compenser les erreurs ou omissions pendant la prière. Le Prophète Muhammad ﷺ l'a démontré lorsqu'il ajoutait ou retranchait dans la prière — par exemple en priant deux unités au lieu de quatre, ou en oubliant le Tashahhud. Dans un épisode bien connu, il dirigea la prière assis à cause d'une maladie et la congrégation s'assit également ; achevée la prière, il prosterna deux prosternations d'oubli et expliqua : « Je ne suis qu'un être humain comme vous ; j'oublie comme vous oubliez. » Les deux prosternations se font après le Tashahhud final et avant le Taslīm, bien que certains cas les requièrent avant ou après selon le type d'erreur. Les juristes classiques ont codifié les conditions en trois catégories : le doute sur le nombre d'unités, les additions à la prière, et les omissions. Cette pratique incarne la miséricorde du droit islamique : le fidèle n'est pas puni pour des erreurs honnêtes, mais se voit offrir un mécanisme précis et simple pour les réparer.
    reference: Sahih al-Bukhari 1224, Sahih Muslim 572
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 261) records Sujud al-Sahw as the remedy for errors in prayer. Ibn al-Qayyim (Zad al-Ma'ad, 1:320) explains that this practice embodies divine mercy, repairing honest mistakes without invalidating the prayer. The four madhhabs agree on the obligation of Sujud al-Sahw when required, though they differ slightly on the exact scenarios.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 261) rapporte le Sujūd al-Sahw comme remède aux erreurs de prière. Ibn al-Qayyim (Zād al-Maʿād, 1:320) explique que cette pratique incarne la miséricorde divine, réparant les erreurs honnêtes sans invalider la prière. Les quatre madhhabs s'accordent sur l'obligation du Sujūd al-Sahw lorsqu'il est requis, bien qu'ils diffèrent légèrement sur les scénarios exacts.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦١) سُجُودَ السَّهْوِ دَوَاءً لِأَخْطَاءِ الصَّلَاةِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٢٠) أَنَّ هَذَا الْفِعْلَ يُجَسِّدُ رَحْمَةَ الشَّرِيعَةِ. تَتَفَقُ الْمَذَاهِبُ الْأَرْبَعَةُ عَلَى وُجُوبِ سُجُودِ السَّهْوِ عِنْدَ الْحَاجَةِ.
    display_day_of_year: 189
    hadith_refs: "Bukhari 1224, Muslim 572"

  - slug: sunnah-tashahhud
    category: sunnah_practice
    title_en: The Tashahhud in Prayer — The Testimony of the Sitting
    title_ar: التَّشَهُّدُ فِي الصَّلَاةِ — شَهَادَةُ الجُلُوسِ
    title_fr: Le Tashahhud dans la Prière — Le Témoignage de l'Assise
    description_en: |
      The Tashahhud is the testimony recited while sitting in prayer, forming the spiritual axis around which the rak'ahs turn. The Prophet ﷺ taught it to a blind Companion who asked to be shown how to pray: "Say: At-tahiyyatu lillahi wa's-salawatu wa't-tayyibat. As-salamu 'alayka ayyuha'n-nabiyyu wa rahmatu'llahi wa barakatuh. As-salamu 'alayna wa 'ala 'ibadi'llahi's-salihin. Ash-hadu an la ilaha illa'llah, wa ash-hadu anna Muhammadan 'abduhu wa rasuluhu" (All greetings, prayers, and good things are for Allah. Peace be upon you, O Prophet, and the mercy of Allah and His blessings. Peace be upon us and upon the righteous servants of Allah. I bear witness that there is no god but Allah, and I bear witness that Muhammad is His servant and Messenger). The Prophet ﷺ himself would also add blessings upon himself and his family in the final sitting. The Tashahhud is performed in every sitting of the prayer and encapsulates the pillars of tawhid, salutation, and Prophetic affirmation in a single formula, uniting the worshipper's heart with the cosmic testimony of faith.
    description_ar: |
      التَّشَهُّدُ هُوَ الشَّهَادَةُ الَّتِي تُقْرَأُ فِي جُلُوسِ الصَّلَاةِ، وَهُوَ المِحْوَرُ الرُّوحِيُّ الَّذِي تَدُورُ حَوْلَهُ الرَّكَعَاتُ. عَلَّمَهُ النَّبِيُّ ﷺ لِصَحَابِيٍّ أَعْمَى سَأَلَهُ أَنْ يُرِيَهُ كَيْفَ يُصَلِّي: "قُلْ: التَّحِيَّاتُ لِلَّهِ وَالصَّلَوَاتُ وَالطَّيِّبَاتُ، السَّلَامُ عَلَيْكَ أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ، السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللَّهِ الصَّالِحِينَ، أَشْهَدُ أَنْ لا إِلَهَ إِلاَّ اللَّهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ". كَانَ ﷺ يَزِيدُ فِي الجُلُوسِ الأَخِيرِ الصَّلَاةَ عَلَى نَفْسِهِ وَآلِهِ. يُؤَدَّى التَّشَهُّدُ فِي كُلِّ جُلُوسٍ، وَيُجَمِّعُ فِي صِيغَةٍ وَاحِدَةٍ رُكْنَيِ التَّوْحِيدِ وَالتَّسْلِيمِ وَالإِقْرَارِ بِالنُّبُوَّةِ، فَيُوَحِّدُ قَلْبُ المُصَلِّي مَعَ الشَّهَادَةِ الكَوْنِيَّةِ.
    description_fr: |
      Le Tashahhud est le témoignage récité assis pendant la prière, formant l'axe spirituel autour duquel les unités de prière tournent. Le Prophète Muhammad ﷺ l'enseigna à un compagnon aveugle qui lui demanda de lui montrer comment prier : « Dis : At-taḥiyyātu lillāhi waṣ-ṣalawātu waṭ-ṭayyibāt. As-salāmu ʿalayka ayyuhā'n-nabiyyu wa raḥmatu'llāhi wa barakātuh. As-salāmu ʿalaynā wa ʿalā ʿibādi'llāhi'ṣ-ṣāliḥīn. Ash-hadu an lā ilāha illa'llāh, wa ash-hadu anna Muḥammadan ʿabduhu wa rasūluh » (Toutes les salutations, prières et bonnes choses sont pour Allah. La paix soit sur toi, ô Prophète, ainsi que la miséricorde d'Allah et Ses bénédictions. La paix soit sur nous et sur les bons serviteurs d'Allah. Je témoigne qu'il n'y a de divinité qu'Allah, et je témoigne que Muḥammad est Son serviteur et Son Messager). Le Prophète ﷺ ajoutait lui-même des bénédictions sur lui-même et sa famille dans l'assise finale. Le Tashahhud se pratique à chaque assise de la prière et condense en une seule formule les piliers du tawḥīd, de la salutation et de l'affirmation prophétique, unissant le cœur du fidèle au témoignage cosmique de la foi.
    reference: Sahih al-Bukhari 6264, Sahih Muslim 402
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 262) records the Tashahhud as taught by the Prophet ﷺ to a blind Companion. Ibn al-Qayyim (Zad al-Ma'ad, 1:325) explains that the Tashahhud combines the pillars of tawhid, salutation, and Prophetic affirmation. The four madhhabs agree on its essential wording, with minor variations in the final sitting.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 262) rapporte le Tashahhud tel qu'enseigné par le Prophète ﷺ à un compagnon aveugle. Ibn al-Qayyim (Zād al-Maʿād, 1:325) explique que le Tashahhud combine les piliers du tawḥīd, de la salutation et de l'affirmation prophétique. Les quatre madhhabs s'accordent sur son libellé essentiel, avec de légères variations dans l'assise finale.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٢) التَّشَهُّدَ كَمَا عَلَّمَهُ النَّبِيُّ ﷺ لِأَحَدِ الْأَصْحَابِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٢٥) أَنَّ التَّشَهُّدَ يَجْمَعُ أَرْكَانَ التَّوْحِيدِ وَالتَّسْلِيمِ. تَتَفَقُ الْمَذَاهِبُ عَلَى أَصْلِ صِيغَتِهِ.
    display_day_of_year: 191
    hadith_refs: "Bukhari 6264, Muslim 402"

  - slug: sunnah-adhan-and-iqama
    category: sunnah_practice
    title_en: The Adhan and Iqama — Calling to Prayer
    title_ar: الأَذَانُ وَالإِقَامَةُ — نِدَاءُ الصَّلَاةِ
    title_fr: L'Adhān et l'Iqāma — L'Appel à la Prière
    description_en: |
      The Adhan is the melodic call that announces the time of prayer, and the Iqama is the shorter call that signals the congregation to stand and begin. The words of the Adhan were revealed to the Prophet ﷺ in a dream seen by Abdullah ibn Zayd ra, which the Prophet ﷺ confirmed as true and instructed Bilal ra to proclaim. The phrases — "Allahu Akbar," "Ash-hadu an la ilaha illa'llah," "Hayya 'ala's-salah," "Hayya 'ala'l-falah" — encapsulate the pillars of Islam in sound, turning the environment into a space of dhikr. The Iqama repeats the same phrases more rapidly, adding "Qad qamat is-salah" (Prayer has been established). Classical scholars noted that the Adhan is not merely informational but transformative: it awakens the heedless, reminds the forgetful, and summons the believer from the mundane to the sacred. The mu'adhin earns immense reward, and the Prophet ﷺ said: "If the people knew what is in the Adhan and being first to the prayer row, they would draw lots for it."
    description_ar: |
      الأَذَانُ هُوَ النِّدَاءُ المَنْشُودُ الَّذِي يُعَلِّنُ بِوَقْتِ الصَّلَاةِ، وَالإِقَامَةُ هِيَ النِّدَاءُ المُخْتَصَرُ الَّذِي يُشِيرُ إِلَى وُقُوفِ الجَمَاعَةِ وَابْتِدَاءِ الصَّلَاةِ. وُرِدَتْ كَلِمَاتُ الأَذَانِ فِي رُؤْيَا رَأَاهَا عَبْدُ اللهِ بْنُ زَيْدٍ رضي الله عنه، فَأَكَّدَهَا النَّبِيُّ ﷺ وَأَمَرَ بِلَالًا رضي الله عنه بِتَرْقِيهَا. تَجْمَعُ العِبَارَاتُ — "اللَّهُ أَكْبَرُ"، "أَشْهَدُ أَنْ لا إِلَهَ إِلاَّ اللَّهُ"، "حَيَّ عَلَى الصَّلَاةِ"، "حَيَّ عَلَى الفَلَاحِ" — أَرْكَانَ الإِسْلَامِ فِي صَوْتٍ يُحَوِّلُ البِيْئَةَ إِلَى فَضَاءٍ مِنَ الذِّكْرِ. تُكَرِّرُ الإِقَامَةُ نَفْسَ العِبَارَاتِ بِأَسْرَعَ، مُضِيفَةً "قَدْ قَامَتِ الصَّلَاةُ". لَاحَظَ العُلَمَاءُ أَنَّ الأَذَانَ لَيْسَ دَلِيلَ وَقْتٍ فَقَطْ، بَلْ هُوَ مُحَوِّلٌ: يُنَبِّهُ الغَافِلَ، وَيُذَكِّرُ النَّاسِيَ، وَيَدْعُو المُؤْمِنَ مِنَ الدُّنْيَا إِلَى المُقَدَّسِ. يَنَالُ المُؤَذِّنُ أَجْرًا عَظِيمًا، وَقَالَ ﷺ: "لَوْ يَعْلَمُ النَّاسُ مَا فِي الأَذَانِ وَالصَّفِّ المُقَدَّمِ لأَتَوْهُمَا وَلَوْ حَبْوًا".
    description_fr: |
      L'Adhān est l'appel mélodieux qui annonce l'heure de la prière, et l'Iqāma est l'appel plus bref qui signale à la congrégation de se lever et de commencer. Les paroles de l'Adhān furent révélées au Prophète ﷺ dans un rêve vu par ʿAbd Allāh ibn Zayd ra, que le Prophète ﷺ confirma comme vrai et ordonna à Bilāl ra de proclamer. Les phrases — « Allāhu Akbar », « Ash-hadu an lā ilāha illa'llāh », « Ḥayya ʿala'ṣ-ṣalāh », « Ḥayya ʿala'l-falāḥ » — condensent les piliers de l'Islam en un son, transformant l'environnement en un espace de dhikr. L'Iqāma répète les mêmes phrases plus rapidement, ajoutant « Qad qāmat iṣ-ṣalāh » (La prière est établie). Les savants classiques ont noté que l'Adhān n'est pas seulement informatif mais transformateur : il éveille l'inattentif, rappelle l'oublieux, et convoque le croyant du monde profane vers le sacré. Le mu'adhdhin reçoit une immense récompense, et le Prophète ﷺ a dit : « Si les gens savaient ce que contient l'Adhān et la première rangée de prière, ils tireraient au sort pour les obtenir. »
    reference: Sahih al-Bukhari 604, Sahih Muslim 377
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 263) records the virtues of the mu'adhdhin and the Adhan as a divinely inspired call. Ibn al-Qayyim (Zad al-Ma'ad, 1:330) explains that the Adhan transforms the environment into a space of dhikr. The four madhhabs agree on the words of the Adhan, with minor differences in the number of repetitions.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 263) rapporte les mérites du muʾadhdhin et l'Adhān comme appel d'inspiration divine. Ibn al-Qayyim (Zād al-Maʿād, 1:330) explique que l'Adhān transforme l'environnement en un espace de dhikr. Les quatre madhhabs s'accordent sur les paroles de l'Adhān, avec de légères différences dans le nombre de répétitions.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٣) فَضَائِلَ الْمُؤَذِّنِ وَالْأَذَانَ نِدَاءً إِلْهِيًّا. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٣٠) أَنَّ الْأَذَانَ يُحَوِّلُ الْبِيْئَةَ إِلَى فَضَاءِ ذِكْرٍ. تَتَفَقُ الْمَذَاهِبُ عَلَى كَلِمَاتِ الْأَذَانِ.
    display_day_of_year: 193
    hadith_refs: "Bukhari 604, Muslim 377"

  - slug: sunnah-jumuah-prayer
    category: sunnah_practice
    title_en: The Sunnah of Jumu'ah — Friday Congregational Prayer
    title_ar: سُنَّةُ الجُمُعَةِ — صَلَاةُ الجَمَاعَةِ يَوْمَ الجُمُعَةِ
    title_fr: La Sunnah du Jumuʿa — La Prière Congregationnelle du Vendredi
    description_en: |
      Jumu'ah is the weekly congregational prayer that replaces the Dhuhr on Fridays, marked by a sermon and a special two-rak'ah prayer. The Prophet ﷺ emphasized its preparatory sunnahs: performing ghusl, using the siwak, wearing one's best clothes, applying perfume, and arriving early to the mosque. He said: "Whoever performs ghusl on Friday, purifies himself as much as he can, uses oil or perfume of his house, then goes out without separating two persons, prays what is prescribed for him, then remains silent while the imam speaks — his sins between that Friday and the previous Friday are forgiven." The day of Jumu'ah contains an hour when supplications are answered, widely understood by scholars to be the last hour before sunset. The prayer binds the community in a single assembly, transcending class and tribe, and the khutba serves as a weekly realignment of collective conscience toward the Qur'an and the authentic Sunnah.
    description_ar: |
      الجُمُعَةُ هِيَ الصَّلَاةُ الجَمَاعِيَّةُ الأُسْبُوعِيَّةُ الَّتِي تَحُلُّ مَحَلَّ الظُّهْرِ يَوْمَ الجُمُعَةِ، وَتَتَمَيَّزُ بِالخُطْبَةِ وَصَلَاةِ رَكْعَتَيْنِ خَاصَّتَيْنِ. أَكَّدَ النَّبِيُّ ﷺ سُنَنَ الإِسْتِعْدَادِ لَهَا: الغُسْلَ، وَالسِّوَاكَ، وَلُبْسَ أَحْسَنِ الثِّيَابِ، وَالتَّطَيُّبَ، وَالتَّبَكِّرَ إِلَى المَسْجِدِ. قَالَ: "مَنْ اغْتَسَلَ يَوْمَ الجُمُعَةِ، وَتَطَهَّرَ مَا اسْتَطَاعَ مِنْ طُهْرٍ، وَمَسَّ مِنْ دُهْنِ بَيْتِهِ أَوْ طِيبِهِ، ثُمَّ خَرَجَ فَلَمْ يَفْصِلْ بَيْنَ اثْنَيْنِ، وَصَلَّى مَا كُتِبَ لَهُ، ثُمَّ أَنْصَتَ إِذَا خَطَبَ الإِمَامُ، غُفِرَ لَهُ مَا بَيْنَهُ وَبَيْنَ الجُمُعَةِ الأُخْرَى". يَحْتَوِي يَوْمُ الجُمُعَةِ عَلَى سَاعَةٍ تُسْتَجَابُ فِيهَا الدَّعْوَةُ، وَيَنْفِي العُلَمَاءُ أَنَّهَا السَّاعَةُ الأَخِيرَةُ قَبْلَ الغُرُوبِ. تَرْبِطُ هَذِهِ الصَّلَاةُ الجَمَاعَةَ فِي مَجْلِسٍ وَاحِدٍ يَتَعَالَى عَلَى الطَّبَقَةِ وَالقَبِيلَةِ، وَتَعْمَلُ الخُطْبَةُ عَلَى إِعَادَةِ ضَبْطِ الضَّمِيرِ الجَمَاعِيِّ نَحْوَ القُرْآنِ وَالسُّنَّةِ المُطَهَّرَةِ.
    description_fr: |
      Le Jumuʿa est la prière congregationnelle hebdomadaire qui remplace le Ḍuhr le vendredi, marquée par un sermon et une prière spéciale de deux unités. Le Prophète Muhammad ﷺ a souligné ses sunnas préparatoires : faire le ghusl, utiliser le siwāk, porter ses meilleurs vêtements, se parfumer, et arriver tôt à la mosquée. Il a dit : « Celui qui fait le ghusl le vendredi, se purifie autant qu'il peut, se frotte avec l'huile ou le parfum de sa maison, puis sort sans séparer deux personnes, prie ce qui lui est prescrit, puis se tait pendant que l'imam parle — ses péchés entre ce vendredi et le précédent lui sont pardonnés. » Le jour du Jumuʿa contient une heure où les supplications sont exaucées, que les savants identifient généralement comme la dernière heure avant le coucher du soleil. Cette prière lie la communauté en un seul rassemblement, transcendante de classe et de tribu, et le khutba sert de réalignement hebdomadaire de la conscience collective vers le Coran et la Sunna authentique.
    reference: Sahih al-Bukhari 891, Sahih Muslim 857
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 264) records the sunnahs of Jumu'ah including ghusl, siwak, and early arrival. Ibn al-Qayyim (Zad al-Ma'ad, 1:335) explains that Jumu'ah is a weekly renewal and its hour of answered supplication is widely held to be the last hour before sunset. The four madhhabs agree on the obligation for men and the recommendation of preparatory sunnahs.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 264) rapporte les sunnas du Jumuʿa incluant le ghusl, le siwāk et l'arrivée précoce. Ibn al-Qayyim (Zād al-Maʿād, 1:335) explique que le Jumuʿa est un renouvellement hebdomadaire et que son heure de supplication exaucée est largement tenue pour être la dernière heure avant le coucher du soleil. Les quatre madhhabs s'accordent sur l'obligation pour les hommes et la recommandation des sunnas préparatoires.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٤) سُنَنَ الْجُمُعَةِ مِنْ غُسْلٍ وَسِوَاكٍ وَتَبَكُّرٍ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٣٥) أَنَّ الْجُمُعَةَ تَجْدِيدٌ أُسْبُوعِيٌّ. تَتَفَقُ الْمَذَاهِبُ عَلَى الْفَرْضِ لِلرِّجَالِ وَاسْتِحْبَابِ السُّنَنِ.
    display_day_of_year: 194
    hadith_refs: "Bukhari 891, Muslim 857"

  - slug: sunnah-eid-prayer
    category: sunnah_practice
    title_en: The Sunnah of Eid Prayer — The Two Festivals
    title_ar: سُنَّةُ صَلَاةِ العِيدَيْنِ — صَلَاةُ الفَجْرَتَيْنِ
    title_fr: La Sunnah de la Prière de l'ʿĪd — Les Deux Fêtes
    description_en: |
      The Eid prayer marks the two great festivals of the Muslim year: Eid al-Fitr at the end of Ramadan and Eid al-Adha during the days of Hajj. The Prophet ﷺ would lead the congregation in an open prayer ground outside the city, performing two rak'ahs with additional takbirs — seven in the first rak'ah and five in the second, according to the Madinan practice. There is no adhan, no iqama, and no supererogatory prayer before or after the Eid prayer in the open ground. The Prophet ﷺ would eat an odd number of dates before leaving for Eid al-Fitr, and he would not eat on Eid al-Adha until he returned from the prayer and ate from the sacrifice. The prayer is followed by a khutba, traditionally delivered after the prayer unlike Jumu'ah. Classical scholars explained that the outdoor setting symbolizes the inclusivity of the celebration, welcoming women, children, and those usually absent from the mosque.
    description_ar: |
      صَلَاةُ العِيدِ تُمَيِّزُ عِيدَيِ السَّنَةِ الهِجْرِيَّةِ: عِيدُ الفِطْرِ عِنْدَ نِهَايَةِ رَمَضَانَ، وَعِيدُ الأَضْحَى فِي أَيَّامِ الحَجِّ. كَانَ النَّبِيُّ ﷺ يُؤَمُّ الجَمَاعَةَ فِي مُصَلًّىً مَفْتُوحٍ خَارِجَ المَدِينَةِ، يُصَلِّي رَكْعَتَيْنِ مَعَ زِيَادَةِ التَّكْبِيرَاتِ — سَبْعًا فِي الرَّكْعَةِ الأُولَى وَخَمْسًا فِي الثَّانِيَةِ عَلَى المَشْهُورِ المَدَنِيِّ. لا أَذَانَ وَلا إِقَامَةَ، وَلا نَافِلَةَ قَبْلَهَا أَوْ بَعْدَهَا فِي المُصَلَّى. كَانَ ﷺ يَأْكُلُ قَبْلَ خُرُوجِهِ إِلَى عِيدِ الفِطْرِ عَدَدًا وِتْرًا مِنَ التَّمْرِ، وَلا يَأْكُلُ فِي عِيدِ الأَضْحَى حَتَّى يَرْجِعَ مِنَ الصَّلَاةِ وَيَأْكُلَ مِنَ الأُضْحِيَّةِ. تُتْبَعُ الصَّلَاةُ بِخُطْبَةٍ تُلْقَى بَعْدَهَا عَلَى خِلَافِ الجُمُعَةِ. فَسَّرَ العُلَمَاءُ أَنَّ المَكَانَ المَفْتُوحَ يُرَمِّزُ إِلَى شُمُولِيَّةِ الاحْتِفَالِ، فَيَرْحَبُ بِالنِّسَاءِ وَالأَطْفَالِ وَمَنْ لَمْ يَتَوَاجَدْ دَائِمًا فِي المَسْجِدِ.
    description_fr: |
      La prière de l'ʿĪd marque les deux grandes fêtes de l'année musulmane : l'ʿĪd al-Fiṭr à la fin du ramadan et l'ʿĪd al-Aḍḥā durant les jours du Ḥajj. Le Prophète Muhammad ﷺ dirigeait la congrégation sur un terrain de prière ouvert en dehors de la ville, accomplissant deux unités avec des takbīrs supplémentaires — sept dans la première unité et cinq dans la seconde, selon la pratique médinoise. Il n'y a ni adhān, ni iqāma, ni prière surérogatoire avant ou après la prière de l'ʿĪd sur le terrain de prière. Le Prophète ﷺ mangeait un nombre impair de dattes avant de partir pour l'ʿĪd al-Fiṭr, et il ne mangeait pas le jour de l'ʿĪd al-Aḍḥā avant de revenir de la prière et de manger du sacrifice. La prière est suivie d'un khutba, traditionnellement prononcé après la prière, contrairement au Jumuʿa. Les savants classiques ont expliqué que le cadre extérieur symbolise l'inclusivité de la célébration, accueillant les femmes, les enfants, et ceux qui sont habituellement absents de la mosquée.
    reference: Sahih al-Bukhari 956, Sahih Muslim 889
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 265) records the takbirat of 'Eid and the practice of praying in the open ground. Ibn al-Qayyim (Zad al-Ma'ad, 1:340) explains that eating before leaving for 'Eid al-Fitr and after returning from 'Eid al-Adha are distinct sunnahs. The four madhhabs agree on the two rak'ahs and the outdoor prayer, though they differ on the exact number of takbirs.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 265) rapporte les takbīrāt de lʿĪd et la pratique de prier en plein air. Ibn al-Qayyim (Zād al-Maʿād, 1:340) explique que manger avant de partir pour lʿĪd al-Fiṭr et après le retour de lʿĪd al-Aḍḥā sont des sunnas distinctes. Les quatre madhhabs s'accordent sur les deux rakʿahs et la prière en plein air, bien qu'ils diffèrent sur le nombre exact de takbīrs.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٥) تَكْبِيرَاتِ الْعِيدِ وَالصَّلَاةِ فِي الْمُصَلَّى الْمَفْتُوحِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٤٠) أَنَّ الْأَكْلَ قَبْلَ الْخُرُوجِ إِلَى الْفِطْرِ وَبَعْدَ الْعَوْدَةِ مِنَ الْأَضْحَى سُنَتَانِ مُمَيَّزَتَانِ. تَتَفَقُ الْمَذَاهِبُ عَلَى الرَّكْعَتَيْنِ وَالْمَكَانِ الْمَفْتُوحِ.
    display_day_of_year: 198
    hadith_refs: "Bukhari 956, Muslim 889"

  - slug: sunnah-khutba
    category: sunnah_practice
    title_en: The Khutba (Sermon) — Addressing the Congregation
    title_ar: الخُطْبَةُ — مُخَاطَبَةُ الجَمَاعَةِ
    title_fr: Le Khutba (Sermon) — S'adresser à la Congrégation
    description_en: |
      The khutba is the formal sermon delivered from the minbar before Jumu'ah and Eid prayers, serving as the primary means of communal religious instruction in the Prophet's ﷺ mosque. He would stand on the three-stepped minbar, praise Allah, invoke blessings upon himself and his family, recite a relevant Qur'anic passage, and advise the congregation with exhortation and warning. The Prophet ﷺ would sit briefly between the two khutbas — a practice that allows the congregation to shift from passive listening to active reflection. He forbade delivering khutbas while standing on the ground or leaning against something, establishing the minbar as a symbol of authority and clarity. Classical scholars have emphasized that the khutba must be in the language the congregation understands, must avoid sectarian incitement, and should prioritize the Qur'an and authentic hadith over rhetorical display. It remains the weekly pulse of the Muslim community's moral and intellectual life.
    description_ar: |
      الخُطْبَةُ هِيَ الخِطَابُ الرَّسْمِيُّ الَّذِي يُلْقَى مِنَ المِنْبَرِ قَبْلَ صَلَاةِ الجُمُعَةِ وَالعِيدِ، وَتَعْمَلُ وَسِيلَةَ التَّعْلِيمِ الدِّينِيِّ الجَمَاعِيِّ الأَسَاسِيَّةَ فِي مَسْجِدِ النَّبِيِّ ﷺ. كَانَ ﷺ يَقُومُ عَلَى المِنْبَرِ ذِي الدَّرَجَاتِ الثَّلَاثِ، يُثْنِي عَلَى اللهِ، وَيُصَلِّي عَلَى نَفْسِهِ وَآلِهِ، وَيَقْرَأُ آيَةً مُنَاسِبَةً مِنَ القُرْآنِ، وَيَعِظُ الجَمَاعَةَ بِالوَعْظِ وَالتَّحْذِيرِ. كَانَ يَجْلِسُ جُلُوسًا خَفِيفًا بَيْنَ الخُطْبَتَيْنِ — سُنَّةٌ تُمَكِّنُ الجَمَاعَةَ مِنَ الاِنْتِقَالِ مِنَ الاسْتِمَاعِ المَنْفَعَلِ إِلَى التَّأَمُّلِ الفَعَّالِ. نَهَى ﷺ عَنْ إِلْقَاءِ الخُطْبَةِ قَائِمًا عَلَى الأَرْضِ أَوْ مُسْتَنِدًا، مُؤَسِّسًا لِلمِنْبَرِ رَمْزًا لِلسُّلْطَةِ وَالوُضُوحِ. أَكَّدَ العُلَمَاءُ أَنَّ الخُطْبَةَ يَجِبُ أَنْ تَكُونَ بِلُغَةِ الجَمَاعَةِ، وَأَنْ تَتَجَنَّبَ التَّحْرِيضَ الطَّائِفِيَّ، وَأَنْ تُقَدِّمَ القُرْآنَ وَالحَدِيثَ الصَّحِيحَ عَلَى العَرْضِ البَلَاغِيِّ. وَمَا زَالَتْ نَبْضَةَ الحَيَاةِ الأَخْلَاقِيَّةِ وَالفِكْرِيَّةِ الأُسْبُوعِيَّةِ لِلأُمَّةِ.
    description_fr: |
      Le khutba est le sermon formel prononcé depuis le minbar avant les prières du Jumuʿa et de l'ʿĪd, servant de principal moyen d'instruction religieuse communautaire dans la mosquée du Prophète ﷺ. Il se tenait sur le minbar à trois degrés, louait Allah, invoquait des bénédictions sur lui-même et sa famille, récitait un passage coranique pertinent, et conseillait la congrégation par l'exhortation et l'avertissement. Le Prophète ﷺ s'asseyait brièvement entre les deux khutbas — une pratique qui permet à la congrégation de passer de l'écoute passive à la réflexion active. Il interdit de prononcer des khutbas debout sur le sol ou appuyé contre quelque chose, établissant le minbar comme symbole d'autorité et de clarté. Les savants classiques ont souligné que le khutba doit être dans la langue comprise par la congrégation, doit éviter l'incitation sectaire, et devrait prioriser le Coran et le hadith authentique sur la démonstration rhétorique. Il demeure le pouls hebdomadaire de la vie morale et intellectuelle de la communauté musulmane.
    reference: Sahih al-Bukhari 928, Sahih Muslim 862
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 266) records the etiquette of the khutba and the Prophet's ﷺ practice of sitting between the two sermons. Ibn al-Qayyim (Zad al-Ma'ad, 1:345) explains that the khutba is the weekly pulse of communal instruction. The four madhhabs agree on the two khutbas, though they differ on whether the second is sunnah or integral.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 266) rapporte l'étiquette de la khutba et la pratique du Prophète ﷺ de s'asseoir entre les deux sermons. Ibn al-Qayyim (Zād al-Maʿād, 1:345) explique que la khutba est le pouls hebdomadaire de l'instruction communautaire. Les quatre madhhabs s'accordent sur les deux khutbas, bien qu'ils diffèrent sur le fait que la seconde soit sunnah ou intégrante.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٦) آدَابَ الْخُطْبَةِ وَجُلُوسَ النَّبِيِّ ﷺ بَيْنَ الْخُطْبَتَيْنِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٤٥) أَنَّ الْخُطْبَةَ نَبْضَةُ التَّعْلِيمِ الْجَمَاعِيِّ. تَتَفَقُ الْمَذَاهِبُ عَلَى الْخُطْبَتَيْنِ.
    display_day_of_year: 199
    hadith_refs: "Bukhari 928, Muslim 862"

  - slug: sunnah-ruku-and-sujud
    category: sunnah_practice
    title_en: The Sunnah of Ruku' and Sujud — Bowing and Prostrating with Tranquility
    title_ar: سُنَّةُ الرُّكُوعِ وَالسُّجُودِ — الخُضُوعُ بِالطُّمَأْنِينَةِ
    title_fr: La Sunnah du Rukūʿ et du Sujūd — S'incliner et Se prosterner avec Sérénité
    description_en: |
      The Prophet ﷺ taught that prayer is built upon tranquility and composure in every posture. In the ruku' he would place his hands firmly on his knees, straighten his back so that it formed a right angle, and say repeatedly: "Subhana Rabbiyal 'Azim" (Glory be to my Lord the Most Great). In sujud he would place his forehead, nose, palms, knees, and toes on the ground, keep his arms away from his sides, and say: "Subhana Rabbiyal A'la" (Glory be to my Lord the Most High). Hudhayfa ra described the Prophet's ﷺ ruku' and sujud as being of nearly equal duration, demonstrating perfect stillness. The Prophet ﷺ forbade pecking like a crow in prayer — rushing through the postures without repose. Classical scholars derived from this that the minimum validity of each posture requires enough stillness to recite the prescribed dhikr at least once, though the sunnah is to repeat it three or more times. The physical postures of humility mirror the soul's submission to Allah, transforming the body into an instrument of devotion.
    description_ar: |
      عَلَّمَ النَّبِيُّ ﷺ أَنَّ الصَّلَاةَ تُبْنَى عَلَى الطُّمَأْنِينَةِ فِي كُلِّ حَالَةٍ. فِي الرُّكُوعِ كَانَ يَضَعُ يَدَيْهِ عَلَى رُكْبَتَيْهِ ثَابِتَتَيْنِ، وَيُقَوِّمُ ظَهْرَهُ حَتَّى يَكُونَ عَلَى حِدَةٍ قَائِمَةٍ، وَيَقُولُ: "سُبْحَانَ رَبِّيَ العَظِيمِ". وَفِي السُّجُودِ كَانَ يَضَعُ جَبْهَتَهُ وَأَنْفَهُ وَكَفَّيْهِ وَرُكْبَتَيْهِ وَأَطْرَافَ قَدَمَيْهِ عَلَى الأَرْضِ، وَيُبَاعِدُ عَضُدَيْهِ عَنْ جَنَبَيْهِ، وَيَقُولُ: "سُبْحَانَ رَبِّيَ الأَعْلَى". وَصَفَهُ حُذَيْفَةُ رضي الله عنه بِأَنَّ رُكُوعَهُ وَسُجُودَهُ كَانَا قَرِيبَيْنِ مِنَ التَّسَاوِي، مُظْهِرَيْنِ السَّكِينَةَ التَّامَّةَ. نَهَى ﷺ عَنِ النَّقْرِ فِي الصَّلَاةِ — التَّعَجُّلِ فِي الحَرَكَاتِ بِدُونِ رَاحَةٍ. اسْتَنْبَطَ العُلَمَاءُ مِنْ هَذَا أَنَّ أَدْنَى صِحَّةِ الحَالَةِ يَتَطَلَّبُ طُمَأْنِينَةً تَكْفِي لِلتَّسْبِيحَةِ مَرَّةً وَاحِدَةً، وَأَنَّ السُّنَّةَ تَكْرَارُهَا ثَلَاثًا أَوْ أَكْثَرَ. تُعَايِرُ حَرَكَاتُ الجِسْمِ الخُضُوعَ النَّفْسِيَّ لِلَّهِ، فَتُحَوِّلُ الجِسْمَ إِلَى أَدَاةِ تَقَرُّبٍ.
    description_fr: |
      Le Prophète Muhammad ﷺ a enseigné que la prière se construit sur la tranquillité et la sérénité dans chaque posture. Dans le rukūʿ, il posait ses mains fermement sur ses genoux, redressait le dos pour qu'il forme un angle droit, et répétait : « Subḥāna Rabbiya'l-ʿAẓīm » (Gloire à mon Seigneur le Très Grand). Dans le sujūd, il posait son front, son nez, ses paumes, ses genoux et ses orteils au sol, écartait ses bras de ses flancs, et disait : « Subḥāna Rabbiya'l-Aʿlā » (Gloire à mon Seigneur le Très Haut). Ḥuḍhayfa ra décrivit le rukūʿ et le sujūd du Prophète ﷺ comme étant d'une durée presque égale, démontrant une immobilité parfaite. Le Prophète ﷺ interdit de picorer comme un corbeau dans la prière — c'est-à-dire de précipiter les postures sans repos. Les savants classiques en ont déduit que la validité minimale de chaque posture exige assez de sérénité pour réciter le dhikr prescrit au moins une fois, bien que la sunnah soit de le répéter trois fois ou plus. Les postures physiques d'humilité reflètent la soumission de l'âme à Allah, transformant le corps en instrument de dévotion.
    reference: Sahih al-Bukhari 793, Sahih Muslim 543
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 267) records the tasbihat of ruku' and sujud as essential elements of tranquility. Ibn al-Qayyim (Zad al-Ma'ad, 1:350) explains that perfect stillness (tuma'nina) in each posture is a pillar of valid prayer. The four madhhabs agree on the minimum of one tasbiha per posture, with the sunnah being three or more.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 267) rapporte les tasbīḥāt du rukūʿ et du sujūd comme éléments essentiels de la tranquillité. Ibn al-Qayyim (Zād al-Maʿād, 1:350) explique que l'immobilité parfaite (tumaʾnīna) dans chaque posture est un pilier de la prière valide. Les quatre madhhabs s'accordent sur le minimum d'une tasbīḥa par posture, la sunnah étant trois ou plus.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٧) تَسْبِيحَاتِ الرُّكُوعِ وَالسُّجُودِ رُكْنًا مِنْ أَرْكَانِ الطُّمَأْنِينَةِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٥٠) أَنَّ الطُّمَأْنِينَةَ فِي كُلِّ حَالَةٍ رُكْنٌ مِنْ أَرْكَانِ الصَّلَاةِ. تَتَفَقُ الْمَذَاهِبُ عَلَى أَدْنَى تَسْبِيحَةٍ وَاحِدَةٍ، وَالسُّنَّةُ ثَلَاثٌ أَوْ أَكْثَرُ.
    display_day_of_year: 200
    hadith_refs: "Bukhari 793, Muslim 543"

  - slug: sunnah-reciting-aloud-and-silent
    category: sunnah_practice
    title_en: Reciting Aloud and Silent in Prayer — The Rulings of Jahr and Sirr
    title_ar: الجَهْرُ وَالإِخْفَاتُ فِي الصَّلَاةِ — أَحْكَامُ القِرَاءَةِ
    title_fr: Réciter à Haute Voix et à Voix Basse dans la Prière — Les Règles du Jahr et du Sirr
    description_en: |
      The Prophet ﷺ demonstrated both audible and silent recitation in the canonical prayers, establishing a rhythm that alternates between public declaration and private intimacy. He recited aloud in Fajr, Maghrib, and Isha — the prayers of darkness — and silently in Dhuhr and Asr, the prayers of daylight. This practice is called jahr in the audible prayers and sirr in the silent ones. When reciting aloud, his voice was clear and beautiful but not strained; when silent, his lips moved distinctly enough to be seen by those nearby. The wisdom behind the distinction, as classical scholars explained, lies in education and identity: the audible recitation teaches the congregation the Qur'an and proclaims the Muslim presence, while the silent recitation cultivates inward focus and protects the worshipper from ostentation. The imam's audible recitation in congregation replaces the individual's recitation, a mercy that lightens the burden while preserving the spiritual essence of the prayer.
    description_ar: |
      أَظْهَرَ النَّبِيُّ ﷺ كِلَا النَّوْعَيْنِ مِنَ القِرَاءَةِ فِي الصَّلَوَاتِ المَكْتُوبَةِ، مُؤَسِّسًا إِيقَاعًا يَتَنَاوَبُ بَيْنَ الإِعْلاَنِ العَلَنِيِّ وَالخُصُوصِيَّةِ الذَّاتِيَّةِ. كَانَ يَجْهَرُ فِي الفَجْرِ وَالمَغْرِبِ وَالعِشَاءِ — صَلَوَاتِ الظَّلاَمِ — وَيُخَافِتُ فِي الظُّهْرِ وَالعَصْرِ — صَلَوَاتِ النَّهَارِ. يُسَمَّى ذَلِكَ جَهْرًا فِي الصَّلَوَاتِ الجَهْرِيَّةِ وَإِخْفَاتًا فِي السِّرِّيَّةِ. حِينَ يَجْهَرُ، كَانَ صَوْتُهُ وَاضِحًا جَمِيلًا بِدُونِ تَكَلُّفٍ؛ وَحِينَ يُخَافِتُ، كَانَتْ شَفَتَاهُ تَتَحَرَّكَانِ بِوُضُوحٍ يُبْصِرُهُ المُقَرِّبُونَ. يَكْمُنُ الحِكْمَةُ — كَمَا فَسَّرَ العُلَمَاءُ — فِي التَّعْلِيمِ وَالهُوِيَّةِ: القِرَاءَةُ الجَهْرِيَّةُ تُعَلِّمُ الجَمَاعَةَ القُرْآنَ وَتُعَلِنُ الحُضُورَ الإِسْلَامِيَّ، وَالإِخْفَاتُ يُرَبِّي التَّرْكِيزَ الدَّاخِلِيَّ وَيَحْمِي المُصَلِّيَ مِنَ الرِّيَاءِ. قِرَاءَةُ الإِمَامِ الجَهْرِيَّةُ فِي الجَمَاعَةِ تَحُلُّ مَحَلَّ قِرَاءَةِ الفَرْدِ، رَحْمَةٌ تُخَفِّفُ الوِزْرَ وَتَحْفَظُ الجَوْهَرَ الرُّوحِيَّ لِلصَّلَاةِ.
    description_fr: |
      Le Prophète Muhammad ﷺ a démontré tant la récitation à haute voix que le silence dans les prières canoniques, établissant un rythme qui alterne entre déclaration publique et intimité privée. Il récitait à haute voix à la Ṣubḥ, au Maghrib et au ʿIshā — les prières de l'obscurité — et silencieusement à lẓ-Ẓuhr et à lʿAṣr, les prières du jour. Cette pratique s'appelle le jahr dans les prières audibles et le sirr dans les prières silencieuses. Lorsqu'il récitait à haute voix, sa voix était claire et belle mais non forcée ; lorsqu'il récitait silencieusement, ses lèvres bougeaient assez distinctement pour être vues par ceux qui étaient proches. La sagesse de cette distinction, comme l'ont expliqué les savants classiques, réside dans l'éducation et l'identité : la récitation audible enseigne le Coran à la congrégation et proclame la présence musulmane, tandis que le silence cultive la concentration intérieure et protège le fidèle de l'ostentation. La récitation audible de l'imam en congregation remplace la récitation individuelle, une miséricorde qui allège le fardeau tout en préservant l'essence spirituelle de la prière.
    reference: Sahih al-Bukhari 761, Sahih Muslim 452
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 268) records the distinction between jahr and sirr in the canonical prayers. Ibn al-Qayyim (Zad al-Ma'ad, 1:355) explains that audible recitation educates the congregation while silent recitation cultivates inward focus. The four madhhabs agree on which prayers are audible and which are silent.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 268) rapporte la distinction entre le jahr et le sirr dans les prières canoniques. Ibn al-Qayyim (Zād al-Maʿād, 1:355) explique que la récitation audible éduque la congrégation tandis que le silence cultive la concentration intérieure. Les quatre madhhabs s'accordent sur quelles prières sont audibles et lesquelles sont silencieuses.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٨) التَّفْرِيقَ بَيْنَ الْجَهْرِ وَالْإِخْفَاتِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٥٥) أَنَّ الْجَهْرَ يُعَلِّمُ الْجَمَاعَةَ وَالْإِخْفَاتُ يُرَبِّي التَّرَكُّزَ. تَتَفَقُ الْمَذَاهِبُ عَلَى تَعْيِينِ الصَّلَوَاتِ الْجَهْرِيَّةِ وَالسِّرِّيَّةِ.
    display_day_of_year: 201
    hadith_refs: "Bukhari 761, Muslim 452"

  - slug: sunnah-sutra-in-prayer
    category: sunnah_practice
    title_en: The Sutra in Prayer — Placing a Barrier Before the Worshipper
    title_ar: السُّتْرَةُ فِي الصَّلَاةِ — وَضْعُ حَاجِزٍ أَمَامَ المُصَلِّي
    title_fr: La Sutra dans la Prière — Placer une Barrière devant le Fidèle
    description_en: |
      The sutra is a barrier placed directly in front of the worshipper during prayer, marking the sacred space and shielding it from distraction. The Prophet ﷺ would pray towards a spear stuck in the ground, a saddle, a staff, or the trunk of a palm tree, keeping it approximately one forearm's length in front of him. He said: "When one of you prays, let him pray towards a sutra, and let him not let anyone pass in front of him; but if someone insists on passing, let him fight him, for he is accompanied by Satan." The sutra serves a dual function: it prevents others from invalidating the prayer by crossing the prayer space, and it focuses the worshipper's gaze and heart by defining a visual endpoint. Classical scholars ruled that the sutra is strongly recommended for the individual and the imam, and that passing in front of a praying person without an excuse is reprehensible. In the absence of a physical object, a line drawn on the ground or a row of worshippers serves the same purpose.
    description_ar: |
      السُّتْرَةُ هِيَ الحَاجِزُ الَّذِي يُوضَعُ مُبَاشَرَةً أَمَامَ المُصَلِّي، فَتُحَدِّدُ المَكَانَ المُقَدَّسَ وَتَحْمِيهِ مِنَ الانْشِغَالِ. كَانَ النَّبِيُّ ﷺ يُصَلِّي نَحْوَ رُمْحٍ غَرَسَهُ فِي الأَرْضِ، أَوْ رَحْلٍ، أَوْ عَصًا، أَوْ جِذْعِ نَخْلَةٍ، وَيَجْعَلُهُ عَلَى مَسَافَةِ ذِرَاعٍ أَمَامَهُ. قَالَ: "إِذَا صَلَّى أَحَدُكُمْ فَلْيُصَلِّ إِلَى سُتْرَةٍ، وَلْيَدْنُ مِنْهَا، وَلا يَدَعْ أَحَدًا يَمُرُّ بَيْنَ يَدَيْهِ، فَإِنْ أَبَى فَلْيُقَاتِلْهُ، فَإِنَّهُ مَعَهُ شَيْطَانٌ". تُؤَدِّي السُّتْرَةُ وَظِيفَتَيْنِ: تَمْنَعُ المَارَّ مِنَ إِبْطَالِ صَلَاةِ غَيْرِهِ بِاجْتِيَازِ فَضَاءِ الصَّلَاةِ، وَتُرَكِّزُ بَصَرَ المُصَلِّي وَقَلْبَهُ بِتَحْدِيدِ نُقْطَةِ النَّظَرِ. حَكَمَ الفُقَهَاءُ بِأَنَّ السُّتْرَةَ مُسْتَحَبَّةٌ بِشِدَّةٍ لِلمُنْفَرِدِ وَالإِمَامِ، وَأَنَّ المُرُورَ أَمَامَ المُصَلِّي بِدُونِ عُذْرٍ مَكْرُوهٌ. فِي غَيَابِ جِسْمٍ مَادِيٍّ، تَكْفِي خَطٌّ عَلَى الأَرْضِ أَوْ صَفٌّ مِنَ المُصَلِّينَ.
    description_fr: |
      La sutra est une barrière placée directement devant le fidèle pendant la prière, marquant l'espace sacré et le protégeant de la distraction. Le Prophète Muhammad ﷺ priait vers une lance plantée dans le sol, une selle, un bâton, ou le tronc d'un palmier, la maintenant à environ la longueur d'un avant-bras devant lui. Il a dit : « Quand l'un de vous prie, qu'il prie vers une sutra, qu'il s'en approche, et qu'il ne laisse personne passer devant lui ; mais si quelqu'un insiste pour passer, qu'il se batte contre lui, car il est accompagné d'un démon. » La sutra remplit une double fonction : elle empêche les autres d'invalider la prière en traversant l'espace de prière, et elle concentre le regard et le cœur du fidèle en définissant un point visuel final. Les savants classiques ont statué que la sutra est fortement recommandée pour l'individu et l'imam, et que passer devant une personne en prière sans excuse est répréhensible. En l'absence d'un objet physique, une ligne tracée au sol ou une rangée de fidèles remplit le même rôle.
    reference: Sahih al-Bukhari 505, Sahih Muslim 543
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 269) records the recommendation of a sutra and the prohibition of passing in front of a praying person. Ibn al-Qayyim (Zad al-Ma'ad, 1:360) explains that the sutra defines the sacred space and protects from distraction. The four madhhabs agree on the strong recommendation of a sutra for the individual and imam.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 269) rapporte la recommandation d'une sutra et l'interdiction de passer devant une personne en prière. Ibn al-Qayyim (Zād al-Maʿād, 1:360) explique que la sutra définit l'espace sacré et protège de la distraction. Les quatre madhhabs s'accordent sur la forte recommandation d'une sutra pour l'individu et l'imam.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٦٩) اسْتِحْبَابَ السُّتْرَةِ وَتَحْرِيمَ الْمُرُورِ أَمَامَ الْمُصَلِّي. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٦٠) أَنَّ السُّتْرَةَ تُحَدِّدُ الْمَكَانَ الْمُقَدَّسَ. تَتَفَقُ الْمَذَاهِبُ عَلَى شِدَّةِ اسْتِحْبَابِهَا.
    display_day_of_year: 203
    hadith_refs: "Bukhari 505, Muslim 543"

  - slug: sunnah-praying-in-congregation
    category: sunnah_practice
    title_en: Praying in Congregation — Twenty-Seven Times Better Than Alone
    title_ar: الصَّلَاةُ فِي الجَمَاعَةِ — سَبْعٌ وَعِشْرُونَ ضِعْفًا عَنْ صَلَاةِ الفَرْدِ
    title_fr: La Prière en Congrégation — Vingt-Sept Fois Supérieure à la Prière Seul
    description_en: |
      Congregational prayer is the cornerstone of communal worship in Islam, establishing bonds of equality and mutual accountability among believers. The Prophet ﷺ said: "Prayer in congregation is twenty-seven times better than prayer prayed alone." He instructed men to pray in the mosque whenever possible, and he described the collective reward in vivid terms: the angels continue to record the reward for a person as long as he remains in his prayer place waiting for the next prayer. The rows are to be straightened, shoulders aligned, and gaps closed — the Prophet ﷺ would physically adjust the Companions' positions to ensure solidarity. Women stand behind the men, preserving the structure while sharing equally in the spiritual reward. The imam leads, and the congregation follows his movements in unison, creating a visual and spiritual symphony. Classical scholars classified congregational prayer as an emphasized collective obligation upon men in the locality, with severe warning for habitual absentees: "I nearly ordered firewood to be gathered to burn the houses of those who do not attend the congregational prayer."
    description_ar: |
      صَلَاةُ الجَمَاعَةِ هِيَ رُكْنُ العِبَادَةِ الجَمَاعِيَّةِ فِي الإِسْلَامِ، تُؤَسِّسُ رَابِطَ المُسَاوَاةِ وَالمُسَاءَلَةِ المُتَبَادَلَةِ بَيْنَ المُؤْمِنِينَ. قَالَ النَّبِيُّ ﷺ: "صَلَاةُ الجَمَاعَةِ تَفْضُلُ صَلَاةَ الفَذِّ بِسَبْعٍ وَعِشْرِينَ دَرَجَةً". أَمَرَ الرِّجَالَ بِالصَّلَاةِ فِي المَسْجِدِ كُلَّمَا اسْتَطَاعُوا، وَصَوَّرَ الأَجْرَ الجَمَاعِيَّ: المَلائِكَةُ تَسْتَمِرُّ فِي كِتَابَةِ الأَجْرِ لِلإِنْسَانِ مَا دَامَ فِي مُصَلَّاهُ يَنْتَظِرُ الصَّلَاةَ التَّالِيَةَ. يُسَوَّى الصَّفُّ وَتُوَالَى الأَكْتَافُ وَتُسَدُّ الفُرَجُ — كَانَ ﷺ يُعَدِّلُ مَوَاقِعَ أَصْحَابِهِ بِيَدِهِ لِتَحْقِيقِ التَّلاَحُمِ. تَقُومُ النِّسَاءُ خَلْفَ الرِّجَالِ، حَافِظَةً لِلبُنْيَةِ وَشَرِيكَةً فِي الأَجْرِ الرُّوحِيِّ. يَؤُمُّ الإِمَامُ، فَتَتَّبِعُ الجَمَاعَةُ حَرَكَاتِهِ فِي تَنَاسُقٍ، مُكَوِّنَةً سِيمْفُونِيَّةً بَصَرِيَّةً رُوحِيَّةً. صَنَّفَ العُلَمَاءُ صَلَاةَ الجَمَاعَةِ فَرْضًا كِفَايَةً مُؤَكَّدًا عَلَى الرِّجَالِ فِي الحَيِّ، مَعَ تَحْذِيرٍ شَدِيدٍ لِمَنْ تَرَكَهَا عَادَةً: "وَالَّذِي نَفْسِي بِيَدِهِ، لَقَدْ هَمَمْتُ أَنْ آمُرَ بِحَطَبٍ فَيُحْطَبَ، ثُمَّ آمُرَ بِالصَّلَاةِ فَيُؤَذَّنَ لَهَا، ثُمَّ آمُرَ رَجُلاً فَيَؤُمَّ النَّاسَ، ثُمَّ أَنْطَلِقَ مَعِي بِرِجَالٍ إِلَى قَوْمٍ لا يَشْهَدُونَ الصَّلَاةَ فَأُحَرِّقَ عَلَيْهِمْ بُيُوتَهُمْ".
    description_fr: |
      La prière en congregation est la pierre angulaire du culte communautaire en Islam, établissant des liens d'égalité et de responsabilité mutuelle entre les croyants. Le Prophète Muhammad ﷺ a dit : « La prière en congregation surpasse la prière faite seul de vingt-sept degrés. » Il ordonna aux hommes de prier à la mosquée chaque fois que possible, et il décrivit la récompense collective en termes vivants : les anges continuent d'inscrire la récompense d'une personne tant qu'elle reste dans sa place de prière en attendant la prière suivante. Les rangées doivent être redressées, les épaules alignées, et les vides comblés — le Prophète ﷺ ajustait physiquement les positions des compagnons pour assurer la solidarité. Les femmes se tiennent derrière les hommes, préservant la structure tout en partageant également la récompense spirituelle. L'imam dirige, et la congregation suit ses mouvements à l'unisson, créant une symphonie visuelle et spirituelle. Les savants classiques ont classé la prière en congregation comme une obligation collective fortement recommandée pour les hommes du quartier, avec un avertissement sévère pour les absents habituels : « J'ai failli ordonner qu'on ramasse du bois pour brûler les maisons de ceux qui n'assistent pas à la prière en congregation. »
    reference: Sahih al-Bukhari 645, Sahih Muslim 650
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 270) records the twenty-seven-fold reward of congregational prayer. Ibn al-Qayyim (Zad al-Ma'ad, 1:365) explains that straightening the rows is essential for the solidarity of the prayer. The majority of scholars classify congregational prayer as fard kifaya for men in the locality, with a severe warning for habitual absentees.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 270) rapporte la récompense vingt-sept fois supérieure de la prière en congregation. Ibn al-Qayyim (Zād al-Maʿād, 1:365) explique que le redressement des rangées est essentiel pour la solidarité de la prière. La majorité des savants classent la prière en congregation comme farḍ kifāya pour les hommes du quartier, avec un avertissement sévère pour les absents habituels.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧٠) تَفْضِيلَ صَلَاةِ الْجَمَاعَةِ بِسَبْعٍ وَعِشْرِينَ دَرَجَةً. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٦٥) أَنَّ تَسْوِيَةَ الصُّفُوفِ رُكْنُ تَلَاحُمِهَا. يَذْهَبُ الْجُمْهُورُ إِلَى أَنَّهَا فَرْضُ كِفَايَةٍ.
    display_day_of_year: 204
    hadith_refs: "Bukhari 645, Muslim 650"

  - slug: sunnah-takbirat-of-eid
    category: sunnah_practice
    title_en: The Takbirat of Eid — Proclaiming Allah's Greatness
    title_ar: تَكْبِيرَاتُ العِيدِ — تَرَنُّمُ التَّكْبِيرِ
    title_fr: Les Takbīrāt de l'ʿĪd — Proclamer la Grandeur d'Allah
    description_en: |
      The takbirat of Eid are the ritual proclamations of "Allahu Akbar" that perfume the Muslim world during the festivals. For Eid al-Adha, the takbir begins after the Fajr of the Day of Arafah (9 Dhul Hijjah) and continues until the Asr of the last day of Tashreeq (13 Dhul Hijjah). For Eid al-Fitr, it begins after the sunset of the last day of Ramadan and continues until the Eid prayer. The classical formula is: "Allahu Akbar, Allahu Akbar, Allahu Akbar, la ilaha illa'llah, Allahu Akbar, Allahu Akbar, wa lillahi'l-hamd." The Prophet ﷺ would walk to the Eid prayer ground reciting the takbir aloud, and the women would join from behind the rows. Classical scholars ruled the takbir as recommended for men, women, and travelers — audible for men and whispered for women. The sound transforms the atmosphere into one of exaltation and gratitude, publicly marking the transition from the austerity of worship to the joy of divine acceptance.
    description_ar: |
      تَكْبِيرَاتُ العِيدِ هِيَ التَّرَنُّمَاتُ بِ"اللَّهُ أَكْبَرُ" الَّتِي تَعَطِّرُ العَالَمَ الإِسْلَامِيَّ فِي أَيَّامِ الأَعْيَادِ. فِي عِيدِ الأَضْحَى، تَبْدَأُ مِنْ بَعْدِ فَجْرِ يَوْمِ عَرَفَةَ (٩ ذِي الحِجَّةِ) وَتَسْتَمِرُّ حَتَّى عَصْرِ آخِرِ أَيَّامِ التَّشْرِيقِ (١٣ ذِي الحِجَّةِ). فِي عِيدِ الفِطْرِ، تَبْدَأُ مِنْ بَعْدِ غُرُوبِ آخِرِ يَوْمٍ مِنْ رَمَضَانَ وَتَسْتَمِرُّ حَتَّى صَلَاةِ العِيدِ. الصِّيغَةُ المَشْهُورَةُ: "اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، لا إِلَهَ إِلاَّ اللَّهُ، اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، وَلِلَّهِ الحَمْدُ". كَانَ النَّبِيُّ ﷺ يَمْشِي إِلَى المُصَلَّى وَهُوَ يُكَبِّرُ جَهْرًا، وَتُشَارِكُهُ النِّسَاءُ مِنْ خَلْفِ الصُّفُوفِ. حَكَمَ الفُقَهَاءُ بِأَنَّ التَّكْبِيرَ مُسْتَحَبٌّ لِلرِّجَالِ وَالنِّسَاءِ وَالمُسَافِرِينَ — جَهْرًا لِلرِّجَالِ وَإِخْفَاتًا لِلنِّسَاءِ. يُحَوِّلُ الصَّوْتُ الأَجْوَاءَ إِلَى مَجَالٍ مِنَ التَّعْظِيمِ وَالشُّكْرِ، عَلَامَةً عَلَنِيَّةً عَلَى الاِنْتِقَالِ مِنْ تَشَدُّدِ العِبَادَةِ إِلَى فَرَحِ القَبُولِ الإِلَهِيِّ.
    description_fr: |
      Les takbīrāt de l'ʿĪd sont les proclamations rituelles de « Allāhu Akbar » qui parfument le monde musulman pendant les fêtes. Pour l'ʿĪd al-Aḍḥā, le takbīr commence après la Ṣubḥ du jour de ʿArafāt (9 dhū'l-Ḥijja) et continue jusqu'à lʿAṣr du dernier jour de Tashrīq (13 dhū'l-Ḥijja). Pour l'ʿĪd al-Fiṭr, il commence après le coucher du soleil du dernier jour du ramadan et continue jusqu'à la prière de l'ʿĪd. La formule classique est : « Allāhu Akbar, Allāhu Akbar, Allāhu Akbar, lā ilāha illa'llāh, Allāhu Akbar, Allāhu Akbar, wa lillāhi'l-ḥamd. » Le Prophète Muhammad ﷺ marchait vers le terrain de prière en récitant le takbīr à haute voix, et les femmes participaient derrière les rangées. Les savants classiques ont statué que le takbīr est recommandé pour les hommes, les femmes, et les voyageurs — à haute voix pour les hommes et en silence pour les femmes. Le son transforme l'atmosphère en un espace d'exaltation et de gratitude, marquant publiquement la transition de l'austérité du culte à la joie de l'acceptation divine.
    reference: Sahih Muslim 892, Sunan Abi Dawud 1140
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 271) records the takbirat of 'Eid al-Fitr and 'Eid al-Adha with their distinct timings. Ibn al-Qayyim (Zad al-Ma'ad, 1:370) explains that the audible takbir transforms the atmosphere into one of exaltation. The four madhhabs agree on the recommendation of takbir, with the Shafi'is and Hanbalis holding it as sunnah mu'akkada.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 271) rapporte les takbīrāt de lʿĪd al-Fiṭr et de lʿĪd al-Aḍḥā avec leurs timings distincts. Ibn al-Qayyim (Zād al-Maʿād, 1:370) explique que le takbīr audible transforme l'atmosphère en un espace d'exaltation. Les quatre madhhabs s'accordent sur la recommandation du takbīr, les shāfiʿites et les ḥanbalites le tenant pour sunnah muʾakkada.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧١) تَكْبِيرَاتِ الْعِيدَيْنِ وَأَوْقَاتِهَا. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٧٠) أَنَّ التَّكْبِيرَ الْجَهْرِيَّ يُحَوِّلُ الْأَجْوَاءَ. تَتَفَقُ الْمَذَاهِبُ عَلَى الِاسْتِحْبَابِ، وَتَجْعَلُهُ الشَّافِعِيَّةُ وَالْحَنَابِلَةُ سُنَّةً مُؤَكَّدَةً.
    display_day_of_year: 208
    hadith_refs: "Muslim 892, Abu Dawud 1140"

  - slug: sunnah-saying-amin
    category: sunnah_practice
    title_en: Saying 'Amin' After al-Fatiha — When the Angels Say Amin
    title_ar: قَوْلُ "آمِينَ" بَعْدَ الفَاتِحَةِ — حِينَ تَقُولُ المَلائِكَةُ آمِينَ
    title_fr: Dire « Āmīn » après al-Fātiḥa — Quand les Anges disent Āmīn
    description_en: |
      Amin is the supplication for acceptance uttered by the imam and congregation immediately after the recitation of Surah al-Fatiha in every rak'ah of audible prayer. The Prophet ﷺ said: "When the imam says 'Amin,' say 'Amin,' for whoever's amin coincides with the amin of the angels, his previous sins are forgiven." The word itself means "O Allah, accept our prayer" or "answer our call," and it transforms the Fatiha from a solo recitation into a collective petition. The Prophet ﷺ would say it aloud in the audible prayers and silently in the silent ones, demonstrating its universality across all prayer types. Classical scholars differed on whether the congregation should say it aloud behind an imam who says it aloud, with the majority holding that it is recommended to do so. The moment of synchronized amin creates a vertical alignment between the worshipper, the congregation, and the angels, all petitioning Allah simultaneously with the same word of earnest entreaty.
    description_ar: |
      "آمِينَ" هِيَ الدُّعَاءُ بِالقَبُولِ الَّذِي يَلْقِيهِ الإِمَامُ وَالمَأْمُومُونَ مُبَاشَرَةً بَعْدَ تِلَاوَةِ سُورَةِ الفَاتِحَةِ فِي كُلِّ رَكْعَةٍ جَهْرِيَّةٍ. قَالَ النَّبِيُّ ﷺ: "إِذَا قَالَ الإِمَامُ: غَيْرِ المَغْضُوبِ عَلَيْهِمْ وَلا الضَّالِّينَ، فَقُولُوا: آمِينَ، فَمَنْ وَافَقَ قَوْلُهُ قَوْلَ المَلائِكَةِ غُفِرَ لَهُ مَا تَقَدَّمَ مِنْ ذَنْبِهِ". تَعْنِي الكَلِمَةُ "اللَّهُمَّ اسْتَجِبْ لَنَا" أَوْ "اسْتَجِبْ دُعَاءَنَا"، وَتُحَوِّلُ الفَاتِحَةَ مِنْ تِلَاوَةٍ فَرْدِيَّةٍ إِلَى طِلَابَةٍ جَمَاعِيَّةٍ. كَانَ ﷺ يَقُولُهَا جَهْرًا فِي الصَّلَوَاتِ الجَهْرِيَّةِ وَإِخْفَاتًا فِي السِّرِّيَّةِ، مُظْهِرًا شُمُولِيَّتَهَا فِي جَمِيعِ أَنْوَاعِ الصَّلَاةِ. اخْتَلَفَ العُلَمَاءُ فِي حَقِيقَةِ جَهْرِ المَأْمُومِ بِهَا خَلْفَ الإِمَامِ، وَذَهَبَ الجُمْهُورُ إِلَى اسْتِحْبَابِ ذَلِكَ. يُخَلِّقُ لَحْظَةُ التَّزَامُنِ "آمِينَ" اِتِّصَالًا عَمُودِيًّا بَيْنَ المُصَلِّي وَالجَمَاعَةِ وَالمَلائِكَةِ، جَمِيعًا يَطْلُبُونَ اللهَ فِي آنٍ وَاحِدٍ بِنَفْسِ كَلِمَةِ التَّضَرُّعِ الصَّادِقَةِ.
    description_fr: |
      Āmīn est la supplication pour l'acceptation prononcée par l'imam et la congrégation immédiatement après la récitation de la sourate al-Fātiḥa dans chaque unité de prière audible. Le Prophète Muhammad ﷺ a dit : « Quand l'imam dit : ghayri'l-maghḍūbi ʿalayhim wa-la'ḍ-ḍāllīn, dites : Āmīn, car celui dont le Āmīn coïncide avec celui des anges, ses péchés antérieurs lui sont pardonnés. » Le mot signifie « Ô Allah, accepte notre prière » ou « réponds à notre appel », et transforme la Fātiḥa d'une récitation solitaire en une pétition collective. Le Prophète ﷺ le disait à haute voix dans les prières audibles et silencieusement dans les prières silencieuses, démontrant son universalité à travers tous les types de prière. Les savants classiques ont divergé sur la question de savoir si la congrégation doit le dire à haute voix derrière un imam qui le dit à haute voix, la majorité tenant que c'est recommandé. Le moment de l'Āmīn synchronisé crée un alignement vertical entre le fidèle, la congrégation, et les anges, tous suppliant Allah simultanément avec le même mot de sollicitation sincère.
    reference: Sahih al-Bukhari 780, Sahih Muslim 410
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 272) records the narration that the angels say Amin and whoever coincides with them is forgiven. Ibn al-Qayyim (Zad al-Ma'ad, 1:375) explains that Amin transforms the Fatiha from solo recitation into collective petition. The majority of scholars recommend saying it aloud behind the imam in audible prayers.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 272) rapporte la narration selon laquelle les anges disent Āmīn et quiconque coïncide avec eux est pardonné. Ibn al-Qayyim (Zād al-Maʿād, 1:375) explique que Āmīn transforme la Fātiḥa d'une récitation solitaire en une pétition collective. La majorité des savants recommandent de le dire à haute voix derrière l'imam dans les prières audibles.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧٢) رِوَايَةَ أَنَّ الْمَلَائِكَةَ تَقُولُ آمِينَ وَمَنْ وَافَقَهُنَّ غُفِرَ لَهُ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٧٥) أَنَّ آمِينَ تُحَوِّلُ الْفَاتِحَةَ إِلَى طِلَابَةٍ جَمَاعِيَّةٍ. يَذْهَبُ الْجُمْهُورُ إِلَى اسْتِحْبَابِ الْجَهْرِ بِهَا.
    display_day_of_year: 209
    hadith_refs: "Bukhari 780, Muslim 410"

  - slug: sunnah-prayer-for-rain-istisqa
    category: sunnah_practice
    title_en: The Prayer for Rain (Istisqa) — Turning to Allah in Drought
    title_ar: صَلَاةُ الاِسْتِسْقَاءِ — الرُّجُوعُ إِلَى اللهِ فِي الجُفُوفِ
    title_fr: La Prière pour la Pluie (Istiṣqāʾ) — Se Tourner vers Allah pendant la Sécheresse
    description_en: |
      Istisqa is the special prayer performed when drought threatens the community, a collective turning to Allah in humility and repentance. The Prophet ﷺ would go out to the open prayer ground wearing minimal clothing, walking barefoot or in simple sandals, and lead the people in two rak'ahs with audible recitation. He would then stand and face the qibla, reverse his cloak so the inside faced outward, and raise his hands in prolonged supplication, imploring Allah for rain with the du'a: "Allahumma aghithna, Allahumma aghithna, Allahumma aghithna" (O Allah, send us rain). He would not descend from the minbar on one occasion until clouds gathered and rain fell. Classical scholars ruled that Istisqa is a confirmed Sunnah performed in congregation, preceded by seeking forgiveness and giving charity, for drought is understood as a reminder of human dependence on Allah's mercy. The prayer embodies the Muslim community's refusal to see nature as autonomous, insisting instead on direct divine causality and human supplication.
    description_ar: |
      الاِسْتِسْقَاءُ هِيَ الصَّلَاةُ الخَاصَّةُ الَّتِي تُؤَدَّى حِينَ يُهَدِّدُ الجُفُوفُ الجَمَاعَةَ، رُجُوعٌ جَمَاعِيٌّ إِلَى اللهِ بِالتَّوَاضُعِ وَالتَّوْبَةِ. كَانَ النَّبِيُّ ﷺ يَخْرُجُ إِلَى المُصَلَّى المَفْتُوحِ، لَابِسًا أَدْنَى الثِّيَابِ، مَاشِيًا حَافِيًا أَوْ فِي نَعْلَيْنِ بَسِيطَتَيْنِ، يُؤَمُّ النَّاسَ فِي رَكْعَتَيْنِ بِجَهْرِ القِرَاءَةِ. ثُمَّ يَقُومُ مُسْتَقْبِلَ القِبْلَةِ، يُقَلِّبُ رِدَاءَهُ حَتَّى يَظْهَرَ بَطْنُهُ، وَيَرْفَعُ يَدَيْهِ فِي دُعَاءٍ مُطَوَّلٍ: "اللَّهُمَّ أَغِثْنَا، اللَّهُمَّ أَغِثْنَا، اللَّهُمَّ أَغِثْنَا". وَفِي مَوْقِفٍ مَشْهُورٍ، لَمْ يَنْزِلْ مِنَ المِنْبَرِ حَتَّى تَجَمَّعَتِ السَّحَابُ وَأَمْطَرَتْ. حَكَمَ الفُقَهَاءُ بِأَنَّ الاِسْتِسْقَاءَ سُنَّةٌ مُؤَكَّدَةٌ تُؤَدَّى بِالجَمَاعَةِ، تَسْبِقُهَا الاِسْتِغْفَارُ وَالصَّدَقَةُ، فَالجُفُوفُ تَفْهِيمٌ بِاعْتِمَادِ الإِنْسَانِ عَلَى رَحْمَةِ اللهِ. تُجَسِّدُ هَذِهِ الصَّلَاةُ رَفْضَ المُجْتَمَعِ المُسْلِمِ أَنْ يَرَى الطَّبِيعَةَ مُسْتَقِلَّةً، مُصِرَّةً بَدَلًا مِنْ ذَلِكَ عَلَى السَّبَبِيَّةِ الإِلَهِيَّةِ المُبَاشِرَةِ وَعَلَى الدُّعَاءِ الإِنْسَانِيِّ.
    description_fr: |
      L'istiṣqāʾ est la prière spéciale accomplie quand la sécheresse menace la communauté, un retour collectif vers Allah dans l'humilité et le repentir. Le Prophète Muhammad ﷺ sortait sur le terrain de prière ouvert, vêtu de vêtements simples, marchant pieds nus ou en sandales modestes, et dirigeait les gens dans deux unités avec récitation audible. Il se tenait ensuite debout face à la qibla, retournait son manteau pour que l'intérieur soit visible, et levait les mains en supplication prolongée, implorant Allah pour la pluie avec le duʿā : « Allāhumma aghithnā, Allāhumma aghithnā, Allāhumma aghithnā » (Ô Allah, envoie-nous la pluie). En une occasion célèbre, il ne descendit pas du minbar avant que les nuages ne s'assemblent et que la pluie ne tombe. Les savants classiques ont statué que l'istiṣqāʾ est une sunnah muʾakkada accomplie en congregation, précédée par la demande de pardon et la charité, car la sécheresse est comprise comme un rappel de la dépendance humaine à la miséricorde d'Allah. Cette prière incarne le refus de la communauté musulmane de voir la nature comme autonome, insistant au contraire sur la causalité divine directe et la supplication humaine.
    reference: Sahih al-Bukhari 1005, Sahih Muslim 897
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 273) records the practice of istisqa' and the Prophet's ﷺ reversal of his cloak. Ibn al-Qayyim (Zad al-Ma'ad, 1:380) explains that istisqa' is a confirmed sunnah performed in congregation with humility and repentance. The four madhhabs agree on its performance and the reversal of the cloak as a symbol of turning to Allah.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 273) rapporte la pratique de l'istiṣqāʾ et le retournement du manteau du Prophète ﷺ. Ibn al-Qayyim (Zād al-Maʿād, 1:380) explique que l'istiṣqāʾ est une sunnah confirmée accomplie en congregation avec humilité et repentir. Les quatre madhhabs s'accordent sur sa pratique et le retournement du manteau comme symbole de retour vers Allah.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧٣) صِيغَةَ الِاسْتِسْقَاءِ وَتَقْلِيبَ النَّبِيِّ ﷺ رِدَاءَهُ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٨٠) أَنَّ الِاسْتِسْقَاءَ سُنَّةٌ مُؤَكَّدَةٌ. تَتَفَقُ الْمَذَاهِبُ عَلَى أَدَائِهَا وَتَقْلِيبِ الرِّدَاءِ رَمْزًا لِلرُّجُوعِ إِلَى اللهِ.
    display_day_of_year: 210
    hadith_refs: "Bukhari 1005, Muslim 897"

  - slug: sunnah-eclipse-prayer
    category: sunnah_practice
    title_en: The Eclipse Prayer (Kusuf) — When the Sun or Moon Is Eclipsed
    title_ar: صَلَاةُ الكُسُوفِ — حِينَ يَنْكَسِفُ القَمَرُ أَوِ الشَّمْسُ
    title_fr: La Prière de l'Éclipse (Kusūf) — Quand le Soleil ou la Lune s'Éclipsent
    description_en: |
      The eclipse prayer is a special two-rak'ah prayer performed when the sun or moon is eclipsed, demonstrating the Muslim community's response to cosmic events with worship rather than superstition. The Prophet ﷺ hurried to the mosque when a solar eclipse occurred, prayed two rak'ahs with the longest qiyam, ruku', and sujud he ever performed, and then addressed the congregation: "The sun and the moon are two of the signs of Allah; they are not eclipsed for the birth or death of anyone." The prayer consists of two rak'ahs, each with two standings, two bowings, and two prostrations — a unique structure among the Sunnah prayers. Classical scholars explained that the eclipse prayer serves as a reminder of the Day of Judgment, when the sun will be folded up and the moon darkened. The Prophet ﷺ wept during the prayer and exhorted the community to seek forgiveness, give charity, and free slaves, teaching that celestial phenomena are occasions for spiritual recalibration rather than astrological speculation.
    description_ar: |
      صَلَاةُ الكُسُوفِ هِيَ رَكْعَتَانِ خَاصَّتَانِ تُؤَدَّيَانِ حِينَ يَنْكَسِفُ القَمَرُ أَوِ الشَّمْسُ، مُظْهِرَةً اسْتِجَابَةَ المُجْتَمَعِ المُسْلِمِ لِلأَحْدَاثِ الكَوْنِيَّةِ بِالعِبَادَةِ لا بِالخُرَافَةِ. أَسْرَعَ النَّبِيُّ ﷺ إِلَى المَسْجِدِ حِينَ حَدَثَ كُسُوفُ الشَّمْسِ، فَصَلَّى رَكْعَتَيْنِ بِأَطْوَلِ قِيَامٍ وَرُكُوعٍ وَسُجُودٍ صَلَّاهُمَا عَلَى الإِطْلَاقِ، ثُمَّ خَطَبَ الجَمَاعَةَ: "إِنَّ الشَّمْسَ وَالقَمَرَ آيَتَانِ مِنْ آيَاتِ اللَّهِ، لا يَنْكَسِفَانِ لِمَوْتِ أَحَدٍ وَلا لِحَيَاتِهِ". تَتَكَوَّنُ الصَّلَاةُ مِنْ رَكْعَتَيْنِ، كُلُّ رَكْعَةٍ فِيهَا قِيَامَانِ وَرُكُوعَانِ وَسُجُودَانِ — بِنَاءٌ فَرِيدٌ بَيْنَ الصَّلَوَاتِ السُّنَّةِ. فَسَّرَ العُلَمَاءُ أَنَّ صَلَاةَ الكُسُوفِ تَذْكِرٌ بِيَوْمِ القِيَامَةِ، حِينَ تُكَوَّرُ الشَّمْسُ وَيَكْسَفُ القَمَرُ. بَكَى النَّبِيُّ ﷺ خِلَالَ الصَّلَاةِ، وَحَضَّ الجَمَاعَةَ عَلَى الاِسْتِغْفَارِ وَالصَّدَقَةِ وَعِتْقِ الرِّقَابِ، مُعَلِّمًا أَنَّ الظَّوَاهِرَ السَّمَاوِيَّةَ فُرَصٌ لِلتَّوْجِيهِ الرُّوحِيِّ لا لِلتَّأَوُّلَاتِ الفَلَكِيَّةِ.
    description_fr: |
      La prière de l'éclipse est une prière spéciale de deux unités accomplie quand le soleil ou la lune s'éclipse, démontrant la réponse de la communauté musulmane aux événements cosmiques par le culte plutôt que par la superstition. Le Prophète Muhammad ﷺ se hâta vers la mosquée lors d'une éclipse solaire, pria deux unités avec le qiyām, le rukūʿ et le sujūd les plus longs qu'il ait jamais accomplis, puis s'adressa à la congrégation : « Le soleil et la lune sont deux des signes d'Allah ; ils ne s'éclipsent ni pour la naissance ni pour la mort de quiconque. » La prière consiste en deux unités, chacune avec deux standings, deux inclinaisons et deux prosternations — une structure unique parmi les prières sunnah. Les savants classiques ont expliqué que la prière de l'éclipse sert de rappel du Jour du Jugement, quand le soleil sera replié et la lune obscurcie. Le Prophète ﷺ pleura pendant la prière et exhorta la communauté à demander pardon, à faire l'aumône, et à affranchir les esclaves, enseignant que les phénomènes célestes sont des occasions de recalibration spirituelle plutôt que de spéculation astrologique.
    reference: Sahih al-Bukhari 1043, Sahih Muslim 901
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 274) records the eclipse prayer as a unique two-rak'ah prayer with two standings, bowings, and prostrations each. Ibn al-Qayyim (Zad al-Ma'ad, 1:385) explains that the eclipse is a sign of Allah, not an omen for birth or death. The four madhhabs agree on the structure and the communal obligation to perform it.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 274) rapporte la prière de l'éclipse comme une prière unique de deux rakʿahs avec deux qiyāms, deux rukūʿs et deux sujūds chacune. Ibn al-Qayyim (Zād al-Maʿād, 1:385) explique que l'éclipse est un signe d'Allah, non un présage de naissance ou de mort. Les quatre madhhabs s'accordent sur la structure et l'obligation communautaire de l'accomplir.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧٤) صَلَاةَ الْكُسُوفِ بِنَائِهَا الْفَرِيدِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٨٥) أَنَّ الْكُسُوفَ آيَةٌ مِنْ آيَاتِ اللهِ. تَتَفَقُ الْمَذَاهِبُ عَلَى الْبِنْيَةِ وَالْفَرْضِ الْجَمَاعِيِّ.
    display_day_of_year: 211
    hadith_refs: "Bukhari 1043, Muslim 901"

  - slug: sunnah-funeral-prayer
    category: sunnah_practice
    title_en: The Funeral Prayer (Janaza) — The Last Gift to a Muslim
    title_ar: صَلَاةُ الجَنَازَةِ — آخِرُ هَدِيَّةٍ لِلمُسْلِمِ
    title_fr: La Prière Funéraire (Janāza) — Le Dernier Cadeau à un Musulman
    description_en: |
      Salat al-Janaza is the unique prayer performed for a deceased Muslim, offered standing without ruku' or sujud, and composed of four takbirs. After the first takbir, the imam recites al-Fatiha silently; after the second, he invokes blessings upon the Prophet ﷺ; after the third, he supplicates for the deceased with the classical du'a: "Allahumma ighfir li-hayyina wa mayyitina, wa shahidina wa gha'ibina" (O Allah, forgive our living and our dead, those present and those absent). After the fourth takbir, he adds a brief supplication and then concludes with taslim to the right. The Prophet ﷺ said: "When a Muslim is prayed over by a group of forty who do not associate partners with Allah, he is interceded for." Attending the funeral prayer, walking in the procession, and burying the deceased are all communal obligations that bind the living to the dead. Classical scholars noted that the Janaza prayer is the last service a Muslim can render to a fellow believer, a final act of solidarity before the soul faces its reckoning alone.
    description_ar: |
      صَلَاةُ الجَنَازَةِ هِيَ الصَّلَاةُ الفَرِيدَةُ الَّتِي تُؤَدَّى لِلمَيِّتِ المُسْلِمِ، قِيَامًا بِدُونِ رُكُوعٍ أَوْ سُجُودٍ، مُرَكَّبَةٌ مِنْ أَرْبَعِ تَكْبِيرَاتٍ. بَعْدَ التَّكْبِيرَةِ الأولَى يَقْرَأُ الإِمَامُ الفَاتِحَةَ إِخْفَاتًا؛ وَبَعْدَ الثَّانِيَةِ يُصَلِّي عَلَى النَّبِيِّ ﷺ؛ وَبَعْدَ الثَّالِثَةِ يَدْعُو لِلمَيِّتِ بِالدُّعَاءِ المَشْهُورِ: "اللَّهُمَّ اغْفِرْ لِحَيِّنَا وَمَيِّتِنَا، وَشَاهِدِنَا وَغَائِبِنَا". وَبَعْدَ الرَّابِعَةِ يَزِيدُ دُعَاءً خَفِيفًا، ثُمَّ يُخَتِّمُ بِالتَّسْلِيمِ إِلَى اليَمِينِ. قَالَ ﷺ: "مَا مِنْ مَيِّتٍ يُصَلِّي عَلَيْهِ أَرْبَعُونَ رَجُلاً مِنَ المُسْلِمِينَ لا يُشْرِكُونَ بِاللَّهِ شَيْئًا، إِلاَّ شَفَّعُوا فِيهِ". حُضُورُ صَلَاةِ الجَنَازَةِ وَالمَشْيِ فِي الجِنَازَةِ وَالدَّفْنِ كُلُّهَا فَرَائِضُ كِفَايَةٍ تَرْبِطُ الأَحْيَاءَ بِالأَمْوَاتِ. لَاحَظَ العُلَمَاءُ أَنَّ صَلَاةَ الجَنَازَةِ هِيَ آخِرُ خِدْمَةٍ يُؤَدِّيهَا المُسْلِمُ لأَخِيهِ، فِعْلُ تَضَامُنٍ أَخِيرٍ قَبْلَ أَنْ يَوَاجِهَ الرُّوحُ حِسَابَهَا وَحْدَهَا.
    description_fr: |
      La ṣalāt al-Janāza est la prière unique accomplie pour un musulman décédé, offerte debout sans rukūʿ ni sujūd, et composée de quatre takbīrs. Après le premier takbīr, l'imam récite al-Fātiḥa silencieusement ; après le second, il invoque des bénédictions sur le Prophète ﷺ ; après le troisième, il supplie pour le défunt avec le duʿā classique : « Allāhumma ighfir li-ḥayyinā wa mayyitinā, wa shāhidinā wa ghā'ibinā » (Ô Allah, pardonne à nos vivants et à nos morts, à nos présents et à nos absents). Après le quatrième takbīr, il ajoute une brève supplication puis conclut par le taslīm à droite. Le Prophète ﷺ a dit : « Quarante musulmans qui n'associent rien à Allah prient sur un mort, ils intercèdent pour lui. » Assister à la prière funéraire, marcher dans le cortège, et enterrer le défunt sont tous des obligations communautaires qui lient les vivants aux morts. Les savants classiques ont noté que la prière de la Janāza est le dernier service qu'un musulman puisse rendre à un fellow croyant, un dernier acte de solidarité avant que l'âme ne fasse face seule à son jugement.
    reference: Sahih al-Bukhari 1240, Sahih Muslim 951
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 275) records the four takbirs of the Janaza prayer and the supplications between them. Ibn al-Qayyim (Zad al-Ma'ad, 1:390) explains that attending the funeral is a communal obligation and the last gift to a Muslim. The four madhhabs agree on the four takbirs, differing only on the recommended wording after each.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 275) rapporte les quatre takbīrs de la prière Janāza et les supplications entre eux. Ibn al-Qayyim (Zād al-Maʿād, 1:390) explique qu'assister au funéraille est une obligation communautaire et le dernier cadeau à un musulman. Les quatre madhhabs s'accordent sur les quatre takbīrs, ne différant que sur le libellé recommandé après chacun.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧٥) أَرْبَعَ تَكْبِيرَاتِ الْجَنَازَةِ وَالْأَدْعِيَةَ بَيْنَهَا. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٩٠) أَنَّ حُضُورَ الْجَنَازَةِ فَرْضُ كِفَايَةٍ وَآخِرُ هَدِيَّةٍ. تَتَفَقُ الْمَذَاهِبُ عَلَى الْأَرْبَعِ تَكْبِيرَاتٍ.
    display_day_of_year: 213
    hadith_refs: "Bukhari 1240, Muslim 951"

  - slug: sunnah-visiting-sick-detailed
    category: sunnah_practice
    title_en: The Sunnah of Visiting the Sick
    title_ar: سُنَّةُ عِيَادَةِ المَرِيضِ
    title_fr: La Sunnah de la Visite du Malade
    description_en: |
      Visiting the sick is a fundamental right of Muslims over one another and a practice that the Prophet ﷺ established as a cornerstone of communal compassion. He said: "The Muslim has five rights over his fellow Muslim: returning the salam, visiting the sick, following the funeral procession, accepting invitations, and saying 'yarhamukallah' to one who sneezes." He would sit by the bedside of sick companions, ask after their well-being, place his blessed hand upon them, and supplicate with the du'a: "Allahumma Rabban-nas, adhhibil-ba'sa, washfi anta ash-Shafi, la shifa'a illa shifa'uka, shifa'an la yughadiru saqaman" (O Allah, Lord of mankind, remove the harm and heal — You are the Healer; there is no healing except Your healing, a healing that leaves no ailment). He also taught that the visitor remains in the harvest of Paradise from the moment he sets out until he returns. Classical scholars ruled that visiting is recommended for all Muslims, obligatory for neighbors and relatives, and should be brief so as not to burden the patient. The practice cultivates empathy, reminds the healthy of their own mortality, and knits the community into a fabric of mutual care.
    description_ar: |
      عِيَادَةُ المَرِيضِ حَقٌّ أَصِيلٌ لِلمُسْلِمِ عَلَى أَخِيهِ، وَسُنَّةٌ جَعَلَهَا النَّبِيُّ ﷺ رُكْنًا مِنْ أَرْكَانِ الرَّحْمَةِ الجَمَاعِيَّةِ. قَالَ: "لِلْمُسْلِمِ عَلَى المُسْلِمِ خَمْسٌ: رَدُّ السَّلاَمِ، وَعِيَادَةُ المَرِيضِ، وَاتِّبَاعُ الجَنَائِزِ، وَإِجَابَةُ الدَّعْوَةِ، وَتَشْمِيتُ العَاطِسِ". كَانَ ﷺ يَجْلِسُ بِجَانِبِ فِرَاشِ المَرِيضِ مِنْ أَصْحَابِهِ، وَيَسْأَلُ عَنْ حَالِهِ، وَيَضَعُ يَدَهُ المُبَارَكَةَ عَلَيْهِ، وَيَدْعُو: "اللَّهُمَّ رَبَّ النَّاسِ، أَذْهِبِ البَأْسَ، وَاشْفِ أَنْتَ الشَّافِي، لا شِفَاءَ إِلاَّ شِفَاؤُكَ، شِفَاءً لا يُغَادِرُ سَقَمًا". وَعَلَّمَ أَنَّ الزَّائِرَ يَظَلُّ فِي خُرْفَةِ الجَنَّةِ مِنْ لَحْظَةِ خُرُوجِهِ حَتَّى عَوْدَتِهِ. حَكَمَ العُلَمَاءُ بِأَنَّ العِيَادَةَ مُسْتَحَبَّةٌ لِكُلِّ المُسْلِمِينَ، وَوَاجِبَةٌ لِلجِيرَانِ وَالأَقَارِبِ، وَيَنْبَغِي أَنْ تَكُونَ مُخْتَصَرَةً لِئَلاَّ تُثِقِلَ عَلَى المَرِيضِ. تُرَبِّي هَذِهِ السُّنَّةُ التَّعَاطُفَ، وَتُذَكِّرُ الأَصِحَّاءَ بِفَنَائِهِمْ، وَتَنْسِجُ الجَمَاعَةَ فِي نَسِيجٍ مِنَ العِنَايَةِ المُتَبَادَلَةِ.
    description_fr: |
      La visite du malade est un droit fondamental des musulmans les uns envers les autres et une pratique que le Prophète Muhammad ﷺ a établie comme pierre angulaire de la compassion communautaire. Il a dit : « Le musulman a cinq droits sur son frère musulman : répondre au salām, visiter le malade, suivre le cortège funéraire, accepter les invitations, et dire yarḥamukallāh à celui qui éternue. » Il s'asseyait au chevet des compagnons malades, s'enquérait de leur état, posait sa main bénie sur eux, et suppliait avec le duʿā : « Allāhumma Rabban-nās, adhhibi'l-ba'sa, washfi anta ash-Shāfī, lā shifā'a illā shifā'uka, shifā'an lā yughādiru saqaman » (Ô Allah, Seigneur de l'humanité, enlève le mal et guéris — Tu es le Guérisseur ; il n'y a de guérison que Ta guérison, une guérison qui ne laisse aucune maladie). Il enseigna aussi que le visiteur reste dans la moisson du Paradis depuis le moment où il part jusqu'à son retour. Les savants classiques ont statué que la visite est recommandée pour tous les musulmans, obligatoire pour les voisins et les proches, et devrait être brève pour ne pas accabler le malade. Cette pratique cultive l'empathie, rappelle aux bien-portants leur propre mortalité, et tricote la communauté en un tissu de sollicitude mutuelle.
    reference: Sahih al-Bukhari 5659, Sahih Muslim 2191
    source_notes: |
      Al-Nawawi (al-Adhkar, p. 276) records the du'a for visiting the sick and the narration that the visitor walks in the gardens of Paradise. Ibn al-Qayyim (Zad al-Ma'ad, 1:395) explains that visiting the sick cultivates empathy and reminds the healthy of their own mortality. The four madhhabs agree on the recommendation, with the majority holding it obligatory for neighbors and relatives.
    source_notes_fr: |
      Al-Nawawī (al-Adhkār, p. 276) rapporte le duʿā pour visiter le malade et la narration selon laquelle le visiteur marche dans les jardins du Paradis. Ibn al-Qayyim (Zād al-Maʿād, 1:395) explique que visiter le malade cultive l'empathie et rappelle aux bien-portants leur propre mortalité. Les quatre madhhabs s'accordent sur la recommandation, la majorité la tenant pour obligatoire pour les voisins et les proches.
    source_notes_ar: |
      يُسَجِّلُ النَّوَوِيُّ فِي «الْأَذْكَارِ» (ص ٢٧٦) دُعَاءَ عِيَادَةِ الْمَرِيضِ وَأَنَّ الزَّائِرَ فِي خُرْفَةِ الْجَنَّةِ. وَيُوَضِّحُ ابْنُ الْقَيِّمِ فِي «زَادِ الْمَعَادِ» (١: ٣٩٥) أَنَّ الْعِيَادَةَ تُرَبِّي التَّعَاطُفَ. تَتَفَقُ الْمَذَاهِبُ عَلَى الِاسْتِحْبَابِ، وَيَذْهَبُ الْجُمْهُورُ إِلَى الْوُجُوبِ لِلْجِيرَانِ وَالْأَقَارِبِ.
    display_day_of_year: 214
    hadith_refs: "Bukhari 5659, Muslim 2191"
