{# Reusable solid-ink button matching the FE's primary CTA. Inline styles
   so most clients render it correctly even when CSS is stripped. #}
<a href="{{ href }}" style="display:inline-block;background:#1b1a17;color:#f4ede0;text-decoration:none;font-family:'SF Mono','Menlo','Consolas',monospace;font-size:11.5px;letter-spacing:1.8px;text-transform:uppercase;padding:14px 26px;margin:18px 0;">{{ label }}</a>
