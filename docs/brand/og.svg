<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f5f0e6"/>

  <!-- top frieze rule + centered rosette -->
  <line x1="100" y1="100" x2="1100" y2="100" stroke="#d5cdb8" stroke-width="0.75"/>
  <g transform="translate(600, 100)">
    <circle r="6" fill="none" stroke="#588671" stroke-width="0.75"/>
    <circle r="2" fill="#588671"/>
  </g>

  <!-- "EST · MMXXVI" eyebrow -->
  <text x="600.0" y="148" font-family="JetBrains Mono, ui-monospace, Menlo, monospace"
        font-size="14" letter-spacing="6" fill="#6e6a5c" text-anchor="middle">EST · MMXXVI</text>

  <!-- centered lockup -->
  <g transform="translate(210.0, 200)">
    <rect width="200" height="200" rx="44" ry="44" fill="#fbf7ee" stroke="#d5cdb8" stroke-width="2"/>
    <g fill="none" stroke="#1b1a17" stroke-width="3" stroke-linejoin="miter">
      <polygon points="192.00,100.00 100.00,192.00 8.00,100.00 100.00,8.00"/>
      <polygon points="165.05,165.05 34.95,165.05 34.95,34.95 165.05,34.95"/>
    </g>
    <text x="100.0" y="106.0" font-family="Amiri, 'Damascus', 'Geeza Pro', serif"
          font-size="92" font-weight="500" fill="#588671" text-anchor="middle" dominant-baseline="central">ث</text>
  </g>
  <text x="460.0" y="330.0" font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif"
        font-size="124" font-style="italic" font-weight="500" fill="#1b1a17" letter-spacing="-0.01em">Thaqafa<tspan
        dx="44" font-family="Amiri, 'Damascus', 'Geeza Pro', serif" font-size="86" font-weight="500" font-style="normal" fill="#588671">ثقافة</tspan></text>

  <!-- tagline -->
  <text x="600.0" y="490" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="34" font-style="italic" fill="#3a372f" text-anchor="middle" letter-spacing="-0.005em">One verified day in Islamic history.</text>

  <!-- bottom frieze + url -->
  <line x1="100" y1="540" x2="1100" y2="540" stroke="#d5cdb8" stroke-width="0.75"/>
  <text x="600.0" y="580" font-family="JetBrains Mono, monospace"
        font-size="14" letter-spacing="3" fill="#6e6a5c" text-anchor="middle">news.majlisna.app · 1256 events · classical sources only</text>
</svg>
