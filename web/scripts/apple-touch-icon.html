<!doctype html>
<!--
  Source for ``web/public/apple-touch-icon.png``. Render at 180×180.
-->
<html>
  <head>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 180px; height: 180px; }
      body {
        background: #f4ede0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <svg width="120" height="120" viewBox="0 0 24 24">
      <g fill="none" stroke="#7a5b3a" stroke-width="0.8" stroke-linejoin="round">
        <rect x="4" y="4" width="16" height="16" />
        <rect x="4" y="4" width="16" height="16" transform="rotate(45 12 12)" />
      </g>
    </svg>
  </body>
</html>
