<!doctype html>
<!--
  Source for ``web/public/og-image.png``. Render at 1200×630 via
  Playwright (or any headless browser) and save the result as PNG —
  see ``web/scripts/README.md``.

  Editorial design vocabulary mirrors the live site: paper background,
  eight-point star ornament, mono uppercase eyebrow, serif title cluster.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --paper: #f4ede0;
        --ink: #1b1a17;
        --ink-soft: #3b3933;
        --ink-mute: #6e6a5e;
        --rule: #cdc6b6;
        --accent: #7a5b3a;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 1200px; height: 630px; }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Cormorant Garamond", Georgia, serif;
        display: grid;
        grid-template-rows: 1fr auto 1fr;
        align-items: center;
        justify-items: center;
        padding: 60px 80px;
        position: relative;
      }
      /* Top ribbon — accent eyebrow */
      .ribbon {
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent);
        align-self: start;
      }
      /* Star + title cluster */
      .center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }
      .star { color: var(--accent); }
      h1 {
        font-size: 100px;
        line-height: 1.0;
        font-weight: 500;
        letter-spacing: -2px;
        text-align: center;
        color: var(--ink);
        max-width: 980px;
      }
      .lede {
        font-style: italic;
        font-size: 28px;
        line-height: 1.3;
        color: var(--ink-soft);
        text-align: center;
        max-width: 760px;
      }
      /* Bottom signature row */
      .signature {
        display: flex;
        align-items: center;
        gap: 18px;
        align-self: end;
        font-family: "JetBrains Mono", monospace;
        font-size: 15px;
        letter-spacing: 2.4px;
        text-transform: uppercase;
        color: var(--ink-mute);
      }
      .dot { width: 5px; height: 5px; background: var(--accent); border-radius: 999px; }
      /* Hairline borders inside the bleed for editorial feel */
      .frame-top, .frame-bot {
        position: absolute;
        left: 80px;
        right: 80px;
        height: 0.5px;
        background: var(--rule);
      }
      .frame-top { top: 80px; }
      .frame-bot { bottom: 80px; }
    </style>
  </head>
  <body>
    <div class="frame-top"></div>
    <div class="frame-bot"></div>

    <div class="ribbon">· Islam Aujourd'hui dans l'Histoire ·</div>

    <div class="center">
      <svg class="star" width="64" height="64" viewBox="0 0 24 24">
        <g fill="none" stroke="currentColor" stroke-width="0.6" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" />
          <rect x="4" y="4" width="16" height="16" transform="rotate(45 12 12)" />
        </g>
      </svg>
      <h1>Islamic On This Day</h1>
      <div class="lede">
        Un événement vérifié de l'histoire islamique chaque jour, en calendrier hégirien et grégorien.
      </div>
    </div>

    <div class="signature">
      <span>news.majlisna.app</span>
      <span class="dot"></span>
      <span>1 256 events</span>
      <span class="dot"></span>
      <span>1447 ah build</span>
    </div>
  </body>
</html>
