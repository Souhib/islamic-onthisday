<?xml version="1.0" encoding="UTF-8"?>
<!--
  Eight-point star — the project's editorial mark, mirroring the
  ``EightPointStar`` React component in ``components/design/primitives.tsx``.
  Transparent background (browsers pick up the tab-bar colour); stroke in
  a deep editorial green that reads at 16x16 against either a light or
  a dark tab.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <g fill="none" stroke="#2e7d32" stroke-width="1.6" stroke-linejoin="round">
    <rect x="6" y="6" width="20" height="20"/>
    <rect x="6" y="6" width="20" height="20" transform="rotate(45 16 16)"/>
  </g>
</svg>
