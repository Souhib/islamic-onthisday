<?xml version="1.0" encoding="UTF-8"?>
<!--
  Eight-point star — the project's editorial mark, mirroring the
  ``EightPointStar`` React component in ``components/design/primitives.tsx``.
  Filled accent on a paper square so the icon reads on any tab background.
  No media-query-darkmode fallback: most browsers keep the favicon as-is
  in dark themes; the warm umber on cream is legible in both.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#f4ede0"/>
  <g fill="none" stroke="#7a5b3a" stroke-width="1.4" stroke-linejoin="round">
    <rect x="6" y="6" width="20" height="20"/>
    <rect x="6" y="6" width="20" height="20" transform="rotate(45 16 16)"/>
  </g>
</svg>
