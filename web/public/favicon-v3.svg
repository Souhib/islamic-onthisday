<?xml version="1.0" encoding="UTF-8"?>
<!--
  Thaqafa brand mark — eight-point khātam (rub al-hizb / two overlapping
  squares 45° apart) framing the Arabic letter ث (Thā). The mark works
  as the favicon, the macOS Touch Bar / pinned tab icon, and any
  square-canvas brand surface. Auto-switches palette via
  prefers-color-scheme.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <style>
    :root { --bg: #fbf7ee; --border: #d5cdb8; --star: #1b1a17; --glyph: #588671; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #161a21; --border: #272b33; --star: #f5f0e6; --glyph: #81b19b; }
    }
  </style>
  <rect width="256" height="256" rx="56" ry="56" fill="var(--bg)" stroke="var(--border)" stroke-width="2"/>
  <g fill="none" stroke="var(--star)" stroke-width="3.2" stroke-linejoin="miter" stroke-linecap="butt">
    <polygon points="245.76,128.00 128.00,245.76 10.24,128.00 128.00,10.24"/>
    <polygon points="211.27,211.27 44.73,211.27 44.73,44.73 211.27,44.73"/>
  </g>
  <text x="128.0" y="136.0" font-family="Amiri, &apos;Scheherazade New&apos;, &apos;Noto Naskh Arabic&apos;, Damascus, &apos;Geeza Pro&apos;, serif"
        font-size="118" font-weight="500" fill="var(--glyph)" text-anchor="middle" dominant-baseline="central">ث</text>
</svg>
