<?xml version="1.0" encoding="UTF-8"?>
<!--
  Thaqafa brand mark — eight-point khātam (rub al-hizb / two overlapping
  squares 45° apart) framing the Arabic letter ث (Thā). Single-mode
  cream paper: the editorial brand keeps its colour regardless of the
  user's system theme — flipping the favicon to dark on dark-mode OS
  diluted the identity (an editorial product is its paper).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <rect width="256" height="256" rx="56" ry="56" fill="#fbf7ee" stroke="#d5cdb8" stroke-width="2"/>
  <g fill="none" stroke="#1b1a17" stroke-width="3.2" stroke-linejoin="miter" stroke-linecap="butt">
    <polygon points="245.76,128.00 128.00,245.76 10.24,128.00 128.00,10.24"/>
    <polygon points="211.27,211.27 44.73,211.27 44.73,44.73 211.27,44.73"/>
  </g>
  <text x="128.0" y="136.0" font-family="Amiri, &apos;Scheherazade New&apos;, &apos;Noto Naskh Arabic&apos;, Damascus, &apos;Geeza Pro&apos;, serif"
        font-size="118" font-weight="500" fill="#588671" text-anchor="middle" dominant-baseline="central">ث</text>
</svg>
