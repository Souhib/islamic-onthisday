<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Thaqafa</title>
    <meta
      name="description"
      content="One verified event from Islamic history per day, in Hijri and Gregorian calendars. 1,256 curated events, 11 sacred days, classical sources only."
    />
    <meta name="theme-color" content="#f4ede0" />

    <!-- Favicons. Filename is versioned (``-v2``) on purpose: Cloudflare
         was serving the v1 mark under the same URL for a year even after
         the file was replaced at the origin. Bumping the path forces
         every cache layer (browser, CDN) to fetch fresh. Bump the suffix
         again whenever the brand mark changes. -->
    <link rel="icon" type="image/svg+xml" href="/favicon-v2.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />

    <!-- Canonical home + locale alternates. The site is fully trilingual at
         the content layer; chrome i18n is browser-driven. -->
    <link rel="canonical" href="https://news.majlisna.app/" />

    <!-- Open Graph — read by Facebook, LinkedIn, Slack, Discord, WhatsApp,
         iMessage, etc. The image is a static 1200x630 editorial card; per-
         route OG (event/lesson/observance permalinks) would need a server-
         side prerender and is deliberately not shipped here. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Thaqafa" />
    <meta property="og:title" content="Thaqafa" />
    <meta
      property="og:description"
      content="One verified event from Islamic history per day, in Hijri and Gregorian calendars."
    />
    <meta property="og:url" content="https://news.majlisna.app/" />
    <meta property="og:image" content="https://news.majlisna.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Thaqafa — daily classical history" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="ar" />

    <!-- Twitter Card — same content, Twitter's tag namespace. ``summary_large_image``
         is the wide preview every modern reader expects. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thaqafa" />
    <meta
      name="twitter:description"
      content="One verified event from Islamic history per day, in Hijri and Gregorian calendars."
    />
    <meta name="twitter:image" content="https://news.majlisna.app/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Thaqafa — daily classical history"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
