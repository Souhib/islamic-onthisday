server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hashed assets — cache aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        gzip_static on;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pipeline-generated syndication files — short TTL so a daily rebuild
    # propagates within an hour.
    location ~* /(sitemap\.xml|robots\.txt|feed\.xml|dataset-meta\.json)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Liveness for the FE container itself.
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Reverse proxy — the SPA hits the backend through the same origin, so
    # the browser never makes a cross-origin request and CORS stays trivial.
    location /api/ {
        proxy_pass http://backend:5111;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA routing — fall through to index.html for everything that isn't
    # a static asset or the API.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
